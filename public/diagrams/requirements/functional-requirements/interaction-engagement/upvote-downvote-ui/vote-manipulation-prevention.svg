<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-orange { fill: #ed8936; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Vote Manipulation Prevention</text>
  
  <!-- Rate Limiting (Top Left) -->
  <rect x="20" y="70" width="220" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Rate Limiting</text>
  
  <rect x="40" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Rate limit visualization -->
  <rect x="55" y="125" width="150" height="40" rx="2" class="accent-box" stroke-width="1"/>
  <text x="130" y="145" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">100 votes/hour</text>
  <text x="130" y="160" text-anchor="middle" font-size="7" class="text-secondary">Max limit per user</text>
  
  <!-- Progress bar -->
  <rect x="55" y="175" width="150" height="15" rx="2" class="box-base" stroke-width="1"/>
  <rect x="55" y="175" width="120" height="15" rx="2" class="highlight-orange" stroke-width="1"/>
  <text x="130" y="187" text-anchor="middle" font-size="7" class="text-secondary">80/100 used</text>
  
  <text x="130" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Prevents bot voting</text>
  
  <!-- Account Age (Top Center) -->
  <rect x="260" y="70" width="220" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="370" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Account Age Requirement</text>
  
  <rect x="280" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Age threshold -->
  <rect x="295" y="125" width="150" height="40" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="370" y="145" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Min 1 day old</text>
  <text x="370" y="160" text-anchor="middle" font-size="7" class="text-secondary">To vote</text>
  
  <!-- New account blocked -->
  <rect x="295" y="175" width="150" height="35" rx="2" class="box-base" stroke-width="1" opacity="0.5"/>
  <text x="370" y="195" text-anchor="middle" font-size="8" class="highlight-red">🚫 New account</text>
  <text x="370" y="210" text-anchor="middle" font-size="7" class="text-secondary">Cannot vote yet</text>
  
  <text x="370" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Prevents throwaways</text>
  
  <!-- Karma Threshold (Top Right) -->
  <rect x="500" y="70" width="240" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="620" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Karma Threshold</text>
  
  <rect x="520" y="110" width="200" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Subreddit threshold -->
  <rect x="535" y="125" width="170" height="40" rx="2" class="accent-box" stroke-width="1"/>
  <text x="620" y="145" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">r/newsub</text>
  <text x="620" y="160" text-anchor="middle" font-size="7" class="text-secondary">Min 50 karma to vote</text>
  
  <!-- User karma -->
  <rect x="535" y="175" width="170" height="35" rx="2" class="box-base" stroke-width="1"/>
  <text x="620" y="195" text-anchor="middle" font-size="8" class="text-primary">User: 30 karma</text>
  <text x="620" y="210" text-anchor="middle" font-size="7" class="highlight-red">🚫 Below threshold</text>
  
  <text x="620" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Prevents brigading</text>
  
  <!-- Vote Fuzzing (Bottom Left) -->
  <rect x="20" y="260" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Vote Fuzzing</text>
  
  <rect x="40" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Actual vs displayed -->
  <text x="55" y="320" font-size="9" font-weight="bold" class="text-primary">Actual Votes:</text>
  <rect x="55" y="330" width="110" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="110" y="350" text-anchor="middle" font-size="9" class="text-primary">1,000 votes</text>
  
  <text x="180" y="320" font-size="9" font-weight="bold" class="text-primary">Displayed:</text>
  <rect x="180" y="330" width="110" height="30" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="235" y="350" text-anchor="middle" font-size="9" class="text-primary">1,003 votes</text>
  
  <text x="170" y="385" text-anchor="middle" font-size="8" class="highlight-purple">± small random number</text>
  <text x="170" y="400" text-anchor="middle" font-size="8" class="text-secondary">Prevents exact tracking</text>
  
  <text x="170" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Prevents vote tracking</text>
  
  <!-- IP/Device Tracking (Bottom Center) -->
  <rect x="340" y="260" width="320" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">IP/Device Tracking</text>
  
  <rect x="360" y="300" width="280" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Vote ring detection -->
  <text x="375" y="320" font-size="9" font-weight="bold" class="text-primary">Detect Vote Rings:</text>
  
  <rect x="375" y="330" width="250" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="390" y="347" font-size="7" class="text-primary">Same IP voting same content</text>
  <text x="580" y="347" text-anchor="end" font-size="7" class="highlight-red">🚩 Flag</text>
  
  <rect x="375" y="360" width="250" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="390" y="377" font-size="7" class="text-primary">Multiple accounts, same device</text>
  <text x="580" y="377" text-anchor="end" font-size="7" class="highlight-red">🚩 Flag</text>
  
  <rect x="375" y="390" width="250" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="390" y="407" font-size="7" class="text-primary">Coordinated voting pattern</text>
  <text x="580" y="407" text-anchor="end" font-size="7" class="highlight-red">🚩 Review</text>
  
  <text x="500" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Detects manipulation</text>
  
  <!-- Prevention Layers (Bottom Right) -->
  <rect x="680" y="260" width="300" height="170" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Defense in Depth</text>
  
  <rect x="700" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Layer 1 -->
  <rect x="715" y="315" width="230" height="20" rx="2" class="accent-box" stroke-width="1"/>
  <text x="830" y="329" text-anchor="middle" font-size="7" class="text-primary">Layer 1: Rate Limiting</text>
  
  <!-- Layer 2 -->
  <rect x="715" y="340" width="230" height="20" rx="2" class="accent-box" stroke-width="1"/>
  <text x="830" y="354" text-anchor="middle" font-size="7" class="text-primary">Layer 2: Account Age</text>
  
  <!-- Layer 3 -->
  <rect x="715" y="365" width="230" height="20" rx="2" class="accent-box" stroke-width="1"/>
  <text x="830" y="379" text-anchor="middle" font-size="7" class="text-primary">Layer 3: Karma Threshold</text>
  
  <!-- Layer 4 -->
  <rect x="715" y="390" width="230" height="20" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="830" y="404" text-anchor="middle" font-size="7" class="text-primary">Layer 4: IP/Device Tracking</text>
  
  <text x="830" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Multiple barriers</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
