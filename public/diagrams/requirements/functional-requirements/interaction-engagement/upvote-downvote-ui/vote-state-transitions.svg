<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      .highlight-orange { fill: #ed8936; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="1000" height="450" class="bg-base"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Vote State Transitions</text>
  
  <rect x="20" y="70" width="200" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="120" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">No Vote</text>
  <rect x="40" y="110" width="160" height="115" rx="3" class="box-base" stroke-width="1"/>
  <rect x="55" y="125" width="50" height="40" rx="2" class="box-base" stroke-width="2"/>
  <text x="80" y="148" text-anchor="middle" font-size="16" class="text-secondary">▲</text>
  <text x="120" y="148" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">0</text>
  <rect x="55" y="170" width="50" height="40" rx="2" class="box-base" stroke-width="2"/>
  <text x="80" y="193" text-anchor="middle" font-size="16" class="text-secondary">▼</text>
  <text x="120" y="245" text-anchor="middle" font-size="9" class="text-secondary">Gray outlines</text>
  
  <line x1="220" y1="155" x2="280" y2="155" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="250" y="145" text-anchor="middle" font-size="8" class="highlight-green">+1</text>
  
  <rect x="280" y="70" width="200" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="380" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Upvoted</text>
  <rect x="300" y="110" width="160" height="115" rx="3" class="box-base" stroke-width="1"/>
  <rect x="315" y="125" width="50" height="40" rx="2" class="highlight-orange" stroke-width="2"/>
  <text x="340" y="148" text-anchor="middle" font-size="16" class="text-primary">▲</text>
  <text x="380" y="148" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">1</text>
  <rect x="315" y="170" width="50" height="40" rx="2" class="box-base" stroke-width="2"/>
  <text x="340" y="193" text-anchor="middle" font-size="16" class="text-secondary">▼</text>
  <text x="380" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Filled orange</text>
  
  <line x1="480" y1="155" x2="540" y2="155" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="510" y="145" text-anchor="middle" font-size="8" class="highlight-red">-1</text>
  
  <rect x="540" y="70" width="200" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">No Vote</text>
  <rect x="560" y="110" width="160" height="115" rx="3" class="box-base" stroke-width="1"/>
  <rect x="575" y="125" width="50" height="40" rx="2" class="box-base" stroke-width="2"/>
  <text x="600" y="148" text-anchor="middle" font-size="16" class="text-secondary">▲</text>
  <text x="640" y="148" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">0</text>
  <rect x="575" y="170" width="50" height="40" rx="2" class="box-base" stroke-width="2"/>
  <text x="600" y="193" text-anchor="middle" font-size="16" class="text-secondary">▼</text>
  <text x="640" y="245" text-anchor="middle" font-size="9" class="text-secondary">Toggle off</text>
  
  <line x1="120" y1="240" x2="120" y2="280" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="135" y="260" text-anchor="start" font-size="8" class="highlight-red">-1</text>
  
  <rect x="20" y="280" width="200" height="150" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="120" y="305" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Downvoted</text>
  <rect x="40" y="320" width="160" height="95" rx="3" class="box-base" stroke-width="1"/>
  <rect x="55" y="335" width="50" height="40" rx="2" class="box-base" stroke-width="2"/>
  <text x="80" y="358" text-anchor="middle" font-size="16" class="text-secondary">▲</text>
  <text x="120" y="358" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">-1</text>
  <rect x="55" y="380" width="50" height="40" rx="2" class="highlight-blue" stroke-width="2"/>
  <text x="80" y="403" text-anchor="middle" font-size="16" class="text-primary">▼</text>
  <text x="120" y="445" text-anchor="middle" font-size="9" class="highlight-blue">✓ Filled blue</text>
  
  <line x1="220" y1="355" x2="280" y2="355" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="250" y="345" text-anchor="middle" font-size="8" class="highlight-green">+2</text>
  
  <rect x="280" y="280" width="200" height="150" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="380" y="305" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Switch to Up</text>
  <rect x="300" y="320" width="160" height="95" rx="3" class="box-base" stroke-width="1"/>
  <rect x="315" y="335" width="50" height="40" rx="2" class="highlight-orange" stroke-width="2"/>
  <text x="340" y="358" text-anchor="middle" font-size="16" class="text-primary">▲</text>
  <text x="380" y="358" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">1</text>
  <rect x="315" y="380" width="50" height="40" rx="2" class="box-base" stroke-width="2"/>
  <text x="340" y="403" text-anchor="middle" font-size="16" class="text-secondary">▼</text>
  <text x="380" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Score +2</text>
  
  <rect x="540" y="280" width="440" height="150" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="760" y="305" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Score Change Summary</text>
  <rect x="560" y="320" width="400" height="95" rx="3" class="box-base" stroke-width="1"/>
  <text x="575" y="340" font-size="8" font-weight="bold" class="text-primary">Transition</text>
  <text x="750" y="340" font-size="8" font-weight="bold" class="text-primary">Score Change</text>
  <line x1="570" y1="350" x2="950" y2="350" class="arrow" stroke-width="1"/>
  <text x="575" y="365" font-size="7" class="text-primary">None → Upvote</text>
  <text x="750" y="365" font-size="7" class="highlight-green">+1</text>
  <line x1="570" y1="375" x2="950" y2="375" class="arrow" stroke-width="1"/>
  <text x="575" y="390" font-size="7" class="text-primary">Upvote → None</text>
  <text x="750" y="390" font-size="7" class="highlight-red">-1</text>
  <line x1="570" y1="400" x2="950" y2="400" class="arrow" stroke-width="1"/>
  <text x="575" y="415" font-size="7" class="text-primary">Downvote → Upvote</text>
  <text x="750" y="415" font-size="7" class="highlight-green">+2</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>