<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-orange { fill: #ed8936; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Sorting Algorithms Comparison</text>
  
  <!-- Top Sorting (Top Left) -->
  <rect x="20" y="70" width="220" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Top (Highest Score)</text>
  
  <rect x="40" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Content items sorted by score -->
  <rect x="55" y="125" width="150" height="28" rx="2" class="highlight-orange" stroke-width="1"/>
  <text x="70" y="142" font-size="8" font-weight="bold" class="text-primary">1. Post A</text>
  <text x="180" y="142" text-anchor="end" font-size="8" class="highlight-green">+5.2K</text>
  
  <rect x="55" y="158" width="150" height="28" rx="2" class="accent-box" stroke-width="1"/>
  <text x="70" y="175" font-size="8" font-weight="bold" class="text-primary">2. Post B</text>
  <text x="180" y="175" text-anchor="end" font-size="8" class="highlight-green">+3.8K</text>
  
  <rect x="55" y="191" width="150" height="28" rx="2" class="box-base" stroke-width="1"/>
  <text x="70" y="208" font-size="8" font-weight="bold" class="text-primary">3. Post C</text>
  <text x="180" y="208" text-anchor="end" font-size="8" class="highlight-green">+2.1K</text>
  
  <text x="130" y="245" text-anchor="middle" font-size="9" class="highlight-purple">⚠ Old content dominates</text>
  
  <!-- Hot Sorting (Top Center) -->
  <rect x="260" y="70" width="220" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="370" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Hot (Time-Decayed)</text>
  
  <rect x="280" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Content items sorted by hot -->
  <rect x="295" y="125" width="150" height="28" rx="2" class="highlight-orange" stroke-width="1"/>
  <text x="310" y="142" font-size="8" font-weight="bold" class="text-primary">1. Post D (New)</text>
  <text x="420" y="142" text-anchor="end" font-size="8" class="highlight-green">+800</text>
  
  <rect x="295" y="158" width="150" height="28" rx="2" class="accent-box" stroke-width="1"/>
  <text x="310" y="175" font-size="8" font-weight="bold" class="text-primary">2. Post A (Old)</text>
  <text x="420" y="175" text-anchor="end" font-size="8" class="highlight-green">+5.2K</text>
  
  <rect x="295" y="191" width="150" height="28" rx="2" class="box-base" stroke-width="1"/>
  <text x="310" y="208" font-size="8" font-weight="bold" class="text-primary">3. Post E (New)</text>
  <text x="420" y="208" text-anchor="end" font-size="8" class="highlight-green">+650</text>
  
  <text x="370" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ New content surfaces</text>
  
  <!-- Controversial Sorting (Top Right) -->
  <rect x="500" y="70" width="240" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="620" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Controversial</text>
  
  <rect x="520" y="110" width="200" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Content items sorted by controversy -->
  <rect x="535" y="125" width="170" height="28" rx="2" class="highlight-red" stroke-width="1"/>
  <text x="550" y="142" font-size="8" font-weight="bold" class="text-primary">1. Post F</text>
  <text x="680" y="142" text-anchor="end" font-size="8">↑2.5K ↓2.3K</text>
  
  <rect x="535" y="158" width="170" height="28" rx="2" class="accent-box" stroke-width="1"/>
  <text x="550" y="175" font-size="8" font-weight="bold" class="text-primary">2. Post G</text>
  <text x="680" y="175" text-anchor="end" font-size="8">↑1.8K ↓1.5K</text>
  
  <rect x="535" y="191" width="170" height="28" rx="2" class="box-base" stroke-width="1"/>
  <text x="550" y="208" font-size="8" font-weight="bold" class="text-primary">3. Post H</text>
  <text x="680" y="208" text-anchor="end" font-size="8">↑900 ↓850</text>
  
  <text x="620" y="245" text-anchor="middle" font-size="9" class="highlight-purple">⚠ Heated debates</text>
  
  <!-- Wilson Score (Bottom Left) -->
  <rect x="20" y="260" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Wilson Score Confidence</text>
  
  <rect x="40" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Wilson formula -->
  <text x="55" y="320" font-size="9" font-weight="bold" class="text-primary">Formula:</text>
  <rect x="55" y="330" width="230" height="50" rx="2" class="accent-box" stroke-width="1"/>
  <text x="170" y="350" text-anchor="middle" font-size="8" class="text-primary">(p̂ + z²/2n - z√(p̂(1-p̂)/n + z²/4n²)) / (1 + z²/n)</text>
  <text x="170" y="370" text-anchor="middle" font-size="7" class="text-secondary">p̂ = upvotes/total, n = total, z = 1.96</text>
  
  <!-- Example -->
  <text x="55" y="395" font-size="8" font-weight="bold" class="text-primary">Example:</text>
  <text x="55" y="410" font-size="7" class="text-secondary">99/100 (99%) vs 1/1 (100%)</text>
  <text x="55" y="425" font-size="7" class="highlight-green">99/100 ranks higher (more confident)</text>
  
  <text x="170" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Statistically sound</text>
  
  <!-- Sorting Comparison (Bottom Center) -->
  <rect x="340" y="260" width="320" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Algorithm Comparison</text>
  
  <rect x="360" y="300" width="280" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Header -->
  <text x="375" y="320" font-size="8" font-weight="bold" class="text-primary">Algorithm</text>
  <text x="500" y="320" font-size="8" font-weight="bold" class="text-primary">Best For</text>
  <text x="600" y="320" font-size="8" font-weight="bold" class="text-primary">Risk</text>
  
  <!-- Row 1 -->
  <line x1="370" y1="330" x2="630" y2="330" class="arrow" stroke-width="1"/>
  <text x="375" y="345" font-size="7" class="text-primary">Top</text>
  <text x="500" y="345" font-size="7" class="text-secondary">All-time best</text>
  <text x="600" y="345" font-size="7" class="highlight-red">Old dominates</text>
  
  <!-- Row 2 -->
  <line x1="370" y1="355" x2="630" y2="355" class="arrow" stroke-width="1"/>
  <text x="375" y="370" font-size="7" class="text-primary">Hot</text>
  <text x="500" y="370" font-size="7" class="highlight-green">Homepage</text>
  <text x="600" y="370" font-size="7" class="text-secondary">Quality varies</text>
  
  <!-- Row 3 -->
  <line x1="370" y1="380" x2="630" y2="380" class="arrow" stroke-width="1"/>
  <text x="375" y="395" font-size="7" class="text-primary">Controversial</text>
  <text x="500" y="395" font-size="7" class="text-secondary">Debated topics</text>
  <text x="600" y="395" font-size="7" class="highlight-purple">Conflict</text>
  
  <!-- Row 4 -->
  <line x1="370" y1="405" x2="630" y2="405" class="arrow" stroke-width="1"/>
  <text x="375" y="420" font-size="7" class="text-primary">Wilson</text>
  <text x="500" y="420" font-size="7" class="highlight-green">Comments</text>
  <text x="600" y="420" font-size="7" class="text-secondary">Complex</text>
  
  <!-- Reddit Hot Formula (Bottom Right) -->
  <rect x="680" y="260" width="300" height="170" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Reddit Hot Algorithm</text>
  
  <rect x="700" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Formula -->
  <text x="715" y="320" font-size="9" font-weight="bold" class="text-primary">Score =</text>
  <rect x="715" y="330" width="230" height="70" rx="2" class="accent-box" stroke-width="1"/>
  <text x="830" y="355" text-anchor="middle" font-size="8" class="text-primary">log10(votes)</text>
  <text x="830" y="375" text-anchor="middle" font-size="8" class="text-primary">+ (created_at - epoch) / 45000</text>
  
  <text x="830" y="420" text-anchor="middle" font-size="8" class="highlight-purple">45000 = decay factor</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
