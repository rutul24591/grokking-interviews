<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#bgGrad6)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Reaction State Transitions</text>
  
  <!-- Unreacted State -->
  <rect x="50" y="80" width="180" height="100" rx="8" fill="#94a3b8"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Unreacted</text>
  <text x="140" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Outline Icon</text>
  <text x="140" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Gray Color</text>
  <text x="140" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">"React" Label</text>
  
  <!-- Reacted State -->
  <rect x="280" y="80" width="180" height="100" rx="8" fill="#ec4899"/>
  <text x="370" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Reacted</text>
  <text x="370" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Filled Icon</text>
  <text x="370" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Emoji Color</text>
  <text x="370" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Count +1</text>
  
  <!-- Changing State -->
  <rect x="510" y="80" width="180" height="100" rx="8" fill="#f59e0b"/>
  <text x="600" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Changing</text>
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Animation</text>
  <text x="600" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Decrement Old</text>
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Increment New</text>
  
  <!-- Removed State -->
  <rect x="740" y="80" width="180" height="100" rx="8" fill="#64748b"/>
  <text x="830" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Removed</text>
  <text x="830" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Outline Icon</text>
  <text x="830" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Count -1</text>
  <text x="830" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">DB Delete</text>
  
  <!-- Transition Arrows -->
  <path d="M 230 130 L 275 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="275,130 265,125 265,135" fill="#64748b"/>
  <text x="252" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Select</text>
  
  <path d="M 275 180 L 230 180" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <polygon points="230,180 240,175 240,185" fill="#64748b"/>
  <text x="245" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Remove</text>
  
  <path d="M 460 130 L 505 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="505,130 495,125 495,135" fill="#64748b"/>
  <text x="482" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Change</text>
  
  <path d="M 690 130 L 735 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="735,130 725,125 725,135" fill="#64748b"/>
  <text x="712" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Remove</text>
  
  <!-- Score Change Labels -->
  <rect x="280" y="220" width="180" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Score Changes</text>
  <text x="370" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#92400e">New Reaction: +1</text>
  
  <rect x="510" y="220" width="180" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Change Reaction</text>
  <text x="600" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#92400e">Old -1, New +1 (Net: 0)</text>
  
  <rect x="740" y="220" width="180" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="830" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Remove Reaction</text>
  <text x="830" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#92400e">Count: -1</text>
  
  <!-- API Flow -->
  <rect x="200" y="320" width="600" height="100" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="500" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">API Flow (Optimistic Update)</text>
  <text x="350" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">1. Update UI immediately</text>
  <text x="500" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">2. Send API request</text>
  <text x="650" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">3. On success: clear pending</text>
  <text x="350" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">4. On failure: revert UI</text>
  <text x="500" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">5. Show error with retry</text>
  <text x="650" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">6. Update Redis counters</text>
  
  <!-- Legend -->
  <rect x="50" y="320" width="130" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="115" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">State Legend</text>
  <rect x="65" y="355" width="20" height="15" fill="#94a3b8"/>
  <text x="90" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Initial</text>
  <rect x="65" y="375" width="20" height="15" fill="#ec4899"/>
  <text x="90" y="387" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Active</text>
  <rect x="65" y="395" width="20" height="15" fill="#f59e0b"/>
  <text x="90" y="407" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Transition</text>
</svg>
