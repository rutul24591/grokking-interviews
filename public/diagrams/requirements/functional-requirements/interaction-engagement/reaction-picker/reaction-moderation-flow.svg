<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="bgGrad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#bgGrad8)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Reaction Moderation Flow</text>
  
  <!-- Reaction Submit -->
  <rect x="50" y="70" width="150" height="80" rx="8" fill="#ec4899"/>
  <text x="125" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Reaction Submit</text>
  <text x="125" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">User selects emoji</text>
  
  <!-- Rate Limit Check -->
  <rect x="250" y="70" width="150" height="80" rx="8" fill="#8b5cf6"/>
  <text x="325" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Rate Limit</text>
  <text x="325" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">50-100/min</text>
  <text x="325" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Per user</text>
  
  <!-- Pattern Detection -->
  <rect x="450" y="70" width="150" height="80" rx="8" fill="#f59e0b"/>
  <text x="525" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Pattern Check</text>
  <text x="525" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">Timing Analysis</text>
  <text x="525" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">Bot Detection</text>
  
  <!-- Store Reaction -->
  <rect x="650" y="70" width="150" height="80" rx="8" fill="#10b981"/>
  <text x="725" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Store Reaction</text>
  <text x="725" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Redis + Database</text>
  
  <!-- Broadcast -->
  <rect x="850" y="70" width="100" height="80" rx="8" fill="#3b82f6"/>
  <text x="900" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Broadcast</text>
  <text x="900" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">Real-time</text>
  
  <!-- Abuse Detection -->
  <rect x="250" y="200" width="180" height="100" rx="8" fill="#ef4444"/>
  <text x="340" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Abuse Detection</text>
  <text x="340" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Rapid Fire Reactions</text>
  <text x="340" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Same Emoji Spam</text>
  <text x="340" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Bot Patterns</text>
  
  <!-- Enforcement -->
  <rect x="500" y="200" width="200" height="100" rx="8" fill="#7c3aed"/>
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Enforcement Actions</text>
  <text x="600" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Ignore Reaction</text>
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Remove Count</text>
  <text x="600" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Account Warning</text>
  
  <!-- Notification -->
  <rect x="750" y="200" width="200" height="100" rx="8" fill="#f97316"/>
  <text x="850" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Notification</text>
  <text x="850" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Batch Reactions</text>
  <text x="850" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">"John and 9 others"</text>
  <text x="850" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Respect Preferences</text>
  
  <!-- Arrows -->
  <path d="M 200 110 L 245 110" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="245,110 235,105 235,115" fill="#64748b"/>
  
  <path d="M 400 110 L 445 110" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="445,110 435,105 435,115" fill="#64748b"/>
  
  <path d="M 600 110 L 645 110" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="645,110 635,105 635,115" fill="#64748b"/>
  
  <path d="M 800 110 L 845 110" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="845,110 835,105 835,115" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 325 150 L 325 195" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 525 150 L 525 195 L 600 195 L 600 195" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <path d="M 725 150 L 725 180 L 850 180 L 850 195" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Legend -->
  <rect x="50" y="340" width="900" height="90" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Moderation Pipeline</text>
  
  <circle cx="100" cy="390" r="8" fill="#8b5cf6"/>
  <text x="120" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Rate limit prevents spam reactions</text>
  
  <circle cx="400" cy="390" r="8" fill="#f59e0b"/>
  <text x="420" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Pattern detection identifies bot behavior</text>
  
  <circle cx="700" cy="390" r="8" fill="#ef4444"/>
  <text x="720" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Abuse detection triggers enforcement</text>
  
  <circle cx="150" cy="415" r="8" fill="#f97316"/>
  <text x="170" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Notifications batched to reduce fatigue</text>
</svg>
