<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#bgGrad5)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Reaction Picker Architecture</text>
  
  <!-- Client Picker -->
  <rect x="50" y="70" width="180" height="120" rx="8" fill="#ec4899"/>
  <text x="140" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Client Picker</text>
  <text x="140" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Long-press/Hover</text>
  <text x="140" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Emoji Display</text>
  <text x="140" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Animation</text>
  <text x="140" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Haptic Feedback</text>
  
  <!-- API Layer -->
  <rect x="280" y="70" width="180" height="120" rx="8" fill="#8b5cf6"/>
  <text x="370" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">API Layer</text>
  <text x="370" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Validate Reaction</text>
  <text x="370" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Rate Limiting</text>
  <text x="370" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Idempotency</text>
  <text x="370" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Upsert Operation</text>
  
  <!-- Real-time Sync -->
  <rect x="510" y="70" width="180" height="120" rx="8" fill="#f59e0b"/>
  <text x="600" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Real-time Sync</text>
  <text x="600" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">WebSocket Push</text>
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Presence Tracking</text>
  <text x="600" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Event Broadcasting</text>
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Reconnection</text>
  
  <!-- Storage -->
  <rect x="740" y="70" width="180" height="120" rx="8" fill="#10b981"/>
  <text x="830" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Storage</text>
  <text x="830" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Reactions Table</text>
  <text x="830" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Redis Counters</text>
  <text x="830" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Count Sharding</text>
  <text x="830" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Async Flush</text>
  
  <!-- Notification Service -->
  <rect x="150" y="240" width="200" height="90" rx="8" fill="#f97316"/>
  <text x="250" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Notification Service</text>
  <text x="250" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Batch Reactions</text>
  <text x="250" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Push Notifications</text>
  <text x="250" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Preference Check</text>
  
  <!-- Analytics -->
  <rect x="400" y="240" width="180" height="90" rx="8" fill="#06b6d4"/>
  <text x="490" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Analytics</text>
  <text x="490" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Reaction Distribution</text>
  <text x="490" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Engagement Rate</text>
  <text x="490" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Sentiment Analysis</text>
  
  <!-- Display Layer -->
  <rect x="630" y="240" width="220" height="90" rx="8" fill="#3b82f6"/>
  <text x="740" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Display Layer</text>
  <text x="740" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Count Aggregation</text>
  <text x="740" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Social Proof Display</text>
  <text x="740" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">User Reaction Highlight</text>
  
  <!-- Arrows -->
  <path d="M 230 130 L 275 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="275,130 265,125 265,135" fill="#64748b"/>
  
  <path d="M 460 130 L 505 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="505,130 495,125 495,135" fill="#64748b"/>
  
  <path d="M 690 130 L 735 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="735,130 725,125 725,135" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 370 190 L 370 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 600 190 L 600 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 740 190 L 740 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Event flow -->
  <path d="M 830 190 L 830 220 L 740 220 L 740 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Legend -->
  <rect x="50" y="370" width="900" height="110" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Reaction Flow</text>
  
  <circle cx="100" cy="420" r="8" fill="#ec4899"/>
  <text x="120" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">User long-presses like button, picker appears</text>
  
  <circle cx="450" cy="420" r="8" fill="#8b5cf6"/>
  <text x="470" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">API validates and stores reaction atomically</text>
  
  <circle cx="100" cy="450" r="8" fill="#f59e0b"/>
  <text x="120" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Real-time sync broadcasts to other viewers</text>
  
  <circle cx="450" cy="450" r="8" fill="#10b981"/>
  <text x="470" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Redis counters updated, async flush to database</text>
  
  <circle cx="750" cy="450" r="8" fill="#f97316"/>
  <text x="770" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Notification sent to content creator (batched)</text>
</svg>
