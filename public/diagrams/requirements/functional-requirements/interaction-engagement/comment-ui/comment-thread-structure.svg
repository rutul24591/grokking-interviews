<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Comment Thread Structure</text>
  
  <!-- Flat Comments (Top Left) -->
  <rect x="20" y="70" width="220" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Flat Comments</text>
  
  <rect x="40" y="110" width="180" height="145" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Flat comment items -->
  <rect x="55" y="125" width="150" height="35" rx="2" class="box-base" stroke-width="1"/>
  <text x="70" y="140" font-size="8" font-weight="bold" class="text-primary">User 1</text>
  <text x="70" y="155" font-size="7" class="text-secondary">Great post!</text>
  
  <rect x="55" y="165" width="150" height="35" rx="2" class="box-base" stroke-width="1"/>
  <text x="70" y="180" font-size="8" font-weight="bold" class="text-primary">User 2</text>
  <text x="70" y="195" font-size="7" class="text-secondary">Totally agree</text>
  
  <rect x="55" y="205" width="150" height="35" rx="2" class="box-base" stroke-width="1"/>
  <text x="70" y="220" font-size="8" font-weight="bold" class="text-primary">User 3</text>
  <text x="70" y="235" font-size="7" class="text-secondary">Thanks for sharing</text>
  
  <text x="130" y="285" text-anchor="middle" font-size="9" class="highlight-purple">⚠ No conversations</text>
  <text x="130" y="300" text-anchor="middle" font-size="9" class="text-secondary">Used by: Instagram</text>
  
  <!-- 1-Level Nesting (Top Center) -->
  <rect x="260" y="70" width="220" height="200" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="370" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">1-Level Nesting</text>
  
  <rect x="280" y="110" width="180" height="145" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Parent comment -->
  <rect x="295" y="125" width="150" height="35" rx="2" class="accent-box" stroke-width="1"/>
  <text x="310" y="140" font-size="8" font-weight="bold" class="text-primary">User 1</text>
  <text x="310" y="155" font-size="7" class="text-secondary">Great post!</text>
  
  <!-- Replies -->
  <line x1="310" y1="165" x2="310" y2="175" class="arrow" stroke-width="1"/>
  <rect x="325" y="175" width="105" height="28" rx="2" class="box-base" stroke-width="1"/>
  <text x="340" y="190" font-size="7" font-weight="bold" class="text-primary">User 2</text>
  <text x="340" y="200" font-size="6" class="text-secondary">Thanks!</text>
  
  <line x1="310" y1="175" x2="310" y2="213" class="arrow" stroke-width="1"/>
  <rect x="325" y="213" width="105" height="28" rx="2" class="box-base" stroke-width="1"/>
  <text x="340" y="228" font-size="7" font-weight="bold" class="text-primary">User 3</text>
  <text x="340" y="238" font-size="6" class="text-secondary">Agreed!</text>
  
  <text x="370" y="285" text-anchor="middle" font-size="9" class="highlight-green">✓ Simple replies</text>
  <text x="370" y="300" text-anchor="middle" font-size="9" class="text-secondary">Used by: YouTube</text>
  
  <!-- 2-3 Level Nesting (Top Right) -->
  <rect x="500" y="70" width="240" height="200" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="620" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">2-3 Level Nesting</text>
  
  <rect x="520" y="110" width="200" height="145" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Parent -->
  <rect x="535" y="125" width="170" height="35" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="550" y="140" font-size="8" font-weight="bold" class="text-primary">User 1</text>
  <text x="550" y="155" font-size="7" class="text-secondary">Great post!</text>
  
  <!-- Level 1 reply -->
  <line x1="550" y1="165" x2="550" y2="175" class="arrow" stroke-width="1"/>
  <rect x="565" y="175" width="125" height="28" rx="2" class="accent-box" stroke-width="1"/>
  <text x="580" y="190" font-size="7" font-weight="bold" class="text-primary">User 2</text>
  <text x="580" y="200" font-size="6" class="text-secondary">Thanks!</text>
  
  <!-- Level 2 reply -->
  <line x1="580" y1="203" x2="580" y2="213" class="arrow" stroke-width="1"/>
  <rect x="595" y="213" width="95" height="28" rx="2" class="box-base" stroke-width="1"/>
  <text x="610" y="228" font-size="7" font-weight="bold" class="text-primary">User 3</text>
  <text x="610" y="238" font-size="6" class="text-secondary">Same here</text>
  
  <!-- Level 3 reply (collapsed) -->
  <line x1="610" y1="241" x2="610" y2="251" class="arrow" stroke-width="1"/>
  <rect x="625" y="251" width="65" height="20" rx="2" class="box-base" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="657" y="265" text-anchor="middle" font-size="6" class="highlight-purple">+2 more</text>
  
  <text x="620" y="285" text-anchor="middle" font-size="9" class="highlight-green">✓ Real conversations</text>
  <text x="620" y="300" text-anchor="middle" font-size="9" class="text-secondary">Used by: Reddit</text>
  
  <!-- Collapsed Deep Threads (Bottom Left) -->
  <rect x="20" y="290" width="300" height="190" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="315" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Collapsed Deep Threads</text>
  
  <rect x="40" y="330" width="260" height="135" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Thread with collapse -->
  <rect x="55" y="345" width="230" height="35" rx="2" class="box-base" stroke-width="1"/>
  <text x="70" y="360" font-size="8" font-weight="bold" class="text-primary">User 1</text>
  <text x="70" y="375" font-size="7" class="text-secondary">Original comment</text>
  
  <!-- Indentation lines -->
  <line x1="85" y1="385" x2="85" y2="425" class="arrow" stroke-width="1"/>
  <line x1="100" y1="385" x2="100" y2="425" class="arrow" stroke-width="1"/>
  <line x1="115" y1="385" x2="115" y2="425" class="arrow" stroke-width="1"/>
  
  <!-- Collapsed indicator -->
  <rect x="85" y="425" width="150" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="160" y="442" text-anchor="middle" font-size="8" class="highlight-purple">▶ Show 5 more replies</text>
  
  <text x="170" y="495" text-anchor="middle" font-size="9" class="highlight-green">✓ Clean UX</text>
  
  <!-- Indentation Visual (Bottom Center) -->
  <rect x="340" y="290" width="320" height="190" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="315" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Indentation Visual</text>
  
  <rect x="360" y="330" width="280" height="135" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Indentation levels -->
  <text x="375" y="350" font-size="9" font-weight="bold" class="text-primary">Level 0</text>
  <rect x="375" y="355" width="250" height="20" rx="1" class="box-base" stroke-width="1"/>
  
  <text x="375" y="385" font-size="9" font-weight="bold" class="text-primary">Level 1</text>
  <line x1="390" y1="390" x2="390" y2="410" class="highlight-blue" stroke-width="2"/>
  <rect x="405" y="390" width="220" height="20" rx="1" class="accent-box" stroke-width="1"/>
  
  <text x="375" y="420" font-size="9" font-weight="bold" class="text-primary">Level 2</text>
  <line x1="390" y1="425" x2="390" y2="445" class="highlight-blue" stroke-width="2"/>
  <line x1="405" y1="425" x2="405" y2="445" class="highlight-blue" stroke-width="2"/>
  <rect x="420" y="425" width="190" height="20" rx="1" class="box-base" stroke-width="1"/>
  
  <text x="500" y="495" text-anchor="middle" font-size="9" class="highlight-blue">15-20px indent per level</text>
  
  <!-- Depth Limit Warning (Bottom Right) -->
  <rect x="680" y="290" width="300" height="190" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="315" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Depth Limit Recommendation</text>
  
  <rect x="700" y="330" width="260" height="135" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="715" y="350" font-size="9" font-weight="bold" class="text-primary">Recommended:</text>
  <rect x="715" y="360" width="100" height="25" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="765" y="377" text-anchor="middle" font-size="8" class="text-primary">2-3 levels</text>
  
  <text x="715" y="395" font-size="8" class="text-secondary">• Readable threads</text>
  <text x="715" y="410" font-size="8" class="text-secondary">• Enables conversations</text>
  <text x="715" y="425" font-size="8" class="text-secondary">• Mobile-friendly</text>
  
  <text x="850" y="395" font-size="8" class="highlight-purple">⚠ Avoid:</text>
  <text x="850" y="410" font-size="8" class="text-secondary">Unlimited depth</text>
  <text x="850" y="425" font-size="8" class="text-secondary">(Hacker News style)</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
