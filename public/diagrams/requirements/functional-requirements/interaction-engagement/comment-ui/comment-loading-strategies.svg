<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Comment Loading Strategies</text>
  
  <!-- Initial Fetch (Top Left) -->
  <rect x="20" y="70" width="220" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Initial Fetch</text>
  
  <rect x="40" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Skeleton loaders -->
  <rect x="55" y="125" width="150" height="50" rx="2" class="box-base" stroke-width="1">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="55" y="180" width="150" height="50" rx="2" class="box-base" stroke-width="1">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  
  <text x="130" y="245" text-anchor="middle" font-size="9" class="text-secondary">Load 20-50 comments</text>
  <text x="130" y="260" text-anchor="middle" font-size="9" class="highlight-green">✓ Show skeletons</text>
  
  <!-- Lazy Load Replies (Top Center) -->
  <rect x="260" y="70" width="220" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="370" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Lazy Load Replies</text>
  
  <rect x="280" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Parent comment loaded -->
  <rect x="295" y="125" width="150" height="35" rx="2" class="accent-box" stroke-width="1"/>
  <text x="310" y="140" font-size="8" font-weight="bold" class="text-primary">Parent Comment</text>
  
  <!-- Expand button -->
  <rect x="310" y="165" width="120" height="20" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="370" y="179" text-anchor="middle" font-size="7" class="highlight-purple">▶ Show 5 replies</text>
  
  <!-- Loading spinner on expand -->
  <circle cx="370" cy="205" r="10" fill="none" class="highlight-blue" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="0 370 205" to="360 370 205" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <text x="370" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ On demand</text>
  <text x="370" y="260" text-anchor="middle" font-size="9" class="text-secondary">Reduces payload</text>
  
  <!-- Pagination (Top Right) -->
  <rect x="500" y="70" width="240" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="620" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Pagination</text>
  
  <rect x="520" y="110" width="200" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Comment list -->
  <rect x="535" y="125" width="170" height="70" rx="2" class="box-base" stroke-width="1"/>
  <text x="550" y="140" font-size="7" class="text-secondary">Comment 1</text>
  <text x="550" y="155" font-size="7" class="text-secondary">Comment 2</text>
  <text x="550" y="170" font-size="7" class="text-secondary">...</text>
  <text x="550" y="185" font-size="7" class="text-secondary">Comment 20</text>
  
  <!-- Load more button -->
  <rect x="560" y="200" width="120" height="25" rx="3" class="accent-box" stroke-width="1.5"/>
  <text x="620" y="217" text-anchor="middle" font-size="8" font-weight="bold" class="text-primary">Load More</text>
  
  <text x="620" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Cursor-based</text>
  <text x="620" y="260" text-anchor="middle" font-size="9" class="text-secondary">Append to list</text>
  
  <!-- Real-time Updates (Bottom Left) -->
  <rect x="20" y="260" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="285" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Real-time Updates</text>
  
  <rect x="40" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- New comment banner -->
  <rect x="55" y="315" width="230" height="35" rx="2" class="accent-box" stroke-width="1.5"/>
  <text x="170" y="335" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">5 new comments</text>
  <rect x="245" y="322" width="30" height="20" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="260" y="336" text-anchor="middle" font-size="7" class="text-primary">View</text>
  
  <!-- Comment list -->
  <rect x="55" y="355" width="230" height="50" rx="2" class="box-base" stroke-width="1"/>
  <text x="70" y="370" font-size="7" class="text-secondary">Existing comments...</text>
  
  <text x="170" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Non-disruptive</text>
  
  <!-- Optimistic Post (Bottom Center) -->
  <rect x="340" y="260" width="320" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="285" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Optimistic Post</text>
  
  <rect x="360" y="300" width="280" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- User comment shown immediately -->
  <rect x="375" y="315" width="250" height="50" rx="2" class="highlight-green" stroke-width="1.5"/>
  <text x="390" y="330" font-size="8" font-weight="bold" class="text-primary">Your Comment</text>
  <text x="390" y="345" font-size="7" class="text-secondary">Great post! Thanks for</text>
  <text x="390" y="358" font-size="7" class="text-secondary">sharing this insight.</text>
  <text x="610" y="340" text-anchor="middle" font-size="10" class="highlight-green">✓</text>
  
  <!-- Syncing indicator -->
  <rect x="375" y="370" width="100" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="425" y="384" text-anchor="middle" font-size="7" class="highlight-purple">Syncing...</text>
  
  <text x="500" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Instant feedback</text>
  
  <!-- Loading Strategy Comparison (Bottom Right) -->
  <rect x="680" y="260" width="300" height="170" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="285" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Strategy Comparison</text>
  
  <rect x="700" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Header -->
  <text x="715" y="320" font-size="8" font-weight="bold" class="text-primary">Strategy</text>
  <text x="850" y="320" font-size="8" font-weight="bold" class="text-primary">Use Case</text>
  
  <!-- Row 1 -->
  <line x1="710" y1="330" x2="950" y2="330" class="arrow" stroke-width="1"/>
  <text x="715" y="345" font-size="7" class="text-primary">Initial Fetch</text>
  <text x="850" y="345" font-size="7" class="text-secondary">First load</text>
  
  <!-- Row 2 -->
  <line x1="710" y1="355" x2="950" y2="355" class="arrow" stroke-width="1"/>
  <text x="715" y="370" font-size="7" class="text-primary">Lazy Replies</text>
  <text x="850" y="370" font-size="7" class="text-secondary">On expand</text>
  
  <!-- Row 3 -->
  <line x1="710" y1="380" x2="950" y2="380" class="arrow" stroke-width="1"/>
  <text x="715" y="395" font-size="7" class="text-primary">Pagination</text>
  <text x="850" y="395" font-size="7" class="text-secondary">More comments</text>
  
  <!-- Row 4 -->
  <line x1="710" y1="405" x2="950" y2="405" class="arrow" stroke-width="1"/>
  <text x="715" y="420" font-size="7" class="text-primary">Real-time</text>
  <text x="850" y="420" font-size="7" class="text-secondary">New comments</text>
  
  <!-- Recommendation (Far Bottom) -->
  <rect x="20" y="450" width="960" height="60" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="500" y="475" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Recommendation: Combine all strategies for optimal performance</text>
  <text x="500" y="495" text-anchor="middle" font-size="9" class="text-secondary">Initial fetch + lazy replies + pagination + real-time updates</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
