<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="1000" height="500" class="bg-base"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Metrics Display Architecture</text>
  
  <!-- User Interaction -->
  <rect x="30" y="70" width="180" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="120" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">User Interaction</text>
  <rect x="50" y="110" width="140" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="70" y="130" font-size="9" class="text-primary">• Like/View/Share</text>
  <text x="70" y="148" font-size="9" class="text-primary">• API call</text>
  
  <line x1="210" y1="120" x2="250" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Counter Service -->
  <rect x="250" y="70" width="200" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="350" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Counter Service</text>
  <rect x="270" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="285" y="130" font-size="9" class="text-primary">• Redis INCR</text>
  <text x="285" y="148" font-size="9" class="text-secondary">• Async DB flush</text>
  
  <line x1="450" y1="120" x2="490" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Cache Layer -->
  <rect x="490" y="70" width="200" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="590" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Cache Layer</text>
  <rect x="510" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="525" y="130" font-size="9" class="text-primary">• CDN edge cache</text>
  <text x="525" y="148" font-size="9" class="text-secondary">• TTL: 30s-5min</text>
  
  <line x1="690" y1="120" x2="730" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Display -->
  <rect x="730" y="70" width="240" height="100" rx="5" class="highlight-green" stroke-width="2"/>
  <text x="850" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Client Display</text>
  <rect x="750" y="110" width="200" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="765" y="130" font-size="9" class="text-primary">• Abbreviated counts</text>
  <text x="765" y="148" font-size="9" class="text-secondary">• Real-time updates</text>
  
  <!-- Real-time Updates -->
  <line x1="590" y1="170" x2="590" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="490" y="210" width="200" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="590" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Real-time Updates</text>
  <rect x="510" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="525" y="270" font-size="9" class="text-primary">• WebSocket push</text>
  <text x="525" y="288" font-size="9" class="text-primary">• Optimistic updates</text>
  <text x="525" y="306" font-size="9" class="highlight-green">✓ Instant feedback</text>
  
  <!-- Privacy Controls -->
  <line x1="490" y1="270" x2="450" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="250" y="210" width="200" height="120" rx="5" class="highlight-purple" stroke-width="2"/>
  <text x="350" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Privacy Controls</text>
  <rect x="270" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="285" y="270" font-size="9" class="text-primary">• Public vs private</text>
  <text x="285" y="288" font-size="9" class="text-primary">• Opt-out settings</text>
  <text x="285" y="306" font-size="9" class="highlight-purple">⚠ Respect preferences</text>
  
  <!-- Analytics Pipeline -->
  <line x1="250" y1="270" x2="210" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="30" y="210" width="180" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="120" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Analytics DB</text>
  <rect x="50" y="250" width="140" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="70" y="270" font-size="9" class="text-primary">• Aggregated data</text>
  <text x="70" y="288" font-size="9" class="text-primary">• Historical trends</text>
  <text x="70" y="306" font-size="9" class="highlight-green">✓ Creator analytics</text>
  
  <!-- Abbreviation Logic -->
  <rect x="30" y="350" width="940" height="130" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="500" y="375" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Abbreviation Logic</text>
  
  <rect x="50" y="390" width="270" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="185" y="410" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Threshold Rules</text>
  <text x="185" y="430" text-anchor="middle" font-size="8" class="text-primary">1,000+ → K (thousands)</text>
  <text x="185" y="445" text-anchor="middle" font-size="8" class="text-primary">1,000,000+ → M (millions)</text>
  <text x="185" y="460" text-anchor="middle" font-size="8" class="text-primary">1,000,000,000+ → B (billions)</text>
  
  <rect x="340" y="390" width="270" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="475" y="410" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Precision Rules</text>
  <text x="475" y="430" text-anchor="middle" font-size="8" class="text-primary">1,234 → 1.2K (one decimal)</text>
  <text x="475" y="445" text-anchor="middle" font-size="8" class="text-primary">1,234,567 → 1.2M</text>
  <text x="475" y="460" text-anchor="middle" font-size="8" class="text-primary">Consistent precision</text>
  
  <rect x="630" y="390" width="270" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="765" y="410" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Localization</text>
  <text x="765" y="430" text-anchor="middle" font-size="8" class="text-primary">US: 1.2K, 1.2M</text>
  <text x="765" y="445" text-anchor="middle" font-size="8" class="text-primary">EU: 1,2K, 1,2M</text>
  <text x="765" y="460" text-anchor="middle" font-size="8" class="text-primary">IN: 1.2L, 1.2Cr</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>