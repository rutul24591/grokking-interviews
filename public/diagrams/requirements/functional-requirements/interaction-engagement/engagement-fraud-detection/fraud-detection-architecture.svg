<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="1000" height="500" class="bg-base"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Fraud Detection Architecture</text>
  
  <rect x="20" y="70" width="180" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="110" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Events</text>
  <rect x="40" y="110" width="140" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="130" font-size="9" class="text-primary">• Like, comment</text>
  <text x="55" y="148" font-size="9" class="text-primary">• Follow, share</text>
  
  <line x1="200" y1="120" x2="240" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="240" y="70" width="200" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="340" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Real-time Score</text>
  <rect x="260" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="130" font-size="9" class="text-primary">• Feature extraction</text>
  <text x="275" y="148" font-size="9" class="text-secondary">• ML inference</text>
  
  <line x1="440" y1="120" x2="520" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="480" y="110" text-anchor="middle" font-size="8" class="highlight-green">&lt;0.3</text>
  <text x="480" y="140" text-anchor="middle" font-size="8" class="highlight-purple">0.3-0.7</text>
  <text x="480" y="170" text-anchor="middle" font-size="8" class="highlight-red">&gt;0.7</text>
  
  <rect x="520" y="70" width="200" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="620" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Actions</text>
  <rect x="540" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="555" y="130" font-size="9" class="text-secondary">Pass/Review/Block</text>
  <text x="555" y="148" font-size="9" class="text-secondary">Based on score</text>
  
  <line x1="620" y1="170" x2="620" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="520" y="210" width="200" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="620" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Batch Analysis</text>
  <rect x="540" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="555" y="270" font-size="9" class="text-primary">• Network analysis</text>
  <text x="555" y="288" font-size="9" class="text-primary">• Pattern matching</text>
  <text x="555" y="306" font-size="9" class="highlight-purple">✓ Historical</text>
  
  <line x1="520" y1="270" x2="480" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <line x1="720" y1="270" x2="760" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="240" y="210" width="240" height="120" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="360" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Human Review</text>
  <rect x="260" y="250" width="200" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="270" font-size="9" class="text-primary">• Borderline cases</text>
  <text x="275" y="288" font-size="9" class="text-primary">• Appeals</text>
  <text x="275" y="306" font-size="9" class="highlight-green">✓ Training data</text>
  
  <rect x="760" y="210" width="220" height="120" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="870" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Enforcement</text>
  <rect x="780" y="250" width="180" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="870" y="270" text-anchor="middle" font-size="9" class="text-primary">• Remove engagement</text>
  <text x="870" y="288" text-anchor="middle" font-size="9" class="text-primary">• Account penalties</text>
  <text x="870" y="306" text-anchor="middle" font-size="9" class="highlight-red">✓ Action taken</text>
  
  <rect x="20" y="350" width="960" height="130" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="500" y="375" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Detection Flow</text>
  <rect x="40" y="390" width="920" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="410" font-size="9" class="text-primary">1. Engagement event → 2. Real-time scoring → 3. Route by score → 4. Batch analysis for patterns → 5. Human review for borderline → 6. Enforcement action → 7. Feedback to models</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>