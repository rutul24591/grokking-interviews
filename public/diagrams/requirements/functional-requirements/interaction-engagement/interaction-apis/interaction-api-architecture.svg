<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="bgGrad13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#bgGrad13)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Interaction API Architecture</text>
  
  <!-- API Gateway -->
  <rect x="30" y="70" width="170" height="120" rx="8" fill="#3b82f6"/>
  <text x="115" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">API Gateway</text>
  <text x="115" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Authentication</text>
  <text x="115" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Rate Limiting</text>
  <text x="115" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Request Logging</text>
  <text x="115" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Routing</text>
  
  <!-- Validation -->
  <rect x="250" y="70" width="170" height="120" rx="8" fill="#8b5cf6"/>
  <text x="335" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Validation</text>
  <text x="335" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Schema Check</text>
  <text x="335" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Idempotency</text>
  <text x="335" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Authorization</text>
  <text x="335" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Business Rules</text>
  
  <!-- Queue -->
  <rect x="470" y="70" width="170" height="120" rx="8" fill="#f59e0b"/>
  <text x="555" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Message Queue</text>
  <text x="555" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Kafka/RabbitMQ</text>
  <text x="555" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Buffer Spikes</text>
  <text x="555" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Ordering</text>
  <text x="555" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">7-30 day retention</text>
  
  <!-- Worker -->
  <rect x="690" y="70" width="170" height="120" rx="8" fill="#10b981"/>
  <text x="775" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Worker Service</text>
  <text x="775" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Database Write</text>
  <text x="775" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Counter Update</text>
  <text x="775" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Event Publish</text>
  <text x="775" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Retry Logic</text>
  
  <!-- Storage -->
  <rect x="30" y="240" width="200" height="100" rx="8" fill="#ec4899"/>
  <text x="130" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Database Storage</text>
  <text x="130" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">PostgreSQL/Cassandra</text>
  <text x="130" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Interaction Records</text>
  <text x="130" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Unique Constraints</text>
  
  <!-- Counter Cache -->
  <rect x="270" y="240" width="200" height="100" rx="8" fill="#f97316"/>
  <text x="370" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Counter Cache (Redis)</text>
  <text x="370" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Atomic INCR/DECR</text>
  <text x="370" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Sharded Counters</text>
  <text x="370" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Async Flush to DB</text>
  
  <!-- Event Publishing -->
  <rect x="510" y="240" width="200" height="100" rx="8" fill="#06b6d4"/>
  <text x="610" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Event Publishing</text>
  <text x="610" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Notifications</text>
  <text x="610" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Analytics</text>
  <text x="610" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Feed Ranking</text>
  
  <!-- Response -->
  <rect x="750" y="240" width="200" height="100" rx="8" fill="#6366f1"/>
  <text x="850" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Client Response</text>
  <text x="850" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">202 Accepted</text>
  <text x="850" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Optimistic Update</text>
  <text x="850" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Error Handling</text>
  
  <!-- Arrows -->
  <path d="M 200 130 L 245 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="245,130 235,125 235,135" fill="#64748b"/>
  
  <path d="M 420 130 L 465 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="465,130 455,125 455,135" fill="#64748b"/>
  
  <path d="M 640 130 L 685 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="685,130 675,125 675,135" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 115 190 L 115 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 335 190 L 335 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 555 190 L 555 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 775 190 L 775 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Legend -->
  <rect x="50" y="380" width="900" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Request Flow</text>
  
  <circle cx="100" cy="430" r="8" fill="#3b82f6"/>
  <text x="120" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Gateway authenticates and rate limits</text>
  
  <circle cx="380" cy="430" r="8" fill="#8b5cf6"/>
  <text x="400" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Validation checks idempotency and authorization</text>
  
  <circle cx="660" cy="430" r="8" fill="#f59e0b"/>
  <text x="680" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Queue buffers for async processing</text>
  
  <circle cx="150" cy="460" r="8" fill="#10b981"/>
  <text x="170" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Worker persists and publishes events</text>
</svg>
