<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#bgGrad3)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Rating Aggregation</text>
  
  <!-- Raw Reviews -->
  <rect x="30" y="70" width="140" height="100" rx="8" fill="#3b82f6"/>
  <text x="100" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Raw Reviews</text>
  <text x="100" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">5★: 150</text>
  <text x="100" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">4★: 80</text>
  <text x="100" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">3★: 30</text>
  <text x="100" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">2★: 10, 1★: 5</text>
  
  <!-- Filter -->
  <rect x="220" y="70" width="140" height="100" rx="8" fill="#8b5cf6"/>
  <text x="290" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Filter</text>
  <text x="290" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Exclude Flagged</text>
  <text x="290" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Verified Weight</text>
  <text x="290" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Time Decay</text>
  
  <!-- Bayesian Average -->
  <rect x="410" y="70" width="160" height="100" rx="8" fill="#f59e0b"/>
  <text x="490" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Bayesian Average</text>
  <text x="490" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">(sum + prior×weight)</text>
  <text x="490" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">(count + weight)</text>
  <text x="490" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">4.32 ★</text>
  
  <!-- Distribution -->
  <rect x="620" y="70" width="180" height="100" rx="8" fill="#10b981"/>
  <text x="710" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Distribution</text>
  <!-- Bar chart -->
  <rect x="635" y="105" width="150" height="12" rx="2" fill="#22c55e"/>
  <rect x="635" y="120" width="100" height="12" rx="2" fill="#4ade80"/>
  <rect x="635" y="135" width="50" height="12" rx="2" fill="#86efac"/>
  <rect x="635" y="150" width="20" height="12" rx="2" fill="#bbf7d0"/>
  <text x="790" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">5★</text>
  <text x="790" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">4★</text>
  <text x="790" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">3★</text>
  <text x="790" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">1-2★</text>
  
  <!-- Time Decay -->
  <rect x="850" y="70" width="120" height="100" rx="8" fill="#ec4899"/>
  <text x="910" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Time Decay</text>
  <text x="910" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">Recent = Higher</text>
  <text x="910" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">Weight</text>
  <text x="910" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">e^(-t/half-life)</text>
  
  <!-- Output -->
  <rect x="300" y="220" width="180" height="80" rx="8" fill="#06b6d4"/>
  <text x="390" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Final Rating</text>
  <text x="390" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="white">4.32 ★</text>
  <text x="390" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">275 reviews</text>
  
  <!-- Cache -->
  <rect x="530" y="220" width="140" height="80" rx="8" fill="#6366f1"/>
  <text x="600" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Redis Cache</text>
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Avg Rating</text>
  <text x="600" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Distribution</text>
  
  <!-- Display -->
  <rect x="720" y="220" width="200" height="80" rx="8" fill="#f97316"/>
  <text x="820" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Product Page Display</text>
  <text x="820" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="white">4.32 ★★★★☆</text>
  <text x="820" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Based on 275 ratings</text>
  
  <!-- Arrows -->
  <path d="M 170 120 L 215 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="215,120 205,115 205,125" fill="#64748b"/>
  
  <path d="M 360 120 L 405 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="405,120 395,115 395,125" fill="#64748b"/>
  
  <path d="M 570 120 L 615 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="615,120 605,115 605,125" fill="#64748b"/>
  
  <path d="M 800 120 L 845 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="845,120 835,115 835,125" fill="#64748b"/>
  
  <path d="M 490 170 L 490 215" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="490,215 485,205 495,205" fill="#64748b"/>
  
  <path d="M 480 260 L 525 260" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="525,260 515,255 515,265" fill="#64748b"/>
  
  <path d="M 670 260 L 715 260" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="715,260 705,255 705,265" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="340" width="900" height="90" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Aggregation Process</text>
  
  <circle cx="100" cy="390" r="8" fill="#3b82f6"/>
  <text x="120" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Collect raw ratings from database</text>
  
  <circle cx="400" cy="390" r="8" fill="#8b5cf6"/>
  <text x="420" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Filter flagged, apply verified weight</text>
  
  <circle cx="700" cy="390" r="8" fill="#f59e0b"/>
  <text x="720" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Bayesian average prevents skew from few reviews</text>
  
  <circle cx="150" cy="415" r="8" fill="#10b981"/>
  <text x="170" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Distribution shows rating spread visually</text>
  
  <circle cx="500" cy="415" r="8" fill="#ec4899"/>
  <text x="520" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Time decay weights recent reviews higher</text>
</svg>
