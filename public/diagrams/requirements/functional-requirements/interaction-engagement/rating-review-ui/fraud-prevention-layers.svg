<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#bgGrad4)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Fraud Prevention Layers</text>
  
  <!-- Layer 1: Verification -->
  <rect x="50" y="70" width="200" height="100" rx="8" fill="#3b82f6"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Layer 1: Verification</text>
  <text x="150" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Verified Purchase Badge</text>
  <text x="150" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Email Confirmation</text>
  <text x="150" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Phone Verification</text>
  
  <!-- Layer 2: Rate Limiting -->
  <rect x="280" y="70" width="200" height="100" rx="8" fill="#8b5cf6"/>
  <text x="380" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Layer 2: Rate Limiting</text>
  <text x="380" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Reviews/Day Limit</text>
  <text x="380" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• IP-Based Limits</text>
  <text x="380" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Account Age Check</text>
  
  <!-- Layer 3: Pattern Detection -->
  <rect x="510" y="70" width="200" height="100" rx="8" fill="#f59e0b"/>
  <text x="610" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Layer 3: Pattern Detection</text>
  <text x="610" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Duplicate Content</text>
  <text x="610" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Timing Patterns</text>
  <text x="610" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Language Analysis</text>
  
  <!-- Layer 4: Enforcement -->
  <rect x="740" y="70" width="200" height="100" rx="8" fill="#ef4444"/>
  <text x="840" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Layer 4: Enforcement</text>
  <text x="840" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Remove Fake Reviews</text>
  <text x="840" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Account Suspension</text>
  <text x="840" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">• Legal Action</text>
  
  <!-- Detection Methods -->
  <rect x="50" y="210" width="220" height="110" rx="8" fill="#10b981"/>
  <text x="160" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Detection Methods</text>
  <text x="160" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">ML Classification</text>
  <text x="160" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Sentiment Analysis</text>
  <text x="160" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Network Graph Analysis</text>
  <text x="160" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Device Fingerprinting</text>
  
  <!-- Fraud Indicators -->
  <rect x="300" y="210" width="220" height="110" rx="8" fill="#ec4899"/>
  <text x="410" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Fraud Indicators</text>
  <text x="410" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Multiple Reviews/Day</text>
  <text x="410" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Same IP Addresses</text>
  <text x="410" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Generic Language</text>
  <text x="410" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Extreme Ratings Only</text>
  
  <!-- Outcomes -->
  <rect x="550" y="210" width="400" height="110" rx="8" fill="#6366f1"/>
  <text x="750" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Outcomes</text>
  <text x="620" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Review Removed</text>
  <text x="750" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Account Warning</text>
  <text x="880" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Account Suspended</text>
  <text x="680" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Legal Action (Commercial Fraud)</text>
  
  <!-- Arrow between layers -->
  <path d="M 250 120 L 275 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="275,120 265,115 265,125" fill="#64748b"/>
  
  <path d="M 480 120 L 505 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="505,120 495,115 495,125" fill="#64748b"/>
  
  <path d="M 710 120 L 735 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="735,120 725,115 725,125" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="350" width="900" height="80" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Defense in Depth Strategy</text>
  
  <circle cx="100" cy="400" r="8" fill="#3b82f6"/>
  <text x="120" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Verify reviewer identity</text>
  
  <circle cx="350" cy="400" r="8" fill="#8b5cf6"/>
  <text x="370" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Limit review frequency</text>
  
  <circle cx="600" cy="400" r="8" fill="#f59e0b"/>
  <text x="620" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Detect suspicious patterns</text>
  
  <circle cx="850" cy="400" r="8" fill="#ef4444"/>
  <text x="870" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Remove fraud and penalize</text>
</svg>
