<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="1000" height="450" class="bg-base"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Like State Transitions</text>
  
  <rect x="20" y="70" width="220" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Unliked State</text>
  <rect x="40" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  <rect x="55" y="125" width="150" height="60" rx="2" class="box-base" stroke-width="2"/>
  <path d="M 130 145 L 135 140 Q 140 135 145 140 L 150 145 L 130 165 L 110 145 L 115 140 Q 120 135 125 140 Z" fill="none" class="arrow" stroke-width="2"/>
  <text x="130" y="205" text-anchor="middle" font-size="9" class="text-secondary">Gray outline</text>
  <text x="130" y="220" text-anchor="middle" font-size="9" class="text-secondary">Click to like</text>
  
  <line x1="240" y1="155" x2="280" y2="155" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="260" y="145" text-anchor="middle" font-size="8" class="text-primary">User clicks</text>
  
  <rect x="280" y="70" width="220" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="390" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Liked State</text>
  <rect x="300" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  <rect x="315" y="125" width="150" height="60" rx="2" class="highlight-red" stroke-width="2"/>
  <path d="M 390 145 L 395 140 Q 400 135 405 140 L 410 145 L 390 165 L 370 145 L 375 140 Q 380 135 385 140 Z" class="highlight-red"/>
  <text x="390" y="205" text-anchor="middle" font-size="9" class="highlight-green">✓ Filled red</text>
  <text x="390" y="220" text-anchor="middle" font-size="9" class="text-secondary">Click to unlike</text>
  
  <line x1="500" y1="155" x2="540" y2="155" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="520" y="145" text-anchor="middle" font-size="8" class="text-primary">API fails</text>
  
  <rect x="540" y="70" width="220" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="650" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Error State</text>
  <rect x="560" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  <rect x="575" y="125" width="150" height="60" rx="2" class="box-base" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 650 145 L 655 140 Q 660 135 665 140 L 670 145 L 650 165 L 630 145 L 635 140 Q 640 135 645 140 Z" fill="none" class="highlight-red" stroke-width="2"/>
  <line x1="620" y1="135" x2="680" y2="155" class="highlight-red" stroke-width="3"/>
  <line x1="680" y1="135" x2="620" y2="155" class="highlight-red" stroke-width="3"/>
  <text x="650" y="205" text-anchor="middle" font-size="9" class="highlight-red">⚠ Reverted</text>
  <text x="650" y="220" text-anchor="middle" font-size="9" class="text-secondary">Show error toast</text>
  
  <line x1="130" y1="240" x2="130" y2="280" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="20" y="280" width="220" height="150" rx="5" class="accent-box" stroke-width="2"/>
  <text x="130" y="305" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Pending State</text>
  <rect x="40" y="320" width="180" height="95" rx="3" class="box-base" stroke-width="1"/>
  <circle cx="130" cy="360" r="15" fill="none" class="highlight-blue" stroke-width="3">
    <animateTransform attributeName="transform" type="rotate" from="0 130 360" to="360 130 360" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="130" y="395" text-anchor="middle" font-size="9" class="text-secondary">Button disabled</text>
  <text x="130" y="410" text-anchor="middle" font-size="9" class="text-secondary">During API call</text>
  
  <line x1="240" y1="355" x2="280" y2="355" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="260" y="345" text-anchor="middle" font-size="8" class="highlight-green">Success</text>
  <text x="260" y="365" text-anchor="middle" font-size="8" class="highlight-red">Failure</text>
  
  <rect x="280" y="280" width="480" height="150" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="520" y="305" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">State Transitions Summary</text>
  <rect x="300" y="320" width="440" height="95" rx="3" class="box-base" stroke-width="1"/>
  <text x="315" y="340" font-size="8" class="text-primary">Unliked → Click → Pending → Success → Liked</text>
  <text x="315" y="360" font-size="8" class="text-primary">Liked → Click → Pending → Success → Unliked</text>
  <text x="315" y="380" font-size="8" class="highlight-red">Any → API Fail → Error → Reverted</text>
  <text x="315" y="400" font-size="8" class="highlight-purple">Offline → Queued → Sync when online</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>