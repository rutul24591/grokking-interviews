<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Like Button States</text>
  
  <!-- Default State (Top Left) -->
  <rect x="20" y="70" width="140" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="90" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Default</text>
  
  <rect x="40" y="110" width="100" height="115" rx="3" class="box-base" stroke-width="1.5"/>
  <!-- Heart outline -->
  <path d="M 90 135 L 95 130 Q 100 125 105 130 L 110 135 L 90 155 L 70 135 L 75 130 Q 80 125 85 130 Z" fill="none" class="arrow" stroke-width="2"/>
  <text x="90" y="195" text-anchor="middle" font-size="8" class="text-secondary">Outline</text>
  <text x="90" y="210" text-anchor="middle" font-size="8" class="text-secondary">Gray color</text>
  <text x="90" y="225" text-anchor="middle" font-size="8" class="text-secondary">Count: 1.2K</text>
  
  <!-- Hover State (Top Center Left) -->
  <rect x="180" y="70" width="140" height="170" rx="5" class="accent-box" stroke-width="2"/>
  <text x="250" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Hovered</text>
  
  <rect x="200" y="110" width="100" height="115" rx="3" class="accent-box" stroke-width="1.5"/>
  <!-- Heart outline with glow -->
  <path d="M 250 135 L 255 130 Q 260 125 265 130 L 270 135 L 250 155 L 230 135 L 235 130 Q 240 125 245 130 Z" fill="none" class="highlight-blue" stroke-width="2.5"/>
  <text x="250" y="195" text-anchor="middle" font-size="8" class="text-primary">Slight glow</text>
  <text x="250" y="210" text-anchor="middle" font-size="8" class="text-secondary">Cursor: pointer</text>
  <text x="250" y="225" text-anchor="middle" font-size="8" class="text-secondary">Tooltip hint</text>
  
  <!-- Pressed State (Top Center) -->
  <rect x="340" y="70" width="140" height="170" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="410" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Pressed</text>
  
  <rect x="360" y="110" width="100" height="115" rx="3" class="highlight-box" stroke-width="1.5"/>
  <!-- Heart scaling down -->
  <path d="M 410 138 L 414 134 Q 418 130 422 134 L 426 138 L 410 154 L 394 138 L 398 134 Q 402 130 406 134 Z" fill="none" class="highlight-red" stroke-width="2.5"/>
  <text x="410" y="195" text-anchor="middle" font-size="8" class="highlight-purple">Scale: 0.9</text>
  <text x="410" y="210" text-anchor="middle" font-size="8" class="text-secondary">During click</text>
  <text x="410" y="225" text-anchor="middle" font-size="8" class="text-secondary">Haptic feedback</text>
  
  <!-- Liked State (Top Center Right) -->
  <rect x="500" y="70" width="140" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="570" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Liked</text>
  
  <rect x="520" y="110" width="100" height="115" rx="3" class="accent-box" stroke-width="1.5"/>
  <!-- Heart filled -->
  <path d="M 570 135 L 575 130 Q 580 125 585 130 L 590 135 L 570 155 L 550 135 L 555 130 Q 560 125 565 130 Z" class="highlight-red"/>
  <text x="570" y="195" text-anchor="middle" font-size="8" class="highlight-green">Filled heart</text>
  <text x="570" y="210" text-anchor="middle" font-size="8" class="text-secondary">Red/colored</text>
  <text x="570" y="225" text-anchor="middle" font-size="8" class="text-secondary">Count: 1.2K</text>
  
  <!-- Loading State (Top Right) -->
  <rect x="660" y="70" width="140" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Loading</text>
  
  <rect x="680" y="110" width="100" height="115" rx="3" class="box-base" stroke-width="1.5"/>
  <!-- Spinner -->
  <circle cx="730" cy="145" r="15" fill="none" class="highlight-blue" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="0 730 145" to="360 730 145" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="730" y="195" text-anchor="middle" font-size="8" class="highlight-purple">Disabled</text>
  <text x="730" y="210" text-anchor="middle" font-size="8" class="text-secondary">During API</text>
  <text x="730" y="225" text-anchor="middle" font-size="8" class="text-secondary">Prevent toggle</text>
  
  <!-- Error State (Bottom Left) -->
  <rect x="20" y="260" width="140" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="90" y="285" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Error</text>
  
  <rect x="40" y="300" width="100" height="115" rx="3" class="box-base" stroke-width="1.5"/>
  <!-- Heart with X -->
  <path d="M 90 325 L 95 320 Q 100 315 105 320 L 110 325 L 90 345 L 70 325 L 75 320 Q 80 315 85 320 Z" fill="none" class="highlight-red" stroke-width="2"/>
  <line x1="75" y1="335" x2="105" y2="335" class="highlight-red" stroke-width="2"/>
  <text x="90" y="385" text-anchor="middle" font-size="8" class="highlight-red">Reverted</text>
  <text x="90" y="400" text-anchor="middle" font-size="8" class="text-secondary">Show toast</text>
  <text x="90" y="415" text-anchor="middle" font-size="8" class="text-secondary">Retry option</text>
  
  <!-- Disabled State (Bottom Center) -->
  <rect x="180" y="260" width="140" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="250" y="285" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Disabled</text>
  
  <rect x="200" y="300" width="100" height="115" rx="3" class="box-base" stroke-width="1" opacity="0.5"/>
  <!-- Heart outline faded -->
  <path d="M 250 325 L 255 320 Q 260 315 265 320 L 270 325 L 250 345 L 230 325 L 235 320 Q 240 315 245 320 Z" fill="none" class="text-secondary" stroke-width="2"/>
  <text x="250" y="385" text-anchor="middle" font-size="8" class="text-secondary">Opacity: 0.5</text>
  <text x="250" y="400" text-anchor="middle" font-size="8" class="text-secondary">No interaction</text>
  <text x="250" y="415" text-anchor="middle" font-size="8" class="text-secondary">Blocked/deleted</text>
  
  <!-- Animation States (Bottom Right) -->
  <rect x="340" y="260" width="640" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="660" y="285" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Animation Sequence</text>
  
  <rect x="360" y="300" width="600" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Animation frames -->
  <text x="375" y="320" font-size="9" font-weight="bold" class="text-primary">Like Animation (200ms):</text>
  
  <!-- Frame 1 -->
  <rect x="375" y="330" width="80" height="60" rx="2" class="box-base" stroke-width="1"/>
  <path d="M 415 350 L 418 347 Q 421 344 424 347 L 427 350 L 415 362 L 403 350 L 406 347 Q 409 344 412 347 Z" fill="none" class="arrow" stroke-width="2"/>
  <text x="415" y="385" text-anchor="middle" font-size="7" class="text-secondary">0ms</text>
  <text x="415" y="395" text-anchor="middle" font-size="6" class="text-secondary">Scale: 1.0</text>
  
  <!-- Frame 2 -->
  <rect x="465" y="330" width="80" height="60" rx="2" class="accent-box" stroke-width="1"/>
  <path d="M 505 348 L 507 346 Q 510 343 513 346 L 515 348 L 505 358 L 495 348 L 497 346 Q 500 343 503 346 Z" class="highlight-red"/>
  <text x="505" y="385" text-anchor="middle" font-size="7" class="highlight-green">50ms</text>
  <text x="505" y="395" text-anchor="middle" font-size="6" class="text-secondary">Scale: 1.2</text>
  
  <!-- Frame 3 -->
  <rect x="555" y="330" width="80" height="60" rx="2" class="box-base" stroke-width="1"/>
  <path d="M 595 350 L 598 347 Q 601 344 604 347 L 607 350 L 595 362 L 585 350 L 588 347 Q 591 344 594 347 Z" class="highlight-red"/>
  <text x="595" y="385" text-anchor="middle" font-size="7" class="text-secondary">100ms</text>
  <text x="595" y="395" text-anchor="middle" font-size="6" class="text-secondary">Scale: 1.0</text>
  
  <!-- Frame 4 -->
  <rect x="645" y="330" width="80" height="60" rx="2" class="box-base" stroke-width="1"/>
  <path d="M 685 350 L 688 347 Q 691 344 694 347 L 697 350 L 685 362 L 675 350 L 678 347 Q 681 344 684 347 Z" class="highlight-red"/>
  <text x="685" y="385" text-anchor="middle" font-size="7" class="highlight-green">200ms</text>
  <text x="685" y="395" text-anchor="middle" font-size="6" class="text-secondary">Scale: 1.0</text>
  <text x="685" y="405" text-anchor="middle" font-size="6" class="highlight-green">Complete</text>
  
  <!-- Particle effect note -->
  <text x="500" y="435" text-anchor="middle" font-size="8" class="highlight-purple">Optional: Particle effects, haptic feedback</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
