<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="1000" height="500" class="bg-base"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Engagement Storage Architecture</text>
  
  <!-- User Interaction -->
  <rect x="30" y="70" width="180" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="120" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">User Interaction</text>
  <rect x="50" y="110" width="140" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="70" y="130" font-size="9" class="text-primary">• Like/Comment</text>
  <text x="70" y="148" font-size="9" class="text-primary">• API request</text>
  
  <line x1="210" y1="120" x2="250" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- API Layer -->
  <rect x="250" y="70" width="180" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="340" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">API Layer</text>
  <rect x="270" y="110" width="140" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="285" y="130" font-size="9" class="text-primary">• Validate</text>
  <text x="285" y="148" font-size="9" class="text-secondary">• Queue write</text>
  
  <line x1="430" y1="120" x2="470" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Message Queue -->
  <rect x="470" y="70" width="200" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="570" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Message Queue</text>
  <rect x="490" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="505" y="130" font-size="9" class="text-primary">• Kafka/Kinesis</text>
  <text x="505" y="148" font-size="9" class="text-secondary">• Buffer writes</text>
  
  <line x1="670" y1="120" x2="710" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Stream Processor -->
  <rect x="710" y="70" width="260" height="100" rx="5" class="highlight-purple" stroke-width="2"/>
  <text x="840" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Stream Processor</text>
  <rect x="730" y="110" width="220" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="745" y="130" font-size="9" class="text-primary">• Batch writes</text>
  <text x="745" y="148" font-size="9" class="text-secondary">• Retry handling</text>
  
  <!-- Counter Cache -->
  <line x1="570" y1="170" x2="570" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="470" y="210" width="200" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="570" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Counter Cache</text>
  <rect x="490" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="505" y="270" font-size="9" class="text-primary">• Redis INCR/DECR</text>
  <text x="505" y="288" font-size="9" class="text-primary">• Atomic operations</text>
  <text x="505" y="306" font-size="9" class="highlight-green">✓ Fast reads</text>
  
  <!-- Async Flush -->
  <line x1="470" y1="270" x2="430" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="250" y="210" width="180" height="120" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="340" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Async Flush</text>
  <rect x="270" y="250" width="140" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="285" y="270" font-size="9" class="text-primary">• Every 1-5 min</text>
  <text x="285" y="288" font-size="9" class="text-primary">• Cache → DB</text>
  <text x="285" y="306" font-size="9" class="highlight-green">✓ Durability</text>
  
  <!-- Database -->
  <line x1="250" y1="270" x2="210" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="30" y="210" width="180" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="120" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Database</text>
  <rect x="50" y="250" width="140" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="70" y="270" font-size="9" class="text-primary">• Cassandra/DynamoDB</text>
  <text x="70" y="288" font-size="9" class="text-primary">• Time-series</text>
  <text x="70" y="306" font-size="9" class="highlight-green">✓ Persistence</text>
  
  <!-- Read Path -->
  <rect x="710" y="210" width="260" height="120" rx="5" class="highlight-green" stroke-width="2"/>
  <text x="840" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Read Path</text>
  <rect x="730" y="250" width="220" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="745" y="270" font-size="9" class="text-primary">• CDN cache (edge)</text>
  <text x="745" y="288" font-size="9" class="text-primary">• Redis cache</text>
  <text x="745" y="306" font-size="9" class="highlight-green">✓ Sub-100ms</text>
  
  <!-- Analytics Pipeline -->
  <rect x="30" y="350" width="940" height="130" rx="5" class="highlight-purple" stroke-width="2.5"/>
  <text x="500" y="375" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Analytics Aggregation Pipeline</text>
  
  <rect x="50" y="390" width="270" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="185" y="410" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Hourly Aggregates</text>
  <text x="185" y="430" text-anchor="middle" font-size="8" class="text-primary">Last 7 days detailed</text>
  <text x="185" y="445" text-anchor="middle" font-size="8" class="text-primary">Stream processing</text>
  
  <rect x="340" y="390" width="270" height="75" rx="3" class="accent-box" stroke-width="1"/>
  <text x="475" y="410" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Daily Aggregates</text>
  <text x="475" y="430" text-anchor="middle" font-size="8" class="text-primary">Last 90 days trends</text>
  <text x="475" y="445" text-anchor="middle" font-size="8" class="text-primary">Batch rollup</text>
  
  <rect x="630" y="390" width="270" height="75" rx="3" class="highlight-box" stroke-width="1"/>
  <text x="765" y="410" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Dimension Breakdown</text>
  <text x="765" y="430" text-anchor="middle" font-size="8" class="text-primary">Geo, device, source</text>
  <text x="765" y="445" text-anchor="middle" font-size="8" class="text-primary">Creator dashboards</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>