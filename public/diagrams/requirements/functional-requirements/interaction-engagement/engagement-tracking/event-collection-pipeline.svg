<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="bgGrad17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#bgGrad17)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Event Collection Pipeline</text>
  
  <!-- Client SDK -->
  <rect x="30" y="70" width="170" height="120" rx="8" fill="#3b82f6"/>
  <text x="115" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Client SDK</text>
  <text x="115" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Event Capture</text>
  <text x="115" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Batching (10 events)</text>
  <text x="115" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Retry Logic</text>
  <text x="115" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Offline Queue</text>
  
  <!-- Ingestion API -->
  <rect x="250" y="70" width="170" height="120" rx="8" fill="#8b5cf6"/>
  <text x="335" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Ingestion API</text>
  <text x="335" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Schema Validation</text>
  <text x="335" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Authentication</text>
  <text x="335" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Rate Limiting</text>
  <text x="335" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">202 Accepted</text>
  
  <!-- Message Queue -->
  <rect x="470" y="70" width="170" height="120" rx="8" fill="#f59e0b"/>
  <text x="555" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Message Queue</text>
  <text x="555" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Kafka/Kinesis</text>
  <text x="555" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Partitioned by ID</text>
  <text x="555" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">7-30 Day Retention</text>
  <text x="555" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Replay Capability</text>
  
  <!-- Stream Processor -->
  <rect x="690" y="70" width="170" height="120" rx="8" fill="#10b981"/>
  <text x="775" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Stream Processor</text>
  <text x="775" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Flink/Spark</text>
  <text x="775" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Real-time Aggregation</text>
  <text x="775" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Fraud Detection</text>
  <text x="775" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Event Enrichment</text>
  
  <!-- Storage Layer -->
  <rect x="100" y="240" width="200" height="100" rx="8" fill="#ec4899"/>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Storage Layer</text>
  <text x="200" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Time-series DB (ClickHouse)</text>
  <text x="200" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Data Warehouse (BigQuery)</text>
  <text x="200" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Document Store (Elasticsearch)</text>
  
  <!-- Analytics Layer -->
  <rect x="350" y="240" width="200" height="100" rx="8" fill="#06b6d4"/>
  <text x="450" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Analytics Layer</text>
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Real-time Dashboards</text>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Batch Reports</text>
  <text x="450" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">ML Model Training</text>
  
  <!-- Output Systems -->
  <rect x="600" y="240" width="280" height="100" rx="8" fill="#6366f1"/>
  <text x="740" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Output Systems</text>
  <text x="650" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Trending Detection</text>
  <text x="740" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Feed Ranking</text>
  <text x="830" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Recommendations</text>
  <text x="650" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Fraud Alerts</text>
  <text x="740" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Creator Analytics</text>
  <text x="830" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Business Intelligence</text>
  
  <!-- Arrows -->
  <path d="M 200 130 L 245 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="245,130 235,125 235,135" fill="#64748b"/>
  
  <path d="M 420 130 L 465 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="465,130 455,125 455,135" fill="#64748b"/>
  
  <path d="M 640 130 L 685 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="685,130 675,125 675,135" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 115 190 L 115 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 555 190 L 555 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 775 190 L 775 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Flow between output systems -->
  <path d="M 300 290 L 595 290" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <polygon points="595,290 585,285 585,295" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="380" width="900" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Event Flow</text>
  
  <circle cx="100" cy="430" r="8" fill="#3b82f6"/>
  <text x="120" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Client SDK captures and batches events</text>
  
  <circle cx="400" cy="430" r="8" fill="#8b5cf6"/>
  <text x="420" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Ingestion API validates and queues</text>
  
  <circle cx="700" cy="430" r="8" fill="#f59e0b"/>
  <text x="720" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Message Queue buffers for processing</text>
  
  <circle cx="150" cy="460" r="8" fill="#10b981"/>
  <text x="170" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Stream Processor handles real-time</text>
  
  <circle cx="500" cy="460" r="8" fill="#ec4899"/>
  <text x="520" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Storage persists for analytics</text>
  
  <circle cx="800" cy="460" r="8" fill="#6366f1"/>
  <text x="820" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Output systems consume insights</text>
</svg>
