<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="bgGrad20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#bgGrad20)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Real-time vs Batch Processing</text>
  
  <!-- Real-time Processing -->
  <rect x="50" y="70" width="400" height="160" rx="8" fill="#3b82f6"/>
  <text x="250" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="white">Real-time Processing</text>
  <text x="250" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Stream Processing (Flink, Spark Streaming)</text>
  <text x="250" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Latency: Sub-second to seconds</text>
  <text x="250" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Use Cases: Trending detection, Real-time dashboards</text>
  <text x="250" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Infrastructure: High cost, complex</text>
  <text x="250" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Data Freshness: Immediate</text>
  
  <!-- Batch Processing -->
  <rect x="550" y="70" width="400" height="160" rx="8" fill="#8b5cf6"/>
  <text x="750" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="white">Batch Processing</text>
  <text x="750" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Scheduled Jobs (Hourly, Daily)</text>
  <text x="750" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Latency: Hours to days</text>
  <text x="750" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Use Cases: Historical analytics, ML training</text>
  <text x="750" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Infrastructure: Lower cost, simpler</text>
  <text x="750" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Data Freshness: Delayed but complete</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="260" width="900" height="170" rx="8" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Comparison</text>
  
  <!-- Table Header -->
  <rect x="60" y="295" width="880" height="30" fill="#f1f5f9"/>
  <text x="200" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#475569">Aspect</text>
  <text x="400" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#475569">Real-time</text>
  <text x="700" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#475569">Batch</text>
  
  <!-- Table Rows -->
  <line x1="60" y1="325" x2="940" y2="325" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Latency</text>
  <text x="400" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">&lt; 1 second</text>
  <text x="700" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#f59e0b">1-24 hours</text>
  
  <line x1="60" y1="355" x2="940" y2="355" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Cost</text>
  <text x="400" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444">High ($$$)</text>
  <text x="700" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">Low ($)</text>
  
  <line x1="60" y1="385" x2="940" y2="385" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Complexity</text>
  <text x="400" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444">High</text>
  <text x="700" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">Low</text>
  
  <line x1="60" y1="415" x2="940" y2="415" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Best For</text>
  <text x="400" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Time-sensitive</text>
  <text x="700" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Historical analysis</text>
</svg>
