<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Follow Suggestions Algorithm</text>
  
  <!-- Social Graph (Top Left) -->
  <rect x="20" y="70" width="220" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Social Graph</text>
  
  <rect x="40" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Graph visualization -->
  <circle cx="90" cy="150" r="20" class="accent-box" stroke-width="1.5"/>
  <text x="90" y="155" text-anchor="middle" font-size="7" class="text-primary">You</text>
  
  <circle cx="150" cy="135" r="15" class="box-base" stroke-width="1"/>
  <text x="150" y="138" text-anchor="middle" font-size="6" class="text-secondary">Friend 1</text>
  
  <circle cx="170" cy="165" r="15" class="box-base" stroke-width="1"/>
  <text x="170" y="168" text-anchor="middle" font-size="6" class="text-secondary">Friend 2</text>
  
  <circle cx="130" cy="185" r="15" class="box-base" stroke-width="1"/>
  <text x="130" y="188" text-anchor="middle" font-size="6" class="text-secondary">Friend 3</text>
  
  <!-- Connections -->
  <line x1="105" y1="145" x2="135" y2="140" class="arrow" stroke-width="1"/>
  <line x1="105" y1="155" x2="155" y2="165" class="arrow" stroke-width="1"/>
  <line x1="100" y1="165" x2="120" y2="175" class="arrow" stroke-width="1"/>
  
  <text x="130" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Friends of friends</text>
  
  <!-- Interest-based (Top Center) -->
  <rect x="260" y="70" width="220" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="370" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Interest-based</text>
  
  <rect x="280" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Interest tags -->
  <rect x="295" y="125" width="60" height="20" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="325" y="139" text-anchor="middle" font-size="7" class="text-primary">Tech</text>
  
  <rect x="365" y="125" width="60" height="20" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="395" y="139" text-anchor="middle" font-size="7" class="text-primary">Design</text>
  
  <rect x="295" y="150" width="60" height="20" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="325" y="164" text-anchor="middle" font-size="7" class="text-primary">Startup</text>
  
  <!-- Similar users -->
  <text x="370" y="195" text-anchor="middle" font-size="8" class="text-secondary">Users who follow:</text>
  <rect x="295" y="205" width="150" height="15" rx="1" class="accent-box" stroke-width="1"/>
  <text x="370" y="216" text-anchor="middle" font-size="6" class="text-primary">Similar accounts → Similar users</text>
  
  <text x="370" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Content affinity</text>
  
  <!-- Popular/Trending (Top Right) -->
  <rect x="500" y="70" width="240" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="620" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Popular/Trending</text>
  
  <rect x="520" y="110" width="200" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Trending accounts -->
  <rect x="535" y="125" width="170" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="550" y="142" font-size="8" font-weight="bold" class="text-primary">@elonmusk</text>
  <text x="680" y="142" text-anchor="end" font-size="7" class="highlight-green">✓</text>
  
  <rect x="535" y="155" width="170" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="550" y="172" font-size="8" font-weight="bold" class="text-primary">@nasa</text>
  <text x="680" y="172" text-anchor="end" font-size="7" class="highlight-green">✓</text>
  
  <rect x="535" y="185" width="170" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="550" y="202" font-size="8" font-weight="bold" class="text-primary">@github</text>
  <text x="680" y="202" text-anchor="end" font-size="7" class="highlight-green">✓</text>
  
  <text x="620" y="245" text-anchor="middle" font-size="9" class="highlight-purple">⚠ Social proof</text>
  
  <!-- Imported Contacts (Bottom Left) -->
  <rect x="20" y="260" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Imported Contacts</text>
  
  <rect x="40" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Contact sources -->
  <rect x="55" y="315" width="110" height="35" rx="2" class="accent-box" stroke-width="1"/>
  <text x="110" y="335" text-anchor="middle" font-size="8" font-weight="bold" class="text-primary">📧 Email</text>
  
  <rect x="175" y="315" width="110" height="35" rx="2" class="accent-box" stroke-width="1"/>
  <text x="230" y="335" text-anchor="middle" font-size="8" font-weight="bold" class="text-primary">📱 Phone</text>
  
  <!-- Matched contacts -->
  <text x="55" y="370" font-size="8" font-weight="bold" class="text-primary">Matched:</text>
  <text x="55" y="390" font-size="7" class="text-secondary">• john@email.com → @john</text>
  <text x="55" y="405" font-size="7" class="text-secondary">• jane@email.com → @jane</text>
  
  <text x="170" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Real-world connections</text>
  
  <!-- Hybrid Scoring (Bottom Center) -->
  <rect x="340" y="260" width="320" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Hybrid Scoring</text>
  
  <rect x="360" y="300" width="280" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Score formula -->
  <text x="375" y="320" font-size="9" font-weight="bold" class="text-primary">Final Score =</text>
  
  <rect x="375" y="330" width="120" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="435" y="344" text-anchor="middle" font-size="7" class="text-primary">0.35×Social</text>
  
  <rect x="375" y="355" width="120" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="435" y="369" text-anchor="middle" font-size="7" class="text-primary">0.30×Interest</text>
  
  <rect x="510" y="330" width="120" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="570" y="344" text-anchor="middle" font-size="7" class="text-primary">0.20×Popular</text>
  
  <rect x="510" y="355" width="120" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="570" y="369" text-anchor="middle" font-size="7" class="text-primary">0.15×Contacts</text>
  
  <!-- Diversity note -->
  <text x="500" y="395" text-anchor="middle" font-size="8" class="highlight-purple">+ Diversity bonus</text>
  <text x="500" y="410" text-anchor="middle" font-size="8" class="text-secondary">Avoid suggesting same type</text>
  
  <text x="500" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Balanced suggestions</text>
  
  <!-- Suggestion Pipeline (Bottom Right) -->
  <rect x="680" y="260" width="300" height="170" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Suggestion Pipeline</text>
  
  <rect x="700" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Pipeline steps -->
  <text x="715" y="320" font-size="8" font-weight="bold" class="text-primary">1. Candidate Generation</text>
  <text x="715" y="335" font-size="7" class="text-secondary">Gather 1000+ candidates</text>
  
  <text x="715" y="355" font-size="8" font-weight="bold" class="text-primary">2. Scoring</text>
  <text x="715" y="370" font-size="7" class="text-secondary">Apply hybrid scoring</text>
  
  <text x="715" y="390" font-size="8" font-weight="bold" class="text-primary">3. Diversity</text>
  <text x="715" y="405" font-size="7" class="text-secondary">Ensure varied suggestions</text>
  
  <text x="850" y="335" font-size="8" class="highlight-green">→ Top 50</text>
  <text x="850" y="370" font-size="8" class="highlight-green">→ Top 20</text>
  <text x="850" y="405" font-size="8" class="highlight-green">→ Final 10</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
