<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Bookmark Flow</text>
  
  <!-- User Click (Top Left) -->
  <rect x="20" y="70" width="180" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="110" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">User Click</text>
  
  <rect x="40" y="110" width="140" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="130" font-size="9" class="text-primary">• Click save button</text>
  <text x="55" y="148" font-size="9" class="text-primary">• Show loading state</text>
  
  <!-- Arrow to Optimistic -->
  <line x1="200" y1="120" x2="240" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Optimistic Update (Top Center Left) -->
  <rect x="240" y="70" width="200" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="340" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Optimistic Update</text>
  
  <rect x="260" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="130" font-size="9" class="text-primary">• Fill bookmark icon</text>
  <text x="275" y="148" font-size="9" class="text-secondary">Store pending state</text>
  
  <!-- Arrow to Collection -->
  <line x1="440" y1="120" x2="480" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Collection Select (Top Center) -->
  <rect x="480" y="70" width="200" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="580" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Collection Select</text>
  
  <rect x="500" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="515" y="130" font-size="9" class="text-secondary">First save: picker</text>
  <text x="515" y="148" font-size="9" class="text-secondary">Default: All Saves</text>
  
  <!-- Arrow to API -->
  <line x1="680" y1="120" x2="720" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- API Call (Top Right) -->
  <rect x="720" y="70" width="260" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="850" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">API Call</text>
  
  <rect x="740" y="110" width="220" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="755" y="130" font-size="9" class="text-primary">• POST /content/:id/save</text>
  <text x="755" y="148" font-size="9" class="text-secondary">Include collection_id</text>
  
  <!-- Arrow down to DB -->
  <line x1="850" y1="170" x2="850" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Database (Middle Right) -->
  <rect x="720" y="210" width="260" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="850" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Database Write</text>
  
  <rect x="740" y="250" width="220" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="755" y="270" font-size="9" class="text-primary">• Upsert bookmark</text>
  <text x="755" y="288" font-size="9" class="text-primary">• (user_id, content_id)</text>
  <text x="755" y="306" font-size="9" class="highlight-green">✓ Unique constraint</text>
  
  <!-- Arrow to Sync -->
  <line x1="720" y1="270" x2="680" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Sync (Middle Center) -->
  <rect x="480" y="210" width="200" height="120" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="580" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Cross-Device Sync</text>
  
  <rect x="500" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="515" y="270" font-size="9" class="text-primary">• WebSocket push</text>
  <text x="515" y="288" font-size="9" class="text-primary">• Offline queue</text>
  <text x="515" y="306" font-size="9" class="highlight-green">✓ All devices</text>
  
  <!-- Arrow to Complete -->
  <line x1="480" y1="270" x2="440" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Complete (Middle Left) -->
  <rect x="240" y="210" width="200" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="340" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Complete</text>
  
  <rect x="260" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="270" font-size="9" class="text-primary">• Clear pending</text>
  <text x="275" y="288" font-size="9" class="text-primary">• Show success</text>
  <text x="275" y="306" font-size="9" class="highlight-green">✓ Re-enable</text>
  
  <!-- Arrow to Retrieval -->
  <line x1="240" y1="270" x2="200" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Retrieval (Far Left Middle) -->
  <rect x="20" y="210" width="180" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="110" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Saved Items</text>
  
  <rect x="40" y="250" width="140" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="270" font-size="9" class="text-primary">• Paginated list</text>
  <text x="55" y="288" font-size="9" class="text-primary">• Filter by collection</text>
  <text x="55" y="306" font-size="9" class="highlight-green">✓ Searchable</text>
  
  <!-- Error Path (Bottom) -->
  <rect x="20" y="350" width="960" height="130" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="500" y="375" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Error Handling</text>
  
  <rect x="40" y="390" width="920" height="75" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Error scenarios -->
  <text x="55" y="410" font-size="9" font-weight="bold" class="text-primary">Common Errors:</text>
  <text x="55" y="430" font-size="8" class="highlight-red">• API failed → Revert optimistic update, show error toast</text>
  <text x="55" y="450" font-size="8" class="highlight-red">• Already saved → Update UI state, no error</text>
  <text x="450" y="430" font-size="8" class="highlight-purple">• Collection deleted → Save to default, notify user</text>
  <text x="450" y="450" font-size="8" class="highlight-purple">• Offline → Queue save, sync when online</text>
  <text x="750" y="430" font-size="8" class="highlight-green">• Always provide feedback</text>
  <text x="750" y="450" font-size="8" class="highlight-green">• Offer retry option</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
