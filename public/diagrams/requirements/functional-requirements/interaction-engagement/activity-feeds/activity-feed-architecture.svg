<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="bgGrad9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#bgGrad9)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Activity Feed Architecture</text>
  
  <!-- Event Generation -->
  <rect x="30" y="70" width="170" height="110" rx="8" fill="#3b82f6"/>
  <text x="115" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Event Generation</text>
  <text x="115" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">User Actions</text>
  <text x="115" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Like, Comment, Share</text>
  <text x="115" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Follow, Mention</text>
  <text x="115" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Event Published</text>
  
  <!-- Fan-out Processing -->
  <rect x="250" y="70" width="180" height="110" rx="8" fill="#8b5cf6"/>
  <text x="340" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Fan-out Processing</text>
  <text x="340" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Push: Regular Users</text>
  <text x="340" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Pull: Celebrities</text>
  <text x="340" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Aggregation</text>
  <text x="340" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Enrichment</text>
  
  <!-- Storage Layer -->
  <rect x="480" y="70" width="180" height="110" rx="8" fill="#10b981"/>
  <text x="570" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Storage Layer</text>
  <text x="570" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Redis (Hot)</text>
  <text x="570" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Cassandra (Warm)</text>
  <text x="570" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">S3 (Cold Archive)</text>
  <text x="570" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Actor Snapshots</text>
  
  <!-- Ranking Engine -->
  <rect x="710" y="70" width="180" height="110" rx="8" fill="#f59e0b"/>
  <text x="800" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Ranking Engine</text>
  <text x="800" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Recency Score</text>
  <text x="800" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Affinity Score</text>
  <text x="800" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Importance Weight</text>
  <text x="800" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Diversity Injection</text>
  
  <!-- Real-time Delivery -->
  <rect x="100" y="230" width="200" height="100" rx="8" fill="#ec4899"/>
  <text x="200" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Real-time Delivery</text>
  <text x="200" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">WebSocket Push</text>
  <text x="200" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Presence Tracking</text>
  <text x="200" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Polling Fallback</text>
  
  <!-- Notification Service -->
  <rect x="350" y="230" width="200" height="100" rx="8" fill="#f97316"/>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Notification Service</text>
  <text x="450" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Push Notifications</text>
  <text x="450" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Email Digests</text>
  <text x="450" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Batching Logic</text>
  
  <!-- Analytics Pipeline -->
  <rect x="600" y="230" width="180" height="100" rx="8" fill="#06b6d4"/>
  <text x="690" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Analytics Pipeline</text>
  <text x="690" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Engagement Metrics</text>
  <text x="690" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Trend Detection</text>
  <text x="690" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">ML Training Data</text>
  
  <!-- Client Feed -->
  <rect x="830" y="230" width="140" height="100" rx="8" fill="#3b82f6"/>
  <text x="900" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Client Feed</text>
  <text x="900" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Ranked Activities</text>
  <text x="900" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Infinite Scroll</text>
  <text x="900" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Real-time Updates</text>
  
  <!-- Arrows -->
  <path d="M 200 125 L 245 125" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="245,125 235,120 235,130" fill="#64748b"/>
  
  <path d="M 430 125 L 475 125" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="475,125 465,120 465,130" fill="#64748b"/>
  
  <path d="M 660 125 L 705 125" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="705,125 695,120 695,130" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 115 180 L 115 225" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 340 180 L 340 225" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 570 180 L 570 225" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 800 180 L 800 225" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Flow to client -->
  <path d="M 300 280 L 825 280" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <polygon points="825,280 815,275 815,285" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="370" width="900" height="110" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Activity Flow</text>
  
  <circle cx="100" cy="420" r="8" fill="#3b82f6"/>
  <text x="120" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">User action generates event</text>
  
  <circle cx="350" cy="420" r="8" fill="#8b5cf6"/>
  <text x="370" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Fan-out pushes to follower feeds</text>
  
  <circle cx="600" cy="420" r="8" fill="#10b981"/>
  <text x="620" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Multi-tier storage (Redis/Cassandra/S3)</text>
  
  <circle cx="850" cy="420" r="8" fill="#f59e0b"/>
  <text x="870" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Ranking scores by recency, affinity, importance</text>
  
  <circle cx="150" cy="450" r="8" fill="#ec4899"/>
  <text x="170" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Real-time delivery via WebSocket</text>
  
  <circle cx="500" cy="450" r="8" fill="#f97316"/>
  <text x="520" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Notifications batched and sent</text>
  
  <circle cx="800" cy="450" r="8" fill="#3b82f6"/>
  <text x="820" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Client displays ranked feed</text>
</svg>
