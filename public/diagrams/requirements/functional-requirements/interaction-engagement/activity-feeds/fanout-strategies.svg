<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="bgGrad10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#bgGrad10)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Fan-out Strategies</text>
  
  <!-- Push Model -->
  <rect x="30" y="70" width="280" height="160" rx="8" fill="#3b82f6"/>
  <text x="170" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="white">Push Model (Fan-out-on-write)</text>
  <text x="170" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">When user posts:</text>
  <text x="170" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Create activity for ALL followers</text>
  <text x="170" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Write: O(followers)</text>
  <text x="170" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Read: O(1) - fetch precomputed feed</text>
  <text x="170" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Best for: Regular users (&lt;10K followers)</text>
  
  <!-- Pull Model -->
  <rect x="360" y="70" width="280" height="160" rx="8" fill="#8b5cf6"/>
  <text x="500" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="white">Pull Model (Fan-out-on-read)</text>
  <text x="500" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">When user views feed:</text>
  <text x="500" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Fetch from all followed users</text>
  <text x="500" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Merge, sort, return</text>
  <text x="500" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Write: O(1)</text>
  <text x="500" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Read: O(following)</text>
  <text x="500" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Best for: Celebrities, high-following users</text>
  
  <!-- Hybrid Model -->
  <rect x="690" y="70" width="280" height="160" rx="8" fill="#10b981"/>
  <text x="830" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="white">Hybrid Model</text>
  <text x="830" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Push for regular users:</text>
  <text x="830" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Precompute feeds</text>
  <text x="830" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Pull for celebrities:</text>
  <text x="830" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Fetch on demand</text>
  <text x="830" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Best for: Platforms with mixed user types</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="260" width="900" height="170" rx="8" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Strategy Comparison</text>
  
  <!-- Table Header -->
  <rect x="60" y="295" width="880" height="30" fill="#f1f5f9"/>
  <text x="150" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#475569">Strategy</text>
  <text x="300" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#475569">Write Cost</text>
  <text x="450" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#475569">Read Cost</text>
  <text x="600" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#475569">Best For</text>
  <text x="800" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#475569">Used By</text>
  
  <!-- Table Rows -->
  <line x1="60" y1="325" x2="940" y2="325" stroke="#e2e8f0" stroke-width="1"/>
  <text x="150" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Push</text>
  <text x="300" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444">High O(followers)</text>
  <text x="450" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">Low O(1)</text>
  <text x="600" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Regular users</text>
  <text x="800" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Instagram, Twitter</text>
  
  <line x1="60" y1="355" x2="940" y2="355" stroke="#e2e8f0" stroke-width="1"/>
  <text x="150" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Pull</text>
  <text x="300" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#10b981">Low O(1)</text>
  <text x="450" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444">High O(following)</text>
  <text x="600" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Celebrities</text>
  <text x="800" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Twitter (celebs)</text>
  
  <line x1="60" y1="385" x2="940" y2="385" stroke="#e2e8f0" stroke-width="1"/>
  <text x="150" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Hybrid</text>
  <text x="300" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#f59e0b">Balanced</text>
  <text x="450" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#f59e0b">Balanced</text>
  <text x="600" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Mixed platforms</text>
  <text x="800" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Facebook, LinkedIn</text>
</svg>
