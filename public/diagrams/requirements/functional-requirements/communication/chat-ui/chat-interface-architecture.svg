<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="chatBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#chatBgGrad)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Chat Interface Architecture</text>
  
  <!-- Client Components -->
  <rect x="30" y="70" width="200" height="140" rx="8" fill="#3b82f6"/>
  <text x="130" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Client Components</text>
  <text x="130" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Message List (Virtualized)</text>
  <text x="130" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Input Component</text>
  <text x="130" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Connection Manager</text>
  <text x="130" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">State Management</text>
  <text x="130" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Local Cache (IndexedDB)</text>
  
  <!-- WebSocket Layer -->
  <rect x="280" y="70" width="200" height="140" rx="8" fill="#8b5cf6"/>
  <text x="380" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">WebSocket Layer</text>
  <text x="380" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Persistent Connection</text>
  <text x="380" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Heartbeat (Ping/Pong)</text>
  <text x="380" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Message Protocol</text>
  <text x="380" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Reconnection Logic</text>
  <text x="380" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Event Routing</text>
  
  <!-- Backend Services -->
  <rect x="530" y="70" width="200" height="140" rx="8" fill="#f59e0b"/>
  <text x="630" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Backend Services</text>
  <text x="630" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Message Routing</text>
  <text x="630" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Presence Service</text>
  <text x="630" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Typing Indicators</text>
  <text x="630" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Read Receipts</text>
  <text x="630" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Rate Limiting</text>
  
  <!-- Storage -->
  <rect x="780" y="70" width="190" height="140" rx="8" fill="#10b981"/>
  <text x="875" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Storage</text>
  <text x="875" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Message Database</text>
  <text x="875" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Conversation Index</text>
  <text x="875" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">User State</text>
  <text x="875" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Media Storage (S3)</text>
  
  <!-- Real-time Sync -->
  <rect x="100" y="260" width="220" height="100" rx="8" fill="#ec4899"/>
  <text x="210" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Real-time Synchronization</text>
  <text x="210" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Incoming Message Handler</text>
  <text x="210" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Optimistic Updates</text>
  <text x="210" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Conflict Resolution</text>
  
  <!-- UI State -->
  <rect x="370" y="260" width="220" height="100" rx="8" fill="#06b6d4"/>
  <text x="480" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">UI State Management</text>
  <text x="480" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Scroll Position</text>
  <text x="480" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Typing State</text>
  <text x="480" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Connection Status</text>
  
  <!-- Output -->
  <rect x="640" y="260" width="280" height="100" rx="8" fill="#6366f1"/>
  <text x="780" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">User Experience</text>
  <text x="700" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Instant Message Display</text>
  <text x="780" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Typing Indicators</text>
  <text x="860" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Status Updates</text>
  <text x="700" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Delivery/Read Receipts</text>
  <text x="800" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Offline Support</text>
  
  <!-- Arrows -->
  <path d="M 230 140 L 275 140" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="275,140 265,135 265,145" fill="#64748b"/>
  
  <path d="M 480 140 L 525 140" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="525,140 515,135 515,145" fill="#64748b"/>
  
  <path d="M 730 140 L 775 140" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="775,140 765,135 765,145" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 130 210 L 130 255" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 380 210 L 380 255" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 630 210 L 630 255" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Flow to output -->
  <path d="M 320 310 L 635 310" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <polygon points="635,310 625,305 625,315" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="400" width="900" height="80" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Message Flow</text>
  
  <circle cx="100" cy="450" r="8" fill="#3b82f6"/>
  <text x="120" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">User types and sends message</text>
  
  <circle cx="350" cy="450" r="8" fill="#8b5cf6"/>
  <text x="370" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">WebSocket transmits to server</text>
  
  <circle cx="600" cy="450" r="8" fill="#f59e0b"/>
  <text x="620" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Backend routes and persists</text>
  
  <circle cx="850" cy="450" r="8" fill="#10b981"/>
  <text x="870" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Storage for retrieval and sync</text>
</svg>
