<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="webrtcBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#webrtcBgGrad)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">WebRTC Architecture</text>
  
  <!-- Peer A -->
  <rect x="30" y="70" width="180" height="140" rx="8" fill="#3b82f6"/>
  <text x="120" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Peer A (Caller)</text>
  <text x="120" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">getUserMedia</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Create Offer</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Gather ICE</text>
  <text x="120" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Send to Peer B</text>
  <text x="120" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Receive Answer</text>
  <text x="120" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Media Flow</text>
  
  <!-- Signaling Server -->
  <rect x="410" y="70" width="180" height="140" rx="8" fill="#8b5cf6"/>
  <text x="500" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Signaling Server</text>
  <text x="500" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">WebSocket Server</text>
  <text x="500" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Exchange SDP</text>
  <text x="500" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Exchange ICE</text>
  <text x="500" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Room Management</text>
  <text x="500" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Not Part of WebRTC</text>
  <text x="500" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">(Custom Implementation)</text>
  
  <!-- Peer B -->
  <rect x="790" y="70" width="180" height="140" rx="8" fill="#10b981"/>
  <text x="880" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Peer B (Callee)</text>
  <text x="880" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Receive Offer</text>
  <text x="880" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Create Answer</text>
  <text x="880" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Gather ICE</text>
  <text x="880" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Send to Peer A</text>
  <text x="880" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Receive ICE</text>
  <text x="880" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Media Flow</text>
  
  <!-- STUN/TURN -->
  <rect x="250" y="260" width="200" height="110" rx="8" fill="#f59e0b"/>
  <text x="350" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">STUN Server</text>
  <text x="350" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Discover Public IP</text>
  <text x="350" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Server-Reflexive Candidates</text>
  <text x="350" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Free (Google Public STUN)</text>
  
  <rect x="550" y="260" width="200" height="110" rx="8" fill="#ec4899"/>
  <text x="650" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">TURN Server</text>
  <text x="650" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Relay Media (P2P Fails)</text>
  <text x="650" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Relayed Candidates</text>
  <text x="650" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Paid (Bandwidth Cost)</text>
  
  <!-- Media Flow -->
  <path d="M 210 140 C 350 140, 350 140, 405 140" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <text x="310" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">SDP/ICE</text>
  
  <path d="M 595 140 C 650 140, 650 140, 785 140" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <text x="690" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">SDP/ICE</text>
  
  <!-- Direct P2P Media -->
  <path d="M 210 180 C 500 220, 500 220, 785 180" stroke="#22c55e" stroke-width="3" fill="none"/>
  <text x="500" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#22c55e">Direct P2P Media (80%)</text>
  
  <!-- TURN Relay Media -->
  <path d="M 210 200 L 210 315 L 545 315" stroke="#ec4899" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 755 315 L 755 315 L 785 200" stroke="#ec4899" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <text x="500" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ec4899">TURN Relay (20% fallback)</text>
  
  <!-- Legend -->
  <rect x="50" y="400" width="900" height="80" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">WebRTC Flow</text>
  
  <circle cx="100" cy="455" r="8" fill="#3b82f6"/>
  <text x="120" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Peer A initiates call via signaling</text>
  
  <circle cx="350" cy="455" r="8" fill="#8b5cf6"/>
  <text x="370" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Signaling exchanges SDP/ICE (not media)</text>
  
  <circle cx="600" cy="455" r="8" fill="#10b981"/>
  <text x="620" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Peer B responds, direct P2P media established</text>
  
  <circle cx="850" cy="455" r="8" fill="#f59e0b"/>
  <text x="870" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">STUN/TURN assist NAT traversal</text>
</svg>
