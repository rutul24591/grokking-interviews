<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="webrtcBgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#webrtcBgGrad2)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Signaling Flow</text>
  
  <!-- Peer A -->
  <rect x="50" y="70" width="150" height="320" rx="8" fill="#3b82f6"/>
  <text x="125" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Peer A</text>
  
  <!-- Signaling -->
  <rect x="425" y="70" width="150" height="320" rx="8" fill="#8b5cf6"/>
  <text x="500" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Signaling</text>
  
  <!-- Peer B -->
  <rect x="800" y="70" width="150" height="320" rx="8" fill="#10b981"/>
  <text x="875" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Peer B</text>
  
  <!-- Step 1: Create Offer -->
  <rect x="70" y="130" width="110" height="40" rx="4" fill="#1e40af"/>
  <text x="125" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">1. Create Offer</text>
  <text x="125" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#e2e8f0">(SDP)</text>
  
  <!-- Arrow to Signaling -->
  <path d="M 200 150 L 420 150" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="420,150 410,145 410,155" fill="#64748b"/>
  <text x="310" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Send Offer</text>
  
  <!-- Step 2: Forward Offer -->
  <rect x="445" y="130" width="110" height="40" rx="4" fill="#6b21a8"/>
  <text x="500" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">2. Forward Offer</text>
  
  <!-- Arrow to Peer B -->
  <path d="M 575 150 L 795 150" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="795,150 785,145 785,155" fill="#64748b"/>
  
  <!-- Step 3: Create Answer -->
  <rect x="820" y="130" width="110" height="40" rx="4" fill="#047857"/>
  <text x="875" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">3. Create Answer</text>
  <text x="875" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#e2e8f0">(SDP)</text>
  
  <!-- Step 4: Send Answer -->
  <path d="M 795 190 L 575 190" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="575,190 585,185 585,195" fill="#64748b"/>
  <text x="685" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Send Answer</text>
  
  <rect x="445" y="170" width="110" height="40" rx="4" fill="#6b21a8"/>
  <text x="500" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">4. Forward Answer</text>
  
  <path d="M 420 190 L 200 190" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="200,190 210,185 210,195" fill="#64748b"/>
  
  <rect x="70" y="170" width="110" height="40" rx="4" fill="#1e40af"/>
  <text x="125" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">5. Receive Answer</text>
  
  <!-- ICE Candidate Exchange (Trickle) -->
  <text x="125" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">ICE Candidate Exchange</text>
  
  <!-- Peer A ICE -->
  <rect x="70" y="260" width="110" height="30" rx="4" fill="#1e40af"/>
  <text x="125" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white">Gather ICE A</text>
  
  <path d="M 180 275 L 420 275" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <text x="300" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#475569">Trickle ICE A</text>
  
  <!-- Peer B ICE -->
  <rect x="820" y="260" width="110" height="30" rx="4" fill="#047857"/>
  <text x="875" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white">Gather ICE B</text>
  
  <path d="M 795 275 L 575 275" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <text x="685" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#475569">Trickle ICE B</text>
  
  <!-- Connection Established -->
  <rect x="70" y="320" width="110" height="40" rx="4" fill="#22c55e"/>
  <text x="125" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="white">✓ Connected</text>
  <text x="125" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#e2e8f0">Media Flow</text>
  
  <rect x="820" y="320" width="110" height="40" rx="4" fill="#22c55e"/>
  <text x="875" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="white">✓ Connected</text>
  <text x="875" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#e2e8f0">Media Flow</text>
  
  <!-- Direct Media Path -->
  <path d="M 200 340 C 500 380, 500 380, 795 340" stroke="#22c55e" stroke-width="3" fill="none"/>
  <text x="500" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#22c55e">Direct P2P Media</text>
  
  <!-- Timeline -->
  <rect x="300" y="400" width="400" height="30" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="500" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Time: Offer → Answer → ICE Exchange → Connected (~1-3 seconds)</text>
  
  <!-- Legend -->
  <rect x="50" y="445" width="900" height="25" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="463" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Signaling: Offer/Answer (SDP) + ICE Candidates → Direct P2P Media</text>
</svg>
