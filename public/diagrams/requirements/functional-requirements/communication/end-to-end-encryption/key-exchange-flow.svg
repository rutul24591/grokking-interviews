<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="e2eeBgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#e2eeBgGrad2)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Key Exchange Flow (X3DH)</text>
  
  <!-- Pre-Key Generation -->
  <rect x="50" y="70" width="200" height="110" rx="8" fill="#3b82f6"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">1. Pre-Key Generation</text>
  <text x="150" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Identity Key Pair (IK)</text>
  <text x="150" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Signed Pre-Key (SPK)</text>
  <text x="150" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">One-Time Pre-Keys (OPK)</text>
  <text x="150" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Upload Public Keys to Server</text>
  
  <!-- Key Fetch -->
  <rect x="300" y="70" width="200" height="110" rx="8" fill="#8b5cf6"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">2. Sender Fetches Keys</text>
  <text x="400" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Request Recipient's Keys</text>
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Server Returns: IK, SPK, OPK</text>
  <text x="400" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Mark OPK as Consumed</text>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Generate Ephemeral Key (EK)</text>
  
  <!-- Shared Secret -->
  <rect x="550" y="70" width="200" height="110" rx="8" fill="#f59e0b"/>
  <text x="650" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">3. Compute Shared Secret</text>
  <text x="650" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">DH1: Sender_IK × Recipient_SPK</text>
  <text x="650" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">DH2: Sender_EK × Recipient_IK</text>
  <text x="650" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">DH3: Sender_EK × Recipient_SPK</text>
  <text x="650" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">DH4: Sender_EK × Recipient_OPK</text>
  
  <!-- Session Init -->
  <rect x="800" y="70" width="170" height="110" rx="8" fill="#10b981"/>
  <text x="885" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">4. Initialize Session</text>
  <text x="885" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">KDF(DH1, DH2, DH3, DH4)</text>
  <text x="885" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Shared Secret</text>
  <text x="885" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Initialize Double Ratchet</text>
  <text x="885" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Ready to Encrypt</text>
  
  <!-- DH Computation Detail -->
  <rect x="100" y="220" width="380" height="130" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="290" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Diffie-Hellman Computation</text>
  <text x="290" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Sender Private × Recipient Public = Shared</text>
  <text x="290" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Recipient Private × Sender Public = Same Shared</text>
  <text x="290" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Eavesdropper sees only Public Keys</text>
  <text x="290" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Cannot compute Shared Secret</text>
  
  <!-- Key Types -->
  <rect x="530" y="220" width="370" height="130" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Key Types and Rotation</text>
  <text x="715" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Identity Key (IK): Long-term, app install</text>
  <text x="715" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Signed Pre-Key (SPK): Medium-term, weekly</text>
  <text x="715" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">One-Time Pre-Key (OPK): Single use, batch of 100</text>
  <text x="715" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Ephemeral Key (EK): Per session</text>
  
  <!-- Timeline -->
  <rect x="150" y="380" width="700" height="50" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="500" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#065f46">X3DH Timeline: Generate Keys → Upload → Fetch → Compute DH → KDF → Session Ready</text>
  
  <!-- Arrows between steps -->
  <path d="M 250 125 L 295 125" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="295,125 285,120 285,130" fill="#64748b"/>
  
  <path d="M 500 125 L 545 125" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="545,125 535,120 535,130" fill="#64748b"/>
  
  <path d="M 750 125 L 795 125" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="795,125 785,120 785,130" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="445" width="900" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">X3DH: Asynchronous key exchange enabling E2EE even when recipient offline</text>
</svg>
