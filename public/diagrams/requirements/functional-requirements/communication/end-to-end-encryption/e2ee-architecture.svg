<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="e2eeBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#e2eeBgGrad)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">E2EE Architecture</text>
  
  <!-- Sender Device -->
  <rect x="30" y="70" width="200" height="140" rx="8" fill="#3b82f6"/>
  <text x="130" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Sender Device</text>
  <text x="130" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Generate Message</text>
  <text x="130" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Derive Message Key</text>
  <text x="130" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Encrypt: AES-256</text>
  <text x="130" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Compute MAC</text>
  <text x="130" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Send Ciphertext</text>
  
  <!-- Server -->
  <rect x="400" y="70" width="200" height="140" rx="8" fill="#8b5cf6"/>
  <text x="500" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Server (Untrusted)</text>
  <text x="500" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Receive Ciphertext</text>
  <text x="500" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Cannot Decrypt</text>
  <text x="500" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Store in Queue</text>
  <text x="500" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Relay to Recipient</text>
  <text x="500" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Sees: Metadata Only</text>
  
  <!-- Recipient Device -->
  <rect x="770" y="70" width="200" height="140" rx="8" fill="#10b981"/>
  <text x="870" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Recipient Device</text>
  <text x="870" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Receive Ciphertext</text>
  <text x="870" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Derive Message Key</text>
  <text x="870" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Verify MAC</text>
  <text x="870" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Decrypt: AES-256</text>
  <text x="870" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Display Plaintext</text>
  
  <!-- Key Exchange -->
  <rect x="150" y="260" width="280" height="120" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="290" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Key Exchange (X3DH)</text>
  <text x="290" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">1. Fetch Recipient's Keys from Server</text>
  <text x="290" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">2. Compute Shared Secret (DH)</text>
  <text x="290" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">3. Initialize Double Ratchet</text>
  <text x="290" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">4. Generate Message Keys</text>
  
  <!-- Double Ratchet -->
  <rect x="530" y="260" width="320" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="690" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Double Ratchet</text>
  <text x="690" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Root Chain → Message Chains</text>
  <text x="690" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Each Message: New Key</text>
  <text x="690" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Forward Secrecy: Past Safe</text>
  <text x="690" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Post-Compromise: Future Safe</text>
  
  <!-- Encryption Flow -->
  <rect x="100" y="410" width="380" height="60" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="290" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Encryption: Plaintext → AES-256(Message Key) → Ciphertext + MAC</text>
  
  <rect x="520" y="410" width="380" height="60" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="710" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#065f46">Decryption: Ciphertext + MAC → Verify → AES-256(Message Key) → Plaintext</text>
  
  <!-- Arrows -->
  <path d="M 230 140 L 395 140" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="395,140 385,135 385,145" fill="#64748b"/>
  <text x="312" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Ciphertext</text>
  
  <path d="M 600 140 L 765 140" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="765,140 755,135 755,145" fill="#64748b"/>
  <text x="682" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Ciphertext</text>
  
  <!-- Legend -->
  <rect x="50" y="485" width="900" height="25" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="503" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">E2EE Flow: Sender encrypts → Server relays (can't decrypt) → Recipient decrypts</text>
</svg>
