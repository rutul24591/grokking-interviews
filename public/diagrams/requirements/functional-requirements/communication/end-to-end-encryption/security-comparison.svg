<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="e2eeBgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#e2eeBgGrad4)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Security Comparison</text>
  
  <!-- E2EE -->
  <rect x="50" y="70" width="270" height="160" rx="8" fill="#3b82f6"/>
  <text x="185" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="white">End-to-End Encryption</text>
  <text x="185" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Only endpoints can decrypt</text>
  <text x="185" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Pros:</text>
  <text x="185" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Maximum privacy</text>
  <text x="185" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Server breach safe</text>
  <text x="185" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Legal resistance</text>
  <text x="185" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Cons:</text>
  <text x="185" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• No server features</text>
  <text x="185" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Key management burden</text>
  
  <!-- Server-Side -->
  <rect x="370" y="70" width="270" height="160" rx="8" fill="#8b5cf6"/>
  <text x="505" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="white">Server-Side Encryption</text>
  <text x="505" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Server holds decryption keys</text>
  <text x="505" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Pros:</text>
  <text x="505" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Server features (search)</text>
  <text x="505" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Easy backup/recovery</text>
  <text x="505" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Compliance friendly</text>
  <text x="505" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Cons:</text>
  <text x="505" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Server breach exposes all</text>
  <text x="505" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Legal compulsion possible</text>
  
  <!-- Hybrid -->
  <rect x="690" y="70" width="260" height="160" rx="8" fill="#f59e0b"/>
  <text x="820" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="white">Hybrid (E2EE + Backup)</text>
  <text x="820" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">E2EE with encrypted backup</text>
  <text x="820" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Pros:</text>
  <text x="820" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Privacy + recovery</text>
  <text x="820" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• User controls backup key</text>
  <text x="820" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Server can't decrypt</text>
  <text x="820" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Cons:</text>
  <text x="820" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Password loss = data loss</text>
  <text x="820" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• More complex implementation</text>
  
  <!-- Attack Resistance -->
  <rect x="100" y="270" width="380" height="100" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="290" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Attack Resistance Comparison</text>
  <text x="290" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Server Breach: E2EE ✓ | Server-Side ✗ | Hybrid ✓</text>
  <text x="290" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Legal Compulsion: E2EE ✓ | Server-Side ✗ | Hybrid ✓</text>
  <text x="290" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">MITM Attack: E2EE (with verification) | Server-Side ✗ | Hybrid (with verification)</text>
  
  <!-- Use Case Recommendations -->
  <rect x="530" y="270" width="370" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Use Case Recommendations</text>
  <text x="715" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Privacy-Focused: E2EE (Signal, WhatsApp)</text>
  <text x="715" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Enterprise: Server-Side (compliance)</text>
  <text x="715" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Consumer: Hybrid (iMessage, Telegram Secret)</text>
  
  <!-- Security Levels -->
  <rect x="150" y="400" width="230" height="35" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="265" y="422" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">E2EE: Maximum Security</text>
  
  <rect x="400" y="400" width="230" height="35" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="515" y="422" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">Hybrid: Balanced Security</text>
  
  <rect x="650" y="400" width="230" height="35" rx="8" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
  <text x="765" y="422" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#475569">Server-Side: Minimum Security</text>
  
  <!-- Arrows between top boxes -->
  <path d="M 320 150 L 365 150" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="365,150 355,145 355,155" fill="#64748b"/>
  
  <path d="M 640 150 L 685 150" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="685,150 675,145 675,155" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="450" width="900" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Security Trade-offs: E2EE (privacy) vs Server-Side (features) vs Hybrid (balance)</text>
</svg>
