<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="mediaBgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#mediaBgGrad3)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Compression Strategies</text>
  
  <!-- Image Compression -->
  <rect x="50" y="70" width="280" height="140" rx="8" fill="#3b82f6"/>
  <text x="190" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Image Compression</text>
  <text x="190" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Client-Side:</text>
  <text x="190" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Resize to max 1920px</text>
  <text x="190" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• JPEG/WebP 80% quality</text>
  <text x="190" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Thumbnail 256x256</text>
  <text x="190" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Server-Side:</text>
  <text x="190" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Convert to WebP</text>
  <text x="190" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Generate sizes: 256, 1024, original</text>
  
  <!-- Video Compression -->
  <rect x="370" y="70" width="280" height="140" rx="8" fill="#8b5cf6"/>
  <text x="510" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Video Compression</text>
  <text x="510" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Client-Side:</text>
  <text x="510" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Extract thumbnail (first frame)</text>
  <text x="510" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Limit length (optional)</text>
  <text x="510" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Server-Side:</text>
  <text x="510" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Transcode to MP4 (H.264)</text>
  <text x="510" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Resolutions: 360p, 720p, 1080p</text>
  <text x="510" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Adaptive streaming (HLS)</text>
  
  <!-- Document Processing -->
  <rect x="690" y="70" width="260" height="140" rx="8" fill="#f59e0b"/>
  <text x="820" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Document Processing</text>
  <text x="820" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Server-Side:</text>
  <text x="820" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Generate thumbnail (first page)</text>
  <text x="820" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Extract text (OCR)</text>
  <text x="820" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• PDF optimization</text>
  <text x="820" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Virus scan</text>
  <text x="820" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Store original + thumbnail</text>
  
  <!-- Compression Comparison -->
  <rect x="100" y="250" width="380" height="110" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="290" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Compression Impact</text>
  <text x="290" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Original: 5MB JPEG → Compressed: 500KB WebP (90% reduction)</text>
  <text x="290" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Upload Time: 30s → 3s (10x faster on 1Mbps)</text>
  <text x="290" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Storage: 10x more files same cost</text>
  
  <!-- Size Limits -->
  <rect x="530" y="250" width="370" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Typical Size Limits</text>
  <text x="715" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Images: 10-20MB (before compression)</text>
  <text x="715" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Videos: 100MB-1GB (varies by platform)</text>
  <text x="715" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Documents: 100MB-2GB</text>
  <text x="715" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">After compression: 1-10MB typical</text>
  
  <!-- Format Support -->
  <rect x="150" y="390" width="230" height="40" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="265" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Input: JPEG, PNG, HEIC, GIF</text>
  
  <rect x="400" y="390" width="230" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="515" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">Output: WebP + Original</text>
  
  <rect x="650" y="390" width="230" height="40" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="765" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#065f46">Sizes: Thumbnail, Preview, Full</text>
  
  <!-- Arrows between top boxes -->
  <path d="M 330 140 L 365 140" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="365,140 355,135 355,145" fill="#64748b"/>
  
  <path d="M 650 140 L 685 140" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="685,140 675,135 675,145" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="445" width="900" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Compression: Client (fast upload) + Server (optimization) = Best UX</text>
</svg>
