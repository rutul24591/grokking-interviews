<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="notifDelBgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#notifDelBgGrad4)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Channel Selection Strategies</text>
  
  <!-- Push Channel -->
  <rect x="50" y="70" width="200" height="130" rx="8" fill="#3b82f6"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Push Notifications</text>
  <text x="150" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">APNs (iOS), FCM (Android)</text>
  <text x="150" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Best For:</text>
  <text x="150" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Time-sensitive alerts</text>
  <text x="150" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Messages, mentions</text>
  <text x="150" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• High engagement</text>
  
  <!-- Email Channel -->
  <rect x="300" y="70" width="200" height="130" rx="8" fill="#8b5cf6"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Email</text>
  <text x="400" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">SMTP, SendGrid, SES</text>
  <text x="400" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Best For:</text>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Digests, summaries</text>
  <text x="400" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Non-urgent updates</text>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Detailed content</text>
  
  <!-- SMS Channel -->
  <rect x="550" y="70" width="200" height="130" rx="8" fill="#f59e0b"/>
  <text x="650" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">SMS</text>
  <text x="650" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Twilio, Vonage</text>
  <text x="650" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Best For:</text>
  <text x="650" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Critical alerts</text>
  <text x="650" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• 2FA, security</text>
  <text x="650" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Account issues</text>
  
  <!-- In-App Channel -->
  <rect x="800" y="70" width="170" height="130" rx="8" fill="#10b981"/>
  <text x="885" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">In-App</text>
  <text x="885" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Notification Center</text>
  <text x="885" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Best For:</text>
  <text x="885" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Non-urgent updates</text>
  <text x="885" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Feature announcements</text>
  <text x="885" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Contextual hints</text>
  
  <!-- Channel Selection Logic -->
  <rect x="100" y="240" width="380" height="120" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="290" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Channel Selection Logic</text>
  <text x="290" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">1. Check user's enabled channels</text>
  <text x="290" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">2. Check notification type → channel mapping</text>
  <text x="290" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">3. Check engagement history per channel</text>
  <text x="290" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">4. Select highest scoring channel</text>
  <text x="290" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">5. Fallback to secondary on failure</text>
  
  <!-- Fallback Strategy -->
  <rect x="530" y="240" width="370" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Fallback Strategy</text>
  <text x="715" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Primary Channel Fails → Try Secondary</text>
  <text x="715" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Push Undelivered → Try Email</text>
  <text x="715" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Email Bounced → Try Push</text>
  <text x="715" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Critical: Escalate to SMS</text>
  
  <!-- Channel Comparison -->
  <rect x="100" y="380" width="180" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="190" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Push: Free, Limited</text>
  <text x="190" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">~2-3/hour platform limit</text>
  
  <rect x="300" y="380" width="180" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="390" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">Email: Free, Unlimited</text>
  <text x="390" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Risk: Spam folder</text>
  
  <rect x="500" y="380" width="180" height="50" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
  <text x="590" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#065f46">SMS: Paid, Critical</text>
  <text x="590" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">~$0.01-0.05/message</text>
  
  <rect x="700" y="380" width="180" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="790" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#3730a3">In-App: Free, Limited</text>
  <text x="790" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Only when app open</text>
  
  <!-- Arrows between top boxes -->
  <path d="M 250 135 L 295 135" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="295,135 285,130 285,140" fill="#64748b"/>
  
  <path d="M 500 135 L 545 135" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="545,135 535,130 535,140" fill="#64748b"/>
  
  <path d="M 750 135 L 795 135" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="795,135 785,130 785,140" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="450" width="900" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Multi-channel routing with fallback: Push → Email → SMS (escalating cost and urgency)</text>
</svg>
