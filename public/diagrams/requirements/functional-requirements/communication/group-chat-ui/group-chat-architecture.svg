<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="groupBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#groupBgGrad)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Group Chat Architecture</text>
  
  <!-- Client UI -->
  <rect x="30" y="70" width="180" height="120" rx="8" fill="#3b82f6"/>
  <text x="120" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Client UI</text>
  <text x="120" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Conversation View</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Member List</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Mention Autocomplete</text>
  <text x="120" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Group Info Panel</text>
  
  <!-- Member Management -->
  <rect x="260" y="70" width="180" height="120" rx="8" fill="#8b5cf6"/>
  <text x="350" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Member Management</text>
  <text x="350" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Add/Remove Members</text>
  <text x="350" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Role Assignment</text>
  <text x="350" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Invite Links</text>
  <text x="350" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Member Sync</text>
  
  <!-- Message Fan-out -->
  <rect x="490" y="70" width="180" height="120" rx="8" fill="#f59e0b"/>
  <text x="580" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Message Fan-out</text>
  <text x="580" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Small Groups: Push All</text>
  <text x="580" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Large Groups: Queue</text>
  <text x="580" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Mention Routing</text>
  <text x="580" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Delivery Tracking</text>
  
  <!-- Admin System -->
  <rect x="720" y="70" width="180" height="120" rx="8" fill="#10b981"/>
  <text x="810" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Admin System</text>
  <text x="810" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Permission Validation</text>
  <text x="810" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Moderation Tools</text>
  <text x="810" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Audit Trail</text>
  <text x="810" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Approval Queue</text>
  
  <!-- Group Storage -->
  <rect x="150" y="240" width="200" height="100" rx="8" fill="#ec4899"/>
  <text x="250" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Group Storage</text>
  <text x="250" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Group Metadata</text>
  <text x="250" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Membership Table</text>
  <text x="250" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Role Permissions</text>
  
  <!-- Notification Service -->
  <rect x="400" y="240" width="200" height="100" rx="8" fill="#06b6d4"/>
  <text x="500" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Notification Service</text>
  <text x="500" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Mention Notifications</text>
  <text x="500" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Group Settings</text>
  <text x="500" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Priority Routing</text>
  
  <!-- Scaling Infrastructure -->
  <rect x="650" y="240" width="200" height="100" rx="8" fill="#6366f1"/>
  <text x="750" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Scaling Infrastructure</text>
  <text x="750" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Message Queue (Kafka)</text>
  <text x="750" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Presence Service</text>
  <text x="750" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">CDN for Large Groups</text>
  
  <!-- Arrows -->
  <path d="M 210 130 L 255 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="255,130 245,125 245,135" fill="#64748b"/>
  
  <path d="M 440 130 L 485 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="485,130 475,125 475,135" fill="#64748b"/>
  
  <path d="M 670 130 L 715 130" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="715,130 705,125 705,135" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 120 190 L 120 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 350 190 L 350 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 580 190 L 580 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 810 190 L 810 235" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Flow between bottom layers -->
  <path d="M 350 290 L 395 290" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="395,290 385,285 385,295" fill="#64748b"/>
  
  <path d="M 600 290 L 645 290" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="645,290 635,285 635,295" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="380" width="900" height="100" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Group Chat Flow</text>
  
  <circle cx="100" cy="435" r="8" fill="#3b82f6"/>
  <text x="120" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">User sends message with mentions</text>
  
  <circle cx="350" cy="435" r="8" fill="#8b5cf6"/>
  <text x="370" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Member management validates permissions</text>
  
  <circle cx="600" cy="435" r="8" fill="#f59e0b"/>
  <text x="620" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Message fanned-out to all members</text>
  
  <circle cx="850" cy="435" r="8" fill="#10b981"/>
  <text x="870" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Admin system logs and moderates</text>
</svg>
