<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="offlineBgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#offlineBgGrad2)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Sync on Reconnect</text>
  
  <!-- Client Reconnects -->
  <rect x="50" y="70" width="180" height="100" rx="8" fill="#3b82f6"/>
  <text x="140" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">1. Client Reconnects</text>
  <text x="140" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Detect Network</text>
  <text x="140" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Establish Connection</text>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Authenticate User</text>
  
  <!-- Send Sync Request -->
  <rect x="280" y="70" width="180" height="100" rx="8" fill="#8b5cf6"/>
  <text x="370" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">2. Send Sync Request</text>
  <text x="370" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">user_id</text>
  <text x="370" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">last_message_id</text>
  <text x="370" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">batch_size (50-100)</text>
  
  <!-- Server Query -->
  <rect x="510" y="70" width="180" height="100" rx="8" fill="#f59e0b"/>
  <text x="600" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">3. Server Query</text>
  <text x="600" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">WHERE recipient_id = user</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">AND id &gt; last_message_id</text>
  <text x="600" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">ORDER BY id ASC</text>
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">LIMIT batch_size</text>
  
  <!-- Return Batch -->
  <rect x="740" y="70" width="180" height="100" rx="8" fill="#10b981"/>
  <text x="830" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">4. Return Batch</text>
  <text x="830" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">messages[]</text>
  <text x="830" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">has_more: bool</text>
  <text x="830" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">next_cursor: id</text>
  <text x="830" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">unread_count: int</text>
  
  <!-- Client Process -->
  <rect x="150" y="220" width="200" height="100" rx="8" fill="#ec4899"/>
  <text x="250" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">5. Client Process</text>
  <text x="250" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Render Messages</text>
  <text x="250" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Update Local State</text>
  <text x="250" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Send ACK</text>
  
  <!-- Mark Delivered -->
  <rect x="400" y="220" width="200" height="100" rx="8" fill="#06b6d4"/>
  <text x="500" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">6. Mark Delivered</text>
  <text x="500" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">On ACK Received</text>
  <text x="500" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Update delivery_status</text>
  <text x="500" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Delete from Queue</text>
  
  <!-- Continue? -->
  <rect x="650" y="220" width="200" height="100" rx="8" fill="#6366f1"/>
  <text x="750" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">7. Continue?</text>
  <text x="750" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">If has_more = true:</text>
  <text x="750" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Request Next Batch</text>
  <text x="750" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">If has_more = false:</text>
  <text x="750" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Sync Complete</text>
  
  <!-- Arrows -->
  <path d="M 230 120 L 275 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="275,120 265,115 265,125" fill="#64748b"/>
  
  <path d="M 460 120 L 505 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="505,120 495,115 495,125" fill="#64748b"/>
  
  <path d="M 690 120 L 735 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="735,120 725,115 725,125" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 370 170 L 370 215" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 830 170 L 830 215 L 750 215" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Loop back arrow -->
  <path d="M 650 270 L 605 270" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="605,270 615,265 615,275" fill="#64748b"/>
  <text x="627" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">has_more</text>
  
  <!-- Legend -->
  <rect x="50" y="350" width="900" height="80" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Sync Flow</text>
  
  <circle cx="100" cy="400" r="8" fill="#3b82f6"/>
  <text x="120" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Client reconnects after offline</text>
  
  <circle cx="350" cy="400" r="8" fill="#8b5cf6"/>
  <text x="370" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Request sync with last_message_id</text>
  
  <circle cx="600" cy="400" r="8" fill="#f59e0b"/>
  <text x="620" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Server queries pending messages</text>
  
  <circle cx="850" cy="400" r="8" fill="#10b981"/>
  <text x="870" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Paginated delivery until complete</text>
</svg>
