<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="offlineBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#offlineBgGrad)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Offline Queue Architecture</text>
  
  <!-- Sender -->
  <rect x="30" y="70" width="140" height="90" rx="8" fill="#3b82f6"/>
  <text x="100" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Sender</text>
  <text x="100" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Sends Message</text>
  <text x="100" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Recipient Offline</text>
  
  <!-- Queue Storage -->
  <rect x="220" y="70" width="200" height="90" rx="8" fill="#8b5cf6"/>
  <text x="320" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Queue Storage</text>
  <text x="320" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Database Table</text>
  <text x="320" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">+ Redis Cache</text>
  <text x="320" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">TTL: 30-90 days</text>
  
  <!-- Push Service -->
  <rect x="470" y="70" width="180" height="90" rx="8" fill="#f59e0b"/>
  <text x="560" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Push Service</text>
  <text x="560" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">APNs / FCM</text>
  <text x="560" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Wake Device</text>
  <text x="560" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Throttled</text>
  
  <!-- Recipient Offline -->
  <rect x="700" y="70" width="150" height="90" rx="8" fill="#64748b"/>
  <text x="775" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Recipient</text>
  <text x="775" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Status: Offline</text>
  <text x="775" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Messages Queued</text>
  
  <!-- Reconnect Flow -->
  <rect x="150" y="210" width="250" height="120" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="275" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Reconnect Flow</text>
  <text x="275" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">1. User Reconnects</text>
  <text x="275" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">2. Send last_message_id</text>
  <text x="275" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">3. Server Returns Pending</text>
  <text x="275" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">4. Paginated Sync</text>
  <text x="275" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">5. Mark Delivered</text>
  
  <!-- Expiration Job -->
  <rect x="450" y="210" width="220" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="560" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Expiration Job</text>
  <text x="560" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Runs Hourly</text>
  <text x="560" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Query: created_at &lt; (now - TTL)</text>
  <text x="560" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Batch Delete (1000/chunk)</text>
  <text x="560" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Log Expired Count</text>
  <text x="560" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Optional: Notify Sender</text>
  
  <!-- Sync Service -->
  <rect x="720" y="210" width="200" height="120" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="820" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#065f46">Sync Service</text>
  <text x="820" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Incremental Sync</text>
  <text x="820" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Priority Ordering</text>
  <text x="820" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Idempotent Delivery</text>
  <text x="820" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Delivery Confirmation</text>
  
  <!-- Monitoring -->
  <rect x="300" y="370" width="400" height="80" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="500" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Monitoring &amp; Alerts</text>
  <text x="500" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Queue Depth | Delivery Latency | Expiration Rate | Push Success Rate | Reconnect Storm Detection</text>
  
  <!-- Arrows -->
  <path d="M 170 115 L 215 115" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="215,115 205,110 205,120" fill="#64748b"/>
  <text x="192" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Queue</text>
  
  <path d="M 420 115 L 465 115" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="465,115 455,110 455,120" fill="#64748b"/>
  <text x="442" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Push</text>
  
  <path d="M 650 115 L 695 115" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="695,115 685,110 685,120" fill="#64748b"/>
  <text x="672" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Wait</text>
  
  <!-- Reconnect arrow -->
  <path d="M 775 160 L 775 205" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <text x="785" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Reconnect</text>
  
  <!-- Legend -->
  <rect x="50" y="470" width="900" height="25" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Messages queued for offline users, delivered on reconnect with push wake-up and TTL expiration</text>
</svg>
