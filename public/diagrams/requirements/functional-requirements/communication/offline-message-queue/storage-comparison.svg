<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="offlineBgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#offlineBgGrad4)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Storage Comparison</text>
  
  <!-- Database -->
  <rect x="50" y="70" width="270" height="160" rx="8" fill="#3b82f6"/>
  <text x="185" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="white">Database Storage</text>
  <text x="185" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">MySQL, PostgreSQL, Cassandra</text>
  <text x="185" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Pros:</text>
  <text x="185" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Durable (disk-based)</text>
  <text x="185" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Queryable (SQL/NoSQL)</text>
  <text x="185" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Transactional</text>
  <text x="185" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Cons:</text>
  <text x="185" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Database load at scale</text>
  <text x="185" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Expensive for billions</text>
  
  <!-- Message Queue -->
  <rect x="370" y="70" width="270" height="160" rx="8" fill="#8b5cf6"/>
  <text x="505" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="white">Message Queue</text>
  <text x="505" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Kafka, RabbitMQ, SQS</text>
  <text x="505" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Pros:</text>
  <text x="505" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• High throughput</text>
  <text x="505" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Built-in retention</text>
  <text x="505" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Replay capability</text>
  <text x="505" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Cons:</text>
  <text x="505" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Retention-based expiry</text>
  <text x="505" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• More complex ops</text>
  
  <!-- Cache -->
  <rect x="690" y="70" width="270" height="160" rx="8" fill="#f59e0b"/>
  <text x="825" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="white">Cache (Redis)</text>
  <text x="825" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Redis, Memcached</text>
  <text x="825" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Pros:</text>
  <text x="825" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Fast access (memory)</text>
  <text x="825" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Auto TTL expiration</text>
  <text x="825" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Simple API</text>
  <text x="825" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="white">Cons:</text>
  <text x="825" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Volatile (memory)</text>
  <text x="825" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Expensive for large queues</text>
  
  <!-- Recommendation -->
  <rect x="150" y="270" width="700" height="120" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="500" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#3730a3">Recommended: Hybrid Approach</text>
  <text x="500" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Database (source of truth) + Redis Cache (fast access)</text>
  <text x="500" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">• Write to both database and cache</text>
  <text x="500" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">• Read from cache, fallback to database</text>
  <text x="500" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">• Cache TTL matches message TTL</text>
  
  <!-- Use Cases -->
  <rect x="100" y="410" width="250" height="30" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="225" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#92400e">Database: Production messaging</text>
  
  <rect x="380" y="410" width="240" height="30" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="500" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#065f46">Queue: High-volume async</text>
  
  <rect x="650" y="410" width="250" height="30" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="775" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#991b1b">Cache: Short-term offline only</text>
</svg>
