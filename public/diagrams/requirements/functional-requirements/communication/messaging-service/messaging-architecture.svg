<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="msgBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#msgBgGrad)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Messaging Service Architecture</text>
  
  <!-- Client Layer -->
  <rect x="30" y="70" width="170" height="100" rx="8" fill="#3b82f6"/>
  <text x="115" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Client Layer</text>
  <text x="115" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Mobile Apps</text>
  <text x="115" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Web Clients</text>
  <text x="115" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Desktop Apps</text>
  
  <!-- Gateway Layer -->
  <rect x="250" y="70" width="180" height="100" rx="8" fill="#8b5cf6"/>
  <text x="340" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Gateway Layer</text>
  <text x="340" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">WebSocket Servers</text>
  <text x="340" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Connection Mgmt</text>
  <text x="340" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Authentication</text>
  
  <!-- Routing Layer -->
  <rect x="480" y="70" width="180" height="100" rx="8" fill="#f59e0b"/>
  <text x="570" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Routing Layer</text>
  <text x="570" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Message Router</text>
  <text x="570" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Connection Registry</text>
  <text x="570" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Presence Service</text>
  
  <!-- Processing Layer -->
  <rect x="710" y="70" width="180" height="100" rx="8" fill="#10b981"/>
  <text x="800" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Processing Layer</text>
  <text x="800" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Content Moderation</text>
  <text x="800" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Rate Limiting</text>
  <text x="800" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Enrichment</text>
  
  <!-- Persistence -->
  <rect x="150" y="220" width="200" height="100" rx="8" fill="#ec4899"/>
  <text x="250" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Persistence Layer</text>
  <text x="250" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Message Database</text>
  <text x="250" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">(Cassandra/DynamoDB)</text>
  <text x="250" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Write-Ahead Log</text>
  
  <!-- Delivery Layer -->
  <rect x="400" y="220" width="200" height="100" rx="8" fill="#06b6d4"/>
  <text x="500" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Delivery Layer</text>
  <text x="500" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Online Delivery</text>
  <text x="500" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Offline Queue</text>
  <text x="500" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Push Service</text>
  
  <!-- Message Queue -->
  <rect x="650" y="220" width="200" height="100" rx="8" fill="#6366f1"/>
  <text x="750" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Message Queue</text>
  <text x="750" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Kafka/RabbitMQ</text>
  <text x="750" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Buffer &amp; Decouple</text>
  <text x="750" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Async Processing</text>
  
  <!-- Arrows -->
  <path d="M 200 120 L 245 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="245,120 235,115 235,125" fill="#64748b"/>
  
  <path d="M 430 120 L 475 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="475,120 465,115 465,125" fill="#64748b"/>
  
  <path d="M 660 120 L 705 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="705,120 695,115 695,125" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 340 170 L 340 215" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 570 170 L 570 215" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 800 170 L 800 215" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Flow between bottom layers -->
  <path d="M 350 270 L 395 270" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="395,270 385,265 385,275" fill="#64748b"/>
  
  <path d="M 600 270 L 645 270" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="645,270 635,265 635,275" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="360" width="900" height="120" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Message Flow</text>
  
  <circle cx="100" cy="410" r="8" fill="#3b82f6"/>
  <text x="120" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Client sends message via WebSocket</text>
  
  <circle cx="400" cy="410" r="8" fill="#8b5cf6"/>
  <text x="420" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Gateway authenticates and routes</text>
  
  <circle cx="700" cy="410" r="8" fill="#f59e0b"/>
  <text x="720" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Router looks up recipient connection</text>
  
  <circle cx="150" cy="445" r="8" fill="#10b981"/>
  <text x="170" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Processing validates and enriches</text>
  
  <circle cx="450" cy="445" r="8" fill="#ec4899"/>
  <text x="470" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Persistence stores durably</text>
  
  <circle cx="750" cy="445" r="8" fill="#06b6d4"/>
  <text x="770" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Delivery pushes to recipient</text>
</svg>
