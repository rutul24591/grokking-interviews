<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="smsBgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#smsBgGrad2)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Compliance Flow</text>
  
  <!-- Opt-in Check -->
  <rect x="50" y="70" width="180" height="110" rx="8" fill="#3b82f6"/>
  <text x="140" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">1. Opt-in Check</text>
  <text x="140" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Check Database</text>
  <text x="140" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Opt-in Status</text>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Opt-in Source</text>
  <text x="140" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">If No → Block</text>
  
  <!-- Quiet Hours -->
  <rect x="280" y="70" width="180" height="110" rx="8" fill="#8b5cf6"/>
  <text x="370" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">2. Quiet Hours</text>
  <text x="370" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Check Local Time</text>
  <text x="370" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">9 PM - 8 AM Block</text>
  <text x="370" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Marketing: Block</text>
  <text x="370" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Transactional: Allow</text>
  
  <!-- STOP Check -->
  <rect x="510" y="70" width="180" height="110" rx="8" fill="#f59e0b"/>
  <text x="600" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">3. STOP Check</text>
  <text x="600" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Check Opt-out List</text>
  <text x="600" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">STOP Keyword</text>
  <text x="600" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">If STOP → Block</text>
  <text x="600" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Send Confirmation</text>
  
  <!-- Send SMS -->
  <rect x="740" y="70" width="180" height="110" rx="8" fill="#10b981"/>
  <text x="830" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">4. Send SMS</text>
  <text x="830" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">All Checks Pass</text>
  <text x="830" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Queue for Sending</text>
  <text x="830" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Track Delivery</text>
  <text x="830" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Log for Compliance</text>
  
  <!-- STOP Handling Flow -->
  <rect x="100" y="220" width="380" height="130" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="290" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">STOP Keyword Handling</text>
  <text x="290" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Incoming SMS: "STOP"</text>
  <text x="290" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">→ Webhook triggers immediately</text>
  <text x="290" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">→ Mark number as opted-out</text>
  <text x="290" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">→ Send confirmation: "You are unsubscribed"</text>
  <text x="290" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">→ Suppress from all marketing (within seconds)</text>
  
  <!-- Quiet Hours Detail -->
  <rect x="530" y="220" width="370" height="130" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Quiet Hours Enforcement</text>
  <text x="715" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Marketing SMS:</text>
  <text x="580" y="295" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">• Check recipient timezone</text>
  <text x="580" y="310" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">• Block 9 PM - 8 AM local time</text>
  <text x="580" y="325" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">• Queue for morning delivery</text>
  <text x="715" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Transactional SMS (2FA, alerts): Exempt</text>
  
  <!-- Compliance Timeline -->
  <rect x="150" y="380" width="700" height="50" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="500" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#065f46">Compliance: Opt-in → Quiet Hours → STOP Check → Send (all checks must pass)</text>
  
  <!-- Arrows between steps -->
  <path d="M 230 125 L 275 125" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="275,125 265,120 265,130" fill="#64748b"/>
  
  <path d="M 460 125 L 505 125" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="505,125 495,120 495,130" fill="#64748b"/>
  
  <path d="M 690 125 L 735 125" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="735,125 725,120 725,130" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="445" width="900" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Compliance: Opt-in required, STOP immediate, Quiet hours enforced, Logging for proof</text>
</svg>
