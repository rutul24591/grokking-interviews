<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="smsBgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#smsBgGrad4)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Provider Comparison</text>
  
  <!-- Twilio -->
  <rect x="50" y="70" width="200" height="160" rx="8" fill="#3b82f6"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Twilio</text>
  <text x="150" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Cost: $0.0075/msg (US)</text>
  <text x="150" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">(Highest)</text>
  <text x="150" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Pros:</text>
  <text x="150" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Best documentation</text>
  <text x="150" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Global coverage</text>
  <text x="150" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Voice + SMS + WhatsApp</text>
  <text x="150" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Cons:</text>
  <text x="150" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Highest cost</text>
  
  <!-- Vonage -->
  <rect x="300" y="70" width="200" height="160" rx="8" fill="#8b5cf6"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Vonage (Nexmo)</text>
  <text x="400" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Cost: $0.0065/msg (US)</text>
  <text x="400" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">(Balanced)</text>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Pros:</text>
  <text x="400" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Good coverage</text>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Competitive pricing</text>
  <text x="400" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• International</text>
  <text x="400" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Cons:</text>
  <text x="400" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Docs not as good</text>
  
  <!-- AWS SNS -->
  <rect x="550" y="70" width="200" height="160" rx="8" fill="#f59e0b"/>
  <text x="650" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">AWS SNS</text>
  <text x="650" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Cost: $0.00645/msg (US)</text>
  <text x="650" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">(Lowest)</text>
  <text x="650" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Pros:</text>
  <text x="650" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• AWS integration</text>
  <text x="650" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Lowest cost</text>
  <text x="650" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Scalable</text>
  <text x="650" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Cons:</text>
  <text x="650" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Basic features</text>
  <text x="650" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Limited two-way</text>
  
  <!-- Plivo -->
  <rect x="800" y="70" width="170" height="160" rx="8" fill="#10b981"/>
  <text x="885" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Plivo</text>
  <text x="885" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Cost: $0.0055/msg (US)</text>
  <text x="885" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">(Low)</text>
  <text x="885" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Pros:</text>
  <text x="885" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Good pricing</text>
  <text x="885" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Simple API</text>
  <text x="885" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Developer-focused</text>
  <text x="885" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Cons:</text>
  <text x="885" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Smaller ecosystem</text>
  
  <!-- Comparison Table -->
  <rect x="100" y="270" width="800" height="140" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="500" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Feature Comparison</text>
  
  <!-- Table Header -->
  <rect x="120" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="195" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Provider</text>
  <rect x="270" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="345" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Cost/msg (US)</text>
  <rect x="420" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="495" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Features</text>
  <rect x="570" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="645" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Best For</text>
  <rect x="720" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="795" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Two-Way</text>
  
  <!-- Twilio Row -->
  <rect x="120" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="195" y="347" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Twilio</text>
  <rect x="270" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="345" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">$0.0075</text>
  <rect x="420" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="495" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Excellent</text>
  <rect x="570" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="645" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Most applications</text>
  <rect x="720" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="795" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Full support</text>
  
  <!-- Vonage Row -->
  <rect x="120" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="195" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Vonage</text>
  <rect x="270" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="345" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">$0.0065</text>
  <rect x="420" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="495" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Good</text>
  <rect x="570" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="645" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Cost-conscious</text>
  <rect x="720" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="795" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Full support</text>
  
  <!-- AWS SNS Row -->
  <rect x="120" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="195" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">AWS SNS</text>
  <rect x="270" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="345" y="397" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">$0.00645</text>
  <rect x="420" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="495" y="397" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Basic</text>
  <rect x="570" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="645" y="397" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">AWS users</text>
  <rect x="720" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="795" y="397" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Limited</text>
  
  <!-- Legend -->
  <rect x="50" y="425" width="900" height="25" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="443" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Selection: Features (Twilio) vs Cost (AWS SNS, Plivo) vs Balance (Vonage)</text>
</svg>
