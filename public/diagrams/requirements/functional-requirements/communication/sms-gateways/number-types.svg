<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="smsBgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#smsBgGrad3)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Phone Number Types</text>
  
  <!-- Long Codes -->
  <rect x="50" y="70" width="200" height="160" rx="8" fill="#3b82f6"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Long Codes</text>
  <text x="150" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">10-digit numbers</text>
  <text x="150" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Cost: $0-1/month</text>
  <text x="150" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Throughput:</text>
  <text x="150" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#e2e8f0">1 message/second</text>
  <text x="150" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Best For:</text>
  <text x="150" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Two-way messaging</text>
  <text x="150" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Low volume (&lt;1K/day)</text>
  
  <!-- 10DLC -->
  <rect x="300" y="70" width="200" height="160" rx="8" fill="#8b5cf6"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">10DLC</text>
  <text x="400" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">Registered Long Code</text>
  <text x="400" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Cost: $2-5/month</text>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Throughput:</text>
  <text x="400" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#e2e8f0">30-100 msg/second</text>
  <text x="400" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Best For:</text>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Business messaging</text>
  <text x="400" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Most use cases</text>
  
  <!-- Toll-Free -->
  <rect x="550" y="70" width="200" height="160" rx="8" fill="#f59e0b"/>
  <text x="650" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Toll-Free</text>
  <text x="650" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white">1-800, 1-888, etc.</text>
  <text x="650" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Cost: $2-5/month</text>
  <text x="650" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Throughput:</text>
  <text x="650" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#e2e8f0">3 msg/second</text>
  <text x="650" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">Best For:</text>
  <text x="650" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Customer support</text>
  <text x="650" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">• Moderate volume</text>
  
  <!-- Short Codes -->
