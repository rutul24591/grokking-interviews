  <!-- Table Header -->
  <rect x="120" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="195" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Type</text>
  <rect x="270" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="345" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Cost/Month</text>
  <rect x="420" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="495" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Throughput</text>
  <rect x="570" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="645" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Approval</text>
  <rect x="720" y="305" width="150" height="25" fill="#c7d2fe"/>
  <text x="795" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Use Case</text>
  
  <!-- Long Codes Row -->
  <rect x="120" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="195" y="347" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Long Codes</text>
  <rect x="270" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="345" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">$0-1</text>
  <rect x="420" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="495" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">1 msg/s</text>
  <rect x="570" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="645" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Instant</text>
  <rect x="720" y="330" width="150" height="25" fill="#f1f5f9"/>
  <text x="795" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Two-way, Low vol</text>
  
  <!-- 10DLC Row -->
  <rect x="120" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="195" y="372" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">10DLC</text>
  <rect x="270" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="345" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">$2-5</text>
  <rect x="420" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="495" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">30-100 msg/s</text>
  <rect x="570" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="645" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">1-3 days</text>
  <rect x="720" y="355" width="150" height="25" fill="#e2e8f0"/>
  <text x="795" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Business, Most</text>
  
  <!-- Toll-Free Row -->
  <rect x="120" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="195" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Toll-Free</text>
  <rect x="270" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="345" y="397" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">$2-5</text>
  <rect x="420" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="495" y="397" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">3 msg/s</text>
  <rect x="570" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="645" y="397" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">1-3 days</text>
  <rect x="720" y="380" width="150" height="25" fill="#f1f5f9"/>
  <text x="795" y="397" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Support, Moderate</text>
  
  <!-- Legend -->
  <rect x="50" y="425" width="900" height="25" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="443" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Selection: Long Code (low vol) → 10DLC (business) → Short Code (high vol)</text>
</svg>
