<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <linearGradient id="wsBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="500" fill="url(#wsBgGrad)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">WebSocket Server Architecture</text>
  
  <!-- Clients -->
  <rect x="30" y="70" width="170" height="100" rx="8" fill="#3b82f6"/>
  <text x="115" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Client Connections</text>
  <text x="115" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Mobile Apps</text>
  <text x="115" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Web Browsers</text>
  <text x="115" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Desktop Apps</text>
  
  <!-- Load Balancer -->
  <rect x="250" y="70" width="150" height="100" rx="8" fill="#8b5cf6"/>
  <text x="325" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Load Balancer</text>
  <text x="325" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">nginx / HAProxy</text>
  <text x="325" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Connection Distribution</text>
  <text x="325" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Health Checks</text>
  
  <!-- WebSocket Servers -->
  <rect x="450" y="70" width="200" height="100" rx="8" fill="#f59e0b"/>
  <text x="550" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">WebSocket Servers</text>
  <text x="550" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Connection Handling</text>
  <text x="550" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Heartbeat (Ping/Pong)</text>
  <text x="550" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Message Routing</text>
  <text x="550" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">10K-50K connections/server</text>
  
  <!-- Session Storage -->
  <rect x="700" y="70" width="180" height="100" rx="8" fill="#10b981"/>
  <text x="790" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Session Storage</text>
  <text x="790" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Redis Cluster</text>
  <text x="790" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">User Sessions</text>
  <text x="790" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Connection Registry</text>
  <text x="790" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">TTL: 5-30 min</text>
  
  <!-- Connection Handler -->
  <rect x="100" y="220" width="200" height="110" rx="8" fill="#ec4899"/>
  <text x="200" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Connection Handler</text>
  <text x="200" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Handshake &amp; Auth</text>
  <text x="200" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Connection Object</text>
  <text x="200" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Event Handlers</text>
  <text x="200" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Send Queue (Backpressure)</text>
  
  <!-- Heartbeat Manager -->
  <rect x="350" y="220" width="200" height="110" rx="8" fill="#06b6d4"/>
  <text x="450" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Heartbeat Manager</text>
  <text x="450" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Ping Timer (30s)</text>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Pong Timeout (90s)</text>
  <text x="450" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Stale Detection</text>
  <text x="450" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Adaptive Frequency</text>
  
  <!-- Message Router -->
  <rect x="600" y="220" width="200" height="110" rx="8" fill="#6366f1"/>
  <text x="700" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="white">Message Router</text>
  <text x="700" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Lookup Recipient</text>
  <text x="700" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Connection Registry</text>
  <text x="700" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Targeted Delivery</text>
  <text x="700" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Broadcast Support</text>
  
  <!-- Monitoring -->
  <rect x="350" y="370" width="300" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Monitoring &amp; Metrics</text>
  <text x="500" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Connection Count | Heartbeat Success | Message Throughput | Reconnect Rate</text>
  
  <!-- Arrows -->
  <path d="M 200 120 L 245 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="245,120 235,115 235,125" fill="#64748b"/>
  
  <path d="M 400 120 L 445 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="445,120 435,115 435,125" fill="#64748b"/>
  
  <path d="M 650 120 L 695 120" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="695,120 685,115 685,125" fill="#64748b"/>
  
  <!-- Down arrows -->
  <path d="M 550 170 L 550 215" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 200 170 L 200 215" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 790 170 L 700 215" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Legend -->
  <rect x="50" y="470" width="900" height="25" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Clients → Load Balancer → WebSocket Servers ↔ Session Storage, with monitoring throughout</text>
</svg>
