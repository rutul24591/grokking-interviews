<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .box { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .box-dark { fill: #2d3748; stroke: #718096; stroke-width: 2; }
      .origin { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .origin-dark { fill: #2c5282; stroke: #4299e1; stroke-width: 2; }
      .edge { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .edge-dark { fill: #276749; stroke: #48bb78; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-dark { stroke: #a0aec0; stroke-width: 2; fill: none; marker-end: url(#arrowhead-dark); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .label-dark { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #e2e8f0; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
      .sublabel-dark { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #a0aec0; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrowhead-dark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a0aec0"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  <rect class="bg-dark" width="1000" height="500" data-theme="dark" style="display:none;"/>
  
  <!-- Publisher -->
  <rect class="origin" x="50" y="200" width="140" height="80" rx="8"/>
  <text x="120" y="235" text-anchor="middle" class="label">Publisher</text>
  <text x="120" y="255" text-anchor="middle" class="sublabel">Live Event Source</text>
  
  <!-- Ingestion Layer -->
  <rect class="box" x="250" y="200" width="120" height="80" rx="8"/>
  <text x="310" y="235" text-anchor="middle" class="label">Ingestion</text>
  <text x="310" y="255" text-anchor="middle" class="sublabel">Validate + Enrich</text>
  
  <!-- Distribution Layer -->
  <rect class="box" x="420" y="180" width="160" height="120" rx="8" stroke-width="3"/>
  <text x="500" y="210" text-anchor="middle" class="label">Distribution</text>
  <text x="500" y="230" text-anchor="middle" class="sublabel">Message Queue</text>
  <text x="500" y="250" text-anchor="middle" class="sublabel">Fan-out Service</text>
  <text x="500" y="270" text-anchor="middle" class="sublabel">Edge Registry</text>
  
  <!-- Edge Servers -->
  <rect class="edge" x="640" y="50" width="120" height="60" rx="8"/>
  <text x="700" y="75" text-anchor="middle" class="label">Edge 1</text>
  <text x="700" y="95" text-anchor="middle" class="sublabel">US-East</text>
  
  <rect class="edge" x="640" y="140" width="120" height="60" rx="8"/>
  <text x="700" y="165" text-anchor="middle" class="label">Edge 2</text>
  <text x="700" y="185" text-anchor="middle" class="sublabel">US-West</text>
  
  <rect class="edge" x="640" y="230" width="120" height="60" rx="8"/>
  <text x="700" y="255" text-anchor="middle" class="label">Edge 3</text>
  <text x="700" y="275" text-anchor="middle" class="sublabel">EU-West</text>
  
  <rect class="edge" x="640" y="320" width="120" height="60" rx="8"/>
  <text x="700" y="345" text-anchor="middle" class="label">Edge 4</text>
  <text x="700" y="365" text-anchor="middle" class="sublabel">Asia-Pacific</text>
  
  <!-- Clients -->
  <g>
    <circle cx="870" cy="60" r="15" fill="#f0f4f8" stroke="#4a5568" stroke-width="2"/>
    <text x="870" y="100" text-anchor="middle" class="sublabel">Clients</text>
  </g>
  
  <g>
    <circle cx="850" cy="150" r="15" fill="#f0f4f8" stroke="#4a5568" stroke-width="2"/>
  </g>
  <g>
    <circle cx="890" cy="150" r="15" fill="#f0f4f8" stroke="#4a5568" stroke-width="2"/>
  </g>
  <text x="870" y="190" text-anchor="middle" class="sublabel">Clients</text>
  
  <g>
    <circle cx="850" cy="240" r="15" fill="#f0f4f8" stroke="#4a5568" stroke-width="2"/>
  </g>
  <g>
    <circle cx="890" cy="240" r="15" fill="#f0f4f8" stroke="#4a5568" stroke-width="2"/>
  </g>
  <text x="870" y="280" text-anchor="middle" class="sublabel">Clients</text>
  
  <g>
    <circle cx="870" cy="350" r="15" fill="#f0f4f8" stroke="#4a5568" stroke-width="2"/>
    <text x="870" y="390" text-anchor="middle" class="sublabel">Clients</text>
  </g>
  
  <!-- Arrows -->
  <path class="arrow" d="M190 240 L245 240"/>
  <path class="arrow" d="M370 240 L415 240"/>
  
  <path class="arrow" d="M580 210 L635 80"/>
  <path class="arrow" d="M580 230 L635 170"/>
  <path class="arrow" d="M580 250 L635 260"/>
  <path class="arrow" d="M580 270 L635 350"/>
  
  <path class="arrow" d="M760 80 L850 70"/>
  <path class="arrow" d="M760 170 L835 160"/>
  <path class="arrow" d="M760 170 L875 160"/>
  <path class="arrow" d="M760 260 L835 250"/>
  <path class="arrow" d="M760 260 L875 250"/>
  <path class="arrow" d="M760 350 L855 350"/>
  
  <text x="500" y="480" text-anchor="middle" class="label" style="font-size: 16px;">Figure 1: Real-time Broadcasting Architecture</text>
</svg>
