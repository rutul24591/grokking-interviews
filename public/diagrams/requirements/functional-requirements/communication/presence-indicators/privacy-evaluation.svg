<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="presenceBgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#presenceBgGrad3)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Privacy Evaluation</text>
  
  <!-- Privacy Settings -->
  <rect x="50" y="70" width="200" height="130" rx="8" fill="#3b82f6"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Privacy Settings</text>
  <text x="150" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Everyone</text>
  <text x="150" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Anyone can see</text>
  <text x="150" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Contacts Only</text>
  <text x="150" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Mutual contacts</text>
  <text x="150" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Nobody</text>
  <text x="150" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Hidden from all</text>
  
  <!-- Evaluation Flow -->
  <rect x="300" y="70" width="200" height="130" rx="8" fill="#8b5cf6"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Evaluation Flow</text>
  <text x="400" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">1. Check Target's Setting</text>
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">2. Check Contact Status</text>
  <text x="400" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">3. Check Exceptions</text>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">4. Check Reciprocity</text>
  <text x="400" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">5. Return True/False</text>
  
  <!-- Contact Check -->
  <rect x="550" y="70" width="200" height="130" rx="8" fill="#f59e0b"/>
  <text x="650" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Contact Check</text>
  <text x="650" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Are They Contacts?</text>
  <text x="650" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Mutual Connection?</text>
  <text x="650" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">In Exception List?</text>
  <text x="650" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Blocked?</text>
  <text x="650" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">→ Affects Visibility</text>
  
  <!-- Result -->
  <rect x="800" y="70" width="170" height="130" rx="8" fill="#10b981"/>
  <text x="885" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Result</text>
  <text x="885" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Can See Presence:</text>
  <text x="885" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="white">TRUE</text>
  <text x="885" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Show Online Status</text>
  <text x="885" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Show Last Seen</text>
  <text x="885" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">FALSE</text>
  <text x="885" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• Show Offline</text>
  <text x="885" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">• No Last Seen</text>
  
  <!-- Reciprocal Privacy -->
  <rect x="100" y="240" width="380" height="110" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="290" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Reciprocal Privacy Enforcement</text>
  <text x="290" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">If You Hide From Everyone:</text>
  <text x="290" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">→ You Can't See Anyone's Presence</text>
  <text x="290" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">If You Hide Typing Indicators:</text>
  <text x="290" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">→ You Don't See Others' Typing</text>
  
  <!-- Exception Lists -->
  <rect x="530" y="240" width="370" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Exception Lists</text>
  <text x="715" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Always Visible:</text>
  <text x="715" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Specific contacts see presence even when hidden</text>
  <text x="715" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Always Hidden:</text>
  <text x="715" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Blocked contacts never see presence</text>
  
  <!-- Example Scenarios -->
  <rect x="100" y="380" width="260" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="230" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Scenario A: Hidden from All</text>
  <text x="230" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">You see no one, no one sees you</text>
  
  <rect x="380" y="380" width="260" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="510" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">Scenario B: Contacts Only</text>
  <text x="510" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Contacts see you, strangers don't</text>
  
  <rect x="660" y="380" width="260" height="50" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="790" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#065f46">Scenario C: Everyone</text>
  <text x="790" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Everyone sees your presence</text>
  
  <!-- Arrows between steps -->
  <path d="M 250 135 L 295 135" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="295,135 285,130 285,140" fill="#64748b"/>
  
  <path d="M 500 135 L 545 135" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="545,135 535,130 535,140" fill="#64748b"/>
  
  <path d="M 750 135 L 795 135" stroke="#64748b" stroke-width="2" fill="none"/>
  <polygon points="795,135 785,130 785,140" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="50" y="450" width="900" height="30" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Privacy Flow: Settings → Contact Check → Exceptions → Reciprocity → Result</text>
</svg>
