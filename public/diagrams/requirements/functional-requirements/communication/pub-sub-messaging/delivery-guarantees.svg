<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .box { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .box-dark { fill: #2d3748; stroke: #718096; stroke-width: 2; }
      .success { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .success-dark { fill: #276749; stroke: #48bb78; stroke-width: 2; }
      .warning { fill: #feebc8; stroke: #dd6b20; stroke-width: 2; }
      .warning-dark { fill: #744210; stroke: #ed8936; stroke-width: 2; }
      .danger { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .danger-dark { fill: #742a2a; stroke: #f56565; stroke-width: 2; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .label-dark { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #e2e8f0; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
      .sublabel-dark { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #a0aec0; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  <rect class="bg-dark" width="1000" height="450" data-theme="dark" style="display:none;"/>
  
  <!-- At-Most-Once -->
  <rect class="box" x="50" y="50" width="280" height="120" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="label" style="font-size: 16px;">At-Most-Once</text>
  <text x="190" y="110" text-anchor="middle" class="sublabel">Fire and forget</text>
  <text x="190" y="130" text-anchor="middle" class="sublabel">No retry on failure</text>
  <text x="190" y="150" text-anchor="middle" class="sublabel">May lose messages</text>
  
  <rect class="warning" x="70" y="100" width="240" height="50" rx="4"/>
  <text x="190" y="130" text-anchor="middle" class="sublabel" style="font-weight: 600; fill: #744210;">Use: Metrics, logs, presence</text>
  
  <!-- At-Least-Once -->
  <rect class="box" x="380" y="50" width="280" height="120" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="label" style="font-size: 16px;">At-Least-Once</text>
  <text x="520" y="110" text-anchor="middle" class="sublabel">Retry until acknowledged</text>
  <text x="520" y="130" text-anchor="middle" class="sublabel">May duplicate</text>
  <text x="520" y="150" text-anchor="middle" class="sublabel">Idempotent consumers</text>
  
  <rect class="success" x="400" y="100" width="240" height="50" rx="4"/>
  <text x="520" y="130" text-anchor="middle" class="sublabel" style="font-weight: 600; fill: #276749;">Use: Most production systems</text>
  
  <!-- Exactly-Once -->
  <rect class="box" x="710" y="50" width="240" height="120" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Exactly-Once</text>
  <text x="830" y="110" text-anchor="middle" class="sublabel">Distributed transactions</text>
  <text x="830" y="130" text-anchor="middle" class="sublabel">High complexity</text>
  <text x="830" y="150" text-anchor="middle" class="sublabel">Performance cost</text>
  
  <rect class="warning" x="730" y="100" width="200" height="50" rx="4"/>
  <text x="830" y="130" text-anchor="middle" class="sublabel" style="font-weight: 600; fill: #744210;">Use: Financial transactions</text>
  
  <!-- Comparison Table -->
  <rect class="box" x="50" y="220" width="900" height="180" rx="8"/>
  
  <!-- Table Header -->
  <rect class="box" x="60" y="230" width="880" height="40" rx="4" fill="#e2e8f0"/>
  <text x="150" y="255" text-anchor="middle" class="sublabel" style="font-weight: 600;">Guarantee</text>
  <text x="300" y="255" text-anchor="middle" class="sublabel" style="font-weight: 600;">Loss</text>
  <text x="450" y="255" text-anchor="middle" class="sublabel" style="font-weight: 600;">Duplicates</text>
  <text x="600" y="255" text-anchor="middle" class="sublabel" style="font-weight: 600;">Latency</text>
  <text x="800" y="255" text-anchor="middle" class="sublabel" style="font-weight: 600;">Complexity</text>
  
  <!-- Row 1 -->
  <text x="150" y="300" text-anchor="middle" class="sublabel">At-Most-Once</text>
  <text x="300" y="300" text-anchor="middle" class="sublabel" fill="#e53e3e" font-weight="600">Possible</text>
  <text x="450" y="300" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">None</text>
  <text x="600" y="300" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Lowest</text>
  <text x="800" y="300" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Simple</text>
  
  <!-- Row 2 -->
  <text x="150" y="340" text-anchor="middle" class="sublabel">At-Least-Once</text>
  <text x="300" y="340" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">None</text>
  <text x="450" y="340" text-anchor="middle" class="sublabel" fill="#dd6b20" font-weight="600">Possible</text>
  <text x="600" y="340" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Low</text>
  <text x="800" y="340" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Moderate</text>
  
  <!-- Row 3 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Exactly-Once</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">None</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">None</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e" font-weight="600">High</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e" font-weight="600">Complex</text>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 4: Delivery Guarantees</text>
</svg>
