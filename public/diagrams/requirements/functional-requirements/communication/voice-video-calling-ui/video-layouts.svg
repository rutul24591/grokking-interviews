<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <linearGradient id="callingBgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="450" fill="url(#callingBgGrad3)"/>
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Video Layouts</text>
  
  <!-- 1:1 Layout -->
  <rect x="50" y="70" width="200" height="160" rx="8" fill="#3b82f6"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">1:1 Call Layout</text>
  
  <!-- Remote video (full) -->
  <rect x="70" y="115" width="160" height="90" rx="4" fill="#64748b"/>
  <text x="150" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Remote Video</text>
  <text x="150" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">(Full Screen)</text>
  
  <!-- Local video (PiP) -->
  <rect x="190" y="115" width="50" height="35" rx="2" fill="#94a3b8"/>
  <text x="215" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="white">Local</text>
  <text x="215" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="white">(PiP)</text>
  
  <text x="150" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Tap to Swap</text>
  
  <!-- Grid Layout -->
  <rect x="300" y="70" width="200" height="160" rx="8" fill="#8b5cf6"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Grid Layout (3x3)</text>
  
  <!-- Grid cells -->
  <rect x="320" y="115" width="50" height="40" rx="2" fill="#64748b"/>
  <rect x="380" y="115" width="50" height="40" rx="2" fill="#64748b"/>
  <rect x="440" y="115" width="50" height="40" rx="2" fill="#64748b"/>
  <rect x="320" y="160" width="50" height="40" rx="2" fill="#64748b"/>
  <rect x="380" y="160" width="50" height="40" rx="2" fill="#64748b"/>
  <rect x="440" y="160" width="50" height="40" rx="2" fill="#64748b"/>
  <rect x="320" y="205" width="50" height="40" rx="2" fill="#64748b"/>
  <rect x="380" y="205" width="50" height="40" rx="2" fill="#64748b"/>
  <rect x="440" y="205" width="50" height="40" rx="2" fill="#64748b"/>
  
  <text x="400" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">9 Participants</text>
  
  <!-- Speaker Layout -->
  <rect x="550" y="70" width="200" height="160" rx="8" fill="#f59e0b"/>
  <text x="650" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Speaker Layout</text>
  
  <!-- Active speaker (full) -->
  <rect x="570" y="115" width="160" height="80" rx="4" fill="#f59e0b" stroke="#fff" stroke-width="3"/>
  <text x="650" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">Active Speaker</text>
  <text x="650" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">(Full Screen)</text>
  
  <!-- Thumbnails -->
  <rect x="570" y="200" width="35" height="25" rx="2" fill="#64748b"/>
  <rect x="610" y="200" width="35" height="25" rx="2" fill="#64748b"/>
  <rect x="650" y="200" width="35" height="25" rx="2" fill="#64748b"/>
  <rect x="690" y="200" width="35" height="25" rx="2" fill="#64748b"/>
  
  <text x="650" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#e2e8f0">Thumbnails</text>
  
  <!-- Presentation Layout -->
  <rect x="800" y="70" width="170" height="160" rx="8" fill="#10b981"/>
  <text x="885" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Presentation Layout</text>
  
  <!-- Screen share (full) -->
  <rect x="820" y="115" width="130" height="80" rx="4" fill="#10b981"/>
  <text x="885" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">Screen Share</text>
  <text x="885" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="white">(Full Screen)</text>
  
  <!-- Speaker thumbnail -->
  <rect x="820" y="200" width="40" height="30" rx="2" fill="#64748b"/>
  <text x="840" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="white">Speaker</text>
  
  <!-- Participants -->
  <rect x="870" y="200" width="35" height="30" rx="2" fill="#64748b"/>
  <text x="887" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="white">Others</text>
  
  <!-- Layout Comparison -->
  <rect x="100" y="270" width="380" height="100" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="290" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Layout Selection Logic</text>
  <text x="290" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">1 Participant: 1:1 Layout (PiP)</text>
  <text x="290" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">2-9 Participants: Grid Layout (auto 2x2, 3x3)</text>
  <text x="290" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">10+ Participants: Speaker Layout + Pagination</text>
  <text x="290" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Screen Share Active: Presentation Layout</text>
  
  <!-- User Controls -->
  <rect x="530" y="270" width="370" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Layout Controls</text>
  <text x="715" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Auto: System selects based on participant count</text>
  <text x="715" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Manual: User selects Grid/Speaker/Presenter</text>
  <text x="715" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Pin: Keep specific participant visible</text>
  <text x="715" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Focus: Hide self, focus on others</text>
  
  <!-- Arrows between layouts -->
  <path d="M 250 150 L 295 150" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 500 150 L 545 150" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <path d="M 750 150 L 795 150" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Legend -->
  <rect x="50" y="390" width="900" height="40" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Layouts: 1:1 (PiP) → Grid (2-9) → Speaker (10+) → Presentation (Screen Share)</text>
</svg>
