<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .auth { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .token { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .access { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Authentication -->
  <rect class="auth" x="50" y="50" width="250" height="180" rx="8"/>
  <text x="175" y="80" text-anchor="middle" class="text-label">Authentication</text>
  
  <rect class="auth" x="70" y="100" width="210" height="35" rx="4"/>
  <text x="175" y="122" text-anchor="middle" class="sublabel">Login Required</text>
  
  <rect class="auth" x="70" y="145" width="210" height="35" rx="4"/>
  <text x="175" y="167" text-anchor="middle" class="sublabel">Session Validation</text>
  
  <rect class="auth" x="70" y="190" width="210" height="35" rx="4"/>
  <text x="175" y="212" text-anchor="middle" class="sublabel">Valid Session Check</text>
  
  <!-- Token-based URLs -->
  <rect class="token" x="380" y="50" width="250" height="180" rx="8"/>
  <text x="505" y="80" text-anchor="middle" class="text-label">Token-based URLs</text>
  
  <rect class="token" x="400" y="100" width="210" height="35" rx="4"/>
  <text x="505" y="122" text-anchor="middle" class="sublabel">Secure Random Token</text>
  
  <rect class="token" x="400" y="145" width="210" height="35" rx="4"/>
  <text x="505" y="167" text-anchor="middle" class="sublabel">URL: /preview/{token}</text>
  
  <rect class="token" x="400" y="190" width="210" height="35" rx="4"/>
  <text x="505" y="212" text-anchor="middle" class="sublabel">Cannot be Guessed</text>
  
  <!-- Access Control -->
  <rect class="access" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Access Control</text>
  
  <rect class="access" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Owner Access</text>
  
  <rect class="access" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Collaborator Access</text>
  
  <rect class="access" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Admin Access</text>
  
  <!-- Security Flow -->
  <rect class="auth" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Preview Security Flow</text>
  
  <!-- Flow boxes -->
  <rect class="auth" x="70" y="330" width="180" height="60" rx="4"/>
  <text x="160" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">1. Request</text>
  <text x="160" y="375" text-anchor="middle" class="sublabel">Preview URL</text>
  
  <rect class="token" x="280" y="330" width="180" height="60" rx="4"/>
  <text x="370" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">2. Validate Token</text>
  <text x="370" y="375" text-anchor="middle" class="sublabel">Check Token Valid</text>
  
  <rect class="auth" x="490" y="330" width="180" height="60" rx="4"/>
  <text x="580" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">3. Auth Check</text>
  <text x="580" y="375" text-anchor="middle" class="sublabel">User Logged In</text>
  
  <rect class="access" x="700" y="330" width="180" height="60" rx="4"/>
  <text x="790" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">4. Access Check</text>
  <text x="790" y="375" text-anchor="middle" class="sublabel">User Has Permission</text>
  
  <path class="arrow" d="M250 360 L275 360"/>
  <path class="arrow" d="M460 360 L485 360"/>
  <path class="arrow" d="M670 360 L695 360"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Preview Security</text>
</svg>
