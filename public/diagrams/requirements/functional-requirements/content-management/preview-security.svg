<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Preview Security Layers</text>
  
  <!-- Authentication -->
  <rect x="50" y="70" width="220" height="150" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Authentication</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Login Required</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">No anonymous access</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Session Validation</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Check valid session</text>
  
  <line x1="270" y1="145" x2="310" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Authorization -->
  <rect x="320" y="70" width="220" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Authorization</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Permission Check</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Author/Editor only</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Content Ownership</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Check ownership/role</text>
  
  <line x1="540" y1="145" x2="580" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Rate Limiting -->
  <rect x="590" y="70" width="180" height="150" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Rate Limiting</text>
  
  <rect x="610" y="115" width="140" height="40" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">100 requests/hour</text>
  <text x="680" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Per user limit</text>
  
  <rect x="610" y="165" width="140" height="40" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="680" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Prevent Abuse</text>
  <text x="680" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">DoS protection</text>
  
  <!-- Noindex -->
  <rect x="50" y="240" width="220" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="265" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Noindex Tag</text>
  
  <rect x="70" y="280" width="180" height="35" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="160" y="302" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">&lt;meta name="robots" content="noindex"&gt;</text>
  
  <rect x="70" y="320" width="180" height="35" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="160" y="342" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Prevent Search Indexing</text>
  
  <!-- Expiring URLs -->
  <rect x="290" y="240" width="220" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Expiring URLs</text>
  
  <rect x="310" y="280" width="180" height="35" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="400" y="302" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Token-Based Validation</text>
  
  <rect x="310" y="320" width="180" height="35" rx="4" fill="#ef4444" opacity="0.6"/>
  <text x="400" y="342" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Expire after 7 days or publish</text>
  
  <!-- HTTPS -->
  <rect x="530" y="240" width="220" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="640" y="265" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">HTTPS Only</text>
  
  <rect x="550" y="280" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="640" y="302" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Encrypt Traffic</text>
  
  <rect x="550" y="320" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="640" y="342" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Prevent Interception</text>
  
  <!-- Security Flow -->
  <rect x="50" y="380" width="700" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="405" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Security Flow (All Layers Must Pass)</text>
  
  <rect x="70" y="420" width="120" height="40" rx="4" fill="#3b82f6"/>
  <text x="130" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">1. Authenticate</text>
  
  <rect x="200" y="420" width="30" height="40" rx="2" fill="#475569"/>
  <text x="215" y="445" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="240" y="420" width="120" height="40" rx="4" fill="#f59e0b"/>
  <text x="300" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">2. Authorize</text>
  
  <rect x="370" y="420" width="30" height="40" rx="2" fill="#475569"/>
  <text x="385" y="445" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="410" y="420" width="120" height="40" rx="4" fill="#8b5cf6"/>
  <text x="470" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">3. Rate Limit</text>
  
  <rect x="540" y="420" width="30" height="40" rx="2" fill="#475569"/>
  <text x="555" y="445" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="580" y="420" width="150" height="40" rx="4" fill="#22c55e"/>
  <text x="655" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">4. Serve Preview</text>

</svg>
