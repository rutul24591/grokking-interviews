<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Preview Render Pipeline</text>
  
  <!-- Content Input -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Content</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Draft + Flag</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Preview Request</text>
  
  <!-- Render Pipeline -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Render Pipeline</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Same as Published</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Components + Styles</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Watermark -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Draft Watermark</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Overlay "DRAFT"</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Semi-transparent</text>
  
  <line x1="630" y1="120" x2="670" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Caching -->
  <rect x="680" y="60" width="100" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Cache</text>
  <text x="730" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Cache Preview</text>
  <text x="730" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Invalidate on Change</text>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Per Device View</text>
  
  <line x1="730" y1="180" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="200" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">Deliver</text>
  
  <!-- Security -->
  <rect x="680" y="230" width="100" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="730" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Security</text>
  <text x="730" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Authentication</text>
  <text x="730" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Noindex Tag</text>
  <text x="730" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Expiring URL</text>
  
  <line x1="680" y1="280" x2="640" y2="280" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Preview Output -->
  <rect x="450" y="230" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Preview Output</text>
  <text x="540" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">HTML with Watermark</text>
  <text x="540" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Noindex Meta Tag</text>
  <text x="540" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Auth Required</text>
  
  <line x1="450" y1="280" x2="410" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- User Views -->
  <rect x="220" y="230" width="180" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="310" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">User Views</text>
  <text x="310" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Live Preview</text>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Full Preview</text>
  <text x="310" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Responsive Toggle</text>
  
  <line x1="220" y1="280" x2="180" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Performance -->
  <rect x="50" y="230" width="120" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="255" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Performance</text>
  <text x="110" y="280" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Debounce 300-500ms</text>
  <text x="110" y="295" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Lazy Load</text>
  <text x="110" y="310" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Incremental Updates</text>
  
  <!-- Optimization Techniques -->
  <rect x="50" y="360" width="340" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Optimization Techniques</text>
  
  <rect x="70" y="400" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Debounce: Wait 300-500ms after typing stops</text>
  
  <rect x="70" y="435" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Lazy Load: Images/embeds load when visible</text>
  
  <!-- Caching Strategy -->
  <rect x="420" y="360" width="340" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Caching Strategy</text>
  
  <rect x="440" y="400" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Cache rendered preview (invalidate on change)</text>
  
  <rect x="440" y="435" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Cache per device view (mobile/desktop separate)</text>

</svg>
