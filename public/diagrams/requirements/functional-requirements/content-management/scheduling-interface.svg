<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .calendar { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .timezone = { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .schedule { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .publish = { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Calendar Picker -->
  <rect class="calendar" x="50" y="50" width="220" height="200" rx="8"/>
  <text x="160" y="80" text-anchor="middle" class="text-label">Calendar Picker</text>
  
  <rect class="calendar" x="70" y="100" width="180" height="35" rx="4"/>
  <text x="160" y="122" text-anchor="middle" class="sublabel">Month View</text>
  
  <rect class="calendar" x="70" y="145" width="180" height="35" rx="4"/>
  <text x="160" y="167" text-anchor="middle" class="sublabel">Week View</text>
  
  <rect class="calendar" x="70" y="190" width="180" height="35" rx="4"/>
  <text x="160" y="212" text-anchor="middle" class="sublabel">Day View</text>
  
  <!-- Timezone Selection -->
  <rect class="timezone" x="320" y="50" width="220" height="200" rx="8"/>
  <text x="430" y="80" text-anchor="middle" class="text-label">Timezone Selection</text>
  
  <rect class="timezone" x="340" y="100" width="180" height="35" rx="4"/>
  <text x="430" y="122" text-anchor="middle" class="sublabel">Auto-detect</text>
  
  <rect class="timezone" x="340" y="145" width="180" height="35" rx="4"/>
  <text x="430" y="167" text-anchor="middle" class="sublabel">Manual Select</text>
  
  <rect class="timezone" x="340" y="190" width="180" height="35" rx="4"/>
  <text x="430" y="212" text-anchor="middle" class="sublabel">UTC Offset Display</text>
  
  <!-- Scheduled Content -->
  <rect class="schedule" x="590" y="50" width="220" height="200" rx="8"/>
  <text x="700" y="80" text-anchor="middle" class="text-label">Scheduled Content</text>
  
  <rect class="schedule" x="610" y="100" width="180" height="35" rx="4"/>
  <text x="700" y="122" text-anchor="middle" class="sublabel">Upcoming Queue</text>
  
  <rect class="schedule" x="610" y="145" width="180" height="35" rx="4"/>
  <text x="700" y="167" text-anchor="middle" class="sublabel">Edit/Cancel</text>
  
  <rect class="schedule" x="610" y="190" width="180" height="35" rx="4"/>
  <text x="700" y="212" text-anchor="middle" class="sublabel">Reschedule</text>
  
  <!-- Publish Action -->
  <rect class="publish" x="850" y="125" width="120" height="100" rx="8"/>
  <text x="910" y="160" text-anchor="middle" class="text-label">Publish</text>
  <text x="910" y="185" text-anchor="middle" class="sublabel">At Scheduled</text>
  <text x="910" y="205" text-anchor="middle" class="sublabel">Time</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M270 150 L315 150"/>
  <path class="arrow" d="M540 150 L585 150"/>
  <path class="arrow" d="M810 150 L845 150"/>
  
  <!-- Scheduling Flow -->
  <rect class="calendar" x="50" y="300" width="900" height="160" rx="8"/>
  <text x="500" y="330" text-anchor="middle" class="text-label">Scheduling Workflow</text>
  
  <!-- Flow boxes -->
  <rect class="calendar" x="70" y="350" width="180" height="90" rx="4"/>
  <text x="160" y="380" text-anchor="middle" class="sublabel" style="font-weight: 600">1. Select Date</text>
  <text x="160" y="405" text-anchor="middle" class="sublabel">Calendar Picker</text>
  <text x="160" y="425" text-anchor="middle" class="sublabel">Time Selection</text>
  
  <rect class="timezone" x="280" y="350" width="180" height="90" rx="4"/>
  <text x="370" y="380" text-anchor="middle" class="sublabel" style="font-weight: 600">2. Set Timezone</text>
  <text x="370" y="405" text-anchor="middle" class="sublabel">Auto or Manual</text>
  <text x="370" y="425" text-anchor="middle" class="sublabel">UTC Storage</text>
  
  <rect class="schedule" x="490" y="350" width="180" height="90" rx="4"/>
  <text x="580" y="380" text-anchor="middle" class="sublabel" style="font-weight: 600">3. Schedule</text>
  <text x="580" y="405" text-anchor="middle" class="sublabel">Create Job</text>
  <text x="580" y="425" text-anchor="middle" class="sublabel">Add to Queue</text>
  
  <rect class="publish" x="700" y="350" width="180" height="90" rx="4"/>
  <text x="790" y="380" text-anchor="middle" class="sublabel" style="font-weight: 600">4. Publish</text>
  <text x="790" y="405" text-anchor="middle" class="sublabel">Execute Job</text>
  <text x="790" y="425" text-anchor="middle" class="sublabel">Content Live</text>
  
  <path class="arrow" d="M250 395 L275 395"/>
  <path class="arrow" d="M460 395 L485 395"/>
  <path class="arrow" d="M670 395 L695 395"/>
  
  <text x="500" y="480" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 1: Scheduling Interface</text>
</svg>
