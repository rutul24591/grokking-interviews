<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Content Scheduling Interface</text>
  
  <!-- Calendar Picker -->
  <rect x="50" y="70" width="340" height="280" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Calendar Picker</text>
  
  <!-- Calendar Grid -->
  <rect x="70" y="115" width="300" height="180" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Calendar Header -->
  <rect x="70" y="115" width="300" height="30" rx="4" fill="#3b82f6"/>
  <text x="220" y="135" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">March 2026</text>
  
  <!-- Day Headers -->
  <rect x="70" y="145" width="300" height="25" rx="2" fill="#f1f5f9"/>
  <text x="93" y="162" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Sun</text>
  <text x="136" y="162" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Mon</text>
  <text x="179" y="162" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Tue</text>
  <text x="222" y="162" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Wed</text>
  <text x="265" y="162" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Thu</text>
  <text x="308" y="162" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Fri</text>
  <text x="351" y="162" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Sat</text>
  
  <!-- Calendar Days -->
  <text x="93" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">1</text>
  <text x="136" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2</text>
  <text x="179" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">3</text>
  <text x="222" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">4</text>
  <text x="265" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">5</text>
  <text x="308" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">6</text>
  <text x="351" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">7</text>
  
  <text x="93" y="220" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">8</text>
  <text x="136" y="220" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">9</text>
  <text x="179" y="220" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">10</text>
  <text x="222" y="220" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">11</text>
  <text x="265" y="220" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">12</text>
  <text x="308" y="220" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">13</text>
  <text x="351" y="220" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">14</text>
  
  <text x="93" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">15</text>
  <text x="136" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">16</text>
  <rect x="165" y="235" width="28" height="28" rx="4" fill="#3b82f6"/>
  <text x="179" y="254" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#ffffff">17</text>
  <text x="222" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">18</text>
  <text x="265" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">19</text>
  <text x="308" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">20</text>
  <text x="351" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">21</text>
  
  <!-- Time Picker -->
  <rect x="70" y="300" width="300" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="325" text-anchor="start" font-family="system-ui" font-size="10" fill="#475569">Time:</text>
  <text x="150" y="325" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">9:00 AM</text>
  <rect x="250" y="305" width="100" height="30" rx="4" fill="#3b82f6"/>
  <text x="300" y="325" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Schedule</text>
  
  <!-- Timezone Selector -->
  <rect x="420" y="70" width="340" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Timezone</text>
  
  <rect x="440" y="115" width="300" height="40" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="460" y="140" text-anchor="start" font-family="system-ui" font-size="11" fill="#0f172a">🌍 America/New_York (EST)</text>
  
  <rect x="440" y="160" width="300" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="182" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto-detected from browser</text>
  
  <!-- Best Time Suggestions -->
  <rect x="420" y="190" width="340" height="160" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="215" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Best Times for Your Audience</text>
  
  <rect x="440" y="230" width="300" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="590" y="252" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⭐ Tuesday 9:00 AM (Highest engagement)</text>
  
  <rect x="440" y="270" width="300" height="35" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="590" y="292" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⭐ Wednesday 1:00 PM</text>
  
  <rect x="440" y="310" width="300" height="35" rx="4" fill="#22c55e" opacity="0.1"/>
  <text x="590" y="332" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⭐ Friday 11:00 AM</text>
  
  <!-- Quick Select -->
  <rect x="50" y="370" width="340" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Quick Select</text>
  
  <rect x="70" y="410" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Tomorrow 9 AM</text>
  
  <rect x="230" y="410" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Next Monday</text>
  
  <rect x="70" y="445" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="465" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">End of Month</text>
  
  <rect x="230" y="445" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="465" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Custom...</text>

</svg>
