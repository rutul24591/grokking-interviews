<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Upload Security Patterns</text>
  
  <!-- File Type Validation -->
  <rect x="50" y="70" width="220" height="150" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">File Type Validation</text>
  
  <rect x="70" y="115" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Magic Bytes Check</text>
  
  <rect x="70" y="155" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Not Extension Only</text>
  
  <rect x="70" y="195" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Block Dangerous Types</text>
  
  <line x1="270" y1="145" x2="310" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Size Limits -->
  <rect x="320" y="70" width="220" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Size Limits</text>
  
  <rect x="340" y="115" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Per-File Limit (10-100MB)</text>
  
  <rect x="340" y="155" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Total Upload Limit</text>
  
  <rect x="340" y="195" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Quota Enforcement</text>
  
  <line x1="540" y1="145" x2="580" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Virus Scanning -->
  <rect x="590" y="70" width="180" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Virus Scanning</text>
  
  <rect x="610" y="115" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Server-Side Scan</text>
  
  <rect x="610" y="155" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Quarantine Infected</text>
  
  <rect x="610" y="195" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Notify User</text>
  
  <line x1="680" y1="220" x2="680" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Access Control -->
  <rect x="590" y="270" width="180" height="120" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="680" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Access Control</text>
  
  <rect x="610" y="310" width="140" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Signed Upload URLs</text>
  
  <rect x="610" y="350" width="140" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="372" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Permission Check</text>
  
  <!-- Threat Mitigation -->
  <rect x="50" y="270" width="340" height="210" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Threat Mitigation</text>
  
  <rect x="70" y="310" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Extension Spoofing → Magic Bytes Check</text>
  
  <rect x="70" y="350" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="372" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Malware Upload → Virus Scanning</text>
  
  <rect x="70" y="390" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Storage Abuse → Size Limits + Quota</text>
  
  <rect x="70" y="430" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="452" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Unauthorized Upload → Signed URLs</text>
  
  <rect x="70" y="470" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="487" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ Defense in Depth (Multiple Layers)</text>
  
  <!-- Rate Limiting -->
  <rect x="420" y="270" width="140" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="490" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Rate</text>
  <text x="490" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Limiting</text>
  
  <rect x="440" y="330" width="100" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="352" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Uploads/Hour</text>
  
  <rect x="440" y="370" width="100" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="392" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Bandwidth/Hour</text>
  
  <rect x="440" y="410" width="100" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="432" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">429 Response</text>
  
  <rect x="440" y="450" width="100" height="25" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="490" y="467" text-anchor="middle" font-family="system-ui" font-size="7" fill="#0f172a">Prevent DoS</text>
  
  <!-- Storage Security -->
  <rect x="590" y="400" width="180" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="425" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Storage Security</text>
  
  <rect x="610" y="440" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Outside Webroot</text>
  
  <!-- Upload URL Flow -->
  <rect x="420" y="400" width="140" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="490" y="425" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Signed URL</text>
  
  <rect x="440" y="440" width="100" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="462" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">1hr Expiration</text>

</svg>
