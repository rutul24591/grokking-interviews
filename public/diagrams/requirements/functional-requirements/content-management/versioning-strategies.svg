<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Content Versioning Strategies</text>
  
  <!-- Full Snapshots -->
  <rect x="50" y="70" width="220" height="280" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Full Snapshots</text>
  
  <rect x="70" y="115" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 1</text>
  <text x="160" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Full content (1MB)</text>
  
  <rect x="70" y="175" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 2</text>
  <text x="160" y="215" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Full content (1MB)</text>
  
  <rect x="70" y="235" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 3</text>
  <text x="160" y="275" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Full content (1MB)</text>
  
  <rect x="70" y="295" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 4</text>
  <text x="160" y="335" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Full content (1MB)</text>
  
  <rect x="70" y="355" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="377" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Storage: 4MB total</text>
  
  <rect x="70" y="395" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="417" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Fast restore (1 load)</text>
  
  <!-- Diff-based -->
  <rect x="290" y="70" width="220" height="280" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Diff-based</text>
  
  <rect x="310" y="115" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="400" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 1 (Base)</text>
  <text x="400" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Full content (1MB)</text>
  
  <rect x="310" y="175" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 2 (Diff)</text>
  <text x="400" y="215" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Changes only (50KB)</text>
  
  <rect x="310" y="235" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="400" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 3 (Diff)</text>
  <text x="400" y="275" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Changes only (30KB)</text>
  
  <rect x="310" y="295" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 4 (Diff)</text>
  <text x="400" y="335" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Changes only (40KB)</text>
  
  <rect x="310" y="355" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="377" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Storage: ~1.12MB total</text>
  
  <rect x="310" y="395" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="417" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Slow restore (apply diffs)</text>
  
  <!-- Hybrid -->
  <rect x="530" y="70" width="220" height="280" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Hybrid</text>
  
  <rect x="550" y="115" width="180" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="640" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 1 (Snapshot)</text>
  <text x="640" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Full content (1MB)</text>
  
  <rect x="550" y="175" width="180" height="50" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="640" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 2 (Diff)</text>
  <text x="640" y="215" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Changes only (50KB)</text>
  
  <rect x="550" y="235" width="180" height="50" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="640" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 3 (Diff)</text>
  <text x="640" y="275" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Changes only (30KB)</text>
  
  <rect x="550" y="295" width="180" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="640" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version 4 (Snapshot)</text>
  <text x="640" y="335" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Full content (1MB)</text>
  
  <rect x="550" y="355" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="377" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Storage: ~2.08MB total</text>
  
  <rect x="550" y="395" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="417" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Balanced restore speed</text>
  
  <!-- Comparison -->
  <rect x="50" y="370" width="700" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Strategy Comparison (for 4 versions of 1MB content)</text>
  
  <rect x="70" y="410" width="200" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="170" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Snapshots: 4MB storage</text>
  
  <rect x="280" y="410" width="200" height="30" rx="4" fill="#fef3c7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Diff-based: ~1.12MB storage</text>
  
  <rect x="490" y="410" width="200" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Hybrid: ~2.08MB storage</text>
  
  <rect x="70" y="445" width="620" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="465" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Recommendation: Hybrid for large content, Snapshots for small content</text>

</svg>
