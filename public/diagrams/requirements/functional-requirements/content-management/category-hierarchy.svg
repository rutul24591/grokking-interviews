<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Category Hierarchy Structure</text>
  
  <!-- Root Level -->
  <rect x="50" y="70" width="140" height="50" rx="8" fill="#3b82f6"/>
  <text x="120" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">All Content</text>
  
  <!-- Level 1 -->
  <line x1="120" y1="120" x2="120" y2="160" stroke="#475569" stroke-width="2"/>
  <line x1="120" y1="160" x2="250" y2="160" stroke="#475569" stroke-width="2"/>
  
  <rect x="250" y="140" width="120" height="40" rx="8" fill="#8b5cf6"/>
  <text x="310" y="165" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Technology</text>
  
  <line x1="120" y1="160" x2="450" y2="160" stroke="#475569" stroke-width="2"/>
  
  <rect x="450" y="140" width="120" height="40" rx="8" fill="#8b5cf6"/>
  <text x="510" y="165" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Business</text>
  
  <line x1="120" y1="160" x2="650" y2="160" stroke="#475569" stroke-width="2"/>
  
  <rect x="650" y="140" width="120" height="40" rx="8" fill="#8b5cf6"/>
  <text x="710" y="165" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Lifestyle</text>
  
  <!-- Level 2 (Technology children) -->
  <line x1="310" y1="180" x2="310" y2="220" stroke="#475569" stroke-width="2"/>
  <line x1="310" y1="220" x2="200" y2="220" stroke="#475569" stroke-width="2"/>
  
  <rect x="200" y="200" width="100" height="35" rx="8" fill="#a78bfa"/>
  <text x="250" y="222" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Programming</text>
  
  <line x1="310" y1="220" x2="310" y2="220" stroke="#475569" stroke-width="2"/>
  
  <rect x="260" y="200" width="100" height="35" rx="8" fill="#a78bfa"/>
  <text x="310" y="222" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Design</text>
  
  <line x1="310" y1="220" x2="420" y2="220" stroke="#475569" stroke-width="2"/>
  
  <rect x="420" y="200" width="100" height="35" rx="8" fill="#a78bfa"/>
  <text x="470" y="222" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">AI/ML</text>
  
  <!-- Level 3 (Programming children) -->
  <line x1="250" y1="235" x2="250" y2="270" stroke="#475569" stroke-width="2"/>
  <line x1="250" y1="270" x2="150" y2="270" stroke="#475569" stroke-width="2"/>
  
  <rect x="150" y="250" width="80" height="30" rx="8" fill="#c4b5fd"/>
  <text x="190" y="270" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Python</text>
  
  <line x1="250" y1="270" x2="250" y2="270" stroke="#475569" stroke-width="2"/>
  
  <rect x="210" y="250" width="80" height="30" rx="8" fill="#c4b5fd"/>
  <text x="250" y="270" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">JavaScript</text>
  
  <line x1="250" y1="270" x2="350" y2="270" stroke="#475569" stroke-width="2"/>
  
  <rect x="270" y="250" width="80" height="30" rx="8" fill="#c4b5fd"/>
  <text x="310" y="270" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Java</text>
  
  <!-- Legend -->
  <rect x="50" y="320" width="340" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Hierarchy Properties</text>
  
  <rect x="70" y="360" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="380" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Depth: 2-4 levels optimal (deeper confuses users)</text>
  
  <rect x="70" y="395" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="415" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Breadth: 5-10 categories per level (more overwhelms)</text>
  
  <rect x="70" y="430" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="450" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Parent/Child: Clear relationships, inheritance</text>
  
  <!-- Best Practices -->
  <rect x="420" y="320" width="340" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Best Practices</text>
  
  <rect x="440" y="360" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="380" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">✓ Use clear, specific category names</text>
  
  <rect x="440" y="395" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="415" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">✓ Avoid overlapping categories</text>
  
  <rect x="440" y="430" width="300" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="450" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">✗ Don't create too many levels (&gt;4)</text>

</svg>
