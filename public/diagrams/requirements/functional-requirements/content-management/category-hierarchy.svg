<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .category { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .parent { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .child { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .leaf { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Root -->
  <rect class="parent" x="425" y="30" width="150" height="50" rx="8"/>
  <text x="500" y="60" text-anchor="middle" class="text-label">Root</text>
  
  <!-- Level 1 -->
  <rect class="parent" x="150" y="120" width="140" height="50" rx="8"/>
  <text x="220" y="150" text-anchor="middle" class="sublabel">Electronics</text>
  
  <rect class="parent" x="430" y="120" width="140" height="50" rx="8"/>
  <text x="500" y="150" text-anchor="middle" class="sublabel">Clothing</text>
  
  <rect class="parent" x="710" y="120" width="140" height="50" rx="8"/>
  <text x="780" y="150" text-anchor="middle" class="sublabel">Home</text>
  
  <!-- Level 2 -->
  <rect class="child" x="50" y="210" width="120" height="45" rx="8"/>
  <text x="110" y="238" text-anchor="middle" class="sublabel">Computers</text>
  
  <rect class="child" x="190" y="210" width="120" height="45" rx="8"/>
  <text x="250" y="238" text-anchor="middle" class="sublabel">Phones</text>
  
  <rect class="child" x="400" y="210" width="120" height="45" rx="8"/>
  <text x="460" y="238" text-anchor="middle" class="sublabel">Men</text>
  
  <rect class="child" x="540" y="210" width="120" height="45" rx="8"/>
  <text x="600" y="238" text-anchor="middle" class="sublabel">Women</text>
  
  <rect class="child" x="680" y="210" width="120" height="45" rx="8"/>
  <text x="740" y="238" text-anchor="middle" class="sublabel">Kitchen</text>
  
  <rect class="child" x="820" y="210" width="120" height="45" rx="8"/>
  <text x="880" y="238" text-anchor="middle" class="sublabel">Bedroom</text>
  
  <!-- Level 3 -->
  <rect class="leaf" x="30" y="300" width="100" height="40" rx="8"/>
  <text x="80" y="325" text-anchor="middle" class="sublabel" style="font-size: 11px">Laptops</text>
  
  <rect class="leaf" x="140" y="300" width="100" height="40" rx="8"/>
  <text x="190" y="325" text-anchor="middle" class="sublabel" style="font-size: 11px">Desktops</text>
  
  <rect class="leaf" x="380" y="300" width="100" height="40" rx="8"/>
  <text x="430" y="325" text-anchor="middle" class="sublabel" style="font-size: 11px">Shirts</text>
  
  <rect class="leaf" x="520" y="300" width="100" height="40" rx="8"/>
  <text x="570" y="325" text-anchor="middle" class="sublabel" style="font-size: 11px">Pants</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M500 80 L220 120"/>
  <path class="arrow" d="M500 80 L500 120"/>
  <path class="arrow" d="M500 80 L780 120"/>
  
  <path class="arrow" d="M220 170 L110 210"/>
  <path class="arrow" d="M220 170 L250 210"/>
  
  <path class="arrow" d="M500 170 L460 210"/>
  <path class="arrow" d="M500 170 L600 210"/>
  
  <path class="arrow" d="M780 170 L740 210"/>
  <path class="arrow" d="M780 170 L880 210"/>
  
  <path class="arrow" d="M110 255 L80 300"/>
  <path class="arrow" d="M110 255 L190 300"/>
  
  <path class="arrow" d="M460 255 L430 300"/>
  
  <path class="arrow" d="M600 255 L570 300"/>
  
  <!-- Legend -->
  <rect class="parent" x="100" y="400" width="30" height="30" rx="4"/>
  <text x="140" y="420" text-anchor="start" class="sublabel">Parent Category</text>
  
  <rect class="child" x="300" y="400" width="30" height="30" rx="4"/>
  <text x="340" y="420" text-anchor="start" class="sublabel">Child Category</text>
  
  <rect class="leaf" x="500" y="400" width="30" height="30" rx="4"/>
  <text x="540" y="420" text-anchor="start" class="sublabel">Leaf Category</text>
  
  <text x="500" y="480" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 1: Category Hierarchy</text>
</svg>
