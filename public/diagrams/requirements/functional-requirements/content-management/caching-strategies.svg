<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Caching Strategies Comparison</text>
  
  <!-- Cache-aside -->
  <rect x="50" y="70" width="220" height="280" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Cache-aside</text>
  
  <rect x="70" y="115" width="180" height="60" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Flow</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Check cache → Miss → Origin → Cache → Return</text>
  
  <rect x="70" y="185" width="180" height="50" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Simple</text>
  <text x="160" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Only caches requested content</text>
  
  <rect x="70" y="245" width="180" height="50" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Cache miss penalty</text>
  <text x="160" y="280" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">First request slow, stale data risk</text>
  
  <rect x="70" y="305" width="180" height="35" rx="4" fill="#3b82f6"/>
  <text x="160" y="327" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Best for: Read-heavy</text>
  
  <!-- Write-through -->
  <rect x="290" y="70" width="220" height="280" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Write-through</text>
  
  <rect x="310" y="115" width="180" height="60" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="400" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Flow</text>
  <text x="400" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Write to cache + Origin simultaneously</text>
  
  <rect x="310" y="185" width="180" height="50" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Cache always fresh</text>
  <text x="400" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">No stale data</text>
  
  <rect x="310" y="245" width="180" height="50" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Write latency</text>
  <text x="400" y="280" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Must write to both, cache pollution</text>
  
  <rect x="310" y="305" width="180" height="35" rx="4" fill="#f59e0b"/>
  <text x="400" y="327" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Best for: Write-heavy, consistency</text>
  
  <!-- Stale-while-revalidate -->
  <rect x="530" y="70" width="220" height="280" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Stale-while-revalidate</text>
  
  <rect x="550" y="115" width="180" height="60" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="640" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Flow</text>
  <text x="640" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Serve stale → Refresh in background → Update cache</text>
  
  <rect x="550" y="185" width="180" height="50" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Fast response</text>
  <text x="640" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Origin protection, high availability</text>
  
  <rect x="550" y="245" width="180" height="50" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="640" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Brief staleness</text>
  <text x="640" y="280" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Users may see old content briefly</text>
  
  <rect x="550" y="305" width="180" height="35" rx="4" fill="#8b5cf6"/>
  <text x="640" y="327" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Best for: High availability</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="370" width="700" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Strategy Comparison</text>
  
  <rect x="70" y="410" width="200" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="170" y="430" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Cache-aside</text>
  
  <rect x="280" y="410" width="200" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="430" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Write-through</text>
  
  <rect x="490" y="410" width="200" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="430" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Stale-while-revalidate</text>
  
  <rect x="70" y="445" width="200" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="170" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Complexity: Low</text>
  
  <rect x="280" y="445" width="200" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="380" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Complexity: Medium</text>
  
  <rect x="490" y="445" width="200" height="25" rx="4" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="1"/>
  <text x="590" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Complexity: Medium</text>

</svg>
