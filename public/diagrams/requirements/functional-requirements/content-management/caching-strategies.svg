<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .cache { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .origin { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .user { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Cache-aside -->
  <rect class="cache" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Cache-aside</text>
  
  <rect class="user" x="70" y="100" width="80" height="50" rx="4"/>
  <text x="110" y="130" text-anchor="middle" class="sublabel">User</text>
  
  <rect class="cache" x="170" y="100" width="80" height="50" rx="4"/>
  <text x="210" y="130" text-anchor="middle" class="sublabel">Cache</text>
  
  <rect class="origin" x="270" y="100" width="80" height="50" rx="4"/>
  <text x="310" y="130" text-anchor="middle" class="sublabel">Origin</text>
  
  <path class="arrow" d="M150 125 L165 125"/>
  <path class="arrow" d="M250 125 L265 125"/>
  <text x="190" y="170" text-anchor="middle" class="sublabel">Check → Miss → Fetch → Cache</text>
  
  <!-- Write-through -->
  <rect class="cache" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Write-through</text>
  
  <rect class="user" x="400" y="100" width="80" height="50" rx="4"/>
  <text x="440" y="130" text-anchor="middle" class="sublabel">User</text>
  
  <rect class="cache" x="500" y="100" width="80" height="50" rx="4"/>
  <text x="540" y="130" text-anchor="middle" class="sublabel">Cache</text>
  
  <rect class="origin" x="600" y="100" width="80" height="50" rx="4"/>
  <text x="640" y="130" text-anchor="middle" class="sublabel">Origin</text>
  
  <path class="arrow" d="M480 125 L495 125"/>
  <path class="arrow" d="M580 125 L595 125"/>
  <text x="520" y="170" text-anchor="middle" class="sublabel">Write to Both Simultaneously</text>
  
  <!-- Stale-while-revalidate -->
  <rect class="cache" x="710" y="50" width="280" height="180" rx="8"/>
  <text x="850" y="80" text-anchor="middle" class="text-label">Stale-while-revalidate</text>
  
  <rect class="user" x="730" y="100" width="80" height="50" rx="4"/>
  <text x="770" y="130" text-anchor="middle" class="sublabel">User</text>
  
  <rect class="cache" x="830" y="100" width="80" height="50" rx="4"/>
  <text x="870" y="130" text-anchor="middle" class="sublabel">Cache</text>
  
  <rect class="origin" x="930" y="100" width="80" height="50" rx="4"/>
  <text x="970" y="130" text-anchor="middle" class="sublabel">Origin</text>
  
  <path class="arrow" d="M810 125 L825 125"/>
  <path class="arrow" d="M910 125 L925 125"/>
  <text x="850" y="170" text-anchor="middle" class="sublabel">Serve Stale + Refresh Background</text>
  
  <!-- Comparison Table -->
  <rect class="cache" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Caching Strategy Comparison</text>
  
  <!-- Header -->
  <rect class="cache" x="60" y="320" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Strategy</text>
  <text x="300" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Freshness</text>
  <text x="450" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Performance</text>
  <text x="600" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Complexity</text>
  <text x="800" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Best For</text>
  
  <!-- Row 1 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Cache-aside</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e">Variable</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Good</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Low</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel">Read-heavy</text>
  
  <!-- Row 2 -->
  <text x="150" y="400" text-anchor="middle" class="sublabel">Write-through</text>
  <text x="300" y="400" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">High</text>
  <text x="450" y="400" text-anchor="middle" class="sublabel" fill="#e53e3e">Slow Write</text>
  <text x="600" y="400" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Low</text>
  <text x="800" y="400" text-anchor="middle" class="sublabel">Write-heavy</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Caching Strategies Comparison</text>
</svg>
