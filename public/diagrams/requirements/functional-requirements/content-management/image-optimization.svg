<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Image Optimization Pipeline</text>
  
  <!-- Original Image -->
  <rect x="50" y="70" width="150" height="120" rx="8" fill="#3b82f6"/>
  <text x="125" y="115" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">Original</text>
  <text x="125" y="145" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">4000x3000</text>
  <text x="125" y="165" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">5MB JPEG</text>
  
  <line x1="200" y1="130" x2="240" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Resize</text>
  
  <!-- Resize -->
  <rect x="250" y="70" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="340" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Resize</text>
  
  <rect x="270" y="105" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="340" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Thumbnail 150x150</text>
  
  <rect x="270" y="140" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="340" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Medium 800x600</text>
  
  <rect x="270" y="175" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="340" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Large 1920x1080</text>
  
  <line x1="430" y1="130" x2="470" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Convert</text>
  
  <!-- Format Conversion -->
  <rect x="480" y="70" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="570" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f59e0b">Format Conversion</text>
  
  <rect x="500" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="570" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">WebP (-30%)</text>
  
  <rect x="500" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="570" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">AVIF (-50%)</text>
  
  <rect x="500" y="175" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="570" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">JPEG Fallback</text>
  
  <line x1="660" y1="130" x2="700" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="680" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Compress</text>
  
  <!-- Compression -->
  <rect x="710" y="70" width="70" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="745" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Compress</text>
  <text x="745" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Quality 80-85</text>
  <text x="745" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Strip Metadata</text>
  <text x="745" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Optimize</text>
  
  <line x1="745" y1="190" x2="745" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Responsive Delivery -->
  <rect x="590" y="240" width="310" height="120" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="745" y="265" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#8b5cf6">Responsive Delivery</text>
  
  <rect x="610" y="280" width="270" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="745" y="300" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">&lt;img srcset="thumb.jpg 150w,</text>
  
  <rect x="610" y="315" width="270" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="745" y="335" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">medium.jpg 800w, large.jpg 1920w"&gt;</text>
  
  <line x1="590" y1="300" x2="550" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Format Selection -->
  <rect x="360" y="240" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="265" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f59e0b">Format Selection</text>
  
  <rect x="380" y="280" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="450" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">AVIF (Supported)</text>
  
  <rect x="380" y="315" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="450" y="335" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">→ WebP (Fallback)</text>
  
  <rect x="380" y="350" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="450" y="370" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">→ JPEG (Legacy)</text>
  
  <line x1="360" y1="300" x2="320" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Smart Crop -->
  <rect x="50" y="240" width="220" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="265" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#3b82f6">Smart Crop</text>
  
  <rect x="70" y="280" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Face Detection</text>
  
  <rect x="70" y="315" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="335" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Saliency Mapping</text>
  
  <rect x="70" y="350" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="370" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Preserve Important Content</text>
  
  <!-- Size Comparison -->
  <rect x="50" y="380" width="340" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="405" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Size Comparison (Original 5MB)</text>
  
  <rect x="70" y="420" width="140" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="140" y="440" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">JPEG: 5MB (100%)</text>
  
  <rect x="230" y="420" width="140" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="300" y="440" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">WebP: 1.5MB (30%)</text>
  
  <rect x="70" y="455" width="140" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="475" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">AVIF: 1MB (20%)</text>
  
  <rect x="230" y="455" width="140" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="300" y="475" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Thumbnail: 10KB</text>

</svg>
