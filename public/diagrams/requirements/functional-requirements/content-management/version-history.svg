<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Version History &amp; Diff View</text>
  
  <!-- Version List -->
  <rect x="50" y="70" width="280" height="400" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="190" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Version History</text>
  
  <rect x="70" y="115" width="240" height="50" rx="4" fill="#3b82f6"/>
  <text x="190" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Version 5 (Current)</text>
  <text x="190" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">John • 2 hours ago • "Final review"</text>
  
  <rect x="70" y="175" width="240" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="190" y="195" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Version 4</text>
  <text x="190" y="215" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Jane • 1 day ago • "After feedback"</text>
  
  <rect x="70" y="235" width="240" height="50" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="190" y="255" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Version 3</text>
  <text x="190" y="275" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">John • 3 days ago • "Draft 2"</text>
  
  <rect x="70" y="295" width="240" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="190" y="315" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Version 2</text>
  <text x="190" y="335" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Jane • 5 days ago • "Initial edit"</text>
  
  <rect x="70" y="355" width="240" height="50" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="190" y="375" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Version 1</text>
  <text x="190" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">John • 7 days ago • "Initial draft"</text>
  
  <!-- Diff View -->
  <rect x="360" y="70" width="390" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="555" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Side-by-Side Diff View</text>
  
  <rect x="380" y="115" width="170" height="140" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="465" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ef4444">Version 3 (Old)</text>
  <text x="395" y="155" text-anchor="start" font-family="monospace" font-size="8" fill="#475569">This is the original</text>
  <text x="395" y="170" text-anchor="start" font-family="monospace" font-size="8" fill="#ef4444">- text that was deleted</text>
  <text x="395" y="185" text-anchor="start" font-family="monospace" font-size="8" fill="#475569">This remains unchanged</text>
  <text x="395" y="200" text-anchor="start" font-family="monospace" font-size="8" fill="#475569">Final paragraph here</text>
  
  <rect x="560" y="115" width="170" height="140" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="645" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#22c55e">Version 5 (New)</text>
  <text x="575" y="155" text-anchor="start" font-family="monospace" font-size="8" fill="#475569">This is the original</text>
  <text x="575" y="170" text-anchor="start" font-family="monospace" font-size="8" fill="#22c55e">+ new text added here</text>
  <text x="575" y="185" text-anchor="start" font-family="monospace" font-size="8" fill="#475569">This remains unchanged</text>
  <text x="575" y="200" text-anchor="start" font-family="monospace" font-size="8" fill="#475569">Final paragraph here</text>
  
  <!-- Restore Action -->
  <rect x="360" y="290" width="390" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="555" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Restore Version</text>
  
  <rect x="380" y="330" width="350" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="555" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Creates new version (v6) with restored content</text>
  
  <rect x="380" y="370" width="350" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="555" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Original history preserved (no overwrite)</text>
  
  <!-- Metadata -->
  <rect x="50" y="480" width="280" height="15" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="190" y="492" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Metadata: version_number, author, timestamp, change_description, size</text>
  
  <rect x="360" y="480" width="390" height="15" rx="4" fill="#fef3c7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="555" y="492" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Diff: Additions (green), Deletions (red), Modifications (yellow)</text>

</svg>
