<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Tag Governance Workflows</text>
  
  <!-- Approval Workflow -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Approval Workflow</text>
  
  <rect x="70" y="115" width="300" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="220" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">User Submits New Tag</text>
  
  <rect x="70" y="155" width="300" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="220" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Validation Rules Check (naming, length)</text>
  
  <rect x="70" y="195" width="300" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="220" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Moderator Approval (if required)</text>
  
  <rect x="70" y="235" width="300" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Tag Becomes Active</text>
  
  <!-- Duplicate Detection -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Duplicate Detection</text>
  
  <rect x="440" y="115" width="300" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Fuzzy Matching (Levenshtein Distance)</text>
  
  <rect x="440" y="155" width="300" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Case-Insensitive Comparison</text>
  
  <rect x="440" y="195" width="300" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Synonym Detection (react → ReactJS)</text>
  
  <rect x="440" y="235" width="300" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Merge Duplicates Automatically</text>
  
  <!-- Validation Rules -->
  <rect x="50" y="290" width="340" height="190" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Validation Rules</text>
  
  <rect x="70" y="330" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Naming Convention (lowercase, hyphens)</text>
  
  <rect x="70" y="370" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Character Limit (max 50 characters)</text>
  
  <rect x="70" y="410" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prohibited Terms (offensive, brands)</text>
  
  <rect x="70" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ Enforce Consistency</text>
  
  <!-- Synonym Management -->
  <rect x="420" y="290" width="340" height="190" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Synonym Management</text>
  
  <rect x="440" y="330" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Define Synonyms (javascript → js)</text>
  
  <rect x="440" y="370" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto-redirect to Canonical Tag</text>
  
  <rect x="440" y="410" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Community Suggestions</text>
  
  <rect x="440" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ Reduce Tag Fragmentation</text>

</svg>
