<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Distributed Indexing Architecture</text>
  
  <!-- Cluster -->
  <rect x="50" y="70" width="700" height="280" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Search Cluster</text>
  
  <!-- Coordinator Node -->
  <rect x="70" y="115" width="140" height="80" rx="8" fill="#3b82f6"/>
  <text x="140" y="150" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Coordinator Node</text>
  <text x="140" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Route Queries</text>
  
  <line x1="210" y1="155" x2="250" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Data Nodes -->
  <rect x="260" y="115" width="140" height="80" rx="8" fill="#8b5cf6"/>
  <text x="330" y="145" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Data Node 1</text>
  <text x="330" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Shard 1 + Replica</text>
  <text x="330" y="180" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Store &amp; Search</text>
  
  <rect x="420" y="115" width="140" height="80" rx="8" fill="#8b5cf6"/>
  <text x="490" y="145" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Data Node 2</text>
  <text x="490" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Shard 2 + Replica</text>
  <text x="490" y="180" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Store &amp; Search</text>
  
  <rect x="580" y="115" width="140" height="80" rx="8" fill="#8b5cf6"/>
  <text x="650" y="145" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Data Node 3</text>
  <text x="650" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Shard 3 + Replica</text>
  <text x="650" y="180" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Store &amp; Search</text>
  
  <line x1="400" y1="195" x2="400" y2="235" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Master Node -->
  <rect x="330" y="240" width="140" height="60" rx="8" fill="#f59e0b"/>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Master Node</text>
  <text x="400" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Cluster State</text>
  
  <!-- Sharding -->
  <rect x="50" y="320" width="340" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Sharding (Horizontal Partitioning)</text>
  
  <rect x="70" y="360" width="140" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="140" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Shard 1: Docs 1-1000</text>
  
  <rect x="230" y="360" width="140" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="300" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Shard 2: Docs 1001-2000</text>
  
  <rect x="70" y="405" width="140" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="140" y="427" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Shard 3: Docs 2001-3000</text>
  
  <rect x="230" y="405" width="140" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="300" y="427" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">... Shard N</text>
  
  <rect x="70" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ 20-50GB per shard recommended</text>
  
  <!-- Replication -->
  <rect x="420" y="320" width="340" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Replication (High Availability)</text>
  
  <rect x="440" y="360" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="510" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Primary Shard</text>
  
  <rect x="600" y="360" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="670" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Replica Shard 1</text>
  
  <rect x="440" y="405" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="510" y="427" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Replica Shard 2</text>
  
  <rect x="600" y="405" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="670" y="427" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">... Replica N</text>
  
  <rect x="440" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ 1-2 replicas for availability &amp; read scaling</text>

</svg>
