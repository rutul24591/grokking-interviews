<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .origin { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .cdn { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .edge { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .user { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Origin -->
  <rect class="origin" x="425" y="200" width="150" height="100" rx="8"/>
  <text x="500" y="240" text-anchor="middle" class="text-label">Origin</text>
  <text x="500" y="265" text-anchor="middle" class="sublabel">Source Server</text>
  <text x="500" y="285" text-anchor="middle" class="sublabel">Content Source</text>
  
  <!-- CDN Edge Nodes -->
  <rect class="edge" x="100" y="100" width="120" height="80" rx="8"/>
  <text x="160" y="135" text-anchor="middle" class="sublabel">Edge US-East</text>
  
  <rect class="edge" x="100" y="320" width="120" height="80" rx="8"/>
  <text x="160" y="355" text-anchor="middle" class="sublabel">Edge US-West</text>
  
  <rect class="edge" x="780" y="100" width="120" height="80" rx="8"/>
  <text x="840" y="135" text-anchor="middle" class="sublabel">Edge Europe</text>
  
  <rect class="edge" x="780" y="320" width="120" height="80" rx="8"/>
  <text x="840" y="355" text-anchor="middle" class="sublabel">Edge Asia</text>
  
  <!-- Users -->
  <rect class="user" x="50" y="50" width="80" height="60" rx="8"/>
  <text x="90" y="80" text-anchor="middle" class="sublabel">User 1</text>
  
  <rect class="user" x="50" y="380" width="80" height="60" rx="8"/>
  <text x="90" y="410" text-anchor="middle" class="sublabel">User 2</text>
  
  <rect class="user" x="870" y="50" width="80" height="60" rx="8"/>
  <text x="910" y="80" text-anchor="middle" class="sublabel">User 3</text>
  
  <rect class="user" x="870" y="380" width="80" height="60" rx="8"/>
  <text x="910" y="410" text-anchor="middle" class="sublabel">User 4</text>
  
  <!-- Arrows from users to edges -->
  <path class="arrow" d="M130 80 L150 100"/>
  <path class="arrow" d="M130 380 L150 350"/>
  <path class="arrow" d="M870 80 L850 100"/>
  <path class="arrow" d="M870 380 L850 350"/>
  
  <!-- Arrows from edges to origin -->
  <path class="arrow" d="M220 140 L420 220"/>
  <path class="arrow" d="M220 360 L420 280"/>
  <path class="arrow" d="M780 140 L580 220"/>
  <path class="arrow" d="M780 360 L580 280"/>
  
  <!-- Cache labels -->
  <rect class="cdn" x="200" y="180" width="100" height="40" rx="4"/>
  <text x="250" y="205" text-anchor="middle" class="sublabel">Cache Hit</text>
  
  <rect class="cdn" x="700" y="180" width="100" height="40" rx="4"/>
  <text x="750" y="205" text-anchor="middle" class="sublabel">Cache Miss</text>
  
  <text x="500" y="480" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 1: CDN Architecture</text>
</svg>
