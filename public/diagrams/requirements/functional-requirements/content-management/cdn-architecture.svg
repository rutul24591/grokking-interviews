<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">CDN Architecture</text>
  
  <!-- Origin Server -->
  <rect x="50" y="200" width="120" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="110" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Origin</text>
  <text x="110" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Your Server</text>
  <text x="110" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">S3 Bucket</text>
  
  <!-- CDN Edge Nodes -->
  <circle cx="300" cy="100" r="40" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="300" y="95" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Edge</text>
  <text x="300" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">US-East</text>
  
  <circle cx="450" cy="100" r="40" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Edge</text>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">EU-West</text>
  
  <circle cx="600" cy="100" r="40" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Edge</text>
  <text x="600" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Asia</text>
  
  <circle cx="375" cy="200" r="40" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="375" y="195" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Edge</text>
  <text x="375" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">US-West</text>
  
  <circle cx="525" cy="200" r="40" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="525" y="195" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Edge</text>
  <text x="525" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">SA-East</text>
  
  <!-- Users -->
  <circle cx="200" cy="350" r="30" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="200" y="345" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">User</text>
  <text x="200" y="360" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">New York</text>
  
  <circle cx="400" cy="350" r="30" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">User</text>
  <text x="400" y="360" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">London</text>
  
  <circle cx="600" cy="350" r="30" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="345" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">User</text>
  <text x="600" y="360" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Tokyo</text>
  
  <!-- Arrows from Origin to Edges -->
  <line x1="170" y1="220" x2="260" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="170" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Replicate</text>
  
  <line x1="170" y1="240" x2="335" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <line x1="170" y1="260" x2="410" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <line x1="170" y1="280" x2="485" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <line x1="170" y1="250" x2="560" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Arrows from Users to Edges -->
  <line x1="200" y1="320" x2="300" y2="140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">Cache Hit</text>
  
  <line x1="400" y1="320" x2="450" y2="140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">Cache Hit</text>
  
  <line x1="600" y1="320" x2="600" y2="140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="620" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">Cache Hit</text>
  
  <!-- Cache Hit/Miss Legend -->
  <rect x="50" y="400" width="340" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="425" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Cache Flow</text>
  
  <rect x="70" y="440" width="140" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="460" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Cache Hit (Fast)</text>
  
  <rect x="230" y="440" width="140" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="300" y="460" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⚠ Cache Miss (Origin)</text>
  
  <!-- Benefits -->
  <rect x="420" y="400" width="340" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="425" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">CDN Benefits</text>
  
  <rect x="440" y="440" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="460" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⚡ Low Latency</text>
  
  <rect x="600" y="440" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="460" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">🛡️ Origin Protection</text>

</svg>
