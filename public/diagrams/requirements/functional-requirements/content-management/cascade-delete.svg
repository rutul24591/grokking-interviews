<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Cascade Delete Handling</text>
  
  <!-- Cascade Soft Delete -->
  <rect x="50" y="70" width="220" height="280" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Cascade Soft Delete</text>
  
  <rect x="70" y="115" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Parent Record</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Blog Post (deleted)</text>
  
  <line x1="160" y1="165" x2="160" y2="190" stroke="#475569" stroke-width="2"/>
  <line x1="160" y1="190" x2="100" y2="190" stroke="#475569" stroke-width="2"/>
  <line x1="160" y1="190" x2="220" y2="190" stroke="#475569" stroke-width="2"/>
  
  <rect x="70" y="195" width="80" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="110" y="215" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Comment 1</text>
  <text x="110" y="230" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">(deleted)</text>
  
  <rect x="190" y="195" width="80" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="230" y="215" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Comment 2</text>
  <text x="230" y="230" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">(deleted)</text>
  
  <rect x="70" y="250" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="272" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Maintains Referential Integrity</text>
  
  <rect x="70" y="290" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="312" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Deletes More Than Intended</text>
  
  <rect x="70" y="330" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Use: Parent-Child Relationships</text>
  
  <line x1="270" y1="200" x2="310" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Orphan Approach -->
  <rect x="320" y="70" width="220" height="280" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Orphan Approach</text>
  
  <rect x="340" y="115" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="140" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Parent Record</text>
  <text x="430" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">User (deleted)</text>
  
  <line x1="430" y1="165" x2="430" y2="190" stroke="#475569" stroke-width="2"/>
  <line x1="430" y1="190" x2="370" y2="190" stroke="#475569" stroke-width="2"/>
  <line x1="430" y1="190" x2="490" y2="190" stroke="#475569" stroke-width="2"/>
  
  <rect x="340" y="195" width="80" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="380" y="215" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Order 1</text>
  <text x="380" y="230" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">(retained)</text>
  
  <rect x="460" y="195" width="80" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="500" y="215" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Order 2</text>
  <text x="500" y="230" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">(retained)</text>
  
  <rect x="340" y="250" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="272" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Preserves Independent Data</text>
  
  <rect x="340" y="290" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="312" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Orphaned Records</text>
  
  <rect x="340" y="330" width="180" height="35" rx="4" fill="#fef3c7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Use: Independent Relationships</text>
  
  <line x1="540" y1="200" x2="580" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Block Approach -->
  <rect x="590" y="70" width="180" height="280" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Block Approach</text>
  
  <rect x="610" y="115" width="140" height="50" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="140" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Parent Record</text>
  <text x="680" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Category</text>
  
  <line x1="680" y1="165" x2="680" y2="190" stroke="#475569" stroke-width="2"/>
  
  <rect x="610" y="195" width="140" height="40" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="215" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Has Children</text>
  <text x="680" y="230" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">(Products exist)</text>
  
  <rect x="610" y="250" width="140" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="272" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⛔ Delete Blocked</text>
  
  <rect x="610" y="290" width="140" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="680" y="312" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Prevents Data Loss</text>
  
  <rect x="610" y="330" width="140" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="680" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Must Delete Children First</text>
  
  <!-- Examples -->
  <rect x="50" y="370" width="340" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Cascade Examples</text>
  
  <rect x="70" y="410" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Blog Post → Comments (Cascade)</text>
  
  <rect x="70" y="445" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="465" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">User → Orders (Orphan - retain orders)</text>
  
  <!-- Block Examples -->
  <rect x="420" y="370" width="340" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Block Examples</text>
  
  <rect x="440" y="410" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Category → Products (Block)</text>
  
  <rect x="440" y="445" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="465" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Account → Transactions (Block)</text>

</svg>
