<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Content Tagging Interface</text>
  
  <!-- Tag Input -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Tag Input with Autocomplete</text>
  
  <rect x="70" y="115" width="300" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="140" text-anchor="start" font-family="system-ui" font-size="11" fill="#475569">Add tags...</text>
  
  <!-- Autocomplete Dropdown -->
  <rect x="70" y="160" width="300" height="100" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
  
  <rect x="80" y="170" width="280" height="35" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="100" y="192" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">javascript</text>
  <text x="340" y="192" text-anchor="end" font-family="system-ui" font-size="8" fill="#64748b">1,234 uses</text>
  
  <rect x="80" y="210" width="280" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="100" y="232" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">javascript-framework</text>
  <text x="340" y="232" text-anchor="end" font-family="system-ui" font-size="8" fill="#64748b">456 uses</text>
  
  <rect x="80" y="250" width="280" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="100" y="272" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">+ Create "javascript-react"...</text>
  
  <!-- Selected Tags -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Selected Tags</text>
  
  <rect x="440" y="115" width="100" height="35" rx="17" fill="#f59e0b"/>
  <text x="490" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">react ✕</text>
  
  <rect x="550" y="115" width="120" height="35" rx="17" fill="#f59e0b"/>
  <text x="610" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">frontend ✕</text>
  
  <rect x="440" y="160" width="100" height="35" rx="17" fill="#f59e0b"/>
  <text x="490" y="182" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">hooks ✕</text>
  
  <rect x="440" y="210" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="230" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ 3/5 tags used (2 more allowed)</text>
  
  <!-- Tag Limit Indicator -->
  <rect x="440" y="250" width="300" height="15" rx="4" fill="#e2e8f0"/>
  <rect x="440" y="250" width="180" height="15" rx="4" fill="#22c55e"/>
  <text x="750" y="262" text-anchor="end" font-family="system-ui" font-size="8" fill="#475569">60%</text>
  
  <!-- Tag Suggestions -->
  <rect x="50" y="290" width="340" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">ML Tag Suggestions</text>
  
  <rect x="70" y="330" width="300" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="220" y="352" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⭐ javascript (95% confidence)</text>
  
  <rect x="70" y="370" width="300" height="35" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="220" y="392" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⭐ web-development (87% confidence)</text>
  
  <rect x="70" y="410" width="300" height="35" rx="4" fill="#22c55e" opacity="0.1"/>
  <text x="220" y="432" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⭐ ui-components (72% confidence)</text>
  
  <!-- Keyboard Shortcuts -->
  <rect x="420" y="290" width="340" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Keyboard Navigation</text>
  
  <rect x="440" y="330" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="350" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">↑↓ Arrow keys: Navigate suggestions</text>
  
  <rect x="440" y="365" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Enter: Add selected tag</text>
  
  <rect x="440" y="400" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Backspace: Remove last tag</text>
  
  <rect x="440" y="435" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Escape: Close suggestions</text>

</svg>
