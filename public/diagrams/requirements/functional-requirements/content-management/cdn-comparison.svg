<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .cloudflare { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .akamai { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .fastly { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .cloudfront { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Cloudflare -->
  <rect class="cloudflare" x="50" y="50" width="200" height="180" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label">Cloudflare</text>
  
  <rect class="cloudflare" x="70" y="100" width="160" height="30" rx="4"/>
  <text x="150" y="120" text-anchor="middle" class="sublabel">275+ PoPs globally</text>
  
  <rect class="cloudflare" x="70" y="140" width="160" height="30" rx="4"/>
  <text x="150" y="160" text-anchor="middle" class="sublabel">Workers edge computing</text>
  
  <rect class="cloudflare" x="70" y="180" width="160" height="30" rx="4"/>
  <text x="150" y="200" text-anchor="middle" class="sublabel">Free tier available</text>
  
  <!-- Akamai -->
  <rect class="akamai" x="280" y="50" width="200" height="180" rx="8"/>
  <text x="380" y="80" text-anchor="middle" class="text-label">Akamai</text>
  
  <rect class="akamai" x="300" y="100" width="160" height="30" rx="4"/>
  <text x="380" y="120" text-anchor="middle" class="sublabel">4000+ PoPs (largest)</text>
  
  <rect class="akamai" x="300" y="140" width="160" height="30" rx="4"/>
  <text x="380" y="160" text-anchor="middle" class="sublabel">Enterprise focused</text>
  
  <rect class="akamai" x="300" y="180" width="160" height="30" rx="4"/>
  <text x="380" y="200" text-anchor="middle" class="sublabel">Premium pricing</text>
  
  <!-- Fastly -->
  <rect class="fastly" x="510" y="50" width="200" height="180" rx="8"/>
  <text x="610" y="80" text-anchor="middle" class="text-label">Fastly</text>
  
  <rect class="fastly" x="530" y="100" width="160" height="30" rx="4"/>
  <text x="610" y="120" text-anchor="middle" class="sublabel">Instant purge</text>
  
  <rect class="fastly" x="530" y="140" width="160" height="30" rx="4"/>
  <text x="610" y="160" text-anchor="middle" class="sublabel">Real-time analytics</text>
  
  <rect class="fastly" x="530" y="180" width="160" height="30" rx="4"/>
  <text x="610" y="200" text-anchor="middle" class="sublabel">Developer friendly</text>
  
  <!-- AWS CloudFront -->
  <rect class="cloudfront" x="740" y="50" width="200" height="180" rx="8"/>
  <text x="840" y="80" text-anchor="middle" class="text-label">AWS CloudFront</text>
  
  <rect class="cloudfront" x="760" y="100" width="160" height="30" rx="4"/>
  <text x="840" y="120" text-anchor="middle" class="sublabel">600+ PoPs</text>
  
  <rect class="cloudfront" x="760" y="140" width="160" height="30" rx="4"/>
  <text x="840" y="160" text-anchor="middle" class="sublabel">AWS integration</text>
  
  <rect class="cloudfront" x="760" y="180" width="160" height="30" rx="4"/>
  <text x="840" y="200" text-anchor="middle" class="sublabel">Lambda@Edge</text>
  
  <!-- Comparison Table -->
  <rect class="cloudflare" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">CDN Provider Comparison</text>
  
  <!-- Header -->
  <rect class="cloudflare" x="60" y="320" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Provider</text>
  <text x="300" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">PoPs</text>
  <text x="450" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Edge Compute</text>
  <text x="600" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Pricing</text>
  <text x="800" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Best For</text>
  
  <!-- Row 1 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Cloudflare</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel">275+</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Workers</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">$-$$</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel">Most use cases</text>
  
  <!-- Row 2 -->
  <text x="150" y="400" text-anchor="middle" class="sublabel">Akamai</text>
  <text x="300" y="400" text-anchor="middle" class="sublabel">4000+</text>
  <text x="450" y="400" text-anchor="middle" class="sublabel">EdgeWorkers</text>
  <text x="600" y="400" text-anchor="middle" class="sublabel" fill="#e53e3e">$$$$</text>
  <text x="800" y="400" text-anchor="middle" class="sublabel">Enterprise</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 4: CDN Provider Comparison</text>
</svg>
