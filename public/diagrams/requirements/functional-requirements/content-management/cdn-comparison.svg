<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">CDN Provider Comparison</text>
  
  <!-- Cloudflare -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Cloudflare</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Global Network</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">275+ cities worldwide</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Free tier available</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Workers edge computing</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Limited enterprise features</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">in lower tiers</text>
  
  <rect x="70" y="260" width="180" height="35" rx="4" fill="#f59e0b"/>
  <text x="160" y="282" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Best for: SMB, Developers</text>
  
  <!-- Akamai -->
  <rect x="290" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Akamai</text>
  
  <rect x="310" y="115" width="180" height="40" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="400" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Largest Network</text>
  <text x="400" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">4000+ locations globally</text>
  
  <rect x="310" y="165" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Enterprise features</text>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Best for large enterprises</text>
  
  <rect x="310" y="215" width="180" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Expensive</text>
  <text x="400" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Complex pricing</text>
  
  <rect x="310" y="260" width="180" height="35" rx="4" fill="#ef4444"/>
  <text x="400" y="282" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Best for: Enterprise</text>
  
  <!-- Fastly -->
  <rect x="530" y="70" width="220" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Fastly</text>
  
  <rect x="550" y="115" width="180" height="40" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="640" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Real-time Purge</text>
  <text x="640" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Sub-second cache invalidation</text>
  
  <rect x="550" y="165" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Edge compute (VCL)</text>
  <text x="640" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Real-time analytics</text>
  
  <rect x="550" y="215" width="180" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="640" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Smaller network</text>
  <text x="640" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Learning curve for VCL</text>
  
  <rect x="550" y="260" width="180" height="35" rx="4" fill="#8b5cf6"/>
  <text x="640" y="282" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Best for: Real-time needs</text>
  
  <!-- AWS CloudFront -->
  <rect x="50" y="290" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">AWS CloudFront</text>
  
  <rect x="70" y="335" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="355" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">AWS Integration</text>
  <text x="160" y="370" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Deep AWS ecosystem</text>
  
  <rect x="70" y="385" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="405" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Pay-as-you-go</text>
  <text x="160" y="420" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Lambda@Edge compute</text>
  
  <rect x="70" y="435" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ AWS lock-in</text>
  
  <!-- Comparison Summary -->
  <rect x="290" y="290" width="460" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="520" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Selection Guide</text>
  
  <rect x="310" y="335" width="200" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Small/Medium: Cloudflare</text>
  
  <rect x="530" y="335" width="200" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="630" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Enterprise: Akamai</text>
  
  <rect x="310" y="375" width="200" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Real-time: Fastly</text>
  
  <rect x="530" y="375" width="200" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="630" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">AWS Stack: CloudFront</text>
  
  <rect x="310" y="415" width="420" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="520" y="435" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Multi-CDN recommended for critical sites (99.99%+ availability)</text>
  
  <rect x="310" y="460" width="420" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="520" y="480" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Consider: Pricing, Network coverage, Features, Support, Integration</text>

</svg>
