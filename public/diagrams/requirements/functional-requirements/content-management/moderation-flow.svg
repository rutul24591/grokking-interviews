<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .content { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .auto { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .human { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .action { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Content Submission -->
  <rect class="content" x="50" y="50" width="180" height="100" rx="8"/>
  <text x="140" y="90" text-anchor="middle" class="text-label">Content</text>
  <text x="140" y="115" text-anchor="middle" class="sublabel">User Submission</text>
  <text x="140" y="135" text-anchor="middle" class="sublabel">Text/Image/Video</text>
  
  <!-- Automated Detection -->
  <rect class="auto" x="280" y="50" width="220" height="120" rx="8"/>
  <text x="390" y="80" text-anchor="middle" class="text-label">Automated Detection</text>
  <text x="390" y="110" text-anchor="middle" class="sublabel">ML Classification</text>
  <text x="390" y="135" text-anchor="middle" class="sublabel">Rule Filtering</text>
  <text x="390" y="160" text-anchor="middle" class="sublabel">Hash Matching</text>
  
  <!-- Decision -->
  <rect class="human" x="550" y="50" width="180" height="120" rx="8"/>
  <text x="640" y="80" text-anchor="middle" class="text-label">Decision</text>
  <text x="640" y="110" text-anchor="middle" class="sublabel">High Confidence</text>
  <text x="640" y="135" text-anchor="middle" class="sublabel">→ Auto Action</text>
  <text x="640" y="160" text-anchor="middle" class="sublabel">Low Confidence</text>
  
  <!-- Human Review -->
  <rect class="human" x="780" y="50" width="180" height="120" rx="8"/>
  <text x="870" y="80" text-anchor="middle" class="text-label">Human Review</text>
  <text x="870" y="110" text-anchor="middle" class="sublabel">Moderator Queue</text>
  <text x="870" y="135" text-anchor="middle" class="sublabel">Review &amp; Decide</text>
  
  <!-- Action -->
  <rect class="action" x="550" y="250" width="180" height="120" rx="8"/>
  <text x="640" y="280" text-anchor="middle" class="text-label">Enforcement</text>
  <text x="640" y="310" text-anchor="middle" class="sublabel">Remove Content</text>
  <text x="640" y="335" text-anchor="middle" class="sublabel">Warn User</text>
  <text x="640" y="360" text-anchor="middle" class="sublabel">Suspend/Ban</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 100 L275 100"/>
  <path class="arrow" d="M500 100 L545 100"/>
  <path class="arrow" d="M730 100 L775 100"/>
  
  <path class="arrow" d="M640 170 L640 200 L640 245"/>
  <path class="arrow" d="M870 170 L870 220 L640 220 L640 245"/>
  
  <!-- Confidence Split -->
  <text x="640" y="200" text-anchor="middle" class="sublabel" style="font-size: 10px">High → Auto</text>
  <text x="700" y="220" text-anchor="start" class="sublabel" style="font-size: 10px">Low → Human</text>
  
  <text x="500" y="460" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 1: Moderation Flow</text>
</svg>
