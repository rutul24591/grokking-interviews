<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Database Partitioning Strategies</text>
  
  <!-- Range Partitioning -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Range Partitioning (by Date)</text>
  
  <rect x="70" y="115" width="300" height="35" rx="4" fill="#3b82f6"/>
  <text x="220" y="137" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Partition: 2026-01 (January 2026)</text>
  
  <rect x="70" y="155" width="300" height="35" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="220" y="177" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Partition: 2026-02 (February 2026)</text>
  
  <rect x="70" y="195" width="300" height="35" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="220" y="217" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Partition: 2026-03 (March 2026)</text>
  
  <rect x="70" y="235" width="300" height="35" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="220" y="257" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Partition: 2026-04 (April 2026)</text>
  
  <rect x="70" y="275" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="292" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Efficient for time-series queries ("last 30 days")</text>
  
  <!-- Hash Partitioning -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Hash Partitioning (by user_id)</text>
  
  <rect x="440" y="115" width="140" height="140" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="510" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Partition 0</text>
  <text x="510" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">user_id % 4 = 0</text>
  <text x="510" y="185" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Users: 0, 4, 8...</text>
  <text x="510" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Users: 12, 16, 20...</text>
  <text x="510" y="235" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Users: 24, 28, 32...</text>
  
  <rect x="600" y="115" width="140" height="140" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Partition 1</text>
  <text x="670" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">user_id % 4 = 1</text>
  <text x="670" y="185" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Users: 1, 5, 9...</text>
  <text x="670" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Users: 13, 17, 21...</text>
  <text x="670" y="235" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Users: 25, 29, 33...</text>
  
  <rect x="440" y="260" width="140" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="510" y="282" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Partition 2</text>
  
  <rect x="600" y="260" width="140" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="670" y="282" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Partition 3</text>
  
  <rect x="440" y="300" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="317" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Distributes users evenly across partitions</text>
  
  <!-- Read Replicas -->
  <rect x="50" y="290" width="340" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Read Replicas (Read Scaling)</text>
  
  <rect x="70" y="330" width="140" height="50" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="140" y="355" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Leader</text>
  <text x="140" y="375" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Accepts Writes</text>
  
  <line x1="210" y1="355" x2="240" y2="355" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="225" y="345" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">WAL</text>
  
  <rect x="245" y="330" width="130" height="50" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="310" y="355" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Follower 1</text>
  <text x="310" y="375" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Reads Only</text>
  
  <line x1="210" y1="355" x2="240" y2="375" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="245" y="385" width="130" height="50" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="310" y="410" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Follower 2</text>
  <text x="310" y="430" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Reads Only</text>
  
  <rect x="70" y="445" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Read queries distributed to followers</text>

</svg>
