<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Content Validation Layers</text>
  
  <!-- Format Validation -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Format Validation</text>
  
  <rect x="70" y="115" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Length Limits (5-100 chars)</text>
  
  <rect x="70" y="155" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Required Fields (title, body)</text>
  
  <rect x="70" y="195" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Character Encoding (UTF-8)</text>
  
  <rect x="70" y="235" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">File Types (magic bytes)</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Policy Validation -->
  <rect x="320" y="70" width="220" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Policy Validation</text>
  
  <rect x="340" y="115" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prohibited Content (hate speech)</text>
  
  <rect x="340" y="155" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Spam Detection (patterns)</text>
  
  <rect x="340" y="195" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Plagiarism Check (copied)</text>
  
  <rect x="340" y="235" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Copyright (DMCA)</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Quality Validation -->
  <rect x="590" y="70" width="180" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Quality Validation</text>
  
  <rect x="610" y="115" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Readability Score</text>
  
  <rect x="610" y="155" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Completeness Check</text>
  
  <rect x="610" y="195" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Duplicate Detection</text>
  
  <rect x="610" y="235" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Grammar Check</text>
  
  <line x1="680" y1="250" x2="680" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Security Validation -->
  <rect x="590" y="300" width="180" height="150" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Security Validation</text>
  
  <rect x="610" y="340" width="140" height="30" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">XSS Prevention</text>
  
  <rect x="610" y="375" width="140" height="30" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">SQL Injection</text>
  
  <rect x="610" y="410" width="140" height="30" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">CSRF Protection</text>
  
  <!-- Validation Flow -->
  <rect x="50" y="300" width="520" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="310" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Validation Flow (Sequential)</text>
  
  <rect x="70" y="340" width="100" height="40" rx="4" fill="#3b82f6"/>
  <text x="120" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">1. Format</text>
  
  <rect x="180" y="340" width="30" height="40" rx="2" fill="#475569"/>
  <text x="195" y="365" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="220" y="340" width="100" height="40" rx="4" fill="#f59e0b"/>
  <text x="270" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">2. Policy</text>
  
  <rect x="330" y="340" width="30" height="40" rx="2" fill="#475569"/>
  <text x="345" y="365" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="370" y="340" width="100" height="40" rx="4" fill="#22c55e"/>
  <text x="420" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">3. Quality</text>
  
  <rect x="480" y="340" width="30" height="40" rx="2" fill="#475569"/>
  <text x="495" y="365" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="520" y="340" width="40" height="40" rx="4" fill="#ef4444"/>
  <text x="540" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">4. Security</text>
  
  <rect x="70" y="390" width="490" height="50" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="315" y="415" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">✓ All layers must pass → Content saved</text>
  
  <rect x="70" y="445" width="490" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="315" y="467" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Any layer fails → Return specific error, reject submission</text>

</svg>
