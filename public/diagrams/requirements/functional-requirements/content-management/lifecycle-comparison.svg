<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .long { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .short { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .hybrid = { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Long Retention -->
  <rect class="long" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Long Retention</text>
  
  <rect class="long" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Indefinite / Many Years</text>
  
  <rect class="long" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Historical Record Preserved</text>
  
  <rect class="long" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">High Storage Costs</text>
  
  <!-- Short Retention -->
  <rect class="short" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Short Retention</text>
  
  <rect class="short" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">30-90 Days</text>
  
  <rect class="short" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Low Storage Costs</text>
  
  <rect class="short" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Historical Loss</text>
  
  <!-- Hybrid -->
  <rect class="hybrid" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Hybrid (Tiered)</text>
  
  <rect class="hybrid" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">By Content Type</text>
  
  <rect class="hybrid" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Important: Long</text>
  
  <rect class="hybrid" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Temporary: Short</text>
  
  <!-- Comparison Table -->
  <rect class="long" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Retention Strategy Comparison</text>
  
  <!-- Header -->
  <rect class="long" x="60" y="320" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Strategy</text>
  <text x="300" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Compliance</text>
  <text x="450" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Cost</text>
  <text x="600" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">User Experience</text>
  <text x="800" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Best For</text>
  
  <!-- Row 1 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Long</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">High</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e">High</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Good</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel">Legal/Compliance</text>
  
  <!-- Row 2 -->
  <text x="150" y="400" text-anchor="middle" class="sublabel">Short</text>
  <text x="300" y="400" text-anchor="middle" class="sublabel" fill="#e53e3e">Risk</text>
  <text x="450" y="400" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Low</text>
  <text x="600" y="400" text-anchor="middle" class="sublabel" fill="#e53e3e">Poor</text>
  <text x="800" y="400" text-anchor="middle" class="sublabel">Ephemeral Content</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 4: Lifecycle Approaches Comparison</text>
</svg>
