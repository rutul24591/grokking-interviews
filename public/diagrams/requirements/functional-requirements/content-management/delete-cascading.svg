<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Cascading Delete Handling</text>
  
  <!-- Content to Delete -->
  <rect x="50" y="70" width="150" height="100" rx="8" fill="#3b82f6"/>
  <text x="125" y="105" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">Parent Content</text>
  <text x="125" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">To Be Deleted</text>
  <text x="125" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">ID: 12345</text>
  
  <line x1="200" y1="120" x2="240" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Detect</text>
  
  <!-- Dependency Detection -->
  <rect x="250" y="60" width="200" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Dependency Detection</text>
  
  <rect x="270" y="105" width="160" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="350" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Query Related Content</text>
  
  <rect x="270" y="140" width="160" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="350" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Foreign Key References</text>
  
  <line x1="450" y1="120" x2="490" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Options</text>
  
  <!-- Cascade Options -->
  <rect x="500" y="60" width="250" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="625" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f59e0b">Cascade Options</text>
  
  <rect x="520" y="105" width="210" height="30" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="625" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Delete Related (Cascade)</text>
  
  <rect x="520" y="140" width="210" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="625" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Reassign Ownership</text>
  
  <rect x="520" y="175" width="210" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="625" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Block Deletion</text>
  
  <line x1="625" y1="180" x2="625" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Related Content -->
  <rect x="500" y="230" width="250" height="120" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="625" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#8b5cf6">Related Content</text>
  
  <rect x="520" y="270" width="100" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="570" y="290" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Comments (5)</text>
  
  <rect x="630" y="270" width="100" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="290" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Attachments (3)</text>
  
  <rect x="520" y="305" width="100" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="570" y="325" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Versions (12)</text>
  
  <rect x="630" y="305" width="100" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="325" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Shares (8)</text>
  
  <line x1="625" y1="350" x2="625" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Referential Integrity -->
  <rect x="500" y="400" width="250" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="625" y="425" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#22c55e">Referential Integrity</text>
  
  <rect x="520" y="440" width="210" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="625" y="460" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">ON DELETE CASCADE / SET NULL / RESTRICT</text>
  
  <!-- User Choice -->
  <rect x="50" y="230" width="200" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="150" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ef4444">User Confirmation</text>
  
  <rect x="70" y="270" width="160" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="150" y="292" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">"5 comments will be deleted"</text>
  
  <rect x="70" y="310" width="160" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="150" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">"3 attachments will be orphaned"</text>
  
  <line x1="250" y1="290" x2="290" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Execution -->
  <rect x="300" y="230" width="180" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#22c55e">Execute Delete</text>
  
  <rect x="320" y="270" width="140" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="390" y="290" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Delete Parent</text>
  
  <rect x="320" y="305" width="140" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="390" y="325" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Delete Related</text>
  
  <rect x="320" y="340" width="140" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="390" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Log for Audit</text>
  
  <line x1="390" y1="350" x2="390" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Audit Log -->
  <rect x="300" y="400" width="180" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="390" y="425" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Audit Log</text>
  
  <rect x="320" y="440" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="390" y="460" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Who, What, When, Cascade</text>

</svg>
