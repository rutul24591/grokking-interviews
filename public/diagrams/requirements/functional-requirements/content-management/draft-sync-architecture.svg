<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Draft Sync Architecture</text>
  
  <!-- Local Storage -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Local Storage</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">IndexedDB (Large Drafts)</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">50-80% of disk space</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">LocalStorage (Small Drafts)</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">5-10MB limit</text>
  
  <rect x="70" y="215" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="237" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Metadata: Timestamp, Version, Hash</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Sync Queue -->
  <rect x="320" y="70" width="220" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Sync Queue</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Queue Pending Syncs</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">During Offline Period</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Process in Order</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">When Online</text>
  
  <rect x="340" y="215" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="237" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Retry Count per Request</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Server Sync -->
  <rect x="590" y="70" width="180" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Server Sync</text>
  
  <rect x="610" y="115" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Send to Server</text>
  <text x="680" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Content + Metadata</text>
  
  <rect x="610" y="165" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Store Draft</text>
  <text x="680" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">User ID, Version</text>
  
  <rect x="610" y="215" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="237" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Return Success/Error</text>
  
  <line x1="680" y1="250" x2="680" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Conflict Detection -->
  <rect x="590" y="300" width="180" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Conflict Detection</text>
  
  <rect x="610" y="340" width="140" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Compare Versions</text>
  
  <rect x="610" y="380" width="140" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Detect Divergence</text>
  
  <!-- Retry Logic -->
  <rect x="50" y="270" width="220" height="150" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="160" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Retry Logic</text>
  
  <rect x="70" y="315" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="160" y="337" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Exponential Backoff</text>
  
  <rect x="70" y="355" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="160" y="377" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">1s → 2s → 4s → 8s</text>
  
  <rect x="70" y="395" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="160" y="417" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Max 5 Retries</text>
  
  <!-- Connection Monitor -->
  <rect x="320" y="270" width="220" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Connection Monitor</text>
  
  <rect x="340" y="315" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="337" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">navigator.onLine</text>
  
  <rect x="340" y="355" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="377" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Heartbeat Requests</text>
  
  <rect x="340" y="395" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="417" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Trigger Sync on Reconnect</text>
  
  <!-- Status Indicators -->
  <rect x="590" y="430" width="180" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="455" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#22c55e">✓ Saved | ⟳ Saving | 📶 Offline</text>

</svg>
