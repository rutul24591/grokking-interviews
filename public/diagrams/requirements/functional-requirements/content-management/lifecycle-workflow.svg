<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .content = { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .auto { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .retention { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .archive = { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Content -->
  <rect class="content" x="50" y="50" width="180" height="100" rx="8"/>
  <text x="140" y="90" text-anchor="middle" class="text-label">Content</text>
  <text x="140" y="115" text-anchor="middle" class="sublabel">Published Item</text>
  <text x="140" y="135" text-anchor="middle" class="sublabel">Last Access: Date</text>
  
  <!-- Automated Evaluation -->
  <rect class="auto" x="280" y="50" width="200" height="120" rx="8"/>
  <text x="380" y="80" text-anchor="middle" class="text-label">Automated Evaluation</text>
  <text x="380" y="110" text-anchor="middle" class="sublabel">Check Last Access</text>
  <text x="380" y="135" text-anchor="middle" class="sublabel">Evaluate Retention</text>
  <text x="380" y="160" text-anchor="middle" class="sublabel">Check Legal Hold</text>
  
  <!-- Retention Policy -->
  <rect class="retention" x="530" y="50" width="200" height="120" rx="8"/>
  <text x="630" y="80" text-anchor="middle" class="text-label">Retention Policy</text>
  <text x="630" y="110" text-anchor="middle" class="sublabel">Content Type Rules</text>
  <text x="630" y="135" text-anchor="middle" class="sublabel">Legal Requirements</text>
  <text x="630" y="160" text-anchor="middle" class="sublabel">Business Rules</text>
  
  <!-- Action -->
  <rect class="archive" x="780" y="50" width="180" height="120" rx="8"/>
  <text x="870" y="90" text-anchor="middle" class="text-label">Action</text>
  <text x="870" y="120" text-anchor="middle" class="sublabel">Keep Active</text>
  <text x="870" y="145" text-anchor="middle" class="sublabel">Archive</text>
  <text x="870" y="170" text-anchor="middle" class="sublabel">Delete</text>
  
  <!-- Decision Flow -->
  <rect class="content" x="50" y="250" width="900" height="160" rx="8"/>
  <text x="500" y="280" text-anchor="middle" class="text-label">Lifecycle Decision Flow</text>
  
  <!-- Flow boxes -->
  <rect class="content" x="70" y="310" width="180" height="80" rx="4"/>
  <text x="160" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600">Active Content</text>
  <text x="160" y="365" text-anchor="middle" class="sublabel">Accessed &lt; 30 days</text>
  <text x="160" y="385" text-anchor="middle" class="sublabel">→ Keep Active</text>
  
  <rect class="auto" x="280" y="310" width="180" height="80" rx="4"/>
  <text x="370" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600">Inactive Content</text>
  <text x="370" y="365" text-anchor="middle" class="sublabel">Accessed 30-365 days</text>
  <text x="370" y="385" text-anchor="middle" class="sublabel">→ Move to Warm</text>
  
  <rect class="retention" x="490" y="310" width="180" height="80" rx="4"/>
  <text x="580" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600">Old Content</text>
  <text x="580" y="365" text-anchor="middle" class="sublabel">Accessed &gt; 1 year</text>
  <text x="580" y="385" text-anchor="middle" class="sublabel">→ Archive (Cold)</text>
  
  <rect class="archive" x="700" y="310" width="180" height="80" rx="4"/>
  <text x="790" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600">Expired Content</text>
  <text x="790" y="365" text-anchor="middle" class="sublabel">Past Retention Date</text>
  <text x="790" y="385" text-anchor="middle" class="sublabel">→ Delete</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 100 L275 100"/>
  <path class="arrow" d="M480 100 L525 100"/>
  <path class="arrow" d="M730 100 L775 100"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Lifecycle Workflow</text>
</svg>
