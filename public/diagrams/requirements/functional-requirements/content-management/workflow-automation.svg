<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Workflow Automation &amp; Scheduling</text>
  
  <!-- Scheduled Publishing -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Scheduled Publishing</text>
  
  <rect x="70" y="115" width="280" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="210" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Content Queued for Future Publication</text>
  
  <rect x="70" y="155" width="280" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="210" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Timezone Handling (Local Time Publication)</text>
  
  <rect x="70" y="195" width="280" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="210" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Job Scheduler Triggers at Scheduled Time</text>
  
  <rect x="70" y="235" width="280" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="210" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Automatic Publication at Correct Time</text>
  
  <!-- Workflow Rules -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Workflow Automation Rules</text>
  
  <rect x="440" y="115" width="300" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto-Approve: Trusted Authors (No Review)</text>
  
  <rect x="440" y="155" width="300" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto-Schedule: After Approval (1 hour delay)</text>
  
  <rect x="440" y="195" width="300" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto-Archive: After Expiry Date (30 days)</text>
  
  <rect x="440" y="235" width="300" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Reduced Manual Intervention</text>
  
  <!-- Escalation -->
  <rect x="50" y="290" width="340" height="190" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Escalation Rules</text>
  
  <rect x="70" y="330" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Review Overdue (>48 hours)</text>
  
  <rect x="70" y="370" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Escalate to Backup Approver</text>
  
  <rect x="70" y="410" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Notify Original Approver</text>
  
  <rect x="70" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ Prevents Bottlenecks</text>
  
  <!-- Notification System -->
  <rect x="420" y="290" width="340" height="190" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Notification System</text>
  
  <rect x="440" y="330" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Email Notification (Pending Review)</text>
  
  <rect x="440" y="370" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">In-App Notification (Direct Link)</text>
  
  <rect x="440" y="410" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Slack/Teams Integration</text>
  
  <rect x="440" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ Approvers Notified Immediately</text>

</svg>
