<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">File Attachment Flow</text>
  
  <!-- User Upload -->
  <rect x="50" y="70" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="105" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User</text>
  <text x="110" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Select Files</text>
  
  <line x1="170" y1="110" x2="210" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Upload</text>
  
  <!-- Upload Handler -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Upload Handler</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Validate Type/Size</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Show Progress</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Scan</text>
  
  <!-- Virus Scan -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f59e0b">Virus Scan</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Async Scanning</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Quarantine if Infected</text>
  
  <line x1="630" y1="120" x2="670" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Clean</text>
  
  <!-- Storage -->
  <rect x="680" y="60" width="100" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="90" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Storage</text>
  <text x="730" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">S3 / GCS</text>
  <text x="730" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Unique Key</text>
  <text x="730" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Access Metadata</text>
  
  <line x1="730" y1="180" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="200" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">3. Access</text>
  
  <!-- Access Control -->
  <rect x="680" y="230" width="100" height="100" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="730" y="255" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Access</text>
  <text x="730" y="280" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Check Permission</text>
  <text x="730" y="295" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Generate URL</text>
  <text x="730" y="310" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Sign with Expiry</text>
  
  <line x1="680" y1="280" x2="640" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Download -->
  <rect x="450" y="230" width="180" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f59e0b">Download</text>
  <text x="540" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Signed URL</text>
  <text x="540" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Time-Limited</text>
  <text x="540" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Log Access</text>
  
  <line x1="450" y1="280" x2="410" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Versioning -->
  <rect x="220" y="230" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Versioning</text>
  <text x="310" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">New Version</text>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Version History</text>
  <text x="310" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Restore Option</text>
  
  <line x1="220" y1="280" x2="180" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">Complete</text>
  
  <!-- Notification -->
  <rect x="50" y="230" width="120" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Notify</text>
  <text x="110" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Upload Complete</text>
  <text x="110" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Virus Scan Result</text>
  <text x="110" y="315" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Access Granted</text>
  
  <!-- Upload Methods -->
  <rect x="50" y="360" width="340" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Upload Methods</text>
  
  <rect x="70" y="400" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Drag &amp; Drop</text>
  
  <rect x="230" y="400" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">File Picker</text>
  
  <rect x="70" y="435" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Multiple Files</text>
  
  <rect x="230" y="435" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Progress Indicator</text>
  
  <!-- Download Options -->
  <rect x="420" y="360" width="340" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Download Options</text>
  
  <rect x="440" y="400" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Direct Download</text>
  
  <rect x="600" y="400" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Batch as ZIP</text>
  
  <rect x="440" y="435" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Signed URL (1-24h)</text>
  
  <rect x="600" y="435" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Access Logging</text>

</svg>
