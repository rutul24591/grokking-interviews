<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Create Content Flow</text>
  
  <!-- User Starts -->
  <rect x="50" y="70" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="105" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User Clicks</text>
  <text x="110" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">"Create"</text>
  
  <line x1="170" y1="110" x2="210" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Select Type</text>
  
  <!-- Content Type -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Select Content Type</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Blog Post</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Product Listing</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Load Editor</text>
  
  <!-- Editor -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Editor Loads</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">WYSIWYG / Markdown</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Based on preference</text>
  
  <line x1="630" y1="120" x2="670" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Create</text>
  
  <!-- User Creates -->
  <rect x="680" y="60" width="100" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">User Creates</text>
  <text x="730" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Types content</text>
  <text x="730" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Uploads media</text>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Auto-save runs</text>
  
  <line x1="730" y1="180" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="200" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">4. Validate</text>
  
  <!-- Validation -->
  <rect x="680" y="230" width="100" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="730" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Validate</text>
  <text x="730" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Required fields</text>
  <text x="730" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Policy checks</text>
  <text x="730" y="315" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Quality score</text>
  
  <line x1="680" y1="280" x2="640" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Pass</text>
  
  <line x1="680" y1="300" x2="640" y2="320" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="315" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">✗ Fail</text>
  
  <!-- Publish -->
  <rect x="450" y="230" width="180" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#22c55e">Publish / Save Draft</text>
  <text x="540" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Content published</text>
  <text x="540" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">or saved as draft</text>
  <text x="540" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Success notification</text>
  
  <line x1="450" y1="280" x2="410" y2="280" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">Errors</text>
  
  <!-- Error Handling -->
  <rect x="220" y="230" width="180" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="310" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ef4444">Show Errors</text>
  <text x="310" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Highlight fields</text>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Specific messages</text>
  <text x="310" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">User fixes</text>
  
  <!-- Auto-save Loop -->
  <rect x="50" y="230" width="120" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="110" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Auto-Save</text>
  <text x="110" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Every 30 seconds</text>
  <text x="110" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Save to local</text>
  <text x="110" y="315" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Sync to server</text>
  
  <line x1="110" y1="150" x2="110" y2="220" stroke="#475569" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <text x="130" y="190" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">Continuous</text>
  
  <!-- Features -->
  <rect x="50" y="360" width="340" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Create UI Features</text>
  
  <rect x="70" y="400" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Rich Text Editor</text>
  
  <rect x="230" y="400" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Media Upload</text>
  
  <rect x="70" y="435" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto-Save</text>
  
  <rect x="230" y="435" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Real-time Validation</text>
  
  <!-- Publish Options -->
  <rect x="420" y="360" width="340" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Publish Options</text>
  
  <rect x="440" y="400" width="140" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="510" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Publish Now</text>
  
  <rect x="600" y="400" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="670" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Schedule</text>
  
  <rect x="440" y="435" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="510" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Save Draft</text>
  
  <rect x="600" y="435" width="140" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="670" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Preview</text>

</svg>
