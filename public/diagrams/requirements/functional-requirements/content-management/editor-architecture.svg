<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Editor Architecture Comparison</text>
  
  <!-- WYSIWYG -->
  <rect x="50" y="70" width="220" height="280" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">WYSIWYG Editor</text>
  
  <rect x="70" y="115" width="180" height="100" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="85" y="125" width="150" height="20" rx="2" fill="#3b82f6" opacity="0.2"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">B I U H1 H2 List</text>
  <rect x="85" y="155" width="150" height="10" rx="2" fill="#3b82f6" opacity="0.1"/>
  <rect x="85" y="170" width="120" height="10" rx="2" fill="#3b82f6" opacity="0.1"/>
  <rect x="85" y="185" width="140" height="10" rx="2" fill="#3b82f6" opacity="0.1"/>
  <rect x="85" y="200" width="100" height="10" rx="2" fill="#3b82f6" opacity="0.3"/>
  
  <rect x="70" y="225" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="247" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Visual, user-friendly</text>
  
  <rect x="70" y="265" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="287" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ HTML bloat, browser issues</text>
  
  <rect x="70" y="305" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="327" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Examples: TinyMCE, CKEditor</text>
  
  <!-- Markdown -->
  <rect x="290" y="70" width="220" height="280" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Markdown Editor</text>
  
  <rect x="310" y="115" width="180" height="100" rx="4" fill="#1e293b"/>
  <text x="325" y="135" text-anchor="start" font-family="monospace" font-size="8" fill="#22c55e"># Heading</text>
  <text x="325" y="150" text-anchor="start" font-family="monospace" font-size="8" fill="#f1f5f9">This is **bold** text</text>
  <text x="325" y="165" text-anchor="start" font-family="monospace" font-size="8" fill="#f1f5f9">This is *italic*</text>
  <text x="325" y="180" text-anchor="start" font-family="monospace" font-size="8" fill="#f59e0b">- List item 1</text>
  <text x="325" y="195" text-anchor="start" font-family="monospace" font-size="8" fill="#f59e0b">- List item 2</text>
  <text x="325" y="210" text-anchor="start" font-family="monospace" font-size="8" fill="#3b82f6">[Link](url)</text>
  
  <rect x="310" y="225" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="247" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Fast, clean, version-control</text>
  
  <rect x="310" y="265" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="287" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Learning curve, no visual</text>
  
  <rect x="310" y="305" width="180" height="35" rx="4" fill="#fef3c7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="327" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Examples: Stack Overflow, GitHub</text>
  
  <!-- Block -->
  <rect x="530" y="70" width="220" height="280" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Block Editor</text>
  
  <rect x="550" y="115" width="180" height="25" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="640" y="132" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">[Paragraph Block]</text>
  
  <rect x="550" y="145" width="180" height="40" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="640" y="165" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">[Image Block]</text>
  <text x="640" y="180" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Drag to upload image</text>
  
  <rect x="550" y="190" width="180" height="25" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="640" y="207" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">[Heading Block]</text>
  
  <rect x="550" y="220" width="180" height="25" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="640" y="237" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">[Embed Block]</text>
  
  <rect x="550" y="255" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="277" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Modular, flexible, structured</text>
  
  <rect x="550" y="295" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="640" y="317" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Complex, learning curve</text>
  
  <rect x="550" y="335" width="180" height="35" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="357" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Examples: Notion, Gutenberg</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="370" width="700" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Editor Comparison</text>
  
  <rect x="70" y="410" width="200" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="170" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">WYSIWYG: General users</text>
  
  <rect x="280" y="410" width="200" height="30" rx="4" fill="#fef3c7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Markdown: Technical users</text>
  
  <rect x="490" y="410" width="200" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Block: Structured content</text>
  
  <rect x="70" y="445" width="620" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="465" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Recommendation: Support multiple, let users choose preference</text>

</svg>
