<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Collaborative Editing Architecture</text>
  
  <!-- Real-time Sync -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Real-time Sync</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">WebSocket Connection</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Sub-100ms latency</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Push Edits to Server</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Broadcast to others</text>
  
  <rect x="70" y="215" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="237" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Receive Edits from Others</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Presence Indicators -->
  <rect x="320" y="70" width="220" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Presence Indicators</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Show Who's Editing</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Avatars with names</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Cursor Highlights</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">See where others are</text>
  
  <rect x="340" y="215" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="237" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Selection Highlights</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- OT/CRDTs -->
  <rect x="590" y="70" width="180" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">OT / CRDTs</text>
  
  <rect x="610" y="115" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Operational Transforms</text>
  <text x="680" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Google Docs approach</text>
  
  <rect x="610" y="165" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">CRDTs</text>
  <text x="680" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Mathematical guarantee</text>
  
  <rect x="610" y="215" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="237" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Conflict-free Merging</text>
  
  <line x1="680" y1="250" x2="680" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Conflict Resolution -->
  <rect x="590" y="300" width="180" height="150" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Conflict Resolution</text>
  
  <rect x="610" y="340" width="140" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Detect Conflicts</text>
  
  <rect x="610" y="380" width="140" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto-merge if Safe</text>
  
  <rect x="610" y="420" width="140" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="680" y="442" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prompt if Conflicting</text>
  
  <!-- Multi-user Editing -->
  <rect x="50" y="270" width="340" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Multi-user Editing Session</text>
  
  <rect x="70" y="310" width="140" height="60" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="140" y="335" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">User A (You)</text>
  <text x="140" y="355" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Editing paragraph 1</text>
  
  <rect x="230" y="310" width="140" height="60" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="300" y="335" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">User B (Jane)</text>
  <text x="300" y="355" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Editing paragraph 3</text>
  
  <rect x="70" y="380" width="300" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="400" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Non-conflicting: Auto-merge</text>
  
  <rect x="70" y="425" width="300" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="220" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Conflicting: Prompt user to resolve</text>
  
  <!-- Sync States -->
  <rect x="420" y="270" width="340" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Sync States</text>
  
  <rect x="440" y="310" width="300" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Synced (all users have latest)</text>
  
  <rect x="440" y="350" width="300" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="372" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⟳ Syncing (pushing/pulling edits)</text>
  
  <rect x="440" y="390" width="300" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Conflict (needs resolution)</text>
  
  <rect x="440" y="430" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="452" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📶 Offline (queue for sync)</text>

</svg>
