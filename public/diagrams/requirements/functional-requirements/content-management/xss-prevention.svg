<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">XSS Prevention Architecture</text>
  
  <!-- User Input -->
  <rect x="50" y="70" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="105" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User Input</text>
  <text x="110" y="130" text-anchor="middle" font-family="monospace" font-size="8" fill="#ffffff">&lt;script&gt;alert(1)&lt;/script&gt;</text>
  
  <line x1="170" y1="110" x2="210" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Input Sanitization -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Input Sanitization</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">DOMPurify / sanitize-html</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Remove &lt;script&gt; tags</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Sanitized Output -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#22c55e">Sanitized Output</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">&lt;p&gt;Safe content&lt;/p&gt;</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Script tags removed</text>
  
  <line x1="540" y1="180" x2="540" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Output Escaping -->
  <rect x="450" y="230" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f59e0b">Output Escaping</text>
  
  <rect x="470" y="270" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="290" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">&amp;lt; becomes &lt;</text>
  
  <rect x="470" y="305" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="325" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">&amp;gt; becomes &gt;</text>
  
  <line x1="630" y1="290" x2="670" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- CSP -->
  <rect x="680" y="230" width="100" height="120" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="730" y="260" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#3b82f6">CSP Headers</text>
  <text x="730" y="285" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">script-src 'self'</text>
  <text x="730" y="300" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">no inline scripts</text>
  <text x="730" y="315" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">Report violations</text>
  <text x="730" y="330" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">trusted domains only</text>
  
  <!-- Attack Vectors Blocked -->
  <rect x="50" y="230" width="380" height="240" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="240" y="255" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">XSS Attack Vectors Blocked</text>
  
  <rect x="70" y="270" width="340" height="40" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="240" y="290" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">&lt;script&gt;alert('XSS')&lt;/script&gt;</text>
  <text x="240" y="307" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ef4444">✗ BLOCKED - Script tag removed</text>
  
  <rect x="70" y="315" width="340" height="40" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="240" y="335" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">&lt;img src=x onerror=alert(1)&gt;</text>
  <text x="240" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ef4444">✗ BLOCKED - Event handler removed</text>
  
  <rect x="70" y="360" width="340" height="40" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="240" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">javascript:alert(1)</text>
  <text x="240" y="397" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ef4444">✗ BLOCKED - javascript: protocol</text>
  
  <rect x="70" y="405" width="340" height="40" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="240" y="425" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">&lt;iframe src="evil.com"&gt;</text>
  <text x="240" y="442" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ef4444">✗ BLOCKED - iframe removed</text>
  
  <!-- Defense Layers -->
  <rect x="460" y="370" width="300" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="610" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Defense in Depth</text>
  
  <rect x="480" y="410" width="260" height="25" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="610" y="427" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">1. Input Sanitization (DOMPurify)</text>
  
  <rect x="480" y="440" width="260" height="25" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="610" y="457" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2. Output Escaping (HTML entities)</text>
  
  <rect x="480" y="470" width="260" height="25" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="610" y="487" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">3. CSP Headers (restrict scripts)</text>

</svg>
