<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Adaptive Bitrate Streaming</text>
  
  <!-- Source Video -->
  <rect x="50" y="70" width="150" height="100" rx="8" fill="#3b82f6"/>
  <text x="125" y="110" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Source Video</text>
  <text x="125" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">1080p H.264</text>
  <text x="125" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">500MB</text>
  
  <line x1="200" y1="120" x2="240" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Transcode</text>
  
  <!-- Transcoding -->
  <rect x="250" y="60" width="220" height="140" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Transcoding</text>
  
  <rect x="270" y="100" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="360" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">H.264 (Compatibility)</text>
  
  <rect x="270" y="135" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="360" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">H.265/HEVC (Efficiency)</text>
  
  <rect x="270" y="170" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="360" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">AV1 (Royalty-Free)</text>
  
  <line x1="470" y1="130" x2="510" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Variants</text>
  
  <!-- Quality Variants -->
  <rect x="520" y="60" width="230" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="635" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f59e0b">Quality Variants</text>
  
  <rect x="540" y="100" width="190" height="25" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="635" y="117" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">360p @ 500kbps (Mobile)</text>
  
  <rect x="540" y="130" width="190" height="25" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="635" y="147" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">720p @ 2Mbps (Standard)</text>
  
  <rect x="540" y="160" width="190" height="25" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="635" y="177" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">1080p @ 5Mbps (HD)</text>
  
  <rect x="540" y="190" width="190" height="25" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="635" y="207" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">4K @ 20Mbps (UHD)</text>
  
  <line x1="750" y1="130" x2="750" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Packaging -->
  <rect x="660" y="180" width="180" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="750" y="205" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#22c55e">Packaging</text>
  
  <rect x="680" y="220" width="140" height="25" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="750" y="237" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">HLS (.m3u8 + .ts)</text>
  
  <rect x="680" y="250" width="140" height="25" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="750" y="267" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">DASH (.mpd + .m4s)</text>
  
  <line x1="660" y1="230" x2="620" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Storage -->
  <rect x="430" y="220" width="180" height="100" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="520" y="245" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#8b5cf6">Storage</text>
  
  <rect x="450" y="260" width="140" height="25" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="520" y="277" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Video Segments</text>
  
  <rect x="450" y="290" width="140" height="25" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="520" y="307" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Manifest Files</text>
  
  <line x1="430" y1="270" x2="390" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- CDN Delivery -->
  <rect x="200" y="220" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="290" y="245" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#3b82f6">CDN Delivery</text>
  
  <rect x="220" y="260" width="140" height="25" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="290" y="277" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Edge Caching</text>
  
  <rect x="220" y="290" width="140" height="25" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="290" y="307" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Global Distribution</text>
  
  <line x1="200" y1="270" x2="160" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Player -->
  <rect x="50" y="220" width="100" height="100" rx="8" fill="#3b82f6"/>
  <text x="100" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Player</text>
  <text x="100" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Auto Quality</text>
  <text x="100" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Adaptation</text>
  
  <!-- Network Adaptation -->
  <rect x="50" y="340" width="340" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="365" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Network Adaptation</text>
  
  <rect x="70" y="380" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="400" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Good Network (50Mbps): 4K @ 20Mbps</text>
  
  <rect x="70" y="415" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="435" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Medium Network (10Mbps): 1080p @ 5Mbps</text>
  
  <rect x="70" y="450" width="300" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Poor Network (2Mbps): 360p @ 500kbps (No Buffering)</text>
  
  <!-- Benefits -->
  <rect x="420" y="340" width="340" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="365" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Benefits</text>
  
  <rect x="440" y="380" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="400" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ No Buffering (Auto Quality Adjustment)</text>
  
  <rect x="440" y="415" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="435" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Optimal Quality (Best for Network)</text>
  
  <rect x="440" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ Bandwidth Efficiency (Don't Waste Data)</text>

</svg>
