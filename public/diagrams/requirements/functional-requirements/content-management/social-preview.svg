<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .content { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .og = { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .twitter = { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .linkedin = { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Content -->
  <rect class="content" x="50" y="50" width="180" height="150" rx="8"/>
  <text x="140" y="90" text-anchor="middle" class="text-label">Content</text>
  <text x="140" y="120" text-anchor="middle" class="sublabel">Article/Page</text>
  <text x="140" y="145" text-anchor="middle" class="sublabel">Title, Description</text>
  <text x="140" y="170" text-anchor="middle" class="sublabel">Image</text>
  
  <!-- Metadata Extraction -->
  <rect class="content" x="280" y="50" width="200" height="100" rx="8"/>
  <text x="380" y="80" text-anchor="middle" class="text-label">Metadata Extraction</text>
  <text x="380" y="110" text-anchor="middle" class="sublabel">Extract Title</text>
  <text x="380" y="135" text-anchor="middle" class="sublabel">Extract Description</text>
  
  <!-- Open Graph -->
  <rect class="og" x="530" y="50" width="200" height="150" rx="8"/>
  <text x="630" y="80" text-anchor="middle" class="text-label">Open Graph</text>
  <text x="630" y="110" text-anchor="middle" class="sublabel">og:title</text>
  <text x="630" y="135" text-anchor="middle" class="sublabel">og:description</text>
  <text x="630" y="160" text-anchor="middle" class="sublabel">og:image</text>
  <text x="630" y="185" text-anchor="middle" class="sublabel">Facebook, LinkedIn</text>
  
  <!-- Twitter Cards -->
  <rect class="twitter" x="530" y="250" width="200" height="150" rx="8"/>
  <text x="630" y="280" text-anchor="middle" class="text-label">Twitter Cards</text>
  <text x="630" y="310" text-anchor="middle" class="sublabel">twitter:card</text>
  <text x="630" y="335" text-anchor="middle" class="sublabel">twitter:title</text>
  <text x="630" y="360" text-anchor="middle" class="sublabel">twitter:image</text>
  <text x="630" y="385" text-anchor="middle" class="sublabel">Twitter</text>
  
  <!-- LinkedIn -->
  <rect class="linkedin" x="780" y="150" width="180" height="120" rx="8"/>
  <text x="870" y="180" text-anchor="middle" class="text-label">LinkedIn</text>
  <text x="870" y="210" text-anchor="middle" class="sublabel">Uses Open Graph</text>
  <text x="870" y="235" text-anchor="middle" class="sublabel">+ LinkedIn specific</text>
  <text x="870" y="260" text-anchor="middle" class="sublabel">LinkedIn</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 125 L275 125"/>
  <path class="arrow" d="M480 125 L525 125"/>
  <path class="arrow" d="M630 200 L630 245"/>
  <path class="arrow" d="M730 125 L775 180"/>
  
  <!-- Preview Examples -->
  <rect class="content" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Social Preview Examples</text>
  
  <!-- Facebook Preview -->
  <rect class="og" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Facebook</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">Title + Image + Desc</text>
  
  <!-- Twitter Preview -->
  <rect class="twitter" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Twitter</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Card with Image</text>
  
  <!-- LinkedIn Preview -->
  <rect class="linkedin" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">LinkedIn</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Professional Preview</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Social Preview</text>
</svg>
