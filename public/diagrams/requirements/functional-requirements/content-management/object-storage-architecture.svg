<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Object Storage Architecture</text>
  
  <!-- Storage Providers -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Storage Providers</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">AWS S3</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Industry Standard, 11 9s</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Google Cloud Storage</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Global Consistency</text>
  
  <rect x="70" y="215" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="237" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Azure Blob</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Enterprise Integration</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Key Structure -->
  <rect x="320" y="70" width="220" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Key Structure</text>
  
  <rect x="340" y="115" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Bucket Organization</text>
  
  <rect x="340" y="155" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="177" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">users/12345/profiles/</text>
  
  <rect x="340" y="195" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="217" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">photo.jpg (UUID)</text>
  
  <rect x="340" y="235" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prefix-based Access</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Versioning -->
  <rect x="590" y="70" width="180" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Versioning</text>
  
  <rect x="610" y="115" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">All Versions Kept</text>
  
  <rect x="610" y="155" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Recovery from Delete</text>
  
  <rect x="610" y="195" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Version Lifecycle</text>
  
  <rect x="610" y="235" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Cost Consideration</text>
  
  <line x1="680" y1="250" x2="680" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Lifecycle Management -->
  <rect x="590" y="300" width="180" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="680" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Lifecycle Mgmt</text>
  
  <rect x="610" y="340" width="140" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="680" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto Transitions</text>
  
  <rect x="610" y="380" width="140" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="680" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">30d → IA, 90d → Archive</text>
  
  <rect x="610" y="420" width="140" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="680" y="442" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Expiration Policies</text>
  
  <!-- Cross-Region Replication -->
  <rect x="50" y="300" width="340" height="150" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="220" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Cross-Region Replication</text>
  
  <rect x="70" y="340" width="140" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="140" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Primary Region</text>
  <text x="140" y="377" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">us-east-1</text>
  
  <rect x="230" y="340" width="140" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="300" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Secondary Region</text>
  <text x="300" y="377" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">eu-west-1</text>
  
  <line x1="210" y1="360" x2="230" y2="360" stroke="#475569" stroke-width="2" stroke-dasharray="4"/>
  <text x="220" y="350" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Replicate</text>
  
  <rect x="70" y="390" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="410" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Disaster Recovery</text>
  
  <rect x="70" y="425" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Low Latency Global Access</text>
  
  <!-- Security -->
  <rect x="420" y="300" width="340" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Security Features</text>
  
  <rect x="440" y="340" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Encryption at Rest</text>
  
  <rect x="600" y="340" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Encryption in Transit</text>
  
  <rect x="440" y="375" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">IAM Policies</text>
  
  <rect x="600" y="375" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Signed URLs</text>
  
  <rect x="440" y="410" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Access Logging</text>
  
  <rect x="600" y="410" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">VPC Endpoints</text>

</svg>
