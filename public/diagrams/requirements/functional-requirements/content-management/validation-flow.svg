<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Content Validation Flow</text>
  
  <!-- User Submission -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Submits Content</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Submit</text>
  
  <!-- Client-Side Validation -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Client-Side</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Instant Feedback</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Length, Required</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Pass</text>
  
  <line x1="400" y1="140" x2="440" y2="160" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">✗ Fail</text>
  
  <!-- Server-Side Validation -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Server-Side</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Authoritative</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Security-Critical</text>
  
  <line x1="630" y1="120" x2="670" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Pass</text>
  
  <!-- Format Validation -->
  <rect x="680" y="60" width="100" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="90" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Format</text>
  <text x="730" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Length limits</text>
  <text x="730" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Required fields</text>
  <text x="730" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Encoding</text>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">File types</text>
  
  <line x1="730" y1="180" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Policy Validation -->
  <rect x="680" y="230" width="100" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="730" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Policy</text>
  <text x="730" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Prohibited</text>
  <text x="730" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Spam</text>
  <text x="730" y="315" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Plagiarism</text>
  
  <line x1="680" y1="280" x2="640" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Quality Validation -->
  <rect x="450" y="230" width="180" height="100" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="540" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Quality</text>
  <text x="540" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Readability score</text>
  <text x="540" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Completeness</text>
  <text x="540" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Duplicate check</text>
  
  <line x1="450" y1="280" x2="410" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Security Validation -->
  <rect x="220" y="230" width="180" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="310" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ef4444">Security</text>
  <text x="310" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">XSS sanitization</text>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">SQL injection</text>
  <text x="310" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">CSRF token</text>
  
  <line x1="220" y1="280" x2="180" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ All pass</text>
  
  <!-- Save Content -->
  <rect x="50" y="230" width="120" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="270" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Save</text>
  <text x="110" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Content Saved</text>
  <text x="110" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Return Success</text>
  
  <!-- Error Handling -->
  <rect x="50" y="360" width="340" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Error Handling</text>
  
  <rect x="70" y="400" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Return specific field-level errors</text>
  
  <rect x="70" y="435" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">"Title must be 5-100 characters"</text>
  
  <rect x="70" y="470" width="300" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="487" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Preserve user input, highlight errors</text>
  
  <!-- Async Validation -->
  <rect x="420" y="360" width="340" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Async Validation (Background)</text>
  
  <rect x="440" y="400" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Plagiarism check (external API)</text>
  
  <rect x="440" y="435" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Duplicate detection (cosine similarity)</text>
  
  <rect x="440" y="470" width="300" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="487" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Notify user when complete, flag if issue</text>

</svg>
