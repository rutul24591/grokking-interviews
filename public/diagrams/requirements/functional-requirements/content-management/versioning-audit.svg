<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Versioning Audit Trail</text>
  
  <!-- Change Tracking -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Change Tracking</text>
  
  <rect x="70" y="115" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">user_id: Who changed</text>
  
  <rect x="70" y="155" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">timestamp: When changed</text>
  
  <rect x="70" y="195" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">version_number: Which version</text>
  
  <rect x="70" y="235" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">change_description: What changed</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Audit Table -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Audit Table</text>
  
  <rect x="340" y="115" width="180" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="135" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">content_id: UUID</text>
  
  <rect x="340" y="150" width="180" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="170" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">user_id: FK → users</text>
  
  <rect x="340" y="185" width="180" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="205" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">timestamp: TIMESTAMPTZ</text>
  
  <rect x="340" y="220" width="180" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="240" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">action: INSERT/UPDATE/DELETE</text>
  
  <rect x="340" y="255" width="180" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="275" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">old_value: JSONB (nullable)</text>
  
  <rect x="340" y="290" width="180" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="310" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">new_value: JSONB (nullable)</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Compliance Reporting -->
  <rect x="590" y="70" width="180" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Compliance Reporting</text>
  
  <rect x="610" y="115" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Filter by Date Range</text>
  
  <rect x="610" y="155" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Filter by User</text>
  
  <rect x="610" y="195" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Filter by Content Type</text>
  
  <rect x="610" y="235" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Export to PDF/CSV</text>
  
  <rect x="610" y="275" width="140" height="35" rx="4" fill="#22c55e"/>
  <text x="680" y="297" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">SOC 2 / HIPAA / GDPR</text>
  
  <!-- Security Monitoring -->
  <rect x="50" y="290" width="340" height="180" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Security Monitoring</text>
  
  <rect x="70" y="330" width="300" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="220" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Alert: Changes outside business hours</text>
  
  <rect x="70" y="370" width="300" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="220" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Alert: Changes from unknown IPs</text>
  
  <rect x="70" y="410" width="300" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="220" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Alert: Changes by unauthorized users</text>
  
  <rect x="70" y="450" width="300" height="25" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="220" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">IP address, user agent tracked for forensics</text>
  
  <!-- Timeline View -->
  <rect x="420" y="290" width="340" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Timeline View</text>
  
  <rect x="440" y="330" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="350" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2026-03-23 10:30: John created v1</text>
  
  <rect x="440" y="365" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2026-03-25 14:15: Jane edited v2</text>
  
  <rect x="440" y="400" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2026-03-26 09:00: John edited v3</text>
  
  <rect x="440" y="435" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2026-03-28 16:45: Jane edited v4</text>
  
  <rect x="440" y="470" width="300" height="25" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="590" y="487" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">2026-03-30 11:20: John edited v5 (current)</text>

</svg>
