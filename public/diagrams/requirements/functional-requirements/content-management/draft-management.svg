<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Draft Management &amp; Auto-Save</text>
  
  <!-- Local Storage -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Local Storage</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">IndexedDB (Large drafts)</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Content + metadata + timestamp</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">LocalStorage (Small drafts)</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Quick access, limited size</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Works Offline</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">No internet required</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Auto-Save -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Auto-Save Logic</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Timer-based (every 30s)</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">setInterval(save, 30000)</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Event-based (on blur)</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Save before page close</text>
  
  <rect x="340" y="215" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Debounce (1s after typing)</text>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Don't save every keystroke</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Sync -->
  <rect x="590" y="70" width="180" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Sync to Server</text>
  
  <rect x="610" y="115" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">When Online</text>
  <text x="680" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Push local → server</text>
  
  <rect x="610" y="165" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Pull Server Drafts</text>
  <text x="680" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Sync from other devices</text>
  
  <rect x="610" y="215" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Handle Conflicts</text>
  <text x="680" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Last-write-wins or prompt</text>
  
  <line x1="680" y1="270" x2="680" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Save Status -->
  <rect x="590" y="320" width="180" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="680" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Save Status</text>
  
  <rect x="610" y="360" width="140" height="25" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="377" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ "Saved 5s ago"</text>
  
  <rect x="610" y="390" width="140" height="25" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="680" y="407" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">⟳ "Saving..."</text>
  
  <rect x="610" y="420" width="140" height="25" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="680" y="437" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">📶 "Offline - saved locally"</text>
  
  <!-- Conflict Resolution -->
  <rect x="50" y="290" width="340" height="180" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Conflict Resolution</text>
  
  <rect x="70" y="330" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Detect: Local timestamp vs Server timestamp</text>
  
  <rect x="70" y="370" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Last-write-wins: Use latest version automatically</text>
  
  <rect x="70" y="410" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prompt user: Show both versions, let user choose</text>
  
  <rect x="70" y="450" width="300" height="25" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="220" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Three-way merge: Base + Local + Server changes</text>
  
  <!-- Version History -->
  <rect x="420" y="290" width="340" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Version History</text>
  
  <rect x="440" y="330" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="350" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Save periodic snapshots (every 5 minutes)</text>
  
  <rect x="440" y="365" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Save on publish (final version)</text>
  
  <rect x="440" y="400" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Enable restore (any previous version)</text>
  
  <rect x="440" y="435" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Compare versions (side-by-side diff)</text>

</svg>
