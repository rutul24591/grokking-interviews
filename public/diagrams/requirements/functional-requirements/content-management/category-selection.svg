<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Category Selection Interface</text>
  
  <!-- Tree View -->
  <rect x="50" y="70" width="220" height="280" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Tree View</text>
  
  <rect x="70" y="115" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="85" y="135" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">▼ Technology</text>
  
  <rect x="85" y="150" width="165" height="25" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="100" y="167" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">  ▼ Programming</text>
  
  <rect x="100" y="180" width="150" height="20" rx="4" fill="#a78bfa" opacity="0.3"/>
  <text x="115" y="194" text-anchor="start" font-family="system-ui" font-size="8" fill="#0f172a">    Python</text>
  
  <rect x="100" y="205" width="150" height="20" rx="4" fill="#a78bfa"/>
  <text x="115" y="219" text-anchor="start" font-family="system-ui" font-size="8" fill="#ffffff">✓ JavaScript</text>
  
  <rect x="100" y="230" width="150" height="20" rx="4" fill="#a78bfa" opacity="0.3"/>
  <text x="115" y="244" text-anchor="start" font-family="system-ui" font-size="8" fill="#0f172a">    Java</text>
  
  <rect x="85" y="255" width="165" height="25" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="100" y="272" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">  ▶ Design</text>
  
  <rect x="70" y="285" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="85" y="305" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">▶ Business</text>
  
  <rect x="70" y="320" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="85" y="340" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">▶ Lifestyle</text>
  
  <!-- Search -->
  <rect x="290" y="70" width="220" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Search</text>
  
  <rect x="310" y="115" width="180" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="325" y="137" text-anchor="start" font-family="system-ui" font-size="10" fill="#94a3b8">Search categories...</text>
  
  <rect x="310" y="155" width="180" height="25" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="325" y="172" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">🔍 JavaScript</text>
  
  <rect x="310" y="185" width="180" height="25" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="325" y="202" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">  Technology → Programming</text>
  
  <!-- Suggestions -->
  <rect x="530" y="70" width="220" height="120" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">ML Suggestions</text>
  
  <rect x="550" y="115" width="180" height="30" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="640" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Programming (92%)</text>
  
  <rect x="550" y="150" width="180" height="30" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="640" y="170" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Technology (85%)</text>
  
  <rect x="550" y="185" width="180" height="30" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="640" y="205" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Software (72%)</text>
  
  <!-- Multi-Category -->
  <rect x="290" y="210" width="460" height="140" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="520" y="235" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Multi-Category Assignment</text>
  
  <rect x="310" y="255" width="180" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="400" y="275" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">✓ Primary: JavaScript</text>
  
  <rect x="510" y="255" width="180" height="30" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="600" y="275" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">○ Secondary: Web Dev</text>
  
  <rect x="310" y="295" width="180" height="30" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">○ Tertiary: Frontend</text>
  
  <rect x="510" y="295" width="180" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="600" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Max 3 categories</text>
  
  <!-- Flow -->
  <rect x="50" y="370" width="700" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Selection Flow</text>
  
  <rect x="70" y="410" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">1. Browse Tree</text>
  
  <rect x="220" y="410" width="30" height="30" rx="4" fill="#475569"/>
  <text x="235" y="430" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="260" y="410" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="330" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2. Search</text>
  
  <rect x="410" y="410" width="30" height="30" rx="4" fill="#475569"/>
  <text x="425" y="430" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="450" y="410" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="520" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">3. Review Suggestions</text>
  
  <rect x="600" y="410" width="30" height="30" rx="4" fill="#475569"/>
  <text x="615" y="430" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="640" y="410" width="100" height="30" rx="4" fill="#22c55e"/>
  <text x="690" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">4. Confirm</text>

</svg>
