<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .policy { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .legal = { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .delete = { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; stroke-dasharray: 4,2; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Retention Policy -->
  <rect class="policy" x="50" y="50" width="250" height="180" rx="8"/>
  <text x="175" y="80" text-anchor="middle" class="text-label">Retention Policy Engine</text>
  
  <rect class="policy" x="70" y="100" width="210" height="35" rx="4"/>
  <text x="175" y="122" text-anchor="middle" class="sublabel">Content Type Rules</text>
  
  <rect class="policy" x="70" y="145" width="210" height="35" rx="4"/>
  <text x="175" y="167" text-anchor="middle" class="sublabel">Legal Requirements</text>
  
  <rect class="policy" x="70" y="190" width="210" height="35" rx="4"/>
  <text x="175" y="212" text-anchor="middle" class="sublabel">Business Rules</text>
  
  <!-- Legal Hold Check -->
  <rect class="legal" x="350" y="50" width="250" height="180" rx="8"/>
  <text x="475" y="80" text-anchor="middle" class="text-label">Legal Hold Check</text>
  
  <rect class="legal" x="370" y="100" width="210" height="35" rx="4"/>
  <text x="475" y="122" text-anchor="middle" class="sublabel">Check Legal Hold Flag</text>
  
  <rect class="legal" x="370" y="145" width="210" height="35" rx="4"/>
  <text x="475" y="167" text-anchor="middle" class="sublabel">Hold Overrides Deletion</text>
  
  <rect class="legal" x="370" y="190" width="210" height="35" rx="4"/>
  <text x="475" y="212" text-anchor="middle" class="sublabel">Notify Legal Team</text>
  
  <!-- Deletion -->
  <rect class="delete" x="650" y="50" width="300" height="180" rx="8"/>
  <text x="800" y="80" text-anchor="middle" class="text-label">Secure Deletion</text>
  
  <rect class="delete" x="670" y="100" width="260" height="35" rx="4"/>
  <text x="800" y="122" text-anchor="middle" class="sublabel">Soft Delete (30 days)</text>
  
  <rect class="delete" x="670" y="145" width="260" height="35" rx="4"/>
  <text x="800" y="167" text-anchor="middle" class="sublabel">Hard Delete (permanent)</text>
  
  <rect class="delete" x="670" y="190" width="260" height="35" rx="4"/>
  <text x="800" y="212" text-anchor="middle" class="sublabel">Crypto-shredding (secure)</text>
  
  <!-- Flow Diagram -->
  <rect class="policy" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Retention → Legal Hold → Deletion Flow</text>
  
  <!-- Flow -->
  <rect class="policy" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">1. Evaluate Policy</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">Check Retention Date</text>
  
  <rect class="legal" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">2. Legal Hold?</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">If YES → Stop</text>
  
  <rect class="delete" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">3. Soft Delete</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">30-day Recovery</text>
  
  <rect class="delete" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">4. Hard Delete</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Secure Erasure</text>
  
  <path class="arrow" d="M270 360 L295 360"/>
  <path class="arrow" d="M500 360 L525 360"/>
  <path class="arrow" d="M730 360 L755 360"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Retention and Deletion Flow</text>
</svg>
