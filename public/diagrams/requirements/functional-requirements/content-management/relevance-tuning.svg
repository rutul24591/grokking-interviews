<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Relevance Tuning</text>
  
  <!-- BM25 Scoring -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">BM25 Scoring</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Term Frequency (TF)</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">How often term appears in doc</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Inverse Doc Frequency (IDF)</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">How rare term is across corpus</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Field Length Normalization</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Shorter fields rank higher</text>
  
  <rect x="70" y="265" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="287" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Score = TF × IDF × LengthNorm</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Field Boosting -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Field Boosting</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Title Boost (3x)</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Title matches rank higher</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Tags Boost (2x)</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Tag matches rank higher</text>
  
  <rect x="340" y="215" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Body Boost (1x)</text>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Default weight</text>
  
  <rect x="340" y="265" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="287" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Final Score = BM25 × Boost</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Function Boosting -->
  <rect x="590" y="70" width="180" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Function Boosting</text>
  
  <rect x="610" y="115" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Popularity Boost</text>
  <text x="680" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Views, clicks, ratings</text>
  
  <rect x="610" y="165" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Freshness Decay</text>
  <text x="680" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Recent content boosted</text>
  
  <rect x="610" y="215" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Decay Functions</text>
  <text x="680" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Linear, Exponential, Gaussian</text>
  
  <rect x="610" y="265" width="140" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="680" y="287" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Score = BM25 × Boost × Func</text>
  
  <line x1="680" y1="270" x2="680" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Synonyms -->
  <rect x="590" y="320" width="180" height="120" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="680" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Synonyms</text>
  
  <rect x="610" y="360" width="140" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Manual Synonyms</text>
  
  <rect x="610" y="400" width="140" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto Extraction</text>
  
  <!-- Example -->
  <rect x="50" y="320" width="520" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="310" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Relevance Example: Query "laptop"</text>
  
  <rect x="70" y="360" width="480" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Doc 1: "laptop" in title → Title Boost 3x → Score: 9.0</text>
  
  <rect x="70" y="400" width="480" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Doc 2: "laptop" in body + high popularity → Score: 6.5</text>
  
  <rect x="70" y="440" width="480" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Doc 3: "notebook" (synonym) in body → Score: 4.0</text>

</svg>
