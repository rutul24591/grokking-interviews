<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">File Access Control Architecture</text>
  
  <!-- Permission Check -->
  <rect x="50" y="70" width="220" height="150" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Permission Check</text>
  
  <rect x="70" y="115" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Verify User Identity</text>
  
  <rect x="70" y="155" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Check Read/Write Access</text>
  
  <rect x="70" y="195" width="180" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Role-Based (Owner/Editor/Viewer)</text>
  
  <line x1="270" y1="145" x2="310" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Signed URL -->
  <rect x="320" y="70" width="220" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Signed URL Generation</text>
  
  <rect x="340" y="115" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Cryptographic Signature</text>
  
  <rect x="340" y="155" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Expiration (1-24 hours)</text>
  
  <rect x="340" y="195" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prevent URL Tampering</text>
  
  <line x1="540" y1="145" x2="580" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Storage Access -->
  <rect x="590" y="70" width="180" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Storage-Level Access</text>
  
  <rect x="610" y="115" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Bucket Policies</text>
  
  <rect x="610" y="155" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">IAM Roles</text>
  
  <rect x="610" y="195" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Defense in Depth</text>
  
  <line x1="680" y1="220" x2="680" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Access Logging -->
  <rect x="590" y="270" width="180" height="120" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="680" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Access Logging</text>
  
  <rect x="610" y="310" width="140" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">User Identity</text>
  
  <rect x="610" y="350" width="140" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="372" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Timestamp + File ID</text>
  
  <!-- Access Flow -->
  <rect x="50" y="270" width="340" height="210" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Access Control Flow</text>
  
  <rect x="70" y="310" width="300" height="40" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">1. User Requests File Download</text>
  
  <rect x="70" y="355" width="300" height="40" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="377" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2. API Verifies Permission (Read Access)</text>
  
  <rect x="70" y="400" width="300" height="40" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">3. Generate Signed URL with Expiration</text>
  
  <rect x="70" y="445" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="465" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">4. Log Access for Audit Trail</text>
  
  <!-- Permission Levels -->
  <rect x="420" y="270" width="140" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="490" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Roles</text>
  
  <rect x="440" y="310" width="100" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="490" y="332" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Owner</text>
  <text x="490" y="345" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Full Access</text>
  
  <rect x="440" y="350" width="100" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="490" y="372" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Editor</text>
  <text x="490" y="385" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Upload/Delete</text>
  
  <rect x="440" y="390" width="100" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="490" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Viewer</text>
  <text x="490" y="425" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Download Only</text>
  
  <rect x="440" y="430" width="100" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="490" y="452" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">None</text>
  <text x="490" y="465" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">No Access</text>
  
  <!-- Security Features -->
  <rect x="590" y="400" width="180" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="425" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Security Features</text>
  
  <rect x="610" y="440" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Signed URLs</text>
  
  <!-- Download Methods -->
  <rect x="420" y="400" width="140" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="490" y="425" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Download</text>
  
  <rect x="440" y="440" width="100" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Direct/CDN</text>

</svg>
