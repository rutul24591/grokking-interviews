<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .pre { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .post { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .hybrid { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Pre-moderation -->
  <rect class="pre" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Pre-moderation</text>
  
  <rect class="pre" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Review Before Publishing</text>
  
  <rect class="pre" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Safe but Slow</text>
  
  <rect class="pre" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">High-Risk Content</text>
  
  <!-- Post-moderation -->
  <rect class="post" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Post-moderation</text>
  
  <rect class="post" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Publish Then Review</text>
  
  <rect class="post" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Fast but Risk</text>
  
  <rect class="post" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Most UGC Platforms</text>
  
  <!-- Hybrid -->
  <rect class="hybrid" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Hybrid Approach</text>
  
  <rect class="hybrid" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Risk-Based Timing</text>
  
  <rect class="hybrid" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Pre for High-Risk</text>
  
  <rect class="hybrid" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Post for Standard</text>
  
  <!-- Comparison Table -->
  <rect class="pre" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Moderation Timing Comparison</text>
  
  <!-- Header -->
  <rect class="pre" x="60" y="320" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Approach</text>
  <text x="300" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Safety</text>
  <text x="450" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Speed</text>
  <text x="600" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Scale</text>
  <text x="800" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Best For</text>
  
  <!-- Row 1 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Pre-mod</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">High</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e">Slow</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e">Low</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel">High-Risk</text>
  
  <!-- Row 2 -->
  <text x="150" y="400" text-anchor="middle" class="sublabel">Post-mod</text>
  <text x="300" y="400" text-anchor="middle" class="sublabel" fill="#e53e3e">Risk</text>
  <text x="450" y="400" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Fast</text>
  <text x="600" y="400" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">High</text>
  <text x="800" y="400" text-anchor="middle" class="sublabel">Standard UGC</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 4: Moderation Approaches Comparison</text>
</svg>
