<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Auto-Moderation System</text>
  
  <!-- ML Models -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">ML Models</text>
  
  <rect x="70" y="115" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="160" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Hate Speech Detection</text>
  
  <rect x="70" y="155" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="160" y="177" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Nudity Detection</text>
  
  <rect x="70" y="195" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="160" y="217" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Violence Detection</text>
  
  <rect x="70" y="235" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="160" y="257" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Spam Detection</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Keyword Filters -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Keyword Filters</text>
  
  <rect x="340" y="115" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Blocklist (Prohibited Terms)</text>
  
  <rect x="340" y="155" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="430" y="177" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Regex Patterns (Variations)</text>
  
  <rect x="340" y="195" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="430" y="217" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Context-Aware Analysis</text>
  
  <rect x="340" y="235" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="257" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Regular Updates</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Image Analysis -->
  <rect x="590" y="70" width="180" height="200" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Image Analysis</text>
  
  <rect x="610" y="115" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="680" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Computer Vision</text>
  
  <rect x="610" y="155" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="680" y="177" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Hash Matching (PhotoDNA)</text>
  
  <rect x="610" y="195" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="680" y="217" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">OCR (Text in Images)</text>
  
  <rect x="610" y="235" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="680" y="257" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Confidence Scores</text>
  
  <!-- Confidence Thresholds -->
  <rect x="50" y="290" width="340" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Confidence Thresholds</text>
  
  <rect x="70" y="330" width="300" height="40" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="220" y="350" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">High Confidence (>90%) → Auto-Decide</text>
  <text x="220" y="365" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Safe: Auto-approve | Violation: Auto-reject</text>
  
  <rect x="70" y="375" width="300" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="220" y="395" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Medium Confidence (70-90%) → Flag for Review</text>
  <text x="220" y="410" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Prioritize in human review queue</text>
  
  <rect x="70" y="420" width="300" height="40" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="220" y="440" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Low Confidence (&lt;70%) → Human Review</text>
  <text x="220" y="455" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Edge cases, ambiguous content</text>
  
  <!-- Routing -->
  <rect x="420" y="290" width="340" height="180" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Confidence-Based Routing</text>
  
  <rect x="440" y="330" width="300" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="590" y="350" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Auto-Approve: 60% of content</text>
  
  <rect x="440" y="375" width="300" height="40" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="590" y="395" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Auto-Reject: 30% of content</text>
  
  <rect x="440" y="420" width="300" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="440" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Human Review: 10% of content (edge cases)</text>

</svg>
