<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Approval Chain Workflows</text>
  
  <!-- Single Approver -->
  <rect x="50" y="70" width="340" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Single Approver</text>
  
  <rect x="70" y="115" width="100" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Author</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Creates Content</text>
  
  <line x1="170" y1="140" x2="210" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Submit</text>
  
  <rect x="220" y="115" width="100" height="50" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="270" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Editor</text>
  <text x="270" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Single Approver</text>
  
  <line x1="320" y1="140" x2="360" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">Approve</text>
  
  <rect x="70" y="180" width="250" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="195" y="202" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Fast Turnaround</text>
  
  <rect x="70" y="220" width="250" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="195" y="242" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Single Point of Failure</text>
  
  <!-- Multi-Level Sequential -->
  <rect x="50" y="270" width="340" height="210" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="220" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Multi-Level Sequential</text>
  
  <rect x="70" y="315" width="70" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="105" y="335" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Author</text>
  <text x="105" y="350" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Creates</text>
  
  <line x1="140" y1="335" x2="170" y2="335" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="175" y="315" width="70" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="210" y="335" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Editor</text>
  <text x="210" y="350" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Reviews</text>
  
  <line x1="245" y1="335" x2="275" y2="335" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="280" y="315" width="70" height="40" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="315" y="335" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Publisher</text>
  <text x="315" y="350" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Approves</text>
  
  <line x1="315" y1="355" x2="315" y2="385" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="70" y="390" width="250" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="195" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Multiple Perspectives</text>
  
  <rect x="70" y="430" width="250" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="195" y="452" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Slow (Sum of All Times)</text>
  
  <!-- Multi-Level Parallel -->
  <rect x="420" y="70" width="340" height="180" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="590" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Multi-Level Parallel</text>
  
  <rect x="440" y="115" width="80" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="480" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Author</text>
  <text x="480" y="150" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Creates</text>
  
  <line x1="520" y1="135" x2="550" y2="135" stroke="#475569" stroke-width="2"/>
  <line x1="550" y1="135" x2="550" y2="115" stroke="#475569" stroke-width="2"/>
  <line x1="550" y1="135" x2="550" y2="155" stroke="#475569" stroke-width="2"/>
  
  <rect x="560" y="115" width="80" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="600" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Reviewer 1</text>
  <text x="600" y="150" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Parallel</text>
  
  <rect x="560" y="160" width="80" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="600" y="180" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Reviewer 2</text>
  <text x="600" y="195" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Parallel</text>
  
  <line x1="640" y1="135" x2="660" y2="135" stroke="#475569" stroke-width="2"/>
  <line x1="640" y1="180" x2="660" y2="180" stroke="#475569" stroke-width="2"/>
  <line x1="660" y1="135" x2="660" y2="158" stroke="#475569" stroke-width="2"/>
  <line x1="660" y1="180" x2="660" y2="158" stroke="#475569" stroke-width="2"/>
  
  <rect x="670" y="135" width="80" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="710" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Publisher</text>
  <text x="710" y="170" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">Final</text>
  
  <rect x="440" y="220" width="300" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="242" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Fast (Longest Individual Time)</text>
  
  <rect x="440" y="260" width="300" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="282" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Conflicting Feedback Possible</text>
  
  <!-- Role-Based -->
  <rect x="420" y="290" width="340" height="190" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Role-Based Approval</text>
  
  <rect x="440" y="330" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Editor Role → Can Approve Blog Posts</text>
  
  <rect x="440" y="370" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Manager Role → Can Approve Press Releases</text>
  
  <rect x="440" y="410" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Compliance Role → Can Approve Regulated Content</text>
  
  <rect x="440" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ Workflow Continuity Despite Personnel Changes</text>

</svg>
