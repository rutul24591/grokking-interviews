<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .live { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .full { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .responsive { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Live Preview -->
  <rect class="live" x="50" y="50" width="280" height="200" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Live Preview</text>
  
  <rect class="live" x="70" y="100" width="240" height="60" rx="4"/>
  <text x="190" y="125" text-anchor="middle" class="sublabel">Editor | Preview</text>
  <text x="190" y="145" text-anchor="middle" class="sublabel">Side-by-side Layout</text>
  
  <rect class="live" x="70" y="170" width="240" height="35" rx="4"/>
  <text x="190" y="192" text-anchor="middle" class="sublabel">Debounced (300-500ms)</text>
  
  <rect class="live" x="70" y="215" width="240" height="35" rx="4"/>
  <text x="190" y="237" text-anchor="middle" class="sublabel">Real-time Updates</text>
  
  <!-- Full Preview -->
  <rect class="full" x="380" y="50" width="280" height="200" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Full Preview</text>
  
  <rect class="full" x="400" y="100" width="240" height="60" rx="4"/>
  <text x="520" y="125" text-anchor="middle" class="sublabel">Dedicated Preview Page</text>
  <text x="520" y="145" text-anchor="middle" class="sublabel">Full Page Context</text>
  
  <rect class="full" x="400" y="170" width="240" height="35" rx="4"/>
  <text x="520" y="192" text-anchor="middle" class="sublabel">Shareable URL</text>
  
  <rect class="full" x="400" y="215" width="240" height="35" rx="4"/>
  <text x="520" y="237" text-anchor="middle" class="sublabel">Final Review</text>
  
  <!-- Responsive Preview -->
  <rect class="responsive" x="710" y="50" width="240" height="200" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Responsive Preview</text>
  
  <rect class="responsive" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Mobile View</text>
  
  <rect class="responsive" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Tablet View</text>
  
  <rect class="responsive" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Desktop View</text>
  
  <!-- Use Cases -->
  <rect class="live" x="50" y="300" width="900" height="160" rx="8"/>
  <text x="500" y="330" text-anchor="middle" class="text-label">Preview Mode Use Cases</text>
  
  <!-- Use case boxes -->
  <rect class="live" x="70" y="350" width="200" height="90" rx="4"/>
  <text x="170" y="380" text-anchor="middle" class="sublabel" style="font-weight: 600">Live Preview</text>
  <text x="170" y="405" text-anchor="middle" class="sublabel">Quick formatting checks</text>
  <text x="170" y="425" text-anchor="middle" class="sublabel">While editing</text>
  
  <rect class="full" x="300" y="350" width="200" height="90" rx="4"/>
  <text x="400" y="380" text-anchor="middle" class="sublabel" style="font-weight: 600">Full Preview</text>
  <text x="400" y="405" text-anchor="middle" class="sublabel">Final review</text>
  <text x="400" y="425" text-anchor="middle" class="sublabel">Before publishing</text>
  
  <rect class="responsive" x="530" y="350" width="200" height="90" rx="4"/>
  <text x="630" y="380" text-anchor="middle" class="sublabel" style="font-weight: 600">Responsive</text>
  <text x="630" y="405" text-anchor="middle" class="sublabel">Mobile validation</text>
  <text x="630" y="425" text-anchor="middle" class="sublabel">Device testing</text>
  
  <rect class="live" x="760" y="350" width="200" height="90" rx="4"/>
  <text x="860" y="380" text-anchor="middle" class="sublabel" style="font-weight: 600">Social Preview</text>
  <text x="860" y="405" text-anchor="middle" class="sublabel">Social sharing</text>
  <text x="860" y="425" text-anchor="middle" class="sublabel">Open Graph, Twitter</text>
  
  <text x="500" y="480" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 1: Preview Modes</text>
</svg>
