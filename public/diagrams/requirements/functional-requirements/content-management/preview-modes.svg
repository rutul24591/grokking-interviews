<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Content Preview Modes</text>
  
  <!-- Live Preview -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Live Preview</text>
  
  <rect x="70" y="115" width="140" height="140" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="140" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Editor</text>
  <text x="140" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569"># Heading</text>
  <text x="140" y="180" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Some text...</text>
  <text x="140" y="200" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">- List item</text>
  <text x="140" y="220" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">[Cursor]</text>
  
  <rect x="220" y="115" width="140" height="140" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="290" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Preview</text>
  <text x="290" y="160" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Heading</text>
  <text x="290" y="180" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Some text...</text>
  <text x="290" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">• List item</text>
  <text x="290" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569" font-style="italic">Updates as you type</text>
  
  <rect x="70" y="260" width="280" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="210" y="282" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Real-time (debounced 300-500ms)</text>
  
  <rect x="70" y="300" width="280" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="210" y="322" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Partial view (not complete layout)</text>
  
  <!-- Full Preview -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Full Preview</text>
  
  <rect x="440" y="115" width="300" height="140" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Complete Page Layout</text>
  <rect x="460" y="150" width="260" height="15" rx="2" fill="#f59e0b" opacity="0.5"/>
  <text x="590" y="162" text-anchor="middle" font-family="system-ui" font-size="7" fill="#0f172a">Header</text>
  <rect x="460" y="170" width="180" height="60" rx="2" fill="#f59e0b" opacity="0.5"/>
  <text x="550" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Content Body</text>
  <rect x="650" y="170" width="70" height="60" rx="2" fill="#f59e0b" opacity="0.5"/>
  <text x="685" y="200" text-anchor="middle" font-family="system-ui" font-size="7" fill="#0f172a">Sidebar</text>
  <rect x="460" y="235" width="260" height="15" rx="2" fill="#f59e0b" opacity="0.5"/>
  <text x="590" y="247" text-anchor="middle" font-family="system-ui" font-size="7" fill="#0f172a">Footer</text>
  
  <rect x="440" y="260" width="300" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="282" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Complete layout (accurate)</text>
  
  <rect x="440" y="300" width="300" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="322" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Context switch (leave editor)</text>
  
  <!-- Responsive Preview -->
  <rect x="50" y="350" width="340" height="130" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="220" y="375" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Responsive Preview</text>
  
  <rect x="70" y="390" width="80" height="70" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="110" y="415" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Mobile</text>
  <text x="110" y="435" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">320px</text>
  
  <rect x="170" y="390" width="80" height="70" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="210" y="415" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Tablet</text>
  <text x="210" y="435" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">768px</text>
  
  <rect x="270" y="390" width="100" height="70" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="320" y="415" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Desktop</text>
  <text x="320" y="435" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">1440px</text>
  
  <!-- Social Preview -->
  <rect x="420" y="350" width="340" height="130" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="375" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Social Preview</text>
  
  <rect x="440" y="390" width="140" height="70" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="510" y="410" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Facebook</text>
  <rect x="455" y="420" width="110" height="8" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="455" y="435" width="80" height="6" rx="2" fill="#22c55e" opacity="0.3"/>
  
  <rect x="600" y="390" width="140" height="70" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="670" y="410" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Twitter</text>
  <rect x="615" y="420" width="110" height="8" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="615" y="435" width="80" height="6" rx="2" fill="#22c55e" opacity="0.3"/>

</svg>
