<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Content Lifecycle Stages</text>
  
  <!-- Creation -->
  <rect x="50" y="70" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="105" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">1. Creation</text>
  <text x="110" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Draft</text>
  <text x="110" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Version control</text>
  
  <line x1="170" y1="110" x2="210" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Submit</text>
  
  <!-- Review -->
  <rect x="220" y="70" width="120" height="80" rx="8" fill="#8b5cf6"/>
  <text x="280" y="105" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">2. Review</text>
  <text x="280" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Moderation</text>
  <text x="280" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Approve/Reject</text>
  
  <line x1="340" y1="110" x2="380" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Approve</text>
  
  <!-- Publication -->
  <rect x="390" y="70" width="120" height="80" rx="8" fill="#22c55e"/>
  <text x="450" y="105" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">3. Publication</text>
  <text x="450" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Live</text>
  <text x="450" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Indexed, CDN</text>
  
  <line x1="510" y1="110" x2="550" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Age</text>
  
  <!-- Maintenance -->
  <rect x="560" y="70" width="120" height="80" rx="8" fill="#f59e0b"/>
  <text x="620" y="105" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">4. Maintenance</text>
  <text x="620" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Updates</text>
  <text x="620" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Version history</text>
  
  <line x1="680" y1="110" x2="720" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Inactive</text>
  
  <!-- Archival -->
  <rect x="560" y="200" width="120" height="80" rx="8" fill="#64748b"/>
  <text x="620" y="235" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">5. Archival</text>
  <text x="620" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Unpublished</text>
  <text x="620" y="275" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Retained, cold storage</text>
  
  <line x1="620" y1="150" x2="620" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="170" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">Auto-archive</text>
  
  <line x1="680" y1="240" x2="720" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="230" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Expire</text>
  
  <!-- Deletion -->
  <rect x="730" y="200" width="120" height="80" rx="8" fill="#ef4444"/>
  <text x="790" y="235" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">6. Deletion</text>
  <text x="790" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Soft → Hard</text>
  <text x="790" y="275" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Compliance</text>
  
  <!-- Retention Periods -->
  <rect x="50" y="200" width="480" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="290" y="225" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Retention Periods by Content Type</text>
  
  <rect x="70" y="240" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Financial: 7 years</text>
  
  <rect x="230" y="240" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">HIPAA PHI: 6 years</text>
  
  <rect x="390" y="240" width="120" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Comments: 90 days</text>
  
  <rect x="70" y="280" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Posts: Indefinite</text>
  
  <rect x="230" y="280" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Drafts: 30 days</text>
  
  <rect x="390" y="280" width="120" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">GDPR: 30 days</text>
  
  <!-- Compliance -->
  <rect x="50" y="340" width="340" height="140" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="365" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Compliance Requirements</text>
  
  <rect x="70" y="380" width="280" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="400" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">GDPR: Right to erasure (30 days)</text>
  
  <rect x="70" y="415" width="280" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="435" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">HIPAA: PHI retention (6 years)</text>
  
  <rect x="70" y="450" width="280" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="470" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">SOC 2: Audit trails for all transitions</text>
  
  <!-- Legal Holds -->
  <rect x="420" y="340" width="340" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="590" y="365" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Legal Holds</text>
  
  <rect x="440" y="380" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="400" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Flag content for litigation</text>
  
  <rect x="440" y="415" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="435" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prevent deletion while on hold</text>
  
  <rect x="440" y="450" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="470" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Release when litigation ends</text>

</svg>
