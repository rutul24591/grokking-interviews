<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .creation { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .review { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .published { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .archived { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .deleted { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; stroke-dasharray: 4,2; opacity: 0.6; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Creation -->
  <rect class="creation" x="50" y="50" width="180" height="120" rx="8"/>
  <text x="140" y="90" text-anchor="middle" class="text-label">1. Creation</text>
  <text x="140" y="120" text-anchor="middle" class="sublabel">Draft</text>
  <text x="140" y="145" text-anchor="middle" class="sublabel">Version Control</text>
  <text x="140" y="165" text-anchor="middle" class="sublabel">Auto-save</text>
  
  <!-- Review -->
  <rect class="review" x="280" y="50" width="180" height="120" rx="8"/>
  <text x="370" y="90" text-anchor="middle" class="text-label">2. Review</text>
  <text x="370" y="120" text-anchor="middle" class="sublabel">Moderation</text>
  <text x="370" y="145" text-anchor="middle" class="sublabel">Approval</text>
  <text x="370" y="165" text-anchor="middle" class="sublabel">Edit Requests</text>
  
  <!-- Published -->
  <rect class="published" x="510" y="50" width="180" height="120" rx="8"/>
  <text x="600" y="90" text-anchor="middle" class="text-label">3. Publication</text>
  <text x="600" y="120" text-anchor="middle" class="sublabel">Live</text>
  <text x="600" y="145" text-anchor="middle" class="sublabel">Indexed</text>
  <text x="600" y="165" text-anchor="middle" class="sublabel">Distributed</text>
  
  <!-- Maintenance -->
  <rect class="published" x="740" y="50" width="180" height="120" rx="8"/>
  <text x="830" y="90" text-anchor="middle" class="text-label">4. Maintenance</text>
  <text x="830" y="120" text-anchor="middle" class="sublabel">Updates</text>
  <text x="830" y="145" text-anchor="middle" class="sublabel">Version History</text>
  <text x="830" y="165" text-anchor="middle" class="sublabel">Freshness Check</text>
  
  <!-- Archived -->
  <rect class="archived" x="280" y="250" width="180" height="120" rx="8"/>
  <text x="370" y="290" text-anchor="middle" class="text-label">5. Archival</text>
  <text x="370" y="320" text-anchor="middle" class="sublabel">Cold Storage</text>
  <text x="370" y="345" text-anchor="middle" class="sublabel">Reduced Access</text>
  <text x="370" y="365" text-anchor="middle" class="sublabel">Retention Period</text>
  
  <!-- Deleted -->
  <rect class="deleted" x="510" y="250" width="180" height="120" rx="8"/>
  <text x="600" y="290" text-anchor="middle" class="text-label">6. Deletion</text>
  <text x="600" y="320" text-anchor="middle" class="sublabel">Soft Delete</text>
  <text x="600" y="345" text-anchor="middle" class="sublabel">Hard Delete</text>
  <text x="600" y="365" text-anchor="middle" class="sublabel">Secure Erasure</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 110 L275 110"/>
  <path class="arrow" d="M460 110 L505 110"/>
  <path class="arrow" d="M690 110 L735 110"/>
  
  <path class="arrow" d="M830 170 L830 200 L370 200 L370 245"/>
  <path class="arrow" d="M460 310 L505 310"/>
  
  <path class="arrow" d="M690 170 L690 220 L600 220 L600 245"/>
  
  <!-- Loop back for maintenance -->
  <path class="arrow" d="M920 110 L950 110 L950 80 L740 80 L735 80"/>
  <text x="830" y="70" text-anchor="middle" class="sublabel" style="font-size: 10px">Continuous</text>
  
  <text x="500" y="460" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 1: Content Lifecycle Stages</text>
</svg>
