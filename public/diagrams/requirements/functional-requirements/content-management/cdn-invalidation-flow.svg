<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .content { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .invalid { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; stroke-dasharray: 4,2; }
      .versioned { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Purge by URL -->
  <rect class="content" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Purge by URL</text>
  
  <rect class="content" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">/images/logo.png</text>
  
  <rect class="invalid" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">→ PURGE /images/logo.png</text>
  
  <rect class="content" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Cache Cleared for URL</text>
  
  <!-- Purge by Tag -->
  <rect class="content" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Purge by Tag</text>
  
  <rect class="content" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Content tagged: article-123</text>
  
  <rect class="invalid" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">→ PURGE tag:article-123</text>
  
  <rect class="content" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">All Tagged Content Cleared</text>
  
  <!-- Versioned URLs -->
  <rect class="versioned" x="710" y="50" width="280" height="180" rx="8"/>
  <text x="850" y="80" text-anchor="middle" class="text-label">Versioned URLs</text>
  
  <rect class="content" x="730" y="100" width="240" height="35" rx="4"/>
  <text x="850" y="122" text-anchor="middle" class="sublabel">app.v123.js (cached)</text>
  
  <rect class="versioned" x="730" y="145" width="240" height="35" rx="4"/>
  <text x="850" y="167" text-anchor="middle" class="sublabel">Update → app.v124.js</text>
  
  <rect class="content" x="730" y="190" width="240" height="35" rx="4"/>
  <text x="850" y="212" text-anchor="middle" class="sublabel">New URL = Natural Invalidation</text>
  
  <!-- Invalidation Flow -->
  <rect class="content" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Invalidation Decision Flow</text>
  
  <!-- Flow boxes -->
  <rect class="versioned" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Static Assets</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">Use Versioned URLs</text>
  
  <rect class="invalid" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Dynamic Content</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Purge by Tag/URL</text>
  
  <rect class="content" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Emergency</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Purge All (rare)</text>
  
  <rect class="invalid" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Soft Purge</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Serve Stale + Refresh</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Cache Invalidation Flow</text>
</svg>
