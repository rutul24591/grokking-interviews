<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Content Storage Architecture</text>
  
  <!-- Metadata Database -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Metadata Database</text>
  
  <rect x="70" y="115" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">PostgreSQL / MySQL</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">ACID transactions, JOINs</text>
  
  <rect x="70" y="175" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="195" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">content_id (UUID)</text>
  
  <rect x="70" y="210" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">title, author_id, status</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Content Storage -->
  <rect x="320" y="70" width="220" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Content Storage</text>
  
  <rect x="340" y="115" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">TEXT Column or Document Store</text>
  <text x="430" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">MongoDB / DynamoDB</text>
  
  <rect x="340" y="175" width="180" height="30" rx="4" fill="#fef3c7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="195" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">content_id (FK)</text>
  
  <rect x="340" y="210" width="180" height="30" rx="4" fill="#fef3c7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">body (TEXT/HTML/Markdown)</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Object Storage -->
  <rect x="590" y="70" width="180" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Object Storage</text>
  
  <rect x="610" y="115" width="140" height="50" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">S3 / GCS / Azure</text>
  <text x="680" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Media files, attachments</text>
  
  <rect x="610" y="175" width="140" height="30" rx="4" fill="#dcfce7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="680" y="195" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">s3://bucket/user_id/</text>
  
  <rect x="610" y="210" width="140" height="30" rx="4" fill="#dcfce7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="680" y="230" text-anchor="middle" font-family="monospace" font-size="7" fill="#475569">content_id/image.jpg</text>
  
  <!-- Search Index -->
  <rect x="50" y="270" width="220" height="180" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="160" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Search Index</text>
  
  <rect x="70" y="315" width="180" height="50" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="160" y="335" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Elasticsearch / Algolia</text>
  <text x="160" y="355" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Full-text, faceted search</text>
  
  <rect x="70" y="375" width="180" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="395" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">title (boosted 2x)</text>
  
  <rect x="70" y="410" width="180" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="430" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">body (stemmed, analyzed)</text>
  
  <!-- CDN -->
  <rect x="320" y="270" width="220" height="180" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="430" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">CDN</text>
  
  <rect x="340" y="315" width="180" height="50" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="430" y="335" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">CloudFront / Cloudflare</text>
  <text x="430" y="355" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Cache media at edge</text>
  
  <rect x="340" y="375" width="180" height="30" rx="4" fill="#fef2f2" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="395" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">d123.cloudfront.net/...</text>
  
  <rect x="340" y="410" width="180" height="30" rx="4" fill="#fef2f2" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="430" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Fast global delivery</text>
  
  <!-- Read Replicas -->
  <rect x="590" y="270" width="180" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="680" y="295" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Read Replicas</text>
  
  <rect x="610" y="315" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="680" y="337" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Leader (Writes)</text>
  
  <rect x="610" y="355" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="680" y="377" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Follower 1 (Reads)</text>
  
  <rect x="610" y="395" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="680" y="417" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Follower 2 (Reads)</text>
  
  <rect x="610" y="435" width="140" height="25" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="680" y="452" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">...Follower N</text>

</svg>
