<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Conflict Resolution Strategies</text>
  
  <!-- Last-Write-Wins -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Last-Write-Wins</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Compare Timestamps</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Use Most Recent</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Automatic Resolution</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">No User Intervention</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Simple, Seamless</text>
  
  <rect x="70" y="260" width="180" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ May Lose Work</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- User Prompt -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">User Prompt</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Show Both Versions</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Side-by-Side Diff</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">User Chooses</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Keep Local / Keep Server</text>
  
  <rect x="340" y="215" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Full Control</text>
  
  <rect x="340" y="260" width="180" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Interrupts Workflow</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Auto Merge -->
  <rect x="590" y="70" width="180" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Auto Merge</text>
  
  <rect x="610" y="115" width="140" height="40" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Detect Changes</text>
  <text x="680" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Per Section/Block</text>
  
  <rect x="610" y="165" width="140" height="40" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Merge Non-Conflicting</text>
  <text x="680" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Different Sections</text>
  
  <rect x="610" y="215" width="140" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="680" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Best of Both</text>
  
  <rect x="610" y="260" width="140" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="680" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Complex Logic</text>
  
  <!-- Conflict Scenario -->
  <rect x="50" y="290" width="340" height="190" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Conflict Scenario</text>
  
  <rect x="70" y="330" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Device A: Edits Paragraph 1 (v2)</text>
  
  <rect x="70" y="370" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Device B: Edits Paragraph 1 (v2)</text>
  
  <rect x="70" y="410" width="300" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="220" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Conflict: Same Section Modified</text>
  
  <rect x="70" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Resolution: User Prompt or Last-Write-Wins</text>
  
  <!-- Non-Conflict Scenario -->
  <rect x="420" y="290" width="340" height="190" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Non-Conflict Scenario</text>
  
  <rect x="440" y="330" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Device A: Edits Paragraph 1 (v2)</text>
  
  <rect x="440" y="370" width="300" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Device B: Edits Paragraph 2 (v2)</text>
  
  <rect x="440" y="410" width="300" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">No Conflict: Different Sections</text>
  
  <rect x="440" y="450" width="300" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="467" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Resolution: Auto Merge Both Changes</text>

</svg>
