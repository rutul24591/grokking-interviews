<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .local { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .utc = { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .dst = { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; stroke-dasharray: 4,2; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Local Time -->
  <rect class="local" x="50" y="50" width="250" height="180" rx="8"/>
  <text x="175" y="80" text-anchor="middle" class="text-label">Local Time (User)</text>
  
  <rect class="local" x="70" y="100" width="210" height="35" rx="4"/>
  <text x="175" y="122" text-anchor="middle" class="sublabel">User Selects Time</text>
  
  <rect class="local" x="70" y="145" width="210" height="35" rx="4"/>
  <text x="175" y="167" text-anchor="middle" class="sublabel">Displayed in Local TZ</text>
  
  <rect class="local" x="70" y="190" width="210" height="35" rx="4"/>
  <text x="175" y="212" text-anchor="middle" class="sublabel">User&apos;s Timezone</text>
  
  <!-- UTC Conversion -->
  <rect class="utc" x="380" y="50" width="250" height="180" rx="8"/>
  <text x="505" y="80" text-anchor="middle" class="text-label">UTC Storage</text>
  
  <rect class="utc" x="400" y="100" width="210" height="35" rx="4"/>
  <text x="505" y="122" text-anchor="middle" class="sublabel">Convert to UTC</text>
  
  <rect class="utc" x="400" y="145" width="210" height="35" rx="4"/>
  <text x="505" y="167" text-anchor="middle" class="sublabel">Store in Database</text>
  
  <rect class="utc" x="400" y="190" width="210" height="35" rx="4"/>
  <text x="505" y="212" text-anchor="middle" class="sublabel">Timezone-Agnostic</text>
  
  <!-- DST Handling -->
  <rect class="dst" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">DST Handling</text>
  
  <rect class="dst" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Spring Forward</text>
  
  <rect class="dst" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Fall Back</text>
  
  <rect class="dst" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">DST-Aware Library</text>
  
  <!-- Timezone Flow -->
  <rect class="local" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Timezone Handling Flow</text>
  
  <!-- Flow -->
  <rect class="local" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Local Input</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">User&apos;s Timezone</text>
  
  <rect class="utc" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Convert to UTC</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Store in DB</text>
  
  <rect class="dst" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">DST Check</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Handle Transitions</text>
  
  <rect class="local" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Local Display</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Convert Back</text>
  
  <path class="arrow" d="M270 360 L295 360"/>
  <path class="arrow" d="M500 360 L525 360"/>
  <path class="arrow" d="M730 360 L755 360"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Timezone Handling</text>
</svg>
