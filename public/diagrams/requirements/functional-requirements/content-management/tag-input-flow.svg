<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Tag Input Flow</text>
  
  <!-- User Input -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User Types</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">"java..."</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Input</text>
  
  <!-- Debounce -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Debounce (300ms)</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Wait after typing stops</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prevent excessive API calls</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Query</text>
  
  <!-- Autocomplete API -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Autocomplete API</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">GET /tags/autocomplete</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#0f172a">?q=java&amp;limit=10</text>
  
  <line x1="630" y1="120" x2="670" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Return</text>
  
  <!-- Tag Database -->
  <rect x="680" y="60" width="100" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Tags DB</text>
  <text x="730" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Match tags</text>
  <text x="730" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Include usage</text>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Sort by relevance</text>
  
  <line x1="730" y1="180" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="200" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">4. Display</text>
  
  <!-- Suggestions Display -->
  <rect x="680" y="230" width="100" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="730" y="260" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Suggestions</text>
  <text x="730" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">javascript (1234)</text>
  <text x="730" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">java (567)</text>
  <text x="730" y="315" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">+ Create new</text>
  
  <line x1="680" y1="280" x2="640" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">5. Select</text>
  
  <!-- Tag Selection -->
  <rect x="450" y="230" width="180" height="100" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="540" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">User Selects</text>
  <text x="540" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Click or Enter</text>
  <text x="540" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Add to selected</text>
  <text x="540" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Clear input</text>
  
  <line x1="450" y1="280" x2="410" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">6. Validate</text>
  
  <!-- Validation -->
  <rect x="220" y="230" width="180" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="310" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Validation</text>
  <text x="310" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Not duplicate?</text>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Within limit?</text>
  <text x="310" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Valid format?</text>
  
  <line x1="220" y1="280" x2="180" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Valid</text>
  
  <!-- Tag Association -->
  <rect x="50" y="230" width="120" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Add Tag</text>
  <text x="110" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Add to selected</text>
  <text x="110" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Display as chip</text>
  <text x="110" y="315" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Focus input</text>
  
  <!-- Backend Association -->
  <rect x="50" y="360" width="340" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Backend Tag Association</text>
  
  <rect x="70" y="400" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="420" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">INSERT INTO content_tags (content_id, tag_id)</text>
  
  <rect x="70" y="435" width="300" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="455" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">UPDATE tags SET usage_count = usage_count + 1</text>
  
  <!-- Tag Creation Flow -->
  <rect x="420" y="360" width="340" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Create New Tag Flow</text>
  
  <rect x="440" y="400" width="300" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Tag not found → "Create 'new-tag'..."</text>
  
  <rect x="440" y="435" width="300" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Validate → Normalize → INSERT (ON CONFLICT)</text>

</svg>
