<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .standard { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .specialist { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .safety { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Standard Review -->
  <rect class="standard" x="50" y="50" width="250" height="180" rx="8"/>
  <text x="175" y="80" text-anchor="middle" class="text-label">Standard Review</text>
  
  <rect class="standard" x="70" y="100" width="210" height="35" rx="4"/>
  <text x="175" y="122" text-anchor="middle" class="sublabel">General Moderators</text>
  
  <rect class="standard" x="70" y="145" width="210" height="35" rx="4"/>
  <text x="175" y="167" text-anchor="middle" class="sublabel">Standard Violations</text>
  
  <rect class="standard" x="70" y="190" width="210" height="35" rx="4"/>
  <text x="175" y="212" text-anchor="middle" class="sublabel">Hate Speech, Spam</text>
  
  <!-- Specialist Review -->
  <rect class="specialist" x="380" y="50" width="250" height="180" rx="8"/>
  <text x="505" y="80" text-anchor="middle" class="text-label">Specialist Review</text>
  
  <rect class="specialist" x="400" y="100" width="210" height="35" rx="4"/>
  <text x="505" y="122" text-anchor="middle" class="sublabel">Subject Experts</text>
  
  <rect class="specialist" x="400" y="145" width="210" height="35" rx="4"/>
  <text x="505" y="167" text-anchor="middle" class="sublabel">Nuanced Content</text>
  
  <rect class="specialist" x="400" y="190" width="210" height="35" rx="4"/>
  <text x="505" y="212" text-anchor="middle" class="sublabel">Misinformation, Context</text>
  
  <!-- Safety Team -->
  <rect class="safety" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Safety Team</text>
  
  <rect class="safety" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Critical Issues</text>
  
  <rect class="safety" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Threats, Self-Harm</text>
  
  <rect class="safety" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Legal, Law Enforcement</text>
  
  <!-- Escalation Flow -->
  <rect class="standard" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Escalation Workflow</text>
  
  <!-- Flow -->
  <rect class="standard" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Standard Queue</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">General Moderators</text>
  
  <rect class="specialist" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Escalate</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Complex Cases</text>
  
  <rect class="safety" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Critical</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Safety Team</text>
  
  <rect class="specialist" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Legal/Policy</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Specialist Review</text>
  
  <path class="arrow" d="M270 360 L295 360"/>
  <path class="arrow" d="M500 360 L525 360"/>
  <path class="arrow" d="M730 360 L755 360"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Moderation Escalation</text>
</svg>
