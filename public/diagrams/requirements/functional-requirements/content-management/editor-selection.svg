  <rect x="610" y="235" width="140" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="680" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Team Editing</text>
  
  <line x1="680" y1="250" x2="680" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Accessibility -->
