  <rect x="70" y="340" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Active Development</text>
  
  <rect x="230" y="340" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Community Support</text>
  
  <rect x="70" y="375" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">GitHub Activity</text>
  
  <rect x="230" y="375" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Enterprise Support</text>
  
  <rect x="70" y="410" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Check Before Selection</text>
  
  <!-- Selection Flow -->
  <rect x="420" y="300" width="140" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="490" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Selection</text>
  <text x="490" y="350" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Process</text>
  
  <rect x="440" y="365" width="100" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="382" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">1. Requirements</text>
  
  <rect x="440" y="395" width="100" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="412" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">2. Evaluate</text>
  
  <rect x="440" y="425" width="100" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="442" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">3. Test</text>
  
  <rect x="440" y="455" width="100" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="490" y="472" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">4. Select</text>

</svg>
