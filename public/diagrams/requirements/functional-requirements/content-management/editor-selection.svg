  <rect x="340" y="195" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Custom: TipTap, ProseMirror</text>
  
  <rect x="340" y="235" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Match Features to Needs</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Collaboration Needs -->
  <rect x="590" y="70" width="180" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Collaboration Needs</text>
  
  <rect x="610" y="115" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Real-time: ProseMirror</text>
  
  <rect x="610" y="155" width="140" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
