  <rect x="610" y="340" width="140" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">WCAG 2.1 Compliance</text>
  
  <rect x="610" y="380" width="140" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="680" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Keyboard Navigation</text>
  
