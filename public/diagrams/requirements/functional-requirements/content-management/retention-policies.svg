<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Retention Policies &amp; Tiered Storage</text>
  
  <!-- Retention by Content Type -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Retention by Content Type</text>
  
  <rect x="70" y="115" width="300" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="220" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Financial Records: 7 years</text>
  
  <rect x="70" y="150" width="300" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="220" y="170" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">HIPAA PHI: 6 years</text>
  
  <rect x="70" y="185" width="300" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="220" y="205" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Comments: 90 days</text>
  
  <rect x="70" y="220" width="300" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="220" y="240" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Posts: Indefinitely</text>
  
  <rect x="70" y="255" width="300" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="220" y="275" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Drafts: 30 days</text>
  
  <!-- Tiered Storage -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Tiered Storage</text>
  
  <rect x="440" y="115" width="300" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="590" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Hot Storage</text>
  <text x="590" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Active content (0-6 months) - Fast, expensive</text>
  
  <rect x="440" y="165" width="300" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="590" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Warm Storage</text>
  <text x="590" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Older content (6 months - 2 years) - Slower, cheaper</text>
  
  <rect x="440" y="215" width="300" height="40" rx="4" fill="#64748b" opacity="0.3"/>
  <text x="590" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Cold/Archive Storage</text>
  <text x="590" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Old content (2+ years) - Slowest, cheapest</text>
  
  <!-- Legal Holds -->
  <rect x="50" y="290" width="340" height="180" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">Legal Holds</text>
  
  <rect x="70" y="330" width="300" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="220" y="352" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Flag content for litigation</text>
  
  <rect x="70" y="370" width="300" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="220" y="392" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Prevent deletion while on hold</text>
  
  <rect x="70" y="410" width="300" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="220" y="432" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Track holds (created_at, released_at)</text>
  
  <rect x="70" y="450" width="300" height="25" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="220" y="467" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Release when litigation ends</text>
  
  <!-- Automated Cleanup -->
  <rect x="420" y="290" width="340" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Automated Cleanup</text>
  
  <rect x="440" y="330" width="300" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="590" y="352" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Scheduled jobs (daily check)</text>
  
  <rect x="440" y="370" width="300" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="590" y="392" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Delete expired content</text>
  
  <rect x="440" y="410" width="300" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="590" y="432" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Move to cheaper tiers</text>
  
  <rect x="440" y="450" width="300" height="25" rx="4" fill="#22c55e" opacity="0.2"/>
  <text x="590" y="467" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Monitor compliance, alert on failures</text>

</svg>
