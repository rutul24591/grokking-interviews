<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Content Sharing Interface Options</text>
  
  <!-- Social Share Buttons -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Social Share Buttons</text>
  
  <rect x="70" y="115" width="60" height="40" rx="4" fill="#1DA1F2"/>
  <text x="100" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">𝕏</text>
  <text x="100" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Twitter</text>
  
  <rect x="150" y="115" width="60" height="40" rx="4" fill="#1877F2"/>
  <text x="180" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">f</text>
  <text x="180" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Facebook</text>
  
  <rect x="230" y="115" width="60" height="40" rx="4" fill="#0A66C2"/>
  <text x="260" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">in</text>
  <text x="260" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">LinkedIn</text>
  
  <rect x="70" y="180" width="60" height="40" rx="4" fill="#25D366"/>
  <text x="100" y="205" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">📱</text>
  <text x="100" y="230" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">WhatsApp</text>
  
  <rect x="150" y="180" width="60" height="40" rx="4" fill="#E4405F"/>
  <text x="180" y="205" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">📧</text>
  <text x="180" y="230" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Email</text>
  
  <rect x="230" y="180" width="60" height="40" rx="4" fill="#64748b"/>
  <text x="260" y="205" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">⋯</text>
  <text x="260" y="230" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">More</text>
  
  <!-- Copy Link -->
  <rect x="420" y="70" width="340" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="590" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Copy Link</text>
  
  <rect x="440" y="115" width="250" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="460" y="137" text-anchor="start" font-family="monospace" font-size="9" fill="#475569">example.com/post/abc123</text>
  
  <rect x="700" y="115" width="50" height="35" rx="4" fill="#f59e0b"/>
  <text x="725" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Copy</text>
  
  <rect x="440" y="155" width="310" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="175" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ Link copied to clipboard!</text>
  
  <!-- Embed Code -->
  <rect x="50" y="290" width="340" height="180" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Embed Code</text>
  
  <rect x="70" y="330" width="300" height="80" rx="4" fill="#1e293b"/>
  <text x="85" y="350" text-anchor="start" font-family="monospace" font-size="8" fill="#22c55e">&lt;iframe src="https://...</text>
  <text x="85" y="365" text-anchor="start" font-family="monospace" font-size="8" fill="#22c55e">  width="600" height="400"</text>
  <text x="85" y="380" text-anchor="start" font-family="monospace" font-size="8" fill="#22c55e">  frameborder="0"&gt;</text>
  <text x="85" y="395" text-anchor="start" font-family="monospace" font-size="8" fill="#22c55e">&lt;/iframe&gt;</text>
  
  <rect x="70" y="420" width="140" height="35" rx="4" fill="#8b5cf6"/>
  <text x="140" y="442" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Copy Embed</text>
  
  <rect x="230" y="420" width="140" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="300" y="442" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Customize</text>
  
  <!-- Native Share -->
  <rect x="420" y="290" width="340" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Native Share (Web Share API)</text>
  
  <rect x="440" y="330" width="300" height="120" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="355" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Share via</text>
  
  <rect x="460" y="370" width="50" height="60" rx="4" fill="#1DA1F2"/>
  <text x="485" y="405" text-anchor="middle" font-family="system-ui" font-size="7" fill="#ffffff">Twitter</text>
  
  <rect x="530" y="370" width="50" height="60" rx="4" fill="#1877F2"/>
  <text x="555" y="405" text-anchor="middle" font-family="system-ui" font-size="7" fill="#ffffff">Facebook</text>
  
  <rect x="600" y="370" width="50" height="60" rx="4" fill="#25D366"/>
  <text x="625" y="405" text-anchor="middle" font-family="system-ui" font-size="7" fill="#ffffff">WhatsApp</text>
  
  <rect x="670" y="370" width="50" height="60" rx="4" fill="#64748b"/>
  <text x="695" y="405" text-anchor="middle" font-family="system-ui" font-size="7" fill="#ffffff">More</text>

</svg>
