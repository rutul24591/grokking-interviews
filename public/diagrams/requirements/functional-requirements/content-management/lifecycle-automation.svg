<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Lifecycle Automation Flow</text>
  
  <!-- Scheduled Jobs -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Scheduled Jobs</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Daily Check</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Check for content to archive/delete</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Auto-archive</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">After X days inactive</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Auto-delete</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">After retention expires</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Notifications -->
  <rect x="320" y="70" width="220" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Notifications</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Email Owner</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">7 days before action</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Grace Period</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">7-30 days to intervene</text>
  
  <rect x="340" y="215" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Owner Action</text>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Extend, restore, or delete</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Compliance Check -->
  <rect x="590" y="70" width="180" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Compliance Check</text>
  
  <rect x="610" y="115" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Legal Hold?</text>
  <text x="680" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">If yes, prevent deletion</text>
  
  <rect x="610" y="165" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Retention Policy</text>
  <text x="680" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Check policy compliance</text>
  
  <rect x="610" y="215" width="140" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="680" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">GDPR Request?</text>
  <text x="680" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Honor within 30 days</text>
  
  <line x1="680" y1="250" x2="680" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Audit Log -->
  <rect x="590" y="300" width="180" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="680" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Audit Log</text>
  
  <rect x="610" y="340" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="680" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Who (user ID)</text>
  
  <rect x="610" y="375" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="680" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">What (transition)</text>
  
  <rect x="610" y="410" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="680" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">When (timestamp)</text>
  
  <!-- Event-Driven -->
  <rect x="50" y="300" width="220" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Event-Driven</text>
  
  <rect x="70" y="340" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Content submitted → Review</text>
  
  <rect x="70" y="375" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Approved → Publish</text>
  
  <rect x="70" y="410" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Rejected → Draft</text>
  
  <!-- Monitoring -->
  <rect x="320" y="300" width="220" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Monitoring</text>
  
  <rect x="340" y="340" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Track success/failure</text>
  
  <rect x="340" y="375" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Alert on issues</text>
  
  <rect x="340" y="410" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Compliance reports</text>

</svg>
