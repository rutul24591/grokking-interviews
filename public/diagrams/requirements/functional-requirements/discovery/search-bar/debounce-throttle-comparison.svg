<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="400" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Debounce vs Throttle Timing</text>
  
  <!-- No Debouncing (Top Left - Bad Example) -->
  <rect x="20" y="60" width="300" height="150" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="170" y="85" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">No Debouncing (Bad)</text>
  
  <!-- Timeline -->
  <line x1="50" y1="110" x2="290" y2="110" class="arrow" stroke-width="2"/>
  <text x="295" y="115" font-size="10" class="text-secondary">Time →</text>
  
  <!-- Keystrokes -->
  <text x="50" y="100" font-size="9" class="text-secondary">Keys:</text>
  <circle cx="70" cy="110" r="3" class="text-primary"/>
  <circle cx="100" cy="110" r="3" class="text-primary"/>
  <circle cx="130" cy="110" r="3" class="text-primary"/>
  <circle cx="160" cy="110" r="3" class="text-primary"/>
  <circle cx="190" cy="110" r="3" class="text-primary"/>
  <circle cx="220" cy="110" r="3" class="text-primary"/>
  <circle cx="250" cy="110" r="3" class="text-primary"/>
  
  <!-- API Calls (too many) -->
  <text x="50" y="135" font-size="9" class="text-secondary">API:</text>
  <rect x="70" y="125" width="8" height="15" class="highlight-red"/>
  <rect x="100" y="125" width="8" height="15" class="highlight-red"/>
  <rect x="130" y="125" width="8" height="15" class="highlight-red"/>
  <rect x="160" y="125" width="8" height="15" class="highlight-red"/>
  <rect x="190" y="125" width="8" height="15" class="highlight-red"/>
  <rect x="220" y="125" width="8" height="15" class="highlight-red"/>
  <rect x="250" y="125" width="8" height="15" class="highlight-red"/>
  
  <text x="170" y="155" text-anchor="middle" font-size="10" class="highlight-red">7 requests! Overwhelms server</text>
  
  <!-- Debouncing (Top Center - Good) -->
  <rect x="340" y="60" width="300" height="150" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="490" y="85" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Debounce (Recommended)</text>
  
  <!-- Timeline -->
  <line x1="370" y1="110" x2="610" y2="110" class="arrow" stroke-width="2"/>
  <text x="615" y="115" font-size="10" class="text-secondary">Time →</text>
  
  <!-- Keystrokes -->
  <text x="370" y="100" font-size="9" class="text-secondary">Keys:</text>
  <circle cx="390" cy="110" r="3" class="text-primary"/>
  <circle cx="420" cy="110" r="3" class="text-primary"/>
  <circle cx="450" cy="110" r="3" class="text-primary"/>
  <circle cx="480" cy="110" r="3" class="text-primary"/>
  <circle cx="510" cy="110" r="3" class="text-primary"/>
  <circle cx="540" cy="110" r="3" class="text-primary"/>
  <circle cx="570" cy="110" r="3" class="text-primary"/>
  
  <!-- Debounce delay markers -->
  <line x1="390" y1="115" x2="390" y2="140" class="arrow" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="115" x2="420" y2="140" class="arrow" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="450" y1="115" x2="450" y2="140" class="arrow" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="480" y1="115" x2="480" y2="140" class="arrow" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="510" y1="115" x2="510" y2="140" class="arrow" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="540" y1="115" x2="540" y2="140" class="arrow" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Timer reset visualization -->
  <text x="405" y="155" font-size="8" class="text-secondary">reset</text>
  <text x="435" y="155" font-size="8" class="text-secondary">reset</text>
  <text x="465" y="155" font-size="8" class="text-secondary">reset</text>
  <text x="495" y="155" font-size="8" class="text-secondary">reset</text>
  <text x="525" y="155" font-size="8" class="text-secondary">reset</text>
  
  <!-- API Call (single, after pause) -->
  <text x="370" y="180" font-size="9" class="text-secondary">API:</text>
  <rect x="590" y="125" width="15" height="15" class="highlight-green"/>
  <text x="597" y="136" font-size="8" class="text-primary">✓</text>
  
  <!-- Debounce delay label -->
  <line x1="540" y1="145" x2="590" y2="145" class="arrow" stroke-width="1.5"/>
  <text x="565" y="160" text-anchor="middle" font-size="9" font-weight="bold" class="highlight-purple">200-300ms pause</text>
  
  <text x="490" y="195" text-anchor="middle" font-size="10" class="highlight-green">1 request! Efficient</text>
  
  <!-- Throttling (Top Right - Alternative) -->
  <rect x="660" y="60" width="320" height="150" rx="5" class="box-base" stroke-width="2"/>
  <text x="820" y="85" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Throttle (Alternative)</text>
  
  <!-- Timeline -->
  <line x1="690" y1="110" x2="950" y2="110" class="arrow" stroke-width="2"/>
  <text x="955" y="115" font-size="10" class="text-secondary">Time →</text>
  
  <!-- Keystrokes -->
  <text x="690" y="100" font-size="9" class="text-secondary">Keys:</text>
  <circle cx="710" cy="110" r="3" class="text-primary"/>
  <circle cx="740" cy="110" r="3" class="text-primary"/>
  <circle cx="770" cy="110" r="3" class="text-primary"/>
  <circle cx="800" cy="110" r="3" class="text-primary"/>
  <circle cx="830" cy="110" r="3" class="text-primary"/>
  <circle cx="860" cy="110" r="3" class="text-primary"/>
  <circle cx="890" cy="110" r="3" class="text-primary"/>
  <circle cx="920" cy="110" r="3" class="text-primary"/>
  
  <!-- API Calls (limited rate) -->
  <text x="690" y="135" font-size="9" class="text-secondary">API:</text>
  <rect x="710" y="125" width="10" height="15" class="highlight-purple"/>
  <rect x="790" y="125" width="10" height="15" class="highlight-purple"/>
  <rect x="870" y="125" width="10" height="15" class="highlight-purple"/>
  <rect x="950" y="125" width="10" height="15" class="highlight-purple"/>
  
  <!-- Throttle window markers -->
  <line x1="710" y1="145" x2="790" y2="145" class="arrow" stroke-width="1.5"/>
  <line x1="790" y1="145" x2="870" y2="145" class="arrow" stroke-width="1.5"/>
  <line x1="870" y1="145" x2="950" y2="145" class="arrow" stroke-width="1.5"/>
  
  <text x="750" y="160" text-anchor="middle" font-size="9" class="text-secondary">200ms window</text>
  <text x="830" y="160" text-anchor="middle" font-size="9" class="text-secondary">200ms window</text>
  <text x="910" y="160" text-anchor="middle" font-size="9" class="text-secondary">200ms window</text>
  
  <text x="820" y="195" text-anchor="middle" font-size="10" class="highlight-purple">4 requests (max 1 per 200ms)</text>
  
  <!-- Comparison Table (Bottom) -->
  <rect x="20" y="230" width="460" height="150" rx="5" class="box-base" stroke-width="2"/>
  <text x="250" y="260" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Debounce vs Throttle Comparison</text>
  
  <text x="60" y="290" font-size="11" font-weight="bold" class="text-primary">Debounce:</text>
  <text x="60" y="310" font-size="10" class="text-secondary">• Wait for pause in input</text>
  <text x="60" y="330" font-size="10" class="text-secondary">• Single request after typing stops</text>
  <text x="60" y="350" font-size="10" class="text-secondary">• Best for: Autocomplete search</text>
  <text x="60" y="370" font-size="10" class="highlight-green">✓ Recommended for search bars</text>
  
  <text x="280" y="290" font-size="11" font-weight="bold" class="text-primary">Throttle:</text>
  <text x="280" y="310" font-size="10" class="text-secondary">• Limit rate regardless of input</text>
  <text x="280" y="330" font-size="10" class="text-secondary">• Request at most once per N ms</text>
  <text x="280" y="350" font-size="10" class="text-secondary">• Best for: Scroll handlers, resize</text>
  <text x="280" y="370" font-size="10" class="text-secondary">Use when intermediate values matter</text>
  
  <!-- Implementation Code (Bottom Right) -->
  <rect x="500" y="230" width="480" height="150" rx="5" class="accent-box" stroke-width="2"/>
  <text x="740" y="260" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Implementation Example</text>
  
  <!-- Debounce Code -->
  <text x="530" y="285" font-size="10" font-weight="bold" class="text-primary">// Debounce (200ms)</text>
  <text x="530" y="305" font-size="9" class="text-secondary" font-family="monospace">const debounce = (fn, delay) =></text>
  <text x="530" y="320" font-size="9" class="text-secondary" font-family="monospace">  let timer; return (...args) =></text>
  <text x="530" y="335" font-size="9" class="text-secondary" font-family="monospace">    clearTimeout(timer);</text>
  <text x="530" y="350" font-size="9" class="text-secondary" font-family="monospace">    timer = setTimeout(() => fn(...args), delay);</text>
  
  <!-- Throttle Code -->
  <text x="760" y="285" font-size="10" font-weight="bold" class="text-primary">// Throttle (200ms)</text>
  <text x="760" y="305" font-size="9" class="text-secondary" font-family="monospace">const throttle = (fn, limit) => {</text>
  <text x="760" y="320" font-size="9" class="text-secondary" font-family="monospace">  let inThrottle; return (...args) =></text>
  <text x="760" y="335" font-size="9" class="text-secondary" font-family="monospace">    if (!inThrottle) {</text>
  <text x="760" y="350" font-size="9" class="text-secondary" font-family="monospace">      fn(...args); inThrottle = true;</text>
  <text x="760" y="365" font-size="9" class="text-secondary" font-family="monospace">      setTimeout(() => inThrottle = false, limit);</text>
  <text x="760" y="380" font-size="9" class="text-secondary" font-family="monospace">    }</text>
  
  <!-- Key Metrics (Far Bottom) -->
  <rect x="20" y="400" width="300" height="60" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="170" y="425" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Recommended Settings</text>
  <text x="60" y="445" font-size="10" class="text-secondary">Debounce: 200-300ms for autocomplete</text>
  <text x="60" y="460" font-size="10" class="text-secondary">Throttle: 100-200ms for scroll/resize</text>
  
  <rect x="340" y="400" width="300" height="60" rx="5" class="box-base" stroke-width="2"/>
  <text x="490" y="425" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Performance Impact</text>
  <text x="380" y="445" font-size="10" class="text-secondary">Without: 7+ requests per query</text>
  <text x="380" y="460" font-size="10" class="highlight-green">With debounce: 1 request per query</text>
  
  <rect x="660" y="400" width="320" height="60" rx="5" class="accent-box" stroke-width="2"/>
  <text x="820" y="425" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Additional Optimization</text>
  <text x="690" y="445" font-size="10" class="text-secondary">Cancel stale requests with AbortController</text>
  <text x="690" y="460" font-size="10" class="highlight-purple">Prevents race conditions</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
