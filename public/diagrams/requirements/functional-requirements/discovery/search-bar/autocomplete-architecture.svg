<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Autocomplete Architecture</text>
  
  <!-- User Input (Top Left) -->
  <rect x="20" y="70" width="180" height="100" rx="5" class="accent-box" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">User Input</text>
  <text x="110" y="130" text-anchor="middle" font-size="11" class="text-secondary">Typing: "mach"</text>
  <text x="110" y="155" text-anchor="middle" font-size="10" class="highlight-green">Keystroke Events</text>
  
  <!-- Arrow to Debounce -->
  <line x1="200" y1="120" x2="240" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Debounce Logic -->
  <rect x="240" y="70" width="160" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="320" y="100" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Debounce</text>
  <text x="320" y="125" text-anchor="middle" font-size="10" class="text-secondary">Wait 200-300ms</text>
  <text x="320" y="145" text-anchor="middle" font-size="10" class="text-secondary">Cancel on new input</text>
  <text x="320" y="165" text-anchor="middle" font-size="10" class="highlight-purple">Timer + AbortController</text>
  
  <!-- Arrows to Cache and API -->
  <line x1="400" y1="120" x2="440" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Client Cache -->
  <rect x="440" y="70" width="180" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="530" y="100" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Client Cache</text>
  <text x="530" y="125" text-anchor="middle" font-size="10" class="text-secondary">Map/WeakMap</text>
  <text x="530" y="145" text-anchor="middle" font-size="10" class="text-secondary">Key: query prefix</text>
  <text x="530" y="165" text-anchor="middle" font-size="10" class="highlight-green">Cache Hit → Display</text>
  
  <!-- Arrow down to API -->
  <line x1="530" y1="170" x2="530" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="545" y="195" text-anchor="middle" font-size="10" class="text-secondary">Cache Miss</text>
  
  <!-- Autocomplete API -->
  <rect x="440" y="210" width="180" height="120" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="530" y="240" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Autocomplete API</text>
  <text x="530" y="265" text-anchor="middle" font-size="10" class="text-secondary">GET /api/autocomplete</text>
  <text x="530" y="285" text-anchor="middle" font-size="10" class="text-secondary">Params: q, user_id, context</text>
  <text x="530" y="305" text-anchor="middle" font-size="10" class="text-secondary">Response: suggestions[]</text>
  <text x="530" y="325" text-anchor="middle" font-size="10" class="highlight-purple">Target: &lt;50ms p99</text>
  
  <!-- Arrow to Backend -->
  <line x1="620" y1="270" x2="660" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Backend Services -->
  <rect x="660" y="210" width="320" height="120" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="820" y="240" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Backend Services</text>
  
  <!-- Prefix Index -->
  <rect x="680" y="250" width="130" height="65" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="745" y="275" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Prefix Index</text>
  <text x="745" y="295" text-anchor="middle" font-size="9" class="text-secondary">Elasticsearch</text>
  <text x="745" y="308" text-anchor="middle" font-size="9" class="text-secondary">Edge n-grams</text>
  
  <!-- Query Log -->
  <rect x="830" y="250" width="130" height="65" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="895" y="275" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Query Log</text>
  <text x="895" y="295" text-anchor="middle" font-size="9" class="text-secondary">Redis/ClickHouse</text>
  <text x="895" y="308" text-anchor="middle" font-size="9" class="text-secondary">Popular queries</text>
  
  <!-- Arrow back to Client -->
  <line x1="530" y1="330" x2="530" y2="370" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="545" y="355" text-anchor="middle" font-size="10" class="text-secondary">Response</text>
  
  <!-- Results Display (Bottom) -->
  <rect x="20" y="380" width="460" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="250" y="410" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Suggestions Display</text>
  
  <!-- Suggestion Items -->
  <rect x="50" y="425" width="380" height="25" rx="3" class="box-base" stroke-width="1"/>
  <text x="70" y="442" font-size="10" class="text-secondary">🔍</text>
  <text x="90" y="442" font-size="10" class="text-primary">machine </text>
  <text x="145" y="442" font-size="10" font-weight="bold" class="text-primary">learning</text>
  
  <rect x="50" y="455" width="380" height="25" rx="3" class="box-base" stroke-width="1"/>
  <text x="70" y="472" font-size="10" class="text-secondary">🔍</text>
  <text x="90" y="472" font-size="10" class="text-primary">machine </text>
  <text x="145" y="472" font-size="10" font-weight="bold" class="text-primary">vision</text>
  
  <rect x="50" y="485" width="380" height="25" rx="3" class="box-base" stroke-width="1"/>
  <text x="70" y="502" font-size="10" class="text-secondary">🔍</text>
  <text x="90" y="502" font-size="10" class="text-primary">machine </text>
  <text x="145" y="502" font-size="10" font-weight="bold" class="text-primary">translation</text>
  
  <!-- Cache Strategy (Right Bottom) -->
  <rect x="500" y="380" width="480" height="100" rx="5" class="accent-box" stroke-width="2"/>
  <text x="740" y="410" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Caching Strategy</text>
  
  <text x="530" y="435" font-size="10" class="text-primary">•</text>
  <text x="545" y="435" font-size="10" class="text-secondary">Client cache: 1000 entries, LRU eviction</text>
  
  <text x="530" y="455" font-size="10" class="text-primary">•</text>
  <text x="545" y="455" font-size="10" class="text-secondary">CDN edge cache: Popular queries (5 min TTL)</text>
  
  <text x="530" y="475" font-size="10" class="text-primary">•</text>
  <text x="545" y="475" font-size="10" class="text-secondary">Server cache: Redis (1 hour TTL)</text>
  
  <text x="740" y="465" text-anchor="middle" font-size="10" class="highlight-green">~80% cache hit rate</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
