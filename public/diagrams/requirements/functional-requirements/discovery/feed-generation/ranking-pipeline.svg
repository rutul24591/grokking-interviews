<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="400" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Multi-Stage Ranking Pipeline</text>
  
  <!-- Stage 1: All Posts -->
  <rect x="20" y="70" width="120" height="80" rx="5" class="box-base" stroke-width="2"/>
  <text x="80" y="100" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">All Posts</text>
  <text x="80" y="120" text-anchor="middle" font-size="11" class="text-secondary">from Followed</text>
  <text x="80" y="135" text-anchor="middle" font-size="11" class="text-secondary">Accounts</text>
  <text x="80" y="155" text-anchor="middle" font-size="16" font-weight="bold" class="highlight-green">~10,000</text>
  
  <!-- Arrow to Candidate Generation -->
  <line x1="140" y1="110" x2="180" y2="110" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="160" y="100" text-anchor="middle" font-size="10" class="text-secondary">Fetch</text>
  
  <!-- Stage 2: Candidate Generation -->
  <rect x="180" y="60" width="160" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="260" y="85" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Candidate</text>
  <text x="260" y="105" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Generation</text>
  
  <line x1="200" y1="135" x2="320" y2="135" class="arrow" stroke-width="1.5"/>
  <text x="260" y="155" text-anchor="middle" font-size="10" class="text-secondary">Recent posts, followed</text>
  <text x="260" y="170" text-anchor="middle" font-size="10" class="text-secondary">authors, liked topics</text>
  
  <!-- Arrow to Pre-filtering -->
  <line x1="340" y1="110" x2="380" y2="110" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="360" y="100" text-anchor="middle" font-size="10" class="text-secondary">Filter</text>
  
  <!-- Stage 3: Pre-filtering -->
  <rect x="380" y="70" width="130" height="80" rx="5" class="box-base" stroke-width="2"/>
  <text x="445" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Pre-Filter</text>
  <text x="445" y="115" text-anchor="middle" font-size="10" class="text-secondary">Remove:</text>
  <text x="445" y="130" text-anchor="middle" font-size="9" class="text-secondary">• Seen posts</text>
  <text x="445" y="143" text-anchor="middle" font-size="9" class="text-secondary">• Low quality</text>
  
  <!-- Count after filtering -->
  <text x="520" y="110" text-anchor="middle" font-size="16" font-weight="bold" class="highlight-green">~1,000</text>
  
  <!-- Arrow to Scoring -->
  <line x1="510" y1="110" x2="550" y2="110" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="530" y="100" text-anchor="middle" font-size="10" class="text-secondary">Score</text>
  
  <!-- Stage 4: Scoring -->
  <rect x="550" y="50" width="170" height="120" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="635" y="75" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">ML Scoring</text>
  <text x="635" y="95" text-anchor="middle" font-size="11" class="text-secondary">Engagement Prediction</text>
  
  <text x="635" y="120" text-anchor="middle" font-size="10" class="text-secondary">Features:</text>
  <text x="635" y="135" text-anchor="middle" font-size="9" class="text-secondary">• Recency decay</text>
  <text x="635" y="148" text-anchor="middle" font-size="9" class="text-secondary">• Author affinity</text>
  <text x="635" y="161" text-anchor="middle" font-size="9" class="text-secondary">• Content quality</text>
  
  <!-- Arrow to Re-ranking -->
  <line x1="720" y1="110" x2="760" y2="110" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="740" y="100" text-anchor="middle" font-size="10" class="text-secondary">Re-rank</text>
  
  <!-- Stage 5: Re-ranking -->
  <rect x="760" y="60" width="140" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="830" y="85" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Re-Ranking</text>
  <text x="830" y="105" text-anchor="middle" font-size="10" class="text-secondary">Apply:</text>
  <text x="830" y="120" text-anchor="middle" font-size="9" class="text-secondary">• Diversity</text>
  <text x="830" y="133" text-anchor="middle" font-size="9" class="text-secondary">• Business rules</text>
  <text x="830" y="146" text-anchor="middle" font-size="9" class="text-secondary">• Freshness</text>
  
  <!-- Count after re-ranking -->
  <text x="910" y="110" text-anchor="middle" font-size="16" font-weight="bold" class="highlight-green">~100</text>
  
  <!-- Arrow to Final Feed -->
  <line x1="900" y1="110" x2="900" y2="180" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="915" y="150" text-anchor="middle" font-size="10" class="text-secondary">Select</text>
  
  <!-- Final Feed -->
  <rect x="830" y="180" width="140" height="100" rx="5" class="accent-box" stroke-width="3"/>
  <text x="900" y="205" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Final Feed</text>
  <text x="900" y="230" text-anchor="middle" font-size="24" font-weight="bold" class="highlight-green">20-50</text>
  <text x="900" y="255" text-anchor="middle" font-size="10" class="text-secondary">posts to user</text>
  
  <!-- Detailed Feature Breakdown (Bottom) -->
  <text x="500" y="315" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Scoring Model Features</text>
  
  <!-- Recency -->
  <rect x="50" y="335" width="180" height="50" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="140" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Recency Decay</text>
  <text x="140" y="372" text-anchor="middle" font-size="9" class="text-secondary">exp(-age_hours / 24)</text>
  
  <!-- Author Affinity -->
  <rect x="250" y="335" width="180" height="50" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="340" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Author Affinity</text>
  <text x="340" y="372" text-anchor="middle" font-size="9" class="text-secondary">past interactions, follows</text>
  
  <!-- Content Quality -->
  <rect x="450" y="335" width="180" height="50" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="540" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Content Quality</text>
  <text x="540" y="372" text-anchor="middle" font-size="9" class="text-secondary">engagement rate, completion</text>
  
  <!-- User Preferences -->
  <rect x="650" y="335" width="180" height="50" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="740" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">User Preferences</text>
  <text x="740" y="372" text-anchor="middle" font-size="9" class="text-secondary">content type affinity</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
