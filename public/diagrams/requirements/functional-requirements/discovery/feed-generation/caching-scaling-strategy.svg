<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-red { fill: #f56565; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Feed Caching &amp; Scaling Strategy</text>
  
  <!-- Redis Cluster (Top) -->
  <rect x="20" y="60" width="400" height="200" rx="8" class="accent-box" stroke-width="2.5"/>
  <text x="220" y="90" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">Redis Cluster</text>
  <text x="220" y="110" text-anchor="middle" font-size="11" class="text-secondary">Feed Cache Storage</text>
  
  <!-- Redis Shards -->
  <rect x="50" y="130" width="100" height="110" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="100" y="155" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Shard 1</text>
  <text x="100" y="175" text-anchor="middle" font-size="9" class="text-secondary">Users A-M</text>
  <text x="100" y="195" text-anchor="middle" font-size="9" class="text-secondary">~50K feeds</text>
  <text x="100" y="215" text-anchor="middle" font-size="9" class="highlight-green">Active</text>
  
  <rect x="170" y="130" width="100" height="110" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="220" y="155" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Shard 2</text>
  <text x="220" y="175" text-anchor="middle" font-size="9" class="text-secondary">Users N-Z</text>
  <text x="220" y="195" text-anchor="middle" font-size="9" class="text-secondary">~50K feeds</text>
  <text x="220" y="215" text-anchor="middle" font-size="9" class="highlight-green">Active</text>
  
  <rect x="290" y="130" width="100" height="110" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="340" y="155" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Shard 3</text>
  <text x="340" y="175" text-anchor="middle" font-size="9" class="text-secondary">Replica</text>
  <text x="340" y="195" text-anchor="middle" font-size="9" class="text-secondary">Failover</text>
  <text x="340" y="215" text-anchor="middle" font-size="9" class="highlight-green">Standby</text>
  
  <!-- Consistent Hash Ring (Right Top) -->
  <rect x="450" y="60" width="260" height="200" rx="8" class="box-base" stroke-width="2"/>
  <text x="580" y="90" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Consistent Hash Ring</text>
  
  <!-- Hash Ring Circle -->
  <circle cx="580" cy="155" r="65" class="box-base" stroke-width="2" fill="none"/>
  <circle cx="580" cy="155" r="55" class="box-base" stroke-width="1" stroke-dasharray="5,5" fill="none"/>
  
  <!-- Hash Ring Nodes -->
  <circle cx="580" cy="95" r="8" class="accent-box" stroke-width="2"/>
  <text x="580" y="82" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Node 1</text>
  
  <circle cx="635" cy="130" r="8" class="accent-box" stroke-width="2"/>
  <text x="655" y="125" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Node 2</text>
  
  <circle cx="525" cy="130" r="8" class="accent-box" stroke-width="2"/>
  <text x="505" y="125" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Node 3</text>
  
  <circle cx="580" cy="215" r="8" class="highlight-box" stroke-width="2"/>
  <text x="580" y="235" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">User Hash</text>
  
  <!-- Arrows showing hash assignment -->
  <line x1="580" y1="207" x2="580" y2="165" class="arrow" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- Failover Mechanism (Bottom Left) -->
  <rect x="20" y="280" width="460" height="200" rx="8" class="highlight-box" stroke-width="2.5"/>
  <text x="250" y="310" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">Failover Mechanism</text>
  
  <!-- Primary -->
  <rect x="50" y="330" width="120" height="130" rx="5" class="box-base" stroke-width="2"/>
  <text x="110" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Primary</text>
  <text x="110" y="375" text-anchor="middle" font-size="10" class="text-secondary">Redis Node 1</text>
  <text x="110" y="395" text-anchor="middle" font-size="9" class="text-secondary">Serving feeds</text>
  <text x="110" y="415" text-anchor="middle" font-size="9" class="highlight-green">● Online</text>
  <text x="110" y="435" text-anchor="middle" font-size="9" class="text-secondary">p99 &lt; 10ms</text>
  
  <!-- Arrow to Replica -->
  <line x1="170" y1="395" x2="210" y2="395" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="190" y="385" text-anchor="middle" font-size="9" class="text-secondary">Async</text>
  <text x="190" y="398" text-anchor="middle" font-size="9" class="text-secondary">Replication</text>
  
  <!-- Replica -->
  <rect x="210" y="330" width="120" height="130" rx="5" class="box-base" stroke-width="2"/>
  <text x="270" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Replica</text>
  <text x="270" y="375" text-anchor="middle" font-size="10" class="text-secondary">Redis Node 2</text>
  <text x="270" y="395" text-anchor="middle" font-size="9" class="text-secondary">Standby ready</text>
  <text x="270" y="415" text-anchor="middle" font-size="9" class="highlight-green">● Healthy</text>
  <text x="270" y="435" text-anchor="middle" font-size="9" class="text-secondary">Auto-promote</text>
  
  <!-- Failover Arrow -->
  <line x1="330" y1="395" x2="370" y2="395" class="arrow" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="350" y="385" text-anchor="middle" font-size="9" class="text-secondary">On Failure:</text>
  <text x="350" y="398" text-anchor="middle" font-size="9" class="text-secondary">&lt; 1 second</text>
  
  <!-- Failover Result -->
  <rect x="370" y="330" width="90" height="130" rx="5" class="accent-box" stroke-width="2"/>
  <text x="415" y="355" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">New</text>
  <text x="415" y="375" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Primary</text>
  <text x="415" y="395" text-anchor="middle" font-size="9" class="text-secondary">Replica</text>
  <text x="415" y="415" text-anchor="middle" font-size="9" class="text-secondary">promoted</text>
  <text x="415" y="435" text-anchor="middle" font-size="9" class="highlight-green">● Active</text>
  
  <!-- Geo-Distributed (Bottom Right) -->
  <rect x="500" y="280" width="480" height="200" rx="8" class="box-base" stroke-width="2"/>
  <text x="740" y="310" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">Geo-Distributed Caches</text>
  
  <!-- Regions -->
  <rect x="530" y="330" width="130" height="130" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="595" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">US-East</text>
  <text x="595" y="375" text-anchor="middle" font-size="10" class="text-secondary">Primary Region</text>
  <text x="595" y="395" text-anchor="middle" font-size="9" class="text-secondary">10M users</text>
  <text x="595" y="415" text-anchor="middle" font-size="9" class="text-secondary">p50: 5ms</text>
  <text x="595" y="435" text-anchor="middle" font-size="9" class="highlight-green">● Active</text>
  
  <rect x="680" y="330" width="130" height="130" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="745" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">EU-West</text>
  <text x="745" y="375" text-anchor="middle" font-size="10" class="text-secondary">Read Replica</text>
  <text x="745" y="395" text-anchor="middle" font-size="9" class="text-secondary">5M users</text>
  <text x="745" y="415" text-anchor="middle" font-size="9" class="text-secondary">p50: 8ms</text>
  <text x="745" y="435" text-anchor="middle" font-size="9" class="highlight-green">● Active</text>
  
  <rect x="830" y="330" width="130" height="130" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="895" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">APAC</text>
  <text x="895" y="375" text-anchor="middle" font-size="10" class="text-secondary">Read Replica</text>
  <text x="895" y="395" text-anchor="middle" font-size="9" class="text-secondary">3M users</text>
  <text x="895" y="415" text-anchor="middle" font-size="9" class="text-secondary">p50: 12ms</text>
  <text x="895" y="435" text-anchor="middle" font-size="9" class="highlight-green">● Active</text>
  
  <!-- Replication arrows -->
  <line x1="660" y1="395" x2="675" y2="395" class="arrow" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="810" y1="395" x2="825" y2="395" class="arrow" stroke-width="1.5" stroke-dasharray="4,4"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
