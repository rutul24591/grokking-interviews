<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-orange { fill: #ed8936; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Fan-out Architecture Comparison</text>
  
  <!-- Fan-out on Write (Top Left) -->
  <text x="165" y="75" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Fan-out on Write</text>
  
  <!-- User posting -->
  <rect x="20" y="95" width="100" height="50" rx="5" class="box-base" stroke-width="2"/>
  <text x="70" y="125" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">User Post</text>
  
  <!-- Arrow to feed service -->
  <line x1="120" y1="120" x2="180" y2="120" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Feed Service -->
  <rect x="180" y="95" width="110" height="50" rx="5" class="accent-box" stroke-width="2"/>
  <text x="235" y="115" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Feed</text>
  <text x="235" y="130" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Service</text>
  
  <!-- Arrows to follower caches -->
  <line x1="290" y1="105" x2="340" y2="85" class="arrow" stroke-width="1.5"/>
  <line x1="290" y1="120" x2="340" y2="120" class="arrow" stroke-width="1.5"/>
  <line x1="290" y1="135" x2="340" y2="155" class="arrow" stroke-width="1.5"/>
  
  <!-- Follower caches -->
  <rect x="340" y="65" width="90" height="40" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="385" y="85" text-anchor="middle" font-size="10" class="text-secondary">Follower 1</text>
  <text x="385" y="100" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Cache</text>
  
  <rect x="340" y="110" width="90" height="40" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="385" y="130" text-anchor="middle" font-size="10" class="text-secondary">Follower 2</text>
  <text x="385" y="145" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Cache</text>
  
  <rect x="340" y="155" width="90" height="40" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="385" y="175" text-anchor="middle" font-size="10" class="text-secondary">Follower N</text>
  <text x="385" y="190" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Cache</text>
  
  <text x="235" y="215" text-anchor="middle" font-size="11" class="text-secondary">Write: O(followers) | Read: O(1)</text>
  
  <!-- Fan-out on Load (Top Right) -->
  <text x="735" y="75" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Fan-out on Load</text>
  
  <!-- User request -->
  <rect x="570" y="95" width="110" height="50" rx="5" class="box-base" stroke-width="2"/>
  <text x="625" y="120" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">User Request</text>
  
  <!-- Arrow to feed service -->
  <line x1="680" y1="120" x2="730" y2="120" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Feed Service -->
  <rect x="730" y="95" width="110" height="50" rx="5" class="accent-box" stroke-width="2"/>
  <text x="785" y="115" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Feed</text>
  <text x="785" y="130" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Service</text>
  
  <!-- Arrows from followed users -->
  <line x1="840" y1="105" x2="890" y2="85" class="arrow" stroke-width="1.5"/>
  <line x1="840" y1="120" x2="890" y2="120" class="arrow" stroke-width="1.5"/>
  <line x1="840" y1="135" x2="890" y2="155" class="arrow" stroke-width="1.5"/>
  
  <!-- Followed users -->
  <rect x="890" y="65" width="90" height="40" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="935" y="85" text-anchor="middle" font-size="10" class="text-secondary">Following 1</text>
  <text x="935" y="100" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Posts</text>
  
  <rect x="890" y="110" width="90" height="40" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="935" y="130" text-anchor="middle" font-size="10" class="text-secondary">Following 2</text>
  <text x="935" y="145" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Posts</text>
  
  <rect x="890" y="155" width="90" height="40" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="935" y="175" text-anchor="middle" font-size="10" class="text-secondary">Following N</text>
  <text x="935" y="190" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Posts</text>
  
  <text x="785" y="215" text-anchor="middle" font-size="11" class="text-secondary">Write: O(1) | Read: O(following)</text>
  
  <!-- Hybrid Approach (Bottom) -->
  <text x="500" y="260" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Hybrid Approach (Production)</text>
  
  <!-- Normal User Path -->
  <rect x="50" y="285" width="130" height="60" rx="5" class="box-base" stroke-width="2"/>
  <text x="115" y="310" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Normal User</text>
  <text x="115" y="328" text-anchor="middle" font-size="10" class="text-secondary">(&lt;50K followers)</text>
  
  <line x1="180" y1="315" x2="230" y2="315" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="205" y="305" text-anchor="middle" font-size="10" font-weight="bold" class="highlight-green">Fan-out on Write</text>
  
  <rect x="230" y="290" width="100" height="50" rx="5" class="accent-box" stroke-width="2"/>
  <text x="280" y="310" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Push to</text>
  <text x="280" y="328" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Followers</text>
  
  <line x1="330" y1="315" x2="380" y2="315" class="arrow" stroke-width="2"/>
  
  <rect x="380" y="290" width="110" height="50" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="435" y="310" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Follower</text>
  <text x="435" y="328" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Caches</text>
  
  <!-- Celebrity User Path -->
  <rect x="50" y="380" width="130" height="60" rx="5" class="box-base" stroke-width="2"/>
  <text x="115" y="405" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Celebrity User</text>
  <text x="115" y="423" text-anchor="middle" font-size="10" class="text-secondary">(&gt;100K followers)</text>
  
  <line x1="180" y1="410" x2="230" y2="410" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="205" y="400" text-anchor="middle" font-size="10" font-weight="bold" class="highlight-orange">Fan-out on Load</text>
  
  <rect x="230" y="385" width="100" height="50" rx="5" class="accent-box" stroke-width="2"/>
  <text x="280" y="405" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Store in</text>
  <text x="280" y="423" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Celebrity Cache</text>
  
  <line x1="330" y1="410" x2="380" y2="410" class="arrow" stroke-width="2"/>
  
  <rect x="380" y="385" width="110" height="50" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="435" y="405" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Pull on</text>
  <text x="435" y="423" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Feed Request</text>
  
  <!-- Merge Box -->
  <rect x="550" y="335" width="140" height="90" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="620" y="360" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Feed Assembly</text>
  <text x="620" y="380" text-anchor="middle" font-size="10" class="text-secondary">Merge: Normal +</text>
  <text x="620" y="395" text-anchor="middle" font-size="10" class="text-secondary">Celebrity Posts</text>
  <text x="620" y="415" text-anchor="middle" font-size="10" class="text-secondary">→ Rank → Return</text>
  
  <!-- Arrows to merge -->
  <line x1="490" y1="315" x2="545" y2="350" class="arrow" stroke-width="2"/>
  <line x1="490" y1="410" x2="545" y2="395" class="arrow" stroke-width="2"/>
  
  <!-- Output -->
  <line x1="690" y1="380" x2="750" y2="380" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="750" y="355" width="110" height="50" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="805" y="375" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Final Feed</text>
  <text x="805" y="393" text-anchor="middle" font-size="10" class="text-secondary">to User</text>
  
  <!-- Legend -->
  <rect x="870" y="285" width="110" height="140" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="925" y="308" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Legend</text>
  
  <rect x="885" y="320" width="20" height="20" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="915" y="335" font-size="9" class="text-secondary">Service</text>
  
  <rect x="885" y="350" width="20" height="20" rx="3" class="accent-box" stroke-width="1.5"/>
  <text x="915" y="365" font-size="9" class="text-secondary">Feed Service</text>
  
  <line x1="885" y1="385" x2="905" y2="385" class="arrow" stroke-width="1.5"/>
  <text x="915" y="389" font-size="9" class="text-secondary">Data Flow</text>
  
  <text x="915" y="405" font-size="9" class="text-secondary">Green: Push</text>
  <text x="915" y="417" font-size="9" class="text-secondary">Orange: Pull</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
