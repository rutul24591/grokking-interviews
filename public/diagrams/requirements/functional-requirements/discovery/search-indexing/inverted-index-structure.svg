<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Inverted Index Structure</text>
  
  <!-- Documents (Top Left) -->
  <rect x="20" y="70" width="200" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="120" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Documents</text>
  
  <rect x="40" y="110" width="160" height="55" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="55" y="130" font-size="10" font-weight="bold" class="text-primary">Doc 1</text>
  <text x="55" y="145" font-size="9" class="text-secondary">"Machine learning"</text>
  <text x="55" y="158" font-size="9" class="text-secondary">is transforming industries</text>
  
  <rect x="40" y="170" width="160" height="55" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="55" y="190" font-size="10" font-weight="bold" class="text-primary">Doc 2</text>
  <text x="55" y="205" font-size="9" class="text-secondary">"Deep learning is a"</text>
  <text x="55" y="218" font-size="9" class="text-secondary">subset of machine learning</text>
  
  <rect x="40" y="230" width="160" height="55" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="55" y="250" font-size="10" font-weight="bold" class="text-primary">Doc 3</text>
  <text x="55" y="265" font-size="9" class="text-secondary">"AI and neural networks"</text>
  <text x="55" y="278" font-size="9" class="text-secondary">are revolutionizing tech</text>
  
  <!-- Arrow to Indexing -->
  <line x1="220" y1="160" x2="270" y2="160" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="245" y="150" text-anchor="middle" font-size="11" font-weight="bold" class="text-secondary">Analyze</text>
  
  <!-- Term Dictionary (Center) -->
  <rect x="270" y="70" width="220" height="280" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="380" y="100" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Term Dictionary</text>
  <text x="380" y="120" text-anchor="middle" font-size="10" class="text-secondary">Sorted terms (FST)</text>
  
  <!-- Terms -->
  <rect x="290" y="135" width="180" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="305" y="157" font-size="11" font-weight="bold" class="text-primary">ai</text>
  <text x="445" y="157" text-anchor="end" font-size="9" class="text-secondary">→ [3]</text>
  
  <rect x="290" y="175" width="180" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="305" y="197" font-size="11" font-weight="bold" class="text-primary">and</text>
  <text x="445" y="197" text-anchor="end" font-size="9" class="text-secondary">→ [3]</text>
  
  <rect x="290" y="215" width="180" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="305" y="237" font-size="11" font-weight="bold" class="text-primary">deep</text>
  <text x="445" y="237" text-anchor="end" font-size="9" class="text-secondary">→ [2]</text>
  
  <rect x="290" y="255" width="180" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="305" y="277" font-size="11" font-weight="bold" class="text-primary">learning</text>
  <text x="445" y="277" text-anchor="end" font-size="9" class="text-secondary">→ [1,2,3]</text>
  
  <rect x="290" y="295" width="180" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="305" y="317" font-size="11" font-weight="bold" class="text-primary">machine</text>
  <text x="445" y="317" text-anchor="end" font-size="9" class="text-secondary">→ [1,2]</text>
  
  <rect x="290" y="335" width="180" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="305" y="357" font-size="11" font-weight="bold" class="text-primary">neural</text>
  <text x="445" y="357" text-anchor="end" font-size="9" class="text-secondary">→ [3]</text>
  
  <!-- Arrows to Posting Lists -->
  <line x1="490" y1="152" x2="530" y2="152" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="490" y1="272" x2="530" y2="272" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Posting Lists (Right) -->
  <rect x="530" y="70" width="450" height="280" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="755" y="100" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Posting Lists</text>
  
  <!-- Posting List for 'ai' -->
  <rect x="550" y="115" width="200" height="70" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="650" y="140" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Term: "ai"</text>
  <text x="650" y="160" text-anchor="middle" font-size="10" class="text-secondary">Doc IDs: [3]</text>
  <text x="650" y="178" text-anchor="middle" font-size="10" class="text-secondary">TF: [1] | Positions: [0]</text>
  
  <!-- Posting List for 'learning' -->
  <rect x="550" y="200" width="200" height="70" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="650" y="225" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Term: "learning"</text>
  <text x="650" y="245" text-anchor="middle" font-size="10" class="text-secondary">Doc IDs: [1, 2, 3]</text>
  <text x="650" y="263" text-anchor="middle" font-size="10" class="text-secondary">TF: [1, 1, 1]</text>
  
  <!-- Posting List for 'machine' -->
  <rect x="550" y="285" width="200" height="70" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="650" y="310" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Term: "machine"</text>
  <text x="650" y="330" text-anchor="middle" font-size="10" class="text-secondary">Doc IDs: [1, 2]</text>
  <text x="650" y="348" text-anchor="middle" font-size="10" class="text-secondary">TF: [1, 1] | Positions: [0, 4]</text>
  
  <!-- Query Example (Bottom) -->
  <rect x="20" y="370" width="460" height="110" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="250" y="400" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Query: "machine learning"</text>
  
  <text x="60" y="430" font-size="11" class="text-primary">1. Lookup "machine" → Docs [1, 2]</text>
  <text x="60" y="450" font-size="11" class="text-primary">2. Lookup "learning" → Docs [1, 2, 3]</text>
  <text x="60" y="470" font-size="11" class="text-primary">3. Intersect → [1, 2]</text>
  
  <text x="280" y="430" font-size="11" class="highlight-green">✓ BM25 scoring</text>
  <text x="280" y="450" font-size="11" class="highlight-green">✓ Sort by relevance</text>
  <text x="280" y="470" font-size="11" class="highlight-purple">→ Return Doc 1, Doc 2</text>
  
  <!-- Compression Techniques (Bottom Right) -->
  <rect x="500" y="370" width="480" height="110" rx="5" class="box-base" stroke-width="2"/>
  <text x="740" y="400" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Compression Techniques</text>
  
  <text x="530" y="425" font-size="10" class="text-primary">•</text>
  <text x="545" y="425" font-size="10" class="text-secondary">Delta encoding: Store differences (1,2,5 → 1,1,3)</text>
  
  <text x="530" y="445" font-size="10" class="text-primary">•</text>
  <text x="545" y="445" font-size="10" class="text-secondary">Variable-byte encoding: Use fewer bytes for small numbers</text>
  
  <text x="530" y="465" font-size="10" class="text-primary">•</text>
  <text x="545" y="465" font-size="10" class="text-secondary">Frame of reference: Block-wise compression</text>
  
  <text x="740" y="445" font-size="10" class="highlight-green">~70% size reduction</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
