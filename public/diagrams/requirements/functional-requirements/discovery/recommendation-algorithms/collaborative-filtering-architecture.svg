<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Collaborative Filtering Architecture</text>
  
  <!-- User-Item Matrix (Left) -->
  <rect x="20" y="70" width="280" height="280" rx="5" class="box-base" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">User-Item Interaction Matrix</text>
  
  <!-- Matrix Grid -->
  <g transform="translate(40, 115)">
    <!-- Row labels (Users) -->
    <text x="-10" y="15" text-anchor="end" font-size="10" class="text-secondary">User 1</text>
    <text x="-10" y="40" text-anchor="end" font-size="10" class="text-secondary">User 2</text>
    <text x="-10" y="65" text-anchor="end" font-size="10" class="text-secondary">User 3</text>
    <text x="-10" y="90" text-anchor="end" font-size="10" class="text-secondary">User 4</text>
    <text x="-10" y="115" text-anchor="end" font-size="10" class="text-secondary">User N</text>
    
    <!-- Column labels (Items) -->
    <text x="25" y="-5" text-anchor="middle" font-size="10" class="text-secondary">Item 1</text>
    <text x="65" y="-5" text-anchor="middle" font-size="10" class="text-secondary">Item 2</text>
    <text x="105" y="-5" text-anchor="middle" font-size="10" class="text-secondary">Item 3</text>
    <text x="145" y="-5" text-anchor="middle" font-size="10" class="text-secondary">Item 4</text>
    <text x="185" y="-5" text-anchor="middle" font-size="10" class="text-secondary">Item M</text>
    
    <!-- Matrix cells -->
    <rect x="5" y="5" width="35" height="20" fill="#48bb78" opacity="0.6"/>
    <rect x="45" y="5" width="35" height="20" fill="#f56565" opacity="0.3"/>
    <rect x="85" y="5" width="35" height="20" fill="#48bb78" opacity="0.8"/>
    <rect x="125" y="5" width="35" height="20" fill="#f56565" opacity="0.2"/>
    <rect x="165" y="5" width="35" height="20" fill="#48bb78" opacity="0.5"/>
    
    <rect x="5" y="30" width="35" height="20" fill="#f56565" opacity="0.2"/>
    <rect x="45" y="30" width="35" height="20" fill="#48bb78" opacity="0.7"/>
    <rect x="85" y="30" width="35" height="20" fill="#f56565" opacity="0.3"/>
    <rect x="125" y="30" width="35" height="20" fill="#48bb78" opacity="0.6"/>
    <rect x="165" y="30" width="35" height="20" fill="#f56565" opacity="0.2"/>
    
    <rect x="5" y="55" width="35" height="20" fill="#48bb78" opacity="0.5"/>
    <rect x="45" y="55" width="35" height="20" fill="#f56565" opacity="0.2"/>
    <rect x="85" y="55" width="35" height="20" fill="#48bb78" opacity="0.7"/>
    <rect x="125" y="55" width="35" height="20" fill="#f56565" opacity="0.3"/>
    <rect x="165" y="55" width="35" height="20" fill="#48bb78" opacity="0.6"/>
    
    <rect x="5" y="80" width="35" height="20" fill="#f56565" opacity="0.3"/>
    <rect x="45" y="80" width="35" height="20" fill="#48bb78" opacity="0.6"/>
    <rect x="85" y="80" width="35" height="20" fill="#f56565" opacity="0.2"/>
    <rect x="125" y="80" width="35" height="20" fill="#48bb78" opacity="0.8"/>
    <rect x="165" y="80" width="35" height="20" fill="#f56565" opacity="0.3"/>
    
    <rect x="5" y="105" width="35" height="20" fill="#48bb78" opacity="0.4"/>
    <rect x="45" y="105" width="35" height="20" fill="#48bb78" opacity="0.5"/>
    <rect x="85" y="105" width="35" height="20" fill="#f56565" opacity="0.2"/>
    <rect x="125" y="105" width="35" height="20" fill="#48bb78" opacity="0.6"/>
    <rect x="165" y="105" width="35" height="20" fill="#f56565" opacity="0.3"/>
  </g>
  
  <text x="160" y="420" text-anchor="middle" font-size="9" class="text-secondary">Green = Liked, Red = Not Interacted</text>
  
  <!-- Arrow to Factorization -->
  <line x1="300" y1="210" x2="340" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="320" y="200" text-anchor="middle" font-size="11" font-weight="bold" class="text-secondary">Factorize</text>
  
  <!-- Matrix Factorization (Center) -->
  <rect x="340" y="120" width="320" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="150" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Matrix Factorization</text>
  
  <!-- Factorization Formula -->
  <text x="500" y="180" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary" font-family="monospace">R ≈ U × V^T</text>
  
  <!-- User Matrix -->
  <rect x="360" y="195" width="120" height="90" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="420" y="220" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">User Matrix (U)</text>
  <text x="420" y="245" text-anchor="middle" font-size="10" class="text-secondary">m users × k factors</text>
  <text x="420" y="265" text-anchor="middle" font-size="10" class="text-secondary">Latent preferences</text>
  
  <!-- Example factors -->
  <text x="420" y="285" text-anchor="middle" font-size="9" class="highlight-purple">[0.8, -0.3, 0.5...]</text>
  
  <!-- Item Matrix -->
  <rect x="520" y="195" width="120" height="90" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="580" y="220" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Item Matrix (V)</text>
  <text x="580" y="245" text-anchor="middle" font-size="10" class="text-secondary">n items × k factors</text>
  <text x="580" y="265" text-anchor="middle" font-size="10" class="text-secondary">Latent features</text>
  
  <!-- Example factors -->
  <text x="580" y="285" text-anchor="middle" font-size="9" class="highlight-green">[0.6, 0.2, -0.7...]</text>
  
  <!-- Arrow to Prediction -->
  <line x1="660" y1="210" x2="700" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="680" y="200" text-anchor="middle" font-size="11" font-weight="bold" class="text-secondary">Dot Product</text>
  
  <!-- Prediction (Right) -->
  <rect x="700" y="120" width="280" height="180" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="840" y="150" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Preference Prediction</text>
  
  <!-- Prediction Formula -->
  <text x="840" y="185" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary" font-family="monospace">r_ui = u_u · v_i</text>
  <text x="840" y="215" text-anchor="middle" font-size="10" class="text-secondary">User dot Item = Score</text>
  
  <!-- Example Prediction -->
  <rect x="730" y="235" width="220" height="50" rx="4" class="box-base" stroke-width="1"/>
  <text x="840" y="255" text-anchor="middle" font-size="10" class="text-secondary">User 1 · Item 5 = 0.85</text>
  <text x="840" y="275" text-anchor="middle" font-size="10" class="highlight-green">→ High predicted rating</text>
  
  <!-- ALS Training (Bottom) -->
  <rect x="20" y="370" width="460" height="110" rx="5" class="box-base" stroke-width="2"/>
  <text x="250" y="395" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">ALS Training (Alternating Least Squares)</text>
  
  <text x="60" y="425" font-size="10" class="text-primary">1. Fix U, solve for V</text>
  <text x="60" y="445" font-size="10" class="text-primary">2. Fix V, solve for U</text>
  <text x="60" y="465" font-size="10" class="text-primary">3. Repeat until convergence</text>
  
  <text x="280" y="425" font-size="10" class="text-primary">✓ Parallelizable</text>
  <text x="280" y="445" font-size="10" class="text-primary">✓ Handles implicit feedback</text>
  <text x="280" y="465" font-size="10" class="text-primary">✓ Scales to millions of users</text>
  
  <!-- Use Cases (Bottom Right) -->
  <rect x="500" y="370" width="480" height="110" rx="5" class="box-base" stroke-width="2"/>
  <text x="740" y="395" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Use Cases</text>
  
  <text x="540" y="425" font-size="10" class="text-primary">•</text>
  <text x="555" y="425" font-size="10" class="text-secondary">Netflix: Movie recommendations</text>
  
  <text x="540" y="445" font-size="10" class="text-primary">•</text>
  <text x="555" y="445" font-size="10" class="text-secondary">Amazon: "Customers who bought..."</text>
  
  <text x="540" y="465" font-size="10" class="text-primary">•</text>
  <text x="555" y="465" font-size="10" class="text-secondary">Spotify: Discover Weekly playlist</text>
  
  <text x="740" y="425" font-size="10" class="text-primary">•</text>
  <text x="755" y="425" font-size="10" class="text-secondary">YouTube: Video recommendations</text>
  
  <text x="740" y="445" font-size="10" class="text-primary">•</text>
  <text x="755" y="445" font-size="10" class="text-secondary">LinkedIn: People you may know</text>
  
  <text x="740" y="465" font-size="10" class="text-primary">•</text>
  <text x="755" y="465" font-size="10" class="text-secondary">Twitter: Who to follow</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
