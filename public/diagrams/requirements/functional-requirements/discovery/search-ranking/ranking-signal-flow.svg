<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Ranking Signal Flow</text>
  
  <!-- Query Input -->
  <rect x="20" y="70" width="140" height="60" rx="5" class="accent-box" stroke-width="2"/>
  <text x="90" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">User Query</text>
  <text x="90" y="115" text-anchor="middle" font-size="10" class="text-secondary">"machine learning"</text>
  
  <!-- Arrow to Query Processing -->
  <line x1="160" y1="100" x2="200" y2="100" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Query Processing -->
  <rect x="200" y="70" width="130" height="60" rx="5" class="box-base" stroke-width="2"/>
  <text x="265" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Query</text>
  <text x="265" y="112" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Processing</text>
  
  <!-- Query Processing sub-tasks -->
  <text x="265" y="145" text-anchor="middle" font-size="9" class="text-secondary">Tokenize, Stem,</text>
  <text x="265" y="158" text-anchor="middle" font-size="9" class="text-secondary">Spell Correct</text>
  
  <!-- Arrow to Retrieval -->
  <line x1="330" y1="100" x2="370" y2="100" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Retrieval -->
  <rect x="370" y="70" width="130" height="60" rx="5" class="box-base" stroke-width="2"/>
  <text x="435" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Retrieval</text>
  <text x="435" y="112" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">(BM25 + ANN)</text>
  
  <text x="435" y="145" text-anchor="middle" font-size="14" font-weight="bold" class="highlight-green">~1,000</text>
  <text x="435" y="162" text-anchor="middle" font-size="9" class="text-secondary">Candidates</text>
  
  <!-- Arrow down to Feature Combination -->
  <line x1="435" y1="130" x2="435" y2="180" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Feature Store -->
  <rect x="550" y="70" width="150" height="100" rx="5" class="accent-box" stroke-width="2"/>
  <text x="625" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Feature Store</text>
  
  <text x="570" y="120" font-size="10" class="text-secondary">• Document quality</text>
  <text x="570" y="135" font-size="10" class="text-secondary">• User affinity</text>
  <text x="570" y="150" font-size="10" class="text-secondary">• Popularity</text>
  <text x="570" y="165" font-size="10" class="text-secondary">• Freshness</text>
  
  <!-- Arrow from Feature Store to Feature Vector -->
  <line x1="625" y1="170" x2="625" y2="210" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Feature Vector Combination -->
  <rect x="350" y="180" width="170" height="70" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="435" y="205" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Feature Vector</text>
  <text x="435" y="225" text-anchor="middle" font-size="10" class="text-secondary">50-100 features</text>
  <text x="435" y="240" text-anchor="middle" font-size="10" class="text-secondary">[0.23, 0.89, ..., 0.45]</text>
  
  <!-- Arrow to ML Model -->
  <line x1="520" y1="215" x2="560" y2="215" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- ML Model -->
  <rect x="560" y="180" width="160" height="70" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="640" y="205" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">ML Ranking Model</text>
  <text x="640" y="225" text-anchor="middle" font-size="10" class="text-secondary">XGBoost / LambdaMART</text>
  <text x="640" y="240" text-anchor="middle" font-size="10" class="text-secondary">Output: Relevance Score</text>
  
  <!-- Arrow to Re-ranking -->
  <line x1="720" y1="215" x2="760" y2="215" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Re-ranking -->
  <rect x="760" y="180" width="150" height="70" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="835" y="205" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Re-Ranking</text>
  <text x="835" y="225" text-anchor="middle" font-size="10" class="text-secondary">Diversity + Rules</text>
  <text x="835" y="240" text-anchor="middle" font-size="10" class="text-secondary">Max 2 per domain</text>
  
  <!-- Arrow to Final Results -->
  <line x1="910" y1="215" x2="910" y2="270" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Final Results -->
  <rect x="830" y="270" width="150" height="70" rx="5" class="accent-box" stroke-width="3"/>
  <text x="905" y="295" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Final Results</text>
  <text x="905" y="315" text-anchor="middle" font-size="20" font-weight="bold" class="highlight-green">10-50</text>
  <text x="905" y="335" text-anchor="middle" font-size="10" class="text-secondary">to User</text>
  
  <!-- Candidate Documents (Bottom Left) -->
  <rect x="20" y="280" width="280" height="150" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="160" y="305" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Candidate Documents</text>
  
  <rect x="40" y="320" width="200" height="25" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="337" font-size="9" class="text-secondary">Doc 1</text>
  <text x="95" y="337" font-size="9" class="text-primary">"Introduction to ML"</text>
  <text x="215" y="337" font-size="9" class="highlight-green" text-anchor="end">BM25: 0.85</text>
  
  <rect x="40" y="350" width="200" height="25" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="367" font-size="9" class="text-secondary">Doc 2</text>
  <text x="95" y="367" font-size="9" class="text-primary">"Deep Learning Basics"</text>
  <text x="215" y="367" font-size="9" class="highlight-green" text-anchor="end">BM25: 0.78</text>
  
  <rect x="40" y="380" width="200" height="25" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="397" font-size="9" class="text-secondary">Doc 3</text>
  <text x="95" y="397" font-size="9" class="text-primary">"Neural Networks 101"</text>
  <text x="215" y="397" font-size="9" class="highlight-green" text-anchor="end">BM25: 0.72</text>
  
  <text x="160" y="420" text-anchor="middle" font-size="10" class="text-secondary">Each candidate → Feature Vector → Score</text>
  
  <!-- Score Calculation Detail (Bottom Right) -->
  <rect x="320" y="280" width="320" height="150" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="480" y="305" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Score Calculation Example</text>
  
  <text x="350" y="330" font-size="10" class="text-secondary">Feature Weights (learned):</text>
  
  <text x="350" y="350" font-size="9" class="text-primary">• BM25 score:</text>
  <text x="440" y="350" font-size="9" class="text-secondary">weight = 0.35</text>
  
  <text x="350" y="368" font-size="9" class="text-primary">• Document quality:</text>
  <text x="465" y="368" font-size="9" class="text-secondary">weight = 0.25</text>
  
  <text x="350" y="386" font-size="9" class="text-primary">• User affinity:</text>
  <text x="450" y="386" font-size="9" class="text-secondary">weight = 0.20</text>
  
  <text x="350" y="404" font-size="9" class="text-primary">• Freshness:</text>
  <text x="430" y="404" font-size="9" class="text-secondary">weight = 0.12</text>
  
  <text x="350" y="422" font-size="9" class="text-primary">• Popularity:</text>
  <text x="435" y="422" font-size="9" class="text-secondary">weight = 0.08</text>
  
  <rect x="340" y="435" width="280" height="35" rx="4" class="accent-box" stroke-width="1.5"/>
  <text x="480" y="457" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Final Score = Σ(weight × feature_value)</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
