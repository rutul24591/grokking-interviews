<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">A/B Testing Architecture for Ranking</text>
  
  <!-- Traffic Splitter (Top Left) -->
  <rect x="20" y="70" width="180" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="110" y="100" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Traffic Splitter</text>
  <text x="110" y="125" text-anchor="middle" font-size="11" class="text-secondary">Consistent Hashing</text>
  <text x="110" y="145" text-anchor="middle" font-size="11" class="text-secondary">user_id → variant</text>
  <text x="110" y="165" text-anchor="middle" font-size="11" class="text-secondary">50/50 or 90/10</text>
  
  <!-- Arrows to Control/Treatment -->
  <line x1="200" y1="95" x2="250" y2="95" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="225" y="85" text-anchor="middle" font-size="10" font-weight="bold" class="text-secondary">50%</text>
  
  <line x1="200" y1="145" x2="250" y2="145" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="225" y="135" text-anchor="middle" font-size="10" font-weight="bold" class="text-secondary">50%</text>
  
  <!-- Control Group (Top Middle) -->
  <rect x="250" y="60" width="220" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="360" y="90" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Control Group</text>
  <text x="360" y="115" text-anchor="middle" font-size="11" class="text-secondary">Current Ranking</text>
  <text x="360" y="135" text-anchor="middle" font-size="11" class="text-secondary">Production Model v1.0</text>
  <text x="360" y="160" text-anchor="middle" font-size="10" class="text-secondary">Baseline for comparison</text>
  
  <!-- Treatment Group (Top Middle Right) -->
  <rect x="490" y="60" width="220" height="120" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="600" y="90" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Treatment Group</text>
  <text x="600" y="115" text-anchor="middle" font-size="11" class="text-secondary">New Ranking Model</text>
  <text x="600" y="135" text-anchor="middle" font-size="11" class="text-secondary">Model v2.0 (XGBoost)</text>
  <text x="600" y="160" text-anchor="middle" font-size="10" class="text-secondary">Testing new features</text>
  
  <!-- Arrows to Results -->
  <line x1="470" y1="100" x2="510" y2="100" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="710" y1="120" x2="750" y2="120" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Metrics Collection (Top Right) -->
  <rect x="750" y="60" width="230" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="865" y="90" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Metrics Collection</text>
  
  <text x="780" y="115" font-size="10" class="text-primary">Primary:</text>
  <text x="840" y="115" font-size="10" class="text-secondary">CTR@10, Conversion</text>
  
  <text x="780" y="135" font-size="10" class="text-primary">Secondary:</text>
  <text x="850" y="135" font-size="10" class="text-secondary">Dwell Time, Scroll</text>
  
  <text x="780" y="155" font-size="10" class="text-primary">Guardrail:</text>
  <text x="850" y="155" font-size="10" class="text-secondary">Latency, Diversity</text>
  
  <!-- Statistical Analysis (Below Metrics) -->
  <rect x="750" y="200" width="230" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="865" y="230" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Statistical Analysis</text>
  <text x="865" y="255" text-anchor="middle" font-size="10" class="text-secondary">T-test, Bootstrap</text>
  <text x="865" y="275" text-anchor="middle" font-size="10" class="text-secondary">p-value &lt; 0.05</text>
  <text x="865" y="290" text-anchor="middle" font-size="10" class="highlight-green">Significance Check</text>
  
  <!-- Decision Box -->
  <rect x="750" y="320" width="230" height="80" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="865" y="345" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Decision</text>
  <text x="865" y="365" text-anchor="middle" font-size="10" class="text-secondary">Significant improvement?</text>
  <text x="865" y="385" text-anchor="middle" font-size="10" class="text-secondary">Yes → Rollout | No → Iterate</text>
  
  <!-- Timeline (Bottom) -->
  <rect x="20" y="280" width="710" height="200" rx="8" class="box-base" stroke-width="2"/>
  <text x="375" y="310" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">A/B Test Timeline</text>
  
  <!-- Timeline Arrow -->
  <line x1="60" y1="380" x2="680" y2="380" class="arrow" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Time Markers -->
  <line x1="60" y1="370" x2="60" y2="390" class="arrow" stroke-width="2"/>
  <text x="60" y="415" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Day 0</text>
  <text x="60" y="435" text-anchor="middle" font-size="9" class="text-secondary">Start Test</text>
  
  <line x1="200" y1="370" x2="200" y2="390" class="arrow" stroke-width="2"/>
  <text x="200" y="415" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Day 1-3</text>
  <text x="200" y="435" text-anchor="middle" font-size="9" class="text-secondary">Ramp Up</text>
  <text x="200" y="450" text-anchor="middle" font-size="9" class="text-secondary">(10% → 50%)</text>
  
  <line x1="375" y1="370" x2="375" y2="390" class="arrow" stroke-width="2"/>
  <text x="375" y="415" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Day 4-10</text>
  <text x="375" y="435" text-anchor="middle" font-size="9" class="text-secondary">Steady State</text>
  <text x="375" y="450" text-anchor="middle" font-size="9" class="text-secondary">Data Collection</text>
  
  <line x1="540" y1="370" x2="540" y2="390" class="arrow" stroke-width="2"/>
  <text x="540" y="415" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Day 11-14</text>
  <text x="540" y="435" text-anchor="middle" font-size="9" class="text-secondary">Analysis</text>
  <text x="540" y="450" text-anchor="middle" font-size="9" class="text-secondary">Statistical Tests</text>
  
  <line x1="680" y1="370" x2="680" y2="390" class="arrow" stroke-width="2"/>
  <text x="680" y="415" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Day 15</text>
  <text x="680" y="435" text-anchor="middle" font-size="9" class="text-secondary">Decision</text>
  <text x="680" y="450" text-anchor="middle" font-size="9" class="text-secondary">Rollout/Stop</text>
  
  <!-- Sample Size Calculator (Bottom Right) -->
  <rect x="20" y="500" width="300" height="140" rx="5" class="accent-box" stroke-width="2"/>
  <text x="170" y="530" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Sample Size Calculation</text>
  
  <text x="50" y="555" font-size="10" class="text-primary">Baseline CTR:</text>
  <text x="140" y="555" font-size="10" class="text-secondary">2.5%</text>
  
  <text x="50" y="575" font-size="10" class="text-primary">Min Detectable Effect:</text>
  <text x="180" y="575" font-size="10" class="text-secondary">5% relative</text>
  
  <text x="50" y="595" font-size="10" class="text-primary">Power (1-β):</text>
  <text x="140" y="595" font-size="10" class="text-secondary">80%</text>
  
  <text x="50" y="615" font-size="10" class="text-primary">Significance (α):</text>
  <text x="155" y="615" font-size="10" class="text-secondary">0.05</text>
  
  <rect x="40" y="625" width="260" height="35" rx="4" class="box-base" stroke-width="1.5"/>
  <text x="170" y="647" text-anchor="middle" font-size="11" font-weight="bold" class="highlight-green">Required: ~100K users per variant</text>
  
  <!-- Interleaving (Bottom Right) -->
  <rect x="340" y="500" width="300" height="140" rx="5" class="box-base" stroke-width="2"/>
  <text x="490" y="530" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Interleaving (Fast Test)</text>
  <text x="490" y="555" text-anchor="middle" font-size="10" class="text-secondary">Mix control + treatment results</text>
  <text x="490" y="575" text-anchor="middle" font-size="10" class="text-secondary">Measure which results get clicked</text>
  <text x="490" y="600" text-anchor="middle" font-size="10" class="highlight-purple">● Faster results (days vs weeks)</text>
  <text x="490" y="620" text-anchor="middle" font-size="10" class="text-secondary">● Less statistical power</text>
  
  <!-- Key Considerations (Bottom Far Right) -->
  <rect x="660" y="500" width="320" height="140" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="820" y="530" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Key Considerations</text>
  
  <text x="690" y="555" font-size="10" class="text-primary">•</text>
  <text x="705" y="555" font-size="10" class="text-secondary">Consistent user assignment (sticky)</text>
  
  <text x="690" y="575" font-size="10" class="text-primary">•</text>
  <text x="705" y="575" font-size="10" class="text-secondary">Guardrail metrics (latency, errors)</text>
  
  <text x="690" y="595" font-size="10" class="text-primary">•</text>
  <text x="705" y="595" font-size="10" class="text-secondary">Novelty effect (users click new things)</text>
  
  <text x="690" y="615" font-size="10" class="text-primary">•</text>
  <text x="705" y="615" font-size="10" class="text-secondary">Seasonality (weekday vs weekend)</text>
  
  <text x="690" y="635" font-size="10" class="text-primary">•</text>
  <text x="705" y="635" font-size="10" class="text-secondary">Multiple testing correction</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
