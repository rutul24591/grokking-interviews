<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Session Lifecycle</text>
  
  <!-- Create -->
  <rect x="50" y="80" width="140" height="120" rx="8" fill="#22c55e"/>
  <text x="120" y="110" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ffffff">1. Create</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Post-login</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Generate session_id</text>
  <text x="120" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Set cookie/token</text>
  <text x="120" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Store in DB/cache</text>
  
  <line x1="190" y1="140" x2="230" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Active -->
  <rect x="240" y="80" width="140" height="120" rx="8" fill="#3b82f6"/>
  <text x="310" y="110" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ffffff">2. Active</text>
  <text x="310" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">User requests</text>
  <text x="310" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Validate token</text>
  <text x="310" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Update last_seen</text>
  <text x="310" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Extend TTL</text>
  
  <line x1="380" y1="140" x2="420" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Idle -->
  <rect x="430" y="80" width="140" height="120" rx="8" fill="#f59e0b"/>
  <text x="500" y="110" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">3. Idle</text>
  <text x="500" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">No activity</text>
  <text x="500" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">TTL expiring</text>
  <text x="500" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Warning email?</text>
  <text x="500" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Grace period</text>
  
  <line x1="570" y1="140" x2="610" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Expired -->
  <rect x="620" y="80" width="140" height="120" rx="8" fill="#ef4444"/>
  <text x="690" y="110" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ffffff">4. Expired</text>
  <text x="690" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">TTL reached</text>
  <text x="690" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Token invalid</text>
  <text x="690" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Logout required</text>
  <text x="690" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Cleanup job</text>
  
  <!-- Timeline -->
  <rect x="50" y="250" width="700" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="280" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Session Timeline</text>
  
  <line x1="100" y1="320" x2="700" y2="320" stroke="#475569" stroke-width="2"/>
  <circle cx="100" cy="320" r="8" fill="#22c55e"/>
  <circle cx="300" cy="320" r="8" fill="#3b82f6"/>
  <circle cx="500" cy="320" r="8" fill="#f59e0b"/>
  <circle cx="700" cy="320" r="8" fill="#ef4444"/>
  
  <text x="100" y="350" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">T0</text>
  <text x="100" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Login</text>
  
  <text x="300" y="350" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">T0+30min</text>
  <text x="300" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Active use</text>
  
  <text x="500" y="350" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">T0+23h</text>
  <text x="500" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Idle warning</text>
  
  <text x="700" y="350" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">T0+24h</text>
  <text x="700" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Expired</text>
  
  <!-- Config -->
  <rect x="50" y="360" width="220" height="60" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="385" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">TTL Settings</text>
  <text x="160" y="405" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Access token: 15min</text>
  <text x="160" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Refresh token: 7d</text>
  
  <rect x="290" y="360" width="220" height="60" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Sliding Session</text>
  <text x="400" y="405" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Extend on activity</text>
  <text x="400" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Max absolute: 30d</text>
  
  <rect x="530" y="360" width="220" height="60" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="385" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Security</text>
  <text x="640" y="405" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Rotate on privilege change</text>
  <text x="640" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Invalidate on logout</text>

</svg>