<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Signup Security Measures</text>
  
  <!-- Bot Prevention -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#3b82f6">Bot Prevention</text>
  
  <rect x="70" y="115" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">reCAPTCHA v3</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Invisible scoring</text>
  
  <rect x="70" y="170" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Honeypot Fields</text>
  <text x="160" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Hidden trap fields</text>
  
  <rect x="70" y="225" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Device Fingerprint</text>
  <text x="160" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Detect automation</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Rate Limiting -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ef4444">Rate Limiting</text>
  
  <rect x="340" y="115" width="180" height="45" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="430" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Per IP: 5/hour</text>
  <text x="430" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Prevent spam</text>
  
  <rect x="340" y="170" width="180" height="45" rx="4" fill="#ef4444" opacity="0.6"/>
  <text x="430" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Per Email: 1/day</text>
  <text x="430" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Prevent abuse</text>
  
  <rect x="340" y="225" width="180" height="45" rx="4" fill="#ef4444" opacity="0.4"/>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Exponential Backoff</text>
  <text x="430" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">1min → 1hr</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Email Validation -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#8b5cf6">Email Validation</text>
  
  <rect x="610" y="115" width="120" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="670" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Format Check</text>
  <text x="670" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Regex validation</text>
  
  <rect x="610" y="175" width="120" height="50" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">MX Record</text>
  <text x="670" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Domain exists</text>
  
  <rect x="610" y="235" width="120" height="30" rx="4" fill="#ef4444"/>
  <text x="670" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Block Disposable</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Email Verification -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Email Verification</text>
  
  <rect x="610" y="360" width="120" height="35" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="670" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Send Verification</text>
  
  <rect x="610" y="400" width="120" height="35" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="670" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">24h Expiry</text>
  
  <rect x="610" y="440" width="120" height="35" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="670" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Unverified = Limited</text>
  
  <!-- Password Security -->
  <rect x="50" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Password Security</text>
  
  <rect x="70" y="360" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Min 8 characters (NIST)</text>
  
  <rect x="70" y="400" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Breach database check</text>
  
  <rect x="70" y="440" width="180" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="160" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#991b1b">No composition rules</text>
  
  <!-- Abuse Detection -->
  <rect x="320" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Abuse Detection</text>
  
  <rect x="340" y="360" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Monitor signup patterns</text>
  
  <rect x="340" y="400" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Block datacenter IPs</text>
  
  <rect x="340" y="440" width="180" height="35" rx="4" fill="#8b5cf6"/>
  <text x="430" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Audit all signups</text>

</svg>
