<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">SSO Flow Comparison</text>
  
  <!-- SAML Flow -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">SAML 2.0 Flow</text>
  
  <rect x="70" y="115" width="100" height="50" rx="4" fill="#3b82f6"/>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">User</text>
  
  <rect x="200" y="115" width="100" height="50" rx="4" fill="#f59e0b"/>
  <text x="250" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Service Provider</text>
  
  <rect x="330" y="115" width="50" height="50" rx="4" fill="#8b5cf6"/>
  <text x="355" y="145" text-anchor="middle" font-family="system-ui" font-size="16" fill="#ffffff">→</text>
  
  <rect x="200" y="180" width="180" height="50" rx="4" fill="#8b5cf6"/>
  <text x="290" y="205" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Identity Provider</text>
  
  <line x1="170" y1="140" x2="190" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="180" y="130" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">1. Access</text>
  
  <line x1="300" y1="165" x2="300" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="175" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">2. Redirect</text>
  
  <line x1="300" y1="230" x2="300" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="240" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">3. Auth</text>
  
  <line x1="300" y1="280" x2="300" y2="295" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="290" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">4. Assertion</text>
  
  <line x1="200" y1="205" x2="180" y2="205" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="195" text-anchor="middle" font-family="system-ui" font-size="7" fill="#22c55e">5. Session</text>
  
  <!-- OIDC Flow -->
  <rect x="410" y="70" width="340" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="580" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">OIDC Flow</text>
  
  <rect x="430" y="115" width="100" height="50" rx="4" fill="#3b82f6"/>
  <text x="480" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">User</text>
  
  <rect x="560" y="115" width="100" height="50" rx="4" fill="#f59e0b"/>
  <text x="610" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Client App</text>
  
  <rect x="690" y="115" width="50" height="50" rx="4" fill="#3b82f6"/>
  <text x="715" y="145" text-anchor="middle" font-family="system-ui" font-size="16" fill="#ffffff">→</text>
  
  <rect x="560" y="180" width="180" height="50" rx="4" fill="#3b82f6"/>
  <text x="650" y="205" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Authorization Server</text>
  
  <line x1="530" y1="140" x2="550" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="540" y="130" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">1. Auth Request</text>
  
  <line x1="650" y1="165" x2="650" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="670" y="175" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">2. Auth</text>
  
  <line x1="650" y1="230" x2="650" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="670" y="240" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">3. Auth Code</text>
  
  <line x1="650" y1="280" x2="650" y2="295" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="670" y="290" text-anchor="middle" font-family="system-ui" font-size="7" fill="#475569">4. Token Exchange</text>
  
  <line x1="560" y1="205" x2="540" y2="205" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="550" y="195" text-anchor="middle" font-family="system-ui" font-size="7" fill="#22c55e">5. ID Token + Session</text>
  
  <!-- Key Differences -->
  <rect x="50" y="300" width="700" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Key Differences</text>
  
  <rect x="70" y="345" width="300" height="50" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="220" y="370" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#8b5cf6">SAML</text>
  <text x="220" y="385" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">XML assertions, enterprise standard</text>
  
  <rect x="430" y="345" width="300" height="50" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="580" y="370" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#3b82f6">OIDC</text>
  <text x="580" y="385" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">JWT tokens, modern standard</text>
  
  <rect x="70" y="405" width="300" height="50" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">✓ Complex, XML-based</text>
  <text x="220" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">✓ Enterprise deployments</text>
  
  <rect x="430" y="405" width="300" height="50" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="580" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">✓ Simple, JSON-based</text>
  <text x="580" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">✓ Modern deployments</text>

</svg>
