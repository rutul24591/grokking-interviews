<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Token Refresh Flow</text>
  
  <!-- Client -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">Client</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Access token expired</text>
  
  <!-- Refresh Endpoint -->
  <rect x="220" y="70" width="160" height="100" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">/refresh</text>
  <text x="300" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Validate refresh token</text>
  <text x="300" y="145" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Check revocation list</text>
  <text x="300" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Rate limit check</text>
  
  <!-- Session Service -->
  <rect x="430" y="70" width="160" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="510" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Session Service</text>
  <text x="510" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Generate new access</text>
  <text x="510" y="145" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Rotate refresh token</text>
  <text x="510" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Update last_seen</text>
  
  <!-- Token Store -->
  <rect x="640" y="80" width="120" height="80" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="700" y="115" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Token Store</text>
  <text x="700" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Redis</text>
  
  <!-- Arrows -->
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. POST refresh_token</text>
  
  <line x1="380" y1="120" x2="420" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Validate</text>
  
  <line x1="590" y1="120" x2="630" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Invalidate old</text>
  
  <line x1="630" y1="140" x2="590" y2="140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">4. Store new</text>
  
  <line x1="420" y1="150" x2="380" y2="150" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">5. New tokens</text>
  
  <line x1="210" y1="150" x2="170" y2="150" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">6. Set cookies</text>
  
  <!-- Token Lifecycle -->
  <rect x="50" y="220" width="700" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Token Lifecycle Timeline</text>
  
  <line x1="100" y1="290" x2="700" y2="290" stroke="#475569" stroke-width="2"/>
  
  <rect x="100" y="270" width="150" height="40" rx="4" fill="#22c55e"/>
  <text x="175" y="295" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Access Token</text>
  <text x="175" y="325" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">15 min</text>
  
  <rect x="250" y="270" width="300" height="40" rx="4" fill="#3b82f6"/>
  <text x="400" y="295" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Refresh Token</text>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">7 days</text>
  
  <!-- Refresh points -->
  <circle cx="280" cy="290" r="6" fill="#f59e0b"/>
  <text x="280" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Refresh #1</text>
  
  <circle cx="400" cy="290" r="6" fill="#f59e0b"/>
  <text x="400" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Refresh #2</text>
  
  <circle cx="520" cy="290" r="6" fill="#f59e0b"/>
  <text x="520" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Refresh #3</text>
  
  <!-- Rotation -->
  <rect x="100" y="380" width="200" height="30" rx="4" fill="#f1f5f9"/>
  <text x="200" y="400" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Old refresh token invalidated</text>
  
  <rect x="320" y="380" width="200" height="30" rx="4" fill="#f1f5f9"/>
  <text x="420" y="400" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">New refresh token issued</text>
  
  <rect x="540" y="380" width="150" height="30" rx="4" fill="#ef4444"/>
  <text x="615" y="400" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Reuse = Revocation</text>

</svg>