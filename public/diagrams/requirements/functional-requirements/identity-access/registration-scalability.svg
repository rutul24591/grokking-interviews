<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Registration Service Scalability</text>
  
  <!-- Load Balancer -->
  <rect x="50" y="70" width="140" height="60" rx="8" fill="#3b82f6"/>
  <text x="120" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">Load Balancer</text>
  <text x="120" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Global/Regional</text>
  
  <line x1="190" y1="100" x2="230" y2="100" stroke="#475569" stroke-width="2"/>
  
  <!-- App Servers -->
  <rect x="240" y="60" width="180" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="330" y="90" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">App Servers</text>
  
  <rect x="260" y="105" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="330" y="127" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Server 1 (Stateless)</text>
  
  <rect x="260" y="145" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="330" y="167" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Server 2 (Stateless)</text>
  
  <rect x="260" y="185" width="140" height="35" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="330" y="207" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Server N (Auto-scale)</text>
  
  <line x1="420" y1="150" x2="460" y2="150" stroke="#475569" stroke-width="2"/>
  
  <!-- Queue -->
  <rect x="470" y="60" width="180" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="560" y="90" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Message Queue</text>
  
  <rect x="490" y="105" width="140" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="560" y="127" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Kafka / SQS</text>
  
  <rect x="490" y="145" width="140" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="560" y="167" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Async Processing</text>
  
  <rect x="490" y="185" width="140" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="560" y="207" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Verification Emails</text>
  
  <line x1="650" y1="150" x2="690" y2="150" stroke="#475569" stroke-width="2"/>
  
  <!-- Database -->
  <rect x="700" y="60" width="80" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="740" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">DB</text>
  <text x="740" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Primary</text>
  <text x="740" y="145" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Read Replicas</text>
  <text x="740" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Sharding</text>
  <text x="740" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Connection Pool</text>
  
  <!-- Rate Limiting -->
  <rect x="50" y="280" width="220" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="305" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Rate Limiting</text>
  
  <rect x="70" y="320" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="342" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Redis-based (fast)</text>
  
  <rect x="70" y="360" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Per IP: 5/hour</text>
  
  <rect x="70" y="400" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Per Email: 1/day</text>
  
  <rect x="70" y="440" width="180" height="25" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="457" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Prevent abuse</text>
  
  <!-- Caching -->
  <rect x="290" y="280" width="220" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Caching Strategy</text>
  
  <rect x="310" y="320" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="342" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Username availability</text>
  
  <rect x="310" y="360" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Email domain check</text>
  
  <rect x="310" y="400" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Don't cache user data</text>
  
  <rect x="310" y="440" width="180" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="457" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">TTL: 5 minutes</text>
  
  <!-- Horizontal Scaling -->
  <rect x="530" y="280" width="220" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="305" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Horizontal Scaling</text>
  
  <rect x="550" y="320" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="342" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Stateless app servers</text>
  
  <rect x="550" y="360" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Auto-scaling (CPU/memory)</text>
  
  <rect x="550" y="400" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Queue-based processing</text>
  
  <rect x="550" y="440" width="180" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="457" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Handle traffic spikes</text>

</svg>
