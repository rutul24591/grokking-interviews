<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">GDPR Compliance - Account Settings</text>
  
  <!-- GDPR Rights -->
  <rect x="50" y="70" width="220" height="380" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">GDPR Rights</text>
  
  <rect x="70" y="115" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Right to Access</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Download all data</text>
  
  <rect x="70" y="170" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="190" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Right to Portability</text>
  <text x="160" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Export in JSON/CSV</text>
  
  <rect x="70" y="225" width="180" height="45" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="160" y="245" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Right to Erasure</text>
  <text x="160" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Delete account & data</text>
  
  <rect x="70" y="280" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="300" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Right to Rectify</text>
  <text x="160" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Correct inaccurate data</text>
  
  <rect x="70" y="335" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="355" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Right to Restrict</text>
  <text x="160" y="370" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Limit processing</text>
  
  <!-- Data Export Flow -->
  <rect x="300" y="70" width="240" height="180" rx="8" fill="#f8fafc" stroke="#22c55e" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Data Export Flow</text>
  
  <rect x="320" y="115" width="200" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">1. User requests export</text>
  
  <rect x="320" y="155" width="200" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="177" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">2. Aggregate all user data</text>
  
  <rect x="320" y="195" width="200" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="217" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">3. Generate JSON/CSV file</text>
  
  <rect x="320" y="235" width="200" height="35" rx="4" fill="#22c55e"/>
  <text x="420" y="257" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">4. Email download link (24hr)</text>
  
  <!-- Account Deletion Flow -->
  <rect x="570" y="70" width="190" height="240" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Deletion Flow</text>
  
  <rect x="590" y="115" width="150" height="30" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">1. Confirm deletion</text>
  
  <rect x="590" y="150" width="150" height="30" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2. 30-day grace period</text>
  
  <rect x="590" y="185" width="150" height="30" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">3. Anonymize data</text>
  
  <rect x="590" y="220" width="150" height="30" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">4. Retain audit logs</text>
  
  <rect x="590" y="255" width="150" height="30" rx="4" fill="#ef4444"/>
  <text x="665" y="275" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">5. Permanent deletion</text>
  
  <!-- Compliance Timeline -->
  <rect x="300" y="280" width="460" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="530" y="305" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">GDPR Compliance Timeline</text>
  
  <rect x="320" y="325" width="100" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="370" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Request</text>
  <text x="370" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Day 0</text>
  
  <line x1="420" y1="350" x2="450" y2="350" stroke="#475569" stroke-width="2"/>
  
  <rect x="450" y="325" width="100" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="500" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Process</text>
  <text x="500" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Day 1-7</text>
  
  <line x1="550" y1="350" x2="580" y2="350" stroke="#475569" stroke-width="2"/>
  
  <rect x="580" y="325" width="100" height="50" rx="4" fill="#22c55e"/>
  <text x="630" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Deliver</text>
  <text x="630" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Day 7-30</text>
  
  <text x="530" y="410" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">GDPR requires response within 30 days</text>
  
  <rect x="320" y="425" width="420" height="20" rx="4" fill="#fef3c7"/>
  <text x="530" y="440" text-anchor="middle" font-family="system-ui" font-size="9" fill="#92400e">Note: Audit logs retained for legal compliance (7 years)</text>

</svg>
