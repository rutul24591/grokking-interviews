  <text x="730" y="177" text-anchor="end" font-family="system-ui" font-size="8" fill="#475569">1 hr ago</text>
  
  <rect x="590" y="195" width="150" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="217" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">🖥️ Windows</text>
  <text x="730" y="217" text-anchor="end" font-family="system-ui" font-size="8" fill="#475569">3 days ago</text>
  
  <rect x="590" y="235" width="150" height="30" rx="4" fill="#f59e0b"/>
  <text x="665" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Manage Sessions</text>
  
  <!-- Recent Activity -->
