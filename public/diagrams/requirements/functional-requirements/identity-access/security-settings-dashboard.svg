<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Security Settings Dashboard</text>
  
  <!-- Security Score -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Security Score</text>
  
  <circle cx="160" cy="160" r="50" fill="#dcfce7" stroke="#22c55e" stroke-width="8"/>
  <text x="160" y="165" text-anchor="middle" font-family="system-ui" font-size="24" font-weight="bold" fill="#22c55e">85</text>
  <text x="160" y="180" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Excellent</text>
  
  <rect x="70" y="200" width="180" height="35" rx="4" fill="#22c55e"/>
  <text x="160" y="222" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">View Recommendations</text>
  
  <!-- MFA Status -->
  <rect x="300" y="70" width="240" height="180" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Multi-Factor Authentication</text>
  
  <rect x="320" y="115" width="200" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="135" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">✓ Authenticator App</text>
  <text x="500" y="135" text-anchor="end" font-family="system-ui" font-size="9" fill="#22c55e">Enabled</text>
  
  <rect x="320" y="160" width="200" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="180" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">✓ SMS Backup</text>
  <text x="500" y="180" text-anchor="end" font-family="system-ui" font-size="9" fill="#22c55e">Enabled</text>
  
  <rect x="320" y="205" width="200" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="227" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">+ Add Security Key</text>
  
  <!-- Active Sessions -->
  <rect x="570" y="70" width="190" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Active Sessions</text>
  
  <rect x="590" y="115" width="150" height="35" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="590" y="137" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">📱 iPhone 14 Pro</text>
  <text x="730" y="137" text-anchor="end" font-family="system-ui" font-size="8" fill="#22c55e">✓ Current</text>
  
  <rect x="590" y="155" width="150" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
