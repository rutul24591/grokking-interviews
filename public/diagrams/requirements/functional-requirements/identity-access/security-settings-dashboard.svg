  <text x="450" y="340" text-anchor="end" font-family="system-ui" font-size="8" fill="#475569">2 hours ago</text>
  
  <rect x="70" y="355" width="450" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="375" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">✓ New device recognized (iPhone 14 Pro)</text>
  <text x="450" y="375" text-anchor="end" font-family="system-ui" font-size="8" fill="#475569">2 hours ago</text>
  
  <rect x="70" y="390" width="450" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="410" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">⚠️ Failed login attempt blocked</text>
  <text x="450" y="410" text-anchor="end" font-family="system-ui" font-size="8" fill="#475569">1 day ago</text>
  
  <rect x="70" y="425" width="450" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="445" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">✓ Password changed</text>
  <text x="450" y="445" text-anchor="end" font-family="system-ui" font-size="8" fill="#475569">3 days ago</text>
  
  <!-- Security Alerts -->
  <rect x="570" y="280" width="190" height="190" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="665" y="305" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Alerts</text>
  
  <rect x="590" y="325" width="150" height="45" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📧 Email alerts</text>
  <text x="665" y="360" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Enabled</text>
  
  <rect x="590" y="375" width="150" height="45" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📱 SMS alerts</text>
  <text x="665" y="410" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Enabled</text>
  
  <rect x="590" y="425" width="150" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="665" y="447" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Configure alerts →</text>

</svg>
