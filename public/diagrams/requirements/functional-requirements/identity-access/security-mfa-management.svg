<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">MFA Management &amp; Recovery</text>
  
  <!-- Enrolled Methods -->
  <rect x="50" y="70" width="220" height="280" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Enrolled Methods</text>
  
  <rect x="70" y="115" width="180" height="50" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="85" y="135" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">✓ Authenticator App</text>
  <text x="230" y="135" text-anchor="end" font-family="system-ui" font-size="9" fill="#22c55e">Primary</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Google Authenticator</text>
  
  <rect x="70" y="175" width="180" height="50" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="85" y="195" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">✓ SMS</text>
  <text x="230" y="195" text-anchor="end" font-family="system-ui" font-size="9" fill="#22c55e">Backup</text>
  <text x="160" y="215" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">••• ••• 4567</text>
  
  <rect x="70" y="235" width="180" height="50" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="255" text-anchor="start" font-family="system-ui" font-size="10" fill="#475569">Security Key</text>
  <text x="230" y="255" text-anchor="end" font-family="system-ui" font-size="9" fill="#3b82f6">+ Add</text>
  <text x="160" y="275" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">YubiKey, Touch ID</text>
  
  <rect x="70" y="295" width="180" height="40" rx="4" fill="#22c55e"/>
  <text x="160" y="317" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Add Another Method</text>
  
  <!-- Backup Codes -->
  <rect x="300" y="70" width="240" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Backup Codes</text>
  
  <rect x="320" y="115" width="200" height="60" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="420" y="140" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">10 one-time use codes</text>
  <text x="420" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Use when MFA unavailable</text>
  
  <rect x="320" y="185" width="200" height="35" rx="4" fill="#f59e0b"/>
  <text x="420" y="207" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Download Codes</text>
  
  <rect x="320" y="230" width="200" height="30" rx="4" fill="#f1f5f9"/>
  <text x="420" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Last generated: Jan 10, 2024</text>
  
  <text x="420" y="280" text-anchor="middle" font-family="system-ui" font-size="8" fill="#92400e">⚠️ Store securely offline</text>
  
  <!-- Recovery Flow -->
  <rect x="570" y="70" width="190" height="280" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Recovery Flow</text>
  
  <rect x="590" y="115" width="150" height="35" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="665" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">1. Try primary MFA</text>
  
  <line x1="665" y1="150" x2="665" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="590" y="170" width="150" height="35" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="665" y="192" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">2. Use backup SMS</text>
  
  <line x1="665" y1="205" x2="665" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="590" y="225" width="150" height="35" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="665" y="247" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">3. Enter backup code</text>
  
  <line x1="665" y1="260" x2="665" y2="275" stroke="#475569" stroke-width="2" stroke-dasharray="5,5"/>
  
  <rect x="590" y="280" width="150" height="35" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="665" y="302" text-anchor="middle" font-family="system-ui" font-size="9" fill="#991b1b">4. Contact support</text>
  <text x="665" y="315" text-anchor="middle" font-family="system-ui" font-size="7" fill="#991b1b">(ID verification)</text>
  
  <!-- Recovery Options -->
  <rect x="50" y="370" width="340" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Recovery Options</text>
  
  <rect x="70" y="410" width="145" height="55" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="142" y="430" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Recovery Email</text>
  <text x="142" y="445" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">backup@email.com</text>
  <text x="142" y="460" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Verified</text>
  
  <rect x="225" y="410" width="145" height="55" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="297" y="430" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Trusted Contacts</text>
  <text x="297" y="445" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3 contacts set</text>
  <text x="297" y="460" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Enabled</text>
  
  <!-- Device Trust -->
  <rect x="420" y="370" width="340" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Trusted Devices</text>
  
  <rect x="440" y="410" width="145" height="55" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="512" y="430" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">This Device</text>
  <text x="512" y="445" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">iPhone 14 Pro</text>
  <text x="512" y="460" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Skip MFA</text>
  
  <rect x="595" y="410" width="145" height="55" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="667" y="430" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Manage Devices</text>
  <text x="667" y="445" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3 active sessions</text>
  <text x="667" y="460" text-anchor="middle" font-family="system-ui" font-size="8" fill="#3b82f6">Review →</text>

</svg>
