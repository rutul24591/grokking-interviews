<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Login Attempt Tracking</text>
  
  <!-- Login Request -->
  <rect x="50" y="80" width="120" height="60" rx="8" fill="#3b82f6"/>
  <text x="110" y="105" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Login Request</text>
  <text x="110" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">email, password</text>
  
  <!-- Rate Limiter -->
  <rect x="220" y="70" width="140" height="80" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2"/>
  <text x="290" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Rate Limiter</text>
  <text x="290" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Redis: login_attempts:{email}</text>
  <text x="290" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">TTL: 1 hour</text>
  
  <!-- Decision -->
  <rect x="410" y="70" width="100" height="80" rx="8" fill="#f59e0b"/>
  <text x="460" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Attempts</text>
  <text x="460" y="120" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">&gt; 5?</text>
  
  <!-- Blocked -->
  <rect x="560" y="70" width="100" height="80" rx="8" fill="#ef4444"/>
  <text x="610" y="105" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Blocked</text>
  <text x="610" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Exponential</text>
  <text x="610" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Backoff</text>
  
  <!-- Allow -->
  <rect x="560" y="180" width="100" height="80" rx="8" fill="#22c55e"/>
  <text x="610" y="215" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Allow</text>
  <text x="610" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Proceed to</text>
  <text x="610" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Auth</text>
  
  <!-- Auth Service -->
  <rect x="220" y="200" width="140" height="80" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="290" y="225" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Auth Service</text>
  <text x="290" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">bcrypt compare</text>
  <text x="290" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Constant time</text>
  
  <!-- Log -->
  <rect x="410" y="200" width="140" height="80" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="225" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Audit Log</text>
  <text x="480" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">timestamp</text>
  <text x="480" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">IP, user-agent</text>
  <text x="480" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">result</text>
  
  <!-- Arrows -->
  <line x1="170" y1="110" x2="210" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="110" x2="400" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="110" x2="550" y2="110" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="150" x2="460" y2="170" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="210" x2="550" y2="210" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="240" x2="400" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

</svg>