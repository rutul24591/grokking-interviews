<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Social Login - Conversion Optimization</text>
  
  <!-- Signup Funnel -->
  <rect x="50" y="70" width="280" height="380" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="190" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Signup Funnel</text>
  
  <rect x="70" y="115" width="240" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="190" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Landing Page</text>
  <text x="190" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">10,000 visitors</text>
  
  <line x1="190" y1="165" x2="190" y2="185" stroke="#475569" stroke-width="3"/>
  
  <rect x="70" y="185" width="240" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="190" y="210" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Signup Page</text>
  <text x="190" y="225" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">6,000 users (60%)</text>
  
  <line x1="190" y1="235" x2="190" y2="255" stroke="#475569" stroke-width="3"/>
  
  <rect x="70" y="255" width="240" height="50" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="190" y="280" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Email Verification</text>
  <text x="190" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">4,500 users (75%)</text>
  
  <line x1="190" y1="305" x2="190" y2="325" stroke="#475569" stroke-width="3"/>
  
  <rect x="70" y="325" width="240" height="50" rx="4" fill="#22c55e"/>
  <text x="190" y="350" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">✓ Active User</text>
  <text x="190" y="365" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">4,500 converted (45%)</text>
  
  <!-- Social Login Options -->
  <rect x="360" y="70" width="200" height="240" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="460" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Social Providers</text>
  
  <rect x="380" y="115" width="160" height="45" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="140" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">🔵 Continue with Google</text>
  <text x="530" y="140" text-anchor="end" font-family="system-ui" font-size="8" fill="#22c55e">45%</text>
  
  <rect x="380" y="165" width="160" height="45" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="190" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">⚫ Continue with Apple</text>
  <text x="530" y="190" text-anchor="end" font-family="system-ui" font-size="8" fill="#22c55e">25%</text>
  
  <rect x="380" y="215" width="160" height="45" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="240" text-anchor="start" font-family="system-ui" font-size="10" fill="#0f172a">🔵 Continue with Facebook</text>
  <text x="530" y="240" text-anchor="end" font-family="system-ui" font-size="8" fill="#22c55e">20%</text>
  
  <rect x="380" y="265" width="160" height="40" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="460" y="290" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Email Signup 10%</text>
  
  <!-- Conversion Comparison -->
  <rect x="590" y="70" width="170" height="240" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="675" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Conversion Rate</text>
  
  <rect x="610" y="115" width="130" height="60" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="675" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Social Login</text>
  <text x="675" y="160" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">85%</text>
  
  <rect x="610" y="185" width="130" height="60" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="675" y="210" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Email Signup</text>
  <text x="675" y="230" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">25%</text>
  
  <text x="675" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Social has 3.4x higher</text>
  <text x="675" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">conversion rate</text>
  
  <!-- Button Placement -->
  <rect x="360" y="330" width="400" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="560" y="355" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Button Placement Impact</text>
  
  <rect x="380" y="370" width="170" height="80" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="465" y="395" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Above Form</text>
  <text x="465" y="415" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#22c55e">+35%</text>
  <text x="465" y="435" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Recommended</text>
  
  <rect x="560" y="370" width="170" height="80" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="645" y="395" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Below Form</text>
  <text x="645" y="415" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f59e0b">Baseline</text>
  <text x="645" y="435" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Standard placement</text>

</svg>
