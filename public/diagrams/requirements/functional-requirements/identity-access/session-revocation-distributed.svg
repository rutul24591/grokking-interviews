<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Distributed Session Revocation</text>
  
  <!-- Revocation Source -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Revocation</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Trigger</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Revoke</text>
  
  <!-- Event Stream -->
  <rect x="220" y="70" width="180" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="310" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Event Stream</text>
  <text x="310" y="120" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Kafka / SQS</text>
  <text x="310" y="145" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Publish revocation event</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Broadcast</text>
  
  <!-- Shared Denylist -->
  <rect x="450" y="70" width="140" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="520" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Shared Denylist</text>
  <text x="520" y="120" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Redis Cluster</text>
  <text x="520" y="145" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Add revoked JTI</text>
  
  <line x1="590" y1="120" x2="630" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Check</text>
  
  <!-- Service A -->
  <rect x="640" y="60" width="120" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Service A</text>
  <text x="700" y="110" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Check denylist</text>
  <text x="700" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ Valid</text>
  
  <!-- Service B -->
  <rect x="640" y="150" width="120" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="175" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Service B</text>
  <text x="700" y="200" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Check denylist</text>
  <text x="700" y="220" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ Valid</text>
  
  <!-- Service C -->
  <rect x="640" y="240" width="120" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="265" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Service C</text>
  <text x="700" y="290" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Check denylist</text>
  <text x="700" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ Valid</text>
  
  <!-- Propagation Timeline -->
  <rect x="50" y="200" width="700" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Propagation Timeline</text>
  
  <rect x="70" y="240" width="150" height="60" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="145" y="265" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">T=0ms</text>
  <text x="145" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Revocation triggered</text>
  
  <rect x="240" y="240" width="150" height="60" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="315" y="265" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">T=10ms</text>
  <text x="315" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Event published</text>
  
  <rect x="410" y="240" width="150" height="60" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="485" y="265" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">T=50-500ms</text>
  <text x="485" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Services receive event</text>
  
  <rect x="580" y="240" width="150" height="60" rx="4" fill="#22c55e"/>
  <text x="655" y="265" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">T=1s</text>
  <text x="655" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">All services updated</text>
  
  <!-- Consistency Window -->
  <rect x="50" y="340" width="700" height="110" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Consistency Window (Accept Brief Inconsistency)</text>
  
  <rect x="70" y="380" width="200" height="60" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="170" y="405" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Propagation Delay</text>
  <text x="170" y="425" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Seconds to propagate</text>
  
  <rect x="290" y="380" width="200" height="60" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="390" y="405" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Eventual Consistency</text>
  <text x="390" y="425" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">All services converge</text>
  
  <rect x="510" y="380" width="200" height="60" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="610" y="405" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Mitigation</text>
  <text x="610" y="425" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Short token expiry</text>
  
  <rect x="510" y="445" width="200" height="30" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="610" y="465" text-anchor="middle" font-family="system-ui" font-size="8" fill="#991b1b">Accept risk window</text>

</svg>
