<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Policy Evaluation Flow</text>
  
  <!-- Request -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Access Request</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">user, resource</text>
  
  <!-- PEP -->
  <rect x="220" y="70" width="140" height="100" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="290" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">PEP</text>
  <text x="290" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Policy Enforcement</text>
  <text x="290" y="145" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Intercept &amp; Enforce</text>
  <text x="290" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Point</text>
  
  <!-- PDP -->
  <rect x="410" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">PDP</text>
  <text x="500" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Policy Decision</text>
  <text x="500" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Evaluate policies</text>
  <text x="500" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Return Allow/Deny</text>
  <text x="500" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Point</text>
  
  <!-- PIP -->
  <rect x="640" y="80" width="120" height="80" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="700" y="110" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">PIP</text>
  <text x="700" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Policy Information</text>
  <text x="700" y="150" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Fetch attributes</text>
  
  <!-- Attribute Sources -->
  <rect x="640" y="200" width="120" height="60" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="700" y="225" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">User DB</text>
  
  <rect x="520" y="220" width="100" height="40" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="570" y="245" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Resource DB</text>
  
  <rect x="410" y="240" width="90" height="40" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="455" y="265" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Context</text>
  
  <!-- Policy Store -->
  <rect x="220" y="220" width="140" height="80" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="290" y="250" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Policy Store</text>
  <text x="290" y="275" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">XACML/Rego</text>
  <text x="290" y="290" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">policies</text>
  
  <!-- Arrows -->
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Request</text>
  
  <line x1="360" y1="120" x2="400" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="380" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Evaluate</text>
  
  <line x1="590" y1="120" x2="630" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Get attrs</text>
  
  <line x1="700" y1="160" x2="700" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <line x1="630" y1="230" x2="500" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="230" x2="500" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="230" x2="500" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <line x1="410" y1="120" x2="360" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="385" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">4. Load policies</text>

  <line x1="360" y1="150" x2="400" y2="150" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="380" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">5. Decision</text>
  
  <line x1="210" y1="150" x2="170" y2="150" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">6. Allow/Deny</text>
  
  <!-- Decision Logic -->
  <rect x="50" y="320" width="700" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Decision Logic</text>
  
  <rect x="80" y="365" width="170" height="70" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="165" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Permit</text>
  <text x="165" y="410" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">All conditions met</text>
  <text x="165" y="425" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">→ Allow access</text>
  
  <rect x="270" y="365" width="170" height="70" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="355" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Deny</text>
  <text x="355" y="410" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Condition failed</text>
  <text x="355" y="425" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ef4444">→ Block access</text>
  
  <rect x="460" y="365" width="170" height="70" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="545" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Indeterminate</text>
  <text x="545" y="410" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Error evaluating</text>
  <text x="545" y="425" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">→ Default deny</text>
  
  <rect x="650" y="365" width="80" height="70" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="690" y="395" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Not Applicable</text>
  <text x="690" y="425" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">→ Next policy</text>

</svg>