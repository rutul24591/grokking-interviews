<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Password Validation &amp; Policy</text>
  
  <!-- Input -->
  <rect x="50" y="70" width="140" height="100" rx="8" fill="#3b82f6"/>
  <text x="120" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">User Input</text>
  <text x="120" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">New password</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Confirm password</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Client-side check</text>
  
  <line x1="190" y1="120" x2="230" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Validation Rules -->
  <rect x="240" y="60" width="320" height="120" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Validation Rules</text>
  
  <rect x="260" y="100" width="130" height="35" rx="4" fill="#f8fafc"/>
  <text x="325" y="122" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Min Length: 12</text>
  
  <rect x="410" y="100" width="130" height="35" rx="4" fill="#f8fafc"/>
  <text x="475" y="122" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Max Length: 128</text>
  
  <rect x="260" y="140" width="130" height="35" rx="4" fill="#f8fafc"/>
  <text x="325" y="162" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Uppercase (1+)</text>
  
  <rect x="410" y="140" width="130" height="35" rx="4" fill="#f8fafc"/>
  <text x="475" y="162" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Lowercase (1+)</text>
  
  <rect x="260" y="180" width="130" height="35" rx="4" fill="#f8fafc"/>
  <text x="325" y="202" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Number (1+)</text>
  
  <rect x="410" y="180" width="130" height="35" rx="4" fill="#f8fafc"/>
  <text x="475" y="202" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Special char (1+)</text>
  
  <line x1="560" y1="120" x2="600" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Breach Check -->
  <rect x="610" y="70" width="140" height="100" rx="8" fill="#f1f5f9" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Breach Check</text>
  <text x="680" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Have I Been Pwned</text>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">k-anonymity</text>
  <text x="680" y="150" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">5-char prefix</text>
  <text x="680" y="165" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">API lookup</text>

  <!-- Password Strength -->
  <rect x="50" y="210" width="340" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="235" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Password Strength Meter</text>
  
  <!-- Weak -->
  <rect x="70" y="255" width="280" height="30" rx="4" fill="#ef4444"/>
  <text x="210" y="275" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">Weak</text>
  <text x="70" y="295" text-anchor="start" font-family="system-ui" font-size="9" fill="#475569">&lt;8 chars, no complexity</text>
  
  <!-- Fair -->
  <rect x="70" y="310" width="280" height="30" rx="4" fill="#f59e0b"/>
  <text x="210" y="330" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">Fair</text>
  <text x="70" y="350" text-anchor="start" font-family="system-ui" font-size="9" fill="#475569">8-11 chars, basic complexity</text>
  
  <!-- Good -->
  <rect x="70" y="365" width="280" height="30" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="210" y="385" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">Good</text>
  <text x="70" y="405" text-anchor="start" font-family="system-ui" font-size="9" fill="#475569">12+ chars, full complexity</text>
  
  <!-- Strong -->
  <rect x="70" y="420" width="280" height="30" rx="4" fill="#22c55e"/>
  <text x="210" y="440" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">Strong</text>
  <text x="70" y="460" text-anchor="start" font-family="system-ui" font-size="9" fill="#475569">16+ chars, passphrase, unique</text>
  
  <!-- Common Passwords Block -->
  <rect x="420" y="210" width="330" height="180" rx="8" fill="#f8fafc" stroke="#ef4444" stroke-width="2"/>
  <text x="585" y="235" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Blocked Passwords</text>
  
  <rect x="440" y="255" width="290" height="30" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="585" y="275" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Common passwords (10,000+ list)</text>
  
  <rect x="440" y="290" width="290" height="30" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="585" y="310" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Dictionary words</text>
  
  <rect x="440" y="325" width="290" height="30" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="585" y="345" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Service name variations</text>
  
  <rect x="440" y="360" width="290" height="30" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="585" y="380" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Personal info (email, name)</text>
  
  <rect x="440" y="395" width="290" height="30" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="585" y="415" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Sequential patterns (12345, qwerty)</text>
  
  <!-- NIST Guidelines -->
  <rect x="420" y="410" width="330" height="60" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="585" y="435" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">NIST 800-63B Guidelines</text>
  <text x="585" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Min 8 chars, max 64+ chars, no composition rules, check breach lists</text>

</svg>