<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Password Hashing &amp; Validation Flow</text>
  
  <!-- User Registration -->
  <rect x="50" y="70" width="140" height="100" rx="8" fill="#3b82f6"/>
  <text x="120" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">User Registration</text>
  <text x="120" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Choose password</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Password validation</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Strength check</text>
  
  <line x1="190" y1="120" x2="230" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Plain text</text>
  
  <!-- Hashing Service -->
  <rect x="240" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2"/>
  <text x="330" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Hashing Service</text>
  
  <rect x="260" y="110" width="140" height="30" rx="4" fill="#f8fafc"/>
  <text x="330" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Generate Salt</text>
  <text x="330" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">16-32 bytes random</text>
  
  <rect x="260" y="150" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="330" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">bcrypt / Argon2</text>
  
  <line x1="420" y1="120" x2="460" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Hash</text>
  
  <!-- Storage -->
  <rect x="470" y="70" width="140" height="100" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Database</text>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Store:</text>
  <text x="540" y="145" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">hash + salt</text>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">NEVER plain text</text>
  
  <!-- Login Flow -->
  <rect x="50" y="220" width="140" height="100" rx="8" fill="#3b82f6"/>
  <text x="120" y="250" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">User Login</text>
  <text x="120" y="275" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Enter password</text>
  <text x="120" y="290" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Submit</text>
  <text x="120" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Rate limited</text>
  
  <line x1="190" y1="270" x2="230" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="260" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Plain text</text>
  
  <!-- Retrieve -->
  <rect x="240" y="210" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="330" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Retrieve Stored Hash</text>
  <text x="330" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Query by username</text>
  <text x="330" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Get hash + salt</text>
  <text x="330" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Constant time lookup</text>

  <line x1="420" y1="270" x2="460" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Compare -->
  <rect x="470" y="210" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#ef4444" stroke-width="2"/>
  <text x="560" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Constant-Time Compare</text>
  <text x="560" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Hash input password</text>
  <text x="560" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">With same salt</text>
  <text x="560" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">timing_safe_equals()</text>

  <line x1="650" y1="270" x2="690" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Result -->
  <rect x="700" y="220" width="80" height="100" rx="8" fill="#22c55e"/>
  <text x="740" y="250" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Match</text>
  <text x="740" y="275" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Allow</text>
  <text x="740" y="290" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Login</text>
  
  <rect x="700" y="330" width="80" height="60" rx="8" fill="#ef4444"/>
  <text x="740" y="355" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">No Match</text>
  <text x="740" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Deny</text>
  
  <!-- Algorithms -->
  <rect x="50" y="360" width="340" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="385" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Recommended Algorithms</text>
  
  <rect x="70" y="400" width="120" height="35" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="130" y="422" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Argon2id</text>
  <text x="130" y="440" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Best choice</text>
  
  <rect x="210" y="400" width="120" height="35" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="270" y="422" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">bcrypt</text>
  <text x="270" y="440" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Good, proven</text>
  
  <rect x="70" y="445" width="120" height="35" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="130" y="467" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">scrypt</text>
  <text x="130" y="485" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Memory-hard</text>
  
  <rect x="210" y="445" width="120" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="270" y="467" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">PBKDF2</text>
  <text x="270" y="485" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Minimum acceptable</text>
  
  <!-- DON'T Use -->
  <rect x="420" y="360" width="330" height="110" rx="8" fill="#f8fafc" stroke="#ef4444" stroke-width="2"/>
  <text x="585" y="385" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ef4444">NEVER Use These</text>
  
  <rect x="440" y="405" width="290" height="25" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="585" y="422" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">MD5, SHA1, SHA256 (too fast)</text>
  
  <rect x="440" y="435" width="290" height="25" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="585" y="452" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Plain text storage</text>
  
  <rect x="440" y="465" width="290" height="25" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="585" y="482" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Reversible encryption</text>

</svg>