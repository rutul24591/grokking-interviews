<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Authentication Service Architecture</text>
  
  <!-- Client -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Client</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Web/Mobile</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Login Request</text>
  
  <!-- API Gateway -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">API Gateway</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Rate Limiting</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Load Balancing</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Route</text>
  
  <!-- Auth Service -->
  <rect x="450" y="60" width="180" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Auth Service</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Credential Validator</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Token Issuer</text>
  
  <rect x="470" y="175" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Session Manager</text>
  
  <rect x="470" y="210" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="230" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Risk Engine</text>
  
  <line x1="630" y1="150" x2="670" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Validate</text>
  
  <!-- User Database -->
  <rect x="680" y="80" width="100" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="730" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">User DB</text>
  <text x="730" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Password Hash</text>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">MFA Status</text>
  
  <line x1="730" y1="180" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="200" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">4. Cache</text>
  
  <!-- Redis Cache -->
  <rect x="680" y="230" width="100" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Redis</text>
  <text x="730" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">User Cache</text>
  <text x="730" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Sessions</text>
  
  <line x1="630" y1="210" x2="670" y2="210" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">5. Store Session</text>
  
  <!-- Session Store -->
  <rect x="450" y="260" width="180" height="80" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="290" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Session Store</text>
  <text x="540" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Redis Cluster</text>
  <text x="540" y="330" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Device, IP, Metadata</text>
  
  <line x1="450" y1="300" x2="410" y2="300" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="290" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">6. Issue Tokens</text>
  
  <!-- Response -->
  <rect x="220" y="260" width="180" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="290" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Response</text>
  <text x="310" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Access Token (JWT)</text>
  <text x="310" y="330" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Refresh Token (Cookie)</text>
  
  <line x1="220" y1="300" x2="180" y2="300" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="290" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">7. Return</text>
  
  <!-- Client Success -->
  <rect x="50" y="260" width="120" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="290" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Authenticated</text>
  <text x="110" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Tokens Stored</text>
  <text x="110" y="330" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Session Active</text>
  
  <!-- External Services -->
  <rect x="50" y="370" width="340" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">External Integrations</text>
  
  <rect x="70" y="410" width="80" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="110" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">MFA Provider</text>
  
  <rect x="160" y="410" width="80" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="200" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">SSO (SAML)</text>
  
  <rect x="250" y="410" width="80" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="290" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">OAuth Providers</text>
  
  <rect x="340" y="410" width="40" height="35" rx="4" fill="#8b5cf6"/>
  <text x="360" y="432" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <!-- Audit Logging -->
  <rect x="420" y="370" width="340" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Audit &amp; Monitoring</text>
  
  <rect x="440" y="410" width="140" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Kafka → Audit Log</text>
  
  <rect x="590" y="410" width="160" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Monitoring &amp; Alerts</text>

</svg>
