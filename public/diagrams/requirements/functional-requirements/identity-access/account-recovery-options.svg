<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Account Recovery Options</text>
  
  <!-- Primary Methods -->
  <rect x="50" y="70" width="220" height="380" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Primary Methods</text>
  
  <rect x="70" y="115" width="180" height="70" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">📧 Recovery Email</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Code sent to backup email</text>
  <text x="160" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Setup during signup</text>
  
  <rect x="70" y="195" width="180" height="70" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="220" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">📱 SMS to Phone</text>
  <text x="160" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Code sent to verified phone</text>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Requires phone verification</text>
  
  <rect x="70" y="275" width="180" height="70" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="300" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">🔑 Backup Codes</text>
  <text x="160" y="320" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">10 one-time use codes</text>
  <text x="160" y="335" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Download during MFA setup</text>
  
  <rect x="70" y="355" width="180" height="70" rx="4" fill="#22c55e"/>
  <text x="160" y="380" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">✓ Recommended:</text>
  <text x="160" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Enable all 3 methods</text>
  
  <!-- Secondary Methods -->
  <rect x="300" y="70" width="240" height="240" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Secondary Methods</text>
  
  <rect x="320" y="115" width="200" height="60" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="420" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">👥 Trusted Contacts</text>
  <text x="420" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">3-5 contacts can vouch for you</text>
  <text x="420" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Requires 2-3 confirmations</text>
  
  <rect x="320" y="185" width="200" height="60" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="420" y="210" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">❓ Security Questions</text>
  <text x="420" y="230" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Last resort (easily researched)</text>
  <text x="420" y="245" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Use custom questions only</text>
  
  <rect x="320" y="255" width="200" height="45" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="420" y="275" text-anchor="middle" font-family="system-ui" font-size="9" fill="#92400e">⚠️ Lower security than primary</text>
  <text x="420" y="290" text-anchor="middle" font-family="system-ui" font-size="9" fill="#92400e">Use only if primary unavailable</text>
  
  <!-- Manual Recovery -->
  <rect x="570" y="70" width="190" height="240" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Manual Recovery</text>
  
  <rect x="590" y="115" width="150" height="50" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📞 Contact Support</text>
  <text x="665" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">ID verification required</text>
  
  <rect x="590" y="175" width="150" height="50" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📋 Submit Documents</text>
  <text x="665" y="215" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Government ID, proof of ownership</text>
  
  <rect x="590" y="235" width="150" height="50" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⏰ Review Period</text>
  <text x="665" y="275" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3-7 business days</text>
  
  <rect x="590" y="295" width="150" height="30" rx="4" fill="#ef4444"/>
  <text x="665" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Last resort only</text>
  
  <!-- Comparison Table -->
  <rect x="300" y="330" width="460" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="530" y="355" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Recovery Method Comparison</text>
  
  <rect x="320" y="370" width="420" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="387" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Method</text>
  <text x="450" y="387" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Security</text>
  <text x="540" y="387" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Speed</text>
  <text x="630" y="387" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Availability</text>
  
  <rect x="320" y="395" width="420" height="25" rx="4" fill="#f1f5f9"/>
  <text x="340" y="412" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Recovery Email</text>
  <text x="450" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">High</text>
  <text x="540" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">Fast</text>
  <text x="630" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">High</text>
  
  <rect x="320" y="420" width="420" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="437" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">SMS</text>
  <text x="450" y="437" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">Medium</text>
  <text x="540" y="437" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">Fast</text>
  <text x="630" y="437" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">High</text>
  
  <rect x="320" y="445" width="420" height="25" rx="4" fill="#f1f5f9"/>
  <text x="340" y="462" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Backup Codes</text>
  <text x="450" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">High</text>
  <text x="540" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">Instant</text>
  <text x="630" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">Medium</text>

</svg>
