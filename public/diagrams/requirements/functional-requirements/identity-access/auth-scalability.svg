<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Authentication Service Scalability</text>
  
  <!-- Horizontal Scaling -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Horizontal Scaling</text>
  
  <rect x="70" y="115" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Multiple Instances</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Load balanced requests</text>
  
  <rect x="70" y="170" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Stateless JWT Validation</text>
  <text x="160" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Any instance can validate</text>
  
  <rect x="70" y="225" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Auto-Scaling</text>
  <text x="160" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Based on CPU/memory</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Redis Cluster -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Redis Cluster</text>
  
  <rect x="340" y="115" width="180" height="45" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Sharded by user_id</text>
  <text x="430" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Distributed sessions</text>
  
  <rect x="340" y="170" width="180" height="45" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="430" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Replication</text>
  <text x="430" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">High availability</text>
  
  <rect x="340" y="225" width="180" height="45" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">TTL for Sessions</text>
  <text x="430" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Auto-expiry</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Database Scaling -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Database Scaling</text>
  
  <rect x="610" y="115" width="120" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="670" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Read Replicas</text>
  <text x="670" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Distribute read load</text>
  
  <rect x="610" y="175" width="120" height="50" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Write to Primary</text>
  <text x="670" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Single source of truth</text>
  
  <rect x="610" y="235" width="120" height="30" rx="4" fill="#22c55e"/>
  <text x="670" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Cache user data</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Multi-Region -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Multi-Region</text>
  
  <rect x="610" y="360" width="120" height="35" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="670" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">3+ Regions</text>
  
  <rect x="610" y="400" width="120" height="35" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="670" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Global Load Balancer</text>
  
  <rect x="610" y="440" width="120" height="35" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="670" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Session Replication</text>
  
  <!-- Caching Strategy -->
  <rect x="50" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Caching Strategy</text>
  
  <rect x="70" y="360" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">User data in Redis</text>
  
  <rect x="70" y="400" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">JWKS cached (5 min)</text>
  
  <rect x="70" y="440" width="180" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="160" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#991b1b">Cache invalidation on change</text>
  
  <!-- Performance Targets -->
  <rect x="320" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Performance Targets</text>
  
  <rect x="340" y="360" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">p99 latency &lt;100ms</text>
  
  <rect x="340" y="400" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">99.99% availability</text>
  
  <rect x="340" y="440" width="180" height="35" rx="4" fill="#8b5cf6"/>
  <text x="430" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Circuit breakers</text>

</svg>
