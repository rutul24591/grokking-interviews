<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Email Verification UX</text>
  
  <!-- Verification Email -->
  <rect x="50" y="70" width="300" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Verification Email</text>
  
  <rect x="70" y="115" width="260" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Subject: Verify your email for [App]</text>
  
  <rect x="70" y="155" width="260" height="60" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="175" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Thanks for signing up! Please verify</text>
  <text x="200" y="190" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">your email to activate your account.</text>
  <text x="200" y="205" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">This link expires in 24 hours.</text>
  
  <rect x="70" y="220" width="260" height="40" rx="4" fill="#3b82f6"/>
  <text x="200" y="245" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Verify Email Address</text>
  
  <line x1="350" y1="170" x2="390" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Verification Page -->
  <rect x="400" y="70" width="200" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="500" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Verification Page</text>
  
  <rect x="420" y="115" width="160" height="50" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="500" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">✓ Verified!</text>
  <text x="500" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Email verified successfully</text>
  
  <rect x="420" y="175" width="160" height="40" rx="4" fill="#22c55e"/>
  <text x="500" y="200" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Continue to Dashboard</text>
  
  <line x1="500" y1="270" x2="500" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Error States -->
  <rect x="400" y="320" width="350" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="575" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Error States</text>
  
  <rect x="420" y="360" width="150" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="495" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⚠ Expired Token</text>
  
  <rect x="590" y="360" width="150" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⚠ Invalid Token</text>
  
  <rect x="420" y="410" width="150" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="495" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⚠ Already Verified</text>
  
  <rect x="590" y="410" width="150" height="40" rx="4" fill="#ef4444"/>
  <text x="665" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Request New Link</text>
  
  <!-- Resend Flow -->
  <rect x="50" y="320" width="300" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Resend Flow</text>
  
  <rect x="70" y="360" width="260" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="200" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Didn't receive the email?</text>
  
  <rect x="70" y="410" width="120" height="40" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="130" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Resend Email</text>
  
  <rect x="200" y="410" width="130" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="265" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Resend in 59s</text>

</svg>
