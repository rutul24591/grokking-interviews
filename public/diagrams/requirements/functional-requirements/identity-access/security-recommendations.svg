  <rect x="70" y="385" width="180" height="50" rx="4" fill="#ef4444"/>
  <text x="160" y="405" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Fix Critical Issues</text>
  <text x="160" y="425" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">→</text>
  
