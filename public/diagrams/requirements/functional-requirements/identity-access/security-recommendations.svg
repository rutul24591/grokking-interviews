  <text x="420" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">+15 security points</text>
  
  <rect x="320" y="170" width="200" height="45" rx="4" fill="#f59e0b" opacity="0.6"/>
