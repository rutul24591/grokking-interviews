  <rect x="590" y="170" width="150" height="45" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="665" y="195" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#ffffff">📋 Review Privacy Settings</text>
  <text x="665" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">+5 security points</text>
  
  <rect x="590" y="225" width="150" height="200" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="665" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Optional</text>
  <text x="665" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Security keys provide</text>
  <text x="665" y="285" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">phishing-resistant auth</text>
  <text x="665" y="305" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Privacy review ensures</text>
  <text x="665" y="320" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">data sharing preferences</text>
  <text x="665" y="335" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">are up to date</text>
  <text x="665" y="355" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Recommended for</text>
  <text x="665" y="370" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">high-security accounts</text>
  
  <rect x="590" y="440" width="150" height="35" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="665" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Review Later</text>
  
  <!-- Progress -->
  <rect x="50" y="465" width="710" height="20" rx="4" fill="#f1f5f9"/>
  <rect x="50" y="465" width="284" height="20" rx="4" fill="#22c55e"/>
  <text x="400" y="480" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Security Progress: 40% complete (2/5 critical, 0/3 high, 0/2 medium)</text>

</svg>
