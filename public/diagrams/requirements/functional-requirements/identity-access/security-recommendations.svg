<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Security Recommendations</text>
  
  <!-- Priority Levels -->
  <rect x="50" y="70" width="220" height="380" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Critical (2)</text>
  
  <rect x="70" y="115" width="180" height="60" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">⚠️ Enable MFA</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">+50 security points</text>
  
  <rect x="70" y="185" width="180" height="60" rx="4" fill="#ef4444" opacity="0.6"/>
