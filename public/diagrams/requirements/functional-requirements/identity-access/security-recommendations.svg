  <text x="420" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">+10 security points</text>
  
  <rect x="320" y="280" width="200" height="150" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
