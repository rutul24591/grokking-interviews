  <text x="420" y="325" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">• Backup codes for emergency access</text>
  <text x="420" y="340" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">• Remove unknown devices</text>
  <text x="420" y="355" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">• Ensure recovery email is current</text>
  <text x="420" y="370" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">• Prevent account lockout</text>
  <text x="420" y="385" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">• Reduce recovery time</text>
  
