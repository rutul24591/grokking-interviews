<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Token Management Lifecycle</text>
  
  <!-- JWT Structure -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">JWT Access Token</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Header</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">alg: RS256, typ: JWT</text>
  
  <rect x="70" y="160" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="180" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Payload (Claims)</text>
  <text x="160" y="195" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">sub, exp, iat, aud, iss</text>
  
  <rect x="70" y="205" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="225" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Signature</text>
  <text x="160" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">RS256 signed</text>
  
  <rect x="70" y="250" width="180" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="270" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⏰ 15-60 min expiry</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Refresh Token -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Refresh Token</text>
  
  <rect x="340" y="115" width="180" height="45" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Opaque Token</text>
  <text x="430" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Random 256-bit value</text>
  
  <rect x="340" y="170" width="180" height="45" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="430" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">HttpOnly Cookie</text>
  <text x="430" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Secure, SameSite=Strict</text>
  
  <rect x="340" y="225" width="180" height="45" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Server-Side Storage</text>
  <text x="430" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Hash in database</text>
  
  <rect x="340" y="275" width="180" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⏰ 7-30 day expiry</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Token Rotation -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Token Rotation</text>
  
  <rect x="610" y="115" width="120" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="670" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">On Refresh</text>
  <text x="670" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Issue new refresh</text>
  
  <rect x="610" y="175" width="120" height="50" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Invalidate Old</text>
  <text x="670" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Detect reuse attacks</text>
  
  <rect x="610" y="235" width="120" height="30" rx="4" fill="#22c55e"/>
  <text x="670" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Prevents theft</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Token Revocation -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Token Revocation</text>
  
  <rect x="610" y="360" width="120" height="35" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="670" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Password Change</text>
  
  <rect x="610" y="400" width="120" height="35" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="670" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Logout All</text>
  
  <rect x="610" y="440" width="120" height="35" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="670" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Security Incident</text>
  
  <!-- Token Validation -->
  <rect x="50" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Token Validation</text>
  
  <rect x="70" y="360" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Verify RS256 signature</text>
  
  <rect x="70" y="400" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Check expiry (exp claim)</text>
  
  <rect x="70" y="440" width="180" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="160" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#991b1b">Check denylist (JTI)</text>
  
  <!-- Token Storage -->
  <rect x="320" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Token Storage</text>
  
  <rect x="340" y="360" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Access: Memory only</text>
  
  <rect x="340" y="400" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Refresh: HttpOnly cookie</text>
  
  <rect x="340" y="440" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Never localStorage</text>

</svg>
