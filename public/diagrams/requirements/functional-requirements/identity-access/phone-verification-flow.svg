<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Phone Verification Flow</text>
  
  <!-- User Input -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Enter Phone</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Phone #</text>
  
  <!-- Backend -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Backend</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Validate Format</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Generate OTP</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Send OTP</text>
  
  <!-- SMS Gateway -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">SMS Gateway</text>
  <text x="540" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Twilio / Vonage / AWS</text>
  <text x="540" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Route to Carrier</text>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Track Delivery</text>
  
  <line x1="630" y1="120" x2="670" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Deliver</text>
  
  <!-- Carrier/Phone -->
  <rect x="680" y="80" width="80" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="720" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Phone</text>
  <text x="720" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">SMS Received</text>
  
  <line x1="720" y1="160" x2="720" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="740" y="180" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">4. Enter OTP</text>
  
  <!-- OTP Entry -->
  <rect x="680" y="210" width="80" height="80" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="720" y="245" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Enter</text>
  <text x="720" y="270" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">123456</text>
  
  <line x1="680" y1="250" x2="640" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">5. Submit</text>
  
  <!-- Validation -->
  <rect x="450" y="210" width="180" height="80" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Validate OTP</text>
  <text x="540" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Constant-time Compare</text>
  <text x="540" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Invalidate After Use</text>
  
  <line x1="450" y1="250" x2="410" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">6. Valid</text>
  
  <!-- Success -->
  <rect x="220" y="210" width="180" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">✓ Verified</text>
  <text x="310" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Phone Marked Verified</text>
  <text x="310" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Account Secured</text>
  
  <line x1="220" y1="250" x2="180" y2="250" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">7. Complete</text>
  
  <!-- User Success -->
  <rect x="50" y="210" width="120" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="240" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Success</text>
  <text x="110" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Account Verified</text>
  <text x="110" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Continue to App</text>
  
  <!-- Fallback Options -->
  <rect x="220" y="320" width="360" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Fallback Options (If SMS Fails)</text>
  
  <rect x="240" y="360" width="100" height="40" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="290" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Voice Call</text>
  
  <rect x="350" y="360" width="100" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="400" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">WhatsApp</text>
  
  <rect x="460" y="360" width="100" height="40" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="510" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Resend SMS</text>
  
  <rect x="240" y="410" width="320" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="400" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Cooldown: 60 seconds between requests</text>

</svg>
