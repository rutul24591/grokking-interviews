<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Account Settings - Security Features</text>
  
  <!-- Password Change -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Password Change</text>
  
  <rect x="70" y="115" width="180" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Current password</text>
  
  <rect x="70" y="155" width="180" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="177" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">New password</text>
  
  <rect x="70" y="195" width="180" height="35" rx="4" fill="#3b82f6"/>
  <text x="160" y="217" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Update Password</text>
  
  <text x="160" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">→ Revoke all sessions</text>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">→ Email notification</text>
  
  <!-- Session Management -->
  <rect x="300" y="70" width="240" height="240" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Active Sessions</text>
  
  <rect x="320" y="115" width="200" height="45" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="135" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">📱 iPhone 14 Pro</text>
  <text x="500" y="135" text-anchor="end" font-family="system-ui" font-size="9" fill="#22c55e">✓ Current</text>
  <text x="340" y="150" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">San Francisco, US • 2 min ago</text>
  
  <rect x="320" y="165" width="200" height="45" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="185" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">💻 MacBook Pro</text>
  <text x="500" y="185" text-anchor="end" font-family="system-ui" font-size="9" fill="#ef4444">Sign Out</text>
  <text x="340" y="200" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">San Francisco, US • 1 hour ago</text>
  
  <rect x="320" y="215" width="200" height="45" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="235" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">🖥️ Windows Desktop</text>
  <text x="500" y="235" text-anchor="end" font-family="system-ui" font-size="9" fill="#ef4444">Sign Out</text>
  <text x="340" y="250" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">New York, US • 3 days ago</text>
  
  <rect x="320" y="275" width="200" height="30" rx="4" fill="#ef4444"/>
  <text x="420" y="295" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Sign Out All Other Devices</text>
  
  <!-- Security Alerts -->
  <rect x="570" y="70" width="190" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Security Alerts</text>
  
  <rect x="590" y="115" width="150" height="50" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="665" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⚠️ New login detected</text>
  <text x="665" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">London, UK • 2 hours ago</text>
  
  <rect x="590" y="175" width="150" height="30" rx="4" fill="#f59e0b"/>
  <text x="665" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Was this you?</text>
  
  <text x="665" y="225" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Email alerts enabled</text>
  <text x="665" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">SMS alerts enabled</text>
  
  <!-- MFA Settings -->
  <rect x="570" y="280" width="190" height="170" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="665" y="305" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">MFA Status</text>
  
  <rect x="590" y="325" width="150" height="35" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="665" y="347" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">✓ Authenticator App</text>
  
  <rect x="590" y="365" width="150" height="35" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="665" y="387" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">✓ SMS Backup</text>
  
  <rect x="590" y="405" width="150" height="35" rx="4" fill="#e2e8f0"/>
  <text x="665" y="427" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">+ Add Security Key</text>
  
  <!-- Audit Log -->
  <rect x="50" y="280" width="490" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="295" y="305" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Recent Security Activity</text>
  
  <rect x="70" y="325" width="450" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="345" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Password changed</text>
  <text x="400" y="345" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">2024-01-15 10:30 AM</text>
  
  <rect x="70" y="360" width="450" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="380" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">MFA enabled</text>
  <text x="400" y="380" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">2024-01-10 3:45 PM</text>
  
  <rect x="70" y="395" width="450" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="415" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">New device recognized (iPhone 14 Pro)</text>
  <text x="400" y="415" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">2024-01-08 9:15 AM</text>
  
  <rect x="70" y="430" width="450" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="450" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Session terminated (Windows Desktop)</text>
  <text x="400" y="450" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">2024-01-05 2:00 PM</text>

</svg>
