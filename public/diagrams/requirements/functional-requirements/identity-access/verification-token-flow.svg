<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Verification Token Flow</text>
  
  <!-- Token Generation -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Token Generation</text>
  
  <rect x="70" y="115" width="180" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">crypto.randomBytes(32)</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">256-bit random token</text>
  
  <rect x="70" y="175" width="180" height="50" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Store bcrypt Hash</text>
  <text x="160" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Not plaintext</text>
  
  <rect x="70" y="235" width="180" height="30" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Metadata: type, user_id, IP</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Token Delivery -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Token Delivery</text>
  
  <rect x="340" y="115" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">📧 Email Verification</text>
  <text x="430" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">24 hour expiry</text>
  
  <rect x="340" y="175" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">📱 SMS Verification</text>
  <text x="430" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">10 minute expiry</text>
  
  <rect x="340" y="235" width="180" height="30" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="430" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Rate limit: 3/hour</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Token Validation -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Token Validation</text>
  
  <rect x="610" y="115" width="120" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="670" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Constant-time</text>
  <text x="670" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Comparison</text>
  
  <rect x="610" y="175" width="120" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Check Expiry</text>
  <text x="670" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Reject if expired</text>
  
  <rect x="610" y="235" width="120" height="30" rx="4" fill="#22c55e"/>
  <text x="670" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Valid Token</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Token Invalidation -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Invalidation</text>
  
  <rect x="610" y="360" width="120" height="35" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="670" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Single Use</text>
  
  <rect x="610" y="400" width="120" height="35" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="670" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Delete/Invalidate</text>
  
  <rect x="610" y="440" width="120" height="35" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="670" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Audit Log</text>
  
  <!-- Token Expiry -->
  <rect x="50" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Token Expiry</text>
  
  <rect x="70" y="360" width="180" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="160" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Email: 24 hours</text>
  
  <rect x="70" y="400" width="180" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="160" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">SMS: 10 minutes</text>
  
  <rect x="70" y="440" width="180" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="160" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#991b1b">Auto-cleanup expired</text>
  
  <!-- Security Features -->
  <rect x="320" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Security Features</text>
  
  <rect x="340" y="360" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Hash stored (not plaintext)</text>
  
  <rect x="340" y="400" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Rate limiting per user</text>
  
  <rect x="340" y="440" width="180" height="35" rx="4" fill="#8b5cf6"/>
  <text x="430" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Audit all attempts</text>

</svg>
