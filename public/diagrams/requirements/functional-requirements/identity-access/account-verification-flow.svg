<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Account Verification Flow</text>
  
  <!-- User Request -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Request Verification</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Request</text>
  
  <!-- Verification Method -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Verification Method</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📧 Email</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📱 Phone (SMS)</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Generate Token</text>
  
  <!-- Token Generation -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Generate Token</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">crypto.randomBytes(32)</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Store Hash + Expiry</text>
  
  <line x1="630" y1="120" x2="670" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Send</text>
  
  <!-- Delivery -->
  <rect x="680" y="60" width="100" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="730" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Deliver</text>
  <text x="730" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Email/SMS</text>
  <text x="730" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Verification Code</text>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">24h/10min Expiry</text>
  
  <line x1="730" y1="180" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="200" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">4. User Enters</text>
  
  <!-- User Input -->
  <rect x="680" y="230" width="100" height="80" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="730" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Enter</text>
  <text x="730" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Code</text>
  <text x="730" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Submit</text>
  
  <line x1="680" y1="270" x2="640" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">5. Validate</text>
  
  <!-- Token Validation -->
  <rect x="450" y="230" width="180" height="80" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Validate Token</text>
  <text x="540" y="275" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Constant-time Compare</text>
  <text x="540" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Check Expiry</text>
  
  <line x1="450" y1="270" x2="410" y2="270" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="260" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">6. Valid</text>
  
  <!-- Mark Verified -->
  <rect x="220" y="230" width="180" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Mark Verified</text>
  <text x="310" y="275" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Set verified_at</text>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Invalidate Token</text>
  
  <line x1="220" y1="270" x2="180" y2="270" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="260" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">7. Grant Access</text>
  
  <!-- Verified -->
  <rect x="50" y="230" width="120" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Verified</text>
  <text x="110" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Full Access</text>
  <text x="110" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Account Active</text>
  
  <!-- Document Verification -->
  <rect x="50" y="340" width="340" height="130" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="220" y="365" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Document Verification (Optional)</text>
  
  <rect x="70" y="380" width="130" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="135" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📄 Upload ID</text>
  
  <rect x="210" y="380" width="130" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="275" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">🔍 OCR Process</text>
  
  <rect x="350" y="380" width="30" height="35" rx="4" fill="#f59e0b"/>
  <text x="365" y="402" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="70" y="425" width="130" height="35" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="135" y="447" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">👁️ Manual Review</text>
  
  <rect x="210" y="425" width="130" height="35" rx="4" fill="#22c55e"/>
  <text x="275" y="447" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Verified</text>
  
  <!-- Rate Limiting -->
  <rect x="420" y="340" width="340" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="365" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Security Measures</text>
  
  <rect x="440" y="380" width="140" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Rate Limit: 3/hour</text>
  
  <rect x="590" y="380" width="160" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Fraud Detection</text>

</svg>
