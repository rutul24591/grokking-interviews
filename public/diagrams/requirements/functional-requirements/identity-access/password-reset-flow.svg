<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Password Reset Flow</text>
  
  <!-- Request -->
  <rect x="50" y="70" width="140" height="100" rx="8" fill="#3b82f6"/>
  <text x="120" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">Reset Request</text>
  <text x="120" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Enter email</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Submit</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Rate limit</text>
  
  <line x1="190" y1="120" x2="230" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Email lookup</text>
  
  <!-- Token Generation -->
  <rect x="240" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2"/>
  <text x="330" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Generate Token</text>
  
  <rect x="260" y="110" width="140" height="30" rx="4" fill="#f8fafc"/>
  <text x="330" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Crypto random</text>
  <text x="330" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">32+ bytes</text>
  
  <rect x="260" y="150" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="330" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Set expiry: 1 hour</text>
  
  <line x1="420" y1="120" x2="460" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Store hash</text>
  
  <!-- Store -->
  <rect x="470" y="70" width="140" height="100" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="540" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Database</text>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Store token hash</text>
  <text x="540" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">NOT plain token</text>
  <text x="540" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">expires_at</text>
  
  <!-- Send Email -->
  <rect x="650" y="70" width="100" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="700" y="100" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Send Email</text>
  <text x="700" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Reset link</text>
  <text x="700" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Token in URL</text>
  <text x="700" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Single use</text>
  
  <line x1="700" y1="170" x2="700" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Reset Form -->
  <rect x="630" y="210" width="140" height="100" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="700" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Reset Form</text>
  <text x="700" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Validate token</text>
  <text x="700" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">New password</text>
  <text x="700" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Confirm password</text>
  
  <line x1="630" y1="260" x2="590" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Update Password -->
  <rect x="470" y="210" width="140" height="100" rx="8" fill="#22c55e"/>
  <text x="540" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#ffffff">Update Password</text>
  <text x="540" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Hash new password</text>
  <text x="540" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Update DB</text>
  <text x="540" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Invalidate token</text>
  
  <line x1="470" y1="260" x2="430" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Invalidate Sessions -->
  <rect x="240" y="210" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#ef4444" stroke-width="2"/>
  <text x="330" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Security Actions</text>
  <text x="330" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Revoke all sessions</text>
  <text x="330" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Invalidate tokens</text>
  <text x="330" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Audit log event</text>
  
  <line x1="240" y1="260" x2="200" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Notify -->
  <rect x="50" y="210" width="140" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="240" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Notify User</text>
  <text x="120" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Confirmation email</text>
  <text x="120" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Security alert</text>
  <text x="120" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">If not you, contact</text>
  
  <!-- Security Best Practices -->
  <rect x="50" y="340" width="700" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Security Best Practices</text>
  
  <rect x="70" y="385" width="150" height="30" rx="4" fill="#f1f5f9"/>
  <text x="145" y="405" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Rate limit requests</text>
  
  <rect x="240" y="385" width="150" height="30" rx="4" fill="#f1f5f9"/>
  <text x="315" y="405" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Single-use tokens</text>
  
  <rect x="410" y="385" width="150" height="30" rx="4" fill="#f1f5f9"/>
  <text x="485" y="405" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Short expiry (1h)</text>
  
  <rect x="580" y="385" width="150" height="30" rx="4" fill="#f1f5f9"/>
  <text x="655" y="405" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Hash tokens in DB</text>
  
  <rect x="70" y="425" width="150" height="30" rx="4" fill="#f1f5f9"/>
  <text x="145" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Generic error messages</text>
  
  <rect x="240" y="425" width="150" height="30" rx="4" fill="#f1f5f9"/>
  <text x="315" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Force re-login</text>
  
  <rect x="410" y="425" width="150" height="30" rx="4" fill="#f1f5f9"/>
  <text x="485" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Audit trail</text>
  
  <rect x="580" y="425" width="150" height="30" rx="4" fill="#f1f5f9"/>
  <text x="655" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Notify on success</text>

</svg>