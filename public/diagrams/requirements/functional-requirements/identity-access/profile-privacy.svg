<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Profile Privacy Controls</text>
  
  <!-- Visibility Levels -->
  <rect x="50" y="70" width="220" height="380" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Visibility Levels</text>
  
  <rect x="70" y="115" width="180" height="60" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">🌍 Public</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Anyone can view</text>
  
  <rect x="70" y="185" width="180" height="60" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="210" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">👥 Connections Only</text>
  <text x="160" y="230" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Friends/followers only</text>
  
  <rect x="70" y="255" width="180" height="60" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="160" y="280" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">🔒 Private</text>
  <text x="160" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Only you can view</text>
  
  <rect x="70" y="325" width="180" height="60" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="160" y="350" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">👤 Custom</text>
  <text x="160" y="370" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Select specific people</text>
  
  <!-- Field-Level Controls -->
  <rect x="300" y="70" width="240" height="380" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Field-Level Privacy</text>
  
  <rect x="320" y="115" width="200" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="135" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Display Name</text>
  <text x="500" y="135" text-anchor="end" font-family="system-ui" font-size="8" fill="#22c55e">🌍 Public</text>
  
  <rect x="320" y="160" width="200" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="180" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Profile Photo</text>
  <text x="500" y="180" text-anchor="end" font-family="system-ui" font-size="8" fill="#22c55e">🌍 Public</text>
  
  <rect x="320" y="205" width="200" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="225" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Bio</text>
  <text x="500" y="225" text-anchor="end" font-family="system-ui" font-size="8" fill="#3b82f6">👥 Connections</text>
  
  <rect x="320" y="250" width="200" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="270" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Email</text>
  <text x="500" y="270" text-anchor="end" font-family="system-ui" font-size="8" fill="#8b5cf6">🔒 Private</text>
  
  <rect x="320" y="295" width="200" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="315" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Phone Number</text>
  <text x="500" y="315" text-anchor="end" font-family="system-ui" font-size="8" fill="#8b5cf6">🔒 Private</text>
  
  <rect x="320" y="340" width="200" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="360" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Location</text>
  <text x="500" y="360" text-anchor="end" font-family="system-ui" font-size="8" fill="#f59e0b">👤 Custom</text>
  
  <rect x="320" y="405" width="200" height="35" rx="4" fill="#3b82f6"/>
  <text x="420" y="427" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Save Privacy Settings</text>
  
  <!-- Data Sharing -->
  <rect x="570" y="70" width="190" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Data Sharing</text>
  
  <rect x="590" y="115" width="150" height="40" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="135" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Show online status</text>
  <text x="730" y="135" text-anchor="end" font-family="system-ui" font-size="10" fill="#22c55e">✓</text>
  
  <rect x="590" y="160" width="150" height="40" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="180" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Allow activity feed</text>
  <text x="730" y="180" text-anchor="end" font-family="system-ui" font-size="10" fill="#22c55e">✓</text>
  
  <rect x="590" y="205" width="150" height="40" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="225" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Show in search</text>
  <text x="730" y="225" text-anchor="end" font-family="system-ui" font-size="10" fill="#ef4444">✗</text>
  
  <rect x="590" y="250" width="150" height="40" rx="4" fill="#f59e0b"/>
  <text x="665" y="272" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Manage Sharing</text>
  
  <!-- GDPR Controls -->
  <rect x="570" y="290" width="190" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="665" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">GDPR Rights</text>
  
  <rect x="590" y="335" width="150" height="35" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="665" y="357" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📥 Download Data</text>
  
  <rect x="590" y="375" width="150" height="35" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="665" y="397" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📝 View Data Map</text>
  
  <rect x="590" y="415" width="150" height="35" rx="4" fill="#ef4444" opacity="0.2"/>
  <text x="665" y="437" text-anchor="middle" font-family="system-ui" font-size="9" fill="#991b1b">🗑️ Delete Account</text>
  
  <text x="665" y="460" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Data retained per policy</text>

</svg>
