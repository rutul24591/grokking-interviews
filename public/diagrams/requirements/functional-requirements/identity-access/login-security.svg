<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Login Security Layers</text>
  
  <!-- Threats -->
  <rect x="50" y="70" width="180" height="140" rx="8" fill="#f1f5f9" stroke="#ef4444" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ef4444">Threats</text>
  <text x="140" y="125" font-family="system-ui" font-size="10" fill="#475569">• Credential Stuffing</text>
  <text x="140" y="145" font-family="system-ui" font-size="10" fill="#475569">• Brute Force</text>
  <text x="140" y="165" font-family="system-ui" font-size="10" fill="#475569">• Phishing</text>
  <text x="140" y="185" font-family="system-ui" font-size="10" fill="#475569">• Keylogging</text>
  <text x="140" y="205" font-family="system-ui" font-size="10" fill="#475569">• Session Hijacking</text>
  
  <!-- Defenses -->
  <rect x="260" y="70" width="280" height="280" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#22c55e">Security Controls</text>
  
  <rect x="280" y="115" width="240" height="45" rx="4" fill="#22c55e" opacity="0.9"/>
  <text x="400" y="135" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Rate Limiting</text>
  <text x="400" y="150" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">5 attempts/hour, exponential backoff</text>
  
  <rect x="280" y="170" width="240" height="45" rx="4" fill="#3b82f6" opacity="0.9"/>
  <text x="400" y="190" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">MFA/2FA</text>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">TOTP, SMS, Email, WebAuthn</text>
  
  <rect x="280" y="225" width="240" height="45" rx="4" fill="#8b5cf6" opacity="0.9"/>
  <text x="400" y="245" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Password Policy</text>
  <text x="400" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Min 12 chars, complexity, breach check</text>
  
  <rect x="280" y="280" width="240" height="45" rx="4" fill="#f59e0b" opacity="0.9"/>
  <text x="400" y="300" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">CAPTCHA</text>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">After 3 failed attempts</text>
  
  <!-- Monitoring -->
  <rect x="570" y="70" width="180" height="140" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="660" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Monitoring</text>
  <text x="660" y="125" font-family="system-ui" font-size="10" fill="#475569">• Login Attempt Logs</text>
  <text x="660" y="145" font-family="system-ui" font-size="10" fill="#475569">• IP Reputation</text>
  <text x="660" y="165" font-family="system-ui" font-size="10" fill="#475569">• Device Fingerprint</text>
  <text x="660" y="185" font-family="system-ui" font-size="10" fill="#475569">• Anomaly Detection</text>
  <text x="660" y="205" font-family="system-ui" font-size="10" fill="#475569">• Alert on Suspicious</text>
  
  <!-- TLS -->
  <rect x="260" y="370" width="280" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Transport Security</text>
  <text x="400" y="415" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">TLS 1.3, HSTS, Secure Cookies (HttpOnly, Secure, SameSite)</text>

</svg>