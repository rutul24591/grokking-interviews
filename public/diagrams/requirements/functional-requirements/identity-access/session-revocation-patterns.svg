<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Session Revocation Patterns</text>
  
  <!-- Denylist Pattern -->
  <rect x="50" y="70" width="220" height="280" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Denylist Pattern</text>
  
  <rect x="70" y="115" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Store Revoked JTI</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Redis with TTL</text>
  
  <rect x="70" y="175" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Check on Validation</text>
  <text x="160" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Reject if in denylist</text>
  
  <rect x="70" y="235" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="260" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">TTL = Token Expiry</text>
  <text x="160" y="280" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Auto cleanup</text>
  
  <rect x="70" y="295" width="180" height="40" rx="4" fill="#22c55e"/>
  <text x="160" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Immediate revocation</text>
  <text x="160" y="330" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">✗ Memory grows</text>
  
  <!-- Version-Based Pattern -->
  <rect x="300" y="70" width="220" height="280" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="410" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Version-Based Pattern</text>
  
  <rect x="320" y="115" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="410" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Include Version in Token</text>
  <text x="410" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">user_version claim</text>
  
  <rect x="320" y="175" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="410" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Increment on Revocation</text>
  <text x="410" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">user_version++</text>
  
  <rect x="320" y="235" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="410" y="260" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Check Version on Request</text>
  <text x="410" y="280" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Reject if token_version &lt; current</text>
  
  <rect x="320" y="295" width="180" height="40" rx="4" fill="#22c55e"/>
  <text x="410" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ No memory growth</text>
  <text x="410" y="330" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">✗ Bulk revocation only</text>
  
  <!-- Broadcast Pattern -->
  <rect x="550" y="70" width="200" height="280" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="650" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Broadcast Pattern</text>
  
  <rect x="570" y="115" width="160" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="650" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Publish Revocation Event</text>
  <text x="650" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Kafka/SQS</text>
  
  <rect x="570" y="175" width="160" height="50" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="650" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Services Subscribe</text>
  <text x="650" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Update local cache</text>
  
  <rect x="570" y="235" width="160" height="50" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="650" y="260" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Accept Propagation Delay</text>
  <text x="650" y="280" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Brief inconsistency</text>
  
  <rect x="570" y="295" width="160" height="40" rx="4" fill="#22c55e"/>
  <text x="650" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Distributed</text>
  <text x="650" y="330" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">✗ Eventual consistency</text>
  
  <!-- Comparison Matrix -->
  <rect x="50" y="370" width="700" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Pattern Comparison</text>
  
  <rect x="70" y="410" width="200" height="60" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="170" y="430" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Denylist</text>
  <text x="170" y="450" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Best for: Selective revocation</text>
  <text x="170" y="465" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">Watch: Memory growth</text>
  
  <rect x="290" y="410" width="200" height="60" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="390" y="430" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Version-Based</text>
  <text x="390" y="450" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Best for: Bulk revocation</text>
  <text x="390" y="465" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">Watch: No selective</text>
  
  <rect x="510" y="410" width="200" height="60" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="610" y="430" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Broadcast</text>
  <text x="610" y="450" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Best for: Distributed systems</text>
  <text x="610" y="465" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">Watch: Propagation delay</text>

</svg>
