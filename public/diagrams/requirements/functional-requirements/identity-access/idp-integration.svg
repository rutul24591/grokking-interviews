<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Identity Provider Integration</text>
  
  <!-- IdP Comparison -->
  <rect x="50" y="70" width="220" height="380" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Enterprise IdPs</text>
  
  <rect x="70" y="115" width="180" height="60" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Okta</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Most integrations</text>
  
  <rect x="70" y="185" width="180" height="60" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="210" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Azure AD</text>
  <text x="160" y="230" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Fortune 500 standard</text>
  
  <rect x="70" y="255" width="180" height="60" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="280" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">OneLogin</text>
  <text x="160" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">SMB focused</text>
  
  <rect x="70" y="325" width="180" height="60" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="350" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Ping Identity</text>
  <text x="160" y="370" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Complex enterprise</text>
  
  <rect x="70" y="395" width="180" height="40" rx="4" fill="#22c55e"/>
  <text x="160" y="417" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Support All Major IdPs</text>
  
  <!-- Protocol Support -->
  <rect x="300" y="70" width="240" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Protocol Support</text>
  
  <rect x="320" y="115" width="200" height="45" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="420" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">SAML 2.0</text>
  <text x="420" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Enterprise standard</text>
  
  <rect x="320" y="170" width="200" height="45" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="420" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">OIDC</text>
  <text x="420" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Modern apps</text>
  
  <rect x="320" y="225" width="200" height="45" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="250" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">SCIM 2.0</text>
  <text x="420" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">User provisioning</text>
  
  <!-- Attribute Mapping -->
  <rect x="570" y="70" width="190" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Attribute Mapping</text>
  
  <rect x="590" y="115" width="150" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="135" text-anchor="start" font-family="system-ui" font-size="8" fill="#0f172a">email → email</text>
  
  <rect x="590" y="155" width="150" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="175" text-anchor="start" font-family="system-ui" font-size="8" fill="#0f172a">givenName → firstName</text>
  
  <rect x="590" y="195" width="150" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="215" text-anchor="start" font-family="system-ui" font-size="8" fill="#0f172a">groups → roles</text>
  
  <rect x="590" y="235" width="150" height="35" rx="4" fill="#f59e0b"/>
  <text x="665" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Configure Mapping</text>
  
  <!-- JIT Provisioning -->
  <rect x="300" y="290" width="240" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="420" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">JIT Provisioning</text>
  
  <rect x="320" y="330" width="200" height="35" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="420" y="352" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">1. User logs in via IdP</text>
  
  <rect x="320" y="370" width="200" height="35" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="420" y="392" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2. Check if user exists</text>
  
  <rect x="320" y="410" width="200" height="35" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="420" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">3. Auto-create if new</text>
  
  <rect x="320" y="450" width="200" height="35" rx="4" fill="#22c55e"/>
  <text x="420" y="472" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">4. Grant access</text>
  
  <!-- Group Sync -->
  <rect x="570" y="290" width="190" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="665" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Group Sync</text>
  
  <rect x="590" y="335" width="150" height="40" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="665" y="355" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">IdP Groups</text>
  <text x="665" y="370" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Admin, User, Viewer</text>
  
  <line x1="665" y1="375" x2="665" y2="395" stroke="#475569" stroke-width="2"/>
  
  <rect x="590" y="400" width="150" height="40" rx="4" fill="#3b82f6" opacity="0.2"/>
  <text x="665" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">App Roles</text>
  <text x="665" y="435" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Mapped automatically</text>

</svg>
