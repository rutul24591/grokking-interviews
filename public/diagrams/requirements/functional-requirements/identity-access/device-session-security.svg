<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Device Session Security</text>
  
  <!-- Device Fingerprinting -->
  <rect x="50" y="70" width="220" height="240" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Device Fingerprinting</text>
  
  <rect x="70" y="115" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="160" y="137" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">User Agent</text>
  
  <rect x="70" y="155" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="160" y="177" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Screen Resolution</text>
  
  <rect x="70" y="195" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="160" y="217" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Timezone & Language</text>
  
  <rect x="70" y="235" width="180" height="35" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="160" y="257" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">WebGL Canvas Hash</text>
  
  <rect x="70" y="275" width="180" height="30" rx="4" fill="#3b82f6"/>
  <text x="160" y="295" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">→ Generate Device Hash</text>
  
  <!-- Anomaly Detection -->
  <rect x="300" y="70" width="240" height="240" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Anomaly Detection</text>
  
  <rect x="320" y="115" width="200" height="45" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="420" y="140" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">🌍 New Location</text>
  <text x="420" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Different country/city</text>
  
  <rect x="320" y="170" width="200" height="45" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="420" y="195" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">📱 New Device</text>
  <text x="420" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Unknown fingerprint</text>
  
  <rect x="320" y="225" width="200" height="45" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="420" y="250" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⏰ Unusual Time</text>
  <text x="420" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Outside normal hours</text>
  
  <rect x="320" y="280" width="200" height="30" rx="4" fill="#ef4444"/>
  <text x="420" y="300" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Trigger MFA Challenge</text>
  
  <!-- Session Revocation -->
  <rect x="570" y="70" width="190" height="240" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Session Revocation</text>
  
  <rect x="590" y="115" width="150" height="40" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="665" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">User-initiated logout</text>
  
  <rect x="590" y="160" width="150" height="40" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="665" y="180" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Password change</text>
  
  <rect x="590" y="205" width="150" height="40" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="665" y="225" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Security incident</text>
  
  <rect x="590" y="250" width="150" height="40" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="665" y="270" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Session timeout</text>
  
  <rect x="590" y="295" width="150" height="30" rx="4" fill="#f59e0b"/>
  <text x="665" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Invalidate Token</text>
  
  <!-- Privacy Controls -->
  <rect x="50" y="330" width="340" height="150" rx="8" fill="#f8fafc" stroke="#22c55e" stroke-width="2"/>
  <text x="220" y="355" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Privacy Controls</text>
  
  <rect x="70" y="370" width="145" height="45" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="142" y="390" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">🔒 Do Not Track</text>
  <text x="142" y="405" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Respected</text>
  
  <rect x="225" y="370" width="145" height="45" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="297" y="390" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">📊 Analytics</text>
  <text x="297" y="405" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Opt-in</text>
  
  <rect x="70" y="425" width="300" height="45" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ No cross-site tracking • Device data encrypted • GDPR compliant</text>
  
  <!-- Compliance -->
  <rect x="420" y="330" width="340" height="150" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="590" y="355" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Compliance</text>
  
  <rect x="440" y="370" width="145" height="45" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="512" y="390" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">GDPR</text>
  <text x="512" y="405" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Compliant</text>
  
  <rect x="595" y="370" width="145" height="45" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="667" y="390" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">CCPA</text>
  <text x="667" y="405" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Compliant</text>
  
  <rect x="440" y="425" width="300" height="45" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="590" y="445" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Data minimization • Purpose limitation • User consent • Right to deletion</text>

</svg>
