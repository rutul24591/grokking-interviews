<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Account Unlock Mechanisms</text>
  
  <!-- Automatic Expiry -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Automatic Expiry</text>
  
  <rect x="70" y="115" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">locked_until Timestamp</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Set on lockout</text>
  
  <rect x="70" y="175" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Check on Login</text>
  <text x="160" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">If now &gt; locked_until: unlock</text>
  
  <rect x="70" y="235" width="180" height="30" rx="4" fill="#22c55e"/>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ No user action needed</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Email Unlock -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Email Unlock</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Request Unlock</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">User clicks "Unlock Account"</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Send Email</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Time-limited unlock link</text>
  
  <rect x="340" y="215" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="430" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Click Link</text>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Account unlocked</text>
  
  <rect x="340" y="265" width="180" height="30" rx="4" fill="#22c55e"/>
  <text x="430" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Self-service</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- MFA Override -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">MFA Override</text>
  
  <rect x="610" y="115" width="120" height="45" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="670" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Verify MFA</text>
  <text x="670" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">TOTP/SMS code</text>
  
  <rect x="610" y="170" width="120" height="45" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="670" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Unlock Account</text>
  <text x="670" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Reset counter</text>
  
  <rect x="610" y="225" width="120" height="40" rx="4" fill="#22c55e"/>
  <text x="670" y="245" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ High-security</text>
  <text x="670" y="260" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">For admin accounts</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Admin Reset -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Admin Reset</text>
  
  <rect x="610" y="360" width="120" height="35" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="670" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Support Ticket</text>
  
  <rect x="610" y="400" width="120" height="35" rx="4" fill="#ef4444" opacity="0.6"/>
  <text x="670" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Verify Identity</text>
  
  <rect x="610" y="440" width="120" height="35" rx="4" fill="#ef4444" opacity="0.4"/>
  <text x="670" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Manual Unlock</text>
  
  <!-- Comparison -->
  <rect x="50" y="320" width="510" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="305" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Unlock Method Comparison</text>
  
  <rect x="70" y="360" width="110" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="125" y="380" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Automatic</text>
  <text x="125" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Easiest</text>
  
  <rect x="190" y="360" width="110" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="380" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Email</text>
  <text x="245" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Self-service</text>
  
  <rect x="310" y="360" width="110" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="365" y="380" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">MFA</text>
  <text x="365" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">High-security</text>
  
  <rect x="430" y="360" width="110" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="485" y="380" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Admin</text>
  <text x="485" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Last resort</text>
  
  <rect x="70" y="410" width="470" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="305" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Best Practice: Offer multiple options (Auto + Email + MFA for high-security)</text>

</svg>
