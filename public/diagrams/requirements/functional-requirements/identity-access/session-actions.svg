<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Session Actions &amp; Operations</text>
  
  <!-- Create -->
  <rect x="50" y="70" width="140" height="100" rx="8" fill="#22c55e"/>
  <text x="120" y="100" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ffffff">Create</text>
  <text x="120" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">On successful login</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Generate session_id</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Set TTL</text>
  
  <line x1="190" y1="120" x2="230" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Validate -->
  <rect x="240" y="70" width="140" height="100" rx="8" fill="#3b82f6"/>
  <text x="310" y="100" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ffffff">Validate</text>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Check signature</text>
  <text x="310" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Check expiry</text>
  <text x="310" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Check revocation</text>
  
  <line x1="380" y1="120" x2="420" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Refresh -->
  <rect x="430" y="70" width="140" height="100" rx="8" fill="#f59e0b"/>
  <text x="500" y="100" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Refresh</text>
  <text x="500" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Extend TTL</text>
  <text x="500" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Update last_seen</text>
  <text x="500" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Rotate token</text>
  
  <line x1="570" y1="120" x2="610" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Revoke -->
  <rect x="620" y="70" width="140" height="100" rx="8" fill="#ef4444"/>
  <text x="690" y="100" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ffffff">Revoke</text>
  <text x="690" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">User logout</text>
  <text x="690" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Security event</text>
  <text x="690" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Admin action</text>
  
  <!-- Bulk Actions -->
  <rect x="50" y="210" width="340" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="240" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Bulk Operations</text>
  
  <rect x="70" y="260" width="300" height="35" rx="4" fill="#f8fafc"/>
  <text x="220" y="282" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Revoke All Sessions (User)</text>
  <text x="350" y="282" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">Password change</text>
  
  <rect x="70" y="300" width="300" height="35" rx="4" fill="#f8fafc"/>
  <text x="220" y="322" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Revoke by Device</text>
  <text x="350" y="322" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">Lost phone</text>
  
  <rect x="70" y="340" width="300" height="35" rx="4" fill="#f8fafc"/>
  <text x="220" y="362" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Revoke by Location</text>
  <text x="350" y="362" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">Suspicious region</text>
  
  <!-- Cleanup -->
  <rect x="420" y="210" width="330" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="585" y="240" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Cleanup Jobs</text>
  
  <rect x="440" y="260" width="290" height="35" rx="4" fill="#f8fafc"/>
  <text x="585" y="282" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Expired Session Cleanup</text>
  <text x="710" y="282" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">Hourly</text>
  
  <rect x="440" y="300" width="290" height="35" rx="4" fill="#f8fafc"/>
  <text x="585" y="322" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Revoked Token Cleanup</text>
  <text x="710" y="322" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">Daily</text>
  
  <rect x="440" y="340" width="290" height="35" rx="4" fill="#f8fafc"/>
  <text x="585" y="362" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Audit Log Archival</text>
  <text x="710" y="362" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">Weekly</text>

</svg>