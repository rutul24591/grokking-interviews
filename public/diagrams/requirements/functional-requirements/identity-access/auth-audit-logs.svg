<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Authentication Audit Log Flow</text>
  
  <!-- Event Sources -->
  <rect x="50" y="70" width="180" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Event Sources</text>
  
  <rect x="70" y="115" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="140" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Login/Logout Events</text>
  
  <rect x="70" y="150" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="140" y="170" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">MFA Events</text>
  
  <rect x="70" y="185" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="140" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Session Events</text>
  
  <rect x="70" y="220" width="140" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="140" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Admin Actions</text>
  
  <line x1="230" y1="160" x2="270" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Logging Service -->
  <rect x="280" y="60" width="200" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="85" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Audit Logging Service</text>
  
  <rect x="300" y="105" width="160" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="380" y="127" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Buffer Events</text>
  
  <rect x="300" y="145" width="160" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="380" y="167" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Enrich Context</text>
  
  <rect x="300" y="185" width="160" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="380" y="207" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Validate Schema</text>
  
  <rect x="300" y="225" width="160" height="35" rx="4" fill="#f59e0b"/>
  <text x="380" y="247" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Write to Storage</text>
  
  <line x1="480" y1="160" x2="520" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Storage Tiers -->
  <rect x="530" y="60" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="85" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Storage Tiers</text>
  
  <rect x="550" y="105" width="180" height="40" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="640" y="125" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Hot (Elasticsearch)</text>
  <text x="640" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">0-3 months, fast search</text>
  
  <rect x="550" y="150" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="640" y="170" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Warm (S3)</text>
  <text x="640" y="185" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">3-12 months, slower</text>
  
  <rect x="550" y="195" width="180" height="40" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="640" y="215" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Cold (Glacier)</text>
  <text x="640" y="230" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">1-7 years, archive</text>
  
  <line x1="640" y1="260" x2="640" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Analysis Layer -->
  <rect x="530" y="310" width="220" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="335" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Analysis Layer</text>
  
  <rect x="550" y="350" width="180" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="370" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">SIEM Integration</text>
  
  <rect x="550" y="385" width="180" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="405" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Threat Detection</text>
  
  <rect x="550" y="420" width="180" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="440" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Compliance Reports</text>
  
  <!-- Search Interface -->
  <rect x="50" y="310" width="450" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="335" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Search &amp; Investigation</text>
  
  <rect x="70" y="350" width="130" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="135" y="370" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Full-Text Search</text>
  <text x="135" y="385" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Elasticsearch</text>
  
  <rect x="210" y="350" width="130" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="275" y="370" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Time Filtering</text>
  <text x="275" y="385" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Date ranges</text>
  
  <rect x="350" y="350" width="130" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="415" y="370" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Aggregations</text>
  <text x="415" y="385" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Metrics &amp; trends</text>
  
  <rect x="70" y="400" width="130" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="135" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Correlation</text>
  <text x="135" y="435" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Trace across services</text>
  
  <rect x="210" y="400" width="130" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="275" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Export</text>
  <text x="275" y="435" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">CSV, PDF for audits</text>
  
  <rect x="350" y="400" width="130" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="415" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Alerts</text>
  <text x="415" y="435" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Real-time notifications</text>

</svg>
