<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Registration Validation Layers</text>
  
  <!-- Client-Side -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Client-Side</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Format Validation</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Email regex, length checks</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Password Strength</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Real-time meter</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Username Availability</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Debounced API call</text>
  
  <rect x="70" y="260" width="180" height="20" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="275" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">⚠️ Never trust client-side only</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Server-Side -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Server-Side</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Format Validation</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Never trust client</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Uniqueness Check</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Email, username</text>
  
  <rect x="340" y="215" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="430" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Profanity Filter</text>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Block inappropriate</text>
  
  <rect x="340" y="260" width="180" height="20" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="275" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✓ Required for security</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Fraud Prevention -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Fraud Prevention</text>
  
  <rect x="610" y="115" width="120" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="670" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">IP Reputation</text>
  <text x="670" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Block known bad IPs</text>
  
  <rect x="610" y="175" width="120" height="50" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Device Fingerprint</text>
  <text x="670" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Detect bot patterns</text>
  
  <rect x="610" y="235" width="120" height="30" rx="4" fill="#ef4444"/>
  <text x="670" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Block High-Risk</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Email Domain Validation -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Email Validation</text>
  
  <rect x="610" y="360" width="120" height="35" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="670" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">MX Record Check</text>
  
  <rect x="610" y="400" width="120" height="35" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="670" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Disposable Email Block</text>
  
  <rect x="610" y="440" width="120" height="35" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="670" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Typo Detection</text>
  
  <!-- Password Requirements -->
  <rect x="50" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Password Requirements</text>
  
  <rect x="70" y="360" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Min 8 characters (NIST)</text>
  
  <rect x="70" y="400" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Breach database check</text>
  
  <rect x="70" y="440" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ No composition rules</text>
  
  <!-- Error Handling -->
  <rect x="290" y="320" width="280" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Error Response Strategy</text>
  
  <rect x="310" y="360" width="240" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Generic: "If valid, we'll send verification"</text>
  
  <rect x="310" y="400" width="240" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prevent email enumeration</text>
  
  <rect x="310" y="440" width="240" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="457" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Specific errors only for format issues</text>

</svg>
