<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Policy Management Lifecycle</text>
  
  <!-- Create -->
  <rect x="50" y="70" width="140" height="100" rx="8" fill="#22c55e"/>
  <text x="120" y="100" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ffffff">1. Create</text>
  <text x="120" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Define policy</text>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Business rules</text>
  <text x="120" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Compliance reqs</text>
  
  <line x1="190" y1="120" x2="230" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Review -->
  <rect x="240" y="70" width="140" height="100" rx="8" fill="#f59e0b"/>
  <text x="310" y="100" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">2. Review</text>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Security team</text>
  <text x="310" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Legal review</text>
  <text x="310" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Impact analysis</text>
  
  <line x1="380" y1="120" x2="420" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Test -->
  <rect x="430" y="70" width="140" height="100" rx="8" fill="#3b82f6"/>
  <text x="500" y="100" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ffffff">3. Test</text>
  <text x="500" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Staging env</text>
  <text x="500" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Test cases</text>
  <text x="500" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Edge cases</text>
  
  <line x1="570" y1="120" x2="610" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Deploy -->
  <rect x="620" y="70" width="140" height="100" rx="8" fill="#8b5cf6"/>
  <text x="690" y="100" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#ffffff">4. Deploy</text>
  <text x="690" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Rollout</text>
  <text x="690" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Version control</text>
  <text x="690" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Audit trail</text>
  
  <!-- Policy Engine -->
  <rect x="50" y="210" width="340" height="240" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="240" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Policy Engine (PDP)</text>
  
  <rect x="70" y="260" width="300" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="280" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Policy Decision Point</text>
  <text x="220" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Evaluates policies against requests</text>
  
  <rect x="70" y="320" width="300" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="340" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Policy Information Point</text>
  <text x="220" y="360" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Fetches attributes (user, resource, context)</text>
  
  <rect x="70" y="380" width="300" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="400" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Policy Administration Point</text>
  <text x="220" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Policy creation, update, deletion</text>
  
  <!-- Policy Storage -->
  <rect x="420" y="210" width="330" height="120" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="585" y="240" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Policy Storage (PRP)</text>
  
  <rect x="440" y="260" width="290" height="30" rx="4" fill="#f8fafc"/>
  <text x="585" y="280" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Policy Repository (Git/DB)</text>
  
  <rect x="440" y="295" width="290" height="30" rx="4" fill="#f8fafc"/>
  <text x="585" y="315" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Version History</text>
  
  <rect x="440" y="330" width="290" height="30" rx="4" fill="#f8fafc"/>
  <text x="585" y="350" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Policy Templates</text>
  
  <!-- Enforcement -->
  <rect x="420" y="350" width="330" height="100" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="585" y="380" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Policy Enforcement (PEP)</text>
  
  <rect x="440" y="400" width="290" height="40" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="585" y="415" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">API Gateway / Middleware</text>
  <text x="585" y="430" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Intercepts requests, enforces decisions</text>

</svg>