<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Password Reset UX Flow</text>
  
  <!-- Request Page -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Request Page</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Enter your email address</text>
  
  <rect x="70" y="165" width="180" height="35" rx="4" fill="#3b82f6"/>
  <text x="160" y="187" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Send Reset Link</text>
  
  <rect x="70" y="210" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="232" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">"If this email exists,</text>
  <text x="160" y="245" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">we'll send a reset link"</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Email Sent -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Email Sent</text>
  
  <rect x="340" y="115" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="140" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">✓ Email sent!</text>
  <text x="430" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Check your inbox</text>
  
  <rect x="340" y="175" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="430" y="197" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Email arrives in 1-2 minutes</text>
  
  <rect x="340" y="225" width="180" height="35" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="247" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Resend in 59s</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Reset Form -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Reset Form</text>
  
  <rect x="610" y="115" width="120" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">New Password</text>
  
  <rect x="610" y="155" width="120" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Confirm Password</text>
  
  <rect x="610" y="195" width="120" height="30" rx="4" fill="#3b82f6"/>
  <text x="670" y="215" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Reset Password</text>
  
  <rect x="610" y="235" width="120" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="255" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Min 8 characters</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Success -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Success</text>
  
  <rect x="610" y="360" width="120" height="35" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="670" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Password Reset</text>
  
  <rect x="610" y="400" width="120" height="35" rx="4" fill="#22c55e"/>
  <text x="670" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Continue to Login</text>
  
  <!-- Error States -->
  <rect x="50" y="320" width="220" height="130" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="160" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Error States</text>
  
  <rect x="70" y="360" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⚠ Expired Token</text>
  
  <rect x="70" y="400" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⚠ Invalid Token</text>
  
  <rect x="70" y="440" width="180" height="35" rx="4" fill="#ef4444"/>
  <text x="160" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Request New Link</text>
  
  <!-- Password Requirements -->
  <rect x="320" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="345" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Password Requirements</text>
  
  <rect x="340" y="360" width="180" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Min 8 characters</text>
  
  <rect x="340" y="395" width="180" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="415" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ 1 uppercase letter</text>
  
  <rect x="340" y="430" width="180" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="450" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ 1 number required</text>

</svg>
