<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Signup Patterns Comparison</text>
  
  <!-- Email/Password -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Email/Password</text>
  
  <rect x="70" y="115" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Traditional Method</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Email + Password fields</text>
  
  <rect x="70" y="175" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Pros</text>
  <text x="160" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Universal, no IdP dependency</text>
  
  <rect x="70" y="235" width="180" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Password fatigue, credential stuffing</text>
  
  <!-- Social Signup -->
  <rect x="300" y="70" width="240" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Social Signup</text>
  
  <rect x="320" y="115" width="200" height="50" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="420" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">One-Click Signup</text>
  <text x="420" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Google, Apple, Facebook</text>
  
  <rect x="320" y="175" width="200" height="50" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="420" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Pros</text>
  <text x="420" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Frictionless, no password</text>
  
  <rect x="320" y="235" width="200" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="420" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ IdP dependency, privacy concerns</text>
  
  <!-- SSO -->
  <rect x="570" y="70" width="190" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Enterprise SSO</text>
  
  <rect x="590" y="115" width="150" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="665" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">SAML/OIDC</text>
  <text x="665" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Okta, Azure AD</text>
  
  <rect x="590" y="175" width="150" height="50" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="665" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Pros</text>
  <text x="665" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Centralized, compliance</text>
  
  <rect x="590" y="235" width="150" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="665" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Complex setup, enterprise only</text>
  
  <!-- Passwordless -->
  <rect x="50" y="300" width="220" height="170" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Passwordless</text>
  
  <rect x="70" y="345" width="180" height="45" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="160" y="370" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Magic Link / WebAuthn</text>
  <text x="160" y="385" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">No password to steal</text>
  
  <rect x="70" y="400" width="180" height="45" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="160" y="425" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Pros</text>
  <text x="160" y="440" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Most secure, best UX</text>
  
  <rect x="70" y="455" width="180" height="25" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="472" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">✗ Requires email/phone access</text>
  
  <!-- Comparison Table -->
  <rect x="300" y="300" width="460" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="530" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Pattern Comparison</text>
  
  <rect x="320" y="340" width="420" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="357" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Method</text>
  <text x="450" y="357" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Security</text>
  <text x="540" y="357" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">UX</text>
  <text x="630" y="357" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Adoption</text>
  
  <rect x="320" y="365" width="420" height="25" rx="4" fill="#f1f5f9"/>
  <text x="340" y="382" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Email/Password</text>
  <text x="450" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">Medium</text>
  <text x="540" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">Medium</text>
  <text x="630" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">High</text>
  
  <rect x="320" y="390" width="420" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="407" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Social</text>
  <text x="450" y="407" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">High</text>
  <text x="540" y="407" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">High</text>
  <text x="630" y="407" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">High</text>
  
  <rect x="320" y="415" width="420" height="25" rx="4" fill="#f1f5f9"/>
  <text x="340" y="432" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">SSO</text>
  <text x="450" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">High</text>
  <text x="540" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">Medium</text>
  <text x="630" y="432" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">Enterprise</text>
  
  <rect x="320" y="440" width="420" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="457" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Passwordless</text>
  <text x="450" y="457" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">Highest</text>
  <text x="540" y="457" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">Best</text>
  <text x="630" y="457" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">Growing</text>

</svg>
