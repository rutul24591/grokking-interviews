<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Device Session Tracking</text>
  
  <!-- Device Registration -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Device Registration</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">📱 First Login</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Collect device info</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">🔐 Generate Fingerprint</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Hash device signals</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">💾 Store Session</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Link to user account</text>
  
  <rect x="70" y="265" width="180" height="30" rx="4" fill="#22c55e"/>
  <text x="160" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Device Trusted</text>
  
  <!-- Session Metadata -->
  <rect x="300" y="70" width="240" height="280" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="420" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Session Metadata</text>
  
  <rect x="320" y="115" width="200" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="135" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Device Type</text>
  <text x="500" y="135" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">Mobile</text>
  
  <rect x="320" y="155" width="200" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="175" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">OS & Browser</text>
  <text x="500" y="175" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">iOS 17 / Safari</text>
  
  <rect x="320" y="195" width="200" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="215" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">IP Address</text>
  <text x="500" y="215" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">192.168.x.x</text>
  
  <rect x="320" y="235" width="200" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="255" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Location</text>
  <text x="500" y="255" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">San Francisco, US</text>
  
  <rect x="320" y="275" width="200" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="295" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Last Active</text>
  <text x="500" y="295" text-anchor="end" font-family="system-ui" font-size="9" fill="#475569">2 minutes ago</text>
  
  <rect x="320" y="315" width="200" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="335" text-anchor="start" font-family="system-ui" font-size="9" fill="#0f172a">Session Status</text>
  <text x="500" y="335" text-anchor="end" font-family="system-ui" font-size="9" fill="#22c55e">Active</text>
  
  <!-- Activity Tracking -->
  <rect x="570" y="70" width="190" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Activity Log</text>
  
  <rect x="590" y="115" width="150" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="135" text-anchor="start" font-family="system-ui" font-size="8" fill="#0f172a">✓ Login successful</text>
  <text x="730" y="135" text-anchor="end" font-family="system-ui" font-size="7" fill="#475569">10:30 AM</text>
  
  <rect x="590" y="155" width="150" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="175" text-anchor="start" font-family="system-ui" font-size="8" fill="#0f172a">✓ Viewed profile</text>
  <text x="730" y="175" text-anchor="end" font-family="system-ui" font-size="7" fill="#475569">10:32 AM</text>
  
  <rect x="590" y="195" width="150" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="215" text-anchor="start" font-family="system-ui" font-size="8" fill="#0f172a">✓ Updated settings</text>
  <text x="730" y="215" text-anchor="end" font-family="system-ui" font-size="7" fill="#475569">10:35 AM</text>
  
  <rect x="590" y="235" width="150" height="35" rx="4" fill="#f59e0b"/>
  <text x="665" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">View Full History</text>
  
  <!-- Trust Levels -->
  <rect x="570" y="290" width="190" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="665" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Trust Levels</text>
  
  <rect x="590" y="335" width="150" height="40" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="665" y="355" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">✓ Trusted Device</text>
  <text x="665" y="370" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Skip MFA</text>
  
  <rect x="590" y="385" width="150" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="665" y="405" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">⚠️ Unknown Device</text>
  <text x="665" y="420" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Require MFA</text>
  
  <rect x="590" y="435" width="150" height="30" rx="4" fill="#ef4444" opacity="0.4"/>
  <text x="665" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#991b1b">🚫 Blocked Device</text>

</svg>
