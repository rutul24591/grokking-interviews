<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Token Generation Flow</text>
  
  <!-- User Authentication -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Authenticate</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Login</text>
  
  <!-- Auth Service -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Auth Service</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Validate Credentials</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Auth Success</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Generate Tokens</text>
  
  <!-- Token Generation -->
  <rect x="450" y="60" width="180" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Token Generation</text>
  
  <rect x="470" y="105" width="140" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">JWT Access Token</text>
  <text x="540" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">RS256 signed, 15-60min</text>
  
  <rect x="470" y="155" width="140" height="40" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="175" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Refresh Token</text>
  <text x="540" y="190" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Opaque, 7-30 days</text>
  
  <line x1="630" y1="150" x2="670" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Store</text>
  
  <!-- Token Storage -->
  <rect x="680" y="80" width="100" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="730" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Store</text>
  <text x="730" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Refresh Token</text>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Hash in DB</text>
  <text x="730" y="180" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Session Created</text>
  
  <line x1="730" y1="200" x2="730" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="220" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">4. Return</text>
  
  <!-- Response -->
  <rect x="680" y="250" width="100" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="280" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Response</text>
  <text x="730" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Access Token</text>
  <text x="730" y="320" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Set-Cookie</text>
  <text x="730" y="335" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">(Refresh)</text>
  
  <line x1="680" y1="300" x2="640" y2="300" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="290" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">5. Client Stores</text>
  
  <!-- Client Storage -->
  <rect x="450" y="260" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="540" y="290" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Client Storage</text>
  <text x="540" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Access: Memory</text>
  <text x="540" y="335" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Refresh: HttpOnly Cookie</text>
  
  <line x1="450" y1="310" x2="410" y2="310" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">6. Authenticated</text>
  
  <!-- Authenticated -->
  <rect x="220" y="260" width="180" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="290" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Authenticated</text>
  <text x="310" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Access Token in Header</text>
  <text x="310" y="335" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">API Requests Authorized</text>
  
  <line x1="220" y1="310" x2="180" y2="310" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">7. Session Active</text>
  
  <!-- User Session -->
  <rect x="50" y="260" width="120" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="290" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Session</text>
  <text x="110" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Active</text>
  <text x="110" y="335" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Authorized</text>
  
  <!-- Token Refresh Flow -->
  <rect x="50" y="390" width="340" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="220" y="415" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Token Refresh (When Access Token Expires)</text>
  
  <rect x="70" y="430" width="130" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="135" y="450" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Send Refresh Token</text>
  
  <rect x="210" y="430" width="80" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="250" y="450" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Rotate</text>
  
  <rect x="300" y="430" width="80" height="30" rx="4" fill="#22c55e"/>
  <text x="340" y="450" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">New Tokens</text>
  
  <!-- Key Points -->
  <rect x="420" y="390" width="340" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="415" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Key Security Points</text>
  
  <rect x="440" y="430" width="140" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="450" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">RS256 Signing</text>
  
  <rect x="590" y="430" width="160" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="450" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Refresh Token Rotation</text>

</svg>
