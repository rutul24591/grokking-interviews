<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Session Revocation Flow</text>
  
  <!-- User-Initiated -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">User-Initiated</text>
  
  <rect x="70" y="115" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Logout Single Device</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Revoke current session</text>
  
  <rect x="70" y="170" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Logout All Devices</text>
  <text x="160" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Revoke all sessions</text>
  
  <rect x="70" y="225" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Selective Logout</text>
  <text x="160" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Revoke specific device</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Admin-Initiated -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Admin-Initiated</text>
  
  <rect x="340" y="115" width="180" height="45" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="430" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Security Incident</text>
  <text x="430" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Compromised account</text>
  
  <rect x="340" y="170" width="180" height="45" rx="4" fill="#ef4444" opacity="0.6"/>
  <text x="430" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">HR Termination</text>
  <text x="430" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Employee offboarding</text>
  
  <rect x="340" y="225" width="180" height="45" rx="4" fill="#ef4444" opacity="0.4"/>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Role Change</text>
  <text x="430" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Access level change</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Automatic -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Automatic</text>
  
  <rect x="610" y="115" width="120" height="40" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Password Change</text>
  <text x="670" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Auto revoke all</text>
  
  <rect x="610" y="165" width="120" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="670" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Session Timeout</text>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Idle expiry</text>
  
  <rect x="610" y="215" width="120" height="40" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="670" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Token Expiry</text>
  <text x="670" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Natural expiration</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Revocation Actions -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Revocation Actions</text>
  
  <rect x="610" y="360" width="120" height="30" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="670" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Invalidate Token</text>
  
  <rect x="610" y="395" width="120" height="30" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="670" y="415" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Delete Session</text>
  
  <rect x="610" y="430" width="120" height="30" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="670" y="450" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Notify User</text>
  
  <!-- Revocation Process -->
  <rect x="50" y="320" width="510" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="305" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Revocation Process</text>
  
  <rect x="70" y="360" width="95" height="40" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="117" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">1. Identify</text>
  <text x="117" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Target sessions</text>
  
  <rect x="175" y="360" width="95" height="40" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="222" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2. Invalidate</text>
  <text x="222" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Add to denylist</text>
  
  <rect x="280" y="360" width="95" height="40" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="327" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">3. Propagate</text>
  <text x="327" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Event stream</text>
  
  <rect x="385" y="360" width="95" height="40" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="432" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">4. Notify</text>
  <text x="432" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Email user</text>
  
  <rect x="490" y="360" width="60" height="40" rx="4" fill="#8b5cf6"/>
  <text x="520" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">5. Audit</text>
  <text x="520" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Log</text>

</svg>
