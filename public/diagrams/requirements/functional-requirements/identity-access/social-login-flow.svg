<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Social Login Flow</text>
  
  <!-- User -->
  <rect x="50" y="80" width="100" height="60" rx="8" fill="#3b82f6"/>
  <text x="100" y="110" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User</text>
  
  <line x1="150" y1="110" x2="190" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="170" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Click</text>
  
  <!-- Social Button -->
  <rect x="200" y="80" width="140" height="60" rx="8" fill="#4285f4"/>
  <text x="270" y="110" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Google</text>
  <text x="270" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Sign In</text>
  
  <line x1="340" y1="110" x2="380" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. OAuth</text>
  
  <!-- Provider -->
  <rect x="390" y="60" width="180" height="100" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="480" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">OAuth Provider</text>
  <text x="480" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">User Authenticates</text>
  <text x="480" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Consents to Scopes</text>
  
  <line x1="570" y1="110" x2="610" y2="110" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Callback</text>
  
  <!-- Callback -->
  <rect x="620" y="80" width="130" height="60" rx="8" fill="#f59e0b"/>
  <text x="685" y="110" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Callback</text>
  <text x="685" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Auth Code</text>
  
  <line x1="685" y1="140" x2="685" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="705" y="160" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">4. Token Exchange</text>
  
  <!-- Token Exchange -->
  <rect x="620" y="190" width="130" height="60" rx="8" fill="#8b5cf6"/>
  <text x="685" y="220" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Token</text>
  <text x="685" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Access + ID Token</text>
  
  <line x1="620" y1="220" x2="580" y2="220" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">5. Tokens</text>
  
  <!-- Validate -->
  <rect x="390" y="190" width="180" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="480" y="220" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Validate Token</text>
  <text x="480" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Extract User Info</text>
  
  <line x1="390" y1="220" x2="350" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="370" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">6. Check Email</text>
  
  <!-- Account Check -->
  <rect x="200" y="190" width="140" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="270" y="220" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Account Check</text>
  <text x="270" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Link or Create</text>
  
  <line x1="200" y1="220" x2="160" y2="220" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="180" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">7. Session</text>
  
  <!-- Session Created -->
  <rect x="50" y="190" width="100" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="100" y="220" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Session</text>
  <text x="100" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">User Logged In</text>
  
  <!-- Account Linking Options -->
  <rect x="200" y="280" width="400" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Account Linking Options</text>
  
  <rect x="220" y="320" width="170" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="305" y="345" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Email Match</text>
  <text x="305" y="360" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Link to existing</text>
  
  <rect x="410" y="320" width="170" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="495" y="345" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">No Match</text>
  <text x="495" y="360" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Create new account</text>
  
  <rect x="220" y="380" width="170" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="305" y="405" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Multiple Matches</text>
  <text x="305" y="420" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Show account selector</text>
  
  <rect x="410" y="380" width="170" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="495" y="405" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Verification</text>
  <text x="495" y="420" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Password/MFA required</text>

</svg>
