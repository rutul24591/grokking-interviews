<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Credential Rotation Security</text>
  
  <!-- Session Revocation -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Session Revocation</text>
  
  <rect x="70" y="115" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Increment Version</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">session_version++</text>
  
  <rect x="70" y="170" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Invalidate Old</text>
  <text x="160" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">All sessions revoked</text>
  
  <rect x="70" y="225" width="180" height="45" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Force Re-auth</text>
  <text x="160" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">New credentials required</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Grace Period -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Grace Period</text>
  
  <rect x="340" y="115" width="180" height="45" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Key Overlap</text>
  <text x="430" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">7-30 days</text>
  
  <rect x="340" y="170" width="180" height="45" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="430" y="195" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Old Key: Validate Only</text>
  <text x="430" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">No new signing</text>
  
  <rect x="340" y="225" width="180" height="45" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">New Key: Sign + Validate</text>
  <text x="430" y="265" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Active key</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- User Notification -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">User Notification</text>
  
  <rect x="610" y="115" width="120" height="40" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Email Alert</text>
  <text x="670" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Timestamp + device</text>
  
  <rect x="610" y="165" width="120" height="40" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="670" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">In-App Notice</text>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Security settings</text>
  
  <rect x="610" y="215" width="120" height="40" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="670" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Expiry Warnings</text>
  <text x="670" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">14d, 7d, 1d</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Audit Logging -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Audit Logging</text>
  
  <rect x="610" y="360" width="120" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Who Changed</text>
  
  <rect x="610" y="395" width="120" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="415" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">When + Where</text>
  
  <rect x="610" y="430" width="120" height="30" rx="4" fill="#8b5cf6"/>
  <text x="670" y="450" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Immutable Log</text>
  
  <!-- Password History -->
  <rect x="50" y="320" width="220" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Password History</text>
  
  <rect x="70" y="360" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Store Last 5 Hashes</text>
  
  <rect x="70" y="400" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prevent Reuse</text>
  
  <rect x="70" y="440" width="180" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="160" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#991b1b">Reject if Matches</text>
  
  <!-- Breach Detection -->
  <rect x="320" y="320" width="220" height="130" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="430" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Breach Detection</text>
  
  <rect x="340" y="360" width="180" height="35" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="382" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Check vs Breach DB</text>
  
  <rect x="340" y="400" width="180" height="35" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="422" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">k-Anonymity Model</text>
  
  <rect x="340" y="440" width="180" height="35" rx="4" fill="#ef4444"/>
  <text x="430" y="462" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Force Change if Breached</text>

</svg>
