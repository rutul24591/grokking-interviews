<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">RBAC Database Schema</text>
  
  <!-- Users Table -->
  <rect x="50" y="70" width="180" height="140" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">users</text>
  
  <rect x="70" y="110" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="127" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">id (PK)</text>
  
  <rect x="70" y="135" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="152" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">email</text>
  
  <rect x="70" y="160" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="177" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">password_hash</text>
  
  <rect x="70" y="185" width="140" height="25" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="85" y="202" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">permission_version</text>
  
  <line x1="230" y1="140" x2="270" y2="180" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Roles Table -->
  <rect x="280" y="70" width="180" height="140" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="370" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">roles</text>
  
  <rect x="300" y="110" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="127" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">id (PK)</text>
  
  <rect x="300" y="135" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="152" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">name (unique)</text>
  
  <rect x="300" y="160" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="177" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">description</text>
  
  <rect x="300" y="185" width="140" height="25" rx="4" fill="#8b5cf6" opacity="0.3"/>
  <text x="315" y="202" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">parent_role_id (FK)</text>
  
  <line x1="460" y1="140" x2="500" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Permissions Table -->
  <rect x="510" y="70" width="180" height="140" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">permissions</text>
  
  <rect x="530" y="110" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="545" y="127" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">id (PK)</text>
  
  <rect x="530" y="135" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="545" y="152" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">name (unique)</text>
  
  <rect x="530" y="160" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="545" y="177" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">resource</text>
  
  <rect x="530" y="185" width="140" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="545" y="202" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">action</text>
  
  <!-- user_roles Junction -->
  <rect x="50" y="250" width="200" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="150" y="275" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">user_roles</text>
  
  <rect x="70" y="290" width="160" height="25" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="85" y="307" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">user_id (FK → users)</text>
  
  <rect x="70" y="315" width="160" height="25" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="85" y="332" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">role_id (FK → roles)</text>
  
  <rect x="70" y="340" width="160" height="25" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="85" y="357" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">assigned_at</text>
  
  <line x1="140" y1="210" x2="140" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="210" x2="260" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- role_permissions Junction -->
  <rect x="490" y="250" width="220" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="275" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">role_permissions</text>
  
  <rect x="510" y="290" width="180" height="25" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="525" y="307" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">role_id (FK → roles)</text>
  
  <rect x="510" y="315" width="180" height="25" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="525" y="332" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">permission_id (FK)</text>
  
  <rect x="510" y="340" width="180" height="25" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="525" y="357" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">granted_at</text>
  
  <line x1="370" y1="140" x2="480" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="210" x2="600" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Indexes Note -->
  <rect x="50" y="400" width="700" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="425" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Indexes &amp; Constraints</text>
  
  <rect x="70" y="440" width="160" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="150" y="457" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">PK on all id fields</text>
  
  <rect x="250" y="440" width="160" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="330" y="457" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">FK on all _id fields</text>
  
  <rect x="430" y="440" width="160" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="457" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Unique on name fields</text>
  
  <rect x="610" y="440" width="120" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="457" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Composite indexes</text>

</svg>
