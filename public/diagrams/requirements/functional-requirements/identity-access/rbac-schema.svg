<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">RBAC Database Schema</text>
  
  <!-- Users Table -->
  <rect x="50" y="70" width="180" height="140" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">users</text>
  
  <rect x="70" y="110" width="140" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="127" font-family="monospace" font-size="9" fill="#3b82f6">id</text>
  <text x="150" y="127" font-family="system-ui" font-size="8" fill="#475569">UUID PK</text>
  
  <rect x="70" y="138" width="140" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="155" font-family="monospace" font-size="9" fill="#0f172a">email</text>
  <text x="150" y="155" font-family="system-ui" font-size="8" fill="#475569">unique</text>
  
  <rect x="70" y="166" width="140" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="183" font-family="monospace" font-size="9" fill="#0f172a">password_hash</text>
  
  <rect x="70" y="194" width="140" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="211" font-family="monospace" font-size="9" fill="#0f172a">created_at</text>
  
  <!-- User Roles Junction -->
  <rect x="280" y="100" width="160" height="110" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2"/>
  <text x="360" y="125" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">user_roles</text>
  
  <rect x="300" y="140" width="120" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="157" font-family="monospace" font-size="9" fill="#3b82f6">user_id</text>
  <text x="380" y="157" font-family="system-ui" font-size="8" fill="#475569">FK</text>
  
  <rect x="300" y="168" width="120" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="185" font-family="monospace" font-size="9" fill="#8b5cf6">role_id</text>
  <text x="380" y="185" font-family="system-ui" font-size="8" fill="#475569">FK</text>
  
  <rect x="300" y="196" width="120" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="213" font-family="monospace" font-size="9" fill="#0f172a">assigned_at</text>
  
  <!-- Roles Table -->
  <rect x="50" y="250" width="180" height="140" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="140" y="275" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">roles</text>
  
  <rect x="70" y="290" width="140" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="307" font-family="monospace" font-size="9" fill="#8b5cf6">id</text>
  <text x="150" y="307" font-family="system-ui" font-size="8" fill="#475569">UUID PK</text>
  
  <rect x="70" y="318" width="140" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="335" font-family="monospace" font-size="9" fill="#0f172a">name</text>
  <text x="150" y="335" font-family="system-ui" font-size="8" fill="#475569">admin, editor</text>
  
  <rect x="70" y="346" width="140" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="363" font-family="monospace" font-size="9" fill="#0f172a">description</text>
  
  <rect x="70" y="374" width="140" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="391" font-family="monospace" font-size="9" fill="#0f172a">parent_role_id</text>
  <text x="150" y="391" font-family="system-ui" font-size="8" fill="#475569">self-ref FK</text>
  
  <!-- Role Permissions Junction -->
  <rect x="280" y="280" width="160" height="110" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="360" y="305" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">role_permissions</text>
  
  <rect x="300" y="320" width="120" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="337" font-family="monospace" font-size="9" fill="#8b5cf6">role_id</text>
  <text x="380" y="337" font-family="system-ui" font-size="8" fill="#475569">FK</text>
  
  <rect x="300" y="348" width="120" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="365" font-family="monospace" font-size="9" fill="#22c55e">permission_id</text>
  <text x="380" y="365" font-family="system-ui" font-size="8" fill="#475569">FK</text>
  
  <rect x="300" y="376" width="120" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="393" font-family="monospace" font-size="9" fill="#0f172a">granted_at</text>
  
  <!-- Permissions Table -->
  <rect x="500" y="170" width="250" height="220" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="625" y="195" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">permissions</text>
  
  <rect x="520" y="210" width="210" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="535" y="227" font-family="monospace" font-size="9" fill="#22c55e">id</text>
  <text x="600" y="227" font-family="system-ui" font-size="8" fill="#475569">UUID PK</text>
  
  <rect x="520" y="238" width="210" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="535" y="255" font-family="monospace" font-size="9" fill="#0f172a">resource</text>
  <text x="650" y="255" font-family="system-ui" font-size="8" fill="#475569">user, content</text>
  
  <rect x="520" y="266" width="210" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="535" y="283" font-family="monospace" font-size="9" fill="#0f172a">action</text>
  <text x="650" y="283" font-family="system-ui" font-size="8" fill="#475569">create, read</text>
  
  <rect x="520" y="294" width="210" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="535" y="311" font-family="monospace" font-size="9" fill="#0f172a">scope</text>
  <text x="650" y="311" font-family="system-ui" font-size="8" fill="#475569">own, all</text>
  
  <rect x="520" y="322" width="210" height="25" rx="3" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="535" y="339" font-family="monospace" font-size="9" fill="#0f172a">name</text>
  <text x="650" y="339" font-family="system-ui" font-size="8" fill="#475569">user:create</text>
  
  <!-- Relationships -->
  <line x1="230" y1="160" x2="270" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">N</text>
  
  <line x1="360" y1="210" x2="360" y2="240" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="370" y="225" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">N</text>
  
  <line x1="440" y1="160" x2="490" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">N</text>
  
  <line x1="230" y1="320" x2="270" y2="320" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="310" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">N</text>
  
  <!-- Sample Data -->
  <rect x="500" y="410" width="250" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="625" y="435" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Sample Permission Names</text>
  <text x="520" y="455" font-family="monospace" font-size="9" fill="#475569">user:create, user:read, user:update, user:delete</text>
  <text x="520" y="470" font-family="monospace" font-size="9" fill="#475569">content:create, content:publish, content:delete</text>
  <text x="520" y="485" font-family="monospace" font-size="9" fill="#475569">settings:read, settings:write, admin:access</text>

</svg>