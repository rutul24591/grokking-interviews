<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Login Interface Flow</text>
  
  <!-- User -->
  <circle cx="80" cy="250" r="35" fill="#3b82f6"/>
  <text x="80" y="255" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">User</text>
  
  <!-- Login Form -->
  <rect x="180" y="120" width="160" height="260" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="260" y="150" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Login Form</text>
  <rect x="200" y="170" width="120" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="192" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Email/Username</text>
  <rect x="200" y="215" width="120" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="237" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Password</text>
  <rect x="200" y="260" width="120" height="40" rx="4" fill="#3b82f6"/>
  <text x="260" y="285" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">Sign In</text>
  <text x="260" y="320" text-anchor="middle" font-family="system-ui" font-size="9" fill="#3b82f6">Forgot Password?</text>
  <text x="260" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Social Login</text>
  <rect x="210" y="355" width="40" height="20" rx="3" fill="#8b5cf6"/>
  <rect x="260" y="355" width="40" height="20" rx="3" fill="#3b82f6"/>
  
  <!-- Auth Service -->
  <rect x="420" y="150" width="180" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="510" y="180" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Auth Service</text>
  <rect x="440" y="200" width="140" height="35" rx="4" fill="#f8fafc"/>
  <text x="510" y="222" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Validate Credentials</text>
  <rect x="440" y="245" width="140" height="35" rx="4" fill="#f8fafc"/>
  <text x="510" y="267" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">MFA Challenge</text>
  <rect x="440" y="290" width="140" height="35" rx="4" fill="#22c55e"/>
  <text x="510" y="312" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Generate JWT</text>
  
  <!-- Database -->
  <rect x="660" y="200" width="100" height="100" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="710" y="240" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">User DB</text>
  <text x="710" y="265" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">bcrypt hash</text>
  <text x="710" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">salt</text>
  
  <!-- Arrows -->
  <line x1="115" y1="250" x2="170" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="142" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Submit</text>
  
  <line x1="340" y1="250" x2="410" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="375" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Validate</text>
  
  <line x1="600" y1="250" x2="650" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="625" y="240" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Query</text>
  
  <line x1="650" y1="280" x2="600" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="625" y="295" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">4. Return hash</text>
  
  <line x1="510" y1="350" x2="260" y2="350" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="385" y="370" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">5. JWT Token</text>

</svg>