<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">RBAC Model</text>
  
  <!-- Users -->
  <rect x="50" y="80" width="150" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="125" y="105" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Users</text>
  
  <circle cx="90" cy="145" r="25" fill="#3b82f6"/>
  <text x="90" y="150" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Alice</text>
  
  <circle cx="160" cy="145" r="25" fill="#3b82f6"/>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Bob</text>
  
  <circle cx="90" cy="195" r="25" fill="#3b82f6"/>
  <text x="90" y="200" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Carol</text>
  
  <circle cx="160" cy="195" r="25" fill="#3b82f6"/>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Dave</text>
  
  <line x1="200" y1="170" x2="240" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">assigned to</text>
  
  <!-- Roles -->
  <rect x="250" y="70" width="200" height="200" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="350" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Roles</text>
  
  <rect x="270" y="110" width="160" height="35" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="350" y="132" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">Admin</text>
  
  <rect x="270" y="150" width="160" height="35" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="350" y="172" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">Moderator</text>
  
  <rect x="270" y="190" width="160" height="35" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="350" y="212" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">User</text>
  
  <line x1="450" y1="170" x2="490" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">grants</text>
  
  <!-- Permissions -->
  <rect x="500" y="80" width="250" height="180" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="625" y="105" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Permissions</text>
  
  <rect x="520" y="120" width="100" height="30" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="570" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">user:create</text>
  
  <rect x="630" y="120" width="100" height="30" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="680" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">user:delete</text>
  
  <rect x="520" y="155" width="100" height="30" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="570" y="175" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">content:edit</text>
  
  <rect x="630" y="155" width="100" height="30" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="680" y="175" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">content:publish</text>
  
  <rect x="520" y="190" width="100" height="30" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="570" y="210" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">content:view</text>
  
  <rect x="630" y="190" width="100" height="30" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="680" y="210" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">profile:read</text>
  
  <!-- Role Hierarchy -->
  <rect x="250" y="300" width="500" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Role Hierarchy (Inheritance)</text>
  
  <rect x="300" y="345" width="160" height="35" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="380" y="367" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">Super Admin</text>
  
  <line x1="380" y1="380" x2="320" y2="400" stroke="#475569" stroke-width="2"/>
  <line x1="380" y1="380" x2="380" y2="400" stroke="#475569" stroke-width="2"/>
  <line x1="380" y1="380" x2="440" y2="400" stroke="#475569" stroke-width="2"/>
  
  <rect x="260" y="405" width="120" height="35" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="320" y="427" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Admin</text>
  
  <rect x="340" y="405" width="120" height="35" rx="4" fill="#8b5cf6" opacity="0.5"/>
  <text x="400" y="427" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Moderator</text>
  
  <rect x="420" y="405" width="120" height="35" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="480" y="427" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">User</text>
  
  <line x1="320" y1="440" x2="280" y2="460" stroke="#475569" stroke-width="2"/>
  <line x1="320" y1="440" x2="360" y2="460" stroke="#475569" stroke-width="2"/>
  
  <rect x="240" y="465" width="80" height="30" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="280" y="485" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Viewer</text>
  
  <rect x="320" y="465" width="80" height="30" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="360" y="485" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Member</text>
  
  <text x="650" y="370" text-anchor="start" font-family="system-ui" font-size="10" fill="#475569">Child inherits</text>
  <text x="650" y="390" text-anchor="start" font-family="system-ui" font-size="10" fill="#475569">parent permissions</text>
  <text x="650" y="410" text-anchor="start" font-family="system-ui" font-size="10" fill="#475569">Admin has all</text>
  <text x="650" y="430" text-anchor="start" font-family="system-ui" font-size="10" fill="#475569">Moderator + User</text>

</svg>
