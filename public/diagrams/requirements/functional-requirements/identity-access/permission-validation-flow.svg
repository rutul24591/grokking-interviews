<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Permission Validation Flow</text>
  
  <!-- Request -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">API Request</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">user, resource, action</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Request</text>
  
  <!-- Permission Check -->
  <rect x="220" y="60" width="200" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="85" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Permission Check</text>
  
  <rect x="240" y="100" width="160" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Extract User Context</text>
  
  <rect x="240" y="135" width="160" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Check Permissions</text>
  
  <line x1="420" y1="120" x2="460" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Evaluate</text>
  
  <!-- Policy Engine -->
  <rect x="470" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="560" y="85" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Policy Engine</text>
  
  <rect x="490" y="100" width="140" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="560" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Load Permissions</text>
  
  <rect x="490" y="135" width="140" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="560" y="155" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Evaluate Policy</text>
  
  <line x1="650" y1="120" x2="690" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="670" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Decision</text>
  
  <!-- Decision -->
  <rect x="700" y="60" width="80" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="740" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Allow</text>
  <text x="740" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Proceed</text>
  <text x="740" y="145" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">to Handler</text>
  
  <rect x="700" y="200" width="80" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="740" y="235" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Deny</text>
  <text x="740" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Return 403</text>
  <text x="740" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Forbidden</text>
  
  <line x1="650" y1="150" x2="690" y2="240" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="670" y="180" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">If denied</text>
  
  <!-- Handler -->
  <rect x="470" y="200" width="180" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="225" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Handler</text>
  
  <rect x="490" y="240" width="140" height="30" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="560" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Execute Business Logic</text>
  
  <rect x="490" y="275" width="140" height="30" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="560" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Return Response</text>
  
  <line x1="420" y1="150" x2="460" y2="240" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="180" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">If allowed</text>
  
  <!-- Audit Log -->
  <rect x="220" y="200" width="200" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="320" y="225" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Audit Log</text>
  
  <rect x="240" y="240" width="160" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Log: user, resource, action, decision</text>
  
  <line x1="320" y1="180" x2="320" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Cache -->
  <rect x="470" y="340" width="180" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="560" y="365" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Permission Cache</text>
  
  <rect x="490" y="380" width="140" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="560" y="400" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">JWT or Redis Cache</text>
  
  <line x1="560" y1="180" x2="560" y2="340" stroke="#475569" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="580" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Cache result</text>

</svg>
