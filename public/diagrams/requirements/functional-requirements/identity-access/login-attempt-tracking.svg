<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Login Attempt Tracking Architecture</text>
  
  <!-- Login Request -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Login</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Request</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Attempt</text>
  
  <!-- Auth Service -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Auth Service</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Validate Credentials</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Success / ✗ Fail</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Log Attempt</text>
  
  <!-- Tracking Service -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Tracking Service</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Record Attempt</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Update Counters</text>
  
  <line x1="630" y1="120" x2="670" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Store</text>
  
  <!-- Redis -->
  <rect x="680" y="60" width="100" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Redis</text>
  <text x="730" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Recent Attempts</text>
  <text x="730" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Rate Limiting</text>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">TTL: 24h</text>
  
  <line x1="730" y1="180" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="200" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">4. Archive</text>
  
  <!-- Database -->
  <rect x="680" y="230" width="100" height="100" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="730" y="265" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Database</text>
  <text x="730" y="290" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Historical Data</text>
  <text x="730" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">90 days</text>
  
  <line x1="630" y1="280" x2="590" y2="280" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">5. Analyze</text>
  
  <!-- Analysis -->
  <rect x="450" y="230" width="180" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="540" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Threat Detection</text>
  <text x="540" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Brute Force Detection</text>
  <text x="540" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Credential Stuffing</text>
  <text x="540" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Anomaly Detection</text>
  
  <line x1="450" y1="280" x2="410" y2="280" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">6. Alert</text>
  
  <!-- Alerting -->
  <rect x="220" y="230" width="180" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="310" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Alerting</text>
  <text x="310" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Security Team</text>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Automated Response</text>
  <text x="310" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Account Lockout</text>
  
  <!-- Rate Limiting -->
  <rect x="50" y="360" width="220" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="385" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Rate Limiting</text>
  
  <rect x="70" y="400" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Per IP: 10/min</text>
  
  <rect x="70" y="435" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Per Account: 5/hour</text>
  
  <!-- Data Retention -->
  <rect x="290" y="360" width="220" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Data Retention</text>
  
  <rect x="310" y="400" width="180" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Redis: 24 hours</text>
  
  <rect x="310" y="435" width="180" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="400" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Database: 90 days</text>
  
  <!-- Metrics -->
  <rect x="530" y="360" width="220" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="385" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Key Metrics</text>
  
  <rect x="550" y="400" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Success/Failure Rate</text>
  
  <rect x="550" y="435" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Threat Detection Rate</text>

</svg>
