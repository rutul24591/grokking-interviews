<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Session Management Flow</text>
  
  <!-- User -->
  <circle cx="80" cy="100" r="35" fill="#3b82f6"/>
  <text x="80" y="105" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">User</text>
  
  <!-- Login -->
  <rect x="180" y="70" width="120" height="60" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="240" y="105" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Login</text>
  
  <!-- Session Service -->
  <rect x="350" y="60" width="180" height="80" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="440" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Session Service</text>
  <text x="440" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Create/Validate/Refresh</text>
  
  <!-- Session Store -->
  <rect x="580" y="70" width="120" height="60" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Session Store</text>
  <text x="640" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Redis/DB</text>
  
  <!-- API Gateway -->
  <rect x="350" y="200" width="180" height="60" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="440" y="235" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">API Gateway</text>
  
  <!-- Microservices -->
  <rect x="180" y="300" width="100" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="230" y="325" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Service A</text>
  <text x="230" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Validate token</text>
  
  <rect x="340" y="300" width="100" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="390" y="325" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Service B</text>
  <text x="390" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Validate token</text>
  
  <rect x="500" y="300" width="100" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="550" y="325" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Service C</text>
  <text x="550" y="345" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Validate token</text>
  
  <!-- Arrows -->
  <line x1="115" y1="100" x2="170" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="142" y="90" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Credentials</text>
  
  <line x1="300" y1="100" x2="340" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="90" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Create session</text>
  
  <line x1="530" y1="100" x2="570" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="550" y="90" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Store</text>
  
  <line x1="440" y1="140" x2="440" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">4. JWT</text>
  
  <line x1="440" y1="260" x2="230" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="260" x2="390" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="260" x2="550" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

</svg>