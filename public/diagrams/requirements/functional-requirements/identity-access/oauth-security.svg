<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">OAuth Security Measures</text>
  
  <!-- State Parameter -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#3b82f6">State Parameter</text>
  
  <rect x="70" y="115" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Generate Random State</text>
  <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Store in session</text>
  
  <rect x="70" y="175" width="180" height="50" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Validate on Callback</text>
  <text x="160" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Prevent CSRF attacks</text>
  
  <rect x="70" y="235" width="180" height="30" rx="4" fill="#22c55e"/>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Required for all flows</text>
  
  <line x1="270" y1="160" x2="310" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- PKCE -->
  <rect x="320" y="70" width="220" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#f59e0b">PKCE</text>
  
  <rect x="340" y="115" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="430" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Code Verifier</text>
  <text x="430" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Random 43-128 chars</text>
  
  <rect x="340" y="175" width="180" height="50" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Code Challenge</text>
  <text x="430" y="220" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">SHA256 hash</text>
  
  <rect x="340" y="235" width="180" height="30" rx="4" fill="#22c55e"/>
  <text x="430" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Prevents code interception</text>
  
  <line x1="540" y1="160" x2="580" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Token Validation -->
  <rect x="590" y="70" width="160" height="180" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#8b5cf6">Token Validation</text>
  
  <rect x="610" y="115" width="120" height="40" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Verify Signature</text>
  <text x="670" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Using JWKS</text>
  
  <rect x="610" y="165" width="120" height="40" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="670" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Validate Claims</text>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">iss, aud, exp</text>
  
  <rect x="610" y="215" width="120" height="30" rx="4" fill="#22c55e"/>
  <text x="670" y="235" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">✓ Required for all tokens</text>
  
  <line x1="670" y1="250" x2="670" y2="290" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Token Storage -->
  <rect x="590" y="300" width="160" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="325" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Token Storage</text>
  
  <rect x="610" y="340" width="120" height="35" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="670" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Encrypt at Rest</text>
  
  <rect x="610" y="380" width="120" height="35" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="670" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Key Management</text>
  
  <rect x="610" y="420" width="120" height="35" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="670" y="442" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Rotate on Use</text>
  
  <!-- Scope Validation -->
  <rect x="50" y="300" width="220" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="325" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Scope Validation</text>
  
  <rect x="70" y="340" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Request Minimum Scopes</text>
  
  <rect x="70" y="380" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Validate Granted Scopes</text>
  
  <rect x="70" y="420" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="442" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Handle Scope Denial</text>
  
  <!-- Account Linking Security -->
  <rect x="320" y="300" width="220" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="430" y="325" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Account Linking</text>
  
  <rect x="340" y="340" width="180" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="430" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">⚠ Verify Before Linking</text>
  
  <rect x="340" y="380" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="402" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Password/MFA Verification</text>
  
  <rect x="340" y="420" width="180" height="35" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="430" y="442" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Audit All Link Events</text>

</svg>
