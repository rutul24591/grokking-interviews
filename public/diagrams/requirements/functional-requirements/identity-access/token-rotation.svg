<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Refresh Token Rotation Flow</text>
  
  <!-- Client Request -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">Client</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Refresh Token</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Present token</text>
  
  <!-- Authorization Server -->
  <rect x="220" y="60" width="280" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="360" y="85" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Authorization Server</text>
  
  <rect x="240" y="105" width="240" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="360" y="127" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Validate Token (signature, expiry)</text>
  
  <rect x="240" y="145" width="240" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="360" y="167" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Mark Old Token as Used</text>
  
  <rect x="240" y="185" width="240" height="35" rx="4" fill="#f59e0b"/>
  <text x="360" y="207" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Generate New Tokens</text>
  
  <line x1="500" y1="160" x2="540" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="520" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Store new</text>
  
  <!-- Token Store -->
  <rect x="550" y="80" width="120" height="120" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="610" y="105" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Token Store</text>
  
  <rect x="570" y="120" width="80" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="610" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">New Token</text>
  <text x="610" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">✓ Valid</text>
  
  <rect x="570" y="155" width="80" height="30" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="610" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Old Token</text>
  <text x="610" y="190" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">✗ Used</text>
  
  <line x1="500" y1="200" x2="540" y2="200" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="520" y="190" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">3. Return tokens</text>
  
  <!-- Response -->
  <rect x="50" y="200" width="120" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="235" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Response</text>
  <text x="110" y="260" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">New Access Token</text>
  <text x="110" y="275" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">New Refresh Token</text>
  
  <line x1="360" y1="260" x2="360" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Reuse Detection -->
  <rect x="220" y="310" width="280" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="360" y="335" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Token Reuse Detection (Theft)</text>
  
  <rect x="240" y="350" width="240" height="35" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="360" y="372" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Old Token Presented Again</text>
  
  <rect x="240" y="390" width="240" height="35" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="360" y="412" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Token Marked as Used → Theft Detected</text>
  
  <rect x="240" y="430" width="240" height="35" rx="4" fill="#ef4444"/>
  <text x="360" y="452" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Revoke All Sessions + Alert + MFA Required</text>
  
  <!-- Reuse Attack Flow -->
  <line x1="170" y1="240" x2="210" y2="380" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="190" y="300" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">Attacker uses</text>
  <text x="190" y="315" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ef4444">stolen token</text>

</svg>
