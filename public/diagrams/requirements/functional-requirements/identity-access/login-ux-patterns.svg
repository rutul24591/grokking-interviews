<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Login UX Patterns</text>
  
  <!-- Traditional -->
  <rect x="50" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Traditional Form</text>
  <rect x="70" y="115" width="180" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Email</text>
  <rect x="70" y="155" width="180" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="177" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Password</text>
  <rect x="70" y="195" width="180" height="35" rx="4" fill="#3b82f6"/>
  <text x="160" y="217" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">Sign In</text>
  <text x="160" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ Simple</text>
  <text x="160" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">⚠ Password fatigue</text>
  
  <!-- Social Login -->
  <rect x="290" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Social Login</text>
  <rect x="310" y="115" width="180" height="35" rx="4" fill="#3b82f6"/>
  <text x="400" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Continue with Google</text>
  <rect x="310" y="155" width="180" height="35" rx="4" fill="#8b5cf6"/>
  <text x="400" y="177" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Continue with Apple</text>
  <rect x="310" y="195" width="180" height="35" rx="4" fill="#1877F2"/>
  <text x="400" y="217" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Continue with Facebook</text>
  <text x="400" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ One-click</text>
  <text x="400" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">⚠ Privacy concerns</text>
  
  <!-- Passwordless -->
  <rect x="530" y="70" width="220" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Passwordless</text>
  <rect x="550" y="115" width="180" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Email for Magic Link</text>
  <rect x="550" y="155" width="180" height="35" rx="4" fill="#3b82f6"/>
  <text x="640" y="177" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Send Magic Link</text>
  <text x="640" y="205" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Or use WebAuthn</text>
  <text x="640" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ No password</text>
  <text x="640" y="255" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ Phishing resistant</text>
  
  <!-- Biometric -->
  <rect x="50" y="280" width="220" height="150" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="305" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Biometric</text>
  <circle cx="160" cy="355" r="30" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="360" text-anchor="middle" font-family="system-ui" font-size="20" fill="#3b82f6">👆</text>
  <text x="160" y="395" text-anchor="middle" font-family="system-ui" font-size="10" fill="#475569">Touch ID / Face ID</text>
  <text x="160" y="415" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ Fastest</text>
  
  <!-- SSO -->
  <rect x="290" y="280" width="220" height="150" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="305" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Enterprise SSO</text>
  <rect x="310" y="325" width="180" height="40" rx="4" fill="#f8fafc"/>
  <text x="400" y="350" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">SAML 2.0 / OIDC</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Okta, Azure AD, OneLogin</text>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ Centralized</text>
  
  <!-- MFA -->
  <rect x="530" y="280" width="220" height="150" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="305" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Adaptive MFA</text>
  <rect x="550" y="325" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="640" y="350" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Risk-based Challenge</text>
  <text x="640" y="375" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">New device, location, behavior</text>
  <text x="640" y="395" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22c55e">✓ Balanced UX/Security</text>

</svg>