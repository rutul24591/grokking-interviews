<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Credential Rotation Flow</text>
  
  <!-- Scheduled Rotation -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Scheduled Rotation</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">90-Day Key Rotation</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Automated</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Password Expiry Warning</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">14d, 7d, 1d before</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Token Expiry</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Access: 15-60 min</text>
  
  <line x1="270" y1="170" x2="310" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Breach-Based Rotation -->
  <rect x="320" y="70" width="220" height="200" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Breach-Based Rotation</text>
  
  <rect x="340" y="115" width="180" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Breach Detection</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Have I Been Pwned</text>
  
  <rect x="340" y="165" width="180" height="40" rx="4" fill="#ef4444" opacity="0.6"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Suspicious Activity</text>
  <text x="430" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Unusual login patterns</text>
  
  <rect x="340" y="215" width="180" height="40" rx="4" fill="#ef4444" opacity="0.4"/>
  <text x="430" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Token Reuse Detected</text>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Theft indicator</text>
  
  <line x1="540" y1="170" x2="580" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Rotation Actions -->
  <rect x="590" y="70" width="160" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Rotation Actions</text>
  
  <rect x="610" y="115" width="120" height="35" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="670" y="137" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Invalidate Old</text>
  
  <rect x="610" y="155" width="120" height="35" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="670" y="177" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Issue New</text>
  
  <rect x="610" y="195" width="120" height="35" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="670" y="217" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Notify User</text>
  
  <rect x="610" y="235" width="120" height="35" rx="4" fill="#f59e0b"/>
  <text x="670" y="257" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Audit Log</text>
  
  <line x1="670" y1="270" x2="670" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Validation -->
  <rect x="590" y="320" width="160" height="130" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Validation</text>
  
  <rect x="610" y="360" width="120" height="30" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="670" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Overlap Period</text>
  
  <rect x="610" y="395" width="120" height="30" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="670" y="415" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Key Overlap (7-30d)</text>
  
  <rect x="610" y="430" width="120" height="30" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="670" y="450" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Graceful Transition</text>
  
  <!-- Emergency Rotation -->
  <rect x="50" y="320" width="510" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="305" y="345" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Emergency Rotation (Security Incident)</text>
  
  <rect x="70" y="360" width="110" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="125" y="380" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Immediate</text>
  <text x="125" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Key compromise</text>
  
  <rect x="190" y="360" width="110" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="245" y="380" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Force Reset</text>
  <text x="245" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">All sessions</text>
  
  <rect x="320" y="360" width="110" height="40" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="375" y="380" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#0f172a">Notify Users</text>
  <text x="375" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Email + in-app</text>
  
  <rect x="450" y="360" width="100" height="40" rx="4" fill="#ef4444"/>
  <text x="500" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Revoke All</text>
  <text x="500" y="395" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Sessions</text>

</svg>
