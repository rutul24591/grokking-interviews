<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">JWT Structure &amp; Signing</text>
  
  <!-- JWT Token Visual -->
  <rect x="50" y="70" width="700" height="80" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">JWT Token (Header.Payload.Signature)</text>
  
  <rect x="70" y="110" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="130" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Header</text>
  
  <rect x="260" y="110" width="280" height="30" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="400" y="130" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Payload (Claims)</text>
  
  <rect x="550" y="110" width="180" height="30" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="640" y="130" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Signature</text>
  
  <!-- Header Details -->
  <rect x="50" y="180" width="220" height="150" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="205" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">Header</text>
  
  <rect x="70" y="220" width="180" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="242" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">"alg": "RS256"</text>
  
  <rect x="70" y="260" width="180" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="282" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">"typ": "JWT"</text>
  
  <rect x="70" y="300" width="180" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="85" y="322" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">"kid": "key-id-123"</text>
  
  <!-- Payload Details -->
  <rect x="300" y="180" width="240" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="420" y="205" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">Payload (Claims)</text>
  
  <rect x="320" y="220" width="200" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="335" y="240" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">"sub": "user-123"</text>
  
  <rect x="320" y="255" width="200" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="335" y="275" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">"exp": 1735689600</text>
  
  <rect x="320" y="290" width="200" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="335" y="310" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">"iat": 1735686000</text>
  
  <rect x="320" y="325" width="200" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="335" y="345" text-anchor="start" font-family="monospace" font-size="9" fill="#0f172a">"iss": "auth-service"</text>
  
  <rect x="320" y="360" width="200" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="420" y="380" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">+ aud, roles, etc.</text>
  
  <!-- Signature Details -->
  <rect x="570" y="180" width="180" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="660" y="205" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">Signature</text>
  
  <rect x="590" y="220" width="140" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="660" y="245" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">RS256 Signing</text>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">RSA + SHA256</text>
  
  <rect x="590" y="280" width="140" height="50" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="660" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Sign Process</text>
  <text x="660" y="320" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Sign(header.payload)</text>
  
  <rect x="590" y="340" width="140" height="35" rx="4" fill="#22c55e"/>
  <text x="660" y="362" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Base64URL Encode</text>
  
  <!-- Signing Process -->
  <rect x="50" y="360" width="340" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="220" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Signing Process</text>
  
  <rect x="70" y="400" width="130" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="135" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">1. Create Header</text>
  
  <rect x="210" y="400" width="30" height="30" rx="4" fill="#475569"/>
  <text x="225" y="420" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="250" y="400" width="130" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="315" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">2. Create Payload</text>
  
  <rect x="70" y="440" width="130" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="135" y="460" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">3. Sign with Key</text>
  
  <rect x="210" y="440" width="30" height="30" rx="4" fill="#475569"/>
  <text x="225" y="460" text-anchor="middle" font-family="system-ui" font-size="14" fill="#ffffff">→</text>
  
  <rect x="250" y="440" width="130" height="30" rx="4" fill="#22c55e"/>
  <text x="315" y="460" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">4. Final JWT</text>
  
  <!-- Algorithm Comparison -->
  <rect x="420" y="360" width="340" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="590" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Algorithm Comparison</text>
  
  <rect x="440" y="400" width="100" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="490" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ RS256</text>
  
  <rect x="550" y="400" width="100" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="600" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">HS256</text>
  
  <rect x="660" y="400" width="100" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="710" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">ES256</text>
  
  <rect x="440" y="440" width="320" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="600" y="457" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">RS256 recommended for distributed systems</text>

</svg>
