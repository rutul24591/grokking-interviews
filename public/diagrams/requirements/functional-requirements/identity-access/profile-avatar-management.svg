<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Avatar Management Flow</text>
  
  <!-- User Upload -->
  <circle cx="80" cy="100" r="35" fill="#3b82f6"/>
  <text x="80" y="105" text-anchor="middle" font-family="system-ui" font-size="11" fill="#ffffff">User</text>
  
  <rect x="180" y="70" width="140" height="60" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="250" y="105" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0f172a">Upload Avatar</text>
  
  <line x1="115" y1="100" x2="170" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="100" x2="370" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Crop Editor -->
  <rect x="380" y="60" width="180" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="85" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Crop Editor</text>
  
  <rect x="400" y="100" width="140" height="100" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="470" cy="150" r="40" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="470" y="190" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Drag to crop</text>
  
  <rect x="400" y="210" width="65" height="25" rx="4" fill="#f59e0b"/>
  <text x="432" y="227" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Cancel</text>
  
  <rect x="475" y="210" width="65" height="25" rx="4" fill="#3b82f6"/>
  <text x="507" y="227" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Apply</text>
  
  <line x1="560" y1="150" x2="610" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Processing -->
  <rect x="620" y="70" width="140" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="690" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Processing</text>
  
  <rect x="640" y="110" width="100" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="690" y="127" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Resize to 200x200</text>
  
  <rect x="640" y="140" width="100" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="690" y="157" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Compress (WebP)</text>
  
  <line x1="690" y1="190" x2="690" y2="230" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- CDN Upload -->
  <rect x="620" y="240" width="140" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="690" y="265" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">CDN Upload</text>
  <text x="690" y="290" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Generate URLs</text>
  <text x="690" y="305" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">thumb, medium, large</text>
  
  <line x1="620" y1="280" x2="570" y2="280" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="595" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">Success</text>
  
  <!-- Preview -->
  <rect x="380" y="270" width="180" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="470" y="295" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Preview</text>
  
  <circle cx="400" cy="340" r="30" fill="#3b82f6" opacity="0.2"/>
  <text x="400" y="345" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Thumb</text>
  
  <circle cx="470" cy="340" r="40" fill="#3b82f6" opacity="0.4"/>
  <text x="470" y="345" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Medium</text>
  
  <circle cx="540" cy="340" r="50" fill="#3b82f6" opacity="0.6"/>
  <text x="540" y="345" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">Large</text>
  
  <rect x="400" y="380" width="140" height="25" rx="4" fill="#3b82f6"/>
  <text x="470" y="397" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Confirm &amp; Save</text>
  
  <line x1="380" y1="340" x2="330" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Validation -->
  <rect x="180" y="270" width="140" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="295" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Validation</text>
  
  <rect x="200" y="310" width="100" height="25" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="250" y="327" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">File type check</text>
  
  <rect x="200" y="340" width="100" height="25" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="250" y="357" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Size limit (5MB)</text>
  
  <rect x="200" y="370" width="100" height="25" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="250" y="387" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">Content moderation</text>
  
  <line x1="250" y1="240" x2="250" y2="270" stroke="#475569" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="270" y="255" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">If fails</text>
  
  <!-- Success State -->
  <rect x="180" y="430" width="420" height="50" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="450" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">✓ Avatar Updated Successfully</text>
  <text x="390" y="470" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Processed: 200x200 WebP • CDN URLs generated • Profile updated</text>

</svg>
