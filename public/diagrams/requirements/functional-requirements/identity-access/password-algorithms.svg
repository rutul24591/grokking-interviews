<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Password Hashing Algorithms Comparison</text>
  
  <!-- Argon2 -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">Argon2id (Best)</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Memory-Hard Function</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">PHC Winner 2015</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">GPU/ASIC Resistant</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">High memory requirement</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Recommended Settings</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Memory: 64MB, Iterations: 3</text>
  
  <!-- bcrypt -->
  <rect x="290" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">bcrypt (Standard)</text>
  
  <rect x="310" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="400" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Adaptive Hash Function</text>
  <text x="400" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Based on Blowfish cipher</text>
  
  <rect x="310" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="400" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Cost Factor: 12-14</text>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Exponential work factor</text>
  
  <rect x="310" y="215" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="400" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Industry Standard</text>
  <text x="400" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Wide language support</text>
  
  <!-- scrypt -->
  <rect x="530" y="70" width="220" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">scrypt (Alternative)</text>
  
  <rect x="550" y="115" width="180" height="40" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="640" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Memory-Hard Function</text>
  <text x="640" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">CPU + Memory intensive</text>
  
  <rect x="550" y="165" width="180" height="40" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="640" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">GPU Resistant</text>
  <text x="640" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">High memory requirement</text>
  
  <rect x="550" y="215" width="180" height="40" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="640" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Less Common</text>
  <text x="640" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Limited language support</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="300" width="700" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Algorithm Comparison</text>
  
  <rect x="70" y="340" width="180" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="360" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Algorithm</text>
  
  <rect x="250" y="340" width="180" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="360" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Security</text>
  
  <rect x="430" y="340" width="180" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="520" y="360" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Performance</text>
  
  <rect x="610" y="340" width="120" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="360" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Recommendation</text>
  
  <!-- Argon2 Row -->
  <rect x="70" y="370" width="180" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Argon2id</text>
  
  <rect x="250" y="370" width="180" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⭐⭐⭐⭐⭐</text>
  
  <rect x="430" y="370" width="180" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="520" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Medium</text>
  
  <rect x="610" y="370" width="120" height="30" rx="4" fill="#22c55e"/>
  <text x="670" y="390" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Recommended</text>
  
  <!-- bcrypt Row -->
  <rect x="70" y="400" width="180" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="160" y="420" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">bcrypt</text>
  
  <rect x="250" y="400" width="180" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="420" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⭐⭐⭐⭐</text>
  
  <rect x="430" y="400" width="180" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="520" y="420" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Slow</text>
  
  <rect x="610" y="400" width="120" height="30" rx="4" fill="#f59e0b"/>
  <text x="670" y="420" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Good Fallback</text>
  
  <!-- scrypt Row -->
  <rect x="70" y="430" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="450" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">scrypt</text>
  
  <rect x="250" y="430" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="450" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">⭐⭐⭐⭐</text>
  
  <rect x="430" y="430" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="520" y="450" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Slow</text>
  
  <rect x="610" y="430" width="120" height="30" rx="4" fill="#e2e8f0"/>
  <text x="670" y="450" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Alternative</text>

</svg>
