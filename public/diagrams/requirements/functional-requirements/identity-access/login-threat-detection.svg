<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Login Threat Detection</text>
  
  <!-- Input Signals -->
  <rect x="50" y="70" width="150" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="125" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Input Signals</text>
  <text x="125" y="125" font-family="system-ui" font-size="9" fill="#475569">• IP Address</text>
  <text x="125" y="140" font-family="system-ui" font-size="9" fill="#475569">• User-Agent</text>
  <text x="125" y="155" font-family="system-ui" font-size="9" fill="#475569">• Device Fingerprint</text>
  <text x="125" y="170" font-family="system-ui" font-size="9" fill="#475569">• Geolocation</text>
  <text x="125" y="185" font-family="system-ui" font-size="9" fill="#475569">• Time of Day</text>
  <text x="125" y="200" font-family="system-ui" font-size="9" fill="#475569">• Typing Pattern</text>
  <text x="125" y="215" font-family="system-ui" font-size="9" fill="#475569">• Email Domain</text>
  
  <!-- Risk Engine -->
  <rect x="240" y="70" width="200" height="180" rx="8" fill="#f1f5f9" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Risk Engine</text>
  
  <rect x="260" y="110" width="160" height="30" rx="4" fill="#f8fafc"/>
  <text x="340" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">IP Reputation: 0.8</text>
  
  <rect x="260" y="145" width="160" height="30" rx="4" fill="#f8fafc"/>
  <text x="340" y="165" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Geo Anomaly: 0.6</text>
  
  <rect x="260" y="180" width="160" height="30" rx="4" fill="#f8fafc"/>
  <text x="340" y="200" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Device Mismatch: 0.9</text>
  
  <rect x="260" y="215" width="160" height="30" rx="4" fill="#f59e0b"/>
  <text x="340" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#0f172a">Risk Score: 0.77</text>
  
  <!-- Decision -->
  <rect x="480" y="70" width="140" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="550" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Decision</text>
  
  <rect x="500" y="115" width="100" height="35" rx="4" fill="#22c55e"/>
  <text x="550" y="137" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">Low (&lt;0.3)</text>
  <text x="550" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Allow</text>
  
  <rect x="500" y="155" width="100" height="35" rx="4" fill="#f59e0b"/>
  <text x="550" y="177" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Medium (0.3-0.7)</text>
  <text x="550" y="190" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">MFA Challenge</text>
  
  <rect x="500" y="195" width="100" height="35" rx="4" fill="#ef4444"/>
  <text x="550" y="217" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ffffff">High (&gt;0.7)</text>
  <text x="550" y="230" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Block + Alert</text>
  
  <!-- Response Actions -->
  <rect x="660" y="70" width="100" height="180" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="710" y="95" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Actions</text>
  <text x="710" y="125" font-family="system-ui" font-size="9" fill="#475569">• Send Alert</text>
  <text x="710" y="140" font-family="system-ui" font-size="9" fill="#475569">• Log Event</text>
  <text x="710" y="155" font-family="system-ui" font-size="9" fill="#475569">• Notify User</text>
  <text x="710" y="170" font-family="system-ui" font-size="9" fill="#475569">• Temp Lock</text>
  <text x="710" y="185" font-family="system-ui" font-size="9" fill="#475569">• Require Reset</text>
  <text x="710" y="200" font-family="system-ui" font-size="9" fill="#475569">• Flag for Review</text>
  <text x="710" y="215" font-family="system-ui" font-size="9" fill="#475569">• Add to Blocklist</text>
  
  <!-- Arrows -->
  <line x1="200" y1="160" x2="230" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="160" x2="470" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="160" x2="650" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

</svg>