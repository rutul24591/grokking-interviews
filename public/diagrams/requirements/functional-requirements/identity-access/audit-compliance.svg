<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">Audit Compliance Requirements</text>
  
  <!-- SOC 2 -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#3b82f6">SOC 2</text>
  
  <rect x="70" y="115" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="160" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Access Control</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Log all access events</text>
  
  <rect x="70" y="165" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="160" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Change Management</text>
  <text x="160" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Log config changes</text>
  
  <rect x="70" y="215" width="180" height="40" rx="4" fill="#3b82f6" opacity="0.4"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Retention</text>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Typically 7 years</text>
  
  <!-- HIPAA -->
  <rect x="290" y="70" width="220" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f59e0b">HIPAA</text>
  
  <rect x="310" y="115" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="400" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">PHI Access</text>
  <text x="400" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Log all PHI access</text>
  
  <rect x="310" y="165" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="400" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">User Activity</text>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Who accessed what</text>
  
  <rect x="310" y="215" width="180" height="40" rx="4" fill="#f59e0b" opacity="0.4"/>
  <text x="400" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Retention: 6 Years</text>
  <text x="400" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Mandatory requirement</text>
  
  <!-- GDPR -->
  <rect x="530" y="70" width="220" height="200" rx="8" fill="#f8fafc" stroke="#8b5cf6" stroke-width="2"/>
  <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#8b5cf6">GDPR</text>
  
  <rect x="550" y="115" width="180" height="40" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <text x="640" y="135" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Personal Data Access</text>
  <text x="640" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Log data access</text>
  
  <rect x="550" y="165" width="180" height="40" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <text x="640" y="185" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Right to Audit</text>
  <text x="640" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Users can request logs</text>
  
  <rect x="550" y="215" width="180" height="40" rx="4" fill="#8b5cf6" opacity="0.4"/>
  <text x="640" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Retention</text>
  <text x="640" y="250" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">As long as necessary</text>
  
  <!-- PCI-DSS -->
  <rect x="50" y="300" width="220" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="160" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#22c55e">PCI-DSS</text>
  
  <rect x="70" y="340" width="180" height="40" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="160" y="360" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Cardholder Data</text>
  <text x="160" y="375" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Log all access</text>
  
  <rect x="70" y="390" width="180" height="40" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="160" y="410" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Retention: 1 Year</text>
  <text x="160" y="425" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">3 months online</text>
  
  <!-- ISO 27001 -->
  <rect x="290" y="300" width="220" height="150" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#ef4444">ISO 27001</text>
  
  <rect x="310" y="340" width="180" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="400" y="360" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Security Events</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Log security events</text>
  
  <rect x="310" y="390" width="180" height="40" rx="4" fill="#ef4444" opacity="0.6"/>
  <text x="400" y="410" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Incident Response</text>
  <text x="400" y="425" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Support investigations</text>
  
  <!-- Summary Table -->
  <rect x="530" y="300" width="220" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="325" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Retention Summary</text>
  
  <rect x="550" y="340" width="180" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="357" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">SOC 2: 7 years</text>
  
  <rect x="550" y="370" width="180" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="387" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">HIPAA: 6 years</text>
  
  <rect x="550" y="400" width="180" height="25" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="417" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">PCI-DSS: 1 year</text>
  
  <rect x="550" y="430" width="180" height="20" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="640" y="445" text-anchor="middle" font-family="system-ui" font-size="8" fill="#0f172a">GDPR: As necessary</text>

</svg>
