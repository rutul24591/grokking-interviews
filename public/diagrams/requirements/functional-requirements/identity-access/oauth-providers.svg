<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">OAuth Provider Comparison</text>
  
  <!-- Google -->
  <rect x="50" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#4285f4" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4285f4">Google</text>
  
  <rect x="70" y="115" width="180" height="45" rx="4" fill="#4285f4" opacity="0.8"/>
  <text x="160" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">90%+ Users</text>
  <text x="160" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Most common provider</text>
  
  <rect x="70" y="170" width="180" height="45" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Trusted, provides email/name</text>
  
  <rect x="70" y="225" width="180" height="45" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Strict brand guidelines</text>
  
  <!-- Apple -->
  <rect x="300" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#000000" stroke-width="2"/>
  <text x="410" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#000000">Apple</text>
  
  <rect x="320" y="115" width="180" height="45" rx="4" fill="#000000" opacity="0.8"/>
  <text x="410" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Required for iOS</text>
  <text x="410" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">App Store guideline 4.8</text>
  
  <rect x="320" y="170" width="180" height="45" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Privacy-focused (hide email)</text>
  
  <rect x="320" y="225" width="180" height="45" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="410" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ Relay emails (@privaterelay)</text>
  
  <!-- Facebook -->
  <rect x="550" y="70" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#1877f2" stroke-width="2"/>
  <text x="660" y="95" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#1877f2">Facebook</text>
  
  <rect x="570" y="115" width="180" height="45" rx="4" fill="#1877f2" opacity="0.8"/>
  <text x="660" y="140" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Large User Base</text>
  <text x="660" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Declining usage</text>
  
  <rect x="570" y="170" width="180" height="45" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Large user base</text>
  
  <rect x="570" y="225" width="180" height="45" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="250" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✗ App review required</text>
  
  <!-- GitHub -->
  <rect x="50" y="290" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#333333" stroke-width="2"/>
  <text x="160" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#333333">GitHub</text>
  
  <rect x="70" y="335" width="180" height="45" rx="4" fill="#333333" opacity="0.8"/>
  <text x="160" y="360" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Developer Focused</text>
  <text x="160" y="375" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Dev tools, repos</text>
  
  <rect x="70" y="390" width="180" height="45" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="415" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Developer audience</text>
  
  <rect x="70" y="445" width="180" height="45" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="470" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ No app review for basic</text>
  
  <!-- Microsoft -->
  <rect x="300" y="290" width="220" height="200" rx="8" fill="#f1f5f9" stroke="#00a4ef" stroke-width="2"/>
  <text x="410" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#00a4ef">Microsoft</text>
  
  <rect x="320" y="335" width="180" height="45" rx="4" fill="#00a4ef" opacity="0.8"/>
  <text x="410" y="360" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#ffffff">Enterprise Focus</text>
  <text x="410" y="375" text-anchor="middle" font-family="system-ui" font-size="8" fill="#ffffff">Azure AD, Office 365</text>
  
  <rect x="320" y="390" width="180" height="45" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="415" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Enterprise integration</text>
  
  <rect x="320" y="445" width="180" height="45" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="410" y="470" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Office 365 integration</text>
  
  <!-- Recommendation -->
  <rect x="550" y="290" width="220" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="315" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#0f172a">Recommendation</text>
  
  <rect x="570" y="335" width="180" height="45" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="660" y="360" text-anchor="middle" font-family="system-ui" font-size="10" fill="#0f172a">Support 3-5 Providers</text>
  
  <rect x="570" y="390" width="180" height="45" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="660" y="415" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Google + Apple (required)</text>
  
  <rect x="570" y="445" width="180" height="45" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="660" y="470" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">+ Facebook/GitHub/Microsoft</text>

</svg>
