<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="18" font-weight="bold" fill="#0f172a">User Registration Flow</text>
  
  <!-- User Input -->
  <rect x="50" y="80" width="120" height="80" rx="8" fill="#3b82f6"/>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#ffffff">User</text>
  <text x="110" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Signup Form</text>
  
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">1. Submit</text>
  
  <!-- Validation -->
  <rect x="220" y="60" width="180" height="120" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Input Validation</text>
  
  <rect x="240" y="105" width="140" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Email Format</text>
  
  <rect x="240" y="140" width="140" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="310" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">✓ Password Strength</text>
  
  <line x1="400" y1="120" x2="440" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">2. Fraud Check</text>
  
  <!-- Fraud Prevention -->
  <rect x="450" y="60" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="90" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Fraud Prevention</text>
  
  <rect x="470" y="105" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">IP Reputation</text>
  
  <rect x="470" y="140" width="140" height="30" rx="4" fill="#f59e0b" opacity="0.3"/>
  <text x="540" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Device Fingerprint</text>
  
  <line x1="630" y1="120" x2="670" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#475569">3. Hash Password</text>
  
  <!-- Password Hashing -->
  <rect x="680" y="60" width="100" height="120" rx="8" fill="#f1f5f9" stroke="#8b5cf6" stroke-width="2"/>
  <text x="730" y="90" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Hash</text>
  <text x="730" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Argon2/bcrypt</text>
  <text x="730" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Salt + Hash</text>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Never plaintext</text>
  
  <line x1="730" y1="180" x2="730" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="200" text-anchor="start" font-family="system-ui" font-size="8" fill="#475569">4. Create User</text>
  
  <!-- User Creation -->
  <rect x="680" y="230" width="100" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Create</text>
  <text x="730" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">User Record</text>
  <text x="730" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Status: Unverified</text>
  <text x="730" y="315" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Unique ID</text>
  
  <line x1="680" y1="280" x2="640" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">5. Send Verification</text>
  
  <!-- Verification -->
  <rect x="450" y="230" width="180" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Verification</text>
  <text x="540" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Send Email/SMS</text>
  <text x="540" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Verification Token</text>
  <text x="540" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">24h Expiry</text>
  
  <line x1="450" y1="280" x2="410" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">6. Respond</text>
  
  <!-- Response -->
  <rect x="220" y="230" width="180" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="255" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#0f172a">Response</text>
  <text x="310" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">User ID</text>
  <text x="310" y="295" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Require Verification</text>
  <text x="310" y="310" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Limited Access</text>
  
  <line x1="220" y1="280" x2="180" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22c55e">7. Confirm</text>
  
  <!-- User Success -->
  <rect x="50" y="230" width="120" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="260" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#0f172a">Success</text>
  <text x="110" y="285" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Check Email</text>
  <text x="110" y="300" text-anchor="middle" font-family="system-ui" font-size="9" fill="#475569">Verify Account</text>
  
  <!-- Rate Limiting -->
  <rect x="50" y="360" width="220" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="160" y="385" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Rate Limiting</text>
  
  <rect x="70" y="400" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Per IP: 5/hour</text>
  
  <rect x="70" y="435" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Per Email: 1/day</text>
  
  <!-- Duplicate Detection -->
  <rect x="290" y="360" width="220" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Duplicate Detection</text>
  
  <rect x="310" y="400" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Email Uniqueness</text>
  
  <rect x="310" y="435" width="180" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Username Uniqueness</text>
  
  <!-- Response -->
  <rect x="530" y="360" width="220" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="640" y="385" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#0f172a">Generic Response</text>
  
  <rect x="550" y="400" width="180" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="420" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">"If email valid, we'll send verification"</text>
  
  <rect x="550" y="435" width="180" height="30" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="640" y="455" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0f172a">Prevent enumeration</text>

</svg>
