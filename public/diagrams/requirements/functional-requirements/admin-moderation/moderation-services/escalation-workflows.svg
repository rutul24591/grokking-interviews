<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .auto { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .manual { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .priority { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Auto-Escalation -->
  <rect class="auto" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Auto-Escalation</text>
  
  <rect class="auto" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Automatic Escalation</text>
  
  <rect class="auto" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Rule-Based Escalation</text>
  
  <rect class="auto" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Fast Escalation</text>
  
  <!-- Manual Escalation -->
  <rect class="manual" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Manual Escalation</text>
  
  <rect class="manual" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Manual Escalation</text>
  
  <rect class="manual" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Moderator Decision</text>
  
  <rect class="manual" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Slower Escalation</text>
  
  <!-- Priority Escalation -->
  <rect class="priority" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Priority Escalation</text>
  
  <rect class="priority" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Priority Escalation</text>
  
  <rect class="priority" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">High-Priority Content</text>
  
  <rect class="priority" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Urgent Review</text>
  
  <!-- Escalation Flow -->
  <rect class="auto" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Escalation Workflows</text>
  
  <!-- Flow -->
  <rect class="auto" x="70" y="330" width="280" height="60" rx="4"/>
  <rect class="manual" x="360" y="330" width="280" height="60" rx="4"/>
  <rect class="priority" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Auto-Escalation → Manual Escalation → Priority Escalation</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Auto-Escalation</text>
  <text x="360" y="410" text-anchor="middle" class="sublabel">Manual Escalation</text>
  <text x="650" y="410" text-anchor="end" class="sublabel">Priority Escalation</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Escalation Workflows</text>
</svg>
