<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .storage { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .execution { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .delivery { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Schedule Storage -->
  <rect class="storage" x="50" y="50" width="200" height="120" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label">Schedule Storage</text>
  <text x="150" y="105" text-anchor="middle" class="sublabel">Report Definition</text>
  <text x="150" y="125" text-anchor="middle" class="sublabel">Frequency, Time</text>
  <text x="150" y="145" text-anchor="middle" class="sublabel">Recipients</text>
  
  <!-- Cron Scheduler -->
  <rect class="execution" x="300" y="50" width="200" height="120" rx="8"/>
  <text x="400" y="80" text-anchor="middle" class="text-label">Cron Scheduler</text>
  <text x="400" y="105" text-anchor="middle" class="sublabel">Trigger Schedules</text>
  <text x="400" y="125" text-anchor="middle" class="sublabel">Queue Reports</text>
  <text x="400" y="145" text-anchor="middle" class="sublabel">Timezone Support</text>
  
  <!-- Queue Processing -->
  <rect class="execution" x="550" y="50" width="200" height="120" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="text-label">Queue Processing</text>
  <text x="650" y="105" text-anchor="middle" class="sublabel">Execution Workers</text>
  <text x="650" y="125" text-anchor="middle" class="sublabel">Retry Logic</text>
  <text x="650" y="145" text-anchor="middle" class="sublabel">Error Handling</text>
  
  <!-- Notification -->
  <rect class="delivery" x="800" y="50" width="170" height="120" rx="8"/>
  <text x="885" y="80" text-anchor="middle" class="text-label">Notification</text>
  <text x="885" y="105" text-anchor="middle" class="sublabel">Email Delivery</text>
  <text x="885" y="125" text-anchor="middle" class="sublabel">In-App Notification</text>
  <text x="885" y="145" text-anchor="middle" class="sublabel">Webhook</text>
  
  <!-- Arrows between steps -->
  <path class="arrow" d="M250 110 L295 110"/>
  <path class="arrow" d="M500 110 L545 110"/>
  <path class="arrow" d="M750 110 L795 110"/>
  
  <!-- Delivery Methods -->
  <rect class="storage" x="50" y="220" width="450" height="150" rx="8"/>
  <text x="275" y="250" text-anchor="middle" class="text-label">Delivery Methods</text>
  
  <rect class="storage" x="70" y="270" width="200" height="80" rx="4"/>
  <text x="170" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">Email Delivery</text>
  <text x="170" y="315" text-anchor="middle" class="sublabel">Attach Report</text>
  <text x="170" y="335" text-anchor="middle" class="sublabel">Email Templates</text>
  
  <rect class="execution" x="300" y="270" width="180" height="80" rx="4"/>
  <text x="390" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">File Storage</text>
  <text x="390" y="315" text-anchor="middle" class="sublabel">Store Reports</text>
  <text x="390" y="335" text-anchor="middle" class="sublabel">Retention Policy</text>
  
  <!-- Share Options -->
  <rect class="delivery" x="550" y="220" width="400" height="150" rx="8"/>
  <text x="750" y="250" text-anchor="middle" class="text-label">Share Options</text>
  
  <rect class="delivery" x="570" y="270" width="180" height="80" rx="4"/>
  <text x="660" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">Share Links</text>
  <text x="660" y="315" text-anchor="middle" class="sublabel">Generate URL</text>
  <text x="660" y="335" text-anchor="middle" class="sublabel">Expiration, Password</text>
  
  <rect class="delivery" x="780" y="270" width="150" height="80" rx="4"/>
  <text x="855" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">Embed Reports</text>
  <text x="855" y="315" text-anchor="middle" class="sublabel">Embed Code</text>
  <text x="855" y="335" text-anchor="middle" class="sublabel">iframe Embed</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Scheduling and Delivery Infrastructure</text>
</svg>
