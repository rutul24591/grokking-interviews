<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .fixed { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .custom { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .hybrid { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Fixed Layout -->
  <rect class="fixed" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Fixed Layout</text>
  
  <rect class="fixed" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Predefined Dashboard</text>
  
  <rect class="fixed" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Consistent Experience</text>
  
  <rect class="fixed" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Easier to Support</text>
  
  <!-- Customizable Layout -->
  <rect class="custom" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Customizable Layout</text>
  
  <rect class="custom" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">User-Customizable</text>
  
  <rect class="custom" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Drag-Drop Widgets</text>
  
  <rect class="custom" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Flexible Layouts</text>
  
  <!-- Hybrid Layout -->
  <rect class="hybrid" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Hybrid Approach</text>
  
  <rect class="hybrid" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Templates + Custom</text>
  
  <rect class="hybrid" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Best of Both</text>
  
  <rect class="hybrid" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Recommended</text>
  
  <!-- Comparison Table -->
  <rect class="fixed" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Layout Comparison</text>
  
  <!-- Header -->
  <rect class="fixed" x="60" y="320" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Approach</text>
  <text x="300" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Pros</text>
  <text x="500" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Cons</text>
  <text x="700" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Best For</text>
  <text x="880" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Complexity</text>
  
  <!-- Row 1 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Fixed</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel">Consistent, Easy</text>
  <text x="500" y="380" text-anchor="middle" class="sublabel">Inflexible</text>
  <text x="700" y="380" text-anchor="middle" class="sublabel">Support Centers</text>
  <text x="880" y="380" text-anchor="middle" class="sublabel">Low</text>
  
  <!-- Row 2 -->
  <text x="150" y="400" text-anchor="middle" class="sublabel">Customizable</text>
  <text x="300" y="400" text-anchor="middle" class="sublabel">Flexible, UX</text>
  <text x="500" y="400" text-anchor="middle" class="sublabel">Complex, Support</text>
  <text x="700" y="400" text-anchor="middle" class="sublabel">Power Users</text>
  <text x="880" y="400" text-anchor="middle" class="sublabel">High</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 4: Dashboard Views Comparison</text>
</svg>
