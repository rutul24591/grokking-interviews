<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .auth { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .authz { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .audit { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Authentication -->
  <rect class="auth" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Authentication</text>
  
  <rect class="auth" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">MFA Required (TOTP, SMS)</text>
  
  <rect class="auth" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Session Management</text>
  
  <rect class="auth" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">SSO Integration (SAML, OIDC)</text>
  
  <!-- Authorization -->
  <rect class="authz" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Authorization (RBAC)</text>
  
  <rect class="authz" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Role Definitions</text>
  
  <rect class="authz" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Permission Checks</text>
  
  <rect class="authz" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Backend Enforcement</text>
  
  <!-- Audit Logging -->
  <rect class="audit" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Audit Logging</text>
  
  <rect class="audit" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">All Actions Logged</text>
  
  <rect class="audit" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Immutable Storage</text>
  
  <rect class="audit" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">7+ Years Retention</text>
  
  <!-- Access Flow -->
  <rect class="auth" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Access Control Flow</text>
  
  <!-- Step 1 -->
  <rect class="auth" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">1. User Login</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">MFA Verification</text>
  
  <!-- Step 2 -->
  <rect class="authz" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">2. Role Check</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Permission Validation</text>
  
  <!-- Step 3 -->
  <rect class="audit" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">3. Action Execution</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Backend Enforcement</text>
  
  <!-- Step 4 -->
  <rect class="audit" x="760" y="330" width="170" height="60" rx="4"/>
  <text x="845" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">4. Audit Log</text>
  <text x="845" y="375" text-anchor="middle" class="sublabel">Immutable Record</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M270 360 L295 360"/>
  <path class="arrow" d="M500 360 L525 360"/>
  <path class="arrow" d="M730 360 L755 360"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Access Control and Security Flow</text>
</svg>
