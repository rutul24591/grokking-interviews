<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .models { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .thresholds { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .human { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- ML Models -->
  <rect class="models" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">ML Models</text>
  
  <rect class="models" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Hate Speech Detection</text>
  
  <rect class="models" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Nudity Detection</text>
  
  <rect class="models" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Violence Detection</text>
  
  <!-- ML Thresholds -->
  <rect class="thresholds" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">ML Thresholds</text>
  
  <rect class="thresholds" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">High Confidence (Auto-Action)</text>
  
  <rect class="thresholds" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Medium Confidence (Human Review)</text>
  
  <rect class="thresholds" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Low Confidence (Approve)</text>
  
  <!-- Human Review -->
  <rect class="human" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Human Review</text>
  
  <rect class="human" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Edge Cases to Moderators</text>
  
  <rect class="human" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Human Review Workflow</text>
  
  <rect class="human" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Human Decision</text>
  
  <!-- ML Moderation Flow -->
  <rect class="models" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">ML-Based Moderation Flow</text>
  
  <!-- Flow -->
  <rect class="models" x="70" y="330" width="260" height="60" rx="4"/>
  <rect class="thresholds" x="340" y="330" width="260" height="60" rx="4"/>
  <rect class="human" x="610" y="330" width="260" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">ML Models → ML Thresholds → Human Review</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">ML Models</text>
  <text x="340" y="410" text-anchor="middle" class="sublabel">ML Thresholds</text>
  <text x="610" y="410" text-anchor="end" class="sublabel">Human Review</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: ML-Based Moderation</text>
</svg>
