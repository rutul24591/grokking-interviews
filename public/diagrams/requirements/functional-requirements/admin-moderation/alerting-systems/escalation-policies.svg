<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .levels { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .timing { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .notification { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Escalation Levels -->
  <rect class="levels" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Escalation Levels</text>
  
  <rect class="levels" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Level 1: On-Call</text>
  
  <rect class="levels" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Level 2: Team Lead</text>
  
  <rect class="levels" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Level 3: Management</text>
  
  <!-- Escalation Timing -->
  <rect class="timing" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Escalation Timing</text>
  
  <rect class="timing" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">5 Minutes: Level 1</text>
  
  <rect class="timing" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">15 Minutes: Level 2</text>
  
  <rect class="timing" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">30 Minutes: Level 3</text>
  
  <!-- Escalation Notification -->
  <rect class="notification" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Escalation Notification</text>
  
  <rect class="notification" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Email Notification</text>
  
  <rect class="notification" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">SMS Notification</text>
  
  <rect class="notification" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Push Notification</text>
  
  <!-- Escalation Policies Flow -->
  <rect class="levels" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Escalation Policies</text>
  
  <!-- Flow -->
  <rect class="levels" x="70" y="330" width="280" height="60" rx="4"/>
  <rect class="timing" x="360" y="330" width="280" height="60" rx="4"/>
  <rect class="notification" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Escalation Levels → Escalation Timing → Escalation Notification</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Escalation Levels</text>
  <text x="360" y="410" text-anchor="middle" class="sublabel">Escalation Timing</text>
  <text x="650" y="410" text-anchor="end" class="sublabel">Escalation Notification</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Escalation Policies</text>
</svg>
