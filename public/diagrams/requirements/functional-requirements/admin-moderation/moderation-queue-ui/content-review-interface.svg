<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .content { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .context { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .actions { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Content Display -->
  <rect class="content" x="50" y="50" width="300" height="180" rx="8"/>
  <text x="200" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Content Display</text>
  
  <rect class="content" x="70" y="100" width="260" height="35" rx="4"/>
  <text x="200" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Full Content (Text/Image/Video)</text>
  
  <rect class="content" x="70" y="145" width="260" height="35" rx="4"/>
  <text x="200" y="167" text-anchor="middle" class="sublabel">Media Viewer / Player</text>
  
  <rect class="content" x="70" y="190" width="260" height="35" rx="4"/>
  <text x="200" y="212" text-anchor="middle" class="sublabel">Related Content / Thread</text>
  
  <!-- User Context -->
  <rect class="context" x="400" y="50" width="250" height="180" rx="8"/>
  <text x="525" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">User Context</text>
  
  <rect class="context" x="420" y="100" width="210" height="35" rx="4"/>
  <text x="525" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">User Profile</text>
  
  <rect class="context" x="420" y="145" width="210" height="35" rx="4"/>
  <text x="525" y="167" text-anchor="middle" class="sublabel">Violation History</text>
  
  <rect class="context" x="420" y="190" width="210" height="35" rx="4"/>
  <text x="525" y="212" text-anchor="middle" class="sublabel">Account Details</text>
  
  <!-- Reports -->
  <rect class="context" x="700" y="50" width="250" height="180" rx="8"/>
  <text x="825" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Reports</text>
  
  <rect class="context" x="720" y="100" width="210" height="35" rx="4"/>
  <text x="825" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Report Count</text>
  
  <rect class="context" x="720" y="145" width="210" height="35" rx="4"/>
  <text x="825" y="167" text-anchor="middle" class="sublabel">Report Reasons</text>
  
  <rect class="context" x="720" y="190" width="210" height="35" rx="4"/>
  <text x="825" y="212" text-anchor="middle" class="sublabel">Reporter Info</text>
  
  <!-- Moderation Actions -->
  <rect class="actions" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Moderation Actions</text>
  
  <!-- Action Buttons -->
  <rect class="actions" x="70" y="330" width="180" height="60" rx="4"/>
  <text x="160" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Approve (A)</text>
  <text x="160" y="375" text-anchor="middle" class="sublabel">Content is fine</text>
  
  <rect class="actions" x="280" y="330" width="180" height="60" rx="4"/>
  <text x="370" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Remove (R)</text>
  <text x="370" y="375" text-anchor="middle" class="sublabel">Violates guidelines</text>
  
  <rect class="actions" x="490" y="330" width="180" height="60" rx="4"/>
  <text x="580" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Escalate (E)</text>
  <text x="580" y="375" text-anchor="middle" class="sublabel">Needs senior review</text>
  
  <rect class="actions" x="700" y="330" width="180" height="60" rx="4"/>
  <text x="790" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Skip (S)</text>
  <text x="790" y="375" text-anchor="middle" class="sublabel">Can&apos;t decide</text>
  
  <!-- Rationale Input -->
  <rect class="actions" x="50" y="380" width="450" height="50" rx="4"/>
  <text x="275" y="410" text-anchor="middle" class="sublabel">Rationale: Violation Type, Severity, Notes</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Content Review Interface</text>
</svg>
