<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .authentication { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .authorization { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .rate { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .audit { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- API Authentication -->
  <rect class="authentication" x="50" y="50" width="200" height="180" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">API Authentication</text>
  
  <rect class="authentication" x="70" y="100" width="160" height="35" rx="4"/>
  <text x="150" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">API Keys</text>
  
  <rect class="authentication" x="70" y="145" width="160" height="35" rx="4"/>
  <text x="150" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600">OAuth</text>
  
  <rect class="authentication" x="70" y="190" width="160" height="35" rx="4"/>
  <text x="150" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600">JWT</text>
  
  <!-- API Authorization -->
  <rect class="authorization" x="320" y="50" width="200" height="180" rx="8"/>
  <text x="420" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">API Authorization</text>
  
  <rect class="authorization" x="340" y="100" width="160" height="35" rx="4"/>
  <text x="420" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">RBAC</text>
  
  <rect class="authorization" x="340" y="145" width="160" height="35" rx="4"/>
  <text x="420" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600">Permissions</text>
  
  <rect class="authorization" x="340" y="190" width="160" height="35" rx="4"/>
  <text x="420" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600">Scope</text>
  
  <!-- Rate Limiting -->
  <rect class="rate" x="590" y="50" width="180" height="180" rx="8"/>
  <text x="680" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Rate Limiting</text>
  
  <rect class="rate" x="610" y="100" width="140" height="35" rx="4"/>
  <text x="680" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Per-User</text>
  
  <rect class="rate" x="610" y="145" width="140" height="35" rx="4"/>
  <text x="680" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600">Per-IP</text>
  
  <rect class="rate" x="610" y="190" width="140" height="35" rx="4"/>
  <text x="680" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600">Per-Endpoint</text>
  
  <!-- Audit Logging -->
  <rect class="audit" x="590" y="280" width="330" height="140" rx="8"/>
  <text x="755" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Audit Logging</text>
  
  <rect class="audit" x="610" y="330" width="140" height="35" rx="4"/>
  <text x="680" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600">Request Logging</text>
  
  <rect class="audit" x="765" y="330" width="140" height="35" rx="4"/>
  <text x="835" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600">Response Logging</text>
  
  <rect class="audit" x="610" y="375" width="140" height="35" rx="4"/>
  <text x="680" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600">Audit Logging</text>
  
  <rect class="audit" x="765" y="375" width="140" height="35" rx="4"/>
  <text x="835" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600">Audit Reporting</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M250 140 L315 140"/>
  <path class="arrow" d="M520 140 L605 140"/>
  <path class="arrow" d="M755 230 L755 275"/>
  <path class="arrow" d="M250 350 L315 350"/>
  
  <text x="500" y="480" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 1: Admin APIs Architecture</text>
</svg>
