<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .policy { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .deletion { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .legal { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Retention Policies -->
  <rect class="policy" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Retention Policies</text>
  
  <rect class="policy" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Compliance Retention</text>
  
  <rect class="policy" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Operational Retention</text>
  
  <rect class="policy" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Legal Retention</text>
  
  <!-- Automated Deletion -->
  <rect class="deletion" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Automated Deletion</text>
  
  <rect class="deletion" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Automated Deletion</text>
  
  <rect class="deletion" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Compliance Verification</text>
  
  <rect class="deletion" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Retention Reporting</text>
  
  <!-- Legal Hold -->
  <rect class="legal" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Legal Hold</text>
  
  <rect class="legal" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Legal Hold</text>
  
  <rect class="legal" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Litigation Hold</text>
  
  <rect class="legal" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Legal Release</text>
  
  <!-- Retention Timeline -->
  <rect class="policy" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Retention Timeline</text>
  
  <!-- Timeline -->
  <rect class="policy" x="70" y="330" width="860" height="60" rx="4"/>
  <rect class="deletion" x="70" y="330" width="286" height="60" rx="4"/>
  <rect class="legal" x="356" y="330" width="287" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Active → Retention → Deletion</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Active</text>
  <text x="500" y="410" text-anchor="middle" class="sublabel">Retention Period</text>
  <text x="930" y="410" text-anchor="end" class="sublabel">Deletion</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Retention Management</text>
</svg>
