<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .boolean { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .multivariate { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .rollout { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Boolean Feature Flags -->
  <rect class="boolean" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Boolean Feature Flags</text>
  
  <rect class="boolean" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">On/Off Toggle</text>
  
  <rect class="boolean" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Simple Feature Flags</text>
  
  <rect class="boolean" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Easy to Manage</text>
  
  <!-- Multivariate Feature Flags -->
  <rect class="multivariate" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Multivariate Feature Flags</text>
  
  <rect class="multivariate" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Multiple Variants</text>
  
  <rect class="multivariate" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">A/B Testing</text>
  
  <rect class="multivariate" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Complex Feature Flags</text>
  
  <!-- Rollout Feature Flags -->
  <rect class="rollout" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Rollout Feature Flags</text>
  
  <rect class="rollout" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Percentage-Based Rollout</text>
  
  <rect class="rollout" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Gradual Rollout</text>
  
  <rect class="rollout" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Canary Deployment</text>
  
  <!-- Feature Flags Flow -->
  <rect class="boolean" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Feature Flags Flow</text>
  
  <!-- Flow -->
  <rect class="boolean" x="70" y="330" width="280" height="60" rx="4"/>
  <rect class="multivariate" x="360" y="330" width="280" height="60" rx="4"/>
  <rect class="rollout" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Boolean Flags → Multivariate Flags → Rollout Flags</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Boolean Flags</text>
  <text x="360" y="410" text-anchor="middle" class="sublabel">Multivariate Flags</text>
  <text x="650" y="410" text-anchor="end" class="sublabel">Rollout Flags</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Feature Flags</text>
</svg>
