<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .versioning { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .history { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .rollback { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Configuration Versioning -->
  <rect class="versioning" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Configuration Versioning</text>
  
  <rect class="versioning" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Version Configuration</text>
  
  <rect class="versioning" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Version Tracking</text>
  
  <rect class="versioning" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Version Management</text>
  
  <!-- Configuration History -->
  <rect class="history" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Configuration History</text>
  
  <rect class="history" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Track Configuration Changes</text>
  
  <rect class="history" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Historical Versions</text>
  
  <rect class="history" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Audit Trail</text>
  
  <!-- Configuration Rollback -->
  <rect class="rollback" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Configuration Rollback</text>
  
  <rect class="rollback" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Rollback to Previous Version</text>
  
  <rect class="rollback" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Rollback Validation</text>
  
  <rect class="rollback" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Rollback Enforcement</text>
  
  <!-- Configuration Versioning Flow -->
  <rect class="versioning" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Configuration Versioning Flow</text>
  
  <!-- Flow -->
  <rect class="versioning" x="70" y="330" width="280" height="60" rx="4"/>
  <rect class="history" x="360" y="330" width="280" height="60" rx="4"/>
  <rect class="rollback" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Versioning → History → Rollback</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Versioning</text>
  <text x="360" y="410" text-anchor="middle" class="sublabel">History</text>
  <text x="650" y="410" text-anchor="end" class="sublabel">Rollback</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Configuration Versioning</text>
</svg>
