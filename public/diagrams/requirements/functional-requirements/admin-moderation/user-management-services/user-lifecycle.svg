<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .onboarding { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .activation { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .deactivation { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .deletion { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- User Onboarding -->
  <rect class="onboarding" x="50" y="50" width="200" height="180" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">User Onboarding</text>
  
  <rect class="onboarding" x="70" y="100" width="160" height="35" rx="4"/>
  <text x="150" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Create User Account</text>
  
  <rect class="onboarding" x="70" y="145" width="160" height="35" rx="4"/>
  <text x="150" y="167" text-anchor="middle" class="sublabel">Assign Initial Role</text>
  
  <rect class="onboarding" x="70" y="190" width="160" height="35" rx="4"/>
  <text x="150" y="212" text-anchor="middle" class="sublabel">Send Welcome Email</text>
  
  <!-- User Activation -->
  <rect class="activation" x="300" y="50" width="200" height="180" rx="8"/>
  <text x="400" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">User Activation</text>
  
  <rect class="activation" x="320" y="100" width="160" height="35" rx="4"/>
  <text x="400" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Verify Email</text>
  
  <rect class="activation" x="320" y="145" width="160" height="35" rx="4"/>
  <text x="400" y="167" text-anchor="middle" class="sublabel">Activate Account</text>
  
  <rect class="activation" x="320" y="190" width="160" height="35" rx="4"/>
  <text x="400" y="212" text-anchor="middle" class="sublabel">Enable Login</text>
  
  <!-- User Deactivation -->
  <rect class="deactivation" x="550" y="50" width="200" height="180" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">User Deactivation</text>
  
  <rect class="deactivation" x="570" y="100" width="160" height="35" rx="4"/>
  <text x="650" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Disable Login</text>
  
  <rect class="deactivation" x="570" y="145" width="160" height="35" rx="4"/>
  <text x="650" y="167" text-anchor="middle" class="sublabel">Preserve Data</text>
  
  <rect class="deactivation" x="570" y="190" width="160" height="35" rx="4"/>
  <text x="650" y="212" text-anchor="middle" class="sublabel">Notify User</text>
  
  <!-- User Deletion -->
  <rect class="deletion" x="800" y="50" width="170" height="180" rx="8"/>
  <text x="885" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">User Deletion</text>
  
  <rect class="deletion" x="815" y="100" width="140" height="35" rx="4"/>
  <text x="885" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Delete User Data</text>
  
  <rect class="deletion" x="815" y="145" width="140" height="35" rx="4"/>
  <text x="885" y="167" text-anchor="middle" class="sublabel">Remove from System</text>
  
  <rect class="deletion" x="815" y="190" width="140" height="35" rx="4"/>
  <text x="885" y="212" text-anchor="middle" class="sublabel">Audit Deletion</text>
  
  <!-- User Lifecycle Flow -->
  <rect class="onboarding" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">User Lifecycle Flow</text>
  
  <!-- Flow -->
  <rect class="onboarding" x="70" y="330" width="210" height="60" rx="4"/>
  <rect class="activation" x="290" y="330" width="210" height="60" rx="4"/>
  <rect class="deactivation" x="510" y="330" width="210" height="60" rx="4"/>
  <rect class="deletion" x="730" y="330" width="210" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Onboarding → Activation → Deactivation → Deletion</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Onboarding</text>
  <text x="290" y="410" text-anchor="middle" class="sublabel">Activation</text>
  <text x="510" y="410" text-anchor="middle" class="sublabel">Deactivation</text>
  <text x="730" y="410" text-anchor="end" class="sublabel">Deletion</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: User Lifecycle</text>
</svg>
