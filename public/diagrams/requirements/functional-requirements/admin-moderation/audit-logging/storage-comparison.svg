<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .database { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .filesystem { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .dedicated { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Database Storage -->
  <rect class="database" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Database Storage</text>
  
  <rect class="database" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Queryable (SQL)</text>
  
  <rect class="database" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Structured Data</text>
  
  <rect class="database" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Database Cost</text>
  
  <!-- File System Storage -->
  <rect class="filesystem" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">File System Storage</text>
  
  <rect class="filesystem" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Not Queryable</text>
  
  <rect class="filesystem" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Unstructured Data</text>
  
  <rect class="filesystem" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Low Cost</text>
  
  <!-- Dedicated Service -->
  <rect class="dedicated" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Dedicated Service</text>
  
  <rect class="dedicated" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Optimized for Logs</text>
  
  <rect class="dedicated" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Compliance-Compliant</text>
  
  <rect class="dedicated" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Service Cost</text>
  
  <!-- Comparison Table -->
  <rect class="database" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Storage Comparison</text>
  
  <!-- Header -->
  <rect class="database" x="60" y="320" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Storage Type</text>
  <text x="300" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Queryable</text>
  <text x="450" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Cost</text>
  <text x="600" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Best For</text>
  <text x="800" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Use Case</text>
  
  <!-- Row 1 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Database</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Yes (SQL)</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e">High</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel">Structured Logs</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel">Query-Intensive</text>
  
  <!-- Row 2 -->
  <text x="150" y="400" text-anchor="middle" class="sublabel">File System</text>
  <text x="300" y="400" text-anchor="middle" class="sublabel" fill="#e53e3e">No</text>
  <text x="450" y="400" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Low</text>
  <text x="600" y="400" text-anchor="middle" class="sublabel">Unstructured</text>
  <text x="800" y="400" text-anchor="middle" class="sublabel">Archive</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 4: Storage Comparison</text>
</svg>
