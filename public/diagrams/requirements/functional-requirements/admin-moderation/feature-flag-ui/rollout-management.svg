<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .config { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .monitoring { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .rollback { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Rollout Configuration -->
  <rect class="config" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Rollout Configuration</text>
  
  <rect class="config" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Percentage Slider</text>
  
  <rect class="config" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Schedule Rollout</text>
  
  <rect class="config" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Milestone Tracking</text>
  
  <!-- Rollout Monitoring -->
  <rect class="monitoring" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Rollout Monitoring</text>
  
  <rect class="monitoring" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Progress Tracking</text>
  
  <rect class="monitoring" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Metric Tracking</text>
  
  <rect class="monitoring" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Alerts</text>
  
  <!-- Rollback Management -->
  <rect class="rollback" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Rollback Management</text>
  
  <rect class="rollback" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Manual Rollback</text>
  
  <rect class="rollback" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Automatic Rollback</text>
  
  <rect class="rollback" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Post-Rollback Review</text>
  
  <!-- Rollout Progress -->
  <rect class="config" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Rollout Progress Visualization</text>
  
  <!-- Progress Bar -->
  <rect class="config" x="70" y="330" width="860" height="60" rx="4"/>
  <rect class="monitoring" x="70" y="330" width="430" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600">50% Rollout Progress</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">0%</text>
  <text x="500" y="410" text-anchor="middle" class="sublabel">50%</text>
  <text x="930" y="410" text-anchor="end" class="sublabel">100%</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Rollout Management</text>
</svg>
