<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .context { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .rules { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .result { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- User Context -->
  <rect class="context" x="50" y="50" width="200" height="120" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label">User Context</text>
  <text x="150" y="105" text-anchor="middle" class="sublabel">User ID</text>
  <text x="150" y="125" text-anchor="middle" class="sublabel">Attributes</text>
  <text x="150" y="145" text-anchor="middle" class="sublabel">Segments</text>
  
  <!-- Rule Evaluation -->
  <rect class="rules" x="300" y="50" width="200" height="120" rx="8"/>
  <text x="400" y="80" text-anchor="middle" class="text-label">Rule Evaluation</text>
  <text x="400" y="105" text-anchor="middle" class="sublabel">Targeting Rules</text>
  <text x="400" y="125" text-anchor="middle" class="sublabel">Rollout Percentage</text>
  <text x="400" y="145" text-anchor="middle" class="sublabel">Rule Order</text>
  
  <!-- Evaluation Result -->
  <rect class="result" x="550" y="50" width="200" height="120" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="text-label">Evaluation Result</text>
  <text x="650" y="105" text-anchor="middle" class="sublabel">Flag Value</text>
  <text x="650" y="125" text-anchor="middle" class="sublabel">Variant (if multivariate)</text>
  <text x="650" y="145" text-anchor="middle" class="sublabel">Cache Result</text>
  
  <!-- Arrows between steps -->
  <path class="arrow" d="M250 110 L295 110"/>
  <path class="arrow" d="M500 110 L545 110"/>
  
  <!-- Rule Types -->
  <rect class="context" x="50" y="220" width="450" height="150" rx="8"/>
  <text x="275" y="250" text-anchor="middle" class="text-label">Targeting Rule Types</text>
  
  <rect class="context" x="70" y="270" width="200" height="80" rx="4"/>
  <text x="170" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">User Targeting</text>
  <text x="170" y="315" text-anchor="middle" class="sublabel">User ID, Email</text>
  <text x="170" y="335" text-anchor="middle" class="sublabel">Segments</text>
  
  <rect class="rules" x="300" y="270" width="180" height="80" rx="4"/>
  <text x="390" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">Percentage Rollout</text>
  <text x="390" y="315" text-anchor="middle" class="sublabel">Percentage Slider</text>
  <text x="390" y="335" text-anchor="middle" class="sublabel">Gradual Rollout</text>
  
  <!-- Geographic Targeting -->
  <rect class="result" x="550" y="220" width="400" height="150" rx="8"/>
  <text x="750" y="250" text-anchor="middle" class="text-label">Geographic Targeting</text>
  
  <rect class="result" x="570" y="270" width="180" height="80" rx="4"/>
  <text x="660" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">Country</text>
  <text x="660" y="315" text-anchor="middle" class="sublabel">Target by Country</text>
  <text x="660" y="335" text-anchor="middle" class="sublabel">Multiple Countries</text>
  
  <rect class="result" x="780" y="270" width="150" height="80" rx="4"/>
  <text x="855" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">Region/City</text>
  <text x="855" y="315" text-anchor="middle" class="sublabel">Region Targeting</text>
  <text x="855" y="335" text-anchor="middle" class="sublabel">City Targeting</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Flag Evaluation Flow</text>
</svg>
