<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .pipeline { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .aggregation { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .visualization { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .realtime { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Data Pipeline -->
  <rect class="pipeline" x="50" y="50" width="200" height="180" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Data Pipeline</text>
  
  <rect class="pipeline" x="70" y="100" width="160" height="35" rx="4"/>
  <text x="150" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Event Collection</text>
  
  <rect class="pipeline" x="70" y="145" width="160" height="35" rx="4"/>
  <text x="150" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600">Event Streaming</text>
  
  <rect class="pipeline" x="70" y="190" width="160" height="35" rx="4"/>
  <text x="150" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600">Data Storage</text>
  
  <!-- Aggregation Layer -->
  <rect class="aggregation" x="320" y="50" width="200" height="180" rx="8"/>
  <text x="420" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Aggregation Layer</text>
  
  <rect class="aggregation" x="340" y="100" width="160" height="35" rx="4"/>
  <text x="420" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Real-time Aggregation</text>
  
  <rect class="aggregation" x="340" y="145" width="160" height="35" rx="4"/>
  <text x="420" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600">Batch Aggregation</text>
  
  <rect class="aggregation" x="340" y="190" width="160" height="35" rx="4"/>
  <text x="420" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600">Pre-computation</text>
  
  <!-- Visualization Layer -->
  <rect class="visualization" x="590" y="50" width="180" height="180" rx="8"/>
  <text x="680" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Visualization</text>
  
  <rect class="visualization" x="610" y="100" width="140" height="35" rx="4"/>
  <text x="680" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Chart Library</text>
  
  <rect class="visualization" x="610" y="145" width="140" height="35" rx="4"/>
  <text x="680" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600">Dashboard Layout</text>
  
  <rect class="visualization" x="610" y="190" width="140" height="35" rx="4"/>
  <text x="680" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600">Interactivity</text>
  
  <!-- Real-time Updates -->
  <rect class="realtime" x="590" y="280" width="330" height="140" rx="8"/>
  <text x="755" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Real-time Updates</text>
  
  <rect class="realtime" x="610" y="330" width="140" height="35" rx="4"/>
  <text x="680" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600">WebSocket</text>
  
  <rect class="realtime" x="765" y="330" width="140" height="35" rx="4"/>
  <text x="835" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600">Update Frequency</text>
  
  <rect class="realtime" x="610" y="375" width="140" height="35" rx="4"/>
  <text x="680" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600">Caching</text>
  
  <rect class="realtime" x="765" y="375" width="140" height="35" rx="4"/>
  <text x="835" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600">Fallback to Polling</text>
  
  <!-- Data Sources -->
  <rect class="pipeline" x="50" y="280" width="200" height="140" rx="8"/>
  <text x="150" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Data Sources</text>
  
  <rect class="pipeline" x="70" y="340" width="160" height="35" rx="4"/>
  <text x="150" y="362" text-anchor="middle" class="sublabel" style="font-weight: 600">User Service</text>
  
  <rect class="pipeline" x="70" y="385" width="160" height="35" rx="4"/>
  <text x="150" y="407" text-anchor="middle" class="sublabel" style="font-weight: 600">Content Service</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M250 140 L315 140"/>
  <path class="arrow" d="M520 140 L605 140"/>
  <path class="arrow" d="M755 230 L755 275"/>
  <path class="arrow" d="M250 350 L315 350"/>
  
  <text x="500" y="480" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 1: Analytics Dashboard Architecture</text>
</svg>
