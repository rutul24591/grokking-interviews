<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .compliance { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .enforcement { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .verification { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .reporting { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Legal Compliance -->
  <rect class="compliance" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Legal Compliance</text>
  
  <rect class="compliance" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Comply with Legal Obligations</text>
  
  <rect class="compliance" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Legal Compliance Enforcement</text>
  
  <rect class="compliance" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Legal Compliance Verification</text>
  
  <!-- Enforcement -->
  <rect class="enforcement" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Enforcement</text>
  
  <rect class="enforcement" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Enforce Legal Compliance</text>
  
  <rect class="enforcement" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Enforcement Verification</text>
  
  <rect class="enforcement" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Enforcement Reporting</text>
  
  <!-- Verification -->
  <rect class="verification" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Verification</text>
  
  <rect class="verification" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Verify Legal Compliance</text>
  
  <rect class="verification" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Verification Reporting</text>
  
  <rect class="verification" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Verification Audit</text>
  
  <!-- Legal Compliance Flow -->
  <rect class="compliance" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Legal Compliance Flow</text>
  
  <!-- Flow -->
  <rect class="compliance" x="70" y="330" width="210" height="60" rx="4"/>
  <rect class="enforcement" x="290" y="330" width="210" height="60" rx="4"/>
  <rect class="verification" x="510" y="330" width="210" height="60" rx="4"/>
  <rect class="reporting" x="730" y="330" width="210" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Compliance → Enforcement → Verification → Reporting</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Compliance</text>
  <text x="290" y="410" text-anchor="middle" class="sublabel">Enforcement</text>
  <text x="510" y="410" text-anchor="middle" class="sublabel">Verification</text>
  <text x="730" y="410" text-anchor="end" class="sublabel">Reporting</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Legal Compliance</text>
</svg>
