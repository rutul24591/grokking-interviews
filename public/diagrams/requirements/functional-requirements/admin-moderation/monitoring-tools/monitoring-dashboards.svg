<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .realtime { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .historical { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .custom { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Real-Time Dashboards -->
  <rect class="realtime" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Real-Time Dashboards</text>
  
  <rect class="realtime" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Live Metrics</text>
  
  <rect class="realtime" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Real-Time Updates</text>
  
  <rect class="realtime" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Current Status</text>
  
  <!-- Historical Dashboards -->
  <rect class="historical" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Historical Dashboards</text>
  
  <rect class="historical" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Historical Metrics</text>
  
  <rect class="historical" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Trend Analysis</text>
  
  <rect class="historical" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Historical Reports</text>
  
  <!-- Custom Dashboards -->
  <rect class="custom" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Custom Dashboards</text>
  
  <rect class="custom" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Custom Metrics</text>
  
  <rect class="custom" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Custom Layouts</text>
  
  <rect class="custom" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Custom Widgets</text>
  
  <!-- Monitoring Dashboards Flow -->
  <rect class="realtime" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Monitoring Dashboards</text>
  
  <!-- Flow -->
  <rect class="realtime" x="70" y="330" width="280" height="60" rx="4"/>
  <rect class="historical" x="360" y="330" width="280" height="60" rx="4"/>
  <rect class="custom" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Real-Time Dashboards → Historical Dashboards → Custom Dashboards</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Real-Time Dashboards</text>
  <text x="360" y="410" text-anchor="middle" class="sublabel">Historical Dashboards</text>
  <text x="650" y="410" text-anchor="end" class="sublabel">Custom Dashboards</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Monitoring Dashboards</text>
</svg>
