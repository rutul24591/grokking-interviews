<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .healthy { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .degraded { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .failed { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Health Monitoring -->
  <rect class="healthy" x="50" y="50" width="180" height="120" rx="8"/>
  <text x="140" y="80" text-anchor="middle" class="text-label">Health Monitoring</text>
  <text x="140" y="105" text-anchor="middle" class="sublabel">Every 30 seconds</text>
  <text x="140" y="125" text-anchor="middle" class="sublabel">Latency, Errors, Auth</text>
  <text x="140" y="145" text-anchor="middle" class="sublabel">Thresholds set</text>
  
  <!-- Gateway Healthy -->
  <rect class="healthy" x="280" y="50" width="200" height="120" rx="8"/>
  <text x="380" y="80" text-anchor="middle" class="text-label">Gateway Healthy ✓</text>
  <text x="380" y="105" text-anchor="middle" class="sublabel">Latency &lt; 5s</text>
  <text x="380" y="125" text-anchor="middle" class="sublabel">Error rate &lt; 5%</text>
  <text x="380" y="145" text-anchor="middle" class="sublabel">Continue normal routing</text>
  
  <!-- Gateway Degraded -->
  <rect class="degraded" x="530" y="50" width="200" height="120" rx="8"/>
  <text x="630" y="80" text-anchor="middle" class="text-label">Gateway Degraded ⚠</text>
  <text x="630" y="105" text-anchor="middle" class="sublabel">Latency &gt; 5s</text>
  <text x="630" y="125" text-anchor="middle" class="sublabel">Auth rate drop &gt; 10%</text>
  <text x="630" y="145" text-anchor="middle" class="sublabel">Reduce traffic (50%)</text>
  
  <!-- Gateway Failed -->
  <rect class="failed" x="780" y="50" width="180" height="120" rx="8"/>
  <text x="870" y="80" text-anchor="middle" class="text-label">Gateway Failed ✗</text>
  <text x="870" y="105" text-anchor="middle" class="sublabel">Error rate &gt; 5%</text>
  <text x="870" y="125" text-anchor="middle" class="sublabel">Health check failed</text>
  <text x="870" y="145" text-anchor="middle" class="sublabel">Trigger failover</text>
  
  <!-- Failover Process -->
  <rect class="degraded" x="280" y="220" width="450" height="150" rx="8"/>
  <text x="505" y="250" text-anchor="middle" class="text-label">Automatic Failover Process</text>
  
  <rect class="failed" x="300" y="270" width="130" height="80" rx="4"/>
  <text x="365" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">1. Detect Failure</text>
  <text x="365" y="315" text-anchor="middle" class="sublabel">Health check fails</text>
  <text x="365" y="335" text-anchor="middle" class="sublabel">Alert team</text>
  
  <rect class="degraded" x="440" y="270" width="130" height="80" rx="4"/>
  <text x="505" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">2. Switch Gateway</text>
  <text x="505" y="315" text-anchor="middle" class="sublabel">Route to backup</text>
  <text x="505" y="335" text-anchor="middle" class="sublabel">Retry transactions</text>
  
  <rect class="healthy" x="580" y="270" width="130" height="80" rx="4"/>
  <text x="645" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">3. Monitor Recovery</text>
  <text x="645" y="315" text-anchor="middle" class="sublabel">Health checks pass</text>
  <text x="645" y="335" text-anchor="middle" class="sublabel">Gradual traffic shift</text>
  
  <!-- Recovery Flow -->
  <rect class="healthy" x="280" y="380" width="200" height="50" rx="4"/>
  <text x="380" y="410" text-anchor="middle" class="sublabel">Gateway Recovers → Gradual Traffic (10% → 50% → 100%)</text>
  
  <rect class="failed" x="530" y="380" width="200" height="50" rx="4"/>
  <text x="630" y="410" text-anchor="middle" class="sublabel">Gateway Still Failed → Stay on Backup</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 110 L275 110"/>
  <path class="arrow" d="M480 110 L525 110"/>
  <path class="arrow" d="M730 110 L775 110"/>
  
  <path class="arrow" d="M380 170 L380 215"/>
  <path class="arrow" d="M630 170 L630 215"/>
  <path class="arrow" d="M870 170 L870 215"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 4: Failover Flow</text>
</svg>
