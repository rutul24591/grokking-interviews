<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .stripe { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .paypal { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .adyen { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Stripe -->
  <rect class="stripe" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Stripe</text>
  
  <rect class="stripe" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Fees: 2.9% + $0.30</text>
  
  <rect class="stripe" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Coverage: 135+ currencies</text>
  
  <rect class="stripe" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Features: Cards, Wallets, Recurring</text>
  
  <!-- PayPal -->
  <rect class="paypal" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">PayPal</text>
  
  <rect class="paypal" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Fees: 2.9% + $0.30</text>
  
  <rect class="paypal" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Coverage: 200+ countries</text>
  
  <rect class="paypal" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Features: PayPal, Venmo, Cards</text>
  
  <!-- Adyen -->
  <rect class="adyen" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Adyen</text>
  
  <rect class="adyen" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Fees: Interchange++</text>
  
  <rect class="adyen" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Coverage: Global</text>
  
  <rect class="adyen" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Features: Local methods, Enterprise</text>
  
  <!-- Comparison Table -->
  <rect class="stripe" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px">Gateway Comparison</text>
  
  <!-- Header -->
  <rect class="stripe" x="60" y="310" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Gateway</text>
  <text x="300" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Fees</text>
  <text x="450" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Coverage</text>
  <text x="650" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Best For</text>
  <text x="850" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Auth Rate</text>
  
  <!-- Row 1 -->
  <text x="150" y="370" text-anchor="middle" class="sublabel">Stripe</text>
  <text x="300" y="370" text-anchor="middle" class="sublabel">2.9% + $0.30</text>
  <text x="450" y="370" text-anchor="middle" class="sublabel">135+ currencies</text>
  <text x="650" y="370" text-anchor="middle" class="sublabel">Developers, Startups</text>
  <text x="850" y="370" text-anchor="middle" class="sublabel">High</text>
  
  <!-- Row 2 -->
  <text x="150" y="395" text-anchor="middle" class="sublabel">PayPal</text>
  <text x="300" y="395" text-anchor="middle" class="sublabel">2.9% + $0.30</text>
  <text x="450" y="395" text-anchor="middle" class="sublabel">200+ countries</text>
  <text x="650" y="395" text-anchor="middle" class="sublabel">Consumer trust</text>
  <text x="850" y="395" text-anchor="middle" class="sublabel">Medium-High</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Gateway Comparison</text>
</svg>
