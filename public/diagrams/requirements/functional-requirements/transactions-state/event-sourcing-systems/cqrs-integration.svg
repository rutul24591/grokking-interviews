<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .write { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .read { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Write Model -->
  <rect class="write" x="50" y="50" width="400" height="180" rx="8"/>
  <text x="250" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Write Model</text>
  
  <rect class="write" x="70" y="100" width="360" height="35" rx="4"/>
  <text x="250" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Optimized for Writes</text>
  
  <rect class="write" x="70" y="145" width="360" height="35" rx="4"/>
  <text x="250" y="167" text-anchor="middle" class="sublabel">Handles Commands</text>
  
  <rect class="write" x="70" y="190" width="360" height="35" rx="4"/>
  <text x="250" y="212" text-anchor="middle" class="sublabel">Append Events to Event Store</text>
  
  <!-- Read Model -->
  <rect class="read" x="550" y="50" width="400" height="180" rx="8"/>
  <text x="750" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Read Model</text>
  
  <rect class="read" x="570" y="100" width="360" height="35" rx="4"/>
  <text x="750" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Optimized for Reads</text>
  
  <rect class="read" x="570" y="145" width="360" height="35" rx="4"/>
  <text x="750" y="167" text-anchor="middle" class="sublabel">Handles Queries</text>
  
  <rect class="read" x="570" y="190" width="360" height="35" rx="4"/>
  <text x="750" y="212" text-anchor="middle" class="sublabel">Built from Events (Projections)</text>
  
  <!-- Event Flow -->
  <rect class="write" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px">Event Flow</text>
  
  <!-- Command -->
  <rect class="write" x="70" y="320" width="200" height="70" rx="4"/>
  <text x="170" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Command</text>
  <text x="170" y="365" text-anchor="middle" class="sublabel">Create, Update, Delete</text>
  <text x="170" y="380" text-anchor="middle" class="sublabel">Write Model</text>
  
  <!-- Events -->
  <rect class="read" x="300" y="320" width="200" height="70" rx="4"/>
  <text x="400" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Events</text>
  <text x="400" y="365" text-anchor="middle" class="sublabel">Appended to Event Store</text>
  <text x="400" y="380" text-anchor="middle" class="sublabel">Append-Only</text>
  
  <!-- Projections -->
  <rect class="read" x="530" y="320" width="200" height="70" rx="4"/>
  <text x="630" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Projections</text>
  <text x="630" y="365" text-anchor="middle" class="sublabel">Build Read Models</text>
  <text x="630" y="380" text-anchor="middle" class="sublabel">From Events</text>
  
  <!-- Query -->
  <rect class="read" x="760" y="320" width="170" height="70" rx="4"/>
  <text x="845" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Query</text>
  <text x="845" y="365" text-anchor="middle" class="sublabel">Read Model</text>
  <text x="845" y="380" text-anchor="middle" class="sublabel">Read Model</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M270 355 L295 355"/>
  <path class="arrow" d="M500 355 L525 355"/>
  <path class="arrow" d="M730 355 L755 355"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: CQRS Integration</text>
</svg>
