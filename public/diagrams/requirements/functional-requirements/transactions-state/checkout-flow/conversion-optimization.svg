<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .box { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .box-dark { fill: #2d3748; stroke: #718096; stroke-width: 2; }
      .highlight { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .highlight-dark { fill: #744210; stroke: #ecc94b; stroke-width: 2; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .label-dark { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #e2e8f0; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
      .sublabel-dark { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #a0aec0; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  <rect class="bg-dark" width="1000" height="450" data-theme="dark" style="display:none;"/>
  
  <!-- Guest Checkout -->
  <rect class="box" x="50" y="50" width="280" height="140" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Guest Checkout</text>
  
  <rect class="highlight" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">+25-30% Conversion</text>
  
  <rect class="highlight" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600;">Lower friction, no account</text>
  
  <!-- Account Required -->
  <rect class="box" x="380" y="50" width="280" height="140" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Account Required</text>
  
  <rect class="box" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">-25-30% Conversion</text>
  
  <rect class="box" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600;">Order history, loyalty</text>
  
  <!-- Hybrid Approach -->
  <rect class="highlight" x="710" y="50" width="240" height="140" rx="8" stroke-width="3"/>
  <text x="830" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Hybrid (Recommended)</text>
  
  <rect class="highlight" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Guest + post-purchase</text>
  
  <rect class="highlight" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600;">3-5x higher opt-in</text>
  
  <!-- Multi-Step Checkout -->
  <rect class="box" x="50" y="230" width="440" height="180" rx="8"/>
  <text x="270" y="260" text-anchor="middle" class="label" style="font-size: 16px;">Multi-Step Checkout</text>
  
  <rect class="box" x="70" y="280" width="120" height="45" rx="4"/>
  <text x="130" y="307" text-anchor="middle" class="sublabel" style="font-weight: 600;">Step 1: Shipping</text>
  
  <rect class="box" x="210" y="280" width="120" height="45" rx="4"/>
  <text x="270" y="307" text-anchor="middle" class="sublabel" style="font-weight: 600;">Step 2: Payment</text>
  
  <rect class="box" x="350" y="280" width="120" height="45" rx="4"/>
  <text x="410" y="307" text-anchor="middle" class="sublabel" style="font-weight: 600;">Step 3: Review</text>
  
  <path d="M190 302 L205 302" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M330 302 L345 302" stroke="#4a5568" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <text x="270" y="350" text-anchor="middle" class="sublabel">Pros: Clear progress, focused attention</text>
  <text x="270" y="375" text-anchor="middle" class="sublabel">Cons: More page loads, perceived complexity</text>
  
  <!-- Single-Page Checkout -->
  <rect class="box" x="550" y="230" width="400" height="180" rx="8"/>
  <text x="750" y="260" text-anchor="middle" class="label" style="font-size: 16px;">Single-Page / Accordion</text>
  
  <rect class="box" x="570" y="280" width="360" height="35" rx="4"/>
  <text x="750" y="302" text-anchor="middle" class="sublabel" style="font-weight: 600;">Shipping Information (expandable)</text>
  
  <rect class="box" x="570" y="325" width="360" height="35" rx="4"/>
  <text x="750" y="347" text-anchor="middle" class="sublabel" style="font-weight: 600;">Payment Information (expandable)</text>
  
  <rect class="box" x="570" y="370" width="360" height="35" rx="4"/>
  <text x="750" y="392" text-anchor="middle" class="sublabel" style="font-weight: 600;">Order Review (expandable)</text>
  
  <text x="750" y="425" text-anchor="middle" class="sublabel">Pros: Faster, all visible. Cons: Can overwhelm</text>
  
  <text x="500" y="445" text-anchor="middle" class="label" style="font-size: 16px;">Figure 4: Conversion Optimization Strategies</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
</svg>
