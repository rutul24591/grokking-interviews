<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .box { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .box-dark { fill: #2d3748; stroke: #718096; stroke-width: 2; }
      .client { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .client-dark { fill: #2c5282; stroke: #4299e1; stroke-width: 2; }
      .service { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .service-dark { fill: #276749; stroke: #48bb78; stroke-width: 2; }
      .gateway { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .gateway-dark { fill: #744210; stroke: #ecc94b; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-dark { stroke: #a0aec0; stroke-width: 2; fill: none; marker-end: url(#arrowhead-dark); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .label-dark { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #e2e8f0; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
      .sublabel-dark { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #a0aec0; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrowhead-dark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a0aec0"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  <rect class="bg-dark" width="1000" height="500" data-theme="dark" style="display:none;"/>
  
  <!-- Client Side -->
  <rect class="client" x="50" y="50" width="180" height="380" rx="8"/>
  <text x="140" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Client</text>
  
  <rect class="box" x="70" y="100" width="140" height="50" rx="4"/>
  <text x="140" y="130" text-anchor="middle" class="sublabel" style="font-weight: 600;">Cart Review</text>
  
  <rect class="box" x="70" y="170" width="140" height="50" rx="4"/>
  <text x="140" y="200" text-anchor="middle" class="sublabel" style="font-weight: 600;">Shipping Form</text>
  
  <rect class="box" x="70" y="240" width="140" height="50" rx="4"/>
  <text x="140" y="270" text-anchor="middle" class="sublabel" style="font-weight: 600;">Payment Form</text>
  
  <rect class="box" x="70" y="310" width="140" height="50" rx="4"/>
  <text x="140" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600;">Confirmation</text>
  
  <!-- Backend Services -->
  <rect class="service" x="320" y="50" width="200" height="380" rx="8"/>
  <text x="420" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Backend Services</text>
  
  <rect class="box" x="340" y="100" width="160" height="45" rx="4"/>
  <text x="420" y="127" text-anchor="middle" class="sublabel" style="font-weight: 600;">Cart Service</text>
  
  <rect class="box" x="340" y="160" width="160" height="45" rx="4"/>
  <text x="420" y="187" text-anchor="middle" class="sublabel" style="font-weight: 600;">Inventory Service</text>
  
  <rect class="box" x="340" y="220" width="160" height="45" rx="4"/>
  <text x="420" y="247" text-anchor="middle" class="sublabel" style="font-weight: 600;">Shipping Service</text>
  
  <rect class="box" x="340" y="280" width="160" height="45" rx="4"/>
  <text x="420" y="307" text-anchor="middle" class="sublabel" style="font-weight: 600;">Order Service</text>
  
  <rect class="box" x="340" y="340" width="160" height="45" rx="4"/>
  <text x="420" y="367" text-anchor="middle" class="sublabel" style="font-weight: 600;">Tax Service</text>
  
  <!-- Payment Gateway -->
  <rect class="gateway" x="600" y="150" width="180" height="180" rx="8"/>
  <text x="690" y="180" text-anchor="middle" class="label" style="font-size: 16px;">Payment Gateway</text>
  
  <rect class="box" x="620" y="200" width="140" height="45" rx="4"/>
  <text x="690" y="227" text-anchor="middle" class="sublabel" style="font-weight: 600;">Authorization</text>
  
  <rect class="box" x="620" y="260" width="140" height="45" rx="4"/>
  <text x="690" y="287" text-anchor="middle" class="sublabel" style="font-weight: 600;">3D Secure</text>
  
  <!-- Database -->
  <rect class="box" x="850" y="200" width="100" height="80" rx="4"/>
  <text x="900" y="235" text-anchor="middle" class="sublabel" style="font-weight: 600;">Orders DB</text>
  <text x="900" y="255" text-anchor="middle" class="sublabel" style="font-weight: 600;">Inventory DB</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 125 L335 125"/>
  <path class="arrow" d="M230 195 L335 245"/>
  <path class="arrow" d="M230 265 L595 225"/>
  <path class="arrow" d="M520 305 L845 240"/>
  <path class="arrow" d="M780 240 L845 240"/>
  
  <!-- Return arrows -->
  <path class="arrow" d="M335 145 L230 145"/>
  <path class="arrow" d="M595 245 L230 285"/>
  
  <text x="500" y="480" text-anchor="middle" class="label" style="font-size: 16px;">Figure 1: Checkout Flow Architecture</text>
</svg>
