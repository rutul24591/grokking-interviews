<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .subscription { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .billing { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .payment { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .dunning { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Subscription Management -->
  <rect class="subscription" x="50" y="50" width="200" height="380" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Subscription Mgmt</text>
  
  <rect class="subscription" x="70" y="100" width="160" height="45" rx="4"/>
  <text x="150" y="127" text-anchor="middle" class="sublabel" style="font-weight: 600;">Lifecycle API</text>
  
  <rect class="subscription" x="70" y="160" width="160" height="45" rx="4"/>
  <text x="150" y="187" text-anchor="middle" class="sublabel" style="font-weight: 600;">State Machine</text>
  
  <rect class="subscription" x="70" y="220" width="160" height="45" rx="4"/>
  <text x="150" y="247" text-anchor="middle" class="sublabel" style="font-weight: 600;">Plan Management</text>
  
  <rect class="subscription" x="70" y="280" width="160" height="45" rx="4"/>
  <text x="150" y="307" text-anchor="middle" class="sublabel" style="font-weight: 600;">Subscription DB</text>
  
  <rect class="subscription" x="70" y="340" width="160" height="45" rx="4"/>
  <text x="150" y="367" text-anchor="middle" class="sublabel" style="font-weight: 600;">Customer Portal</text>
  
  <!-- Billing Engine -->
  <rect class="billing" x="320" y="50" width="200" height="380" rx="8"/>
  <text x="420" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Billing Engine</text>
  
  <rect class="billing" x="340" y="100" width="160" height="45" rx="4"/>
  <text x="420" y="127" text-anchor="middle" class="sublabel" style="font-weight: 600;">Invoice Generation</text>
  
  <rect class="billing" x="340" y="160" width="160" height="45" rx="4"/>
  <text x="420" y="187" text-anchor="middle" class="sublabel" style="font-weight: 600;">Proration Calc</text>
  
  <rect class="billing" x="340" y="220" width="160" height="45" rx="4"/>
  <text x="420" y="247" text-anchor="middle" class="sublabel" style="font-weight: 600;">Tax Calculation</text>
  
  <rect class="billing" x="340" y="280" width="160" height="45" rx="4"/>
  <text x="420" y="307" text-anchor="middle" class="sublabel" style="font-weight: 600;">Discount Engine</text>
  
  <rect class="billing" x="340" y="340" width="160" height="45" rx="4"/>
  <text x="420" y="367" text-anchor="middle" class="sublabel" style="font-weight: 600;">Invoice DB</text>
  
  <!-- Payment Integration -->
  <rect class="payment" x="590" y="50" width="180" height="200" rx="8"/>
  <text x="680" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Payment Integration</text>
  
  <rect class="payment" x="610" y="100" width="140" height="40" rx="4"/>
  <text x="680" y="125" text-anchor="middle" class="sublabel" style="font-weight: 600;">Recurring Charges</text>
  
  <rect class="payment" x="610" y="150" width="140" height="40" rx="4"/>
  <text x="680" y="175" text-anchor="middle" class="sublabel" style="font-weight: 600;">Card Updater</text>
  
  <rect class="payment" x="610" y="200" width="140" height="40" rx="4"/>
  <text x="680" y="225" text-anchor="middle" class="sublabel" style="font-weight: 600;">Payment Gateway</text>
  
  <!-- Dunning Service -->
  <rect class="dunning" x="590" y="280" width="180" height="140" rx="8"/>
  <text x="680" y="310" text-anchor="middle" class="label" style="font-size: 16px;">Dunning Service</text>
  
  <rect class="dunning" x="610" y="330" width="140" height="35" rx="4"/>
  <text x="680" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600;">Retry Logic</text>
  
  <rect class="dunning" x="610" y="375" width="140" height="35" rx="4"/>
  <text x="680" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600;">Notifications</text>
  
  <!-- External -->
  <rect class="payment" x="820" y="100" width="130" height="100" rx="8"/>
  <text x="885" y="130" text-anchor="middle" class="label">Payment Gateway</text>
  <text x="885" y="155" text-anchor="middle" class="sublabel">Stripe, Braintree</text>
  <text x="885" y="180" text-anchor="middle" class="sublabel">PayPal, Adyen</text>
  
  <rect class="billing" x="820" y="230" width="130" height="100" rx="8"/>
  <text x="885" y="260" text-anchor="middle" class="label">Tax Service</text>
  <text x="885" y="285" text-anchor="middle" class="sublabel">Avalara, TaxJar</text>
  
  <rect class="subscription" x="820" y="360" width="130" height="80" rx="8"/>
  <text x="885" y="390" text-anchor="middle" class="label">Accounting</text>
  <text x="885" y="415" text-anchor="middle" class="sublabel">QuickBooks, NetSuite</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M250 125 L335 125"/>
  <path class="arrow" d="M250 185 L335 185"/>
  <path class="arrow" d="M520 145 L605 145"/>
  <path class="arrow" d="M520 350 L605 350"/>
  <path class="arrow" d="M770 150 L815 150"/>
  <path class="arrow" d="M770 250 L815 250"/>
  <path class="arrow" d="M770 390 L815 390"/>
  
  <text x="500" y="480" text-anchor="middle" class="label" style="font-size: 16px;">Figure 1: Subscription Billing Architecture</text>
</svg>
