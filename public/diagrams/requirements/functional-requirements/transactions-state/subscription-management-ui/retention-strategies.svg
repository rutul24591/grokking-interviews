<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .offer { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .discount { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .pause { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .downgrade { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Discount Offer -->
  <rect class="discount" x="50" y="50" width="200" height="160" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Discount</text>
  
  <rect class="discount" x="70" y="100" width="160" height="35" rx="4"/>
  <text x="150" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">50% off for 3 months</text>
  
  <rect class="discount" x="70" y="145" width="160" height="35" rx="4"/>
  <text x="150" y="167" text-anchor="middle" class="sublabel">For: &quot;Too expensive&quot;</text>
  
  <rect class="discount" x="70" y="190" width="160" height="35" rx="4"/>
  <text x="150" y="212" text-anchor="middle" class="sublabel">Save: $45/month</text>
  
  <!-- Pause Offer -->
  <rect class="pause" x="300" y="50" width="200" height="160" rx="8"/>
  <text x="400" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Pause</text>
  
  <rect class="pause" x="320" y="100" width="160" height="35" rx="4"/>
  <text x="400" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Pause for up to 3 months</text>
  
  <rect class="pause" x="320" y="145" width="160" height="35" rx="4"/>
  <text x="400" y="167" text-anchor="middle" class="sublabel">For: &quot;Not using right now&quot;</text>
  
  <rect class="pause" x="320" y="190" width="160" height="35" rx="4"/>
  <text x="400" y="212" text-anchor="middle" class="sublabel">Keep data, resume later</text>
  
  <!-- Downgrade Offer -->
  <rect class="offer" x="550" y="50" width="200" height="160" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Downgrade</text>
  
  <rect class="offer" x="570" y="100" width="160" height="35" rx="4"/>
  <text x="650" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Try Basic for $9/month</text>
  
  <rect class="offer" x="570" y="145" width="160" height="35" rx="4"/>
  <text x="650" y="167" text-anchor="middle" class="sublabel">For: &quot;Too expensive&quot;</text>
  
  <rect class="offer" x="570" y="190" width="160" height="35" rx="4"/>
  <text x="650" y="212" text-anchor="middle" class="sublabel">Keep core features</text>
  
  <!-- Feature Unlock -->
  <rect class="offer" x="800" y="50" width="170" height="160" rx="8"/>
  <text x="885" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Feature Unlock</text>
  
  <rect class="offer" x="815" y="100" width="140" height="35" rx="4"/>
  <text x="885" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Pro features free 1 month</text>
  
  <rect class="offer" x="815" y="145" width="140" height="35" rx="4"/>
  <text x="885" y="167" text-anchor="middle" class="sublabel">For: &quot;Missing features&quot;</text>
  
  <rect class="offer" x="815" y="190" width="140" height="35" rx="4"/>
  <text x="885" y="212" text-anchor="middle" class="sublabel">Try before cancel</text>
  
  <!-- Effectiveness Chart -->
  <rect class="offer" x="50" y="260" width="900" height="150" rx="8"/>
  <text x="500" y="290" text-anchor="middle" class="label" style="font-size: 16px;">Retention Offer Effectiveness</text>
  
  <!-- Bars -->
  <rect class="discount" x="100" y="310" width="100" height="80" rx="4"/>
  <text x="150" y="350" text-anchor="middle" class="sublabel" fill="#ffffff" font-weight="600">45%</text>
  <text x="150" y="400" text-anchor="middle" class="sublabel">Discount</text>
  
  <rect class="pause" x="250" y="330" width="100" height="60" rx="4"/>
  <text x="300" y="360" text-anchor="middle" class="sublabel" fill="#744210" font-weight="600">30%</text>
  <text x="300" y="400" text-anchor="middle" class="sublabel">Pause</text>
  
  <rect class="offer" x="400" y="340" width="100" height="50" rx="4"/>
  <text x="450" y="365" text-anchor="middle" class="sublabel" font-weight="600">25%</text>
  <text x="450" y="400" text-anchor="middle" class="sublabel">Downgrade</text>
  
  <rect class="offer" x="550" y="355" width="100" height="35" rx="4"/>
  <text x="600" y="377" text-anchor="middle" class="sublabel" font-weight="600">15%</text>
  <text x="600" y="400" text-anchor="middle" class="sublabel">Feature Unlock</text>
  
  <text x="750" y="340" text-anchor="middle" class="sublabel">Acceptance Rate</text>
  <text x="750" y="365" text-anchor="middle" class="sublabel">by Offer Type</text>
  <text x="750" y="390" text-anchor="middle" class="sublabel">Industry Average</text>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 4: Retention Strategies</text>
</svg>
