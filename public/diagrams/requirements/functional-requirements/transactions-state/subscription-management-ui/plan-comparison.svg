<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .plan { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .current { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .popular { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Free Plan -->
  <rect class="plan" x="50" y="50" width="200" height="320" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="label" style="font-size: 18px;">Free</text>
  <text x="150" y="110" text-anchor="middle" class="sublabel" style="font-size: 24px; font-weight: bold;">$0</text>
  <text x="150" y="135" text-anchor="middle" class="sublabel">forever</text>
  
  <line x1="70" y1="155" x2="230" y2="155" stroke="#4a5568" stroke-width="2"/>
  
  <text x="150" y="180" text-anchor="middle" class="sublabel">✓ 1 seat</text>
  <text x="150" y="200" text-anchor="middle" class="sublabel">✓ 1GB storage</text>
  <text x="150" y="220" text-anchor="middle" class="sublabel">✓ Email support</text>
  <text x="150" y="240" text-anchor="middle" class="sublabel" fill="#a0aec0">✗ SSO</text>
  <text x="150" y="260" text-anchor="middle" class="sublabel" fill="#a0aec0">✗ API access</text>
  <text x="150" y="280" text-anchor="middle" class="sublabel" fill="#a0aec0">✗ Custom branding</text>
  
  <rect class="plan" x="70" y="300" width="160" height="40" rx="4"/>
  <text x="150" y="325" text-anchor="middle" class="sublabel" style="font-weight: 600;">Current Plan</text>
  
  <!-- Pro Plan -->
  <rect class="current" x="300" y="50" width="200" height="320" rx="8" stroke-width="3"/>
  <text x="400" y="80" text-anchor="middle" class="label" style="font-size: 18px;">Pro</text>
  <text x="400" y="110" text-anchor="middle" class="sublabel" style="font-size: 24px; font-weight: bold;">$29</text>
  <text x="400" y="135" text-anchor="middle" class="sublabel">per month</text>
  
  <rect class="current" x="320" y="150" width="160" height="30" rx="4"/>
  <text x="400" y="170" text-anchor="middle" class="sublabel" style="font-weight: 600; font-size: 12px;">Most Popular</text>
  
  <line x1="320" y1="195" x2="480" y2="195" stroke="#38a169" stroke-width="2"/>
  
  <text x="400" y="220" text-anchor="middle" class="sublabel">✓ 10 seats</text>
  <text x="400" y="240" text-anchor="middle" class="sublabel">✓ 100GB storage</text>
  <text x="400" y="260" text-anchor="middle" class="sublabel">✓ Priority support</text>
  <text x="400" y="280" text-anchor="middle" class="sublabel" style="font-weight: 600;">✓ SSO</text>
  <text x="400" y="300" text-anchor="middle" class="sublabel" fill="#a0aec0">✗ API access</text>
  <text x="400" y="320" text-anchor="middle" class="sublabel" fill="#a0aec0">✗ Custom branding</text>
  
  <rect class="current" x="320" y="330" width="160" height="40" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600;">Upgrade</text>
  
  <!-- Business Plan -->
  <rect class="plan" x="550" y="50" width="200" height="320" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="label" style="font-size: 18px;">Business</text>
  <text x="650" y="110" text-anchor="middle" class="sublabel" style="font-size: 24px; font-weight: bold;">$99</text>
  <text x="650" y="135" text-anchor="middle" class="sublabel">per month</text>
  
  <line x1="570" y1="155" x2="730" y2="155" stroke="#4a5568" stroke-width="2"/>
  
  <text x="650" y="180" text-anchor="middle" class="sublabel">✓ Unlimited seats</text>
  <text x="650" y="200" text-anchor="middle" class="sublabel">✓ 1TB storage</text>
  <text x="650" y="220" text-anchor="middle" class="sublabel">✓ 24/7 support</text>
  <text x="650" y="240" text-anchor="middle" class="sublabel" style="font-weight: 600;">✓ SSO</text>
  <text x="650" y="260" text-anchor="middle" class="sublabel" style="font-weight: 600;">✓ API access</text>
  <text x="650" y="280" text-anchor="middle" class="sublabel" fill="#a0aec0">✗ Custom branding</text>
  
  <rect class="plan" x="570" y="300" width="160" height="40" rx="4"/>
  <text x="650" y="325" text-anchor="middle" class="sublabel" style="font-weight: 600;">Upgrade</text>
  
  <!-- Enterprise Plan -->
  <rect class="plan" x="800" y="50" width="170" height="320" rx="8"/>
  <text x="885" y="80" text-anchor="middle" class="label" style="font-size: 18px;">Enterprise</text>
  <text x="885" y="110" text-anchor="middle" class="sublabel" style="font-size: 24px; font-weight: bold;">Custom</text>
  <text x="885" y="135" text-anchor="middle" class="sublabel">contact sales</text>
  
  <line x1="820" y1="155" x2="950" y2="155" stroke="#4a5568" stroke-width="2"/>
  
  <text x="885" y="180" text-anchor="middle" class="sublabel">✓ Everything in Business</text>
  <text x="885" y="200" text-anchor="middle" class="sublabel">✓ Custom branding</text>
  <text x="885" y="220" text-anchor="middle" class="sublabel">✓ Dedicated support</text>
  <text x="885" y="240" text-anchor="middle" class="sublabel">✓ SLA</text>
  <text x="885" y="260" text-anchor="middle" class="sublabel">✓ Custom integrations</text>
  
  <rect class="plan" x="820" y="300" width="140" height="40" rx="4"/>
  <text x="885" y="325" text-anchor="middle" class="sublabel" style="font-weight: 600;">Contact Sales</text>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 3: Plan Comparison</text>
</svg>
