<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .definition { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .engine { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .persistence { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .actions { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- State Definition -->
  <rect class="definition" x="50" y="50" width="200" height="180" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="label" style="font-size: 16px;">State Definition</text>
  
  <rect class="definition" x="70" y="100" width="160" height="35" rx="4"/>
  <text x="150" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">States (enum)</text>
  
  <rect class="definition" x="70" y="145" width="160" height="35" rx="4"/>
  <text x="150" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600;">Transitions</text>
  
  <rect class="definition" x="70" y="190" width="160" height="35" rx="4"/>
  <text x="150" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600;">Guards &amp; Actions</text>
  
  <!-- Transition Engine -->
  <rect class="engine" x="320" y="50" width="200" height="180" rx="8"/>
  <text x="420" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Transition Engine</text>
  
  <rect class="engine" x="340" y="100" width="160" height="35" rx="4"/>
  <text x="420" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Load State</text>
  
  <rect class="engine" x="340" y="145" width="160" height="35" rx="4"/>
  <text x="420" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600;">Validate Transition</text>
  
  <rect class="engine" x="340" y="190" width="160" height="35" rx="4"/>
  <text x="420" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600;">Execute Guards</text>
  
  <!-- Persistence -->
  <rect class="persistence" x="590" y="50" width="180" height="180" rx="8"/>
  <text x="680" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Persistence</text>
  
  <rect class="persistence" x="610" y="100" width="140" height="35" rx="4"/>
  <text x="680" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">State Store</text>
  
  <rect class="persistence" x="610" y="145" width="140" height="35" rx="4"/>
  <text x="680" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600;">History Log</text>
  
  <rect class="persistence" x="610" y="190" width="140" height="35" rx="4"/>
  <text x="680" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600;">Event Store</text>
  
  <!-- Action Executor -->
  <rect class="actions" x="50" y="280" width="200" height="140" rx="8"/>
  <text x="150" y="310" text-anchor="middle" class="label" style="font-size: 16px;">Action Executor</text>
  
  <rect class="actions" x="70" y="330" width="160" height="35" rx="4"/>
  <text x="150" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600;">Action Queue</text>
  
  <rect class="actions" x="70" y="375" width="160" height="35" rx="4"/>
  <text x="150" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600;">Retry Logic</text>
  
  <!-- External Systems -->
  <rect class="definition" x="320" y="280" width="200" height="140" rx="8"/>
  <text x="420" y="310" text-anchor="middle" class="label" style="font-size: 16px;">External Systems</text>
  
  <rect class="definition" x="340" y="330" width="160" height="35" rx="4"/>
  <text x="420" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600;">Email Service</text>
  
  <rect class="definition" x="340" y="375" width="160" height="35" rx="4"/>
  <text x="420" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600;">Payment Gateway</text>
  
  <!-- Event Sourcing -->
  <rect class="engine" x="590" y="280" width="180" height="140" rx="8"/>
  <text x="680" y="310" text-anchor="middle" class="label" style="font-size: 16px;">Projections</text>
  
  <rect class="engine" x="610" y="330" width="140" height="35" rx="4"/>
  <text x="680" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600;">Order State</text>
  
  <rect class="engine" x="610" y="375" width="140" height="35" rx="4"/>
  <text x="680" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600;">Customer Timeline</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M250 140 L315 140"/>
  <path class="arrow" d="M520 140 L585 140"/>
  <path class="arrow" d="M420 230 L420 275"/>
  <path class="arrow" d="M250 350 L315 350"/>
  <path class="arrow" d="M520 350 L585 350"/>
  
  <text x="500" y="480" text-anchor="middle" class="label" style="font-size: 16px;">Figure 1: State Machine Architecture</text>
</svg>
