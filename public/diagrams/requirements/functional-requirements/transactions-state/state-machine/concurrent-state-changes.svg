<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .client { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .server { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .conflict { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Client A -->
  <rect class="client" x="50" y="50" width="180" height="120" rx="8"/>
  <text x="140" y="80" text-anchor="middle" class="label">Client A</text>
  
  <rect class="client" x="70" y="100" width="140" height="50" rx="4"/>
  <text x="140" y="130" text-anchor="middle" class="sublabel" style="font-weight: 600;">Request 1</text>
  
  <!-- Client B -->
  <rect class="client" x="50" y="220" width="180" height="120" rx="8"/>
  <text x="140" y="250" text-anchor="middle" class="label">Client B</text>
  
  <rect class="client" x="70" y="270" width="140" height="50" rx="4"/>
  <text x="140" y="300" text-anchor="middle" class="sublabel" style="font-weight: 600;">Request 2</text>
  
  <!-- Server -->
  <rect class="server" x="400" y="50" width="250" height="290" rx="8"/>
  <text x="525" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Server</text>
  
  <rect class="server" x="420" y="100" width="210" height="50" rx="4"/>
  <text x="525" y="130" text-anchor="middle" class="sublabel" style="font-weight: 600;">Load State (v=5)</text>
  
  <rect class="server" x="420" y="170" width="210" height="50" rx="4"/>
  <text x="525" y="200" text-anchor="middle" class="sublabel" style="font-weight: 600;">Validate &amp; Apply</text>
  
  <rect class="server" x="420" y="240" width="210" height="50" rx="4"/>
  <text x="525" y="270" text-anchor="middle" class="sublabel" style="font-weight: 600;">UPDATE WHERE v=5</text>
  
  <!-- Database -->
  <rect class="server" x="750" y="150" width="180" height="120" rx="8"/>
  <text x="840" y="180" text-anchor="middle" class="label" style="font-size: 16px;">Database</text>
  
  <rect class="server" x="770" y="200" width="140" height="50" rx="4"/>
  <text x="840" y="230" text-anchor="middle" class="sublabel" style="font-weight: 600;">state, version</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 110 L415 125"/>
  <text x="320" y="105" text-anchor="middle" class="sublabel">t=0ms</text>
  
  <path class="arrow" d="M230 280 L415 245"/>
  <text x="320" y="295" text-anchor="middle" class="sublabel">t=10ms</text>
  
  <path class="arrow" d="M650 200 L745 210"/>
  
  <!-- Conflict Scenario -->
  <rect class="conflict" x="400" y="350" width="250" height="70" rx="8"/>
  <text x="525" y="380" text-anchor="middle" class="label">Conflict Detected</text>
  <text x="525" y="405" text-anchor="middle" class="sublabel">Affected rows = 0, version mismatch</text>
  
  <!-- Retry -->
  <rect class="client" x="700" y="350" width="180" height="70" rx="8"/>
  <text x="790" y="380" text-anchor="middle" class="label">Retry with v=6</text>
  <text x="790" y="405" text-anchor="middle" class="sublabel">Load latest, re-apply</text>
  
  <path class="arrow" d="M650 385 L695 385"/>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 3: Concurrent State Changes</text>
</svg>
