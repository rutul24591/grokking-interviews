<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .original { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .credit { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .exchange { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Original Payment -->
  <rect class="original" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Original Payment</text>
  
  <rect class="original" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Refund to Visa •••• 1234</text>
  
  <rect class="original" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Processing: 3-10 business days</text>
  
  <rect class="original" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Fees: Merchant pays processing</text>
  
  <!-- Store Credit -->
  <rect class="credit" x="380" y="50" width="280" height="180" rx="8" stroke-width="3"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Store Credit</text>
  
  <rect class="credit" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Instant credit + 10% bonus</text>
  
  <rect class="credit" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Processing: Instant</text>
  
  <rect class="credit" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Fees: None, retains customer</text>
  
  <!-- Exchange -->
  <rect class="exchange" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Exchange</text>
  
  <rect class="exchange" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Different size/color</text>
  
  <rect class="exchange" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Price difference applies</text>
  
  <rect class="exchange" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Free shipping (both ways)</text>
  
  <!-- Comparison Table -->
  <rect class="original" x="50" y="270" width="900" height="140" rx="8"/>
  
  <!-- Header -->
  <rect class="original" x="60" y="280" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="303" text-anchor="middle" class="sublabel" style="font-weight: 600;">Method</text>
  <text x="300" y="303" text-anchor="middle" class="sublabel" style="font-weight: 600;">Speed</text>
  <text x="450" y="303" text-anchor="middle" class="sublabel" style="font-weight: 600;">Bonus</text>
  <text x="600" y="303" text-anchor="middle" class="sublabel" style="font-weight: 600;">Flexibility</text>
  <text x="800" y="303" text-anchor="middle" class="sublabel" style="font-weight: 600;">Best For</text>
  
  <!-- Row 1 -->
  <text x="150" y="340" text-anchor="middle" class="sublabel">Original Payment</text>
  <text x="300" y="340" text-anchor="middle" class="sublabel" fill="#e53e3e">Slow (3-10 days)</text>
  <text x="450" y="340" text-anchor="middle" class="sublabel">None</text>
  <text x="600" y="340" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">High (anywhere)</text>
  <text x="800" y="340" text-anchor="middle" class="sublabel">Standard, defective</text>
  
  <!-- Row 2 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Store Credit</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Instant</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">+10% bonus</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e">Low (this store only)</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel">Changed mind, frequent</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px;">Figure 4: Refund Methods Comparison</text>
</svg>
