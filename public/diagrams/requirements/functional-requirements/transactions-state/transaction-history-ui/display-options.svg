<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .table { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .card { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .grouped { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Table View -->
  <rect class="table" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Table View</text>
  
  <rect class="table" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Date | Description | Amount | Status</text>
  
  <rect class="table" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Sortable columns, resizable</text>
  
  <rect class="table" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Best for: Desktop, power users</text>
  
  <!-- Card View -->
  <rect class="card" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Card View</text>
  
  <rect class="card" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Dec 15, 2024</text>
  
  <rect class="card" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Amazon Order #12345</text>
  
  <rect class="card" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel" style="font-size: 18px; font-weight: bold;">$99.00</text>
  
  <!-- Grouped View -->
  <rect class="grouped" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Grouped View</text>
  
  <rect class="grouped" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">▼ December 2024 ($1,234)</text>
  
  <rect class="grouped" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">15 transactions</text>
  
  <rect class="grouped" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">▲ November 2024 ($987)</text>
  
  <!-- Comparison -->
  <rect class="table" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px;">View Comparison</text>
  
  <!-- Header -->
  <rect class="table" x="60" y="310" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">View</text>
  <text x="300" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">Best For</text>
  <text x="450" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">Pros</text>
  <text x="650" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">Cons</text>
  <text x="850" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">Platform</text>
  
  <!-- Row 1 -->
  <text x="150" y="370" text-anchor="middle" class="sublabel">Table</text>
  <text x="300" y="370" text-anchor="middle" class="sublabel">Power users, desktop</text>
  <text x="450" y="370" text-anchor="middle" class="sublabel">All data visible, sortable</text>
  <text x="650" y="370" text-anchor="middle" class="sublabel">Not mobile-friendly</text>
  <text x="850" y="370" text-anchor="middle" class="sublabel">Desktop</text>
  
  <!-- Row 2 -->
  <text x="150" y="395" text-anchor="middle" class="sublabel">Card</text>
  <text x="300" y="395" text-anchor="middle" class="sublabel">Mobile, quick scan</text>
  <text x="450" y="395" text-anchor="middle" class="sublabel">Mobile-friendly, simple</text>
  <text x="650" y="395" text-anchor="middle" class="sublabel">Less data per view</text>
  <text x="850" y="395" text-anchor="middle" class="sublabel">Mobile</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px;">Figure 4: Display Options Comparison</text>
</svg>
