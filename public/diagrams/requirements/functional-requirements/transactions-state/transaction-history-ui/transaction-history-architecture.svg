<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .aggregation { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .display { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .filter { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .export { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Data Aggregation -->
  <rect class="aggregation" x="50" y="50" width="200" height="380" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Data Aggregation</text>
  
  <rect class="aggregation" x="70" y="100" width="160" height="45" rx="4"/>
  <text x="150" y="127" text-anchor="middle" class="sublabel" style="font-weight: 600;">Orders</text>
  
  <rect class="aggregation" x="70" y="160" width="160" height="45" rx="4"/>
  <text x="150" y="187" text-anchor="middle" class="sublabel" style="font-weight: 600;">Subscriptions</text>
  
  <rect class="aggregation" x="70" y="220" width="160" height="45" rx="4"/>
  <text x="150" y="247" text-anchor="middle" class="sublabel" style="font-weight: 600;">Refunds</text>
  
  <rect class="aggregation" x="70" y="280" width="160" height="45" rx="4"/>
  <text x="150" y="307" text-anchor="middle" class="sublabel" style="font-weight: 600;">Credits</text>
  
  <rect class="aggregation" x="70" y="340" width="160" height="45" rx="4"/>
  <text x="150" y="367" text-anchor="middle" class="sublabel" style="font-weight: 600;">Normalization</text>
  
  <!-- List Display -->
  <rect class="display" x="320" y="50" width="200" height="380" rx="8"/>
  <text x="420" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">List Display</text>
  
  <rect class="display" x="340" y="100" width="160" height="45" rx="4"/>
  <text x="420" y="127" text-anchor="middle" class="sublabel" style="font-weight: 600;">Table View</text>
  
  <rect class="display" x="340" y="160" width="160" height="45" rx="4"/>
  <text x="420" y="187" text-anchor="middle" class="sublabel" style="font-weight: 600;">Card View</text>
  
  <rect class="display" x="340" y="220" width="160" height="45" rx="4"/>
  <text x="420" y="247" text-anchor="middle" class="sublabel" style="font-weight: 600;">Grouped View</text>
  
  <rect class="display" x="340" y="280" width="160" height="45" rx="4"/>
  <text x="420" y="307" text-anchor="middle" class="sublabel" style="font-weight: 600;">Pagination</text>
  
  <rect class="display" x="340" y="340" width="160" height="45" rx="4"/>
  <text x="420" y="367" text-anchor="middle" class="sublabel" style="font-weight: 600;">Transaction DB</text>
  
  <!-- Filtering & Search -->
  <rect class="filter" x="590" y="50" width="180" height="200" rx="8"/>
  <text x="680" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Filtering &amp; Search</text>
  
  <rect class="filter" x="610" y="100" width="140" height="40" rx="4"/>
  <text x="680" y="125" text-anchor="middle" class="sublabel" style="font-weight: 600;">Date Range</text>
  
  <rect class="filter" x="610" y="150" width="140" height="40" rx="4"/>
  <text x="680" y="175" text-anchor="middle" class="sublabel" style="font-weight: 600;">Type Filter</text>
  
  <rect class="filter" x="610" y="200" width="140" height="40" rx="4"/>
  <text x="680" y="225" text-anchor="middle" class="sublabel" style="font-weight: 600;">Text Search</text>
  
  <!-- Export -->
  <rect class="export" x="590" y="280" width="330" height="140" rx="8"/>
  <text x="755" y="310" text-anchor="middle" class="text-label" style="font-size: 16px;">Export</text>
  
  <rect class="export" x="610" y="330" width="140" height="35" rx="4"/>
  <text x="680" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600;">CSV Export</text>
  
  <rect class="export" x="765" y="330" width="140" height="35" rx="4"/>
  <text x="835" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600;">PDF Export</text>
  
  <rect class="export" x="610" y="375" width="140" height="35" rx="4"/>
  <text x="680" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600;">QBO Export</text>
  
  <rect class="export" x="765" y="375" width="140" height="35" rx="4"/>
  <text x="835" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600;">Email Export</text>
  
  <!-- External -->
  <rect class="aggregation" x="850" y="100" width="120" height="100" rx="8"/>
  <text x="910" y="130" text-anchor="middle" class="text-label">External APIs</text>
  <text x="910" y="155" text-anchor="middle" class="sublabel">Order, Payment</text>
  <text x="910" y="180" text-anchor="middle" class="sublabel">Subscription</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M250 125 L335 125"/>
  <path class="arrow" d="M250 185 L335 185"/>
  <path class="arrow" d="M520 145 L605 145"/>
  <path class="arrow" d="M520 350 L605 350"/>
  <path class="arrow" d="M770 150 L845 150"/>
  
  <text x="500" y="480" text-anchor="middle" class="text-label" style="font-size: 16px;">Figure 1: Transaction History Architecture</text>
</svg>
