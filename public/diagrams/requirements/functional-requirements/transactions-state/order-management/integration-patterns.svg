<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .box { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .event { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .saga { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .api { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Event-Driven -->
  <rect class="event" x="50" y="50" width="280" height="140" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Event-Driven</text>
  
  <rect class="event" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">OrderCreated → Inventory, Payment</text>
  
  <rect class="event" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Loose coupling, async processing</text>
  
  <!-- Saga -->
  <rect class="saga" x="380" y="50" width="280" height="140" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Saga Pattern</text>
  
  <rect class="saga" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Reserve → Authorize → Create</text>
  
  <rect class="saga" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Compensating on failure</text>
  
  <!-- API Composition -->
  <rect class="api" x="710" y="50" width="240" height="140" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="label" style="font-size: 16px">API Composition</text>
  
  <rect class="api" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Order + Customer + Product</text>
  
  <rect class="api" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Aggregate responses</text>
  
  <!-- Flow Diagram -->
  <rect class="box" x="50" y="230" width="900" height="180" rx="8"/>
  <text x="500" y="260" text-anchor="middle" class="label" style="font-size: 16px;">Integration Flow Example</text>
  
  <!-- Order Service -->
  <rect class="box" x="70" y="280" width="140" height="50" rx="4"/>
  <text x="140" y="310" text-anchor="middle" class="sublabel" style="font-weight: 600;">Order Service</text>
  
  <!-- Event -->
  <rect class="event" x="230" y="280" width="100" height="50" rx="4"/>
  <text x="280" y="310" text-anchor="middle" class="sublabel" style="font-weight: 600;">Event</text>
  
  <!-- Inventory -->
  <rect class="box" x="350" y="280" width="120" height="50" rx="4"/>
  <text x="410" y="310" text-anchor="middle" class="sublabel" style="font-weight: 600;">Inventory</text>
  
  <!-- Payment -->
  <rect class="box" x="490" y="280" width="120" height="50" rx="4"/>
  <text x="550" y="310" text-anchor="middle" class="sublabel" style="font-weight: 600;">Payment</text>
  
  <!-- Notification -->
  <rect class="box" x="630" y="280" width="120" height="50" rx="4"/>
  <text x="690" y="310" text-anchor="middle" class="sublabel" style="font-weight: 600;">Notification</text>
  
  <!-- API Gateway -->
  <rect class="api" x="770" y="280" width="140" height="50" rx="4"/>
  <text x="840" y="310" text-anchor="middle" class="sublabel" style="font-weight: 600;">API Gateway</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M210 305 L225 305"/>
  <path class="arrow" d="M330 305 L345 305"/>
  <path class="arrow" d="M470 305 L485 305"/>
  <path class="arrow" d="M610 305 L625 305"/>
  <path class="arrow" d="M750 305 L765 305"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 4: Integration Patterns</text>
</svg>
