<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .state { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .active { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .terminal { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Order States -->
  <circle class="state" cx="100" cy="100" r="45" stroke-width="3"/>
  <text x="100" y="95" text-anchor="middle" class="label">Pending</text>
  <text x="100" y="115" text-anchor="middle" class="sublabel">Created</text>
  
  <circle class="active" cx="280" cy="100" r="45"/>
  <text x="280" y="95" text-anchor="middle" class="label">Confirmed</text>
  <text x="280" y="115" text-anchor="middle" class="sublabel">Payment OK</text>
  
  <circle class="active" cx="460" cy="100" r="45"/>
  <text x="460" y="95" text-anchor="middle" class="label">Processing</text>
  <text x="460" y="115" text-anchor="middle" class="sublabel">Picking</text>
  
  <circle class="active" cx="640" cy="100" r="45"/>
  <text x="640" y="95" text-anchor="middle" class="label">Shipped</text>
  <text x="640" y="115" text-anchor="middle" class="sublabel">Tracking #</text>
  
  <circle class="terminal" cx="820" cy="100" r="45" stroke-width="3"/>
  <text x="820" y="95" text-anchor="middle" class="label">Delivered</text>
  <text x="820" y="115" text-anchor="middle" class="sublabel">Complete</text>
  
  <!-- Cancelled State -->
  <circle class="terminal" cx="460" cy="280" r="45" stroke-width="3"/>
  <text x="460" y="275" text-anchor="middle" class="label">Cancelled</text>
  <text x="460" y="295" text-anchor="middle" class="sublabel">User/System</text>
  
  <!-- Returned State -->
  <circle class="terminal" cx="640" cy="280" r="45"/>
  <text x="640" y="275" text-anchor="middle" class="label">Returned</text>
  <text x="640" y="295" text-anchor="middle" class="sublabel">Refunded</text>
  
  <!-- Transitions -->
  <path class="arrow" d="M145 100 L235 100"/>
  <text x="190" y="90" text-anchor="middle" class="sublabel">payment_authorized</text>
  
  <path class="arrow" d="M325 100 L415 100"/>
  <text x="370" y="90" text-anchor="middle" class="sublabel">inventory_committed</text>
  
  <path class="arrow" d="M505 100 L595 100"/>
  <text x="550" y="90" text-anchor="middle" class="sublabel">shipment_created</text>
  
  <path class="arrow" d="M685 100 L775 100"/>
  <text x="730" y="90" text-anchor="middle" class="sublabel">delivery_confirmed</text>
  
  <path class="arrow" d="M280 145 L310 190 L420 260"/>
  <text x="340" y="200" text-anchor="middle" class="sublabel">cancel_requested</text>
  
  <path class="arrow" d="M460 145 L460 235"/>
  <text x="475" y="190" text-anchor="middle" class="sublabel">cancel_requested</text>
  
  <path class="arrow" d="M640 145 L640 235"/>
  <text x="660" y="190" text-anchor="middle" class="sublabel">return_requested</text>
  
  <!-- Guards Legend -->
  <rect class="state" x="50" cy="350" width="250" height="70" rx="4"/>
  <text x="175" y="375" text-anchor="middle" class="label">Example Guards</text>
  <text x="175" y="395" text-anchor="middle" class="sublabel">payment.amount == order.total</text>
  <text x="175" y="410" text-anchor="middle" class="sublabel">inventory.available >= order.quantity</text>
  
  <!-- Actions Legend -->
  <rect class="state" x="350" cy="350" width="300" height="70" rx="4"/>
  <text x="500" y="375" text-anchor="middle" class="label">Example Actions</text>
  <text x="500" y="395" text-anchor="middle" class="sublabel">send_confirmation_email</text>
  <text x="500" y="410" text-anchor="middle" class="sublabel">update_inventory, notify_warehouse</text>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 2: Order Lifecycle</text>
</svg>
