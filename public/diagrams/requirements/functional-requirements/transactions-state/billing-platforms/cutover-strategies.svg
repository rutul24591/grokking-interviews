<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .bigbang { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .gradual { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Big-Bang Cutover -->
  <rect class="bigbang" x="50" y="50" width="400" height="180" rx="8"/>
  <text x="250" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Big-Bang Cutover</text>
  
  <rect class="bigbang" x="70" y="100" width="360" height="35" rx="4"/>
  <text x="250" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Switch all customers at once</text>
  
  <rect class="bigbang" x="70" y="145" width="360" height="35" rx="4"/>
  <text x="250" y="167" text-anchor="middle" class="sublabel">Pros: Simple, fast, clean</text>
  
  <rect class="bigbang" x="70" y="190" width="360" height="35" rx="4"/>
  <text x="250" y="212" text-anchor="middle" class="sublabel">Cons: High risk, complex, disruptive</text>
  
  <!-- Gradual Cutover -->
  <rect class="gradual" x="550" y="50" width="400" height="180" rx="8"/>
  <text x="750" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Gradual Cutover</text>
  
  <rect class="gradual" x="570" y="100" width="360" height="35" rx="4"/>
  <text x="750" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Switch customers gradually</text>
  
  <rect class="gradual" x="570" y="145" width="360" height="35" rx="4"/>
  <text x="750" y="167" text-anchor="middle" class="sublabel">Pros: Lower risk, easier, less disruptive</text>
  
  <rect class="gradual" x="570" y="190" width="360" height="35" rx="4"/>
  <text x="750" y="212" text-anchor="middle" class="sublabel">Cons: Slower, complex tracking, extended</text>
  
  <!-- Timeline Comparison -->
  <rect class="bigbang" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px">Cutover Timeline Comparison</text>
  
  <!-- Big-Bang Timeline -->
  <rect class="bigbang" x="70" y="320" width="400" height="70" rx="4"/>
  <text x="270" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Big-Bang Timeline</text>
  <text x="270" y="365" text-anchor="middle" class="sublabel">Day 1: All customers migrated</text>
  <text x="270" y="380" text-anchor="middle" class="sublabel">Day 2-7: Monitor, resolve issues</text>
  
  <!-- Gradual Timeline -->
  <rect class="gradual" x="530" y="320" width="400" height="70" rx="4"/>
  <text x="730" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Gradual Timeline</text>
  <text x="730" y="365" text-anchor="middle" class="sublabel">Week 1-2: 10% customers migrated</text>
  <text x="730" y="380" text-anchor="middle" class="sublabel">Week 3-8: Remaining customers migrated</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 4: Cutover Strategies</text>
</svg>
