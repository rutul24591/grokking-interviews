<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .stripe { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .chargebee { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .recurly { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .zuora { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Stripe Billing -->
  <rect class="stripe" x="50" y="50" width="200" height="180" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Stripe Billing</text>
  
  <rect class="stripe" x="70" y="100" width="160" height="35" rx="4"/>
  <text x="150" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">0.5% + payment fees</text>
  
  <rect class="stripe" x="70" y="145" width="160" height="35" rx="4"/>
  <text x="150" y="167" text-anchor="middle" class="sublabel">Best for: Startups</text>
  
  <rect class="stripe" x="70" y="190" width="160" height="35" rx="4"/>
  <text x="150" y="212" text-anchor="middle" class="sublabel">Developer-friendly</text>
  
  <!-- Chargebee -->
  <rect class="chargebee" x="300" y="50" width="200" height="180" rx="8"/>
  <text x="400" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Chargebee</text>
  
  <rect class="chargebee" x="320" y="100" width="160" height="35" rx="4"/>
  <text x="400" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">$200-$450/month</text>
  
  <rect class="chargebee" x="320" y="145" width="160" height="35" rx="4"/>
  <text x="400" y="167" text-anchor="middle" class="sublabel">Best for: SMBs</text>
  
  <rect class="chargebee" x="320" y="190" width="160" height="35" rx="4"/>
  <text x="400" y="212" text-anchor="middle" class="sublabel">Multi-gateway</text>
  
  <!-- Recurly -->
  <rect class="recurly" x="550" y="50" width="200" height="180" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Recurly</text>
  
  <rect class="recurly" x="570" y="100" width="160" height="35" rx="4"/>
  <text x="650" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">$249-$549/month</text>
  
  <rect class="recurly" x="570" y="145" width="160" height="35" rx="4"/>
  <text x="650" y="167" text-anchor="middle" class="sublabel">Best for: Enterprise</text>
  
  <rect class="recurly" x="570" y="190" width="160" height="35" rx="4"/>
  <text x="650" y="212" text-anchor="middle" class="sublabel">Revenue recognition</text>
  
  <!-- Zuora -->
  <rect class="zuora" x="800" y="50" width="170" height="180" rx="8"/>
  <text x="885" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Zuora</text>
  
  <rect class="zuora" x="815" y="100" width="140" height="35" rx="4"/>
  <text x="885" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Custom ($50K+/year)</text>
  
  <rect class="zuora" x="815" y="145" width="140" height="35" rx="4"/>
  <text x="885" y="167" text-anchor="middle" class="sublabel">Best for: Enterprise B2B</text>
  
  <rect class="zuora" x="815" y="190" width="140" height="35" rx="4"/>
  <text x="885" y="212" text-anchor="middle" class="sublabel">Complex billing</text>
  
  <!-- Comparison Table -->
  <rect class="stripe" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px">Platform Comparison</text>
  
  <!-- Header -->
  <rect class="stripe" x="60" y="310" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Platform</text>
  <text x="300" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Pricing</text>
  <text x="450" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Best For</text>
  <text x="650" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Key Features</text>
  <text x="850" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Scalability</text>
  
  <!-- Row 1 -->
  <text x="150" y="370" text-anchor="middle" class="sublabel">Stripe</text>
  <text x="300" y="370" text-anchor="middle" class="sublabel">0.5% + fees</text>
  <text x="450" y="370" text-anchor="middle" class="sublabel">Startups, Developers</text>
  <text x="650" y="370" text-anchor="middle" class="sublabel">Developer-friendly</text>
  <text x="850" y="370" text-anchor="middle" class="sublabel">High</text>
  
  <!-- Row 2 -->
  <text x="150" y="395" text-anchor="middle" class="sublabel">Chargebee</text>
  <text x="300" y="395" text-anchor="middle" class="sublabel">$200-$450/mo</text>
  <text x="450" y="395" text-anchor="middle" class="sublabel">SMBs, Growing</text>
  <text x="650" y="395" text-anchor="middle" class="sublabel">Multi-gateway</text>
  <text x="850" y="395" text-anchor="middle" class="sublabel">High</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Platform Comparison</text>
</svg>
