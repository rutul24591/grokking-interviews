<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .order { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .booking { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .payment { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Order Confirmation -->
  <rect class="order" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Order Confirmation</text>
  
  <rect class="order" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Items: Thumbnails, names, quantities</text>
  
  <rect class="order" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Shipping: Address, method, ETA</text>
  
  <rect class="order" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Payment: Method, last 4, total</text>
  
  <!-- Booking Confirmation -->
  <rect class="booking" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Booking Confirmation</text>
  
  <rect class="booking" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Service: Name, description, duration</text>
  
  <rect class="booking" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Date/Time: Start, end, timezone</text>
  
  <rect class="booking" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Location: Address, room, staff</text>
  
  <!-- Payment Confirmation -->
  <rect class="payment" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Payment Confirmation</text>
  
  <rect class="payment" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Amount: $XXX.XX</text>
  
  <rect class="payment" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Method: Card, PayPal, etc.</text>
  
  <rect class="payment" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Transaction ID: ABC123</text>
  
  <!-- Common Elements -->
  <rect class="order" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px;">Common Elements Across All Types</text>
  
  <!-- Confirmation Number -->
  <rect class="order" x="70" y="320" width="200" height="70" rx="4"/>
  <text x="170" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600;">Confirmation Number</text>
  <text x="170" y="365" text-anchor="middle" class="sublabel">ABC123456 (copyable)</text>
  <text x="170" y="380" text-anchor="middle" class="sublabel">Prominent display</text>
  
  <!-- Next Steps -->
  <rect class="booking" x="300" y="320" width="200" height="70" rx="4"/>
  <text x="400" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600;">Next Steps</text>
  <text x="400" y="365" text-anchor="middle" class="sublabel">Timeline, instructions</text>
  <text x="400" y="380" text-anchor="middle" class="sublabel">Track/Modify links</text>
  
  <!-- Receipt -->
  <rect class="payment" x="530" y="320" width="200" height="70" rx="4"/>
  <text x="630" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600;">Receipt Access</text>
  <text x="630" y="365" text-anchor="middle" class="sublabel">Email + Download</text>
  <text x="630" y="380" text-anchor="middle" class="sublabel">Print option</text>
  
  <!-- Contact -->
  <rect class="order" x="760" y="320" width="170" height="70" rx="4"/>
  <text x="845" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600;">Contact Support</text>
  <text x="845" y="365" text-anchor="middle" class="sublabel">Email, phone, chat</text>
  <text x="845" y="380" text-anchor="middle" class="sublabel">Help center</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px;">Figure 3: Confirmation Types</text>
</svg>
