<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .account { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .related { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .referral { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Account Creation -->
  <rect class="account" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Account Creation</text>
  
  <rect class="account" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Incentive: 10% off next order</text>
  
  <rect class="account" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Benefits: Track orders, faster checkout</text>
  
  <rect class="account" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Form: Pre-filled, password only</text>
  
  <!-- Related Products -->
  <rect class="related" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Related Products</text>
  
  <rect class="related" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Complementary: Bought X, need Y</text>
  
  <rect class="related" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Upgrades: Premium version</text>
  
  <rect class="related" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Consumables: Refills, replacements</text>
  
  <!-- Referral Program -->
  <rect class="referral" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px;">Referral Program</text>
  
  <rect class="referral" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Offer: Give $20, Get $20</text>
  
  <rect class="referral" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Share: Link, email, social</text>
  
  <rect class="referral" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Track: Referrals, rewards earned</text>
  
  <!-- Engagement Comparison -->
  <rect class="account" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px;">Engagement Strategy Comparison</text>
  
  <!-- Header -->
  <rect class="account" x="60" y="310" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">Type</text>
  <text x="300" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">Goal</text>
  <text x="450" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">Incentive</text>
  <text x="650" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">Timing</text>
  <text x="850" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600;">Best For</text>
  
  <!-- Row 1 -->
  <text x="150" y="370" text-anchor="middle" class="sublabel">Account</text>
  <text x="300" y="370" text-anchor="middle" class="sublabel">Convert guest</text>
  <text x="450" y="370" text-anchor="middle" class="sublabel">10% off next</text>
  <text x="650" y="370" text-anchor="middle" class="sublabel">Post-purchase</text>
  <text x="850" y="370" text-anchor="middle" class="sublabel">E-commerce</text>
  
  <!-- Row 2 -->
  <text x="150" y="395" text-anchor="middle" class="sublabel">Related</text>
  <text x="300" y="395" text-anchor="middle" class="sublabel">Increase AOV</text>
  <text x="450" y="395" text-anchor="middle" class="sublabel">Bundle discount</text>
  <text x="650" y="395" text-anchor="middle" class="sublabel">Before ships</text>
  <text x="850" y="395" text-anchor="middle" class="sublabel">Retail</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px;">Figure 4: Post-Purchase Engagement Options</text>
</svg>
