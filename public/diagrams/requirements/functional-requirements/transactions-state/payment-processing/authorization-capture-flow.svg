<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .step { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .success { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Tokenization -->
  <rect class="step" x="50" y="50" width="160" height="70" rx="8"/>
  <text x="130" y="80" text-anchor="middle" class="label">1. Tokenization</text>
  <text x="130" y="105" text-anchor="middle" class="sublabel">Card → Token</text>
  
  <!-- 3DS -->
  <rect class="step" x="280" y="50" width="160" height="70" rx="8"/>
  <text x="360" y="80" text-anchor="middle" class="label">2. 3D Secure</text>
  <text x="360" y="105" text-anchor="middle" class="sublabel">Bank Authentication</text>
  
  <!-- Authorization -->
  <rect class="success" x="510" y="50" width="160" height="70" rx="8"/>
  <text x="590" y="80" text-anchor="middle" class="label">3. Authorization</text>
  <text x="590" y="105" text-anchor="middle" class="sublabel">Hold Funds</text>
  
  <!-- Capture -->
  <rect class="success" x="50" y="180" width="160" height="70" rx="8"/>
  <text x="130" y="210" text-anchor="middle" class="label">4. Capture</text>
  <text x="130" y="235" text-anchor="middle" class="sublabel">Transfer Funds</text>
  
  <!-- Settlement -->
  <rect class="success" x="280" y="180" width="160" height="70" rx="8"/>
  <text x="360" y="210" text-anchor="middle" class="label">5. Settlement</text>
  <text x="360" y="235" text-anchor="middle" class="sublabel">Deposit to Merchant</text>
  
  <!-- Refund (Optional) -->
  <rect class="step" x="510" y="180" width="160" height="70" rx="8" stroke-dasharray="5,5"/>
  <text x="590" y="210" text-anchor="middle" class="label">6. Refund</text>
  <text x="590" y="235" text-anchor="middle" class="sublabel">Return Funds (Optional)</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M210 85 L275 85"/>
  <path class="arrow" d="M440 85 L505 85"/>
  <path class="arrow" d="M590 120 L590 150 L130 150 L130 175"/>
  <path class="arrow" d="M210 215 L275 215"/>
  <path class="arrow" d="M440 215 L505 215"/>
  
  <!-- Timeline -->
  <rect class="step" x="740" y="115" width="200" height="200" rx="8"/>
  <text x="840" y="145" text-anchor="middle" class="label">Timeline</text>
  
  <text x="760" y="180" text-anchor="middle" class="sublabel">Authorization: Immediate</text>
  <text x="760" y="200" text-anchor="middle" class="sublabel">Capture: On shipment (0-7 days)</text>
  <text x="760" y="220" text-anchor="middle" class="sublabel">Settlement: 1-3 days after capture</text>
  <text x="760" y="240" text-anchor="middle" class="sublabel">Refund: 3-10 days to customer</text>
  
  <text x="840" y="290" text-anchor="middle" class="sublabel">Auth expires: 7-30 days</text>
  <text x="840" y="310" text-anchor="middle" class="sublabel">Dispute window: 60-120 days</text>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 2: Authorization and Capture Flow</text>
</svg>
