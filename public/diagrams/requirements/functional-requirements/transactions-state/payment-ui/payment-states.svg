<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .idle { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .processing { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .success { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .failure { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Idle State -->
  <rect class="idle" x="50" y="50" width="200" height="140" rx="8" stroke-width="3"/>
  <text x="150" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Idle</text>
  <text x="150" y="110" text-anchor="middle" class="sublabel">Form ready for input</text>
  <text x="150" y="130" text-anchor="middle" class="sublabel">Submit enabled</text>
  
  <!-- Processing State -->
  <rect class="processing" x="350" y="50" width="200" height="140" rx="8"/>
  <text x="450" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Processing</text>
  <text x="450" y="110" text-anchor="middle" class="sublabel">Spinner/Progress</text>
  <text x="450" y="130" text-anchor="middle" class="sublabel">Form disabled</text>
  
  <!-- Success State -->
  <rect class="success" x="650" y="50" width="200" height="140" rx="8"/>
  <text x="750" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Success</text>
  <text x="750" y="110" text-anchor="middle" class="sublabel">Checkmark icon</text>
  <text x="750" y="130" text-anchor="middle" class="sublabel">Auto-redirect (3-5s)</text>
  
  <!-- Failure State -->
  <rect class="failure" x="500" y="250" width="200" height="140" rx="8"/>
  <text x="600" y="280" text-anchor="middle" class="label" style="font-size: 16px;">Failure</text>
  <text x="600" y="310" text-anchor="middle" class="sublabel">Error message</text>
  <text x="600" y="330" text-anchor="middle" class="sublabel">Retry option</text>
  
  <!-- Transitions -->
  <path class="arrow" d="M250 120 L345 120"/>
  <text x="300" y="110" text-anchor="middle" class="sublabel">submit_payment</text>
  
  <path class="arrow" d="M550 120 L645 120"/>
  <text x="600" y="110" text-anchor="middle" class="sublabel">success_response</text>
  
  <path class="arrow" d="M450 190 L500 230 L545 245"/>
  <text x="480" y="220" text-anchor="middle" class="sublabel">failure_response</text>
  
  <path class="arrow" d="M500 280 L450 250 L400 200"/>
  <text x="450" y="260" text-anchor="middle" class="sublabel">retry</text>
  
  <path class="arrow" d="M750 190 L750 230 L650 250"/>
  <text x="700" y="220" text-anchor="middle" class="sublabel">refund/error</text>
  
  <!-- State Actions -->
  <rect class="idle" x="50" y="250" width="200" height="120" rx="8"/>
  <text x="150" y="280" text-anchor="middle" class="label">Idle Actions</text>
  <text x="150" y="305" text-anchor="middle" class="sublabel">- Validate on blur</text>
  <text x="150" y="325" text-anchor="middle" class="sublabel">- Enable submit when valid</text>
  <text x="150" y="345" text-anchor="middle" class="sublabel">- Auto-format input</text>
  
  <rect class="processing" x="800" y="50" width="170" height="140" rx="8"/>
  <text x="885" y="80" text-anchor="middle" class="label">Processing Actions</text>
  <text x="885" y="105" text-anchor="middle" class="sublabel">- Disable form</text>
  <text x="885" y="125" text-anchor="middle" class="sublabel">- Show spinner</text>
  <text x="885" y="145" text-anchor="middle" class="sublabel">- Timeout (30s)</text>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 3: Payment Processing States</text>
</svg>
