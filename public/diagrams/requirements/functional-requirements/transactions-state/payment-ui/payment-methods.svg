<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .card { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .wallet { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .bank { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .bnpl { fill: #fed7d7; stroke: #e53e3e; stroke-width: 2; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Credit/Debit Cards -->
  <rect class="card" x="50" y="50" width="200" height="140" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Cards</text>
  
  <rect class="card" x="70" y="100" width="160" height="35" rx="4"/>
  <text x="150" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Visa, Mastercard</text>
  
  <rect class="card" x="70" y="145" width="160" height="35" rx="4"/>
  <text x="150" y="167" text-anchor="middle" class="sublabel">Amex, Discover</text>
  
  <!-- Digital Wallets -->
  <rect class="wallet" x="300" y="50" width="200" height="140" rx="8"/>
  <text x="400" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Digital Wallets</text>
  
  <rect class="wallet" x="320" y="100" width="160" height="35" rx="4"/>
  <text x="400" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Apple Pay, Google Pay</text>
  
  <rect class="wallet" x="320" y="145" width="160" height="35" rx="4"/>
  <text x="400" y="167" text-anchor="middle" class="sublabel">PayPal, Amazon Pay</text>
  
  <!-- Bank Transfer -->
  <rect class="bank" x="550" y="50" width="200" height="140" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Bank Transfer</text>
  
  <rect class="bank" x="570" y="100" width="160" height="35" rx="4"/>
  <text x="650" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">ACH (US), SEPA (EU)</text>
  
  <rect class="bank" x="570" y="145" width="160" height="35" rx="4"/>
  <text x="650" y="167" text-anchor="middle" class="sublabel">Direct Debit (UK)</text>
  
  <!-- BNPL -->
  <rect class="bnpl" x="800" y="50" width="170" height="140" rx="8"/>
  <text x="885" y="80" text-anchor="middle" class="label" style="font-size: 16px;">BNPL</text>
  
  <rect class="bnpl" x="815" y="100" width="140" height="35" rx="4"/>
  <text x="885" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Affirm, Klarna</text>
  
  <rect class="bnpl" x="815" y="145" width="140" height="35" rx="4"/>
  <text x="885" y="167" text-anchor="middle" class="sublabel">Afterpay, Zip</text>
  
  <!-- Comparison Table -->
  <rect class="card" x="50" y="230" width="900" height="180" rx="8"/>
  
  <!-- Header -->
  <rect class="card" x="60" y="240" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">Method</text>
  <text x="300" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">Conversion</text>
  <text x="450" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">Fee</text>
  <text x="600" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">Speed</text>
  <text x="800" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">Best For</text>
  
  <!-- Row 1 -->
  <text x="150" y="300" text-anchor="middle" class="sublabel">Cards</text>
  <text x="300" y="300" text-anchor="middle" class="sublabel">Medium</text>
  <text x="450" y="300" text-anchor="middle" class="sublabel">2-3%</text>
  <text x="600" y="300" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Instant</text>
  <text x="800" y="300" text-anchor="middle" class="sublabel">Most common</text>
  
  <!-- Row 2 -->
  <text x="150" y="340" text-anchor="middle" class="sublabel">Wallets</text>
  <text x="300" y="340" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">High (1-click)</text>
  <text x="450" y="340" text-anchor="middle" class="sublabel">2-3%</text>
  <text x="600" y="340" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Instant</text>
  <text x="800" y="340" text-anchor="middle" class="sublabel">Mobile, repeat</text>
  
  <!-- Row 3 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Bank Transfer</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e">Low (redirect)</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Low (&lt;1%)</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel" fill="#e53e3e">1-3 days</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel">High value, B2B</text>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 4: Payment Methods Comparison</text>
</svg>
