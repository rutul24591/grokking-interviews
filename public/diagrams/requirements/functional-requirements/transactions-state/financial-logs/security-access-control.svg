<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .encryption { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .access { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .audit { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Encryption -->
  <rect class="encryption" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Encryption</text>
  
  <rect class="encryption" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Encryption at Rest (AES-256)</text>
  
  <rect class="encryption" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Encryption in Transit (TLS 1.2+)</text>
  
  <rect class="encryption" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Key Management (KMS)</text>
  
  <!-- Access Control -->
  <rect class="access" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Access Control</text>
  
  <rect class="access" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Authentication (Password, MFA)</text>
  
  <rect class="access" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Authorization (Role-Based, Need-to-Know)</text>
  
  <rect class="access" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Audit Trails (Log Access, Modifications)</text>
  
  <!-- Audit Trails -->
  <rect class="audit" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Audit Trails</text>
  
  <rect class="audit" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Log Access</text>
  
  <rect class="audit" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Log Modifications</text>
  
  <rect class="audit" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Log Deletions</text>
  
  <!-- Security Layers -->
  <rect class="encryption" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px">Security Layers</text>
  
  <!-- Layer 1 -->
  <rect class="encryption" x="70" y="320" width="200" height="70" rx="4"/>
  <text x="170" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Layer 1: Encryption</text>
  <text x="170" y="365" text-anchor="middle" class="sublabel">Protect Data</text>
  <text x="170" y="380" text-anchor="middle" class="sublabel">At Rest & In Transit</text>
  
  <!-- Layer 2 -->
  <rect class="access" x="300" y="320" width="200" height="70" rx="4"/>
  <text x="400" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Layer 2: Access Control</text>
  <text x="400" y="365" text-anchor="middle" class="sublabel">Control Access</text>
  <text x="400" y="380" text-anchor="middle" class="sublabel">Authentication & Authorization</text>
  
  <!-- Layer 3 -->
  <rect class="audit" x="530" y="320" width="200" height="70" rx="4"/>
  <text x="630" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Layer 3: Audit Trails</text>
  <text x="630" y="365" text-anchor="middle" class="sublabel">Log Access</text>
  <text x="630" y="380" text-anchor="middle" class="sublabel">Log Modifications & Deletions</text>
  
  <!-- Layer 4 -->
  <rect class="encryption" x="760" y="320" width="170" height="70" rx="4"/>
  <text x="845" y="345" text-anchor="middle" class="sublabel" style="font-weight: 600">Layer 4: Compliance</text>
  <text x="845" y="365" text-anchor="middle" class="sublabel">SOX, PCI, GDPR</text>
  <text x="845" y="380" text-anchor="middle" class="sublabel">Compliance Requirements</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 4: Security and Access Control</text>
</svg>
