<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .sox { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .pci { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .gdpr { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- SOX Compliance -->
  <rect class="sox" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">SOX Compliance</text>
  
  <rect class="sox" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">7 Years Retention</text>
  
  <rect class="sox" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Access Control</text>
  
  <rect class="sox" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Tamper-Evident Logs</text>
  
  <!-- PCI Compliance -->
  <rect class="pci" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">PCI Compliance</text>
  
  <rect class="pci" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">1 Year Retention</text>
  
  <rect class="pci" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Need-to-Know Access</text>
  
  <rect class="pci" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Encryption (At Rest, In Transit)</text>
  
  <!-- GDPR Compliance -->
  <rect class="gdpr" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">GDPR Compliance</text>
  
  <rect class="gdpr" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Deletion on Request</text>
  
  <rect class="gdpr" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Data Minimization</text>
  
  <rect class="gdpr" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Consent Logging</text>
  
  <!-- Compliance Comparison -->
  <rect class="sox" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px">Compliance Requirements Comparison</text>
  
  <!-- Header -->
  <rect class="sox" x="60" y="310" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Compliance</text>
  <text x="300" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Retention</text>
  <text x="450" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Access Control</text>
  <text x="650" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Security</text>
  <text x="850" y="333" text-anchor="middle" class="sublabel" style="font-weight: 600">Deletion</text>
  
  <!-- Row 1 -->
  <text x="150" y="370" text-anchor="middle" class="sublabel">SOX</text>
  <text x="300" y="370" text-anchor="middle" class="sublabel">7 Years</text>
  <text x="450" y="370" text-anchor="middle" class="sublabel">Who can access/modify</text>
  <text x="650" y="370" text-anchor="middle" class="sublabel">Tamper-Evident</text>
  <text x="850" y="370" text-anchor="middle" class="sublabel">After 7 Years</text>
  
  <!-- Row 2 -->
  <text x="150" y="395" text-anchor="middle" class="sublabel">PCI</text>
  <text x="300" y="395" text-anchor="middle" class="sublabel">1 Year</text>
  <text x="450" y="395" text-anchor="middle" class="sublabel">Need-to-Know</text>
  <text x="650" y="395" text-anchor="middle" class="sublabel">Encryption</text>
  <text x="850" y="395" text-anchor="middle" class="sublabel">After 1 Year</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Compliance Logging</text>
</svg>
