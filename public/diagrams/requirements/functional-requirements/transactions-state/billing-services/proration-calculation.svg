<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .before { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .after { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .proration { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Before Upgrade -->
  <rect class="before" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Before Upgrade</text>
  
  <rect class="before" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Plan: Basic ($30/month)</text>
  
  <rect class="before" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Billing Period: Dec 1-31</text>
  
  <rect class="before" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Upgrade Date: Dec 15</text>
  
  <!-- After Upgrade -->
  <rect class="after" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">After Upgrade</text>
  
  <rect class="after" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Plan: Pro ($60/month)</text>
  
  <rect class="after" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Billing Period: Dec 1-31</text>
  
  <rect class="after" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Days Remaining: 15 days</text>
  
  <!-- Proration Calculation -->
  <rect class="proration" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Proration Calculation</text>
  
  <rect class="proration" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Formula</text>
  
  <rect class="proration" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">(New - Old) × (Days / Total)</text>
  
  <rect class="proration" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">($60 - $30) × (15/30) = $15</text>
  
  <!-- Timeline -->
  <rect class="before" x="50" y="270" width="900" height="140" rx="8"/>
  <text x="500" y="300" text-anchor="middle" class="text-label" style="font-size: 16px">Billing Timeline</text>
  
  <!-- Timeline Bar -->
  <line x1="70" y1="350" x2="930" y2="350" stroke="#4a5568" stroke-width="4"/>
  
  <!-- Dec 1 -->
  <circle cx="70" cy="350" r="8" fill="#c6f6d5" stroke="#38a169" stroke-width="2"/>
  <text x="70" y="380" text-anchor="middle" class="sublabel">Dec 1</text>
  <text x="70" y="395" text-anchor="middle" class="sublabel" style="font-weight: 600">Billing Start</text>
  
  <!-- Dec 15 -->
  <circle cx="500" cy="350" r="8" fill="#fef3c7" stroke="#d69e2e" stroke-width="2"/>
  <text x="500" y="380" text-anchor="middle" class="sublabel">Dec 15</text>
  <text x="500" y="395" text-anchor="middle" class="sublabel" style="font-weight: 600">Upgrade (Proration)</text>
  
  <!-- Dec 31 -->
  <circle cx="930" cy="350" r="8" fill="#c6f6d5" stroke="#38a169" stroke-width="2"/>
  <text x="930" y="380" text-anchor="middle" class="sublabel">Dec 31</text>
  <text x="930" y="395" text-anchor="middle" class="sublabel" style="font-weight: 600">Billing End</text>
  
  <!-- Proration Charge -->
  <rect class="proration" x="400" y="410" width="200" height="30" rx="4"/>
  <text x="500" y="430" text-anchor="middle" class="sublabel" style="font-weight: 600">Proration Charge: $15</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Proration Calculation</text>
</svg>
