<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .box { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .redis { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .db { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .hybrid { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Redis -->
  <rect class="redis" x="50" y="50" width="280" height="140" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Redis (Hot Cache)</text>
  
  <rect class="redis" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">+ Sub-millisecond lookup</text>
  
  <rect class="redis" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">- Volatile, memory cost</text>
  
  <!-- Database -->
  <rect class="db" x="380" y="50" width="280" height="140" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Database (Audit)</text>
  
  <rect class="db" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">+ Durable, queryable</text>
  
  <rect class="db" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">- Slower, manual TTL</text>
  
  <!-- Hybrid -->
  <rect class="hybrid" x="710" y="50" width="240" height="140" rx="8" stroke-width="3"/>
  <text x="830" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Hybrid (Recommended)</text>
  
  <rect class="hybrid" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600;">Redis + Database</text>
  
  <rect class="hybrid" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Best of both worlds</text>
  
  <!-- Comparison Table -->
  <rect class="box" x="50" y="230" width="900" height="180" rx="8"/>
  
  <!-- Header -->
  <rect class="box" x="60" y="240" width="880" height="35" rx="4" fill="#e2e8f0"/>
  <text x="150" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">Storage</text>
  <text x="300" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">Latency</text>
  <text x="450" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">Durability</text>
  <text x="600" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">TTL</text>
  <text x="800" y="263" text-anchor="middle" class="sublabel" style="font-weight: 600;">Best For</text>
  
  <!-- Row 1 -->
  <text x="150" y="300" text-anchor="middle" class="sublabel">Redis</text>
  <text x="300" y="300" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">&lt;1ms</text>
  <text x="450" y="300" text-anchor="middle" class="sublabel" fill="#e53e3e">Volatile</text>
  <text x="600" y="300" text-anchor="middle" class="sublabel">Auto (EX)</text>
  <text x="800" y="300" text-anchor="middle" class="sublabel">Hot cache</text>
  
  <!-- Row 2 -->
  <text x="150" y="340" text-anchor="middle" class="sublabel">Database</text>
  <text x="300" y="340" text-anchor="middle" class="sublabel" fill="#dd6b20">5-20ms</text>
  <text x="450" y="340" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Durable</text>
  <text x="600" y="340" text-anchor="middle" class="sublabel">Manual job</text>
  <text x="800" y="340" text-anchor="middle" class="sublabel">Audit trail</text>
  
  <!-- Row 3 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Hybrid</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">&lt;1ms</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#38a169" font-weight="600">Durable</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel">Auto + Archive</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel">Production</text>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 4: Storage Comparison</text>
</svg>
