<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .client { fill: #bee3f8; stroke: #3182ce; stroke-width: 2; }
      .middleware { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .storage { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Client -->
  <rect class="client" x="50" y="50" width="180" height="380" rx="8"/>
  <text x="140" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Client</text>
  
  <rect class="client" x="70" y="100" width="140" height="50" rx="4"/>
  <text x="140" y="130" text-anchor="middle" class="sublabel" style="font-weight: 600;">Generate UUID</text>
  
  <rect class="client" x="70" y="170" width="140" height="50" rx="4"/>
  <text x="140" y="200" text-anchor="middle" class="sublabel" style="font-weight: 600;">Idempotency-Key</text>
  
  <rect class="client" x="70" y="240" width="140" height="50" rx="4"/>
  <text x="140" y="270" text-anchor="middle" class="sublabel" style="font-weight: 600;">Retry Logic</text>
  
  <rect class="client" x="70" y="310" width="140" height="50" rx="4"/>
  <text x="140" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600;">Cache Result</text>
  
  <!-- Middleware -->
  <rect class="middleware" x="320" y="50" width="200" height="380" rx="8"/>
  <text x="420" y="80" text-anchor="middle" class="label" style="font-size: 16px;">Idempotency Middleware</text>
  
  <rect class="middleware" x="340" y="100" width="160" height="45" rx="4"/>
  <text x="420" y="127" text-anchor="middle" class="sublabel" style="font-weight: 600;">Extract Key</text>
  
  <rect class="middleware" x="340" y="160" width="160" height="45" rx="4"/>
  <text x="420" y="187" text-anchor="middle" class="sublabel" style="font-weight: 600;">Check Cache</text>
  
  <rect class="middleware" x="340" y="220" width="160" height="45" rx="4"/>
  <text x="420" y="247" text-anchor="middle" class="sublabel" style="font-weight: 600;">Acquire Lock</text>
  
  <rect class="middleware" x="340" y="280" width="160" height="45" rx="4"/>
  <text x="420" y="307" text-anchor="middle" class="sublabel" style="font-weight: 600;">Cache Result</text>
  
  <rect class="middleware" x="340" y="340" width="160" height="45" rx="4"/>
  <text x="420" y="367" text-anchor="middle" class="sublabel" style="font-weight: 600;">Release Lock</text>
  
  <!-- Storage -->
  <rect class="storage" x="600" y="100" width="180" height="280" rx="8"/>
  <text x="690" y="130" text-anchor="middle" class="label" style="font-size: 16px;">Storage</text>
  
  <rect class="storage" x="620" y="150" width="140" height="50" rx="4"/>
  <text x="690" y="180" text-anchor="middle" class="sublabel" style="font-weight: 600;">Redis Cache</text>
  <text x="690" y="195" text-anchor="middle" class="sublabel">(Hot, TTL)</text>
  
  <rect class="storage" x="620" y="220" width="140" height="50" rx="4"/>
  <text x="690" y="250" text-anchor="middle" class="sublabel" style="font-weight: 600;">Database</text>
  <text x="690" y="265" text-anchor="middle" class="sublabel">(Audit Trail)</text>
  
  <rect class="storage" x="620" y="290" width="140" height="50" rx="4"/>
  <text x="690" y="320" text-anchor="middle" class="sublabel" style="font-weight: 600;">Lock Store</text>
  <text x="690" y="335" text-anchor="middle" class="sublabel">(SETNX)</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 195 L335 195"/>
  <text x="280" y="185" text-anchor="middle" class="sublabel">Request + Key</text>
  
  <path class="arrow" d="M520 185 L615 205"/>
  <text x="570" y="175" text-anchor="middle" class="sublabel">Lookup</text>
  
  <path class="arrow" d="M615 225 L520 245"/>
  <text x="570" y="250" text-anchor="middle" class="sublabel">Result</text>
  
  <path class="arrow" d="M335 365 L230 365"/>
  <text x="280" y="375" text-anchor="middle" class="sublabel">Cached Response</text>
  
  <text x="500" y="480" text-anchor="middle" class="label" style="font-size: 16px;">Figure 1: Idempotency Architecture</text>
</svg>
