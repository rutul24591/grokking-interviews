<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .bg-dark { fill: #1a1a2e; }
      .step { fill: #f0f4f8; stroke: #4a5568; stroke-width: 2; }
      .success { fill: #c6f6d5; stroke: #38a169; stroke-width: 2; }
      .lock { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2d3748; font-weight: 600; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #718096; font-weight: 400; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Step 1 -->
  <rect class="step" x="50" y="50" width="180" height="70" rx="8"/>
  <text x="140" y="80" text-anchor="middle" class="label">1. Receive Request</text>
  <text x="140" y="105" text-anchor="middle" class="sublabel">Extract Idempotency-Key</text>
  
  <!-- Step 2 -->
  <rect class="step" x="280" y="50" width="180" height="70" rx="8"/>
  <text x="370" y="80" text-anchor="middle" class="label">2. Check Cache</text>
  <text x="370" y="105" text-anchor="middle" class="sublabel">Key exists?</text>
  
  <!-- Step 3a: Cache Hit -->
  <rect class="success" x="510" y="50" width="180" height="70" rx="8"/>
  <text x="600" y="80" text-anchor="middle" class="label">3a. Cache Hit</text>
  <text x="600" y="105" text-anchor="middle" class="sublabel">Return cached result</text>
  
  <!-- Step 3b: Cache Miss -->
  <rect class="lock" x="50" y="180" width="180" height="70" rx="8"/>
  <text x="140" y="210" text-anchor="middle" class="label">3b. Cache Miss</text>
  <text x="140" y="235" text-anchor="middle" class="sublabel">Acquire distributed lock</text>
  
  <!-- Step 4 -->
  <rect class="step" x="280" y="180" width="180" height="70" rx="8"/>
  <text x="370" y="210" text-anchor="middle" class="label">4. Process Operation</text>
  <text x="370" y="235" text-anchor="middle" class="sublabel">Business logic</text>
  
  <!-- Step 5 -->
  <rect class="success" x="510" y="180" width="180" height="70" rx="8"/>
  <text x="600" y="210" text-anchor="middle" class="label">5. Cache Result</text>
  <text x="600" y="235" text-anchor="middle" class="sublabel">Store with TTL</text>
  
  <!-- Step 6 -->
  <rect class="success" x="740" y="115" width="180" height="70" rx="8" stroke-width="3"/>
  <text x="830" y="145" text-anchor="middle" class="label">6. Return Response</text>
  <text x="830" y="170" text-anchor="middle" class="sublabel">Release lock</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 85 L275 85"/>
  <path class="arrow" d="M460 85 L505 85"/>
  <text x="485" y="75" text-anchor="middle" class="sublabel">Yes</text>
  
  <path class="arrow" d="M370 120 L370 150 L140 150 L140 175"/>
  <text x="160" y="155" text-anchor="middle" class="sublabel">No</text>
  
  <path class="arrow" d="M230 215 L275 215"/>
  <path class="arrow" d="M460 215 L505 215"/>
  <path class="arrow" d="M690 215 L735 150"/>
  
  <!-- Concurrent Request -->
  <rect class="step" x="50" y="320" width="200" height="60" rx="8" stroke-dasharray="5,5"/>
  <text x="150" y="350" text-anchor="middle" class="label">Concurrent Request</text>
  <text x="150" y="370" text-anchor="middle" class="sublabel">Same key, lock held</text>
  
  <rect class="lock" x="280" y="320" width="180" height="60" rx="8"/>
  <text x="370" y="350" text-anchor="middle" class="label">Wait or Fail (409)</text>
  <text x="370" y="370" text-anchor="middle" class="sublabel">Retry with backoff</text>
  
  <path class="arrow" d="M250 350 L275 350"/>
  
  <text x="500" y="440" text-anchor="middle" class="label" style="font-size: 16px;">Figure 2: Idempotency Flow</text>
</svg>
