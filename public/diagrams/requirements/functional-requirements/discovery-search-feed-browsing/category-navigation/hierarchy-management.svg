<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Category Hierarchy Management</text>
  
  <!-- Tree Structure (Top Left) -->
  <rect x="20" y="70" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Tree Structure</text>
  
  <rect x="40" y="110" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Tree visualization -->
  <circle cx="170" cy="135" r="25" class="accent-box" stroke-width="2"/>
  <text x="170" y="140" text-anchor="middle" font-size="8" font-weight="bold" class="text-primary">Root</text>
  
  <line x1="170" y1="160" x2="120" y2="185" class="arrow" stroke-width="1.5"/>
  <line x1="170" y1="160" x2="220" y2="185" class="arrow" stroke-width="1.5"/>
  
  <circle cx="120" cy="200" r="20" class="box-base" stroke-width="1.5"/>
  <text x="120" y="205" text-anchor="middle" font-size="7" class="text-primary">Cat A</text>
  
  <circle cx="220" cy="200" r="20" class="box-base" stroke-width="1.5"/>
  <text x="220" y="205" text-anchor="middle" font-size="7" class="text-primary">Cat B</text>
  
  <line x1="220" y1="220" x2="200" y2="240" class="arrow" stroke-width="1"/>
  <line x1="220" y1="220" x2="240" y2="240" class="arrow" stroke-width="1"/>
  
  <circle cx="200" cy="255" r="15" class="highlight-box" stroke-width="1"/>
  <text x="200" y="260" text-anchor="middle" font-size="6" class="text-primary">Sub B1</text>
  
  <circle cx="240" cy="255" r="15" class="highlight-box" stroke-width="1"/>
  <text x="240" y="260" text-anchor="middle" font-size="6" class="text-primary">Sub B2</text>
  
  <text x="170" y="285" text-anchor="middle" font-size="9" class="highlight-green">✓ Parent-child links</text>
  
  <!-- URL Routing (Top Right) -->
  <rect x="340" y="70" width="320" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">URL Routing</text>
  
  <rect x="360" y="110" width="280" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- URL examples -->
  <rect x="375" y="125" width="250" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="390" y="142" font-size="8" class="text-secondary">Hierarchical:</text>
  <text x="480" y="142" font-size="8" class="text-primary" font-family="monospace">/electronics/phones</text>
  
  <rect x="375" y="155" width="250" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="390" y="172" font-size="8" class="text-secondary">With IDs:</text>
  <text x="480" y="172" font-size="8" class="text-primary" font-family="monospace">/electronics-1/phones-2</text>
  
  <rect x="375" y="185" width="250" height="25" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="390" y="202" font-size="8" class="highlight-green">✓</text>
  <text x="410" y="202" font-size="8" class="text-primary">SEO-friendly, stable</text>
  
  <text x="500" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Hierarchical URLs</text>
  
  <!-- State Management (Bottom Left) -->
  <rect x="20" y="260" width="300" height="170" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="170" y="285" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">State Management</text>
  
  <rect x="40" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- State items -->
  <text x="55" y="325" font-size="10" font-weight="bold" class="text-primary">Expanded:</text>
  <text x="55" y="345" font-size="9" class="text-secondary" font-family="monospace">["cat-1", "cat-1-2"]</text>
  <text x="55" y="365" font-size="9" class="highlight-purple">Persist in localStorage</text>
  
  <text x="55" y="390" font-size="10" font-weight="bold" class="text-primary">Active:</text>
  <text x="55" y="410" font-size="9" class="text-secondary" font-family="monospace">"cat-1-2-3"</text>
  <text x="55" y="430" font-size="9" class="highlight-green">Sync with URL</text>
  
  <!-- Lazy Loading (Bottom Right) -->
  <rect x="340" y="260" width="320" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="500" y="285" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Lazy Loading</text>
  
  <rect x="360" y="300" width="280" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Loading states -->
  <rect x="375" y="315" width="250" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="390" y="335" font-size="8" class="text-primary">▶ Electronics</text>
  <text x="580" y="335" font-size="8" class="text-secondary">(loaded)</text>
  
  <rect x="375" y="350" width="250" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="390" y="370" font-size="8" class="text-primary">▼ Phones</text>
  <text x="580" y="370" font-size="8" class="highlight-purple">(loading...)</text>
  
  <rect x="390" y="385" width="235" height="25" rx="2" class="box-base" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="405" y="402" font-size="7" class="text-secondary">○ Smartphones</text>
  <text x="580" y="402" font-size="7" class="text-secondary">(pending)</text>
  
  <text x="500" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Fast initial load</text>
  
  <!-- Data Flow (Center) -->
  <rect x="680" y="70" width="300" height="360" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="830" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Data Flow</text>
  
  <rect x="700" y="110" width="260" height="305" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Step 1 -->
  <rect x="715" y="125" width="230" height="40" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="730" y="145" font-size="9" font-weight="bold" class="text-primary">1. Fetch Top Level</text>
  <text x="730" y="160" font-size="8" class="text-secondary">GET /categories?parent=root</text>
  
  <!-- Arrow -->
  <line x1="830" y1="165" x2="830" y2="180" class="arrow" stroke-width="2"/>
  
  <!-- Step 2 -->
  <rect x="715" y="180" width="230" height="40" rx="2" class="box-base" stroke-width="1"/>
  <text x="730" y="200" font-size="9" font-weight="bold" class="text-primary">2. Render Tree</text>
  <text x="730" y="215" font-size="8" class="text-secondary">Expandable nodes</text>
  
  <!-- Arrow -->
  <line x1="830" y1="220" x2="830" y2="235" class="arrow" stroke-width="2"/>
  
  <!-- Step 3 -->
  <rect x="715" y="235" width="230" height="40" rx="2" class="box-base" stroke-width="1"/>
  <text x="730" y="255" font-size="9" font-weight="bold" class="text-primary">3. User Clicks</text>
  <text x="730" y="270" font-size="8" class="text-secondary">Expand or navigate</text>
  
  <!-- Arrow -->
  <line x1="830" y1="275" x2="830" y2="290" class="arrow" stroke-width="2"/>
  
  <!-- Step 4 -->
  <rect x="715" y="290" width="230" height="40" rx="2" class="accent-box" stroke-width="1.5"/>
  <text x="730" y="310" font-size="9" font-weight="bold" class="text-primary">4. Lazy Load Children</text>
  <text x="730" y="325" font-size="8" class="text-secondary">GET /categories?parent=id</text>
  
  <!-- Arrow -->
  <line x1="830" y1="330" x2="830" y2="345" class="arrow" stroke-width="2"/>
  
  <!-- Step 5 -->
  <rect x="715" y="345" width="230" height="40" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="730" y="365" font-size="9" font-weight="bold" class="text-primary">5. Update State</text>
  <text x="730" y="380" font-size="8" class="text-secondary">Expand + cache result</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
