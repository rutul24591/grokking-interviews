<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Geographic Filtering UI</text>
  
  <!-- Location Picker (Top Left) -->
  <rect x="20" y="70" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Location Picker</text>
  
  <rect x="40" y="110" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Dropdown mock -->
  <rect x="55" y="125" width="230" height="35" rx="3" class="accent-box" stroke-width="1.5"/>
  <text x="75" y="147" font-size="10" class="text-primary">📍</text>
  <text x="95" y="147" font-size="10" class="text-primary">United States</text>
  <text x="265" y="147" font-size="12" class="text-secondary">▼</text>
  
  <!-- Options -->
  <text x="55" y="175" font-size="9" class="text-primary">• Current: New York, US</text>
  <text x="55" y="195" font-size="9" class="text-primary">• Home: London, UK</text>
  <text x="55" y="215" font-size="9" class="text-secondary">• Search location...</text>
  
  <text x="170" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Default to current</text>
  
  <!-- Arrow to Options -->
  <line x1="320" y1="155" x2="360" y2="155" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Location Options (Top Center) -->
  <rect x="360" y="70" width="300" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="510" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Location Options</text>
  
  <rect x="380" y="110" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Option 1: Current -->
  <rect x="395" y="125" width="230" height="25" rx="2" class="highlight-box" stroke-width="1.5"/>
  <text x="410" y="142" font-size="9" class="highlight-green">✓</text>
  <text x="430" y="142" font-size="9" font-weight="bold" class="text-primary">Current Location</text>
  <text x="550" y="142" font-size="8" class="text-secondary">New York, US</text>
  
  <!-- Option 2: Home -->
  <rect x="395" y="155" width="230" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="410" y="172" font-size="9" class="text-secondary">○</text>
  <text x="430" y="172" font-size="9" class="text-primary">Home Location</text>
  <text x="550" y="172" font-size="8" class="text-secondary">London, UK</text>
  
  <!-- Option 3: Global -->
  <rect x="395" y="185" width="230" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="410" y="202" font-size="9" class="text-secondary">○</text>
  <text x="430" y="202" font-size="9" class="text-primary">Global Trends</text>
  <text x="550" y="202" font-size="8" class="highlight-purple">Worldwide</text>
  
  <text x="510" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Save preference</text>
  
  <!-- Arrow to Map -->
  <line x1="660" y1="155" x2="700" y2="155" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Map Selection (Top Right) -->
  <rect x="700" y="70" width="280" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="840" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Map Selection</text>
  
  <rect x="720" y="110" width="240" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Simplified map mock -->
  <rect x="735" y="125" width="210" height="85" rx="2" class="accent-box" stroke-width="1"/>
  <text x="840" y="155" text-anchor="middle" font-size="10" class="text-secondary">[World Map]</text>
  <text x="840" y="175" text-anchor="middle" font-size="9" class="text-secondary">Click to select country</text>
  <text x="840" y="195" text-anchor="middle" font-size="9" class="highlight-purple">📍 Selected: US</text>
  
  <text x="840" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Visual selection</text>
  
  <!-- Arrows down to Trends -->
  <line x1="170" y1="240" x2="170" y2="280" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <line x1="510" y1="240" x2="510" y2="280" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <line x1="840" y1="240" x2="840" y2="280" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Trend Display with Location (Bottom Left) -->
  <rect x="20" y="280" width="300" height="150" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="170" y="305" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Trends for Selected Location</text>
  
  <rect x="40" y="320" width="260" height="95" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Location header -->
  <rect x="55" y="335" width="230" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="70" y="352" font-size="9" class="text-primary">📍</text>
  <text x="90" y="352" font-size="9" font-weight="bold" class="text-primary">Trending in United States</text>
  <text x="265" y="352" font-size="8" class="text-secondary">Change</text>
  
  <!-- Trend items -->
  <text x="70" y="375" font-size="8" class="highlight-green">1 ↑</text>
  <text x="95" y="375" font-size="8" class="text-primary">#USElections</text>
  <text x="180" y="375" font-size="8" class="text-secondary">50K posts</text>
  
  <text x="70" y="395" font-size="8" class="highlight-green">2 ↑</text>
  <text x="95" y="395" font-size="8" class="text-primary">#SuperBowl</text>
  <text x="180" y="395" font-size="8" class="text-secondary">35K posts</text>
  
  <text x="70" y="415" font-size="8" class="text-secondary">3 →</text>
  <text x="95" y="415" font-size="8" class="text-primary">#TechNews</text>
  <text x="180" y="415" font-size="8" class="text-secondary">20K posts</text>
  
  <!-- Category Tabs (Bottom Center) -->
  <rect x="340" y="280" width="320" height="150" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="305" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Category Tabs</text>
  
  <rect x="360" y="320" width="280" height="95" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Tab bar -->
  <rect x="375" y="335" width="250" height="30" rx="3" class="box-base" stroke-width="1"/>
  <text x="390" y="355" font-size="8" font-weight="bold" class="text-primary">All</text>
  <text x="420" y="355" font-size="8" class="text-secondary">News</text>
  <text x="460" y="355" font-size="8" class="text-secondary">Sports</text>
  <text x="510" y="355" font-size="8" class="text-secondary">Entertainment</text>
  <text x="590" y="355" font-size="8" class="text-secondary">Tech</text>
  
  <!-- Active tab indicator -->
  <rect x="375" y="363" width="40" height="3" rx="1" class="highlight-green"/>
  
  <!-- Scroll indicator -->
  <text x="610" y="355" font-size="10" class="text-secondary">→</text>
  <text x="375" y="385" font-size="8" class="highlight-purple">Horizontal scroll</text>
  <text x="375" y="405" font-size="8" class="text-secondary">Active tab highlighted</text>
  
  <!-- Location Badge (Bottom Right) -->
  <rect x="680" y="280" width="300" height="150" rx="5" class="box-base" stroke-width="2"/>
  <text x="830" y="305" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Location Badge</text>
  
  <rect x="700" y="320" width="260" height="95" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Badge examples -->
  <rect x="715" y="335" width="100" height="25" rx="12" class="accent-box" stroke-width="1"/>
  <text x="765" y="352" text-anchor="middle" font-size="9" class="text-primary">🇺🇸 United States</text>
  
  <rect x="715" y="365" width="80" height="25" rx="12" class="box-base" stroke-width="1"/>
  <text x="755" y="382" text-anchor="middle" font-size="9" class="text-primary">🇬🇧 UK</text>
  
  <rect x="805" y="365" width="90" height="25" rx="12" class="box-base" stroke-width="1"/>
  <text x="850" y="382" text-anchor="middle" font-size="9" class="text-primary">🌍 Global</text>
  
  <text x="830" y="415" text-anchor="middle" font-size="9" class="highlight-green">✓ Quick recognition</text>
  <text x="830" y="430" text-anchor="middle" font-size="9" class="text-secondary">Flag + country name</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
