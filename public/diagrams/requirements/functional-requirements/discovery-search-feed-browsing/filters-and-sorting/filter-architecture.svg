<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Filters and Sorting Architecture</text>
  
  <!-- User Interaction (Top Left) -->
  <rect x="20" y="70" width="180" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="110" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">User Interaction</text>
  
  <rect x="40" y="110" width="140" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="130" font-size="9" class="text-primary">• Checkbox click</text>
  <text x="55" y="148" font-size="9" class="text-primary">• Slider change</text>
  
  <!-- Arrow to State -->
  <line x1="200" y1="120" x2="240" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- State Management (Top Center Left) -->
  <rect x="240" y="70" width="200" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="340" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">State Management</text>
  
  <rect x="260" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="130" font-size="9" class="text-primary">• Active filters[]</text>
  <text x="275" y="148" font-size="9" class="text-primary">• Sort order</text>
  
  <!-- Arrow to URL -->
  <line x1="440" y1="120" x2="480" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- URL Sync (Top Center) -->
  <rect x="480" y="70" width="200" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="580" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">URL Sync</text>
  
  <rect x="500" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="515" y="130" font-size="9" class="text-secondary">?category=electronics</text>
  <text x="515" y="148" font-size="9" class="text-secondary">price_min=50</text>
  
  <!-- Arrow to API -->
  <line x1="680" y1="120" x2="720" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Filter API (Top Center Right) -->
  <rect x="720" y="70" width="200" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="820" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Filter API</text>
  
  <rect x="740" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="755" y="130" font-size="9" class="text-secondary">GET /products</text>
  <text x="755" y="148" font-size="9" class="text-secondary">With filter params</text>
  
  <!-- Arrow down to Results -->
  <line x1="820" y1="170" x2="820" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Results Display (Middle Right) -->
  <rect x="700" y="210" width="240" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="820" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Results Display</text>
  
  <rect x="720" y="250" width="200" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="735" y="270" font-size="9" class="text-primary">• Result list</text>
  <text x="735" y="288" font-size="9" class="text-primary">• Result count</text>
  <text x="735" y="306" font-size="9" class="highlight-green">Maintain scroll</text>
  
  <!-- Arrow to Filter Counts -->
  <line x1="700" y1="270" x2="660" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Update Counts (Middle Center) -->
  <rect x="480" y="210" width="180" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="570" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Update Counts</text>
  
  <rect x="500" y="250" width="140" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="515" y="270" font-size="9" class="text-primary">Recalculate</text>
  <text x="515" y="288" font-size="9" class="text-primary">per filter option</text>
  <text x="515" y="306" font-size="9" class="highlight-purple">Dynamic counts</text>
  
  <!-- Arrow to Active Filters -->
  <line x1="480" y1="270" x2="440" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Active Filters (Middle Left) -->
  <rect x="240" y="210" width="200" height="120" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="340" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Active Filters</text>
  
  <rect x="260" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="270" font-size="9" class="text-primary">• Filter badges</text>
  <text x="275" y="288" font-size="9" class="text-primary">• Remove (x)</text>
  <text x="275" y="306" font-size="9" class="highlight-green">Clear all button</text>
  
  <!-- Arrow to Filter UI -->
  <line x1="240" y1="270" x2="200" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Filter UI (Far Left Middle) -->
  <rect x="20" y="210" width="180" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="110" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Filter UI</text>
  
  <rect x="40" y="250" width="140" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="270" font-size="9" class="text-primary">• Checkboxes</text>
  <text x="55" y="288" font-size="9" class="text-primary">• Sliders</text>
  <text x="55" y="306" font-size="9" class="text-secondary">Expandable sections</text>
  
  <!-- Debounce (Bottom Left) -->
  <rect x="20" y="350" width="300" height="130" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="375" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Debounce Strategy</text>
  
  <rect x="40" y="390" width="260" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="410" font-size="9" class="text-primary">• Instant: Checkboxes, toggles</text>
  <text x="55" y="428" font-size="9" class="text-primary">• 300ms: Search input</text>
  <text x="55" y="446" font-size="9" class="text-primary">• On change end: Sliders</text>
  <text x="180" y="410" font-size="9" class="highlight-green">Reduce API calls</text>
  
  <!-- Request Cancellation (Bottom Center) -->
  <rect x="340" y="350" width="320" height="130" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="375" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Request Cancellation</text>
  
  <rect x="360" y="390" width="280" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="375" y="410" font-size="9" class="text-primary">• AbortController for fetch</text>
  <text x="375" y="428" font-size="9" class="text-primary">• Cancel pending on new change</text>
  <text x="375" y="446" font-size="9" class="text-primary">• Prevent race conditions</text>
  <text x="550" y="410" font-size="9" class="highlight-green">✓ Latest wins</text>
  
  <!-- Caching (Bottom Right) -->
  <rect x="680" y="350" width="300" height="130" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="375" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Caching Strategy</text>
  
  <rect x="700" y="390" width="260" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="715" y="410" font-size="9" class="text-primary">• Cache by filter combination</text>
  <text x="715" y="428" font-size="9" class="text-primary">• Cache filter counts separately</text>
  <text x="715" y="446" font-size="9" class="text-primary">• localStorage for preferences</text>
  <text x="850" y="410" font-size="9" class="highlight-green">✓ Faster repeat</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
