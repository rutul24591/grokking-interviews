<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Recommendation Carousel Architecture</text>
  
  <!-- Data Source (Top Left) -->
  <rect x="20" y="70" width="180" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="110" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Data Source</text>
  
  <rect x="40" y="110" width="140" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="130" font-size="9" class="text-primary">• Recommendation API</text>
  <text x="55" y="148" font-size="9" class="text-primary">• User history</text>
  
  <!-- Arrow to Fetching -->
  <line x1="200" y1="120" x2="240" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Data Fetching (Top Center Left) -->
  <rect x="240" y="70" width="200" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="340" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Data Fetching</text>
  
  <rect x="260" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="130" font-size="9" class="text-primary">• Hybrid loading</text>
  <text x="275" y="148" font-size="9" class="text-secondary">Eager 5, lazy rest</text>
  
  <!-- Arrow to Rendering -->
  <line x1="440" y1="120" x2="480" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Rendering (Top Center) -->
  <rect x="480" y="70" width="200" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="580" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Rendering</text>
  
  <rect x="500" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="515" y="130" font-size="9" class="text-secondary">CSS transforms</text>
  <text x="515" y="148" font-size="9" class="text-secondary">Virtual scrolling</text>
  
  <!-- Arrow to Display -->
  <line x1="680" y1="120" x2="720" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Carousel Display (Top Right) -->
  <rect x="720" y="70" width="260" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="850" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Carousel Display</text>
  
  <rect x="740" y="110" width="220" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="755" y="130" font-size="9" class="text-primary">• Horizontal scroll</text>
  <text x="755" y="148" font-size="9" class="text-secondary">Arrow navigation</text>
  
  <!-- Arrow down to Interaction -->
  <line x1="850" y1="170" x2="850" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- User Interaction (Middle Right) -->
  <rect x="720" y="210" width="260" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="850" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">User Interaction</text>
  
  <rect x="740" y="250" width="220" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="755" y="270" font-size="9" class="text-primary">• Scroll/arrow click</text>
  <text x="755" y="288" font-size="9" class="text-primary">• Item click</text>
  <text x="755" y="306" font-size="9" class="highlight-green">Track engagement</text>
  
  <!-- Arrow to Analytics -->
  <line x1="720" y1="270" x2="680" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Analytics (Middle Center) -->
  <rect x="480" y="210" width="200" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="580" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Analytics</text>
  
  <rect x="500" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="515" y="270" font-size="9" class="text-primary">• Impressions</text>
  <text x="515" y="288" font-size="9" class="text-primary">• CTR per item</text>
  <text x="515" y="306" font-size="9" class="highlight-purple">Scroll depth</text>
  
  <!-- Arrow to Prefetch -->
  <line x1="480" y1="270" x2="440" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Prefetch (Middle Left) -->
  <rect x="240" y="210" width="200" height="120" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="340" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Prefetch</text>
  
  <rect x="260" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="270" font-size="9" class="text-primary">• Next carousel</text>
  <text x="275" y="288" font-size="9" class="text-primary">• On viewport enter</text>
  <text x="275" y="306" font-size="9" class="highlight-green">Reduce latency</text>
  
  <!-- Arrow to Cache -->
  <line x1="240" y1="270" x2="200" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Cache (Far Left Middle) -->
  <rect x="20" y="210" width="180" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="110" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Cache</text>
  
  <rect x="40" y="250" width="140" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="270" font-size="9" class="text-primary">• Carousel data</text>
  <text x="55" y="288" font-size="9" class="text-primary">• Images (CDN)</text>
  <text x="55" y="306" font-size="9" class="text-secondary">localStorage</text>
  
  <!-- Carousel Layout (Bottom Left) -->
  <rect x="20" y="350" width="300" height="130" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="375" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Carousel Layout</text>
  
  <rect x="40" y="390" width="260" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="410" font-size="9" class="text-primary">• 5-8 items visible</text>
  <text x="55" y="428" font-size="9" class="text-primary">• Partial next item</text>
  <text x="55" y="446" font-size="9" class="text-primary">• 10-20px gutter</text>
  <text x="180" y="410" font-size="9" class="highlight-green">✓ Indicates scroll</text>
  
  <!-- Item Structure (Bottom Center) -->
  <rect x="340" y="350" width="320" height="130" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="375" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Item Structure</text>
  
  <rect x="360" y="390" width="280" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="375" y="410" font-size="9" class="text-primary">• Thumbnail (16:9)</text>
  <text x="375" y="428" font-size="9" class="text-primary">• Title (truncate)</text>
  <text x="375" y="446" font-size="9" class="text-primary">• Metadata (rating, date)</text>
  <text x="550" y="410" font-size="9" class="highlight-green">✓ Lazy load images</text>
  
  <!-- Performance Metrics (Bottom Right) -->
  <rect x="680" y="350" width="300" height="130" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="375" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Performance Targets</text>
  
  <rect x="700" y="390" width="260" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="715" y="410" font-size="9" class="text-primary">• Scroll: 60fps</text>
  <text x="715" y="428" font-size="9" class="text-primary">• Initial load: &lt;1s</text>
  <text x="715" y="446" font-size="9" class="text-primary">• Image load: &lt;500ms</text>
  <text x="850" y="410" font-size="9" class="highlight-green">✓ Smooth UX</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
