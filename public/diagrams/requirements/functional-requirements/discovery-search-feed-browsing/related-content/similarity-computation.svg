<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Similarity Computation Approaches</text>
  
  <!-- Content-based (Top Left) -->
  <rect x="20" y="70" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Content-based Similarity</text>
  
  <rect x="40" y="110" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="55" y="135" font-size="10" class="text-primary">Compare item features:</text>
  <text x="55" y="155" font-size="9" class="text-secondary">• Tag overlap (Jaccard)</text>
  <text x="55" y="175" font-size="9" class="text-secondary">• Embedding cosine similarity</text>
  <text x="55" y="195" font-size="9" class="text-secondary">• Category match</text>
  <text x="55" y="215" font-size="9" class="text-secondary">• Author match</text>
  
  <text x="170" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Works for new items</text>
  
  <!-- Formula -->
  <rect x="40" y="255" width="260" height="35" rx="3" class="accent-box" stroke-width="1"/>
  <text x="170" y="277" text-anchor="middle" font-size="9" class="text-primary" font-family="monospace">sim(A,B) = cosine(embedding_A, embedding_B)</text>
  
  <!-- Arrow to Hybrid -->
  <line x1="320" y1="155" x2="360" y2="155" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Collaborative Filtering (Top Center) -->
  <rect x="360" y="70" width="300" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="510" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Collaborative Filtering</text>
  
  <rect x="380" y="110" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="395" y="135" font-size="10" class="text-primary">Co-engagement patterns:</text>
  <text x="395" y="155" font-size="9" class="text-secondary">• Users who viewed X also viewed Y</text>
  <text x="395" y="175" font-size="9" class="text-secondary">• Session-based co-occurrence</text>
  <text x="395" y="195" font-size="9" class="text-secondary">• Count pairs, normalize</text>
  
  <text x="510" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ High precision</text>
  
  <!-- Formula -->
  <rect x="380" y="255" width="260" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="510" y="277" text-anchor="middle" font-size="9" class="text-primary" font-family="monospace">score(A,B) = count(A,B) / sqrt(count(A)*count(B))</text>
  
  <!-- Arrow to Hybrid -->
  <line x1="660" y1="155" x2="700" y2="155" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Hybrid (Top Right) -->
  <rect x="700" y="70" width="280" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="840" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Hybrid (Production)</text>
  
  <rect x="720" y="110" width="240" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="735" y="135" font-size="10" class="text-primary">Combine signals:</text>
  <text x="735" y="155" font-size="9" class="text-secondary" font-family="monospace">score = 0.4×content + 0.6×collab</text>
  <text x="735" y="180" font-size="9" class="text-secondary">• Weight by confidence</text>
  <text x="735" y="200" font-size="9" class="text-secondary">• Collaborative if &gt;100 engagements</text>
  <text x="735" y="220" font-size="9" class="text-secondary">• Else content-based</text>
  
  <text x="840" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Best of both worlds</text>
  
  <!-- Co-engagement Computation (Bottom Left) -->
  <rect x="20" y="260" width="460" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="250" y="285" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Co-engagement Computation</text>
  
  <rect x="40" y="300" width="420" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Step 1 -->
  <text x="55" y="325" font-size="10" font-weight="bold" class="text-primary">1. Session Logs:</text>
  <text x="55" y="345" font-size="9" class="text-secondary" font-family="monospace">User1: [A, B, C], User2: [A, C, D]...</text>
  
  <!-- Step 2 -->
  <text x="55" y="370" font-size="10" font-weight="bold" class="text-primary">2. Pair Counting:</text>
  <text x="55" y="390" font-size="9" class="text-secondary" font-family="monospace">A-B: 1000, A-C: 500, B-C: 300</text>
  
  <!-- Step 3 -->
  <text x="280" y="325" font-size="10" font-weight="bold" class="text-primary">3. Normalization:</text>
  <text x="280" y="345" font-size="9" class="text-secondary">Jaccard: |A∩B| / |A∪B|</text>
  <text x="280" y="365" font-size="9" class="text-secondary">PMI: log(P(A,B) / P(A)P(B))</text>
  
  <!-- Step 4 -->
  <text x="280" y="390" font-size="10" font-weight="bold" class="text-primary">4. Top-K Selection:</text>
  <text x="280" y="410" font-size="9" class="highlight-green">For each item, select top 20-50</text>
  
  <!-- Similarity Comparison (Bottom Right) -->
  <rect x="500" y="260" width="480" height="170" rx="5" class="accent-box" stroke-width="2"/>
  <text x="740" y="285" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Signal Comparison</text>
  
  <rect x="520" y="300" width="440" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Header -->
  <text x="535" y="320" font-size="9" font-weight="bold" class="text-primary">Signal</text>
  <text x="650" y="320" font-size="9" font-weight="bold" class="text-primary">Precision</text>
  <text x="740" y="320" font-size="9" font-weight="bold" class="text-primary">Coverage</text>
  <text x="850" y="320" font-size="9" font-weight="bold" class="text-primary">Cold Start</text>
  
  <!-- Row 1 -->
  <line x1="530" y1="330" x2="950" y2="330" class="arrow" stroke-width="1"/>
  <text x="535" y="345" font-size="8" class="text-primary">Tags</text>
  <text x="650" y="345" font-size="8" class="highlight-purple">Medium</text>
  <text x="740" y="345" font-size="8" class="highlight-green">100%</text>
  <text x="850" y="345" font-size="8" class="highlight-green">Excellent</text>
  
  <!-- Row 2 -->
  <line x1="530" y1="355" x2="950" y2="355" class="arrow" stroke-width="1"/>
  <text x="535" y="370" font-size="8" class="text-primary">Co-engagement</text>
  <text x="650" y="370" font-size="8" class="highlight-green">High</text>
  <text x="740" y="370" font-size="8" class="highlight-purple">Medium</text>
  <text x="850" y="370" font-size="8" class="highlight-red">Poor</text>
  
  <!-- Row 3 -->
  <line x1="530" y1="380" x2="950" y2="380" class="arrow" stroke-width="1"/>
  <text x="535" y="395" font-size="8" class="text-primary">Embeddings</text>
  <text x="650" y="395" font-size="8" class="highlight-green">High</text>
  <text x="740" y="395" font-size="8" class="highlight-green">High</text>
  <text x="850" y="395" font-size="8" class="highlight-purple">Good</text>
  
  <!-- Row 4 -->
  <line x1="530" y1="405" x2="950" y2="405" class="arrow" stroke-width="1"/>
  <text x="535" y="420" font-size="8" class="text-primary">Hybrid</text>
  <text x="650" y="420" font-size="8" class="highlight-green">Highest</text>
  <text x="740" y="420" font-size="8" class="highlight-green">High</text>
  <text x="850" y="420" font-size="8" class="highlight-green">Good</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
