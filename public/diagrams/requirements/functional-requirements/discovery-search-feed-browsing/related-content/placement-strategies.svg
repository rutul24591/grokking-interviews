<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Related Content Placement Strategies</text>
  
  <!-- Sidebar (Top Left) -->
  <rect x="20" y="70" width="220" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Sidebar (Desktop)</text>
  
  <rect x="40" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Mock article layout -->
  <rect x="55" y="125" width="110" height="85" rx="2" class="accent-box" stroke-width="1"/>
  <text x="110" y="155" text-anchor="middle" font-size="8" class="text-secondary">Main Content</text>
  
  <rect x="175" y="125" width="30" height="85" rx="2" class="highlight-box" stroke-width="1.5"/>
  <text x="190" y="155" text-anchor="middle" font-size="7" class="text-primary" transform="rotate(90, 190, 155)">Related</text>
  
  <text x="130" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ Always visible</text>
  <text x="130" y="265" text-anchor="middle" font-size="9" class="text-secondary">Best for: News, blogs</text>
  
  <!-- Below Content (Top Center) -->
  <rect x="260" y="70" width="220" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="370" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Below Content</text>
  
  <rect x="280" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Mock article layout -->
  <rect x="295" y="125" width="150" height="60" rx="2" class="box-base" stroke-width="1"/>
  <text x="370" y="155" text-anchor="middle" font-size="8" class="text-secondary">Main Content</text>
  
  <rect x="295" y="190" width="150" height="25" rx="2" class="highlight-box" stroke-width="1.5"/>
  <text x="370" y="207" text-anchor="middle" font-size="7" class="text-primary">Related Content</text>
  
  <text x="370" y="245" text-anchor="middle" font-size="9" class="highlight-green">✓ After consumption</text>
  <text x="370" y="265" text-anchor="middle" font-size="9" class="text-secondary">Best for: Video, long-form</text>
  
  <!-- In-feed (Top Right) -->
  <rect x="500" y="70" width="220" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="610" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">In-feed</text>
  
  <rect x="520" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Mock feed layout -->
  <rect x="535" y="125" width="150" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="610" y="138" text-anchor="middle" font-size="7" class="text-secondary">Feed Item 1</text>
  
  <rect x="535" y="150" width="150" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="610" y="163" text-anchor="middle" font-size="7" class="text-secondary">Feed Item 2</text>
  
  <rect x="535" y="175" width="150" height="20" rx="2" class="highlight-box" stroke-width="1.5"/>
  <text x="610" y="188" text-anchor="middle" font-size="7" class="text-primary">Related (every 5)</text>
  
  <rect x="535" y="200" width="150" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="610" y="213" text-anchor="middle" font-size="7" class="text-secondary">Feed Item 3</text>
  
  <text x="610" y="245" text-anchor="middle" font-size="9" class="highlight-purple">✓ Proactive discovery</text>
  <text x="610" y="265" text-anchor="middle" font-size="9" class="text-secondary">Best for: Social platforms</text>
  
  <!-- End of Session (Bottom Left) -->
  <rect x="20" y="260" width="220" height="170" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="130" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">End of Session</text>
  
  <rect x="40" y="300" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Mock exit intent -->
  <rect x="55" y="315" width="150" height="85" rx="2" class="accent-box" stroke-width="1.5"/>
  <text x="130" y="345" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Wait!</text>
  <text x="130" y="365" text-anchor="middle" font-size="8" class="text-secondary">Check these out</text>
  <text x="130" y="385" text-anchor="middle" font-size="7" class="text-secondary">[Related 1] [Related 2]</text>
  
  <text x="130" y="445" text-anchor="middle" font-size="9" class="highlight-purple">✓ Last retention chance</text>
  <text x="130" y="465" text-anchor="middle" font-size="9" class="text-secondary">Best for: E-commerce</text>
  
  <!-- Engagement Comparison (Bottom Center) -->
  <rect x="260" y="260" width="360" height="170" rx="5" class="accent-box" stroke-width="2"/>
  <text x="440" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Engagement by Placement</text>
  
  <rect x="280" y="300" width="320" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Bar chart -->
  <text x="300" y="325" font-size="9" class="text-primary">Sidebar:</text>
  <rect x="360" y="315" width="120" height="15" rx="2" class="highlight-green"/>
  <text x="490" y="325" font-size="9" class="text-secondary">25% CTR</text>
  
  <text x="300" y="350" font-size="9" class="text-primary">Below Content:</text>
  <rect x="360" y="340" width="140" height="15" rx="2" class="highlight-blue"/>
  <text x="510" y="350" font-size="9" class="text-secondary">30% CTR (highest)</text>
  
  <text x="300" y="375" font-size="9" class="text-primary">In-feed:</text>
  <rect x="360" y="365" width="80" height="15" rx="2" class="highlight-purple"/>
  <text x="450" y="375" font-size="9" class="text-secondary">15% CTR</text>
  
  <text x="300" y="400" font-size="9" class="text-primary">End of Session:</text>
  <rect x="360" y="390" width="60" height="15" rx="2" class="highlight-box"/>
  <text x="430" y="400" font-size="9" class="text-secondary">10% CTR</text>
  
  <!-- Best Practices (Bottom Right) -->
  <rect x="640" y="260" width="340" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="810" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Best Practices</text>
  
  <rect x="660" y="300" width="300" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="675" y="325" font-size="9" class="text-primary">• Mobile: Horizontal scroll</text>
  <text x="675" y="345" font-size="9" class="text-primary">• Desktop: Sidebar or below</text>
  <text x="675" y="365" font-size="9" class="text-primary">• Show 6-10 items</text>
  <text x="675" y="385" font-size="9" class="text-primary">• Lazy load images</text>
  <text x="675" y="405" font-size="9" class="text-primary">• A/B test placement</text>
  
  <text x="810" y="440" text-anchor="middle" font-size="9" class="highlight-green">Target: &gt;20% CTR</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
