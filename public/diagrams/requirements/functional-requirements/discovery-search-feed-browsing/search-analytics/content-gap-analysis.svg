<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      .highlight-red { fill: #f56565; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Content Gap Analysis</text>
  
  <!-- Zero-Result Queries (Top Left) -->
  <rect x="20" y="70" width="300" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="170" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Zero-Result Queries</text>
  
  <rect x="40" y="110" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Table header -->
  <text x="55" y="130" font-size="9" font-weight="bold" class="text-primary">Query</text>
  <text x="200" y="130" text-anchor="end" font-size="9" font-weight="bold" class="text-primary">Volume</text>
  
  <!-- Row 1 -->
  <line x1="50" y1="135" x2="290" y2="135" class="arrow" stroke-width="1"/>
  <text x="55" y="150" font-size="8" class="text-primary">"wireless charger"</text>
  <text x="200" y="150" text-anchor="end" font-size="8" class="highlight-red">234</text>
  
  <!-- Row 2 -->
  <line x1="50" y1="160" x2="290" y2="160" class="arrow" stroke-width="1"/>
  <text x="55" y="175" font-size="8" class="text-primary">"usb-c hub"</text>
  <text x="200" y="175" text-anchor="end" font-size="8" class="highlight-red">189</text>
  
  <!-- Row 3 -->
  <line x1="50" y1="185" x2="290" y2="185" class="arrow" stroke-width="1"/>
  <text x="55" y="200" font-size="8" class="text-primary">"laptop stand"</text>
  <text x="200" y="200" text-anchor="end" font-size="8" class="highlight-red">156</text>
  
  <!-- Row 4 -->
  <line x1="50" y1="210" x2="290" y2="210" class="arrow" stroke-width="1"/>
  <text x="55" y="225" font-size="8" class="text-primary">"mechanical keyboard"</text>
  <text x="200" y="225" text-anchor="end" font-size="8" class="highlight-red">134</text>
  
  <text x="170" y="245" text-anchor="middle" font-size="9" class="highlight-red">⚠ Highest priority</text>
  
  <!-- Low-Result Queries (Top Right) -->
  <rect x="340" y="70" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="490" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Low-Result Queries</text>
  
  <rect x="360" y="110" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Table header -->
  <text x="375" y="130" font-size="9" font-weight="bold" class="text-primary">Query</text>
  <text x="520" y="130" text-anchor="end" font-size="9" font-weight="bold" class="text-primary">Results</text>
  
  <!-- Row 1 -->
  <line x1="370" y1="135" x2="610" y2="135" class="arrow" stroke-width="1"/>
  <text x="375" y="150" font-size="8" class="text-primary">"gaming mouse"</text>
  <text x="520" y="150" text-anchor="end" font-size="8" class="highlight-purple">3</text>
  
  <!-- Row 2 -->
  <line x1="370" y1="160" x2="610" y2="160" class="arrow" stroke-width="1"/>
  <text x="375" y="175" font-size="8" class="text-primary">"monitor arm"</text>
  <text x="520" y="175" text-anchor="end" font-size="8" class="highlight-purple">2</text>
  
  <!-- Row 3 -->
  <line x1="370" y1="185" x2="610" y2="185" class="arrow" stroke-width="1"/>
  <text x="375" y="200" font-size="8" class="text-primary">"desk lamp"</text>
  <text x="520" y="200" text-anchor="end" font-size="8" class="highlight-purple">4</text>
  
  <text x="490" y="245" text-anchor="middle" font-size="9" class="highlight-purple">⚠ Underserved topics</text>
  
  <!-- Query Refinement Patterns (Bottom Left) -->
  <rect x="20" y="260" width="300" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="170" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Query Refinement Patterns</text>
  
  <rect x="40" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Pattern flows -->
  <text x="55" y="320" font-size="8" font-weight="bold" class="text-primary">Common Refinements:</text>
  
  <text x="55" y="340" font-size="8" class="text-primary">"laptop"</text>
  <text x="100" y="340" font-size="8" class="highlight-blue">→</text>
  <text x="120" y="340" font-size="8" class="text-primary">"laptop 16gb ram"</text>
  <text x="250" y="340" text-anchor="end" font-size="7" class="highlight-red">45%</text>
  
  <text x="55" y="360" font-size="8" class="text-primary">"phone"</text>
  <text x="100" y="360" font-size="8" class="highlight-blue">→</text>
  <text x="120" y="360" font-size="8" class="text-primary">"phone case"</text>
  <text x="250" y="360" text-anchor="end" font-size="7" class="highlight-red">38%</text>
  
  <text x="55" y="380" font-size="8" class="text-primary">"headphones"</text>
  <text x="100" y="380" font-size="8" class="highlight-blue">→</text>
  <text x="120" y="380" font-size="8" class="text-primary">"wireless headphones"</text>
  <text x="250" y="380" text-anchor="end" font-size="7" class="highlight-red">32%</text>
  
  <text x="170" y="445" text-anchor="middle" font-size="9" class="highlight-red">⚠ Initial results poor</text>
  
  <!-- High Exit Rate (Bottom Right) -->
  <rect x="340" y="260" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="490" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">High Exit Rate Queries</text>
  
  <rect x="360" y="300" width="260" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Table header -->
  <text x="375" y="320" font-size="9" font-weight="bold" class="text-primary">Query</text>
  <text x="520" y="320" text-anchor="end" font-size="9" font-weight="bold" class="text-primary">Exit %</text>
  
  <!-- Row 1 -->
  <line x1="370" y1="325" x2="610" y2="325" class="arrow" stroke-width="1"/>
  <text x="375" y="340" font-size="8" class="text-primary">"best laptop 2024"</text>
  <text x="520" y="340" text-anchor="end" font-size="8" class="highlight-red">65%</text>
  
  <!-- Row 2 -->
  <line x1="370" y1="350" x2="610" y2="350" class="arrow" stroke-width="1"/>
  <text x="375" y="365" font-size="8" class="text-primary">"compare phones"</text>
  <text x="520" y="365" text-anchor="end" font-size="8" class="highlight-red">58%</text>
  
  <!-- Row 3 -->
  <line x1="370" y1="375" x2="610" y2="375" class="arrow" stroke-width="1"/>
  <text x="375" y="390" font-size="8" class="text-primary">"reviews"</text>
  <text x="520" y="390" text-anchor="end" font-size="8" class="highlight-red">52%</text>
  
  <text x="490" y="445" text-anchor="middle" font-size="9" class="highlight-red">⚠ Results irrelevant</text>
  
  <!-- Action Priority Matrix (Far Right) -->
  <rect x="660" y="70" width="320" height="360" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="820" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Action Priority Matrix</text>
  
  <rect x="680" y="110" width="280" height="305" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Matrix quadrants -->
  <line x1="820" y1="130" x2="820" y2="395" class="arrow" stroke-width="1"/>
  <line x1="680" y1="260" x2="960" y2="260" class="arrow" stroke-width="1"/>
  
  <!-- Labels -->
  <text x="820" y="125" text-anchor="middle" font-size="8" font-weight="bold" class="text-primary">Volume</text>
  <text x="675" y="265" text-anchor="end" font-size="8" font-weight="bold" class="text-primary">Impact</text>
  
  <!-- Quadrant 1: High Volume, High Impact -->
  <rect x="690" y="140" width="120" height="110" rx="2" class="highlight-red" stroke-width="1.5"/>
  <text x="750" y="160" text-anchor="middle" font-size="8" font-weight="bold" class="text-primary">DO FIRST</text>
  <text x="750" y="180" text-anchor="middle" font-size="7" class="text-secondary">High volume</text>
  <text x="750" y="195" text-anchor="middle" font-size="7" class="text-secondary">zero results</text>
  <text x="750" y="220" text-anchor="middle" font-size="7" class="text-primary">"wireless charger"</text>
  <text x="750" y="235" text-anchor="middle" font-size="7" class="text-primary">"usb-c hub"</text>
  
  <!-- Quadrant 2: Low Volume, High Impact -->
  <rect x="830" y="140" width="120" height="110" rx="2" class="highlight-purple" stroke-width="1"/>
  <text x="890" y="160" text-anchor="middle" font-size="8" font-weight="bold" class="text-primary">SCHEDULE</text>
  <text x="890" y="180" text-anchor="middle" font-size="7" class="text-secondary">Low volume</text>
  <text x="890" y="195" text-anchor="middle" font-size="7" class="text-secondary">high exit rate</text>
  <text x="890" y="220" text-anchor="middle" font-size="7" class="text-primary">"best laptop"</text>
  <text x="890" y="235" text-anchor="middle" font-size="7" class="text-primary">"compare"</text>
  
  <!-- Quadrant 3: High Volume, Low Impact -->
  <rect x="690" y="270" width="120" height="110" rx="2" class="highlight-blue" stroke-width="1"/>
  <text x="750" y="290" text-anchor="middle" font-size="8" font-weight="bold" class="text-primary">DELEGATE</text>
  <text x="750" y="310" text-anchor="middle" font-size="7" class="text-secondary">High volume</text>
  <text x="750" y="325" text-anchor="middle" font-size="7" class="text-secondary">low results</text>
  <text x="750" y="350" text-anchor="middle" font-size="7" class="text-primary">"gaming mouse"</text>
  <text x="750" y="365" text-anchor="middle" font-size="7" class="text-primary">"monitor arm"</text>
  
  <!-- Quadrant 4: Low Volume, Low Impact -->
  <rect x="830" y="270" width="120" height="110" rx="2" class="box-base" stroke-width="1"/>
  <text x="890" y="290" text-anchor="middle" font-size="8" font-weight="bold" class="text-primary">IGNORE</text>
  <text x="890" y="310" text-anchor="middle" font-size="7" class="text-secondary">Low priority</text>
  <text x="890" y="325" text-anchor="middle" font-size="7" class="text-secondary">Long tail</text>
  <text x="890" y="350" text-anchor="middle" font-size="7" class="text-secondary">Review later</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
