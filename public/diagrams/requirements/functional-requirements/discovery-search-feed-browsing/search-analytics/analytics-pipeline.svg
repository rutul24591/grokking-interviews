<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Search Analytics Pipeline</text>
  
  <!-- Search Event (Top Left) -->
  <rect x="20" y="70" width="180" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="110" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Search Event</text>
  
  <rect x="40" y="110" width="140" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="130" font-size="9" class="text-primary">• Query text</text>
  <text x="55" y="148" font-size="9" class="text-primary">• User ID (hashed)</text>
  
  <!-- Arrow to Logging -->
  <line x1="200" y1="120" x2="240" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Logging (Top Center Left) -->
  <rect x="240" y="70" width="200" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="340" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Logging Layer</text>
  
  <rect x="260" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="130" font-size="9" class="text-primary">Client + Server logs</text>
  <text x="275" y="148" font-size="9" class="text-secondary">Anonymize PII</text>
  
  <!-- Arrow to Queue -->
  <line x1="440" y1="120" x2="480" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Event Queue (Top Center) -->
  <rect x="480" y="70" width="200" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="580" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Event Queue</text>
  
  <rect x="500" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="515" y="130" font-size="9" class="text-secondary">Kafka / Kinesis</text>
  <text x="515" y="148" font-size="9" class="text-secondary">High-volume ingestion</text>
  
  <!-- Arrow to Processing -->
  <line x1="680" y1="120" x2="720" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Stream Processing (Top Center Right) -->
  <rect x="720" y="70" width="200" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="820" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Stream Processing</text>
  
  <rect x="740" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="755" y="130" font-size="9" class="text-secondary">Flink / Spark</text>
  <text x="755" y="148" font-size="9" class="text-secondary">Real-time aggregation</text>
  
  <!-- Arrow down to Storage -->
  <line x1="820" y1="170" x2="820" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Data Storage (Middle Right) -->
  <rect x="700" y="210" width="240" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="820" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Data Storage</text>
  
  <rect x="720" y="250" width="200" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="735" y="270" font-size="9" class="text-primary">• BigQuery / Redshift</text>
  <text x="735" y="288" font-size="9" class="text-primary">• Aggregated metrics</text>
  <text x="735" y="306" font-size="9" class="highlight-green">SQL analysis</text>
  
  <!-- Arrow to Dashboard -->
  <line x1="700" y1="270" x2="660" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Dashboard (Middle Center) -->
  <rect x="480" y="210" width="180" height="120" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="570" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Dashboard</text>
  
  <rect x="500" y="250" width="140" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="515" y="270" font-size="9" class="text-primary">• Real-time metrics</text>
  <text x="515" y="288" font-size="9" class="text-primary">• Trend analysis</text>
  <text x="515" y="306" font-size="9" class="highlight-purple">Grafana / Looker</text>
  
  <!-- Arrow to Insights -->
  <line x1="480" y1="270" x2="440" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Insights (Middle Left) -->
  <rect x="240" y="210" width="200" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="340" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Insights Generation</text>
  
  <rect x="260" y="250" width="160" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="275" y="270" font-size="9" class="text-primary">• Content gaps</text>
  <text x="275" y="288" font-size="9" class="text-primary">• Ranking issues</text>
  <text x="275" y="306" font-size="9" class="highlight-green">Actionable alerts</text>
  
  <!-- Arrow to Actions -->
  <line x1="240" y1="270" x2="200" y2="270" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Actions (Far Left Middle) -->
  <rect x="20" y="210" width="180" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="110" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Actions</text>
  
  <rect x="40" y="250" width="140" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="270" font-size="9" class="text-primary">• Add synonyms</text>
  <text x="55" y="288" font-size="9" class="text-primary">• Create content</text>
  <text x="55" y="306" font-size="9" class="text-secondary">Tune ranking</text>
  
  <!-- Batch Processing (Bottom Left) -->
  <rect x="20" y="350" width="300" height="130" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="375" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Batch Processing</text>
  
  <rect x="40" y="390" width="260" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="55" y="410" font-size="9" class="text-primary">• Hourly/daily aggregation</text>
  <text x="55" y="428" font-size="9" class="text-primary">• Historical trend analysis</text>
  <text x="55" y="446" font-size="9" class="text-primary">• Content gap identification</text>
  <text x="180" y="410" font-size="9" class="highlight-purple">More accurate</text>
  
  <!-- Alerting (Bottom Center) -->
  <rect x="340" y="350" width="320" height="130" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="500" y="375" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Alerting System</text>
  
  <rect x="360" y="390" width="280" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="375" y="410" font-size="9" class="text-primary">• Zero-result spike alert</text>
  <text x="375" y="428" font-size="9" class="text-primary">• CTR drop alert</text>
  <text x="375" y="446" font-size="9" class="text-primary">• Volume anomaly detection</text>
  <text x="550" y="410" font-size="9" class="highlight-green">✓ Real-time</text>
  
  <!-- Privacy Compliance (Bottom Right) -->
  <rect x="680" y="350" width="300" height="130" rx="5" class="accent-box" stroke-width="2"/>
  <text x="830" y="375" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Privacy Compliance</text>
  
  <rect x="700" y="390" width="260" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="715" y="410" font-size="9" class="text-primary">• Hash user IDs (SHA-256)</text>
  <text x="715" y="428" font-size="9" class="text-primary">• Strip PII from queries</text>
  <text x="715" y="446" font-size="9" class="text-primary">• Retention policy (30-90 days)</text>
  <text x="850" y="410" font-size="9" class="highlight-green">✓ GDPR compliant</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
