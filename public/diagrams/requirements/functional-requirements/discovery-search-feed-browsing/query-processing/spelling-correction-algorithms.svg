<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Spelling Correction Algorithms</text>
  
  <!-- Edit Distance (Top Left) -->
  <rect x="20" y="70" width="220" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="130" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Edit Distance (Levenshtein)</text>
  
  <rect x="40" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="55" y="135" font-size="10" class="text-primary">Count minimum edits:</text>
  <text x="55" y="155" font-size="9" class="text-secondary">• Insertion (add char)</text>
  <text x="55" y="175" font-size="9" class="text-secondary">• Deletion (remove char)</text>
  <text x="55" y="195" font-size="9" class="text-secondary">• Substitution (replace)</text>
  
  <text x="55" y="220" font-size="10" font-weight="bold" class="text-primary">Example:</text>
  <text x="55" y="240" font-size="9" class="text-secondary" font-family="monospace">iphne → iphone</text>
  <text x="55" y="255" font-size="9" class="highlight-green">Distance: 1 (insert 'o')</text>
  
  <text x="130" y="275" text-anchor="middle" font-size="9" class="highlight-purple">O(n×m) complexity</text>
  
  <!-- N-gram Matching (Top Center) -->
  <rect x="260" y="70" width="220" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="370" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">N-gram Matching</text>
  
  <rect x="280" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="295" y="135" font-size="10" class="text-primary">Break into character n-grams:</text>
  <text x="295" y="155" font-size="9" class="text-secondary" font-family="monospace">iphone → [iph, pho, hon, one]</text>
  
  <text x="295" y="185" font-size="10" font-weight="bold" class="text-primary">Match n-grams:</text>
  <text x="295" y="205" font-size="9" class="text-secondary">Shared n-grams = similarity</text>
  
  <text x="295" y="235" font-size="10" font-weight="bold" class="text-primary">Example:</text>
  <text x="295" y="255" font-size="9" class="text-secondary" font-family="monospace">iphne: [iph, phn, hne]</text>
  <text x="295" y="270" font-size="9" class="highlight-green">2/4 match with iphone</text>
  
  <text x="370" y="295" text-anchor="middle" font-size="9" class="highlight-green">Faster than edit distance</text>
  
  <!-- Phonetic Matching (Top Right) -->
  <rect x="500" y="70" width="220" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="610" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Phonetic Matching</text>
  
  <rect x="520" y="110" width="180" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="535" y="135" font-size="10" class="text-primary">Match words that sound similar:</text>
  
  <text x="535" y="160" font-size="10" font-weight="bold" class="text-primary">Soundex:</text>
  <text x="535" y="180" font-size="9" class="text-secondary" font-family="monospace">Smith → S530</text>
  <text x="535" y="195" font-size="9" class="text-secondary" font-family="monospace">Smyth → S530</text>
  <text x="535" y="210" font-size="9" class="highlight-green">Same code = match</text>
  
  <text x="535" y="235" font-size="10" font-weight="bold" class="text-primary">Metaphone:</text>
  <text x="535" y="255" font-size="9" class="text-secondary">More accurate than Soundex</text>
  
  <text x="610" y="275" text-anchor="middle" font-size="9" class="highlight-purple">Best for names</text>
  
  <!-- ML-based Correction (Bottom Left) -->
  <rect x="20" y="260" width="460" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="250" y="285" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">ML-based Correction (Production)</text>
  
  <rect x="40" y="300" width="420" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="55" y="325" font-size="10" font-weight="bold" class="text-primary">Sequence-to-Sequence Model:</text>
  <text x="55" y="345" font-size="9" class="text-secondary">Input: typo query → Output: corrected query</text>
  
  <text x="55" y="370" font-size="10" font-weight="bold" class="text-primary">Training Data:</text>
  <text x="55" y="390" font-size="9" class="text-secondary">Query logs with corrections (users searching X then clicking results for Y)</text>
  
  <text x="280" y="325" font-size="10" font-weight="bold" class="text-primary">Features:</text>
  <text x="280" y="345" font-size="9" class="text-secondary">• Character patterns</text>
  <text x="280" y="360" font-size="9" class="text-secondary">• Query context</text>
  <text x="280" y="375" font-size="9" class="text-secondary">• User history</text>
  <text x="280" y="390" font-size="9" class="text-secondary">• Popular queries</text>
  
  <text x="250" y="420" text-anchor="middle" font-size="9" class="highlight-green">Google uses BERT-based models</text>
  
  <!-- Comparison Table (Bottom Right) -->
  <rect x="500" y="260" width="480" height="170" rx="5" class="accent-box" stroke-width="2"/>
  <text x="740" y="285" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Algorithm Comparison</text>
  
  <rect x="520" y="300" width="440" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Header -->
  <text x="535" y="320" font-size="9" font-weight="bold" class="text-primary">Algorithm</text>
  <text x="650" y="320" font-size="9" font-weight="bold" class="text-primary">Speed</text>
  <text x="720" y="320" font-size="9" font-weight="bold" class="text-primary">Accuracy</text>
  <text x="820" y="320" font-size="9" font-weight="bold" class="text-primary">Best For</text>
  
  <!-- Row 1 -->
  <line x1="530" y1="330" x2="950" y2="330" class="arrow" stroke-width="1"/>
  <text x="535" y="345" font-size="8" class="text-primary">Edit Distance</text>
  <text x="650" y="345" font-size="8" class="highlight-red">Slow</text>
  <text x="720" y="345" font-size="8" class="highlight-green">High</text>
  <text x="820" y="345" font-size="8" class="text-secondary">Small dictionaries</text>
  
  <!-- Row 2 -->
  <line x1="530" y1="355" x2="950" y2="355" class="arrow" stroke-width="1"/>
  <text x="535" y="370" font-size="8" class="text-primary">N-gram</text>
  <text x="650" y="370" font-size="8" class="highlight-green">Fast</text>
  <text x="720" y="370" font-size="8" class="highlight-green">High</text>
  <text x="820" y="370" font-size="8" class="text-secondary">Large dictionaries</text>
  
  <!-- Row 3 -->
  <line x1="530" y1="380" x2="950" y2="380" class="arrow" stroke-width="1"/>
  <text x="535" y="395" font-size="8" class="text-primary">Phonetic</text>
  <text x="650" y="395" font-size="8" class="highlight-green">Fast</text>
  <text x="720" y="395" font-size="8" class="highlight-purple">Medium</text>
  <text x="820" y="395" font-size="8" class="text-secondary">Names, places</text>
  
  <!-- Row 4 -->
  <line x1="530" y1="405" x2="950" y2="405" class="arrow" stroke-width="1"/>
  <text x="535" y="420" font-size="8" class="text-primary">ML-based</text>
  <text x="650" y="420" font-size="8" class="highlight-purple">Medium</text>
  <text x="720" y="420" font-size="8" class="highlight-green">Very High</text>
  <text x="820" y="420" font-size="8" class="text-secondary">Production (Google)</text>
  
  <!-- Confidence Threshold (Far Bottom) -->
  <rect x="20" y="450" width="300" height="80" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="475" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Confidence Thresholds</text>
  
  <text x="50" y="500" font-size="9" class="text-primary">High (&gt;90%):</text>
  <text x="140" y="500" font-size="9" class="highlight-green">Auto-correct</text>
  
  <text x="50" y="520" font-size="9" class="text-primary">Medium (50-90%):</text>
  <text x="160" y="520" font-size="9" class="highlight-purple">"Did you mean?"</text>
  
  <text x="50" y="540" font-size="9" class="text-primary">Low (&lt;50%):</text>
  <text x="130" y="540" font-size="9" class="text-secondary">Don't correct</text>
  
  <!-- Real-world Examples (Center Bottom) -->
  <rect x="340" y="450" width="320" height="80" rx="5" class="accent-box" stroke-width="2"/>
  <text x="500" y="475" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Real-world Examples</text>
  
  <text x="370" y="500" font-size="9" class="text-primary">Google:</text>
  <text x="430" y="500" font-size="9" class="text-secondary">"Did you mean..." (2001)</text>
  
  <text x="370" y="520" font-size="9" class="text-primary">Amazon:</text>
  <text x="430" y="520" font-size="9" class="text-secondary">Product search correction</text>
  
  <text x="570" y="500" font-size="9" class="text-primary">Spotify:</text>
  <text x="630" y="500" font-size="9" class="text-secondary">Artist name matching</text>
  
  <text x="570" y="520" font-size="9" class="text-primary">Stack Overflow:</text>
  <text x="660" y="520" font-size="9" class="text-secondary">Tag suggestions</text>
  
  <!-- Performance Metrics (Right Bottom) -->
  <rect x="680" y="450" width="300" height="80" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="475" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Performance</text>
  
  <text x="710" y="500" font-size="9" class="text-primary">Target latency:</text>
  <text x="810" y="500" font-size="9" class="highlight-green">&lt;20ms</text>
  
  <text x="710" y="520" font-size="9" class="text-primary">Correction accuracy:</text>
  <text x="830" y="520" font-size="9" class="highlight-green">&gt;90%</text>
  
  <text x="710" y="540" font-size="9" class="text-primary">False positive rate:</text>
  <text x="830" y="540" font-size="9" class="highlight-purple">&lt;5%</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
