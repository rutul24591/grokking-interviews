<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Facet Computation Architecture</text>
  
  <!-- User Query (Top Left) -->
  <rect x="20" y="70" width="180" height="100" rx="5" class="accent-box" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">User Query</text>
  <text x="110" y="130" text-anchor="middle" font-size="10" class="text-secondary">"running shoes"</text>
  <text x="110" y="155" text-anchor="middle" font-size="10" class="text-secondary">+ Selected Facets</text>
  
  <!-- Arrow to Query Parser -->
  <line x1="200" y1="120" x2="240" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Query Parser (Top Center Left) -->
  <rect x="240" y="70" width="160" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="320" y="100" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Query Parser</text>
  <text x="320" y="130" text-anchor="middle" font-size="9" class="text-secondary">Build filter query</text>
  <text x="320" y="150" text-anchor="middle" font-size="9" class="text-secondary" font-family="monospace">shoes AND</text>
  <text x="320" y="165" text-anchor="middle" font-size="9" class="text-secondary" font-family="monospace">brand:nike</text>
  
  <!-- Arrow to Cache -->
  <line x1="400" y1="120" x2="440" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Cache Layer (Top Center) -->
  <rect x="440" y="70" width="160" height="100" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="520" y="100" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Cache Layer</text>
  <text x="520" y="130" text-anchor="middle" font-size="9" class="text-secondary">Query hash lookup</text>
  <text x="520" y="150" text-anchor="middle" font-size="9" class="highlight-green">Hit: Return cached</text>
  <text x="520" y="170" text-anchor="middle" font-size="9" class="highlight-purple">Miss: Forward to search</text>
  
  <!-- Arrows to Search Engine -->
  <line x1="600" y1="120" x2="640" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Search Engine (Top Center Right) -->
  <rect x="640" y="70" width="200" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="740" y="100" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Search Engine</text>
  <text x="740" y="125" text-anchor="middle" font-size="10" class="text-secondary">Elasticsearch / Solr</text>
  
  <!-- Aggregations -->
  <rect x="660" y="135" width="160" height="30" rx="3" class="box-base" stroke-width="1"/>
  <text x="740" y="155" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Facet Aggregations</text>
  
  <!-- Arrow to Facet Service -->
  <line x1="840" y1="120" x2="880" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Facet Service (Top Right) -->
  <rect x="880" y="70" width="100" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="930" y="105" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Facet</text>
  <text x="930" y="125" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Service</text>
  <text x="930" y="155" text-anchor="middle" font-size="9" class="text-secondary">Post-process</text>
  <text x="930" y="170" text-anchor="middle" font-size="9" class="text-secondary">Format for UI</text>
  
  <!-- Arrow down to Results -->
  <line x1="930" y1="170" x2="930" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Facet Results Display (Middle Right) -->
  <rect x="800" y="210" width="260" height="140" rx="5" class="accent-box" stroke-width="2"/>
  <text x="930" y="235" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Facet Results</text>
  
  <!-- Brand Facet -->
  <rect x="820" y="250" width="220" height="85" rx="3" class="box-base" stroke-width="1"/>
  <text x="835" y="270" font-size="10" font-weight="bold" class="text-primary">Brand</text>
  <text x="835" y="290" font-size="9" class="text-secondary">☑ Nike (156)</text>
  <text x="835" y="305" font-size="9" class="text-secondary">☐ Adidas (89)</text>
  <text x="835" y="320" font-size="9" class="text-secondary">☐ Puma (45)</text>
  
  <!-- Price Facet -->
  <rect x="820" y="340" width="220" height="85" rx="3" class="box-base" stroke-width="1"/>
  <text x="835" y="360" font-size="10" font-weight="bold" class="text-primary">Price</text>
  <text x="835" y="380" font-size="9" class="text-secondary">☐ $0-$50 (34)</text>
  <text x="835" y="395" font-size="9" class="text-secondary">☑ $50-$100 (89)</text>
  <text x="835" y="410" font-size="9" class="text-secondary">☐ $100+ (33)</text>
  
  <!-- Main Content Area (Left Bottom) -->
  <rect x="20" y="230" width="500" height="250" rx="5" class="box-base" stroke-width="2"/>
  <text x="270" y="260" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Search Results with Facets</text>
  
  <!-- Search Results -->
  <rect x="40" y="280" width="460" height="180" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Result Item 1 -->
  <rect x="55" y="295" width="430" height="50" rx="3" class="accent-box" stroke-width="1"/>
  <text x="75" y="315" font-size="9" font-weight="bold" class="text-primary">Nike Air Zoom Pegasus</text>
  <text x="75" y="330" font-size="8" class="text-secondary">Running Shoes · $89.99 · ⭐ 4.5</text>
  
  <!-- Result Item 2 -->
  <rect x="55" y="350" width="430" height="50" rx="3" class="box-base" stroke-width="1"/>
  <text x="75" y="370" font-size="9" font-weight="bold" class="text-primary">Nike Revolution 6</text>
  <text x="75" y="385" font-size="8" class="text-secondary">Running Shoes · $64.99 · ⭐ 4.2</text>
  
  <!-- Result Count -->
  <text x="450" y="290" text-anchor="end" font-size="10" class="highlight-green">89 results</text>
  
  <!-- Active Filters -->
  <rect x="55" y="420" width="300" height="25" rx="12" class="highlight-box" stroke-width="1"/>
  <text x="70" y="437" font-size="9" class="text-primary">Active: Brand:Nike × Price:$50-$100 ×</text>
  
  <!-- Aggregation Detail (Center Bottom) -->
  <rect x="540" y="370" width="240" height="110" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="660" y="395" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Aggregation Example</text>
  
  <text x="560" y="420" font-size="9" font-weight="bold" class="text-primary">Terms Aggregation:</text>
  <text x="560" y="440" font-size="8" class="text-secondary" font-family="monospace">"aggs": {</text>
  <text x="575" y="455" font-size="8" class="text-secondary" font-family="monospace">"brands": {</text>
  <text x="590" y="470" font-size="8" class="text-secondary" font-family="monospace">"terms": { "field": "brand" }</text>
  <text x="575" y="485" font-size="8" class="text-secondary" font-family="monospace">}</text>
  <text x="560" y="500" font-size="8" class="text-secondary" font-family="monospace">}</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
