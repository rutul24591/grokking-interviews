<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Facet Performance Optimization</text>
  
  <!-- Caching Strategy (Top Left) -->
  <rect x="20" y="70" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Caching Strategy</text>
  
  <!-- Cache flow -->
  <rect x="40" y="110" width="260" height="110" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="55" y="135" font-size="10" class="text-primary">Query Hash:</text>
  <text x="140" y="135" font-size="9" class="text-secondary" font-family="monospace">sha256("shoes+brand:nike")</text>
  
  <text x="55" y="160" font-size="10" class="text-primary">Cache Hit:</text>
  <text x="130" y="160" font-size="9" class="highlight-green">&lt;5ms (Redis/Memory)</text>
  
  <text x="55" y="185" font-size="10" class="text-primary">Cache Miss:</text>
  <text x="135" y="185" font-size="9" class="highlight-purple">Compute + Cache (TTL)</text>
  
  <text x="170" y="215" text-anchor="middle" font-size="9" class="highlight-green">✓ 80%+ hit rate for popular queries</text>
  
  <!-- Aggregation Limits (Top Center) -->
  <rect x="340" y="70" width="320" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Aggregation Limits</text>
  
  <!-- Size limit -->
  <rect x="360" y="110" width="280" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="375" y="135" font-size="10" font-weight="bold" class="text-primary">size: 10</text>
  <text x="480" y="135" font-size="9" class="text-secondary">— Only top 10 values</text>
  
  <!-- Min doc count -->
  <rect x="360" y="160" width="280" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="375" y="185" font-size="10" font-weight="bold" class="text-primary">min_doc_count: 1</text>
  <text x="520" y="185" font-size="9" class="text-secondary">— Hide empty facets</text>
  
  <text x="500" y="225" text-anchor="middle" font-size="9" class="highlight-green">✓ Reduces aggregation cost by 50-80%</text>
  
  <!-- Sampling (Top Right) -->
  <rect x="680" y="70" width="300" height="170" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Sampling for Large Sets</text>
  
  <!-- Visual -->
  <rect x="700" y="110" width="260" height="110" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="830" y="140" text-anchor="middle" font-size="10" class="text-primary">1,000,000 documents</text>
  <line x1="830" y1="150" x2="830" y2="170" class="arrow" stroke-width="2"/>
  <text x="830" y="185" text-anchor="middle" font-size="10" class="highlight-purple">Sample 10,000 (1%)</text>
  <line x1="830" y1="195" x2="830" y2="215" class="arrow" stroke-width="2"/>
  <text x="830" y="235" text-anchor="middle" font-size="10" class="highlight-green">Estimate counts (±5%)</text>
  
  <text x="830" y="260" text-anchor="middle" font-size="9" class="text-secondary">20x faster than full aggregation</text>
  
  <!-- Performance Comparison (Bottom Left) -->
  <rect x="20" y="260" width="460" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="250" y="285" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Performance Comparison</text>
  
  <!-- Bar chart -->
  <text x="80" y="320" font-size="9" class="text-secondary">No optimization:</text>
  <rect x="180" y="310" width="200" height="15" rx="2" class="highlight-red"/>
  <text x="390" y="320" font-size="9" class="text-secondary">200ms</text>
  
  <text x="80" y="350" font-size="9" class="text-secondary">+ Caching:</text>
  <rect x="180" y="340" width="120" height="15" rx="2" class="highlight-purple"/>
  <text x="310" y="350" font-size="9" class="text-secondary">50ms (avg)</text>
  
  <text x="80" y="380" font-size="9" class="text-secondary">+ Limits:</text>
  <rect x="180" y="370" width="60" height="15" rx="2" class="highlight-blue"/>
  <text x="250" y="380" font-size="9" class="text-secondary">25ms</text>
  
  <text x="80" y="410" font-size="9" class="text-secondary">All optimizations:</text>
  <rect x="180" y="400" width="30" height="15" rx="2" class="highlight-green"/>
  <text x="220" y="410" font-size="9" class="text-secondary">5ms (cached)</text>
  
  <!-- Filter Context (Bottom Center) -->
  <rect x="500" y="260" width="240" height="170" rx="5" class="accent-box" stroke-width="2"/>
  <text x="620" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Filter Context</text>
  
  <rect x="520" y="300" width="200" height="115" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="535" y="325" font-size="10" font-weight="bold" class="text-primary">Query Context:</text>
  <text x="535" y="345" font-size="9" class="text-secondary">• Computes relevance</text>
  <text x="535" y="360" font-size="9" class="text-secondary">• Not cached</text>
  <text x="535" y="375" font-size="9" class="highlight-red">⚠ Slower</text>
  
  <text x="535" y="400" font-size="10" font-weight="bold" class="text-primary">Filter Context:</text>
  <text x="535" y="420" font-size="9" class="text-secondary">• Binary match (yes/no)</text>
  <text x="535" y="435" font-size="9" class="highlight-green">✓ Cached automatically</text>
  
  <!-- Best Practices (Bottom Right) -->
  <rect x="760" y="260" width="220" height="170" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="870" y="285" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Best Practices</text>
  
  <rect x="780" y="300" width="180" height="120" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="795" y="325" font-size="9" class="text-primary">1. Cache common queries</text>
  <text x="795" y="345" font-size="9" class="text-primary">2. Limit facet size (5-10)</text>
  <text x="795" y="365" font-size="9" class="text-primary">3. Use min_doc_count</text>
  <text x="795" y="385" font-size="9" class="text-primary">4. Filter context for facets</text>
  <text x="795" y="405" font-size="9" class="text-primary">5. Sample for 1M+ docs</text>
  
  <!-- Target metrics -->
  <text x="870" y="445" text-anchor="middle" font-size="9" class="highlight-green">Target: &lt;50ms p99</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
