<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Elasticsearch Cluster Architecture</text>
  
  <!-- Master Nodes (Top Left) -->
  <rect x="20" y="70" width="200" height="140" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="120" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Master Nodes</text>
  
  <rect x="40" y="110" width="160" height="35" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="120" y="132" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Master 1</text>
  <text x="120" y="148" text-anchor="middle" font-size="9" class="highlight-green">✓ Elected Master</text>
  
  <rect x="40" y="150" width="160" height="35" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="120" y="172" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Master 2</text>
  <text x="120" y="188" text-anchor="middle" font-size="9" class="text-secondary">Standby</text>
  
  <rect x="40" y="190" width="160" height="35" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="120" y="212" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Master 3</text>
  <text x="120" y="228" text-anchor="middle" font-size="9" class="text-secondary">Standby</text>
  
  <text x="120" y="245" text-anchor="middle" font-size="9" class="text-secondary">Manage cluster state</text>
  
  <!-- Arrow to Data Nodes -->
  <line x1="220" y1="140" x2="260" y2="140" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Data Nodes (Center) -->
  <rect x="260" y="70" width="480" height="140" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Data Nodes</text>
  
  <!-- Data Node 1 -->
  <rect x="280" y="110" width="140" height="90" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="350" y="135" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Data Node 1</text>
  
  <!-- Shards -->
  <rect x="295" y="145" width="50" height="45" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="320" y="165" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">P1</text>
  <text x="320" y="180" text-anchor="middle" font-size="8" class="text-secondary">Primary</text>
  
  <rect x="355" y="145" width="50" height="45" rx="2" class="accent-box" stroke-width="1"/>
  <text x="380" y="165" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">R2</text>
  <text x="380" y="180" text-anchor="middle" font-size="8" class="text-secondary">Replica</text>
  
  <!-- Data Node 2 -->
  <rect x="430" y="110" width="140" height="90" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="500" y="135" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Data Node 2</text>
  
  <rect x="445" y="145" width="50" height="45" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="470" y="165" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">P2</text>
  <text x="470" y="180" text-anchor="middle" font-size="8" class="text-secondary">Primary</text>
  
  <rect x="505" y="145" width="50" height="45" rx="2" class="accent-box" stroke-width="1"/>
  <text x="530" y="165" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">R1</text>
  <text x="530" y="180" text-anchor="middle" font-size="8" class="text-secondary">Replica</text>
  
  <!-- Data Node 3 -->
  <rect x="580" y="110" width="140" height="90" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="650" y="135" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Data Node 3</text>
  
  <rect x="595" y="145" width="50" height="45" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="620" y="165" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">P3</text>
  <text x="620" y="180" text-anchor="middle" font-size="8" class="text-secondary">Primary</text>
  
  <rect x="655" y="145" width="50" height="45" rx="2" class="accent-box" stroke-width="1"/>
  <text x="680" y="165" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">R3</text>
  <text x="680" y="180" text-anchor="middle" font-size="8" class="text-secondary">Replica</text>
  
  <!-- Arrow to Ingest Nodes -->
  <line x1="740" y1="140" x2="780" y2="140" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Ingest Nodes (Top Right) -->
  <rect x="780" y="70" width="200" height="140" rx="5" class="box-base" stroke-width="2"/>
  <text x="880" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Ingest Nodes</text>
  
  <rect x="800" y="110" width="160" height="35" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="880" y="132" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Ingest 1</text>
  <text x="880" y="148" text-anchor="middle" font-size="9" class="text-secondary">Pipeline processing</text>
  
  <rect x="800" y="150" width="160" height="35" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="880" y="172" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Ingest 2</text>
  <text x="880" y="188" text-anchor="middle" font-size="9" class="text-secondary">Transform/Enrich</text>
  
  <text x="880" y="215" text-anchor="middle" font-size="9" class="text-secondary">Pre-process documents</text>
  
  <!-- Client Request (Bottom Left) -->
  <rect x="20" y="240" width="220" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="130" y="265" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Client Request</text>
  
  <rect x="40" y="280" width="180" height="65" rx="3" class="accent-box" stroke-width="1"/>
  <text x="130" y="305" text-anchor="middle" font-size="10" class="text-secondary">HTTP/REST API</text>
  <text x="130" y="325" text-anchor="middle" font-size="10" class="text-secondary">Port 9200</text>
  <text x="130" y="345" text-anchor="middle" font-size="9" class="highlight-green">Load Balancer recommended</text>
  
  <!-- Arrow to Coordinating -->
  <line x1="240" y1="300" x2="280" y2="300" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Coordinating Node (Bottom Center) -->
  <rect x="280" y="240" width="440" height="120" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="500" y="265" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Coordinating Node (Any Node)</text>
  
  <rect x="300" y="280" width="400" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="500" y="305" text-anchor="middle" font-size="10" class="text-primary">Routes requests to relevant shards</text>
  <text x="500" y="325" text-anchor="middle" font-size="10" class="text-primary">Merges results from multiple shards</text>
  <text x="500" y="345" text-anchor="middle" font-size="9" class="highlight-purple">Every node can coordinate</text>
  
  <!-- Arrow to Client -->
  <line x1="720" y1="300" x2="760" y2="300" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Response (Bottom Right) -->
  <rect x="760" y="240" width="220" height="120" rx="5" class="accent-box" stroke-width="2"/>
  <text x="870" y="265" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Response</text>
  
  <rect x="780" y="280" width="180" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="870" y="305" text-anchor="middle" font-size="10" class="text-secondary">Merged results</text>
  <text x="870" y="325" text-anchor="middle" font-size="10" class="text-secondary">JSON response</text>
  <text x="870" y="345" text-anchor="middle" font-size="9" class="highlight-green">Typically &lt;100ms</text>
  
  <!-- Shard Legend (Bottom Far) -->
  <rect x="20" y="380" width="300" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="405" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Shard Legend</text>
  
  <rect x="50" y="420" width="40" height="25" rx="2" class="highlight-box" stroke-width="1.5"/>
  <text x="70" y="437" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">P1</text>
  <text x="110" y="437" font-size="9" class="text-secondary">Primary Shard (original)</text>
  
  <rect x="50" y="450" width="40" height="25" rx="2" class="accent-box" stroke-width="1.5"/>
  <text x="70" y="467" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">R1</text>
  <text x="110" y="467" font-size="9" class="text-secondary">Replica Shard (copy)</text>
  
  <!-- Key Points (Bottom Center) -->
  <rect x="340" y="380" width="320" height="100" rx="5" class="accent-box" stroke-width="2"/>
  <text x="500" y="405" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Key Points</text>
  
  <text x="370" y="430" font-size="9" class="text-primary">•</text>
  <text x="385" y="430" font-size="9" class="text-secondary">Primary shards fixed at creation</text>
  
  <text x="370" y="450" font-size="9" class="text-primary">•</text>
  <text x="385" y="450" font-size="9" class="text-secondary">Replicas can change dynamically</text>
  
  <text x="370" y="470" font-size="9" class="text-primary">•</text>
  <text x="385" y="470" font-size="9" class="text-secondary">Replicas provide HA + read scaling</text>
  
  <text x="570" y="430" font-size="9" class="text-primary">•</text>
  <text x="585" y="430" font-size="9" class="text-secondary">Shards auto-balance across nodes</text>
  
  <text x="570" y="450" font-size="9" class="text-primary">•</text>
  <text x="585" y="450" font-size="9" class="text-secondary">Target 10-50GB per shard</text>
  
  <text x="570" y="470" font-size="9" class="text-primary">•</text>
  <text x="585" y="470" font-size="9" class="highlight-green">Minimum 1 replica for HA</text>
  
  <!-- Node Roles (Bottom Right) -->
  <rect x="680" y="380" width="300" height="100" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="830" y="405" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Node Roles</text>
  
  <text x="710" y="430" font-size="9" class="text-primary">Master:</text>
  <text x="760" y="430" font-size="9" class="text-secondary">Cluster metadata (3 nodes)</text>
  
  <text x="710" y="450" font-size="9" class="text-primary">Data:</text>
  <text x="760" y="450" font-size="9" class="text-secondary">Store shards, execute queries</text>
  
  <text x="710" y="470" font-size="9" class="text-primary">Ingest:</text>
  <text x="760" y="470" font-size="9" class="text-secondary">Pre-process documents</text>
  
  <text x="850" y="430" font-size="9" class="text-primary">Coordinating:</text>
  <text x="930" y="430" font-size="9" class="text-secondary">Route requests</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
