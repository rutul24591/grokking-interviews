<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Query Execution Flow</text>
  
  <!-- Client Request (Top Left) -->
  <rect x="20" y="70" width="180" height="80" rx="5" class="accent-box" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Client Request</text>
  <text x="110" y="125" text-anchor="middle" font-size="10" class="text-secondary">GET /products/_search</text>
  <text x="110" y="145" text-anchor="middle" font-size="10" class="text-secondary">Query DSL (JSON)</text>
  
  <!-- Arrow to Coordinating -->
  <line x1="200" y1="110" x2="240" y2="110" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Coordinating Node (Top Center Left) -->
  <rect x="240" y="70" width="180" height="80" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="330" y="100" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Coordinating Node</text>
  <text x="330" y="125" text-anchor="middle" font-size="9" class="text-secondary">Parse query</text>
  <text x="330" y="145" text-anchor="middle" font-size="9" class="text-secondary">Route to shards</text>
  
  <!-- Arrow to Shards -->
  <line x1="420" y1="110" x2="460" y2="110" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="440" y="100" text-anchor="middle" font-size="9" class="text-secondary">Scatter</text>
  
  <!-- Shard Execution (Top Center Right) -->
  <rect x="460" y="70" width="280" height="80" rx="5" class="box-base" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Shard Execution</text>
  
  <rect x="480" y="110" width="75" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="518" y="130" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Shard 1</text>
  
  <rect x="565" y="110" width="75" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="602" y="130" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Shard 2</text>
  
  <rect x="650" y="110" width="75" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="687" y="130" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Shard N</text>
  
  <text x="600" y="155" text-anchor="middle" font-size="9" class="highlight-green">Execute in parallel</text>
  
  <!-- Arrow to Gather -->
  <line x1="740" y1="110" x2="780" y2="110" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <text x="760" y="100" text-anchor="middle" font-size="9" class="text-secondary">Gather</text>
  
  <!-- Merge Results (Top Right) -->
  <rect x="780" y="70" width="200" height="80" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="880" y="100" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Merge Results</text>
  <text x="880" y="125" text-anchor="middle" font-size="9" class="text-secondary">Sort by _score</text>
  <text x="880" y="145" text-anchor="middle" font-size="9" class="text-secondary">Apply size limit</text>
  
  <!-- Arrow down to Fetch -->
  <line x1="880" y1="150" x2="880" y2="190" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Fetch Phase (Middle Right) -->
  <rect x="780" y="190" width="200" height="80" rx="5" class="box-base" stroke-width="2"/>
  <text x="880" y="220" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Fetch Phase</text>
  <text x="880" y="245" text-anchor="middle" font-size="9" class="text-secondary">Load _source fields</text>
  <text x="880" y="265" text-anchor="middle" font-size="9" class="text-secondary">Apply highlighting</text>
  
  <!-- Arrow to Response -->
  <line x1="780" y1="230" x2="820" y2="230" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Response (Far Right) -->
  <rect x="820" y="190" width="160" height="80" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="900" y="220" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Response</text>
  <text x="900" y="245" text-anchor="middle" font-size="9" class="text-secondary">JSON with hits</text>
  <text x="900" y="265" text-anchor="middle" font-size="9" class="highlight-green">Total + hits[]</text>
  
  <!-- Query Phases Detail (Bottom Left) -->
  <rect x="20" y="180" width="460" height="250" rx="5" class="box-base" stroke-width="2"/>
  <text x="250" y="210" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Query Phases Detail</text>
  
  <!-- Phase 1: Query -->
  <rect x="40" y="225" width="420" height="55" rx="3" class="accent-box" stroke-width="1.5"/>
  <text x="60" y="250" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">1</text>
  <text x="85" y="245" font-size="11" font-weight="bold" class="text-primary">Query Phase</text>
  <text x="85" y="265" font-size="9" class="text-secondary">Send to all relevant shards</text>
  <text x="350" y="250" font-size="9" class="highlight-purple">Optimization: Use routing</text>
  
  <!-- Phase 2: Scatter -->
  <rect x="40" y="285" width="420" height="55" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="60" y="310" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">2</text>
  <text x="85" y="305" font-size="11" font-weight="bold" class="text-primary">Scatter Phase</text>
  <text x="85" y="325" font-size="9" class="text-secondary">Each shard executes locally</text>
  <text x="350" y="310" font-size="9" class="highlight-green">✓ Filter context cached</text>
  
  <!-- Phase 3: Gather -->
  <rect x="40" y="345" width="420" height="55" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="60" y="370" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">3</text>
  <text x="85" y="365" font-size="11" font-weight="bold" class="text-primary">Gather Phase</text>
  <text x="85" y="385" font-size="9" class="text-secondary">Coordinator merges results</text>
  <text x="350" y="370" font-size="9" class="highlight-purple">Optimization: Limit size</text>
  
  <!-- Phase 4: Fetch -->
  <rect x="40" y="405" width="420" height="55" rx="3" class="highlight-box" stroke-width="1.5"/>
  <text x="60" y="430" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">4</text>
  <text x="85" y="425" font-size="11" font-weight="bold" class="text-primary">Fetch Phase</text>
  <text x="85" y="445" font-size="9" class="text-secondary">Load _source for top hits</text>
  <text x="350" y="430" font-size="9" class="highlight-green">✓ _source filtering</text>
  
  <!-- Optimization Tips (Bottom Center) -->
  <rect x="500" y="180" width="240" height="250" rx="5" class="accent-box" stroke-width="2"/>
  <text x="620" y="210" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Optimization Tips</text>
  
  <rect x="520" y="225" width="200" height="190" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="535" y="250" font-size="10" font-weight="bold" class="text-primary">1. Filter Context:</text>
  <text x="535" y="270" font-size="9" class="text-secondary">Use for structured data</text>
  <text x="535" y="285" font-size="9" class="highlight-green">Automatically cached</text>
  
  <text x="535" y="310" font-size="10" font-weight="bold" class="text-primary">2. Result Limit:</text>
  <text x="535" y="330" font-size="9" class="text-secondary">Use size parameter</text>
  <text x="535" y="345" font-size="9" class="text-secondary">Avoid deep pagination</text>
  
  <text x="535" y="370" font-size="10" font-weight="bold" class="text-primary">3. Source Filtering:</text>
  <text x="535" y="390" font-size="9" class="text-secondary">Return only needed fields</text>
  <text x="535" y="405" font-size="9" class="highlight-green">Reduces network transfer</text>
  
  <!-- Performance Metrics (Bottom Right) -->
  <rect x="760" y="180" width="220" height="250" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="870" y="210" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Performance</text>
  
  <rect x="780" y="225" width="180" height="190" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="795" y="255" font-size="10" font-weight="bold" class="text-primary">Target Latency:</text>
  <text x="795" y="275" font-size="9" class="text-secondary">p50: &lt;50ms</text>
  <text x="795" y="290" font-size="9" class="text-secondary">p95: &lt;200ms</text>
  <text x="795" y="305" font-size="9" class="text-secondary">p99: &lt;500ms</text>
  
  <text x="795" y="335" font-size="10" font-weight="bold" class="text-primary">Factors Affecting:</text>
  <text x="795" y="355" font-size="9" class="text-secondary">• Number of shards</text>
  <text x="795" y="370" font-size="9" class="text-secondary">• Query complexity</text>
  <text x="795" y="385" font-size="9" class="text-secondary">• Result size</text>
  <text x="795" y="400" font-size="9" class="text-secondary">• Cache hit rate</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
