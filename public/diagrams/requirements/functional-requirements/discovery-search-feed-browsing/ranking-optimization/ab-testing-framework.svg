<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-blue { fill: #4299e1; }
      .highlight-red { fill: #f56565; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">A/B Testing Framework</text>
  
  <!-- User Traffic (Top Left) -->
  <rect x="20" y="70" width="160" height="100" rx="5" class="accent-box" stroke-width="2"/>
  <text x="100" y="100" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">User Traffic</text>
  <text x="100" y="130" text-anchor="middle" font-size="10" class="text-secondary">Millions of users</text>
  <text x="100" y="155" text-anchor="middle" font-size="10" class="text-secondary">Search queries</text>
  
  <!-- Arrow to Experiment Service -->
  <line x1="180" y1="120" x2="220" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Experiment Service (Top Center Left) -->
  <rect x="220" y="70" width="200" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="320" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Experiment Service</text>
  
  <rect x="240" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="320" y="130" text-anchor="middle" font-size="9" class="text-secondary">Consistent hashing</text>
  <text x="320" y="148" text-anchor="middle" font-size="9" class="text-secondary">user_id → variant</text>
  
  <!-- Arrows to Control/Treatment -->
  <line x1="420" y1="95" x2="460" y2="95" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="145" x2="460" y2="145" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Control Group (Top Center) -->
  <rect x="460" y="70" width="180" height="50" rx="5" class="box-base" stroke-width="1.5"/>
  <text x="550" y="95" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Control (50%)</text>
  <text x="550" y="115" text-anchor="middle" font-size="9" class="text-secondary">Current ranking</text>
  
  <!-- Treatment Group (Top Center) -->
  <rect x="460" y="120" width="180" height="50" rx="5" class="accent-box" stroke-width="1.5"/>
  <text x="550" y="145" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Treatment (50%)</text>
  <text x="550" y="165" text-anchor="middle" font-size="9" class="text-secondary">New ranking model</text>
  
  <!-- Arrows to Metrics Collection -->
  <line x1="640" y1="95" x2="680" y2="95" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="640" y1="145" x2="680" y2="145" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Metrics Collection (Top Center Right) -->
  <rect x="680" y="70" width="200" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="780" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Metrics Collection</text>
  
  <rect x="700" y="110" width="160" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="780" y="130" text-anchor="middle" font-size="9" class="text-secondary">Impressions, clicks</text>
  <text x="780" y="148" text-anchor="middle" font-size="9" class="text-secondary">Conversions, dwell time</text>
  
  <!-- Arrow to Statistical Analysis -->
  <line x1="880" y1="120" x2="920" y2="120" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Statistical Analysis (Top Right) -->
  <rect x="920" y="70" width="60" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="950" y="100" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Stat</text>
  <text x="950" y="125" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Analysis</text>
  <text x="950" y="155" text-anchor="middle" font-size="9" class="text-secondary">T-test,</text>
  <text x="950" y="170" text-anchor="middle" font-size="9" class="text-secondary">Bootstrap</text>
  
  <!-- Arrow down to Decision -->
  <line x1="950" y1="170" x2="950" y2="210" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Decision (Middle Right) -->
  <rect x="850" y="210" width="200" height="80" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="950" y="240" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Decision</text>
  
  <rect x="870" y="255" width="160" height="25" rx="3" class="box-base" stroke-width="1"/>
  <text x="950" y="272" text-anchor="middle" font-size="9" class="highlight-green">p &lt; 0.05 → Deploy</text>
  
  <!-- Arrow to Deployment -->
  <line x1="850" y1="250" x2="810" y2="250" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Deployment (Middle Center) -->
  <rect x="650" y="210" width="160" height="80" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="730" y="240" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Deployment</text>
  
  <rect x="670" y="255" width="120" height="25" rx="3" class="box-base" stroke-width="1"/>
  <text x="730" y="272" text-anchor="middle" font-size="9" class="text-secondary">Gradual rollout</text>
  
  <!-- Arrow to Monitoring -->
  <line x1="650" y1="250" x2="610" y2="250" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <!-- Monitoring (Middle Left) -->
  <rect x="450" y="210" width="160" height="80" rx="5" class="box-base" stroke-width="2"/>
  <text x="530" y="240" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Monitoring</text>
  
  <rect x="470" y="255" width="120" height="25" rx="3" class="box-base" stroke-width="1"/>
  <text x="530" y="272" text-anchor="middle" font-size="9" class="highlight-purple">Guardrail metrics</text>
  
  <!-- Timeline (Bottom Left) -->
  <rect x="20" y="210" width="410" height="220" rx="5" class="box-base" stroke-width="2"/>
  <text x="225" y="240" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">A/B Test Timeline</text>
  
  <!-- Timeline Arrow -->
  <line x1="60" y1="270" x2="390" y2="270" class="arrow" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Time Markers -->
  <line x1="60" y1="260" x2="60" y2="280" class="arrow" stroke-width="2"/>
  <text x="60" y="305" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Day 0</text>
  <text x="60" y="325" text-anchor="middle" font-size="9" class="text-secondary">Start test</text>
  
  <line x1="150" y1="260" x2="150" y2="280" class="arrow" stroke-width="2"/>
  <text x="150" y="305" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Day 1-7</text>
  <text x="150" y="325" text-anchor="middle" font-size="9" class="text-secondary">Data collection</text>
  
  <line x1="270" y1="260" x2="270" y2="280" class="arrow" stroke-width="2"/>
  <text x="270" y="305" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Day 7-14</text>
  <text x="270" y="325" text-anchor="middle" font-size="9" class="text-secondary">Statistical analysis</text>
  
  <line x1="390" y1="260" x2="390" y2="280" class="arrow" stroke-width="2"/>
  <text x="390" y="305" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Day 14</text>
  <text x="390" y="325" text-anchor="middle" font-size="9" class="text-secondary">Decision</text>
  
  <!-- Metrics Detail -->
  <rect x="40" y="350" width="370" height="65" rx="3" class="accent-box" stroke-width="1"/>
  <text x="225" y="375" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Key Metrics</text>
  <text x="80" y="395" font-size="9" class="text-primary">Primary: CTR@10, Conversion</text>
  <text x="80" y="410" font-size="9" class="text-primary">Guardrail: Latency, Diversity</text>
  <text x="280" y="395" font-size="9" class="highlight-green">Target: p &lt; 0.05</text>
  <text x="280" y="410" font-size="9" class="highlight-purple">Power: 80%+</text>
  
  <!-- Sample Size Calculator (Bottom Center) -->
  <rect x="450" y="210" width="260" height="220" rx="5" class="accent-box" stroke-width="2"/>
  <text x="580" y="240" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Sample Size Calculation</text>
  
  <rect x="470" y="255" width="220" height="160" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="485" y="280" font-size="10" font-weight="bold" class="text-primary">Inputs:</text>
  <text x="485" y="300" font-size="9" class="text-secondary">• Baseline CTR: 2.5%</text>
  <text x="485" y="318" font-size="9" class="text-secondary">• Min detectable effect: 5%</text>
  <text x="485" y="336" font-size="9" class="text-secondary">• Power (1-β): 80%</text>
  <text x="485" y="354" font-size="9" class="text-secondary">• Significance (α): 0.05</text>
  
  <text x="485" y="385" font-size="10" font-weight="bold" class="text-primary">Result:</text>
  <text x="485" y="405" font-size="9" class="highlight-green">~100K users per variant</text>
  
  <!-- Common Pitfalls (Bottom Right) -->
  <rect x="730" y="210" width="250" height="220" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="855" y="240" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Common Pitfalls</text>
  
  <rect x="750" y="255" width="210" height="160" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="765" y="280" font-size="9" class="highlight-red">⚠ Early stopping</text>
  <text x="765" y="298" font-size="8" class="text-secondary">Wait for significance</text>
  
  <text x="765" y="320" font-size="9" class="highlight-red">⚠ Multiple testing</text>
  <text x="765" y="338" font-size="8" class="text-secondary">Apply correction (Bonferroni)</text>
  
  <text x="765" y="360" font-size="9" class="highlight-red">⚠ Ignoring segments</text>
  <text x="765" y="378" font-size="8" class="text-secondary">Analyze by device, user type</text>
  
  <text x="765" y="400" font-size="9" class="highlight-green">✓ Pre-register hypothesis</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
