<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="450" class="bg-base"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Memory Management Strategies</text>
  
  <!-- Keep All Items (Left) -->
  <rect x="20" y="70" width="300" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="170" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Keep All Items</text>
  
  <!-- Visual -->
  <rect x="40" y="110" width="260" height="110" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- All items rendered -->
  <rect x="55" y="125" width="230" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="170" y="139" text-anchor="middle" font-size="8" class="text-primary">Item 1 (rendered)</text>
  
  <rect x="55" y="148" width="230" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="170" y="162" text-anchor="middle" font-size="8" class="text-primary">Item 2 (rendered)</text>
  
  <rect x="55" y="171" width="230" height="20" rx="2" class="box-base" stroke-width="1"/>
  <text x="170" y="185" text-anchor="middle" font-size="8" class="text-primary">Item 3 (rendered)</text>
  
  <rect x="55" y="194" width="230" height="20" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="170" y="208" text-anchor="middle" font-size="8" class="text-primary">Item 500 (rendered)</text>
  
  <text x="170" y="235" text-anchor="middle" font-size="10" class="highlight-red">⚠ Memory grows indefinitely</text>
  <text x="170" y="255" text-anchor="middle" font-size="10" class="text-secondary">1000 items = 50-100MB DOM</text>
  
  <!-- Pros/Cons -->
  <text x="50" y="280" font-size="9" class="highlight-green">✓ No re-render on scroll back</text>
  <text x="50" y="295" font-size="9" class="highlight-red">⚠ Janky scroll after 200+ items</text>
  
  <!-- Virtualization Only (Center) -->
  <rect x="340" y="70" width="320" height="170" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Virtualization Only</text>
  
  <!-- Visual -->
  <rect x="360" y="110" width="280" height="110" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Visible window only -->
  <rect x="375" y="140" width="250" height="60" rx="2" class="accent-box" stroke-width="1.5"/>
  <text x="500" y="160" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Visible Window</text>
  <text x="500" y="175" text-anchor="middle" font-size="8" class="text-secondary">Items 50-60 rendered</text>
  <text x="500" y="190" text-anchor="middle" font-size="8" class="text-secondary">Rest: placeholder only</text>
  
  <!-- Above viewport -->
  <rect x="375" y="120" width="250" height="18" rx="2" class="box-base" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="500" y="132" text-anchor="middle" font-size="7" class="text-secondary">Items 1-49 (placeholder)</text>
  
  <!-- Below viewport -->
  <rect x="375" y="202" width="250" height="18" rx="2" class="box-base" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="500" y="214" text-anchor="middle" font-size="7" class="text-secondary">Items 61-1000 (placeholder)</text>
  
  <text x="500" y="235" text-anchor="middle" font-size="10" class="highlight-green">✓ Constant memory usage</text>
  <text x="500" y="255" text-anchor="middle" font-size="10" class="highlight-purple">⚠ Re-render on scroll back</text>
  
  <!-- Pros/Cons -->
  <text x="370" y="280" font-size="9" class="highlight-green">✓ 60fps scroll performance</text>
  <text x="370" y="295" font-size="9" class="highlight-purple">⚠ Need height estimation</text>
  
  <!-- Hybrid Approach (Right) -->
  <rect x="680" y="70" width="300" height="170" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="830" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Hybrid (Recommended)</text>
  
  <!-- Visual -->
  <rect x="700" y="110" width="260" height="110" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Rendered items -->
  <rect x="715" y="125" width="230" height="50" rx="2" class="accent-box" stroke-width="1.5"/>
  <text x="830" y="145" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Last 100 Items</text>
  <text x="830" y="165" text-anchor="middle" font-size="8" class="text-secondary">Kept in DOM</text>
  
  <!-- Cached items -->
  <rect x="715" y="180" width="230" height="35" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="830" y="200" text-anchor="middle" font-size="8" class="text-primary">Older Items</text>
  <text x="830" y="215" text-anchor="middle" font-size="8" class="text-secondary">Cached, unmounted</text>
  
  <text x="830" y="235" text-anchor="middle" font-size="10" class="highlight-green">✓ Balanced approach</text>
  <text x="830" y="255" text-anchor="middle" font-size="10" class="text-secondary">Constant memory + low re-render</text>
  
  <!-- Pros/Cons -->
  <text x="710" y="280" font-size="9" class="highlight-green">✓ ~200 items in DOM max</text>
  <text x="710" y="295" font-size="9" class="highlight-green">✓ Fast scroll back (recent)</text>
  
  <!-- Memory Usage Graph (Bottom Left) -->
  <rect x="20" y="260" width="460" height="170" rx="5" class="box-base" stroke-width="2"/>
  <text x="250" y="285" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Memory Usage Over Time</text>
  
  <!-- Graph axes -->
  <line x1="60" y1="310" x2="60" y2="410" class="arrow" stroke-width="2"/>
  <line x1="60" y1="410" x2="440" y2="410" class="arrow" stroke-width="2"/>
  <text x="50" y="315" font-size="9" class="text-secondary">MB</text>
  <text x="420" y="425" font-size="9" class="text-secondary">Items Loaded →</text>
  
  <!-- Keep All line (growing) -->
  <path d="M 60 410 L 200 320" class="highlight-red" stroke-width="2" fill="none"/>
  <text x="210" y="325" font-size="8" class="highlight-red">Keep All</text>
  
  <!-- Virtualization line (constant) -->
  <path d="M 60 380 L 420 380" class="highlight-green" stroke-width="2" fill="none"/>
  <text x="430" y="385" font-size="8" class="highlight-green">Virtualization</text>
  
  <!-- Hybrid line (plateau) -->
  <path d="M 60 410 L 150 360 L 420 360" class="highlight-purple" stroke-width="2" fill="none"/>
  <text x="430" y="365" font-size="8" class="highlight-purple">Hybrid</text>
  
  <!-- Legend -->
  <text x="280" y="330" font-size="9" class="text-secondary">100 items: ~5MB</text>
  <text x="280" y="350" font-size="9" class="text-secondary">500 items: ~25MB</text>
  <text x="280" y="370" font-size="9" class="text-secondary">1000 items: ~50-100MB</text>
  
  <!-- Implementation Tips (Bottom Right) -->
  <rect x="500" y="260" width="480" height="170" rx="5" class="accent-box" stroke-width="2"/>
  <text x="740" y="285" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Implementation Tips</text>
  
  <rect x="520" y="300" width="440" height="120" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="540" y="325" font-size="10" font-weight="bold" class="text-primary">1. Set Max Items:</text>
  <text x="680" y="325" font-size="9" class="text-secondary">Keep last 100-200 items in DOM</text>
  
  <text x="540" y="350" font-size="10" font-weight="bold" class="text-primary">2. Use Virtualization:</text>
  <text x="680" y="350" font-size="9" class="text-secondary">React Window, tanstack/virtual</text>
  
  <text x="540" y="375" font-size="10" font-weight="bold" class="text-primary">3. Cache Old Items:</text>
  <text x="680" y="375" font-size="9" class="text-secondary">Store in Map, unmount from DOM</text>
  
  <text x="540" y="400" font-size="10" font-weight="bold" class="text-primary">4. Monitor Memory:</text>
  <text x="680" y="400" font-size="9" class="text-secondary">Chrome DevTools Memory tab</text>
  
  <!-- Target Metrics -->
  <rect x="520" y="430" width="200" height="40" rx="3" class="highlight-box" stroke-width="1.5"/>
  <text x="620" y="450" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Target Metrics</text>
  <text x="540" y="465" font-size="9" class="highlight-green">✓ &lt;50MB after 1000 items</text>
  <text x="540" y="480" font-size="9" class="highlight-green">✓ 60fps scroll</text>
  
  <!-- Libraries -->
  <rect x="740" y="430" width="220" height="40" rx="3" class="box-base" stroke-width="1"/>
  <text x="850" y="450" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Recommended Libraries</text>
  <text x="760" y="465" font-size="9" class="text-secondary">React Window (~7KB)</text>
  <text x="880" y="465" font-size="9" class="text-secondary">tanstack/virtual (~5KB)</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>
