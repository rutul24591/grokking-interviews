<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .request { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .validation { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .deletion { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Request -->
  <rect class="request" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Deletion Request</text>
  
  <rect class="request" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Request Submission</text>
  
  <rect class="request" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Request Validation</text>
  
  <rect class="request" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Request Tracking</text>
  
  <!-- Validation -->
  <rect class="validation" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Validation</text>
  
  <rect class="validation" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Identity Validation</text>
  
  <rect class="validation" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Eligibility Check</text>
  
  <rect class="validation" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Legal Requirements</text>
  
  <!-- Deletion -->
  <rect class="deletion" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Deletion</text>
  
  <rect class="deletion" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Data Identification</text>
  
  <rect class="deletion" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Data Deletion</text>
  
  <rect class="deletion" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Deletion Confirmation</text>
  
  <!-- Deletion Flow -->
  <rect class="request" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Deletion Request Flow</text>
  
  <!-- Flow -->
  <circle cx="150" cy="350" r="8" fill="#6d5bd0"/>
  <text x="150" y="385" text-anchor="middle" class="sublabel">Request</text>
  
  <path class="arrow" d="M158 350 L242 350"/>
  
  <rect x="250" y="330" width="100" height="40" rx="4" fill="#ffffff"/>
  <text x="300" y="355" text-anchor="middle" class="sublabel" fill="#1a1822">Validate</text>
  
  <path class="arrow" d="M350 350 L392 350"/>
  
  <circle cx="450" cy="350" r="8" fill="#6d5bd0"/>
  <text x="450" y="385" text-anchor="middle" class="sublabel">Identify</text>
  
  <path class="arrow" d="M458 350 L542 350"/>
  
  <rect x="550" y="330" width="100" height="40" rx="4" fill="#ffffff"/>
  <text x="600" y="355" text-anchor="middle" class="sublabel" fill="#1a1822" style="font-weight: 600">Delete</text>
  
  <path class="arrow" d="M650 350 L692 350"/>
  
  <circle cx="750" cy="350" r="8" fill="#6d5bd0"/>
  <text x="750" y="385" text-anchor="middle" class="sublabel">Confirm</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Deletion Request Flow</text>
</svg>
