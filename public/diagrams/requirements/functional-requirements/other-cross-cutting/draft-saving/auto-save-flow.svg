<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .edit { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .detect { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .save { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .confirm { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- User Editing -->
  <rect class="edit" x="50" y="50" width="180" height="120" rx="8"/>
  <text x="140" y="90" text-anchor="middle" class="text-label">User Editing</text>
  <text x="140" y="115" text-anchor="middle" class="sublabel">Type Content</text>
  <text x="140" y="140" text-anchor="middle" class="sublabel">Make Changes</text>
  <text x="140" y="165" text-anchor="middle" class="sublabel">Continuous Edit</text>
  
  <!-- Change Detection -->
  <rect class="detect" x="280" y="50" width="220" height="150" rx="8"/>
  <text x="390" y="80" text-anchor="middle" class="text-label">Change Detection</text>
  <text x="390" y="110" text-anchor="middle" class="sublabel">Detect Changes</text>
  <text x="390" y="135" text-anchor="middle" class="sublabel">Debounce Timer</text>
  <text x="390" y="160" text-anchor="middle" class="sublabel">Idle Detection</text>
  <text x="390" y="185" text-anchor="middle" class="sublabel">Trigger Save</text>
  
  <!-- Auto-Save -->
  <rect class="save" x="550" y="50" width="200" height="150" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="text-label">Auto-Save</text>
  <text x="650" y="110" text-anchor="middle" class="sublabel">Queue Save</text>
  <text x="650" y="135" text-anchor="middle" class="sublabel">Save to Storage</text>
  <text x="650" y="160" text-anchor="middle" class="sublabel">Background Save</text>
  <text x="650" y="185" text-anchor="middle" class="sublabel">Don&apos;t Block Edit</text>
  
  <!-- Save Confirmation -->
  <rect class="confirm" x="800" y="75" width="160" height="100" rx="8"/>
  <text x="880" y="105" text-anchor="middle" class="text-label">Confirmation</text>
  <text x="880" y="130" text-anchor="middle" class="sublabel">Update Indicator</text>
  <text x="880" y="155" text-anchor="middle" class="sublabel">Show Saved</text>
  <text x="880" y="180" text-anchor="middle" class="sublabel">Error Handling</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 110 L275 110"/>
  <path class="arrow" d="M500 110 L545 110"/>
  <path class="arrow" d="M750 110 L795 110"/>
  
  <!-- Auto-Save Timeline -->
  <rect class="edit" x="50" y="250" width="900" height="160" rx="8"/>
  <text x="500" y="280" text-anchor="middle" class="text-label">Auto-Save Timeline</text>
  
  <!-- Timeline -->
  <line x1="100" y1="350" x2="900" y2="350" stroke="#1a1822" stroke-width="2"/>
  
  <!-- Edit periods -->
  <rect class="edit" x="150" y="330" width="100" height="40" rx="4"/>
  <text x="200" y="355" text-anchor="middle" class="sublabel">Edit</text>
  
  <rect class="edit" x="300" y="330" width="100" height="40" rx="4"/>
  <text x="350" y="355" text-anchor="middle" class="sublabel">Edit</text>
  
  <rect class="edit" x="450" y="330" width="100" height="40" rx="4"/>
  <text x="500" y="355" text-anchor="middle" class="sublabel">Edit</text>
  
  <rect class="edit" x="600" y="330" width="100" height="40" rx="4"/>
  <text x="650" y="355" text-anchor="middle" class="sublabel">Edit</text>
  
  <!-- Save points -->
  <circle cx="250" cy="350" r="8" fill="#6d5bd0"/>
  <text x="250" y="385" text-anchor="middle" class="sublabel">Save</text>
  
  <circle cx="400" cy="350" r="8" fill="#6d5bd0"/>
  <text x="400" y="385" text-anchor="middle" class="sublabel">Save</text>
  
  <circle cx="550" cy="350" r="8" fill="#6d5bd0"/>
  <text x="550" y="385" text-anchor="middle" class="sublabel">Save</text>
  
  <circle cx="700" cy="350" r="8" fill="#6d5bd0"/>
  <text x="700" y="385" text-anchor="middle" class="sublabel">Save</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Auto-Save Flow</text>
</svg>
