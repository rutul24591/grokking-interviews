<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .content { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .account { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .network { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Content Enforcement -->
  <rect class="content" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Content Enforcement</text>
  
  <rect class="content" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Auto-Removal</text>
  
  <rect class="content" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Throttling (Shadow Ban)</text>
  
  <rect class="content" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Flagging for Review</text>
  
  <!-- Account Enforcement -->
  <rect class="account" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Account Enforcement</text>
  
  <rect class="account" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Rate Limiting</text>
  
  <rect class="account" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Account Restrictions</text>
  
  <rect class="account" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Account Suspension</text>
  
  <!-- Network Enforcement -->
  <rect class="network" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Network Enforcement</text>
  
  <rect class="network" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Network Disruption</text>
  
  <rect class="network" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Amplification Prevention</text>
  
  <rect class="network" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Cross-Platform Coordination</text>
  
  <!-- Enforcement Flow -->
  <rect class="content" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Enforcement Escalation</text>
  
  <!-- Flow -->
  <rect class="content" x="70" y="330" width="280" height="60" rx="4"/>
  <rect class="account" x="360" y="330" width="280" height="60" rx="4"/>
  <rect class="network" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Content → Account → Network</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Remove Content</text>
  <text x="360" y="410" text-anchor="middle" class="sublabel">Restrict Account</text>
  <text x="650" y="410" text-anchor="end" class="sublabel">Disrupt Network</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Enforcement Systems</text>
</svg>
