<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .last { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .first { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .merge { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Last Write Wins -->
  <rect class="last" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Last Write Wins</text>
  
  <rect class="last" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Simple Implementation</text>
  
  <rect class="last" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Deterministic</text>
  
  <rect class="last" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Data Loss Risk</text>
  
  <!-- First Write Wins -->
  <rect class="first" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">First Write Wins</text>
  
  <rect class="first" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Data Preservation</text>
  
  <rect class="first" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Simple</text>
  
  <rect class="first" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">May Be Outdated</text>
  
  <!-- Merge Wins -->
  <rect class="merge" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Merge Wins</text>
  
  <rect class="merge" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Data Preservation</text>
  
  <rect class="merge" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Correct Results</text>
  
  <rect class="merge" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Complex Logic</text>
  
  <!-- Strategy Timeline -->
  <rect class="last" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Conflict Strategy Timeline</text>
  
  <!-- Timeline -->
  <line x1="100" y1="350" x2="900" y2="350" stroke="#1a1822" stroke-width="2"/>
  
  <!-- Last point -->
  <circle cx="250" cy="350" r="8" fill="#6d5bd0"/>
  <text x="250" y="385" text-anchor="middle" class="sublabel">Last</text>
  <text x="250" y="405" text-anchor="middle" class="sublabel">Simple</text>
  
  <!-- First point -->
  <circle cx="500" cy="350" r="8" fill="#6d5bd0"/>
  <text x="500" y="385" text-anchor="middle" class="sublabel">First</text>
  <text x="500" y="405" text-anchor="middle" class="sublabel">Preserve</text>
  
  <!-- Merge point -->
  <circle cx="750" cy="350" r="8" fill="#6d5bd0"/>
  <text x="750" y="385" text-anchor="middle" class="sublabel">Merge</text>
  <text x="750" y="405" text-anchor="middle" class="sublabel">Correct</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Conflict Strategies</text>
</svg>
