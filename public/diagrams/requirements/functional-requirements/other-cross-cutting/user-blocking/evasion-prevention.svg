<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .detection { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .prevention { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .response { fill: #e8e4f3; stroke: #6d5bd0; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Evasion Detection -->
  <rect class="detection" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Evasion Detection</text>
  
  <rect class="detection" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Device Fingerprinting</text>
  
  <rect class="detection" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Behavior Pattern Analysis</text>
  
  <rect class="detection" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Network Analysis</text>
  
  <!-- Evasion Prevention -->
  <rect class="prevention" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Evasion Prevention</text>
  
  <rect class="prevention" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Automatic Blocking</text>
  
  <rect class="prevention" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Verification Requirements</text>
  
  <rect class="prevention" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Rate Limiting</text>
  
  <!-- Evasion Response -->
  <rect class="response" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Evasion Response</text>
  
  <rect class="response" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Warning Notifications</text>
  
  <rect class="response" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Account Suspension</text>
  
  <rect class="response" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Safety Team Escalation</text>
  
  <!-- Evasion Prevention Flow -->
  <rect class="detection" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Evasion Prevention Flow</text>
  
  <!-- Flow -->
  <rect class="detection" x="70" y="330" width="280" height="60" rx="4"/>
  <rect class="prevention" x="360" y="330" width="280" height="60" rx="4"/>
  <rect class="response" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Detection → Prevention → Response</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Detect Evasion</text>
  <text x="360" y="410" text-anchor="middle" class="sublabel">Prevent Evasion</text>
  <text x="650" y="410" text-anchor="end" class="sublabel">Respond to Evasion</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Block Evasion Prevention</text>
</svg>
