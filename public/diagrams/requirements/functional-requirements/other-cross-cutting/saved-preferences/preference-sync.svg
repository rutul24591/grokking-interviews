<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .realtime { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .batched { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .manual { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Real-time Sync -->
  <rect class="realtime" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Real-time Sync</text>
  
  <rect class="realtime" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Immediate Delivery</text>
  
  <rect class="realtime" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">No Delay</text>
  
  <rect class="realtime" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">High Network Usage</text>
  
  <!-- Batched Sync -->
  <rect class="batched" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Batched Sync</text>
  
  <rect class="batched" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Batch Delivery</text>
  
  <rect class="batched" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Daily/Weekly</text>
  
  <rect class="batched" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Low Network Usage</text>
  
  <!-- Manual Sync -->
  <rect class="manual" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Manual Sync</text>
  
  <rect class="manual" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Manual Trigger</text>
  
  <rect class="manual" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Manual Selection</text>
  
  <rect class="manual" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">User Control</text>
  
  <!-- Sync Timeline -->
  <rect class="realtime" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Sync Timeline</text>
  
  <!-- Timeline -->
  <line x1="100" y1="350" x2="900" y2="350" stroke="#1a1822" stroke-width="2"/>
  
  <!-- Real-time point -->
  <circle cx="200" cy="350" r="8" fill="#6d5bd0"/>
  <text x="200" y="385" text-anchor="middle" class="sublabel">Real-time</text>
  <text x="200" y="405" text-anchor="middle" class="sublabel">Instant</text>
  
  <!-- Batched point -->
  <circle cx="450" cy="350" r="8" fill="#6d5bd0"/>
  <text x="450" y="385" text-anchor="middle" class="sublabel">Batched</text>
  <text x="450" y="405" text-anchor="middle" class="sublabel">Scheduled</text>
  
  <!-- Manual point -->
  <circle cx="700" cy="350" r="8" fill="#6d5bd0"/>
  <text x="700" y="385" text-anchor="middle" class="sublabel">Manual</text>
  <text x="700" y="405" text-anchor="middle" class="sublabel">On Demand</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Preference Sync</text>
</svg>
