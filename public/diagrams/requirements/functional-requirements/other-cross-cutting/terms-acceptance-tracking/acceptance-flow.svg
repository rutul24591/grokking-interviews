<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .present { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .accept { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .record { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Terms Presentation -->
  <rect class="present" x="50" y="50" width="200" height="120" rx="8"/>
  <text x="150" y="90" text-anchor="middle" class="text-label">Terms Presentation</text>
  <text x="150" y="115" text-anchor="middle" class="sublabel">Display Terms</text>
  <text x="150" y="140" text-anchor="middle" class="sublabel">Show Summary</text>
  <text x="150" y="165" text-anchor="middle" class="sublabel">Highlight Key Points</text>
  
  <!-- User Acceptance -->
  <rect class="accept" x="300" y="50" width="200" height="120" rx="8"/>
  <text x="400" y="90" text-anchor="middle" class="text-label">User Acceptance</text>
  <text x="400" y="115" text-anchor="middle" class="sublabel">Read Terms</text>
  <text x="400" y="140" text-anchor="middle" class="sublabel">Check Accept</text>
  <text x="400" y="165" text-anchor="middle" class="sublabel">Click Accept Button</text>
  
  <!-- Acceptance Recording -->
  <rect class="record" x="550" y="50" width="200" height="120" rx="8"/>
  <text x="650" y="90" text-anchor="middle" class="text-label">Acceptance Recording</text>
  <text x="650" y="115" text-anchor="middle" class="sublabel">Record Acceptance</text>
  <text x="650" y="140" text-anchor="middle" class="sublabel">Store Timestamp</text>
  <text x="650" y="165" text-anchor="middle" class="sublabel">Store Version</text>
  
  <!-- Compliance -->
  <rect class="present" x="800" y="75" width="160" height="70" rx="8"/>
  <text x="880" y="105" text-anchor="middle" class="text-label">Compliance</text>
  <text x="880" y="130" text-anchor="middle" class="sublabel">Terms Accepted</text>
  <text x="880" y="150" text-anchor="middle" class="sublabel">User Can Proceed</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M250 110 L295 110"/>
  <path class="arrow" d="M500 110 L545 110"/>
  <path class="arrow" d="M750 110 L795 110"/>
  
  <!-- Acceptance Timeline -->
  <rect class="present" x="50" y="250" width="900" height="160" rx="8"/>
  <text x="500" y="280" text-anchor="middle" class="text-label">Acceptance Timeline</text>
  
  <!-- Timeline -->
  <line x1="100" y1="350" x2="900" y2="350" stroke="#1a1822" stroke-width="2"/>
  
  <!-- Present point -->
  <circle cx="200" cy="350" r="8" fill="#6d5bd0"/>
  <text x="200" y="385" text-anchor="middle" class="sublabel">Present</text>
  <text x="200" y="405" text-anchor="middle" class="sublabel">Show Terms</text>
  
  <!-- Accept point -->
  <circle cx="400" cy="350" r="8" fill="#6d5bd0"/>
  <text x="400" y="385" text-anchor="middle" class="sublabel">Accept</text>
  <text x="400" y="405" text-anchor="middle" class="sublabel">User Accepts</text>
  
  <!-- Record point -->
  <circle cx="600" cy="350" r="8" fill="#6d5bd0"/>
  <text x="600" y="385" text-anchor="middle" class="sublabel">Record</text>
  <text x="600" y="405" text-anchor="middle" class="sublabel">Record Acceptance</text>
  
  <!-- Comply point -->
  <circle cx="800" cy="350" r="8" fill="#6d5bd0"/>
  <text x="800" y="385" text-anchor="middle" class="sublabel">Comply</text>
  <text x="800" y="405" text-anchor="middle" class="sublabel">Compliance Met</text>
  
  <path class="arrow" d="M208 350 L392 350"/>
  <path class="arrow" d="M408 350 L592 350"/>
  <path class="arrow" d="M608 350 L792 350"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Acceptance Flow</text>
</svg>
