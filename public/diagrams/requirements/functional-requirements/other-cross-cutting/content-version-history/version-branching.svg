<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .main { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .branch { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .merge { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Main Branch -->
  <rect class="main" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Main Branch</text>
  
  <rect class="main" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Version 1.0</text>
  
  <rect class="main" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Version 2.0</text>
  
  <rect class="main" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Version 3.0 (Current)</text>
  
  <!-- Branch 1 -->
  <rect class="branch" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Branch: Feature A</text>
  
  <rect class="branch" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Branched from v2.0</text>
  
  <rect class="branch" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Feature A v1</text>
  
  <rect class="branch" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Feature A v2</text>
  
  <!-- Branch 2 -->
  <rect class="branch" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Branch: Bug Fix</text>
  
  <rect class="branch" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Branched from v3.0</text>
  
  <rect class="branch" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Bug Fix v1</text>
  
  <rect class="branch" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Ready to Merge</text>
  
  <!-- Branch Operations -->
  <rect class="main" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Branch Operations</text>
  
  <!-- Operations -->
  <rect class="main" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Create Branch</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">Branch from Version</text>
  
  <rect class="branch" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Switch Branch</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Work on Branch</text>
  
  <rect class="merge" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Merge Branch</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Merge to Main</text>
  
  <rect class="main" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Resolve Conflicts</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Merge Conflicts</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Version Branching</text>
</svg>
