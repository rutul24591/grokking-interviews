<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .submission { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .analysis { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .triage { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .moderation { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="500" data-theme="light"/>
  
  <!-- Report Submission -->
  <rect class="submission" x="50" y="50" width="200" height="180" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Report Submission</text>
  
  <rect class="submission" x="70" y="100" width="160" height="35" rx="4"/>
  <text x="150" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Report Dialogs</text>
  
  <rect class="submission" x="70" y="145" width="160" height="35" rx="4"/>
  <text x="150" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600">Violation Types</text>
  
  <rect class="submission" x="70" y="190" width="160" height="35" rx="4"/>
  <text x="150" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600">Evidence Specification</text>
  
  <!-- Content Analysis -->
  <rect class="analysis" x="320" y="50" width="200" height="180" rx="8"/>
  <text x="420" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Content Analysis</text>
  
  <rect class="analysis" x="340" y="100" width="160" height="35" rx="4"/>
  <text x="420" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">ML Violation Detection</text>
  
  <rect class="analysis" x="340" y="145" width="160" height="35" rx="4"/>
  <text x="420" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600">Context Analysis</text>
  
  <rect class="analysis" x="340" y="190" width="160" height="35" rx="4"/>
  <text x="420" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600">Severity Scoring</text>
  
  <!-- Triage & Routing -->
  <rect class="triage" x="590" y="50" width="180" height="180" rx="8"/>
  <text x="680" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Triage &amp; Routing</text>
  
  <rect class="triage" x="610" y="100" width="140" height="35" rx="4"/>
  <text x="680" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Priority Queues</text>
  
  <rect class="triage" x="610" y="145" width="140" height="35" rx="4"/>
  <text x="680" y="167" text-anchor="middle" class="sublabel" style="font-weight: 600">Skill-Based Routing</text>
  
  <rect class="triage" x="610" y="190" width="140" height="35" rx="4"/>
  <text x="680" y="212" text-anchor="middle" class="sublabel" style="font-weight: 600">Automated Actions</text>
  
  <!-- Moderation Integration -->
  <rect class="moderation" x="590" y="280" width="330" height="140" rx="8"/>
  <text x="755" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Moderation Integration</text>
  
  <rect class="moderation" x="610" y="330" width="140" height="35" rx="4"/>
  <text x="680" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600">Moderation Queue</text>
  
  <rect class="moderation" x="765" y="330" width="140" height="35" rx="4"/>
  <text x="835" y="352" text-anchor="middle" class="sublabel" style="font-weight: 600">Decision Capture</text>
  
  <rect class="moderation" x="610" y="375" width="140" height="35" rx="4"/>
  <text x="680" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600">Feedback Loops</text>
  
  <rect class="moderation" x="765" y="375" width="140" height="35" rx="4"/>
  <text x="835" y="397" text-anchor="middle" class="sublabel" style="font-weight: 600">Reporter Notification</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M250 140 L315 140"/>
  <path class="arrow" d="M520 140 L605 140"/>
  <path class="arrow" d="M755 230 L755 275"/>
  <path class="arrow" d="M250 350 L315 350"/>
  
  <text x="500" y="480" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 1: Content Reporting Architecture</text>
</svg>
