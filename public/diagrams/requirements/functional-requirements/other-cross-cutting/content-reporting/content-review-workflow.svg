<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .submission { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .analysis { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .triage { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .review { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Report Submission -->
  <rect class="submission" x="50" y="50" width="200" height="120" rx="8"/>
  <text x="150" y="80" text-anchor="middle" class="text-label">1. Report Submission</text>
  <text x="150" y="105" text-anchor="middle" class="sublabel">User Reports Content</text>
  <text x="150" y="125" text-anchor="middle" class="sublabel">Categorize Violation</text>
  <text x="150" y="145" text-anchor="middle" class="sublabel">Submit Report</text>
  
  <!-- Content Analysis -->
  <rect class="analysis" x="300" y="50" width="200" height="120" rx="8"/>
  <text x="400" y="80" text-anchor="middle" class="text-label">2. Content Analysis</text>
  <text x="400" y="105" text-anchor="middle" class="sublabel">ML Violation Detection</text>
  <text x="400" y="125" text-anchor="middle" class="sublabel">Context Analysis</text>
  <text x="400" y="145" text-anchor="middle" class="sublabel">Severity Scoring</text>
  
  <!-- Triage -->
  <rect class="triage" x="550" y="50" width="200" height="120" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="text-label">3. Triage</text>
  <text x="650" y="105" text-anchor="middle" class="sublabel">Priority Assignment</text>
  <text x="650" y="125" text-anchor="middle" class="sublabel">Queue Routing</text>
  <text x="650" y="145" text-anchor="middle" class="sublabel">Automated Actions</text>
  
  <!-- Review -->
  <rect class="review" x="800" y="50" width="170" height="120" rx="8"/>
  <text x="885" y="80" text-anchor="middle" class="text-label">4. Review</text>
  <text x="885" y="105" text-anchor="middle" class="sublabel">Moderator Review</text>
  <text x="885" y="125" text-anchor="middle" class="sublabel">Decision Made</text>
  <text x="885" y="145" text-anchor="middle" class="sublabel">Action Taken</text>
  
  <!-- Arrows between steps -->
  <path class="arrow" d="M250 110 L295 110"/>
  <path class="arrow" d="M500 110 L545 110"/>
  <path class="arrow" d="M750 110 L795 110"/>
  
  <!-- Resolution Path -->
  <rect class="submission" x="50" y="220" width="450" height="150" rx="8"/>
  <text x="275" y="250" text-anchor="middle" class="text-label">Resolution Paths</text>
  
  <rect class="review" x="70" y="270" width="200" height="80" rx="4"/>
  <text x="170" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">Action Taken</text>
  <text x="170" y="315" text-anchor="middle" class="sublabel">Content Removed</text>
  <text x="170" y="335" text-anchor="middle" class="sublabel">User Warned/Restricted</text>
  
  <rect class="triage" x="300" y="270" width="180" height="80" rx="4"/>
  <text x="390" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">No Action</text>
  <text x="390" y="315" text-anchor="middle" class="sublabel">No Violation Found</text>
  <text x="390" y="335" text-anchor="middle" class="sublabel">Insufficient Evidence</text>
  
  <!-- Feedback Loop -->
  <rect class="analysis" x="550" y="220" width="400" height="150" rx="8"/>
  <text x="750" y="250" text-anchor="middle" class="text-label">Reporter Feedback</text>
  
  <rect class="analysis" x="570" y="270" width="180" height="80" rx="4"/>
  <text x="660" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">Status Update</text>
  <text x="660" y="315" text-anchor="middle" class="sublabel">Report Status Changed</text>
  <text x="660" y="335" text-anchor="middle" class="sublabel">Notification Sent</text>
  
  <rect class="review" x="780" y="270" width="150" height="80" rx="4"/>
  <text x="855" y="295" text-anchor="middle" class="sublabel" style="font-weight: 600">Outcome</text>
  <text x="855" y="315" text-anchor="middle" class="sublabel">Action Taken Notice</text>
  <text x="855" y="335" text-anchor="middle" class="sublabel">No Action Notice</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Content Review Workflow</text>
</svg>
