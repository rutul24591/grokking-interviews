<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .app { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .feature { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .user { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- App Permissions -->
  <rect class="app" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">App Permissions</text>
  
  <rect class="app" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Data Access</text>
  
  <rect class="app" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Action Permissions</text>
  
  <rect class="app" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Scope-based Access</text>
  
  <!-- Feature Permissions -->
  <rect class="feature" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Feature Permissions</text>
  
  <rect class="feature" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Feature Access</text>
  
  <rect class="feature" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Feature Limits</text>
  
  <rect class="feature" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Feature Visibility</text>
  
  <!-- User Permissions -->
  <rect class="user" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">User Permissions</text>
  
  <rect class="user" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Read Permissions</text>
  
  <rect class="user" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Write Permissions</text>
  
  <rect class="user" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Admin Permissions</text>
  
  <!-- Permission Management -->
  <rect class="app" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Permission Management Interface</text>
  
  <!-- Management tabs -->
  <rect class="app" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">App Permissions</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">Manage App Access</text>
  
  <rect class="feature" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Feature Permissions</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Manage Features</text>
  
  <rect class="user" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">User Permissions</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Manage User Access</text>
  
  <rect class="app" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Audit Logs</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">View Usage</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Permission Types</text>
</svg>
