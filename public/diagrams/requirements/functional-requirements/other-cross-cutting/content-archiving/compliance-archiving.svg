<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .retention { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .audit { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .export { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Retention Compliance -->
  <rect class="retention" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Retention Compliance</text>
  
  <rect class="retention" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Regulatory Periods</text>
  
  <rect class="retention" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Industry Requirements</text>
  
  <rect class="retention" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Legal Holds</text>
  
  <!-- Compliance Audit -->
  <rect class="audit" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Compliance Audit</text>
  
  <rect class="audit" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Audit Trail</text>
  
  <rect class="audit" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Audit Reports</text>
  
  <rect class="audit" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Audit Verification</text>
  
  <!-- Compliance Export -->
  <rect class="export" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Compliance Export</text>
  
  <rect class="export" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Export Formats</text>
  
  <rect class="export" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Complete Exports</text>
  
  <rect class="export" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Export Verification</text>
  
  <!-- Compliance Requirements -->
  <rect class="retention" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Compliance Requirements by Industry</text>
  
  <!-- Industry requirements -->
  <rect class="retention" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Financial</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">7+ Years</text>
  
  <rect class="audit" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Healthcare</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">6+ Years (HIPAA)</text>
  
  <rect class="export" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Legal</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Indefinite</text>
  
  <rect class="retention" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">General</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Varies</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Compliance Archiving</text>
</svg>
