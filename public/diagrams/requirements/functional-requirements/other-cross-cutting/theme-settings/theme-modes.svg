<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .light { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .dark { fill: #2d3748; stroke: #6d5bd0; stroke-width: 2; }
      .system { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
      .dark-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #ffffff; font-weight: 700; }
      .dark-sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #a0aec0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Light Mode -->
  <rect class="light" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Light Mode</text>
  
  <rect class="light" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Light Background</text>
  
  <rect class="light" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Dark Text</text>
  
  <rect class="light" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Light Icons</text>
  
  <!-- Dark Mode -->
  <rect class="dark" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="dark-text">Dark Mode</text>
  
  <rect class="dark" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="dark-sublabel">Dark Background</text>
  
  <rect class="dark" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="dark-sublabel">Light Text</text>
  
  <rect class="dark" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="dark-sublabel">Dark Icons</text>
  
  <!-- System Theme -->
  <rect class="system" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">System Theme</text>
  
  <rect class="system" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">System Detection</text>
  
  <rect class="system" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Auto Switch</text>
  
  <rect class="system" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">System Override</text>
  
  <!-- Theme Selection -->
  <rect class="light" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Theme Selection</text>
  
  <!-- Selection options -->
  <rect class="light" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Light</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">Select Light</text>
  
  <rect class="dark" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="dark-sublabel" style="font-weight: 600">Dark</text>
  <text x="400" y="375" text-anchor="middle" class="dark-sublabel">Select Dark</text>
  
  <rect class="system" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">System</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Follow System</text>
  
  <rect class="light" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Custom</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Custom Theme</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Theme Modes</text>
</svg>
