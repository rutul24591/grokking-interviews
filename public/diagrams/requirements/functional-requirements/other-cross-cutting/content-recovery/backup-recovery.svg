<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .create { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .store { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .restore { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Backup Creation -->
  <rect class="create" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Backup Creation</text>
  
  <rect class="create" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Scheduled Backups</text>
  
  <rect class="create" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Incremental Backups</text>
  
  <rect class="create" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Full Backups</text>
  
  <!-- Backup Storage -->
  <rect class="store" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Backup Storage</text>
  
  <rect class="store" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Local Storage</text>
  
  <rect class="store" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Remote Storage</text>
  
  <rect class="store" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Cloud Storage</text>
  
  <!-- Backup Restoration -->
  <rect class="restore" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Backup Restoration</text>
  
  <rect class="restore" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Point-in-Time Restore</text>
  
  <rect class="restore" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Full Restore</text>
  
  <rect class="restore" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Selective Restore</text>
  
  <!-- Backup Types -->
  <rect class="create" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Backup Types</text>
  
  <!-- Backup types -->
  <rect class="create" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Full Backup</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">Everything</text>
  
  <rect class="store" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Incremental</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Changes Only</text>
  
  <rect class="restore" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Differential</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Since Last Full</text>
  
  <rect class="create" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Continuous</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Real-time</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Backup Recovery</text>
</svg>
