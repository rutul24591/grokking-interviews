<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .access { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .erasure { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .rectification { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Right to Access -->
  <rect class="access" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Right to Access</text>
  
  <rect class="access" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Data Access</text>
  
  <rect class="access" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Transparency</text>
  
  <rect class="access" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Processing Overhead</text>
  
  <!-- Right to Erasure -->
  <rect class="erasure" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Right to Erasure</text>
  
  <rect class="erasure" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Data Deletion</text>
  
  <rect class="erasure" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Privacy Protection</text>
  
  <rect class="erasure" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Legal Exceptions</text>
  
  <!-- Right to Rectification -->
  <rect class="rectification" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Right to Rectification</text>
  
  <rect class="rectification" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Data Correction</text>
  
  <rect class="rectification" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Accuracy</text>
  
  <rect class="rectification" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Verification Required</text>
  
  <!-- Rights Timeline -->
  <rect class="access" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">GDPR Rights Timeline</text>
  
  <!-- Timeline -->
  <line x1="100" y1="350" x2="900" y2="350" stroke="#1a1822" stroke-width="2"/>
  
  <!-- Access point -->
  <circle cx="250" cy="350" r="8" fill="#6d5bd0"/>
  <text x="250" y="385" text-anchor="middle" class="sublabel">Access</text>
  <text x="250" y="405" text-anchor="middle" class="sublabel">30 Days</text>
  
  <!-- Erasure point -->
  <circle cx="500" cy="350" r="8" fill="#6d5bd0"/>
  <text x="500" y="385" text-anchor="middle" class="sublabel">Erasure</text>
  <text x="500" y="405" text-anchor="middle" class="sublabel">30 Days</text>
  
  <!-- Rectification point -->
  <circle cx="750" cy="350" r="8" fill="#6d5bd0"/>
  <text x="750" y="385" text-anchor="middle" class="sublabel">Rectification</text>
  <text x="750" y="405" text-anchor="middle" class="sublabel">30 Days</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: GDPR Rights</text>
</svg>
