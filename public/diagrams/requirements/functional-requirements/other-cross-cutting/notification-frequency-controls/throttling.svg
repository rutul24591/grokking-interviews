<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .rate { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .coalescing { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .priority { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Rate Limiting -->
  <rect class="rate" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Rate Limiting</text>
  
  <rect class="rate" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Define Rate Limit</text>
  
  <rect class="rate" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Enforce Rate Limit</text>
  
  <rect class="rate" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Override for Important</text>
  
  <!-- Coalescing -->
  <rect class="coalescing" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Coalescing</text>
  
  <rect class="coalescing" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Coalesce Similar</text>
  
  <rect class="coalescing" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Coalesce Frequency</text>
  
  <rect class="coalescing" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Coalesce Content</text>
  
  <!-- Prioritization -->
  <rect class="priority" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Prioritization</text>
  
  <rect class="priority" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Priority Levels</text>
  
  <rect class="priority" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Priority Delivery</text>
  
  <rect class="priority" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Priority Throttling</text>
  
  <!-- Throttling Flow -->
  <rect class="rate" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Throttling Flow</text>
  
  <!-- Flow -->
  <circle cx="150" cy="350" r="8" fill="#6d5bd0"/>
  <text x="150" y="385" text-anchor="middle" class="sublabel">Notifications</text>
  
  <path class="arrow" d="M158 350 L242 350"/>
  
  <rect x="250" y="330" width="100" height="40" rx="4" fill="#ffffff"/>
  <text x="300" y="355" text-anchor="middle" class="sublabel" fill="#1a1822">Rate Limit</text>
  
  <path class="arrow" d="M350 350 L392 350"/>
  
  <circle cx="450" cy="350" r="8" fill="#6d5bd0"/>
  <text x="450" y="385" text-anchor="middle" class="sublabel">Coalesce</text>
  
  <path class="arrow" d="M458 350 L542 350"/>
  
  <rect x="550" y="330" width="100" height="40" rx="4" fill="#ffffff"/>
  <text x="600" y="355" text-anchor="middle" class="sublabel" fill="#1a1822" style="font-weight: 600">Prioritize</text>
  
  <path class="arrow" d="M650 350 L692 350"/>
  
  <circle cx="750" cy="350" r="8" fill="#6d5bd0"/>
  <text x="750" y="385" text-anchor="middle" class="sublabel">Deliver</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Notification Throttling</text>
</svg>
