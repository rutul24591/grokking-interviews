<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .scheduled { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .manual { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .smart { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Scheduled Quiet Hours -->
  <rect class="scheduled" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Scheduled Quiet Hours</text>
  
  <rect class="scheduled" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Define Quiet Time</text>
  
  <rect class="scheduled" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Recurring Schedule</text>
  
  <rect class="scheduled" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Automatic Quiet</text>
  
  <!-- Manual Quiet Hours -->
  <rect class="manual" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Manual Quiet Hours</text>
  
  <rect class="manual" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Manual Enable</text>
  
  <rect class="manual" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Manual Disable</text>
  
  <rect class="manual" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Temporary Quiet</text>
  
  <!-- Smart Quiet Hours -->
  <rect class="smart" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Smart Quiet Hours</text>
  
  <rect class="smart" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Activity Detection</text>
  
  <rect class="smart" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Auto Quiet</text>
  
  <rect class="smart" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Auto Resume</text>
  
  <!-- Quiet Hours Timeline -->
  <rect class="scheduled" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Quiet Hours Timeline</text>
  
  <!-- Timeline -->
  <line x1="100" y1="350" x2="900" y2="350" stroke="#1a1822" stroke-width="2"/>
  
  <!-- Quiet period -->
  <rect x="300" y="330" width="300" height="40" rx="4" fill="#ffffff"/>
  <text x="450" y="355" text-anchor="middle" class="sublabel" fill="#1a1822" style="font-weight: 600">Quiet Hours</text>
  <text x="450" y="385" text-anchor="middle" class="sublabel">10 PM - 7 AM</text>
  
  <!-- Active periods -->
  <circle cx="200" cy="350" r="8" fill="#6d5bd0"/>
  <text x="200" y="385" text-anchor="middle" class="sublabel">Active</text>
  
  <circle cx="700" cy="350" r="8" fill="#6d5bd0"/>
  <text x="700" y="385" text-anchor="middle" class="sublabel">Active</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Quiet Hours</text>
</svg>
