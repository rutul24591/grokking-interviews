<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .suppression { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .cleanup { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .integration { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; stroke-dasharray: 4,2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Notification Suppression -->
  <rect class="suppression" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Notification Suppression</text>
  
  <rect class="suppression" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">All Notification Types</text>
  
  <rect class="suppression" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Mentions, Replies, Likes</text>
  
  <rect class="suppression" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Follows, Messages</text>
  
  <!-- History Cleanup -->
  <rect class="cleanup" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">History Cleanup</text>
  
  <rect class="cleanup" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Hide Existing Notifications</text>
  
  <rect class="cleanup" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Remove from Notification List</text>
  
  <rect class="cleanup" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Batch Cleanup on Mute</text>
  
  <!-- Settings Integration -->
  <rect class="integration" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Settings Integration</text>
  
  <rect class="integration" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Mute Overrides Settings</text>
  
  <rect class="integration" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Granular Mute Options</text>
  
  <rect class="integration" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Notification-Specific Muting</text>
  
  <!-- Notification Suppression Flow -->
  <rect class="suppression" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Notification Suppression Flow</text>
  
  <!-- Flow -->
  <rect class="suppression" x="70" y="330" width="280" height="60" rx="4"/>
  <rect class="cleanup" x="360" y="330" width="280" height="60" rx="4"/>
  <rect class="integration" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Suppression → Cleanup → Integration</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Suppress New</text>
  <text x="360" y="410" text-anchor="middle" class="sublabel">Clean Existing</text>
  <text x="650" y="410" text-anchor="end" class="sublabel">Integrate with Settings</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Notification Suppression</text>
</svg>
