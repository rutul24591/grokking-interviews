<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .login { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .log { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .display { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Login Event -->
  <rect class="login" x="50" y="50" width="180" height="120" rx="8"/>
  <text x="140" y="90" text-anchor="middle" class="text-label">Login Event</text>
  <text x="140" y="115" text-anchor="middle" class="sublabel">User Authentication</text>
  <text x="140" y="140" text-anchor="middle" class="sublabel">Success/Failure</text>
  <text x="140" y="165" text-anchor="middle" class="sublabel">Timestamp</text>
  
  <!-- Log Capture -->
  <rect class="log" x="280" y="50" width="220" height="150" rx="8"/>
  <text x="390" y="80" text-anchor="middle" class="text-label">Log Capture</text>
  <text x="390" y="110" text-anchor="middle" class="sublabel">Capture Event</text>
  <text x="390" y="135" text-anchor="middle" class="sublabel">Add Location</text>
  <text x="390" y="160" text-anchor="middle" class="sublabel">Add Device Info</text>
  <text x="390" y="185" text-anchor="middle" class="sublabel">Sign Log Entry</text>
  
  <!-- Log Storage -->
  <rect class="log" x="550" y="50" width="200" height="150" rx="8"/>
  <text x="650" y="80" text-anchor="middle" class="text-label">Log Storage</text>
  <text x="650" y="110" text-anchor="middle" class="sublabel">Secure Storage</text>
  <text x="650" y="135" text-anchor="middle" class="sublabel">Index by Time</text>
  <text x="650" y="160" text-anchor="middle" class="sublabel">Index by User</text>
  <text x="650" y="185" text-anchor="middle" class="sublabel">Retention Policy</text>
  
  <!-- User Display -->
  <rect class="display" x="800" y="75" width="160" height="100" rx="8"/>
  <text x="880" y="105" text-anchor="middle" class="text-label">User Display</text>
  <text x="880" y="130" text-anchor="middle" class="sublabel">Login History</text>
  <text x="880" y="155" text-anchor="middle" class="sublabel">Session Mgmt</text>
  <text x="880" y="180" text-anchor="middle" class="sublabel">Actions</text>
  
  <!-- Arrows -->
  <path class="arrow" d="M230 110 L275 110"/>
  <path class="arrow" d="M500 110 L545 110"/>
  <path class="arrow" d="M750 110 L795 110"/>
  
  <!-- Login History View -->
  <rect class="login" x="50" y="250" width="900" height="160" rx="8"/>
  <text x="500" y="280" text-anchor="middle" class="text-label">Login History View</text>
  
  <!-- History items -->
  <rect class="log" x="70" y="310" width="200" height="80" rx="4"/>
  <text x="170" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600">Recent Login</text>
  <text x="170" y="365" text-anchor="middle" class="sublabel">Today, 10:30 AM</text>
  <text x="170" y="385" text-anchor="middle" class="sublabel">Chrome, Mac</text>
  
  <rect class="log" x="300" y="310" width="200" height="80" rx="4"/>
  <text x="400" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600">Previous Login</text>
  <text x="400" y="365" text-anchor="middle" class="sublabel">Yesterday, 3:45 PM</text>
  <text x="400" y="385" text-anchor="middle" class="sublabel">Safari, iPhone</text>
  
  <rect class="display" x="530" y="310" width="200" height="80" rx="4"/>
  <text x="630" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600">Active Sessions</text>
  <text x="630" y="365" text-anchor="middle" class="sublabel">2 Active Sessions</text>
  <text x="630" y="385" text-anchor="middle" class="sublabel">Terminate Option</text>
  
  <rect class="display" x="760" y="310" width="200" height="80" rx="4"/>
  <text x="860" y="340" text-anchor="middle" class="sublabel" style="font-weight: 600">Actions</text>
  <text x="860" y="365" text-anchor="middle" class="sublabel">Logout All</text>
  <text x="860" y="385" text-anchor="middle" class="sublabel">Change Password</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Login History Flow</text>
</svg>
