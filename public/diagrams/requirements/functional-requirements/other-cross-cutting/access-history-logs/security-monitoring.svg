<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .detect { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .score { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .respond { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .arrow { stroke: #1a1822; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Anomaly Detection -->
  <rect class="detect" x="50" y="50" width="250" height="180" rx="8"/>
  <text x="175" y="80" text-anchor="middle" class="text-label">Anomaly Detection</text>
  
  <rect class="detect" x="70" y="100" width="210" height="35" rx="4"/>
  <text x="175" y="122" text-anchor="middle" class="sublabel">Unusual Location</text>
  
  <rect class="detect" x="70" y="145" width="210" height="35" rx="4"/>
  <text x="175" y="167" text-anchor="middle" class="sublabel">Unusual Time</text>
  
  <rect class="detect" x="70" y="190" width="210" height="35" rx="4"/>
  <text x="175" y="212" text-anchor="middle" class="sublabel">Unusual Device</text>
  
  <!-- Risk Scoring -->
  <rect class="score" x="380" y="50" width="250" height="180" rx="8"/>
  <text x="505" y="80" text-anchor="middle" class="text-label">Risk Scoring</text>
  
  <rect class="score" x="400" y="100" width="210" height="35" rx="4"/>
  <text x="505" y="122" text-anchor="middle" class="sublabel">Risk Factors</text>
  
  <rect class="score" x="400" y="145" width="210" height="35" rx="4"/>
  <text x="505" y="167" text-anchor="middle" class="sublabel">Calculate Score</text>
  
  <rect class="score" x="400" y="190" width="210" height="35" rx="4"/>
  <text x="505" y="212" text-anchor="middle" class="sublabel">Risk Level</text>
  
  <!-- Automated Response -->
  <rect class="respond" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Automated Response</text>
  
  <rect class="respond" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Low Risk: Allow</text>
  
  <rect class="respond" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Medium: Challenge</text>
  
  <rect class="respond" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">High: Block/Notify</text>
  
  <!-- Monitoring Flow -->
  <rect class="detect" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Security Monitoring Flow</text>
  
  <!-- Flow boxes -->
  <rect class="detect" x="70" y="330" width="180" height="60" rx="4"/>
  <text x="160" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">1. Detect</text>
  <text x="160" y="375" text-anchor="middle" class="sublabel">Anomaly Detection</text>
  
  <rect class="score" x="280" y="330" width="180" height="60" rx="4"/>
  <text x="370" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">2. Score</text>
  <text x="370" y="375" text-anchor="middle" class="sublabel">Risk Assessment</text>
  
  <rect class="respond" x="490" y="330" width="180" height="60" rx="4"/>
  <text x="580" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">3. Respond</text>
  <text x="580" y="375" text-anchor="middle" class="sublabel">Automated Action</text>
  
  <rect class="detect" x="700" y="330" width="180" height="60" rx="4"/>
  <text x="790" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">4. Alert</text>
  <text x="790" y="375" text-anchor="middle" class="sublabel">User Notification</text>
  
  <path class="arrow" d="M250 360 L275 360"/>
  <path class="arrow" d="M460 360 L485 360"/>
  <path class="arrow" d="M670 360 L695 360"/>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Security Monitoring</text>
</svg>
