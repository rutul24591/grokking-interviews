<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .severity { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .volume { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .trust { fill: #e8e4f3; stroke: #6d5bd0; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Severity Scoring -->
  <rect class="severity" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Severity Scoring</text>
  
  <rect class="severity" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Flag Type Weight</text>
  
  <rect class="severity" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Potential Harm Assessment</text>
  
  <rect class="severity" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Critical/High/Medium/Low</text>
  
  <!-- Flag Volume -->
  <rect class="volume" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Flag Volume</text>
  
  <rect class="volume" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Multiple Flags</text>
  
  <rect class="volume" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Viral Content Detection</text>
  
  <rect class="volume" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Reach Weighting</text>
  
  <!-- Flagger Trust -->
  <rect class="trust" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Flagger Trust</text>
  
  <rect class="trust" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Flag History</text>
  
  <rect class="trust" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Account Standing</text>
  
  <rect class="trust" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Flag Quality Score</text>
  
  <!-- Prioritization Matrix -->
  <rect class="severity" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Prioritization Matrix</text>
  
  <!-- Matrix Grid -->
  <rect class="severity" x="70" y="330" width="280" height="60" rx="4"/>
  <text x="210" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Critical Severity</text>
  <text x="210" y="375" text-anchor="middle" class="sublabel">Immediate Review (24/7)</text>
  
  <rect class="volume" x="360" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">High Volume + Severity</text>
  <text x="500" y="375" text-anchor="middle" class="sublabel">Priority Review (Hours)</text>
  
  <rect class="trust" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="790" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Standard Priority</text>
  <text x="790" y="375" text-anchor="middle" class="sublabel">Regular Queue (Days)</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Flag Prioritization Matrix</text>
</svg>
