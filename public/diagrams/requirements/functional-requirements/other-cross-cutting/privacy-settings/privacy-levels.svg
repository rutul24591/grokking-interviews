<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .public { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .friends { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .private { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Public Privacy -->
  <rect class="public" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Public</text>
  
  <rect class="public" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Anyone Can See</text>
  
  <rect class="public" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Including Non-users</text>
  
  <rect class="public" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Search Engine Visible</text>
  
  <!-- Friends/Followers -->
  <rect class="friends" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Friends / Followers</text>
  
  <rect class="friends" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Connected Users Only</text>
  
  <rect class="friends" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Private Network</text>
  
  <rect class="friends" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Not Search Visible</text>
  
  <!-- Private -->
  <rect class="private" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Only Me (Private)</text>
  
  <rect class="private" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Only User Can See</text>
  
  <rect class="private" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Maximum Privacy</text>
  
  <rect class="private" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Hidden from All</text>
  
  <!-- Audience Selector -->
  <rect class="public" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Audience Selector Interface</text>
  
  <!-- Selector Options -->
  <rect class="public" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">🌍 Public</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">Anyone can see</text>
  
  <rect class="friends" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">👥 Friends</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Connected users</text>
  
  <rect class="friends" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">🎯 Custom</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Specific audience</text>
  
  <rect class="private" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">🔒 Only Me</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Private</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Privacy Levels and Audience Selection</text>
</svg>
