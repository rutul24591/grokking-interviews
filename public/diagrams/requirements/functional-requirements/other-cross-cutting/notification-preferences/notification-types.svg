<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .activity { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .system { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .marketing { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Activity Notifications -->
  <rect class="activity" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Activity Notifications</text>
  
  <rect class="activity" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">New Content</text>
  
  <rect class="activity" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Comments &amp; Likes</text>
  
  <rect class="activity" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Follows &amp; Mentions</text>
  
  <!-- System Notifications -->
  <rect class="system" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">System Notifications</text>
  
  <rect class="system" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Updates &amp; Maintenance</text>
  
  <rect class="system" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Security Alerts</text>
  
  <rect class="system" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Account Notifications</text>
  
  <!-- Marketing Notifications -->
  <rect class="marketing" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Marketing Notifications</text>
  
  <rect class="marketing" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Promotions</text>
  
  <rect class="marketing" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">New Features</text>
  
  <rect class="marketing" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Newsletters</text>
  
  <!-- Notification Settings -->
  <rect class="activity" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Notification Type Settings</text>
  
  <!-- Settings options -->
  <rect class="activity" x="70" y="330" width="200" height="60" rx="4"/>
  <text x="170" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Enable/Disable</text>
  <text x="170" y="375" text-anchor="middle" class="sublabel">Toggle Types</text>
  
  <rect class="system" x="300" y="330" width="200" height="60" rx="4"/>
  <text x="400" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Channel Select</text>
  <text x="400" y="375" text-anchor="middle" class="sublabel">Per Type</text>
  
  <rect class="marketing" x="530" y="330" width="200" height="60" rx="4"/>
  <text x="630" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Frequency</text>
  <text x="630" y="375" text-anchor="middle" class="sublabel">Per Type</text>
  
  <rect class="activity" x="760" y="330" width="200" height="60" rx="4"/>
  <text x="860" y="355" text-anchor="middle" class="sublabel" style="font-weight: 600">Priority</text>
  <text x="860" y="375" text-anchor="middle" class="sublabel">Per Type</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 2: Notification Types</text>
</svg>
