<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .anonymity { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .anti-retaliation { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .privacy { fill: #e8e4f3; stroke: #6d5bd0; stroke-width: 2; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Anonymity -->
  <rect class="anonymity" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Reporter Anonymity</text>
  
  <rect class="anonymity" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Anonymous Reporting Option</text>
  
  <rect class="anonymity" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Identity Hidden from Reported</text>
  
  <rect class="anonymity" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Anonymous Outcome Notifications</text>
  
  <!-- Anti-Retaliation -->
  <rect class="anti-retaliation" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Anti-Retaliation Measures</text>
  
  <rect class="anti-retaliation" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Automatic Blocking</text>
  
  <rect class="anti-retaliation" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Enhanced Monitoring</text>
  
  <rect class="anti-retaliation" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Safety Check-ins</text>
  
  <!-- Privacy Controls -->
  <rect class="privacy" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label" style="font-size: 16px">Privacy Controls</text>
  
  <rect class="privacy" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel" style="font-weight: 600">Limited Access</text>
  
  <rect class="privacy" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Data Minimization</text>
  
  <rect class="privacy" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">Audit Logging</text>
  
  <!-- Reporter Protection Flow -->
  <rect class="anonymity" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label" style="font-size: 16px">Reporter Protection Flow</text>
  
  <!-- Flow -->
  <rect class="anonymity" x="70" y="330" width="280" height="60" rx="4"/>
  <rect class="anti-retaliation" x="360" y="330" width="280" height="60" rx="4"/>
  <rect class="privacy" x="650" y="330" width="280" height="60" rx="4"/>
  <text x="500" y="365" text-anchor="middle" class="sublabel" style="font-weight: 600;">Anonymous Option → Auto-Block → Privacy Protection</text>
  
  <text x="70" y="410" text-anchor="start" class="sublabel">Anonymous Reporting</text>
  <text x="360" y="410" text-anchor="middle" class="sublabel">Anti-Retaliation</text>
  <text x="650" y="410" text-anchor="end" class="sublabel">Privacy Controls</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Reporter Protection Measures</text>
</svg>
