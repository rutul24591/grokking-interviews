<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" class="w-full h-auto">
  <defs>
    <style>
      .bg { fill: #f3f1f8; }
      .explicit { fill: #ffffff; stroke: #6d5bd0; stroke-width: 2; }
      .implicit { fill: #ffffff; stroke: #d7d1e6; stroke-width: 2; }
      .legitimate { fill: #ffffff; stroke: #6d5bd0; stroke-width: 3; }
      .text-label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #1a1822; font-weight: 700; }
      .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #6d5bd0; font-weight: 600; }
    </style>
  </defs>
  
  <rect class="bg" width="1000" height="450" data-theme="light"/>
  
  <!-- Explicit Consent -->
  <rect class="explicit" x="50" y="50" width="280" height="180" rx="8"/>
  <text x="190" y="80" text-anchor="middle" class="text-label">Explicit Consent</text>
  
  <rect class="explicit" x="70" y="100" width="240" height="35" rx="4"/>
  <text x="190" y="122" text-anchor="middle" class="sublabel">Opt-in Checkbox</text>
  
  <rect class="explicit" x="70" y="145" width="240" height="35" rx="4"/>
  <text x="190" y="167" text-anchor="middle" class="sublabel">Written Consent</text>
  
  <rect class="explicit" x="70" y="190" width="240" height="35" rx="4"/>
  <text x="190" y="212" text-anchor="middle" class="sublabel">Required for Sensitive</text>
  
  <!-- Implicit Consent -->
  <rect class="implicit" x="380" y="50" width="280" height="180" rx="8"/>
  <text x="520" y="80" text-anchor="middle" class="text-label">Implicit Consent</text>
  
  <rect class="implicit" x="400" y="100" width="240" height="35" rx="4"/>
  <text x="520" y="122" text-anchor="middle" class="sublabel">Inferred from Actions</text>
  
  <rect class="implicit" x="400" y="145" width="240" height="35" rx="4"/>
  <text x="520" y="167" text-anchor="middle" class="sublabel">Browsing Website</text>
  
  <rect class="implicit" x="400" y="190" width="240" height="35" rx="4"/>
  <text x="520" y="212" text-anchor="middle" class="sublabel">Not Opting Out</text>
  
  <!-- Legitimate Interest -->
  <rect class="legitimate" x="710" y="50" width="240" height="180" rx="8"/>
  <text x="830" y="80" text-anchor="middle" class="text-label">Legitimate Interest</text>
  
  <rect class="legitimate" x="730" y="100" width="200" height="35" rx="4"/>
  <text x="830" y="122" text-anchor="middle" class="sublabel">Legitimate Interest Assessment</text>
  
  <rect class="legitimate" x="730" y="145" width="200" height="35" rx="4"/>
  <text x="830" y="167" text-anchor="middle" class="sublabel">Balancing Test</text>
  
  <rect class="legitimate" x="730" y="190" width="200" height="35" rx="4"/>
  <text x="830" y="212" text-anchor="middle" class="sublabel">User Can Object</text>
  
  <!-- Consent Requirements -->
  <rect class="explicit" x="50" y="280" width="900" height="130" rx="8"/>
  <text x="500" y="310" text-anchor="middle" class="text-label">Consent Type Requirements</text>
  
  <!-- Header -->
  <rect class="explicit" x="60" y="320" width="880" height="35" rx="4" fill="#ede7f6"/>
  <text x="150" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Type</text>
  <text x="300" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">GDPR</text>
  <text x="450" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">CCPA</text>
  <text x="600" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">Use Case</text>
  <text x="800" y="342" text-anchor="middle" class="sublabel" style="font-weight: 600">User Action</text>
  
  <!-- Row 1 -->
  <text x="150" y="380" text-anchor="middle" class="sublabel">Explicit</text>
  <text x="300" y="380" text-anchor="middle" class="sublabel" fill="#059669" font-weight="600">Required</text>
  <text x="450" y="380" text-anchor="middle" class="sublabel" fill="#059669" font-weight="600">Required</text>
  <text x="600" y="380" text-anchor="middle" class="sublabel">Sensitive, Marketing</text>
  <text x="800" y="380" text-anchor="middle" class="sublabel" fill="#059669" font-weight="600">Opt-in</text>
  
  <!-- Row 2 -->
  <text x="150" y="400" text-anchor="middle" class="sublabel">Implicit</text>
  <text x="300" y="400" text-anchor="middle" class="sublabel" fill="#dc2626">Limited</text>
  <text x="450" y="400" text-anchor="middle" class="sublabel" fill="#059669" font-weight="600">Allowed</text>
  <text x="600" y="400" text-anchor="middle" class="sublabel">Necessary Processing</text>
  <text x="800" y="400" text-anchor="middle" class="sublabel" fill="#dc2626">Opt-out</text>
  
  <text x="500" y="440" text-anchor="middle" class="text-label" style="font-size: 16px">Figure 3: Consent Types</text>
</svg>
