<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="bpArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Backpressure Handling Patterns</text>
  
  <!-- Backpressure Flow -->
  <rect x="50" y="60" width="450" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Backpressure Signal Flow</text>
  
  <!-- Producer -->
  <rect x="70" y="110" width="100" height="50" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="120" y="140" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff">Producer</text>
  <text x="120" y="155" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Fast sender</text>
  
  <!-- Queue filling -->
  <line x1="170" y1="135" x2="200" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="3" marker-end="url(#bpArrow)"/>
  <text x="185" y="125" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Requests</text>
  
  <!-- Queue -->
  <rect x="200" y="110" width="120" height="50" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.5"/>
  <text x="260" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">Queue</text>
  <text x="260" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Filling up...</text>
  
  <!-- Backpressure signal -->
  <path d="M 260 160 L 260 185 L 120 185 L 120 165" stroke="var(--border-red, #ef4444)" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#bpArrow)"/>
  <text x="180" y="180" text-anchor="middle" font-size="7" fill="var(--border-red, #ef4444" font-weight="bold">SLOW DOWN</text>
  
  <!-- Consumer -->
  <rect x="320" y="110" width="100" height="50" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="370" y="140" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff">Consumer</text>
  <text x="370" y="155" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Slow processor</text>
  
  <line x1="320" y1="135" x2="350" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#bpArrow)"/>
  
  <text x="275" y="200" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Consumer signals producer to reduce rate</text>
  
  <!-- Bounded Queue -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Bounded Queue Pattern</text>
  
  <!-- Queue states -->
  <rect x="540" y="110" width="120" height="70" rx="4" fill="var(--bg-green, #22c55e)" opacity="0.3" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="600" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Normal</text>
  <text x="600" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">&lt;50% full</text>
  <text x="600" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Accept all</text>
  
  <rect x="680" y="110" width="120" height="70" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.3" stroke="var(--border-orange, #f97316)" stroke-width="2"/>
  <text x="740" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Warning</text>
  <text x="740" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">50-80% full</text>
  <text x="740" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Alert sent</text>
  
  <rect x="820" y="110" width="120" height="70" rx="4" fill="var(--bg-red, #ef4444)" opacity="0.3" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="880" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-red, #ef4444">Full</text>
  <text x="880" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">&gt;80% full</text>
  <text x="880" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Reject new</text>
  
  <!-- Load Shedding -->
  <rect x="50" y="280" width="450" height="160" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Load Shedding Strategies</text>
  
  <rect x="70" y="325" width="170" height="45" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="155" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Random Shedding</text>
  <text x="155" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Drop random requests</text>
  
  <rect x="260" y="325" width="170" height="45" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="345" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Priority-Based</text>
  <text x="345" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Drop low-priority first</text>
  
  <rect x="70" y="380" width="170" height="45" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="155" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Client-Based</text>
  <text x="155" y="417" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Limit per client</text>
  
  <rect x="260" y="380" width="170" height="45" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="345" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Graceful Degradation</text>
  <text x="345" y="417" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Disable non-critical</text>
  
  <!-- Circuit Breaker -->
  <rect x="520" y="220" width="430" height="110" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Circuit Breaker Pattern</text>
  
  <rect x="540" y="265" width="120" height="55" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="600" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">CLOSED</text>
  <text x="600" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Normal operation</text>
  
  <rect x="680" y="265" width="120" height="55" rx="3" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="740" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-red, #ef4444">OPEN</text>
  <text x="740" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Failing, reject all</text>
  
  <rect x="820" y="265" width="120" height="55" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="880" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">HALF-OPEN</text>
  <text x="880" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Testing recovery</text>
  
  <text x="500" y="360" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Implement backpressure at every layer. Better to fail fast than cascade failure.</text>
</svg>
