<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <marker id="haArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
    <linearGradient id="activeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:var(--bg-green, #22c55e);stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:var(--bg-green, #22c55e);stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="standbyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:var(--bg-orange, #f97316);stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:var(--bg-orange, #f97316);stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">High Availability Architectures</text>
  
  <!-- Active-Passive -->
  <rect x="50" y="60" width="450" height="250" rx="8" fill="url(#activeGrad)" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Active-Passive (Failover)</text>
  
  <!-- Primary node -->
  <rect x="100" y="110" width="150" height="80" rx="6" fill="var(--bg-green, #22c55e)" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="175" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-inverse, #ffffff)">PRIMARY</text>
  <text x="175" y="165" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff)">Active - Handling Traffic</text>
  <text x="175" y="180" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">✓ Processing requests</text>
  
  <!-- Standby node -->
  <rect x="300" y="110" width="150" height="80" rx="6" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-orange, #f97316)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="375" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">STANDBY</text>
  <text x="375" y="165" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Passive - Ready to failover</text>
  <text x="375" y="180" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ State synchronized</text>
  
  <!-- Health check arrow -->
  <line x1="250" y1="150" x2="295" y2="150" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#haArrow)"/>
  <text x="272" y="140" text-anchor="middle" font-size="9" fill="var(--border-accent, #3b82f6)">Health</text>
  <text x="272" y="170" text-anchor="middle" font-size="9" fill="var(--border-accent, #3b82f6)">Check</text>
  
  <!-- Failover arrow -->
  <line x1="375" y1="200" x2="375" y2="230" stroke="var(--border-orange, #f97316)" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="375,230 370,220 380,220" fill="var(--border-orange, #f97316)"/>
  <text x="385" y="220" text-anchor="middle" font-size="9" fill="var(--border-orange, #f97316)" font-weight="bold">FAILOVER</text>
  
  <!-- State sync -->
  <rect x="100" y="240" width="350" height="50" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="275" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a)">State Synchronization</text>
  <text x="275" y="282" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Synchronous or asynchronous replication keeps standby ready</text>
  
  <!-- Characteristics -->
  <rect x="50" y="320" width="450" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="70" y="340" font-size="10" fill="var(--text-secondary, #475569)">✓ Simple to implement</text>
  <text x="70" y="358" font-size="10" fill="var(--text-secondary, #475569)">✓ No split-brain risk</text>
  <text x="250" y="340" font-size="10" fill="#f59e0b">✗ Wasted capacity (standby idle)</text>
  <text x="250" y="358" font-size="10" fill="#f59e0b">✗ Failover downtime (seconds to minutes)</text>
  
  <!-- Active-Active -->
  <rect x="520" y="60" width="430" height="250" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Active-Active (Load Balanced)</text>
  
  <!-- Load balancer -->
  <rect x="675" y="110" width="135" height="50" rx="6" fill="var(--bg-accent, #3b82f6)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="742" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-inverse, #ffffff)">LOAD BALANCER</text>
  <text x="742" y="150" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Distributes traffic</text>
  
  <!-- Active nodes -->
  <rect x="550" y="190" width="120" height="60" rx="4" fill="var(--bg-green, #22c55e)" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="610" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-inverse, #ffffff)">NODE 1</text>
  <text x="610" y="235" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Active</text>
  
  <rect x="682" y="190" width="120" height="60" rx="4" fill="var(--bg-green, #22c55e)" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="742" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-inverse, #ffffff)">NODE 2</text>
  <text x="742" y="235" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Active</text>
  
  <rect x="815" y="190" width="120" height="60" rx="4" fill="var(--bg-green, #22c55e)" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="875" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-inverse, #ffffff)">NODE 3</text>
  <text x="875" y="235" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Active</text>
  
  <!-- Arrows from LB -->
  <line x1="705" y1="160" x2="610" y2="185" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#haArrow)"/>
  <line x1="742" y1="160" x2="742" y2="185" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#haArrow)"/>
  <line x1="780" y1="160" x2="875" y2="185" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#haArrow)"/>
  
  <!-- State sync between nodes -->
  <path d="M 610 225 Q 742 280 875 225" fill="none" stroke="var(--border-purple, #8b5cf6)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="742" y="275" text-anchor="middle" font-size="9" fill="var(--border-purple, #8b5cf6)">State Sync</text>
  
  <!-- Characteristics -->
  <rect x="520" y="320" width="430" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="540" y="340" font-size="10" fill="var(--text-secondary, #475569)">✓ Full capacity utilization</text>
  <text x="540" y="358" font-size="10" fill="var(--text-secondary, #475569)">✓ Instant failover (no downtime)</text>
  <text x="740" y="340" font-size="10" fill="#ef4444">✗ Split-brain risk</text>
  <text x="740" y="358" font-size="10" fill="#ef4444">✗ Complex state management</text>
  
  <!-- Availability Calculation -->
  <rect x="50" y="405" width="900" height="185" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="430" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Availability Calculation & SLA Tiers</text>
  
  <!-- Availability formula -->
  <rect x="70" y="450" width="400" height="120" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="270" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Availability Formula</text>
  <text x="270" y="500" text-anchor="middle" font-size="14" fill="var(--text-primary, #0f172a)">Availability = Uptime / (Uptime + Downtime) × 100%</text>
  
  <text x="270" y="530" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">For N identical components in parallel:</text>
  <text x="270" y="550" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-accent, #3b82f6)">System Availability = 1 - (1 - A)^N</text>
  <text x="270" y="568" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Example: Two 99% components → 99.99% system availability</text>
  
  <!-- SLA tiers -->
  <rect x="500" y="450" width="430" height="120" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="715" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">SLA Availability Tiers</text>
  
  <text x="520" y="500" font-size="10" fill="var(--text-secondary, #475569)">99% (Two Nines):</text>
  <text x="620" y="500" font-size="10" fill="#ef4444">~3.65 days downtime/year</text>
  
  <text x="520" y="520" font-size="10" fill="var(--text-secondary, #475569)">99.9% (Three Nines):</text>
  <text x="640" y="520" font-size="10" fill="#f59e0b">~8.76 hours downtime/year</text>
  
  <text x="520" y="540" font-size="10" fill="var(--text-secondary, #475569)">99.99% (Four Nines):</text>
  <text x="650" y="540" font-size="10" fill="#22c55e">~52.6 minutes downtime/year</text>
  
  <text x="520" y="560" font-size="10" fill="var(--text-secondary, #475569)">99.999% (Five Nines):</text>
  <text x="660" y="560" font-size="10" fill="var(--border-green, #22c55e)">~5.26 minutes downtime/year</text>
</svg>
