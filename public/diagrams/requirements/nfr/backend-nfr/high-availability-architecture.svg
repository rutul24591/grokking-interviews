<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">High Availability Architecture</text>
  
  <!-- Availability Nines -->
  <rect x="40" y="60" width="340" height="150" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Availability Nines</text>
  
  <rect x="55" y="105" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="210" y="125" font-size="11" text-anchor="middle" fill="#1a1a1a">99% (Two Nines) — 3.65 days downtime/year</text>
  
  <rect x="55" y="138" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="210" y="158" font-size="11" text-anchor="middle" fill="#1a1a1a">99.9% (Three Nines) — 8.76 hours/year</text>
  
  <rect x="55" y="171" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="210" y="191" font-size="11" text-anchor="middle" fill="#1a1a1a">99.99% (Four Nines) — 52.6 minutes/year</text>
  
  <rect x="55" y="204" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="210" y="224" font-size="11" text-anchor="middle" fill="#1a1a1a">99.999% (Five Nines) — 5.26 minutes/year</text>
  
  <!-- Redundancy Patterns -->
  <rect x="420" y="60" width="340" height="150" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Redundancy Patterns</text>
  
  <rect x="435" y="105" width="150" height="85" rx="6" fill="#a5d6a7"/>
  <text x="510" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Active-Passive</text>
  <text x="510" y="145" font-size="9" text-anchor="middle" fill="#666666">Primary handles all</text>
  <text x="510" y="162" font-size="9" text-anchor="middle" fill="#666666">Standby ready</text>
  <text x="510" y="179" font-size="9" text-anchor="middle" fill="#666666">Simple, no split-brain</text>
  
  <rect x="605" y="105" width="140" height="85" rx="6" fill="#a5d6a7"/>
  <text x="675" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Active-Active</text>
  <text x="675" y="145" font-size="9" text-anchor="middle" fill="#666666">All nodes serve traffic</text>
  <text x="675" y="162" font-size="9" text-anchor="middle" fill="#666666">Load balanced</text>
  <text x="675" y="179" font-size="9" text-anchor="middle" fill="#666666">Efficient, complex sync</text>
  
  <!-- Failover Architecture -->
  <rect x="40" y="240" width="720" height="160" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="270" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Failover Architecture Flow</text>
  
  <rect x="55" y="285" width="160" height="45" rx="6" fill="#ffe0b2"/>
  <text x="135" y="313" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Health Detection</text>
  
  <line x1="215" y1="307" x2="255" y2="307" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="255" y="285" width="160" height="45" rx="6" fill="#ffe0b2"/>
  <text x="335" y="313" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Failover Decision</text>
  
  <line x1="415" y1="307" x2="455" y2="307" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="455" y="285" width="160" height="45" rx="6" fill="#ffe0b2"/>
  <text x="535" y="313" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. State Promotion</text>
  
  <line x1="615" y1="307" x2="655" y2="307" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="655" y="285" width="90" height="45" rx="6" fill="#ffe0b2"/>
  <text x="700" y="313" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Serve</text>
  
  <rect x="55" y="340" width="690" height="50" rx="6" fill="#fff8e1"/>
  <text x="400" y="360" font-size="10" text-anchor="middle" fill="#666666">Health: Heartbeat, TCP check, HTTP probe | Decision: Automatic (preferred) or manual | Promotion: DNS update, LB reconfig, VIP move</text>
  <text x="400" y="380" font-size="10" text-anchor="middle" fill="#666666">RTO = Detection time + Promotion time + DNS propagation | Typical: 30s-5min for automated, 15-60min for manual</text>
  
  <!-- Multi-AZ/Multi-Region -->
  <rect x="40" y="430" width="340" height="150" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="210" y="460" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Multi-AZ Deployment</text>
  
  <rect x="55" y="475" width="310" height="35" rx="4" fill="#e1bee7"/>
  <text x="210" y="498" font-size="10" text-anchor="middle" fill="#1a1a1a">AZ-1: Active (us-east-1a) — handles traffic</text>
  
  <rect x="55" y="515" width="310" height="35" rx="4" fill="#e1bee7"/>
  <text x="210" y="538" font-size="10" text-anchor="middle" fill="#1a1a1a">AZ-2: Active (us-east-1b) — handles traffic</text>
  
  <rect x="55" y="555" width="310" height="25" rx="4" fill="#f3e5f5"/>
  <text x="210" y="573" font-size="9" text-anchor="middle" fill="#666666">Sync replication between AZs (low latency, ~1-2ms)</text>
  
  <!-- RTO/RPO -->
  <rect x="420" y="430" width="340" height="150" rx="8" fill="#bbdefb" stroke="#90caf9" stroke-width="2"/>
  <text x="590" y="460" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RTO & RPO</text>
  
  <rect x="435" y="475" width="310" height="45" rx="4" fill="#bbdefb"/>
  <text x="590" y="495" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RTO (Recovery Time Objective)</text>
  <text x="590" y="515" font-size="10" text-anchor="middle" fill="#666666">Max acceptable downtime — how fast to recover</text>
  
  <rect x="435" y="525" width="310" height="45" rx="4" fill="#bbdefb"/>
  <text x="590" y="545" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RPO (Recovery Point Objective)</text>
  <text x="590" y="565" font-size="10" text-anchor="middle" fill="#666666">Max data loss — how much data can be lost</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
