<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CAP Theorem — Consistency vs Availability Trade-Off</text>
  
  <!-- CAP Triangle -->
  <polygon points="400,100 200,400 600,400" fill="none" stroke="#666666" stroke-width="3"/>
  
  <!-- Labels on vertices -->
  <text x="400" y="85" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Consistency</text>
  <text x="175" y="425" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Availability</text>
  <text x="625" y="425" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Partition Tolerance</text>
  
  <!-- CP Region -->
  <polygon points="400,120 220,380 400,380" fill="#e3f2fd" opacity="0.6"/>
  <text x="340" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CP</text>
  <text x="340" y="300" font-size="10" text-anchor="middle" fill="#666666">Consistent</text>
  <text x="340" y="315" font-size="10" text-anchor="middle" fill="#666666">Not Available</text>
  <text x="340" y="335" font-size="9" text-anchor="middle" fill="#666666">PostgreSQL, ZooKeeper</text>
  <text x="340" y="350" font-size="9" text-anchor="middle" fill="#666666">MongoDB, HBase</text>
  
  <!-- AP Region -->
  <polygon points="400,120 580,380 400,380" fill="#c8e6c9" opacity="0.6"/>
  <text x="460" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">AP</text>
  <text x="460" y="300" font-size="10" text-anchor="middle" fill="#666666">Available</text>
  <text x="460" y="315" font-size="10" text-anchor="middle" fill="#666666">Eventually Consistent</text>
  <text x="460" y="335" font-size="9" text-anchor="middle" fill="#666666">DynamoDB, Cassandra</text>
  <text x="460" y="350" font-size="9" text-anchor="middle" fill="#666666">CouchDB, Riak</text>
  
  <!-- CA Region (top) -->
  <polygon points="400,140 350,220 450,220" fill="#fff3e0" opacity="0.4"/>
  <text x="400" y="185" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CA</text>
  <text x="400" y="205" font-size="9" text-anchor="middle" fill="#666666">Single-node only</text>
  
  <!-- Partition scenario -->
  <rect x="40" y="450" width="340" height="130" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="210" y="480" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Network Partition Scenario</text>
  <text x="210" y="505" font-size="11" text-anchor="middle" fill="#666666">Node A ←| NETWORK |→ Node B</text>
  <text x="210" y="525" font-size="11" text-anchor="middle" fill="#666666">CP: Reject writes until partition heals</text>
  <text x="210" y="545" font-size="11" text-anchor="middle" fill="#666666">AP: Accept writes on both, reconcile later</text>
  <text x="210" y="565" font-size="11" text-anchor="middle" fill="#666666">CA: Cannot exist during partition</text>
  
  <!-- Real-world choice -->
  <rect x="420" y="450" width="340" height="130" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="590" y="480" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Interview Decision Framework</text>
  <text x="590" y="505" font-size="11" text-anchor="middle" fill="#666666">1. Identify data domain (payment vs social)</text>
  <text x="590" y="525" font-size="11" text-anchor="middle" fill="#666666">2. Choose CP for financial/critical data</text>
  <text x="590" y="545" font-size="11" text-anchor="middle" fill="#666666">3. Choose AP for feeds/analytics/cache</text>
  <text x="590" y="565" font-size="11" text-anchor="middle" fill="#666666">4. Mix models per data domain in same system</text>
</svg>
