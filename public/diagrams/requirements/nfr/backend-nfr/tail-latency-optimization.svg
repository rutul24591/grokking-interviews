<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tail Latency Analysis & Optimization</text>
  
  <!-- Latency Distribution -->
  <rect x="40" y="70" width="340" height="200" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Latency Distribution Curve</text>
  
  <!-- Histogram bars -->
  <rect x="55" y="130" width="40" height="120" rx="2" fill="#bbdefb"/>
  <text x="75" y="260" font-size="8" text-anchor="middle" fill="#666666">0-50ms</text>
  
  <rect x="100" y="180" width="40" height="70" rx="2" fill="#bbdefb"/>
  <text x="120" y="260" font-size="8" text-anchor="middle" fill="#666666">50-100</text>
  
  <rect x="145" y="210" width="40" height="40" rx="2" fill="#bbdefb"/>
  <text x="165" y="260" font-size="8" text-anchor="middle" fill="#666666">100-200</text>
  
  <rect x="190" y="230" width="40" height="20" rx="2" fill="#bbdefb"/>
  <text x="210" y="260" font-size="8" text-anchor="middle" fill="#666666">200-500</text>
  
  <rect x="235" y="240" width="40" height="10" rx="2" fill="#ff9800"/>
  <text x="255" y="260" font-size="8" text-anchor="middle" fill="#666666">500ms-1s</text>
  
  <rect x="280" y="245" width="40" height="5" rx="2" fill="#f44336"/>
  <text x="300" y="260" font-size="8" text-anchor="middle" fill="#666666">1s+</text>
  
  <text x="210" y="285" font-size="10" text-anchor="middle" fill="#f44336">← P50 is here (bulk) | Tail is here →</text>
  
  <!-- Tail Latency Causes -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tail Latency Causes</text>
  
  <rect x="435" y="115" width="310" height="28" rx="4" fill="#ffcdd2"/>
  <text x="590" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">GC pauses (Java: 100ms-10s stop-the-world)</text>
  
  <rect x="435" y="148" width="310" height="28" rx="4" fill="#ffcdd2"/>
  <text x="590" y="168" font-size="10" text-anchor="middle" fill="#1a1a1a">Cache misses (disk I/O: 1-10ms vs RAM: 100ns)</text>
  
  <rect x="435" y="181" width="310" height="28" rx="4" fill="#ffcdd2"/>
  <text x="590" y="201" font-size="10" text-anchor="middle" fill="#1a1a1a">Lock contention (thread waiting for lock)</text>
  
  <rect x="435" y="214" width="310" height="28" rx="4" fill="#ffcdd2"/>
  <text x="590" y="234" font-size="10" text-anchor="middle" fill="#1a1a1a">Noisy neighbors (shared CPU, network, disk)</text>
  
  <rect x="435" y="247" width="310" height="28" rx="4" fill="#ffcdd2"/>
  <text x="590" y="267" font-size="10" text-anchor="middle" fill="#1a1a1a">Head-of-line blocking (HTTP/1.1, TCP)</text>
  
  <!-- Optimization Techniques -->
  <rect x="40" y="300" width="720" height="280" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="330" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tail Latency Optimization Techniques</text>
  
  <rect x="55" y="345" width="220" height="70" rx="6" fill="#e3f2fd"/>
  <text x="165" y="365" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Hedged Requests</text>
  <text x="165" y="385" font-size="9" text-anchor="middle" fill="#666666">Send request to 2 replicas</text>
  <text x="165" y="400" font-size="9" text-anchor="middle" fill="#666666">Use fastest response, cancel other</text>
  <text x="165" y="415" font-size="9" text-anchor="middle" fill="#666666">Reduces P99 by 2-10×</text>
  
  <rect x="295" y="345" width="220" height="70" rx="6" fill="#c8e6c9"/>
  <text x="405" y="365" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Timeout Optimization</text>
  <text x="405" y="385" font-size="9" text-anchor="middle" fill="#666666">Set timeouts per operation</text>
  <text x="405" y="400" font-size="9" text-anchor="middle" fill="#666666">Based on P99 + 50% buffer</text>
  <text x="405" y="415" font-size="9" text-anchor="middle" fill="#666666">Prevents indefinite hangs</text>
  
  <rect x="535" y="345" width="210" height="70" rx="6" fill="#fff3e0"/>
  <text x="640" y="365" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Request Prioritization</text>
  <text x="640" y="385" font-size="9" text-anchor="middle" fill="#666666">Queue high-priority requests first</text>
  <text x="640" y="400" font-size="9" text-anchor="middle" fill="#666666">Shed low-priority under load</text>
  <text x="640" y="415" font-size="9" text-anchor="middle" fill="#666666">Protects P99 for critical paths</text>
  
  <rect x="55" y="430" width="220" height="70" rx="6" fill="#e1bee7"/>
  <text x="165" y="450" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Caching Hot Paths</text>
  <text x="165" y="470" font-size="9" text-anchor="middle" fill="#666666">Cache frequently accessed data</text>
  <text x="165" y="485" font-size="9" text-anchor="middle" fill="#666666">Eliminates variable I/O latency</text>
  <text x="165" y="500" font-size="9" text-anchor="middle" fill="#666666">Target: 90%+ cache hit ratio</text>
  
  <rect x="295" y="430" width="220" height="70" rx="6" fill="#ffebee"/>
  <text x="405" y="450" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Connection Pooling</text>
  <text x="405" y="470" font-size="9" text-anchor="middle" fill="#666666">Reuse connections, avoid setup</text>
  <text x="405" y="485" font-size="9" text-anchor="middle" fill="#666666">Pool size = expected concurrent</text>
  <text x="405" y="500" font-size="9" text-anchor="middle" fill="#666666">Prevents connection storms</text>
  
  <rect x="535" y="430" width="210" height="70" rx="6" fill="#e0f2f1"/>
  <text x="640" y="450" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Asynchronous Processing</text>
  <text x="640" y="470" font-size="9" text-anchor="middle" fill="#666666">Defer non-critical work</text>
  <text x="640" y="485" font-size="9" text-anchor="middle" fill="#666666">Queue: analytics, notifications</text>
  <text x="640" y="500" font-size="9" text-anchor="middle" fill="#666666">Reduces request latency</text>
</svg>
