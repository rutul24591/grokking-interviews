<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <marker id="tailArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Tail Latency Optimization Techniques</text>
  
  <!-- Problem: Tail latency compounding -->
  <rect x="50" y="60" width="450" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Problem: Tail Latency Compounding</text>
  
  <!-- Sequential calls visualization -->
  <line x1="100" y1="140" x2="400" y2="140" stroke="#3b82f6" stroke-width="2"/>
  
  <rect x="100" y="125" width="55" height="30" rx="3" fill="#3b82f6"/>
  <text x="127" y="145" text-anchor="middle" font-size="9" fill="#ffffff">Svc A</text>
  <text x="127" y="165" text-anchor="middle" font-size="8" fill="#475569">P99: 50ms</text>
  
  <rect x="165" y="125" width="55" height="30" rx="3" fill="#3b82f6"/>
  <text x="192" y="145" text-anchor="middle" font-size="9" fill="#ffffff">Svc B</text>
  <text x="192" y="165" text-anchor="middle" font-size="8" fill="#475569">P99: 50ms</text>
  
  <rect x="230" y="125" width="55" height="30" rx="3" fill="#3b82f6"/>
  <text x="257" y="145" text-anchor="middle" font-size="9" fill="#ffffff">Svc C</text>
  <text x="257" y="165" text-anchor="middle" font-size="8" fill="#475569">P99: 50ms</text>
  
  <rect x="295" y="125" width="55" height="30" rx="3" fill="#3b82f6"/>
  <text x="322" y="145" text-anchor="middle" font-size="9" fill="#ffffff">Svc D</text>
  <text x="322" y="165" text-anchor="middle" font-size="8" fill="#475569">P99: 50ms</text>
  
  <rect x="360" y="125" width="55" height="30" rx="3" fill="#3b82f6"/>
  <text x="387" y="145" text-anchor="middle" font-size="9" fill="#ffffff">Svc E</text>
  <text x="387" y="165" text-anchor="middle" font-size="8" fill="#475569">P99: 50ms</text>
  
  <text x="275" y="195" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="bold">Total P99 ≠ 50ms, Total P99 ≈ 250ms+ (compounds!)</text>
  
  <!-- Solution techniques -->
  <rect x="520" y="60" width="430" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Optimization Techniques</text>
  
  <!-- Technique 1: Fastest wins -->
  <rect x="540" y="110" width="190" height="65" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Speculative Execution</text>
  <text x="635" y="155" text-anchor="middle" font-size="9" fill="#475569">Send to 2 replicas, use fastest</text>
  <text x="635" y="170" text-anchor="middle" font-size="9" fill="#475569">✓ Reduces tail latency</text>
  
  <!-- Technique 2: Load shedding -->
  <rect x="750" y="110" width="180" height="65" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Load Shedding</text>
  <text x="840" y="155" text-anchor="middle" font-size="9" fill="#475569">Reject low-priority requests</text>
  <text x="840" y="170" text-anchor="middle" font-size="9" fill="#475569">✓ Protects tail latency</text>
  
  <!-- Technique 3: Queuing -->
  <rect x="540" y="185" width="190" height="65" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Queue Prioritization</text>
  <text x="635" y="230" text-anchor="middle" font-size="9" fill="#475569">Critical requests first</text>
  <text x="635" y="245" text-anchor="middle" font-size="9" fill="#475569">✓ Reduces critical P99</text>
  
  <!-- Technique 4: Caching -->
  <rect x="750" y="185" width="180" height="65" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Aggressive Caching</text>
  <text x="840" y="230" text-anchor="middle" font-size="9" fill="#475569">Cache hot paths</text>
  <text x="840" y="245" text-anchor="middle" font-size="9" fill="#475569">✓ Eliminates tail for cached</text>
  
  <!-- Tail latency causes -->
  <rect x="50" y="275" width="900" height="215" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Common Causes of Tail Latency</text>
  
  <!-- Causes grid -->
  <rect x="70" y="320" width="260" height="75" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">GC Pauses</text>
  <text x="200" y="365" text-anchor="middle" font-size="9" fill="#475569">Long GC stops (100ms+)</text>
  <text x="200" y="382" text-anchor="middle" font-size="9" fill="#475569">Fix: Tuned GC, off-heap data</text>
  
  <rect x="350" y="320" width="260" height="75" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Resource Contention</text>
  <text x="480" y="365" text-anchor="middle" font-size="9" fill="#475569">Lock waits, thread starvation</text>
  <text x="480" y="382" text-anchor="middle" font-size="9" fill="#475569">Fix: Lock-free, bulkheads</text>
  
  <rect x="630" y="320" width="300" height="75" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="780" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Downstream Tail Latency</text>
  <text x="780" y="365" text-anchor="middle" font-size="9" fill="#475569">Slow dependencies cascade</text>
  <text x="780" y="382" text-anchor="middle" font-size="9" fill="#475569">Fix: Timeouts, circuit breakers</text>
  
  <rect x="70" y="410" width="260" height="70" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Network Issues</text>
  <text x="200" y="455" text-anchor="middle" font-size="9" fill="#475569">Packet loss, retransmits</text>
  <text x="200" y="472" text-anchor="middle" font-size="9" fill="#475569">Fix: Retry with backoff</text>
  
  <rect x="350" y="410" width="260" height="70" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Cold Starts</text>
  <text x="480" y="455" text-anchor="middle" font-size="9" fill="#475569">Lazy initialization, cache miss</text>
  <text x="480" y="472" text-anchor="middle" font-size="9" fill="#475569">Fix: Warm instances, prefetch</text>
  
  <rect x="630" y="410" width="300" height="70" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="780" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f172a">Queue Buildup</text>
  <text x="780" y="455" text-anchor="middle" font-size="9" fill="#475569">Requests waiting in queues</text>
  <text x="780" y="472" text-anchor="middle" font-size="9" fill="#475569">Fix: Load shedding, scaling</text>
</svg>
