<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Authentication Infrastructure Architecture</text>
  
  <!-- OAuth 2.0 / OIDC Flow -->
  <rect x="40" y="70" width="340" height="200" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">OAuth 2.0 / OIDC Flow</text>
  
  <rect x="55" y="115" width="310" height="35" rx="4" fill="#bbdefb"/>
  <text x="210" y="138" font-size="10" text-anchor="middle" fill="#1a1a1a">1. Client → Auth Server: authorization request + PKCE challenge</text>
  
  <rect x="55" y="155" width="310" height="35" rx="4" fill="#bbdefb"/>
  <text x="210" y="178" font-size="10" text-anchor="middle" fill="#1a1a1a">2. User authenticates + consents</text>
  
  <rect x="55" y="195" width="310" height="35" rx="4" fill="#bbdefb"/>
  <text x="210" y="218" font-size="10" text-anchor="middle" fill="#1a1a1a">3. Auth Server → Client: authorization code</text>
  
  <rect x="55" y="235" width="310" height="35" rx="4" fill="#bbdefb"/>
  <text x="210" y="258" font-size="10" text-anchor="middle" fill="#1a1a1a">4. Client → Auth Server: code + PKCE verifier → tokens</text>
  
  <!-- Token Types -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Types</text>
  
  <rect x="435" y="115" width="150" height="60" rx="4" fill="#a5d6a7"/>
  <text x="510" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Access Token</text>
  <text x="510" y="155" font-size="9" text-anchor="middle" fill="#666666">Short-lived (5-15 min)</text>
  <text x="510" y="172" font-size="9" text-anchor="middle" fill="#666666">Grants resource access</text>
  
  <rect x="605" y="115" width="140" height="60" rx="4" fill="#a5d6a7"/>
  <text x="675" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Refresh Token</text>
  <text x="675" y="155" font-size="9" text-anchor="middle" fill="#666666">Long-lived (days-weeks)</text>
  <text x="675" y="172" font-size="9" text-anchor="middle" fill="#666666">Obtains new access tokens</text>
  
  <rect x="435" y="185" width="150" height="60" rx="4" fill="#a5d6a7"/>
  <text x="510" y="205" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">ID Token (OIDC)</text>
  <text x="510" y="225" font-size="9" text-anchor="middle" fill="#666666">JWT with user claims</text>
  <text x="510" y="242" font-size="9" text-anchor="middle" fill="#666666">Proves user identity</text>
  
  <rect x="605" y="185" width="140" height="60" rx="4" fill="#a5d6a7"/>
  <text x="675" y="205" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Session Cookie</text>
  <text x="675" y="225" font-size="9" text-anchor="middle" fill="#666666">HttpOnly, Secure</text>
  <text x="675" y="242" font-size="9" text-anchor="middle" fill="#666666">SameSite=Strict</text>
  
  <!-- MFA Factors -->
  <rect x="40" y="300" width="720" height="130" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="330" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Multi-Factor Authentication (MFA) Hierarchy</text>
  
  <rect x="55" y="345" width="210" height="70" rx="6" fill="#c8e6c9"/>
  <text x="160" y="365" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Strongest: FIDO2/WebAuthn</text>
  <text x="160" y="385" font-size="9" text-anchor="middle" fill="#666666">Security keys, biometrics</text>
  <text x="160" y="400" font-size="9" text-anchor="middle" fill="#666666">Phishing-resistant</text>
  <text x="160" y="415" font-size="9" text-anchor="middle" fill="#666666">Recommended primary factor</text>
  
  <rect x="295" y="345" width="210" height="70" rx="6" fill="#fff3e0"/>
  <text x="400" y="365" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Medium: TOTP Apps</text>
  <text x="400" y="385" font-size="9" text-anchor="middle" fill="#666666">Google Authenticator, Authy</text>
  <text x="400" y="400" font-size="9" text-anchor="middle" fill="#666666">Offline capable</text>
  <text x="400" y="415" font-size="9" text-anchor="middle" fill="#666666">Phishing-vulnerable</text>
  
  <rect x="535" y="345" width="210" height="70" rx="6" fill="#ffebee"/>
  <text x="640" y="365" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Weakest: SMS/Voice</text>
  <text x="640" y="385" font-size="9" text-anchor="middle" fill="#666666">SIM swapping vulnerable</text>
  <text x="640" y="400" font-size="9" text-anchor="middle" fill="#666666">SS7 attacks possible</text>
  <text x="640" y="415" font-size="9" text-anchor="middle" fill="#666666">Fallback only, not primary</text>
  
  <!-- Token Validation Flow -->
  <rect x="40" y="460" width="720" height="120" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="490" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Validation Flow</text>
  
  <rect x="55" y="505" width="160" height="60" rx="6" fill="#e1bee7"/>
  <text x="135" y="525" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Verify Signature</text>
  <text x="135" y="545" font-size="9" text-anchor="middle" fill="#666666">JWT signature with IdP public key</text>
  
  <rect x="235" y="505" width="160" height="60" rx="6" fill="#e1bee7"/>
  <text x="315" y="525" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Check Expiration</text>
  <text x="315" y="545" font-size="9" text-anchor="middle" fill="#666666">exp claim must be in future</text>
  
  <rect x="415" y="505" width="160" height="60" rx="6" fill="#e1bee7"/>
  <text x="495" y="525" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Validate Audience</text>
  <text x="495" y="545" font-size="9" text-anchor="middle" fill="#666666">aud claim must match this API</text>
  
  <rect x="595" y="505" width="150" height="60" rx="6" fill="#e1bee7"/>
  <text x="670" y="525" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Verify Issuer</text>
  <text x="670" y="545" font-size="9" text-anchor="middle" fill="#666666">iss claim must be trusted IdP</text>
</svg>
