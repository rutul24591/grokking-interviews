<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="slaArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">SLI → SLO → SLA Hierarchy</text>
  
  <!-- SLI Box -->
  <rect x="50" y="70" width="280" height="180" rx="8" fill="var(--bg-blue, #3b82f6)" opacity="0.1" stroke="var(--border-blue, #3b82f6)" stroke-width="2"/>
  <text x="190" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--border-blue, #3b82f6)">SLI (Indicator)</text>
  <text x="190" y="130" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">What you measure</text>
  
  <rect x="70" y="145" width="240" height="35" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="190" y="167" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a)" font-weight="bold">Request Latency</text>
  
  <rect x="70" y="185" width="240" height="35" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="190" y="207" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a)" font-weight="bold">Error Rate</text>
  
  <rect x="70" y="225" width="240" height="35" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="190" y="247" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a)" font-weight="bold">Throughput (QPS)</text>
  
  <!-- SLO Box -->
  <rect x="360" y="70" width="280" height="180" rx="8" fill="var(--bg-purple, #8b5cf6)" opacity="0.1" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="500" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--border-purple, #8b5cf6)">SLO (Objective)</text>
  <text x="500" y="130" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">Target value for SLI</text>
  
  <rect x="380" y="145" width="240" height="35" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="500" y="167" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a)" font-weight="bold">P99 latency {'<'} 200ms</text>
  
  <rect x="380" y="185" width="240" height="35" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="500" y="207" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a)" font-weight="bold">Error rate {'<'} 0.1%</text>
  
  <rect x="380" y="225" width="240" height="35" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="500" y="247" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a)" font-weight="bold">Availability 99.99%</text>
  
  <!-- SLA Box -->
  <rect x="670" y="70" width="280" height="180" rx="8" fill="var(--bg-green, #22c55e)" opacity="0.1" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="810" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--border-green, #22c55e)">SLA (Agreement)</text>
  <text x="810" y="130" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">Contract with consequences</text>
  
  <rect x="690" y="145" width="240" height="35" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="810" y="167" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a)" font-weight="bold">99.99% uptime guarantee</text>
  
  <rect x="690" y="185" width="240" height="35" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="810" y="207" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a)" font-weight="bold">Credit if {'<'} 99.9%</text>
  
  <rect x="690" y="225" width="240" height="35" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="810" y="247" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a)" font-weight="bold">Penalty: 10% credit</text>
  
  <!-- Arrows between boxes -->
  <line x1="330" y1="160" x2="355" y2="160" stroke="var(--border-accent, #3b82f6)" stroke-width="3" marker-end="url(#slaArrow)"/>
  <line x1="640" y1="160" x2="665" y2="160" stroke="var(--border-accent, #3b82f6)" stroke-width="3" marker-end="url(#slaArrow)"/>
  
  <!-- Error Budget Section -->
  <rect x="50" y="270" width="900" height="130" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="295" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Error Budget Calculation</text>
  
  <!-- Formula -->
  <rect x="70" y="315" width="400" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="270" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Error Budget = 1 - SLO</text>
  <text x="270" y="365" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">Example: 99.9% SLO → 0.1% error budget</text>
  <text x="270" y="382" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">= ~43 minutes downtime/month allowed</text>
  
  <!-- Budget visualization -->
  <rect x="500" y="315" width="430" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  
  <!-- Budget bar -->
  <rect x="520" y="335" width="380" height="25" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.3"/>
  <rect x="520" y="335" width="342" height="25" rx="3" fill="var(--bg-green, #22c55e)"/>
  <rect x="862" y="335" width="38" height="25" rx="3" fill="var(--bg-red, #ef4444)"/>
  
  <text x="710" y="352" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff)" font-weight="bold">90% remaining</text>
  <text x="880" y="352" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff)" font-weight="bold">10% used</text>
  
  <text x="710" y="375" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Error Budget Remaining</text>
  
  <!-- Example SLIs -->
  <rect x="50" y="415" width="440" height="125" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="270" y="440" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Common SLI Examples</text>
  
  <text x="70" y="465" font-size="10" fill="var(--text-secondary, #475569)">• Availability: % of successful requests</text>
  <text x="70" y="485" font-size="10" fill="var(--text-secondary, #475569)">• Latency: P50, P95, P99 response time</text>
  <text x="70" y="505" font-size="10" fill="var(--text-secondary, #475569)">• Quality: % of non-defective responses</text>
  <text x="270" y="465" font-size="10" fill="var(--text-secondary, #475569)">• Freshness: Data age (for real-time systems)</text>
  <text x="270" y="485" font-size="10" fill="var(--text-secondary, #475569)">• Coverage: % of requests served (vs errors)</text>
  <text x="270" y="505" font-size="10" fill="var(--text-secondary, #475569)">• Throughput: Requests handled per second</text>
  
  <!-- SLO Types -->
  <rect x="510" y="415" width="440" height="125" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="730" y="440" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">SLO Target Types</text>
  
  <text x="530" y="465" font-size="10" fill="var(--text-secondary, #475569)">• Threshold: P99 latency {'<'} 200ms</text>
  <text x="530" y="485" font-size="10" fill="var(--text-secondary, #475569)">• Proportion: 99.9% requests successful</text>
  <text x="530" y="505" font-size="10" fill="var(--text-secondary, #475569)">• Rate: {'<'} 100 errors per minute</text>
  <text x="730" y="465" font-size="10" fill="var(--text-secondary, #475569)">• Percentile: 95% of requests {'<'} 100ms</text>
  <text x="730" y="485" font-size="10" fill="var(--text-secondary, #475569)">• Window: 99.9% over 30-day rolling</text>
  <text x="730" y="505" font-size="10" fill="var(--text-secondary, #475569)">• Burn rate: Budget consumed per hour</text>
</svg>
