<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Replication Patterns & Failover Strategies</text>
  
  <!-- Synchronous Replication -->
  <rect x="40" y="70" width="220" height="170" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="150" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Synchronous Replication</text>
  
  <rect x="55" y="115" width="80" height="50" rx="6" fill="#bbdefb"/>
  <text x="95" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Primary</text>
  <text x="95" y="155" font-size="9" text-anchor="middle" fill="#666666">Write here</text>
  
  <line x1="135" y1="140" x2="175" y2="140" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="155" y="132" font-size="8" text-anchor="middle" fill="#666666">sync</text>
  
  <rect x="175" y="115" width="80" height="50" rx="6" fill="#bbdefb"/>
  <text x="215" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Replica</text>
  <text x="215" y="155" font-size="9" text-anchor="middle" fill="#666666">Ack before</text>
  <text x="215" y="167" font-size="9" text-anchor="middle" fill="#666666">write ack</text>
  
  <text x="150" y="190" font-size="9" text-anchor="middle" fill="#666666">Zero data loss, higher latency</text>
  <text x="150" y="210" font-size="9" text-anchor="middle" fill="#666666">RPO=0, RTO=seconds</text>
  
  <text x="150" y="235" font-size="9" text-anchor="middle" fill="#4caf50">Use: Financial, Inventory</text>
  
  <!-- Asynchronous Replication -->
  <rect x="290" y="70" width="220" height="170" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Asynchronous Replication</text>
  
  <rect x="305" y="115" width="80" height="50" rx="6" fill="#a5d6a7"/>
  <text x="345" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Primary</text>
  <text x="345" y="155" font-size="9" text-anchor="middle" fill="#666666">Write here</text>
  
  <line x1="385" y1="140" x2="425" y2="140" stroke="#666666" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="405" y="132" font-size="8" text-anchor="middle" fill="#666666">async</text>
  
  <rect x="425" y="115" width="80" height="50" rx="6" fill="#a5d6a7"/>
  <text x="465" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Replica</text>
  <text x="465" y="155" font-size="9" text-anchor="middle" fill="#666666">Lagging behind</text>
  
  <text x="400" y="190" font-size="9" text-anchor="middle" fill="#666666">Lower latency, possible data loss</text>
  <text x="400" y="210" font-size="9" text-anchor="middle" fill="#666666">RPO=seconds, RTO=seconds</text>
  
  <text x="400" y="235" font-size="9" text-anchor="middle" fill="#4caf50">Use: Social media, Analytics</text>
  
  <!-- Multi-Primary Replication -->
  <rect x="540" y="70" width="220" height="170" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="650" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Multi-Primary Replication</text>
  
  <rect x="555" y="115" width="80" height="50" rx="6" fill="#ffe0b2"/>
  <text x="595" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Primary A</text>
  <text x="595" y="155" font-size="9" text-anchor="middle" fill="#666666">Accept writes</text>
  
  <line x1="635" y1="140" x2="665" y2="140" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="665" y1="150" x2="635" y2="150" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="665" y="115" width="80" height="50" rx="6" fill="#ffe0b2"/>
  <text x="705" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Primary B</text>
  <text x="705" y="155" font-size="9" text-anchor="middle" fill="#666666">Accept writes</text>
  
  <text x="650" y="190" font-size="9" text-anchor="middle" fill="#666666">Both accept writes, conflict risk</text>
  <text x="650" y="210" font-size="9" text-anchor="middle" fill="#666666">RPO≈0, RTO=seconds</text>
  
  <text x="650" y="235" font-size="9" text-anchor="middle" fill="#f57c00">Use: Global distribution</text>
  
  <!-- Failover Comparison -->
  <rect x="40" y="270" width="720" height="160" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="300" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Failover Strategy Comparison</text>
  
  <table>
  </table>
  
  <rect x="55" y="315" width="170" height="28" rx="4" fill="#e3f2fd"/>
  <text x="140" y="335" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Automatic Failover</text>
  
  <rect x="245" y="315" width="170" height="28" rx="4" fill="#c8e6c9"/>
  <text x="330" y="335" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Manual Failover</text>
  
  <rect x="435" y="315" width="170" height="28" rx="4" fill="#fff3e0"/>
  <text x="520" y="335" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Semi-Automatic</text>
  
  <rect x="55" y="348" width="170" height="28" rx="4" fill="#e3f2fd"/>
  <text x="140" y="368" font-size="10" text-anchor="middle" fill="#1a1a1a">RTO: 30s - 2min</text>
  
  <rect x="245" y="348" width="170" height="28" rx="4" fill="#c8e6c9"/>
  <text x="330" y="368" font-size="10" text-anchor="middle" fill="#1a1a1a">RTO: 15 - 60min</text>
  
  <rect x="435" y="348" width="170" height="28" rx="4" fill="#fff3e0"/>
  <text x="520" y="368" font-size="10" text-anchor="middle" fill="#1a1a1a">RTO: 2 - 10min</text>
  
  <rect x="55" y="381" width="170" height="28" rx="4" fill="#e3f2fd"/>
  <text x="140" y="401" font-size="10" text-anchor="middle" fill="#666666">Risk: Split-brain</text>
  
  <rect x="245" y="381" width="170" height="28" rx="4" fill="#c8e6c9"/>
  <text x="330" y="401" font-size="10" text-anchor="middle" fill="#666666">Risk: Human delay</text>
  
  <rect x="435" y="381" width="170" height="28" rx="4" fill="#fff3e0"/>
  <text x="520" y="401" font-size="10" text-anchor="middle" fill="#666666">Risk: Approval delay</text>
  
  <rect x="625" y="315" width="120" height="94" rx="6" fill="#ffebee"/>
  <text x="685" y="335" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Best For</text>
  <text x="685" y="355" font-size="9" text-anchor="middle" fill="#666666">Auto: Critical systems</text>
  <text x="685" y="373" font-size="9" text-anchor="middle" fill="#666666">Manual: Complex data</text>
  <text x="685" y="391" font-size="9" text-anchor="middle" fill="#666666">Semi: Most production</text>
  <text x="685" y="409" font-size="9" text-anchor="middle" fill="#666666">systems</text>
  
  <!-- RTO/RPO Trade-offs -->
  <rect x="40" y="460" width="720" height="120" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="490" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RTO/RPO Trade-Off Matrix</text>
  
  <rect x="55" y="505" width="165" height="60" rx="6" fill="#e1bee7"/>
  <text x="137" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Low RTO, Low RPO</text>
  <text x="137" y="545" font-size="9" text-anchor="middle" fill="#666666">Sync replication + auto</text>
  <text x="137" y="562" font-size="9" text-anchor="middle" fill="#666666">Expensive, complex</text>
  
  <rect x="240" y="505" width="165" height="60" rx="6" fill="#e1bee7"/>
  <text x="322" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Low RTO, High RPO</text>
  <text x="322" y="545" font-size="9" text-anchor="middle" fill="#666666">Async replication + auto</text>
  <text x="322" y="562" font-size="9" text-anchor="middle" fill="#666666">Possible data loss</text>
  
  <rect x="425" y="505" width="165" height="60" rx="6" fill="#e1bee7"/>
  <text x="507" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">High RTO, Low RPO</text>
  <text x="507" y="545" font-size="9" text-anchor="middle" fill="#666666">Sync replication + manual</text>
  <text x="507" y="562" font-size="9" text-anchor="middle" fill="#666666">Slow recovery</text>
  
  <rect x="610" y="505" width="135" height="60" rx="6" fill="#e1bee7"/>
  <text x="677" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">High RTO, High RPO</text>
  <text x="677" y="545" font-size="9" text-anchor="middle" fill="#666666">Backups + manual</text>
  <text x="677" y="562" font-size="9" text-anchor="middle" fill="#666666">Cheapest, riskiest</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
