<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <marker id="failArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
    <linearGradient id="failoverGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:var(--bg-red, #ef4444);stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:var(--bg-red, #ef4444);stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Failover Patterns & RTO/RPO</text>
  
  <!-- Failover Timeline -->
  <rect x="50" y="60" width="900" height="180" rx="8" fill="url(#failoverGrad)" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="500" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Failover Timeline</text>
  
  <!-- Timeline axis -->
  <line x1="100" y1="180" x2="900" y2="180" stroke="var(--border-accent, #3b82f6)" stroke-width="3" marker-end="url(#failArrow)"/>
  <text x="910" y="185" font-size="12" fill="var(--border-accent, #3b82f6)" font-weight="bold">Time →</text>
  
  <!-- Failure point -->
  <circle cx="200" cy="180" r="8" fill="var(--bg-red, #ef4444)"/>
  <line x1="200" y1="188" x2="200" y2="220" stroke="var(--border-red, #ef4444)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="200" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-red, #ef4444)">FAILURE</text>
  <text x="200" y="165" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">t=0</text>
  
  <!-- Detection time -->
  <rect x="220" y="155" width="100" height="50" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.3"/>
  <line x1="320" y1="180" x2="320" y2="220" stroke="var(--border-orange, #f97316)" stroke-width="2"/>
  <text x="270" y="145" text-anchor="middle" font-size="10" fill="var(--border-orange, #f97316)" font-weight="bold">Detection Time</text>
  <text x="270" y="240" text-anchor="middle" font-size="10" fill="var(--border-orange, #f97316)">~5-30 seconds</text>
  
  <!-- Failover time -->
  <rect x="330" y="155" width="150" height="50" rx="4" fill="var(--bg-accent, #3b82f6)" opacity="0.3"/>
  <line x1="480" y1="180" x2="480" y2="220" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="405" y="145" text-anchor="middle" font-size="10" fill="var(--border-accent, #3b82f6)" font-weight="bold">Failover Time</text>
  <text x="405" y="240" text-anchor="middle" font-size="10" fill="var(--border-accent, #3b82f6)">~10-60 seconds</text>
  
  <!-- Recovery complete -->
  <circle cx="480" cy="180" r="8" fill="var(--bg-green, #22c55e)"/>
  <line x1="480" y1="188" x2="480" y2="220" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="480" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-green, #22c55e)">RECOVERY</text>
  
  <!-- RTO bracket -->
  <path d="M 200 260 L 200 285 L 480 285 L 480 260" fill="none" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="340" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-purple, #8b5cf6)">RTO (Recovery Time Objective)</text>
  <text x="340" y="322" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Total downtime: Detection + Failover time</text>
  
  <!-- RPO illustration -->
  <rect x="600" y="120" width="300" height="100" rx="6" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="750" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">RPO (Recovery Point Objective)</text>
  
  <!-- Data timeline -->
  <line x1="620" y1="170" x2="880" y2="170" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  
  <!-- Last backup -->
  <rect x="640" y="155" width="60" height="30" rx="3" fill="var(--bg-blue, #3b82f6)"/>
  <text x="670" y="175" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Backup</text>
  
  <!-- Failure point -->
  <rect x="820" y="155" width="60" height="30" rx="3" fill="var(--bg-red, #ef4444)"/>
  <text x="850" y="175" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Failure</text>
  
  <!-- RPO zone -->
  <rect x="700" y="160" width="120" height="20" rx="2" fill="var(--bg-orange, #f97316)" opacity="0.5"/>
  <text x="760" y="175" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Data Loss Window</text>
  
  <text x="750" y="205" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">RPO = Max acceptable data loss</text>
  <text x="750" y="220" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Sync replication: RPO ≈ 0</text>
  <text x="750" y="235" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Async replication: RPO = replication lag</text>
  
  <!-- Failover Strategies -->
  <rect x="50" y="260" width="900" height="230" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="285" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Failover Strategies Comparison</text>
  
  <!-- DNS Failover -->
  <rect x="70" y="305" width="260" height="90" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="200" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">DNS Failover</text>
  <text x="200" y="355" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Update DNS to point to backup</text>
  <text x="200" y="375" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Simple, works for any service</text>
  <text x="200" y="390" text-anchor="middle" font-size="9" fill="#ef4444">✗ Slow (TTL dependent, minutes)</text>
  
  <!-- IP Failover -->
  <rect x="350" y="305" width="260" height="90" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="480" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">IP Failover (VIP)</text>
  <text x="480" y="355" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Move virtual IP to backup server</text>
  <text x="480" y="375" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Fast (seconds)</text>
  <text x="480" y="390" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Same network required</text>
  
  <!-- Connection Redirect -->
  <rect x="630" y="305" width="300" height="90" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="780" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Load Balancer Failover</text>
  <text x="780" y="355" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">LB stops sending to failed node</text>
  <text x="780" y="375" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Fastest (sub-second)</text>
  <text x="780" y="390" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Automatic with health checks</text>
  
  <!-- RTO/RPO Targets -->
  <rect x="70" y="410" width="400" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="270" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Typical RTO/RPO Targets by Tier</text>
  <text x="90" y="455" font-size="9" fill="var(--text-secondary, #475569)">Critical (payments): RTO {'<'} 1min, RPO = 0</text>
  <text x="90" y="472" font-size="9" fill="var(--text-secondary, #475569)">Standard (API): RTO {'<'} 5min, RPO {'<'} 1min</text>
  <text x="270" y="455" font-size="9" fill="var(--text-secondary, #475569)">Internal (admin): RTO {'<'} 30min, RPO {'<'} 1hr</text>
  <text x="270" y="472" font-size="9" fill="var(--text-secondary, #475569)">Analytics: RTO {'<'} 4hr, RPO {'<'} 24hr</text>
  
  <!-- Best Practices -->
  <rect x="500" y="410" width="430" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="715" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Failover Best Practices</text>
  <text x="520" y="455" font-size="9" fill="var(--text-secondary, #475569)">✓ Test failover regularly (chaos engineering)</text>
  <text x="520" y="472" font-size="9" fill="var(--text-secondary, #475569)">✓ Automate detection and failover</text>
  <text x="720" y="455" font-size="9" fill="var(--text-secondary, #475569)">✓ Monitor RTO/RPO compliance</text>
  <text x="720" y="472" font-size="9" fill="var(--text-secondary, #475569)">✓ Document rollback procedures</text>
</svg>
