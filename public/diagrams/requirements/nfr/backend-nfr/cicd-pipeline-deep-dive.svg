<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CI/CD Pipeline Deep Dive</text>
  
  <!-- Parallel Test Execution -->
  <rect x="40" y="70" width="720" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Parallel Test Execution</text>
  
  <rect x="55" y="115" width="340" height="100" rx="6" fill="#bbdefb"/>
  <text x="225" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Sequential (Slow)</text>
  <rect x="70" y="145" width="310" height="15" rx="3" fill="#90caf9"/>
  <rect x="70" y="165" width="310" height="15" rx="3" fill="#90caf9"/>
  <rect x="70" y="185" width="310" height="15" rx="3" fill="#90caf9"/>
  <text x="390" y="156" font-size="8" text-anchor="end" fill="#1a1a1a">Unit (5m)</text>
  <text x="390" y="176" font-size="8" text-anchor="end" fill="#1a1a1a">Integration (10m)</text>
  <text x="390" y="196" font-size="8" text-anchor="end" fill="#1a1a1a">Security (8m)</text>
  <text x="225" y="225" font-size="9" text-anchor="middle" fill="#666666">Total: 23 minutes</text>
  
  <rect x="415" y="115" width="330" height="100" rx="6" fill="#c8e6c9"/>
  <text x="580" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Parallel (Fast)</text>
  <rect x="430" y="145" width="100" height="15" rx="3" fill="#a5d6a7"/>
  <rect x="430" y="165" width="160" height="15" rx="3" fill="#a5d6a7"/>
  <rect x="430" y="185" width="130" height="15" rx="3" fill="#a5d6a7"/>
  <text x="540" y="156" font-size="8" text-anchor="end" fill="#1a1a1a">Unit (5m)</text>
  <text x="600" y="176" font-size="8" text-anchor="end" fill="#1a1a1a">Integration (10m)</text>
  <text x="570" y="196" font-size="8" text-anchor="end" fill="#1a1a1a">Security (8m)</text>
  <text x="580" y="225" font-size="9" text-anchor="middle" fill="#666666">Total: 10 minutes (longest stage)</text>
  
  <!-- Artifact Management -->
  <rect x="40" y="260" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Artifact Management</text>
  
  <rect x="55" y="305" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="325" font-size="10" text-anchor="middle" fill="#1a1a1a">Build once → same artifact to all environments</text>
  
  <rect x="55" y="340" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="360" font-size="10" text-anchor="middle" fill="#1a1a1a">Version artifacts with git commit SHA</text>
  
  <rect x="55" y="375" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="395" font-size="10" text-anchor="middle" fill="#1a1a1a">Store in artifact registry (ECR, Nexus)</text>
  
  <rect x="55" y="410" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="430" font-size="10" text-anchor="middle" fill="#1a1a1a">Sign artifacts for integrity verification</text>
  
  <!-- Deployment Orchestration -->
  <rect x="420" y="260" width="340" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Deployment Orchestration</text>
  
  <rect x="435" y="305" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="325" font-size="10" text-anchor="middle" fill="#1a1a1a">Infrastructure-as-Code (Terraform, CloudFormation)</text>
  
  <rect x="435" y="340" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="360" font-size="10" text-anchor="middle" fill="#1a1a1a">Configuration injected at deploy time (env vars)</text>
  
  <rect x="435" y="375" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="395" font-size="10" text-anchor="middle" fill="#1a1a1a">Database migrations run before app deployment</text>
  
  <rect x="435" y="410" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="430" font-size="10" text-anchor="middle" fill="#1a1a1a">Health checks verify deployment success</text>
  
  <!-- Pipeline Metrics -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pipeline Performance Metrics</text>
  
  <rect x="55" y="515" width="160" height="50" rx="6" fill="#e1bee7"/>
  <text x="135" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Build Time</text>
  <text x="135" y="555" font-size="10" text-anchor="middle" fill="#666666">Target: &lt; 5 minutes</text>
  
  <rect x="245" y="515" width="160" height="50" rx="6" fill="#e1bee7"/>
  <text x="325" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Test Time</text>
  <text x="325" y="555" font-size="10" text-anchor="middle" fill="#666666">Target: &lt; 15 minutes</text>
  
  <rect x="435" y="515" width="160" height="50" rx="6" fill="#e1bee7"/>
  <text x="515" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Deploy Time</text>
  <text x="515" y="555" font-size="10" text-anchor="middle" fill="#666666">Target: &lt; 10 minutes</text>
  
  <rect x="625" y="515" width="120" height="50" rx="6" fill="#e1bee7"/>
  <text x="685" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Total</text>
  <text x="685" y="555" font-size="10" text-anchor="middle" fill="#666666">Target: &lt; 30 minutes</text>
</svg>
