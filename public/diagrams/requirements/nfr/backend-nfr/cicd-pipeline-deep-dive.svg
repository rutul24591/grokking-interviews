<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="cicdArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">CI/CD Pipeline Deep Dive</text>
  
  <!-- Pipeline Stages -->
  <rect x="50" y="60" width="450" height="280" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">CI/CD Pipeline Stages</text>
  
  <!-- Commit stage -->
  <rect x="70" y="110" width="100" height="60" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="120" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">1. Commit</text>
  <text x="120" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Code review</text>
  <text x="120" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Static analysis</text>
  
  <line x1="170" y1="140" x2="200" y2="140" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#cicdArrow)"/>
  
  <!-- Build stage -->
  <rect x="200" y="110" width="100" height="60" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="250" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">2. Build</text>
  <text x="250" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Compile</text>
  <text x="250" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Package</text>
  
  <line x1="300" y1="140" x2="330" y2="140" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#cicdArrow)"/>
  
  <!-- Test stage -->
  <rect x="330" y="110" width="100" height="60" rx="4" fill="var(--bg-orange, #f97316)"/>
  <text x="380" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">3. Test</text>
  <text x="380" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Unit tests</text>
  <text x="380" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Integration</text>
  
  <line x1="250" y1="170" x2="250" y2="200" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#cicdArrow)"/>
  
  <!-- Deploy staging -->
  <rect x="200" y="200" width="100" height="60" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="250" y="225" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">4. Staging</text>
  <text x="250" y="245" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Deploy</text>
  <text x="250" y="258" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Smoke tests</text>
  
  <line x1="300" y1="230" x2="330" y2="230" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#cicdArrow)"/>
  
  <!-- Deploy production -->
  <rect x="330" y="200" width="100" height="60" rx="4" fill="var(--bg-red, #ef4444)"/>
  <text x="380" y="225" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">5. Production</text>
  <text x="380" y="245" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Canary/Blue-Green</text>
  <text x="380" y="258" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Health checks</text>
  
  <!-- Deployment Strategies -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Deployment Strategies</text>
  
  <rect x="540" y="110" width="190" height="70" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Rolling Update</text>
  <text x="635" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Gradual replacement</text>
  <text x="635" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Zero downtime</text>
  
  <rect x="540" y="190" width="190" height="70" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="635" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Blue-Green</text>
  <text x="635" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Two environments</text>
  <text x="635" y="252" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Instant switch</text>
  
  <rect x="750" y="110" width="180" height="70" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Canary</text>
  <text x="840" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Small % first</text>
  <text x="840" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Gradual expansion</text>
  
  <rect x="750" y="190" width="180" height="70" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="840" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Feature Flags</text>
  <text x="840" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Deploy hidden</text>
  <text x="840" y="252" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Enable gradually</text>
  
  <!-- Rollback Mechanisms -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Rollback Mechanisms</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Automated Rollback</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">On health check failure</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Database Migration Rollback</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Down migrations</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Feature Flag Kill Switch</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Instant disable</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Previous Version Artifacts</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Keep N versions</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Automate pipeline. Use safe deployment strategies. Always have rollback plan.</text>
</svg>
