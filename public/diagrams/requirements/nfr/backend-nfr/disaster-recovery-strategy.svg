<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Disaster Recovery Strategy</text>
  
  <!-- RTO/RPO Objectives -->
  <rect x="40" y="70" width="720" height="120" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RTO and RPO Objectives</text>
  
  <rect x="55" y="115" width="340" height="60" rx="6" fill="#bbdefb"/>
  <text x="225" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RTO (Recovery Time Objective)</text>
  <text x="225" y="155" font-size="10" text-anchor="middle" fill="#666666">Maximum acceptable downtime before service is restored</text>
  <text x="225" y="173" font-size="10" text-anchor="middle" fill="#666666">Example: RTO = 4 hours → system must be restored within 4 hours</text>
  
  <rect x="415" y="115" width="330" height="60" rx="6" fill="#bbdefb"/>
  <text x="580" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RPO (Recovery Point Objective)</text>
  <text x="580" y="155" font-size="10" text-anchor="middle" fill="#666666">Maximum acceptable data loss measured as time since last backup</text>
  <text x="580" y="173" font-size="10" text-anchor="middle" fill="#666666">Example: RPO = 1 hour → system can lose at most 1 hour of data</text>
  
  <!-- DR Strategies -->
  <rect x="40" y="220" width="720" height="200" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="250" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Disaster Recovery Strategies</text>
  
  <rect x="55" y="265" width="160" height="140" rx="6" fill="#a5d6a7"/>
  <text x="135" y="285" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Backup + Restore</text>
  <text x="135" y="305" font-size="9" text-anchor="middle" fill="#666666">Periodic backups</text>
  <text x="135" y="320" font-size="9" text-anchor="middle" fill="#666666">RTO: Hours-days</text>
  <text x="135" y="335" font-size="9" text-anchor="middle" fill="#666666">RPO: Hours (last backup)</text>
  <text x="135" y="350" font-size="9" text-anchor="middle" fill="#666666">Cost: Low (storage only)</text>
  <text x="135" y="365" font-size="9" text-anchor="middle" fill="#666666">Best for: Non-critical systems</text>
  <text x="135" y="380" font-size="9" text-anchor="middle" fill="#666666">Archiving, analytics</text>
  
  <rect x="235" y="265" width="160" height="140" rx="6" fill="#a5d6a7"/>
  <text x="315" y="285" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pilot Light</text>
  <text x="315" y="305" font-size="9" text-anchor="middle" fill="#666666">Minimal DR site</text>
  <text x="315" y="320" font-size="9" text-anchor="middle" fill="#666666">RTO: Minutes-hours</text>
  <text x="315" y="335" font-size="9" text-anchor="middle" fill="#666666">RPO: Minutes (replication)</text>
  <text x="315" y="350" font-size="9" text-anchor="middle" fill="#666666">Cost: Medium</text>
  <text x="315" y="365" font-size="9" text-anchor="middle" fill="#666666">Best for: Important systems</text>
  <text x="315" y="380" font-size="9" text-anchor="middle" fill="#666666">Databases, core services</text>
  
  <rect x="415" y="265" width="160" height="140" rx="6" fill="#a5d6a7"/>
  <text x="495" y="285" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Warm Standby</text>
  <text x="495" y="305" font-size="9" text-anchor="middle" fill="#1a1a1a">Scaled-down DR site</text>
  <text x="495" y="320" font-size="9" text-anchor="middle" fill="#666666">RTO: Minutes</text>
  <text x="495" y="335" font-size="9" text-anchor="middle" fill="#666666">RPO: Seconds (near-sync)</text>
  <text x="495" y="350" font-size="9" text-anchor="middle" fill="#666666">Cost: High</text>
  <text x="495" y="365" font-size="9" text-anchor="middle" fill="#666666">Best for: Critical systems</text>
  <text x="495" y="380" font-size="9" text-anchor="middle" fill="#666666">User-facing services</text>
  
  <rect x="595" y="265" width="150" height="140" rx="6" fill="#a5d6a7"/>
  <text x="670" y="285" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Active-Active</text>
  <text x="670" y="305" font-size="9" text-anchor="middle" fill="#666666">Full DR site</text>
  <text x="670" y="320" font-size="9" text-anchor="middle" fill="#666666">RTO: Seconds</text>
  <text x="670" y="335" font-size="9" text-anchor="middle" fill="#666666">RPO: Zero (sync)</text>
  <text x="670" y="350" font-size="9" text-anchor="middle" fill="#666666">Cost: Very high (2x)</text>
  <text x="670" y="365" font-size="9" text-anchor="middle" fill="#666666">Best for: Mission-critical</text>
  <text x="670" y="380" font-size="9" text-anchor="middle" fill="#666666">Payments, auth</text>
  
  <!-- Failover Process -->
  <rect x="40" y="450" width="720" height="130" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="480" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">DR Failover Process</text>
  
  <rect x="55" y="495" width="140" height="70" rx="6" fill="#ffe0b2"/>
  <text x="125" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Detect Disaster</text>
  <text x="125" y="535" font-size="9" text-anchor="middle" fill="#666666">Health checks fail</text>
  <text x="125" y="550" font-size="9" text-anchor="middle" fill="#666666">Alert triggered</text>
  <text x="125" y="565" font-size="9" text-anchor="middle" fill="#666666">Incident declared</text>
  
  <rect x="215" y="495" width="140" height="70" rx="6" fill="#ffe0b2"/>
  <text x="285" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Activate DR</text>
  <text x="285" y="535" font-size="9" text-anchor="middle" fill="#666666">Promote DR to primary</text>
  <text x="285" y="550" font-size="9" text-anchor="middle" fill="#666666">Scale up resources</text>
  <text x="285" y="565" font-size="9" text-anchor="middle" fill="#666666">Verify data consistency</text>
  
  <rect x="375" y="495" width="140" height="70" rx="6" fill="#ffe0b2"/>
  <text x="445" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Redirect Traffic</text>
  <text x="445" y="535" font-size="9" text-anchor="middle" fill="#666666">Update DNS records</text>
  <text x="445" y="550" font-size="9" text-anchor="middle" fill="#666666">Update load balancers</text>
  <text x="445" y="565" font-size="9" text-anchor="middle" fill="#666666">Verify routing</text>
  
  <rect x="535" y="495" width="140" height="70" rx="6" fill="#ffe0b2"/>
  <text x="605" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Validate</text>
  <text x="605" y="535" font-size="9" text-anchor="middle" fill="#666666">Health checks pass</text>
  <text x="605" y="550" font-size="9" text-anchor="middle" fill="#666666">Data integrity verified</text>
  <text x="605" y="565" font-size="9" text-anchor="middle" fill="#666666">Service operational</text>
</svg>
