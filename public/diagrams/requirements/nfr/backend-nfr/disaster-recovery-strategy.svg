<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="drArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Disaster Recovery Strategies</text>
  
  <!-- RTO/RPO Quadrant -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">RTO vs RPO Matrix</text>
  
  <!-- Axes -->
  <line x1="100" y1="250" x2="450" y2="250" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <line x1="100" y1="120" x2="100" y2="250" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  
  <text x="275" y="275" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569">Recovery Time Objective (RTO) →</text>
  <text x="60" y="185" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569" transform="rotate(-90, 60, 185)">Recovery Point Objective (RPO) →</text>
  
  <!-- Quadrants -->
  <rect x="100" y="120" width="175" height="65" rx="4" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="187" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-red, #ef4444)">Low RTO, Low RPO</text>
  <text x="187" y="168" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Active-Active</text>
  <text x="187" y="180" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Most expensive</text>
  
  <rect x="275" y="120" width="175" height="65" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="362" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-orange, #f97316)">High RTO, Low RPO</text>
  <text x="362" y="168" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Warm Standby</text>
  <text x="362" y="180" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Sync replication</text>
  
  <rect x="100" y="185" width="175" height="65" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="187" y="215" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-blue, #3b82f6)">Low RTO, High RPO</text>
  <text x="187" y="233" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Pilot Light</text>
  <text x="187" y="245" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Fast recovery</text>
  
  <rect x="275" y="185" width="175" height="65" rx="4" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="362" y="215" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-green, #22c55e)">High RTO, High RPO</text>
  <text x="362" y="233" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Backup/Restore</text>
  <text x="362" y="245" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Least expensive</text>
  
  <!-- DR Strategies -->
  <rect x="520" y="60" width="430" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">DR Strategy Comparison</text>
  
  <rect x="540" y="110" width="190" height="75" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a">Backup &amp; Restore</text>
  <text x="635" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">RTO: Hours-Days</text>
  <text x="635" y="172" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">RPO: Hours</text>
  <text x="635" y="187" text-anchor="middle" font-size="9" fill="#22c55e" font-weight="bold">$ Lowest Cost</text>
  
  <rect x="750" y="110" width="180" height="75" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a">Pilot Light</text>
  <text x="840" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">RTO: Minutes</text>
  <text x="840" y="172" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">RPO: Minutes</text>
  <text x="840" y="187" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="bold">$$ Medium Cost</text>
  
  <rect x="540" y="195" width="190" height="75" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a">Warm Standby</text>
  <text x="635" y="239" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">RTO: Minutes</text>
  <text x="635" y="256" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">RPO: Seconds</text>
  <text x="635" y="271" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="bold">$$$ High Cost</text>
  
  <rect x="750" y="195" width="180" height="75" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="219" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a">Active-Active</text>
  <text x="840" y="239" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">RTO: Near-zero</text>
  <text x="840" y="256" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">RPO: Zero</text>
  <text x="840" y="271" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="bold">$$$$ Highest Cost</text>
  
  <!-- DR Testing -->
  <rect x="50" y="300" width="450" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">DR Testing Types</text>
  
  <text x="70" y="355" font-size="10" fill="var(--text-secondary, #47556ird">• Tabletop Exercise: Walk through scenarios</text>
  <text x="70" y="375" font-size="10" fill="var(--text-secondary, #47556ird">• Simulated Failover: Test in staging</text>
  <text x="70" y="395" font-size="10" fill="var(--text-secondary, #47556ird">• Partial Failover: Test specific components</text>
  <text x="70" y="415" font-size="10" fill="var(--text-secondary, #47556ird">• Full DR Drill: Complete failover (annually)</text>
  
  <!-- Key Considerations -->
  <rect x="520" y="300" width="430" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Key DR Considerations</text>
  
  <text x="540" y="355" font-size="10" fill="var(--text-secondary, #47556ird">• Data replication strategy (sync vs async)</text>
  <text x="540" y="375" font-size="10" fill="var(--text-secondary, #47556ird">• DNS failover configuration</text>
  <text x="540" y="395" font-size="10" fill="var(--text-secondary, #47556ird">• State synchronization during failover</text>
  <text x="540" y="415" font-size="10" fill="var(--text-secondary, #47556ird">• Failback procedures (return to normal)</text>
  
  <text x="500" y="465" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Choose DR strategy based on business RTO/RPO requirements and budget constraints.</text>
</svg>
