<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <marker id="cbArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <linearGradient id="closedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="openGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="halfGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Circuit Breaker Pattern</text>
  
  <!-- State Diagram -->
  <rect x="50" y="60" width="900" height="280" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Circuit Breaker State Machine</text>
  
  <!-- CLOSED state -->
  <rect x="100" y="120" width="200" height="100" rx="8" fill="url(#closedGrad)" stroke="#22c55e" stroke-width="3"/>
  <text x="200" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">CLOSED</text>
  <text x="200" y="185" text-anchor="middle" font-size="10" fill="#475569">Normal Operation</text>
  <text x="200" y="205" text-anchor="middle" font-size="9" fill="#475569">✓ Requests flow through</text>
  
  <!-- OPEN state -->
  <rect x="700" y="120" width="200" height="100" rx="8" fill="url(#openGrad)" stroke="#ef4444" stroke-width="3"/>
  <text x="800" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">OPEN</text>
  <text x="800" y="185" text-anchor="middle" font-size="10" fill="#475569">Failure Detected</text>
  <text x="800" y="205" text-anchor="middle" font-size="9" fill="#475569">✗ Requests blocked</text>
  
  <!-- HALF-OPEN state -->
  <rect x="400" y="320" width="200" height="100" rx="8" fill="url(#halfGrad)" stroke="#f97316" stroke-width="3"/>
  <text x="500" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">HALF-OPEN</text>
  <text x="500" y="385" text-anchor="middle" font-size="10" fill="#475569">Testing Recovery</text>
  <text x="500" y="405" text-anchor="middle" font-size="9" fill="#475569">⚠ Limited requests</text>
  
  <!-- Transition: CLOSED → OPEN -->
  <path d="M 300 150 Q 500 100 700 150" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#cbArrow)"/>
  <text x="500" y="125" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444">Failure threshold exceeded</text>
  
  <!-- Transition: OPEN → HALF-OPEN -->
  <line x1="750" y1="220" x2="550" y2="320" stroke="#f97316" stroke-width="3" marker-end="url(#cbArrow)"/>
  <text x="680" y="280" text-anchor="middle" font-size="10" font-weight="bold" fill="#f97316">Sleep timeout expires</text>
  
  <!-- Transition: HALF-OPEN → CLOSED -->
  <path d="M 450 320 Q 350 250 250 220" fill="none" stroke="#22c55e" stroke-width="3" marker-end="url(#cbArrow)"/>
  <text x="350" y="280" text-anchor="middle" font-size="10" font-weight="bold" fill="#22c55e">Success count reached</text>
  
  <!-- Transition: HALF-OPEN → OPEN -->
  <path d="M 550 370 Q 650 300 750 220" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#cbArrow)"/>
  <text x="650" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444">Failure in half-open</text>
  
  <!-- Metrics boxes -->
  <rect x="100" y="450" width="250" height="130" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="225" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Failure Detection</text>
  
  <text x="120" y="500" font-size="10" fill="#475569">Failure threshold:</text>
  <text x="225" y="518" font-size="10" fill="#0f172a" font-weight="bold">5 failures in 10 seconds</text>
  
  <text x="120" y="545" font-size="10" fill="#475569">Failure types:</text>
  <text x="225" y="563" font-size="10" fill="#475569">Timeouts, 5xx errors, exceptions</text>
  
  <!-- Recovery settings -->
  <rect x="375" y="450" width="250" height="130" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Recovery Settings</text>
  
  <text x="395" y="500" font-size="10" fill="#475569">Sleep timeout:</text>
  <text x="500" y="518" font-size="10" fill="#0f172a" font-weight="bold">30 seconds</text>
  
  <text x="395" y="545" font-size="10" fill="#475569">Success threshold:</text>
  <text x="500" y="563" font-size="10" fill="#0f172a" font-weight="bold">3 consecutive successes</text>
  
  <!-- Fallback -->
  <rect x="650" y="450" width="300" height="130" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="800" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Fallback Strategies</text>
  
  <text x="670" y="500" font-size="10" fill="#475569">When circuit is OPEN:</text>
  <text x="670" y="520" font-size="9" fill="#475569">• Return cached/stale data</text>
  <text x="670" y="538" font-size="9" fill="#475569">• Return default response</text>
  <text x="820" y="520" font-size="9" fill="#475569">• Queue request for later</text>
  <text x="820" y="538" font-size="9" fill="#475569">• Fail gracefully with error</text>
</svg>
