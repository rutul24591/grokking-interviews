<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="trafficMgmtArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Traffic Management &amp; Load Shedding</text>
  
  <!-- Load Shedding Strategies -->
  <rect x="50" y="60" width="450" height="250" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Load Shedding Strategies</text>
  
  <!-- Random shedding -->
  <rect x="70" y="110" width="180" height="70" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="2"/>
  <text x="160" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Random Shedding</text>
  <text x="160" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Drop random requests</text>
  <text x="160" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Simple, fair</text>
  
  <!-- Priority-based -->
  <rect x="270" y="110" width="180" height="70" rx="4" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="360" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Priority-Based</text>
  <text x="360" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Drop low-priority first</text>
  <text x="360" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Protect critical paths</text>
  
  <!-- Client-based -->
  <rect x="70" y="195" width="180" height="70" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="2"/>
  <text x="160" y="220" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Client-Based</text>
  <text x="160" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Limit per client/API key</text>
  <text x="160" y="257" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Prevent single client overload</text>
  
  <!-- Graceful degradation -->
  <rect x="270" y="195" width="180" height="70" rx="4" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="360" y="220" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Graceful Degradation</text>
  <text x="360" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Disable non-critical features</text>
  <text x="360" y="257" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Maintain core functionality</text>
  
  <!-- Priority tiers visualization -->
  <rect x="70" y="280" width="380" height="25" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.3"/>
  <text x="260" y="297" text-anchor="middle" font-size="8" fill="var(--text-primary, #0f172a">Critical (Never shed): Payments, Auth</text>
  
  <rect x="70" y="305" width="380" height="25" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.3"/>
  <text x="260" y="322" text-anchor="middle" font-size="8" fill="var(--text-primary, #0f172a">High (Shed at 95%): Core features</text>
  
  <rect x="70" y="330" width="380" height="25" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.3"/>
  <text x="260" y="347" text-anchor="middle" font-size="8" fill="var(--text-primary, #0f172a">Medium (Shed at 85%): Recommendations</text>
  
  <rect x="70" y="355" width="380" height="25" rx="3" fill="var(--bg-red, #ef4444)" opacity="0.3"/>
  <text x="260" y="372" text-anchor="middle" font-size="8" fill="var(--text-primary, #0f172a">Low (Shed at 75%): Analytics, Logging</text>
  
  <!-- Overload Detection -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Overload Detection Signals</text>
  
  <rect x="540" y="110" width="190" height="70" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Queue Depth</text>
  <text x="635" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Growing queues</text>
  <text x="635" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Early warning signal</text>
  
  <rect x="540" y="190" width="190" height="70" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="635" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Latency Spikes</text>
  <text x="635" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">P99 latency increase</text>
  <text x="635" y="252" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">System under stress</text>
  
  <rect x="750" y="110" width="180" height="70" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Error Rates</text>
  <text x="840" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Timeout, 5xx errors</text>
  <text x="840" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">System failing</text>
  
  <rect x="750" y="190" width="180" height="70" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="840" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Resource Usage</text>
  <text x="840" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">CPU, memory, connections</text>
  <text x="840" y="252" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Resource exhaustion</text>
  
  <!-- Circuit Breaker Integration -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Circuit Breaker + Load Shedding</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Circuit Breaker</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Protect downstream</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Load Shedding</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Protect self</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Rate Limiting</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Prevent overload</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Backpressure</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Propagate upstream</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Shed load before system collapses. Use priority-based shedding. Combine with circuit breakers.</text>
</svg>
