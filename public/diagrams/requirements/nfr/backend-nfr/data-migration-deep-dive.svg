<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="dataMigDeepArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Data Migration Deep Dive</text>
  
  <!-- Migration Patterns -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Zero-Downtime Migration Patterns</text>
  
  <!-- Expand-Contract -->
  <rect x="70" y="110" width="180" height="70" rx="4" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="160" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Expand-Contract</text>
  <text x="160" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Add new, migrate, remove old</text>
  <text x="160" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">✓ Safest, most common</text>
  
  <!-- Dual Write -->
  <rect x="270" y="110" width="180" height="70" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="2"/>
  <text x="360" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Dual Write</text>
  <text x="360" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Write to both simultaneously</text>
  <text x="360" y="172" text-anchor="middle" font-size="7" fill="#f59e0b">⚠ Risk of inconsistency</text>
  
  <!-- Shadow Read -->
  <rect x="70" y="195" width="180" height="70" rx="4" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="160" y="220" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Shadow Read</text>
  <text x="160" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Read from both, compare</text>
  <text x="160" y="257" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">✓ Validate correctness</text>
  
  <!-- Strangler Fig -->
  <rect x="270" y="195" width="180" height="70" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="2"/>
  <text x="360" y="220" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Strangler Fig</text>
  <text x="360" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Gradual replacement</text>
  <text x="360" y="257" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">✓ Low risk, slow</text>
  
  <!-- Backfill Strategies -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Backfill Strategies</text>
  
  <rect x="540" y="110" width="190" height="70" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Batch Backfill</text>
  <text x="635" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Process in chunks (1000 rows)</text>
  <text x="635" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">✓ Control load, resumable</text>
  
  <rect x="540" y="190" width="190" height="70" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="635" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Trigger-Based</text>
  <text x="635" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Backfill on first access</text>
  <text x="635" y="252" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">✓ Lazy, no bulk operation</text>
  
  <rect x="750" y="110" width="180" height="70" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Parallel Backfill</text>
  <text x="840" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Multiple workers</text>
  <text x="840" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">✓ Fast, complex</text>
  
  <rect x="750" y="190" width="180" height="70" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="840" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">CDC-Based</text>
  <text x="840" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Capture data changes</text>
  <text x="840" y="252" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">✓ Real-time, accurate</text>
  
  <!-- Migration Checklist -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Migration Best Practices</text>
  
  <text x="540" y="275" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="275" font-size="8" fill="var(--text-secondary, #47556ird">Test on production-sized dataset</text>
  
  <text x="540" y="295" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="295" font-size="8" fill="var(--text-secondary, #47556ird">Implement rollback procedure</text>
  
  <text x="540" y="315" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="315" font-size="8" fill="var(--text-secondary, #47556ird">Monitor replication lag during backfill</text>
  
  <text x="540" y="335" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="335" font-size="8" fill="var(--text-secondary, #47556ird">Use feature flags for gradual rollout</text>
  
  <text x="750" y="275" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="765" y="275" font-size="8" fill="var(--text-secondary, #47556ird">Batch backfill to avoid table locks</text>
  
  <text x="750" y="295" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="765" y="295" font-size="8" fill="var(--text-secondary, #47556ird">Verify data consistency before cutover</text>
  
  <text x="750" y="315" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="765" y="315" font-size="8" fill="var(--text-secondary, #47556ird">Plan maintenance window (even if zero-downtime)</text>
  
  <text x="750" y="335" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="765" y="335" font-size="8" fill="var(--text-secondary, #47556ird">Communicate with stakeholders</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Use Expand-Contract pattern. Batch backfill. Test thoroughly. Have rollback plan.</text>
</svg>
