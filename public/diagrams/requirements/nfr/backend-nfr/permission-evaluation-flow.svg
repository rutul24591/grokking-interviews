<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Permission Evaluation Flow</text>
  
  <!-- Request Flow -->
  <rect x="40" y="70" width="720" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Authorization Request Flow</text>
  
  <rect x="55" y="115" width="120" height="50" rx="6" fill="#bbdefb"/>
  <text x="115" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Client Request</text>
  <text x="115" y="153" font-size="9" text-anchor="middle" fill="#666666">GET /api/docs/123</text>
  
  <line x1="175" y1="140" x2="215" y2="140" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="215" y="115" width="120" height="50" rx="6" fill="#bbdefb"/>
  <text x="275" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">AuthN Middleware</text>
  <text x="275" y="153" font-size="9" text-anchor="middle" fill="#666666">Validate token → user:alice</text>
  
  <line x1="335" y1="140" x2="375" y2="140" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="375" y="115" width="120" height="50" rx="6" fill="#bbdefb"/>
  <text x="435" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">AuthZ Middleware</text>
  <text x="435" y="153" font-size="9" text-anchor="middle" fill="#666666">Check permissions</text>
  
  <line x1="495" y1="140" x2="535" y2="140" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="535" y="115" width="120" height="50" rx="6" fill="#bbdefb"/>
  <text x="595" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Policy Engine</text>
  <text x="595" y="153" font-size="9" text-anchor="middle" fill="#666666">Evaluate policies</text>
  
  <line x1="655" y1="140" x2="695" y2="140" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="695" y="115" width="55" height="50" rx="6" fill="#c8e6c9"/>
  <text x="722" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Allow</text>
  <text x="722" y="153" font-size="9" text-anchor="middle" fill="#666666">or</text>
  <text x="722" y="168" font-size="10" font-weight="bold" text-anchor="middle" fill="#d84315">Deny</text>
  
  <!-- Policy Evaluation Detail -->
  <rect x="40" y="260" width="720" height="200" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="290" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Policy Evaluation Detail</text>
  
  <rect x="55" y="305" width="340" height="140" rx="6" fill="#a5d6a7"/>
  <text x="225" y="325" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Input Context</text>
  <text x="225" y="345" font-size="10" text-anchor="middle" fill="#1a1a1a">Subject: user:alice (role: editor, dept: engineering)</text>
  <text x="225" y="365" font-size="10" text-anchor="middle" fill="#1a1a1a">Resource: doc:123 (owner: alice, classification: internal)</text>
  <text x="225" y="385" font-size="10" text-anchor="middle" fill="#1a1a1a">Action: read</text>
  <text x="225" y="405" font-size="10" text-anchor="middle" fill="#1a1a1a">Environment: business hours, corporate network</text>
  
  <rect x="415" y="305" width="330" height="140" rx="6" fill="#a5d6a7"/>
  <text x="580" y="325" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Policy Evaluation</text>
  <text x="580" y="345" font-size="10" text-anchor="middle" fill="#1a1a1a">Rule 1: editors can read own documents → ALLOW ✓</text>
  <text x="580" y="365" font-size="10" text-anchor="middle" fill="#1a1a1a">Rule 2: internal docs from corp network → ALLOW ✓</text>
  <text x="580" y="385" font-size="10" text-anchor="middle" fill="#1a1a1a">Rule 3: no deny rules match</text>
  <text x="580" y="405" font-size="10" text-anchor="middle" fill="#1a1a1a">Decision: ALLOW (cached for 5 seconds)</text>
  
  <!-- Enforcement Layers -->
  <rect x="40" y="490" width="720" height="90" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="520" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Defense in Depth: Authorization at Every Layer</text>
  
  <rect x="55" y="535" width="210" height="35" rx="4" fill="#ffe0b2"/>
  <text x="160" y="558" font-size="10" text-anchor="middle" fill="#1a1a1a">API Gateway: Coarse-grained (API access)</text>
  
  <rect x="295" y="535" width="210" height="35" rx="4" fill="#ffe0b2"/>
  <text x="400" y="558" font-size="10" text-anchor="middle" fill="#1a1a1a">Service Layer: Fine-grained (resource access)</text>
  
  <rect x="535" y="535" width="210" height="35" rx="4" fill="#ffe0b2"/>
  <text x="640" y="558" font-size="10" text-anchor="middle" fill="#1a1a1a">Data Layer: Row-level (data isolation)</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
