<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="scaleArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:var(--bg-accent, #3b82f6);stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:var(--bg-accent, #3b82f6);stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Auto-Scaling Patterns</text>
  
  <!-- Scaling Types -->
  <rect x="50" y="60" width="450" height="180" rx="8" fill="url(#scaleGrad)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Scaling Approaches</text>
  
  <!-- Horizontal scaling -->
  <rect x="70" y="110" width="200" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="170" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-accent, #3b82f6)">Horizontal Scaling</text>
  <text x="170" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Add more instances</text>
  
  <!-- Vertical scaling -->
  <rect x="300" y="110" width="180" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="390" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Vertical Scaling</text>
  <text x="390" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Increase instance size</text>
  
  <!-- Scaling visualization -->
  <rect x="70" y="180" width="410" height="50" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  
  <!-- Before scaling -->
  <rect x="90" y="195" width="50" height="25" rx="3" fill="var(--bg-accent, #3b82f6)" opacity="0.6"/>
  <text x="115" y="212" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">1x</text>
  <text x="115" y="240" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Before</text>
  
  <line x1="160" y1="207" x2="180" y2="207" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#scaleArrow)"/>
  <text x="170" y="200" text-anchor="middle" font-size="9" fill="var(--border-accent, #3b82f6)" font-weight="bold">SCALE OUT</text>
  
  <!-- After scaling -->
  <rect x="200" y="195" width="40" height="25" rx="3" fill="var(--bg-accent, #3b82f6)" opacity="0.6"/>
  <text x="220" y="212" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">1x</text>
  
  <rect x="245" y="195" width="40" height="25" rx="3" fill="var(--bg-accent, #3b82f6)" opacity="0.6"/>
  <text x="265" y="212" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">2x</text>
  
  <rect x="290" y="195" width="40" height="25" rx="3" fill="var(--bg-accent, #3b82f6)" opacity="0.6"/>
  <text x="310" y="212" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">3x</text>
  
  <rect x="335" y="195" width="40" height="25" rx="3" fill="var(--bg-accent, #3b82f6)" opacity="0.6"/>
  <text x="355" y="212" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">4x</text>
  
  <text x="380" y="212" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">After</text>
  
  <!-- Scaling Triggers -->
  <rect x="520" y="60" width="430" height="180" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Scaling Triggers (Metrics)</text>
  
  <!-- CPU-based -->
  <rect x="540" y="110" width="190" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">CPU Utilization</text>
  <text x="635" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Scale when CPU {'>'} 70%</text>
  
  <!-- Memory-based -->
  <rect x="750" y="110" width="180" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Memory Usage</text>
  <text x="840" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Scale when RAM {'>'} 80%</text>
  
  <!-- Request-based -->
  <rect x="540" y="175" width="190" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Request Rate / QPS</text>
  <text x="635" y="220" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Scale on traffic spikes</text>
  
  <!-- Custom metrics -->
  <rect x="750" y="175" width="180" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Custom Metrics</text>
  <text x="840" y="220" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Queue depth, latency</text>
  
  <!-- Scaling Policies -->
  <rect x="50" y="255" width="900" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Scaling Policies</text>
  
  <!-- Reactive scaling -->
  <rect x="70" y="300" width="260" height="80" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="200" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Reactive Scaling</text>
  <text x="200" y="345" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Scale based on current metrics</text>
  <text x="200" y="365" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Simple to implement</text>
  <text x="200" y="380" text-anchor="middle" font-size="9" fill="#ef4444">✗ Response lag (cold start)</text>
  
  <!-- Predictive scaling -->
  <rect x="350" y="300" width="260" height="80" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="480" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Predictive Scaling</text>
  <text x="480" y="345" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">ML-based traffic prediction</text>
  <text x="480" y="365" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Proactive scaling</text>
  <text x="480" y="380" text-anchor="middle" font-size="9" fill="#f59e0b">✗ Prediction accuracy</text>
  
  <!-- Scheduled scaling -->
  <rect x="630" y="300" width="300" height="80" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="780" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Scheduled Scaling</text>
  <text x="780" y="345" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Scale at known peak times</text>
  <text x="780" y="365" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Predictable patterns</text>
  <text x="780" y="380" text-anchor="middle" font-size="9" fill="#ef4444">✗ Inflexible to changes</text>
  
  <!-- Scaling cooldown -->
  <rect x="50" y="410" width="450" height="130" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Scaling Cooldown & Hysteresis</text>
  
  <!-- Cooldown explanation -->
  <rect x="70" y="455" width="410" height="75" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="275" y="475" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Cooldown period prevents thrashing (rapid scale up/down cycles)</text>
  <text x="275" y="495" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Typical cooldown: 3-5 minutes after scaling activity</text>
  <text x="275" y="515" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Hysteresis: Use different thresholds for scale-up vs scale-down</text>
  <text x="275" y="535" text-anchor="middle" font-size="10" fill="var(--border-accent, #3b82f6)" font-weight="bold">Example: Scale up at 70% CPU, scale down at 40% CPU</text>
  
  <!-- Scale down strategies -->
  <rect x="520" y="410" width="430" height="130" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Graceful Scale-Down</text>
  
  <!-- Connection draining -->
  <rect x="540" y="455" width="190" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="480" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a)">Connection Draining</text>
  <text x="635" y="500" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Wait for in-flight requests</text>
  <text x="635" y="518" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Prevent request failures</text>
  
  <!-- Deregistration delay -->
  <rect x="750" y="455" width="180" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="480" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a)">Deregistration Delay</text>
  <text x="840" y="500" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Remove from LB first</text>
  <text x="840" y="518" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Then terminate instance</text>
</svg>
