<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Auto-Scaling Patterns & Policies</text>
  
  <!-- Scaling Triggers -->
  <rect x="40" y="70" width="340" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Scaling Triggers</text>
  
  <rect x="55" y="115" width="150" height="35" rx="4" fill="#bbdefb"/>
  <text x="130" y="138" font-size="10" text-anchor="middle" fill="#1a1a1a">CPU Utilization &gt; 70%</text>
  
  <rect x="225" y="115" width="140" height="35" rx="4" fill="#bbdefb"/>
  <text x="295" y="138" font-size="10" text-anchor="middle" fill="#1a1a1a">Memory &gt; 80%</text>
  
  <rect x="55" y="155" width="150" height="35" rx="4" fill="#bbdefb"/>
  <text x="130" y="178" font-size="10" text-anchor="middle" fill="#1a1a1a">Request Rate (QPS)</text>
  
  <rect x="225" y="155" width="140" height="35" rx="4" fill="#bbdefb"/>
  <text x="295" y="178" font-size="10" text-anchor="middle" fill="#1a1a1a">Queue Depth &gt; 10</text>
  
  <rect x="55" y="195" width="310" height="25" rx="4" fill="#e3f2fd"/>
  <text x="210" y="213" font-size="10" text-anchor="middle" fill="#666666">Custom metrics (orders/min, latency) more meaningful</text>
  
  <!-- Scaling Policies -->
  <rect x="420" y="70" width="340" height="160" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Scaling Policies</text>
  
  <rect x="435" y="115" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="138" font-size="10" text-anchor="middle" fill="#1a1a1a">Reactive: Scale on current metrics (3-5 min lag)</text>
  
  <rect x="435" y="155" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="178" font-size="10" text-anchor="middle" fill="#1a1a1a">Predictive: ML-based, scale before traffic spike</text>
  
  <rect x="435" y="195" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="218" font-size="10" text-anchor="middle" fill="#1a1a1a">Scheduled: Scale at known peak times (9 AM weekday)</text>
  
  <!-- Preventing Thrashing -->
  <rect x="40" y="260" width="340" height="140" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="210" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Preventing Thrashing</text>
  
  <rect x="55" y="305" width="310" height="35" rx="4" fill="#ffe0b2"/>
  <text x="210" y="328" font-size="10" text-anchor="middle" fill="#1a1a1a">Cooldown: Wait 3-5 min after scaling action</text>
  
  <rect x="55" y="345" width="310" height="35" rx="4" fill="#ffe0b2"/>
  <text x="210" y="368" font-size="10" text-anchor="middle" fill="#1a1a1a">Hysteresis: Scale up at 70%, down at 40%</text>
  
  <rect x="55" y="385" width="310" height="35" rx="4" fill="#ffe0b2"/>
  <text x="210" y="408" font-size="10" text-anchor="middle" fill="#1a1a1a">Sustained breach: 2-5 min before triggering scale</text>
  
  <!-- Graceful Scale-Down -->
  <rect x="420" y="260" width="340" height="140" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="590" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Graceful Scale-Down</text>
  
  <rect x="435" y="305" width="310" height="35" rx="4" fill="#e1bee7"/>
  <text x="590" y="328" font-size="10" text-anchor="middle" fill="#1a1a1a">1. Deregister from LB (stop new requests)</text>
  
  <rect x="435" y="345" width="310" height="35" rx="4" fill="#e1bee7"/>
  <text x="590" y="368" font-size="10" text-anchor="middle" fill="#1a1a1a">2. Connection draining (wait for active, max 60s)</text>
  
  <rect x="435" y="385" width="310" height="35" rx="4" fill="#e1bee7"/>
  <text x="590" y="408" font-size="10" text-anchor="middle" fill="#1a1a1a">3. Terminate instance after draining or timeout</text>
  
  <!-- Auto-Scaling Timeline -->
  <rect x="40" y="430" width="720" height="150" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="460" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Auto-Scaling Timeline — Traffic Spike Response</text>
  
  <!-- Timeline -->
  <line x1="60" y1="500" x2="740" y2="500" stroke="#666666" stroke-width="2"/>
  
  <!-- Events -->
  <circle cx="120" cy="500" r="8" fill="#e3f2fd"/>
  <text x="120" y="525" font-size="9" text-anchor="middle" fill="#666666">T=0: Traffic</text>
  <text x="120" y="538" font-size="9" text-anchor="middle" fill="#666666">spike begins</text>
  
  <circle cx="260" cy="500" r="8" fill="#fff3e0"/>
  <text x="260" y="525" font-size="9" text-anchor="middle" fill="#666666">T=2min: CPU</text>
  <text x="260" y="538" font-size="9" text-anchor="middle" fill="#666666">exceeds 70%</text>
  
  <circle cx="400" cy="500" r="8" fill="#c8e6c9"/>
  <text x="400" y="525" font-size="9" text-anchor="middle" fill="#666666">T=3min: Scale</text>
  <text x="400" y="538" font-size="9" text-anchor="middle" fill="#666666">up triggered</text>
  
  <circle cx="540" cy="500" r="8" fill="#e1bee7"/>
  <text x="540" y="525" font-size="9" text-anchor="middle" fill="#666666">T=5min: New</text>
  <text x="540" y="538" font-size="9" text-anchor="middle" fill="#666666">instances ready</text>
  
  <circle cx="680" cy="500" r="8" fill="#a5d6a7"/>
  <text x="680" y="525" font-size="9" text-anchor="middle" fill="#666666">T=6min: Load</text>
  <text x="680" y="538" font-size="9" text-anchor="middle" fill="#666666">balanced, CPU stable</text>
  
  <!-- Arrow on timeline -->
  <line x1="128" y1="490" x2="252" y2="490" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="268" y1="490" x2="392" y2="490" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="408" y1="490" x2="532" y2="490" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="548" y1="490" x2="672" y2="490" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Key takeaway -->
  <rect x="60" y="555" width="680" height="30" rx="6" fill="#ffebee"/>
  <text x="400" y="575" font-size="10" text-anchor="middle" fill="#1a1a1a">Total response time: ~6 minutes from spike to stabilization. Use predictive scaling or larger buffer to reduce lag.</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
