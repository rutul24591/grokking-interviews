<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Message Ordering Guarantees</text>
  
  <!-- Partition Ordering -->
  <rect x="40" y="70" width="720" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Partition-Based Ordering</text>
  
  <rect x="55" y="115" width="220" height="100" rx="6" fill="#bbdefb"/>
  <text x="165" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Partition 1 (Key: User A)</text>
  <text x="165" y="155" font-size="9" text-anchor="middle" fill="#666666">Msg 1: Create Account (seq: 1)</text>
  <text x="165" y="173" font-size="9" text-anchor="middle" fill="#666666">Msg 2: Update Profile (seq: 2)</text>
  <text x="165" y="191" font-size="9" text-anchor="middle" fill="#666666">Msg 3: Delete Account (seq: 3)</text>
  <text x="165" y="209" font-size="9" text-anchor="middle" fill="#4caf50">✓ Processed in order: 1→2→3</text>
  
  <rect x="295" y="115" width="220" height="100" rx="6" fill="#bbdefb"/>
  <text x="405" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Partition 2 (Key: User B)</text>
  <text x="405" y="155" font-size="9" text-anchor="middle" fill="#666666">Msg 1: Create Account (seq: 1)</text>
  <text x="405" y="173" font-size="9" text-anchor="middle" fill="#666666">Msg 2: Update Profile (seq: 2)</text>
  <text x="405" y="191" font-size="9" text-anchor="middle" fill="#666666">Msg 3: Delete Account (seq: 3)</text>
  <text x="405" y="209" font-size="9" text-anchor="middle" fill="#4caf50">✓ Processed in order: 1→2→3</text>
  
  <rect x="535" y="115" width="210" height="100" rx="6" fill="#c8e6c9"/>
  <text x="640" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cross-Partition</text>
  <text x="640" y="155" font-size="9" text-anchor="middle" fill="#666666">No ordering guarantee</text>
  <text x="640" y="173" font-size="9" text-anchor="middle" fill="#666666">Partition 1 msg may process</text>
  <text x="640" y="191" font-size="9" text-anchor="middle" fill="#666666">before or after Partition 2 msg</text>
  <text x="640" y="209" font-size="9" text-anchor="middle" fill="#f57c00">⚠ Order not guaranteed across partitions</text>
  
  <!-- Out-of-Order Handling -->
  <rect x="40" y="260" width="720" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="290" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Out-of-Order Message Handling</text>
  
  <rect x="55" y="305" width="220" height="120" rx="6" fill="#a5d6a7"/>
  <text x="165" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Option 1: Buffer</text>
  <text x="165" y="345" font-size="9" text-anchor="middle" fill="#666666">Buffer out-of-order msg</text>
  <text x="165" y="363" font-size="9" text-anchor="middle" fill="#666666">Wait for missing msgs</text>
  <text x="165" y="381" font-size="9" text-anchor="middle" fill="#666666">Process in order when ready</text>
  <text x="165" y="399" font-size="9" text-anchor="middle" fill="#666666">✓ Correct order</text>
  <text x="165" y="417" font-size="9" text-anchor="middle" fill="#d84315">✗ Adds latency</text>
  
  <rect x="295" y="305" width="220" height="120" rx="6" fill="#a5d6a7"/>
  <text x="405" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Option 2: Process with Warning</text>
  <text x="405" y="345" font-size="9" text-anchor="middle" fill="#666666">Process immediately</text>
  <text x="405" y="363" font-size="9" text-anchor="middle" fill="#666666">Log warning for reordering</text>
  <text x="405" y="381" font-size="9" text-anchor="middle" fill="#666666">Monitor for state issues</text>
  <text x="405" y="399" font-size="9" text-anchor="middle" fill="#4caf50">✓ Low latency</text>
  <text x="405" y="417" font-size="9" text-anchor="middle" fill="#d84315">✗ May cause incorrect state</text>
  
  <rect x="535" y="305" width="210" height="120" rx="6" fill="#a5d6a7"/>
  <text x="640" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Option 3: Dead Letter Queue</text>
  <text x="640" y="345" font-size="9" text-anchor="middle" fill="#666666">Send to DLQ for investigation</text>
  <text x="640" y="363" font-size="9" text-anchor="middle" fill="#666666">Manual intervention required</text>
  <text x="640" y="381" font-size="9" text-anchor="middle" fill="#666666">Preserves correctness</text>
  <text x="640" y="399" font-size="9" text-anchor="middle" fill="#4caf50">✓ Correct, auditable</text>
  <text x="640" y="417" font-size="9" text-anchor="middle" fill="#d84315">✗ Requires manual work</text>
  
  <!-- Sequence Number Detection -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Sequence Number-Based Ordering Detection</text>
  
  <rect x="55" y="515" width="340" height="50" rx="6" fill="#ffe0b2"/>
  <text x="225" y="535" font-size="10" text-anchor="middle" fill="#1a1a1a">Consumer expects seq: 3, receives seq: 5 → Gap detected (missing seq: 3, 4)</text>
  <text x="225" y="555" font-size="9" text-anchor="middle" fill="#666666">Action: Buffer seq: 5, wait for seq: 3 and 4</text>
  
  <rect x="415" y="515" width="330" height="50" rx="6" fill="#ffe0b2"/>
  <text x="580" y="535" font-size="10" text-anchor="middle" fill="#1a1a1a">Consumer expects seq: 3, receives seq: 2 → Out-of-order detected</text>
  <text x="580" y="555" font-size="9" text-anchor="middle" fill="#666666">Action: Discard duplicate or buffer until seq: 3 arrives</text>
</svg>
