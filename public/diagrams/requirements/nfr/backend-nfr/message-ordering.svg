<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="orderArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Message Ordering Guarantees</text>
  
  <!-- Ordering Levels -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Ordering Levels</text>
  
  <!-- No ordering -->
  <rect x="70" y="110" width="180" height="55" rx="4" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="160" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-red, #ef4444)">No Ordering</text>
  <text x="160" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Messages may arrive</text>
  <text x="160" y="170" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">in any order</text>
  
  <!-- Partition ordering -->
  <rect x="270" y="110" width="180" height="55" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="2"/>
  <text x="360" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-orange, #f97316)">Partition Ordering</text>
  <text x="360" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Ordered within partition</text>
  <text x="360" y="170" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Not across partitions</text>
  
  <!-- Global ordering -->
  <rect x="70" y="180" width="180" height="55" rx="4" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="160" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-green, #22c55e)">Global Ordering</text>
  <text x="160" y="225" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Total order across</text>
  <text x="160" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">all messages</text>
  
  <!-- Causal ordering -->
  <rect x="270" y="180" width="180" height="55" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="2"/>
  <text x="360" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-blue, #3b82f6)">Causal Ordering</text>
  <text x="360" y="225" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Cause before effect</text>
  <text x="360" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Concurrent unordered</text>
  
  <!-- Partition example -->
  <rect x="520" y="60" width="430" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Partition-Based Ordering</text>
  
  <!-- Partitions -->
  <rect x="540" y="110" width="120" height="150" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="2"/>
  <text x="600" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-blue, #3b82f6)">Partition 0</text>
  
  <rect x="550" y="145" width="100" height="25" rx="2" fill="var(--bg-blue, #3b82f6)"/>
  <text x="600" y="162" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Msg A (seq 1)</text>
  
  <rect x="550" y="175" width="100" height="25" rx="2" fill="var(--bg-blue, #3b82f6)"/>
  <text x="600" y="192" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Msg C (seq 2)</text>
  
  <rect x="550" y="205" width="100" height="25" rx="2" fill="var(--bg-blue, #3b82f6)"/>
  <text x="600" y="222" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Msg E (seq 3)</text>
  
  <rect x="690" y="110" width="120" height="150" rx="4" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="750" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Partition 1</text>
  
  <rect x="700" y="145" width="100" height="25" rx="2" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="750" y="162" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Msg B (seq 1)</text>
  
  <rect x="700" y="175" width="100" height="25" rx="2" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="750" y="192" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Msg D (seq 2)</text>
  
  <rect x="830" y="110" width="120" height="150" rx="4" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="890" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-green, #22c55e)">Partition 2</text>
  
  <rect x="840" y="145" width="100" height="25" rx="2" fill="var(--bg-green, #22c55e)"/>
  <text x="890" y="162" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Msg F (seq 1)</text>
  
  <text x="735" y="250" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Ordered within partition (A→C→E, B→D, F)</text>
  <text x="735" y="270" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✗ No ordering across partitions (A,B,F unordered)</text>
  
  <!-- Ordering Strategies -->
  <rect x="50" y="300" width="450" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Ordering Strategies</text>
  
  <text x="70" y="355" font-size="10" fill="var(--text-secondary, #47556ird">• Same partition key → same partition → ordered</text>
  <text x="70" y="375" font-size="10" fill="var(--text-secondary, #47556ird">• Sequence numbers per partition</text>
  <text x="70" y="395" font-size="10" fill="var(--text-secondary, #47556ird">• Single partition for total order (limits scalability)</text>
  <text x="70" y="415" font-size="10" fill="var(--text-secondary, #47556ird">• Timestamp ordering (clock skew issues)</text>
  <text x="70" y="435" font-size="10" fill="var(--text-secondary, #47556ird">• Vector clocks for causal ordering</text>
  
  <!-- Reordering at Consumer -->
  <rect x="520" y="300" width="430" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Consumer-Side Reordering</text>
  
  <text x="540" y="355" font-size="10" fill="var(--text-secondary, #47556ird">• Buffer messages and reorder by sequence number</text>
  <text x="540" y="375" font-size="10" fill="var(--text-secondary, #47556ird">• Wait for missing messages (timeout)</text>
  <text x="540" y="395" font-size="10" fill="var(--text-secondary, #47556ird">• Process in-order, buffer out-of-order</text>
  <text x="540" y="415" font-size="10" fill="var(--text-secondary, #47556ird">• Trade-off: Latency vs ordering guarantee</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Partition key design determines ordering. Related messages must share partition key.</text>
</svg>
