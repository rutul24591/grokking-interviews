<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Disaster Recovery Deep Dive</text>
  
  <!-- Failover Orchestration -->
  <rect x="40" y="70" width="340" height="180" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Failover Orchestration</text>
  
  <rect x="55" y="115" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Automated health checks detect primary site failure</text>
  
  <rect x="55" y="150" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">DR site promoted to primary (database failover)</text>
  
  <rect x="55" y="185" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">DNS records updated (Route 53 health check failover)</text>
  
  <rect x="55" y="220" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">Data consistency verified (checksums, row counts)</text>
  
  <rect x="55" y="255" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="275" font-size="10" text-anchor="middle" fill="#1a1a1a">Traffic redirected to DR site, service restored</text>
  
  <!-- Data Consistency Verification -->
  <rect x="420" y="70" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Data Consistency Verification</text>
  
  <rect x="435" y="115" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Row count comparison: primary vs DR database</text>
  
  <rect x="435" y="150" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">Checksum verification for critical tables</text>
  
  <rect x="435" y="185" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">Sample record comparison (random sampling)</text>
  
  <rect x="435" y="220" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">Replication lag check at time of failure</text>
  
  <rect x="435" y="255" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="275" font-size="10" text-anchor="middle" fill="#1a1a1a">Application-level validation (test transactions)</text>
  
  <!-- Post-Recovery Validation -->
  <rect x="40" y="280" width="720" height="160" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="310" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Post-Recovery Validation</text>
  
  <rect x="55" y="325" width="220" height="100" rx="6" fill="#ffe0b2"/>
  <text x="165" y="345" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Service Health</text>
  <text x="165" y="365" font-size="9" text-anchor="middle" fill="#666666">All services responding</text>
  <text x="165" y="380" font-size="9" text-anchor="middle" fill="#666666">Error rates within SLO</text>
  <text x="165" y="395" font-size="9" text-anchor="middle" fill="#666666">Latency within SLO</text>
  <text x="165" y="410" font-size="9" text-anchor="middle" fill="#666666">Database connections healthy</text>
  <text x="165" y="425" font-size="9" text-anchor="middle" fill="#666666">Cache hit rates normal</text>
  
  <rect x="295" y="325" width="220" height="100" rx="6" fill="#ffe0b2"/>
  <text x="405" y="345" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Data Integrity</text>
  <text x="405" y="365" font-size="9" text-anchor="middle" fill="#666666">No data corruption detected</text>
  <text x="405" y="380" font-size="9" text-anchor="middle" fill="#666666">All transactions committed</text>
  <text x="405" y="395" font-size="9" text-anchor="middle" fill="#666666">Replication caught up</text>
  <text x="405" y="410" font-size="9" text-anchor="middle" fill="#666666">Backups resumed</text>
  <text x="405" y="425" font-size="9" text-anchor="middle" fill="#666666">Monitoring alerts clear</text>
  
  <rect x="535" y="325" width="210" height="100" rx="6" fill="#ffe0b2"/>
  <text x="640" y="345" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">User Impact</text>
  <text x="640" y="365" font-size="9" text-anchor="middle" fill="#666666">RTO achieved (&lt; target)</text>
  <text x="640" y="380" font-size="9" text-anchor="middle" fill="#666666">RPO achieved (&lt; target)</text>
  <text x="640" y="395" font-size="9" text-anchor="middle" fill="#666666">User communication sent</text>
  <text x="640" y="410" font-size="9" text-anchor="middle" fill="#666666">Support team briefed</text>
  <text x="640" y="425" font-size="9" text-anchor="middle" fill="#666666">Incident report initiated</text>
  
  <!-- RTO/RPO Measurement -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RTO/RPO Measurement During DR Test</text>
  
  <rect x="55" y="515" width="340" height="50" rx="6" fill="#e1bee7"/>
  <text x="225" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Actual RTO: Time from failure detection to service restoration</text>
  <text x="225" y="555" font-size="9" text-anchor="middle" fill="#666666">Example: Failure at 10:00, service restored at 10:45 → RTO = 45 minutes</text>
  
  <rect x="415" y="515" width="330" height="50" rx="6" fill="#e1bee7"/>
  <text x="580" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Actual RPO: Time from last replication to failure</text>
  <text x="580" y="555" font-size="9" text-anchor="middle" fill="#666666">Example: Last replication at 9:58, failure at 10:00 → RPO = 2 minutes</text>
</svg>
