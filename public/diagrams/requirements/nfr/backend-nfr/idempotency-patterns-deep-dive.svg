<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Idempotency Patterns Deep Dive</text>
  
  <!-- Pattern 1: Unique Key -->
  <rect x="40" y="70" width="340" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pattern 1: Unique Key Check</text>
  
  <rect x="60" y="115" width="300" height="30" rx="4" fill="#e3f2fd"/>
  <text x="210" y="135" font-size="11" text-anchor="middle" fill="#666666">1. Check if idempotency_key exists in DB</text>
  
  <rect x="60" y="150" width="300" height="30" rx="4" fill="#e3f2fd"/>
  <text x="210" y="170" font-size="11" text-anchor="middle" fill="#666666">2. If exists → return cached response</text>
  
  <rect x="60" y="185" width="300" height="30" rx="4" fill="#e3f2fd"/>
  <text x="210" y="205" font-size="11" text-anchor="middle" fill="#666666">3. If not → process, store key + result</text>
  
  <rect x="60" y="220" width="300" height="30" rx="4" fill="#e3f2fd"/>
  <text x="210" y="240" font-size="11" text-anchor="middle" fill="#666666">Best for: Payment processing, order creation</text>
  
  <!-- Pattern 2: Conditional Update -->
  <rect x="420" y="70" width="340" height="160" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pattern 2: Conditional Update</text>
  
  <rect x="440" y="115" width="300" height="30" rx="4" fill="#c8e6c9"/>
  <text x="590" y="135" font-size="11" text-anchor="middle" fill="#666666">1. Update WHERE version = expected_version</text>
  
  <rect x="440" y="150" width="300" height="30" rx="4" fill="#c8e6c9"/>
  <text x="590" y="170" font-size="11" text-anchor="middle" fill="#666666">2. If rows_affected = 0 → already processed</text>
  
  <rect x="440" y="185" width="300" height="30" rx="4" fill="#c8e6c9"/>
  <text x="590" y="205" font-size="11" text-anchor="middle" fill="#666666">3. Increment version on success</text>
  
  <rect x="440" y="220" width="300" height="30" rx="4" fill="#c8e6c9"/>
  <text x="590" y="240" font-size="11" text-anchor="middle" fill="#666666">Best for: State machines, optimistic locking</text>
  
  <!-- Retry Flow -->
  <rect x="40" y="260" width="720" height="160" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Retry Flow with Idempotency</text>
  
  <!-- Client -->
  <rect x="60" y="310" width="140" height="90" rx="6" fill="#bbdefb"/>
  <text x="130" y="335" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Client</text>
  <text x="130" y="355" font-size="10" text-anchor="middle" fill="#666666">Sends request with</text>
  <text x="130" y="373" font-size="10" text-anchor="middle" fill="#666666">idempotency_key</text>
  <text x="130" y="393" font-size="10" text-anchor="middle" fill="#666666">Retries on timeout</text>
  
  <!-- Server -->
  <rect x="230" y="310" width="140" height="90" rx="6" fill="#c8e6c9"/>
  <text x="300" y="335" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Server</text>
  <text x="300" y="355" font-size="10" text-anchor="middle" fill="#666666">Checks key existence</text>
  <text x="300" y="373" font-size="10" text-anchor="middle" fill="#666666">Processes or returns</text>
  <text x="300" y="393" font-size="10" text-anchor="middle" fill="#666666">cached result</text>
  
  <!-- Database -->
  <rect x="400" y="310" width="140" height="90" rx="6" fill="#fff3e0"/>
  <text x="470" y="335" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Idempotency Store</text>
  <text x="470" y="355" font-size="10" text-anchor="middle" fill="#666666">Stores processed keys</text>
  <text x="470" y="373" font-size="10" text-anchor="middle" fill="#666666">With TTL for cleanup</text>
  <text x="470" y="393" font-size="10" text-anchor="middle" fill="#666666">Atomic operations</text>
  
  <!-- Success -->
  <rect x="570" y="310" width="140" height="90" rx="6" fill="#e8f5e9"/>
  <text x="640" y="335" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Result</text>
  <text x="640" y="355" font-size="10" text-anchor="middle" fill="#666666">Exactly-once processing</text>
  <text x="640" y="373" font-size="10" text-anchor="middle" fill="#666666">Safe retries</text>
  <text x="640" y="393" font-size="10" text-anchor="middle" fill="#4caf50">No duplicates</text>
  
  <!-- Key Considerations -->
  <rect x="40" y="450" width="720" height="130" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="480" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Key Considerations</text>
  
  <rect x="60" y="500" width="220" height="60" rx="6" fill="#e1bee7"/>
  <text x="170" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Key Uniqueness</text>
  <text x="170" y="545" font-size="10" text-anchor="middle" fill="#666666">UUIDs or composite keys</text>
  <text x="170" y="563" font-size="10" text-anchor="middle" fill="#666666">Must be globally unique</text>
  
  <rect x="300" y="500" width="220" height="60" rx="6" fill="#e1bee7"/>
  <text x="410" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Atomicity</text>
  <text x="410" y="545" font-size="10" text-anchor="middle" fill="#666666">Check + process + store</text>
  <text x="410" y="563" font-size="10" text-anchor="middle" fill="#666666">Must be atomic (transaction)</text>
  
  <rect x="540" y="500" width="200" height="60" rx="6" fill="#e1bee7"/>
  <text x="640" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">TTL Management</text>
  <text x="640" y="545" font-size="10" text-anchor="middle" fill="#666666">Cleanup old keys</text>
  <text x="640" y="563" font-size="10" text-anchor="middle" fill="#666666">Balance storage vs safety</text>
</svg>
