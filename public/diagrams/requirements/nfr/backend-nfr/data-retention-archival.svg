<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Data Retention & Archival Architecture</text>
  
  <!-- Storage Tiers -->
  <rect x="40" y="70" width="720" height="140" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Storage Tiering Lifecycle</text>
  
  <rect x="55" y="115" width="160" height="80" rx="6" fill="#bbdefb"/>
  <text x="135" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Hot (SSD)</text>
  <text x="135" y="155" font-size="9" text-anchor="middle" fill="#666666">0-30 days</text>
  <text x="135" y="170" font-size="9" text-anchor="middle" fill="#666666">Sub-ms latency</text>
  <text x="135" y="185" font-size="9" text-anchor="middle" fill="#666666">$100-200/TB</text>
  <text x="135" y="200" font-size="9" text-anchor="middle" fill="#666666">Active data</text>
  
  <rect x="235" y="115" width="160" height="80" rx="6" fill="#c8e6c9"/>
  <text x="315" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Warm (HDD)</text>
  <text x="315" y="155" font-size="9" text-anchor="middle" fill="#666666">30-90 days</text>
  <text x="315" y="170" font-size="9" text-anchor="middle" fill="#666666">ms latency</text>
  <text x="315" y="185" font-size="9" text-anchor="middle" fill="#666666">$20-50/TB</text>
  <text x="315" y="200" font-size="9" text-anchor="middle" fill="#666666">Infrequent access</text>
  
  <rect x="415" y="115" width="160" height="80" rx="6" fill="#fff3e0"/>
  <text x="495" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cold (Archive)</text>
  <text x="495" y="155" font-size="9" text-anchor="middle" fill="#666666">90 days-1 year</text>
  <text x="495" y="170" font-size="9" text-anchor="middle" fill="#666666">Minutes-hours retrieval</text>
  <text x="495" y="185" font-size="9" text-anchor="middle" fill="#666666">$4-10/TB</text>
  <text x="495" y="200" font-size="9" text-anchor="middle" fill="#666666">Compliance retention</text>
  
  <rect x="595" y="115" width="150" height="80" rx="6" fill="#ffebee"/>
  <text x="670" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Deleted</text>
  <text x="670" y="155" font-size="9" text-anchor="middle" fill="#666666">After retention expires</text>
  <text x="670" y="170" font-size="9" text-anchor="middle" fill="#666666">Cryptographic erasure</text>
  <text x="670" y="185" font-size="9" text-anchor="middle" fill="#666666">Permanent removal</text>
  <text x="670" y="200" font-size="9" text-anchor="middle" fill="#666666">GDPR compliance</text>
  
  <!-- Lifecycle Automation -->
  <rect x="40" y="240" width="720" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="270" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Automated Lifecycle Management</text>
  
  <rect x="55" y="285" width="340" height="120" rx="6" fill="#a5d6a7"/>
  <text x="225" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Lifecycle Policy Rules</text>
  <text x="225" y="325" font-size="9" text-anchor="middle" fill="#666666">If age &gt; 30 days AND no access → transition to warm</text>
  <text x="225" y="343" font-size="9" text-anchor="middle" fill="#666666">If age &gt; 90 days AND no access → transition to cold</text>
  <text x="225" y="361" font-size="9" text-anchor="middle" fill="#666666">If age &gt; retention period → delete (or legal hold)</text>
  <text x="225" y="379" font-size="9" text-anchor="middle" fill="#666666">If GDPR erasure request → cryptographic erasure</text>
  <text x="225" y="397" font-size="9" text-anchor="middle" fill="#666666">If legal hold → preserve regardless of retention</text>
  
  <rect x="415" y="285" width="330" height="120" rx="6" fill="#a5d6a7"/>
  <text x="580" y="305" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Compliance-Driven Retention</text>
  <text x="580" y="325" font-size="9" text-anchor="middle" fill="#666666">GDPR: erasure on request (any time)</text>
  <text x="580" y="343" font-size="9" text-anchor="middle" fill="#666666">HIPAA: minimum 6-year retention</text>
  <text x="580" y="361" font-size="9" text-anchor="middle" fill="#666666">PCI-DSS: minimum 1-year retention</text>
  <text x="580" y="379" font-size="9" text-anchor="middle" fill="#666666">SOX: minimum 7-year retention</text>
  <text x="580" y="397" font-size="9" text-anchor="middle" fill="#666666">Legal holds override all retention policies</text>
  
  <!-- Data Flow -->
  <rect x="40" y="450" width="720" height="130" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="480" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Data Flow Through Lifecycle</text>
  
  <rect x="55" y="495" width="140" height="70" rx="6" fill="#ffe0b2"/>
  <text x="125" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Create</text>
  <text x="125" y="535" font-size="9" text-anchor="middle" fill="#666666">Hot storage</text>
  <text x="125" y="550" font-size="9" text-anchor="middle" fill="#666666">Frequently accessed</text>
  <text x="125" y="565" font-size="9" text-anchor="middle" fill="#666666">Classified by type</text>
  
  <line x1="195" y1="530" x2="235" y2="530" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="235" y="495" width="140" height="70" rx="6" fill="#ffe0b2"/>
  <text x="305" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Archive</text>
  <text x="305" y="535" font-size="9" text-anchor="middle" fill="#666666">Warm → Cold storage</text>
  <text x="305" y="550" font-size="9" text-anchor="middle" fill="#666666">Automated transition</text>
  <text x="305" y="565" font-size="9" text-anchor="middle" fill="#666666">Based on age/access</text>
  
  <line x1="375" y1="530" x2="415" y2="530" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="415" y="495" width="140" height="70" rx="6" fill="#ffe0b2"/>
  <text x="485" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Retain</text>
  <text x="485" y="535" font-size="9" text-anchor="middle" fill="#666666">Compliance period</text>
  <text x="485" y="550" font-size="9" text-anchor="middle" fill="#666666">Legal hold if needed</text>
  <text x="485" y="565" font-size="9" text-anchor="middle" fill="#666666">Audit trail maintained</text>
  
  <line x1="555" y1="530" x2="595" y2="530" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="595" y="495" width="140" height="70" rx="6" fill="#ffcdd2"/>
  <text x="665" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Delete</text>
  <text x="665" y="535" font-size="9" text-anchor="middle" fill="#666666">After retention expires</text>
  <text x="665" y="550" font-size="9" text-anchor="middle" fill="#666666">Cryptographic erasure</text>
  <text x="665" y="565" font-size="9" text-anchor="middle" fill="#666666">Cascade to all copies</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
