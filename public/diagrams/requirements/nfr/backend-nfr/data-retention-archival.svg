<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="retArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Data Retention &amp; Storage Tiers</text>
  
  <!-- Storage Tier Pyramid -->
  <rect x="50" y="60" width="450" height="250" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Storage Tier Pyramid</text>
  
  <!-- Hot tier -->
  <polygon points="200,110 350,110 320,145 230,145" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <text x="275" y="130" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444">HOT</text>
  <text x="275" y="142" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">SSD/NVMe</text>
  
  <!-- Warm tier -->
  <polygon points="230,145 320,145 295,185 255,185" fill="#f97316" opacity="0.3" stroke="#f97316" stroke-width="2"/>
  <text x="275" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="#f97316">WARM</text>
  <text x="275" y="182" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">HDD/Standard</text>
  
  <!-- Cold tier -->
  <polygon points="255,185 295,185 285,230 265,230" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
  <text x="275" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="#3b82f6">COLD</text>
  <text x="275" y="222" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Archive/Glacier</text>
  
  <!-- Tier details -->
  <text x="380" y="130" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">0-30 days</text>
  <text x="380" y="145" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">High cost/GB</text>
  <text x="380" y="160" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Low latency</text>
  
  <text x="380" y="185" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">30 days-1 year</text>
  <text x="380" y="200" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Medium cost</text>
  <text x="380" y="215" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Medium latency</text>
  
  <text x="380" y="230" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">1+ years</text>
  <text x="380" y="245" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Low cost/GB</text>
  <text x="380" y="260" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">High latency</text>
  
  <!-- Lifecycle Policy -->
  <rect x="520" y="60" width="430" height="250" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Lifecycle Policy Example</text>
  
  <!-- Timeline -->
  <line x1="550" y1="130" x2="920" y2="130" stroke="#3b82f6" stroke-width="3" marker-end="url(#retArrow)"/>
  <text x="930" y="135" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">Time →</text>
  
  <!-- Day 0 -->
  <circle cx="550" cy="130" r="5" fill="#ef4444"/>
  <text x="550" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Day 0</text>
  <text x="550" y="115" text-anchor="middle" font-size="8" fill="var(--border-red, #ef4444" font-weight="bold">HOT</text>
  
  <!-- Day 30 -->
  <circle cx="650" cy="130" r="5" fill="#f97316"/>
  <text x="650" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Day 30</text>
  <text x="650" y="115" text-anchor="middle" font-size="8" fill="var(--border-orange, #f97316" font-weight="bold">→ WARM</text>
  
  <!-- Day 365 -->
  <circle cx="800" cy="130" r="5" fill="#3b82f6"/>
  <text x="800" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Day 365</text>
  <text x="800" y="115" text-anchor="middle" font-size="8" fill="var(--border-blue, #3b82f6" font-weight="bold">→ COLD</text>
  
  <!-- Day 2555 (7 years) -->
  <circle cx="920" cy="130" r="5" fill="#22c55e"/>
  <text x="920" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Day 2555</text>
  <text x="920" y="115" text-anchor="middle" font-size="8" fill="var(--border-green, #22c55e" font-weight="bold">DELETE</text>
  
  <!-- Retention Requirements -->
  <rect x="540" y="180" width="390" height="120" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="735" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a">Compliance Retention Requirements</text>
  
  <text x="560" y="230" font-size="9" fill="var(--text-secondary, #47556ird">• Financial: 7 years (tax records)</text>
  <text x="560" y="247" font-size="9" fill="var(--text-secondary, #47556ird">• Healthcare: 6-10 years (HIPAA)</text>
  <text x="560" y="264" font-size="9" fill="var(--text-secondary, #47556ird">• Legal: Indefinite (litigation hold)</text>
  <text x="560" y="281" font-size="9" fill="var(--text-secondary, #47556ird">• GDPR: Minimum necessary, delete on request</text>
  <text x="560" y="298" font-size="9" fill="var(--text-secondary, #47556ird">• Logs: 90 days - 1 year (security)</text>
  
  <!-- Archive Patterns -->
  <rect x="50" y="330" width="450" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Archive Patterns</text>
  
  <text x="70" y="380" font-size="10" fill="var(--text-secondary, #47556ird">• Full Archive: Complete data snapshot</text>
  <text x="70" y="400" font-size="10" fill="var(--text-secondary, #47556ird">• Incremental: Only changes since last archive</text>
  <text x="70" y="420" font-size="10" fill="var(--text-secondary, #47556ird">• Differential: Changes since last full archive</text>
  
  <!-- Data Deletion -->
  <rect x="520" y="330" width="430" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Secure Data Deletion</text>
  
  <text x="540" y="380" font-size="10" fill="var(--text-secondary, #47556ird">• Soft Delete: Mark as deleted, retain for grace period</text>
  <text x="540" y="400" font-size="10" fill="var(--text-secondary, #47556ird">• Hard Delete: Permanent removal after retention</text>
  <text x="540" y="420" font-size="10" fill="var(--text-secondary, #47556ird">• Crypto-Shredding: Delete encryption keys</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Balance compliance requirements with storage costs through automated lifecycle policies.</text>
</svg>
