<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="authArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Authentication vs Authorization</text>
  
  <!-- Authentication Section -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Authentication (Who are you?)</text>
  
  <!-- Auth flow -->
  <rect x="80" y="110" width="100" height="50" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="130" y="140" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff)">User</text>
  
  <line x1="180" y1="135" x2="220" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#authArrow)"/>
  <text x="200" y="125" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569)">Credentials</text>
  
  <rect x="220" y="110" width="120" height="50" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="280" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Auth Service</text>
  <text x="280" y="152" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Verify identity</text>
  
  <line x1="340" y1="135" x2="380" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#authArrow)"/>
  <text x="360" y="125" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Token</text>
  
  <rect x="380" y="110" width="100" height="50" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="430" y="140" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff">Session/Token</text>
  
  <text x="275" y="200" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569">Methods: Password, OAuth, SAML, OIDC, MFA</text>
  <text x="275" y="220" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569">Output: Identity confirmed + Token</text>
  <text x="275" y="245" text-anchor="middle" font-size="10" fill="var(--border-blue, #3b82f6)" font-weight="bold">✓ Verifies identity</text>
  <text x="275" y="265" text-anchor="middle" font-size="10" fill="var(--text-muted, #64748b)">Example: Login with username/password</text>
  
  <!-- Authorization Section -->
  <rect x="520" y="60" width="430" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Authorization (What can you do?)</text>
  
  <!-- AuthZ flow -->
  <rect x="550" y="110" width="100" height="50" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="600" y="140" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff">Token Holder</text>
  
  <line x1="650" y1="135" x2="690" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#authArrow)"/>
  <text x="670" y="125" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Request + Token</text>
  
  <rect x="690" y="110" width="120" height="50" rx="4" fill="var(--bg-orange, #f97316)"/>
  <text x="750" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff">Policy Engine</text>
  <text x="750" y="152" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Check permissions</text>
  
  <line x1="810" y1="135" x2="850" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#authArrow)"/>
  <text x="830" y="125" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Allow/Deny</text>
  
  <rect x="850" y="110" width="80" height="50" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="890" y="135" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff">Resource</text>
  <text x="890" y="150" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Access Granted</text>
  
  <text x="735" y="200" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569">Models: RBAC, ABAC, ACL, Policy-based</text>
  <text x="735" y="220" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569">Output: Access decision (Allow/Deny)</text>
  <text x="735" y="245" text-anchor="middle" font-size="10" fill="var(--border-orange, #f97316)" font-weight="bold">✓ Verifies permissions</text>
  <text x="735" y="265" text-anchor="middle" font-size="10" fill="var(--text-muted, #64748b)">Example: Can user edit this document?</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="300" width="900" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Key Differences</text>
  
  <rect x="70" y="340" width="420" height="90" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="280" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-blue, #3b82f6)">Authentication</text>
  <text x="280" y="390" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Happens FIRST in the flow</text>
  <text x="280" y="410" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Credentials transmitted openly</text>
  <text x="280" y="430" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Stateful (sessions)</text>
  
  <rect x="510" y="340" width="420" height="90" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="720" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-orange, #f97316)">Authorization</text>
  <text x="720" y="390" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Happens AFTER authentication</text>
  <text x="720" y="410" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Token transmitted (not credentials)</text>
  <text x="720" y="430" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Can be stateless (JWT)</text>
  
  <!-- Real world analogy -->
  <rect x="50" y="455" width="900" height="85" rx="6" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="500" y="478" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Real-World Analogy: Airport Security</text>
  <text x="250" y="505" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">Authentication = Showing your passport/ID</text>
  <text x="750" y="505" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">Authorization = Boarding pass determines which flights you can access</text>
  <text x="500" y="530" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Having a passport (authN) doesn't mean you can board any flight (authZ)</text>
</svg>
