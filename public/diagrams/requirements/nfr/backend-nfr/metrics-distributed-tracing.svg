<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="metArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Metrics & Distributed Tracing</text>
  
  <!-- Three Pillars -->
  <rect x="50" y="60" width="450" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Three Pillars of Observability</text>
  
  <!-- Metrics -->
  <rect x="70" y="110" width="120" height="120" rx="6" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="2"/>
  <text x="130" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-blue, #3b82f6)">Metrics</text>
  <text x="130" y="170" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Numerical data</text>
  <text x="130" y="187" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">over time</text>
  <text x="130" y="207" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">RPS, latency, errors</text>
  
  <!-- Logs -->
  <rect x="210" y="110" width="120" height="120" rx="6" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="270" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Logs</text>
  <text x="270" y="170" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Discrete events</text>
  <text x="270" y="187" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">with timestamps</text>
  <text x="270" y="207" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Errors, access logs</text>
  
  <!-- Traces -->
  <rect x="350" y="110" width="120" height="120" rx="6" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="2"/>
  <text x="410" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-orange, #f97316)">Traces</text>
  <text x="410" y="170" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Request journey</text>
  <text x="410" y="187" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">across services</text>
  <text x="410" y="207" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Distributed tracing</text>
  
  <!-- Trace Flow -->
  <rect x="520" y="60" width="430" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Distributed Trace Flow</text>
  
  <!-- Client -->
  <rect x="540" y="110" width="80" height="40" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="580" y="135" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Client</text>
  
  <line x1="620" y1="130" x2="650" y2="130" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#metArrow)"/>
  <text x="635" y="120" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">trace_id</text>
  
  <!-- API Gateway -->
  <rect x="650" y="110" width="80" height="40" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="690" y="130" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">API Gateway</text>
  <text x="690" y="145" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Span 1</text>
  
  <line x1="730" y1="130" x2="760" y2="130" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#metArrow)"/>
  
  <!-- Service A -->
  <rect x="760" y="110" width="80" height="40" rx="4" fill="var(--bg-orange, #f97316)"/>
  <text x="800" y="130" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Service A</text>
  <text x="800" y="145" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Span 2</text>
  
  <line x1="800" y1="150" x2="800" y2="175" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#metArrow)"/>
  <text x="810" y="167" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">child span</text>
  
  <!-- Database -->
  <rect x="760" y="175" width="80" height="40" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="800" y="195" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Database</text>
  <text x="800" y="210" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Span 3</text>
  
  <text x="735" y="240" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Trace = Collection of spans with same trace_id</text>
  
  <!-- Metric Types -->
  <rect x="50" y="280" width="450" height="160" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Metric Types</text>
  
  <rect x="70" y="325" width="110" height="45" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="125" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6)">Counter</text>
  <text x="125" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Monotonic increase</text>
  
  <rect x="200" y="325" width="110" height="45" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="255" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Gauge</text>
  <text x="255" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Point-in-time value</text>
  
  <rect x="330" y="325" width="110" height="45" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="385" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316)">Histogram</text>
  <text x="385" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Distribution buckets</text>
  
  <text x="70" y="395" font-size="8" fill="var(--text-secondary, #47556ird">Example: Total requests</text>
  <text x="200" y="395" font-size="8" fill="var(--text-secondary, #47556ird">Example: Memory usage</text>
  <text x="330" y="395" font-size="8" fill="var(--text-secondary, #47556ird">Example: Request latency</text>
  
  <!-- RED Method -->
  <rect x="520" y="280" width="430" height="160" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">RED Method (Per Service)</text>
  
  <rect x="540" y="325" width="120" height="45" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="600" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6)">Rate</text>
  <text x="600" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Requests/second</text>
  
  <rect x="680" y="325" width="120" height="45" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="740" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Errors</text>
  <text x="740" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Failed requests/sec</text>
  
  <rect x="820" y="325" width="120" height="45" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="880" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316)">Duration</text>
  <text x="880" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Request latency</text>
  
  <text x="735" y="400" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Monitor these 3 metrics for every service</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Use OpenTelemetry for vendor-neutral instrumentation. Correlate traces with logs using trace_id.</text>
</svg>
