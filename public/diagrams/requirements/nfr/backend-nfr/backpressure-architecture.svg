<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Backpressure Architecture & Flow Control</text>
  
  <!-- Backpressure Flow -->
  <rect x="40" y="70" width="720" height="140" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Backpressure Propagation Flow</text>
  
  <rect x="55" y="115" width="140" height="70" rx="6" fill="#bbdefb"/>
  <text x="125" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Downstream Slow</text>
  <text x="125" y="155" font-size="9" text-anchor="middle" fill="#666666">Database: high latency</text>
  <text x="125" y="170" font-size="9" text-anchor="middle" fill="#666666">Queue: filling up</text>
  
  <line x1="195" y1="150" x2="235" y2="150" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="215" y="140" font-size="8" text-anchor="middle" fill="#f44336">signal</text>
  
  <rect x="235" y="115" width="140" height="70" rx="6" fill="#bbdefb"/>
  <text x="305" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Service Layer</text>
  <text x="305" y="155" font-size="9" text-anchor="middle" fill="#666666">Reduce concurrency</text>
  <text x="305" y="170" font-size="9" text-anchor="middle" fill="#666666">Queue requests</text>
  
  <line x1="375" y1="150" x2="415" y2="150" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="395" y="140" font-size="8" text-anchor="middle" fill="#f44336">signal</text>
  
  <rect x="415" y="115" width="140" height="70" rx="6" fill="#bbdefb"/>
  <text x="485" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">API Gateway</text>
  <text x="485" y="155" font-size="9" text-anchor="middle" fill="#666666">Throttle requests</text>
  <text x="485" y="170" font-size="9" text-anchor="middle" fill="#666666">Return 503 + Retry-After</text>
  
  <line x1="555" y1="150" x2="595" y2="150" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="575" y="140" font-size="8" text-anchor="middle" fill="#f44336">signal</text>
  
  <rect x="595" y="115" width="150" height="70" rx="6" fill="#ffebee"/>
  <text x="670" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Client / User</text>
  <text x="670" y="155" font-size="9" text-anchor="middle" fill="#666666">Back off with jitter</text>
  <text x="670" y="170" font-size="9" text-anchor="middle" fill="#666666">Retry after delay</text>
  
  <!-- Flow Control Mechanisms -->
  <rect x="40" y="240" width="340" height="200" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="270" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Flow Control Mechanisms</text>
  
  <rect x="55" y="285" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="210" y="308" font-size="10" text-anchor="middle" fill="#1a1a1a">Bounded Buffers: Fixed-size queue → backpressure when full</text>
  
  <rect x="55" y="325" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="210" y="348" font-size="10" text-anchor="middle" fill="#1a1a1a">TCP Window: Receiver controls sender&apos;s transmission rate</text>
  
  <rect x="55" y="365" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="210" y="388" font-size="10" text-anchor="middle" fill="#1a1a1a">HTTP/2 Flow Control: WINDOW_UPDATE frames control data flow</text>
  
  <rect x="55" y="405" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="210" y="428" font-size="10" text-anchor="middle" fill="#1a1a1a">Pull-Based: Consumer requests data at its own pace</text>
  
  <!-- Load Shedding -->
  <rect x="420" y="240" width="340" height="200" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="270" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Load Shedding Priority</text>
  
  <rect x="435" y="285" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="305" font-size="10" text-anchor="middle" fill="#1a1a1a">Highest: Authenticated writes (create, update)</text>
  
  <rect x="435" y="320" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="340" font-size="10" text-anchor="middle" fill="#1a1a1a">High: Authenticated reads (user data)</text>
  
  <rect x="435" y="355" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="375" font-size="10" text-anchor="middle" fill="#1a1a1a">Medium: Anonymous reads (public data)</text>
  
  <rect x="435" y="390" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="410" font-size="10" text-anchor="middle" fill="#1a1a1a">Low: Analytics, health checks, webhooks</text>
  
  <rect x="435" y="425" width="310" height="30" rx="4" fill="#ffcdd2"/>
  <text x="590" y="445" font-size="10" text-anchor="middle" fill="#1a1a1a">← Drop lowest priority first when overloaded →</text>
  
  <!-- Concurrency Control -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Adaptive Concurrency Control — Little&apos;s Law</text>
  
  <rect x="55" y="515" width="340" height="50" rx="6" fill="#e1bee7"/>
  <text x="225" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Concurrency = Throughput × Latency</text>
  <text x="225" y="555" font-size="9" text-anchor="middle" fill="#666666">If throughput=1000/s, latency=10ms → optimal concurrency=10</text>
  
  <rect x="415" y="515" width="330" height="50" rx="6" fill="#e1bee7"/>
  <text x="580" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Adaptive Adjustment</text>
  <text x="580" y="555" font-size="9" text-anchor="middle" fill="#666666">Latency increases → reduce concurrency → prevent queue buildup</text>
  
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f44336"/>
    </marker>
  </defs>
</svg>
