<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="logArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Centralized Logging Architecture</text>
  
  <!-- Logging Pipeline -->
  <rect x="50" y="60" width="900" height="180" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  
  <!-- Log Sources -->
  <rect x="70" y="90" width="120" height="120" rx="6" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="2"/>
  <text x="130" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-blue, #3b82f6)">Log Sources</text>
  
  <rect x="80" y="140" width="100" height="25" rx="2" fill="var(--bg-blue, #3b82f6)"/>
  <text x="130" y="157" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Applications</text>
  
  <rect x="80" y="170" width="100" height="25" rx="2" fill="var(--bg-blue, #3b82f6)"/>
  <text x="130" y="187" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">System Logs</text>
  
  <rect x="80" y="200" width="100" height="25" rx="2" fill="var(--bg-blue, #3b82f6)"/>
  <text x="130" y="217" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Network Devices</text>
  
  <!-- Collectors -->
  <line x1="190" y1="150" x2="220" y2="150" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#logArrow)"/>
  
  <rect x="220" y="90" width="150" height="120" rx="6" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="295" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Log Collectors</text>
  
  <rect x="230" y="140" width="130" height="25" rx="2" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="295" y="157" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Filebeat/Fluentd</text>
  
  <rect x="230" y="170" width="130" height="25" rx="2" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="295" y="187" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Vector</text>
  
  <rect x="230" y="200" width="130" height="25" rx="2" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="295" y="217" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Logstash</text>
  
  <!-- Aggregator -->
  <line x1="370" y1="150" x2="400" y2="150" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#logArrow)"/>
  
  <rect x="400" y="90" width="180" height="120" rx="6" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="2"/>
  <text x="490" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-orange, #f97316)">Log Aggregator</text>
  
  <rect x="410" y="140" width="160" height="25" rx="2" fill="var(--bg-orange, #f97316)"/>
  <text x="490" y="157" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Parse &amp; Transform</text>
  
  <rect x="410" y="170" width="160" height="25" rx="2" fill="var(--bg-orange, #f97316)"/>
  <text x="490" y="187" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Enrich (geo, user)</text>
  
  <rect x="410" y="200" width="160" height="25" rx="2" fill="var(--bg-orange, #f97316)"/>
  <text x="490" y="217" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Filter &amp; Route</text>
  
  <!-- Storage -->
  <line x1="580" y1="150" x2="610" y2="150" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#logArrow)"/>
  
  <rect x="610" y="90" width="180" height="120" rx="6" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="700" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-green, #22c55e)">Log Storage</text>
  
  <rect x="620" y="140" width="160" height="25" rx="2" fill="var(--bg-green, #22c55e)"/>
  <text x="700" y="157" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Elasticsearch</text>
  
  <rect x="620" y="170" width="160" height="25" rx="2" fill="var(--bg-green, #22c55e)"/>
  <text x="700" y="187" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Grafana Loki</text>
  
  <rect x="620" y="200" width="160" height="25" rx="2" fill="var(--bg-green, #22c55e)"/>
  <text x="700" y="217" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">S3 (archival)</text>
  
  <!-- Visualization -->
  <line x1="790" y1="150" x2="820" y2="150" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#logArrow)"/>
  
  <rect x="820" y="90" width="110" height="120" rx="6" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="875" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-red, #ef4444)">Visualization</text>
  <text x="875" y="165" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Kibana</text>
  <text x="875" y="185" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Grafana</text>
  <text x="875" y="205" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Dashboards</text>
  
  <!-- Structured vs Unstructured -->
  <rect x="50" y="260" width="450" height="180" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Structured vs Unstructured Logging</text>
  
  <rect x="70" y="305" width="190" height="125" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="165" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#ef4444">Unstructured (Bad)</text>
  <text x="80" y="355" font-size="8" fill="var(--text-secondary, #47556ird">2024-01-15 ERROR User john</text>
  <text x="80" y="370" font-size="8" fill="var(--text-secondary, #47556ird">failed login from 192.168.1.1</text>
  <text x="80" y="395" font-size="8" fill="#ef4444">✗ Hard to query</text>
  <text x="80" y="412" font-size="8" fill="#ef4444">✗ Parsing required</text>
  
  <rect x="280" y="305" width="200" height="125" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="380" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">Structured (Good)</text>
  <text x="290" y="350" font-size="7" fill="var(--text-secondary, #47556ird">{"timestamp":"2024-01-15T...",</text>
  <text x="290" y="365" font-size="7" fill="var(--text-secondary, #47556ird">"level":"ERROR",</text>
  <text x="290" y="380" font-size="7" fill="var(--text-secondary, #47556ird">"event":"login_failed",</text>
  <text x="290" y="395" font-size="7" fill="var(--text-secondary, #47556ird">"user":"john", "ip":"192..."}</text>
  <text x="290" y="412" font-size="8" fill="#22c55e">✓ Queryable</text>
  <text x="290" y="429" font-size="8" fill="#22c55e">✓ Machine-parseable</text>
  
  <!-- Log Retention -->
  <rect x="520" y="260" width="430" height="180" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Log Retention Strategy</text>
  
  <rect x="540" y="305" width="190" height="55" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="635" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-blue, #3b82f6)">Hot Storage</text>
  <text x="635" y="350" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">0-30 days</text>
  <text x="635" y="365" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Fast search (SSD)</text>
  
  <rect x="540" y="370" width="190" height="55" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="635" y="395" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-orange, #f97316)">Warm Storage</text>
  <text x="635" y="415" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">30-90 days</text>
  <text x="635" y="430" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Slower search (HDD)</text>
  
  <rect x="750" y="305" width="180" height="55" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="840" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Cold Storage</text>
  <text x="840" y="350" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">90 days - 1 year</text>
  <text x="840" y="365" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Archive (S3 Glacier)</text>
  
  <rect x="750" y="370" width="180" height="55" rx="3" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="840" y="395" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-red, #ef4444">Delete</text>
  <text x="840" y="415" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">After 1 year</text>
  <text x="840" y="430" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">(compliance dependent)</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Use structured logging (JSON) with correlation IDs for distributed tracing.</text>
</svg>
