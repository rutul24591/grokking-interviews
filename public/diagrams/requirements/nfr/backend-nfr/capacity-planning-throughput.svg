<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Capacity Planning Throughput</text>
  
  <!-- Little's Law -->
  <rect x="40" y="70" width="340" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Little&apos;s Law</text>
  <text x="210" y="140" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Throughput = Concurrency / Latency</text>
  <text x="210" y="170" font-size="12" text-anchor="middle" fill="#666666">If 100 concurrent requests with 10ms latency:</text>
  <text x="210" y="190" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">100 / 0.01 = 10,000 RPS</text>
  <text x="210" y="215" font-size="11" text-anchor="middle" fill="#666666">Foundation for capacity planning</text>
  
  <!-- Capacity Scaling -->
  <rect x="420" y="70" width="340" height="160" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Scaling Options</text>
  <text x="590" y="130" font-size="11" text-anchor="middle" fill="#666666">To increase throughput:</text>
  <text x="590" y="155" font-size="11" text-anchor="middle" fill="#1a1a1a">1. Increase concurrency (add servers)</text>
  <text x="590" y="175" font-size="11" text-anchor="middle" fill="#1a1a1a">2. Decrease latency (optimize code)</text>
  <text x="590" y="195" font-size="11" text-anchor="middle" fill="#1a1a1a">3. Both (horizontal scaling + optimization)</text>
  <text x="590" y="215" font-size="11" text-anchor="middle" fill="#4caf50">Most effective combination</text>
  
  <!-- Capacity Growth Chart -->
  <rect x="40" y="260" width="720" height="180" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="290" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Capacity Growth Projection</text>
  
  <!-- Y axis -->
  <line x1="100" y1="320" x2="100" y2="410" stroke="#666666" stroke-width="2"/>
  <text x="80" y="325" font-size="10" text-anchor="middle" fill="#666666">50K RPS</text>
  <text x="80" y="365" font-size="10" text-anchor="middle" fill="#666666">25K RPS</text>
  <text x="80" y="410" font-size="10" text-anchor="middle" fill="#666666">0</text>
  
  <!-- X axis -->
  <line x1="100" y1="410" x2="700" y2="410" stroke="#666666" stroke-width="2"/>
  <text x="150" y="425" font-size="10" text-anchor="middle" fill="#666666">Today</text>
  <text x="300" y="425" font-size="10" text-anchor="middle" fill="#666666">3 mo</text>
  <text x="450" y="425" font-size="10" text-anchor="middle" fill="#666666">6 mo</text>
  <text x="600" y="425" font-size="10" text-anchor="middle" fill="#666666">12 mo</text>
  
  <!-- Traffic growth line -->
  <polyline points="150,395 300,375 450,345 600,300" fill="none" stroke="#2196f3" stroke-width="3"/>
  
  <!-- Capacity line -->
  <polyline points="150,380 300,350 450,320 600,280" fill="none" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Current capacity point -->
  <circle cx="150" cy="380" r="5" fill="#4caf50"/>
  <text x="150" y="370" font-size="9" text-anchor="middle" fill="#4caf50">Current: 10K RPS</text>
  
  <!-- Scale needed point -->
  <circle cx="450" cy="320" r="5" fill="#f44336"/>
  <text x="450" y="310" font-size="9" text-anchor="middle" fill="#f44336">Scale needed</text>
  
  <!-- Future projection -->
  <circle cx="600" cy="280" r="5" fill="#2196f3"/>
  <text x="600" y="270" font-size="9" text-anchor="middle" fill="#2196f3">Projected: 40K RPS</text>
  
  <!-- Scaling Recommendations -->
  <rect x="40" y="470" width="220" height="110" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="150" y="500" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Short Term (3 mo)</text>
  <text x="150" y="525" font-size="10" text-anchor="middle" fill="#666666">Optimize: reduce latency</text>
  <text x="150" y="545" font-size="10" text-anchor="middle" fill="#666666">Target: 15K RPS</text>
  <text x="150" y="565" font-size="10" text-anchor="middle" fill="#4caf50">Low cost, quick win</text>
  
  <rect x="290" y="470" width="220" height="110" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="500" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Medium Term (6 mo)</text>
  <text x="400" y="525" font-size="10" text-anchor="middle" fill="#666666">Scale: add 2 servers</text>
  <text x="400" y="545" font-size="10" text-anchor="middle" fill="#666666">Target: 25K RPS</text>
  <text x="400" y="565" font-size="10" text-anchor="middle" fill="#f57c00">Moderate cost</text>
  
  <rect x="540" y="470" width="220" height="110" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="650" y="500" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Long Term (12 mo)</text>
  <text x="650" y="525" font-size="10" text-anchor="middle" fill="#666666">Scale: add 6 servers total</text>
  <text x="650" y="545" font-size="10" text-anchor="middle" fill="#666666">Target: 50K RPS</text>
  <text x="650" y="565" font-size="10" text-anchor="middle" fill="#d84315">Higher cost, plan now</text>
</svg>
