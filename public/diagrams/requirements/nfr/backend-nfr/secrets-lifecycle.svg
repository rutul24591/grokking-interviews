<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="secretArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Secrets Management Best Practices</text>
  
  <!-- Secrets Lifecycle -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Secrets Lifecycle</text>
  
  <!-- Generation -->
  <rect x="70" y="110" width="100" height="60" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="120" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">1. Generate</text>
  <text x="120" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Strong random</text>
  <text x="120" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">256-bit keys</text>
  
  <line x1="170" y1="140" x2="200" y2="140" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#secretArrow)"/>
  
  <!-- Storage -->
  <rect x="200" y="110" width="100" height="60" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="250" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">2. Store</text>
  <text x="250" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Encrypted at rest</text>
  <text x="250" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Access controlled</text>
  
  <line x1="300" y1="140" x2="330" y2="140" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#secretArrow)"/>
  
  <!-- Distribution -->
  <rect x="330" y="110" width="100" height="60" rx="4" fill="var(--bg-orange, #f97316)"/>
  <text x="380" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">3. Distribute</text>
  <text x="380" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Secure channel</text>
  <text x="380" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">TLS/mTLS</text>
  
  <line x1="380" y1="170" x2="380" y2="200" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#secretArrow)"/>
  
  <!-- Rotation -->
  <rect x="330" y="200" width="100" height="60" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="380" y="225" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">4. Rotate</text>
  <text x="380" y="245" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Every 90 days</text>
  <text x="380" y="258" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Or on compromise</text>
  
  <path d="M 330 230 L 200 230 L 200 175" stroke="var(--border-accent, #3b82f6)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="250" y="220" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Continuous cycle</text>
  
  <!-- Anti-Patterns -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Never Do These</text>
  
  <rect x="540" y="110" width="390" height="35" rx="3" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="560" y="132" text-anchor="start" font-size="9" fill="#ef4444" font-weight="bold">✗ Commit secrets to Git</text>
  <text x="750" y="132" text-anchor="start" font-size="8" fill="var(--text-secondary, #47556ird">Even in private repos</text>
  
  <rect x="540" y="150" width="390" height="35" rx="3" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="560" y="172" text-anchor="start" font-size="9" fill="#ef4444" font-weight="bold">✗ Hardcode in source</text>
  <text x="750" y="172" text-anchor="start" font-size="8" fill="var(--text-secondary, #47556ird">Config files, environment</text>
  
  <rect x="540" y="190" width="390" height="35" rx="3" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="560" y="212" text-anchor="start" font-size="9" fill="#ef4444" font-weight="bold">✗ Share via chat/email</text>
  <text x="750" y="212" text-anchor="start" font-size="8" fill="var(--text-secondary, #47556ird">Slack, email, tickets</text>
  
  <!-- Secret Types -->
  <rect x="50" y="300" width="450" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Types of Secrets</text>
  
  <rect x="70" y="345" width="170" height="40" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="155" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Database Credentials</text>
  <text x="155" y="382" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Username, password, host</text>
  
  <rect x="260" y="345" width="170" height="40" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="345" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">API Keys &amp; Tokens</text>
  <text x="345" y="382" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Third-party service keys</text>
  
  <rect x="70" y="395" width="170" height="40" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="155" y="415" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Encryption Keys</text>
  <text x="155" y="432" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Symmetric, asymmetric</text>
  
  <rect x="260" y="395" width="170" height="40" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="345" y="415" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">TLS Certificates</text>
  <text x="345" y="432" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">SSL/TLS certs, private keys</text>
  
  <!-- Tools Comparison -->
  <rect x="520" y="220" width="430" height="110" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Secrets Management Tools</text>
  
  <rect x="540" y="265" width="120" height="55" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="600" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">HashiCorp Vault</text>
  <text x="600" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Self-hosted</text>
  
  <rect x="680" y="265" width="120" height="55" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="740" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">AWS Secrets Manager</text>
  <text x="740" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Managed, AWS-native</text>
  
  <rect x="820" y="265" width="120" height="55" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="880" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Azure Key Vault</text>
  <text x="880" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Managed, Azure-native</text>
  
  <text x="500" y="360" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Use dedicated secrets manager, never store secrets in code or config files.</text>
</svg>
