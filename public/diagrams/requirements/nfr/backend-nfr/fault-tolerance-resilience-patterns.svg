<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Fault Tolerance & Resilience Patterns</text>
  
  <!-- Circuit Breaker -->
  <rect x="40" y="60" width="340" height="170" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Circuit Breaker Pattern</text>
  
  <rect x="55" y="105" width="95" height="55" rx="6" fill="#bbdefb"/>
  <text x="102" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CLOSED</text>
  <text x="102" y="145" font-size="9" text-anchor="middle" fill="#666666">Normal operation</text>
  <text x="102" y="158" font-size="9" text-anchor="middle" fill="#666666">Requests flow through</text>
  
  <line x1="150" y1="132" x2="190" y2="132" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="190" y="105" width="95" height="55" rx="6" fill="#ffebee"/>
  <text x="237" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">OPEN</text>
  <text x="237" y="145" font-size="9" text-anchor="middle" fill="#666666">Failures detected</text>
  <text x="237" y="158" font-size="9" text-anchor="middle" fill="#666666">Requests rejected</text>
  
  <line x1="285" y1="132" x2="325" y2="132" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="325" y="105" width="45" height="55" rx="6" fill="#fff3e0"/>
  <text x="347" y="125" font-size="9" font-weight="bold" text-anchor="middle" fill="#1a1a1a">HALF</text>
  <text x="347" y="140" font-size="9" font-weight="bold" text-anchor="middle" fill="#1a1a1a">OPEN</text>
  <text x="347" y="158" font-size="9" text-anchor="middle" fill="#666666">Testing</text>
  
  <text x="210" y="185" font-size="10" text-anchor="middle" fill="#666666">Failure threshold → OPEN → Sleep timeout → HALF-OPEN → Success → CLOSED</text>
  <text x="210" y="205" font-size="10" text-anchor="middle" fill="#666666">Fallback: cached data, default response, graceful error</text>
  <text x="210" y="225" font-size="10" text-anchor="middle" fill="#666666">Config: failure threshold, timeout, success threshold</text>
  
  <!-- Retry Patterns -->
  <rect x="420" y="60" width="340" height="170" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Retry Patterns</text>
  
  <rect x="435" y="105" width="150" height="45" rx="6" fill="#a5d6a7"/>
  <text x="510" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Exponential Backoff</text>
  <text x="510" y="143" font-size="9" text-anchor="middle" fill="#666666">1s → 2s → 4s → 8s → 16s</text>
  
  <rect x="605" y="105" width="140" height="45" rx="6" fill="#a5d6a7"/>
  <text x="675" y="125" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">With Jitter</text>
  <text x="675" y="143" font-size="9" text-anchor="middle" fill="#666666">Prevents retry storms</text>
  
  <rect x="435" y="160" width="310" height="55" rx="6" fill="#e8f5e9"/>
  <text x="590" y="180" font-size="10" text-anchor="middle" fill="#1a1a1a">Config: max retries, base delay, max delay, retryable errors</text>
  <text x="590" y="200" font-size="10" text-anchor="middle" fill="#666666">Idempotent operations only — non-idempotent retries cause duplication</text>
  <text x="590" y="218" font-size="10" text-anchor="middle" fill="#666666">Budget: total retry time must be less than request timeout</text>
  
  <!-- Bulkhead Pattern -->
  <rect x="40" y="260" width="340" height="170" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="210" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Bulkhead Pattern</text>
  
  <rect x="55" y="305" width="95" height="110" rx="6" fill="#ffe0b2"/>
  <text x="102" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pool A</text>
  <text x="102" y="345" font-size="9" text-anchor="middle" fill="#666666">Service 1</text>
  <text x="102" y="365" font-size="9" text-anchor="middle" fill="#666666">10 threads</text>
  <text x="102" y="385" font-size="9" text-anchor="middle" fill="#666666">Isolated pool</text>
  <text x="102" y="405" font-size="9" text-anchor="middle" fill="#666666">Failure contained</text>
  
  <rect x="170" y="305" width="95" height="110" rx="6" fill="#ffe0b2"/>
  <text x="217" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pool B</text>
  <text x="217" y="345" font-size="9" text-anchor="middle" fill="#666666">Service 2</text>
  <text x="217" y="365" font-size="9" text-anchor="middle" fill="#666666">10 threads</text>
  <text x="217" y="385" font-size="9" text-anchor="middle" fill="#666666">Isolated pool</text>
  <text x="217" y="405" font-size="9" text-anchor="middle" fill="#666666">Failure contained</text>
  
  <rect x="285" y="305" width="80" height="110" rx="6" fill="#ffe0b2"/>
  <text x="325" y="325" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pool C</text>
  <text x="325" y="345" font-size="9" text-anchor="middle" fill="#666666">Service 3</text>
  <text x="325" y="365" font-size="9" text-anchor="middle" fill="#666666">5 threads</text>
  <text x="325" y="385" font-size="9" text-anchor="middle" fill="#666666">Isolated pool</text>
  <text x="325" y="405" font-size="9" text-anchor="middle" fill="#666666">Failure contained</text>
  
  <text x="210" y="425" font-size="10" text-anchor="middle" fill="#666666">Each service gets isolated thread/connection pool — prevents cascade</text>
  
  <!-- Graceful Degradation -->
  <rect x="420" y="260" width="340" height="170" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="590" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Graceful Degradation</text>
  
  <rect x="435" y="305" width="310" height="35" rx="4" fill="#e1bee7"/>
  <text x="590" y="328" font-size="10" text-anchor="middle" fill="#1a1a1a">Full System → All features operational</text>
  
  <rect x="435" y="345" width="310" height="35" rx="4" fill="#f3e5f5"/>
  <text x="590" y="368" font-size="10" text-anchor="middle" fill="#666666">Partial Degradation → Disable non-critical features</text>
  
  <rect x="435" y="385" width="310" height="35" rx="4" fill="#f3e5f5"/>
  <text x="590" y="408" font-size="10" text-anchor="middle" fill="#666666">Severe Degradation → Core features only, serve stale data</text>
  
  <text x="590" y="430" font-size="10" text-anchor="middle" fill="#666666">Feature tiers: Critical → Important → Nice-to-have → Experimental</text>
  
  <!-- Defense in Depth -->
  <rect x="40" y="460" width="720" height="120" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="490" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Defense in Depth — Layered Resilience</text>
  
  <rect x="55" y="505" width="165" height="60" rx="6" fill="#e3f2fd"/>
  <text x="137" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Layer 1: Prevent</text>
  <text x="137" y="545" font-size="9" text-anchor="middle" fill="#666666">Circuit breakers, rate limits</text>
  <text x="137" y="560" font-size="9" text-anchor="middle" fill="#666666">Timeouts, bulkheads</text>
  
  <rect x="240" y="505" width="165" height="60" rx="6" fill="#c8e6c9"/>
  <text x="322" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Layer 2: Detect</text>
  <text x="322" y="545" font-size="9" text-anchor="middle" fill="#666666">Health checks, anomaly detection</text>
  <text x="322" y="560" font-size="9" text-anchor="middle" fill="#666666">Error rate monitoring</text>
  
  <rect x="425" y="505" width="165" height="60" rx="6" fill="#fff3e0"/>
  <text x="507" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Layer 3: Contain</text>
  <text x="507" y="545" font-size="9" text-anchor="middle" fill="#666666">Fallback responses</text>
  <text x="507" y="560" font-size="9" text-anchor="middle" fill="#666666">Load shedding, queuing</text>
  
  <rect x="610" y="505" width="135" height="60" rx="6" fill="#ffebee"/>
  <text x="677" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Layer 4: Recover</text>
  <text x="677" y="545" font-size="9" text-anchor="middle" fill="#666666">Retries, failover</text>
  <text x="677" y="560" font-size="9" text-anchor="middle" fill="#666666">Rollback, healing</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
