<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="dataMigArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Zero-Downtime Migration Strategies</text>
  
  <!-- Expand-Contract Pattern -->
  <rect x="50" y="60" width="450" height="250" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Expand-Contract Pattern</text>
  
  <!-- Phase 1: Expand -->
  <rect x="70" y="110" width="100" height="70" rx="4" fill="#3b82f6"/>
  <text x="120" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">1. Expand</text>
  <text x="120" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Add new column</text>
  <text x="120" y="170" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Write to both</text>
  
  <line x1="170" y1="145" x2="200" y2="145" stroke="#3b82f6" stroke-width="2" marker-end="url(#dataMigArrow)"/>
  
  <!-- Phase 2: Migrate -->
  <rect x="200" y="110" width="100" height="70" rx="4" fill="#8b5cf6"/>
  <text x="250" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">2. Migrate</text>
  <text x="250" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Backfill data</text>
  <text x="250" y="170" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Batch updates</text>
  
  <line x1="300" y1="145" x2="330" y2="145" stroke="#3b82f6" stroke-width="2" marker-end="url(#dataMigArrow)"/>
  
  <!-- Phase 3: Contract -->
  <rect x="330" y="110" width="100" height="70" rx="4" fill="#22c55e"/>
  <text x="380" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">3. Contract</text>
  <text x="380" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Read from new</text>
  <text x="380" y="170" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Drop old column</text>
  
  <!-- Database visualization -->
  <rect x="70" y="200" width="360" height="100" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="250" y="225" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a">Database Schema Evolution</text>
  
  <rect x="90" y="235" width="100" height="55" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="255" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-primary, #0f172a">Before</text>
  <text x="140" y="275" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">id, email_old</text>
  <text x="140" y="287" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">name, created_at</text>
  
  <line x1="200" y1="262" x2="210" y2="262" stroke="#3b82f6" stroke-width="2"/>
  
  <rect x="210" y="235" width="100" height="55" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="260" y="255" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--border-blue, #3b82f6">Expand</text>
  <text x="260" y="275" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">+ email_new</text>
  <text x="260" y="287" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">(nullable)</text>
  
  <line x1="320" y1="262" x2="330" y2="262" stroke="#3b82f6" stroke-width="2"/>
  
  <rect x="330" y="235" width="90" height="55" rx="3" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="375" y="255" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--border-green, #22c55e">Contract</text>
  <text x="375" y="275" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">- email_old</text>
  <text x="375" y="287" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">✓ email_new</text>
  
  <text x="275" y="335" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Zero downtime</text>
  <text x="275" y="352" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Backward compatible</text>
  <text x="275" y="369" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Requires dual writes during transition</text>
  
  <!-- Dual Write Pattern -->
  <rect x="520" y="60" width="430" height="160" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Dual Write Pattern</text>
  
  <!-- Application -->
  <rect x="540" y="110" width="100" height="50" rx="4" fill="#3b82f6"/>
  <text x="590" y="140" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff">Application</text>
  
  <line x1="640" y1="135" x2="670" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#dataMigArrow)"/>
  <text x="655" y="125" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Write</text>
  
  <line x1="640" y1="145" x2="670" y2="165" stroke="#3b82f6" stroke-width="2" marker-end="url(#dataMigArrow)"/>
  <text x="655" y="160" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Write</text>
  
  <!-- Old Schema -->
  <rect x="670" y="110" width="110" height="50" rx="4" fill="#8b5cf6" opacity="0.5"/>
  <text x="725" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Old Schema</text>
  <text x="725" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">During transition</text>
  
  <!-- New Schema -->
  <rect x="670" y="170" width="110" height="50" rx="4" fill="#22c55e"/>
  <text x="725" y="195" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">New Schema</text>
  <text x="725" y="212" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Target schema</text>
  
  <text x="735" y="250" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Both writes succeed before completing</text>
  <text x="735" y="267" text-anchor="middle" font-size="9" fill="#ef4444">✗ Risk of inconsistency if one fails</text>
  
  <!-- Migration Checklist -->
  <rect x="520" y="240" width="430" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Migration Checklist</text>
  
  <text x="540" y="295" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="295" font-size="8" fill="var(--text-secondary, #47556ird">Test on production-sized dataset</text>
  
  <text x="540" y="315" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="315" font-size="8" fill="var(--text-secondary, #47556ird">Implement rollback procedure</text>
  
  <text x="540" y="335" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="335" font-size="8" fill="var(--text-secondary, #47556ird">Monitor replication lag during backfill</text>
  
  <text x="540" y="355" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="355" font-size="8" fill="var(--text-secondary, #47556ird">Use feature flags for gradual rollout</text>
  
  <text x="540" y="375" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="375" font-size="8" fill="var(--text-secondary, #47556ird">Batch backfill to avoid table locks</text>
  
  <text x="540" y="395" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="395" font-size="8" fill="var(--text-secondary, #47556ird">Verify data consistency before cutover</text>
  
  <text x="735" y="420" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Test migrations thoroughly. Have rollback plan. Monitor throughout transition.</text>
</svg>
