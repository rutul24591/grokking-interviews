<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Data Migration Strategies</text>
  
  <!-- Expand-Contract Pattern -->
  <rect x="40" y="70" width="720" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Expand-Contract Pattern (Zero Downtime)</text>
  
  <rect x="55" y="115" width="160" height="100" rx="6" fill="#bbdefb"/>
  <text x="135" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Expand</text>
  <text x="135" y="155" font-size="9" text-anchor="middle" fill="#666666">Add new columns</text>
  <text x="135" y="170" font-size="9" text-anchor="middle" fill="#666666">Create triggers</text>
  <text x="135" y="185" font-size="9" text-anchor="middle" fill="#666666">Backward compatible</text>
  <text x="135" y="200" font-size="9" text-anchor="middle" fill="#666666">Old app works</text>
  
  <rect x="235" y="115" width="160" height="100" rx="6" fill="#bbdefb"/>
  <text x="315" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Backfill</text>
  <text x="315" y="155" font-size="9" text-anchor="middle" fill="#666666">Migrate existing data</text>
  <text x="315" y="170" font-size="9" text-anchor="middle" fill="#666666">Controlled rate</text>
  <text x="315" y="185" font-size="9" text-anchor="middle" fill="#666666">Can pause/resume</text>
  <text x="315" y="200" font-size="9" text-anchor="middle" fill="#666666">App runs normally</text>
  
  <rect x="415" y="115" width="160" height="100" rx="6" fill="#bbdefb"/>
  <text x="495" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Deploy</text>
  <text x="495" y="155" font-size="9" text-anchor="middle" fill="#666666">New app version</text>
  <text x="495" y="170" font-size="9" text-anchor="middle" fill="#666666">Uses new format</text>
  <text x="495" y="185" font-size="9" text-anchor="middle" fill="#666666">Dual-write during transition</text>
  <text x="495" y="200" font-size="9" text-anchor="middle" fill="#666666">Old app still works</text>
  
  <rect x="595" y="115" width="150" height="100" rx="6" fill="#c8e6c9"/>
  <text x="670" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Contract</text>
  <text x="670" y="155" font-size="9" text-anchor="middle" fill="#666666">Remove old format</text>
  <text x="670" y="170" font-size="9" text-anchor="middle" fill="#666666">Drop old columns</text>
  <text x="670" y="185" font-size="9" text-anchor="middle" fill="#666666">Disable triggers</text>
  <text x="670" y="200" font-size="9" text-anchor="middle" fill="#666666">Migration complete</text>
  
  <!-- Migration Patterns -->
  <rect x="40" y="260" width="720" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="290" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Migration Patterns Comparison</text>
  
  <rect x="55" y="305" width="220" height="120" rx="6" fill="#a5d6a7"/>
  <text x="165" y="325" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Online Migration</text>
  <text x="165" y="345" font-size="9" text-anchor="middle" fill="#666666">Dual-write to old + new</text>
  <text x="165" y="363" font-size="9" text-anchor="middle" fill="#666666">Verify consistency</text>
  <text x="165" y="381" font-size="9" text-anchor="middle" fill="#666666">Cutover reads to new</text>
  <text x="165" y="399" font-size="9" text-anchor="middle" fill="#666666">Decommission old</text>
  <text x="165" y="420" font-size="9" text-anchor="middle" fill="#4caf50">✓ Zero downtime, ✓ Zero data loss</text>
  
  <rect x="295" y="305" width="220" height="120" rx="6" fill="#a5d6a7"/>
  <text x="405" y="325" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CDC-Based Migration</text>
  <text x="405" y="345" font-size="9" text-anchor="middle" fill="#666666">Capture change events</text>
  <text x="405" y="363" font-size="9" text-anchor="middle" fill="#666666">Replay on new system</text>
  <text x="405" y="381" font-size="9" text-anchor="middle" fill="#666666">Near-real-time sync</text>
  <text x="405" y="399" font-size="9" text-anchor="middle" fill="#666666">Minimal write overhead</text>
  <text x="405" y="420" font-size="9" text-anchor="middle" fill="#4caf50">✓ Continuous replication</text>
  
  <rect x="535" y="305" width="210" height="120" rx="6" fill="#a5d6a7"/>
  <text x="640" y="325" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Offline Migration</text>
  <text x="640" y="345" font-size="9" text-anchor="middle" fill="#666666">Stop writes, export data</text>
  <text x="640" y="363" font-size="9" text-anchor="middle" fill="#666666">Transform and import</text>
  <text x="640" y="381" font-size="9" text-anchor="middle" fill="#666666">Switch to new system</text>
  <text x="640" y="399" font-size="9" text-anchor="middle" fill="#666666">Simple but requires downtime</text>
  <text x="640" y="420" font-size="9" text-anchor="middle" fill="#f57c00">⚠ Downtime required</text>
  
  <!-- Rollback Strategy -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Migration Rollback Strategy</text>
  
  <rect x="55" y="515" width="220" height="50" rx="6" fill="#ffe0b2"/>
  <text x="165" y="535" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Schema Rollback</text>
  <text x="165" y="555" font-size="9" text-anchor="middle" fill="#666666">Deploy old app, reverse schema change</text>
  
  <rect x="295" y="515" width="220" height="50" rx="6" fill="#ffe0b2"/>
  <text x="405" y="535" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Data Rollback</text>
  <text x="405" y="555" font-size="9" text-anchor="middle" fill="#666666">Switch reads back to old system</text>
  
  <rect x="535" y="515" width="210" height="50" rx="6" fill="#ffe0b2"/>
  <text x="640" y="535" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Verification</text>
  <text x="640" y="555" font-size="9" text-anchor="middle" fill="#666666">Verify data consistency after rollback</text>
</svg>
