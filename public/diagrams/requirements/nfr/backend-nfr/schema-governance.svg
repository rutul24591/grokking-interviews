<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="schemaArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Schema Governance &amp; Evolution</text>
  
  <!-- Schema Registry -->
  <rect x="50" y="60" width="450" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Schema Registry</text>
  
  <!-- Producers -->
  <rect x="70" y="110" width="100" height="50" rx="4" fill="#3b82f6"/>
  <text x="120" y="140" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff">Producers</text>
  
  <line x1="170" y1="135" x2="200" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#schemaArrow)"/>
  <text x="185" y="125" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Register</text>
  
  <!-- Registry -->
  <rect x="200" y="110" width="120" height="50" rx="4" fill="#8b5cf6"/>
  <text x="260" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">Schema Registry</text>
  <text x="260" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Version store</text>
  
  <line x1="320" y1="135" x2="350" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#schemaArrow)"/>
  <text x="335" y="125" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Validate</text>
  
  <!-- Consumers -->
  <rect x="350" y="110" width="100" height="50" rx="4" fill="#22c55e"/>
  <text x="400" y="140" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff">Consumers</text>
  
  <text x="275" y="185" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Centralized schema management</text>
  <text x="275" y="202" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Compatibility checking</text>
  <text x="275" y="219" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Version tracking</text>
  
  <!-- Compatibility Types -->
  <rect x="520" y="60" width="430" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Compatibility Types</text>
  
  <rect x="540" y="110" width="190" height="55" rx="3" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-green, #22c55e">BACKWARD</text>
  <text x="635" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">New reads old data</text>
  
  <rect x="540" y="175" width="190" height="55" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="635" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-blue, #3b82f6">FORWARD</text>
  <text x="635" y="220" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Old reads new data</text>
  
  <rect x="750" y="110" width="180" height="55" rx="3" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-purple, #8b5cf6">FULL</text>
  <text x="840" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Both directions</text>
  
  <rect x="750" y="175" width="180" height="55" rx="3" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="840" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-red, #ef4444">NONE</text>
  <text x="840" y="220" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">No checking</text>
  
  <!-- Schema Evolution -->
  <rect x="50" y="260" width="450" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Safe Schema Changes</text>
  
  <text x="70" y="315" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="315" font-size="9" fill="var(--text-secondary, #47556ird">Adding optional fields</text>
  
  <text x="70" y="335" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="335" font-size="9" fill="var(--text-secondary, #47556ird">Adding new event types</text>
  
  <text x="70" y="355" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="355" font-size="9" fill="var(--text-secondary, #47556ird">Deprecating fields (don't remove)</text>
  
  <text x="270" y="315" font-size="9" fill="#ef4444">✗</text>
  <text x="285" y="315" font-size="9" fill="var(--text-secondary, #47556ird">Removing fields</text>
  
  <text x="270" y="335" font-size="9" fill="#ef4444">✗</text>
  <text x="285" y="335" font-size="9" fill="var(--text-secondary, #47556ird">Changing field types</text>
  
  <text x="270" y="355" font-size="9" fill="#ef4444">✗</text>
  <text x="285" y="355" font-size="9" fill="var(--text-secondary, #47556ird">Renaming fields</text>
  
  <!-- Database Migration -->
  <rect x="520" y="260" width="430" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Database Schema Migration</text>
  
  <text x="540" y="315" font-size="9" fill="var(--text-secondary, #47556ird">1. Add new column (nullable)</text>
  <text x="540" y="335" font-size="9" fill="var(--text-secondary, #47556ird">2. Deploy code writing to both</text>
  <text x="540" y="355" font-size="9" fill="var(--text-secondary, #47556ird">3. Backfill old data to new</text>
  <text x="540" y="375" font-size="9" fill="var(--text-secondary, #47556ird">4. Deploy code reading from new</text>
  <text x="540" y="395" font-size="9" fill="var(--text-secondary, #47556ird">5. Remove old column</text>
  
  <text x="735" y="425" text-anchor="middle" font-size="8" fill="var(--border-green, #22c55e" font-weight="bold">Expand-Contract Pattern (Zero Downtime)</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Use schema registry for events. Use expand-contract for database migrations.</text>
</svg>
