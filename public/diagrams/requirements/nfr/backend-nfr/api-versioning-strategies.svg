<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">API Versioning Strategies & Routing</text>
  
  <!-- URL Versioning -->
  <rect x="40" y="70" width="220" height="170" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="150" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">URL Versioning</text>
  
  <rect x="55" y="115" width="190" height="35" rx="4" fill="#bbdefb"/>
  <text x="150" y="138" font-size="10" text-anchor="middle" fill="#1a1a1a">GET /api/v1/users</text>
  
  <rect x="55" y="155" width="190" height="35" rx="4" fill="#bbdefb"/>
  <text x="150" y="178" font-size="10" text-anchor="middle" fill="#1a1a1a">GET /api/v2/users</text>
  
  <rect x="55" y="195" width="190" height="35" rx="4" fill="#bbdefb"/>
  <text x="150" y="218" font-size="10" text-anchor="middle" fill="#1a1a1a">GET /api/v3/users</text>
  
  <text x="150" y="248" font-size="9" text-anchor="middle" fill="#666666">✓ Simple, discoverable</text>
  <text x="150" y="263" font-size="9" text-anchor="middle" fill="#666666">✗ Pollutes URL namespace</text>
  
  <!-- Header Versioning -->
  <rect x="290" y="70" width="220" height="170" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Header Versioning</text>
  
  <rect x="305" y="115" width="190" height="35" rx="4" fill="#a5d6a7"/>
  <text x="400" y="138" font-size="9" text-anchor="middle" fill="#1a1a1a">GET /api/users</text>
  <text x="400" y="153" font-size="8" text-anchor="middle" fill="#666666">API-Version: 2024-01-01</text>
  
  <rect x="305" y="165" width="190" height="35" rx="4" fill="#a5d6a7"/>
  <text x="400" y="188" font-size="9" text-anchor="middle" fill="#1a1a1a">GET /api/users</text>
  <text x="400" y="203" font-size="8" text-anchor="middle" fill="#666666">API-Version: 2023-10-01</text>
  
  <text x="400" y="228" font-size="9" text-anchor="middle" fill="#666666">✓ Clean URLs, dynamic switching</text>
  <text x="400" y="243" font-size="9" text-anchor="middle" fill="#666666">✗ Harder to test, CDN issues</text>
  
  <!-- Content Negotiation -->
  <rect x="540" y="70" width="220" height="170" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="650" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Content Negotiation</text>
  
  <rect x="555" y="115" width="190" height="55" rx="4" fill="#ffe0b2"/>
  <text x="650" y="135" font-size="9" text-anchor="middle" fill="#1a1a1a">GET /api/users</text>
  <text x="650" y="152" font-size="8" text-anchor="middle" fill="#666666">Accept: application/vnd.api+json</text>
  <text x="650" y="165" font-size="8" text-anchor="middle" fill="#666666">version=2024-01-01</text>
  
  <text x="650" y="195" font-size="9" text-anchor="middle" fill="#666666">✓ Standards-based, semantic</text>
  <text x="650" y="210" font-size="9" text-anchor="middle" fill="#666666">✗ Complex, limited tooling</text>
  
  <!-- Canonical Model + Transformers -->
  <rect x="40" y="270" width="720" height="180" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="300" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Canonical Model + Version Transformers</text>
  
  <!-- Flow diagram -->
  <rect x="55" y="320" width="140" height="50" rx="6" fill="#e3f2fd"/>
  <text x="125" y="340" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Client Request</text>
  <text x="125" y="358" font-size="9" text-anchor="middle" fill="#666666">Version: v1</text>
  
  <line x1="195" y1="345" x2="235" y2="345" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="235" y="320" width="140" height="50" rx="6" fill="#c8e6c9"/>
  <text x="305" y="340" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">API Router</text>
  <text x="305" y="358" font-size="9" text-anchor="middle" fill="#666666">Extract version</text>
  
  <line x1="375" y1="345" x2="415" y2="345" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="415" y="320" width="140" height="50" rx="6" fill="#fff3e0"/>
  <text x="485" y="340" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Canonical Service</text>
  <text x="485" y="358" font-size="9" text-anchor="middle" fill="#666666">Latest version logic</text>
  
  <line x1="555" y1="345" x2="595" y2="345" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="595" y="320" width="150" height="50" rx="6" fill="#ffebee"/>
  <text x="670" y="340" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Response Transformer</text>
  <text x="670" y="358" font-size="9" text-anchor="middle" fill="#666666">v3 → v1 conversion</text>
  
  <!-- Transformer details -->
  <rect x="55" y="390" width="690" height="50" rx="6" fill="#e8f5e9"/>
  <text x="400" y="410" font-size="10" text-anchor="middle" fill="#1a1a1a">Transformations: Remove new fields → Rename deprecated fields → Restructure nested objects → Apply default values</text>
  <text x="400" y="430" font-size="10" text-anchor="middle" fill="#666666">Benefit: Single codebase for business logic. Bug fixes benefit all versions. Minimal code duplication.</text>
  
  <!-- Backward Compatibility -->
  <rect x="40" y="480" width="720" height="100" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="510" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Backward Compatibility Patterns</text>
  
  <rect x="55" y="525" width="210" height="40" rx="4" fill="#e1bee7"/>
  <text x="160" y="550" font-size="10" text-anchor="middle" fill="#1a1a1a">Tolerance Readers: Ignore unknown fields</text>
  
  <rect x="295" y="525" width="210" height="40" rx="4" fill="#e1bee7"/>
  <text x="400" y="550" font-size="10" text-anchor="middle" fill="#1a1a1a">Additive Changes: New fields are optional</text>
  
  <rect x="535" y="525" width="210" height="40" rx="4" fill="#e1bee7"/>
  <text x="640" y="550" font-size="10" text-anchor="middle" fill="#1a1a1a">Contract Testing: Verify compatibility in CI</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
