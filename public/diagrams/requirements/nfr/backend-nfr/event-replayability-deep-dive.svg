<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="eventReplayArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Event Replayability Deep Dive</text>
  
  <!-- Event Sourcing Flow -->
  <rect x="50" y="60" width="450" height="250" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Event Sourcing &amp; State Reconstruction</text>
  
  <!-- Command -->
  <rect x="70" y="110" width="80" height="50" rx="4" fill="#3b82f6"/>
  <text x="110" y="140" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff">Command</text>
  
  <line x1="150" y1="135" x2="180" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#eventReplayArrow)"/>
  
  <!-- Aggregate -->
  <rect x="180" y="110" width="80" height="50" rx="4" fill="#8b5cf6"/>
  <text x="220" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Aggregate</text>
  <text x="220" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Validates</text>
  
  <line x1="260" y1="135" x2="290" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#eventReplayArrow)"/>
  
  <!-- Event Store -->
  <rect x="290" y="110" width="100" height="80" rx="4" fill="#f97316"/>
  <text x="340" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Event Store</text>
  <text x="340" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Append-only log</text>
  <text x="340" y="172" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Event 1, 2, 3...</text>
  <text x="340" y="185" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Immutable</text>
  
  <!-- Projection -->
  <line x1="340" y1="190" x2="340" y2="220" stroke="#3b82f6" stroke-width="2" marker-end="url(#eventReplayArrow)"/>
  <text x="350" y="210" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Replay</text>
  
  <!-- Read Model -->
  <rect x="290" y="220" width="100" height="50" rx="4" fill="#22c55e"/>
  <text x="340" y="245" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Read Model</text>
  <text x="340" y="262" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Projected state</text>
  
  <text x="275" y="295" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">State = f(Event1, Event2, Event3...)</text>
  
  <!-- Snapshot Optimization -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Snapshot Optimization</text>
  
  <rect x="540" y="110" width="190" height="70" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Without Snapshots</text>
  <text x="635" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Replay ALL events</text>
  <text x="635" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Slow for long histories</text>
  
  <rect x="540" y="190" width="190" height="70" rx="3" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="635" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">With Snapshots</text>
  <text x="635" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Snapshot at event N</text>
  <text x="635" y="252" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Replay only events after N</text>
  
  <rect x="750" y="110" width="180" height="150" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Example</text>
  <text x="840" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Events: 1-1000</text>
  <text x="840" y="175" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Snapshot at: 900</text>
  <text x="840" y="195" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Replay: 901-1000 only</text>
  <text x="840" y="215" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">90% faster!</text>
  
  <!-- Event Replay Use Cases -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Event Replay Use Cases</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Debugging</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Reproduce bugs exactly</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">New Projections</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Build new read models</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Audit/Compliance</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Complete history</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">System Recovery</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Rebuild after corruption</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Events are immutable facts. Replay enables debugging, new projections, and recovery.</text>
</svg>
