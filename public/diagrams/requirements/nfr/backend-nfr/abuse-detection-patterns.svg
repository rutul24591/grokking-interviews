<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Abuse Detection Patterns</text>
  
  <!-- Credential Stuffing -->
  <rect x="40" y="70" width="220" height="160" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="150" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Credential Stuffing</text>
  <text x="150" y="125" font-size="10" text-anchor="middle" fill="#666666">Pattern: Many failed logins</text>
  <text x="150" y="143" font-size="10" text-anchor="middle" fill="#666666">from single IP</text>
  <text x="150" y="163" font-size="10" text-anchor="middle" fill="#666666">Detection: Rate limit per IP</text>
  <text x="150" y="183" font-size="10" text-anchor="middle" fill="#666666">Response: Block IP, CAPTCHA</text>
  <text x="150" y="203" font-size="10" text-anchor="middle" fill="#d84315">High priority</text>
  
  <!-- Scraping -->
  <rect x="290" y="70" width="220" height="160" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Scraping</text>
  <text x="400" y="125" font-size="10" text-anchor="middle" fill="#666666">Pattern: Sequential page requests</text>
  <text x="400" y="143" font-size="10" text-anchor="middle" fill="#666666">from automated clients</text>
  <text x="400" y="163" font-size="10" text-anchor="middle" fill="#666666">Detection: User-agent analysis</text>
  <text x="400" y="183" font-size="10" text-anchor="middle" fill="#666666">Response: Throttle, block bot</text>
  <text x="400" y="203" font-size="10" text-anchor="middle" fill="#f57c00">Medium priority</text>
  
  <!-- DDoS -->
  <rect x="540" y="70" width="220" height="160" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="650" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">DDoS</text>
  <text x="650" y="125" font-size="10" text-anchor="middle" fill="#666666">Pattern: Massive traffic spike</text>
  <text x="650" y="143" font-size="10" text-anchor="middle" fill="#666666">from distributed sources</text>
  <text x="650" y="163" font-size="10" text-anchor="middle" fill="#666666">Detection: Traffic anomaly detection</text>
  <text x="650" y="183" font-size="10" text-anchor="middle" fill="#666666">Response: CDN filtering, WAF</text>
  <text x="650" y="203" font-size="10" text-anchor="middle" fill="#4caf50">Critical priority</text>
  
  <!-- Detection Flow -->
  <rect x="40" y="260" width="720" height="140" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="290" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Detection Flow</text>
  
  <rect x="60" y="310" width="140" height="70" rx="6" fill="#bbdefb"/>
  <text x="130" y="335" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Monitor</text>
  <text x="130" y="355" font-size="10" text-anchor="middle" fill="#666666">Track request patterns</text>
  <text x="130" y="373" font-size="10" text-anchor="middle" fill="#666666">rate limits, user agents</text>
  
  <rect x="230" y="310" width="140" height="70" rx="6" fill="#bbdefb"/>
  <text x="300" y="335" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Detect</text>
  <text x="300" y="355" font-size="10" text-anchor="middle" fill="#666666">Compare against baseline</text>
  <text x="300" y="373" font-size="10" text-anchor="middle" fill="#666666">Anomaly detection</text>
  
  <rect x="400" y="310" width="140" height="70" rx="6" fill="#bbdefb"/>
  <text x="470" y="335" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Classify</text>
  <text x="470" y="355" font-size="10" text-anchor="middle" fill="#666666">Identify attack type</text>
  <text x="470" y="373" font-size="10" text-anchor="middle" fill="#666666">Assess severity</text>
  
  <rect x="570" y="310" width="140" height="70" rx="6" fill="#bbdefb"/>
  <text x="640" y="335" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Respond</text>
  <text x="640" y="355" font-size="10" text-anchor="middle" fill="#666666">Block, throttle, or CAPTCHA</text>
  <text x="640" y="373" font-size="10" text-anchor="middle" fill="#666666">Alert security team</text>
  
  <!-- Response Strategies -->
  <rect x="40" y="430" width="220" height="150" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="150" y="460" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Rate Limiting</th>
  <text x="150" y="485" font-size="10" text-anchor="middle" fill="#666666">Per-IP request limits</text>
  <text x="150" y="505" font-size="10" text-anchor="middle" fill="#666666">Sliding window counters</text>
  <text x="150" y="525" font-size="10" text-anchor="middle" fill="#666666">Token bucket algorithms</text>
  <text x="150" y="545" font-size="10" text-anchor="middle" fill="#666666">First line of defense</text>
  
  <rect x="290" y="430" width="220" height="150" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="460" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CAPTCHA Challenge</text>
  <text x="400" y="485" font-size="10" text-anchor="middle" fill="#666666">Challenge suspicious requests</text>
  <text x="400" y="505" font-size="10" text-anchor="middle" fill="#666666">Verify human vs automated</text>
  <text x="400" y="525" font-size="10" text-anchor="middle" fill="#666666">Progressive difficulty</text>
  <text x="400" y="545" font-size="10" text-anchor="middle" fill="#666666">Balance UX vs security</text>
  
  <rect x="540" y="430" width="220" height="150" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="650" y="460" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">IP Blocking</text>
  <text x="650" y="485" font-size="10" text-anchor="middle" fill="#666666">Block abusive IPs</text>
  <text x="650" y="505" font-size="10" text-anchor="middle" fill="#666666">Temporary vs permanent bans</text>
  <text x="650" y="525" font-size="10" text-anchor="middle" fill="#666666">IP reputation scoring</text>
  <text x="650" y="545" font-size="10" text-anchor="middle" fill="#666666">Automated blocklists</text>
</svg>
