<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="multiArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Multi-Region Replication Patterns</text>
  
  <!-- Active-Passive -->
  <rect x="50" y="60" width="300" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="200" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Active-Passive</text>
  
  <!-- Primary region -->
  <rect x="70" y="110" width="100" height="60" rx="4" fill="#22c55e"/>
  <text x="120" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">US-East</text>
  <text x="120" y="155" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">PRIMARY</text>
  <text x="120" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Read/Write</text>
  
  <line x1="170" y1="140" x2="200" y2="140" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#multiArrow)"/>
  <text x="185" y="130" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Async</text>
  
  <!-- Secondary region -->
  <rect x="200" y="110" width="100" height="60" rx="4" fill="#3b82f6" opacity="0.5"/>
  <text x="250" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">EU-West</text>
  <text x="250" y="155" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">SECONDARY</text>
  <text x="250" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Read-Only</text>
  
  <text x="200" y="200" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">✓ Simple, strong consistency</text>
  <text x="200" y="217" text-anchor="middle" font-size="8" fill="#f59e0b">⚠ Write latency for distant users</text>
  
  <!-- Active-Active -->
  <rect x="370" y="60" width="300" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="520" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Active-Active</text>
  
  <!-- Region 1 -->
  <rect x="390" y="110" width="100" height="60" rx="4" fill="#22c55e"/>
  <text x="440" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">US-East</text>
  <text x="440" y="155" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">ACTIVE</text>
  <text x="440" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Read/Write</text>
  
  <!-- Bidirectional sync -->
  <line x1="490" y1="130" x2="530" y2="130" stroke="#3b82f6" stroke-width="2" marker-end="url(#multiArrow)"/>
  <line x1="530" y1="150" x2="490" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#multiArrow)"/>
  
  <!-- Region 2 -->
  <rect x="530" y="110" width="100" height="60" rx="4" fill="#22c55e"/>
  <text x="580" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">EU-West</text>
  <text x="580" y="155" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">ACTIVE</text>
  <text x="580" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Read/Write</text>
  
  <text x="520" y="200" text-anchor="middle" font-size="8" fill="var(--border-green, #22c55e" font-weight="bold">✓ Low latency everywhere</text>
  <text x="520" y="217" text-anchor="middle" font-size="8" fill="#ef4444">✗ Write conflicts possible</text>
  
  <!-- Regional Sharding -->
  <rect x="690" y="60" width="260" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="820" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Regional Sharding</text>
  
  <!-- Shard 1 -->
  <rect x="710" y="110" width="100" height="60" rx="4" fill="#8b5cf6"/>
  <text x="760" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">US Users</text>
  <text x="760" y="155" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">US-East Shard</text>
  <text x="760" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Data stays in US</text>
  
  <!-- Shard 2 -->
  <rect x="830" y="110" width="100" height="60" rx="4" fill="#8b5cf6"/>
  <text x="880" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">EU Users</text>
  <text x="880" y="155" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">EU-West Shard</text>
  <text x="880" y="168" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Data stays in EU</text>
  
  <text x="820" y="200" text-anchor="middle" font-size="8" fill="var(--border-green, #22c55e" font-weight="bold">✓ Data residency compliance</text>
  <text x="820" y="217" text-anchor="middle" font-size="8" fill="#f59e0b">⚠ Cross-region access complex</text>
  
  <!-- Conflict Resolution -->
  <rect x="50" y="280" width="450" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Conflict Resolution Strategies</text>
  
  <rect x="70" y="325" width="110" height="45" rx="3" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="125" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-red, #ef4444">Last Write Wins</text>
  <text x="125" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Use timestamp</text>
  
  <rect x="200" y="325" width="110" height="45" rx="3" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="255" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Application Merge</text>
  <text x="255" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Custom logic</text>
  
  <rect x="330" y="325" width="110" height="45" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="385" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">CRDTs</text>
  <text x="385" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Mathematical merge</text>
  
  <text x="70" y="395" font-size="8" fill="#ef4444">✗ Data loss possible</text>
  <text x="200" y="395" font-size="8" fill="#22c55e">✓ Domain-specific</text>
  <text x="330" y="395" font-size="8" fill="#22c55e">✓ Automatic convergence</text>
  
  <!-- Latency Considerations -->
  <rect x="520" y="280" width="430" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Latency Considerations</text>
  
  <text x="540" y="335" font-size="9" fill="var(--text-secondary, #47556ird">• Speed of light: ~70ms US ↔ EU (one-way)</text>
  <text x="540" y="355" font-size="9" fill="var(--text-secondary, #47556ird">• Sync replication impractical across regions</text>
  <text x="540" y="375" font-size="9" fill="var(--text-secondary, #47556ird">• Async replication = eventual consistency</text>
  <text x="540" y="395" font-size="9" fill="var(--text-secondary, #47556ird">• Read local, write home pattern</text>
  <text x="540" y="415" font-size="9" fill="var(--text-secondary, #47556ird">• CDN for static content delivery</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Choose pattern based on consistency needs, latency requirements, and data residency requirements.</text>
</svg>
