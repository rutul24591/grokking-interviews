<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="durabilityDeepArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Durability Guarantees Deep Dive</text>
  
  <!-- Write-Ahead Logging -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Write-Ahead Logging (WAL) Deep Dive</text>
  
  <!-- Client -->
  <rect x="70" y="110" width="80" height="50" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="110" y="140" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff">Client</text>
  
  <line x1="150" y1="135" x2="180" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#durabilityDeepArrow)"/>
  <text x="165" y="125" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Write</text>
  
  <!-- WAL -->
  <rect x="180" y="110" width="100" height="80" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="230" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Write-Ahead</text>
  <text x="230" y="152" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Log (WAL)</text>
  <text x="230" y="172" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Sequential write</text>
  <text x="230" y="185" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Fast, durable</text>
  
  <line x1="280" y1="150" x2="310" y2="150" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#durabilityDeepArrow)"/>
  <text x="295" y="140" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">fsync</text>
  
  <line x1="280" y1="170" x2="310" y2="190" stroke="var(--border-accent, #3b82f6)" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#durabilityDeepArrow)"/>
  <text x="295" y="185" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Async</text>
  
  <!-- Data Files -->
  <rect x="310" y="170" width="100" height="50" rx="4" fill="var(--bg-orange, #f97316)"/>
  <text x="360" y="195" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Data Files</text>
  <text x="360" y="212" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Main storage</text>
  
  <!-- Acknowledge -->
  <path d="M 360 220 L 360 240 L 110 240 L 110 165" stroke="var(--border-accent, #3b82f6)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="200" y="235" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Ack after WAL</text>
  
  <text x="275" y="265" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Durable after WAL write + fsync</text>
  <text x="275" y="282" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Fast (sequential write)</text>
  
  <!-- Replication Strategies -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Replication for Durability</text>
  
  <rect x="540" y="110" width="120" height="70" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="600" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--border-green, #22c55e">Synchronous</text>
  <text x="600" y="155" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Wait for all replicas</text>
  <text x="600" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">RPO: 0</text>
  
  <rect x="680" y="110" width="120" height="70" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="740" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--border-blue, #3b82f6">Async</text>
  <text x="740" y="155" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Fire and forget</text>
  <text x="740" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">RPO: &gt;0</text>
  
  <rect x="820" y="110" width="120" height="70" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="880" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--border-orange, #f97316">Semi-Sync</text>
  <text x="880" y="155" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Wait for 1 replica</text>
  <text x="880" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">RPO: ~0</text>
  
  <!-- Backup Strategies -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Backup Strategies for Durability</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Full Backup</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Complete copy</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Incremental</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Changes since last</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">WAL Archiving</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Continuous backup</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Point-in-Time Recovery</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Restore to any moment</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: WAL ensures durability. Replication protects against hardware failure. Backups protect against disasters.</text>
</svg>
