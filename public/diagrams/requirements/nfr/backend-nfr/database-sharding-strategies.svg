<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Database Sharding Architecture</text>
  
  <!-- Single DB (Before) -->
  <rect x="40" y="70" width="200" height="150" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="140" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Before: Single DB</text>
  <text x="140" y="130" font-size="11" text-anchor="middle" fill="#666666">All data in one database</text>
  <text x="140" y="150" font-size="11" text-anchor="middle" fill="#666666">Read/Write bottleneck</text>
  <text x="140" y="170" font-size="11" text-anchor="middle" fill="#666666">Storage limit approaching</text>
  <text x="140" y="190" font-size="11" text-anchor="middle" fill="#666666">Backup window growing</text>
  <text x="140" y="210" font-size="11" text-anchor="middle" fill="#666666">Query performance degrading</text>
  
  <!-- Arrow -->
  <text x="280" y="150" font-size="30" fill="#666666">→</text>
  
  <!-- Sharded DB (After) -->
  <rect x="340" y="70" width="420" height="150" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="550" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">After: Sharded Database</text>
  
  <rect x="360" y="115" width="110" height="80" rx="6" fill="#bbdefb"/>
  <text x="415" y="140" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Shard 1</text>
  <text x="415" y="160" font-size="9" text-anchor="middle" fill="#666666">Users A-F</text>
  <text x="415" y="178" font-size="9" text-anchor="middle" fill="#666666">hash % 3 = 0</text>
  
  <rect x="495" y="115" width="110" height="80" rx="6" fill="#bbdefb"/>
  <text x="550" y="140" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Shard 2</text>
  <text x="550" y="160" font-size="9" text-anchor="middle" fill="#666666">Users G-M</text>
  <text x="550" y="178" font-size="9" text-anchor="middle" fill="#666666">hash % 3 = 1</text>
  
  <rect x="630" y="115" width="110" height="80" rx="6" fill="#bbdefb"/>
  <text x="685" y="140" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Shard 3</text>
  <text x="685" y="160" font-size="9" text-anchor="middle" fill="#666666">Users N-Z</text>
  <text x="685" y="178" font-size="9" text-anchor="middle" fill="#666666">hash % 3 = 2</text>
  
  <!-- Shard Key Strategies -->
  <rect x="40" y="250" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Shard Key Strategies</text>
  
  <rect x="55" y="295" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="210" y="318" font-size="11" text-anchor="middle" fill="#1a1a1a">Hash-Based: hash(key) % N — Even distribution</text>
  
  <rect x="55" y="335" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="210" y="358" font-size="11" text-anchor="middle" fill="#1a1a1a">Range-Based: key range A-M, N-Z — Good for range queries</text>
  
  <rect x="55" y="375" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="210" y="398" font-size="11" text-anchor="middle" fill="#1a1a1a">Directory-Based: Lookup service — Flexible, adds SPOF</text>
  
  <rect x="55" y="415" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="210" y="438" font-size="11" text-anchor="middle" fill="#1a1a1a">Geographic: By region — Data residency, uneven distribution</text>
  
  <!-- Challenges -->
  <rect x="420" y="250" width="340" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Sharding Challenges</text>
  
  <text x="440" y="310" font-size="11" fill="#666666">• Cross-Shard Joins: Query all shards, merge results</text>
  <text x="440" y="335" font-size="11" fill="#666666">• Rebalancing: Add shards → redistribute data</text>
  <text x="440" y="360" font-size="11" fill="#666666">• Hotspots: Uneven access patterns overload shards</text>
  <text x="440" y="385" font-size="11" fill="#666666">• Transactions: Distributed transactions are slow</text>
  <text x="440" y="410" font-size="11" fill="#666666">• Schema Changes: Must coordinate across all shards</text>
  
  <!-- Best Practices -->
  <rect x="40" y="460" width="720" height="120" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="490" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Sharding Best Practices</text>
  <text x="400" y="520" font-size="11" text-anchor="middle" fill="#666666">1. Choose high-cardinality shard keys (avoid low-cardinality fields like status)</text>
  <text x="400" y="545" font-size="11" text-anchor="middle" fill="#666666">2. Use consistent hashing to minimize data movement during rebalancing (only K/N keys move)</text>
  <text x="400" y="570" font-size="11" text-anchor="middle" fill="#666666">3. Denormalize to avoid cross-shard joins; design queries around shard boundaries</text>
</svg>
