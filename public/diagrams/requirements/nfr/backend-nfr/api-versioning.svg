<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="apiArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">API Versioning Strategies</text>
  
  <!-- Versioning Approaches -->
  <rect x="50" y="60" width="450" height="250" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  
  <!-- URL Versioning -->
  <rect x="70" y="90" width="180" height="70" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="2"/>
  <text x="160" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-blue, #3b82f6">URL Path</text>
  <text x="160" y="140" text-anchor="middle" font-size="8" fill="var(--text-primary, #0f172a">/api/v1/users</text>
  <text x="160" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">✓ Clear, cacheable</text>
  
  <!-- Header Versioning -->
  <rect x="270" y="90" width="180" height="70" rx="4" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="360" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-purple, #8b5cf6">Custom Header</text>
  <text x="360" y="140" text-anchor="middle" font-size="8" fill="var(--text-primary, #0f172a">X-API-Version: 2</text>
  <text x="360" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">✓ Clean URLs</text>
  
  <!-- Content Negotiation -->
  <rect x="70" y="180" width="180" height="70" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="2"/>
  <text x="160" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-orange, #f97316">Accept Header</text>
  <text x="160" y="230" text-anchor="middle" font-size="7" fill="var(--text-primary, #0f172a">Accept: application/vnd.api.v2+json</text>
  <text x="160" y="247" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">✓ REST-compliant</text>
  
  <!-- Query Parameter -->
  <rect x="270" y="180" width="180" height="70" rx="4" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="360" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-red, #ef4444">Query Param</text>
  <text x="360" y="230" text-anchor="middle" font-size="8" fill="var(--text-primary, #0f172a">/users?version=2</text>
  <text x="360" y="247" text-anchor="middle" font-size="8" fill="#ef4444">✗ Not recommended</text>
  
  <!-- Deprecation Timeline -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Deprecation Timeline</text>
  
  <line x1="550" y1="120" x2="920" y2="120" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#apiArrow)"/>
  <text x="930" y="125" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Time →</text>
  
  <!-- v1 active -->
  <rect x="550" y="100" width="100" height="40" rx="3" fill="var(--bg-green, #22c55e)"/>
  <text x="600" y="125" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff">v1 Active</text>
  
  <!-- Deprecation notice -->
  <circle cx="650" cy="120" r="5" fill="var(--bg-orange, #f97316)"/>
  <text x="650" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">T=0</text>
  <text x="650" y="165" text-anchor="middle" font-size="7" fill="var(--border-orange, #f97316" font-weight="bold">Deprecate</text>
  
  <!-- Sunset period -->
  <rect x="680" y="100" width="120" height="40" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.5"/>
  <text x="740" y="125" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Sunset Period</text>
  <text x="740" y="140" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">(6-12 months)</text>
  
  <!-- v2 active -->
  <circle cx="800" cy="120" r="5" fill="var(--bg-blue, #3b82f6)"/>
  <text x="800" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">T+6mo</text>
  <text x="800" y="165" text-anchor="middle" font-size="7" fill="var(--border-blue, #3b82f6" font-weight="bold">v2 Launch</text>
  
  <!-- v1 sunset -->
  <circle cx="880" cy="120" r="5" fill="var(--bg-red, #ef4444)"/>
  <text x="880" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">T+12mo</text>
  <text x="880" y="165" text-anchor="middle" font-size="7" fill="var(--border-red, #ef4444" font-weight="bold">v1 Sunset</text>
  
  <!-- Backward Compatibility -->
  <rect x="50" y="330" width="450" height="110" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Backward Compatible Changes</text>
  
  <text x="70" y="385" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="385" font-size="9" fill="var(--text-secondary, #47556ird">Adding new endpoints</text>
  
  <text x="70" y="405" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="405" font-size="9" fill="var(--text-secondary, #47556ird">Adding optional fields</text>
  
  <text x="70" y="425" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="425" font-size="9" fill="var(--text-secondary, #47556ird">Adding new query parameters</text>
  
  <text x="270" y="385" font-size="9" fill="#ef4444">✗</text>
  <text x="285" y="385" font-size="9" fill="var(--text-secondary, #47556ird">Removing fields/endpoints</text>
  
  <text x="270" y="405" font-size="9" fill="#ef4444">✗</text>
  <text x="285" y="405" font-size="9" fill="var(--text-secondary, #47556ird">Changing field types</text>
  
  <text x="270" y="425" font-size="9" fill="#ef4444">✗</text>
  <text x="285" y="425" font-size="9" fill="var(--text-secondary, #47556ird">Changing behavior</text>
  
  <!-- Migration Strategies -->
  <rect x="520" y="220" width="430" height="110" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Migration Strategies</text>
  
  <rect x="540" y="265" width="120" height="55" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="600" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Parallel Run</text>
  <text x="600" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Both versions active</text>
  
  <rect x="680" y="265" width="120" height="55" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="740" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Gradual Rollout</text>
  <text x="740" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Canary deployment</text>
  
  <rect x="820" y="265" width="120" height="55" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="880" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Feature Flags</text>
  <text x="880" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Toggle per user</text>
  
  <text x="500" y="360" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Communicate deprecation early, provide migration guides, and allow sufficient sunset period.</text>
</svg>
