<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="retentionArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Data Retention &amp; Archival Deep Dive</text>
  
  <!-- Storage Tier Economics -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Storage Tier Economics</text>
  
  <!-- Cost vs Access Time Graph -->
  <line x1="100" y1="200" x2="400" y2="200" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="100" y1="120" x2="100" y2="200" stroke="#e2e8f0" stroke-width="2"/>
  
  <text x="250" y="220" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">Access Speed →</text>
  <text x="60" y="160" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird" transform="rotate(-90, 60, 160)">Cost/GB →</text>
  
  <!-- Hot tier point -->
  <circle cx="350" cy="140" r="8" fill="#ef4444"/>
  <text x="365" y="145" text-anchor="start" font-size="9" fill="var(--border-red, #ef4444" font-weight="bold">Hot (SSD)</text>
  <text x="365" y="158" text-anchor="start" font-size="8" fill="var(--text-secondary, #47556ird">Fast, expensive</text>
  
  <!-- Warm tier point -->
  <circle cx="250" cy="170" r="8" fill="#f97316"/>
  <text x="265" y="175" text-anchor="start" font-size="9" fill="var(--border-orange, #f97316" font-weight="bold">Warm (HDD)</text>
  <text x="265" y="188" text-anchor="start" font-size="8" fill="var(--text-secondary, #47556ird">Medium speed/cost</text>
  
  <!-- Cold tier point -->
  <circle cx="150" cy="190" r="8" fill="#3b82f6"/>
  <text x="165" y="195" text-anchor="start" font-size="9" fill="var(--border-blue, #3b82f6" font-weight="bold">Cold (Archive)</text>
  <text x="165" y="208" text-anchor="start" font-size="8" fill="var(--text-secondary, #47556ird">Slow, cheap</text>
  
  <!-- Curve -->
  <path d="M 150 190 Q 250 170 350 140" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2"/>
  
  <text x="275" y="245" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Trade-off: Faster access = Higher cost</text>
  
  <!-- Compliance Requirements -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Compliance Retention Requirements</text>
  
  <rect x="540" y="110" width="190" height="35" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="635" y="132" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Financial (SOX)</text>
  <text x="635" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">7 years minimum</text>
  
  <rect x="540" y="155" width="190" height="35" rx="3" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="635" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Healthcare (HIPAA)</text>
  <text x="635" y="195" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">6-10 years</text>
  
  <rect x="750" y="110" width="180" height="35" rx="3" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="840" y="132" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">GDPR</text>
  <text x="840" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Minimum necessary</text>
  
  <rect x="750" y="155" width="180" height="35" rx="3" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="840" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Tax Records</text>
  <text x="840" y="195" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">7 years (US)</text>
  
  <!-- Archive Strategies -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Archive Strategies</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Full Archive</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Complete snapshot</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Incremental</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Only changes</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Differential</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Since last full</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Continuous (WAL)</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Point-in-time recovery</text>
  
  <!-- Data Deletion -->
  <rect x="50" y="300" width="900" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Secure Data Deletion</text>
  
  <rect x="70" y="345" width="260" height="85" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a">Soft Delete</text>
  <text x="200" y="395" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Mark as deleted (deleted_at timestamp)</text>
  <text x="200" y="412" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Retain for grace period (30-90 days)</text>
  <text x="200" y="429" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Allows recovery from accidental deletion</text>
  
  <rect x="350" y="345" width="260" height="85" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a">Hard Delete</text>
  <text x="480" y="395" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Permanent removal after retention</text>
  <text x="480" y="412" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Overwrite storage blocks</text>
  <text x="480" y="429" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Verify deletion completed</text>
  
  <rect x="630" y="345" width="300" height="85" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="780" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a">Crypto-Shredding</text>
  <text x="780" y="395" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Delete encryption keys</text>
  <text x="780" y="412" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Data becomes unrecoverable</text>
  <text x="780" y="429" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Efficient for large datasets</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Balance compliance requirements with storage costs. Automate lifecycle policies.</text>
</svg>
