<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Load Shedding & Priority Queue Architecture</text>
  
  <!-- Request Classification -->
  <rect x="40" y="70" width="340" height="200" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Request Classification</text>
  
  <rect x="55" y="115" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">P1 (Critical): Authenticated writes — never shed</text>
  
  <rect x="55" y="150" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">P2 (High): Authenticated reads — shed at 80% load</text>
  
  <rect x="55" y="185" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">P3 (Medium): Anonymous reads — shed at 60% load</text>
  
  <rect x="55" y="220" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">P4 (Low): Analytics, health checks — shed at 40% load</text>
  
  <!-- Priority Queue -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Priority Queue</text>
  
  <rect x="435" y="115" width="310" height="25" rx="4" fill="#c8e6c9"/>
  <text x="590" y="133" font-size="9" text-anchor="middle" fill="#1a1a1a">[P1][P1][P2][P1][P2][P3][P1][P2][P3][P4]</text>
  
  <rect x="435" y="145" width="310" height="25" rx="4" fill="#ffcdd2"/>
  <text x="590" y="163" font-size="9" text-anchor="middle" fill="#1a1a1a">Queue Full → Drop P4 first, then P3, then P2</text>
  
  <rect x="435" y="175" width="310" height="55" rx="4" fill="#c8e6c9"/>
  <text x="590" y="195" font-size="9" text-anchor="middle" fill="#1a1a1a">Shedding Decision: based on queue depth + system load</text>
  <text x="590" y="213" font-size="9" text-anchor="middle" fill="#666666">Queue depth {'>'} 80% → shed P4</text>
  <text x="590" y="230" font-size="9" text-anchor="middle" fill="#666666">Queue depth {'>'} 90% → shed P4, P3</text>
  <text x="590" y="247" font-size="9" text-anchor="middle" fill="#666666">Queue depth {'>'} 95% → shed P4, P3, P2</text>
  
  <!-- Load Shedding Flow -->
  <rect x="40" y="300" width="720" height="140" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="330" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Load Shedding Flow</text>
  
  <rect x="55" y="345" width="160" height="80" rx="6" fill="#ffe0b2"/>
  <text x="135" y="365" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Measure Load</text>
  <text x="135" y="385" font-size="9" text-anchor="middle" fill="#666666">Queue depth</text>
  <text x="135" y="400" font-size="9" text-anchor="middle" fill="#666666">CPU/Memory</text>
  <text x="135" y="415" font-size="9" text-anchor="middle" fill="#666666">Latency P99</text>
  
  <rect x="235" y="345" width="160" height="80" rx="6" fill="#ffe0b2"/>
  <text x="315" y="365" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Classify Request</text>
  <text x="315" y="385" font-size="9" text-anchor="middle" fill="#666666">Extract priority</text>
  <text x="315" y="400" font-size="9" text-anchor="middle" fill="#666666">Auth status</text>
  <text x="315" y="415" font-size="9" text-anchor="middle" fill="#666666">Operation type</text>
  
  <rect x="415" y="345" width="160" height="80" rx="6" fill="#ffe0b2"/>
  <text x="495" y="365" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Shed Decision</text>
  <text x="495" y="385" font-size="9" text-anchor="middle" fill="#666666">Below threshold: accept</text>
  <text x="495" y="400" font-size="9" text-anchor="middle" fill="#666666">Above threshold: check priority</text>
  <text x="495" y="415" font-size="9" text-anchor="middle" fill="#666666">Low priority: reject with 503</text>
  
  <rect x="595" y="345" width="150" height="80" rx="6" fill="#ffe0b2"/>
  <text x="670" y="365" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Response</text>
  <text x="670" y="385" font-size="9" text-anchor="middle" fill="#666666">Accept: process normally</text>
  <text x="670" y="400" font-size="9" text-anchor="middle" fill="#666666">Reject: 503 + Retry-After</text>
  <text x="670" y="415" font-size="9" text-anchor="middle" fill="#666666">Log rejection for monitoring</text>
  
  <!-- Before/After Shedding -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">System State: Before vs After Load Shedding</text>
  
  <rect x="55" y="515" width="340" height="50" rx="6" fill="#ffcdd2"/>
  <text x="225" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Without Shedding: System Crashes</text>
  <text x="225" y="555" font-size="9" text-anchor="middle" fill="#666666">Queue grows unbounded → OOM → All requests fail</text>
  
  <rect x="415" y="515" width="330" height="50" rx="6" fill="#c8e6c9"/>
  <text x="580" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">With Shedding: Graceful Degradation</text>
  <text x="580" y="555" font-size="9" text-anchor="middle" fill="#666666">Low-priority dropped → Critical requests succeed → System survives</text>
</svg>
