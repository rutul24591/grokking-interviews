<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="dbDeepArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Database Selection Deep Dive</text>
  
  <!-- Decision Tree -->
  <rect x="50" y="60" width="450" height="300" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Database Selection Decision Tree</text>
  
  <!-- Root question -->
  <rect x="175" y="110" width="150" height="40" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="250" y="130" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Need Complex</text>
  <text x="250" y="145" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Queries/Joins?</text>
  
  <!-- Yes path -->
  <line x1="250" y1="150" x2="250" y2="180" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="260" y="170" text-anchor="middle" font-size="7" fill="var(--border-green, #22c55e" font-weight="bold">YES</text>
  
  <rect x="175" y="180" width="150" height="40" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="250" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">SQL Database</text>
  
  <text x="250" y="235" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">PostgreSQL, MySQL</text>
  <text x="250" y="250" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">✓ ACID, joins</text>
  
  <!-- No path -->
  <path d="M 250 150 L 250 165 L 350 165 L 350 180" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="340" y="160" text-anchor="middle" font-size="7" fill="var(--border-red, #ef4444" font-weight="bold">NO</text>
  
  <rect x="275" y="180" width="150" height="40" rx="4" fill="var(--bg-orange, #f97316)"/>
  <text x="350" y="200" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Need Horizontal</text>
  <text x="350" y="215" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Scaling?</text>
  
  <!-- Yes path from scaling -->
  <line x1="350" y1="220" x2="350" y2="250" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="360" y="240" text-anchor="middle" font-size="7" fill="var(--border-green, #22c55e" font-weight="bold">YES</text>
  
  <rect x="275" y="250" width="150" height="40" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="350" y="275" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">NoSQL Database</text>
  
  <text x="350" y="295" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Cassandra, DynamoDB</text>
  <text x="350" y="310" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">✓ Scale horizontally</text>
  
  <!-- No path from scaling -->
  <path d="M 350 220 L 350 235 L 150 235 L 150 250" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="160" y="230" text-anchor="middle" font-size="7" fill="var(--border-red, #ef4444" font-weight="bold">NO</text>
  
  <rect x="75" y="250" width="150" height="40" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="150" y="275" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">Document Store</text>
  
  <text x="150" y="295" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">MongoDB</text>
  <text x="150" y="310" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">✓ Flexible schema</text>
  
  <!-- Database Types Grid -->
  <rect x="520" y="60" width="430" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Database Types Comparison</text>
  
  <rect x="540" y="110" width="190" height="55" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Relational (SQL)</text>
  <text x="635" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Fixed schema, ACID</text>
  <text x="635" y="170" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Use: Financial, ERP</text>
  
  <rect x="540" y="175" width="190" height="55" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="635" y="200" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Document</text>
  <text x="635" y="220" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Flexible schema, JSON</text>
  <text x="635" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Use: Content, catalogs</text>
  
  <rect x="540" y="240" width="190" height="55" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="635" y="265" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Key-Value</text>
  <text x="635" y="285" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Simple, fast lookups</text>
  <text x="635" y="300" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Use: Caching, sessions</text>
  
  <rect x="750" y="110" width="180" height="55" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Column-Family</text>
  <text x="840" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Wide columns, scalable</text>
  <text x="840" y="170" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Use: Time-series, IoT</text>
  
  <rect x="750" y="175" width="180" height="55" rx="3" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="840" y="200" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-red, #ef4444">Graph</text>
  <text x="840" y="220" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Relationships, traversals</text>
  <text x="840" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Use: Social, fraud</text>
  
  <rect x="750" y="240" width="180" height="55" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="840" y="265" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Time-Series</text>
  <text x="840" y="285" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Time-ordered data</text>
  <text x="840" y="300" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Use: Metrics, monitoring</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Choose based on access patterns, consistency needs, and scale requirements.</text>
</svg>
