<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Database Selection Deep Dive</text>
  
  <!-- Workload to Database Mapping -->
  <rect x="40" y="70" width="720" height="200" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Workload to Database Mapping</text>
  
  <rect x="55" y="115" width="160" height="140" rx="6" fill="#bbdefb"/>
  <text x="135" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Transactional</text>
  <text x="135" y="155" font-size="9" text-anchor="middle" fill="#666666">ACID required</text>
  <text x="135" y="173" font-size="9" text-anchor="middle" fill="#666666">Complex queries</text>
  <text x="135" y="191" font-size="9" text-anchor="middle" fill="#666666">Joins needed</text>
  <text x="135" y="209" font-size="9" text-anchor="middle" fill="#1a1a1a">→ PostgreSQL</text>
  <text x="135" y="227" font-size="9" text-anchor="middle" fill="#1a1a1a">→ MySQL</text>
  <text x="135" y="245" font-size="9" text-anchor="middle" fill="#1a1a1a">→ CockroachDB</text>
  
  <rect x="235" y="115" width="160" height="140" rx="6" fill="#bbdefb"/>
  <text x="315" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Document Store</text>
  <text x="315" y="155" font-size="9" text-anchor="middle" fill="#666666">Flexible schema</text>
  <text x="315" y="173" font-size="9" text-anchor="middle" fill="#666666">Hierarchical data</text>
  <text x="315" y="191" font-size="9" text-anchor="middle" fill="#666666">Rapidly evolving</text>
  <text x="315" y="209" font-size="9" text-anchor="middle" fill="#1a1a1a">→ MongoDB</text>
  <text x="315" y="227" font-size="9" text-anchor="middle" fill="#1a1a1a">→ DynamoDB</text>
  <text x="315" y="245" font-size="9" text-anchor="middle" fill="#1a1a1a">→ Couchbase</text>
  
  <rect x="415" y="115" width="160" height="140" rx="6" fill="#bbdefb"/>
  <text x="495" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cache / Session</text>
  <text x="495" y="155" font-size="9" text-anchor="middle" fill="#666666">Sub-ms latency</text>
  <text x="495" y="173" font-size="9" text-anchor="middle" fill="#666666">High throughput</text>
  <text x="495" y="191" font-size="9" text-anchor="middle" fill="#666666">Ephemeral data</text>
  <text x="495" y="209" font-size="9" text-anchor="middle" fill="#1a1a1a">→ Redis</text>
  <text x="495" y="227" font-size="9" text-anchor="middle" fill="#1a1a1a">→ Memcached</text>
  <text x="495" y="245" font-size="9" text-anchor="middle" fill="#1a1a1a">→ Dragonfly</text>
  
  <rect x="595" y="115" width="150" height="140" rx="6" fill="#bbdefb"/>
  <text x="670" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Time-Series</text>
  <text x="670" y="155" font-size="9" text-anchor="middle" fill="#666666">High write volume</text>
  <text x="670" y="173" font-size="9" text-anchor="middle" fill="#666666">Time-range queries</text>
  <text x="670" y="191" font-size="9" text-anchor="middle" fill="#666666">Aggregations</text>
  <text x="670" y="209" font-size="9" text-anchor="middle" fill="#1a1a1a">→ InfluxDB</text>
  <text x="670" y="227" font-size="9" text-anchor="middle" fill="#1a1a1a">→ TimescaleDB</text>
  <text x="670" y="245" font-size="9" text-anchor="middle" fill="#1a1a1a">→ Prometheus</text>
  
  <!-- Evaluation Criteria -->
  <rect x="40" y="300" width="720" height="160" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="330" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Database Evaluation Criteria</text>
  
  <rect x="55" y="345" width="340" height="100" rx="6" fill="#a5d6a7"/>
  <text x="225" y="365" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Technical Criteria</text>
  <text x="225" y="385" font-size="9" text-anchor="middle" fill="#666666">• Query language expressiveness</text>
  <text x="225" y="403" font-size="9" text-anchor="middle" fill="#666666">• Consistency guarantees</text>
  <text x="225" y="421" font-size="9" text-anchor="middle" fill="#666666">• Scalability (vertical vs horizontal)</text>
  <text x="225" y="439" font-size="9" text-anchor="middle" fill="#666666">• Performance (latency, throughput)</text>
  <text x="225" y="457" font-size="9" text-anchor="middle" fill="#666666">• Data model flexibility</text>
  
  <rect x="415" y="345" width="330" height="100" rx="6" fill="#a5d6a7"/>
  <text x="580" y="365" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Operational Criteria</text>
  <text x="580" y="385" font-size="9" text-anchor="middle" fill="#666666">• Managed service availability</text>
  <text x="580" y="403" font-size="9" text-anchor="middle" fill="#666666">• Backup and restore capabilities</text>
  <text x="580" y="421" font-size="9" text-anchor="middle" fill="#666666">• Monitoring and alerting support</text>
  <text x="580" y="439" font-size="9" text-anchor="middle" fill="#666666">• Team expertise and training</text>
  <text x="580" y="457" font-size="9" text-anchor="middle" fill="#666666">• Community and vendor support</text>
  
  <!-- Proof of Concept -->
  <rect x="40" y="490" width="720" height="90" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="520" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Proof-of-Concept Process</text>
  
  <rect x="55" y="535" width="160" height="35" rx="4" fill="#ffe0b2"/>
  <text x="135" y="558" font-size="10" text-anchor="middle" fill="#1a1a1a">Week 1: Setup + Load data</text>
  
  <rect x="235" y="535" width="160" height="35" rx="4" fill="#ffe0b2"/>
  <text x="315" y="558" font-size="10" text-anchor="middle" fill="#1a1a1a">Week 2: Run workloads</text>
  
  <rect x="415" y="535" width="160" height="35" rx="4" fill="#ffe0b2"/>
  <text x="495" y="558" font-size="10" text-anchor="middle" fill="#1a1a1a">Week 3: Failure testing</text>
  
  <rect x="595" y="535" width="150" height="35" rx="4" fill="#ffe0b2"/>
  <text x="670" y="558" font-size="10" text-anchor="middle" fill="#1a1a1a">Week 4: Decision</text>
</svg>
