<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Bulkhead Pattern & Graceful Degradation</text>
  
  <!-- Without Bulkhead -->
  <rect x="40" y="70" width="340" height="160" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Without Bulkhead (Shared Pool)</text>
  
  <rect x="55" y="115" width="310" height="35" rx="4" fill="#ffcdd2"/>
  <text x="210" y="138" font-size="11" text-anchor="middle" fill="#1a1a1a">Shared Thread Pool: 100 threads across 10 services</text>
  
  <rect x="55" y="155" width="310" height="55" rx="6" fill="#ff8a80"/>
  <text x="210" y="175" font-size="10" text-anchor="middle" fill="#1a1a1a">Service 3 hangs → consumes all 100 threads</text>
  <text x="210" y="195" font-size="10" text-anchor="middle" fill="#666666">All 10 services fail — cascade failure</text>
  <text x="210" y="215" font-size="10" text-anchor="middle" fill="#d84315">Blast radius: 100% of services affected</text>
  
  <!-- With Bulkhead -->
  <rect x="420" y="70" width="340" height="160" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">With Bulkhead (Isolated Pools)</text>
  
  <rect x="435" y="115" width="95" height="55" rx="4" fill="#a5d6a7"/>
  <text x="482" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Pool A</text>
  <text x="482" y="155" font-size="9" text-anchor="middle" fill="#666666">Service 1-2</text>
  <text x="482" y="172" font-size="9" text-anchor="middle" fill="#666666">10 threads OK</text>
  
  <rect x="545" y="115" width="95" height="55" rx="4" fill="#ff8a80"/>
  <text x="592" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Pool B</text>
  <text x="592" y="155" font-size="9" text-anchor="middle" fill="#666666">Service 3</text>
  <text x="592" y="172" font-size="9" text-anchor="middle" fill="#666666">10 threads FAIL</text>
  
  <rect x="655" y="115" width="95" height="55" rx="4" fill="#a5d6a7"/>
  <text x="702" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Pool C</text>
  <text x="702" y="155" font-size="9" text-anchor="middle" fill="#666666">Service 4-10</text>
  <text x="702" y="172" font-size="9" text-anchor="middle" fill="#666666">10 threads OK</text>
  
  <rect x="435" y="185" width="310" height="35" rx="4" fill="#e8f5e9"/>
  <text x="590" y="208" font-size="10" text-anchor="middle" fill="#666666">Service 3 isolated — other 9 services continue operating</text>
  
  <!-- Graceful Degradation -->
  <rect x="40" y="260" width="720" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="290" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Graceful Degradation Modes</text>
  
  <rect x="55" y="305" width="210" height="100" rx="6" fill="#bbdefb"/>
  <text x="160" y="328" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Full Functionality</text>
  <text x="160" y="348" font-size="9" text-anchor="middle" fill="#666666">• All features operational</text>
  <text x="160" y="365" font-size="9" text-anchor="middle" fill="#666666">• Real-time data</text>
  <text x="160" y="382" font-size="9" text-anchor="middle" fill="#666666">• Personalized content</text>
  <text x="160" y="399" font-size="9" text-anchor="middle" fill="#666666">• Recommendations active</text>
  
  <rect x="295" y="305" width="210" height="100" rx="6" fill="#fff3e0"/>
  <text x="400" y="328" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Degraded Mode</text>
  <text x="400" y="348" font-size="9" text-anchor="middle" fill="#666666">• Core features work</text>
  <text x="400" y="365" font-size="9" text-anchor="middle" fill="#666666">• Cached data served</text>
  <text x="400" y="382" font-size="9" text-anchor="middle" fill="#666666">• Non-critical disabled</text>
  <text x="400" y="399" font-size="9" text-anchor="middle" fill="#666666">• Checkout works, no recs</text>
  
  <rect x="535" y="305" width="210" height="100" rx="6" fill="#ffebee"/>
  <text x="640" y="328" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Fallback Mode</text>
  <text x="640" y="348" font-size="9" text-anchor="middle" fill="#666666">• Minimal operations</text>
  <text x="640" y="365" font-size="9" text-anchor="middle" fill="#666666">• Read-only access</text>
  <text x="640" y="382" font-size="9" text-anchor="middle" fill="#666666">• Static responses</text>
  <text x="640" y="399" font-size="9" text-anchor="middle" fill="#666666">• Browse only, no checkout</text>
  
  <!-- Feature Tiers -->
  <rect x="40" y="440" width="720" height="140" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="470" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Feature Tier Classification</text>
  
  <rect x="55" y="485" width="160" height="80" rx="6" fill="#c8e6c9"/>
  <text x="135" y="505" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tier 1: Critical</text>
  <text x="135" y="525" font-size="9" text-anchor="middle" fill="#666666">Auth, Checkout</text>
  <text x="135" y="542" font-size="9" text-anchor="middle" fill="#666666">Core APIs</text>
  <text x="135" y="559" font-size="9" text-anchor="middle" fill="#666666">Never disabled</text>
  
  <rect x="245" y="485" width="160" height="80" rx="6" fill="#fff3e0"/>
  <text x="325" y="505" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tier 2: Important</text>
  <text x="325" y="525" font-size="9" text-anchor="middle" fill="#666666">Search, Cart</text>
  <text x="325" y="542" font-size="9" text-anchor="middle" fill="#666666">User Profiles</text>
  <text x="325" y="559" font-size="9" text-anchor="middle" fill="#666666">Cached fallback</text>
  
  <rect x="435" y="485" width="160" height="80" rx="6" fill="#e1bee7"/>
  <text x="515" y="505" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tier 3: Nice-to-have</text>
  <text x="515" y="525" font-size="9" text-anchor="middle" fill="#666666">Reviews, Ratings</text>
  <text x="515" y="542" font-size="9" text-anchor="middle" fill="#666666">Wishlists</text>
  <text x="515" y="559" font-size="9" text-anchor="middle" fill="#666666">Disabled first</text>
  
  <rect x="625" y="485" width="120" height="80" rx="6" fill="#ffebee"/>
  <text x="685" y="505" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tier 4: Experimental</text>
  <text x="685" y="525" font-size="9" text-anchor="middle" fill="#666666">A/B Tests</text>
  <text x="685" y="542" font-size="9" text-anchor="middle" fill="#666666">New Features</text>
  <text x="685" y="559" font-size="9" text-anchor="middle" fill="#666666">Always first off</text>
</svg>
