<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Load Balancing Patterns & Algorithms</text>
  
  <!-- Layer 4 vs Layer 7 -->
  <rect x="40" y="70" width="340" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Layer 4 vs Layer 7</text>
  
  <rect x="55" y="115" width="150" height="95" rx="6" fill="#bbdefb"/>
  <text x="130" y="138" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Layer 4 (TCP)</text>
  <text x="130" y="158" font-size="9" text-anchor="middle" fill="#666666">IP/Port routing</text>
  <text x="130" y="175" font-size="9" text-anchor="middle" fill="#666666">Fast, simple</text>
  <text x="130" y="192" font-size="9" text-anchor="middle" fill="#666666">No inspection</text>
  <text x="130" y="209" font-size="9" text-anchor="middle" fill="#666666">TCP services (DB, Redis)</text>
  
  <rect x="220" y="115" width="150" height="95" rx="6" fill="#c8e6c9"/>
  <text x="295" y="138" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Layer 7 (HTTP)</text>
  <text x="295" y="158" font-size="9" text-anchor="middle" fill="#666666">Content-based routing</text>
  <text x="295" y="175" font-size="9" text-anchor="middle" fill="#666666">Slower, sophisticated</text>
  <text x="295" y="192" font-size="9" text-anchor="middle" fill="#666666">URL/cookie inspection</text>
  <text x="295" y="209" font-size="9" text-anchor="middle" fill="#666666">A/B testing, canary</text>
  
  <!-- Algorithms -->
  <rect x="420" y="70" width="340" height="160" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Load Balancing Algorithms</text>
  
  <rect x="435" y="115" width="150" height="35" rx="4" fill="#a5d6a7"/>
  <text x="510" y="138" font-size="10" text-anchor="middle" fill="#1a1a1a">Round Robin: Sequential</text>
  
  <rect x="605" y="115" width="140" height="35" rx="4" fill="#a5d6a7"/>
  <text x="675" y="138" font-size="10" text-anchor="middle" fill="#1a1a1a">Least Conn: Min active</text>
  
  <rect x="435" y="155" width="150" height="35" rx="4" fill="#a5d6a7"/>
  <text x="510" y="178" font-size="10" text-anchor="middle" fill="#1a1a1a">IP Hash: Sticky by IP</text>
  
  <rect x="605" y="155" width="140" height="35" rx="4" fill="#a5d6a7"/>
  <text x="675" y="178" font-size="10" text-anchor="middle" fill="#1a1a1a">Weighted: By capacity</text>
  
  <rect x="435" y="195" width="310" height="25" rx="4" fill="#e8f5e9"/>
  <text x="590" y="213" font-size="10" text-anchor="middle" fill="#666666">Prefer: Least Connections for varying server sizes</text>
  
  <!-- Health Checks -->
  <rect x="40" y="260" width="340" height="140" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="210" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Health Checks & Failover</text>
  
  <rect x="55" y="305" width="310" height="35" rx="4" fill="#ffe0b2"/>
  <text x="210" y="328" font-size="10" text-anchor="middle" fill="#1a1a1a">Active: Periodic probes (5-10s interval)</text>
  
  <rect x="55" y="345" width="310" height="35" rx="4" fill="#ffe0b2"/>
  <text x="210" y="368" font-size="10" text-anchor="middle" fill="#1a1a1a">Passive: Monitor actual request failures</text>
  
  <rect x="55" y="385" width="310" height="35" rx="4" fill="#ffe0b2"/>
  <text x="210" y="408" font-size="10" text-anchor="middle" fill="#1a1a1a">Circuit Breaker: Open circuit after N failures</text>
  
  <!-- Session Affinity -->
  <rect x="420" y="260" width="340" height="140" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="590" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Session Affinity</text>
  
  <rect x="435" y="305" width="310" height="35" rx="4" fill="#e1bee7"/>
  <text x="590" y="328" font-size="10" text-anchor="middle" fill="#1a1a1a">Cookie-Based: LB sets cookie with server ID</text>
  
  <rect x="435" y="345" width="310" height="35" rx="4" fill="#e1bee7"/>
  <text x="590" y="368" font-size="10" text-anchor="middle" fill="#1a1a1a">IP-Based: Same IP → same server (breaks with NAT)</text>
  
  <rect x="435" y="385" width="310" height="35" rx="4" fill="#f3e5f5"/>
  <text x="590" y="408" font-size="10" text-anchor="middle" fill="#666666">Trade-off: Reduces flexibility, prefer stateless design</text>
  
  <!-- Architecture Flow -->
  <rect x="40" y="430" width="720" height="150" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="460" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Load Balancing Architecture Flow</text>
  
  <rect x="60" y="475" width="120" height="40" rx="6" fill="#bbdefb"/>
  <text x="120" y="500" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Client</text>
  
  <line x1="180" y1="495" x2="220" y2="495" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="220" y="475" width="140" height="40" rx="6" fill="#c8e6c9"/>
  <text x="290" y="493" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Load Balancer</text>
  <text x="290" y="508" font-size="8" text-anchor="middle" fill="#666666">L4 or L7</text>
  
  <line x1="360" y1="485" x2="400" y2="480" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="495" x2="400" y2="495" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="505" x2="400" y2="510" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <rect x="400" y="470" width="100" height="30" rx="4" fill="#bbdefb"/>
  <text x="450" y="490" font-size="9" text-anchor="middle" fill="#1a1a1a">Server 1</text>
  
  <rect x="400" y="505" width="100" height="30" rx="4" fill="#bbdefb"/>
  <text x="450" y="525" font-size="9" text-anchor="middle" fill="#1a1a1a">Server 2</text>
  
  <rect x="520" y="470" width="100" height="30" rx="4" fill="#bbdefb"/>
  <text x="570" y="490" font-size="9" text-anchor="middle" fill="#1a1a1a">Server 3</text>
  
  <rect x="520" y="505" width="100" height="30" rx="4" fill="#bbdefb"/>
  <text x="570" y="525" font-size="9" text-anchor="middle" fill="#1a1a1a">Server N</text>
  
  <text x="660" y="490" font-size="10" text-anchor="middle" fill="#666666">Health Check → Remove unhealthy</text>
  <text x="660" y="510" font-size="10" text-anchor="middle" fill="#666666">Circuit Breaker → Stop sending</text>
  <text x="660" y="530" font-size="10" text-anchor="middle" fill="#666666">Auto-Recovery → Re-add when healthy</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
