<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="capArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Capacity Planning Process</text>
  
  <!-- Planning Cycle -->
  <rect x="50" y="60" width="450" height="250" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Measure -->
  <rect x="70" y="90" width="130" height="70" rx="6" fill="#3b82f6"/>
  <text x="135" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">1. Measure</text>
  <text x="135" y="145" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Current usage</text>
  
  <line x1="200" y1="125" x2="230" y2="125" stroke="#3b82f6" stroke-width="2" marker-end="url(#capArrow)"/>
  
  <!-- Forecast -->
  <rect x="230" y="90" width="130" height="70" rx="6" fill="#8b5cf6"/>
  <text x="295" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">2. Forecast</text>
  <text x="295" y="145" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Future demand</text>
  
  <line x1="360" y1="125" x2="390" y2="125" stroke="#3b82f6" stroke-width="2" marker-end="url(#capArrow)"/>
  
  <!-- Calculate -->
  <rect x="390" y="90" width="100" height="70" rx="6" fill="#f97316"/>
  <text x="440" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">3. Calculate</text>
  <text x="440" y="145" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Requirements</text>
  
  <!-- Arrow down -->
  <line x1="295" y1="160" x2="295" y2="190" stroke="#3b82f6" stroke-width="2" marker-end="url(#capArrow)"/>
  
  <!-- Plan -->
  <rect x="230" y="190" width="130" height="70" rx="6" fill="#22c55e"/>
  <text x="295" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">4. Plan</text>
  <text x="295" y="245" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Procurement</text>
  
  <!-- Arrow left -->
  <line x1="230" y1="225" x2="200" y2="225" stroke="#3b82f6" stroke-width="2" marker-end="url(#capArrow)"/>
  
  <!-- Monitor -->
  <rect x="70" y="190" width="130" height="70" rx="6" fill="#ef4444"/>
  <text x="135" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">5. Monitor</text>
  <text x="135" y="245" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Adjust</text>
  
  <!-- Arrow up (cycle) -->
  <path d="M 135 190 L 135 165" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#capArrow)"/>
  <text x="145" y="180" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Continuous</text>
  
  <!-- Capacity Formula -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Capacity Calculation</text>
  
  <text x="735" y="120" text-anchor="middle" font-size="13" fill="var(--text-primary, #0f172a" font-weight="bold">Required = Peak RPS / (RPS per Instance × Utilization)</text>
  
  <rect x="540" y="135" width="390" height="55" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="735" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Example: 10,000 RPS peak, 500 RPS/instance, 70% utilization</text>
  <text x="735" y="175" text-anchor="middle" font-size="10" fill="var(--text-primary, #0f172a" font-weight="bold">Instances = 10,000 / (500 × 0.7) = 28.6 → 29 instances</text>
  
  <!-- Growth Patterns -->
  <rect x="50" y="330" width="450" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Growth Forecasting</text>
  
  <text x="70" y="380" font-size="9" fill="var(--text-secondary, #47556ird">• Historical: Extrapolate from past trends (10%/month)</text>
  <text x="70" y="400" font-size="9" fill="var(--text-secondary, #47556ird">• Business: Marketing campaigns, product launches</text>
  <text x="70" y="420" font-size="9" fill="var(--text-secondary, #47556ird">• Seasonal: Holiday peaks, day/week patterns</text>
  
  <!-- Scaling Approaches -->
  <rect x="520" y="220" width="430" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Scaling Approaches</text>
  
  <rect x="540" y="265" width="120" height="55" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="600" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="#3b82f6">Static</text>
  <text x="600" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Fixed capacity</text>
  
  <rect x="680" y="265" width="120" height="55" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="740" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="#8b5cf6">Auto-Scaling</text>
  <text x="740" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Dynamic capacity</text>
  
  <rect x="820" y="265" width="120" height="55" rx="4" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="880" y="290" text-anchor="middle" font-size="9" font-weight="bold" fill="#f97316">Hybrid</text>
  <text x="880" y="310" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Baseline + burst</text>
  
  <!-- Alerting Thresholds -->
  <rect x="520" y="350" width="430" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Capacity Alerting</text>
  
  <rect x="540" y="390" width="80" height="40" rx="3" fill="#22c55e"/>
  <text x="580" y="415" text-anchor="middle" font-size="8" fill="#ffffff">&amp;lt;70%</text>
  <text x="580" y="435" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Normal</text>
  
  <rect x="640" y="390" width="80" height="40" rx="3" fill="#f97316"/>
  <text x="680" y="415" text-anchor="middle" font-size="8" fill="#ffffff">70-80%</text>
  <text x="680" y="435" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Warning</text>
  
  <rect x="740" y="390" width="80" height="40" rx="3" fill="#ef4444"/>
  <text x="780" y="415" text-anchor="middle" font-size="8" fill="#ffffff">80-90%</text>
  <text x="780" y="435" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Critical</text>
  
  <rect x="840" y="390" width="80" height="40" rx="3" fill="#8b5cf6"/>
  <text x="880" y="415" text-anchor="middle" font-size="8" fill="#ffffff">&amp;gt;90%</text>
  <text x="880" y="435" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Emergency</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Plan for 2-3× current capacity. Add capacity at 70% utilization, not 90%.</text>
</svg>
