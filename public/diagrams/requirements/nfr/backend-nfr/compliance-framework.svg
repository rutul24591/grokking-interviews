<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Compliance Framework Architecture</text>
  
  <!-- Regulatory Frameworks -->
  <rect x="40" y="70" width="720" height="120" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Regulatory Frameworks</text>
  
  <rect x="55" y="115" width="160" height="60" rx="6" fill="#bbdefb"/>
  <text x="135" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">GDPR</text>
  <text x="135" y="155" font-size="9" text-anchor="middle" fill="#666666">EU personal data</text>
  <text x="135" y="170" font-size="9" text-anchor="middle" fill="#666666">Consent, erasure, portability</text>
  
  <rect x="235" y="115" width="160" height="60" rx="6" fill="#bbdefb"/>
  <text x="315" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">HIPAA</text>
  <text x="315" y="155" font-size="9" text-anchor="middle" fill="#666666">US health data</text>
  <text x="315" y="170" font-size="9" text-anchor="middle" fill="#666666">Access controls, audit controls</text>
  
  <rect x="415" y="115" width="160" height="60" rx="6" fill="#bbdefb"/>
  <text x="495" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">PCI-DSS</text>
  <text x="495" y="155" font-size="9" text-anchor="middle" fill="#666666">Payment card data</text>
  <text x="495" y="170" font-size="9" text-anchor="middle" fill="#666666">Encryption, access control</text>
  
  <rect x="595" y="115" width="150" height="60" rx="6" fill="#bbdefb"/>
  <text x="670" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">SOC 2</text>
  <text x="670" y="155" font-size="9" text-anchor="middle" fill="#666666">Cloud services</text>
  <text x="670" y="170" font-size="9" text-anchor="middle" fill="#666666">Security, availability</text>
  
  <!-- Audit Log Pipeline -->
  <rect x="40" y="220" width="720" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="250" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Audit Log Pipeline</text>
  
  <rect x="55" y="265" width="160" height="50" rx="6" fill="#a5d6a7"/>
  <text x="135" y="285" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Event Sources</text>
  <text x="135" y="303" font-size="9" text-anchor="middle" fill="#666666">App, DB, infra, network</text>
  
  <line x1="215" y1="290" x2="255" y2="290" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="255" y="265" width="160" height="50" rx="6" fill="#a5d6a7"/>
  <text x="335" y="285" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Event Collection</text>
  <text x="335" y="303" font-size="9" text-anchor="middle" fill="#666666">Structured JSON, enriched</text>
  
  <line x1="415" y1="290" x2="455" y2="290" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="455" y="265" width="160" height="50" rx="6" fill="#a5d6a7"/>
  <text x="535" y="285" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Append-Only Store</text>
  <text x="535" y="303" font-size="9" text-anchor="middle" fill="#666666">WORM, tamper-evident</text>
  
  <line x1="615" y1="290" x2="655" y2="290" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="655" y="265" width="90" height="50" rx="6" fill="#a5d6a7"/>
  <text x="700" y="285" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Audit Report</text>
  <text x="700" y="303" font-size="9" text-anchor="middle" fill="#666666">Auditor access</text>
  
  <!-- Tamper Evidence -->
  <rect x="55" y="330" width="340" height="55" rx="6" fill="#c8e6c9"/>
  <text x="225" y="350" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tamper Evidence: Hash Chain</text>
  <text x="225" y="370" font-size="9" text-anchor="middle" fill="#666666">Each entry hashes previous entry — modification breaks chain</text>
  
  <rect x="415" y="330" width="330" height="55" rx="6" fill="#c8e6c9"/>
  <text x="580" y="350" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Access Control: Restricted</text>
  <text x="580" y="370" font-size="9" text-anchor="middle" fill="#666666">Only security/compliance teams can access audit logs</text>
  
  <!-- Automated Compliance Checking -->
  <rect x="40" y="420" width="720" height="160" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="450" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Automated Compliance Checking</text>
  
  <rect x="55" y="465" width="210" height="100" rx="6" fill="#ffe0b2"/>
  <text x="160" y="485" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Policy-as-Code</text>
  <text x="160" y="505" font-size="9" text-anchor="middle" fill="#666666">OPA/Rego, AWS Config Rules</text>
  <text x="160" y="523" font-size="9" text-anchor="middle" fill="#666666">Machine-readable policies</text>
  <text x="160" y="541" font-size="9" text-anchor="middle" fill="#666666">Evaluated against system state</text>
  <text x="160" y="559" font-size="9" text-anchor="middle" fill="#666666">Continuous compliance checking</text>
  
  <rect x="295" y="465" width="210" height="100" rx="6" fill="#ffe0b2"/>
  <text x="400" y="485" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Violation Detection</text>
  <text x="400" y="505" font-size="9" text-anchor="middle" fill="#666666">Unencrypted databases detected</text>
  <text x="400" y="523" font-size="9" text-anchor="middle" fill="#666666">Overly permissive access flagged</text>
  <text x="400" y="541" font-size="9" text-anchor="middle" fill="#666666">Expired certificates identified</text>
  <text x="400" y="559" font-size="9" text-anchor="middle" fill="#666666">Automated alert generation</text>
  
  <rect x="535" y="465" width="210" height="100" rx="6" fill="#ffe0b2"/>
  <text x="640" y="485" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Automated Remediation</text>
  <text x="640" y="505" font-size="9" text-anchor="middle" fill="#666666">Encrypt unencrypted databases</text>
  <text x="640" y="523" font-size="9" text-anchor="middle" fill="#666666">Revoke excessive permissions</text>
  <text x="640" y="541" font-size="9" text-anchor="middle" fill="#666666">Rotate expired certificates</text>
  <text x="640" y="559" font-size="9" text-anchor="middle" fill="#666666">Compliance restored automatically</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
