<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="complianceArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Compliance Framework Overview</text>
  
  <!-- Major Regulations -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Key Regulations</text>
  
  <!-- GDPR -->
  <rect x="70" y="110" width="180" height="70" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="2"/>
  <text x="160" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-blue, #3b82f6)">GDPR</text>
  <text x="160" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">EU Data Protection</text>
  <text x="160" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Consent, Right to Erasure</text>
  
  <!-- HIPAA -->
  <rect x="270" y="110" width="180" height="70" rx="4" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="360" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-green, #22c55e)">HIPAA</text>
  <text x="360" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">US Healthcare</text>
  <text x="360" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">PHI Protection</text>
  
  <!-- SOC 2 -->
  <rect x="70" y="195" width="180" height="70" rx="4" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="160" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-purple, #8b5cf6)">SOC 2</text>
  <text x="160" y="240" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">Security Controls</text>
  <text x="160" y="257" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Trust Services Criteria</text>
  
  <!-- PCI DSS -->
  <rect x="270" y="195" width="180" height="70" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="2"/>
  <text x="360" y="220" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-orange, #f97316)">PCI DSS</text>
  <text x="360" y="240" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">Payment Cards</text>
  <text x="360" y="257" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Cardholder Data Protection</text>
  
  <!-- CCPA -->
  <rect x="70" y="110" transform="translate(380, 42)" width="180" height="70" rx="4" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="360" y="177" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-red, #ef4444)">CCPA</text>
  <text x="360" y="197" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">California Privacy</text>
  <text x="360" y="214" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Consumer Rights</text>
  
  <!-- Audit Trail -->
  <rect x="520" y="60" width="430" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Audit Trail Requirements</text>
  
  <!-- What to log -->
  <rect x="540" y="110" width="190" height="150" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a">What to Audit</text>
  <text x="560" y="160" font-size="9" fill="var(--text-secondary, #475569">• User authentication</text>
  <text x="560" y="178" font-size="9" fill="var(--text-secondary, #475569">• Data access (read/write)</text>
  <text x="560" y="196" font-size="9" fill="var(--text-secondary, #475569">• Permission changes</text>
  <text x="560" y="214" font-size="9" fill="var(--text-secondary, #475569">• System configuration</text>
  <text x="560" y="232" font-size="9" fill="var(--text-secondary, #475569">• Data exports/deletion</text>
  <text x="560" y="250" font-size="9" fill="var(--text-secondary, #475569">• Failed operations</text>
  
  <!-- Audit properties -->
  <rect x="750" y="110" width="180" height="150" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a">Required Fields</text>
  <text x="770" y="160" font-size="9" fill="var(--text-secondary, #475569">• Timestamp (UTC)</text>
  <text x="770" y="178" font-size="9" fill="var(--text-secondary, #475569">• User ID</text>
  <text x="770" y="196" font-size="9" fill="var(--text-secondary, #475569">• Action performed</text>
  <text x="770" y="214" font-size="9" fill="var(--text-secondary, #475569">• Resource affected</text>
  <text x="770" y="232" font-size="9" fill="var(--text-secondary, #475569">• Result (success/fail)</text>
  <text x="770" y="250" font-size="9" fill="var(--text-secondary, #475569">• IP address</text>
  
  <!-- Compliance Implementation -->
  <rect x="50" y="300" width="900" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Implementation Checklist</text>
  
  <text x="150" y="355" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">Data Classification</text>
  <text x="150" y="375" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• PII identification</text>
  <text x="150" y="395" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Sensitivity levels</text>
  <text x="150" y="415" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Retention policies</text>
  
  <text x="350" y="355" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">Access Controls</text>
  <text x="350" y="375" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Role-based access</text>
  <text x="350" y="395" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Least privilege</text>
  <text x="350" y="415" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Regular reviews</text>
  
  <text x="550" y="355" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">Data Protection</text>
  <text x="550" y="375" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Encryption at rest</text>
  <text x="550" y="395" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Encryption in transit</text>
  <text x="550" y="415" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Key management</text>
  
  <text x="750" y="355" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">Audit &amp; Monitor</text>
  <text x="750" y="375" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Audit logging</text>
  <text x="750" y="395" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Anomaly detection</text>
  <text x="750" y="415" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">• Regular audits</text>
  
  <text x="500" y="460" text-anchor="middle" font-size="10" fill="var(--text-muted, #64748b">Key: Compliance is ongoing, not a one-time certification. Continuous monitoring and improvement required.</text>
</svg>
