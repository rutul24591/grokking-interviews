<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cost Optimization Architecture</text>
  
  <!-- Pricing Models -->
  <rect x="40" y="70" width="720" height="120" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cloud Pricing Models</text>
  
  <rect x="55" y="115" width="160" height="60" rx="6" fill="#bbdefb"/>
  <text x="135" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">On-Demand</text>
  <text x="135" y="155" font-size="9" text-anchor="middle" fill="#666666">Pay-as-you-go</text>
  <text x="135" y="170" font-size="9" text-anchor="middle" fill="#666666">0% discount</text>
  
  <rect x="235" y="115" width="160" height="60" rx="6" fill="#bbdefb"/>
  <text x="315" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Reserved (1yr)</text>
  <text x="315" y="155" font-size="9" text-anchor="middle" fill="#666666">30-40% discount</text>
  <text x="315" y="170" font-size="9" text-anchor="middle" fill="#666666">1 year commitment</text>
  
  <rect x="415" y="115" width="160" height="60" rx="6" fill="#bbdefb"/>
  <text x="495" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Spot Instances</text>
  <text x="495" y="155" font-size="9" text-anchor="middle" fill="#666666">70-90% discount</text>
  <text x="495" y="170" font-size="9" text-anchor="middle" fill="#666666">Reclaimable (2min notice)</text>
  
  <rect x="595" y="115" width="150" height="60" rx="6" fill="#bbdefb"/>
  <text x="670" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Savings Plans</text>
  <text x="670" y="155" font-size="9" text-anchor="middle" fill="#666666">20-50% discount</text>
  <text x="670" y="170" font-size="9" text-anchor="middle" fill="#666666">Flexible commitment</text>
  
  <!-- Cost Optimization Strategies -->
  <rect x="40" y="220" width="340" height="200" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="250" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cost Optimization Strategies</text>
  
  <rect x="55" y="265" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="285" font-size="10" text-anchor="middle" fill="#1a1a1a">Resource Rightsizing: Match capacity to utilization</text>
  
  <rect x="55" y="300" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="320" font-size="10" text-anchor="middle" fill="#1a1a1a">Auto-Scaling: Scale down during low-traffic periods</text>
  
  <rect x="55" y="335" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="355" font-size="10" text-anchor="middle" fill="#1a1a1a">Storage Tiering: Hot → Warm → Cold → Archive</text>
  
  <rect x="55" y="370" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="390" font-size="10" text-anchor="middle" fill="#1a1a1a">Waste Elimination: Remove unused resources</text>
  
  <rect x="55" y="405" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="425" font-size="10" text-anchor="middle" fill="#1a1a1a">Data Transfer Optimization: CDN, co-location, VPC endpoints</text>
  
  <!-- FinOps Governance -->
  <rect x="420" y="220" width="340" height="200" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="250" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">FinOps Governance</text>
  
  <rect x="435" y="265" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="285" font-size="10" text-anchor="middle" fill="#1a1a1a">Cost Allocation Tags: team, service, environment</text>
  
  <rect x="435" y="300" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="320" font-size="10" text-anchor="middle" fill="#1a1a1a">Monthly Cost Reports: per team, per service</text>
  
  <rect x="435" y="335" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="355" font-size="10" text-anchor="middle" fill="#1a1a1a">Cost Budgets: alert at 80% and 100% thresholds</text>
  
  <rect x="435" y="370" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="390" font-size="10" text-anchor="middle" fill="#1a1a1a">Cost Reviews: include in team retrospectives</text>
  
  <rect x="435" y="405" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="425" font-size="10" text-anchor="middle" fill="#1a1a1a">Optimization Tracking: measure and report savings</text>
  
  <!-- Capacity Mix -->
  <rect x="40" y="450" width="720" height="130" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="480" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Optimal Capacity Mix</text>
  
  <rect x="55" y="495" width="210" height="70" rx="6" fill="#e1bee7"/>
  <text x="160" y="515" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Reserved: 60-70%</text>
  <text x="160" y="535" font-size="9" text-anchor="middle" fill="#666666">Baseline capacity</text>
  <text x="160" y="550" font-size="9" text-anchor="middle" fill="#666666">Predictable workloads</text>
  <text x="160" y="565" font-size="9" text-anchor="middle" fill="#666666">30-60% cost savings</text>
  
  <rect x="295" y="495" width="210" height="70" rx="6" fill="#e1bee7"/>
  <text x="400" y="515" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">On-Demand: 10-20%</text>
  <text x="400" y="535" font-size="9" text-anchor="middle" fill="#666666">Variable capacity</text>
  <text x="400" y="550" font-size="9" text-anchor="middle" fill="#666666">Unpredictable spikes</text>
  <text x="400" y="565" font-size="9" text-anchor="middle" fill="#666666">New deployments</text>
  
  <rect x="535" y="495" width="210" height="70" rx="6" fill="#e1bee7"/>
  <text x="640" y="515" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Spot: 10-30%</text>
  <text x="640" y="535" font-size="9" text-anchor="middle" fill="#666666">Fault-tolerant workloads</text>
  <text x="640" y="550" font-size="9" text-anchor="middle" fill="#666666">Batch, CI/CD, stateless</text>
  <text x="640" y="565" font-size="9" text-anchor="middle" fill="#666666">70-90% cost savings</text>
</svg>
