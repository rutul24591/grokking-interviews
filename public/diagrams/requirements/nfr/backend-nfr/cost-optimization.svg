<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="costArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Cloud Cost Optimization</text>
  
  <!-- Cost Breakdown -->
  <rect x="50" y="60" width="450" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Typical Cloud Cost Breakdown</text>
  
  <!-- Compute -->
  <rect x="70" y="110" width="180" height="40" rx="3" fill="var(--bg-blue, #3b82f6)"/>
  <text x="160" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Compute (40-50%)</text>
  
  <!-- Database -->
  <rect x="70" y="155" width="180" height="40" rx="3" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="160" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Database (20-30%)</text>
  
  <!-- Network -->
  <rect x="270" y="110" width="180" height="40" rx="3" fill="var(--bg-orange, #f97316)"/>
  <text x="360" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Network/Egress (10-20%)</text>
  
  <!-- Storage -->
  <rect x="270" y="155" width="180" height="40" rx="3" fill="var(--bg-green, #22c55e)"/>
  <text x="360" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Storage (10-15%)</text>
  
  <!-- Optimization Strategies -->
  <rect x="520" y="60" width="430" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Cost Optimization Strategies</text>
  
  <rect x="540" y="110" width="190" height="65" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a">Right-Sizing</text>
  <text x="635" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Match resources to usage</text>
  <text x="635" y="172" text-anchor="middle" font-size="8" fill="#22c55e" font-weight="bold">Save 30-50%</text>
  
  <rect x="750" y="110" width="180" height="65" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a">Reserved Instances</text>
  <text x="840" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">1-3 year commitment</text>
  <text x="840" y="172" text-anchor="middle" font-size="8" fill="#22c55e" font-weight="bold">Save 40-72%</text>
  
  <rect x="540" y="185" width="190" height="65" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a">Spot Instances</text>
  <text x="635" y="230" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Spare capacity (interruptible)</text>
  <text x="635" y="247" text-anchor="middle" font-size="8" fill="#22c55e" font-weight="bold">Save 60-90%</text>
  
  <rect x="750" y="185" width="180" height="65" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a">Auto-Scaling</text>
  <text x="840" y="230" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Scale with demand</text>
  <text x="840" y="247" text-anchor="middle" font-size="8" fill="#22c55e" font-weight="bold">Save 20-40%</text>
  
  <!-- Pricing Models -->
  <rect x="50" y="280" width="450" height="160" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Pricing Models Comparison</text>
  
  <rect x="70" y="325" width="110" height="45" rx="3" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="125" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-red, #ef4444)">On-Demand</text>
  <text x="125" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">100% cost</text>
  
  <rect x="200" y="325" width="110" height="45" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="255" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316)">Reserved (1yr)</text>
  <text x="255" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">~60% cost</text>
  
  <rect x="330" y="325" width="110" height="45" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="385" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6)">Reserved (3yr)</text>
  <text x="385" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">~40% cost</text>
  
  <rect x="70" y="380" width="110" height="45" rx="3" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="125" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e)">Spot</text>
  <text x="125" y="417" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">~20% cost</text>
  
  <text x="200" y="395" font-size="8" fill="var(--text-secondary, #47556ird">✓ Flexible</text>
  <text x="330" y="395" font-size="8" fill="var(--text-secondary, #47556ird">✓ Best value</text>
  <text x="70" y="435" font-size="8" fill="#f59e0b">⚠ Can be terminated</text>
  
  <!-- Cost Allocation -->
  <rect x="520" y="280" width="430" height="160" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Cost Allocation &amp; Governance</text>
  
  <text x="540" y="335" font-size="9" fill="var(--text-secondary, #47556ird">• Tag all resources (team, project, environment)</text>
  <text x="540" y="355" font-size="9" fill="var(--text-secondary, #47556ird">• Set up cost alerts at thresholds</text>
  <text x="540" y="375" font-size="9" fill="var(--text-secondary, #47556ird">• Regular cost reviews (weekly/monthly)</text>
  <text x="540" y="395" font-size="9" fill="var(--text-secondary, #47556ird">• Showback/chargeback to teams</text>
  <text x="540" y="415" font-size="9" fill="var(--text-secondary, #47556ird">• Budget caps and spending limits</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Start with right-sizing and reserved instances for stable workloads. Use spot for fault-tolerant workloads.</text>
</svg>
