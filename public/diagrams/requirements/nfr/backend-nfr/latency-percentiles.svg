<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="latencyArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Latency Percentiles Explained</text>
  
  <!-- Histogram -->
  <rect x="50" y="60" width="500" height="250" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="300" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Request Latency Distribution</text>
  
  <!-- Axes -->
  <line x1="100" y1="270" x2="500" y2="270" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <line x1="100" y1="120" x2="100" y2="270" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  
  <text x="300" y="295" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">Latency (ms) →</text>
  <text x="60" y="195" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)" transform="rotate(-90, 60, 195)">Requests →</text>
  
  <!-- Histogram bars -->
  <rect x="120" y="240" width="30" height="30" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="155" y="210" width="30" height="60" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="190" y="170" width="30" height="100" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="225" y="140" width="30" height="130" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="260" y="130" width="30" height="140" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="295" y="150" width="30" height="120" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="330" y="180" width="30" height="90" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="365" y="210" width="30" height="60" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="400" y="235" width="30" height="35" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="435" y="250" width="30" height="20" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <rect x="470" y="260" width="20" height="10" fill="var(--bg-red, #ef4444)" opacity="0.7"/>
  
  <!-- Percentile markers -->
  <line x1="200" y1="110" x2="200" y2="270" stroke="var(--border-green, #22c55e)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="200" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-green, #22c55e)">P50</text>
  <text x="200" y="285" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e)">50ms</text>
  
  <line x1="350" y1="110" x2="350" y2="270" stroke="var(--border-orange, #f97316)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="350" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-orange, #f97316)">P95</text>
  <text x="350" y="285" text-anchor="middle" font-size="9" fill="var(--border-orange, #f97316)">150ms</text>
  
  <line x1="450" y1="110" x2="450" y2="270" stroke="var(--border-red, #ef4444)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="450" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-red, #ef4444)">P99</text>
  <text x="450" y="285" text-anchor="middle" font-size="9" fill="var(--border-red, #ef4444)">300ms</text>
  
  <!-- CDF Curve -->
  <rect x="570" y="60" width="380" height="250" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="760" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Cumulative Distribution (CDF)</text>
  
  <!-- CDF Axes -->
  <line x1="620" y1="270" x2="920" y2="270" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <line x1="620" y1="120" x2="620" y2="270" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  
  <text x="770" y="295" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">Latency (ms) →</text>
  <text x="590" y="195" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)" transform="rotate(-90, 590, 195)">Cumulative % →</text>
  
  <!-- CDF Curve (S-curve) -->
  <path d="M 620 270 Q 650 265 680 240 Q 720 200 760 160 Q 800 120 840 110 Q 880 105 920 105" fill="none" stroke="var(--border-purple, #8b5cf6)" stroke-width="3"/>
  
  <!-- CDF Percentile markers -->
  <circle cx="710" cy="185" r="5" fill="var(--bg-green, #22c55e)"/>
  <line x1="710" y1="185" x2="710" y2="270" stroke="var(--border-green, #22c55e)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="710" y="285" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e)">P50</text>
  
  <circle cx="820" cy="125" r="5" fill="var(--bg-orange, #f97316)"/>
  <line x1="820" y1="125" x2="820" y2="270" stroke="var(--border-orange, #f97316)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="820" y="285" text-anchor="middle" font-size="9" fill="var(--border-orange, #f97316)">P95</text>
  
  <circle cx="880" cy="110" r="5" fill="var(--bg-red, #ef4444)"/>
  <line x1="880" y1="110" x2="880" y2="270" stroke="var(--border-red, #ef4444)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="880" y="285" text-anchor="middle" font-size="9" fill="var(--border-red, #ef4444)">P99</text>
  
  <!-- Key insight box -->
  <rect x="50" y="325" width="900" height="70" rx="6" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Key Insight: Why P99 Matters More Than Average</text>
  <text x="500" y="375" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Average latency hides outliers. If P50=50ms but P99=500ms, 1% of users have 10× worse experience.</text>
  <text x="500" y="395" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">For systems with many sequential calls, tail latency compounds: 10 calls with P99=100ms → P99 total can exceed 1 second.</text>
</svg>
