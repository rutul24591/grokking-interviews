<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Data Retention Deep Dive</text>
  
  <!-- Automated Lifecycle Policies -->
  <rect x="40" y="70" width="340" height="200" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Automated Lifecycle Policies</text>
  
  <rect x="55" y="115" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Day 0-30: Hot storage (SSD, sub-ms access)</text>
  
  <rect x="55" y="150" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">Day 31-90: Warm storage (HDD, ms access)</text>
  
  <rect x="55" y="185" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">Day 91-365: Cold storage (archive, min-hr access)</text>
  
  <rect x="55" y="220" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">Day 365+: Delete (or extend if compliance requires)</text>
  
  <rect x="55" y="255" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="275" font-size="10" text-anchor="middle" fill="#1a1a1a">Legal hold: Preserve regardless of retention period</text>
  
  <!-- Compliance Requirements -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Compliance Requirements</text>
  
  <rect x="435" y="115" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">GDPR: Erasure on request (any time, any data)</text>
  
  <rect x="435" y="150" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">HIPAA: Minimum 6-year retention (audit records)</text>
  
  <rect x="435" y="185" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">PCI-DSS: Minimum 1-year retention (transaction logs)</text>
  
  <rect x="435" y="220" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">SOX: Minimum 7-year retention (financial records)</text>
  
  <rect x="435" y="255" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="275" font-size="10" text-anchor="middle" fill="#1a1a1a">Legal holds override all retention policies</text>
  
  <!-- Archival Retrieval -->
  <rect x="40" y="300" width="720" height="140" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="330" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Archival Retrieval Process</text>
  
  <rect x="55" y="345" width="160" height="80" rx="6" fill="#ffe0b2"/>
  <text x="135" y="365" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Request</text>
  <text x="135" y="385" font-size="9" text-anchor="middle" fill="#666666">Compliance or user request</text>
  <text x="135" y="400" font-size="9" text-anchor="middle" fill="#666666">Authorization verified</text>
  <text x="135" y="415" font-size="9" text-anchor="middle" fill="#666666">Scope defined</text>
  
  <rect x="235" y="345" width="160" height="80" rx="6" fill="#ffe0b2"/>
  <text x="315" y="365" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Locate</text>
  <text x="315" y="385" font-size="9" text-anchor="middle" fill="#666666">Search metadata index</text>
  <text x="315" y="400" font-size="9" text-anchor="middle" fill="#666666">Identify storage tier</text>
  <text x="315" y="415" font-size="9" text-anchor="middle" fill="#666666">Estimate retrieval time</text>
  
  <rect x="415" y="345" width="160" height="80" rx="6" fill="#ffe0b2"/>
  <text x="495" y="365" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Retrieve</text>
  <text x="495" y="385" font-size="9" text-anchor="middle" fill="#666666">Restore from archive</text>
  <text x="495" y="400" font-size="9" text-anchor="middle" fill="#666666">Decrypt if encrypted</text>
  <text x="495" y="415" font-size="9" text-anchor="middle" fill="#666666">Verify integrity (checksum)</text>
  
  <rect x="595" y="345" width="150" height="80" rx="6" fill="#ffe0b2"/>
  <text x="670" y="365" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Deliver</text>
  <text x="670" y="385" font-size="9" text-anchor="middle" fill="#666666">Format for requester</text>
  <text x="670" y="400" font-size="9" text-anchor="middle" fill="#666666">Secure delivery</text>
  <text x="670" y="415" font-size="9" text-anchor="middle" fill="#666666">Audit access logged</text>
  
  <!-- Cost Impact -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Storage Cost Impact by Tier</text>
  
  <rect x="55" y="515" width="160" height="50" rx="6" fill="#e1bee7"/>
  <text x="135" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Hot: $100-200/TB</text>
  <text x="135" y="555" font-size="9" text-anchor="middle" fill="#666666">Baseline cost</text>
  
  <rect x="235" y="515" width="160" height="50" rx="6" fill="#e1bee7"/>
  <text x="315" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Warm: $20-50/TB</text>
  <text x="315" y="555" font-size="9" text-anchor="middle" fill="#666666">60-75% savings</text>
  
  <rect x="415" y="515" width="160" height="50" rx="6" fill="#e1bee7"/>
  <text x="495" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cold: $4-10/TB</text>
  <text x="495" y="555" font-size="9" text-anchor="middle" fill="#666666">90-95% savings</text>
  
  <rect x="595" y="515" width="150" height="50" rx="6" fill="#e1bee7"/>
  <text x="670" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Mixed Average</text>
  <text x="670" y="555" font-size="9" text-anchor="middle" fill="#666666">50-80% overall savings</text>
</svg>
