<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CI/CD Pipeline Architecture</text>
  
  <!-- Pipeline Stages -->
  <rect x="40" y="70" width="720" height="120" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CI/CD Pipeline Stages</text>
  
  <rect x="55" y="115" width="100" height="60" rx="6" fill="#bbdefb"/>
  <text x="105" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Source</text>
  <text x="105" y="153" font-size="9" text-anchor="middle" fill="#666666">Git commit</text>
  <text x="105" y="168" font-size="9" text-anchor="middle" fill="#666666">Webhook trigger</text>
  
  <rect x="165" y="115" width="100" height="60" rx="6" fill="#bbdefb"/>
  <text x="215" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Build</text>
  <text x="215" y="153" font-size="9" text-anchor="middle" fill="#666666">Compile, lint</text>
  <text x="215" y="168" font-size="9" text-anchor="middle" fill="#666666">Dependencies</text>
  
  <rect x="275" y="115" width="100" height="60" rx="6" fill="#bbdefb"/>
  <text x="325" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Test</text>
  <text x="325" y="153" font-size="9" text-anchor="middle" fill="#666666">Unit, integration</text>
  <text x="325" y="168" font-size="9" text-anchor="middle" fill="#666666">Security, perf</text>
  
  <rect x="385" y="115" width="100" height="60" rx="6" fill="#bbdefb"/>
  <text x="435" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Artifact</text>
  <text x="435" y="153" font-size="9" text-anchor="middle" fill="#666666">Package build</text>
  <text x="435" y="168" font-size="9" text-anchor="middle" fill="#666666">Push to registry</text>
  
  <rect x="495" y="115" width="100" height="60" rx="6" fill="#bbdefb"/>
  <text x="545" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">5. Deploy</text>
  <text x="545" y="153" font-size="9" text-anchor="middle" fill="#666666">Rolling/blue-green</text>
  <text x="545" y="168" font-size="9" text-anchor="middle" fill="#666666">Canary analysis</text>
  
  <rect x="605" y="115" width="100" height="60" rx="6" fill="#c8e6c9"/>
  <text x="655" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">6. Verify</text>
  <text x="655" y="153" font-size="9" text-anchor="middle" fill="#666666">Smoke tests</text>
  <text x="655" y="168" font-size="9" text-anchor="middle" fill="#666666">Health checks</text>
  
  <!-- Deployment Strategies -->
  <rect x="40" y="220" width="720" height="160" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="250" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Deployment Strategies</text>
  
  <rect x="55" y="265" width="160" height="100" rx="6" fill="#a5d6a7"/>
  <text x="135" y="285" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Rolling</text>
  <text x="135" y="305" font-size="9" text-anchor="middle" fill="#666666">Replace instances</text>
  <text x="135" y="320" font-size="9" text-anchor="middle" fill="#666666">one at a time</text>
  <text x="135" y="335" font-size="9" text-anchor="middle" fill="#666666">Zero downtime</text>
  <text x="135" y="350" font-size="9" text-anchor="middle" fill="#666666">Slow rollback</text>
  
  <rect x="235" y="265" width="160" height="100" rx="6" fill="#a5d6a7"/>
  <text x="315" y="285" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Blue-Green</text>
  <text x="315" y="305" font-size="9" text-anchor="middle" fill="#666666">Two environments</text>
  <text x="315" y="320" font-size="9" text-anchor="middle" fill="#666666">Instant switch</text>
  <text x="315" y="335" font-size="9" text-anchor="middle" fill="#666666">Instant rollback</text>
  <text x="315" y="350" font-size="9" text-anchor="middle" fill="#666666">2× infra cost</text>
  
  <rect x="415" y="265" width="160" height="100" rx="6" fill="#a5d6a7"/>
  <text x="495" y="285" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Canary</text>
  <text x="495" y="305" font-size="9" text-anchor="middle" fill="#666666">1-5% traffic first</text>
  <text x="495" y="320" font-size="9" text-anchor="middle" fill="#666666">Monitor metrics</text>
  <text x="495" y="335" font-size="9" text-anchor="middle" fill="#666666">Gradual rollout</text>
  <text x="495" y="350" font-size="9" text-anchor="middle" fill="#666666">Auto rollback</text>
  
  <rect x="595" y="265" width="150" height="100" rx="6" fill="#a5d6a7"/>
  <text x="670" y="285" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Feature Flags</text>
  <text x="670" y="305" font-size="9" text-anchor="middle" fill="#666666">Deploy hidden</text>
  <text x="670" y="320" font-size="9" text-anchor="middle" fill="#666666">Toggle on/off</text>
  <text x="670" y="335" font-size="9" text-anchor="middle" fill="#666666">No redeploy</text>
  <text x="670" y="350" font-size="9" text-anchor="middle" fill="#666666">Code complexity</text>
  
  <!-- Rollback Flow -->
  <rect x="40" y="410" width="720" height="170" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="440" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Automated Rollback Flow</text>
  
  <rect x="55" y="455" width="160" height="50" rx="6" fill="#ffe0b2"/>
  <text x="135" y="475" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Deploy New Version</text>
  <text x="135" y="493" font-size="9" text-anchor="middle" fill="#666666">Canary 5% traffic</text>
  
  <line x1="215" y1="480" x2="255" y2="480" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="255" y="455" width="160" height="50" rx="6" fill="#ffe0b2"/>
  <text x="335" y="475" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Monitor Metrics</text>
  <text x="335" y="493" font-size="9" text-anchor="middle" fill="#666666">Error rate, latency</text>
  
  <line x1="415" y1="480" x2="455" y2="480" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="455" y="455" width="160" height="50" rx="6" fill="#c8e6c9"/>
  <text x="535" y="475" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Metrics OK?</text>
  <text x="535" y="493" font-size="9" text-anchor="middle" fill="#666666">Yes → Continue rollout</text>
  
  <rect x="455" y="510" width="160" height="50" rx="6" fill="#ffcdd2"/>
  <text x="535" y="530" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Metrics BAD?</text>
  <text x="535" y="548" font-size="9" text-anchor="middle" fill="#d84315">Yes → Auto rollback</text>
  
  <line x1="615" y1="480" x2="675" y2="480" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="645" y="472" font-size="9" text-anchor="middle" fill="#4caf50">OK</text>
  
  <line x1="615" y1="535" x2="675" y2="535" stroke="#f44336" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="645" y="527" font-size="9" text-anchor="middle" fill="#f44336">FAIL</text>
  
  <rect x="675" y="455" width="70" height="50" rx="6" fill="#c8e6c9"/>
  <text x="710" y="483" font-size="9" font-weight="bold" text-anchor="middle" fill="#1a1a1a">100%</text>
  
  <rect x="675" y="510" width="70" height="50" rx="6" fill="#ffcdd2"/>
  <text x="710" y="538" font-size="9" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Rollback</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f44336"/>
    </marker>
  </defs>
</svg>
