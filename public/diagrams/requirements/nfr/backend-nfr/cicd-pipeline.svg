<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="ciArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">CI/CD Pipeline Stages</text>
  
  <!-- Pipeline Flow -->
  <rect x="50" y="60" width="900" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Stage 1: Commit -->
  <rect x="70" y="90" width="130" height="120" rx="6" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="135" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#3b82f6">1. Commit</text>
  <text x="135" y="150" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">• Code review</text>
  <text x="135" y="168" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">• Static analysis</text>
  <text x="135" y="186" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Security scan</text>
  
  <!-- Arrow -->
  <line x1="205" y1="150" x2="235" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#ciArrow)"/>
  
  <!-- Stage 2: Build -->
  <rect x="240" y="90" width="130" height="120" rx="6" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="305" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b5cf6">2. Build</text>
  <text x="305" y="150" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Compile</text>
  <text x="305" y="168" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Package</text>
  <text x="305" y="186" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Containerize</text>
  
  <!-- Arrow -->
  <line x1="375" y1="150" x2="405" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#ciArrow)"/>
  
  <!-- Stage 3: Test -->
  <rect x="410" y="90" width="130" height="120" rx="6" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="2"/>
  <text x="475" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#f97316">3. Test</text>
  <text x="475" y="150" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Unit tests</text>
  <text x="475" y="168" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Integration</text>
  <text x="475" y="186" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• E2E tests</text>
  
  <!-- Arrow -->
  <line x1="545" y1="150" x2="575" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#ciArrow)"/>
  
  <!-- Stage 4: Deploy Staging -->
  <rect x="580" y="90" width="130" height="120" rx="6" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="645" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#3b82f6">4. Staging</text>
  <text x="645" y="150" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Deploy to staging</text>
  <text x="645" y="168" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Smoke tests</text>
  <text x="645" y="186" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Performance</text>
  
  <!-- Arrow -->
  <line x1="715" y1="150" x2="745" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#ciArrow)"/>
  
  <!-- Stage 5: Deploy Production -->
  <rect x="750" y="90" width="180" height="120" rx="6" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="840" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#22c55e">5. Production</text>
  <text x="840" y="150" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Canary/Blue-Green</text>
  <text x="840" y="168" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Health checks</text>
  <text x="840" y="186" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Rollback ready</text>
  
  <!-- Deployment Strategies -->
  <rect x="50" y="260" width="450" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Deployment Strategies</text>
  
  <rect x="70" y="305" width="180" height="55" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a">Rolling Update</text>
  <text x="160" y="350" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Gradual replacement</text>
  
  <rect x="270" y="305" width="180" height="55" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a">Blue-Green</text>
  <text x="360" y="350" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Two environments, instant switch</text>
  
  <rect x="70" y="375" width="180" height="55" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="160" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a">Canary</text>
  <text x="160" y="420" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Small % first, then expand</text>
  
  <rect x="270" y="375" width="180" height="55" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-primary, #0f172a">Feature Flags</text>
  <text x="360" y="420" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Deploy hidden, enable gradually</text>
  
  <!-- Rollback Mechanisms -->
  <rect x="520" y="260" width="430" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Rollback Mechanisms</text>
  
  <text x="540" y="315" font-size="10" fill="var(--text-secondary, #47556ird">• Automated rollback on health check failure</text>
  <text x="540" y="335" font-size="10" fill="var(--text-secondary, #47556ird">• Manual rollback trigger</text>
  <text x="540" y="355" font-size="10" fill="var(--text-secondary, #47556ird">• Database migration rollback scripts</text>
  <text x="540" y="375" font-size="10" fill="var(--text-secondary, #47556ird">• Previous version artifacts retained</text>
  <text x="540" y="395" font-size="10" fill="var(--text-secondary, #47556ird">• Feature flag kill switches</text>
  
  <text x="735" y="425" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="bold">Key: Always have a rollback plan before deploying</text>
  
  <!-- Quality Gates -->
  <rect x="50" y="455" width="900" height="85" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="478" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a">Quality Gates (Must Pass Before Promotion)</text>
  <text x="150" y="505" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">Code Coverage &amp;gt; 80%</text>
  <text x="300" y="505" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">Zero Critical Bugs</text>
  <text x="450" y="505" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">Security Scan Pass</text>
  <text x="600" y="505" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">Performance Budget</text>
  <text x="750" y="505" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">All Tests Pass</text>
  <text x="900" y="505" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">Approval (if required)</text>
</svg>
