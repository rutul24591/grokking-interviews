<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="rateArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Rate Limiting Algorithms Comparison</text>
  
  <!-- Token Bucket -->
  <rect x="50" y="60" width="300" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="200" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Token Bucket</text>
  
  <!-- Bucket visualization -->
  <rect x="140" y="110" width="120" height="100" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <rect x="142" y="170" width="116" height="38" rx="2" fill="#3b82f6" opacity="0.6"/>
  <text x="200" y="195" text-anchor="middle" font-size="10" fill="#ffffff">Tokens</text>
  
  <circle cx="170" cy="140" r="8" fill="#3b82f6"/>
  <circle cx="190" cy="135" r="8" fill="#3b82f6"/>
  <circle cx="210" cy="145" r="8" fill="#3b82f6"/>
  <circle cx="230" cy="140" r="8" fill="#3b82f6"/>
  
  <text x="200" y="230" text-anchor="middle" font-size="9" fill="#475569">+1 token every 100ms</text>
  <text x="200" y="248" text-anchor="middle" font-size="9" fill="#475569">Max capacity: 10 tokens</text>
  <text x="200" y="266" text-anchor="middle" font-size="9" fill="#475569">✓ Allows bursts</text>
  
  <!-- Sliding Window Log -->
  <rect x="370" y="60" width="300" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="520" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Sliding Window Log</text>
  
  <!-- Timeline visualization -->
  <line x1="400" y1="140" x2="640" y2="140" stroke="#3b82f6" stroke-width="2"/>
  <text x="520" y="160" text-anchor="middle" font-size="9" fill="#475569">Time →</text>
  
  <rect x="420" y="120" width="15" height="40" rx="2" fill="#8b5cf6"/>
  <rect x="450" y="120" width="15" height="40" rx="2" fill="#8b5cf6"/>
  <rect x="480" y="120" width="15" height="40" rx="2" fill="#8b5cf6"/>
  <rect x="510" y="120" width="15" height="40" rx="2" fill="#8b5cf6"/>
  <rect x="540" y="120" width="15" height="40" rx="2" fill="#8b5cf6"/>
  
  <rect x="400" y="180" width="240" height="30" rx="3" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="520" y="200" text-anchor="middle" font-size="9" fill="#475569">Window: 1 second</text>
  
  <text x="520" y="230" text-anchor="middle" font-size="9" fill="#475569">Track timestamp of each request</text>
  <text x="520" y="248" text-anchor="middle" font-size="9" fill="#475569">✓ Precise, no bursts</text>
  <text x="520" y="266" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Memory intensive</text>
  
  <!-- Leaky Bucket -->
  <rect x="690" y="60" width="260" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="820" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Leaky Bucket</text>
  
  <!-- Bucket with leak -->
  <path d="M 760 120 L 880 120 L 870 200 L 770 200 Z" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="2"/>
  <path d="M 762 180 L 878 180 L 872 200 L 772 200 Z" fill="#f97316" opacity="0.6"/>
  
  <!-- Dripping water -->
  <circle cx="820" cy="215" r="5" fill="#f97316"/>
  <circle cx="820" cy="230" r="5" fill="#f97316"/>
  <circle cx="820" cy="245" r="5" fill="#f97316"/>
  
  <text x="820" y="230" text-anchor="middle" font-size="9" fill="#475569">Constant outflow</text>
  <text x="820" y="260" text-anchor="middle" font-size="9" fill="#475569">✓ Smooths traffic</text>
  <text x="820" y="278" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">✗ No bursts allowed</text>
  
  <!-- Algorithm comparison -->
  <rect x="50" y="300" width="900" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Algorithm Selection Guide</text>
  
  <text x="150" y="355" text-anchor="middle" font-size="11" fill="#475569">Token Bucket:</text>
  <text x="150" y="375" text-anchor="middle" font-size="10" fill="#475569">API rate limiting</text>
  <text x="150" y="395" text-anchor="middle" font-size="10" fill="#475569">Allows controlled bursts</text>
  
  <text x="350" y="355" text-anchor="middle" font-size="11" fill="#475569">Sliding Window:</text>
  <text x="350" y="375" text-anchor="middle" font-size="10" fill="#475569">Precise rate limiting</text>
  <text x="350" y="395" text-anchor="middle" font-size="10" fill="#475569">High-traffic APIs</text>
  
  <text x="550" y="355" text-anchor="middle" font-size="11" fill="#475569">Leaky Bucket:</text>
  <text x="550" y="375" text-anchor="middle" font-size="10" fill="#475569">Traffic shaping</text>
  <text x="550" y="395" text-anchor="middle" font-size="10" fill="#475569">Constant output rate</text>
  
  <text x="750" y="355" text-anchor="middle" font-size="11" fill="#475569">Fixed Window:</text>
  <text x="750" y="375" text-anchor="middle" font-size="10" fill="#475569">Simple use cases</text>
  <text x="750" y="395" text-anchor="middle" font-size="10" fill="#475569">Low-precision needs</text>
  
  <text x="500" y="440" text-anchor="middle" font-size="10" fill="var(--text-muted, #64748b)">Key: Token Bucket is most common for API rate limiting. Sliding Window for precision. Leaky Bucket for traffic shaping.</text>
  
  <!-- Rate limit tiers -->
  <rect x="50" y="435" width="440" height="105" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="270" y="460" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Rate Limit Tiers Example</text>
  
  <text x="80" y="485" font-size="10" fill="#475569">Free:</text>
  <text x="130" y="485" font-size="10" fill="#0f172a" font-weight="bold">100 req/hour</text>
  
  <text x="80" y="505" font-size="10" fill="#475569">Pro:</text>
  <text x="130" y="505" font-size="10" fill="#0f172a" font-weight="bold">10,000 req/hour</text>
  
  <text x="80" y="525" font-size="10" fill="#475569">Enterprise:</text>
  <text x="180" y="525" font-size="10" fill="#0f172a" font-weight="bold">1,000,000 req/hour</text>
  
  <text x="300" y="485" font-size="10" fill="#475569">Burst:</text>
  <text x="360" y="485" font-size="10" fill="#0f172a" font-weight="bold">10 req/sec</text>
  
  <text x="300" y="505" font-size="10" fill="var(--text-secondary, #475569">Burst:</text>
  <text x="360" y="505" font-size="10" fill="#0f172a" font-weight="bold">100 req/sec</text>
  
  <text x="300" y="525" font-size="10" fill="var(--text-secondary, #475569">Burst:</text>
  <text x="360" y="525" font-size="10" fill="#0f172a" font-weight="bold">1000 req/sec</text>
  
  <!-- Abuse protection -->
  <rect x="510" y="435" width="440" height="105" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="730" y="460" text-anchor="middle" font-size="12" font-weight="bold" fill="#0f172a">Abuse Protection Patterns</text>
  
  <text x="530" y="485" font-size="10" fill="#475569">• IP-based rate limiting</text>
  <text x="530" y="505" font-size="10" fill="#475569">• User-based rate limiting</text>
  <text x="530" y="525" font-size="10" fill="#475569">• CAPTCHA for suspicious activity</text>
  
  <text x="730" y="485" font-size="10" fill="#475569">• Request fingerprinting</text>
  <text x="730" y="505" font-size="10" fill="#475569">• Behavioral analysis</text>
  <text x="730" y="525" font-size="10" fill="#475569">• Progressive delays</text>
</svg>
