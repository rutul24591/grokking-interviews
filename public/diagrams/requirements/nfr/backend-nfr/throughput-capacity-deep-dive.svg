<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="throughputArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Throughput Capacity Deep Dive</text>
  
  <!-- Throughput vs Latency -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Throughput vs Latency Trade-off</text>
  
  <!-- Graph -->
  <line x1="100" y1="200" x2="400" y2="200" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="100" y1="120" x2="100" y2="200" stroke="#e2e8f0" stroke-width="2"/>
  
  <text x="250" y="220" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">Load/Concurrency →</text>
  <text x="60" y="160" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird" transform="rotate(-90, 60, 160)">Throughput →</text>
  
  <!-- Throughput curve -->
  <path d="M 100 190 Q 200 140 300 130 L 350 130 L 380 150" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="320" y="120" text-anchor="middle" font-size="8" fill="var(--border-blue, #3b82f6" font-weight="bold">Throughput</text>
  
  <!-- Latency curve -->
  <path d="M 100 195 Q 250 190 350 140 L 380 120" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="4,2"/>
  <text x="360" y="110" text-anchor="middle" font-size="8" fill="var(--border-red, #ef4444" font-weight="bold">Latency</text>
  
  <!-- Saturation point -->
  <circle cx="350" cy="130" r="5" fill="#f97316"/>
  <line x1="350" y1="130" x2="350" y2="200" stroke="#f97316" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="350" y="215" text-anchor="middle" font-size="8" fill="var(--border-orange, #f97316" font-weight="bold">Saturation Point</text>
  
  <text x="275" y="245" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Beyond saturation: throughput drops, latency spikes</text>
  
  <!-- Little's Law -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Little's Law</text>
  
  <rect x="540" y="110" width="390" height="70" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="735" y="135" text-anchor="middle" font-size="13" fill="var(--text-primary, #0f172a" font-weight="bold">L = λ × W</text>
  <text x="735" y="160" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Where: L = Avg items in system</text>
  <text x="735" y="177" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">λ (lambda) = Arrival rate (throughput)</text>
  
  <text x="735" y="195" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a" font-weight="bold">Example: 1000 RPS, 50ms latency → 50 concurrent requests</text>
  
  <!-- Bottleneck Identification -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Bottleneck Identification</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Database Queries</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Slow queries, locks</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Network I/O</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Bandwidth limits</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">CPU-Bound Operations</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Computation limits</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">External API Calls</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Third-party rate limits</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Measure throughput at saturation. Identify and remove bottlenecks iteratively.</text>
</svg>
