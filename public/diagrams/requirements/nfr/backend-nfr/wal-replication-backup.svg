<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">WAL, Replication & Backup Deep Dive</text>
  
  <!-- WAL -->
  <rect x="40" y="70" width="220" height="180" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="150" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">WAL (Write-Ahead Log)</text>
  
  <rect x="60" y="115" width="200" height="30" rx="4" fill="#bbdefb"/>
  <text x="160" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">1. Write to WAL first</text>
  
  <rect x="60" y="150" width="200" height="30" rx="4" fill="#bbdefb"/>
  <text x="160" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">2. Flush WAL to disk</text>
  
  <rect x="60" y="185" width="200" height="30" rx="4" fill="#bbdefb"/>
  <text x="160" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">3. Apply to data files</text>
  
  <rect x="60" y="220" width="200" height="30" rx="4" fill="#bbdefb"/>
  <text x="160" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">4. Checkpoint (merge WAL)</text>
  
  <text x="150" y="265" font-size="10" text-anchor="middle" fill="#4caf50">✓ Durability guarantee</text>
  
  <!-- Replication -->
  <rect x="290" y="70" width="220" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Replication</text>
  
  <rect x="310" y="115" width="200" height="30" rx="4" fill="#a5d6a7"/>
  <text x="410" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Primary writes to WAL</text>
  
  <rect x="310" y="150" width="200" height="30" rx="4" fill="#a5d6a7"/>
  <text x="410" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">Replica streams WAL</text>
  
  <rect x="310" y="185" width="200" height="30" rx="4" fill="#a5d6a7"/>
  <text x="410" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">Replica applies changes</text>
  
  <rect x="310" y="220" width="200" height="30" rx="4" fill="#a5d6a7"/>
  <text x="410" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">Replica stays in sync</text>
  
  <text x="400" y="265" font-size="10" text-anchor="middle" fill="#4caf50">✓ High availability</text>
  
  <!-- Backup -->
  <rect x="540" y="70" width="220" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="650" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Backup</text>
  
  <rect x="560" y="115" width="200" height="30" rx="4" fill="#ffe0b2"/>
  <text x="660" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">1. Take base backup</text>
  
  <rect x="560" y="150" width="200" height="30" rx="4" fill="#ffe0b2"/>
  <text x="660" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">2. Archive WAL segments</text>
  
  <rect x="560" y="185" width="200" height="30" rx="4" fill="#ffe0b2"/>
  <text x="660" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">3. Store offsite</text>
  
  <rect x="560" y="220" width="200" height="30" rx="4" fill="#ffe0b2"/>
  <text x="660" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">4. Test restore regularly</text>
  
  <text x="650" y="265" font-size="10" text-anchor="middle" fill="#4caf50">✓ Disaster recovery</text>
  
  <!-- Recovery Flow -->
  <rect x="40" y="280" width="720" height="140" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="310" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Recovery Flow</text>
  
  <rect x="60" y="330" width="180" height="70" rx="6" fill="#bbdefb"/>
  <text x="150" y="355" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Restore Backup</text>
  <text x="150" y="375" font-size="10" text-anchor="middle" fill="#666666">Load base backup</text>
  <text x="150" y="393" font-size="10" text-anchor="middle" fill="#666666">To point-in-time T0</text>
  
  <rect x="270" y="330" width="180" height="70" rx="6" fill="#c8e6c9"/>
  <text x="360" y="355" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Replay WAL</text>
  <text x="360" y="375" font-size="10" text-anchor="middle" fill="#666666">Apply archived WAL</text>
  <text x="360" y="393" font-size="10" text-anchor="middle" fill="#666666">From T0 to target time</text>
  
  <rect x="480" y="330" width="180" height="70" rx="6" fill="#fff3e0"/>
  <text x="570" y="355" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Verify Integrity</text>
  <text x="570" y="375" font-size="10" text-anchor="middle" fill="#666666">Check data consistency</text>
  <text x="570" y="393" font-size="10" text-anchor="middle" fill="#666666">Run validation queries</text>
  
  <rect x="690" y="330" width="60" height="70" rx="6" fill="#e8f5e9"/>
  <text x="720" y="360" font-size="10" text-anchor="middle" fill="#4caf50">Ready</text>
  <text x="720" y="380" font-size="10" text-anchor="middle" fill="#4caf50">for</text>
  <text x="720" y="400" font-size="10" text-anchor="middle" fill="#4caf50">use</text>
  
  <!-- Key Principles -->
  <rect x="40" y="450" width="220" height="130" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="150" y="480" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RPO (Recovery Point)</text>
  <text x="150" y="510" font-size="11" text-anchor="middle" fill="#666666">Max data loss tolerance</text>
  <text x="150" y="530" font-size="11" text-anchor="middle" fill="#666666">Determined by backup</text>
  <text x="150" y="550" font-size="11" text-anchor="middle" fill="#666666">frequency + WAL archiving</text>
  <text x="150" y="570" font-size="11" text-anchor="middle" fill="#666666">Target: Near-zero RPO</text>
  
  <rect x="290" y="450" width="220" height="130" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="480" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RTO (Recovery Time)</text>
  <text x="400" y="510" font-size="11" text-anchor="middle" fill="#666666">Max downtime tolerance</text>
  <text x="400" y="530" font-size="11" text-anchor="middle" fill="#666666">Determined by restore speed</text>
  <text x="400" y="550" font-size="11" text-anchor="middle" fill="#666666">+ WAL replay time</li>
  <text x="400" y="570" font-size="11" text-anchor="middle" fill="#666666">Target: Minutes</text>
  
  <rect x="540" y="450" width="220" height="130" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="650" y="480" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Best Practices</text>
  <text x="650" y="510" font-size="11" text-anchor="middle" fill="#666666">• Regular backup testing</text>
  <text x="650" y="530" font-size="11" text-anchor="middle" fill="#666666">• Offsite backup storage</text>
  <text x="650" y="550" font-size="11" text-anchor="middle" fill="#666666">• Automated WAL archiving</text>
  <text x="650" y="570" font-size="11" text-anchor="middle" fill="#666666">• Document recovery runbooks</text>
</svg>
