<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <marker id="bottleArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="500" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Identifying & Removing Bottlenecks</text>
  
  <!-- Bottleneck visualization -->
  <rect x="50" y="60" width="450" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">System with Bottleneck</text>
  
  <!-- Pipeline with bottleneck -->
  <rect x="80" y="120" width="100" height="80" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <text x="130" y="155" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff)">Service A</text>
  <text x="130" y="175" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">1000 RPS</text>
  
  <line x1="180" y1="160" x2="220" y2="160" stroke="var(--border-accent, #3b82f6)" stroke-width="3" marker-end="url(#bottleArrow)"/>
  <text x="200" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569)">1000 req/s</text>
  
  <rect x="220" y="135" width="80" height="50" rx="4" fill="var(--bg-red, #ef4444)" opacity="0.8"/>
  <text x="260" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">BOTTLENECK</text>
  <text x="260" y="180" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Service B: 100 RPS</text>
  
  <line x1="300" y1="160" x2="340" y2="160" stroke="var(--border-accent, #3b82f6)" stroke-width="3" marker-end="url(#bottleArrow)"/>
  <text x="320" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569)">100 req/s</text>
  
  <rect x="340" y="120" width="100" height="80" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.7"/>
  <text x="390" y="155" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff)">Service C</text>
  <text x="390" y="175" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">1000 RPS capacity</text>
  <text x="390" y="195" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">receiving only 100</text>
  
  <text x="275" y="240" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold">System throughput limited to 100 RPS (slowest component)</text>
  
  <!-- Common bottlenecks -->
  <rect x="520" y="60" width="430" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Common Bottleneck Locations</text>
  
  <rect x="540" y="110" width="190" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Database</text>
  <text x="635" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Slow queries, locks, connections</text>
  
  <rect x="750" y="110" width="180" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Network</text>
  <text x="840" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Bandwidth, latency, packet loss</text>
  
  <rect x="540" y="175" width="190" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">CPU</text>
  <text x="635" y="220" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Compute-intensive operations</text>
  
  <rect x="750" y="175" width="180" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Memory</text>
  <text x="840" y="220" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">GC pauses, swapping, allocation</text>
  
  <rect x="540" y="240" width="190" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Disk I/O</text>
  <text x="635" y="285" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Read/write throughput, IOPS</text>
  
  <rect x="750" y="240" width="180" height="55" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">External APIs</text>
  <text x="840" y="285" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Rate limits, latency, availability</text>
  
  <!-- Bottleneck removal strategies -->
  <rect x="50" y="275" width="900" height="215" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Bottleneck Removal Strategies</text>
  
  <rect x="70" y="320" width="260" height="75" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="200" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Scale the Bottleneck</text>
  <text x="200" y="365" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Add more instances of the bottleneck</text>
  <text x="200" y="382" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Direct approach</text>
  
  <rect x="350" y="320" width="260" height="75" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="480" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Optimize the Bottleneck</text>
  <text x="480" y="365" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Improve efficiency (caching, indexing)</text>
  <text x="480" y="382" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Cost-effective</text>
  
  <rect x="630" y="320" width="300" height="75" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="780" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Parallelize Around Bottleneck</text>
  <text x="780" y="365" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Process multiple requests concurrently</text>
  <text x="780" y="382" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Increases throughput</text>
  
  <rect x="70" y="410" width="260" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="200" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Async Processing</text>
  <text x="200" y="455" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Queue requests, process later</text>
  <text x="200" y="472" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Smooths peaks</text>
  
  <rect x="350" y="410" width="260" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="480" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Cache Results</text>
  <text x="480" y="455" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Avoid repeated processing</text>
  <text x="480" y="472" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Reduces load</text>
  
  <rect x="630" y="410" width="300" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="780" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Load Shedding</text>
  <text x="780" y="455" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Reject low-priority requests</text>
  <text x="780" y="472" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Protects critical paths</text>
</svg>
