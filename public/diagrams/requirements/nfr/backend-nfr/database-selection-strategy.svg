<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="dbArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Database Selection Decision Tree</text>
  
  <!-- Decision Tree -->
  <rect x="50" y="60" width="450" height="300" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  
  <!-- Root question -->
  <rect x="175" y="80" width="150" height="50" rx="6" fill="var(--bg-blue, #3b82f6)"/>
  <text x="250" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Need Complex</text>
  <text x="250" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Queries/Joins?</text>
  
  <!-- Yes path -->
  <line x1="250" y1="130" x2="250" y2="160" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="260" y="150" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e)" font-weight="bold">YES</text>
  
  <rect x="175" y="160" width="150" height="50" rx="6" fill="var(--bg-green, #22c55e)"/>
  <text x="250" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-inverse, #ffffff)">SQL Database</text>
  
  <text x="250" y="225" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">PostgreSQL, MySQL</text>
  <text x="250" y="240" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ ACID transactions</text>
  <text x="250" y="255" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Complex queries</text>
  
  <!-- No path -->
  <path d="M 250 130 L 250 145 L 350 145 L 350 160" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="340" y="140" text-anchor="middle" font-size="9" fill="var(--border-red, #ef4444)" font-weight="bold">NO</text>
  
  <rect x="275" y="160" width="150" height="50" rx="6" fill="var(--bg-orange, #f97316)"/>
  <text x="350" y="185" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Need Horizontal</text>
  <text x="350" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Scaling?</text>
  
  <!-- Yes path from scaling -->
  <line x1="350" y1="210" x2="350" y2="240" stroke="var(--border-green, #22c55e)" stroke-width="2"/>
  <text x="360" y="230" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e)" font-weight="bold">YES</text>
  
  <rect x="275" y="240" width="150" height="50" rx="6" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="350" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">NoSQL Database</text>
  
  <text x="350" y="295" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Cassandra, DynamoDB</text>
  <text x="350" y="310" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Horizontal scaling</text>
  <text x="350" y="325" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ High write throughput</text>
  
  <!-- No path from scaling -->
  <path d="M 350 210 L 350 225 L 150 225 L 150 240" stroke="var(--border-red, #ef4444)" stroke-width="2"/>
  <text x="160" y="220" text-anchor="middle" font-size="9" fill="var(--border-red, #ef4444)" font-weight="bold">NO</text>
  
  <rect x="75" y="240" width="150" height="50" rx="6" fill="var(--bg-blue, #3b82f6)"/>
  <text x="150" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Document Store</text>
  <text x="150" y="285" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">MongoDB</text>
  
  <!-- Database Types -->
  <rect x="520" y="60" width="430" height="300" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Database Types</text>
  
  <!-- SQL -->
  <rect x="540" y="110" width="190" height="80" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-blue, #3b82f6)">Relational (SQL)</text>
  <text x="635" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Fixed schema, ACID</text>
  <text x="635" y="172" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Use: Financial, ERP</text>
  <text x="635" y="187" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a)" font-weight="bold">PostgreSQL, MySQL</text>
  
  <!-- Document -->
  <rect x="540" y="200" width="190" height="80" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-blue, #3b82f6)">Document</text>
  <text x="635" y="245" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Flexible schema, JSON</text>
  <text x="635" y="262" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Use: Content, catalogs</text>
  <text x="635" y="277" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a)" font-weight="bold">MongoDB, CouchDB</text>
  
  <!-- Key-Value -->
  <rect x="540" y="290" width="190" height="60" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-blue, #3b82f6)">Key-Value</text>
  <text x="635" y="335" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Simple, fast lookups</text>
  <text x="635" y="347" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a)" font-weight="bold">Redis, DynamoDB</text>
  
  <!-- Column-Family -->
  <rect x="750" y="110" width="180" height="80" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Column-Family</text>
  <text x="840" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Wide columns, scalable</text>
  <text x="840" y="172" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Use: Time-series, IoT</text>
  <text x="840" y="187" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a)" font-weight="bold">Cassandra, HBase</text>
  
  <!-- Graph -->
  <rect x="750" y="200" width="180" height="80" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Graph</text>
  <text x="840" y="245" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Relationships, traversals</text>
  <text x="840" y="262" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Use: Social, fraud detection</text>
  <text x="840" y="277" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a)" font-weight="bold">Neo4j, Neptune</text>
  
  <!-- Time-Series -->
  <rect x="750" y="290" width="180" height="60" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Time-Series</text>
  <text x="840" y="335" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Time-ordered data</text>
  <text x="840" y="347" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a)" font-weight="bold">InfluxDB, TimescaleDB</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Choose database based on access patterns, consistency needs, and scale requirements.</text>
</svg>
