<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Latency SLA Architecture & Monitoring</text>
  
  <!-- Latency Percentiles -->
  <rect x="40" y="60" width="340" height="180" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Latency Percentiles</text>
  
  <rect x="55" y="105" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="210" y="125" font-size="11" text-anchor="middle" fill="#1a1a1a">P50 (Median): 50% of requests faster than this</text>
  
  <rect x="55" y="138" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="210" y="158" font-size="11" text-anchor="middle" fill="#1a1a1a">P95: 95% of requests faster than this</text>
  
  <rect x="55" y="171" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="210" y="191" font-size="11" text-anchor="middle" fill="#1a1a1a">P99: 99% of requests faster than this — tail latency</text>
  
  <rect x="55" y="204" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="210" y="224" font-size="11" text-anchor="middle" fill="#1a1a1a">P99.9: 99.9% of requests — worst 1 in 1000</text>
  
  <!-- SLI/SLO/SLA Hierarchy -->
  <rect x="420" y="60" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">SLI → SLO → SLA Hierarchy</text>
  
  <rect x="435" y="105" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="128" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">SLI (Indicator): What you measure</text>
  
  <rect x="435" y="145" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="168" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">SLO (Objective): Target you set</text>
  
  <rect x="435" y="185" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="208" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">SLA (Agreement): Promise to customers</text>
  
  <!-- Tail Latency Impact -->
  <rect x="40" y="270" width="720" height="160" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="300" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tail Latency Impact on User Experience</text>
  
  <rect x="55" y="315" width="220" height="100" rx="6" fill="#ffe0b2"/>
  <text x="165" y="338" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Single Request</text>
  <text x="165" y="358" font-size="10" text-anchor="middle" fill="#666666">P50: 50ms — Feels instant</text>
  <text x="165" y="378" font-size="10" text-anchor="middle" fill="#666666">P99: 500ms — Noticeable</text>
  <text x="165" y="398" font-size="10" text-anchor="middle" fill="#666666">P99.9: 2000ms — Frustrating</text>
  
  <rect x="295" y="315" width="220" height="100" rx="6" fill="#ffe0b2"/>
  <text x="405" y="338" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Fan-Out (10 requests)</text>
  <text x="405" y="358" font-size="10" text-anchor="middle" fill="#666666">P50: 50ms — still instant</text>
  <text x="405" y="378" font-size="10" text-anchor="middle" fill="#666666">P99: 500ms → ~1s total</text>
  <text x="405" y="398" font-size="10" text-anchor="middle" fill="#666666">P99.9: 2s → ~4s total</text>
  
  <rect x="535" y="315" width="210" height="100" rx="6" fill="#ffe0b2"/>
  <text x="640" y="338" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cascading Effect</text>
  <text x="640" y="358" font-size="10" text-anchor="middle" fill="#666666">Tail latency multiplies</text>
  <text x="640" y="378" font-size="10" text-anchor="middle" fill="#666666">across service hops</text>
  <text x="640" y="398" font-size="10" text-anchor="middle" fill="#666666">P99 × 5 services = 2.5s</text>
  
  <!-- Error Budget -->
  <rect x="40" y="460" width="340" height="120" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="210" y="490" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Error Budget</text>
  <rect x="55" y="505" width="310" height="28" rx="4" fill="#e1bee7"/>
  <text x="210" y="525" font-size="11" text-anchor="middle" fill="#1a1a1a">SLO: 99.9% availability = 0.1% error budget</text>
  <rect x="55" y="538" width="310" height="28" rx="4" fill="#e1bee7"/>
  <text x="210" y="558" font-size="11" text-anchor="middle" fill="#1a1a1a">0.1% of 8760 hours = 8.76 hours/year downtime</text>
  
  <!-- Setting SLAs -->
  <rect x="420" y="460" width="340" height="120" rx="8" fill="#bbdefb" stroke="#90caf9" stroke-width="2"/>
  <text x="590" y="490" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Setting Latency SLAs</text>
  <rect x="435" y="505" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="590" y="525" font-size="11" text-anchor="middle" fill="#1a1a1a">1. Measure current P50, P95, P99</text>
  <rect x="435" y="538" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="590" y="558" font-size="11" text-anchor="middle" fill="#1a1a1a">2. Set SLO at P99 + 20% buffer</text>
  <rect x="435" y="571" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="590" y="591" font-size="11" text-anchor="middle" fill="#1a1a1a">3. Set SLA at SLO - 10% (safety margin)</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
