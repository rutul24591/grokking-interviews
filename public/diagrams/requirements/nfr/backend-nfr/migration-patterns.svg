<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="migrateArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Zero-Downtime Migration Patterns</text>
  
  <!-- Expand-Contract Pattern -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Expand-Contract Pattern</text>
  
  <!-- Phase 1: Expand -->
  <rect x="70" y="110" width="120" height="55" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#3b82f6">Phase 1: Expand</text>
  <text x="130" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Add new column</text>
  
  <!-- Arrow -->
  <line x1="195" y1="137" x2="225" y2="137" stroke="#3b82f6" stroke-width="2" marker-end="url(#migrateArrow)"/>
  
  <!-- Phase 2: Migrate -->
  <rect x="230" y="110" width="120" height="55" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="290" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b5cf6">Phase 2: Migrate</text>
  <text x="290" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Backfill data</text>
  
  <!-- Arrow -->
  <line x1="355" y1="137" x2="385" y2="137" stroke="#3b82f6" stroke-width="2" marker-end="url(#migrateArrow)"/>
  
  <!-- Phase 3: Contract -->
  <rect x="390" y="110" width="100" height="55" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="440" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">Phase 3: Contract</text>
  <text x="440" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #475569">Remove old</text>
  
  <!-- Code example -->
  <rect x="70" y="180" width="410" height="90" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="205" font-size="9" fill="var(--text-secondary, #475569">-- Phase 1: Add new column (nullable)</text>
  <text x="90" y="222" font-size="9" fill="#0f172a" font-weight="bold">ALTER TABLE users ADD COLUMN email_new VARCHAR(255);</text>
  <text x="90" y="245" font-size="9" fill="var(--text-secondary, #475569">-- Phase 2: Backfill (batched)</text>
  <text x="90" y="262" font-size="9" fill="#0f172a" font-weight="bold">UPDATE users SET email_new = LOWER(email_old) WHERE email_new IS NULL;</text>
  
  <!-- Dual Write Pattern -->
  <rect x="520" y="60" width="430" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Dual Write Pattern</text>
  
  <!-- Diagram -->
  <rect x="550" y="110" width="100" height="50" rx="4" fill="#3b82f6"/>
  <text x="600" y="140" text-anchor="middle" font-size="10" fill="#ffffff">Application</text>
  
  <line x1="650" y1="135" x2="680" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#migrateArrow)"/>
  <line x1="650" y1="145" x2="680" y2="165" stroke="#3b82f6" stroke-width="2" marker-end="url(#migrateArrow)"/>
  
  <rect x="680" y="110" width="110" height="50" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="735" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Old Schema</text>
  <text x="735" y="152" text-anchor="middle" font-size="8" fill="#ffffff">Primary</text>
  
  <rect x="680" y="170" width="110" height="50" rx="4" fill="#8b5cf6" opacity="0.7"/>
  <text x="735" y="195" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">New Schema</text>
  <text x="735" y="212" text-anchor="middle" font-size="8" fill="#ffffff">Secondary</text>
  
  <text x="735" y="250" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">✓ Both writes succeed before completing</text>
  <text x="735" y="270" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569">✓ Read from old, verify new</text>
  <text x="735" y="290" text-anchor="middle" font-size="10" fill="#f59e0b">⚠ Complex, potential inconsistency</text>
  
  <!-- Migration Strategies -->
  <rect x="50" y="300" width="900" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Migration Strategy Comparison</text>
  
  <text x="150" y="355" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569">Big Bang</text>
  <text x="150" y="375" text-anchor="middle" font-size="9" fill="#ef4444">✗ Downtime required</text>
  <text x="150" y="395" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">Simple, fast</text>
  <text x="150" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Low risk tolerance</text>
  
  <text x="350" y="355" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569">Expand-Contract</text>
  <text x="350" y="375" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓ Zero downtime</text>
  <text x="350" y="395" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569">Gradual, safe</text>
  <text x="350" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Schema changes</text>
  
  <text x="550" y="355" text-anchor="middle" font-size="11" fill="var(--text-secondary, #47556ird">Dual Write</text>
  <text x="550" y="375" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓ Zero downtime</text>
  <text x="550" y="395" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Complex</text>
  <text x="550" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Database migrations</text>
  
  <text x="750" y="355" text-anchor="middle" font-size="11" fill="var(--text-secondary, #47556ird">Shadow Read</text>
  <text x="750" y="375" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓ Validate silently</text>
  <text x="750" y="395" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Read from both</text>
  <text x="750" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Data verification</text>
  
  <text x="500" y="460" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Choose strategy based on risk tolerance, complexity, and downtime requirements</text>
</svg>
