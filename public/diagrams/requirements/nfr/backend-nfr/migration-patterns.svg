<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Migration Patterns Deep Dive</text>
  
  <!-- Online Migration Flow -->
  <rect x="40" y="70" width="720" height="180" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Online Migration with Dual-Write</text>
  
  <rect x="55" y="115" width="140" height="60" rx="6" fill="#bbdefb"/>
  <text x="125" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Phase 1: Dual-Write</text>
  <text x="125" y="155" font-size="9" text-anchor="middle" fill="#666666">Write to both old</text>
  <text x="125" y="170" font-size="9" text-anchor="middle" fill="#666666">and new systems</text>
  
  <line x1="195" y1="145" x2="235" y2="145" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="235" y="115" width="140" height="60" rx="6" fill="#bbdefb"/>
  <text x="305" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Phase 2: Backfill</text>
  <text x="305" y="155" font-size="9" text-anchor="middle" fill="#666666">Copy historical data</text>
  <text x="305" y="170" font-size="9" text-anchor="middle" fill="#666666">from old to new</text>
  
  <line x1="375" y1="145" x2="415" y2="145" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="415" y="115" width="140" height="60" rx="6" fill="#bbdefb"/>
  <text x="485" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Phase 3: Verify</text>
  <text x="485" y="155" font-size="9" text-anchor="middle" fill="#666666">Compare row counts,</text>
  <text x="485" y="170" font-size="9" text-anchor="middle" fill="#666666">checksums, samples</text>
  
  <line x1="555" y1="145" x2="595" y2="145" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="595" y="115" width="140" height="60" rx="6" fill="#c8e6c9"/>
  <text x="665" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Phase 4: Cutover</text>
  <text x="665" y="155" font-size="9" text-anchor="middle" fill="#666666">Switch reads to new,</text>
  <text x="665" y="170" font-size="9" text-anchor="middle" fill="#666666">decommission old</text>
  
  <!-- Backfill Execution -->
  <rect x="40" y="280" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="310" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Backfill Execution</text>
  
  <rect x="55" y="325" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="345" font-size="10" text-anchor="middle" fill="#1a1a1a">Read batch from old system (e.g., 1000 rows)</text>
  
  <rect x="55" y="360" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="380" font-size="10" text-anchor="middle" fill="#1a1a1a">Transform data to new format</text>
  
  <rect x="55" y="395" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="415" font-size="10" text-anchor="middle" fill="#1a1a1a">Write batch to new system</text>
  
  <rect x="55" y="430" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="450" font-size="10" text-anchor="middle" fill="#1a1a1a">Update progress tracking</text>
  
  <rect x="55" y="465" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="485" font-size="10" text-anchor="middle" fill="#1a1a1a">Sleep (control rate), repeat until complete</text>
  
  <!-- Verification and Rollback -->
  <rect x="420" y="280" width="340" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="310" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Verification & Rollback</text>
  
  <rect x="435" y="325" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="345" font-size="10" text-anchor="middle" fill="#1a1a1a">Row count comparison: old vs new system</text>
  
  <rect x="435" y="360" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="380" font-size="10" text-anchor="middle" fill="#1a1a1a">Checksum verification for data integrity</text>
  
  <rect x="435" y="395" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="415" font-size="10" text-anchor="middle" fill="#1a1a1a">Sample record comparison (random sampling)</text>
  
  <rect x="435" y="430" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="450" font-size="10" text-anchor="middle" fill="#1a1a1a">Rollback: switch reads back to old system</text>
  
  <!-- Migration Timeline -->
  <rect x="40" y="490" width="720" height="90" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="520" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Migration Timeline (Typical)</text>
  
  <rect x="55" y="535" width="160" height="35" rx="4" fill="#e1bee7"/>
  <text x="135" y="558" font-size="9" text-anchor="middle" fill="#1a1a1a">Week 1: Schema expand</text>
  
  <rect x="235" y="535" width="160" height="35" rx="4" fill="#e1bee7"/>
  <text x="315" y="558" font-size="9" text-anchor="middle" fill="#1a1a1a">Week 2-3: Backfill</text>
  
  <rect x="415" y="535" width="160" height="35" rx="4" fill="#e1bee7"/>
  <text x="495" y="558" font-size="9" text-anchor="middle" fill="#1a1a1a">Week 4: Deploy + Verify</text>
  
  <rect x="595" y="535" width="150" height="35" rx="4" fill="#e1bee7"/>
  <text x="670" y="558" font-size="9" text-anchor="middle" fill="#1a1a1a">Week 5: Cutover + Contract</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
