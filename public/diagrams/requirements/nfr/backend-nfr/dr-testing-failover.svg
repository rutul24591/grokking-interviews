<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">DR Testing and Failover Validation</text>
  
  <!-- Quarterly Test Scenarios -->
  <rect x="40" y="70" width="720" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Quarterly DR Test Scenarios</text>
  
  <rect x="55" y="115" width="220" height="100" rx="6" fill="#bbdefb"/>
  <text x="165" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Test 1: Site Outage</text>
  <text x="165" y="155" font-size="9" text-anchor="middle" fill="#666666">Simulate primary site failure</text>
  <text x="165" y="173" font-size="9" text-anchor="middle" fill="#666666">Disable all services in primary</text>
  <text x="165" y="191" font-size="9" text-anchor="middle" fill="#666666">Measure RTO and RPO</text>
  <text x="165" y="209" font-size="9" text-anchor="middle" fill="#666666">Verify DR site serves traffic</text>
  
  <rect x="295" y="115" width="220" height="100" rx="6" fill="#bbdefb"/>
  <text x="405" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Test 2: Data Corruption</text>
  <text x="405" y="155" font-size="9" text-anchor="middle" fill="#666666">Inject data corruption</text>
  <text x="405" y="173" font-size="9" text-anchor="middle" fill="#666666">Restore from clean backup</text>
  <text x="405" y="191" font-size="9" text-anchor="middle" fill="#666666">Verify data integrity</text>
  <text x="405" y="209" font-size="9" text-anchor="middle" fill="#666666">Measure restoration time</text>
  
  <rect x="535" y="115" width="210" height="100" rx="6" fill="#bbdefb"/>
  <text x="640" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Test 3: Partial Failure</text>
  <text x="640" y="155" font-size="9" text-anchor="middle" fill="#666666">Failover individual services</text>
  <text x="640" y="173" font-size="9" text-anchor="middle" fill="#666666">Verify end-to-end function</text>
  <text x="640" y="191" font-size="9" text-anchor="middle" fill="#666666">Test dependency failover</text>
  <text x="640" y="209" font-size="9" text-anchor="middle" fill="#666666">Validate monitoring alerts</text>
  
  <!-- Recovery Playbook Execution -->
  <rect x="40" y="260" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Recovery Playbook Execution</text>
  
  <rect x="55" y="305" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="325" font-size="10" text-anchor="middle" fill="#1a1a1a">Step 1: Declare incident and assemble team</text>
  
  <rect x="55" y="340" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="360" font-size="10" text-anchor="middle" fill="#1a1a1a">Step 2: Assess disaster scope and impact</text>
  
  <rect x="55" y="375" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="395" font-size="10" text-anchor="middle" fill="#1a1a1a">Step 3: Execute failover procedure (automated)</text>
  
  <rect x="55" y="410" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="430" font-size="10" text-anchor="middle" fill="#1a1a1a">Step 4: Verify data consistency and service health</text>
  
  <rect x="55" y="445" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="465" font-size="10" text-anchor="middle" fill="#1a1a1a">Step 5: Communicate status and document lessons</text>
  
  <!-- RTO/RPO Measurement -->
  <rect x="420" y="260" width="340" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RTO/RPO Measurement</text>
  
  <rect x="435" y="305" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="325" font-size="10" text-anchor="middle" fill="#1a1a1a">Target RTO: 4 hours → Actual: 45 minutes ✓</text>
  
  <rect x="435" y="340" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="360" font-size="10" text-anchor="middle" fill="#1a1a1a">Target RPO: 1 hour → Actual: 2 minutes ✓</text>
  
  <rect x="435" y="375" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="395" font-size="10" text-anchor="middle" fill="#1a1a1a">Failover automation: 90% automated, 10% manual</text>
  
  <rect x="435" y="410" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="430" font-size="10" text-anchor="middle" fill="#1a1a1a">Gaps identified: DNS propagation delay (15 min)</text>
  
  <rect x="435" y="445" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="465" font-size="10" text-anchor="middle" fill="#1a1a1a">Remediation: Pre-warm DNS, reduce TTL to 60s</text>
  
  <!-- Test Results Dashboard -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">DR Test Results Summary</text>
  
  <rect x="55" y="515" width="220" height="50" rx="6" fill="#e1bee7"/>
  <text x="165" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Last Test: Q4 2025</text>
  <text x="165" y="555" font-size="9" text-anchor="middle" fill="#666666">RTO: 45min (target: 4hr) ✓</text>
  
  <rect x="295" y="515" width="220" height="50" rx="6" fill="#e1bee7"/>
  <text x="405" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Next Test: Q1 2026</text>
  <text x="405" y="555" font-size="9" text-anchor="middle" fill="#666666">RPO: 2min (target: 1hr) ✓</text>
  
  <rect x="535" y="515" width="210" height="50" rx="6" fill="#e1bee7"/>
  <text x="640" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Status: PASSED</text>
  <text x="640" y="555" font-size="9" text-anchor="middle" fill="#666666">Gaps documented, tracked</text>
</svg>
