<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Retry and Backoff Strategies</text>
  
  <!-- Immediate Retry (Anti-Pattern) -->
  <rect x="40" y="70" width="340" height="120" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Immediate Retry (Anti-Pattern)</text>
  
  <rect x="55" y="115" width="310" height="55" rx="6" fill="#ffcdd2"/>
  <text x="210" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">t=0: Fail → t=0: Retry → t=0: Fail → t=0: Retry</text>
  <text x="210" y="155" font-size="10" text-anchor="middle" fill="#666666">All clients retry simultaneously → Thundering herd</text>
  <text x="210" y="173" font-size="10" text-anchor="middle" fill="#d84315">Overwhelms failing service, prevents recovery</text>
  
  <!-- Fixed Delay -->
  <rect x="420" y="70" width="340" height="120" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Fixed Delay Retry</text>
  
  <rect x="435" y="115" width="310" height="55" rx="6" fill="#ffe0b2"/>
  <text x="590" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">t=0: Fail → wait 5s → t=5s: Retry → wait 5s → t=10s: Retry</text>
  <text x="590" y="155" font-size="10" text-anchor="middle" fill="#666666">Simple but can still cause synchronized retries</text>
  <text x="590" y="173" font-size="10" text-anchor="middle" fill="#f57c00">Better than immediate, but not optimal at scale</text>
  
  <!-- Exponential Backoff -->
  <rect x="40" y="220" width="340" height="150" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="250" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Exponential Backoff</text>
  
  <rect x="55" y="265" width="310" height="85" rx="6" fill="#bbdefb"/>
  <text x="210" y="285" font-size="10" text-anchor="middle" fill="#1a1a1a">delay = base × 2^attempt</text>
  <text x="210" y="305" font-size="10" text-anchor="middle" fill="#1a1a1a">1s → 2s → 4s → 8s → 16s → 32s</text>
  <text x="210" y="325" font-size="10" text-anchor="middle" fill="#666666">Gives service more time to recover</text>
  <text x="210" y="345" font-size="10" text-anchor="middle" fill="#666666">Naturally desynchronizes clients</text>
  
  <!-- Exponential Backoff with Jitter -->
  <rect x="420" y="220" width="340" height="150" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="250" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Exponential Backoff with Jitter</text>
  
  <rect x="435" y="265" width="310" height="85" rx="6" fill="#a5d6a7"/>
  <text x="590" y="285" font-size="10" text-anchor="middle" fill="#1a1a1a">delay = min(maxDelay, base × 2^attempt ± jitter)</text>
  <text x="590" y="305" font-size="10" text-anchor="middle" fill="#1a1a1a">1s±0.5s, 2s±1s, 4s±2s, 8s±4s</text>
  <text x="590" y="325" font-size="10" text-anchor="middle" fill="#666666">Prevents synchronized retry storms</text>
  <text x="590" y="345" font-size="10" text-anchor="middle" fill="#666666">Best practice for production systems</text>
  
  <!-- Retry Budget -->
  <rect x="40" y="400" width="720" height="180" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="430" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Retry Budget — Preventing Retry Storms</text>
  
  <!-- Normal traffic -->
  <rect x="60" y="450" width="200" height="50" rx="6" fill="#e3f2fd"/>
  <text x="160" y="470" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Normal Traffic</text>
  <text x="160" y="490" font-size="10" text-anchor="middle" fill="#666666">1000 req/s</text>
  
  <!-- Retry Budget -->
  <rect x="300" y="450" width="200" height="50" rx="6" fill="#c8e6c9"/>
  <text x="400" y="470" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Retry Budget (20%)</text>
  <text x="400" y="490" font-size="10" text-anchor="middle" fill="#666666">Max 200 retries/s</text>
  
  <!-- Budget Exhausted -->
  <rect x="540" y="450" width="200" height="50" rx="6" fill="#ffebee"/>
  <text x="640" y="470" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Budget Exhausted</text>
  <text x="640" y="490" font-size="10" text-anchor="middle" fill="#666666">Fail fast, no more retries</text>
  
  <!-- Arrows -->
  <line x1="260" y1="475" x2="300" y2="475" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="475" x2="540" y2="475" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Config Parameters -->
  <rect x="60" y="520" width="680" height="50" rx="6" fill="#e8f5e9"/>
  <text x="400" y="540" font-size="11" text-anchor="middle" fill="#1a1a1a">Config: max_retries=5, base_delay=1s, max_delay=60s, jitter=0.5, retry_budget=20%, budget_window=10s</text>
  <text x="400" y="560" font-size="10" text-anchor="middle" fill="#666666">Rule: total retry time must be less than caller&apos;s timeout</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
