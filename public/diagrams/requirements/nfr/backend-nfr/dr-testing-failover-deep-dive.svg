<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="drDeepArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Disaster Recovery Deep Dive</text>
  
  <!-- RTO/RPO Matrix -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">RTO vs RPO Decision Matrix</text>
  
  <!-- Matrix axes -->
  <line x1="100" y1="200" x2="400" y2="200" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <line x1="100" y1="120" x2="100" y2="200" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  
  <text x="250" y="220" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird">Recovery Time Objective (RTO) →</text>
  <text x="60" y="160" text-anchor="middle" font-size="10" fill="var(--text-secondary, #47556ird" transform="rotate(-90, 60, 160)">Recovery Point Objective (RPO) →</text>
  
  <!-- Quadrants -->
  <rect x="100" y="120" width="150" height="80" rx="4" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="175" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-red, #ef4444">Low RTO, Low RPO</text>
  <text x="175" y="170" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Active-Active</text>
  <text x="175" y="185" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Most expensive</text>
  
  <rect x="250" y="120" width="150" height="80" rx="4" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="325" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">High RTO, Low RPO</text>
  <text x="325" y="170" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Warm Standby</text>
  <text x="325" y="185" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Sync replication</text>
  
  <rect x="100" y="200" width="150" height="80" rx="4" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="175" y="230" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Low RTO, High RPO</text>
  <text x="175" y="250" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Pilot Light</text>
  <text x="175" y="265" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Fast recovery</text>
  
  <rect x="250" y="200" width="150" height="80" rx="4" fill="var(--bg-green, #22c55e)" opacity="0.2" stroke="var(--border-green, #22c55e)" stroke-width="1"/>
  <text x="325" y="230" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">High RTO, High RPO</text>
  <text x="325" y="250" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Backup/Restore</text>
  <text x="325" y="265" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Least expensive</text>
  
  <!-- DR Testing Types -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">DR Testing Types</text>
  
  <rect x="540" y="110" width="190" height="35" rx="3" fill="var(--bg-blue, #3b82f6)" opacity="0.2" stroke="var(--border-blue, #3b82f6)" stroke-width="1"/>
  <text x="635" y="132" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Tabletop Exercise</text>
  <text x="635" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Walk through scenarios</text>
  
  <rect x="540" y="155" width="190" height="35" rx="3" fill="var(--bg-purple, #8b5cf6)" opacity="0.2" stroke="var(--border-purple, #8b5cf6)" stroke-width="1"/>
  <text x="635" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Simulated Failover</text>
  <text x="635" y="195" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Test in staging</text>
  
  <rect x="750" y="110" width="180" height="35" rx="3" fill="var(--bg-orange, #f97316)" opacity="0.2" stroke="var(--border-orange, #f97316)" stroke-width="1"/>
  <text x="840" y="132" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Partial Failover</text>
  <text x="840" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Test specific components</text>
  
  <rect x="750" y="155" width="180" height="35" rx="3" fill="var(--bg-red, #ef4444)" opacity="0.2" stroke="var(--border-red, #ef4444)" stroke-width="1"/>
  <text x="840" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-red, #ef4444">Full DR Drill</text>
  <text x="840" y="195" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Complete failover (annually)</text>
  
  <!-- Failover Patterns -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Failover Implementation Patterns</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">DNS Failover</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Update DNS records</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Load Balancer Failover</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Health check based</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Virtual IP (VIP)</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">IP reassignment</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Database Promotion</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Replica → Primary</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Test DR regularly. Document procedures. Automate where possible.</text>
</svg>
