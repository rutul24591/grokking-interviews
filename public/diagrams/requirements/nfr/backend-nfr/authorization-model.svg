<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="authzArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Authorization Models Comparison</text>
  
  <!-- RBAC -->
  <rect x="50" y="60" width="300" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="200" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#3b82f6">RBAC (Role-Based)</text>
  
  <!-- RBAC diagram -->
  <rect x="70" y="110" width="80" height="40" rx="4" fill="#3b82f6"/>
  <text x="110" y="135" text-anchor="middle" font-size="9" fill="#ffffff">Users</text>
  
  <line x1="150" y1="130" x2="180" y2="130" stroke="#3b82f6" stroke-width="2" marker-end="url(#authzArrow)"/>
  <text x="165" y="120" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">assigned to</text>
  
  <rect x="180" y="110" width="80" height="40" rx="4" fill="#8b5cf6"/>
  <text x="220" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Roles</text>
  <text x="220" y="145" text-anchor="middle" font-size="7" fill="#ffffff">Admin, Editor</text>
  
  <line x1="220" y1="150" x2="220" y2="175" stroke="#3b82f6" stroke-width="2" marker-end="url(#authzArrow)"/>
  <text x="230" y="167" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">have</text>
  
  <rect x="160" y="175" width="120" height="40" rx="4" fill="#22c55e"/>
  <text x="220" y="195" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Permissions</text>
  <text x="220" y="210" text-anchor="middle" font-size="7" fill="#ffffff">read, write, delete</text>
  
  <text x="200" y="250" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓ Simple to manage</text>
  <text x="200" y="267" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Role explosion at scale</text>
  
  <!-- ABAC -->
  <rect x="370" y="60" width="300" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="520" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#8b5cf6">ABAC (Attribute-Based)</text>
  
  <!-- ABAC diagram -->
  <rect x="390" y="110" width="70" height="35" rx="3" fill="#3b82f6"/>
  <text x="425" y="132" text-anchor="middle" font-size="8" fill="#ffffff">Subject</text>
  
  <rect x="470" y="110" width="70" height="35" rx="3" fill="#8b5cf6"/>
  <text x="505" y="127" text-anchor="middle" font-size="8" fill="#ffffff">Resource</text>
  
  <rect x="550" y="110" width="70" height="35" rx="3" fill="#f97316"/>
  <text x="585" y="127" text-anchor="middle" font-size="8" fill="#ffffff">Action</text>
  
  <rect x="630" y="110" width="70" height="35" rx="3" fill="#22c55e"/>
  <text x="665" y="127" text-anchor="middle" font-size="8" fill="#ffffff">Environment</text>
  
  <line x1="425" y1="145" x2="520" y2="165" stroke="#3b82f6" stroke-width="2"/>
  <line x1="505" y1="145" x2="520" y2="165" stroke="#3b82f6" stroke-width="2"/>
  <line x1="585" y1="145" x2="520" y2="165" stroke="#3b82f6" stroke-width="2"/>
  <line x1="665" y1="145" x2="520" y2="165" stroke="#3b82f6" stroke-width="2"/>
  
  <rect x="460" y="165" width="120" height="45" rx="4" fill="#ef4444"/>
  <text x="520" y="187" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Policy Engine</text>
  <text x="520" y="205" text-anchor="middle" font-size="7" fill="#ffffff">Evaluate attributes</text>
  
  <text x="520" y="250" text-anchor="middle" font-size="9" fill="var(--border-purple, #8b5cf6" font-weight="bold">✓ Highly flexible</text>
  <text x="520" y="267" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Complex policy management</text>
  
  <!-- ACL -->
  <rect x="690" y="60" width="260" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="820" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#f97316">ACL (Access Control List)</text>
  
  <!-- ACL diagram -->
  <rect x="710" y="110" width="100" height="50" rx="4" fill="#8b5cf6"/>
  <text x="760" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Resource</text>
  <text x="760" y="152" text-anchor="middle" font-size="7" fill="#ffffff">Document A</text>
  
  <line x1="810" y1="135" x2="840" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#authzArrow)"/>
  
  <rect x="840" y="110" width="90" height="100" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="885" y="130" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-primary, #0f172a">ACL</text>
  <text x="885" y="150" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">user1: read, write</text>
  <text x="885" y="167" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">user2: read</text>
  <text x="885" y="184" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">role:admin: all</text>
  <text x="885" y="201" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">default: none</text>
  
  <text x="820" y="250" text-anchor="middle" font-size="9" fill="var(--border-orange, #f97316" font-weight="bold">✓ Per-resource control</text>
  <text x="820" y="267" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ ACL management overhead</text>
  
  <!-- Model Selection Guide -->
  <rect x="50" y="300" width="900" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Model Selection Guide</text>
  
  <rect x="70" y="345" width="260" height="85" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#3b82f6">Choose RBAC When:</text>
  <text x="200" y="390" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Clear organizational roles</text>
  <text x="200" y="407" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Stable role structure</text>
  <text x="200" y="424" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Simple permission model</text>
  
  <rect x="350" y="345" width="260" height="85" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b5cf6">Choose ABAC When:</text>
  <text x="480" y="390" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Context-aware access</text>
  <text x="480" y="407" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Dynamic policies needed</text>
  <text x="480" y="424" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Fine-grained control</text>
  
  <rect x="630" y="345" width="300" height="85" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="780" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#f97316">Choose ACL When:</text>
  <text x="780" y="390" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• Per-resource ownership</text>
  <text x="780" y="407" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• User-controlled sharing</text>
  <text x="780" y="424" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">• File/document systems</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Many systems use hybrid approaches (RBAC + ACL, or ABAC + RBAC).</text>
</svg>
