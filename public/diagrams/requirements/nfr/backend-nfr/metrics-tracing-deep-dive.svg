<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="metricsArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Metrics &amp; Distributed Tracing Deep Dive</text>
  
  <!-- Metrics Collection -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Metrics Collection Architecture</text>
  
  <!-- Application -->
  <rect x="70" y="110" width="90" height="50" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="115" y="140" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff">Application</text>
  
  <line x1="160" y1="135" x2="190" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#metricsArrow)"/>
  <text x="175" y="125" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Expose /metrics</text>
  
  <!-- Prometheus -->
  <rect x="190" y="110" width="100" height="80" rx="4" fill="var(--bg-orange, #f97316)"/>
  <text x="240" y="135" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Prometheus</text>
  <text x="240" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Pull-based</text>
  <text x="240" y="172" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Time-series DB</text>
  <text x="240" y="185" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Scrape every 15s</text>
  
  <line x1="290" y1="150" x2="320" y2="150" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#metricsArrow)"/>
  
  <!-- Grafana -->
  <rect x="320" y="110" width="100" height="50" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="370" y="140" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff">Grafana</text>
  
  <line x1="370" y1="160" x2="370" y2="190" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#metricsArrow)"/>
  <text x="380" y="180" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Query</text>
  
  <!-- Alertmanager -->
  <rect x="320" y="190" width="100" height="50" rx="4" fill="var(--bg-red, #ef4444)"/>
  <text x="370" y="220" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff">Alertmanager</text>
  
  <text x="275" y="265" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Push-based alternative: StatsD, Datadog Agent</text>
  
  <!-- Distributed Tracing Flow -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Distributed Tracing Flow</text>
  
  <rect x="540" y="110" width="80" height="50" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="580" y="140" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Client</text>
  
  <line x1="620" y1="135" x2="650" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#metricsArrow)"/>
  <text x="635" y="125" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">trace_id</text>
  
  <rect x="650" y="110" width="80" height="50" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="690" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">API Gateway</text>
  <text x="690" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Span 1</text>
  
  <line x1="730" y1="135" x2="760" y2="135" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#metricsArrow)"/>
  
  <rect x="760" y="110" width="80" height="50" rx="4" fill="var(--bg-orange, #f97316)"/>
  <text x="800" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Service A</text>
  <text x="800" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Span 2</text>
  
  <line x1="800" y1="160" x2="800" y2="185" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#metricsArrow)"/>
  <text x="810" y="177" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Child span</text>
  
  <rect x="760" y="185" width="80" height="50" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="800" y="215" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Database</text>
  <text x="800" y="232" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Span 3</text>
  
  <!-- Tracing Backends -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Tracing Backends</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Jaeger</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Open source, CNCF</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Zipkin</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Twitter, simple</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">OpenTelemetry</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Vendor-neutral standard</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Managed Services</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Datadog, New Relic</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Use OpenTelemetry for instrumentation. Correlate traces with logs and metrics.</text>
</svg>
