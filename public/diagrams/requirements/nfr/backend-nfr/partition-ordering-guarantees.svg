<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Partition Ordering Guarantees</text>
  
  <!-- Before Partition -->
  <rect x="40" y="70" width="340" height="160" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Before Partition: Consistent</text>
  
  <rect x="60" y="115" width="300" height="30" rx="4" fill="#e8f5e9"/>
  <text x="210" y="135" font-size="11" text-anchor="middle" fill="#666666">Primary and replica in sync</text>
  
  <rect x="60" y="150" width="300" height="30" rx="4" fill="#e8f5e9"/>
  <text x="210" y="170" font-size="11" text-anchor="middle" fill="#666666">All reads return latest data</text>
  
  <rect x="60" y="185" width="300" height="30" rx="4" fill="#e8f5e9"/>
  <text x="210" y="205" font-size="11" text-anchor="middle" fill="#666666">Strong consistency maintained</text>
  
  <!-- During Partition -->
  <rect x="420" y="70" width="340" height="160" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">During Partition: Divergent</text>
  
  <rect x="440" y="115" width="300" height="30" rx="4" fill="#fff3e0"/>
  <text x="590" y="135" font-size="11" text-anchor="middle" fill="#666666">Primary and replica cannot communicate</text>
  
  <rect x="440" y="150" width="300" height="30" rx="4" fill="#fff3e0"/>
  <text x="590" y="170" font-size="11" text-anchor="middle" fill="#666666">Both accept writes independently</text>
  
  <rect x="440" y="185" width="300" height="30" rx="4" fill="#fff3e0"/>
  <text x="590" y="205" font-size="11" text-anchor="middle" fill="#666666">Data diverges (write-write conflicts)</text>
  
  <!-- After Partition -->
  <rect x="40" y="260" width="340" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">After Partition: Reconciliation</text>
  
  <rect x="60" y="305" width="300" height="30" rx="4" fill="#e3f2fd"/>
  <text x="210" y="325" font-size="11" text-anchor="middle" fill="#666666">Partition heals, replication resumes</text>
  
  <rect x="60" y="340" width="300" height="30" rx="4" fill="#e3f2fd"/>
  <text x="210" y="360" font-size="11" text-anchor="middle" fill="#666666">Conflict resolution applied (LWW, vector clocks)</text>
  
  <rect x="60" y="375" width="300" height="30" rx="4" fill="#e3f2fd"/>
  <text x="210" y="395" font-size="11" text-anchor="middle" fill="#666666">Eventual consistency achieved</text>
  
  <!-- Conflict Resolution Strategies -->
  <rect x="420" y="260" width="340" height="160" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="590" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Conflict Resolution</text>
  
  <rect x="440" y="305" width="300" height="30" rx="4" fill="#ffebee"/>
  <text x="590" y="325" font-size="11" text-anchor="middle" fill="#666666">Last-Write-Wins: Timestamp-based</text>
  
  <rect x="440" y="340" width="300" height="30" rx="4" fill="#ffebee"/>
  <text x="590" y="360" font-size="11" text-anchor="middle" fill="#666666">Vector Clocks: Causal ordering</text>
  
  <rect x="440" y="375" width="300" height="30" rx="4" fill="#ffebee"/>
  <text x="590" y="395" font-size="11" text-anchor="middle" fill="#666666">CRDTs: Mathematical convergence</text>
  
  <!-- Partition Tolerance Flow -->
  <rect x="40" y="450" width="720" height="130" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="480" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Partition Tolerance Trade-offs</text>
  
  <rect x="60" y="500" width="220" height="60" rx="6" fill="#e3f2fd"/>
  <text x="170" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CP (Consistency + Partition)</text>
  <text x="170" y="545" font-size="10" text-anchor="middle" fill="#666666">Reject writes during partition</text>
  <text x="170" y="563" font-size="10" text-anchor="middle" fill="#666666">Strong consistency, less available</text>
  
  <rect x="300" y="500" width="220" height="60" rx="6" fill="#c8e6c9"/>
  <text x="410" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">AP (Availability + Partition)</text>
  <text x="410" y="545" font-size="10" text-anchor="middle" fill="#666666">Accept writes during partition</text>
  <text x="410" y="563" font-size="10" text-anchor="middle" fill="#666666">Eventually consistent, more available</text>
  
  <rect x="540" y="500" width="200" height="60" rx="6" fill="#fff3e0"/>
  <text x="640" y="525" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Hybrid Approach</text>
  <text x="640" y="545" font-size="10" text-anchor="middle" fill="#666666">CP for critical data</text>
  <text x="640" y="563" font-size="10" text-anchor="middle" fill="#666666">AP for non-critical data</text>
</svg>
