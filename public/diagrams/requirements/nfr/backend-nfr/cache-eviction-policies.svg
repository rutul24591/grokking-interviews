<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cache Eviction Policies</text>
  
  <!-- LRU -->
  <rect x="40" y="70" width="180" height="180" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="130" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">LRU</text>
  <text x="130" y="125" font-size="10" text-anchor="middle" fill="#666666">Least Recently Used</text>
  <text x="130" y="155" font-size="10" text-anchor="middle" fill="#666666">Evicts least recently</text>
  <text x="130" y="173" font-size="10" text-anchor="middle" fill="#666666">accessed items first</text>
  <text x="130" y="193" font-size="10" text-anchor="middle" fill="#666666">Best for: Temporal locality</text>
  <text x="130" y="213" font-size="10" text-anchor="middle" fill="#666666">Common in: Redis, Memcached</text>
  <text x="130" y="233" font-size="10" text-anchor="middle" fill="#4caf50">Most popular choice</text>
  
  <!-- LFU -->
  <rect x="240" y="70" width="180" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="330" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">LFU</text>
  <text x="330" y="125" font-size="10" text-anchor="middle" fill="#666666">Least Frequently Used</text>
  <text x="330" y="155" font-size="10" text-anchor="middle" fill="#666666">Evicts least frequently</text>
  <text x="330" y="173" font-size="10" text-anchor="middle" fill="#666666">accessed items first</text>
  <text x="330" y="193" font-size="10" text-anchor="middle" fill="#666666">Best for: Stable access patterns</text>
  <text x="330" y="213" font-size="10" text-anchor="middle" fill="#666666">Drawback: Hot items stay forever</text>
  <text x="330" y="233" font-size="10" text-anchor="middle" fill="#f57c00">Requires access counters</text>
  
  <!-- TTL -->
  <rect x="440" y="70" width="180" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="530" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">TTL</text>
  <text x="530" y="125" font-size="10" text-anchor="middle" fill="#666666">Time-To-Live</text>
  <text x="530" y="155" font-size="10" text-anchor="middle" fill="#666666">Evicts items after fixed</text>
  <text x="530" y="173" font-size="10" text-anchor="middle" fill="#666666">expiration time</text>
  <text x="530" y="193" font-size="10" text-anchor="middle" fill="#666666">Best for: Time-sensitive data</text>
  <text x="530" y="213" font-size="10" text-anchor="middle" fill="#666666">Simple to implement</text>
  <text x="530" y="233" font-size="10" text-anchor="middle" fill="#4caf50">Guarantees freshness</text>
  
  <!-- Random -->
  <rect x="640" y="70" width="140" height="180" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="710" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Random</text>
  <text x="710" y="125" font-size="10" text-anchor="middle" fill="#666666">Random eviction</text>
  <text x="710" y="155" font-size="10" text-anchor="middle" fill="#666666">No access tracking</text>
  <text x="710" y="173" font-size="10" text-anchor="middle" fill="#666666">O(1) eviction</text>
  <text x="710" y="193" font-size="10" text-anchor="middle" fill="#666666">Best for: Simple caches</text>
  <text x="710" y="213" font-size="10" text-anchor="middle" fill="#f57c00">Low hit rate</text>
  <text x="710" y="233" font-size="10" text-anchor="middle" fill="#d84315">Rarely used in practice</text>
  
  <!-- Comparison Chart -->
  <rect x="40" y="280" width="720" height="140" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="310" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Eviction Policy Comparison</text>
  
  <!-- Table headers -->
  <rect x="60" y="325" width="180" height="25" rx="4" fill="#e0e0e0"/>
  <text x="150" y="342" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Policy</text>
  <rect x="240" y="325" width="180" height="25" rx="4" fill="#e0e0e0"/>
  <text x="330" y="342" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Hit Rate</text>
  <rect x="420" y="325" width="180" height="25" rx="4" fill="#e0e0e0"/>
  <text x="510" y="342" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Memory Overhead</text>
  <rect x="600" y="325" width="140" height="25" rx="4" fill="#e0e0e0"/>
  <text x="670" y="342" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Use Case</text>
  
  <!-- Table rows -->
  <rect x="60" y="350" width="180" height="25" rx="4" fill="#e3f2fd"/>
  <text x="150" y="367" font-size="10" text-anchor="middle" fill="#1a1a1a">LRU</text>
  <rect x="240" y="350" width="180" height="25" rx="4" fill="#e3f2fd"/>
  <text x="330" y="367" font-size="10" text-anchor="middle" fill="#1a1a1a">High</text>
  <rect x="420" y="350" width="180" height="25" rx="4" fill="#e3f2fd"/>
  <text x="510" y="367" font-size="10" text-anchor="middle" fill="#1a1a1a">Medium (doubly-linked list)</text>
  <rect x="600" y="350" width="140" height="25" rx="4" fill="#e3f2fd"/>
  <text x="670" y="367" font-size="10" text-anchor="middle" fill="#1a1a1a">General purpose</text>
  
  <rect x="60" y="375" width="180" height="25" rx="4" fill="#c8e6c9"/>
  <text x="150" y="392" font-size="10" text-anchor="middle" fill="#1a1a1a">LFU</text>
  <rect x="240" y="375" width="180" height="25" rx="4" fill="#c8e6c9"/>
  <text x="330" y="392" font-size="10" text-anchor="middle" fill="#1a1a1a">Very High (stable patterns)</text>
  <rect x="420" y="375" width="180" height="25" rx="4" fill="#c8e6c9"/>
  <text x="510" y="392" font-size="10" text-anchor="middle" fill="#1a1a1a">High (frequency counters)</text>
  <rect x="600" y="375" width="140" height="25" rx="4" fill="#c8e6c9"/>
  <text x="670" y="392" font-size="10" text-anchor="middle" fill="#1a1a1a">Content delivery</text>
  
  <rect x="60" y="400" width="180" height="25" rx="4" fill="#fff3e0"/>
  <text x="150" y="417" font-size="10" text-anchor="middle" fill="#1a1a1a">TTL</text>
  <rect x="240" y="400" width="180" height="25" rx="4" fill="#fff3e0"/>
  <text x="330" y="417" font-size="10" text-anchor="middle" fill="#1a1a1a">Medium</text>
  <rect x="420" y="400" width="180" height="25" rx="4" fill="#fff3e0"/>
  <text x="510" y="417" font-size="10" text-anchor="middle" fill="#1a1a1a">Low (timestamps only)</text>
  <rect x="600" y="400" width="140" height="25" rx="4" fill="#fff3e0"/>
  <text x="670" y="417" font-size="10" text-anchor="middle" fill="#1a1a1a">Session data</text>
  
  <rect x="60" y="425" width="180" height="25" rx="4" fill="#ffebee"/>
  <text x="150" y="442" font-size="10" text-anchor="middle" fill="#1a1a1a">Random</text>
  <rect x="240" y="425" width="180" height="25" rx="4" fill="#ffebee"/>
  <text x="330" y="442" font-size="10" text-anchor="middle" fill="#1a1a1a">Low</text>
  <rect x="420" y="425" width="180" height="25" rx="4" fill="#ffebee"/>
  <text x="510" y="442" font-size="10" text-anchor="middle" fill="#1a1a1a">None</text>
  <rect x="600" y="425" width="140" height="25" rx="4" fill="#ffebee"/>
  <text x="670" y="442" font-size="10" text-anchor="middle" fill="#1a1a1a">Rarely used</text>
  
  <!-- Recommendation -->
  <rect x="40" y="450" width="720" height="130" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="480" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Recommendation</text>
  <text x="400" y="510" font-size="12" text-anchor="middle" fill="#666666">Use LRU with TTL for most production caches</text>
  <text x="400" y="535" font-size="11" text-anchor="middle" fill="#666666">• LRU handles temporal locality well (recently accessed items stay cached)</text>
  <text x="400" y="555" font-size="11" text-anchor="middle" fill="#666666">• TTL ensures stale data eventually expires even if still accessed</text>
  <text x="400" y="575" font-size="11" text-anchor="middle" fill="#666666">• Combined approach: evict by LRU when full, expire by TTL for freshness</text>
</svg>
