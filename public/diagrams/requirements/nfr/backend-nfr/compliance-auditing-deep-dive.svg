<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="complianceArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Compliance &amp; Auditing Deep Dive</text>
  
  <!-- Compliance Frameworks -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Major Compliance Frameworks</text>
  
  <!-- GDPR -->
  <rect x="70" y="110" width="120" height="70" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">GDPR</text>
  <text x="130" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">EU Data Protection</text>
  <text x="130" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Right to erasure</text>
  
  <!-- HIPAA -->
  <rect x="210" y="110" width="120" height="70" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="270" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">HIPAA</text>
  <text x="270" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">US Healthcare</text>
  <text x="270" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">PHI protection</text>
  
  <!-- SOC 2 -->
  <rect x="350" y="110" width="120" height="70" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="410" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">SOC 2</text>
  <text x="410" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Security Controls</text>
  <text x="410" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Trust Services</text>
  
  <!-- PCI DSS -->
  <rect x="70" y="195" width="120" height="70" rx="4" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="2"/>
  <text x="130" y="220" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">PCI DSS</text>
  <text x="130" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Payment Cards</text>
  <text x="130" y="257" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Cardholder data</text>
  
  <!-- SOX -->
  <rect x="210" y="195" width="120" height="70" rx="4" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
  <text x="270" y="220" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-red, #ef4444">SOX</text>
  <text x="270" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Financial Reporting</text>
  <text x="270" y="257" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">7 year retention</text>
  
  <!-- ISO 27001 -->
  <rect x="350" y="195" width="120" height="70" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="410" y="220" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">ISO 27001</text>
  <text x="410" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">InfoSec Management</text>
  <text x="410" y="257" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">International standard</text>
  
  <!-- Audit Trail Requirements -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Audit Trail Requirements</text>
  
  <rect x="540" y="110" width="190" height="70" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">What to Log</text>
  <text x="635" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Who, what, when, where</text>
  <text x="635" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Authentication, data access</text>
  
  <rect x="540" y="190" width="190" height="70" rx="3" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="635" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Log Protection</text>
  <text x="635" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Immutable storage</text>
  <text x="635" y="252" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Tamper-evident</text>
  
  <rect x="750" y="110" width="180" height="70" rx="3" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Retention Period</text>
  <text x="840" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Based on compliance</text>
  <text x="840" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">7 years typical</text>
  
  <rect x="750" y="190" width="180" height="70" rx="3" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="840" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Access Controls</text>
  <text x="840" y="235" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Who can view logs</text>
  <text x="840" y="252" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Segregation of duties</text>
  
  <!-- Compliance Implementation -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Compliance Implementation Checklist</text>
  
  <text x="540" y="275" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="275" font-size="8" fill="var(--text-secondary, #47556ird">Data classification (PII, PHI, PCI)</text>
  
  <text x="540" y="295" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="295" font-size="8" fill="var(--text-secondary, #47556ird">Encryption at rest and in transit</text>
  
  <text x="540" y="315" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="315" font-size="8" fill="var(--text-secondary, #47556ird">Access logging and monitoring</text>
  
  <text x="540" y="335" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="555" y="335" font-size="8" fill="var(--text-secondary, #47556ird">Regular security assessments</text>
  
  <text x="750" y="275" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="765" y="275" font-size="8" fill="var(--text-secondary, #47556ird">Incident response procedures</text>
  
  <text x="750" y="295" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="765" y="295" font-size="8" fill="var(--text-secondary, #47556ird">Data retention policies</text>
  
  <text x="750" y="315" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="765" y="315" font-size="8" fill="var(--text-secondary, #47556ird">User consent management</text>
  
  <text x="750" y="335" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="765" y="335" font-size="8" fill="var(--text-secondary, #47556ird">Regular compliance audits</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Understand applicable regulations. Implement audit logging. Regular compliance reviews.</text>
</svg>
