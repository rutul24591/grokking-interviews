<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cost Optimization Deep Dive</text>
  
  <!-- Pricing Model Selection -->
  <rect x="40" y="70" width="340" height="180" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pricing Model Selection</text>
  
  <rect x="55" y="115" width="310" height="35" rx="4" fill="#bbdefb"/>
  <text x="210" y="138" font-size="10" text-anchor="middle" fill="#1a1a1a">Predictable baseline → Reserved (30-60% savings)</text>
  
  <rect x="55" y="155" width="310" height="35" rx="4" fill="#bbdefb"/>
  <text x="210" y="178" font-size="10" text-anchor="middle" fill="#1a1a1a">Unpredictable spikes → On-Demand (flexibility)</text>
  
  <rect x="55" y="195" width="310" height="35" rx="4" fill="#bbdefb"/>
  <text x="210" y="218" font-size="10" text-anchor="middle" fill="#1a1a1a">Fault-tolerant batch → Spot (70-90% savings)</text>
  
  <rect x="55" y="235" width="310" height="35" rx="4" fill="#bbdefb"/>
  <text x="210" y="258" font-size="10" text-anchor="middle" fill="#1a1a1a">Flexible across families → Savings Plans</text>
  
  <!-- Resource Utilization Optimization -->
  <rect x="420" y="70" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Resource Utilization</text>
  
  <rect x="435" y="115" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="138" font-size="10" text-anchor="middle" fill="#1a1a1a">Target: 40-60% CPU utilization for production</text>
  
  <rect x="435" y="155" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="178" font-size="10" text-anchor="middle" fill="#1a1a1a">Alert: &lt;20% (over-provisioned) or &gt;80% (under)</text>
  
  <rect x="435" y="195" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="218" font-size="10" text-anchor="middle" fill="#1a1a1a">Rightsize: adjust instance type to match usage</text>
  
  <rect x="435" y="235" width="310" height="35" rx="4" fill="#a5d6a7"/>
  <text x="590" y="258" font-size="10" text-anchor="middle" fill="#1a1a1a">Monitor: CPU, memory, disk I/O, network bandwidth</text>
  
  <!-- Automated Cost Controls -->
  <rect x="40" y="280" width="720" height="160" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="310" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Automated Cost Controls</text>
  
  <rect x="55" y="325" width="220" height="100" rx="6" fill="#ffe0b2"/>
  <text x="165" y="345" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Waste Detection</text>
  <text x="165" y="365" font-size="9" text-anchor="middle" fill="#666666">Unused instances</text>
  <text x="165" y="380" font-size="9" text-anchor="middle" fill="#666666">Unattached volumes</text>
  <text x="165" y="395" font-size="9" text-anchor="middle" fill="#666666">Idle load balancers</text>
  <text x="165" y="410" font-size="9" text-anchor="middle" fill="#666666">Orphaned snapshots</text>
  <text x="165" y="425" font-size="9" text-anchor="middle" fill="#666666">Notify or auto-delete</text>
  
  <rect x="295" y="325" width="220" height="100" rx="6" fill="#ffe0b2"/>
  <text x="405" y="345" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Storage Tiering</text>
  <text x="405" y="365" font-size="9" text-anchor="middle" fill="#666666">Hot (SSD): 0-30 days</text>
  <text x="405" y="380" font-size="9" text-anchor="middle" fill="#666666">Warm (HDD): 30-90 days</text>
  <text x="405" y="395" font-size="9" text-anchor="middle" fill="#666666">Cold (Glacier): 90-365</text>
  <text x="405" y="410" font-size="9" text-anchor="middle" fill="#666666">Archive: 365+ days</text>
  <text x="405" y="425" font-size="9" text-anchor="middle" fill="#666666">Automated lifecycle</text>
  
  <rect x="535" y="325" width="210" height="100" rx="6" fill="#ffe0b2"/>
  <text x="640" y="345" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cost Alerting</text>
  <text x="640" y="365" font-size="9" text-anchor="middle" fill="#666666">Daily cost tracking</text>
  <text x="640" y="380" font-size="9" text-anchor="middle" fill="#666666">Anomaly detection</text>
  <text x="640" y="395" font-size="9" text-anchor="middle" fill="#666666">Budget alerts at 80%</text>
  <text x="640" y="410" font-size="9" text-anchor="middle" fill="#666666">Team-level budgets</text>
  <text x="640" y="425" font-size="9" text-anchor="middle" fill="#666666">Forecast vs actual</text>
  
  <!-- Cost Savings Potential -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cost Savings Potential by Strategy</text>
  
  <rect x="55" y="515" width="160" height="50" rx="6" fill="#e1bee7"/>
  <text x="135" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Reserved Capacity</text>
  <text x="135" y="555" font-size="10" text-anchor="middle" fill="#666666">30-60% savings</text>
  
  <rect x="235" y="515" width="160" height="50" rx="6" fill="#e1bee7"/>
  <text x="315" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Spot Instances</text>
  <text x="315" y="555" font-size="10" text-anchor="middle" fill="#666666">70-90% savings</text>
  
  <rect x="415" y="515" width="160" height="50" rx="6" fill="#e1bee7"/>
  <text x="495" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Auto-Scaling</text>
  <text x="495" y="555" font-size="10" text-anchor="middle" fill="#666666">50-70% savings</text>
  
  <rect x="595" y="515" width="150" height="50" rx="6" fill="#e1bee7"/>
  <text x="670" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Storage Tiering</text>
  <text x="670" y="555" font-size="10" text-anchor="middle" fill="#666666">50-80% savings</text>
</svg>
