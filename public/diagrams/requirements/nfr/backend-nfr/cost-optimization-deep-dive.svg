<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="costOptArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Cost Optimization Strategies</text>
  
  <!-- Cost Allocation -->
  <rect x="50" y="60" width="450" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Cost Allocation &amp; Tagging</text>
  
  <!-- Resource with tags -->
  <rect x="70" y="110" width="150" height="130" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="145" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">EC2 Instance</text>
  <text x="145" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Tags:</text>
  <text x="145" y="172" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">team: platform</text>
  <text x="145" y="187" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">project: api</text>
  <text x="145" y="202" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">env: production</text>
  <text x="145" y="217" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">cost-center: eng</text>
  
  <!-- Cost breakdown pie chart representation -->
  <circle cx="350" cy="175" r="50" fill="#22c55e" opacity="0.3"/>
  <path d="M 350 175 L 350 125 A 50 50 0 0 1 385 140 Z" fill="#3b82f6" opacity="0.5"/>
  <path d="M 350 175 L 385 140 A 50 50 0 0 1 390 175 Z" fill="#8b5cf6" opacity="0.5"/>
  <path d="M 350 175 L 390 175 A 50 50 0 0 1 375 210 Z" fill="#f97316" opacity="0.5"/>
  
  <text x="350" y="240" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Compute 45%</text>
  <text x="350" y="255" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">DB 25%</text>
  <text x="350" y="270" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Network 20%</text>
  <text x="350" y="285" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Storage 10%</text>
  
  <!-- Right-Sizing -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Right-Sizing Resources</text>
  
  <rect x="540" y="110" width="190" height="70" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Before Right-Sizing</text>
  <text x="635" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">m5.2xlarge (8 vCPU, 32GB)</text>
  <text x="635" y="172" text-anchor="middle" font-size="8" fill="#ef4444">Avg CPU: 15%</text>
  
  <line x1="735" y1="145" x2="765" y2="145" stroke="#3b82f6" stroke-width="2" marker-end="url(#costOptArrow)"/>
  <text x="750" y="135" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Right-size</text>
  
  <rect x="770" y="110" width="170" height="70" rx="3" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="855" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">After Right-Sizing</text>
  <text x="855" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">m5.large (2 vCPU, 8GB)</text>
  <text x="855" y="172" text-anchor="middle" font-size="8" fill="#22c55e">Avg CPU: 60%</text>
  
  <text x="735" y="200" text-anchor="middle" font-size="9" fill="#22c55e" font-weight="bold">Save 75% on compute costs</text>
  
  <!-- Reserved Instances -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Reserved Instances vs On-Demand</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-red, #ef4444">On-Demand</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">100% cost (baseline)</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">1-Year Reserved</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="#22c55e">~40% savings</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">3-Year Reserved</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="#22c55e">~60% savings</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Spot Instances</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="#22c55e">~70-90% savings</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Tag everything. Right-size based on actual usage. Use reserved capacity for stable workloads.</text>
</svg>
