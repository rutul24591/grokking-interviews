<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="secArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Secrets Management Architecture</text>
  
  <!-- Secrets Flow -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Secrets Retrieval Flow</text>
  
  <!-- Application -->
  <rect x="70" y="110" width="100" height="50" rx="4" fill="#3b82f6"/>
  <text x="120" y="140" text-anchor="middle" font-size="10" fill="#ffffff">Application</text>
  
  <line x1="170" y1="135" x2="200" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#secArrow)"/>
  <text x="185" y="125" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Request</text>
  
  <!-- Secrets Manager -->
  <rect x="200" y="110" width="120" height="50" rx="4" fill="#8b5cf6"/>
  <text x="260" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Secrets Manager</text>
  <text x="260" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Vault/AWS SM</text>
  
  <line x1="320" y1="135" x2="350" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#secArrow)"/>
  <text x="335" y="125" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Authenticate</text>
  
  <!-- Storage -->
  <rect x="350" y="110" width="100" height="50" rx="4" fill="#22c55e"/>
  <text x="400" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">Encrypted Store</text>
  <text x="400" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">KMS encrypted</text>
  
  <!-- Return path -->
  <path d="M 400 160 L 400 185 L 260 185 L 260 165" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#secArrow)"/>
  <text x="340" y="180" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Return Secret</text>
  
  <text x="275" y="215" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Secrets never in code</text>
  <text x="275" y="232" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Automatic rotation</text>
  <text x="275" y="249" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Audit logging</text>
  
  <!-- Rotation Strategy -->
  <rect x="520" y="60" width="430" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Secret Rotation Strategy</text>
  
  <!-- Rotation timeline -->
  <line x1="550" y1="130" x2="920" y2="130" stroke="#3b82f6" stroke-width="2" marker-end="url(#secArrow)"/>
  <text x="930" y="135" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Time →</text>
  
  <!-- Current secret -->
  <rect x="550" y="110" width="100" height="40" rx="3" fill="#22c55e"/>
  <text x="600" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Current Secret</text>
  
  <circle cx="650" cy="130" r="5" fill="#3b82f6"/>
  <text x="650" y="160" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">T=0</text>
  
  <!-- Overlap period -->
  <rect x="650" y="110" width="120" height="40" rx="3" fill="#3b82f6" opacity="0.5"/>
  <text x="710" y="130" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Both valid</text>
  
  <!-- New secret -->
  <rect x="770" y="110" width="100" height="40" rx="3" fill="#8b5cf6"/>
  <text x="820" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">New Secret</text>
  
  <circle cx="770" cy="130" r="5" fill="#8b5cf6"/>
  <text x="770" y="160" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Rotate</text>
  
  <!-- Old secret expired -->
  <rect x="870" y="110" width="50" height="40" rx="3" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="895" y="135" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Expired</text>
  
  <text x="735" y="200" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">1. Generate new secret</text>
  <text x="735" y="220" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">2. Store both (overlap period)</text>
  <text x="735" y="240" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">3. Update all consumers</text>
  <text x="735" y="260" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">4. Revoke old secret</text>
  
  <!-- Best Practices -->
  <rect x="50" y="300" width="450" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Secrets Best Practices</text>
  
  <text x="70" y="355" font-size="10" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="355" font-size="9" fill="var(--text-secondary, #47556ird">Never commit secrets to version control</text>
  
  <text x="70" y="375" font-size="10" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="375" font-size="9" fill="var(--text-secondary, #47556ird">Rotate secrets regularly (90 days or less)</text>
  
  <text x="70" y="395" font-size="10" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="395" font-size="9" fill="var(--text-secondary, #47556ird">Use short-lived credentials when possible</text>
  
  <text x="70" y="415" font-size="10" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="415" font-size="9" fill="var(--text-secondary, #47556ird">Audit all secret access</text>
  
  <text x="70" y="435" font-size="10" fill="var(--border-green, #22c55e" font-weight="bold">✓</text>
  <text x="85" y="435" font-size="9" fill="var(--text-secondary, #47556ird">Least privilege access to secrets</text>
  
  <!-- Secret Types -->
  <rect x="520" y="300" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Types of Secrets</text>
  
  <rect x="540" y="345" width="190" height="35" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="367" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Database credentials</text>
  
  <rect x="540" y="385" width="190" height="35" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="407" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">API keys &amp; tokens</text>
  
  <rect x="750" y="345" width="180" height="35" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="367" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Encryption keys</text>
  
  <rect x="750" y="385" width="180" height="35" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="407" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">TLS certificates</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Treat secrets as code infrastructure - versioned, audited, and automatically rotated.</text>
</svg>
