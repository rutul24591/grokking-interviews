<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="cacheFlowArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Server-Side Caching Deep Dive</text>
  
  <!-- Multi-Level Caching -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Multi-Level Cache Hierarchy</text>
  
  <!-- L1 Cache -->
  <rect x="150" y="110" width="150" height="40" rx="4" fill="#3b82f6"/>
  <text x="225" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">L1: In-Memory Cache</text>
  <text x="225" y="148" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Local, ~1ms latency</text>
  
  <line x1="225" y1="150" x2="225" y2="175" stroke="#3b82f6" stroke-width="2"/>
  <text x="235" y="167" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Miss</text>
  
  <!-- L2 Cache -->
  <rect x="150" y="175" width="150" height="40" rx="4" fill="#8b5cf6"/>
  <text x="225" y="200" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">L2: Distributed Cache</text>
  <text x="225" y="213" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Redis/Memcached, ~5ms</text>
  
  <line x1="225" y1="215" x2="225" y2="240" stroke="#3b82f6" stroke-width="2"/>
  <text x="235" y="232" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Miss</text>
  
  <!-- Database -->
  <rect x="150" y="240" width="150" height="40" rx="4" fill="#f97316"/>
  <text x="225" y="265" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">Database</text>
  <text x="225" y="278" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">~50ms latency</text>
  
  <!-- Response path -->
  <path d="M 140 260 L 120 260 L 120 130 L 145 130" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="105" y="200" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Populate cache</text>
  
  <text x="275" y="305" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Check L1 → Check L2 → Query DB → Populate caches</text>
  
  <!-- Cache Eviction -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Cache Eviction Policies</text>
  
  <rect x="540" y="110" width="120" height="70" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="600" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">LRU</text>
  <text x="600" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Least Recently Used</text>
  <text x="600" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Most common</text>
  
  <rect x="680" y="110" width="120" height="70" rx="3" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="740" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">LFU</text>
  <text x="740" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Least Frequently Used</text>
  <text x="740" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Track access count</text>
  
  <rect x="820" y="110" width="120" height="70" rx="3" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="880" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">TTL</text>
  <text x="880" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Time-To-Live</text>
  <text x="880" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Auto-expire</text>
  
  <!-- Cache Invalidation Patterns -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Cache Invalidation Patterns</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Cache-Aside (Lazy)</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Invalidate on write</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Write-Through</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Update cache + DB together</text>
  
  <rect x="750" y="265" width="190" height="40" rx="3" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="845" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Write-Behind</text>
  <text x="845" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Async DB write</text>
  
  <rect x="750" y="315" width="190" height="40" rx="3" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="845" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Refresh-Ahead</text>
  <text x="845" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Pre-refresh before expiry</text>
  
  <text x="500" y="395" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Use multi-level caching for hot data. Choose eviction policy based on access patterns.</text>
</svg>
