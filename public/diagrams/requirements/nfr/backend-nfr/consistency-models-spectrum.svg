<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="consArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Consistency Models Spectrum</text>
  
  <!-- Consistency spectrum from strong to weak -->
  <line x1="100" y1="100" x2="900" y2="100" stroke="var(--border-accent, #3b82f6)" stroke-width="4"/>
  
  <!-- Strong consistency -->
  <circle cx="150" cy="100" r="25" fill="var(--bg-green, #22c55e)"/>
  <text x="150" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Strong</text>
  <text x="150" y="135" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Linearizable</text>
  
  <!-- Sequential -->
  <circle cx="300" cy="100" r="25" fill="var(--bg-blue, #3b82f6)"/>
  <text x="300" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Sequential</text>
  <text x="300" y="135" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Ordered per client</text>
  
  <!-- Causal -->
  <circle cx="450" cy="100" r="25" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="450" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Causal</text>
  <text x="450" y="135" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Cause before effect</text>
  
  <!-- Eventual -->
  <circle cx="650" cy="100" r="25" fill="var(--bg-orange, #f97316)"/>
  <text x="650" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Eventual</text>
  <text x="650" y="135" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Converges over time</text>
  
  <!-- Weak -->
  <circle cx="850" cy="100" r="25" fill="var(--bg-red, #ef4444)"/>
  <text x="850" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-inverse, #ffffff)">Weak</text>
  <text x="850" y="135" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">No guarantees</text>
  
  <!-- Trade-off axis -->
  <text x="100" y="180" font-size="11" fill="var(--text-secondary, #475569)">← Stronger Consistency</text>
  <text x="850" y="180" text-anchor="end" font-size="11" fill="var(--text-secondary, #475569)">Better Latency →</text>
  
  <!-- Strong Consistency Example -->
  <rect x="50" y="200" width="300" height="160" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="200" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Strong Consistency</text>
  
  <!-- Diagram -->
  <rect x="80" y="245" width="70" height="40" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="115" y="268" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Client A</text>
  
  <rect x="280" y="245" width="70" height="40" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="315" y="268" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Client B</text>
  
  <rect x="180" y="300" width="120" height="40" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="240" y="320" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff)">Single Leader</text>
  <text x="240" y="335" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Synchronous Replication</text>
  
  <line x1="115" y1="285" x2="200" y2="300" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#consArrow)"/>
  <line x1="315" y1="285" x2="280" y2="300" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#consArrow)"/>
  
  <text x="200" y="375" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ All reads see latest write</text>
  <text x="200" y="390" text-anchor="middle" font-size="9" fill="#ef4444">✗ Higher latency (sync replication)</text>
  
  <!-- Eventual Consistency Example -->
  <rect x="370" y="200" width="300" height="160" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="520" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Eventual Consistency</text>
  
  <rect x="400" y="245" width="70" height="40" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="435" y="268" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Client A</text>
  
  <rect x="600" y="245" width="70" height="40" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="635" y="268" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Client B</text>
  
  <rect x="420" y="300" width="80" height="40" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="460" y="320" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff)">Node 1</text>
  <text x="460" y="335" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Leader</text>
  
  <rect x="540" y="300" width="80" height="40" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="580" y="320" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff)">Node 2</text>
  <text x="580" y="335" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Follower</text>
  
  <rect x="660" y="300" width="80" height="40" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="700" y="320" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff)">Node 3</text>
  <text x="700" y="335" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">Follower</text>
  
  <line x1="435" y1="285" x2="460" y2="300" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#consArrow)"/>
  <line x1="635" y1="285" x2="700" y2="300" stroke="var(--border-accent, #3b82f6)" stroke-width="2" marker-end="url(#consArrow)"/>
  
  <!-- Async replication -->
  <line x1="500" y1="320" x2="535" y2="320" stroke="var(--border-orange, #f97316)" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#consArrow)"/>
  <line x1="620" y1="320" x2="655" y2="320" stroke="var(--border-orange, #f97316)" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#consArrow)"/>
  
  <text x="520" y="375" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Low latency (async)</text>
  <text x="520" y="390" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Reads may see stale data</text>
  
  <!-- CAP Theorem -->
  <rect x="690" y="200" width="260" height="160" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="820" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">CAP Theorem</text>
  
  <!-- CAP Triangle -->
  <polygon points="820,245 760,320 880,320" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="820" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-green, #22c55e)">Consistency</text>
  <text x="750" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-blue, #3b82f6)">Availability</text>
  <text x="890" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--border-orange, #f97316)">Partition Tolerance</text>
  
  <text x="820" y="295" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">During network</text>
  <text x="820" y="308" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">partition, choose:</text>
  <text x="820" y="345" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a)" font-weight="bold">CP or AP</text>
  
  <!-- Use cases -->
  <rect x="50" y="375" width="900" height="60" rx="6" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="500" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">When to Use Each Model</text>
  <text x="150" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Strong: Payments, auth, inventory</text>
  <text x="350" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Causal: Social feeds, comments</text>
  <text x="550" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Eventual: Likes, shares, analytics</text>
  <text x="750" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Weak: Logs, metrics, counters</text>
  <text x="850" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">CP: Banking, healthcare</text>
  <text x="500" y="435" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">AP: Social media, content delivery, IoT</text>
</svg>
