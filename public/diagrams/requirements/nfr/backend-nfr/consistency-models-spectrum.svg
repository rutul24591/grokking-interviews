<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Consistency Models Spectrum</text>
  
  <!-- Strong Consistency -->
  <rect x="40" y="70" width="220" height="150" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2.5"/>
  <text x="150" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Strong Consistency</text>
  <text x="150" y="125" font-size="11" text-anchor="middle" fill="#666666">(Linearizability)</text>
  <text x="150" y="150" font-size="10" text-anchor="middle" fill="#666666">All reads see latest write</text>
  <text x="150" y="170" font-size="10" text-anchor="middle" fill="#666666">Single-node behavior</text>
  <text x="150" y="190" font-size="10" text-anchor="middle" fill="#666666">High latency, low availability</text>
  <text x="150" y="210" font-size="10" text-anchor="middle" fill="#666666">Use: Payments, Inventory</text>
  
  <!-- Sequential Consistency -->
  <rect x="290" y="70" width="220" height="150" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Sequential Consistency</text>
  <text x="400" y="125" font-size="10" text-anchor="middle" fill="#666666">Operations ordered globally</text>
  <text x="400" y="145" font-size="10" text-anchor="middle" fill="#666666">Per-process order preserved</text>
  <text x="400" y="165" font-size="10" text-anchor="middle" fill="#666666">Moderate latency</text>
  <text x="400" y="185" font-size="10" text-anchor="middle" fill="#666666">Use: Distributed locks</text>
  <text x="400" y="205" font-size="10" text-anchor="middle" fill="#666666">Weaker than linearizable</text>
  
  <!-- Causal Consistency -->
  <rect x="540" y="70" width="220" height="150" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="650" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Causal Consistency</text>
  <text x="650" y="125" font-size="10" text-anchor="middle" fill="#666666">Causally related ops ordered</text>
  <text x="650" y="145" font-size="10" text-anchor="middle" fill="#666666">Concurrent ops may differ</text>
  <text x="650" y="165" font-size="10" text-anchor="middle" fill="#666666">Good availability</text>
  <text x="650" y="185" font-size="10" text-anchor="middle" fill="#666666">Use: Social media feeds</text>
  <text x="650" y="205" font-size="10" text-anchor="middle" fill="#666666">Vector clocks track causality</text>
  
  <!-- Eventual Consistency -->
  <rect x="40" y="260" width="220" height="150" rx="8" fill="#ffe0b2" stroke="#ff9800" stroke-width="2"/>
  <text x="150" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Eventual Consistency</text>
  <text x="150" y="315" font-size="10" text-anchor="middle" fill="#666666">Replicas converge over time</text>
  <text x="150" y="335" font-size="10" text-anchor="middle" fill="#666666">No ordering guarantees</text>
  <text x="150" y="355" font-size="10" text-anchor="middle" fill="#666666">High availability, low latency</text>
  <text x="150" y="375" font-size="10" text-anchor="middle" fill="#666666">Use: DNS, CDNs, Likes</text>
  <text x="150" y="395" font-size="10" text-anchor="middle" fill="#666666">Conflict resolution needed</text>
  
  <!-- Weak Consistency -->
  <rect x="290" y="260" width="220" height="150" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="400" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Weak Consistency</text>
  <text x="400" y="315" font-size="10" text-anchor="middle" fill="#666666">No ordering guarantees</text>
  <text x="400" y="335" font-size="10" text-anchor="middle" fill="#666666">Reads may see stale data</text>
  <text x="400" y="355" font-size="10" text-anchor="middle" fill="#666666">Maximum availability</text>
  <text x="400" y="375" font-size="10" text-anchor="middle" fill="#666666">Use: Caches, Analytics</text>
  <text x="400" y="395" font-size="10" text-anchor="middle" fill="#666666">Requires app-level handling</text>
  
  <!-- Monotonic Reads -->
  <rect x="540" y="260" width="220" height="150" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="650" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Monotonic Reads/Writes</text>
  <text x="650" y="315" font-size="10" text-anchor="middle" fill="#666666">Reads never go backward</text>
  <text x="650" y="335" font-size="10" text-anchor="middle" fill="#666666">Read-your-writes guarantee</text>
  <text x="650" y="355" font-size="10" text-anchor="middle" fill="#666666">Good user experience</text>
  <text x="650" y="375" font-size="10" text-anchor="middle" fill="#666666">Use: Session data, Profiles</text>
  <text x="650" y="395" font-size="10" text-anchor="middle" fill="#666666">Session pinning required</text>
  
  <!-- CAP Theorem -->
  <rect x="40" y="450" width="720" height="130" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="480" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CAP Theorem — The Fundamental Trade-Off</text>
  
  <rect x="60" y="495" width="200" height="70" rx="6" fill="#e3f2fd"/>
  <text x="160" y="520" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CP Systems</text>
  <text x="160" y="540" font-size="10" text-anchor="middle" fill="#666666">Consistency + Partition tolerance</text>
  <text x="160" y="558" font-size="10" text-anchor="middle" fill="#666666">Sacrifice availability during partition</text>
  
  <rect x="300" y="495" width="200" height="70" rx="6" fill="#c8e6c9"/>
  <text x="400" y="520" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">AP Systems</text>
  <text x="400" y="540" font-size="10" text-anchor="middle" fill="#666666">Availability + Partition tolerance</text>
  <text x="400" y="558" font-size="10" text-anchor="middle" fill="#666666">Sacrifice consistency during partition</text>
  
  <rect x="540" y="495" width="200" height="70" rx="6" fill="#fff3e0"/>
  <text x="640" y="520" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Examples</text>
  <text x="640" y="540" font-size="10" text-anchor="middle" fill="#666666">CP: PostgreSQL, ZooKeeper</text>
  <text x="640" y="558" font-size="10" text-anchor="middle" fill="#666666">AP: DynamoDB, Cassandra</text>
</svg>
