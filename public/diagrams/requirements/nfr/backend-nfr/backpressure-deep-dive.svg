<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="backpressArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Backpressure &amp; Flow Control</text>
  
  <!-- Backpressure Propagation -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Backpressure Propagation</text>
  
  <!-- Client -->
  <rect x="70" y="110" width="80" height="50" rx="4" fill="#3b82f6"/>
  <text x="110" y="140" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff">Client</text>
  
  <line x1="150" y1="135" x2="180" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#backpressArrow)"/>
  <text x="165" y="125" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Requests</text>
  
  <!-- API Gateway -->
  <rect x="180" y="110" width="80" height="50" rx="4" fill="#8b5cf6"/>
  <text x="220" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">API Gateway</text>
  <text x="220" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Queue: 80%</text>
  
  <line x1="260" y1="135" x2="290" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#backpressArrow)"/>
  
  <!-- Service A -->
  <rect x="290" y="110" width="80" height="50" rx="4" fill="#f97316"/>
  <text x="330" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Service A</text>
  <text x="330" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Queue: 95%</text>
  
  <line x1="370" y1="135" x2="400" y2="135" stroke="#ef4444" stroke-width="3" marker-end="url(#backpressArrow)"/>
  <text x="385" y="125" text-anchor="middle" font-size="7" fill="var(--border-red, #ef4444" font-weight="bold">SLOW DOWN</text>
  
  <!-- Database -->
  <rect x="400" y="110" width="80" height="50" rx="4" fill="#ef4444"/>
  <text x="440" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Database</text>
  <text x="440" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Overloaded</text>
  
  <!-- Backpressure signal path -->
  <path d="M 440 160 L 440 185 L 330 185 L 330 165" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
  <path d="M 330 160 L 330 185 L 220 185 L 220 165" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
  <path d="M 220 160 L 220 185 L 110 185 L 110 165" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2"/>
  
  <text x="275" y="210" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Backpressure propagates upstream to slow down producers</text>
  
  <!-- Reactive Streams -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Reactive Streams Backpressure</text>
  
  <rect x="540" y="110" width="100" height="70" rx="3" fill="#3b82f6"/>
  <text x="590" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Publisher</text>
  <text x="590" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Emits data</text>
  <text x="590" y="172" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">on request</text>
  
  <line x1="640" y1="145" x2="670" y2="145" stroke="#3b82f6" stroke-width="2" marker-end="url(#backpressArrow)"/>
  <text x="655" y="135" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Data</text>
  
  <line x1="670" y1="155" x2="640" y2="155" stroke="#ef4444" stroke-width="2" marker-end="url(#backpressArrow)"/>
  <text x="655" y="170" text-anchor="middle" font-size="7" fill="var(--border-red, #ef4444">request(n)</text>
  
  <rect x="670" y="110" width="100" height="70" rx="3" fill="#8b5cf6"/>
  <text x="720" y="135" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Subscriber</text>
  <text x="720" y="155" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Controls rate</text>
  <text x="720" y="172" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Pulls n items</text>
  
  <text x="735" y="220" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Subscriber pulls only what it can handle</text>
  
  <!-- Load Shedding Strategies -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Load Shedding Strategies</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Random Shedding</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Drop random requests</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Priority-Based</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Drop low-priority first</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Client-Based</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Limit per client</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Graceful Degradation</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Disable non-critical</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Implement backpressure at every layer. Better to fail fast than cascade failure.</text>
</svg>
