<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Secret Rotation Workflow</text>
  
  <!-- Current State -->
  <rect x="40" y="70" width="720" height="120" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Secret Rotation Process</text>
  
  <!-- Step 1 -->
  <rect x="60" y="110" width="140" height="60" rx="6" fill="#bbdefb"/>
  <text x="130" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Generate New</text>
  <text x="130" y="155" font-size="10" text-anchor="middle" fill="#666666">Create new secret</text>
  
  <!-- Step 2 -->
  <rect x="230" y="110" width="140" height="60" rx="6" fill="#c8e6c9"/>
  <text x="300" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Store Both</text>
  <text x="300" y="155" font-size="10" text-anchor="middle" fill="#666666">Old + new in vault</text>
  
  <!-- Step 3 -->
  <rect x="400" y="110" width="140" height="60" rx="6" fill="#fff3e0"/>
  <text x="470" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Deploy New</text>
  <text x="470" y="155" font-size="10" text-anchor="middle" fill="#666666">Roll out new secret</text>
  
  <!-- Step 4 -->
  <rect x="570" y="110" width="140" height="60" rx="6" fill="#e8f5e9"/>
  <text x="640" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Remove Old</text>
  <text x="640" y="155" font-size="10" text-anchor="middle" fill="#666666">Delete old secret</text>
  
  <!-- Rotation Schedule -->
  <rect x="40" y="220" width="340" height="180" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="250" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Rotation Schedule</text>
  
  <rect x="60" y="270" width="300" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="290" font-size="11" text-anchor="middle" fill="#1a1a1a">API Keys: Every 90 days</text>
  
  <rect x="60" y="305" width="300" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="325" font-size="11" text-anchor="middle" fill="#1a1a1a">Database Passwords: Every 30 days</text>
  
  <rect x="60" y="340" width="300" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="360" font-size="11" text-anchor="middle" fill="#1a1a1a">TLS Certificates: Before expiration</text>
  
  <rect x="60" y="375" width="300" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="395" font-size="11" text-anchor="middle" fill="#1a1a1a">Service Accounts: Automated rotation</text>
  
  <!-- Automated Rotation -->
  <rect x="420" y="220" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="250" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Automated Rotation</text>
  
  <rect x="440" y="270" width="300" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="290" font-size="11" text-anchor="middle" fill="#1a1a1a">1. Generate new secret</text>
  
  <rect x="440" y="305" width="300" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="325" font-size="11" text-anchor="middle" fill="#1a1a1a">2. Update secret store</text>
  
  <rect x="440" y="340" width="300" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="360" font-size="11" text-anchor="middle" fill="#1a1a1a">3. Notify services (webhook)</text>
  
  <rect x="440" y="375" width="300" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="395" font-size="11" text-anchor="middle" fill="#1a1a1a">4. Verify all services updated</text>
  
  <!-- Key Principles -->
  <rect x="40" y="430" width="720" height="150" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="460" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Key Principles</text>
  
  <rect x="60" y="480" width="220" height="80" rx="6" fill="#e3f2fd"/>
  <text x="170" y="505" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Zero Downtime</text>
  <text x="170" y="530" font-size="10" text-anchor="middle" fill="#666666">Old secret remains valid during</text>
  <text x="170" y="548" font-size="10" text-anchor="middle" fill="#666666">rotation to prevent service disruption</text>
  
  <rect x="300" y="480" width="220" height="80" rx="6" fill="#c8e6c9"/>
  <text x="410" y="505" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Atomic Operations</text>
  <text x="410" y="530" font-size="10" text-anchor="middle" fill="#666666">Store update and notification must be</text>
  <text x="410" y="548" font-size="10" text-anchor="middle" fill="#666666">atomic to prevent race conditions</text>
  
  <rect x="540" y="480" width="200" height="80" rx="6" fill="#fff3e0"/>
  <text x="640" y="505" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Audit Trail</text>
  <text x="640" y="530" font-size="10" text-anchor="middle" fill="#666666">Log all rotation events with</text>
  <text x="640" y="548" font-size="10" text-anchor="middle" fill="#666666">who, when, and what changed</text>
</svg>
