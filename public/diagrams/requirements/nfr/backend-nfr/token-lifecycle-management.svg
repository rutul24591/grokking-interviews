<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Lifecycle Management</text>
  
  <!-- Token Issuance -->
  <rect x="40" y="70" width="340" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Issuance</text>
  
  <rect x="55" y="115" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">User authenticates (password, MFA, SSO)</text>
  
  <rect x="55" y="150" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">IdP issues: access token (5-15 min) + refresh token (30 days)</text>
  
  <rect x="55" y="185" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">Access token: JWT signed with IdP private key</text>
  
  <rect x="55" y="220" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">Refresh token: stored in HttpOnly, Secure, SameSite cookie</text>
  
  <!-- Token Usage -->
  <rect x="420" y="70" width="340" height="160" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Usage</text>
  
  <rect x="435" y="115" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Client includes access token in Authorization header</text>
  
  <rect x="435" y="150" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">API validates token (signature, exp, aud, iss)</text>
  
  <rect x="435" y="185" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">If valid: process request, return response</text>
  
  <rect x="435" y="220" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">If expired (401): client uses refresh token for new access token</text>
  
  <!-- Token Refresh & Rotation -->
  <rect x="40" y="260" width="720" height="160" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="290" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Refresh & Rotation</text>
  
  <rect x="55" y="305" width="220" height="100" rx="6" fill="#ffe0b2"/>
  <text x="165" y="325" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Normal Refresh</text>
  <text x="165" y="345" font-size="9" text-anchor="middle" fill="#666666">1. Access token expires</text>
  <text x="165" y="363" font-size="9" text-anchor="middle" fill="#666666">2. Client sends refresh token</text>
  <text x="165" y="381" font-size="9" text-anchor="middle" fill="#666666">3. IdP issues new pair</text>
  <text x="165" y="399" font-size="9" text-anchor="middle" fill="#666666">4. Old refresh token invalidated</text>
  
  <rect x="295" y="305" width="220" height="100" rx="6" fill="#ffe0b2"/>
  <text x="405" y="325" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Rotation</text>
  <text x="405" y="345" font-size="9" text-anchor="middle" fill="#666666">Each refresh issues new pair</text>
  <text x="405" y="363" font-size="9" text-anchor="middle" fill="#666666">Detects stolen refresh tokens</text>
  <text x="405" y="381" font-size="9" text-anchor="middle" fill="#666666">Reused token = all tokens revoked</text>
  <text x="405" y="399" font-size="9" text-anchor="middle" fill="#666666">Forces re-authentication</text>
  
  <rect x="535" y="305" width="210" height="100" rx="6" fill="#ffe0b2"/>
  <text x="640" y="325" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Revocation</text>
  <text x="640" y="345" font-size="9" text-anchor="middle" fill="#666666">User logout: revoke tokens</text>
  <text x="640" y="363" font-size="9" text-anchor="middle" fill="#666666">Password change: revoke all</text>
  <text x="640" y="381" font-size="9" text-anchor="middle" fill="#666666">Security incident: revoke all</text>
  <text x="640" y="399" font-size="9" text-anchor="middle" fill="#666666">Token blacklist or rotation</text>
  
  <!-- Security Best Practices -->
  <rect x="40" y="450" width="720" height="130" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="480" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Security Best Practices</text>
  
  <rect x="55" y="495" width="210" height="70" rx="6" fill="#e1bee7"/>
  <text x="160" y="515" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Access Token Storage</text>
  <text x="160" y="535" font-size="9" text-anchor="middle" fill="#666666">In memory only (JS variables)</text>
  <text x="160" y="550" font-size="9" text-anchor="middle" fill="#666666">Lost on page refresh</text>
  <text x="160" y="565" font-size="9" text-anchor="middle" fill="#666666">Not in localStorage (XSS risk)</text>
  
  <rect x="295" y="495" width="210" height="70" rx="6" fill="#e1bee7"/>
  <text x="400" y="515" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Refresh Token Storage</text>
  <text x="400" y="535" font-size="9" text-anchor="middle" fill="#666666">HttpOnly, Secure, SameSite cookie</text>
  <text x="400" y="550" font-size="9" text-anchor="middle" fill="#666666">Inaccessible to JavaScript</text>
  <text x="400" y="565" font-size="9" text-anchor="middle" fill="#666666">Protected against CSRF</text>
  
  <rect x="535" y="495" width="210" height="70" rx="6" fill="#e1bee7"/>
  <text x="640" y="515" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Token Binding</text>
  <text x="640" y="535" font-size="9" text-anchor="middle" fill="#666666">Bind tokens to client fingerprint</text>
  <text x="640" y="550" font-size="9" text-anchor="middle" fill="#666666">Prevents token replay</text>
  <text x="640" y="565" font-size="9" text-anchor="middle" fill="#666666">Detects stolen tokens</text>
</svg>
