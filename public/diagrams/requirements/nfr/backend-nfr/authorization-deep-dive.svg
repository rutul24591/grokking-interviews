<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="authzModelArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Authorization Models Deep Dive</text>
  
  <!-- RBAC Deep Dive -->
  <rect x="50" y="60" width="450" height="220" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">RBAC: Role Hierarchy</text>
  
  <!-- Role hierarchy pyramid -->
  <polygon points="275,80 350,200 200,200" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="275" y="110" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--border-red, #ef4444">Admin</text>
  <text x="275" y="125" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">All permissions</text>
  
  <polygon points="275,135 330,200 220,200" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="275" y="155" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--border-orange, #f97316">Manager</text>
  <text x="275" y="170" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Team permissions</text>
  
  <polygon points="275,175 310,200 240,200" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="275" y="195" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--border-blue, #3b82f6">User</text>
  <text x="275" y="210" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Basic permissions</text>
  
  <text x="380" y="130" text-anchor="start" font-size="8" fill="var(--text-secondary, #47556ird">Inherits:</text>
  <text x="380" y="145" text-anchor="start" font-size="7" fill="var(--text-secondary, #47556ird">Manager inherits User</text>
  <text x="380" y="160" text-anchor="start" font-size="7" fill="var(--text-secondary, #47556ird">Admin inherits Manager</text>
  
  <text x="275" y="245" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Simple to manage</text>
  <text x="275" y="262" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Role explosion at scale</text>
  
  <!-- ABAC Deep Dive -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">ABAC: Policy Evaluation</text>
  
  <rect x="540" y="110" width="80" height="70" rx="3" fill="#3b82f6"/>
  <text x="580" y="135" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Subject</text>
  <text x="580" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Attributes</text>
  <text x="580" y="172" text-anchor="middle" font-size="6" fill="var(--text-inverse, #ffffff">role, dept, clearance</text>
  
  <rect x="640" y="110" width="80" height="70" rx="3" fill="#8b5cf6"/>
  <text x="680" y="135" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Resource</text>
  <text x="680" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Attributes</text>
  <text x="680" y="172" text-anchor="middle" font-size="6" fill="var(--text-inverse, #ffffff">owner, sensitivity</text>
  
  <rect x="740" y="110" width="80" height="70" rx="3" fill="#f97316"/>
  <text x="780" y="135" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Action</text>
  <text x="780" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Attributes</text>
  <text x="780" y="172" text-anchor="middle" font-size="6" fill="var(--text-inverse, #ffffff">read, write, delete</text>
  
  <rect x="840" y="110" width="80" height="70" rx="3" fill="#22c55e"/>
  <text x="880" y="135" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Environment</text>
  <text x="880" y="152" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Attributes</text>
  <text x="880" y="172" text-anchor="middle" font-size="6" fill="var(--text-inverse, #ffffff">time, location, IP</text>
  
  <line x1="620" y1="145" x2="635" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <line x1="720" y1="145" x2="735" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <line x1="820" y1="145" x2="835" y2="145" stroke="#3b82f6" stroke-width="2"/>
  
  <rect x="680" y="190" width="100" height="40" rx="3" fill="#ef4444"/>
  <text x="730" y="210" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff">Policy Engine</text>
  <text x="730" y="225" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Evaluate → Allow/Deny</text>
  
  <!-- Authorization Patterns -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Authorization Implementation Patterns</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Resource Ownership</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">if (resource.owner == user)</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">ACL-Based</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Check access control list</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Policy-Based (OPA)</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Centralized policy engine</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Attribute-Based</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Evaluate attributes dynamically</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Choose model based on complexity. RBAC for simple, ABAC for fine-grained control.</text>
</svg>
