<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Retry Safety Patterns</text>
  
  <!-- Retry Flow -->
  <rect x="40" y="70" width="720" height="160" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Safe Retry Flow</text>
  
  <!-- Client -->
  <rect x="60" y="120" width="140" height="90" rx="6" fill="#bbdefb"/>
  <text x="130" y="145" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Client</text>
  <text x="130" y="165" font-size="10" text-anchor="middle" fill="#666666">Sends request</text>
  <text x="130" y="183" font-size="10" text-anchor="middle" fill="#666666">Waits for response</text>
  <text x="130" y="203" font-size="10" text-anchor="middle" fill="#666666">Retries on timeout</text>
  
  <!-- Network -->
  <rect x="230" y="120" width="140" height="90" rx="6" fill="#fff3e0"/>
  <text x="300" y="145" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Network</text>
  <text x="300" y="165" font-size="10" text-anchor="middle" fill="#666666">May drop packets</text>
  <text x="300" y="183" font-size="10" text-anchor="middle" fill="#666666">May delay responses</text>
  <text x="300" y="203" font-size="10" text-anchor="middle" fill="#666666">May duplicate requests</text>
  
  <!-- Server -->
  <rect x="400" y="120" width="140" height="90" rx="6" fill="#c8e6c9"/>
  <text x="470" y="145" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Server</text>
  <text x="470" y="165" font-size="10" text-anchor="middle" fill="#666666">Checks idempotency key</text>
  <text x="470" y="183" font-size="10" text-anchor="middle" fill="#666666">Processes or returns cached</text>
  <text x="470" y="203" font-size="10" text-anchor="middle" fill="#666666">Safe for retries</text>
  
  <!-- Result -->
  <rect x="570" y="120" width="140" height="90" rx="6" fill="#e8f5e9"/>
  <text x="640" y="145" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Result</text>
  <text x="640" y="165" font-size="10" text-anchor="middle" fill="#666666">Exactly-once effect</text>
  <text x="640" y="183" font-size="10" text-anchor="middle" fill="#666666">No duplicates</text>
  <text x="640" y="203" font-size="10" text-anchor="middle" fill="#4caf50">Idempotent guarantee</text>
  
  <!-- Scenarios -->
  <rect x="40" y="260" width="220" height="180" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="150" y="290" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Scenario 1: Timeout</text>
  <text x="150" y="320" font-size="11" text-anchor="middle" fill="#666666">Client sends request</text>
  <text x="150" y="340" font-size="11" text-anchor="middle" fill="#666666">Network drops response</text>
  <text x="150" y="360" font-size="11" text-anchor="middle" fill="#666666">Client retries</text>
  <text x="150" y="380" font-size="11" text-anchor="middle" fill="#666666">Server processes once</text>
  <text x="150" y="400" font-size="11" text-anchor="middle" fill="#4caf50">✓ Safe retry</text>
  <text x="150" y="420" font-size="11" text-anchor="middle" fill="#666666">(idempotent key prevents dup)</text>
  
  <rect x="290" y="260" width="220" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="290" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Scenario 2: Slow Response</text>
  <text x="400" y="320" font-size="11" text-anchor="middle" fill="#666666">Client sends request</text>
  <text x="400" y="340" font-size="11" text-anchor="middle" fill="#666666">Server processes slowly</text>
  <text x="400" y="360" font-size="11" text-anchor="middle" fill="#666666">Client times out, retries</text>
  <text x="400" y="380" font-size="11" text-anchor="middle" fill="#666666">Server returns cached result</text>
  <text x="400" y="400" font-size="11" text-anchor="middle" fill="#4caf50">✓ Safe retry</text>
  <text x="400" y="420" font-size="11" text-anchor="middle" fill="#666666">(idempotent = cached response)</text>
  
  <rect x="540" y="260" width="220" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="650" y="290" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Scenario 3: Duplicate Request</text>
  <text x="650" y="320" font-size="11" text-anchor="middle" fill="#666666">Network duplicates request</text>
  <text x="650" y="340" font-size="11" text-anchor="middle" fill="#666666">Server receives same ID twice</text>
  <text x="650" y="360" font-size="11" text-anchor="middle" fill="#666666">First processes, second returns cached</text>
  <text x="650" y="380" font-size="11" text-anchor="middle" fill="#4caf50">✓ Safe duplicate</text>
  <text x="650" y="400" font-size="11" text-anchor="middle" fill="#666666">(idempotent = same result)</text>
  
  <!-- Retry Best Practices -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="500" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Retry Best Practices</text>
  
  <rect x="60" y="515" width="220" height="50" rx="6" fill="#e1bee7"/>
  <text x="170" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Idempotent Operations</text>
  <text x="170" y="555" font-size="10" text-anchor="middle" fill="#666666">Always use idempotency keys for retries</text>
  
  <rect x="300" y="515" width="220" height="50" rx="6" fill="#e1bee7"/>
  <text x="410" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Exponential Backoff</text>
  <text x="410" y="555" font-size="10" text-anchor="middle" fill="#666666">Wait longer between retries to avoid overload</text>
  
  <rect x="540" y="515" width="200" height="50" rx="6" fill="#e1bee7"/>
  <text x="640" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Max Retries</text>
  <text x="640" y="555" font-size="10" text-anchor="middle" fill="#666666">Limit retries to avoid infinite loops</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
