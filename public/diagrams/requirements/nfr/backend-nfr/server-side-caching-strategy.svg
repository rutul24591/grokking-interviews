<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="cacheArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Server-Side Caching Patterns</text>
  
  <!-- Cache-Aside Pattern -->
  <rect x="50" y="60" width="450" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Cache-Aside (Lazy Loading)</text>
  
  <!-- Application -->
  <rect x="70" y="110" width="100" height="50" rx="4" fill="#3b82f6"/>
  <text x="120" y="140" text-anchor="middle" font-size="10" fill="#ffffff">Application</text>
  
  <!-- Cache -->
  <rect x="250" y="110" width="100" height="50" rx="4" fill="#22c55e"/>
  <text x="300" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Cache</text>
  <text x="300" y="152" text-anchor="middle" font-size="8" fill="#ffffff">Redis/Memcached</text>
  
  <!-- Database -->
  <rect x="250" y="180" width="100" height="50" rx="4" fill="#8b5cf6"/>
  <text x="300" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Database</text>
  <text x="300" y="222" text-anchor="middle" font-size="8" fill="#ffffff">PostgreSQL/MySQL</text>
  
  <!-- Flow arrows -->
  <line x1="170" y1="135" x2="245" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#cacheArrow)"/>
  <text x="207" y="125" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">1. Read</text>
  
  <path d="M 300 160 L 300 175" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="310" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">2. Miss</text>
  
  <text x="275" y="255" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Simple, cache only requested data</text>
  <text x="275" y="272" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Cache miss latency = cache + DB</text>
  
  <!-- Write-Through Pattern -->
  <rect x="520" y="60" width="430" height="200" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Write-Through</text>
  
  <!-- Application -->
  <rect x="540" y="110" width="100" height="50" rx="4" fill="#3b82f6"/>
  <text x="590" y="140" text-anchor="middle" font-size="10" fill="#ffffff">Application</text>
  
  <!-- Cache -->
  <rect x="720" y="110" width="100" height="50" rx="4" fill="#22c55e"/>
  <text x="770" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Cache</text>
  <text x="770" y="152" text-anchor="middle" font-size="8" fill="#ffffff">Writes here first</text>
  
  <!-- Database -->
  <rect x="720" y="180" width="100" height="50" rx="4" fill="#8b5cf6"/>
  <text x="770" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Database</text>
  <text x="770" y="222" text-anchor="middle" font-size="8" fill="#ffffff">Synced by cache</text>
  
  <!-- Flow arrows -->
  <line x1="640" y1="135" x2="715" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#cacheArrow)"/>
  <text x="677" y="125" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Write</text>
  
  <path d="M 770 160 L 770 175" stroke="#3b82f6" stroke-width="2" marker-end="url(#cacheArrow)"/>
  <text x="780" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Sync</text>
  
  <text x="735" y="255" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e" font-weight="bold">✓ Strong consistency</text>
  <text x="735" y="272" text-anchor="middle" font-size="9" fill="#ef4444">✗ Write latency = max(cache, DB)</text>
  
  <!-- Cache Strategies Comparison -->
  <rect x="50" y="280" width="450" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Caching Strategies</text>
  
  <rect x="70" y="325" width="170" height="45" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="155" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="#3b82f6">Cache-Aside</text>
  <text x="155" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Read-heavy workloads</text>
  
  <rect x="260" y="325" width="170" height="45" rx="3" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="345" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="#22c55e">Write-Through</text>
  <text x="345" y="362" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Consistency critical</text>
  
  <rect x="70" y="380" width="170" height="45" rx="3" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="155" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="#8b5cf6">Write-Behind</text>
  <text x="155" y="417" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">High write throughput</text>
  
  <rect x="260" y="380" width="170" height="45" rx="3" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="345" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="#f97316">Refresh-Ahead</text>
  <text x="345" y="417" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Predictable access</text>
  
  <!-- Cache Invalidation -->
  <rect x="520" y="280" width="430" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Cache Invalidation Strategies</text>
  
  <text x="540" y="335" font-size="10" fill="var(--text-secondary, #47556ird">• TTL (Time-To-Live): Auto-expire after duration</text>
  <text x="540" y="355" font-size="10" fill="var(--text-secondary, #47556ird">• Explicit Delete: Remove on data change</text>
  <text x="540" y="375" font-size="10" fill="var(--text-secondary, #47556ird">• Version Keys: Invalidate by version change</text>
  <text x="540" y="395" font-size="10" fill="var(--text-secondary, #47556ird">• Event-Driven: Listen to data change events</text>
  <text x="540" y="415" font-size="10" fill="var(--text-secondary, #47556ird">• Cache Stampede Protection: Locking, probabilistic early expiration</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Choose caching pattern based on read/write ratio and consistency requirements.</text>
</svg>
