<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Capacity Planning Framework</text>
  
  <!-- Capacity Planning Pipeline -->
  <rect x="40" y="70" width="720" height="120" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Capacity Planning Pipeline</text>
  
  <rect x="55" y="115" width="140" height="60" rx="6" fill="#bbdefb"/>
  <text x="125" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Measure Demand</text>
  <text x="125" y="155" font-size="9" text-anchor="middle" fill="#666666">RPS, data volume, users</text>
  <text x="125" y="170" font-size="9" text-anchor="middle" fill="#666666">Historical + current</text>
  
  <rect x="215" y="115" width="140" height="60" rx="6" fill="#bbdefb"/>
  <text x="285" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Model Resources</text>
  <text x="285" y="155" font-size="9" text-anchor="middle" fill="#666666">CPU, memory, storage</text>
  <text x="285" y="170" font-size="9" text-anchor="middle" fill="#666666">Per-request cost</text>
  
  <rect x="375" y="115" width="140" height="60" rx="6" fill="#bbdefb"/>
  <text x="445" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Forecast Growth</text>
  <text x="445" y="155" font-size="9" text-anchor="middle" fill="#666666">3-6 month projection</text>
  <text x="445" y="170" font-size="9" text-anchor="middle" fill="#666666">Baseline + scenarios</text>
  
  <rect x="535" y="115" width="140" height="60" rx="6" fill="#bbdefb"/>
  <text x="605" y="135" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Calculate Headroom</text>
  <text x="605" y="155" font-size="9" text-anchor="middle" fill="#666666">Current vs capacity</text>
  <text x="605" y="170" font-size="9" text-anchor="middle" fill="#666666">Time to exhaustion</text>
  
  <rect x="695" y="115" width="55" height="60" rx="6" fill="#bbdefb"/>
  <text x="722" y="145" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">5. Act</text>
  <text x="722" y="163" font-size="9" text-anchor="middle" fill="#666666">Scale up</text>
  <text x="722" y="178" font-size="9" text-anchor="middle" fill="#666666">or wait</text>
  
  <!-- Demand Forecasting -->
  <rect x="40" y="220" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="250" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Demand Forecasting</text>
  
  <rect x="55" y="265" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="285" font-size="10" text-anchor="middle" fill="#1a1a1a">Historical baseline: average and peak RPS over 12 months</text>
  
  <rect x="55" y="300" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="320" font-size="10" text-anchor="middle" fill="#1a1a1a">Growth trend: month-over-month growth rate (e.g., 5%/month)</text>
  
  <rect x="55" y="335" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="355" font-size="10" text-anchor="middle" fill="#1a1a1a">Seasonal patterns: holiday spikes, weekday/weekend patterns</text>
  
  <rect x="55" y="370" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="390" font-size="10" text-anchor="middle" fill="#1a1a1a">Planned changes: product launches, marketing campaigns</text>
  
  <!-- Headroom Management -->
  <rect x="420" y="220" width="340" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="250" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Headroom Management</text>
  
  <rect x="435" y="265" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="285" font-size="10" text-anchor="middle" fill="#1a1a1a">Target headroom: 30-50% between peak usage and capacity</text>
  
  <rect x="435" y="300" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="320" font-size="10" text-anchor="middle" fill="#1a1a1a">Alert threshold: 70% utilization (30% headroom remaining)</text>
  
  <rect x="435" y="335" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="355" font-size="10" text-anchor="middle" fill="#1a1a1a">Critical threshold: 85% utilization (emergency scaling)</text>
  
  <rect x="435" y="370" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="390" font-size="10" text-anchor="middle" fill="#1a1a1a">Exhaustion timeline: months until capacity at current growth</text>
  
  <!-- Utilization Trend Chart -->
  <rect x="40" y="430" width="720" height="150" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="460" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Capacity Utilization Trend & Forecast</text>
  
  <!-- Simple trend visualization -->
  <rect x="60" y="480" width="680" height="80" rx="4" fill="#e0e0e0"/>
  <rect x="60" y="520" width="200" height="40" rx="4" fill="#c8e6c9"/>
  <text x="160" y="545" font-size="10" text-anchor="middle" fill="#1a1a1a">Current: 55% utilization</text>
  <rect x="260" y="500" width="200" height="60" rx="4" fill="#fff3e0"/>
  <text x="360" y="535" font-size="10" text-anchor="middle" fill="#1a1a1a">Forecast (3mo): 72% utilization</text>
  <rect x="460" y="485" width="150" height="75" rx="4" fill="#ffcdd2"/>
  <text x="535" y="528" font-size="10" text-anchor="middle" fill="#1a1a1a">Alert threshold: 70%</text>
  <rect x="610" y="480" width="130" height="80" rx="4" fill="#ffebee"/>
  <text x="675" y="525" font-size="10" text-anchor="middle" fill="#1a1a1a">Capacity: 100%</text>
</svg>
