<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Database Selection Framework</text>
  
  <!-- Workload Analysis -->
  <rect x="40" y="70" width="720" height="140" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="100" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Workload Analysis Dimensions</text>
  
  <rect x="55" y="115" width="160" height="80" rx="6" fill="#bbdefb"/>
  <text x="135" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Data Model</text>
  <text x="135" y="155" font-size="9" text-anchor="middle" fill="#666666">Structured → SQL</text>
  <text x="135" y="170" font-size="9" text-anchor="middle" fill="#666666">Semi-structured → Document</text>
  <text x="135" y="185" font-size="9" text-anchor="middle" fill="#666666">Graph → Graph DB</text>
  <text x="135" y="200" font-size="9" text-anchor="middle" fill="#666666">Key-value → KV store</text>
  
  <rect x="235" y="115" width="160" height="80" rx="6" fill="#bbdefb"/>
  <text x="315" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Access Patterns</text>
  <text x="315" y="155" font-size="9" text-anchor="middle" fill="#666666">Read-heavy → Cache + DB</text>
  <text x="315" y="170" font-size="9" text-anchor="middle" fill="#666666">Write-heavy → Column-family</text>
  <text x="315" y="185" font-size="9" text-anchor="middle" fill="#666666">Mixed → Relational</text>
  <text x="315" y="200" font-size="9" text-anchor="middle" fill="#666666">Low-latency → In-memory</text>
  
  <rect x="415" y="115" width="160" height="80" rx="6" fill="#bbdefb"/>
  <text x="495" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Consistency</text>
  <text x="495" y="155" font-size="9" text-anchor="middle" fill="#666666">Strong → SQL, CP NoSQL</text>
  <text x="495" y="170" font-size="9" text-anchor="middle" fill="#666666">Eventual → AP NoSQL</text>
  <text x="495" y="185" font-size="9" text-anchor="middle" fill="#666666">Tunable → Cassandra</text>
  <text x="495" y="200" font-size="9" text-anchor="middle" fill="#666666">Causal → CockroachDB</text>
  
  <rect x="595" y="115" width="150" height="80" rx="6" fill="#bbdefb"/>
  <text x="670" y="135" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Scalability</th>
  <text x="670" y="155" font-size="9" text-anchor="middle" fill="#666666">Vertical → SQL</text>
  <text x="670" y="170" font-size="9" text-anchor="middle" fill="#666666">Horizontal → NoSQL</text>
  <text x="670" y="185" font-size="9" text-anchor="middle" fill="#666666">Linear → Distributed SQL</text>
  <text x="670" y="200" font-size="9" text-anchor="middle" fill="#666666">Global → Multi-region</text>
  
  <!-- CAP Theorem Analysis -->
  <rect x="40" y="240" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="270" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CAP Theorem Database Mapping</text>
  
  <rect x="55" y="285" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="305" font-size="10" text-anchor="middle" fill="#1a1a1a">CP (Consistency + Partition): MongoDB, Redis, HBase</text>
  
  <rect x="55" y="320" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="340" font-size="10" text-anchor="middle" fill="#1a1a1a">AP (Availability + Partition): Cassandra, DynamoDB, CouchDB</text>
  
  <rect x="55" y="355" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="375" font-size="10" text-anchor="middle" fill="#1a1a1a">CA (single-node): MySQL, PostgreSQL, SQLite</text>
  
  <rect x="55" y="390" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="410" font-size="10" text-anchor="middle" fill="#1a1a1a">Distributed SQL (CP): CockroachDB, YugabyteDB, Spanner</text>
  
  <!-- Polyglot Persistence -->
  <rect x="420" y="240" width="340" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="270" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Polyglot Persistence Architecture</text>
  
  <rect x="435" y="285" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="305" font-size="10" text-anchor="middle" fill="#1a1a1a">User Profiles: PostgreSQL (structured, transactions)</text>
  
  <rect x="435" y="320" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="340" font-size="10" text-anchor="middle" fill="#1a1a1a">Sessions: Redis (sub-ms latency, ephemeral)</text>
  
  <rect x="435" y="355" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="375" font-size="10" text-anchor="middle" fill="#1a1a1a">Product Catalog: MongoDB (flexible schema, docs)</text>
  
  <rect x="435" y="390" width="310" height="30" rx="4" fill="#ffe0b2"/>
  <text x="590" y="410" font-size="10" text-anchor="middle" fill="#1a1a1a">Social Graph: Neo4j (relationship traversal)</text>
  
  <!-- Decision Matrix -->
  <rect x="40" y="450" width="720" height="130" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="480" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Database Selection Decision Matrix</text>
  
  <rect x="55" y="495" width="220" height="70" rx="6" fill="#e1bee7"/>
  <text x="165" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Strong Consistency + ACID</text>
  <text x="165" y="535" font-size="9" text-anchor="middle" fill="#666666">→ PostgreSQL, MySQL, CockroachDB</text>
  <text x="165" y="550" font-size="9" text-anchor="middle" fill="#666666">Best for: Financial, booking, inventory</text>
  <text x="165" y="565" font-size="9" text-anchor="middle" fill="#666666">Complex queries, transactions</text>
  
  <rect x="295" y="495" width="220" height="70" rx="6" fill="#e1bee7"/>
  <text x="405" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">High Throughput + Scale</text>
  <text x="405" y="535" font-size="9" text-anchor="middle" fill="#666666">→ Cassandra, DynamoDB, ScyllaDB</text>
  <text x="405" y="550" font-size="9" text-anchor="middle" fill="#666666">Best for: Time-series, analytics, logs</text>
  <text x="405" y="565" font-size="9" text-anchor="middle" fill="#666666">Linear horizontal scaling</text>
  
  <rect x="535" y="495" width="210" height="70" rx="6" fill="#e1bee7"/>
  <text x="640" y="515" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Low Latency + Cache</text>
  <text x="640" y="535" font-size="9" text-anchor="middle" fill="#666666">→ Redis, Memcached, Dragonfly</text>
  <text x="640" y="550" font-size="9" text-anchor="middle" fill="#666666">Best for: Sessions, leaderboards</text>
  <text x="640" y="565" font-size="9" text-anchor="middle" fill="#666666">Sub-millisecond response</text>
</svg>
