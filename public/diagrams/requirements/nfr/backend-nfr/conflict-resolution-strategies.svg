<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="conflictArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Conflict Resolution Strategies</text>
  
  <!-- Conflict scenario -->
  <rect x="50" y="60" width="450" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Write Conflict Scenario</text>
  
  <!-- Two clients writing to different nodes -->
  <rect x="80" y="110" width="90" height="45" rx="4" fill="var(--bg-blue, #3b82f6)"/>
  <text x="125" y="135" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff)">Client A</text>
  
  <rect x="380" y="110" width="90" height="45" rx="4" fill="var(--bg-purple, #8b5cf6)"/>
  <text x="425" y="135" text-anchor="middle" font-size="10" fill="var(--text-inverse, #ffffff)">Client B</text>
  
  <!-- Nodes -->
  <rect x="100" y="180" width="80" height="50" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="140" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff)">Node 1</text>
  <text x="140" y="222" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">v1: x=5</text>
  
  <rect x="320" y="180" width="80" height="50" rx="4" fill="var(--bg-green, #22c55e)"/>
  <text x="360" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff)">Node 2</text>
  <text x="360" y="222" text-anchor="middle" font-size="8" fill="var(--text-inverse, #ffffff)">v2: x=10</text>
  
  <!-- Arrows -->
  <line x1="125" y1="155" x2="140" y2="175" stroke="var(--border-blue, #3b82f6)" stroke-width="2" marker-end="url(#conflictArrow)"/>
  <text x="115" y="170" text-anchor="middle" font-size="8" fill="var(--border-blue, #3b82f6)">Write x=5</text>
  
  <line x1="425" y1="155" x2="360" y2="175" stroke="var(--border-purple, #8b5cf6)" stroke-width="2" marker-end="url(#conflictArrow)"/>
  <text x="405" y="170" text-anchor="middle" font-size="8" fill="var(--border-purple, #8b5cf6)">Write x=10</text>
  
  <!-- Async replication causing conflict -->
  <path d="M 180 205 Q 250 180 320 205" fill="none" stroke="var(--border-orange, #f97316)" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#conflictArrow)"/>
  <text x="275" y="185" text-anchor="middle" font-size="8" fill="var(--border-orange, #f97316)">Async Replication</text>
  
  <text x="275" y="250" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold">CONFLICT: Different values on different nodes!</text>
  
  <!-- Resolution strategies -->
  <rect x="520" y="60" width="430" height="200" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Resolution Strategies</text>
  
  <!-- Last Write Wins -->
  <rect x="540" y="110" width="190" height="65" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Last Write Wins (LWW)</text>
  <text x="635" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Use timestamp to decide</text>
  <text x="635" y="170" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Simple, widely used</text>
  
  <!-- Vector Clocks -->
  <rect x="750" y="110" width="180" height="65" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Vector Clocks</text>
  <text x="840" y="155" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Track causality</text>
  <text x="840" y="170" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Detects conflicts</text>
  
  <!-- CRDTs -->
  <rect x="540" y="185" width="190" height="65" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="635" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">CRDTs</text>
  <text x="635" y="230" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Mathematical merge functions</text>
  <text x="635" y="245" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Automatic conflict-free merge</text>
  
  <!-- Application-level -->
  <rect x="750" y="185" width="180" height="65" rx="4" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="840" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Application-Level</text>
  <text x="840" y="230" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">Custom merge logic</text>
  <text x="840" y="245" text-anchor="middle" font-size="9" fill="var(--text-secondary, #475569)">✓ Domain-specific resolution</text>
  
  <!-- Consistency vs Latency trade-off -->
  <rect x="50" y="275" width="900" height="130" rx="8" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Consistency vs Latency Trade-off</text>
  
  <!-- Graph -->
  <rect x="70" y="320" width="400" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  
  <line x1="100" y1="375" x2="440" y2="375" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <line x1="100" y1="330" x2="100" y2="375" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  
  <!-- Curve showing inverse relationship -->
  <path d="M 100 335 Q 200 340 300 360 Q 400 370 440 373" fill="none" stroke="var(--border-red, #ef4444)" stroke-width="3"/>
  
  <text x="270" y="395" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Consistency →</text>
  <text x="70" y="355" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)" transform="rotate(-90, 70, 355)">Latency →</text>
  
  <text x="120" y="350" text-anchor="middle" font-size="9" fill="var(--border-green, #22c55e)" font-weight="bold">Weak</text>
  <text x="420" y="365" text-anchor="middle" font-size="9" fill="var(--border-red, #ef4444)" font-weight="bold">Strong</text>
  
  <!-- Key insight -->
  <rect x="500" y="320" width="430" height="70" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="715" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-primary, #0f172a)">Key Insight</text>
  <text x="715" y="365" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">Stronger consistency = Higher latency</text>
  <text x="715" y="382" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">(more coordination required)</text>
  
  <!-- Use case recommendations -->
  <rect x="50" y="420" width="900" height="120" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="445" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">Choosing Consistency Model by Use Case</text>
  
  <text x="150" y="470" font-size="10" fill="var(--text-secondary, #475569)">Strong: Banking, payments</text>
  <text x="150" y="488" font-size="10" fill="var(--text-secondary, #475569)">Causal: Collaborative editing</text>
  <text x="150" y="506" font-size="10" fill="var(--text-secondary, #475569)">Eventual: Social feeds, likes</text>
  
  <text x="450" y="470" font-size="10" fill="var(--text-secondary, #475569)">Strong: Inventory management</text>
  <text x="450" y="488" font-size="10" fill="var(--text-secondary, #475569)">Causal: Comments, replies</text>
  <text x="450" y="506" font-size="10" fill="var(--text-secondary, #475569)">Eventual: Analytics, counters</text>
  
  <text x="750" y="470" font-size="10" fill="var(--text-secondary, #475569)">Strong: Authentication</text>
  <text x="750" y="488" font-size="10" fill="var(--text-secondary, #475569)">Causal: Activity streams</text>
  <text x="750" y="506" font-size="10" fill="var(--text-secondary, #475569)">Eventual: Recommendations</text>
</svg>
