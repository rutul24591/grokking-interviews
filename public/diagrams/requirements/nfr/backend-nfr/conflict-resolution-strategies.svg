<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Conflict Resolution Strategies</text>
  
  <!-- Write Conflict -->
  <rect x="40" y="70" width="340" height="160" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Write Conflict Scenario</text>
  
  <rect x="55" y="115" width="140" height="80" rx="6" fill="#e3f2fd"/>
  <text x="125" y="140" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Client A (US)</text>
  <text x="125" y="160" font-size="9" text-anchor="middle" fill="#666666">Write X = 10</text>
  <text x="125" y="178" font-size="9" text-anchor="middle" fill="#666666">t = 100</text>
  <text x="125" y="195" font-size="9" text-anchor="middle" fill="#666666">→ Replica 1</text>
  
  <rect x="235" y="115" width="140" height="80" rx="6" fill="#c8e6c9"/>
  <text x="305" y="140" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Client B (EU)</text>
  <text x="305" y="160" font-size="9" text-anchor="middle" fill="#666666">Write X = 20</text>
  <text x="305" y="178" font-size="9" text-anchor="middle" fill="#666666">t = 101</text>
  <text x="305" y="195" font-size="9" text-anchor="middle" fill="#666666">→ Replica 2</text>
  
  <text x="210" y="220" font-size="10" text-anchor="middle" fill="#d84315">Conflict: X = 10 vs X = 20 — which wins?</text>
  
  <!-- Resolution Strategies -->
  <rect x="420" y="70" width="340" height="160" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Resolution Strategies</text>
  
  <rect x="435" y="115" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="590" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Last-Write-Wins (LWW): Compare timestamps</text>
  
  <rect x="435" y="148" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="590" y="168" font-size="10" text-anchor="middle" fill="#1a1a1a">Vector Clocks: Track causal ordering</text>
  
  <rect x="435" y="181" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="590" y="201" font-size="10" text-anchor="middle" fill="#1a1a1a">CRDTs: Mathematically convergent types</text>
  
  <rect x="435" y="214" width="310" height="28" rx="4" fill="#bbdefb"/>
  <text x="590" y="234" font-size="10" text-anchor="middle" fill="#1a1a1a">Application-Level: Custom merge logic</text>
  
  <!-- Strategy Comparison -->
  <rect x="40" y="260" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="210" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Strategy Comparison</text>
  
  <rect x="55" y="305" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="325" font-size="10" text-anchor="middle" fill="#1a1a1a">LWW: Simple, but loses concurrent writes</text>
  
  <rect x="55" y="340" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="360" font-size="10" text-anchor="middle" fill="#1a1a1a">Vector Clocks: Preserves causality, complex</text>
  
  <rect x="55" y="375" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="395" font-size="10" text-anchor="middle" fill="#1a1a1a">CRDTs: Automatic convergence, limited types</text>
  
  <rect x="55" y="410" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="210" y="430" font-size="10" text-anchor="middle" fill="#1a1a1a">App-Level: Most flexible, most complex</text>
  
  <!-- Conflict Resolution Flow -->
  <rect x="420" y="260" width="340" height="180" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="590" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Resolution Flow</text>
  
  <rect x="435" y="305" width="310" height="28" rx="4" fill="#ffe0b2"/>
  <text x="590" y="325" font-size="10" text-anchor="middle" fill="#1a1a1a">1. Detect conflict (divergent replicas)</text>
  
  <rect x="435" y="338" width="310" height="28" rx="4" fill="#ffe0b2"/>
  <text x="590" y="358" font-size="10" text-anchor="middle" fill="#1a1a1a">2. Apply resolution strategy</text>
  
  <rect x="435" y="371" width="310" height="28" rx="4" fill="#ffe0b2"/>
  <text x="590" y="391" font-size="10" text-anchor="middle" fill="#1a1a1a">3. Converge replicas to same state</text>
  
  <rect x="435" y="404" width="310" height="28" rx="4" fill="#ffe0b2"/>
  <text x="590" y="424" font-size="10" text-anchor="middle" fill="#1a1a1a">4. Notify application if data loss occurred</text>
  
  <!-- Real-World Examples -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="500" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Real-World Examples</text>
  
  <rect x="55" y="515" width="210" height="50" rx="6" fill="#e3f2fd"/>
  <text x="160" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Amazon Shopping Cart</text>
  <text x="160" y="555" font-size="9" text-anchor="middle" fill="#666666">CRDT (union of cart items)</text>
  
  <rect x="295" y="515" width="210" height="50" rx="6" fill="#c8e6c9"/>
  <text x="400" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Google Docs Editing</text>
  <text x="400" y="555" font-size="9" text-anchor="middle" fill="#666666">Operational Transformation (OT)</text>
  
  <rect x="535" y="515" width="210" height="50" rx="6" fill="#fff3e0"/>
  <text x="640" y="535" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Social Media Likes</text>
  <text x="640" y="555" font-size="9" text-anchor="middle" fill="#666666">LWW with client-side reconciliation</text>
</svg>
