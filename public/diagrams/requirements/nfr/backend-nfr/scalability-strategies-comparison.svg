<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Scalability Strategies Overview</text>
  
  <!-- Scaling Approaches -->
  <rect x="40" y="60" width="340" height="200" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Horizontal vs Vertical Scaling</text>
  <text x="210" y="115" font-size="11" fill="#666666">Vertical: Scale up (bigger server)</text>
  <text x="210" y="135" font-size="11" fill="#666666">Horizontal: Scale out (more servers)</text>
  <text x="210" y="155" font-size="11" fill="#666666">Vertical → Simple, limited ceiling</text>
  <text x="210" y="175" font-size="11" fill="#666666">Horizontal → Complex, near-linear scale</text>
  <text x="210" y="195" font-size="11" fill="#666666">Transition: 100K users → start horizontal</text>
  <text x="210" y="215" font-size="11" fill="#666666">Stateless → easy horizontal, Stateful → hard</text>
  
  <!-- Database Patterns -->
  <rect x="420" y="60" width="340" height="200" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Database Scaling</text>
  <text x="590" y="115" font-size="11" fill="#666666">Read Replicas: 1 primary + N replicas</text>
  <text x="590" y="135" font-size="11" fill="#666666">Sharding: Split data across databases</text>
  <text x="590" y="155" font-size="11" fill="#666666">Shard Keys: User ID, Hash, Range</text>
  <text x="590" y="175" font-size="11" fill="#666666">Replication Lag: Seconds behind primary</text>
  <text x="590" y="195" font-size="11" fill="#666666">Cross-Shard Joins: Expensive, avoid</text>
  <text x="590" y="215" font-size="11" fill="#666666">Consistent Hashing: Minimal rebalancing</text>
  
  <!-- Load Balancing -->
  <rect x="40" y="280" width="340" height="200" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="210" y="310" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Load Balancing</text>
  <text x="210" y="335" font-size="11" fill="#666666">Layer 4: IP/port, fast, no inspection</text>
  <text x="210" y="355" font-size="11" fill="#666666">Layer 7: HTTP headers, content routing</text>
  <text x="210" y="375" font-size="11" fill="#666666">Algorithms: Round Robin, Least Conn</text>
  <text x="210" y="395" font-size="11" fill="#666666">Health Checks: Active (probes), Passive</text>
  <text x="210" y="415" font-size="11" fill="#666666">Session Affinity: Cookie-based, IP-based</text>
  <text x="210" y="435" font-size="11" fill="#666666">Prefer: Stateless, avoid sticky sessions</text>
  
  <!-- Auto-Scaling -->
  <rect x="420" y="280" width="340" height="200" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="590" y="310" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Auto-Scaling</text>
  <text x="590" y="335" font-size="11" fill="#666666">Triggers: CPU, Memory, QPS, Custom</text>
  <text x="590" y="355" font-size="11" fill="#666666">Policies: Reactive, Predictive, Scheduled</text>
  <text x="590" y="375" font-size="11" fill="#666666">Cooldown: 3-5 min prevent thrashing</text>
  <text x="590" y="395" font-size="11" fill="#666666">Hysteresis: Scale up 70%, down 40%</text>
  <text x="590" y="415" font-size="11" fill="#666666">Graceful Drain: Deregister, wait, terminate</text>
  <text x="590" y="435" font-size="11" fill="#666666">Buffer: 30-50% above expected peak</text>
  
  <!-- Key Metrics (bottom) -->
  <rect x="40" y="500" width="720" height="80" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="530" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Key Scalability Metrics</text>
  <text x="400" y="555" font-size="11" text-anchor="middle" fill="#666666">Throughput (RPS) | Concurrent Users | Data Volume | Latency Under Load (P99 at target RPS)</text>
  <text x="400" y="575" font-size="10" text-anchor="middle" fill="#666666">Rule: Simplest architecture meeting targets with 2-3× safety margin. Don&apos;t build for 100M if you have 10K.</text>
</svg>
