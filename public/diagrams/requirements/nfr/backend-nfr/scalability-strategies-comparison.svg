<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--border-accent, #3b82f6)"/>
    </marker>
    <linearGradient id="verticalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:var(--bg-accent, #3b82f6);stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:var(--bg-accent, #3b82f6);stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="horizontalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:var(--bg-purple, #8b5cf6);stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:var(--bg-purple, #8b5cf6);stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="var(--bg-primary, #ffffff)"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a)">Horizontal vs Vertical Scaling</text>
  
  <!-- Vertical Scaling Section -->
  <rect x="50" y="60" width="420" height="250" rx="8" fill="url(#verticalGrad)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="260" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Vertical Scaling (Scale Up)</text>
  
  <!-- Server stack visualization -->
  <rect x="100" y="120" width="120" height="40" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="160" y="145" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">CPU: 4 cores</text>
  
  <rect x="100" y="165" width="120" height="40" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="160" y="190" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">RAM: 16GB</text>
  
  <rect x="100" y="210" width="120" height="40" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="160" y="235" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">Storage: 500GB</text>
  
  <!-- Arrow pointing up -->
  <line x1="160" y1="115" x2="160" y2="80" stroke="var(--border-accent, #3b82f6)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="160" y="75" text-anchor="middle" font-size="10" fill="var(--border-accent, #3b82f6)" font-weight="bold">UPGRADE</text>
  
  <!-- Upgraded server -->
  <rect x="280" y="120" width="140" height="40" rx="4" fill="var(--bg-accent, #3b82f6)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="350" y="145" text-anchor="middle" font-size="11" fill="var(--text-inverse, #ffffff)">CPU: 16 cores</text>
  
  <rect x="280" y="165" width="140" height="40" rx="4" fill="var(--bg-accent, #3b82f6)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="350" y="190" text-anchor="middle" font-size="11" fill="var(--text-inverse, #ffffff)">RAM: 64GB</text>
  
  <rect x="280" y="210" width="140" height="40" rx="4" fill="var(--bg-accent, #3b82f6)" stroke="var(--border-accent, #3b82f6)" stroke-width="2"/>
  <text x="350" y="235" text-anchor="middle" font-size="11" fill="var(--text-inverse, #ffffff)">Storage: 2TB</text>
  
  <!-- Vertical scaling characteristics -->
  <rect x="50" y="320" width="420" height="120" rx="6" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="70" y="345" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Characteristics:</text>
  <text x="70" y="365" font-size="11" fill="var(--text-secondary, #475569)">• Single point of failure</text>
  <text x="70" y="385" font-size="11" fill="var(--text-secondary, #475569)">• Limited by hardware ceiling</text>
  <text x="70" y="405" font-size="11" fill="var(--text-secondary, #475569)">• Simple to implement</text>
  <text x="260" y="365" font-size="11" fill="var(--text-secondary, #475569)">• Downtime required for upgrades</text>
  <text x="260" y="385" font-size="11" fill="var(--text-secondary, #475569)">• Cost increases exponentially</text>
  <text x="260" y="405" font-size="11" fill="var(--text-secondary, #475569)">• Good for stateful workloads</text>
  
  <!-- Horizontal Scaling Section -->
  <rect x="530" y="60" width="420" height="250" rx="8" fill="url(#horizontalGrad)" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="740" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a)">Horizontal Scaling (Scale Out)</text>
  
  <!-- Load balancer -->
  <rect x="680" y="110" width="120" height="50" rx="6" fill="var(--bg-purple, #8b5cf6)" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="740" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-inverse, #ffffff)">Load Balancer</text>
  <text x="740" y="150" text-anchor="middle" font-size="9" fill="var(--text-inverse, #ffffff)">Traffic Distributor</text>
  
  <!-- Server nodes -->
  <rect x="560" y="200" width="100" height="60" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="610" y="225" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">Server 1</text>
  <text x="610" y="245" text-anchor="middle" font-size="9" fill="var(--text-muted, #94a3b8)">4 cores, 16GB</text>
  
  <rect x="690" y="200" width="100" height="60" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="740" y="225" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">Server 2</text>
  <text x="740" y="245" text-anchor="middle" font-size="9" fill="var(--text-muted, #94a3b8)">4 cores, 16GB</text>
  
  <rect x="820" y="200" width="100" height="60" rx="4" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-purple, #8b5cf6)" stroke-width="2"/>
  <text x="870" y="225" text-anchor="middle" font-size="11" fill="var(--text-secondary, #475569)">Server 3</text>
  <text x="870" y="245" text-anchor="middle" font-size="9" fill="var(--text-muted, #94a3b8)">4 cores, 16GB</text>
  
  <!-- Arrows from LB to servers -->
  <line x1="700" y1="160" x2="610" y2="195" stroke="var(--border-purple, #8b5cf6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="740" y1="160" x2="740" y2="195" stroke="var(--border-purple, #8b5cf6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="780" y1="160" x2="870" y2="195" stroke="var(--border-purple, #8b5cf6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Add more servers arrow -->
  <line x1="950" y1="230" x2="970" y2="230" stroke="var(--border-purple, #8b5cf6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="960" y="220" text-anchor="middle" font-size="10" fill="var(--border-purple, #8b5cf6)" font-weight="bold">ADD MORE</text>
  
  <!-- Horizontal scaling characteristics -->
  <rect x="530" y="320" width="420" height="120" rx="6" fill="var(--bg-secondary, #f8fafc)" stroke="var(--border-primary, #e2e8f0)" stroke-width="1"/>
  <text x="550" y="345" font-size="12" font-weight="bold" fill="var(--text-primary, #0f172a)">Characteristics:</text>
  <text x="550" y="365" font-size="11" fill="var(--text-secondary, #475569)">• High availability</text>
  <text x="550" y="385" font-size="11" fill="var(--text-secondary, #475569)">• Near-linear scalability</text>
  <text x="550" y="405" font-size="11" fill="var(--text-secondary, #475569)">• No downtime for scaling</text>
  <text x="740" y="365" font-size="11" fill="var(--text-secondary, #475569)">• Requires load balancing</text>
  <text x="740" y="385" font-size="11" fill="var(--text-secondary, #475569)">• State management complexity</text>
  <text x="740" y="405" font-size="11" fill="var(--text-secondary, #475569)">• Cost increases linearly</text>
  
  <!-- Decision Matrix -->
  <rect x="50" y="460" width="900" height="130" rx="8" fill="var(--bg-panel, #f1f5f9)" stroke="var(--border-primary, #e2e8f0)" stroke-width="2"/>
  <text x="500" y="485" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a)">When to Use Each Approach</text>
  
  <!-- Vertical column -->
  <text x="200" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-accent, #3b82f6)">Choose Vertical Scaling When:</text>
  <text x="200" y="530" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">• Database with complex joins</text>
  <text x="200" y="548" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">• Stateful applications</text>
  <text x="200" y="566" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">• Low to moderate traffic</text>
  <text x="200" y="584" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">• Quick initial deployment needed</text>
  
  <!-- Horizontal column -->
  <text x="800" y="510" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--border-purple, #8b5cf6)">Choose Horizontal Scaling When:</text>
  <text x="800" y="530" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">• Stateless web services</text>
  <text x="800" y="548" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">• High availability required</text>
  <text x="800" y="566" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">• Unpredictable traffic patterns</text>
  <text x="800" y="584" text-anchor="middle" font-size="10" fill="var(--text-secondary, #475569)">• Long-term growth expected</text>
</svg>
