<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="apiVerArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">API Versioning in Practice</text>
  
  <!-- URL Versioning Example -->
  <rect x="50" y="60" width="450" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">URL Path Versioning</text>
  
  <!-- v1 endpoint -->
  <rect x="70" y="110" width="160" height="50" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="135" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a">/api/v1/users</text>
  <text x="150" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Legacy clients</text>
  
  <!-- v2 endpoint -->
  <rect x="250" y="110" width="160" height="50" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="330" y="135" text-anchor="middle" font-size="9" fill="var(--text-primary, #0f172a">/api/v2/users</text>
  <text x="330" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">New clients</text>
  
  <!-- Router -->
  <line x1="150" y1="160" x2="150" y2="190" stroke="#3b82f6" stroke-width="2"/>
  <line x1="330" y1="160" x2="330" y2="190" stroke="#3b82f6" stroke-width="2"/>
  
  <rect x="200" y="190" width="140" height="50" rx="4" fill="#8b5cf6"/>
  <text x="270" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-inverse, #ffffff">API Router</text>
  <text x="270" y="232" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Route by version</text>
  
  <text x="275" y="265" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Clear, cacheable, easy to test</text>
  
  <!-- Header Versioning Example -->
  <rect x="520" y="60" width="430" height="180" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Header Versioning</text>
  
  <!-- Request -->
  <rect x="540" y="110" width="150" height="80" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="615" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Request</text>
  <text x="615" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">GET /users</text>
  <text x="615" y="172" text-anchor="middle" font-size="7" fill="var(--border-blue, #3b82f6">X-API-Version: 2</text>
  <text x="615" y="187" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">Accept: application/json</text>
  
  <line x1="690" y1="150" x2="720" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#apiVerArrow)"/>
  
  <!-- Handler -->
  <rect x="720" y="110" width="100" height="80" rx="4" fill="#8b5cf6"/>
  <text x="770" y="140" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Version</text>
  <text x="770" y="157" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Handler</text>
  <text x="770" y="177" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Check header</text>
  
  <line x1="820" y1="150" x2="850" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#apiVerArrow)"/>
  
  <!-- Response -->
  <rect x="850" y="110" width="80" height="80" rx="4" fill="#22c55e"/>
  <text x="890" y="145" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">v2</text>
  <text x="890" y="162" text-anchor="middle" font-size="8" font-weight="bold" fill="var(--text-inverse, #ffffff">Handler</text>
  <text x="890" y="182" text-anchor="middle" font-size="7" fill="var(--text-inverse, #ffffff">Process</text>
  
  <text x="735" y="225" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">✓ Clean URLs, REST-compliant</text>
  <text x="735" y="242" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Less visible, harder to test</text>
  
  <!-- Breaking vs Non-Breaking -->
  <rect x="50" y="260" width="450" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">Breaking vs Non-Breaking Changes</text>
  
  <rect x="70" y="305" width="170" height="60" rx="3" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="155" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-green, #22c55e">Non-Breaking</text>
  <text x="155" y="350" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Add optional field</text>
  <text x="155" y="365" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Add new endpoint</text>
  
  <rect x="260" y="305" width="170" height="60" rx="3" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="345" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--border-red, #ef4444">Breaking</text>
  <text x="345" y="350" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Remove field</text>
  <text x="345" y="365" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">• Change field type</text>
  
  <text x="275" y="395" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Breaking changes require new major version (v1 → v2)</text>
  
  <!-- Deprecation Timeline -->
  <rect x="520" y="260" width="430" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Deprecation Timeline</text>
  
  <line x1="550" y1="320" x2="920" y2="320" stroke="#3b82f6" stroke-width="2" marker-end="url(#apiVerArrow)"/>
  
  <circle cx="550" cy="320" r="5" fill="#22c55e"/>
  <text x="550" y="345" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">v2 Launch</text>
  
  <circle cx="650" cy="320" r="5" fill="#f97316"/>
  <text x="650" y="345" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Deprecation Notice</text>
  <text x="650" y="360" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">(T+3 months)</text>
  
  <circle cx="800" cy="320" r="5" fill="#ef4444"/>
  <text x="800" y="345" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">v1 Sunset</text>
  <text x="800" y="360" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">(T+12 months)</text>
  
  <text x="735" y="395" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Minimum 6-12 months deprecation period</text>
  <text x="735" y="415" text-anchor="middle" font-size="9" fill="var(--text-secondary, #47556ird">Communicate early and often</text>
  
  <text x="500" y="470" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Version APIs from day one. Use URL versioning for clarity. Deprecate gracefully.</text>
</svg>
