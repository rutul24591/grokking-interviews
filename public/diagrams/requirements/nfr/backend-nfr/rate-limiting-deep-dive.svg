<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <marker id="rateLimitArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-primary, #0f172a">Rate Limiting &amp; Abuse Protection</text>
  
  <!-- Rate Limiting Algorithms -->
  <rect x="50" y="60" width="450" height="250" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="275" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Rate Limiting Algorithms</text>
  
  <!-- Token Bucket -->
  <rect x="70" y="110" width="180" height="80" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">Token Bucket</text>
  <text x="160" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Tokens added at fixed rate</text>
  <text x="160" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Request consumes token</text>
  <text x="160" y="187" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">✓ Allows bursts</text>
  
  <!-- Leaky Bucket -->
  <rect x="270" y="110" width="180" height="80" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="360" y="135" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">Leaky Bucket</text>
  <text x="360" y="155" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Fixed output rate</text>
  <text x="360" y="172" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Queue excess requests</text>
  <text x="360" y="187" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">✓ Smooths traffic</text>
  
  <!-- Sliding Window -->
  <rect x="70" y="210" width="180" height="80" rx="4" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="2"/>
  <text x="160" y="235" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">Sliding Window Log</text>
  <text x="160" y="255" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Track timestamp of each request</text>
  <text x="160" y="272" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Count requests in window</text>
  <text x="160" y="287" text-anchor="middle" font-size="7" fill="#f59e0b">⚠ Memory intensive</text>
  
  <!-- Sliding Window Counter -->
  <rect x="270" y="210" width="180" height="80" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="360" y="235" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Sliding Window Counter</text>
  <text x="360" y="255" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Weighted average of windows</text>
  <text x="360" y="272" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Approximation of sliding window</text>
  <text x="360" y="287" text-anchor="middle" font-size="7" fill="var(--text-secondary, #47556ird">✓ Memory efficient</text>
  
  <!-- Abuse Protection -->
  <rect x="520" y="60" width="430" height="140" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-primary, #0f172a">Abuse Protection Patterns</text>
  
  <rect x="540" y="110" width="190" height="35" rx="3" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="635" y="132" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-blue, #3b82f6">IP-Based Rate Limiting</text>
  <text x="635" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Limit per IP address</text>
  
  <rect x="540" y="155" width="190" height="35" rx="3" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="635" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-purple, #8b5cf6">User-Based Rate Limiting</text>
  <text x="635" y="195" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Limit per authenticated user</text>
  
  <rect x="750" y="110" width="180" height="35" rx="3" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="840" y="132" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-orange, #f97316">CAPTCHA Challenge</text>
  <text x="840" y="150" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">On suspicious activity</text>
  
  <rect x="750" y="155" width="180" height="35" rx="3" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="840" y="177" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--border-green, #22c55e">Progressive Delays</text>
  <text x="840" y="195" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Increase delay per attempt</text>
  
  <!-- DDoS Mitigation -->
  <rect x="520" y="220" width="430" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="735" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-primary, #0f172a">DDoS Mitigation Layers</text>
  
  <rect x="540" y="265" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Layer 3/4 (Network)</text>
  <text x="635" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">SYN floods, UDP amplification</text>
  
  <rect x="540" y="315" width="190" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Layer 7 (Application)</text>
  <text x="635" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">HTTP floods, slowloris</text>
  
  <rect x="750" y="265" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">CDN/WAF Protection</text>
  <text x="840" y="302" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Cloudflare, AWS Shield</text>
  
  <rect x="750" y="315" width="180" height="40" rx="3" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="840" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-primary, #0f172a">Anycast Routing</text>
  <text x="840" y="352" text-anchor="middle" font-size="8" fill="var(--text-secondary, #47556ird">Distribute attack traffic</text>
  
  <text x="500" y="390" text-anchor="middle" font-size="9" fill="var(--text-muted, #64748b">Key: Use token bucket for API rate limiting. Implement multiple DDoS protection layers.</text>
</svg>
