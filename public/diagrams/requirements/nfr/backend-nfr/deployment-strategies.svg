<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Deployment Strategies Comparison</text>
  
  <!-- Rolling Deployment -->
  <rect x="40" y="70" width="220" height="200" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="150" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Rolling Deployment</text>
  
  <rect x="55" y="115" width="190" height="30" rx="4" fill="#bbdefb"/>
  <text x="150" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Replace instances one-by-one</text>
  
  <rect x="55" y="150" width="190" height="30" rx="4" fill="#bbdefb"/>
  <text x="150" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">Zero downtime during rollout</text>
  
  <rect x="55" y="185" width="190" height="30" rx="4" fill="#bbdefb"/>
  <text x="150" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">Mixed versions during rollout</text>
  
  <rect x="55" y="220" width="190" height="30" rx="4" fill="#bbdefb"/>
  <text x="150" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">Rollback: reverse the rollout</text>
  
  <rect x="55" y="255" width="190" height="30" rx="4" fill="#ffcdd2"/>
  <text x="150" y="275" font-size="10" text-anchor="middle" fill="#d84315">Slow: 5-15 minutes total</text>
  
  <!-- Blue-Green Deployment -->
  <rect x="290" y="70" width="220" height="200" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Blue-Green Deployment</text>
  
  <rect x="305" y="115" width="190" height="30" rx="4" fill="#a5d6a7"/>
  <text x="400" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Two identical environments</text>
  
  <rect x="305" y="150" width="190" height="30" rx="4" fill="#a5d6a7"/>
  <text x="400" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">Deploy to green, test, switch</text>
  
  <rect x="305" y="185" width="190" height="30" rx="4" fill="#a5d6a7"/>
  <text x="400" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">Instant traffic switch</text>
  
  <rect x="305" y="220" width="190" height="30" rx="4" fill="#a5d6a7"/>
  <text x="400" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">Instant rollback to blue</text>
  
  <rect x="305" y="255" width="190" height="30" rx="4" fill="#ffcdd2"/>
  <text x="400" y="275" font-size="10" text-anchor="middle" fill="#d84315">2× infrastructure cost</text>
  
  <!-- Canary Deployment -->
  <rect x="540" y="70" width="220" height="200" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="650" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Canary Deployment</text>
  
  <rect x="555" y="115" width="190" height="30" rx="4" fill="#ffe0b2"/>
  <text x="650" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">Route 1-5% traffic to new version</text>
  
  <rect x="555" y="150" width="190" height="30" rx="4" fill="#ffe0b2"/>
  <text x="650" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">Monitor error rate and latency</text>
  
  <rect x="555" y="185" width="190" height="30" rx="4" fill="#ffe0b2"/>
  <text x="650" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">Gradually increase traffic</text>
  
  <rect x="555" y="220" width="190" height="30" rx="4" fill="#ffe0b2"/>
  <text x="650" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">Auto rollback on degradation</text>
  
  <rect x="555" y="255" width="190" height="30" rx="4" fill="#ffcdd2"/>
  <text x="650" y="275" font-size="10" text-anchor="middle" fill="#d84315">Complex traffic routing</text>
  
  <!-- Feature Flags -->
  <rect x="40" y="300" width="720" height="140" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="330" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Feature Flags — Deploy Without Enabling</text>
  
  <rect x="55" y="345" width="340" height="80" rx="6" fill="#e1bee7"/>
  <text x="225" y="365" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">How It Works</text>
  <text x="225" y="385" font-size="9" text-anchor="middle" fill="#666666">Code deployed behind flag (disabled by default)</text>
  <text x="225" y="403" font-size="9" text-anchor="middle" fill="#666666">Toggle flag to enable/disable without redeployment</text>
  <text x="225" y="421" font-size="9" text-anchor="middle" fill="#666666">Gradual rollout: internal → beta → 10% → 100%</text>
  
  <rect x="415" y="345" width="330" height="80" rx="6" fill="#e1bee7"/>
  <text x="580" y="365" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Trade-offs</text>
  <text x="580" y="385" font-size="9" text-anchor="middle" fill="#666666">+ Instant enable/disable, A/B testing</text>
  <text x="580" y="403" font-size="9" text-anchor="middle" fill="#666666">+ Zero deployment risk for feature activation</text>
  <text x="580" y="421" font-size="9" text-anchor="middle" fill="#d84315">- Code complexity (if-else flag conditionals)</text>
  <text x="580" y="439" font-size="9" text-anchor="middle" fill="#d84315">- Flag management overhead, abandoned flags</text>
  
  <!-- Comparison Matrix -->
  <rect x="40" y="470" width="720" height="110" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="500" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Strategy Selection Guide</text>
  
  <rect x="55" y="515" width="160" height="50" rx="6" fill="#e3f2fd"/>
  <text x="135" y="535" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Simple services</text>
  <text x="135" y="555" font-size="9" text-anchor="middle" fill="#666666">Rolling deployment</text>
  
  <rect x="245" y="515" width="160" height="50" rx="6" fill="#c8e6c9"/>
  <text x="325" y="535" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Critical services</text>
  <text x="325" y="555" font-size="9" text-anchor="middle" fill="#666666">Blue-green deployment</text>
  
  <rect x="435" y="515" width="160" height="50" rx="6" fill="#fff3e0"/>
  <text x="515" y="535" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Risk-averse rollout</text>
  <text x="515" y="555" font-size="9" text-anchor="middle" fill="#666666">Canary deployment</text>
  
  <rect x="625" y="515" width="120" height="50" rx="6" fill="#e1bee7"/>
  <text x="685" y="535" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">New features</text>
  <text x="685" y="555" font-size="9" text-anchor="middle" fill="#666666">Feature flags</text>
</svg>
