<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">MFA Authentication Flow</text>
  
  <!-- Standard MFA Flow -->
  <rect x="40" y="70" width="340" height="220" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Standard MFA Flow</text>
  
  <rect x="55" y="115" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">1. User enters username + password</text>
  
  <rect x="55" y="150" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">2. Server validates credentials</text>
  
  <rect x="55" y="185" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">3. Server prompts for MFA factor</text>
  
  <rect x="55" y="220" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">4. User provides MFA (FIDO2, TOTP, SMS)</text>
  
  <rect x="55" y="255" width="310" height="30" rx="4" fill="#bbdefb"/>
  <text x="210" y="275" font-size="10" text-anchor="middle" fill="#1a1a1a">5. Server verifies MFA → issues tokens</text>
  
  <!-- Adaptive MFA -->
  <rect x="420" y="70" width="340" height="220" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Adaptive MFA Flow</text>
  
  <rect x="435" y="115" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="135" font-size="10" text-anchor="middle" fill="#1a1a1a">1. User enters username + password</text>
  
  <rect x="435" y="150" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="170" font-size="10" text-anchor="middle" fill="#1a1a1a">2. Risk engine evaluates: location, device, behavior</text>
  
  <rect x="435" y="185" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="205" font-size="10" text-anchor="middle" fill="#1a1a1a">3. Low risk → skip MFA, issue tokens</text>
  
  <rect x="435" y="220" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="240" font-size="10" text-anchor="middle" fill="#1a1a1a">4. High risk → require MFA (stronger factor)</text>
  
  <rect x="435" y="255" width="310" height="30" rx="4" fill="#a5d6a7"/>
  <text x="590" y="275" font-size="10" text-anchor="middle" fill="#1a1a1a">5. Very high risk → deny, require account recovery</text>
  
  <!-- FIDO2/WebAuthn Flow -->
  <rect x="40" y="320" width="720" height="140" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="350" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">FIDO2/WebAuthn Authentication (Passwordless)</text>
  
  <rect x="55" y="365" width="160" height="80" rx="6" fill="#ffe0b2"/>
  <text x="135" y="385" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Registration</text>
  <text x="135" y="405" font-size="9" text-anchor="middle" fill="#666666">User creates passkey</text>
  <text x="135" y="420" font-size="9" text-anchor="middle" fill="#666666">Public key to server</text>
  <text x="135" y="435" font-size="9" text-anchor="middle" fill="#666666">Private key in device</text>
  
  <rect x="235" y="365" width="160" height="80" rx="6" fill="#ffe0b2"/>
  <text x="315" y="385" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Challenge</text>
  <text x="315" y="405" font-size="9" text-anchor="middle" fill="#666666">Server sends challenge</text>
  <text x="315" y="420" font-size="9" text-anchor="middle" fill="#666666">Domain-bound (anti-phish)</text>
  <text x="315" y="435" font-size="9" text-anchor="middle" fill="#666666">No password needed</text>
  
  <rect x="415" y="365" width="160" height="80" rx="6" fill="#ffe0b2"/>
  <text x="495" y="385" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Biometric Verify</text>
  <text x="495" y="405" font-size="9" text-anchor="middle" fill="#666666">Device prompts user</text>
  <text x="495" y="420" font-size="9" text-anchor="middle" fill="#666666">Fingerprint/face/PIN</text>
  <text x="495" y="435" font-size="9" text-anchor="middle" fill="#666666">Private key signs challenge</text>
  
  <rect x="595" y="365" width="150" height="80" rx="6" fill="#ffe0b2"/>
  <text x="670" y="385" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Verification</text>
  <text x="670" y="405" font-size="9" text-anchor="middle" fill="#666666">Server verifies signature</text>
  <text x="670" y="420" font-size="9" text-anchor="middle" fill="#666666">Issues tokens on success</text>
  <text x="670" y="435" font-size="9" text-anchor="middle" fill="#666666">Phishing-resistant</text>
  
  <!-- MFA Fallback -->
  <rect x="40" y="490" width="720" height="90" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="400" y="520" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">MFA Fallback Hierarchy</text>
  
  <rect x="55" y="535" width="160" height="35" rx="4" fill="#e1bee7"/>
  <text x="135" y="558" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Primary: FIDO2 Key</text>
  
  <rect x="235" y="535" width="160" height="35" rx="4" fill="#e1bee7"/>
  <text x="315" y="558" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Secondary: TOTP App</text>
  
  <rect x="415" y="535" width="160" height="35" rx="4" fill="#e1bee7"/>
  <text x="495" y="558" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tertiary: SMS/Voice</text>
  
  <rect x="595" y="535" width="150" height="35" rx="4" fill="#e1bee7"/>
  <text x="670" y="558" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Last Resort: Recovery Codes</text>
</svg>
