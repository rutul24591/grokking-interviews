<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow20" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad20)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">Accessibility CI/CD Pipeline</text>
  
  <!-- Pipeline Flow -->
  <g transform="translate(30, 60)">
    <!-- PR Stage -->
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow20)"/>
    <text x="90" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#4a90d9">1. Pull Request</text>
    
    <text x="20" y="55" font-family="system-ui" font-size="10" fill="#e0e0e0">Trigger: PR opened</text>
    <text x="20" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">• Deploy preview</text>
    <text x="20" y="92" font-family="system-ui" font-size="10" fill="#e0e0e0">• Run axe on 5-10 URLs</text>
    <text x="20" y="110" font-family="system-ui" font-size="10" fill="#67b26f">• Block on critical violations</text>
    
    <!-- Arrow -->
    <line x1="185" y1="60" x2="215" y2="60" stroke="#666" stroke-width="3"/>
    <polygon points="215,60 205,55 205,65" fill="#666"/>
  </g>
  
  <!-- Staging Stage -->
  <g transform="translate(230, 60)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow20)"/>
    <text x="90" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#67b26f">2. Staging</text>
    
    <text x="20" y="55" font-family="system-ui" font-size="10" fill="#e0e0e0">Trigger: PR merged</text>
    <text x="20" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">• Full site crawl</text>
    <text x="20" y="92" font-family="system-ui" font-size="10" fill="#e0e0e0">• All URLs audited</text>
    <text x="20" y="110" font-family="system-ui" font-size="10" fill="#f0ad4e">• Warning threshold</text>
    
    <!-- Arrow -->
    <line x1="185" y1="60" x2="215" y2="60" stroke="#666" stroke-width="3"/>
    <polygon points="215,60 205,55 205,65" fill="#666"/>
  </g>
  
  <!-- Production Stage -->
  <g transform="translate(430, 60)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow20)"/>
    <text x="90" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#f0ad4e">3. Production</text>
    
    <text x="20" y="55" font-family="system-ui" font-size="10" fill="#e0e0e0">Trigger: Deploy complete</text>
    <text x="20" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">• Smoke tests</text>
    <text x="20" y="92" font-family="system-ui" font-size="10" fill="#e0e0e0">• Critical user journeys</text>
    <text x="20" y="110" font-family="system-ui" font-size="10" fill="#d9534f">• Alert on regression</text>
    
    <!-- Arrow -->
    <line x1="185" y1="60" x2="215" y2="60" stroke="#666" stroke-width="3"/>
    <polygon points="215,60 205,55 205,65" fill="#666"/>
  </g>
  
  <!-- Monitoring Stage -->
  <g transform="translate(630, 60)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#2a2a4a" stroke="#6f42c1" stroke-width="2" filter="url(#shadow20)"/>
    <text x="90" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#6f42c1">4. Monitoring</text>
    
    <text x="20" y="55" font-family="system-ui" font-size="10" fill="#e0e0e0">Trigger: Scheduled</text>
    <text x="20" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">• Daily: Critical pages</text>
    <text x="20" y="92" font-family="system-ui" font-size="10" fill="#e0e0e0">• Weekly: Full crawl</text>
    <text x="20" y="110" font-family="system-ui" font-size="10" fill="#67b26f">• Trend tracking</text>
  </g>
  
  <!-- Feedback Loops -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="850" height="100" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2"/>
    <text x="425" y="28" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Feedback Loops &amp; Reporting</text>
    
    <!-- PR Comment -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="190" height="45" rx="4" fill="#4a90d9" opacity="0.3" stroke="#4a90d9"/>
      <text x="95" y="20" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#4a90d9">PR Comment</text>
      <text x="95" y="38" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Detailed violation report</text>
    </g>
    
    <!-- Dashboard -->
    <g transform="translate(230, 45)">
      <rect x="0" y="0" width="190" height="45" rx="4" fill="#67b26f" opacity="0.3" stroke="#67b26f"/>
      <text x="95" y="20" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#67b26f">Trend Dashboard</text>
      <text x="95" y="38" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Violations over time</text>
    </g>
    
    <!-- Alerts -->
    <g transform="translate(440, 45)">
      <rect x="0" y="0" width="190" height="45" rx="4" fill="#d9534f" opacity="0.3" stroke="#d9534f"/>
      <text x="95" y="20" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#d9534f">Slack/Email Alerts</text>
      <text x="95" y="38" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Critical regressions</text>
    </g>
    
    <!-- Ticket Creation -->
    <g transform="translate(650, 45)">
      <rect x="0" y="0" width="190" height="45" rx="4" fill="#f0ad4e" opacity="0.3" stroke="#f0ad4e"/>
      <text x="95" y="20" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">Auto-Ticket Creation</text>
      <text x="95" y="38" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Jira/GitHub Issues</text>
    </g>
  </g>
  
  <!-- Quality Gates -->
  <g transform="translate(30, 320)">
    <rect x="0" y="0" width="410" height="160" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2"/>
    <text x="205" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#d9534f">Quality Gates Configuration</text>
    
    <!-- Critical -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="170" height="40" rx="4" fill="#d9534f" opacity="0.4"/>
      <text x="85" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Critical Violations</text>
      <text x="180" y="25" font-family="system-ui" font-size="14" fill="#d9534f">✗ BLOCK</text>
    </g>
    
    <!-- Serious -->
    <g transform="translate(20, 95)">
      <rect x="0" y="0" width="170" height="40" rx="4" fill="#f0ad4e" opacity="0.4"/>
      <text x="85" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Serious Violations</text>
      <text x="180" y="25" font-family="system-ui" font-size="14" fill="#f0ad4e">⚠ WARN</text>
    </g>
    
    <!-- Score -->
    <g transform="translate(20, 140)">
      <rect x="0" y="0" width="370" height="15" rx="3" fill="#1a1a2e"/>
      <rect x="0" y="0" width="333" height="15" rx="3" fill="#67b26f" opacity="0.7"/>
      <text x="205" y="11" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Lighthouse Accessibility Score Target: &amp;gt;90</text>
    </g>
  </g>
  
  <!-- Remediation Workflow -->
  <g transform="translate(460, 320)">
    <rect x="0" y="0" width="420" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2"/>
    <text x="210" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#67b26f">Remediation Workflow</text>
    
    <text x="20" y="55" font-family="system-ui" font-size="10" fill="#e0e0e0">1. Issue detected → Auto-create ticket</text>
    <text x="20" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">2. Assign to component owner</text>
    <text x="20" y="95" font-family="system-ui" font-size="10" fill="#e0e0e0">3. Developer fixes with guidance</text>
    <text x="20" y="115" font-family="system-ui" font-size="10" fill="#e0e0e0">4. Re-run audit on PR</text>
    <text x="20" y="135" font-family="system-ui" font-size="10" fill="#e0e0e0">5. Close ticket when passing</text>
    
    <text x="250" y="80" font-family="system-ui" font-size="10" fill="#67b26f" font-weight="bold">Average Fix Time:</text>
    <text x="250" y="100" font-family="system-ui" font-size="18" fill="#67b26f" font-weight="bold">&amp;lt;2 days</text>
    <text x="250" y="130" font-family="system-ui" font-size="9" fill="#e0e0e0">With automation vs 2 weeks manual</text>
  </g>
</svg>
