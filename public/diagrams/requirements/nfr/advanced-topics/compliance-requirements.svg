<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Compliance Requirements by Regulation</text>
  
  <rect x="30" y="70" width="270" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">GDPR (EU)</text>
  <rect x="50" y="110" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Right to access</text>
  <text x="65" y="145" font-size="9" class="text-primary">• Right to erasure</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Data portability</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Consent management</text>
  <text x="65" y="190" font-size="9" class="text-primary">• DPIA required</text>
  <text x="65" y="205" font-size="9" class="text-primary">• 72hr breach notification</text>
  <text x="65" y="220" font-size="9" class="text-primary">• DPO appointment</text>
  <text x="65" y="235" font-size="9" class="text-primary">• Fines: up to 4% revenue</text>
  <text x="65" y="250" font-size="9" class="highlight-red">⚠ Strictest</text>
  
  <rect x="315" y="70" width="270" height="200" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">HIPAA (US Healthcare)</text>
  <rect x="335" y="110" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• PHI protection</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Access controls</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Audit controls</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Integrity controls</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Transmission security</text>
  <text x="350" y="205" font-size="9" class="text-primary">• BA agreements</text>
  <text x="350" y="220" font-size="9" class="text-primary">• Risk assessments</text>
  <text x="350" y="235" font-size="9" class="text-primary">• Fines: up to $1.5M/year</text>
  <text x="350" y="250" font-size="9" class="highlight-red">⚠ Healthcare only</text>
  
  <rect x="600" y="70" width="270" height="200" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">SOX (Financial)</text>
  <rect x="620" y="110" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Financial reporting</text>
  <text x="635" y="145" font-size="9" class="text-primary">• Internal controls</text>
  <text x="635" y="160" font-size="9" class="text-primary">• Audit trail</text>
  <text x="635" y="175" font-size="9" class="text-primary">• CEO/CFO certification</text>
  <text x="635" y="190" font-size="9" class="text-primary">• Independent audit</text>
  <text x="635" y="205" font-size="9" class="text-primary">• Document retention</text>
  <text x="635" y="220" font-size="9" class="text-primary">• Whistleblower protection</text>
  <text x="635" y="235" font-size="9" class="text-primary">• Criminal penalties</text>
  <text x="635" y="250" font-size="9" class="highlight-red">⚠ Public companies</text>
  
  <!-- Common Controls -->
  <rect x="30" y="290" width="840" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="450" y="315" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Common Technical Controls Across Regulations</text>
  
  <rect x="50" y="330" width="190" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="145" y="350" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Access Control</text>
  <rect x="70" y="365" width="150" height="75" rx="2" class="box-base" stroke-width="1"/>
  <text x="145" y="385" text-anchor="middle" font-size="9" class="text-primary">• RBAC/ABAC</text>
  <text x="145" y="400" text-anchor="middle" font-size="9" class="text-primary">• MFA</text>
  <text x="145" y="415" text-anchor="middle" font-size="9" class="text-primary">• Least privilege</text>
  <text x="145" y="430" text-anchor="middle" font-size="9" class="text-primary">• Session mgmt</text>
  
  <rect x="255" y="330" width="190" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="350" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Encryption</text>
  <rect x="275" y="365" width="150" height="75" rx="2" class="box-base" stroke-width="1"/>
  <text x="350" y="385" text-anchor="middle" font-size="9" class="text-primary">• At rest (AES-256)</text>
  <text x="350" y="400" text-anchor="middle" font-size="9" class="text-primary">• In transit (TLS)</text>
  <text x="350" y="415" text-anchor="middle" font-size="9" class="text-primary">• Key management</text>
  <text x="350" y="430" text-anchor="middle" font-size="9" class="text-primary">• HSM</text>
  
  <rect x="460" y="330" width="190" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="555" y="350" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Audit Logging</text>
  <rect x="480" y="365" width="150" height="75" rx="2" class="box-base" stroke-width="1"/>
  <text x="555" y="385" text-anchor="middle" font-size="9" class="text-primary">• Immutable logs</text>
  <text x="555" y="400" text-anchor="middle" font-size="9" class="text-primary">• Tamper-evident</text>
  <text x="555" y="415" text-anchor="middle" font-size="9" class="text-primary">• Retention</text>
  <text x="555" y="430" text-anchor="middle" font-size="9" class="text-primary">• Search/export</text>
  
  <rect x="665" y="330" width="190" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="760" y="350" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Data Governance</text>
  <rect x="685" y="365" width="150" height="75" rx="2" class="box-base" stroke-width="1"/>
  <text x="760" y="385" text-anchor="middle" font-size="9" class="text-primary">• Classification</text>
  <text x="760" y="400" text-anchor="middle" font-size="9" class="text-primary">• Lineage</text>
  <text x="760" y="415" text-anchor="middle" font-size="9" class="text-primary">• Retention</text>
  <text x="760" y="430" text-anchor="middle" font-size="9" class="text-primary">• DLP</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>