<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow8" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad8)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">Cellular Radio State Machine</text>
  
  <!-- State Diagram -->
  <g transform="translate(50, 70)">
    <!-- DCH State -->
    <g transform="translate(100, 0)">
      <rect x="0" y="0" width="180" height="80" rx="8" fill="#d9534f" opacity="0.8" filter="url(#shadow8)"/>
      <text x="90" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">DCH (Connected)</text>
      <text x="90" y="50" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">~500-1000 mW</text>
      <text x="90" y="68" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Active data transfer</text>
    </g>
    
    <!-- FACH State -->
    <g transform="translate(100, 120)">
      <rect x="0" y="0" width="180" height="80" rx="8" fill="#f0ad4e" opacity="0.7" filter="url(#shadow8)"/>
      <text x="90" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">FACH</text>
      <text x="90" y="50" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">~200-400 mW</text>
      <text x="90" y="68" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Low-rate data, tail</text>
    </g>
    
    <!-- PCH/IDLE State -->
    <g transform="translate(100, 240)">
      <rect x="0" y="0" width="180" height="80" rx="8" fill="#67b26f" opacity="0.6" filter="url(#shadow8)"/>
      <text x="90" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">PCH (IDLE)</text>
      <text x="90" y="50" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">~5-20 mW</text>
      <text x="90" y="68" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Periodic paging only</text>
    </g>
    
    <!-- Transition arrows -->
    <!-- DCH to FACH -->
    <path d="M 190 40 C 250 40, 250 100, 190 100" fill="none" stroke="#f0ad4e" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="260" y="75" font-family="system-ui" font-size="10" fill="#f0ad4e">Inactivity</text>
    
    <!-- FACH to PCH -->
    <line x1="190" y1="160" x2="190" y2="220" stroke="#67b26f" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="200" y="195" font-family="system-ui" font-size="10" fill="#67b26f">Inactivity</text>
    
    <!-- PCH to FACH -->
    <line x1="100" y1="260" x2="100" y2="200" stroke="#4a90d9" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="90" y="235" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4a90d9">Data request</text>
    
    <!-- FACH to DCH -->
    <path d="M 100 140 C 40 140, 40 60, 100 60" fill="none" stroke="#d9534f" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="30" y="105" font-family="system-ui" font-size="10" fill="#d9534f">High data</text>
    
    <!-- DCH to PCH (fast dormancy) -->
    <path d="M 280 50 C 380 50, 380 270, 280 270" fill="none" stroke="#67b26f" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="390" y="165" font-family="system-ui" font-size="9" fill="#67b26f">Fast dormancy</text>
  </g>
  
  <!-- Tail Energy Visualization -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="380" height="140" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow8)"/>
    <text x="190" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#f0ad4e">Tail Energy Problem</text>
    
    <!-- Power consumption timeline -->
    <g transform="translate(20, 45)">
      <!-- Y axis -->
      <line x1="0" y1="0" x2="0" y2="70" stroke="#666" stroke-width="1"/>
      <text x="-5" y="10" font-family="system-ui" font-size="9" fill="#e0e0e0">High</text>
      <text x="-5" y="70" font-family="system-ui" font-size="9" fill="#e0e0e0">Low</text>
      
      <!-- DCH period -->
      <rect x="0" y="20" width="60" height="50" fill="#d9534f" opacity="0.8"/>
      <text x="30" y="45" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">DCH</text>
      <text x="30" y="10" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Data</text>
      
      <!-- FACH tail -->
      <rect x="65" y="40" width="80" height="30" fill="#f0ad4e" opacity="0.7"/>
      <text x="105" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">FACH Tail</text>
      <text x="105" y="30" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">5-12 seconds</text>
      
      <!-- IDLE -->
      <rect x="150" y="65" width="100" height="5" fill="#67b26f" opacity="0.6"/>
      <text x="200" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">IDLE</text>
      
      <!-- X axis -->
      <line x1="0" y1="70" x2="250" y2="70" stroke="#666" stroke-width="1"/>
      <text x="125" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Time →</text>
    </g>
    
    <text x="190" y="120" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Tail energy = 30-50% of total radio energy</text>
  </g>
  
  <!-- Batching Optimization -->
  <g transform="translate(480, 230)">
    <rect x="0" y="0" width="380" height="140" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow8)"/>
    <text x="190" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#67b26f">Batching Optimization</text>
    
    <!-- Without batching -->
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-family="system-ui" font-size="9" fill="#d9534f">Without Batching (4 requests):</text>
      
      <!-- 4 separate transfers with tails -->
      <rect x="0" y="10" width="20" height="15" fill="#d9534f" opacity="0.6"/>
      <rect x="22" y="15" width="25" height="10" fill="#f0ad4e" opacity="0.4"/>
      
      <rect x="50" y="10" width="20" height="15" fill="#d9534f" opacity="0.6"/>
      <rect x="72" y="15" width="25" height="10" fill="#f0ad4e" opacity="0.4"/>
      
      <rect x="100" y="10" width="20" height="15" fill="#d9534f" opacity="0.6"/>
      <rect x="122" y="15" width="25" height="10" fill="#f0ad4e" opacity="0.4"/>
      
      <rect x="150" y="10" width="20" height="15" fill="#d9534f" opacity="0.6"/>
      <rect x="172" y="15" width="25" height="10" fill="#f0ad4e" opacity="0.4"/>
      
      <text x="100" y="40" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">4 × tail energy wasted</text>
    </g>
    
    <!-- With batching -->
    <g transform="translate(20, 90)">
      <text x="0" y="0" font-family="system-ui" font-size="9" fill="#67b26f">With Batching (1 combined request):</text>
      
      <!-- Single batched transfer -->
      <rect x="0" y="10" width="50" height="15" fill="#67b26f" opacity="0.8"/>
      <rect x="52" y="15" width="30" height="10" fill="#f0ad4e" opacity="0.5"/>
      
      <text x="100" y="25" font-family="system-ui" font-size="8" fill="#e0e0e0">1 × tail energy</text>
      <text x="200" y="25" font-family="system-ui" font-size="9" fill="#67b26f" font-weight="bold">75% energy saved</text>
    </g>
  </g>
  
  <!-- Power Comparison Table -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="820" height="100" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2"/>
    <text x="410" y="25" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#4a90d9">Radio Power Consumption Comparison</text>
    
    <table x="40" y="40">
      <text x="40" y="55" font-family="system-ui" font-size="11" fill="#e0e0e0">WiFi:</text>
      <text x="150" y="55" font-family="system-ui" font-size="11" fill="#67b26f">~100-300 mW</text>
      <text x="300" y="55" font-family="system-ui" font-size="11" fill="#e0e0e0">(Preferred for data transfers)</text>
      
      <text x="40" y="75" font-family="system-ui" font-size="11" fill="#e0e0e0">Cellular 4G:</text>
      <text x="150" y="75" font-family="system-ui" font-size="11" fill="#f0ad4e">~500-800 mW</text>
      <text x="300" y="75" font-family="system-ui" font-size="11" fill="#e0e0e0">(Moderate power)</text>
      
      <text x="40" y="95" font-family="system-ui" font-size="11" fill="#e0e0e0">Cellular 5G:</text>
      <text x="150" y="95" font-family="system-ui" font-size="11" fill="#d9534f">~800-1500 mW</text>
      <text x="300" y="95" font-family="system-ui" font-size="11" fill="#e0e0e0">(Highest power consumption)</text>
    </table>
  </g>
</svg>
