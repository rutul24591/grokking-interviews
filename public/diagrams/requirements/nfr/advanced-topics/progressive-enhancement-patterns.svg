<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow17" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad17)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">Progressive Enhancement Implementation Patterns</text>
  
  <!-- Navigation Pattern -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="270" height="140" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow17)"/>
    <text x="135" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#4a90d9">Navigation</text>
    
    <!-- Baseline -->
    <g transform="translate(15, 45)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#e0e0e0">Baseline (HTML):</text>
      <rect x="0" y="10" width="100" height="35" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="10" y="25" font-family="monospace" font-size="7" fill="white">&amp;lt;ul&amp;gt;&amp;lt;li&amp;gt;</text>
      <text x="10" y="38" font-family="monospace" font-size="7" fill="white">&amp;lt;a href&amp;gt;Links&amp;lt;/a&amp;gt;</text>
      
      <text x="120" y="10" font-family="system-ui" font-size="10" fill="#67b26f">Enhanced (CSS+JS):</text>
      <rect x="120" y="25" width="130" height="20" rx="3" fill="#67b26f" opacity="0.5"/>
      <text x="185" y="39" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Horizontal menu</text>
      <rect x="120" y="50" width="130" height="20" rx="3" fill="#f0ad4e" opacity="0.5"/>
      <text x="185" y="64" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Dropdown + animations</text>
    </g>
  </g>
  
  <!-- Forms Pattern -->
  <g transform="translate(320, 60)">
    <rect x="0" y="0" width="270" height="140" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow17)"/>
    <text x="135" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#67b26f">Forms</text>
    
    <!-- Baseline -->
    <g transform="translate(15, 45)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#e0e0e0">Baseline (HTML):</text>
      <rect x="0" y="10" width="100" height="35" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="10" y="25" font-family="monospace" font-size="7" fill="white">&amp;lt;form action&amp;gt;</text>
      <text x="10" y="38" font-family="monospace" font-size="7" fill="white">Server validation</text>
      
      <text x="120" y="10" font-family="system-ui" font-size="10" fill="#f0ad4e">Enhanced (JS):</text>
      <rect x="120" y="25" width="130" height="20" rx="3" fill="#f0ad4e" opacity="0.5"/>
      <text x="185" y="39" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Client validation</text>
      <rect x="120" y="50" width="130" height="20" rx="3" fill="#4a90d9" opacity="0.5"/>
      <text x="185" y="64" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">AJAX submit (no reload)</text>
    </g>
  </g>
  
  <!-- Images Pattern -->
  <g transform="translate(610, 60)">
    <rect x="0" y="0" width="270" height="140" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow17)"/>
    <text x="135" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#d9534f">Images</text>
    
    <!-- Baseline -->
    <g transform="translate(15, 45)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#e0e0e0">Baseline (HTML):</text>
      <rect x="0" y="10" width="100" height="35" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="10" y="28" font-family="monospace" font-size="7" fill="white">&amp;lt;img src=&amp;quot;.jpg&amp;quot;&amp;gt;</text>
      
      <text x="120" y="10" font-family="system-ui" font-size="10" fill="#67b26f">Enhanced:</text>
      <rect x="120" y="25" width="130" height="20" rx="3" fill="#67b26f" opacity="0.5"/>
      <text x="185" y="39" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">&amp;lt;picture&amp;gt; WebP/AVIF</text>
      <rect x="120" y="50" width="130" height="20" rx="3" fill="#4a90d9" opacity="0.5"/>
      <text x="185" y="64" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Lazy loading</text>
    </g>
  </g>
  
  <!-- Interactive Components -->
  <g transform="translate(30, 220)">
    <rect x="0" y="0" width="410" height="140" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow17)"/>
    <text x="205" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#f0ad4e">Interactive Components</text>
    
    <!-- Accordion example -->
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#e0e0e0">Baseline: &amp;lt;details&amp;gt; element</text>
      <rect x="0" y="15" width="150" height="30" rx="3" fill="#4a90d9" opacity="0.5"/>
      <text x="10" y="30" font-family="monospace" font-size="7" fill="white">&amp;lt;details&amp;gt;&amp;lt;summary&amp;gt;Title</text>
      <text x="10" y="42" font-family="monospace" font-size="7" fill="white">&amp;lt;p&amp;gt;Content&amp;lt;/p&amp;gt;&amp;lt;/details&amp;gt;</text>
      
      <text x="180" y="10" font-family="system-ui" font-size="10" fill="#67b26f">Enhanced: Custom JS accordion</text>
      <rect x="180" y="25" width="200" height="20" rx="3" fill="#67b26f" opacity="0.5"/>
      <text x="280" y="39" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Smooth animations</text>
      <rect x="180" y="50" width="200" height="20" rx="3" fill="#f0ad4e" opacity="0.5"/>
      <text x="280" y="64" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">ARIA attributes + keyboard nav</text>
    </g>
  </g>
  
  <!-- Data Loading -->
  <g transform="translate(460, 220)">
    <rect x="0" y="0" width="420" height="140" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow17)"/>
    <text x="210" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#67b26f">Data Loading</text>
    
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#e0e0e0">Baseline: Server-rendered pages</text>
      <rect x="0" y="15" width="180" height="30" rx="3" fill="#4a90d9" opacity="0.5"/>
      <text x="10" y="30" font-family="monospace" font-size="7" fill="white">Server renders HTML</text>
      <text x="10" y="42" font-family="monospace" font-size="7" fill="white">Links → full page reload</text>
      
      <text x="200" y="10" font-family="system-ui" font-size="10" fill="#67b26f">Enhanced: Client-side routing</text>
      <rect x="200" y="25" width="200" height="20" rx="3" fill="#67b26f" opacity="0.5"/>
      <text x="300" y="39" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">JS intercepts clicks</text>
      <rect x="200" y="50" width="200" height="20" rx="3" fill="#f0ad4e" opacity="0.5"/>
      <text x="300" y="64" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">fetch() + pushState</text>
    </g>
  </g>
  
  <!-- Key Principle -->
  <g transform="translate(30, 380)">
    <rect x="0" y="0" width="850" height="100" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2"/>
    <text x="425" y="28" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Key Principle</text>
    <text x="425" y="55" text-anchor="middle" font-family="system-ui" font-size="12" fill="#e0e0e0">Core functionality must work without JavaScript. Enhancements improve the experience,</text>
    <text x="425" y="75" text-anchor="middle" font-family="system-ui" font-size="12" fill="#e0e0e0">but never enable essential features that are otherwise unavailable.</text>
    <text x="425" y="95" text-anchor="middle" font-family="system-ui" font-size="10" fill="#f0ad4e">Forms submit • Links navigate • Content is readable — with or without JS</text>
  </g>
</svg>
