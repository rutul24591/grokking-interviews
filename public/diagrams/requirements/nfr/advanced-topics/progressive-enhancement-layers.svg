<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow15" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad15)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">Progressive Enhancement Layers</text>
  
  <!-- Layer Pyramid -->
  <g transform="translate(100, 80)">
    <!-- HTML Base Layer -->
    <path d="M 0 200 L 300 200 L 300 260 L 0 260 Z" fill="#4a90d9" opacity="0.9"/>
    <text x="150" y="235" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="white">HTML</text>
    <text x="150" y="255" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Content &amp; Semantics</text>
    
    <!-- CSS Middle Layer -->
    <path d="M 50 140 L 250 140 L 300 200 L 0 200 Z" fill="#67b26f" opacity="0.8"/>
    <text x="150" y="175" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="white">CSS</text>
    <text x="150" y="195" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Presentation &amp; Layout</text>
    
    <!-- JavaScript Top Layer -->
    <path d="M 100 80 L 200 80 L 250 140 L 50 140 Z" fill="#f0ad4e" opacity="0.7"/>
    <text x="150" y="115" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="white">JavaScript</text>
    <text x="150" y="135" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Behavior &amp; Interactivity</text>
    
    <!-- Label -->
    <text x="150" y="290" text-anchor="middle" font-family="system-ui" font-size="12" fill="#e0e0e0">Build from bottom up</text>
  </g>
  
  <!-- User Experience Spectrum -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="380" height="260" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow15)"/>
    <text x="190" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">User Experience Spectrum</text>
    
    <!-- Basic Browser -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="110" height="60" rx="6" fill="#4a90d9" opacity="0.4" stroke="#4a90d9"/>
      <text x="55" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Basic</text>
      <text x="55" y="42" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">HTML only</text>
      <text x="55" y="55" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Text browser</text>
    </g>
    
    <!-- Enhanced Browser -->
    <g transform="translate(135, 50)">
      <rect x="0" y="0" width="110" height="60" rx="6" fill="#67b26f" opacity="0.4" stroke="#67b26f"/>
      <text x="55" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Enhanced</text>
      <text x="55" y="42" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">HTML + CSS</text>
      <text x="55" y="55" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Styled layout</text>
    </g>
    
    <!-- Modern Browser -->
    <g transform="translate(250, 50)">
      <rect x="0" y="0" width="110" height="60" rx="6" fill="#f0ad4e" opacity="0.4" stroke="#f0ad4e"/>
      <text x="55" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Modern</text>
      <text x="55" y="42" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">HTML+CSS+JS</text>
      <text x="55" y="55" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Full experience</text>
    </g>
    
    <!-- Feature comparison -->
    <g transform="translate(20, 130)">
      <text x="0" y="0" font-family="system-ui" font-size="10" font-weight="bold" fill="#e0e0e0">Feature</text>
      <text x="70" y="0" font-family="system-ui" font-size="10" font-weight="bold" fill="#4a90d9">Basic</text>
      <text x="145" y="0" font-family="system-ui" font-size="10" font-weight="bold" fill="#67b26f">Enhanced</text>
      <text x="220" y="0" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">Modern</text>
      
      <!-- Content row -->
      <text x="0" y="20" font-family="system-ui" font-size="9" fill="#e0e0e0">Content</text>
      <text x="70" y="20" font-family="system-ui" font-size="14" fill="#67b26f">✓</text>
      <text x="145" y="20" font-family="system-ui" font-size="14" fill="#67b26f">✓</text>
      <text x="220" y="20" font-family="system-ui" font-size="14" fill="#67b26f">✓</text>
      
      <!-- Styling row -->
      <text x="0" y="40" font-family="system-ui" font-size="9" fill="#e0e0e0">Styling</text>
      <text x="70" y="40" font-family="system-ui" font-size="14" fill="#d9534f">✗</text>
      <text x="145" y="40" font-family="system-ui" font-size="14" fill="#67b26f">✓</text>
      <text x="220" y="40" font-family="system-ui" font-size="14" fill="#67b26f">✓</text>
      
      <!-- Interactivity row -->
      <text x="0" y="60" font-family="system-ui" font-size="9" fill="#e0e0e0">Interactivity</text>
      <text x="70" y="60" font-family="system-ui" font-size="14" fill="#d9534f">✗</text>
      <text x="145" y="60" font-family="system-ui" font-size="14" fill="#d9534f">✗</text>
      <text x="220" y="60" font-family="system-ui" font-size="14" fill="#67b26f">✓</text>
      
      <!-- Animations row -->
      <text x="0" y="80" font-family="system-ui" font-size="9" fill="#e0e0e0">Animations</text>
      <text x="70" y="80" font-family="system-ui" font-size="14" fill="#d9534f">✗</text>
      <text x="145" y="80" font-family="system-ui" font-size="14" fill="#d9534f">✗</text>
      <text x="220" y="80" font-family="system-ui" font-size="14" fill="#67b26f">✓</text>
    </g>
    
    <text x="190" y="245" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">All users get content. Enhanced features layer on top.</text>
  </g>
  
  <!-- Development Flow -->
  <g transform="translate(100, 360)">
    <rect x="0" y="0" width="700" height="110" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow15)"/>
    <text x="350" y="28" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Development Workflow</text>
    
    <!-- Step 1 -->
    <g transform="translate(30, 45)">
      <circle cx="20" cy="20" r="18" fill="#4a90d9"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">1</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Build semantic</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">HTML structure</text>
    </g>
    
    <!-- Arrow -->
    <line x1="110" y1="65" x2="140" y2="65" stroke="#666" stroke-width="2"/>
    <polygon points="140,65 130,60 130,70" fill="#666"/>
    
    <!-- Step 2 -->
    <g transform="translate(150, 45)">
      <circle cx="20" cy="20" r="18" fill="#67b26f"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">2</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Add CSS styling</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">&amp; layout</text>
    </g>
    
    <!-- Arrow -->
    <line x1="240" y1="65" x2="270" y2="65" stroke="#666" stroke-width="2"/>
    <polygon points="270,65 260,60 260,70" fill="#666"/>
    
    <!-- Step 3 -->
    <g transform="translate(280, 45)">
      <circle cx="20" cy="20" r="18" fill="#f0ad4e"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">3</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Enhance with</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">JavaScript</text>
    </g>
    
    <!-- Arrow -->
    <line x1="360" y1="65" x2="390" y2="65" stroke="#666" stroke-width="2"/>
    <polygon points="390,65 380,60 380,70" fill="#666"/>
    
    <!-- Step 4 -->
    <g transform="translate(400, 45)">
      <circle cx="20" cy="20" r="18" fill="#d9534f"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">4</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Test without</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">CSS/JS</text>
    </g>
    
    <!-- Arrow -->
    <line x1="490" y1="65" x2="520" y2="65" stroke="#666" stroke-width="2"/>
    <polygon points="520,65 510,60 510,70" fill="#666"/>
    
    <!-- Step 5 -->
    <g transform="translate(530, 45)">
      <circle cx="20" cy="20" r="18" fill="#67b26f"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">5</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Verify all</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">users can access</text>
    </g>
  </g>
</svg>
