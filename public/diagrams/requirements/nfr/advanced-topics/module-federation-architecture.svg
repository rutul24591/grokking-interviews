<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow12" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad12)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">Module Federation Architecture</text>
  
  <!-- Host Application -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="380" height="280" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow12)"/>
    <text x="190" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Host Application (Container)</text>
    
    <!-- webpack config -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="340" height="60" rx="6" fill="#1a1a2e" stroke="#4a90d9"/>
      <text x="170" y="22" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">webpack.config.js</text>
      <text x="20" y="42" font-family="monospace" font-size="9" fill="#e0e0e0">remotes: {'{'} ProductMF: 'product@url/remote.js' {'}'}</text>
      <text x="20" y="56" font-family="monospace" font-size="9" fill="#e0e0e0">shared: ['react', 'react-dom']</text>
    </g>
    
    <!-- Shell/Router -->
    <g transform="translate(20, 115)">
      <rect x="0" y="0" width="160" height="50" rx="4" fill="#4a90d9" opacity="0.7"/>
      <text x="80" y="30" text-anchor="middle" font-family="system-ui" font-size="11" fill="white">Shell / Router</text>
    </g>
    
    <!-- Dynamic imports -->
    <g transform="translate(200, 115)">
      <rect x="0" y="0" width="160" height="50" rx="4" fill="#67b26f" opacity="0.7"/>
      <text x="80" y="25" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Dynamic Import</text>
      <text x="80" y="42" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">import('ProductMF/App')</text>
    </g>
    
    <!-- Rendered MFs -->
    <g transform="translate(20, 175)">
      <rect x="0" y="0" width="340" height="90" rx="6" fill="#1a1a2e" stroke="#666" stroke-dasharray="4,2"/>
      <text x="170" y="22" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Rendered Micro-Frontends</text>
      
      <rect x="15" y="35" width="100" height="40" rx="4" fill="#67b26f" opacity="0.6"/>
      <text x="65" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Navigation</text>
      
      <rect x="125" y="35" width="100" height="40" rx="4" fill="#f0ad4e" opacity="0.6"/>
      <text x="175" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Product List</text>
      
      <rect x="235" y="35" width="90" height="40" rx="4" fill="#d9534f" opacity="0.6"/>
      <text x="280" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Cart</text>
    </g>
  </g>
  
  <!-- Remote Applications -->
  <g transform="translate(440, 60)">
    <rect x="0" y="0" width="440" height="280" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow12)"/>
    <text x="220" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Remote Applications</text>
    
    <!-- Remote 1: Navigation -->
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="200" height="100" rx="6" fill="#67b26f" opacity="0.3" stroke="#67b26f"/>
      <text x="100" y="25" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#67b26f">Navigation MF</text>
      
      <!-- Exposed modules -->
      <rect x="15" y="35" width="170" height="30" rx="4" fill="#67b26f" opacity="0.6"/>
      <text x="100" y="55" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">./Navigation</text>
      
      <rect x="15" y="70" width="170" height="25" rx="4" fill="#67b26f" opacity="0.4"/>
      <text x="100" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">./Header, ./Footer</text>
    </g>
    
    <!-- Remote 2: Product -->
    <g transform="translate(225, 45)">
      <rect x="0" y="0" width="200" height="100" rx="6" fill="#f0ad4e" opacity="0.3" stroke="#f0ad4e"/>
      <text x="100" y="25" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f0ad4e">Product MF</text>
      
      <!-- Exposed modules -->
      <rect x="15" y="35" width="170" height="30" rx="4" fill="#f0ad4e" opacity="0.6"/>
      <text x="100" y="55" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">./ProductList</text>
      
      <rect x="15" y="70" width="170" height="25" rx="4" fill="#f0ad4e" opacity="0.4"/>
      <text x="100" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">./ProductDetail</text>
    </g>
    
    <!-- Remote Entry Files -->
    <g transform="translate(15, 160)">
      <rect x="0" y="0" width="410" height="50" rx="6" fill="#1a1a2e" stroke="#f0ad4e"/>
      <text x="205" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Remote Entry Files (remoteEntry.js)</text>
      <text x="205" y="42" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Served from CDN, loaded dynamically by host</text>
    </g>
    
    <!-- Shared Dependencies -->
    <g transform="translate(15, 225)">
      <rect x="0" y="0" width="410" height="45" rx="6" fill="#d9534f" opacity="0.3" stroke="#d9534f"/>
      <text x="205" y="20" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Shared Dependencies (Singleton)</text>
      <text x="205" y="38" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">React, React-DOM loaded once by host, shared with all remotes</text>
    </g>
  </g>
  
  <!-- Loading Flow -->
  <g transform="translate(30, 360)">
    <rect x="0" y="0" width="850" height="120" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow12)"/>
    <text x="425" y="28" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Runtime Loading Flow</text>
    
    <!-- Step 1 -->
    <g transform="translate(30, 45)">
      <circle cx="20" cy="20" r="18" fill="#4a90d9"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">1</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Host loads</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">remoteEntry.js</text>
    </g>
    
    <!-- Arrow -->
    <line x1="80" y1="65" x2="110" y2="65" stroke="#666" stroke-width="2"/>
    <polygon points="110,65 100,60 100,70" fill="#666"/>
    
    <!-- Step 2 -->
    <g transform="translate(120, 45)">
      <circle cx="20" cy="20" r="18" fill="#4a90d9"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">2</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Webpack resolves</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">remote module</text>
    </g>
    
    <!-- Arrow -->
    <line x1="180" y1="65" x2="210" y2="65" stroke="#666" stroke-width="2"/>
    <polygon points="210,65 200,60 200,70" fill="#666"/>
    
    <!-- Step 3 -->
    <g transform="translate(220, 45)">
      <circle cx="20" cy="20" r="18" fill="#4a90d9"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">3</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Shared deps</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">deduplicated</text>
    </g>
    
    <!-- Arrow -->
    <line x1="280" y1="65" x2="310" y2="65" stroke="#666" stroke-width="2"/>
    <polygon points="310,65 300,60 300,70" fill="#666"/>
    
    <!-- Step 4 -->
    <g transform="translate(320, 45)">
      <circle cx="20" cy="20" r="18" fill="#67b26f"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">4</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Remote module</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">executes</text>
    </g>
    
    <!-- Arrow -->
    <line x1="380" y1="65" x2="410" y2="65" stroke="#666" stroke-width="2"/>
    <polygon points="410,65 400,60 400,70" fill="#666"/>
    
    <!-- Step 5 -->
    <g transform="translate(420, 45)">
      <circle cx="20" cy="20" r="18" fill="#67b26f"/>
      <text x="20" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">5</text>
      <text x="50" y="15" font-family="system-ui" font-size="10" fill="#e0e0e0">Component</text>
      <text x="50" y="30" font-family="system-ui" font-size="10" fill="#e0e0e0">rendered</text>
    </g>
    
    <!-- Dependency deduplication visual -->
    <g transform="translate(580, 40)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#e0e0e0">Dependency Deduplication:</text>
      
      <!-- Host has React -->
      <rect x="0" y="10" width="80" height="25" rx="3" fill="#d9534f" opacity="0.7"/>
      <text x="40" y="27" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">React 18</text>
      <text x="90" y="27" font-family="system-ui" font-size="9" fill="#67b26f">✓ Loaded</text>
      
      <!-- Remote needs React -->
      <rect x="0" y="40" width="80" height="25" rx="3" fill="#d9534f" opacity="0.3"/>
      <text x="40" y="57" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">React 18</text>
      <text x="90" y="57" font-family="system-ui" font-size="9" fill="#67b26f">→ Reuse host's</text>
      
      <text x="150" y="50" font-family="system-ui" font-size="10" fill="#e0e0e0">50% bundle savings</text>
    </g>
  </g>
</svg>
