<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow9" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad9)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">Background Task Management</text>
  
  <!-- iOS Background Execution -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="410" height="210" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow9)"/>
    <text x="205" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">iOS Background Execution</text>
    
    <!-- BGTaskScheduler -->
    <g transform="translate(15, 50)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#4a90d9" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">BGTaskScheduler</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">BGProcessingTask</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">BGAppRefreshTask</text>
    </g>
    
    <!-- Background Fetch -->
    <g transform="translate(210, 50)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#67b26f" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">Background Fetch</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">~Every 15 minutes</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">System-controlled timing</text>
    </g>
    
    <!-- Remote Notifications -->
    <g transform="translate(15, 120)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#f0ad4e" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">Remote Notifications</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">content-available: 1</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Silent push → background run</text>
    </g>
    
    <!-- Special Modes -->
    <g transform="translate(210, 120)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#d9534f" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">Special Modes</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Audio, VoIP, Location</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Requires entitlements</text>
    </g>
    
    <text x="205" y="195" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Complete tasks in &amp;lt;30 seconds • Use expiration handlers</text>
  </g>
  
  <!-- Android Background Execution -->
  <g transform="translate(460, 60)">
    <rect x="0" y="0" width="420" height="210" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow9)"/>
    <text x="210" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Android Background Execution</text>
    
    <!-- WorkManager -->
    <g transform="translate(15, 50)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#67b26f" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">WorkManager</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Deferred work</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Constraints (network, charging)</text>
    </g>
    
    <!-- JobScheduler -->
    <g transform="translate(210, 50)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#4a90d9" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">JobScheduler</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">System-managed jobs</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Doze mode compatible</text>
    </g>
    
    <!-- Foreground Services -->
    <g transform="translate(15, 120)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#f0ad4e" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">Foreground Services</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Visible notification</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Music, navigation, fitness</text>
    </g>
    
    <!-- AlarmManager -->
    <g transform="translate(210, 120)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#d9534f" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">AlarmManager</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Precise timing</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Use sparingly (battery impact)</text>
    </g>
    
    <text x="210" y="195" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Doze Mode defers work during inactivity • App Standby restricts unused apps</text>
  </g>
  
  <!-- Doze Mode Visualization -->
  <g transform="translate(30, 290)">
    <rect x="0" y="0" width="410" height="180" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow9)"/>
    <text x="205" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#67b26f">Android Doze Mode</text>
    
    <!-- Active state -->
    <g transform="translate(20, 50)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#e0e0e0">Active (device in use):</text>
      
      <!-- Normal operation timeline -->
      <line x1="0" y1="15" x2="350" y2="15" stroke="#666" stroke-width="1"/>
      <rect x="0" y="5" width="350" height="20" fill="#4a90d9" opacity="0.3"/>
      <text x="175" y="50" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Full network, jobs, alarms allowed</text>
    </g>
    
    <!-- Doze state -->
    <g transform="translate(20, 110)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#67b26f">Doze (device idle, screen off):</text>
      
      <!-- Doze timeline -->
      <line x1="0" y1="15" x2="350" y2="15" stroke="#666" stroke-width="1"/>
      
      <!-- Maintenance windows -->
      <rect x="30" y="5" width="30" height="20" fill="#67b26f" opacity="0.6"/>
      <rect x="100" y="5" width="30" height="20" fill="#67b26f" opacity="0.6"/>
      <rect x="170" y="5" width="30" height="20" fill="#67b26f" opacity="0.6"/>
      <rect x="240" y="5" width="30" height="20" fill="#67b26f" opacity="0.6"/>
      <rect x="310" y="5" width="30" height="20" fill="#67b26f" opacity="0.6"/>
      
      <!-- Deep sleep periods -->
      <rect x="60" y="10" width="40" height="10" fill="#1a1a2e" opacity="0.5"/>
      <rect x="130" y="10" width="40" height="10" fill="#1a1a2e" opacity="0.5"/>
      <rect x="200" y="10" width="40" height="10" fill="#1a1a2e" opacity="0.5"/>
      <rect x="270" y="10" width="40" height="10" fill="#1a1a2e" opacity="0.5"/>
      
      <text x="175" y="50" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Network/jobs deferred to maintenance windows</text>
      <text x="175" y="65" text-anchor="middle" font-family="system-ui" font-size="9" fill="#67b26f">~Every 9 minutes initially, then ~30 minutes</text>
    </g>
  </g>
  
  <!-- Web Background Sync -->
  <g transform="translate(460, 290)">
    <rect x="0" y="0" width="420" height="180" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow9)"/>
    <text x="210" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#f0ad4e">Web Background Sync (PWA)</text>
    
    <!-- Background Sync API -->
    <g transform="translate(15, 50)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#f0ad4e" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Background Sync API</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Defer until network available</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Browser handles retry</text>
    </g>
    
    <!-- Periodic Background Sync -->
    <g transform="translate(210, 50)">
      <rect x="0" y="0" width="180" height="55" rx="6" fill="#4a90d9" opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Periodic Background Sync</text>
      <text x="90" y="40" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Fetch content periodically</text>
      <text x="90" y="52" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Chrome on Android only</text>
    </g>
    
    <!-- Push Notifications -->
    <g transform="translate(15, 120)">
      <rect x="0" y="0" width="375" height="45" rx="6" fill="#67b26f" opacity="0.6"/>
      <text x="187" y="22" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Push Notifications</text>
      <text x="187" y="38" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Wake service worker to handle push events</text>
    </g>
    
    <text x="210" y="165" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Limited compared to native • Best for lightweight background tasks</text>
  </g>
</svg>
