<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Data Lineage &amp; Auditability</text>
  
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Data Lineage Model</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <rect x="70" y="125" width="190" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="165" y="145" text-anchor="middle" font-size="9" class="text-primary">Source Systems</text>
  <line x1="165" y1="155" x2="165" y2="170" class="arrow" stroke-width="1.5"/>
  <rect x="70" y="170" width="190" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="165" y="190" text-anchor="middle" font-size="9" class="text-primary">Transformations</text>
  <line x1="165" y1="200" x2="165" y2="215" class="arrow" stroke-width="1.5"/>
  <rect x="70" y="215" width="190" height="30" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="165" y="235" text-anchor="middle" font-size="9" class="text-primary">Destination</text>
  
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Audit Trail Components</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Who: User/service ID</text>
  <text x="350" y="145" font-size="9" class="text-primary">• What: Action performed</text>
  <text x="350" y="160" font-size="9" class="text-primary">• When: Timestamp (UTC)</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Where: Source IP/system</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Why: Business justification</text>
  <text x="350" y="205" font-size="9" class="text-primary">• Result: Success/failure</text>
  
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Compliance Requirements</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• GDPR: Data access logs</text>
  <text x="635" y="145" font-size="9" class="text-primary">• HIPAA: PHI access audit</text>
  <text x="635" y="160" font-size="9" class="text-primary">• SOX: Financial data trail</text>
  <text x="635" y="175" font-size="9" class="text-primary">• PCI-DSS: Payment audit</text>
  <text x="635" y="190" font-size="9" class="text-primary">• Retention: 7+ years</text>
  
  <!-- Lineage Capture Architecture -->
  <rect x="30" y="270" width="840" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Lineage Capture Architecture</text>
  
  <rect x="50" y="310" width="180" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="140" y="330" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Data Sources</text>
  <rect x="70" y="345" width="140" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="140" y="362" text-anchor="middle" font-size="8" class="text-primary">Databases</text>
  <rect x="70" y="375" width="140" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="140" y="392" text-anchor="middle" font-size="8" class="text-primary">APIs</text>
  <rect x="70" y="405" width="140" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="140" y="422" text-anchor="middle" font-size="8" class="text-primary">File Systems</text>
  <rect x="70" y="435" width="140" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="140" y="452" text-anchor="middle" font-size="8" class="text-primary">Streaming</text>
  
  <line x1="230" y1="382" x2="270" y2="382" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="270" y="310" width="180" height="145" rx="3" class="accent-box" stroke-width="1.5"/>
  <text x="360" y="330" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Lineage Extractor</text>
  <rect x="290" y="345" width="140" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="360" y="362" text-anchor="middle" font-size="8" class="text-primary">Schema parsing</text>
  <rect x="290" y="375" width="140" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="360" y="392" text-anchor="middle" font-size="8" class="text-primary">Query analysis</text>
  <rect x="290" y="405" width="140" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="360" y="422" text-anchor="middle" font-size="8" class="text-primary">Metadata capture</text>
  <rect x="290" y="435" width="140" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="360" y="452" text-anchor="middle" font-size="8" class="text-primary">Dependency graph</text>
  
  <line x1="450" y1="382" x2="490" y2="382" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="490" y="310" width="180" height="145" rx="3" class="highlight-box" stroke-width="1.5"/>
  <text x="580" y="330" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Lineage Store</text>
  <rect x="510" y="345" width="140" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="580" y="362" text-anchor="middle" font-size="8" class="text-primary">Graph database</text>
  <rect x="510" y="375" width="140" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="580" y="392" text-anchor="middle" font-size="8" class="text-primary">Version history</text>
  <rect x="510" y="405" width="140" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="580" y="422" text-anchor="middle" font-size="8" class="text-primary">Temporal queries</text>
  <rect x="510" y="435" width="140" height="25" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="580" y="452" text-anchor="middle" font-size="8" class="text-primary">Immutable</text>
  
  <line x1="670" y1="382" x2="710" y2="382" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="710" y="310" width="140" height="145" rx="3" class="highlight-purple" stroke-width="1.5"/>
  <text x="780" y="330" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Query API</text>
  <rect x="730" y="345" width="100" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="780" y="362" text-anchor="middle" font-size="8" class="text-primary">REST/GraphQL</text>
  <rect x="730" y="375" width="100" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="780" y="392" text-anchor="middle" font-size="8" class="text-primary">Search</text>
  <rect x="730" y="405" width="100" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="780" y="422" text-anchor="middle" font-size="8" class="text-primary">Visualization</text>
  <rect x="730" y="435" width="100" height="25" rx="2" class="box-base" stroke-width="1"/>
  <text x="780" y="452" text-anchor="middle" font-size="8" class="text-primary">Impact analysis</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>