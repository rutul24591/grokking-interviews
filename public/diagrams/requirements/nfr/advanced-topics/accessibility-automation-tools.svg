<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad19" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow19" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad19)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">Accessibility Automation Tools Ecosystem</text>
  
  <!-- Browser Extensions -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="170" height="100" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow19)"/>
    <text x="85" y="28" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#4a90d9">Browser Extensions</text>
    
    <text x="15" y="50" font-family="system-ui" font-size="10" fill="#e0e0e0">• axe DevTools</text>
    <text x="15" y="65" font-family="system-ui" font-size="10" fill="#e0e0e0">• WAVE</text>
    <text x="15" y="80" font-family="system-ui" font-size="10" fill="#e0e0e0">• Lighthouse</text>
    <text x="15" y="95" font-family="system-ui" font-size="10" fill="#e0e0e0">• Accessibility Insights</text>
  </g>
  
  <!-- Testing Libraries -->
  <g transform="translate(220, 60)">
    <rect x="0" y="0" width="170" height="100" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow19)"/>
    <text x="85" y="28" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#67b26f">Testing Libraries</text>
    
    <text x="15" y="50" font-family="system-ui" font-size="10" fill="#e0e0e0">• axe-core</text>
    <text x="15" y="65" font-family="system-ui" font-size="10" fill="#e0e0e0">• jest-axe</text>
    <text x="15" y="80" font-family="system-ui" font-size="10" fill="#e0e0e0">• pa11y</text>
    <text x="15" y="95" font-family="system-ui" font-size="10" fill="#e0e0e0">• @testing-library</text>
  </g>
  
  <!-- E2E Integration -->
  <g transform="translate(410, 60)">
    <rect x="0" y="0" width="170" height="100" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow19)"/>
    <text x="85" y="28" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f0ad4e">E2E Integration</text>
    
    <text x="15" y="50" font-family="system-ui" font-size="10" fill="#e0e0e0">• cypress-axe</text>
    <text x="15" y="65" font-family="system-ui" font-size="10" fill="#e0e0e0">• Playwright + axe</text>
    <text x="15" y="80" font-family="system-ui" font-size="10" fill="#e0e0e0">• Selenium + axe</text>
    <text x="15" y="95" font-family="system-ui" font-size="10" fill="#e0e0e0">• Puppeteer</text>
  </g>
  
  <!-- CI/CD Platforms -->
  <g transform="translate(600, 60)">
    <rect x="0" y="0" width="170" height="100" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow19)"/>
    <text x="85" y="28" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#d9534f">CI/CD Platforms</text>
    
    <text x="15" y="50" font-family="system-ui" font-size="10" fill="#e0e0e0">• GitHub Actions</text>
    <text x="15" y="65" font-family="system-ui" font-size="10" fill="#e0e0e0">• GitLab CI</text>
    <text x="15" y="80" font-family="system-ui" font-size="10" fill="#e0e0e0">• CircleCI</text>
    <text x="15" y="95" font-family="system-ui" font-size="10" fill="#e0e0e0">• Jenkins</text>
  </g>
  
  <!-- Monitoring -->
  <g transform="translate(790, 60)">
    <rect x="0" y="0" width="90" height="100" rx="8" fill="#2a2a4a" stroke="#6f42c1" stroke-width="2" filter="url(#shadow19)"/>
    <text x="45" y="28" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#6f42c1">Monitoring</text>
    
    <text x="10" y="50" font-family="system-ui" font-size="9" fill="#e0e0e0">• Siteimprove</text>
    <text x="10" y="65" font-family="system-ui" font-size="9" fill="#e0e0e0">• EqualWeb</text>
    <text x="10" y="80" font-family="system-ui" font-size="9" fill="#e0e0e0">• a11y Monitor</text>
  </g>
  
  <!-- Development Workflow -->
  <g transform="translate(30, 180)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow19)"/>
    <text x="200" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#67b26f">Development Workflow</text>
    
    <!-- Local dev -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="110" height="75" rx="6" fill="#4a90d9" opacity="0.3" stroke="#4a90d9"/>
      <text x="55" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Local Dev</text>
      <text x="55" y="45" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Browser extensions</text>
      <text x="55" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">jest-axe tests</text>
      <text x="55" y="75" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">IDE linting</text>
    </g>
    
    <!-- Arrow -->
    <line x1="140" y1="82" x2="170" y2="82" stroke="#666" stroke-width="2"/>
    <polygon points="170,82 160,77 160,87" fill="#666"/>
    
    <!-- PR -->
    <g transform="translate(180, 45)">
      <rect x="0" y="0" width="110" height="75" rx="6" fill="#67b26f" opacity="0.3" stroke="#67b26f"/>
      <text x="55" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Pull Request</text>
      <text x="55" y="45" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">axe GitHub Action</text>
      <text x="55" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Preview audit</text>
      <text x="55" y="75" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Status checks</text>
    </g>
    
    <!-- Arrow -->
    <line x1="300" y1="82" x2="330" y2="82" stroke="#666" stroke-width="2"/>
    <polygon points="330,82 320,77 320,87" fill="#666"/>
    
    <!-- Deploy -->
    <g transform="translate(340, 45)">
      <rect x="0" y="0" width="50" height="75" rx="6" fill="#f0ad4e" opacity="0.3" stroke="#f0ad4e"/>
      <text x="25" y="40" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">Deploy</text>
    </g>
  </g>
  
  <!-- CI/CD Pipeline -->
  <g transform="translate(450, 180)">
    <rect x="0" y="0" width="430" height="140" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow19)"/>
    <text x="215" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#d9534f">CI/CD Pipeline Stages</text>
    
    <!-- Stage 1: PR -->
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="90" height="80" rx="4" fill="#4a90d9" opacity="0.4"/>
      <text x="45" y="25" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#4a90d9">PR Stage</text>
      <text x="45" y="45" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Quick audit</text>
      <text x="45" y="58" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">5-10 URLs</text>
      <text x="45" y="75" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">Block on critical</text>
    </g>
    
    <!-- Arrow -->
    <line x1="110" y1="85" x2="130" y2="85" stroke="#666" stroke-width="2"/>
    
    <!-- Stage 2: Staging -->
    <g transform="translate(135, 45)">
      <rect x="0" y="0" width="90" height="80" rx="4" fill="#67b26f" opacity="0.4"/>
      <text x="45" y="25" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#67b26f">Staging</text>
      <text x="45" y="45" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Full crawl</text>
      <text x="45" y="58" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">All URLs</text>
      <text x="45" y="75" text-anchor="middle" font-family="system-ui" font-size="8" fill="#f0ad4e">Warning threshold</text>
    </g>
    
    <!-- Arrow -->
    <line x1="230" y1="85" x2="250" y2="85" stroke="#666" stroke-width="2"/>
    
    <!-- Stage 3: Production -->
    <g transform="translate(255, 45)">
      <rect x="0" y="0" width="90" height="80" rx="4" fill="#f0ad4e" opacity="0.4"/>
      <text x="45" y="25" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">Production</text>
      <text x="45" y="45" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Smoke tests</text>
      <text x="45" y="58" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Critical paths</text>
      <text x="45" y="75" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">Alert on regression</text>
    </g>
    
    <!-- Arrow -->
    <line x1="350" y1="85" x2="370" y2="85" stroke="#666" stroke-width="2"/>
    
    <!-- Stage 4: Monitoring -->
    <g transform="translate(375, 45)">
      <rect x="0" y="0" width="45" height="80" rx="4" fill="#6f42c1" opacity="0.4"/>
      <text x="22" y="50" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#6f42c1">Scheduled</text>
      <text x="22" y="70" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Daily/Weekly</text>
    </g>
  </g>
  
  <!-- Rule Coverage -->
  <g transform="translate(30, 340)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2"/>
    <text x="200" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#4a90d9">Automation Coverage by Category</text>
    
    <!-- Images -->
    <rect x="20" y="45" width="170" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="20" y="45" width="153" height="20" rx="3" fill="#67b26f" opacity="0.7"/>
    <text x="15" y="60" font-family="system-ui" font-size="9" fill="#e0e0e0">Images</text>
    <text x="195" y="60" font-family="system-ui" font-size="9" fill="#67b26f">90%</text>
    
    <!-- Color -->
    <rect x="20" y="70" width="170" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="20" y="70" width="161" height="20" rx="3" fill="#67b26f" opacity="0.7"/>
    <text x="15" y="85" font-family="system-ui" font-size="9" fill="#e0e0e0">Color Contrast</text>
    <text x="195" y="85" font-family="system-ui" font-size="9" fill="#67b26f">95%</text>
    
    <!-- Forms -->
    <rect x="20" y="95" width="170" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="20" y="95" width="136" height="20" rx="3" fill="#f0ad4e" opacity="0.7"/>
    <text x="15" y="110" font-family="system-ui" font-size="9" fill="#e0e0e0">Forms</text>
    <text x="195" y="110" font-family="system-ui" font-size="9" fill="#f0ad4e">80%</text>
    
    <!-- ARIA -->
    <rect x="20" y="120" width="170" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="20" y="120" width="127" height="20" rx="3" fill="#f0ad4e" opacity="0.7"/>
    <text x="15" y="135" font-family="system-ui" font-size="9" fill="#e0e0e0">ARIA</text>
    <text x="195" y="135" font-family="system-ui" font-size="9" fill="#f0ad4e">75%</text>
    
    <!-- Keyboard -->
    <rect x="220" y="45" width="170" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="220" y="45" width="85" height="20" rx="3" fill="#d9534f" opacity="0.7"/>
    <text x="215" y="60" font-family="system-ui" font-size="9" fill="#e0e0e0">Keyboard</text>
    <text x="395" y="60" text-anchor="end" font-family="system-ui" font-size="9" fill="#d9534f">50%</text>
    
    <!-- Focus -->
    <rect x="220" y="70" width="170" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="220" y="70" width="68" height="20" rx="3" fill="#d9534f" opacity="0.7"/>
    <text x="215" y="85" font-family="system-ui" font-size="9" fill="#e0e0e0">Focus Order</text>
    <text x="395" y="85" text-anchor="end" font-family="system-ui" font-size="9" fill="#d9534f">40%</text>
    
    <!-- Content -->
    <rect x="220" y="95" width="170" height="20" rx="3" fill="#1a1a2e"/>
    <rect x="220" y="95" width="34" height="20" rx="3" fill="#d9534f" opacity="0.7"/>
    <text x="215" y="110" font-family="system-ui" font-size="9" fill="#e0e0e0">Content Quality</text>
    <text x="395" y="110" text-anchor="end" font-family="system-ui" font-size="9" fill="#d9534f">20%</text>
    
    <!-- Overall -->
    <text x="320" y="135" font-family="system-ui" font-size="10" fill="#e0e0e0">Overall: ~30-50% of WCAG</text>
  </g>
  
  <!-- Key Insight -->
  <g transform="translate(450, 340)">
    <rect x="0" y="0" width="430" height="140" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2"/>
    <text x="215" y="28" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#67b26f">Key Insight</text>
    
    <text x="215" y="55" text-anchor="middle" font-family="system-ui" font-size="11" fill="#e0e0e0">Automation catches objective violations</text>
    <text x="215" y="75" text-anchor="middle" font-family="system-ui" font-size="11" fill="#e0e0e0">(missing alt, contrast, ARIA validity)</text>
    
    <text x="215" y="105" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0ad4e">Manual testing required for subjective issues</text>
    <text x="215" y="125" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0ad4e">(alt quality, focus order, interaction a11y)</text>
  </g>
</svg>
