<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="youngGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5ba0e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="oldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d9a036;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9b046;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="largeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d9534f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9635f;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">Generational Garbage Collection</text>
  
  <!-- Young Generation -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="url(#youngGrad)" filter="url(#dropShadow)"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="white">Young Generation</text>
    <text x="140" y="50" text-anchor="middle" font-family="system-ui" font-size="12" fill="#f0f0f0">(New Space)</text>
    
    <!-- Objects in Young Gen -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="50" height="35" rx="4" fill="#1a1a2e" stroke="#fff" stroke-width="1.5"/>
      <text x="25" y="22" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fff">Obj A</text>
      
      <rect x="60" y="0" width="50" height="35" rx="4" fill="#1a1a2e" stroke="#fff" stroke-width="1.5"/>
      <text x="85" y="22" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fff">Obj B</text>
      
      <rect x="120" y="0" width="50" height="35" rx="4" fill="#1a1a2e" stroke="#fff" stroke-width="1.5"/>
      <text x="145" y="22" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fff">Obj C</text>
      
      <rect x="180" y="0" width="50" height="35" rx="4" fill="#1a1a2e" stroke="#fff" stroke-width="1.5"/>
      <text x="205" y="22" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fff">Obj D</text>
    </g>
    
    <text x="140" y="135" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">• Recently allocated objects</text>
    <text x="140" y="155" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">• Frequent Minor GC (fast)</text>
  </g>
  
  <!-- Arrow: Promotion -->
  <g transform="translate(350, 180)">
    <path d="M 0 0 L 60 0" stroke="#d9a036" stroke-width="4" marker-end="url(#arrowPromote)"/>
    <polygon points="60,0 50,-6 50,6" fill="#d9a036"/>
    <text x="30" y="-10" text-anchor="middle" font-family="system-ui" font-size="11" fill="#d9a036">Survive</text>
    <text x="30" y="25" text-anchor="middle" font-family="system-ui" font-size="11" fill="#d9a036">GC cycles</text>
  </g>
  
  <!-- Old Generation -->
  <g transform="translate(430, 70)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="url(#oldGrad)" filter="url(#dropShadow)"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="white">Old Generation</text>
    <text x="140" y="50" text-anchor="middle" font-family="system-ui" font-size="12" fill="#f0f0f0">(Old Space)</text>
    
    <!-- Objects in Old Gen -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="60" height="40" rx="4" fill="#1a1a2e" stroke="#d9a036" stroke-width="2"/>
      <text x="30" y="24" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fff">Obj E</text>
      
      <rect x="70" y="0" width="60" height="40" rx="4" fill="#1a1a2e" stroke="#d9a036" stroke-width="2"/>
      <text x="100" y="24" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fff">Obj F</text>
      
      <rect x="140" y="0" width="60" height="40" rx="4" fill="#1a1a2e" stroke="#d9a036" stroke-width="2"/>
      <text x="170" y="24" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fff">Obj G</text>
    </g>
    
    <text x="140" y="135" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">• Long-lived objects</text>
    <text x="140" y="155" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">• Infrequent Major GC (slower)</text>
  </g>
  
  <!-- Arrow: Death -->
  <g transform="translate(350, 280)">
    <path d="M 0 0 L 60 0" stroke="#d9534f" stroke-width="3" stroke-dasharray="5,3"/>
    <polygon points="60,0 50,-5 50,5" fill="#d9534f"/>
    <text x="30" y="-10" text-anchor="middle" font-family="system-ui" font-size="11" fill="#d9534f">Die young</text>
    <text x="30" y="25" text-anchor="middle" font-family="system-ui" font-size="11" fill="#d9534f">(garbage)</text>
  </g>
  
  <!-- Large Object Space -->
  <g transform="translate(730, 70)">
    <rect x="0" y="0" width="140" height="180" rx="10" fill="url(#largeGrad)" filter="url(#dropShadow)"/>
    <text x="70" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">Large Object</text>
    <text x="70" y="50" text-anchor="middle" font-family="system-ui" font-size="12" fill="#f0f0f0">Space</text>
    
    <!-- Large objects -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="100" height="50" rx="4" fill="#1a1a2e" stroke="#d9534f" stroke-width="2"/>
      <text x="50" y="29" text-anchor="middle" font-family="system-ui" font-size="9" fill="#fff">Large Array</text>
    </g>
    
    <text x="70" y="145" text-anchor="middle" font-family="system-ui" font-size="10" fill="#f0f0f0">• Objects {'>'} threshold</text>
    <text x="70" y="165" text-anchor="middle" font-family="system-ui" font-size="10" fill="#f0f0f0">• Collected independently</text>
  </g>
  
  <!-- GC Frequency Comparison -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="820" height="180" rx="10" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2"/>
    <text x="410" y="28" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="bold" fill="#4a90d9">GC Frequency &amp; Object Flow</text>
    
    <!-- Timeline -->
    <line x1="40" y1="60" x2="780" y2="60" stroke="#666" stroke-width="2"/>
    
    <!-- Minor GC markers -->
    <g transform="translate(40, 60)">
      <circle cx="0" cy="0" r="6" fill="#4a90d9"/>
      <circle cx="80" cy="0" r="6" fill="#4a90d9"/>
      <circle cx="160" cy="0" r="6" fill="#4a90d9"/>
      <circle cx="240" cy="0" r="6" fill="#4a90d9"/>
      <circle cx="320" cy="0" r="6" fill="#4a90d9"/>
      <circle cx="400" cy="0" r="6" fill="#4a90d9"/>
      <circle cx="480" cy="0" r="6" fill="#4a90d9"/>
      <circle cx="560" cy="0" r="6" fill="#4a90d9"/>
      <circle cx="640" cy="0" r="6" fill="#4a90d9"/>
      <circle cx="720" cy="0" r="6" fill="#4a90d9"/>
      <text x="0" y="25" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4a90d9">Minor GC</text>
    </g>
    
    <!-- Major GC markers -->
    <g transform="translate(40, 100)">
      <circle cx="0" cy="0" r="8" fill="#d9a036"/>
      <circle cx="240" cy="0" r="8" fill="#d9a036"/>
      <circle cx="480" cy="0" r="8" fill="#d9a036"/>
      <circle cx="720" cy="0" r="8" fill="#d9a036"/>
      <text x="0" y="25" text-anchor="middle" font-family="system-ui" font-size="10" fill="#d9a036">Major GC</text>
    </g>
    
    <!-- Object flow visualization -->
    <g transform="translate(40, 130)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#e0e0e0">Objects:</text>
      
      <!-- New objects -->
      <rect x="60" y="-10" width="15" height="15" rx="2" fill="#4a90d9"/>
      <rect x="80" y="-10" width="15" height="15" rx="2" fill="#4a90d9"/>
      <rect x="100" y="-10" width="15" height="15" rx="2" fill="#4a90d9"/>
      <text x="130" y="2" font-family="system-ui" font-size="10" fill="#e0e0e0">New allocations</text>
      
      <!-- Promoted objects -->
      <rect x="240" y="-10" width="15" height="15" rx="2" fill="#d9a036"/>
      <rect x="260" y="-10" width="15" height="15" rx="2" fill="#d9a036"/>
      <text x="290" y="2" font-family="system-ui" font-size="10" fill="#e0e0e0">Promoted (survived)</text>
      
      <!-- Garbage -->
      <rect x="480" y="-10" width="15" height="15" rx="2" fill="#666" opacity="0.5"/>
      <text x="510" y="2" font-family="system-ui" font-size="10" fill="#e0e0e0">Garbage collected</text>
    </g>
  </g>
  
  <!-- Key Insight Box -->
  <g transform="translate(500, 280)">
    <text x="0" y="0" font-family="system-ui" font-size="11" fill="#f0ad4e" font-weight="bold">Key Insight:</text>
    <text x="0" y="20" font-family="system-ui" font-size="10" fill="#e0e0e0">Most objects die young.</text>
    <text x="0" y="38" font-family="system-ui" font-size="10" fill="#e0e0e0">Generational GC optimizes</text>
    <text x="0" y="56" font-family="system-ui" font-size="10" fill="#e0e0e0">for this pattern by collecting</text>
    <text x="0" y="74" font-family="system-ui" font-size="10" fill="#e0e0e0">young objects frequently and</text>
    <text x="0" y="92" font-family="system-ui" font-size="10" fill="#e0e0e0">old objects rarely.</text>
  </g>
</svg>
