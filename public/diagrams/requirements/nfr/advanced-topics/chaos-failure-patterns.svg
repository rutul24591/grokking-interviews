<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Common Failure Patterns for Chaos Testing</text>
  
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Latency Spike</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Network congestion</text>
  <text x="65" y="145" font-size="9" class="text-primary">• GC pauses</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Resource contention</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Database locks</text>
  <rect x="70" y="195" width="200" height="30" rx="2" class="highlight-red" stroke-width="1"/>
  <text x="170" y="215" text-anchor="middle" font-size="9" class="text-primary">Inject: 500ms-5s delay</text>
  
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Service Outage</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Pod crashes</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Process killed</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Network partition</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Dependency failure</text>
  <rect x="355" y="195" width="200" height="30" rx="2" class="highlight-red" stroke-width="1"/>
  <text x="455" y="215" text-anchor="middle" font-size="9" class="text-primary">Inject: Kill pod/process</text>
  
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Resource Exhaustion</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• CPU saturation</text>
  <text x="635" y="145" font-size="9" class="text-primary">• Memory pressure</text>
  <text x="635" y="160" font-size="9" class="text-primary">• Disk full</text>
  <text x="635" y="175" font-size="9" class="text-primary">• Connection pool drain</text>
  <rect x="640" y="195" width="200" height="30" rx="2" class="highlight-red" stroke-width="1"/>
  <text x="740" y="215" text-anchor="middle" font-size="9" class="text-primary">Inject: Stress CPU/mem</text>
  
  <rect x="30" y="270" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="295" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Data Corruption</text>
  <rect x="50" y="310" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="330" font-size="9" class="text-primary">• Invalid responses</text>
  <text x="65" y="345" font-size="9" class="text-primary">• Schema violations</text>
  <text x="65" y="360" font-size="9" class="text-primary">• Truncated data</text>
  <text x="65" y="375" font-size="9" class="text-primary">• Encoding errors</text>
  <rect x="70" y="395" width="200" height="30" rx="2" class="highlight-purple" stroke-width="1"/>
  <text x="170" y="415" text-anchor="middle" font-size="9" class="text-primary">Inject: Mutate responses</text>
  
  <rect x="315" y="270" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="295" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Cascading Failure</text>
  <rect x="335" y="310" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="330" font-size="9" class="text-primary">• Retry storms</text>
  <text x="350" y="345" font-size="9" class="text-primary">• Circuit breaker trips</text>
  <text x="350" y="360" font-size="9" class="text-primary">• Queue backpressure</text>
  <text x="350" y="375" font-size="9" class="text-primary">• Thread pool exhaustion</text>
  <rect x="355" y="395" width="200" height="30" rx="2" class="highlight-red" stroke-width="1"/>
  <text x="455" y="415" text-anchor="middle" font-size="9" class="text-primary">Inject: Slow dependency</text>
  
  <rect x="600" y="270" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="295" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">State Inconsistency</text>
  <rect x="620" y="310" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="330" font-size="9" class="text-primary">• Cache staleness</text>
  <text x="635" y="345" font-size="9" class="text-primary">• Replication lag</text>
  <text x="635" y="360" font-size="9" class="text-primary">• Clock skew</text>
  <text x="635" y="375" font-size="9" class="text-primary">• Race conditions</text>
  <rect x="640" y="395" width="200" height="30" rx="2" class="highlight-purple" stroke-width="1"/>
  <text x="740" y="415" text-anchor="middle" font-size="9" class="text-primary">Inject: Clock skew</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>