<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow18" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad18)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">Progressive Enhancement in Modern Frameworks</text>
  
  <!-- CSR (No PE) -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="200" height="200" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow18)"/>
    <text x="100" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#d9534f">CSR (No PE)</text>
    
    <!-- Empty HTML -->
    <rect x="20" y="45" width="160" height="50" rx="4" fill="#1a1a2e" stroke="#d9534f"/>
    <text x="100" y="75" text-anchor="middle" font-family="monospace" font-size="9" fill="#d9534f">&amp;lt;div id="root"&amp;gt;&amp;lt;/div&amp;gt;</text>
    <text x="100" y="95" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Empty without JS</text>
    
    <!-- JS required -->
    <rect x="20" y="110" width="160" height="70" rx="4" fill="#f0ad4e" opacity="0.3" stroke="#f0ad4e"/>
    <text x="100" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">JavaScript loads</text>
    <text x="100" y="155" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Renders content</text>
    <text x="100" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">✗ No JS = No content</text>
  </g>
  
  <!-- SSR (Basic PE) -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="200" height="200" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow18)"/>
    <text x="100" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#67b26f">SSR (Basic PE)</text>
    
    <!-- HTML with content -->
    <rect x="20" y="45" width="160" height="50" rx="4" fill="#67b26f" opacity="0.4" stroke="#67b26f"/>
    <text x="100" y="65" text-anchor="middle" font-family="monospace" font-size="8" fill="#e0e0e0">&amp;lt;html&amp;gt;Full content&amp;lt;/html&amp;gt;</text>
    <text x="100" y="90" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Content visible immediately</text>
    
    <!-- Hydration -->
    <rect x="20" y="110" width="160" height="70" rx="4" fill="#4a90d9" opacity="0.3" stroke="#4a90d9"/>
    <text x="100" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">JavaScript hydrates</text>
    <text x="100" y="155" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Adds interactivity</text>
    <text x="100" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Works without JS</text>
  </g>
  
  <!-- Progressive Hydration -->
  <g transform="translate(470, 60)">
    <rect x="0" y="0" width="200" height="200" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow18)"/>
    <text x="100" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#f0ad4e">Progressive Hydration</text>
    
    <!-- HTML with content -->
    <rect x="20" y="45" width="160" height="40" rx="4" fill="#67b26f" opacity="0.4" stroke="#67b26f"/>
    <text x="100" y="70" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Full HTML content</text>
    
    <!-- Staged hydration -->
    <rect x="20" y="95" width="160" height="85" rx="4" fill="#1a1a2e" stroke="#f0ad4e"/>
    
    <!-- Stage 1 -->
    <rect x="30" y="105" width="140" height="20" rx="3" fill="#f0ad4e" opacity="0.8"/>
    <text x="100" y="119" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">1. Critical components</text>
    
    <!-- Stage 2 -->
    <rect x="30" y="130" width="140" height="20" rx="3" fill="#f0ad4e" opacity="0.5"/>
    <text x="100" y="144" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">2. Visible components</text>
    
    <!-- Stage 3 -->
    <rect x="30" y="155" width="140" height="20" rx="3" fill="#f0ad4e" opacity="0.3"/>
    <text x="100" y="169" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">3. Deferred components</text>
  </g>
  
  <!-- Islands Architecture -->
  <g transform="translate(690, 60)">
    <rect x="0" y="0" width="200" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow18)"/>
    <text x="100" y="30" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="bold" fill="#4a90d9">Islands Architecture</text>
    
    <!-- Static HTML -->
    <rect x="20" y="45" width="160" height="100" rx="4" fill="#67b26f" opacity="0.3" stroke="#67b26f"/>
    <text x="100" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Static HTML</text>
    <text x="100" y="95" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">(no JS needed)</text>
    <text x="100" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Content, layout, links</text>
    <text x="100" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Works without JS</text>
    
    <!-- Interactive Islands -->
    <rect x="35" y="155" width="50" height="35" rx="4" fill="#f0ad4e" opacity="0.7"/>
    <text x="60" y="177" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">Island 1</text>
    
    <rect x="95" y="155" width="50" height="35" rx="4" fill="#d9534f" opacity="0.7"/>
    <text x="120" y="177" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">Island 2</text>
    
    <text x="100" y="195" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Minimal JS</text>
  </g>
  
  <!-- Comparison Table -->
  <g transform="translate(30, 280)">
    <rect x="0" y="0" width="850" height="190" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow18)"/>
    <text x="425" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Framework Approach Comparison</text>
    
    <!-- Table headers -->
    <text x="150" y="55" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#e0e0e0">Approach</text>
    <text x="300" y="55" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#e0e0e0">Content without JS</text>
    <text x="480" y="55" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#e0e0e0">JS Bundle Size</text>
    <text x="650" y="55" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#e0e0e0">Best For</text>
    
    <!-- CSR row -->
    <text x="150" y="80" text-anchor="middle" font-family="system-ui" font-size="10" fill="#d9534f">CSR</text>
    <text x="300" y="80" text-anchor="middle" font-family="system-ui" font-size="10" fill="#d9534f">✗ No content</text>
    <text x="480" y="80" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Full app</text>
    <text x="650" y="80" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Dashboards, authenticated apps</text>
    
    <!-- SSR row -->
    <text x="150" y="105" text-anchor="middle" font-family="system-ui" font-size="10" fill="#67b26f">SSR</text>
    <text x="300" y="105" text-anchor="middle" font-family="system-ui" font-size="10" fill="#67b26f">✓ Full content</text>
    <text x="480" y="105" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Full app</text>
    <text x="650" y="105" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Content sites, e-commerce</text>
    
    <!-- Progressive Hydration row -->
    <text x="150" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#f0ad4e">Progressive Hydration</text>
    <text x="300" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#67b26f">✓ Full content</text>
    <text x="480" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Loaded progressively</text>
    <text x="650" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Large apps, better TTI</text>
    
    <!-- Islands row -->
    <text x="150" y="155" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4a90d9">Islands Architecture</text>
    <text x="300" y="155" text-anchor="middle" font-family="system-ui" font-size="10" fill="#67b26f">✓ Full content</text>
    <text x="480" y="155" text-anchor="middle" font-family="system-ui" font-size="10" fill="#67b26f">Minimal (islands only)</text>
    <text x="650" y="155" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Content sites, blogs</text>
    
    <!-- Frameworks row -->
    <text x="150" y="185" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Frameworks:</text>
    <text x="300" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#d9534f">React SPA</text>
    <text x="480" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#67b26f">Next.js, Nuxt</text>
    <text x="650" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="#4a90d9">Astro, Fresh</text>
    
    <!-- Key insight -->
    <text x="425" y="215" text-anchor="middle" font-family="system-ui" font-size="10" fill="#f0ad4e">Islands Architecture provides best PE with minimal JavaScript</text>
    
    <!-- Examples -->
    <text x="150" y="245" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Examples:</text>
    <text x="300" y="245" text-anchor="middle" font-family="system-ui" font-size="9" fill="#d9534f">Create React App</text>
    <text x="480" y="245" text-anchor="middle" font-family="system-ui" font-size="9" fill="#67b26f">Next.js SSR</text>
    <text x="650" y="245" text-anchor="middle" font-family="system-ui" font-size="9" fill="#4a90d9">Astro, Qwik</text>
  </g>
  
  <!-- Recommendation -->
  <g transform="translate(30, 480)">
    <text x="425" y="0" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#e0e0e0">
      Recommendation: Use SSR or Islands Architecture for public-facing content. CSR is acceptable for authenticated dashboards where all users have JS enabled.
    </text>
  </g>
</svg>
