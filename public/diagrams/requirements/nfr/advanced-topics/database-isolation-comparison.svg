<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Database Isolation Comparison</text>
  
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Database-per-Tenant</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <rect x="70" y="125" width="190" height="35" rx="2" class="accent-box" stroke-width="1"/>
  <text x="165" y="147" text-anchor="middle" font-size="9" class="text-primary">Tenant A Database</text>
  <rect x="70" y="165" width="190" height="35" rx="2" class="accent-box" stroke-width="1"/>
  <text x="165" y="187" text-anchor="middle" font-size="9" class="text-primary">Tenant B Database</text>
  <rect x="70" y="205" width="190" height="35" rx="2" class="accent-box" stroke-width="1"/>
  <text x="165" y="227" text-anchor="middle" font-size="9" class="text-primary">Tenant C Database</text>
  
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Schema-per-Tenant</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <rect x="355" y="125" width="190" height="30" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="450" y="145" text-anchor="middle" font-size="8" class="text-primary">DB: shared_db</text>
  <text x="450" y="155" text-anchor="middle" font-size="8" class="text-primary">Schema: tenant_a</text>
  <rect x="355" y="160" width="190" height="30" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="450" y="180" text-anchor="middle" font-size="8" class="text-primary">DB: shared_db</text>
  <text x="450" y="190" text-anchor="middle" font-size="8" class="text-primary">Schema: tenant_b</text>
  
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="13" font-weight="bold" class="text-primary">Shared Table</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <rect x="640" y="125" width="190" height="100" rx="2" class="box-base" stroke-width="1"/>
  <text x="655" y="145" font-size="8" class="text-primary">tenant_id</text>
  <text x="730" y="145" font-size="8" class="text-primary">data</text>
  <text x="655" y="160" font-size="7" class="text-secondary">A</text>
  <text x="730" y="160" font-size="7" class="text-secondary">{...}</text>
  <text x="655" y="175" font-size="7" class="text-secondary">B</text>
  <text x="730" y="175" font-size="7" class="text-secondary">{...}</text>
  <text x="655" y="190" font-size="7" class="text-secondary">C</text>
  <text x="730" y="190" font-size="7" class="text-secondary">{...}</text>
  <text x="655" y="205" font-size="7" class="text-secondary">...</text>
  
  <rect x="30" y="270" width="840" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Trade-off Comparison</text>
  
  <rect x="50" y="310" width="800" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="100" y="330" font-size="9" font-weight="bold" class="text-primary">Pattern</text>
  <text x="250" y="330" font-size="9" font-weight="bold" class="text-primary">Isolation</text>
  <text x="400" y="330" font-size="9" font-weight="bold" class="text-primary">Cost</text>
  <text x="550" y="330" font-size="9" font-weight="bold" class="text-primary">Ops Complexity</text>
  <text x="700" y="330" font-size="9" font-weight="bold" class="text-primary">Use Case</text>
  
  <line x1="80" y1="340" x2="820" y2="340" class="arrow" stroke-width="1"/>
  <text x="100" y="355" font-size="8" class="text-primary">DB-per-Tenant</text>
  <text x="250" y="355" font-size="8" class="highlight-green">★★★★★</text>
  <text x="400" y="355" font-size="8" class="highlight-red">★</text>
  <text x="550" y="355" font-size="8" class="highlight-red">High</text>
  <text x="700" y="355" font-size="8" class="text-secondary">Enterprise</text>
  
  <line x1="80" y1="370" x2="820" y2="370" class="arrow" stroke-width="1"/>
  <text x="100" y="385" font-size="8" class="text-primary">Schema-per-Tenant</text>
  <text x="250" y="385" font-size="8" class="highlight-blue">★★★★</text>
  <text x="400" y="385" font-size="8" class="highlight-purple">★★★</text>
  <text x="550" y="385" font-size="8" class="highlight-purple">Medium</text>
  <text x="700" y="385" font-size="8" class="text-secondary">SaaS</text>
  
  <line x1="80" y1="400" x2="820" y2="400" class="arrow" stroke-width="1"/>
  <text x="100" y="415" font-size="8" class="text-primary">Shared Table</text>
  <text x="250" y="415" font-size="8" class="highlight-red">★★</text>
  <text x="400" y="415" font-size="8" class="highlight-green">★★★★★</text>
  <text x="550" y="415" font-size="8" class="highlight-green">Low</text>
  <text x="700" y="415" font-size="8" class="text-secondary">Startups</text>
  
  <line x1="80" y1="430" x2="820" y2="430" class="arrow" stroke-width="1"/>
  <text x="100" y="445" font-size="8" class="text-primary">Hybrid Pool</text>
  <text x="250" y="445" font-size="8" class="highlight-blue">★★★</text>
  <text x="400" y="445" font-size="8" class="highlight-blue">★★★★</text>
  <text x="550" y="445" font-size="8" class="highlight-blue">Medium</text>
  <text x="700" y="445" font-size="8" class="text-secondary">Tiered</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>