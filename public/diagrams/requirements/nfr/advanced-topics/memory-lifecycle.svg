<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stageGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67b26f;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGradient)"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">JavaScript Memory Lifecycle</text>
  
  <!-- Stage 1: Allocation -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="url(#stageGradient)" filter="url(#shadow)"/>
    <text x="80" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">1. Allocation</text>
    <text x="80" y="60" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Variable creation</text>
    <text x="80" y="78" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Object instantiation</text>
  </g>
  
  <!-- Arrow 1 -->
  <g transform="translate(250, 140)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#67b26f" stroke-width="3" marker-end="url(#arrowhead)"/>
    <polygon points="40,0 30,-5 30,5" fill="#67b26f"/>
  </g>
  
  <!-- Stage 2: Usage -->
  <g transform="translate(300, 100)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="url(#stageGradient)" filter="url(#shadow)"/>
    <text x="80" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">2. Usage</text>
    <text x="80" y="60" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Read/Write operations</text>
    <text x="80" y="78" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Function execution</text>
  </g>
  
  <!-- Arrow 2 -->
  <g transform="translate(470, 140)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#67b26f" stroke-width="3"/>
    <polygon points="40,0 30,-5 30,5" fill="#67b26f"/>
  </g>
  
  <!-- Stage 3: Reachability Analysis -->
  <g transform="translate(520, 100)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="url(#stageGradient)" filter="url(#shadow)"/>
    <text x="80" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">3. Reachability</text>
    <text x="80" y="60" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">GC traverses from roots</text>
    <text x="80" y="78" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Marks reachable objects</text>
  </g>
  
  <!-- Arrow 3 -->
  <g transform="translate(690, 140)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#67b26f" stroke-width="3"/>
    <polygon points="40,0 30,-5 30,5" fill="#67b26f"/>
  </g>
  
  <!-- Stage 4: Deallocation -->
  <g transform="translate(740, 100)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="url(#stageGradient)" filter="url(#shadow)"/>
    <text x="80" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">4. Deallocation</text>
    <text x="80" y="60" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Unmarked objects freed</text>
    <text x="80" y="78" text-anchor="middle" font-family="system-ui" font-size="11" fill="#f0f0f0">Memory reclaimed</text>
  </g>
  
  <!-- GC Cycle Arrow (curved arrow at bottom) -->
  <path d="M 450 380 Q 450 420 150 420 Q 80 420 80 350" fill="none" stroke="#4a90d9" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/>
  <polygon points="80,350 75,360 85,360" fill="#4a90d9"/>
  <text x="450" y="445" text-anchor="middle" font-family="system-ui" font-size="13" fill="#4a90d9">Garbage Collection Cycle (Continuous)</text>
  
  <!-- Roots Section -->
  <g transform="translate(80, 280)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2"/>
    <text x="100" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Memory Roots</text>
    <text x="20" y="50" font-family="system-ui" font-size="11" fill="#e0e0e0">• Global Object (window)</text>
    <text x="20" y="70" font-family="system-ui" font-size="11" fill="#e0e0e0">• Call Stack (local vars)</text>
    <text x="20" y="90" font-family="system-ui" font-size="11" fill="#e0e0e0">• DOM References</text>
    <text x="20" y="110" font-family="system-ui" font-size="11" fill="#e0e0e0">• Closures</text>
  </g>
  
  <!-- Reachable vs Unreachable -->
  <g transform="translate(620, 280)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2"/>
    <text x="140" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">GC Decision</text>
    <g transform="translate(15, 45)">
      <circle cx="10" cy="8" r="5" fill="#67b26f"/>
      <text x="25" y="13" font-family="system-ui" font-size="11" fill="#e0e0e0">Reachable → Keep in memory</text>
      <circle cx="10" cy="35" r="5" fill="#d9534f"/>
      <text x="25" y="40" font-family="system-ui" font-size="11" fill="#e0e0e0">Unreachable → Garbage collect</text>
      <circle cx="10" cy="62" r="5" fill="#f0ad4e"/>
      <text x="25" y="67" font-family="system-ui" font-size="11" fill="#e0e0e0">Promoted to Old Generation</text>
    </g>
  </g>
</svg>
