<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="1000" height="550" class="bg-base"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Feature Flag Architecture</text>
  
  <!-- Flag Evaluation Flow -->
  <rect x="30" y="70" width="450" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="255" y="95" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">Flag Evaluation Flow</text>
  
  <rect x="50" y="110" width="120" height="50" rx="3" class="accent-box" stroke-width="1.5"/>
  <text x="110" y="135" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">User Request</text>
  
  <line x1="170" y1="135" x2="200" y2="135" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="200" y="110" width="130" height="50" rx="3" class="highlight-box" stroke-width="1.5"/>
  <text x="265" y="130" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Flag Service</text>
  <text x="265" y="150" text-anchor="middle" font-size="8" class="text-secondary">Evaluate rules</text>
  
  <line x1="330" y1="135" x2="360" y2="135" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="360" y="110" width="100" height="50" rx="3" class="highlight-green" stroke-width="1.5"/>
  <text x="410" y="135" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Variant A/B</text>
  
  <!-- Targeting Rules -->
  <rect x="50" y="180" width="410" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="255" y="200" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Targeting Rules (Evaluated in Order)</text>
  <text x="70" y="220" font-size="9" class="text-primary">1. User ID whitelist → Variant A</text>
  <text x="70" y="235" font-size="9" class="text-primary">2. Percentage rollout → 10% Variant B</text>
  <text x="70" y="250" font-size="9" class="text-primary">3. Default → Variant A</text>
  
  <!-- Server-side vs Client-side -->
  <rect x="500" y="70" width="470" height="200" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">Server-side vs Client-side Evaluation</text>
  
  <rect x="520" y="110" width="210" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="625" y="130" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Server-side</text>
  <rect x="540" y="145" width="170" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="625" y="162" text-anchor="middle" font-size="9" class="text-primary">✓ Secure (no exposure)</text>
  <rect x="540" y="175" width="170" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="625" y="192" text-anchor="middle" font-size="9" class="text-primary">✓ Instant changes</text>
  <rect x="540" y="205" width="170" height="25" rx="2" class="accent-box" stroke-width="1"/>
  <text x="625" y="222" text-anchor="middle" font-size="9" class="text-primary">⚠ API call overhead</text>
  <rect x="540" y="235" width="170" height="25" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="625" y="252" text-anchor="middle" font-size="9" class="text-primary">Best for: Auth, pricing</text>
  
  <rect x="750" y="110" width="200" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="850" y="130" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Client-side</text>
  <rect x="770" y="145" width="160" height="25" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="850" y="162" text-anchor="middle" font-size="9" class="text-primary">✓ No API latency</text>
  <rect x="770" y="175" width="160" height="25" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="850" y="192" text-anchor="middle" font-size="9" class="text-primary">✓ Works offline</text>
  <rect x="770" y="205" width="160" height="25" rx="2" class="highlight-red" stroke-width="1"/>
  <text x="850" y="222" text-anchor="middle" font-size="9" class="text-primary">⚠ Flag logic exposed</text>
  <rect x="770" y="235" width="160" height="25" rx="2" class="highlight-blue" stroke-width="1"/>
  <text x="850" y="252" text-anchor="middle" font-size="9" class="text-primary">Best for: UI variants</text>
  
  <!-- Flag Lifecycle -->
  <rect x="30" y="290" width="940" height="230" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="500" y="315" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">Flag Lifecycle</text>
  
  <!-- Proposed -->
  <rect x="60" y="340" width="160" height="80" rx="5" class="box-base" stroke-width="2"/>
  <text x="140" y="365" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Proposed</text>
  <text x="140" y="385" text-anchor="middle" font-size="8" class="text-secondary">Flag created</text>
  <text x="140" y="400" text-anchor="middle" font-size="8" class="text-secondary">RFC review</text>
  <text x="140" y="415" text-anchor="middle" font-size="8" class="text-secondary">Team approval</text>
  
  <line x1="220" y1="380" x2="260" y2="380" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Active -->
  <rect x="260" y="340" width="160" height="80" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="340" y="365" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Active</text>
  <text x="340" y="385" text-anchor="middle" font-size="8" class="text-secondary">Gradual rollout</text>
  <text x="340" y="400" text-anchor="middle" font-size="8" class="text-secondary">Monitoring</text>
  <text x="340" y="415" text-anchor="middle" font-size="8" class="text-secondary">A/B testing</text>
  
  <line x1="420" y1="380" x2="460" y2="380" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Full Rollout -->
  <rect x="460" y="340" width="160" height="80" rx="5" class="highlight-green" stroke-width="2"/>
  <text x="540" y="365" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Full Rollout</text>
  <text x="540" y="385" text-anchor="middle" font-size="8" class="text-secondary">100% users</text>
  <text x="540" y="400" text-anchor="middle" font-size="8" class="text-secondary">Stable</text>
  <text x="540" y="415" text-anchor="middle" font-size="8" class="text-secondary">Success metrics</text>
  
  <line x1="620" y1="380" x2="660" y2="380" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Deprecated -->
  <rect x="660" y="340" width="160" height="80" rx="5" class="highlight-purple" stroke-width="2"/>
  <text x="740" y="365" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Deprecated</text>
  <text x="740" y="385" text-anchor="middle" font-size="8" class="text-secondary">Cleanup planned</text>
  <text x="740" y="400" text-anchor="middle" font-size="8" class="text-secondary">Code removal</text>
  <text x="740" y="415" text-anchor="middle" font-size="8" class="text-secondary">Flag archival</text>
  
  <line x1="820" y1="380" x2="860" y2="380" class="arrow" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Removed -->
  <rect x="860" y="340" width="80" height="80" rx="5" class="box-base" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="900" y="375" text-anchor="middle" font-size="12" font-weight="bold" class="text-secondary">Removed</text>
  <text x="900" y="410" text-anchor="middle" font-size="8" class="text-secondary">Complete</text>
  
  <!-- Best Practices -->
  <rect x="60" y="440" width="880" height="60" rx="3" class="box-base" stroke-width="1"/>
  <text x="500" y="460" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Best Practices</text>
  <text x="100" y="480" font-size="9" class="text-primary">• Use meaningful flag names (feature_checkout_v2, not flag_123)</text>
  <text x="350" y="480" font-size="9" class="text-primary">• Document expected lifespan at creation</text>
  <text x="600" y="480" font-size="9" class="text-primary">• Set expiration date for cleanup reminder</text>
  <text x="100" y="495" font-size="9" class="text-primary">• Audit flag changes with approval workflow</text>
  <text x="350" y="495" font-size="9" class="text-primary">• Monitor flag evaluation performance</text>
  <text x="600" y="495" font-size="9" class="text-primary">• Remove flags after full rollout (30-90 days)</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>