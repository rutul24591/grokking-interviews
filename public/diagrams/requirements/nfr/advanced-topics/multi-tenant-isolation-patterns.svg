<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="1000" height="550" class="bg-base"/>
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" class="text-primary">Multi-Tenant Isolation Patterns</text>
  
  <!-- Database-per-Tenant -->
  <rect x="30" y="70" width="300" height="220" rx="5" class="box-base" stroke-width="2"/>
  <text x="180" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Database-per-Tenant</text>
  
  <rect x="50" y="110" width="260" height="80" rx="3" class="box-base" stroke-width="1"/>
  <rect x="70" y="125" width="80" height="50" rx="2" class="accent-box" stroke-width="1"/>
  <text x="110" y="145" text-anchor="middle" font-size="8" class="text-primary">Tenant A DB</text>
  <rect x="160" y="125" width="80" height="50" rx="2" class="accent-box" stroke-width="1"/>
  <text x="200" y="145" text-anchor="middle" font-size="8" class="text-primary">Tenant B DB</text>
  <rect x="70" y="180" width="80" height="50" rx="2" class="accent-box" stroke-width="1"/>
  <text x="110" y="200" text-anchor="middle" font-size="8" class="text-primary">Tenant C DB</text>
  <rect x="160" y="180" width="80" height="50" rx="2" class="accent-box" stroke-width="1"/>
  <text x="200" y="200" text-anchor="middle" font-size="8" class="text-primary">Tenant D DB</text>
  
  <rect x="50" y="200" width="260" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="70" y="220" font-size="8" class="highlight-green">✓ Maximum isolation</text>
  <text x="70" y="235" font-size="8" class="highlight-green">✓ Easy compliance</text>
  <text x="70" y="250" font-size="8" class="highlight-red">⚠ Highest cost</text>
  <text x="70" y="265" font-size="8" class="highlight-red">⚠ Complex ops</text>
  
  <!-- Schema-per-Tenant -->
  <rect x="350" y="70" width="300" height="220" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="500" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Schema-per-Tenant</text>
  
  <rect x="370" y="110" width="260" height="80" rx="3" class="box-base" stroke-width="1"/>
  <rect x="390" y="125" width="220" height="20" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="500" y="139" text-anchor="middle" font-size="8" class="text-primary">Tenant A Schema</text>
  <rect x="390" y="150" width="220" height="20" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="500" y="164" text-anchor="middle" font-size="8" class="text-primary">Tenant B Schema</text>
  <rect x="390" y="175" width="220" height="20" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="500" y="189" text-anchor="middle" font-size="8" class="text-primary">Tenant C Schema</text>
  
  <rect x="370" y="200" width="260" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="390" y="220" font-size="8" class="highlight-green">✓ Good isolation</text>
  <text x="390" y="235" font-size="8" class="highlight-green">✓ Shared infrastructure</text>
  <text x="390" y="250" font-size="8" class="highlight-purple">⚠ Schema management</text>
  <text x="390" y="265" font-size="8" class="highlight-purple">⚠ Medium cost</text>
  
  <!-- Shared Table -->
  <rect x="670" y="70" width="300" height="220" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="820" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Shared Table</text>
  
  <rect x="690" y="110" width="260" height="80" rx="3" class="box-base" stroke-width="1"/>
  <rect x="710" y="125" width="220" height="55" rx="2" class="box-base" stroke-width="1"/>
  <text x="820" y="140" text-anchor="middle" font-size="8" class="text-primary">tenant_id | data</text>
  <text x="820" y="155" text-anchor="middle" font-size="8" class="text-secondary">A | {...}</text>
  <text x="820" y="170" text-anchor="middle" font-size="8" class="text-secondary">B | {...}</text>
  
  <rect x="690" y="200" width="260" height="75" rx="3" class="box-base" stroke-width="1"/>
  <text x="710" y="220" font-size="8" class="highlight-green">✓ Lowest cost</text>
  <text x="710" y="235" font-size="8" class="highlight-green">✓ Simple ops</text>
  <text x="710" y="250" font-size="8" class="highlight-red">⚠ Weakest isolation</text>
  <text x="710" y="265" font-size="8" class="highlight-red">⚠ Noisy neighbor risk</text>
  
  <!-- Comparison Matrix -->
  <rect x="30" y="310" width="940" height="210" rx="5" class="box-base" stroke-width="2"/>
  <text x="500" y="335" text-anchor="middle" font-size="16" font-weight="bold" class="text-primary">Isolation Pattern Comparison</text>
  
  <rect x="50" y="350" width="900" height="155" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Header -->
  <text x="100" y="370" font-size="9" font-weight="bold" class="text-primary">Pattern</text>
  <text x="250" y="370" font-size="9" font-weight="bold" class="text-primary">Isolation</text>
  <text x="400" y="370" font-size="9" font-weight="bold" class="text-primary">Cost</text>
  <text x="550" y="370" font-size="9" font-weight="bold" class="text-primary">Complexity</text>
  <text x="700" y="370" font-size="9" font-weight="bold" class="text-primary">Best For</text>
  
  <!-- Row 1 -->
  <line x1="80" y1="380" x2="920" y2="380" class="arrow" stroke-width="1"/>
  <text x="100" y="395" font-size="8" class="text-primary">Database-per-Tenant</text>
  <text x="250" y="395" font-size="8" class="highlight-green">Maximum</text>
  <text x="400" y="395" font-size="8" class="highlight-red">$$$$</text>
  <text x="550" y="395" font-size="8" class="highlight-red">High</text>
  <text x="700" y="395" font-size="8" class="text-secondary">Enterprise, compliance</text>
  
  <!-- Row 2 -->
  <line x1="80" y1="410" x2="920" y2="410" class="arrow" stroke-width="1"/>
  <text x="100" y="425" font-size="8" class="text-primary">Schema-per-Tenant</text>
  <text x="250" y="425" font-size="8" class="highlight-blue">High</text>
  <text x="400" y="425" font-size="8" class="highlight-purple">$$$</text>
  <text x="550" y="425" font-size="8" class="highlight-purple">Medium</text>
  <text x="700" y="425" font-size="8" class="text-secondary">SaaS, multi-tenant</text>
  
  <!-- Row 3 -->
  <line x1="80" y1="440" x2="920" y2="440" class="arrow" stroke-width="1"/>
  <text x="100" y="455" font-size="8" class="text-primary">Shared Table</text>
  <text x="250" y="455" font-size="8" class="highlight-red">Low</text>
  <text x="400" y="455" font-size="8" class="highlight-green">$</text>
  <text x="550" y="455" font-size="8" class="highlight-green">Low</text>
  <text x="700" y="455" font-size="8" class="text-secondary">Startups, SMB</text>
  
  <!-- Row 4 -->
  <line x1="80" y1="470" x2="920" y2="470" class="arrow" stroke-width="1"/>
  <text x="100" y="485" font-size="8" class="text-primary">Hybrid (Pool)</text>
  <text x="250" y="485" font-size="8" class="highlight-blue">Medium</text>
  <text x="400" y="485" font-size="8" class="highlight-blue">$$</text>
  <text x="550" y="485" font-size="8" class="highlight-blue">Medium</text>
  <text x="700" y="485" font-size="8" class="text-secondary">Tiered offerings</text>
  
  <!-- Selection Guide -->
  <rect x="50" y="350" width="900" height="155" rx="3" class="box-base" stroke-width="1" fill="none"/>
  
  <!-- Use Case Guide -->
  <rect x="30" y="540" width="940" height="80" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="500" y="560" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Selection Guide: Choose Based On</text>
  <rect x="50" y="575" width="220" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="160" y="595" text-anchor="middle" font-size="9" class="text-primary">Compliance needs?</text>
  <rect x="280" y="575" width="220" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="390" y="595" text-anchor="middle" font-size="9" class="text-primary">Budget constraints?</text>
  <rect x="510" y="575" width="220" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="620" y="595" text-anchor="middle" font-size="9" class="text-primary">Tenant count?</text>
  <rect x="740" y="575" width="220" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="850" y="595" text-anchor="middle" font-size="9" class="text-primary">Noisy neighbor risk?</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>