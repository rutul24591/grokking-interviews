<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Micro-Frontend Integration Patterns</text>
  
  <!-- Integration Approaches -->
  <rect x="30" y="70" width="270" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Build-Time Integration</text>
  
  <rect x="50" y="110" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• NPM package dependencies</text>
  <text x="65" y="145" font-size="9" class="text-primary">• Module federation</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Monorepo approach</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Build-time composition</text>
  <text x="65" y="190" font-size="9" class="text-primary">• Single deployment artifact</text>
  <text x="65" y="205" font-size="9" class="highlight-green">✓ Simple deployment</text>
  <text x="65" y="220" font-size="9" class="highlight-red">⚠ Coupled releases</text>
  <text x="65" y="235" font-size="9" class="text-primary">• Shared dependencies</text>
  <text x="65" y="250" font-size="9" class="text-primary">• Coordinated builds</text>
  
  <!-- Run-Time Integration -->
  <rect x="315" y="70" width="270" height="200" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Run-Time Integration</text>
  
  <rect x="335" y="110" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Script tag injection</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Dynamic imports</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Independent deployments</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Team autonomy</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Version isolation</text>
  <text x="350" y="205" font-size="9" class="highlight-green">✓ Independent deploys</text>
  <text x="350" y="220" font-size="9" class="highlight-purple">⚠ Runtime overhead</text>
  <text x="350" y="235" font-size="9" class="text-primary">• CDN distribution</text>
  <text x="350" y="250" font-size="9" class="text-primary">• Version negotiation</text>
  
  <!-- Iframe Integration -->
  <rect x="600" y="70" width="270" height="200" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Iframe Integration</text>
  
  <rect x="620" y="110" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Complete isolation</text>
  <text x="635" y="145" font-size="9" class="text-primary">• Separate tech stacks</text>
  <text x="635" y="160" font-size="9" class="text-primary">• postMessage API</text>
  <text x="635" y="175" font-size="9" class="text-primary">• CSS isolation</text>
  <text x="635" y="190" font-size="9" class="text-primary">• No JS conflicts</text>
  <text x="635" y="205" font-size="9" class="highlight-green">✓ Maximum isolation</text>
  <text x="635" y="220" font-size="9" class="highlight-red">⚠ UX limitations</text>
  <text x="635" y="235" font-size="9" class="text-primary">• Communication overhead</text>
  <text x="635" y="250" font-size="9" class="text-primary">• SEO challenges</text>
  
  <!-- Communication Patterns -->
  <rect x="30" y="290" width="410" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="235" y="315" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Communication Patterns</text>
  
  <rect x="50" y="330" width="370" height="125" rx="3" class="box-base" stroke-width="1"/>
  
  <rect x="70" y="345" width="330" height="35" rx="2" class="accent-box" stroke-width="1"/>
  <text x="235" y="365" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Custom Events</text>
  <text x="235" y="375" text-anchor="middle" font-size="8" class="text-primary">window.dispatchEvent / window.addEventListener</text>
  
  <rect x="70" y="385" width="330" height="35" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="235" y="405" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Shared State Store</text>
  <text x="235" y="415" text-anchor="middle" font-size="8" class="text-primary">Redux, Zustand, or custom pub/sub</text>
  
  <rect x="70" y="430" width="330" height="20" rx="2" class="highlight-purple" stroke-width="1"/>
  <text x="235" y="444" text-anchor="middle" font-size="8" class="text-primary">postMessage for iframe communication</text>
  
  <!-- Routing Strategies -->
  <rect x="460" y="290" width="410" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="665" y="315" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Routing Strategies</text>
  
  <rect x="480" y="330" width="370" height="125" rx="3" class="box-base" stroke-width="1"/>
  
  <rect x="500" y="345" width="330" height="35" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="665" y="365" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Client-Side Routing</text>
  <text x="665" y="375" text-anchor="middle" font-size="8" class="text-primary">React Router, Vue Router at shell level</text>
  
  <rect x="500" y="385" width="330" height="35" rx="2" class="highlight-blue" stroke-width="1"/>
  <text x="665" y="405" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Server-Side Routing</text>
  <text x="665" y="415" text-anchor="middle" font-size="8" class="text-primary">Edge routing, path-based micro-frontend selection</text>
  
  <rect x="500" y="425" width="330" height="25" rx="2" class="highlight-purple" stroke-width="1"/>
  <text x="665" y="442" text-anchor="middle" font-size="8" class="text-primary">Hybrid: Server determines micro-frontend, client handles sub-routes</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>