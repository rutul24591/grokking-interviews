<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">CI/CD Pipeline for Frontend</text>
  
  <!-- Pipeline Stages -->
  <rect x="30" y="70" width="840" height="150" rx="5" class="box-base" stroke-width="2"/>
  
  <rect x="50" y="90" width="150" height="110" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="125" y="115" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">1. Build</text>
  <rect x="70" y="130" width="110" height="55" rx="2" class="box-base" stroke-width="1"/>
  <text x="125" y="145" text-anchor="middle" font-size="8" class="text-primary">• Install deps</text>
  <text x="125" y="160" text-anchor="middle" font-size="8" class="text-primary">• Bundle</text>
  <text x="125" y="175" text-anchor="middle" font-size="8" class="text-primary">• Optimize</text>
  
  <line x1="200" y1="145" x2="230" y2="145" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="230" y="90" width="150" height="110" rx="3" class="accent-box" stroke-width="1.5"/>
  <text x="305" y="115" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">2. Test</text>
  <rect x="250" y="130" width="110" height="55" rx="2" class="box-base" stroke-width="1"/>
  <text x="305" y="145" text-anchor="middle" font-size="8" class="text-primary">• Unit tests</text>
  <text x="305" y="160" text-anchor="middle" font-size="8" class="text-primary">• Integration</text>
  <text x="305" y="175" text-anchor="middle" font-size="8" class="text-primary">• E2E tests</text>
  
  <line x1="380" y1="145" x2="410" y2="145" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="410" y="90" width="150" height="110" rx="3" class="highlight-box" stroke-width="1.5"/>
  <text x="485" y="115" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">3. Security</text>
  <rect x="430" y="130" width="110" height="55" rx="2" class="box-base" stroke-width="1"/>
  <text x="485" y="145" text-anchor="middle" font-size="8" class="text-primary">• SAST</text>
  <text x="485" y="160" text-anchor="middle" font-size="8" class="text-primary">• Dependency</text>
  <text x="485" y="175" text-anchor="middle" font-size="8" class="text-primary">• Secrets scan</text>
  
  <line x1="560" y1="145" x2="590" y2="145" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="590" y="90" width="150" height="110" rx="3" class="highlight-purple" stroke-width="1.5"/>
  <text x="665" y="115" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">4. Deploy</text>
  <rect x="610" y="130" width="110" height="55" rx="2" class="box-base" stroke-width="1"/>
  <text x="665" y="145" text-anchor="middle" font-size="8" class="text-primary">• Preview</text>
  <text x="665" y="160" text-anchor="middle" font-size="8" class="text-primary">• Staging</text>
  <text x="665" y="175" text-anchor="middle" font-size="8" class="text-primary">• Production</text>
  
  <line x1="740" y1="145" x2="770" y2="145" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="770" y="90" width="80" height="110" rx="3" class="highlight-green" stroke-width="1.5"/>
  <text x="810" y="145" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">5. Monitor</text>
  
  <!-- Quality Gates -->
  <rect x="30" y="240" width="840" height="120" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="265" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Quality Gates (Must Pass)</text>
  
  <rect x="50" y="280" width="190" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="145" y="300" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Linting</text>
  <text x="145" y="320" text-anchor="middle" font-size="9" class="text-primary">ESLint, Prettier</text>
  <text x="145" y="335" text-anchor="middle" font-size="9" class="highlight-green">✓ Zero errors</text>
  
  <rect x="255" y="280" width="190" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="300" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Type Check</text>
  <text x="350" y="320" text-anchor="middle" font-size="9" class="text-primary">TypeScript</text>
  <text x="350" y="335" text-anchor="middle" font-size="9" class="highlight-green">✓ No errors</text>
  
  <rect x="460" y="280" width="190" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="555" y="300" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Test Coverage</text>
  <text x="555" y="320" text-anchor="middle" font-size="9" class="text-primary">Min 80%</text>
  <text x="555" y="335" text-anchor="middle" font-size="9" class="highlight-green">✓ All pass</text>
  
  <rect x="665" y="280" width="190" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="760" y="300" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Bundle Size</text>
  <text x="760" y="320" text-anchor="middle" font-size="9" class="text-primary">Budget check</text>
  <text x="760" y="335" text-anchor="middle" font-size="9" class="highlight-purple">⚠ Warn if exceeded</text>
  
  <!-- Deployment Strategies -->
  <rect x="30" y="380" width="840" height="90" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Deployment Strategies</text>
  
  <rect x="50" y="420" width="190" height="35" rx="3" class="box-base" stroke-width="1"/>
  <text x="145" y="442" text-anchor="middle" font-size="9" class="text-primary">Preview: Every PR</text>
  
  <rect x="255" y="420" width="190" height="35" rx="3" class="accent-box" stroke-width="1"/>
  <text x="350" y="442" text-anchor="middle" font-size="9" class="text-primary">Staging: Auto-merge</text>
  
  <rect x="460" y="420" width="190" height="35" rx="3" class="highlight-box" stroke-width="1"/>
  <text x="555" y="442" text-anchor="middle" font-size="9" class="text-primary">Production: Manual approve</text>
  
  <rect x="665" y="420" width="190" height="35" rx="3" class="highlight-green" stroke-width="1"/>
  <text x="760" y="442" text-anchor="middle" font-size="9" class="text-primary">Rollback: Automatic</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>