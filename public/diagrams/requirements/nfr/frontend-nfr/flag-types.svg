<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Flag Types & Use Cases</text>
  
  <!-- Release Flags -->
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Release Flags</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Short-lived (days-weeks)</text>
  <text x="65" y="145" font-size="9" class="text-primary">• Gradual rollout</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Kill switch capability</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Remove after full release</text>
  <text x="65" y="190" font-size="9" class="text-primary">• CI/CD integration</text>
  <text x="65" y="205" font-size="9" class="highlight-green">✓ Risk mitigation</text>
  <text x="65" y="220" font-size="9" class="highlight-green">✓ Fast rollback</text>
  <text x="65" y="235" font-size="9" class="highlight-purple">⚠ Technical debt</text>
  
  <!-- Experiment Flags -->
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Experiment Flags</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• A/B testing</text>
  <text x="350" y="145" font-size="9" class="text-primary">• User segmentation</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Statistical analysis</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Remove after decision</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Metrics tracking</text>
  <text x="350" y="205" font-size="9" class="highlight-green">✓ Data-driven</text>
  <text x="350" y="220" font-size="9" class="highlight-green">✓ User targeting</text>
  <text x="350" y="235" font-size="9" class="highlight-purple">⚠ Analysis complexity</text>
  
  <!-- Ops Flags -->
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Ops Flags</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Long-lived</text>
  <text x="635" y="145" font-size="9" class="text-primary">• Kill switches</text>
  <text x="635" y="160" font-size="9" class="text-primary">• Feature toggles</text>
  <text x="635" y="175" font-size="9" class="text-primary">• Emergency disable</text>
  <text x="635" y="190" font-size="9" class="text-primary">• Maintenance mode</text>
  <text x="635" y="205" font-size="9" class="highlight-green">✓ Incident response</text>
  <text x="635" y="220" font-size="9" class="highlight-green">✓ System control</text>
  <text x="635" y="235" font-size="9" class="highlight-green">✓ Long-term</text>
  
  <!-- Flag Lifecycle -->
  <rect x="30" y="270" width="840" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Flag Lifecycle Management</text>
  
  <rect x="50" y="310" width="150" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="125" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">1. Proposed</text>
  <rect x="70" y="345" width="110" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="125" y="365" text-anchor="middle" font-size="9" class="text-primary">• RFC created</text>
  <text x="125" y="380" text-anchor="middle" font-size="9" class="text-primary">• Team review</text>
  <text x="125" y="395" text-anchor="middle" font-size="9" class="text-primary">• Approval</text>
  <text x="125" y="410" text-anchor="middle" font-size="9" class="text-primary">• Flag created</text>
  <text x="125" y="425" text-anchor="middle" font-size="9" class="text-primary">• Default: OFF</text>
  <text x="125" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Governance</text>
  
  <rect x="215" y="310" width="150" height="145" rx="3" class="accent-box" stroke-width="1"/>
  <text x="290" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">2. Active</text>
  <rect x="235" y="345" width="110" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="290" y="365" text-anchor="middle" font-size="9" class="text-primary">• Gradual rollout</text>
  <text x="290" y="380" text-anchor="middle" font-size="9" class="text-primary">• Monitor metrics</text>
  <text x="290" y="395" text-anchor="middle" font-size="9" class="text-primary">• User feedback</text>
  <text x="290" y="410" text-anchor="middle" font-size="9" class="text-primary">• Adjust %</text>
  <text x="290" y="425" text-anchor="middle" font-size="9" class="text-primary">• 0% → 100%</text>
  <text x="290" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Controlled</text>
  
  <rect x="380" y="310" width="150" height="145" rx="3" class="highlight-box" stroke-width="1"/>
  <text x="455" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">3. Fully Rolled</text>
  <rect x="400" y="345" width="110" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="455" y="365" text-anchor="middle" font-size="9" class="text-primary">• 100% users</text>
  <text x="455" y="380" text-anchor="middle" font-size="9" class="text-primary">• Monitor stability</text>
  <text x="455" y="395" text-anchor="middle" font-size="9" class="text-primary">• Set removal date</text>
  <text x="455" y="410" text-anchor="middle" font-size="9" class="text-primary">• Track tech debt</text>
  <text x="455" y="425" text-anchor="middle" font-size="9" class="highlight-green">✓ Feature live</text>
  
  <rect x="545" y="310" width="150" height="145" rx="3" class="highlight-purple" stroke-width="1"/>
  <text x="620" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">4. Deprecated</text>
  <rect x="565" y="345" width="110" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="620" y="365" text-anchor="middle" font-size="9" class="text-primary">• Code cleanup</text>
  <text x="620" y="380" text-anchor="middle" font-size="9" class="text-primary">• Remove flag checks</text>
  <text x="620" y="395" text-anchor="middle" font-size="9" class="text-primary">• Delete flag</text>
  <text x="620" y="410" text-anchor="middle" font-size="9" class="text-primary">• Document lessons</text>
  <text x="620" y="425" text-anchor="middle" font-size="9" class="highlight-red">⚠ Often skipped</text>
  
  <rect x="710" y="310" width="150" height="145" rx="3" class="highlight-green" stroke-width="1"/>
  <text x="785" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">5. Removed</text>
  <rect x="730" y="345" width="110" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="785" y="365" text-anchor="middle" font-size="9" class="text-primary">• Code merged</text>
  <text x="785" y="380" text-anchor="middle" font-size="9" class="text-primary">• Flag deleted</text>
  <text x="785" y="395" text-anchor="middle" font-size="9" class="text-primary">• Config cleaned</text>
  <text x="785" y="410" text-anchor="middle" font-size="9" class="text-primary">• Complete!</text>
  <text x="785" y="425" text-anchor="middle" font-size="9" class="highlight-green">✓ No debt</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>