<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">Responsive Images</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">srcset for resolution switching, sizes for art direction, and lazy loading</text>
  
  <!-- srcset Example -->
  <rect x="30" y="80" width="260" height="180" fill="#e3f2fd" stroke="#2196f3" rx="6"/>
  <text x="160" y="105" text-anchor="middle" class="label" font-weight="bold">srcset (Resolution Switching)</text>
  <line x1="50" y1="115" x2="270" y2="115" stroke="#2196f3" stroke-width="1"/>
  
  <text x="60" y="140" text-anchor="start" class="small-label" font-weight="bold">Same image, different sizes:</text>
  <text x="60" y="165" text-anchor="start" class="small-label">&amp;lt;img srcset="</text>
  <text x="80" y="182" text-anchor="start" class="small-label">small.jpg 400w,</text>
  <text x="80" y="199" text-anchor="start" class="small-label">medium.jpg 800w,</text>
  <text x="80" y="216" text-anchor="start" class="small-label">large.jpg 1200w"</text>
  <text x="60" y="238" text-anchor="start" class="small-label">sizes="(max-width: 600px) 400px, 800px"</text>
  <text x="60" y="255" text-anchor="start" class="small-label">src="medium.jpg"&amp;gt;</text>
  
  <!-- Browser chooses based on viewport + DPR -->
  
  <!-- picture Example -->
  <rect x="310" y="80" width="260" height="180" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="440" y="105" text-anchor="middle" class="label" font-weight="bold">picture (Art Direction)</text>
  <line x1="330" y1="115" x2="550" y2="115" stroke="#4caf50" stroke-width="1"/>
  
  <text x="340" y="140" text-anchor="start" class="small-label" font-weight="bold">Different images for breakpoints:</text>
  <text x="340" y="165" text-anchor="start" class="small-label">&amp;lt;picture&amp;gt;</text>
  <text x="360" y="182" text-anchor="start" class="small-label">&amp;lt;source media="(min-width: 800px)"</text>
  <text x="380" y="199" text-anchor="start" class="small-label">srcset="wide.jpg"&amp;gt;</text>
  <text x="360" y="216" text-anchor="start" class="small-label">&amp;lt;source srcset="tall.jpg"&amp;gt;</text>
  <text x="360" y="233" text-anchor="start" class="small-label">&amp;lt;img src="tall.jpg"&amp;gt;</text>
  <text x="340" y="255" text-anchor="start" class="small-label">&amp;lt;/picture&amp;gt;</text>
  
  <!-- Format Switching -->
  <rect x="590" y="80" width="240" height="180" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="710" y="105" text-anchor="middle" class="label" font-weight="bold">Format Switching</text>
  <line x1="610" y1="115" x2="810" y2="115" stroke="#ff9800" stroke-width="1"/>
  
  <text x="620" y="140" text-anchor="start" class="small-label" font-weight="bold">Modern formats with fallback:</text>
  <text x="620" y="165" text-anchor="start" class="small-label">&amp;lt;picture&amp;gt;</text>
  <text x="640" y="182" text-anchor="start" class="small-label">&amp;lt;source type="image/avif"</text>
  <text x="660" y="199" text-anchor="start" class="small-label">srcset="image.avif"&amp;gt;</text>
  <text x="640" y="216" text-anchor="start" class="small-label">&amp;lt;source type="image/webp"</text>
  <text x="660" y="233" text-anchor="start" class="small-label">srcset="image.webp"&amp;gt;</text>
  <text x="640" y="250" text-anchor="start" class="small-label">&amp;lt;img src="image.jpg"&amp;gt;</text>
  <text x="620" y="255" text-anchor="start" class="small-label">&amp;lt;/picture&amp;gt;</text>
  
  <!-- Lazy Loading -->
  <rect x="30" y="280" width="260" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="160" y="305" text-anchor="middle" class="label" font-weight="bold">Lazy Loading</text>
  <line x1="50" y1="315" x2="270" y2="315" stroke="#999" stroke-width="1"/>
  
  <text x="60" y="340" text-anchor="start" class="small-label" font-weight="bold">Native (85%+ support):</text>
  <text x="60" y="360" text-anchor="start" class="small-label">&amp;lt;img src="image.jpg" loading="lazy"&amp;gt;</text>
  
  <text x="60" y="385" text-anchor="start" class="small-label" fill="#4caf50">✓ No JS needed</text>
  <text x="180" y="385" text-anchor="start" class="small-label" fill="#ff9800">⚠ Limited control</text>
  
  <!-- Intersection Observer -->
  <rect x="310" y="280" width="260" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="440" y="305" text-anchor="middle" class="label" font-weight="bold">Intersection Observer</text>
  <line x1="330" y1="315" x2="550" y2="315" stroke="#999" stroke-width="1"/>
  
  <text x="340" y="340" text-anchor="start" class="small-label">• Custom lazy loading</text>
  <text x="340" y="360" text-anchor="start" class="small-label">• Blur-up, fade-in effects</text>
  <text x="340" y="380" text-anchor="start" class="small-label">• Placeholder support</text>
  
  <!-- Best Practices -->
  <rect x="590" y="280" width="240" height="100" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="710" y="305" text-anchor="middle" class="label" font-weight="bold">Best Practices</text>
  <line x1="610" y1="315" x2="810" y2="315" stroke="#4caf50" stroke-width="1"/>
  
  <text x="620" y="340" text-anchor="start" class="small-label" fill="#4caf50">✓ Always specify width/height</text>
  <text x="620" y="360" text-anchor="start" class="small-label" fill="#4caf50">✓ Use modern formats (AVIF, WebP)</text>
  <text x="620" y="380" text-anchor="start" class="small-label" fill="#ff9800">⚠ Don't lazy-load LCP image</text>
</svg>
