<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">State Hydration Pattern</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Restoring application state from persisted storage on app load</text>
  
  <!-- App Load -->
  <rect x="50" y="80" width="100" height="40" fill="#e8f5e9" stroke="#4caf50" rx="20"/>
  <text x="100" y="105" text-anchor="middle" class="small-label" font-weight="bold">App Loads</text>
  
  <line x1="150" y1="100" x2="190" y2="100" class="arrow"/>
  
  <!-- Read from Storage -->
  <rect x="190" y="80" width="120" height="40" fill="#e3f2fd" stroke="#2196f3" rx="4"/>
  <text x="250" y="100" text-anchor="middle" class="small-label" font-weight="bold">Read from Storage</text>
  <text x="250" y="113" text-anchor="middle" class="small-label">localStorage/IndexedDB</text>
  
  <line x1="310" y1="100" x2="350" y2="100" class="arrow"/>
  
  <!-- Validate Schema -->
  <rect x="350" y="80" width="120" height="40" fill="#fff" stroke="#666" rx="4"/>
  <text x="410" y="100" text-anchor="middle" class="small-label" font-weight="bold">Validate Schema</text>
  <text x="410" y="113" text-anchor="middle" class="small-label">Version check</text>
  
  <!-- Valid path -->
  <line x1="470" y1="100" x2="510" y2="100" class="arrow"/>
  <text x="490" y="90" text-anchor="middle" class="small-label">Valid</text>
  
  <!-- Merge with Defaults -->
  <rect x="510" y="80" width="120" height="40" fill="#fff3e0" stroke="#ff9800" rx="4"/>
  <text x="570" y="100" text-anchor="middle" class="small-label" font-weight="bold">Merge with Defaults</text>
  <text x="570" y="113" text-anchor="middle" class="small-label">Fill missing fields</text>
  
  <line x1="630" y1="100" x2="670" y2="100" class="arrow"/>
  
  <!-- Initialize State -->
  <rect x="670" y="80" width="120" height="40" fill="#c8e6c9" stroke="#4caf50" rx="4"/>
  <text x="730" y="105" text-anchor="middle" class="small-label" font-weight="bold">Initialize State</text>
  
  <!-- Invalid path -->
  <line x1="410" y1="120" x2="410" y2="150" class="arrow"/>
  <text x="425" y="135" text-anchor="start" class="small-label">Invalid/Empty</text>
  
  <!-- Use Defaults Only -->
  <rect x="350" y="150" width="120" height="40" fill="#ffebee" stroke="#f44336" rx="4"/>
  <text x="410" y="175" text-anchor="middle" class="small-label" font-weight="bold">Use Defaults Only</text>
  
  <line x1="410" y1="190" x2="410" y2="225" class="arrow"/>
  <line x1="730" y1="120" x2="730" y2="225" class="arrow"/>
  
  <!-- App Ready -->
  <rect x="510" y="225" width="120" height="40" fill="#e8f5e9" stroke="#4caf50" rx="20"/>
  <text x="570" y="250" text-anchor="middle" class="small-label" font-weight="bold">App Ready</text>
  
  <!-- Storage Types -->
  <rect x="50" y="180" width="180" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="140" y="205" text-anchor="middle" class="label" font-weight="bold">Storage Types</text>
  <line x1="70" y1="215" x2="210" y2="215" stroke="#999" stroke-width="1"/>
  
  <text x="80" y="240" text-anchor="start" class="small-label" font-weight="bold">localStorage:</text>
  <text x="80" y="255" text-anchor="start" class="small-label">• User preferences</text>
  <text x="80" y="270" text-anchor="start" class="small-label">• Theme settings</text>
  
  <text x="80" y="290" text-anchor="start" class="small-label" font-weight="bold">IndexedDB:</text>
  <text x="80" y="305" text-anchor="start" class="small-label">• Large cached data</text>
  <text x="80" y="320" text-anchor="start" class="small-label">• Offline content</text>
  
  <!-- Migration -->
  <rect x="250" y="180" width="180" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="340" y="205" text-anchor="middle" class="label" font-weight="bold">Schema Migration</text>
  <line x1="270" y1="215" x2="410" y2="215" stroke="#999" stroke-width="1"/>
  
  <text x="280" y="240" text-anchor="start" class="small-label">• Version persisted data</text>
  <text x="280" y="257" text-anchor="start" class="small-label">• Migration functions</text>
  <text x="280" y="274" text-anchor="start" class="small-label">• Handle breaking changes</text>
  <text x="280" y="291" text-anchor="start" class="small-label">• Backward compatible</text>
  
  <!-- Best Practices -->
  <rect x="450" y="180" width="370" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="635" y="205" text-anchor="middle" class="label" font-weight="bold">Best Practices</text>
  <line x1="470" y1="215" x2="800" y2="215" stroke="#999" stroke-width="1"/>
  
  <text x="480" y="240" text-anchor="start" class="small-label" fill="#4caf50">✓ Validate before use</text>
  <text x="650" y="240" text-anchor="start" class="small-label" fill="#4caf50">✓ Version your schema</text>
  <text x="480" y="260" text-anchor="start" class="small-label" fill="#4caf50">✓ Merge with defaults</text>
  <text x="650" y="260" text-anchor="start" class="small-label" fill="#4caf50">✓ Handle corruption</text>
  <text x="480" y="280" text-anchor="start" class="small-label" fill="#ff9800">⚠ Don't store sensitive data</text>
  <text x="650" y="280" text-anchor="start" class="small-label" fill="#ff9800">⚠ Clear on logout</text>
</svg>
