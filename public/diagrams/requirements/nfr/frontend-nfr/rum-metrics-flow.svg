<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">RUM Metrics Flow</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Real User Monitoring metric collection, batching, sampling, and reporting to analytics pipeline</text>
  
  <!-- Metric Collection -->
  <rect x="50" y="80" width="150" height="100" fill="#e3f2fd" stroke="#2196f3" rx="6"/>
  <text x="125" y="105" text-anchor="middle" class="label" font-weight="bold">Metric Collection</text>
  <line x1="70" y1="115" x2="180" y2="115" stroke="#2196f3" stroke-width="1"/>
  
  <text x="80" y="140" text-anchor="start" class="small-label">• web-vitals library</text>
  <text x="80" y="160" text-anchor="start" class="small-label">• Performance API</text>
  <text x="80" y="180" text-anchor="start" class="small-label">• Error listeners</text>
  
  <line x1="200" y1="130" x2="240" y2="130" class="arrow"/>
  
  <!-- Batching -->
  <rect x="240" y="80" width="150" height="100" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="315" y="105" text-anchor="middle" class="label" font-weight="bold">Batching</text>
  <line x1="260" y1="115" x2="370" y2="115" stroke="#4caf50" stroke-width="1"/>
  
  <text x="270" y="140" text-anchor="start" class="small-label">• Queue metrics</text>
  <text x="270" y="160" text-anchor="start" class="small-label">• Batch multiple</text>
  <text x="270" y="180" text-anchor="start" class="small-label">• Reduce requests</text>
  
  <line x1="390" y1="130" x2="430" y2="130" class="arrow"/>
  
  <!-- Sampling -->
  <rect x="430" y="80" width="150" height="100" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="505" y="105" text-anchor="middle" class="label" font-weight="bold">Sampling</text>
  <line x1="450" y1="115" x2="560" y2="115" stroke="#ff9800" stroke-width="1"/>
  
  <text x="460" y="140" text-anchor="start" class="small-label">• 1-10% of users</text>
  <text x="460" y="160" text-anchor="start" class="small-label">• Reduce volume</text>
  <text x="460" y="180" text-anchor="start" class="small-label">• Cost control</text>
  
  <line x1="580" y1="130" x2="620" y2="130" class="arrow"/>
  
  <!-- Reporting -->
  <rect x="620" y="80" width="150" height="100" fill="#fce4ec" stroke="#e91e63" rx="6"/>
  <text x="695" y="105" text-anchor="middle" class="label" font-weight="bold">Reporting</text>
  <line x1="640" y1="115" x2="750" y2="115" stroke="#e91e63" stroke-width="1"/>
  
  <text x="650" y="140" text-anchor="start" class="small-label">• sendBeacon API</text>
  <text x="650" y="160" text-anchor="start" class="small-label">• On visibilitychange</text>
  <text x="650" y="180" text-anchor="start" class="small-label">• Analytics endpoint</text>
  
  <!-- Core Web Vitals -->
  <rect x="50" y="200" width="250" height="120" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="175" y="225" text-anchor="middle" class="label" font-weight="bold">Core Web Vitals</text>
  <line x1="70" y1="235" x2="280" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="80" y="260" text-anchor="start" class="small-label" font-weight="bold">LCP:</text>
  <text x="80" y="277" text-anchor="start" class="small-label">Largest Contentful Paint</text>
  <text x="80" y="297" text-anchor="start" class="small-label">Target: &lt;2.5s</text>
  
  <text x="180" y="260" text-anchor="start" class="small-label" font-weight="bold">INP:</text>
  <text x="180" y="277" text-anchor="start" class="small-label">Interaction to Next Paint</text>
  <text x="180" y="297" text-anchor="start" class="small-label">Target: &lt;200ms</text>
  
  <text x="80" y="317" text-anchor="start" class="small-label" font-weight="bold">CLS:</text>
  <text x="80" y="334" text-anchor="start" class="small-label">Cumulative Layout Shift</text>
  <text x="80" y="354" text-anchor="start" class="small-label">Target: &lt;0.1</text>
  
  <!-- Percentiles -->
  <rect x="320" y="200" width="250" height="120" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="445" y="225" text-anchor="middle" class="label" font-weight="bold">Track Percentiles</text>
  <line x1="340" y1="235" x2="550" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="350" y="260" text-anchor="start" class="small-label">• p50 (median)</text>
  <text x="350" y="280" text-anchor="start" class="small-label">• p75 (Google standard)</text>
  <text x="350" y="300" text-anchor="start" class="small-label">• p95 (power users)</text>
  <text x="350" y="320" text-anchor="start" class="small-label">Not just averages!</text>
  
  <!-- Segmentation -->
  <rect x="590" y="200" width="240" height="120" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="710" y="225" text-anchor="middle" class="label" font-weight="bold">Segment Data</text>
  <line x1="610" y1="235" x2="810" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="620" y="260" text-anchor="start" class="small-label">• By device class</text>
  <text x="620" y="280" text-anchor="start" class="small-label">• By network type</text>
  <text x="620" y="300" text-anchor="start" class="small-label">• By geography</text>
  <text x="620" y="320" text-anchor="start" class="small-label">• New vs returning</text>
  
  <!-- Alerting -->
  <rect x="50" y="340" width="380" height="80" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="240" y="365" text-anchor="middle" class="label" font-weight="bold">Alerting</text>
  <line x1="70" y1="375" x2="410" y2="375" stroke="#ff9800" stroke-width="1"/>
  
  <text x="80" y="400" text-anchor="start" class="small-label">• Alert on p75 threshold breaches</text>
  <text x="80" y="420" text-anchor="start" class="small-label">• Error rate spikes</text>
  
  <!-- Dashboards -->
  <rect x="450" y="340" width="380" height="80" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="640" y="365" text-anchor="middle" class="label" font-weight="bold">Dashboards</text>
  <line x1="470" y1="375" x2="810" y2="375" stroke="#4caf50" stroke-width="1"/>
  
  <text x="480" y="400" text-anchor="start" class="small-label">• Executive (p75 trends)</text>
  <text x="480" y="420" text-anchor="start" class="small-label">• Engineering (detailed metrics)</text>
</svg>
