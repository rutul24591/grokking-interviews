<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Hosting Platform Comparison</text>
  
  <!-- Static Site Hosting -->
  <rect x="30" y="70" width="270" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Static Site Hosting</text>
  <rect x="50" y="110" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Vercel, Netlify</text>
  <text x="65" y="145" font-size="9" class="text-primary">• CDN edge delivery</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Auto HTTPS</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Instant deploys</text>
  <text x="65" y="190" font-size="9" class="text-primary">• Preview deployments</text>
  <text x="65" y="205" font-size="9" class="text-primary">• Serverless functions</text>
  <text x="65" y="220" font-size="9" class="text-primary">• Pay per request</text>
  <text x="65" y="235" font-size="9" class="highlight-green">✓ Best for: JAMstack</text>
  <text x="65" y="250" font-size="9" class="highlight-purple">⚠ Limited backend</text>
  
  <!-- Container Hosting -->
  <rect x="315" y="70" width="270" height="200" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Container Hosting</text>
  <rect x="335" y="110" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Vercel, Railway</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Docker containers</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Auto-scaling</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Custom runtimes</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Database add-ons</text>
  <text x="350" y="205" font-size="9" class="text-primary">• Git-based deploys</text>
  <text x="350" y="220" font-size="9" class="text-primary">• Usage-based pricing</text>
  <text x="350" y="235" font-size="9" class="highlight-green">✓ Best for: Full-stack</text>
  <text x="350" y="250" font-size="9" class="highlight-purple">⚠ Cold starts</text>
  
  <!-- Traditional Cloud -->
  <rect x="600" y="70" width="270" height="200" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Traditional Cloud</text>
  <rect x="620" y="110" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• AWS, GCP, Azure</text>
  <text x="635" y="145" font-size="9" class="text-primary">• Full control</text>
  <text x="635" y="160" font-size="9" class="text-primary">• All services</text>
  <text x="635" y="175" font-size="9" class="text-primary">• Custom networking</text>
  <text x="635" y="190" font-size="9" class="text-primary">• Compliance ready</text>
  <text x="635" y="205" font-size="9" class="text-primary">• Reserved pricing</text>
  <text x="635" y="220" font-size="9" class="text-primary">• Complex setup</text>
  <text x="635" y="235" font-size="9" class="highlight-green">✓ Best for: Enterprise</text>
  <text x="635" y="250" font-size="9" class="highlight-red">⚠ High complexity</text>
  
  <!-- Decision Matrix -->
  <rect x="30" y="290" width="840" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="315" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Platform Selection Matrix</text>
  
  <rect x="50" y="330" width="800" height="125" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="100" y="350" font-size="9" font-weight="bold" class="text-primary">Use Case</text>
  <text x="250" y="350" font-size="9" font-weight="bold" class="text-primary">Recommended Platform</text>
  <text x="450" y="350" font-size="9" font-weight="bold" class="text-primary">Why</text>
  <text x="650" y="350" font-size="9" font-weight="bold" class="text-primary">Cost Estimate</text>
  
  <line x1="80" y1="360" x2="820" y2="360" class="arrow" stroke-width="1"/>
  <text x="100" y="375" font-size="8" class="text-primary">Marketing site</text>
  <text x="250" y="375" font-size="8" class="highlight-green">Static hosting</text>
  <text x="450" y="375" font-size="8" class="text-primary">Fast, cheap, simple</text>
  <text x="650" y="375" font-size="8" class="text-primary">$0-20/month</text>
  
  <line x1="80" y1="385" x2="820" y2="385" class="arrow" stroke-width="1"/>
  <text x="100" y="400" font-size="8" class="text-primary">E-commerce</text>
  <text x="250" y="400" font-size="8" class="highlight-green">Container hosting</text>
  <text x="450" y="400" font-size="8" class="text-primary">Backend + frontend</text>
  <text x="650" y="400" font-size="8" class="text-primary">$50-200/month</text>
  
  <line x1="80" y1="410" x2="820" y2="410" class="arrow" stroke-width="1"/>
  <text x="100" y="425" font-size="8" class="text-primary">Enterprise app</text>
  <text x="250" y="425" font-size="8" class="highlight-blue">Traditional cloud</text>
  <text x="450" y="425" font-size="8" class="text-primary">Control, compliance</text>
  <text x="650" y="425" font-size="8" class="text-primary">$500+/month</text>
  
  <line x1="80" y1="435" x2="820" y2="435" class="arrow" stroke-width="1"/>
  <text x="100" y="450" font-size="8" class="text-primary">Startup MVP</text>
  <text x="250" y="450" font-size="8" class="highlight-green">Container hosting</text>
  <text x="450" y="450" font-size="8" class="text-primary">Fast iteration</text>
  <text x="650" y="450" font-size="8" class="text-primary">$20-100/month</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>