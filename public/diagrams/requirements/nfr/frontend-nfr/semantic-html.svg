<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Semantic HTML for Accessibility</text>
  
  <!-- Heading hierarchy -->
  <rect x="30" y="70" width="270" height="180" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="165" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Heading Hierarchy</text>
  <line x1="50" y1="110" x2="280" y2="110" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="60" y="135" font-size="14" font-weight="bold" fill="#1e3a8a">H1 - Page title</text>
  <text x="70" y="160" font-size="12" font-weight="600" fill="#1e3a8a">H2 - Section</text>
  <text x="80" y="180" font-size="11" fill="#1e3a8a">H3 - Subsection</text>
  <text x="90" y="195" font-size="10" fill="#1e3a8a">H4 - Detail</text>
  <text x="60" y="220" font-size="10" fill="#ef4444">✗ Don't skip levels</text>
  <text x="60" y="240" font-size="10" fill="#10b981">✓ Screen reader navigation</text>
  
  <!-- Landmarks -->
  <rect x="315" y="70" width="270" height="180" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Landmark Elements</text>
  <line x1="335" y1="110" x2="565" y2="110" stroke="#10b981" stroke-width="1"/>
  
  <text x="335" y="135" font-size="11" fill="#064e3b">&amp;lt;header&amp;gt; - Site header</text>
  <text x="335" y="155" font-size="11" fill="#064e3b">&amp;lt;nav&amp;gt; - Navigation</text>
  <text x="335" y="175" font-size="11" fill="#064e3b">&amp;lt;main&amp;gt; - Main content</text>
  <text x="335" y="195" font-size="11" fill="#064e3b">&amp;lt;aside&amp;gt; - Related content</text>
  <text x="335" y="215" font-size="11" fill="#064e3b">&amp;lt;footer&amp;gt; - Site footer</text>
  <text x="335" y="240" font-size="10" fill="#10b981">✓ Quick navigation</text>
  
  <!-- Interactive elements -->
  <rect x="600" y="70" width="270" height="180" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="735" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Interactive Elements</text>
  <line x1="620" y1="110" x2="850" y2="110" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="620" y="135" font-size="11" fill="#78350f">&amp;lt;button&amp;gt; - Clickable action</text>
  <text x="620" y="160" font-size="11" fill="#78350f">&amp;lt;a href&amp;gt; - Navigation</text>
  <text x="620" y="185" font-size="11" fill="#78350f">&amp;lt;input&amp;gt; + &amp;lt;label&amp;gt;</text>
  <text x="620" y="210" font-size="11" fill="#78350f">&amp;lt;select&amp;gt; - Dropdown</text>
  <text x="620" y="240" font-size="10" fill="#ef4444">✗ Not &amp;lt;div onclick&amp;gt;</text>
  
  <!-- Common mistakes -->
  <rect x="30" y="280" width="840" height="100" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="450" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">Common Mistakes to Avoid</text>
  <line x1="50" y1="320" x2="850" y2="320" stroke="#ef4444" stroke-width="1"/>
  
  <text x="80" y="345" font-size="11" fill="#7f1d1d">✗ &amp;lt;div&amp;gt; for buttons (no keyboard support)</text>
  <text x="450" y="345" font-size="11" fill="#7f1d1d">✗ Images without alt text</text>
  <text x="80" y="365" font-size="11" fill="#7f1d1d">✗ Skipping heading levels (h1 → h4)</text>
  <text x="450" y="365" font-size="11" fill="#7f1d1d">✗ Links saying &amp;quot;click here&amp;quot;</text>
  <text x="80" y="385" font-size="11" fill="#7f1d1d">✗ Forms without labels</text>
  <text x="450" y="385" font-size="11" fill="#7f1d1d">✗ Tables without headers</text>
  
  <!-- Benefits -->
  <rect x="30" y="410" width="840" height="70" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="6"/>
  <text x="450" y="430" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">Benefits of Semantic HTML</text>
  <line x1="50" y1="440" x2="850" y2="440" stroke="#10b981" stroke-width="1"/>
  <text x="80" y="460" font-size="11" fill="#064e3b">✓ Screen reader compatible</text>
  <text x="280" y="460" font-size="11" fill="#064e3b">✓ Keyboard accessible</text>
  <text x="480" y="460" font-size="11" fill="#064e3b">✓ Better SEO</text>
  <text x="650" y="460" font-size="11" fill="#064e3b">✓ Easier to maintain</text>
  
</svg>
