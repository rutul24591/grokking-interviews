<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Feature Flag Rollout Strategies</text>
  
  <!-- Gradual Rollout -->
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Gradual Rollout</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• 1% → 10% → 50% → 100%</text>
  <text x="65" y="145" font-size="9" class="text-primary">• Time-based progression</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Monitor at each stage</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Auto-pause on errors</text>
  <text x="65" y="190" font-size="9" class="text-primary">• Days to complete</text>
  <text x="65" y="205" font-size="9" class="highlight-green">✓ Lowest risk</text>
  <text x="65" y="220" font-size="9" class="highlight-green">✓ Catch issues early</text>
  <text x="65" y="235" font-size="9" class="highlight-purple">⚠ Slow rollout</text>
  
  <!-- Canary Release -->
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Canary Release</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Small % first (1-5%)</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Intensive monitoring</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Compare to control</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Expand if healthy</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Auto-rollback</text>
  <text x="350" y="205" font-size="9" class="highlight-green">✓ Production test</text>
  <text x="350" y="220" font-size="9" class="highlight-green">✓ Limited blast radius</text>
  <text x="350" y="235" font-size="9" class="highlight-purple">⚠ Complex setup</text>
  
  <!-- Blue-Green -->
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Blue-Green Switch</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Two environments</text>
  <text x="635" y="145" font-size="9" class="text-primary">• Test green fully</text>
  <text x="635" y="160" font-size="9" class="text-primary">• Switch router</text>
  <text x="635" y="175" font-size="9" class="text-primary">• Instant rollback</text>
  <text x="635" y="190" font-size="9" class="text-primary">• 2x infrastructure</text>
  <text x="635" y="205" font-size="9" class="highlight-green">✓ Instant switch</text>
  <text x="635" y="220" font-size="9" class="highlight-green">✓ Full testing first</text>
  <text x="635" y="235" font-size="9" class="highlight-red">⚠ 2x cost</text>
  
  <!-- User Segment Rollout -->
  <rect x="30" y="270" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">User Segment Rollout</text>
  <rect x="50" y="310" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="330" font-size="9" class="text-primary">• By user attribute</text>
  <text x="65" y="345" font-size="9" class="text-primary">• Internal users first</text>
  <text x="65" y="360" font-size="9" class="text-primary">• Beta testers next</text>
  <text x="65" y="375" font-size="9" class="text-primary">• Then general users</text>
  <text x="65" y="390" font-size="9" class="text-primary">• By geography</text>
  <text x="65" y="405" font-size="9" class="highlight-green">✓ Targeted feedback</text>
  <text x="65" y="420" font-size="9" class="highlight-green">✓ Safe groups first</text>
  <text x="65" y="435" font-size="9" class="highlight-purple">⚠ Segment definition</text>
  
  <!-- A/B Test Rollout -->
  <rect x="315" y="270" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">A/B Test Rollout</text>
  <rect x="335" y="310" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="330" font-size="9" class="text-primary">• Fixed split (50/50)</text>
  <text x="350" y="345" font-size="9" class="text-primary">• Statistical significance</text>
  <text x="350" y="360" font-size="9" class="text-primary">• Measure metrics</text>
  <text x="350" y="375" font-size="9" class="text-primary">• Decide winner</text>
  <text x="350" y="390" font-size="9" class="text-primary">• Roll out winner</text>
  <text x="350" y="405" font-size="9" class="highlight-green">✓ Data-driven</text>
  <text x="350" y="420" font-size="9" class="highlight-green">✓ Measure impact</text>
  <text x="350" y="435" font-size="9" class="highlight-purple">⚠ Statistical analysis</text>
  
  <!-- Decision Matrix -->
  <rect x="600" y="270" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Strategy Selection Guide</text>
  <rect x="620" y="310" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="330" font-size="9" class="text-primary">High risk → Gradual/Canary</text>
  <text x="635" y="345" font-size="9" class="text-primary">Low risk → Blue-Green</text>
  <text x="635" y="360" font-size="9" class="text-primary">Need feedback → User Segment</text>
  <text x="635" y="375" font-size="9" class="text-primary">Measure impact → A/B Test</text>
  <text x="635" y="390" font-size="9" class="text-primary">Critical app → Canary</text>
  <text x="635" y="405" font-size="9" class="highlight-green">✓ Match to risk</text>
  <text x="635" y="420" font-size="9" class="highlight-purple">⚠ Consider cost</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>