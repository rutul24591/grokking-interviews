<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box-recommended { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; }
      .box-alternative { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; }
      .box-not-recommended { fill: #ffebee; stroke: #f44336; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .token { fill: #ff9800; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" class="title">Authentication Token Storage Patterns</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Security comparison of different token storage approaches</text>
  
  <!-- Option 1: HttpOnly Cookies (Recommended) -->
  <rect x="30" y="80" width="260" height="180" class="box-recommended" rx="8"/>
  <text x="160" y="105" text-anchor="middle" class="label" font-weight="bold" font-size="16">Option 1: HttpOnly Cookies</text>
  <text x="160" y="125" text-anchor="middle" class="small-label" fill="#4caf50" font-weight="bold">⭐ RECOMMENDED</text>
  <line x1="50" y1="135" x2="270" y2="135" stroke="#4caf50" stroke-width="1"/>
  
  <!-- Browser with HttpOnly Cookie -->
  <rect x="50" y="145" width="220" height="100" fill="white" stroke="#4caf50" rx="4"/>
  <text x="160" y="165" text-anchor="middle" class="small-label" font-weight="bold">Browser Storage</text>
  
  <rect x="70" y="175" width="180" height="25" fill="#c8e6c9" stroke="#4caf50" rx="3"/>
  <text x="160" y="192" text-anchor="middle" class="small-label">🔒 HttpOnly Cookie</text>
  <text x="160" y="207" text-anchor="middle" class="small-label">Access Token + Refresh Token</text>
  
  <rect x="70" y="210" width="180" height="25" fill="#e8f5e9" stroke="#4caf50" rx="3"/>
  <text x="160" y="227" text-anchor="middle" class="small-label">🛡️ XSS Cannot Access</text>
  <text x="160" y="242" text-anchor="middle" class="small-label">✅ Secure + SameSite</text>
  
  <!-- Pros/Cons -->
  <text x="160" y="275" text-anchor="middle" class="small-label" font-weight="bold">Pros:</text>
  <text x="80" y="292" text-anchor="start" class="small-label" fill="#4caf50">✓ XSS protected</text>
  <text x="80" y="307" text-anchor="start" class="small-label" fill="#4caf50">✓ CSRF protected</text>
  <text x="180" y="292" text-anchor="start" class="small-label" fill="#4caf50">✓ Automatic</text>
  <text x="180" y="307" text-anchor="start" class="small-label" fill="#ff9800">⚠ Cookie size limit</text>
  
  <!-- Option 2: Memory + Refresh Token -->
  <rect x="310" y="80" width="260" height="180" class="box-alternative" rx="8"/>
  <text x="440" y="105" text-anchor="middle" class="label" font-weight="bold" font-size="16">Option 2: Memory + Refresh</text>
  <text x="440" y="125" text-anchor="middle" class="small-label" fill="#2196f3" font-weight="bold">⚡ ALTERNATIVE</text>
  <line x1="330" y1="135" x2="550" y2="135" stroke="#2196f3" stroke-width="1"/>
  
  <!-- Browser with Memory and Cookie -->
  <rect x="330" y="145" width="220" height="100" fill="white" stroke="#2196f3" rx="4"/>
  <text x="440" y="165" text-anchor="middle" class="small-label" font-weight="bold">Browser Storage</text>
  
  <rect x="350" y="175" width="180" height="25" fill="#bbdefb" stroke="#2196f3" rx="3"/>
  <text x="440" y="192" text-anchor="middle" class="small-label">💾 Memory (Variable)</text>
  <text x="440" y="207" text-anchor="middle" class="small-label">Short-lived Access Token</text>
  
  <rect x="350" y="210" width="180" height="25" fill="#e3f2fd" stroke="#2196f3" rx="3"/>
  <text x="440" y="227" text-anchor="middle" class="small-label">🔒 HttpOnly Cookie</text>
  <text x="440" y="242" text-anchor="middle" class="small-label">Rotating Refresh Token</text>
  
  <!-- Pros/Cons -->
  <text x="440" y="275" text-anchor="middle" class="small-label" font-weight="bold">Pros:</text>
  <text x="360" y="292" text-anchor="start" class="small-label" fill="#4caf50">✓ Access token protected</text>
  <text x="360" y="307" text-anchor="start" class="small-label" fill="#4caf50">✓ Short-lived exposure</text>
  <text x="460" y="292" text-anchor="start" class="small-label" fill="#ff9800">⚠ Lost on refresh</text>
  <text x="460" y="307" text-anchor="start" class="small-label" fill="#4caf50">✓ Re-fetch on load</text>
  
  <!-- Option 3: localStorage (Not Recommended) -->
  <rect x="590" y="80" width="260" height="180" class="box-not-recommended" rx="8"/>
  <text x="720" y="105" text-anchor="middle" class="label" font-weight="bold" font-size="16">Option 3: localStorage</text>
  <text x="720" y="125" text-anchor="middle" class="small-label" fill="#f44336" font-weight="bold">❌ NOT RECOMMENDED</text>
  <line x1="610" y1="135" x2="830" y2="135" stroke="#f44336" stroke-width="1"/>
  
  <!-- Browser with localStorage -->
  <rect x="610" y="145" width="220" height="100" fill="white" stroke="#f44336" rx="4"/>
  <text x="720" y="165" text-anchor="middle" class="small-label" font-weight="bold">Browser Storage</text>
  
  <rect x="630" y="175" width="180" height="25" fill="#ffcdd2" stroke="#f44336" rx="3"/>
  <text x="720" y="192" text-anchor="middle" class="small-label">⚠️ localStorage</text>
  <text x="720" y="207" text-anchor="middle" class="small-label">Access Token + Refresh Token</text>
  
  <rect x="630" y="210" width="180" height="25" fill="#ffebee" stroke="#f44336" rx="3"/>
  <text x="720" y="227" text-anchor="middle" class="small-label">🚨 XSS CAN ACCESS</text>
  <text x="720" y="242" text-anchor="middle" class="small-label">❌ Session hijack risk</text>
  
  <!-- Pros/Cons -->
  <text x="720" y="275" text-anchor="middle" class="small-label" font-weight="bold">Pros:</text>
  <text x="640" y="292" text-anchor="start" class="small-label" fill="#4caf50">✓ Simple to implement</text>
  <text x="640" y="307" text-anchor="start" class="small-label" fill="#4caf50">✓ Persists on refresh</text>
  <text x="740" y="292" text-anchor="start" class="small-label" fill="#f44336">✗ XSS vulnerable</text>
  <text x="740" y="307" text-anchor="start" class="small-label" fill="#f44336">✗ Token theft risk</text>
  
  <!-- Token Flow Diagram -->
  <text x="425" y="310" text-anchor="middle" class="label" font-weight="bold" font-size="16">Token Flow with HttpOnly Cookies</text>
  
  <!-- Login -->
  <rect x="50" y="330" width="100" height="50" fill="#e3f2fd" stroke="#2196f3" rx="4"/>
  <text x="100" y="350" text-anchor="middle" class="small-label" font-weight="bold">Login</text>
  <text x="100" y="365" text-anchor="middle" class="small-label">POST /login</text>
  
  <line x1="150" y1="355" x2="190" y2="355" class="arrow"/>
  
  <!-- Server -->
  <rect x="190" y="330" width="100" height="50" fill="#fff3e0" stroke="#ff9800" rx="4"/>
  <text x="240" y="350" text-anchor="middle" class="small-label" font-weight="bold">Server</text>
  <text x="240" y="365" text-anchor="middle" class="small-label">Validate &amp; Issue</text>
  
  <line x1="290" y1="355" x2="330" y2="355" class="arrow"/>
  <text x="310" y="345" text-anchor="middle" class="small-label">Set-Cookie:</text>
  <text x="310" y="360" text-anchor="middle" class="small-label">HttpOnly; Secure</text>
  
  <!-- Browser -->
  <rect x="330" y="330" width="100" height="50" fill="#e8f5e9" stroke="#4caf50" rx="4"/>
  <text x="380" y="350" text-anchor="middle" class="small-label" font-weight="bold">Browser</text>
  <text x="380" y="365" text-anchor="middle" class="small-label">Store Cookie</text>
  
  <line x1="430" y1="355" x2="470" y2="355" class="arrow"/>
  
  <!-- API Request -->
  <rect x="470" y="330" width="100" height="50" fill="#e3f2fd" stroke="#2196f3" rx="4"/>
  <text x="520" y="350" text-anchor="middle" class="small-label" font-weight="bold">API Call</text>
  <text x="520" y="365" text-anchor="middle" class="small-label">Auto-send Cookie</text>
  
  <line x1="570" y1="355" x2="610" y2="355" class="arrow"/>
  
  <!-- Server Validate -->
  <rect x="610" y="330" width="100" height="50" fill="#fff3e0" stroke="#ff9800" rx="4"/>
  <text x="660" y="350" text-anchor="middle" class="small-label" font-weight="bold">Server</text>
  <text x="660" y="365" text-anchor="middle" class="small-label">Validate Token</text>
  
  <line x1="710" y1="355" x2="750" y2="355" class="arrow"/>
  
  <!-- Response -->
  <rect x="750" y="330" width="100" height="50" fill="#e8f5e9" stroke="#4caf50" rx="4"/>
  <text x="800" y="350" text-anchor="middle" class="small-label" font-weight="bold">Response</text>
  <text x="800" y="365" text-anchor="middle" class="small-label">Protected Data</text>
  
  <!-- Security Best Practices -->
  <rect x="50" y="400" width="750" height="130" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="425" y="425" text-anchor="middle" class="label" font-weight="bold">Token Security Best Practices</text>
  <line x1="70" y1="435" x2="780" y2="435" stroke="#999" stroke-width="1"/>
  
  <text x="100" y="455" text-anchor="start" class="small-label" fill="#4caf50">✓ Use short-lived access tokens (15-60 min)</text>
  <text x="450" y="455" text-anchor="start" class="small-label" fill="#4caf50">✓ Implement token revocation on logout</text>
  
  <text x="100" y="475" text-anchor="start" class="small-label" fill="#4caf50">✓ Use rotating refresh tokens</text>
  <text x="450" y="475" text-anchor="start" class="small-label" fill="#4caf50">✓ Bind tokens to device fingerprint</text>
  
  <text x="100" y="495" text-anchor="start" class="small-label" fill="#4caf50">✓ Set Secure flag (HTTPS only)</text>
  <text x="450" y="495" text-anchor="start" class="small-label" fill="#4caf50">✓ Set SameSite=Strict or Lax</text>
  
  <text x="100" y="515" text-anchor="start" class="small-label" fill="#4caf50">✓ Use CSRF tokens for state changes</text>
  <text x="450" y="515" text-anchor="start" class="small-label" fill="#4caf50">✓ Monitor for token reuse anomalies</text>
</svg>
