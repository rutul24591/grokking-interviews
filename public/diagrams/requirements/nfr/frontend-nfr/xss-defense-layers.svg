<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs><style>.bg-l{fill:#f8f9fa}.bx-l{fill:#fff;stroke:#2563eb;stroke-width:2}.tl{fill:#1e293b;font-family:system-ui,sans-serif;font-size:18px;font-weight:700}.lb{fill:#334155;font-family:system-ui,sans-serif;font-size:13px;font-weight:600}.sl{fill:#64748b;font-family:system-ui,sans-serif;font-size:11px;font-weight:400}</style></defs>
  <g class="light-mode">
    <rect class="bg-l" width="800" height="420" rx="8"/>
    <text class="tl" x="400" y="35" text-anchor="middle">XSS Defense Layers</text>
    <rect class="bx-l" x="30" y="70" width="360" height="80" rx="6"/>
    <text class="lb" x="210" y="100" text-anchor="middle">Layer 1: Output Encoding (Primary Defense)</text>
    <text class="sl" x="100" y="130" text-anchor="middle">Framework auto-escaping (React JSX, Vue {{ }})</text>
    <text class="sl" x="320" y="130" text-anchor="middle">Context-aware encoding (HTML, JS, CSS, URL)</text>
    <rect class="bx-l" x="410" y="70" width="360" height="80" rx="6"/>
    <text class="lb" x="590" y="100" text-anchor="middle">Layer 2: Input Validation (Supplementary)</text>
    <text class="sl" x="470" y="130" text-anchor="middle">Allowlist validation (type, length, format, range)</text>
    <text class="sl" x="710" y="130" text-anchor="middle">Both client and server-side</text>
    <rect class="bx-l" x="30" y="170" width="360" height="80" rx="6"/>
    <text class="lb" x="210" y="200" text-anchor="middle">Layer 3: Content Security Policy (Safety Net)</text>
    <text class="sl" x="100" y="230" text-anchor="middle">script-src restricts script sources</text>
    <text class="sl" x="320" y="230" text-anchor="middle">No unsafe-inline / unsafe-eval</text>
    <rect class="bx-l" x="410" y="170" width="360" height="80" rx="6"/>
    <text class="lb" x="590" y="200" text-anchor="middle">Layer 4: Sanitization (HTML Input)</text>
    <text class="sl" x="470" y="230" text-anchor="middle">DOMPurify strips dangerous elements</text>
    <text class="sl" x="710" y="230" text-anchor="middle">Configurable allowlist for tags/attributes</text>
    <rect class="bx-l" x="30" y="280" width="740" height="60" rx="6"/>
    <text class="lb" x="400" y="310" text-anchor="middle">Framework-Specific Protections</text>
    <text class="sl" x="130" y="330" text-anchor="middle">React: JSX auto-escaping</text>
    <text class="sl" x="400" y="330" text-anchor="middle">Vue: Text interpolation escaping</text>
    <text class="sl" x="670" y="330" text-anchor="middle">Angular: DomSanitizer built-in</text>
  </g>
</svg>
