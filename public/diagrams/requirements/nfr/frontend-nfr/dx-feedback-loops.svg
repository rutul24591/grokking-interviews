<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">DX Feedback Loops</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Build times, test execution, and CI/CD feedback loop targets</text>
  
  <!-- Local Development Loop -->
  <rect x="30" y="80" width="250" height="140" fill="#e3f2fd" stroke="#2196f3" rx="6"/>
  <text x="155" y="105" text-anchor="middle" class="label" font-weight="bold">Local Development</text>
  <line x1="50" y1="115" x2="260" y2="115" stroke="#2196f3" stroke-width="1"/>
  
  <text x="60" y="140" text-anchor="start" class="small-label" font-weight="bold">Dev Server Start:</text>
  <text x="60" y="160" text-anchor="start" class="small-label">Target: &amp;lt;5 seconds</text>
  
  <text x="60" y="185" text-anchor="start" class="small-label" font-weight="bold">HMR Update:</text>
  <text x="60" y="205" text-anchor="start" class="small-label">Target: &amp;lt;1 second</text>
  
  <!-- Circular arrow for HMR -->
  <path d="M 200 140 A 30 30 0 1 1 200 200 A 30 30 0 1 1 200 140" fill="none" stroke="#2196f3" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="175" text-anchor="middle" class="small-label">Fast</text>
  
  <!-- Test Loop -->
  <rect x="300" y="80" width="250" height="140" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="425" y="105" text-anchor="middle" class="label" font-weight="bold">Test Execution</text>
  <line x1="320" y1="115" x2="530" y2="115" stroke="#4caf50" stroke-width="1"/>
  
  <text x="330" y="140" text-anchor="start" class="small-label" font-weight="bold">Unit Tests:</text>
  <text x="330" y="160" text-anchor="start" class="small-label">Target: &amp;lt;100ms/test</text>
  
  <text x="330" y="185" text-anchor="start" class="small-label" font-weight="bold">Run on save:</text>
  <text x="330" y="205" text-anchor="start" class="small-label">Changed files only</text>
  
  <!-- Test icon -->
  <rect x="480" y="140" width="60" height="60" fill="#c8e6c9" stroke="#4caf50" rx="3"/>
  <text x="510" y="165" text-anchor="middle" class="small-label" font-weight="bold">✓</text>
  <text x="510" y="185" text-anchor="middle" class="small-label">Pass</text>
  
  <!-- CI/CD Loop -->
  <rect x="570" y="80" width="250" height="140" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="695" y="105" text-anchor="middle" class="label" font-weight="bold">CI/CD Pipeline</text>
  <line x1="590" y1="115" x2="800" y2="115" stroke="#ff9800" stroke-width="1"/>
  
  <text x="600" y="140" text-anchor="start" class="small-label" font-weight="bold">Total Pipeline:</text>
  <text x="600" y="160" text-anchor="start" class="small-label">Target: &amp;lt;10 minutes</text>
  
  <text x="600" y="185" text-anchor="start" class="small-label" font-weight="bold">Parallel Jobs:</text>
  <text x="600" y="205" text-anchor="start" class="small-label">Lint + Test + Build</text>
  
  <!-- Pipeline stages -->
  <rect x="600" y="225" width="45" height="30" fill="#ffe0b2" stroke="#ff9800" rx="2"/>
  <text x="622" y="245" text-anchor="middle" class="small-label">Lint</text>
  
  <rect x="655" y="225" width="45" height="30" fill="#ffe0b2" stroke="#ff9800" rx="2"/>
  <text x="677" y="245" text-anchor="middle" class="small-label">Test</text>
  
  <rect x="710" y="225" width="45" height="30" fill="#ffe0b2" stroke="#ff9800" rx="2"/>
  <text x="732" y="245" text-anchor="middle" class="small-label">Build</text>
  
  <rect x="765" y="225" width="45" height="30" fill="#c8e6c9" stroke="#4caf50" rx="2"/>
  <text x="787" y="245" text-anchor="middle" class="small-label">✓</text>
  
  <!-- Timing Comparison -->
  <rect x="30" y="240" width="380" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="220" y="265" text-anchor="middle" class="label" font-weight="bold">Target Feedback Times</text>
  <line x1="50" y1="275" x2="390" y2="275" stroke="#999" stroke-width="1"/>
  
  <text x="60" y="300" text-anchor="start" class="small-label" fill="#4caf50">✓ Instant:</text>
  <text x="130" y="300" text-anchor="start" class="small-label">Linting, formatting (&amp;lt;1s)</text>
  
  <text x="60" y="320" text-anchor="start" class="small-label" fill="#4caf50">✓ Fast:</text>
  <text x="130" y="320" text-anchor="start" class="small-label">Unit tests, dev server (&amp;lt;5s)</text>
  
  <text x="60" y="340" text-anchor="start" class="small-label" fill="#ff9800">⚠ Medium:</text>
  <text x="150" y="340" text-anchor="start" class="small-label">Integration tests (&amp;lt;2min)</text>
  
  <text x="250" y="300" text-anchor="start" class="small-label" fill="#ff9800">⚠ Slow:</text>
  <text x="310" y="300" text-anchor="start" class="small-label">E2E tests (&amp;lt;5min)</text>
  
  <text x="250" y="320" text-anchor="start" class="small-label" fill="#f44336">✗ Too Slow:</text>
  <text x="340" y="320" text-anchor="start" class="small-label">CI &amp;gt;10min</text>
  
  <!-- Best Practices -->
  <rect x="430" y="240" width="390" height="100" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="625" y="265" text-anchor="middle" class="label" font-weight="bold">Best Practices</text>
  <line x1="450" y1="275" x2="800" y2="275" stroke="#4caf50" stroke-width="1"/>
  
  <text x="460" y="300" text-anchor="start" class="small-label" fill="#4caf50">✓ Cache dependencies between runs</text>
  <text x="460" y="320" text-anchor="start" class="small-label" fill="#4caf50">✓ Run tests in parallel</text>
  <text x="460" y="340" text-anchor="start" class="small-label" fill="#4caf50">✓ Skip irrelevant jobs</text>
  
  <text x="650" y="300" text-anchor="start" class="small-label" fill="#ff9800">⚠ Monitor build times</text>
  <text x="650" y="320" text-anchor="start" class="small-label" fill="#ff9800">⚠ Quarantine flaky tests</text>
  <text x="650" y="340" text-anchor="start" class="small-label" fill="#ff9800">⚠ Fail fast on critical errors</text>
</svg>
