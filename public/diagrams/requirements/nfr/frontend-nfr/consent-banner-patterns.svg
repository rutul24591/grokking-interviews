<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Consent Banner Patterns (GDPR/CCPA)</text>
  
  <!-- Banner Types -->
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Opt-In Banner</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Default: No tracking</text>
  <text x="65" y="145" font-size="9" class="text-primary">• User must accept</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Granular options</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Required for GDPR</text>
  <text x="65" y="190" font-size="9" class="text-primary">• Higher friction</text>
  <text x="65" y="205" font-size="9" class="text-primary">• Lower conversion</text>
  <text x="65" y="220" font-size="9" class="highlight-green">✓ Compliant</text>
  
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Opt-Out Banner</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Default: Tracking on</text>
  <text x="350" y="145" font-size="9" class="text-primary">• User must decline</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Simple interface</text>
  <text x="350" y="175" font-size="9" class="text-primary">• CCPA compliant</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Lower friction</text>
  <text x="350" y="205" font-size="9" class="text-primary">• Higher conversion</text>
  <text x="350" y="220" font-size="9" class="highlight-purple">⚠ Less privacy</text>
  
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Granular Consent</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Per-category consent</text>
  <text x="635" y="145" font-size="9" class="text-primary">• Essential (required)</text>
  <text x="635" y="160" font-size="9" class="text-primary">• Analytics (optional)</text>
  <text x="635" y="175" font-size="9" class="text-primary">• Marketing (optional)</text>
  <text x="635" y="190" font-size="9" class="text-primary">• Third-party (optional)</text>
  <text x="635" y="205" font-size="9" class="text-primary">• Best practice</text>
  <text x="635" y="220" font-size="9" class="highlight-green">✓ Most flexible</text>
  
  <!-- Consent Categories -->
  <rect x="30" y="270" width="840" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Consent Categories &amp; Requirements</text>
  
  <rect x="50" y="310" width="190" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="145" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Essential</text>
  <rect x="70" y="345" width="150" height="95" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="145" y="365" text-anchor="middle" font-size="9" class="text-primary">Required for site</text>
  <text x="145" y="380" text-anchor="middle" font-size="9" class="text-primary">No consent needed</text>
  <text x="145" y="395" text-anchor="middle" font-size="9" class="text-primary">Examples:</text>
  <text x="145" y="410" text-anchor="middle" font-size="8" class="text-secondary">• Session cookies</text>
  <text x="145" y="425" text-anchor="middle" font-size="8" class="text-secondary">• Auth tokens</text>
  <text x="145" y="440" text-anchor="middle" font-size="8" class="text-secondary">• Load balancing</text>
  
  <rect x="255" y="310" width="190" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Analytics</text>
  <rect x="275" y="345" width="150" height="95" rx="2" class="accent-box" stroke-width="1"/>
  <text x="350" y="365" text-anchor="middle" font-size="9" class="text-primary">Opt-in required</text>
  <text x="350" y="380" text-anchor="middle" font-size="9" class="text-primary">First-party OK</text>
  <text x="350" y="395" text-anchor="middle" font-size="9" class="text-primary">Examples:</text>
  <text x="350" y="410" text-anchor="middle" font-size="8" class="text-secondary">• Page views</text>
  <text x="350" y="425" text-anchor="middle" font-size="8" class="text-secondary">• Error tracking</text>
  <text x="350" y="440" text-anchor="middle" font-size="8" class="text-secondary">• Performance</text>
  
  <rect x="460" y="310" width="190" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="555" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Marketing</text>
  <rect x="480" y="345" width="150" height="95" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="555" y="365" text-anchor="middle" font-size="9" class="text-primary">Explicit opt-in</text>
  <text x="555" y="380" text-anchor="middle" font-size="9" class="text-primary">Can be withdrawn</text>
  <text x="555" y="395" text-anchor="middle" font-size="9" class="text-primary">Examples:</text>
  <text x="555" y="410" text-anchor="middle" font-size="8" class="text-secondary">• Ad targeting</text>
  <text x="555" y="425" text-anchor="middle" font-size="8" class="text-secondary">• Retargeting</text>
  <text x="555" y="440" text-anchor="middle" font-size="8" class="text-secondary">• Email tracking</text>
  
  <rect x="665" y="310" width="190" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="760" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Third-Party</text>
  <rect x="685" y="345" width="150" height="95" rx="2" class="highlight-purple" stroke-width="1"/>
  <text x="760" y="365" text-anchor="middle" font-size="9" class="text-primary">Explicit opt-in</text>
  <text x="760" y="380" text-anchor="middle" font-size="9" class="text-primary">Vendor list</text>
  <text x="760" y="395" text-anchor="middle" font-size="9" class="text-primary">Examples:</text>
  <text x="760" y="410" text-anchor="middle" font-size="8" class="text-secondary">• Social widgets</text>
  <text x="760" y="425" text-anchor="middle" font-size="8" class="text-secondary">• Ad networks</text>
  <text x="760" y="440" text-anchor="middle" font-size="8" class="text-secondary">• Embedded content</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>