<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">XSS Attack Types and Defense</text>
  
  <!-- XSS Types -->
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Stored XSS</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Malicious script saved</text>
  <text x="65" y="145" font-size="9" class="text-primary">• Executes for all users</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Comment sections</text>
  <text x="65" y="175" font-size="9" class="text-primary">• User profiles</text>
  <text x="65" y="190" font-size="9" class="text-primary">• Most dangerous</text>
  <text x="65" y="205" font-size="9" class="highlight-red">⚠ Persistent</text>
  <text x="65" y="220" font-size="9" class="highlight-red">⚠ Wide impact</text>
  <text x="65" y="235" font-size="9" class="highlight-green">✓ Input validation</text>
  
  <!-- Reflected XSS -->
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Reflected XSS</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Script in URL</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Reflected in response</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Requires user click</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Search results</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Error messages</text>
  <text x="350" y="205" font-size="9" class="highlight-purple">⚠ Social engineering</text>
  <text x="350" y="220" font-size="9" class="highlight-purple">⚠ One-time impact</text>
  <text x="350" y="235" font-size="9" class="highlight-green">✓ Output encoding</text>
  
  <!-- DOM-based XSS -->
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">DOM-based XSS</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Client-side injection</text>
  <text x="635" y="145" font-size="9" class="text-primary">• No server involvement</text>
  <text x="635" y="160" font-size="9" class="text-primary">• innerHTML, eval()</text>
  <text x="635" y="175" font-size="9" class="text-primary">• URL fragment</text>
  <text x="635" y="190" font-size="9" class="text-primary">• document.write()</text>
  <text x="635" y="205" font-size="9" class="highlight-red">⚠ Hard to detect</text>
  <text x="635" y="220" font-size="9" class="highlight-red">⚠ WAF bypass</text>
  <text x="635" y="235" font-size="9" class="highlight-green">✓ Safe DOM APIs</text>
  
  <!-- Defense Layers -->
  <rect x="30" y="270" width="840" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Defense in Depth Strategy</text>
  
  <rect x="50" y="310" width="190" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="145" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Input Validation</text>
  <rect x="70" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="145" y="365" text-anchor="middle" font-size="9" class="text-primary">• Whitelist allowed</text>
  <text x="145" y="380" text-anchor="middle" font-size="9" class="text-primary">• Type checking</text>
  <text x="145" y="395" text-anchor="middle" font-size="9" class="text-primary">• Length limits</text>
  <text x="145" y="410" text-anchor="middle" font-size="9" class="text-primary">• Format validation</text>
  <text x="145" y="425" text-anchor="middle" font-size="9" class="text-primary">• Sanitization</text>
  <text x="145" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ First line</text>
  
  <rect x="255" y="310" width="190" height="145" rx="3" class="accent-box" stroke-width="1.5"/>
  <text x="350" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Output Encoding</text>
  <rect x="275" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="350" y="365" text-anchor="middle" font-size="9" class="text-primary">• HTML entity encode</text>
  <text x="350" y="380" text-anchor="middle" font-size="9" class="text-primary">• Context-aware</text>
  <text x="350" y="395" text-anchor="middle" font-size="9" class="text-primary">• Auto-escaping</text>
  <text x="350" y="410" text-anchor="middle" font-size="9" class="text-primary">• Framework built-in</text>
  <text x="350" y="425" text-anchor="middle" font-size="9" class="text-primary">• Never trust input</text>
  <text x="350" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Most effective</text>
  
  <rect x="460" y="310" width="190" height="145" rx="3" class="highlight-box" stroke-width="1.5"/>
  <text x="555" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">CSP Headers</text>
  <rect x="480" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="555" y="365" text-anchor="middle" font-size="9" class="text-primary">• Script sources</text>
  <text x="555" y="380" text-anchor="middle" font-size="9" class="text-primary">• Inline blocking</text>
  <text x="555" y="395" text-anchor="middle" font-size="9" class="text-primary">• eval() blocking</text>
  <text x="555" y="410" text-anchor="middle" font-size="9" class="text-primary">• Report violations</text>
  <text x="555" y="425" text-anchor="middle" font-size="9" class="text-primary">• Nonce/Hash</text>
  <text x="555" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Strong defense</text>
  
  <rect x="665" y="310" width="190" height="145" rx="3" class="highlight-purple" stroke-width="1.5"/>
  <text x="760" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Framework Security</text>
  <rect x="685" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="760" y="365" text-anchor="middle" font-size="9" class="text-primary">• React auto-escape</text>
  <text x="760" y="380" text-anchor="middle" font-size="9" class="text-primary">• Angular sanitization</text>
  <text x="760" y="395" text-anchor="middle" font-size="9" class="text-primary">• Vue v-html caution</text>
  <text x="760" y="410" text-anchor="middle" font-size="9" class="text-primary">• Avoid dangerouslySet</text>
  <text x="760" y="425" text-anchor="middle" font-size="9" class="text-primary">• Use framework tools</text>
  <text x="760" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Leverage tools</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>