<svg xmlns="http://www.w3.org/2000/svg" " viewBox="0 0 900 550">
  <rect width="900" height="550" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Lazy Loading Techniques</text>
  
  <!-- Native Lazy Loading -->
  <rect x="30" y="70" width="270" height="160" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="165" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Native Lazy Loading</text>
  <line x1="50" y1="110" x2="280" y2="110" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="50" y="135" font-size="11" fill="#1e3a8a">&amp;lt;img loading="lazy" ... /&amp;gt;</text>
  <text x="50" y="160" font-size="11" fill="#1e3a8a">✓ Zero JavaScript</text>
  <text x="50" y="180" font-size="11" fill="#1e3a8a">✓ 85%+ browser support</text>
  <text x="50" y="200" font-size="11" fill="#1e3a8a">~ Limited customization</text>
  <text x="50" y="220" font-size="11" fill="#1e3a8a">Best for: Simple use cases</text>
  
  <!-- Intersection Observer -->
  <rect x="315" y="70" width="270" height="160" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Intersection Observer</text>
  <line x1="335" y1="110" x2="565" y2="110" stroke="#10b981" stroke-width="1"/>
  
  <text x="335" y="135" font-size="10" fill="#064e3b">const observer = new</text>
  <text x="335" y="150" font-size="10" fill="#064e3b">  IntersectionObserver(...)</text>
  <text x="335" y="175" font-size="11" fill="#064e3b">✓ Full control</text>
  <text x="335" y="195" font-size="11" fill="#064e3b">✓ Custom animations</text>
  <text x="335" y="215" font-size="11" fill="#064e3b">~ Requires JavaScript</text>
  <text x="335" y="230" font-size="11" fill="#064e3b">Best for: Custom UX</text>
  
  <!-- Progressive Loading -->
  <rect x="600" y="70" width="270" height="160" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="735" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Progressive Loading</text>
  <line x1="620" y1="110" x2="850" y2="110" stroke="#f59e0b" stroke-width="1"/>
  
  <!-- Visual representation -->
  <rect x="630" y="125" width="60" height="40" fill="#fcd34d" rx="2"/>
  <text x="660" y="150" text-anchor="middle" font-size="8" fill="#78350f">Blur</text>
  <line x1="700" y1="145" x2="720" y2="145" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="730" y="125" width="60" height="40" fill="#fbbf24" rx="2"/>
  <text x="760" y="150" text-anchor="middle" font-size="8" fill="#78350f">Full</text>
  
  <text x="620" y="185" font-size="11" fill="#78350f">✓ Best perceived perf</text>
  <text x="620" y="205" font-size="11" fill="#78350f">✓ Smooth UX</text>
  <text x="620" y="225" font-size="11" fill="#78350f">~ More complex</text>
  <text x="620" y="240" font-size="11" fill="#78350f">Best for: Hero images</text>
  
  <!-- Blur-up technique diagram -->
  <rect x="30" y="250" width="840" height="180" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Blur-Up Technique Flow</text>
  <line x1="50" y1="290" x2="850" y2="290" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Step 1 -->
  <circle cx="120" cy="340" r="8" fill="#3b82f6"/>
  <text x="120" y="335" text-anchor="middle" font-size="10" fill="white">1</text>
  <rect x="80" y="355" width="80" height="60" fill="#93c5fd" rx="2"/>
  <text x="120" y="390" text-anchor="middle" font-size="9" fill="#1e3a8a">Tiny thumb</text>
  <text x="120" y="405" text-anchor="middle" font-size="9" fill="#1e3a8a">(10px, ~500B)</text>
  
  <line x1="170" y1="385" x2="220" y2="385" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 2 -->
  <circle cx="270" cy="340" r="8" fill="#3b82f6"/>
  <text x="270" y="335" text-anchor="middle" font-size="10" fill="white">2</text>
  <rect x="230" y="355" width="80" height="60" fill="#93c5fd" rx="2" filter="blur(4px)"/>
  <text x="270" y="390" text-anchor="middle" font-size="9" fill="#1e3a8a">Blurry full</text>
  <text x="270" y="405" text-anchor="middle" font-size="9" fill="#1e3a8a">CSS blur()</text>
  
  <line x1="320" y1="385" x2="370" y2="385" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 3 -->
  <circle cx="420" cy="340" r="8" fill="#3b82f6"/>
  <text x="420" y="335" text-anchor="middle" font-size="10" fill="white">3</text>
  <rect x="380" y="355" width="80" height="60" fill="#60a5fa" rx="2"/>
  <text x="420" y="390" text-anchor="middle" font-size="9" fill="#1e3a8a">Load full</text>
  <text x="420" y="405" text-anchor="middle" font-size="9" fill="#1e3a8a">in background</text>
  
  <line x1="470" y1="385" x2="520" y2="385" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Step 4 -->
  <circle cx="570" cy="340" r="8" fill="#10b981"/>
  <text x="570" y="335" text-anchor="middle" font-size="10" fill="white">4</text>
  <rect x="530" y="355" width="80" height="60" fill="#34d399" rx="2"/>
  <text x="570" y="390" text-anchor="middle" font-size="9" fill="#064e3b">Fade in</text>
  <text x="570" y="405" text-anchor="middle" font-size="9" fill="#064e3b">CSS transition</text>
  
  <!-- Code snippet -->
  <rect x="50" y="450" width="800" height="70" fill="#1e293b" rx="4"/>
  <text x="70" y="470" font-size="9" fill="#22d3ee" font-family="monospace">// Intersection Observer for lazy loading</text>
  <text x="70" y="485" font-size="9" fill="#a78bfa" font-family="monospace">const observer = new IntersectionObserver((entries) =&amp;gt; &amp;#123;</text>
  <text x="90" y="500" font-size="9" fill="#fbbf24" font-family="monospace">  entries.forEach(entry =&amp;gt; &amp;#123;</text>
  <text x="110" y="515" font-size="9" fill="#fbbf24" font-family="monospace">    if (entry.isIntersecting) &amp;#123;</text>
  <text x="130" y="530" font-size="9" fill="#fbbf24" font-family="monospace">      img.src = img.dataset.src;</text>
  <text x="70" y="545" font-size="9" fill="#a78bfa" font-family="monospace">&amp;#125;);</text>
  
</svg>