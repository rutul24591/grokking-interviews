<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Lazy Loading Patterns</text>
  
  <!-- Native Lazy Loading -->
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Native Lazy Loading</text>
  
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  
  <rect x="70" y="125" width="190" height="40" rx="2" class="accent-box" stroke-width="1"/>
  <text x="165" y="145" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">&lt;img loading="lazy"&gt;</text>
  <text x="165" y="160" text-anchor="middle" font-size="8" class="text-secondary">HTML attribute</text>
  
  <text x="70" y="185" font-size="9" class="text-primary">• Browser handles everything</text>
  <text x="70" y="200" font-size="9" class="text-primary">• No JavaScript required</text>
  <text x="70" y="215" font-size="9" class="text-primary">• 85%+ browser support</text>
  
  <rect x="70" y="225" width="190" height="25" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="165" y="242" text-anchor="middle" font-size="8" class="text-primary">✓ Simplest approach</text>
  
  <!-- Intersection Observer -->
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Intersection Observer</text>
  
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="350" y="130" font-size="9" class="text-primary">• JavaScript API</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Watch element visibility</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Callback when in viewport</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Load image on callback</text>
  
  <rect x="350" y="190" width="190" height="35" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="445" y="205" text-anchor="middle" font-size="8" class="text-primary">const observer = new</text>
  <text x="445" y="220" text-anchor="middle" font-size="8" class="text-primary">IntersectionObserver(callback)</text>
  
  <rect x="350" y="225" width="190" height="25" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="445" y="242" text-anchor="middle" font-size="8" class="text-primary">✓ More control</text>
  
  <!-- Blur-Up Technique -->
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Blur-Up Technique</text>
  
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Visual representation -->
  <rect x="640" y="125" width="80" height="50" rx="2" class="highlight-purple" stroke-width="1"/>
  <text x="680" y="150" text-anchor="middle" font-size="8" class="text-primary">Tiny</text>
  <text x="680" y="165" text-anchor="middle" font-size="8" class="text-primary">blurry</text>
  
  <line x1="720" y1="150" x2="740" y2="150" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="740" y="125" width="80" height="50" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="780" y="150" text-anchor="middle" font-size="8" class="text-primary">Full</text>
  <text x="780" y="165" text-anchor="middle" font-size="8" class="text-primary">quality</text>
  
  <text x="640" y="195" font-size="9" class="text-primary">• Load tiny placeholder first</text>
  <text x="640" y="210" font-size="9" class="text-primary">• Load full image in background</text>
  <text x="640" y="225" font-size="9" class="text-primary">• Fade transition</text>
  
  <rect x="640" y="225" width="190" height="25" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="735" y="242" text-anchor="middle" font-size="8" class="text-primary">✓ Best perceived perf</text>
  
  <!-- Loading States -->
  <rect x="30" y="270" width="400" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="230" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Loading State Patterns</text>
  
  <rect x="50" y="310" width="360" height="145" rx="3" class="box-base" stroke-width="1"/>
  
  <rect x="70" y="325" width="320" height="35" rx="2" class="box-base" stroke-width="1"/>
  <text x="230" y="347" text-anchor="middle" font-size="9" class="text-primary">Skeleton Screen (gray box matching dimensions)</text>
  
  <rect x="70" y="365" width="320" height="35" rx="2" class="accent-box" stroke-width="1"/>
  <text x="230" y="387" text-anchor="middle" font-size="9" class="text-primary">Spinner/Loader (centered animation)</text>
  
  <rect x="70" y="405" width="320" height="35" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="230" y="427" text-anchor="middle" font-size="9" class="text-primary">Progressive (low-res → high-res transition)</text>
  
  <text x="70" y="445" font-size="9" class="highlight-green">✓ Show something immediately</text>
  
  <!-- Performance Impact -->
  <rect x="450" y="270" width="420" height="200" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="660" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Performance Impact</text>
  
  <rect x="470" y="310" width="380" height="145" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="490" y="330" font-size="9" font-weight="bold" class="text-primary">Benefits:</text>
  <text x="505" y="345" font-size="8" class="highlight-green">✓ Faster initial page load</text>
  <text x="505" y="360" font-size="8" class="highlight-green">✓ Reduced bandwidth usage</text>
  <text x="505" y="375" font-size="8" class="highlight-green">✓ Better Core Web Vitals (LCP)</text>
  <text x="505" y="390" font-size="8" class="highlight-green">✓ Improved user experience</text>
  
  <text x="490" y="415" font-size="9" font-weight="bold" class="text-primary">Considerations:</text>
  <text x="505" y="430" font-size="8" class="highlight-purple">⚠ Images may load slightly delayed</text>
  <text x="505" y="445" font-size="8" class="highlight-purple">⚠ Need placeholder strategy</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>