<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Virtualization Performance Impact</text>
  
  <!-- DOM Node Comparison -->
  <rect x="30" y="70" width="400" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="230" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Without Virtualization</text>
  
  <rect x="50" y="110" width="360" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="230" y="135" text-anchor="middle" font-size="10" class="text-primary">All 10,000 items rendered</text>
  
  <!-- Many DOM nodes -->
  <rect x="70" y="150" width="320" height="90" rx="2" class="highlight-red" stroke-width="1"/>
  <text x="230" y="170" text-anchor="middle" font-size="9" class="text-primary">10,000 DOM nodes</text>
  <text x="230" y="185" text-anchor="middle" font-size="9" class="highlight-red">⚠ High memory usage</text>
  <text x="230" y="200" text-anchor="middle" font-size="9" class="highlight-red">⚠ Slow initial render</text>
  <text x="230" y="215" text-anchor="middle" font-size="9" class="highlight-red">⚠ Janky scroll</text>
  <text x="230" y="230" text-anchor="middle" font-size="9" class="highlight-red">⚠ Long GC pauses</text>
  
  <rect x="470" y="70" width="400" height="200" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="670" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">With Virtualization</text>
  
  <rect x="490" y="110" width="360" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="670" y="135" text-anchor="middle" font-size="10" class="text-primary">Only visible items rendered</text>
  
  <!-- Few DOM nodes -->
  <rect x="510" y="150" width="320" height="90" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="670" y="170" text-anchor="middle" font-size="9" class="text-primary">~20 DOM nodes</text>
  <text x="670" y="185" text-anchor="middle" font-size="9" class="highlight-green">✓ Low memory usage</text>
  <text x="670" y="200" text-anchor="middle" font-size="9" class="highlight-green">✓ Fast initial render</text>
  <text x="670" y="215" text-anchor="middle" font-size="9" class="highlight-green">✓ Smooth scroll</text>
  <text x="670" y="230" text-anchor="middle" font-size="9" class="highlight-green">✓ Minimal GC</text>
  
  <!-- Performance Metrics -->
  <rect x="30" y="290" width="840" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="450" y="315" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Performance Comparison (10,000 items)</text>
  
  <rect x="50" y="330" width="800" height="125" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Metrics table -->
  <text x="100" y="350" font-size="9" font-weight="bold" class="text-primary">Metric</text>
  <text x="300" y="350" font-size="9" font-weight="bold" class="text-primary">Without Virtualization</text>
  <text x="550" y="350" font-size="9" font-weight="bold" class="text-primary">With Virtualization</text>
  <text x="750" y="350" font-size="9" font-weight="bold" class="text-primary">Improvement</text>
  
  <line x1="80" y1="360" x2="820" y2="360" class="arrow" stroke-width="1"/>
  <text x="100" y="375" font-size="8" class="text-primary">Initial Render</text>
  <text x="300" y="375" font-size="8" class="highlight-red">5-10 seconds</text>
  <text x="550" y="375" font-size="8" class="highlight-green">&lt;100ms</text>
  <text x="750" y="375" font-size="8" class="highlight-green">50-100x faster</text>
  
  <line x1="80" y1="385" x2="820" y2="385" class="arrow" stroke-width="1"/>
  <text x="100" y="400" font-size="8" class="text-primary">Memory Usage</text>
  <text x="300" y="400" font-size="8" class="highlight-red">50-100 MB</text>
  <text x="550" y="400" font-size="8" class="highlight-green">1-5 MB</text>
  <text x="750" y="400" font-size="8" class="highlight-green">10-20x less</text>
  
  <line x1="80" y1="410" x2="820" y2="410" class="arrow" stroke-width="1"/>
  <text x="100" y="425" font-size="8" class="text-primary">Scroll FPS</text>
  <text x="300" y="425" font-size="8" class="highlight-red">10-20 FPS</text>
  <text x="550" y="425" font-size="8" class="highlight-green">60 FPS</text>
  <text x="750" y="425" font-size="8" class="highlight-green">3-6x smoother</text>
  
  <line x1="80" y1="435" x2="820" y2="435" class="arrow" stroke-width="1"/>
  <text x="100" y="450" font-size="8" class="text-primary">Time to Interactive</text>
  <text x="300" y="450" font-size="8" class="highlight-red">10+ seconds</text>
  <text x="550" y="450" font-size="8" class="highlight-green">&lt;1 second</text>
  <text x="750" y="450" font-size="8" class="highlight-green">10x faster</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>