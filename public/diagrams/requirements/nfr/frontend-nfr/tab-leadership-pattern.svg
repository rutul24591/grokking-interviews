<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .leader { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">Tab Leadership Pattern</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Electing a leader tab for coordination, handling leader departure, and distributing work</text>
  
  <!-- Initial State -->
  <rect x="30" y="80" width="180" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="120" y="105" text-anchor="middle" class="label" font-weight="bold">Multiple Tabs Open</text>
  <line x1="50" y1="115" x2="190" y2="115" stroke="#999" stroke-width="1"/>
  
  <rect x="60" y="130" width="40" height="35" fill="#e0e0e0" stroke="#666" rx="3"/>
  <text x="80" y="152" text-anchor="middle" class="small-label">Tab 1</text>
  
  <rect x="110" y="130" width="40" height="35" fill="#e0e0e0" stroke="#666" rx="3"/>
  <text x="130" y="152" text-anchor="middle" class="small-label">Tab 2</text>
  
  <rect x="160" y="130" width="40" height="35" fill="#e0e0e0" stroke="#666" rx="3"/>
  <text x="180" y="152" text-anchor="middle" class="small-label">Tab 3</text>
  
  <line x1="210" y1="130" x2="250" y2="130" class="arrow"/>
  
  <!-- Election -->
  <rect x="250" y="80" width="150" height="100" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="325" y="105" text-anchor="middle" class="label" font-weight="bold">Leader Election</text>
  <line x1="270" y1="115" x2="380" y2="115" stroke="#ff9800" stroke-width="1"/>
  
  <text x="280" y="140" text-anchor="start" class="small-label">• First tab becomes leader</text>
  <text x="280" y="157" text-anchor="start" class="small-label">• Use BroadcastChannel</text>
  <text x="280" y="174" text-anchor="start" class="small-label">• Or leader-elect library</text>
  
  <line x1="400" y1="130" x2="440" y2="130" class="arrow"/>
  
  <!-- Leader Elected -->
  <rect x="440" y="80" width="180" height="100" fill="#e3f2fd" stroke="#2196f3" rx="6"/>
  <text x="530" y="105" text-anchor="middle" class="label" font-weight="bold">Leader Elected</text>
  <line x1="460" y1="115" x2="600" y2="115" stroke="#2196f3" stroke-width="1"/>
  
  <rect x="470" y="130" width="50" height="35" fill="#bbdefb" stroke="#2196f3" rx="3"/>
  <text x="495" y="152" text-anchor="middle" class="small-label" font-weight="bold">L</text>
  <text x="495" y="170" text-anchor="middle" class="small-label">Tab 1</text>
  
  <rect x="530" y="130" width="40" height="35" fill="#e0e0e0" stroke="#666" rx="3"/>
  <text x="550" y="152" text-anchor="middle" class="small-label">Tab 2</text>
  
  <rect x="580" y="130" width="40" height="35" fill="#e0e0e0" stroke="#666" rx="3"/>
  <text x="600" y="152" text-anchor="middle" class="small-label">Tab 3</text>
  
  <!-- Leader Responsibilities -->
  <rect x="650" y="80" width="180" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="740" y="105" text-anchor="middle" class="label" font-weight="bold">Leader Responsibilities</text>
  <line x1="670" y1="115" x2="810" y2="115" stroke="#999" stroke-width="1"/>
  
  <text x="680" y="140" text-anchor="start" class="small-label">• API polling</text>
  <text x="680" y="157" text-anchor="start" class="small-label">• Cleanup tasks</text>
  <text x="680" y="174" text-anchor="start" class="small-label">• Coordination</text>
  <text x="680" y="191" text-anchor="start" class="small-label">• Broadcast updates</text>
  
  <!-- Leader Departure -->
  <line x1="530" y1="180" x2="530" y2="210" class="arrow"/>
  
  <rect x="440" y="210" width="180" height="80" fill="#ffebee" stroke="#f44336" rx="6"/>
  <text x="530" y="235" text-anchor="middle" class="label" font-weight="bold">Leader Tab Closes</text>
  <line x1="460" y1="245" x2="600" y2="245" stroke="#f44336" stroke-width="1"/>
  <text x="530" y="270" text-anchor="middle" class="small-label">Detect via beforeunload</text>
  
  <line x1="530" y1="290" x2="530" y2="320" class="arrow"/>
  
  <!-- New Election -->
  <rect x="440" y="320" width="180" height="60" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="530" y="345" text-anchor="middle" class="small-label" font-weight="bold">New Leader Election</text>
  <text x="530" y="365" text-anchor="middle" class="small-label">Tab 2 becomes leader</text>
  
  <!-- Benefits -->
  <rect x="30" y="210" width="180" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="120" y="235" text-anchor="middle" class="label" font-weight="bold">Benefits</text>
  <line x1="50" y1="245" x2="190" y2="245" stroke="#999" stroke-width="1"/>
  
  <text x="60" y="270" text-anchor="start" class="small-label" fill="#4caf50">✓ Avoid duplicate work</text>
  <text x="60" y="287" text-anchor="start" class="small-label" fill="#4caf50">✓ Central coordination</text>
  <text x="60" y="304" text-anchor="start" class="small-label" fill="#4caf50">✓ Efficient resource use</text>
  
  <!-- Implementation -->
  <rect x="240" y="210" width="180" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="330" y="235" text-anchor="middle" class="label" font-weight="bold">Implementation</text>
  <line x1="260" y1="245" x2="400" y2="245" stroke="#999" stroke-width="1"/>
  
  <text x="270" y="270" text-anchor="start" class="small-label">• broadcast-channel lib</text>
  <text x="270" y="287" text-anchor="start" class="small-label">• leader-elect package</text>
  <text x="270" y="304" text-anchor="start" class="small-label">• Custom with Channel API</text>
  
  <!-- Use Cases -->
  <rect x="650" y="210" width="180" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="740" y="235" text-anchor="middle" class="label" font-weight="bold">Use Cases</text>
  <line x1="670" y1="245" x2="810" y2="245" stroke="#999" stroke-width="1"/>
  
  <text x="680" y="270" text-anchor="start" class="small-label">• Sync logout</text>
  <text x="680" y="287" text-anchor="start" class="small-label">• Background sync</text>
  <text x="680" y="304" text-anchor="start" class="small-label">• Notification coordination</text>
</svg>
