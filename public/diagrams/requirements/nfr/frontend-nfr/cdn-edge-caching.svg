<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <rect width="900" height="550" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">CDN Edge Caching Architecture</text>
  
  <!-- Origin -->
  <rect x="50" y="80" width="150" height="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="125" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Origin Server</text>
  <text x="125" y="140" text-anchor="middle" font-size="10" fill="#78350f">Your infrastructure</text>
  <text x="125" y="160" text-anchor="middle" font-size="10" fill="#78350f">AWS, GCP, etc.</text>
  
  <!-- Arrow to CDN -->
  <line x1="200" y1="130" x2="280" y2="130" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="120" text-anchor="middle" font-size="9" fill="#4f46e5">Push/Pull</text>
  
  <!-- CDN -->
  <rect x="290" y="60" width="320" height="140" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="450" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">CDN Network</text>
  <text x="450" y="105" text-anchor="middle" font-size="10" fill="#1e3a8a">Cloudflare, Akamai, Fastly</text>
  <line x1="310" y1="120" x2="590" y2="120" stroke="#3b82f6" stroke-width="1"/>
  
  <!-- PoP 1 -->
  <rect x="310" y="135" width="80" height="50" fill="#93c5fd" stroke="#2563eb" stroke-width="1" rx="4"/>
  <text x="350" y="160" text-anchor="middle" font-size="9" fill="#1e40af">PoP: US-East</text>
  
  <!-- PoP 2 -->
  <rect x="410" y="135" width="80" height="50" fill="#93c5fd" stroke="#2563eb" stroke-width="1" rx="4"/>
  <text x="450" y="160" text-anchor="middle" font-size="9" fill="#1e40af">PoP: EU-West</text>
  
  <!-- PoP 3 -->
  <rect x="510" y="135" width="80" height="50" fill="#93c5fd" stroke="#2563eb" stroke-width="1" rx="4"/>
  <text x="550" y="160" text-anchor="middle" font-size="9" fill="#1e40af">PoP: Asia</text>
  
  <!-- Arrows to users -->
  <line x1="610" y1="130" x2="680" y2="100" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="130" x2="680" y2="130" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="130" x2="680" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Users -->
  <circle cx="730" cy="90" r="25" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" font-size="9" fill="#5b21b6">User 1</text>
  <text x="730" y="108" text-anchor="middle" font-size="8" fill="#5b21b6">50ms</text>
  
  <circle cx="730" cy="130" r="25" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="730" y="135" text-anchor="middle" font-size="9" fill="#5b21b6">User 2</text>
  <text x="730" y="148" text-anchor="middle" font-size="8" fill="#5b21b6">80ms</text>
  
  <circle cx="730" cy="170" r="25" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="730" y="175" text-anchor="middle" font-size="9" fill="#5b21b6">User 3</text>
  <text x="730" y="188" text-anchor="middle" font-size="8" fill="#5b21b6">120ms</text>
  
  <!-- Cache HIT/MISS -->
  <rect x="50" y="240" width="400" height="120" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="250" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Cache HIT (90%+)</text>
  <line x1="70" y1="280" x2="430" y2="280" stroke="#10b981" stroke-width="1"/>
  <text x="70" y="305" font-size="11" fill="#064e3b">✓ Served from edge</text>
  <text x="220" y="305" font-size="11" fill="#064e3b">✓ Low latency</text>
  <text x="70" y="325" font-size="11" fill="#064e3b">✓ No origin load</text>
  <text x="220" y="325" font-size="11" fill="#064e3b">✓ Fast response</text>
  
  <rect x="470" y="240" width="380" height="120" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="660" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">Cache MISS (&amp;lt;10%)</text>
  <line x1="490" y1="280" x2="830" y2="280" stroke="#ef4444" stroke-width="1"/>
  <text x="490" y="305" font-size="11" fill="#7f1d1d">✗ Fetch from origin</text>
  <text x="660" y="305" font-size="11" fill="#7f1d1d">✗ Higher latency</text>
  <text x="490" y="325" font-size="11" fill="#7f1d1d">✗ Origin load</text>
  <text x="660" y="325" font-size="11" fill="#7f1d1d">✗ Then cached</text>
  
  <!-- Benefits -->
  <rect x="50" y="390" width="800" height="140" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">CDN Benefits</text>
  <line x1="70" y1="430" x2="830" y2="430" stroke="#6366f1" stroke-width="1"/>
  
  <text x="100" y="460" font-size="11" fill="#1e293b">⚡ Performance</text>
  <text x="220" y="460" font-size="11" fill="#475569">50-200ms vs 500ms+ to origin</text>
  
  <text x="100" y="485" font-size="11" fill="#1e293b">🛡️ Protection</text>
  <text x="220" y="485" font-size="11" fill="#475569">DDoS mitigation, WAF</text>
  
  <text x="100" y="510" font-size="11" fill="#1e293b">💰 Cost</text>
  <text x="220" y="510" font-size="11" fill="#475569">Reduced origin bandwidth</text>
  
  <text x="500" y="460" font-size="11" fill="#1e293b">🌍 Global</text>
  <text x="620" y="460" font-size="11" fill="#475569">200+ locations worldwide</text>
  
  <text x="500" y="485" font-size="11" fill="#1e293b">🔄 Edge Compute</text>
  <text x="620" y="485" font-size="11" fill="#475569">Workers, Lambda@Edge</text>
  
  <text x="500" y="510" font-size="11" fill="#1e293b">📦 Optimization</text>
  <text x="620" y="510" font-size="11" fill="#475569">Image resize, compression</text>
  
</svg>
