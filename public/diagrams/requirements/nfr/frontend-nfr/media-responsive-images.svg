<svg xmlns="http://www.w3.org/2000/svg" " viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Responsive Image Delivery</text>
  
  <!-- Device row -->
  <text x="450" y="70" text-anchor="middle" font-size="12" fill="#64748b">Same image, different devices</text>
  
  <!-- Mobile -->
  <rect x="50" y="90" width="120" height="200" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <text x="110" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Mobile</text>
  <rect x="60" y="135" width="100" height="80" fill="#93c5fd" rx="2"/>
  <text x="110" y="180" text-anchor="middle" font-size="9" fill="#1e3a8a">400×300</text>
  <text x="110" y="200" text-anchor="middle" font-size="9" fill="#1e3a8a">~25KB</text>
  <text x="110" y="220" text-anchor="middle" font-size="9" fill="#1e3a8a">WebP</text>
  <text x="110" y="240" text-anchor="middle" font-size="9" fill="#1e3a8a">1x density</text>
  <text x="110" y="270" text-anchor="middle" font-size="10" fill="#1e40af">Viewport: 360px</text>
  
  <!-- Tablet -->
  <rect x="220" y="90" width="140" height="200" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="290" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Tablet</text>
  <rect x="230" y="135" width="120" height="90" fill="#86efac" rx="2"/>
  <text x="290" y="185" text-anchor="middle" font-size="9" fill="#064e3b">768×576</text>
  <text x="290" y="205" text-anchor="middle" font-size="9" fill="#064e3b">~60KB</text>
  <text x="290" y="225" text-anchor="middle" font-size="9" fill="#064e3b">WebP</text>
  <text x="290" y="245" text-anchor="middle" font-size="9" fill="#064e3b">2x density</text>
  <text x="290" y="275" text-anchor="middle" font-size="10" fill="#065f46">Viewport: 768px</text>
  
  <!-- Desktop -->
  <rect x="410" y="90" width="180" height="200" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="4"/>
  <text x="500" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Desktop</text>
  <rect x="420" y="135" width="160" height="100" fill="#fcd34d" rx="2"/>
  <text x="500" y="195" text-anchor="middle" font-size="9" fill="#78350f">1200×750</text>
  <text x="500" y="215" text-anchor="middle" font-size="9" fill="#78350f">~120KB</text>
  <text x="500" y="235" text-anchor="middle" font-size="9" fill="#78350f">AVIF</text>
  <text x="500" y="255" text-anchor="middle" font-size="9" fill="#78350f">1x density</text>
  <text x="500" y="285" text-anchor="middle" font-size="10" fill="#92400e">Viewport: 1440px</text>
  
  <!-- Retina -->
  <rect x="640" y="90" width="160" height="200" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="4"/>
  <text x="720" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Retina/HiDPI</text>
  <rect x="650" y="135" width="140" height="90" fill="#c4b5fd" rx="2"/>
  <text x="720" y="185" text-anchor="middle" font-size="9" fill="#4c1d95">800×600</text>
  <text x="720" y="205" text-anchor="middle" font-size="9" fill="#4c1d95">~80KB</text>
  <text x="720" y="225" text-anchor="middle" font-size="9" fill="#4c1d95">WebP</text>
  <text x="720" y="245" text-anchor="middle" font-size="9" fill="#4c1d95">3x density</text>
  <text x="720" y="275" text-anchor="middle" font-size="10" fill="#5b21b6">Viewport: 375px (2x)</text>
  
  <!-- Code example -->
  <rect x="30" y="320" width="840" height="160" fill="#1e293b" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#e2e8f0">HTML Implementation</text>
  <line x1="50" y1="360" x2="850" y2="360" stroke="#475569" stroke-width="1"/>
  
  <text x="60" y="385" font-size="10" fill="#22d3ee" font-family="monospace">&amp;lt;picture&amp;gt;</text>
  <text x="80" y="405" font-size="10" fill="#a78bfa" font-family="monospace">&amp;lt;source type="image/avif"</text>
  <text x="80" y="425" font-size="10" fill="#fbbf24" font-family="monospace">{`  srcset="image-400.avif 400w,"}</text>
  <text x="80" y="445" font-size="10" fill="#fbbf24" font-family="monospace">{`           image-800.avif 800w,"}</text>
  <text x="80" y="465" font-size="10" fill="#fbbf24" font-family="monospace">           image-1200.avif 1200w" /&amp;gt;</text>
  <text x="60" y="485" font-size="10" fill="#22d3ee" font-family="monospace">  &amp;lt;img src="image-800.jpg" alt="..." /&amp;gt;</text>
  <text x="60" y="505" font-size="10" fill="#22d3ee" font-family="monospace">&amp;lt;/picture&amp;gt;</text>
  
  <!-- Key benefits -->
  <rect x="600" y="380" width="260" height="90" fill="#f1f5f9" stroke="#64748b" stroke-width="1" rx="6"/>
  <text x="730" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Benefits</text>
  <text x="620" y="420" font-size="10" fill="#475569">✓ 50-70% mobile data savings</text>
  <text x="620" y="440" font-size="10" fill="#475569">✓ Faster load on slow networks</text>
  <text x="620" y="460" font-size="10" fill="#475569">✓ Better LCP scores</text>
  
</svg>