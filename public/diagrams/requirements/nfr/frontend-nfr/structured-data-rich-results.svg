<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .rich { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; }
    </style>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">Structured Data &amp; Rich Results</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Examples of rich results enabled by Schema.org structured data</text>
  
  <!-- Product Rich Result -->
  <rect x="30" y="80" width="250" height="160" class="rich" rx="6"/>
  <text x="155" y="105" text-anchor="middle" class="label" font-weight="bold">Product</text>
  <line x1="50" y1="115" x2="260" y2="115" stroke="#4caf50" stroke-width="1"/>
  
  <rect x="50" y="125" width="220" height="105" fill="white" stroke="#4caf50" rx="3"/>
  <rect x="55" y="130" width="70" height="70" fill="#c8e6c9" stroke="#4caf50" rx="2"/>
  <text x="90" y="170" text-anchor="middle" class="small-label">Image</text>
  
  <text x="135" y="145" text-anchor="start" class="small-label" font-weight="bold">Product Name</text>
  <text x="135" y="160" text-anchor="start" class="small-label" fill="#ffc107">★★★★★ (128)</text>
  <text x="135" y="175" text-anchor="start" class="small-label" font-weight="bold" fill="#4caf50">$49.99</text>
  <text x="135" y="190" text-anchor="start" class="small-label" fill="#666">In Stock</text>
  <text x="135" y="205" text-anchor="start" class="small-label" fill="#1976d2">Free shipping</text>
  
  <text x="155" y="225" text-anchor="middle" class="small-label">Schema: Product</text>
  
  <!-- Recipe Rich Result -->
  <rect x="300" y="80" width="250" height="160" class="rich" rx="6"/>
  <text x="425" y="105" text-anchor="middle" class="label" font-weight="bold">Recipe</text>
  <line x1="320" y1="115" x2="530" y2="115" stroke="#4caf50" stroke-width="1"/>
  
  <rect x="320" y="125" width="220" height="105" fill="white" stroke="#4caf50" rx="3"/>
  <rect x="325" y="130" width="210" height="60" fill="#c8e6c9" stroke="#4caf50" rx="2"/>
  <text x="430" y="165" text-anchor="middle" class="small-label">Recipe Image</text>
  
  <text x="335" y="200" text-anchor="start" class="small-label" font-weight="bold">Chocolate Cake</text>
  <text x="335" y="215" text-anchor="start" class="small-label">⭐ 4.8 (256 reviews)</text>
  <text x="335" y="227" text-anchor="start" class="small-label">⏱️ 45 min | 🔥 320 cal</text>
  
  <text x="425" y="225" text-anchor="middle" class="small-label">Schema: Recipe</text>
  
  <!-- FAQ Rich Result -->
  <rect x="570" y="80" width="250" height="160" class="rich" rx="6"/>
  <text x="695" y="105" text-anchor="middle" class="label" font-weight="bold">FAQ</text>
  <line x1="590" y1="115" x2="800" y2="115" stroke="#4caf50" stroke-width="1"/>
  
  <rect x="590" y="125" width="220" height="105" fill="white" stroke="#4caf50" rx="3"/>
  <text x="610" y="145" text-anchor="start" class="small-label" font-weight="bold">▾ What is your return policy?</text>
  <text x="610" y="162" text-anchor="start" class="small-label">We accept returns within 30 days...</text>
  <text x="610" y="180" text-anchor="start" class="small-label" font-weight="bold">▾ How long does shipping take?</text>
  <text x="610" y="197" text-anchor="start" class="small-label">Standard shipping takes 3-5 business...</text>
  <text x="610" y="215" text-anchor="start" class="small-label" font-weight="bold">▾ Do you ship internationally?</text>
  
  <text x="695" y="225" text-anchor="middle" class="small-label">Schema: FAQPage</text>
  
  <!-- Event Rich Result -->
  <rect x="30" y="260" width="250" height="140" class="rich" rx="6"/>
  <text x="155" y="285" text-anchor="middle" class="label" font-weight="bold">Event</text>
  <line x1="50" y1="295" x2="260" y2="295" stroke="#4caf50" stroke-width="1"/>
  
  <rect x="50" y="305" width="220" height="85" fill="white" stroke="#4caf50" rx="3"/>
  <text x="160" y="325" text-anchor="middle" class="small-label" font-weight="bold">Tech Conference 2026</text>
  <text x="160" y="342" text-anchor="middle" class="small-label">📅 Mar 15-17, 2026</text>
  <text x="160" y="357" text-anchor="middle" class="small-label">📍 Moscone Center, SF</text>
  <text x="160" y="372" text-anchor="middle" class="small-label" fill="#4caf50">Tickets Available</text>
  <text x="160" y="387" text-anchor="middle" class="small-label" font-weight="bold">$299 - $599</text>
  
  <text x="155" y="385" text-anchor="middle" class="small-label">Schema: Event</text>
  
  <!-- Article Rich Result -->
  <rect x="300" y="260" width="250" height="140" class="rich" rx="6"/>
  <text x="425" y="285" text-anchor="middle" class="label" font-weight="bold">Article</text>
  <line x1="320" y1="295" x2="530" y2="295" stroke="#4caf50" stroke-width="1"/>
  
  <rect x="320" y="305" width="220" height="85" fill="white" stroke="#4caf50" rx="3"/>
  <rect x="325" y="310" width="60" height="60" fill="#c8e6c9" stroke="#4caf50" rx="2"/>
  <text x="355" y="345" text-anchor="middle" class="small-label">Image</text>
  
  <text x="395" y="325" text-anchor="start" class="small-label" font-weight="bold">Breaking: New Tech</text>
  <text x="395" y="340" text-anchor="start" class="small-label">Published: Mar 10, 2026</text>
  <text x="395" y="355" text-anchor="start" class="small-label">By John Doe</text>
  <text x="395" y="370" text-anchor="start" class="small-label">TechCrunch</text>
  
  <text x="425" y="385" text-anchor="middle" class="small-label">Schema: Article/NewsArticle</text>
  
  <!-- Local Business -->
  <rect x="570" y="260" width="250" height="140" class="rich" rx="6"/>
  <text x="695" y="285" text-anchor="middle" class="label" font-weight="bold">Local Business</text>
  <line x1="590" y1="295" x2="800" y2="295" stroke="#4caf50" stroke-width="1"/>
  
  <rect x="590" y="305" width="220" height="85" fill="white" stroke="#4caf50" rx="3"/>
  <text x="700" y="325" text-anchor="middle" class="small-label" font-weight="bold">Joe's Coffee Shop</text>
  <text x="700" y="342" text-anchor="middle" class="small-label">⭐ 4.5 (892 reviews)</text>
  <text x="700" y="357" text-anchor="middle" class="small-label">☕ Coffee Shop · $$</text>
  <text x="700" y="372" text-anchor="middle" class="small-label">📍 123 Main St, Open now</text>
  <text x="700" y="387" text-anchor="middle" class="small-label">📞 (555) 123-4567</text>
  
  <text x="695" y="385" text-anchor="middle" class="small-label">Schema: LocalBusiness</text>
  
  <!-- JSON-LD Example -->
  <rect x="30" y="420" width="790" height="70" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="425" y="445" text-anchor="middle" class="label" font-weight="bold">JSON-LD Format (Google Recommended)</text>
  <line x1="50" y1="455" x2="800" y2="455" stroke="#999" stroke-width="1"/>
  
  <text x="70" y="475" text-anchor="start" class="small-label">&amp;lt;script type="application/ld+json"&amp;gt;</text>
  <text x="70" y="487" text-anchor="start" class="small-label">{"@context": "https://schema.org", "@type": "Product", "name": "...", "image": "...", "offers": {...}}</text>
  <text x="70" y="499" text-anchor="start" class="small-label">&amp;lt;/script&amp;gt;</text>
  
  <text x="600" y="475" text-anchor="start" class="small-label" fill="#4caf50" font-weight="bold">Benefits:</text>
  <text x="680" y="475" text-anchor="start" class="small-label">Higher CTR</text>
  <text x="740" y="475" text-anchor="start" class="small-label">Better visibility</text>
  <text x="600" y="487" text-anchor="start" class="small-label">Voice search ready</text>
  <text x="680" y="487" text-anchor="start" class="small-label">Rich snippets</text>
</svg>
