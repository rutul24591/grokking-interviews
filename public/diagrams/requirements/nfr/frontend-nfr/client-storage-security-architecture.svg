<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
  <defs><style>.bg-l{fill:#f8f9fa}.bx-l{fill:#fff;stroke:#2563eb;stroke-width:2}.tl{fill:#1e293b;font-family:system-ui,sans-serif;font-size:18px;font-weight:700}.lb{fill:#334155;font-family:system-ui,sans-serif;font-size:13px;font-weight:600}.sl{fill:#64748b;font-family:system-ui,sans-serif;font-size:11px;font-weight:400}.ar{stroke:#2563eb;stroke-width:2;fill:none}</style></defs>
  <g class="light-mode">
    <rect class="bg-l" width="800" height="420" rx="8"/>
    <text class="tl" x="400" y="35" text-anchor="middle">Client Storage Security Architecture</text>
    <rect class="bx-l" x="30" y="70" width="180" height="100" rx="6"/>
    <text class="lb" x="120" y="100" text-anchor="middle">HttpOnly Cookies</text>
    <text class="sl" x="120" y="120" text-anchor="middle">Auth tokens (access + refresh)</text>
    <text class="sl" x="120" y="135" text-anchor="middle">Secure + SameSite flags</text>
    <text class="sl" x="120" y="150" text-anchor="middle">XSS-proof storage</text>
    <rect class="bx-l" x="230" y="70" width="180" height="100" rx="6"/>
    <text class="lb" x="320" y="100" text-anchor="middle">In-Memory Variables</text>
    <text class="sl" x="320" y="120" text-anchor="middle">Temporary sensitive data</text>
    <text class="sl" x="320" y="135" text-anchor="middle">Cleared on page unload</text>
    <text class="sl" x="320" y="150" text-anchor="middle">React state / Zustand store</text>
    <rect class="bx-l" x="430" y="70" width="180" height="100" rx="6"/>
    <text class="lb" x="520" y="100" text-anchor="middle">Encrypted IndexedDB</text>
    <text class="sl" x="520" y="120" text-anchor="middle">Offline data with AES-GCM</text>
    <text class="sl" x="520" y="135" text-anchor="middle">Key in memory only</text>
    <text class="sl" x="520" y="150" text-anchor="middle">Cleared on logout</text>
    <rect class="bx-l" x="630" y="70" width="140" height="100" rx="6"/>
    <text class="lb" x="700" y="100" text-anchor="middle">localStorage</text>
    <text class="sl" x="700" y="120" text-anchor="middle">Non-sensitive prefs only</text>
    <text class="sl" x="700" y="135" text-anchor="middle">Theme, language</text>
    <text class="sl" x="700" y="150" text-anchor="middle">Feature flags</text>
    <rect class="bx-l" x="30" y="210" width="740" height="90" rx="6"/>
    <text class="lb" x="400" y="240" text-anchor="middle">Token Lifecycle -- Login to Logout</text>
    <text class="sl" x="150" y="270" text-anchor="middle">Login -> server sets HttpOnly cookies</text>
    <text class="sl" x="400" y="270" text-anchor="middle">Auto-sent with every request</text>
    <text class="sl" x="650" y="270" text-anchor="middle">401 -> refresh -> retry original</text>
    <text class="sl" x="150" y="290" text-anchor="middle">Logout -> server invalidates + clears cookies</text>
    <text class="sl" x="650" y="290" text-anchor="middle">Token rotation on each refresh</text>
    <rect class="bx-l" x="30" y="320" width="360" height="80" rx="6"/>
    <text class="lb" x="210" y="350" text-anchor="middle">CSRF Protection</text>
    <text class="sl" x="100" y="380" text-anchor="middle">SameSite=Strict/Lax cookies</text>
    <text class="sl" x="320" y="380" text-anchor="middle">Custom X-CSRF-Token header</text>
    <rect class="bx-l" x="410" y="320" width="360" height="80" rx="6"/>
    <text class="lb" x="590" y="350" text-anchor="middle">Content Security Policy</text>
    <text class="sl" x="470" y="380" text-anchor="middle">script-src 'self' only</text>
    <text class="sl" x="710" y="380" text-anchor="middle">No unsafe-inline / unsafe-eval</text>
  </g>
</svg>
