<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <rect width="900" height="700" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Rendering Strategy Decision Tree</text>
  
  <!-- Start -->
  <rect x="350" y="70" width="200" height="60" fill="#6366f1" stroke="#4f46e5" stroke-width="2" rx="8"/>
  <text x="450" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Start: Choose Strategy</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="130" x2="450" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Q1: User-specific? -->
  <rect x="300" y="160" width="300" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="450" y="190" text-anchor="middle" font-size="12" fill="#92400e">Is content user-specific?</text>
  
  <!-- Yes branch -->
  <line x1="300" y1="185" x2="200" y2="185" stroke="#6366f1" stroke-width="2"/>
  <line x1="200" y1="185" x2="200" y2="240" stroke="#6366f1" stroke-width="2"/>
  <text x="250" y="180" font-size="11" fill="#1e40af">Yes</text>
  
  <!-- No branch -->
  <line x1="600" y1="185" x2="700" y2="185" stroke="#6366f1" stroke-width="2"/>
  <line x1="700" y1="185" x2="700" y2="240" stroke="#6366f1" stroke-width="2"/>
  <text x="650" y="180" font-size="11" fill="#1e40af">No</text>
  
  <!-- CSR result -->
  <rect x="140" y="240" width="120" height="50" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="6"/>
  <text x="200" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">CSR</text>
  
  <!-- Q2: SEO needed? -->
  <rect x="550" y="240" width="300" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="700" y="270" text-anchor="middle" font-size="12" fill="#92400e">Does it need SEO?</text>
  
  <!-- SEO No branch -->
  <line x1="550" y1="265" x2="450" y2="265" stroke="#6366f1" stroke-width="2"/>
  <line x1="450" y1="265" x2="450" y2="320" stroke="#6366f1" stroke-width="2"/>
  <text x="500" y="260" font-size="11" fill="#1e40af">No</text>
  
  <!-- SEO Yes branch -->
  <line x1="850" y1="265" x2="950" y2="265" stroke="#6366f1" stroke-width="2"/>
  <line x1="950" y1="265" x2="950" y2="320" stroke="#6366f1" stroke-width="2"/>
  <text x="900" y="260" font-size="11" fill="#1e40af">Yes</text>
  
  <!-- CSR for non-SEO -->
  <rect x="390" y="320" width="120" height="50" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="6"/>
  <text x="450" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">CSR</text>
  
  <!-- Q3: How often changes? -->
  <rect x="800" y="320" width="300" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="950" y="350" text-anchor="middle" font-size="12" fill="#92400e">How often does content change?</text>
  
  <!-- Never/rarely -->
  <line x1="800" y1="345" x2="700" y2="345" stroke="#6366f1" stroke-width="2"/>
  <line x1="700" y1="345" x2="700" y2="400" stroke="#6366f1" stroke-width="2"/>
  <text x="750" y="340" font-size="11" fill="#1e40af">Never/Rarely</text>
  
  <!-- Periodically -->
  <line x1="950" y1="370" x2="950" y2="400" stroke="#6366f1" stroke-width="2"/>
  <text x="1000" y="385" font-size="11" fill="#1e40af">Periodically</text>
  
  <!-- Every request -->
  <line x1="1100" y1="345" x2="1200" y2="345" stroke="#6366f1" stroke-width="2"/>
  <line x1="1200" y1="345" x2="1200" y2="400" stroke="#6366f1" stroke-width="2"/>
  <text x="1150" y="340" font-size="11" fill="#1e40af">Every request</text>
  
  <!-- SSG result -->
  <rect x="640" y="400" width="120" height="50" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="700" y="430" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">SSG</text>
  
  <!-- ISR result -->
  <rect x="890" y="400" width="120" height="50" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2" rx="6"/>
  <text x="950" y="430" text-anchor="middle" font-size="12" font-weight="bold" fill="#115e59">ISR</text>
  
  <!-- SSR result -->
  <rect x="1140" y="400" width="120" height="50" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="1200" y="430" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">SSR</text>
  
  <!-- Infrastructure note -->
  <rect x="50" y="500" width="800" height="80" fill="#f1f5f9" stroke="#64748b" stroke-width="2" rx="6"/>
  <text x="450" y="525" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Infrastructure Considerations</text>
  <line x1="70" y1="535" x2="830" y2="535" stroke="#64748b" stroke-width="1"/>
  <text x="70" y="555" font-size="11" fill="#475569">■ CDN only? → SSG or ISR</text>
  <text x="400" y="555" font-size="11" fill="#475569">■ Server available? → SSR or Hybrid</text>
  <text x="70" y="575" font-size="11" fill="#475569">■ Edge computing? → Edge SSR</text>
  
</svg>
