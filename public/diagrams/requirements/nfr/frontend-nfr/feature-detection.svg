<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Feature Detection Pattern</text>
  
  <!-- Bad approach -->
  <rect x="30" y="80" width="400" height="160" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="230" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">❌ Browser Detection (Bad)</text>
  <line x1="50" y1="120" x2="410" y2="120" stroke="#ef4444" stroke-width="1"/>
  
  <text x="50" y="145" font-size="11" fill="#7f1d1d" font-family="monospace">if (navigator.userAgent.includes(&apos;Chrome&apos;))</text>
  
  <text x="50" y="175" font-size="11" fill="#ef4444">✗ Fragile (UA can be spoofed)</text>
  <text x="50" y="200" font-size="11" fill="#ef4444">✗ Doesn&apos;t guarantee feature support</text>
  <text x="50" y="225" font-size="11" fill="#ef4444">✗ Requires constant updates</text>
  
  <!-- Good approach -->
  <rect x="470" y="80" width="400" height="160" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="670" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">✓ Feature Detection (Good)</text>
  <line x1="490" y1="120" x2="850" y2="120" stroke="#10b981" stroke-width="1"/>
  
  <text x="490" y="145" font-size="11" fill="#064e3b" font-family="monospace">if (&apos;fetch&apos; in window) { ... }</text>
  
  <text x="490" y="175" font-size="11" fill="#10b981">✓ Reliable (tests actual capability)</text>
  <text x="490" y="200" font-size="11" fill="#10b981">✓ Future-proof</text>
  <text x="490" y="225" font-size="11" fill="#10b981">✓ Works with any browser</text>
  
  <!-- Modernizr example -->
  <rect x="30" y="270" width="400" height="120" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="230" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Modernizr Approach</text>
  <line x1="50" y1="310" x2="410" y2="310" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="50" y="335" font-size="10" fill="#1e3a8a" font-family="monospace">&lt;html class=&quot;flexbox cssgrid no-webp&quot;&gt;</text>
  <text x="50" y="360" font-size="11" fill="#1e3a8a">✓ Adds feature classes to HTML</text>
  <text x="50" y="385" font-size="11" fill="#1e3a8a">✓ CSS can target support</text>
  
  <!-- Polyfill service -->
  <rect x="470" y="270" width="400" height="120" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="670" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Polyfill Service</text>
  <line x1="490" y1="310" x2="850" y2="310" stroke="#10b981" stroke-width="1"/>
  
  <text x="490" y="335" font-size="10" fill="#064e3b" font-family="monospace">&lt;script src=&quot;polyfill.io&quot;&gt;</text>
  <text x="490" y="360" font-size="11" fill="#064e3b">✓ Detects browser automatically</text>
  <text x="490" y="385" font-size="11" fill="#064e3b">✓ Serves only needed polyfills</text>
  
  <!-- Decision tree -->
  <rect x="30" y="420" width="840" height="60" fill="#f1f5f9" stroke="#64748b" stroke-width="1" rx="6"/>
  <text x="450" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Detection Strategy</text>
  <line x1="50" y1="450" x2="850" y2="450" stroke="#64748b" stroke-width="1"/>
  <text x="80" y="465" font-size="11" fill="#475569">1. Use feature detection first</text>
  <text x="300" y="465" font-size="11" fill="#475569">2. Use Modernizr for CSS features</text>
  <text x="550" y="465" font-size="11" fill="#475569">3. Use polyfill.io for JS features</text>
  
</svg>
