<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Resource Hints Performance Timeline</text>
  
  <!-- Timeline -->
  <line x1="50" y1="100" x2="850" y2="100" class="arrow" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="450" y="85" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Page Load Timeline</text>
  
  <!-- DNS Prefetch -->
  <rect x="80" y="120" width="100" height="80" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="130" y="140" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">DNS Prefetch</text>
  <rect x="100" y="155" width="60" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-size="8" class="text-primary">~20-100ms</text>
  <text x="130" y="190" text-anchor="middle" font-size="8" class="highlight-green">✓ DNS lookup</text>
  
  <!-- Preconnect -->
  <rect x="200" y="120" width="100" height="80" rx="3" class="accent-box" stroke-width="1.5"/>
  <text x="250" y="140" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Preconnect</text>
  <rect x="220" y="155" width="60" height="30" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="250" y="175" text-anchor="middle" font-size="8" class="text-primary">~100-300ms</text>
  <text x="250" y="190" text-anchor="middle" font-size="8" class="highlight-green">✓ Full connection</text>
  
  <!-- Prefetch -->
  <rect x="320" y="120" width="100" height="80" rx="3" class="highlight-box" stroke-width="1.5"/>
  <text x="370" y="140" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Prefetch</text>
  <rect x="340" y="155" width="60" height="30" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="370" y="175" text-anchor="middle" font-size="8" class="text-primary">Next page</text>
  <text x="370" y="190" text-anchor="middle" font-size="8" class="highlight-green">✓ Cache resource</text>
  
  <!-- Preload -->
  <rect x="440" y="120" width="100" height="80" rx="3" class="highlight-green" stroke-width="1.5"/>
  <text x="490" y="140" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Preload</text>
  <rect x="460" y="155" width="60" height="30" rx="2" class="highlight-blue" stroke-width="1"/>
  <text x="490" y="175" text-anchor="middle" font-size="8" class="text-primary">Critical</text>
  <text x="490" y="190" text-anchor="middle" font-size="8" class="highlight-green">✓ Current page</text>
  
  <!-- Prerender -->
  <rect x="560" y="120" width="100" height="80" rx="3" class="highlight-blue" stroke-width="1.5"/>
  <text x="610" y="140" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Prerender</text>
  <rect x="580" y="155" width="60" height="30" rx="2" class="highlight-purple" stroke-width="1"/>
  <text x="610" y="175" text-anchor="middle" font-size="8" class="text-primary">Full page</text>
  <text x="610" y="190" text-anchor="middle" font-size="8" class="highlight-purple">⚠ Heavy</text>
  
  <!-- Impact Analysis -->
  <rect x="30" y="230" width="840" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="255" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Performance Impact by Hint Type</text>
  
  <rect x="50" y="270" width="190" height="65" rx="3" class="box-base" stroke-width="1"/>
  <text x="145" y="290" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">dns-prefetch</text>
  <text x="145" y="310" text-anchor="middle" font-size="9" class="text-primary">Saves: 20-100ms</text>
  <text x="145" y="325" text-anchor="middle" font-size="9" class="highlight-green">✓ Low cost</text>
  
  <rect x="255" y="270" width="190" height="65" rx="3" class="accent-box" stroke-width="1"/>
  <text x="350" y="290" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">preconnect</text>
  <text x="350" y="310" text-anchor="middle" font-size="9" class="text-primary">Saves: 100-300ms</text>
  <text x="350" y="325" text-anchor="middle" font-size="9" class="highlight-green">✓ Medium cost</text>
  
  <rect x="460" y="270" width="190" height="65" rx="3" class="highlight-box" stroke-width="1"/>
  <text x="555" y="290" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">preload</text>
  <text x="555" y="310" text-anchor="middle" font-size="9" class="text-primary">Saves: 200-500ms</text>
  <text x="555" y="325" text-anchor="middle" font-size="9" class="highlight-green">✓ High impact</text>
  
  <rect x="665" y="270" width="190" height="65" rx="3" class="highlight-green" stroke-width="1"/>
  <text x="760" y="290" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">prefetch</text>
  <text x="760" y="310" text-anchor="middle" font-size="9" class="text-primary">Saves: 1-3s (next page)</text>
  <text x="760" y="325" text-anchor="middle" font-size="9" class="highlight-purple">⚠ Idle bandwidth</text>
  
  <!-- Best Practices -->
  <rect x="30" y="370" width="840" height="100" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="395" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Best Practices</text>
  
  <rect x="50" y="410" width="190" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="145" y="430" text-anchor="middle" font-size="9" class="text-primary">Use preconnect for CDN</text>
  <text x="145" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ 3rd party domains</text>
  
  <rect x="255" y="410" width="190" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="430" text-anchor="middle" font-size="9" class="text-primary">Preload critical assets</text>
  <text x="350" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Fonts, hero images</text>
  
  <rect x="460" y="410" width="190" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="555" y="430" text-anchor="middle" font-size="9" class="text-primary">Prefetch next page</text>
  <text x="555" y="445" text-anchor="middle" font-size="9" class="highlight-green">✓ Likely navigation</text>
  
  <rect x="665" y="410" width="190" height="45" rx="3" class="box-base" stroke-width="1"/>
  <text x="760" y="430" text-anchor="middle" font-size="9" class="text-primary">Limit to 3-5 hints</text>
  <text x="760" y="445" text-anchor="middle" font-size="9" class="highlight-red">⚠ Too many hurts</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>