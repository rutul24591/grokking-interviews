<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">Error Tracking Flow</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Error capture, context enrichment, grouping, and alerting</text>
  
  <!-- Error Sources -->
  <rect x="30" y="80" width="180" height="100" fill="#ffebee" stroke="#f44336" rx="6"/>
  <text x="120" y="105" text-anchor="middle" class="label" font-weight="bold">Error Sources</text>
  <line x1="50" y1="115" x2="190" y2="115" stroke="#f44336" stroke-width="1"/>
  
  <text x="60" y="140" text-anchor="start" class="small-label">• JavaScript errors</text>
  <text x="60" y="160" text-anchor="start" class="small-label">• Promise rejections</text>
  <text x="60" y="180" text-anchor="start" class="small-label">• API failures</text>
  <text x="60" y="200" text-anchor="start" class="small-label">• Resource errors</text>
  
  <line x1="210" y1="130" x2="250" y2="130" class="arrow"/>
  
  <!-- Capture -->
  <rect x="250" y="80" width="150" height="100" fill="#e3f2fd" stroke="#2196f3" rx="6"/>
  <text x="325" y="105" text-anchor="middle" class="label" font-weight="bold">Capture</text>
  <line x1="270" y1="115" x2="380" y2="115" stroke="#2196f3" stroke-width="1"/>
  
  <text x="280" y="140" text-anchor="start" class="small-label">• window.onerror</text>
  <text x="280" y="160" text-anchor="start" class="small-label">• onunhandledrejection</text>
  <text x="280" y="180" text-anchor="start" class="small-label">• Error boundaries</text>
  <text x="280" y="200" text-anchor="start" class="small-label">• API interceptors</text>
  
  <line x1="400" y1="130" x2="440" y2="130" class="arrow"/>
  
  <!-- Enrich -->
  <rect x="440" y="80" width="150" height="100" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="515" y="105" text-anchor="middle" class="label" font-weight="bold">Enrich Context</text>
  <line x1="460" y1="115" x2="570" y2="115" stroke="#4caf50" stroke-width="1"/>
  
  <text x="470" y="140" text-anchor="start" class="small-label">• User ID (anonymized)</text>
  <text x="470" y="160" text-anchor="start" class="small-label">• Browser, OS, device</text>
  <text x="470" y="180" text-anchor="start" class="small-label">• Page URL, referrer</text>
  <text x="470" y="200" text-anchor="start" class="small-label">• Recent actions</text>
  
  <line x1="590" y1="130" x2="630" y2="130" class="arrow"/>
  
  <!-- Group -->
  <rect x="630" y="80" width="150" height="100" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="705" y="105" text-anchor="middle" class="label" font-weight="bold">Group Errors</text>
  <line x1="650" y1="115" x2="760" y2="115" stroke="#ff9800" stroke-width="1"/>
  
  <text x="660" y="140" text-anchor="start" class="small-label">• By type + message</text>
  <text x="660" y="160" text-anchor="start" class="small-label">• Track frequency</text>
  <text x="660" y="180" text-anchor="start" class="small-label">• Identify trends</text>
  <text x="660" y="200" text-anchor="start" class="small-label">• Ignore known errors</text>
  
  <line x1="705" y1="180" x2="705" y2="210" class="arrow"/>
  
  <!-- Alert -->
  <rect x="630" y="210" width="150" height="60" fill="#fce4ec" stroke="#e91e63" rx="4"/>
  <text x="705" y="235" text-anchor="middle" class="small-label" font-weight="bold">Alert</text>
  <text x="705" y="255" text-anchor="middle" class="small-label">New errors, spikes</text>
  
  <!-- Tools -->
  <rect x="30" y="200" width="200" height="120" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="130" y="225" text-anchor="middle" class="label" font-weight="bold">Error Tracking Tools</text>
  <line x1="50" y1="235" x2="210" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="60" y="260" text-anchor="start" class="small-label" font-weight="bold">Sentry:</text>
  <text x="60" y="277" text-anchor="start" class="small-label">Popular, React integration</text>
  
  <text x="60" y="300" text-anchor="start" class="small-label" font-weight="bold">LogRocket:</text>
  <text x="60" y="317" text-anchor="start" class="small-label">Session replay, network logs</text>
  
  <!-- What to Log -->
  <rect x="250" y="200" width="200" height="120" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="350" y="225" text-anchor="middle" class="label" font-weight="bold">What to Log</text>
  <line x1="270" y1="235" x2="430" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="280" y="260" text-anchor="start" class="small-label">• Error message</text>
  <text x="280" y="280" text-anchor="start" class="small-label">• Stack trace</text>
  <text x="280" y="300" text-anchor="start" class="small-label">• User context</text>
  <text x="280" y="320" text-anchor="start" class="small-label">• Application state</text>
  
  <!-- Best Practices -->
  <rect x="470" y="200" width="360" height="120" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="650" y="225" text-anchor="middle" class="label" font-weight="bold">Best Practices</text>
  <line x1="490" y1="235" x2="810" y2="235" stroke="#4caf50" stroke-width="1"/>
  
  <text x="500" y="260" text-anchor="start" class="small-label" fill="#4caf50">✓ Sample errors (reduce volume)</text>
  <text x="500" y="280" text-anchor="start" class="small-label" fill="#4caf50">✓ Ignore expected errors</text>
  <text x="500" y="300" text-anchor="start" class="small-label" fill="#4caf50">✓ Protect PII</text>
  <text x="700" y="260" text-anchor="start" class="small-label" fill="#ff9800">⚠ Don't log everything</text>
  <text x="700" y="280" text-anchor="start" class="small-label" fill="#ff9800">⚠ Act on errors found</text>
</svg>
