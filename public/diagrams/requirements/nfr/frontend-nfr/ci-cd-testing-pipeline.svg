<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">CI/CD Testing Pipeline</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Unit tests on commit, integration on PR, E2E on staging, visual regression on UI changes</text>
  
  <!-- Commit -->
  <rect x="30" y="80" width="100" height="50" fill="#e8f5e9" stroke="#4caf50" rx="20"/>
  <text x="80" y="105" text-anchor="middle" class="small-label" font-weight="bold">Code Commit</text>
  <text x="80" y="120" text-anchor="middle" class="small-label">or PR created</text>
  
  <line x1="130" y1="105" x2="170" y2="105" class="arrow"/>
  
  <!-- Lint/Type-check -->
  <rect x="170" y="80" width="120" height="50" fill="#e3f2fd" stroke="#2196f3" rx="4"/>
  <text x="230" y="105" text-anchor="middle" class="small-label" font-weight="bold">Lint + Type-check</text>
  <text x="230" y="120" text-anchor="middle" class="small-label">ESLint, tsc</text>
  
  <line x1="290" y1="105" x2="330" y2="105" class="arrow"/>
  
  <!-- Unit Tests -->
  <rect x="330" y="80" width="120" height="50" fill="#c8e6c9" stroke="#4caf50" rx="4"/>
  <text x="390" y="105" text-anchor="middle" class="small-label" font-weight="bold">Unit Tests</text>
  <text x="390" y="120" text-anchor="middle" class="small-label">Jest, Vitest</text>
  
  <line x1="450" y1="105" x2="490" y2="105" class="arrow"/>
  
  <!-- Integration Tests -->
  <rect x="490" y="80" width="120" height="50" fill="#fff3e0" stroke="#ff9800" rx="4"/>
  <text x="550" y="105" text-anchor="middle" class="small-label" font-weight="bold">Integration Tests</text>
  <text x="550" y="120" text-anchor="middle" class="small-label">RTL, MSW</text>
  
  <line x1="610" y1="105" x2="650" y2="105" class="arrow"/>
  
  <!-- Build -->
  <rect x="650" y="80" width="100" height="50" fill="#bbdefb" stroke="#2196f3" rx="4"/>
  <text x="700" y="105" text-anchor="middle" class="small-label" font-weight="bold">Build</text>
  <text x="700" y="120" text-anchor="middle" class="small-label">Production bundle</text>
  
  <line x1="750" y1="105" x2="790" y2="105" class="arrow"/>
  
  <!-- Deploy Staging -->
  <rect x="790" y="80" width="50" height="50" fill="#e1bee7" stroke="#9c27b0" rx="4"/>
  <text x="815" y="105" text-anchor="middle" class="small-label" font-weight="bold">→</text>
  <text x="815" y="125" text-anchor="middle" class="small-label">Staging</text>
  
  <!-- E2E Tests -->
  <line x1="550" y1="130" x2="550" y2="160" class="arrow"/>
  
  <rect x="490" y="160" width="120" height="50" fill="#ffebee" stroke="#f44336" rx="4"/>
  <text x="550" y="185" text-anchor="middle" class="small-label" font-weight="bold">E2E Tests</text>
  <text x="550" y="200" text-anchor="middle" class="small-label">Cypress, Playwright</text>
  
  <line x1="550" y1="210" x2="550" y2="240" class="arrow"/>
  
  <!-- Visual Regression -->
  <rect x="490" y="240" width="120" height="50" fill="#f3e5f5" stroke="#9c27b0" rx="4"/>
  <text x="550" y="265" text-anchor="middle" class="small-label" font-weight="bold">Visual Regression</text>
  <text x="550" y="280" text-anchor="middle" class="small-label">Chromatic, Percy</text>
  
  <line x1="550" y1="290" x2="550" y2="320" class="arrow"/>
  
  <!-- Deploy Production -->
  <rect x="490" y="320" width="120" height="50" fill="#c8e6c9" stroke="#4caf50" rx="4"/>
  <text x="550" y="345" text-anchor="middle" class="small-label" font-weight="bold">✓ Deploy Production</text>
  
  <!-- Parallel Execution -->
  <rect x="30" y="180" width="200" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="130" y="205" text-anchor="middle" class="label" font-weight="bold">Parallel Execution</text>
  <line x1="50" y1="215" x2="210" y2="215" stroke="#999" stroke-width="1"/>
  
  <text x="60" y="240" text-anchor="start" class="small-label">• Lint + Unit (parallel)</text>
  <text x="60" y="260" text-anchor="start" class="small-label">• Multiple E2E shards</text>
  <text x="60" y="280" text-anchor="start" class="small-label">• Visual on UI changes only</text>
  
  <!-- Caching -->
  <rect x="250" y="180" width="200" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="350" y="205" text-anchor="middle" class="label" font-weight="bold">Caching</text>
  <line x1="270" y1="215" x2="430" y2="215" stroke="#999" stroke-width="1"/>
  
  <text x="280" y="240" text-anchor="start" class="small-label">• node_modules cache</text>
  <text x="280" y="260" text-anchor="start" class="small-label">• Build cache</text>
  <text x="280" y="280" text-anchor="start" class="small-label">• Test results cache</text>
  
  <!-- Gates -->
  <rect x="680" y="180" width="150" height="100" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="755" y="205" text-anchor="middle" class="label" font-weight="bold">Quality Gates</text>
  <line x1="700" y1="215" x2="810" y2="215" stroke="#ff9800" stroke-width="1"/>
  
  <text x="710" y="240" text-anchor="start" class="small-label" fill="#4caf50">✓ All tests pass</text>
  <text x="710" y="260" text-anchor="start" class="small-label" fill="#4caf50">✓ No lint errors</text>
  <text x="710" y="280" text-anchor="start" class="small-label" fill="#f44336">✗ Block on failure</text>
  
  <!-- Timing -->
  <rect x="30" y="300" width="800" height="80" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="425" y="325" text-anchor="middle" class="label" font-weight="bold">Target Pipeline Timing</text>
  <line x1="50" y1="335" x2="810" y2="335" stroke="#4caf50" stroke-width="1"/>
  
  <text x="100" y="360" text-anchor="start" class="small-label">Lint: &amp;lt;30s</text>
  <text x="220" y="360" text-anchor="start" class="small-label">Unit: &amp;lt;2min</text>
  <text x="350" y="360" text-anchor="start" class="small-label">Integration: &amp;lt;3min</text>
  <text x="500" y="360" text-anchor="start" class="small-label">E2E: &amp;lt;5min (parallel)</text>
  <text x="680" y="360" text-anchor="start" class="small-label">Total: &amp;lt;10min</text>
</svg>
