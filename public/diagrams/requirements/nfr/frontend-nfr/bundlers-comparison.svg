<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Bundler Comparison</text>
  
  <!-- Webpack -->
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Webpack</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Mature ecosystem</text>
  <text x="65" y="145" font-size="9" class="text-primary">• Highly configurable</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Large plugin market</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Complex config</text>
  <text x="65" y="190" font-size="9" class="text-primary">• Slower builds</text>
  <text x="65" y="205" font-size="9" class="highlight-green">✓ Most features</text>
  <text x="65" y="220" font-size="9" class="highlight-red">⚠ Complex</text>
  <text x="65" y="235" font-size="9" class="highlight-purple">⚠ Slow for large</text>
  
  <!-- Vite -->
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Vite</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Native ESM dev</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Instant HMR</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Rollup for prod</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Simple config</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Fast builds</text>
  <text x="350" y="205" font-size="9" class="highlight-green">✓ Fastest dev</text>
  <text x="350" y="220" font-size="9" class="highlight-green">✓ Simple</text>
  <text x="350" y="235" font-size="9" class="highlight-green">✓ Modern</text>
  
  <!-- esbuild -->
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">esbuild</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Written in Go</text>
  <text x="635" y="145" font-size="9" class="text-primary">• 10-100x faster</text>
  <text x="635" y="160" font-size="9" class="text-primary">• Single binary</text>
  <text x="635" y="175" font-size="9" class="text-primary">• Limited plugins</text>
  <text x="635" y="190" font-size="9" class="text-primary">• Bundler + minifier</text>
  <text x="635" y="205" font-size="9" class="highlight-green">✓ Fastest build</text>
  <text x="635" y="220" font-size="9" class="highlight-purple">⚠ Less mature</text>
  <text x="635" y="235" font-size="9" class="highlight-green">✓ Simple</text>
  
  <!-- Performance Comparison -->
  <rect x="30" y="270" width="840" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Build Performance Comparison (Large App)</text>
  
  <rect x="50" y="310" width="800" height="145" rx="3" class="box-base" stroke-width="1"/>
  
  <text x="100" y="330" font-size="9" font-weight="bold" class="text-primary">Bundler</text>
  <text x="250" y="330" font-size="9" font-weight="bold" class="text-primary">Cold Build</text>
  <text x="400" y="330" font-size="9" font-weight="bold" class="text-primary">HMR Update</text>
  <text x="550" y="330" font-size="9" font-weight="bold" class="text-primary">Prod Build</text>
  <text x="700" y="330" font-size="9" font-weight="bold" class="text-primary">Best For</text>
  
  <line x1="80" y1="340" x2="820" y2="340" class="arrow" stroke-width="1"/>
  <text x="100" y="355" font-size="8" class="text-primary">Webpack</text>
  <text x="250" y="355" font-size="8" class="highlight-red">30-60s</text>
  <text x="400" y="355" font-size="8" class="highlight-purple">500-1000ms</text>
  <text x="550" y="355" font-size="8" class="highlight-red">60-120s</text>
  <text x="700" y="355" font-size="8" class="text-secondary">Legacy, complex</text>
  
  <line x1="80" y1="375" x2="820" y2="375" class="arrow" stroke-width="1"/>
  <text x="100" y="390" font-size="8" class="text-primary">Vite</text>
  <text x="250" y="390" font-size="8" class="highlight-green">&lt;1s</text>
  <text x="400" y="390" font-size="8" class="highlight-green">&lt;50ms</text>
  <text x="550" y="390" font-size="8" class="highlight-blue">20-40s</text>
  <text x="700" y="390" font-size="8" class="text-secondary">Modern apps</text>
  
  <line x1="80" y1="410" x2="820" y2="410" class="arrow" stroke-width="1"/>
  <text x="100" y="425" font-size="8" class="text-primary">esbuild</text>
  <text x="250" y="425" font-size="8" class="highlight-green">&lt;1s</text>
  <text x="400" y="425" font-size="8" class="highlight-green">N/A</text>
  <text x="550" y="425" font-size="8" class="highlight-green">&lt;10s</text>
  <text x="700" y="425" font-size="8" class="text-secondary">Speed critical</text>
  
  <line x1="80" y1="445" x2="820" y2="445" class="arrow" stroke-width="1"/>
  <text x="100" y="460" font-size="8" class="text-primary">Turbopack</text>
  <text x="250" y="460" font-size="8" class="highlight-green">&lt;1s</text>
  <text x="400" y="460" font-size="8" class="highlight-green">&lt;10ms</text>
  <text x="550" y="460" font-size="8" class="highlight-purple">Beta</text>
  <text x="700" y="460" font-size="8" class="text-secondary">Next.js apps</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>