<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">SLO Error Budget Burn Rate</text>
  
  <!-- Burn Rate Chart -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="600" height="250" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="300" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Error Budget Burn Rate</text>
    
    <!-- Y axis -->
    <line x1="60" y1="60" x2="60" y2="220" stroke="#666" stroke-width="2"/>
    <text x="50" y="65" text-anchor="end" font-family="system-ui" font-size="9" fill="#e0e0e0">100%</text>
    <text x="50" y="140" text-anchor="end" font-family="system-ui" font-size="9" fill="#e0e0e0">50%</text>
    <text x="50" y="220" text-anchor="end" font-family="system-ui" font-size="9" fill="#e0e0e0">0%</text>
    <text x="30" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0" transform="rotate(-90, 30, 140)">Budget Remaining</text>
    
    <!-- X axis -->
    <line x1="60" y1="220" x2="560" y2="220" stroke="#666" stroke-width="2"/>
    <text x="310" y="245" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Time (30-day window)</text>
    
    <!-- Expected burn line -->
    <line x1="60" y1="60" x2="560" y2="220" stroke="#67b26f" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="500" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">Expected (1x)</text>
    
    <!-- Fast burn -->
    <polyline points="60,60 150,100 240,140 330,180 420,220" fill="none" stroke="#d9534f" stroke-width="3"/>
    <text x="350" y="170" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">Fast burn (2x)</text>
    <text x="350" y="185" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">Exhaust in 15 days</text>
    
    <!-- Slow burn -->
    <polyline points="60,60 200,80 340,100 480,120 560,135" fill="none" stroke="#4a90d9" stroke-width="3"/>
    <text x="500" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#4a90d9">Slow burn (0.5x)</text>
    <text x="500" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#4a90d9">Budget surplus</text>
    
    <!-- Alert thresholds -->
    <line x1="60" y1="140" x2="560" y2="140" stroke="#f0ad4e" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="570" y="145" text-anchor="start" font-family="system-ui" font-size="8" fill="#f0ad4e">Alert: 50% budget</text>
  </g>
  
  <!-- Alerting Thresholds -->
  <g transform="translate(670, 80)">
    <rect x="0" y="0" width="180" height="250" rx="8" fill="#1a2a1a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="90" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Burn Rate Alerts</text>
    
    <rect x="15" y="50" width="150" height="180" rx="4" fill="#2a2a4a"/>
    
    <text x="25" y="75" font-family="system-ui" font-size="9" fill="#d9534f">Burn Rate {'>'} 14.4</text>
    <text x="25" y="90" font-family="system-ui" font-size="8" fill="#e0e0e0">Page immediately</text>
    <text x="25" y="103" font-family="system-ui" font-size="8" fill="#999">Exhaust in 1 hour</text>
    
    <line x1="20" y1="115" x2="160" y2="115" stroke="#666" stroke-width="1"/>
    
    <text x="25" y="135" font-family="system-ui" font-size="9" fill="#f0ad4e">Burn Rate {'>'} 6</text>
    <text x="25" y="150" font-family="system-ui" font-size="8" fill="#e0e0e0">Page on-call</text>
    <text x="25" y="163" font-family="system-ui" font-size="8" fill="#999">Exhaust in 6 hours</text>
    
    <line x1="20" y1="175" x2="160" y2="175" stroke="#666" stroke-width="1"/>
    
    <text x="25" y="195" font-family="system-ui" font-size="9" fill="#4a90d9">Burn Rate {'>'} 3</text>
    <text x="25" y="210" font-family="system-ui" font-size="8" fill="#e0e0e0">Create ticket</text>
    <text x="25" y="223" font-family="system-ui" font-size="8" fill="#999">Exhaust in 2 days</text>
  </g>
  
  <!-- Multi-Window Alerting -->
  <g transform="translate(50, 360)">
    <rect x="0" y="0" width="800" height="100" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Multi-Window Burn Rate Alerting</text>
    
    <rect x="20" y="45" width="230" height="40" rx="3" fill="#4a90d9" opacity="0.4"/>
    <text x="135" y="65" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#4a90d9">Short Window (1 hour)</text>
    <text x="135" y="80" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Detect sudden spikes</text>
    
    <rect x="270" y="45" width="230" height="40" rx="3" fill="#67b26f" opacity="0.4"/>
    <text x="385" y="65" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#67b26f">Medium Window (6 hours)</text>
    <text x="385" y="80" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Detect sustained issues</text>
    
    <rect x="520" y="45" width="260" height="40" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="650" y="65" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">Long Window (30 days)</text>
    <text x="650" y="80" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Track overall trend</text>
  </g>
</svg>
