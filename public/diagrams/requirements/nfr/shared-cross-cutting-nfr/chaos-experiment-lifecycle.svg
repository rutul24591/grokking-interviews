<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Chaos Experiment Lifecycle</text>
  
  <!-- Experiment Flow -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Chaos Experiment Lifecycle</text>
    
    <!-- Define Hypothesis -->
    <circle cx="80" cy="100" r="40" fill="#4a90d9"/>
    <text x="80" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">1. Define</text>
    <text x="80" y="115" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Hypothesis</text>
    <text x="80" y="135" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">"If X fails, Y happens"</text>
    
    <line x1="120" y1="100" x2="165" y2="100" stroke="#666" stroke-width="3"/>
    <polygon points="165,100 155,95 155,105" fill="#666"/>
    
    <!-- Design Experiment -->
    <circle cx="220" cy="100" r="40" fill="#67b26f"/>
    <text x="220" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">2. Design</text>
    <text x="220" y="115" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Experiment</text>
    <text x="220" y="135" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Scope, blast radius</text>
    
    <line x1="260" y1="100" x2="305" y2="100" stroke="#666" stroke-width="3"/>
    <polygon points="305,100 295,95 295,105" fill="#666"/>
    
    <!-- Run Experiment -->
    <circle cx="360" cy="100" r="40" fill="#f0ad4e"/>
    <text x="360" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">3. Run</text>
    <text x="360" y="115" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Experiment</text>
    <text x="360" y="135" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Inject failure</text>
    
    <line x1="400" y1="100" x2="445" y2="100" stroke="#666" stroke-width="3"/>
    <polygon points="445,100 435,95 435,105" fill="#666"/>
    
    <!-- Observe -->
    <circle cx="500" cy="100" r="40" fill="#4a90d9"/>
    <text x="500" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">4. Observe</text>
    <text x="500" y="115" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">&amp; Measure</text>
    <text x="500" y="135" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Monitor metrics</text>
    
    <line x1="540" y1="100" x2="585" y2="100" stroke="#666" stroke-width="3"/>
    <polygon points="585,100 575,95 575,105" fill="#666"/>
    
    <!-- Analyze -->
    <circle cx="640" cy="100" r="40" fill="#67b26f"/>
    <text x="640" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">5. Analyze</text>
    <text x="640" y="115" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Results</text>
    <text x="640" y="135" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Compare to hypothesis</text>
    
    <line x1="680" y1="100" x2="725" y2="100" stroke="#666" stroke-width="3" stroke-dasharray="5,3"/>
    <polygon points="725,100 715,95 715,105" fill="#666"/>
    
    <!-- Improve -->
    <rect x="725" y="60" width="60" height="80" rx="6" fill="#6f42c1"/>
    <text x="755" y="95" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="white">6.</text>
    <text x="755" y="110" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="white">Improve</text>
    <text x="755" y="128" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Fix issues</text>
  </g>
  
  <!-- Hypothesis Template -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Hypothesis Template</text>
    
    <rect x="20" y="50" width="360" height="90" rx="4" fill="#2a2a4a"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="9" fill="#e0e0e0">We believe that injecting</text>
    <text x="35" y="95" font-family="system-ui" font-size="9" fill="#f0ad4e" font-style="italic">[failure type]</text>
    <text x="35" y="115" font-family="system-ui" font-size="9" fill="#e0e0e0">into</text>
    <text x="35" y="135" font-family="system-ui" font-size="9" fill="#f0ad4e" font-style="italic">[system/service]</text>
    
    <text x="220" y="75" font-family="system-ui" font-size="9" fill="#e0e0e0">will result in</text>
    <text x="220" y="95" font-family="system-ui" font-size="9" fill="#f0ad4e" font-style="italic">[expected outcome]</text>
    <text x="220" y="115" font-family="system-ui" font-size="9" fill="#e0e0e0">and we will know this is true when</text>
    <text x="220" y="135" font-family="system-ui" font-size="9" fill="#f0ad4e" font-style="italic">[measurable signal]</text>
  </g>
  
  <!-- Success Metrics -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Success Metrics</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="9" fill="#e0e0e0">Error rate stays below threshold</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="9" fill="#e0e0e0">Latency increase {'<'} X%</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="9" fill="#e0e0e0">Auto-recovery within Y seconds</text>
      
      <circle cx="8" cy="68" r="4" fill="#67b26f"/>
      <text x="20" y="73" font-family="system-ui" font-size="9" fill="#e0e0e0">Alerts fire correctly</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="9" fill="#e0e0e0">Runbooks execute properly</text>
      
      <circle cx="180" cy="28" r="4" fill="#f0ad4e"/>
      <text x="192" y="33" font-family="system-ui" font-size="9" fill="#e0e0e0">No customer impact</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="9" fill="#e0e0e0">Data integrity maintained</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="9" fill="#e0e0e0">Team response time</text>
    </g>
  </g>
</svg>
