<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Network Security Architecture</text>
  
  <!-- Network Layers -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Defense in Depth: Network Layers</text>
    
    <!-- Edge -->
    <rect x="30" y="60" width="220" height="100" rx="4" fill="#4a90d9" opacity="0.4"/>
    <text x="140" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Edge Layer</text>
    <text x="140" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• CDN (CloudFlare, CloudFront)</text>
    <text x="140" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• DDoS protection</text>
    <text x="140" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• WAF (Web Application Firewall)</text>
    <text x="140" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Rate limiting</text>
    <text x="140" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">First line of defense</text>
    
    <!-- Perimeter -->
    <rect x="270" y="60" width="220" height="100" rx="4" fill="#67b26f" opacity="0.4"/>
    <text x="380" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Perimeter Layer</text>
    <text x="380" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Load Balancers</text>
    <text x="380" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• API Gateway</text>
    <text x="380" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Network Firewall</text>
    <text x="380" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Bastion hosts</text>
    <text x="380" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Control ingress/egress</text>
    
    <!-- Internal -->
    <rect x="510" y="60" width="220" height="100" rx="4" fill="#f0ad4e" opacity="0.4"/>
    <text x="620" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Internal Layer</text>
    <text x="620" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• VPC/VNet segmentation</text>
    <text x="620" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security groups/NSGs</text>
    <text x="620" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• mTLS between services</text>
    <text x="620" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Zero trust network</text>
    <text x="620" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Assume breach, limit blast radius</text>
  </g>
  
  <!-- Security Groups -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Security Group Rules</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">Principle:</text>
      <text x="70" y="0" font-family="system-ui" font-size="8" fill="#67b26f">Default deny, explicit allow</text>
      
      <rect x="0" y="15" width="360" height="25" rx="3" fill="#4a90d9" opacity="0.3"/>
      <text x="180" y="32" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Allow: LB → App (port 8080)</text>
      
      <rect x="0" y="50" width="360" height="25" rx="3" fill="#67b26f" opacity="0.3"/>
      <text x="180" y="67" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Allow: App → DB (port 5432)</text>
      
      <rect x="0" y="85" width="360" height="25" rx="3" fill="#f0ad4e" opacity="0.3"/>
      <text x="180" y="102" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Deny: Direct internet → DB</text>
      
      <rect x="0" y="120" width="360" height="25" rx="3" fill="#d9534f" opacity="0.3"/>
      <text x="180" y="137" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Deny: All egress except required</text>
    </g>
  </g>
  
  <!-- Zero Trust -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Zero Trust Principles</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Never trust, always verify</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Least privilege access</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Assume breach</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Verify explicitly (authN + authZ)</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Micro-segmentation</text>
      
      <circle cx="180" cy="28" r="4" fill="#67b26f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Encrypt all traffic</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Continuous monitoring</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Device health verification</text>
    </g>
  </g>
</svg>
