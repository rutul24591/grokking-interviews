<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Privacy Compliance Framework</text>
  
  <!-- Privacy Principles -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="400" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Privacy Principles</text>
    
    <rect x="20" y="50" width="360" height="130" rx="4" fill="#1a1a2e"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="10" fill="#67b26f">✓ Lawfulness, Fairness, Transparency</text>
    <text x="35" y="95" font-family="system-ui" font-size="10" fill="#67b26f">✓ Purpose Limitation</text>
    <text x="35" y="115" font-family="system-ui" font-size="10" fill="#67b26f">✓ Data Minimization</text>
    <text x="35" y="135" font-family="system-ui" font-size="10" fill="#67b26f">✓ Accuracy</text>
    <text x="35" y="155" font-family="system-ui" font-size="10" fill="#67b26f">✓ Storage Limitation</text>
    <text x="35" y="175" font-family="system-ui" font-size="10" fill="#67b26f">✓ Integrity &amp; Confidentiality</text>
  </g>
  
  <!-- User Rights -->
  <g transform="translate(470, 80)">
    <rect x="0" y="0" width="380" height="200" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">User Rights (GDPR)</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="150" height="35" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="75" y="22" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#4a90d9">Right to Access</text>
      <text x="75" y="33" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">30-day response</text>
      
      <rect x="170" y="0" width="150" height="35" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="245" y="22" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#67b26f">Right to Erasure</text>
      <text x="245" y="33" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">"Right to be forgotten"</text>
      
      <rect x="0" y="45" width="150" height="35" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="75" y="67" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#f0ad4e">Right to Portability</text>
      <text x="75" y="78" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Machine-readable format</text>
      
      <rect x="170" y="45" width="150" height="35" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="245" y="67" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#d9534f">Right to Rectification</text>
      <text x="245" y="78" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Correct inaccurate data</text>
      
      <rect x="0" y="90" width="150" height="35" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="75" y="112" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#6f42c1">Right to Object</text>
      <text x="75" y="123" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Opt-out of processing</text>
      
      <rect x="170" y="90" width="150" height="35" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="245" y="112" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#4a90d9">Right to Restrict</text>
      <text x="245" y="123" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Limit processing scope</text>
    </g>
  </g>
  
  <!-- Compliance Checklist -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#1a2a1a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Compliance Implementation Checklist</text>
    
    <g transform="translate(30, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="9" fill="#e0e0e0">Data inventory &amp; mapping</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="9" fill="#e0e0e0">Privacy policy updated</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="9" fill="#e0e0e0">Consent management system</text>
      
      <circle cx="8" cy="68" r="4" fill="#67b26f"/>
      <text x="20" y="73" font-family="system-ui" font-size="9" fill="#e0e0e0">Data subject request process</text>
      
      <circle cx="250" cy="8" r="4" fill="#67b26f"/>
      <text x="262" y="13" font-family="system-ui" font-size="9" fill="#e0e0e0">Breach notification procedure</text>
      
      <circle cx="250" cy="28" r="4" fill="#f0ad4e"/>
      <text x="262" y="33" font-family="system-ui" font-size="9" fill="#e0e0e0">DPIA for high-risk processing</text>
      
      <circle cx="250" cy="48" r="4" fill="#67b26f"/>
      <text x="262" y="53" font-family="system-ui" font-size="9" fill="#e0e0e0">Data Processing Agreements (DPAs)</text>
      
      <circle cx="250" cy="68" r="4" fill="#67b26f"/>
      <text x="262" y="73" font-family="system-ui" font-size="9" fill="#e0e0e0">Staff training completed</text>
      
      <circle cx="500" cy="8" r="4" fill="#67b26f"/>
      <text x="512" y="13" font-family="system-ui" font-size="9" fill="#e0e0e0">Encryption at rest &amp; transit</text>
      
      <circle cx="500" cy="28" r="4" fill="#67b26f"/>
      <text x="512" y="33" font-family="system-ui" font-size="9" fill="#e0e0e0">Access controls implemented</text>
      
      <circle cx="500" cy="48" r="4" fill="#67b26f"/>
      <text x="512" y="53" font-family="system-ui" font-size="9" fill="#e0e0e0">Audit logging enabled</text>
      
      <circle cx="500" cy="68" r="4" fill="#f0ad4e"/>
      <text x="512" y="73" font-family="system-ui" font-size="9" fill="#e0e0e0">Annual compliance audit</text>
    </g>
  </g>
</svg>
