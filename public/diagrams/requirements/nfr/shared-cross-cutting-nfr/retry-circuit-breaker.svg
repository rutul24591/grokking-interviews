<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Retry Patterns &amp; Circuit Breaker</text>
  
  <!-- Retry with Exponential Backoff -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="400" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Exponential Backoff with Jitter</text>
    
    <!-- Timeline -->
    <line x1="40" y1="80" x2="360" y2="80" stroke="#666" stroke-width="2"/>
    
    <!-- Attempt 1 -->
    <circle cx="70" cy="80" r="15" fill="#d9534f"/>
    <text x="70" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">1</text>
    <text x="70" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Fail</text>
    
    <line x1="85" y1="80" x2="120" y2="80" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="102" y="72" font-family="system-ui" font-size="8" fill="#f0ad4e">1s</text>
    
    <!-- Attempt 2 -->
    <circle cx="140" cy="80" r="15" fill="#d9534f"/>
    <text x="140" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">2</text>
    <text x="140" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Fail</text>
    
    <line x1="155" y1="80" x2="210" y2="80" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="182" y="72" font-family="system-ui" font-size="8" fill="#f0ad4e">2s + jitter</text>
    
    <!-- Attempt 3 -->
    <circle cx="230" cy="80" r="15" fill="#d9534f"/>
    <text x="230" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">3</text>
    <text x="230" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Fail</text>
    
    <line x1="245" y1="80" x2="320" y2="80" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="282" y="72" font-family="system-ui" font-size="8" fill="#f0ad4e">4s + jitter</text>
    
    <!-- Attempt 4 -->
    <circle cx="340" cy="80" r="15" fill="#67b26f"/>
    <text x="340" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">4</text>
    <text x="340" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Success</text>
    
    <text x="200" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">delay = base_delay × 2^attempt × random(0.5, 1.5)</text>
    <text x="200" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Max retries: 3-5 | Max delay: 30-60s</text>
    <text x="200" y="180" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Jitter prevents thundering herd</text>
  </g>
  
  <!-- Circuit Breaker States -->
  <g transform="translate(470, 80)">
    <rect x="0" y="0" width="380" height="200" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#d9534f">Circuit Breaker States</text>
    
    <!-- CLOSED -->
    <circle cx="80" cy="90" r="45" fill="#67b26f" opacity="0.6"/>
    <text x="80" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">CLOSED</text>
    <text x="80" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Normal operation</text>
    <text x="80" y="120" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Requests flow through</text>
    <text x="80" y="133" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Track failures</text>
    
    <!-- Arrow to OPEN -->
    <line x1="125" y1="90" x2="165" y2="90" stroke="#d9534f" stroke-width="3"/>
    <polygon points="165,90 155,85 155,95" fill="#d9534f"/>
    <text x="145" y="82" font-family="system-ui" font-size="7" fill="#d9534f">Failures {'>'} threshold</text>
    
    <!-- OPEN -->
    <circle cx="210" cy="90" r="45" fill="#d9534f" opacity="0.6"/>
    <text x="210" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">OPEN</text>
    <text x="210" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Failing fast</text>
    <text x="210" y="120" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Requests rejected</text>
    <text x="210" y="133" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Timeout countdown</text>
    
    <!-- Arrow to HALF-OPEN -->
    <line x1="255" y1="90" x2="295" y2="90" stroke="#f0ad4e" stroke-width="3"/>
    <polygon points="295,90 285,85 285,95" fill="#f0ad4e"/>
    <text x="275" y="82" font-family="system-ui" font-size="7" fill="#f0ad4e">Timeout expires</text>
    
    <!-- HALF-OPEN -->
    <circle cx="330" cy="130" r="40" fill="#f0ad4e" opacity="0.6"/>
    <text x="330" y="125" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="white">HALF-</text>
    <text x="330" y="140" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="white">OPEN</text>
    <text x="330" y="158" text-anchor="middle" font-family="system-ui" font-size="6" fill="#e0e0e0">Test with limited requests</text>
    
    <!-- Arrow back to CLOSED -->
    <path d="M 290 130 Q 200 130 150 110" fill="none" stroke="#67b26f" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="150,110 160,115 155,105" fill="#67b26f"/>
    <text x="200" y="145" text-anchor="middle" font-family="system-ui" font-size="6" fill="#67b26f">Success → CLOSED</text>
    
    <!-- Arrow back to OPEN -->
    <path d="M 310 110 Q 250 70 230 70" fill="none" stroke="#d9534f" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="230,70 240,75 235,65" fill="#d9534f"/>
    <text x="270" y="65" text-anchor="middle" font-family="system-ui" font-size="6" fill="#d9534f">Failure → OPEN</text>
  </g>
  
  <!-- Configuration Parameters -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#1a2a1a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Circuit Breaker Configuration</text>
    
    <g transform="translate(30, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="9" fill="#e0e0e0">Failure Threshold:</text>
      <text x="150" y="0" font-family="system-ui" font-size="9" fill="#67b26f">5 failures in 60s window</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="9" fill="#e0e0e0">Success Threshold:</text>
      <text x="150" y="20" font-family="system-ui" font-size="9" fill="#67b26f">3 successes in HALF-OPEN</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="9" fill="#e0e0e0">Timeout:</text>
      <text x="150" y="40" font-family="system-ui" font-size="9" fill="#67b26f">30 seconds in OPEN state</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="9" fill="#e0e0e0">Half-Open Max Requests:</text>
      <text x="150" y="60" font-family="system-ui" font-size="9" fill="#67b26f">3 test requests</text>
      
      <text x="400" y="20" font-family="system-ui" font-size="8" fill="#999">Tune based on:</text>
      <text x="400" y="35" font-family="system-ui" font-size="8" fill="#999">• Service criticality</text>
      <text x="400" y="50" font-family="system-ui" font-size="8" fill="#999">• Expected failure rate</text>
      <text x="400" y="65" font-family="system-ui" font-size="8" fill="#999">• Recovery time expectations</text>
    </g>
  </g>
</svg>
