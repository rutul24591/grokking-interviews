<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Cache Stampede Prevention</text>
  
  <!-- Stampede Problem -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#d9534f">Cache Stampede Problem</text>
    
    <!-- Time axis -->
    <line x1="50" y1="70" x2="750" y2="70" stroke="#666" stroke-width="2"/>
    <text x="760" y="75" font-family="system-ui" font-size="9" fill="#e0e0e0">Time →</text>
    
    <!-- Cache valid -->
    <rect x="50" y="50" width="200" height="40" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="150" y="75" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Cache Valid</text>
    
    <!-- Cache expires -->
    <line x1="250" y1="50" x2="250" y2="90" stroke="#d9534f" stroke-width="3" stroke-dasharray="4,2"/>
    <text x="250" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">Cache Expires</text>
    
    <!-- Thundering herd -->
    <circle cx="280" cy="70" r="15" fill="#d9534f" opacity="0.6"/>
    <text x="280" y="75" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">R1</text>
    
    <circle cx="310" cy="70" r="15" fill="#d9534f" opacity="0.6"/>
    <text x="310" y="75" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">R2</text>
    
    <circle cx="340" cy="70" r="15" fill="#d9534f" opacity="0.6"/>
    <text x="340" y="75" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">R3</text>
    
    <circle cx="370" cy="70" r="15" fill="#d9534f" opacity="0.6"/>
    <text x="370" y="75" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">R4</text>
    
    <text x="450" y="75" text-anchor="middle" font-family="system-ui" font-size="9" fill="#d9534f">All requests hit DB simultaneously!</text>
    
    <!-- DB overload -->
    <rect x="500" y="50" width="100" height="40" rx="3" fill="#d9534f" opacity="0.6"/>
    <text x="550" y="75" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">DB Overload</text>
    
    <line x1="400" y1="70" x2="495" y2="70" stroke="#d9534f" stroke-width="2"/>
    <polygon points="495,70 485,65 485,75" fill="#d9534f"/>
  </g>
  
  <!-- Solutions -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="250" height="200" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="125" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Mutex/Lock</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="210" height="35" rx="3" fill="#4a90d9" opacity="0.3"/>
      <text x="105" y="22" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">First request gets lock</text>
      
      <rect x="0" y="45" width="210" height="35" rx="3" fill="#67b26f" opacity="0.3"/>
      <text x="105" y="67" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Others wait or serve stale</text>
      
      <rect x="0" y="90" width="210" height="35" rx="3" fill="#f0ad4e" opacity="0.3"/>
      <text x="105" y="112" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Single DB query</text>
      
      <rect x="0" y="135" width="210" height="35" rx="3" fill="#4a90d9" opacity="0.3"/>
      <text x="105" y="157" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Release lock, update cache</text>
    </g>
  </g>
  
  <g transform="translate(320, 250)">
    <rect x="0" y="0" width="250" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="125" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Early Expiration</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="210" height="35" rx="3" fill="#4a90d9" opacity="0.3"/>
      <text x="105" y="22" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Set TTL shorter than actual</text>
      
      <rect x="0" y="45" width="210" height="35" rx="3" fill="#67b26f" opacity="0.3"/>
      <text x="105" y="67" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Background refresh before expiry</text>
      
      <rect x="0" y="90" width="210" height="35" rx="3" fill="#f0ad4e" opacity="0.3"/>
      <text x="105" y="112" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Probabilistic: P(refresh) increases</text>
      
      <rect x="0" y="135" width="210" height="35" rx="3" fill="#4a90d9" opacity="0.3"/>
      <text x="105" y="157" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Spreads load over time</text>
    </g>
  </g>
  
  <g transform="translate(590, 250)">
    <rect x="0" y="0" width="250" height="200" rx="8" fill="#1a2a1a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="125" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Stale-While-Revalidate</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="210" height="35" rx="3" fill="#f0ad4e" opacity="0.3"/>
      <text x="105" y="22" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Serve stale immediately</text>
      
      <rect x="0" y="45" width="210" height="35" rx="3" fill="#67b26f" opacity="0.3"/>
      <text x="105" y="67" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Trigger async refresh</text>
      
      <rect x="0" y="90" width="210" height="35" rx="3" fill="#4a90d9" opacity="0.3"/>
      <text x="105" y="112" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Update cache when ready</text>
      
      <rect x="0" y="135" width="210" height="35" rx="3" fill="#f0ad4e" opacity="0.3"/>
      <text x="105" y="157" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Best UX, no waiting</text>
    </g>
  </g>
</svg>
