<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad3)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Backward Compatibility Strategies</text>
  
  <!-- Tolerant Reader -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow3)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Tolerant Reader</text>
    
    <rect x="20" y="50" width="220" height="75" rx="4" fill="#1a1a2e"/>
    <text x="30" y="70" font-family="monospace" font-size="9" fill="#e0e0e0">// Read only known fields</text>
    <text x="30" y="85" font-family="monospace" font-size="9" fill="#67b26f">data.name // ✓</text>
    <text x="30" y="100" font-family="monospace" font-size="9" fill="#67b26f">data.email // ✓</text>
    <text x="30" y="115" font-family="monospace" font-size="9" fill="#999">// newField ignored</text>
    
    <text x="130" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Ignore unknown fields</text>
  </g>
  
  <!-- Field Aliasing -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow3)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Field Aliasing</text>
    
    <rect x="20" y="50" width="220" height="75" rx="4" fill="#1a1a2e"/>
    <text x="30" y="70" font-family="monospace" font-size="9" fill="#e0e0e0">// Support both names</text>
    <text x="30" y="85" font-family="monospace" font-size="9" fill="#4a90d9">@alias("userName", "username")</text>
    <text x="30" y="100" font-family="monospace" font-size="9" fill="#e0e0e0">String username;</text>
    <text x="30" y="115" font-family="monospace" font-size="9" fill="#999">// Both work</text>
    
    <text x="130" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Support multiple names</text>
  </g>
  
  <!-- Default Values -->
  <g transform="translate(590, 80)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow3)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Default Values</text>
    
    <rect x="20" y="50" width="220" height="75" rx="4" fill="#1a1a2e"/>
    <text x="30" y="70" font-family="monospace" font-size="9" fill="#e0e0e0">// New optional field</text>
    <text x="30" y="85" font-family="monospace" font-size="9" fill="#f0ad4e">bool notifications = true;</text>
    <text x="30" y="100" font-family="monospace" font-size="9" fill="#e0e0e0">// Old clients work</text>
    <text x="30" y="115" font-family="monospace" font-size="9" fill="#999">// Default if missing</text>
    
    <text x="130" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Safe defaults for new fields</text>
  </g>
  
  <!-- Compatibility Matrix -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow3)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Compatibility Matrix</text>
    
    <rect x="30" y="50" width="740" height="130" rx="4" fill="#2a2a4a"/>
    
    <!-- Headers -->
    <text x="50" y="75" font-family="system-ui" font-size="11" font-weight="bold" fill="#e0e0e0">Change Type</text>
    <text x="250" y="75" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Backward Compatible</text>
    <text x="450" y="75" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Forward Compatible</text>
    <text x="650" y="75" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Migration Needed</text>
    
    <!-- Row 1 -->
    <line x1="50" y1="90" x2="770" y2="90" stroke="#666" stroke-width="1"/>
    <text x="50" y="108" font-family="system-ui" font-size="10" fill="#e0e0e0">Add optional field</text>
    <text x="250" y="110" font-family="system-ui" font-size="12" fill="#67b26f">✓ Yes</text>
    <text x="450" y="110" font-family="system-ui" font-size="12" fill="#67b26f">✓ Yes</text>
    <text x="650" y="110" font-family="system-ui" font-size="12" fill="#d9534f">✗ No</text>
    
    <!-- Row 2 -->
    <line x1="50" y1="120" x2="770" y2="120" stroke="#666" stroke-width="1"/>
    <text x="50" y="138" font-family="system-ui" font-size="10" fill="#e0e0e0">Add enum value</text>
    <text x="250" y="140" font-family="system-ui" font-size="12" fill="#67b26f">✓ Yes*</text>
    <text x="450" y="140" font-family="system-ui" font-size="12" fill="#67b26f">✓ Yes</text>
    <text x="650" y="140" font-family="system-ui" font-size="12" fill="#d9534f">✗ No</text>
    
    <!-- Row 3 -->
    <line x1="50" y1="150" x2="770" y2="150" stroke="#666" stroke-width="1"/>
    <text x="50" y="168" font-family="system-ui" font-size="10" fill="#e0e0e0">Deprecate field</text>
    <text x="250" y="170" font-family="system-ui" font-size="12" fill="#67b26f">✓ Yes</text>
    <text x="450" y="170" font-family="system-ui" font-size="12" fill="#67b26f">✓ Yes</text>
    <text x="650" y="170" font-family="system-ui" font-size="12" fill="#f0ad4e">⚠ Eventually</text>
    
    <!-- Row 4 -->
    <line x1="50" y1="180" x2="770" y2="180" stroke="#666" stroke-width="1"/>
    <text x="50" y="198" font-family="system-ui" font-size="10" fill="#e0e0e0">Remove field</text>
    <text x="250" y="200" font-family="system-ui" font-size="12" fill="#d9534f">✗ No</text>
    <text x="450" y="200" font-family="system-ui" font-size="12" fill="#67b26f">✓ Yes</text>
    <text x="650" y="200" font-family="system-ui" font-size="12" fill="#f0ad4e">⚠ Yes</text>
    
    <text x="770" y="110" font-family="system-ui" font-size="9" fill="#999">*if unknown handled</text>
  </g>
</svg>
