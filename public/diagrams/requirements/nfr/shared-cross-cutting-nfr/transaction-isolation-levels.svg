<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Transaction Isolation Levels</text>
  
  <!-- Isolation Levels Table -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Isolation Levels &amp; Anomalies</text>
    
    <!-- Headers -->
    <rect x="20" y="50" width="760" height="30" rx="3" fill="#1a1a2e"/>
    <text x="150" y="70" font-family="system-ui" font-size="10" font-weight="bold" fill="#e0e0e0">Isolation Level</text>
    <text x="300" y="70" font-family="system-ui" font-size="10" font-weight="bold" fill="#e0e0e0">Dirty Read</text>
    <text x="450" y="70" font-family="system-ui" font-size="10" font-weight="bold" fill="#e0e0e0">Non-Repeatable</text>
    <text x="620" y="70" font-family="system-ui" font-size="10" font-weight="bold" fill="#e0e0e0">Phantom</text>
    
    <!-- Read Uncommitted -->
    <rect x="20" y="80" width="760" height="25" rx="2" fill="#d9534f" opacity="0.2"/>
    <text x="150" y="97" font-family="system-ui" font-size="9" fill="#e0e0e0">Read Uncommitted</text>
    <text x="300" y="97" font-family="system-ui" font-size="12" fill="#d9534f">✓ Possible</text>
    <text x="450" y="97" font-family="system-ui" font-size="12" fill="#d9534f">✓ Possible</text>
    <text x="620" y="97" font-family="system-ui" font-size="12" fill="#d9534f">✓ Possible</text>
    
    <!-- Read Committed -->
    <rect x="20" y="105" width="760" height="25" rx="2" fill="#f0ad4e" opacity="0.2"/>
    <text x="150" y="122" font-family="system-ui" font-size="9" fill="#e0e0e0">Read Committed</text>
    <text x="300" y="122" font-family="system-ui" font-size="12" fill="#67b26f">✗ Prevented</text>
    <text x="450" y="122" font-family="system-ui" font-size="12" fill="#d9534f">✓ Possible</text>
    <text x="620" y="122" font-family="system-ui" font-size="12" fill="#d9534f">✓ Possible</text>
    
    <!-- Repeatable Read -->
    <rect x="20" y="130" width="760" height="25" rx="2" fill="#67b26f" opacity="0.2"/>
    <text x="150" y="147" font-family="system-ui" font-size="9" fill="#e0e0e0">Repeatable Read</text>
    <text x="300" y="147" font-family="system-ui" font-size="12" fill="#67b26f">✗ Prevented</text>
    <text x="450" y="147" font-family="system-ui" font-size="12" fill="#67b26f">✗ Prevented</text>
    <text x="620" y="147" font-family="system-ui" font-size="12" fill="#d9534f">✓ Possible</text>
    
    <!-- Serializable -->
    <rect x="20" y="155" width="760" height="25" rx="2" fill="#4a90d9" opacity="0.2"/>
    <text x="150" y="172" font-family="system-ui" font-size="9" fill="#e0e0e0">Serializable</text>
    <text x="300" y="172" font-family="system-ui" font-size="12" fill="#67b26f">✗ Prevented</text>
    <text x="450" y="172" font-family="system-ui" font-size="12" fill="#67b26f">✗ Prevented</text>
    <text x="620" y="172" font-family="system-ui" font-size="12" fill="#67b26f">✗ Prevented</text>
    
    <!-- Performance impact -->
    <text x="400" y="200" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Performance: Read Uncommitted (fastest) → Serializable (slowest)</text>
  </g>
  
  <!-- Anomaly Examples -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#1a2a1a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Concurrency Anomalies Explained</text>
    
    <!-- Dirty Read -->
    <rect x="20" y="50" width="240" height="70" rx="4" fill="#d9534f" opacity="0.2"/>
    <text x="140" y="70" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Dirty Read</text>
    <text x="140" y="90" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">T1 writes, T2 reads</text>
    <text x="140" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">T1 rolls back → T2 has bad data</text>
    
    <!-- Non-Repeatable Read -->
    <rect x="280" y="50" width="240" height="70" rx="4" fill="#f0ad4e" opacity="0.2"/>
    <text x="400" y="70" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Non-Repeatable Read</text>
    <text x="400" y="90" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">T1 reads, T2 updates</text>
    <text x="400" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">T1 reads again → different value</text>
    
    <!-- Phantom Read -->
    <rect x="540" y="50" width="240" height="70" rx="4" fill="#67b26f" opacity="0.2"/>
    <text x="660" y="70" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Phantom Read</text>
    <text x="660" y="90" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">T1 queries, T2 inserts</text>
    <text x="660" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">T1 queries again → new rows appear</text>
  </g>
</svg>
