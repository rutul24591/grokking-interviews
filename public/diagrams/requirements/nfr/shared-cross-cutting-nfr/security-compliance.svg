<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Security Compliance Management</text>
  
  <!-- Compliance Lifecycle -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Compliance Management Lifecycle</text>
    
    <!-- Identify -->
    <circle cx="80" cy="90" r="40" fill="#4a90d9"/>
    <text x="80" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">1. Identify</text>
    <text x="80" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Applicable regulations</text>
    <text x="80" y="118" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Industry standards</text>
    
    <line x1="120" y1="90" x2="160" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="160,90 150,85 150,95" fill="#666"/>
    
    <!-- Assess -->
    <circle cx="200" cy="90" r="40" fill="#67b26f"/>
    <text x="200" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">2. Assess</text>
    <text x="200" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Gap analysis</text>
    <text x="200" y="118" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Current state</text>
    
    <line x1="240" y1="90" x2="280" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="280,90 270,85 270,95" fill="#666"/>
    
    <!-- Implement -->
    <circle cx="320" cy="90" r="40" fill="#f0ad4e"/>
    <text x="320" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">3. Implement</text>
    <text x="320" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Controls</text>
    <text x="320" y="118" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Policies</text>
    
    <line x1="360" y1="90" x2="400" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="400,90 390,85 390,95" fill="#666"/>
    
    <!-- Monitor -->
    <circle cx="440" cy="90" r="40" fill="#4a90d9"/>
    <text x="440" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">4. Monitor</text>
    <text x="440" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Continuous</text>
    <text x="440" y="118" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">compliance</text>
    
    <line x1="480" y1="90" x2="520" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="520,90 510,85 510,95" fill="#666"/>
    
    <!-- Audit -->
    <circle cx="560" cy="90" r="40" fill="#67b26f"/>
    <text x="560" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">5. Audit</text>
    <text x="560" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Internal/External</text>
    <text x="560" y="118" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Assessments</text>
    
    <line x1="600" y1="90" x2="640" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="640,90 630,85 630,95" fill="#666"/>
    
    <!-- Improve -->
    <rect x="640" y="50" width="120" height="80" rx="6" fill="#f0ad4e"/>
    <text x="700" y="80" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">6. Improve</text>
    <text x="700" y="100" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Remediate</text>
    <text x="700" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">gaps</text>
  </g>
  
  <!-- Common Frameworks -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Common Compliance Frameworks</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="80" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">SOC 2 Type II</text>
      
      <rect x="180" y="0" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="260" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">ISO 27001</text>
      
      <rect x="0" y="35" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">GDPR</text>
      
      <rect x="180" y="35" width="160" height="25" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">HIPAA</text>
      
      <rect x="0" y="70" width="160" height="25" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="80" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">PCI-DSS</text>
      
      <rect x="180" y="70" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">FedRAMP</text>
      
      <rect x="0" y="105" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="80" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">NIST CSF</text>
      
      <rect x="180" y="105" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="260" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">CCPA</text>
    </g>
  </g>
  
  <!-- Compliance Evidence -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Compliance Evidence</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Policy documents</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Training records</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Access logs</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Incident reports</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Change records</text>
      
      <circle cx="180" cy="28" r="4" fill="#67b26f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Vulnerability scans</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Penetration test reports</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Automated evidence collection</text>
    </g>
  </g>
</svg>
