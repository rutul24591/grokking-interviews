<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Alerting Best Practices</text>
  
  <!-- Alert Pyramid -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="700" height="200" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="350" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#f0ad4e">Alert Severity Pyramid</text>
    
    <!-- Page (top) -->
    <polygon points="250,60 450,60 400,100 300,100" fill="#d9534f" opacity="0.6"/>
    <text x="350" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">PAGE</text>
    <text x="350" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Human must act NOW</text>
    <text x="350" y="118" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Site down, data loss, revenue impact</text>
    
    <!-- Ticket (middle) -->
    <polygon points="300,100 400,100 370,140 330,140" fill="#f0ad4e" opacity="0.6"/>
    <text x="350" y="125" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">TICKET</text>
    <text x="350" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Action needed soon</text>
    <text x="350" y="158" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Degraded performance, errors rising</text>
    
    <!-- Log (bottom) -->
    <polygon points="330,140 370,140 360,180 340,180" fill="#4a90d9" opacity="0.6"/>
    <text x="350" y="165" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">LOG</text>
    <text x="350" y="185" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Informational</text>
    <text x="350" y="198" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">For debugging, trends</text>
  </g>
  
  <!-- Alert Design -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Good Alert Design</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Actionable (someone can DO something)</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Urgent (requires immediate attention)</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Clear (what, where, impact)</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Includes runbook link</text>
      
      <circle cx="200" cy="8" r="4" fill="#d9534f"/>
      <text x="212" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">NOT: "Something is wrong"</text>
      
      <circle cx="200" cy="28" r="4" fill="#d9534f"/>
      <text x="212" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">NOT: CPU {'>'} 80% (use symptoms)</text>
      
      <circle cx="200" cy="48" r="4" fill="#d9534f"/>
      <text x="212" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">NOT: No context or runbook</text>
      
      <circle cx="200" cy="68" r="4" fill="#d9534f"/>
      <text x="212" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">NOT: Alerts at 3 AM for non-urgent</text>
    </g>
  </g>
  
  <!-- Alert Routing -->
  <g transform="translate(470, 310)">
    <rect x="0" y="0" width="380" height="140" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Alert Routing</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#d9534f">SEV-1:</text>
      <text x="50" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">Page primary + backup + manager</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="8" fill="#f0ad4e">SEV-2:</text>
      <text x="50" y="20" font-family="system-ui" font-size="8" fill="#e0e0e0">Page primary, escalate after 15 min</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="8" fill="#67b26f">SEV-3:</text>
      <text x="50" y="40" font-family="system-ui" font-size="8" fill="#e0e0e0">Ticket + Slack notification</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="8" fill="#4a90d9">SEV-4:</text>
      <text x="50" y="60" font-family="system-ui" font-size="8" fill="#e0e0e0">Ticket only, review in sprint</text>
      
      <text x="200" y="30" font-family="system-ui" font-size="7" fill="#999">Use on-call rotation</text>
      <text x="200" y="45" font-family="system-ui" font-size="7" fill="#999">PagerDuty/Opsgenie</text>
      <text x="200" y="58" font-family="system-ui" font-size="7" fill="#999">Escalation policies</text>
    </g>
  </g>
</svg>
