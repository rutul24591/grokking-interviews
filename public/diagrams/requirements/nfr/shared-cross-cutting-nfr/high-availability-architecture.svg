<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">High Availability Architecture</text>
  
  <!-- Multi-AZ Deployment -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Multi-AZ Deployment</text>
    
    <!-- AZ 1 -->
    <rect x="30" y="55" width="220" height="100" rx="4" fill="#4a90d9" opacity="0.2" stroke="#4a90d9"/>
    <text x="140" y="75" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Availability Zone 1</text>
    
    <rect x="50" y="85" width="80" height="30" rx="3" fill="#4a90d9" opacity="0.6"/>
    <text x="90" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">App Server</text>
    
    <rect x="150" y="85" width="80" height="30" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="190" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Database</text>
    
    <!-- AZ 2 -->
    <rect x="280" y="55" width="220" height="100" rx="4" fill="#67b26f" opacity="0.2" stroke="#67b26f"/>
    <text x="390" y="75" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Availability Zone 2</text>
    
    <rect x="300" y="85" width="80" height="30" rx="3" fill="#4a90d9" opacity="0.6"/>
    <text x="340" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">App Server</text>
    
    <rect x="400" y="85" width="80" height="30" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="440" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Database</text>
    
    <!-- AZ 3 -->
    <rect x="530" y="55" width="220" height="100" rx="4" fill="#f0ad4e" opacity="0.2" stroke="#f0ad4e"/>
    <text x="640" y="75" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Availability Zone 3</text>
    
    <rect x="550" y="85" width="80" height="30" rx="3" fill="#4a90d9" opacity="0.6"/>
    <text x="590" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">App Server</text>
    
    <rect x="650" y="85" width="80" height="30" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="690" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Database</text>
    
    <!-- Load Balancer -->
    <rect x="350" y="165" width="100" height="30" rx="3" fill="#d9534f"/>
    <text x="400" y="185" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Load Balancer</text>
    
    <!-- Connections -->
    <line x1="400" y1="165" x2="140" y2="155" stroke="#666" stroke-width="2"/>
    <line x1="400" y1="165" x2="390" y2="155" stroke="#666" stroke-width="2"/>
    <line x1="400" y1="165" x2="640" y2="155" stroke="#666" stroke-width="2"/>
  </g>
  
  <!-- Failover Mechanisms -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#1a2a1a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Failover Mechanisms</text>
    
    <rect x="20" y="50" width="340" height="90" rx="4" fill="#2a2a4a"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">Health Checks:</text>
    <text x="180" y="75" font-family="system-ui" font-size="9" fill="#67b26f">Every 10-30 seconds</text>
    
    <text x="35" y="95" font-family="system-ui" font-size="10" fill="#e0e0e0">Auto-failover:</text>
    <text x="180" y="95" font-family="system-ui" font-size="9" fill="#67b26f">30-60 seconds typical</text>
    
    <text x="35" y="115" font-family="system-ui" font-size="10" fill="#e0e0e0">DNS Failover:</text>
    <text x="180" y="115" font-family="system-ui" font-size="9" fill="#f0ad4e">2-5 minutes (TTL dependent)</text>
    
    <text x="35" y="135" font-family="system-ui" font-size="10" fill="#e0e0e0">Database Replication:</text>
    <text x="180" y="135" font-family="system-ui" font-size="9" fill="#67b26f">Synchronous or async</text>
  </g>
  
  <!-- RTO/RPO -->
  <g transform="translate(450, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">RTO vs RPO</text>
    
    <rect x="20" y="50" width="360" height="90" rx="4" fill="#1a1a2e"/>
    
    <!-- RTO -->
    <text x="35" y="75" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">RTO (Recovery Time Objective)</text>
    <text x="35" y="95" font-family="system-ui" font-size="9" fill="#e0e0e0">Maximum acceptable downtime</text>
    <text x="35" y="112" font-family="system-ui" font-size="9" fill="#e0e0e0">Example: 1 hour = must restore within 1 hour</text>
    
    <!-- RPO -->
    <text x="220" y="75" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">RPO (Recovery Point Objective)</text>
    <text x="220" y="95" font-family="system-ui" font-size="9" fill="#e0e0e0">Maximum acceptable data loss</text>
    <text x="220" y="112" font-family="system-ui" font-size="9" fill="#e0e0e0">Example: 5 min = can lose up to 5 min of data</text>
    
    <text x="200" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Lower RTO/RPO = Higher cost</text>
  </g>
</svg>
