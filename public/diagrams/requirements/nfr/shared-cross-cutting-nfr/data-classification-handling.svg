<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Data Classification &amp; Handling</text>
  
  <!-- Classification Levels -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="380" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Data Classification Levels</text>
    
    <!-- Public -->
    <rect x="20" y="55" width="340" height="30" rx="3" fill="#4a90d9" opacity="0.4"/>
    <text x="45" y="75" font-family="system-ui" font-size="10" font-weight="bold" fill="#4a90d9">Public</text>
    <text x="200" y="75" font-family="system-ui" font-size="9" fill="#e0e0e0">Marketing content, public docs</text>
    
    <!-- Internal -->
    <rect x="20" y="90" width="340" height="30" rx="3" fill="#67b26f" opacity="0.4"/>
    <text x="45" y="110" font-family="system-ui" font-size="10" font-weight="bold" fill="#67b26f">Internal</text>
    <text x="200" y="110" font-family="system-ui" font-size="9" fill="#e0e0e0">Employee-only, internal docs</text>
    
    <!-- Confidential -->
    <rect x="20" y="125" width="340" height="30" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="45" y="145" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">Confidential</text>
    <text x="200" y="145" font-family="system-ui" font-size="9" fill="#e0e0e0">Customer data, business sensitive</text>
    
    <!-- Restricted -->
    <rect x="20" y="160" width="340" height="30" rx="3" fill="#d9534f" opacity="0.4"/>
    <text x="45" y="180" font-family="system-ui" font-size="10" font-weight="bold" fill="#d9534f">Restricted</text>
    <text x="200" y="180" font-family="system-ui" font-size="9" fill="#e0e0e0">PII, PHI, financial, credentials</text>
  </g>
  
  <!-- Handling Requirements -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="400" height="200" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Handling Requirements by Level</text>
    
    <rect x="20" y="50" width="360" height="130" rx="4" fill="#1a1a2e"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">Encryption:</text>
    <text x="150" y="75" font-family="system-ui" font-size="9" fill="#67b26f">Required for Confidential+</text>
    
    <text x="35" y="95" font-family="system-ui" font-size="10" fill="#e0e0e0">Access Control:</text>
    <text x="150" y="95" font-family="system-ui" font-size="9" fill="#67b26f">Need-to-know basis</text>
    
    <text x="35" y="115" font-family="system-ui" font-size="10" fill="#e0e0e0">Audit Logging:</text>
    <text x="150" y="115" font-family="system-ui" font-size="9" fill="#67b26f">All access to Restricted</text>
    
    <text x="35" y="135" font-family="system-ui" font-size="10" fill="#e0e0e0">Retention:</text>
    <text x="150" y="135" font-family="system-ui" font-size="9" fill="#67b26f">Defined per data type</text>
    
    <text x="35" y="155" font-family="system-ui" font-size="10" fill="#e0e0e0">Disposal:</text>
    <text x="150" y="155" font-family="system-ui" font-size="9" fill="#67b26f">Secure deletion required</text>
    
    <text x="250" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Automate classification where possible</text>
  </g>
  
  <!-- Data Flow with Controls -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#1a2a1a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Data Flow with Security Controls</text>
    
    <!-- Ingest -->
    <rect x="30" y="55" width="100" height="60" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="80" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Ingest</text>
    <text x="80" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Validate &amp; classify</text>
    
    <line x1="130" y1="85" x2="155" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="155,85 145,80 145,90" fill="#666"/>
    
    <!-- Process -->
    <rect x="155" y="55" width="100" height="60" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="205" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Process</text>
    <text x="205" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Minimize &amp; mask</text>
    
    <line x1="255" y1="85" x2="280" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="280,85 270,80 270,90" fill="#666"/>
    
    <!-- Store -->
    <rect x="280" y="55" width="100" height="60" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="330" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Store</text>
    <text x="330" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Encrypt at rest</text>
    
    <line x1="380" y1="85" x2="405" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="405,85 395,80 395,90" fill="#666"/>
    
    <!-- Transmit -->
    <rect x="405" y="55" width="100" height="60" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="455" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Transmit</text>
    <text x="455" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">TLS encryption</text>
    
    <line x1="505" y1="85" x2="530" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="530,85 520,80 520,90" fill="#666"/>
    
    <!-- Delete -->
    <rect x="530" y="55" width="100" height="60" rx="4" fill="#d9534f" opacity="0.6"/>
    <text x="580" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Delete</text>
    <text x="580" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Secure erasure</text>
    
    <!-- Audit trail -->
    <rect x="650" y="55" width="120" height="60" rx="4" fill="#6f42c1" opacity="0.6"/>
    <text x="710" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Audit Trail</text>
    <text x="710" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Log all access</text>
  </g>
</svg>
