<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad3)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Observability Maturity Model</text>
  
  <!-- Level 1 -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="180" height="140" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow3)"/>
    <text x="90" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#d9534f">Level 1</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui" font-size="12" fill="#e0e0e0">Basic Monitoring</text>
    
    <text x="20" y="80" font-family="system-ui" font-size="10" fill="#e0e0e0">• Uptime checks</text>
    <text x="20" y="98" font-family="system-ui" font-size="10" fill="#e0e0e0">• Basic alerts</text>
    <text x="20" y="116" font-family="system-ui" font-size="10" fill="#e0e0e0">• Manual debugging</text>
    <text x="90" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#d9534f">Reactive</text>
  </g>
  
  <!-- Level 2 -->
  <g transform="translate(250, 80)">
    <rect x="0" y="0" width="180" height="140" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow3)"/>
    <text x="90" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Level 2</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui" font-size="12" fill="#e0e0e0">Centralized Logging</text>
    
    <text x="20" y="80" font-family="system-ui" font-size="10" fill="#e0e0e0">• Log aggregation</text>
    <text x="20" y="98" font-family="system-ui" font-size="10" fill="#e0e0e0">• Structured logs</text>
    <text x="20" y="116" font-family="system-ui" font-size="10" fill="#e0e0e0">• Log-based alerts</text>
    <text x="90" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#f0ad4e">Better visibility</text>
  </g>
  
  <!-- Level 3 -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="180" height="140" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow3)"/>
    <text x="90" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Level 3</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui" font-size="12" fill="#e0e0e0">Metrics + Tracing</text>
    
    <text x="20" y="80" font-family="system-ui" font-size="10" fill="#e0e0e0">• RED/USE metrics</text>
    <text x="20" y="98" font-family="system-ui" font-size="10" fill="#e0e0e0">• Distributed tracing</text>
    <text x="20" y="116" font-family="system-ui" font-size="10" fill="#e0e0e0">• Dashboards</text>
    <text x="90" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#4a90d9">Proactive</text>
  </g>
  
  <!-- Level 4 -->
  <g transform="translate(650, 80)">
    <rect x="0" y="0" width="180" height="140" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow3)"/>
    <text x="90" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Level 4</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui" font-size="12" fill="#e0e0e0">Full Observability</text>
    
    <text x="20" y="80" font-family="system-ui" font-size="10" fill="#e0e0e0">• Correlated data</text>
    <text x="20" y="98" font-family="system-ui" font-size="10" fill="#e0e0e0">• Ask arbitrary questions</text>
    <text x="20" y="116" font-family="system-ui" font-size="10" fill="#e0e0e0">• Debug unknown issues</text>
    <text x="90" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#67b26f">Investigative</text>
  </g>
  
  <!-- Arrow progression -->
  <line x1="230" y1="150" x2="245" y2="150" stroke="#666" stroke-width="2"/>
  <polygon points="245,150 235,145 235,155" fill="#666"/>
  
  <line x1="430" y1="150" x2="445" y2="150" stroke="#666" stroke-width="2"/>
  <polygon points="445,150 435,145 435,155" fill="#666"/>
  
  <line x1="630" y1="150" x2="645" y2="150" stroke="#666" stroke-width="2"/>
  <polygon points="645,150 635,145 635,155" fill="#666"/>
  
  <!-- Implementation Roadmap -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow3)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Implementation Roadmap</text>
    
    <!-- Phase 1 -->
    <g transform="translate(30, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="12" font-weight="bold" fill="#d9534f">Phase 1: Foundation</text>
      <text x="20" y="20" font-family="system-ui" font-size="10" fill="#e0e0e0">• Implement structured logging</text>
      <text x="20" y="38" font-family="system-ui" font-size="10" fill="#e0e0e0">• Set up log aggregation (ELK, Splunk)</text>
      <text x="20" y="56" font-family="system-ui" font-size="10" fill="#e0e0e0">• Define SLIs/SLOs</text>
      <text x="20" y="74" font-family="system-ui" font-size="10" fill="#e0e0e0">• Basic alerting on SLO burns</text>
    </g>
    
    <!-- Phase 2 -->
    <g transform="translate(280, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="12" font-weight="bold" fill="#f0ad4e">Phase 2: Metrics</text>
      <text x="20" y="20" font-family="system-ui" font-size="10" fill="#e0e0e0">• Instrument key services</text>
      <text x="20" y="38" font-family="system-ui" font-size="10" fill="#e0e0e0">• RED/USE dashboards</text>
      <text x="20" y="56" font-family="system-ui" font-size="10" fill="#e0e0e0">• Error budget tracking</text>
      <text x="20" y="74" font-family="system-ui" font-size="10" fill="#e0e0e0">• Anomaly detection</text>
    </g>
    
    <!-- Phase 3 -->
    <g transform="translate(530, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="12" font-weight="bold" fill="#4a90d9">Phase 3: Tracing</text>
      <text x="20" y="20" font-family="system-ui" font-size="10" fill="#e0e0e0">• Add distributed tracing</text>
      <text x="20" y="38" font-family="system-ui" font-size="10" fill="#e0e0e0">• Correlate logs/metrics/traces</text>
      <text x="20" y="56" font-family="system-ui" font-size="10" fill="#e0e0e0">• End-to-end visibility</text>
      <text x="20" y="74" font-family="system-ui" font-size="10" fill="#e0e0e0">• Investigative debugging</text>
    </g>
    
    <!-- Timeline -->
    <line x1="30" y1="160" x2="770" y2="160" stroke="#666" stroke-width="2"/>
    <text x="30" y="180" font-family="system-ui" font-size="10" fill="#e0e0e0">Month 1-2</text>
    <text x="280" y="180" font-family="system-ui" font-size="10" fill="#e0e0e0">Month 3-4</text>
    <text x="530" y="180" font-family="system-ui" font-size="10" fill="#e0e0e0">Month 5-6</text>
  </g>
</svg>
