<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Vendor Exit Strategy Roadmap</text>

  <!-- Phase 1: Pre-Contract Preparation -->
  <g transform="translate(50, 65)">
    <rect x="0" y="0" width="240" height="140" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="120" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">1. Pre-Contract</text>
    <text x="120" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">(Before signing)</text>

    <text x="20" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Negotiate exit clauses</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Data ownership terms</text>
    <text x="20" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Transition assistance SLA</text>
    <text x="20" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Price protection limits</text>
  </g>

  <!-- Arrow 1->2 -->
  <g transform="translate(300, 125)">
    <line x1="0" y1="0" x2="70" y2="0" stroke="#64748b" stroke-width="2"/>
    <polygon points="70,-5 80,0 70,5" fill="#64748b"/>
  </g>

  <!-- Phase 2: Data Portability -->
  <g transform="translate(390, 65)">
    <rect x="0" y="0" width="240" height="140" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="120" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">2. Data Portability</text>
    <text x="120" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">(Ongoing)</text>

    <text x="20" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Scheduled data exports</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Standard open formats</text>
    <text x="20" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- API access documented</text>
    <text x="20" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Schema documentation</text>
  </g>

  <!-- Arrow 2->3 -->
  <g transform="translate(640, 125)">
    <line x1="0" y1="0" x2="70" y2="0" stroke="#64748b" stroke-width="2"/>
    <polygon points="70,-5 80,0 70,5" fill="#64748b"/>
  </g>

  <!-- Phase 3: Documentation -->
  <g transform="translate(720, 65)">
    <rect x="0" y="0" width="160" height="140" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">3. Document</text>
    <text x="80" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">(Maintained)</text>

    <text x="15" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Integration map</text>
    <text x="15" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Migration runbook</text>
    <text x="15" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Alternative vendors</text>
    <text x="15" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Effort estimates</text>
  </g>

  <!-- Arrow down to testing -->
  <g transform="translate(460, 215)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#64748b" stroke-width="2"/>
    <polygon points="-5,40 0,50 5,40" fill="#64748b"/>
    <text x="30" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Continuous</text>
  </g>

  <!-- Phase 4: Regular Testing -->
  <g transform="translate(300, 270)">
    <rect x="0" y="0" width="320" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <text x="160" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#92400e">4. Test Regularly</text>
    <text x="160" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">(Quarterly / Bi-annually)</text>

    <text x="20" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Full data export test</text>
    <text x="180" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Tabletop migration exercise</text>
    <text x="20" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Verify restore procedures</text>
    <text x="180" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Update runbook with findings</text>
  </g>

  <!-- Arrow down to triggers -->
  <g transform="translate(460, 380)">
    <line x1="0" y1="0" x2="0" y2="30" stroke="#64748b" stroke-width="2"/>
    <polygon points="-5,30 0,40 5,30" fill="#64748b"/>
  </g>

  <!-- Exit Triggers -->
  <g transform="translate(50, 425)">
    <rect x="0" y="0" width="800" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Exit Triggers (Activate Migration Plan)</text>

    <text x="30" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Vendor price increase &gt; 20%</text>
    <text x="240" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Service degradation / SLA breaches</text>
    <text x="490" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Vendor roadmap misalignment</text>
    <text x="30" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Acquired by competitor</text>
    <text x="240" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Better alternative available</text>
    <text x="490" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e293b">- Compliance / regulatory change</text>
  </g>
</svg>