<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Error Budget Policy</text>
  
  <!-- Error Budget Concept -->
  <rect x="30" y="70" width="400" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="230" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Error Budget Concept</text>
  
  <rect x="50" y="110" width="360" height="145" rx="3" class="box-base" stroke-width="1"/>
  
  <!-- Budget visualization -->
  <rect x="70" y="130" width="320" height="30" rx="2" class="highlight-green" stroke-width="1"/>
  <text x="230" y="150" text-anchor="middle" font-size="9" class="text-primary">Error Budget Available (80%)</text>
  
  <rect x="70" y="165" width="80" height="30" rx="2" class="highlight-red" stroke-width="1"/>
  <text x="110" y="185" text-anchor="middle" font-size="9" class="text-primary">Spent (20%)</text>
  
  <text x="70" y="220" font-size="9" class="text-primary">• Budget = 1 - SLO (e.g., 0.1% for 99.9% SLO)</text>
  <text x="70" y="235" font-size="9" class="text-primary">• Measured over rolling window (28 days)</text>
  <text x="70" y="250" font-size="9" class="text-primary">• Drives release decisions</text>
  
  <!-- Policy Tiers -->
  <rect x="450" y="70" width="420" height="200" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="660" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Policy Enforcement Tiers</text>
  
  <rect x="470" y="110" width="380" height="45" rx="3" class="highlight-green" stroke-width="1"/>
  <text x="660" y="130" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">&gt;50% Budget Remaining</text>
  <text x="660" y="148" text-anchor="middle" font-size="9" class="text-primary">Normal operations, all releases approved</text>
  
  <rect x="470" y="160" width="380" height="45" rx="3" class="highlight-blue" stroke-width="1"/>
  <text x="660" y="180" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">25-50% Budget Remaining</text>
  <text x="660" y="198" text-anchor="middle" font-size="9" class="text-primary">Increased scrutiny, on-call notification</text>
  
  <rect x="470" y="210" width="380" height="45" rx="3" class="highlight-orange" stroke-width="1"/>
  <text x="660" y="230" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">&lt;25% Budget Remaining</text>
  <text x="660" y="248" text-anchor="middle" font-size="9" class="text-primary">Release freeze, incident review required</text>
  
  <!-- Consequences -->
  <rect x="30" y="290" width="840" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="450" y="315" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Budget Exhaustion Consequences</text>
  
  <rect x="50" y="330" width="260" height="125" rx="3" class="highlight-red" stroke-width="1"/>
  <text x="180" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Immediate Actions</text>
  <rect x="70" y="365" width="220" height="75" rx="2" class="box-base" stroke-width="1"/>
  <text x="180" y="385" text-anchor="middle" font-size="8" class="text-primary">• Freeze non-critical releases</text>
  <text x="180" y="400" text-anchor="middle" font-size="8" class="text-primary">• Incident review meeting</text>
  <text x="180" y="415" text-anchor="middle" font-size="8" class="text-primary">• Root cause analysis</text>
  <text x="180" y="430" text-anchor="middle" font-size="8" class="text-primary">• Stakeholder notification</text>
  <text x="180" y="445" text-anchor="middle" font-size="8" class="text-primary">• Reliability focus sprint</text>
  
  <rect x="325" y="330" width="260" height="125" rx="3" class="highlight-purple" stroke-width="1"/>
  <text x="455" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Recovery Process</text>
  <rect x="345" y="365" width="220" height="75" rx="2" class="box-base" stroke-width="1"/>
  <text x="455" y="385" text-anchor="middle" font-size="8" class="text-primary">• Fix reliability issues</text>
  <text x="455" y="400" text-anchor="middle" font-size="8" class="text-primary">• Wait for window to roll</text>
  <text x="455" y="415" text-anchor="middle" font-size="8" class="text-primary">• Monitor budget recovery</text>
  <text x="455" y="430" text-anchor="middle" font-size="8" class="text-primary">• Gradual release resumption</text>
  <text x="455" y="445" text-anchor="middle" font-size="8" class="text-primary">• Post-mortem documentation</text>
  
  <rect x="600" y="330" width="260" height="125" rx="3" class="highlight-green" stroke-width="1"/>
  <text x="730" y="355" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Prevention</text>
  <rect x="620" y="365" width="220" height="75" rx="2" class="box-base" stroke-width="1"/>
  <text x="730" y="385" text-anchor="middle" font-size="8" class="text-primary">• Stricter SLO targets</text>
  <text x="730" y="400" text-anchor="middle" font-size="8" class="text-primary">• Better testing</text>
  <text x="730" y="415" text-anchor="middle" font-size="8" class="text-primary">• Canary deployments</text>
  <text x="730" y="430" text-anchor="middle" font-size="8" class="text-primary">• Feature flags</text>
  <text x="730" y="445" text-anchor="middle" font-size="8" class="text-primary">• Automated rollback</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>