<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Data Lineage &amp; Flow</text>
  
  <!-- Data Flow Diagram -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Data Lineage Flow</text>
    
    <!-- Source Systems -->
    <rect x="30" y="60" width="100" height="120" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="80" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Source</text>
    <text x="80" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Systems</text>
    <text x="80" y="140" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Web app</text>
    <text x="80" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Mobile app</text>
    <text x="80" y="170" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• 3rd party</text>
    
    <line x1="130" y1="120" x2="165" y2="120" stroke="#666" stroke-width="3"/>
    <polygon points="165,120 155,115 155,125" fill="#666"/>
    
    <!-- Ingestion -->
    <rect x="165" y="60" width="100" height="120" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="215" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Ingestion</text>
    <text x="215" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Layer</text>
    <text x="215" y="140" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Kafka</text>
    <text x="215" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Kinesis</text>
    <text x="215" y="170" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Batch ETL</text>
    
    <line x1="265" y1="120" x2="300" y2="120" stroke="#666" stroke-width="3"/>
    <polygon points="300,120 290,115 290,125" fill="#666"/>
    
    <!-- Processing -->
    <rect x="300" y="60" width="120" height="120" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="360" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Processing</text>
    <text x="360" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Layer</text>
    <text x="360" y="140" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Spark</text>
    <text x="360" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Flink</text>
    <text x="360" y="170" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Transform</text>
    
    <line x1="420" y1="120" x2="455" y2="120" stroke="#666" stroke-width="3"/>
    <polygon points="455,120 445,115 445,125" fill="#666"/>
    
    <!-- Storage -->
    <rect x="455" y="60" width="120" height="120" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="515" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Storage</text>
    <text x="515" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Layer</text>
    <text x="515" y="140" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Data Lake</text>
    <text x="515" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Warehouse</text>
    <text x="515" y="170" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• OLTP DB</text>
    
    <line x1="575" y1="120" x2="610" y2="120" stroke="#666" stroke-width="3"/>
    <polygon points="610,120 600,115 600,125" fill="#666"/>
    
    <!-- Consumption -->
    <rect x="610" y="60" width="120" height="120" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="670" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Consumption</text>
    <text x="670" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Layer</text>
    <text x="670" y="140" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Dashboards</text>
    <text x="670" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• ML Models</text>
    <text x="670" y="170" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• APIs</text>
    
    <!-- Metadata/Lineage tracking -->
    <rect x="300" y="190" width="340" height="30" rx="3" fill="#6f42c1" opacity="0.6"/>
    <text x="470" y="210" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Metadata &amp; Lineage Tracking (at each stage)</text>
  </g>
  
  <!-- Lineage Metadata -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="#1a2a1a" stroke="#6f42c1" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#6f42c1">Lineage Metadata</text>
    
    <rect x="20" y="50" width="360" height="70" rx="4" fill="#2a2a4a"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="9" fill="#e0e0e0">Origin:</text>
    <text x="100" y="75" font-family="system-ui" font-size="9" fill="#67b26f">Source system, timestamp</text>
    
    <text x="35" y="95" font-family="system-ui" font-size="9" fill="#e0e0e0">Transformations:</text>
    <text x="150" y="95" font-family="system-ui" font-size="9" fill="#67b26f">ETL jobs, business logic</text>
    
    <text x="35" y="115" font-family="system-ui" font-size="9" fill="#e0e0e0">Dependencies:</text>
    <text x="130" y="115" font-family="system-ui" font-size="9" fill="#67b26f">Upstream datasets, pipelines</text>
  </g>
  
  <!-- Audit Trail -->
  <g transform="translate(470, 310)">
    <rect x="0" y="0" width="380" height="140" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#d9534f">Audit Trail Requirements</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="9" fill="#e0e0e0">Who accessed data</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="9" fill="#e0e0e0">When (timestamp)</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="9" fill="#e0e0e0">What operation (read/write/delete)</text>
      
      <circle cx="8" cy="68" r="4" fill="#67b26f"/>
      <text x="20" y="73" font-family="system-ui" font-size="9" fill="#e0e0e0">From where (IP, application)</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="9" fill="#e0e0e0">Data before/after</text>
      
      <circle cx="180" cy="28" r="4" fill="#f0ad4e"/>
      <text x="192" y="33" font-family="system-ui" font-size="9" fill="#e0e0e0">Immutable logs</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="9" fill="#e0e0e0">Retention period</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="9" fill="#e0e0e0">Searchable/queryable</text>
    </g>
  </g>
</svg>
