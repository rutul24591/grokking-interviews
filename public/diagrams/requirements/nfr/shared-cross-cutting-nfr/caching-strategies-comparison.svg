<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Caching Strategies Comparison</text>
  
  <!-- Strategy Comparison Table -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Caching Strategy Comparison</text>
    
    <!-- Headers -->
    <rect x="20" y="50" width="760" height="30" rx="2" fill="#1a1a2e"/>
    <text x="100" y="70" font-family="system-ui" font-size="9" font-weight="bold" fill="#e0e0e0">Strategy</text>
    <text x="250" y="70" font-family="system-ui" font-size="9" font-weight="bold" fill="#e0e0e0">Consistency</text>
    <text x="400" y="70" font-family="system-ui" font-size="9" font-weight="bold" fill="#e0e0e0">Performance</text>
    <text x="550" y="70" font-family="system-ui" font-size="9" font-weight="bold" fill="#e0e0e0">Complexity</text>
    <text x="700" y="70" font-family="system-ui" font-size="9" font-weight="bold" fill="#e0e0e0">Use Case</text>
    
    <!-- Cache-Aside -->
    <rect x="20" y="80" width="760" height="22" rx="1" fill="#4a90d9" opacity="0.2"/>
    <text x="100" y="95" font-family="system-ui" font-size="8" fill="#e0e0e0">Cache-Aside</text>
    <text x="250" y="95" font-family="system-ui" font-size="8" fill="#f0ad4e">Eventual</text>
    <text x="400" y="95" font-family="system-ui" font-size="8" fill="#67b26f">Good</text>
    <text x="550" y="95" font-family="system-ui" font-size="8" fill="#67b26f">Low</text>
    <text x="700" y="95" font-family="system-ui" font-size="8" fill="#e0e0e0">General purpose</text>
    
    <!-- Write-Through -->
    <rect x="20" y="102" width="760" height="22" rx="1" fill="#67b26f" opacity="0.2"/>
    <text x="100" y="117" font-family="system-ui" font-size="8" fill="#e0e0e0">Write-Through</text>
    <text x="250" y="117" font-family="system-ui" font-size="8" fill="#67b26f">Strong</text>
    <text x="400" y="117" font-family="system-ui" font-size="8" fill="#f0ad4e">Moderate</text>
    <text x="550" y="117" font-family="system-ui" font-size="8" fill="#67b26f">Low</text>
    <text x="700" y="117" font-family="system-ui" font-size="8" fill="#e0e0e0">Frequent reads</text>
    
    <!-- Write-Behind -->
    <rect x="20" y="124" width="760" height="22" rx="1" fill="#f0ad4e" opacity="0.2"/>
    <text x="100" y="139" font-family="system-ui" font-size="8" fill="#e0e0e0">Write-Behind</text>
    <text x="250" y="139" font-family="system-ui" font-size="8" fill="#f0ad4e">Eventual</text>
    <text x="400" y="139" font-family="system-ui" font-size="8" fill="#67b26f">Excellent</text>
    <text x="550" y="139" font-family="system-ui" font-size="8" fill="#f0ad4e">Moderate</text>
    <text x="700" y="139" font-family="system-ui" font-size="8" fill="#e0e0e0">Write-heavy</text>
    
    <!-- Refresh-Ahead -->
    <rect x="20" y="146" width="760" height="22" rx="1" fill="#d9534f" opacity="0.2"/>
    <text x="100" y="161" font-family="system-ui" font-size="8" fill="#e0e0e0">Refresh-Ahead</text>
    <text x="250" y="161" font-family="system-ui" font-size="8" fill="#67b26f">Strong</text>
    <text x="400" y="161" font-family="system-ui" font-size="8" fill="#67b26f">Excellent</text>
    <text x="550" y="161" font-family="system-ui" font-size="8" fill="#d9534f">High</text>
    <text x="700" y="161" font-family="system-ui" font-size="8" fill="#e0e0e0">Predictable access</text>
    
    <!-- TTL -->
    <rect x="20" y="168" width="760" height="22" rx="1" fill="#6f42c1" opacity="0.2"/>
    <text x="100" y="183" font-family="system-ui" font-size="8" fill="#e0e0e0">TTL-Based</text>
    <text x="250" y="183" font-family="system-ui" font-size="8" fill="#f0ad4e">Eventual</text>
    <text x="400" y="183" font-family="system-ui" font-size="8" fill="#67b26f">Good</text>
    <text x="550" y="183" font-family="system-ui" font-size="8" fill="#67b26f">Low</text>
    <text x="700" y="183" font-family="system-ui" font-size="8" fill="#e0e0e0">Time-sensitive data</text>
  </g>
  
  <!-- Selection Guide -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Strategy Selection Guide</text>
    
    <g transform="translate(30, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="9" fill="#e0e0e0">Need strong consistency?</text>
      <text x="180" y="0" font-family="system-ui" font-size="9" fill="#67b26f">→ Write-Through or Refresh-Ahead</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="9" fill="#e0e0e0">Write-heavy workload?</text>
      <text x="180" y="20" font-family="system-ui" font-size="9" fill="#67b26f">→ Write-Behind</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="9" fill="#e0e0e0">Simple implementation needed?</text>
      <text x="180" y="40" font-family="system-ui" font-size="9" fill="#67b26f">→ Cache-Aside or TTL</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="9" fill="#e0e0e0">Predictable access pattern?</text>
      <text x="180" y="60" font-family="system-ui" font-size="9" fill="#67b26f">→ Refresh-Ahead</text>
      
      <text x="400" y="40" font-family="system-ui" font-size="8" fill="#999">Often combine multiple strategies</text>
      <text x="400" y="55" font-family="system-ui" font-size="8" fill="#999">e.g., Cache-Aside + TTL + Write-Behind</text>
    </g>
  </g>
</svg>
