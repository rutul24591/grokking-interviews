<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad3)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Availability SLA Tiers</text>
  
  <!-- Availability Comparison -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow3)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">The "Nines" of Availability</text>
    
    <!-- 99% -->
    <rect x="30" y="55" width="140" height="100" rx="6" fill="#d9534f" opacity="0.4"/>
    <text x="100" y="80" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#d9534f">99%</text>
    <text x="100" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Two Nines</text>
    <text x="100" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">3.65 days/year</text>
    <text x="100" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">7.3 hours/month</text>
    <text x="100" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Internal tools</text>
    
    <!-- 99.9% -->
    <rect x="180" y="55" width="140" height="100" rx="6" fill="#f0ad4e" opacity="0.4"/>
    <text x="250" y="80" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">99.9%</text>
    <text x="250" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Three Nines</text>
    <text x="250" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">8.76 hours/year</text>
    <text x="250" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">44 minutes/month</text>
    <text x="250" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Standard production</text>
    
    <!-- 99.95% -->
    <rect x="330" y="55" width="140" height="100" rx="6" fill="#67b26f" opacity="0.4"/>
    <text x="400" y="80" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">99.95%</text>
    <text x="400" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">High Availability</text>
    <text x="400" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">4.38 hours/year</text>
    <text x="400" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">22 minutes/month</text>
    <text x="400" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Business-critical</text>
    
    <!-- 99.99% -->
    <rect x="480" y="55" width="140" height="100" rx="6" fill="#4a90d9" opacity="0.4"/>
    <text x="550" y="80" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">99.99%</text>
    <text x="550" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Four Nines</text>
    <text x="550" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">52.6 min/year</text>
    <text x="550" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">4.4 min/month</text>
    <text x="550" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Payment, Auth</text>
    
    <!-- 99.999% -->
    <rect x="630" y="55" width="140" height="100" rx="6" fill="#6f42c1" opacity="0.4"/>
    <text x="700" y="80" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#6f42c1">99.999%</text>
    <text x="700" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Five Nines</text>
    <text x="700" y="125" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">5.26 min/year</text>
    <text x="700" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">26 sec/month</text>
    <text x="700" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Telecom, Emergency</text>
  </g>
  
  <!-- SLA Penalty Structure -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow3)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">SLA Penalty Structure</text>
    
    <rect x="20" y="50" width="360" height="90" rx="4" fill="#2a2a4a"/>
    <text x="30" y="70" font-family="system-ui" font-size="10" fill="#e0e0e0">Uptime Achieved</text>
    <text x="300" y="70" font-family="system-ui" font-size="10" fill="#e0e0e0">Service Credit</text>
    
    <line x1="20" y1="80" x2="380" y2="80" stroke="#666" stroke-width="1"/>
    
    <text x="30" y="100" font-family="system-ui" font-size="9" fill="#e0e0e0">99.0% - 99.9%</text>
    <text x="300" y="100" font-family="system-ui" font-size="9" fill="#f0ad4e">10% of monthly fee</text>
    
    <line x1="20" y1="105" x2="380" y2="105" stroke="#666" stroke-width="1"/>
    
    <text x="30" y="125" font-family="system-ui" font-size="9" fill="#e0e0e0">95.0% - 99.0%</text>
    <text x="300" y="125" font-family="system-ui" font-size="9" fill="#d9534f">25% of monthly fee</text>
    
    <line x1="20" y1="130" x2="380" y2="130" stroke="#666" stroke-width="1"/>
    
    <text x="30" y="150" font-family="system-ui" font-size="9" fill="#e0e0e0">&amp;lt; 95.0%</text>
    <text x="300" y="150" font-family="system-ui" font-size="9" fill="#d9534f">50% + termination right</text>
  </g>
  
  <!-- Architecture Requirements -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow3)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Architecture for High Availability</text>
    
    <g transform="translate(20, 50)">
      <circle cx="8" cy="8" r="4" fill="#4a90d9"/>
      <text x="20" y="13" font-family="system-ui" font-size="10" fill="#e0e0e0">Multi-AZ deployment</text>
      
      <circle cx="8" cy="28" r="4" fill="#4a90d9"/>
      <text x="20" y="33" font-family="system-ui" font-size="10" fill="#e0e0e0">Auto-scaling + health checks</text>
      
      <circle cx="8" cy="48" r="4" fill="#4a90d9"/>
      <text x="20" y="53" font-family="system-ui" font-size="10" fill="#e0e0e0">Database replication + failover</text>
      
      <circle cx="8" cy="68" r="4" fill="#4a90d9"/>
      <text x="20" y="73" font-family="system-ui" font-size="10" fill="#e0e0e0">Load balancers across zones</text>
      
      <circle cx="8" cy="88" r="4" fill="#f0ad4e"/>
      <text x="20" y="93" font-family="system-ui" font-size="10" fill="#e0e0e0">Regular DR testing</text>
    </g>
  </g>
</svg>
