<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Data Disposal &amp; Secure Deletion</text>
  
  <!-- Disposal Methods -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#d9534f">Secure Data Disposal Methods</text>
    
    <!-- Logical Delete -->
    <rect x="30" y="60" width="170" height="100" rx="4" fill="#4a90d9" opacity="0.4"/>
    <text x="115" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Logical Delete</text>
    <text x="115" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Mark as deleted</text>
    <text x="115" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Remove from index</text>
    <text x="115" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Data still exists</text>
    <text x="115" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#f0ad4e">✗ Not secure</text>
    <text x="115" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Use for: Soft delete</text>
    
    <!-- Cryptographic Erase -->
    <rect x="215" y="60" width="170" height="100" rx="4" fill="#67b26f" opacity="0.4"/>
    <text x="300" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Cryptographic Erase</text>
    <text x="300" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Delete encryption keys</text>
    <text x="300" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Data unrecoverable</text>
    <text x="300" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Fast &amp; efficient</text>
    <text x="300" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Secure for encrypted data</text>
    <text x="300" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Use for: Cloud storage</text>
    
    <!-- Secure Erase -->
    <rect x="400" y="60" width="170" height="100" rx="4" fill="#f0ad4e" opacity="0.4"/>
    <text x="485" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Secure Erase</text>
    <text x="485" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Overwrite with patterns</text>
    <text x="485" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Multiple passes (DoD 5220)</text>
    <text x="485" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• SSD secure erase cmd</text>
    <text x="485" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ NIST compliant</text>
    <text x="485" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Use for: HDD/SSD</text>
    
    <!-- Physical Destruction -->
    <rect x="585" y="60" width="170" height="100" rx="4" fill="#d9534f" opacity="0.4"/>
    <text x="670" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Physical Destruction</text>
    <text x="670" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Shredding</text>
    <text x="670" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Degaussing (magnetic)</text>
    <text x="670" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Incineration</text>
    <text x="670" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Most secure</text>
    <text x="670" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Use for: End-of-life hardware</text>
  </g>
  
  <!-- Disposal Workflow -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Disposal Workflow</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="80" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">1. Identify data for deletion</text>
      
      <rect x="180" y="0" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="260" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">2. Check for legal holds</text>
      
      <rect x="0" y="35" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">3. Export if required</text>
      
      <rect x="180" y="35" width="160" height="25" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">4. Execute secure deletion</text>
      
      <rect x="0" y="70" width="160" height="25" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="80" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">5. Verify deletion</text>
      
      <rect x="180" y="70" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">6. Certificate of destruction</text>
      
      <rect x="0" y="105" width="340" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="170" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">7. Update audit log &amp; asset register</text>
    </g>
  </g>
  
  <!-- Compliance Requirements -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Compliance Requirements</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">GDPR:</text>
      <text x="50" y="0" font-family="system-ui" font-size="8" fill="#67b26f">Right to erasure ("right to be forgotten")</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="8" fill="#e0e0e0">HIPAA:</text>
      <text x="50" y="20" font-family="system-ui" font-size="8" fill="#67b26f">Secure disposal of PHI</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="8" fill="#e0e0e0">PCI-DSS:</text>
      <text x="70" y="40" font-family="system-ui" font-size="8" fill="#67b26f">Secure deletion of card data</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="8" fill="#e0e0e0">SOC 2:</text>
      <text x="50" y="60" font-family="system-ui" font-size="8" fill="#67b26f">Documented disposal procedures</text>
      
      <text x="200" y="20" font-family="system-ui" font-size="7" fill="#999">Key requirements:</text>
      <text x="200" y="35" font-family="system-ui" font-size="7" fill="#999">• Verifiable deletion</text>
      <text x="200" y="48" font-family="system-ui" font-size="7" fill="#999">• Audit trail</text>
      <text x="200" y="61" font-family="system-ui" font-size="7" fill="#999">• Chain of custody</text>
      <text x="200" y="74" font-family="system-ui" font-size="7" fill="#999">• Third-party certification</text>
    </g>
  </g>
</svg>
