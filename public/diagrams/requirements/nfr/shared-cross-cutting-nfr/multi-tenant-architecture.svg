<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Multi-Tenant Architecture Patterns</text>
  
  <!-- Isolation Patterns -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Database Isolation Patterns</text>
    
    <!-- Database per Tenant -->
    <rect x="30" y="55" width="220" height="120" rx="4" fill="#4a90d9" opacity="0.3"/>
    <text x="140" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Database per Tenant</text>
    
    <rect x="50" y="95" width="80" height="30" rx="3" fill="#4a90d9" opacity="0.6"/>
    <text x="90" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">Tenant A DB</text>
    
    <rect x="50" y="135" width="80" height="30" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="90" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">Tenant B DB</text>
    
    <rect x="140" y="95" width="80" height="70" rx="3" fill="#f0ad4e" opacity="0.6"/>
    <text x="180" y="125" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">Tenant C DB</text>
    
    <text x="140" y="175" text-anchor="middle" font-family="system-ui" font-size="7" fill="#67b26f">✓ Max isolation</text>
    <text x="140" y="188" text-anchor="middle" font-family="system-ui" font-size="7" fill="#f0ad4e">✗ High cost</text>
    
    <!-- Schema per Tenant -->
    <rect x="270" y="55" width="220" height="120" rx="4" fill="#67b26f" opacity="0.3"/>
    <text x="380" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Schema per Tenant</text>
    
    <rect x="290" y="95" width="180" height="60" rx="3" fill="#67b26f" opacity="0.4" stroke="#67b26f"/>
    <text x="380" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Shared Database</text>
    
    <rect x="300" y="125" width="50" height="20" rx="2" fill="#4a90d9" opacity="0.6"/>
    <text x="325" y="139" text-anchor="middle" font-family="system-ui" font-size="6" fill="white">Schema A</text>
    
    <rect x="360" y="125" width="50" height="20" rx="2" fill="#67b26f" opacity="0.6"/>
    <text x="385" y="139" text-anchor="middle" font-family="system-ui" font-size="6" fill="white">Schema B</text>
    
    <rect x="420" y="125" width="50" height="20" rx="2" fill="#f0ad4e" opacity="0.6"/>
    <text x="445" y="139" text-anchor="middle" font-family="system-ui" font-size="6" fill="white">Schema C</text>
    
    <text x="380" y="175" text-anchor="middle" font-family="system-ui" font-size="7" fill="#67b26f">✓ Good isolation</text>
    <text x="380" y="188" text-anchor="middle" font-family="system-ui" font-size="7" fill="#f0ad4e">✗ Schema management</text>
    
    <!-- Shared Table -->
    <rect x="510" y="55" width="220" height="120" rx="4" fill="#f0ad4e" opacity="0.3"/>
    <text x="620" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Shared Table (tenant_id)</text>
    
    <rect x="530" y="95" width="180" height="60" rx="3" fill="#f0ad4e" opacity="0.4" stroke="#f0ad4e"/>
    <text x="620" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Shared Table</text>
    <text x="620" y="130" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">tenant_id | data</text>
    <text x="620" y="145" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">A | ...</text>
    <text x="620" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">B | ...</text>
    
    <text x="620" y="175" text-anchor="middle" font-family="system-ui" font-size="7" fill="#67b26f">✓ Lowest cost</text>
    <text x="620" y="188" text-anchor="middle" font-family="system-ui" font-size="7" fill="#f0ad4e">✗ Complex queries</text>
  </g>
  
  <!-- Tenant Onboarding -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Tenant Onboarding Flow</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="80" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">1. Create tenant record</text>
      
      <rect x="180" y="0" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="260" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">2. Provision resources</text>
      
      <rect x="0" y="35" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">3. Configure settings</text>
      
      <rect x="180" y="35" width="160" height="25" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">4. Create admin user</text>
      
      <rect x="0" y="70" width="340" height="25" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="170" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">5. Send welcome + credentials</text>
      
      <text x="170" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Automate entire flow (Infrastructure as Code)</text>
    </g>
  </g>
  
  <!-- Tenant Data Isolation -->
  <g transform="translate(470, 310)">
    <rect x="0" y="0" width="380" height="140" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#d9534f">Data Isolation Controls</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Row-level security (RLS)</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Tenant context in every query</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Middleware injects tenant_id</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Audit all cross-tenant access</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">ORM scopes by tenant</text>
      
      <circle cx="180" cy="28" r="4" fill="#d9534f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Test: Try accessing other tenant data</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Encrypt tenant data separately</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Regular isolation audits</text>
    </g>
  </g>
</svg>
