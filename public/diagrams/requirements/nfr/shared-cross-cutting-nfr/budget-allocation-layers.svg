<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Performance Budget Allocation Layers</text>
  
  <!-- Organizational Layers -->
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Organization Level</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Company-wide standards</text>
  <text x="65" y="145" font-size="9" class="text-primary">• Brand guidelines</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Compliance requirements</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Accessibility standards</text>
  <text x="65" y="190" font-size="9" class="text-primary">• Industry benchmarks</text>
  <text x="65" y="205" font-size="9" class="highlight-green">✓ Strategic alignment</text>
  <text x="65" y="220" font-size="9" class="highlight-green">✓ Consistency</text>
  <text x="65" y="235" font-size="9" class="text-primary">Example: All pages LCP &lt;2.5s</text>
  
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Team Level</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Team-specific budgets</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Sprint goals</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Resource allocation</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Tech debt tracking</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Performance reviews</text>
  <text x="350" y="205" font-size="9" class="highlight-green">✓ Team ownership</text>
  <text x="350" y="220" font-size="9" class="highlight-green">✓ Accountability</text>
  <text x="350" y="235" font-size="9" class="text-primary">Example: Frontend team JS &lt;200KB</text>
  
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Project Level</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Project-specific budgets</text>
  <text x="635" y="145" font-size="9" class="text-primary">• Milestone targets</text>
  <text x="635" y="160" font-size="9" class="text-primary">• Release criteria</text>
  <text x="635" y="175" font-size="9" class="text-primary">• Performance gates</text>
  <text x="635" y="190" font-size="9" class="text-primary">• Launch requirements</text>
  <text x="635" y="205" font-size="9" class="highlight-green">✓ Project goals</text>
  <text x="635" y="220" font-size="9" class="highlight-green">✓ Release gates</text>
  <text x="635" y="235" font-size="9" class="text-primary">Example: E-commerce checkout TTI &lt;2s</text>
  
  <!-- Budget Enforcement -->
  <rect x="30" y="270" width="840" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Budget Enforcement Points</text>
  
  <rect x="50" y="310" width="190" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="145" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Development</text>
  <rect x="70" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="145" y="365" text-anchor="middle" font-size="9" class="text-primary">• Lint rules</text>
  <text x="145" y="380" text-anchor="middle" font-size="9" class="text-primary">• Build warnings</text>
  <text x="145" y="395" text-anchor="middle" font-size="9" class="text-primary">• Dev tools</text>
  <text x="145" y="410" text-anchor="middle" font-size="9" class="text-primary">• IDE integration</text>
  <text x="145" y="425" text-anchor="middle" font-size="9" class="text-primary">• Real-time feedback</text>
  <text x="145" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Early detection</text>
  
  <rect x="255" y="310" width="190" height="145" rx="3" class="accent-box" stroke-width="1"/>
  <text x="350" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">CI/CD Pipeline</text>
  <rect x="275" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="350" y="365" text-anchor="middle" font-size="9" class="text-primary">• Bundle analysis</text>
  <text x="350" y="380" text-anchor="middle" font-size="9" class="text-primary">• Lighthouse CI</text>
  <text x="350" y="395" text-anchor="middle" font-size="9" class="text-primary">• Performance tests</text>
  <text x="350" y="410" text-anchor="middle" font-size="9" class="text-primary">• Budget checks</text>
  <text x="350" y="425" text-anchor="middle" font-size="9" class="text-primary">• Block on failure</text>
  <text x="350" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Gate keeping</text>
  
  <rect x="460" y="310" width="190" height="145" rx="3" class="highlight-box" stroke-width="1"/>
  <text x="555" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Production</text>
  <rect x="480" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="555" y="365" text-anchor="middle" font-size="9" class="text-primary">• RUM monitoring</text>
  <text x="555" y="380" text-anchor="middle" font-size="9" class="text-primary">• SLO tracking</text>
  <text x="555" y="395" text-anchor="middle" font-size="9" class="text-primary">• Alerting</text>
  <text x="555" y="410" text-anchor="middle" font-size="9" class="text-primary">• Dashboards</text>
  <text x="555" y="425" text-anchor="middle" font-size="9" class="text-primary">• Incident response</text>
  <text x="555" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Real users</text>
  
  <rect x="665" y="310" width="190" height="145" rx="3" class="highlight-purple" stroke-width="1"/>
  <text x="760" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Review Process</text>
  <rect x="685" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="760" y="365" text-anchor="middle" font-size="9" class="text-primary">• PR reviews</text>
  <text x="760" y="380" text-anchor="middle" font-size="9" class="text-primary">• Performance audits</text>
  <text x="760" y="395" text-anchor="middle" font-size="9" class="text-primary">• Budget reviews</text>
  <text x="760" y="410" text-anchor="middle" font-size="9" class="text-primary">• Quarterly goals</text>
  <text x="760" y="425" text-anchor="middle" font-size="9" class="text-primary">• Team syncs</text>
  <text x="760" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Accountability</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>