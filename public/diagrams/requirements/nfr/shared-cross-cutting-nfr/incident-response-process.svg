<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Incident Response Process</text>
  
  <!-- Incident Lifecycle -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#d9534f">Incident Lifecycle</text>
    
    <!-- Detection -->
    <circle cx="80" cy="90" r="35" fill="#4a90d9"/>
    <text x="80" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Detect</text>
    <text x="80" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">MTTD</text>
    
    <line x1="115" y1="90" x2="155" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="155,90 145,85 145,95" fill="#666"/>
    
    <!-- Triage -->
    <circle cx="200" cy="90" r="35" fill="#f0ad4e"/>
    <text x="200" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Triage</text>
    <text x="200" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Assess severity</text>
    
    <line x1="235" y1="90" x2="275" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="275,90 265,85 265,95" fill="#666"/>
    
    <!-- Response -->
    <circle cx="320" cy="90" r="35" fill="#d9534f"/>
    <text x="320" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Respond</text>
    <text x="320" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">MTTR</text>
    
    <line x1="355" y1="90" x2="395" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="395,90 385,85 385,95" fill="#666"/>
    
    <!-- Resolve -->
    <circle cx="440" cy="90" r="35" fill="#67b26f"/>
    <text x="440" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Resolve</text>
    <text x="440" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Service restored</text>
    
    <line x1="475" y1="90" x2="515" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="515,90 505,85 505,95" fill="#666"/>
    
    <!-- Post-Mortem -->
    <circle cx="560" cy="90" r="35" fill="#6f42c1"/>
    <text x="560" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Learn</text>
    <text x="560" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Post-mortem</text>
  </g>
  
  <!-- Severity Levels -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="400" height="200" rx="8" fill="#1a2a1a" stroke="#d9534f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#d9534f">Severity Levels</text>
    
    <rect x="20" y="50" width="360" height="130" rx="4" fill="#2a2a4a"/>
    
    <!-- SEV-1 -->
    <rect x="30" y="60" width="340" height="25" rx="3" fill="#d9534f" opacity="0.6"/>
    <text x="45" y="77" font-family="system-ui" font-size="10" font-weight="bold" fill="white">SEV-1 Critical</text>
    <text x="200" y="77" font-family="system-ui" font-size="10" fill="#e0e0e0">Site down, data loss</text>
    <text x="340" y="77" font-family="system-ui" font-size="10" fill="#e0e0e0">&amp;lt;15 min response</text>
    
    <!-- SEV-2 -->
    <rect x="30" y="90" width="340" height="25" rx="3" fill="#f0ad4e" opacity="0.6"/>
    <text x="45" y="107" font-family="system-ui" font-size="10" font-weight="bold" fill="white">SEV-2 High</text>
    <text x="200" y="107" font-family="system-ui" font-size="10" fill="#e0e0e0">Major feature broken</text>
    <text x="340" y="107" font-family="system-ui" font-size="10" fill="#e0e0e0">&amp;lt;30 min response</text>
    
    <!-- SEV-3 -->
    <rect x="30" y="120" width="340" height="25" rx="3" fill="#4a90d9" opacity="0.6"/>
    <text x="45" y="137" font-family="system-ui" font-size="10" font-weight="bold" fill="white">SEV-3 Medium</text>
    <text x="200" y="137" font-family="system-ui" font-size="10" fill="#e0e0e0">Partial degradation</text>
    <text x="340" y="137" font-family="system-ui" font-size="10" fill="#e0e0e0">&amp;lt;2 hours</text>
    
    <!-- SEV-4 -->
    <rect x="30" y="150" width="340" height="25" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="45" y="167" font-family="system-ui" font-size="10" font-weight="bold" fill="white">SEV-4 Low</text>
    <text x="200" y="167" font-family="system-ui" font-size="10" fill="#e0e0e0">Minor impact</text>
    <text x="340" y="167" font-family="system-ui" font-size="10" fill="#e0e0e0">Next business day</text>
  </g>
  
  <!-- Incident Roles -->
  <g transform="translate(470, 250)">
    <rect x="0" y="0" width="380" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Incident Roles</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="150" height="50" rx="4" fill="#d9534f" opacity="0.4"/>
      <text x="75" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Incident Commander</text>
      <text x="75" y="42" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Owns incident, coordinates</text>
      
      <rect x="170" y="0" width="150" height="50" rx="4" fill="#4a90d9" opacity="0.4"/>
      <text x="245" y="25" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Operations Lead</text>
      <text x="245" y="42" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Technical investigation</text>
      
      <rect x="0" y="60" width="150" height="50" rx="4" fill="#67b26f" opacity="0.4"/>
      <text x="75" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Communications</text>
      <text x="75" y="102" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Stakeholder updates</text>
      
      <rect x="170" y="60" width="150" height="50" rx="4" fill="#f0ad4e" opacity="0.4"/>
      <text x="245" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Scribe</text>
      <text x="245" y="102" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Document timeline</text>
    </g>
  </g>
</svg>
