<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Security Culture Building</text>
  
  <!-- Culture Elements -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Elements of Security Culture</text>
    
    <!-- Leadership -->
    <rect x="30" y="60" width="170" height="100" rx="4" fill="#4a90d9" opacity="0.4"/>
    <text x="115" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Leadership Support</text>
    <text x="115" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Executive sponsorship</text>
    <text x="115" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security in strategy</text>
    <text x="115" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Budget allocation</text>
    <text x="115" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Leading by example</text>
    <text x="115" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Tone from the top</text>
    
    <!-- Training -->
    <rect x="215" y="60" width="170" height="100" rx="4" fill="#67b26f" opacity="0.4"/>
    <text x="300" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Security Training</text>
    <text x="300" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Regular training</text>
    <text x="300" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Phishing simulations</text>
    <text x="300" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Role-based training</text>
    <text x="300" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• New hire onboarding</text>
    <text x="300" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Continuous education</text>
    
    <!-- Communication -->
    <rect x="400" y="60" width="170" height="100" rx="4" fill="#f0ad4e" opacity="0.4"/>
    <text x="485" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Communication</text>
    <text x="485" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Regular updates</text>
    <text x="485" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security newsletters</text>
    <text x="485" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Success stories</text>
    <text x="485" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Open dialogue</text>
    <text x="485" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Make security visible</text>
    
    <!-- Incentives -->
    <rect x="585" y="60" width="170" height="100" rx="4" fill="#d9534f" opacity="0.4"/>
    <text x="670" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Incentives</text>
    <text x="670" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Recognition programs</text>
    <text x="670" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security champions</text>
    <text x="670" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Positive reinforcement</text>
    <text x="670" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Gamification</text>
    <text x="670" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Reward good behavior</text>
  </g>
  
  <!-- Culture Maturity -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Security Culture Maturity</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="25" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="80" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Level 1: Compliance-driven</text>
      
      <rect x="180" y="0" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="260" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Level 2: Awareness</text>
      
      <rect x="0" y="35" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Level 3: Engagement</text>
      
      <rect x="180" y="35" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Level 4: Ownership</text>
      
      <rect x="0" y="70" width="160" height="25" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="80" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Level 5: Culture</text>
      
      <rect x="180" y="70" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Security is everyone's job</text>
      
      <rect x="0" y="105" width="340" height="25" rx="3" fill="#67b26f" opacity="0.3"/>
      <text x="170" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Measure: Phishing click rates, Training completion, Incident reporting</text>
      
      <text x="170" y="145" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Goal: Move from "have to" to "want to"</text>
    </g>
  </g>
  
  <!-- Building Culture -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Building Security Culture</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Start with leadership buy-in</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Make security easy</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Focus on behavior change</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Avoid fear-based messaging</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Celebrate wins</text>
      
      <circle cx="180" cy="28" r="4" fill="#67b26f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Learn from mistakes</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Be consistent</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Patience: Culture takes years</text>
    </g>
  </g>
</svg>
