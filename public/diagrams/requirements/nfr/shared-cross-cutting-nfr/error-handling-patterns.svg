<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Error Handling &amp; Recovery Patterns</text>
  
  <!-- Retry Patterns -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Retry with Backoff</text>
    
    <!-- Timeline -->
    <line x1="30" y1="60" x2="230" y2="60" stroke="#666" stroke-width="2"/>
    
    <!-- Attempt 1 -->
    <circle cx="50" cy="60" r="12" fill="#d9534f"/>
    <text x="50" y="65" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">1</text>
    <text x="50" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Fail</text>
    
    <line x1="62" y1="60" x2="90" y2="60" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="76" y="52" font-family="system-ui" font-size="8" fill="#f0ad4e">1s</text>
    
    <!-- Attempt 2 -->
    <circle cx="110" cy="60" r="12" fill="#d9534f"/>
    <text x="110" y="65" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">2</text>
    <text x="110" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Fail</text>
    
    <line x1="122" y1="60" x2="150" y2="60" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="136" y="52" font-family="system-ui" font-size="8" fill="#f0ad4e">2s</text>
    
    <!-- Attempt 3 -->
    <circle cx="170" cy="60" r="12" fill="#67b26f"/>
    <text x="170" y="65" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">3</text>
    <text x="170" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Success</text>
    
    <text x="130" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Exponential: 1s, 2s, 4s, 8s...</text>
    <text x="130" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Add jitter to prevent thundering herd</text>
    <text x="130" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Max retries: 3-5</text>
  </g>
  
  <!-- Circuit Breaker -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#d9534f">Circuit Breaker</text>
    
    <!-- States -->
    <circle cx="60" cy="90" r="35" fill="#67b26f" opacity="0.6"/>
    <text x="60" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">CLOSED</text>
    <text x="60" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Normal</text>
    
    <line x1="95" y1="90" x2="125" y2="90" stroke="#d9534f" stroke-width="2"/>
    <polygon points="125,90 115,85 115,95" fill="#d9534f"/>
    <text x="110" y="82" font-family="system-ui" font-size="8" fill="#d9534f">Failures</text>
    
    <circle cx="160" cy="90" r="35" fill="#d9534f" opacity="0.6"/>
    <text x="160" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">OPEN</text>
    <text x="160" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Failing fast</text>
    
    <line x1="195" y1="90" x2="225" y2="90" stroke="#f0ad4e" stroke-width="2"/>
    <polygon points="225,90 215,85 215,95" fill="#f0ad4e"/>
    <text x="210" y="82" font-family="system-ui" font-size="8" fill="#f0ad4e">Timeout</text>
    
    <circle cx="200" cy="140" r="30" fill="#f0ad4e" opacity="0.6"/>
    <text x="200" y="145" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="white">HALF-OPEN</text>
    <text x="200" y="160" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Testing</text>
    
    <line x1="175" y1="120" x2="185" y2="135" stroke="#666" stroke-width="2"/>
    <polygon points="185,135 175,130 180,140" fill="#666"/>
  </g>
  
  <!-- Graceful Degradation -->
  <g transform="translate(590, 80)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Graceful Degradation</text>
    
    <!-- Full functionality -->
    <rect x="20" y="55" width="220" height="40" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="130" y="80" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Full Functionality</text>
    
    <line x1="130" y1="95" x2="130" y2="115" stroke="#666" stroke-width="2"/>
    <polygon points="130,115 125,105 135,105" fill="#666"/>
    <text x="140" y="110" font-family="system-ui" font-size="8" fill="#e0e0e0">Dependency fails</text>
    
    <!-- Degraded -->
    <rect x="20" y="120" width="220" height="40" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="130" y="145" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Degraded Mode</text>
    
    <text x="130" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Cache fallback, defaults, reduced features</text>
  </g>
  
  <!-- Error Classification -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="800" height="160" rx="8" fill="#1a2a1a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Error Classification &amp; Response</text>
    
    <rect x="20" y="50" width="760" height="90" rx="4" fill="#2a2a4a"/>
    
    <!-- Transient -->
    <rect x="30" y="60" width="230" height="70" rx="4" fill="#4a90d9" opacity="0.3"/>
    <text x="145" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Transient</text>
    <text x="145" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Timeouts, rate limits</text>
    <text x="145" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#67b26f">→ Retry with backoff</text>
    
    <!-- Permanent -->
    <rect x="270" y="60" width="230" height="70" rx="4" fill="#d9534f" opacity="0.3"/>
    <text x="385" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Permanent</text>
    <text x="385" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Invalid input, 404</text>
    <text x="385" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#d9534f">→ Don't retry, fix request</text>
    
    <!-- Unknown -->
    <rect x="510" y="60" width="230" height="70" rx="4" fill="#f0ad4e" opacity="0.3"/>
    <text x="625" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Unknown</text>
    <text x="625" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Unclassified errors</text>
    <text x="625" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f0ad4e">→ Retry once, then escalate</text>
  </g>
</svg>
