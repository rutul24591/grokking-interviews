<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Security Budget Planning</text>
  
  <!-- Budget Allocation -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Security Budget Allocation</text>
    
    <!-- People -->
    <rect x="30" y="60" width="170" height="100" rx="4" fill="#4a90d9" opacity="0.4"/>
    <text x="115" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">People (40-50%)</text>
    <text x="115" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security team salaries</text>
    <text x="115" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Training &amp; certifications</text>
    <text x="115" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security awareness</text>
    <text x="115" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Hiring &amp; retention</text>
    <text x="115" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Largest portion - people are key</text>
    
    <!-- Technology -->
    <rect x="215" y="60" width="170" height="100" rx="4" fill="#67b26f" opacity="0.4"/>
    <text x="300" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Technology (30-40%)</text>
    <text x="300" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security tools</text>
    <text x="300" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• SIEM/SOAR</text>
    <text x="300" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Scanning tools</text>
    <text x="300" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Infrastructure</text>
    <text x="300" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Automation reduces long-term costs</text>
    
    <!-- Services -->
    <rect x="400" y="60" width="170" height="100" rx="4" fill="#f0ad4e" opacity="0.4"/>
    <text x="485" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Services (15-25%)</text>
    <text x="485" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Penetration testing</text>
    <text x="485" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security assessments</text>
    <text x="485" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Compliance audits</text>
    <text x="485" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Incident response retainer</text>
    <text x="485" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">External expertise when needed</text>
    
    <!-- Contingency -->
    <rect x="585" y="60" width="170" height="100" rx="4" fill="#d9534f" opacity="0.4"/>
    <text x="670" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Contingency (5-10%)</text>
    <text x="670" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Incident response</text>
    <text x="670" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Emergency purchases</text>
    <text x="670" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Unplanned projects</text>
    <text x="670" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Risk mitigation</text>
    <text x="670" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Reserve for unexpected needs</text>
  </g>
  
  <!-- ROI Justification -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Security ROI Justification</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">Quantify risk reduction:</text>
      
      <rect x="0" y="15" width="360" height="20" rx="2" fill="#4a90d9" opacity="0.3"/>
      <text x="180" y="29" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">ALE (Annual Loss Expectancy) = SLE × ARO</text>
      
      <rect x="0" y="40" width="360" height="20" rx="2" fill="#67b26f" opacity="0.3"/>
      <text x="180" y="54" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">SLE (Single Loss Expectancy) = Asset Value × Exposure Factor</text>
      
      <rect x="0" y="65" width="360" height="20" rx="2" fill="#f0ad4e" opacity="0.3"/>
      <text x="180" y="79" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">ARO (Annual Rate of Occurrence) = Expected frequency</text>
      
      <rect x="0" y="90" width="360" height="20" rx="2" fill="#d9534f" opacity="0.3"/>
      <text x="180" y="104" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">ROS (Return on Security Investment) = (Risk Reduction - Cost) / Cost</text>
      
      <text x="180" y="130" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Also consider: Compliance requirements, Reputation protection, Customer trust</text>
    </g>
  </g>
  
  <!-- Budget Benchmarks -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Industry Benchmarks</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">Security budget as % of IT budget:</text>
      
      <rect x="0" y="15" width="340" height="20" rx="2" fill="#4a90d9" opacity="0.3"/>
      <text x="170" y="29" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Average: 5-7% of IT budget</text>
      
      <rect x="0" y="40" width="340" height="20" rx="2" fill="#67b26f" opacity="0.3"/>
      <text x="170" y="54" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">High-security industries: 10-15% (Finance, Healthcare)</text>
      
      <rect x="0" y="65" width="340" height="20" rx="2" fill="#f0ad4e" opacity="0.3"/>
      <text x="170" y="79" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Per employee: $500-1,500/year</text>
      
      <rect x="0" y="90" width="340" height="20" rx="2" fill="#d9534f" opacity="0.3"/>
      <text x="170" y="104" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Per $1,000 revenue: $5-15/year</text>
      
      <text x="170" y="130" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Adjust based on: Risk profile, Regulatory requirements, Industry threats</text>
    </g>
  </g>
</svg>
