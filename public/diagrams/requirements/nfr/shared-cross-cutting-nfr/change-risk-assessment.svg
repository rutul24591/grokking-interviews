<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Change Management - Risk Assessment</text>
  
  <!-- Risk Matrix -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="700" height="300" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="350" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#f0ad4e">Change Risk Assessment Matrix</text>
    
    <!-- Y axis label -->
    <text x="30" y="160" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0" transform="rotate(-90, 30, 160)">Impact →</text>
    
    <!-- X axis label -->
    <text x="350" y="295" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Likelihood →</text>
    
    <!-- Grid cells -->
    <!-- Low/Low -->
    <rect x="60" y="200" width="120" height="80" rx="3" fill="#67b26f" opacity="0.4"/>
    <text x="120" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#67b26f">LOW</text>
    <text x="120" y="255" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Standard approval</text>
    <text x="120" y="270" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Pre-approved changes</text>
    
    <!-- Medium/Low -->
    <rect x="180" y="200" width="120" height="80" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="240" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">MEDIUM</text>
    <text x="240" y="255" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Peer review</text>
    <text x="240" y="270" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Team lead approval</text>
    
    <!-- High/Low -->
    <rect x="300" y="200" width="120" height="80" rx="3" fill="#d9534f" opacity="0.4"/>
    <text x="360" y="235" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#d9534f">HIGH</text>
    <text x="360" y="255" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">CAB review</text>
    <text x="360" y="270" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Director approval</text>
    
    <!-- Low/Medium -->
    <rect x="60" y="120" width="120" height="80" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="120" y="155" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">MEDIUM</text>
    <text x="120" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Peer review</text>
    <text x="120" y="190" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Test in staging</text>
    
    <!-- Medium/Medium -->
    <rect x="180" y="120" width="120" height="80" rx="3" fill="#d9534f" opacity="0.4"/>
    <text x="240" y="155" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#d9534f">HIGH</text>
    <text x="240" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">CAB required</text>
    <text x="240" y="190" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Rollback plan</text>
    
    <!-- High/Medium -->
    <rect x="300" y="120" width="120" height="80" rx="3" fill="#d9534f" opacity="0.6"/>
    <text x="360" y="155" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">CRITICAL</text>
    <text x="360" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Executive approval</text>
    <text x="360" y="190" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Full testing required</text>
    
    <!-- Low/High -->
    <rect x="60" y="60" width="120" height="60" rx="3" fill="#d9534f" opacity="0.4"/>
    <text x="120" y="90" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#d9534f">HIGH</text>
    <text x="120" y="108" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Low likelihood</text>
    <text x="120" y="118" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">high impact</text>
    
    <!-- Medium/High -->
    <rect x="180" y="60" width="120" height="60" rx="3" fill="#d9534f" opacity="0.6"/>
    <text x="240" y="90" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="white">CRITICAL</text>
    <text x="240" y="108" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Avoid if possible</text>
    
    <!-- High/High -->
    <rect x="300" y="60" width="120" height="60" rx="3" fill="#d9534f" opacity="0.8"/>
    <text x="360" y="90" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="white">CRITICAL</text>
    <text x="360" y="108" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Do not proceed</text>
  </g>
  
  <!-- Risk Factors -->
  <g transform="translate(50, 410)">
    <rect x="0" y="0" width="400" height="70" rx="8" fill="#1a2a1a" stroke="#4a90d9" stroke-width="2"/>
    <text x="200" y="25" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#4a90d9">Impact Factors</text>
    <text x="200" y="45" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Users affected | Revenue impact | Data at risk | Compliance impact</text>
  </g>
  
  <g transform="translate(470, 410)">
    <rect x="0" y="0" width="380" height="70" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2"/>
    <text x="190" y="25" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#67b26f">Likelihood Factors</text>
    <text x="190" y="45" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Complexity | Testing coverage | Team experience | Previous success rate</text>
  </g>
</svg>
