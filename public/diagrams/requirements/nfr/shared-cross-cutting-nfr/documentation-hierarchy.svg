<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Documentation Hierarchy</text>
  
  <!-- Documentation Pyramid -->
  <g transform="translate(150, 80)">
    <!-- API Docs (Base) -->
    <polygon points="50,280 450,280 400,220 100,220" fill="#4a90d9" opacity="0.6"/>
    <text x="250" y="255" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">API Documentation</text>
    <text x="250" y="240" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Endpoints, schemas, examples, auth</text>
    
    <!-- Architecture Docs -->
    <polygon points="100,220 400,220 350,160 150,160" fill="#67b26f" opacity="0.6"/>
    <text x="250" y="195" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">Architecture Documentation</text>
    <text x="250" y="180" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">ADRs, system design, diagrams</text>
    
    <!-- Operational Docs -->
    <polygon points="150,160 350,160 300,100 200,100" fill="#f0ad4e" opacity="0.6"/>
    <text x="250" y="135" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">Operational Documentation</text>
    <text x="250" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Runbooks, deployment guides</text>
    
    <!-- User Docs (Top) -->
    <polygon points="200,100 300,100 250,50 250,50" fill="#d9534f" opacity="0.6"/>
    <text x="250" y="80" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">User Documentation</text>
    <text x="250" y="68" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Guides, tutorials</text>
  </g>
  
  <!-- Docs-as-Code Benefits -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="800" height="80" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2"/>
    <text x="400" y="25" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Docs-as-Code Benefits</text>
    
    <text x="50" y="50" font-family="system-ui" font-size="10" fill="#67b26f">✓</text>
    <text x="70" y="50" font-family="system-ui" font-size="9" fill="#e0e0e0">Version control with code</text>
    
    <text x="200" y="50" font-family="system-ui" font-size="10" fill="#67b26f">✓</text>
    <text x="220" y="50" font-family="system-ui" font-size="9" fill="#e0e0e0">Code review process</text>
    
    <text x="350" y="50" font-family="system-ui" font-size="10" fill="#67b26f">✓</text>
    <text x="370" y="50" font-family="system-ui" font-size="9" fill="#e0e0e0">Automated build &amp; deploy</text>
    
    <text x="520" y="50" font-family="system-ui" font-size="10" fill="#67b26f">✓</text>
    <text x="540" y="50" font-family="system-ui" font-size="9" fill="#e0e0e0">Testing (link checking, examples)</text>
    
    <text x="700" y="50" font-family="system-ui" font-size="10" fill="#67b26f">✓</text>
    <text x="720" y="50" font-family="system-ui" font-size="9" fill="#e0e0e0">Always in sync with code</text>
  </g>
</svg>
