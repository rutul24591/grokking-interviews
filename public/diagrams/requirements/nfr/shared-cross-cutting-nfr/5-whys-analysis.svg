<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">5 Whys Root Cause Analysis</text>
  
  <!-- 5 Whys Flow -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="700" height="280" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="350" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">5 Whys Root Cause Analysis</text>
    
    <!-- Problem -->
    <rect x="50" y="55" width="600" height="35" rx="4" fill="#d9534f" opacity="0.6"/>
    <text x="350" y="78" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Problem: Production deployment failed, site down for 30 minutes</text>
    
    <!-- Why 1 -->
    <line x1="350" y1="90" x2="350" y2="110" stroke="#666" stroke-width="2"/>
    <polygon points="350,110 345,100 355,100" fill="#666"/>
    
    <rect x="100" y="110" width="500" height="30" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="350" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Why 1: Database migration script had syntax error</text>
    
    <!-- Why 2 -->
    <line x1="350" y1="140" x2="350" y2="160" stroke="#666" stroke-width="2"/>
    <polygon points="350,160 345,150 355,150" fill="#666"/>
    
    <rect x="100" y="160" width="500" height="30" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="350" y="180" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Why 2: Script wasn't tested in staging environment</text>
    
    <!-- Why 3 -->
    <line x1="350" y1="190" x2="350" y2="210" stroke="#666" stroke-width="2"/>
    <polygon points="350,210 345,200 355,200" fill="#666"/>
    
    <rect x="100" y="210" width="500" height="30" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="350" y="230" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Why 3: CI/CD pipeline doesn't run migration scripts in staging</text>
    
    <!-- Why 4 -->
    <line x1="350" y1="240" x2="350" y2="260" stroke="#666" stroke-width="2"/>
    <polygon points="350,260 345,250 355,250" fill="#666"/>
    
    <rect x="100" y="260" width="500" height="30" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="350" y="280" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Why 4: Migration testing was deprioritized in sprint planning</text>
    
    <!-- Why 5 (Root Cause) -->
    <line x1="350" y1="290" x2="350" y2="310" stroke="#67b26f" stroke-width="3"/>
    <polygon points="350,310 345,300 355,300" fill="#67b26f"/>
    
    <rect x="100" y="310" width="500" height="40" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="350" y="330" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="white">Root Cause: No process requiring migration testing before production</text>
    <text x="350" y="345" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Action: Add migration testing to deployment checklist &amp; CI/CD</text>
  </g>
  
  <!-- Action Items -->
  <g transform="translate(50, 390)">
    <rect x="0" y="0" width="400" height="80" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="200" y="25" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#67b26f">Corrective Actions</text>
    
    <g transform="translate(20, 40)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Add migration test to CI/CD pipeline</text>
      <text x="250" y="13" font-family="system-ui" font-size="7" fill="#999">Owner: DevOps | Due: 1 week</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Update deployment runbook</text>
      <text x="250" y="33" font-family="system-ui" font-size="7" fill="#999">Owner: Team Lead | Due: 3 days</text>
    </g>
  </g>
  
  <!-- Prevention -->
  <g transform="translate(470, 390)">
    <rect x="0" y="0" width="380" height="80" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="190" y="25" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f0ad4e">Preventive Measures</text>
    
    <g transform="translate(20, 40)">
      <circle cx="8" cy="8" r="4" fill="#f0ad4e"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Automated migration validation</text>
      
      <circle cx="8" cy="28" r="4" fill="#f0ad4e"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Staging environment mirrors production</text>
      
      <circle cx="200" cy="8" r="4" fill="#f0ad4e"/>
      <text x="212" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Pre-deployment checklist</text>
      
      <circle cx="200" cy="28" r="4" fill="#f0ad4e"/>
      <text x="212" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Quarterly drill</text>
    </g>
  </g>
</svg>
