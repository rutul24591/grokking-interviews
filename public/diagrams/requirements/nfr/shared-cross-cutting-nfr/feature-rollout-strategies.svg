<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Feature Rollout Strategies</text>
  
  <!-- Percentage Rollout -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Percentage-Based</text>
    
    <rect x="20" y="50" width="220" height="75" rx="4" fill="#1a1a2e"/>
    <text x="30" y="70" font-family="system-ui" font-size="10" fill="#e0e0e0">1% → 5% → 25% → 50% → 100%</text>
    
    <!-- Progress bar -->
    <rect x="30" y="85" width="200" height="15" rx="3" fill="#333"/>
    <rect x="30" y="85" width="50" height="15" rx="3" fill="#4a90d9"/>
    <text x="235" y="97" font-family="system-ui" font-size="10" fill="#e0e0e0">25%</text>
    
    <text x="130" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Gradual exposure, measure impact</text>
  </g>
  
  <!-- Canary Release -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Canary Release</text>
    
    <rect x="20" y="50" width="220" height="75" rx="4" fill="#1a1a2e"/>
    <text x="30" y="70" font-family="system-ui" font-size="10" fill="#e0e0e0">Small % first (canary)</text>
    <text x="30" y="90" font-family="system-ui" font-size="10" fill="#e0e0e0">Monitor metrics</text>
    <text x="30" y="110" font-family="system-ui" font-size="10" fill="#e0e0e0">Expand if healthy</text>
  </g>
  
  <!-- Feature Flags -->
  <g transform="translate(590, 80)">
    <rect x="0" y="0" width="260" height="140" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Feature Flags</text>
    
    <rect x="20" y="50" width="220" height="75" rx="4" fill="#1a1a2e"/>
    <text x="30" y="70" font-family="monospace" font-size="9" fill="#f0ad4e">if (featureEnabled('new-ui'))</text>
    <text x="30" y="88" font-family="monospace" font-size="9" fill="#67b26f">  showNewUI();</text>
    <text x="30" y="106" font-family="monospace" font-size="9" fill="#999">else</text>
    <text x="30" y="120" font-family="monospace" font-size="9" fill="#67b26f">  showOldUI();</text>
  </g>
  
  <!-- Rollout Timeline -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Rollout Timeline with Kill Switch</text>
    
    <!-- Timeline -->
    <line x1="50" y1="80" x2="750" y2="80" stroke="#666" stroke-width="3"/>
    
    <!-- Stage 1 -->
    <circle cx="100" cy="80" r="30" fill="#4a90d9"/>
    <text x="100" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">1%</text>
    <text x="100" y="120" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Canary</text>
    
    <!-- Stage 2 -->
    <circle cx="250" cy="80" r="30" fill="#67b26f"/>
    <text x="250" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">25%</text>
    <text x="250" y="120" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Broad Test</text>
    
    <!-- Stage 3 -->
    <circle cx="400" cy="80" r="30" fill="#f0ad4e"/>
    <text x="400" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">50%</text>
    <text x="400" y="120" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Majority</text>
    
    <!-- Stage 4 -->
    <circle cx="550" cy="80" r="30" fill="#67b26f"/>
    <text x="550" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">100%</text>
    <text x="550" y="120" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Full Rollout</text>
    
    <!-- Kill Switch -->
    <rect x="650" y="50" width="100" height="60" rx="6" fill="#d9534f" opacity="0.8"/>
    <text x="700" y="75" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">KILL</text>
    <text x="700" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">SWITCH</text>
    <line x1="600" y1="80" x2="645" y2="80" stroke="#d9534f" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="645,80 635,75 635,85" fill="#d9534f"/>
    
    <!-- Metrics monitoring -->
    <rect x="50" y="150" width="700" height="40" rx="4" fill="#2a2a4a"/>
    <text x="70" y="175" font-family="system-ui" font-size="10" fill="#e0e0e0">Monitor:</text>
    <text x="130" y="175" font-family="system-ui" font-size="10" fill="#67b26f">Error Rate</text>
    <text x="220" y="175" font-family="system-ui" font-size="10" fill="#4a90d9">Latency</text>
    <text x="300" y="175" font-family="system-ui" font-size="10" fill="#f0ad4e">Conversion</text>
    <text x="400" y="175" font-family="system-ui" font-size="10" fill="#67b26f">User Satisfaction</text>
    <text x="550" y="175" font-family="system-ui" font-size="10" fill="#d9534f">→ Trigger rollback if thresholds exceeded</text>
  </g>
</svg>
