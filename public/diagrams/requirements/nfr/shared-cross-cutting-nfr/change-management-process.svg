<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Change Management Process</text>
  
  <!-- Change Flow -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Change Control Process</text>
    
    <!-- Request -->
    <rect x="30" y="55" width="90" height="60" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="75" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">1. Request</text>
    <text x="75" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Submit change</text>
    
    <line x1="120" y1="85" x2="145" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="145,85 135,80 135,90" fill="#666"/>
    
    <!-- Review -->
    <rect x="145" y="55" width="90" height="60" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="190" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">2. Review</text>
    <text x="190" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Peer/CAB review</text>
    
    <line x1="235" y1="85" x2="260" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="260,85 250,80 250,90" fill="#666"/>
    
    <!-- Approve -->
    <rect x="260" y="55" width="90" height="60" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="305" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">3. Approve</text>
    <text x="305" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Based on risk</text>
    
    <line x1="350" y1="85" x2="375" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="375,85 365,80 365,90" fill="#666"/>
    
    <!-- Test -->
    <rect x="375" y="55" width="90" height="60" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="420" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">4. Test</text>
    <text x="420" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Staging env</text>
    
    <line x1="465" y1="85" x2="490" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="490,85 480,80 480,90" fill="#666"/>
    
    <!-- Implement -->
    <rect x="490" y="55" width="90" height="60" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="535" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">5. Implement</text>
    <text x="535" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Deploy change</text>
    
    <line x1="580" y1="85" x2="605" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="605,85 595,80 595,90" fill="#666"/>
    
    <!-- Verify -->
    <rect x="605" y="55" width="90" height="60" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="650" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">6. Verify</text>
    <text x="650" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Monitor &amp; confirm</text>
    
    <line x1="695" y1="85" x2="720" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="720,85 710,80 710,90" fill="#666"/>
    
    <!-- Close -->
    <rect x="720" y="55" width="60" height="60" rx="4" fill="#6f42c1" opacity="0.6"/>
    <text x="750" y="85" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">7. Close</text>
    <text x="750" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Document</text>
  </g>
  
  <!-- Change Classification -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="400" height="200" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Change Classification</text>
    
    <rect x="20" y="50" width="360" height="130" rx="4" fill="#2a2a4a"/>
    
    <!-- Standard -->
    <rect x="30" y="65" width="340" height="30" rx="3" fill="#67b26f" opacity="0.4"/>
    <text x="45" y="85" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Standard Changes</text>
    <text x="200" y="85" font-family="system-ui" font-size="10" fill="#e0e0e0">Pre-approved, low-risk (deployments, scaling)</text>
    
    <!-- Normal -->
    <rect x="30" y="100" width="340" height="30" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="45" y="120" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Normal Changes</text>
    <text x="200" y="120" font-family="system-ui" font-size="10" fill="#e0e0e0">Moderate risk, requires review (schema changes)</text>
    
    <!-- Emergency -->
    <rect x="30" y="135" width="340" height="30" rx="3" fill="#d9534f" opacity="0.4"/>
    <text x="45" y="155" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Emergency Changes</text>
    <text x="200" y="155" font-family="system-ui" font-size="10" fill="#e0e0e0">Urgent, expedited approval (incident fixes)</text>
  </g>
  
  <!-- Risk Assessment -->
  <g transform="translate(470, 250)">
    <rect x="0" y="0" width="380" height="200" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Risk Assessment Factors</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="10" fill="#e0e0e0">Impact: How many users/services affected?</text>
      <text x="0" y="20" font-family="system-ui" font-size="10" fill="#e0e0e0">Complexity: How many components involved?</text>
      <text x="0" y="40" font-family="system-ui" font-size="10" fill="#e0e0e0">Reversibility: How easy to rollback?</text>
      <text x="0" y="60" font-family="system-ui" font-size="10" fill="#e0e0e0">Testing: How well tested is the change?</text>
      <text x="0" y="80" font-family="system-ui" font-size="10" fill="#e0e0e0">Timing: Peak hours? Near other changes?</text>
      <text x="0" y="100" font-family="system-ui" font-size="10" fill="#e0e0e0">Experience: Has this been done before?</text>
      
      <text x="200" y="120" font-family="system-ui" font-size="10" fill="#f0ad4e">Score determines approval level</text>
    </g>
  </g>
</svg>
