<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Incident Command Structure</text>
  
  <!-- Command Structure -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="700" height="200" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow)"/>
    <text x="350" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#d9534f">Incident Command Structure (ICS)</text>
    
    <!-- Incident Commander -->
    <rect x="250" y="55" width="200" height="50" rx="6" fill="#d9534f"/>
    <text x="350" y="75" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="white">Incident Commander</text>
    <text x="350" y="95" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Owns incident, makes decisions</text>
    
    <!-- Lines to roles -->
    <line x1="270" y1="105" x2="150" y2="135" stroke="#666" stroke-width="2"/>
    <line x1="350" y1="105" x2="350" y2="135" stroke="#666" stroke-width="2"/>
    <line x1="430" y1="105" x2="550" y2="135" stroke="#666" stroke-width="2"/>
    
    <!-- Operations -->
    <rect x="50" y="135" width="200" height="50" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="150" y="155" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Operations Lead</text>
    <text x="150" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Technical investigation &amp; fix</text>
    
    <!-- Communications -->
    <rect x="250" y="135" width="200" height="50" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="350" y="155" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Communications Lead</text>
    <text x="350" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Stakeholder updates, status page</text>
    
    <!-- Scribe -->
    <rect x="450" y="135" width="200" height="50" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="550" y="155" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Scribe</text>
    <text x="550" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Timeline, decision log</text>
    
    <text x="350" y="200" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">One person per role | IC does NOT do technical work</text>
  </g>
  
  <!-- Communication Templates -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Status Update Template</text>
    
    <rect x="20" y="50" width="360" height="70" rx="4" fill="#2a2a4a"/>
    
    <text x="35" y="70" font-family="monospace" font-size="8" fill="#f0ad4e">[SEV-X] Incident Update #N</text>
    <text x="35" y="88" font-family="monospace" font-size="8" fill="#e0e0e0">Impact: [What's affected]</text>
    <text x="35" y="103" font-family="monospace" font-size="8" fill="#e0e0e0">Current Status: [Investigating/Identified/Monitoring]</text>
    <text x="35" y="115" font-family="monospace" font-size="8" fill="#e0e0e0">Next Update: [Time]</text>
  </g>
  
  <!-- Escalation Matrix -->
  <g transform="translate(470, 310)">
    <rect x="0" y="0" width="380" height="140" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Escalation Matrix</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#d9534f">SEV-1:</text>
      <text x="50" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">VP Eng + All Hands</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="8" fill="#f0ad4e">SEV-2:</text>
      <text x="50" y="20" font-family="system-ui" font-size="8" fill="#e0e0e0">Director + Team</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="8" fill="#67b26f">SEV-3:</text>
      <text x="50" y="40" font-family="system-ui" font-size="8" fill="#e0e0e0">Team Lead + On-call</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="8" fill="#4a90d9">SEV-4:</text>
      <text x="50" y="60" font-family="system-ui" font-size="8" fill="#e0e0e0">On-call only</text>
      
      <text x="200" y="30" font-family="system-ui" font-size="7" fill="#999">Page within:</text>
      <text x="200" y="45" font-family="system-ui" font-size="7" fill="#d9534f">SEV-1: 5 min</text>
      <text x="200" y="60" font-family="system-ui" font-size="7" fill="#f0ad4e">SEV-2: 15 min</text>
      <text x="200" y="75" font-family="system-ui" font-size="7" fill="#67b26f">SEV-3: 1 hour</text>
      <text x="200" y="90" font-family="system-ui" font-size="7" fill="#4a90d9">SEV-4: Next business day</text>
    </g>
  </g>
</svg>
