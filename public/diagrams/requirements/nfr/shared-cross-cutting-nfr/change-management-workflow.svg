<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Change Management Workflow</text>
  
  <!-- Complete Workflow -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">End-to-End Change Management Workflow</text>
    
    <!-- Request -->
    <rect x="30" y="60" width="90" height="50" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="75" y="90" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">1. Request</text>
    
    <line x1="120" y1="85" x2="145" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="145,85 135,80 135,90" fill="#666"/>
    
    <!-- Risk Assessment -->
    <rect x="145" y="60" width="90" height="50" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="190" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">2. Risk</text>
    <text x="190" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Assess</text>
    
    <line x1="235" y1="85" x2="260" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="260,85 250,80 250,90" fill="#666"/>
    
    <!-- Approval -->
    <rect x="260" y="60" width="90" height="50" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="305" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">3. Approve</text>
    <text x="305" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">(CAB if needed)</text>
    
    <line x1="350" y1="85" x2="375" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="375,85 365,80 365,90" fill="#666"/>
    
    <!-- Test -->
    <rect x="375" y="60" width="90" height="50" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="420" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">4. Test</text>
    <text x="420" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Staging</text>
    
    <line x1="465" y1="85" x2="490" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="490,85 480,80 480,90" fill="#666"/>
    
    <!-- Schedule -->
    <rect x="490" y="60" width="90" height="50" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="535" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">5. Schedule</text>
    <text x="535" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Change window</text>
    
    <line x1="580" y1="85" x2="605" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="605,85 595,80 595,90" fill="#666"/>
    
    <!-- Implement -->
    <rect x="605" y="60" width="90" height="50" rx="4" fill="#d9534f" opacity="0.6"/>
    <text x="650" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">6. Implement</text>
    <text x="650" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Deploy</text>
    
    <line x1="695" y1="85" x2="720" y2="85" stroke="#666" stroke-width="2"/>
    <polygon points="720,85 710,80 710,90" fill="#666"/>
    
    <!-- Verify -->
    <rect x="720" y="60" width="90" height="50" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="765" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">7. Verify</text>
    <text x="765" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Monitor</text>
    
    <!-- Rollback path -->
    <path d="M 650 110 L 650 135 L 305 135 L 305 115" fill="none" stroke="#d9534f" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="305,115 300,125 310,125" fill="#d9534f"/>
    <text x="480" y="150" text-anchor="middle" font-family="system-ui" font-size="7" fill="#d9534f">Rollback if verification fails</text>
  </g>
  
  <!-- Approval Matrix -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Approval Matrix</text>
    
    <rect x="20" y="50" width="360" height="70" rx="4" fill="#2a2a4a"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="9" fill="#e0e0e0">Low Risk:</text>
    <text x="120" y="75" font-family="system-ui" font-size="9" fill="#67b26f">Peer review only</text>
    
    <text x="35" y="95" font-family="system-ui" font-size="9" fill="#e0e0e0">Medium Risk:</text>
    <text x="140" y="95" font-family="system-ui" font-size="9" fill="#f0ad4e">Team lead approval</text>
    
    <text x="35" y="115" font-family="system-ui" font-size="9" fill="#e0e0e0">High Risk:</text>
    <text x="130" y="115" font-family="system-ui" font-size="9" fill="#d9534f">CAB + Director approval</text>
  </g>
  
  <!-- Communication Plan -->
  <g transform="translate(470, 310)">
    <rect x="0" y="0" width="380" height="140" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Communication Plan</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">Before:</text>
      <text x="60" y="0" font-family="system-ui" font-size="8" fill="#67b26f">Notify stakeholders, update status page</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="8" fill="#e0e0e0">During:</text>
      <text x="60" y="20" font-family="system-ui" font-size="8" fill="#67b26f">Progress updates every 15-30 min</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="8" fill="#e0e0e0">After:</text>
      <text x="60" y="40" font-family="system-ui" font-size="8" fill="#67b26f">Completion notice, update docs</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="8" fill="#e0e0e0">Rollback:</text>
      <text x="60" y="60" font-family="system-ui" font-size="8" fill="#d9534f">Immediate notification, new ETA</text>
    </g>
  </g>
</svg>
