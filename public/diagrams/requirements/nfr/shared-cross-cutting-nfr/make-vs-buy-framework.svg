<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Make vs Buy Decision Framework</text>

  <!-- 2x2 Matrix -->
  <g transform="translate(50, 65)">
    <!-- Axis labels -->
    <text x="400" y="15" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#475569">Strategic Importance (Low → High)</text>
    <text x="15" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#475569" transform="rotate(-90, 15, 210)">Complexity / Cost to Build (Low → High)</text>

    <!-- Quadrant background grid -->
    <line x1="50" y1="230" x2="770" y2="230" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="410" y1="40" x2="410" y2="410" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- Q1: Top-Left - BUY (Low strategic, low complexity) -->
    <rect x="50" y="40" width="360" height="190" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="230" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#1e40af">BUY</text>
    <text x="230" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Commodity services, solved problems</text>
    <text x="80" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Email (SendGrid, SES)</text>
    <text x="80" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- CDN (CloudFront, Cloudflare)</text>
    <text x="80" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- SMS (Twilio)</text>
    <text x="80" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- DNS (Route53)</text>
    <text x="80" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Payment (Stripe)</text>
    <text x="80" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">Rationale: Not your differentiator</text>

    <!-- Q2: Top-Right - BUILD (High strategic, low complexity) -->
    <rect x="410" y="40" width="360" height="190" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="590" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#166534">BUILD</text>
    <text x="590" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Core differentiators, competitive moat</text>
    <text x="440" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Recommendation algorithms</text>
    <text x="440" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Proprietary data processing</text>
    <text x="440" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Unique UX features</text>
    <text x="440" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Core business logic</text>
    <text x="440" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">Rationale: Your competitive advantage</text>
    <text x="440" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">Don't share this with competitors</text>

    <!-- Q3: Bottom-Left - BUY (Low strategic, high complexity) -->
    <rect x="50" y="230" width="360" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="230" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#92400e">BUY</text>
    <text x="230" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Complex infrastructure, not your core</text>
    <text x="80" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Databases (RDS, Aurora)</text>
    <text x="80" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Message Queues (SQS, Pub/Sub)</text>
    <text x="80" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- ML Platforms (SageMaker)</text>
    <text x="80" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Search (Elasticsearch Service)</text>
    <text x="80" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">Rationale: Operational burden too high</text>
    <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">to run these yourself</text>

    <!-- Q4: Bottom-Right - EVALUATE (High strategic, high complexity) -->
    <rect x="410" y="230" width="360" height="180" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="590" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#9d174d">EVALUATE</text>
    <text x="590" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Strategic but complex — hybrid approach</text>
    <text x="440" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Identity/Auth (Auth0 vs custom)</text>
    <text x="440" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Analytics pipeline</text>
    <text x="440" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- ML feature stores</text>
    <text x="440" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">- Data orchestration</text>
    <text x="440" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">Rationale: Buy now, build later at scale</text>
    <text x="440" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e293b">or wrap vendor with abstraction</text>
  </g>

  <!-- Decision Criteria Footer -->
  <g transform="translate(50, 470)">
    <rect x="0" y="0" width="800" height="40" rx="6" fill="#e2e8f0"/>
    <text x="400" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#334155">Key Questions: Is this our core competency? What are switching costs? What's the 3-5 year TCO? Do we have engineering capacity?</text>
  </g>
</svg>