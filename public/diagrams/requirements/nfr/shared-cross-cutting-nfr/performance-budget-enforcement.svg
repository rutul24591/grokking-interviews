<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Performance Budget Enforcement</text>
  
  <!-- Budget Categories -->
  <rect x="30" y="70" width="840" height="120" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Performance Budget Categories</text>
  
  <rect x="60" y="110" width="180" height="65" rx="3" class="accent-box" stroke-width="1"/>
  <text x="150" y="130" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Size Budgets</text>
  <text x="150" y="150" text-anchor="middle" font-size="8" class="text-primary">Bundle size, images</text>
  <text x="150" y="165" text-anchor="middle" font-size="8" class="text-primary">Target: &lt;500KB</text>
  
  <rect x="260" y="110" width="180" height="65" rx="3" class="highlight-box" stroke-width="1"/>
  <text x="350" y="130" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Timing Budgets</text>
  <text x="350" y="150" text-anchor="middle" font-size="8" class="text-primary">LCP, FID, CLS</text>
  <text x="350" y="165" text-anchor="middle" font-size="8" class="text-primary">Target: LCP &lt;2.5s</text>
  
  <rect x="460" y="110" width="180" height="65" rx="3" class="highlight-purple" stroke-width="1"/>
  <text x="550" y="130" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Quantity Budgets</text>
  <text x="550" y="150" text-anchor="middle" font-size="8" class="text-primary">Requests, DOM nodes</text>
  <text x="550" y="165" text-anchor="middle" font-size="8" class="text-primary">Target: &lt;100 requests</text>
  
  <rect x="660" y="110" width="180" height="65" rx="3" class="highlight-green" stroke-width="1"/>
  <text x="750" y="130" text-anchor="middle" font-size="11" font-weight="bold" class="text-primary">Business Metrics</text>
  <text x="750" y="150" text-anchor="middle" font-size="8" class="text-primary">Conversion, bounce</text>
  <text x="750" y="165" text-anchor="middle" font-size="8" class="text-primary">Target: +5% conversion</text>
  
  <!-- Enforcement Pipeline -->
  <rect x="30" y="210" width="840" height="140" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="235" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Enforcement Pipeline</text>
  
  <rect x="50" y="250" width="150" height="80" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="125" y="275" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">1. Build Time</text>
  <rect x="70" y="290" width="110" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="125" y="310" text-anchor="middle" font-size="8" class="text-primary">Bundle analysis</text>
  <text x="125" y="325" text-anchor="middle" font-size="8" class="highlight-green">✓ Fail CI</text>
  
  <line x1="200" y1="290" x2="230" y2="290" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="230" y="250" width="150" height="80" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="305" y="275" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">2. Staging</text>
  <rect x="250" y="290" width="110" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="305" y="310" text-anchor="middle" font-size="8" class="text-primary">Lighthouse CI</text>
  <text x="305" y="325" text-anchor="middle" font-size="8" class="highlight-green">✓ Gate deploy</text>
  
  <line x1="380" y1="290" x2="410" y2="290" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="410" y="250" width="150" height="80" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="485" y="275" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">3. Production</text>
  <rect x="430" y="290" width="110" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="485" y="310" text-anchor="middle" font-size="8" class="text-primary">RUM monitoring</text>
  <text x="485" y="325" text-anchor="middle" font-size="8" class="highlight-blue">⚠ Alert on breach</text>
  
  <line x1="560" y1="290" x2="590" y2="290" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="590" y="250" width="150" height="80" rx="3" class="box-base" stroke-width="1.5"/>
  <text x="665" y="275" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">4. Response</text>
  <rect x="610" y="290" width="110" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="665" y="310" text-anchor="middle" font-size="8" class="text-primary">Auto-rollback</text>
  <text x="665" y="325" text-anchor="middle" font-size="8" class="highlight-red">⚠ Critical breach</text>
  
  <line x1="740" y1="290" x2="770" y2="290" class="arrow" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  
  <rect x="770" y="250" width="80" height="80" rx="3" class="highlight-green" stroke-width="1.5"/>
  <text x="810" y="290" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">5. Learn</text>
  
  <!-- Alert Tiers -->
  <rect x="30" y="370" width="410" height="100" rx="5" class="highlight-box" stroke-width="2"/>
  <text x="235" y="395" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Alert Tiers</text>
  
  <rect x="50" y="410" width="110" height="45" rx="2" class="highlight-blue" stroke-width="1"/>
  <text x="105" y="430" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Warning</text>
  <text x="105" y="445" text-anchor="middle" font-size="7" class="text-primary">80-100% budget</text>
  
  <rect x="170" y="410" width="110" height="45" rx="2" class="highlight-orange" stroke-width="1"/>
  <text x="225" y="430" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Critical</text>
  <text x="225" y="445" text-anchor="middle" font-size="7" class="text-primary">100-120% budget</text>
  
  <rect x="290" y="410" width="110" height="45" rx="2" class="highlight-red" stroke-width="1"/>
  <text x="345" y="430" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Emergency</text>
  <text x="345" y="445" text-anchor="middle" font-size="7" class="text-primary">&gt;120% budget</text>
  
  <!-- Dashboard Components -->
  <rect x="460" y="370" width="410" height="100" rx="5" class="box-base" stroke-width="2"/>
  <text x="665" y="395" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Dashboard Components</text>
  
  <rect x="480" y="410" width="110" height="45" rx="2" class="accent-box" stroke-width="1"/>
  <text x="535" y="430" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Trend Charts</text>
  <text x="535" y="445" text-anchor="middle" font-size="7" class="text-primary">Historical view</text>
  
  <rect x="600" y="410" width="110" height="45" rx="2" class="accent-box" stroke-width="1"/>
  <text x="655" y="430" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Budget Health</text>
  <text x="655" y="445" text-anchor="middle" font-size="7" class="text-primary">Current status</text>
  
  <rect x="720" y="410" width="110" height="45" rx="2" class="accent-box" stroke-width="1"/>
  <text x="775" y="430" text-anchor="middle" font-size="9" font-weight="bold" class="text-primary">Violations</text>
  <text x="775" y="445" text-anchor="middle" font-size="7" class="text-primary">Breach history</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>