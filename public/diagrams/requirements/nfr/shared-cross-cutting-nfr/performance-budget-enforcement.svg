<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Performance Budget Enforcement</text>
  
  <!-- CI/CD Integration -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="600" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="300" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">CI/CD Pipeline Integration</text>
    
    <!-- Code Commit -->
    <rect x="30" y="55" width="90" height="50" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="75" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Code</text>
    <text x="75" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Commit</text>
    
    <line x1="120" y1="80" x2="145" y2="80" stroke="#666" stroke-width="2"/>
    <polygon points="145,80 135,75 135,85" fill="#666"/>
    
    <!-- Lighthouse CI -->
    <rect x="145" y="55" width="110" height="50" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="200" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Lighthouse CI</text>
    <text x="200" y="98" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Performance audit</text>
    
    <line x1="255" y1="80" x2="280" y2="80" stroke="#666" stroke-width="2"/>
    <polygon points="280,80 270,75 270,85" fill="#666"/>
    
    <!-- Budget Check -->
    <rect x="280" y="55" width="110" height="50" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="335" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Budget Check</text>
    <text x="335" y="98" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Pass/Fail</text>
    
    <line x1="390" y1="80" x2="415" y2="80" stroke="#666" stroke-width="2"/>
    <polygon points="415,80 405,75 405,85" fill="#666"/>
    
    <!-- Decision -->
    <rect x="415" y="55" width="80" height="50" rx="4" fill="#d9534f" opacity="0.6"/>
    <text x="455" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Pass?</text>
    
    <!-- Pass branch -->
    <line x1="455" y1="105" x2="455" y2="130" stroke="#67b26f" stroke-width="2"/>
    <polygon points="455,130 450,120 460,120" fill="#67b26f"/>
    <text x="480" y="125" font-family="system-ui" font-size="8" fill="#67b26f">Yes</text>
    <rect x="415" y="130" width="80" height="35" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="455" y="152" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Deploy</text>
    
    <!-- Fail branch -->
    <line x1="495" y1="80" x2="530" y2="80" stroke="#d9534f" stroke-width="2"/>
    <polygon points="530,80 520,75 520,85" fill="#d9534f"/>
    <text x="510" y="72" font-family="system-ui" font-size="8" fill="#d9534f">No</text>
    <rect x="530" y="55" width="60" height="50" rx="3" fill="#d9534f" opacity="0.6"/>
    <text x="560" y="80" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Block</text>
    <text x="560" y="98" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">PR fails</text>
  </g>
  
  <!-- Budget Thresholds -->
  <g transform="translate(670, 80)">
    <rect x="0" y="0" width="180" height="180" rx="8" fill="#1a2a1a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="90" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Budget Thresholds</text>
    
    <rect x="15" y="50" width="150" height="110" rx="4" fill="#2a2a4a"/>
    
    <text x="25" y="75" font-family="system-ui" font-size="9" fill="#e0e0e0">LCP:</text>
    <text x="80" y="75" font-family="system-ui" font-size="9" fill="#67b26f">{'<'} 2.5s</text>
    
    <text x="25" y="95" font-family="system-ui" font-size="9" fill="#e0e0e0">FCP:</text>
    <text x="80" y="95" font-family="system-ui" font-size="9" fill="#67b26f">{'<'} 1.5s</text>
    
    <text x="25" y="115" font-family="system-ui" font-size="9" fill="#e0e0e0">TTI:</text>
    <text x="80" y="115" font-family="system-ui" font-size="9" fill="#67b26f">{'<'} 3.5s</text>
    
    <text x="25" y="135" font-family="system-ui" font-size="9" fill="#e0e0e0">Bundle:</text>
    <text x="80" y="135" font-family="system-ui" font-size="9" fill="#67b26f">{'<'} 200KB</text>
    
    <text x="25" y="155" font-family="system-ui" font-size="9" fill="#e0e0e0">Images:</text>
    <text x="80" y="155" font-family="system-ui" font-size="9" fill="#67b26f">{'<'} 500KB</text>
  </g>
  
  <!-- Monitoring Dashboard -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="800" height="160" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Production Monitoring Dashboard</text>
    
    <rect x="20" y="50" width="760" height="90" rx="4" fill="#1a1a2e"/>
    
    <!-- Metric 1 -->
    <rect x="35" y="65" width="170" height="60" rx="3" fill="#4a90d9" opacity="0.3"/>
    <text x="120" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#4a90d9">LCP</text>
    <text x="120" y="105" text-anchor="middle" font-family="system-ui" font-size="14" fill="#67b26f">1.8s</text>
    <text x="120" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Target: 2.5s ✓</text>
    
    <!-- Metric 2 -->
    <rect x="220" y="65" width="170" height="60" rx="3" fill="#67b26f" opacity="0.3"/>
    <text x="305" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#67b26f">FCP</text>
    <text x="305" y="105" text-anchor="middle" font-family="system-ui" font-size="14" fill="#67b26f">1.2s</text>
    <text x="305" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Target: 1.5s ✓</text>
    
    <!-- Metric 3 -->
    <rect x="405" y="65" width="170" height="60" rx="3" fill="#f0ad4e" opacity="0.3"/>
    <text x="490" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">TTI</text>
    <text x="490" y="105" text-anchor="middle" font-family="system-ui" font-size="14" fill="#f0ad4e">3.8s</text>
    <text x="490" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">Target: 3.5s ⚠</text>
    
    <!-- Metric 4 -->
    <rect x="590" y="65" width="170" height="60" rx="3" fill="#4a90d9" opacity="0.3"/>
    <text x="675" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="#4a90d9">Bundle</text>
    <text x="675" y="105" text-anchor="middle" font-family="system-ui" font-size="14" fill="#67b26f">185KB</text>
    <text x="675" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Target: 200KB ✓</text>
    
    <text x="400" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Real User Monitoring (RUM) + Automated Alerts</text>
  </g>
</svg>
