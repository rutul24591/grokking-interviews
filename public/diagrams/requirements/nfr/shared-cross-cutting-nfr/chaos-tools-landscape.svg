<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Chaos Engineering Tools Landscape</text>
  
  <!-- Tools by Category -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Chaos Engineering Tools by Category</text>
    
    <!-- Infrastructure -->
    <rect x="30" y="55" width="220" height="120" rx="4" fill="#4a90d9" opacity="0.3"/>
    <text x="140" y="75" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Infrastructure</text>
    <text x="140" y="95" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Chaos Monkey</text>
    <text x="140" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• AWS FIS</text>
    <text x="140" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Azure Chaos Studio</text>
    <text x="140" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• GCP Chaos Testing</text>
    <text x="140" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Litmus Chaos</text>
    <text x="140" y="170" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Chaos Mesh (K8s)</text>
    
    <!-- Network -->
    <rect x="270" y="55" width="220" height="120" rx="4" fill="#67b26f" opacity="0.3"/>
    <text x="380" y="75" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Network</text>
    <text x="380" y="95" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Toxiproxy</text>
    <text x="380" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• tc (Traffic Control)</text>
    <text x="380" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Clumsy (Windows)</text>
    <text x="380" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Network Link Conditioner</text>
    <text x="380" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Istio Fault Injection</text>
    <text x="380" y="170" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Pumba (Docker)</text>
    
    <!-- Application -->
    <rect x="510" y="55" width="220" height="120" rx="4" fill="#f0ad4e" opacity="0.3"/>
    <text x="620" y="75" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Application</text>
    <text x="620" y="95" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Simian Army</text>
    <text x="620" y="110" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Chaos Toolkit</text>
    <text x="620" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Gremlin</text>
    <text x="620" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Fault Injection Testing</text>
    <text x="620" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Polly (.NET)</text>
    <text x="620" y="170" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Resilience4j (Java)</text>
  </g>
  
  <!-- Getting Started -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="#1a2a1a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Getting Started Path</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" font-weight="bold" fill="#67b26f">Week 1-2:</text>
      <text x="70" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">Game day in staging</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="8" font-weight="bold" fill="#67b26f">Week 3-4:</text>
      <text x="70" y="20" font-family="system-ui" font-size="8" fill="#e0e0e0">Automated tests in CI</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="8" font-weight="bold" fill="#f0ad4e">Month 2:</text>
      <text x="70" y="40" font-family="system-ui" font-size="8" fill="#e0e0e0">Controlled production tests</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="8" font-weight="bold" fill="#4a90d9">Month 3+:</text>
      <text x="70" y="60" font-family="system-ui" font-size="8" fill="#e0e0e0">Continuous chaos engineering</text>
      
      <text x="220" y="30" font-family="system-ui" font-size="7" fill="#999">Start simple:</text>
      <text x="220" y="45" font-family="system-ui" font-size="7" fill="#999">• Kill random pods</text>
      <text x="220" y="58" font-family="system-ui" font-size="7" fill="#999">• Add latency</text>
      <text x="220" y="71" font-family="system-ui" font-size="7" fill="#999">• CPU stress</text>
    </g>
  </g>
  
  <!-- Success Metrics -->
  <g transform="translate(470, 310)">
    <rect x="0" y="0" width="380" height="140" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Success Metrics</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">MTTR decreasing</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Auto-recovery rate increasing</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Confidence scores improving</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Issues found BEFORE production</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Runbook coverage</text>
      
      <circle cx="180" cy="28" r="4" fill="#67b26f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Alert accuracy</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Team confidence</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Fewer SEV-1/2 incidents</text>
    </g>
  </g>
</svg>
