<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">On-Call Best Practices</text>
  
  <!-- On-Call Rotation -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="380" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">On-Call Rotation</text>
    
    <!-- Weekly rotation -->
    <rect x="20" y="50" width="340" height="110" rx="4" fill="#1a1a2e"/>
    
    <text x="40" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">Week 1:</text>
    <rect x="100" y="65" width="60" height="20" rx="3" fill="#4a90d9" opacity="0.6"/>
    <text x="130" y="79" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Team A</text>
    
    <text x="40" y="100" font-family="system-ui" font-size="10" fill="#e0e0e0">Week 2:</text>
    <rect x="100" y="90" width="60" height="20" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="130" y="104" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Team B</text>
    
    <text x="40" y="125" font-family="system-ui" font-size="10" fill="#e0e0e0">Week 3:</text>
    <rect x="100" y="115" width="60" height="20" rx="3" fill="#f0ad4e" opacity="0.6"/>
    <text x="130" y="129" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Team C</text>
    
    <text x="40" y="150" font-family="system-ui" font-size="10" fill="#e0e0e0">Week 4:</text>
    <rect x="100" y="140" width="60" height="20" rx="3" fill="#d9534f" opacity="0.6"/>
    <text x="130" y="154" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Team D</text>
    
    <text x="250" y="85" font-family="system-ui" font-size="9" fill="#e0e0e0">• Never solo on-call</text>
    <text x="250" y="105" font-family="system-ui" font-size="9" fill="#e0e0e0">• Formal handoff</text>
    <text x="250" y="125" font-family="system-ui" font-size="9" fill="#e0e0e0">• Compensation + time off</text>
    <text x="250" y="145" font-family="system-ui" font-size="9" fill="#e0e0e0">• Follow-up rest day</text>
  </g>
  
  <!-- Alert Quality -->
  <g transform="translate(450, 80)">
    <rect x="0" y="0" width="400" height="180" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Alert Quality Pyramid</text>
    
    <!-- Page (top) -->
    <polygon points="100,60 300,60 280,90 120,90" fill="#d9534f" opacity="0.6"/>
    <text x="200" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Page</text>
    <text x="200" y="95" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Actionable, urgent</text>
    
    <!-- Ticket (middle) -->
    <polygon points="120,90 280,90 260,120 140,120" fill="#f0ad4e" opacity="0.6"/>
    <text x="200" y="110" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Ticket</text>
    <text x="200" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Non-urgent, trackable</text>
    
    <!-- Log (bottom) -->
    <polygon points="140,120 260,120 240,150 160,150" fill="#4a90d9" opacity="0.6"/>
    <text x="200" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Log</text>
    <text x="200" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Informational</text>
    
    <text x="200" y="175" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Page only for actionable alerts</text>
  </g>
  
  <!-- Runbook Structure -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="800" height="160" rx="8" fill="#1a2a1a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Runbook Structure</text>
    
    <rect x="20" y="50" width="760" height="90" rx="4" fill="#2a2a4a"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="10" font-weight="bold" fill="#4a90d9">1. Symptom</text>
    <text x="150" y="75" font-family="system-ui" font-size="9" fill="#e0e0e0">What does the alert indicate?</text>
    
    <text x="35" y="95" font-family="system-ui" font-size="10" font-weight="bold" fill="#67b26f">2. Triage</text>
    <text x="150" y="95" font-family="system-ui" font-size="9" fill="#e0e0e0">Severity assessment, who to page</text>
    
    <text x="35" y="115" font-family="system-ui" font-size="10" font-weight="bold" fill="#f0ad4e">3. Troubleshooting</text>
    <text x="150" y="115" font-family="system-ui" font-size="9" fill="#e0e0e0">Step-by-step diagnosis</text>
    
    <text x="450" y="75" font-family="system-ui" font-size="10" font-weight="bold" fill="#d9534f">4. Resolution</text>
    <text x="580" y="75" font-family="system-ui" font-size="9" fill="#e0e0e0">Known fixes, rollback</text>
    
    <text x="450" y="95" font-family="system-ui" font-size="10" font-weight="bold" fill="#6f42c1">5. Escalation</text>
    <text x="580" y="95" font-family="system-ui" font-size="9" fill="#e0e0e0">Who to contact if stuck</text>
    
    <text x="450" y="115" font-family="system-ui" font-size="10" font-weight="bold" fill="#4a90d9">6. Post-Incident</text>
    <text x="580" y="115" font-family="system-ui" font-size="9" fill="#e0e0e0">Post-mortem, action items</text>
    
    <text x="400" y="135" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Test runbooks regularly (game days)</text>
  </g>
</svg>
