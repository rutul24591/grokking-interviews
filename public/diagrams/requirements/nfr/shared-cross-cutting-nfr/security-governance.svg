<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Security Program Governance</text>
  
  <!-- Governance Structure -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Security Governance Structure</text>
    
    <!-- Board -->
    <rect x="300" y="60" width="200" height="40" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="400" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Board of Directors</text>
    
    <line x1="400" y1="100" x2="400" y2="115" stroke="#666" stroke-width="2"/>
    
    <!-- Security Committee -->
    <rect x="300" y="115" width="200" height="40" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="400" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Security Committee</text>
    
    <line x1="400" y1="155" x2="400" y2="170" stroke="#666" stroke-width="2"/>
    
    <!-- CISO -->
    <rect x="300" y="170" width="200" height="40" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="400" y="195" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">CISO / VP Security</text>
    
    <line x1="400" y1="210" x2="400" y2="225" stroke="#666" stroke-width="2"/>
    <line x1="200" y1="225" x2="600" y2="225" stroke="#666" stroke-width="2"/>
    
    <!-- Security Teams -->
    <line x1="200" y1="225" x2="200" y2="240" stroke="#666" stroke-width="2"/>
    <rect x="100" y="240" width="200" height="35" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="200" y="262" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Security Operations</text>
    
    <line x1="400" y1="225" x2="400" y2="240" stroke="#666" stroke-width="2"/>
    <rect x="300" y="240" width="200" height="35" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="400" y="262" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Security Engineering</text>
    
    <line x1="600" y1="225" x2="600" y2="240" stroke="#666" stroke-width="2"/>
    <rect x="500" y="240" width="200" height="35" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="600" y="262" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">GRC / Compliance</text>
  </g>
  
  <!-- Governance Committees -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Governance Committees</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="80" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Security Steering Committee</text>
      
      <rect x="180" y="0" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="260" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Risk Committee</text>
      
      <rect x="0" y="35" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Change Advisory Board</text>
      
      <rect x="180" y="35" width="160" height="25" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Incident Response Team</text>
      
      <rect x="0" y="70" width="160" height="25" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="80" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Data Governance Council</text>
      
      <rect x="180" y="70" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Architecture Review Board</text>
      
      <rect x="0" y="105" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="80" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Vendor Risk Committee</text>
      
      <rect x="180" y="105" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="260" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Privacy Committee</text>
    </g>
  </g>
  
  <!-- Governance Best Practices -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Governance Best Practices</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Clear roles &amp; responsibilities</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Regular committee meetings</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Documented decision-making</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Executive sponsorship</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Cross-functional representation</text>
      
      <circle cx="180" cy="28" r="4" fill="#67b26f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Clear escalation paths</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Regular reporting</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Continuous improvement</text>
    </g>
  </g>
</svg>
