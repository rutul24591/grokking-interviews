<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Secrets Management</text>
  
  <!-- Secrets Lifecycle -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Secrets Management Lifecycle</text>
    
    <!-- Generate -->
    <circle cx="80" cy="90" r="35" fill="#4a90d9"/>
    <text x="80" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">1. Generate</text>
    <text x="80" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Strong randomness</text>
    
    <line x1="115" y1="90" x2="155" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="155,90 145,85 145,95" fill="#666"/>
    
    <!-- Store -->
    <circle cx="200" cy="90" r="35" fill="#67b26f"/>
    <text x="200" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">2. Store</text>
    <text x="200" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Encrypted vault</text>
    
    <line x1="235" y1="90" x2="275" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="275,90 265,85 265,95" fill="#666"/>
    
    <!-- Distribute -->
    <circle cx="320" cy="90" r="35" fill="#f0ad4e"/>
    <text x="320" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">3. Distribute</text>
    <text x="320" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Secure channels</text>
    
    <line x1="355" y1="90" x2="395" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="395,90 385,85 385,95" fill="#666"/>
    
    <!-- Use -->
    <circle cx="440" cy="90" r="35" fill="#4a90d9"/>
    <text x="440" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">4. Use</text>
    <text x="440" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">In-memory only</text>
    
    <line x1="475" y1="90" x2="515" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="515,90 505,85 505,95" fill="#666"/>
    
    <!-- Rotate -->
    <circle cx="560" cy="90" r="35" fill="#67b26f"/>
    <text x="560" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">5. Rotate</text>
    <text x="560" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Regular rotation</text>
    
    <line x1="595" y1="90" x2="635" y2="90" stroke="#666" stroke-width="3"/>
    <polygon points="635,90 625,85 625,95" fill="#666"/>
    
    <!-- Revoke -->
    <rect x="635" y="55" width="120" height="70" rx="6" fill="#d9534f"/>
    <text x="695" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">6. Revoke</text>
    <text x="695" y="105" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Immediate invalidation</text>
    
    <text x="400" y="165" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Audit every step | Never log secrets | Use short-lived credentials</text>
  </g>
  
  <!-- Storage Options -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Secrets Storage Options</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="30" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="80" y="20" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">HashiCorp Vault</text>
      <text x="80" y="28" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Industry standard</text>
      
      <rect x="180" y="0" width="160" height="30" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="260" y="20" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">AWS Secrets Manager</text>
      <text x="260" y="28" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">AWS native</text>
      
      <rect x="0" y="40" width="160" height="30" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="60" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Azure Key Vault</text>
      <text x="80" y="68" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Azure native</text>
      
      <rect x="180" y="40" width="160" height="30" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="60" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">GCP Secret Manager</text>
      <text x="260" y="68" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">GCP native</text>
      
      <rect x="0" y="80" width="160" height="30" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="80" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Kubernetes Secrets</text>
      <text x="80" y="108" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">K8s native (encrypt at rest!)</text>
      
      <rect x="180" y="80" width="160" height="30" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Environment Variables</text>
      <text x="260" y="108" text-anchor="middle" font-family="system-ui" font-size="7" fill="#d9534f">⚠ Least secure option</text>
    </g>
  </g>
  
  <!-- Best Practices -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Secrets Best Practices</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Never commit secrets to git</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Use short-lived credentials</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Automatic rotation</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Audit all secret access</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Encrypt at rest AND in transit</text>
      
      <circle cx="180" cy="28" r="4" fill="#67b26f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Least privilege access</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Separate secrets per environment</text>
      
      <circle cx="180" cy="68" r="4" fill="#d9534f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Scan codebases for leaked secrets</text>
    </g>
  </g>
</svg>
