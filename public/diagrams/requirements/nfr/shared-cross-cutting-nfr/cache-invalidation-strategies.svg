<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Cache Invalidation Strategies</text>
  
  <!-- TTL Strategy -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">TTL (Time-To-Live)</text>
    
    <rect x="20" y="50" width="220" height="110" rx="4" fill="#1a1a2e"/>
    
    <!-- Timeline -->
    <line x1="40" y1="80" x2="220" y2="80" stroke="#666" stroke-width="2"/>
    
    <!-- Set -->
    <circle cx="60" cy="80" r="15" fill="#67b26f"/>
    <text x="60" y="85" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">Set</text>
    <text x="60" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">T=0</text>
    
    <!-- Valid period -->
    <rect x="80" y="70" width="100" height="20" rx="2" fill="#67b26f" opacity="0.4"/>
    <text x="130" y="65" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">Valid</text>
    
    <!-- Expired -->
    <rect x="180" y="70" width="30" height="20" rx="2" fill="#d9534f" opacity="0.4"/>
    <text x="195" y="65" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">Exp</text>
    
    <text x="130" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">cache.set(key, value, ttl=300)</text>
    
    <text x="130" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Simple</text>
    <text x="130" y="170" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">✗ May serve stale data</text>
  </g>
  
  <!-- Write-Through Invalidation -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Write-Through</text>
    
    <rect x="20" y="50" width="220" height="110" rx="4" fill="#1a1a2e"/>
    
    <!-- App -->
    <rect x="30" y="65" width="60" height="30" rx="3" fill="#4a90d9" opacity="0.6"/>
    <text x="60" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">App</text>
    
    <line x1="90" y1="80" x2="115" y2="80" stroke="#67b26f" stroke-width="2"/>
    
    <!-- Cache -->
    <rect x="115" y="65" width="60" height="30" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="145" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">Cache</text>
    
    <line x1="175" y1="80" x2="200" y2="80" stroke="#67b26f" stroke-width="2"/>
    
    <!-- DB -->
    <rect x="200" y="65" width="30" height="30" rx="2" fill="#f0ad4e" opacity="0.6"/>
    <text x="215" y="85" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">DB</text>
    
    <text x="130" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Write to cache AND DB</text>
    <text x="130" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Synchronous update</text>
    
    <text x="130" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Always consistent</text>
    <text x="130" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">✗ Write latency</text>
  </g>
  
  <!-- Event-Based Invalidation -->
  <g transform="translate(590, 80)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Event-Based</text>
    
    <rect x="20" y="50" width="220" height="110" rx="4" fill="#1a1a2e"/>
    
    <!-- Data Update -->
    <rect x="30" y="65" width="70" height="25" rx="3" fill="#d9534f" opacity="0.6"/>
    <text x="65" y="82" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">Data Update</text>
    
    <line x1="100" y1="78" x2="120" y2="78" stroke="#f0ad4e" stroke-width="2"/>
    <polygon points="120,78 110,73 110,83" fill="#f0ad4e"/>
    
    <!-- Event -->
    <rect x="120" y="65" width="50" height="25" rx="3" fill="#f0ad4e" opacity="0.6"/>
    <text x="145" y="82" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">Event</text>
    
    <line x1="170" y1="78" x2="190" y2="78" stroke="#f0ad4e" stroke-width="2"/>
    <polygon points="190,78 180,73 180,83" fill="#f0ad4e"/>
    
    <!-- Invalidate -->
    <rect x="190" y="65" width="40" height="25" rx="3" fill="#67b26f" opacity="0.6"/>
    <text x="210" y="82" text-anchor="middle" font-family="system-ui" font-size="7" fill="white">Inval</text>
    
    <text x="130" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Publish update event</text>
    <text x="130" y="140" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Subscribers invalidate</text>
    
    <text x="130" y="160" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Fresh on updates</text>
    <text x="130" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#d9534f">✗ Complex ordering</text>
  </g>
  
  <!-- Cache Stampede Prevention -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="800" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Cache Stampede Prevention</text>
    
    <rect x="20" y="50" width="760" height="90" rx="4" fill="#2a2a4a"/>
    
    <!-- Problem -->
    <text x="35" y="75" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Problem:</text>
    <text x="120" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">Cache expires → all requests hit DB simultaneously</text>
    
    <!-- Solutions -->
    <text x="35" y="100" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Solutions:</text>
    
    <rect x="150" y="88" width="180" height="22" rx="3" fill="#4a90d9" opacity="0.4"/>
    <text x="240" y="103" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Mutex/Lock on cache miss</text>
    
    <rect x="350" y="88" width="180" height="22" rx="3" fill="#67b26f" opacity="0.4"/>
    <text x="440" y="103" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Probabilistic early expiration</text>
    
    <rect x="550" y="88" width="180" height="22" rx="3" fill="#f0ad4e" opacity="0.4"/>
    <text x="640" y="103" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Stale-while-revalidate</text>
    
    <text x="400" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Allow one request to populate, serve stale to others</text>
  </g>
</svg>
