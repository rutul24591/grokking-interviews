<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">GDPR Compliance Requirements</text>
  
  <!-- User Rights -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="380" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">User Rights (GDPR)</text>
    
    <text x="20" y="60" font-family="system-ui" font-size="11" fill="#e0e0e0">📋 Right to Access</text>
    <rect x="20" y="70" width="340" height="25" rx="3" fill="#1a1a2e"/>
    <text x="30" y="87" font-family="system-ui" font-size="9" fill="#e0e0e0">Provide copy of all personal data within 30 days</text>
    
    <text x="20" y="105" font-family="system-ui" font-size="11" fill="#e0e0e0">🗑️ Right to Erasure ("Right to be Forgotten")</text>
    <rect x="20" y="115" width="340" height="25" rx="3" fill="#1a1a2e"/>
    <text x="30" y="132" font-family="system-ui" font-size="9" fill="#e0e0e0">Delete all personal data upon request</text>
    
    <text x="20" y="145" font-family="system-ui" font-size="11" fill="#e0e0e0">📤 Right to Portability</text>
    <rect x="20" y="155" width="340" height="25" rx="3" fill="#1a1a2e"/>
    <text x="30" y="172" font-family="system-ui" font-size="9" fill="#e0e0e0">Export data in machine-readable format</text>
  </g>
  
  <!-- Compliance Checklist -->
  <g transform="translate(470, 80)">
    <rect x="0" y="0" width="380" height="180" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Technical Requirements</text>
    
    <g transform="translate(20, 50)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="10" fill="#e0e0e0">Data encryption at rest &amp; transit</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="10" fill="#e0e0e0">Access controls &amp; audit logging</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="10" fill="#e0e0e0">Data inventory &amp; classification</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="10" fill="#e0e0e0">Consent management system</text>
      
      <circle cx="8" cy="88" r="4" fill="#67b26f"/>
      <text x="20" y="93" font-family="system-ui" font-size="10" fill="#e0e0e0">Breach notification (72 hours)</text>
      
      <circle cx="8" cy="108" r="4" fill="#67b26f"/>
      <text x="20" y="113" font-family="system-ui" font-size="10" fill="#e0e0e0">Data Processing Agreements (DPAs)</text>
    </g>
  </g>
  
  <!-- Data Flow -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="800" height="160" rx="8" fill="#1a2a1a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Data Lifecycle Management</text>
    
    <!-- Collection -->
    <rect x="30" y="55" width="130" height="80" rx="6" fill="#4a90d9" opacity="0.6"/>
    <text x="95" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Collection</text>
    <text x="95" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Consent required</text>
    <text x="95" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Purpose limitation</text>
    
    <line x1="160" y1="95" x2="180" y2="95" stroke="#666" stroke-width="2"/>
    <polygon points="180,95 170,90 170,100" fill="#666"/>
    
    <!-- Processing -->
    <rect x="190" y="55" width="130" height="80" rx="6" fill="#67b26f" opacity="0.6"/>
    <text x="255" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Processing</text>
    <text x="255" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Minimize data</text>
    <text x="255" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Secure handling</text>
    
    <line x1="320" y1="95" x2="340" y2="95" stroke="#666" stroke-width="2"/>
    <polygon points="340,95 330,90 330,100" fill="#666"/>
    
    <!-- Storage -->
    <rect x="350" y="55" width="130" height="80" rx="6" fill="#f0ad4e" opacity="0.6"/>
    <text x="415" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Storage</text>
    <text x="415" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Retention limits</text>
    <text x="415" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Encryption</text>
    
    <line x1="480" y1="95" x2="500" y2="95" stroke="#666" stroke-width="2"/>
    <polygon points="500,95 490,90 490,100" fill="#666"/>
    
    <!-- Deletion -->
    <rect x="510" y="55" width="130" height="80" rx="6" fill="#d9534f" opacity="0.6"/>
    <text x="575" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Deletion</text>
    <text x="575" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">On request</text>
    <text x="575" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">After retention</text>
    
    <line x1="640" y1="95" x2="660" y2="95" stroke="#666" stroke-width="2"/>
    <polygon points="660,95 650,90 650,100" fill="#666"/>
    
    <!-- Audit -->
    <rect x="670" y="55" width="130" height="80" rx="6" fill="#6f42c1" opacity="0.6"/>
    <text x="735" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="white">Audit</text>
    <text x="735" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Access logs</text>
    <text x="735" y="120" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Compliance</text>
  </g>
</svg>
