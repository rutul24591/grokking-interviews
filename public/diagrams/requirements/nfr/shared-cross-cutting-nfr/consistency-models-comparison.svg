<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Consistency Models Comparison</text>
  
  <!-- Consistency Spectrum -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Consistency Spectrum</text>
    
    <!-- Strong -->
    <rect x="30" y="55" width="180" height="60" rx="4" fill="#d9534f" opacity="0.4"/>
    <text x="120" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#d9534f">Strong</text>
    <text x="120" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Linearizable, reads see latest write</text>
    
    <line x1="210" y1="85" x2="230" y2="85" stroke="#666" stroke-width="2"/>
    
    <!-- Bounded -->
    <rect x="230" y="55" width="180" height="60" rx="4" fill="#f0ad4e" opacity="0.4"/>
    <text x="320" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f0ad4e">Bounded Staleness</text>
    <text x="320" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Reads within K versions or T time</text>
    
    <line x1="410" y1="85" x2="430" y2="85" stroke="#666" stroke-width="2"/>
    
    <!-- Eventual -->
    <rect x="430" y="55" width="180" height="60" rx="4" fill="#67b26f" opacity="0.4"/>
    <text x="520" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#67b26f">Eventual</text>
    <text x="520" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Converges if no new updates</text>
    
    <line x1="610" y1="85" x2="630" y2="85" stroke="#666" stroke-width="2"/>
    
    <!-- Weak -->
    <rect x="630" y="55" width="140" height="60" rx="4" fill="#4a90d9" opacity="0.4"/>
    <text x="700" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#4a90d9">Weak</text>
    <text x="700" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">No guarantees</text>
    
    <text x="400" y="135" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">← Higher latency, stronger guarantees | Lower latency, weaker guarantees →</text>
  </g>
  
  <!-- ACID vs BASE -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="380" height="200" rx="8" fill="#1a2a1a" stroke="#d9534f" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#d9534f">ACID (Traditional)</text>
    
    <rect x="20" y="50" width="340" height="130" rx="4" fill="#2a2a4a"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="11" fill="#d9534f">A - Atomicity</text>
    <text x="180" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">All or nothing</text>
    
    <text x="35" y="100" font-family="system-ui" font-size="11" fill="#d9534f">C - Consistency</text>
    <text x="180" y="100" font-family="system-ui" font-size="10" fill="#e0e0e0">Valid state transitions</text>
    
    <text x="35" y="125" font-family="system-ui" font-size="11" fill="#d9534f">I - Isolation</text>
    <text x="180" y="125" font-family="system-ui" font-size="10" fill="#e0e0e0">Concurrent isolation</text>
    
    <text x="35" y="150" font-family="system-ui" font-size="11" fill="#d9534f">D - Durability</text>
    <text x="180" y="150" font-family="system-ui" font-size="10" fill="#e0e0e0">Committed data persists</text>
    
    <text x="190" y="175" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Use case: Financial, inventory</text>
  </g>
  
  <!-- BASE -->
  <g transform="translate(470, 250)">
    <rect x="0" y="0" width="380" height="200" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">BASE (Distributed)</text>
    
    <rect x="20" y="50" width="340" height="130" rx="4" fill="#1a1a2e"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="11" fill="#67b26f">BA - Basically Available</text>
    <text x="220" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">System available</text>
    
    <text x="35" y="100" font-family="system-ui" font-size="11" fill="#67b26f">S - Soft State</text>
    <text x="220" y="100" font-family="system-ui" font-size="10" fill="#e0e0e0">State may change</text>
    
    <text x="35" y="125" font-family="system-ui" font-size="11" fill="#67b26f">E - Eventual Consistency</text>
    <text x="220" y="125" font-family="system-ui" font-size="10" fill="#e0e0e0">Converges eventually</text>
    
    <text x="190" y="175" text-anchor="middle" font-family="system-ui" font-size="9" fill="#999">Use case: Social, caching</text>
  </g>
</svg>
