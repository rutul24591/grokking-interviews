<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Vendor Management Lifecycle</text>
  
  <!-- Vendor Selection -->
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">1. Vendor Selection</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Requirements gathering</text>
  <text x="65" y="145" font-size="9" class="text-primary">• RFP process</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Vendor evaluation</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Security assessment</text>
  <text x="65" y="190" font-size="9" class="text-primary">• Reference checks</text>
  <text x="65" y="205" font-size="9" class="text-primary">• Cost analysis</text>
  <text x="65" y="220" font-size="9" class="text-primary">• Proof of concept</text>
  <text x="65" y="235" font-size="9" class="highlight-green">✓ Due diligence</text>
  
  <!-- Contract Negotiation -->
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">2. Contract Negotiation</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• SLA definitions</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Pricing terms</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Data ownership</text>
  <text x="350" y="175" font-size="9" class="text-primary">• Exit clauses</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Liability limits</text>
  <text x="350" y="205" font-size="9" class="text-primary">• Compliance requirements</text>
  <text x="350" y="220" font-size="9" class="text-primary">• Renewal terms</text>
  <text x="350" y="235" font-size="9" class="highlight-green">✓ Legal protection</text>
  
  <!-- Onboarding -->
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">3. Onboarding</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Technical integration</text>
  <text x="635" y="145" font-size="9" class="text-primary">• API setup</text>
  <text x="635" y="160" font-size="9" class="text-primary">• Access provisioning</text>
  <text x="635" y="175" font-size="9" class="text-primary">• Training sessions</text>
  <text x="635" y="190" font-size="9" class="text-primary">• Documentation review</text>
  <text x="635" y="205" font-size="9" class="text-primary">• Test environment</text>
  <text x="635" y="220" font-size="9" class="text-primary">• Go-live checklist</text>
  <text x="635" y="235" font-size="9" class="highlight-green">✓ Smooth transition</text>
  
  <!-- Ongoing Management -->
  <rect x="30" y="270" width="270" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">4. Ongoing Management</text>
  <rect x="50" y="310" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="330" font-size="9" class="text-primary">• Performance monitoring</text>
  <text x="65" y="345" font-size="9" class="text-primary">• SLA compliance tracking</text>
  <text x="65" y="360" font-size="9" class="text-primary">• Regular business reviews</text>
  <text x="65" y="375" font-size="9" class="text-primary">• Issue escalation</text>
  <text x="65" y="390" font-size="9" class="text-primary">• Change management</text>
  <text x="65" y="405" font-size="9" class="text-primary">• Invoice reconciliation</text>
  <text x="65" y="420" font-size="9" class="text-primary">• Relationship management</text>
  <text x="65" y="435" font-size="9" class="text-primary">• Risk assessment</text>
  <text x="65" y="450" font-size="9" class="text-primary">• Compliance audits</text>
  <text x="65" y="465" font-size="9" class="highlight-green">✓ Continuous oversight</text>
  
  <!-- Performance Review -->
  <rect x="315" y="270" width="270" height="200" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">5. Performance Review</text>
  <rect x="335" y="310" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="330" font-size="9" class="text-primary">• Quarterly reviews</text>
  <text x="350" y="345" font-size="9" class="text-primary">• KPI assessment</text>
  <text x="350" y="360" font-size="9" class="text-primary">• SLA performance</text>
  <text x="350" y="375" font-size="9" class="text-primary">• Cost-benefit analysis</text>
  <text x="350" y="390" font-size="9" class="text-primary">• Customer satisfaction</text>
  <text x="350" y="405" font-size="9" class="text-primary">• Improvement plans</text>
  <text x="350" y="420" font-size="9" class="text-primary">• Competitive analysis</text>
  <text x="350" y="435" font-size="9" class="text-primary">• Renewal decision</text>
  <text x="350" y="450" font-size="9" class="highlight-green">✓ Data-driven decisions</text>
  
  <!-- Offboarding -->
  <rect x="600" y="270" width="270" height="200" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">6. Offboarding</text>
  <rect x="620" y="310" width="230" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="330" font-size="9" class="text-primary">• Exit plan activation</text>
  <text x="635" y="345" font-size="9" class="text-primary">• Data migration</text>
  <text x="635" y="360" font-size="9" class="text-primary">• Access revocation</text>
  <text x="635" y="375" font-size="9" class="text-primary">• Knowledge transfer</text>
  <text x="635" y="390" font-size="9" class="text-primary">• Contract termination</text>
  <text x="635" y="405" font-size="9" class="text-primary">• Final reconciliation</text>
  <text x="635" y="420" font-size="9" class="text-primary">• Lessons learned</text>
  <text x="635" y="435" font-size="9" class="text-primary">• Vendor replacement</text>
  <text x="635" y="450" font-size="9" class="highlight-green">✓ Clean exit</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>