<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Post-Mortem Process</text>
  
  <!-- Timeline -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#2a2a4a" stroke="#6f42c1" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#6f42c1">Blameless Post-Mortem Timeline</text>
    
    <!-- Incident -->
    <circle cx="80" cy="90" r="35" fill="#d9534f"/>
    <text x="80" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Incident</text>
    <text x="80" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">T=0</text>
    
    <line x1="115" y1="90" x2="155" y2="90" stroke="#666" stroke-width="2"/>
    <polygon points="155,90 145,85 145,95" fill="#666"/>
    
    <!-- Detection -->
    <circle cx="200" cy="90" r="35" fill="#f0ad4e"/>
    <text x="200" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Detect</text>
    <text x="200" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">MTTD</text>
    
    <line x1="235" y1="90" x2="275" y2="90" stroke="#666" stroke-width="2"/>
    <polygon points="275,90 265,85 265,95" fill="#666"/>
    
    <!-- Response -->
    <circle cx="320" cy="90" r="35" fill="#d9534f"/>
    <text x="320" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Respond</text>
    <text x="320" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">MTTA</text>
    
    <line x1="355" y1="90" x2="395" y2="90" stroke="#666" stroke-width="2"/>
    <polygon points="395,90 385,85 385,95" fill="#666"/>
    
    <!-- Resolve -->
    <circle cx="440" cy="90" r="35" fill="#67b26f"/>
    <text x="440" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Resolve</text>
    <text x="440" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">MTTR</text>
    
    <line x1="475" y1="90" x2="515" y2="90" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="515,90 505,85 505,95" fill="#666"/>
    
    <!-- Post-Mortem -->
    <circle cx="560" cy="90" r="45" fill="#6f42c1"/>
    <text x="560" y="95" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Post-</text>
    <text x="560" y="110" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Mortem</text>
    <text x="560" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Within 5 days</text>
    
    <line x1="605" y1="90" x2="645" y2="90" stroke="#666" stroke-width="2"/>
    <polygon points="645,90 635,85 635,95" fill="#666"/>
    
    <!-- Action Items -->
    <rect x="645" y="55" width="130" height="70" rx="6" fill="#4a90d9" opacity="0.6"/>
    <text x="710" y="85" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Action</text>
    <text x="710" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Items</text>
    <text x="710" y="118" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Track &amp; complete</text>
  </g>
  
  <!-- Post-Mortem Sections -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="800" height="200" rx="8" fill="#1a2a1a" stroke="#6f42c1" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#6f42c1">Post-Mortem Document Sections</text>
    
    <rect x="20" y="50" width="760" height="130" rx="4" fill="#2a2a4a"/>
    
    <!-- Row 1 -->
    <rect x="35" y="65" width="230" height="45" rx="4" fill="#4a90d9" opacity="0.3"/>
    <text x="150" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">1. Summary</text>
    <text x="150" y="102" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Impact, duration, severity</text>
    
    <rect x="280" y="65" width="230" height="45" rx="4" fill="#67b26f" opacity="0.3"/>
    <text x="395" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">2. Timeline</text>
    <text x="395" y="102" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Minute-by-minute events</text>
    
    <rect x="525" y="65" width="230" height="45" rx="4" fill="#f0ad4e" opacity="0.3"/>
    <text x="640" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">3. Root Cause</text>
    <text x="640" y="102" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">5 Whys analysis</text>
    
    <!-- Row 2 -->
    <rect x="35" y="120" width="230" height="45" rx="4" fill="#d9534f" opacity="0.3"/>
    <text x="150" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">4. What Went Well</text>
    <text x="150" y="157" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Response successes</text>
    
    <rect x="280" y="120" width="230" height="45" rx="4" fill="#6f42c1" opacity="0.3"/>
    <text x="395" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#6f42c1">5. What Went Poorly</text>
    <text x="395" y="157" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Areas for improvement</text>
    
    <rect x="525" y="120" width="230" height="45" rx="4" fill="#67b26f" opacity="0.3"/>
    <text x="640" y="140" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">6. Action Items</text>
    <text x="640" y="157" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Assigned, time-bound tasks</text>
  </g>
</svg>
