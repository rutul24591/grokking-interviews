<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Dependency Version Strategy</text>
  
  <!-- Version Pinning Comparison -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Version Pinning Strategies Comparison</text>
    
    <!-- Exact -->
    <rect x="30" y="60" width="220" height="100" rx="4" fill="#67b26f" opacity="0.3"/>
    <text x="140" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#67b26f">Exact (1.2.3)</text>
    <text x="140" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">package: 1.2.3</text>
    <text x="140" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Maximum reproducibility</text>
    <text x="140" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#f0ad4e">✗ Manual updates needed</text>
    <text x="140" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">Recommended for production</text>
    
    <!-- Caret -->
    <rect x="270" y="60" width="220" height="100" rx="4" fill="#f0ad4e" opacity="0.3"/>
    <text x="380" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#f0ad4e">Caret (^1.2.3)</text>
    <text x="380" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">package: ^1.2.3</text>
    <text x="380" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Auto minor/patch updates</text>
    <text x="380" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#f0ad4e">✗ Risk of breaking changes</text>
    <text x="380" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Use for dev dependencies</text>
    
    <!-- Tilde -->
    <rect x="510" y="60" width="220" height="100" rx="4" fill="#4a90d9" opacity="0.3"/>
    <text x="620" y="85" text-anchor="middle" font-family="system-ui" font-size="12" font-weight="bold" fill="#4a90d9">Tilde (~1.2.3)</text>
    <text x="620" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">package: ~1.2.3</text>
    <text x="620" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#67b26f">✓ Auto patch updates only</text>
    <text x="620" y="140" text-anchor="middle" font-family="system-ui" font-size="8" fill="#f0ad4e">✗ Misses minor improvements</text>
    <text x="620" y="155" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Middle ground approach</text>
  </g>
  
  <!-- Update Workflow -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Dependency Update Workflow</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="30" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="80" y="20" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Automated PRs</text>
      <text x="80" y="28" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Dependabot/Renovate</text>
      
      <rect x="180" y="0" width="160" height="30" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="260" y="20" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">CI Tests Run</text>
      <text x="260" y="28" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Verify compatibility</text>
      
      <rect x="0" y="40" width="160" height="30" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="60" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Security Scan</text>
      <text x="80" y="68" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Check for vulnerabilities</text>
      
      <rect x="180" y="40" width="160" height="30" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="60" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Manual Review</text>
      <text x="260" y="68" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Changelog review</text>
      
      <rect x="0" y="80" width="340" height="30" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="170" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Merge → Deploy → Monitor</text>
    </g>
  </g>
  
  <!-- Version Strategy by Type -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Strategy by Dependency Type</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" font-weight="bold" fill="#67b26f">Core/Framework:</text>
      <text x="100" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">Exact pin (React, Express)</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="8" font-weight="bold" fill="#67b26f">Production:</text>
      <text x="100" y="20" font-family="system-ui" font-size="8" fill="#e0e0e0">Exact pin + lock file</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="8" font-weight="bold" fill="#f0ad4e">Dev Tools:</text>
      <text x="100" y="40" font-family="system-ui" font-size="8" fill="#e0e0e0">Caret (^) acceptable</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="8" font-weight="bold" fill="#4a90d9">Testing:</text>
      <text x="100" y="60" font-family="system-ui" font-size="8" fill="#e0e0e0">Tilde (~) or Caret (^)</text>
      
      <text x="200" y="20" font-family="system-ui" font-size="7" fill="#999">Always commit lock files</text>
      <text x="200" y="35" font-family="system-ui" font-size="7" fill="#999">Review changelog before major</text>
      <text x="200" y="48" font-family="system-ui" font-size="7" fill="#999">Test in staging first</text>
    </g>
  </g>
</svg>
