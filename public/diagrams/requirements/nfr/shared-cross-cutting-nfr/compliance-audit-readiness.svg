<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Compliance &amp; Audit Readiness</text>
  
  <!-- Compliance Frameworks -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="140" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Common Compliance Frameworks</text>
    
    <!-- SOC 2 -->
    <rect x="30" y="55" width="140" height="60" rx="4" fill="#4a90d9" opacity="0.4"/>
    <text x="100" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">SOC 2</text>
    <text x="100" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Security controls</text>
    <text x="100" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Annual audit</text>
    
    <!-- ISO 27001 -->
    <rect x="185" y="55" width="140" height="60" rx="4" fill="#67b26f" opacity="0.4"/>
    <text x="255" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">ISO 27001</text>
    <text x="255" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">InfoSec management</text>
    <text x="255" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">International</text>
    
    <!-- GDPR -->
    <rect x="340" y="55" width="140" height="60" rx="4" fill="#f0ad4e" opacity="0.4"/>
    <text x="410" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">GDPR</text>
    <text x="410" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">EU data privacy</text>
    <text x="410" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Heavy fines</text>
    
    <!-- HIPAA -->
    <rect x="495" y="55" width="140" height="60" rx="4" fill="#d9534f" opacity="0.4"/>
    <text x="565" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">HIPAA</text>
    <text x="565" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Healthcare data</text>
    <text x="565" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">US only</text>
    
    <!-- PCI-DSS -->
    <rect x="650" y="55" width="140" height="60" rx="4" fill="#6f42c1" opacity="0.4"/>
    <text x="720" y="80" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#6f42c1">PCI-DSS</text>
    <text x="720" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Payment cards</text>
    <text x="720" y="115" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Required for payments</text>
  </g>
  
  <!-- Audit Trail Requirements -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="400" height="200" rx="8" fill="#1a2a1a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Audit Trail Requirements</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">What to log:</text>
      <text x="80" y="0" font-family="system-ui" font-size="8" fill="#67b26f">All data access</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="8" fill="#e0e0e0">Include:</text>
      <text x="60" y="20" font-family="system-ui" font-size="8" fill="#67b26f">Who, what, when, where</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="8" fill="#e0e0e0">Retention:</text>
      <text x="80" y="40" font-family="system-ui" font-size="8" fill="#67b26f">7 years (financial)</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="8" fill="#e0e0e0">Immutability:</text>
      <text x="100" y="60" font-family="system-ui" font-size="8" fill="#67b26f">WORM storage</text>
      
      <text x="0" y="80" font-family="system-ui" font-size="8" fill="#e0e0e0">Integrity:</text>
      <text x="80" y="80" font-family="system-ui" font-size="8" fill="#67b26f">Hash chains</text>
      
      <text x="0" y="100" font-family="system-ui" font-size="8" fill="#e0e0e0">Searchability:</text>
      <text x="100" y="100" font-family="system-ui" font-size="8" fill="#67b26f">Query by user/date/action</text>
      
      <text x="220" y="30" font-family="system-ui" font-size="7" fill="#999">Key for:</text>
      <text x="220" y="45" font-family="system-ui" font-size="7" fill="#999">• Incident investigation</text>
      <text x="220" y="58" font-family="system-ui" font-size="7" fill="#999">• Compliance audits</text>
      <text x="220" y="71" font-family="system-ui" font-size="7" fill="#999">• Forensic analysis</text>
      <text x="220" y="84" font-family="system-ui" font-size="7" fill="#999">• Legal discovery</text>
    </g>
  </g>
  
  <!-- Audit Readiness Checklist -->
  <g transform="translate(470, 250)">
    <rect x="0" y="0" width="380" height="200" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Audit Readiness Checklist</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Documented policies &amp; procedures</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Access control matrix</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Encryption documentation</text>
      
      <circle cx="8" cy="68" r="4" fill="#67b26f"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Incident response plan</text>
      
      <circle cx="8" cy="88" r="4" fill="#f0ad4e"/>
      <text x="20" y="93" font-family="system-ui" font-size="8" fill="#e0e0e0">Regular penetration tests</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Employee training records</text>
      
      <circle cx="180" cy="28" r="4" fill="#67b26f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Vendor risk assessments</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Backup &amp; recovery tests</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Change management logs</text>
      
      <circle cx="180" cy="88" r="4" fill="#67b26f"/>
      <text x="192" y="93" font-family="system-ui" font-size="8" fill="#e0e0e0">Previous audit findings closed</text>
    </g>
  </g>
</svg>
