<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Security Testing Strategy</text>
  
  <!-- Testing Pyramid -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="700" height="200" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="350" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Security Testing Pyramid</text>
    
    <!-- SAST -->
    <polygon points="100,180 600,180 550,130 150,130" fill="#4a90d9" opacity="0.4"/>
    <text x="350" y="160" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">SAST (Static Analysis)</text>
    <text x="350" y="175" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Fast, frequent, early | Every commit</text>
    
    <!-- DAST -->
    <polygon points="150,130 550,130 500,80 200,80" fill="#67b26f" opacity="0.4"/>
    <text x="350" y="110" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">DAST (Dynamic Analysis)</text>
    <text x="350" y="125" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Running application | Nightly/Per release</text>
    
    <!-- IAST -->
    <polygon points="200,80 500,80 450,40 250,40" fill="#f0ad4e" opacity="0.4"/>
    <text x="350" y="65" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">IAST (Interactive)</text>
    <text x="350" y="80" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">During testing | Per release</text>
    
    <!-- Penetration Testing -->
    <polygon points="250,40 450,40 400,10 300,10" fill="#d9534f" opacity="0.4"/>
    <text x="350" y="30" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Penetration Testing</text>
    <text x="350" y="45" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Manual, deep | Quarterly/Annually</text>
  </g>
  
  <!-- Testing Types -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="400" height="140" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Automated Security Tests</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="80" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">SAST (SonarQube, Checkmarx)</text>
      
      <rect x="180" y="0" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="260" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">SCA (Snyk, Dependabot)</text>
      
      <rect x="0" y="35" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">DAST (OWASP ZAP, Burp)</text>
      
      <rect x="180" y="35" width="160" height="25" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Container Scanning</text>
      
      <rect x="0" y="70" width="160" height="25" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="80" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">IaC Scanning (Checkov)</text>
      
      <rect x="180" y="70" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Secrets Detection</text>
      
      <rect x="0" y="105" width="340" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="170" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Run in CI/CD | Block on critical findings</text>
    </g>
  </g>
  
  <!-- Manual Testing -->
  <g transform="translate(470, 310)">
    <rect x="0" y="0" width="380" height="140" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Manual Security Tests</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Penetration Testing</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Red Team Exercises</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Threat Modeling</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Architecture Review</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Code Review (security focus)</text>
      
      <circle cx="180" cy="28" r="4" fill="#67b26f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Business Logic Testing</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Social Engineering Tests</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Physical Security Tests</text>
    </g>
  </g>
</svg>
