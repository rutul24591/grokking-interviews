<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Access Control &amp; Authorization</text>
  
  <!-- Access Control Models -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Access Control Models</text>
    
    <!-- RBAC -->
    <rect x="30" y="60" width="220" height="100" rx="4" fill="#4a90d9" opacity="0.4"/>
    <text x="140" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">RBAC (Role-Based)</text>
    <text x="140" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Users → Roles → Permissions</text>
    <text x="140" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Admin, Editor, Viewer</text>
    <text x="140" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Easy to manage</text>
    <text x="140" y="150" text-anchor="middle" font-family="system-ui" font-size="7" fill="#67b26f">✓ Most common</text>
    <text x="140" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Example: User is "Admin"</text>
    
    <!-- ABAC -->
    <rect x="270" y="60" width="220" height="100" rx="4" fill="#67b26f" opacity="0.4"/>
    <text x="380" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">ABAC (Attribute-Based)</text>
    <text x="380" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• User attributes + Resource attributes</text>
    <text x="380" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Department=Engineering AND location=US</text>
    <text x="380" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Fine-grained control</text>
    <text x="380" y="150" text-anchor="middle" font-family="system-ui" font-size="7" fill="#67b26f">✓ Flexible</text>
    <text x="380" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Complex to manage</text>
    
    <!-- ReBAC -->
    <rect x="510" y="60" width="220" height="100" rx="4" fill="#f0ad4e" opacity="0.4"/>
    <text x="620" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">ReBAC (Relationship-Based)</text>
    <text x="620" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Access based on relationships</text>
    <text x="620" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• "Owner of document"</text>
    <text x="620" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• "Member of team"</text>
    <text x="620" y="150" text-anchor="middle" font-family="system-ui" font-size="7" fill="#67b26f">✓ Natural for collaboration</text>
    <text x="620" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Example: Google Docs</text>
  </g>
  
  <!-- Authorization Flow -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Authorization Flow</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="80" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">1. User makes request</text>
      
      <rect x="180" y="0" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="260" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">2. Authenticate user</text>
      
      <rect x="0" y="35" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">3. Get user roles/attributes</text>
      
      <rect x="180" y="35" width="160" height="25" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">4. Evaluate policy</text>
      
      <rect x="0" y="70" width="160" height="25" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="80" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">5. Allow/Deny decision</text>
      
      <rect x="180" y="70" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">6. Log access decision</text>
      
      <rect x="0" y="105" width="340" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="170" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">7. Execute or return 403 Forbidden</text>
    </g>
  </g>
  
  <!-- Best Practices -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Authorization Best Practices</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Principle of least privilege</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Default deny (whitelist, not blacklist)</text>
      
      <circle cx="8" cy="48" r="4" fill="#67b26f"/>
      <text x="20" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Centralized authorization service</text>
      
      <circle cx="8" cy="68" r="4" fill="#f0ad4e"/>
      <text x="20" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Regular access reviews</text>
      
      <circle cx="180" cy="8" r="4" fill="#67b26f"/>
      <text x="192" y="13" font-family="system-ui" font-size="8" fill="#e0e0e0">Audit all access decisions</text>
      
      <circle cx="180" cy="28" r="4" fill="#67b26f"/>
      <text x="192" y="33" font-family="system-ui" font-size="8" fill="#e0e0e0">Separate authN from authZ</text>
      
      <circle cx="180" cy="48" r="4" fill="#67b26f"/>
      <text x="192" y="53" font-family="system-ui" font-size="8" fill="#e0e0e0">Cache authorization decisions</text>
      
      <circle cx="180" cy="68" r="4" fill="#67b26f"/>
      <text x="192" y="73" font-family="system-ui" font-size="8" fill="#e0e0e0">Test authorization logic</text>
    </g>
  </g>
</svg>
