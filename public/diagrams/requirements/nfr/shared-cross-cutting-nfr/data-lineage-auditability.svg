<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Data Lineage &amp; Auditability</text>
  
  <!-- Lineage Tracking -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Data Lineage Tracking</text>
    
    <!-- Source -->
    <rect x="30" y="60" width="100" height="100" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="80" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Source</text>
    <text x="80" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• User input</text>
    <text x="80" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• External API</text>
    <text x="80" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• IoT device</text>
    
    <line x1="130" y1="110" x2="160" y2="110" stroke="#666" stroke-width="3"/>
    <polygon points="160,110 150,105 150,115" fill="#666"/>
    
    <!-- Ingest -->
    <rect x="160" y="60" width="100" height="100" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="210" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Ingest</text>
    <text x="210" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Kafka</text>
    <text x="210" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Kinesis</text>
    <text x="210" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Timestamp logged</text>
    
    <line x1="260" y1="110" x2="290" y2="110" stroke="#666" stroke-width="3"/>
    <polygon points="290,110 280,105 280,115" fill="#666"/>
    
    <!-- Transform -->
    <rect x="290" y="60" width="100" height="100" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="340" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Transform</text>
    <text x="340" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• ETL job</text>
    <text x="340" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Business logic</text>
    <text x="340" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Job ID logged</text>
    
    <line x1="390" y1="110" x2="420" y2="110" stroke="#666" stroke-width="3"/>
    <polygon points="420,110 410,105 410,115" fill="#666"/>
    
    <!-- Store -->
    <rect x="420" y="60" width="100" height="100" rx="4" fill="#d9534f" opacity="0.6"/>
    <text x="470" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Store</text>
    <text x="470" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Data lake</text>
    <text x="470" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Warehouse</text>
    <text x="470" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Version tracked</text>
    
    <line x1="520" y1="110" x2="550" y2="110" stroke="#666" stroke-width="3"/>
    <polygon points="550,110 540,105 540,115" fill="#666"/>
    
    <!-- Consume -->
    <rect x="550" y="60" width="100" height="100" rx="4" fill="#6f42c1" opacity="0.6"/>
    <text x="600" y="100" text-anchor="middle" font-family="system-ui" font-size="10" fill="white">Consume</text>
    <text x="600" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Dashboard</text>
    <text x="600" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• ML model</text>
    <text x="600" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Access logged</text>
    
    <!-- Metadata overlay -->
    <rect x="680" y="60" width="80" height="100" rx="4" fill="#4a90d9" opacity="0.3" stroke="#4a90d9" stroke-dasharray="4,2"/>
    <text x="720" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#4a90d9">Metadata</text>
    <text x="720" y="120" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Schema</text>
    <text x="720" y="135" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Owner</text>
    <text x="720" y="150" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Quality</text>
  </g>
  
  <!-- Audit Requirements -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Audit Trail Requirements</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">Track:</text>
      <text x="50" y="0" font-family="system-ui" font-size="8" fill="#67b26f">Who accessed what data</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="8" fill="#e0e0e0">Track:</text>
      <text x="50" y="20" font-family="system-ui" font-size="8" fill="#67b26f">When (timestamp)</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="8" fill="#e0e0e0">Track:</text>
      <text x="50" y="40" font-family="system-ui" font-size="8" fill="#67b26f">What operation (read/write/delete)</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="8" fill="#e0e0e0">Track:</text>
      <text x="50" y="60" font-family="system-ui" font-size="8" fill="#67b26f">From where (IP, application)</text>
      
      <text x="200" y="20" font-family="system-ui" font-size="7" fill="#999">Requirements:</text>
      <text x="200" y="35" font-family="system-ui" font-size="7" fill="#999">• Immutable logs</text>
      <text x="200" y="48" font-family="system-ui" font-size="7" fill="#999">• Long retention (7+ years)</text>
      <text x="200" y="61" font-family="system-ui" font-size="7" fill="#999">• Searchable</text>
      <text x="200" y="74" font-family="system-ui" font-size="7" fill="#999">• Tamper-evident</text>
    </g>
  </g>
  
  <!-- Compliance Mapping -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Compliance Requirements</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="150" height="30" rx="3" fill="#4a90d9" opacity="0.3"/>
      <text x="75" y="20" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">GDPR</text>
      <text x="75" y="28" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Data processing records</text>
      
      <rect x="170" y="0" width="150" height="30" rx="3" fill="#67b26f" opacity="0.3"/>
      <text x="245" y="20" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">HIPAA</text>
      <text x="245" y="28" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">PHI access logs</text>
      
      <rect x="0" y="40" width="150" height="30" rx="3" fill="#f0ad4e" opacity="0.3"/>
      <text x="75" y="60" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">SOX</text>
      <text x="75" y="68" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Financial data controls</text>
      
      <rect x="170" y="40" width="150" height="30" rx="3" fill="#d9534f" opacity="0.3"/>
      <text x="245" y="60" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">PCI-DSS</text>
      <text x="245" y="68" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Card data access</text>
      
      <rect x="0" y="80" width="340" height="30" rx="3" fill="#6f42c1" opacity="0.3"/>
      <text x="170" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">All require: Complete audit trail + Data lineage</text>
    </g>
  </g>
</svg>
