<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Audit Trail Architecture</text>
  
  <!-- Audit Flow -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#d9534f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#d9534f">Audit Event Flow</text>
    
    <!-- Application -->
    <rect x="30" y="60" width="120" height="100" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="90" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Application</text>
    <text x="90" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Generate audit</text>
    <text x="90" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">events</text>
    
    <line x1="150" y1="110" x2="185" y2="110" stroke="#666" stroke-width="3"/>
    <polygon points="185,110 175,105 175,115" fill="#666"/>
    
    <!-- Collector -->
    <rect x="185" y="60" width="120" height="100" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="245" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Event</text>
    <text x="245" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Collector</text>
    <text x="245" y="140" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Fluentd</text>
    <text x="245" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Logstash</text>
    
    <line x1="305" y1="110" x2="340" y2="110" stroke="#666" stroke-width="3"/>
    <polygon points="340,110 330,105 330,115" fill="#666"/>
    
    <!-- Queue -->
    <rect x="340" y="60" width="120" height="100" rx="4" fill="#f0ad4e" opacity="0.6"/>
    <text x="400" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Message</text>
    <text x="400" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Queue</text>
    <text x="400" y="140" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Kafka</text>
    <text x="400" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Kinesis</text>
    
    <line x1="460" y1="110" x2="495" y2="110" stroke="#666" stroke-width="3"/>
    <polygon points="495,110 485,105 485,115" fill="#666"/>
    
    <!-- Storage -->
    <rect x="495" y="60" width="120" height="100" rx="4" fill="#4a90d9" opacity="0.6"/>
    <text x="555" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Audit</text>
    <text x="555" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Storage</text>
    <text x="555" y="140" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• WORM storage</text>
    <text x="555" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Immutable logs</text>
    
    <line x1="615" y1="110" x2="650" y2="110" stroke="#666" stroke-width="3"/>
    <polygon points="650,110 640,105 640,115" fill="#666"/>
    
    <!-- Analysis -->
    <rect x="650" y="60" width="120" height="100" rx="4" fill="#67b26f" opacity="0.6"/>
    <text x="710" y="100" text-anchor="middle" font-family="system-ui" font-size="10" font-weight="bold" fill="white">Analysis</text>
    <text x="710" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">&amp; Alerting</text>
    <text x="710" y="140" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• SIEM</text>
    <text x="710" y="155" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">• Anomaly detection</text>
  </g>
  
  <!-- Audit Event Structure -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Audit Event Structure</text>
    
    <rect x="20" y="50" width="360" height="90" rx="4" fill="#2a2a4a"/>
    
    <text x="35" y="75" font-family="monospace" font-size="9" fill="#67b26f">"timestamp":</text>
    <text x="140" y="75" font-family="monospace" font-size="9" fill="#e0e0e0">"2026-03-19T10:30:00Z"</text>
    
    <text x="35" y="95" font-family="monospace" font-size="9" fill="#67b26f">"actor":</text>
    <text x="140" y="95" font-family="monospace" font-size="9" fill="#e0e0e0">{"{"} "user_id": "u123", "ip": "10.0.0.1" {"}"}</text>
    
    <text x="35" y="115" font-family="monospace" font-size="9" fill="#67b26f">"action":</text>
    <text x="140" y="115" font-family="monospace" font-size="9" fill="#e0e0e0">"READ", "WRITE", "DELETE"</text>
    
    <text x="35" y="135" font-family="monospace" font-size="9" fill="#67b26f">"resource":</text>
    <text x="140" y="135" font-family="monospace" font-size="9" fill="#e0e0e0">"users/456", "orders/789"</text>
  </g>
  
  <!-- Compliance Mapping -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Compliance Mapping</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="150" height="35" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="75" y="22" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#4a90d9">GDPR</text>
      <text x="75" y="33" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Access logging</text>
      
      <rect x="170" y="0" width="150" height="35" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="245" y="22" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#67b26f">HIPAA</text>
      <text x="245" y="33" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">PHI access audit</text>
      
      <rect x="0" y="45" width="150" height="35" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="75" y="67" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#f0ad4e">SOX</text>
      <text x="75" y="78" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Financial controls</text>
      
      <rect x="170" y="45" width="150" height="35" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="245" y="67" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="bold" fill="#d9534f">PCI-DSS</text>
      <text x="245" y="78" text-anchor="middle" font-family="system-ui" font-size="7" fill="#e0e0e0">Card data access</text>
      
      <rect x="0" y="90" width="320" height="30" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="160" y="110" text-anchor="middle" font-family="system-ui" font-size="8" font-weight="bold" fill="#6f42c1">Audit trail supports all compliance requirements</text>
    </g>
  </g>
</svg>
