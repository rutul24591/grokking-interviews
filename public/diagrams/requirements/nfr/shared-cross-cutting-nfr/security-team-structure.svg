<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Security Team Structure</text>
  
  <!-- Team Organization -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Security Team Organization Models</text>
    
    <!-- Centralized -->
    <rect x="30" y="60" width="220" height="100" rx="4" fill="#4a90d9" opacity="0.4"/>
    <text x="140" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#4a90d9">Centralized Model</text>
    <text x="140" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Single security team</text>
    <text x="140" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Reports to CISO</text>
    <text x="140" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Consistent standards</text>
    <text x="140" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Clear accountability</text>
    <text x="140" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Best for: Small-medium orgs</text>
    
    <!-- Federated -->
    <rect x="270" y="60" width="220" height="100" rx="4" fill="#67b26f" opacity="0.4"/>
    <text x="380" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Federated Model</text>
    <text x="380" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security embedded in teams</text>
    <text x="380" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Dotted line to CISO</text>
    <text x="380" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Faster response</text>
    <text x="380" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Context awareness</text>
    <text x="380" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Best for: Large, distributed orgs</text>
    
    <!-- Hybrid -->
    <rect x="510" y="60" width="220" height="100" rx="4" fill="#f0ad4e" opacity="0.4"/>
    <text x="620" y="85" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Hybrid Model</text>
    <text x="620" y="105" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Central security team</text>
    <text x="620" y="120" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Security champions in teams</text>
    <text x="620" y="135" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Best of both worlds</text>
    <text x="620" y="150" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">• Scalable</text>
    <text x="620" y="165" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Best for: Most organizations</text>
  </g>
  
  <!-- Key Roles -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Key Security Roles</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="80" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">CISO / VP Security</text>
      
      <rect x="180" y="0" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="260" y="17" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Security Architects</text>
      
      <rect x="0" y="35" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">SOC Analysts (T1/T2/T3)</text>
      
      <rect x="180" y="35" width="160" height="25" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="52" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Incident Responders</text>
      
      <rect x="0" y="70" width="160" height="25" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="80" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Security Engineers</text>
      
      <rect x="180" y="70" width="160" height="25" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="87" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">GRC Specialists</text>
      
      <rect x="0" y="105" width="160" height="25" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="80" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Penetration Testers</text>
      
      <rect x="180" y="105" width="160" height="25" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="260" y="122" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Security Champions</text>
    </g>
  </g>
  
  <!-- Staffing Ratios -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Staffing Benchmarks</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="8" fill="#e0e0e0">Security staff as % of IT:</text>
      <text x="150" y="0" font-family="system-ui" font-size="8" fill="#67b26f">3-5% typical</text>
      
      <text x="0" y="20" font-family="system-ui" font-size="8" fill="#e0e0e0">SOC analysts per 1,000 endpoints:</text>
      <text x="200" y="20" font-family="system-ui" font-size="8" fill="#67b26f">1-2 analysts</text>
      
      <text x="0" y="40" font-family="system-ui" font-size="8" fill="#e0e0e0">Security engineers per 100 developers:</text>
      <text x="220" y="40" font-family="system-ui" font-size="8" fill="#67b26f">1 engineer</text>
      
      <text x="0" y="60" font-family="system-ui" font-size="8" fill="#e0e0e0">24/7 SOC coverage:</text>
      <text x="120" y="60" font-family="system-ui" font-size="8" fill="#67b26f">Minimum 5-6 FTE</text>
      
      <text x="200" y="70" font-family="system-ui" font-size="7" fill="#999">Varies by industry, risk profile</text>
      
      <rect x="0" y="85" width="340" height="25" rx="3" fill="#6f42c1" opacity="0.3"/>
      <text x="170" y="102" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Consider: Automation to reduce manual workload</text>
      
      <text x="170" y="130" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Quality over quantity | Invest in training</text>
    </g>
  </g>
</svg>
