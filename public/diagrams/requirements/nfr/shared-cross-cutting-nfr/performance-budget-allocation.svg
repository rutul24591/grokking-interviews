<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Performance Budget Allocation</text>
  
  <!-- Budget Breakdown -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">3-Second TTI Budget Breakdown</text>
    
    <!-- Timeline bar -->
    <rect x="30" y="55" width="740" height="40" rx="4" fill="#1a1a2e"/>
    
    <!-- Network -->
    <rect x="30" y="55" width="50" height="40" rx="2" fill="#4a90d9"/>
    <text x="55" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">200ms</text>
    <text x="55" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Network</text>
    
    <!-- Backend -->
    <rect x="80" y="55" width="75" height="40" rx="2" fill="#67b26f"/>
    <text x="117" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">300ms</text>
    <text x="117" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Backend</text>
    
    <!-- HTML -->
    <rect x="155" y="55" width="40" height="40" rx="2" fill="#f0ad4e"/>
    <text x="175" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">100ms</text>
    <text x="175" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">HTML</text>
    
    <!-- CSS -->
    <rect x="195" y="55" width="50" height="40" rx="2" fill="#4a90d9"/>
    <text x="220" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">200ms</text>
    <text x="220" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">CSS</text>
    
    <!-- JS Download -->
    <rect x="245" y="55" width="100" height="40" rx="2" fill="#67b26f"/>
    <text x="295" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">500ms</text>
    <text x="295" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">JS Download</text>
    
    <!-- JS Execute -->
    <rect x="345" y="55" width="150" height="40" rx="2" fill="#f0ad4e"/>
    <text x="420" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">800ms</text>
    <text x="420" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">JS Execute</text>
    
    <!-- Layout/Paint -->
    <rect x="495" y="55" width="60" height="40" rx="2" fill="#4a90d9"/>
    <text x="525" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">300ms</text>
    <text x="525" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Layout</text>
    
    <!-- Buffer -->
    <rect x="555" y="55" width="215" height="40" rx="2" fill="#6f42c1" opacity="0.6"/>
    <text x="662" y="80" text-anchor="middle" font-family="system-ui" font-size="9" fill="white">600ms Buffer</text>
    <text x="662" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Margin for variance</text>
    
    <text x="770" y="80" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">3000ms</text>
  </g>
  
  <!-- Resource Budgets -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Resource Budgets</text>
    
    <rect x="20" y="50" width="360" height="90" rx="4" fill="#2a2a4a"/>
    
    <text x="35" y="75" font-family="system-ui" font-size="10" fill="#e0e0e0">Total Page Weight:</text>
    <text x="200" y="75" font-family="system-ui" font-size="10" fill="#67b26f">&amp;lt; 1.5 MB (desktop)</text>
    <text x="340" y="75" font-family="system-ui" font-size="10" fill="#f0ad4e">&amp;lt; 500 KB (mobile)</text>
    
    <text x="35" y="100" font-family="system-ui" font-size="10" fill="#e0e0e0">JavaScript:</text>
    <text x="200" y="100" font-family="system-ui" font-size="10" fill="#67b26f">&amp;lt; 200 KB gzipped</text>
    
    <text x="35" y="125" font-family="system-ui" font-size="10" fill="#e0e0e0">Images:</text>
    <text x="200" y="125" font-family="system-ui" font-size="10" fill="#67b26f">&amp;lt; 500 KB per page</text>
  </g>
  
  <!-- Enforcement -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow2)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Budget Enforcement</text>
    
    <g transform="translate(20, 55)">
      <circle cx="8" cy="8" r="4" fill="#67b26f"/>
      <text x="20" y="13" font-family="system-ui" font-size="10" fill="#e0e0e0">Lighthouse CI in PR checks</text>
      
      <circle cx="8" cy="28" r="4" fill="#67b26f"/>
      <text x="20" y="33" font-family="system-ui" font-size="10" fill="#e0e0e0">Webpack bundle analyzer</text>
      
      <circle cx="8" cy="48" r="4" fill="#f0ad4e"/>
      <text x="20" y="53" font-family="system-ui" font-size="10" fill="#e0e0e0">Fail build on budget exceeded</text>
      
      <circle cx="8" cy="68" r="4" fill="#67b26f"/>
      <text x="20" y="73" font-family="system-ui" font-size="10" fill="#e0e0e0">RUM for production monitoring</text>
      
      <circle cx="8" cy="88" r="4" fill="#67b26f"/>
      <text x="20" y="93" font-family="system-ui" font-size="10" fill="#e0e0e0">Alert on budget violations</text>
    </g>
  </g>
</svg>
