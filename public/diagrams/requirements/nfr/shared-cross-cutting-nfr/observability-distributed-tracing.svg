<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad2)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Distributed Tracing Flow</text>
  
  <!-- Services -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="180" height="60" rx="6" fill="#4a90d9" opacity="0.8" filter="url(#shadow2)"/>
    <text x="90" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">Client</text>
  </g>
  
  <g transform="translate(280, 80)">
    <rect x="0" y="0" width="180" height="60" rx="6" fill="#67b26f" opacity="0.8" filter="url(#shadow2)"/>
    <text x="90" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">API Gateway</text>
  </g>
  
  <g transform="translate(510, 80)">
    <rect x="0" y="0" width="180" height="60" rx="6" fill="#f0ad4e" opacity="0.8" filter="url(#shadow2)"/>
    <text x="90" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">Auth Service</text>
  </g>
  
  <g transform="translate(740, 80)">
    <rect x="0" y="0" width="130" height="60" rx="6" fill="#d9534f" opacity="0.8" filter="url(#shadow2)"/>
    <text x="65" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="white">Database</text>
  </g>
  
  <!-- Arrows -->
  <line x1="230" y1="110" x2="275" y2="110" stroke="#67b26f" stroke-width="3"/>
  <polygon points="275,110 265,105 265,115" fill="#67b26f"/>
  
  <line x1="460" y1="110" x2="505" y2="110" stroke="#f0ad4e" stroke-width="3"/>
  <polygon points="505,110 495,105 495,115" fill="#f0ad4e"/>
  
  <line x1="690" y1="110" x2="735" y2="110" stroke="#d9534f" stroke-width="3"/>
  <polygon points="735,110 725,105 725,115" fill="#d9534f"/>
  
  <!-- Trace Context Propagation -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="800" height="100" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Trace Context Propagation</text>
    
    <!-- Headers -->
    <rect x="30" y="45" width="740" height="40" rx="4" fill="#1a1a2e"/>
    <text x="40" y="60" font-family="monospace" font-size="10" fill="#e0e0e0">HTTP Headers:</text>
    <text x="40" y="78" font-family="monospace" font-size="10" fill="#67b26f">traceparent: 00-abc123...-span1-01</text>
    <text x="250" y="78" font-family="monospace" font-size="10" fill="#f0ad4e">tracestate: vendor=value</text>
    <text x="500" y="78" font-family="monospace" font-size="10" fill="#4a90d9">X-Request-ID: abc123</text>
  </g>
  
  <!-- Span Timeline -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="800" height="150" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow2)"/>
    <text x="400" y="30" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#67b26f">Span Timeline (Waterfall)</text>
    
    <!-- Time axis -->
    <line x1="50" y1="50" x2="750" y2="50" stroke="#666" stroke-width="1"/>
    <text x="50" y="45" font-family="system-ui" font-size="9" fill="#e0e0e0">0ms</text>
    <text x="750" y="45" font-family="system-ui" font-size="9" fill="#e0e0e0">100ms</text>
    
    <!-- Span 1 -->
    <rect x="50" y="60" width="200" height="25" rx="3" fill="#4a90d9" opacity="0.8"/>
    <text x="60" y="77" font-family="system-ui" font-size="10" fill="white">Gateway (50ms)</text>
    
    <!-- Span 2 -->
    <rect x="90" y="90" width="140" height="25" rx="3" fill="#67b26f" opacity="0.8"/>
    <text x="100" y="107" font-family="system-ui" font-size="10" fill="white">Auth (30ms)</text>
    
    <!-- Span 3 -->
    <rect x="130" y="120" width="80" height="25" rx="3" fill="#d9534f" opacity="0.8"/>
    <text x="140" y="137" font-family="system-ui" font-size="10" fill="white">DB (20ms)</text>
    
    <!-- Trace ID label -->
    <text x="400" y="145" text-anchor="middle" font-family="monospace" font-size="10" fill="#e0e0e0">Trace ID: abc123 | Spans: 3 | Total: 50ms</text>
  </g>
</svg>
