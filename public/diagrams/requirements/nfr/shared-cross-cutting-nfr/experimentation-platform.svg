<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Experimentation Platform Architecture</text>
  
  <!-- User Layer -->
  <rect x="30" y="70" width="840" height="80" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">User Layer</text>
  
  <rect x="100" y="110" width="120" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="160" y="130" text-anchor="middle" font-size="9" class="text-primary">Web Users</text>
  
  <rect x="240" y="110" width="120" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="300" y="130" text-anchor="middle" font-size="9" class="text-primary">Mobile Users</text>
  
  <rect x="380" y="110" width="120" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="440" y="130" text-anchor="middle" font-size="9" class="text-primary">API Clients</text>
  
  <rect x="520" y="110" width="120" height="30" rx="2" class="accent-box" stroke-width="1"/>
  <text x="580" y="130" text-anchor="middle" font-size="9" class="text-primary">Internal Tools</text>
  
  <!-- Experimentation SDK -->
  <rect x="30" y="170" width="840" height="80" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="195" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Experimentation SDK</text>
  
  <rect x="150" y="210" width="140" height="30" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="220" y="230" text-anchor="middle" font-size="9" class="text-primary">Variant Assignment</text>
  
  <rect x="310" y="210" width="140" height="30" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="380" y="230" text-anchor="middle" font-size="9" class="text-primary">Feature Flags</text>
  
  <rect x="470" y="210" width="140" height="30" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="540" y="230" text-anchor="middle" font-size="9" class="text-primary">Event Tracking</text>
  
  <rect x="630" y="210" width="140" height="30" rx="2" class="highlight-box" stroke-width="1"/>
  <text x="700" y="230" text-anchor="middle" font-size="9" class="text-primary">Cache Layer</text>
  
  <!-- Experimentation Service -->
  <rect x="30" y="270" width="840" height="100" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Experimentation Service</text>
  
  <rect x="80" y="310" width="150" height="50" rx="3" class="box-base" stroke-width="1"/>
  <text x="155" y="330" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Experiment Config</text>
  <text x="155" y="350" text-anchor="middle" font-size="8" class="text-secondary">PostgreSQL</text>
  
  <rect x="250" y="310" width="150" height="50" rx="3" class="box-base" stroke-width="1"/>
  <text x="325" y="330" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Assignment Service</text>
  <text x="325" y="350" text-anchor="middle" font-size="8" class="text-secondary">Consistent Hash</text>
  
  <rect x="420" y="310" width="150" height="50" rx="3" class="box-base" stroke-width="1"/>
  <text x="495" y="330" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Event Ingestion</text>
  <text x="495" y="350" text-anchor="middle" font-size="8" class="text-secondary">Kafka Stream</text>
  
  <rect x="590" y="310" width="150" height="50" rx="3" class="box-base" stroke-width="1"/>
  <text x="665" y="330" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Analysis Engine</text>
  <text x="665" y="350" text-anchor="middle" font-size="8" class="text-secondary">Statistical Tests</text>
  
  <rect x="760" y="310" width="150" height="50" rx="3" class="box-base" stroke-width="1"/>
  <text x="835" y="330" text-anchor="middle" font-size="10" font-weight="bold" class="text-primary">Results Cache</text>
  <text x="835" y="350" text-anchor="middle" font-size="8" class="text-secondary">Redis</text>
  
  <!-- Data Layer -->
  <rect x="30" y="390" width="840" height="80" rx="5" class="highlight-purple" stroke-width="2"/>
  <text x="450" y="415" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Data Layer</text>
  
  <rect x="100" y="430" width="120" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="160" y="450" text-anchor="middle" font-size="9" class="text-primary">ClickHouse</text>
  
  <rect x="240" y="430" width="120" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="300" y="450" text-anchor="middle" font-size="9" class="text-primary">BigQuery</text>
  
  <rect x="380" y="430" width="120" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="440" y="450" text-anchor="middle" font-size="9" class="text-primary">Data Warehouse</text>
  
  <rect x="520" y="430" width="120" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="580" y="450" text-anchor="middle" font-size="9" class="text-primary">Metrics DB</text>
  
  <rect x="660" y="430" width="120" height="30" rx="2" class="box-base" stroke-width="1"/>
  <text x="720" y="450" text-anchor="middle" font-size="9" class="text-primary">Event Store</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>