<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Three Pillars of Observability</text>
  
  <!-- Logs -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#4a90d9">Logs</text>
    
    <rect x="20" y="50" width="220" height="110" rx="4" fill="#1a1a2e"/>
    <text x="30" y="70" font-family="monospace" font-size="10" fill="#67b26f">{"{"}</text>
    <text x="45" y="85" font-family="monospace" font-size="10" fill="#e0e0e0">"level": "ERROR",</text>
    <text x="45" y="100" font-family="monospace" font-size="10" fill="#e0e0e0">"message": "Request failed",</text>
    <text x="45" y="115" font-family="monospace" font-size="10" fill="#e0e0e0">"trace_id": "abc123",</text>
    <text x="45" y="130" font-family="monospace" font-size="10" fill="#e0e0e0">"timestamp": "2026-03-19T..."</text>
    <text x="30" y="150" font-family="monospace" font-size="10" fill="#67b26f">{"}"}</text>
    
    <text x="130" y="180" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Timestamped event records</text>
  </g>
  
  <!-- Metrics -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Metrics</text>
    
    <!-- Graph -->
    <rect x="20" y="50" width="220" height="110" rx="4" fill="#1a1a2e"/>
    <line x1="30" y1="140" x2="230" y2="140" stroke="#666" stroke-width="1"/>
    <line x1="30" y1="50" x2="30" y2="140" stroke="#666" stroke-width="1"/>
    
    <polyline points="30,120 50,110 70,100 90,110 110,90 130,80 150,85 170,70 190,75 210,60 230,65" 
              fill="none" stroke="#67b26f" stroke-width="2"/>
    
    <text x="130" y="180" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Numerical measurements over time</text>
    <text x="130" y="195" text-anchor="middle" font-family="system-ui" font-size="9" fill="#67b26f">RED: Rate, Errors, Duration</text>
  </g>
  
  <!-- Traces -->
  <g transform="translate(590, 80)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#2a2a4a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#f0ad4e">Traces</text>
    
    <rect x="20" y="50" width="220" height="110" rx="4" fill="#1a1a2e"/>
    
    <!-- Span 1 -->
    <rect x="30" y="60" width="180" height="20" rx="3" fill="#4a90d9" opacity="0.7"/>
    <text x="40" y="74" font-family="system-ui" font-size="9" fill="white">API Gateway (50ms)</text>
    
    <!-- Span 2 -->
    <rect x="50" y="85" width="140" height="20" rx="3" fill="#67b26f" opacity="0.7"/>
    <text x="60" y="99" font-family="system-ui" font-size="9" fill="white">Auth Service (30ms)</text>
    
    <!-- Span 3 -->
    <rect x="70" y="110" width="100" height="20" rx="3" fill="#f0ad4e" opacity="0.7"/>
    <text x="80" y="124" font-family="system-ui" font-size="9" fill="white">DB Query (20ms)</text>
    
    <text x="130" y="180" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e0e0e0">Request flow across services</text>
  </g>
  
  <!-- Correlation -->
  <g transform="translate(200, 290)">
    <rect x="0" y="0" width="500" height="160" rx="8" fill="#1a2a1a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="250" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Correlation: Linking All Three</text>
    
    <text x="30" y="65" font-family="system-ui" font-size="11" fill="#e0e0e0">Trace ID: abc123</text>
    
    <!-- Log entry -->
    <rect x="30" y="75" width="440" height="25" rx="3" fill="#2a2a4a"/>
    <text x="40" y="92" font-family="monospace" font-size="9" fill="#e0e0e0">Log: "Request failed" trace_id=abc123 span_id=span1</text>
    
    <!-- Metric -->
    <rect x="30" y="105" width="440" height="25" rx="3" fill="#2a2a4a"/>
    <text x="40" y="122" font-family="monospace" font-size="9" fill="#e0e0e0">Metric: request_duration{trace_id="abc123"} = 50ms</text>
    
    <!-- Trace -->
    <rect x="30" y="135" width="440" height="25" rx="3" fill="#2a2a4a"/>
    <text x="40" y="152" font-family="monospace" font-size="9" fill="#e0e0e0">Trace: abc123 → span1 → span2 → span3</text>
  </g>
</svg>
