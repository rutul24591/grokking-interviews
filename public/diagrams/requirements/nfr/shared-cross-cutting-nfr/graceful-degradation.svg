<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui" font-size="20" font-weight="bold" fill="#e0e0e0">Graceful Degradation Patterns</text>
  
  <!-- Degradation Levels -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="800" height="180" rx="8" fill="#2a2a4a" stroke="#67b26f" stroke-width="2" filter="url(#shadow)"/>
    <text x="400" y="35" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#67b26f">Degradation Levels</text>
    
    <!-- Full Functionality -->
    <rect x="30" y="60" width="170" height="100" rx="4" fill="#67b26f" opacity="0.4"/>
    <text x="115" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#67b26f">Level 1: Full</text>
    <text x="115" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">All features enabled</text>
    <text x="115" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Real-time data</text>
    <text x="115" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Personalized content</text>
    
    <!-- Degraded -->
    <rect x="215" y="60" width="170" height="100" rx="4" fill="#f0ad4e" opacity="0.4"/>
    <text x="300" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#f0ad4e">Level 2: Degraded</text>
    <text x="300" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Core features only</text>
    <text x="300" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Cached/stale data</text>
    <text x="300" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Default content</text>
    
    <!-- Minimal -->
    <rect x="400" y="60" width="170" height="100" rx="4" fill="#d9534f" opacity="0.4"/>
    <text x="485" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#d9534f">Level 3: Minimal</text>
    <text x="485" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Read-only mode</text>
    <text x="485" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Static fallback</text>
    <text x="485" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Queue writes</text>
    
    <!-- Offline -->
    <rect x="585" y="60" width="170" height="100" rx="4" fill="#6f42c1" opacity="0.4"/>
    <text x="670" y="95" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="bold" fill="#6f42c1">Level 4: Offline</text>
    <text x="670" y="115" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Local-only mode</text>
    <text x="670" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Queue all actions</text>
    <text x="670" y="145" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Sync when recovered</text>
    
    <!-- Arrows -->
    <line x1="200" y1="110" x2="210" y2="110" stroke="#666" stroke-width="2"/>
    <polygon points="210,110 200,105 200,115" fill="#666"/>
    
    <line x1="385" y1="110" x2="395" y2="110" stroke="#666" stroke-width="2"/>
    <polygon points="395,110 385,105 385,115" fill="#666"/>
    
    <line x1="570" y1="110" x2="580" y2="110" stroke="#666" stroke-width="2"/>
    <polygon points="580,110 570,105 570,115" fill="#666"/>
  </g>
  
  <!-- Fallback Strategies -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="160" rx="8" fill="#1a2a1a" stroke="#f0ad4e" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#f0ad4e">Fallback Strategies</text>
    
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="160" height="30" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="80" y="20" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Cache Fallback</text>
      <text x="80" y="28" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Serve stale data</text>
      
      <rect x="180" y="0" width="160" height="30" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="260" y="20" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Default Values</text>
      <text x="260" y="28" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Return safe defaults</text>
      
      <rect x="0" y="40" width="160" height="30" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="80" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Queue for Later</text>
      <text x="80" y="68" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Async processing</text>
      
      <rect x="180" y="40" width="160" height="30" rx="3" fill="#d9534f" opacity="0.4"/>
      <text x="260" y="60" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Disable Feature</text>
      <text x="260" y="68" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Hide non-critical</text>
      
      <rect x="0" y="80" width="340" height="30" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="170" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#e0e0e0">Static Fallback Page</text>
      <text x="170" y="108" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Last resort for complete failures</text>
    </g>
  </g>
  
  <!-- Bulkhead Pattern -->
  <g transform="translate(470, 290)">
    <rect x="0" y="0" width="380" height="160" rx="8" fill="#2a2a4a" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="35" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#4a90d9">Bulkhead Pattern</text>
    
    <g transform="translate(20, 55)">
      <text x="0" y="0" font-family="system-ui" font-size="9" fill="#e0e0e0">Isolate resources to prevent cascade:</text>
      
      <rect x="0" y="15" width="100" height="35" rx="3" fill="#4a90d9" opacity="0.4"/>
      <text x="50" y="30" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Thread Pool A</text>
      <text x="50" y="43" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Critical feature</text>
      
      <rect x="120" y="15" width="100" height="35" rx="3" fill="#67b26f" opacity="0.4"/>
      <text x="170" y="30" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Thread Pool B</text>
      <text x="170" y="43" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Non-critical</text>
      
      <rect x="240" y="15" width="100" height="35" rx="3" fill="#f0ad4e" opacity="0.4"/>
      <text x="290" y="30" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Thread Pool C</text>
      <text x="290" y="43" text-anchor="middle" font-family="system-ui" font-size="7" fill="#999">Experimental</text>
      
      <text x="170" y="70" text-anchor="middle" font-family="system-ui" font-size="8" fill="#999">Failure in Pool C doesn't affect Pool A</text>
      
      <rect x="0" y="80" width="340" height="30" rx="3" fill="#6f42c1" opacity="0.4"/>
      <text x="170" y="100" text-anchor="middle" font-family="system-ui" font-size="8" fill="#e0e0e0">Also apply to: Rate limits, Connection pools, Memory</text>
    </g>
  </g>
</svg>
