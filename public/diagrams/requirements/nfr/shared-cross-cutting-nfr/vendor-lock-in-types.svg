<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <style>
      .bg-base { fill: #ffffff; }
      .text-primary { fill: #1a202c; }
      .text-secondary { fill: #4a5568; }
      .box-base { fill: #f7fafc; stroke: #cbd5e0; }
      .accent-box { fill: #ebf8ff; stroke: #4299e1; }
      .highlight-box { fill: #fef5e7; stroke: #ed8936; }
      .arrow { stroke: #4a5568; }
      .highlight-green { fill: #48bb78; }
      .highlight-purple { fill: #9f7aea; }
      .highlight-red { fill: #f56565; }
      .highlight-blue { fill: #4299e1; }
      @media (prefers-color-scheme: dark) {
        .bg-base { fill: #1a1a2e; }
        .text-primary { fill: #f7fafc; }
        .text-secondary { fill: #a0aec0; }
        .box-base { fill: #2d3748; stroke: #4a5568; }
        .accent-box { fill: #2c5282; stroke: #63b3ed; }
        .highlight-box { fill: #744210; stroke: #d69e2e; }
        .arrow { stroke: #a0aec0; }
      }
    </style>
  </defs>
  <rect width="900" height="500" class="bg-base"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" class="text-primary">Vendor Lock-in Types & Mitigation</text>
  
  <!-- Lock-in Types -->
  <rect x="30" y="70" width="270" height="180" rx="5" class="box-base" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Technical Lock-in</text>
  <rect x="50" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="65" y="130" font-size="9" class="text-primary">• Proprietary APIs</text>
  <text x="65" y="145" font-size="9" class="text-primary">• Custom data formats</text>
  <text x="65" y="160" font-size="9" class="text-primary">• Platform-specific code</text>
  <text x="65" y="175" font-size="9" class="text-primary">• Vendor SDKs</text>
  <text x="65" y="190" font-size="9" class="text-primary">• Hard to migrate</text>
  <text x="65" y="205" font-size="9" class="highlight-red">⚠ High switching cost</text>
  <text x="65" y="220" font-size="9" class="highlight-green">✓ Use abstractions</text>
  <text x="65" y="235" font-size="9" class="highlight-green">✓ Standard formats</text>
  
  <rect x="315" y="70" width="270" height="180" rx="5" class="accent-box" stroke-width="2.5"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Data Lock-in</text>
  <rect x="335" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="350" y="130" font-size="9" class="text-primary">• Data egress fees</text>
  <text x="350" y="145" font-size="9" class="text-primary">• Proprietary formats</text>
  <text x="350" y="160" font-size="9" class="text-primary">• Export limitations</text>
  <text x="350" y="175" font-size="9" class="text-primary">• API rate limits</text>
  <text x="350" y="190" font-size="9" class="text-primary">• Data gravity</text>
  <text x="350" y="205" font-size="9" class="highlight-red">⚠ Expensive to leave</text>
  <text x="350" y="220" font-size="9" class="highlight-green">✓ Regular exports</text>
  <text x="350" y="235" font-size="9" class="highlight-green">✓ Standard formats</text>
  
  <rect x="600" y="70" width="270" height="180" rx="5" class="highlight-box" stroke-width="2.5"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Contractual Lock-in</text>
  <rect x="620" y="110" width="230" height="125" rx="3" class="box-base" stroke-width="1"/>
  <text x="635" y="130" font-size="9" class="text-primary">• Long-term contracts</text>
  <text x="635" y="145" font-size="9" class="text-primary">• Early termination fees</text>
  <text x="635" y="160" font-size="9" class="text-primary">• Volume commitments</text>
  <text x="635" y="175" font-size="9" class="text-primary">• Auto-renewal clauses</text>
  <text x="635" y="190" font-size="9" class="text-primary">• Pricing tiers</text>
  <text x="635" y="205" font-size="9" class="highlight-red">⚠ Legal barriers</text>
  <text x="635" y="220" font-size="9" class="highlight-green">✓ Short contracts</text>
  <text x="635" y="235" font-size="9" class="highlight-green">✓ Exit clauses</text>
  
  <!-- Mitigation Strategies -->
  <rect x="30" y="270" width="840" height="200" rx="5" class="box-base" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" class="text-primary">Lock-in Mitigation Strategies</text>
  
  <rect x="50" y="310" width="190" height="145" rx="3" class="box-base" stroke-width="1"/>
  <text x="145" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Abstraction Layer</text>
  <rect x="70" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="145" y="365" text-anchor="middle" font-size="9" class="text-primary">• Multi-cloud libs</text>
  <text x="145" y="380" text-anchor="middle" font-size="9" class="text-primary">• Adapter pattern</text>
  <text x="145" y="395" text-anchor="middle" font-size="9" class="text-primary">• Interface design</text>
  <text x="145" y="410" text-anchor="middle" font-size="9" class="text-primary">• Swap providers</text>
  <text x="145" y="425" text-anchor="middle" font-size="9" class="text-primary">• Portability</text>
  <text x="145" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ High flexibility</text>
  
  <rect x="255" y="310" width="190" height="145" rx="3" class="accent-box" stroke-width="1"/>
  <text x="350" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Multi-Cloud</text>
  <rect x="275" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="350" y="365" text-anchor="middle" font-size="9" class="text-primary">• Active-active</text>
  <text x="350" y="380" text-anchor="middle" font-size="9" class="text-primary">• Failover ready</text>
  <text x="350" y="395" text-anchor="middle" font-size="9" class="text-primary">• Negotiating power</text>
  <text x="350" y="410" text-anchor="middle" font-size="9" class="text-primary">• Risk distribution</text>
  <text x="350" y="425" text-anchor="middle" font-size="9" class="text-primary">• Higher cost</text>
  <text x="350" y="440" text-anchor="middle" font-size="9" class="highlight-purple">⚠ Complexity</text>
  
  <rect x="460" y="310" width="190" height="145" rx="3" class="highlight-box" stroke-width="1"/>
  <text x="555" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Open Standards</text>
  <rect x="480" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="555" y="365" text-anchor="middle" font-size="9" class="text-primary">• SQL over NoSQL</text>
  <text x="555" y="380" text-anchor="middle" font-size="9" class="text-primary">• REST/GraphQL</text>
  <text x="555" y="395" text-anchor="middle" font-size="9" class="text-primary">• Open formats</text>
  <text x="555" y="410" text-anchor="middle" font-size="9" class="text-primary">• Kubernetes</text>
  <text x="555" y="425" text-anchor="middle" font-size="9" class="text-primary">• Industry std</text>
  <text x="555" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Portability</text>
  
  <rect x="665" y="310" width="190" height="145" rx="3" class="highlight-purple" stroke-width="1"/>
  <text x="760" y="330" text-anchor="middle" font-size="12" font-weight="bold" class="text-primary">Exit Planning</text>
  <rect x="685" y="345" width="150" height="95" rx="2" class="box-base" stroke-width="1"/>
  <text x="760" y="365" text-anchor="middle" font-size="9" class="text-primary">• Regular exports</text>
  <text x="760" y="380" text-anchor="middle" font-size="9" class="text-primary">• Test migration</text>
  <text x="760" y="395" text-anchor="middle" font-size="9" class="text-primary">• Document process</text>
  <text x="760" y="410" text-anchor="middle" font-size="9" class="text-primary">• Budget for exit</text>
  <text x="760" y="425" text-anchor="middle" font-size="9" class="text-primary">• Know costs</text>
  <text x="760" y="440" text-anchor="middle" font-size="9" class="highlight-green">✓ Prepared</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow"/>
    </marker>
  </defs>
</svg>