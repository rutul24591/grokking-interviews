<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">LocalStorage Architecture — Synchronous Blocking &amp; Origin Isolation</text>

  <!-- Browser Tab -->
  <rect x="40" y="65" width="160" height="60" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2"/>
  <text x="120" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Browser Tab</text>
  <text x="120" y="110" text-anchor="middle" font-size="11" fill="#6d5bd0">User Interaction</text>

  <!-- Arrow: Tab → Main Thread -->
  <line x1="200" y1="95" x2="260" y2="95" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- JavaScript Main Thread -->
  <rect x="260" y="65" width="200" height="60" rx="8" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="360" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">JavaScript Main Thread</text>
  <text x="360" y="110" text-anchor="middle" font-size="11" fill="#edeaf5">Single-threaded execution</text>

  <!-- Arrow: Main Thread → localStorage API -->
  <line x1="460" y1="95" x2="520" y2="95" stroke="#d97843" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="490" y="85" text-anchor="middle" font-size="10" fill="#d97843" font-weight="bold">BLOCKS</text>

  <!-- localStorage API -->
  <rect x="520" y="65" width="180" height="60" rx="8" fill="#d97843" stroke="#d97843" stroke-width="2"/>
  <text x="610" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">localStorage API</text>
  <text x="610" y="106" text-anchor="middle" font-size="11" fill="#fff8f0">Synchronous I/O</text>

  <!-- Blocking Warning -->
  <rect x="260" y="145" width="440" height="36" rx="6" fill="#fff3e8" stroke="#d97843" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="480" y="168" text-anchor="middle" font-size="12" fill="#d97843" font-weight="bold">⚠ Main thread blocked during read/write — UI unresponsive, frames dropped</text>

  <!-- Origin A Storage -->
  <rect x="60" y="220" width="370" height="250" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2"/>
  <text x="245" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Origin A: https://app.example.com</text>

  <!-- Disk icon for Origin A -->
  <rect x="90" y="268" width="310" height="180" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="245" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">On-Disk Storage (LevelDB / SQLite)</text>

  <!-- Key-value pairs Origin A -->
  <rect x="110" y="308" width="270" height="28" rx="4" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1"/>
  <text x="120" y="327" font-size="11" fill="#1a1822" font-weight="bold">theme</text>
  <text x="250" y="327" font-size="11" fill="#6d5bd0">"dark"</text>

  <rect x="110" y="344" width="270" height="28" rx="4" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1"/>
  <text x="120" y="363" font-size="11" fill="#1a1822" font-weight="bold">cart</text>
  <text x="250" y="363" font-size="11" fill="#6d5bd0">'{"items":[...]}'</text>

  <rect x="110" y="380" width="270" height="28" rx="4" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1"/>
  <text x="120" y="399" font-size="11" fill="#1a1822" font-weight="bold">flags:v2</text>
  <text x="250" y="399" font-size="11" fill="#6d5bd0">'{"beta":true}'</text>

  <text x="245" y="432" text-anchor="middle" font-size="11" fill="#6d5bd0">Quota: 5 MB (UTF-16)</text>

  <!-- Origin B Storage -->
  <rect x="470" y="220" width="370" height="250" rx="8" fill="#edeaf5" stroke="#2f9d74" stroke-width="2"/>
  <text x="655" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f9d74">Origin B: https://api.example.com</text>

  <!-- Disk icon for Origin B -->
  <rect x="500" y="268" width="310" height="180" rx="6" fill="#ffffff" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="655" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">On-Disk Storage (Separate Partition)</text>

  <!-- Key-value pairs Origin B -->
  <rect x="520" y="308" width="270" height="28" rx="4" fill="#f0faf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="530" y="327" font-size="11" fill="#1a1822" font-weight="bold">session</text>
  <text x="670" y="327" font-size="11" fill="#2f9d74">'{"id":"abc123"}'</text>

  <rect x="520" y="344" width="270" height="28" rx="4" fill="#f0faf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="530" y="363" font-size="11" fill="#1a1822" font-weight="bold">locale</text>
  <text x="670" y="363" font-size="11" fill="#2f9d74">"en-US"</text>

  <text x="655" y="432" text-anchor="middle" font-size="11" fill="#2f9d74">Quota: 5 MB (UTF-16)</text>

  <!-- Isolation barrier -->
  <line x1="450" y1="220" x2="450" y2="470" stroke="#1a1822" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="488" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">Origin Isolation Boundary</text>

  <!-- Arrow: API → Origin A disk -->
  <path d="M 610 125 L 610 150 L 245 150 L 245 220" fill="none" stroke="#d97843" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
  </defs>
</svg>
