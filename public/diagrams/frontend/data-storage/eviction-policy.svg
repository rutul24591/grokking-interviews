<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Browser Storage Eviction Policy</text>

  <!-- Step 1: Storage Pressure -->
  <rect x="30" y="52" width="220" height="60" rx="8" fill="#d97843" opacity="0.15" stroke="#d97843" stroke-width="2"/>
  <text x="140" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97843">1. Storage Pressure</text>
  <text x="140" y="95" text-anchor="middle" font-size="10" fill="#1a1822">Disk space running low</text>

  <!-- Arrow -->
  <line x1="250" y1="82" x2="290" y2="82" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrPurple)"/>

  <!-- Step 2: Sort Origins -->
  <rect x="295" y="52" width="220" height="60" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <text x="405" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">2. Sort Origins by LRU</text>
  <text x="405" y="95" text-anchor="middle" font-size="10" fill="#1a1822">Least recently used first</text>

  <!-- Arrow -->
  <line x1="515" y1="82" x2="555" y2="82" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrPurple)"/>

  <!-- Step 3: Check Persistence -->
  <rect x="560" y="52" width="220" height="60" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <text x="670" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">3. Check Bucket Type</text>
  <text x="670" y="95" text-anchor="middle" font-size="10" fill="#1a1822">Persistent or Best-effort?</text>

  <!-- Decision diamond area -->
  <!-- Persistent path (left) -->
  <line x1="620" y1="112" x2="620" y2="155" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="510" y="160" width="220" height="50" rx="8" fill="#2f9d74" opacity="0.15" stroke="#2f9d74" stroke-width="2"/>
  <text x="620" y="181" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f9d74">PERSISTENT</text>
  <text x="620" y="199" text-anchor="middle" font-size="10" fill="#2f9d74">navigator.storage.persist() = true</text>

  <!-- Skip arrow -->
  <line x1="620" y1="210" x2="620" y2="248" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="530" y="252" width="180" height="38" rx="8" fill="#2f9d74" opacity="0.2" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="620" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f9d74">SKIPPED (Safe)</text>

  <!-- Best-effort path (right) -->
  <line x1="720" y1="112" x2="800" y2="155" stroke="#d97843" stroke-width="2" marker-end="url(#arrOrange)"/>
  <rect x="740" y="160" width="140" height="50" rx="8" fill="#d97843" opacity="0.15" stroke="#d97843" stroke-width="2"/>
  <text x="810" y="181" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97843">BEST-EFFORT</text>
  <text x="810" y="199" text-anchor="middle" font-size="10" fill="#d97843">Default bucket type</text>

  <!-- Eviction arrow -->
  <line x1="810" y1="210" x2="810" y2="248" stroke="#d97843" stroke-width="2" marker-end="url(#arrOrange)"/>
  <rect x="730" y="252" width="160" height="38" rx="8" fill="#d97843" opacity="0.2" stroke="#d97843" stroke-width="1.5"/>
  <text x="810" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97843">EVICTED</text>

  <!-- All-or-nothing eviction detail -->
  <rect x="30" y="310" width="840" height="175" rx="8" fill="white" stroke="#d97843" stroke-width="2"/>
  <rect x="35" y="315" width="300" height="24" rx="4" fill="#d97843"/>
  <text x="185" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="white">All-or-Nothing Per-Origin Eviction</text>

  <text x="450" y="360" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="600">When an origin is evicted, ALL its storage is deleted together:</text>

  <!-- Evicted storage types -->
  <rect x="55" y="378" width="160" height="45" rx="6" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="135" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">IndexedDB</text>
  <text x="135" y="414" text-anchor="middle" font-size="9" fill="#1a1822">All databases gone</text>

  <rect x="235" y="378" width="160" height="45" rx="6" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="315" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Cache API</text>
  <text x="315" y="414" text-anchor="middle" font-size="9" fill="#1a1822">All caches gone</text>

  <rect x="415" y="378" width="160" height="45" rx="6" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="495" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">OPFS</text>
  <text x="495" y="414" text-anchor="middle" font-size="9" fill="#1a1822">All files gone</text>

  <rect x="595" y="378" width="160" height="45" rx="6" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="675" y="398" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Service Worker</text>
  <text x="675" y="414" text-anchor="middle" font-size="9" fill="#1a1822">Registration removed</text>

  <!-- Red X marks -->
  <text x="135" y="440" text-anchor="middle" font-size="16" fill="#d97843" font-weight="bold">X</text>
  <text x="315" y="440" text-anchor="middle" font-size="16" fill="#d97843" font-weight="bold">X</text>
  <text x="495" y="440" text-anchor="middle" font-size="16" fill="#d97843" font-weight="bold">X</text>
  <text x="675" y="440" text-anchor="middle" font-size="16" fill="#d97843" font-weight="bold">X</text>

  <text x="450" y="470" text-anchor="middle" font-size="10" fill="#d97843" font-weight="600">Browser never partially evicts an origin - it is all or nothing</text>

  <!-- Note on localStorage -->
  <rect x="30" y="310" width="460" height="0" rx="0" fill="none"/>
  <text x="450" y="480" text-anchor="middle" font-size="9" fill="#6d5bd0">Note: localStorage is NOT evicted by this policy (separate storage, but Safari may clear in some cases)</text>

  <!-- Legend area at left -->
  <rect x="30" y="145" width="460" height="155" rx="8" fill="white" stroke="#e0dce8" stroke-width="1"/>
  <text x="260" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Origin Eviction Order (LRU)</text>

  <!-- Origin boxes showing LRU order -->
  <rect x="50" y="185" width="120" height="40" rx="6" fill="#d97843" opacity="0.2" stroke="#d97843" stroke-width="1.5"/>
  <text x="110" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="#d97843">origin-a.com</text>
  <text x="110" y="218" text-anchor="middle" font-size="8" fill="#d97843">Last used: 30d ago</text>

  <rect x="180" y="185" width="120" height="40" rx="6" fill="#d97843" opacity="0.15" stroke="#d97843" stroke-width="1"/>
  <text x="240" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="#d97843">origin-b.com</text>
  <text x="240" y="218" text-anchor="middle" font-size="8" fill="#d97843">Last used: 14d ago</text>

  <rect x="310" y="185" width="120" height="40" rx="6" fill="#2f9d74" opacity="0.15" stroke="#2f9d74" stroke-width="1"/>
  <text x="370" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="#2f9d74">origin-c.com</text>
  <text x="370" y="218" text-anchor="middle" font-size="8" fill="#2f9d74">Last used: 7d ago</text>

  <!-- Arrow showing eviction direction -->
  <text x="110" y="240" text-anchor="middle" font-size="9" fill="#d97843" font-weight="bold">Evict first</text>
  <line x1="50" y1="250" x2="430" y2="250" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="370" y="265" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">Evict last</text>
  <line x1="430" y1="250" x2="440" y2="246" stroke="#6d5bd0" stroke-width="1"/>
  <line x1="430" y1="250" x2="440" y2="254" stroke="#6d5bd0" stroke-width="1"/>

  <text x="260" y="290" text-anchor="middle" font-size="9" fill="#1a1822">Origins with persistent storage granted are removed from this queue entirely</text>

  <defs>
    <marker id="arrPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/></marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2f9d74"/></marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#d97843"/></marker>
  </defs>
</svg>