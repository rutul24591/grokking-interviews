<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Derived State Dependency Graph</text>

  <defs>
    <marker id="dep" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Base State Nodes (top row) -->
  <rect x="60" y="80" width="160" height="50" rx="8" fill="#6d5bd0"/>
  <text x="140" y="100" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">items[]</text>
  <text x="140" y="118" text-anchor="middle" font-size="10" fill="#d7d1e6">Base State</text>

  <rect x="280" y="80" width="160" height="50" rx="8" fill="#6d5bd0"/>
  <text x="360" y="100" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">filter</text>
  <text x="360" y="118" text-anchor="middle" font-size="10" fill="#d7d1e6">Base State</text>

  <rect x="500" y="80" width="160" height="50" rx="8" fill="#6d5bd0"/>
  <text x="580" y="100" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">sortOrder</text>
  <text x="580" y="118" text-anchor="middle" font-size="10" fill="#d7d1e6">Base State</text>

  <rect x="720" y="80" width="140" height="50" rx="8" fill="#6d5bd0"/>
  <text x="790" y="100" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">searchQuery</text>
  <text x="790" y="118" text-anchor="middle" font-size="10" fill="#d7d1e6">Base State</text>

  <!-- Derived Level 1 -->
  <rect x="120" y="210" width="200" height="50" rx="8" fill="#2f9d74"/>
  <text x="220" y="230" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">filteredItems</text>
  <text x="220" y="248" text-anchor="middle" font-size="10" fill="#d1f0e3">Derived (items + filter)</text>

  <line x1="140" y1="130" x2="200" y2="210" stroke="#6d5bd0" stroke-width="2" marker-end="url(#dep)"/>
  <line x1="360" y1="130" x2="240" y2="210" stroke="#6d5bd0" stroke-width="2" marker-end="url(#dep)"/>

  <rect x="540" y="210" width="220" height="50" rx="8" fill="#2f9d74"/>
  <text x="650" y="230" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">searchResults</text>
  <text x="650" y="248" text-anchor="middle" font-size="10" fill="#d1f0e3">Derived (items + searchQuery)</text>

  <line x1="140" y1="130" x2="620" y2="210" stroke="#6d5bd0" stroke-width="2" marker-end="url(#dep)" stroke-dasharray="6,3"/>
  <line x1="790" y1="130" x2="680" y2="210" stroke="#6d5bd0" stroke-width="2" marker-end="url(#dep)"/>

  <!-- Derived Level 2 -->
  <rect x="200" y="330" width="240" height="50" rx="8" fill="#d97843"/>
  <text x="320" y="350" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">sortedFilteredItems</text>
  <text x="320" y="368" text-anchor="middle" font-size="10" fill="#fde8d0">Derived (filteredItems + sortOrder)</text>

  <line x1="220" y1="260" x2="300" y2="330" stroke="#2f9d74" stroke-width="2" marker-end="url(#dep)"/>
  <line x1="580" y1="130" x2="340" y2="330" stroke="#6d5bd0" stroke-width="2" marker-end="url(#dep)"/>

  <!-- Derived Level 3 -->
  <rect x="200" y="430" width="150" height="45" rx="8" fill="#d97843" opacity="0.8"/>
  <text x="275" y="450" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">itemCount</text>
  <text x="275" y="465" text-anchor="middle" font-size="10" fill="#fde8d0">.length</text>

  <line x1="300" y1="380" x2="275" y2="430" stroke="#d97843" stroke-width="2" marker-end="url(#dep)"/>

  <rect x="400" y="430" width="150" height="45" rx="8" fill="#d97843" opacity="0.8"/>
  <text x="475" y="450" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">avgPrice</text>
  <text x="475" y="465" text-anchor="middle" font-size="10" fill="#fde8d0">reduce / length</text>

  <line x1="320" y1="380" x2="475" y2="430" stroke="#d97843" stroke-width="2" marker-end="url(#dep)"/>

  <!-- Legend -->
  <rect x="620" y="380" width="250" height="100" rx="8" fill="#fff" stroke="#d7d1e6"/>
  <text x="745" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">Legend</text>
  <rect x="635" y="412" width="40" height="16" rx="4" fill="#6d5bd0"/>
  <text x="685" y="424" font-size="11" fill="#1a1822">Base State (source of truth)</text>
  <rect x="635" y="436" width="40" height="16" rx="4" fill="#2f9d74"/>
  <text x="685" y="448" font-size="11" fill="#1a1822">Level 1 Derived</text>
  <rect x="635" y="460" width="40" height="16" rx="4" fill="#d97843"/>
  <text x="685" y="472" font-size="11" fill="#1a1822">Level 2+ Derived</text>
</svg>
