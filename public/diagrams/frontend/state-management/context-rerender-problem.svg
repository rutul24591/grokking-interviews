<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Context API Re-render Problem vs Zustand Subscriptions</text>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="480" stroke="#1a1822" stroke-width="1" stroke-dasharray="6,4" opacity="0.25"/>

  <!-- LEFT: Context API -->
  <text x="225" y="65" text-anchor="middle" font-size="15" font-weight="700" fill="#d97843">Context API</text>
  <text x="225" y="82" text-anchor="middle" font-size="11" fill="#d97843">All consumers re-render on ANY change</text>

  <!-- Provider -->
  <rect x="100" y="100" width="250" height="50" rx="8" fill="#d97843"/>
  <text x="225" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">ThemeContext.Provider</text>
  <text x="225" y="138" text-anchor="middle" font-size="10" fill="#fff">value={{ theme, user, cart }}</text>

  <!-- Change indicator -->
  <rect x="280" y="160" width="75" height="22" rx="4" fill="#d97843" opacity="0.7"/>
  <text x="317" y="175" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">theme changes</text>
  <line x1="317" y1="150" x2="317" y2="160" stroke="#d97843" stroke-width="1.5"/>

  <!-- Consumer components - ALL re-render -->
  <rect x="45" y="205" width="115" height="55" rx="6" fill="#fff" stroke="#d97843" stroke-width="2.5"/>
  <text x="102" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#d97843">ThemeToggle</text>
  <text x="102" y="240" text-anchor="middle" font-size="9" fill="#1a1822">Uses: theme</text>
  <rect x="68" y="248" width="68" height="10" rx="3" fill="#d97843" opacity="0.3"/>
  <text x="102" y="256" text-anchor="middle" font-size="7" fill="#d97843" font-weight="600">RE-RENDERS</text>

  <rect x="170" y="205" width="115" height="55" rx="6" fill="#fff" stroke="#d97843" stroke-width="2.5"/>
  <text x="227" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#d97843">UserMenu</text>
  <text x="227" y="240" text-anchor="middle" font-size="9" fill="#1a1822">Uses: user only</text>
  <rect x="193" y="248" width="68" height="10" rx="3" fill="#d97843" opacity="0.3"/>
  <text x="227" y="256" text-anchor="middle" font-size="7" fill="#d97843" font-weight="600">RE-RENDERS</text>

  <rect x="295" y="205" width="115" height="55" rx="6" fill="#fff" stroke="#d97843" stroke-width="2.5"/>
  <text x="352" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#d97843">CartBadge</text>
  <text x="352" y="240" text-anchor="middle" font-size="9" fill="#1a1822">Uses: cart only</text>
  <rect x="318" y="248" width="68" height="10" rx="3" fill="#d97843" opacity="0.3"/>
  <text x="352" y="256" text-anchor="middle" font-size="7" fill="#d97843" font-weight="600">RE-RENDERS</text>

  <!-- Arrows from provider to consumers -->
  <line x1="175" y1="150" x2="102" y2="205" stroke="#d97843" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="225" y1="150" x2="227" y2="205" stroke="#d97843" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="275" y1="150" x2="352" y2="205" stroke="#d97843" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Warning callout -->
  <rect x="70" y="280" width="310" height="55" rx="6" fill="#fff" stroke="#d97843" stroke-width="1.5"/>
  <text x="225" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#d97843">Problem: Wasted renders</text>
  <text x="225" y="316" text-anchor="middle" font-size="10" fill="#1a1822">UserMenu and CartBadge re-render even</text>
  <text x="225" y="330" text-anchor="middle" font-size="10" fill="#1a1822">though only theme changed. O(n) consumers.</text>

  <!-- RIGHT: Zustand -->
  <text x="675" y="65" text-anchor="middle" font-size="15" font-weight="700" fill="#2f9d74">Zustand</text>
  <text x="675" y="82" text-anchor="middle" font-size="11" fill="#2f9d74">Only subscribed selectors trigger re-render</text>

  <!-- Store -->
  <rect x="550" y="100" width="250" height="50" rx="8" fill="#2f9d74"/>
  <text x="675" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">useStore(selector)</text>
  <text x="675" y="138" text-anchor="middle" font-size="10" fill="#e0f5ec">{ theme, user, cart }</text>

  <!-- Change indicator -->
  <rect x="730" y="160" width="75" height="22" rx="4" fill="#2f9d74" opacity="0.7"/>
  <text x="767" y="175" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">theme changes</text>
  <line x1="767" y1="150" x2="767" y2="160" stroke="#2f9d74" stroke-width="1.5"/>

  <!-- Consumer components - only ThemeToggle re-renders -->
  <rect x="495" y="205" width="115" height="55" rx="6" fill="#fff" stroke="#2f9d74" stroke-width="2.5"/>
  <text x="552" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#2f9d74">ThemeToggle</text>
  <text x="552" y="240" text-anchor="middle" font-size="9" fill="#1a1822">s ={">"} s.theme</text>
  <rect x="518" y="248" width="68" height="10" rx="3" fill="#2f9d74" opacity="0.3"/>
  <text x="552" y="256" text-anchor="middle" font-size="7" fill="#2f9d74" font-weight="600">RE-RENDERS</text>

  <rect x="620" y="205" width="115" height="55" rx="6" fill="#fff" stroke="#ccc" stroke-width="1.5" opacity="0.6"/>
  <text x="677" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#999">UserMenu</text>
  <text x="677" y="240" text-anchor="middle" font-size="9" fill="#999">s ={">"} s.user</text>
  <text x="677" y="256" text-anchor="middle" font-size="7" fill="#999">SKIPPED</text>

  <rect x="745" y="205" width="115" height="55" rx="6" fill="#fff" stroke="#ccc" stroke-width="1.5" opacity="0.6"/>
  <text x="802" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#999">CartBadge</text>
  <text x="802" y="240" text-anchor="middle" font-size="9" fill="#999">s ={">"} s.cart</text>
  <text x="802" y="256" text-anchor="middle" font-size="7" fill="#999">SKIPPED</text>

  <!-- Arrows -->
  <line x1="625" y1="150" x2="552" y2="205" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrow-grn)"/>
  <line x1="675" y1="150" x2="677" y2="205" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="725" y1="150" x2="802" y2="205" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- cross marks on skipped -->
  <text x="677" y="198" text-anchor="middle" font-size="14" fill="#ccc" font-weight="700">x</text>
  <text x="802" y="198" text-anchor="middle" font-size="14" fill="#ccc" font-weight="700">x</text>

  <!-- Success callout -->
  <rect x="520" y="280" width="310" height="55" rx="6" fill="#fff" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="675" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#2f9d74">Solution: Granular subscriptions</text>
  <text x="675" y="316" text-anchor="middle" font-size="10" fill="#1a1822">Selector (s ={">"} s.theme) isolates updates.</text>
  <text x="675" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Only ThemeToggle re-renders. O(1) targeted.</text>

  <!-- Bottom comparison boxes -->
  <rect x="45" y="360" width="380" height="115" rx="8" fill="#fff" stroke="#d97843" stroke-width="1.5"/>
  <text x="235" y="383" text-anchor="middle" font-size="12" font-weight="700" fill="#d97843">Context API Characteristics</text>
  <text x="65" y="403" font-size="10" fill="#1a1822">- Value identity check triggers all consumers</text>
  <text x="65" y="419" font-size="10" fill="#1a1822">- No built-in selector mechanism</text>
  <text x="65" y="435" font-size="10" fill="#1a1822">- Workaround: split into many small contexts</text>
  <text x="65" y="451" font-size="10" fill="#1a1822">- Designed for low-frequency updates (theme, locale)</text>
  <text x="65" y="467" font-size="10" fill="#d97843" font-weight="600">- Performance degrades with consumer count</text>

  <rect x="475" y="360" width="380" height="115" rx="8" fill="#fff" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="665" y="383" text-anchor="middle" font-size="12" font-weight="700" fill="#2f9d74">Zustand / External Store</text>
  <text x="495" y="403" font-size="10" fill="#1a1822">- Selector-based subscriptions (shallow compare)</text>
  <text x="495" y="419" font-size="10" fill="#1a1822">- useSyncExternalStore under the hood</text>
  <text x="495" y="435" font-size="10" fill="#1a1822">- No Provider wrapper needed</text>
  <text x="495" y="451" font-size="10" fill="#1a1822">- Designed for high-frequency state changes</text>
  <text x="495" y="467" font-size="10" fill="#2f9d74" font-weight="600">- Performance scales: O(1) per update</text>

  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d97843"/>
    </marker>
    <marker id="arrow-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f9d74"/>
    </marker>
  </defs>
</svg>