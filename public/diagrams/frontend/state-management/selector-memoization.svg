<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Selector Memoization Flow</text>

  <defs>
    <marker id="m-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="m-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="m-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Input selectors -->
  <rect x="50" y="70" width="170" height="45" rx="8" fill="#6d5bd0"/>
  <text x="135" y="90" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">getItems(state)</text>
  <text x="135" y="106" text-anchor="middle" font-size="10" fill="#d7d1e6">Input Selector A</text>

  <rect x="50" y="140" width="170" height="45" rx="8" fill="#6d5bd0"/>
  <text x="135" y="160" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">getFilter(state)</text>
  <text x="135" y="176" text-anchor="middle" font-size="10" fill="#d7d1e6">Input Selector B</text>

  <!-- Equality check -->
  <line x1="220" y1="92" x2="290" y2="140" stroke="#6d5bd0" stroke-width="2" marker-end="url(#m-arrow)"/>
  <line x1="220" y1="162" x2="290" y2="150" stroke="#6d5bd0" stroke-width="2" marker-end="url(#m-arrow)"/>

  <rect x="290" y="120" width="200" height="55" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2"/>
  <text x="390" y="142" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Inputs Changed?</text>
  <text x="390" y="160" text-anchor="middle" font-size="10" fill="#6d5bd0">Referential equality check</text>

  <!-- YES path (recompute) -->
  <line x1="490" y1="130" x2="560" y2="90" stroke="#d97843" stroke-width="2" marker-end="url(#m-orange)"/>
  <text x="530" y="98" font-size="11" fill="#d97843" font-weight="bold">YES</text>

  <rect x="560" y="65" width="200" height="55" rx="8" fill="#fff3ec" stroke="#d97843" stroke-width="2"/>
  <text x="660" y="87" text-anchor="middle" font-size="12" fill="#d97843" font-weight="bold">Recompute</text>
  <text x="660" y="105" text-anchor="middle" font-size="10" fill="#1a1822">Run output selector function</text>

  <line x1="760" y1="92" x2="810" y2="92" stroke="#d97843" stroke-width="2" marker-end="url(#m-orange)"/>
  <rect x="810" y="72" width="70" height="40" rx="8" fill="#d97843"/>
  <text x="845" y="96" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">New</text>

  <!-- NO path (cached) -->
  <line x1="490" y1="160" x2="560" y2="195" stroke="#2f9d74" stroke-width="2" marker-end="url(#m-green)"/>
  <text x="530" y="188" font-size="11" fill="#2f9d74" font-weight="bold">NO</text>

  <rect x="560" y="175" width="200" height="55" rx="8" fill="#e8f5f0" stroke="#2f9d74" stroke-width="2"/>
  <text x="660" y="197" text-anchor="middle" font-size="12" fill="#2f9d74" font-weight="bold">Return Cached</text>
  <text x="660" y="215" text-anchor="middle" font-size="10" fill="#1a1822">Same reference, O(1)</text>

  <line x1="760" y1="202" x2="810" y2="202" stroke="#2f9d74" stroke-width="2" marker-end="url(#m-green)"/>
  <rect x="810" y="182" width="70" height="40" rx="8" fill="#2f9d74"/>
  <text x="845" y="206" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Cached</text>

  <!-- Example timeline -->
  <rect x="50" y="270" width="800" height="200" rx="8" fill="#fff" stroke="#d7d1e6"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Example: 5 Calls to selectFilteredItems</text>

  <!-- Call 1 -->
  <rect x="80" y="315" width="130" height="55" rx="6" fill="#fff3ec" stroke="#d97843"/>
  <text x="145" y="335" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Call 1</text>
  <text x="145" y="352" text-anchor="middle" font-size="10" fill="#1a1822">items changed</text>
  <text x="145" y="365" text-anchor="middle" font-size="10" fill="#d97843">RECOMPUTE</text>

  <!-- Call 2 -->
  <rect x="230" y="315" width="130" height="55" rx="6" fill="#e8f5f0" stroke="#2f9d74"/>
  <text x="295" y="335" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">Call 2</text>
  <text x="295" y="352" text-anchor="middle" font-size="10" fill="#1a1822">no change</text>
  <text x="295" y="365" text-anchor="middle" font-size="10" fill="#2f9d74">CACHED</text>

  <!-- Call 3 -->
  <rect x="380" y="315" width="130" height="55" rx="6" fill="#e8f5f0" stroke="#2f9d74"/>
  <text x="445" y="335" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">Call 3</text>
  <text x="445" y="352" text-anchor="middle" font-size="10" fill="#1a1822">no change</text>
  <text x="445" y="365" text-anchor="middle" font-size="10" fill="#2f9d74">CACHED</text>

  <!-- Call 4 -->
  <rect x="530" y="315" width="130" height="55" rx="6" fill="#fff3ec" stroke="#d97843"/>
  <text x="595" y="335" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Call 4</text>
  <text x="595" y="352" text-anchor="middle" font-size="10" fill="#1a1822">filter changed</text>
  <text x="595" y="365" text-anchor="middle" font-size="10" fill="#d97843">RECOMPUTE</text>

  <!-- Call 5 -->
  <rect x="680" y="315" width="130" height="55" rx="6" fill="#e8f5f0" stroke="#2f9d74"/>
  <text x="745" y="335" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">Call 5</text>
  <text x="745" y="352" text-anchor="middle" font-size="10" fill="#1a1822">no change</text>
  <text x="745" y="365" text-anchor="middle" font-size="10" fill="#2f9d74">CACHED</text>

  <!-- Summary -->
  <text x="450" y="410" text-anchor="middle" font-size="12" fill="#1a1822">Result: 2 computations, 3 cache hits — </text>
  <text x="450" y="428" text-anchor="middle" font-size="12" fill="#2f9d74" font-weight="bold">60% cache hit rate, same referential identity for consumers</text>

  <rect x="100" y="440" width="300" height="22" rx="4" fill="#e8f5f0"/>
  <text x="250" y="455" text-anchor="middle" font-size="11" fill="#2f9d74">Same reference = React skips re-render</text>

  <rect x="500" y="440" width="300" height="22" rx="4" fill="#fff3ec"/>
  <text x="650" y="455" text-anchor="middle" font-size="11" fill="#d97843">New reference = React re-renders component</text>
</svg>
