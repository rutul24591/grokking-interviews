<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">State Persistence Lifecycle</text>

  <defs>
    <marker id="p-arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="p-grn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="p-org" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- HYDRATION FLOW (top) -->
  <text x="450" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Hydration (Page Load)</text>

  <rect x="40" y="90" width="120" height="45" rx="8" fill="#6d5bd0"/>
  <text x="100" y="110" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Page Load</text>
  <text x="100" y="125" text-anchor="middle" font-size="10" fill="#d7d1e6">App initializes</text>

  <line x1="160" y1="112" x2="195" y2="112" stroke="#6d5bd0" stroke-width="2" marker-end="url(#p-arr)"/>

  <rect x="200" y="90" width="130" height="45" rx="8" fill="#edeaf5" stroke="#6d5bd0"/>
  <text x="265" y="110" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Check Storage</text>
  <text x="265" y="125" text-anchor="middle" font-size="10" fill="#6d5bd0">localStorage.getItem</text>

  <!-- Found path -->
  <line x1="330" y1="100" x2="380" y2="100" stroke="#2f9d74" stroke-width="2" marker-end="url(#p-grn)"/>
  <text x="355" y="92" font-size="10" fill="#2f9d74">Found</text>

  <rect x="385" y="80" width="120" height="45" rx="8" fill="#e8f5f0" stroke="#2f9d74"/>
  <text x="445" y="98" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">Deserialize</text>
  <text x="445" y="115" text-anchor="middle" font-size="10" fill="#1a1822">JSON.parse</text>

  <line x1="505" y1="102" x2="535" y2="102" stroke="#2f9d74" stroke-width="2" marker-end="url(#p-grn)"/>

  <rect x="540" y="80" width="130" height="45" rx="8" fill="#e8f5f0" stroke="#2f9d74"/>
  <text x="605" y="98" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">Check Version</text>
  <text x="605" y="115" text-anchor="middle" font-size="10" fill="#1a1822">Migrate if needed</text>

  <line x1="670" y1="102" x2="705" y2="102" stroke="#2f9d74" stroke-width="2" marker-end="url(#p-grn)"/>

  <rect x="710" y="80" width="150" height="45" rx="8" fill="#2f9d74"/>
  <text x="785" y="100" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Hydrate Store</text>
  <text x="785" y="116" text-anchor="middle" font-size="10" fill="#d1f0e3">Merge into state</text>

  <!-- Not found path -->
  <line x1="265" y1="135" x2="265" y2="155" stroke="#d97843" stroke-width="2" marker-end="url(#p-org)"/>
  <text x="290" y="150" font-size="10" fill="#d97843">Not found</text>

  <rect x="200" y="160" width="130" height="35" rx="8" fill="#fff3ec" stroke="#d97843"/>
  <text x="265" y="182" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Use Defaults</text>

  <!-- PERSISTENCE FLOW (bottom) -->
  <text x="450" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Persistence (Runtime)</text>

  <rect x="40" y="260" width="130" height="45" rx="8" fill="#6d5bd0"/>
  <text x="105" y="280" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">State Changes</text>
  <text x="105" y="295" text-anchor="middle" font-size="10" fill="#d7d1e6">User interaction</text>

  <line x1="170" y1="282" x2="210" y2="282" stroke="#6d5bd0" stroke-width="2" marker-end="url(#p-arr)"/>

  <rect x="215" y="260" width="130" height="45" rx="8" fill="#edeaf5" stroke="#6d5bd0"/>
  <text x="280" y="278" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Subscribe</text>
  <text x="280" y="295" text-anchor="middle" font-size="10" fill="#6d5bd0">store.subscribe()</text>

  <line x1="345" y1="282" x2="385" y2="282" stroke="#6d5bd0" stroke-width="2" marker-end="url(#p-arr)"/>

  <rect x="390" y="260" width="140" height="45" rx="8" fill="#d97843"/>
  <text x="460" y="278" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Debounce</text>
  <text x="460" y="295" text-anchor="middle" font-size="10" fill="#fde8d0">300ms window</text>

  <line x1="530" y1="282" x2="570" y2="282" stroke="#d97843" stroke-width="2" marker-end="url(#p-org)"/>

  <rect x="575" y="260" width="130" height="45" rx="8" fill="#edeaf5" stroke="#6d5bd0"/>
  <text x="640" y="278" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Serialize</text>
  <text x="640" y="295" text-anchor="middle" font-size="10" fill="#6d5bd0">JSON.stringify</text>

  <line x1="705" y1="282" x2="740" y2="282" stroke="#6d5bd0" stroke-width="2" marker-end="url(#p-arr)"/>

  <rect x="745" y="260" width="130" height="45" rx="8" fill="#2f9d74"/>
  <text x="810" y="278" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Write Storage</text>
  <text x="810" y="295" text-anchor="middle" font-size="10" fill="#d1f0e3">localStorage.setItem</text>

  <!-- Circular arrow back -->
  <path d="M 810 305 L 810 350 L 105 350 L 105 305" fill="none" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#p-arr)"/>
  <text x="450" y="345" text-anchor="middle" font-size="10" fill="#6d5bd0">Next state change triggers cycle again</text>

  <!-- Error handling -->
  <rect x="50" y="390" width="380" height="90" rx="8" fill="#fff" stroke="#d97843"/>
  <text x="240" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97843">Error Handling</text>
  <text x="70" y="435" font-size="11" fill="#1a1822">- QuotaExceededError: storage full, evict old data</text>
  <text x="70" y="455" font-size="11" fill="#1a1822">- JSON parse error: corrupted data, use defaults</text>
  <text x="70" y="472" font-size="11" fill="#1a1822">- Version mismatch: run migration functions</text>

  <!-- SSR note -->
  <rect x="470" y="390" width="390" height="90" rx="8" fill="#fff" stroke="#6d5bd0"/>
  <text x="665" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">SSR Considerations</text>
  <text x="490" y="435" font-size="11" fill="#1a1822">- Server has no localStorage → use defaults</text>
  <text x="490" y="455" font-size="11" fill="#1a1822">- Hydration mismatch if server ≠ client state</text>
  <text x="490" y="472" font-size="11" fill="#1a1822">- skipHydration: true + useEffect for client-only</text>
</svg>
