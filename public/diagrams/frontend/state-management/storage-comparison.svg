<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Browser Storage Options Comparison</text>

  <!-- Capacity bars -->
  <text x="50" y="75" font-size="13" font-weight="bold" fill="#1a1822">Storage Capacity</text>

  <!-- Cookies -->
  <text x="50" y="110" font-size="12" fill="#1a1822">Cookies</text>
  <rect x="180" y="96" width="8" height="20" rx="3" fill="#d94343"/>
  <text x="196" y="110" font-size="11" fill="#d94343" font-weight="bold">4 KB</text>

  <!-- sessionStorage -->
  <text x="50" y="145" font-size="12" fill="#1a1822">sessionStorage</text>
  <rect x="180" y="131" width="100" height="20" rx="3" fill="#d97843"/>
  <text x="288" y="145" font-size="11" fill="#d97843" font-weight="bold">5 MB</text>

  <!-- localStorage -->
  <text x="50" y="180" font-size="12" fill="#1a1822">localStorage</text>
  <rect x="180" y="166" width="200" height="20" rx="3" fill="#6d5bd0"/>
  <text x="388" y="180" font-size="11" fill="#6d5bd0" font-weight="bold">5-10 MB</text>

  <!-- Cache API -->
  <text x="50" y="215" font-size="12" fill="#1a1822">Cache API</text>
  <rect x="180" y="201" width="400" height="20" rx="3" fill="#2f9d74"/>
  <text x="588" y="215" font-size="11" fill="#2f9d74" font-weight="bold">~50% of disk</text>

  <!-- IndexedDB -->
  <text x="50" y="250" font-size="12" fill="#1a1822">IndexedDB</text>
  <rect x="180" y="236" width="500" height="20" rx="3" fill="#2f9d74"/>
  <text x="688" y="250" font-size="11" fill="#2f9d74" font-weight="bold">50%+ of disk (GB+)</text>

  <!-- Feature comparison table -->
  <text x="50" y="300" font-size="13" font-weight="bold" fill="#1a1822">Feature Comparison</text>

  <!-- Headers -->
  <rect x="50" y="315" width="120" height="30" rx="0" fill="#6d5bd0"/>
  <text x="110" y="335" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Feature</text>

  <rect x="170" y="315" width="120" height="30" rx="0" fill="#6d5bd0"/>
  <text x="230" y="335" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Cookies</text>

  <rect x="290" y="315" width="120" height="30" rx="0" fill="#6d5bd0"/>
  <text x="350" y="335" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">sessionStorage</text>

  <rect x="410" y="315" width="120" height="30" rx="0" fill="#6d5bd0"/>
  <text x="470" y="335" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">localStorage</text>

  <rect x="530" y="315" width="120" height="30" rx="0" fill="#6d5bd0"/>
  <text x="590" y="335" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">IndexedDB</text>

  <rect x="650" y="315" width="120" height="30" rx="0" fill="#6d5bd0"/>
  <text x="710" y="335" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Cache API</text>

  <!-- Row: API Type -->
  <rect x="50" y="345" width="120" height="28" fill="#edeaf5"/>
  <text x="110" y="364" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">API Type</text>
  <text x="230" y="364" text-anchor="middle" font-size="10" fill="#d97843">Sync</text>
  <text x="350" y="364" text-anchor="middle" font-size="10" fill="#d97843">Sync</text>
  <text x="470" y="364" text-anchor="middle" font-size="10" fill="#d97843">Sync</text>
  <text x="590" y="364" text-anchor="middle" font-size="10" fill="#2f9d74">Async</text>
  <text x="710" y="364" text-anchor="middle" font-size="10" fill="#2f9d74">Async</text>

  <!-- Row: Lifetime -->
  <rect x="50" y="373" width="120" height="28" fill="#fff"/>
  <text x="110" y="392" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">Lifetime</text>
  <text x="230" y="392" text-anchor="middle" font-size="10" fill="#1a1822">Expiry date</text>
  <text x="350" y="392" text-anchor="middle" font-size="10" fill="#1a1822">Tab close</text>
  <text x="470" y="392" text-anchor="middle" font-size="10" fill="#1a1822">Permanent</text>
  <text x="590" y="392" text-anchor="middle" font-size="10" fill="#1a1822">Permanent</text>
  <text x="710" y="392" text-anchor="middle" font-size="10" fill="#1a1822">Permanent</text>

  <!-- Row: Sent to server -->
  <rect x="50" y="401" width="120" height="28" fill="#edeaf5"/>
  <text x="110" y="420" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">Sent to Server</text>
  <text x="230" y="420" text-anchor="middle" font-size="10" fill="#d97843">Every request</text>
  <text x="350" y="420" text-anchor="middle" font-size="10" fill="#2f9d74">No</text>
  <text x="470" y="420" text-anchor="middle" font-size="10" fill="#2f9d74">No</text>
  <text x="590" y="420" text-anchor="middle" font-size="10" fill="#2f9d74">No</text>
  <text x="710" y="420" text-anchor="middle" font-size="10" fill="#2f9d74">No</text>

  <!-- Row: Structured Data -->
  <rect x="50" y="429" width="120" height="28" fill="#fff"/>
  <text x="110" y="448" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">Structured</text>
  <text x="230" y="448" text-anchor="middle" font-size="10" fill="#d94343">String only</text>
  <text x="350" y="448" text-anchor="middle" font-size="10" fill="#d94343">String only</text>
  <text x="470" y="448" text-anchor="middle" font-size="10" fill="#d94343">String only</text>
  <text x="590" y="448" text-anchor="middle" font-size="10" fill="#2f9d74">Objects, indexes</text>
  <text x="710" y="448" text-anchor="middle" font-size="10" fill="#2f9d74">Request/Response</text>

  <!-- Row: Best For -->
  <rect x="50" y="457" width="120" height="30" fill="#edeaf5"/>
  <text x="110" y="476" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">Best For</text>
  <text x="230" y="476" text-anchor="middle" font-size="10" fill="#1a1822">Auth tokens</text>
  <text x="350" y="476" text-anchor="middle" font-size="10" fill="#1a1822">Temp data</text>
  <text x="470" y="476" text-anchor="middle" font-size="10" fill="#1a1822">Preferences</text>
  <text x="590" y="476" text-anchor="middle" font-size="10" fill="#1a1822">Large datasets</text>
  <text x="710" y="476" text-anchor="middle" font-size="10" fill="#1a1822">Offline assets</text>

  <!-- Table grid -->
  <line x1="170" y1="315" x2="170" y2="487" stroke="#d7d1e6" stroke-width="1"/>
  <line x1="290" y1="315" x2="290" y2="487" stroke="#d7d1e6" stroke-width="1"/>
  <line x1="410" y1="315" x2="410" y2="487" stroke="#d7d1e6" stroke-width="1"/>
  <line x1="530" y1="315" x2="530" y2="487" stroke="#d7d1e6" stroke-width="1"/>
  <line x1="650" y1="315" x2="650" y2="487" stroke="#d7d1e6" stroke-width="1"/>
  <line x1="770" y1="315" x2="770" y2="487" stroke="#d7d1e6" stroke-width="1"/>
  <rect x="50" y="315" width="720" height="172" rx="0" fill="none" stroke="#d7d1e6" stroke-width="1"/>
</svg>
