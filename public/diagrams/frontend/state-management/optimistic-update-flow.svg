<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
  <rect width="900" height="500" rx="8" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">Optimistic Update Flow</text>

  <!-- Timeline axis -->
  <line x1="80" y1="80" x2="820" y2="80" stroke="#1a1822" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="80" y="72" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" font-weight="600">TIME</text>

  <!-- Step 1: User Action -->
  <rect x="60" y="95" width="120" height="50" rx="8" fill="#6d5bd0"/>
  <text x="120" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">User Clicks</text>
  <text x="120" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white">(Action triggered)</text>

  <!-- Step 2: Snapshot -->
  <rect x="200" y="95" width="120" height="50" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="260" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1822">Snapshot</text>
  <text x="260" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">Save current state</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="120" x2="200" y2="120" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 3: UI Updates Instantly -->
  <rect x="340" y="95" width="140" height="50" rx="8" fill="#2f9d74"/>
  <text x="410" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">UI Updates</text>
  <text x="410" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white">Instantly (~0ms)</text>

  <!-- Arrow 2→3 -->
  <line x1="320" y1="120" x2="340" y2="120" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 4: Send Request -->
  <rect x="500" y="95" width="130" height="50" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="565" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1822">Send Request</text>
  <text x="565" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">Background</text>

  <!-- Arrow 3→4 -->
  <line x1="480" y1="120" x2="500" y2="120" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Branch point -->
  <circle cx="670" cy="120" r="12" fill="#6d5bd0"/>
  <text x="670" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">?</text>

  <!-- Arrow 4→branch -->
  <line x1="630" y1="120" x2="658" y2="120" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- HAPPY PATH (Green) -->
  <text x="770" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#2f9d74">HAPPY PATH</text>

  <!-- Arrow branch→success -->
  <line x1="670" y1="132" x2="670" y2="190" stroke="#2f9d74" stroke-width="2"/>
  <line x1="670" y1="190" x2="710" y2="190" stroke="#2f9d74" stroke-width="2"/>

  <!-- Server Confirms -->
  <rect x="710" y="200" width="150" height="50" rx="8" fill="#2f9d74"/>
  <text x="785" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Server Confirms</text>
  <text x="785" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white">200 OK</text>

  <!-- Reconcile -->
  <rect x="710" y="265" width="150" height="45" rx="8" fill="#edeaf5" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="785" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#2f9d74">Reconcile & Done</text>
  <text x="785" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Replace with server data</text>

  <!-- Arrow confirm→reconcile -->
  <line x1="785" y1="250" x2="785" y2="265" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ERROR PATH (Orange) -->
  <text x="450" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#d97843">ERROR PATH</text>

  <!-- Arrow branch→error -->
  <line x1="670" y1="132" x2="670" y2="170" stroke="#d97843" stroke-width="2"/>
  <line x1="670" y1="170" x2="400" y2="170" stroke="#d97843" stroke-width="2"/>
  <line x1="400" y1="170" x2="400" y2="200" stroke="#d97843" stroke-width="2"/>

  <!-- Server Fails -->
  <rect x="340" y="200" width="150" height="50" rx="8" fill="#d97843"/>
  <text x="415" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">Server Rejects</text>
  <text x="415" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white">400/500 Error</text>

  <!-- Rollback -->
  <rect x="340" y="265" width="150" height="45" rx="8" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="415" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d97843">Rollback to Snapshot</text>
  <text x="415" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Restore previous state</text>

  <!-- Arrow fail→rollback -->
  <line x1="415" y1="250" x2="415" y2="265" stroke="#d97843" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Show Error -->
  <rect x="340" y="325" width="150" height="45" rx="8" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="415" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d97843">Show Error Toast</text>
  <text x="415" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Notify user of failure</text>

  <!-- Arrow rollback→error toast -->
  <line x1="415" y1="310" x2="415" y2="325" stroke="#d97843" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Perceived vs Actual Latency -->
  <rect x="60" y="400" width="820" height="85" rx="8" fill="white" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1822">Latency Comparison</text>

  <!-- Perceived latency bar -->
  <text x="80" y="450" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" font-weight="600">Perceived:</text>
  <rect x="180" y="438" width="30" height="18" rx="4" fill="#2f9d74"/>
  <text x="220" y="451" font-family="system-ui, sans-serif" font-size="10" fill="#2f9d74" font-weight="600">~0ms (instant)</text>

  <!-- Actual latency bar -->
  <text x="80" y="473" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" font-weight="600">Actual:</text>
  <rect x="180" y="461" width="300" height="18" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <rect x="180" y="461" width="300" height="18" rx="4" fill="none" stroke="#6d5bd0" stroke-width="1"/>
  <text x="490" y="474" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0" font-weight="600">100-500ms (hidden from user)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2f9d74"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d97843"/>
    </marker>
  </defs>
</svg>
