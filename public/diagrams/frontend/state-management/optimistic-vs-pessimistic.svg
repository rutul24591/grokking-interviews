<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
  <rect width="900" height="500" rx="8" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">Optimistic vs Pessimistic Updates</text>

  <!-- Divider -->
  <line x1="450" y1="55" x2="450" y2="480" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- LEFT: Pessimistic -->
  <text x="225" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#d97843">Pessimistic (Wait-then-Update)</text>

  <!-- Pessimistic timeline -->
  <line x1="60" y1="100" x2="60" y2="420" stroke="#1a1822" stroke-width="2"/>
  <text x="55" y="95" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" font-weight="600">TIME</text>

  <!-- P Step 1: User clicks -->
  <rect x="80" y="100" width="160" height="40" rx="8" fill="#6d5bd0"/>
  <text x="160" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">User Clicks Like</text>
  <text x="48" y="124" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">0ms</text>

  <!-- P Step 2: Loading spinner -->
  <rect x="80" y="155" width="160" height="40" rx="8" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="160" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#d97843">Loading Spinner</text>
  <text x="160" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Button disabled</text>

  <!-- P: Waiting zone -->
  <rect x="80" y="200" width="160" height="80" rx="4" fill="#d97843" opacity="0.1" stroke="#d97843" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="160" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d97843" font-weight="600">User Waiting...</text>
  <text x="160" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d97843">300-500ms</text>
  <text x="160" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d97843">UI blocked</text>

  <!-- P Step 3: Server responds -->
  <rect x="80" y="295" width="160" height="40" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="160" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1822">Server Responds</text>
  <text x="160" y="326" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">200 OK</text>
  <text x="48" y="315" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">350ms</text>

  <!-- P Step 4: UI updates -->
  <rect x="80" y="350" width="160" height="40" rx="8" fill="#2f9d74"/>
  <text x="160" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">UI Finally Updates</text>
  <text x="160" y="381" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white">Like count +1</text>
  <text x="48" y="370" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">355ms</text>

  <!-- P: Perceived delay label -->
  <rect x="260" y="110" width="4" height="255" rx="2" fill="#d97843"/>
  <text x="272" y="240" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#d97843" transform="rotate(90, 272, 240)">350ms PERCEIVED DELAY</text>

  <!-- Arrows pessimistic -->
  <line x1="60" y1="140" x2="60" y2="155" stroke="#1a1822" stroke-width="1"/>
  <line x1="60" y1="195" x2="60" y2="295" stroke="#1a1822" stroke-width="1"/>
  <line x1="60" y1="335" x2="60" y2="350" stroke="#1a1822" stroke-width="1"/>

  <!-- RIGHT: Optimistic -->
  <text x="675" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2f9d74">Optimistic (Update-then-Confirm)</text>

  <!-- Optimistic timeline -->
  <line x1="510" y1="100" x2="510" y2="420" stroke="#1a1822" stroke-width="2"/>

  <!-- O Step 1: User clicks -->
  <rect x="530" y="100" width="160" height="40" rx="8" fill="#6d5bd0"/>
  <text x="610" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">User Clicks Like</text>
  <text x="498" y="124" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">0ms</text>

  <!-- O Step 2: UI updates INSTANTLY -->
  <rect x="530" y="150" width="160" height="45" rx="8" fill="#2f9d74"/>
  <text x="610" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">UI Updates Instantly</text>
  <text x="610" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="white">Like count +1 (~0ms)</text>
  <text x="498" y="175" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#2f9d74" font-weight="bold">~0ms</text>

  <!-- O: Perceived delay label (instant) -->
  <rect x="708" y="110" width="4" height="80" rx="2" fill="#2f9d74"/>
  <text x="720" y="155" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2f9d74" transform="rotate(90, 720, 148)">0ms PERCEIVED</text>

  <!-- O: Background zone -->
  <rect x="530" y="210" width="160" height="100" rx="4" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="610" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d5bd0" font-weight="600">Background Request</text>
  <text x="610" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">Server processing...</text>
  <text x="610" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">User unaware</text>
  <text x="610" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">UI remains interactive</text>

  <!-- O Step 3: Server confirms -->
  <rect x="530" y="325" width="160" height="40" rx="8" fill="#edeaf5" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="610" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#2f9d74">Server Confirms</text>
  <text x="610" y="357" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Reconcile silently</text>
  <text x="498" y="345" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">350ms</text>

  <!-- Arrows optimistic -->
  <line x1="510" y1="140" x2="510" y2="150" stroke="#1a1822" stroke-width="1"/>
  <line x1="510" y1="195" x2="510" y2="210" stroke="#1a1822" stroke-width="1"/>
  <line x1="510" y1="310" x2="510" y2="325" stroke="#1a1822" stroke-width="1"/>

  <!-- Bottom comparison bar -->
  <rect x="40" y="435" width="820" height="55" rx="8" fill="white" stroke="#6d5bd0" stroke-width="1"/>

  <!-- Pessimistic result -->
  <circle cx="120" cy="462" r="8" fill="#d97843"/>
  <text x="135" y="458" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#d97843">Pessimistic:</text>
  <text x="135" y="473" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">~350ms until user sees feedback</text>

  <!-- Optimistic result -->
  <circle cx="530" cy="462" r="8" fill="#2f9d74"/>
  <text x="545" y="458" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2f9d74">Optimistic:</text>
  <text x="545" y="473" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">~0ms - instant feedback, server confirms later</text>
</svg>
