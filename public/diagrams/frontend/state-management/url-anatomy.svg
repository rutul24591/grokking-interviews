<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Anatomy of URL State</text>

  <!-- Full URL bar -->
  <rect x="40" y="70" width="820" height="50" rx="10" fill="#fff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="60" y="100" font-size="13" fill="#999">https://</text>
  <text x="135" y="100" font-size="13" fill="#1a1822">shop.example.com</text>
  <text x="298" y="100" font-size="13" fill="#6d5bd0" font-weight="bold">/products</text>
  <text x="390" y="100" font-size="13" fill="#2f9d74" font-weight="bold">?category=electronics&amp;sort=price&amp;page=2</text>
  <text x="720" y="100" font-size="13" fill="#d97843" font-weight="bold">#reviews</text>

  <!-- Annotation lines -->
  <!-- Pathname -->
  <line x1="335" y1="120" x2="335" y2="160" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="250" y="165" width="170" height="65" rx="8" fill="#6d5bd0"/>
  <text x="335" y="185" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Pathname</text>
  <text x="335" y="202" text-anchor="middle" font-size="10" fill="#d7d1e6">Route-level state</text>
  <text x="335" y="218" text-anchor="middle" font-size="10" fill="#d7d1e6">/products, /users/123</text>

  <!-- Search params -->
  <line x1="550" y1="120" x2="550" y2="270" stroke="#2f9d74" stroke-width="2"/>
  <rect x="430" y="275" width="240" height="80" rx="8" fill="#2f9d74"/>
  <text x="550" y="295" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Search Parameters</text>
  <text x="550" y="312" text-anchor="middle" font-size="10" fill="#d1f0e3">Filter, sort, pagination state</text>
  <text x="550" y="328" text-anchor="middle" font-size="10" fill="#d1f0e3">category=electronics</text>
  <text x="550" y="344" text-anchor="middle" font-size="10" fill="#d1f0e3">sort=price, page=2</text>

  <!-- Hash -->
  <line x1="740" y1="120" x2="740" y2="160" stroke="#d97843" stroke-width="2"/>
  <rect x="660" y="165" width="160" height="65" rx="8" fill="#d97843"/>
  <text x="740" y="185" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Hash Fragment</text>
  <text x="740" y="202" text-anchor="middle" font-size="10" fill="#fde8d0">Scroll / section state</text>
  <text x="740" y="218" text-anchor="middle" font-size="10" fill="#fde8d0">#reviews, #section-3</text>

  <!-- State types mapping -->
  <rect x="40" y="390" width="820" height="95" rx="8" fill="#fff" stroke="#d7d1e6"/>
  <text x="450" y="415" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">What State Goes Where?</text>

  <!-- Pathname column -->
  <rect x="60" y="430" width="230" height="45" rx="6" fill="#edeaf5"/>
  <text x="175" y="448" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="bold">Pathname → Navigation</text>
  <text x="175" y="465" text-anchor="middle" font-size="10" fill="#1a1822">Page identity, resource IDs</text>

  <!-- Search params column -->
  <rect x="310" y="430" width="280" height="45" rx="6" fill="#e8f5f0"/>
  <text x="450" y="448" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">Search Params → UI State</text>
  <text x="450" y="465" text-anchor="middle" font-size="10" fill="#1a1822">Filters, sort, pagination, search query</text>

  <!-- Hash column -->
  <rect x="610" y="430" width="230" height="45" rx="6" fill="#fff3ec"/>
  <text x="725" y="448" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Hash → Position State</text>
  <text x="725" y="465" text-anchor="middle" font-size="10" fill="#1a1822">Scroll position, active tab, anchor</text>

  <!-- Key properties -->
  <rect x="50" y="260" width="350" height="105" rx="8" fill="#fff" stroke="#6d5bd0"/>
  <text x="225" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">URL State Properties</text>
  <text x="70" y="302" font-size="11" fill="#2f9d74">+ Shareable (copy/paste URL)</text>
  <text x="70" y="320" font-size="11" fill="#2f9d74">+ Bookmarkable (save for later)</text>
  <text x="70" y="338" font-size="11" fill="#2f9d74">+ Back/Forward navigation works</text>
  <text x="70" y="356" font-size="11" fill="#d97843">- Limited capacity (~2000 chars)</text>
</svg>
