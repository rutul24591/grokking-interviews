<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Redux Unidirectional Data Flow</text>

  <!-- UI Component -->
  <rect x="50" y="200" width="130" height="60" rx="8" fill="#6d5bd0" opacity="0.9"/>
  <text x="115" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">UI Component</text>
  <text x="115" y="243" text-anchor="middle" font-size="11" fill="#e0daf5">(View Layer)</text>

  <!-- dispatch arrow: UI → Action -->
  <line x1="180" y1="220" x2="235" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="207" y="212" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">dispatch()</text>

  <!-- Action -->
  <rect x="235" y="195" width="110" height="50" rx="8" fill="#d97843"/>
  <text x="290" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Action</text>
  <text x="290" y="232" text-anchor="middle" font-size="10" fill="#fff">{ type, payload }</text>

  <!-- arrow: Action → Middleware -->
  <line x1="345" y1="220" x2="400" y2="220" stroke="#d97843" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Middleware -->
  <rect x="400" y="185" width="130" height="70" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="465" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Middleware</text>
  <text x="465" y="228" text-anchor="middle" font-size="10" fill="#6d5bd0">Thunk / Saga</text>
  <text x="465" y="244" text-anchor="middle" font-size="10" fill="#6d5bd0">Logger / API</text>

  <!-- arrow: Middleware → Reducer -->
  <line x1="530" y1="220" x2="585" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Reducer -->
  <rect x="585" y="195" width="120" height="50" rx="8" fill="#2f9d74"/>
  <text x="645" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Reducer</text>
  <text x="645" y="232" text-anchor="middle" font-size="10" fill="#e0f5ec">(Pure Function)</text>

  <!-- Single Store (center) -->
  <rect x="345" y="330" width="210" height="70" rx="12" fill="#6d5bd0"/>
  <text x="450" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Single Store</text>
  <text x="450" y="378" text-anchor="middle" font-size="11" fill="#e0daf5">Immutable State Tree</text>

  <!-- arrow: Reducer → Store -->
  <path d="M645,245 L645,365 L555,365" fill="none" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="660" y="310" font-size="10" fill="#2f9d74" font-weight="600">new state</text>

  <!-- Selectors -->
  <rect x="155" y="340" width="120" height="50" rx="8" fill="#edeaf5" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="215" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Selectors</text>
  <text x="215" y="378" text-anchor="middle" font-size="10" fill="#2f9d74">Memoized</text>

  <!-- arrow: Store → Selectors -->
  <line x1="345" y1="365" x2="275" y2="365" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="310" y="357" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">subscribe</text>

  <!-- arrow: Selectors → UI -->
  <path d="M215,340 L215,300 L115,300 L115,260" fill="none" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="165" y="292" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">re-render</text>

  <!-- DevTools -->
  <rect x="700" y="330" width="150" height="70" rx="8" fill="#edeaf5" stroke="#d97843" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="775" y="358" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Redux DevTools</text>
  <text x="775" y="375" text-anchor="middle" font-size="10" fill="#d97843">Time-Travel Debug</text>
  <text x="775" y="390" text-anchor="middle" font-size="10" fill="#d97843">Action Log</text>

  <!-- arrow: Store → DevTools -->
  <line x1="555" y1="370" x2="700" y2="370" stroke="#d97843" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>

  <!-- Flow numbers -->
  <circle cx="207" cy="198" r="10" fill="#6d5bd0"/>
  <text x="207" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>
  <circle cx="372" cy="198" r="10" fill="#d97843"/>
  <text x="372" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text>
  <circle cx="557" cy="198" r="10" fill="#6d5bd0"/>
  <text x="557" y="202" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text>
  <circle cx="665" cy="295" r="10" fill="#2f9d74"/>
  <text x="665" y="299" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">4</text>
  <circle cx="310" cy="345" r="10" fill="#6d5bd0"/>
  <text x="310" y="349" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">5</text>
  <circle cx="165" cy="310" r="10" fill="#2f9d74"/>
  <text x="165" y="314" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">6</text>

  <!-- Legend -->
  <rect x="50" y="440" width="800" height="45" rx="6" fill="#edeaf5" opacity="0.7"/>
  <circle cx="80" cy="462" r="8" fill="#6d5bd0"/><text x="93" y="466" font-size="10" fill="#1a1822">1 Dispatch</text>
  <circle cx="190" cy="462" r="8" fill="#d97843"/><text x="203" y="466" font-size="10" fill="#1a1822">2 Process</text>
  <circle cx="300" cy="462" r="8" fill="#6d5bd0"/><text x="313" y="466" font-size="10" fill="#1a1822">3 Reduce</text>
  <circle cx="410" cy="462" r="8" fill="#2f9d74"/><text x="423" y="466" font-size="10" fill="#1a1822">4 Update Store</text>
  <circle cx="545" cy="462" r="8" fill="#6d5bd0"/><text x="558" y="466" font-size="10" fill="#1a1822">5 Select</text>
  <circle cx="645" cy="462" r="8" fill="#2f9d74"/><text x="658" y="466" font-size="10" fill="#1a1822">6 Re-render</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d97843"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f9d74"/>
    </marker>
  </defs>
</svg>