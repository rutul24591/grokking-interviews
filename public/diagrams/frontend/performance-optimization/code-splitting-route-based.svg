<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="system-ui, sans-serif">
  <rect width="900" height="400" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1822">Route-Based Splitting</text>

  <!-- Initial Load Group -->
  <rect x="30" y="60" width="230" height="160" rx="8" fill="#e8e4f3" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="145" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Initial Load</text>

  <rect x="55" y="95" width="180" height="45" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="145" y="114" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">main.js</text>
  <text x="145" y="130" text-anchor="middle" font-size="10" fill="#e0d8f5">120KB</text>

  <line x1="145" y1="140" x2="145" y2="160" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="72" y="160" width="146" height="36" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="145" y="183" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="600">Home Page</text>

  <!-- On Demand Group -->
  <rect x="310" y="60" width="560" height="280" rx="8" fill="#fdf3ec" stroke="#d97843" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="590" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#d97843">On Demand (Loaded on Navigation)</text>

  <!-- Dashboard -->
  <rect x="335" y="100" width="115" height="50" rx="8" fill="#d97843" stroke="#b8622f" stroke-width="1.5"/>
  <text x="392" y="120" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">dashboard.js</text>
  <text x="392" y="136" text-anchor="middle" font-size="10" fill="#fde8d8">85KB</text>
  <line x1="392" y1="150" x2="392" y2="170" stroke="#1a1822" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="347" y="170" width="90" height="30" rx="6" fill="#fff" stroke="#d97843" stroke-width="1"/>
  <text x="392" y="190" text-anchor="middle" font-size="11" fill="#1a1822">Dashboard</text>

  <!-- Settings -->
  <rect x="475" y="100" width="115" height="50" rx="8" fill="#d97843" stroke="#b8622f" stroke-width="1.5"/>
  <text x="532" y="120" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">settings.js</text>
  <text x="532" y="136" text-anchor="middle" font-size="10" fill="#fde8d8">45KB</text>
  <line x1="532" y1="150" x2="532" y2="170" stroke="#1a1822" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="492" y="170" width="80" height="30" rx="6" fill="#fff" stroke="#d97843" stroke-width="1"/>
  <text x="532" y="190" text-anchor="middle" font-size="11" fill="#1a1822">Settings</text>

  <!-- Profile -->
  <rect x="615" y="100" width="115" height="50" rx="8" fill="#d97843" stroke="#b8622f" stroke-width="1.5"/>
  <text x="672" y="120" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">profile.js</text>
  <text x="672" y="136" text-anchor="middle" font-size="10" fill="#fde8d8">30KB</text>
  <line x1="672" y1="150" x2="672" y2="170" stroke="#1a1822" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="637" y="170" width="70" height="30" rx="6" fill="#fff" stroke="#d97843" stroke-width="1"/>
  <text x="672" y="190" text-anchor="middle" font-size="11" fill="#1a1822">Profile</text>

  <!-- Admin -->
  <rect x="755" y="100" width="95" height="50" rx="8" fill="#d97843" stroke="#b8622f" stroke-width="1.5"/>
  <text x="802" y="120" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">admin.js</text>
  <text x="802" y="136" text-anchor="middle" font-size="10" fill="#fde8d8">200KB</text>
  <line x1="802" y1="150" x2="802" y2="170" stroke="#1a1822" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="757" y="170" width="90" height="30" rx="6" fill="#fff" stroke="#d97843" stroke-width="1"/>
  <text x="802" y="190" text-anchor="middle" font-size="11" fill="#1a1822">Admin Panel</text>

  <!-- Navigation arrows from Home to each on-demand chunk -->
  <line x1="218" y1="178" x2="347" y2="125" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrPurple)"/>
  <line x1="218" y1="178" x2="475" y2="125" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrPurple)"/>
  <line x1="218" y1="178" x2="615" y2="125" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrPurple)"/>
  <line x1="218" y1="178" x2="755" y2="125" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrPurple)"/>

  <!-- Legend -->
  <text x="218" y="260" text-anchor="middle" font-size="10" fill="#6d5bd0" font-style="italic">Navigate</text>

  <!-- Key insight -->
  <rect x="120" y="340" width="660" height="40" rx="8" fill="#fff" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="450" y="365" text-anchor="middle" font-size="12" fill="#1a1822">Users only download code for the page they are viewing. Other pages load on navigation.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1a1822"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>