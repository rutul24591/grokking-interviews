  <text x="700" y="442" text-anchor="middle" font-size="9" fill="#1a1822">1000</text>
  <line x1="820" y1="415" x2="820" y2="425" stroke="#1a1822" stroke-width="1.5"/>
  <text x="820" y="442" text-anchor="middle" font-size="9" fill="#1a1822">1200</text>

  <!-- Row 1: Continuous scroll events -->
