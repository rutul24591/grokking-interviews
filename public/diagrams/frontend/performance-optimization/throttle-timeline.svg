  <line x1="80" y1="190" x2="850" y2="190" stroke="#ddd" stroke-width="1"/>

  <!-- 200ms interval windows -->
  <rect x="100" y="160" width="120" height="25" rx="4" fill="#d97843" opacity="0.12" stroke="#d97843" stroke-width="1"/>
  <text x="160" y="177" text-anchor="middle" font-size="9" fill="#d97843">200ms window</text>

  <rect x="220" y="160" width="120" height="25" rx="4" fill="#d97843" opacity="0.12" stroke="#d97843" stroke-width="1"/>
  <text x="280" y="177" text-anchor="middle" font-size="9" fill="#d97843">200ms window</text>

  <rect x="340" y="160" width="120" height="25" rx="4" fill="#d97843" opacity="0.12" stroke="#d97843" stroke-width="1"/>
  <text x="400" y="177" text-anchor="middle" font-size="9" fill="#d97843">200ms window</text>

  <rect x="460" y="160" width="120" height="25" rx="4" fill="#d97843" opacity="0.12" stroke="#d97843" stroke-width="1"/>
  <text x="520" y="177" text-anchor="middle" font-size="9" fill="#d97843">200ms window</text>

  <rect x="580" y="160" width="120" height="25" rx="4" fill="#d97843" opacity="0.12" stroke="#d97843" stroke-width="1"/>
  <text x="640" y="177" text-anchor="middle" font-size="9" fill="#d97843">200ms window</text>

  <!-- Row 3: Throttled output -->
  <text x="50" y="265" text-anchor="end" font-size="12" font-weight="600" fill="#1a1822">Throttled</text>
  <text x="50" y="280" text-anchor="end" font-size="12" font-weight="600" fill="#2f9d74">Output</text>
  <line x1="80" y1="270" x2="850" y2="270" stroke="#ddd" stroke-width="1"/>

  <!-- Execution at start of each interval -->
  <line x1="100" y1="245" x2="100" y2="270" stroke="#2f9d74" stroke-width="4"/>
  <circle cx="100" cy="242" r="6" fill="#2f9d74"/>
  <text x="100" y="234" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">exec</text>

  <line x1="220" y1="245" x2="220" y2="270" stroke="#2f9d74" stroke-width="4"/>
  <circle cx="220" cy="242" r="6" fill="#2f9d74"/>
  <text x="220" y="234" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">exec</text>

  <line x1="340" y1="245" x2="340" y2="270" stroke="#2f9d74" stroke-width="4"/>
  <circle cx="340" cy="242" r="6" fill="#2f9d74"/>
  <text x="340" y="234" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">exec</text>

  <line x1="460" y1="245" x2="460" y2="270" stroke="#2f9d74" stroke-width="4"/>
  <circle cx="460" cy="242" r="6" fill="#2f9d74"/>
  <text x="460" y="234" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">exec</text>

  <line x1="580" y1="245" x2="580" y2="270" stroke="#2f9d74" stroke-width="4"/>
  <circle cx="580" cy="242" r="6" fill="#2f9d74"/>
  <text x="580" y="234" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">exec</text>

  <line x1="700" y1="245" x2="700" y2="270" stroke="#2f9d74" stroke-width="4"/>
  <circle cx="700" cy="242" r="6" fill="#2f9d74"/>
  <text x="700" y="234" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">exec</text>

  <!-- Comparison box -->
  <rect x="100" y="310" width="700" height="85" rx="8" fill="white" stroke="#6d5bd0" stroke-width="1.5"/>

  <text x="450" y="332" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Impact Over 1 Second of Scrolling</text>

  <rect x="130" y="345" width="280" height="40" rx="6" fill="#d97843" opacity="0.1" stroke="#d97843" stroke-width="1"/>
  <text x="270" y="362" text-anchor="middle" font-size="11" fill="#d97843" font-weight="600">Without throttle: ~60 executions</text>
  <text x="270" y="378" text-anchor="middle" font-size="10" fill="#d97843">Handler runs on every scroll event</text>

  <rect x="490" y="345" width="280" height="40" rx="6" fill="#2f9d74" opacity="0.1" stroke="#2f9d74" stroke-width="1"/>
  <text x="630" y="362" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="600">With throttle (200ms): 5 executions</text>
  <text x="630" y="378" text-anchor="middle" font-size="10" fill="#2f9d74">92% reduction, still smooth updates</text>

  <!-- Legend -->
  <rect x="200" y="470" width="16" height="3" fill="#6d5bd0"/>
  <text x="222" y="475" font-size="10" fill="#1a1822">Raw scroll event</text>
  <rect x="380" y="468" width="16" height="8" rx="2" fill="#d97843" opacity="0.12" stroke="#d97843" stroke-width="1"/>
  <text x="402" y="475" font-size="10" fill="#1a1822">Throttle interval</text>
  <circle cx="550" cy="472" r="4" fill="#2f9d74"/>
  <text x="560" y="475" font-size="10" fill="#1a1822">Throttled execution</text>
</svg>