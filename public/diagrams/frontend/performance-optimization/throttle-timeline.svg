    <line x1="630" y1="88" x2="630" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="640" y1="88" x2="640" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="650" y1="88" x2="650" y2="110" stroke="#6d5bd0" stroke-width="2"/>
