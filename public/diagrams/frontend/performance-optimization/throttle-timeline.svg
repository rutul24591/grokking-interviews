  <!-- Time markers -->
  <line x1="100" y1="415" x2="100" y2="425" stroke="#1a1822" stroke-width="1.5"/>
  <text x="100" y="442" text-anchor="middle" font-size="9" fill="#1a1822">0</text>
  <line x1="220" y1="415" x2="220" y2="425" stroke="#1a1822" stroke-width="1.5"/>
  <text x="220" y="442" text-anchor="middle" font-size="9" fill="#1a1822">200</text>
  <line x1="340" y1="415" x2="340" y2="425" stroke="#1a1822" stroke-width="1.5"/>
  <text x="340" y="442" text-anchor="middle" font-size="9" fill="#1a1822">400</text>
  <line x1="460" y1="415" x2="460" y2="425" stroke="#1a1822" stroke-width="1.5"/>
  <text x="460" y="442" text-anchor="middle" font-size="9" fill="#1a1822">600</text>
  <line x1="580" y1="415" x2="580" y2="425" stroke="#1a1822" stroke-width="1.5"/>
  <text x="580" y="442" text-anchor="middle" font-size="9" fill="#1a1822">800</text>
