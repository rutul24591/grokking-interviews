  <text x="400" y="82" text-anchor="middle" font-size="10" fill="#6d5bd0">~60 scroll events per second (one every ~17ms)</text>

  <!-- Row 2: Throttle intervals -->
  <text x="50" y="185" text-anchor="end" font-size="12" font-weight="600" fill="#1a1822">Throttle</text>
