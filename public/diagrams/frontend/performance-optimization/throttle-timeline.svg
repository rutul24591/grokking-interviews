    <line x1="310" y1="88" x2="310" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="320" y1="88" x2="320" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="330" y1="88" x2="330" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="340" y1="88" x2="340" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="350" y1="88" x2="350" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="360" y1="88" x2="360" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="370" y1="88" x2="370" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="380" y1="88" x2="380" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="390" y1="88" x2="390" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="400" y1="88" x2="400" y2="110" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="410" y1="88" x2="410" y2="110" stroke="#6d5bd0" stroke-width="2"/>
