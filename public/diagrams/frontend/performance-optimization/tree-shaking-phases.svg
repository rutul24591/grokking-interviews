<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="900" height="500" rx="8" fill="#f3f1f8"/>

  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">Three Phases of Tree Shaking</text>

  <!-- Phase 1 -->
  <rect x="50" y="80" width="240" height="160" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="50" y="80" width="240" height="40" rx="8" fill="#6d5bd0"/>
  <rect x="50" y="108" width="240" height="4" fill="#6d5bd0"/>
  <text x="170" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Phase 1</text>
  <text x="170" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#6d5bd0">Parse &amp; Graph</text>

  <text x="170" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Follow imports from entry</text>
  <text x="170" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">points to build a complete</text>
  <text x="170" y="211" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">module dependency graph</text>

  <!-- Icons for Phase 1 -->
  <rect x="100" y="260" width="50" height="30" rx="4" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="125" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">entry</text>
  <line x1="150" y1="275" x2="180" y2="265" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="150" y1="275" x2="180" y2="285" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="180" y="252" width="45" height="24" rx="4" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="202" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6d5bd0">mod A</text>
  <rect x="180" y="280" width="45" height="24" rx="4" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="202" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6d5bd0">mod B</text>

  <!-- Arrow 1→2 -->
  <line x1="290" y1="160" x2="330" y2="160" stroke="#d97843" stroke-width="3" marker-end="url(#arrowOrange)"/>

  <!-- Phase 2 -->
  <rect x="330" y="80" width="240" height="160" rx="8" fill="#ffffff" stroke="#d97843" stroke-width="2"/>
  <rect x="330" y="80" width="240" height="40" rx="8" fill="#d97843"/>
  <rect x="330" y="108" width="240" height="4" fill="#d97843"/>
  <text x="450" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Phase 2</text>
  <text x="450" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#d97843">Mark &amp; Sweep</text>

  <text x="450" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Trace from used exports</text>
  <text x="450" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">to find all reachable code.</text>
  <text x="450" y="211" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Mark unreachable as dead.</text>

  <!-- Icons for Phase 2 -->
  <rect x="380" y="255" width="50" height="25" rx="4" fill="#2f9d74" opacity="0.3" stroke="#2f9d74" stroke-width="1"/>
  <text x="405" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2f9d74">used</text>
  <rect x="440" y="255" width="50" height="25" rx="4" fill="#c44d4d" opacity="0.2" stroke="#c44d4d" stroke-width="1"/>
  <text x="465" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c44d4d">dead</text>
  <rect x="380" y="285" width="50" height="25" rx="4" fill="#c44d4d" opacity="0.2" stroke="#c44d4d" stroke-width="1"/>
  <text x="405" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c44d4d">dead</text>
  <rect x="440" y="285" width="50" height="25" rx="4" fill="#2f9d74" opacity="0.3" stroke="#2f9d74" stroke-width="1"/>
  <text x="465" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2f9d74">used</text>

  <!-- Arrow 2→3 -->
  <line x1="570" y1="160" x2="610" y2="160" stroke="#d97843" stroke-width="3" marker-end="url(#arrowOrange)"/>

  <!-- Phase 3 -->
  <rect x="610" y="80" width="240" height="160" rx="8" fill="#ffffff" stroke="#2f9d74" stroke-width="2"/>
  <rect x="610" y="80" width="240" height="40" rx="8" fill="#2f9d74"/>
  <rect x="610" y="108" width="240" height="4" fill="#2f9d74"/>
  <text x="730" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Phase 3</text>
  <text x="730" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2f9d74">Minify &amp; Remove</text>

  <text x="730" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Minifier strips annotated</text>
  <text x="730" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">dead code and unreachable</text>
  <text x="730" y="211" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">exports from final output</text>

  <!-- Icons for Phase 3 -->
  <rect x="670" y="255" width="120" height="55" rx="4" fill="#2f9d74" opacity="0.12" stroke="#2f9d74" stroke-width="1"/>
  <text x="730" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#2f9d74" font-weight="bold">Optimized Bundle</text>
  <text x="730" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2f9d74">only used code</text>

  <!-- Bottom summary bar -->
  <rect x="50" y="360" width="800" height="110" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1822">Key Outputs at Each Phase</text>

  <rect x="80" y="400" width="200" height="50" rx="6" fill="#6d5bd0" opacity="0.1"/>
  <text x="180" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6d5bd0">Dependency Graph</text>
  <text x="180" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d5bd0">modules + import edges</text>

  <rect x="350" y="400" width="200" height="50" rx="6" fill="#d97843" opacity="0.1"/>
  <text x="450" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#d97843">Usage Annotations</text>
  <text x="450" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d97843">/*unused harmony export*/</text>

  <rect x="620" y="400" width="200" height="50" rx="6" fill="#2f9d74" opacity="0.1"/>
  <text x="720" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2f9d74">Lean Bundle</text>
  <text x="720" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#2f9d74">dead code eliminated</text>

  <!-- Defs -->
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>
</svg>