<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="900" height="500" rx="8" fill="#f3f1f8"/>

  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">Bundle Size Analysis &amp; Optimization Flow</text>

  <!-- Step 1: Source Code -->
  <rect x="50" y="100" width="130" height="70" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="115" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Source</text>
  <text x="115" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Code</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="135" x2="220" y2="135" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrowFlow)"/>

  <!-- Step 2: Build -->
  <rect x="220" y="100" width="110" height="70" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="275" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Build</text>
  <text x="275" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d4ccf0">webpack / vite</text>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="135" x2="370" y2="135" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrowFlow)"/>

  <!-- Step 3: Bundle Analyzer -->
  <rect x="370" y="85" width="150" height="100" rx="8" fill="#d97843" stroke="#c06a35" stroke-width="2"/>
  <text x="445" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Bundle</text>
  <text x="445" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Analyzer</text>
  <text x="445" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fde0cc">treemap visualization</text>

  <!-- Arrow 3→4 -->
  <line x1="520" y1="135" x2="560" y2="135" stroke="#d97843" stroke-width="2.5" marker-end="url(#arrowOrangeFlow)"/>

  <!-- Step 4: Identify Large Deps -->
  <rect x="560" y="85" width="140" height="100" rx="8" fill="#d97843" stroke="#c06a35" stroke-width="2"/>
  <text x="630" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Identify</text>
  <text x="630" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Large Deps</text>
  <text x="630" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fde0cc">find bottlenecks</text>

  <!-- Arrow 4→5 -->
  <line x1="700" y1="135" x2="740" y2="135" stroke="#d97843" stroke-width="2.5" marker-end="url(#arrowOrangeFlow)"/>

  <!-- Step 5: Optimize -->
  <rect x="740" y="100" width="120" height="70" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="2"/>
  <text x="800" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Optimize</text>
  <text x="800" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d4f5e6">apply fixes</text>

  <!-- Feedback loop arrow from Optimize back to Build -->
  <path d="M 800 170 L 800 230 L 275 230 L 275 170" fill="none" stroke="#2f9d74" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowGreenFlow)"/>
  <text x="540" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2f9d74">Measure Again</text>

  <!-- Detail boxes below -->
  <rect x="50" y="290" width="380" height="180" rx="8" fill="#ffffff" stroke="#d97843" stroke-width="1.5"/>
  <text x="240" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1822">Common Findings</text>
  <line x1="70" y1="330" x2="410" y2="330" stroke="#f3f1f8" stroke-width="1.5"/>
  <circle cx="85" cy="352" r="4" fill="#d97843"/>
  <text x="100" y="357" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Oversized vendor libraries (lodash, moment)</text>
  <circle cx="85" cy="377" r="4" fill="#d97843"/>
  <text x="100" y="382" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Duplicate dependencies across chunks</text>
  <circle cx="85" cy="402" r="4" fill="#d97843"/>
  <text x="100" y="407" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Unnecessary polyfills for modern browsers</text>
  <circle cx="85" cy="427" r="4" fill="#d97843"/>
  <text x="100" y="432" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Unshaken barrel file imports</text>
  <circle cx="85" cy="452" r="4" fill="#d97843"/>
  <text x="100" y="457" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Large images/fonts inlined as data URIs</text>

  <rect x="470" y="290" width="380" height="180" rx="8" fill="#ffffff" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="660" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1822">Optimization Actions</text>
  <line x1="490" y1="330" x2="830" y2="330" stroke="#f3f1f8" stroke-width="1.5"/>
  <circle cx="505" cy="352" r="4" fill="#2f9d74"/>
  <text x="520" y="357" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Replace with lighter alternatives</text>
  <circle cx="505" cy="377" r="4" fill="#2f9d74"/>
  <text x="520" y="382" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Dedupe with pnpm / npm dedupe</text>
  <circle cx="505" cy="402" r="4" fill="#2f9d74"/>
  <text x="520" y="407" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Use browserslist + core-js selective</text>
  <circle cx="505" cy="427" r="4" fill="#2f9d74"/>
  <text x="520" y="432" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Add sideEffects: false, use named imports</text>
  <circle cx="505" cy="452" r="4" fill="#2f9d74"/>
  <text x="520" y="457" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Externalize or lazy-load heavy assets</text>

  <!-- Defs -->
  <defs>
    <marker id="arrowFlow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowOrangeFlow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
    <marker id="arrowGreenFlow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
  </defs>
</svg>