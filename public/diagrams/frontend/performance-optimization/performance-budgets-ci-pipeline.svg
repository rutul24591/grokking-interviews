<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1822">Performance Budget CI/CD Pipeline</text>

  <!-- Step 1: Build -->
  <rect x="30" y="90" width="140" height="80" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="100" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Build</text>
  <text x="100" y="148" text-anchor="middle" font-size="11" fill="#1a1822">Compile assets</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="130" x2="210" y2="130" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 2: Measure -->
  <rect x="210" y="90" width="140" height="80" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="280" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Measure</text>
  <text x="280" y="148" text-anchor="middle" font-size="11" fill="#1a1822">Bundle sizes, LCP,</text>
  <text x="280" y="162" text-anchor="middle" font-size="11" fill="#1a1822">TBT, Lighthouse</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="130" x2="390" y2="130" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 3: Compare -->
  <rect x="390" y="90" width="140" height="80" rx="8" fill="white" stroke="#d97843" stroke-width="2"/>
  <text x="460" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#d97843">Compare</text>
  <text x="460" y="143" text-anchor="middle" font-size="11" fill="#1a1822">Check against</text>
  <text x="460" y="157" text-anchor="middle" font-size="11" fill="#1a1822">budget thresholds</text>

  <!-- Branch: Pass -->
  <line x1="530" y1="110" x2="600" y2="85" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="600" y="55" width="140" height="60" rx="8" fill="#2f9d74" stroke="#2f9d74" stroke-width="2"/>
  <text x="670" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">PASS</text>
  <text x="670" y="100" text-anchor="middle" font-size="11" fill="white">Deploy</text>

  <!-- Branch: Fail -->
  <line x1="530" y1="150" x2="600" y2="170" stroke="#d97843" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="600" y="140" width="140" height="60" rx="8" fill="#d97843" stroke="#d97843" stroke-width="2"/>
  <text x="670" y="167" text-anchor="middle" font-size="14" font-weight="bold" fill="white">FAIL</text>
  <text x="670" y="185" text-anchor="middle" font-size="11" fill="white">Block &amp; Alert</text>

  <!-- Arrow from PASS to deploy -->
  <line x1="740" y1="85" x2="780" y2="85" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="780" y="55" width="100" height="60" rx="8" fill="white" stroke="#2f9d74" stroke-width="2"/>
  <text x="830" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f9d74">Production</text>
  <text x="830" y="100" text-anchor="middle" font-size="10" fill="#1a1822">Ship it!</text>

  <!-- Arrow from FAIL to fix -->
  <line x1="740" y1="170" x2="780" y2="170" stroke="#d97843" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="780" y="140" width="100" height="60" rx="8" fill="white" stroke="#d97843" stroke-width="2"/>
  <text x="830" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97843">Fix PR</text>
  <text x="830" y="185" text-anchor="middle" font-size="10" fill="#1a1822">Optimize</text>

  <!-- CI/CD Layers detail -->
  <text x="450" y="260" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Enforcement Layers</text>

  <!-- Layer 1 -->
  <rect x="40" y="280" width="260" height="90" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="280" width="260" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="40" y="300" width="260" height="10" fill="#6d5bd0"/>
  <text x="170" y="302" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Layer 1: Build Time</text>
  <text x="170" y="330" text-anchor="middle" font-size="11" fill="#1a1822">Webpack performance hints</text>
  <text x="170" y="348" text-anchor="middle" font-size="11" fill="#1a1822">maxAssetSize, maxEntrypointSize</text>
  <text x="170" y="365" text-anchor="middle" font-size="10" fill="#666">Fastest check, runs during build</text>

  <!-- Layer 2 -->
  <rect x="320" y="280" width="260" height="90" rx="8" fill="white" stroke="#d97843" stroke-width="2"/>
  <rect x="320" y="280" width="260" height="30" rx="8" fill="#d97843"/>
  <rect x="320" y="300" width="260" height="10" fill="#d97843"/>
  <text x="450" y="302" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Layer 2: Post-Build</text>
  <text x="450" y="330" text-anchor="middle" font-size="11" fill="#1a1822">size-limit, bundlesize</text>
  <text x="450" y="348" text-anchor="middle" font-size="11" fill="#1a1822">Per-route and per-chunk limits</text>
  <text x="450" y="365" text-anchor="middle" font-size="10" fill="#666">Runs as CI step, posts PR comments</text>

  <!-- Layer 3 -->
  <rect x="600" y="280" width="260" height="90" rx="8" fill="white" stroke="#2f9d74" stroke-width="2"/>
  <rect x="600" y="280" width="260" height="30" rx="8" fill="#2f9d74"/>
  <rect x="600" y="300" width="260" height="10" fill="#2f9d74"/>
  <text x="730" y="302" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Layer 3: Audit</text>
  <text x="730" y="330" text-anchor="middle" font-size="11" fill="#1a1822">Lighthouse CI</text>
  <text x="730" y="348" text-anchor="middle" font-size="11" fill="#1a1822">Full page load simulation</text>
  <text x="730" y="365" text-anchor="middle" font-size="10" fill="#666">Most comprehensive, slowest</text>

  <!-- Flow arrows between layers -->
  <line x1="300" y1="325" x2="320" y2="325" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrowBlack)"/>
  <line x1="580" y1="325" x2="600" y2="325" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Bottom note -->
  <rect x="140" y="400" width="620" height="70" rx="8" fill="white" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="450" y="425" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="600">Key principle: fail fast at the cheapest layer</text>
  <text x="450" y="448" text-anchor="middle" font-size="11" fill="#666">Build-time checks catch 80% of issues in seconds. Save expensive Lighthouse runs for final validation.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/></marker>
    <marker id="arrowBlack" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/></marker>
  </defs>
</svg>