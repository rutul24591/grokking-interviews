<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="900" height="500" rx="8" fill="#f3f1f8"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">Module Dependency Graph — Tree Shaking Analysis</text>

  <!-- entry.js node -->
  <rect x="350" y="60" width="200" height="50" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="450" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">entry.js</text>

  <!-- Arrows from entry.js -->
  <line x1="400" y1="110" x2="220" y2="170" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="500" y1="110" x2="680" y2="170" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- components/index.js node -->
  <rect x="100" y="170" width="240" height="50" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="220" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">components/index.js</text>

  <!-- utils.js node -->
  <rect x="560" y="170" width="240" height="50" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="680" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">utils.js</text>

  <!-- Import labels on arrows -->
  <text x="280" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d5bd0" font-style="italic">import { Button }</text>
  <text x="620" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d5bd0" font-style="italic">import { formatDate }</text>

  <!-- Exports from components/index.js -->
  <line x1="150" y1="220" x2="150" y2="280" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="220" y1="220" x2="220" y2="280" stroke="#c44d4d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <line x1="290" y1="220" x2="290" y2="280" stroke="#c44d4d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>

  <!-- Component export boxes -->
  <rect x="100" y="280" width="100" height="44" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="2"/>
  <text x="150" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Button</text>
  <text x="150" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d4f5e6">USED</text>

  <rect x="170" y="280" width="100" height="44" rx="8" fill="#c44d4d" stroke="#a83a3a" stroke-width="2" opacity="0.5"/>
  <text x="220" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" opacity="0.6">Input</text>
  <text x="220" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f5d4d4" opacity="0.6">UNUSED</text>

  <rect x="240" y="280" width="100" height="44" rx="8" fill="#c44d4d" stroke="#a83a3a" stroke-width="2" opacity="0.5"/>
  <text x="290" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" opacity="0.6">Select</text>
  <text x="290" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f5d4d4" opacity="0.6">UNUSED</text>

  <!-- Exports from utils.js -->
  <line x1="610" y1="220" x2="610" y2="280" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="680" y1="220" x2="680" y2="280" stroke="#c44d4d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <line x1="750" y1="220" x2="750" y2="280" stroke="#c44d4d" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>

  <!-- Utils export boxes -->
  <rect x="555" y="280" width="110" height="44" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="2"/>
  <text x="610" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">formatDate</text>
  <text x="610" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d4f5e6">USED</text>

  <rect x="625" y="280" width="110" height="44" rx="8" fill="#c44d4d" stroke="#a83a3a" stroke-width="2" opacity="0.5"/>
  <text x="680" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" opacity="0.6">formatCurrency</text>
  <text x="680" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f5d4d4" opacity="0.6">UNUSED</text>

  <rect x="695" y="280" width="110" height="44" rx="8" fill="#c44d4d" stroke="#a83a3a" stroke-width="2" opacity="0.5"/>
  <text x="750" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" opacity="0.6">parseDate</text>
  <text x="750" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f5d4d4" opacity="0.6">UNUSED</text>

  <!-- Final bundle illustration -->
  <rect x="250" y="380" width="400" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1822">Final Bundle (after tree shaking)</text>

  <rect x="280" y="420" width="90" height="35" rx="6" fill="#2f9d74"/>
  <text x="325" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Button</text>

  <rect x="390" y="420" width="100" height="35" rx="6" fill="#2f9d74"/>
  <text x="440" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">formatDate</text>

  <rect x="510" y="420" width="110" height="35" rx="6" fill="#2f9d74"/>
  <text x="565" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">entry.js code</text>

  <!-- Arrow down to final bundle -->
  <line x1="450" y1="340" x2="450" y2="375" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="450" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d5bd0" font-style="italic">shake unused</text>

  <!-- Legend -->
  <rect x="30" y="400" width="16" height="16" rx="3" fill="#2f9d74"/>
  <text x="52" y="413" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Used export (kept)</text>
  <rect x="30" y="425" width="16" height="16" rx="3" fill="#c44d4d" opacity="0.5"/>
  <text x="52" y="438" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Unused export (removed)</text>
  <line x1="30" y1="458" x2="46" y2="458" stroke="#c44d4d" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="52" y="462" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">Dead reference</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c44d4d"/>
    </marker>
  </defs>
</svg>