<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Overscan: Buffer Items Above and Below Viewport</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6d5bd0">Prevents white flash when scrolling fast</text>

  <!-- Main container -->
  <rect x="250" y="75" width="260" height="400" rx="8" fill="white" stroke="#1a1822" stroke-width="2"/>

  <!-- Above: not rendered -->
  <rect x="260" y="83" width="240" height="42" rx="4" fill="#f3f1f8" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <text x="380" y="108" text-anchor="middle" font-size="10" fill="#999">Items 1-90 (not rendered)</text>

  <!-- Overscan above -->
  <rect x="260" y="130" width="240" height="60" rx="4" fill="#d97843" opacity="0.15" stroke="#d97843" stroke-width="2" stroke-dasharray="4"/>
  <rect x="268" y="138" width="224" height="14" rx="3" fill="#d97843" opacity="0.4"/>
  <text x="380" y="149" text-anchor="middle" font-size="9" fill="white" font-weight="600">Item 91</text>
  <rect x="268" y="155" width="224" height="14" rx="3" fill="#d97843" opacity="0.4"/>
  <text x="380" y="166" text-anchor="middle" font-size="9" fill="white" font-weight="600">Item 92</text>
  <rect x="268" y="172" width="224" height="14" rx="3" fill="#d97843" opacity="0.4"/>
  <text x="380" y="183" text-anchor="middle" font-size="9" fill="white" font-weight="600">Item 93</text>

  <!-- Overscan label above -->
  <text x="550" y="148" font-size="11" fill="#d97843" font-weight="600">Overscan Buffer</text>
  <text x="550" y="163" font-size="10" fill="#d97843">(3 items above)</text>
  <line x1="502" y1="155" x2="545" y2="155" stroke="#d97843" stroke-width="1.5"/>

  <!-- Viewport -->
  <rect x="260" y="195" width="240" height="170" rx="0" fill="#2f9d74" opacity="0.08" stroke="#2f9d74" stroke-width="2.5"/>

  <!-- Viewport label -->
  <rect x="245" y="195" width="6" height="170" rx="2" fill="#2f9d74"/>
  <text x="232" y="283" text-anchor="end" font-size="12" font-weight="bold" fill="#2f9d74" transform="rotate(-90, 232, 283)">VIEWPORT</text>

  <rect x="268" y="203" width="224" height="18" rx="3" fill="#2f9d74" opacity="0.7"/>
  <text x="380" y="216" text-anchor="middle" font-size="10" fill="white" font-weight="600">Item 94</text>
  <rect x="268" y="225" width="224" height="18" rx="3" fill="#2f9d74" opacity="0.7"/>
  <text x="380" y="238" text-anchor="middle" font-size="10" fill="white" font-weight="600">Item 95</text>
  <rect x="268" y="247" width="224" height="18" rx="3" fill="#2f9d74" opacity="0.7"/>
  <text x="380" y="260" text-anchor="middle" font-size="10" fill="white" font-weight="600">Item 96</text>
  <rect x="268" y="269" width="224" height="18" rx="3" fill="#2f9d74" opacity="0.7"/>
  <text x="380" y="282" text-anchor="middle" font-size="10" fill="white" font-weight="600">Item 97</text>
  <rect x="268" y="291" width="224" height="18" rx="3" fill="#2f9d74" opacity="0.7"/>
  <text x="380" y="304" text-anchor="middle" font-size="10" fill="white" font-weight="600">Item 98</text>
  <rect x="268" y="313" width="224" height="18" rx="3" fill="#2f9d74" opacity="0.7"/>
  <text x="380" y="326" text-anchor="middle" font-size="10" fill="white" font-weight="600">Item 99</text>
  <rect x="268" y="335" width="224" height="18" rx="3" fill="#2f9d74" opacity="0.7"/>
  <text x="380" y="348" text-anchor="middle" font-size="10" fill="white" font-weight="600">Item 100</text>

  <!-- Viewport label right -->
  <text x="550" y="268" font-size="11" fill="#2f9d74" font-weight="600">Visible Items</text>
  <text x="550" y="283" font-size="10" fill="#2f9d74">(7 items in viewport)</text>
  <line x1="502" y1="275" x2="545" y2="275" stroke="#2f9d74" stroke-width="1.5"/>

  <!-- Overscan below -->
  <rect x="260" y="370" width="240" height="60" rx="4" fill="#d97843" opacity="0.15" stroke="#d97843" stroke-width="2" stroke-dasharray="4"/>
  <rect x="268" y="378" width="224" height="14" rx="3" fill="#d97843" opacity="0.4"/>
  <text x="380" y="389" text-anchor="middle" font-size="9" fill="white" font-weight="600">Item 101</text>
  <rect x="268" y="395" width="224" height="14" rx="3" fill="#d97843" opacity="0.4"/>
  <text x="380" y="406" text-anchor="middle" font-size="9" fill="white" font-weight="600">Item 102</text>
  <rect x="268" y="412" width="224" height="14" rx="3" fill="#d97843" opacity="0.4"/>
  <text x="380" y="423" text-anchor="middle" font-size="9" fill="white" font-weight="600">Item 103</text>

  <!-- Overscan label below -->
  <text x="550" y="393" font-size="11" fill="#d97843" font-weight="600">Overscan Buffer</text>
  <text x="550" y="408" font-size="10" fill="#d97843">(3 items below)</text>
  <line x1="502" y1="400" x2="545" y2="400" stroke="#d97843" stroke-width="1.5"/>

  <!-- Below: not rendered -->
  <rect x="260" y="435" width="240" height="32" rx="4" fill="#f3f1f8" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <text x="380" y="455" text-anchor="middle" font-size="10" fill="#999">Items 104-10,000 (not rendered)</text>

  <!-- Scroll direction arrows -->
  <text x="130" y="155" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="600">Scroll Up</text>
  <polygon points="130,165 122,180 138,180" fill="#6d5bd0"/>
  <text x="130" y="175" text-anchor="middle" font-size="8" fill="white" font-weight="bold" dy="4"/>

  <text x="130" y="360" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="600">Scroll Down</text>
  <polygon points="130,370 122,370 130,385 138,370" fill="#6d5bd0"/>

  <text x="130" y="260" text-anchor="middle" font-size="10" fill="#6d5bd0">Buffer prevents</text>
  <text x="130" y="275" text-anchor="middle" font-size="10" fill="#6d5bd0">white flash</text>
  <text x="130" y="290" text-anchor="middle" font-size="10" fill="#6d5bd0">during fast</text>
  <text x="130" y="305" text-anchor="middle" font-size="10" fill="#6d5bd0">scrolling</text>

  <!-- Total items rendered -->
  <rect x="550" y="440" width="300" height="40" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="700" y="458" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Total DOM nodes: 7 visible + 6 overscan = 13</text>
  <text x="700" y="473" text-anchor="middle" font-size="10" fill="#6d5bd0">vs 10,000 without virtualization</text>
</svg>