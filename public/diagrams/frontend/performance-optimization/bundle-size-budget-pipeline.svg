<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="900" height="500" rx="8" fill="#f3f1f8"/>

  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">CI/CD Performance Budget Pipeline</text>

  <!-- Pipeline stages -->
  <!-- Stage 1: Build -->
  <rect x="50" y="100" width="160" height="100" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Build</text>
  <text x="130" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d4ccf0">pnpm build</text>
  <text x="130" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d4ccf0">production mode</text>

  <!-- Arrow -->
  <line x1="210" y1="150" x2="260" y2="150" stroke="#6d5bd0" stroke-width="3" marker-end="url(#arrowPipe)"/>

  <!-- Stage 2: Measure Size -->
  <rect x="260" y="100" width="160" height="100" rx="8" fill="#d97843" stroke="#c06a35" stroke-width="2"/>
  <text x="340" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Measure</text>
  <text x="340" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Size</text>
  <text x="340" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fde0cc">size-limit / bundlesize</text>

  <!-- Arrow -->
  <line x1="420" y1="150" x2="470" y2="150" stroke="#d97843" stroke-width="3" marker-end="url(#arrowOrangePipe)"/>

  <!-- Stage 3: Compare Budget -->
  <rect x="470" y="100" width="160" height="100" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="550" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Compare</text>
  <text x="550" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Budget</text>
  <text x="550" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d4ccf0">vs. thresholds</text>

  <!-- Arrow -->
  <line x1="630" y1="150" x2="680" y2="150" stroke="#6d5bd0" stroke-width="3" marker-end="url(#arrowPipe)"/>

  <!-- Stage 4: Pass/Fail Gate -->
  <rect x="680" y="100" width="170" height="100" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="765" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1a1822">Gate</text>
  <text x="765" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Pass or Fail CI</text>

  <!-- Pass branch -->
  <line x1="720" y1="200" x2="720" y2="260" stroke="#2f9d74" stroke-width="2.5" marker-end="url(#arrowGreenPipe)"/>
  <rect x="640" y="260" width="160" height="60" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="2"/>
  <text x="720" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">PASS</text>
  <text x="720" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d4f5e6">merge allowed</text>

  <!-- Fail branch -->
  <line x1="810" y1="200" x2="810" y2="260" stroke="#c44d4d" stroke-width="2.5" marker-end="url(#arrowRedPipe)"/>
  <rect x="730" y="260" width="160" height="60" rx="8" fill="#c44d4d" stroke="#a83a3a" stroke-width="2"/>
  <text x="810" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">FAIL</text>
  <text x="810" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#f5d4d4">PR blocked</text>

  <!-- Budget thresholds example -->
  <rect x="50" y="250" width="540" height="220" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="320" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1822">Example Budget Configuration</text>
  <line x1="70" y1="290" x2="570" y2="290" stroke="#f3f1f8" stroke-width="1.5"/>

  <!-- Table header -->
  <text x="120" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6d5bd0">Chunk</text>
  <text x="280" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6d5bd0">Max Size (gzip)</text>
  <text x="440" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6d5bd0">Status</text>

  <line x1="70" y1="325" x2="570" y2="325" stroke="#e8e4f0" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="120" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">main.js</text>
  <text x="280" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">150 KB</text>
  <rect x="400" y="335" width="80" height="22" rx="4" fill="#2f9d74" opacity="0.15"/>
  <text x="440" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2f9d74">120 KB</text>

  <!-- Row 2 -->
  <text x="120" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">vendor.js</text>
  <text x="280" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">200 KB</text>
  <rect x="400" y="365" width="80" height="22" rx="4" fill="#2f9d74" opacity="0.15"/>
  <text x="440" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2f9d74">185 KB</text>

  <!-- Row 3 -->
  <text x="120" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">route-*.js</text>
  <text x="280" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">50 KB each</text>
  <rect x="400" y="395" width="80" height="22" rx="4" fill="#c44d4d" opacity="0.15"/>
  <text x="440" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#c44d4d">62 KB</text>

  <!-- Row 4 -->
  <text x="120" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">total initial</text>
  <text x="280" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">400 KB</text>
  <rect x="400" y="425" width="80" height="22" rx="4" fill="#2f9d74" opacity="0.15"/>
  <text x="440" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2f9d74">305 KB</text>

  <!-- Note -->
  <text x="320" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666" font-style="italic">route-settings.js exceeds 50 KB budget — CI fails, PR is blocked</text>

  <defs>
    <marker id="arrowPipe" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowOrangePipe" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
    <marker id="arrowGreenPipe" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="arrowRedPipe" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c44d4d"/>
    </marker>
  </defs>
</svg>