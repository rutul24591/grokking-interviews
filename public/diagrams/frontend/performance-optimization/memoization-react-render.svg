<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">React Component Tree — Re-renders With &amp; Without React.memo</text>

  <!-- WITHOUT MEMO side -->
  <text x="225" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#d97843">Without React.memo</text>
  <text x="225" y="88" text-anchor="middle" font-size="11" fill="#666">Parent state change re-renders entire subtree</text>

  <!-- App (root - state changed) -->
  <rect x="165" y="100" width="120" height="40" rx="8" fill="#d97843"/>
  <text x="225" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="white">App (setState)</text>

  <!-- Lines to children -->
  <line x1="195" y1="140" x2="115" y2="175" stroke="#d97843" stroke-width="1.5"/>
  <line x1="225" y1="140" x2="225" y2="175" stroke="#d97843" stroke-width="1.5"/>
  <line x1="255" y1="140" x2="335" y2="175" stroke="#d97843" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="55" y="175" width="120" height="36" rx="6" fill="#d97843" opacity="0.85"/>
  <text x="115" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Header</text>

  <!-- Content -->
  <rect x="165" y="175" width="120" height="36" rx="6" fill="#d97843" opacity="0.85"/>
  <text x="225" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Content</text>

  <!-- Sidebar -->
  <rect x="275" y="175" width="120" height="36" rx="6" fill="#d97843" opacity="0.85"/>
  <text x="335" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Sidebar</text>

  <!-- Content children -->
  <line x1="200" y1="211" x2="155" y2="240" stroke="#d97843" stroke-width="1.5"/>
  <line x1="250" y1="211" x2="295" y2="240" stroke="#d97843" stroke-width="1.5"/>

  <rect x="85" y="240" width="130" height="36" rx="6" fill="#d97843" opacity="0.85"/>
  <text x="150" y="263" text-anchor="middle" font-size="11" font-weight="bold" fill="white">ExpensiveChart</text>

  <rect x="230" y="240" width="130" height="36" rx="6" fill="#d97843" opacity="0.85"/>
  <text x="295" y="263" text-anchor="middle" font-size="11" font-weight="bold" fill="white">UserList</text>

  <!-- Sidebar children -->
  <line x1="335" y1="211" x2="335" y2="240" stroke="#d97843" stroke-width="1.5"/>
  <rect x="275" y="240" width="120" height="36" rx="6" fill="#d97843" opacity="0.85"/>
  <text x="335" y="263" text-anchor="middle" font-size="11" font-weight="bold" fill="white">NavItems</text>

  <!-- Result label -->
  <rect x="100" y="295" width="250" height="28" rx="6" fill="#fde8e8" stroke="#d97843" stroke-width="1"/>
  <text x="225" y="314" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97843">7 components re-rendered (100ms wasted)</text>

  <!-- WITH MEMO side -->
  <text x="675" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#2f9d74">With React.memo</text>
  <text x="675" y="88" text-anchor="middle" font-size="11" fill="#666">Only components with changed props re-render</text>

  <!-- App (root - state changed) -->
  <rect x="615" y="100" width="120" height="40" rx="8" fill="#d97843"/>
  <text x="675" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="white">App (setState)</text>

  <!-- Lines to children -->
  <line x1="645" y1="140" x2="565" y2="175" stroke="#ccc" stroke-width="1.5"/>
  <line x1="675" y1="140" x2="675" y2="175" stroke="#d97843" stroke-width="1.5"/>
  <line x1="705" y1="140" x2="785" y2="175" stroke="#ccc" stroke-width="1.5"/>

  <!-- Header (skipped) -->
  <rect x="505" y="175" width="120" height="36" rx="6" fill="#2f9d74" opacity="0.85"/>
  <text x="565" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Header</text>
  <text x="565" y="207" text-anchor="middle" font-size="9" fill="white">memo - skipped</text>

  <!-- Content (re-renders - has state) -->
  <rect x="615" y="175" width="120" height="36" rx="6" fill="#d97843" opacity="0.85"/>
  <text x="675" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Content</text>

  <!-- Sidebar (skipped) -->
  <rect x="725" y="175" width="120" height="36" rx="6" fill="#2f9d74" opacity="0.85"/>
  <text x="785" y="194" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Sidebar</text>
  <text x="785" y="207" text-anchor="middle" font-size="9" fill="white">memo - skipped</text>

  <!-- Content children -->
  <line x1="650" y1="211" x2="605" y2="240" stroke="#ccc" stroke-width="1.5"/>
  <line x1="700" y1="211" x2="745" y2="240" stroke="#ccc" stroke-width="1.5"/>

  <rect x="535" y="240" width="130" height="36" rx="6" fill="#2f9d74" opacity="0.85"/>
  <text x="600" y="256" text-anchor="middle" font-size="11" font-weight="bold" fill="white">ExpensiveChart</text>
  <text x="600" y="270" text-anchor="middle" font-size="9" fill="white">memo - skipped</text>

  <rect x="680" y="240" width="130" height="36" rx="6" fill="#2f9d74" opacity="0.85"/>
  <text x="745" y="256" text-anchor="middle" font-size="11" font-weight="bold" fill="white">UserList</text>
  <text x="745" y="270" text-anchor="middle" font-size="9" fill="white">memo - skipped</text>

  <!-- Sidebar children (skipped) -->
  <line x1="785" y1="211" x2="785" y2="240" stroke="#ccc" stroke-width="1.5"/>
  <rect x="725" y="240" width="120" height="36" rx="6" fill="#2f9d74" opacity="0.85"/>
  <text x="785" y="256" text-anchor="middle" font-size="11" font-weight="bold" fill="white">NavItems</text>
  <text x="785" y="270" text-anchor="middle" font-size="9" fill="white">memo - skipped</text>

  <!-- Result label -->
  <rect x="555" y="295" width="240" height="28" rx="6" fill="#e6f5ec" stroke="#2f9d74" stroke-width="1"/>
  <text x="675" y="314" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f9d74">2 components re-rendered (5ms total)</text>

  <!-- Divider -->
  <line x1="450" y1="65" x2="450" y2="330" stroke="#ccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Legend -->
  <rect x="200" y="360" width="500" height="120" rx="8" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="450" y="385" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Legend</text>

  <rect x="230" y="400" width="20" height="16" rx="3" fill="#d97843"/>
  <text x="260" y="413" font-size="12" fill="#1a1822">Re-rendered (props may not have changed)</text>

  <rect x="230" y="425" width="20" height="16" rx="3" fill="#2f9d74"/>
  <text x="260" y="438" font-size="12" fill="#1a1822">Skipped by React.memo (props unchanged, reuse cached output)</text>

  <text x="230" y="465" font-size="11" fill="#666">Key insight: React.memo prevents the re-render cascade for components whose props haven't changed</text>
</svg>