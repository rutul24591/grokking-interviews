<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1822">Page Load Timeline — Key Performance Markers</text>

  <!-- Timeline axis -->
  <line x1="60" y1="80" x2="860" y2="80" stroke="#1a1822" stroke-width="2"/>
  <text x="60" y="72" text-anchor="middle" font-size="10" fill="#555">0ms</text>
  <text x="220" y="72" text-anchor="middle" font-size="10" fill="#555">200ms</text>
  <text x="380" y="72" text-anchor="middle" font-size="10" fill="#555">500ms</text>
  <text x="540" y="72" text-anchor="middle" font-size="10" fill="#555">1s</text>
  <text x="700" y="72" text-anchor="middle" font-size="10" fill="#555">2s</text>
  <text x="860" y="72" text-anchor="middle" font-size="10" fill="#555">3s+</text>

  <!-- Tick marks -->
  <line x1="60" y1="76" x2="60" y2="84" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="220" y1="76" x2="220" y2="84" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="380" y1="76" x2="380" y2="84" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="540" y1="76" x2="540" y2="84" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="700" y1="76" x2="700" y2="84" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="860" y1="76" x2="860" y2="84" stroke="#1a1822" stroke-width="1.5"/>

  <!-- TTFB Marker -->
  <line x1="140" y1="80" x2="140" y2="110" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="90" y="110" width="100" height="40" rx="6" fill="#6d5bd0"/>
  <text x="140" y="128" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">TTFB</text>
  <text x="140" y="142" text-anchor="middle" font-size="8" fill="#e8e4f3">~100-200ms</text>

  <!-- FCP Marker -->
  <line x1="300" y1="80" x2="300" y2="110" stroke="#2f9d74" stroke-width="2"/>
  <rect x="250" y="110" width="100" height="40" rx="6" fill="#2f9d74"/>
  <text x="300" y="128" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">FCP</text>
  <text x="300" y="142" text-anchor="middle" font-size="8" fill="#e6f5ef">~300-500ms</text>

  <!-- LCP Marker -->
  <line x1="500" y1="80" x2="500" y2="110" stroke="#d97843" stroke-width="2"/>
  <rect x="445" y="110" width="110" height="40" rx="6" fill="#d97843"/>
  <text x="500" y="128" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">LCP</text>
  <text x="500" y="142" text-anchor="middle" font-size="8" fill="#fef3ec">≤ 2500ms (good)</text>

  <!-- TTI Marker -->
  <line x1="660" y1="80" x2="660" y2="110" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="605" y="110" width="110" height="40" rx="6" fill="#6d5bd0"/>
  <text x="660" y="128" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">TTI</text>
  <text x="660" y="142" text-anchor="middle" font-size="8" fill="#e8e4f3">≤ 3800ms (good)</text>

  <!-- What affects each metric -->
  <text x="450" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">What Affects Each Metric</text>

  <!-- TTFB Column -->
  <rect x="40" y="195" width="185" height="175" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="40" y="195" width="185" height="28" rx="8" fill="#6d5bd0"/>
  <rect x="40" y="211" width="185" height="12" fill="#6d5bd0"/>
  <text x="132" y="214" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">TTFB</text>
  <text x="55" y="245" font-size="10" fill="#1a1822">• Server response time</text>
  <text x="55" y="263" font-size="10" fill="#1a1822">• CDN / Edge placement</text>
  <text x="55" y="281" font-size="10" fill="#1a1822">• DNS lookup time</text>
  <text x="55" y="299" font-size="10" fill="#1a1822">• TLS handshake</text>
  <text x="55" y="317" font-size="10" fill="#1a1822">• SSR computation</text>
  <text x="55" y="335" font-size="10" fill="#1a1822">• Database queries</text>
  <text x="55" y="358" font-size="10" fill="#2f9d74" font-weight="600">Fix: Edge, cache, stream</text>

  <!-- FCP Column -->
  <rect x="245" y="195" width="185" height="175" rx="8" fill="#fff" stroke="#2f9d74" stroke-width="1.5"/>
  <rect x="245" y="195" width="185" height="28" rx="8" fill="#2f9d74"/>
  <rect x="245" y="211" width="185" height="12" fill="#2f9d74"/>
  <text x="337" y="214" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">FCP</text>
  <text x="260" y="245" font-size="10" fill="#1a1822">• Render-blocking CSS</text>
  <text x="260" y="263" font-size="10" fill="#1a1822">• Parser-blocking JS</text>
  <text x="260" y="281" font-size="10" fill="#1a1822">• Web font loading</text>
  <text x="260" y="299" font-size="10" fill="#1a1822">• HTML document size</text>
  <text x="260" y="317" font-size="10" fill="#1a1822">• TTFB (cascading)</text>
  <text x="260" y="335" font-size="10" fill="#1a1822">• Critical CSS amount</text>
  <text x="260" y="358" font-size="10" fill="#2f9d74" font-weight="600">Fix: Inline CSS, defer JS</text>

  <!-- LCP Column -->
  <rect x="450" y="195" width="185" height="175" rx="8" fill="#fff" stroke="#d97843" stroke-width="1.5"/>
  <rect x="450" y="195" width="185" height="28" rx="8" fill="#d97843"/>
  <rect x="450" y="211" width="185" height="12" fill="#d97843"/>
  <text x="542" y="214" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">LCP</text>
  <text x="465" y="245" font-size="10" fill="#1a1822">• Hero image load time</text>
  <text x="465" y="263" font-size="10" fill="#1a1822">• Image format/size</text>
  <text x="465" y="281" font-size="10" fill="#1a1822">• Preload hints missing</text>
  <text x="465" y="299" font-size="10" fill="#1a1822">• Lazy-load on LCP img</text>
  <text x="465" y="317" font-size="10" fill="#1a1822">• Client-side rendering</text>
  <text x="465" y="335" font-size="10" fill="#1a1822">• fetchpriority not set</text>
  <text x="465" y="358" font-size="10" fill="#d97843" font-weight="600">Fix: Preload, priority, SSR</text>

  <!-- TTI Column -->
  <rect x="655" y="195" width="205" height="175" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="655" y="195" width="205" height="28" rx="8" fill="#6d5bd0"/>
  <rect x="655" y="211" width="205" height="12" fill="#6d5bd0"/>
  <text x="757" y="214" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">TTI</text>
  <text x="670" y="245" font-size="10" fill="#1a1822">• Main thread JS exec</text>
  <text x="670" y="263" font-size="10" fill="#1a1822">• Bundle size</text>
  <text x="670" y="281" font-size="10" fill="#1a1822">• Hydration cost</text>
  <text x="670" y="299" font-size="10" fill="#1a1822">• Third-party scripts</text>
  <text x="670" y="317" font-size="10" fill="#1a1822">• Long tasks (&gt; 50ms)</text>
  <text x="670" y="335" font-size="10" fill="#1a1822">• Event handler setup</text>
  <text x="670" y="358" font-size="10" fill="#6d5bd0" font-weight="600">Fix: Code split, defer, lazy</text>

  <!-- CLS note at bottom -->
  <rect x="40" y="390" width="820" height="95" rx="8" fill="#fff" stroke="#1a1822" stroke-width="1"/>
  <text x="450" y="413" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">CLS (Cumulative Layout Shift) — Target: ≤ 0.1</text>
  <text x="140" y="438" text-anchor="middle" font-size="10" fill="#555">Images without dimensions</text>
  <text x="340" y="438" text-anchor="middle" font-size="10" fill="#555">Web fonts swapping</text>
  <text x="540" y="438" text-anchor="middle" font-size="10" fill="#555">Dynamic content injection</text>
  <text x="740" y="438" text-anchor="middle" font-size="10" fill="#555">Ads/embeds resizing</text>
  <text x="140" y="462" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Set width/height</text>
  <text x="340" y="462" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">size-adjust / fallback</text>
  <text x="540" y="462" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Reserve space</text>
  <text x="740" y="462" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">min-height containers</text>
</svg>