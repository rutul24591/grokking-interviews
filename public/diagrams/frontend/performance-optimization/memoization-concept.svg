<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Memoization — Cache-Based Optimization</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#666">Return cached results for previously seen inputs instead of recomputing</text>

  <!-- Input -->
  <rect x="40" y="170" width="130" height="70" rx="8" fill="#6d5bd0"/>
  <text x="105" y="200" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Input</text>
  <text x="105" y="220" text-anchor="middle" font-size="11" fill="white">(args / props)</text>

  <!-- Arrow Input to Cache Check -->
  <line x1="170" y1="205" x2="240" y2="205" stroke="#1a1822" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cache Check (Diamond) -->
  <polygon points="320,155 400,205 320,255 240,205" fill="white" stroke="#d97843" stroke-width="2"/>
  <text x="320" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#d97843">Cache</text>
  <text x="320" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#d97843">Hit?</text>

  <!-- Cache Hit path (top) -->
  <line x1="320" y1="155" x2="320" y2="100" stroke="#2f9d74" stroke-width="2"/>
  <line x1="320" y1="100" x2="720" y2="100" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="370" y="82" width="80" height="24" rx="4" fill="#e6f5ec"/>
  <text x="410" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f9d74">HIT</text>
  <text x="510" y="98" text-anchor="middle" font-size="11" fill="#2f9d74">Skip computation</text>

  <!-- Cache Miss path (right) -->
  <line x1="400" y1="205" x2="470" y2="205" stroke="#d97843" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="415" y="188" width="60" height="24" rx="4" fill="#fef0e5"/>
  <text x="445" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97843">MISS</text>

  <!-- Compute -->
  <rect x="470" y="170" width="150" height="70" rx="8" fill="white" stroke="#d97843" stroke-width="2"/>
  <text x="545" y="198" text-anchor="middle" font-size="14" font-weight="bold" fill="#d97843">Compute</text>
  <text x="545" y="218" text-anchor="middle" font-size="11" fill="#666">Execute function</text>
  <text x="545" y="232" text-anchor="middle" font-size="11" fill="#666">with given args</text>

  <!-- Arrow Compute to Store -->
  <line x1="545" y1="240" x2="545" y2="300" stroke="#1a1822" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Store in Cache -->
  <rect x="470" y="300" width="150" height="55" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="545" y="324" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Store</text>
  <text x="545" y="342" text-anchor="middle" font-size="11" fill="#666">Save result in cache</text>

  <!-- Arrow Store to Return -->
  <line x1="620" y1="327" x2="720" y2="200" stroke="#1a1822" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Return Result -->
  <rect x="720" y="85" width="140" height="130" rx="8" fill="#2f9d74"/>
  <text x="790" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Return</text>
  <text x="790" y="160" text-anchor="middle" font-size="12" fill="white">Result</text>
  <text x="790" y="180" text-anchor="middle" font-size="11" fill="white">(cached or fresh)</text>

  <!-- Cache visualization -->
  <rect x="100" y="330" width="310" height="140" rx="8" fill="white" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="255" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Memo Cache (Map)</text>
  <line x1="115" y1="365" x2="395" y2="365" stroke="#ede9f7" stroke-width="1"/>

  <text x="180" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">Key (Args)</text>
  <text x="330" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">Value (Result)</text>
  <line x1="115" y1="392" x2="395" y2="392" stroke="#ede9f7" stroke-width="1"/>
  <line x1="255" y1="365" x2="255" y2="462" stroke="#ede9f7" stroke-width="1"/>

  <text x="180" y="410" text-anchor="middle" font-size="11" fill="#1a1822">fn(1, 2)</text>
  <text x="330" y="410" text-anchor="middle" font-size="11" fill="#2f9d74">3</text>

  <text x="180" y="430" text-anchor="middle" font-size="11" fill="#1a1822">fn(5, 10)</text>
  <text x="330" y="430" text-anchor="middle" font-size="11" fill="#2f9d74">15</text>

  <text x="180" y="450" text-anchor="middle" font-size="11" fill="#d97843">fn(3, 7) -- new</text>
  <text x="330" y="450" text-anchor="middle" font-size="11" fill="#d97843">computing...</text>

  <!-- React context note -->
  <rect x="500" y="390" width="360" height="80" rx="8" fill="white" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="680" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">In React</text>
  <text x="680" y="435" text-anchor="middle" font-size="11" fill="#1a1822">React.memo: cache = previous render output</text>
  <text x="680" y="452" text-anchor="middle" font-size="11" fill="#1a1822">useMemo: cache = computed value from deps</text>
  <text x="680" y="469" text-anchor="middle" font-size="11" fill="#1a1822">useCallback: cache = function reference</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1822"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f9d74"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97843"/>
    </marker>
  </defs>
</svg>