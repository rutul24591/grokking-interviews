<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Debounce: Wait for Silence Before Executing</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6d5bd0">delay = 300ms</text>

  <!-- Time axis -->
  <line x1="80" y1="440" x2="850" y2="440" stroke="#1a1822" stroke-width="2"/>
  <text x="850" y="460" text-anchor="end" font-size="11" fill="#1a1822">Time (ms)</text>

  <!-- Time markers -->
  <line x1="100" y1="435" x2="100" y2="445" stroke="#1a1822" stroke-width="1.5"/>
  <text x="100" y="462" text-anchor="middle" font-size="9" fill="#1a1822">0</text>
  <line x1="220" y1="435" x2="220" y2="445" stroke="#1a1822" stroke-width="1.5"/>
  <text x="220" y="462" text-anchor="middle" font-size="9" fill="#1a1822">200</text>
  <line x1="340" y1="435" x2="340" y2="445" stroke="#1a1822" stroke-width="1.5"/>
  <text x="340" y="462" text-anchor="middle" font-size="9" fill="#1a1822">400</text>
  <line x1="460" y1="435" x2="460" y2="445" stroke="#1a1822" stroke-width="1.5"/>
  <text x="460" y="462" text-anchor="middle" font-size="9" fill="#1a1822">600</text>
  <line x1="580" y1="435" x2="580" y2="445" stroke="#1a1822" stroke-width="1.5"/>
  <text x="580" y="462" text-anchor="middle" font-size="9" fill="#1a1822">800</text>
  <line x1="700" y1="435" x2="700" y2="445" stroke="#1a1822" stroke-width="1.5"/>
  <text x="700" y="462" text-anchor="middle" font-size="9" fill="#1a1822">1000</text>
  <line x1="820" y1="435" x2="820" y2="445" stroke="#1a1822" stroke-width="1.5"/>
  <text x="820" y="462" text-anchor="middle" font-size="9" fill="#1a1822">1200</text>

  <!-- Row 1: Raw Events (keystrokes) -->
  <text x="50" y="110" text-anchor="end" font-size="12" font-weight="600" fill="#1a1822">Raw</text>
  <text x="50" y="125" text-anchor="end" font-size="12" font-weight="600" fill="#1a1822">Events</text>
  <line x1="80" y1="115" x2="850" y2="115" stroke="#ddd" stroke-width="1"/>

  <!-- Keystrokes: rapid burst then pause then more -->
  <line x1="100" y1="90" x2="100" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="100" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">r</text>
  <line x1="140" y1="90" x2="140" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="140" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">e</text>
  <line x1="180" y1="90" x2="180" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="180" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">a</text>
  <line x1="220" y1="90" x2="220" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="220" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">c</text>
  <line x1="260" y1="90" x2="260" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="260" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">t</text>

  <!-- Second burst after a pause -->
  <line x1="460" y1="90" x2="460" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="460" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">space</text>
  <line x1="500" y1="90" x2="500" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="500" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">h</text>
  <line x1="540" y1="90" x2="540" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="540" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">o</text>
  <line x1="580" y1="90" x2="580" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="580" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">o</text>
  <line x1="620" y1="90" x2="620" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="620" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">k</text>
  <line x1="660" y1="90" x2="660" y2="115" stroke="#6d5bd0" stroke-width="3"/>
  <text x="660" y="85" text-anchor="middle" font-size="9" fill="#6d5bd0">s</text>

  <!-- Row 2: Debounce Timer -->
  <text x="50" y="210" text-anchor="end" font-size="12" font-weight="600" fill="#1a1822">Timer</text>
  <text x="50" y="225" text-anchor="end" font-size="12" font-weight="600" fill="#1a1822">(300ms)</text>
  <line x1="80" y1="215" x2="850" y2="215" stroke="#ddd" stroke-width="1"/>

  <!-- Timer bars: each keystroke resets timer -->
  <!-- Timer from 'r' - cancelled by 'e' -->
  <rect x="100" y="200" width="40" height="8" rx="2" fill="#d97843" opacity="0.3"/>
  <line x1="140" y1="196" x2="140" y2="212" stroke="#d97843" stroke-width="1.5"/>
  <text x="140" y="192" text-anchor="middle" font-size="8" fill="#d97843">reset</text>

  <!-- Timer from 'e' - cancelled by 'a' -->
  <rect x="140" y="200" width="40" height="8" rx="2" fill="#d97843" opacity="0.3"/>
  <line x1="180" y1="196" x2="180" y2="212" stroke="#d97843" stroke-width="1.5"/>
  <text x="180" y="192" text-anchor="middle" font-size="8" fill="#d97843">reset</text>

  <!-- Timer from 'a' - cancelled by 'c' -->
  <rect x="180" y="200" width="40" height="8" rx="2" fill="#d97843" opacity="0.3"/>
  <line x1="220" y1="196" x2="220" y2="212" stroke="#d97843" stroke-width="1.5"/>
  <text x="220" y="192" text-anchor="middle" font-size="8" fill="#d97843">reset</text>

  <!-- Timer from 'c' - cancelled by 't' -->
  <rect x="220" y="200" width="40" height="8" rx="2" fill="#d97843" opacity="0.3"/>
  <line x1="260" y1="196" x2="260" y2="212" stroke="#d97843" stroke-width="1.5"/>
  <text x="260" y="192" text-anchor="middle" font-size="8" fill="#d97843">reset</text>

  <!-- Timer from 't' - completes! 300ms = to ~440 -->
  <rect x="260" y="200" width="180" height="8" rx="2" fill="#2f9d74" opacity="0.5"/>
  <text x="350" y="230" text-anchor="middle" font-size="9" fill="#2f9d74">300ms passes with no events</text>

  <!-- Execution marker -->
  <line x1="440" y1="185" x2="440" y2="220" stroke="#2f9d74" stroke-width="3"/>
  <circle cx="440" cy="185" r="6" fill="#2f9d74"/>
  <text x="440" y="176" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="bold">EXECUTE</text>
  <text x="440" y="165" text-anchor="middle" font-size="9" fill="#2f9d74">search("react")</text>

  <!-- Second burst timers -->
  <rect x="460" y="200" width="40" height="8" rx="2" fill="#d97843" opacity="0.3"/>
  <rect x="500" y="200" width="40" height="8" rx="2" fill="#d97843" opacity="0.3"/>
  <rect x="540" y="200" width="40" height="8" rx="2" fill="#d97843" opacity="0.3"/>
  <rect x="580" y="200" width="40" height="8" rx="2" fill="#d97843" opacity="0.3"/>
  <rect x="620" y="200" width="40" height="8" rx="2" fill="#d97843" opacity="0.3"/>

  <!-- Timer from 's' - completes at 840 -->
  <rect x="660" y="200" width="180" height="8" rx="2" fill="#2f9d74" opacity="0.5"/>
  <text x="750" y="230" text-anchor="middle" font-size="9" fill="#2f9d74">300ms passes with no events</text>

  <!-- Second execution -->
  <line x1="840" y1="185" x2="840" y2="220" stroke="#2f9d74" stroke-width="3"/>
  <circle cx="840" cy="185" r="6" fill="#2f9d74"/>
  <text x="840" y="176" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="bold">EXECUTE</text>
  <text x="840" y="165" text-anchor="middle" font-size="9" fill="#2f9d74">search("react hooks")</text>

  <!-- Row 3: Without debounce -->
  <text x="50" y="310" text-anchor="end" font-size="12" font-weight="600" fill="#1a1822">Without</text>
  <text x="50" y="325" text-anchor="end" font-size="12" font-weight="600" fill="#d97843">Debounce</text>
  <line x1="80" y1="315" x2="850" y2="315" stroke="#ddd" stroke-width="1"/>

  <!-- All events fire -->
  <line x1="100" y1="295" x2="100" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="140" y1="295" x2="140" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="180" y1="295" x2="180" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="220" y1="295" x2="220" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="260" y1="295" x2="260" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="460" y1="295" x2="460" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="500" y1="295" x2="500" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="540" y1="295" x2="540" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="580" y1="295" x2="580" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="620" y1="295" x2="620" y2="315" stroke="#d97843" stroke-width="3"/>
  <line x1="660" y1="295" x2="660" y2="315" stroke="#d97843" stroke-width="3"/>
  <text x="380" y="340" text-anchor="middle" font-size="11" fill="#d97843" font-weight="600">11 API calls fired (10 wasted)</text>

  <!-- Row 4: With debounce -->
  <text x="50" y="390" text-anchor="end" font-size="12" font-weight="600" fill="#1a1822">With</text>
  <text x="50" y="405" text-anchor="end" font-size="12" font-weight="600" fill="#2f9d74">Debounce</text>
  <line x1="80" y1="395" x2="850" y2="395" stroke="#ddd" stroke-width="1"/>

  <line x1="440" y1="375" x2="440" y2="395" stroke="#2f9d74" stroke-width="4"/>
  <circle cx="440" cy="375" r="5" fill="#2f9d74"/>
  <line x1="840" y1="375" x2="840" y2="395" stroke="#2f9d74" stroke-width="4"/>
  <circle cx="840" cy="375" r="5" fill="#2f9d74"/>
  <text x="640" y="420" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="600">Only 2 API calls (both meaningful)</text>

  <!-- Legend -->
  <rect x="120" y="475" width="16" height="3" fill="#6d5bd0"/>
  <text x="142" y="480" font-size="10" fill="#1a1822">Keystroke event</text>
  <rect x="270" y="475" width="16" height="3" fill="#d97843" opacity="0.3"/>
  <text x="292" y="480" font-size="10" fill="#1a1822">Timer (cancelled)</text>
  <rect x="430" y="475" width="16" height="3" fill="#2f9d74" opacity="0.5"/>
  <text x="452" y="480" font-size="10" fill="#1a1822">Timer (completed)</text>
  <circle cx="590" cy="477" r="4" fill="#2f9d74"/>
  <text x="600" y="480" font-size="10" fill="#1a1822">Execution</text>
</svg>