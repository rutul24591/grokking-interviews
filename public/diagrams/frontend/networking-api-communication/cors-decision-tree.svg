<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="450" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e1e2e">CORS Complete Decision Tree</text>

  <!-- Level 1: Same origin? -->
  <rect x="300" y="42" width="200" height="36" rx="8" fill="#3B82F6"/>
  <text x="400" y="65" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">Request initiated by JS</text>

  <line x1="400" y1="78" x2="400" y2="95" stroke="#475569" stroke-width="1.5"/>

  <!-- Decision: Same origin? -->
  <polygon points="400,95 480,120 400,145 320,120" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="400" y="124" text-anchor="middle" font-size="10" fill="#4338CA" font-weight="600">Same origin?</text>

  <!-- Yes: Same origin -->
  <line x1="320" y1="120" x2="90" y2="120" stroke="#10B981" stroke-width="1.5"/>
  <text x="200" y="115" text-anchor="middle" font-size="10" fill="#10B981" font-weight="600">Yes</text>
  <rect x="15" y="105" width="150" height="32" rx="6" fill="#10B981"/>
  <text x="90" y="126" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600">No CORS needed</text>

  <!-- No: Cross origin -->
  <line x1="400" y1="145" x2="400" y2="165" stroke="#EF4444" stroke-width="1.5"/>
  <text x="415" y="158" font-size="10" fill="#EF4444" font-weight="600">No</text>

  <!-- Decision: Simple request? -->
  <polygon points="400,165 490,192 400,219 310,192" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="400" y="196" text-anchor="middle" font-size="10" fill="#4338CA" font-weight="600">Simple request?</text>

  <!-- Yes: Simple -->
  <line x1="310" y1="192" x2="170" y2="192" stroke="#10B981" stroke-width="1.5"/>
  <text x="240" y="187" text-anchor="middle" font-size="10" fill="#10B981" font-weight="600">Yes</text>

  <!-- Simple request path -->
  <rect x="60" y="178" width="110" height="28" rx="5" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="115" y="197" text-anchor="middle" font-size="10" fill="#3B82F6">Send with Origin</text>

  <line x1="115" y1="206" x2="115" y2="226" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- No: Preflight needed -->
  <line x1="490" y1="192" x2="580" y2="192" stroke="#EF4444" stroke-width="1.5"/>
  <text x="530" y="187" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="600">No</text>

  <!-- Preflight path -->
  <rect x="580" y="178" width="150" height="28" rx="5" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="655" y="197" text-anchor="middle" font-size="10" fill="#6366F1">Send OPTIONS preflight</text>

  <line x1="655" y1="206" x2="655" y2="230" stroke="#6366F1" stroke-width="1.5"/>

  <!-- Decision: Server allows preflight? -->
  <polygon points="655,230 735,255 655,280 575,255" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="655" y="258" text-anchor="middle" font-size="9" fill="#4338CA" font-weight="600">Server allows?</text>

  <!-- Preflight denied -->
  <line x1="735" y1="255" x2="780" y2="255" stroke="#EF4444" stroke-width="1.5"/>
  <line x1="780" y1="255" x2="780" y2="290" stroke="#EF4444" stroke-width="1.5"/>
  <text x="760" y="248" font-size="9" fill="#EF4444">No</text>
  <rect x="710" y="290" width="80" height="28" rx="5" fill="#EF4444"/>
  <text x="750" y="309" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">BLOCKED</text>

  <!-- Preflight allowed -->
  <line x1="655" y1="280" x2="655" y2="300" stroke="#10B981" stroke-width="1.5"/>
  <text x="670" y="293" font-size="9" fill="#10B981">Yes</text>

  <rect x="590" y="300" width="130" height="28" rx="5" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="655" y="319" text-anchor="middle" font-size="10" fill="#3B82F6">Send actual request</text>

  <line x1="655" y1="328" x2="655" y2="345" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- Decision: Server allows origin? (for both paths) -->
  <!-- Simple path decision -->
  <polygon points="115,226 185,250 115,274 45,250" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="115" y="250" text-anchor="middle" font-size="9" fill="#4338CA" font-weight="600">Allow-Origin?</text>

  <!-- Simple path allowed -->
  <line x1="115" y1="274" x2="115" y2="300" stroke="#10B981" stroke-width="1.5"/>
  <text x="130" y="290" font-size="9" fill="#10B981">Match</text>

  <!-- Simple path denied -->
  <line x1="185" y1="250" x2="250" y2="250" stroke="#EF4444" stroke-width="1.5"/>
  <text x="210" y="245" font-size="9" fill="#EF4444">No match</text>
  <rect x="250" y="236" width="80" height="28" rx="5" fill="#EF4444"/>
  <text x="290" y="255" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">BLOCKED</text>

  <!-- Actual request decision -->
  <polygon points="655,345 725,368 655,391 585,368" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="655" y="372" text-anchor="middle" font-size="9" fill="#4338CA" font-weight="600">Allow-Origin?</text>

  <line x1="655" y1="391" x2="655" y2="415" stroke="#10B981" stroke-width="1.5"/>
  <text x="670" y="406" font-size="9" fill="#10B981">Match</text>

  <line x1="725" y1="368" x2="780" y2="368" stroke="#EF4444" stroke-width="1.5"/>
  <text x="750" y="363" font-size="9" fill="#EF4444">No</text>
  <rect x="755" y="355" width="30" height="28" rx="5" fill="#FEE2E2"/>
  <text x="770" y="374" text-anchor="middle" font-size="9" fill="#EF4444">X</text>

  <!-- Decision: Credentials? -->
  <polygon points="115,300 195,325 115,350 35,325" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="115" y="329" text-anchor="middle" font-size="9" fill="#92400E" font-weight="600">Credentials?</text>

  <!-- No credentials -->
  <line x1="35" y1="325" x2="15" y2="325" stroke="#10B981" stroke-width="1.5"/>
  <line x1="15" y1="325" x2="15" y2="400" stroke="#10B981" stroke-width="1.5"/>
  <text x="22" y="340" font-size="9" fill="#10B981">No</text>

  <!-- Success -->
  <rect x="15" y="400" width="100" height="32" rx="6" fill="#10B981"/>
  <text x="65" y="421" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">SUCCESS</text>

  <!-- Credentials yes -->
  <line x1="115" y1="350" x2="115" y2="370" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="130" y="364" font-size="9" fill="#F59E0B">Yes</text>

  <polygon points="115,370 205,395 115,420 25,395" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="115" y="393" text-anchor="middle" font-size="8" fill="#92400E" font-weight="600">Allow-Credentials</text>
  <text x="115" y="404" text-anchor="middle" font-size="8" fill="#92400E" font-weight="600">= true?</text>

  <line x1="205" y1="395" x2="260" y2="395" stroke="#EF4444" stroke-width="1.5"/>
  <text x="225" y="390" font-size="9" fill="#EF4444">No</text>
  <rect x="260" y="381" width="80" height="28" rx="5" fill="#EF4444"/>
  <text x="300" y="400" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">BLOCKED</text>

  <line x1="115" y1="420" x2="115" y2="438" stroke="#10B981" stroke-width="1.5"/>
  <text x="130" y="434" font-size="9" fill="#10B981">Yes</text>
  <rect x="75" y="436" width="80" height="14" rx="3" fill="#D1FAE5"/>
  <text x="115" y="447" text-anchor="middle" font-size="9" fill="#065F46" font-weight="600">SUCCESS</text>

  <!-- Actual request success -->
  <rect x="620" y="415" width="70" height="28" rx="6" fill="#10B981"/>
  <text x="655" y="434" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">SUCCESS</text>

  <!-- Info box -->
  <rect x="360" y="280" width="190" height="70" rx="6" fill="#F8FAFC" stroke="#e2e8f0"/>
  <text x="455" y="296" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Key insight</text>
  <text x="455" y="312" text-anchor="middle" font-size="9" fill="#475569">CORS is enforced by the</text>
  <text x="455" y="324" text-anchor="middle" font-size="9" fill="#475569">browser, not the server. The</text>
  <text x="455" y="336" text-anchor="middle" font-size="9" fill="#475569">server always processes requests.</text>
</svg>