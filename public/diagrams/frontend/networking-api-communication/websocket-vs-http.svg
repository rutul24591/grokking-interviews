<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">HTTP vs WebSocket Communication Model</text>

  <!-- Time axis -->
  <line x1="160" y1="380" x2="770" y2="380" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="770" y="396" text-anchor="end" font-size="11" fill="#94A3B8">Time</text>

  <!-- ========== HTTP Section ========== -->
  <rect x="20" y="50" width="760" height="140" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="90" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#EF4444">HTTP</text>
  <text x="90" y="92" text-anchor="middle" font-size="10" fill="#94A3B8">Half-Duplex</text>

  <!-- HTTP Connection 1 -->
  <rect x="170" y="70" width="120" height="20" rx="4" fill="#3B82F6"/>
  <text x="230" y="84" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="500">Request 1</text>
  <rect x="170" y="94" width="120" height="20" rx="4" fill="#6366F1"/>
  <text x="230" y="108" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="500">Response 1</text>

  <!-- Gap indicator -->
  <text x="310" y="100" font-size="18" fill="#CBD5E1">|</text>
  <text x="310" y="130" text-anchor="middle" font-size="8" fill="#94A3B8">conn close</text>

  <!-- HTTP Connection 2 -->
  <rect x="330" y="70" width="120" height="20" rx="4" fill="#3B82F6"/>
  <text x="390" y="84" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="500">Request 2</text>
  <rect x="330" y="94" width="120" height="20" rx="4" fill="#6366F1"/>
  <text x="390" y="108" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="500">Response 2</text>

  <!-- Gap indicator -->
  <text x="470" y="100" font-size="18" fill="#CBD5E1">|</text>
  <text x="470" y="130" text-anchor="middle" font-size="8" fill="#94A3B8">conn close</text>

  <!-- HTTP Connection 3 -->
  <rect x="490" y="70" width="120" height="20" rx="4" fill="#3B82F6"/>
  <text x="550" y="84" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="500">Request 3</text>
  <rect x="490" y="94" width="120" height="20" rx="4" fill="#6366F1"/>
  <text x="550" y="108" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="500">Response 3</text>

  <!-- HTTP overhead labels -->
  <text x="230" y="150" text-anchor="middle" font-size="9" fill="#EF4444">~500B headers</text>
  <text x="390" y="150" text-anchor="middle" font-size="9" fill="#EF4444">~500B headers</text>
  <text x="550" y="150" text-anchor="middle" font-size="9" fill="#EF4444">~500B headers</text>

  <!-- Curly brace arrows showing overhead -->
  <text x="390" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444">New TCP + TLS handshake each time (or keep-alive with overhead per request)</text>

  <!-- ========== WebSocket Section ========== -->
  <rect x="20" y="200" width="760" height="160" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="90" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#10B981">WebSocket</text>
  <text x="90" y="242" text-anchor="middle" font-size="10" fill="#94A3B8">Full-Duplex</text>

  <!-- Handshake -->
  <rect x="170" y="220" width="80" height="36" rx="4" fill="#F59E0B"/>
  <text x="210" y="234" text-anchor="middle" font-size="8" fill="#ffffff" font-weight="600">HTTP</text>
  <text x="210" y="246" text-anchor="middle" font-size="8" fill="#ffffff" font-weight="600">Upgrade</text>

  <!-- Persistent connection bar -->
  <rect x="254" y="220" width="496" height="36" rx="4" fill="#10B981"/>
  <text x="502" y="234" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">Persistent Bidirectional Connection</text>
  <text x="502" y="248" text-anchor="middle" font-size="9" fill="#D1FAE5">Single TCP connection - 2-6 bytes overhead per frame</text>

  <!-- Message arrows inside WebSocket bar -->
  <!-- Client to Server messages -->
  <line x1="290" y1="272" x2="330" y2="272" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlueSmall)"/>
  <line x1="400" y1="272" x2="440" y2="272" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlueSmall)"/>
  <line x1="560" y1="272" x2="600" y2="272" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlueSmall)"/>

  <!-- Server to Client messages -->
  <line x1="340" y1="290" x2="300" y2="290" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigoSmall)"/>
  <line x1="370" y1="290" x2="360" y2="290" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigoSmall)"/>
  <line x1="480" y1="290" x2="440" y2="290" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigoSmall)"/>
  <line x1="620" y1="290" x2="580" y2="290" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigoSmall)"/>
  <line x1="700" y1="290" x2="660" y2="290" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigoSmall)"/>

  <!-- Legend arrows -->
  <text x="290" y="316" font-size="9" fill="#64748B">Client-to-Server</text>
  <line x1="270" y1="313" x2="286" y2="313" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlueSmall)"/>

  <text x="450" y="316" font-size="9" fill="#64748B">Server-to-Client</text>
  <line x1="446" y1="313" x2="430" y2="313" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigoSmall)"/>

  <text x="290" y="340" font-size="10" font-weight="600" fill="#10B981">Messages flow independently in both directions — no request-response pairing</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#CBD5E1"/>
    </marker>
    <marker id="arrowBlueSmall" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowIndigoSmall" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
  </defs>
</svg>
