<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="550" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">WebRTC Connection Establishment Flow</text>

  <!-- Peer A lifeline -->
  <rect x="50" y="52" width="120" height="36" rx="6" fill="#3B82F6" />
  <text x="110" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Peer A</text>
  <line x1="110" y1="88" x2="110" y2="530" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Signaling Server lifeline -->
  <rect x="330" y="52" width="140" height="36" rx="6" fill="#6366F1" />
  <text x="400" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Signaling Server</text>
  <line x1="400" y1="88" x2="400" y2="530" stroke="#6366F1" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Peer B lifeline -->
  <rect x="630" y="52" width="120" height="36" rx="6" fill="#10B981" />
  <text x="690" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Peer B</text>
  <line x1="690" y1="88" x2="690" y2="530" stroke="#10B981" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Phase 1: SDP Offer/Answer Exchange -->
  <rect x="20" y="100" width="760" height="170" rx="4" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <text x="40" y="116" font-size="10" font-weight="600" fill="#3B82F6">SIGNALING PHASE (SDP Exchange)</text>

  <!-- Step 1: Create Offer -->
  <rect x="15" y="125" width="90" height="24" rx="4" fill="#DBEAFE"/>
  <text x="60" y="141" text-anchor="middle" font-size="9" font-weight="600" fill="#3B82F6">1. createOffer()</text>

  <!-- Step 2: Send Offer -->
  <line x1="120" y1="155" x2="388" y2="155" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="255" y="148" text-anchor="middle" font-size="11" font-weight="500" fill="#1E293B">2. SDP Offer (media caps, codecs)</text>

  <!-- Step 3: Forward Offer -->
  <line x1="412" y1="180" x2="678" y2="180" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigo)"/>
  <text x="545" y="173" text-anchor="middle" font-size="11" font-weight="500" fill="#1E293B">3. Forward SDP Offer</text>

  <!-- Step 4: Create Answer -->
  <rect x="695" y="190" width="95" height="24" rx="4" fill="#D1FAE5"/>
  <text x="742" y="206" text-anchor="middle" font-size="9" font-weight="600" fill="#10B981">4. createAnswer()</text>

  <!-- Step 5: Send Answer -->
  <line x1="678" y1="225" x2="412" y2="225" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="545" y="218" text-anchor="middle" font-size="11" font-weight="500" fill="#1E293B">5. SDP Answer</text>

  <!-- Step 6: Forward Answer -->
  <line x1="388" y1="250" x2="122" y2="250" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigoLeft)"/>
  <text x="255" y="243" text-anchor="middle" font-size="11" font-weight="500" fill="#1E293B">6. Forward SDP Answer</text>

  <!-- Phase 2: ICE Candidate Exchange -->
  <rect x="20" y="278" width="760" height="110" rx="4" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
  <text x="40" y="294" font-size="10" font-weight="600" fill="#F59E0B">ICE CANDIDATE EXCHANGE (NAT Traversal)</text>

  <!-- ICE from A -->
  <line x1="120" y1="315" x2="388" y2="315" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>
  <text x="255" y="308" text-anchor="middle" font-size="10" fill="#92400E">7a. ICE Candidate (host/srflx/relay)</text>

  <line x1="412" y1="330" x2="678" y2="330" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>
  <text x="545" y="323" text-anchor="middle" font-size="10" fill="#92400E">Forward ICE Candidate</text>

  <!-- ICE from B -->
  <line x1="678" y1="355" x2="412" y2="355" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowAmberLeft)"/>
  <text x="545" y="348" text-anchor="middle" font-size="10" fill="#92400E">7b. ICE Candidate</text>

  <line x1="388" y1="370" x2="122" y2="370" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowAmberLeft)"/>
  <text x="255" y="363" text-anchor="middle" font-size="10" fill="#92400E">Forward ICE Candidate</text>

  <!-- Phase 3: Connectivity Checks & P2P -->
  <rect x="20" y="396" width="760" height="50" rx="4" fill="#FDF4FF" stroke="#A855F7" stroke-width="1" opacity="0.5"/>
  <text x="40" y="412" font-size="10" font-weight="600" fill="#A855F7">CONNECTIVITY CHECKS (STUN Binding Requests)</text>

  <line x1="120" y1="430" x2="678" y2="430" stroke="#A855F7" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="678" y1="434" x2="120" y2="434" stroke="#A855F7" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="400" y="425" text-anchor="middle" font-size="10" fill="#7E22CE">8. STUN Binding Request/Response (pair validation)</text>

  <!-- Phase 4: Direct P2P -->
  <rect x="20" y="454" width="760" height="70" rx="4" fill="#F0FDF4" stroke="#10B981" stroke-width="1" opacity="0.5"/>
  <text x="40" y="470" font-size="10" font-weight="600" fill="#10B981">PEER-TO-PEER CONNECTION ESTABLISHED</text>

  <line x1="120" y1="492" x2="678" y2="492" stroke="#10B981" stroke-width="3" marker-end="url(#arrowGreenRight)"/>
  <line x1="678" y1="504" x2="122" y2="504" stroke="#10B981" stroke-width="3" marker-end="url(#arrowGreenLeftDirect)"/>
  <text x="400" y="487" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">9. Direct P2P: Media Streams + DataChannel</text>
  <text x="400" y="520" text-anchor="middle" font-size="10" fill="#64748B">Audio/Video via SRTP | Data via SCTP (no signaling server needed)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
    <marker id="arrowIndigoLeft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrowGreenRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrowGreenLeftDirect" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowAmberLeft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
  </defs>
</svg>