<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="450" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Long Polling Flow Timeline</text>

  <!-- Actor labels -->
  <rect x="30" y="50" width="80" height="32" rx="6" fill="#6366F1"/>
  <text x="70" y="71" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Client</text>

  <rect x="690" y="50" width="80" height="32" rx="6" fill="#6366F1"/>
  <text x="730" y="71" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Server</text>

  <!-- Lifelines -->
  <line x1="70" y1="82" x2="70" y2="430" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="730" y1="82" x2="730" y2="430" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>

  <defs>
    <marker id="lp-arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366F1"/>
    </marker>
    <marker id="lp-arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="lp-arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Time labels -->
  <text x="15" y="105" font-size="9" fill="#64748b">0s</text>
  <text x="15" y="185" font-size="9" fill="#64748b">8s</text>
  <text x="15" y="215" font-size="9" fill="#64748b">~8.1s</text>
  <text x="15" y="310" font-size="9" fill="#64748b">30s</text>
  <text x="15" y="340" font-size="9" fill="#64748b">~30.1s</text>
  <text x="15" y="395" font-size="9" fill="#64748b">35s</text>

  <!-- Request 1: Client sends poll -->
  <line x1="70" y1="100" x2="720" y2="100" stroke="#6366F1" stroke-width="1.5" marker-end="url(#lp-arr-purple)"/>
  <text x="400" y="95" text-anchor="middle" font-size="10" fill="#6366F1">GET /api/poll?since=0</text>

  <!-- Server holds connection (shown as a thick bar) -->
  <rect x="720" y="100" width="20" height="80" rx="3" fill="#6366F1" opacity="0.2"/>
  <text x="760" y="140" font-size="8" fill="#6366F1" font-style="italic">Held...</text>

  <!-- Event occurs on server at ~8s -->
  <rect x="640" y="168" width="100" height="20" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="690" y="182" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">Event occurs!</text>

  <!-- Server responds with data -->
  <line x1="730" y1="190" x2="80" y2="190" stroke="#10B981" stroke-width="2" marker-end="url(#lp-arr-green)"/>
  <rect x="300" y="192" width="200" height="18" rx="3" fill="#ecfdf5"/>
  <text x="400" y="205" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">200 OK - Data payload (seq: 15)</text>

  <!-- Immediate reconnection -->
  <line x1="70" y1="215" x2="720" y2="215" stroke="#6366F1" stroke-width="1.5" marker-end="url(#lp-arr-purple)"/>
  <text x="400" y="210" text-anchor="middle" font-size="10" fill="#6366F1">GET /api/poll?since=15 (immediate!)</text>

  <!-- Reconnection gap annotation -->
  <line x1="85" y1="190" x2="85" y2="215" stroke="#EF4444" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="95" y="205" font-size="7" fill="#EF4444">gap ~100ms</text>

  <!-- Server holds again (long time, no events) -->
  <rect x="720" y="215" width="20" height="90" rx="3" fill="#6366F1" opacity="0.2"/>
  <text x="760" y="260" font-size="8" fill="#6366F1" font-style="italic">Held...</text>
  <text x="760" y="272" font-size="8" fill="#6366F1" font-style="italic">no events</text>

  <!-- Timeout at 30s -->
  <rect x="640" y="295" width="100" height="20" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="690" y="308" text-anchor="middle" font-size="9" fill="#F59E0B" font-weight="bold">30s timeout</text>

  <!-- Server responds with empty/timeout -->
  <line x1="730" y1="318" x2="80" y2="318" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#lp-arr-amber)"/>
  <rect x="310" y="320" width="180" height="18" rx="3" fill="#fffbeb"/>
  <text x="400" y="333" text-anchor="middle" font-size="9" fill="#F59E0B">200 OK - No data (timeout)</text>

  <!-- Immediate reconnection again -->
  <line x1="70" y1="345" x2="720" y2="345" stroke="#6366F1" stroke-width="1.5" marker-end="url(#lp-arr-purple)"/>
  <text x="400" y="340" text-anchor="middle" font-size="10" fill="#6366F1">GET /api/poll?since=15 (immediate!)</text>

  <!-- Server holds again -->
  <rect x="720" y="345" width="20" height="50" rx="3" fill="#6366F1" opacity="0.2"/>
  <text x="760" y="370" font-size="8" fill="#6366F1" font-style="italic">Held...</text>

  <!-- Event occurs -->
  <rect x="640" y="382" width="100" height="20" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="690" y="395" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">Event occurs!</text>

  <!-- Server responds with data -->
  <line x1="730" y1="405" x2="80" y2="405" stroke="#10B981" stroke-width="2" marker-end="url(#lp-arr-green)"/>
  <rect x="300" y="407" width="200" height="18" rx="3" fill="#ecfdf5"/>
  <text x="400" y="420" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">200 OK - Data payload (seq: 16)</text>

  <!-- Legend -->
  <rect x="150" y="437" width="10" height="10" rx="2" fill="#6366F1" opacity="0.2"/>
  <text x="165" y="446" font-size="9" fill="#64748b">Connection held open</text>
  <rect x="310" y="437" width="10" height="10" rx="2" fill="#ecfdf5" stroke="#10B981"/>
  <text x="325" y="446" font-size="9" fill="#64748b">Data response</text>
  <rect x="460" y="437" width="10" height="10" rx="2" fill="#fffbeb" stroke="#F59E0B"/>
  <text x="475" y="446" font-size="9" fill="#64748b">Timeout response</text>
  <line x1="600" y1="442" x2="620" y2="442" stroke="#EF4444" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="625" y="446" font-size="9" fill="#64748b">Reconnection gap</text>
</svg>
