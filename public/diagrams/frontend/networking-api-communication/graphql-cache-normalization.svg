<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">GraphQL Cache Normalization</text>

  <defs>
    <marker id="norm-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
  </defs>

  <!-- LEFT: Nested API Response -->
  <text x="175" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#6366F1">Nested API Response</text>
  <rect x="30" y="68" width="290" height="295" rx="8" fill="#F5F3FF" stroke="#6366F1" stroke-width="1.5"/>

  <!-- JSON structure -->
  <text x="50" y="92" font-size="10" fill="#64748B" font-weight="600">{"{"}</text>
  <text x="60" y="108" font-size="10" fill="#1e293b">"data": {"{"}</text>
  <text x="75" y="124" font-size="10" fill="#1e293b">"user": {"{"}</text>
  <text x="90" y="140" font-size="10" fill="#6366F1" font-weight="600">"id": "1",</text>
  <text x="90" y="156" font-size="10" fill="#1e293b">"name": "Alice",</text>
  <text x="90" y="172" font-size="10" fill="#1e293b">"email": "alice@dev.io",</text>
  <text x="90" y="188" font-size="10" fill="#1e293b">"posts": [</text>
  <text x="105" y="204" font-size="10" fill="#1e293b">{"{"}</text>
  <text x="120" y="220" font-size="10" fill="#10B981" font-weight="600">"id": "1",</text>
  <text x="120" y="236" font-size="10" fill="#1e293b">"title": "GraphQL Guide",</text>
  <text x="120" y="252" font-size="10" fill="#1e293b">"likes": 42</text>
  <text x="105" y="268" font-size="10" fill="#1e293b">{"}"},</text>
  <text x="105" y="284" font-size="10" fill="#1e293b">{"{"}</text>
  <text x="120" y="300" font-size="10" fill="#F59E0B" font-weight="600">"id": "2",</text>
  <text x="120" y="316" font-size="10" fill="#1e293b">"title": "Caching Tips",</text>
  <text x="120" y="332" font-size="10" fill="#1e293b">"likes": 18</text>
  <text x="105" y="348" font-size="10" fill="#1e293b">{"}"}</text>
  <text x="90" y="358" font-size="10" fill="#1e293b">]</text>

  <!-- Arrow in the middle -->
  <line x1="335" y1="200" x2="395" y2="200" stroke="#3B82F6" stroke-width="2" marker-end="url(#norm-arrow)"/>
  <text x="365" y="190" text-anchor="middle" font-size="9" fill="#3B82F6" font-weight="600">Normalize</text>

  <!-- RIGHT: Normalized Cache Store -->
  <text x="600" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#10B981">Normalized Cache Store</text>
  <rect x="410" y="68" width="370" height="295" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>

  <!-- User:1 entity -->
  <rect x="430" y="85" width="330" height="78" rx="6" fill="#ffffff" stroke="#6366F1" stroke-width="1"/>
  <rect x="430" y="85" width="330" height="22" rx="6" fill="#6366F1"/>
  <rect x="430" y="95" width="330" height="12" fill="#6366F1"/>
  <text x="595" y="100" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">User:1</text>
  <text x="445" y="122" font-size="9" fill="#1e293b">name: "Alice"</text>
  <text x="445" y="136" font-size="9" fill="#1e293b">email: "alice@dev.io"</text>
  <text x="445" y="150" font-size="9" fill="#1e293b">posts:</text>
  <rect x="490" y="141" width="70" height="14" rx="3" fill="#DBEAFE"/>
  <text x="525" y="151" text-anchor="middle" font-size="8" fill="#3B82F6" font-weight="600">ref(Post:1)</text>
  <rect x="565" y="141" width="70" height="14" rx="3" fill="#DBEAFE"/>
  <text x="600" y="151" text-anchor="middle" font-size="8" fill="#3B82F6" font-weight="600">ref(Post:2)</text>

  <!-- Post:1 entity -->
  <rect x="430" y="178" width="330" height="62" rx="6" fill="#ffffff" stroke="#10B981" stroke-width="1"/>
  <rect x="430" y="178" width="330" height="22" rx="6" fill="#10B981"/>
  <rect x="430" y="188" width="330" height="12" fill="#10B981"/>
  <text x="595" y="193" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Post:1</text>
  <text x="445" y="215" font-size="9" fill="#1e293b">title: "GraphQL Guide"</text>
  <text x="445" y="229" font-size="9" fill="#1e293b">likes: 42</text>
  <text x="620" y="215" font-size="9" fill="#1e293b">author:</text>
  <rect x="660" y="206" width="70" height="14" rx="3" fill="#EDE9FE"/>
  <text x="695" y="216" text-anchor="middle" font-size="8" fill="#6366F1" font-weight="600">ref(User:1)</text>

  <!-- Post:2 entity -->
  <rect x="430" y="255" width="330" height="62" rx="6" fill="#ffffff" stroke="#F59E0B" stroke-width="1"/>
  <rect x="430" y="255" width="330" height="22" rx="6" fill="#F59E0B"/>
  <rect x="430" y="265" width="330" height="12" fill="#F59E0B"/>
  <text x="595" y="270" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Post:2</text>
  <text x="445" y="292" font-size="9" fill="#1e293b">title: "Caching Tips"</text>
  <text x="445" y="306" font-size="9" fill="#1e293b">likes: 18</text>
  <text x="620" y="292" font-size="9" fill="#1e293b">author:</text>
  <rect x="660" y="283" width="70" height="14" rx="3" fill="#EDE9FE"/>
  <text x="695" y="293" text-anchor="middle" font-size="8" fill="#6366F1" font-weight="600">ref(User:1)</text>

  <!-- Key insight note -->
  <rect x="430" y="330" width="330" height="24" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.5"/>
  <text x="595" y="346" text-anchor="middle" font-size="9" fill="#92400E" font-weight="600">Entities stored flat by __typename + id. Updates propagate automatically.</text>

  <!-- Legend -->
  <rect x="30" y="378" width="10" height="10" rx="2" fill="#6366F1"/>
  <text x="46" y="387" font-size="9" fill="#1e293b">User entity</text>
  <rect x="130" y="378" width="10" height="10" rx="2" fill="#10B981"/>
  <text x="146" y="387" font-size="9" fill="#1e293b">Post:1 entity</text>
  <rect x="230" y="378" width="10" height="10" rx="2" fill="#F59E0B"/>
  <text x="246" y="387" font-size="9" fill="#1e293b">Post:2 entity</text>
  <rect x="330" y="378" width="10" height="10" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="346" y="387" font-size="9" fill="#1e293b">Cache reference (pointer)</text>
</svg>
