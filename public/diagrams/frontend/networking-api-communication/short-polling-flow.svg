<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Short Polling Flow Timeline</text>

  <!-- Actor labels -->
  <rect x="30" y="50" width="80" height="32" rx="6" fill="#3B82F6"/>
  <text x="70" y="71" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Client</text>

  <rect x="690" y="50" width="80" height="32" rx="6" fill="#6366F1"/>
  <text x="730" y="71" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Server</text>

  <!-- Lifelines -->
  <line x1="70" y1="82" x2="70" y2="380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="730" y1="82" x2="730" y2="380" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>

  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Time labels on left -->
  <text x="15" y="108" font-size="9" fill="#64748b">0s</text>
  <text x="15" y="148" font-size="9" fill="#64748b">3s</text>
  <text x="15" y="188" font-size="9" fill="#64748b">6s</text>
  <text x="15" y="228" font-size="9" fill="#64748b">9s</text>
  <text x="15" y="268" font-size="9" fill="#64748b">12s</text>
  <text x="15" y="308" font-size="9" fill="#64748b">15s</text>
  <text x="15" y="348" font-size="9" fill="#64748b">18s</text>

  <!-- Request 1: GET -> 304 (no data) -->
  <line x1="70" y1="105" x2="720" y2="105" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="400" y="100" text-anchor="middle" font-size="10" fill="#3B82F6">GET /api/updates?since=0</text>
  <line x1="730" y1="115" x2="80" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <rect x="320" y="117" width="160" height="18" rx="3" fill="#f1f5f9"/>
  <text x="400" y="130" text-anchor="middle" font-size="9" fill="#94a3b8">304 Not Modified (empty)</text>

  <!-- Request 2: GET -> 304 -->
  <line x1="70" y1="145" x2="720" y2="145" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="400" y="140" text-anchor="middle" font-size="10" fill="#3B82F6">GET /api/updates?since=0</text>
  <line x1="730" y1="155" x2="80" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <rect x="320" y="157" width="160" height="18" rx="3" fill="#f1f5f9"/>
  <text x="400" y="170" text-anchor="middle" font-size="9" fill="#94a3b8">304 Not Modified (empty)</text>

  <!-- Request 3: GET -> 200 with DATA -->
  <line x1="70" y1="185" x2="720" y2="185" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="400" y="180" text-anchor="middle" font-size="10" fill="#3B82F6">GET /api/updates?since=0</text>
  <line x1="730" y1="195" x2="80" y2="195" stroke="#10B981" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="300" y="197" width="200" height="18" rx="3" fill="#ecfdf5"/>
  <text x="400" y="210" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">200 OK - New data! (seq: 42)</text>

  <!-- Request 4: GET -> 304 -->
  <line x1="70" y1="225" x2="720" y2="225" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="400" y="220" text-anchor="middle" font-size="10" fill="#3B82F6">GET /api/updates?since=42</text>
  <line x1="730" y1="235" x2="80" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <rect x="320" y="237" width="160" height="18" rx="3" fill="#f1f5f9"/>
  <text x="400" y="250" text-anchor="middle" font-size="9" fill="#94a3b8">304 Not Modified (empty)</text>

  <!-- Request 5: GET -> 304 -->
  <line x1="70" y1="265" x2="720" y2="265" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="400" y="260" text-anchor="middle" font-size="10" fill="#3B82F6">GET /api/updates?since=42</text>
  <line x1="730" y1="275" x2="80" y2="275" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <rect x="320" y="277" width="160" height="18" rx="3" fill="#f1f5f9"/>
  <text x="400" y="290" text-anchor="middle" font-size="9" fill="#94a3b8">304 Not Modified (empty)</text>

  <!-- Request 6: GET -> 304 -->
  <line x1="70" y1="305" x2="720" y2="305" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="400" y="300" text-anchor="middle" font-size="10" fill="#3B82F6">GET /api/updates?since=42</text>
  <line x1="730" y1="315" x2="80" y2="315" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <rect x="320" y="317" width="160" height="18" rx="3" fill="#f1f5f9"/>
  <text x="400" y="330" text-anchor="middle" font-size="9" fill="#94a3b8">304 Not Modified (empty)</text>

  <!-- Request 7: GET -> 200 DATA -->
  <line x1="70" y1="345" x2="720" y2="345" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="400" y="340" text-anchor="middle" font-size="10" fill="#3B82F6">GET /api/updates?since=42</text>
  <line x1="730" y1="355" x2="80" y2="355" stroke="#10B981" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="300" y="357" width="200" height="18" rx="3" fill="#ecfdf5"/>
  <text x="400" y="370" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">200 OK - New data! (seq: 58)</text>

  <!-- Legend -->
  <rect x="560" y="380" width="10" height="10" rx="2" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="575" y="389" font-size="9" fill="#64748b">No data (wasted)</text>
  <rect x="680" y="380" width="10" height="10" rx="2" fill="#ecfdf5" stroke="#10B981"/>
  <text x="695" y="389" font-size="9" fill="#10B981">Data returned</text>
</svg>
