<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="350" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e1e2e">Rate Limit Response Headers Breakdown</text>

  <!-- HTTP Response Box -->
  <rect x="30" y="50" width="350" height="270" rx="8" fill="#F8FAFC" stroke="#3B82F6" stroke-width="2"/>
  <rect x="30" y="50" width="350" height="32" rx="8" fill="#3B82F6"/>
  <rect x="30" y="70" width="350" height="12" fill="#3B82F6"/>
  <text x="205" y="72" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">HTTP Response Headers</text>

  <!-- Standard Headers -->
  <text x="50" y="105" font-size="12" fill="#6366F1" font-weight="600">Standard HTTP:</text>
  <rect x="50" y="112" width="310" height="24" rx="4" fill="#EEF2FF"/>
  <text x="60" y="129" font-size="11" fill="#4338CA" font-family="monospace">HTTP/1.1 429 Too Many Requests</text>

  <rect x="50" y="142" width="310" height="24" rx="4" fill="#FEF3C7"/>
  <text x="60" y="159" font-size="11" fill="#92400E" font-family="monospace">Retry-After: 30</text>

  <!-- Draft Spec Headers -->
  <text x="50" y="185" font-size="12" fill="#10B981" font-weight="600">IETF Draft Spec (RateLimit fields):</text>
  <rect x="50" y="192" width="310" height="24" rx="4" fill="#F0FDF4"/>
  <text x="60" y="209" font-size="11" fill="#065F46" font-family="monospace">RateLimit-Limit: 100</text>

  <rect x="50" y="222" width="310" height="24" rx="4" fill="#F0FDF4"/>
  <text x="60" y="239" font-size="11" fill="#065F46" font-family="monospace">RateLimit-Remaining: 0</text>

  <rect x="50" y="252" width="310" height="24" rx="4" fill="#F0FDF4"/>
  <text x="60" y="269" font-size="11" fill="#065F46" font-family="monospace">RateLimit-Reset: 1710432000</text>

  <text x="60" y="298" font-size="10" fill="#94a3b8" font-style="italic">* Reset is Unix timestamp (seconds)</text>

  <!-- Explanation Cards -->
  <rect x="420" y="55" width="360" height="62" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="440" y="75" font-size="12" font-weight="600" fill="#4338CA">429 Too Many Requests</text>
  <text x="440" y="93" font-size="10" fill="#475569">Server signals the client has exceeded its</text>
  <text x="440" y="106" font-size="10" fill="#475569">allowed request quota for the current window.</text>

  <rect x="420" y="127" width="360" height="62" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="440" y="147" font-size="12" font-weight="600" fill="#92400E">Retry-After</text>
  <text x="440" y="165" font-size="10" fill="#475569">Seconds to wait before retrying. Can also be an</text>
  <text x="440" y="178" font-size="10" fill="#475569">HTTP-date. Supported by GitHub, Stripe, Twitter.</text>

  <rect x="420" y="199" width="360" height="62" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="440" y="219" font-size="12" font-weight="600" fill="#065F46">RateLimit-Limit</text>
  <text x="440" y="237" font-size="10" fill="#475569">Maximum number of requests allowed in the</text>
  <text x="440" y="250" font-size="10" fill="#475569">current time window (e.g., 100 per minute).</text>

  <rect x="420" y="271" width="170" height="55" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="440" y="291" font-size="12" font-weight="600" fill="#065F46">RateLimit-Remaining</text>
  <text x="440" y="309" font-size="10" fill="#475569">Requests left in window.</text>

  <rect x="600" y="271" width="180" height="55" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="620" y="291" font-size="12" font-weight="600" fill="#065F46">RateLimit-Reset</text>
  <text x="620" y="309" font-size="10" fill="#475569">When the window resets.</text>
</svg>