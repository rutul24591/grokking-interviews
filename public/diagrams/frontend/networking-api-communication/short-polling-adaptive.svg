<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="350" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Adaptive Interval Short Polling</text>

  <!-- Timeline axis -->
  <line x1="60" y1="280" x2="760" y2="280" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#64748b">Time</text>

  <!-- Interval zone backgrounds -->
  <!-- Fast zone (1s) -->
  <rect x="60" y="50" width="140" height="225" rx="4" fill="#ecfdf5" opacity="0.5"/>
  <text x="130" y="68" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">FAST (1s)</text>

  <!-- Slowing zone -->
  <rect x="200" y="50" width="220" height="225" rx="4" fill="#fffbeb" opacity="0.5"/>
  <text x="310" y="68" text-anchor="middle" font-size="9" fill="#F59E0B" font-weight="bold">IDLE - SLOWING DOWN</text>

  <!-- Slow zone (5s max) -->
  <rect x="420" y="50" width="160" height="225" rx="4" fill="#fef2f2" opacity="0.5"/>
  <text x="500" y="68" text-anchor="middle" font-size="9" fill="#EF4444" font-weight="bold">MAX (5s)</text>

  <!-- Reset zone -->
  <rect x="580" y="50" width="180" height="225" rx="4" fill="#ecfdf5" opacity="0.5"/>
  <text x="670" y="68" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">ACTIVITY - RESET (1s)</text>

  <!-- Interval line graph -->
  <!-- Fast polls at 1s interval -->
  <circle cx="80" cy="250" r="5" fill="#10B981"/>
  <circle cx="100" cy="250" r="5" fill="#10B981"/>
  <circle cx="120" cy="250" r="5" fill="#10B981"/>
  <circle cx="140" cy="250" r="5" fill="#10B981"/>
  <circle cx="160" cy="250" r="5" fill="#10B981"/>
  <line x1="80" y1="250" x2="160" y2="250" stroke="#10B981" stroke-width="2"/>

  <!-- Interval increases: 1s -> 2s -->
  <circle cx="200" cy="250" r="5" fill="#F59E0B"/>
  <line x1="160" y1="250" x2="200" y2="250" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 2s interval -->
  <circle cx="240" cy="210" r="5" fill="#F59E0B"/>
  <line x1="200" y1="250" x2="240" y2="210" stroke="#F59E0B" stroke-width="2"/>
  <text x="220" y="200" text-anchor="middle" font-size="9" fill="#F59E0B">2s</text>

  <!-- 3s interval -->
  <circle cx="300" cy="170" r="5" fill="#F59E0B"/>
  <line x1="240" y1="210" x2="300" y2="170" stroke="#F59E0B" stroke-width="2"/>
  <text x="270" y="160" text-anchor="middle" font-size="9" fill="#F59E0B">3s</text>

  <!-- 4s interval -->
  <circle cx="380" cy="130" r="5" fill="#F59E0B"/>
  <line x1="300" y1="170" x2="380" y2="130" stroke="#F59E0B" stroke-width="2"/>
  <text x="340" y="120" text-anchor="middle" font-size="9" fill="#F59E0B">4s</text>

  <!-- 5s max interval -->
  <circle cx="460" cy="100" r="5" fill="#EF4444"/>
  <line x1="380" y1="130" x2="460" y2="100" stroke="#EF4444" stroke-width="2"/>
  <text x="420" y="90" text-anchor="middle" font-size="9" fill="#EF4444">5s (max)</text>

  <!-- Stays at 5s -->
  <circle cx="540" cy="100" r="5" fill="#EF4444"/>
  <line x1="460" y1="100" x2="540" y2="100" stroke="#EF4444" stroke-width="2"/>

  <!-- Activity detected! Data returned - reset to 1s -->
  <circle cx="600" cy="100" r="7" fill="#6366F1" stroke="#ffffff" stroke-width="2"/>
  <text x="600" y="88" text-anchor="middle" font-size="9" fill="#6366F1" font-weight="bold">DATA!</text>

  <!-- Sharp drop back to 1s -->
  <line x1="600" y1="100" x2="620" y2="250" stroke="#10B981" stroke-width="2.5" stroke-dasharray="4,2"/>
  <circle cx="620" cy="250" r="5" fill="#10B981"/>

  <!-- Fast again -->
  <circle cx="640" cy="250" r="5" fill="#10B981"/>
  <circle cx="660" cy="250" r="5" fill="#10B981"/>
  <circle cx="680" cy="250" r="5" fill="#10B981"/>
  <circle cx="700" cy="250" r="5" fill="#10B981"/>
  <line x1="620" y1="250" x2="700" y2="250" stroke="#10B981" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="50" y="254" text-anchor="end" font-size="9" fill="#64748b">1s</text>
  <text x="50" y="214" text-anchor="end" font-size="9" fill="#64748b">2s</text>
  <text x="50" y="174" text-anchor="end" font-size="9" fill="#64748b">3s</text>
  <text x="50" y="134" text-anchor="end" font-size="9" fill="#64748b">4s</text>
  <text x="50" y="104" text-anchor="end" font-size="9" fill="#64748b">5s</text>
  <text x="30" y="175" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="bold" transform="rotate(-90, 30, 175)">Poll Interval</text>

  <!-- Legend -->
  <circle cx="200" cy="335" r="4" fill="#10B981"/>
  <text x="210" y="339" font-size="9" fill="#64748b">Fast interval (active)</text>
  <circle cx="350" cy="335" r="4" fill="#F59E0B"/>
  <text x="360" y="339" font-size="9" fill="#64748b">Increasing (idle)</text>
  <circle cx="490" cy="335" r="4" fill="#EF4444"/>
  <text x="500" y="339" font-size="9" fill="#64748b">Max interval</text>
  <circle cx="610" cy="335" r="4" fill="#6366F1"/>
  <text x="620" y="339" font-size="9" fill="#64748b">Data triggers reset</text>
</svg>
