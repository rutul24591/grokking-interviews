<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Circuit Breaker Request Flow</text>

  <defs>
    <marker id="flowArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="flowArrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="flowArrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#EF4444"/>
    </marker>
    <marker id="flowArrowAmber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- App makes request -->
  <rect x="30" y="165" width="120" height="50" rx="10" fill="#3B82F6" stroke="#2563eb" stroke-width="1"/>
  <text x="90" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Application</text>
  <text x="90" y="200" text-anchor="middle" font-size="10" fill="#dbeafe">Makes request</text>

  <!-- Arrow to Check -->
  <line x1="150" y1="190" x2="200" y2="190" stroke="#3B82F6" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Check Breaker State (diamond) -->
  <polygon points="280,140 355,190 280,240 205,190" fill="#f8fafc" stroke="#6366F1" stroke-width="2"/>
  <text x="280" y="185" text-anchor="middle" font-size="11" font-weight="600" fill="#6366F1">Check</text>
  <text x="280" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#6366F1">State</text>

  <!-- CLOSED PATH (top) -->
  <line x1="280" y1="140" x2="280" y2="80" stroke="#10B981" stroke-width="2"/>
  <line x1="280" y1="80" x2="490" y2="80" stroke="#10B981" stroke-width="2" marker-end="url(#flowArrowGreen)"/>
  <rect x="310" y="60" width="80" height="24" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="350" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#10B981">CLOSED</text>

  <!-- Send Request box -->
  <rect x="495" y="55" width="130" height="50" rx="10" fill="#10B981" stroke="#059669" stroke-width="1"/>
  <text x="560" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Send Request</text>
  <text x="560" y="90" text-anchor="middle" font-size="10" fill="#d1fae5">to API server</text>

  <!-- Arrow to response -->
  <line x1="625" y1="80" x2="670" y2="80" stroke="#10B981" stroke-width="2" marker-end="url(#flowArrowGreen)"/>

  <!-- Response box -->
  <rect x="675" y="55" width="100" height="50" rx="10" fill="#f0fdf4" stroke="#10B981" stroke-width="2"/>
  <text x="725" y="75" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Response</text>
  <text x="725" y="90" text-anchor="middle" font-size="10" fill="#64748b">+ track result</text>

  <!-- OPEN PATH (middle) -->
  <line x1="355" y1="190" x2="490" y2="190" stroke="#EF4444" stroke-width="2" marker-end="url(#flowArrowRed)"/>
  <rect x="380" y="170" width="70" height="24" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="415" y="186" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444">OPEN</text>

  <!-- Return Fallback box -->
  <rect x="495" y="165" width="130" height="50" rx="10" fill="#EF4444" stroke="#dc2626" stroke-width="1"/>
  <text x="560" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Return Fallback</text>
  <text x="560" y="200" text-anchor="middle" font-size="10" fill="#fecaca">Cached / default</text>

  <!-- Arrow to Immediate -->
  <line x1="625" y1="190" x2="670" y2="190" stroke="#EF4444" stroke-width="2" marker-end="url(#flowArrowRed)"/>

  <!-- Immediate response -->
  <rect x="675" y="165" width="100" height="50" rx="10" fill="#fef2f2" stroke="#EF4444" stroke-width="2"/>
  <text x="725" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Immediate</text>
  <text x="725" y="200" text-anchor="middle" font-size="10" fill="#64748b">No network call</text>

  <!-- HALF-OPEN PATH (bottom) -->
  <line x1="280" y1="240" x2="280" y2="310" stroke="#F59E0B" stroke-width="2"/>
  <line x1="280" y1="310" x2="490" y2="310" stroke="#F59E0B" stroke-width="2" marker-end="url(#flowArrowAmber)"/>
  <rect x="310" y="290" width="100" height="24" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="360" y="306" text-anchor="middle" font-size="10" font-weight="600" fill="#F59E0B">HALF-OPEN</text>

  <!-- Send Probe box -->
  <rect x="495" y="285" width="130" height="50" rx="10" fill="#F59E0B" stroke="#d97706" stroke-width="1"/>
  <text x="560" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Send Probe</text>
  <text x="560" y="320" text-anchor="middle" font-size="10" fill="#fef3c7">Single test request</text>

  <!-- Arrow to result -->
  <line x1="625" y1="310" x2="670" y2="310" stroke="#F59E0B" stroke-width="2" marker-end="url(#flowArrowAmber)"/>

  <!-- Probe result -->
  <rect x="675" y="285" width="100" height="50" rx="10" fill="#fffbeb" stroke="#F59E0B" stroke-width="2"/>
  <text x="725" y="303" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Decide</text>
  <text x="725" y="318" text-anchor="middle" font-size="9" fill="#10B981">OK: Close</text>
  <text x="725" y="330" text-anchor="middle" font-size="9" fill="#EF4444">Fail: Re-open</text>

  <!-- Time labels -->
  <rect x="30" y="360" width="740" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="380" text-anchor="middle" font-size="10" fill="#10B981" font-weight="600">Closed: ~0ms overhead</text>
  <text x="470" y="380" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="600">Open: 0ms (no network)</text>
  <text x="670" y="380" text-anchor="middle" font-size="10" fill="#F59E0B" font-weight="600">Half-Open: 1 request only</text>
</svg>
