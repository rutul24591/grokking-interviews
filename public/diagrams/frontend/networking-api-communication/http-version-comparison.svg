<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
  </defs>

  <rect width="800" height="500" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" font-size="16" font-weight="700" fill="#1E293B" text-anchor="middle">HTTP/1.1 vs HTTP/2 vs HTTP/3 Connection Models</text>

  <!-- Column Headers -->
  <text x="135" y="65" font-size="13" font-weight="600" fill="#3B82F6" text-anchor="middle">HTTP/1.1</text>
  <text x="400" y="65" font-size="13" font-weight="600" fill="#10B981" text-anchor="middle">HTTP/2</text>
  <text x="665" y="65" font-size="13" font-weight="600" fill="#6366F1" text-anchor="middle">HTTP/3</text>

  <!-- Divider lines -->
  <line x1="267" y1="50" x2="267" y2="490" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="533" y1="50" x2="533" y2="490" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== HTTP/1.1 Section ===== -->
  <!-- Client -->
  <rect x="55" y="80" width="160" height="30" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="135" y="100" font-size="11" font-weight="600" fill="#3B82F6" text-anchor="middle">Client (Browser)</text>

  <!-- Server -->
  <rect x="55" y="430" width="160" height="30" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="135" y="450" font-size="11" font-weight="600" fill="#3B82F6" text-anchor="middle">Server</text>

  <!-- 6 TCP connections -->
  <text x="135" y="128" font-size="9" font-weight="500" fill="#64748B" text-anchor="middle">6 TCP Connections</text>

  <!-- Connection lines with sequential requests -->
  <line x1="65" y1="135" x2="65" y2="425" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <line x1="85" y1="135" x2="85" y2="425" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <line x1="105" y1="135" x2="105" y2="425" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <line x1="145" y1="135" x2="145" y2="425" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <line x1="165" y1="135" x2="165" y2="425" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>
  <line x1="185" y1="135" x2="185" y2="425" stroke="#3B82F6" stroke-width="2" opacity="0.3"/>

  <!-- Sequential request blocks on each connection -->
  <!-- Conn 1 -->
  <rect x="57" y="145" width="16" height="50" rx="3" fill="#3B82F6" opacity="0.7"/>
  <rect x="57" y="205" width="16" height="40" rx="3" fill="#3B82F6" opacity="0.4"/>
  <rect x="57" y="255" width="16" height="60" rx="3" fill="#3B82F6" opacity="0.7"/>
  <rect x="57" y="325" width="16" height="35" rx="3" fill="#3B82F6" opacity="0.4"/>
  <!-- Conn 2 -->
  <rect x="77" y="145" width="16" height="70" rx="3" fill="#3B82F6" opacity="0.7"/>
  <rect x="77" y="225" width="16" height="45" rx="3" fill="#3B82F6" opacity="0.4"/>
  <rect x="77" y="280" width="16" height="55" rx="3" fill="#3B82F6" opacity="0.7"/>
  <!-- Conn 3 -->
  <rect x="97" y="145" width="16" height="35" rx="3" fill="#3B82F6" opacity="0.7"/>
  <rect x="97" y="190" width="16" height="65" rx="3" fill="#3B82F6" opacity="0.4"/>
  <rect x="97" y="265" width="16" height="40" rx="3" fill="#3B82F6" opacity="0.7"/>
  <!-- Conn 4 -->
  <rect x="137" y="145" width="16" height="55" rx="3" fill="#3B82F6" opacity="0.7"/>
  <rect x="137" y="210" width="16" height="50" rx="3" fill="#3B82F6" opacity="0.4"/>
  <rect x="137" y="270" width="16" height="40" rx="3" fill="#3B82F6" opacity="0.7"/>
  <!-- Conn 5 -->
  <rect x="157" y="145" width="16" height="40" rx="3" fill="#3B82F6" opacity="0.7"/>
  <rect x="157" y="195" width="16" height="60" rx="3" fill="#3B82F6" opacity="0.4"/>
  <rect x="157" y="265" width="16" height="45" rx="3" fill="#3B82F6" opacity="0.7"/>
  <!-- Conn 6 -->
  <rect x="177" y="145" width="16" height="80" rx="3" fill="#3B82F6" opacity="0.7"/>
  <rect x="177" y="235" width="16" height="50" rx="3" fill="#3B82F6" opacity="0.4"/>

  <!-- HOL blocking indicator -->
  <rect x="55" y="370" width="160" height="48" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
  <text x="135" y="388" font-size="9" font-weight="600" fill="#DC2626" text-anchor="middle">HOL Blocking</text>
  <text x="135" y="402" font-size="8" font-weight="400" fill="#DC2626" text-anchor="middle">Sequential per connection</text>
  <text x="135" y="414" font-size="8" font-weight="400" fill="#DC2626" text-anchor="middle">Max 6 parallel requests</text>

  <!-- ===== HTTP/2 Section ===== -->
  <!-- Client -->
  <rect x="320" y="80" width="160" height="30" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="400" y="100" font-size="11" font-weight="600" fill="#10B981" text-anchor="middle">Client (Browser)</text>

  <!-- Server -->
  <rect x="320" y="430" width="160" height="30" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="400" y="450" font-size="11" font-weight="600" fill="#10B981" text-anchor="middle">Server</text>

  <!-- Single TCP connection -->
  <text x="400" y="128" font-size="9" font-weight="500" fill="#64748B" text-anchor="middle">1 TCP Connection</text>

  <!-- Single fat connection pipe -->
  <rect x="345" y="135" width="110" height="255" rx="8" fill="#10B981" opacity="0.08" stroke="#10B981" stroke-width="1.5"/>

  <!-- Multiplexed stream frames (interleaved) -->
  <rect x="352" y="142" width="96" height="14" rx="3" fill="#10B981" opacity="0.8"/>
  <rect x="352" y="160" width="96" height="14" rx="3" fill="#F59E0B" opacity="0.8"/>
  <rect x="352" y="178" width="96" height="14" rx="3" fill="#6366F1" opacity="0.8"/>
  <rect x="352" y="196" width="96" height="14" rx="3" fill="#10B981" opacity="0.8"/>
  <rect x="352" y="214" width="96" height="14" rx="3" fill="#EF4444" opacity="0.6"/>
  <rect x="352" y="232" width="96" height="14" rx="3" fill="#F59E0B" opacity="0.8"/>
  <rect x="352" y="250" width="96" height="14" rx="3" fill="#6366F1" opacity="0.8"/>
  <rect x="352" y="268" width="96" height="14" rx="3" fill="#10B981" opacity="0.8"/>
  <rect x="352" y="286" width="96" height="14" rx="3" fill="#EF4444" opacity="0.6"/>
  <rect x="352" y="304" width="96" height="14" rx="3" fill="#F59E0B" opacity="0.8"/>
  <rect x="352" y="322" width="96" height="14" rx="3" fill="#6366F1" opacity="0.8"/>
  <rect x="352" y="340" width="96" height="14" rx="3" fill="#10B981" opacity="0.8"/>
  <rect x="352" y="358" width="96" height="14" rx="3" fill="#EF4444" opacity="0.6"/>
  <rect x="352" y="376" width="96" height="14" rx="3" fill="#F59E0B" opacity="0.8"/>

  <!-- Stream labels -->
  <text x="400" y="152" font-size="7" font-weight="500" fill="#fff" text-anchor="middle">Stream 1 (HTML)</text>
  <text x="400" y="170" font-size="7" font-weight="500" fill="#fff" text-anchor="middle">Stream 3 (CSS)</text>
  <text x="400" y="188" font-size="7" font-weight="500" fill="#fff" text-anchor="middle">Stream 5 (JS)</text>
  <text x="400" y="206" font-size="7" font-weight="500" fill="#fff" text-anchor="middle">Stream 1 (HTML)</text>
  <text x="400" y="224" font-size="7" font-weight="500" fill="#fff" text-anchor="middle">Stream 7 (IMG)</text>
  <text x="400" y="242" font-size="7" font-weight="500" fill="#fff" text-anchor="middle">Stream 3 (CSS)</text>

  <!-- TCP HOL blocking callout -->
  <rect x="320" y="398" width="160" height="28" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="400" y="416" font-size="8" font-weight="500" fill="#92400E" text-anchor="middle">TCP HOL blocking still exists</text>

  <!-- ===== HTTP/3 Section ===== -->
  <!-- Client -->
  <rect x="585" y="80" width="160" height="30" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="665" y="100" font-size="11" font-weight="600" fill="#6366F1" text-anchor="middle">Client (Browser)</text>

  <!-- Server -->
  <rect x="585" y="430" width="160" height="30" rx="6" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="665" y="450" font-size="11" font-weight="600" fill="#6366F1" text-anchor="middle">Server</text>

  <!-- Single QUIC connection -->
  <text x="665" y="128" font-size="9" font-weight="500" fill="#64748B" text-anchor="middle">1 QUIC Connection</text>

  <!-- Independent QUIC streams (separate pipes) -->
  <rect x="593" y="135" width="24" height="255" rx="4" fill="#6366F1" opacity="0.1" stroke="#6366F1" stroke-width="1"/>
  <rect x="623" y="135" width="24" height="255" rx="4" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="1"/>
  <rect x="653" y="135" width="24" height="255" rx="4" fill="#F59E0B" opacity="0.1" stroke="#F59E0B" stroke-width="1"/>
  <rect x="683" y="135" width="24" height="255" rx="4" fill="#EF4444" opacity="0.1" stroke="#EF4444" stroke-width="1"/>
  <rect x="713" y="135" width="24" height="255" rx="4" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="1"/>

  <!-- Stream data flowing in each pipe -->
  <rect x="596" y="142" width="18" height="80" rx="3" fill="#6366F1" opacity="0.6"/>
  <rect x="596" y="232" width="18" height="60" rx="3" fill="#6366F1" opacity="0.6"/>
  <rect x="596" y="302" width="18" height="50" rx="3" fill="#6366F1" opacity="0.6"/>

  <rect x="626" y="142" width="18" height="60" rx="3" fill="#10B981" opacity="0.6"/>
  <rect x="626" y="212" width="18" height="90" rx="3" fill="#10B981" opacity="0.6"/>
  <rect x="626" y="312" width="18" height="40" rx="3" fill="#10B981" opacity="0.6"/>

  <rect x="656" y="142" width="18" height="100" rx="3" fill="#F59E0B" opacity="0.6"/>
  <rect x="656" y="252" width="18" height="70" rx="3" fill="#F59E0B" opacity="0.6"/>

  <rect x="686" y="142" width="18" height="45" rx="3" fill="#EF4444" opacity="0.5"/>
  <rect x="686" y="197" width="18" height="55" rx="3" fill="#EF4444" opacity="0.5"/>
  <rect x="686" y="262" width="18" height="75" rx="3" fill="#EF4444" opacity="0.5"/>

  <rect x="716" y="142" width="18" height="70" rx="3" fill="#3B82F6" opacity="0.5"/>
  <rect x="716" y="222" width="18" height="45" rx="3" fill="#3B82F6" opacity="0.5"/>
  <rect x="716" y="277" width="18" height="65" rx="3" fill="#3B82F6" opacity="0.5"/>

  <!-- Packet loss indicator showing no blocking -->
  <text x="605" y="230" font-size="10" fill="#EF4444" text-anchor="middle" font-weight="700">X</text>

  <!-- Arrow showing other streams unaffected -->
  <rect x="585" y="398" width="160" height="28" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
  <text x="665" y="416" font-size="8" font-weight="500" fill="#065F46" text-anchor="middle">No cross-stream HOL blocking</text>

  <!-- Stream labels at bottom -->
  <text x="605" y="367" font-size="7" font-weight="500" fill="#6366F1" text-anchor="middle" transform="rotate(-90,605,367)">HTML</text>
  <text x="635" y="367" font-size="7" font-weight="500" fill="#10B981" text-anchor="middle" transform="rotate(-90,635,367)">CSS</text>
  <text x="665" y="367" font-size="7" font-weight="500" fill="#F59E0B" text-anchor="middle" transform="rotate(-90,665,367)">JS</text>
  <text x="695" y="367" font-size="7" font-weight="500" fill="#EF4444" text-anchor="middle" transform="rotate(-90,695,367)">IMG</text>
  <text x="725" y="367" font-size="7" font-weight="500" fill="#3B82F6" text-anchor="middle" transform="rotate(-90,725,367)">Font</text>

  <!-- Bottom legend -->
  <rect x="180" y="475" width="10" height="10" rx="2" fill="#3B82F6" opacity="0.7"/>
  <text x="195" y="484" font-size="9" fill="#64748B">Request/Response</text>
  <rect x="300" y="475" width="10" height="10" rx="2" fill="#10B981" opacity="0.7"/>
  <text x="315" y="484" font-size="9" fill="#64748B">Multiplexed Stream</text>
  <rect x="435" y="475" width="10" height="10" rx="2" fill="#6366F1" opacity="0.7"/>
  <text x="450" y="484" font-size="9" fill="#64748B">Independent QUIC Stream</text>
  <text x="597" y="484" font-size="10" fill="#EF4444" font-weight="700">X</text>
  <text x="610" y="484" font-size="9" fill="#64748B">Packet Loss</text>
</svg>
