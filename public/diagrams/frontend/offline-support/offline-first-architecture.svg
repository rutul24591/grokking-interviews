<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Offline-First Layered Architecture</text>

  <!-- UI Components Layer -->
  <rect x="200" y="60" width="400" height="60" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <text x="400" y="87" text-anchor="middle" font-size="15" font-weight="600" fill="#6366F1">UI Components</text>
  <text x="400" y="107" text-anchor="middle" font-size="11" fill="#64748b">React / Framework Layer</text>

  <!-- Arrows: UI <-> Local Store -->
  <line x1="350" y1="120" x2="350" y2="155" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="450" y1="155" x2="450" y2="120" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="330" y="142" text-anchor="end" font-size="10" fill="#6366F1" font-weight="500">read</text>
  <text x="470" y="142" text-anchor="start" font-size="10" fill="#6366F1" font-weight="500">write</text>
  <!-- "fast" label -->
  <rect x="370" y="131" width="60" height="16" rx="3" fill="#6366F1" opacity="0.1"/>
  <text x="400" y="142" text-anchor="middle" font-size="9" fill="#6366F1" font-weight="600">INSTANT</text>

  <!-- Local Store Layer -->
  <rect x="150" y="155" width="500" height="70" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="185" text-anchor="middle" font-size="15" font-weight="600" fill="#10B981">Local Store (IndexedDB)</text>
  <text x="400" y="205" text-anchor="middle" font-size="11" fill="#64748b">Source of truth for UI - Structured data with indexes</text>
  <!-- Database icon -->
  <ellipse cx="180" cy="185" rx="12" ry="7" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <line x1="168" y1="185" x2="168" y2="198" stroke="#10B981" stroke-width="1.5"/>
  <line x1="192" y1="185" x2="192" y2="198" stroke="#10B981" stroke-width="1.5"/>
  <ellipse cx="180" cy="198" rx="12" ry="7" fill="none" stroke="#10B981" stroke-width="1.5"/>

  <!-- Arrows: Local Store <-> Sync Engine -->
  <line x1="350" y1="225" x2="350" y2="265" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="450" y1="265" x2="450" y2="225" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="330" y="250" text-anchor="end" font-size="10" fill="#10B981" font-weight="500">changes</text>
  <text x="470" y="250" text-anchor="start" font-size="10" fill="#10B981" font-weight="500">updates</text>

  <!-- Sync Engine Layer -->
  <rect x="150" y="265" width="500" height="70" rx="10" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" font-size="15" font-weight="600" fill="#D97706">Sync Engine</text>
  <text x="400" y="315" text-anchor="middle" font-size="11" fill="#64748b">Outbox queue - Conflict detection - Batch sync - Retry logic</text>
  <!-- Queue icon -->
  <rect x="170" y="283" width="10" height="20" rx="2" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <rect x="183" y="283" width="10" height="20" rx="2" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <rect x="196" y="283" width="10" height="20" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>

  <!-- Arrows: Sync Engine <-> Network Layer (dashed) -->
  <line x1="400" y1="335" x2="400" y2="370" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowGray)"/>
  <text x="420" y="358" text-anchor="start" font-size="10" fill="#94a3b8" font-weight="500">async</text>

  <!-- Network Layer -->
  <rect x="250" y="370" width="300" height="40" rx="8" fill="#F1F5F9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#64748b">Network Layer</text>
  <!-- Online/offline indicator -->
  <circle cx="540" cy="390" r="6" fill="#10B981"/>
  <text x="554" y="394" font-size="9" fill="#10B981" font-weight="500">online</text>
  <circle cx="270" cy="390" r="6" fill="#EF4444"/>
  <text x="254" y="394" text-anchor="end" font-size="9" fill="#EF4444" font-weight="500">offline</text>

  <!-- Arrows: Network <-> Server (dashed) -->
  <line x1="400" y1="410" x2="400" y2="435" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowPrimary)"/>

  <!-- Remote Server Layer -->
  <rect x="200" y="435" width="400" height="50" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="460" text-anchor="middle" font-size="15" font-weight="600" fill="#3B82F6">Remote Server / API</text>
  <text x="400" y="477" text-anchor="middle" font-size="11" fill="#64748b">Processes mutations - Broadcasts to peers</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366F1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10B981"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowPrimary" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3B82F6"/>
    </marker>
  </defs>
</svg>
