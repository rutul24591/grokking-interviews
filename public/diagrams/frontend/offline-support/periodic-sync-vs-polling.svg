<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="white"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">Client Polling vs. Periodic Background Sync</text>

  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="385" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="400" y="395" text-anchor="middle" font-size="10" fill="#94A3B8" font-style="italic">VS</text>

  <!-- LEFT: Client Polling -->
  <rect x="30" y="55" width="340" height="40" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="200" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#DC2626">Client Polling</text>

  <!-- Polling characteristics -->
  <g transform="translate(50, 115)">
    <!-- App must be open -->
    <rect x="0" y="0" width="300" height="36" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <circle cx="18" cy="18" r="8" fill="#EF4444"/>
    <text x="18" y="22" text-anchor="middle" font-size="10" fill="white" font-weight="700">!</text>
    <text x="35" y="15" font-size="11" font-weight="600" fill="#991B1B">App must be open</text>
    <text x="35" y="28" font-size="9" fill="#B91C1C">No background execution possible</text>

    <!-- setInterval -->
    <rect x="0" y="44" width="300" height="36" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <circle cx="18" cy="18" r="8" fill="#EF4444" transform="translate(0, 44)"/>
    <text x="18" y="66" text-anchor="middle" font-size="10" fill="white" font-weight="700">!</text>
    <text x="35" y="59" font-size="11" font-weight="600" fill="#991B1B">setInterval / setTimeout</text>
    <text x="35" y="72" font-size="9" fill="#B91C1C">Fixed interval regardless of conditions</text>

    <!-- Constant network -->
    <rect x="0" y="88" width="300" height="36" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <circle cx="18" cy="18" r="8" fill="#EF4444" transform="translate(0, 88)"/>
    <text x="18" y="110" text-anchor="middle" font-size="10" fill="white" font-weight="700">!</text>
    <text x="35" y="103" font-size="11" font-weight="600" fill="#991B1B">Constant network requests</text>
    <text x="35" y="116" font-size="9" fill="#B91C1C">Fires even on metered / slow connections</text>

    <!-- Battery drain -->
    <rect x="0" y="132" width="300" height="36" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
    <circle cx="18" cy="18" r="8" fill="#EF4444" transform="translate(0, 132)"/>
    <text x="18" y="154" text-anchor="middle" font-size="10" fill="white" font-weight="700">!</text>
    <text x="35" y="147" font-size="11" font-weight="600" fill="#991B1B">Battery drain</text>
    <text x="35" y="160" font-size="9" fill="#B91C1C">No awareness of power state</text>
  </g>

  <!-- Battery icon LEFT - depleted -->
  <g transform="translate(130, 310)">
    <rect x="0" y="0" width="50" height="24" rx="3" fill="none" stroke="#EF4444" stroke-width="2"/>
    <rect x="50" y="7" width="5" height="10" rx="1" fill="#EF4444"/>
    <rect x="3" y="3" width="8" height="18" rx="1" fill="#EF4444" opacity="0.6"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#DC2626">15%</text>
  </g>
  <text x="200" y="360" text-anchor="middle" font-size="11" fill="#991B1B" font-weight="600">High resource consumption</text>
  <text x="200" y="375" text-anchor="middle" font-size="9" fill="#B91C1C">Works in all browsers</text>

  <!-- RIGHT: Periodic Background Sync -->
  <rect x="430" y="55" width="340" height="40" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <text x="600" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">Periodic Background Sync</text>

  <!-- PBS characteristics -->
  <g transform="translate(450, 115)">
    <!-- App can be closed -->
    <rect x="0" y="0" width="300" height="36" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <circle cx="18" cy="18" r="8" fill="#10B981"/>
    <text x="14" y="22" font-size="12" fill="white" font-weight="700">&#10003;</text>
    <text x="35" y="15" font-size="11" font-weight="600" fill="#064E3B">App can be closed</text>
    <text x="35" y="28" font-size="9" fill="#065F46">Service worker wakes independently</text>

    <!-- Browser-optimized -->
    <rect x="0" y="44" width="300" height="36" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <circle cx="18" cy="18" r="8" fill="#10B981" transform="translate(0, 44)"/>
    <text x="14" y="66" font-size="12" fill="white" font-weight="700">&#10003;</text>
    <text x="35" y="59" font-size="11" font-weight="600" fill="#064E3B">Browser-optimized scheduling</text>
    <text x="35" y="72" font-size="9" fill="#065F46">Adapts to battery, network, engagement</text>

    <!-- Batched syncs -->
    <rect x="0" y="88" width="300" height="36" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <circle cx="18" cy="18" r="8" fill="#10B981" transform="translate(0, 88)"/>
    <text x="14" y="110" font-size="12" fill="white" font-weight="700">&#10003;</text>
    <text x="35" y="103" font-size="11" font-weight="600" fill="#064E3B">Batched with other syncs</text>
    <text x="35" y="116" font-size="9" fill="#065F46">Minimizes device wake-ups</text>

    <!-- Battery friendly -->
    <rect x="0" y="132" width="300" height="36" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <circle cx="18" cy="18" r="8" fill="#10B981" transform="translate(0, 132)"/>
    <text x="14" y="154" font-size="12" fill="white" font-weight="700">&#10003;</text>
    <text x="35" y="147" font-size="11" font-weight="600" fill="#064E3B">Battery-friendly</text>
    <text x="35" y="160" font-size="9" fill="#065F46">Defers when battery is low</text>
  </g>

  <!-- Battery icon RIGHT - healthy -->
  <g transform="translate(530, 310)">
    <rect x="0" y="0" width="50" height="24" rx="3" fill="none" stroke="#10B981" stroke-width="2"/>
    <rect x="50" y="7" width="5" height="10" rx="1" fill="#10B981"/>
    <rect x="3" y="3" width="44" height="18" rx="1" fill="#10B981" opacity="0.5"/>
    <text x="25" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#065F46">92%</text>
  </g>
  <text x="600" y="360" text-anchor="middle" font-size="11" fill="#064E3B" font-weight="600">Low resource consumption</text>
  <text x="600" y="375" text-anchor="middle" font-size="9" fill="#065F46">Chromium browsers only</text>
</svg>
