<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Full Hydration vs Selective Hydration — Performance</text>

  <defs>
    <marker id="ax" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- X Axis: 0–10s, x=200 to x=860, 1s=66px -->
  <line x1="200" y1="430" x2="865" y2="430" stroke="#1a1822" stroke-width="2" marker-end="url(#ax)"/>
  <!-- Ticks -->
  <line x1="200" y1="425" x2="200" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="200" y="448" text-anchor="middle" font-size="11" fill="#1a1822">0s</text>
  <line x1="266" y1="425" x2="266" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="266" y="448" text-anchor="middle" font-size="11" fill="#1a1822">1s</text>
  <line x1="332" y1="425" x2="332" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="332" y="448" text-anchor="middle" font-size="11" fill="#1a1822">2s</text>
  <line x1="398" y1="425" x2="398" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="398" y="448" text-anchor="middle" font-size="11" fill="#1a1822">3s</text>
  <line x1="464" y1="425" x2="464" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="464" y="448" text-anchor="middle" font-size="11" fill="#1a1822">4s</text>
  <line x1="530" y1="425" x2="530" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="530" y="448" text-anchor="middle" font-size="11" fill="#1a1822">5s</text>
  <line x1="596" y1="425" x2="596" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="596" y="448" text-anchor="middle" font-size="11" fill="#1a1822">6s</text>
  <line x1="662" y1="425" x2="662" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="662" y="448" text-anchor="middle" font-size="11" fill="#1a1822">7s</text>
  <line x1="728" y1="425" x2="728" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="728" y="448" text-anchor="middle" font-size="11" fill="#1a1822">8s</text>
  <line x1="794" y1="425" x2="794" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="794" y="448" text-anchor="middle" font-size="11" fill="#1a1822">9s</text>
  <line x1="860" y1="425" x2="860" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="860" y="448" text-anchor="middle" font-size="11" fill="#1a1822">10s</text>

  <!-- Grid lines -->
  <line x1="266" y1="80" x2="266" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="332" y1="80" x2="332" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="398" y1="80" x2="398" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="464" y1="80" x2="464" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="530" y1="80" x2="530" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="596" y1="80" x2="596" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="662" y1="80" x2="662" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="728" y1="80" x2="728" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="794" y1="80" x2="794" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- FULL HYDRATION rows -->
  <rect x="20" y="85" width="172" height="26" rx="5" fill="#d97843"/>
  <text x="106" y="102" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Full Hydration</text>

  <!-- Row F1: Download ALL JS: 0-5s → w=330 -->
  <text x="190" y="130" text-anchor="end" font-size="11" fill="#1a1822">JS Download</text>
  <rect x="200" y="115" width="330" height="26" rx="4" fill="#d97843"/>
  <text x="365" y="132" text-anchor="middle" font-size="10" fill="#fff">Download ALL JS (~500KB–2MB) — 0 to 5s</text>

  <!-- Row F2: Hydrate ALL: 5-9s → x=530, w=264 -->
  <text x="190" y="174" text-anchor="end" font-size="11" fill="#1a1822">Hydrate ALL</text>
  <rect x="530" y="159" width="264" height="26" rx="4" fill="#d97843" opacity="0.8"/>
  <text x="662" y="176" text-anchor="middle" font-size="10" fill="#fff">Hydrate ALL components — blocks main thread 4s</text>

  <!-- TTI marker Full -->
  <line x1="794" y1="85" x2="794" y2="205" stroke="#d97843" stroke-width="2.5"/>
  <rect x="762" y="82" width="64" height="20" rx="5" fill="#d97843"/>
  <text x="794" y="96" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">TTI: 9s</text>

  <!-- SELECTIVE HYDRATION rows -->
  <rect x="20" y="220" width="172" height="26" rx="5" fill="#2f9d74"/>
  <text x="106" y="237" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Selective Hydration</text>

  <!-- Row S1: Download Critical JS: 0-1s → w=66 -->
  <text x="190" y="264" text-anchor="end" font-size="11" fill="#1a1822">JS (Critical)</text>
  <rect x="200" y="249" width="66" height="26" rx="4" fill="#6d5bd0"/>
  <text x="233" y="266" text-anchor="middle" font-size="9" fill="#fff">Critical JS ~50KB</text>

  <!-- Row S2: Hydrate only interactive: 1-2s → x=266, w=66 -->
  <text x="190" y="308" text-anchor="end" font-size="11" fill="#1a1822">Hydrate Islands</text>
  <rect x="266" y="293" width="66" height="26" rx="4" fill="#2f9d74"/>
  <text x="299" y="310" text-anchor="middle" font-size="9" fill="#fff">Hydrate 3 islands</text>

  <!-- TTI marker Selective -->
  <line x1="332" y1="220" x2="332" y2="380" stroke="#2f9d74" stroke-width="2.5"/>
  <rect x="300" y="216" width="64" height="20" rx="5" fill="#2f9d74"/>
  <text x="332" y="230" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">TTI: 2s</text>

  <!-- Static content label -->
  <rect x="200" y="330" width="660" height="26" rx="4" fill="#d7d1e6" opacity="0.5"/>
  <text x="530" y="347" text-anchor="middle" font-size="10" fill="#1a1822">Static content: 0 JS — never hydrated — instant</text>

  <!-- Improvement callout -->
  <rect x="340" y="380" width="520" height="34" rx="8" fill="#6d5bd0"/>
  <text x="600" y="397" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">5x faster TTI: 2s vs 9s</text>
  <text x="600" y="410" text-anchor="middle" font-size="11" fill="#edeaf5">Selective hydration ships only needed JS (50KB vs 2MB)</text>

  <!-- X axis label -->
  <text x="530" y="472" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Time (seconds)</text>
</svg>
