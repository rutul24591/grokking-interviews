<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Islands Architecture — Hydration Timeline</text>

  <defs>
    <marker id="ax" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- X axis: 0-3s, x=210 to x=860, 1s=216.7px -->
  <line x1="210" y1="430" x2="865" y2="430" stroke="#1a1822" stroke-width="2" marker-end="url(#ax)"/>
  <!-- Ticks -->
  <line x1="210" y1="425" x2="210" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="210" y="448" text-anchor="middle" font-size="11" fill="#1a1822">0ms</text>
  <line x1="426" y1="425" x2="426" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="426" y="448" text-anchor="middle" font-size="11" fill="#1a1822">1s</text>
  <line x1="642" y1="425" x2="642" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="642" y="448" text-anchor="middle" font-size="11" fill="#1a1822">2s</text>
  <line x1="858" y1="425" x2="858" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="858" y="448" text-anchor="middle" font-size="11" fill="#1a1822">3s</text>

  <!-- Grid lines -->
  <line x1="426" y1="80" x2="426" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="642" y1="80" x2="642" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="858" y1="80" x2="858" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- 500ms, 1500ms lines -->
  <line x1="318" y1="80" x2="318" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="534" y1="80" x2="534" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="318" y="468" text-anchor="middle" font-size="9" fill="#6d5bd0">0.5s</text>
  <text x="534" y="468" text-anchor="middle" font-size="9" fill="#6d5bd0">1.5s</text>

  <!-- Row 1: Static HTML -->
  <text x="200" y="103" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">Static HTML</text>
  <rect x="210" y="86" width="648" height="30" rx="5" fill="#8b9dc3" opacity="0.4"/>
  <text x="534" y="105" text-anchor="middle" font-size="11" fill="#1a1822">Immediately available (0ms) — served from CDN</text>

  <!-- FCP marker at 0 -->
  <line x1="210" y1="80" x2="210" y2="170" stroke="#2f9d74" stroke-width="2.5"/>
  <rect x="188" y="78" width="44" height="18" rx="4" fill="#2f9d74"/>
  <text x="210" y="91" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">FCP</text>

  <!-- Row 2: Island 1 — client:load (0-0.5s) -->
  <text x="200" y="157" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">Island 1: Cart</text>
  <rect x="210" y="140" width="108" height="30" rx="5" fill="#6d5bd0"/>
  <text x="264" y="159" text-anchor="middle" font-size="10" fill="#fff">Download JS (0.5s)</text>
  <rect x="318" y="140" width="108" height="30" rx="5" fill="#2f9d74"/>
  <text x="372" y="159" text-anchor="middle" font-size="10" fill="#fff">Hydrate (0.5-1s)</text>
  <!-- TTI Island 1 at 1s -->
  <line x1="426" y1="130" x2="426" y2="180" stroke="#2f9d74" stroke-width="2.5"/>
  <rect x="404" y="128" width="44" height="18" rx="4" fill="#2f9d74"/>
  <text x="426" y="141" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">TTI</text>
  <text x="160" y="175" text-anchor="end" font-size="9" fill="#6d5bd0">client:load</text>

  <!-- Row 3: Island 2 — client:idle (1-2s) -->
  <text x="200" y="217" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">Island 2: Search</text>
  <rect x="426" y="200" width="108" height="30" rx="5" fill="#d97843" opacity="0.9"/>
  <text x="480" y="219" text-anchor="middle" font-size="10" fill="#fff">waiting idle...</text>
  <rect x="534" y="200" width="108" height="30" rx="5" fill="#6d5bd0"/>
  <text x="588" y="219" text-anchor="middle" font-size="10" fill="#fff">DL JS</text>
  <rect x="642" y="200" width="108" height="30" rx="5" fill="#2f9d74"/>
  <text x="696" y="219" text-anchor="middle" font-size="10" fill="#fff">Hydrate (2-2.5s)</text>
  <!-- TTI Island 2 at ~2s -->
  <line x1="750" y1="190" x2="750" y2="240" stroke="#2f9d74" stroke-width="2.5"/>
  <rect x="728" y="188" width="44" height="18" rx="4" fill="#2f9d74"/>
  <text x="750" y="201" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">TTI</text>
  <text x="160" y="235" text-anchor="end" font-size="9" fill="#d97843">client:idle</text>

  <!-- Row 4: Island 3 — client:visible (2-3s) -->
  <text x="200" y="275" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">Island 3: Newsletter</text>
  <rect x="210" y="258" width="432" height="30" rx="5" fill="#d7d1e6" opacity="0.5"/>
  <text x="426" y="277" text-anchor="middle" font-size="10" fill="#1a1822">waiting for user to scroll...</text>
  <rect x="642" y="258" width="108" height="30" rx="5" fill="#6d5bd0"/>
  <text x="696" y="277" text-anchor="middle" font-size="10" fill="#fff">DL + Hydrate</text>
  <!-- TTI Island 3 at ~3s -->
  <line x1="750" y1="248" x2="750" y2="298" stroke="#2f9d74" stroke-width="2.5"/>
  <text x="160" y="295" text-anchor="end" font-size="9" fill="#6d5bd0">client:visible</text>

  <!-- Row 5: Never hydrated -->
  <text x="200" y="340" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">Static Footer</text>
  <rect x="210" y="323" width="648" height="30" rx="5" fill="#f0eef5" stroke="#d7d1e6"/>
  <text x="534" y="341" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">No JavaScript — never hydrated — pure static HTML (0 KB JS)</text>
  <text x="160" y="356" text-anchor="end" font-size="9" fill="#1a1822">Never</text>

  <!-- Summary note -->
  <rect x="20" y="380" width="860" height="38" rx="6" fill="#edeaf5" stroke="#6d5bd0"/>
  <text x="450" y="396" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="bold">Each island hydrates on its own schedule — independently — non-blocking.</text>
  <text x="450" y="412" text-anchor="middle" font-size="11" fill="#1a1822">Cart is interactive at 1s. Search at 2s. Newsletter at 3s. Static content: always instant.</text>

  <!-- X axis label -->
  <text x="537" y="480" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Time</text>
</svg>
