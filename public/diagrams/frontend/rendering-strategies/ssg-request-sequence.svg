<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">SSG Request Sequence — Static Files from CDN</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
  </defs>

  <!-- Actors -->
  <rect x="60" y="65" width="140" height="46" rx="10" fill="#6d5bd0"/>
  <text x="130" y="88" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">User Browser</text>
  <text x="130" y="104" text-anchor="middle" font-size="11" fill="#edeaf5">Client</text>

  <rect x="380" y="65" width="140" height="46" rx="10" fill="#2f9d74"/>
  <text x="450" y="88" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">CDN Edge Node</text>
  <text x="450" y="104" text-anchor="middle" font-size="11" fill="#e8f5f0">Geographically close</text>

  <rect x="700" y="65" width="140" height="46" rx="10" fill="#d7d1e6"/>
  <text x="770" y="88" text-anchor="middle" font-size="13" fill="#1a1822" font-weight="bold">Origin Server</text>
  <text x="770" y="104" text-anchor="middle" font-size="11" fill="#6d5bd0">(Not involved)</text>

  <!-- Lifelines -->
  <line x1="130" y1="111" x2="130" y2="440" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="450" y1="111" x2="450" y2="440" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="770" y1="111" x2="770" y2="440" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Step 1: User requests page -->
  <line x1="130" y1="155" x2="440" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="175" y="137" width="220" height="20" rx="4" fill="#edeaf5"/>
  <text x="285" y="151" text-anchor="middle" font-size="11" fill="#1a1822">1. GET /page (HTTP request)</text>

  <!-- CDN checks cache -->
  <rect x="390" y="170" width="120" height="28" rx="6" fill="#2f9d74"/>
  <text x="450" y="188" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Cache Lookup</text>

  <!-- Cache HIT path -->
  <rect x="390" y="212" width="120" height="28" rx="6" fill="#2f9d74"/>
  <text x="450" y="230" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Cache HIT ✓</text>

  <!-- Step 2: Instant response -->
  <line x1="440" y1="260" x2="140" y2="260" stroke="#2f9d74" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <rect x="175" y="242" width="255" height="20" rx="4" fill="#e8f5f0"/>
  <text x="302" y="256" text-anchor="middle" font-size="11" fill="#1a1822">2. Returns pre-built HTML instantly (~10ms)</text>

  <!-- FCP indicator -->
  <rect x="30" y="278" width="200" height="30" rx="8" fill="#2f9d74"/>
  <text x="130" y="298" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">FCP = TTI (immediate)</text>

  <!-- No server / no DB annotation -->
  <rect x="600" y="155" width="185" height="90" rx="8" fill="#fff" stroke="#d7d1e6" stroke-dasharray="6,3"/>
  <text x="692" y="178" text-anchor="middle" font-size="12" fill="#d97843" font-weight="bold">NOT involved:</text>
  <text x="608" y="200" font-size="11" fill="#1a1822">✗ No server processing</text>
  <text x="608" y="218" font-size="11" fill="#1a1822">✗ No database queries</text>
  <text x="608" y="235" font-size="11" fill="#1a1822">✗ No dynamic rendering</text>

  <!-- Contrast: SSR path (grayed out) -->
  <rect x="20" y="340" width="860" height="90" rx="10" fill="#fff" stroke="#d7d1e6"/>
  <text x="450" y="365" text-anchor="middle" font-size="13" fill="#d97843" font-weight="bold">Compare: SSR (each request hits server)</text>
  <text x="60" y="390" font-size="12" fill="#1a1822">SSR path:</text>
  <line x1="140" y1="385" x2="290" y2="385" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="215" y="378" text-anchor="middle" font-size="10" fill="#1a1822">request</text>
  <rect x="290" y="371" width="100" height="24" rx="4" fill="#d97843" opacity="0.7"/>
  <text x="340" y="387" text-anchor="middle" font-size="10" fill="#fff">Server renders</text>
  <line x1="390" y1="383" x2="470" y2="383" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="470" y="371" width="80" height="24" rx="4" fill="#d97843" opacity="0.7"/>
  <text x="510" y="387" text-anchor="middle" font-size="10" fill="#fff">DB query</text>
  <line x1="550" y1="383" x2="630" y2="383" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="700" y="387" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">~800ms–2s TTFB</text>

  <text x="450" y="418" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">SSG avoids all of this → ~10-50ms TTFB from CDN edge</text>

  <!-- Key metric callout -->
  <rect x="340" y="290" width="230" height="36" rx="8" fill="#6d5bd0"/>
  <text x="455" y="308" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">TTFB: ~10-50ms (CDN edge)</text>
  <text x="455" y="322" text-anchor="middle" font-size="10" fill="#edeaf5">vs 200-800ms for SSR</text>
</svg>
