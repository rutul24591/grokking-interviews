<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">SSR vs CSR vs SSG — Performance Timeline</text>

  <defs>
    <marker id="ax" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- Axis: 0 to 6s, x=160 to x=860, scale 1s=116.7px -->
  <line x1="160" y1="440" x2="865" y2="440" stroke="#1a1822" stroke-width="2" marker-end="url(#ax)"/>
  <!-- Ticks -->
  <line x1="160" y1="435" x2="160" y2="445" stroke="#1a1822" stroke-width="2"/>
  <text x="160" y="458" text-anchor="middle" font-size="11" fill="#1a1822">0s</text>
  <line x1="277" y1="435" x2="277" y2="445" stroke="#1a1822" stroke-width="2"/>
  <text x="277" y="458" text-anchor="middle" font-size="11" fill="#1a1822">1s</text>
  <line x1="394" y1="435" x2="394" y2="445" stroke="#1a1822" stroke-width="2"/>
  <text x="394" y="458" text-anchor="middle" font-size="11" fill="#1a1822">2s</text>
  <line x1="511" y1="435" x2="511" y2="445" stroke="#1a1822" stroke-width="2"/>
  <text x="511" y="458" text-anchor="middle" font-size="11" fill="#1a1822">3s</text>
  <line x1="628" y1="435" x2="628" y2="445" stroke="#1a1822" stroke-width="2"/>
  <text x="628" y="458" text-anchor="middle" font-size="11" fill="#1a1822">4s</text>
  <line x1="745" y1="435" x2="745" y2="445" stroke="#1a1822" stroke-width="2"/>
  <text x="745" y="458" text-anchor="middle" font-size="11" fill="#1a1822">5s</text>
  <line x1="862" y1="435" x2="862" y2="445" stroke="#1a1822" stroke-width="2"/>
  <text x="862" y="458" text-anchor="middle" font-size="11" fill="#1a1822">6s</text>

  <!-- Grid lines -->
  <line x1="277" y1="60" x2="277" y2="440" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="394" y1="60" x2="394" y2="440" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="511" y1="60" x2="511" y2="440" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="628" y1="60" x2="628" y2="440" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="745" y1="60" x2="745" y2="440" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- SSG Row -->
  <rect x="20" y="72" width="130" height="30" rx="5" fill="#2f9d74"/>
  <text x="85" y="91" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">SSG</text>

  <!-- SSG TTFB: 0-0.2s → 0 to 23px wide -->
  <rect x="160" y="72" width="23" height="30" rx="4" fill="#6d5bd0"/>
  <text x="171" y="87" text-anchor="middle" font-size="9" fill="#fff">TB</text>
  <!-- SSG FCP ≈ TTI: at 0.2s, both same -->
  <line x1="183" y1="60" x2="183" y2="112" stroke="#2f9d74" stroke-width="2.5"/>
  <rect x="168" y="60" width="56" height="18" rx="4" fill="#2f9d74"/>
  <text x="196" y="73" text-anchor="middle" font-size="10" fill="#fff">FCP=TTI</text>

  <text x="210" y="95" font-size="10" fill="#2f9d74" font-weight="bold">Fastest (CDN edge, no processing)</text>

  <!-- SSR Row -->
  <rect x="20" y="180" width="130" height="30" rx="5" fill="#6d5bd0"/>
  <text x="85" y="199" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">SSR</text>

  <!-- SSR TTFB+server: 0-0.8s → w=93 -->
  <rect x="160" y="180" width="93" height="30" rx="4" fill="#d97843"/>
  <text x="206" y="199" text-anchor="middle" font-size="10" fill="#fff">TTFB+Server</text>
  <!-- SSR FCP at 0.8s -->
  <line x1="253" y1="168" x2="253" y2="220" stroke="#2f9d74" stroke-width="2.5"/>
  <rect x="238" y="168" width="36" height="18" rx="4" fill="#2f9d74"/>
  <text x="256" y="181" text-anchor="middle" font-size="10" fill="#fff">FCP</text>

  <!-- SSR Hydration: 0.8-2s → x=253, w=140 -->
  <rect x="253" y="180" width="140" height="30" rx="4" fill="#6d5bd0" opacity="0.6"/>
  <text x="323" y="199" text-anchor="middle" font-size="10" fill="#fff">Hydration</text>
  <!-- SSR TTI at 2s -->
  <line x1="393" y1="168" x2="393" y2="220" stroke="#2f9d74" stroke-width="2.5"/>
  <rect x="378" y="168" width="36" height="18" rx="4" fill="#2f9d74"/>
  <text x="396" y="181" text-anchor="middle" font-size="10" fill="#fff">TTI</text>

  <text x="445" y="199" font-size="10" fill="#6d5bd0" font-weight="bold">Good FCP, TTI after hydration</text>

  <!-- CSR Row -->
  <rect x="20" y="290" width="130" height="30" rx="5" fill="#d97843"/>
  <text x="85" y="309" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">CSR</text>

  <!-- CSR TTFB: 0-0.2s fast but empty -->
  <rect x="160" y="290" width="23" height="30" rx="4" fill="#6d5bd0"/>
  <text x="171" y="305" text-anchor="middle" font-size="9" fill="#fff">TB</text>
  <!-- Empty marker -->
  <text x="215" y="309" font-size="10" fill="#d97843">(empty HTML shell)</text>
  <!-- FCP at ~3s -->
  <line x1="511" y1="278" x2="511" y2="330" stroke="#d97843" stroke-width="2.5"/>
  <rect x="496" y="278" width="36" height="18" rx="4" fill="#d97843"/>
  <text x="514" y="291" text-anchor="middle" font-size="10" fill="#fff">FCP</text>
  <!-- TTI at ~5.5s -->
  <line x1="804" y1="278" x2="804" y2="330" stroke="#1a1822" stroke-width="2.5"/>
  <rect x="789" y="278" width="36" height="18" rx="4" fill="#1a1822"/>
  <text x="807" y="291" text-anchor="middle" font-size="10" fill="#fff">TTI</text>
  <!-- JS download+execute bar: 0.2s-3s → x=183, w=328 -->
  <rect x="183" y="290" width="328" height="30" rx="4" fill="#d97843" opacity="0.7"/>
  <text x="347" y="309" text-anchor="middle" font-size="10" fill="#fff">JS Download + Execute</text>
  <!-- API+render bar: 3-5.5s → x=511, w=293 -->
  <rect x="511" y="290" width="293" height="30" rx="4" fill="#d97843" opacity="0.5"/>
  <text x="657" y="309" text-anchor="middle" font-size="10" fill="#fff">API Fetch + Render</text>

  <!-- Legend -->
  <rect x="20" y="390" width="840" height="36" rx="6" fill="#fff" stroke="#d7d1e6"/>
  <rect x="35" y="400" width="14" height="14" rx="3" fill="#6d5bd0"/>
  <text x="55" y="412" font-size="11" fill="#1a1822">TTFB/Server Processing</text>
  <rect x="230" y="400" width="14" height="14" rx="3" fill="#d97843"/>
  <text x="250" y="412" font-size="11" fill="#1a1822">JS Download/Execute</text>
  <rect x="420" y="400" width="14" height="14" rx="3" fill="#2f9d74"/>
  <text x="440" y="412" font-size="11" fill="#1a1822">FCP / TTI Milestones</text>
  <rect x="610" y="400" width="14" height="14" rx="3" fill="#6d5bd0" opacity="0.6"/>
  <text x="630" y="412" font-size="11" fill="#1a1822">Hydration</text>

  <!-- X label -->
  <text x="520" y="480" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Time (seconds)</text>
</svg>
