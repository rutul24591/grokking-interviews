<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">CSR vs SSR Performance Timeline</text>

  <!-- Timeline axis -->
  <!-- X axis: 0 to 6 seconds, mapped to x=180 to x=860 -->
  <!-- Scale: 1s = ~113px -->

  <defs>
    <marker id="ax-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- Section headers -->
  <rect x="20" y="60" width="840" height="36" rx="6" fill="#6d5bd0"/>
  <text x="450" y="83" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">Performance Gantt Chart — Time in seconds</text>

  <!-- Axis line -->
  <line x1="180" y1="430" x2="865" y2="430" stroke="#1a1822" stroke-width="2" marker-end="url(#ax-arrow)"/>
  <!-- Tick marks and labels -->
  <line x1="180" y1="425" x2="180" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="180" y="448" text-anchor="middle" font-size="11" fill="#1a1822">0s</text>
  <line x1="293" y1="425" x2="293" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="293" y="448" text-anchor="middle" font-size="11" fill="#1a1822">1s</text>
  <line x1="406" y1="425" x2="406" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="406" y="448" text-anchor="middle" font-size="11" fill="#1a1822">2s</text>
  <line x1="519" y1="425" x2="519" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="519" y="448" text-anchor="middle" font-size="11" fill="#1a1822">3s</text>
  <line x1="632" y1="425" x2="632" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="632" y="448" text-anchor="middle" font-size="11" fill="#1a1822">4s</text>
  <line x1="745" y1="425" x2="745" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="745" y="448" text-anchor="middle" font-size="11" fill="#1a1822">5s</text>
  <line x1="858" y1="425" x2="858" y2="435" stroke="#1a1822" stroke-width="2"/>
  <text x="858" y="448" text-anchor="middle" font-size="11" fill="#1a1822">6s</text>

  <!-- Grid lines -->
  <line x1="293" y1="110" x2="293" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="406" y1="110" x2="406" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="519" y1="110" x2="519" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="632" y1="110" x2="632" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="745" y1="110" x2="745" y2="430" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- CSR Section Label -->
  <rect x="20" y="112" width="155" height="26" rx="4" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="97" y="129" text-anchor="middle" font-size="13" fill="#6d5bd0" font-weight="bold">CSR Timeline</text>

  <!-- CSR bars -->
  <!-- TTFB: 0-0.5s → x=180, w=57 -->
  <rect x="180" y="148" width="57" height="30" rx="4" fill="#6d5bd0"/>
  <text x="208" y="168" text-anchor="middle" font-size="10" fill="#fff">TTFB</text>
  <text x="20" y="168" text-anchor="start" font-size="11" fill="#1a1822">TTFB</text>

  <!-- JS Download: 0.5-2s → x=237, w=170 -->
  <rect x="237" y="192" width="170" height="30" rx="4" fill="#d97843"/>
  <text x="322" y="212" text-anchor="middle" font-size="10" fill="#fff">JS Download (0.5s–2s)</text>
  <text x="20" y="212" text-anchor="start" font-size="11" fill="#1a1822">JS Download</text>

  <!-- JS Execute: 2-4s → x=406, w=226 -->
  <rect x="406" y="236" width="226" height="30" rx="4" fill="#d97843" opacity="0.8"/>
  <text x="519" y="256" text-anchor="middle" font-size="10" fill="#fff">JS Execute (2s–4s)</text>
  <text x="20" y="256" text-anchor="start" font-size="11" fill="#1a1822">JS Execute</text>

  <!-- API Fetch: 4-5.5s → x=632, w=170 -->
  <rect x="632" y="280" width="170" height="30" rx="4" fill="#6d5bd0" opacity="0.7"/>
  <text x="717" y="300" text-anchor="middle" font-size="10" fill="#fff">API Fetch (4s–5.5s)</text>
  <text x="20" y="300" text-anchor="start" font-size="11" fill="#1a1822">API Fetch</text>

  <!-- FCP/TTI marker at 6s -->
  <line x1="858" y1="110" x2="858" y2="430" stroke="#2f9d74" stroke-width="2.5" stroke-dasharray="6,3"/>
  <rect x="820" y="320" width="78" height="30" rx="5" fill="#2f9d74"/>
  <text x="859" y="339" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">FCP/TTI</text>

  <!-- SSR Section Label -->
  <rect x="20" y="340" width="155" height="26" rx="4" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="97" y="357" text-anchor="middle" font-size="13" fill="#6d5bd0" font-weight="bold">SSR Timeline</text>

  <!-- SSR bars -->
  <!-- TTFB+Server: 0-0.8s → x=180, w=90 -->
  <rect x="180" y="378" width="90" height="30" rx="4" fill="#6d5bd0"/>
  <text x="225" y="398" text-anchor="middle" font-size="10" fill="#fff">TTFB+Render</text>
  <text x="20" y="398" text-anchor="start" font-size="11" fill="#1a1822">TTFB+Render</text>

  <!-- FCP at 0.9s -->
  <line x1="282" y1="360" x2="282" y2="420" stroke="#2f9d74" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="258" y="360" width="48" height="20" rx="4" fill="#2f9d74"/>
  <text x="282" y="374" text-anchor="middle" font-size="10" fill="#fff">FCP</text>

  <!-- Hydration: 0.9-2s → x=282, w=124 -->
  <rect x="282" y="378" width="124" height="30" rx="4" fill="#d97843" opacity="0.8"/>
  <text x="344" y="398" text-anchor="middle" font-size="10" fill="#fff">Hydration</text>

  <!-- TTI at 2s -->
  <line x1="406" y1="360" x2="406" y2="420" stroke="#2f9d74" stroke-width="2.5" stroke-dasharray="5,3"/>
  <rect x="382" y="360" width="48" height="20" rx="4" fill="#2f9d74"/>
  <text x="406" y="374" text-anchor="middle" font-size="10" fill="#fff">TTI</text>

  <!-- X-axis label -->
  <text x="520" y="472" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Time (seconds)</text>
</svg>
