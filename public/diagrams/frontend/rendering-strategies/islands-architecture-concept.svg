<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Islands Architecture — Concept Diagram</text>

  <!-- Ocean / static HTML background -->
  <rect x="20" y="55" width="860" height="400" rx="14" fill="#e8edf5" stroke="#d7d1e6" stroke-width="2"/>

  <!-- Ocean label -->
  <text x="450" y="78" text-anchor="middle" font-size="14" fill="#8b9dc3" font-weight="bold" opacity="0.7">"Static HTML Ocean"</text>
  <text x="450" y="96" text-anchor="middle" font-size="11" fill="#8b9dc3" opacity="0.6">Server-rendered HTML — no JavaScript — instant, fully crawlable</text>

  <!-- Static content strips (text lines simulating articles) -->
  <rect x="40" y="108" width="820" height="8" rx="3" fill="#c8d0de" opacity="0.5"/>
  <rect x="40" y="122" width="700" height="8" rx="3" fill="#c8d0de" opacity="0.5"/>
  <rect x="40" y="136" width="760" height="8" rx="3" fill="#c8d0de" opacity="0.5"/>

  <!-- Island 1: Cart (top right) -->
  <rect x="580" y="100" width="280" height="120" rx="14" fill="#ffffff" stroke="#6d5bd0" stroke-width="3"/>
  <!-- Island glow effect -->
  <rect x="580" y="100" width="280" height="120" rx="14" fill="none" stroke="#6d5bd0" stroke-width="6" opacity="0.2"/>
  <rect x="580" y="100" width="280" height="32" rx="10" fill="#6d5bd0"/>
  <text x="720" y="120" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Interactive Island 1</text>
  <text x="650" y="137" font-size="11" fill="#fff">🛒 Shopping Cart</text>
  <text x="600" y="160" font-size="11" fill="#1a1822">Items: 3</text>
  <rect x="600" y="170" width="240" height="28" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0"/>
  <text x="720" y="189" text-anchor="middle" font-size="11" fill="#6d5bd0">[ Add to Cart ] [ Checkout ]</text>
  <!-- JS bundle indicator -->
  <rect x="602" y="214" width="110" height="18" rx="5" fill="#6d5bd0"/>
  <text x="657" y="226" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">JS: cart.js (18KB)</text>

  <!-- Island 2: Search (middle left) -->
  <rect x="40" y="170" width="300" height="100" rx="14" fill="#ffffff" stroke="#6d5bd0" stroke-width="3"/>
  <rect x="40" y="170" width="300" height="30" rx="10" fill="#6d5bd0"/>
  <text x="190" y="190" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Interactive Island 2</text>
  <text x="62" y="210" font-size="11" fill="#1a1822">🔍 Search Bar</text>
  <rect x="55" y="218" width="270" height="28" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0"/>
  <text x="190" y="237" text-anchor="middle" font-size="11" fill="#6d5bd0">[ Type to search... ]</text>
  <!-- JS bundle indicator -->
  <rect x="57" y="262" width="120" height="18" rx="5" fill="#6d5bd0"/>
  <text x="117" y="274" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">JS: search.js (32KB)</text>

  <!-- More static content -->
  <rect x="40" y="290" width="820" height="8" rx="3" fill="#c8d0de" opacity="0.5"/>
  <rect x="40" y="304" width="580" height="8" rx="3" fill="#c8d0de" opacity="0.5"/>

  <!-- Island 3: Newsletter (bottom) -->
  <rect x="200" y="330" width="500" height="100" rx="14" fill="#ffffff" stroke="#6d5bd0" stroke-width="3"/>
  <rect x="200" y="330" width="500" height="30" rx="10" fill="#6d5bd0"/>
  <text x="450" y="350" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Interactive Island 3</text>
  <text x="222" y="375" font-size="11" fill="#1a1822">✉️ Newsletter Signup</text>
  <rect x="220" y="383" width="290" height="30" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0"/>
  <text x="365" y="403" text-anchor="middle" font-size="11" fill="#6d5bd0">[ Enter your email... ]</text>
  <rect x="520" y="383" width="155" height="30" rx="6" fill="#6d5bd0"/>
  <text x="597" y="403" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Subscribe Now</text>
  <!-- JS bundle indicator -->
  <rect x="222" y="418" width="130" height="18" rx="5" fill="#6d5bd0"/>
  <text x="287" y="430" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">JS: newsletter.js (12KB)</text>

  <!-- More static text on right of search -->
  <rect x="360" y="180" width="200" height="8" rx="3" fill="#c8d0de" opacity="0.5"/>
  <rect x="360" y="196" width="180" height="8" rx="3" fill="#c8d0de" opacity="0.5"/>
  <rect x="360" y="212" width="195" height="8" rx="3" fill="#c8d0de" opacity="0.5"/>
  <rect x="360" y="228" width="170" height="8" rx="3" fill="#c8d0de" opacity="0.5"/>

  <!-- Legend -->
  <rect x="20" y="465" width="860" height="30" rx="6" fill="#edeaf5" stroke="#d7d1e6"/>
  <rect x="35" y="473" width="14" height="14" rx="3" fill="#e8edf5" stroke="#d7d1e6"/>
  <text x="56" y="484" font-size="11" fill="#1a1822">Static HTML (no JS — zero download, zero parse)</text>
  <rect x="320" y="473" width="14" height="14" rx="3" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="341" y="484" font-size="11" fill="#1a1822">Interactive Island (own scoped JS bundle)</text>
  <text x="680" y="484" font-size="11" fill="#6d5bd0" font-weight="bold">Total JS: 62KB</text>
</svg>
