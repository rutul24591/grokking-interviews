<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Progressive Hydration — Phase Timeline</text>

  <defs>
    <marker id="ax" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- X axis: 0–4s, x=200 to x=860, 1s=165px -->
  <line x1="200" y1="450" x2="865" y2="450" stroke="#1a1822" stroke-width="2" marker-end="url(#ax)"/>

  <!-- Ticks and grid -->
  <line x1="200" y1="445" x2="200" y2="455" stroke="#1a1822" stroke-width="2"/>
  <text x="200" y="470" text-anchor="middle" font-size="11" fill="#1a1822">0s</text>
  <line x1="365" y1="90" x2="365" y2="455" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="365" y1="445" x2="365" y2="455" stroke="#1a1822" stroke-width="2"/>
  <text x="365" y="470" text-anchor="middle" font-size="11" fill="#1a1822">1s</text>
  <line x1="530" y1="90" x2="530" y2="455" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="530" y1="445" x2="530" y2="455" stroke="#1a1822" stroke-width="2"/>
  <text x="530" y="470" text-anchor="middle" font-size="11" fill="#1a1822">2s</text>
  <line x1="695" y1="90" x2="695" y2="455" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="695" y1="445" x2="695" y2="455" stroke="#1a1822" stroke-width="2"/>
  <text x="695" y="470" text-anchor="middle" font-size="11" fill="#1a1822">3s</text>
  <line x1="860" y1="90" x2="860" y2="455" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="860" y1="445" x2="860" y2="455" stroke="#1a1822" stroke-width="2"/>
  <text x="860" y="470" text-anchor="middle" font-size="11" fill="#1a1822">4s</text>

  <!-- Rows -->
  <!-- Row 1: HTML Delivery (0-0.5s) -->
  <text x="190" y="115" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">HTML Delivery</text>
  <rect x="200" y="96" width="82" height="28" rx="5" fill="#2f9d74"/>
  <text x="241" y="114" text-anchor="middle" font-size="10" fill="#fff">0–0.5s</text>
  <line x1="282" y1="110" x2="282" y2="440" stroke="#2f9d74" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Row 2: JS Download (0-1s) -->
  <text x="190" y="155" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">JS Download</text>
  <rect x="200" y="136" width="165" height="28" rx="5" fill="#6d5bd0"/>
  <text x="282" y="154" text-anchor="middle" font-size="10" fill="#fff">0–1s (bundle download)</text>

  <!-- Row 3: Critical Hydration (0.5-1s) — Hero, Nav -->
  <text x="190" y="195" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">Critical</text>
  <rect x="282" y="176" width="83" height="28" rx="5" fill="#6d5bd0"/>
  <text x="323" y="194" text-anchor="middle" font-size="10" fill="#fff">0.5–1s</text>
  <text x="200" y="194" font-size="9" fill="#6d5bd0">Hero, Nav</text>

  <!-- Row 4: High Priority (1-2s) -->
  <text x="190" y="235" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">High Priority</text>
  <rect x="365" y="216" width="165" height="28" rx="5" fill="#d97843" opacity="0.9"/>
  <text x="447" y="234" text-anchor="middle" font-size="10" fill="#fff">1–2s</text>
  <text x="200" y="234" font-size="9" fill="#d97843">Sidebar, Search</text>

  <!-- Row 5: Deferred visible (2-3s) -->
  <text x="190" y="275" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">Visible (Scroll)</text>
  <rect x="530" y="256" width="165" height="28" rx="5" fill="#d97843" opacity="0.65"/>
  <text x="612" y="274" text-anchor="middle" font-size="10" fill="#fff">2–3s</text>
  <text x="200" y="274" font-size="9" fill="#d97843">Cards, Articles</text>

  <!-- Row 6: Idle-time (3-4s) -->
  <text x="190" y="315" text-anchor="end" font-size="11" fill="#1a1822" font-weight="bold">Idle-Time</text>
  <rect x="695" y="296" width="165" height="28" rx="5" fill="#d7d1e6"/>
  <text x="777" y="314" text-anchor="middle" font-size="10" fill="#1a1822">3–4s (requestIdleCallback)</text>
  <text x="200" y="314" font-size="9" fill="#1a1822">Analytics, Tracking</text>

  <!-- FCP Marker -->
  <line x1="282" y1="90" x2="282" y2="300" stroke="#2f9d74" stroke-width="2.5"/>
  <rect x="260" y="86" width="44" height="18" rx="4" fill="#2f9d74"/>
  <text x="282" y="99" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">FCP</text>

  <!-- TTI Marker (after critical hydration ~1s) -->
  <line x1="365" y1="90" x2="365" y2="300" stroke="#6d5bd0" stroke-width="2.5"/>
  <rect x="343" y="86" width="44" height="18" rx="4" fill="#6d5bd0"/>
  <text x="365" y="99" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">TTI</text>

  <!-- Benefits legend -->
  <rect x="20" y="340" width="840" height="90" rx="10" fill="#fff" stroke="#d7d1e6"/>
  <text x="430" y="362" text-anchor="middle" font-size="13" fill="#6d5bd0" font-weight="bold">Hydration Priority Strategies</text>
  <rect x="35" y="374" width="14" height="14" rx="3" fill="#2f9d74"/>
  <text x="56" y="385" font-size="11" fill="#1a1822">HTML Delivery — FCP</text>
  <rect x="200" y="374" width="14" height="14" rx="3" fill="#6d5bd0"/>
  <text x="221" y="385" font-size="11" fill="#1a1822">Critical — Immediate</text>
  <rect x="380" y="374" width="14" height="14" rx="3" fill="#d97843" opacity="0.9"/>
  <text x="401" y="385" font-size="11" fill="#1a1822">High Priority</text>
  <rect x="530" y="374" width="14" height="14" rx="3" fill="#d97843" opacity="0.65"/>
  <text x="551" y="385" font-size="11" fill="#1a1822">Visibility-Based</text>
  <rect x="680" y="374" width="14" height="14" rx="3" fill="#d7d1e6"/>
  <text x="701" y="385" font-size="11" fill="#1a1822">Idle-Time</text>
  <text x="430" y="418" text-anchor="middle" font-size="11" fill="#1a1822">Progressive hydration reduces JS execution blocking, improving TTI by hydrating only what's needed first.</text>

  <!-- X axis label -->
  <text x="530" y="490" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Time (seconds)</text>
</svg>
