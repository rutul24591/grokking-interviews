<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Edge Rendering — Global Architecture</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Globe background hint -->
  <ellipse cx="450" cy="270" rx="420" ry="200" fill="#e8edf5" opacity="0.4"/>
  <text x="450" y="472" text-anchor="middle" font-size="10" fill="#8b9dc3" opacity="0.8">Global Internet</text>

  <!-- Origin Server (center) -->
  <rect x="370" y="220" width="160" height="70" rx="10" fill="#1a1822" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="248" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Origin Server</text>
  <text x="450" y="265" text-anchor="middle" font-size="11" fill="#d7d1e6">(US — Virginia)</text>
  <text x="450" y="282" text-anchor="middle" font-size="10" fill="#8b9dc3">Source of truth</text>

  <!-- Edge Node: Tokyo (top right) -->
  <rect x="680" y="80" width="150" height="70" rx="10" fill="#6d5bd0" stroke="#6d5bd0"/>
  <text x="755" y="103" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Tokyo Edge</text>
  <text x="755" y="120" text-anchor="middle" font-size="11" fill="#edeaf5">Asia-Pacific</text>
  <text x="755" y="137" text-anchor="middle" font-size="10" fill="#edeaf5">~5ms latency</text>

  <!-- User in Tokyo -->
  <rect x="780" y="30" width="100" height="36" rx="8" fill="#2f9d74"/>
  <text x="830" y="49" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">👤 Tokyo User</text>

  <!-- Arrow: Tokyo user → Tokyo Edge (close/fast) -->
  <line x1="830" y1="66" x2="800" y2="82" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="844" y="78" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">~5ms</text>

  <!-- Edge Node: London (top left) -->
  <rect x="70" y="80" width="150" height="70" rx="10" fill="#6d5bd0" stroke="#6d5bd0"/>
  <text x="145" y="103" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">London Edge</text>
  <text x="145" y="120" text-anchor="middle" font-size="11" fill="#edeaf5">Europe</text>
  <text x="145" y="137" text-anchor="middle" font-size="10" fill="#edeaf5">~8ms latency</text>

  <!-- User in London -->
  <rect x="20" y="30" width="110" height="36" rx="8" fill="#2f9d74"/>
  <text x="75" y="49" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">👤 London User</text>

  <!-- Arrow: London user → London Edge -->
  <line x1="75" y1="66" x2="100" y2="82" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="58" y="80" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">~8ms</text>

  <!-- Edge Node: NYC (bottom left) -->
  <rect x="70" y="360" width="150" height="70" rx="10" fill="#6d5bd0" stroke="#6d5bd0"/>
  <text x="145" y="383" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">NYC Edge</text>
  <text x="145" y="400" text-anchor="middle" font-size="11" fill="#edeaf5">US East</text>
  <text x="145" y="417" text-anchor="middle" font-size="10" fill="#edeaf5">~3ms latency</text>

  <!-- User in NYC -->
  <rect x="20" y="440" width="110" height="36" rx="8" fill="#2f9d74"/>
  <text x="75" y="459" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">👤 NYC User</text>

  <!-- Arrow: NYC user → NYC Edge -->
  <line x1="75" y1="440" x2="100" y2="425" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="58" y="434" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">~3ms</text>

  <!-- Edge Node: Singapore (bottom right) -->
  <rect x="680" y="360" width="160" height="70" rx="10" fill="#6d5bd0" stroke="#6d5bd0"/>
  <text x="760" y="383" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Singapore Edge</text>
  <text x="760" y="400" text-anchor="middle" font-size="11" fill="#edeaf5">SE Asia</text>
  <text x="760" y="417" text-anchor="middle" font-size="10" fill="#edeaf5">~6ms latency</text>

  <!-- Edge → Origin arrows (long, dashed, slow) -->
  <!-- Tokyo → Origin -->
  <line x1="680" y1="120" x2="530" y2="240" stroke="#d97843" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-o)"/>
  <text x="618" y="180" text-anchor="middle" font-size="9" fill="#d97843">cache miss</text>
  <text x="618" y="192" text-anchor="middle" font-size="9" fill="#d97843">~150ms</text>

  <!-- London → Origin -->
  <line x1="220" y1="120" x2="370" y2="235" stroke="#d97843" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-o)"/>
  <text x="278" y="185" text-anchor="middle" font-size="9" fill="#d97843">cache miss</text>
  <text x="278" y="197" text-anchor="middle" font-size="9" fill="#d97843">~80ms</text>

  <!-- NYC → Origin -->
  <line x1="220" y1="380" x2="370" y2="270" stroke="#d97843" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-o)"/>
  <text x="270" y="340" text-anchor="middle" font-size="9" fill="#d97843">cache miss</text>
  <text x="270" y="352" text-anchor="middle" font-size="9" fill="#d97843">~20ms</text>

  <!-- Singapore → Origin -->
  <line x1="680" y1="380" x2="530" y2="285" stroke="#d97843" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-o)"/>
  <text x="626" y="345" text-anchor="middle" font-size="9" fill="#d97843">cache miss</text>
  <text x="626" y="357" text-anchor="middle" font-size="9" fill="#d97843">~180ms</text>

  <!-- Edge cache hit indicators (green small markers) -->
  <rect x="710" y="144" width="80" height="20" rx="5" fill="#2f9d74"/>
  <text x="750" y="157" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Cache HIT ✓</text>

  <rect x="100" y="144" width="80" height="20" rx="5" fill="#2f9d74"/>
  <text x="140" y="157" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Cache HIT ✓</text>

  <rect x="100" y="336" width="80" height="20" rx="5" fill="#2f9d74"/>
  <text x="140" y="349" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Cache HIT ✓</text>

  <rect x="710" y="336" width="80" height="20" rx="5" fill="#2f9d74"/>
  <text x="750" y="349" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Cache HIT ✓</text>

  <!-- Legend -->
  <rect x="310" y="65" width="275" height="88" rx="8" fill="#fff" stroke="#d7d1e6"/>
  <text x="447" y="86" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="bold">Legend</text>
  <rect x="320" y="94" width="14" height="14" rx="3" fill="#6d5bd0"/>
  <text x="342" y="105" font-size="10" fill="#1a1822">Edge Node (renders at ~5-10ms)</text>
  <rect x="320" y="114" width="14" height="14" rx="3" fill="#2f9d74"/>
  <text x="342" y="125" font-size="10" fill="#1a1822">User → Edge (fast, nearby)</text>
  <rect x="320" y="134" width="14" height="14" rx="3" fill="#d97843"/>
  <text x="342" y="145" font-size="10" fill="#1a1822">Edge → Origin (slow, only on cache miss)</text>
</svg>
