<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Islands Architecture — Runtime Hydration Flow</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Actors -->
  <rect x="20" y="65" width="80" height="40" rx="8" fill="#6d5bd0"/>
  <text x="60" y="89" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">User</text>

  <rect x="160" y="65" width="80" height="40" rx="8" fill="#2f9d74"/>
  <text x="200" y="85" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">CDN</text>
  <text x="200" y="100" text-anchor="middle" font-size="9" fill="#e8f5f0">Static HTML</text>

  <rect x="310" y="65" width="90" height="40" rx="8" fill="#6d5bd0"/>
  <text x="355" y="85" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Browser</text>
  <text x="355" y="100" text-anchor="middle" font-size="9" fill="#edeaf5">Orchestrator</text>

  <rect x="475" y="65" width="90" height="40" rx="8" fill="#2f9d74"/>
  <text x="520" y="85" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Island 1</text>
  <text x="520" y="100" text-anchor="middle" font-size="9" fill="#e8f5f0">Cart (client:load)</text>

  <rect x="640" y="65" width="90" height="40" rx="8" fill="#2f9d74"/>
  <text x="685" y="85" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Island 2</text>
  <text x="685" y="100" text-anchor="middle" font-size="9" fill="#e8f5f0">Search (client:idle)</text>

  <rect x="800" y="65" width="85" height="40" rx="8" fill="#2f9d74"/>
  <text x="842" y="85" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Island 3</text>
  <text x="842" y="100" text-anchor="middle" font-size="9" fill="#e8f5f0">Newsletter (scroll)</text>

  <!-- Lifelines -->
  <line x1="60" y1="105" x2="60" y2="430" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="200" y1="105" x2="200" y2="430" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="355" y1="105" x2="355" y2="430" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="520" y1="105" x2="520" y2="430" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="685" y1="105" x2="685" y2="430" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="842" y1="105" x2="842" y2="430" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="5,4"/>

  <!-- Step 1: User requests -->
  <line x1="60" y1="130" x2="190" y2="130" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="125" y="124" text-anchor="middle" font-size="10" fill="#1a1822">1. GET /page</text>

  <!-- Step 2: CDN serves static HTML -->
  <line x1="190" y1="155" x2="70" y2="155" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="125" y="149" text-anchor="middle" font-size="10" fill="#2f9d74">2. Full static HTML (FCP ✓)</text>

  <!-- Step 3: Browser receives, orchestrator starts -->
  <line x1="60" y1="180" x2="345" y2="180" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="200" y="174" text-anchor="middle" font-size="10" fill="#1a1822">3. Parse HTML, start orchestrator</text>

  <!-- Phase: client:load — Island 1 (immediate) -->
  <rect x="280" y="194" width="80" height="18" rx="4" fill="#6d5bd0"/>
  <text x="320" y="206" text-anchor="middle" font-size="9" fill="#fff">client:load</text>

  <line x1="355" y1="218" x2="510" y2="218" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="432" y="212" text-anchor="middle" font-size="10" fill="#1a1822">4. Hydrate Island 1 (on load)</text>

  <rect x="482" y="228" width="76" height="20" rx="5" fill="#2f9d74"/>
  <text x="520" y="242" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Hydrated ✓</text>

  <!-- Phase: client:idle — Island 2 (after idle) -->
  <rect x="280" y="264" width="80" height="18" rx="4" fill="#d97843"/>
  <text x="320" y="276" text-anchor="middle" font-size="9" fill="#fff">client:idle</text>

  <rect x="320" y="285" width="200" height="16" rx="4" fill="#fff3ec"/>
  <text x="420" y="297" text-anchor="middle" font-size="9" fill="#d97843">requestIdleCallback fires...</text>

  <line x1="355" y1="306" x2="675" y2="306" stroke="#d97843" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="515" y="300" text-anchor="middle" font-size="10" fill="#d97843">5. Hydrate Island 2 (on idle)</text>

  <rect x="645" y="316" width="80" height="20" rx="5" fill="#2f9d74"/>
  <text x="685" y="330" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Hydrated ✓</text>

  <!-- Phase: client:visible — Island 3 (on scroll) -->
  <rect x="280" y="352" width="110" height="18" rx="4" fill="#6d5bd0" opacity="0.7"/>
  <text x="335" y="364" text-anchor="middle" font-size="9" fill="#fff">client:visible</text>

  <rect x="320" y="372" width="260" height="16" rx="4" fill="#edeaf5"/>
  <text x="450" y="384" text-anchor="middle" font-size="9" fill="#6d5bd0">User scrolls → IntersectionObserver fires...</text>

  <line x1="355" y1="394" x2="832" y2="394" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="594" y="388" text-anchor="middle" font-size="10" fill="#1a1822">6. Hydrate Island 3 (on scroll)</text>

  <rect x="800" y="404" width="84" height="20" rx="5" fill="#2f9d74"/>
  <text x="842" y="418" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Hydrated ✓</text>

  <!-- Key note -->
  <rect x="20" y="440" width="860" height="40" rx="6" fill="#edeaf5" stroke="#6d5bd0"/>
  <text x="450" y="457" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="bold">Islands are fully independent — Island 1 hydrating does NOT block Islands 2 or 3.</text>
  <text x="450" y="473" text-anchor="middle" font-size="11" fill="#1a1822">Each island manages its own JS, lifecycle, and state. Static content between islands: zero JS.</text>
</svg>
