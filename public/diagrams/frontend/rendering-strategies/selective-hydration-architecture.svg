<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Selective Hydration Architecture</text>

  <!-- Page frame -->
  <rect x="30" y="58" width="840" height="400" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>

  <!-- Header bar (static) -->
  <rect x="45" y="72" width="810" height="52" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="230" y="100" text-anchor="middle" font-size="13" fill="#1a1822" font-weight="bold">Header / Navigation</text>
  <rect x="680" y="82" width="70" height="32" rx="6" fill="#d7d1e6"/>
  <text x="715" y="102" text-anchor="middle" font-size="11" fill="#1a1822">Logo</text>
  <rect x="760" y="82" width="85" height="32" rx="6" fill="#d7d1e6"/>
  <text x="802" y="102" text-anchor="middle" font-size="11" fill="#1a1822">Nav links</text>
  <rect x="46" y="78" width="110" height="18" rx="4" fill="#d7d1e6" opacity="0.7"/>
  <text x="101" y="91" text-anchor="middle" font-size="9" fill="#1a1822">Static — no hydration</text>

  <!-- Main content area (static) -->
  <rect x="45" y="135" width="380" height="200" rx="8" fill="#f8f7fc" stroke="#d7d1e6"/>
  <text x="235" y="160" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Article / Main Content</text>
  <rect x="60" y="170" width="350" height="10" rx="3" fill="#d7d1e6" opacity="0.6"/>
  <rect x="60" y="187" width="320" height="10" rx="3" fill="#d7d1e6" opacity="0.6"/>
  <rect x="60" y="204" width="340" height="10" rx="3" fill="#d7d1e6" opacity="0.6"/>
  <rect x="60" y="221" width="280" height="10" rx="3" fill="#d7d1e6" opacity="0.6"/>
  <rect x="60" y="238" width="310" height="10" rx="3" fill="#d7d1e6" opacity="0.6"/>
  <rect x="60" y="255" width="330" height="10" rx="3" fill="#d7d1e6" opacity="0.6"/>
  <rect x="46" y="136" width="120" height="18" rx="4" fill="#d7d1e6"/>
  <text x="106" y="149" text-anchor="middle" font-size="9" fill="#1a1822">Static HTML — no JS</text>

  <!-- Interactive island 1: Search (top right) -->
  <rect x="445" y="135" width="220" height="95" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2.5"/>
  <text x="555" y="158" text-anchor="middle" font-size="12" fill="#6d5bd0" font-weight="bold">Interactive Island</text>
  <text x="555" y="175" text-anchor="middle" font-size="11" fill="#1a1822">Search Bar</text>
  <rect x="460" y="184" width="190" height="28" rx="6" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0"/>
  <text x="555" y="202" text-anchor="middle" font-size="11" fill="#6d5bd0">[ Search... 🔍 ]</text>
  <rect x="445" y="136" width="120" height="18" rx="4" fill="#6d5bd0"/>
  <text x="505" y="149" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">JS bundle: search.js</text>

  <!-- Interactive island 2: Cart (right middle) -->
  <rect x="680" y="135" width="185" height="95" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2.5"/>
  <text x="772" y="158" text-anchor="middle" font-size="12" fill="#6d5bd0" font-weight="bold">Interactive Island</text>
  <text x="772" y="175" text-anchor="middle" font-size="11" fill="#1a1822">Shopping Cart</text>
  <rect x="700" y="185" width="145" height="28" rx="6" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0"/>
  <text x="772" y="202" text-anchor="middle" font-size="11" fill="#6d5bd0">🛒 Cart (3 items)</text>
  <rect x="680" y="136" width="110" height="18" rx="4" fill="#6d5bd0"/>
  <text x="735" y="149" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">JS bundle: cart.js</text>

  <!-- Interactive island 3: Newsletter (bottom right) -->
  <rect x="445" y="245" width="420" height="85" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2.5"/>
  <text x="655" y="268" text-anchor="middle" font-size="12" fill="#6d5bd0" font-weight="bold">Interactive Island — Newsletter Signup</text>
  <rect x="460" y="278" width="240" height="30" rx="6" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0"/>
  <text x="580" y="297" text-anchor="middle" font-size="11" fill="#6d5bd0">[ email@example.com ]</text>
  <rect x="710" y="278" width="140" height="30" rx="6" fill="#6d5bd0"/>
  <text x="780" y="297" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Subscribe</text>
  <rect x="445" y="246" width="130" height="18" rx="4" fill="#6d5bd0"/>
  <text x="510" y="259" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">JS bundle: newsletter.js</text>

  <!-- Footer (static) -->
  <rect x="45" y="345" width="810" height="48" rx="8" fill="#f8f7fc" stroke="#d7d1e6"/>
  <text x="450" y="371" text-anchor="middle" font-size="12" fill="#1a1822">Footer — Static Links, Copyright text</text>
  <rect x="46" y="346" width="100" height="18" rx="4" fill="#d7d1e6"/>
  <text x="96" y="359" text-anchor="middle" font-size="9" fill="#1a1822">Static — no JS</text>

  <!-- Legend -->
  <rect x="30" y="468" width="840" height="28" rx="6" fill="#edeaf5" stroke="#d7d1e6"/>
  <rect x="46" y="476" width="14" height="14" rx="3" fill="#d7d1e6" stroke="#d7d1e6"/>
  <text x="66" y="488" font-size="11" fill="#1a1822">Static HTML (no JS download/execute)</text>
  <rect x="310" y="476" width="14" height="14" rx="3" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2"/>
  <text x="330" y="488" font-size="11" fill="#1a1822">Interactive Island (own JS bundle, hydrated independently)</text>
  <text x="700" y="488" font-size="11" fill="#6d5bd0" font-weight="bold">Total JS: 3 small bundles</text>
</svg>
