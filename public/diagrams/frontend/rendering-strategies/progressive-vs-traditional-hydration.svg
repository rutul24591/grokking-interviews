<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Traditional vs Progressive Hydration</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
  </defs>

  <!-- Left column: Traditional SSR -->
  <rect x="20" y="58" width="400" height="40" rx="8" fill="#d97843"/>
  <text x="220" y="83" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">Traditional SSR Hydration</text>

  <!-- Right column: Progressive -->
  <rect x="480" y="58" width="400" height="40" rx="8" fill="#2f9d74"/>
  <text x="680" y="83" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">Progressive Hydration</text>

  <!-- Divider -->
  <line x1="450" y1="55" x2="450" y2="470" stroke="#d7d1e6" stroke-width="2"/>

  <!-- Traditional flow steps -->
  <!-- Step T1 -->
  <rect x="55" y="115" width="330" height="38" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="220" y="138" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Server renders full HTML → Browser loads</text>
  <line x1="220" y1="153" x2="220" y2="170" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Step T2 -->
  <rect x="55" y="170" width="330" height="38" rx="8" fill="#d97843"/>
  <text x="220" y="187" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Download ALL JavaScript</text>
  <text x="220" y="202" text-anchor="middle" font-size="11" fill="#fff">(entire app bundle, 500KB–2MB)</text>
  <line x1="220" y1="208" x2="220" y2="225" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Step T3 -->
  <rect x="55" y="225" width="330" height="38" rx="8" fill="#d97843" opacity="0.85"/>
  <text x="220" y="242" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Hydrate ALL Components at once</text>
  <text x="220" y="257" text-anchor="middle" font-size="11" fill="#fff">(blocks main thread for 2-5 seconds)</text>
  <line x1="220" y1="263" x2="220" y2="280" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Step T4: Interactive (late) -->
  <rect x="55" y="280" width="330" height="38" rx="8" fill="#d97843" opacity="0.7"/>
  <text x="220" y="297" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">App becomes Interactive</text>
  <text x="220" y="312" text-anchor="middle" font-size="11" fill="#fff">(TTI: 5-8 seconds)</text>

  <!-- Timeline bar Traditional -->
  <rect x="55" y="330" width="330" height="80" rx="8" fill="#fff" stroke="#d7d1e6"/>
  <text x="220" y="350" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Timeline (0 → 8s)</text>
  <rect x="70" y="360" width="10" height="20" rx="2" fill="#6d5bd0"/>
  <rect x="80" y="360" width="66" height="20" rx="2" fill="#d97843"/>
  <rect x="146" y="360" width="132" height="20" rx="2" fill="#d97843" opacity="0.7"/>
  <rect x="278" y="360" width="99" height="20" rx="2" fill="#d97843" opacity="0.5"/>
  <text x="70" y="396" font-size="9" fill="#6d5bd0">TTF</text>
  <text x="113" y="396" font-size="9" fill="#d97843">JS DL</text>
  <text x="212" y="396" font-size="9" fill="#d97843">Hydrate ALL</text>
  <text x="310" y="396" font-size="9" fill="#d97843">TTI</text>

  <!-- Progressive flow steps -->
  <!-- Step P1 -->
  <rect x="515" y="115" width="330" height="38" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="680" y="138" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Server renders full HTML → Browser loads</text>
  <line x1="680" y1="153" x2="680" y2="170" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Step P2 -->
  <rect x="515" y="170" width="330" height="38" rx="8" fill="#6d5bd0"/>
  <text x="680" y="187" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Download CRITICAL JavaScript</text>
  <text x="680" y="202" text-anchor="middle" font-size="11" fill="#edeaf5">(small critical chunk: 50-100KB)</text>
  <line x1="680" y1="208" x2="680" y2="225" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Step P3 -->
  <rect x="515" y="225" width="330" height="38" rx="8" fill="#2f9d74"/>
  <text x="680" y="242" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Hydrate CRITICAL components only</text>
  <text x="680" y="257" text-anchor="middle" font-size="11" fill="#fff">(Nav, Hero — minimal blocking)</text>
  <line x1="680" y1="263" x2="680" y2="280" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Step P4: Early Interactive -->
  <rect x="515" y="280" width="330" height="38" rx="8" fill="#2f9d74"/>
  <text x="680" y="297" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Critical Content Interactive ✓</text>
  <text x="680" y="312" text-anchor="middle" font-size="11" fill="#fff">(TTI: 1-2 seconds!)</text>

  <!-- Progressive hydration continues -->
  <line x1="790" y1="280" x2="790" y2="270" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="820" y="310" font-size="9" fill="#6d5bd0" transform="rotate(-90, 820, 310)">then rest hydrates...</text>

  <!-- Timeline bar Progressive -->
  <rect x="515" y="330" width="330" height="80" rx="8" fill="#fff" stroke="#d7d1e6"/>
  <text x="680" y="350" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">Timeline (0 → 2s critical TTI)</text>
  <rect x="530" y="360" width="10" height="20" rx="2" fill="#6d5bd0"/>
  <rect x="540" y="360" width="33" height="20" rx="2" fill="#6d5bd0" opacity="0.7"/>
  <rect x="573" y="360" width="33" height="20" rx="2" fill="#2f9d74"/>
  <rect x="606" y="360" width="33" height="20" rx="2" fill="#2f9d74"/>
  <!-- dotted rest -->
  <rect x="639" y="365" width="198" height="10" rx="2" fill="#d7d1e6" stroke-dasharray="4,3"/>
  <text x="530" y="396" font-size="9" fill="#6d5bd0">TTF</text>
  <text x="563" y="396" font-size="9" fill="#6d5bd0">DL</text>
  <text x="591" y="396" font-size="9" fill="#2f9d74">Hydrate</text>
  <text x="625" y="396" font-size="9" fill="#2f9d74">TTI!</text>
  <text x="720" y="396" font-size="9" fill="#d7d1e6">rest hydrates progressively →</text>

  <!-- Improvement callout -->
  <rect x="130" y="428" width="640" height="50" rx="10" fill="#6d5bd0"/>
  <text x="450" y="448" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Progressive Hydration delivers 3-5x faster TTI</text>
  <text x="450" y="467" text-anchor="middle" font-size="11" fill="#edeaf5">by only blocking the main thread for critical interactions, not the entire page</text>
</svg>
