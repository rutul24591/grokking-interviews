<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Offline Sync Flow with IndexedDB</text>

  <!-- ========== ONLINE STATE (top) ========== -->
  <rect x="20" y="45" width="860" height="120" rx="8" fill="#e8f5ee" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="40" y="65" font-size="13" font-weight="bold" fill="#2f9d74">ONLINE STATE</text>

  <!-- App -->
  <rect x="50" y="80" width="100" height="50" rx="8" fill="#6d5bd0"/>
  <text x="100" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">App</text>
  <text x="100" y="122" text-anchor="middle" font-size="9" fill="#fff">(React UI)</text>

  <!-- Arrow: App -> IndexedDB -->
  <line x1="150" y1="105" x2="210" y2="105" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="180" y="98" text-anchor="middle" font-size="8" fill="#1a1822">write</text>

  <!-- IndexedDB -->
  <rect x="215" y="80" width="130" height="50" rx="8" fill="#6d5bd0"/>
  <text x="280" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">IndexedDB</text>
  <text x="280" y="120" text-anchor="middle" font-size="9" fill="#fff">(local data)</text>

  <!-- Arrow: IndexedDB -> Sync Engine -->
  <line x1="345" y1="105" x2="420" y2="105" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="383" y="98" text-anchor="middle" font-size="8" fill="#1a1822">trigger</text>

  <!-- Sync Engine -->
  <rect x="425" y="76" width="140" height="58" rx="8" fill="#2f9d74"/>
  <text x="495" y="101" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Sync Engine</text>
  <text x="495" y="116" text-anchor="middle" font-size="9" fill="#fff">(background)</text>
  <text x="495" y="128" text-anchor="middle" font-size="8" fill="#fff">navigator.onLine</text>

  <!-- Arrow: Sync Engine -> Server -->
  <line x1="565" y1="105" x2="660" y2="105" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="612" y="98" text-anchor="middle" font-size="8" fill="#1a1822">POST/PUT</text>

  <!-- Server -->
  <rect x="665" y="80" width="130" height="50" rx="8" fill="#1a1822"/>
  <text x="730" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Server API</text>
  <text x="730" y="120" text-anchor="middle" font-size="9" fill="#fff">(source of truth)</text>

  <!-- Arrow: Server -> Sync Engine (confirm) -->
  <path d="M730,130 L730,148 L495,148 L495,134" fill="none" stroke="#2f9d74" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowGreen)"/>
  <text x="612" y="144" text-anchor="middle" font-size="8" fill="#2f9d74">200 OK (confirm)</text>

  <!-- ========== OFFLINE STATE (middle) ========== -->
  <rect x="20" y="180" width="860" height="120" rx="8" fill="#fef3eb" stroke="#d97843" stroke-width="1.5"/>
  <text x="40" y="200" font-size="13" font-weight="bold" fill="#d97843">OFFLINE STATE</text>
  <text x="180" y="200" font-size="10" fill="#d97843">(navigator.onLine === false)</text>

  <!-- App offline -->
  <rect x="50" y="215" width="100" height="50" rx="8" fill="#6d5bd0"/>
  <text x="100" y="243" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">App</text>
  <text x="100" y="257" text-anchor="middle" font-size="9" fill="#fff">(continues)</text>

  <!-- Arrow: App -> IndexedDB -->
  <line x1="150" y1="240" x2="210" y2="240" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="180" y="233" text-anchor="middle" font-size="8" fill="#1a1822">read/write</text>

  <!-- IndexedDB offline -->
  <rect x="215" y="215" width="130" height="50" rx="8" fill="#6d5bd0"/>
  <text x="280" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">IndexedDB</text>
  <text x="280" y="255" text-anchor="middle" font-size="9" fill="#fff">(primary store)</text>

  <!-- Arrow: IndexedDB -> Sync Queue -->
  <line x1="345" y1="240" x2="420" y2="240" stroke="#d97843" stroke-width="1.5" marker-end="url(#arrowOrangeM)"/>
  <text x="383" y="233" text-anchor="middle" font-size="8" fill="#1a1822">queue</text>

  <!-- Sync Queue -->
  <rect x="425" y="210" width="200" height="65" rx="8" fill="#d97843"/>
  <text x="525" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Sync Queue</text>
  <text x="525" y="247" text-anchor="middle" font-size="9" fill="#fff">(IndexedDB "pendingOps" store)</text>
  <text x="525" y="265" text-anchor="middle" font-size="8" fill="#fff">op: PUT /users/1 | ts: 1710342...</text>

  <!-- X mark for no server -->
  <line x1="650" y1="228" x2="660" y2="248" stroke="#d97843" stroke-width="3"/>
  <line x1="660" y1="228" x2="650" y2="248" stroke="#d97843" stroke-width="3"/>
  <text x="700" y="243" font-size="10" fill="#d97843" font-weight="bold">No Network</text>

  <!-- Server grayed out -->
  <rect x="665" y="215" width="130" height="50" rx="8" fill="#ccc" stroke="#aaa" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="730" y="240" text-anchor="middle" font-size="11" fill="#888">Server API</text>
  <text x="730" y="255" text-anchor="middle" font-size="9" fill="#888">(unreachable)</text>

  <!-- ========== RECONNECTION FLOW (bottom) ========== -->
  <rect x="20" y="315" width="860" height="172" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="40" y="335" font-size="13" font-weight="bold" fill="#6d5bd0">RECONNECTION - Queue Drain Process</text>

  <!-- Step 1: Detect Online -->
  <rect x="40" y="350" width="110" height="55" rx="8" fill="#2f9d74"/>
  <text x="95" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">1. Detect</text>
  <text x="95" y="384" text-anchor="middle" font-size="8" fill="#fff">online event</text>
  <text x="95" y="396" text-anchor="middle" font-size="8" fill="#fff">+ fetch heartbeat</text>

  <!-- Arrow -->
  <line x1="150" y1="377" x2="173" y2="377" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Step 2: Read Queue -->
  <rect x="178" y="350" width="110" height="55" rx="8" fill="#6d5bd0"/>
  <text x="233" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">2. Read Queue</text>
  <text x="233" y="384" text-anchor="middle" font-size="8" fill="#fff">FIFO order</text>
  <text x="233" y="396" text-anchor="middle" font-size="8" fill="#fff">oldest first</text>

  <!-- Arrow -->
  <line x1="288" y1="377" x2="311" y2="377" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Step 3: Send to Server -->
  <rect x="316" y="350" width="110" height="55" rx="8" fill="#d97843"/>
  <text x="371" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">3. Replay Ops</text>
  <text x="371" y="384" text-anchor="middle" font-size="8" fill="#fff">POST/PUT/DELETE</text>
  <text x="371" y="396" text-anchor="middle" font-size="8" fill="#fff">idempotent keys</text>

  <!-- Arrow -->
  <line x1="426" y1="377" x2="449" y2="377" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Step 4: Conflict Resolution -->
  <rect x="454" y="345" width="130" height="64" rx="8" fill="#d97843"/>
  <text x="519" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">4. Resolve</text>
  <text x="519" y="379" text-anchor="middle" font-size="8" fill="#fff">Conflicts</text>
  <text x="519" y="393" text-anchor="middle" font-size="8" fill="#fff">last-writer-wins /</text>
  <text x="519" y="404" text-anchor="middle" font-size="8" fill="#fff">merge / CRDT</text>

  <!-- Arrow -->
  <line x1="584" y1="377" x2="607" y2="377" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Step 5: Update Local -->
  <rect x="612" y="350" width="110" height="55" rx="8" fill="#2f9d74"/>
  <text x="667" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">5. Update</text>
  <text x="667" y="384" text-anchor="middle" font-size="8" fill="#fff">Local IndexedDB</text>
  <text x="667" y="396" text-anchor="middle" font-size="8" fill="#fff">server canonical</text>

  <!-- Arrow -->
  <line x1="722" y1="377" x2="745" y2="377" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Step 6: Confirm -->
  <rect x="750" y="350" width="110" height="55" rx="8" fill="#6d5bd0"/>
  <text x="805" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">6. Confirm</text>
  <text x="805" y="384" text-anchor="middle" font-size="8" fill="#fff">Remove from</text>
  <text x="805" y="396" text-anchor="middle" font-size="8" fill="#fff">sync queue</text>

  <!-- Retry loop arrow -->
  <path d="M371,405 L371,430 L233,430 L233,405" fill="none" stroke="#d97843" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowOrangeM)"/>
  <text x="302" y="445" text-anchor="middle" font-size="8" fill="#d97843">retry on failure (exp. backoff)</text>

  <!-- Notify UI arrow -->
  <path d="M805,405 L805,460 L95,460 L95,440" fill="none" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="450" y="472" text-anchor="middle" font-size="8" fill="#6d5bd0">notify UI: sync complete, refresh views</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2f9d74"/>
    </marker>
    <marker id="arrowOrangeM" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d97843"/>
    </marker>
    <marker id="arrowBlack" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1a1822"/>
    </marker>
  </defs>
</svg>
