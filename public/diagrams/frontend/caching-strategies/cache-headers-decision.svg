<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Cache Header Decision Tree</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Root question -->
  <rect x="320" y="50" width="260" height="44" rx="8" fill="#6d5bd0"/>
  <text x="450" y="77" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="bold">What type of resource?</text>

  <!-- Branch 1: Static Asset -->
  <line x1="370" y1="94" x2="150" y2="130" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="240" y="108" font-size="11" fill="#2f9d74" font-weight="bold">Static Asset</text>
  <text x="240" y="120" font-size="9" fill="#2f9d74">(JS, CSS, images, fonts)</text>

  <rect x="30" y="132" width="240" height="50" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="150" y="152" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Has content hash in filename?</text>
  <text x="150" y="166" text-anchor="middle" font-size="9" fill="#6d5bd0">(e.g., app.a1b2c3.js)</text>

  <!-- Yes hash -->
  <line x1="90" y1="182" x2="90" y2="218" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="75" y="203" font-size="10" fill="#2f9d74" font-weight="bold">Yes</text>
  <rect x="10" y="220" width="160" height="70" rx="8" fill="#2f9d74"/>
  <text x="90" y="241" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Cache-Control:</text>
  <text x="90" y="256" text-anchor="middle" font-size="9" fill="#ffffff">public, max-age=31536000,</text>
  <text x="90" y="270" text-anchor="middle" font-size="9" fill="#ffffff">immutable</text>
  <text x="90" y="284" text-anchor="middle" font-size="8" fill="#edeaf5">(1 year, never revalidate)</text>

  <!-- No hash -->
  <line x1="210" y1="182" x2="210" y2="218" stroke="#d97843" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="222" y="203" font-size="10" fill="#d97843" font-weight="bold">No</text>
  <rect x="180" y="220" width="160" height="70" rx="8" fill="#d97843"/>
  <text x="260" y="241" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Cache-Control:</text>
  <text x="260" y="256" text-anchor="middle" font-size="9" fill="#ffffff">public, max-age=86400,</text>
  <text x="260" y="270" text-anchor="middle" font-size="9" fill="#ffffff">must-revalidate</text>
  <text x="260" y="284" text-anchor="middle" font-size="8" fill="#edeaf5">(+ ETag for validation)</text>

  <!-- Branch 2: API Response -->
  <line x1="450" y1="94" x2="450" y2="130" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="465" y="118" font-size="11" fill="#6d5bd0" font-weight="bold">API Response</text>

  <rect x="360" y="132" width="180" height="50" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="152" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Is data user-specific?</text>
  <text x="450" y="166" text-anchor="middle" font-size="9" fill="#6d5bd0">(profile, cart, settings)</text>

  <!-- Public API -->
  <line x1="405" y1="182" x2="405" y2="218" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="385" y="203" font-size="10" fill="#2f9d74" font-weight="bold">No</text>
  <rect x="355" y="220" width="100" height="70" rx="8" fill="#2f9d74"/>
  <text x="405" y="241" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Cache-Control:</text>
  <text x="405" y="256" text-anchor="middle" font-size="9" fill="#ffffff">public, no-cache</text>
  <text x="405" y="270" text-anchor="middle" font-size="9" fill="#ffffff">+ ETag</text>
  <text x="405" y="284" text-anchor="middle" font-size="8" fill="#edeaf5">(always revalidate)</text>

  <!-- Private API -->
  <line x1="495" y1="182" x2="495" y2="218" stroke="#d97843" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="507" y="203" font-size="10" fill="#d97843" font-weight="bold">Yes</text>
  <rect x="465" y="220" width="120" height="70" rx="8" fill="#d97843"/>
  <text x="525" y="241" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Cache-Control:</text>
  <text x="525" y="256" text-anchor="middle" font-size="9" fill="#ffffff">private, no-cache</text>
  <text x="525" y="270" text-anchor="middle" font-size="9" fill="#ffffff">+ ETag</text>
  <text x="525" y="284" text-anchor="middle" font-size="8" fill="#edeaf5">(CDN cannot cache)</text>

  <!-- Branch 3: Sensitive Data -->
  <line x1="530" y1="94" x2="720" y2="130" stroke="#d97843" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="650" y="108" font-size="11" fill="#d97843" font-weight="bold">Sensitive / Real-time</text>
  <text x="650" y="120" font-size="9" fill="#d97843">(auth tokens, banking, PII)</text>

  <rect x="630" y="132" width="180" height="50" rx="8" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="720" y="152" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Must NEVER be cached?</text>
  <text x="720" y="166" text-anchor="middle" font-size="9" fill="#d97843">(PII, tokens, payments)</text>

  <!-- Never cache -->
  <line x1="720" y1="182" x2="720" y2="218" stroke="#d97843" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="735" y="203" font-size="10" fill="#d97843" font-weight="bold">Yes</text>
  <rect x="635" y="220" width="170" height="70" rx="8" fill="#d97843"/>
  <text x="720" y="241" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Cache-Control:</text>
  <text x="720" y="256" text-anchor="middle" font-size="9" fill="#ffffff">no-store, no-cache,</text>
  <text x="720" y="270" text-anchor="middle" font-size="9" fill="#ffffff">must-revalidate, private</text>
  <text x="720" y="284" text-anchor="middle" font-size="8" fill="#edeaf5">(never stored anywhere)</text>

  <!-- Branch 4: HTML pages -->
  <rect x="30" y="330" width="840" height="150" rx="8" fill="#edeaf5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="355" text-anchor="middle" font-size="14" fill="#1a1822" font-weight="bold">Quick Reference: Common Patterns</text>

  <!-- Pattern boxes -->
  <rect x="50" y="370" width="180" height="95" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1"/>
  <text x="140" y="390" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="bold">HTML Pages</text>
  <text x="140" y="408" text-anchor="middle" font-size="9" fill="#1a1822">no-cache, must-revalidate</text>
  <text x="140" y="422" text-anchor="middle" font-size="9" fill="#1a1822">+ ETag</text>
  <text x="140" y="444" text-anchor="middle" font-size="8" fill="#6d5bd0">Always check for updates</text>
  <text x="140" y="456" text-anchor="middle" font-size="8" fill="#6d5bd0">so users get latest version</text>

  <rect x="250" y="370" width="180" height="95" rx="6" fill="#ffffff" stroke="#2f9d74" stroke-width="1"/>
  <text x="340" y="390" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">Hashed Static Assets</text>
  <text x="340" y="408" text-anchor="middle" font-size="9" fill="#1a1822">public, max-age=31536000,</text>
  <text x="340" y="422" text-anchor="middle" font-size="9" fill="#1a1822">immutable</text>
  <text x="340" y="444" text-anchor="middle" font-size="8" fill="#2f9d74">URL changes on content change</text>
  <text x="340" y="456" text-anchor="middle" font-size="8" fill="#2f9d74">so max caching is safe</text>

  <rect x="450" y="370" width="180" height="95" rx="6" fill="#ffffff" stroke="#d97843" stroke-width="1"/>
  <text x="540" y="390" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">API w/ User Data</text>
  <text x="540" y="408" text-anchor="middle" font-size="9" fill="#1a1822">private, no-cache</text>
  <text x="540" y="422" text-anchor="middle" font-size="9" fill="#1a1822">+ ETag</text>
  <text x="540" y="444" text-anchor="middle" font-size="8" fill="#d97843">Prevent CDN caching</text>
  <text x="540" y="456" text-anchor="middle" font-size="8" fill="#d97843">but allow browser cache</text>

  <rect x="650" y="370" width="200" height="95" rx="6" fill="#ffffff" stroke="#d97843" stroke-width="1.5"/>
  <text x="750" y="390" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Sensitive Data</text>
  <text x="750" y="408" text-anchor="middle" font-size="9" fill="#1a1822">no-store, no-cache,</text>
  <text x="750" y="422" text-anchor="middle" font-size="9" fill="#1a1822">must-revalidate, private</text>
  <text x="750" y="444" text-anchor="middle" font-size="8" fill="#d97843">Must never persist</text>
  <text x="750" y="456" text-anchor="middle" font-size="8" fill="#d97843">in any cache layer</text>
</svg>