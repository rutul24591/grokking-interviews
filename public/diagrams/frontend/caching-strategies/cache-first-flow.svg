<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Cache-First Strategy Flow</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#6d5bd0">Cache is checked first. Network is only contacted on cache miss.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Step 1: Fetch Event -->
  <rect x="50" y="90" width="150" height="50" rx="8" fill="#6d5bd0"/>
  <text x="125" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Fetch Event</text>
  <text x="125" y="128" text-anchor="middle" font-size="10" fill="#ffffff">(Request arrives)</text>

  <!-- Arrow to Cache Check -->
  <line x1="200" y1="115" x2="270" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Check Cache (diamond) -->
  <polygon points="350,75 430,115 350,155 270,115" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2"/>
  <text x="350" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">Cache</text>
  <text x="350" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">Hit?</text>

  <!-- Cache HIT path (green, going down) -->
  <line x1="350" y1="155" x2="350" y2="210" stroke="#2f9d74" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="370" y="185" font-size="11" fill="#2f9d74" font-weight="bold">YES</text>

  <!-- Return Cached Response -->
  <rect x="265" y="215" width="170" height="50" rx="8" fill="#2f9d74"/>
  <text x="350" y="237" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Return Cached</text>
  <text x="350" y="253" text-anchor="middle" font-size="10" fill="#ffffff">Response</text>

  <!-- Timing annotation for cache hit -->
  <rect x="255" y="275" width="190" height="28" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="350" y="294" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="bold">⚡ Latency: ~0ms (instant)</text>

  <!-- Arrow to Client from cache hit -->
  <line x1="350" y1="303" x2="350" y2="345" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Client box (cache hit) -->
  <rect x="285" y="350" width="130" height="40" rx="8" fill="#2f9d74"/>
  <text x="350" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Client</text>

  <!-- Cache MISS path (orange, going right) -->
  <line x1="430" y1="115" x2="505" y2="115" stroke="#d97843" stroke-width="2.5" marker-end="url(#arr-o)"/>
  <text x="465" y="108" font-size="11" fill="#d97843" font-weight="bold">NO</text>

  <!-- Step 3: Network Fetch -->
  <rect x="510" y="90" width="150" height="50" rx="8" fill="#6d5bd0"/>
  <text x="585" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Network Fetch</text>
  <text x="585" y="128" text-anchor="middle" font-size="10" fill="#ffffff">(Origin server)</text>

  <!-- Timing for network -->
  <rect x="515" y="150" width="140" height="24" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1"/>
  <text x="585" y="167" text-anchor="middle" font-size="9" fill="#d97843">Latency: 50-500ms</text>

  <!-- Arrow from network to response check -->
  <line x1="660" y1="115" x2="720" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Got Response? -->
  <polygon points="790,75 855,115 790,155 725,115" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2"/>
  <text x="790" y="112" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">OK?</text>
  <text x="790" y="126" text-anchor="middle" font-size="9" fill="#1a1822">(200)</text>

  <!-- Success path (down) -->
  <line x1="790" y1="155" x2="790" y2="210" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="808" y="185" font-size="10" fill="#2f9d74" font-weight="bold">YES</text>

  <!-- Store in Cache + Return -->
  <rect x="700" y="215" width="180" height="50" rx="8" fill="#6d5bd0"/>
  <text x="790" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Store in Cache</text>
  <text x="790" y="253" text-anchor="middle" font-size="10" fill="#ffffff">+ Return Response</text>

  <!-- Arrow to Client from network -->
  <line x1="790" y1="265" x2="790" y2="315" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Next request note -->
  <rect x="700" y="320" width="180" height="40" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="790" y="337" text-anchor="middle" font-size="9" fill="#1a1822">Next request for same URL</text>
  <text x="790" y="351" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">→ Cache HIT (instant)</text>

  <!-- Error path (no response) - right and down -->
  <line x1="855" y1="115" x2="870" y2="115" stroke="#d97843" stroke-width="1.5"/>
  <line x1="870" y1="115" x2="870" y2="415" stroke="#d97843" stroke-width="1.5"/>
  <line x1="870" y1="415" x2="810" y2="415" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <text x="878" y="135" font-size="9" fill="#d97843" font-weight="bold">NO</text>

  <!-- Error box -->
  <rect x="700" y="395" width="110" height="40" rx="8" fill="#d97843"/>
  <text x="755" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Error / Offline</text>

  <!-- Summary box -->
  <rect x="50" y="410" width="420" height="75" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="260" y="433" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Cache-First Key Properties</text>
  <text x="65" y="452" font-size="9" fill="#1a1822">• Fastest strategy for repeat visits (0ms latency from cache)</text>
  <text x="65" y="466" font-size="9" fill="#1a1822">• Safe for immutable/versioned URLs (hash in filename = new cache key)</text>
  <text x="65" y="480" font-size="9" fill="#1a1822">• Requires ExpirationPlugin to prevent unbounded cache growth</text>
</svg>
