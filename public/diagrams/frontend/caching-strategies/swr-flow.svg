<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Stale-While-Revalidate Flow</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Phase labels -->
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#6d5bd0" font-weight="bold">Phase 1: Serve Stale (Instant)</text>
  <text x="450" y="280" text-anchor="middle" font-size="13" fill="#d97843" font-weight="bold">Phase 2: Background Revalidation</text>

  <!-- === PHASE 1: Serve Stale === -->

  <!-- User/Component -->
  <rect x="30" y="80" width="130" height="50" rx="8" fill="#6d5bd0"/>
  <text x="95" y="101" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Component</text>
  <text x="95" y="118" text-anchor="middle" font-size="10" fill="#edeaf5">useSWR(key)</text>

  <!-- Arrow to cache -->
  <line x1="160" y1="105" x2="218" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="190" y="98" text-anchor="middle" font-size="9" fill="#6d5bd0">1. Request</text>

  <!-- Cache -->
  <rect x="220" y="80" width="140" height="50" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="290" y="101" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">SWR Cache</text>
  <text x="290" y="118" text-anchor="middle" font-size="10" fill="#6d5bd0">In-memory store</text>

  <!-- Arrow: Cache returns stale data instantly -->
  <line x1="290" y1="130" x2="290" y2="170" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="310" y="155" font-size="9" fill="#2f9d74" font-weight="bold">2. Cache hit</text>

  <!-- Stale data returned -->
  <rect x="200" y="172" width="180" height="40" rx="8" fill="#2f9d74"/>
  <text x="290" y="190" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Return Stale Data</text>
  <text x="290" y="204" text-anchor="middle" font-size="9" fill="#ffffff">~0ms - Instant!</text>

  <!-- Arrow back to component -->
  <line x1="200" y1="192" x2="125" y2="130" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- User sees content box -->
  <rect x="30" y="172" width="130" height="40" rx="8" fill="#2f9d74"/>
  <text x="95" y="190" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">User Sees</text>
  <text x="95" y="204" text-anchor="middle" font-size="9" fill="#ffffff">Content Immediately</text>

  <!-- Speed indicator -->
  <rect x="30" y="225" width="350" height="28" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="205" y="244" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="bold">User perceives instant load -- no spinner, no blank screen</text>

  <!-- === PHASE 2: Background Revalidation === -->

  <!-- Cache fires bg request -->
  <rect x="420" y="80" width="140" height="50" rx="8" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="490" y="101" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Background</text>
  <text x="490" y="118" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Fetch</text>

  <!-- Arrow from cache to bg fetch -->
  <line x1="360" y1="100" x2="418" y2="100" stroke="#d97843" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="390" y="92" text-anchor="middle" font-size="9" fill="#d97843">3. Async</text>

  <!-- Arrow to server -->
  <line x1="560" y1="105" x2="618" y2="105" stroke="#d97843" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="590" y="98" text-anchor="middle" font-size="9" fill="#d97843">4. Fetch</text>

  <!-- Origin Server -->
  <rect x="620" y="80" width="140" height="50" rx="8" fill="#d97843"/>
  <text x="690" y="101" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Origin Server</text>
  <text x="690" y="118" text-anchor="middle" font-size="10" fill="#ffffff">API / Database</text>

  <!-- Server responds -->
  <line x1="690" y1="130" x2="690" y2="170" stroke="#d97843" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="720" y="155" font-size="9" fill="#d97843" font-weight="bold">5. Response</text>

  <!-- Fresh data -->
  <rect x="620" y="172" width="140" height="40" rx="8" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="690" y="190" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Fresh Data</text>
  <text x="690" y="204" text-anchor="middle" font-size="9" fill="#d97843">~100-500ms</text>

  <!-- Arrow: fresh data back to cache -->
  <line x1="620" y1="192" x2="362" y2="112" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="145" text-anchor="middle" font-size="9" fill="#6d5bd0" font-weight="bold">6. Update cache</text>

  <!-- === Bottom section: Next request === -->

  <rect x="30" y="300" width="840" height="130" rx="8" fill="#edeaf5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="50" y="325" font-size="13" fill="#1a1822" font-weight="bold">Next Request Cycle</text>

  <!-- Next request component -->
  <rect x="50" y="340" width="130" height="44" rx="8" fill="#6d5bd0"/>
  <text x="115" y="358" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Component</text>
  <text x="115" y="373" text-anchor="middle" font-size="9" fill="#edeaf5">useSWR(key)</text>

  <line x1="180" y1="362" x2="238" y2="362" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="355" text-anchor="middle" font-size="9" fill="#6d5bd0">Request</text>

  <!-- Updated cache -->
  <rect x="240" y="340" width="140" height="44" rx="8" fill="#2f9d74"/>
  <text x="310" y="358" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Updated Cache</text>
  <text x="310" y="373" text-anchor="middle" font-size="9" fill="#ffffff">Fresh data stored</text>

  <line x1="380" y1="362" x2="438" y2="362" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Result -->
  <rect x="440" y="340" width="200" height="44" rx="8" fill="#2f9d74"/>
  <text x="540" y="358" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Serve Fresh Data Instantly</text>
  <text x="540" y="373" text-anchor="middle" font-size="9" fill="#ffffff">~0ms + data is now current</text>

  <!-- Cycle arrow -->
  <rect x="670" y="340" width="180" height="44" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="760" y="358" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="bold">Cycle repeats:</text>
  <text x="760" y="373" text-anchor="middle" font-size="9" fill="#6d5bd0">serve + revalidate again</text>

  <!-- Legend -->
  <rect x="30" y="445" width="840" height="45" rx="8" fill="#edeaf5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="50" y="473" font-size="12" fill="#1a1822" font-weight="bold">Legend:</text>
  <rect x="110" y="460" width="16" height="16" rx="3" fill="#2f9d74"/>
  <text x="132" y="473" font-size="11" fill="#1a1822">Instant (from cache)</text>
  <rect x="280" y="460" width="16" height="16" rx="3" fill="#d97843"/>
  <text x="302" y="473" font-size="11" fill="#1a1822">Background network request</text>
  <rect x="500" y="460" width="16" height="16" rx="3" fill="#6d5bd0"/>
  <text x="522" y="473" font-size="11" fill="#1a1822">Cache update / action</text>
  <line x1="680" y1="468" x2="720" y2="468" stroke="#d97843" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="730" y="473" font-size="11" fill="#1a1822">Async / non-blocking</text>
</svg>