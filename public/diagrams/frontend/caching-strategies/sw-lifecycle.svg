<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Service Worker Lifecycle</text>

  <!-- Register -->
  <rect x="30" y="70" width="120" height="56" rx="8" fill="#6d5bd0"/>
  <text x="90" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Register</text>
  <text x="90" y="113" text-anchor="middle" font-size="10" fill="#e0dcf0">navigator.serviceWorker</text>

  <!-- Arrow -->
  <line x1="150" y1="98" x2="178" y2="98" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Installing -->
  <rect x="180" y="60" width="130" height="76" rx="8" fill="#6d5bd0"/>
  <text x="245" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Installing</text>
  <text x="245" y="102" text-anchor="middle" font-size="10" fill="#e0dcf0">install event fires</text>
  <text x="245" y="117" text-anchor="middle" font-size="10" fill="#e0dcf0">Precache assets</text>
  <text x="245" y="132" text-anchor="middle" font-size="10" fill="#e0dcf0">cache.addAll(urls)</text>

  <!-- Arrow -->
  <line x1="310" y1="98" x2="338" y2="98" stroke="#d97843" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Waiting -->
  <rect x="340" y="60" width="130" height="76" rx="8" fill="#d97843"/>
  <text x="405" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Waiting</text>
  <text x="405" y="102" text-anchor="middle" font-size="10" fill="#fff8f0">Old SW still active</text>
  <text x="405" y="117" text-anchor="middle" font-size="10" fill="#fff8f0">Waits for tabs to close</text>
  <text x="405" y="132" text-anchor="middle" font-size="10" fill="#fff8f0">or skipWaiting()</text>

  <!-- Arrow -->
  <line x1="470" y1="98" x2="498" y2="98" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Activating -->
  <rect x="500" y="60" width="130" height="76" rx="8" fill="#2f9d74"/>
  <text x="565" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Activating</text>
  <text x="565" y="102" text-anchor="middle" font-size="10" fill="#e8f5f0">activate event fires</text>
  <text x="565" y="117" text-anchor="middle" font-size="10" fill="#e8f5f0">Cleanup old caches</text>
  <text x="565" y="132" text-anchor="middle" font-size="10" fill="#e8f5f0">clients.claim()</text>

  <!-- Arrow -->
  <line x1="630" y1="98" x2="658" y2="98" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Activated -->
  <rect x="660" y="60" width="130" height="76" rx="8" fill="#2f9d74"/>
  <text x="725" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Activated</text>
  <text x="725" y="102" text-anchor="middle" font-size="10" fill="#e8f5f0">Handles fetch events</text>
  <text x="725" y="117" text-anchor="middle" font-size="10" fill="#e8f5f0">Controls pages</text>
  <text x="725" y="132" text-anchor="middle" font-size="10" fill="#e8f5f0">Full proxy capability</text>

  <!-- Redundant box -->
  <rect x="500" y="190" width="130" height="56" rx="8" fill="#888" opacity="0.7"/>
  <text x="565" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Redundant</text>
  <text x="565" y="233" text-anchor="middle" font-size="10" fill="#e0e0e0">Replaced or failed</text>

  <!-- Arrow from Activated to Redundant -->
  <line x1="725" y1="136" x2="725" y2="168" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="725" y1="168" x2="635" y2="196" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>

  <!-- Arrow from Installing to Redundant (install failure) -->
  <line x1="245" y1="136" x2="245" y2="218" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="245" y1="218" x2="498" y2="218" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>
  <text x="370" y="210" text-anchor="middle" font-size="9" fill="#888">install fails</text>

  <!-- Detail section: Install Event -->
  <rect x="30" y="280" width="260" height="190" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="160" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Install Event</text>
  <text x="45" y="330" font-size="11" fill="#1a1822">self.addEventListener('install', e =&gt; {</text>
  <text x="55" y="348" font-size="11" fill="#1a1822">  e.waitUntil(</text>
  <text x="55" y="366" font-size="11" fill="#1a1822">    caches.open('v1').then(cache =&gt;</text>
  <text x="55" y="384" font-size="11" fill="#1a1822">      cache.addAll([</text>
  <text x="55" y="402" font-size="11" fill="#6d5bd0">        '/', '/app.js', '/style.css'</text>
  <text x="55" y="420" font-size="11" fill="#1a1822">      ])</text>
  <text x="55" y="438" font-size="11" fill="#1a1822">    )</text>
  <text x="55" y="456" font-size="11" fill="#1a1822">  );</text>
  <text x="45" y="468" font-size="11" fill="#1a1822">});</text>

  <!-- Detail section: Activate Event -->
  <rect x="320" y="280" width="260" height="190" rx="8" fill="#edeaf5" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="450" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#2f9d74">Activate Event</text>
  <text x="335" y="330" font-size="11" fill="#1a1822">self.addEventListener('activate', e =&gt; {</text>
  <text x="345" y="348" font-size="11" fill="#1a1822">  e.waitUntil(</text>
  <text x="345" y="366" font-size="11" fill="#1a1822">    caches.keys().then(names =&gt;</text>
  <text x="345" y="384" font-size="11" fill="#1a1822">      Promise.all(</text>
  <text x="345" y="402" font-size="11" fill="#2f9d74">        names.filter(n =&gt; n !== 'v1')</text>
  <text x="345" y="420" font-size="11" fill="#2f9d74">          .map(n =&gt; caches.delete(n))</text>
  <text x="345" y="438" font-size="11" fill="#1a1822">      )</text>
  <text x="345" y="456" font-size="11" fill="#1a1822">    )</text>
  <text x="335" y="468" font-size="11" fill="#1a1822">  );</text>

  <!-- Detail section: Fetch Event -->
  <rect x="610" y="280" width="260" height="190" rx="8" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="740" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#d97843">Fetch Event</text>
  <text x="625" y="330" font-size="11" fill="#1a1822">self.addEventListener('fetch', e =&gt; {</text>
  <text x="635" y="348" font-size="11" fill="#1a1822">  e.respondWith(</text>
  <text x="635" y="366" font-size="11" fill="#d97843">    caches.match(e.request)</text>
  <text x="635" y="384" font-size="11" fill="#1a1822">      .then(cached =&gt;</text>
  <text x="635" y="402" font-size="11" fill="#d97843">        cached || fetch(e.request)</text>
  <text x="635" y="420" font-size="11" fill="#1a1822">      )</text>
  <text x="625" y="438" font-size="11" fill="#1a1822">  );</text>
  <text x="625" y="456" font-size="11" fill="#1a1822">});</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d97843"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2f9d74"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
  </defs>
</svg>
