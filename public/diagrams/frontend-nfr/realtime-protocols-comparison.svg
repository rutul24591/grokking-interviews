<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">Real-Time Protocols Comparison</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">WebSockets, SSE, long polling, and short polling with latency and efficiency comparison</text>
  
  <!-- WebSockets -->
  <rect x="30" y="80" width="190" height="140" fill="#e3f2fd" stroke="#2196f3" rx="6"/>
  <text x="125" y="105" text-anchor="middle" class="label" font-weight="bold">WebSockets</text>
  <text x="125" y="122" text-anchor="middle" class="small-label" fill="#4caf50">✓ Best for bidirectional</text>
  <line x1="50" y1="132" x2="200" y2="132" stroke="#2196f3" stroke-width="1"/>
  
  <text x="60" y="155" text-anchor="start" class="small-label">• Full-duplex, bidirectional</text>
  <text x="60" y="172" text-anchor="start" class="small-label">• Persistent TCP connection</text>
  <text x="60" y="189" text-anchor="start" class="small-label">• Very low latency</text>
  <text x="60" y="206" text-anchor="start" class="small-label">Use: Chat, collab editing</text>
  
  <!-- SSE -->
  <rect x="240" y="80" width="190" height="140" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="335" y="105" text-anchor="middle" class="label" font-weight="bold">Server-Sent Events</text>
  <text x="335" y="122" text-anchor="middle" class="small-label" fill="#2e7d32">✓ Server-push only</text>
  <line x1="260" y1="132" x2="410" y2="132" stroke="#4caf50" stroke-width="1"/>
  
  <text x="270" y="155" text-anchor="start" class="small-label">• Server-to-client only</text>
  <text x="270" y="172" text-anchor="start" class="small-label">• HTTP-based, persistent</text>
  <text x="270" y="189" text-anchor="start" class="small-label">• Low latency</text>
  <text x="270" y="206" text-anchor="start" class="small-label">Use: Notifications, feeds</text>
  
  <!-- Long Polling -->
  <rect x="450" y="80" width="190" height="140" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="545" y="105" text-anchor="middle" class="label" font-weight="bold">Long Polling</text>
  <text x="545" y="122" text-anchor="middle" class="small-label" fill="#ef6c00">⚠ Fallback</text>
  <line x1="470" y1="132" x2="620" y2="132" stroke="#ff9800" stroke-width="1"/>
  
  <text x="480" y="155" text-anchor="start" class="small-label">• Request held open</text>
  <text x="480" y="172" text-anchor="start" class="small-label">• Response when data ready</text>
  <text x="480" y="189" text-anchor="start" class="small-label">• Medium latency</text>
  <text x="480" y="206" text-anchor="start" class="small-label">Use: WebSocket fallback</text>
  
  <!-- Short Polling -->
  <rect x="660" y="80" width="170" height="140" fill="#ffebee" stroke="#f44336" rx="6"/>
  <text x="745" y="105" text-anchor="middle" class="label" font-weight="bold">Short Polling</text>
  <text x="745" y="122" text-anchor="middle" class="small-label" fill="#c62828">✗ Least efficient</text>
  <line x1="680" y1="132" x2="810" y2="132" stroke="#f44336" stroke-width="1"/>
  
  <text x="690" y="155" text-anchor="start" class="small-label">• Periodic HTTP requests</text>
  <text x="690" y="172" text-anchor="start" class="small-label">• High latency (poll interval)</text>
  <text x="690" y="189" text-anchor="start" class="small-label">• Wasteful (empty responses)</text>
  <text x="690" y="206" text-anchor="start" class="small-label">Use: Simple status checks</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="240" width="800" height="120" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="430" y="265" text-anchor="middle" class="label" font-weight="bold">Comparison</text>
  <line x1="50" y1="275" x2="810" y2="275" stroke="#999" stroke-width="1"/>
  
  <text x="100" y="295" text-anchor="middle" class="small-label" font-weight="bold">WebSockets</text>
  <text x="300" y="295" text-anchor="middle" class="small-label" font-weight="bold">SSE</text>
  <text x="500" y="295" text-anchor="middle" class="small-label" font-weight="bold">Long Poll</text>
  <text x="700" y="295" text-anchor="middle" class="small-label" font-weight="bold">Short Poll</text>
  
  <line x1="50" y1="305" x2="810" y2="305" stroke="#ddd" stroke-width="1"/>
  
  <text x="100" y="325" text-anchor="middle" class="small-label" fill="#4caf50">Bidirectional</text>
  <text x="300" y="325" text-anchor="middle" class="small-label" fill="#2e7d32">Server→Client</text>
  <text x="500" y="325" text-anchor="middle" class="small-label" fill="#ff9800">Bidirectional</text>
  <text x="700" y="325" text-anchor="middle" class="small-label" fill="#f44336">Bidirectional</text>
  
  <text x="100" y="345" text-anchor="middle" class="small-label" fill="#4caf50">Very Low</text>
  <text x="300" y="345" text-anchor="middle" class="small-label" fill="#4caf50">Low</text>
  <text x="500" y="345" text-anchor="middle" class="small-label" fill="#ff9800">Medium</text>
  <text x="700" y="345" text-anchor="middle" class="small-label" fill="#f44336">High</text>
  
  <text x="100" y="365" text-anchor="middle" class="small-label" fill="#4caf50">Efficient</text>
  <text x="300" y="365" text-anchor="middle" class="small-label" fill="#4caf50">Efficient</text>
  <text x="500" y="365" text-anchor="middle" class="small-label" fill="#ff9800">Moderate</text>
  <text x="700" y="365" text-anchor="middle" class="small-label" fill="#f44336">Wasteful</text>
  
  <!-- Selection Guide -->
  <rect x="30" y="380" width="800" height="50" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="430" y="405" text-anchor="middle" class="small-label" font-weight="bold">Selection Guide: WebSockets for chat/collab, SSE for notifications, Long Poll as fallback, avoid Short Poll</text>
</svg>
