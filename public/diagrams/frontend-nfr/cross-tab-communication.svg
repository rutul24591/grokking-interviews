<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">Cross-Tab Communication</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">BroadcastChannel, localStorage events, SharedWorker, and Service Worker comparison</text>
  
  <!-- BroadcastChannel -->
  <rect x="30" y="80" width="190" height="140" fill="#e3f2fd" stroke="#2196f3" rx="6"/>
  <text x="125" y="105" text-anchor="middle" class="label" font-weight="bold">BroadcastChannel</text>
  <text x="125" y="122" text-anchor="middle" class="small-label" fill="#4caf50">✓ Recommended</text>
  <line x1="50" y1="132" x2="200" y2="132" stroke="#2196f3" stroke-width="1"/>
  
  <text x="60" y="155" text-anchor="start" class="small-label">• Simple postMessage API</text>
  <text x="60" y="172" text-anchor="start" class="small-label">• 90%+ browser support</text>
  <text x="60" y="189" text-anchor="start" class="small-label">• Structured clone data</text>
  <text x="60" y="206" text-anchor="start" class="small-label">⚠ Not IE</text>
  
  <!-- localStorage events -->
  <rect x="240" y="80" width="190" height="140" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="335" y="105" text-anchor="middle" class="label" font-weight="bold">localStorage Events</text>
  <text x="335" y="122" text-anchor="middle" class="small-label" fill="#ff9800">⚠ Fallback</text>
  <line x1="260" y1="132" x2="410" y2="132" stroke="#4caf50" stroke-width="1"/>
  
  <text x="270" y="155" text-anchor="start" class="small-label">• Universal support</text>
  <text x="270" y="172" text-anchor="start" class="small-label">• String data only</text>
  <text x="270" y="189" text-anchor="start" class="small-label">• Doesn't fire in source tab</text>
  <text x="270" y="206" text-anchor="start" class="small-label">✓ Good fallback</text>
  
  <!-- SharedWorker -->
  <rect x="450" y="80" width="190" height="140" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="545" y="105" text-anchor="middle" class="label" font-weight="bold">SharedWorker</text>
  <text x="545" y="122" text-anchor="middle" class="small-label" fill="#666">Complex</text>
  <line x1="470" y1="132" x2="620" y2="132" stroke="#ff9800" stroke-width="1"/>
  
  <text x="480" y="155" text-anchor="start" class="small-label">• Shared state across tabs</text>
  <text x="480" y="172" text-anchor="start" class="small-label">• Complex coordination</text>
  <text x="480" y="189" text-anchor="start" class="small-label">• Background processing</text>
  <text x="480" y="206" text-anchor="start" class="small-label">⚠ Limited mobile support</text>
  
  <!-- Service Worker -->
  <rect x="660" y="80" width="170" height="140" fill="#fce4ec" stroke="#e91e63" rx="6"/>
  <text x="745" y="105" text-anchor="middle" class="label" font-weight="bold">Service Worker</text>
  <text x="745" y="122" text-anchor="middle" class="small-label" fill="#666">Network focus</text>
  <line x1="680" y1="132" x2="810" y2="132" stroke="#e91e63" stroke-width="1"/>
  
  <text x="690" y="155" text-anchor="start" class="small-label">• Network coordination</text>
  <text x="690" y="172" text-anchor="start" class="small-label">• Push notifications</text>
  <text x="690" y="189" text-anchor="start" class="small-label">• Offline caching</text>
  <text x="690" y="206" text-anchor="start" class="small-label">⚠ Overkill for tab sync</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="240" width="800" height="90" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="430" y="265" text-anchor="middle" class="label" font-weight="bold">Comparison</text>
  <line x1="50" y1="275" x2="810" y2="275" stroke="#999" stroke-width="1"/>
  
  <text x="100" y="295" text-anchor="middle" class="small-label" font-weight="bold">BroadcastChannel</text>
  <text x="300" y="295" text-anchor="middle" class="small-label" font-weight="bold">localStorage</text>
  <text x="500" y="295" text-anchor="middle" class="small-label" font-weight="bold">SharedWorker</text>
  <text x="700" y="295" text-anchor="middle" class="small-label" font-weight="bold">Service Worker</text>
  
  <line x1="50" y1="305" x2="810" y2="305" stroke="#ddd" stroke-width="1"/>
  
  <text x="100" y="325" text-anchor="middle" class="small-label" fill="#4caf50">Low</text>
  <text x="300" y="325" text-anchor="middle" class="small-label" fill="#4caf50">Low</text>
  <text x="500" y="325" text-anchor="middle" class="small-label" fill="#ff9800">Medium</text>
  <text x="700" y="325" text-anchor="middle" class="small-label" fill="#f44336">High</text>
  
  <text x="100" y="345" text-anchor="middle" class="small-label" fill="#4caf50">90%+</text>
  <text x="300" y="345" text-anchor="middle" class="small-label" fill="#4caf50">100%</text>
  <text x="500" y="345" text-anchor="middle" class="small-label" fill="#ff9800">Good</text>
  <text x="700" y="345" text-anchor="middle" class="small-label" fill="#ff9800">Good</text>
  
  <text x="100" y="365" text-anchor="middle" class="small-label">Most use cases</text>
  <text x="300" y="365" text-anchor="middle" class="small-label">Fallback</text>
  <text x="500" y="365" text-anchor="middle" class="small-label">Complex state</text>
  <text x="700" y="365" text-anchor="middle" class="small-label">Network sync</text>
  
  <!-- Use Cases -->
  <rect x="30" y="350" width="800" height="40" fill="#e8f5e9" stroke="#4caf50" rx="4"/>
  <text x="430" y="375" text-anchor="middle" class="small-label" font-weight="bold">Recommended: Use BroadcastChannel with localStorage fallback for maximum compatibility</text>
</svg>
