<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box-auth { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; }
      .box-network { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; }
      .box-form { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; }
      .box-payment { fill: #fce4ec; stroke: #e91e63; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .decision { fill: #fff; stroke: #666; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" class="title">Error Recovery Flows</text>
  <text x="450" y="55" text-anchor="middle" class="small-label">Common recovery patterns for different error types</text>
  
  <!-- Authentication Recovery -->
  <rect x="30" y="80" width="200" height="140" class="box-auth" rx="6"/>
  <text x="130" y="105" text-anchor="middle" class="label" font-weight="bold">Authentication</text>
  <line x1="50" y1="115" x2="210" y2="115" stroke="#2196f3" stroke-width="1"/>
  <text x="130" y="135" text-anchor="middle" class="small-label">• Session expired → Login modal</text>
  <text x="130" y="152" text-anchor="middle" class="small-label">• Preserve state, redirect back</text>
  <text x="130" y="172" text-anchor="middle" class="small-label">• Token refresh → Retry queue</text>
  <text x="130" y="189" text-anchor="middle" class="small-label">• Silent refresh before expiry</text>
  <text x="130" y="206" text-anchor="middle" class="small-label">• 401 broadcast → All tabs logout</text>
  
  <!-- Network Recovery -->
  <rect x="250" y="80" width="200" height="140" class="box-network" rx="6"/>
  <text x="350" y="105" text-anchor="middle" class="label" font-weight="bold">Network</text>
  <line x1="270" y1="115" x2="430" y2="115" stroke="#4caf50" stroke-width="1"/>
  <text x="350" y="135" text-anchor="middle" class="small-label">• Offline detection → Banner</text>
  <text x="350" y="152" text-anchor="middle" class="small-label">• Queue actions while offline</text>
  <text x="350" y="172" text-anchor="middle" class="small-label">• Auto-retry on reconnect</text>
  <text x="350" y="189" text-anchor="middle" class="small-label">• Conflict merge UI if needed</text>
  <text x="350" y="206" text-anchor="middle" class="small-label">• Exponential backoff retry</text>
  
  <!-- Form Recovery -->
  <rect x="470" y="80" width="200" height="140" class="box-form" rx="6"/>
  <text x="570" y="105" text-anchor="middle" class="label" font-weight="bold">Form Submission</text>
  <line x1="490" y1="115" x2="650" y2="115" stroke="#ff9800" stroke-width="1"/>
  <text x="570" y="135" text-anchor="middle" class="small-label">• Auto-save drafts locally</text>
  <text x="570" y="152" text-anchor="middle" class="small-label">• Preserve input on error</text>
  <text x="570" y="172" text-anchor="middle" class="small-label">• Inline field validation</text>
  <text x="570" y="189" text-anchor="middle" class="small-label">• Progressive section save</text>
  <text x="570" y="206" text-anchor="middle" class="small-label">• Restore on return</text>
  
  <!-- Payment Recovery -->
  <rect x="690" y="80" width="200" height="140" class="box-payment" rx="6"/>
  <text x="790" y="105" text-anchor="middle" class="label" font-weight="bold">Payment</text>
  <line x1="710" y1="115" x2="870" y2="115" stroke="#e91e63" stroke-width="1"/>
  <text x="790" y="135" text-anchor="middle" class="small-label">• Clear decline reason</text>
  <text x="790" y="152" text-anchor="middle" class="small-label">• Alternative payment methods</text>
  <text x="790" y="172" text-anchor="middle" class="small-label">• Retry later with cart save</text>
  <text x="790" y="189" text-anchor="middle" class="small-label">• Support contact option</text>
  <text x="790" y="206" text-anchor="middle" class="small-label">• Update payment method flow</text>
  
  <!-- Common Flow Diagram -->
  <text x="450" y="260" text-anchor="middle" class="label" font-weight="bold" font-size="16">Common Recovery Pattern</text>
  
  <!-- Flow boxes -->
  <rect x="100" y="280" width="140" height="50" fill="#e0e0e0" stroke="#666" rx="4"/>
  <text x="170" y="300" text-anchor="middle" class="small-label" font-weight="bold">Error Detected</text>
  <text x="170" y="315" text-anchor="middle" class="small-label">Classify type</text>
  
  <line x1="240" y1="305" x2="280" y2="305" class="arrow"/>
  
  <rect x="280" y="280" width="140" height="50" class="decision" rx="4"/>
  <text x="350" y="300" text-anchor="middle" class="small-label" font-weight="bold">Recoverable?</text>
  
  <line x1="420" y1="305" x2="460" y2="305" class="arrow"/>
  <text x="440" y="295" text-anchor="middle" class="small-label">Yes</text>
  
  <rect x="460" y="280" width="140" height="50" fill="#c8e6c9" stroke="#4caf50" rx="4"/>
  <text x="530" y="300" text-anchor="middle" class="small-label" font-weight="bold">Auto-Recovery</text>
  <text x="530" y="315" text-anchor="middle" class="small-label">Retry / Rollback</text>
  
  <line x1="600" y1="305" x2="640" y2="305" class="arrow"/>
  
  <rect x="640" y="280" width="140" height="50" fill="#bbdefb" stroke="#2196f3" rx="4"/>
  <text x="710" y="300" text-anchor="middle" class="small-label" font-weight="bold">User Guidance</text>
  <text x="710" y="315" text-anchor="middle" class="small-label">Show next steps</text>
  
  <line x1="350" y1="330" x2="350" y2="360" class="arrow"/>
  <text x="365" y="350" text-anchor="middle" class="small-label">No</text>
  
  <rect x="280" y="360" width="140" height="50" fill="#ffcdd2" stroke="#f44336" rx="4"/>
  <text x="350" y="380" text-anchor="middle" class="small-label" font-weight="bold">Terminal State</text>
  <text x="350" y="395" text-anchor="middle" class="small-label">Contact support</text>
  
  <!-- Recovery UX Patterns -->
  <text x="450" y="440" text-anchor="middle" class="label" font-weight="bold" font-size="16">Recovery UX Patterns</text>
  
  <rect x="100" y="460" width="160" height="60" fill="#f5f5f5" stroke="#999" rx="4"/>
  <text x="180" y="480" text-anchor="middle" class="small-label" font-weight="bold">Inline Retry</text>
  <text x="180" y="497" text-anchor="middle" class="small-label">Button next to error</text>
  <text x="180" y="512" text-anchor="middle" class="small-label" fill="#4caf50">✓ Non-blocking</text>
  
  <rect x="280" y="460" width="160" height="60" fill="#f5f5f5" stroke="#999" rx="4"/>
  <text x="360" y="480" text-anchor="middle" class="small-label" font-weight="bold">Toast Notification</text>
  <text x="360" y="497" text-anchor="middle" class="small-label">Auto-dismiss + action</text>
  <text x="360" y="512" text-anchor="middle" class="small-label" fill="#4caf50">✓ Non-intrusive</text>
  
  <rect x="460" y="460" width="160" height="60" fill="#f5f5f5" stroke="#999" rx="4"/>
  <text x="540" y="480" text-anchor="middle" class="small-label" font-weight="bold">Modal Dialog</text>
  <text x="540" y="497" text-anchor="middle" class="small-label">For critical errors</text>
  <text x="540" y="512" text-anchor="middle" class="small-label" fill="#ff9800">⚠ Blocks workflow</text>
  
  <rect x="640" y="460" width="160" height="60" fill="#f5f5f5" stroke="#999" rx="4"/>
  <text x="720" y="480" text-anchor="middle" class="small-label" font-weight="bold">Full Page</text>
  <text x="720" y="497" text-anchor="middle" class="small-label">App broken state</text>
  <text x="720" y="512" text-anchor="middle" class="small-label" fill="#f44336">✗ Last resort</text>
</svg>
