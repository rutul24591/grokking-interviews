<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .protected { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">Auth Guard Flow</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Protected route handling — auth check, redirect logic, and post-login destination preservation</text>
  
  <!-- Navigation Start -->
  <rect x="50" y="80" width="120" height="40" fill="#e8f5e9" stroke="#4caf50" rx="20"/>
  <text x="110" y="105" text-anchor="middle" class="small-label" font-weight="bold">Navigate to</text>
  <text x="110" y="118" text-anchor="middle" class="small-label">Protected Route</text>
  
  <line x1="170" y1="100" x2="210" y2="100" class="arrow"/>
  
  <!-- Auth Check -->
  <rect x="210" y="80" width="120" height="40" fill="#fff" stroke="#666" rx="4"/>
  <text x="270" y="100" text-anchor="middle" class="small-label" font-weight="bold">Authenticated?</text>
  
  <!-- Yes path -->
  <line x1="330" y1="100" x2="370" y2="100" class="arrow"/>
  <text x="350" y="90" text-anchor="middle" class="small-label">Yes</text>
  
  <rect x="370" y="80" width="120" height="40" fill="#c8e6c9" stroke="#4caf50" rx="4"/>
  <text x="430" y="105" text-anchor="middle" class="small-label" font-weight="bold">Render Page</text>
  
  <!-- No path -->
  <line x1="270" y1="120" x2="270" y2="150" class="arrow"/>
  <text x="285" y="135" text-anchor="start" class="small-label">No</text>
  
  <!-- Store Intended -->
  <rect x="210" y="150" width="120" height="40" fill="#fff3e0" stroke="#ff9800" rx="4"/>
  <text x="270" y="170" text-anchor="middle" class="small-label">Store intended URL</text>
  <text x="270" y="183" text-anchor="middle" class="small-label">/dashboard?page=settings</text>
  
  <line x1="270" y1="190" x2="270" y2="220" class="arrow"/>
  
  <!-- Redirect to Login -->
  <rect x="210" y="220" width="120" height="40" fill="#bbdefb" stroke="#2196f3" rx="4"/>
  <text x="270" y="245" text-anchor="middle" class="small-label" font-weight="bold">Redirect to Login</text>
  <text x="270" y="258" text-anchor="middle" class="small-label">?redirect=/dashboard</text>
  
  <!-- Login Flow -->
  <line x1="330" y1="240" x2="380" y2="240" class="arrow"/>
  
  <rect x="380" y="220" width="120" height="40" fill="#e3f2fd" stroke="#2196f3" rx="4"/>
  <text x="440" y="245" text-anchor="middle" class="small-label" font-weight="bold">Login Form</text>
  <text x="440" y="258" text-anchor="middle" class="small-label">Email + Password</text>
  
  <line x1="500" y1="240" x2="540" y2="240" class="arrow"/>
  
  <!-- Submit -->
  <rect x="540" y="220" width="100" height="40" fill="#fff3e0" stroke="#ff9800" rx="4"/>
  <text x="590" y="245" text-anchor="middle" class="small-label" font-weight="bold">POST /login</text>
  
  <line x1="640" y1="240" x2="680" y2="240" class="arrow"/>
  
  <!-- Success -->
  <rect x="680" y="220" width="100" height="40" fill="#c8e6c9" stroke="#4caf50" rx="4"/>
  <text x="730" y="240" text-anchor="middle" class="small-label" font-weight="bold">Set Cookie</text>
  <text x="730" y="253" text-anchor="middle" class="small-label">Auth State = true</text>
  
  <line x1="730" y1="260" x2="730" y2="290" class="arrow"/>
  
  <!-- Check Redirect -->
  <rect x="680" y="290" width="100" height="40" fill="#fff" stroke="#666" rx="4"/>
  <text x="730" y="310" text-anchor="middle" class="small-label" font-weight="bold">Has redirect?</text>
  
  <line x1="680" y1="310" x2="640" y2="310" class="arrow"/>
  <text x="660" y="320" text-anchor="middle" class="small-label">Yes</text>
  
  <!-- Navigate to Intended -->
  <rect x="540" y="290" width="100" height="40" fill="#bbdefb" stroke="#2196f3" rx="4"/>
  <text x="590" y="315" text-anchor="middle" class="small-label" font-weight="bold">Navigate to</text>
  <text x="590" y="328" text-anchor="middle" class="small-label">Intended URL</text>
  
  <!-- No redirect - go home -->
  <line x1="730" y1="330" x2="730" y2="360" class="arrow"/>
  <text x="745" y="345" text-anchor="start" class="small-label">No</text>
  
  <rect x="680" y="360" width="100" height="35" fill="#bbdefb" stroke="#2196f3" rx="4"/>
  <text x="730" y="382" text-anchor="middle" class="small-label">Navigate Home</text>
  
  <!-- State Management -->
  <rect x="50" y="280" width="200" height="100" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="150" y="305" text-anchor="middle" class="label" font-weight="bold">Auth State Management</text>
  <line x1="70" y1="315" x2="230" y2="315" stroke="#999" stroke-width="1"/>
  
  <text x="80" y="335" text-anchor="start" class="small-label">• Global state (Context/Zustand)</text>
  <text x="80" y="352" text-anchor="start" class="small-label">• Track: loading, authenticated</text>
  <text x="80" y="369" text-anchor="start" class="small-label">• User info, role, permissions</text>
  <text x="80" y="386" text-anchor="start" class="small-label">• Sync logout across tabs</text>
  
  <!-- Role-Based Access -->
  <rect x="50" y="400" width="380" height="40" fill="#fce4ec" stroke="#e91e63" rx="4"/>
  <text x="240" y="425" text-anchor="middle" class="small-label" font-weight="bold">Role-Based Access: Check user.role against route requirements</text>
</svg>
