<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">DX Tooling Stack</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">IDE, linters, formatters, debuggers, and development tools</text>
  
  <!-- IDE Layer -->
  <rect x="30" y="80" width="250" height="120" fill="#e3f2fd" stroke="#2196f3" rx="6"/>
  <text x="155" y="105" text-anchor="middle" class="label" font-weight="bold">IDE / Editor</text>
  <line x1="50" y1="115" x2="260" y2="115" stroke="#2196f3" stroke-width="1"/>
  
  <text x="60" y="140" text-anchor="start" class="small-label" font-weight="bold">VS Code (Recommended)</text>
  <text x="60" y="160" text-anchor="start" class="small-label">• ESLint extension</text>
  <text x="60" y="180" text-anchor="start" class="small-label">• Prettier extension</text>
  <text x="60" y="200" text-anchor="start" class="small-label">• TypeScript support</text>
  
  <!-- Linting Layer -->
  <rect x="300" y="80" width="250" height="120" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="425" y="105" text-anchor="middle" class="label" font-weight="bold">Linting</text>
  <line x1="320" y1="115" x2="530" y2="115" stroke="#4caf50" stroke-width="1"/>
  
  <text x="330" y="140" text-anchor="start" class="small-label" font-weight="bold">ESLint</text>
  <text x="330" y="160" text-anchor="start" class="small-label">• eslint-plugin-react</text>
  <text x="330" y="180" text-anchor="start" class="small-label">• eslint-plugin-jsx-a11y</text>
  <text x="330" y="200" text-anchor="start" class="small-label">• eslint-plugin-testing-library</text>
  
  <!-- Formatting Layer -->
  <rect x="570" y="80" width="250" height="120" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="695" y="105" text-anchor="middle" class="label" font-weight="bold">Formatting</text>
  <line x1="590" y1="115" x2="800" y2="115" stroke="#ff9800" stroke-width="1"/>
  
  <text x="600" y="140" text-anchor="start" class="small-label" font-weight="bold">Prettier</text>
  <text x="600" y="160" text-anchor="start" class="small-label">• Format on save</text>
  <text x="600" y="180" text-anchor="start" class="small-label">• Shared config</text>
  <text x="600" y="200" text-anchor="start" class="small-label">• CI enforcement</text>
  
  <!-- Type Safety -->
  <rect x="30" y="220" width="250" height="100" fill="#f3e5f5" stroke="#9c27b0" rx="6"/>
  <text x="155" y="245" text-anchor="middle" class="label" font-weight="bold">Type Safety</text>
  <line x1="50" y1="255" x2="260" y2="255" stroke="#9c27b0" stroke-width="1"/>
  
  <text x="60" y="280" text-anchor="start" class="small-label" font-weight="bold">TypeScript</text>
  <text x="60" y="300" text-anchor="start" class="small-label">• Strict mode enabled</text>
  <text x="60" y="320" text-anchor="start" class="small-label">• Type checking in CI</text>
  
  <!-- Pre-commit -->
  <rect x="300" y="220" width="250" height="100" fill="#fce4ec" stroke="#e91e63" rx="6"/>
  <text x="425" y="245" text-anchor="middle" class="label" font-weight="bold">Pre-commit Hooks</text>
  <line x1="320" y1="255" x2="530" y2="255" stroke="#e91e63" stroke-width="1"/>
  
  <text x="330" y="280" text-anchor="start" class="small-label" font-weight="bold">Husky + lint-staged</text>
  <text x="330" y="300" text-anchor="start" class="small-label">• Format staged files</text>
  <text x="330" y="320" text-anchor="start" class="small-label">• Lint before commit</text>
  
  <!-- Debugging -->
  <rect x="570" y="220" width="250" height="100" fill="#e0f7fa" stroke="#00bcd4" rx="6"/>
  <text x="695" y="245" text-anchor="middle" class="label" font-weight="bold">Debugging</text>
  <line x1="590" y1="255" x2="800" y2="255" stroke="#00bcd4" stroke-width="1"/>
  
  <text x="600" y="280" text-anchor="start" class="small-label" font-weight="bold">React DevTools</text>
  <text x="600" y="300" text-anchor="start" class="small-label">• Component inspector</text>
  <text x="600" y="320" text-anchor="start" class="small-label">• Profiler for performance</text>
  
  <!-- Flow arrows -->
  <line x1="155" y1="200" x2="155" y2="220" class="arrow"/>
  <line x1="425" y1="200" x2="425" y2="220" class="arrow"/>
  <line x1="695" y1="200" x2="695" y2="220" class="arrow"/>
  
  <!-- Integration -->
  <rect x="30" y="340" width="790" height="90" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="425" y="365" text-anchor="middle" class="label" font-weight="bold">Tool Integration Flow</text>
  <line x1="50" y1="375" x2="800" y2="375" stroke="#999" stroke-width="1"/>
  
  <text x="60" y="400" text-anchor="start" class="small-label">1. Write code → 2. Auto-format on save → 3. Lint on type → 4. Pre-commit checks → 5. CI validation</text>
  
  <rect x="100" y="410" width="80" height="25" fill="#e3f2fd" stroke="#2196f3" rx="2"/>
  <text x="140" y="427" text-anchor="middle" class="small-label">IDE</text>
  
  <line x1="180" y1="422" x2="200" y2="422" class="arrow"/>
  
  <rect x="200" y="410" width="80" height="25" fill="#e8f5e9" stroke="#4caf50" rx="2"/>
  <text x="240" y="427" text-anchor="middle" class="small-label">Prettier</text>
  
  <line x1="280" y1="422" x2="300" y2="422" class="arrow"/>
  
  <rect x="300" y="410" width="80" height="25" fill="#e8f5e9" stroke="#4caf50" rx="2"/>
  <text x="340" y="427" text-anchor="middle" class="small-label">ESLint</text>
  
  <line x1="380" y1="422" x2="400" y2="422" class="arrow"/>
  
  <rect x="400" y="410" width="80" height="25" fill="#fce4ec" stroke="#e91e63" rx="2"/>
  <text x="440" y="427" text-anchor="middle" class="small-label">Husky</text>
  
  <line x1="480" y1="422" x2="500" y2="422" class="arrow"/>
  
  <rect x="500" y="410" width="80" height="25" fill="#fff3e0" stroke="#ff9800" rx="2"/>
  <text x="540" y="427" text-anchor="middle" class="small-label">CI/CD</text>
</svg>
