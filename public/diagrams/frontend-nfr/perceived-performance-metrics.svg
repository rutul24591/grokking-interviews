<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <marker id="arrow-metrics" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Measuring Perceived Performance</text>
  
  <!-- Left: Quantitative Metrics -->
  <rect x="30" y="70" width="400" height="220" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="230" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Quantitative Metrics</text>
  <line x1="50" y1="115" x2="410" y2="115" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="55" y="145" font-size="13" fill="#1e3a8a">
    <tspan font-weight="bold">Speed Index:</tspan> How quickly content is populated
  </text>
  <text x="55" y="170" font-size="13" fill="#1e3a8a">
    <tspan font-weight="bold">TFMP:</tspan> Time to First Meaningful Paint
  </text>
  <text x="55" y="195" font-size="13" fill="#1e3a8a">
    <tspan font-weight="bold">INP:</tspan> Interaction to Next Paint
  </text>
  <text x="55" y="220" font-size="13" fill="#1e3a8a">
    <tspan font-weight="bold">TTI:</tspan> Time to Interactive
  </text>
  <text x="55" y="250" font-size="12" fill="#1e3a8a" font-style="italic">Tools: Lighthouse, WebPageTest, Chrome DevTools</text>
  
  <!-- Right: Qualitative Methods -->
  <rect x="470" y="70" width="400" height="220" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="670" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">Qualitative Methods</text>
  <line x1="490" y1="115" x2="850" y2="115" stroke="#10b981" stroke-width="1"/>
  
  <text x="495" y="145" font-size="13" fill="#064e3b">
    <tspan font-weight="bold">User Testing:</tspan> Observe &amp; ask about speed
  </text>
  <text x="495" y="170" font-size="13" fill="#064e3b">
    <tspan font-weight="bold">Surveys:</tspan> Rate perceived speed (1-5)
  </text>
  <text x="495" y="195" font-size="13" fill="#064e3b">
    <tspan font-weight="bold">A/B Testing:</tspan> Compare loading patterns
  </text>
  <text x="495" y="220" font-size="13" fill="#064e3b">
    <tspan font-weight="bold">Session Recordings:</tspan> Watch user interactions
  </text>
  <text x="495" y="250" font-size="12" fill="#064e3b" font-style="italic">Tools: UserTesting, Hotjar, Optimizely</text>
  
  <!-- Bottom: Correlation Chart -->
  <rect x="30" y="310" width="840" height="220" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Actual vs Perceived Performance</text>
  <line x1="50" y1="355" x2="850" y2="355" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Axes -->
  <line x1="100" y1="480" x2="780" y2="480" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow-metrics)"/>
  <line x1="100" y1="480" x2="100" y2="380" stroke="#1e293b" stroke-width="2" marker-end="url(#arrow-metrics)"/>
  <text x="790" y="485" font-size="12" fill="#1e293b">Actual Load Time</text>
  <text x="60" y="375" font-size="12" fill="#1e293b">Perceived Speed</text>
  
  <!-- Ideal zone -->
  <rect x="120" y="400" width="150" height="70" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="195" y="425" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Ideal</text>
  <text x="195" y="445" text-anchor="middle" font-size="10" fill="#064e3b">Fast actual</text>
  <text x="195" y="460" text-anchor="middle" font-size="10" fill="#064e3b">&amp; perceived</text>
  
  <!-- Perceived faster zone -->
  <rect x="300" y="400" width="150" height="70" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="375" y="425" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Sweet Spot</text>
  <text x="375" y="445" text-anchor="middle" font-size="10" fill="#1e3a8a">Slow actual</text>
  <text x="375" y="460" text-anchor="middle" font-size="10" fill="#1e3a8a">Fast perceived</text>
  
  <!-- Worst zone -->
  <rect x="480" y="400" width="150" height="70" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="555" y="425" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Worst</text>
  <text x="555" y="445" text-anchor="middle" font-size="10" fill="#7f1d1d">Fast actual</text>
  <text x="555" y="460" text-anchor="middle" font-size="10" fill="#7f1d1d">Slow perceived</text>
  
  <!-- Bad zone -->
  <rect x="660" y="400" width="100" height="70" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="710" y="430" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Bad</text>
  <text x="710" y="450" text-anchor="middle" font-size="10" fill="#78350f">Slow both</text>
  
  <!-- Arrow annotations -->
  <path d="M 270 435 Q 290 435 300 435" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-metrics)" fill="none"/>
  <text x="285" y="425" font-size="9" fill="#1e40af">Goal!</text>
  
</svg>
