<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Page Load Performance Timeline</text>
  
  <!-- Timeline axis -->
  <line x1="80" y1="400" x2="850" y2="400" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="860" y="405" font-size="12" fill="#6366f1" font-weight="bold">Time →</text>
  
  <!-- Time markers -->
  <line x1="80" y1="395" x2="80" y2="405" stroke="#1e293b" stroke-width="2"/>
  <text x="80" y="425" text-anchor="middle" font-size="11" fill="#1e293b">0s</text>
  
  <line x1="250" y1="395" x2="250" y2="405" stroke="#1e293b" stroke-width="2"/>
  <text x="250" y="425" text-anchor="middle" font-size="11" fill="#1e293b">1s</text>
  
  <line x1="420" y1="395" x2="420" y2="405" stroke="#1e293b" stroke-width="2"/>
  <text x="420" y="425" text-anchor="middle" font-size="11" fill="#1e293b">2s</text>
  
  <line x1="590" y1="395" x2="590" y2="405" stroke="#1e293b" stroke-width="2"/>
  <text x="590" y="425" text-anchor="middle" font-size="11" fill="#1e293b">3s</text>
  
  <line x1="760" y1="395" x2="760" y2="405" stroke="#1e293b" stroke-width="2"/>
  <text x="760" y="425" text-anchor="middle" font-size="11" fill="#1e293b">4s</text>
  
  <!-- Good threshold zone -->
  <rect x="80" y="350" width="340" height="30" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="4"/>
  <text x="250" y="370" text-anchor="middle" font-size="11" fill="#065f46" font-weight="bold">Good (LCP &lt; 2.5s)</text>
  
  <!-- Needs improvement zone -->
  <rect x="420" y="350" width="170" height="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="4"/>
  <text x="505" y="370" text-anchor="middle" font-size="11" fill="#92400e" font-weight="bold">Needs Work</text>
  
  <!-- Poor zone -->
  <rect x="590" y="350" width="170" height="30" fill="#fee2e2" stroke="#ef4444" stroke-width="1" rx="4"/>
  <text x="675" y="370" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="bold">Poor (> 4s)</text>
  
  <!-- TTFB -->
  <rect x="80" y="320" width="60" height="20" fill="#3b82f6" rx="3"/>
  <text x="110" y="335" text-anchor="middle" font-size="10" fill="white" font-weight="bold">TTFB</text>
  <line x1="140" y1="330" x2="140" y2="400" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="110" y="315" text-anchor="middle" font-size="10" fill="#3b82f6">~0.5s</text>
  
  <!-- FP -->
  <rect x="150" y="280" width="50" height="20" fill="#8b5cf6" rx="3"/>
  <text x="175" y="295" text-anchor="middle" font-size="10" fill="white" font-weight="bold">FP</text>
  <line x1="200" y1="290" x2="200" y2="400" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="200" y="275" text-anchor="middle" font-size="10" fill="#8b5cf6">~0.8s</text>
  
  <!-- FCP -->
  <rect x="210" y="240" width="60" height="20" fill="#ec4899" rx="3"/>
  <text x="240" y="255" text-anchor="middle" font-size="10" fill="white" font-weight="bold">FCP</text>
  <line x1="270" y1="250" x2="270" y2="400" stroke="#ec4899" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="270" y="235" text-anchor="middle" font-size="10" fill="#ec4899">~1.2s</text>
  
  <!-- LCP -->
  <rect x="350" y="200" width="80" height="25" fill="#f59e0b" rx="3"/>
  <text x="390" y="217" text-anchor="middle" font-size="11" fill="white" font-weight="bold">LCP</text>
  <line x1="430" y1="212" x2="430" y2="400" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="430" y="195" text-anchor="middle" font-size="10" fill="#f59e0b" font-weight="bold">~2.3s (Target)</text>
  
  <!-- Poor LCP example -->
  <rect x="600" y="160" width="80" height="25" fill="#ef4444" rx="3"/>
  <text x="640" y="177" text-anchor="middle" font-size="11" fill="white" font-weight="bold">LCP (Poor)</text>
  <line x1="680" y1="172" x2="680" y2="400" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="680" y="155" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold">~4.5s</text>
  
  <!-- TTI -->
  <rect x="500" y="120" width="70" height="25" fill="#10b981" rx="3"/>
  <text x="535" y="137" text-anchor="middle" font-size="11" fill="white" font-weight="bold">TTI</text>
  <line x1="570" y1="132" x2="570" y2="400" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="570" y="115" text-anchor="middle" font-size="10" fill="#10b981">~3.5s</text>
  
  <!-- Load Event -->
  <rect x="700" y="80" width="90" height="25" fill="#06b6d4" rx="3"/>
  <text x="745" y="97" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Load Event</text>
  <line x1="790" y1="92" x2="790" y2="400" stroke="#06b6d4" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="790" y="75" text-anchor="middle" font-size="10" fill="#06b6d4">~5.2s</text>
  
  <!-- Event markers on timeline -->
  <circle cx="110" cy="400" r="5" fill="#3b82f6"/>
  <circle cx="175" cy="400" r="5" fill="#8b5cf6"/>
  <circle cx="240" cy="400" r="5" fill="#ec4899"/>
  <circle cx="390" cy="400" r="6" fill="#f59e0b"/>
  <circle cx="535" cy="400" r="5" fill="#10b981"/>
  <circle cx="745" cy="400" r="5" fill="#06b6d4"/>
  
  <!-- Legend -->
  <rect x="80" y="450" width="740" height="40" fill="white" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="100" y="475" font-size="11" fill="#1e293b" font-weight="bold">Key Metrics:</text>
  <text x="200" y="475" font-size="10" fill="#3b82f6">TTFB = Time to First Byte</text>
  <text x="380" y="475" font-size="10" fill="#f59e0b">LCP = Largest Contentful Paint (Core Web Vital)</text>
  <text x="620" y="475" font-size="10" fill="#10b981">TTI = Time to Interactive</text>
</svg>
