<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Critical Rendering Path</text>
  
  <!-- Step 1: HTML -->
  <rect x="50" y="70" width="140" height="60" fill="#3b82f6" rx="8"/>
  <text x="120" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="white">HTML</text>
  <text x="120" y="115" text-anchor="middle" font-size="10" fill="white">Parser</text>
  
  <!-- Arrow to DOM -->
  <line x1="190" y1="100" x2="230" y2="100" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: DOM -->
  <rect x="240" y="70" width="140" height="60" fill="#8b5cf6" rx="8"/>
  <text x="310" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="white">DOM Tree</text>
  <text x="310" y="115" text-anchor="middle" font-size="10" fill="white">(Document Object Model)</text>
  
  <!-- Step 3: CSS -->
  <rect x="50" y="170" width="140" height="60" fill="#ec4899" rx="8"/>
  <text x="120" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CSS</text>
  <text x="120" y="215" text-anchor="middle" font-size="10" fill="white">Parser</text>
  
  <!-- Arrow to CSSOM -->
  <line x1="190" y1="200" x2="230" y2="200" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: CSSOM -->
  <rect x="240" y="170" width="140" height="60" fill="#f43f5e" rx="8"/>
  <text x="310" y="195" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CSSOM Tree</text>
  <text x="310" y="215" text-anchor="middle" font-size="10" fill="white">(CSS Object Model)</text>
  
  <!-- Arrows to Render Tree -->
  <line x1="380" y1="100" x2="420" y2="100" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="200" x2="420" y2="200" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="100" x2="420" y2="140" stroke="#6366f1" stroke-width="2"/>
  <line x1="420" y1="200" x2="420" y2="160" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Step 5: Render Tree -->
  <rect x="430" y="120" width="140" height="60" fill="#10b981" rx="8"/>
  <text x="500" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Render Tree</text>
  <text x="500" y="165" text-anchor="middle" font-size="10" fill="white">(Visible nodes only)</text>
  
  <!-- Arrow to Layout -->
  <line x1="570" y1="150" x2="610" y2="150" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 6: Layout -->
  <rect x="620" y="120" width="140" height="60" fill="#f59e0b" rx="8"/>
  <text x="690" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Layout</text>
  <text x="690" y="165" text-anchor="middle" font-size="10" fill="white">(Reflow - positions)</text>
  
  <!-- Arrow down to Paint -->
  <line x1="690" y1="180" x2="690" y2="220" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 7: Paint -->
  <rect x="620" y="230" width="140" height="60" fill="#8b5cf6" rx="8"/>
  <text x="690" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Paint</text>
  <text x="690" y="275" text-anchor="middle" font-size="10" fill="white">(Fill pixels)</text>
  
  <!-- Arrow down to Composite -->
  <line x1="690" y1="290" x2="690" y2="330" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 8: Composite -->
  <rect x="620" y="340" width="140" height="60" fill="#06b6d4" rx="8"/>
  <text x="690" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Composite</text>
  <text x="690" y="385" text-anchor="middle" font-size="10" fill="white">(Layer merging)</text>
  
  <!-- Browser Viewport -->
  <rect x="50" y="420" width="300" height="160" fill="white" stroke="#1e293b" stroke-width="2" rx="8"/>
  <text x="200" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Browser Viewport</text>
  
  <!-- Above the fold line -->
  <line x1="70" y1="480" x2="330" y2="480" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="340" y="485" font-size="11" fill="#ef4444">Above the fold</text>
  
  <!-- Content boxes -->
  <rect x="70" y="455" width="120" height="20" fill="#3b82f6" opacity="0.6"/>
  <text x="130" y="470" text-anchor="middle" font-size="9" fill="#1e293b">Header</text>
  
  <rect x="200" y="455" width="150" height="60" fill="#10b981" opacity="0.6"/>
  <text x="275" y="490" text-anchor="middle" font-size="9" fill="#1e293b">Hero Image (LCP)</text>
  
  <rect x="70" y="490" width="120" height="80" fill="#f59e0b" opacity="0.6"/>
  <text x="130" y="535" text-anchor="middle" font-size="9" fill="#1e293b">Main Content</text>
  
  <rect x="200" y="525" width="150" height="45" fill="#8b5cf6" opacity="0.6"/>
  <text x="275" y="555" text-anchor="middle" font-size="9" fill="#1e293b">Below the fold</text>
  
  <!-- Render-blocking note -->
  <rect x="430" y="420" width="330" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="595" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Render-Blocking Resources</text>
  <text x="595" y="470" text-anchor="middle" font-size="11" fill="#92400e">• CSS blocks rendering (wait for CSSOM)</text>
  <text x="595" y="490" text-anchor="middle" font-size="11" fill="#92400e">• JavaScript blocks parsing (wait for execute)</text>
  
  <!-- Optimization tip -->
  <rect x="430" y="510" width="330" height="70" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="595" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">Optimization Strategies</text>
  <text x="595" y="555" text-anchor="middle" font-size="11" fill="#065f46">• Inline critical CSS • Defer non-critical JS</text>
  <text x="595" y="572" text-anchor="middle" font-size="11" fill="#065f46">• Preload key resources • Minimize bundle sizes</text>
</svg>
