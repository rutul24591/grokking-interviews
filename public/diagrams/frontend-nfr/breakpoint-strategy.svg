<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">Breakpoint Strategy</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Content-driven breakpoints with fluid layouts between breakpoints</text>
  
  <!-- Breakpoint Visualization -->
  <rect x="50" y="80" width="750" height="120" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="425" y="105" text-anchor="middle" class="label" font-weight="bold">Responsive Layout Evolution</text>
  <line x1="70" y1="115" x2="780" y2="115" stroke="#999" stroke-width="1"/>
  
  <!-- Mobile -->
  <rect x="80" y="125" width="100" height="60" fill="#e3f2fd" stroke="#2196f3" rx="3"/>
  <text x="130" y="150" text-anchor="middle" class="small-label" font-weight="bold">Mobile</text>
  <text x="130" y="167" text-anchor="middle" class="small-label">&lt;768px</text>
  <text x="130" y="180" text-anchor="middle" class="small-label">1 column</text>
  
  <line x1="180" y1="155" x2="220" y2="155" class="arrow"/>
  
  <!-- Tablet -->
  <rect x="240" y="125" width="140" height="60" fill="#e8f5e9" stroke="#4caf50" rx="3"/>
  <text x="310" y="150" text-anchor="middle" class="small-label" font-weight="bold">Tablet</text>
  <text x="310" y="167" text-anchor="middle" class="small-label">768px - 1024px</text>
  <text x="310" y="180" text-anchor="middle" class="small-label">2 columns</text>
  
  <line x1="380" y1="155" x2="420" y2="155" class="arrow"/>
  
  <!-- Laptop -->
  <rect x="440" y="125" width="140" height="60" fill="#fff3e0" stroke="#ff9800" rx="3"/>
  <text x="510" y="150" text-anchor="middle" class="small-label" font-weight="bold">Laptop</text>
  <text x="510" y="167" text-anchor="middle" class="small-label">1024px - 1280px</text>
  <text x="510" y="180" text-anchor="middle" class="small-label">3 columns</text>
  
  <line x1="580" y1="155" x2="620" y2="155" class="arrow"/>
  
  <!-- Desktop -->
  <rect x="640" y="125" width="120" height="60" fill="#f3e5f5" stroke="#9c27b0" rx="3"/>
  <text x="700" y="150" text-anchor="middle" class="small-label" font-weight="bold">Desktop</text>
  <text x="700" y="167" text-anchor="middle" class="small-label">≥1280px</text>
  <text x="700" y="180" text-anchor="middle" class="small-label">Max width</text>
  
  <!-- Content-Driven Approach -->
  <rect x="50" y="220" width="380" height="140" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="240" y="245" text-anchor="middle" class="label" font-weight="bold">Content-Driven Breakpoints</text>
  <line x1="70" y1="255" x2="410" y2="255" stroke="#999" stroke-width="1"/>
  
  <text x="80" y="280" text-anchor="start" class="small-label" font-weight="bold">Don't:</text>
  <text x="80" y="300" text-anchor="start" class="small-label" fill="#f44336">✗ Use device-specific breakpoints</text>
  <text x="80" y="320" text-anchor="start" class="small-label" fill="#f44336">✗ Target iPhone, iPad, etc.</text>
  
  <text x="80" y="345" text-anchor="start" class="small-label" font-weight="bold">Do:</text>
  <text x="80" y="365" text-anchor="start" class="small-label" fill="#4caf50">✓ Let content dictate breakpoints</text>
  <text x="80" y="385" text-anchor="start" class="small-label" fill="#4caf50">✓ Resize until layout breaks, then fix</text>
  
  <!-- Fluid Layouts -->
  <rect x="450" y="220" width="380" height="140" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="640" y="245" text-anchor="middle" class="label" font-weight="bold">Fluid Layouts</text>
  <line x1="470" y1="255" x2="810" y2="255" stroke="#999" stroke-width="1"/>
  
  <text x="480" y="280" text-anchor="start" class="small-label" font-weight="bold">Use relative units:</text>
  <text x="480" y="300" text-anchor="start" class="small-label" fill="#2196f3">• % for widths</text>
  <text x="480" y="320" text-anchor="start" class="small-label" fill="#2196f3">• rem for spacing</text>
  <text x="480" y="340" text-anchor="start" class="small-label" fill="#2196f3">• vw/vh for viewport</text>
  <text x="480" y="360" text-anchor="start" class="small-label" fill="#2196f3">• clamp() for typography</text>
  
  <!-- Best Practices -->
  <rect x="50" y="380" width="780" height="60" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="440" y="405" text-anchor="middle" class="small-label" font-weight="bold">Best Practices:</text>
  <text x="120" y="425" text-anchor="start" class="small-label" fill="#4caf50">✓ Keep breakpoints minimal (3-5)</text>
  <text x="350" y="425" text-anchor="start" class="small-label" fill="#4caf50">✓ Name semantically (sm, md, lg, xl)</text>
  <text x="580" y="425" text-anchor="start" class="small-label" fill="#4caf50">✓ Test at breakpoint boundaries</text>
  <text x="750" y="425" text-anchor="start" class="small-label" fill="#4caf50">✓ Document decisions</text>
</svg>
