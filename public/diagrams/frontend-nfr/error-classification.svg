<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box-transient { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; }
      .box-user-fixable { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; }
      .box-intervention { fill: #ffebee; stroke: #f44336; stroke-width: 2; }
      .box-terminal { fill: #fce4ec; stroke: #9c27b0; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .axis { stroke: #999; stroke-width: 1; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">Error Classification Matrix</text>
  <text x="400" y="55" text-anchor="middle" class="small-label">By Source, Recoverability, and Severity</text>
  
  <!-- Axes -->
  <line x1="100" y1="100" x2="100" y2="520" class="axis"/>
  <line x1="100" y1="520" x2="700" y2="520" class="axis"/>
  
  <!-- Y-axis label -->
  <text x="40" y="310" text-anchor="middle" class="label" transform="rotate(-90, 40, 310)">Severity</text>
  <text x="85" y="150" class="small-label">Critical</text>
  <text x="85" y="250" class="small-label">Error</text>
  <text x="85" y="350" class="small-label">Warning</text>
  <text x="85" y="450" class="small-label">Info</text>
  
  <!-- X-axis label -->
  <text x="400" y="560" text-anchor="middle" class="label">Recoverability</text>
  <text x="200" y="540" text-anchor="middle" class="small-label">Transient</text>
  <text x="350" y="540" text-anchor="middle" class="small-label">User-Fixable</text>
  <text x="500" y="540" text-anchor="middle" class="small-label">Intervention</text>
  <text x="650" y="540" text-anchor="middle" class="small-label">Terminal</text>
  
  <!-- Error Type Boxes -->
  <!-- Network Errors (Transient) -->
  <rect x="150" y="120" width="100" height="60" class="box-transient" rx="4"/>
  <text x="200" y="145" text-anchor="middle" class="label" font-weight="bold">Network</text>
  <text x="200" y="165" text-anchor="middle" class="small-label">Timeout, DNS</text>
  
  <!-- API 5xx (Transient) -->
  <rect x="150" y="220" width="100" height="60" class="box-transient" rx="4"/>
  <text x="200" y="245" text-anchor="middle" class="label" font-weight="bold">API 5xx</text>
  <text x="200" y="265" text-anchor="middle" class="small-label">Service Unavailable</text>
  
  <!-- Validation Errors (User-Fixable) -->
  <rect x="300" y="320" width="100" height="60" class="box-user-fixable" rx="4"/>
  <text x="350" y="345" text-anchor="middle" class="label" font-weight="bold">Validation</text>
  <text x="350" y="365" text-anchor="middle" class="small-label">Invalid Input</text>
  
  <!-- API 4xx (User-Fixable) -->
  <rect x="300" y="220" width="100" height="60" class="box-user-fixable" rx="4"/>
  <text x="350" y="245" text-anchor="middle" class="label" font-weight="bold">API 4xx</text>
  <text x="350" y="265" text-anchor="middle" class="small-label">Bad Request</text>
  
  <!-- Auth Errors (Intervention) -->
  <rect x="450" y="120" width="100" height="60" class="box-intervention" rx="4"/>
  <text x="500" y="145" text-anchor="middle" class="label" font-weight="bold">Auth</text>
  <text x="500" y="165" text-anchor="middle" class="small-label">401, 403</text>
  
  <!-- Permission (Intervention) -->
  <rect x="450" y="220" width="100" height="60" class="box-intervention" rx="4"/>
  <text x="500" y="245" text-anchor="middle" class="label" font-weight="bold">Permission</text>
  <text x="500" y="265" text-anchor="middle" class="small-label">Access Denied</text>
  
  <!-- App Crash (Terminal) -->
  <rect x="600" y="120" width="100" height="60" class="box-terminal" rx="4"/>
  <text x="650" y="145" text-anchor="middle" class="label" font-weight="bold">App Crash</text>
  <text x="650" y="165" text-anchor="middle" class="small-label">Fatal Error</text>
  
  <!-- Resource Not Found (Terminal) -->
  <rect x="600" y="220" width="100" height="60" class="box-terminal" rx="4"/>
  <text x="650" y="245" text-anchor="middle" class="label" font-weight="bold">404</text>
  <text x="650" y="265" text-anchor="middle" class="small-label">Not Found</text>
  
  <!-- Recovery Actions -->
  <text x="400" y="420" text-anchor="middle" class="label" font-weight="bold">Recovery Actions</text>
  
  <rect x="150" y="440" width="120" height="50" class="box-transient" rx="4"/>
  <text x="210" y="460" text-anchor="middle" class="small-label">Auto-retry with</text>
  <text x="210" y="475" text-anchor="middle" class="small-label">exponential backoff</text>
  
  <rect x="300" y="440" width="120" height="50" class="box-user-fixable" rx="4"/>
  <text x="360" y="460" text-anchor="middle" class="small-label">Show inline error</text>
  <text x="360" y="475" text-anchor="middle" class="small-label">with fix guidance</text>
  
  <rect x="450" y="440" width="120" height="50" class="box-intervention" rx="4"/>
  <text x="510" y="460" text-anchor="middle" class="small-label">Guide through</text>
  <text x="510" y="475" text-anchor="middle" class="small-label">recovery flow</text>
  
  <rect x="600" y="440" width="120" height="50" class="box-terminal" rx="4"/>
  <text x="660" y="460" text-anchor="middle" class="small-label">Acknowledge &amp;</text>
  <text x="660" y="475" text-anchor="middle" class="small-label">provide next steps</text>
  
  <!-- Legend -->
  <rect x="100" y="510" width="15" height="15" class="box-transient"/>
  <text x="120" y="522" class="small-label">Transient (Retry)</text>
  
  <rect x="230" y="510" width="15" height="15" class="box-user-fixable"/>
  <text x="250" y="522" class="small-label">User-Fixable</text>
  
  <rect x="360" y="510" width="15" height="15" class="box-intervention"/>
  <text x="380" y="522" class="small-label">Requires Intervention</text>
  
  <rect x="520" y="510" width="15" height="15" class="box-terminal"/>
  <text x="540" y="522" class="small-label">Terminal</text>
</svg>
