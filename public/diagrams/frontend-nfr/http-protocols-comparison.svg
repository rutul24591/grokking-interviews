<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <rect width="900" height="550" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">HTTP Protocols Comparison</text>
  
  <!-- HTTP/1.1 -->
  <rect x="30" y="70" width="270" height="160" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="165" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">HTTP/1.1</text>
  <line x1="50" y1="110" x2="280" y2="110" stroke="#ef4444" stroke-width="1"/>
  
  <!-- Visual: Sequential requests -->
  <rect x="60" y="125" width="200" height="20" fill="#fca5a5" rx="2"/>
  <text x="160" y="140" text-anchor="middle" font-size="9" fill="#7f1d1d">Request 1</text>
  <rect x="60" y="150" width="200" height="20" fill="#fca5a5" rx="2"/>
  <text x="160" y="165" text-anchor="middle" font-size="9" fill="#7f1d1d">Request 2 (waits)</text>
  <rect x="60" y="175" width="200" height="20" fill="#fca5a5" rx="2"/>
  <text x="160" y="190" text-anchor="middle" font-size="9" fill="#7f1d1d">Request 3 (waits)</text>
  <rect x="60" y="200" width="200" height="20" fill="#fca5a5" rx="2"/>
  <text x="160" y="215" text-anchor="middle" font-size="9" fill="#7f1d1d">Request 4 (waits)</text>
  
  <text x="165" y="240" text-anchor="middle" font-size="10" fill="#991b1b">✗ Head-of-line blocking</text>
  <text x="165" y="255" text-anchor="middle" font-size="10" fill="#991b1b">✗ 6+ connections needed</text>
  
  <!-- HTTP/2 -->
  <rect x="315" y="70" width="270" height="160" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">HTTP/2</text>
  <line x1="335" y1="110" x2="565" y2="110" stroke="#3b82f6" stroke-width="1"/>
  
  <!-- Visual: Multiplexed -->
  <rect x="345" y="125" width="200" height="50" fill="#93c5fd" rx="2"/>
  <text x="445" y="145" text-anchor="middle" font-size="9" fill="#1e3a8a">Stream 1</text>
  <text x="445" y="160" text-anchor="middle" font-size="8" fill="#1e3a8a">Request 1 + 3 interleaved</text>
  
  <rect x="345" y="180" width="200" height="35" fill="#93c5fd" rx="2"/>
  <text x="445" y="200" text-anchor="middle" font-size="9" fill="#1e3a8a">Stream 2</text>
  <text x="445" y="212" text-anchor="middle" font-size="8" fill="#1e3a8a">Request 2 + 4 interleaved</text>
  
  <text x="450" y="240" text-anchor="middle" font-size="10" fill="#1e40af">✓ Multiplexing</text>
  <text x="450" y="255" text-anchor="middle" font-size="10" fill="#1e40af">✓ Single connection</text>
  
  <!-- HTTP/3 -->
  <rect x="600" y="70" width="270" height="160" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="735" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">HTTP/3 (QUIC)</text>
  <line x1="620" y1="110" x2="850" y2="110" stroke="#10b981" stroke-width="1"/>
  
  <text x="620" y="135" font-size="11" fill="#064e3b">✓ UDP-based (no TCP HOL blocking)</text>
  <text x="620" y="160" font-size="11" fill="#064e3b">✓ 0-RTT handshakes</text>
  <text x="620" y="185" font-size="11" fill="#064e3b">✓ Connection migration</text>
  <text x="620" y="210" font-size="11" fill="#064e3b">✓ Built-in encryption</text>
  <text x="620" y="235" font-size="11" fill="#064e3b">Best for: Mobile, unstable networks</text>
  
  <!-- Feature comparison -->
  <rect x="30" y="260" width="840" height="140" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Feature Comparison</text>
  <line x1="50" y1="300" x2="850" y2="300" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Headers -->
  <text x="100" y="325" font-size="11" font-weight="bold" fill="#1e293b">Feature</text>
  <text x="300" y="325" font-size="11" font-weight="bold" fill="#ef4444">HTTP/1.1</text>
  <text x="500" y="325" font-size="11" font-weight="bold" fill="#3b82f6">HTTP/2</text>
  <text x="700" y="325" font-size="11" font-weight="bold" fill="#10b981">HTTP/3</text>
  <line x1="50" y1="340" x2="850" y2="340" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Rows -->
  <text x="100" y="360" font-size="10" fill="#1e293b">Multiplexing</text>
  <text x="300" y="360" font-size="10" fill="#ef4444">✗ No</text>
  <text x="500" y="360" font-size="10" fill="#10b981">✓ Yes</text>
  <text x="700" y="360" font-size="10" fill="#10b981">✓ Yes</text>
  
  <text x="100" y="380" font-size="10" fill="#1e293b">Header Compression</text>
  <text x="300" y="380" font-size="10" fill="#ef4444">✗ No</text>
  <text x="500" y="380" font-size="10" fill="#10b981">✓ HPACK</text>
  <text x="700" y="380" font-size="10" fill="#10b981">✓ QPACK</text>
  
  <text x="100" y="400" font-size="10" fill="#1e293b">Connection</text>
  <text x="300" y="400" font-size="10" fill="#ef4444">TCP (6+)</text>
  <text x="500" y="400" font-size="10" fill="#3b82f6">TCP (1)</text>
  <text x="700" y="400" font-size="10" fill="#10b981">UDP (1)</text>
  
  <text x="100" y="420" font-size="10" fill="#1e293b">0-RTT</text>
  <text x="300" y="420" font-size="10" fill="#ef4444">✗ No</text>
  <text x="500" y="420" font-size="10" fill="#ef4444">✗ No</text>
  <text x="700" y="420" font-size="10" fill="#10b981">✓ Yes</text>
  
  <text x="100" y="440" font-size="10" fill="#1e293b">Browser Support</text>
  <text x="300" y="440" font-size="10" fill="#10b981">100%</text>
  <text x="500" y="440" font-size="10" fill="#10b981">95%+</text>
  <text x="700" y="440" font-size="10" fill="#f59e0b">~75%</text>
  
  <!-- Recommendation -->
  <rect x="30" y="430" width="840" height="100" fill="#f1f5f9" stroke="#64748b" stroke-width="1" rx="6"/>
  <text x="450" y="450" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Recommendation</text>
  <line x1="50" y1="460" x2="850" y2="460" stroke="#64748b" stroke-width="1"/>
  <text x="80" y="480" font-size="11" fill="#475569">✓ Enable HTTP/2 on all servers (widely supported)</text>
  <text x="80" y="500" font-size="11" fill="#475569">✓ Enable HTTP/3 for mobile-heavy applications</text>
  <text x="450" y="480" font-size="11" fill="#475569">✓ Use CDN that supports HTTP/3</text>
  <text x="450" y="500" font-size="11" fill="#475569">✓ Keep HTTP/1.1 as fallback</text>
  
</svg>
