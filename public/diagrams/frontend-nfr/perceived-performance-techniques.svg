<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <defs>
    <marker id="arrow-tech" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Perceived Performance Techniques</text>
  
  <!-- Technique 1: Skeleton Screens -->
  <rect x="30" y="70" width="400" height="140" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="230" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">1. Skeleton Screens</text>
  <line x1="50" y1="110" x2="410" y2="110" stroke="#3b82f6" stroke-width="1"/>
  <text x="55" y="135" font-size="12" fill="#1e3a8a">• Shows content structure while loading</text>
  <text x="55" y="155" font-size="12" fill="#1e3a8a">• Reduces uncertainty &amp; anxiety</text>
  <text x="55" y="175" font-size="12" fill="#1e3a8a">• Prevents layout shift (CLS)</text>
  <text x="55" y="195" font-size="12" fill="#1e3a8a">Impact: 20-30% faster perceived load</text>
  
  <!-- Technique 2: Optimistic UI -->
  <rect x="470" y="70" width="400" height="140" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="670" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">2. Optimistic UI Updates</text>
  <line x1="490" y1="110" x2="850" y2="110" stroke="#10b981" stroke-width="1"/>
  <text x="495" y="135" font-size="12" fill="#064e3b">• Update UI before server response</text>
  <text x="495" y="155" font-size="12" fill="#064e3b">• Feels instant to users</text>
  <text x="495" y="175" font-size="12" fill="#064e3b">• Rollback on failure</text>
  <text x="495" y="195" font-size="12" fill="#064e3b">Impact: Feels 3x faster for actions</text>
  
  <!-- Technique 3: Progressive Loading -->
  <rect x="30" y="230" width="400" height="140" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="230" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">3. Progressive Loading</text>
  <line x1="50" y1="270" x2="410" y2="270" stroke="#f59e0b" stroke-width="1"/>
  <text x="55" y="295" font-size="12" fill="#78350f">• Load above-fold content first</text>
  <text x="55" y="315" font-size="12" fill="#78350f">• Text before images</text>
  <text x="55" y="335" font-size="12" fill="#78350f">• Progressive image loading</text>
  <text x="55" y="355" font-size="12" fill="#78350f">Impact: Content feels available sooner</text>
  
  <!-- Technique 4: Smart Indicators -->
  <rect x="470" y="230" width="400" height="140" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="670" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">4. Smart Loading Indicators</text>
  <line x1="490" y1="270" x2="850" y2="270" stroke="#8b5cf6" stroke-width="1"/>
  <text x="495" y="295" font-size="12" fill="#4c1d95">• Progress bars for determinate waits</text>
  <text x="495" y="315" font-size="12" fill="#4c1d95">• Spinners for indeterminate waits</text>
  <text x="495" y="335" font-size="12" fill="#4c1d95">• Show percentage &amp; time remaining</text>
  <text x="495" y="355" font-size="12" fill="#4c1d95">Impact: Reduces wait anxiety by 40%</text>
  
  <!-- Technique 5: Prefetching -->
  <rect x="30" y="390" width="400" height="140" fill="#fce7f3" stroke="#ec4899" stroke-width="2" rx="8"/>
  <text x="230" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#9d174d">5. Prefetching</text>
  <line x1="50" y1="430" x2="410" y2="430" stroke="#ec4899" stroke-width="1"/>
  <text x="55" y="455" font-size="12" fill="#831843">• Load likely next pages in background</text>
  <text x="55" y="475" font-size="12" fill="#831843">• Hover prefetch (100-300ms before click)</text>
  <text x="55" y="495" font-size="12" fill="#831843">• Viewport-based prefetching</text>
  <text x="55" y="515" font-size="12" fill="#831843">Impact: Navigation feels instant</text>
  
  <!-- Technique 6: Background Processing -->
  <rect x="470" y="390" width="400" height="140" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2" rx="8"/>
  <text x="670" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#115e59">6. Background Processing</text>
  <line x1="490" y1="430" x2="850" y2="430" stroke="#14b8a6" stroke-width="1"/>
  <text x="495" y="455" font-size="12" fill="#134e4a">• Let users continue while processing</text>
  <text x="495" y="475" font-size="12" fill="#134e4a">• Notify when complete</text>
  <text x="495" y="495" font-size="12" fill="#134e4a">• Show detailed progress for long ops</text>
  <text x="495" y="515" font-size="12" fill="#134e4a">Impact: Users don't feel blocked</text>
  
  <!-- Comparison Chart -->
  <rect x="30" y="550" width="840" height="130" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="575" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Technique Comparison</text>
  <line x1="50" y1="590" x2="850" y2="590" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Bars -->
  <text x="80" y="620" font-size="11" fill="#1e293b">Skeleton</text>
  <rect x="150" y="605" width="120" height="20" fill="#3b82f6" rx="3"/>
  <text x="280" y="620" font-size="11" fill="#1e293b">25% improvement</text>
  
  <text x="80" y="645" font-size="11" fill="#1e293b">Optimistic UI</text>
  <rect x="150" y="630" width="180" height="20" fill="#10b981" rx="3"/>
  <text x="340" y="645" font-size="11" fill="#1e293b">50% improvement</text>
  
  <text x="80" y="670" font-size="11" fill="#1e293b">Prefetching</text>
  <rect x="150" y="655" width="150" height="20" fill="#ec4899" rx="3"/>
  <text x="310" y="670" font-size="11" fill="#1e293b">35% improvement</text>
  
  <!-- Legend -->
  <text x="500" y="620" font-size="10" fill="#6366f1">■ Perceived speed gain</text>
  <text x="500" y="640" font-size="10" fill="#6366f1">■ vs actual load time</text>
  <text x="500" y="660" font-size="10" fill="#6366f1">■ unchanged</text>
  
</svg>
