<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arrow-virt" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">How Virtualization Works</text>
  
  <!-- Without Virtualization -->
  <rect x="30" y="70" width="400" height="200" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="230" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">Without Virtualization ❌</text>
  <line x1="50" y1="115" x2="410" y2="115" stroke="#ef4444" stroke-width="1"/>
  
  <!-- All items rendered -->
  <rect x="60" y="130" width="340" height="20" fill="#fca5a5" rx="2"/>
  <text x="230" y="145" text-anchor="middle" font-size="10" fill="#7f1d1d">Item 1 (rendered)</text>
  <rect x="60" y="155" width="340" height="20" fill="#fca5a5" rx="2"/>
  <text x="230" y="170" text-anchor="middle" font-size="10" fill="#7f1d1d">Item 2 (rendered)</text>
  <rect x="60" y="180" width="340" height="20" fill="#fca5a5" rx="2"/>
  <text x="230" y="195" text-anchor="middle" font-size="10" fill="#7f1d1d">Item 3 (rendered)</text>
  <text x="230" y="220" text-anchor="middle" font-size="11" fill="#991b1d">... 9,997 more rendered items ...</text>
  <rect x="60" y="240" width="340" height="20" fill="#fca5a5" rx="2"/>
  <text x="230" y="255" text-anchor="middle" font-size="10" fill="#7f1d1d">Item 10000 (rendered)</text>
  
  <text x="230" y="285" text-anchor="middle" font-size="12" fill="#991b1b">10,000 DOM nodes</text>
  <text x="230" y="305" text-anchor="middle" font-size="12" fill="#991b1b">~500ms render, janky scroll</text>
  
  <!-- With Virtualization -->
  <rect x="470" y="70" width="400" height="200" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="670" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">With Virtualization ✅</text>
  <line x1="490" y1="115" x2="850" y2="115" stroke="#10b981" stroke-width="1"/>
  
  <!-- Viewport box -->
  <rect x="500" y="130" width="340" height="100" fill="#86efac" stroke="#10b981" stroke-width="2" rx="4"/>
  <text x="670" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Viewport (visible)</text>
  
  <!-- Visible items only -->
  <rect x="510" y="160" width="320" height="20" fill="#4ade80" rx="2"/>
  <text x="670" y="175" text-anchor="middle" font-size="10" fill="#064e3b">Item 47 (rendered)</text>
  <rect x="510" y="185" width="320" height="20" fill="#4ade80" rx="2"/>
  <text x="670" y="200" text-anchor="middle" font-size="10" fill="#064e3b">Item 48 (rendered)</text>
  <rect x="510" y="210" width="320" height="20" fill="#4ade80" rx="2"/>
  <text x="670" y="225" text-anchor="middle" font-size="10" fill="#064e3b">Item 49 (rendered)</text>
  <rect x="510" y="235" width="320" height="20" fill="#4ade80" rx="2"/>
  <text x="670" y="250" text-anchor="middle" font-size="10" fill="#064e3b">Item 50 (rendered)</text>
  
  <!-- Overscan indicators -->
  <line x1="480" y1="155" x2="480" y2="260" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="470" y="210" text-anchor="end" font-size="9" fill="#92400e">Overscan</text>
  
  <!-- Hidden items -->
  <text x="670" y="285" text-anchor="middle" font-size="11" fill="#065f46">9,996 items NOT rendered</text>
  <text x="670" y="305" text-anchor="middle" font-size="12" fill="#065f46">~20 DOM nodes, 60fps scroll</text>
  
  <!-- Arrow between -->
  <line x1="440" y1="170" x2="460" y2="170" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-virt)"/>
  <text x="450" y="165" text-anchor="middle" font-size="10" fill="#4f46e5">vs</text>
  
  <!-- Spacer explanation -->
  <rect x="30" y="350" width="840" height="120" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">How Positioning Works</text>
  <line x1="50" y1="390" x2="850" y2="390" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Spacer -->
  <rect x="80" y="410" width="20" height="80" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="90" y="455" text-anchor="middle" font-size="9" fill="#1e40af" transform="rotate(-90, 90, 455)">Spacer</text>
  <text x="120" y="430" font-size="10" fill="#1e293b">Total height = item count × item size</text>
  <text x="120" y="450" font-size="10" fill="#1e293b">Items positioned with transform: translateY()</text>
  <text x="120" y="470" font-size="10" fill="#1e293b">GPU-accelerated, no reflow</text>
  
</svg>
