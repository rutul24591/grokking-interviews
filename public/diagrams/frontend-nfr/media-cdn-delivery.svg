<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">CDN Image Delivery Architecture</text>
  
  <!-- Origin -->
  <rect x="50" y="80" width="120" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="110" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Origin</text>
  <text x="110" y="135" text-anchor="middle" font-size="10" fill="#78350f">Original</text>
  <text x="110" y="150" text-anchor="middle" font-size="10" fill="#78350f">Images</text>
  
  <!-- Arrow to CDN -->
  <line x1="170" y1="120" x2="250" y2="120" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="110" text-anchor="middle" font-size="9" fill="#4f46e5">Upload</text>
  
  <!-- CDN -->
  <rect x="260" y="60" width="200" height="120" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="360" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Image CDN</text>
  <text x="360" y="110" text-anchor="middle" font-size="10" fill="#1e3a8a">Cloudinary / Imgix</text>
  <text x="360" y="125" text-anchor="middle" font-size="10" fill="#1e3a8a">Cloudflare Images</text>
  <text x="360" y="140" text-anchor="middle" font-size="10" fill="#1e3a8a">AWS CloudFront</text>
  
  <!-- Transformations -->
  <rect x="280" y="190" width="160" height="80" fill="#e0e7ff" stroke="#6366f1" stroke-width="1" rx="4"/>
  <text x="360" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">On-the-Fly</text>
  <text x="360" y="230" text-anchor="middle" font-size="10" fill="#4f46e5">• Resize</text>
  <text x="360" y="245" text-anchor="middle" font-size="10" fill="#4f46e5">• Format conversion</text>
  <text x="360" y="260" text-anchor="middle" font-size="10" fill="#4f46e5">• Compression</text>
  
  <!-- Arrow to Edge -->
  <line x1="460" y1="120" x2="540" y2="120" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="110" text-anchor="middle" font-size="9" fill="#4f46e5">Distribute</text>
  
  <!-- Edge Locations -->
  <rect x="550" y="60" width="200" height="120" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="650" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">Edge Cache</text>
  <text x="650" y="110" text-anchor="middle" font-size="10" fill="#064e3b">200+ Locations</text>
  <text x="650" y="130" text-anchor="middle" font-size="10" fill="#064e3b">Cached Variants</text>
  <text x="650" y="150" text-anchor="middle" font-size="10" fill="#064e3b">Low Latency</text>
  
  <!-- Arrows to Users -->
  <line x1="750" y1="120" x2="800" y2="80" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="120" x2="800" y2="120" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="120" x2="800" y2="160" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Users -->
  <circle cx="850" cy="70" r="25" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="850" y="75" text-anchor="middle" font-size="9" fill="#5b21b6">User 1</text>
  
  <circle cx="850" cy="120" r="25" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="850" y="125" text-anchor="middle" font-size="9" fill="#5b21b6">User 2</text>
  
  <circle cx="850" cy="170" r="25" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="850" y="175" text-anchor="middle" font-size="9" fill="#5b21b6">User 3</text>
  
  <!-- URL example -->
  <rect x="50" y="290" width="800" height="70" fill="#1e293b" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#e2e8f0">URL-Based Transformations</text>
  <line x1="70" y1="330" x2="830" y2="330" stroke="#475569" stroke-width="1"/>
  <text x="70" y="355" font-size="10" fill="#22d3ee" font-family="monospace">https://cdn.example.com/images/</text>
  <text x="70" y="375" font-size="10" fill="#fbbf24" font-family="monospace">  ?w=800          (width)</text>
  <text x="200" y="375" font-size="10" fill="#fbbf24" font-family="monospace">&amp;h=600          (height)</text>
  <text x="350" y="375" font-size="10" fill="#fbbf24" font-family="monospace">&amp;fit=crop       (crop mode)</text>
  <text x="500" y="375" font-size="10" fill="#fbbf24" font-family="monospace">&amp;fmt=webp       (format)</text>
  <text x="650" y="375" font-size="10" fill="#fbbf24" font-family="monospace">&amp;q=80           (quality)</text>
  
  <!-- Benefits -->
  <rect x="50" y="380" width="260" height="100" fill="#f1f5f9" stroke="#64748b" stroke-width="1" rx="6"/>
  <text x="180" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Benefits</text>
  <text x="70" y="420" font-size="10" fill="#475569">✓ Automatic optimization</text>
  <text x="70" y="440" font-size="10" fill="#475569">✓ Global CDN delivery</text>
  <text x="70" y="460" font-size="10" fill="#475569">✓ 40-60% size reduction</text>
  <text x="70" y="480" font-size="10" fill="#475569">✓ No build process changes</text>
  
  <!-- Considerations -->
  <rect x="330" y="380" width="260" height="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="6"/>
  <text x="460" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Considerations</text>
  <text x="350" y="420" font-size="10" fill="#78350f">~ Cost per transformation</text>
  <text x="350" y="440" font-size="10" fill="#78350f">~ Vendor lock-in</text>
  <text x="350" y="460" font-size="10" fill="#78350f">~ Cache invalidation</text>
  <text x="350" y="480" font-size="10" fill="#78350f">~ Origin bandwidth</text>
  
  <!-- Popular services -->
  <rect x="610" y="380" width="240" height="100" fill="#f8fafc" stroke="#6366f1" stroke-width="1" rx="6"/>
  <text x="730" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Popular Services</text>
  <text x="630" y="425" font-size="10" fill="#1e293b">• Cloudinary (full-featured)</text>
  <text x="630" y="445" font-size="10" fill="#1e293b">• Imgix (real-time API)</text>
  <text x="630" y="465" font-size="10" fill="#1e293b">• Cloudflare Images (integrated)</text>
  <text x="630" y="485" font-size="10" fill="#1e293b">• AWS CloudFront + Lambda</text>
  
</svg>
