<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Polyfills and Transpilation Strategy</text>
  
  <!-- Transpilation -->
  <rect x="30" y="70" width="270" height="140" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="165" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Transpilation (Babel)</text>
  <line x1="50" y1="110" x2="280" y2="110" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="50" y="135" font-size="11" fill="#1e3a8a">ES2022 → ES5</text>
  <text x="50" y="160" font-size="11" fill="#1e3a8a">JSX → JavaScript</text>
  <text x="50" y="185" font-size="11" fill="#1e3a8a">TypeScript → JavaScript</text>
  <text x="50" y="210" font-size="11" fill="#1e3a8a">✓ Syntax conversion</text>
  
  <!-- Polyfills -->
  <rect x="315" y="70" width="270" height="140" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Polyfills</text>
  <line x1="335" y1="110" x2="565" y2="110" stroke="#10b981" stroke-width="1"/>
  
  <text x="335" y="135" font-size="11" fill="#064e3b">core-js: JS features</text>
  <text x="335" y="160" font-size="11" fill="#064e3b">whatwg-fetch: Fetch API</text>
  <text x="335" y="185" font-size="11" fill="#064e3b">IntersectionObserver</text>
  <text x="335" y="210" font-size="11" fill="#064e3b">✓ Runtime feature addition</text>
  
  <!-- Polyfill Service -->
  <rect x="600" y="70" width="270" height="140" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="735" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Polyfill Service</text>
  <line x1="620" y1="110" x2="850" y2="110" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="620" y="135" font-size="11" fill="#78350f">polyfill.io</text>
  <text x="620" y="160" font-size="11" fill="#78350f">Detects browser via UA</text>
  <text x="620" y="185" font-size="11" fill="#78350f">Serves only needed polyfills</text>
  <text x="620" y="210" font-size="11" fill="#78350f">✓ Reduces bundle size</text>
  
  <!-- Build pipeline -->
  <rect x="30" y="240" width="840" height="120" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Build Pipeline</text>
  <line x1="50" y1="280" x2="850" y2="280" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Pipeline flow -->
  <rect x="70" y="300" width="100" height="40" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" rx="4"/>
  <text x="120" y="325" text-anchor="middle" font-size="10" fill="#1e40af">Source</text>
  
  <line x1="170" y1="320" x2="200" y2="320" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="200" y="300" width="100" height="40" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" rx="4"/>
  <text x="250" y="320" text-anchor="middle" font-size="9" fill="#1e40af">Babel</text>
  <text x="250" y="332" text-anchor="middle" font-size="8" fill="#1e40af">(transpile)</text>
  
  <line x1="300" y1="320" x2="330" y2="320" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="330" y="300" width="100" height="40" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" rx="4"/>
  <text x="380" y="320" text-anchor="middle" font-size="9" fill="#1e40af">Polyfill</text>
  <text x="380" y="332" text-anchor="middle" font-size="8" fill="#1e40af">(add features)</text>
  
  <line x1="430" y1="320" x2="460" y2="320" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="460" y="300" width="100" height="40" fill="#10b981" stroke="#059669" stroke-width="2" rx="4"/>
  <text x="510" y="325" text-anchor="middle" font-size="10" fill="white">Output</text>
  
  <!-- Browser targets -->
  <rect x="30" y="390" width="400" height="90" fill="#f1f5f9" stroke="#64748b" stroke-width="1" rx="6"/>
  <text x="230" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Browser Targets (.browserslistrc)</text>
  <line x1="50" y1="420" x2="410" y2="420" stroke="#64748b" stroke-width="1"/>
  <text x="70" y="445" font-size="11" fill="#475569">&gt; 1%</text>
  <text x="150" y="445" font-size="11" fill="#475569">last 2 versions</text>
  <text x="280" y="445" font-size="11" fill="#475569">not dead</text>
  <text x="70" y="465" font-size="11" fill="#475569">not IE 11</text>
  <text x="150" y="465" font-size="11" fill="#475569">iOS &gt;= 12</text>
  
  <!-- Impact -->
  <rect x="450" y="390" width="420" height="90" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="6"/>
  <text x="660" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Bundle Impact</text>
  <line x1="470" y1="420" x2="850" y2="420" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="445" font-size="11" fill="#78350f">Without polyfill.io: +50KB</text>
  <text x="480" y="465" font-size="11" fill="#78350f">With polyfill.io: +5-15KB (varies by browser)</text>
  
</svg>
