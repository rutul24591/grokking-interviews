<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">E2E Testing Flow</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">E2E testing workflow — test execution, assertions, screenshots on failure, and CI/CD integration</text>
  
  <!-- Test Setup -->
  <rect x="50" y="80" width="120" height="50" fill="#e3f2fd" stroke="#2196f3" rx="4"/>
  <text x="110" y="105" text-anchor="middle" class="small-label" font-weight="bold">Test Setup</text>
  <text x="110" y="120" text-anchor="middle" class="small-label">Seed data, login</text>
  
  <line x1="170" y1="105" x2="210" y2="105" class="arrow"/>
  
  <!-- Navigate -->
  <rect x="210" y="80" width="100" height="50" fill="#e8f5e9" stroke="#4caf50" rx="4"/>
  <text x="260" y="105" text-anchor="middle" class="small-label" font-weight="bold">Navigate</text>
  <text x="260" y="120" text-anchor="middle" class="small-label">Visit URL</text>
  
  <line x1="310" y1="105" x2="350" y2="105" class="arrow"/>
  
  <!-- Interact -->
  <rect x="350" y="80" width="100" height="50" fill="#fff3e0" stroke="#ff9800" rx="4"/>
  <text x="400" y="105" text-anchor="middle" class="small-label" font-weight="bold">Interact</text>
  <text x="400" y="120" text-anchor="middle" class="small-label">Click, type, etc.</text>
  
  <line x1="450" y1="105" x2="490" y2="105" class="arrow"/>
  
  <!-- Assert -->
  <rect x="490" y="80" width="100" height="50" fill="#fff" stroke="#666" rx="4"/>
  <text x="540" y="105" text-anchor="middle" class="small-label" font-weight="bold">Assert</text>
  <text x="540" y="120" text-anchor="middle" class="small-label">Verify outcome</text>
  
  <!-- Pass path -->
  <line x1="590" y1="105" x2="630" y2="105" class="arrow"/>
  <text x="610" y="95" text-anchor="middle" class="small-label">Pass</text>
  
  <!-- Pass -->
  <rect x="630" y="80" width="100" height="50" fill="#c8e6c9" stroke="#4caf50" rx="4"/>
  <text x="680" y="105" text-anchor="middle" class="small-label" font-weight="bold">✓ Pass</text>
  
  <!-- Fail path -->
  <line x1="540" y1="130" x2="540" y2="160" class="arrow"/>
  <text x="555" y="145" text-anchor="start" class="small-label">Fail</text>
  
  <!-- Screenshot -->
  <rect x="490" y="160" width="100" height="50" fill="#ffcdd2" stroke="#f44336" rx="4"/>
  <text x="540" y="185" text-anchor="middle" class="small-label" font-weight="bold">Screenshot</text>
  <text x="540" y="200" text-anchor="middle" class="small-label">Capture failure</text>
  
  <line x1="540" y1="210" x2="540" y2="240" class="arrow"/>
  
  <!-- Log Error -->
  <rect x="490" y="240" width="100" height="50" fill="#ffebee" stroke="#f44336" rx="4"/>
  <text x="540" y="265" text-anchor="middle" class="small-label" font-weight="bold">Log Error</text>
  <text x="540" y="280" text-anchor="middle" class="small-label">Console, network</text>
  
  <line x1="540" y1="290" x2="540" y2="320" class="arrow"/>
  
  <!-- Fail -->
  <rect x="490" y="320" width="100" height="40" fill="#ffcdd2" stroke="#f44336" rx="4"/>
  <text x="540" y="345" text-anchor="middle" class="small-label" font-weight="bold">✗ Fail</text>
  
  <!-- CI/CD Integration -->
  <rect x="50" y="200" width="200" height="140" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="150" y="225" text-anchor="middle" class="label" font-weight="bold">CI/CD Integration</text>
  <line x1="70" y1="235" x2="230" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="80" y="260" text-anchor="start" class="small-label">• Run on PR/merge</text>
  <text x="80" y="280" text-anchor="start" class="small-label">• Parallel execution</text>
  <text x="80" y="300" text-anchor="start" class="small-label">• Retry flaky tests</text>
  <text x="80" y="320" text-anchor="start" class="small-label">• Block deploy on fail</text>
  
  <!-- Tools -->
  <rect x="270" y="200" width="200" height="140" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="370" y="225" text-anchor="middle" class="label" font-weight="bold">E2E Tools</text>
  <line x1="290" y1="235" x2="450" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="300" y="260" text-anchor="start" class="small-label" font-weight="bold">Cypress:</text>
  <text x="300" y="277" text-anchor="start" class="small-label">Developer-friendly</text>
  
  <text x="300" y="300" text-anchor="start" class="small-label" font-weight="bold">Playwright:</text>
  <text x="300" y="317" text-anchor="start" class="small-label">Multi-browser, auto-wait</text>
  
  <!-- Best Practices -->
  <rect x="490" y="200" width="170" height="140" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="575" y="225" text-anchor="middle" class="label" font-weight="bold">Best Practices</text>
  <line x1="510" y1="235" x2="640" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="520" y="260" text-anchor="start" class="small-label" fill="#4caf50">✓ data-testid selectors</text>
  <text x="520" y="280" text-anchor="start" class="small-label" fill="#4caf50">✓ Test critical paths only</text>
  <text x="520" y="300" text-anchor="start" class="small-label" fill="#ff9800">⚠ Mock external services</text>
  <text x="520" y="320" text-anchor="start" class="small-label" fill="#ff9800">⚠ Handle flakiness</text>
  
  <!-- Anti-Patterns -->
  <rect x="680" y="200" width="150" height="140" fill="#ffebee" stroke="#f44336" rx="6"/>
  <text x="755" y="225" text-anchor="middle" class="label" font-weight="bold">Anti-Patterns</text>
  <line x1="700" y1="235" x2="810" y2="235" stroke="#f44336" stroke-width="1"/>
  
  <text x="710" y="260" text-anchor="start" class="small-label" fill="#f44336">✗ Testing every flow</text>
  <text x="710" y="280" text-anchor="start" class="small-label" fill="#f44336">✗ Brittle selectors</text>
  <text x="710" y="300" text-anchor="start" class="small-label" fill="#f44336">✗ No test data management</text>
  <text x="710" y="320" text-anchor="start" class="small-label" fill="#f44336">✗ Ignoring flaky tests</text>
</svg>
