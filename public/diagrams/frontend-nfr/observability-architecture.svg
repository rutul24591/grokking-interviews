<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450">
  <defs>
    <style>
      .title { font: bold 20px system-ui, -apple-system, sans-serif; fill: #1a1a2e; }
      .label { font: 14px system-ui, -apple-system, sans-serif; fill: #333; }
      .small-label { font: 12px system-ui, -apple-system, sans-serif; fill: #555; }
      .box { fill: #f5f5f5; stroke: #666; stroke-width: 2; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <text x="425" y="35" text-anchor="middle" class="title">Observability Architecture</text>
  <text x="425" y="55" text-anchor="middle" class="small-label">Data collection, pipeline, storage, dashboards, and alerting</text>
  
  <!-- Data Collection -->
  <rect x="30" y="80" width="150" height="100" fill="#e3f2fd" stroke="#2196f3" rx="6"/>
  <text x="105" y="105" text-anchor="middle" class="label" font-weight="bold">Data Collection</text>
  <line x1="50" y1="115" x2="160" y2="115" stroke="#2196f3" stroke-width="1"/>
  
  <text x="60" y="140" text-anchor="start" class="small-label">• Performance API</text>
  <text x="60" y="160" text-anchor="start" class="small-label">• web-vitals</text>
  <text x="60" y="180" text-anchor="start" class="small-label">• Error listeners</text>
  <text x="60" y="200" text-anchor="start" class="small-label">• Custom timers</text>
  
  <line x1="180" y1="130" x2="220" y2="130" class="arrow"/>
  
  <!-- Pipeline -->
  <rect x="220" y="80" width="150" height="100" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="295" y="105" text-anchor="middle" class="label" font-weight="bold">Pipeline</text>
  <line x1="240" y1="115" x2="350" y2="115" stroke="#4caf50" stroke-width="1"/>
  
  <text x="250" y="140" text-anchor="start" class="small-label">• Client batching</text>
  <text x="250" y="160" text-anchor="start" class="small-label">• Sampling</text>
  <text x="250" y="180" text-anchor="start" class="small-label">• Ingestion endpoint</text>
  <text x="250" y="200" text-anchor="start" class="small-label">• Server-side enrich</text>
  
  <line x1="370" y1="130" x2="410" y2="130" class="arrow"/>
  
  <!-- Storage -->
  <rect x="410" y="80" width="150" height="100" fill="#fff3e0" stroke="#ff9800" rx="6"/>
  <text x="485" y="105" text-anchor="middle" class="label" font-weight="bold">Storage</text>
  <line x1="430" y1="115" x2="540" y2="115" stroke="#ff9800" stroke-width="1"/>
  
  <text x="440" y="140" text-anchor="start" class="small-label">• Time-series DB</text>
  <text x="440" y="160" text-anchor="start" class="small-label">• Aggregation</text>
  <text x="440" y="180" text-anchor="start" class="small-label">• Retention policy</text>
  
  <line x1="560" y1="130" x2="600" y2="130" class="arrow"/>
  
  <!-- Dashboards -->
  <rect x="600" y="80" width="150" height="100" fill="#f3e5f5" stroke="#9c27b0" rx="6"/>
  <text x="675" y="105" text-anchor="middle" class="label" font-weight="bold">Dashboards</text>
  <line x1="620" y1="115" x2="730" y2="115" stroke="#9c27b0" stroke-width="1"/>
  
  <text x="630" y="140" text-anchor="start" class="small-label">• Executive</text>
  <text x="630" y="160" text-anchor="start" class="small-label">• Engineering</text>
  <text x="630" y="180" text-anchor="start" class="small-label">• Product</text>
  <text x="630" y="200" text-anchor="start" class="small-label">• Release</text>
  
  <line x1="675" y1="180" x2="675" y2="210" class="arrow"/>
  
  <!-- Alerting -->
  <rect x="600" y="210" width="150" height="60" fill="#fce4ec" stroke="#e91e63" rx="4"/>
  <text x="675" y="235" text-anchor="middle" class="small-label" font-weight="bold">Alerting</text>
  <text x="675" y="255" text-anchor="middle" class="small-label">PagerDuty, Slack</text>
  
  <!-- Metrics Types -->
  <rect x="30" y="200" width="200" height="120" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="130" y="225" text-anchor="middle" class="label" font-weight="bold">Metrics Types</text>
  <line x1="50" y1="235" x2="210" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="60" y="260" text-anchor="start" class="small-label" font-weight="bold">Performance:</text>
  <text x="60" y="277" text-anchor="start" class="small-label">LCP, INP, CLS, FCP</text>
  
  <text x="60" y="300" text-anchor="start" class="small-label" font-weight="bold">Errors:</text>
  <text x="60" y="317" text-anchor="start" class="small-label">Rate, type, frequency</text>
  
  <!-- Tools -->
  <rect x="250" y="200" width="200" height="120" fill="#f5f5f5" stroke="#666" rx="6"/>
  <text x="350" y="225" text-anchor="middle" class="label" font-weight="bold">Tools</text>
  <line x1="270" y1="235" x2="430" y2="235" stroke="#999" stroke-width="1"/>
  
  <text x="280" y="260" text-anchor="start" class="small-label" font-weight="bold">Sentry:</text>
  <text x="280" y="277" text-anchor="start" class="small-label">Error tracking</text>
  
  <text x="280" y="300" text-anchor="start" class="small-label" font-weight="bold">DataDog:</text>
  <text x="280" y="317" text-anchor="start" class="small-label">Full observability</text>
  
  <!-- Best Practices -->
  <rect x="470" y="200" width="360" height="120" fill="#e8f5e9" stroke="#4caf50" rx="6"/>
  <text x="650" y="225" text-anchor="middle" class="label" font-weight="bold">Best Practices</text>
  <line x1="490" y1="235" x2="810" y2="235" stroke="#4caf50" stroke-width="1"/>
  
  <text x="500" y="260" text-anchor="start" class="small-label" fill="#4caf50">✓ Start with Core Web Vitals</text>
  <text x="500" y="280" text-anchor="start" class="small-label" fill="#4caf50">✓ Track percentiles (p75, p95)</text>
  <text x="500" y="300" text-anchor="start" class="small-label" fill="#4caf50">✓ Correlate with business metrics</text>
  <text x="700" y="260" text-anchor="start" class="small-label" fill="#ff9800">⚠ Respect privacy (GDPR)</text>
  <text x="700" y="280" text-anchor="start" class="small-label" fill="#ff9800">⚠ Act on data found</text>
</svg>
