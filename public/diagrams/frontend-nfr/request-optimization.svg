<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Request Optimization Techniques</text>
  
  <!-- Batching -->
  <rect x="30" y="70" width="270" height="130" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="165" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Request Batching</text>
  <line x1="50" y1="110" x2="280" y2="110" stroke="#3b82f6" stroke-width="1"/>
  
  <!-- Before -->
  <text x="50" y="135" font-size="10" fill="#1e3a8a">Before: 4 requests</text>
  <rect x="60" y="145" width="40" height="15" fill="#93c5fd" rx="2"/>
  <rect x="110" y="145" width="40" height="15" fill="#93c5fd" rx="2"/>
  <rect x="160" y="145" width="40" height="15" fill="#93c5fd" rx="2"/>
  <rect x="210" y="145" width="40" height="15" fill="#93c5fd" rx="2"/>
  
  <!-- After -->
  <text x="50" y="175" font-size="10" fill="#1e3a8a">After: 1 batch</text>
  <rect x="60" y="185" width="200" height="15" fill="#3b82f6" rx="2"/>
  <text x="160" y="197" text-anchor="middle" font-size="8" fill="white">Batched request</text>
  
  <text x="50" y="215" font-size="10" fill="#1e3a8a">✓ Fewer round-trips</text>
  <text x="180" y="215" font-size="10" fill="#1e3a8a">~ Larger payload</text>
  
  <!-- Deduplication -->
  <rect x="315" y="70" width="270" height="130" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">Request Deduplication</text>
  <line x1="335" y1="110" x2="565" y2="110" stroke="#10b981" stroke-width="1"/>
  
  <!-- Diagram -->
  <text x="335" y="135" font-size="10" fill="#064e3b">Component A → getUser(1)</text>
  <text x="335" y="155" font-size="10" fill="#064e3b">Component B → getUser(1)</text>
  <text x="450" y="175" font-size="11" fill="#10b981">↓ Same promise returned</text>
  <text x="335" y="195" font-size="10" fill="#064e3b">Single network request</text>
  
  <text x="335" y="215" font-size="10" fill="#064e3b">✓ No duplicate requests</text>
  <text x="470" y="215" font-size="10" fill="#064e3b">~ Need cache management</text>
  
  <!-- Compression -->
  <rect x="600" y="70" width="270" height="130" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="735" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Compression</text>
  <line x1="620" y1="110" x2="850" y2="110" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="620" y="135" font-size="11" fill="#78350f">Gzip: 70-80% reduction</text>
  <text x="620" y="160" font-size="11" fill="#78350f">Brotli: 80-90% reduction</text>
  <text x="620" y="185" font-size="11" fill="#78350f">Zstandard: Fast + efficient</text>
  
  <!-- Connection Reuse -->
  <rect x="30" y="230" width="410" height="130" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="235" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">Connection Reuse</text>
  <line x1="50" y1="270" x2="420" y2="270" stroke="#8b5cf6" stroke-width="1"/>
  
  <text x="70" y="295" font-size="11" fill="#4c1d95">Keep-Alive: Reuse TCP connection</text>
  <text x="70" y="320" font-size="11" fill="#4c1d95">HTTP/2: Multiplex over single connection</text>
  <text x="70" y="345" font-size="11" fill="#4c1d95">Reduce handshake overhead</text>
  
  <!-- Impact comparison -->
  <rect x="460" y="230" width="410" height="130" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="665" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Performance Impact</text>
  <line x1="480" y1="270" x2="850" y2="270" stroke="#6366f1" stroke-width="1"/>
  
  <text x="480" y="295" font-size="10" fill="#1e293b">Batching:</text>
  <rect x="560" y="285" width="100" height="15" fill="#3b82f6" rx="2"/>
  <text x="570" y="297" font-size="9" fill="white">-60% requests</text>
  
  <text x="480" y="320" font-size="10" fill="#1e293b">Dedup:</text>
  <rect x="560" y="310" width="80" height="15" fill="#10b981" rx="2"/>
  <text x="570" y="322" font-size="9" fill="white">-30% dupes</text>
  
  <text x="480" y="345" font-size="10" fill="#1e293b">Compression:</text>
  <rect x="560" y="335" width="120" height="15" fill="#f59e0b" rx="2"/>
  <text x="570" y="347" font-size="9" fill="white">-70% size</text>
  
  <!-- Best practices -->
  <rect x="30" y="390" width="840" height="90" fill="#f1f5f9" stroke="#64748b" stroke-width="1" rx="6"/>
  <text x="450" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Best Practices</text>
  <line x1="50" y1="420" x2="850" y2="420" stroke="#64748b" stroke-width="1"/>
  <text x="80" y="440" font-size="11" fill="#475569">✓ Use GraphQL for natural batching</text>
  <text x="300" y="440" font-size="11" fill="#475569">✓ Enable Brotli compression</text>
  <text x="550" y="440" font-size="11" fill="#475569">✓ Use React Query/SWR for dedup</text>
  <text x="80" y="465" font-size="11" fill="#475569">✓ Set Connection: keep-alive</text>
  <text x="300" y="465" font-size="11" fill="#475569">✓ Use HTTP/2 for multiplexing</text>
  <text x="550" y="465" font-size="11" fill="#475569">✓ Monitor request waterfalls</text>
  
</svg>
