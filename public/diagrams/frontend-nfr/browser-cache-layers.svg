<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Browser Cache Layers</text>
  
  <!-- Memory Cache -->
  <rect x="50" y="80" width="380" height="100" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="240" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Memory Cache (RAM)</text>
  <line x1="70" y1="120" x2="410" y2="120" stroke="#3b82f6" stroke-width="1"/>
  <text x="70" y="145" font-size="11" fill="#1e3a8a">✓ Fastest access</text>
  <text x="200" y="145" font-size="11" fill="#1e3a8a">✓ Cleared on tab close</text>
  <text x="70" y="165" font-size="11" fill="#1e3a8a">✓ Current page resources</text>
  <text x="250" y="165" font-size="11" fill="#1e3a8a">✓ bfcache (back/forward)</text>
  
  <!-- Disk Cache -->
  <rect x="470" y="80" width="380" height="100" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="660" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">Disk Cache (HTTP Cache)</text>
  <line x1="490" y1="120" x2="830" y2="120" stroke="#10b981" stroke-width="1"/>
  <text x="490" y="145" font-size="11" fill="#064e3b">✓ Persistent across sessions</text>
  <text x="680" y="145" font-size="11" fill="#064e3b">✓ Controlled by headers</text>
  <text x="490" y="165" font-size="11" fill="#064e3b">✓ Cache-Control, ETag</text>
  <text x="680" y="165" font-size="11" fill="#064e3b">✓ Larger capacity</text>
  
  <!-- Service Worker Cache -->
  <rect x="50" y="210" width="380" height="100" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="240" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">Service Worker Cache</text>
  <line x1="70" y1="250" x2="410" y2="250" stroke="#8b5cf6" stroke-width="1"/>
  <text x="70" y="275" font-size="11" fill="#4c1d95">✓ Programmable</text>
  <text x="200" y="275" font-size="11" fill="#4c1d95">✓ Cache API</text>
  <text x="70" y="295" font-size="11" fill="#4c1d95">✓ Full control</text>
  <text x="250" y="295" font-size="11" fill="#4c1d95">✓ Works offline</text>
  
  <!-- IndexedDB -->
  <rect x="470" y="210" width="380" height="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="660" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">IndexedDB</text>
  <line x1="490" y1="250" x2="830" y2="250" stroke="#f59e0b" stroke-width="1"/>
  <text x="490" y="275" font-size="11" fill="#78350f">✓ Large structured data</text>
  <text x="680" y="275" font-size="11" fill="#78350f">✓ Transactional</text>
  <text x="490" y="295" font-size="11" fill="#78350f">✓ Query support</text>
  <text x="680" y="295" font-size="11" fill="#78350f">✓ Persistent storage</text>
  
  <!-- Request Flow -->
  <rect x="50" y="340" width="800" height="140" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Cache Lookup Order</text>
  <line x1="70" y1="380" x2="830" y2="380" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Flow diagram -->
  <circle cx="120" cy="420" r="25" fill="#3b82f6"/>
  <text x="120" y="425" text-anchor="middle" font-size="10" fill="white">1</text>
  <text x="120" y="445" text-anchor="middle" font-size="9" fill="#1e3a8a">Memory</text>
  
  <line x1="145" y1="420" x2="185" y2="420" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <circle cx="235" cy="420" r="25" fill="#10b981"/>
  <text x="235" y="425" text-anchor="middle" font-size="10" fill="white">2</text>
  <text x="235" y="445" text-anchor="middle" font-size="9" fill="#064e3b">Service Worker</text>
  
  <line x1="260" y1="420" x2="300" y2="420" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <circle cx="350" cy="420" r="25" fill="#f59e0b"/>
  <text x="350" y="425" text-anchor="middle" font-size="10" fill="white">3</text>
  <text x="350" y="445" text-anchor="middle" font-size="9" fill="#78350f">Disk Cache</text>
  
  <line x1="375" y1="420" x2="415" y2="420" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  
  <circle cx="465" cy="420" r="25" fill="#ef4444"/>
  <text x="465" y="425" text-anchor="middle" font-size="10" fill="white">4</text>
  <text x="465" y="445" text-anchor="middle" font-size="9" fill="#7f1d1d">Network</text>
  
  <text x="550" y="420" font-size="11" fill="#1e293b">→ If not in cache, fetch from network</text>
  
</svg>
