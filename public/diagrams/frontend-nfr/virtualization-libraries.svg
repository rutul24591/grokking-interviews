<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Virtualization Libraries Comparison</text>
  
  <!-- react-window -->
  <rect x="30" y="70" width="270" height="180" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="165" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">react-window</text>
  <line x1="50" y1="110" x2="280" y2="110" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="50" y="135" font-size="11" fill="#1e3a8a">Bundle: ~13KB</text>
  <text x="50" y="155" font-size="11" fill="#1e3a8a">API: Component-based</text>
  <text x="50" y="175" font-size="11" fill="#1e3a8a">Framework: React only</text>
  <text x="50" y="195" font-size="11" fill="#1e3a8a">Types: Fixed + Variable</text>
  <text x="50" y="215" font-size="11" fill="#1e3a8a">Grid: Yes</text>
  
  <rect x="50" y="230" width="220" height="15" fill="#10b981" rx="3"/>
  <text x="160" y="242" text-anchor="middle" font-size="10" fill="white">Best for most use cases</text>
  
  <!-- react-virtual -->
  <rect x="315" y="70" width="270" height="180" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#065f46">react-virtual</text>
  <line x1="335" y1="110" x2="565" y2="110" stroke="#10b981" stroke-width="1"/>
  
  <text x="335" y="135" font-size="11" fill="#064e3b">Bundle: ~6KB (core)</text>
  <text x="335" y="155" font-size="11" fill="#064e3b">API: Hook-based</text>
  <text x="335" y="175" font-size="11" fill="#064e3b">Framework: React + core</text>
  <text x="335" y="195" font-size="11" fill="#064e3b">Types: Fixed + Variable</text>
  <text x="335" y="215" font-size="11" fill="#064e3b">Grid: Manual</text>
  
  <rect x="335" y="230" width="220" height="15" fill="#f59e0b" rx="3"/>
  <text x="445" y="242" text-anchor="middle" font-size="10" fill="white">Flexible, more setup</text>
  
  <!-- tanstack-virtual -->
  <rect x="600" y="70" width="270" height="180" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="735" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#5b21b6">tanstack-virtual</text>
  <line x1="620" y1="110" x2="850" y2="110" stroke="#8b5cf6" stroke-width="1"/>
  
  <text x="620" y="135" font-size="11" fill="#4c1d95">Bundle: ~7KB</text>
  <text x="620" y="155" font-size="11" fill="#4c1d95">API: Modern hook-based</text>
  <text x="620" y="175" font-size="11" fill="#4c1d95">Framework: React, Vue, Svelte</text>
  <text x="620" y="195" font-size="11" fill="#4c1d95">Types: Fixed + Variable</text>
  <text x="620" y="215" font-size="11" fill="#4c1d95">Grid: Yes</text>
  
  <rect x="620" y="230" width="220" height="15" fill="#8b5cf6" rx="3"/>
  <text x="730" y="242" text-anchor="middle" font-size="10" fill="white">Modern, multi-framework</text>
  
  <!-- Custom Implementation -->
  <rect x="30" y="270" width="840" height="100" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Custom Implementation</text>
  <line x1="50" y1="310" x2="850" y2="310" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="70" y="335" font-size="11" fill="#78350f">✓ Zero bundle size</text>
  <text x="250" y="335" font-size="11" fill="#78350f">✓ Full control</text>
  <text x="430" y="335" font-size="11" fill="#ef4444">✗ Maintenance burden</text>
  <text x="620" y="335" font-size="11" fill="#ef4444">✗ Edge cases to handle</text>
  
  <text x="450" y="360" text-anchor="middle" font-size="11" fill="#92400e">Only for: Simple lists or specific requirements not met by libraries</text>
  
  <!-- Feature comparison table -->
  <rect x="30" y="390" width="840" height="90" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="450" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Feature Comparison</text>
  <line x1="50" y1="425" x2="850" y2="425" stroke="#6366f1" stroke-width="1"/>
  
  <text x="100" y="445" font-size="10" fill="#1e293b">react-window:</text>
  <text x="200" y="445" font-size="10" fill="#1e293b">✓ Easy API</text>
  <text x="300" y="445" font-size="10" fill="#1e293b">✓ Well-tested</text>
  <text x="420" y="445" font-size="10" fill="#1e293b">✓ Grid support</text>
  <text x="540" y="445" font-size="10" fill="#f59e0b">~ React only</text>
  
  <text x="100" y="465" font-size="10" fill="#1e293b">tanstack-virtual:</text>
  <text x="230" y="465" font-size="10" fill="#1e293b">✓ Multi-framework</text>
  <text x="370" y="465" font-size="10" fill="#1e293b">✓ TypeScript</text>
  <text x="500" y="465" font-size="10" fill="#1e293b">✓ Modern API</text>
  <text x="620" y="465" font-size="10" fill="#f59e0b">~ Newer (less battle-tested)</text>
  
</svg>
