<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Cache Invalidation Patterns</text>
  
  <!-- Versioned URLs -->
  <rect x="30" y="70" width="270" height="130" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="165" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Versioned URLs</text>
  <line x1="50" y1="110" x2="280" y2="110" stroke="#3b82f6" stroke-width="1"/>
  <text x="50" y="135" font-size="11" fill="#1e3a8a">app.abc123.js → app.def456.js</text>
  <text x="50" y="160" font-size="11" fill="#1e3a8a">✓ Cache forever (immutable)</text>
  <text x="50" y="180" font-size="11" fill="#1e3a8a">✓ New version = new URL</text>
  <text x="50" y="200" font-size="11" fill="#ef4444">✗ Build process complexity</text>
  
  <!-- TTL-Based -->
  <rect x="315" y="70" width="270" height="130" fill="#d1fae5" stroke="#10b981" stroke-width="2" rx="8"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">TTL-Based</text>
  <line x1="335" y1="110" x2="565" y2="110" stroke="#10b981" stroke-width="1"/>
  <text x="335" y="135" font-size="11" fill="#064e3b">Cache-Control: max-age=3600</text>
  <text x="335" y="160" font-size="11" fill="#064e3b">✓ Simple to implement</text>
  <text x="335" y="180" font-size="11" fill="#064e3b">✓ Automatic expiration</text>
  <text x="335" y="200" font-size="11" fill="#ef4444">✗ Stale content until expiry</text>
  
  <!-- Purge API -->
  <rect x="600" y="70" width="270" height="130" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="735" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Purge API</text>
  <line x1="620" y1="110" x2="850" y2="110" stroke="#f59e0b" stroke-width="1"/>
  <text x="620" y="135" font-size="11" fill="#78350f">Manual invalidation</text>
  <text x="620" y="160" font-size="11" fill="#78350f">✓ Immediate effect</text>
  <text x="620" y="180" font-size="11" fill="#78350f">✓ Selective invalidation</text>
  <text x="620" y="200" font-size="11" fill="#ef4444">✗ Manual process</text>
  
  <!-- Stale-While-Revalidate -->
  <rect x="30" y="230" width="410" height="130" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="235" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">Stale-While-Revalidate</text>
  <line x1="50" y1="270" x2="420" y2="270" stroke="#8b5cf6" stroke-width="1"/>
  <text x="50" y="295" font-size="11" fill="#4c1d95">Cache-Control: stale-while-revalidate=604800</text>
  <text x="50" y="320" font-size="11" fill="#4c1d95">✓ Serve stale immediately</text>
  <text x="250" y="320" font-size="11" fill="#4c1d95">✓ Update in background</text>
  <text x="50" y="340" font-size="11" fill="#4c1d95">✓ Best of both worlds</text>
  <text x="250" y="340" font-size="11" fill="#4c1d95">✓ No user-visible delay</text>
  
  <!-- Comparison -->
  <rect x="460" y="230" width="410" height="130" fill="white" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="665" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Pattern Selection</text>
  <line x1="480" y1="270" x2="850" y2="270" stroke="#6366f1" stroke-width="1"/>
  
  <text x="480" y="295" font-size="11" fill="#1e293b">Static assets:</text>
  <text x="600" y="295" font-size="11" fill="#475569">Versioned URLs + immutable</text>
  
  <text x="480" y="320" font-size="11" fill="#1e293b">HTML pages:</text>
  <text x="600" y="320" font-size="11" fill="#475569">Short TTL + revalidate</text>
  
  <text x="480" y="345" font-size="11" fill="#1e293b">API responses:</text>
  <text x="600" y="345" font-size="11" fill="#475569">stale-while-revalidate</text>
  
  <!-- Timeline -->
  <rect x="30" y="390" width="840" height="90" fill="#f1f5f9" stroke="#64748b" stroke-width="1" rx="6"/>
  <text x="450" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Cache Lifecycle</text>
  <line x1="50" y1="420" x2="850" y2="420" stroke="#64748b" stroke-width="1"/>
  
  <circle cx="100" cy="445" r="15" fill="#10b981"/>
  <text x="100" y="475" text-anchor="middle" font-size="10" fill="#064e3b">Fresh</text>
  
  <line x1="120" y1="445" x2="200" y2="445" stroke="#64748b" stroke-width="2"/>
  
  <circle cx="250" cy="445" r="15" fill="#f59e0b"/>
  <text x="250" y="475" text-anchor="middle" font-size="10" fill="#78350f">Stale</text>
  
  <line x1="270" y1="445" x2="350" y2="445" stroke="#64748b" stroke-width="2"/>
  
  <circle cx="400" cy="445" r="15" fill="#8b5cf6"/>
  <text x="400" y="475" text-anchor="middle" font-size="10" fill="#4c1d95">Revalidating</text>
  
  <line x1="420" y1="445" x2="500" y2="445" stroke="#64748b" stroke-width="2"/>
  
  <circle cx="550" cy="445" r="15" fill="#10b981"/>
  <text x="550" y="475" text-anchor="middle" font-size="10" fill="#064e3b">Fresh Again</text>
  
  <text x="650" y="450" font-size="10" fill="#475569">→ Cycle repeats</text>
  
</svg>
