<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Consul Service Registration Flow</text>
  <text x="450" y="58" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Service Instance → Register with Consul Agent → Consul Server Catalog → DNS/API Queries</text>

  <!-- SERVICE INSTANCE -->
  <rect x="20" y="85" width="240" height="180" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="110" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Service Instance</text>

  <rect x="40" y="125" width="200" height="45" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="144" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">web-api : 10.0.1.15</text>
  <text x="140" y="161" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Port: 8080 | Tags: v2, primary</text>

  <rect x="40" y="180" width="200" height="35" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="198" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">Health Check: HTTP /health</text>
  <text x="140" y="215" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Interval: 10s | Timeout: 5s</text>

  <rect x="40" y="225" width="200" height="30" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="244" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Meta: env=production</text>

  <!-- CONSUL AGENT (Local) -->
  <rect x="330" y="85" width="240" height="200" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="110" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Consul Agent (Local)</text>

  <rect x="350" y="125" width="200" height="45" rx="6" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="144" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Agent Process</text>
  <text x="450" y="161" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Runs on every node in the cluster</text>

  <rect x="350" y="180" width="200" height="45" rx="6" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="198" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Registration Handler</text>
  <text x="450" y="215" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Validates + forwards to server</text>

  <rect x="350" y="235" width="200" height="40" rx="6" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="255" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Health Check Monitor</text>
  <text x="450" y="272" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Local check execution</text>

  <!-- CONSUL SERVER CLUSTER -->
  <rect x="640" y="85" width="240" height="250" rx="10" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="760" y="110" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Consul Server Cluster</text>

  <!-- Server nodes -->
  <rect x="660" y="125" width="200" height="45" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="760" y="144" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Consul Server 1 (Leader)</text>
  <text x="760" y="161" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Raft leader — writes catalog</text>

  <rect x="660" y="180" width="200" height="45" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="760" y="198" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Consul Server 2 (Follower)</text>
  <text x="760" y="215" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Raft follower — replicates state</text>

  <rect x="660" y="235" width="200" height="45" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="760" y="255" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Consul Server 3 (Follower)</text>
  <text x="760" y="272" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Raft follower — replicates state</text>

  <!-- Raft consensus annotation -->
  <rect x="660" y="290" width="200" height="35" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="760" y="308" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Raft Consensus (3/5 node quorum)</text>

  <!-- SERVICE CATALOG -->
  <rect x="20" y="300" width="860" height="120" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="325" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Service Catalog (Consul KV Store)</text>

  <!-- Catalog entries -->
  <rect x="40" y="340" width="260" height="65" rx="6" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="170" y="358" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Service: web-api</text>
  <text x="170" y="375" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Instances: 3 | Tags: v2, primary</text>
  <text x="170" y="392" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Health: 2 passing, 1 warning</text>

  <rect x="320" y="340" width="260" height="65" rx="6" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="358" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Service: payment-svc</text>
  <text x="450" y="375" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Instances: 2 | Tags: v1, stable</text>
  <text x="450" y="392" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Health: 2 passing</text>

  <rect x="600" y="340" width="260" height="65" rx="6" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="730" y="358" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Service: user-svc</text>
  <text x="730" y="375" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Instances: 4 | Tags: v3, canary</text>
  <text x="730" y="392" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Health: 4 passing</text>

  <!-- DNS and API Query interfaces -->
  <rect x="20" y="450" width="420" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="475" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Discovery Interfaces</text>

  <rect x="40" y="490" width="380" height="35" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="508" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">DNS Interface: web-api.service.consul</text>
  <text x="230" y="525" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Returns A records for healthy service instances</text>

  <rect x="40" y="535" width="380" height="35" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="553" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">HTTP API: GET /v1/catalog/service/web-api</text>
  <text x="230" y="570" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Returns full service definition with addresses and health</text>

  <!-- Registration flow arrows -->
  <!-- Service Instance → Consul Agent -->
  <line x1="260" y1="175" x2="330" y2="175" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="295" y="165" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563eb" text-anchor="middle">Register</text>

  <!-- Consul Agent → Consul Server -->
  <line x1="570" y1="185" x2="640" y2="185" stroke="#ca8a04" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="605" y="175" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ca8a04" text-anchor="middle">Sync</text>

  <!-- Consul Server → Catalog -->
  <path d="M 760 335 Q 760 360, 760 420 Q 760 420, 450 420" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Footer -->
  <rect x="20" y="590" width="860" height="0" rx="6" fill="none" stroke="none"/>
  <text x="450" y="595" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Registration is idempotent — services re-register on restart. Health checks determine service availability in the catalog.</text>
</svg>