<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">API Gateway Architecture</title>
  <desc id="desc">API Gateway showing single entry point, routing, authentication, rate limiting, and response aggregation</desc>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">API Gateway Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Single Entry Point with Cross-Cutting Concerns</text>

  <!-- Clients (Top) -->
  <rect x="50" y="85" width="800" height="80" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Clients</text>
  <rect x="100" y="120" width="150" height="35" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="175" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Web App</text>
  <rect x="275" y="120" width="150" height="35" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="350" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Mobile App</text>
  <rect x="450" y="120" width="150" height="35" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="525" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Third-Party API</text>
  <rect x="625" y="120" width="150" height="35" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="700" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Internal Services</text>

  <!-- Arrow to Gateway -->
  <line x1="450" y1="170" x2="450" y2="195" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="188" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">All requests</text>

  <!-- API Gateway (Middle) -->
  <rect x="100" y="200" width="700" height="160" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="225" text-anchor="middle" font-size="16" font-weight="700" fill="#92400e">API Gateway</text>

  <rect x="120" y="240" width="150" height="100" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="195" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Authentication</text>
  <text x="195" y="278" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">JWT validation</text>
  <text x="195" y="293" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">API key check</text>
  <text x="195" y="308" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">OAuth token verify</text>
  <text x="195" y="323" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">mTLS termination</text>

  <rect x="290" y="240" width="150" height="100" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="365" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Rate Limiting</text>
  <text x="365" y="278" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Token bucket</text>
  <text x="365" y="293" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Per-client limits</text>
  <text x="365" y="308" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Per-endpoint limits</text>
  <text x="365" y="323" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">429 responses</text>

  <rect x="460" y="240" width="150" height="100" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="535" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Routing</text>
  <text x="535" y="278" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Path-based rules</text>
  <text x="535" y="293" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Header routing</text>
  <text x="535" y="308" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Version routing</text>
  <text x="535" y="323" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Load balancing</text>

  <rect x="630" y="240" width="150" height="100" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="705" y="260" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Transformation</text>
  <text x="705" y="278" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Request transform</text>
  <text x="705" y="293" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Response aggregat.</text>
  <text x="705" y="308" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Protocol translation</text>
  <text x="705" y="323" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Field filtering</text>

  <!-- Arrows to Services -->
  <line x1="200" y1="365" x2="200" y2="390" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="365" y1="365" x2="365" y2="390" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="535" y1="365" x2="535" y2="390" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="365" x2="700" y2="390" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Microservices (Bottom) -->
  <rect x="50" y="400" width="800" height="120" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="425" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Downstream Microservices</text>
  <rect x="80" y="440" width="150" height="60" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="155" y="465" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">User Service</text>
  <text x="155" y="483" text-anchor="middle" font-size="8" font-weight="600" fill="#6ee7b7">port 8001</text>
  <rect x="250" y="440" width="150" height="60" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="325" y="465" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Order Service</text>
  <text x="325" y="483" text-anchor="middle" font-size="8" font-weight="600" fill="#6ee7b7">port 8002</text>
  <rect x="420" y="440" width="150" height="60" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="495" y="465" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Product Service</text>
  <text x="495" y="483" text-anchor="middle" font-size="8" font-weight="600" fill="#6ee7b7">port 8003</text>
  <rect x="590" y="440" width="150" height="60" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="665" y="465" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Payment Service</text>
  <text x="665" y="483" text-anchor="middle" font-size="8" font-weight="600" fill="#6ee7b7">port 8004</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>