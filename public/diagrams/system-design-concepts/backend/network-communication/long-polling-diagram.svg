<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Long Polling Lifecycle</text>
  <text x="450" y="58" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Client Request → Server Holds Connection → Data Available → Response → Immediate Re-request</text>

  <!-- Client and Server columns -->
  <rect x="60" y="90" width="180" height="480" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="115" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Client</text>

  <rect x="660" y="90" width="180" height="480" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="750" y="115" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Server</text>

  <!-- Server processing center -->
  <rect x="300" y="140" width="300" height="100" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="165" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Connection Hold Period</text>
  <text x="450" y="185" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Server keeps HTTP connection open</text>
  <text x="450" y="202" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">waits for data or timeout (typically 30-60s)</text>
  <text x="450" y="219" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">No response sent until event or timeout</text>
  <text x="450" y="236" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Reduced network chatter vs short polling</text>

  <!-- STEP 1: Client sends request -->
  <rect x="80" y="160" width="140" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Step 1: Request</text>
  <text x="150" y="198" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">GET /updates</text>

  <line x1="220" y1="185" x2="300" y2="185" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- STEP 2: Server holds -->
  <rect x="680" y="160" width="140" height="50" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="750" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Step 2: Hold</text>
  <text x="750" y="198" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Wait for data...</text>

  <line x1="600" y1="185" x2="680" y2="185" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- STEP 3: Data becomes available -->
  <rect x="80" y="270" width="140" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="290" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Step 3: Data Ready</text>
  <text x="150" y="308" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Event triggers</text>

  <!-- STEP 4: Server responds -->
  <rect x="680" y="270" width="140" height="50" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="750" y="290" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Step 4: Response</text>
  <text x="750" y="308" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">HTTP 200 + data</text>

  <!-- STEP 5: Client processes -->
  <rect x="80" y="360" width="140" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="380" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Step 5: Process</text>
  <text x="150" y="398" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Handle payload</text>

  <!-- STEP 6: Immediate re-request -->
  <rect x="680" y="360" width="140" height="50" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="750" y="380" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Step 6: Re-request</text>
  <text x="750" y="398" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">New long poll</text>

  <!-- STEP 7: Cycle repeats -->
  <rect x="80" y="450" width="140" height="50" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="470" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Step 7: Hold Again</text>
  <text x="150" y="488" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Waiting for next...</text>

  <!-- Arrows connecting steps vertically -->
  <path d="M 150 210 Q 150 240, 150 270" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 750 210 Q 750 240, 750 270" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 150 320 Q 150 340, 150 360" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 750 320 Q 750 340, 750 360" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 150 410 Q 150 430, 150 450" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Timeout scenario box -->
  <rect x="300" y="290" width="300" height="90" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="450" y="315" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Timeout Scenario</text>
  <text x="450" y="335" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">If no data arrives within timeout period (e.g., 30s),</text>
  <text x="450" y="352" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">server returns empty response (HTTP 200 or 204),</text>
  <text x="450" y="369" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">client immediately re-requests (Step 6).</text>

  <!-- Comparison annotation -->
  <rect x="300" y="410" width="300" height="120" rx="10" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="435" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">vs Short Polling</text>
  <text x="450" y="458" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Short polling: Fixed interval requests</text>
  <text x="450" y="478" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Long polling: One request waits for response</text>
  <text x="450" y="498" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Result: Lower latency, fewer empty responses</text>
  <text x="450" y="518" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Trade-off: Server holds more open connections</text>

  <!-- Loop arrow at bottom -->
  <path d="M 220 475 Q 450 560, 680 475" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <text x="450" y="575" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#d97706" text-anchor="middle">Cycle repeats indefinitely — continuous update stream</text>

  <!-- Footer -->
  <text x="450" y="605" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Long polling simulates server-push over HTTP without WebSocket support. Used by Comet, Bayeux protocol, and legacy real-time systems.</text>
  <text x="450" y="625" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Advantages: Works through proxies/firewalls, simpler than WebSocket, reduces empty responses. Trade-offs: Server holds many connections, timeout tuning required.</text>
  <text x="450" y="645" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Server scaling: Use async I/O (Node.js, Netty) or event loops to handle thousands of held connections without thread-per-request overhead.</text>
  <text x="450" y="665" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Timeout tuning: Typical hold time is 30-60s. Too short wastes connections; too long ties up resources and delays failure detection.</text>
  <text x="450" y="685" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Browser limits: Most browsers limit 6 concurrent HTTP/1.1 connections per domain, so long polling may require connection multiplexing or domain sharding.</text>
</svg>