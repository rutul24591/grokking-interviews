<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Pub-Sub Fan-Out Delivery Pattern</title>
  <desc id="desc">Pub-sub fan-out vs message queue competitive consumers comparison</desc>

  <rect width="900" height="600" fill="#ffffff"/>

  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Pub-Sub Fan-Out Delivery</text>
  <text x="450" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">Every subscriber group receives all messages independently</text>

  <!-- Publisher -->
  <rect x="330" y="70" width="240" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Publisher</text>
  <text x="450" y="108" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Order Service</text>

  <!-- Arrow to topic -->
  <line x1="450" y1="125" x2="450" y2="145" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Topic -->
  <rect x="330" y="150" width="240" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Topic: orders.created</text>
  <text x="450" y="188" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Message: Order #123 Created</text>

  <!-- Fan-out arrows -->
  <line x1="390" y1="205" x2="150" y2="260" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="205" x2="450" y2="260" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="510" y1="205" x2="750" y2="260" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Subscriber Group 1 -->
  <rect x="30" y="260" width="240" height="90" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="150" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Subscriber Group 1: Email</text>
  <text x="150" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Sends order confirmation</text>
  <text x="150" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Receives ALL messages</text>
  <text x="150" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">Processes: Order #123</text>

  <!-- Subscriber Group 2 -->
  <rect x="330" y="260" width="240" height="90" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Subscriber Group 2: Analytics</text>
  <text x="450" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Updates order metrics dashboard</text>
  <text x="450" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Receives ALL messages</text>
  <text x="450" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">Processes: Order #123</text>

  <!-- Subscriber Group 3 -->
  <rect x="630" y="260" width="240" height="90" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="750" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Subscriber Group 3: Inventory</text>
  <text x="750" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Reserves stock for order</text>
  <text x="750" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Receives ALL messages</text>
  <text x="750" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">Processes: Order #123</text>

  <!-- Key characteristics -->
  <rect x="30" y="370" width="840" height="80" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Key Characteristics of Pub-Sub Fan-Out</text>
  <text x="150" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">One message delivered to ALL subscribers</text>
  <text x="450" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Each subscriber group processes independently</text>
  <text x="750" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Decoupled: publisher unaware of subscribers</text>
  <text x="150" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Durable subscriptions retain messages</text>
  <text x="450" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Event-driven: reactive processing</text>
  <text x="750" y="438" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2937">Best for: broadcasting events</text>

  <!-- Message flow example -->
  <rect x="30" y="470" width="840" height="120" rx="6" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Message Flow Example</text>

  <!-- Order message -->
  <rect x="60" y="505" width="140" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="130" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#1f2937">Order #123</text>

  <!-- Arrows to 3 destinations -->
  <line x1="200" y1="520" x2="310" y2="520" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="520" x2="310" y2="555" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="200" y1="520" x2="310" y2="575" stroke="#374151" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Three copies -->
  <rect x="320" y="505" width="140" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="390" y="525" text-anchor="middle" font-size="10" font-weight="700" fill="#111827">To Email Service</text>

  <rect x="320" y="540" width="140" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="390" y="560" text-anchor="middle" font-size="10" font-weight="700" fill="#111827">To Analytics Service</text>

  <rect x="320" y="575" width="140" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="390" y="595" text-anchor="middle" font-size="10" font-weight="700" fill="#111827">To Inventory Service</text>

  <text x="520" y="520" text-anchor="start" font-size="11" font-weight="600" fill="#1f2937">Same message duplicated 3 times —</text>
  <text x="520" y="538" text-anchor="start" font-size="11" font-weight="600" fill="#1f2937">each subscriber processes it</text>
  <text x="520" y="556" text-anchor="start" font-size="11" font-weight="600" fill="#1f2937">independently and at its own pace.</text>
  <text x="520" y="580" text-anchor="start" font-size="11" font-weight="600" fill="#1f2937">No message is lost to any subscriber.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>