<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ca8a04"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Heap-Based Priority Message Queue</text>
  <text x="450" y="58" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Messages dequeued by priority: High → Medium → Low using min-heap/max-heap structure</text>

  <!-- Priority Level Legend -->
  <rect x="20" y="80" width="200" height="90" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="120" y="105" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Priority Levels</text>
  <circle cx="50" cy="125" r="8" fill="#dc2626"/>
  <text x="130" y="130" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#1f2937">HIGH (P=1) — Critical alerts</text>
  <circle cx="50" cy="148" r="8" fill="#ca8a04"/>
  <text x="130" y="153" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#1f2937">MEDIUM (P=5) — Orders</text>

  <!-- HEAP STRUCTURE -->
  <text x="450" y="110" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Max-Heap Priority Queue Structure</text>

  <!-- Heap Root - Highest Priority -->
  <circle cx="450" cy="170" r="35" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
  <text x="450" y="165" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">P:1</text>
  <text x="450" y="182" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#fde2e2" text-anchor="middle">CRITICAL</text>

  <!-- Level 2 -->
  <circle cx="330" cy="250" r="35" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
  <text x="330" y="245" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">P:2</text>
  <text x="330" y="262" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#fde2e2" text-anchor="middle">HIGH</text>

  <circle cx="570" cy="250" r="35" fill="#ca8a04" stroke="#854d0e" stroke-width="2"/>
  <text x="570" y="245" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">P:3</text>
  <text x="570" y="262" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#fef9c3" text-anchor="middle">HIGH</text>

  <!-- Level 3 -->
  <circle cx="270" cy="330" r="35" fill="#ca8a04" stroke="#854d0e" stroke-width="2"/>
  <text x="270" y="325" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">P:4</text>
  <text x="270" y="342" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#fef9c3" text-anchor="middle">MED</text>

  <circle cx="390" cy="330" r="35" fill="#ca8a04" stroke="#854d0e" stroke-width="2"/>
  <text x="390" y="325" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">P:5</text>
  <text x="390" y="342" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#fef9c3" text-anchor="middle">MED</text>

  <circle cx="510" cy="330" r="35" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="510" y="325" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">P:7</text>
  <text x="510" y="342" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5" text-anchor="middle">LOW</text>

  <circle cx="630" cy="330" r="35" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="630" y="325" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">P:8</text>
  <text x="630" y="342" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5" text-anchor="middle">LOW</text>

  <!-- Heap edges -->
  <line x1="430" y1="200" x2="350" y2="220" stroke="#374151" stroke-width="2"/>
  <line x1="470" y1="200" x2="550" y2="220" stroke="#374151" stroke-width="2"/>
  <line x1="310" y1="280" x2="285" y2="300" stroke="#374151" stroke-width="2"/>
  <line x1="350" y1="280" x2="375" y2="300" stroke="#374151" stroke-width="2"/>
  <line x1="550" y1="280" x2="525" y2="300" stroke="#374151" stroke-width="2"/>
  <line x1="590" y1="280" x2="615" y2="300" stroke="#374151" stroke-width="2"/>

  <!-- Dequeue Process Section -->
  <rect x="20" y="400" width="860" height="200" rx="10" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="425" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Dequeue Order — O(log n) Extraction by Priority</text>

  <!-- Step 1 -->
  <rect x="40" y="445" width="180" height="130" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="130" y="465" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Step 1: DEQUEUE</text>
  <text x="130" y="485" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Extract root (P:1)</text>
  <text x="130" y="502" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">— Critical alert msg</text>
  <circle cx="130" cy="535" r="18" fill="#dc2626"/>
  <text x="130" y="540" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">P:1</text>
  <text x="130" y="568" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">PROCESSED</text>

  <!-- Arrow 1-2 -->
  <line x1="225" y1="510" x2="255" y2="510" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="260" y="445" width="180" height="130" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="350" y="465" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Step 2: DEQUEUE</text>
  <text x="350" y="485" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Extract root (P:2)</text>
  <text x="350" y="502" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">— High priority msg</text>
  <circle cx="350" cy="535" r="18" fill="#dc2626"/>
  <text x="350" y="540" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">P:2</text>
  <text x="350" y="568" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">PROCESSED</text>

  <!-- Arrow 2-3 -->
  <line x1="445" y1="510" x2="475" y2="510" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="480" y="445" width="180" height="130" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="570" y="465" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Step 3: DEQUEUE</text>
  <text x="570" y="485" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Extract root (P:3)</text>
  <text x="570" y="502" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">— High priority msg</text>
  <circle cx="570" cy="535" r="18" fill="#ca8a04"/>
  <text x="570" y="540" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">P:3</text>
  <text x="570" y="568" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ca8a04" text-anchor="middle">PROCESSED</text>

  <!-- Arrow 3-4 -->
  <line x1="665" y1="510" x2="695" y2="510" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="700" y="445" width="160" height="130" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="780" y="465" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Step 4: ENQUEUE</text>
  <text x="780" y="485" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">New message P:6</text>
  <text x="780" y="502" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">— Heapify-up O(log n)</text>
  <circle cx="780" cy="535" r="18" fill="#059669"/>
  <text x="780" y="540" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">P:6</text>
  <text x="780" y="568" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#059669" text-anchor="middle">INSERTED</text>

  <!-- Complexity annotation -->
  <rect x="20" y="50" width="200" height="0" rx="8" fill="none" stroke="none"/>

  <!-- Footer annotations -->
  <text x="450" y="595" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Complexity Analysis</text>
  <text x="450" y="615" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Enqueue: O(log n) — heapify-up operation | Dequeue: O(log n) — extract root + heapify-down</text>
  <text x="450" y="635" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Peek (highest priority): O(1) — read root only | Space: O(n) — array-based heap storage</text>
</svg>