<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" width="900" height="820">
  <!-- Background -->
  <rect width="900" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">GraphQL Query Execution</text>
  <text x="450" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151">Single query parsed, resolved across multiple services, returned as one response</text>

  <!-- Comparison Header -->
  <text x="225" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#111827">REST Approach</text>
  <text x="675" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#111827">GraphQL Approach</text>
  <line x1="450" y1="90" x2="450" y2="120" stroke="#e5e7eb" stroke-width="2"/>

  <!-- REST Side: Multiple calls -->
  <rect x="40" y="130" width="140" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="110" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">GET /users/1</text>

  <rect x="40" y="200" width="140" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="110" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">GET /users/1/posts</text>

  <rect x="40" y="270" width="140" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="110" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">GET /posts/1/comments</text>

  <rect x="40" y="340" width="140" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="110" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">GET /users/1/profile</text>

  <!-- REST arrows between calls -->
  <line x1="110" y1="180" x2="110" y2="200" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="110" y1="250" x2="110" y2="270" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="110" y1="320" x2="110" y2="340" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- REST response boxes -->
  <rect x="210" y="140" width="180" height="30" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="300" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Response 1: User data</text>

  <rect x="210" y="210" width="180" height="30" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="300" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Response 2: Posts list</text>

  <rect x="210" y="280" width="180" height="30" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="300" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Response 3: Comments</text>

  <rect x="210" y="350" width="180" height="30" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="300" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Response 4: Profile</text>

  <!-- REST timing note -->
  <rect x="40" y="410" width="350" height="50" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="215" y="432" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#991b1b">4 HTTP round-trips, over-fetching,</text>
  <text x="215" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#991b1b">partial responses accumulated</text>

  <!-- GraphQL Side: Single query -->
  <rect x="480" y="130" width="380" height="100" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="670" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">Single GraphQL Query</text>
  <text x="495" y="178" font-family="monospace" font-size="11" font-weight="400" fill="#374151">query { user(id: 1) {</text>
  <text x="510" y="196" font-family="monospace" font-size="11" font-weight="400" fill="#374151">name, posts { title, comments { text } }</text>
  <text x="510" y="214" font-family="monospace" font-size="11" font-weight="400" fill="#374151">profile { avatar, bio }</text>
  <text x="495" y="232" font-family="monospace" font-size="11" font-weight="400" fill="#374151">} }</text>

  <!-- Arrow to Gateway -->
  <line x1="670" y1="230" x2="670" y2="280" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)"/>

  <!-- Gateway -->
  <rect x="520" y="280" width="300" height="90" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <rect x="520" y="280" width="300" height="30" rx="10" fill="#1f2937"/>
  <rect x="520" y="300" width="300" height="10" fill="#1f2937"/>
  <text x="670" y="301" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">GraphQL Gateway / Server</text>
  <text x="670" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Parses query AST, builds resolver chain,</text>
  <text x="670" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">executes in optimal order, assembles response</text>

  <!-- Resolver Chain -->
  <line x1="670" y1="370" x2="670" y2="420" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)"/>
  <text x="685" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Resolver Chain</text>

  <!-- Resolver boxes -->
  <rect x="480" y="430" width="120" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="540" y="452" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">User Resolver</text>
  <text x="540" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Fetches user by ID</text>

  <rect x="610" y="430" width="120" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="670" y="452" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Posts Resolver</text>
  <text x="670" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Fetches user posts</text>

  <rect x="740" y="430" width="120" height="50" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="800" y="452" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Comments Resolver</text>
  <text x="800" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Fetches per-post</text>

  <!-- Data sources -->
  <line x1="540" y1="480" x2="540" y2="530" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)"/>
  <line x1="670" y1="480" x2="670" y2="530" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)"/>
  <line x1="800" y1="480" x2="800" y2="530" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)"/>

  <!-- Data source boxes -->
  <rect x="480" y="530" width="120" height="45" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="540" y="550" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1f2937">User Service</text>
  <text x="540" y="566" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">(REST / gRPC / DB)</text>

  <rect x="610" y="530" width="120" height="45" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="670" y="550" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1f2937">Post Service</text>
  <text x="670" y="566" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">(REST / gRPC / DB)</text>

  <rect x="740" y="530" width="120" height="45" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="800" y="550" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1f2937">Comment Svc</text>
  <text x="800" y="566" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">(REST / gRPC / DB)</text>

  <!-- Response assembly -->
  <line x1="670" y1="575" x2="670" y2="620" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)"/>

  <rect x="520" y="620" width="300" height="70" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="670" y="648" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">Assembled JSON Response</text>
  <text x="670" y="668" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Single response with exactly requested fields,</text>
  <text x="670" y="684" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">no over-fetching, no under-fetching</text>

  <!-- Response to client -->
  <line x1="670" y1="690" x2="670" y2="740" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)"/>
  <rect x="685" y="700" width="80" height="22" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="725" y="716" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#065f46">1 Response</text>

  <!-- Client receives -->
  <rect x="520" y="740" width="300" height="60" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="670" y="768" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Client receives complete response</text>
  <text x="670" y="788" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">1 HTTP call instead of 4, exact data shape</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead-down" viewBox="0 0 10 7" refX="5" refY="6" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#1f2937"/>
    </marker>
  </defs>
</svg>
