<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <style>
      .bg-light { fill: #ffffff; }
      .box-primary { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
      .box-warn { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; }
      .box-success { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }
      .box-info { fill: #e0f2fe; stroke: #0ea5e9; stroke-width: 2; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-retry { stroke: #f59e0b; stroke-width: 2.5; stroke-dasharray: 6 4; fill: none; marker-end: url(#arrowhead-retry); }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; fill: #0f172a; }
      .label-small { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #475569; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-retry" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>

  <rect class="bg-light" width="960" height="420" />

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" class="title">Retry Flow: Transient Failure Recovery</text>

  <!-- Client -->
  <rect x="40" y="160" width="150" height="100" rx="10" class="box-primary" />
  <text x="115" y="195" text-anchor="middle" class="label" font-weight="700">Client</text>
  <text x="115" y="215" text-anchor="middle" class="label-small">Initiates request</text>
  <text x="115" y="232" text-anchor="middle" class="label-small">with idempotency key</text>

  <!-- Attempt 1 arrow -->
  <line x1="190" y1="195" x2="320" y2="195" class="arrow" />
  <text x="255" y="185" text-anchor="middle" class="label-small" font-weight="700">Attempt 1</text>
  <text x="255" y="200" text-anchor="middle" class="label-small">t = 0ms</text>

  <!-- Transient Failure -->
  <rect x="330" y="145" width="160" height="100" rx="10" class="box-warn" />
  <text x="410" y="180" text-anchor="middle" class="label" font-weight="700">Transient</text>
  <text x="410" y="200" text-anchor="middle" class="label" font-weight="700">Failure</text>
  <text x="410" y="222" text-anchor="middle" class="label-small">e.g., 503, timeout</text>

  <!-- Backoff arrow (curved) -->
  <path d="M 410 250 Q 410 320 340 350" stroke="#f59e0b" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-retry)" />
  <rect x="370" y="285" width="110" height="36" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
  <text x="425" y="300" text-anchor="middle" class="label-small" font-weight="700" fill="#92400e">Exponential</text>
  <text x="425" y="315" text-anchor="middle" class="label-small" fill="#92400e">Backoff + Jitter</text>

  <!-- Delay boxes -->
  <rect x="190" y="330" width="80" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" />
  <text x="230" y="350" text-anchor="middle" class="label-small" font-weight="700" fill="#92400e">~100ms</text>
  <text x="230" y="365" text-anchor="middle" class="label-small" fill="#92400e">+ jitter</text>

  <rect x="300" y="330" width="80" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" />
  <text x="340" y="350" text-anchor="middle" class="label-small" font-weight="700" fill="#92400e">~200ms</text>
  <text x="340" y="365" text-anchor="middle" class="label-small" fill="#92400e">+ jitter</text>

  <rect x="410" y="330" width="80" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" />
  <text x="450" y="350" text-anchor="middle" class="label-small" font-weight="700" fill="#92400e">~400ms</text>
  <text x="450" y="365" text-anchor="middle" class="label-small" fill="#92400e">+ jitter</text>

  <!-- Retry path arrows -->
  <path d="M 270 355 Q 200 370 190 250" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3" fill="none" />
  <text x="175" y="310" text-anchor="middle" class="label-small" fill="#d97706" transform="rotate(-15 175 310)">Retry loop</text>

  <!-- Success arrow -->
  <line x1="490" y1="210" x2="640" y2="210" class="arrow" stroke="#22c55e" stroke-width="2.5" />
  <text x="565" y="200" text-anchor="middle" class="label-small" font-weight="700" fill="#16a34a">Attempt N (success)</text>
  <text x="565" y="215" text-anchor="middle" class="label-small" fill="#16a34a">t = ~700ms</text>

  <!-- Backend recovers -->
  <rect x="650" y="160" width="170" height="100" rx="10" class="box-success" />
  <text x="735" y="195" text-anchor="middle" class="label" font-weight="700">Backend</text>
  <text x="735" y="215" text-anchor="middle" class="label-small">Recovered from</text>
  <text x="735" y="232" text-anchor="middle" class="label-small">transient state</text>

  <!-- Response arrow -->
  <path d="M 735 260 Q 735 310 400 310 Q 115 310 115 260" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead-success)" />
  <text x="420" y="300" text-anchor="middle" class="label-small" font-weight="700" fill="#16a34a">Response returned to client</text>

  <!-- Success result -->
  <rect x="40" y="300" width="150" height="70" rx="10" class="box-info" />
  <text x="115" y="325" text-anchor="middle" class="label" font-weight="700">Success!</text>
  <text x="115" y="345" text-anchor="middle" class="label-small">Transparent to user</text>

  <defs>
    <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" />
    </marker>
  </defs>
</svg>
