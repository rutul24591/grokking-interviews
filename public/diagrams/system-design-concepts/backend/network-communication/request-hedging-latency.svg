<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" width="900" height="680">
  <!-- White background -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">Request Hedging: Latency Distribution Analysis</text>
  <text x="450" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#374151">How hedging reduces tail latency with cost-benefit analysis</text>
  
  <!-- Latency Distribution Chart -->
  <rect x="40" y="80" width="500" height="35" rx="5" fill="#111827"/>
  <text x="290" y="103" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Latency Percentile Distribution</text>
  
  <!-- Chart axes -->
  <line x1="80" y1="150" x2="80" y2="450" stroke="#374151" stroke-width="2"/>
  <line x1="80" y1="450" x2="500" y2="450" stroke="#374151" stroke-width="2"/>
  
  <!-- Y-axis label -->
  <text x="35" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Latency (ms)</text>
  <text x="65" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">500</text>
  <text x="65" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">400</text>
  <text x="65" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">300</text>
  <text x="65" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">200</text>
  <text x="65" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">100</text>
  <text x="65" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">0</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="380" x2="500" y2="380" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="310" x2="500" y2="310" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="240" x2="500" y2="240" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="170" x2="500" y2="170" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Without hedging curve (red) -->
  <path d="M 100 440 Q 150 435 200 420 Q 250 400 280 380 Q 320 340 350 300 Q 380 260 400 220 Q 420 180 440 150 Q 460 130 480 120" fill="none" stroke="#dc2626" stroke-width="3"/>
  <text x="485" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#dc2626">Without</text>
  <text x="485" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Hedging</text>
  
  <!-- With hedging curve (green) -->
  <path d="M 100 440 Q 150 435 200 420 Q 250 400 280 380 Q 320 350 350 320 Q 380 295 400 275 Q 420 260 440 248 Q 460 240 480 235" fill="none" stroke="#059669" stroke-width="3"/>
  <text x="485" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#059669">With</text>
  <text x="485" y="253" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Hedging</text>
  
  <!-- X-axis labels -->
  <text x="100" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">p50</text>
  <text x="200" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">p75</text>
  <text x="280" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">p90</text>
  <text x="350" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">p95</text>
  <text x="400" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">p99</text>
  <text x="480" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">p99.9</text>
  
  <!-- Hedge trigger zone -->
  <rect x="330" y="145" width="40" height="305" rx="4" fill="#fef3c7" opacity="0.5"/>
  <text x="350" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#d97706">Hedge Zone</text>
  <text x="350" y="485" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Hedge kicks in</text>
  <text x="350" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">at p95</text>
  
  <!-- p99 improvement annotation -->
  <rect x="560" y="80" width="300" height="120" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="570" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">p99 Latency Improvement</text>
  <text x="570" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Without hedging: ~220ms</text>
  <text x="570" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">With hedging: ~120ms</text>
  <line x1="570" y1="155" x2="850" y2="155" stroke="#2563eb" stroke-width="1"/>
  <text x="570" y="173" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2563eb">Improvement: 45% reduction</text>
  <text x="570" y="191" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">at p99 percentile</text>
  
  <!-- p99.9 improvement -->
  <text x="570" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">p99.9: 150ms to ~90ms</text>
  <text x="570" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2563eb">Improvement: 40% reduction</text>
  
  <!-- Cost Analysis -->
  <rect x="40" y="520" width="400" height="140" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="50" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Cost Analysis</text>
  <text x="50" y="568" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Extra requests sent: ~5-10% of total</text>
  <text x="50" y="586" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">(only when primary exceeds hedge delay)</text>
  <line x1="50" y1="595" x2="430" y2="595" stroke="#e5e7eb" stroke-width="1"/>
  <text x="50" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Cost-Benefit:</text>
  <text x="50" y="635" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">+ 5% compute cost</text>
  <text x="50" y="653" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- 45% p99 latency reduction</text>
  
  <!-- When to use -->
  <rect x="460" y="520" width="400" height="140" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="470" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">When to Use Hedging</text>
  <text x="470" y="568" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- Strict latency SLAs (p99 targets)</text>
  <text x="470" y="586" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- Highly variable backend latency</text>
  <text x="470" y="604" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- Idempotent requests (safe to retry)</text>
  <text x="470" y="622" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- Low QPS (avoid overwhelming backends)</text>
  <text x="470" y="640" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- Hedge delay tuned to p95 of latency</text>
</svg>
