<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" role="img" aria-labelledby="title desc" width="1200" height="950">
  <title id="title">Proxy Website Filtering Architecture</title>
  <desc id="desc">Forward proxy architecture showing content filtering with category-based allow/block rules for websites</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#374151"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="allowedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="blockedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1200" height="950" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Proxy Website Filtering Architecture</text>
  <text x="600" y="58" text-anchor="middle" font-size="14" font-weight="400" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Forward proxy with category-based content filtering: allow and block rules for website access</text>

  <!-- ==================== REQUEST FLOW ==================== -->
  <!-- User -->
  <rect x="60" y="120" width="180" height="80" rx="12" fill="#111827" filter="url(#shadow)"/>
  <text x="150" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">User / Client</text>
  <text x="150" y="170" text-anchor="middle" font-size="11" fill="#d1d5db" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Browser requests</text>
  <text x="150" y="186" text-anchor="middle" font-size="11" fill="#d1d5db" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">configured to use proxy</text>

  <!-- Arrow to Proxy -->
  <line x1="240" y1="160" x2="340" y2="160" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="290" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">HTTP/HTTPS</text>
  <text x="290" y="165" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">requests</text>

  <!-- Forward Proxy Server -->
  <rect x="340" y="100" width="280" height="120" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Forward Proxy Server</text>
  <text x="480" y="150" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Intercepts all outbound requests</text>
  <text x="480" y="168" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Squid / Nginx / Custom proxy</text>
  <text x="480" y="186" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">TLS inspection (for HTTPS)</text>
  <text x="480" y="204" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">URL/domain extraction + categorization</text>

  <!-- Arrow to Content Filter -->
  <line x1="480" y1="220" x2="480" y2="270" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Content Filtering Engine -->
  <rect x="320" y="270" width="320" height="100" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#6b21a8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Content Filtering Engine</text>
  <text x="480" y="322" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">1. Extract domain/URL from request</text>
  <text x="480" y="342" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">2. Match against category database</text>
  <text x="480" y="362" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">3. Apply allow/block policy rules</text>

  <!-- Arrow from filter to decision -->
  <line x1="480" y1="370" x2="480" y2="410" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision Diamond -->
  <polygon points="480,410 620,460 480,510 340,460" fill="#ffffff" stroke="#374151" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="455" text-anchor="middle" font-size="13" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Category</text>
  <text x="480" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Allowed?</text>

  <!-- ALLOWED path (left) -->
  <line x1="340" y1="460" x2="200" y2="460" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="260" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">ALLOWED</text>

  <!-- BLOCKED path (right) -->
  <line x1="620" y1="460" x2="760" y2="460" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="700" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">BLOCKED</text>

  <!-- Allowed path -> Target Website -->
  <rect x="40" y="430" width="220" height="80" rx="10" fill="url(#allowedGrad)" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="460" text-anchor="middle" font-size="14" font-weight="700" fill="#166534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Target Website</text>
  <text x="150" y="482" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Request forwarded</text>
  <text x="150" y="498" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Response returned to user</text>

  <!-- Arrow from Target back to User -->
  <path d="M 150 430 Q 150 350 150 200" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="130" y="320" font-size="11" font-weight="600" fill="#166534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Response</text>

  <!-- Blocked path -> Block Page -->
  <rect x="760" y="430" width="220" height="80" rx="10" fill="url(#blockedGrad)" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="870" y="460" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Block Page Returned</text>
  <text x="870" y="482" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">HTTP 403 / Custom block page</text>
  <text x="870" y="498" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">"This site is blocked by policy"</text>

  <!-- Arrow from Block Page back to User -->
  <path d="M 870 430 Q 870 350 240 170" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="750" y="320" font-size="11" font-weight="600" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Block Response</text>

  <!-- ==================== CATEGORY TABLE ==================== -->
  <text x="600" y="560" text-anchor="middle" font-size="17" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Website Category Classification &amp; Policy Rules</text>

  <!-- Table header -->
  <rect x="80" y="580" width="1040" height="40" rx="6" fill="#111827"/>
  <text x="150" y="606" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Category</text>
  <text x="350" y="606" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Example Websites</text>
  <text x="600" y="606" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Policy</text>
  <text x="750" y="606" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Rationale</text>
  <text x="950" y="606" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Override Method</text>

  <!-- Row 1: Social Media (Blocked) -->
  <rect x="80" y="625" width="1040" height="65" rx="4" fill="url(#blockedGrad)" stroke="#fca5a5" stroke-width="1"/>
  <text x="150" y="648" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Social Media</text>
  <text x="150" y="666" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">facebook.com, twitter.com, instagram.com</text>
  <rect x="540" y="640" width="120" height="30" rx="15" fill="#dc2626"/>
  <text x="600" y="660" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">BLOCKED</text>
  <text x="750" y="652" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Productivity concern, high</text>
  <text x="750" y="670" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">bandwidth, distraction risk</text>
  <text x="950" y="652" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Manager approval +</text>
  <text x="950" y="670" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">IT whitelist exception</text>

  <!-- Row 2: News (Allowed) -->
  <rect x="80" y="695" width="1040" height="65" rx="4" fill="url(#allowedGrad)" stroke="#86efac" stroke-width="1"/>
  <text x="150" y="718" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">News &amp; Media</text>
  <text x="150" y="736" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">reuters.com, bbc.com, nytimes.com</text>
  <rect x="540" y="710" width="120" height="30" rx="15" fill="#16a34a"/>
  <text x="600" y="730" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">ALLOWED</text>
  <text x="750" y="722" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Professional necessity,</text>
  <text x="750" y="740" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">low bandwidth, trusted sources</text>
  <text x="950" y="722" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">No override needed;</text>
  <text x="950" y="740" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">always accessible</text>

  <!-- Row 3: Work Tools (Allowed) -->
  <rect x="80" y="765" width="1040" height="65" rx="4" fill="url(#allowedGrad)" stroke="#86efac" stroke-width="1"/>
  <text x="150" y="788" text-anchor="middle" font-size="13" font-weight="700" fill="#166534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Work &amp; Productivity</text>
  <text x="150" y="806" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">github.com, jira.atlassian.com, slack.com</text>
  <rect x="540" y="780" width="120" height="30" rx="15" fill="#16a34a"/>
  <text x="600" y="800" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">ALLOWED</text>
  <text x="750" y="792" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Essential for work operations,</text>
  <text x="750" y="810" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">collaboration and development</text>
  <text x="950" y="792" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">No override needed;</text>
  <text x="950" y="810" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">critical infrastructure</text>

  <!-- Row 4: Entertainment (Blocked) -->
  <rect x="80" y="835" width="1040" height="65" rx="4" fill="url(#blockedGrad)" stroke="#fca5a5" stroke-width="1"/>
  <text x="150" y="858" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Entertainment</text>
  <text x="150" y="876" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">youtube.com, netflix.com, twitch.tv</text>
  <rect x="540" y="850" width="120" height="30" rx="15" fill="#dc2626"/>
  <text x="600" y="870" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">BLOCKED</text>
  <text x="750" y="862" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">High bandwidth consumption,</text>
  <text x="750" y="880" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">non-work related content</text>
  <text x="950" y="862" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">HR approval required</text>
  <text x="950" y="880" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">+ bandwidth quota check</text>
</svg>