<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" width="900" height="780">
  <!-- Background -->
  <rect width="900" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">Forward Proxy TLS Inspection</text>
  <text x="450" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151">MITM-style TLS termination, content inspection, and re-encryption at the forward proxy</text>

  <!-- Main Flow: Client -->
  <rect x="40" y="110" width="160" height="90" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="120" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Client</text>
  <text x="120" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Trusted CA cert</text>
  <text x="120" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">installed</text>

  <!-- Arrow 1: Client TLS to Proxy -->
  <line x1="200" y1="155" x2="280" y2="155" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="205" y="132" width="70" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="240" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400e">TLS 1.3</text>

  <!-- Forward Proxy: TLS Termination -->
  <rect x="280" y="100" width="240" height="110" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <rect x="280" y="100" width="240" height="30" rx="10" fill="#1f2937"/>
  <rect x="280" y="120" width="240" height="10" fill="#1f2937"/>
  <text x="400" y="121" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Forward Proxy (TLS Termination)</text>

  <!-- TLS Termination sub-box -->
  <rect x="295" y="140" width="100" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="345" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#92400e">TLS Decrypt</text>
  <text x="345" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#92400e">Terminates</text>
  <text x="345" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#92400e">client TLS</text>

  <!-- Certificate Generation sub-box -->
  <rect x="405" y="140" width="100" height="55" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="455" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1e40af">Cert Gen</text>
  <text x="455" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1e40af">On-the-fly</text>
  <text x="455" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1e40af">certificates</text>

  <!-- Arrow 2: Proxy inspection -->
  <line x1="520" y1="155" x2="600" y2="155" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Content Inspection Box -->
  <rect x="600" y="100" width="260" height="110" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <rect x="600" y="100" width="260" height="30" rx="10" fill="#1f2937"/>
  <rect x="600" y="120" width="260" height="10" fill="#1f2937"/>
  <text x="730" y="121" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Content Inspection Engine</text>

  <!-- Inspection items -->
  <text x="615" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Malware scanning</text>
  <text x="615" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">DLP (Data Loss Prevention)</text>
  <text x="615" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">URL / category filtering</text>

  <!-- Policy enforcement badge -->
  <rect x="745" y="150" width="100" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="795" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#991b1b">Policy</text>
  <text x="795" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#991b1b">Enforcement</text>

  <!-- Arrow 3: Re-encryption -->
  <line x1="730" y1="210" x2="730" y2="280" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)"/>
  <rect x="745" y="230" width="90" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="790" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400e">Re-encrypt</text>

  <!-- Re-encryption Box -->
  <rect x="620" y="280" width="220" height="60" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="730" y="306" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Re-encryption to Target</text>
  <text x="730" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">New TLS session to destination server</text>

  <!-- Arrow 4: To target server -->
  <line x1="730" y1="340" x2="730" y2="400" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)"/>
  <rect x="745" y="355" width="70" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="780" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400e">TLS 1.3</text>

  <!-- Target Server -->
  <rect x="650" y="400" width="160" height="80" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="730" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Target Server</text>
  <text x="730" y="455" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">(Unaware of MITM)</text>
  <text x="730" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Sees proxy as client</text>

  <!-- Security Implications Section -->
  <rect x="40" y="520" width="820" height="2" fill="#e5e7eb"/>
  <text x="40" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Security Implications</text>

  <!-- Implication 1 -->
  <rect x="40" y="575" width="260" height="90" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="55" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Certificate Pinning Breaks</text>
  <text x="55" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Apps using certificate pinning will</text>
  <text x="55" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">detect the proxy&apos;s forged certificate</text>
  <text x="55" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">and refuse connections</text>

  <!-- Implication 2 -->
  <rect x="320" y="575" width="260" height="90" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="335" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">CA Trust Requirement</text>
  <text x="335" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Proxy CA must be installed on all</text>
  <text x="335" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">client devices as trusted root CA</text>
  <text x="335" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Major security responsibility</text>

  <!-- Implication 3 -->
  <rect x="600" y="575" width="260" height="90" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="615" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Privacy &amp; Compliance</text>
  <text x="615" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Decrypting user traffic raises</text>
  <text x="615" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">GDPR, HIPAA compliance concerns</text>
  <text x="615" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Requires explicit user notification</text>

  <!-- Corporate Use Cases Section -->
  <rect x="40" y="690" width="820" height="2" fill="#e5e7eb"/>
  <text x="40" y="720" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Corporate Use Cases</text>

  <rect x="40" y="735" width="400" height="35" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="55" y="757" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Enterprise threat protection (Zscaler, Palo Alto Networks)</text>

  <rect x="460" y="735" width="400" height="35" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="475" y="757" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Regulatory compliance &amp; data exfiltration prevention</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937"/>
    </marker>
    <marker id="arrowhead-down" viewBox="0 0 10 7" refX="5" refY="6" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#1f2937"/>
    </marker>
  </defs>
</svg>
