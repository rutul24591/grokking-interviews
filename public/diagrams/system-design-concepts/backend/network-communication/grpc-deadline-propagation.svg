<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <!-- White background -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">gRPC Deadline Propagation Across Service Chain</text>
  <text x="450" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#374151">How deadlines cascade and diminish through distributed service calls</text>
  
  <!-- Service A -->
  <rect x="40" y="100" width="180" height="100" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Service A</text>
  <text x="130" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Entry point</text>
  <text x="130" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Deadline: 500ms</text>
  <text x="130" y="188" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Client sets initial</text>
  
  <!-- Arrow A to B with deadline -->
  <line x1="220" y1="150" x2="310" y2="150" stroke="#2563eb" stroke-width="2"/>
  <polygon points="310,145 320,150 310,155" fill="#2563eb"/>
  <text x="265" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">500ms</text>
  <text x="265" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">deadline</text>
  
  <!-- Service B -->
  <rect x="320" y="100" width="180" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="410" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Service B</text>
  <text x="410" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Receives 500ms deadline</text>
  <text x="410" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Processes: 100ms</text>
  <text x="410" y="188" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Remaining: 400ms</text>
  
  <!-- Arrow B to C -->
  <line x1="440" y1="200" x2="440" y2="270" stroke="#7c3aed" stroke-width="2"/>
  <polygon points="435,270 440,280 445,270" fill="#7c3aed"/>
  <text x="480" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">400ms</text>
  <text x="480" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">remaining</text>
  
  <!-- Arrow B to D -->
  <line x1="500" y1="150" x2="610" y2="150" stroke="#7c3aed" stroke-width="2"/>
  <polygon points="610,145 620,150 610,155" fill="#7c3aed"/>
  <text x="555" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">300ms</text>
  <text x="555" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">remaining</text>
  
  <!-- Service C -->
  <rect x="350" y="280" width="180" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="440" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Service C</text>
  <text x="440" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Receives 400ms deadline</text>
  <text x="440" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Processes: 150ms</text>
  <text x="440" y="368" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Returns at 250ms</text>
  
  <!-- Service D -->
  <rect x="620" y="100" width="180" height="100" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="710" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Service D</text>
  <text x="710" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Receives 300ms deadline</text>
  <text x="710" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Processes: 200ms</text>
  <text x="710" y="188" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Returns at 100ms</text>
  
  <!-- Timeline showing deadline consumption -->
  <rect x="40" y="410" width="820" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="40" y="410" width="164" height="8" rx="4" fill="#2563eb"/>
  <rect x="204" y="410" width="131" height="8" rx="4" fill="#7c3aed"/>
  <rect x="335" y="410" width="131" height="8" rx="4" fill="#d97706"/>
  <rect x="466" y="410" width="131" height="8" rx="4" fill="#db2777"/>
  <rect x="597" y="410" width="131" height="8" rx="4" fill="#dc2626"/>
  
  <!-- Timeline labels -->
  <text x="40" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">500ms</text>
  <text x="204" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">400ms</text>
  <text x="335" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">250ms</text>
  <text x="466" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">100ms</text>
  <text x="597" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">0ms (EXCEEDED)</text>
  
  <text x="40" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">A starts</text>
  <text x="204" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">B starts</text>
  <text x="335" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">C returns</text>
  <text x="466" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">D returns</text>
  <text x="597" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Deadline exceeded</text>
  
  <!-- Deadline Exceeded Error Propagation -->
  <rect x="40" y="490" width="820" height="35" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="450" y="513" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#991b1b">DEADLINE EXCEEDED ERROR PROPAGATION</text>
  
  <!-- Error flow upward -->
  <line x1="710" y1="200" x2="710" y2="250" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="760" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#dc2626">DEADLINE_EXCEEDED</text>
  <text x="760" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">grpc.Code = 4</text>
  
  <line x1="440" y1="380" x2="440" y2="430" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="490" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#dc2626">DEADLINE_EXCEEDED</text>
  
  <!-- Error propagates back up -->
  <line x1="620" y1="150" x2="500" y2="150" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="555" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#dc2626">Error propagates up</text>
  
  <!-- Key behaviors box -->
  <rect x="40" y="550" width="400" height="150" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="50" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Key Behaviors</text>
  <text x="50" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">1. Deadline is propagated via gRPC metadata</text>
  <text x="50" y="616" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">   (grpc-timeout header)</text>
  <text x="50" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">2. Each service MUST check remaining</text>
  <text x="50" y="652" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">   deadline before processing</text>
  <text x="50" y="670" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">3. If deadline too short, return early</text>
  <text x="50" y="688" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">   with DEADLINE_EXCEEDED</text>
  
  <!-- Service behavior box -->
  <rect x="460" y="550" width="400" height="150" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="470" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Service Behavior Rules</text>
  <text x="470" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- Always pass remaining deadline to</text>
  <text x="490" y="616" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">  downstream calls (never increase)</text>
  <text x="470" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- Check ctx.Done() before expensive ops</text>
  <text x="470" y="652" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- Cancel in-flight work if deadline</text>
  <text x="490" y="670" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">  exceeded mid-processing</text>
  <text x="470" y="688" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">- Log deadline rejections for debugging</text>
</svg>
