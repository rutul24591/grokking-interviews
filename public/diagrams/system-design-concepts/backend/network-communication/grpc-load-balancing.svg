<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <!-- White background -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">gRPC Load Balancing Strategies Comparison</text>
  <text x="450" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#374151">Client-Side vs Proxy-Based vs Server-Side Load Balancing</text>
  
  <!-- Section 1: Client-Side Load Balancing -->
  <rect x="20" y="80" width="270" height="35" rx="5" fill="#111827"/>
  <text x="155" y="103" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Client-Side Load Balancing</text>
  
  <!-- Client -->
  <rect x="90" y="135" width="130" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="155" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">gRPC Client</text>
  <text x="155" y="173" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">with LB logic</text>
  
  <!-- Service Discovery -->
  <rect x="90" y="205" width="130" height="40" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="155" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Service Discovery</text>
  <text x="155" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">(Consul / etcd)</text>
  
  <!-- Arrows from client to service discovery -->
  <line x1="155" y1="185" x2="155" y2="205" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  
  <!-- Backend servers -->
  <rect x="20" y="275" width="80" height="45" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="60" y="293" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Backend 1</text>
  <text x="60" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">:50051</text>
  
  <rect x="115" y="275" width="80" height="45" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="155" y="293" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Backend 2</text>
  <text x="155" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">:50052</text>
  
  <rect x="210" y="275" width="80" height="45" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="250" y="293" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Backend 3</text>
  <text x="250" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">:50053</text>
  
  <!-- Arrows from client to backends (direct connections) -->
  <line x1="130" y1="185" x2="40" y2="275" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="155" y1="185" x2="155" y2="275" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="180" y1="185" x2="270" y2="275" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Pros/Cons for Client-Side -->
  <rect x="20" y="340" width="270" height="80" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="30" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Pros:</text>
  <text x="30" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- No additional network hops</text>
  <text x="30" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- Intelligent routing decisions</text>
  <text x="30" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Cons:</text>
  <text x="30" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- LB logic in every client</text>
  
  <!-- Section 2: Proxy-Based Load Balancing -->
  <rect x="315" y="80" width="270" height="35" rx="5" fill="#7c3aed"/>
  <text x="450" y="103" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Proxy-Based Load Balancing</text>
  
  <!-- Client -->
  <rect x="385" y="135" width="130" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">gRPC Client</text>
  <text x="450" y="173" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">simple stub</text>
  
  <!-- Arrow to proxy -->
  <line x1="450" y1="185" x2="450" y2="205" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Envoy Proxy -->
  <rect x="380" y="205" width="140" height="50" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="226" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">Envoy Proxy</text>
  <text x="450" y="243" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">(Sidecar / Mesh)</text>
  
  <!-- Arrows from proxy to backends -->
  <line x1="410" y1="255" x2="350" y2="300" stroke="#7c3aed" stroke-width="2"/>
  <line x1="450" y1="255" x2="450" y2="300" stroke="#7c3aed" stroke-width="2"/>
  <line x1="490" y1="255" x2="550" y2="300" stroke="#7c3aed" stroke-width="2"/>
  
  <!-- Backend servers -->
  <rect x="315" y="300" width="80" height="45" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="355" y="318" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Backend 1</text>
  <text x="355" y="333" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">:50051</text>
  
  <rect x="410" y="300" width="80" height="45" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="450" y="318" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Backend 2</text>
  <text x="450" y="333" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">:50052</text>
  
  <rect x="505" y="300" width="80" height="45" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="545" y="318" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Backend 3</text>
  <text x="545" y="333" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">:50053</text>
  
  <!-- Pros/Cons for Proxy-Based -->
  <rect x="315" y="365" width="270" height="90" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="325" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Pros:</text>
  <text x="325" y="401" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- Client unaware of topology</text>
  <text x="325" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- Centralized observability</text>
  <text x="325" y="429" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- mTLS, retries built-in</text>
  <text x="325" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Cons:</text>
  <text x="325" y="457" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- Extra network hop latency</text>
  
  <!-- Section 3: Server-Side Load Balancing -->
  <rect x="610" y="80" width="270" height="35" rx="5" fill="#059669"/>
  <text x="745" y="103" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Server-Side Load Balancing</text>
  
  <!-- Client -->
  <rect x="680" y="135" width="130" height="50" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="745" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">gRPC Client</text>
  <text x="745" y="173" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">simple stub</text>
  
  <!-- Arrow to LB -->
  <line x1="745" y1="185" x2="745" y2="205" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Server-Side LB -->
  <rect x="675" y="205" width="140" height="50" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="745" y="226" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">L4/L7 Load Balancer</text>
  <text x="745" y="243" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">(NGINX / HAProxy)</text>
  
  <!-- Arrows from LB to backends -->
  <line x1="705" y1="255" x2="640" y2="300" stroke="#059669" stroke-width="2"/>
  <line x1="745" y1="255" x2="745" y2="300" stroke="#059669" stroke-width="2"/>
  <line x1="785" y1="255" x2="850" y2="300" stroke="#059669" stroke-width="2"/>
  
  <!-- Backend servers -->
  <rect x="610" y="300" width="80" height="45" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="650" y="318" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Backend 1</text>
  <text x="650" y="333" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">:50051</text>
  
  <rect x="705" y="300" width="80" height="45" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="745" y="318" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Backend 2</text>
  <text x="745" y="333" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">:50052</text>
  
  <rect x="800" y="300" width="80" height="45" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="840" y="318" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Backend 3</text>
  <text x="840" y="333" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">:50053</text>
  
  <!-- Pros/Cons for Server-Side -->
  <rect x="610" y="365" width="270" height="90" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="620" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Pros:</text>
  <text x="620" y="401" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- Simple client implementation</text>
  <text x="620" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- Language-agnostic</text>
  <text x="620" y="429" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- Easy to manage</text>
  <text x="620" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Cons:</text>
  <text x="620" y="457" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">- LB becomes bottleneck</text>
  
  <!-- Bottom comparison table -->
  <rect x="20" y="480" width="860" height="200" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  
  <!-- Table headers -->
  <rect x="20" y="480" width="860" height="35" rx="6" fill="#111827"/>
  <text x="155" y="503" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Client-Side</text>
  <text x="450" y="503" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Proxy-Based</text>
  <text x="745" y="503" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Server-Side</text>
  
  <!-- Comparison rows -->
  <text x="30" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Latency:</text>
  <text x="155" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Lowest (direct)</text>
  <text x="450" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Medium (+1 hop)</text>
  <text x="745" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Medium (+1 hop)</text>
  
  <text x="30" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Complexity:</text>
  <text x="155" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">High (per client)</text>
  <text x="450" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Medium (sidecar)</text>
  <text x="745" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Low (centralized)</text>
  
  <text x="30" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Observability:</text>
  <text x="155" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Fragmented</text>
  <text x="450" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Centralized</text>
  <text x="745" y="590" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Centralized</text>
  
  <text x="30" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">mTLS:</text>
  <text x="155" y="615" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Client-managed</text>
  <text x="450" y="615" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Auto (Envoy)</text>
  <text x="745" y="615" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">LB-managed</text>
  
  <text x="30" y="640" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Best For:</text>
  <text x="155" y="640" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Microservices</text>
  <text x="450" y="640" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Service mesh</text>
  <text x="745" y="640" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Legacy / Simple</text>
  
  <!-- Arrow markers definition -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669"/>
    </marker>
  </defs>
</svg>
