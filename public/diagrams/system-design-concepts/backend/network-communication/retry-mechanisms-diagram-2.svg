<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <style>
      .bg-light { fill: #ffffff; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .axis { stroke: #94a3b8; stroke-width: 1.5; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; fill: #0f172a; }
      .label-small { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #475569; }
      .label-bold { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 700; }
      .grid { stroke: #e2e8f0; stroke-width: 0.5; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect class="bg-light" width="960" height="420" />

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" class="title">Exponential Backoff with Jitter: Desynchronizing Retry Waves</text>

  <!-- Left chart: Without Jitter (synchronized) -->
  <text x="240" y="70" text-anchor="middle" class="label" font-weight="700" font-size="15">Without Jitter (Synchronized)</text>

  <!-- Axes left -->
  <line x1="80" y1="350" x2="400" y2="350" class="axis" />
  <line x1="80" y1="350" x2="80" y2="100" class="axis" />
  <text x="55" y="225" text-anchor="middle" class="label-small" transform="rotate(-90 55 225)">Time</text>
  <text x="240" y="375" text-anchor="middle" class="label-small">Retry Attempts</text>

  <!-- X-axis labels left -->
  <text x="120" y="368" text-anchor="middle" class="label-small">Client A</text>
  <text x="200" y="368" text-anchor="middle" class="label-small">Client B</text>
  <text x="280" y="368" text-anchor="middle" class="label-small">Client C</text>
  <text x="360" y="368" text-anchor="middle" class="label-small">Client D</text>

  <!-- Grid left -->
  <line x1="80" y1="290" x2="400" y2="290" class="grid" />
  <text x="70" y="294" text-anchor="end" class="label-small">100ms</text>
  <line x1="80" y1="230" x2="400" y2="230" class="grid" />
  <text x="70" y="234" text-anchor="end" class="label-small">200ms</text>
  <line x1="80" y1="170" x2="400" y2="170" class="grid" />
  <text x="70" y="174" text-anchor="end" class="label-small">400ms</text>
  <line x1="80" y1="110" x2="400" y2="110" class="grid" />
  <text x="70" y="114" text-anchor="end" class="label-small">800ms</text>

  <!-- Without jitter: aligned vertical lines (retry waves) -->
  <line x1="120" y1="290" x2="120" y2="170" stroke="#ef4444" stroke-width="4" />
  <line x1="200" y1="290" x2="200" y2="170" stroke="#ef4444" stroke-width="4" />
  <line x1="280" y1="290" x2="280" y2="170" stroke="#ef4444" stroke-width="4" />
  <line x1="360" y1="290" x2="360" y2="170" stroke="#ef4444" stroke-width="4" />

  <line x1="120" y1="230" x2="120" y2="110" stroke="#ef4444" stroke-width="3" />
  <line x1="200" y1="230" x2="200" y2="110" stroke="#ef4444" stroke-width="3" />
  <line x1="280" y1="230" x2="280" y2="110" stroke="#ef4444" stroke-width="3" />
  <line x1="360" y1="230" x2="360" y2="110" stroke="#ef4444" stroke-width="3" />

  <!-- Danger label -->
  <rect x="180" y="80" width="120" height="24" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1" />
  <text x="240" y="97" text-anchor="middle" class="label-small" font-weight="700" fill="#dc2626">Retry storms!</text>

  <!-- Right chart: With Jitter (desynchronized) -->
  <text x="720" y="70" text-anchor="middle" class="label" font-weight="700" font-size="15">With Jitter (Desynchronized)</text>

  <!-- Axes right -->
  <line x1="560" y1="350" x2="880" y2="350" class="axis" />
  <line x1="560" y1="350" x2="560" y2="100" class="axis" />
  <text x="535" y="225" text-anchor="middle" class="label-small" transform="rotate(-90 535 225)">Time</text>
  <text x="720" y="375" text-anchor="middle" class="label-small">Retry Attempts</text>

  <!-- X-axis labels right -->
  <text x="600" y="368" text-anchor="middle" class="label-small">Client A</text>
  <text x="680" y="368" text-anchor="middle" class="label-small">Client B</text>
  <text x="760" y="368" text-anchor="middle" class="label-small">Client C</text>
  <text x="840" y="368" text-anchor="middle" class="label-small">Client D</text>

  <!-- Grid right -->
  <line x1="560" y1="290" x2="880" y2="290" class="grid" />
  <text x="550" y="294" text-anchor="end" class="label-small">100ms</text>
  <line x1="560" y1="230" x2="880" y2="230" class="grid" />
  <text x="550" y="234" text-anchor="end" class="label-small">200ms</text>
  <line x1="560" y1="170" x2="880" y2="170" class="grid" />
  <text x="550" y="174" text-anchor="end" class="label-small">400ms</text>
  <line x1="560" y1="110" x2="880" y2="110" class="grid" />
  <text x="550" y="114" text-anchor="end" class="label-small">800ms</text>

  <!-- With jitter: scattered vertical lines (no waves) -->
  <line x1="595" y1="290" x2="595" y2="250" stroke="#22c55e" stroke-width="4" />
  <line x1="670" y1="290" x2="670" y2="220" stroke="#22c55e" stroke-width="4" />
  <line x1="755" y1="290" x2="755" y2="260" stroke="#22c55e" stroke-width="4" />
  <line x1="835" y1="290" x2="835" y2="235" stroke="#22c55e" stroke-width="4" />

  <line x1="605" y1="230" x2="605" y2="155" stroke="#22c55e" stroke-width="3" />
  <line x1="690" y1="230" x2="690" y2="180" stroke="#22c55e" stroke-width="3" />
  <line x1="765" y1="230" x2="765" y2="130" stroke="#22c55e" stroke-width="3" />
  <line x1="845" y1="230" x2="845" y2="165" stroke="#22c55e" stroke-width="3" />

  <line x1="615" y1="170" x2="615" y2="120" stroke="#22c55e" stroke-width="2" />
  <line x1="700" y1="170" x2="700" y2="140" stroke="#22c55e" stroke-width="2" />
  <line x1="780" y1="170" x2="780" y2="105" stroke="#22c55e" stroke-width="2" />
  <line x1="855" y1="170" x2="855" y2="125" stroke="#22c55e" stroke-width="2" />

  <!-- Safe label -->
  <rect x="660" y="80" width="120" height="24" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1" />
  <text x="720" y="97" text-anchor="middle" class="label-small" font-weight="700" fill="#16a34a">Steady trickle</text>

  <!-- Bottom annotation -->
  <rect x="320" y="388" width="320" height="26" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" />
  <text x="480" y="405" text-anchor="middle" class="label-small" font-weight="700" fill="#92400e">sleep = random(0, min(cap, base * 2^attempt))</text>
</svg>
