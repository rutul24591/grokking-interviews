<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Consul Catalog Architecture</text>
  <text x="450" y="58" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Data Centers, Server Nodes (Raft Consensus), Client Agents, and Service Instances with Health Checks</text>

  <!-- DATA CENTER 1 -->
  <rect x="20" y="80" width="860" height="300" rx="10" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="105" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Data Center: us-east-1 (dc1)</text>

  <!-- SERVER NODES (Raft cluster) -->
  <rect x="40" y="120" width="400" height="240" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="240" y="145" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Consul Servers (Raft Cluster — 3 or 5 nodes)</text>

  <!-- Server 1 (Leader) -->
  <rect x="60" y="160" width="110" height="100" rx="8" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="115" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Server-1</text>
  <rect x="75" y="190" width="80" height="24" rx="4" fill="#dc2626"/>
  <text x="115" y="207" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">LEADER</text>
  <text x="115" y="228" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Handles all writes</text>
  <text x="115" y="243" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Replicates to followers</text>
  <text x="115" y="258" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Port: 8300 (RPC)</text>

  <!-- Server 2 (Follower) -->
  <rect x="185" y="160" width="110" height="100" rx="8" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="240" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Server-2</text>
  <rect x="200" y="190" width="80" height="24" rx="4" fill="#059669"/>
  <text x="240" y="207" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">FOLLOWER</text>
  <text x="240" y="228" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Replicates log entries</text>
  <text x="240" y="243" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Handles read queries</text>
  <text x="240" y="258" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Port: 8300 (RPC)</text>

  <!-- Server 3 (Follower) -->
  <rect x="310" y="160" width="110" height="100" rx="8" fill="#ffffff" stroke="#ca8a04" stroke-width="2"/>
  <text x="365" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Server-3</text>
  <rect x="325" y="190" width="80" height="24" rx="4" fill="#059669"/>
  <text x="365" y="207" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">FOLLOWER</text>
  <text x="365" y="228" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Replicates log entries</text>
  <text x="365" y="243" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Handles read queries</text>
  <text x="365" y="258" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Port: 8300 (RPC)</text>

  <!-- Raft annotations -->
  <rect x="60" y="275" width="360" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="240" y="295" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Raft Consensus Protocol</text>
  <text x="240" y="315" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Quorum: 2 of 3 nodes required for writes. Leader election on failure.</text>
  <text x="240" y="332" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Strongly consistent catalog. Gossip protocol (Serf) for membership.</text>

  <!-- CLIENT AGENTS -->
  <rect x="460" y="120" width="400" height="240" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="660" y="145" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Consul Client Agents (one per node)</text>

  <!-- Client Agent 1 -->
  <rect x="480" y="160" width="170" height="110" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="565" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Agent on Node-1</text>
  <text x="565" y="198" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Mode: client (stateless)</text>
  <rect x="495" y="205" width="140" height="22" rx="4" fill="#dbeafe"/>
  <text x="565" y="220" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#1f2937" text-anchor="middle">Health: tcp :8080 (passing)</text>
  <rect x="495" y="230" width="140" height="22" rx="4" fill="#dbeafe"/>
  <text x="565" y="245" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#1f2937" text-anchor="middle">Health: http /health (passing)</text>
  <text x="565" y="263" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Forwards to servers via RPC</text>

  <!-- Client Agent 2 -->
  <rect x="670" y="160" width="170" height="110" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="755" y="180" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Agent on Node-2</text>
  <text x="755" y="198" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Mode: client (stateless)</text>
  <rect x="685" y="205" width="140" height="22" rx="4" fill="#dbeafe"/>
  <text x="755" y="220" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#1f2937" text-anchor="middle">Health: tcp :8080 (passing)</text>
  <rect x="685" y="230" width="140" height="22" rx="4" fill="#fef2f2"/>
  <text x="755" y="245" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#dc2626" text-anchor="middle">Health: http /health (critical)</text>
  <text x="755" y="263" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Forwards to servers via RPC</text>

  <!-- Health Check types -->
  <rect x="480" y="285" width="360" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="660" y="305" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Health Check Types</text>
  <text x="660" y="325" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">TCP | HTTP/gRPC | Script/TTL | Docker | Alias</text>
  <text x="660" y="340" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">States: passing | warning | critical | maintenance</text>

  <!-- SERVICE INSTANCES -->
  <rect x="460" y="380" width="400" height="100" rx="10" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="660" y="405" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Service Instances (on Node-1)</text>

  <rect x="480" y="420" width="170" height="45" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="565" y="438" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">web-api :8080</text>
  <text x="565" y="455" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Tags: v2, primary</text>

  <rect x="670" y="420" width="170" height="45" rx="6" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="755" y="438" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">payment-svc :8443</text>
  <text x="755" y="455" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Tags: v1, stable</text>

  <!-- WAN -->
  <rect x="20" y="500" width="860" height="80" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="525" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">WAN Gossip Ring (Cross-Datacenter)</text>
  <text x="450" y="545" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Server agents join the WAN gossip pool. Enables cross-DC service queries and federation.</text>
  <text x="450" y="565" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Each DC runs its own Raft cluster. WAN gossip uses Serf with encryption (gossip key).</text>

  <!-- DATA CENTER 2 -->
  <rect x="20" y="600" width="860" height="80" rx="10" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="625" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Data Center: us-west-2 (dc2) — Separate Raft Cluster</text>
  <text x="450" y="645" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">3 Server nodes (independent Raft group) | Client agents | Service instances | Health checks</text>
  <text x="450" y="665" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Cross-DC query: dc2.service.consul — forwarded via WAN gossip to dc2 servers</text>

  <!-- Communication arrows -->
  <line x1="240" y1="360" x2="240" y2="500" stroke="#ca8a04" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="360" x2="660" y2="380" stroke="#059669" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="480" x2="660" y2="500" stroke="#ca8a04" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="560" x2="450" y2="600" stroke="#ca8a04" stroke-width="2" marker-end="url(#arrow)"/>
</svg>