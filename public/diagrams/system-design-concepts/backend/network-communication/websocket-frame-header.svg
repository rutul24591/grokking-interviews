<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">WebSocket Frame Format</text>
  <text x="450" y="58" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Frame Header Fields: FIN Bit, Opcode, Mask Bit, Payload Length, Masking Key, Payload Data</text>

  <!-- FRAME OVERVIEW -->
  <rect x="20" y="85" width="860" height="320" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="110" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">WebSocket Frame Structure (RFC 6455)</text>
  <text x="450" y="130" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">Minimum 2 bytes | Variable-length header: 2-14 bytes | Payload: 0 to 2^63 bytes</text>

  <!-- BYTE 0: FIN + RSV + OPCODE -->
  <rect x="40" y="150" width="200" height="230" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="172" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Byte 0</text>

  <!-- FIN bit -->
  <rect x="55" y="185" width="170" height="40" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="140" y="202" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">FIN (1 bit)</text>
  <text x="140" y="218" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Final fragment (1 = final)</text>

  <!-- RSV1, RSV2, RSV3 -->
  <rect x="55" y="230" width="170" height="40" rx="5" fill="#f0f9ff" stroke="#2563eb" stroke-width="1"/>
  <text x="140" y="247" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">RSV1, RSV2, RSV3 (1 bit each)</text>
  <text x="140" y="263" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Must be 0 unless extension</text>

  <!-- Opcode -->
  <rect x="55" y="275" width="170" height="40" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="140" y="292" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Opcode (4 bits)</text>
  <text x="140" y="308" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Frame type identifier</text>

  <rect x="55" y="320" width="170" height="40" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="140" y="337" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Frame Type</text>
  <text x="140" y="353" font-family="monospace" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">0x0: Continuation</text>

  <!-- BYTE 1: MASK + PAYLOAD LEN -->
  <rect x="260" y="150" width="200" height="230" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="360" y="172" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Byte 1</text>

  <!-- MASK bit -->
  <rect x="275" y="185" width="170" height="50" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="360" y="205" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">MASK (1 bit)</text>
  <text x="360" y="223" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">1 = payload is masked</text>
  <text x="360" y="238" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Must be 1 for client→server</text>

  <!-- Payload Length -->
  <rect x="275" y="240" width="170" height="60" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="360" y="260" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Payload Length (7 bits)</text>
  <text x="360" y="278" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">0-125: actual length</text>
  <text x="360" y="293" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">126: next 2 bytes = length</text>

  <rect x="275" y="305" width="170" height="60" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="360" y="323" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">127: next 8 bytes = length</text>
  <text x="360" y="338" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Max payload: 2^63 bytes</text>

  <!-- Extended Payload Length -->
  <rect x="480" y="150" width="200" height="230" rx="8" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <text x="580" y="172" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Extended Payload Length</text>

  <!-- If length = 126 -->
  <rect x="495" y="185" width="170" height="50" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="580" y="205" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">If Payload Len = 126:</text>
  <text x="580" y="223" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Bytes 2-3 = 16-bit length</text>
  <text x="580" y="238" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">(up to 65,535 bytes)</text>

  <!-- If length = 127 -->
  <rect x="495" y="240" width="170" height="60" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="580" y="260" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">If Payload Len = 127:</text>
  <text x="580" y="278" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Bytes 2-9 = 64-bit length</text>
  <text x="580" y="293" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">(up to 2^63 bytes)</text>

  <rect x="495" y="305" width="170" height="60" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="580" y="323" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">MSB must be 0 (signed)</text>
  <text x="580" y="338" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Network byte order (big-endian)</text>

  <!-- Masking Key -->
  <rect x="700" y="150" width="170" height="230" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="785" y="172" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Masking Key</text>

  <rect x="715" y="185" width="140" height="80" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="785" y="205" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">If MASK = 1:</text>
  <text x="785" y="223" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">4 bytes masking key</text>
  <text x="785" y="240" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Random per-frame value</text>
  <text x="785" y="257" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Used for XOR masking</text>

  <rect x="715" y="270" width="140" height="50" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="785" y="288" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">Masking Formula:</text>
  <text x="785" y="305" font-family="monospace" font-size="8" font-weight="400" fill="#374151" text-anchor="middle">transformed-octet[i] =</text>
  <text x="785" y="318" font-family="monospace" font-size="8" font-weight="400" fill="#374151" text-anchor="middle">original-octet[i] ^ key[i%4]</text>

  <rect x="715" y="325" width="140" height="40" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="785" y="343" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Purpose: Prevent proxy</text>
  <text x="785" y="358" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">cache poisoning (not security)</text>

  <!-- PAYLOAD DATA -->
  <rect x="20" y="420" width="860" height="60" rx="8" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="445" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Payload Data (Variable Length)</text>
  <text x="450" y="465" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">If control frame (opcode 0x8-0xF): max 125 bytes | If data frame: unlimited (0 to 2^63 bytes)</text>

  <!-- OPCODE DETAILS -->
  <rect x="20" y="495" width="420" height="190" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="520" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Opcode Values</text>

  <!-- Data frames -->
  <rect x="40" y="535" width="380" height="30" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="230" y="555" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">0x0: Continuation | 0x1: Text (UTF-8) | 0x2: Binary</text>

  <!-- Control frames -->
  <rect x="40" y="575" width="380" height="30" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="230" y="595" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">0x8: Close | 0x9: Ping | 0xA: Pong</text>

  <rect x="40" y="615" width="380" height="55" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
  <text x="230" y="635" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Control Frame Rules</text>
  <text x="230" y="655" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Must have FIN=1 (not fragmented) | Payload ≤ 125 bytes</text>
  <text x="230" y="672" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Can be sent at any point between data frames</text>

  <!-- FRAGMENTATION -->
  <rect x="460" y="495" width="420" height="190" rx="10" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="670" y="520" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Fragmentation (FIN Bit)</text>

  <!-- Fragment example -->
  <rect x="480" y="540" width="380" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="670" y="560" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Frame 1: Opcode=0x1 (Text), FIN=0 — first fragment</text>

  <rect x="480" y="575" width="380" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="670" y="595" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Frame 2: Opcode=0x0 (Continuation), FIN=0 — middle</text>

  <rect x="480" y="610" width="380" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="670" y="630" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Frame 3: Opcode=0x0 (Continuation), FIN=1 — last</text>

  <rect x="480" y="645" width="380" height="30" rx="4" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
  <text x="670" y="665" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Only the first fragment has the opcode; intermediates use 0x0</text>
</svg>