<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">API Versioning Strategies Comparison</title>
  <desc id="desc">Four API versioning strategies compared: URI Path, Query Parameter, Header-based, and Content Negotiation with pros and cons for each approach</desc>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="1200" height="820" fill="#ffffff"/>

  <!-- Title section -->
  <text x="600" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">API Versioning Strategies</text>
  <text x="600" y="60" text-anchor="middle" font-size="15" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Four Approaches with Trade-offs in Discoverability, Cacheability, RESTful Purity, and Complexity</text>

  <!-- ==================== STRATEGY 1: URI PATH ==================== -->
  <rect x="30" y="90" width="560" height="320" rx="10" fill="#f0f9ff" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>

  <!-- Strategy header -->
  <rect x="50" y="105" width="520" height="42" rx="6" fill="#2563eb"/>
  <text x="310" y="133" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Strategy 1: URI Path Versioning</text>

  <!-- Example -->
  <rect x="50" y="160" width="520" height="60" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="65" y="185" font-size="11" font-weight="700" fill="#075985" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">EXAMPLE:</text>
  <text x="65" y="207" font-size="13" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">GET /api/v1/orders/123</text>
  <text x="65" y="226" font-size="13" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">POST /api/v2/orders</text>

  <!-- Pros -->
  <rect x="50" y="235" width="245" height="160" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="172" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Pros</text>
  <text x="62" y="280" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Highly discoverable: version</text>
  <text x="62" y="298" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  visible in URL</text>
  <text x="62" y="316" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Excellent cacheability: CDN</text>
  <text x="62" y="334" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  caches each version separately</text>
  <text x="62" y="352" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Easy to test with curl/browser</text>
  <text x="62" y="370" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Simple routing rules at gateway</text>
  <text x="62" y="388" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Browser-bookmarkable endpoints</text>

  <!-- Cons -->
  <rect x="325" y="235" width="245" height="160" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="447" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Cons</text>
  <text x="337" y="280" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Violates RESTful purity: URL</text>
  <text x="337" y="298" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  identifies resource, not version</text>
  <text x="337" y="316" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; URL duplication across versions</text>
  <text x="337" y="334" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Clients must change URL to</text>
  <text x="337" y="352" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  upgrade (breaking change)</text>
  <text x="337" y="370" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Partial versioning creates hybrid</text>
  <text x="337" y="388" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  endpoints (/v1/users/v2/orders)</text>

  <!-- Rating -->
  <rect x="50" y="368" width="520" height="30" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
  <text x="120" y="389" font-size="11" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Industry Adoption:</text>
  <text x="260" y="389" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Most common (Stripe, GitHub, Twilio use this pattern)</text>

  <!-- ==================== STRATEGY 2: QUERY PARAMETER ==================== -->
  <rect x="610" y="90" width="560" height="320" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>

  <!-- Strategy header -->
  <rect x="630" y="105" width="520" height="42" rx="6" fill="#7c3aed"/>
  <text x="890" y="133" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Strategy 2: Query Parameter</text>

  <!-- Example -->
  <rect x="630" y="160" width="520" height="60" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="645" y="185" font-size="11" font-weight="700" fill="#5b21b6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">EXAMPLE:</text>
  <text x="645" y="207" font-size="13" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">GET /api/orders/123?v=1</text>
  <text x="645" y="226" font-size="13" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">POST /api/orders?version=2</text>

  <!-- Pros -->
  <rect x="630" y="235" width="245" height="160" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="752" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Pros</text>
  <text x="642" y="280" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Clean base URL stays constant</text>
  <text x="642" y="298" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Version is explicit and visible</text>
  <text x="642" y="316" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Easy to add without path changes</text>
  <text x="642" y="334" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Default version possible (?v=latest)</text>
  <text x="642" y="352" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Works with standard HTTP tooling</text>

  <!-- Cons -->
  <rect x="905" y="235" width="245" height="160" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="1027" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Cons</text>
  <text x="917" y="280" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Query params should filter/</text>
  <text x="917" y="298" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  modify, not change semantics</text>
  <text x="917" y="316" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Some CDNs don't cache by query</text>
  <text x="917" y="334" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  param by default (needs config)</text>
  <text x="917" y="352" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Conflicts with other query params</text>
  <text x="917" y="370" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Least RESTful-pure approach</text>

  <!-- Rating -->
  <rect x="630" y="368" width="520" height="30" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
  <text x="700" y="389" font-size="11" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Industry Adoption:</text>
  <text x="840" y="389" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Rare in production APIs; mostly internal tools and legacy systems</text>

  <!-- ==================== STRATEGY 3: HEADER-BASED ==================== -->
  <rect x="30" y="430" width="560" height="320" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>

  <!-- Strategy header -->
  <rect x="50" y="445" width="520" height="42" rx="6" fill="#16a34a"/>
  <text x="310" y="473" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Strategy 3: Custom Header</text>

  <!-- Example -->
  <rect x="50" y="500" width="520" height="60" rx="6" fill="#ffffff" stroke="#86efac" stroke-width="2"/>
  <text x="65" y="525" font-size="11" font-weight="700" fill="#065f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">EXAMPLE:</text>
  <text x="65" y="547" font-size="13" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">GET /api/orders/123</text>
  <text x="65" y="566" font-size="13" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">Api-Version: 2</text>

  <!-- Pros -->
  <rect x="50" y="575" width="245" height="160" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="172" y="598" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Pros</text>
  <text x="62" y="620" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; RESTful-pure: URL unchanged</text>
  <text x="62" y="638" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Version metadata separate from</text>
  <text x="62" y="656" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  resource identification</text>
  <text x="62" y="674" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Same URL works across versions</text>
  <text x="62" y="692" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Easy A/B testing via headers</text>
  <text x="62" y="710" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Multiple version headers possible</text>

  <!-- Cons -->
  <rect x="325" y="575" width="245" height="160" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="447" y="598" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Cons</text>
  <text x="337" y="620" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Not discoverable: must read docs</text>
  <text x="337" y="638" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  to know about header requirement</text>
  <text x="337" y="656" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Browser testing requires tools</text>
  <text x="337" y="674" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  (Postman, curl); not clickable</text>
  <text x="337" y="692" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; CDN caching requires Vary header</text>
  <text x="337" y="710" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  config (complexity increases)</text>

  <!-- Rating -->
  <rect x="50" y="708" width="520" height="30" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
  <text x="120" y="729" font-size="11" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Industry Adoption:</text>
  <text x="260" y="729" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Moderate (Microsoft Graph API, some enterprise APIs)</text>

  <!-- ==================== STRATEGY 4: CONTENT NEGOTIATION ==================== -->
  <rect x="610" y="430" width="560" height="320" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>

  <!-- Strategy header -->
  <rect x="630" y="445" width="520" height="42" rx="6" fill="#ea580c"/>
  <text x="890" y="473" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Strategy 4: Content Negotiation</text>

  <!-- Example -->
  <rect x="630" y="500" width="520" height="60" rx="6" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
  <text x="645" y="525" font-size="11" font-weight="700" fill="#c2410c" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">EXAMPLE:</text>
  <text x="645" y="547" font-size="13" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">GET /api/orders/123</text>
  <text x="645" y="566" font-size="13" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">Accept: application/vnd.myapi.v2+json</text>

  <!-- Pros -->
  <rect x="630" y="575" width="245" height="160" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="752" y="598" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Pros</text>
  <text x="642" y="620" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Most RESTful-pure: uses HTTP</text>
  <text x="642" y="638" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  spec as intended (Accept header)</text>
  <text x="642" y="656" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Version + media type together</text>
  <text x="642" y="674" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; URL remains completely clean</text>
  <text x="642" y="692" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Can negotiate format + version</text>
  <text x="642" y="710" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  in single header</text>

  <!-- Cons -->
  <rect x="905" y="575" width="245" height="160" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="1027" y="598" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Cons</text>
  <text x="917" y="620" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Highest complexity: custom media</text>
  <text x="917" y="638" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  type registration needed</text>
  <text x="917" y="656" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Very low discoverability</text>
  <text x="917" y="674" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; CDN caching is complex (Vary</text>
  <text x="917" y="692" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">  on Accept with multiple values)</text>
  <text x="917" y="710" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Debugging requires header inspection</text>

  <!-- Rating -->
  <rect x="630" y="708" width="520" height="30" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
  <text x="700" y="729" font-size="11" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Industry Adoption:</text>
  <text x="840" y="729" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Low; mostly academic. GitHub used it early (application/vnd.github.v3+json)</text>
</svg>
