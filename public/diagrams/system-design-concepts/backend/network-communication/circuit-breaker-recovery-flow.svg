<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" width="900" height="800">
  <!-- Background -->
  <rect width="900" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">Circuit Breaker State Machine &amp; Recovery Flow</text>
  <text x="450" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151">State transitions based on failure thresholds, timeouts, and test request outcomes</text>

  <!-- State Machine Diagram -->
  <!-- CLOSED State -->
  <rect x="40" y="120" width="220" height="110" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
  <rect x="40" y="120" width="220" height="32" rx="12" fill="#16a34a"/>
  <rect x="40" y="142" width="220" height="10" fill="#16a34a"/>
  <text x="150" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffffff">CLOSED</text>
  <text x="150" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Normal operation</text>
  <text x="150" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Requests flow through</text>
  <text x="150" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#16a34a">Healthy state</text>

  <!-- Arrow: CLOSED to OPEN -->
  <line x1="260" y1="175" x2="380" y2="175" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowhead-red)"/>
  <rect x="265" y="150" width="110" height="45" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="320" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#991b1b">Failures exceed</text>
  <text x="320" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#991b1b">threshold</text>

  <!-- OPEN State -->
  <rect x="380" y="120" width="220" height="110" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
  <rect x="380" y="120" width="220" height="32" rx="12" fill="#dc2626"/>
  <rect x="380" y="142" width="220" height="10" fill="#dc2626"/>
  <text x="490" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffffff">OPEN</text>
  <text x="490" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">All requests rejected</text>
  <text x="490" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Immediate failure response</text>
  <text x="490" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#dc2626">Fail-fast state</text>

  <!-- Arrow: OPEN to HALF-OPEN -->
  <line x1="490" y1="230" x2="490" y2="300" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowhead-yellow)"/>
  <rect x="505" y="245" width="110" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="560" y="263" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400e">Timeout elapsed</text>
  <text x="560" y="279" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400e">recovery window</text>

  <!-- HALF-OPEN State -->
  <rect x="380" y="300" width="220" height="110" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
  <rect x="380" y="300" width="220" height="32" rx="12" fill="#f59e0b"/>
  <rect x="380" y="322" width="220" height="10" fill="#f59e0b"/>
  <text x="490" y="323" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffffff">HALF-OPEN</text>
  <text x="490" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Limited test requests</text>
  <text x="490" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Probing recovery</text>
  <text x="490" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#f59e0b">Testing state</text>

  <!-- Arrow: HALF-OPEN to CLOSED (success) -->
  <line x1="380" y1="355" x2="260" y2="355" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowhead-green)"/>
  <rect x="265" y="330" width="110" height="45" rx="6" fill="#d1fae5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#166534">Test requests</text>
  <text x="320" y="364" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#166534">succeed</text>

  <!-- Arrow: HALF-OPEN to OPEN (failure) -->
  <line x1="600" y1="355" x2="740" y2="355" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowhead-red)"/>
  <rect x="605" y="330" width="130" height="45" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="670" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#991b1b">Test request fails</text>
  <text x="670" y="364" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#991b1b">back to OPEN</text>

  <!-- OPEN fallback box -->
  <rect x="380" y="440" width="220" height="90" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="490" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Fallback Response</text>
  <text x="490" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Cached data, default values,</text>
  <text x="490" y="506" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">or graceful degradation</text>
  <text x="490" y="524" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">instead of full failure</text>

  <!-- Arrow from OPEN to fallback -->
  <line x1="490" y1="230" x2="490" y2="440" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead-down)" stroke-dasharray="6,3"/>

  <!-- Metrics Tracking Section -->
  <rect x="40" y="560" width="820" height="2" fill="#e5e7eb"/>
  <text x="40" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Metrics Tracking During Each State</text>

  <!-- Metrics for CLOSED -->
  <rect x="40" y="615" width="260" height="90" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="55" y="638" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#16a34a">CLOSED State Metrics</text>
  <text x="55" y="658" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Failure count (sliding window)</text>
  <text x="55" y="676" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Success rate percentage</text>
  <text x="55" y="694" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Response time p50, p95, p99</text>

  <!-- Metrics for OPEN -->
  <rect x="320" y="615" width="260" height="90" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="335" y="638" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#dc2626">OPEN State Metrics</text>
  <text x="335" y="658" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Time since opened (timeout)</text>
  <text x="335" y="676" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Rejected request count</text>
  <text x="335" y="694" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Fallback invocation count</text>

  <!-- Metrics for HALF-OPEN -->
  <rect x="600" y="615" width="260" height="90" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="615" y="638" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#f59e0b">HALF-OPEN State Metrics</text>
  <text x="615" y="658" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Test requests allowed (max)</text>
  <text x="615" y="676" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Test success/failure ratio</text>
  <text x="615" y="694" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Recovery signal strength</text>

  <!-- Configuration Parameters -->
  <rect x="40" y="725" width="820" height="2" fill="#e5e7eb"/>
  <text x="40" y="755" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Configuration Parameters</text>

  <rect x="40" y="768" width="200" height="25" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="55" y="786" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">failureThreshold: 5</text>

  <rect x="255" y="768" width="200" height="25" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="270" y="786" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">timeoutDuration: 30s</text>

  <rect x="470" y="768" width="200" height="25" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="485" y="786" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">halfOpenMaxCalls: 3</text>

  <rect x="685" y="768" width="175" height="25" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="700" y="786" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">slidingWindowSize: 100</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead-red" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowhead-green" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowhead-yellow" viewBox="0 0 10 7" refX="5" refY="6" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead-down" viewBox="0 0 10 7" refX="5" refY="6" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#1f2937"/>
    </marker>
  </defs>
</svg>
