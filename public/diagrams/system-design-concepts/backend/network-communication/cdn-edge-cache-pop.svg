<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" role="img" aria-labelledby="title desc" width="1200" height="1100">
  <title id="title">CDN Edge Cache Population and Invalidation Flow</title>
  <desc id="desc">Complete flow showing content origin to edge cache population, cache hit/miss handling, and three cache invalidation methods: purge by URL, purge by tag, and purge all</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#374151"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#dc2626"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="cacheHitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="cacheMissGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="popGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="invalidateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1200" height="1100" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">CDN Edge Cache: Population &amp; Invalidation Flow</text>
  <text x="600" y="58" text-anchor="middle" font-size="14" font-weight="400" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Content origin to edge delivery with cache hit/miss handling and three invalidation strategies</text>

  <!-- ==================== PART 1: REQUEST FLOW ==================== -->
  <text x="600" y="100" text-anchor="middle" font-size="17" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Request Flow: Cache Hit and Cache Miss Paths</text>

  <!-- User -->
  <rect x="470" y="120" width="260" height="50" rx="25" fill="#111827" filter="url(#shadow)"/>
  <text x="600" y="151" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">User / Browser Request</text>

  <!-- Arrow to DNS -->
  <line x1="600" y1="170" x2="600" y2="200" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DNS Resolution -->
  <rect x="440" y="200" width="320" height="45" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="227" text-anchor="middle" font-size="13" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">DNS Resolution (Geo-IP Routing)</text>
  <text x="600" y="240" text-anchor="middle" font-size="10" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Routes to nearest edge PoP based on user location</text>

  <!-- Arrow to Edge PoP -->
  <line x1="600" y1="245" x2="600" y2="280" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Edge PoP -->
  <rect x="380" y="280" width="440" height="70" rx="10" fill="url(#popGrad)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="308" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">CDN Edge Point of Presence (PoP)</text>
  <text x="600" y="328" text-anchor="middle" font-size="12" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Edge cache node: stores cached content, checks Cache-Control headers, serves from local storage</text>
  <text x="600" y="344" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">TTL management, stale-while-revalidate, cache key normalization</text>

  <!-- Decision diamond: Cache Hit? -->
  <line x1="600" y1="350" x2="600" y2="385" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="600,385 720,430 600,475 480,430" fill="#ffffff" stroke="#374151" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Cache Hit?</text>
  <text x="600" y="442" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Check edge cache</text>

  <!-- CACHE HIT path (left) -->
  <line x1="480" y1="430" x2="300" y2="430" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="380" y="420" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">YES (HIT)</text>

  <!-- Cache Hit box -->
  <rect x="60" y="400" width="280" height="140" rx="10" fill="url(#cacheHitGrad)" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#166534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">CACHE HIT</text>
  <text x="200" y="452" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Content found in edge cache</text>
  <text x="200" y="472" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Check TTL: not expired</text>
  <text x="200" y="492" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Serve directly from edge</text>
  <text x="200" y="512" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Headers: X-Cache: HIT</text>
  <text x="200" y="532" text-anchor="middle" font-size="11" font-weight="600" fill="#166534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Latency: 5-20ms</text>

  <!-- Arrow from Cache Hit to User -->
  <path d="M 200 400 Q 200 300 470 145" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="170" y="280" font-size="11" font-weight="600" fill="#166534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Response</text>

  <!-- CACHE MISS path (right) -->
  <line x1="720" y1="430" x2="900" y2="430" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="820" y="420" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">NO (MISS)</text>

  <!-- Cache Miss box -->
  <rect x="860" y="400" width="300" height="140" rx="10" fill="url(#cacheMissGrad)" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="1010" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">CACHE MISS</text>
  <text x="1010" y="452" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Content not in edge cache</text>
  <text x="1010" y="472" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">or TTL expired</text>
  <text x="1010" y="492" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Must fetch from origin</text>
  <text x="1010" y="512" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Headers: X-Cache: MISS</text>
  <text x="1010" y="532" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Latency: 100-500ms+</text>

  <!-- Arrow from Cache Miss to Origin -->
  <line x1="1010" y1="540" x2="1010" y2="580" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Origin Server -->
  <rect x="860" y="580" width="300" height="80" rx="10" fill="#fef3c7" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <text x="1010" y="610" text-anchor="middle" font-size="14" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Origin Server</text>
  <text x="1010" y="632" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Application server / database</text>
  <text x="1010" y="648" text-anchor="middle" font-size="11" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Generates response with Cache-Control headers</text>

  <!-- Arrow from Origin back to Edge (populate cache) -->
  <path d="M 860 620 Q 600 660 600 350" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="700" y="655" font-size="11" font-weight="600" fill="#1e40af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Response + Cache Population</text>

  <!-- Arrow from Edge to User (after miss) -->
  <path d="M 380 315 Q 250 250 470 145" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="260" y="210" font-size="11" font-weight="600" fill="#1e40af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Cached Response</text>

  <!-- ==================== PART 2: CACHE INVALIDATION METHODS ==================== -->
  <text x="600" y="720" text-anchor="middle" font-size="17" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Cache Invalidation Methods</text>

  <!-- Method 1: Purge by URL -->
  <rect x="40" y="745" width="360" height="170" rx="10" fill="url(#invalidateGrad)" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="760" width="320" height="35" rx="6" fill="#ea580c"/>
  <text x="220" y="783" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Method 1: Purge by URL</text>
  <text x="220" y="810" text-anchor="middle" font-size="12" fill="#1f2937" font-family="'Courier New', Courier, monospace">PURGE https://cdn.example.com/assets/img.png</text>
  <text x="220" y="835" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Removes specific URL from all edge caches</text>
  <text x="220" y="855" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Precision targeting, minimal cache impact</text>
  <text x="220" y="875" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Best for: single file updates, image replacements</text>
  <rect x="100" y="885" width="240" height="22" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="220" y="901" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Propagation: 10-30 seconds across PoPs</text>

  <!-- Method 2: Purge by Tag -->
  <rect x="420" y="745" width="360" height="170" rx="10" fill="url(#invalidateGrad)" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="440" y="760" width="320" height="35" rx="6" fill="#ea580c"/>
  <text x="600" y="783" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Method 2: Purge by Cache Tag</text>
  <text x="600" y="810" text-anchor="middle" font-size="12" fill="#1f2937" font-family="'Courier New', Courier, monospace">PURGE-Tag: product-catalog, electronics</text>
  <text x="600" y="835" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Removes all URLs with matching cache tags</text>
  <text x="600" y="855" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Logical grouping without knowing exact URLs</text>
  <text x="600" y="875" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Best for: product updates, CMS content changes</text>
  <rect x="480" y="885" width="240" height="22" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="600" y="901" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Propagation: 30-60 seconds across PoPs</text>

  <!-- Method 3: Purge All -->
  <rect x="800" y="745" width="360" height="170" rx="10" fill="url(#invalidateGrad)" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="820" y="760" width="320" height="35" rx="6" fill="#dc2626"/>
  <text x="980" y="783" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Method 3: Purge Everything</text>
  <text x="980" y="810" text-anchor="middle" font-size="12" fill="#1f2937" font-family="'Courier New', Courier, monospace">PURGE ALL /api/v1/cache/invalidate</text>
  <text x="980" y="835" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Invalidates entire CDN cache globally</text>
  <text x="980" y="855" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Massive origin load on next requests</text>
  <text x="980" y="875" text-anchor="middle" font-size="11" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Best for: emergencies, full deployments</text>
  <rect x="860" y="885" width="240" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="980" y="901" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Propagation: 1-5 minutes across PoPs</text>

  <!-- ==================== PART 3: INVALIDATION FLOW ==================== -->
  <text x="600" y="955" text-anchor="middle" font-size="17" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Cache Invalidation Flow Diagram</text>

  <!-- Invalidation trigger -->
  <rect x="470" y="975" width="260" height="40" rx="20" fill="#dc2626" filter="url(#shadow)"/>
  <text x="600" y="1001" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Content Update Triggered</text>

  <!-- Arrow down -->
  <line x1="600" y1="1015" x2="600" y2="1040" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Invalidation API -->
  <rect x="420" y="1040" width="360" height="45" rx="8" fill="#fef3c7" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="1067" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">CDN Invalidation API Call</text>
  <text x="600" y="1080" text-anchor="middle" font-size="10" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">URL / Tag / All method selected</text>
</svg>