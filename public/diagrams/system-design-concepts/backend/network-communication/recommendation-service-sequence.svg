<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Recommendation Service: Sequence Diagram</text>
  <text x="450" y="58" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Client → API Gateway → Recommendation Service → User Service → Product Service → Response Aggregation</text>

  <!-- Lifelines (vertical dashed lines) -->
  <!-- Client lifeline -->
  <line x1="100" y1="90" x2="100" y2="680" stroke="#2563eb" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- API Gateway lifeline -->
  <line x1="280" y1="90" x2="280" y2="680" stroke="#d97706" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Recommendation Service lifeline -->
  <line x1="460" y1="90" x2="460" y2="680" stroke="#059669" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- User Service lifeline -->
  <line x1="640" y1="90" x2="640" y2="680" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Product Service lifeline -->
  <line x1="820" y1="90" x2="820" y2="680" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Component boxes at top -->
  <rect x="50" y="85" width="100" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Client</text>

  <rect x="230" y="85" width="100" height="40" rx="6" fill="#fefce8" stroke="#d97706" stroke-width="2"/>
  <text x="280" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">API Gateway</text>

  <rect x="400" y="85" width="120" height="40" rx="6" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="460" y="110" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Recommendation Svc</text>

  <rect x="590" y="85" width="100" height="40" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="640" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">User Service</text>

  <rect x="770" y="85" width="100" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="820" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Product Service</text>

  <!-- Step 1: Client → API Gateway -->
  <line x1="100" y1="160" x2="280" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="110" y="138" width="160" height="18" rx="3" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="190" y="152" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">1. GET /recommendations</text>

  <!-- Step 2: API Gateway → Recommendation Service -->
  <line x1="280" y1="200" x2="460" y2="200" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="290" y="178" width="160" height="18" rx="3" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
  <text x="370" y="192" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">2. Forward with auth</text>

  <!-- Step 3: RecSvc → User Service (get user profile) -->
  <line x1="460" y1="240" x2="640" y2="240" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="470" y="218" width="160" height="18" rx="3" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="550" y="232" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">3. GetUserProfile(userId)</text>

  <!-- Step 4: User Service response -->
  <line x1="640" y1="280" x2="460" y2="280" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <rect x="470" y="258" width="160" height="18" rx="3" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text x="550" y="272" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">4. User prefs, history</text>

  <!-- Recommendation Service processing -->
  <rect x="400" y="305" width="120" height="60" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="460" y="325" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Processing</text>
  <text x="460" y="342" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">Collaborative</text>
  <text x="460" y="355" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">filtering + ML model</text>

  <!-- Step 5: RecSvc → Product Service (get product details) -->
  <line x1="460" y1="400" x2="820" y2="400" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="470" y="378" width="180" height="18" rx="3" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="560" y="392" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">5. GetProductBatch([ids...])</text>

  <!-- Step 6: Product Service response -->
  <line x1="820" y1="440" x2="460" y2="440" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <rect x="470" y="418" width="180" height="18" rx="3" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="560" y="432" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">6. Product details, pricing</text>

  <!-- Step 7: RecSvc → Product Service (get inventory) -->
  <line x1="460" y1="480" x2="820" y2="480" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="470" y="458" width="180" height="18" rx="3" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="560" y="472" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">7. CheckAvailability([ids])</text>

  <!-- Step 8: Product Service response -->
  <line x1="820" y1="520" x2="460" y2="520" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <rect x="470" y="498" width="160" height="18" rx="3" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="550" y="512" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">8. Stock levels</text>

  <!-- Response Aggregation -->
  <rect x="400" y="545" width="120" height="60" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="460" y="565" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Aggregate</text>
  <text x="460" y="582" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">Rank + filter +</text>
  <text x="460" y="595" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">personalize</text>

  <!-- Step 9: RecSvc → API Gateway (response) -->
  <line x1="460" y1="630" x2="280" y2="630" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="290" y="608" width="160" height="18" rx="3" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="370" y="622" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">9. Recommendation list</text>

  <!-- Step 10: API Gateway → Client -->
  <line x1="280" y1="665" x2="100" y2="665" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="110" y="643" width="160" height="18" rx="3" fill="#ffffff" stroke="#d97706" stroke-width="1"/>
  <text x="190" y="657" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">10. JSON response</text>

  <!-- Annotations -->
  <rect x="20" y="150" width="60" height="0" rx="0" fill="none" stroke="none"/>
  <text x="50" y="175" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151">HTTP</text>
  <text x="50" y="215" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151">gRPC</text>
  <text x="50" y="255" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151">gRPC</text>
  <text x="50" y="295" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#374151">gRPC</text>

  <!-- Footer -->
  <text x="450" y="690" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Recommendation services use response aggregation (fan-out) to gather data from multiple downstream services before composing the final response.</text>
  <text x="450" y="710" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Latency is determined by the slowest downstream call. Parallel calls + timeouts are critical to avoid cascading delays.</text>
  <text x="450" y="730" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Circuit breakers should wrap each downstream call. Degrade gracefully by returning partial results if a service is unavailable.</text>
</svg>