<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <style>
      .bg-light { fill: #ffffff; }
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .axis { stroke: #94a3b8; stroke-width: 1.5; }
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; fill: #0f172a; }
      .label-small { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; fill: #475569; }
      .label-bold { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; font-weight: 700; }
      .grid { stroke: #e2e8f0; stroke-width: 0.5; stroke-dasharray: 4 4; }
    </style>
  </defs>

  <rect class="bg-light" width="960" height="420" />

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" class="title">Tail Latency Impact: With vs Without Hedging</text>

  <!-- Left Chart: Without Hedging -->
  <text x="250" y="70" text-anchor="middle" class="label" font-weight="700" font-size="16">Without Hedging</text>

  <!-- Axes left -->
  <line x1="80" y1="350" x2="420" y2="350" class="axis" />
  <line x1="80" y1="350" x2="80" y2="100" class="axis" />
  <text x="55" y="225" text-anchor="middle" class="label-small" transform="rotate(-90 55 225)">Latency (ms)</text>
  <text x="250" y="375" text-anchor="middle" class="label-small">Percentile</text>

  <!-- Grid left -->
  <line x1="80" y1="290" x2="420" y2="290" class="grid" />
  <line x1="80" y1="230" x2="420" y2="230" class="grid" />
  <line x1="80" y1="170" x2="420" y2="170" class="grid" />
  <line x1="80" y1="110" x2="420" y2="110" class="grid" />

  <!-- Y-axis labels left -->
  <text x="70" y="294" text-anchor="end" class="label-small">200</text>
  <text x="70" y="234" text-anchor="end" class="label-small">400</text>
  <text x="70" y="174" text-anchor="end" class="label-small">600</text>
  <text x="70" y="114" text-anchor="end" class="label-small">800</text>

  <!-- X-axis labels left -->
  <text x="120" y="368" text-anchor="middle" class="label-small">p50</text>
  <text x="200" y="368" text-anchor="middle" class="label-small">p90</text>
  <text x="280" y="368" text-anchor="middle" class="label-small">p95</text>
  <text x="350" y="368" text-anchor="middle" class="label-small">p99</text>

  <!-- Bars without hedging -->
  <rect x="105" y="320" width="30" height="30" rx="4" fill="#3b82f6" />
  <text x="120" y="315" text-anchor="middle" class="label-small">50ms</text>

  <rect x="185" y="275" width="30" height="75" rx="4" fill="#3b82f6" />
  <text x="200" y="270" text-anchor="middle" class="label-small">200ms</text>

  <rect x="265" y="215" width="30" height="135" rx="4" fill="#3b82f6" />
  <text x="280" y="210" text-anchor="middle" class="label-small">400ms</text>

  <rect x="335" y="115" width="30" height="235" rx="4" fill="#ef4444" />
  <text x="350" y="110" text-anchor="middle" class="label-small" fill="#dc2626">800ms</text>

  <!-- Right Chart: With Hedging -->
  <text x="710" y="70" text-anchor="middle" class="label" font-weight="700" font-size="16">With Hedging</text>

  <!-- Axes right -->
  <line x1="540" y1="350" x2="880" y2="350" class="axis" />
  <line x1="540" y1="350" x2="540" y2="100" class="axis" />
  <text x="515" y="225" text-anchor="middle" class="label-small" transform="rotate(-90 515 225)">Latency (ms)</text>
  <text x="710" y="375" text-anchor="middle" class="label-small">Percentile</text>

  <!-- Grid right -->
  <line x1="540" y1="290" x2="880" y2="290" class="grid" />
  <line x1="540" y1="230" x2="880" y2="230" class="grid" />
  <line x1="540" y1="170" x2="880" y2="170" class="grid" />
  <line x1="540" y1="110" x2="880" y2="110" class="grid" />

  <!-- Y-axis labels right -->
  <text x="530" y="294" text-anchor="end" class="label-small">200</text>
  <text x="530" y="234" text-anchor="end" class="label-small">400</text>
  <text x="530" y="174" text-anchor="end" class="label-small">600</text>
  <text x="530" y="114" text-anchor="end" class="label-small">800</text>

  <!-- X-axis labels right -->
  <text x="580" y="368" text-anchor="middle" class="label-small">p50</text>
  <text x="660" y="368" text-anchor="middle" class="label-small">p90</text>
  <text x="740" y="368" text-anchor="middle" class="label-small">p95</text>
  <text x="810" y="368" text-anchor="middle" class="label-small">p99</text>

  <!-- Bars with hedging -->
  <rect x="565" y="320" width="30" height="30" rx="4" fill="#22c55e" />
  <text x="580" y="315" text-anchor="middle" class="label-small">55ms</text>

  <rect x="645" y="285" width="30" height="65" rx="4" fill="#22c55e" />
  <text x="660" y="280" text-anchor="middle" class="label-small">180ms</text>

  <rect x="725" y="255" width="30" height="95" rx="4" fill="#22c55e" />
  <text x="740" y="250" text-anchor="middle" class="label-small">250ms</text>

  <rect x="795" y="230" width="30" height="120" rx="4" fill="#22c55e" />
  <text x="810" y="225" text-anchor="middle" class="label-small">200ms</text>

  <!-- Improvement arrow -->
  <path d="M 440 150 Q 480 120 520 150" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <rect x="410" y="90" width="100" height="28" rx="6" fill="#7c3aed" />
  <text x="460" y="109" text-anchor="middle" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff;">p99: -75%</text>

  <!-- Key insight box -->
  <rect x="300" y="390" width="360" height="24" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" />
  <text x="480" y="407" text-anchor="middle" class="label-small" font-weight="700" fill="#92400e">Hedging dramatically reduces tail latency with minimal p50 impact</text>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed" />
    </marker>
  </defs>
</svg>
