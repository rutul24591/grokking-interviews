<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">API Versioning Lifecycle</title>
  <desc id="desc">Version lifecycle showing Introduction, Active, Deprecated, and Sunset phases with overlapping v1/v2/v3 timelines, 12-24 month deprecation windows, and deprecation headers in responses</desc>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="1200" height="700" fill="#ffffff"/>

  <!-- Title section -->
  <text x="600" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">API Versioning Lifecycle</text>
  <text x="600" y="60" text-anchor="middle" font-size="15" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Version Phases, Overlapping Timelines, and Deprecation Header Strategy</text>

  <!-- ==================== LIFECYCLE PHASES (Top Section) ==================== -->
  <text x="600" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Version Lifecycle Phases</text>

  <!-- Phase 1: Introduction -->
  <rect x="30" y="120" width="270" height="140" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="135" width="230" height="32" rx="6" fill="#2563eb"/>
  <text x="165" y="157" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Introduction</text>
  <text x="45" y="180" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; New version released</text>
  <text x="45" y="198" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Beta/preview status</text>
  <text x="45" y="216" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Early adopters test</text>
  <text x="45" y="234" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Breaking changes allowed</text>
  <text x="45" y="252" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Duration: 1-3 months</text>

  <!-- Arrow -->
  <line x1="300" y1="190" x2="338" y2="190" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 2: Active -->
  <rect x="340" y="120" width="270" height="140" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="360" y="135" width="230" height="32" rx="6" fill="#16a34a"/>
  <text x="475" y="157" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Active (GA)</text>
  <text x="355" y="180" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Production-ready, stable</text>
  <text x="355" y="198" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Full SLA guarantees</text>
  <text x="355" y="216" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Bug fixes only (no features)</text>
  <text x="355" y="234" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Primary recommended version</text>
  <text x="355" y="252" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Duration: 12-36 months</text>

  <!-- Arrow -->
  <line x1="610" y1="190" x2="648" y2="190" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 3: Deprecated -->
  <rect x="650" y="120" width="270" height="140" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <rect x="670" y="135" width="230" height="32" rx="6" fill="#ca8a04"/>
  <text x="785" y="157" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Deprecated</text>
  <text x="665" y="180" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Deprecation headers sent</text>
  <text x="665" y="198" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Still functional, no new features</text>
  <text x="665" y="216" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Migration guides published</text>
  <text x="665" y="234" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Security fixes only</text>
  <text x="665" y="252" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Duration: 12-24 months</text>

  <!-- Arrow -->
  <line x1="920" y1="190" x2="958" y2="190" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Phase 4: Sunset -->
  <rect x="960" y="120" width="210" height="140" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <rect x="980" y="135" width="170" height="32" rx="6" fill="#dc2626"/>
  <text x="1065" y="157" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Sunset</text>
  <text x="975" y="180" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Version shut down</text>
  <text x="975" y="198" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; 410 Gone responses</text>
  <text x="975" y="216" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Redirect to new version</text>
  <text x="975" y="234" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Error monitoring active</text>
  <text x="975" y="252" font-size="11" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; Final cleanup</text>

  <!-- ==================== TIMELINE (Middle Section) ==================== -->
  <text x="600" y="300" text-anchor="middle" font-size="16" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Overlapping Version Timeline (v1, v2, v3)</text>

  <!-- Timeline axis -->
  <line x1="50" y1="500" x2="1150" y2="500" stroke="#374151" stroke-width="2"/>
  <!-- Month markers -->
  <text x="50" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">M0</text>
  <text x="200" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">M6</text>
  <text x="350" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">M12</text>
  <text x="500" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">M18</text>
  <text x="650" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">M24</text>
  <text x="800" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">M30</text>
  <text x="950" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">M36</text>
  <text x="1100" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#374151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">M42</text>

  <!-- Grid lines -->
  <line x1="200" y1="330" x2="200" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="350" y1="330" x2="350" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="500" y1="330" x2="500" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="650" y1="330" x2="650" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="800" y1="330" x2="800" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="950" y1="330" x2="950" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="1100" y1="330" x2="1100" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- v1 Timeline -->
  <text x="40" y="360" text-anchor="end" font-size="13" font-weight="700" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">v1</text>

  <!-- v1 Introduction (M0-M2) -->
  <rect x="50" y="345" width="100" height="30" rx="4" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="100" y="365" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">INTRO</text>

  <!-- v1 Active (M2-M20) -->
  <rect x="150" y="345" width="300" height="30" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="300" y="365" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">ACTIVE</text>

  <!-- v1 Deprecated (M20-M38) -->
  <rect x="450" y="345" width="300" height="30" rx="4" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="600" y="365" text-anchor="middle" font-size="9" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">DEPRECATED</text>

  <!-- v1 Sunset (M38+) -->
  <rect x="750" y="345" width="100" height="30" rx="4" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
  <text x="800" y="365" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">SUNSET</text>

  <!-- v2 Timeline -->
  <text x="40" y="410" text-anchor="end" font-size="13" font-weight="700" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">v2</text>

  <!-- v2 Introduction (M12-M14) -->
  <rect x="200" y="395" width="100" height="30" rx="4" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="415" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">INTRO</text>

  <!-- v2 Active (M14-M32) -->
  <rect x="300" y="395" width="300" height="30" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="415" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">ACTIVE</text>

  <!-- v2 Deprecated (M32-M50) -->
  <rect x="600" y="395" width="300" height="30" rx="4" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="750" y="415" text-anchor="middle" font-size="9" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">DEPRECATED</text>

  <!-- v3 Timeline -->
  <text x="40" y="460" text-anchor="end" font-size="13" font-weight="700" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">v3</text>

  <!-- v3 Introduction (M24-M26) -->
  <rect x="350" y="445" width="100" height="30" rx="4" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="400" y="465" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">INTRO</text>

  <!-- v3 Active (M26-M44+) -->
  <rect x="450" y="445" width="400" height="30" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="650" y="465" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">ACTIVE</text>

  <!-- Overlap annotations -->
  <rect x="870" y="345" width="280" height="130" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="1010" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">At M30:</text>
  <text x="885" y="392" font-size="10" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; v1 is DEPRECATED (sunset at M38)</text>
  <text x="885" y="412" font-size="10" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; v2 is ACTIVE (primary)</text>
  <text x="885" y="432" font-size="10" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; v3 is ACTIVE (emerging)</text>
  <text x="885" y="452" font-size="10" font-weight="600" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">&#8226; 3 versions served simultaneously</text>

  <!-- ==================== DEPRECATION HEADERS (Bottom Section) ==================== -->
  <text x="600" y="570" text-anchor="middle" font-size="16" font-weight="700" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Deprecation Headers in API Responses</text>

  <!-- Response example during Active phase -->
  <rect x="30" y="590" width="370" height="95" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="45" y="615" font-size="12" font-weight="700" fill="#065f46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Active Phase Response:</text>
  <text x="45" y="638" font-size="11" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">HTTP/1.1 200 OK</text>
  <text x="45" y="656" font-size="11" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">Content-Type: application/json</text>
  <text x="45" y="674" font-size="11" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">(No deprecation headers)</text>

  <!-- Response example during Deprecated phase -->
  <rect x="420" y="590" width="370" height="95" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="435" y="615" font-size="12" font-weight="700" fill="#854d0e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Deprecated Phase Response:</text>
  <text x="435" y="638" font-size="11" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">HTTP/1.1 200 OK</text>
  <text x="435" y="656" font-size="11" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">Deprecation: true</text>
  <text x="435" y="674" font-size="11" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">Sunset: Sat, 01 Jan 2027 00:00:00 GMT</text>

  <!-- Response example during Sunset phase -->
  <rect x="810" y="590" width="360" height="95" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="825" y="615" font-size="12" font-weight="700" fill="#991b1b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">Sunset Phase Response:</text>
  <text x="825" y="638" font-size="11" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">HTTP/1.1 410 Gone</text>
  <text x="825" y="656" font-size="11" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">Sunset: Sat, 01 Jan 2027 00:00:00 GMT</text>
  <text x="825" y="674" font-size="11" font-weight="600" fill="#1f2937" font-family="'Courier New', Courier, monospace">Link: &lt;/api/v3/orders&gt;; rel="successor"</text>
</svg>
