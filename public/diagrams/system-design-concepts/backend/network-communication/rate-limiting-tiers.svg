<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Tiered Rate Limiting Architecture</title>
  <desc id="desc">Tiered rate limiting showing different limits for free, premium, and enterprise client categories</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Tiered Rate Limiting</text>
  
  <!-- API Gateway -->
  <rect x="50" y="70" width="180" height="100" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="140" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="white">API Gateway</text>
  <text x="140" y="130" text-anchor="middle" font-size="10" fill="white">Rate Limiter</text>
  <text x="140" y="150" text-anchor="middle" font-size="10" fill="white">Client ID Check</text>
  
  <!-- Rate Limiter Logic -->
  <rect x="280" y="70" width="240" height="100" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Rate Limiter</text>
  <text x="400" y="125" text-anchor="middle" font-size="10" fill="white">Identify client tier</text>
  <text x="400" y="145" text-anchor="middle" font-size="10" fill="white">Apply tier-specific limits</text>
  <text x="400" y="160" text-anchor="middle" font-size="10" fill="white">Track usage counters</text>
  
  <!-- Backend Services -->
  <rect x="570" y="70" width="180" height="100" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="660" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Backend</text>
  <text x="660" y="130" text-anchor="middle" font-size="10" fill="white">Services</text>
  <text x="660" y="150" text-anchor="middle" font-size="10" fill="white">API Endpoints</text>
  
  <!-- Flow Arrows -->
  <defs>
    <marker id="arrowFlow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
  </defs>
  
  <line x1="230" y1="120" x2="280" y2="120" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowFlow)"/>
  <line x1="520" y1="120" x2="570" y2="120" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowFlow)"/>
  
  <!-- Tier 1: Free -->
  <rect x="50" y="200" width="220" height="140" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="160" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Free Tier</text>
  
  <!-- Free tier limits -->
  <rect x="70" y="240" width="180" height="35" rx="4" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="160" y="262" text-anchor="middle" font-size="11" fill="white">100 requests/hour</text>
  
  <rect x="70" y="285" width="180" height="35" rx="4" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="160" y="307" text-anchor="middle" font-size="11" fill="white">10 requests/second</text>
  
  <rect x="70" y="330" width="180" height="25" rx="4" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="160" y="347" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Basic API access</text>
  
  <!-- Tier 2: Premium -->
  <rect x="290" y="200" width="220" height="140" rx="8" fill="var(--bg-theme, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="400" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Premium Tier</text>
  
  <!-- Premium tier limits -->
  <rect x="310" y="240" width="180" height="35" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="1"/>
  <text x="400" y="262" text-anchor="middle" font-size="11" fill="white">10,000 requests/hour</text>
  
  <rect x="310" y="285" width="180" height="35" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="1"/>
  <text x="400" y="307" text-anchor="middle" font-size="11" fill="white">100 requests/second</text>
  
  <rect x="310" y="330" width="180" height="25" rx="4" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="400" y="347" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Priority support + all endpoints</text>
  
  <!-- Tier 3: Enterprise -->
  <rect x="530" y="200" width="220" height="140" rx="8" fill="var(--bg-theme, #dbeafe)" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="640" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Enterprise Tier</text>
  
  <!-- Enterprise tier limits -->
  <rect x="550" y="240" width="180" height="35" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="640" y="262" text-anchor="middle" font-size="11" fill="white">1,000,000 requests/hour</text>
  
  <rect x="550" y="285" width="180" height="35" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="640" y="307" text-anchor="middle" font-size="11" fill="white">1,000 requests/second</text>
  
  <rect x="550" y="330" width="180" height="25" rx="4" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="640" y="347" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Custom limits + SLA</text>
  
  <!-- Client Examples -->
  <rect x="50" y="370" width="700" height="120" rx="8" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Client Identification Methods</text>
  
  <!-- Identification methods -->
  <rect x="70" y="410" width="180" height="70" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="160" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">API Key</text>
  <text x="160" y="452" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">X-API-Key header</text>
  <text x="160" y="467" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Most common</text>
  
  <rect x="270" y="410" width="180" height="70" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="360" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">OAuth Token</text>
  <text x="360" y="452" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">JWT claims</text>
  <text x="360" y="467" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">User-based limits</text>
  
  <rect x="470" y="410" width="180" height="70" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="560" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">IP Address</text>
  <text x="560" y="452" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Source IP lookup</text>
  <text x="560" y="467" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Fallback method</text>
  
  <rect x="670" y="410" width="80" height="70" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="710" y="442" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">+ More</text>
  <text x="710" y="462" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">(Tenant ID,</text>
  <text x="710" y="475" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">User ID)</text>
</svg>
