<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <!-- Background -->
  <rect width="900" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">Forward Proxy Architecture</text>
  <text x="450" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151">Client-side explicit proxy configuration for outbound traffic management</text>

  <!-- Main Flow Section -->
  <!-- Client Box -->
  <rect x="40" y="110" width="180" height="100" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="130" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#111827">Client</text>
  <text x="130" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">(Browser / App)</text>
  <text x="130" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Proxy Config Set</text>

  <!-- Arrow: Client to Forward Proxy -->
  <line x1="220" y1="160" x2="320" y2="160" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="270" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">HTTP/HTTPS</text>
  <text x="270" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Request</text>

  <!-- Forward Proxy Box -->
  <rect x="320" y="100" width="220" height="120" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <rect x="320" y="100" width="220" height="32" rx="10" fill="#1f2937"/>
  <rect x="320" y="120" width="220" height="12" fill="#1f2937"/>
  <text x="430" y="123" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Forward Proxy</text>
  <text x="430" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Intercepts &amp; forwards</text>
  <text x="430" y="176" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">outbound requests</text>
  <text x="430" y="194" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">(Squid, Nginx, etc.)</text>

  <!-- Arrow: Forward Proxy to Internet -->
  <line x1="540" y1="160" x2="660" y2="160" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="600" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Forwarded</text>
  <text x="600" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Request</text>

  <!-- Internet Cloud -->
  <path d="M680 110 Q690 90 720 95 Q740 80 770 95 Q800 85 810 110 Q825 130 810 150 Q820 170 800 180 Q780 195 750 185 Q720 195 700 180 Q680 190 670 170 Q655 150 670 130 Z" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="745" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Internet /</text>
  <text x="745" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Target Servers</text>

  <!-- Use Cases Section -->
  <rect x="40" y="260" width="820" height="2" fill="#e5e7eb"/>
  <text x="40" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Use Cases</text>

  <!-- Use Case 1: Content Filtering -->
  <rect x="40" y="320" width="190" height="130" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <circle cx="62" cy="345" r="12" fill="#1f2937"/>
  <text x="62" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">1</text>
  <text x="82" y="349" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">Content Filtering</text>
  <text x="50" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Block access to restricted</text>
  <text x="50" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">domains and categories</text>
  <text x="50" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">URL filtering, MIME-type</text>
  <text x="50" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">inspection, policy enforcement</text>

  <!-- Use Case 2: Caching -->
  <rect x="250" y="320" width="190" height="130" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <circle cx="272" cy="345" r="12" fill="#1f2937"/>
  <text x="272" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">2</text>
  <text x="292" y="349" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">Caching</text>
  <text x="260" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Store frequently accessed</text>
  <text x="260" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">resources locally</text>
  <text x="260" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Reduces bandwidth, improves</text>
  <text x="260" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">response time, lower latency</text>

  <!-- Use Case 3: Anonymization -->
  <rect x="460" y="320" width="190" height="130" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <circle cx="482" cy="345" r="12" fill="#1f2937"/>
  <text x="482" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">3</text>
  <text x="502" y="349" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">Anonymization</text>
  <text x="470" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Strip client IP from</text>
  <text x="470" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">outbound requests</text>
  <text x="470" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Target sees proxy IP, not</text>
  <text x="470" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">client&apos;s real IP address</text>

  <!-- Use Case 4: Authentication -->
  <rect x="670" y="320" width="190" height="130" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <circle cx="692" cy="345" r="12" fill="#1f2937"/>
  <text x="692" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">4</text>
  <text x="712" y="349" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">Authentication</text>
  <text x="680" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Require credentials</text>
  <text x="680" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">before allowing access</text>
  <text x="680" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">LDAP, Kerberos, or Basic</text>
  <text x="680" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Auth proxy-authorization</text>

  <!-- Configuration Detail Section -->
  <rect x="40" y="480" width="820" height="2" fill="#e5e7eb"/>
  <text x="40" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827">Client Configuration</text>

  <!-- Config Box -->
  <rect x="40" y="535" width="820" height="160" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>

  <!-- Config items -->
  <rect x="60" y="555" width="20" height="20" fill="#1f2937"/>
  <text x="70" y="570" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">&#x2713;</text>
  <text x="90" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Explicit Proxy Configuration Required</text>
  <text x="90" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Each client must be configured with proxy address (HTTP_PROXY, https_proxy env vars, or browser settings)</text>

  <rect x="60" y="610" width="20" height="20" fill="#1f2937"/>
  <text x="70" y="625" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">&#x2713;</text>
  <text x="90" y="625" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Proxy Auto-Config (PAC) Files</text>
  <text x="90" y="645" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">JavaScript-based rules to determine which requests go through proxy vs direct connection (WPAD protocol)</text>

  <rect x="60" y="665" width="20" height="20" fill="#1f2937"/>
  <text x="70" y="680" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">&#x2713;</text>
  <text x="90" y="680" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Bypass List / No-Proxy Rules</text>
  <text x="90" y="700" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Internal domains (intranet, localhost) excluded from proxy routing via NO_PROXY environment variable</text>

  <!-- Arrow head marker -->
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937"/>
    </marker>
  </defs>
</svg>
