<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" width="900" height="680">
  <!-- White background -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">Request Hedging Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#374151">Sending hedged replicas to reduce tail latency (p99)</text>
  
  <!-- Client -->
  <rect x="350" y="90" width="200" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#111827">Client Service</text>
  <text x="450" y="133" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">With hedging logic</text>
  
  <!-- Primary request -->
  <line x1="400" y1="150" x2="200" y2="220" stroke="#2563eb" stroke-width="2"/>
  <polygon points="195,215 200,225 205,218" fill="#2563eb"/>
  <text x="270" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2563eb">Primary Request</text>
  <text x="270" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">t = 0ms</text>
  
  <!-- Hedge delay indicator -->
  <rect x="430" y="150" width="40" height="70" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#111827">Hedge</text>
  <text x="450" y="187" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#111827">Delay</text>
  <text x="450" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#d97706">50ms</text>
  
  <!-- Hedge replica request -->
  <line x1="500" y1="150" x2="700" y2="220" stroke="#d97706" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="695,215 700,225 705,218" fill="#d97706"/>
  <text x="620" y="175" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#d97706">Hedge Replica</text>
  <text x="620" y="190" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">t = 50ms</text>
  
  <!-- Backend servers -->
  <rect x="120" y="220" width="160" height="70" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="200" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Backend A</text>
  <text x="200" y="262" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">(Primary path)</text>
  <text x="200" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#059669">Response: 200ms</text>
  
  <rect x="620" y="220" width="160" height="70" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="700" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Backend B</text>
  <text x="700" y="262" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">(Hedge path)</text>
  <text x="700" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#db2777">Response: 120ms</text>
  
  <!-- Primary response (slow straggler) -->
  <line x1="200" y1="290" x2="400" y2="360" stroke="#059669" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="270" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Response at t=200ms</text>
  <text x="270" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#dc2626">SLOW - IGNORED</text>
  
  <!-- Hedge response (faster) -->
  <line x1="700" y1="290" x2="500" y2="360" stroke="#db2777" stroke-width="2"/>
  <text x="620" y="315" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">Response at t=170ms</text>
  <text x="620" y="330" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#059669">FAST - USED</text>
  
  <!-- Winner box -->
  <rect x="350" y="360" width="200" height="50" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="450" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827">Winner: Hedge Response</text>
  <text x="450" y="398" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Total latency: 170ms</text>
  
  <!-- Cancel indicator -->
  <rect x="350" y="430" width="200" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="450" y="447" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#991b1b">CANCEL Primary Request</text>
  <text x="450" y="463" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Resources freed</text>
  
  <!-- Latency comparison section -->
  <rect x="40" y="500" width="820" height="35" rx="5" fill="#111827"/>
  <text x="450" y="523" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Latency Improvement with Hedging</text>
  
  <!-- Without hedging timeline -->
  <text x="50" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">Without Hedging:</text>
  <rect x="200" y="545" width="400" height="25" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="400" y="562" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#991b1b">p50: 50ms | p95: 150ms | p99: 500ms (stragglers)</text>
  
  <!-- With hedging timeline -->
  <text x="50" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827">With Hedging:</text>
  <rect x="200" y="585" width="280" height="25" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="340" y="602" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#166534">p50: 50ms | p95: 80ms | p99: 120ms</text>
  
  <!-- Improvement arrow -->
  <line x1="500" y1="585" x2="680" y2="585" stroke="#059669" stroke-width="2"/>
  <polygon points="675,580 685,585 675,590" fill="#059669"/>
  <text x="590" y="575" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#059669">76% reduction</text>
  <text x="590" y="615" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">in p99 latency</text>
  
  <!-- Key insight box -->
  <rect x="40" y="630" width="400" height="40" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="50" y="647" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Key Insight:</text>
  <text x="50" y="663" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Hedge at p95 percentile to catch stragglers</text>
  
  <rect x="460" y="630" width="400" height="40" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="470" y="647" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Trade-off:</text>
  <text x="470" y="663" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Extra compute cost vs latency SLA guarantees</text>
</svg>
