<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">TLS Termination Models: Edge vs End-to-End vs mTLS</text>
  <!-- Edge TLS Termination -->
  <rect x="30" y="70" width="270" height="400" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="70" width="270" height="50" rx="12" fill="#3b82f6"/>
  <text x="165" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Edge TLS Termination</text>
  <!-- Flow -->
  <rect x="50" y="140" width="230" height="50" rx="6" fill="#60a5fa"/>
  <text x="165" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Client (HTTPS)</text>
  <text x="165" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#dbeafe">TLS encrypted</text>
  <line x1="165" y1="190" x2="165" y2="220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <rect x="50" y="220" width="230" height="50" rx="6" fill="#3b82f6"/>
  <text x="165" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Load Balancer</text>
  <text x="165" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#dbeafe">TLS terminates here</text>
  <line x1="165" y1="270" x2="165" y2="300" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowred)"/>
  <rect x="50" y="300" width="230" height="50" rx="6" fill="#991b1b"/>
  <text x="165" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Backend (HTTP)</text>
  <text x="165" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#fecaca">UNENCRYPTED</text>
  <!-- Pros/Cons -->
  <rect x="50" y="370" width="230" height="80" rx="6" fill="#dbeafe"/>
  <text x="165" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">+ Simple, centralized certs</text>
  <text x="165" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">+ LB can inspect HTTP</text>
  <text x="165" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">- Internal traffic unencrypted</text>
  <text x="165" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1e40af">Best: isolated VPC networks</text>
  <!-- End-to-End TLS -->
  <rect x="315" y="70" width="270" height="400" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="315" y="70" width="270" height="50" rx="12" fill="#f59e0b"/>
  <text x="450" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">End-to-End TLS (Re-encrypt)</text>
  <!-- Flow -->
  <rect x="335" y="140" width="230" height="50" rx="6" fill="#fbbf24"/>
  <text x="450" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Client (HTTPS)</text>
  <text x="450" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#fef3c7">TLS encrypted</text>
  <line x1="450" y1="190" x2="450" y2="220" stroke="#f59e0b" stroke-width="2" marker-end="url(#arroworange)"/>
  <rect x="335" y="220" width="230" height="50" rx="6" fill="#f59e0b"/>
  <text x="450" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Load Balancer</text>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#fef3c7">Terminates + re-encrypts</text>
  <line x1="450" y1="270" x2="450" y2="300" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <rect x="335" y="300" width="230" height="50" rx="6" fill="#10b981"/>
  <text x="450" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Backend (HTTPS)</text>
  <text x="450" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">ENCRYPTED</text>
  <!-- Pros/Cons -->
  <rect x="335" y="370" width="230" height="80" rx="6" fill="#fef3c7"/>
  <text x="450" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">+ Encrypted throughout</text>
  <text x="450" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">+ Compliance-friendly</text>
  <text x="450" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">- Backend cert management</text>
  <text x="450" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#92400e">Best: regulated industries</text>
  <!-- mTLS -->
  <rect x="600" y="70" width="270" height="400" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <rect x="600" y="70" width="270" height="50" rx="12" fill="#10b981"/>
  <text x="735" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Mutual TLS (mTLS)</text>
  <!-- Flow -->
  <rect x="620" y="140" width="230" height="50" rx="6" fill="#34d399"/>
  <text x="735" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Client (HTTPS + cert)</text>
  <text x="735" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">TLS + client certificate</text>
  <line x1="735" y1="190" x2="735" y2="220" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <rect x="620" y="220" width="230" height="50" rx="6" fill="#10b981"/>
  <text x="735" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Load Balancer</text>
  <text x="735" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">Verifies client cert, re-encrypts</text>
  <line x1="735" y1="270" x2="735" y2="300" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <rect x="620" y="300" width="230" height="50" rx="6" fill="#065f46"/>
  <text x="735" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Backend (HTTPS + cert)</text>
  <text x="735" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">ENCRYPTED + authenticated</text>
  <!-- Pros/Cons -->
  <rect x="620" y="370" width="230" height="80" rx="6" fill="#d1fae5"/>
  <text x="735" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">+ Both sides authenticated</text>
  <text x="735" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">+ Zero-trust networking</text>
  <text x="735" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">- Complex cert management</text>
  <text x="735" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#065f46">Best: multi-tenant, zero-trust</text>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">Edge: simple but internal traffic exposed. End-to-end: encrypted throughout but backend cert overhead. mTLS: maximum security but complex certificate management</text>
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>