<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Immutable Infrastructure: Image Building Pipeline</text>
  <!-- Source code -->
  <rect x="40" y="80" width="140" height="70" rx="8" fill="#3b82f6"/>
  <text x="110" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Source</text>
  <text x="110" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#dbeafe">Code</text>
  <!-- Arrow -->
  <line x1="180" y1="115" x2="230" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Dependencies -->
  <rect x="230" y="80" width="140" height="70" rx="8" fill="#6366f1"/>
  <text x="300" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">OS +</text>
  <text x="300" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#e0e7ff">Dependencies</text>
  <!-- Arrow -->
  <line x1="370" y1="115" x2="420" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Configuration -->
  <rect x="420" y="80" width="140" height="70" rx="8" fill="#8b5cf6"/>
  <text x="490" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">App</text>
  <text x="490" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#ede9fe">Configuration</text>
  <!-- Arrow -->
  <line x1="560" y1="115" x2="610" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Image Build -->
  <rect x="610" y="80" width="140" height="70" rx="8" fill="#a855f7"/>
  <text x="680" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Image</text>
  <text x="680" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#f3e8ff">Build (Packer)</text>
  <!-- Arrow down -->
  <line x1="680" y1="150" x2="680" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Version & Registry -->
  <rect x="610" y="200" width="140" height="70" rx="8" fill="#d946ef"/>
  <text x="680" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Version</text>
  <text x="680" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#faf5ff">AMI-20260404-v1.2.3</text>
  <!-- Arrow down -->
  <line x1="680" y1="270" x2="680" y2="320" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Image Registry -->
  <rect x="610" y="320" width="140" height="70" rx="8" fill="#ec4899"/>
  <text x="680" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Image</text>
  <text x="680" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#fce7f3">Registry</text>
  <!-- Arrow left to servers -->
  <line x1="610" y1="355" x2="500" y2="355" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="355" x2="400" y2="355" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="355" x2="300" y2="355" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="355" x2="200" y2="355" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Servers launched from image -->
  <rect x="40" y="320" width="140" height="70" rx="8" fill="#10b981"/>
  <text x="110" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Server 1</text>
  <text x="110" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#d1fae5">v1.2.3</text>
  <rect x="200" y="320" width="140" height="70" rx="8" fill="#10b981"/>
  <text x="270" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Server 2</text>
  <text x="270" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#d1fae5">v1.2.3</text>
  <rect x="360" y="320" width="140" height="70" rx="8" fill="#10b981"/>
  <text x="430" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Server 3</text>
  <text x="430" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#d1fae5">v1.2.3</text>
  <!-- Key insight box -->
  <rect x="40" y="420" width="820" height="60" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">All servers are identical — built from the same image, ensuring reproducibility, no configuration drift, and instant rollback to previous image version</text>
  <text x="450" y="468" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Updates replace servers entirely — no in-place modifications, no SSH-based configuration changes</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>