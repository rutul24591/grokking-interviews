<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Container Image Layers</text>
  <!-- Layer 1: Base -->
  <rect x="200" y="80" width="500" height="70" rx="4" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Layer 1: Base Image (Ubuntu 22.04)</text>
  <text x="450" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">77 MB — OS libraries, utilities</text>
  <!-- Layer 2: Dependencies -->
  <rect x="200" y="160" width="500" height="70" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Layer 2: Dependencies</text>
  <text x="450" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">45 MB — Node.js, npm packages</text>
  <!-- Layer 3: Source -->
  <rect x="200" y="240" width="500" height="70" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Layer 3: Application Code</text>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">5 MB — Source code, config</text>
  <!-- Layer 4: Runtime -->
  <rect x="200" y="320" width="500" height="70" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">Layer 4: Runtime Config (Writable)</text>
  <text x="450" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Created when container runs</text>
  <!-- Summary -->
  <rect x="50" y="410" width="800" height="120" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Key Properties</text>
  <rect x="70" y="460" width="240" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Layers are cached</text>
  <text x="190" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Unchanged layers reused</text>
  <rect x="330" y="460" width="240" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Layers are shared</text>
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Multiple images share base</text>
  <rect x="590" y="460" width="240" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Image is immutable</text>
  <text x="710" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Only runtime layer writable</text>
</svg>
