<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Rolling Deployment</title>
  <desc id="desc">Rolling deployment strategy with gradual instance replacement</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Rolling Deployment</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Gradual instance replacement with zero downtime</text>
  
  <!-- Initial State -->
  <rect x="30" y="85" width="400" height="180" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Initial State</text>
  
  <!-- All v1 instances -->
  <rect x="50" y="125" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="85" y="150" text-anchor="middle" font-size="9" fill="white">v1.0</text>
  <text x="85" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="130" y="125" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="165" y="150" text-anchor="middle" font-size="9" fill="white">v1.0</text>
  <text x="165" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="210" y="125" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="245" y="150" text-anchor="middle" font-size="9" fill="white">v1.0</text>
  <text x="245" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="290" y="125" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="325" y="150" text-anchor="middle" font-size="9" fill="white">v1.0</text>
  <text x="325" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="130" y="200" width="140" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="200" y="225" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Load Balancer</text>
  <text x="200" y="240" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Traffic: 100% to v1.0</text>
  
  <!-- Rolling Phase 1 -->
  <rect x="470" y="85" width="400" height="180" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Phase 1: 25% Updated</text>
  
  <rect x="490" y="125" width="70" height="55" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="525" y="150" text-anchor="middle" font-size="9" fill="white">v2.0</text>
  <text x="525" y="165" text-anchor="middle" font-size="8" fill="#fcd34d">Deploying</text>
  
  <rect x="570" y="125" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="605" y="150" text-anchor="middle" font-size="9" fill="white">v1.0</text>
  <text x="605" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="650" y="125" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="685" y="150" text-anchor="middle" font-size="9" fill="white">v1.0</text>
  <text x="685" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="730" y="125" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="765" y="150" text-anchor="middle" font-size="9" fill="white">v1.0</text>
  <text x="765" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="570" y="200" width="200" height="50" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="670" y="225" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Load Balancer</text>
  <text x="670" y="240" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">25% v2.0, 75% v1.0</text>
  
  <!-- Rolling Phase 2 -->
  <rect x="30" y="285" width="400" height="180" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Phase 2: 50% Updated</text>
  
  <rect x="50" y="325" width="70" height="55" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="85" y="350" text-anchor="middle" font-size="9" fill="white">v2.0</text>
  <text x="85" y="365" text-anchor="middle" font-size="8" fill="#bfdbfe">Healthy</text>
  
  <rect x="130" y="325" width="70" height="55" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="165" y="350" text-anchor="middle" font-size="9" fill="white">v2.0</text>
  <text x="165" y="365" text-anchor="middle" font-size="8" fill="#bfdbfe">Healthy</text>
  
  <rect x="210" y="325" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="245" y="350" text-anchor="middle" font-size="9" fill="white">v1.0</text>
  <text x="245" y="365" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="290" y="325" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="325" y="350" text-anchor="middle" font-size="9" fill="white">v1.0</text>
  <text x="325" y="365" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="130" y="400" width="140" height="50" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="200" y="425" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Load Balancer</text>
  <text x="200" y="440" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">50% v2.0, 50% v1.0</text>
  
  <!-- Complete -->
  <rect x="470" y="285" width="400" height="180" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Complete: 100% v2.0</text>
  
  <rect x="490" y="325" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="525" y="350" text-anchor="middle" font-size="9" fill="white">v2.0</text>
  <text x="525" y="365" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="570" y="325" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="605" y="350" text-anchor="middle" font-size="9" fill="white">v2.0</text>
  <text x="605" y="365" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="650" y="325" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="685" y="350" text-anchor="middle" font-size="9" fill="white">v2.0</text>
  <text x="685" y="365" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="730" y="325" width="70" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="765" y="350" text-anchor="middle" font-size="9" fill="white">v2.0</text>
  <text x="765" y="365" text-anchor="middle" font-size="8" fill="#6ee7b7">Healthy</text>
  
  <rect x="570" y="400" width="200" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="425" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Load Balancer</text>
  <text x="670" y="440" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">100% v2.0</text>
  
  <!-- Bottom: Key Benefits -->
  <rect x="30" y="480" width="840" height="50" rx="6" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Key Benefits:</text>
  <text x="540" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">✓ Zero downtime</text>
  <text x="640" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">✓ Gradual rollout</text>
  <text x="750" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">✓ Easy rollback</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
