<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <rect width="900" height="550" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Immutable Deployment Flow</text>

  <!-- Step 1: Code Commit -->
  <rect x="40" y="75" width="190" height="130" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="135" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1e40af">1. Code Commit</text>
  <text x="135" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Developer commits code</text>
  <text x="135" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">PR reviewed &amp; merged</text>
  <text x="135" y="181" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">to main branch</text>

  <!-- Arrow 1 -->
  <line x1="230" y1="140" x2="270" y2="140" stroke="#64748b" stroke-width="2"/>
  <polygon points="270,135 280,140 270,145" fill="#64748b"/>

  <!-- Step 2: Build Image -->
  <rect x="280" y="75" width="190" height="130" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="375" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#92400e">2. Build Image</text>
  <text x="375" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Install dependencies</text>
  <text x="375" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Version image (v2.0)</text>
  <text x="375" y="181" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Run tests</text>

  <!-- Arrow 2 -->
  <line x1="470" y1="140" x2="510" y2="140" stroke="#64748b" stroke-width="2"/>
  <polygon points="510,135 520,140 510,145" fill="#64748b"/>

  <!-- Step 3: Store Image -->
  <rect x="520" y="75" width="190" height="130" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="615" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">3. Store Image</text>
  <text x="615" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Image registry</text>
  <text x="615" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Versioned (v1.0, v2.0)</text>
  <text x="615" y="181" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Immutable artifact</text>

  <!-- Arrow 3 -->
  <line x1="710" y1="140" x2="750" y2="140" stroke="#64748b" stroke-width="2"/>
  <polygon points="750,135 760,140 750,145" fill="#64748b"/>

  <!-- Step 4: Deploy -->
  <rect x="760" y="75" width="110" height="130" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="815" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">4. Deploy</text>
  <text x="815" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">New servers</text>
  <text x="815" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Route traffic</text>
  <text x="815" y="181" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Terminate old</text>

  <!-- Server Replacement Process -->
  <rect x="40" y="230" width="820" height="130" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Server Replacement Process</text>

  <rect x="60" y="280" width="240" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="180" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Provision new servers</text>
  <text x="180" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#64748b">From new image (v2.0)</text>

  <rect x="330" y="280" width="240" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Health check new servers</text>
  <text x="450" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#64748b">Verify healthy before routing</text>

  <rect x="600" y="280" width="240" height="65" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="720" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Route traffic, terminate old</text>
  <text x="720" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#64748b">Zero-downtime replacement</text>

  <!-- Key Principle -->
  <rect x="40" y="385" width="820" height="80" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#15803d">No In-Place Updates</text>
  <text x="450" y="442" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#166534">Old servers (v1.0) are never modified. New servers (v2.0) are provisioned from the new image, traffic is routed to them, and old servers are terminated.</text>

  <!-- Version History -->
  <rect x="40" y="485" width="820" height="50" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="450" y="515" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#a16207">Image Version History: v1.0 &#8594; v1.1 &#8594; v1.2 &#8594; v2.0 (current) &#8212; Previous versions retained for rollback</text>
</svg>
