<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Container Orchestration</title>
  <desc id="desc">Container orchestration showing Kubernetes architecture, scheduling, and scaling</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Container Orchestration</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Kubernetes architecture, scheduling, and auto-scaling</text>
  
  <!-- Kubernetes Architecture -->
  <rect x="30" y="85" width="550" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="305" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Kubernetes Architecture</text>
  
  <!-- Control Plane -->
  <rect x="50" y="125" width="240" height="150" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="170" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Control Plane</text>
  
  <!-- API Server -->
  <rect x="60" y="160" width="100" height="40" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="110" y="185" text-anchor="middle" font-size="9" fill="white">API Server</text>
  
  <!-- Scheduler -->
  <rect x="170" y="160" width="100" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="220" y="185" text-anchor="middle" font-size="9" fill="white">Scheduler</text>
  
  <!-- etcd -->
  <rect x="60" y="210" width="100" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="110" y="235" text-anchor="middle" font-size="9" fill="white">etcd</text>
  <text x="110" y="248" text-anchor="middle" font-size="7" fill="#fcd34d">Cluster state</text>
  
  <!-- Controller Manager -->
  <rect x="170" y="210" width="100" height="40" rx="3" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="220" y="235" text-anchor="middle" font-size="9" fill="white">Controller</text>
  <text x="220" y="248" text-anchor="middle" font-size="7" fill="#c4b5fd">Manager</text>
  
  <!-- Worker Nodes -->
  <rect x="310" y="125" width="250" height="150" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="435" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Worker Nodes</text>
  
  <!-- Node 1 -->
  <rect x="320" y="160" width="110" height="105" rx="3" fill="var(--bg-panel-soft, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="375" y="180" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Node 1</text>
  
  <rect x="330" y="190" width="90" height="30" rx="2" fill="var(--bg-theme, #3b82f6)"/>
  <text x="375" y="210" text-anchor="middle" font-size="7" fill="white">kubelet</text>
  
  <rect x="330" y="225" width="40" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="350" y="245" text-anchor="middle" font-size="6" fill="white">Pod</text>
  
  <rect x="375" y="225" width="40" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="395" y="245" text-anchor="middle" font-size="6" fill="white">Pod</text>
  
  <!-- Node 2 -->
  <rect x="440" y="160" width="110" height="105" rx="3" fill="var(--bg-panel-soft, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="495" y="180" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Node 2</text>
  
  <rect x="450" y="190" width="90" height="30" rx="2" fill="var(--bg-theme, #3b82f6)"/>
  <text x="495" y="210" text-anchor="middle" font-size="7" fill="white">kubelet</text>
  
  <rect x="450" y="225" width="40" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="470" y="245" text-anchor="middle" font-size="6" fill="white">Pod</text>
  
  <rect x="495" y="225" width="40" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="515" y="245" text-anchor="middle" font-size="6" fill="white">Pod</text>
  
  <!-- Connection -->
  <line x1="290" y1="200" x2="320" y2="200" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="305" y="190" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Manages</text>
  
  <!-- Scheduling Flow -->
  <rect x="600" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Pod Scheduling Flow</text>
  
  <!-- Pod creation -->
  <rect x="620" y="125" width="100" height="40" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" font-size="9" fill="white">Pod Created</text>
  <text x="670" y="163" text-anchor="middle" font-size="7" fill="#bfdbfe">Pending state</text>
  
  <line x1="670" y1="165" x2="670" y2="195" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <!-- Scheduler -->
  <rect x="620" y="200" width="100" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="670" y="225" text-anchor="middle" font-size="9" fill="white">Scheduler</text>
  <text x="670" y="238" text-anchor="middle" font-size="7" fill="#6ee7b7">Selects node</text>
  
  <line x1="670" y1="240" x2="670" y2="270" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <!-- Kubelet -->
  <rect x="620" y="275" width="100" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="670" y="300" text-anchor="middle" font-size="9" fill="white">Kubelet</text>
  <text x="670" y="313" text-anchor="middle" font-size="7" fill="#fcd34d">Starts containers</text>
  
  <line x1="670" y1="315" x2="670" y2="345" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <!-- Running -->
  <rect x="620" y="350" width="100" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="670" y="375" text-anchor="middle" font-size="9" fill="white">Running</text>
  <text x="670" y="388" text-anchor="middle" font-size="7" fill="#6ee7b7">Healthy</text>
  
  <!-- Auto-Scaling -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Auto-Scaling in Kubernetes</text>
  
  <rect x="50" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="175" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">HPA (Horizontal)</text>
  <text x="175" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Scales pod replicas</text>
  <text x="175" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Based on CPU/memory</text>
  <text x="175" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Most common</text>
  
  <rect x="315" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="440" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">VPA (Vertical)</text>
  <text x="440" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Scales pod resources</text>
  <text x="440" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">CPU/memory limits</text>
  <text x="440" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Requires restart</text>
  
  <rect x="580" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="705" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Cluster Autoscaler</text>
  <text x="705" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Adds/removes nodes</text>
  <text x="705" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">When pods pending</text>
  <text x="705" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Cloud integration</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
