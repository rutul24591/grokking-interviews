<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Container vs Virtual Machine</text>
  <!-- VM Architecture -->
  <rect x="50" y="80" width="380" height="240" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">Virtual Machine</text>
  <!-- Hardware -->
  <rect x="70" y="280" width="340" height="30" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="240" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Hardware</text>
  <!-- Hypervisor -->
  <rect x="70" y="245" width="340" height="30" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="240" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Hypervisor</text>
  <!-- Guest OS -->
  <rect x="70" y="210" width="340" height="30" rx="3" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="240" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Guest OS (Full Kernel)</text>
  <!-- Binaries/Libs -->
  <rect x="70" y="175" width="340" height="30" rx="3" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="240" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Binaries / Libraries</text>
  <!-- App -->
  <rect x="70" y="140" width="340" height="30" rx="3" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="240" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Application</text>
  <!-- VM Stats -->
  <rect x="70" y="320" width="340" height="80" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="240" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Size: Gigabytes | Startup: Minutes</text>
  <text x="240" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Isolation: Strong (separate kernel)</text>
  <text x="240" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Density: Low (fewer per host)</text>
  <!-- Container Architecture -->
  <rect x="470" y="80" width="380" height="240" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">Container</text>
  <!-- Hardware -->
  <rect x="490" y="280" width="340" height="30" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="660" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Hardware</text>
  <!-- Host OS -->
  <rect x="490" y="245" width="340" height="30" rx="3" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="660" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Host OS Kernel (Shared)</text>
  <!-- Container Engine -->
  <rect x="490" y="210" width="340" height="30" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Container Engine (Docker)</text>
  <!-- Binaries/Libs -->
  <rect x="490" y="175" width="340" height="30" rx="3" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="660" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Binaries / Libraries</text>
  <!-- App -->
  <rect x="490" y="140" width="340" height="30" rx="3" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="660" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Application</text>
  <!-- Container Stats -->
  <rect x="490" y="320" width="340" height="80" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="660" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Size: Megabytes | Startup: Seconds</text>
  <text x="660" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Isolation: Moderate (shared kernel)</text>
  <text x="660" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Density: High (more per host)</text>
  <!-- Comparison -->
  <rect x="50" y="420" width="800" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">When to Use Each</text>
  <rect x="70" y="470" width="360" height="45" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="250" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">VMs: Different OS kernels, strong isolation, untrusted workloads</text>
  <rect x="470" y="470" width="360" height="45" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="650" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Containers: App deployment, microservices, CI/CD, development</text>
</svg>
