<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Container Orchestration Scaling</title>
  <desc id="desc">Container orchestration showing HPA, VPA, and cluster autoscaler working together</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Container Orchestration Scaling</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">HPA, VPA, and Cluster Autoscaler working together</text>
  
  <!-- HPA (Horizontal Pod Autoscaler) -->
  <rect x="30" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">HPA (Horizontal)</text>
  
  <!-- Pods scaling -->
  <rect x="50" y="125" width="200" height="100" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Scales Number of Pods</text>
  
  <rect x="60" y="160" width="40" height="50" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="80" y="188" text-anchor="middle" font-size="7" fill="white">Pod 1</text>
  
  <rect x="110" y="160" width="40" height="50" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="130" y="188" text-anchor="middle" font-size="7" fill="white">Pod 2</text>
  
  <rect x="160" y="160" width="40" height="50" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="180" y="188" text-anchor="middle" font-size="7" fill="white">Pod 3</text>
  
  <rect x="210" y="160" width="30" height="50" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="225" y="188" text-anchor="middle" font-size="7" fill="white">+Pod</text>
  
  <text x="150" y="245" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Triggers:</text>
  <text x="150" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• CPU &amp;gt; 70%</text>
  <text x="150" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Memory &amp;gt; 80%</text>
  <text x="150" y="295" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Custom metrics</text>
  
  <text x="150" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Fast scaling</text>
  <text x="150" y="340" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Most common</text>
  
  <!-- VPA (Vertical Pod Autoscaler) -->
  <rect x="315" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">VPA (Vertical)</text>
  
  <!-- Pod resources -->
  <rect x="335" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Scales Pod Resources</text>
  
  <rect x="345" y="160" width="100" height="50" rx="3" fill="var(--bg-theme, #f59e0b)"/>
  <text x="395" y="185" text-anchor="middle" font-size="8" fill="white">CPU: 500m</text>
  <text x="395" y="200" text-anchor="middle" font-size="7" fill="#fcd34d">→ 1000m</text>
  
  <rect x="465" y="160" width="90" height="50" rx="3" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="510" y="185" text-anchor="middle" font-size="8" fill="white">Memory: 512Mi</text>
  <text x="510" y="200" text-anchor="middle" font-size="7" fill="#c4b5fd">→ 1024Mi</text>
  
  <text x="450" y="245" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Triggers:</text>
  <text x="450" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Resource utilization</text>
  <text x="450" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Historical usage</text>
  
  <text x="450" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Requires restart</text>
  <text x="450" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Not for all workloads</text>
  
  <!-- Cluster Autoscaler -->
  <rect x="600" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Cluster Autoscaler</text>
  
  <!-- Nodes scaling -->
  <rect x="620" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Scales Number of Nodes</text>
  
  <rect x="630" y="160" width="60" height="50" rx="2" fill="var(--bg-theme, #3b82f6)"/>
  <text x="660" y="188" text-anchor="middle" font-size="7" fill="white">Node 1</text>
  
  <rect x="700" y="160" width="60" height="50" rx="2" fill="var(--bg-theme, #3b82f6)"/>
  <text x="730" y="188" text-anchor="middle" font-size="7" fill="white">Node 2</text>
  
  <rect x="770" y="160" width="60" height="50" rx="2" fill="var(--bg-theme, #3b82f6)"/>
  <text x="800" y="188" text-anchor="middle" font-size="7" fill="white">Node 3</text>
  
  <rect x="840" y="160" width="40" height="50" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="860" y="188" text-anchor="middle" font-size="7" fill="white">+Node</text>
  
  <text x="735" y="245" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Triggers:</text>
  <text x="735" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Pending pods</text>
  <text x="735" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Low utilization</text>
  
  <text x="735" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Handles capacity</text>
  <text x="735" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Slow (minutes)</text>
  
  <!-- Scaling Coordination -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Scaling Coordination</text>
  
  <rect x="50" y="420" width="800" height="100" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="100" y="450" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">1. HPA</text>
  <text x="100" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Adds pods when CPU high</text>
  
  <text x="300" y="450" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #f59e0b">2. Cluster Autoscaler</text>
  <text x="300" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Adds nodes for pending pods</text>
  
  <text x="550" y="450" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">3. VPA (Optional)</text>
  <text x="550" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Adjusts pod resource requests</text>
  
  <text x="100" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="115" y="505" font-size="10" fill="var(--text-theme, #1e293b">Use HPA + Cluster Autoscaler together</text>
  
  <text x="550" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="565" y="505" font-size="10" fill="var(--text-theme, #1e293b">Don't use HPA + VPA on same resource</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
