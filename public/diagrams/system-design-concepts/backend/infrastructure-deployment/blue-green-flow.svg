<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Blue-Green Deployment Flow</text>
  <!-- Step 1: Blue Active -->
  <rect x="50" y="80" width="180" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">1. Blue Active</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">v1.0 serving traffic</text>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Green is idle</text>
  <path d="M 230 140 L 280 140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Step 2: Deploy to Green -->
  <rect x="280" y="80" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">2. Deploy to Green</text>
  <text x="370" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">v2.0 deployed</text>
  <text x="370" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Health checks run</text>
  <path d="M 460 140 L 510 140" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Step 3: Switch Traffic -->
  <rect x="510" y="80" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">3. Switch Traffic</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Route to Green</text>
  <text x="600" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Instant switch</text>
  <path d="M 690 140 L 740 140" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Step 4: Verify -->
  <rect x="740" y="80" width="130" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="805" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">4. Verify</text>
  <text x="805" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Monitor health</text>
  <text x="805" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Green is active</text>
  <!-- Rollback path -->
  <path d="M 600 200 L 600 250 L 140 250 L 140 200" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  <text x="370" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">Rollback if issues detected</text>
  <!-- Next deployment -->
  <rect x="50" y="270" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Next Deployment Cycle</text>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Deploy v3.0 to Blue (now inactive), test, switch traffic. Blue and green alternate roles on each deployment.</text>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Previous version is retained until overwritten, providing safety net for rollback.</text>
  <!-- Key Benefits -->
  <rect x="50" y="390" width="800" height="140" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Key Benefits</text>
  <rect x="70" y="440" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Zero-downtime deployments</text>
  <rect x="330" y="440" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Instant rollback capability</text>
  <rect x="590" y="440" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Simple deployment logic</text>
  <rect x="70" y="480" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Easy testing before switch</text>
  <rect x="330" y="480" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">No mixed-version requests</text>
  <rect x="590" y="480" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Quick recovery from failures</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
