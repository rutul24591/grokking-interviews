<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Virtual Machines Architecture</title>
  <desc id="desc">Virtual machines showing hypervisor types, VM structure, and resource allocation</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Virtual Machines Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Hypervisor types, VM structure, and resource allocation</text>
  
  <!-- Type 1 Hypervisor -->
  <rect x="30" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Type 1: Bare-Metal</text>
  <text x="165" y="128" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Native/Hypervisor</text>
  
  <!-- VMs -->
  <rect x="50" y="140" width="200" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="150" y="165" text-anchor="middle" font-size="9" fill="white">VM 1 (Guest OS + App)</text>
  <text x="150" y="180" text-anchor="middle" font-size="8" fill="#6ee7b7">Linux/Windows</text>
  
  <rect x="50" y="210" width="200" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="150" y="235" text-anchor="middle" font-size="9" fill="white">VM 2 (Guest OS + App)</text>
  <text x="150" y="250" text-anchor="middle" font-size="8" fill="#6ee7b7">Linux/Windows</text>
  
  <!-- Hypervisor -->
  <rect x="50" y="280" width="200" height="40" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="150" y="305" text-anchor="middle" font-size="10" fill="white">Hypervisor</text>
  <text x="150" y="320" text-anchor="middle" font-size="8" fill="#bfdbfe">ESXi, Hyper-V, KVM</text>
  
  <!-- Hardware -->
  <rect x="50" y="330" width="200" height="30" rx="2" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="150" y="350" text-anchor="middle" font-size="9" fill="white">Physical Hardware</text>
  
  <text x="165" y="380" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Better performance</text>
  <text x="165" y="395" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Direct hardware access</text>
  <text x="165" y="410" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Production workloads</text>
  
  <!-- Type 2 Hypervisor -->
  <rect x="315" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Type 2: Hosted</text>
  <text x="450" y="128" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Application Hypervisor</text>
  
  <!-- VMs -->
  <rect x="335" y="140" width="200" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="435" y="165" text-anchor="middle" font-size="9" fill="white">VM 1 (Guest OS + App)</text>
  
  <rect x="335" y="200" width="200" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="435" y="225" text-anchor="middle" font-size="9" fill="white">VM 2 (Guest OS + App)</text>
  
  <!-- Hypervisor -->
  <rect x="335" y="260" width="200" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="435" y="285" text-anchor="middle" font-size="10" fill="white">Hypervisor Application</text>
  <text x="435" y="300" text-anchor="middle" font-size="8" fill="#fcd34d">VirtualBox, VMware</text>
  
  <!-- Host OS -->
  <rect x="335" y="310" width="200" height="35" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="435" y="333" text-anchor="middle" font-size="9" fill="white">Host Operating System</text>
  
  <!-- Hardware -->
  <rect x="335" y="350" width="200" height="30" rx="2" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="435" y="370" text-anchor="middle" font-size="9" fill="white">Physical Hardware</text>
  
  <text x="450" y="395" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ More overhead</text>
  <text x="450" y="410" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Depends on host OS</text>
  <text x="450" y="425" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Easy to use</text>
  <text x="450" y="440" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Development/testing</text>
  
  <!-- VM Components -->
  <rect x="600" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">VM Structure</text>
  
  <rect x="620" y="125" width="230" height="150" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  
  <!-- vCPU -->
  <rect x="630" y="140" width="100" height="35" rx="3" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="680" y="163" text-anchor="middle" font-size="9" fill="white">vCPU</text>
  <text x="680" y="175" text-anchor="middle" font-size="7" fill="#c4b5fd">Virtual CPU</text>
  
  <!-- vRAM -->
  <rect x="740" y="140" width="100" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="790" y="163" text-anchor="middle" font-size="9" fill="white">vRAM</text>
  <text x="790" y="175" text-anchor="middle" font-size="7" fill="#6ee7b7">Virtual Memory</text>
  
  <!-- vDisk -->
  <rect x="630" y="185" width="100" height="35" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="680" y="208" text-anchor="middle" font-size="9" fill="white">vDisk</text>
  <text x="680" y="220" text-anchor="middle" font-size="7" fill="#fcd34d">Virtual Disk</text>
  
  <!-- vNIC -->
  <rect x="740" y="185" width="100" height="35" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="790" y="208" text-anchor="middle" font-size="9" fill="white">vNIC</text>
  <text x="790" y="220" text-anchor="middle" font-size="7" fill="#bfdbfe">Virtual Network</text>
  
  <!-- Guest OS -->
  <rect x="630" y="230" width="210" height="35" rx="3" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="735" y="253" text-anchor="middle" font-size="9" fill="white">Guest OS</text>
  
  <text x="735" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Virtual hardware mapped to physical</text>
  
  <!-- Resource Allocation -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Resource Allocation &amp; Isolation</text>
  
  <rect x="50" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="175" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">CPU Scheduling</text>
  <text x="175" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Time-slicing physical CPU</text>
  <text x="175" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Each VM gets time slots</text>
  <text x="175" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Fair share scheduling</text>
  
  <rect x="315" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="440" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Memory Management</text>
  <text x="440" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Memory ballooning</text>
  <text x="440" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Page sharing (KSM)</text>
  <text x="440" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Memory overcommitment</text>
  
  <rect x="580" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="705" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">I/O Virtualization</text>
  <text x="705" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Virtual device drivers</text>
  <text x="705" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Paravirtualization</text>
  <text x="705" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">SR-IOV for performance</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
