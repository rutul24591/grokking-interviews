<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Blue-Green Deployment Failure Modes</title>
  <desc id="desc">Blue-green failure modes: data incompatibility, incomplete cutover, session loss, and rollback hazards</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Blue-Green: Failure Modes &amp; Data Concerns</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">What can go wrong and how to prevent it</text>
  
  <!-- Data Incompatibility -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444">1. Data Incompatibility</text>
  
  <!-- Schema mismatch scenario -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  
  <!-- BLUE writes -->
  <rect x="60" y="150" width="140" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-size="9" fill="white">BLUE (v1.0)</text>
  <text x="130" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">Writes: old_format</text>
  
  <line x1="200" y1="175" x2="230" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Database -->
  <rect x="240" y="150" width="80" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="280" y="175" text-anchor="middle" font-size="9" fill="white">Database</text>
  <text x="280" y="190" text-anchor="middle" font-size="7" fill="#c4b5fd">Mixed data</text>
  
  <line x1="320" y1="175" x2="350" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- GREEN reads -->
  <rect x="360" y="150" width="50" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="385" y="175" text-anchor="middle" font-size="9" fill="white">GREEN</text>
  <text x="385" y="190" text-anchor="middle" font-size="7" fill="#6ee7b7">v2.0</text>
  
  <!-- After rollback -->
  <rect x="60" y="220" width="350" height="45" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="235" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="white">After Rollback: BLUE cannot read GREEN's new_format data!</text>
  <text x="235" y="258" text-anchor="middle" font-size="8" fill="#fca5a5">Rollback blocked by data incompatibility</text>
  
  <text x="235" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Backward-compatible schema changes, expand-contract pattern</text>
  
  <!-- Incomplete Cutover -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">2. Incomplete Cutover</text>
  
  <!-- Partial switch scenario -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  
  <!-- Traffic split -->
  <rect x="490" y="150" width="150" height="55" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="565" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">Traffic Split</text>
  <text x="565" y="195" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">70% BLUE / 30% GREEN</text>
  
  <line x1="645" y1="178" x2="670" y2="178" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="657" y="168" text-anchor="middle" font-size="7" fill="var(--text-theme, #ef4444">Stuck!</text>
  
  <!-- Stuck state -->
  <rect x="680" y="150" width="160" height="55" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="760" y="175" text-anchor="middle" font-size="9" fill="white">Cutover Stuck</text>
  <text x="760" y="190" text-anchor="middle" font-size="8" fill="#fca5a5">Health check failing</text>
  <text x="760" y="203" text-anchor="middle" font-size="8" fill="#fca5a5">Can't go forward or back</text>
  
  <text x="665" y="250" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Users experience inconsistent routing!</text>
  <text x="665" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Causes: Failed health checks, config errors</text>
  <text x="665" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Automated rollback, staged cutover</text>
  
  <!-- Session Loss -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. Session Loss on Switch</text>
  
  <!-- Session scenario -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  
  <!-- User with session -->
  <rect x="60" y="395" width="80" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="100" y="420" text-anchor="middle" font-size="9" fill="white">User</text>
  <text x="100" y="435" text-anchor="middle" font-size="7" fill="#bfdbfe">Session: ABC123</text>
  
  <line x1="140" y1="420" x2="180" y2="420" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="160" y="410" text-anchor="middle" font-size="7" fill="var(--text-theme, #3b82f6">Request</text>
  
  <!-- BLUE with session store -->
  <rect x="190" y="395" width="100" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="240" y="420" text-anchor="middle" font-size="9" fill="white">BLUE</text>
  <text x="240" y="435" text-anchor="middle" font-size="7" fill="#6ee7b7">Has session ABC123</text>
  
  <line x1="290" y1="420" x2="320" y2="420" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="305" y="410" text-anchor="middle" font-size="7" fill="var(--text-theme, #ef4444">Switch!</text>
  
  <!-- GREEN without session -->
  <rect x="330" y="395" width="80" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="370" y="420" text-anchor="middle" font-size="9" fill="white">GREEN</text>
  <text x="370" y="435" text-anchor="middle" font-size="7" fill="#fca5a5">No session!</text>
  
  <text x="235" y="495" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">User logged out, cart lost!</text>
  <text x="235" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Shared session store, sticky sessions during switch</text>
  
  <!-- Rollback Hazards -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">4. Rollback Hazards</text>
  
  <!-- Rollback scenario -->
  <rect x="480" y="380" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  
  <!-- Timeline -->
  <line x1="500" y1="450" x2="830" y2="450" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <text x="840" y="455" font-size="9" fill="var(--text-theme, #64748b">Time →</text>
  
  <!-- Deploy GREEN -->
  <rect x="510" y="430" width="60" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="540" y="453" text-anchor="middle" font-size="8" fill="white">Deploy</text>
  <text x="540" y="465" text-anchor="middle" font-size="7" fill="#6ee7b7">GREEN v2</text>
  
  <!-- GREEN writes new data -->
  <line x1="570" y1="450" x2="610" y2="450" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="620" y="430" width="70" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="655" y="453" text-anchor="middle" font-size="8" fill="white">GREEN</text>
  <text x="655" y="465" text-anchor="middle" font-size="7" fill="#fcd34d">Writes new data</text>
  
  <!--发现问题 -->
  <line x1="690" y1="450" x2="720" y2="450" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="705" y="440" text-anchor="middle" font-size="7" fill="var(--text-theme, #ef4444">Bug found!</text>
  
  <!-- Rollback blocked -->
  <rect x="730" y="430" width="90" height="40" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="775" y="453" text-anchor="middle" font-size="8" fill="white">Rollback?</text>
  <text x="775" y="465" text-anchor="middle" font-size="7" fill="#fca5a5">Data incompatible!</text>
  
  <text x="665" y="500" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Cannot rollback without data migration!</text>
  <text x="665" y="520" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Feature flags, backward-compatible writes</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
