<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">CI/CD Platform Comparison</text>
  <!-- Jenkins Column -->
  <rect x="40" y="70" width="260" height="40" rx="6" fill="#d23143"/>
  <text x="170" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Jenkins</text>
  <rect x="40" y="120" width="260" height="350" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="155" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Architecture: Self-hosted</text>
  <text x="60" y="180" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">Runs on dedicated infrastructure</text>
  <text x="60" y="210" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Configuration: Declarative/Scripted</text>
  <text x="60" y="235" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">Groovy-based pipeline DSL</text>
  <text x="60" y="265" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Extensibility: 1,800+ plugins</text>
  <text x="60" y="290" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">Largest plugin ecosystem</text>
  <text x="60" y="320" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Scalability: Agent-based</text>
  <text x="60" y="345" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">Master-agent architecture</text>
  <text x="60" y="375" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Best for: Complex workflows</text>
  <text x="60" y="400" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">Enterprise, legacy Jenkins users</text>
  <!-- GitHub Actions Column -->
  <rect x="320" y="70" width="260" height="40" rx="6" fill="#24292e"/>
  <text x="450" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">GitHub Actions</text>
  <rect x="320" y="120" width="260" height="350" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="340" y="155" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Architecture: Cloud-hosted</text>
  <text x="340" y="180" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">GitHub-managed or self-hosted runners</text>
  <text x="340" y="210" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Configuration: YAML workflows</text>
  <text x="340" y="235" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">.github/workflows/*.yml</text>
  <text x="340" y="265" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Extensibility: Marketplace actions</text>
  <text x="340" y="290" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">15,000+ reusable actions</text>
  <text x="340" y="320" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Scalability: Auto-scaled</text>
  <text x="340" y="345" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">GitHub manages runner capacity</text>
  <text x="340" y="375" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Best for: GitHub-native teams</text>
  <text x="340" y="400" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">Open source, startups</text>
  <!-- GitLab CI Column -->
  <rect x="600" y="70" width="260" height="40" rx="6" fill="#fc6d26"/>
  <text x="730" y="96" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">GitLab CI</text>
  <rect x="600" y="120" width="260" height="350" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="620" y="155" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Architecture: Integrated</text>
  <text x="620" y="180" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">Built into GitLab platform</text>
  <text x="620" y="210" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Configuration: YAML pipelines</text>
  <text x="620" y="235" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">.gitlab-ci.yml in repo root</text>
  <text x="620" y="265" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Extensibility: Built-in features</text>
  <text x="620" y="290" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">Container registry, env management</text>
  <text x="620" y="320" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Scalability: Runner-based</text>
  <text x="620" y="345" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">Shared or dedicated runners</text>
  <text x="620" y="375" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Best for: GitLab users</text>
  <text x="620" y="400" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569">DevOps platform teams</text>
  <!-- Comparison note -->
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">All three support parallel jobs, artifact storage, and deployment automation — choice depends on ecosystem lock-in and operational overhead</text>
</svg>