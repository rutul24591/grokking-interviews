<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Auto-Scaling Architecture</title>
  <desc id="desc">Auto-scaling showing metrics collection, scaling policies, and instance lifecycle</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Auto-Scaling Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Metrics collection, scaling policies, and instance lifecycle</text>
  
  <!-- Metrics Collection -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Metrics Collection</text>
  
  <!-- Instances -->
  <rect x="50" y="125" width="200" height="70" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">EC2 Instances</text>
  
  <rect x="60" y="160" width="45" height="30" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="82" y="180" text-anchor="middle" font-size="7" fill="white">i-1</text>
  
  <rect x="110" y="160" width="45" height="30" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="132" y="180" text-anchor="middle" font-size="7" fill="white">i-2</text>
  
  <rect x="160" y="160" width="45" height="30" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="182" y="180" text-anchor="middle" font-size="7" fill="white">i-3</text>
  
  <rect x="210" y="160" width="30" height="30" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="225" y="180" text-anchor="middle" font-size="7" fill="white">i-4</text>
  
  <!-- Metrics flow -->
  <line x1="150" y1="195" x2="150" y2="230" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="170" y="215" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b">CloudWatch</text>
  
  <!-- Metrics store -->
  <rect x="50" y="235" width="200" height="60" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="150" y="260" text-anchor="middle" font-size="10" fill="white">Metrics Store</text>
  <text x="150" y="278" text-anchor="middle" font-size="8" fill="#bfdbfe">CPU, Network, Requests</text>
  
  <!-- Scaling Policies -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Scaling Policies</text>
  
  <!-- Target tracking -->
  <rect x="335" y="125" width="230" height="60" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Target Tracking</text>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Maintain target CPU (e.g., 70%)</text>
  
  <!-- Step scaling -->
  <rect x="335" y="195" width="230" height="60" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Step Scaling</text>
  <text x="450" y="240" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Add 2 instances if CPU > 80%</text>
  
  <!-- Simple scaling -->
  <rect x="335" y="265" width="230" height="35" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="288" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Simple Scaling (deprecated)</text>
  
  <!-- Instance Lifecycle -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Instance Lifecycle</text>
  
  <!-- Lifecycle states -->
  <rect x="620" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <rect x="630" y="140" width="70" height="35" rx="3" fill="var(--bg-theme, #f59e0b)"/>
  <text x="665" y="163" text-anchor="middle" font-size="8" fill="white">Pending</text>
  
  <line x1="705" y1="158" x2="735" y2="158" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="745" y="140" width="70" height="35" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="780" y="163" text-anchor="middle" font-size="8" fill="white">InService</text>
  
  <line x1="780" y1="175" x2="780" y2="195" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="800" y="185" text-anchor="start" font-size="7" fill="var(--text-theme, #ef4444">Scale in</text>
  
  <rect x="745" y="200" width="70" height="35" rx="3" fill="var(--bg-theme, #ef4444)"/>
  <text x="780" y="223" text-anchor="middle" font-size="8" fill="white">Terminating</text>
  
  <line x1="740" y1="218" x2="710" y2="218" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="630" y="200" width="70" height="35" rx="3" fill="var(--bg-theme, #64748b)"/>
  <text x="665" y="223" text-anchor="middle" font-size="8" fill="white">Terminated</text>
  
  <text x="735" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Lifecycle hooks for custom actions</text>
  
  <!-- Scaling Flow -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Auto-Scaling Flow</text>
  
  <rect x="50" y="360" width="750" height="160" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <!-- Metrics -->
  <rect x="70" y="380" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)"/>
  <text x="120" y="408" text-anchor="middle" font-size="9" fill="white">Metrics</text>
  
  <line x1="175" y1="405" x2="215" y2="405" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Evaluate -->
  <rect x="220" y="380" width="120" height="50" rx="4" fill="var(--bg-theme, #f59e0b)"/>
  <text x="280" y="408" text-anchor="middle" font-size="9" fill="white">Evaluate Policy</text>
  
  <line x1="345" y1="405" x2="385" y2="405" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Decision -->
  <rect x="390" y="380" width="100" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="440" y="408" text-anchor="middle" font-size="9" fill="white">Decision</text>
  
  <!-- Scale out path -->
  <line x1="440" y1="430" x2="440" y2="460" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="460" y="445" text-anchor="start" font-size="8" fill="var(--text-theme, #10b981">Scale Out</text>
  
  <rect x="390" y="465" width="100" height="40" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="440" y="490" text-anchor="middle" font-size="8" fill="white">Launch Instance</text>
  
  <!-- Scale in path -->
  <line x1="495" y1="405" x2="535" y2="405" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="515" y="395" text-anchor="start" font-size="8" fill="var(--text-theme, #ef4444">Scale In</text>
  
  <rect x="540" y="380" width="100" height="50" rx="4" fill="var(--bg-theme, #ef4444)"/>
  <text x="590" y="408" text-anchor="middle" font-size="9" fill="white">Terminate Instance</text>
  
  <!-- Cooldown -->
  <rect x="660" y="380" width="120" height="50" rx="4" fill="var(--bg-theme, #64748b)"/>
  <text x="720" y="408" text-anchor="middle" font-size="9" fill="white">Cooldown Period</text>
  <text x="720" y="423" text-anchor="middle" font-size="8" fill="#94a3b8">Prevent thrashing</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
