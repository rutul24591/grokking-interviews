<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="100%" height="100%">
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Kubernetes Architecture: Control Plane &amp; Worker Nodes</text>
  <!-- Control Plane -->
  <rect x="30" y="70" width="840" height="140" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e40af">Control Plane (Master Node)</text>
  <!-- API Server -->
  <rect x="60" y="115" width="160" height="60" rx="8" fill="#3b82f6"/>
  <text x="140" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">API Server</text>
  <text x="140" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#dbeafe">kubectl, REST API</text>
  <!-- etcd -->
  <rect x="240" y="115" width="160" height="60" rx="8" fill="#6366f1"/>
  <text x="320" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">etcd</text>
  <text x="320" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#e0e7ff">Cluster state store</text>
  <!-- Scheduler -->
  <rect x="420" y="115" width="160" height="60" rx="8" fill="#8b5cf6"/>
  <text x="500" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Scheduler</text>
  <text x="500" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#ede9fe">Pod placement</text>
  <!-- Controller Manager -->
  <rect x="600" y="115" width="240" height="60" rx="8" fill="#a855f7"/>
  <text x="720" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Controller Manager</text>
  <text x="720" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#f3e8ff">Node, ReplicaSet, Endpoint controllers</text>
  <!-- Connections between control plane components -->
  <line x1="220" y1="145" x2="240" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <line x1="400" y1="145" x2="420" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <line x1="580" y1="145" x2="600" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <!-- Worker Node 1 -->
  <rect x="30" y="240" width="410" height="280" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="235" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#065f46">Worker Node 1</text>
  <!-- Kubelet -->
  <rect x="50" y="290" width="140" height="50" rx="6" fill="#10b981"/>
  <text x="120" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Kubelet</text>
  <!-- Container Runtime -->
  <rect x="210" y="290" width="140" height="50" rx="6" fill="#059669"/>
  <text x="280" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Container</text>
  <text x="280" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Runtime</text>
  <!-- Kube Proxy -->
  <rect x="370" y="290" width="60" height="50" rx="6" fill="#047857"/>
  <text x="400" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Kube</text>
  <text x="400" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Proxy</text>
  <!-- Pods -->
  <rect x="50" y="360" width="100" height="60" rx="6" fill="#34d399"/>
  <text x="100" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#064e3b">Pod A</text>
  <text x="100" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#064e3b">Container</text>
  <rect x="170" y="360" width="100" height="60" rx="6" fill="#34d399"/>
  <text x="220" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#064e3b">Pod B</text>
  <text x="220" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#064e3b">Container</text>
  <rect x="290" y="360" width="100" height="60" rx="6" fill="#34d399"/>
  <text x="340" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#064e3b">Pod C</text>
  <text x="340" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#064e3b">Container</text>
  <!-- Service -->
  <rect x="150" y="440" width="200" height="50" rx="8" fill="#059669"/>
  <text x="250" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Service (ClusterIP)</text>
  <text x="250" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5">Load balances across pods</text>
  <!-- Worker Node 2 -->
  <rect x="460" y="240" width="410" height="280" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="665" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#065f46">Worker Node 2</text>
  <!-- Kubelet -->
  <rect x="480" y="290" width="140" height="50" rx="6" fill="#10b981"/>
  <text x="550" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Kubelet</text>
  <!-- Container Runtime -->
  <rect x="640" y="290" width="140" height="50" rx="6" fill="#059669"/>
  <text x="710" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Container</text>
  <text x="710" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Runtime</text>
  <!-- Kube Proxy -->
  <rect x="800" y="290" width="60" height="50" rx="6" fill="#047857"/>
  <text x="830" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Kube</text>
  <text x="830" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Proxy</text>
  <!-- Pods on Node 2 -->
  <rect x="480" y="360" width="100" height="60" rx="6" fill="#34d399"/>
  <text x="530" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#064e3b">Pod D</text>
  <text x="530" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#064e3b">Container</text>
  <rect x="600" y="360" width="100" height="60" rx="6" fill="#34d399"/>
  <text x="650" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#064e3b">Pod E</text>
  <text x="650" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#064e3b">Container</text>
  <rect x="720" y="360" width="100" height="60" rx="6" fill="#34d399"/>
  <text x="770" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#064e3b">Pod F</text>
  <text x="770" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#064e3b">Container</text>
  <!-- Service on Node 2 -->
  <rect x="580" y="440" width="200" height="50" rx="8" fill="#059669"/>
  <text x="680" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Service (ClusterIP)</text>
  <text x="680" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5">Load balances across pods</text>
  <!-- Control plane to worker nodes arrows -->
  <line x1="450" y1="210" x2="235" y2="240" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <line x1="450" y1="210" x2="665" y2="240" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <!-- Bottom note -->
  <text x="450" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">Control plane manages cluster state, worker nodes run workloads. Pods are the smallest deployable unit, Services provide stable networking across ephemeral pods</text>
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>