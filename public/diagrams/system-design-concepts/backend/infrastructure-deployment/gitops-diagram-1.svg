<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">GitOps Architecture</title>
  <desc id="desc">GitOps showing git as source of truth, automated sync, and deployment flow</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">GitOps Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Git as single source of truth with automated synchronization</text>
  
  <!-- Git Repository -->
  <rect x="30" y="85" width="200" height="180" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Git Repository</text>
  <text x="130" y="135" text-anchor="middle" font-size="10" fill="#fcd34d">Single Source of Truth</text>
  
  <!-- Main branch -->
  <rect x="50" y="150" width="160" height="40" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">main branch</text>
  
  <!-- Config files -->
  <rect x="50" y="200" width="160" height="55" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="130" y="220" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Infrastructure Config</text>
  <text x="130" y="235" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">• deployment.yaml</text>
  <text x="130" y="248" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">• services.yaml</text>
  
  <!-- CI Pipeline -->
  <rect x="250" y="85" width="200" height="180" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="350" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">CI Pipeline</text>
  
  <!-- PR/MR -->
  <rect x="270" y="130" width="160" height="45" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="350" y="155" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Pull Request</text>
  <text x="350" y="170" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Code review</text>
  
  <!-- Validation -->
  <rect x="270" y="185" width="160" height="45" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="350" y="210" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Validation</text>
  <text x="350" y="225" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Lint, tests, policy</text>
  
  <!-- CD Operator -->
  <rect x="470" y="85" width="200" height="180" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="570" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">CD Operator</text>
  <text x="570" y="135" text-anchor="middle" font-size="10" fill="#6ee7b7">ArgoCD, Flux</text>
  
  <!-- Watch loop -->
  <rect x="490" y="150" width="160" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="570" y="175" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Watches Git</text>
  <text x="570" y="190" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Polls for changes</text>
  
  <!-- Sync -->
  <rect x="490" y="210" width="160" height="45" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="570" y="235" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Sync to Cluster</text>
  <text x="570" y="250" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Apply manifests</text>
  
  <!-- Kubernetes Cluster -->
  <rect x="690" y="85" width="180" height="180" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="780" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">Kubernetes</text>
  
  <!-- Desired state -->
  <rect x="710" y="130" width="140" height="45" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="780" y="155" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Desired State</text>
  <text x="780" y="170" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">From Git</text>
  
  <!-- Actual state -->
  <rect x="710" y="185" width="140" height="45" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="780" y="210" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Actual State</text>
  <text x="780" y="225" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Running pods</text>
  
  <!-- Arrows -->
  <line x1="230" y1="175" x2="250" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="450" y1="175" x2="470" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="670" y1="175" x2="690" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Feedback loop -->
  <path d="M 780 230 L 780 280 L 570 280 L 570 255" fill="none" stroke="var(--text-theme, #64748b)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-down)"/>
  <text x="680" y="295" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Status feedback</text>
  
  <!-- GitOps Principles -->
  <rect x="30" y="280" width="400" height="250" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">GitOps Principles</text>
  
  <rect x="50" y="320" width="360" height="200" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="70" y="345" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">1. Declarative</text>
  <text x="70" y="365" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Desired state in Git</text>
  
  <text x="70" y="390" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">2. Versioned</text>
  <text x="70" y="410" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Immutable, auditable history</text>
  
  <text x="70" y="435" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #f59e0b">3. Automated</text>
  <text x="70" y="455" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Automatic sync to cluster</text>
  
  <text x="220" y="345" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #8b5cf6">4. Continuous</text>
  <text x="220" y="365" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Continuous reconciliation</text>
  
  <text x="220" y="390" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #06b6d4">5. Drift Detection</text>
  <text x="220" y="410" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Alert on config drift</text>
  
  <text x="220" y="435" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #ef4444">6. Self-Healing</text>
  <text x="220" y="455" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Auto-correct drift</text>
  
  <!-- GitOps Benefits -->
  <rect x="450" y="280" width="420" height="250" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="660" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">GitOps Benefits</text>
  
  <rect x="470" y="320" width="380" height="200" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <text x="490" y="345" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="505" y="345" font-size="10" fill="var(--text-theme, #1e293b">Single source of truth</text>
  
  <text x="490" y="365" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="505" y="365" font-size="10" fill="var(--text-theme, #1e293b">Fast rollback via git revert</text>
  
  <text x="490" y="385" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="505" y="385" font-size="10" fill="var(--text-theme, #1e293b">Audit trail of all changes</text>
  
  <text x="490" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="505" y="405" font-size="10" fill="var(--text-theme, #1e293b">Reduced deployment risk</text>
  
  <text x="680" y="345" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="695" y="345" font-size="10" fill="var(--text-theme, #1e293b">Consistent environments</text>
  
  <text x="680" y="365" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="695" y="365" font-size="10" fill="var(--text-theme, #1e293b">Developer-friendly workflow</text>
  
  <text x="680" y="385" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="695" y="385" font-size="10" fill="var(--text-theme, #1e293b">Disaster recovery simplified</text>
  
  <text x="680" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="695" y="405" font-size="10" fill="var(--text-theme, #1e293b">Security via PR review</text>
  
  <text x="490" y="440" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="505" y="440" font-size="10" fill="var(--text-theme, #1e293b">Requires cultural shift</text>
  
  <text x="680" y="440" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="695" y="440" font-size="10" fill="var(--text-theme, #1e293b">Git repo is critical asset</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
