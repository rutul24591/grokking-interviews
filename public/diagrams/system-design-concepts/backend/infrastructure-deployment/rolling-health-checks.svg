<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Rolling Health Checks</text>
  <!-- Instance Update -->
  <rect x="50" y="80" width="260" height="160" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">1. Update Instance</text>
  <rect x="70" y="130" width="220" height="30" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Deploy new version</text>
  <rect x="70" y="165" width="220" height="30" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Wait for startup</text>
  <rect x="70" y="200" width="220" height="30" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Instance is running</text>
  <!-- Health Check -->
  <path d="M 310 160 L 360 160" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="360" y="80" width="260" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="490" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">2. Health Check</text>
  <rect x="380" y="130" width="220" height="30" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="490" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">HTTP endpoint responds</text>
  <rect x="380" y="165" width="220" height="30" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="490" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Functional checks pass</text>
  <rect x="380" y="200" width="220" height="30" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="490" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Performance metrics OK</text>
  <!-- Decision -->
  <path d="M 620 120 L 670 120" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 620 200 L 670 200" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Pass Path -->
  <rect x="670" y="80" width="200" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="770" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Pass</text>
  <text x="770" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Add to traffic pool</text>
  <text x="770" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Proceed to next</text>
  <!-- Fail Path -->
  <rect x="670" y="190" width="200" height="100" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="770" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b91c1c">Fail</text>
  <text x="770" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Remove from pool</text>
  <text x="770" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Halt and rollback</text>
  <!-- Traffic Routing -->
  <rect x="50" y="260" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Traffic Routing During Rollout</text>
  <rect x="70" y="310" width="760" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Load balancer routes traffic to healthy instances — old instances are removed as they are updated, new instances are added as they pass health checks</text>
  <!-- Key Principle -->
  <rect x="50" y="380" width="800" height="150" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Health Check Best Practices</text>
  <rect x="70" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Check HTTP endpoints</text>
  <rect x="330" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Verify key features work</text>
  <rect x="590" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Monitor performance metrics</text>
  <rect x="70" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Check database connectivity</text>
  <rect x="330" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Verify external service calls</text>
  <rect x="590" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Set reasonable timeout</text>
  <text x="450" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Only proceed to next instance if all health checks pass</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
