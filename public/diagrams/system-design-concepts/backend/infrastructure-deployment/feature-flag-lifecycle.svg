<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Feature Flag Lifecycle</text>
  <!-- Create -->
  <rect x="50" y="80" width="160" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0c4a6e">1. Create Flag</text>
  <text x="130" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Define name, rules</text>
  <text x="130" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Set default state</text>
  <path d="M 210 130 L 260 130" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Configure -->
  <rect x="260" y="80" width="160" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">2. Configure</text>
  <text x="340" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Set targeting rules</text>
  <text x="340" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Percentage, segments</text>
  <path d="M 420 130 L 470 130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Rollout -->
  <rect x="470" y="80" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">3. Gradual Rollout</text>
  <text x="550" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">1% → 5% → 10%</text>
  <text x="550" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Monitor metrics</text>
  <path d="M 630 130 L 680 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Full Release -->
  <rect x="680" y="80" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="760" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">4. Full Release</text>
  <text x="760" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">100% of users</text>
  <text x="760" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Monitor stability</text>
  <!-- Cleanup -->
  <rect x="760" y="190" width="130" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="825" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b21a8">5. Cleanup</text>
  <text x="825" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Remove from code</text>
  <text x="825" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Delete from system</text>
  <!-- Arrow to cleanup -->
  <path d="M 760 180 L 760 240 L 800 240" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Best Practices -->
  <rect x="50" y="220" width="690" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="395" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Flag Lifecycle Best Practices</text>
  <rect x="70" y="270" width="170" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="155" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Name flags clearly</text>
  <rect x="260" y="270" width="170" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="345" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Monitor flag impact</text>
  <rect x="450" y="270" width="170" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="535" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Schedule cleanup</text>
  <rect x="70" y="310" width="170" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="155" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Use kill switches</text>
  <rect x="260" y="310" width="170" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="345" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Provide defaults</text>
  <rect x="450" y="310" width="170" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="535" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Cache flag states</text>
  <!-- Key Principle -->
  <rect x="50" y="340" width="800" height="80" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Cleanup is Critical</text>
  <text x="450" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Remove flags after 2 weeks of stable full rollout. Flag debt accumulates quickly — unused flags increase code complexity, slow evaluation, and make management difficult.</text>
  <!-- Timeline -->
  <rect x="50" y="440" width="800" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Typical Timeline</text>
  <rect x="70" y="490" width="140" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="140" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Create: Day 1</text>
  <rect x="230" y="490" width="140" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="300" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Rollout: Days 1-7</text>
  <rect x="390" y="490" width="140" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Full: Day 7</text>
  <rect x="550" y="490" width="140" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="620" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Cleanup: Day 21</text>
  <text x="450" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Total flag lifetime: ~3 weeks (create to cleanup)</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
