<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">GitOps Workflow</text>
  <!-- Developer -->
  <rect x="50" y="80" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">1. Developer</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Makes changes</text>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Commits to Git</text>
  <text x="140" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Opens PR</text>
  <path d="M 230 140 L 280 140" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Review -->
  <rect x="280" y="80" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">2. Review</text>
  <text x="370" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Team reviews PR</text>
  <text x="370" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Tests pass</text>
  <text x="370" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">PR approved</text>
  <path d="M 460 140 L 510 140" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Merge -->
  <rect x="510" y="80" width="180" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">3. Merge to Main</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">PR merged</text>
  <text x="600" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Git updated</text>
  <text x="600" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Webhook triggered</text>
  <path d="M 690 140 L 740 140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Apply -->
  <rect x="740" y="80" width="130" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="805" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">4. Apply</text>
  <text x="805" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Agent pulls</text>
  <text x="805" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Applies changes</text>
  <text x="805" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Infra updated</text>
  <!-- Continuous Reconciliation -->
  <rect x="50" y="220" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Continuous Reconciliation Loop</text>
  <text x="450" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Agent continuously compares actual state with desired state in Git, correcting drift automatically. Manual changes are overwritten by next reconciliation.</text>
  <text x="450" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Polling (every few minutes) or Webhook (instant notification when Git changes)</text>
  <!-- Rollback -->
  <rect x="50" y="340" width="800" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Rollback via Git Revert</text>
  <rect x="70" y="390" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Revert Git commit</text>
  <rect x="330" y="390" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Agent detects change</text>
  <rect x="590" y="390" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Applies previous state</text>
  <!-- Key Principle -->
  <rect x="50" y="460" width="800" height="70" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Key Principle</text>
  <text x="450" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">All changes go through Git. CI/CD commits to Git, agent pulls from Git and applies. CI/CD does not need production credentials — only the agent does.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
