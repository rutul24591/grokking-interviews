<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Pod, ReplicaSet, Deployment, and Service Relationship</text>
  <!-- Deployment at top -->
  <rect x="300" y="70" width="300" height="60" rx="10" fill="#3b82f6"/>
  <text x="450" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Deployment</text>
  <text x="450" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#dbeafe">replicas=3, image=app:v2.1</text>
  <!-- Arrow down -->
  <line x1="450" y1="130" x2="450" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="480" y="155" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748b">manages</text>
  <!-- ReplicaSet -->
  <rect x="300" y="170" width="300" height="60" rx="10" fill="#6366f1"/>
  <text x="450" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">ReplicaSet</text>
  <text x="450" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#e0e7ff">ensures 3 replicas running</text>
  <!-- Arrows to pods -->
  <line x1="370" y1="230" x2="150" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="230" x2="450" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="230" x2="750" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Pod 1 -->
  <rect x="80" y="300" width="140" height="70" rx="8" fill="#8b5cf6"/>
  <text x="150" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Pod 1</text>
  <text x="150" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#ede9fe">app:v2.1, 10.0.1.10</text>
  <!-- Pod 2 -->
  <rect x="380" y="300" width="140" height="70" rx="8" fill="#8b5cf6"/>
  <text x="450" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Pod 2</text>
  <text x="450" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#ede9fe">app:v2.1, 10.0.1.11</text>
  <!-- Pod 3 -->
  <rect x="680" y="300" width="140" height="70" rx="8" fill="#8b5cf6"/>
  <text x="750" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Pod 3</text>
  <text x="750" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#ede9fe">app:v2.1, 10.0.1.12</text>
  <!-- Service at bottom -->
  <rect x="250" y="410" width="400" height="60" rx="10" fill="#10b981"/>
  <text x="450" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Service</text>
  <text x="450" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">ClusterIP: 10.96.0.10, round-robin across pods</text>
  <!-- Arrows from pods to service -->
  <line x1="150" y1="370" x2="350" y2="410" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="450" y1="370" x2="450" y2="410" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="750" y1="370" x2="550" y2="410" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Key labels -->
  <rect x="30" y="300" width="40" height="70" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="50" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">Ephemeral</text>
  <text x="50" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">IPs change</text>
  <text x="50" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">on restart</text>
  <rect x="830" y="410" width="40" height="60" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="850" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">Stable</text>
  <text x="850" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">IP &amp; DNS</text>
  <text x="850" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">name</text>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">Deployment manages ReplicaSets, ReplicaSets ensure pod count, Services provide stable networking to ephemeral pods</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>