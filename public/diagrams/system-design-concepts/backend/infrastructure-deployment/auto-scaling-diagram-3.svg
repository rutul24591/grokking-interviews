<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Auto-Scaling Failure Modes</title>
  <desc id="desc">Auto-scaling failure modes: oscillation, runaway cost, slow scale-up, and dependency bottlenecks</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Auto-Scaling Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Common pitfalls and how to avoid them</text>
  
  <!-- Oscillation -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444">1. Oscillation (Thrashing)</text>
  
  <!-- Oscillation graph -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  
  <!-- Graph axes -->
  <line x1="70" y1="250" x2="400" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <line x1="70" y1="250" x2="70" y2="150" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <text x="410" y="255" font-size="9" fill="var(--text-theme, #64748b">Time →</text>
  <text x="55" y="160" font-size="9" fill="var(--text-theme, #64748b">Instances</text>
  
  <!-- Oscillating line -->
  <path d="M 70 220 L 120 180 L 170 220 L 220 180 L 270 220 L 320 180 L 370 220" fill="none" stroke="var(--text-theme, #ef4444)" stroke-width="3"/>
  
  <!-- Scale up/down markers -->
  <circle cx="120" cy="180" r="5" fill="var(--bg-theme, #10b981)"/>
  <text x="120" y="170" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Scale Up</text>
  
  <circle cx="170" cy="220" r="5" fill="var(--bg-theme, #ef4444)"/>
  <text x="170" y="240" text-anchor="middle" font-size="7" fill="var(--text-theme, #ef4444">Scale Down</text>
  
  <circle cx="220" cy="180" r="5" fill="var(--bg-theme, #10b981)"/>
  <text x="220" y="170" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Scale Up</text>
  
  <text x="235" y="270" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">No cooldown → constant scaling!</text>
  <text x="235" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Cause: Aggressive thresholds, no cooldown</text>
  <text x="235" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Add cooldown, widen thresholds</text>
  
  <!-- Runaway Cost -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">2. Runaway Cost</text>
  
  <!-- Cost graph -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  
  <!-- Graph axes -->
  <line x1="500" y1="250" x2="830" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <line x1="500" y1="250" x2="500" y2="150" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <text x="840" y="255" font-size="9" fill="var(--text-theme, #64748b">Time →</text>
  <text x="485" y="160" font-size="9" fill="var(--text-theme, #64748b">Cost</text>
  
  <!-- Exponential cost curve -->
  <path d="M 500 240 Q 600 230 700 180 Q 800 140 830 160" fill="none" stroke="var(--text-theme, #f59e0b)" stroke-width="3"/>
  
  <!-- Max instances line -->
  <line x1="500" y1="170" x2="830" y2="170" stroke="var(--text-theme, #64748b)" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="835" y="175" font-size="8" fill="var(--text-theme, #64748b">Max limit</text>
  
  <text x="665" y="270" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">No max instances → bill shock!</text>
  <text x="665" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Cause: Missing upper bounds, bug in metrics</text>
  <text x="665" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Set max instances, budget alerts</text>
  
  <!-- Slow Scale-Up -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. Slow Scale-Up</text>
  
  <!-- Scale-up timeline -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  
  <!-- Timeline -->
  <line x1="70" y1="450" x2="400" y2="450" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <text x="410" y="455" font-size="9" fill="var(--text-theme, #64748b">Time →</text>
  
  <!-- Spike event -->
  <rect x="80" y="420" width="40" height="30" rx="2" fill="var(--bg-theme, #ef4444)"/>
  <text x="100" y="440" text-anchor="middle" font-size="7" fill="white">Traffic Spike</text>
  
  <!-- Detection delay -->
  <line x1="120" y1="435" x2="180" y2="435" stroke="var(--text-theme, #f59e0b)" stroke-width="3" stroke-dasharray="5,3"/>
  <text x="150" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #b45309">Detection (2 min)</text>
  
  <!-- Scale decision -->
  <rect x="180" y="420" width="40" height="30" rx="2" fill="var(--bg-theme, #f59e0b)"/>
  <text x="200" y="440" text-anchor="middle" font-size="7" fill="white">Decision</text>
  
  <!-- Provisioning delay -->
  <line x1="220" y1="435" x2="340" y2="435" stroke="var(--text-theme, #8b5cf6)" stroke-width="3" stroke-dasharray="5,3"/>
  <text x="280" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #8b5cf6">Provisioning (5 min)</text>
  
  <!-- Ready -->
  <rect x="340" y="420" width="40" height="30" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="360" y="440" text-anchor="middle" font-size="7" fill="white">Ready</text>
  
  <text x="235" y="500" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">7+ minutes to scale = degraded UX</text>
  <text x="235" y="520" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Pre-warm pool, use faster instance types</text>
  
  <!-- Dependency Bottleneck -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">4. Dependency Bottleneck</text>
  
  <!-- Architecture diagram -->
  <rect x="480" y="380" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  
  <!-- App instances -->
  <rect x="500" y="400" width="80" height="80" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="540" y="435" text-anchor="middle" font-size="9" fill="white">App Tier</text>
  <text x="540" y="455" text-anchor="middle" font-size="8" fill="#6ee7b7">Scales to 100</text>
  <text x="540" y="470" text-anchor="middle" font-size="8" fill="#6ee7b7">instances</text>
  
  <line x1="580" y1="440" x2="620" y2="440" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Connections</text>
  
  <!-- Database -->
  <rect x="630" y="400" width="80" height="80" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="670" y="435" text-anchor="middle" font-size="9" fill="white">Database</text>
  <text x="670" y="455" text-anchor="middle" font-size="8" fill="#bfdbfe">Max: 500 conns</text>
  <text x="670" y="470" text-anchor="middle" font-size="8" fill="#ef4444">BOTTLENECK!</text>
  
  <line x1="710" y1="440" x2="750" y2="440" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <!-- Result -->
  <rect x="760" y="400" width="80" height="80" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="800" y="435" text-anchor="middle" font-size="9" fill="white">Result:</text>
  <text x="800" y="455" text-anchor="middle" font-size="8" fill="#fca5a5">Connection</text>
  <text x="800" y="470" text-anchor="middle" font-size="8" fill="#fca5a5">exhausted</text>
  
  <text x="665" y="500" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Scaling app without scaling DB = no improvement</text>
  <text x="665" y="520" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Scale dependencies together, use connection pooling</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
