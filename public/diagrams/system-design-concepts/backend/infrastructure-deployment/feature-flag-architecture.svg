<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Feature Flag Architecture</text>
  <!-- Flag Management System -->
  <rect x="50" y="80" width="350" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="225" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0c4a6e">Flag Management System</text>
  <rect x="70" y="130" width="310" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Flag states (enabled/disabled)</text>
  <rect x="70" y="160" width="310" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Targeting rules (%, segments, attributes)</text>
  <rect x="70" y="190" width="310" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Analytics (usage, impact, A/B tests)</text>
  <rect x="70" y="220" width="310" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Dashboard (create, update, delete flags)</text>
  <!-- SDK -->
  <path d="M 400 170 L 450 170" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="450" y="80" width="180" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Flag SDK</text>
  <rect x="470" y="130" width="140" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="540" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Fetch flag states</text>
  <rect x="470" y="160" width="140" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="540" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Evaluate targeting rules</text>
  <rect x="470" y="190" width="140" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="540" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Cache locally</text>
  <rect x="470" y="220" width="140" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="540" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Return enabled/disabled</text>
  <!-- Application -->
  <path d="M 630 170 L 680 170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="680" y="80" width="170" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="765" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Application</text>
  <rect x="700" y="130" width="130" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="765" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Check flag state</text>
  <rect x="700" y="160" width="130" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="765" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">if (enabled) { feature }</text>
  <rect x="700" y="190" width="130" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="765" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">else { skip feature }</text>
  <!-- Key Principle -->
  <rect x="50" y="280" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Flag Evaluation Flow</text>
  <rect x="70" y="330" width="760" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">User request → SDK fetches flags → evaluates targeting rules → returns enabled/disabled → application executes feature code conditionally</text>
  <!-- Benefits -->
  <rect x="50" y="400" width="800" height="130" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Benefits</text>
  <rect x="70" y="450" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Deploy without releasing</text>
  <rect x="330" y="450" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Instant kill switch</text>
  <rect x="590" y="450" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">A/B testing integration</text>
  <rect x="70" y="485" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Gradual rollout</text>
  <rect x="330" y="485" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Analytics tracking</text>
  <rect x="590" y="485" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Targeted releases</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
