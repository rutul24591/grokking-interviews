<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Multi-Cloud Architecture</text>
  <!-- AWS -->
  <rect x="50" y="80" width="260" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#92400e">AWS</text>
  <rect x="70" y="130" width="220" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="180" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">EC2 (Compute)</text>
  <rect x="70" y="160" width="220" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="180" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">RDS (Database)</text>
  <rect x="70" y="190" width="220" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="180" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">S3 (Storage)</text>
  <rect x="70" y="220" width="220" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="180" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">SageMaker (ML)</text>
  <!-- GCP -->
  <rect x="330" y="80" width="260" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0c4a6e">GCP</text>
  <rect x="350" y="130" width="220" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="460" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">GKE (Kubernetes)</text>
  <rect x="350" y="160" width="220" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="460" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">BigQuery (Analytics)</text>
  <rect x="350" y="190" width="220" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="460" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Vertex AI (ML)</text>
  <rect x="350" y="220" width="220" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="460" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Cloud Storage</text>
  <!-- Azure -->
  <rect x="610" y="80" width="240" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">Azure</text>
  <rect x="630" y="130" width="200" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">AKS (Kubernetes)</text>
  <rect x="630" y="160" width="200" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Azure SQL</text>
  <rect x="630" y="190" width="200" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">AD Integration</text>
  <rect x="630" y="220" width="200" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Cognitive Services</text>
  <!-- Global Traffic Routing -->
  <rect x="50" y="280" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
