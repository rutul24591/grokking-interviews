  <rect x="70" y="330" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Route 53 / Cloud DNS</text>
  <rect x="330" y="330" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Cross-cloud replication</text>
  <rect x="590" y="330" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="710" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Data locality compliance</text>
  <!-- Benefits -->
  <rect x="50" y="400" width="800" height="130" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Multi-Cloud Benefits</text>
  <rect x="70" y="450" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Avoid vendor lock-in</text>
  <rect x="330" y="450" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Leverage cloud strengths</text>
  <rect x="590" y="450" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Meet compliance</text>
  <rect x="70" y="485" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Reduce outage risk</text>
  <rect x="330" y="485" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Optimize costs</text>
  <rect x="590" y="485" width="240" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Negotiation leverage</text>
</svg>
