<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Service Discovery Architecture</title>
  <desc id="desc">Service discovery showing service registration, lookup, and health monitoring</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Service Discovery Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Service registration, lookup, and health monitoring</text>
  
  <!-- Service Registration -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Service Registration</text>
  
  <!-- Service instances -->
  <rect x="50" y="125" width="200" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  
  <rect x="60" y="140" width="70" height="50" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="95" y="165" text-anchor="middle" font-size="8" fill="white">Service A</text>
  <text x="95" y="180" text-anchor="middle" font-size="7" fill="#6ee7b7">10.0.1.1:8080</text>
  
  <rect x="140" y="140" width="70" height="50" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="175" y="165" text-anchor="middle" font-size="8" fill="white">Service A</text>
  <text x="175" y="180" text-anchor="middle" font-size="7" fill="#6ee7b7">10.0.1.2:8080</text>
  
  <line x1="165" y1="205" x2="165" y2="230" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="220" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b">Register</text>
  
  <rect x="60" y="235" width="200" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="160" y="260" text-anchor="middle" font-size="10" fill="white">Service Registry</text>
  <text x="160" y="275" text-anchor="middle" font-size="8" fill="#bfdbfe">Stores service locations</text>
  
  <rect x="50" y="315" width="200" height="80" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="150" y="340" text-anchor="middle" font-size="10" fill="var(--text-theme, #b45309">Registration Methods:</text>
  <text x="150" y="360" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Self-registration</text>
  <text x="150" y="375" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Third-party registration</text>
  <text x="150" y="390" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Sidecar registration</text>
  
  <!-- Service Lookup -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Service Lookup</text>
  
  <!-- Client-side discovery -->
  <rect x="335" y="125" width="230" height="80" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Client-Side Discovery</text>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Client queries registry</text>
  <text x="450" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Client chooses instance</text>
  <text x="450" y="200" text-anchor="middle" font-size="8" fill="#64748b">✓ Simple, ~ Client logic</text>
  
  <!-- Server-side discovery -->
  <rect x="335" y="215" width="230" height="80" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Server-Side Discovery</text>
  <text x="450" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">LB queries registry</text>
  <text x="450" y="275" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">LB routes to instance</text>
  <text x="450" y="290" text-anchor="middle" font-size="8" fill="#64748b">✓ Client unaware, ~ LB needed</text>
  
  <!-- Health Monitoring -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Health Monitoring</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <!-- Healthy instance -->
  <rect x="630" y="140" width="100" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="680" y="162" text-anchor="middle" font-size="8" fill="white">Instance 1</text>
  <text x="680" y="175" text-anchor="middle" font-size="7" fill="#6ee7b7">✓ Healthy</text>
  
  <!-- Unhealthy instance -->
  <rect x="630" y="185" width="100" height="35" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="680" y="207" text-anchor="middle" font-size="8" fill="white">Instance 2</text>
  <text x="680" y="220" text-anchor="middle" font-size="7" fill="#fca5a5">✗ Unhealthy</text>
  
  <line x1="735" y1="225" x2="735" y2="250" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="755" y="240" text-anchor="start" font-size="8" fill="var(--text-theme, #ef4444">Deregister</text>
  
  <rect x="620" y="255" width="230" height="60" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">Health Check Types:</text>
  <text x="735" y="295" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">• HTTP endpoint checks</text>
  <text x="735" y="308" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">• TCP connection checks</text>
  
  <!-- Service Registry Patterns -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Service Registry Patterns</text>
  
  <rect x="50" y="360" width="360" height="160" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="70" y="385" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="385" font-size="10" fill="var(--text-theme, #1e293b">Eureka (Netflix)</text>
  
  <text x="70" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="405" font-size="10" fill="var(--text-theme, #1e293b">Consul (HashiCorp)</text>
  
  <text x="70" y="425" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="425" font-size="10" fill="var(--text-theme, #1e293b">etcd (CoreOS/Kubernetes)</text>
  
  <text x="70" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="445" font-size="10" fill="var(--text-theme, #1e293b">Zookeeper (Apache)</text>
  
  <text x="220" y="385" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Self-registration</text>
  <text x="220" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• AP system</text>
  
  <text x="220" y="425" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Service mesh</text>
  <text x="220" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• CP system</text>
  
  <text x="70" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="85" y="470" font-size="10" fill="var(--text-theme, #1e293b">Registry is a critical dependency</text>
  
  <!-- Service Mesh -->
  <rect x="450" y="320" width="420" height="210" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="660" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Service Mesh (Advanced)</text>
  
  <rect x="470" y="360" width="380" height="160" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <!-- Data plane -->
  <rect x="485" y="375" width="170" height="60" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="570" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">Data Plane</text>
  <text x="570" y="420" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Sidecar proxies</text>
  <text x="570" y="433" text-anchor="middle" font-size="8" fill="#64748b">Envoy, Linkerd</text>
  
  <!-- Control plane -->
  <rect x="670" y="375" width="170" height="60" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="755" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">Control Plane</text>
  <text x="755" y="420" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Policy &amp; config</text>
  <text x="755" y="433" text-anchor="middle" font-size="8" fill="#64748b">Istio, Consul</text>
  
  <text x="660" y="460" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Provides: Discovery, LB, mTLS, observability</text>
  <text x="660" y="480" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Trade-off: Added complexity and latency</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
