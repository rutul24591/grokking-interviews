<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">CP vs AP Service Registry Consistency Models</title>
  <desc id="desc">Comparison of CP and AP registry architectures showing Raft consensus, partition behavior, and data reconciliation</desc>

  <!-- Background -->
  <rect width="900" height="500" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">CP vs AP Service Registry Consistency Models</text>
  <text x="450" y="50" text-anchor="middle" font-size="13" fill="#64748b">How registries handle consistency, availability, and network partitions</text>

  <!-- Divider line -->
  <line x1="450" y1="65" x2="450" y2="480" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ========== LEFT: CP Registry ========== -->
  <text x="225" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#3b82f6">CP Registry (Consistent)</text>
  <text x="225" y="102" text-anchor="middle" font-size="11" fill="#64748b">etcd, Consul, ZooKeeper</text>

  <!-- CP Cluster Box -->
  <rect x="30" y="115" width="390" height="170" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- CP Leader Node -->
  <rect x="50" y="130" width="100" height="55" rx="6" fill="#3b82f6"/>
  <text x="100" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Leader</text>
  <text x="100" y="168" text-anchor="middle" font-size="9" fill="#bfdbfe">Node A</text>

  <!-- CP Follower 1 -->
  <rect x="170" y="130" width="100" height="55" rx="6" fill="#93c5fd"/>
  <text x="220" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Follower</text>
  <text x="220" y="168" text-anchor="middle" font-size="9" fill="#1e3a5f">Node B</text>

  <!-- CP Follower 2 -->
  <rect x="290" y="130" width="100" height="55" rx="6" fill="#93c5fd"/>
  <text x="340" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e3a5f">Follower</text>
  <text x="340" y="168" text-anchor="middle" font-size="9" fill="#1e3a5f">Node C</text>

  <!-- Raft arrows between nodes -->
  <path d="M 150 157 L 168 157" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#cpArrow)"/>
  <path d="M 270 157 L 288 157" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#cpArrow)"/>

  <!-- Raft label -->
  <text x="220" y="200" text-anchor="middle" font-size="10" fill="#64748b">Raft Consensus: writes require majority ack</text>

  <!-- CP Registration flow -->
  <rect x="50" y="210" width="340" height="60" rx="4" fill="#eff6ff"/>
  <text x="220" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Registration Flow</text>
  <text x="80" y="250" font-size="9" fill="#64748b">Client writes to Leader</text>
  <text x="220" y="250" text-anchor="middle" font-size="9" fill="#64748b">Leader replicates to majority (2/3)</text>
  <text x="350" y="250" text-anchor="end" font-size="9" fill="#64748b">Write acknowledged</text>

  <!-- CP Partition Scenario -->
  <rect x="30" y="295" width="390" height="175" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="225" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Network Partition Behavior</text>

  <!-- Partition line -->
  <line x1="225" y1="330" x2="225" y2="460" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="225" y="348" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="bold">Partition</text>

  <!-- Partition majority side -->
  <rect x="45" y="358" width="150" height="90" rx="4" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="120" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#059669">Majority (2 nodes)</text>
  <text x="120" y="398" text-anchor="middle" font-size="9" fill="#64748b">Has quorum</text>
  <text x="120" y="414" text-anchor="middle" font-size="9" fill="#64748b">Reads + Writes OK</text>
  <text x="120" y="430" text-anchor="middle" font-size="9" fill="#64748b">Strong consistency</text>

  <!-- Partition minority side -->
  <rect x="255" y="358" width="150" height="90" rx="4" fill="white" stroke="#f59e0b" stroke-width="1"/>
  <text x="330" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#b45309">Minority (1 node)</text>
  <text x="330" y="398" text-anchor="middle" font-size="9" fill="#64748b">No quorum</text>
  <text x="330" y="414" text-anchor="middle" font-size="9" fill="#64748b">Writes blocked</text>
  <text x="330" y="430" text-anchor="middle" font-size="9" fill="#64748b">Reads may be stale</text>

  <!-- ========== RIGHT: AP Registry ========== -->
  <text x="675" y="85" text-anchor="middle" font-size="15" font-weight="bold" fill="#10b981">AP Registry (Available)</text>
  <text x="675" y="102" text-anchor="middle" font-size="11" fill="#64748b">Netflix Eureka</text>

  <!-- AP Cluster Box -->
  <rect x="480" y="115" width="390" height="170" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>

  <!-- AP Node 1 -->
  <rect x="500" y="130" width="100" height="55" rx="6" fill="#10b981"/>
  <text x="550" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Node A</text>
  <text x="550" y="168" text-anchor="middle" font-size="9" fill="#6ee7b7">Independent</text>

  <!-- AP Node 2 -->
  <rect x="620" y="130" width="100" height="55" rx="6" fill="#34d399"/>
  <text x="670" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#064e3b">Node B</text>
  <text x="670" y="168" text-anchor="middle" font-size="9" fill="#064e3b">Independent</text>

  <!-- AP Node 3 -->
  <rect x="740" y="130" width="100" height="55" rx="6" fill="#34d399"/>
  <text x="790" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#064e3b">Node C</text>
  <text x="790" y="168" text-anchor="middle" font-size="9" fill="#064e3b">Independent</text>

  <!-- No consensus label -->
  <text x="670" y="200" text-anchor="middle" font-size="10" fill="#64748b">No consensus: each node operates independently</text>

  <!-- AP Registration flow -->
  <rect x="500" y="210" width="340" height="60" rx="4" fill="#ecfdf5"/>
  <text x="670" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#047857">Registration Flow</text>
  <text x="530" y="250" font-size="9" fill="#64748b">Client writes to any node</text>
  <text x="670" y="250" text-anchor="middle" font-size="9" fill="#64748b">Node accepts immediately</text>
  <text x="810" y="250" text-anchor="end" font-size="9" fill="#64748b">Async replication</text>

  <!-- AP Partition Scenario -->
  <rect x="480" y="295" width="390" height="175" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="675" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#a16207">Network Partition Behavior</text>

  <!-- Partition line -->
  <line x1="675" y1="330" x2="675" y2="460" stroke="#eab308" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="675" y="348" text-anchor="middle" font-size="9" fill="#eab308" font-weight="bold">Partition</text>

  <!-- Partition side 1 -->
  <rect x="495" y="358" width="150" height="90" rx="4" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="570" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#059669">Partition 1</text>
  <text x="570" y="398" text-anchor="middle" font-size="9" fill="#64748b">Continues operating</text>
  <text x="570" y="414" text-anchor="middle" font-size="9" fill="#64748b">Reads + Writes OK</text>
  <text x="570" y="430" text-anchor="middle" font-size="9" fill="#64748b">Data may diverge</text>

  <!-- Partition side 2 -->
  <rect x="705" y="358" width="150" height="90" rx="4" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="780" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#059669">Partition 2</text>
  <text x="780" y="398" text-anchor="middle" font-size="9" fill="#64748b">Continues operating</text>
  <text x="780" y="414" text-anchor="middle" font-size="9" fill="#64748b">Reads + Writes OK</text>
  <text x="780" y="430" text-anchor="middle" font-size="9" fill="#64748b">Data may diverge</text>

  <!-- Anti-entropy label -->
  <text x="675" y="458" text-anchor="middle" font-size="9" fill="#64748b">After heal: anti-entropy reconciliation merges divergent state</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="cpArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
