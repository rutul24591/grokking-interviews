<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD Pipeline Decision Map</title>
  <desc id="desc">Decision map for CI/CD: triggers, caching, isolation, gates, and environment promotion</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">CI/CD Pipeline: Decision Map</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Key design choices for effective delivery pipelines</text>
  
  <!-- Trigger Strategy -->
  <rect x="30" y="85" width="270" height="180" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">1. Trigger Strategy</text>
  
  <rect x="50" y="125" width="200" height="50" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">On Every Commit</text>
  <text x="150" y="168" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Fast feedback, high CI cost</text>
  
  <rect x="50" y="185" width="200" height="50" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">On PR to Main</text>
  <text x="150" y="228" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Balance feedback and cost</text>
  
  <rect x="50" y="245" width="200" height="15" rx="2" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="150" y="257" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">✓ Recommended: PR-based with nightly full</text>
  
  <!-- Caching Strategy -->
  <rect x="315" y="85" width="270" height="180" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">2. Caching Strategy</text>
  
  <rect x="335" y="125" width="230" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Dependency Cache</text>
  <text x="450" y="168" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">node_modules, pip cache</text>
  
  <rect x="335" y="185" width="230" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Build Cache</text>
  <text x="450" y="228" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Compiled objects, Docker layers</text>
  
  <rect x="335" y="245" width="230" height="15" rx="2" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="450" y="257" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">✓ Cache invalidation on lockfile change</text>
  
  <!-- Isolation Level -->
  <rect x="600" y="85" width="270" height="180" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. Isolation Level</text>
  
  <rect x="620" y="125" width="230" height="45" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="735" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #8b5cf6">Container/VM</text>
  <text x="735" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Full isolation, reproducible</text>
  
  <rect x="620" y="180" width="230" height="45" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="735" y="205" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #8b5cf6">Shared Runner</text>
  <text x="735" y="220" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Faster, risk of contamination</text>
  
  <rect x="620" y="235" width="230" height="15" rx="2" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="247" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">✓ Containers for production builds</text>
  
  <!-- Gate Types -->
  <rect x="30" y="280" width="410" height="250" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="235" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">4. Gate Types (Quality Gates)</text>
  
  <rect x="50" y="320" width="370" height="200" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="70" y="345" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="345" font-size="10" fill="var(--text-theme, #1e293b">Automated Gates (Fast)</text>
  <text x="100" y="365" font-size="9" fill="var(--text-theme, #64748b">• Test pass rate &amp;gt; 95%</text>
  <text x="100" y="380" font-size="9" fill="var(--text-theme, #64748b">• Code coverage &amp;gt; 80%</text>
  <text x="100" y="395" font-size="9" fill="var(--text-theme, #64748b">• No critical security issues</text>
  <text x="100" y="410" font-size="9" fill="var(--text-theme, #64748b">• Build size within limits</text>
  
  <text x="70" y="435" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="85" y="435" font-size="10" fill="var(--text-theme, #1e293b">Manual Gates (Slow)</text>
  <text x="100" y="455" font-size="9" fill="var(--text-theme, #64748b">• Production deployment approval</text>
  <text x="100" y="470" font-size="9" fill="var(--text-theme, #64748b">• Database migration review</text>
  <text x="100" y="485" font-size="9" fill="var(--text-theme, #64748b">• Compliance sign-off</text>
  
  <text x="235" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Goal: Maximize automated, minimize manual</text>
  
  <!-- Environment Promotion -->
  <rect x="460" y="280" width="410" height="250" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="665" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">5. Environment Promotion</text>
  
  <rect x="480" y="320" width="370" height="200" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <!-- Environment flow -->
  <rect x="500" y="340" width="70" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="535" y="365" text-anchor="middle" font-size="9" fill="white">Dev</text>
  <text x="535" y="380" text-anchor="middle" font-size="8" fill="#bfdbfe">Auto</text>
  
  <line x1="570" y1="365" x2="590" y2="365" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="600" y="340" width="70" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="635" y="365" text-anchor="middle" font-size="9" fill="white">Staging</text>
  <text x="635" y="380" text-anchor="middle" font-size="8" fill="#6ee7b7">Auto</text>
  
  <line x1="670" y1="365" x2="690" y2="365" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="680" y="355" text-anchor="middle" font-size="7" fill="var(--text-theme, #b45309">Gate</text>
  
  <rect x="700" y="340" width="70" height="50" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="735" y="365" text-anchor="middle" font-size="9" fill="white">Prod</text>
  <text x="735" y="380" text-anchor="middle" font-size="8" fill="#fcd34d">Manual</text>
  
  <!-- Promotion strategies -->
  <text x="665" y="420" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Promotion Strategies:</text>
  <text x="500" y="445" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Same artifact, different config</text>
  <text x="500" y="465" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Environment-specific secrets</text>
  <text x="500" y="485" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Feature flags for gradual rollout</text>
  <text x="500" y="505" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Database migration strategy</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
  </defs>
</svg>
