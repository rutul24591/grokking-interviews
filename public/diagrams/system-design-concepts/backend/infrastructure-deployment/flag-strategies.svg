<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Feature Flag Strategies</text>
  <!-- Percentage Rollout -->
  <rect x="50" y="80" width="260" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Percentage Rollout</text>
  <rect x="70" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Enable for X% of users</text>
  <rect x="70" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Gradually increase</text>
  <rect x="70" y="200" width="220" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Sticky assignment (hash)</text>
  <rect x="70" y="235" width="220" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Most common strategy</text>
  <!-- Segment Targeting -->
  <rect x="330" y="80" width="260" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Segment Targeting</text>
  <rect x="350" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Beta testers, internal users</text>
  <rect x="350" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Premium users, regions</text>
  <rect x="350" y="200" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Device type, browser</text>
  <rect x="350" y="235" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Controlled release</text>
  <!-- A/B Testing -->
  <rect x="610" y="80" width="240" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">A/B Testing</text>
  <rect x="630" y="130" width="200" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Variant A (control)</text>
  <rect x="630" y="165" width="200" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Variant B (treatment)</text>
  <rect x="630" y="200" width="200" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Track metrics per variant</text>
  <rect x="630" y="235" width="200" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Data-driven decisions</text>
  <!-- Comparison -->
  <rect x="50" y="300" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">When to Use Each Strategy</text>
  <rect x="70" y="350" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Percentage: Gradual rollout, risk mitigation</text>
  <rect x="330" y="350" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Segment: Targeted release, testing</text>
  <rect x="590" y="350" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="710" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">A/B Testing: Data-driven feature decisions</text>
  <!-- Sticky Assignment -->
  <rect x="50" y="420" width="800" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Sticky Assignment</text>
  <rect x="70" y="470" width="760" height="45" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Same user always sees the same variant (hash user ID to determine assignment). Prevents inconsistent experience (feature works on one page, not on another).</text>
</svg>
