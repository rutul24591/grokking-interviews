<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Canary Deployment Decision Map</title>
  <desc id="desc">Canary decision map: cohort selection, routing method, ramp schedule, and metric gates</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Canary Deployment: Decision Map</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Key design choices for effective canary rollouts</text>
  
  <!-- Cohort Selection -->
  <rect x="30" y="85" width="270" height="200" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">1. Cohort Selection</text>
  
  <rect x="50" y="125" width="200" height="55" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Percentage-Based</text>
  <text x="150" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Random 10% of traffic</text>
  
  <rect x="50" y="190" width="200" height="55" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">User-Based</text>
  <text x="150" y="235" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Specific user IDs or segments</text>
  
  <rect x="50" y="255" width="200" height="25" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="150" y="273" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ User-based = consistent experience</text>
  
  <!-- Routing Method -->
  <rect x="315" y="85" width="270" height="200" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">2. Routing Method</text>
  
  <rect x="335" y="125" width="230" height="55" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Load Balancer</text>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Weighted routing at LB</text>
  
  <rect x="335" y="190" width="230" height="55" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Service Mesh</text>
  <text x="450" y="235" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Istio, Linkerd traffic split</text>
  
  <rect x="335" y="255" width="230" height="25" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="450" y="273" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ Service mesh = fine-grained control</text>
  
  <!-- Ramp Schedule -->
  <rect x="600" y="85" width="270" height="200" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">3. Ramp Schedule</text>
  
  <!-- Ramp visualization -->
  <rect x="620" y="125" width="230" height="100" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <!-- Ramp steps -->
  <rect x="630" y="205" width="40" height="15" rx="2" fill="var(--bg-theme, #f59e0b)"/>
  <text x="650" y="230" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">10%</text>
  
  <rect x="680" y="190" width="40" height="30" rx="2" fill="var(--bg-theme, #f59e0b)"/>
  <text x="700" y="230" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">25%</text>
  
  <rect x="730" y="170" width="40" height="50" rx="2" fill="var(--bg-theme, #f59e0b)"/>
  <text x="750" y="230" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">50%</text>
  
  <rect x="780" y="145" width="40" height="75" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="800" y="230" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">100%</text>
  
  <text x="735" y="250" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Typical: 10% → 25% → 50% → 100%</text>
  <text x="735" y="265" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Wait 5-15 min between stages</text>
  
  <rect x="620" y="270" width="230" height="10" rx="2" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="280" text-anchor="middle" font-size="7" fill="var(--text-theme, #b45309">~ Adjust based on risk tolerance</text>
  
  <!-- Metric Gates -->
  <rect x="30" y="300" width="410" height="230" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="235" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">4. Metric Gates (Promotion Criteria)</text>
  
  <rect x="50" y="340" width="370" height="180" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <!-- Green metrics (pass) -->
  <rect x="70" y="360" width="150" height="45" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="145" y="385" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">Error Rate</text>
  <text x="145" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">&amp;lt; 1% threshold</text>
  
  <rect x="240" y="360" width="150" height="45" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="315" y="385" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">Latency p95</text>
  <text x="315" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">&amp;lt; 200ms threshold</text>
  
  <rect x="70" y="420" width="150" height="45" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="145" y="445" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">Success Rate</text>
  <text x="145" y="460" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">&amp;gt; 99% threshold</text>
  
  <rect x="240" y="420" width="150" height="45" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="315" y="445" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">Business Metrics</text>
  <text x="315" y="460" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Checkout rate, etc.</text>
  
  <!-- Red metrics (fail) -->
  <rect x="70" y="480" width="320" height="30" rx="4" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="230" y="500" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">Any gate fails → Automatic rollback</text>
  
  <!-- Rollback Strategy -->
  <rect x="460" y="300" width="410" height="230" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="665" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">5. Rollback Strategy</text>
  
  <rect x="480" y="340" width="370" height="180" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="500" y="365" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">•</text>
  <text x="515" y="365" font-size="10" fill="var(--text-theme, #1e293b">Automatic rollback on gate failure</text>
  
  <text x="500" y="385" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">•</text>
  <text x="515" y="385" font-size="10" fill="var(--text-theme, #1e293b">Instant traffic shift back to stable</text>
  
  <text x="500" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">•</text>
  <text x="515" y="405" font-size="10" fill="var(--text-theme, #1e293b">Canary instances terminated</text>
  
  <text x="500" y="425" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">•</text>
  <text x="515" y="425" font-size="10" fill="var(--text-theme, #1e293b">Incident created for investigation</text>
  
  <text x="500" y="450" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">•</text>
  <text x="515" y="450" font-size="10" fill="var(--text-theme, #1e293b">Post-mortem before retry</text>
  
  <rect x="480" y="485" width="370" height="30" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="665" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">Rollback should be faster than rollout!</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
