<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="100%" height="100%">
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Service Discovery Architecture</text>
  <!-- Service Registry at center -->
  <rect x="330" y="70" width="240" height="100" rx="12" fill="#3b82f6"/>
  <text x="450" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Service Registry</text>
  <text x="450" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#dbeafe">Consul, etcd, Eureka</text>
  <text x="450" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#dbeafe">Tracks instances, health, metadata</text>
  <!-- Health check arrows from registry to services -->
  <line x1="380" y1="170" x2="150" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <line x1="450" y1="170" x2="450" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <line x1="520" y1="170" x2="750" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <text x="310" y="210" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1d4ed8">Health check</text>
  <text x="480" y="210" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1d4ed8">Health check</text>
  <text x="590" y="210" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1d4ed8">Health check</text>
  <!-- Service instances -->
  <rect x="60" y="280" width="160" height="80" rx="10" fill="#10b981"/>
  <text x="140" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">User Service</text>
  <text x="140" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">3 instances, 10.0.1.x</text>
  <text x="140" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d1fae5">Status: Healthy</text>
  <rect x="370" y="280" width="160" height="80" rx="10" fill="#10b981"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Order Service</text>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">5 instances, 10.0.2.x</text>
  <text x="450" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d1fae5">Status: Healthy</text>
  <rect x="680" y="280" width="160" height="80" rx="10" fill="#ef4444"/>
  <text x="760" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Payment Service</text>
  <text x="760" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#fecaca">2 instances, 10.0.3.x</text>
  <text x="760" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#fecaca">Status: 1 unhealthy</text>
  <!-- Client queries registry -->
  <rect x="330" y="410" width="240" height="80" rx="10" fill="#6366f1"/>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Client / API Gateway</text>
  <text x="450" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#e0e7ff">Queries registry for service IPs</text>
  <!-- Discovery arrow -->
  <line x1="450" y1="410" x2="450" y2="170" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowpurple)"/>
  <text x="480" y="300" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4338ca">Discovery query</text>
  <!-- Load balancer -->
  <rect x="330" y="500" width="240" height="40" rx="6" fill="#8b5cf6"/>
  <text x="450" y="525" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Load Balancer (distributes traffic)</text>
  <!-- Traffic arrows -->
  <line x1="140" y1="360" x2="380" y2="500" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="450" y1="360" x2="450" y2="500" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Key insight -->
  <text x="450" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">Services register with the registry, registry health-checks instances, clients query registry for healthy endpoints, load balancer distributes traffic</text>
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowpurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
</svg>