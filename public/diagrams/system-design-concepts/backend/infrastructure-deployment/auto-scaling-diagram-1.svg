<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Auto-Scaling Feedback Loop</title>
  <desc id="desc">Auto-scaling loop: metrics feed a scaling controller that adjusts capacity behind a load balancer</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Auto-Scaling Feedback Loop</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Metrics drive scaling decisions that adjust capacity</text>
  
  <!-- Load Balancer -->
  <rect x="30" y="85" width="180" height="80" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Load Balancer</text>
  <text x="120" y="140" text-anchor="middle" font-size="9" fill="#bfdbfe">Distributes traffic</text>
  <text x="120" y="155" text-anchor="middle" font-size="9" fill="#bfdbfe">Health checks</text>
  
  <!-- Traffic arrows to instances -->
  <line x1="210" y1="115" x2="260" y2="115" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="210" y1="135" x2="260" y2="145" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="210" y1="155" x2="260" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Instance Group -->
  <rect x="270" y="85" width="300" height="200" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="420" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Instance Group</text>
  
  <!-- Instance 1 -->
  <rect x="290" y="125" width="80" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="330" y="150" text-anchor="middle" font-size="9" fill="white">Instance 1</text>
  <text x="330" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">CPU: 45%</text>
  <text x="330" y="178" text-anchor="middle" font-size="8" fill="#6ee7b7">Req/s: 100</text>
  
  <!-- Instance 2 -->
  <rect x="380" y="125" width="80" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="420" y="150" text-anchor="middle" font-size="9" fill="white">Instance 2</text>
  <text x="420" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">CPU: 52%</text>
  <text x="420" y="178" text-anchor="middle" font-size="8" fill="#6ee7b7">Req/s: 120</text>
  
  <!-- Instance 3 -->
  <rect x="470" y="125" width="80" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="510" y="150" text-anchor="middle" font-size="9" fill="white">Instance 3</text>
  <text x="510" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">CPU: 48%</text>
  <text x="510" y="178" text-anchor="middle" font-size="8" fill="#6ee7b7">Req/s: 110</text>
  
  <!-- Metrics Collection -->
  <line x1="420" y1="285" x2="420" y2="320" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="440" y="305" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">Metrics</text>
  
  <!-- Metrics Store -->
  <rect x="330" y="320" width="180" height="60" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="420" y="345" text-anchor="middle" font-size="10" fill="white">Metrics Store</text>
  <text x="420" y="365" text-anchor="middle" font-size="8" fill="#c4b5fd">CPU, Memory, Req/s</text>
  
  <!-- Metrics to Controller -->
  <line x1="510" y1="350" x2="560" y2="350" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Scaling Controller -->
  <rect x="570" y="320" width="180" height="80" rx="6" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="660" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Scaling Controller</text>
  <text x="660" y="365" text-anchor="middle" font-size="9" fill="#fcd34d">Compares vs thresholds</text>
  <text x="660" y="380" text-anchor="middle" font-size="9" fill="#fcd34d">Decides: scale up/down</text>
  
  <!-- Controller to Instance Group -->
  <line x1="660" y1="320" x2="660" y2="285" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-up)"/>
  <text x="680" y="305" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">Scale Command</text>
  
  <!-- Scale Out arrow -->
  <path d="M 660 285 L 660 250 L 420 250 L 420 285" fill="none" stroke="var(--text-theme, #10b981)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text x="550" y="240" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Scale Out</text>
  
  <!-- Scale In arrow -->
  <path d="M 380 285 L 380 250 L 180 250 L 180 350" fill="none" stroke="var(--text-theme, #ef4444)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="250" y="240" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">Scale In</text>
  
  <!-- Bottom: Key Components -->
  <rect x="30" y="420" width="840" height="110" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="445" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Key Components of Auto-Scaling</text>
  
  <rect x="50" y="460" width="190" height="60" rx="4" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="145" y="485" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #3b82f6">Metrics</text>
  <text x="145" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">CPU, Memory, Queue Depth</text>
  
  <rect x="255" y="460" width="190" height="60" rx="4" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="350" y="485" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">Thresholds</text>
  <text x="350" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Scale up at 70%, down at 30%</text>
  
  <rect x="460" y="460" width="190" height="60" rx="4" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="555" y="485" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">Cooldown</text>
  <text x="555" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Prevent oscillation</text>
  
  <rect x="665" y="460" width="190" height="60" rx="4" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="760" y="485" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #8b5cf6">Limits</text>
  <text x="760" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Min/Max instances</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-up" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="5 0, 0 7, 10 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
