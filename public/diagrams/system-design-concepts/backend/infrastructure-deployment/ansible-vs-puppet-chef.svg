<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Configuration Management Tools Comparison</text>
  <!-- Ansible -->
  <rect x="30" y="70" width="270" height="400" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="70" width="270" height="50" rx="10" fill="#3b82f6"/>
  <text x="165" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Ansible</text>
  <text x="50" y="150" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e40af">Model: Push (SSH)</text>
  <text x="50" y="175" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e40af">Agent: Agentless</text>
  <text x="50" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e40af">Language: YAML</text>
  <text x="50" y="225" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e40af">Idempotent: Yes</text>
  <text x="50" y="250" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e40af">Learning: Easy</text>
  <rect x="50" y="270" width="220" height="50" rx="6" fill="#dbeafe"/>
  <text x="165" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Best For</text>
  <text x="165" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1e40af">Small-medium fleets, simple setup</text>
  <rect x="50" y="340" width="220" height="110" rx="6" fill="#dbeafe"/>
  <text x="165" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Pros</text>
  <text x="60" y="385" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1e40af">- No agents, simple YAML</text>
  <text x="60" y="405" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1e40af">- Large module library</text>
  <text x="60" y="425" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1e40af">- Quick to learn</text>
  <text x="60" y="445" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1e40af">- Ad-hoc command support</text>
  <!-- Puppet -->
  <rect x="315" y="70" width="270" height="400" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="315" y="70" width="270" height="50" rx="10" fill="#f59e0b"/>
  <text x="450" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Puppet</text>
  <text x="335" y="150" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#92400e">Model: Pull (agent)</text>
  <text x="335" y="175" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#92400e">Agent: Required</text>
  <text x="335" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#92400e">Language: Puppet DSL</text>
  <text x="335" y="225" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#92400e">Idempotent: Yes</text>
  <text x="335" y="250" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#92400e">Learning: Moderate</text>
  <rect x="335" y="270" width="220" height="50" rx="6" fill="#fef3c7"/>
  <text x="445" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">Best For</text>
  <text x="445" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#92400e">Large fleets, continuous enforcement</text>
  <rect x="335" y="340" width="220" height="110" rx="6" fill="#fef3c7"/>
  <text x="445" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">Pros</text>
  <text x="345" y="385" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#92400e">- Auto-drift correction</text>
  <text x="345" y="405" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#92400e">- Scalable to thousands</text>
  <text x="345" y="425" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#92400e">- Mature ecosystem</text>
  <text x="345" y="445" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#92400e">- Strong reporting</text>
  <!-- Chef -->
  <rect x="600" y="70" width="270" height="400" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <rect x="600" y="70" width="270" height="50" rx="10" fill="#ec4899"/>
  <text x="735" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Chef</text>
  <text x="620" y="150" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#9d174d">Model: Pull (agent)</text>
  <text x="620" y="175" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#9d174d">Agent: Required</text>
  <text x="620" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#9d174d">Language: Ruby</text>
  <text x="620" y="225" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#9d174d">Idempotent: Yes</text>
  <text x="620" y="250" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#9d174d">Learning: Steep</text>
  <rect x="620" y="270" width="220" height="50" rx="6" fill="#fce7f3"/>
  <text x="730" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9d174d">Best For</text>
  <text x="730" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#9d174d">Programming language flexibility</text>
  <rect x="620" y="340" width="220" height="110" rx="6" fill="#fce7f3"/>
  <text x="730" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9d174d">Pros</text>
  <text x="630" y="385" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#9d174d">- Full Ruby power</text>
  <text x="630" y="405" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#9d174d">- Testable recipes</text>
  <text x="630" y="425" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#9d174d">- Rich cookbook library</text>
  <text x="630" y="445" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#9d174d">- Enterprise features</text>
  <!-- Bottom comparison note -->
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">All three are idempotent, support roles/modules, and integrate with CI/CD — choice depends on scale, agent tolerance, and language preference</text>
</svg>