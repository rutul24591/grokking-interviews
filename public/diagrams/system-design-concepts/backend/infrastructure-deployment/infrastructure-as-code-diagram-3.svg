<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Infrastructure as Code - Best Practices</title>
  <desc id="desc">IaC best practices showing directory structure, versioning, and security</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Infrastructure as Code - Best Practices</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Directory structure, versioning, and security</text>
  
  <!-- Directory Structure -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Recommended Directory Structure</text>
  
  <rect x="50" y="125" width="360" height="230" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  
  <text x="70" y="150" text-anchor="start" font-size="10" font-family="monospace" fill="var(--text-theme, #64748b">infrastructure/</text>
  <text x="85" y="170" text-anchor="start" font-size="9" font-family="monospace" fill="var(--text-theme, #64748b">├── modules/</text>
  <text x="100" y="188" text-anchor="start" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">├── vpc/</text>
  <text x="100" y="203" text-anchor="start" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">├── compute/</text>
  <text x="100" y="218" text-anchor="start" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">├── database/</text>
  <text x="100" y="233" text-anchor="start" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">└── security/</text>
  
  <text x="85" y="253" text-anchor="start" font-size="9" font-family="monospace" fill="var(--text-theme, #64748b">├── environments/</text>
  <text x="100" y="271" text-anchor="start" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">├── dev/</text>
  <text x="100" y="286" text-anchor="start" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">├── staging/</text>
  <text x="100" y="301" text-anchor="start" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">└── prod/</text>
  
  <text x="85" y="321" text-anchor="start" font-size="9" font-family="monospace" fill="var(--text-theme, #64748b">├── scripts/</text>
  <text x="85" y="339" text-anchor="start" font-size="9" font-family="monospace" fill="var(--text-theme, #64748b">└── README.md</text>
  
  <!-- Version Control -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Version Control Best Practices</text>
  
  <rect x="490" y="125" width="360" height="150" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  
  <text x="510" y="150" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="150" font-size="10" fill="var(--text-theme, #1e293b">All IaC in git repository</text>
  
  <text x="510" y="170" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="170" font-size="10" fill="var(--text-theme, #1e293b">PR reviews required</text>
  
  <text x="510" y="190" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="190" font-size="10" fill="var(--text-theme, #1e293b">Semantic versioning for modules</text>
  
  <text x="510" y="210" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="210" font-size="10" fill="var(--text-theme, #1e293b">Tag releases (v1.0.0, v1.1.0)</text>
  
  <text x="510" y="235" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="525" y="235" font-size="10" fill="var(--text-theme, #1e293b">Never commit secrets</text>
  
  <text x="510" y="255" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="525" y="255" font-size="10" fill="var(--text-theme, #1e293b">Use .gitignore for state files</text>
  
  <!-- State Management -->
  <rect x="490" y="285" width="360" height="110" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">State Management</text>
  
  <text x="510" y="335" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="335" font-size="10" fill="var(--text-theme, #1e293b">Remote state (S3 + DynamoDB)</text>
  
  <text x="510" y="355" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="355" font-size="10" fill="var(--text-theme, #1e293b">State locking enabled</text>
  
  <text x="510" y="375" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="375" font-size="10" fill="var(--text-theme, #1e293b">Separate state per environment</text>
  
  <!-- Security -->
  <rect x="30" y="380" width="400" height="150" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="230" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Security Best Practices</text>
  
  <rect x="50" y="420" width="360" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <text x="70" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="445" font-size="10" fill="var(--text-theme, #1e293b">Use secrets manager (not plaintext)</text>
  
  <text x="70" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="465" font-size="10" fill="var(--text-theme, #1e293b">Least privilege IAM policies</text>
  
  <text x="70" y="485" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="485" font-size="10" fill="var(--text-theme, #1e293b">Encrypt state files at rest</text>
  
  <text x="70" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="505" font-size="10" fill="var(--text-theme, #1e293b">Audit all changes via git history</text>
  
  <!-- CI/CD Integration -->
  <rect x="470" y="380" width="400" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="670" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">CI/CD Integration</text>
  
  <rect x="490" y="420" width="360" height="100" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="510" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="445" font-size="10" fill="var(--text-theme, #1e293b">terraform fmt on PR</text>
  
  <text x="510" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="465" font-size="10" fill="var(--text-theme, #1e293b">terraform validate on PR</text>
  
  <text x="510" y="485" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="485" font-size="10" fill="var(--text-theme, #1e293b">terraform plan as PR comment</text>
  
  <text x="510" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="505" font-size="10" fill="var(--text-theme, #1e293b">terraform apply on merge (with approval)</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
