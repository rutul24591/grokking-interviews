<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Container Build Pipeline</text>
  <!-- Source Code -->
  <rect x="50" y="80" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Source Code</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Application code</text>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Dockerfile</text>
  <text x="140" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Dependencies</text>
  <path d="M 230 140 L 280 140" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Build -->
  <rect x="280" y="80" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Image Build</text>
  <text x="370" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Execute Dockerfile</text>
  <text x="370" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Create layers</text>
  <text x="370" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Cache unchanged layers</text>
  <path d="M 460 140 L 510 140" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Registry -->
  <rect x="510" y="80" width="180" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Registry</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Push image</text>
  <text x="600" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Version with tag</text>
  <text x="600" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Vulnerability scan</text>
  <path d="M 690 140 L 740 140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Deploy -->
  <rect x="740" y="80" width="130" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="805" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">Deploy</text>
  <text x="805" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Pull image</text>
  <text x="805" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Run container</text>
  <text x="805" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Inject config</text>
  <!-- Configuration -->
  <rect x="50" y="220" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Runtime Configuration (Not in Image)</text>
  <rect x="70" y="270" width="240" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Environment variables</text>
  <text x="190" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">API URLs, feature flags</text>
  <rect x="330" y="270" width="240" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Secret management</text>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Vault, AWS Secrets Manager</text>
  <rect x="590" y="270" width="240" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="710" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Config files</text>
  <text x="710" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Mounted volumes</text>
  <!-- Key Principle -->
  <rect x="50" y="360" width="800" height="80" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Build Once, Run Anywhere</text>
  <text x="450" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Same image runs in dev, staging, production. Only configuration changes, not the image. This ensures environment consistency.</text>
  <rect x="50" y="460" width="800" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Immutability</text>
  <text x="450" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Images are immutable — once built, they never change. To update, build a new image with a new tag. Deploy the new image.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
