<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Rolling Deployment Strategies</title>
  <desc id="desc">Rolling deployment strategies: batch size, health checks, and rollback</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Rolling Deployment: Strategies</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Batch size, health checks, and rollback strategies</text>
  
  <!-- Batch Size Options -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">1. Batch Size Options</text>
  
  <rect x="50" y="125" width="200" height="55" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">One-by-One</text>
  <text x="150" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Safest, slowest</text>
  
  <rect x="50" y="190" width="200" height="55" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Percentage (25%)</text>
  <text x="150" y="235" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Balance speed/safety</text>
  
  <rect x="50" y="255" width="200" height="40" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="150" y="278" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ Recommended: 25% batches</text>
  
  <!-- Health Check Gates -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">2. Health Check Gates</text>
  
  <rect x="335" y="125" width="230" height="70" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Before Next Batch:</text>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• HTTP 200 OK</text>
  <text x="450" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Error rate &lt; 1%</text>
  
  <rect x="335" y="205" width="230" height="70" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="230" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Wait Period:</text>
  <text x="450" y="250" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• 30-60 seconds</text>
  <text x="450" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Monitor metrics</text>
  
  <rect x="335" y="285" width="230" height="15" rx="2" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="450" y="297" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">✓ Fail fast on health check failure</text>
  
  <!-- Rollback Strategy -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">3. Rollback Strategy</text>
  
  <rect x="620" y="125" width="230" height="70" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Automatic Rollback:</text>
  <text x="735" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Error rate spike</text>
  <text x="735" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Health check fails</text>
  
  <rect x="620" y="205" width="230" height="70" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="230" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Rollback Process:</text>
  <text x="735" y="250" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Stop new deployments</text>
  <text x="735" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Revert to previous version</text>
  
  <rect x="620" y="285" width="230" height="15" rx="2" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="297" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">✓ Keep old version running during deploy</text>
  
  <!-- Deployment Timeline -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Typical Rolling Deployment Timeline</text>
  
  <!-- Timeline -->
  <rect x="50" y="360" width="800" height="160" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <line x1="70" y1="440" x2="830" y2="440" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <text x="840" y="445" font-size="9" fill="var(--text-theme, #64748b">Time →</text>
  
  <!-- Phase markers -->
  <rect x="80" y="420" width="80" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="120" y="443" text-anchor="middle" font-size="8" fill="white">Batch 1</text>
  <text x="120" y="455" text-anchor="middle" font-size="7" fill="#fcd34d">25%</text>
  
  <line x1="165" y1="440" x2="185" y2="440" stroke="var(--text-theme, #10b981)" stroke-width="2"/>
  <text x="175" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Health OK</text>
  
  <rect x="190" y="420" width="80" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="230" y="443" text-anchor="middle" font-size="8" fill="white">Batch 2</text>
  <text x="230" y="455" text-anchor="middle" font-size="7" fill="#fcd34d">50%</text>
  
  <line x1="275" y1="440" x2="295" y2="440" stroke="var(--text-theme, #10b981)" stroke-width="2"/>
  <text x="285" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Health OK</text>
  
  <rect x="300" y="420" width="80" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="340" y="443" text-anchor="middle" font-size="8" fill="white">Batch 3</text>
  <text x="340" y="455" text-anchor="middle" font-size="7" fill="#fcd34d">75%</text>
  
  <line x1="385" y1="440" x2="405" y2="440" stroke="var(--text-theme, #10b981)" stroke-width="2"/>
  <text x="395" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Health OK</text>
  
  <rect x="410" y="420" width="80" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="450" y="443" text-anchor="middle" font-size="8" fill="white">Batch 4</text>
  <text x="450" y="455" text-anchor="middle" font-size="7" fill="#6ee7b7">100%</text>
  
  <line x1="495" y1="440" x2="515" y2="440" stroke="var(--text-theme, #10b981)" stroke-width="2"/>
  <text x="505" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Complete</text>
  
  <rect x="520" y="420" width="100" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="570" y="443" text-anchor="middle" font-size="8" font-weight="bold" fill="white">Deployment</text>
  <text x="570" y="455" text-anchor="middle" font-size="7" fill="#6ee7b7">Successful</text>
  
  <text x="450" y="495" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Total time: ~10-20 minutes for 4 batches (with health checks)</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
