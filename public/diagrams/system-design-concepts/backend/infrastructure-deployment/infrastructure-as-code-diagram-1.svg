<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Infrastructure as Code Architecture</title>
  <desc id="desc">IaC showing declarative configuration, state management, and deployment workflow</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Infrastructure as Code Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Declarative configuration, state management, and deployment workflow</text>
  
  <!-- IaC Workflow -->
  <rect x="30" y="85" width="550" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="305" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">IaC Deployment Workflow</text>
  
  <!-- Code -->
  <rect x="50" y="125" width="100" height="70" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="100" y="155" text-anchor="middle" font-size="9" fill="white">IaC Code</text>
  <text x="100" y="170" text-anchor="middle" font-size="8" fill="#bfdbfe">Terraform</text>
  <text x="100" y="183" text-anchor="middle" font-size="7" fill="#bfdbfe">CloudFormation</text>
  
  <!-- Plan -->
  <line x1="150" y1="160" x2="200" y2="160" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="175" y="150" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">terraform plan</text>
  
  <rect x="200" y="125" width="120" height="70" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="260" y="155" text-anchor="middle" font-size="9" fill="white">Execution Plan</text>
  <text x="260" y="170" text-anchor="middle" font-size="8" fill="#fcd34d">Preview changes</text>
  <text x="260" y="183" text-anchor="middle" font-size="7" fill="#fcd34d">+2 EC2, -1 SG</text>
  
  <!-- Apply -->
  <line x1="320" y1="160" x2="370" y2="160" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="345" y="150" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">terraform apply</text>
  
  <!-- State -->
  <rect x="370" y="125" width="100" height="70" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="420" y="155" text-anchor="middle" font-size="9" fill="white">State File</text>
  <text x="420" y="170" text-anchor="middle" font-size="8" fill="#c4b5fd">terraform.tfstate</text>
  <text x="420" y="183" text-anchor="middle" font-size="7" fill="#c4b5fd">Resource mapping</text>
  
  <!-- Cloud -->
  <line x1="470" y1="160" x2="520" y2="160" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="495" y="150" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">API calls</text>
  
  <rect x="520" y="125" width="40" height="70" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="540" y="155" text-anchor="middle" font-size="8" fill="white">Cloud</text>
  <text x="540" y="170" text-anchor="middle" font-size="7" fill="#6ee7b7">AWS</text>
  <text x="540" y="183" text-anchor="middle" font-size="7" fill="#6ee7b7">GCP</text>
  
  <!-- State management detail -->
  <rect x="50" y="215" width="510" height="140" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="305" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">State Management</text>
  
  <!-- Local state -->
  <rect x="70" y="255" width="100" height="50" rx="3" fill="var(--bg-theme, #94a3b8)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="120" y="280" text-anchor="middle" font-size="8" fill="white">Local State</text>
  <text x="120" y="295" text-anchor="middle" font-size="7" fill="#94a3b8">✗ Not shared</text>
  
  <!-- Remote state -->
  <rect x="200" y="255" width="120" height="50" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="260" y="280" text-anchor="middle" font-size="8" fill="white">Remote State</text>
  <text x="260" y="295" text-anchor="middle" font-size="7" fill="#6ee7b7">✓ S3 + DynamoDB</text>
  
  <!-- State locking -->
  <rect x="350" y="255" width="100" height="50" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="400" y="280" text-anchor="middle" font-size="8" fill="white">State Locking</text>
  <text x="400" y="295" text-anchor="middle" font-size="7" fill="#fcd34d">Prevents conflicts</text>
  
  <!-- State versioning -->
  <rect x="480" y="255" width="60" height="50" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="510" y="280" text-anchor="middle" font-size="8" fill="white">Version</text>
  <text x="510" y="295" text-anchor="middle" font-size="7" fill="#bfdbfe">Rollback</text>
  
  <!-- IaC Benefits -->
  <rect x="600" y="85" width="270" height="280" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">IaC Benefits</text>
  
  <rect x="620" y="125" width="230" height="230" rx="4" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <text x="640" y="150" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="655" y="150" font-size="10" fill="var(--text-theme, #1e293b">Version controlled infra</text>
  
  <text x="640" y="170" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="655" y="170" font-size="10" fill="var(--text-theme, #1e293b">Repeatable deployments</text>
  
  <text x="640" y="190" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="655" y="190" font-size="10" fill="var(--text-theme, #1e293b">Peer review via PRs</text>
  
  <text x="640" y="210" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="655" y="210" font-size="10" fill="var(--text-theme, #1e293b">Audit trail of changes</text>
  
  <text x="640" y="230" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="655" y="230" font-size="10" fill="var(--text-theme, #1e293b">Disaster recovery</text>
  
  <text x="640" y="250" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="655" y="250" font-size="10" fill="var(--text-theme, #1e293b">Multi-environment</text>
  
  <text x="640" y="275" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="655" y="275" font-size="10" fill="var(--text-theme, #1e293b">State file is critical</text>
  
  <text x="640" y="295" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="655" y="295" font-size="10" fill="var(--text-theme, #1e293b">Learning curve</text>
  
  <text x="640" y="315" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="655" y="315" font-size="10" fill="var(--text-theme, #1e293b">Provider lock-in risk</text>
  
  <!-- IaC Tools -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Popular IaC Tools</text>
  
  <rect x="50" y="420" width="190" height="100" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="145" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Terraform</text>
  <text x="145" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Multi-cloud</text>
  <text x="145" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">HCL language</text>
  <text x="145" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Large provider ecosystem</text>
  
  <rect x="260" y="420" width="190" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="355" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">CloudFormation</text>
  <text x="355" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">AWS native</text>
  <text x="355" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">YAML/JSON</text>
  <text x="355" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Deep AWS integration</text>
  
  <rect x="470" y="420" width="190" height="100" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="565" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Pulumi</text>
  <text x="565" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Real languages</text>
  <text x="565" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">TypeScript, Python</text>
  <text x="565" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Multi-cloud</text>
  
  <rect x="680" y="420" width="190" height="100" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="775" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #8b5cf6">Ansible</text>
  <text x="775" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Configuration mgmt</text>
  <text x="775" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Agentless</text>
  <text x="775" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">YAML playbooks</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
