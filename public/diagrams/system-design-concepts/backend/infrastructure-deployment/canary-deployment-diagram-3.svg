<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Canary Deployment Failure Modes</title>
  <desc id="desc">Canary deployment failure modes: wrong cohort, metric blind spots, slow rollback, and noise vs signal</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Canary Deployment: Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">What can go wrong with canary rollouts</text>
  
  <!-- Wrong Cohort -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444">1. Wrong Cohort Selection</text>
  
  <!-- Unrepresentative cohort -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  
  <!-- Internal users only -->
  <rect x="60" y="150" width="150" height="55" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="135" y="175" text-anchor="middle" font-size="9" fill="white">Canary Cohort</text>
  <text x="135" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">Internal users only</text>
  <text x="135" y="203" text-anchor="middle" font-size="7" fill="#93c5fd">Fast network, new devices</text>
  
  <line x1="215" y1="178" x2="245" y2="178" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="230" y="168" text-anchor="middle" font-size="7" fill="var(--text-theme, #ef4444">Not representative!</text>
  
  <!-- Production users -->
  <rect x="255" y="150" width="150" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="330" y="175" text-anchor="middle" font-size="9" fill="white">Production Users</text>
  <text x="330" y="190" text-anchor="middle" font-size="8" fill="#6ee7b7">Diverse conditions</text>
  <text x="330" y="203" text-anchor="middle" font-size="7" fill="#6ee7b7">Slow networks, old devices</text>
  
  <text x="235" y="240" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Canary passes, production fails!</text>
  <text x="235" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Cause: Cohort doesn't match production diversity</text>
  <text x="235" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Use production-representative cohort</text>
  
  <!-- Metric Blind Spots -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">2. Metric Blind Spots</text>
  
  <!-- Missing metrics -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  
  <!-- Monitored metrics -->
  <rect x="490" y="150" width="160" height="55" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="570" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">Monitored</text>
  <text x="570" y="190" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">✓ Error rate</text>
  <text x="570" y="203" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">✓ Latency</text>
  
  <line x1="655" y1="178" x2="685" y2="178" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <!-- Unmonitored metrics -->
  <rect x="695" y="150" width="145" height="55" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="767" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="white">NOT Monitored</text>
  <text x="767" y="190" text-anchor="middle" font-size="8" fill="#fca5a5">✗ Memory leak</text>
  <text x="767" y="203" text-anchor="middle" font-size="8" fill="#fca5a5">✗ Data corruption</text>
  
  <text x="665" y="240" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Canary passes, memory leak crashes in prod!</text>
  <text x="665" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Cause: Missing critical health indicators</text>
  <text x="665" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Include resource metrics, business metrics</text>
  
  <!-- Slow Rollback -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. Slow Rollback</text>
  
  <!-- Rollback timeline -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  
  <!-- Timeline -->
  <line x1="70" y1="450" x2="400" y2="450" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <text x="410" y="455" font-size="9" fill="var(--text-theme, #64748b">Time →</text>
  
  <!-- Problem detected -->
  <rect x="80" y="430" width="50" height="40" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="105" y="453" text-anchor="middle" font-size="8" fill="white">Problem</text>
  <text x="105" y="465" text-anchor="middle" font-size="7" fill="#fca5a5">Detected</text>
  
  <!-- Manual approval delay -->
  <line x1="130" y1="450" x2="200" y2="450" stroke="var(--text-theme, #f59e0b)" stroke-width="4" stroke-dasharray="5,3"/>
  <text x="165" y="440" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">Approval (10 min)</text>
  
  <!-- Traffic shift -->
  <rect x="200" y="430" width="50" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="225" y="453" text-anchor="middle" font-size="8" fill="white">Shift</text>
  <text x="225" y="465" text-anchor="middle" font-size="7" fill="#fcd34d">Traffic</text>
  
  <!-- Drain delay -->
  <line x1="250" y1="450" x2="320" y2="450" stroke="var(--text-theme, #f59e0b)" stroke-width="4" stroke-dasharray="5,3"/>
  <text x="285" y="440" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">Drain (5 min)</text>
  
  <!-- Complete -->
  <rect x="320" y="430" width="50" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="345" y="453" text-anchor="middle" font-size="8" fill="white">Done</text>
  
  <text x="235" y="495" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">15+ minutes of degraded service!</text>
  <text x="235" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Automated rollback, pre-approved thresholds</text>
  
  <!-- Noise vs Signal -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">4. Noise vs Signal Problem</text>
  
  <!-- False positive scenario -->
  <rect x="480" y="380" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  
  <!-- Normal fluctuation -->
  <rect x="490" y="395" width="160" height="55" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="570" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">Normal Fluctuation</text>
  <text x="570" y="435" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Error rate: 0.5% → 0.8%</text>
  <text x="570" y="448" text-anchor="middle" font-size="7" fill="#b45309">Within normal range</text>
  
  <line x1="655" y1="423" x2="685" y2="423" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="670" y="413" text-anchor="middle" font-size="7" fill="var(--text-theme, #ef4444">Triggered rollback!</text>
  
  <!-- Actual problem -->
  <rect x="695" y="395" width="145" height="55" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="767" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Actual Problem</text>
  <text x="767" y="435" text-anchor="middle" font-size="8" fill="#fca5a5">Memory: 60% → 95%</text>
  <text x="767" y="448" text-anchor="middle" font-size="7" fill="#fca5a5">Not monitored!</text>
  
  <text x="665" y="465" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Rollback for noise, miss real problem!</text>
  <text x="665" y="485" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Cause: Poor threshold tuning, missing context</text>
  <text x="665" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Use baselines, multiple signal correlation</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
