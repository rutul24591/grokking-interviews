<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">GitOps Drift Detection</text>
  <!-- Desired State -->
  <rect x="50" y="80" width="350" height="160" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="225" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0c4a6e">Desired State (Git)</text>
  <rect x="70" y="130" width="310" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Kubernetes manifests (v2.0)</text>
  <rect x="70" y="160" width="310" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Replicas: 3</text>
  <rect x="70" y="190" width="310" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Resources: CPU 500m, Memory 512Mi</text>
  <!-- Comparison -->
  <path d="M 400 160 L 450 160" stroke="#647480" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="450" y="100" width="100" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="500" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Compare</text>
  <text x="500" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Detect differences</text>
  <!-- Actual State -->
  <rect x="550" y="80" width="300" height="160" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="700" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">Actual State (Infrastructure)</text>
  <rect x="570" y="130" width="260" height="25" rx="3" fill="#ffffff" stroke="#fecaca"/>
  <text x="700" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Kubernetes manifests (v2.0) ✓</text>
  <rect x="570" y="160" width="260" height="25" rx="3" fill="#ffffff" stroke="#fecaca"/>
  <text x="700" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Replicas: 5 (DRIFT — should be 3) ✗</text>
  <rect x="570" y="190" width="260" height="25" rx="3" fill="#ffffff" stroke="#fecaca"/>
  <text x="700" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Resources: CPU 500m, Memory 512Mi ✓</text>
  <!-- Correction -->
  <rect x="50" y="260" width="800" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Correction: Apply Desired State from Git</text>
  <rect x="70" y="310" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Scale down replicas to 3</text>
  <rect x="330" y="310" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Restore desired configuration</text>
  <rect x="590" y="310" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Verify actual matches desired</text>
  <!-- Causes of Drift -->
  <rect x="50" y="380" width="800" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Common Causes of Drift</text>
  <rect x="70" y="430" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Manual console changes</text>
  <rect x="330" y="430" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Auto-scaling adjustments</text>
  <rect x="590" y="430" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="710" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Cloud provider updates</text>
  <rect x="70" y="470" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Emergency hotfixes</text>
  <rect x="330" y="470" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Configuration errors</text>
  <rect x="590" y="470" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="710" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Resource limits exceeded</text>
  <text x="450" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">GitOps automatically corrects drift by applying desired state from Git — manual changes are overwritten</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
