<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Immutable Infrastructure Patterns</title>
  <desc id="desc">Immutable infrastructure showing blue-green, canary, and rolling replace patterns</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Immutable Infrastructure Patterns</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Blue-green, canary, and rolling replace deployment patterns</text>
  
  <!-- Blue-Green Deployment -->
  <rect x="30" y="85" width="400" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Blue-Green Deployment</text>
  
  <!-- Before cutover -->
  <rect x="50" y="125" width="360" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="230" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Before Cutover</text>
  
  <rect x="60" y="160" width="140" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="130" y="185" text-anchor="middle" font-size="8" fill="white">Blue (v1) - Active</text>
  
  <rect x="220" y="160" width="140" height="40" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="290" y="185" text-anchor="middle" font-size="8" fill="white">Green (v2) - Standby</text>
  
  <!-- After cutover -->
  <rect x="50" y="215" width="360" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="230" y="240" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">After Cutover</text>
  
  <rect x="60" y="250" width="140" height="40" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="130" y="275" text-anchor="middle" font-size="8" fill="white">Blue (v1) - Standby</text>
  
  <rect x="220" y="250" width="140" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="290" y="275" text-anchor="middle" font-size="8" fill="white">Green (v2) - Active</text>
  
  <text x="230" y="315" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Instant rollback</text>
  <text x="230" y="330" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Zero downtime</text>
  <text x="230" y="345" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ 2x capacity needed</text>
  
  <!-- Canary Deployment -->
  <rect x="470" y="85" width="400" height="220" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Canary Deployment</text>
  
  <!-- Traffic split -->
  <rect x="490" y="125" width="360" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Gradual Traffic Shift</text>
  
  <rect x="500" y="160" width="200" height="50" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="600" y="190" text-anchor="middle" font-size="8" fill="white">v1 (95% traffic)</text>
  
  <rect x="720" y="160" width="120" height="50" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="780" y="190" text-anchor="middle" font-size="8" fill="white">v2 (5% traffic)</text>
  
  <!-- Progression -->
  <rect x="490" y="235" width="360" height="60" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">5% → 25% → 50% → 100%</text>
  <text x="670" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Monitor metrics at each stage</text>
  
  <text x="670" y="315" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Low risk</text>
  <text x="670" y="330" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Real user testing</text>
  <text x="670" y="345" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Complex traffic management</text>
  
  <!-- Rolling Replace -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Rolling Replace Pattern</text>
  
  <rect x="50" y="360" width="800" height="160" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <!-- Step 1 -->
  <rect x="70" y="380" width="180" height="120" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="160" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Step 1</text>
  
  <rect x="80" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="102" y="438" text-anchor="middle" font-size="7" fill="white">v1</text>
  <text x="102" y="448" text-anchor="middle" font-size="6" fill="#fca5a5">Terminate</text>
  
  <rect x="135" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="157" y="438" text-anchor="middle" font-size="7" fill="white">v1</text>
  
  <rect x="190" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="212" y="438" text-anchor="middle" font-size="7" fill="white">v1</text>
  
  <rect x="245" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="267" y="438" text-anchor="middle" font-size="7" fill="white">v2</text>
  <text x="267" y="448" text-anchor="middle" font-size="6" fill="#bfdbfe">Launch</text>
  
  <!-- Step 2 -->
  <rect x="280" y="380" width="180" height="120" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="370" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Step 2</text>
  
  <rect x="290" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="312" y="438" text-anchor="middle" font-size="7" fill="white">v2</text>
  
  <rect x="345" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="367" y="438" text-anchor="middle" font-size="7" fill="white">v1</text>
  <text x="367" y="448" text-anchor="middle" font-size="6" fill="#fca5a5">Terminate</text>
  
  <rect x="400" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="422" y="438" text-anchor="middle" font-size="7" fill="white">v1</text>
  
  <rect x="455" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="477" y="438" text-anchor="middle" font-size="7" fill="white">v2</text>
  <text x="477" y="448" text-anchor="middle" font-size="6" fill="#bfdbfe">Launch</text>
  
  <!-- Step 3 -->
  <rect x="490" y="380" width="180" height="120" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="580" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Step 3 - Complete</text>
  
  <rect x="500" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="522" y="438" text-anchor="middle" font-size="7" fill="white">v2</text>
  
  <rect x="555" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="577" y="438" text-anchor="middle" font-size="7" fill="white">v2</text>
  
  <rect x="610" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="632" y="438" text-anchor="middle" font-size="7" fill="white">v2</text>
  
  <rect x="665" y="415" width="45" height="35" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="687" y="438" text-anchor="middle" font-size="7" fill="white">v2</text>
  
  <text x="780" y="420" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Benefits:</text>
  <text x="780" y="440" text-anchor="start" font-size="9" fill="var(--text-theme, #10b981">✓ No capacity spike</text>
  <text x="780" y="455" text-anchor="start" font-size="9" fill="var(--text-theme, #10b981">✓ Gradual rollout</text>
  <text x="780" y="470" text-anchor="start" font-size="9" fill="var(--text-theme, #10b981">✓ Easy rollback</text>
  <text x="780" y="485" text-anchor="start" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Slower than blue-green</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
