<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Hypervisor Types Comparison</text>
  <!-- Type 1 -->
  <rect x="50" y="80" width="380" height="320" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">Type 1: Bare Metal</text>
  <!-- App -->
  <rect x="70" y="130" width="340" height="35" rx="3" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="240" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">VM 1 (App + Guest OS)</text>
  <rect x="70" y="170" width="340" height="35" rx="3" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="240" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">VM 2 (App + Guest OS)</text>
  <!-- Hypervisor -->
  <rect x="70" y="210" width="340" height="40" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="240" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Hypervisor (ESXi, KVM, Hyper-V)</text>
  <!-- Hardware -->
  <rect x="70" y="255" width="340" height="40" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="240" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Physical Hardware</text>
  <!-- Type 1 characteristics -->
  <rect x="70" y="310" width="340" height="70" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="240" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Runs directly on hardware</text>
  <text x="240" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Better performance, smaller attack surface</text>
  <text x="240" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Production use (data centers, cloud)</text>
  <!-- Type 2 -->
  <rect x="470" y="80" width="380" height="320" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#92400e">Type 2: Hosted</text>
  <!-- App -->
  <rect x="490" y="130" width="340" height="35" rx="3" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="660" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">VM 1 (App + Guest OS)</text>
  <rect x="490" y="170" width="340" height="35" rx="3" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="660" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">VM 2 (App + Guest OS)</text>
  <!-- Hypervisor -->
  <rect x="490" y="210" width="340" height="40" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Hypervisor (VirtualBox, VMware Workstation)</text>
  <!-- Host OS -->
  <rect x="490" y="255" width="340" height="40" rx="3" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="660" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Host OS (Windows, macOS, Linux)</text>
  <!-- Hardware -->
  <rect x="490" y="300" width="340" height="40" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="660" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Physical Hardware</text>
  <!-- Type 2 characteristics -->
  <rect x="490" y="345" width="340" height="50" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Runs on top of OS, lower performance</text>
  <text x="660" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Development, testing, desktop virtualization</text>
  <!-- Comparison -->
  <rect x="50" y="420" width="800" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">When to Use Each</text>
  <rect x="70" y="470" width="360" height="45" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="250" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Type 1: Production, cloud providers, data centers</text>
  <rect x="470" y="470" width="360" height="45" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="650" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Type 2: Development, testing, desktop use</text>
</svg>
