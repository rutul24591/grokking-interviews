<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">GitOps Workflow</title>
  <desc id="desc">GitOps workflow showing git push, automated sync, and deployment verification</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">GitOps Workflow</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Git push, automated sync, and deployment verification</text>
  
  <!-- Git Workflow -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Git-Based Workflow</text>
  
  <!-- Developer -->
  <rect x="50" y="125" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="100" y="155" text-anchor="middle" font-size="9" fill="white">Developer</text>
  
  <!-- Push -->
  <line x1="155" y1="150" x2="205" y2="150" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="180" y="140" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">git push</text>
  
  <!-- Git Repo -->
  <rect x="210" y="125" width="200" height="80" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="310" y="155" text-anchor="middle" font-size="10" fill="white">Git Repository</text>
  <text x="310" y="175" text-anchor="middle" font-size="9" fill="#fcd34d">Infrastructure Code</text>
  <text x="310" y="193" text-anchor="middle" font-size="8" fill="#fcd34d">main branch</text>
  
  <!-- Webhook -->
  <line x1="310" y1="205" x2="310" y2="245" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="330" y="225" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b">Webhook</text>
  
  <!-- CD Operator -->
  <rect x="210" y="250" width="200" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="310" y="275" text-anchor="middle" font-size="10" fill="white">CD Operator (ArgoCD/Flux)</text>
  <text x="310" y="295" text-anchor="middle" font-size="8" fill="#6ee7b7">Detects git changes</text>
  
  <!-- Sync -->
  <line x1="310" y1="310" x2="310" y2="350" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="330" y="330" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b">Sync</text>
  
  <!-- Cluster -->
  <rect x="210" y="355" width="200" height="60" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="310" y="380" text-anchor="middle" font-size="10" fill="white">Kubernetes Cluster</text>
  <text x="310" y="400" text-anchor="middle" font-size="8" fill="#c4b5fd">Desired state applied</text>
  
  <!-- Status Feedback -->
  <path d="M 410 385 C 450 385, 450 155, 410 155" fill="none" stroke="var(--text-theme, #10b981)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text x="430" y="275" text-anchor="start" font-size="8" fill="var(--text-theme, #10b981">Status</text>
  
  <!-- Sync Status -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Sync Status &amp; Health</text>
  
  <!-- Synced -->
  <rect x="490" y="125" width="360" height="70" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Synced</text>
  <text x="670" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Git = Cluster (no drift)</text>
  <text x="670" y="185" text-anchor="middle" font-size="8" fill="#10b981">✓ Healthy</text>
  
  <!-- Out of Sync -->
  <rect x="490" y="205" width="360" height="70" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="670" y="230" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Out of Sync</text>
  <text x="670" y="250" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Git ≠ Cluster (drift detected)</text>
  <text x="670" y="265" text-anchor="middle" font-size="8" fill="#f59e0b">⚠ Auto-sync pending</text>
  
  <!-- Degraded -->
  <rect x="490" y="285" width="360" height="70" rx="4" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="670" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #ef4444">Degraded</text>
  <text x="670" y="330" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Sync failed or app unhealthy</text>
  <text x="670" y="345" text-anchor="middle" font-size="8" fill="#ef4444">✗ Alert triggered</text>
  
  <!-- GitOps Benefits -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">GitOps Benefits</text>
  
  <rect x="50" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="175" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Single Source of Truth</text>
  <text x="175" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Git is authoritative</text>
  <text x="175" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">No manual changes</text>
  <text x="175" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Full audit trail</text>
  
  <rect x="315" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="440" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Automatic Reconciliation</text>
  <text x="440" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Continuous sync</text>
  <text x="440" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Drift auto-corrected</text>
  <text x="440" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Self-healing</text>
  
  <rect x="580" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="705" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Safe Rollbacks</text>
  <text x="705" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">git revert = rollback</text>
  <text x="705" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Version history</text>
  <text x="705" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Instant recovery</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
</svg>
