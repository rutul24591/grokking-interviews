<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Cloud Services Overview</text>
  <!-- IaaS -->
  <rect x="50" y="80" width="200" height="160" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="150" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">IaaS</text>
  <text x="150" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">VMs, Storage, Network</text>
  <rect x="70" y="145" width="160" height="15" rx="3" fill="#bae6fd"/>
  <text x="150" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#0369a1">You manage: OS to apps</text>
  <rect x="70" y="165" width="160" height="15" rx="3" fill="#f0f9ff"/>
  <text x="150" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#0369a1">Cloud: Hardware, virtualization</text>
  <text x="150" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">AWS EC2, GCE, Azure VM</text>
  <text x="150" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Max flexibility</text>
  <!-- PaaS -->
  <rect x="280" y="80" width="200" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">PaaS</text>
  <text x="380" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">OS, Middleware, Runtime</text>
  <rect x="300" y="145" width="160" height="15" rx="3" fill="#fde68a"/>
  <text x="380" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">You manage: Apps only</text>
  <rect x="300" y="165" width="160" height="15" rx="3" fill="#fef3c7"/>
  <text x="380" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">Cloud: OS, middleware, runtime</text>
  <text x="380" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Beanstalk, App Engine</text>
  <text x="380" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Reduced management</text>
  <!-- Serverless -->
  <rect x="510" y="80" width="200" height="160" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="610" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Serverless</text>
  <text x="610" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Functions, Events</text>
  <rect x="530" y="145" width="160" height="15" rx="3" fill="#dcfce7"/>
  <text x="610" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">You manage: Code only</text>
  <rect x="530" y="165" width="160" height="15" rx="3" fill="#dcfce7"/>
  <text x="610" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">Cloud: Everything</text>
  <text x="610" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Lambda, Cloud Functions</text>
  <text x="610" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">No infrastructure</text>
  <!-- SaaS -->
  <rect x="740" y="80" width="130" height="160" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="805" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">SaaS</text>
  <text x="805" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Applications</text>
  <rect x="755" y="145" width="100" height="15" rx="3" fill="#faf5ff"/>
  <text x="805" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">You: Data only</text>
  <rect x="755" y="165" width="100" height="15" rx="3" fill="#faf5ff"/>
  <text x="805" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">Cloud: Everything</text>
  <text x="805" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Gmail, Salesforce</text>
  <text x="805" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Zero management</text>
  <!-- Managed Services -->
  <rect x="50" y="260" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e293b">Managed Services</text>
  <rect x="70" y="310" width="180" height="55" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="160" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Databases</text>
  <text x="160" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">RDS, Cloud SQL</text>
  <rect x="270" y="310" width="180" height="55" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="360" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Message Queues</text>
  <text x="360" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">SQS, Pub/Sub</text>
  <rect x="470" y="310" width="180" height="55" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="560" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Caching</text>
  <text x="560" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">ElastiCache, Memorystore</text>
  <rect x="670" y="310" width="180" height="55" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="760" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Machine Learning</text>
  <text x="760" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">SageMaker, Vertex AI</text>
  <!-- Key Principle -->
  <rect x="50" y="400" width="800" height="130" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Shared Responsibility Model</text>
  <text x="450" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Cloud provider manages infrastructure (hardware, virtualization, networking). You manage what you deploy (applications, data, configuration, access control).</text>
  <text x="450" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">As you move from IaaS → PaaS → Serverless → SaaS, the cloud provider manages more, you manage less.</text>
  <text x="450" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Choose based on your needs: flexibility (IaaS), reduced management (PaaS), no infrastructure (Serverless), zero management (SaaS).</text>
</svg>
