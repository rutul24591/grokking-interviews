<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Auto-Scaling Loop</text>
  <!-- Metrics Monitoring -->
  <rect x="50" y="80" width="200" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="150" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">1. Monitor Metrics</text>
  <text x="150" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">CPU, memory, requests</text>
  <text x="150" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Queue depth, custom</text>
  <path d="M 250 140 L 300 140" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Scaling Decision -->
  <rect x="300" y="80" width="200" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">2. Evaluate Policy</text>
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Threshold check</text>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Scale out or in?</text>
  <path d="M 500 140 L 550 140" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Instance Provisioning -->
  <rect x="550" y="80" width="200" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="650" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">3. Provision/Remove</text>
  <text x="650" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Scale out: add instances</text>
  <text x="650" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Scale in: remove instances</text>
  <path d="M 750 140 L 800 140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Load Balancing -->
  <rect x="800" y="80" width="80" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="840" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b21a8">4. LB</text>
  <text x="840" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Distribute</text>
  <text x="840" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">traffic</text>
  <!-- Loop back arrow -->
  <path d="M 840 200 L 840 250 L 150 250 L 150 200" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)" fill="none"/>
  <text x="495" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Continuous loop — repeats every 1-5 minutes</text>
  <!-- Instance Pool -->
  <rect x="50" y="270" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Instance Pool (Auto-Scaling Group)</text>
  <rect x="70" y="320" width="140" height="55" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="140" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Instance 1 (healthy)</text>
  <text x="140" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Serving traffic</text>
  <rect x="230" y="320" width="140" height="55" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="300" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Instance 2 (healthy)</text>
  <text x="300" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Serving traffic</text>
  <rect x="390" y="320" width="140" height="55" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="460" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Instance 3 (healthy)</text>
  <text x="460" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Serving traffic</text>
  <rect x="550" y="320" width="140" height="55" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="620" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Instance 4 (warming)</text>
  <text x="620" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Health check pending</text>
  <rect x="710" y="320" width="140" height="55" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="780" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Instance 5 (provisioning)</text>
  <text x="780" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Starting up</text>
  <!-- Key Metrics -->
  <rect x="50" y="410" width="800" height="120" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Scaling Configuration</text>
  <rect x="70" y="460" width="180" height="55" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="160" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Min Instances: 2</text>
  <text x="160" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Baseline HA</text>
  <rect x="270" y="460" width="180" height="55" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="360" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Desired: 3</text>
  <text x="360" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Normal load</text>
  <rect x="470" y="460" width="180" height="55" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="560" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Max Instances: 10</text>
  <text x="560" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Budget limit</text>
  <rect x="670" y="460" width="160" height="55" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="750" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Cool-down: 5 min</text>
  <text x="750" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Prevent oscillation</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
