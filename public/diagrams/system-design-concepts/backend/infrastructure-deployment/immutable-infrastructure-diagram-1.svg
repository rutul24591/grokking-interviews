<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Immutable Infrastructure</title>
  <desc id="desc">Immutable infrastructure showing replace vs update paradigm and deployment patterns</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Immutable Infrastructure</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Replace servers instead of updating them in place</text>
  
  <!-- Mutable vs Immutable -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Mutable vs Immutable</text>
  
  <!-- Mutable -->
  <rect x="50" y="125" width="170" height="150" rx="4" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="135" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #ef4444">Mutable (Traditional)</text>
  
  <rect x="60" y="165" width="140" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="130" y="190" text-anchor="middle" font-size="9" fill="white">Server v1</text>
  
  <line x1="130" y1="205" x2="130" y2="230" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="150" y="220" text-anchor="start" font-size="7" fill="var(--text-theme, #b45309">SSH + update</text>
  
  <rect x="60" y="235" width="140" height="35" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="130" y="258" text-anchor="middle" font-size="9" fill="white">Server v1 (patched)</text>
  
  <text x="135" y="285" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">✗ Configuration drift</text>
  <text x="135" y="300" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">✗ Hard to reproduce</text>
  <text x="135" y="315" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">✗ Snowflake servers</text>
  
  <!-- Immutable -->
  <rect x="240" y="125" width="170" height="150" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="325" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Immutable</text>
  
  <rect x="250" y="165" width="140" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="320" y="190" text-anchor="middle" font-size="9" fill="white">Server v1</text>
  
  <line x1="320" y1="205" x2="320" y2="230" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="340" y="220" text-anchor="start" font-size="7" fill="var(--text-theme, #ef4444">Terminate</text>
  
  <rect x="250" y="235" width="140" height="35" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="320" y="258" text-anchor="middle" font-size="9" fill="white">Server v1 (terminated)</text>
  
  <line x1="320" y1="270" x2="320" y2="295" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="340" y="285" text-anchor="start" font-size="7" fill="var(--text-theme, #10b981">Deploy new</text>
  
  <rect x="250" y="300" width="140" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="320" y="323" text-anchor="middle" font-size="9" fill="white">Server v2 (new)</text>
  
  <text x="325" y="350" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">✓ No configuration drift</text>
  <text x="325" y="365" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">✓ Fully reproducible</text>
  <text x="325" y="380" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">✓ Cattle not pets</text>
  
  <!-- Deployment Patterns -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Immutable Deployment Patterns</text>
  
  <!-- Blue-Green -->
  <rect x="490" y="125" width="170" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="575" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Blue-Green</text>
  
  <rect x="500" y="160" width="60" height="30" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="530" y="180" text-anchor="middle" font-size="7" fill="white">Blue v1</text>
  
  <rect x="570" y="160" width="60" height="30" rx="2" fill="var(--bg-theme, #3b82f6)"/>
  <text x="600" y="180" text-anchor="middle" font-size="7" fill="white">Green v2</text>
  
  <text x="575" y="210" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Instant cutover</text>
  <text x="575" y="223" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">2x capacity needed</text>
  
  <!-- Rolling -->
  <rect x="680" y="125" width="170" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="765" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Rolling Replace</text>
  
  <rect x="690" y="160" width="45" height="30" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="712" y="180" text-anchor="middle" font-size="6" fill="white">v1</text>
  
  <rect x="740" y="160" width="45" height="30" rx="2" fill="var(--bg-theme, #ef4444)"/>
  <text x="762" y="180" text-anchor="middle" font-size="6" fill="white">v2</text>
  
  <rect x="790" y="160" width="45" height="30" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="812" y="180" text-anchor="middle" font-size="6" fill="white">v1</text>
  
  <text x="765" y="210" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Gradual replacement</text>
  <text x="765" y="223" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">No capacity spike</text>
  
  <!-- Canary -->
  <rect x="490" y="240" width="170" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="575" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Canary</text>
  
  <rect x="500" y="275" width="120" height="30" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="560" y="295" text-anchor="middle" font-size="7" fill="white">v1 (95%)</text>
  
  <rect x="530" y="315" width="60" height="20" rx="2" fill="var(--bg-theme, #3b82f6)"/>
  <text x="560" y="328" text-anchor="middle" font-size="6" fill="white">v2 (5%)</text>
  
  <text x="575" y="350" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Test with real traffic</text>
  
  <!-- ASG Replace -->
  <rect x="680" y="240" width="170" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="765" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">ASG Replace</text>
  
  <rect x="690" y="275" width="150" height="30" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="765" y="295" text-anchor="middle" font-size="7" fill="white">Launch Template v2</text>
  
  <rect x="690" y="315" width="150" height="20" rx="2" fill="var(--bg-theme, #3b82f6)"/>
  <text x="765" y="328" text-anchor="middle" font-size="6" fill="white">Auto-replace instances</text>
  
  <text x="765" y="350" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Cloud-native approach</text>
  
  <!-- Key Benefits -->
  <rect x="30" y="380" width="840" height="200" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Immutable Infrastructure Benefits</text>
  
  <rect x="50" y="420" width="250" height="150" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="175" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Reliability</text>
  <text x="175" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">No configuration drift</text>
  <text x="175" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Consistent environments</text>
  <text x="175" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Easy rollback</text>
  
  <rect x="315" y="420" width="250" height="150" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="440" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Security</text>
  <text x="440" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Fresh instances always</text>
  <text x="440" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">No persistent access</text>
  <text x="440" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Auditable changes</text>
  
  <rect x="580" y="420" width="250" height="150" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="705" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Simplicity</text>
  <text x="705" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">No patch management</text>
  <text x="705" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Simplified recovery</text>
  <text x="705" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Disposable infrastructure</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
</svg>
