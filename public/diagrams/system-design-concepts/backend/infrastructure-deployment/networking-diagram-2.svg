<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Networking - TCP/IP Communication</title>
  <desc id="desc">TCP/IP communication showing three-way handshake, data transfer, and connection termination</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">TCP/IP Communication</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Three-way handshake, data transfer, and connection termination</text>
  
  <!-- Three-Way Handshake -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">TCP Three-Way Handshake</text>
  
  <!-- Client -->
  <rect x="50" y="125" width="120" height="60" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="110" y="155" text-anchor="middle" font-size="10" fill="white">Client</text>
  <text x="110" y="173" text-anchor="middle" font-size="8" fill="#bfdbfe">192.168.1.10</text>
  
  <!-- Server -->
  <rect x="250" y="125" width="120" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="310" y="155" text-anchor="middle" font-size="10" fill="white">Server</text>
  <text x="310" y="173" text-anchor="middle" font-size="8" fill="#6ee7b7">10.0.0.5</text>
  
  <!-- SYN -->
  <line x1="175" y1="185" x2="245" y2="185" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="210" y="175" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">SYN</text>
  <text x="210" y="198" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">seq=100</text>
  
  <!-- SYN-ACK -->
  <line x1="245" y1="215" x2="175" y2="215" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="210" y="205" text-anchor="middle" font-size="8" fill="var(--text-theme, #3b82f6">SYN-ACK</text>
  <text x="210" y="228" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">seq=200, ack=101</text>
  
  <!-- ACK -->
  <line x1="175" y1="245" x2="245" y2="245" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="210" y="235" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">ACK</text>
  <text x="210" y="258" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">seq=101, ack=201</text>
  
  <text x="230" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Connection Established</text>
  
  <!-- Data Transfer -->
  <rect x="50" y="305" width="360" height="50" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="230" y="335" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Data Transfer with ACKs</text>
  
  <!-- Connection Termination -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Connection Termination</text>
  
  <!-- Client -->
  <rect x="490" y="125" width="120" height="60" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="550" y="155" text-anchor="middle" font-size="10" fill="white">Client</text>
  
  <!-- Server -->
  <rect x="690" y="125" width="120" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="750" y="155" text-anchor="middle" font-size="10" fill="white">Server</text>
  
  <!-- FIN -->
  <line x1="615" y1="185" x2="685" y2="185" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="650" y="175" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">FIN</text>
  <text x="650" y="198" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">I'm done sending</text>
  
  <!-- ACK -->
  <line x1="685" y1="215" x2="615" y2="215" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="650" y="205" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">ACK</text>
  <text x="650" y="228" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Acknowledged</text>
  
  <!-- FIN (reverse) -->
  <line x1="685" y1="245" x2="615" y2="245" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="650" y="235" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">FIN</text>
  <text x="650" y="258" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Server also done</text>
  
  <!-- Final ACK -->
  <line x1="615" y1="275" x2="685" y2="275" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="650" y="265" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">ACK</text>
  <text x="650" y="288" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Connection closed</text>
  
  <text x="670" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">4-way termination</text>
  
  <!-- TCP vs UDP -->
  <rect x="30" y="380" width="400" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">TCP vs UDP</text>
  
  <rect x="50" y="420" width="170" height="100" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="135" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">TCP</text>
  <text x="135" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Connection-oriented</text>
  <text x="135" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Reliable, ordered</text>
  <text x="135" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">HTTP, SSH, SMTP</text>
  
  <rect x="240" y="420" width="170" height="100" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="325" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">UDP</text>
  <text x="325" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Connectionless</text>
  <text x="325" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Fast, unreliable</text>
  <text x="325" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">DNS, VoIP, Streaming</text>
  
  <!-- Port Numbers -->
  <rect x="470" y="380" width="400" height="150" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="670" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Common Port Numbers</text>
  
  <rect x="490" y="420" width="360" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <text x="510" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">21 - FTP</text>
  <text x="650" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">80 - HTTP</text>
  
  <text x="510" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">22 - SSH</text>
  <text x="650" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">443 - HTTPS</text>
  
  <text x="510" y="485" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">25 - SMTP</text>
  <text x="650" y="485" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">3306 - MySQL</text>
  
  <text x="510" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">53 - DNS</text>
  <text x="650" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">5432 - PostgreSQL</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
