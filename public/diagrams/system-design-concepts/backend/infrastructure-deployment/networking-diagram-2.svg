<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">VPC Three-Tier Architecture</title>
  <desc id="desc">VPC architecture showing public subnets with NAT gateways, private application subnets, private data subnets, routing paths, and security boundaries</desc>

  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">VPC Three-Tier Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Public subnets with NAT gateways, private application subnets, private data subnets</text>

  <!-- Internet Cloud -->
  <rect x="350" y="75" width="200" height="55" rx="12" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#0369a1">Internet</text>
  <text x="450" y="118" text-anchor="middle" font-size="9" fill="#0891b2">External Clients</text>

  <!-- Arrow to IGW -->
  <line x1="450" y1="130" x2="450" y2="148" stroke="#64748b" stroke-width="2"/>
  <polygon points="445,146 450,156 455,146" fill="#64748b"/>

  <!-- Internet Gateway -->
  <rect x="360" y="150" width="180" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Internet Gateway (IGW)</text>

  <!-- VPC Boundary -->
  <rect x="25" y="210" width="850" height="320" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="55" y="235" font-size="13" font-weight="bold" fill="#1e40af">VPC: 10.0.0.0/16</text>

  <!-- Public Subnet AZ-a -->
  <rect x="50" y="250" width="250" height="100" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="175" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Public Subnet (AZ-a)</text>
  <text x="175" y="288" text-anchor="middle" font-size="9" fill="#3b82f6">10.0.1.0/24</text>

  <rect x="70" y="300" width="100" height="38" rx="5" fill="#f59e0b"/>
  <text x="120" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">NAT GW-a</text>
  <text x="120" y="330" text-anchor="middle" font-size="8" fill="#fef3c7">10.0.1.50</text>

  <rect x="180" y="300" width="100" height="38" rx="5" fill="#8b5cf6"/>
  <text x="230" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">ALB</text>
  <text x="230" y="330" text-anchor="middle" font-size="8" fill="#ede9fe">10.0.1.100</text>

  <!-- Public Subnet AZ-b -->
  <rect x="325" y="250" width="250" height="100" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="450" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Public Subnet (AZ-b)</text>
  <text x="450" y="288" text-anchor="middle" font-size="9" fill="#3b82f6">10.0.4.0/24</text>

  <rect x="345" y="300" width="100" height="38" rx="5" fill="#f59e0b"/>
  <text x="395" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">NAT GW-b</text>
  <text x="395" y="330" text-anchor="middle" font-size="8" fill="#fef3c7">10.0.4.50</text>

  <rect x="455" y="300" width="100" height="38" rx="5" fill="#8b5cf6"/>
  <text x="505" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">ALB</text>
  <text x="505" y="330" text-anchor="middle" font-size="8" fill="#ede9fe">10.0.4.100</text>

  <!-- Private App Subnet AZ-a -->
  <rect x="50" y="370" width="250" height="100" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="175" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Private App Subnet (AZ-a)</text>
  <text x="175" y="408" text-anchor="middle" font-size="9" fill="#22c55e">10.0.2.0/24</text>

  <rect x="70" y="420" width="100" height="38" rx="5" fill="#22c55e"/>
  <text x="120" y="435" text-anchor="middle" font-size="9" font-weight="bold" fill="white">App Server 1</text>
  <text x="120" y="450" text-anchor="middle" font-size="8" fill="#dcfce7">10.0.2.10</text>

  <rect x="180" y="420" width="100" height="38" rx="5" fill="#22c55e"/>
  <text x="230" y="435" text-anchor="middle" font-size="9" font-weight="bold" fill="white">App Server 2</text>
  <text x="230" y="450" text-anchor="middle" font-size="8" fill="#dcfce7">10.0.2.11</text>

  <!-- Private App Subnet AZ-b -->
  <rect x="325" y="370" width="250" height="100" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Private App Subnet (AZ-b)</text>
  <text x="450" y="408" text-anchor="middle" font-size="9" fill="#22c55e">10.0.5.0/24</text>

  <rect x="345" y="420" width="100" height="38" rx="5" fill="#22c55e"/>
  <text x="395" y="435" text-anchor="middle" font-size="9" font-weight="bold" fill="white">App Server 3</text>
  <text x="395" y="450" text-anchor="middle" font-size="8" fill="#dcfce7">10.0.5.10</text>

  <rect x="455" y="420" width="100" height="38" rx="5" fill="#22c55e"/>
  <text x="505" y="435" text-anchor="middle" font-size="9" font-weight="bold" fill="white">App Server 4</text>
  <text x="505" y="450" text-anchor="middle" font-size="8" fill="#dcfce7">10.0.5.11</text>

  <!-- Private Data Subnet AZ-a -->
  <rect x="600" y="250" width="250" height="100" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="725" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Private Data Subnet (AZ-a)</text>
  <text x="725" y="288" text-anchor="middle" font-size="9" fill="#f59e0b">10.0.3.0/26</text>

  <rect x="620" y="300" width="100" height="38" rx="5" fill="#0ea5e9"/>
  <text x="670" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">PostgreSQL</text>
  <text x="670" y="330" text-anchor="middle" font-size="8" fill="#fef3c7">10.0.3.10</text>

  <rect x="730" y="300" width="100" height="38" rx="5" fill="#ef4444"/>
  <text x="780" y="315" text-anchor="middle" font-size="9" font-weight="bold" fill="white">Redis</text>
  <text x="780" y="330" text-anchor="middle" font-size="8" fill="#fef3c7">10.0.3.20</text>

  <!-- Private Data Subnet AZ-b -->
  <rect x="600" y="370" width="250" height="100" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="725" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Private Data Subnet (AZ-b)</text>
  <text x="725" y="408" text-anchor="middle" font-size="9" fill="#f59e0b">10.0.6.0/26</text>

  <rect x="620" y="420" width="100" height="38" rx="5" fill="#0ea5e9"/>
  <text x="670" y="435" text-anchor="middle" font-size="9" font-weight="bold" fill="white">PostgreSQL</text>
  <text x="670" y="450" text-anchor="middle" font-size="8" fill="#fef3c7">10.0.6.10</text>

  <rect x="730" y="420" width="100" height="38" rx="5" fill="#ef4444"/>
  <text x="780" y="435" text-anchor="middle" font-size="9" font-weight="bold" fill="white">Redis</text>
  <text x="780" y="450" text-anchor="middle" font-size="8" fill="#fef3c7">10.0.6.20</text>

  <!-- Traffic Flow Arrows -->
  <!-- ALB to App -->
  <line x1="230" y1="340" x2="175" y2="415" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="173,412 175,422 180,414" fill="#8b5cf6"/>

  <!-- App to Data -->
  <line x1="230" y1="440" x2="615" y2="320" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="613,317 620,325 618,318" fill="#22c55e"/>

  <!-- NAT to Internet (egress) -->
  <line x1="120" y1="298" x2="120" y2="170" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="120" y1="170" x2="355" y2="170" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="353,165 363,170 353,175" fill="#f59e0b"/>

  <!-- Legend -->
  <rect x="50" y="485" width="800" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="505" font-size="9" font-weight="bold" fill="#475569">Legend:</text>
  <rect x="150" y="495" width="15" height="15" rx="3" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="170" y="507" font-size="9" fill="#64748b">Public Subnet</text>
  <rect x="280" y="495" width="15" height="15" rx="3" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="300" y="507" font-size="9" fill="#64748b">Private App Subnet</text>
  <rect x="460" y="495" width="15" height="15" rx="3" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="480" y="507" font-size="9" fill="#64748b">Private Data Subnet</text>
  <line x1="595" y1="502" x2="620" y2="502" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="625" y="507" font-size="9" fill="#64748b">Traffic Flow</text>
</svg>
