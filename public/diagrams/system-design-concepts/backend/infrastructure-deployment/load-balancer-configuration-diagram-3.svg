<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Load Balancer - Advanced Features</title>
  <desc id="desc">Load balancer showing advanced features like rate limiting, circuit breaking, and canary</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Load Balancer - Advanced Features</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Rate limiting, circuit breaking, and canary deployments</text>
  
  <!-- Rate Limiting -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Rate Limiting</text>
  
  <rect x="50" y="125" width="200" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Limits requests per second</text>
  <text x="150" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Per IP, per user, or global</text>
  <text x="150" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">100 req/s per IP</text>
  <text x="150" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">1000 req/s global</text>
  
  <rect x="50" y="215" width="200" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="240" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Actions on Exceed</text>
  <text x="150" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Return 429 Too Many</text>
  <text x="150" y="275" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Queue requests</text>
  <text x="150" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Throttle gradually</text>
  
  <!-- Circuit Breaker -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Circuit Breaker</text>
  
  <rect x="335" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  
  <!-- Closed -->
  <rect x="345" y="140" width="60" height="35" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="375" y="163" text-anchor="middle" font-size="8" fill="white">Closed</text>
  <text x="375" y="175" text-anchor="middle" font-size="6" fill="#6ee7b7">Normal</text>
  
  <line x1="410" y1="158" x2="440" y2="158" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="425" y="148" text-anchor="middle" font-size="6" fill="var(--text-theme, #64748b">Errors &gt; threshold</text>
  
  <!-- Open -->
  <rect x="445" y="140" width="60" height="35" rx="3" fill="var(--bg-theme, #ef4444)"/>
  <text x="475" y="163" text-anchor="middle" font-size="8" fill="white">Open</text>
  <text x="475" y="175" text-anchor="middle" font-size="6" fill="#fca5a5">Failing</text>
  
  <line x1="475" y1="175" x2="475" y2="195" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="495" y="185" text-anchor="start" font-size="6" fill="var(--text-theme, #64748b">Timeout</text>
  
  <!-- Half-Open -->
  <rect x="445" y="200" width="60" height="35" rx="3" fill="var(--bg-theme, #f59e0b)"/>
  <text x="475" y="223" text-anchor="middle" font-size="8" fill="white">Half-Open</text>
  <text x="475" y="235" text-anchor="middle" font-size="6" fill="#fcd34d">Testing</text>
  
  <line x1="440" y1="218" x2="410" y2="218" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-left)"/>
  <text x="425" y="208" text-anchor="middle" font-size="6" fill="var(--text-theme, #64748b">Success</text>
  
  <text x="450" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Prevents cascading failures</text>
  
  <!-- Canary Deployment -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Canary at LB</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <!-- Traffic split -->
  <rect x="630" y="140" width="100" height="40" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="680" y="165" text-anchor="middle" font-size="8" fill="white">v1 (90%)</text>
  
  <rect x="740" y="140" width="100" height="40" rx="3" fill="var(--bg-theme, #3b82f6)"/>
  <text x="790" y="165" text-anchor="middle" font-size="8" fill="white">v2 (10%)</text>
  
  <text x="735" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Gradual traffic shift</text>
  <text x="735" y="215" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Monitor error rates</text>
  
  <rect x="620" y="235" width="230" height="60" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">Rollback on errors</text>
  <text x="735" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">100% → v1</text>
  
  <!-- Content-Based Routing -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Content-Based Routing</text>
  
  <rect x="50" y="360" width="360" height="160" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="70" y="385" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Route by:</text>
  <text x="70" y="405" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• URL path (/api/* → API servers)</text>
  <text x="70" y="425" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Headers (User-Agent → mobile servers)</text>
  <text x="70" y="445" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Cookies (session → sticky backend)</text>
  <text x="70" y="465" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Query params (version → canary)</text>
  <text x="70" y="490" text-anchor="start" font-size="9" fill="var(--text-theme, #10b981">✓ Flexible routing</text>
  <text x="70" y="505" text-anchor="start" font-size="9" fill="var(--text-theme, #f59e0b">⚠ More complex config</text>
  
  <!-- Health Check Types -->
  <rect x="470" y="320" width="400" height="210" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Health Check Types</text>
  
  <rect x="490" y="360" width="360" height="160" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <text x="510" y="385" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="385" font-size="10" fill="var(--text-theme, #1e293b">HTTP GET /health</text>
  
  <text x="510" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="405" font-size="10" fill="var(--text-theme, #1e293b">TCP connection test</text>
  
  <text x="510" y="425" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="425" font-size="10" fill="var(--text-theme, #1e293b">gRPC health check</text>
  
  <text x="510" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="445" font-size="10" fill="var(--text-theme, #1e293b">Custom script</text>
  
  <text x="510" y="470" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">Interval: 5-30 seconds</text>
  <text x="510" y="490" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">Unhealthy threshold: 2-5 failures</text>
  <text x="510" y="510" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">Healthy threshold: 2-3 successes</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
