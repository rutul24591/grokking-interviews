<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">DNS Management Architecture</title>
  <desc id="desc">DNS management showing DNS hierarchy, resolution flow, and record types</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">DNS Management Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">DNS hierarchy, resolution flow, and record management</text>
  
  <!-- DNS Hierarchy -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">DNS Hierarchy</text>
  
  <!-- Root servers -->
  <rect x="150" y="125" width="160" height="40" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="230" y="150" text-anchor="middle" font-size="10" fill="white">Root Servers (.)</text>
  <text x="230" y="163" text-anchor="middle" font-size="8" fill="#bfdbfe">13 root server clusters</text>
  
  <!-- TLD servers -->
  <line x1="230" y1="165" x2="150" y2="195" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <line x1="230" y1="165" x2="230" y2="195" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <line x1="230" y1="165" x2="310" y2="195" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  
  <rect x="80" y="195" width="120" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="140" y="217" text-anchor="middle" font-size="9" fill="white">.com TLD</text>
  
  <rect x="210" y="195" width="120" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="270" y="217" text-anchor="middle" font-size="9" fill="white">.org TLD</text>
  
  <rect x="340" y="195" width="120" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="400" y="217" text-anchor="middle" font-size="9" fill="white">.net TLD</text>
  
  <!-- Authoritative servers -->
  <line x1="140" y1="230" x2="140" y2="260" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <line x1="270" y1="230" x2="270" y2="260" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  
  <rect x="80" y="260" width="120" height="35" rx="3" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="140" y="282" text-anchor="middle" font-size="9" fill="white">example.com</text>
  
  <rect x="210" y="260" width="120" height="35" rx="3" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="270" y="282" text-anchor="middle" font-size="9" fill="white">test.org</text>
  
  <text x="230" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Query flows from root → TLD → Authoritative</text>
  
  <!-- DNS Resolution Flow -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">DNS Resolution Flow</text>
  
  <!-- Client -->
  <rect x="490" y="125" width="80" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="530" y="150" text-anchor="middle" font-size="9" fill="white">Client</text>
  <text x="530" y="165" text-anchor="middle" font-size="8" fill="#bfdbfe">Browser</text>
  
  <!-- Resolver -->
  <rect x="620" y="125" width="100" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" font-size="9" fill="white">Resolver</text>
  <text x="670" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">ISP/8.8.8.8</text>
  
  <!-- Root -->
  <rect x="750" y="125" width="100" height="50" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="800" y="150" text-anchor="middle" font-size="9" fill="white">Root Server</text>
  <text x="800" y="165" text-anchor="middle" font-size="8" fill="#fcd34d">Referral</text>
  
  <!-- TLD -->
  <rect x="750" y="195" width="100" height="50" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="800" y="220" text-anchor="middle" font-size="9" fill="white">TLD Server</text>
  <text x="800" y="235" text-anchor="middle" font-size="8" fill="#fcd34d">.com</text>
  
  <!-- Authoritative -->
  <rect x="750" y="265" width="100" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="800" y="290" text-anchor="middle" font-size="9" fill="white">Authoritative</text>
  <text x="800" y="305" text-anchor="middle" font-size="8" fill="#c4b5fd">example.com</text>
  
  <!-- Query arrows -->
  <line x1="570" y1="150" x2="620" y2="150" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="595" y="140" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Query</text>
  
  <line x1="720" y1="150" x2="750" y2="150" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="175" x2="800" y2="195" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="245" x2="800" y2="265" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Response arrow -->
  <path d="M 800 315 L 800 340 L 530 340 L 530 200" fill="none" stroke="var(--text-theme, #10b981)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text x="670" y="355" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">Response: 93.184.216.34</text>
  
  <!-- Common Record Types -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Common DNS Record Types</text>
  
  <rect x="50" y="420" width="120" height="50" rx="4" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="110" y="445" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #3b82f6">A Record</text>
  <text x="110" y="463" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">IPv4 address</text>
  
  <rect x="180" y="420" width="120" height="50" rx="4" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="240" y="445" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">AAAA Record</text>
  <text x="240" y="463" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">IPv6 address</text>
  
  <rect x="310" y="420" width="120" height="50" rx="4" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="370" y="445" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">CNAME</text>
  <text x="370" y="463" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Alias to another</text>
  
  <rect x="440" y="420" width="120" height="50" rx="4" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="500" y="445" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #8b5cf6">MX Record</text>
  <text x="500" y="463" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Mail exchange</text>
  
  <rect x="570" y="420" width="120" height="50" rx="4" fill="white" stroke="var(--border-theme, #06b6d4)" stroke-width="1"/>
  <text x="630" y="445" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #0891b2">TXT Record</text>
  <text x="630" y="463" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Text (SPF, DKIM)</text>
  
  <rect x="700" y="420" width="120" height="50" rx="4" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="1"/>
  <text x="760" y="445" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #ef4444">NS Record</text>
  <text x="760" y="463" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Name server</text>
  
  <rect x="50" y="480" width="120" height="40" rx="4" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="110" y="505" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">TTL</text>
  <text x="110" y="518" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Cache duration</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
</svg>
