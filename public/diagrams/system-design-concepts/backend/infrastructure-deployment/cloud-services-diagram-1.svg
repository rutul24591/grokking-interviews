<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Services Architecture</title>
  <desc id="desc">Cloud services architecture combining managed compute, storage, networking, and IAM</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Cloud Services Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Managed primitives for compute, storage, networking, and security</text>
  
  <!-- Cloud Provider Boundary -->
  <rect x="30" y="85" width="840" height="380" rx="8" fill="var(--bg-panel-hover, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="850" y="105" text-anchor="end" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Cloud Provider</text>
  
  <!-- Compute Section -->
  <rect x="50" y="110" width="250" height="160" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="175" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #10b981">Compute</text>
  
  <!-- VM -->
  <rect x="70" y="150" width="100" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="120" y="175" text-anchor="middle" font-size="9" fill="white">VM/EC2</text>
  <text x="120" y="190" text-anchor="middle" font-size="8" fill="#6ee7b7">Full control</text>
  
  <!-- Container -->
  <rect x="180" y="150" width="100" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="230" y="175" text-anchor="middle" font-size="9" fill="white">Containers</text>
  <text x="230" y="190" text-anchor="middle" font-size="8" fill="#6ee7b7">EKS/ECS</text>
  
  <!-- Serverless -->
  <rect x="125" y="215" width="100" height="45" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="175" y="240" text-anchor="middle" font-size="9" fill="white">Lambda/Functions</text>
  <text x="175" y="253" text-anchor="middle" font-size="7" fill="#6ee7b7">Event-driven</text>
  
  <!-- Storage Section -->
  <rect x="325" y="110" width="250" height="160" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #3b82f6">Storage &amp; Data</text>
  
  <!-- Object Storage -->
  <rect x="345" y="150" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="395" y="175" text-anchor="middle" font-size="9" fill="white">Object (S3)</text>
  <text x="395" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">Durable</text>
  
  <!-- Database -->
  <rect x="455" y="150" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="505" y="175" text-anchor="middle" font-size="9" fill="white">RDS/DynamoDB</text>
  <text x="505" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">Managed</text>
  
  <!-- Cache -->
  <rect x="345" y="215" width="100" height="45" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="395" y="240" text-anchor="middle" font-size="9" fill="white">ElastiCache</text>
  <text x="395" y="253" text-anchor="middle" font-size="7" fill="#bfdbfe">Redis/Memcached</text>
  
  <!-- Queue -->
  <rect x="455" y="215" width="100" height="45" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="505" y="240" text-anchor="middle" font-size="9" fill="white">SQS/SNS</text>
  <text x="505" y="253" text-anchor="middle" font-size="7" fill="#bfdbfe">Messaging</text>
  
  <!-- Networking Section -->
  <rect x="600" y="110" width="250" height="160" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="725" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #8b5cf6">Networking</text>
  
  <!-- VPC -->
  <rect x="620" y="150" width="100" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="670" y="175" text-anchor="middle" font-size="9" fill="white">VPC</text>
  <text x="670" y="190" text-anchor="middle" font-size="8" fill="#c4b5fd">Private network</text>
  
  <!-- Load Balancer -->
  <rect x="730" y="150" width="100" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="780" y="175" text-anchor="middle" font-size="9" fill="white">ALB/NLB</text>
  <text x="780" y="190" text-anchor="middle" font-size="8" fill="#c4b5fd">Traffic distro</text>
  
  <!-- API Gateway -->
  <rect x="620" y="215" width="100" height="45" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="670" y="240" text-anchor="middle" font-size="9" fill="white">API Gateway</text>
  <text x="670" y="253" text-anchor="middle" font-size="7" fill="#c4b5fd">REST/WebSocket</text>
  
  <!-- CDN -->
  <rect x="730" y="215" width="100" height="45" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="780" y="240" text-anchor="middle" font-size="9" fill="white">CloudFront</text>
  <text x="780" y="253" text-anchor="middle" font-size="7" fill="#c4b5fd">Edge caching</text>
  
  <!-- IAM/Security Section -->
  <rect x="50" y="290" width="800" height="60" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="450" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #b45309">IAM &amp; Security (Cross-Cutting)</text>
  <text x="450" y="335" text-anchor="middle" font-size="10" fill="#fcd34d">Roles, Policies, Secrets Manager, KMS, CloudTrail</text>
  
  <!-- User/Application -->
  <rect x="30" y="480" width="180" height="50" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Users/Applications</text>
  
  <!-- Internet -->
  <line x1="210" y1="505" x2="250" y2="505" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="230" y="495" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Internet</text>
  
  <!-- Cloud connection -->
  <rect x="250" y="480" width="120" height="50" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="310" y="510" text-anchor="middle" font-size="10" fill="white">API Gateway / ALB</text>
  
  <!-- Internal connections -->
  <line x1="370" y1="505" x2="420" y2="505" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="420" y="480" width="120" height="50" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="480" y="510" text-anchor="middle" font-size="10" fill="white">Compute (Lambda/EC2)</text>
  
  <line x1="540" y1="505" x2="590" y2="505" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="590" y="480" width="120" height="50" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="650" y="510" text-anchor="middle" font-size="10" fill="white">Storage (S3/RDS)</text>
  
  <line x1="710" y1="505" x2="760" y2="505" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="760" y="480" width="110" height="50" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="815" y="510" text-anchor="middle" font-size="10" fill="white">Monitoring</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
