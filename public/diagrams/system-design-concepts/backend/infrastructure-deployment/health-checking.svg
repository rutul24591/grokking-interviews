<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Service Health Checking: Types and Behavior</text>
  <!-- HTTP Health Check -->
  <rect x="30" y="70" width="270" height="380" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="30" y="70" width="270" height="50" rx="12" fill="#3b82f6"/>
  <text x="165" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">HTTP Health Check</text>
  <!-- Flow -->
  <rect x="60" y="140" width="210" height="50" rx="6" fill="#60a5fa"/>
  <text x="165" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Registry sends GET /health</text>
  <text x="165" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#dbeafe">Every 10 seconds</text>
  <line x1="165" y1="190" x2="165" y2="220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <!-- Success path -->
  <rect x="60" y="220" width="210" height="50" rx="6" fill="#10b981"/>
  <text x="165" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Response: 200 OK</text>
  <text x="165" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">Instance marked healthy</text>
  <!-- Failure path -->
  <rect x="60" y="290" width="210" height="50" rx="6" fill="#ef4444"/>
  <text x="165" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Response: 503 / Timeout</text>
  <text x="165" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#fecaca">After 3 failures: unhealthy</text>
  <rect x="60" y="360" width="210" height="70" rx="6" fill="#dbeafe"/>
  <text x="165" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Checks: process, DB connectivity</text>
  <text x="165" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Latency: 1-5s response</text>
  <text x="165" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Best for: Web services, APIs</text>
  <text x="165" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#1e40af">Used by: Consul, Kubernetes</text>
  <!-- TCP Health Check -->
  <rect x="315" y="70" width="270" height="380" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="315" y="70" width="270" height="50" rx="12" fill="#f59e0b"/>
  <text x="450" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">TCP Health Check</text>
  <!-- Flow -->
  <rect x="345" y="140" width="210" height="50" rx="6" fill="#fbbf24"/>
  <text x="450" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Registry opens TCP connection</text>
  <text x="450" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#fef3c7">Connects to service port</text>
  <line x1="450" y1="190" x2="450" y2="220" stroke="#f59e0b" stroke-width="2" marker-end="url(#arroworange)"/>
  <!-- Success path -->
  <rect x="345" y="220" width="210" height="50" rx="6" fill="#10b981"/>
  <text x="450" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Connection: Established</text>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">Instance marked healthy</text>
  <!-- Failure path -->
  <rect x="345" y="290" width="210" height="50" rx="6" fill="#ef4444"/>
  <text x="450" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Connection: Refused / Timeout</text>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#fecaca">After 2 failures: unhealthy</text>
  <rect x="345" y="360" width="210" height="70" rx="6" fill="#fef3c7"/>
  <text x="450" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Checks: port is listening</text>
  <text x="450" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Latency: 100ms-1s</text>
  <text x="450" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Best for: Any TCP service</text>
  <text x="450" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#92400e">Used by: AWS ELB, HAProxy</text>
  <!-- Script/Custom Health Check -->
  <rect x="600" y="70" width="270" height="380" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <rect x="600" y="70" width="270" height="50" rx="12" fill="#10b981"/>
  <text x="735" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Script / Custom Check</text>
  <!-- Flow -->
  <rect x="630" y="140" width="210" height="50" rx="6" fill="#34d399"/>
  <text x="735" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Registry runs custom script</text>
  <text x="735" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">e.g., check_db.sh, curl + parse</text>
  <line x1="735" y1="190" x2="735" y2="220" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <!-- Success path -->
  <rect x="630" y="220" width="210" height="50" rx="6" fill="#10b981"/>
  <text x="735" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Exit code: 0 (success)</text>
  <text x="735" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#d1fae5">Instance marked healthy</text>
  <!-- Failure path -->
  <rect x="630" y="290" width="210" height="50" rx="6" fill="#ef4444"/>
  <text x="735" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Exit code: non-zero (fail)</text>
  <text x="735" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#fecaca">After 2 failures: unhealthy</text>
  <rect x="630" y="360" width="210" height="70" rx="6" fill="#d1fae5"/>
  <text x="735" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Checks: custom logic, any test</text>
  <text x="735" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Latency: varies by script</text>
  <text x="735" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Best for: Complex health logic</text>
  <text x="735" y="442" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#065f46">Used by: Consul, Nomad</text>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">HTTP: most common, checks application-level health. TCP: lightweight, checks process listening. Script: flexible, custom health logic</text>
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
</svg>