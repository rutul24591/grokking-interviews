<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Feature Flag Rollout Strategies</title>
  <desc id="desc">Feature flag rollout strategies: percentage, user targeting, and gradual expansion</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Feature Flag Rollout Strategies</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Different strategies for controlled feature releases</text>
  
  <!-- Percentage Rollout -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">1. Percentage Rollout</text>
  
  <!-- Rollout stages -->
  <rect x="50" y="125" width="200" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  
  <rect x="60" y="140" width="35" height="25" rx="2" fill="var(--bg-theme, #ef4444)"/>
  <text x="77" y="157" text-anchor="middle" font-size="8" fill="white">1%</text>
  
  <rect x="100" y="140" width="35" height="25" rx="2" fill="var(--bg-theme, #f59e0b)"/>
  <text x="117" y="157" text-anchor="middle" font-size="8" fill="white">5%</text>
  
  <rect x="140" y="140" width="35" height="25" rx="2" fill="var(--bg-theme, #f59e0b)"/>
  <text x="157" y="157" text-anchor="middle" font-size="8" fill="white">10%</text>
  
  <rect x="180" y="140" width="35" height="25" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="197" y="157" text-anchor="middle" font-size="8" fill="white">25%</text>
  
  <rect x="60" y="170" width="35" height="25" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="77" y="187" text-anchor="middle" font-size="8" fill="white">50%</text>
  
  <rect x="100" y="170" width="35" height="25" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="117" y="187" text-anchor="middle" font-size="8" fill="white">75%</text>
  
  <rect x="140" y="170" width="75" height="25" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="177" y="187" text-anchor="middle" font-size="8" fill="white">100%</text>
  
  <text x="150" y="220" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Gradual expansion over days/weeks</text>
  
  <rect x="50" y="235" width="200" height="60" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="150" y="255" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ Simple, predictable</text>
  <text x="150" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">⚠ Random user selection</text>
  <text x="150" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">⚠ May miss edge cases</text>
  
  <!-- User Targeting -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">2. User Targeting</text>
  
  <rect x="335" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  
  <text x="355" y="150" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">Target by:</text>
  <text x="355" y="170" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• User ID (specific users)</text>
  <text x="355" y="185" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Email domain (company)</text>
  <text x="355" y="200" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• User segment (VIP, free)</text>
  <text x="355" y="215" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Geography (country, region)</text>
  
  <rect x="335" y="235" width="230" height="60" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="450" y="255" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ Precise control</text>
  <text x="450" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ Test with known users</text>
  <text x="450" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">⚠ Requires user identity</text>
  
  <!-- Canary by Instance -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">3. Canary by Instance</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <!-- Instances -->
  <rect x="630" y="140" width="45" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="652" y="162" text-anchor="middle" font-size="8" fill="white">v1</text>
  
  <rect x="680" y="140" width="45" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="702" y="162" text-anchor="middle" font-size="8" fill="white">v1</text>
  
  <rect x="730" y="140" width="45" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="752" y="162" text-anchor="middle" font-size="8" fill="white">v1</text>
  
  <rect x="780" y="140" width="45" height="35" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="802" y="162" text-anchor="middle" font-size="8" fill="white">v2</text>
  
  <text x="735" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">1 instance with new feature</text>
  <text x="735" y="215" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Monitor before expanding</text>
  
  <rect x="620" y="235" width="230" height="60" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="255" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ Production traffic</text>
  <text x="735" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ Easy rollback</text>
  <text x="735" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">⚠ Infrastructure dependent</text>
  
  <!-- Rollout Timeline -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Typical Rollout Timeline</text>
  
  <rect x="50" y="360" width="800" height="160" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <!-- Timeline -->
  <line x1="70" y1="440" x2="830" y2="440" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <text x="840" y="445" font-size="9" fill="var(--text-theme, #64748b">Time →</text>
  
  <!-- Internal rollout -->
  <rect x="80" y="420" width="80" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="120" y="443" text-anchor="middle" font-size="8" fill="white">Internal</text>
  <text x="120" y="455" text-anchor="middle" font-size="7" fill="#6ee7b7">Day 1-2</text>
  
  <line x1="165" y1="440" x2="185" y2="440" stroke="var(--text-theme, #10b981)" stroke-width="2"/>
  <text x="175" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Metrics OK</text>
  
  <!-- Beta users -->
  <rect x="190" y="420" width="80" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="230" y="443" text-anchor="middle" font-size="8" fill="white">Beta</text>
  <text x="230" y="455" text-anchor="middle" font-size="7" fill="#fcd34d">Day 3-5</text>
  
  <line x1="275" y1="440" x2="295" y2="440" stroke="var(--text-theme, #10b981)" stroke-width="2"/>
  <text x="285" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Metrics OK</text>
  
  <!-- 10% -->
  <rect x="300" y="420" width="80" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="340" y="443" text-anchor="middle" font-size="8" fill="white">10%</text>
  <text x="340" y="455" text-anchor="middle" font-size="7" fill="#fcd34d">Day 6-8</text>
  
  <line x1="385" y1="440" x2="405" y2="440" stroke="var(--text-theme, #10b981)" stroke-width="2"/>
  <text x="395" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Metrics OK</text>
  
  <!-- 50% -->
  <rect x="410" y="420" width="80" height="40" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="450" y="443" text-anchor="middle" font-size="8" fill="white">50%</text>
  <text x="450" y="455" text-anchor="middle" font-size="7" fill="#bfdbfe">Day 9-12</text>
  
  <line x1="495" y1="440" x2="515" y2="440" stroke="var(--text-theme, #10b981)" stroke-width="2"/>
  <text x="505" y="430" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Metrics OK</text>
  
  <!-- 100% -->
  <rect x="520" y="420" width="100" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="570" y="443" text-anchor="middle" font-size="8" font-weight="bold" fill="white">100%</text>
  <text x="570" y="455" text-anchor="middle" font-size="7" fill="#6ee7b7">Day 13+</text>
  
  <!-- Rollback option -->
  <path d="M 570 410 L 570 385 L 120 385 L 120 420" fill="none" stroke="var(--text-theme, #ef4444)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="350" y="375" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">Rollback at any stage if issues detected</text>
  
  <text x="450" y="495" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Total rollout time: 1-3 weeks depending on risk tolerance</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
