<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Container Orchestration - Pod Lifecycle</title>
  <desc id="desc">Container orchestration showing pod lifecycle, probes, and restart policies</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Container Orchestration - Pod Lifecycle</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Pod lifecycle, probes, and restart policies</text>
  
  <!-- Pod Lifecycle States -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Pod Lifecycle States</text>
  
  <!-- Pending -->
  <rect x="50" y="125" width="140" height="60" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="120" y="155" text-anchor="middle" font-size="10" fill="white">Pending</text>
  <text x="120" y="173" text-anchor="middle" font-size="8" fill="#fcd34d">Creating, scheduling</text>
  
  <line x1="195" y1="155" x2="235" y2="155" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Running -->
  <rect x="240" y="125" width="140" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="310" y="155" text-anchor="middle" font-size="10" fill="white">Running</text>
  <text x="310" y="173" text-anchor="middle" font-size="8" fill="#6ee7b7">At least one container running</text>
  
  <line x1="310" y1="185" x2="310" y2="225" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <!-- Succeeded -->
  <rect x="240" y="230" width="140" height="60" rx="4" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="310" y="260" text-anchor="middle" font-size="10" fill="white">Succeeded</text>
  <text x="310" y="278" text-anchor="middle" font-size="8" fill="#94a3b8">All containers completed</text>
  
  <!-- Failed -->
  <rect x="50" y="230" width="140" height="60" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="120" y="260" text-anchor="middle" font-size="10" fill="white">Failed</text>
  <text x="120" y="278" text-anchor="middle" font-size="8" fill="#fca5a5">All containers failed</text>
  
  <!-- Unknown -->
  <rect x="145" y="310" width="140" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="215" y="340" text-anchor="middle" font-size="10" fill="white">Unknown</text>
  <text x="215" y="355" text-anchor="middle" font-size="8" fill="#c4b5fd">Cannot determine state</text>
  
  <!-- Health Probes -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Health Probes</text>
  
  <!-- Liveness Probe -->
  <rect x="490" y="125" width="360" height="70" rx="4" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #ef4444">Liveness Probe</text>
  <text x="670" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Is the container alive?</text>
  <text x="670" y="185" text-anchor="middle" font-size="8" fill="#ef4444">✗ Fail = Restart container</text>
  
  <!-- Readiness Probe -->
  <rect x="490" y="205" width="360" height="70" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="670" y="230" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #f59e0b">Readiness Probe</text>
  <text x="670" y="250" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Is the container ready?</text>
  <text x="670" y="265" text-anchor="middle" font-size="8" fill="#f59e0b">⚠ Fail = Remove from service</text>
  
  <!-- Startup Probe -->
  <rect x="490" y="285" width="360" height="70" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="670" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Startup Probe</text>
  <text x="670" y="330" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Has the container started?</text>
  <text x="670" y="345" text-anchor="middle" font-size="8" fill="#3b82f6">✓ For slow-starting containers</text>
  
  <!-- Restart Policies -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Restart Policies</text>
  
  <rect x="50" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="175" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Always</text>
  <text x="175" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Always restart</text>
  <text x="175" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Default for deployments</text>
  <text x="175" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Long-running services</text>
  
  <rect x="315" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="440" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #f59e0b">OnFailure</text>
  <text x="440" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Restart on failure only</text>
  <text x="440" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Default for jobs</text>
  <text x="440" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Batch workloads</text>
  
  <rect x="580" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="705" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #64748b">Never</text>
  <text x="705" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Never restart</text>
  <text x="705" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Debugging</text>
  <text x="705" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">One-time tasks</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
