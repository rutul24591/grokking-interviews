<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Networking Fundamentals</title>
  <desc id="desc">Networking fundamentals showing OSI model, TCP/IP stack, and data encapsulation</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Networking Fundamentals</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">OSI model, TCP/IP stack, and data encapsulation</text>
  
  <!-- OSI Model -->
  <rect x="30" y="85" width="280" height="320" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">OSI Model (7 Layers)</text>
  
  <!-- Layer 7 -->
  <rect x="50" y="125" width="240" height="35" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="80" y="148" text-anchor="start" font-size="10" font-weight="bold" fill="white">7</text>
  <text x="100" y="148" text-anchor="start" font-size="10" fill="white">Application</text>
  <text x="200" y="148" text-anchor="end" font-size="9" fill="#bfdbfe">HTTP, DNS, SMTP</text>
  
  <!-- Layer 6 -->
  <rect x="50" y="165" width="240" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="80" y="188" text-anchor="start" font-size="10" font-weight="bold" fill="white">6</text>
  <text x="100" y="188" text-anchor="start" font-size="10" fill="white">Presentation</text>
  <text x="200" y="188" text-anchor="end" font-size="9" fill="#6ee7b7">SSL, TLS, Encryption</text>
  
  <!-- Layer 5 -->
  <rect x="50" y="205" width="240" height="35" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="80" y="228" text-anchor="start" font-size="10" font-weight="bold" fill="white">5</text>
  <text x="100" y="228" text-anchor="start" font-size="10" fill="white">Session</text>
  <text x="200" y="228" text-anchor="end" font-size="9" fill="#fcd34d">Sessions, RPC</text>
  
  <!-- Layer 4 -->
  <rect x="50" y="245" width="240" height="35" rx="3" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="80" y="268" text-anchor="start" font-size="10" font-weight="bold" fill="white">4</text>
  <text x="100" y="268" text-anchor="start" font-size="10" fill="white">Transport</text>
  <text x="200" y="268" text-anchor="end" font-size="9" fill="#c4b5fd">TCP, UDP</text>
  
  <!-- Layer 3 -->
  <rect x="50" y="285" width="240" height="35" rx="3" fill="var(--bg-theme, #06b6d4)" stroke="var(--border-theme, #0891b2)" stroke-width="1"/>
  <text x="80" y="308" text-anchor="start" font-size="10" font-weight="bold" fill="white">3</text>
  <text x="100" y="308" text-anchor="start" font-size="10" fill="white">Network</text>
  <text x="200" y="308" text-anchor="end" font-size="9" fill="#67e8f9">IP, ICMP, Routing</text>
  
  <!-- Layer 2 -->
  <rect x="50" y="325" width="240" height="35" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="80" y="348" text-anchor="start" font-size="10" font-weight="bold" fill="white">2</text>
  <text x="100" y="348" text-anchor="start" font-size="10" fill="white">Data Link</text>
  <text x="200" y="348" text-anchor="end" font-size="9" fill="#fca5a5">Ethernet, MAC</text>
  
  <!-- Layer 1 -->
  <rect x="50" y="365" width="240" height="35" rx="3" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="80" y="388" text-anchor="start" font-size="10" font-weight="bold" fill="white">1</text>
  <text x="100" y="388" text-anchor="start" font-size="10" fill="white">Physical</text>
  <text x="200" y="388" text-anchor="end" font-size="9" fill="#94a3b8">Cables, Signals</text>
  
  <!-- TCP/IP Stack -->
  <rect x="330" y="85" width="280" height="320" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="470" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">TCP/IP Stack (4 Layers)</text>
  
  <!-- Application -->
  <rect x="350" y="125" width="240" height="85" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="470" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Application</text>
  <text x="470" y="175" text-anchor="middle" font-size="9" fill="#6ee7b7">HTTP, FTP, SMTP</text>
  <text x="470" y="190" text-anchor="middle" font-size="9" fill="#6ee7b7">DNS, SSH</text>
  <text x="470" y="205" text-anchor="middle" font-size="8" fill="#6ee7b7">Maps to OSI 5-7</text>
  
  <!-- Transport -->
  <rect x="350" y="220" width="240" height="65" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="470" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Transport</text>
  <text x="470" y="270" text-anchor="middle" font-size="9" fill="#fcd34d">TCP, UDP</text>
  <text x="470" y="283" text-anchor="middle" font-size="8" fill="#fcd34d">Maps to OSI 4</text>
  
  <!-- Internet -->
  <rect x="350" y="295" width="240" height="55" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="470" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Internet</text>
  <text x="470" y="343" text-anchor="middle" font-size="9" fill="#bfdbfe">IP, ICMP</text>
  <text x="470" y="355" text-anchor="middle" font-size="8" fill="#bfdbfe">Maps to OSI 3</text>
  
  <!-- Network Access -->
  <rect x="350" y="360" width="240" height="40" rx="3" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="470" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Network Access</text>
  <text x="470" y="398" text-anchor="middle" font-size="8" fill="#94a3b8">Maps to OSI 1-2</text>
  
  <!-- Data Encapsulation -->
  <rect x="630" y="85" width="240" height="320" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="750" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Data Encapsulation</text>
  
  <!-- Data flow -->
  <rect x="650" y="125" width="200" height="40" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="750" y="150" text-anchor="middle" font-size="10" fill="white">Data</text>
  
  <line x1="750" y1="165" x2="750" y2="185" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="770" y="175" text-anchor="start" font-size="7" fill="var(--text-theme, #64748b">+ Header</text>
  
  <rect x="650" y="190" width="200" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="750" y="215" text-anchor="middle" font-size="10" fill="white">Segment (TCP)</text>
  
  <line x1="750" y1="230" x2="750" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="770" y="240" text-anchor="start" font-size="7" fill="var(--text-theme, #64748b">+ Header</text>
  
  <rect x="650" y="255" width="200" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="750" y="280" text-anchor="middle" font-size="10" fill="white">Packet (IP)</text>
  
  <line x1="750" y1="295" x2="750" y2="315" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="770" y="305" text-anchor="start" font-size="7" fill="var(--text-theme, #64748b">+ Header + Trailer</text>
  
  <rect x="650" y="320" width="200" height="40" rx="3" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="750" y="345" text-anchor="middle" font-size="10" fill="white">Frame (Ethernet)</text>
  
  <line x1="750" y1="360" x2="750" y2="380" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <rect x="650" y="385" width="200" height="40" rx="3" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="750" y="410" text-anchor="middle" font-size="10" fill="white">Bits (Physical)</text>
  
  <!-- Key Concepts -->
  <rect x="30" y="420" width="840" height="110" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="445" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Key Networking Concepts</text>
  
  <text x="50" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="65" y="470" font-size="10" fill="var(--text-theme, #1e293b">Encapsulation: Data wrapped with headers at each layer</text>
  
  <text x="450" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="465" y="470" font-size="10" fill="var(--text-theme, #1e293b">Decapsulation: Headers removed on receiving end</text>
  
  <text x="50" y="495" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="65" y="495" font-size="10" fill="var(--text-theme, #1e293b">TCP: Connection-oriented, reliable, ordered delivery</text>
  
  <text x="450" y="495" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="465" y="495" font-size="10" fill="var(--text-theme, #1e293b">UDP: Connectionless, fast, no guarantees</text>
  
  <text x="50" y="520" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="65" y="520" font-size="10" fill="var(--text-theme, #1e293b">IP Addressing: Logical addressing for routing</text>
  
  <text x="450" y="520" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="465" y="520" font-size="10" fill="var(--text-theme, #1e293b">MAC Addressing: Physical addressing for local delivery</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
