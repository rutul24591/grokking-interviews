<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Network Architecture Overview</title>
  <desc id="desc">VPC segmentation, subnet tiers, routing layers, and security boundaries in a production cloud network architecture</desc>

  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Network Architecture Overview</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">VPC segmentation, subnet tiers, routing layers, and security boundaries</text>

  <!-- VPC Boundary -->
  <rect x="30" y="80" width="840" height="440" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="60" y="108" font-size="14" font-weight="bold" fill="#1e40af">VPC: 10.0.0.0/16</text>

  <!-- Internet -->
  <rect x="350" y="15" width="200" height="50" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="450" y="45" text-anchor="middle" font-size="12" font-weight="bold" fill="#0369a1">Internet</text>

  <!-- Internet Gateway -->
  <rect x="370" y="125" width="160" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Internet Gateway</text>

  <!-- Arrow from Internet to IGW -->
  <line x1="450" y1="65" x2="450" y2="120" stroke="#64748b" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="445,118 450,128 455,118" fill="#64748b"/>

  <!-- Public Subnet -->
  <rect x="60" y="190" width="250" height="140" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="185" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Public Subnet (AZ-a)</text>

  <!-- NAT Gateway -->
  <rect x="80" y="230" width="100" height="45" rx="6" fill="#f59e0b"/>
  <text x="130" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="white">NAT GW</text>
  <text x="130" y="265" text-anchor="middle" font-size="8" fill="#fef3c7">10.0.1.50</text>

  <!-- Load Balancer -->
  <rect x="195" y="230" width="100" height="45" rx="6" fill="#8b5cf6"/>
  <text x="245" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="white">ALB / NLB</text>
  <text x="245" y="265" text-anchor="middle" font-size="8" fill="#ede9fe">10.0.1.100</text>

  <!-- Route Table -->
  <rect x="80" y="290" width="215" height="30" rx="4" fill="white" stroke="#94a3b8" stroke-width="1"/>
  <text x="187" y="310" text-anchor="middle" font-size="9" fill="#475569">Route: 0.0.0.0/0 to IGW</text>

  <!-- Private App Subnet -->
  <rect x="330" y="190" width="250" height="140" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="455" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Private App Subnet (AZ-a)</text>

  <!-- App Server 1 -->
  <rect x="350" y="230" width="100" height="45" rx="6" fill="#22c55e"/>
  <text x="400" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="white">App Server 1</text>
  <text x="400" y="265" text-anchor="middle" font-size="8" fill="#dcfce7">10.0.2.10</text>

  <!-- App Server 2 -->
  <rect x="460" y="230" width="100" height="45" rx="6" fill="#22c55e"/>
  <text x="510" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="white">App Server 2</text>
  <text x="510" y="265" text-anchor="middle" font-size="8" fill="#dcfce7">10.0.2.11</text>

  <!-- Route Table -->
  <rect x="350" y="290" width="210" height="30" rx="4" fill="white" stroke="#94a3b8" stroke-width="1"/>
  <text x="455" y="310" text-anchor="middle" font-size="9" fill="#475569">Route: 0.0.0.0/0 to NAT GW</text>

  <!-- Private Data Subnet -->
  <rect x="600" y="190" width="250" height="140" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="725" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Private Data Subnet (AZ-a)</text>

  <!-- Database -->
  <rect x="620" y="230" width="100" height="45" rx="6" fill="#0ea5e9"/>
  <text x="670" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="white">PostgreSQL</text>
  <text x="670" y="265" text-anchor="middle" font-size="8" fill="#fef3c7">10.0.3.10</text>

  <!-- Cache -->
  <rect x="730" y="230" width="100" height="45" rx="6" fill="#ef4444"/>
  <text x="780" y="248" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Redis</text>
  <text x="780" y="265" text-anchor="middle" font-size="8" fill="#fef3c7">10.0.3.20</text>

  <!-- Route Table -->
  <rect x="620" y="290" width="210" height="30" rx="4" fill="white" stroke="#94a3b8" stroke-width="1"/>
  <text x="725" y="310" text-anchor="middle" font-size="9" fill="#475569">No internet route (isolated)</text>

  <!-- Traffic Flow Arrows -->
  <line x1="245" y1="275" x2="345" y2="275" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="343,270 353,275 343,280" fill="#8b5cf6"/>

  <line x1="510" y1="255" x2="615" y2="255" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="613,250 623,255 613,260" fill="#22c55e"/>

  <!-- Egress Flow Arrow -->
  <line x1="130" y1="275" x2="130" y2="340" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="130" y1="340" x2="450" y2="340" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="450" y1="340" x2="450" y2="170" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="445,172 450,162 455,172" fill="#f59e0b"/>

  <!-- Security Boundaries Section -->
  <rect x="60" y="350" width="840" height="155" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="480" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Security Boundaries</text>

  <!-- SG Box 1 -->
  <rect x="80" y="395" width="240" height="95" rx="6" fill="white" stroke="#3b82f6" stroke-width="1"/>
  <text x="200" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#3b82f6">Public SG</text>
  <text x="200" y="440" text-anchor="middle" font-size="9" fill="#64748b">Inbound: 443 from 0.0.0.0/0</text>
  <text x="200" y="460" text-anchor="middle" font-size="9" fill="#64748b">Outbound: All to 10.0.0.0/16</text>
  <text x="200" y="480" text-anchor="middle" font-size="9" fill="#64748b">Applied to: ALB, NAT GW</text>

  <!-- SG Box 2 -->
  <rect x="335" y="395" width="240" height="95" rx="6" fill="white" stroke="#22c55e" stroke-width="1"/>
  <text x="455" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">App SG</text>
  <text x="455" y="440" text-anchor="middle" font-size="9" fill="#64748b">Inbound: 8080 from Public SG</text>
  <text x="455" y="460" text-anchor="middle" font-size="9" fill="#64748b">Outbound: 5432 to Data SG</text>
  <text x="455" y="480" text-anchor="middle" font-size="9" fill="#64748b">Applied to: App Servers</text>

  <!-- SG Box 3 -->
  <rect x="590" y="395" width="290" height="95" rx="6" fill="white" stroke="#0ea5e9" stroke-width="1"/>
  <text x="735" y="418" text-anchor="middle" font-size="11" font-weight="bold" fill="#0ea5e9">Data SG</text>
  <text x="735" y="440" text-anchor="middle" font-size="9" fill="#64748b">Inbound: 5432/6379 from App SG only</text>
  <text x="735" y="460" text-anchor="middle" font-size="9" fill="#64748b">Outbound: None required</text>
  <text x="735" y="480" text-anchor="middle" font-size="9" fill="#64748b">Applied to: PostgreSQL, Redis (no internet)</text>
</svg>
