<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Configuration Drift: Detection and Correction</text>
  <!-- Left: Desired State -->
  <rect x="40" y="80" width="340" height="380" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="210" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#065f46">Desired State (Git)</text>
  <!-- Desired state contents -->
  <rect x="60" y="140" width="300" height="40" rx="6" fill="#a7f3d0"/>
  <text x="210" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#065f46">nginx: version=1.24, enabled=true</text>
  <rect x="60" y="190" width="300" height="40" rx="6" fill="#a7f3d0"/>
  <text x="210" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#065f46">app-user: uid=1001, shell=/bin/bash</text>
  <rect x="60" y="240" width="300" height="40" rx="6" fill="#a7f3d0"/>
  <text x="210" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#065f46">firewall: port 80=open, 22=restricted</text>
  <rect x="60" y="290" width="300" height="40" rx="6" fill="#a7f3d0"/>
  <text x="210" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#065f46">cron: backup daily at 02:00 UTC</text>
  <rect x="60" y="340" width="300" height="40" rx="6" fill="#a7f3d0"/>
  <text x="210" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#065f46">logging: /var/log/app, rotate=7d</text>
  <!-- Right: Actual State (drifted) -->
  <rect x="520" y="80" width="340" height="380" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="690" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#991b1b">Actual State (Drifted)</text>
  <!-- Actual state with drift -->
  <rect x="540" y="140" width="300" height="40" rx="6" fill="#fecaca"/>
  <text x="690" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">nginx: version=1.22, enabled=true</text>
  <text x="845" y="165" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#dc2626">DRIFT</text>
  <rect x="540" y="190" width="300" height="40" rx="6" fill="#fecaca"/>
  <text x="690" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">app-user: uid=1001, shell=/bin/sh</text>
  <text x="845" y="215" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#dc2626">DRIFT</text>
  <rect x="540" y="240" width="300" height="40" rx="6" fill="#fecaca"/>
  <text x="690" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">firewall: port 80=open, 22=open</text>
  <text x="845" y="265" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#dc2626">DRIFT</text>
  <rect x="540" y="290" width="300" height="40" rx="6" fill="#fecaca"/>
  <text x="690" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">cron: backup daily at 02:00 UTC</text>
  <rect x="540" y="340" width="300" height="40" rx="6" fill="#fecaca"/>
  <text x="690" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">logging: /var/log/app, rotate=30d</text>
  <text x="845" y="365" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#dc2626">DRIFT</text>
  <!-- Correction arrow -->
  <path d="M 380 270 Q 450 270 520 270" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowblue)"/>
  <text x="450" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1d4ed8">Detect &amp; Correct</text>
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">Reapply desired state</text>
  <!-- Drift causes -->
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">Drift causes: manual SSH changes, automated patches, application updates, external events. Config management detects and corrects drift automatically</text>
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>