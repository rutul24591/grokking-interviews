<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Rolling Rollback</text>
  <!-- During Rollout -->
  <rect x="50" y="80" width="380" height="160" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">During Rollout (Issue Detected)</text>
  <rect x="70" y="130" width="340" height="25" rx="3" fill="#ffffff" stroke="#fecaca"/>
  <text x="240" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Instance 1 (v2.0) | Instance 2 (v2.0) | Instance 3 (v1.0) | Instance 4 (v1.0)</text>
  <rect x="70" y="160" width="340" height="25" rx="3" fill="#ffffff" stroke="#fecaca"/>
  <text x="240" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Instance 2 health check failed</text>
  <rect x="70" y="190" width="340" height="25" rx="3" fill="#ffffff" stroke="#fecaca"/>
  <text x="240" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Rollback triggered automatically</text>
  <rect x="70" y="220" width="340" height="25" rx="3" fill="#ffffff" stroke="#fecaca"/>
  <text x="240" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Replace v2.0 instances with v1.0</text>
  <!-- Rollback Arrow -->
  <path d="M 430 160 L 500 160" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)" fill="none"/>
  <text x="465" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">ROLLBACK</text>
  <!-- After Rollback -->
  <rect x="500" y="80" width="350" height="160" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="675" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">After Rollback</text>
  <rect x="520" y="130" width="310" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="675" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Instance 1 (v1.0) | Instance 2 (v1.0) | Instance 3 (v1.0) | Instance 4 (v1.0)</text>
  <rect x="520" y="160" width="310" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="675" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">All instances running stable v1.0</text>
  <rect x="520" y="190" width="310" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="675" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Traffic served by healthy v1.0</text>
  <rect x="520" y="220" width="310" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="675" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Investigate issue, fix, retry</text>
  <!-- Rollback Characteristics -->
  <rect x="50" y="260" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Rollback Characteristics</text>
  <rect x="70" y="310" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Time: Instance-by-instance</text>
  <rect x="330" y="310" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">No rebuild needed</text>
  <rect x="590" y="310" width="240" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="710" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">No data loss</text>
  <!-- Best Practices -->
  <rect x="50" y="380" width="800" height="150" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Rollback Best Practices</text>
  <rect x="70" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Automate rollback trigger</text>
  <rect x="330" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Monitor during rollback</text>
  <rect x="590" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Test rollback regularly</text>
  <rect x="70" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Keep old versions available</text>
  <rect x="330" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Health check each rolled-back instance</text>
  <rect x="590" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Notify team of rollback</text>
  <text x="450" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Rollback replaces new instances with old instances one at a time, traffic routed to healthy old instances</text>
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
