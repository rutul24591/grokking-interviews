<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Rolling Deployment Flow</text>
  <!-- Initial State -->
  <rect x="50" y="80" width="380" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Initial State: All v1.0</text>
  <rect x="70" y="130" width="340" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="240" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Instance 1 (v1.0) | Instance 2 (v1.0) | Instance 3 (v1.0) | Instance 4 (v1.0)</text>
  <rect x="70" y="160" width="340" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="240" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">100% traffic served by v1.0</text>
  <!-- Step 1 -->
  <rect x="50" y="220" width="380" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Step 1: Update Instance 1</text>
  <rect x="70" y="270" width="340" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="240" y="287" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Instance 1 (v2.0) | Instance 2 (v1.0) | Instance 3 (v1.0) | Instance 4 (v1.0)</text>
  <rect x="70" y="300" width="340" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="240" y="317" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Health check passes → proceed</text>
  <!-- Step 2 -->
  <rect x="470" y="80" width="380" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Step 2: Update Instance 2</text>
  <rect x="490" y="130" width="340" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Instance 1 (v2.0) | Instance 2 (v2.0) | Instance 3 (v1.0) | Instance 4 (v1.0)</text>
  <rect x="490" y="160" width="340" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Health check passes → proceed</text>
  <!-- Step 3 -->
  <rect x="470" y="220" width="380" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Step 3: Update Instance 3</text>
  <rect x="490" y="270" width="340" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="287" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Instance 1 (v2.0) | Instance 2 (v2.0) | Instance 3 (v2.0) | Instance 4 (v1.0)</text>
  <rect x="490" y="300" width="340" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="317" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Health check passes → proceed</text>
  <!-- Final State -->
  <rect x="50" y="360" width="800" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Final State: All v2.0</text>
  <text x="450" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Instance 1 (v2.0) | Instance 2 (v2.0) | Instance 3 (v2.0) | Instance 4 (v2.0) — 100% traffic served by v2.0</text>
  <!-- Key Benefits -->
  <rect x="50" y="460" width="800" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Key Benefits</text>
  <text x="450" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Zero-downtime (at least some instances always running) | Lower cost than blue-green (no double infrastructure) | Gradual exposure (issues affect subset of instances)</text>
</svg>
