<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Scaling Delay</text>
  <!-- Detection Delay -->
  <rect x="50" y="80" width="260" height="160" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">1. Detection Delay</text>
  <text x="180" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0369a1">1-5 minutes</text>
  <text x="180" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Time to detect metric change</text>
  <text x="180" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Monitoring interval</text>
  <text x="180" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Metric aggregation window</text>
  <path d="M 310 160 L 360 160" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Provisioning Delay -->
  <rect x="360" y="80" width="260" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="490" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">2. Provisioning Delay</text>
  <text x="490" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#b45309">1-5 minutes (VMs)</text>
  <text x="490" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Time to provision instance</text>
  <text x="490" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">VM: boot OS, install software</text>
  <text x="490" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Container: pull image, start</text>
  <path d="M 620 160 L 670 160" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Warmup Delay -->
  <rect x="670" y="80" width="200" height="160" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="770" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">3. Warmup Delay</text>
  <text x="770" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#15803d">1-5 minutes</text>
  <text x="770" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Time to start serving</text>
  <text x="770" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Application startup</text>
  <text x="770" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Cache warmup, connections</text>
  <!-- Total Delay -->
  <rect x="50" y="260" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Total Scaling Delay: 3-15 minutes (VMs), 30 sec - 3 min (Containers)</text>
  <text x="450" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Detection (1-5 min) + Provisioning (1-5 min) + Warmup (1-5 min) = Total delay during which application is under-provisioned</text>
  <!-- Reduction Strategies -->
  <rect x="50" y="380" width="800" height="150" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Reducing Scaling Delay</text>
  <rect x="70" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Warm pools (pre-provisioned)</text>
  <rect x="330" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Predictive scaling (proactive)</text>
  <rect x="590" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Containers vs VMs (faster)</text>
  <rect x="70" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Optimize app startup time</text>
  <rect x="330" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Faster instance types</text>
  <rect x="590" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Smaller monitoring intervals</text>
  <text x="450" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Combined strategies can reduce delay from 3-15 min to 30 sec - 2 min, preventing performance degradation during traffic spikes</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
