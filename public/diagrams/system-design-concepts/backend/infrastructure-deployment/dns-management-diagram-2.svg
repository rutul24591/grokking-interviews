<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">DNS Management</title>
  <desc id="desc">DNS management showing record types, TTL, and failover configuration</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">DNS Management</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Record types, TTL configuration, and DNS failover</text>
  
  <!-- DNS Records -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">DNS Record Types</text>
  
  <!-- A Record -->
  <rect x="50" y="125" width="360" height="45" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="70" y="153" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">A Record</text>
  <text x="150" y="153" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">example.com → 93.184.216.34</text>
  
  <!-- AAAA Record -->
  <rect x="50" y="175" width="360" height="45" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="70" y="203" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">AAAA Record</text>
  <text x="180" y="203" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">example.com → 2606:2800:220:1::</text>
  
  <!-- CNAME Record -->
  <rect x="50" y="225" width="360" height="45" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="70" y="253" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">CNAME Record</text>
  <text x="200" y="253" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">www → example.com</text>
  
  <!-- MX Record -->
  <rect x="50" y="275" width="360" height="45" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="70" y="303" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">MX Record</text>
  <text x="170" y="303" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">mail.example.com (priority: 10)</text>
  
  <!-- TXT Record -->
  <rect x="50" y="325" width="360" height="45" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="70" y="353" text-anchor="start" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">TXT Record</text>
  <text x="160" y="353" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">"v=spf1 include:_spf.google.com ~all"</text>
  
  <!-- TTL Configuration -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">TTL (Time To Live)</text>
  
  <!-- TTL explanation -->
  <rect x="490" y="125" width="360" height="80" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">How long DNS responses are cached</text>
  <text x="670" y="170" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Lower TTL = Faster changes, more queries</text>
  <text x="670" y="190" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Higher TTL = Slower changes, fewer queries</text>
  
  <!-- TTL values -->
  <rect x="490" y="215" width="170" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="575" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Common TTL Values</text>
  <text x="575" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">300s (5 min) - Dynamic</text>
  <text x="575" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">3600s (1 hr) - Standard</text>
  <text x="575" y="295" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">86400s (1 day) - Static</text>
  <text x="575" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">604800s (1 week) - Rare changes</text>
  
  <!-- TTL impact -->
  <rect x="670" y="215" width="180" height="100" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="760" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">TTL Strategy</text>
  <text x="760" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Before changes: Lower TTL</text>
  <text x="760" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">After changes: Restore TTL</text>
  <text x="760" y="295" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Wait for old TTL to expire</text>
  <text x="760" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Plan changes accordingly</text>
  
  <!-- DNS Failover -->
  <rect x="30" y="380" width="400" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">DNS Failover</text>
  
  <rect x="50" y="420" width="360" height="100" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <!-- Primary -->
  <rect x="70" y="435" width="120" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="130" y="460" text-anchor="middle" font-size="9" fill="white">Primary Server</text>
  <text x="130" y="475" text-anchor="middle" font-size="8" fill="#6ee7b7">10.0.1.1</text>
  
  <line x1="195" y1="455" x2="225" y2="455" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="445" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Health check</text>
  
  <!-- Secondary -->
  <rect x="235" y="435" width="120" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="295" y="460" text-anchor="middle" font-size="9" fill="white">Backup Server</text>
  <text x="295" y="475" text-anchor="middle" font-size="8" fill="#fcd34d">10.0.2.1</text>
  
  <text x="230" y="510" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">DNS provider monitors and switches on failure</text>
  
  <!-- GeoDNS -->
  <rect x="470" y="380" width="400" height="150" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="670" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">GeoDNS (Geographic Routing)</text>
  
  <rect x="490" y="420" width="360" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <!-- US users -->
  <rect x="510" y="435" width="80" height="40" rx="3" fill="var(--bg-theme, #3b82f6)"/>
  <text x="550" y="460" text-anchor="middle" font-size="8" fill="white">US Users</text>
  
  <line x1="595" y1="455" x2="625" y2="455" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="635" y="435" width="100" height="40" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="685" y="460" text-anchor="middle" font-size="8" fill="white">US Server</text>
  
  <!-- EU users -->
  <rect x="510" y="485" width="80" height="40" rx="3" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="550" y="510" text-anchor="middle" font-size="8" fill="white">EU Users</text>
  
  <line x1="595" y1="505" x2="625" y2="505" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="635" y="485" width="100" height="40" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="685" y="510" text-anchor="middle" font-size="8" fill="white">EU Server</text>
  
  <text x="780" y="460" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b">Lower latency</text>
  <text x="780" y="510" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b">Data residency</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
