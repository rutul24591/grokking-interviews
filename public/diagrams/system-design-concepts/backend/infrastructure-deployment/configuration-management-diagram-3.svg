<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Configuration Management - Desired State</title>
  <desc id="desc">Configuration management showing desired state enforcement and idempotency</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Configuration Management - Desired State</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Desired state enforcement and idempotency</text>
  
  <!-- Desired State Concept -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Desired State Enforcement</text>
  
  <!-- Desired State -->
  <rect x="50" y="125" width="360" height="70" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="230" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Desired State (Code)</text>
  <text x="230" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">package nginx { ensure =&gt; present }</text>
  <text x="230" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">service nginx { ensure =&gt; running }</text>
  
  <line x1="230" y1="195" x2="230" y2="235" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <!-- Current State -->
  <rect x="50" y="240" width="360" height="70" rx="4" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="230" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #ef4444">Current State (Server)</text>
  <text x="230" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">nginx: NOT installed</text>
  <text x="230" y="300" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">service: N/A</text>
  
  <line x1="230" y1="310" x2="230" y2="350" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="250" y="330" text-anchor="start" font-size="8" fill="var(--text-theme, #10b981">Enforce</text>
  
  <!-- After Enforcement -->
  <rect x="50" y="355" width="360" height="70" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="230" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">After Enforcement</text>
  <text x="230" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">nginx: installed ✓</text>
  <text x="230" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">service: running ✓</text>
  
  <!-- Idempotency -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Idempotency</text>
  
  <rect x="490" y="125" width="360" height="150" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  
  <text x="670" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Same result regardless of:</text>
  
  <rect x="500" y="165" width="340" height="35" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="670" y="188" text-anchor="middle" font-size="9" fill="white">First run (not installed)</text>
  
  <rect x="500" y="210" width="340" height="35" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="670" y="233" text-anchor="middle" font-size="9" fill="white">Second run (already installed)</text>
  
  <rect x="500" y="255" width="340" height="35" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="670" y="278" text-anchor="middle" font-size="9" fill="white">Hundredth run (still installed)</text>
  
  <text x="670" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Safe to run repeatedly</text>
  <text x="670" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ No side effects</text>
  <text x="670" y="340" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Converges to desired state</text>
  
  <!-- Drift Detection -->
  <rect x="30" y="380" width="400" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Drift Detection</text>
  
  <rect x="50" y="420" width="360" height="100" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="70" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Periodic state checks</text>
  <text x="70" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Alert on configuration drift</text>
  <text x="70" y="485" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Auto-remediation options</text>
  <text x="70" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #f59e0b">⚠ Manual changes overwritten</text>
  
  <!-- Convergence -->
  <rect x="470" y="380" width="400" height="150" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="670" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Convergence</text>
  
  <rect x="490" y="420" width="360" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <text x="510" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• System moves toward desired</text>
  <text x="510" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Self-healing capability</text>
  <text x="510" y="485" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Continuous enforcement</text>
  <text x="510" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓ Predictable state</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
</svg>
