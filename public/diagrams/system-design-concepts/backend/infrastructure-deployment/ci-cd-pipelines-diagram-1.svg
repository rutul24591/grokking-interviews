<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">CI/CD Pipeline Stages</title>
  <desc id="desc">CI/CD pipeline stages from commit to production with build, test, scan, package, and deploy</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">CI/CD Pipeline Stages</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">From code commit to production deployment</text>
  
  <!-- Commit/Trigger -->
  <rect x="30" y="85" width="120" height="80" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="90" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Code Commit</text>
  <text x="90" y="140" text-anchor="middle" font-size="9" fill="#bfdbfe">Git push</text>
  <text x="90" y="155" text-anchor="middle" font-size="8" fill="#93c5fd">PR/MR created</text>
  
  <!-- Arrow to Build -->
  <line x1="150" y1="125" x2="190" y2="125" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="170" y="115" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Trigger</text>
  
  <!-- Build Stage -->
  <rect x="190" y="85" width="140" height="100" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="260" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Build</text>
  <text x="260" y="135" text-anchor="middle" font-size="9" fill="#6ee7b7">Compile code</text>
  <text x="260" y="150" text-anchor="middle" font-size="9" fill="#6ee7b7">Resolve dependencies</text>
  <text x="260" y="165" text-anchor="middle" font-size="9" fill="#6ee7b7">Create artifacts</text>
  <text x="260" y="180" text-anchor="middle" font-size="8" fill="#6ee7b7">~5-10 min</text>
  
  <!-- Arrow to Test -->
  <line x1="330" y1="135" x2="370" y2="135" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="350" y="125" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Pass</text>
  
  <!-- Test Stage -->
  <rect x="370" y="85" width="160" height="120" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Test</text>
  <text x="450" y="135" text-anchor="middle" font-size="9" fill="#c4b5fd">Unit tests</text>
  <text x="450" y="150" text-anchor="middle" font-size="9" fill="#c4b5fd">Integration tests</text>
  <text x="450" y="165" text-anchor="middle" font-size="9" fill="#c4b5fd">E2E tests</text>
  <text x="450" y="180" text-anchor="middle" font-size="9" fill="#c4b5fd">Contract tests</text>
  <text x="450" y="195" text-anchor="middle" font-size="8" fill="#c4b5fd">~10-30 min</text>
  
  <!-- Arrow to Scan -->
  <line x1="530" y1="145" x2="570" y2="145" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="550" y="135" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Pass</text>
  
  <!-- Security Scan Stage -->
  <rect x="570" y="85" width="140" height="100" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="640" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Security Scan</text>
  <text x="640" y="135" text-anchor="middle" font-size="9" fill="#fcd34d">SAST/DAST</text>
  <text x="640" y="150" text-anchor="middle" font-size="9" fill="#fcd34d">Dependency check</text>
  <text x="640" y="165" text-anchor="middle" font-size="9" fill="#fcd34d">Container scan</text>
  <text x="640" y="180" text-anchor="middle" font-size="8" fill="#fcd34d">~5-10 min</text>
  
  <!-- Arrow to Package -->
  <line x1="710" y1="135" x2="750" y2="135" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="730" y="125" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Pass</text>
  
  <!-- Package Stage -->
  <rect x="750" y="85" width="120" height="80" rx="8" fill="var(--bg-theme, #06b6d4)" stroke="var(--border-theme, #0891b2)" stroke-width="2"/>
  <text x="810" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Package</text>
  <text x="810" y="140" text-anchor="middle" font-size="9" fill="#67e8f9">Docker image</text>
  <text x="810" y="155" text-anchor="middle" font-size="8" fill="#67e8f9">Push to registry</text>
  
  <!-- Arrow down to Deploy -->
  <line x1="810" y1="165" x2="810" y2="210" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow-down)"/>
  
  <!-- Deploy Stage -->
  <rect x="750" y="210" width="120" height="80" rx="8" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="810" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Deploy</text>
  <text x="810" y="265" text-anchor="middle" font-size="9" fill="#fca5a5">To environment</text>
  <text x="810" y="280" text-anchor="middle" font-size="8" fill="#fca5a5">Staging/Prod</text>
  
  <!-- Arrow left to Validate -->
  <line x1="750" y1="250" x2="710" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow-left)"/>
  
  <!-- Validate Stage -->
  <rect x="570" y="210" width="140" height="80" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="640" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Validate</text>
  <text x="640" y="265" text-anchor="middle" font-size="9" fill="#c4b5fd">Health checks</text>
  <text x="640" y="280" text-anchor="middle" font-size="8" fill="#c4b5fd">Smoke tests</text>
  
  <!-- Arrow left to Promote -->
  <line x1="570" y1="250" x2="530" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow-left)"/>
  
  <!-- Promote/Gate -->
  <rect x="370" y="210" width="160" height="80" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="450" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Approval Gate</text>
  <text x="450" y="265" text-anchor="middle" font-size="9" fill="#fcd34d">Manual/Auto</text>
  <text x="450" y="280" text-anchor="middle" font-size="8" fill="#fcd34d">Promote to prod</text>
  
  <!-- Arrow left to Production -->
  <line x1="370" y1="250" x2="330" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow-left)"/>
  
  <!-- Production -->
  <rect x="190" y="210" width="140" height="80" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="260" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Production</text>
  <text x="260" y="265" text-anchor="middle" font-size="9" fill="#6ee7b7">Live traffic</text>
  <text x="260" y="280" text-anchor="middle" font-size="8" fill="#6ee7b7">Monitoring active</text>
  
  <!-- Arrow left to Monitor -->
  <line x1="190" y1="250" x2="150" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow-left)"/>
  
  <!-- Monitor -->
  <rect x="30" y="210" width="120" height="80" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="90" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Monitor</text>
  <text x="90" y="265" text-anchor="middle" font-size="9" fill="#bfdbfe">Metrics &amp; Logs</text>
  <text x="90" y="280" text-anchor="middle" font-size="8" fill="#93c5fd">Continuous</text>
  
  <!-- Feedback loop -->
  <path d="M 90 290 L 90 330 L 810 330 L 810 165" fill="none" stroke="var(--text-theme, #64748b)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-down)"/>
  <text x="450" y="350" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Feedback Loop: Issues trigger new commits</text>
  
  <!-- Bottom: Key Principles -->
  <rect x="30" y="370" width="840" height="160" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Key CI/CD Principles</text>
  
  <rect x="50" y="410" width="250" height="110" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="175" y="435" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Build Once</text>
  <text x="175" y="460" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Same artifact through all stages</text>
  <text x="175" y="480" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">No rebuilding for production</text>
  <text x="175" y="500" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Ensures consistency</text>
  
  <rect x="315" y="410" width="250" height="110" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="440" y="435" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Fail Fast</text>
  <text x="440" y="460" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Catch issues early</text>
  <text x="440" y="480" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Quick feedback to developers</text>
  <text x="440" y="500" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Automated gates</text>
  
  <rect x="580" y="410" width="250" height="110" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="705" y="435" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Immutable Artifacts</text>
  <text x="705" y="460" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Versioned with unique IDs</text>
  <text x="705" y="480" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Never modify after creation</text>
  <text x="705" y="500" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Full traceability</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
