<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Service Discovery Patterns</title>
  <desc id="desc">Service discovery showing client-side and server-side discovery patterns</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Service Discovery Patterns</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Client-side and server-side discovery patterns</text>
  
  <!-- Client-Side Discovery -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Client-Side Discovery</text>
  
  <!-- Client -->
  <rect x="50" y="125" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="100" y="155" text-anchor="middle" font-size="9" fill="white">Client</text>
  
  <!-- Query Registry -->
  <line x1="155" y1="150" x2="205" y2="150" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="180" y="140" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">1. Query</text>
  
  <!-- Registry -->
  <rect x="210" y="125" width="100" height="80" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="260" y="155" text-anchor="middle" font-size="9" fill="white">Service</text>
  <text x="260" y="170" text-anchor="middle" font-size="9" fill="white">Registry</text>
  <text x="260" y="190" text-anchor="middle" font-size="8" fill="#c4b5fd">Returns IPs</text>
  
  <!-- Response -->
  <line x1="210" y1="205" x2="155" y2="205" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-left)"/>
  <text x="180" y="220" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">2. [IP1, IP2]</text>
  
  <!-- Direct Call -->
  <line x1="155" y1="235" x2="355" y2="235" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="255" y="225" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">3. Direct Call</text>
  
  <!-- Services -->
  <rect x="360" y="125" width="60" height="50" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="390" y="153" text-anchor="middle" font-size="8" fill="white">Svc 1</text>
  
  <rect x="360" y="185" width="60" height="50" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="390" y="213" text-anchor="middle" font-size="8" fill="white">Svc 2</text>
  
  <text x="230" y="275" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ No LB needed</text>
  <text x="230" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Direct communication</text>
  <text x="230" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Client complexity</text>
  <text x="230" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Language-specific</text>
  
  <!-- Server-Side Discovery -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Server-Side Discovery</text>
  
  <!-- Client -->
  <rect x="490" y="125" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="540" y="155" text-anchor="middle" font-size="9" fill="white">Client</text>
  
  <!-- Call LB -->
  <line x1="595" y1="150" x2="645" y2="150" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="620" y="140" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">1. Call</text>
  
  <!-- LB -->
  <rect x="650" y="125" width="100" height="80" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="700" y="155" text-anchor="middle" font-size="9" fill="white">Load</text>
  <text x="700" y="170" text-anchor="middle" font-size="9" fill="white">Balancer</text>
  <text x="700" y="190" text-anchor="middle" font-size="8" fill="#fcd34d">Queries registry</text>
  
  <!-- Query Registry -->
  <line x1="755" y1="165" x2="805" y2="165" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="780" y="155" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Query</text>
  
  <!-- Registry -->
  <rect x="810" y="140" width="50" height="50" rx="3" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="835" y="168" text-anchor="middle" font-size="8" fill="white">Reg</text>
  
  <!-- Route to Service -->
  <line x1="700" y1="205" x2="700" y2="245" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="720" y="225" text-anchor="start" font-size="7" fill="var(--text-theme, #10b981">2. Route</text>
  
  <!-- Services -->
  <rect x="650" y="250" width="100" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="700" y="280" text-anchor="middle" font-size="9" fill="white">Service Instance</text>
  
  <text x="670" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Client unaware</text>
  <text x="670" y="340" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Works with any client</text>
  <text x="670" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ LB required</text>
  <text x="670" y="370" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Single point of failure</text>
  
  <!-- Service Registry Implementations -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Service Registry Implementations</text>
  
  <rect x="50" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="175" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Eureka (Netflix)</text>
  <text x="175" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">AP system (available)</text>
  <text x="175" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Self-registration</text>
  <text x="175" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Java/Spring ecosystem</text>
  
  <rect x="315" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="440" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Consul (HashiCorp)</text>
  <text x="440" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">CP system (consistent)</text>
  <text x="440" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Health checking</text>
  <text x="440" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Multi-datacenter</text>
  
  <rect x="580" y="420" width="250" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="705" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">etcd (CoreOS)</text>
  <text x="705" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">CP system (consistent)</text>
  <text x="705" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Kubernetes backend</text>
  <text x="705" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Strong consistency</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
</svg>
