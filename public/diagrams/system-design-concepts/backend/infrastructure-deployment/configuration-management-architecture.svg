<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="100%" height="100%">
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Configuration Management Architecture</text>
  <!-- Left side: Push Model (Ansible) -->
  <rect x="30" y="70" width="400" height="450" rx="12" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="230" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e40af">Push Model (Ansible)</text>
  <!-- Control node -->
  <rect x="140" y="130" width="180" height="60" rx="8" fill="#3b82f6"/>
  <text x="230" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Control Node</text>
  <text x="230" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#dbeafe">Ansible playbooks</text>
  <!-- Push arrows to servers -->
  <line x1="230" y1="190" x2="80" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <line x1="230" y1="190" x2="230" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <line x1="230" y1="190" x2="380" y2="270" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <!-- Server 1 -->
  <rect x="40" y="280" width="100" height="80" rx="6" fill="#1e40af"/>
  <text x="90" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Server 1</text>
  <text x="90" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#dbeafe">via SSH</text>
  <!-- Server 2 -->
  <rect x="180" y="280" width="100" height="80" rx="6" fill="#1e40af"/>
  <text x="230" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Server 2</text>
  <text x="230" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#dbeafe">via SSH</text>
  <!-- Server 3 -->
  <rect x="320" y="280" width="100" height="80" rx="6" fill="#1e40af"/>
  <text x="370" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Server 3</text>
  <text x="370" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#dbeafe">via SSH</text>
  <!-- Push model characteristics -->
  <rect x="40" y="390" width="360" height="120" rx="8" fill="#dbeafe"/>
  <text x="220" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e40af">Characteristics</text>
  <text x="60" y="445" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#1e40af">- No agents required on servers</text>
  <text x="60" y="465" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#1e40af">- Configuration pushed on demand</text>
  <text x="60" y="485" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#1e40af">- Simple setup, YAML-based</text>
  <text x="60" y="505" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#1e40af">- Best for: hundreds of servers</text>
  <!-- Right side: Pull Model (Puppet/Chef) -->
  <rect x="470" y="70" width="400" height="450" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#92400e">Pull Model (Puppet/Chef)</text>
  <!-- Central server -->
  <rect x="580" y="130" width="180" height="60" rx="8" fill="#f59e0b"/>
  <text x="670" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Central Server</text>
  <text x="670" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#fef3c7">Puppet Master / Chef Server</text>
  <!-- Pull arrows from servers -->
  <line x1="80" y1="420" x2="230" y2="340" stroke="none"/>
  <line x1="520" y1="270" x2="580" y2="190" stroke="#f59e0b" stroke-width="2" marker-end="url(#arroworange)"/>
  <line x1="670" y1="270" x2="670" y2="190" stroke="#f59e0b" stroke-width="2" marker-end="url(#arroworange)"/>
  <line x1="820" y1="270" x2="760" y2="190" stroke="#f59e0b" stroke-width="2" marker-end="url(#arroworange)"/>
  <!-- Server 1 with agent -->
  <rect x="480" y="280" width="100" height="80" rx="6" fill="#92400e"/>
  <text x="530" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Server 1</text>
  <text x="530" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#fef3c7">+ Agent</text>
  <!-- Server 2 with agent -->
  <rect x="620" y="280" width="100" height="80" rx="6" fill="#92400e"/>
  <text x="670" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Server 2</text>
  <text x="670" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#fef3c7">+ Agent</text>
  <!-- Server 3 with agent -->
  <rect x="760" y="280" width="100" height="80" rx="6" fill="#92400e"/>
  <text x="810" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Server 3</text>
  <text x="810" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#fef3c7">+ Agent</text>
  <!-- Pull model characteristics -->
  <rect x="480" y="390" width="380" height="120" rx="8" fill="#fef3c7"/>
  <text x="670" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#92400e">Characteristics</text>
  <text x="500" y="445" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#92400e">- Agents installed on all servers</text>
  <text x="500" y="465" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#92400e">- Servers pull config on schedule</text>
  <text x="500" y="485" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#92400e">- Continuous enforcement</text>
  <text x="500" y="505" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#92400e">- Best for: thousands of servers</text>
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>