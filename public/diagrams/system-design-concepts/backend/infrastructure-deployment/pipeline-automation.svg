<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Pipeline Automation Workflow</text>
  <!-- Developer commits -->
  <rect x="40" y="90" width="180" height="80" rx="10" fill="#3b82f6"/>
  <text x="130" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Developer</text>
  <text x="130" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Commits Code</text>
  <!-- Arrow -->
  <line x1="220" y1="130" x2="280" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- CI Pipeline -->
  <rect x="280" y="70" width="200" height="120" rx="10" fill="#6366f1"/>
  <text x="380" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">CI Pipeline</text>
  <text x="380" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#e0e7ff">Install, Build, Test</text>
  <text x="380" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#e0e7ff">Lint, Security Scan</text>
  <text x="380" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#e0e7ff">Quality Gates</text>
  <!-- Arrow -->
  <line x1="480" y1="130" x2="540" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Artifact Registry -->
  <rect x="540" y="70" width="160" height="120" rx="10" fill="#8b5cf6"/>
  <text x="620" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Artifact</text>
  <text x="620" y="122" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Registry</text>
  <text x="620" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#e0e7ff">Versioned, tagged</text>
  <text x="620" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#e0e7ff">Build artifacts</text>
  <!-- Arrow -->
  <line x1="700" y1="130" x2="760" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Deploy -->
  <rect x="760" y="70" width="120" height="120" rx="10" fill="#a855f7"/>
  <text x="820" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Deploy</text>
  <text x="820" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#e0e7ff">Staging</text>
  <text x="820" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#e0e7ff">Production</text>
  <!-- Monitor and feedback loop -->
  <rect x="280" y="240" width="600" height="100" rx="10" fill="#10b981"/>
  <text x="580" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Continuous Monitoring &amp; Feedback</text>
  <text x="580" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#d1fae5">Health checks, error rates, latency, business metrics, deployment frequency, MTTR</text>
  <text x="580" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#d1fae5">Alerts trigger on threshold breaches — automatic rollback on failure detection</text>
  <!-- Feedback arrow back to start -->
  <path d="M 280 290 Q 130 290 130 170" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  <text x="130" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#10b981">Feedback Loop</text>
  <!-- Rollback path -->
  <path d="M 820 190 Q 820 240 700 240" fill="none" stroke="#f43f5e" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="780" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f43f5e">Rollback</text>
  <path d="M 700 240 Q 500 240 380 240" fill="none" stroke="#f43f5e" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowhead)"/>
  <!-- Automation badges -->
  <rect x="40" y="390" width="240" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="160" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Automated: Build, Test, Deploy</text>
  <rect x="300" y="390" width="240" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="420" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Automated: Monitoring, Alerting</text>
  <rect x="560" y="390" width="300" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="710" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Automated: Rollback on Failure</text>
  <!-- Key insight -->
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">Pipeline automation eliminates manual deployment steps, reduces human error, and enables multiple deployments per day with confidence</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>