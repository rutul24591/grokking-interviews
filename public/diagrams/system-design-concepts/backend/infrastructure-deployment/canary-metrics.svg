<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Canary Metrics Monitoring</text>
  <!-- Error Rate -->
  <rect x="50" y="80" width="260" height="160" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Error Rate</text>
  <rect x="70" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Baseline: 0.5%</text>
  <rect x="70" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Canary: 0.6% (within 10%)</text>
  <rect x="70" y="200" width="220" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="180" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Status: Healthy</text>
  <!-- Response Time -->
  <rect x="330" y="80" width="260" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Response Time</text>
  <rect x="350" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Baseline: 200ms</text>
  <rect x="350" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Canary: 210ms (within 5%)</text>
  <rect x="350" y="200" width="220" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="460" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Status: Healthy</text>
  <!-- Business Metrics -->
  <rect x="610" y="80" width="240" height="160" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Business Metrics</text>
  <rect x="630" y="130" width="200" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Baseline: 5% conversion</text>
  <rect x="630" y="165" width="200" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Canary: 4.8% (within 5%)</text>
  <rect x="630" y="200" width="200" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="730" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Status: Healthy</text>
  <!-- Comparison -->
  <rect x="50" y="260" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Metric Thresholds</text>
  <rect x="70" y="310" width="240" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Error rate: within 10%</text>
  <rect x="330" y="310" width="240" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Response time: within 5%</text>
  <rect x="590" y="310" width="240" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="710" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Business metrics: within 5%</text>
  <!-- Promotion Decision -->
  <rect x="50" y="380" width="800" height="150" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Promotion Decision</text>
  <rect x="70" y="430" width="360" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="250" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">All metrics within thresholds → Proceed to next stage</text>
  <rect x="450" y="430" width="380" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="640" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Any metric beyond threshold → Halt and rollback</text>
  <rect x="70" y="480" width="760" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Automated promotion enables hands-off rollouts. Manual promotion provides oversight for high-risk deployments.</text>
</svg>
