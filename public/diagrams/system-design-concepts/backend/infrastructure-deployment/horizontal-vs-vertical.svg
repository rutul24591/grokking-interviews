<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Horizontal vs Vertical Scaling</text>
  <!-- Before Scaling -->
  <rect x="50" y="80" width="380" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="240" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e293b">Before Scaling</text>
  <rect x="70" y="130" width="340" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="240" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Single Instance: 4 CPU, 8GB RAM</text>
  <text x="240" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Traffic: 1000 req/s</text>
  <!-- Horizontal After -->
  <rect x="50" y="280" width="380" height="250" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#15803d">After Horizontal Scaling</text>
  <rect x="70" y="330" width="150" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="145" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Instance 1: 4 CPU</text>
  <rect x="240" y="330" width="150" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="315" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Instance 2: 4 CPU</text>
  <rect x="70" y="380" width="150" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="145" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Instance 3: 4 CPU</text>
  <rect x="240" y="380" width="150" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="315" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Instance 4: 4 CPU</text>
  <rect x="70" y="430" width="320" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="230" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Total: 16 CPU, 32GB RAM | Traffic: 4000 req/s</text>
  <!-- Vertical After -->
  <rect x="470" y="280" width="380" height="250" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#92400e">After Vertical Scaling</text>
  <rect x="490" y="330" width="340" height="60" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Single Instance: 16 CPU, 32GB RAM</text>
  <text x="660" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Traffic: 4000 req/s</text>
  <rect x="490" y="400" width="340" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Limit: Max instance size (32 CPU, 64GB)</text>
  <text x="660" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Single point of failure — if it fails, all traffic lost</text>
  <!-- Comparison -->
  <rect x="50" y="80" width="380" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="240" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e293b">Before Scaling</text>
  <rect x="70" y="130" width="340" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="240" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Single Instance: 4 CPU, 8GB RAM</text>
  <text x="240" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Traffic: 1000 req/s</text>
  <!-- Arrow -->
  <path d="M 240 260 L 240 280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 660 260 L 660 280" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Key Differences -->
  <rect x="470" y="80" width="380" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Key Differences</text>
  <rect x="490" y="130" width="340" height="25" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="660" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Horizontal: No upper limit, fault tolerant</text>
  <rect x="490" y="160" width="340" height="25" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Vertical: Upper limit, single point of failure</text>
  <rect x="490" y="190" width="340" height="25" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="660" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Horizontal: Requires distributed architecture</text>
  <rect x="490" y="220" width="340" height="25" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Vertical: Simple, no architecture changes</text>
  <!-- Recommendation -->
  <rect x="50" y="470" width="800" height="60" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Recommendation: Use horizontal scaling for distributed systems. Use vertical scaling only when horizontal is not possible.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
