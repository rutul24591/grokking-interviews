<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Blue-Green Deployment</title>
  <desc id="desc">Blue-green deployment with two environments and a traffic switch between them</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Blue-Green Deployment</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Two identical environments with instant traffic switch</text>
  
  <!-- Users -->
  <rect x="30" y="85" width="120" height="60" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="90" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Users</text>
  <text x="90" y="135" text-anchor="middle" font-size="9" fill="#bfdbfe">Traffic source</text>
  
  <!-- Traffic arrow to Load Balancer -->
  <line x1="150" y1="115" x2="200" y2="115" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Load Balancer / Router -->
  <rect x="200" y="85" width="140" height="80" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="270" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Load Balancer</text>
  <text x="270" y="140" text-anchor="middle" font-size="9" fill="#c4b5fd">Traffic Switch</text>
  <text x="270" y="155" text-anchor="middle" font-size="8" fill="#a78bfa">Active: BLUE</text>
  
  <!-- Traffic split arrows -->
  <line x1="340" y1="115" x2="390" y2="150" stroke="var(--text-theme, #3b82f6)" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="365" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #3b82f6">100%</text>
  
  <line x1="340" y1="135" x2="390" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="365" y="190" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">0%</text>
  
  <!-- Blue Environment (Active) -->
  <rect x="400" y="85" width="220" height="180" rx="8" fill="var(--bg-panel-hover, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="3"/>
  <text x="510" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">BLUE Environment</text>
  <text x="510" y="130" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">ACTIVE (Production)</text>
  
  <!-- Blue instances -->
  <rect x="420" y="145" width="55" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="447" y="170" text-anchor="middle" font-size="8" fill="white">v1.0</text>
  <text x="447" y="185" text-anchor="middle" font-size="7" fill="#6ee7b7">Running</text>
  
  <rect x="485" y="145" width="55" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="512" y="170" text-anchor="middle" font-size="8" fill="white">v1.0</text>
  <text x="512" y="185" text-anchor="middle" font-size="7" fill="#6ee7b7">Running</text>
  
  <rect x="550" y="145" width="55" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="577" y="170" text-anchor="middle" font-size="8" fill="white">v1.0</text>
  <text x="577" y="185" text-anchor="middle" font-size="7" fill="#6ee7b7">Running</text>
  
  <!-- Blue database -->
  <rect x="440" y="210" width="140" height="40" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="510" y="235" text-anchor="middle" font-size="9" fill="white">Shared Database</text>
  
  <!-- Green Environment (Standby) -->
  <rect x="400" y="285" width="220" height="180" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="510" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #64748b">GREEN Environment</text>
  <text x="510" y="330" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">STANDBY</text>
  
  <!-- Green instances -->
  <rect x="420" y="345" width="55" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="447" y="370" text-anchor="middle" font-size="8" fill="white">v2.0</text>
  <text x="447" y="385" text-anchor="middle" font-size="7" fill="#c4b5fd">Deployed</text>
  
  <rect x="485" y="345" width="55" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="512" y="370" text-anchor="middle" font-size="8" fill="white">v2.0</text>
  <text x="512" y="385" text-anchor="middle" font-size="7" fill="#c4b5fd">Testing</text>
  
  <rect x="550" y="345" width="55" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="577" y="370" text-anchor="middle" font-size="8" fill="white">v2.0</text>
  <text x="577" y="385" text-anchor="middle" font-size="7" fill="#c4b5fd">Testing</text>
  
  <!-- Green database connection -->
  <line x1="510" y1="395" x2="510" y2="420" stroke="var(--text-theme, #64748b)" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="530" y="410" text-anchor="start" font-size="7" fill="var(--text-theme, #64748b">Read-only validation</text>
  
  <!-- Switch Button -->
  <rect x="650" y="250" width="100" height="60" rx="30" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="700" y="280" text-anchor="middle" font-size="10" font-weight="bold" fill="white">SWITCH</text>
  <text x="700" y="295" text-anchor="middle" font-size="8" fill="#bfdbfe">Traffic to GREEN</text>
  
  <!-- After switch indicator -->
  <line x1="750" y1="280" x2="780" y2="280" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Result box -->
  <rect x="790" y="250" width="80" height="60" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="830" y="275" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #b45309">After Switch</text>
  <text x="830" y="295" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">GREEN = Active</text>
  
  <!-- Bottom: Key Benefits -->
  <rect x="30" y="480" width="840" height="50" rx="6" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Key Benefits:</text>
  <text x="540" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">✓ Instant rollback</text>
  <text x="640" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">✓ Full environment testing</text>
  <text x="750" y="505" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">✓ Zero-downtime deployment</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
  </defs>
</svg>
