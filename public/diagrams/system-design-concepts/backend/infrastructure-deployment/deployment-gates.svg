<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Deployment Gates: Continuous Delivery vs Continuous Deployment</text>
  <!-- Pipeline stages across top -->
  <rect x="40" y="70" width="120" height="50" rx="6" fill="#3b82f6"/>
  <text x="100" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Build</text>
  <rect x="170" y="70" width="120" height="50" rx="6" fill="#6366f1"/>
  <text x="230" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Unit Tests</text>
  <rect x="300" y="70" width="120" height="50" rx="6" fill="#8b5cf6"/>
  <text x="360" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Integration</text>
  <rect x="430" y="70" width="120" height="50" rx="6" fill="#a855f7"/>
  <text x="490" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">E2E Tests</text>
  <rect x="560" y="70" width="120" height="50" rx="6" fill="#d946ef"/>
  <text x="620" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Deploy Staging</text>
  <rect x="690" y="70" width="170" height="50" rx="6" fill="#f43f5e"/>
  <text x="775" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Deploy Production</text>
  <!-- Continuous Delivery path -->
  <rect x="40" y="160" width="820" height="140" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="100" y="190" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#92400e">Continuous Delivery</text>
  <!-- Gate icon -->
  <rect x="640" y="210" width="80" height="60" rx="8" fill="#f59e0b"/>
  <text x="680" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Manual</text>
  <text x="680" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Approval</text>
  <!-- Arrow from staging to gate -->
  <line x1="620" y1="120" x2="620" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Arrow from gate to production -->
  <line x1="720" y1="230" x2="775" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="700" y="285" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#92400e">Human review before production deploy</text>
  <!-- Automated checks in delivery -->
  <rect x="100" y="210" width="160" height="30" rx="4" fill="#fbbf24"/>
  <text x="180" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78350f">Security Scan</text>
  <rect x="280" y="210" width="160" height="30" rx="4" fill="#fbbf24"/>
  <text x="360" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78350f">Performance Test</text>
  <rect x="460" y="210" width="160" height="30" rx="4" fill="#fbbf24"/>
  <text x="540" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#78350f">Smoke Tests</text>
  <!-- Continuous Deployment path -->
  <rect x="40" y="330" width="820" height="140" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="100" y="360" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#065f46">Continuous Deployment</text>
  <!-- No gate - direct path -->
  <line x1="620" y1="120" x2="620" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="400" x2="690" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="775" y1="400" x2="775" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="640" y="370" width="110" height="60" rx="8" fill="#10b981"/>
  <text x="695" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Automatic</text>
  <text x="695" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Deploy</text>
  <text x="700" y="455" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#065f46">No human approval — automated quality gates only</text>
  <!-- Automated checks in deployment -->
  <rect x="100" y="380" width="160" height="30" rx="4" fill="#34d399"/>
  <text x="180" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#064e3b">Security Scan</text>
  <rect x="280" y="380" width="160" height="30" rx="4" fill="#34d399"/>
  <text x="360" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#064e3b">Performance Test</text>
  <rect x="460" y="380" width="160" height="30" rx="4" fill="#34d399"/>
  <text x="540" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#064e3b">Smoke Tests</text>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">Continuous Delivery: manual gate for compliance. Continuous Deployment: fully automated — requires high confidence in test quality</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>