<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Kubernetes Self-Healing: Detection and Recovery</text>
  <!-- Before: Healthy cluster -->
  <rect x="30" y="70" width="400" height="200" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="230" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#065f46">Healthy State</text>
  <!-- 3 healthy pods -->
  <rect x="60" y="120" width="100" height="50" rx="6" fill="#10b981"/>
  <text x="110" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Pod A</text>
  <text x="110" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5">Healthy</text>
  <rect x="180" y="120" width="100" height="50" rx="6" fill="#10b981"/>
  <text x="230" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Pod B</text>
  <text x="230" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5">Healthy</text>
  <rect x="300" y="120" width="100" height="50" rx="6" fill="#10b981"/>
  <text x="350" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Pod C</text>
  <text x="350" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5">Healthy</text>
  <!-- Health check arrows -->
  <line x1="110" y1="170" x2="110" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <line x1="230" y1="170" x2="230" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <line x1="350" y1="170" x2="350" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arrowgreen)"/>
  <text x="230" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Liveness probe: OK, Readiness probe: OK</text>
  <text x="230" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">3/3 replicas healthy</text>
  <!-- Incident: Pod B fails -->
  <rect x="470" y="70" width="400" height="200" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="670" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#991b1b">Pod B Crashes</text>
  <rect x="500" y="120" width="100" height="50" rx="6" fill="#10b981"/>
  <text x="550" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Pod A</text>
  <text x="550" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5">Healthy</text>
  <rect x="620" y="120" width="100" height="50" rx="6" fill="#ef4444"/>
  <text x="670" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Pod B</text>
  <text x="670" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#fecaca">CRASHED</text>
  <rect x="740" y="120" width="100" height="50" rx="6" fill="#10b981"/>
  <text x="790" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Pod C</text>
  <text x="790" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5">Healthy</text>
  <!-- Probe failure -->
  <line x1="670" y1="170" x2="670" y2="200" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="670" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Liveness probe: FAILED</text>
  <text x="670" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">2/3 replicas healthy — below desired</text>
  <!-- Recovery: Self-healing -->
  <rect x="250" y="300" width="400" height="170" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e40af">Self-Healing: Automatic Restart</text>
  <!-- 3 healthy pods again -->
  <rect x="280" y="350" width="100" height="50" rx="6" fill="#10b981"/>
  <text x="330" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Pod A</text>
  <text x="330" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5">Healthy</text>
  <rect x="400" y="350" width="100" height="50" rx="6" fill="#3b82f6"/>
  <text x="450" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Pod B'</text>
  <text x="450" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#dbeafe">Restarted</text>
  <rect x="520" y="350" width="100" height="50" rx="6" fill="#10b981"/>
  <text x="570" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Pod C</text>
  <text x="570" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#d1fae5">Healthy</text>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Kubelet detects failure, restarts Pod B</text>
  <text x="450" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af">3/3 replicas healthy — desired state restored</text>
  <!-- Arrow from incident to recovery -->
  <line x1="670" y1="270" x2="450" y2="300" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowblue)"/>
  <text x="600" y="285" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1d4ed8">Automatic recovery</text>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b">Kubernetes continuously monitors pod health via probes. Failed pods are automatically restarted, maintaining the desired replica count without human intervention</text>
  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowblue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>