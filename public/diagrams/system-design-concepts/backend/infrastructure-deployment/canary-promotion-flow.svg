<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Canary Promotion Flow</text>
  <!-- Stage 1 -->
  <rect x="50" y="80" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Stage 1: 1%</text>
  <text x="130" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">15 minutes</text>
  <path d="M 210 130 L 260 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Stage 2 -->
  <rect x="260" y="80" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="340" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Stage 2: 5%</text>
  <text x="340" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">30 minutes</text>
  <path d="M 420 130 L 470 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Stage 3 -->
  <rect x="470" y="80" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Stage 3: 10%</text>
  <text x="550" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">1 hour</text>
  <path d="M 630 130 L 680 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Stage 4 -->
  <rect x="680" y="80" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="760" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Stage 4: 25%</text>
  <text x="760" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">2 hours</text>
  <!-- Decision path - Healthy -->
  <path d="M 760 180 L 760 240 L 130 240 L 130 180" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text x="445" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Metrics healthy → proceed to next stage</text>
  <!-- Decision path - Degraded -->
  <path d="M 760 180 L 760 280 L 130 280 L 130 180" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  <text x="445" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Metrics degraded → halt and rollback</text>
  <!-- Approved Changes -->
  <rect x="50" y="300" width="380" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="240" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Approved Changes</text>
  <text x="240" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Traffic increased to next stage</text>
  <text x="240" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Continue monitoring metrics</text>
  <!-- Rollback Detected -->
  <rect x="470" y="300" width="380" height="100" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="660" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b91c1c">Rollback Triggered</text>
  <text x="660" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Traffic rolled back to previous version</text>
  <text x="660" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Investigate issues, fix, retry</text>
  <!-- Best Practices -->
  <rect x="50" y="420" width="800" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Promotion Best Practices</text>
  <rect x="70" y="470" width="240" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Define clear success criteria</text>
  <text x="190" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Before starting canary</text>
  <rect x="330" y="470" width="240" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Monitor technical + business metrics</text>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Both are important</text>
  <rect x="590" y="470" width="240" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="710" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Automate promotion and rollback</text>
  <text x="710" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Faster and more consistent</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
