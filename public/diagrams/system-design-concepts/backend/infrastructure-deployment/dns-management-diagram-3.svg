<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">DNS Management - Record Types</title>
  <desc id="desc">DNS management showing record types and their purposes</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">DNS Management - Record Types</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Common DNS record types and their purposes</text>
  
  <!-- A and AAAA Records -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">A / AAAA Records</text>
  
  <rect x="50" y="125" width="200" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">A Record</text>
  <text x="150" y="175" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Maps domain to IPv4</text>
  <text x="150" y="190" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">example.com → 93.184.216.34</text>
  
  <rect x="50" y="215" width="200" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">AAAA Record</text>
  <text x="150" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Maps domain to IPv6</text>
  <text x="150" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">example.com → 2606:2800:220:1::</text>
  
  <!-- CNAME and MX Records -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">CNAME / MX Records</text>
  
  <rect x="335" y="125" width="230" height="80" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">CNAME Record</text>
  <text x="450" y="175" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Alias to another domain</text>
  <text x="450" y="190" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">www → example.com</text>
  
  <rect x="335" y="215" width="230" height="80" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">MX Record</text>
  <text x="450" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Mail exchange server</text>
  <text x="450" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">mail.example.com (priority: 10)</text>
  
  <!-- TXT and NS Records -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">TXT / NS Records</text>
  
  <rect x="620" y="125" width="230" height="80" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">TXT Record</text>
  <text x="735" y="175" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Text information</text>
  <text x="735" y="190" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">SPF, DKIM, verification</text>
  
  <rect x="620" y="215" width="230" height="80" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">NS Record</text>
  <text x="735" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Name server delegation</text>
  <text x="735" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">ns1.example.com</text>
  
  <!-- DNS Resolution Flow -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">DNS Resolution Flow</text>
  
  <rect x="50" y="360" width="800" height="160" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <!-- Client -->
  <rect x="70" y="380" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)"/>
  <text x="120" y="408" text-anchor="middle" font-size="9" fill="white">Client</text>
  
  <!-- Resolver -->
  <line x1="175" y1="405" x2="215" y2="405" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="195" y="395" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Query</text>
  
  <rect x="220" y="380" width="100" height="50" rx="4" fill="var(--bg-theme, #10b981)"/>
  <text x="270" y="408" text-anchor="middle" font-size="9" fill="white">Resolver</text>
  
  <!-- Root -->
  <line x1="325" y1="405" x2="365" y2="405" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="345" y="395" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Referral</text>
  
  <rect x="370" y="380" width="100" height="50" rx="4" fill="var(--bg-theme, #f59e0b)"/>
  <text x="420" y="408" text-anchor="middle" font-size="9" fill="white">Root Server</text>
  
  <!-- TLD -->
  <line x1="475" y1="405" x2="515" y2="405" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="495" y="395" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Referral</text>
  
  <rect x="520" y="380" width="100" height="50" rx="4" fill="var(--bg-theme, #f59e0b)"/>
  <text x="570" y="408" text-anchor="middle" font-size="9" fill="white">TLD Server</text>
  
  <!-- Authoritative -->
  <line x1="625" y1="405" x2="665" y2="405" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="645" y="395" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Query</text>
  
  <rect x="670" y="380" width="120" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="730" y="408" text-anchor="middle" font-size="9" fill="white">Authoritative</text>
  
  <!-- Response -->
  <path d="M 730 430 L 730 470 L 120 470 L 120 450" fill="none" stroke="var(--text-theme, #10b981)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text x="450" y="490" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Response: 93.184.216.34</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
</svg>
