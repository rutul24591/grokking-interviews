<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Terraform Architecture</text>
  <!-- Configuration -->
  <rect x="50" y="80" width="260" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Configuration Files</text>
  <rect x="70" y="130" width="220" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">main.tf (resources)</text>
  <rect x="70" y="160" width="220" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">variables.tf (inputs)</text>
  <rect x="70" y="190" width="220" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">outputs.tf (exports)</text>
  <rect x="70" y="220" width="220" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">modules/ (reusable)</text>
  <path d="M 310 170 L 360 170" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Terraform Core -->
  <rect x="360" y="80" width="180" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Terraform Core</text>
  <rect x="380" y="130" width="140" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="450" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Plan engine</text>
  <rect x="380" y="160" width="140" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="450" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Apply engine</text>
  <rect x="380" y="190" width="140" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="450" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">State management</text>
  <rect x="380" y="220" width="140" height="25" rx="3" fill="#ffffff" stroke="#fde68a"/>
  <text x="450" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Dependency graph</text>
  <!-- Providers -->
  <rect x="580" y="80" width="260" height="180" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="710" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Provider Plugins</text>
  <rect x="600" y="130" width="220" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="147" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">AWS Provider</text>
  <rect x="600" y="160" width="220" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="177" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">GCP Provider</text>
  <rect x="600" y="190" width="220" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Azure Provider</text>
  <rect x="600" y="220" width="220" height="25" rx="3" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Kubernetes Provider</text>
  <path d="M 540 170 L 580 170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- State -->
  <rect x="50" y="280" width="800" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">State File (terraform.tfstate)</text>
  <rect x="70" y="330" width="240" height="40" rx="4" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="190" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Maps config to real resources</text>
  <rect x="330" y="330" width="240" height="40" rx="4" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Stored remotely (S3, TF Cloud)</text>
  <rect x="590" y="330" width="240" height="40" rx="4" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="710" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Locked during operations</text>
  <!-- Cloud -->
  <rect x="50" y="400" width="800" height="70" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#475560">Cloud Provider APIs (AWS, GCP, Azure, Kubernetes)</text>
  <text x="450" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#647480">Providers translate IaC config into API calls</text>
  <!-- Flow arrows -->
  <path d="M 450 260 L 450 280" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 450 380 L 450 400" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Key -->
  <rect x="50" y="490" width="800" height="40" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Config → Core plans changes → Providers execute → State tracks resources → Cloud APIs provision infrastructure</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
