<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480">
  <defs>
    <style>
      .bg-light { fill: #ffffff; }
      .bg-dark { fill: #0f172a; }
      .box-light { fill: #f8fafc; stroke: #cbd5e1; }
      .box-dark { fill: #1e293b; stroke: #475569; }
      .biz-light { fill: #f0fdf4; stroke: #22c55e; }
      .biz-dark { fill: #1a4731; stroke: #4ade80; }
      .data-light { fill: #fefce8; stroke: #eab308; }
      .data-dark { fill: #4a4420; stroke: #facc15; }
      .title-light { fill: #0f172a; }
      .title-dark { fill: #f1f5f9; }
      .label-light { fill: #1e293b; }
      .label-dark { fill: #e2e8f0; }
      .sublabel-light { fill: #475569; }
      .sublabel-dark { fill: #94a3b8; }
      .dep-light { stroke: #3b82f6; }
      .dep-dark { stroke: #60a5fa; }
      .inv-light { stroke: #ef4444; stroke-dasharray: 6,4; }
      .inv-dark { stroke: #f87171; stroke-dasharray: 6,4; }
    </style>
  </defs>

  <!-- Light mode background -->
  <rect class="bg-light" width="900" height="480" />

  <!-- Title -->
  <text class="title-light" x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Dependency Flow &amp; Inversion</text>
  <text class="sublabel-light" x="450" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">Requests flow down, dependencies are inverted through interfaces</text>

  <!-- LEFT SIDE: Request Flow -->
  <text x="225" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0f172a">Request Flow (Downward)</text>

  <!-- Presentation box -->
  <rect class="box-light" x="120" y="105" width="210" height="55" rx="6" />
  <text class="label-light" x="225" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Presentation</text>
  <text class="sublabel-light" x="225" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">HTTP Request</text>

  <!-- Arrow down -->
  <line x1="225" y1="160" x2="225" y2="195" stroke="#3b82f6" stroke-width="2" />
  <polygon points="225,200 218,188 232,188" fill="#3b82f6" />

  <!-- Business box -->
  <rect class="biz-light" x="120" y="200" width="210" height="55" rx="6" />
  <text class="label-light" x="225" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Business Layer</text>
  <text class="sublabel-light" x="225" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Command Processing</text>

  <!-- Arrow down -->
  <line x1="225" y1="255" x2="225" y2="290" stroke="#3b82f6" stroke-width="2" />
  <polygon points="225,295 218,283 232,283" fill="#3b82f6" />

  <!-- Data Access box -->
  <rect class="data-light" x="120" y="300" width="210" height="55" rx="6" />
  <text class="label-light" x="225" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Data Access</text>
  <text class="sublabel-light" x="225" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Repository Implementation</text>

  <!-- Arrow down -->
  <line x1="225" y1="355" x2="225" y2="390" stroke="#3b82f6" stroke-width="2" />
  <polygon points="225,395 218,383 232,383" fill="#3b82f6" />

  <!-- Infrastructure box -->
  <rect class="box-light" x="120" y="400" width="210" height="55" rx="6" />
  <text class="label-light" x="225" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Infrastructure</text>
  <text class="sublabel-light" x="225" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Database / External APIs</text>

  <!-- RIGHT SIDE: Dependency Inversion -->
  <text x="675" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0f172a">Dependency Inversion</text>

  <!-- Business defines interface -->
  <rect class="biz-light" x="570" y="105" width="210" height="55" rx="6" />
  <text class="label-light" x="675" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Business Layer</text>
  <text class="sublabel-light" x="675" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Defines IRepository Interface</text>

  <!-- Dashed arrow pointing down (inversion) -->
  <line x1="675" y1="160" x2="675" y2="195" class="inv-light" stroke-width="2" />
  <polygon points="675,200 668,188 682,188" fill="#ef4444" />

  <!-- Interface label -->
  <rect x="600" y="205" width="150" height="40" rx="4" fill="#fef2f2" stroke="#fca5a5" />
  <text x="675" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">IRepository Interface</text>

  <!-- Dashed arrow continuing -->
  <line x1="675" y1="245" x2="675" y2="290" class="inv-light" stroke-width="2" />
  <polygon points="675,295 668,283 682,283" fill="#ef4444" />

  <!-- Data Access implements -->
  <rect class="data-light" x="570" y="300" width="210" height="55" rx="6" />
  <text class="label-light" x="675" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Data Access Layer</text>
  <text class="sublabel-light" x="675" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="10">Implements IRepository</text>

  <!-- DI Container -->
  <rect x="600" y="375" width="150" height="40" rx="4" fill="#eff6ff" stroke="#60a5fa" />
  <text x="675" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2563eb">DI Container Wiring</text>

  <!-- Arrow from DI to Data Access -->
  <line x1="675" y1="415" x2="675" y2="360" stroke="#2563eb" stroke-width="1.5" />
  <polygon points="675,355 670,367 680,367" fill="#2563eb" />

  <!-- Annotation -->
  <text x="450" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Business layer depends on abstractions, not concretions</text>
</svg>
