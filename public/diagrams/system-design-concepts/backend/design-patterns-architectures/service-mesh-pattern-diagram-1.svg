<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <title>Service Mesh Architecture with Sidecar Proxies and Control Plane</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Service Mesh Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Sidecar Proxies (Envoy) + Control Plane (Istio)</text>

  <!-- Control Plane -->
  <rect x="280" y="80" width="340" height="70" rx="10" fill="#1a1822"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Control Plane (Istio)</text>
  <text x="450" y="125" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.8" font-family="system-ui, sans-serif">Configuration, Policy, Telemetry, mTLS Certs</text>

  <!-- Data Plane - Services with Sidecars -->
  <!-- Service A -->
  <rect x="60" y="200" width="200" height="130" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2" stroke-opacity="0.3"/>
  <rect x="60" y="200" width="200" height="35" rx="8" fill="#7c3aed"/>
  <text x="160" y="223" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Service A</text>
  <rect x="80" y="250" width="70" height="60" rx="6" fill="#f3f1f8" stroke="#7c3aed" stroke-width="1"/>
  <text x="115" y="273" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">App</text>
  <text x="115" y="295" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Business Logic</text>
  <rect x="170" y="250" width="70" height="60" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="205" y="273" text-anchor="middle" font-size="10" font-weight="700" fill="#0c4a6e" font-family="system-ui, sans-serif">Envoy</text>
  <text x="205" y="295" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Sidecar Proxy</text>

  <!-- Service B -->
  <rect x="350" y="200" width="200" height="130" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2" stroke-opacity="0.3"/>
  <rect x="350" y="200" width="200" height="35" rx="8" fill="#7c3aed"/>
  <text x="450" y="223" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Service B</text>
  <rect x="370" y="250" width="70" height="60" rx="6" fill="#f3f1f8" stroke="#7c3aed" stroke-width="1"/>
  <text x="405" y="273" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">App</text>
  <text x="405" y="295" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Business Logic</text>
  <rect x="460" y="250" width="70" height="60" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="495" y="273" text-anchor="middle" font-size="10" font-weight="700" fill="#0c4a6e" font-family="system-ui, sans-serif">Envoy</text>
  <text x="495" y="295" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Sidecar Proxy</text>

  <!-- Service C -->
  <rect x="640" y="200" width="200" height="130" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2" stroke-opacity="0.3"/>
  <rect x="640" y="200" width="200" height="35" rx="8" fill="#7c3aed"/>
  <text x="740" y="223" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Service C</text>
  <rect x="660" y="250" width="70" height="60" rx="6" fill="#f3f1f8" stroke="#7c3aed" stroke-width="1"/>
  <text x="695" y="273" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">App</text>
  <text x="695" y="295" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Business Logic</text>
  <rect x="750" y="250" width="70" height="60" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="785" y="273" text-anchor="middle" font-size="10" font-weight="700" fill="#0c4a6e" font-family="system-ui, sans-serif">Envoy</text>
  <text x="785" y="295" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Sidecar Proxy</text>

  <!-- Control Plane to Data Plane connections -->
  <line x1="450" y1="150" x2="160" y2="200" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="450" y1="150" x2="450" y2="200" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <line x1="450" y1="150" x2="740" y2="200" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>

  <!-- Inter-service communication via sidecars -->
  <path d="M 260 280 Q 305 280 350 280" stroke="#0284c7" stroke-width="2" fill="none"/>
  <polygon points="340,276 350,280 340,284" fill="#0284c7"/>
  <path d="M 560 280 Q 600 280 640 280" stroke="#0284c7" stroke-width="2" fill="none"/>
  <polygon points="630,276 640,280 630,284" fill="#0284c7"/>

  <!-- Labels -->
  <text x="160" y="360" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Data Plane</text>
  <text x="450" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Configuration &amp; Policy (dashed)</text>

  <!-- Legend -->
  <rect x="60" y="390" width="780" height="80" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="70" y="410" font-size="11" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Key Components:</text>
  <rect x="70" y="425" width="20" height="14" rx="3" fill="#7c3aed"/>
  <text x="100" y="436" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">Service (Application Logic)</text>
  <rect x="300" y="425" width="20" height="14" rx="3" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="330" y="436" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">Envoy Sidecar Proxy</text>
  <rect x="530" y="425" width="20" height="14" rx="3" fill="#1a1822"/>
  <text x="560" y="436" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">Control Plane (Istiod)</text>
  <line x1="70" y1="455" x2="90" y2="455" stroke="#0284c7" stroke-width="2"/>
  <text x="100" y="458" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">mTLS Traffic (solid)</text>
  <line x1="300" y1="455" x2="320" y2="455" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="330" y="458" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">Config Distribution (dashed)</text>
</svg>