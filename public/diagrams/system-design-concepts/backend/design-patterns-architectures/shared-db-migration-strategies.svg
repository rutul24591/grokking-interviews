<svg xmlns="http://www.w3.org/2000/svg" width="960" height="580" viewBox="0 0 960 580">
  <defs>
    <linearGradient id="cdcGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbf7d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dualGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="strGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="repGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbcfe8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="#f8fafc" />

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Migration Strategies from Shared Database</text>

  <!-- Starting point -->
  <rect x="340" y="55" width="280" height="45" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
  <text x="480" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Shared Database (Starting Point)</text>

  <!-- Branch arrows -->
  <line x1="400" y1="100" x2="120" y2="140" stroke="#64748b" stroke-width="2" />
  <line x1="440" y1="100" x2="360" y2="140" stroke="#64748b" stroke-width="2" />
  <line x1="520" y1="100" x2="600" y2="140" stroke="#64748b" stroke-width="2" />
  <line x1="560" y1="100" x2="840" y2="140" stroke="#64748b" stroke-width="2" />

  <!-- ===== STRATEGY 1: CDC ===== -->
  <rect x="30" y="140" width="220" height="420" rx="10" fill="url(#cdcGrad)" stroke="#22c55e" stroke-width="2" />
  <text x="140" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#166534">1. Change Data Capture</text>

  <!-- CDC Flow -->
  <rect x="50" y="185" width="180" height="40" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5" />
  <text x="140" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Shared Database</text>

  <line x1="140" y1="225" x2="140" y2="250" stroke="#22c55e" stroke-width="1.5" />
  <text x="148" y="242" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#166534">Read WAL</text>

  <rect x="50" y="250" width="180" height="40" rx="6" fill="#86efac" stroke="#22c55e" stroke-width="1.5" />
  <text x="140" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Debezium / CDC Tool</text>

  <line x1="140" y1="290" x2="140" y2="315" stroke="#22c55e" stroke-width="1.5" />
  <text x="148" y="307" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#166534">Publish Events</text>

  <rect x="50" y="315" width="180" height="40" rx="6" fill="#4ade80" stroke="#22c55e" stroke-width="1.5" />
  <text x="140" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Kafka / Message Broker</text>

  <line x1="140" y1="355" x2="140" y2="380" stroke="#22c55e" stroke-width="1.5" />
  <text x="148" y="372" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#166534">Consume &amp; Build Model</text>

  <rect x="50" y="380" width="180" height="40" rx="6" fill="#22c55e" stroke="#16a34a" stroke-width="1.5" />
  <text x="140" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Local Read Model</text>

  <!-- Properties -->
  <rect x="40" y="440" width="200" height="110" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="55" y="462" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Properties:</text>
  <text x="55" y="482" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#166534">Non-invasive (reads WAL)</text>
  <text x="55" y="500" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#166534">Eventual consistency</text>
  <text x="55" y="518" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#166534">Moderate ops complexity</text>
  <text x="55" y="536" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#166534">Provides audit trail</text>

  <!-- ===== STRATEGY 2: DUAL-WRITE ===== -->
  <rect x="270" y="140" width="220" height="420" rx="10" fill="url(#dualGrad)" stroke="#f59e0b" stroke-width="2" />
  <text x="380" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#92400e">2. Dual-Write</text>

  <rect x="290" y="185" width="180" height="40" rx="6" fill="#fde68a" stroke="#d97706" stroke-width="1.5" />
  <text x="380" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Owning Service</text>

  <!-- Two arrows -->
  <line x1="340" y1="225" x2="320" y2="260" stroke="#d97706" stroke-width="1.5" />
  <line x1="420" y1="225" x2="440" y2="260" stroke="#d97706" stroke-width="1.5" />
  <text x="310" y="248" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#92400e">Write</text>
  <text x="430" y="248" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#92400e">Write</text>

  <rect x="290" y="260" width="85" height="40" rx="6" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" />
  <text x="332" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#78350f">Old Store</text>

  <rect x="395" y="260" width="85" height="40" rx="6" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" />
  <text x="437" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#78350f">New Store</text>

  <!-- Reconciliation -->
  <line x1="332" y1="300" x2="332" y2="330" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" />
  <line x1="437" y1="300" x2="437" y2="330" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" />

  <rect x="310" y="330" width="140" height="40" rx="6" fill="#f59e0b" stroke="#d97706" stroke-width="1.5" />
  <text x="380" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#78350f">Reconciliation Job</text>

  <!-- Migration arrow -->
  <line x1="380" y1="370" x2="380" y2="400" stroke="#d97706" stroke-width="1.5" />
  <text x="388" y="390" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#92400e">Migrate consumers</text>

  <rect x="290" y="400" width="180" height="40" rx="6" fill="#f59e0b" stroke="#d97706" stroke-width="1.5" />
  <text x="380" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#78350f">New Store Only</text>

  <!-- Properties -->
  <rect x="280" y="460" width="200" height="90" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" />
  <text x="295" y="482" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Properties:</text>
  <text x="295" y="502" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#92400e">Simple to implement</text>
  <text x="295" y="520" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#92400e">Inconsistency risk</text>
  <text x="295" y="538" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#92400e">Needs compensating txns</text>

  <!-- ===== STRATEGY 3: STRANGLER FIG ===== -->
  <rect x="510" y="140" width="220" height="420" rx="10" fill="url(#strGrad)" stroke="#6366f1" stroke-width="2" />
  <text x="620" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#3730a3">3. Strangler Fig Pattern</text>

  <!-- Facade -->
  <rect x="530" y="185" width="180" height="40" rx="6" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5" />
  <text x="620" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3730a3">Routing Facade / Proxy</text>

  <!-- Two paths -->
  <line x1="570" y1="225" x2="550" y2="265" stroke="#6366f1" stroke-width="1.5" />
  <line x1="670" y1="225" x2="690" y2="265" stroke="#6366f1" stroke-width="1.5" />
  <text x="540" y="250" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#3730a3">Legacy</text>
  <text x="680" y="250" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#3730a3">New Svc</text>

  <rect x="530" y="265" width="85" height="40" rx="6" fill="#a5b4fc" stroke="#6366f1" stroke-width="1" />
  <text x="572" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3730a3">Shared DB</text>
  <text x="572" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="normal" fill="#4f46e5">(fallback)</text>

  <rect x="635" y="265" width="85" height="40" rx="6" fill="#818cf8" stroke="#6366f1" stroke-width="1.5" />
  <text x="677" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">New Svc</text>
  <text x="677" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="normal" fill="#e0e7ff">(primary)</text>

  <!-- New service has its own DB -->
  <line x1="677" y1="305" x2="677" y2="330" stroke="#6366f1" stroke-width="1.5" />
  <rect x="635" y="330" width="85" height="35" rx="6" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5" />
  <text x="677" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">New DB</text>

  <!-- Incremental shift -->
  <rect x="530" y="385" width="180" height="55" rx="8" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1" />
  <text x="620" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3730a3">Incremental Migration:</text>
  <text x="545" y="427" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#3730a3">Step 1: Route reads to new</text>
  <text x="545" y="439" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#3730a3">Step 2: Route writes to new</text>

  <!-- Final state -->
  <line x1="620" y1="440" x2="620" y2="470" stroke="#6366f1" stroke-width="1.5" />
  <rect x="540" y="470" width="160" height="35" rx="6" fill="#4f46e5" stroke="#4338ca" stroke-width="1.5" />
  <text x="620" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">Decommission Shared DB</text>

  <!-- Properties -->
  <rect x="520" y="515" width="200" height="45" rx="8" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1" />
  <text x="535" y="535" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3730a3">Safest: incremental + reversible</text>
  <text x="535" y="552" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#3730a3">+5-10ms proxy latency</text>

  <!-- ===== STRATEGY 4: READ REPLICA ===== -->
  <rect x="750" y="140" width="200" height="420" rx="10" fill="url(#repGrad)" stroke="#ec4899" stroke-width="2" />
  <text x="850" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#9d174d">4. Read Replica</text>

  <rect x="770" y="185" width="160" height="40" rx="6" fill="#fbcfe8" stroke="#ec4899" stroke-width="1.5" />
  <text x="850" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9d174d">Primary Database</text>

  <line x1="850" y1="225" x2="850" y2="260" stroke="#ec4899" stroke-width="1.5" />
  <text x="858" y="247" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#9d174d">Replicate</text>

  <rect x="770" y="260" width="160" height="40" rx="6" fill="#f9a8d4" stroke="#ec4899" stroke-width="1.5" />
  <text x="850" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9d174d">Read Replica</text>

  <rect x="770" y="320" width="160" height="40" rx="6" fill="#f472b6" stroke="#ec4899" stroke-width="1.5" />
  <text x="850" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#831843">Analytics Service</text>

  <line x1="850" y1="300" x2="850" y2="320" stroke="#ec4899" stroke-width="1.5" />
  <text x="858" y="315" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#9d174d">Read-only</text>

  <!-- Properties -->
  <rect x="760" y="380" width="180" height="110" rx="8" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="1" />
  <text x="775" y="402" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9d174d">Properties:</text>
  <text x="775" y="422" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#9d174d">Read-only consumers only</text>
  <text x="775" y="442" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#9d174d">Isolates perf impact</text>
  <text x="775" y="462" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#9d174d">Does not fix write coupling</text>
  <text x="775" y="482" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#9d174d">Good first step</text>

  <!-- Legend -->
  <rect x="760" y="510" width="180" height="40" rx="6" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1" />
  <text x="775" y="527" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#9d174d">Best for: read-heavy</text>
  <text x="775" y="543" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#9d174d">consumers, quick win</text>
</svg>
