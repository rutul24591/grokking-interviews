<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Event flow showing async decoupling and eventual consistency from producer to bus to consumers</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Async Event Flow &amp; Eventual Consistency</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Events flow asynchronously through the broker; consumers reach consistency independently</text>

  <!-- Timeline: T0 -->
  <rect x="30" y="85" width="160" height="45" rx="8" fill="#6d5bd0"/>
  <text x="110" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">T0: Order Created</text>
  <text x="110" y="120" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Producer: Order Service</text>

  <!-- Arrow T0 to Bus -->
  <line x1="190" y1="107" x2="310" y2="107" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA2)"/>
  <text x="250" y="100" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">publish</text>

  <!-- Event Bus -->
  <rect x="310" y="75" width="140" height="65" rx="10" fill="#6d5bd0"/>
  <text x="380" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Event Broker</text>
  <text x="380" y="118" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Kafka Topic: orders</text>
  <text x="380" y="132" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Partition 0, Offset 42</text>

  <!-- Arrows from bus to consumers -->
  <line x1="450" y1="107" x2="540" y2="107" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA2)"/>
  <line x1="450" y1="107" x2="540" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA2)"/>
  <line x1="450" y1="107" x2="540" y2="333" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA2)"/>
  <line x1="450" y1="107" x2="540" y2="430" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA2)"/>

  <!-- Consumer 1: Payment -->
  <rect x="540" y="80" width="160" height="55" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="620" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Payment Service</text>
  <text x="620" y="116" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Process payment</text>
  <text x="620" y="128" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">~50ms latency</text>
  <rect x="560" y="140" width="120" height="20" rx="4" fill="#4caf50" opacity="0.15"/>
  <text x="620" y="154" text-anchor="middle" font-size="8" font-weight="600" fill="#4caf50">T1: Payment Complete</text>

  <!-- Consumer 2: Inventory -->
  <rect x="540" y="195" width="160" height="55" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="620" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Inventory Service</text>
  <text x="620" y="231" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Reserve stock</text>
  <text x="620" y="243" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">~200ms latency</text>
  <rect x="560" y="255" width="120" height="20" rx="4" fill="#f0ad4e" opacity="0.15"/>
  <text x="620" y="269" text-anchor="middle" font-size="8" font-weight="600" fill="#f0ad4e">T2: Stock Reserved</text>

  <!-- Consumer 3: Notification -->
  <rect x="540" y="310" width="160" height="55" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="620" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Notification Service</text>
  <text x="620" y="346" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Send confirmation email</text>
  <text x="620" y="358" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">~500ms latency</text>
  <rect x="560" y="370" width="120" height="20" rx="4" fill="#2196f3" opacity="0.15"/>
  <text x="620" y="384" text-anchor="middle" font-size="8" font-weight="600" fill="#2196f3">T3: Email Sent</text>

  <!-- Consumer 4: Analytics -->
  <rect x="540" y="410" width="160" height="55" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="620" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Analytics Service</text>
  <text x="620" y="446" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Update dashboards</text>
  <text x="620" y="458" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">~2s latency (batch)</text>
  <rect x="560" y="470" width="120" height="20" rx="4" fill="#9c27b0" opacity="0.15"/>
  <text x="620" y="484" text-anchor="middle" font-size="8" font-weight="600" fill="#9c27b0">T4: Dashboard Updated</text>

  <!-- Right side: Eventual consistency explanation -->
  <rect x="720" y="85" width="155" height="190" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="797" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Eventual Consistency</text>

  <text x="735" y="130" font-size="9" fill="#1a1822">T0: Order created</text>
  <text x="735" y="148" font-size="9" fill="#4caf50">T1: Payment processed</text>
  <text x="735" y="166" font-size="9" fill="#f0ad4e">T2: Stock reserved</text>
  <text x="735" y="184" font-size="9" fill="#2196f3">T3: Email sent</text>
  <text x="735" y="202" font-size="9" fill="#9c27b0">T4: Analytics updated</text>

  <rect x="735" y="215" width="125" height="45" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="797" y="233" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1822">All consumers eventually</text>
  <text x="797" y="245" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1822">reach consistent state,</text>
  <text x="797" y="257" text-anchor="middle" font-size="8" fill="#1a1822">each at own pace</text>

  <!-- Key characteristics box -->
  <rect x="720" y="295" width="155" height="180" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="797" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Async Decoupling</text>

  <rect x="735" y="330" width="125" height="30" rx="6" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="797" y="344" text-anchor="middle" font-size="8" fill="#4caf50" font-weight="600">Producer doesn&apos;t wait</text>
  <text x="797" y="356" text-anchor="middle" font-size="8" fill="#4caf50">for consumers</text>

  <rect x="735" y="368" width="125" height="30" rx="6" fill="#2196f3" opacity="0.1" stroke="#2196f3" stroke-width="1"/>
  <text x="797" y="382" text-anchor="middle" font-size="8" fill="#2196f3" font-weight="600">Consumer failure doesn&apos;t</text>
  <text x="797" y="394" text-anchor="middle" font-size="8" fill="#2196f3">affect other consumers</text>

  <rect x="735" y="406" width="125" height="30" rx="6" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="797" y="420" text-anchor="middle" font-size="8" fill="#f0ad4e" font-weight="600">Events persisted in</text>
  <text x="797" y="432" text-anchor="middle" font-size="8" fill="#f0ad4e">broker for replay</text>

  <rect x="735" y="444" width="125" height="22" rx="6" fill="#9c27b0" opacity="0.1" stroke="#9c27b0" stroke-width="1"/>
  <text x="797" y="458" text-anchor="middle" font-size="8" fill="#9c27b0" font-weight="600">Independent scaling</text>

  <defs>
    <marker id="arrowEDA2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>