<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Clean Architecture vs Hexagonal vs Layered Architecture comparison showing structural differences and when to use each</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Clean vs Hexagonal vs Layered</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Three architectural patterns with shared goals but different structural approaches</text>

  <!-- Layered Architecture -->
  <rect x="30" y="80" width="270" height="400" rx="12" fill="none" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="105" width="270" height="10" fill="#6d5bd0"/>
  <text x="165" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Layered Architecture</text>

  <!-- Layers -->
  <rect x="50" y="130" width="230" height="55" rx="6" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1"/>
  <text x="165" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#2563eb">Presentation</text>
  <text x="165" y="170" text-anchor="middle" font-size="8" fill="#64748b">Controllers, views, API endpoints</text>

  <rect x="50" y="195" width="230" height="55" rx="6" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="#4caf50">Business</text>
  <text x="165" y="235" text-anchor="middle" font-size="8" fill="#64748b">Services, domain logic</text>

  <rect x="50" y="260" width="230" height="55" rx="6" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="1"/>
  <text x="165" y="280" text-anchor="middle" font-size="10" font-weight="700" fill="#d97706">Data Access</text>
  <text x="165" y="300" text-anchor="middle" font-size="8" fill="#64748b">Repositories, queries, mappers</text>

  <rect x="50" y="325" width="230" height="55" rx="6" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1"/>
  <text x="165" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">Infrastructure</text>
  <text x="165" y="365" text-anchor="middle" font-size="8" fill="#64748b">Logging, config, external services</text>

  <rect x="45" y="400" width="240" height="65" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="420" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Best for: Simple CRUD, small teams</text>
  <text x="165" y="438" text-anchor="middle" font-size="9" fill="#64748b">Clear structure, easy to understand</text>
  <text x="165" y="456" text-anchor="middle" font-size="9" fill="#64748b">Risk: tight coupling to frameworks</text>

  <!-- Hexagonal Architecture -->
  <rect x="315" y="80" width="270" height="400" rx="12" fill="none" stroke="#d97706" stroke-width="2"/>
  <rect x="315" y="80" width="270" height="35" rx="12" fill="#d97706"/>
  <rect x="315" y="105" width="270" height="10" fill="#d97706"/>
  <text x="450" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Hexagonal (Ports &amp; Adapters)</text>

  <!-- Hexagon core -->
  <polygon points="450,140 530,190 530,280 450,330 370,280 370,190" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Domain</text>
  <text x="450" y="245" text-anchor="middle" font-size="10" fill="#1a1822">Entities + Use Cases</text>
  <text x="450" y="263" text-anchor="middle" font-size="9" fill="#64748b">Pure business logic</text>
  <text x="450" y="281" text-anchor="middle" font-size="9" fill="#64748b">No external dependencies</text>

  <!-- Adapters around -->
  <rect x="330" y="130" width="80" height="35" rx="5" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1"/>
  <text x="370" y="152" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">REST API</text>

  <rect x="410" y="340" width="80" height="35" rx="5" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="362" text-anchor="middle" font-size="8" font-weight="600" fill="#4caf50">DB Adapter</text>

  <rect x="510" y="130" width="60" height="35" rx="5" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1"/>
  <text x="540" y="152" text-anchor="middle" font-size="8" font-weight="600" fill="#dc2626">Queue</text>

  <!-- Connection lines -->
  <line x1="390" y1="165" x2="390" y2="190" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="450" y1="330" x2="450" y2="340" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="510" y1="165" x2="510" y2="190" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>

  <rect x="330" y="400" width="240" height="65" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Best for: Multiple input/output channels</text>
  <text x="450" y="438" text-anchor="middle" font-size="9" fill="#64748b">Domain is king, adapters are plugins</text>
  <text x="450" y="456" text-anchor="middle" font-size="9" fill="#64748b">Risk: over-engineering for simple apps</text>

  <!-- Clean Architecture -->
  <rect x="600" y="80" width="270" height="400" rx="12" fill="none" stroke="#4caf50" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="35" rx="12" fill="#4caf50"/>
  <rect x="600" y="105" width="270" height="10" fill="#4caf50"/>
  <text x="735" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Clean Architecture</text>

  <!-- Concentric circles -->
  <rect x="620" y="130" width="230" height="250" rx="12" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="1.5"/>
  <text x="735" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#2563eb">Frameworks &amp; Drivers</text>

  <rect x="640" y="160" width="190" height="210" rx="10" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="1.5"/>
  <text x="735" y="180" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">Interface Adapters</text>

  <rect x="660" y="190" width="150" height="170" rx="8" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1.5"/>
  <text x="735" y="210" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Use Cases</text>

  <rect x="680" y="220" width="110" height="110" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <text x="735" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Entities</text>
  <text x="735" y="290" text-anchor="middle" font-size="8" fill="#64748b">Business rules</text>

  <!-- Dependency arrows pointing inward -->
  <line x1="650" y1="275" x2="675" y2="275" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrCA3)"/>
  <line x1="690" y1="275" x2="715" y2="275" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrCA3)"/>

  <rect x="615" y="400" width="240" height="65" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="735" y="420" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Best for: Large, long-lived systems</text>
  <text x="735" y="438" text-anchor="middle" font-size="9" fill="#64748b">Strict dependency rule, maximum testability</text>
  <text x="735" y="456" text-anchor="middle" font-size="9" fill="#64748b">Risk: ceremony overhead for small apps</text>

  <defs>
    <marker id="arrCA3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
