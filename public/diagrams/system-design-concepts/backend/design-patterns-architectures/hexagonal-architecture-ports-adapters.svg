<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-accent" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="#f8fafc" rx="8"/>
  <rect width="960" height="520" fill="#f8fafc" rx="8" class="dark:fill-slate-900"/>

  <!-- Title -->
  <text x="480" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Ports &amp; Adapters Architecture</text>
  <text x="480" y="65" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Domain core isolated from external dependencies via port contracts</text>

  <!-- Outer hexagon shape (decorative boundary) -->
  <polygon points="480,95 820,200 820,400 480,505 140,400 140,200" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>

  <!-- Domain Core (center hexagon) -->
  <polygon points="480,170 620,230 620,350 480,410 340,350 340,230" fill="#eff6ff" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="480" y="275" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af" text-anchor="middle">Domain Core</text>
  <text x="480" y="300" font-family="Arial, sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">Entities + Value Objects</text>
  <text x="480" y="320" font-family="Arial, sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">Use Cases + Business Rules</text>
  <text x="480" y="340" font-family="Arial, sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">Port Interfaces</text>

  <!-- Inbound/Driving Adapters (left side) -->
  <rect x="60" y="140" width="160" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="165" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">REST Controller</text>
  <text x="140" y="185" font-family="Arial, sans-serif" font-size="11" fill="#166534" text-anchor="middle">HTTP / gRPC</text>

  <rect x="60" y="220" width="160" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="245" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">Message Consumer</text>
  <text x="140" y="265" font-family="Arial, sans-serif" font-size="11" fill="#166534" text-anchor="middle">Kafka / RabbitMQ</text>

  <rect x="60" y="300" width="160" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="325" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">CLI / Scheduler</text>
  <text x="140" y="345" font-family="Arial, sans-serif" font-size="11" fill="#166534" text-anchor="middle">Cron / Admin Tools</text>

  <!-- Inbound label -->
  <text x="140" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Inbound (Driving)</text>
  <text x="140" y="138" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Adapters</text>

  <!-- Outbound/Driven Adapters (right side) -->
  <rect x="740" y="140" width="160" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="820" y="165" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">Database Adapter</text>
  <text x="820" y="185" font-family="Arial, sans-serif" font-size="11" fill="#92400e" text-anchor="middle">PostgreSQL / MongoDB</text>

  <rect x="740" y="220" width="160" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="820" y="245" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">External Service</text>
  <text x="820" y="265" font-family="Arial, sans-serif" font-size="11" fill="#92400e" text-anchor="middle">Payment / Email API</text>

  <rect x="740" y="300" width="160" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="820" y="325" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">Cache / Queue</text>
  <text x="820" y="345" font-family="Arial, sans-serif" font-size="11" fill="#92400e" text-anchor="middle">Redis / SQS</text>

  <!-- Outbound label -->
  <text x="820" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e" text-anchor="middle">Outbound (Driven)</text>
  <text x="820" y="138" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Adapters</text>

  <!-- Arrows: Inbound to Core -->
  <line x1="220" y1="170" x2="340" y2="240" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-accent)"/>
  <line x1="220" y1="250" x2="340" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-accent)"/>
  <line x1="220" y1="330" x2="340" y2="320" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-accent)"/>

  <!-- Arrows: Core to Outbound -->
  <line x1="620" y1="240" x2="740" y2="170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="280" x2="740" y2="250" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="320" x2="740" y2="330" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Port labels on boundary -->
  <rect x="290" y="210" width="50" height="24" rx="4" fill="#3b82f6"/>
  <text x="315" y="227" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Port</text>

  <rect x="620" y="260" width="50" height="24" rx="4" fill="#3b82f6"/>
  <text x="645" y="277" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">Port</text>

  <!-- Legend -->
  <rect x="340" y="445" width="280" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="355" y="458" width="14" height="14" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="378" y="470" font-family="Arial, sans-serif" font-size="12" fill="#475569">= Inbound (Driving) Adapters</text>
  <rect x="355" y="480" width="14" height="14" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="378" y="492" font-family="Arial, sans-serif" font-size="12" fill="#475569">= Outbound (Driven) Adapters</text>
  <polygon points="560,465 574,472 560,479" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="582" y="477" font-family="Arial, sans-serif" font-size="12" fill="#475569">= Domain Core (no deps)</text>
</svg>
