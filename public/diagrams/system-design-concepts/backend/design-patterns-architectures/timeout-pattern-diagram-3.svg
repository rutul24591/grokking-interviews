<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Timeout vs Retry Interaction</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="52" rx="12" fill="#1a1822"/>
  <rect x="0" y="40" width="900" height="12" fill="#1a1822"/>
  <text x="30" y="33" font-size="18" font-weight="700" fill="#ffffff">Timeout vs Retry Interaction</text>
  <text x="30" y="75" font-size="12" fill="#1a1822" opacity="0.7">Understanding when to retry after a timeout versus when to fail fast and propagate the error</text>
  
  <!-- Decision tree header -->
  <text x="450" y="110" font-size="14" font-weight="700" fill="#1a1822" text-anchor="middle">Retry Decision Flow</text>
  <path d="M 350 118 L 550 118" stroke="#1a1822" stroke-width="1" opacity="0.3"/>
  
  <!-- Initial request -->
  <rect x="370" y="135" width="160" height="45" rx="8" fill="#e8e5f0" stroke="#7c6a96" stroke-width="2"/>
  <text x="450" y="162" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Make Request</text>
  
  <!-- Arrow down -->
  <path d="M 450 185 L 450 210" stroke="#1a1822" stroke-width="2" fill="none" marker-end="url(#arrowBlack)"/>
  
  <!-- Timeout check -->
  <polygon points="450,215 540,245 450,275 360,245" fill="#fff8e1" stroke="#f0a030" stroke-width="2"/>
  <text x="450" y="242" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Timed out?</text>
  
  <!-- NO branch (success) -->
  <path d="M 545 245 L 620 245 L 620 340 L 680 340" stroke="#4a9c5d" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="580" y="235" font-size="11" font-weight="700" fill="#4a9c5d">No</text>
  
  <rect x="685" y="315" width="170" height="50" rx="6" fill="#e8f5ec" stroke="#4a9c5d" stroke-width="2"/>
  <text x="770" y="337" font-size="11" font-weight="700" fill="#4a9c5d" text-anchor="middle">&#x2713; Return response</text>
  <text x="770" y="352" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">(No retry needed)</text>
  
  <!-- YES branch -->
  <path d="M 450 275 L 450 310" stroke="#c45c5c" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text x="465" y="295" font-size="11" font-weight="700" fill="#c45c5c">Yes</text>
  
  <!-- Is it retryable? -->
  <polygon points="450,315 550,345 450,375 350,345" fill="#fff8e1" stroke="#f0a030" stroke-width="2"/>
  <text x="450" y="342" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Retryable</text>
  <text x="450" y="356" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">error type?</text>
  
  <!-- NOT retryable -->
  <path d="M 350 345 L 260 345 L 260 440 L 140 440" stroke="#c45c5c" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text x="300" y="335" font-size="11" font-weight="700" fill="#c45c5c">No</text>
  
  <rect x="30" y="415" width="105" height="50" rx="6" fill="#f0e8e8" stroke="#c45c5c" stroke-width="2"/>
  <text x="82" y="437" font-size="10" font-weight="700" fill="#c45c5c" text-anchor="middle">Fail fast</text>
  <text x="82" y="452" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">Propagate error</text>
  
  <!-- Retryable: check budget -->
  <path d="M 450 375 L 450 400" stroke="#4a9c5d" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="465" y="390" font-size="11" font-weight="700" fill="#4a9c5d">Yes</text>
  
  <polygon points="450,405 550,435 450,465 350,435" fill="#fff8e1" stroke="#f0a030" stroke-width="2"/>
  <text x="450" y="432" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Retry budget</text>
  <text x="450" y="446" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">remaining?</text>
  
  <!-- Budget exhausted -->
  <path d="M 350 435 L 260 435 L 260 465" stroke="#c45c5c" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text x="290" y="425" font-size="10" font-weight="700" fill="#c45c5c">No</text>
  
  <rect x="170" y="465" width="95" height="30" rx="4" fill="#f0e8e8" stroke="#c45c5c" stroke-width="1"/>
  <text x="217" y="484" font-size="9" font-weight="600" fill="#c45c5c" text-anchor="middle">Circuit open</text>
  
  <!-- Retry -->
  <path d="M 555 435 L 650 435 L 650 245 L 680 245" stroke="#4a9c5d" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="610" y="425" font-size="10" font-weight="700" fill="#4a9c5d">Yes - Retry with backoff</text>
  
  <!-- Retry strategy box -->
  <rect x="580" y="130" width="280" height="155" rx="8" fill="#e8f5ec" stroke="#4a9c5d" stroke-width="1.5"/>
  <rect x="580" y="130" width="280" height="28" rx="8" fill="#4a9c5d"/>
  <rect x="580" y="144" width="280" height="14" fill="#4a9c5d"/>
  <text x="720" y="149" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Retry with Exponential Backoff</text>
  
  <text x="595" y="180" font-size="10" fill="#1a1822" opacity="0.85">Attempt 1: wait 100ms</text>
  <text x="595" y="200" font-size="10" fill="#1a1822" opacity="0.85">Attempt 2: wait 200ms</text>
  <text x="595" y="220" font-size="10" fill="#1a1822" opacity="0.85">Attempt 3: wait 400ms</text>
  <text x="595" y="240" font-size="10" fill="#1a1822" opacity="0.85">Attempt 4: wait 800ms</text>
  <text x="595" y="260" font-size="10" fill="#1a1822" opacity="0.85">Max attempts: 3-5</text>
  <text x="595" y="275" font-size="9" fill="#c45c5c" font-weight="600">Add jitter to prevent thundering herd</text>
  
  <!-- Key insights -->
  <rect x="30" y="130" width="280" height="180" rx="8" fill="#fff8e1" stroke="#f0a030" stroke-width="1.5"/>
  <text x="50" y="155" font-size="12" font-weight="700" fill="#1a1822">When to Retry:</text>
  <text x="50" y="180" font-size="10" fill="#1a1822" opacity="0.85">&#x2022; Transient failures (network blips)</text>
  <text x="50" y="200" font-size="10" fill="#1a1822" opacity="0.85">&#x2022; Timeout errors (service might recover)</text>
  <text x="50" y="220" font-size="10" fill="#1a1822" opacity="0.85">&#x2022; 503 Service Unavailable</text>
  <text x="50" y="240" font-size="10" fill="#1a1822" opacity="0.85">&#x2022; Rate limit responses (after backoff)</text>
  <text x="50" y="265" font-size="12" font-weight="700" fill="#1a1822">When NOT to Retry:</text>
  <text x="50" y="290" font-size="10" fill="#1a1822" opacity="0.85">&#x2022; 4xx client errors (bad request)</text>
  <text x="50" y="310" font-size="10" fill="#1a1822" opacity="0.85">&#x2022; Authentication/authorization failures</text>
  <text x="50" y="330" font-size="10" fill="#1a1822" opacity="0.85">&#x2022; Idempotency violations</text>
  <text x="50" y="350" font-size="10" fill="#1a1822" opacity="0.85">&#x2022; When retry budget exhausted</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlack" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1822"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9c5d"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c45c5c"/>
    </marker>
  </defs>
</svg>