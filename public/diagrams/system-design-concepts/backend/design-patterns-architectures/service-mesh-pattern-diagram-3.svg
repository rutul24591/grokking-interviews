<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <title>Service Mesh vs API Gateway vs No Mesh - Traffic Management Layers Comparison</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Traffic Management: Service Mesh vs API Gateway vs No Mesh</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Comparison of different approaches to service-to-service communication</text>

  <!-- No Mesh Column -->
  <rect x="30" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="40" rx="10" fill="#ef4444"/>
  <text x="165" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">No Mesh</text>

  <!-- No Mesh services -->
  <rect x="50" y="140" width="100" height="45" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="100" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">Service A</text>
  <rect x="180" y="140" width="100" height="45" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="230" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">Service B</text>

  <rect x="50" y="210" width="100" height="45" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="100" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">Service C</text>
  <rect x="180" y="210" width="100" height="45" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="230" y="236" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">Service D</text>

  <!-- Messy connections -->
  <line x1="150" y1="162" x2="180" y2="162" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="185" x2="100" y2="210" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="230" y1="185" x2="230" y2="210" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="150" y1="162" x2="230" y2="210" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="232" x2="180" y2="232" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>

  <text x="165" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">Issues:</text>
  <text x="165" y="310" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Hardcoded retries in code</text>
  <text x="165" y="328" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">No mutual TLS</text>
  <text x="165" y="346" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Scattered observability</text>
  <text x="165" y="364" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Manual load balancing</text>
  <text x="165" y="382" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Limited traffic control</text>

  <rect x="50" y="400" width="230" height="40" rx="6" fill="#f3f1f8"/>
  <text x="165" y="415" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Best for: Simple apps, 2-3 services</text>
  <text x="165" y="430" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Low overhead, fast setup</text>

  <!-- API Gateway Column -->
  <rect x="315" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="315" y="80" width="270" height="40" rx="10" fill="#f59e0b"/>
  <text x="450" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">API Gateway</text>

  <!-- Gateway -->
  <rect x="360" y="140" width="180" height="50" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f" font-family="system-ui, sans-serif">API Gateway</text>
  <text x="450" y="178" text-anchor="middle" font-size="9" fill="#78350f" opacity="0.7" font-family="system-ui, sans-serif">Auth, Rate Limit, Routing</text>

  <!-- Services below -->
  <rect x="335" y="220" width="100" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="385" y="246" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f" font-family="system-ui, sans-serif">Service A</text>
  <rect x="465" y="220" width="100" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="515" y="246" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f" font-family="system-ui, sans-serif">Service B</text>

  <rect x="335" y="290" width="100" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="385" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f" font-family="system-ui, sans-serif">Service C</text>
  <rect x="465" y="290" width="100" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="515" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f" font-family="system-ui, sans-serif">Service D</text>

  <!-- Gateway to services -->
  <line x1="450" y1="190" x2="385" y2="220" stroke="#d97706" stroke-width="1.5"/>
  <line x1="450" y1="190" x2="515" y2="220" stroke="#d97706" stroke-width="1.5"/>
  <line x1="450" y1="190" x2="385" y2="290" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="450" y1="190" x2="515" y2="290" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,2"/>

  <text x="450" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e" font-family="system-ui, sans-serif">North-South traffic control</text>
  <text x="450" y="383" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">No east-west (service-to-service)</text>
  <text x="450" y="401" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">No automatic retries</text>

  <rect x="335" y="415" width="230" height="30" rx="6" fill="#f3f1f8"/>
  <text x="450" y="435" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Best for: External API management, single entry point</text>

  <!-- Service Mesh Column -->
  <rect x="600" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="40" rx="10" fill="#059669"/>
  <text x="735" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Service Mesh</text>

  <!-- Services with sidecars -->
  <rect x="620" y="140" width="110" height="50" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="675" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Service A</text>
  <text x="675" y="178" text-anchor="middle" font-size="9" fill="#166534" opacity="0.7" font-family="system-ui, sans-serif">+ Sidecar</text>
  <rect x="760" y="140" width="110" height="50" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="815" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Service B</text>
  <text x="815" y="178" text-anchor="middle" font-size="9" fill="#166534" opacity="0.7" font-family="system-ui, sans-serif">+ Sidecar</text>

  <rect x="620" y="220" width="110" height="50" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="675" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Service C</text>
  <text x="675" y="258" text-anchor="middle" font-size="9" fill="#166534" opacity="0.7" font-family="system-ui, sans-serif">+ Sidecar</text>
  <rect x="760" y="220" width="110" height="50" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="815" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Service D</text>
  <text x="815" y="258" text-anchor="middle" font-size="9" fill="#166534" opacity="0.7" font-family="system-ui, sans-serif">+ Sidecar</text>

  <!-- Full mesh connections -->
  <line x1="730" y1="165" x2="760" y2="165" stroke="#059669" stroke-width="1.5"/>
  <line x1="675" y1="190" x2="675" y2="220" stroke="#059669" stroke-width="1.5"/>
  <line x1="815" y1="190" x2="815" y2="220" stroke="#059669" stroke-width="1.5"/>
  <line x1="730" y1="190" x2="730" y2="220" stroke="#059669" stroke-width="1.5"/>
  <line x1="730" y1="245" x2="730" y2="295" stroke="#059669" stroke-width="2"/>

  <!-- Features -->
  <text x="735" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#166534" font-family="system-ui, sans-serif">Full Feature Set:</text>
  <text x="735" y="320" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">mTLS, retries, circuit breaking</text>
  <text x="735" y="338" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Traffic splitting, canary deploys</text>
  <text x="735" y="356" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Distributed tracing, metrics</text>
  <text x="735" y="374" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Service discovery, load balancing</text>

  <rect x="620" y="395" width="230" height="50" rx="6" fill="#f3f1f8"/>
  <text x="735" y="415" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Best for: Microservices at scale</text>
  <text x="735" y="430" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Both N-S and E-W traffic</text>
</svg>