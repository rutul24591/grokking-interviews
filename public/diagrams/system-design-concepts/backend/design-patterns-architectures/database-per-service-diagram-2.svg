<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Cross-service data access patterns comparing API composition, CQRS, and event-driven approaches</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Cross-Service Data Access Patterns</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Three strategies to query data owned by multiple services without direct DB access</text>

  <!-- Pattern 1: API Composition -->
  <rect x="30" y="80" width="270" height="400" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="103" width="270" height="12" fill="#6d5bd0"/>
  <text x="165" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">API Composition</text>

  <!-- API Gateway -->
  <rect x="50" y="125" width="230" height="40" rx="8" fill="#6d5bd0"/>
  <text x="165" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">API Gateway / BFF</text>

  <line x1="165" y1="165" x2="100" y2="195" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowAP)"/>
  <line x1="165" y1="165" x2="230" y2="195" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowAP)"/>

  <!-- Order Service -->
  <rect x="50" y="200" width="110" height="45" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="105" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Order Svc</text>
  <text x="105" y="235" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">GET /orders/:id</text>

  <!-- Shipping Service -->
  <rect x="170" y="200" width="110" height="45" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="225" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Shipping Svc</text>
  <text x="225" y="235" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">GET /shipments/:id</text>

  <!-- Compose result -->
  <line x1="105" y1="245" x2="165" y2="275" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="225" y1="245" x2="165" y2="275" stroke="#6d5bd0" stroke-width="1.5"/>

  <rect x="60" y="280" width="210" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="165" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Compose Results</text>
  <text x="165" y="318" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Order + Shipping merged response</text>

  <!-- Pros/Cons -->
  <rect x="50" y="350" width="230" height="55" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Simple, synchronous</text>
  <text x="165" y="386" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">N+1 latency, partial failures</text>
  <text x="165" y="400" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">circuit breakers recommended</text>

  <rect x="50" y="415" width="230" height="50" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="165" y="435" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Latency = sum of all calls</text>
  <text x="165" y="453" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">No single consistency guarantee</text>

  <!-- Pattern 2: CQRS -->
  <rect x="315" y="80" width="270" height="400" rx="12" fill="#ffffff" stroke="#2a9d8f" stroke-width="2"/>
  <rect x="315" y="80" width="270" height="35" rx="12" fill="#2a9d8f"/>
  <rect x="315" y="103" width="270" height="12" fill="#2a9d8f"/>
  <text x="450" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CQRS + Materialized View</text>

  <!-- Write side -->
  <rect x="335" y="125" width="230" height="40" rx="8" fill="#2a9d8f" opacity="0.12" stroke="#2a9d8f" stroke-width="2"/>
  <text x="450" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Write: Commands &#8594; Services</text>

  <!-- Events -->
  <rect x="335" y="180" width="230" height="35" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="450" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Domain Events Stream</text>

  <!-- Materialized view builder -->
  <line x1="450" y1="215" x2="450" y2="235" stroke="#2a9d8f" stroke-width="1.5" marker-end="url(#arrowAP)"/>
  <rect x="345" y="240" width="210" height="45" rx="8" fill="#2a9d8f"/>
  <text x="450" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">View Builder / Projector</text>
  <text x="450" y="276" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Denormalizes from multiple sources</text>

  <!-- Read view -->
  <line x1="450" y1="285" x2="450" y2="305" stroke="#2a9d8f" stroke-width="1.5" marker-end="url(#arrowAP)"/>
  <rect x="355" y="310" width="190" height="45" rx="8" fill="#2a9d8f" opacity="0.12" stroke="#2a9d8f" stroke-width="2"/>
  <text x="450" y="330" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Materialized View (Read DB)</text>
  <text x="450" y="346" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Elasticsearch / MongoDB</text>

  <!-- Pros/Cons -->
  <rect x="335" y="370" width="230" height="55" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="390" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Fast reads, query-optimized</text>
  <text x="450" y="406" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Single query for complex joins</text>
  <text x="450" y="420" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Eventual consistency on reads</text>

  <rect x="335" y="435" width="230" height="35" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="450" y="457" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Eventual consistency lag</text>

  <!-- Pattern 3: Event-Driven -->
  <rect x="600" y="80" width="270" height="400" rx="12" fill="#ffffff" stroke="#e76f51" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="35" rx="12" fill="#e76f51"/>
  <rect x="600" y="103" width="270" height="12" fill="#e76f51"/>
  <text x="735" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Event-Driven Replication</text>

  <!-- Publisher service -->
  <rect x="620" y="125" width="230" height="45" rx="8" fill="#e76f51" opacity="0.12" stroke="#e76f51" stroke-width="2"/>
  <text x="735" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Order Svc publishes OrderCreated</text>
  <text x="735" y="162" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Owns Order DB, emits events</text>

  <!-- Event bus -->
  <line x1="735" y1="170" x2="735" y2="190" stroke="#e76f51" stroke-width="2" marker-end="url(#arrowAP)"/>
  <rect x="630" y="195" width="210" height="40" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="735" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Event Bus (Kafka / RabbitMQ)</text>

  <!-- Subscribers -->
  <line x1="680" y1="235" x2="660" y2="265" stroke="#e76f51" stroke-width="1.5" marker-end="url(#arrowAP)"/>
  <line x1="790" y1="235" x2="810" y2="265" stroke="#e76f51" stroke-width="1.5" marker-end="url(#arrowAP)"/>

  <rect x="610" y="270" width="120" height="50" rx="8" fill="#e76f51" opacity="0.12" stroke="#e76f51" stroke-width="2"/>
  <text x="670" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Shipping Svc</text>
  <text x="670" y="308" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Local copy of order ref</text>

  <rect x="750" y="270" width="120" height="50" rx="8" fill="#e76f51" opacity="0.12" stroke="#e76f51" stroke-width="2"/>
  <text x="810" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Billing Svc</text>
  <text x="810" y="308" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Local copy for invoicing</text>

  <!-- Local DBs -->
  <rect x="615" y="340" width="110" height="30" rx="6" fill="#e76f51" opacity="0.2" stroke="#e76f51" stroke-width="1.5"/>
  <text x="670" y="360" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Shipping DB</text>

  <rect x="755" y="340" width="110" height="30" rx="6" fill="#e76f51" opacity="0.2" stroke="#e76f51" stroke-width="1.5"/>
  <text x="810" y="360" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Billing DB</text>

  <!-- Pros/Cons -->
  <rect x="620" y="385" width="230" height="55" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="735" y="405" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Loose coupling, async, scalable</text>
  <text x="735" y="421" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Each service owns its read model</text>
  <text x="735" y="435" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Idempotency handling needed</text>

  <rect x="620" y="450" width="230" height="20" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="735" y="464" text-anchor="middle" font-size="9" fill="#cc4444" font-weight="600">Eventual consistency, event schema evolves</text>

  <defs>
    <marker id="arrowAP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>