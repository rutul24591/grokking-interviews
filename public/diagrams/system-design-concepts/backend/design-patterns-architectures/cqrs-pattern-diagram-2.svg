<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>CQRS with Event Sourcing integration showing commands creating events, events building read models, and event store as the source of truth</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">CQRS with Event Sourcing</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Events are the source of truth; read models are built by replaying events</text>

  <!-- Command processing -->
  <rect x="50" y="80" width="200" height="60" rx="10" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="150" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Command</text>
  <text x="150" y="125" text-anchor="middle" font-size="9" fill="#64748b">PlaceOrder {customerId: 42, items: [...]}</text>

  <line x1="250" y1="110" x2="310" y2="110" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrCQRS2)"/>

  <!-- Aggregate -->
  <rect x="310" y="80" width="180" height="60" rx="10" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">Aggregate</text>
  <text x="400" y="125" text-anchor="middle" font-size="9" fill="#64748b">validates, produces events</text>

  <line x1="400" y1="140" x2="400" y2="180" stroke="#4caf50" stroke-width="2" marker-end="url(#arrCQRS2)"/>

  <!-- Event Store -->
  <rect x="300" y="180" width="200" height="120" rx="10" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">Event Store</text>
  <text x="400" y="225" text-anchor="middle" font-size="9" fill="#1a1822">append-only log</text>
  <text x="320" y="250" font-size="8" fill="#64748b">Event #1: OrderCreated {id: 101}</text>
  <text x="320" y="268" font-size="8" fill="#64748b">Event #2: ItemAdded {item: "Widget"}</text>
  <text x="320" y="286" font-size="8" fill="#64748b">Event #3: PaymentProcessed {amt: $50}</text>

  <!-- Event subscribers -->
  <line x1="500" y1="240" x2="560" y2="240" stroke="#d97706" stroke-width="2" marker-end="url(#arrCQRS2)"/>

  <!-- Read Model 1 -->
  <rect x="560" y="180" width="150" height="70" rx="8" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="1.5"/>
  <text x="635" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">Order Summary View</text>
  <text x="635" y="225" text-anchor="middle" font-size="8" fill="#1a1822">orderId, customer, total</text>
  <text x="635" y="240" text-anchor="middle" font-size="8" fill="#64748b">(flat, denormalized)</text>

  <!-- Read Model 2 -->
  <rect x="560" y="270" width="150" height="70" rx="8" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="1.5"/>
  <text x="635" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">Customer History View</text>
  <text x="635" y="315" text-anchor="middle" font-size="8" fill="#1a1822">all orders for customerId</text>
  <text x="635" y="330" text-anchor="middle" font-size="8" fill="#64748b">(materialized projection)</text>

  <!-- Read Model 3 -->
  <rect x="560" y="360" width="150" height="70" rx="8" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="1.5"/>
  <text x="635" y="385" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">Analytics View</text>
  <text x="635" y="405" text-anchor="middle" font-size="8" fill="#1a1822">revenue trends, counts</text>
  <text x="635" y="420" text-anchor="middle" font-size="8" fill="#64748b">(aggregated projection)</text>

  <!-- Event subscription lines -->
  <line x1="500" y1="240" x2="555" y2="215" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrCQRS2)"/>
  <line x1="500" y1="240" x2="555" y2="305" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrCQRS2)"/>
  <line x1="500" y1="240" x2="555" y2="395" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrCQRS2)"/>

  <!-- Query path -->
  <rect x="740" y="250" width="130" height="80" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="805" y="275" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Query API</text>
  <text x="805" y="295" text-anchor="middle" font-size="8" fill="#64748b">GET /orders/101</text>
  <text x="805" y="310" text-anchor="middle" font-size="8" fill="#64748b">fast read from</text>
  <text x="805" y="322" text-anchor="middle" font-size="8" fill="#64748b">materialized view</text>

  <line x1="710" y1="215" x2="735" y2="270" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrCQRS2)"/>

  <!-- Key insight -->
  <rect x="30" y="400" width="500" height="80" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="280" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Event Sourcing + CQRS Benefits:</text>
  <text x="50" y="448" font-size="9" fill="#1a1822">• Complete audit trail: every state change is an event</text>
  <text x="50" y="466" font-size="9" fill="#1a1822">• Multiple read models from same events for different query patterns</text>
  <text x="50" y="484" font-size="9" fill="#1a1822">• Temporal queries: replay events to any point in time</text>

  <defs>
    <marker id="arrCQRS2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
