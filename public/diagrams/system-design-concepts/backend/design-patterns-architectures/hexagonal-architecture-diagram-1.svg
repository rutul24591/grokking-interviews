<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Hexagonal Architecture - Ports and Adapters</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" font-size="18" font-weight="700" fill="#1a1822" text-anchor="middle">Hexagonal Architecture: Ports &amp; Adapters</text>
  <text x="450" y="56" font-size="12" fill="#1a1822" opacity="0.7" text-anchor="middle">Domain core surrounded by inbound (driving) and outbound (driven) adapters</text>

  <!-- Hexagon for Domain Core -->
  <polygon points="450,155 570,225 570,365 450,435 330,365 330,225" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="450" y="280" font-size="16" font-weight="700" fill="#1a1822" text-anchor="middle">Domain Core</text>
  <text x="450" y="300" font-size="11" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Entities &amp; Business Rules</text>
  <text x="450" y="318" font-size="11" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">(Application Services)</text>

  <!-- Inbound / Driving Adapters Header -->
  <rect x="60" y="80" width="200" height="30" rx="4" fill="#059669"/>
  <text x="160" y="100" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Inbound Adapters (Driving)</text>

  <!-- REST Adapter -->
  <rect x="60" y="130" width="200" height="55" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="155" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">REST API</text>
  <text x="160" y="172" font-size="10" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">HTTP Controllers</text>

  <!-- CLI Adapter -->
  <rect x="60" y="205" width="200" height="55" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="230" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">CLI / Console</text>
  <text x="160" y="247" font-size="10" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Command Handlers</text>

  <!-- Message Queue Adapter -->
  <rect x="60" y="280" width="200" height="55" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="305" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">Message Queue</text>
  <text x="160" y="322" font-size="10" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Event Listeners</text>

  <!-- Web UI Adapter -->
  <rect x="60" y="355" width="200" height="55" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="380" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">Web UI / GraphQL</text>
  <text x="160" y="397" font-size="10" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Frontend Requests</text>

  <!-- Outbound / Driven Adapters Header -->
  <rect x="640" y="80" width="200" height="30" rx="4" fill="#dc2626"/>
  <text x="740" y="100" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Outbound Adapters (Driven)</text>

  <!-- Database Adapter -->
  <rect x="640" y="130" width="200" height="55" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="155" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">Database</text>
  <text x="740" y="172" font-size="10" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Persistence Repositories</text>

  <!-- Email Adapter -->
  <rect x="640" y="205" width="200" height="55" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="230" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">Email Service</text>
  <text x="740" y="247" font-size="10" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Notification Providers</text>

  <!-- External API Adapter -->
  <rect x="640" y="280" width="200" height="55" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="305" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">External APIs</text>
  <text x="740" y="322" font-size="10" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Third-party Integrations</text>

  <!-- Cache Adapter -->
  <rect x="640" y="355" width="200" height="55" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="380" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">Cache / Redis</text>
  <text x="740" y="397" font-size="10" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">In-memory Stores</text>

  <!-- Arrows: Inbound to Core -->
  <line x1="265" y1="157" x2="330" y2="225" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="265" y1="232" x2="330" y2="265" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="265" y1="307" x2="330" y2="325" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="265" y1="382" x2="330" y2="355" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Arrows: Core to Outbound -->
  <line x1="570" y1="225" x2="640" y2="157" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="570" y1="265" x2="640" y2="232" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="570" y1="325" x2="640" y2="307" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="570" y1="355" x2="640" y2="382" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Port labels on hexagon edges -->
  <text x="310" y="218" font-size="9" font-weight="400" fill="#059669" text-anchor="end">Input Ports</text>
  <text x="590" y="218" font-size="9" font-weight="400" fill="#dc2626" text-anchor="start">Output Ports</text>
</svg>
