<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <title>Migration from Shared Database to Database-per-Service Using Strangler Fig Pattern</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Migration: Shared DB to Database-per-Service</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Using Strangler Fig Pattern to Gradually Extract Services</text>

  <!-- Stage 1: Current State -->
  <rect x="30" y="85" width="270" height="195" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <rect x="30" y="85" width="270" height="35" rx="10" fill="#ef4444"/>
  <text x="165" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Stage 1: Shared Database</text>

  <rect x="55" y="140" width="80" height="35" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="95" y="162" text-anchor="middle" font-size="10" fill="#991b1b" font-family="system-ui, sans-serif">Svc A</text>
  <rect x="145" y="140" width="80" height="35" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="185" y="162" text-anchor="middle" font-size="10" fill="#991b1b" font-family="system-ui, sans-serif">Svc B</text>
  <rect x="235" y="140" width="40" height="35" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="255" y="162" text-anchor="middle" font-size="10" fill="#991b1b" font-family="system-ui, sans-serif">...</text>

  <line x1="95" y1="175" x2="165" y2="230" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="185" y1="175" x2="165" y2="230" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="255" y1="175" x2="165" y2="230" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="60" y="230" width="210" height="35" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="165" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Single Shared Database</text>

  <text x="165" y="270" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Current State - Tight Coupling</text>

  <!-- Arrow -->
  <line x1="310" y1="182" x2="350" y2="182" stroke="#1a1822" stroke-width="2"/>
  <polygon points="345,178 355,182 345,186" fill="#1a1822"/>

  <!-- Stage 2: Strangling -->
  <rect x="350" y="85" width="270" height="195" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="350" y="85" width="270" height="35" rx="10" fill="#f59e0b"/>
  <text x="485" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Stage 2: Gradual Extraction</text>

  <rect x="375" y="135" width="80" height="35" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="415" y="157" text-anchor="middle" font-size="10" fill="#78350f" font-family="system-ui, sans-serif">Svc A</text>
  <rect x="470" y="135" width="80" height="35" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="510" y="157" text-anchor="middle" font-size="10" fill="#166534" font-family="system-ui, sans-serif">Svc B</text>
  <rect x="565" y="135" width="40" height="35" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="585" y="157" text-anchor="middle" font-size="10" fill="#991b1b" font-family="system-ui, sans-serif">...</text>

  <rect x="455" y="185" width="70" height="30" rx="5" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="490" y="204" text-anchor="middle" font-size="9" fill="#166534" font-family="system-ui, sans-serif">New DB</text>

  <line x1="510" y1="170" x2="510" y2="185" stroke="#059669" stroke-width="1.5"/>
  <line x1="415" y1="170" x2="415" y2="230" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,2"/>

  <rect x="370" y="230" width="230" height="35" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="485" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Shared DB (shrinking)</text>

  <text x="485" y="270" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">In Progress - Dual Writes</text>

  <!-- Arrow -->
  <line x1="630" y1="182" x2="670" y2="182" stroke="#1a1822" stroke-width="2"/>
  <polygon points="665,178 675,182 665,186" fill="#1a1822"/>

  <!-- Stage 3: Target State -->
  <rect x="670" y="85" width="200" height="195" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <rect x="670" y="85" width="200" height="35" rx="10" fill="#059669"/>
  <text x="770" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Stage 3: Decoupled</text>

  <rect x="690" y="140" width="65" height="35" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="722" y="162" text-anchor="middle" font-size="10" fill="#166534" font-family="system-ui, sans-serif">Svc A</text>
  <rect x="765" y="140" width="65" height="35" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="797" y="162" text-anchor="middle" font-size="10" fill="#166534" font-family="system-ui, sans-serif">Svc B</text>
  <rect x="690" y="190" width="65" height="35" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="722" y="212" text-anchor="middle" font-size="10" fill="#166534" font-family="system-ui, sans-serif">Svc C</text>
  <rect x="765" y="190" width="65" height="35" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="797" y="212" text-anchor="middle" font-size="10" fill="#166534" font-family="system-ui, sans-serif">Svc D</text>

  <rect x="690" y="245" width="65" height="25" rx="5" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="722" y="262" text-anchor="middle" font-size="9" fill="#166534" font-family="system-ui, sans-serif">DB A</text>
  <rect x="765" y="245" width="65" height="25" rx="5" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="797" y="262" text-anchor="middle" font-size="9" fill="#166534" font-family="system-ui, sans-serif">DB B</text>

  <line x1="722" y1="175" x2="722" y2="245" stroke="#059669" stroke-width="1.5"/>
  <line x1="797" y1="175" x2="797" y2="245" stroke="#059669" stroke-width="1.5"/>
  <line x1="722" y1="225" x2="722" y2="245" stroke="#059669" stroke-width="1.5"/>
  <line x1="797" y1="225" x2="797" y2="245" stroke="#059669" stroke-width="1.5"/>

  <!-- Migration steps -->
  <rect x="30" y="310" width="840" height="160" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Migration Steps (Strangler Fig Approach)</text>

  <!-- Steps -->
  <rect x="50" y="355" width="150" height="35" rx="6" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="125" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">1. Identify Bounded</text>
  <text x="125" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Context</text>

  <rect x="220" y="355" width="150" height="35" rx="6" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="295" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">2. Dual Write to</text>
  <text x="295" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">New DB</text>

  <rect x="390" y="355" width="150" height="35" rx="6" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="465" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">3. Read from New</text>
  <text x="465" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">DB, Verify</text>

  <rect x="560" y="355" width="150" height="35" rx="6" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="635" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">4. Remove from</text>
  <text x="635" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Shared DB</text>

  <rect x="730" y="355" width="120" height="35" rx="6" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="790" y="370" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">5. Repeat for</text>
  <text x="790" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Next Service</text>

  <!-- Arrows between steps -->
  <line x1="200" y1="372" x2="220" y2="372" stroke="#1a1822" stroke-width="1.5"/>
  <polygon points="217,369 223,369 220,375" fill="#1a1822"/>
  <line x1="370" y1="372" x2="390" y2="372" stroke="#1a1822" stroke-width="1.5"/>
  <polygon points="387,369 393,369 390,375" fill="#1a1822"/>
  <line x1="540" y1="372" x2="560" y2="372" stroke="#1a1822" stroke-width="1.5"/>
  <polygon points="557,369 563,369 560,375" fill="#1a1822"/>
  <line x1="710" y1="372" x2="730" y2="372" stroke="#1a1822" stroke-width="1.5"/>
  <polygon points="727,369 733,369 730,375" fill="#1a1822"/>

  <text x="450" y="420" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Key: Each iteration extracts ONE service and its data, minimizing risk</text>
  <text x="450" y="440" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">CDC (Change Data Capture) or dual-writes ensure data consistency during migration</text>
</svg>