<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Cache invalidation strategies comparison: TTL-based expiration, LRU eviction, and explicit invalidation</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Cache Invalidation Strategies</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Three strategies for keeping cache data fresh: TTL, LRU, and explicit invalidation</text>

  <!-- Column 1: TTL -->
  <rect x="30" y="80" width="270" height="390" rx="12" fill="none" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="35" rx="12" fill="#4caf50"/>
  <rect x="30" y="105" width="270" height="10" fill="#4caf50"/>
  <text x="165" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">TTL-Based Expiration</text>

  <!-- TTL timeline -->
  <rect x="50" y="130" width="230" height="30" rx="6" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="150" text-anchor="middle" font-size="10" fill="#1a1822">T=0: user:42 cached (TTL: 5min)</text>

  <rect x="50" y="170" width="180" height="30" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="140" y="190" text-anchor="middle" font-size="10" fill="#1a1822">T=2min: still valid ✓</text>

  <rect x="50" y="210" width="180" height="30" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="140" y="230" text-anchor="middle" font-size="10" fill="#1a1822">T=4min: still valid ✓</text>

  <rect x="50" y="250" width="230" height="30" rx="6" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="165" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">T=5min: EXPIRED — evicted ✗</text>

  <rect x="50" y="290" width="230" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="310" text-anchor="middle" font-size="10" fill="#1a1822">Next read: cache miss → reload from DB</text>

  <!-- TTL pros/cons -->
  <rect x="45" y="340" width="240" height="60" rx="6" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="165" y="360" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Simple, automatic, no coordination needed</text>
  <text x="165" y="378" text-anchor="middle" font-size="9" fill="#64748b">Good for data that changes infrequently</text>

  <rect x="45" y="410" width="240" height="45" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="165" y="430" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">✗ Stale data between TTL and expiry</text>
  <text x="165" y="448" text-anchor="middle" font-size="9" fill="#64748b">Cannot react to writes immediately</text>

  <!-- Column 2: LRU -->
  <rect x="315" y="80" width="270" height="390" rx="12" fill="none" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="315" y="80" width="270" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="315" y="105" width="270" height="10" fill="#6d5bd0"/>
  <text x="450" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">LRU Eviction</text>

  <!-- LRU cache with recency order -->
  <rect x="335" y="130" width="230" height="30" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="#1a1822">MRU ← user:42 | product:15 | session:abc → LRU</text>

  <!-- New access moves to MRU -->
  <rect x="335" y="170" width="230" height="30" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="190" text-anchor="middle" font-size="10" fill="#1a1822">Access product:15 → moves to MRU position</text>

  <rect x="335" y="210" width="230" height="30" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="230" text-anchor="middle" font-size="10" fill="#1a1822">MRU ← product:15 | user:42 | session:abc → LRU</text>

  <!-- Cache full, new entry evicts LRU -->
  <rect x="335" y="250" width="230" height="30" rx="6" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1"/>
  <text x="450" y="270" text-anchor="middle" font-size="10" fill="#1a1822">Cache full: insert order:99, evict session:abc (LRU)</text>

  <rect x="335" y="290" width="230" height="30" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="310" text-anchor="middle" font-size="10" fill="#1a1822">MRU ← order:99 | product:15 | user:42 → LRU</text>

  <rect x="330" y="340" width="240" height="60" rx="6" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="360" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Keeps hot data in cache automatically</text>
  <text x="450" y="378" text-anchor="middle" font-size="9" fill="#64748b">Memory-bounded, no stale data from TTL</text>

  <rect x="330" y="410" width="240" height="45" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="450" y="430" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">✗ Evicts cold data even if still correct</text>
  <text x="450" y="448" text-anchor="middle" font-size="9" fill="#64748b">Thrashing under memory pressure</text>

  <!-- Column 3: Explicit -->
  <rect x="600" y="80" width="270" height="390" rx="12" fill="none" stroke="#d97706" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="35" rx="12" fill="#d97706"/>
  <rect x="600" y="105" width="270" height="10" fill="#d97706"/>
  <text x="735" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Explicit Invalidation</text>

  <!-- Write triggers invalidation -->
  <rect x="620" y="130" width="230" height="30" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="735" y="150" text-anchor="middle" font-size="10" fill="#1a1822">Cache has: user:42 → {name: "Alice"}</text>

  <rect x="620" y="170" width="230" height="30" rx="6" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="1"/>
  <text x="735" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">UPDATE user SET name = "Bob" WHERE id = 42</text>

  <line x1="735" y1="200" x2="735" y2="225" stroke="#d97706" stroke-width="2" marker-end="url(#arrCI)"/>

  <rect x="620" y="225" width="230" height="30" rx="6" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1.5"/>
  <text x="735" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">DEL user:42 from cache</text>

  <rect x="620" y="265" width="230" height="30" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="735" y="285" text-anchor="middle" font-size="10" fill="#1a1822">Next read: miss → fresh data from DB</text>

  <rect x="620" y="305" width="230" height="30" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="735" y="325" text-anchor="middle" font-size="10" fill="#1a1822">Cache now: user:42 → {name: "Bob"}</text>

  <rect x="615" y="350" width="240" height="60" rx="6" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="735" y="370" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Always fresh data, zero staleness</text>
  <text x="735" y="388" text-anchor="middle" font-size="9" fill="#64748b">Immediate consistency on writes</text>

  <rect x="615" y="420" width="240" height="45" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="735" y="440" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">✗ Application must manage invalidation</text>
  <text x="735" y="458" text-anchor="middle" font-size="9" fill="#64748b">Complex for multi-table updates</text>

  <defs>
    <marker id="arrCI" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>
</svg>
