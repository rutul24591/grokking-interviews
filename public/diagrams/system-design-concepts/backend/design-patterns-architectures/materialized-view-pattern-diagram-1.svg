<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Materialized View Pattern - Source DB with MV Builder</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="38" font-size="18" font-weight="700" fill="#1a1822" text-anchor="middle">Materialized View Pattern</text>
  <text x="450" y="56" font-size="12" fill="#1a1822" opacity="0.7" text-anchor="middle">Source database with MV builder updating denormalized read-optimized view</text>

  <!-- Source Database -->
  <rect x="50" y="100" width="200" height="180" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="50" y="100" width="200" height="30" rx="10" fill="#3b82f6"/>
  <rect x="50" y="120" width="200" height="10" fill="#3b82f6"/>
  <text x="150" y="121" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Source Database</text>

  <!-- Normalized tables -->
  <rect x="70" y="145" width="160" height="35" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="162" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">orders</text>
  <text x="150" y="175" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">id, user_id, total, status</text>

  <rect x="70" y="190" width="160" height="35" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="207" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">users</text>
  <text x="150" y="220" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">id, name, email, region</text>

  <rect x="70" y="235" width="160" height="35" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="252" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">products</text>
  <text x="150" y="265" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">id, name, category, price</text>

  <!-- CDC / Event Stream -->
  <rect x="300" y="155" width="150" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="375" y="180" font-size="11" font-weight="700" fill="#1a1822" text-anchor="middle">CDC / Event</text>
  <text x="375" y="197" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Stream</text>
  <text x="375" y="210" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Kafka / Debezium</text>

  <!-- Arrow: Source DB -> CDC -->
  <line x1="255" y1="185" x2="295" y2="185" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <text x="275" y="178" font-size="8" font-weight="700" fill="#d97706">Events</text>

  <!-- MV Builder -->
  <rect x="500" y="100" width="170" height="180" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="500" y="100" width="170" height="30" rx="10" fill="#6366f1"/>
  <rect x="500" y="120" width="170" height="10" fill="#6366f1"/>
  <text x="585" y="121" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">MV Builder</text>

  <rect x="515" y="145" width="140" height="50" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="585" y="165" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Join Resolver</text>
  <text x="585" y="180" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Combines related entities</text>

  <rect x="515" y="205" width="140" height="50" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="585" y="225" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Denormalizer</text>
  <text x="585" y="240" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Flattens nested data</text>

  <!-- Arrow: CDC -> MV Builder -->
  <line x1="455" y1="185" x2="495" y2="185" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowIndigo)"/>
  <text x="475" y="178" font-size="8" font-weight="700" fill="#4f46e5">Transform</text>

  <!-- Materialized View (Read-Optimized) -->
  <rect x="710" y="100" width="160" height="240" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <rect x="710" y="100" width="160" height="30" rx="10" fill="#059669"/>
  <rect x="710" y="120" width="160" height="10" fill="#059669"/>
  <text x="790" y="121" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Materialized</text>
  <text x="790" y="121" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">View</text>

  <rect x="725" y="145" width="130" height="70" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="790" y="165" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">order_summary</text>
  <text x="790" y="182" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">order_id, user_name,</text>
  <text x="790" y="194" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">email, product_name,</text>
  <text x="790" y="206" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">total, status, region</text>

  <rect x="725" y="225" width="130" height="55" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="790" y="245" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Read-Optimized</text>
  <text x="790" y="260" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">No JOINs needed</text>
  <text x="790" y="272" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Single table lookup</text>

  <!-- Arrow: MV Builder -> Materialized View -->
  <line x1="675" y1="185" x2="705" y2="185" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="690" y="178" font-size="8" font-weight="700" fill="#047857">Write</text>

  <!-- Query path -->
  <rect x="710" y="370" width="160" height="55" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="790" y="395" font-size="11" font-weight="700" fill="#1a1822" text-anchor="middle">Read Queries</text>
  <text x="790" y="412" font-size="9" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Dashboard, Reports</text>

  <!-- Arrow: MV -> Queries -->
  <line x1="790" y1="343" x2="790" y2="367" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreenDown)"/>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowGreenDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Write path annotation -->
  <rect x="50" y="370" width="200" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="395" font-size="11" font-weight="700" fill="#1a1822" text-anchor="middle">Write Operations</text>
  <text x="150" y="412" font-size="9" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Only to source DB</text>

  <!-- Bottom annotation -->
  <rect x="300" y="370" width="340" height="55" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="470" y="390" font-size="10" font-weight="700" fill="#92400e" text-anchor="middle">Key Trade-off</text>
  <text x="470" y="408" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">Read queries are fast (no JOINs), but MV data is</text>
  <text x="470" y="422" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">eventually consistent with source. Refresh lag varies.</text>

  <!-- Refresh cycle indicator -->
  <rect x="50" y="445" width="800" height="24" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="450" y="462" font-size="10" font-weight="700" fill="#5b21b6" text-anchor="middle">Refresh Cycle: Source changes -&gt; CDC captures -&gt; Builder transforms -&gt; MV updated -&gt; Reads served from MV</text>
</svg>
