<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Monolith deployment and horizontal scaling showing single codebase flowing through CI pipeline to multiple identical instances behind a load balancer</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Monolith Deployment &amp; Horizontal Scaling</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Single codebase, single CI pipeline, multiple identical instances behind a load balancer</text>

  <!-- Single Codebase -->
  <rect x="50" y="100" width="150" height="80" rx="10" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="125" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Single Codebase</text>
  <text x="125" y="150" text-anchor="middle" font-size="9" fill="#64748b">All modules in one repo</text>
  <text x="125" y="168" text-anchor="middle" font-size="9" fill="#64748b">One build artifact</text>

  <!-- CI Pipeline -->
  <line x1="200" y1="140" x2="270" y2="140" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrMon)"/>

  <rect x="270" y="90" width="140" height="100" rx="10" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="2"/>
  <text x="340" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">CI Pipeline</text>
  <text x="340" y="135" text-anchor="middle" font-size="9" fill="#1a1822">Build + Test + Deploy</text>
  <text x="290" y="158" font-size="8" fill="#64748b">• Compile entire codebase</text>
  <text x="290" y="173" font-size="8" fill="#64748b">• Run all tests (unit + integration)</text>
  <text x="290" y="188" font-size="8" fill="#64748b">• Single deployable artifact</text>

  <!-- Load Balancer -->
  <line x1="410" y1="140" x2="480" y2="140" stroke="#d97706" stroke-width="2" marker-end="url(#arrMon)"/>

  <rect x="480" y="100" width="120" height="80" rx="10" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="2"/>
  <text x="540" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Load Balancer</text>
  <text x="540" y="150" text-anchor="middle" font-size="9" fill="#64748b">Round-robin /</text>
  <text x="540" y="165" text-anchor="middle" font-size="9" fill="#64748b">least-connections</text>

  <!-- Instances -->
  <line x1="600" y1="120" x2="680" y2="90" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrMon)"/>
  <line x1="600" y1="140" x2="680" y2="140" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrMon)"/>
  <line x1="600" y1="160" x2="680" y2="190" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrMon)"/>

  <!-- Instance 1 -->
  <rect x="680" y="60" width="180" height="55" rx="8" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <text x="770" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Instance 1</text>
  <text x="770" y="102" text-anchor="middle" font-size="8" fill="#64748b">Full monolith: all modules</text>

  <!-- Instance 2 -->
  <rect x="680" y="125" width="180" height="55" rx="8" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <text x="770" y="147" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Instance 2</text>
  <text x="770" y="167" text-anchor="middle" font-size="8" fill="#64748b">Full monolith: all modules</text>

  <!-- Instance 3 -->
  <rect x="680" y="190" width="180" height="55" rx="8" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <text x="770" y="212" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Instance 3</text>
  <text x="770" y="232" text-anchor="middle" font-size="8" fill="#64748b">Full monolith: all modules</text>

  <!-- Shared Database -->
  <rect x="250" y="300" width="400" height="60" rx="10" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">Shared Database</text>
  <text x="450" y="345" text-anchor="middle" font-size="9" fill="#64748b">All instances connect to the same database — connection pool per instance</text>

  <!-- Arrows from instances to DB -->
  <line x1="770" y1="245" x2="650" y2="300" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrMon2)"/>
  <line x1="770" y1="180" x2="550" y2="300" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrMon2)"/>
  <line x1="770" y1="115" x2="450" y2="300" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrMon2)"/>

  <!-- Scaling characteristics -->
  <rect x="50" y="390" width="380" height="90" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="240" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Scaling Characteristics</text>
  <text x="70" y="435" font-size="9" fill="#1a1822">• Scale entire application — cannot scale individual modules</text>
  <text x="70" y="453" font-size="9" fill="#1a1822">• All instances are identical — simple horizontal scaling</text>
  <text x="70" y="471" font-size="9" fill="#1a1822">• Hot spot in one module forces scaling all modules</text>

  <!-- Deployment characteristics -->
  <rect x="470" y="390" width="380" height="90" rx="8" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="1"/>
  <text x="660" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Deployment Characteristics</text>
  <text x="490" y="435" font-size="9" fill="#1a1822">• Single deploy — change any module, redeploy everything</text>
  <text x="490" y="453" font-size="9" fill="#1a1822">• All instances must update simultaneously (rolling deploy)</text>
  <text x="490" y="471" font-size="9" fill="#1a1822">• No partial deploys — one version across all instances</text>

  <defs>
    <marker id="arrMon" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrMon2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
