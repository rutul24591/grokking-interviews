<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Circuit breaker state machine showing closed, open, and half-open states with transition conditions</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Circuit Breaker State Machine</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Three states with automatic transitions based on error rate and timeout conditions</text>

  <!-- CLOSED state -->
  <circle cx="200" cy="250" r="80" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="3"/>
  <text x="200" y="235" text-anchor="middle" font-size="18" font-weight="700" fill="#4caf50">CLOSED</text>
  <text x="200" y="260" text-anchor="middle" font-size="11" fill="#1a1822">Requests flow normally</text>
  <text x="200" y="280" text-anchor="middle" font-size="11" fill="#1a1822">to the service</text>

  <!-- Error counter -->
  <rect x="130" y="340" width="140" height="40" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="200" y="358" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Error Counter</text>
  <text x="200" y="373" text-anchor="middle" font-size="9" fill="#64748b">5 failures / 100 requests</text>

  <!-- OPEN state -->
  <circle cx="700" cy="250" r="80" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="3"/>
  <text x="700" y="235" text-anchor="middle" font-size="18" font-weight="700" fill="#dc2626">OPEN</text>
  <text x="700" y="260" text-anchor="middle" font-size="11" fill="#1a1822">Requests fail fast</text>
  <text x="700" y="280" text-anchor="middle" font-size="11" fill="#1a1822">503 Service Unavailable</text>

  <!-- Timeout timer -->
  <rect x="630" y="340" width="140" height="40" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="700" y="358" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Timeout Timer</text>
  <text x="700" y="373" text-anchor="middle" font-size="9" fill="#64748b">30s cooldown</text>

  <!-- HALF-OPEN state -->
  <circle cx="450" cy="120" r="70" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="3"/>
  <text x="450" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#d97706">HALF-OPEN</text>
  <text x="450" y="130" text-anchor="middle" font-size="10" fill="#1a1822">Single probe request</text>

  <!-- Transition: CLOSED → OPEN -->
  <path d="M 280 250 Q 490 220 620 250" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#arrCB2)"/>
  <text x="450" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Error rate exceeds threshold</text>
  <text x="450" y="228" text-anchor="middle" font-size="9" fill="#64748b">e.g., &gt;50% failures in 60s window</text>

  <!-- Transition: OPEN → HALF-OPEN -->
  <path d="M 650 180 Q 550 100 520 120" fill="none" stroke="#d97706" stroke-width="3" marker-end="url(#arrCB2)"/>
  <text x="590" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Timeout expires</text>
  <text x="590" y="148" text-anchor="middle" font-size="9" fill="#64748b">e.g., 30 seconds passed</text>

  <!-- Transition: HALF-OPEN → CLOSED (success) -->
  <path d="M 390 140 Q 300 180 250 200" fill="none" stroke="#4caf50" stroke-width="3" marker-end="url(#arrCB2)"/>
  <text x="310" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Probe succeeds</text>
  <text x="310" y="178" text-anchor="middle" font-size="9" fill="#64748b">service recovered</text>

  <!-- Transition: HALF-OPEN → OPEN (failure) -->
  <path d="M 500 160 Q 580 200 640 210" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#arrCB2)"/>
  <text x="580" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Probe fails</text>
  <text x="580" y="208" text-anchor="middle" font-size="9" fill="#64748b">back to OPEN, reset timer</text>

  <!-- Summary box -->
  <rect x="30" y="420" width="840" height="60" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="442" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Key Insight: Circuit breaker prevents cascading failures by stopping requests to a failing service,</text>
  <text x="450" y="462" text-anchor="middle" font-size="10" fill="#1a1822">giving it time to recover, while automatically probing for recovery and restoring traffic when healthy.</text>

  <defs>
    <marker id="arrCB2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
