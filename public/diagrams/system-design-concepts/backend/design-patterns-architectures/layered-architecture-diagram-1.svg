<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Layered Architecture - Four Layer Stack</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" font-size="18" font-weight="700" fill="#1a1822" text-anchor="middle">Layered Architecture: Four-Layer Stack</text>
  <text x="450" y="56" font-size="12" fill="#1a1822" opacity="0.7" text-anchor="middle">Request flows downward through strict layer boundaries</text>

  <!-- Layer 1: Presentation -->
  <rect x="150" y="85" width="600" height="75" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="150" y="85" width="600" height="28" rx="10" fill="#3b82f6"/>
  <rect x="150" y="103" width="600" height="10" fill="#3b82f6"/>
  <text x="450" y="105" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Presentation Layer</text>

  <rect x="200" y="125" width="120" height="25" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="260" y="142" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">REST Controllers</text>

  <rect x="340" y="125" width="120" height="25" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="400" y="142" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">GraphQL Resolvers</text>

  <rect x="480" y="125" width="120" height="25" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="540" y="142" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">View Templates</text>

  <rect x="620" y="125" width="100" height="25" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="670" y="142" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">DTOs</text>

  <!-- Arrow down -->
  <line x1="450" y1="163" x2="450" y2="173" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <text x="470" y="172" font-size="9" font-weight="700" fill="#3b82f6">Request</text>

  <!-- Layer 2: Business Logic -->
  <rect x="150" y="180" width="600" height="85" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="150" y="180" width="600" height="28" rx="10" fill="#6366f1"/>
  <rect x="150" y="198" width="600" height="10" fill="#6366f1"/>
  <text x="450" y="200" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Business Logic Layer</text>

  <rect x="200" y="220" width="130" height="35" rx="5" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="265" y="237" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Domain Services</text>
  <text x="265" y="250" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Business Rules</text>

  <rect x="350" y="220" width="130" height="35" rx="5" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="415" y="237" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Application Services</text>
  <text x="415" y="250" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Use Case Coordination</text>

  <rect x="500" y="220" width="130" height="35" rx="5" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="565" y="237" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Domain Models</text>
  <text x="565" y="250" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Entities &amp; Aggregates</text>

  <rect x="650" y="220" width="80" height="35" rx="5" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="690" y="237" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Validators</text>
  <text x="690" y="250" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Rules</text>

  <!-- Arrow down -->
  <line x1="450" y1="268" x2="450" y2="278" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowDownIndigo)"/>
  <text x="470" y="277" font-size="9" font-weight="700" fill="#6366f1">Query</text>

  <!-- Layer 3: Data Access -->
  <rect x="150" y="285" width="600" height="75" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="150" y="285" width="600" height="28" rx="10" fill="#f59e0b"/>
  <rect x="150" y="303" width="600" height="10" fill="#f59e0b"/>
  <text x="450" y="305" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Data Access Layer</text>

  <rect x="200" y="325" width="140" height="25" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="270" y="342" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Repository Interfaces</text>

  <rect x="360" y="325" width="140" height="25" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="430" y="342" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">ORM Mappers</text>

  <rect x="520" y="325" width="140" height="25" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="590" y="342" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Query Builders</text>

  <rect x="680" y="325" width="50" height="25" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="705" y="342" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">DAO</text>

  <!-- Arrow down -->
  <line x1="450" y1="363" x2="450" y2="373" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowDownAmber)"/>
  <text x="470" y="372" font-size="9" font-weight="700" fill="#f59e0b">I/O</text>

  <!-- Layer 4: Infrastructure -->
  <rect x="150" y="380" width="600" height="75" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <rect x="150" y="380" width="600" height="28" rx="10" fill="#dc2626"/>
  <rect x="150" y="398" width="600" height="10" fill="#dc2626"/>
  <text x="450" y="400" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Infrastructure Layer</text>

  <rect x="200" y="420" width="110" height="25" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="255" y="437" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">PostgreSQL</text>

  <rect x="330" y="420" width="110" height="25" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="385" y="437" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Redis Cache</text>

  <rect x="460" y="420" width="110" height="25" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="515" y="437" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Message Queue</text>

  <rect x="590" y="420" width="110" height="25" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="645" y="437" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">External APIs</text>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowDownIndigo" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowDownAmber" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Side annotation: Strict layering rule -->
  <rect x="30" y="140" width="90" height="200" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="75" y="160" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">Strict</text>
  <text x="75" y="174" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">Layering</text>
  <text x="75" y="196" font-size="8" font-weight="400" fill="#92400e" text-anchor="middle">Each layer</text>
  <text x="75" y="208" font-size="8" font-weight="400" fill="#92400e" text-anchor="middle">depends only</text>
  <text x="75" y="220" font-size="8" font-weight="400" fill="#92400e" text-anchor="middle">on the layer</text>
  <text x="75" y="232" font-size="8" font-weight="400" fill="#92400e" text-anchor="middle">directly below</text>
  <text x="75" y="252" font-size="8" font-weight="400" fill="#92400e" text-anchor="middle">No skipping</text>
  <text x="75" y="264" font-size="8" font-weight="400" fill="#92400e" text-anchor="middle">allowed</text>
</svg>
