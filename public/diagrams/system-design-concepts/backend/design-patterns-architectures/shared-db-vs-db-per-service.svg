<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <marker id="arrowShared" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
    <marker id="arrowApi" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="#f8fafc" />

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Shared Database vs Database-Per-Service</text>

  <!-- Divider -->
  <line x1="480" y1="52" x2="480" y2="500" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4" />

  <!-- ===== LEFT SIDE: Shared Database ===== -->
  <text x="240" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#dc2626">Shared Database (Anti-Pattern)</text>

  <!-- Services -->
  <rect x="60" y="100" width="140" height="50" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="2" />
  <text x="130" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Orders Svc</text>

  <rect x="260" y="100" width="140" height="50" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="2" />
  <text x="330" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Shipping Svc</text>

  <rect x="160" y="180" width="140" height="50" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="2" />
  <text x="230" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Analytics Svc</text>

  <!-- Arrows from services to shared DB -->
  <line x1="130" y1="150" x2="130" y2="310" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowShared)" />
  <line x1="330" y1="150" x2="330" y2="310" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowShared)" />
  <line x1="230" y1="230" x2="230" y2="310" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowShared)" />

  <!-- Shared Database -->
  <rect x="80" y="320" width="300" height="80" rx="10" fill="#fecaca" stroke="#ef4444" stroke-width="2" />
  <text x="230" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Shared Database</text>
  <text x="230" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#991b1b">orders | shipping | users | events</text>
  <text x="230" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#b91c1c">Unversioned implicit API</text>

  <!-- Problems list -->
  <rect x="60" y="420" width="360" height="80" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />
  <text x="80" y="442" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Problems:</text>
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#991b1b">Schema changes require cross-team coordination</text>
  <text x="80" y="476" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#991b1b">Performance contention on shared resources</text>
  <text x="80" y="492" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#991b1b">No independent deployment or ownership</text>

  <!-- ===== RIGHT SIDE: Database-Per-Service ===== -->
  <text x="720" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#16a34a">Database-Per-Service</text>

  <!-- Service 1 -->
  <rect x="580" y="100" width="140" height="50" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="2" />
  <text x="650" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Orders Svc</text>
  <line x1="650" y1="150" x2="650" y2="190" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowApi)" />
  <rect x="580" y="195" width="140" height="50" rx="8" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5" />
  <text x="650" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#166534">Orders DB</text>

  <!-- Service 2 -->
  <rect x="780" y="100" width="140" height="50" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="2" />
  <text x="850" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Shipping Svc</text>
  <line x1="850" y1="150" x2="850" y2="190" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowApi)" />
  <rect x="780" y="195" width="140" height="50" rx="8" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5" />
  <text x="850" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#166534">Shipping DB</text>

  <!-- API Communication between services -->
  <line x1="720" y1="125" x2="780" y2="125" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowApi)" />
  <line x1="780" y1="135" x2="720" y2="135" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowApi)" />
  <rect x="700" y="110" width="80" height="35" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="740" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#166534">REST/Events</text>

  <!-- CDC Pipeline -->
  <rect x="560" y="280" width="380" height="55" rx="8" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5" />
  <text x="750" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#065f46">CDC Pipeline (Debezium)</text>
  <text x="750" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#065f46">WAL events -&gt; Kafka -&gt; Read Models</text>

  <!-- CDC arrows -->
  <line x1="650" y1="245" x2="680" y2="280" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowApi)" />
  <line x1="850" y1="245" x2="820" y2="280" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowApi)" />

  <!-- Analytics with read model -->
  <rect x="660" y="360" width="180" height="50" rx="8" fill="#dcfce7" stroke="#4ade80" stroke-width="2" />
  <text x="750" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Analytics Svc</text>
  <line x1="750" y1="335" x2="750" y2="360" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowApi)" />
  <rect x="660" y="420" width="180" height="50" rx="8" fill="#bbf7d0" stroke="#4ade80" stroke-width="1.5" />
  <text x="750" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#166534">Analytics Read Model</text>

  <!-- Benefits list -->
  <rect x="560" y="490" width="380" height="25" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="750" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Independent deployment, ownership, and scaling</text>
</svg>
