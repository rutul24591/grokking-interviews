<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Retry vs Circuit Breaker vs Timeout Pattern Comparison</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  
  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Resilience Patterns: When to Use Each</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Retry, Circuit Breaker, and Timeout address different failure scenarios</text>
  
  <!-- Retry Pattern Column -->
  <rect x="40" y="80" width="260" height="380" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <rect x="40" y="80" width="260" height="36" rx="8" fill="#2563eb"/>
  <rect x="40" y="108" width="260" height="8" fill="#2563eb"/>
  <text x="170" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Retry Pattern</text>
  
  <!-- Retry use case -->
  <rect x="55" y="130" width="230" height="100" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="170" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">When to Use</text>
  <text x="65" y="172" font-size="10" fill="#1a1822">Transient failures - momentary</text>
  <text x="65" y="188" font-size="10" fill="#1a1822">network blips, brief timeouts,</text>
  <text x="65" y="204" font-size="10" fill="#1a1822">temporary resource unavailability</text>
  <text x="65" y="220" font-size="10" fill="#1a1822">that self-resolve quickly</text>
  
  <!-- Retry characteristics -->
  <rect x="55" y="245" width="230" height="80" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="265" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Characteristics</text>
  <text x="65" y="285" font-size="10" fill="#1a1822">Assumes failure is temporary</text>
  <text x="65" y="301" font-size="10" fill="#1a1822">Uses exponential backoff</text>
  <text x="65" y="317" font-size="10" fill="#1a1822">Risk: retry storms without jitter</text>
  
  <!-- Retry flow -->
  <rect x="55" y="340" width="230" height="110" rx="6" fill="#f9fafb" stroke="#d4d0d8" stroke-width="1"/>
  <text x="170" y="360" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Flow</text>
  <text x="65" y="378" font-size="10" fill="#1a1822">Request fails -&gt; Wait delay</text>
  <text x="65" y="394" font-size="10" fill="#1a1822">-&gt; Retry with backoff -&gt;</text>
  <text x="65" y="410" font-size="10" fill="#1a1822">Max retries? -&gt; Fail</text>
  <text x="65" y="426" font-size="10" fill="#1a1822">: Success -&gt; Continue</text>
  <text x="65" y="442" font-size="10" fill="#1a1822">: Exhausted -&gt; Escalate</text>
  
  <!-- Circuit Breaker Column -->
  <rect x="320" y="80" width="260" height="380" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="320" y="80" width="260" height="36" rx="8" fill="#f59e0b"/>
  <rect x="320" y="108" width="260" height="8" fill="#f59e0b"/>
  <text x="450" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Circuit Breaker</text>
  
  <!-- Circuit Breaker use case -->
  <rect x="335" y="130" width="230" height="100" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">When to Use</text>
  <text x="345" y="172" font-size="10" fill="#1a1822">Persistent failures - service is</text>
  <text x="345" y="188" font-size="10" fill="#1a1822">down, database locked, upstream</text>
  <text x="345" y="204" font-size="10" fill="#1a1822">system degraded. Prevents wasting</text>
  <text x="345" y="220" font-size="10" fill="#1a1822">resources on doomed requests</text>
  
  <!-- Circuit Breaker characteristics -->
  <rect x="335" y="245" width="230" height="80" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="450" y="265" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Characteristics</text>
  <text x="345" y="285" font-size="10" fill="#1a1822">Three states: Closed, Open,</text>
  <text x="345" y="301" font-size="10" fill="#1a1822">Half-Open. Tracks failure count.</text>
  <text x="345" y="317" font-size="10" fill="#1a1822">Fails fast when circuit is open</text>
  
  <!-- Circuit Breaker flow -->
  <rect x="335" y="340" width="230" height="110" rx="6" fill="#f9fafb" stroke="#d4d0d8" stroke-width="1"/>
  <text x="450" y="360" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Flow</text>
  <text x="345" y="378" font-size="10" fill="#1a1822">Normal: Closed (pass-through)</text>
  <text x="345" y="394" font-size="10" fill="#1a1822">Failures exceed threshold</text>
  <text x="345" y="410" font-size="10" fill="#1a1822">-&gt; Open (fail immediately)</text>
  <text x="345" y="426" font-size="10" fill="#1a1822">After timeout -&gt; Half-Open</text>
  <text x="345" y="442" font-size="10" fill="#1a1822">Success -&gt; Closed, Fail -&gt; Open</text>
  
  <!-- Timeout Pattern Column -->
  <rect x="600" y="80" width="260" height="380" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <rect x="600" y="80" width="260" height="36" rx="8" fill="#059669"/>
  <rect x="600" y="108" width="260" height="8" fill="#059669"/>
  <text x="730" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Timeout Pattern</text>
  
  <!-- Timeout use case -->
  <rect x="615" y="130" width="230" height="100" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="730" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">When to Use</text>
  <text x="625" y="172" font-size="10" fill="#1a1822">Slow or hanging responses -</text>
  <text x="625" y="188" font-size="10" fill="#1a1822">prevents threads/connections from</text>
  <text x="625" y="204" font-size="10" fill="#1a1822">being held indefinitely. Essential</text>
  <text x="625" y="220" font-size="10" fill="#1a1822">for bounded waiting time</text>
  
  <!-- Timeout characteristics -->
  <rect x="615" y="245" width="230" height="80" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="1"/>
  <text x="730" y="265" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Characteristics</text>
  <text x="625" y="285" font-size="10" fill="#1a1822">Guarantees upper bound on wait</text>
  <text x="625" y="301" font-size="10" fill="#1a1822">Releases blocked resources</text>
  <text x="625" y="317" font-size="10" fill="#1a1822">Must be combined with retry</text>
  
  <!-- Timeout flow -->
  <rect x="615" y="340" width="230" height="110" rx="6" fill="#f9fafb" stroke="#d4d0d8" stroke-width="1"/>
  <text x="730" y="360" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Flow</text>
  <text x="625" y="378" font-size="10" fill="#1a1822">Start request with timer</text>
  <text x="625" y="394" font-size="10" fill="#1a1822">Response within timeout?</text>
  <text x="625" y="410" font-size="10" fill="#1a1822">: Yes -&gt; Return response</text>
  <text x="625" y="426" font-size="10" fill="#1a1822">: No -&gt; Cancel request</text>
  <text x="625" y="442" font-size="10" fill="#1a1822">-&gt; Throw TimeoutException</text>
  
  <!-- Combined pattern callout -->
  <rect x="40" y="470" width="820" height="25" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="487" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Production systems combine all three: Timeout -&gt; Retry with backoff/jitter -&gt; Circuit breaker for persistent failures</text>
</svg>