<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <title>Sidecar Pattern - Main Container with Sidecar Containers Sharing Same Pod</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Sidecar Pattern Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Main Container with Sidecar Containers Sharing the Same Pod</text>

  <!-- Pod boundary -->
  <rect x="50" y="90" width="800" height="340" rx="12" fill="none" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="450" y="115" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed" font-family="system-ui, sans-serif">Pod (Kubernetes) - Shared Network Namespace, Shared Volumes</text>

  <!-- Main Application Container -->
  <rect x="80" y="150" width="250" height="250" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <rect x="80" y="150" width="250" height="35" rx="10" fill="#059669"/>
  <text x="205" y="173" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Main Container</text>

  <!-- App icon -->
  <rect x="110" y="210" width="190" height="60" rx="8" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="205" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Application Logic</text>
  <text x="205" y="255" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">HTTP API, Business Logic</text>

  <rect x="110" y="285" width="190" height="30" rx="5" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="205" y="305" text-anchor="middle" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">Port 8080 (HTTP)</text>

  <rect x="110" y="330" width="190" height="30" rx="5" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="205" y="350" text-anchor="middle" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">Volume: /data/app</text>

  <rect x="110" y="370" width="190" height="20" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="205" y="384" text-anchor="middle" font-size="9" fill="#78350f" font-family="system-ui, sans-serif">Own lifecycle, resources</text>

  <!-- Sidecar 1: Logging -->
  <rect x="360" y="150" width="150" height="115" rx="10" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <rect x="360" y="150" width="150" height="35" rx="10" fill="#0284c7"/>
  <text x="435" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Logging Sidecar</text>

  <rect x="375" y="200" width="120" height="25" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="435" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#0c4a6e" font-family="system-ui, sans-serif">Fluent Bit</text>

  <rect x="375" y="235" width="120" height="25" rx="5" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="435" y="252" text-anchor="middle" font-size="10" fill="#0c4a6e" font-family="system-ui, sans-serif">Tails /var/log/app</text>

  <!-- Sidecar 2: Monitoring -->
  <rect x="540" y="150" width="150" height="115" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <rect x="540" y="150" width="150" height="35" rx="10" fill="#d97706"/>
  <text x="615" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Monitoring Sidecar</text>

  <rect x="555" y="200" width="120" height="25" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="615" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f" font-family="system-ui, sans-serif">StatsD Exporter</text>

  <rect x="555" y="235" width="120" height="25" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="615" y="252" text-anchor="middle" font-size="10" fill="#78350f" font-family="system-ui, sans-serif">Exposes :9090</text>

  <!-- Sidecar 3: Proxy -->
  <rect x="720" y="150" width="110" height="115" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="720" y="150" width="110" height="35" rx="10" fill="#7c3aed"/>
  <text x="775" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Proxy</text>

  <rect x="735" y="200" width="80" height="25" rx="5" fill="#f3f1f8" stroke="#7c3aed" stroke-width="1"/>
  <text x="775" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" font-family="system-ui, sans-serif">Envoy</text>

  <rect x="735" y="235" width="80" height="25" rx="5" fill="#f3f1f8" stroke="#7c3aed" stroke-width="1"/>
  <text x="775" y="252" text-anchor="middle" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">mTLS</text>

  <!-- Shared resources section -->
  <rect x="360" y="300" width="470" height="100" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="595" y="325" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Shared Resources Within Pod</text>

  <!-- Shared network -->
  <rect x="380" y="345" width="130" height="35" rx="6" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="445" y="367" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" font-family="system-ui, sans-serif">Shared Network</text>
  <text x="445" y="382" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">localhost:8080</text>

  <!-- Shared volumes -->
  <rect x="530" y="345" width="130" height="35" rx="6" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="595" y="367" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" font-family="system-ui, sans-serif">Shared Volumes</text>
  <text x="595" y="382" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Log files, config</text>

  <!-- Same node -->
  <rect x="680" y="345" width="130" height="35" rx="6" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="745" y="367" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" font-family="system-ui, sans-serif">Same Node</text>
  <text x="745" y="382" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">No network overhead</text>

  <!-- Connections between containers -->
  <line x1="330" y1="230" x2="360" y2="230" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="510" y1="230" x2="540" y2="230" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="690" y1="230" x2="720" y2="230" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Log flow -->
  <path d="M 205 330 Q 205 350 435 350" stroke="#0284c7" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>

  <!-- Legend -->
  <rect x="50" y="445" width="800" height="40" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="70" y="462" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Sidecar Pattern: Complementary processes running alongside the main application in the same deployment unit</text>
  <text x="70" y="478" font-size="10" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Key benefit: Separation of concerns - infrastructure concerns (logging, monitoring) decoupled from business logic</text>
</svg>