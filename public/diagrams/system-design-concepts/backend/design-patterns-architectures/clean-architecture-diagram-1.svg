<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Clean Architecture concentric circles showing Entities at center, Use Cases, Interface Adapters, and Frameworks/Drivers at outer layer with dependency rule pointing inward</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Clean Architecture: Concentric Layers</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">The Dependency Rule: source code dependencies point only inward toward higher-level policies</text>

  <!-- Outer layer: Frameworks & Drivers -->
  <rect x="80" y="80" width="740" height="400" rx="12" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="2"/>
  <text x="820" y="105" font-size="12" font-weight="700" fill="#2563eb">Layer 4: Frameworks &amp; Drivers</text>
  <text x="120" y="130" font-size="9" fill="#64748b">• Web frameworks (Express, Spring)</text>
  <text x="120" y="148" font-size="9" fill="#64748b">• Database drivers (PostgreSQL, MongoDB)</text>
  <text x="120" y="166" font-size="9" fill="#64748b">• UI frameworks (React, Angular)</text>
  <text x="120" y="184" font-size="9" fill="#64748b">• External APIs &amp; message queues</text>

  <!-- Layer 3: Interface Adapters -->
  <rect x="180" y="130" width="540" height="340" rx="12" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
  <text x="710" y="155" font-size="12" font-weight="700" fill="#d97706">Layer 3: Interface Adapters</text>
  <text x="220" y="180" font-size="9" fill="#64748b">• Controllers (HTTP handlers)</text>
  <text x="220" y="198" font-size="9" fill="#64748b">• Presenters (view models)</text>
  <text x="220" y="216" font-size="9" fill="#64748b">• Gateways (repository implementations)</text>
  <text x="220" y="234" font-size="9" fill="#64748b">• Data mappers &amp; DTOs</text>

  <!-- Layer 2: Use Cases -->
  <rect x="300" y="190" width="300" height="270" rx="12" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="2"/>
  <text x="590" y="215" font-size="12" font-weight="700" fill="#4caf50">Layer 2: Use Cases</text>
  <text x="320" y="240" font-size="9" fill="#64748b">• Application services</text>
  <text x="320" y="258" font-size="9" fill="#64748b">• Workflow orchestration</text>
  <text x="320" y="276" font-size="9" fill="#64748b">• Input/output interfaces</text>
  <text x="320" y="294" font-size="9" fill="#64748b">• Transaction boundaries</text>

  <!-- Layer 1: Entities (center) -->
  <rect x="400" y="260" width="100" height="130" rx="12" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="3"/>
  <text x="450" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Layer 1:</text>
  <text x="450" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Entities</text>
  <text x="450" y="335" text-anchor="middle" font-size="8" fill="#64748b">Enterprise-wide</text>
  <text x="450" y="348" text-anchor="middle" font-size="8" fill="#64748b">business rules</text>
  <text x="450" y="361" text-anchor="middle" font-size="8" fill="#64748b">Domain objects</text>
  <text x="450" y="374" text-anchor="middle" font-size="8" fill="#64748b">Invariants</text>

  <!-- Dependency arrows pointing inward -->
  <line x1="200" y1="260" x2="290" y2="260" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrCA)"/>
  <text x="245" y="250" text-anchor="middle" font-size="8" font-weight="600" fill="#6d5bd0">depends on</text>

  <line x1="320" y1="325" x2="390" y2="325" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrCA)"/>
  <text x="355" y="315" text-anchor="middle" font-size="8" font-weight="600" fill="#6d5bd0">depends on</text>

  <line x1="100" y1="325" x2="170" y2="325" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrCA)"/>
  <text x="135" y="315" text-anchor="middle" font-size="8" font-weight="600" fill="#6d5bd0">depends on</text>

  <!-- Key insight -->
  <rect x="30" y="430" width="840" height="55" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="452" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">The Dependency Rule: Inner layers know nothing about outer layers</text>
  <text x="450" y="472" text-anchor="middle" font-size="10" fill="#1a1822">Entities don't know about databases. Use cases don't know about HTTP. Frameworks are replaceable plugins.</text>

  <defs>
    <marker id="arrCA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
