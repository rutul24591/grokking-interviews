<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="960" height="520" fill="url(#bgGrad3)" />
  <text x="480" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Saga Failure &amp; Recovery Flow</text>
  <text x="480" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="normal" fill="#475569" text-anchor="middle">Payment failure triggers compensating transactions in reverse order</text>

  <!-- Step 1: Order Created -->
  <rect x="80" y="100" width="200" height="56" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="180" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Step 1: Order</text>
  <text x="180" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#1e40af" text-anchor="middle">Create order (pending)</text>

  <!-- Arrow 1->2 -->
  <line x1="280" y1="128" x2="370" y2="128" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue3)" />
  <text x="325" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#1e40af" text-anchor="middle">Success</text>

  <!-- Step 2: Inventory Reserved -->
  <rect x="380" y="100" width="200" height="56" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="480" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Step 2: Inventory</text>
  <text x="480" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#1e40af" text-anchor="middle">Reserve stock</text>

  <!-- Arrow 2->3 -->
  <line x1="580" y1="128" x2="670" y2="128" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue3)" />
  <text x="625" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#1e40af" text-anchor="middle">Success</text>

  <!-- Step 3: Payment FAILED -->
  <rect x="680" y="100" width="200" height="56" rx="10" fill="#fee2e2" stroke="#f87171" stroke-width="3" />
  <text x="780" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#991b1b" text-anchor="middle">Step 3: Payment</text>
  <text x="780" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">Charge FAILED</text>

  <!-- Failure icon -->
  <text x="780" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#dc2626" text-anchor="middle">X</text>
  <text x="780" y="198" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#7f1d1d" text-anchor="middle">Payment declined</text>

  <!-- Compensation arrows (curved, going back) -->
  <path d="M 730 156 Q 680 260 580 260" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed3)" />
  <path d="M 430 260 Q 330 260 280 156" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed3)" />

  <!-- Compensation 1: Refund -->
  <rect x="580" y="240" width="200" height="56" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" />
  <text x="680" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Comp 1: Refund</text>
  <text x="680" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#78350f" text-anchor="middle">N/A (no charge yet)</text>

  <!-- Compensation 2: Release Inventory -->
  <rect x="380" y="240" width="200" height="56" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" />
  <text x="480" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Comp 2: Release</text>
  <text x="480" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#78350f" text-anchor="middle">Release inventory reservation</text>

  <!-- Compensation 3: Cancel Order -->
  <rect x="80" y="240" width="200" height="56" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" />
  <text x="180" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Comp 3: Cancel</text>
  <text x="180" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#78350f" text-anchor="middle">Cancel pending order</text>

  <!-- Final State -->
  <rect x="300" y="340" width="360" height="60" rx="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2" />
  <text x="480" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">Terminal State: COMPENSATED</text>
  <text x="480" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="normal" fill="#475569" text-anchor="middle">Order cancelled - payment declined. Inventory released.</text>

  <!-- Arrow from last compensation to final state -->
  <line x1="180" y1="296" x2="180" y2="368" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray3)" />
  <line x1="180" y1="368" x2="300" y2="370" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray3)" />

  <!-- Observability Box -->
  <rect x="40" y="430" width="880" height="70" rx="10" fill="#f0f9ff" stroke="#38bdf8" stroke-width="2" />
  <text x="480" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0c4a6e" text-anchor="middle">Observability &amp; Recovery</text>
  <text x="80" y="478" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#0c4a6e">- Metrics: saga_started, step_completed, step_failed, compensation_started, compensation_completed, saga_compensated</text>
  <text x="80" y="496" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#0c4a6e">- Alerts: stuck sagas (time-in-state exceeds threshold), spike in compensation rate, reconciliation drift detected</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowRed3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626" />
    </marker>
    <marker id="arrowGray3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>
</svg>
