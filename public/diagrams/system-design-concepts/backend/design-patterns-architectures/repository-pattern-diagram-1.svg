<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Repository Pattern - Layered Architecture Diagram</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  
  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Repository Pattern Architecture</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Separation of concerns between domain logic and data access</text>
  
  <!-- Domain Layer -->
  <rect x="60" y="80" width="780" height="160" rx="8" fill="#ffffff" stroke="#d4d0d8" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="60" y="80" width="780" height="32" rx="8" fill="#7c3aed"/>
  <rect x="60" y="104" width="780" height="8" fill="#7c3aed"/>
  <text x="450" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Domain Layer</text>
  
  <!-- Service/Domain Logic -->
  <rect x="100" y="130" width="180" height="90" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="190" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Domain Service</text>
  <text x="190" y="182" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.8">Business Logic</text>
  <text x="190" y="198" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.8">Use Cases</text>
  
  <!-- Arrow from Service to Repository Interface -->
  <path d="M 280 175 L 360 175" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Repository Interface -->
  <rect x="360" y="130" width="200" height="90" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">IRepository&lt;T&gt;</text>
  <text x="460" y="182" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.8">+ GetById(id)</text>
  <text x="460" y="198" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.8">+ Add(entity), Remove(id)</text>
  
  <!-- Arrow from Repository Interface to Implementation -->
  <path d="M 460 220 L 460 280" stroke="#0891b2" stroke-width="2" marker-end="url(#arrowhead-cyan)"/>
  
  <!-- Data Access Layer -->
  <rect x="60" y="280" width="780" height="140" rx="8" fill="#ffffff" stroke="#d4d0d8" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="60" y="280" width="780" height="32" rx="8" fill="#0891b2"/>
  <rect x="60" y="304" width="780" height="8" fill="#0891b2"/>
  <text x="450" y="298" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Data Access Layer</text>
  
  <!-- Concrete Repository -->
  <rect x="360" y="330" width="200" height="70" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="460" y="358" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">SqlRepository&lt;T&gt;</text>
  <text x="460" y="378" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.8">Implements IRepository&lt;T&gt;</text>
  
  <!-- Arrow to Database -->
  <path d="M 460 400 L 460 440" stroke="#059669" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  
  <!-- Database -->
  <path d="M 390 440 L 390 470 C 390 480, 530 480, 530 470 L 530 440 Z" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <ellipse cx="460" cy="440" rx="70" ry="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="460" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Database</text>
  
  <!-- Benefits callout -->
  <rect x="600" y="340" width="220" height="70" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="710" y="362" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">Key Benefits</text>
  <text x="620" y="380" font-size="10" fill="#1a1822" opacity="0.8">Decoupled data access</text>
  <text x="620" y="395" font-size="10" fill="#1a1822" opacity="0.8">Testable via mock repos</text>
  
  <!-- Arrow from Service to Benefits -->
  <path d="M 280 160 L 600 350" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>
</svg>