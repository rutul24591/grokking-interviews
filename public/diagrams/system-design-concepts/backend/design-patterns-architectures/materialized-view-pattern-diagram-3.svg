<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Materialized View vs Caching vs Read Replica</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="38" font-size="18" font-weight="700" fill="#1a1822" text-anchor="middle">Materialized View vs Caching vs Read Replica</text>
  <text x="450" y="56" font-size="12" fill="#1a1822" opacity="0.7" text-anchor="middle">Three strategies for read performance with different trade-offs</text>

  <!-- Column 1: Materialized View -->
  <rect x="30" y="80" width="270" height="390" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="30" rx="10" fill="#7c3aed"/>
  <rect x="30" y="100" width="270" height="10" fill="#7c3aed"/>
  <text x="165" y="101" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Materialized View</text>

  <!-- MV Diagram -->
  <rect x="50" y="125" width="230" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="165" y="145" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Source DB</text>
  <text x="165" y="160" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">(Normalized Tables)</text>

  <line x1="165" y1="178" x2="165" y2="198" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="185" y="192" font-size="8" font-weight="700" fill="#7c3aed">Transform</text>

  <rect x="50" y="205" width="230" height="50" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="165" y="225" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">MV Store</text>
  <text x="165" y="240" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">(Denormalized, Pre-joined)</text>

  <line x1="165" y1="258" x2="165" y2="278" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="70" y="285" width="190" height="35" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text x="165" y="302" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Fast Reads</text>
  <text x="165" y="315" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">No JOINs required</text>

  <!-- Properties -->
  <rect x="50" y="340" width="230" height="115" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text x="165" y="360" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Properties</text>
  <text x="65" y="380" font-size="9" font-weight="400" fill="#1a1822">+ Denormalized structure</text>
  <text x="65" y="396" font-size="9" font-weight="400" fill="#1a1822">+ Pre-computed JOINs</text>
  <text x="65" y="412" font-size="9" font-weight="400" fill="#1a1822">+ Eventual consistency</text>
  <text x="65" y="428" font-size="9" font-weight="400" fill="#1a1822">+ Own storage (can be</text>
  <text x="80" y="442" font-size="9" font-weight="400" fill="#1a1822">different DB engine)</text>

  <!-- Column 2: Caching -->
  <rect x="315" y="80" width="270" height="390" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="315" y="80" width="270" height="30" rx="10" fill="#f59e0b"/>
  <rect x="315" y="100" width="270" height="10" fill="#f59e0b"/>
  <text x="450" y="101" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Application Cache</text>

  <!-- Cache Diagram -->
  <rect x="335" y="125" width="230" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="450" y="145" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Source DB</text>
  <text x="450" y="160" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">(System of Record)</text>

  <line x1="450" y1="178" x2="450" y2="198" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <text x="410" y="192" font-size="8" font-weight="700" fill="#d97706">Cache Miss</text>

  <rect x="335" y="205" width="230" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="225" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Cache Layer (Redis)</text>
  <text x="450" y="240" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">(Key-Value, TTL-based)</text>

  <line x1="450" y1="258" x2="450" y2="278" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmberDown)"/>
  <text x="470" y="272" font-size="8" font-weight="700" fill="#d97706">Cache Hit</text>

  <rect x="355" y="285" width="190" height="35" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="302" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Sub-ms Reads</text>
  <text x="450" y="315" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">In-memory access</text>

  <!-- Properties -->
  <rect x="335" y="340" width="230" height="115" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="360" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Properties</text>
  <text x="350" y="380" font-size="9" font-weight="400" fill="#1a1822">+ Same structure as source</text>
  <text x="350" y="396" font-size="9" font-weight="400" fill="#1a1822">+ TTL-based invalidation</text>
  <text x="350" y="412" font-size="9" font-weight="400" fill="#1a1822">+ Cache stampede risk</text>
  <text x="350" y="428" font-size="9" font-weight="400" fill="#1a1822">+ Limited by memory size</text>
  <text x="350" y="442" font-size="9" font-weight="400" fill="#1a1822">+ No transformation</text>

  <!-- Column 3: Read Replica -->
  <rect x="600" y="80" width="270" height="390" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="30" rx="10" fill="#3b82f6"/>
  <rect x="600" y="100" width="270" height="10" fill="#3b82f6"/>
  <text x="735" y="101" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Read Replica</text>

  <!-- Read Replica Diagram -->
  <rect x="620" y="125" width="230" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="735" y="145" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Primary DB (Writes)</text>
  <text x="735" y="160" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">(Binary Log / WAL)</text>

  <line x1="735" y1="178" x2="735" y2="198" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="755" y="192" font-size="8" font-weight="700" fill="#3b82f6">Replication</text>

  <rect x="620" y="205" width="230" height="50" rx="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="735" y="225" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Read Replica</text>
  <text x="735" y="240" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">(Exact Copy, Async)</text>

  <line x1="735" y1="258" x2="735" y2="278" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlueDown)"/>

  <rect x="645" y="285" width="180" height="35" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="735" y="302" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Reads Offloaded</text>
  <text x="735" y="315" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Reduces primary load</text>

  <!-- Properties -->
  <rect x="620" y="340" width="230" height="115" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="735" y="360" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Properties</text>
  <text x="635" y="380" font-size="9" font-weight="400" fill="#1a1822">+ Identical schema</text>
  <text x="635" y="396" font-size="9" font-weight="400" fill="#1a1822">+ Replication lag (ms-s)</text>
  <text x="635" y="412" font-size="9" font-weight="400" fill="#1a1822">+ Same DB engine</text>
  <text x="635" y="428" font-size="9" font-weight="400" fill="#1a1822">+ No transformation</text>
  <text x="635" y="442" font-size="9" font-weight="400" fill="#1a1822">+ Scales read throughput</text>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowAmberDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowBlueDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Bottom comparison -->
  <rect x="30" y="482" width="840" height="14" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="450" y="493" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">MV = transformed + denormalized | Cache = raw copy with expiry | Read Replica = exact async copy for read scaling</text>
</svg>
