<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Ambassador pattern showing application communicating with external service through a local proxy sidecar handling TLS, retries, auth, and telemetry</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Ambassador Pattern Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Application delegates all outbound communication to a local proxy ambassador</text>

  <!-- Host boundary -->
  <rect x="30" y="80" width="520" height="380" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="290" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">Host / Pod Boundary</text>

  <!-- Application -->
  <rect x="60" y="130" width="200" height="100" rx="10" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="160" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Application</text>
  <text x="160" y="180" text-anchor="middle" font-size="10" fill="#1a1822">Business logic</text>
  <text x="160" y="195" text-anchor="middle" font-size="10" fill="#1a1822">Domain models</text>
  <text x="160" y="210" text-anchor="middle" font-size="10" fill="#1a1822">Request handling</text>

  <!-- Ambassador -->
  <rect x="310" y="130" width="210" height="200" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <rect x="310" y="130" width="210" height="30" rx="10" fill="#cc4444"/>
  <rect x="310" y="150" width="210" height="10" fill="#cc4444"/>
  <text x="415" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Ambassador Proxy</text>

  <!-- Ambassador responsibilities -->
  <rect x="325" y="170" width="180" height="28" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="415" y="189" text-anchor="middle" font-size="9" fill="#1a1822">TLS / mTLS termination</text>

  <rect x="325" y="203" width="180" height="28" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="415" y="222" text-anchor="middle" font-size="9" fill="#1a1822">Auth token refresh</text>

  <rect x="325" y="236" width="180" height="28" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="415" y="255" text-anchor="middle" font-size="9" fill="#1a1822">Retry + circuit breaker</text>

  <rect x="325" y="269" width="180" height="28" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="415" y="288" text-anchor="middle" font-size="9" fill="#1a1822">Rate-limit enforcement</text>

  <rect x="325" y="302" width="180" height="28" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="415" y="321" text-anchor="middle" font-size="9" fill="#1a1822">Telemetry collection</text>

  <!-- External Service -->
  <rect x="620" y="200" width="240" height="130" rx="10" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="2"/>
  <text x="740" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">External Service</text>
  <text x="740" y="258" text-anchor="middle" font-size="10" fill="#1a1822">Third-party API / Legacy system</text>
  <text x="740" y="275" text-anchor="middle" font-size="10" fill="#1a1822">Payment provider / Database</text>
  <text x="740" y="292" text-anchor="middle" font-size="10" fill="#1a1822">External dependency</text>
  <text x="740" y="312" text-anchor="middle" font-size="9" fill="#64748b">(may have rate limits, auth, errors)</text>

  <!-- Arrow: App to Ambassador -->
  <line x1="260" y1="180" x2="305" y2="180" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrAmb)"/>
  <text x="283" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">request to</text>
  <text x="283" y="182" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">localhost:8080</text>

  <!-- Arrow: Ambassador to External -->
  <line x1="520" y1="230" x2="615" y2="230" stroke="#cc4444" stroke-width="2.5" marker-end="url(#arrAmb)"/>
  <text x="568" y="220" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">forwarded request</text>
  <text x="568" y="232" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">(with auth, headers)</text>

  <!-- Response arrow back -->
  <line x1="615" y1="260" x2="520" y2="260" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrAmb2)"/>
  <text x="568" y="278" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">response + telemetry</text>

  <!-- App receives response -->
  <line x1="305" y1="200" x2="260" y2="200" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrAmb2)"/>

  <!-- Key insight box -->
  <rect x="30" y="390" width="840" height="90" rx="10" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Key Insight: Application knows nothing about the external system's operational characteristics</text>
  <text x="450" y="438" text-anchor="middle" font-size="11" fill="#1a1822">The ambassador absorbs TLS, retries, rate limits, auth, and telemetry — the application just makes local HTTP calls.</text>
  <text x="450" y="458" text-anchor="middle" font-size="11" fill="#64748b">This centralizes external dependency handling and provides consistent observability across all services.</text>

  <defs>
    <marker id="arrAmb" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrAmb2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
  </defs>
</svg>
