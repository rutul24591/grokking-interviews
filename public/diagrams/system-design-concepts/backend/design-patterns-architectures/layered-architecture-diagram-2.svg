<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Layered Architecture - Strict vs Relaxed Layering</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" font-size="18" font-weight="700" fill="#1a1822" text-anchor="middle">Strict vs Relaxed Layering</text>
  <text x="450" y="56" font-size="12" fill="#1a1822" opacity="0.7" text-anchor="middle">Dependency rules: only adjacent layers vs cross-layer access</text>

  <!-- LEFT: Strict Layering -->
  <text x="225" y="90" font-size="15" font-weight="700" fill="#1a1822" text-anchor="middle">Strict Layering</text>

  <rect x="100" y="110" width="250" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="225" y="140" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Presentation</text>

  <line x1="225" y1="163" x2="225" y2="168" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="100" y="172" width="250" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="225" y="202" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Business Logic</text>

  <line x1="225" y1="225" x2="225" y2="230" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowIndigo)"/>

  <rect x="100" y="234" width="250" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="225" y="264" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Data Access</text>

  <line x1="225" y1="287" x2="225" y2="292" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <rect x="100" y="296" width="250" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="225" y="326" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Infrastructure</text>

  <!-- Strict rules box -->
  <rect x="80" y="370" width="290" height="100" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="225" y="395" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">Rules</text>
  <text x="225" y="415" font-size="10" font-weight="400" fill="#1a1822" opacity="0.8" text-anchor="middle">Each layer depends only on the</text>
  <text x="225" y="430" font-size="10" font-weight="400" fill="#1a1822" opacity="0.8" text-anchor="middle">layer directly below it</text>
  <text x="225" y="450" font-size="10" font-weight="400" fill="#1a1822" opacity="0.8" text-anchor="middle">No layer skipping allowed</text>

  <!-- Divider -->
  <line x1="450" y1="80" x2="450" y2="480" stroke="#1a1822" stroke-width="1" opacity="0.2"/>

  <!-- RIGHT: Relaxed Layering -->
  <text x="675" y="90" font-size="15" font-weight="700" fill="#1a1822" text-anchor="middle">Relaxed Layering</text>

  <rect x="550" y="110" width="250" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="675" y="140" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Presentation</text>

  <rect x="550" y="172" width="250" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="675" y="202" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Business Logic</text>

  <rect x="550" y="234" width="250" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="675" y="264" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Data Access</text>

  <rect x="550" y="296" width="250" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="675" y="326" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Infrastructure</text>

  <!-- Normal dependencies (downward) -->
  <line x1="675" y1="163" x2="675" y2="169" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="675" y1="225" x2="675" y2="231" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
  <line x1="675" y1="287" x2="675" y2="293" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Cross-layer dependency: Presentation -> Data Access (bypassing Business Logic) -->
  <path d="M 540 135 Q 500 200 540 259" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <text x="492" y="190" font-size="9" font-weight="700" fill="#dc2626" text-anchor="middle" transform="rotate(-45,492,190)">Bypass</text>

  <!-- Cross-layer: Business Logic -> Infrastructure -->
  <path d="M 810 200 Q 850 250 810 293" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <text x="850" y="250" font-size="9" font-weight="700" fill="#dc2626" text-anchor="middle" transform="rotate(45,850,250)">Bypass</text>

  <!-- Relaxed rules box -->
  <rect x="530" y="370" width="290" height="100" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="675" y="395" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">Rules (Relaxed)</text>
  <text x="675" y="415" font-size="10" font-weight="400" fill="#1a1822" opacity="0.8" text-anchor="middle">Layers can depend on ANY</text>
  <text x="675" y="430" font-size="10" font-weight="400" fill="#1a1822" opacity="0.8" text-anchor="middle">lower layer, not just adjacent</text>
  <text x="675" y="450" font-size="10" font-weight="400" fill="#1a1822" opacity="0.8" text-anchor="middle">Faster but risks tight coupling</text>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Bottom comparison -->
  <rect x="100" y="480" width="700" height="16" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="450" y="492" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">Strict = predictable, testable | Relaxed = pragmatic, but risks circular dependencies &amp; hidden coupling</text>
</svg>
