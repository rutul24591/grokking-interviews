<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="960" height="520" fill="url(#bgGrad2)" />
  <text x="480" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Choreography vs Orchestration</text>
  <text x="480" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="normal" fill="#475569" text-anchor="middle">Two implementation styles for saga coordination</text>

  <!-- Divider -->
  <line x1="480" y1="80" x2="480" y2="500" stroke="#cbd5e1" stroke-width="2" />

  <!-- LEFT: Choreography -->
  <text x="240" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">Choreography (Decentralized)</text>

  <!-- Service boxes -->
  <rect x="60" y="130" width="160" height="48" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="140" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Order Service</text>

  <rect x="300" y="130" width="160" height="48" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="380" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Inventory Service</text>

  <rect x="60" y="220" width="160" height="48" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="140" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Payment Service</text>

  <rect x="300" y="220" width="160" height="48" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="380" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Shipping Service</text>

  <!-- Event flow arrows -->
  <line x1="220" y1="154" x2="300" y2="154" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue2)" />
  <text x="260" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#1e40af" text-anchor="middle">order_created</text>

  <line x1="380" y1="178" x2="380" y2="218" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue2)" />
  <text x="420" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#1e40af">stock_reserved</text>

  <line x1="300" y1="244" x2="220" y2="244" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue2)" />
  <text x="260" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#1e40af" text-anchor="middle">charged</text>

  <line x1="140" y1="268" x2="140" y2="308" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue2)" />
  <text x="180" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#1e40af">shipment_created</text>

  <!-- Pros and Cons -->
  <rect x="40" y="330" width="400" height="160" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="240" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Pros</text>
  <text x="60" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#166534">- No central coordinator</text>
  <text x="60" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#166534">- Services evolve independently</text>
  <text x="60" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#166534">- Reduced coupling</text>
  <text x="60" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#166534">- Good for simple workflows</text>

  <rect x="40" y="500" width="400" height="0" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />

  <!-- RIGHT: Orchestration -->
  <text x="720" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">Orchestration (Centralized)</text>

  <!-- Orchestrator -->
  <rect x="620" y="140" width="200" height="56" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="2" />
  <text x="720" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">Saga Orchestrator</text>
  <text x="720" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#78350f" text-anchor="middle">State Machine</text>

  <!-- Service boxes -->
  <rect x="520" y="240" width="140" height="44" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="590" y="267" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#0f172a" text-anchor="middle">Order Svc</text>

  <rect x="790" y="240" width="140" height="44" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="860" y="267" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#0f172a" text-anchor="middle">Inventory Svc</text>

  <rect x="520" y="320" width="140" height="44" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="590" y="347" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#0f172a" text-anchor="middle">Payment Svc</text>

  <rect x="790" y="320" width="140" height="44" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2" />
  <text x="860" y="347" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#0f172a" text-anchor="middle">Shipping Svc</text>

  <!-- Command arrows -->
  <line x1="660" y1="196" x2="620" y2="238" stroke="#d97706" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)" />
  <line x1="780" y1="196" x2="830" y2="238" stroke="#d97706" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)" />
  <line x1="660" y1="196" x2="620" y2="318" stroke="#d97706" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)" />
  <line x1="780" y1="196" x2="830" y2="318" stroke="#d97706" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)" />

  <!-- Pros -->
  <rect x="520" y="400" width="400" height="100" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
  <text x="720" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">Pros</text>
  <text x="540" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#166534">- Single source of truth for workflow state</text>
  <text x="540" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#166534">- Easy to monitor, debug, and retry</text>
  <text x="540" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="#166534">- Centralized timeouts, retries, circuit breakers</text>

  <!-- Recommendation -->
  <rect x="520" y="510" width="400" height="0" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706" />
    </marker>
  </defs>
</svg>
