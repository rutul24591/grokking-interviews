<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Microservices vs Monolith Comparison</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="38" font-size="18" font-weight="700" fill="#1a1822" text-anchor="middle">Microservices vs Monolith</text>
  <text x="450" y="56" font-size="12" fill="#1a1822" opacity="0.7" text-anchor="middle">Deployment, scaling, and failure isolation differences</text>

  <!-- LEFT: Monolith -->
  <text x="225" y="95" font-size="15" font-weight="700" fill="#1a1822" text-anchor="middle">Monolithic Architecture</text>

  <!-- Single deployable -->
  <rect x="80" y="120" width="290" height="250" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <rect x="80" y="120" width="290" height="28" rx="10" fill="#dc2626"/>
  <rect x="80" y="140" width="290" height="8" fill="#dc2626"/>
  <text x="225" y="140" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Monolith Application</text>

  <!-- Layers inside monolith -->
  <rect x="100" y="160" width="250" height="35" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="225" y="182" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">User Module (UI + Logic)</text>

  <rect x="100" y="202" width="250" height="35" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="225" y="224" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Order Module (UI + Logic)</text>

  <rect x="100" y="244" width="250" height="35" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="225" y="266" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Payment Module (UI + Logic)</text>

  <rect x="100" y="286" width="250" height="35" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="225" y="308" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Notification Module (UI + Logic)</text>

  <rect x="100" y="328" width="250" height="35" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="225" y="350" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Shared Database</text>

  <!-- Deployment: single arrow -->
  <line x1="225" y1="375" x2="225" y2="395" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <rect x="140" y="400" width="170" height="35" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="225" y="416" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Single Deployable</text>
  <text x="225" y="430" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">All-or-nothing deployment</text>

  <!-- Monolith characteristics -->
  <rect x="80" y="448" width="290" height="36" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="225" y="463" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">Scale: entire app | Failure: cascades</text>
  <text x="225" y="478" font-size="9" font-weight="400" fill="#92400e" text-anchor="middle">across modules | Tech: uniform</text>

  <!-- Divider -->
  <line x1="450" y1="80" x2="450" y2="490" stroke="#1a1822" stroke-width="1" opacity="0.2"/>

  <!-- RIGHT: Microservices -->
  <text x="675" y="95" font-size="15" font-weight="700" fill="#1a1822" text-anchor="middle">Microservices Architecture</text>

  <!-- Independent services -->
  <rect x="480" y="120" width="170" height="70" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="565" y="145" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">User Service</text>
  <rect x="510" y="155" width="110" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="565" y="170" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">User DB</text>
  <rect x="480" y="195" width="170" height="22" rx="4" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="565" y="210" font-size="8" font-weight="400" fill="#1a1822" text-anchor="middle">Deploy: Independent</text>

  <rect x="690" y="120" width="170" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="775" y="145" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Order Service</text>
  <rect x="720" y="155" width="110" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="775" y="170" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">Order DB</text>
  <rect x="690" y="195" width="170" height="22" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="775" y="210" font-size="8" font-weight="400" fill="#1a1822" text-anchor="middle">Deploy: Independent</text>

  <rect x="480" y="230" width="170" height="70" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="565" y="255" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Payment Service</text>
  <rect x="510" y="265" width="110" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="565" y="280" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">Payment DB</text>
  <rect x="480" y="305" width="170" height="22" rx="4" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text x="565" y="320" font-size="8" font-weight="400" fill="#1a1822" text-anchor="middle">Deploy: Independent</text>

  <rect x="690" y="230" width="170" height="70" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="775" y="255" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Notification Svc</text>
  <rect x="720" y="265" width="110" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="775" y="280" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">Notify DB</text>
  <rect x="690" y="305" width="170" height="22" rx="4" fill="#ffffff" stroke="#14b8a6" stroke-width="1"/>
  <text x="775" y="320" font-size="8" font-weight="400" fill="#1a1822" text-anchor="middle">Deploy: Independent</text>

  <!-- Event bus connecting services -->
  <rect x="520" y="345" width="300" height="30" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.5"/>
  <text x="670" y="364" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Event Bus / API Gateway</text>

  <!-- Connections -->
  <line x1="565" y1="343" x2="565" y2="193" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="775" y1="343" x2="775" y2="193" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Microservices characteristics -->
  <rect x="480" y="390" width="380" height="94" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="670" y="410" font-size="10" font-weight="700" fill="#065f46" text-anchor="middle">Key Advantages</text>
  <text x="670" y="428" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">Scale: per-service | Failure: isolated to one service</text>
  <text x="670" y="444" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">Deploy: independent | Tech: polyglot per service</text>
  <text x="670" y="460" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">Teams: autonomous ownership | Trade-off: complexity</text>
  <text x="670" y="476" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">distributed tracing, eventual consistency, ops overhead</text>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
