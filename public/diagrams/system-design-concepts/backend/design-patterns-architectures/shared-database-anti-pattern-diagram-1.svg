<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <title>Shared Database Anti-Pattern - Multiple Services Sharing Single Database</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Shared Database Anti-Pattern</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Multiple Services Tightly Coupled to a Single Database</text>

  <!-- Services -->
  <rect x="60" y="120" width="140" height="70" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="130" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">User Service</text>
  <text x="130" y="170" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Team A</text>

  <rect x="260" y="120" width="140" height="70" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="330" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Order Service</text>
  <text x="330" y="170" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Team B</text>

  <rect x="460" y="120" width="140" height="70" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="530" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Payment Service</text>
  <text x="530" y="170" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Team C</text>

  <rect x="660" y="120" width="140" height="70" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="730" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Inventory Service</text>
  <text x="730" y="170" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Team D</text>

  <!-- All services connect to shared DB -->
  <line x1="130" y1="190" x2="200" y2="300" stroke="#ef4444" stroke-width="2"/>
  <line x1="330" y1="190" x2="380" y2="300" stroke="#ef4444" stroke-width="2"/>
  <line x1="530" y1="190" x2="520" y2="300" stroke="#ef4444" stroke-width="2"/>
  <line x1="730" y1="190" x2="620" y2="300" stroke="#ef4444" stroke-width="2"/>

  <!-- Shared Database -->
  <rect x="200" y="300" width="450" height="100" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="3"/>
  <text x="425" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Shared Database</text>

  <!-- Tables in shared DB -->
  <rect x="220" y="350" width="90" height="35" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="265" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">users_table</text>

  <rect x="325" y="350" width="90" height="35" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="370" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">orders_table</text>

  <rect x="430" y="350" width="100" height="35" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="480" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">payments_table</text>

  <rect x="545" y="350" width="90" height="35" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="372" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">inventory_tbl</text>

  <!-- Problem indicators -->
  <rect x="60" y="230" width="170" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="145" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Schema Contention</text>
  <text x="145" y="268" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Team A changes break Team B</text>
  <text x="145" y="282" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Lock conflicts on shared tables</text>

  <rect x="260" y="230" width="170" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="345" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Tight Coupling</text>
  <text x="345" y="268" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Cannot deploy independently</text>
  <text x="345" y="282" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Shared schema migrations</text>

  <rect x="460" y="230" width="170" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="545" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">No Data Ownership</text>
  <text x="545" y="268" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Who owns the data model?</text>
  <text x="545" y="282" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Inconsistent access patterns</text>

  <rect x="660" y="230" width="170" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="745" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Single Point of Failure</text>
  <text x="745" y="268" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">All services go down if DB fails</text>
  <text x="745" y="282" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Connection pool exhaustion</text>

  <!-- Scale indicator -->
  <rect x="250" y="420" width="350" height="50" rx="8" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="425" y="440" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Result: Cascading Failures &amp; Team Coordination Overhead</text>
  <text x="425" y="458" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">One service&apos;s bad query can impact ALL services on the shared database</text>
</svg>