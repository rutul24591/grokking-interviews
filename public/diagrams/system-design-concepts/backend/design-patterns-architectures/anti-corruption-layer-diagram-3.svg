<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>ACL implementation strategies: Facade Service, Translator Module, and Gateway Adapter patterns for legacy system integration</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">ACL Implementation Patterns</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Three common implementation strategies with different trade-offs</text>

  <!-- Pattern 1: Facade Service -->
  <rect x="30" y="80" width="270" height="390" rx="12" fill="none" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="105" width="270" height="10" fill="#6d5bd0"/>
  <text x="165" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Facade Service</text>

  <!-- Facade diagram -->
  <rect x="50" y="130" width="230" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="165" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Domain Service</text>
  <text x="165" y="168" text-anchor="middle" font-size="9" fill="#64748b">calls ACL facade interface</text>

  <line x1="165" y1="180" x2="165" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrACL)"/>

  <rect x="50" y="200" width="230" height="55" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="165" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">ACL Facade</text>
  <text x="165" y="238" text-anchor="middle" font-size="9" fill="#64748b">translates + validates</text>
  <text x="165" y="250" text-anchor="middle" font-size="9" fill="#64748b">exposes clean interface to domain</text>

  <line x1="165" y1="255" x2="165" y2="280" stroke="#dc2626" stroke-width="2" marker-end="url(#arrACL2)"/>

  <rect x="50" y="280" width="230" height="50" rx="8" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
  <text x="165" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Legacy System</text>
  <text x="165" y="318" text-anchor="middle" font-size="9" fill="#64748b">raw API / database</text>

  <!-- Pros/Cons -->
  <rect x="45" y="350" width="240" height="55" rx="6" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="165" y="368" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Simple, one integration point</text>
  <text x="165" y="385" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Easy to test in isolation</text>
  <text x="165" y="402" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Domain sees only clean interface</text>

  <rect x="45" y="415" width="240" height="40" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="165" y="433" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">✗ ACL and facade tightly coupled</text>
  <text x="165" y="450" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">✗ Hard to reuse across domains</text>

  <!-- Pattern 2: Translator Module -->
  <rect x="315" y="80" width="270" height="390" rx="12" fill="none" stroke="#d97706" stroke-width="2"/>
  <rect x="315" y="80" width="270" height="35" rx="12" fill="#d97706"/>
  <rect x="315" y="105" width="270" height="10" fill="#d97706"/>
  <text x="450" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Translator Module</text>

  <rect x="335" y="130" width="230" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Domain Service</text>
  <text x="450" y="168" text-anchor="middle" font-size="9" fill="#64748b">uses domain model directly</text>

  <line x1="450" y1="180" x2="450" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrACL)"/>

  <rect x="335" y="200" width="230" height="55" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Translator Module</text>
  <text x="450" y="238" text-anchor="middle" font-size="9" fill="#64748b">pure translation, no validation</text>
  <text x="450" y="250" text-anchor="middle" font-size="9" fill="#64748b">stateless, reusable</text>

  <line x1="450" y1="255" x2="450" y2="280" stroke="#dc2626" stroke-width="2" marker-end="url(#arrACL2)"/>

  <rect x="335" y="280" width="230" height="50" rx="8" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
  <text x="450" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Legacy System</text>
  <text x="450" y="318" text-anchor="middle" font-size="9" fill="#64748b">raw API / database</text>

  <rect x="330" y="350" width="240" height="55" rx="6" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="368" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Lightweight, stateless</text>
  <text x="450" y="385" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Reusable across services</text>
  <text x="450" y="402" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Easy to swap legacy systems</text>

  <rect x="330" y="415" width="240" height="40" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="450" y="433" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">✗ No validation gate</text>
  <text x="450" y="450" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">✗ Domain must handle bad data</text>

  <!-- Pattern 3: Gateway Adapter -->
  <rect x="600" y="80" width="270" height="390" rx="12" fill="none" stroke="#4caf50" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="35" rx="12" fill="#4caf50"/>
  <rect x="600" y="105" width="270" height="10" fill="#4caf50"/>
  <text x="735" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Gateway Adapter</text>

  <rect x="620" y="130" width="230" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="735" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Domain Service</text>
  <text x="735" y="168" text-anchor="middle" font-size="9" fill="#64748b">uses port interface</text>

  <line x1="735" y1="180" x2="735" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrACL)"/>

  <rect x="620" y="200" width="230" height="55" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="735" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Port Interface</text>
  <text x="735" y="238" text-anchor="middle" font-size="9" fill="#64748b">domain-defined contract</text>
  <text x="735" y="250" text-anchor="middle" font-size="9" fill="#64748b">(hexagonal architecture)</text>

  <line x1="735" y1="255" x2="735" y2="280" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrACL3)"/>

  <rect x="620" y="280" width="230" height="50" rx="8" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="1.5"/>
  <text x="735" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Adapter (implements port)</text>
  <text x="735" y="318" text-anchor="middle" font-size="9" fill="#64748b">translates to legacy calls</text>

  <line x1="735" y1="330" x2="735" y2="355" stroke="#dc2626" stroke-width="2" marker-end="url(#arrACL2)"/>

  <rect x="620" y="355" width="230" height="35" rx="8" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
  <text x="735" y="378" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">Legacy System</text>

  <rect x="615" y="405" width="240" height="55" rx="6" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="735" y="423" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Best separation of concerns</text>
  <text x="735" y="440" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Domain defines the contract</text>
  <text x="735" y="457" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">✓ Swap legacy without domain changes</text>

  <defs>
    <marker id="arrACL" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrACL2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrACL3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>
</svg>
