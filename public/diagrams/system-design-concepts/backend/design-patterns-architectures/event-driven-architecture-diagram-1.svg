<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Event producers publishing to event bus with fan-out to multiple consumers</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Event Producers &#8594; Event Bus &#8594; Consumer Fan-Out</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Multiple producers publish events; multiple consumers subscribe independently</text>

  <!-- Event Producers Column -->
  <rect x="30" y="85" width="220" height="380" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="85" width="220" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="110" width="220" height="10" fill="#6d5bd0"/>
  <text x="140" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Event Producers</text>

  <!-- Producer 1: Web App -->
  <rect x="50" y="135" width="180" height="50" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="140" y="157" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Web Application</text>
  <text x="140" y="174" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">User actions, page views</text>

  <!-- Producer 2: Mobile App -->
  <rect x="50" y="200" width="180" height="50" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="140" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Mobile App</text>
  <text x="140" y="239" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Touch events, location</text>

  <!-- Producer 3: Microservice -->
  <rect x="50" y="265" width="180" height="50" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="140" y="287" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Microservice A</text>
  <text x="140" y="304" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Order created, updated</text>

  <!-- Producer 4: IoT Device -->
  <rect x="50" y="330" width="180" height="50" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="140" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">IoT / External System</text>
  <text x="140" y="369" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Sensor readings, webhooks</text>

  <!-- Publish arrows from producers to bus -->
  <line x1="250" y1="160" x2="370" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA1)"/>
  <text x="310" y="153" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">publish()</text>

  <line x1="250" y1="225" x2="370" y2="225" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA1)"/>
  <text x="310" y="218" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">publish()</text>

  <line x1="250" y1="290" x2="370" y2="290" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA1)"/>
  <text x="310" y="283" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">publish()</text>

  <line x1="250" y1="355" x2="370" y2="355" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA1)"/>
  <text x="310" y="348" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">publish()</text>

  <!-- Event Bus (Center) -->
  <rect x="370" y="100" width="160" height="320" rx="12" fill="#6d5bd0"/>
  <text x="450" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Event Bus</text>
  <text x="450" y="160" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">(Message Broker)</text>

  <rect x="390" y="175" width="120" height="35" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="450" y="197" text-anchor="middle" font-size="10" fill="#ffffff">Kafka / RabbitMQ</text>

  <rect x="390" y="220" width="120" height="35" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="450" y="242" text-anchor="middle" font-size="10" fill="#ffffff">Event Topics/Streams</text>

  <rect x="390" y="265" width="120" height="35" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="450" y="287" text-anchor="middle" font-size="10" fill="#ffffff">Ordering Guarantee</text>

  <rect x="390" y="310" width="120" height="35" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="450" y="332" text-anchor="middle" font-size="10" fill="#ffffff">Durability &amp; Retention</text>

  <rect x="390" y="355" width="120" height="35" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="450" y="377" text-anchor="middle" font-size="10" fill="#ffffff">Partitioning</text>

  <!-- Subscribe arrows from bus to consumers -->
  <line x1="530" y1="160" x2="650" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA1)"/>
  <text x="590" y="153" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">subscribe()</text>

  <line x1="530" y1="225" x2="650" y2="225" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA1)"/>
  <text x="590" y="218" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">subscribe()</text>

  <line x1="530" y1="290" x2="650" y2="290" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA1)"/>
  <text x="590" y="283" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">subscribe()</text>

  <line x1="530" y1="355" x2="650" y2="355" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowEDA1)"/>
  <text x="590" y="348" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">subscribe()</text>

  <!-- Event Consumers Column -->
  <rect x="650" y="85" width="220" height="380" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="650" y="85" width="220" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="650" y="110" width="220" height="10" fill="#6d5bd0"/>
  <text x="760" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Event Consumers</text>

  <!-- Consumer 1: Notification -->
  <rect x="670" y="135" width="180" height="50" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="760" y="157" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Notification Service</text>
  <text x="760" y="174" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Send emails, push alerts</text>

  <!-- Consumer 2: Analytics -->
  <rect x="670" y="200" width="180" height="50" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="760" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Analytics Pipeline</text>
  <text x="760" y="239" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Aggregate metrics, dashboards</text>

  <!-- Consumer 3: Search Indexer -->
  <rect x="670" y="265" width="180" height="50" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="760" y="287" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Search Indexer</text>
  <text x="760" y="304" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Update Elasticsearch</text>

  <!-- Consumer 4: Audit Logger -->
  <rect x="670" y="330" width="180" height="50" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="760" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Audit Logger</text>
  <text x="760" y="369" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Compliance, audit trail</text>

  <!-- Fan-out label -->
  <text x="590" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Fan-Out: One event &#8594; N independent consumers</text>
  <text x="590" y="448" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Consumers are decoupled; each processes at its own pace</text>

  <rect x="590" y="460" width="220" height="30" rx="6" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="700" y="479" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Key: Producers don&apos;t know about consumers</text>

  <defs>
    <marker id="arrowEDA1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>