<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <title>Strangler Fig vs Big Bang Rewrite - Risk Profile Comparison</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Strangler Fig vs Big Bang Rewrite</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Risk Profile Comparison for Legacy System Migration</text>

  <!-- Strangler Fig Column -->
  <rect x="30" y="80" width="410" height="380" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="40" rx="10" fill="#059669"/>
  <text x="235" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Strangler Fig Pattern</text>

  <!-- Risk over time curve -->
  <rect x="50" y="140" width="370" height="160" rx="8" fill="#f3f1f8"/>
  <text x="235" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Risk Profile Over Time</text>

  <!-- Axes -->
  <line x1="70" y1="180" x2="70" y2="280" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="70" y1="280" x2="400" y2="280" stroke="#1a1822" stroke-width="1.5"/>
  <text x="65" y="175" text-anchor="end" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Risk</text>
  <text x="400" y="295" text-anchor="end" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Time</text>

  <!-- Strangler fig risk curve: stays flat, then decreases -->
  <path d="M 80 200 Q 150 200 220 210 Q 280 225 330 250 Q 370 270 390 278" stroke="#059669" stroke-width="2.5" fill="none"/>
  <text x="235" y="235" text-anchor="middle" font-size="9" font-weight="600" fill="#059669" font-family="system-ui, sans-serif">Strangler Fig</text>

  <!-- Big bang risk curve: stays flat then spikes high -->
  <path d="M 80 200 Q 150 200 220 200 Q 280 195 330 160 Q 370 120 390 90" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>
  <text x="340" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#ef4444" font-family="system-ui, sans-serif">Big Bang</text>

  <!-- Value delivery bars -->
  <rect x="50" y="310" width="370" height="55" rx="8" fill="#f3f1f8"/>
  <text x="235" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Continuous Value Delivery</text>

  <!-- Gradual value bars -->
  <rect x="70" y="340" width="60" height="15" rx="3" fill="#059669" opacity="0.3"/>
  <rect x="70" y="340" width="15" height="15" rx="3" fill="#059669"/>
  <text x="140" y="352" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">20%</text>

  <rect x="170" y="340" width="60" height="15" rx="3" fill="#059669" opacity="0.3"/>
  <rect x="170" y="340" width="35" height="15" rx="3" fill="#059669"/>
  <text x="240" y="352" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">50%</text>

  <rect x="270" y="340" width="60" height="15" rx="3" fill="#059669" opacity="0.3"/>
  <rect x="270" y="340" width="50" height="15" rx="3" fill="#059669"/>
  <text x="340" y="352" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">80%</text>

  <rect x="370" y="340" width="45" height="15" rx="3" fill="#059669"/>
  <text x="400" y="352" text-anchor="middle" font-size="8" fill="#ffffff" font-family="system-ui, sans-serif">100%</text>

  <!-- Strangler pros -->
  <rect x="50" y="375" width="180" height="65" rx="6" fill="#dcfce7"/>
  <text x="140" y="390" text-anchor="middle" font-size="9" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Advantages:</text>
  <text x="140" y="405" text-anchor="middle" font-size="8" fill="#166534" font-family="system-ui, sans-serif">Incremental risk, rollback</text>
  <text x="140" y="418" text-anchor="middle" font-size="8" fill="#166534" font-family="system-ui, sans-serif">Continuous delivery, learn</text>
  <text x="140" y="431" text-anchor="middle" font-size="8" fill="#166534" font-family="system-ui, sans-serif">Parallel development</text>

  <rect x="245" y="375" width="175" height="65" rx="6" fill="#fee2e2"/>
  <text x="332" y="390" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Disadvantages:</text>
  <text x="332" y="405" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Longer overall timeline</text>
  <text x="332" y="418" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Temp. dual maintenance</text>
  <text x="332" y="431" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Data sync complexity</text>

  <!-- Big Bang Column -->
  <rect x="460" y="80" width="410" height="380" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="40" rx="10" fill="#ef4444"/>
  <text x="665" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Big Bang Rewrite</text>

  <!-- Big bang timeline -->
  <rect x="480" y="140" width="370" height="160" rx="8" fill="#f3f1f8"/>
  <text x="665" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Risk Profile Over Time</text>

  <!-- Axes -->
  <line x1="500" y1="180" x2="500" y2="280" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="500" y1="280" x2="830" y2="280" stroke="#1a1822" stroke-width="1.5"/>
  <text x="495" y="175" text-anchor="end" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Risk</text>
  <text x="830" y="295" text-anchor="end" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Time</text>

  <!-- Big bang risk curve: climbing -->
  <path d="M 510 270 Q 550 265 600 240 Q 660 200 710 140 Q 750 90 780 60" stroke="#ef4444" stroke-width="2.5" fill="none"/>
  <text x="700" y="180" text-anchor="middle" font-size="9" font-weight="600" fill="#ef4444" font-family="system-ui, sans-serif">Accumulating Risk</text>

  <!-- Switch point -->
  <circle cx="780" cy="60" r="5" fill="#ef4444"/>
  <text x="780" y="48" text-anchor="middle" font-size="8" font-weight="700" fill="#ef4444" font-family="system-ui, sans-serif">Cutover!</text>

  <!-- Value delivery for big bang -->
  <rect x="480" y="310" width="370" height="55" rx="8" fill="#f3f1f8"/>
  <text x="665" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Value Delivery</text>

  <!-- No value until the end -->
  <rect x="500" y="340" width="330" height="15" rx="3" fill="#fee2e2" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="665" y="352" text-anchor="middle" font-size="9" fill="#991b1b" font-family="system-ui, sans-serif">No value delivered during development (months/years)</text>

  <!-- Big bang pros/cons -->
  <rect x="480" y="375" width="180" height="65" rx="6" fill="#dcfce7"/>
  <text x="570" y="390" text-anchor="middle" font-size="9" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Advantages:</text>
  <text x="570" y="405" text-anchor="middle" font-size="8" fill="#166534" font-family="system-ui, sans-serif">Clean architecture, no</text>
  <text x="570" y="418" text-anchor="middle" font-size="8" fill="#166534" font-family="system-ui, sans-serif">legacy constraints, single</text>
  <text x="570" y="431" text-anchor="middle" font-size="8" fill="#166534" font-family="system-ui, sans-serif">final migration event</text>

  <rect x="675" y="375" width="175" height="65" rx="6" fill="#fee2e2"/>
  <text x="762" y="390" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Disadvantages:</text>
  <text x="762" y="405" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">High risk at cutover</text>
  <text x="762" y="418" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">No rollback option</text>
  <text x="762" y="431" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Business waits for value</text>

  <!-- Bottom recommendation -->
  <rect x="30" y="470" width="840" height="25" rx="6" fill="#1a1822"/>
  <text x="450" y="487" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff" font-family="system-ui, sans-serif">Recommendation: Prefer Strangler Fig for production systems. Big Bang rarely succeeds for complex, critical systems.</text>
</svg>