<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Bulkhead pattern showing isolated thread pools for payment, search, and user services preventing cascade failures</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Bulkhead: Thread Pool Isolation</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Separate thread pools per service prevent failures in one from starving others</text>

  <!-- Application -->
  <rect x="300" y="80" width="300" height="50" rx="10" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Application Server</text>
  <text x="450" y="122" text-anchor="middle" font-size="9" fill="#64748b">request dispatcher</text>

  <!-- Clients -->
  <rect x="50" y="100" width="100" height="50" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="100" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Clients</text>
  <text x="100" y="138" text-anchor="middle" font-size="9" fill="#64748b">Web / Mobile / API</text>

  <line x1="150" y1="125" x2="295" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrBH)"/>

  <!-- Payment Thread Pool -->
  <rect x="100" y="160" width="200" height="300" rx="10" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="2"/>
  <rect x="100" y="160" width="200" height="30" rx="10" fill="#4caf50"/>
  <rect x="100" y="180" width="200" height="10" fill="#4caf50"/>
  <text x="200" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Payment Pool</text>
  <text x="200" y="205" text-anchor="middle" font-size="9" fill="#64748b">10 threads</text>

  <rect x="115" y="220" width="170" height="25" rx="5" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="200" y="237" text-anchor="middle" font-size="8" fill="#1a1822">T1: processing payment ✓</text>
  <rect x="115" y="250" width="170" height="25" rx="5" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="200" y="267" text-anchor="middle" font-size="8" fill="#1a1822">T2: processing payment ✓</text>
  <rect x="115" y="280" width="170" height="25" rx="5" fill="#dc2626" opacity="0.3" stroke="#dc2626" stroke-width="1"/>
  <text x="200" y="297" text-anchor="middle" font-size="8" font-weight="600" fill="#dc2626">T3: gateway timeout ✗</text>
  <rect x="115" y="310" width="170" height="25" rx="5" fill="#dc2626" opacity="0.3" stroke="#dc2626" stroke-width="1"/>
  <text x="200" y="327" text-anchor="middle" font-size="8" font-weight="600" fill="#dc2626">T4: queue waiting</text>
  <rect x="115" y="340" width="170" height="25" rx="5" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="1"/>
  <text x="200" y="357" text-anchor="middle" font-size="8" fill="#64748b">T5-T10: queue waiting</text>

  <text x="200" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">⚠ Payment gateway down</text>
  <text x="200" y="428" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">All 10 threads exhausted</text>
  <text x="200" y="448" text-anchor="middle" font-size="9" fill="#64748b">But other pools unaffected!</text>

  <!-- Search Thread Pool -->
  <rect x="350" y="160" width="200" height="300" rx="10" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="2"/>
  <rect x="350" y="160" width="200" height="30" rx="10" fill="#4caf50"/>
  <rect x="350" y="180" width="200" height="10" fill="#4caf50"/>
  <text x="450" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Search Pool</text>
  <text x="450" y="205" text-anchor="middle" font-size="9" fill="#64748b">15 threads</text>

  <rect x="365" y="220" width="170" height="25" rx="5" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="237" text-anchor="middle" font-size="8" fill="#1a1822">T1: executing search ✓</text>
  <rect x="365" y="250" width="170" height="25" rx="5" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="267" text-anchor="middle" font-size="8" fill="#1a1822">T2: executing search ✓</text>
  <rect x="365" y="280" width="170" height="25" rx="5" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="297" text-anchor="middle" font-size="8" fill="#1a1822">T3: executing search ✓</text>
  <rect x="365" y="310" width="170" height="25" rx="5" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="327" text-anchor="middle" font-size="8" fill="#1a1822">T4: executing search ✓</text>
  <rect x="365" y="340" width="170" height="100" rx="5" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="380" text-anchor="middle" font-size="8" fill="#64748b">T5-T15: available</text>
  <text x="450" y="395" text-anchor="middle" font-size="8" fill="#64748b">ready for requests</text>

  <text x="450" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">✓ Healthy — unaffected</text>
  <text x="450" y="466" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">by payment failure</text>

  <!-- User Thread Pool -->
  <rect x="600" y="160" width="200" height="300" rx="10" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="2"/>
  <rect x="600" y="160" width="200" height="30" rx="10" fill="#4caf50"/>
  <rect x="600" y="180" width="200" height="10" fill="#4caf50"/>
  <text x="700" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">User Pool</text>
  <text x="700" y="205" text-anchor="middle" font-size="9" fill="#64748b">8 threads</text>

  <rect x="615" y="220" width="170" height="25" rx="5" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="700" y="237" text-anchor="middle" font-size="8" fill="#1a1822">T1: loading profile ✓</text>
  <rect x="615" y="250" width="170" height="25" rx="5" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="700" y="267" text-anchor="middle" font-size="8" fill="#1a1822">T2: updating prefs ✓</text>
  <rect x="615" y="280" width="170" height="25" rx="5" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="700" y="297" text-anchor="middle" font-size="8" fill="#1a1822">T3: auth check ✓</text>
  <rect x="615" y="310" width="170" height="120" rx="5" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="700" y="360" text-anchor="middle" font-size="8" fill="#64748b">T4-T8: available</text>
  <text x="700" y="375" text-anchor="middle" font-size="8" fill="#64748b">ready for requests</text>

  <text x="700" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">✓ Healthy — unaffected</text>
  <text x="700" y="466" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">by payment failure</text>

  <!-- Key insight -->
  <rect x="30" y="470" width="840" height="0" rx="0" fill="none" stroke="none"/>

  <defs>
    <marker id="arrBH" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
