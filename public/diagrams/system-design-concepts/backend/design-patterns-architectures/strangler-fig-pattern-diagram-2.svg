<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <title>Strangler Fig Pattern - Migration Stages from Monolith to Microservices</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Strangler Fig: Migration Stages</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Progressive Extraction from Monolith to Microservices</text>

  <!-- Stage 1: All Monolith -->
  <rect x="30" y="85" width="260" height="380" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <rect x="30" y="85" width="260" height="40" rx="10" fill="#ef4444"/>
  <text x="160" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Stage 1: Monolith</text>

  <!-- Big monolith block -->
  <rect x="55" y="150" width="210" height="200" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="160" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Monolith</text>

  <rect x="70" y="195" width="85" height="30" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="112" y="214" text-anchor="middle" font-size="9" fill="#991b1b" font-family="system-ui, sans-serif">Users</text>
  <rect x="165" y="195" width="85" height="30" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="207" y="214" text-anchor="middle" font-size="9" fill="#991b1b" font-family="system-ui, sans-serif">Orders</text>
  <rect x="70" y="235" width="85" height="30" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="112" y="254" text-anchor="middle" font-size="9" fill="#991b1b" font-family="system-ui, sans-serif">Payments</text>
  <rect x="165" y="235" width="85" height="30" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="207" y="254" text-anchor="middle" font-size="9" fill="#991b1b" font-family="system-ui, sans-serif">Inventory</text>
  <rect x="70" y="275" width="85" height="30" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="112" y="294" text-anchor="middle" font-size="9" fill="#991b1b" font-family="system-ui, sans-serif">Notifications</text>
  <rect x="165" y="275" width="85" height="30" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="207" y="294" text-anchor="middle" font-size="9" fill="#991b1b" font-family="system-ui, sans-serif">Analytics</text>
  <rect x="107" y="315" width="115" height="25" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="165" y="332" text-anchor="middle" font-size="9" fill="#991b1b" font-family="system-ui, sans-serif">Shared Database</text>

  <!-- Stage 1 characteristics -->
  <rect x="55" y="370" width="210" height="80" rx="6" fill="#f3f1f8"/>
  <text x="160" y="388" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" font-family="system-ui, sans-serif">Characteristics:</text>
  <text x="160" y="405" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Single codebase, single deploy</text>
  <text x="160" y="420" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">All teams deploy together</text>
  <text x="160" y="435" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7" font-family="system-ui, sans-serif">Hard to scale individual parts</text>

  <!-- Arrow -->
  <line x1="295" y1="275" x2="330" y2="275" stroke="#1a1822" stroke-width="2"/>
  <polygon points="325,270 335,270 330,280" fill="#1a1822"/>

  <!-- Stage 2: Partial Extraction -->
  <rect x="330" y="85" width="270" height="380" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="330" y="85" width="270" height="40" rx="10" fill="#f59e0b"/>
  <text x="465" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Stage 2: Partial Migration</text>

  <!-- Facade -->
  <rect x="355" y="145" width="220" height="30" rx="6" fill="#1a1822"/>
  <text x="465" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Strangler Facade</text>

  <!-- Extracted services -->
  <rect x="355" y="195" width="100" height="60" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="405" y="218" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">User Svc</text>
  <text x="405" y="235" text-anchor="middle" font-size="8" fill="#166534" opacity="0.7" font-family="system-ui, sans-serif">Extracted</text>

  <rect x="470" y="195" width="100" height="60" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="520" y="218" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Order Svc</text>
  <text x="520" y="235" text-anchor="middle" font-size="8" fill="#166534" opacity="0.7" font-family="system-ui, sans-serif">Extracted</text>

  <!-- Remaining monolith (smaller) -->
  <rect x="355" y="275" width="220" height="130" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="465" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b" font-family="system-ui, sans-serif">Monolith (shrinking)</text>
  <rect x="370" y="310" width="85" height="25" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="412" y="327" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Payments</text>
  <rect x="465" y="310" width="85" height="25" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="507" y="327" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Inventory</text>
  <rect x="370" y="342" width="85" height="25" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="412" y="359" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Notifications</text>
  <rect x="465" y="342" width="85" height="25" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="507" y="359" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Analytics</text>
  <rect x="410" y="375" width="110" height="22" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="465" y="390" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Shared DB (partial)</text>

  <!-- Stage 2 characteristics -->
  <rect x="355" y="415" width="220" height="35" rx="6" fill="#f3f1f8"/>
  <text x="465" y="430" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Dual writes, CDC for data sync</text>
  <text x="465" y="445" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Facade routes selectively</text>

  <!-- Arrow -->
  <line x1="605" y1="275" x2="640" y2="275" stroke="#1a1822" stroke-width="2"/>
  <polygon points="635,270 645,270 640,280" fill="#1a1822"/>

  <!-- Stage 3: Fully Migrated -->
  <rect x="640" y="85" width="240" height="380" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <rect x="640" y="85" width="240" height="40" rx="10" fill="#059669"/>
  <text x="760" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff" font-family="system-ui, sans-serif">Stage 3: Complete</text>

  <!-- All microservices -->
  <rect x="660" y="150" width="95" height="45" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="707" y="177" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">User Svc</text>

  <rect x="765" y="150" width="95" height="45" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="812" y="177" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Order Svc</text>

  <rect x="660" y="210" width="95" height="45" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="707" y="237" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Payment Svc</text>

  <rect x="765" y="210" width="95" height="45" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="812" y="237" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Inventory Svc</text>

  <rect x="660" y="270" width="95" height="45" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="707" y="297" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Notify Svc</text>

  <rect x="765" y="270" width="95" height="45" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="812" y="297" text-anchor="middle" font-size="10" font-weight="700" fill="#166534" font-family="system-ui, sans-serif">Analytics Svc</text>

  <!-- Each has own DB -->
  <rect x="660" y="335" width="200" height="30" rx="6" fill="#f3f1f8" stroke="#d1d5db" stroke-width="1"/>
  <text x="760" y="354" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" font-family="system-ui, sans-serif">Each Service Owns Its Database</text>

  <!-- Monolith decommissioned -->
  <rect x="660" y="385" width="200" height="35" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="760" y="407" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b" font-family="system-ui, sans-serif">Monolith: Decommissioned</text>

  <!-- Stage 3 characteristics -->
  <rect x="660" y="430" width="200" height="25" rx="6" fill="#f3f1f8"/>
  <text x="760" y="447" text-anchor="middle" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Independent deploy &amp; scale</text>
</svg>