<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Migration from shared database to database-per-service showing CDC, dual-write, and strangler fig patterns</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Migrating to Database-per-Service</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Three production-safe migration strategies from monolith to service-owned databases</text>

  <!-- BEFORE: Shared Database -->
  <rect x="30" y="80" width="270" height="180" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="35" rx="12" fill="#cc4444"/>
  <rect x="30" y="103" width="270" height="12" fill="#cc4444"/>
  <text x="165" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">BEFORE: Shared Database</text>

  <!-- Monolith -->
  <rect x="50" y="125" width="230" height="40" rx="8" fill="#cc4444" opacity="0.12" stroke="#cc4444" stroke-width="2"/>
  <text x="165" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Monolith Application</text>

  <!-- Shared DB -->
  <line x1="165" y1="165" x2="165" y2="185" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowMIG)"/>
  <rect x="50" y="190" width="230" height="55" rx="8" fill="#cc4444" opacity="0.2" stroke="#cc4444" stroke-width="2"/>
  <text x="165" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Shared Database</text>
  <text x="165" y="233" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">orders, products, shipments, users</text>

  <!-- Arrow: Migration -->
  <line x1="300" y1="170" x2="320" y2="170" stroke="#6d5bd0" stroke-width="3" marker-end="url(#arrowMIG)"/>
  <text x="310" y="155" text-anchor="middle" font-size="9" font-weight="700" fill="#6d5bd0">Migrate</text>

  <!-- AFTER: Database-per-Service -->
  <rect x="600" y="80" width="270" height="180" rx="12" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="35" rx="12" fill="#4caf50"/>
  <rect x="600" y="103" width="270" height="12" fill="#4caf50"/>
  <text x="735" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">AFTER: Database-per-Service</text>

  <!-- 3 mini services -->
  <rect x="620" y="125" width="65" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="652" y="147" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1822">Order</text>

  <rect x="702" y="125" width="65" height="35" rx="6" fill="#2a9d8f" opacity="0.12" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="735" y="147" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1822">Product</text>

  <rect x="784" y="125" width="65" height="35" rx="6" fill="#e76f51" opacity="0.12" stroke="#e76f51" stroke-width="1.5"/>
  <text x="816" y="147" text-anchor="middle" font-size="8" font-weight="600" fill="#1a1822">Shipping</text>

  <!-- 3 mini DBs -->
  <rect x="620" y="170" width="65" height="30" rx="6" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="652" y="189" text-anchor="middle" font-size="7" font-weight="600" fill="#1a1822">OrderDB</text>

  <rect x="702" y="170" width="65" height="30" rx="6" fill="#2a9d8f" opacity="0.2" stroke="#2a9d8f" stroke-width="1"/>
  <text x="735" y="189" text-anchor="middle" font-size="7" font-weight="600" fill="#1a1822">ProdDB</text>

  <rect x="784" y="170" width="65" height="30" rx="6" fill="#e76f51" opacity="0.2" stroke="#e76f51" stroke-width="1"/>
  <text x="816" y="189" text-anchor="middle" font-size="7" font-weight="600" fill="#1a1822">ShipDB</text>

  <line x1="652" y1="160" x2="652" y2="170" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="735" y1="160" x2="735" y2="170" stroke="#2a9d8f" stroke-width="1.5"/>
  <line x1="816" y1="160" x2="816" y2="170" stroke="#e76f51" stroke-width="1.5"/>

  <!-- Three strategies -->
  <!-- Strategy 1: CDC -->
  <rect x="30" y="285" width="270" height="195" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="285" width="270" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="308" width="270" height="12" fill="#6d5bd0"/>
  <text x="165" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1. CDC (Change Data Capture)</text>

  <rect x="50" y="330" width="230" height="40" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="165" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Shared DB (still primary)</text>
  <text x="165" y="363" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Monolith writes here</text>

  <!-- CDC connector -->
  <line x1="165" y1="370" x2="165" y2="390" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowMIG)"/>
  <rect x="60" y="395" width="210" height="35" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="165" y="417" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Debezium / Maxwell CDC</text>

  <line x1="165" y1="430" x2="165" y2="450" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowMIG)"/>
  <rect x="60" y="455" width="210" height="20" rx="6" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <text x="165" y="469" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">New service DB populated from WAL/binlog</text>

  <!-- Strategy 2: Dual-Write -->
  <rect x="315" y="285" width="270" height="195" rx="12" fill="#ffffff" stroke="#2a9d8f" stroke-width="2"/>
  <rect x="315" y="285" width="270" height="35" rx="12" fill="#2a9d8f"/>
  <rect x="315" y="308" width="270" height="12" fill="#2a9d8f"/>
  <text x="450" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2. Dual-Write Pattern</text>

  <rect x="335" y="330" width="230" height="40" rx="8" fill="#2a9d8f" opacity="0.12" stroke="#2a9d8f" stroke-width="2"/>
  <text x="450" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Application writes to BOTH</text>
  <text x="450" y="363" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Shared DB + new service DB</text>

  <!-- Divergence warning -->
  <rect x="345" y="385" width="210" height="40" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="450" y="402" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Risk: divergent writes, lost updates</text>
  <text x="450" y="416" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Use distributed tx or outbox pattern</text>

  <line x1="450" y1="425" x2="450" y2="445" stroke="#2a9d8f" stroke-width="1.5" marker-end="url(#arrowMIG)"/>
  <rect x="355" y="450" width="190" height="20" rx="6" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <text x="450" y="464" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Validate consistency &#8594; cut over</text>

  <!-- Strategy 3: Strangler Fig -->
  <rect x="600" y="285" width="270" height="195" rx="12" fill="#ffffff" stroke="#e76f51" stroke-width="2"/>
  <rect x="600" y="285" width="270" height="35" rx="12" fill="#e76f51"/>
  <rect x="600" y="308" width="270" height="12" fill="#e76f51"/>
  <text x="735" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3. Strangler Fig Pattern</text>

  <!-- Proxy/facade -->
  <rect x="620" y="330" width="230" height="35" rx="8" fill="#e76f51" opacity="0.12" stroke="#e76f51" stroke-width="2"/>
  <text x="735" y="352" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Proxy / Facade Layer</text>

  <!-- Split routes -->
  <line x1="680" y1="365" x2="660" y2="395" stroke="#e76f51" stroke-width="1.5" marker-end="url(#arrowMIG)"/>
  <line x1="790" y1="365" x2="810" y2="395" stroke="#e76f51" stroke-width="1.5" marker-end="url(#arrowMIG)"/>

  <rect x="615" y="400" width="110" height="40" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="670" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">New Service</text>
  <text x="670" y="432" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">Owns its DB</text>

  <rect x="755" y="400" width="110" height="40" rx="8" fill="#cc4444" opacity="0.12" stroke="#cc4444" stroke-width="1.5"/>
  <text x="810" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Monolith</text>
  <text x="810" y="432" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">Legacy path</text>

  <rect x="620" y="450" width="230" height="20" rx="8" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <text x="735" y="464" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Gradually migrate features &#8594; retire monolith</text>

  <defs>
    <marker id="arrowMIG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>