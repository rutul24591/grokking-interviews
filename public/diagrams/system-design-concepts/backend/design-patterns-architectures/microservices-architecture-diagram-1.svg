<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Microservices Architecture - Independent Services</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="38" font-size="18" font-weight="700" fill="#1a1822" text-anchor="middle">Microservices Architecture</text>
  <text x="450" y="56" font-size="12" fill="#1a1822" opacity="0.7" text-anchor="middle">Independent services with own databases communicating via API gateway and message bus</text>

  <!-- Client -->
  <rect x="350" y="80" width="200" height="45" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="108" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">Clients (Web, Mobile, API)</text>

  <line x1="450" y1="128" x2="450" y2="148" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- API Gateway -->
  <rect x="280" y="155" width="340" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="280" y="155" width="340" height="24" rx="8" fill="#6366f1"/>
  <rect x="280" y="170" width="340" height="9" fill="#6366f1"/>
  <text x="450" y="172" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">API Gateway</text>

  <text x="450" y="195" font-size="9" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Routing, Auth, Rate Limiting, Load Balancing</text>

  <!-- Arrows from gateway to services -->
  <line x1="340" y1="208" x2="140" y2="275" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
  <line x1="450" y1="208" x2="450" y2="275" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
  <line x1="560" y1="208" x2="760" y2="275" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>

  <!-- Service 1: Order Service -->
  <rect x="40" y="280" width="200" height="80" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <rect x="40" y="280" width="200" height="22" rx="8" fill="#059669"/>
  <rect x="40" y="294" width="200" height="8" fill="#059669"/>
  <text x="140" y="296" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Order Service</text>
  <text x="140" y="320" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">Order lifecycle mgmt</text>
  <text x="140" y="334" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">REST / gRPC API</text>
  <text x="140" y="348" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">Team: Orders (8 eng)</text>

  <!-- Order DB -->
  <rect x="70" y="380" width="140" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="405" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Orders DB</text>

  <line x1="140" y1="363" x2="140" y2="377" stroke="#059669" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Service 2: User Service -->
  <rect x="350" y="280" width="200" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="350" y="280" width="200" height="22" rx="8" fill="#f59e0b"/>
  <rect x="350" y="294" width="200" height="8" fill="#f59e0b"/>
  <text x="450" y="296" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">User Service</text>
  <text x="450" y="320" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">User profiles &amp; auth</text>
  <text x="450" y="334" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">REST / GraphQL API</text>
  <text x="450" y="348" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">Team: Identity (6 eng)</text>

  <!-- User DB -->
  <rect x="380" y="380" width="140" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="450" y="405" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Users DB</text>

  <line x1="450" y1="363" x2="450" y2="377" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Service 3: Payment Service -->
  <rect x="660" y="280" width="200" height="80" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="660" y="280" width="200" height="22" rx="8" fill="#dc2626"/>
  <rect x="660" y="294" width="200" height="8" fill="#dc2626"/>
  <text x="760" y="296" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Payment Service</text>
  <text x="760" y="320" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">Payment processing</text>
  <text x="760" y="334" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">gRPC API</text>
  <text x="760" y="348" font-size="9" font-weight="400" fill="#1a1822" text-anchor="middle">Team: Payments (10 eng)</text>

  <!-- Payment DB -->
  <rect x="690" y="380" width="140" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="760" y="405" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Payments DB</text>

  <line x1="760" y1="363" x2="760" y2="377" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Message Bus -->
  <rect x="200" y="440" width="500" height="40" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="465" font-size="12" font-weight="700" fill="#1a1822" text-anchor="middle">Message Bus (Kafka / RabbitMQ)</text>

  <!-- Service to bus connections -->
  <line x1="140" y1="423" x2="300" y2="445" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="423" x2="450" y2="437" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="760" y1="423" x2="600" y2="445" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Inter-service async communication label -->
  <text x="450" y="492" font-size="9" font-weight="700" fill="#7c3aed" text-anchor="middle">Async Events: order.created, payment.processed, user.updated</text>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
