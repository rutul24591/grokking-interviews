<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Context mapping patterns: Customer-Supplier, ACL, Conformist, Shared Kernel, Open Host Service, and Separate Ways</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Context Mapping Patterns</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">How bounded contexts integrate &#8594; from shared kernel to anti-corruption layer</text>

  <!-- Pattern 1: Customer-Supplier -->
  <rect x="30" y="80" width="420" height="110" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="240" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">1. Customer-Supplier (Upstream &#8594; Downstream)</text>

  <rect x="50" y="120" width="130" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="115" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Upstream</text>
  <text x="115" y="158" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">sets the model</text>

  <line x1="185" y1="145" x2="265" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowCM)"/>
  <text x="225" y="135" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">supplies</text>

  <rect x="270" y="120" width="140" height="50" rx="8" fill="#e76f51" opacity="0.12" stroke="#e76f51" stroke-width="2"/>
  <text x="340" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Downstream</text>
  <text x="340" y="158" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">consumes the model</text>

  <!-- Pattern 2: Anti-Corruption Layer -->
  <rect x="470" y="80" width="400" height="110" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="670" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">2. Anti-Corruption Layer (ACL)</text>

  <rect x="490" y="120" width="110" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="545" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Upstream</text>

  <line x1="605" y1="145" x2="635" y2="145" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowCM)"/>

  <rect x="640" y="120" width="80" height="50" rx="8" fill="#f0ad4e" opacity="0.2" stroke="#f0ad4e" stroke-width="2"/>
  <text x="680" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#f0ad4e">ACL</text>
  <text x="680" y="158" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">translates</text>

  <line x1="725" y1="145" x2="755" y2="145" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="760" y="120" width="95" height="50" rx="8" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="2"/>
  <text x="807" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Downstream</text>
  <text x="807" y="158" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">own model intact</text>

  <!-- Pattern 3: Shared Kernel -->
  <rect x="30" y="210" width="420" height="110" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="240" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">3. Shared Kernel</text>

  <rect x="50" y="255" width="120" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="110" y="277" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Context A</text>

  <rect x="180" y="255" width="110" height="50" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="2"/>
  <text x="235" y="277" text-anchor="middle" font-size="10" font-weight="700" fill="#f0ad4e">Shared</text>
  <text x="235" y="293" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Kernel</text>

  <rect x="300" y="255" width="120" height="50" rx="8" fill="#e76f51" opacity="0.12" stroke="#e76f51" stroke-width="2"/>
  <text x="360" y="277" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Context B</text>

  <!-- Pattern 4: Conformist -->
  <rect x="470" y="210" width="400" height="110" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="670" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">4. Conformist</text>

  <rect x="490" y="255" width="120" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="550" y="277" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Upstream</text>

  <line x1="615" y1="280" x2="660" y2="280" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="638" y="270" text-anchor="middle" font-size="8" fill="#cc4444" font-weight="600">no ACL</text>

  <rect x="665" y="255" width="180" height="50" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="755" y="277" text-anchor="middle" font-size="10" font-weight="700" fill="#cc4444">Downstream (Conformist)</text>
  <text x="755" y="293" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">adopts upstream model directly</text>

  <!-- Pattern 5: Open Host Service / Published Language -->
  <rect x="30" y="340" width="420" height="135" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="240" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">5. Open Host Service / Published Language</text>

  <rect x="50" y="380" width="140" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="120" y="402" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Open Host Service</text>
  <text x="120" y="418" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">well-defined API</text>

  <rect x="210" y="380" width="90" height="50" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="2"/>
  <text x="255" y="402" text-anchor="middle" font-size="10" font-weight="700" fill="#f0ad4e">Protocol</text>
  <text x="255" y="418" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">(Published Lang)</text>

  <line x1="305" y1="405" x2="335" y2="405" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowCM)"/>

  <rect x="340" y="380" width="90" height="50" rx="8" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="2"/>
  <text x="385" y="402" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Team 1</text>

  <line x1="305" y1="420" x2="305" y2="445" stroke="#6d5bd0" stroke-width="1"/>
  <line x1="305" y1="445" x2="385" y2="445" stroke="#6d5bd0" stroke-width="1"/>
  <line x1="385" y1="445" x2="385" y2="430" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowCM)"/>

  <rect x="340" y="435" width="90" height="30" rx="6" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <text x="385" y="455" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Team 2</text>

  <!-- Pattern 6: Separate Ways -->
  <rect x="470" y="340" width="400" height="135" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="670" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">6. Separate Ways</text>

  <rect x="490" y="385" width="130" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="2"/>
  <text x="555" y="407" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Context A</text>
  <text x="555" y="423" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">independent model</text>

  <line x1="625" y1="410" x2="750" y2="410" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="687" y="400" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">no integration</text>

  <rect x="755" y="385" width="100" height="50" rx="8" fill="#e76f51" opacity="0.12" stroke="#e76f51" stroke-width="2"/>
  <text x="805" y="407" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Context B</text>
  <text x="805" y="423" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">independent model</text>

  <rect x="490" y="445" width="365" height="20" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="672" y="460" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Use when integration cost &gt; benefit &#8594; minimal duplication acceptable</text>

  <defs>
    <marker id="arrowCM" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
  </defs>
</svg>