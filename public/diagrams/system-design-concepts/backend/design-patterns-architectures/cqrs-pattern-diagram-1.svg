<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>CQRS pattern showing Command side (write model) and Query side (read model) with event bus separating them</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">CQRS: Command Query Responsibility Segregation</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Separate write model (commands) from read model (queries) for optimized performance and scalability</text>

  <!-- COMMAND SIDE (LEFT) -->
  <rect x="30" y="80" width="410" height="390" rx="12" fill="none" stroke="#dc2626" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="35" rx="12" fill="#dc2626"/>
  <rect x="30" y="105" width="410" height="10" fill="#dc2626"/>
  <text x="235" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Command Side (Write Model)</text>

  <!-- Command flow -->
  <rect x="60" y="130" width="150" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="135" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Command</text>
  <text x="135" y="168" text-anchor="middle" font-size="9" fill="#64748b">CreateOrder {items: [...]}</text>

  <line x1="210" y1="155" x2="260" y2="155" stroke="#dc2626" stroke-width="2" marker-end="url(#arrCQRS)"/>

  <rect x="260" y="130" width="150" height="50" rx="8" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <text x="335" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Command Handler</text>
  <text x="335" y="168" text-anchor="middle" font-size="9" fill="#64748b">validates, enforces invariants</text>

  <line x1="335" y1="180" x2="335" y2="220" stroke="#4caf50" stroke-width="2" marker-end="url(#arrCQRS)"/>

  <rect x="260" y="220" width="150" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="335" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Aggregate / Entity</text>
  <text x="335" y="258" text-anchor="middle" font-size="9" fill="#64748b">business rules applied</text>

  <line x1="335" y1="270" x2="335" y2="310" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrCQRS)"/>

  <rect x="260" y="310" width="150" height="50" rx="8" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1.5"/>
  <text x="335" y="330" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">Write Database</text>
  <text x="335" y="348" text-anchor="middle" font-size="9" fill="#64748b">normalized, ACID</text>

  <!-- Event published -->
  <rect x="60" y="380" width="350" height="50" rx="8" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="2"/>
  <text x="235" y="400" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">Event Published</text>
  <text x="235" y="418" text-anchor="middle" font-size="9" fill="#1a1822">OrderCreated {orderId: 101, total: $250}</text>

  <line x1="335" y1="360" x2="335" y2="375" stroke="#d97706" stroke-width="2" marker-end="url(#arrCQRS)"/>

  <!-- QUERY SIDE (RIGHT) -->
  <rect x="460" y="80" width="410" height="390" rx="12" fill="none" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="35" rx="12" fill="#4caf50"/>
  <rect x="460" y="105" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Query Side (Read Model)</text>

  <!-- Query flow -->
  <rect x="490" y="130" width="150" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="565" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Query</text>
  <text x="565" y="168" text-anchor="middle" font-size="9" fill="#64748b">GetOrderDetails {orderId: 101}</text>

  <line x1="640" y1="155" x2="690" y2="155" stroke="#4caf50" stroke-width="2" marker-end="url(#arrCQRS)"/>

  <rect x="690" y="130" width="150" height="50" rx="8" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <text x="765" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Query Handler</text>
  <text x="765" y="168" text-anchor="middle" font-size="9" fill="#64748b">no business logic</text>

  <line x1="765" y1="180" x2="765" y2="220" stroke="#4caf50" stroke-width="2" marker-end="url(#arrCQRS)"/>

  <rect x="690" y="220" width="150" height="50" rx="8" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1.5"/>
  <text x="765" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">Read Database</text>
  <text x="765" y="258" text-anchor="middle" font-size="9" fill="#64748b">denormalized, optimized for reads</text>

  <line x1="765" y1="270" x2="765" y2="310" stroke="#2563eb" stroke-width="2" marker-end="url(#arrCQRS)"/>

  <rect x="690" y="310" width="150" height="50" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="765" y="330" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">DTO / View Model</text>
  <text x="765" y="348" text-anchor="middle" font-size="9" fill="#64748b">shaped for UI/API</text>

  <!-- Event subscription -->
  <rect x="490" y="380" width="350" height="50" rx="8" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="2"/>
  <text x="665" y="400" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">Event Subscription</text>
  <text x="665" y="418" text-anchor="middle" font-size="9" fill="#1a1822">Listens for OrderCreated, updates read model</text>

  <!-- Event bus arrow between sides -->
  <line x1="410" y1="405" x2="485" y2="405" stroke="#d97706" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrCQRS)"/>
  <text x="447" y="395" text-anchor="middle" font-size="8" font-weight="600" fill="#d97706">event bus</text>

  <defs>
    <marker id="arrCQRS" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
