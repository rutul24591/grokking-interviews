<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500">
  <defs>
    <linearGradient id="schemaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="perfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fecaca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fca5a5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ownerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="500" fill="#f8fafc" />

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Three Dimensions of Shared Database Contention</text>

  <!-- ===== LEFT: Schema Contention ===== -->
  <rect x="40" y="60" width="280" height="420" rx="12" fill="url(#schemaGrad)" stroke="#f59e0b" stroke-width="2" />
  <text x="180" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400e">1. Schema Contention</text>

  <!-- Teams competing for same table -->
  <rect x="60" y="115" width="100" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" />
  <text x="110" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Team A</text>

  <rect x="200" y="115" width="100" height="40" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" />
  <text x="250" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Team B</text>

  <!-- Arrows converging -->
  <line x1="110" y1="155" x2="160" y2="200" stroke="#d97706" stroke-width="1.5" />
  <line x1="250" y1="155" x2="200" y2="200" stroke="#d97706" stroke-width="1.5" />

  <!-- Shared table -->
  <rect x="80" y="200" width="200" height="50" rx="8" fill="#fbbf24" stroke="#d97706" stroke-width="2" />
  <text x="180" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#78350f">orders table</text>
  <text x="180" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#92400e">Both teams need to modify</text>

  <!-- Conflict examples -->
  <rect x="60" y="270" width="240" height="190" rx="8" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" />
  <text x="75" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Conflict Examples:</text>
  <text x="75" y="318" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#92400e">Team A splits address column</text>
  <text x="75" y="338" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#92400e">Team B relies on old format</text>
  <text x="75" y="368" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#92400e">Team A adds new index</text>
  <text x="75" y="388" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#92400e">Team B writes degrade</text>
  <text x="75" y="418" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#92400e">Column renaming breaks queries</text>
  <text x="75" y="438" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#92400e">Type changes cascade widely</text>

  <!-- ===== CENTER: Performance Contention ===== -->
  <rect x="340" y="60" width="280" height="420" rx="12" fill="url(#perfGrad)" stroke="#ef4444" stroke-width="2" />
  <text x="480" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#991b1b">2. Performance Contention</text>

  <!-- Connection Pool -->
  <rect x="360" y="115" width="240" height="45" rx="8" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" />
  <text x="480" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">Connection Pool (100 connections)</text>

  <!-- Services consuming pool -->
  <rect x="360" y="175" width="70" height="35" rx="6" fill="#fee2e2" stroke="#f87171" stroke-width="1" />
  <text x="395" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Svc A</text>
  <text x="395" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">20 conn</text>

  <rect x="445" y="175" width="70" height="35" rx="6" fill="#fee2e2" stroke="#f87171" stroke-width="1" />
  <text x="480" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Svc B</text>
  <text x="480" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">20 conn</text>

  <rect x="530" y="175" width="70" height="35" rx="6" fill="#fee2e2" stroke="#f87171" stroke-width="1" />
  <text x="565" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Svc C</text>
  <text x="565" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">20 conn</text>

  <!-- Arrows from services to pool -->
  <line x1="395" y1="175" x2="395" y2="160" stroke="#ef4444" stroke-width="1" />
  <line x1="480" y1="175" x2="480" y2="160" stroke="#ef4444" stroke-width="1" />
  <line x1="565" y1="175" x2="565" y2="160" stroke="#ef4444" stroke-width="1" />

  <!-- Resource competition -->
  <rect x="360" y="230" width="240" height="100" rx="8" fill="#fee2e2" stroke="#f87171" stroke-width="1" />
  <text x="375" y="252" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Shared Resources:</text>
  <text x="375" y="272" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">I/O bandwidth</text>
  <text x="375" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">Buffer cache</text>
  <text x="375" y="308" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">Lock manager</text>
  <text x="500" y="272" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">CPU</text>
  <text x="500" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">Memory</text>
  <text x="500" y="308" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">Disk</text>

  <!-- Noisy neighbor example -->
  <rect x="360" y="345" width="240" height="115" rx="8" fill="#fff1f2" stroke="#fda4af" stroke-width="1" />
  <text x="375" y="368" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Noisy Neighbor Scenario:</text>
  <text x="375" y="388" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">Svc A runs full-table scan</text>
  <text x="375" y="406" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">Buffer cache fills with cold data</text>
  <text x="375" y="424" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">Hot data evicted for Svc B, C</text>
  <text x="375" y="442" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#991b1b">Latency spikes across all services</text>

  <!-- ===== RIGHT: Ownership Ambiguity ===== -->
  <rect x="640" y="60" width="280" height="420" rx="12" fill="url(#ownerGrad)" stroke="#6366f1" stroke-width="2" />
  <text x="780" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3730a3">3. Ownership Ambiguity</text>

  <!-- Table with no owner -->
  <rect x="660" y="115" width="240" height="60" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" />
  <text x="780" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">users table</text>
  <text x="780" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4f46e5">Who owns this?</text>

  <!-- Multiple teams claiming -->
  <rect x="660" y="195" width="75" height="35" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1" />
  <text x="697" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3730a3">Auth Svc</text>

  <rect x="745" y="195" width="75" height="35" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1" />
  <text x="782" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3730a3">Profile Svc</text>

  <rect x="830" y="195" width="70" height="35" rx="6" fill="#e0e7ff" stroke="#818cf8" stroke-width="1" />
  <text x="865" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3730a3">Billing Svc</text>

  <!-- Arrows pointing at table -->
  <line x1="697" y1="195" x2="697" y2="175" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2" />
  <line x1="782" y1="195" x2="782" y2="175" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2" />
  <line x1="865" y1="195" x2="865" y2="175" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2" />

  <!-- Consequences -->
  <rect x="660" y="250" width="240" height="210" rx="8" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1" />
  <text x="675" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3730a3">Consequences:</text>
  <text x="675" y="298" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#3730a3">No team manages indexes</text>
  <text x="675" y="318" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#3730a3">Partitioning decisions stall</text>
  <text x="675" y="338" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#3730a3">Data quality degrades</text>
  <text x="675" y="358" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#3730a3">No archival policy</text>
  <text x="675" y="378" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#3730a3">Query performance degrades</text>
  <text x="675" y="398" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#3730a3">Storage grows unchecked</text>
  <text x="675" y="418" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#3730a3">Schema changes blocked</text>
  <text x="675" y="438" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#3730a3">Everyone&apos;s problem = no one&apos;s</text>
</svg>
