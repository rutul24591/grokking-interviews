<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Microservices - Service Decomposition by Business Capability</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="38" font-size="18" font-weight="700" fill="#1a1822" text-anchor="middle">Service Decomposition by Business Capability</text>
  <text x="450" y="56" font-size="12" fill="#1a1822" opacity="0.7" text-anchor="middle">Bounded contexts define service boundaries, not technical layers</text>

  <!-- E-Commerce Domain Context -->
  <rect x="30" y="80" width="840" height="400" rx="12" fill="none" stroke="#1a1822" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="450" y="105" font-size="13" font-weight="700" fill="#1a1822" text-anchor="middle">E-Commerce Domain</text>

  <!-- Bounded Context 1: Catalog -->
  <rect x="55" y="130" width="220" height="150" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <rect x="55" y="130" width="220" height="26" rx="10" fill="#059669"/>
  <rect x="55" y="148" width="220" height="8" fill="#059669"/>
  <text x="165" y="148" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Catalog Context</text>

  <rect x="70" y="168" width="190" height="40" rx="5" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="165" y="185" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Product Service</text>
  <text x="165" y="200" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">CRUD, Search, Inventory</text>

  <rect x="70" y="218" width="190" height="40" rx="5" fill="#ffffff" stroke="#059669" stroke-width="1"/>
  <text x="165" y="235" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Category Service</text>
  <text x="165" y="250" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Taxonomy, Navigation</text>

  <rect x="80" y="268" width="75" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="117" y="283" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">Catalog DB</text>

  <!-- Bounded Context 2: Ordering -->
  <rect x="300" y="130" width="220" height="150" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <rect x="300" y="130" width="220" height="26" rx="10" fill="#6366f1"/>
  <rect x="300" y="148" width="220" height="8" fill="#6366f1"/>
  <text x="410" y="148" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Ordering Context</text>

  <rect x="315" y="168" width="190" height="40" rx="5" fill="#ffffff" stroke="#6366f1" stroke-width="1"/>
  <text x="410" y="185" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Order Service</text>
  <text x="410" y="200" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Create, Track, Cancel</text>

  <rect x="315" y="218" width="190" height="40" rx="5" fill="#ffffff" stroke="#6366f1" stroke-width="1"/>
  <text x="410" y="235" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Cart Service</text>
  <text x="410" y="250" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Session, Temp Storage</text>

  <rect x="325" y="268" width="75" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="362" y="283" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">Order DB</text>

  <!-- Bounded Context 3: Payment -->
  <rect x="545" y="130" width="220" height="150" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="545" y="130" width="220" height="26" rx="10" fill="#f59e0b"/>
  <rect x="545" y="148" width="220" height="8" fill="#f59e0b"/>
  <text x="655" y="148" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Payment Context</text>

  <rect x="560" y="168" width="190" height="40" rx="5" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="655" y="185" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Payment Service</text>
  <text x="655" y="200" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Charge, Refund, Verify</text>

  <rect x="560" y="218" width="190" height="40" rx="5" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="655" y="235" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Billing Service</text>
  <text x="655" y="250" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Invoices, Statements</text>

  <rect x="570" y="268" width="85" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="612" y="283" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">Payment DB</text>

  <!-- Bounded Context 4: Shipping -->
  <rect x="55" y="310" width="220" height="150" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <rect x="55" y="310" width="220" height="26" rx="10" fill="#dc2626"/>
  <rect x="55" y="328" width="220" height="8" fill="#dc2626"/>
  <text x="165" y="328" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Shipping Context</text>

  <rect x="70" y="348" width="190" height="40" rx="5" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="165" y="365" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Shipping Service</text>
  <text x="165" y="380" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Label, Tracking, Rates</text>

  <rect x="70" y="398" width="190" height="40" rx="5" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="165" y="415" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Fulfillment Service</text>
  <text x="165" y="430" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Warehouse, Picking</text>

  <rect x="80" y="448" width="75" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="117" y="463" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">Ship DB</text>

  <!-- Bounded Context 5: User Management -->
  <rect x="300" y="310" width="220" height="150" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <rect x="300" y="310" width="220" height="26" rx="10" fill="#7c3aed"/>
  <rect x="300" y="328" width="220" height="8" fill="#7c3aed"/>
  <text x="410" y="328" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">User Management Context</text>

  <rect x="315" y="348" width="190" height="40" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text x="410" y="365" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Identity Service</text>
  <text x="410" y="380" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Auth, OAuth, Tokens</text>

  <rect x="315" y="398" width="190" height="40" rx="5" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text x="410" y="415" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Profile Service</text>
  <text x="410" y="430" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Preferences, Addresses</text>

  <rect x="325" y="448" width="75" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="362" y="463" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">User DB</text>

  <!-- Bounded Context 6: Notification -->
  <rect x="545" y="310" width="220" height="150" rx="10" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
  <rect x="545" y="310" width="220" height="26" rx="10" fill="#14b8a6"/>
  <rect x="545" y="328" width="220" height="8" fill="#14b8a6"/>
  <text x="655" y="328" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Notification Context</text>

  <rect x="560" y="348" width="190" height="40" rx="5" fill="#ffffff" stroke="#14b8a6" stroke-width="1"/>
  <text x="655" y="365" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Email Service</text>
  <text x="655" y="380" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Templates, Delivery</text>

  <rect x="560" y="398" width="190" height="40" rx="5" fill="#ffffff" stroke="#14b8a6" stroke-width="1"/>
  <text x="655" y="415" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">SMS / Push Service</text>
  <text x="655" y="430" font-size="8" font-weight="400" fill="#1a1822" opacity="0.7" text-anchor="middle">Multi-channel alerts</text>

  <rect x="570" y="448" width="85" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="612" y="463" font-size="8" font-weight="700" fill="#1a1822" text-anchor="middle">Notify DB</text>

  <!-- Inter-context communication (event-driven) -->
  <!-- Catalog -> Ordering: product reserved -->
  <path d="M 275 205 Q 290 180 300 185" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="260" y="175" font-size="7" font-weight="400" fill="#6b7280">reserve</text>

  <!-- Ordering -> Payment: payment requested -->
  <path d="M 520 205 Q 535 180 545 185" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="515" y="175" font-size="7" font-weight="400" fill="#6b7280">charge</text>

  <!-- Ordering -> Shipping: ship order -->
  <path d="M 410 283 L 410 300 Q 410 310 275 330" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="340" y="300" font-size="7" font-weight="400" fill="#6b7280">ship</text>

  <!-- Payment -> Notification: receipt -->
  <path d="M 655 283 L 655 307" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="665" y="298" font-size="7" font-weight="400" fill="#6b7280">receipt</text>

  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
