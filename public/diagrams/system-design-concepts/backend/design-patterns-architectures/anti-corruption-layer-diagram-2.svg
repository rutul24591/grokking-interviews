<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>ACL translation flow showing legacy data model transformation through translator, validator, and防腐 filter into clean domain model</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">ACL Translation Pipeline</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Legacy data flows through translator, validator, and防腐 filter before reaching the domain</text>

  <!-- Legacy Data Example -->
  <rect x="30" y="80" width="180" height="380" rx="10" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Legacy Payload</text>

  <rect x="45" y="120" width="150" height="30" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="140" text-anchor="middle" font-size="9" fill="#1a1822">cust_id: "C-001"</text>

  <rect x="45" y="155" width="150" height="30" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="175" text-anchor="middle" font-size="9" fill="#1a1822">amount: "1250.00"</text>

  <rect x="45" y="190" width="150" height="30" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="210" text-anchor="middle" font-size="9" fill="#1a1822">status: 1 (active)</text>

  <rect x="45" y="225" width="150" height="30" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="245" text-anchor="middle" font-size="9" fill="#1a1822">dob: "01/15/1990"</text>

  <rect x="45" y="260" width="150" height="30" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="280" text-anchor="middle" font-size="9" fill="#1a1822">email: "john@test"</text>

  <rect x="45" y="295" width="150" height="30" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="315" text-anchor="middle" font-size="9" fill="#1a1822">addr: "123 Main St"</text>

  <rect x="45" y="330" width="150" height="30" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="350" text-anchor="middle" font-size="9" fill="#1a1822">flags: null</text>

  <rect x="45" y="365" width="150" height="30" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="385" text-anchor="middle" font-size="9" fill="#1a1822">extra: "unused_field"</text>

  <text x="120" y="430" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">⚠ Inconsistent types</text>
  <text x="120" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">⚠ Magic values</text>

  <!-- Arrow to Translator -->
  <line x1="210" y1="250" x2="250" y2="250" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrACL)"/>

  <!-- ACL: Translator -->
  <rect x="250" y="80" width="200" height="130" rx="10" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="2"/>
  <text x="350" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">1. Translator</text>
  <text x="265" y="130" font-size="9" fill="#1a1822">• cust_id → CustomerId (value object)</text>
  <text x="265" y="148" font-size="9" fill="#1a1822">• "1250.00" → Money(1250.00, USD)</text>
  <text x="265" y="166" font-size="9" fill="#1a1822">• status: 1 → CustomerStatus.Active</text>
  <text x="265" y="184" font-size="9" fill="#1a1822">• "01/15/1990" → Date(1990-01-15)</text>
  <text x="265" y="202" font-size="9" fill="#1a1822">• addr → Address object (parsed)</text>

  <!-- Arrow -->
  <line x1="450" y1="145" x2="490" y2="145" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrACL)"/>

  <!-- ACL: Validator -->
  <rect x="490" y="80" width="200" height="130" rx="10" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="2"/>
  <text x="590" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">2. Validator</text>
  <text x="505" y="130" font-size="9" fill="#1a1822">✓ email format valid</text>
  <text x="505" y="148" font-size="9" fill="#1a1822">✓ amount &gt; 0</text>
  <text x="505" y="166" font-size="9" fill="#1a1822">✓ dob is in the past</text>
  <text x="505" y="184" font-size="9" fill="#1a1822">✗ null flags → default Flags.None</text>
  <text x="505" y="202" font-size="9" fill="#1a1822">✓ extra fields stripped</text>

  <!-- Arrow -->
  <line x1="690" y1="145" x2="730" y2="145" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrACL)"/>

  <!-- ACL:防腐 Filter -->
  <rect x="250" y="260" width="200" height="130" rx="10" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="2"/>
  <text x="350" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">3.防腐 Filter</text>
  <text x="265" y="310" font-size="9" fill="#1a1822">• PII fields masked/encrypted</text>
  <text x="265" y="328" font-size="9" fill="#1a1822">• Dangerous values sanitized</text>
  <text x="265" y="346" font-size="9" fill="#1a1822">• Injection patterns removed</text>
  <text x="265" y="364" font-size="9" fill="#1a1822">• Size limits enforced</text>
  <text x="265" y="382" font-size="9" fill="#1a1822">• Audit log entry created</text>

  <!-- Arrow to Domain -->
  <line x1="450" y1="325" x2="490" y2="325" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrACL)"/>

  <!-- Clean Domain Model -->
  <rect x="490" y="260" width="380" height="130" rx="10" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="2"/>
  <text x="680" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">Clean Domain Model</text>

  <rect x="510" y="300" width="150" height="70" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="585" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Customer</text>
  <text x="585" y="338" text-anchor="middle" font-size="8" fill="#64748b">id: CustomerId</text>
  <text x="585" y="352" text-anchor="middle" font-size="8" fill="#64748b">balance: Money</text>
  <text x="585" y="366" text-anchor="middle" font-size="8" fill="#64748b">status: CustomerStatus</text>

  <rect x="680" y="300" width="170" height="70" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="765" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Value Objects</text>
  <text x="765" y="338" text-anchor="middle" font-size="8" fill="#64748b">CustomerId, Money, Date,</text>
  <text x="765" y="352" text-anchor="middle" font-size="8" fill="#64748b">Address, Email, Flags</text>
  <text x="765" y="366" text-anchor="middle" font-size="8" fill="#64748b">— all immutable, validated</text>

  <!-- Rejection path -->
  <rect x="250" y="420" width="620" height="60" rx="8" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1.5"/>
  <text x="560" y="442" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Rejection Path:</text>
  <text x="560" y="462" text-anchor="middle" font-size="10" fill="#1a1822">Invalid data → ValidationError returned to caller → NO data reaches domain model → audit log records the rejection</text>

  <defs>
    <marker id="arrACL" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
