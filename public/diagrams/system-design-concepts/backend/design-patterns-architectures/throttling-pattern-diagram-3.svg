<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Throttling Strategies Comparison</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="52" rx="12" fill="#1a1822"/>
  <rect x="0" y="40" width="900" height="12" fill="#1a1822"/>
  <text x="30" y="33" font-size="18" font-weight="700" fill="#ffffff">Throttling Strategies Comparison</text>
  <text x="30" y="75" font-size="12" fill="#1a1822" opacity="0.7">Four common approaches with different trade-offs in fairness, complexity, and burst handling</text>
  
  <!-- Fixed Window -->
  <rect x="20" y="95" width="210" height="390" rx="8" fill="#e8e5f0" stroke="#7c6a96" stroke-width="1.5"/>
  <rect x="20" y="95" width="210" height="32" rx="8" fill="#7c6a96"/>
  <rect x="20" y="113" width="210" height="14" fill="#7c6a96"/>
  <text x="125" y="116" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Fixed Window</text>
  
  <!-- Fixed Window visualization -->
  <rect x="35" y="145" width="180" height="35" rx="4" fill="#e8f5ec" stroke="#4a9c5d" stroke-width="1"/>
  <text x="125" y="160" font-size="10" font-weight="600" fill="#4a9c5d" text-anchor="middle">Window 1: 100 requests allowed</text>
  <text x="125" y="174" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">[0s - 60s]</text>
  
  <rect x="35" y="185" width="180" height="35" rx="4" fill="#e8f5ec" stroke="#4a9c5d" stroke-width="1"/>
  <text x="125" y="200" font-size="10" font-weight="600" fill="#4a9c5d" text-anchor="middle">Window 2: 100 requests allowed</text>
  <text x="125" y="214" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">[60s - 120s]</text>
  
  <rect x="35" y="225" width="180" height="35" rx="4" fill="#f0e8e8" stroke="#c45c5c" stroke-width="1"/>
  <text x="125" y="240" font-size="10" font-weight="600" fill="#c45c5c" text-anchor="middle">Window 3: 100 requests allowed</text>
  <text x="125" y="254" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">[120s - 180s]</text>
  
  <!-- Burst at boundary issue -->
  <path d="M 35 280 L 215 280" stroke="#1a1822" stroke-width="1" opacity="0.3"/>
  <text x="125" y="298" font-size="10" font-weight="600" fill="#c45c5c" text-anchor="middle">&#x26a0; Burst at boundary</text>
  <text x="125" y="315" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">2x burst possible at window edge</text>
  
  <text x="125" y="350" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Pros:</text>
  <text x="40" y="370" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Simple to implement</text>
  <text x="40" y="386" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Low memory overhead</text>
  <text x="40" y="402" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Good for basic quotas</text>
  
  <text x="125" y="425" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Cons:</text>
  <text x="40" y="445" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Boundary burst vulnerability</text>
  <text x="40" y="461" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Coarse-grained control</text>
  
  <!-- Sliding Window -->
  <rect x="245" y="95" width="210" height="390" rx="8" fill="#e8e5f0" stroke="#7c6a96" stroke-width="1.5"/>
  <rect x="245" y="95" width="210" height="32" rx="8" fill="#7c6a96"/>
  <rect x="245" y="113" width="210" height="14" fill="#7c6a96"/>
  <text x="350" y="116" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Sliding Window</text>
  
  <!-- Sliding Window visualization -->
  <rect x="260" y="145" width="180" height="50" rx="4" fill="#e8e5f0" stroke="#7c6a96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="350" y="165" font-size="10" font-weight="600" fill="#7c6a96" text-anchor="middle">Sliding Window</text>
  <text x="350" y="180" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">Counts requests in last N seconds</text>
  
  <path d="M 260 210 L 440 210" stroke="#1a1822" stroke-width="1" opacity="0.3"/>
  <path d="M 260 225 L 440 225" stroke="#1a1822" stroke-width="1" opacity="0.3"/>
  <path d="M 260 240 L 440 240" stroke="#1a1822" stroke-width="1" opacity="0.3"/>
  
  <!-- Request dots -->
  <circle cx="280" cy="170" r="4" fill="#4a9c5d"/>
  <circle cx="300" cy="170" r="4" fill="#4a9c5d"/>
  <circle cx="320" cy="170" r="4" fill="#4a9c5d"/>
  <circle cx="340" cy="170" r="4" fill="#4a9c5d"/>
  <circle cx="360" cy="170" r="4" fill="#c45c5c"/>
  <circle cx="380" cy="170" r="4" fill="#c45c5c"/>
  <circle cx="400" cy="170" r="4" fill="#4a9c5d"/>
  <circle cx="420" cy="170" r="4" fill="#4a9c5d"/>
  
  <!-- Time axis -->
  <text x="350" y="265" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">--- t-60s ---|--- Now ---&gt;</text>
  
  <text x="350" y="300" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Pros:</text>
  <text x="265" y="320" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; No boundary burst issue</text>
  <text x="265" y="336" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Smoother rate limiting</text>
  <text x="265" y="352" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Fair distribution over time</text>
  
  <text x="350" y="375" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Cons:</text>
  <text x="265" y="395" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Higher memory (stores timestamps)</text>
  <text x="265" y="411" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; More complex implementation</text>
  <text x="265" y="427" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Approximation needed for scale</text>
  
  <!-- Token Bucket -->
  <rect x="470" y="95" width="210" height="390" rx="8" fill="#e8e5f0" stroke="#7c6a96" stroke-width="1.5"/>
  <rect x="470" y="95" width="210" height="32" rx="8" fill="#7c6a96"/>
  <rect x="470" y="113" width="210" height="14" fill="#7c6a96"/>
  <text x="575" y="116" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Token Bucket</text>
  
  <!-- Token Bucket visualization -->
  <rect x="520" y="145" width="110" height="80" rx="6" fill="#e8e5f0" stroke="#7c6a96" stroke-width="1.5"/>
  <text x="575" y="165" font-size="10" font-weight="600" fill="#7c6a96" text-anchor="middle">Bucket</text>
  
  <!-- Tokens -->
  <circle cx="540" cy="190" r="8" fill="#6b5b95" opacity="0.8"/>
  <circle cx="560" cy="190" r="8" fill="#6b5b95" opacity="0.8"/>
  <circle cx="580" cy="190" r="8" fill="#6b5b95" opacity="0.8"/>
  <circle cx="600" cy="190" r="8" fill="#6b5b95" opacity="0.8"/>
  <circle cx="550" cy="210" r="8" fill="#6b5b95" opacity="0.5"/>
  <circle cx="570" cy="210" r="8" fill="#6b5b95" opacity="0.5"/>
  <circle cx="590" cy="210" r="8" fill="#6b5b95" opacity="0.5"/>
  
  <!-- Refill arrow -->
  <path d="M 495 185 L 515 185" stroke="#4a9c5d" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="505" y="175" font-size="8" fill="#4a9c5d" text-anchor="middle">+R/s</text>
  
  <!-- Consume arrow -->
  <path d="M 635 185 L 660 185" stroke="#c45c5c" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text x="648" y="175" font-size="8" fill="#c45c5c" text-anchor="middle">-1</text>
  
  <text x="575" y="255" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Pros:</text>
  <text x="485" y="275" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Allows controlled bursts</text>
  <text x="485" y="291" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; O(1) per request</text>
  <text x="485" y="307" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Smooth sustained traffic</text>
  <text x="485" y="323" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Low memory footprint</text>
  
  <text x="575" y="346" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Cons:</text>
  <text x="485" y="366" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Burst can exceed rate temporarily</text>
  <text x="485" y="382" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Token accumulation edge cases</text>
  <text x="485" y="398" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Tuning bucket size is tricky</text>
  
  <!-- Leaky Bucket -->
  <rect x="695" y="95" width="185" height="390" rx="8" fill="#e8e5f0" stroke="#7c6a96" stroke-width="1.5"/>
  <rect x="695" y="95" width="185" height="32" rx="8" fill="#7c6a96"/>
  <rect x="695" y="113" width="185" height="14" fill="#7c6a96"/>
  <text x="787" y="116" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Leaky Bucket</text>
  
  <!-- Leaky Bucket visualization -->
  <path d="M 740 155 L 835 155 L 820 225 L 755 225 Z" fill="#e8e5f0" stroke="#7c6a96" stroke-width="1.5"/>
  <text x="787" y="180" font-size="10" font-weight="600" fill="#7c6a96" text-anchor="middle">Queue</text>
  <text x="787" y="195" font-size="9" fill="#1a1822" opacity="0.7" text-anchor="middle">(FIFO)</text>
  
  <!-- Incoming arrow -->
  <path d="M 710 170 L 735 170" stroke="#c45c5c" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text x="722" y="162" font-size="8" fill="#c45c5c" text-anchor="middle">In</text>
  
  <!-- Leak arrow -->
  <path d="M 787 230 L 787 255" stroke="#4a9c5d" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="787" y="248" font-size="8" fill="#4a9c5d" text-anchor="middle">Leak</text>
  <text x="787" y="260" font-size="8" fill="#4a9c5d" text-anchor="middle">rate/s</text>
  
  <text x="787" y="290" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Pros:</text>
  <text x="710" y="310" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Constant output rate</text>
  <text x="710" y="326" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Guarantees steady flow</text>
  <text x="710" y="342" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Simple queue semantics</text>
  
  <text x="787" y="365" font-size="10" font-weight="700" fill="#1a1822" text-anchor="middle">Cons:</text>
  <text x="710" y="385" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Queue can grow unbounded</text>
  <text x="710" y="401" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Added latency from queuing</text>
  <text x="710" y="417" font-size="9" fill="#1a1822" opacity="0.85">&#x2022; Not burst-friendly</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9c5d"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c45c5c"/>
    </marker>
  </defs>
</svg>