<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <!-- Background -->
  <rect width="960" height="520" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="480" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Architecture Comparison: Layered vs Hexagonal vs Clean</text>
  <text x="480" y="65" font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Three approaches to organizing code with different dependency rules</text>

  <!-- ==================== LAYERED ==================== -->
  <text x="160" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">Layered Architecture</text>

  <!-- Layers stacked -->
  <rect x="60" y="125" width="200" height="48" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="155" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3730a3" text-anchor="middle">Presentation</text>

  <rect x="60" y="180" width="200" height="48" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="210" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af" text-anchor="middle">Business Logic</text>

  <rect x="60" y="235" width="200" height="48" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="160" y="265" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">Persistence</text>

  <rect x="60" y="290" width="200" height="48" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="160" y="320" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">Database</text>

  <!-- Dependency arrows downward -->
  <line x1="160" y1="173" x2="160" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <line x1="160" y1="228" x2="160" y2="235" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <line x1="160" y1="283" x2="160" y2="290" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Pros/Cons -->
  <rect x="60" y="360" width="200" height="65" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="382" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">+ Simple, familiar structure</text>
  <text x="70" y="398" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">+ Easy for small apps</text>
  <text x="70" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">- Tight coupling to infra</text>

  <rect x="60" y="435" width="200" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="457" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">- Hard to swap dependencies</text>
  <text x="70" y="473" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">- Poor testability at scale</text>

  <!-- ==================== HEXAGONAL ==================== -->
  <text x="480" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">Hexagonal (Ports &amp; Adapters)</text>

  <!-- Hexagon core -->
  <polygon points="480,145 580,200 580,310 480,365 380,310 380,200" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af" text-anchor="middle">Domain</text>
  <text x="480" y="262" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af" text-anchor="middle">Core</text>
  <text x="480" y="284" font-family="Arial, sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">Port Interfaces</text>

  <!-- Adapters around -->
  <rect x="300" y="170" width="70" height="36" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="335" y="193" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle">REST</text>

  <rect x="300" y="260" width="70" height="36" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="335" y="283" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534" text-anchor="middle">Events</text>

  <rect x="590" y="170" width="70" height="36" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="625" y="193" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">DB</text>

  <rect x="590" y="260" width="70" height="36" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="625" y="283" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">Cache</text>

  <!-- Arrows: adapters to core -->
  <line x1="370" y1="188" x2="380" y2="200" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="370" y1="278" x2="380" y2="290" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="590" y1="188" x2="580" y2="200" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <line x1="590" y1="278" x2="580" y2="290" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Pros/Cons -->
  <rect x="380" y="390" width="200" height="65" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="390" y="412" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">+ Technology agnostic</text>
  <text x="390" y="428" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">+ Excellent testability</text>
  <text x="390" y="444" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">- More boilerplate code</text>

  <rect x="380" y="465" width="200" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="390" y="487" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">- Learning curve for teams</text>

  <!-- ==================== CLEAN ==================== -->
  <text x="800" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">Clean Architecture</text>

  <!-- Concentric circles (simplified as rectangles) -->
  <!-- Outer: Frameworks & Drivers -->
  <rect x="700" y="125" width="200" height="44" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="800" y="153" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6b21a8" text-anchor="middle">Frameworks &amp; Drivers</text>

  <!-- Interface Adapters -->
  <rect x="700" y="180" width="200" height="44" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="800" y="208" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9d174d" text-anchor="middle">Interface Adapters</text>

  <!-- Use Cases -->
  <rect x="700" y="235" width="200" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="800" y="263" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">Use Cases</text>

  <!-- Entities -->
  <rect x="700" y="290" width="200" height="44" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="800" y="318" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">Entities (Enterprise Rules)</text>

  <!-- Dependency arrows inward -->
  <line x1="800" y1="169" x2="800" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <line x1="800" y1="224" x2="800" y2="235" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <line x1="800" y1="279" x2="800" y2="290" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- Pros/Cons -->
  <rect x="700" y="360" width="200" height="65" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="710" y="382" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">+ Strict dependency rule</text>
  <text x="710" y="398" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">+ Framework independent</text>
  <text x="710" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">- Highest complexity</text>

  <rect x="700" y="435" width="200" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="710" y="457" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">- Overkill for simple apps</text>
  <text x="710" y="473" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">- Heavy abstraction layering</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Bottom summary -->
  <rect x="60" y="490" width="840" height="24" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="480" y="507" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0c4a6e" text-anchor="middle">All three enforce dependency direction: Layered (top-down), Hexagonal (inward via ports), Clean (inward via concentric layers)</text>
</svg>
