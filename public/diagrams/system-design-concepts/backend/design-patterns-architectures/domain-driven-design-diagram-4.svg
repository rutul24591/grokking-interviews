<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="8" fill="#f8fafc" />
  <rect width="960" height="520" rx="8" fill="none" stroke="#e2e8f0" stroke-width="2" />

  <!-- Title -->
  <text x="480" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1e293b" text-anchor="middle">DDD vs Traditional Layered Architecture</text>
  <text x="480" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="normal" fill="#64748b" text-anchor="middle">How DDD reorganizes responsibility and data flow</text>

  <!-- LEFT: Traditional Layered Architecture -->
  <rect x="40" y="100" width="420" height="380" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="250" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Traditional Layered Architecture</text>
  <line x1="80" y1="142" x2="420" y2="142" stroke="#cbd5e1" stroke-width="1" />

  <!-- Presentation Layer -->
  <rect x="80" y="158" width="300" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" />
  <text x="230" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af" text-anchor="middle">Presentation Layer (UI/Controllers)</text>

  <!-- Business Logic Layer -->
  <rect x="80" y="218" width="300" height="44" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
  <text x="230" y="245" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">Business Logic Layer (Services)</text>

  <!-- Data Access Layer -->
  <rect x="80" y="278" width="300" height="44" rx="6" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.5" />
  <text x="230" y="305" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">Data Access Layer (Repositories/DAO)</text>

  <!-- Database -->
  <rect x="80" y="338" width="300" height="44" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="230" y="365" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#475569" text-anchor="middle">Database (Tables drive structure)</text>

  <!-- Arrows between layers -->
  <line x1="230" y1="202" x2="230" y2="213" stroke="#64748b" stroke-width="1.5" marker-end="url(#a1)" />
  <line x1="230" y1="262" x2="230" y2="273" stroke="#64748b" stroke-width="1.5" marker-end="url(#a1)" />
  <line x1="230" y1="322" x2="230" y2="333" stroke="#64748b" stroke-width="1.5" marker-end="url(#a1)" />

  <!-- Problem note -->
  <rect x="80" y="405" width="300" height="55" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1" />
  <text x="230" y="425" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b" text-anchor="middle">Problems:</text>
  <text x="230" y="445" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#6b7280" text-anchor="middle">Anemic models, database-driven design,</text>
  <text x="230" y="458" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#6b7280" text-anchor="middle">scattered business logic, no domain ownership</text>

  <!-- RIGHT: DDD Architecture -->
  <rect x="500" y="100" width="420" height="380" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="710" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Domain-Driven Design Architecture</text>
  <line x1="540" y1="142" x2="880" y2="142" stroke="#cbd5e1" stroke-width="1" />

  <!-- Domain Layer (center) -->
  <rect x="540" y="158" width="340" height="55" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" />
  <text x="710" y="182" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5b21b6" text-anchor="middle">Domain Layer (Entities, Aggregates,</text>
  <text x="710" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#5b21b6" text-anchor="middle">Value Objects, Domain Events)</text>

  <!-- Application Layer -->
  <rect x="540" y="230" width="340" height="44" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" />
  <text x="710" y="257" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e" text-anchor="middle">Application Layer (Use Cases, Orchestration)</text>

  <!-- Infrastructure Layer -->
  <rect x="540" y="290" width="340" height="44" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" />
  <text x="710" y="317" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#475569" text-anchor="middle">Infrastructure Layer (DB, External Services)</text>

  <!-- UI / API -->
  <rect x="540" y="350" width="340" height="44" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" />
  <text x="710" y="377" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af" text-anchor="middle">Interfaces Layer (API, UI, CLI)</text>

  <!-- Dependency arrows (inverted - depends on domain) -->
  <line x1="710" y1="274" x2="710" y2="218" stroke="#7c3aed" stroke-width="2" marker-end="url(#a1)" />
  <text x="725" y="250" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7c3aed">depends on</text>

  <line x1="710" y1="334" x2="710" y2="279" stroke="#64748b" stroke-width="1.5" marker-end="url(#a1)" />
  <line x1="710" y1="394" x2="710" y2="339" stroke="#64748b" stroke-width="1.5" marker-end="url(#a1)" />

  <!-- Advantage note -->
  <rect x="540" y="415" width="340" height="50" rx="6" fill="#ecfdf5" stroke="#86efac" stroke-width="1" />
  <text x="710" y="435" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">Advantages:</text>
  <text x="710" y="452" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#475569" text-anchor="middle">Rich domain model, business logic in domain,</text>
  <text x="710" y="465" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#475569" text-anchor="middle">bounded contexts, ubiquitous language, testable</text>
</svg>