<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <title>Normalized vs Denormalized Schema: JOIN Elimination</title>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1822">Normalized vs Denormalized Schema: JOIN Elimination</text>

  <!-- LEFT: Normalized Schema -->
  <rect x="30" y="70" width="400" height="420" rx="12" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="230" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#4338ca">Normalized Schema</text>

  <!-- Users table -->
  <rect x="60" y="130" width="160" height="120" rx="8" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="140" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">users</text>
  <text x="75" y="180" font-size="11" fill="#4338ca">id (PK)</text>
  <text x="75" y="198" font-size="11" fill="#4338ca">name</text>
  <text x="75" y="216" font-size="11" fill="#4338ca">email</text>
  <text x="75" y="234" font-size="11" fill="#4338ca">city</text>

  <!-- Orders table -->
  <rect x="260" y="130" width="150" height="120" rx="8" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="2"/>
  <text x="335" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">orders</text>
  <text x="275" y="180" font-size="11" fill="#1d4ed8">id (PK)</text>
  <text x="275" y="198" font-size="11" fill="#1d4ed8">user_id (FK)</text>
  <text x="275" y="216" font-size="11" fill="#1d4ed8">total</text>
  <text x="275" y="234" font-size="11" fill="#1d4ed8">created_at</text>

  <!-- JOIN operation -->
  <rect x="100" y="290" width="220" height="60" rx="8" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="210" y="315" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">JOIN users.id = orders.user_id</text>
  <text x="210" y="335" text-anchor="middle" font-size="11" fill="#92400e">Expensive at scale</text>

  <!-- Arrow from users to JOIN -->
  <line x1="140" y1="250" x2="170" y2="290" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <!-- Arrow from orders to JOIN -->
  <line x1="335" y1="250" x2="260" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Result -->
  <rect x="80" y="380" width="260" height="80" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="210" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">Query Result: user_name, order_total</text>
  <text x="210" y="425" text-anchor="middle" font-size="11" fill="#15803d">Requires disk I/O for both tables + hash join</text>
  <text x="210" y="445" text-anchor="middle" font-size="11" fill="#15803d">Latency: O(N + M) per query</text>
  <line x1="210" y1="350" x2="210" y2="380" stroke="#d97706" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- RIGHT: Denormalized Schema -->
  <rect x="470" y="70" width="400" height="420" rx="12" fill="#db2777" opacity="0.08" stroke="#db2777" stroke-width="2"/>
  <text x="670" y="105" text-anchor="middle" font-size="18" font-weight="bold" fill="#9d174d">Denormalized Schema</text>

  <!-- Denormalized orders table -->
  <rect x="500" y="130" width="340" height="160" rx="8" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="2"/>
  <text x="670" y="158" text-anchor="middle" font-size="14" font-weight="bold" fill="#9d174d">orders_denormalized</text>
  <text x="515" y="182" font-size="11" fill="#9d174d">id (PK)</text>
  <text x="515" y="202" font-size="11" fill="#9d174d">user_id</text>
  <text x="515" y="222" font-size="11" fill="#9d174d">user_name  (duplicated from users)</text>
  <text x="515" y="242" font-size="11" fill="#9d174d">user_email (duplicated from users)</text>
  <text x="515" y="262" font-size="11" fill="#9d174d">user_city  (duplicated from users)</text>
  <text x="515" y="282" font-size="11" fill="#9d174d">total, created_at</text>

  <!-- Direct query - no JOIN needed -->
  <rect x="520" y="320" width="300" height="60" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">Single-table scan: No JOIN</text>
  <text x="670" y="365" text-anchor="middle" font-size="11" fill="#15803d">All data co-located on same row</text>

  <!-- Result -->
  <rect x="520" y="400" width="300" height="70" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="670" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">Query Result: same data, faster</text>
  <text x="670" y="445" text-anchor="middle" font-size="11" fill="#15803d">Single disk I/O, no join overhead</text>
  <text x="670" y="460" text-anchor="middle" font-size="11" fill="#15803d">Latency: O(1) per row lookup</text>
  <line x1="670" y1="380" x2="670" y2="400" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- VS badge -->
  <circle cx="450" cy="280" r="28" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="287" text-anchor="middle" font-size="18" font-weight="bold" fill="#92400e">VS</text>
</svg>