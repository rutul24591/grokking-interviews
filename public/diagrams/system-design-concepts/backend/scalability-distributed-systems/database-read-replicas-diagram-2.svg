<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Read Routing Strategies</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">How reads are distributed across replicas: round-robin, lag-aware, sticky session, and read-your-writes</text>

  <!-- Strategy 1: Round-Robin -->
  <rect x="30" y="80" width="410" height="100" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="235" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Round-Robin</text>
  <text x="50" y="130" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Read 1 &#8594; Replica A | Read 2 &#8594; Replica B | Read 3 &#8594; Replica C | Read 4 &#8594; Replica A</text>
  <text x="50" y="150" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">+ Simple, even distribution</text>
  <text x="50" y="168" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">- Ignores replication lag, may return stale data</text>

  <!-- Strategy 2: Lag-Aware -->
  <rect x="460" y="80" width="410" height="100" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="665" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Lag-Aware Routing</text>
  <text x="480" y="130" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Check replica lag &#8594; route to least-lagged replica that meets threshold</text>
  <text x="480" y="150" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">+ Minimizes stale reads</text>
  <text x="480" y="168" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">- Overhead of lag monitoring per request</text>

  <!-- Strategy 3: Sticky Session -->
  <rect x="30" y="200" width="410" height="100" rx="8" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
  <text x="235" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Sticky Session</text>
  <text x="50" y="250" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">User X &#8594; always Replica B for entire session</text>
  <text x="50" y="270" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">+ Consistent reads within session, cache-friendly</text>
  <text x="50" y="288" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">- Uneven load, replica failure breaks session</text>

  <!-- Strategy 4: Read-Your-Writes -->
  <rect x="460" y="200" width="410" height="100" rx="8" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="2"/>
  <text x="665" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Read-Your-Writes Consistency</text>
  <text x="480" y="250" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Track user&apos;s last write offset &#8594; route to replica caught up to that offset</text>
  <text x="480" y="270" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">+ Users see their own writes immediately</text>
  <text x="480" y="288" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">- Some reads must go to primary (higher latency)</text>

  <!-- Lag visualization -->
  <text x="450" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Replication Lag Across Replicas</text>

  <!-- Primary -->
  <rect x="40" y="360" width="160" height="50" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="120" y="382" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Primary</text>
  <text x="120" y="400" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Offset: 1000</text>

  <!-- Replication lag bars -->
  <rect x="230" y="365" width="280" height="18" rx="3" fill="#4f46e5" opacity="0.7"/>
  <text x="240" y="378" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Replica A: offset 998 (lag: 2ms)</text>

  <rect x="230" y="390" width="240" height="18" rx="3" fill="#16a34a" opacity="0.7"/>
  <text x="240" y="403" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Replica B: offset 990 (lag: 45ms)</text>

  <rect x="230" y="415" width="170" height="18" rx="3" fill="#d97706" opacity="0.7"/>
  <text x="240" y="428" font-size="9" fill="#1a1822" font-family="system-ui, sans-serif">Replica C: offset 970 (lag: 120ms)</text>

  <!-- Decision -->
  <rect x="530" y="360" width="330" height="140" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="545" y="382" font-size="12" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Routing Decision:</text>
  <text x="545" y="405" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">User last write offset: 995</text>
  <text x="545" y="425" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Replica A (998 &gt; 995) &#8594; ROUTE HERE</text>
  <text x="545" y="445" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Replica B (990 &lt; 995) &#8594; too stale</text>
  <text x="545" y="465" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Replica C (970 &lt; 995) &#8594; too stale</text>
  <text x="545" y="488" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Fallback: If no replica caught up, route to Primary</text>
</svg>