<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <title>Node addition and rebalancing flow showing minimal key movement</title>

  <rect width="900" height="520" rx="12" fill="#f3f1f8"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Node Addition &amp; Rebalancing Flow</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Only keys between the new node and its predecessor need to move</text>
  
  <!-- BEFORE state -->
  <text x="225" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#64748b">Before: 3 Nodes</text>
  <rect x="30" y="100" width="390" height="400" rx="8" fill="none" stroke="#d7d1e6" stroke-width="2"/>
  
  <!-- Hash Ring before -->
  <circle cx="225" cy="280" r="140" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  
  <!-- 3 physical nodes -->
  <circle cx="225" cy="140" r="22" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="225" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">Node</text>
  <text x="225" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#4f46e5">A</text>
  
  <circle cx="346" cy="350" r="22" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="346" y="347" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Node</text>
  <text x="346" y="360" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">B</text>
  
  <circle cx="104" cy="350" r="22" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="104" y="347" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Node</text>
  <text x="104" y="360" text-anchor="middle" font-size="9" font-weight="700" fill="#d97706">C</text>
  
  <!-- Keys on ring before -->
  <circle cx="165" cy="165" r="8" fill="#92400e" opacity="0.2" stroke="#92400e" stroke-width="1.5"/>
  <text x="165" y="168" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">K3</text>
  
  <circle cx="285" cy="165" r="8" fill="#15803d" opacity="0.2" stroke="#15803d" stroke-width="1.5"/>
  <text x="285" y="168" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">K7</text>
  
  <circle cx="310" cy="280" r="8" fill="#991b1b" opacity="0.2" stroke="#991b1b" stroke-width="1.5"/>
  <text x="310" y="283" text-anchor="middle" font-size="8" font-weight="700" fill="#991b1b">K5</text>
  
  <circle cx="140" cy="280" r="8" fill="#c7d2fe" opacity="0.3" stroke="#4338ca" stroke-width="1.5"/>
  <text x="140" y="283" text-anchor="middle" font-size="8" font-weight="700" fill="#4338ca">K9</text>
  
  <!-- Ownership arcs before -->
  <path d="M 243 158 A 140 140 0 0 1 324 332" fill="none" stroke="#4f46e5" stroke-width="2" opacity="0.3"/>
  
  <!-- AFTER state -->
  <text x="675" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">After: Add Node D</text>
  <rect x="480" y="100" width="390" height="400" rx="8" fill="none" stroke="#d7d1e6" stroke-width="2"/>
  
  <!-- Hash Ring after -->
  <circle cx="675" cy="280" r="140" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  
  <!-- 4 physical nodes -->
  <circle cx="675" cy="140" r="22" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="675" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#4f46e5">Node</text>
  <text x="675" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#4f46e5">A</text>
  
  <circle cx="796" cy="350" r="22" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="796" y="347" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Node</text>
  <text x="796" y="360" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">B</text>
  
  <circle cx="554" cy="350" r="22" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="554" y="347" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Node</text>
  <text x="554" y="360" text-anchor="middle" font-size="9" font-weight="700" fill="#d97706">C</text>
  
  <!-- NEW Node D -->
  <circle cx="735" cy="210" r="24" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="3"/>
  <text x="735" y="207" text-anchor="middle" font-size="11" font-weight="700" fill="#db2777">Node</text>
  <text x="735" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#db2777">D (NEW)</text>
  
  <!-- Keys on ring after - K7 moved to D -->
  <circle cx="615" cy="165" r="8" fill="#92400e" opacity="0.2" stroke="#92400e" stroke-width="1.5"/>
  <text x="615" y="168" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">K3</text>
  
  <!-- K7 now belongs to D (moved) -->
  <circle cx="755" cy="180" r="8" fill="#db2777" opacity="0.2" stroke="#db2777" stroke-width="2"/>
  <text x="755" y="183" text-anchor="middle" font-size="8" font-weight="700" fill="#db2777">K7</text>
  
  <circle cx="760" cy="280" r="8" fill="#991b1b" opacity="0.2" stroke="#991b1b" stroke-width="1.5"/>
  <text x="760" y="283" text-anchor="middle" font-size="8" font-weight="700" fill="#991b1b">K5</text>
  
  <circle cx="590" cy="280" r="8" fill="#c7d2fe" opacity="0.3" stroke="#4338ca" stroke-width="1.5"/>
  <text x="590" y="283" text-anchor="middle" font-size="8" font-weight="700" fill="#4338ca">K9</text>
  
  <!-- Highlight: only K7 moved -->
  <rect x="500" y="420" width="350" height="60" rx="8" fill="#db2777" opacity="0.08" stroke="#db2777" stroke-width="1.5"/>
  <text x="515" y="445" font-size="12" font-weight="700" fill="#db2777">Rebalancing Impact:</text>
  <text x="515" y="465" font-size="11" fill="#1a1822">Only K7 moved (A → D). K3, K5, K9 unaffected.</text>
  
  <!-- Arrow between panels -->
  <defs>
    <marker id="moveArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
  <path d="M 440 280 L 460 280" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#moveArrow)"/>
</svg>