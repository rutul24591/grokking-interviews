<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Blue-Green Deployment with Zero Downtime</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Traffic shifting from old (blue) fleet to new (green) fleet via load balancer reconfiguration</text>

  <!-- Load Balancer -->
  <rect x="320" y="80" width="260" height="55" rx="8" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Load Balancer / Traffic Router</text>
  <text x="450" y="123" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Routing: 100% to Blue (current)</text>

  <!-- Client -->
  <rect x="40" y="85" width="120" height="50" rx="8" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="100" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Clients</text>
  <text x="100" y="122" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">All traffic</text>

  <path d="M 160 110 L 320 110" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>

  <!-- Blue fleet (active) -->
  <rect x="50" y="180" width="380" height="140" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="240" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Blue Fleet (v2.3.1 — Active)</text>

  <rect x="80" y="220" width="100" height="45" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="130" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Blue-1</text>
  <text x="130" y="257" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Healthy</text>

  <rect x="190" y="220" width="100" height="45" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="240" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Blue-2</text>
  <text x="240" y="257" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Healthy</text>

  <rect x="300" y="220" width="100" height="45" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="350" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Blue-3</text>
  <text x="350" y="257" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Healthy</text>

  <!-- Green fleet (staging) -->
  <rect x="470" y="180" width="380" height="140" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Green Fleet (v2.4.0 — Staging)</text>

  <rect x="500" y="220" width="100" height="45" rx="6" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="550" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Green-1</text>
  <text x="550" y="257" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Healthy</text>

  <rect x="610" y="220" width="100" height="45" rx="6" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="660" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Green-2</text>
  <text x="660" y="257" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Healthy</text>

  <rect x="720" y="220" width="100" height="45" rx="6" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="770" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Green-3</text>
  <text x="770" y="257" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Healthy</text>

  <!-- LB to Blue -->
  <path d="M 400 135 L 240 180" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#purpleArrow)"/>
  <text x="290" y="160" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">100% traffic</text>

  <!-- LB to Green (no traffic yet) -->
  <path d="M 500 135 L 660 180" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="590" y="160" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">0% traffic</text>

  <!-- Deployment phases -->
  <rect x="30" y="350" width="840" height="155" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Deployment Phases</text>

  <!-- Phase 1 -->
  <rect x="50" y="390" width="190" height="50" rx="4" fill="#4f46e5" opacity="0.1"/>
  <text x="145" y="410" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Phase 1: Deploy Green</text>
  <text x="145" y="428" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Green fleet receives no traffic</text>

  <!-- Phase 2 -->
  <rect x="260" y="390" width="190" height="50" rx="4" fill="#d97706" opacity="0.1"/>
  <text x="355" y="410" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Phase 2: Canary (5%)</text>
  <text x="355" y="428" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Route 5% to Green, monitor</text>

  <!-- Phase 3 -->
  <rect x="470" y="390" width="190" height="50" rx="4" fill="#db2777" opacity="0.1"/>
  <text x="565" y="410" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Phase 3: Gradual (50%)</text>
  <text x="565" y="428" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">50/50 split, validate metrics</text>

  <!-- Phase 4 -->
  <rect x="680" y="390" width="190" height="50" rx="4" fill="#16a34a" opacity="0.1"/>
  <text x="775" y="410" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Phase 4: Full (100%)</text>
  <text x="775" y="428" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">All traffic to Green, Blue idle</text>

  <!-- Rollback note -->
  <rect x="30" y="470" width="840" height="35" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="450" y="492" text-anchor="middle" font-size="11" fill="#991b1b" font-family="system-ui, sans-serif">&#9888; Rollback: Switch LB back to Blue instantly — zero downtime rollback if Green has issues</text>

  <defs>
    <marker id="blueArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="purpleArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
  </defs>
</svg>