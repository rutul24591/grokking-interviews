<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>API Gateway Routing and Responsibilities</title>
  <defs>
    <linearGradient id="bgGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad3)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1a1822">API Gateway Routing &amp; Responsibilities</text>

  <!-- Client -->
  <rect x="310" y="60" width="180" height="50" rx="10" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1a1822">Client</text>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Web / Mobile / Desktop</text>

  <!-- Arrow client to gateway -->
  <line x1="400" y1="110" x2="400" y2="150" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="415" y="135" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#4b5563">HTTPS</text>

  <!-- API Gateway -->
  <rect x="200" y="150" width="400" height="120" rx="14" fill="#d97706" fill-opacity="0.1" stroke="#d97706" stroke-width="2.5"/>
  <text x="400" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#d97706">API Gateway</text>

  <!-- Gateway responsibilities boxes -->
  <rect x="220" y="192" width="100" height="30" rx="6" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-width="1.5"/>
  <text x="270" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1a1822">Authentication</text>

  <rect x="330" y="192" width="100" height="30" rx="6" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1a1822">Rate Limiting</text>

  <rect x="440" y="192" width="100" height="30" rx="6" fill="#db2777" fill-opacity="0.2" stroke="#db2777" stroke-width="1.5"/>
  <text x="490" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1a1822">Request Transform</text>

  <rect x="220" y="228" width="100" height="30" rx="6" fill="#dc2626" fill-opacity="0.2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="270" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1a1822">Load Balancing</text>

  <rect x="330" y="228" width="100" height="30" rx="6" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="380" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1a1822">Caching</text>

  <rect x="440" y="228" width="100" height="30" rx="6" fill="#d97706" fill-opacity="0.2" stroke="#d97706" stroke-width="1.5"/>
  <text x="490" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1a1822">SSL Termination</text>

  <!-- Routing arrows from gateway to services -->
  <line x1="280" y1="270" x2="120" y2="350" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="270" x2="400" y2="350" stroke="#db2777" stroke-width="2" fill="none" marker-end="url(#arrowPink)"/>
  <line x1="520" y1="270" x2="680" y2="350" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Route labels -->
  <text x="200" y="310" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#2563eb">/api/users/*</text>
  <text x="375" y="310" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#db2777">/api/orders/*</text>
  <text x="545" y="310" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#16a34a">/api/payments/*</text>

  <!-- User Service -->
  <rect x="40" y="350" width="160" height="50" rx="8" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">User Service</text>
  <text x="120" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Port 8081</text>

  <!-- Order Service -->
  <rect x="320" y="350" width="160" height="50" rx="8" fill="#db2777" fill-opacity="0.2" stroke="#db2777" stroke-width="2"/>
  <text x="400" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Order Service</text>
  <text x="400" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Port 8082</text>

  <!-- Payment Service -->
  <rect x="600" y="350" width="160" height="50" rx="8" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="2"/>
  <text x="680" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Payment Service</text>
  <text x="680" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Port 8083</text>

  <!-- Gateway benefits box -->
  <rect x="540" y="60" width="230" height="120" rx="10" fill="#4f46e5" fill-opacity="0.05" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="655" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Gateway Benefits</text>
  <text x="554" y="102" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">- Single entry point for all clients</text>
  <text x="554" y="120" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">- Centralized auth, logging, monitoring</text>
  <text x="554" y="138" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">- Protocol translation (HTTP to gRPC)</text>
  <text x="554" y="156" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">- Rate limiting &amp; abuse protection</text>
  <text x="554" y="174" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">- Response aggregation &amp; caching</text>

  <!-- Arrow markers -->
  <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#4f46e5"/>
  </marker>
  <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
  </marker>
  <marker id="arrowPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#db2777"/>
  </marker>
  <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
  </marker>
</svg>
