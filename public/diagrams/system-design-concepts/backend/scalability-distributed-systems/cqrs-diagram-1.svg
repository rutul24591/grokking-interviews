<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="system-ui, sans-serif">
  <title>CQRS Architecture Pattern</title>
  <rect width="900" height="520" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">CQRS Architecture Pattern</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Separation of command (write) and query (read) responsibilities into independent models</text>

  <!-- Client applications -->
  <rect x="30" y="80" width="180" height="50" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="120" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca">Client App</text>
  <text x="120" y="118" text-anchor="middle" font-size="10" fill="#64748b">Web / Mobile / API</text>

  <!-- Split into Command and Query -->
  <path d="M 210 105 L 280 105" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <path d="M 280 105 L 280 180" fill="none" stroke="#4f46e5" stroke-width="2"/>
  <path d="M 280 105 L 280 340" fill="none" stroke="#16a34a" stroke-width="2"/>

  <!-- Command side (Write) -->
  <rect x="280" y="150" width="270" height="60" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="415" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">COMMAND SIDE (Write)</text>
  <text x="415" y="195" text-anchor="middle" font-size="10" fill="#64748b">CreateOrder, UpdateStatus, CancelOrder</text>

  <!-- Command handler -->
  <rect x="310" y="220" width="210" height="45" rx="6" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1"/>
  <text x="415" y="247" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca">Command Handler</text>

  <!-- Write Database -->
  <ellipse cx="415" cy="300" rx="80" ry="22" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="335" y="300" width="160" height="50" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1.5"/>
  <ellipse cx="415" cy="350" rx="80" ry="22" fill="#4f46e5" opacity="0.06" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="415" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca">Write DB</text>
  <text x="415" y="345" text-anchor="middle" font-size="9" fill="#64748b">Normalized schema</text>

  <!-- Event Bus between write and read -->
  <rect x="570" y="150" width="50" height="190" rx="6" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
  <text x="595" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e" transform="rotate(90, 595, 220)">EVENT BUS</text>
  <text x="595" y="240" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e" transform="rotate(90, 595, 240)">or Stream</text>

  <!-- Arrow from Write DB to Event Bus -->
  <path d="M 495 325 L 570 325" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#yellowArrow)"/>
  <text x="520" y="315" font-size="9" fill="#92400e">Events</text>

  <!-- Query side (Read) -->
  <rect x="640" y="150" width="230" height="60" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="755" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">QUERY SIDE (Read)</text>
  <text x="755" y="195" text-anchor="middle" font-size="10" fill="#64748b">GetOrder, ListOrders, GetDashboard</text>

  <!-- Event Bus to Read DB -->
  <path d="M 620 325 L 640 325" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#yellowArrow)"/>

  <!-- Query handler -->
  <rect x="660" y="220" width="190" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1"/>
  <text x="755" y="247" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Query Handler</text>

  <!-- Read Database -->
  <ellipse cx="755" cy="300" rx="80" ry="22" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="675" y="300" width="160" height="50" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <ellipse cx="755" cy="350" rx="80" ry="22" fill="#16a34a" opacity="0.06" stroke="#16a34a" stroke-width="1.5"/>
  <text x="755" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Read DB</text>
  <text x="755" y="345" text-anchor="middle" font-size="9" fill="#64748b">Denormalized views</text>

  <!-- Arrow back to client -->
  <path d="M 755 380 L 755 420 L 120 420 L 120 130" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#greenArrow)"/>
  <text x="450" y="410" text-anchor="middle" font-size="10" fill="#15803d">Query Results</text>

  <!-- Key characteristics -->
  <rect x="30" y="440" width="840" height="65" rx="8" fill="#4f46e5" opacity="0.06" stroke="#64748b" stroke-width="1"/>
  <text x="45" y="462" font-size="12" font-weight="bold" fill="#1a1822">Key Properties:</text>
  <text x="45" y="482" font-size="10" fill="#64748b">&#8226; Independent scaling of read and write sides</text>
  <text x="300" y="482" font-size="10" fill="#64748b">&#8226; Read models optimized for query patterns</text>
  <text x="560" y="482" font-size="10" fill="#64748b">&#8226; Eventual consistency between sides</text>

  <defs>
    <marker id="yellowArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
</svg>