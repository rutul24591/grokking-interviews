<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>Synchronous vs Asynchronous Replication comparison showing write flow and consistency properties</title>
  <rect width="900" height="520" fill="#f3f1f8" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="36" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1a1822" text-anchor="middle">Synchronous vs Asynchronous Replication</text>
  
  <!-- ==================== SYNCHRONOUS SECTION ==================== -->
  <rect x="20" y="55" width="860" height="220" rx="8" fill="#16a34a" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="450" y="85" font-family="system-ui, sans-serif" font-size="17" font-weight="bold" fill="#16a34a" text-anchor="middle">Synchronous Replication</text>
  
  <!-- Client -->
  <rect x="40" y="120" width="110" height="40" rx="6" fill="#2563eb" stroke="#60a5fa" stroke-width="1"/>
  <text x="95" y="145" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Client</text>
  
  <!-- Arrow: Client to Primary -->
  <line x1="150" y1="140" x2="280" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="215" y="130" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#1a1822" text-anchor="middle">1. Write</text>
  
  <!-- Primary -->
  <rect x="280" y="115" width="130" height="50" rx="6" fill="#4f46e5" stroke="#818cf8" stroke-width="1"/>
  <text x="345" y="145" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Primary</text>
  
  <!-- Arrow: Primary to Replica 1 -->
  <line x1="380" y1="140" x2="520" y2="140" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="450" y="130" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#1a1822" text-anchor="middle">2. Replicate</text>
  
  <!-- Replica 1 -->
  <rect x="520" y="115" width="120" height="50" rx="6" fill="#4f46e5" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="580" y="145" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822" text-anchor="middle">Replica 1</text>
  
  <!-- Arrow: Primary to Replica 2 -->
  <line x1="345" y1="165" x2="345" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="360" y="200" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#1a1822" text-anchor="start">2. Replicate</text>
  
  <!-- Replica 2 -->
  <rect x="285" y="220" width="120" height="40" rx="6" fill="#4f46e5" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="345" y="245" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822" text-anchor="middle">Replica 2</text>
  
  <!-- Acknowledgment arrows (dashed) -->
  <line x1="520" y1="170" x2="380" y2="170" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="450" y="188" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#16a34a" text-anchor="middle">3. ACK</text>
  
  <line x1="345" y1="220" x2="345" y2="165" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  
  <!-- Arrow: Primary back to Client (ACK) -->
  <line x1="280" y1="155" x2="150" y2="155" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="215" y="175" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#16a34a" text-anchor="middle">4. ACK to Client</text>
  
  <!-- Sync note -->
  <rect x="660" y="100" width="200" height="150" rx="6" fill="#16a34a" opacity="0.06" stroke="#16a34a" stroke-width="1"/>
  <text x="675" y="128" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">Properties:</text>
  <text x="675" y="152" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Write waits for</text>
  <text x="675" y="168" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">all replicas</text>
  <text x="675" y="192" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Strong consistency</text>
  <text x="675" y="216" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Higher latency</text>
  <text x="675" y="240" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">No data loss on fail</text>
  
  <!-- ==================== ASYNCHRONOUS SECTION ==================== -->
  <rect x="20" y="290" width="860" height="220" rx="8" fill="#d97706" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="450" y="320" font-family="system-ui, sans-serif" font-size="17" font-weight="bold" fill="#d97706" text-anchor="middle">Asynchronous Replication</text>
  
  <!-- Client -->
  <rect x="40" y="355" width="110" height="40" rx="6" fill="#2563eb" stroke="#60a5fa" stroke-width="1"/>
  <text x="95" y="380" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Client</text>
  
  <!-- Arrow: Client to Primary -->
  <line x1="150" y1="375" x2="280" y2="375" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="215" y="365" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#1a1822" text-anchor="middle">1. Write</text>
  
  <!-- Primary -->
  <rect x="280" y="350" width="130" height="50" rx="6" fill="#4f46e5" stroke="#818cf8" stroke-width="1"/>
  <text x="345" y="380" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Primary</text>
  
  <!-- Arrow: Primary to Replica 1 -->
  <line x1="380" y1="375" x2="520" y2="375" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="450" y="365" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#d97706" text-anchor="middle">later: Replicate</text>
  
  <!-- Replica 1 -->
  <rect x="520" y="350" width="120" height="50" rx="6" fill="#d97706" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="580" y="380" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822" text-anchor="middle">Replica 1</text>
  
  <!-- Arrow: Primary to Replica 2 -->
  <line x1="345" y1="400" x2="345" y2="455" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>
  <text x="360" y="435" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#d97706" text-anchor="start">later: Replicate</text>
  
  <!-- Replica 2 -->
  <rect x="285" y="455" width="120" height="40" rx="6" fill="#d97706" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="345" y="480" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822" text-anchor="middle">Replica 2</text>
  
  <!-- Immediate ACK arrow -->
  <line x1="280" y1="390" x2="150" y2="390" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="215" y="410" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#16a34a" text-anchor="middle">2. Immediate ACK</text>
  
  <!-- Async note -->
  <rect x="660" y="335" width="200" height="155" rx="6" fill="#d97706" opacity="0.06" stroke="#d97706" stroke-width="1"/>
  <text x="675" y="363" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#d97706">Properties:</text>
  <text x="675" y="387" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Write returns immediately</text>
  <text x="675" y="411" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Eventual consistency</text>
  <text x="675" y="435" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Lower latency</text>
  <text x="675" y="459" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Risk of data loss on</text>
  <text x="675" y="475" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">primary failure</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>
</svg>