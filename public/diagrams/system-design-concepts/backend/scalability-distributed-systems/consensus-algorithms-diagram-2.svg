<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-blue2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowhead-purple2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="arrowhead-amber2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1a1822" text-anchor="middle">Raft Log Replication Flow</text>
  <text x="450" y="55" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Client command reception, log appending, and commit propagation</text>

  <!-- Client -->
  <rect x="380" y="80" width="140" height="50" rx="8" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#d97706" text-anchor="middle">Client</text>
  <text x="450" y="118" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">SET x=42</text>

  <!-- Arrow from Client to Leader -->
  <line x1="450" y1="135" x2="450" y2="178" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrowhead-amber2)"/>
  <text x="475" y="155" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563">Command</text>

  <!-- Leader Node -->
  <rect x="340" y="185" width="220" height="60" rx="10" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="450" y="208" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#4f46e5" text-anchor="middle">Leader (Node A)</text>

  <!-- Leader Log Entries -->
  <rect x="350" y="255" width="200" height="120" rx="8" fill="#f3f1f8" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="275" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#4f46e5" text-anchor="middle">Leader Log</text>

  <!-- Log Entry 1 - Committed -->
  <rect x="360" y="285" width="180" height="25" rx="4" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1"/>
  <text x="370" y="302" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">[1,1] cmd: SET k=v</text>
  <rect x="505" y="288" width="30" height="18" rx="3" fill="#4f46e5" opacity="0.4"/>
  <text x="520" y="301" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#4f46e5" text-anchor="middle">C</text>

  <!-- Log Entry 2 - Committed -->
  <rect x="360" y="315" width="180" height="25" rx="4" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1"/>
  <text x="370" y="332" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">[1,2] cmd: DEL k2</text>
  <rect x="505" y="318" width="30" height="18" rx="3" fill="#4f46e5" opacity="0.4"/>
  <text x="520" y="331" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#4f46e5" text-anchor="middle">C</text>

  <!-- Log Entry 3 - Replicated -->
  <rect x="360" y="345" width="180" height="25" rx="4" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1"/>
  <text x="370" y="362" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">[1,3] cmd: SET x=42</text>
  <rect x="505" y="348" width="30" height="18" rx="3" fill="#2563eb" opacity="0.4"/>
  <text x="520" y="361" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#2563eb" text-anchor="middle">R</text>

  <!-- Commit Index Line -->
  <line x1="350" y1="337" x2="550" y2="337" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="555" y="341" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#16a34a">commitIndex</text>

  <!-- Follower B -->
  <rect x="50" y="185" width="200" height="60" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="208" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Follower B</text>

  <!-- Follower B Log -->
  <rect x="60" y="255" width="180" height="120" rx="8" fill="#f3f1f8" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="150" y="275" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2563eb" text-anchor="middle">Follower B Log</text>

  <rect x="70" y="285" width="160" height="25" rx="4" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1"/>
  <text x="80" y="302" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">[1,1] cmd: SET k=v</text>

  <rect x="70" y="315" width="160" height="25" rx="4" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1"/>
  <text x="80" y="332" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">[1,2] cmd: DEL k2</text>

  <rect x="70" y="345" width="160" height="25" rx="4" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1"/>
  <text x="80" y="362" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">[1,3] SET x=42</text>

  <!-- Follower C -->
  <rect x="650" y="185" width="200" height="60" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="750" y="208" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Follower C</text>

  <!-- Follower C Log -->
  <rect x="660" y="255" width="180" height="120" rx="8" fill="#f3f1f8" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="750" y="275" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2563eb" text-anchor="middle">Follower C Log</text>

  <rect x="670" y="285" width="160" height="25" rx="4" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1"/>
  <text x="680" y="302" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">[1,1] cmd: SET k=v</text>

  <rect x="670" y="315" width="160" height="25" rx="4" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1"/>
  <text x="680" y="332" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">[1,2] cmd: DEL k2</text>

  <rect x="670" y="345" width="160" height="25" rx="4" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="680" y="362" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">[1,3] SET x=42</text>

  <!-- Replication Arrows from Leader to Followers -->
  <path d="M 335 215 Q 260 210 255 215" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead-blue2)"/>
  <text x="270" y="205" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">AppendEntries</text>

  <path d="M 565 215 Q 640 210 645 215" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowhead-blue2)"/>
  <text x="590" y="205" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">AppendEntries</text>

  <!-- Commit propagation arrows -->
  <path d="M 255 365 Q 290 375 335 365" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arrowhead-purple2)"/>
  <text x="265" y="385" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">Ack</text>

  <path d="M 645 365 Q 610 375 565 365" stroke="#4f46e5" stroke-width="2" fill="none" marker-end="url(#arrowhead-purple2)"/>
  <text x="590" y="385" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">Ack</text>

  <!-- Legend -->
  <rect x="30" y="420" width="840" height="85" rx="8" fill="#f3f1f8" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="440" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822" text-anchor="middle">Log Entry States</text>

  <rect x="80" y="452" width="20" height="15" rx="3" fill="#4f46e5" opacity="0.3"/>
  <text x="110" y="464" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Committed (applied to state machine)</text>

  <rect x="340" y="452" width="20" height="15" rx="3" fill="#2563eb" opacity="0.2"/>
  <text x="370" y="464" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Replicated (awaiting majority ack)</text>

  <rect x="600" y="452" width="20" height="15" rx="3" fill="#d97706" opacity="0.2"/>
  <text x="630" y="464" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Pending (not yet replicated)</text>

  <text x="450" y="490" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563" text-anchor="middle">Leader replicates log entries to followers via AppendEntries RPC. Once a majority ack, entry is committed and applied.</text>
</svg>