<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Auto-Scaling Decision Flow</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Metric collection, threshold evaluation, cooldown enforcement, and instance provisioning</text>

  <!-- Metrics -->
  <rect x="30" y="80" width="200" height="100" rx="8" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Metrics Collection</text>
  <text x="50" y="128" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; CPU utilization: 78%</text>
  <text x="50" y="146" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; Memory: 65%</text>
  <text x="50" y="164" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; Request queue: 450</text>

  <!-- Arrow -->
  <path d="M 230 130 L 280 130" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#blueArrow)"/>

  <!-- Threshold check -->
  <rect x="280" y="80" width="170" height="100" rx="8" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="365" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Threshold Check</text>
  <text x="300" y="128" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">CPU &gt; 70%? YES</text>
  <text x="300" y="146" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Threshold exceeded</text>
  <text x="300" y="164" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Scale-up triggered</text>

  <!-- Arrow -->
  <path d="M 450 130 L 500 130" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#amberArrow)"/>

  <!-- Cooldown check -->
  <rect x="500" y="80" width="170" height="100" rx="8" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="2"/>
  <text x="585" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Cooldown Check</text>
  <text x="520" y="128" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Last scale: 5min ago</text>
  <text x="520" y="146" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Cooldown: 3min</text>
  <text x="520" y="164" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Cooldown expired</text>

  <!-- Arrow -->
  <path d="M 670 130 L 720 130" fill="none" stroke="#db2777" stroke-width="2" marker-end="url(#pinkArrow)"/>

  <!-- Provision -->
  <rect x="720" y="80" width="150" height="100" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="795" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Provision</text>
  <text x="740" y="128" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">+1 instance</text>
  <text x="740" y="146" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Warm-up: 60s</text>
  <text x="740" y="164" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Register with LB</text>

  <!-- Timeline visualization -->
  <rect x="30" y="210" width="840" height="295" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Scaling Timeline: Scale-Up and Scale-Down Cycle</text>

  <!-- X axis -->
  <line x1="60" y1="370" x2="840" y2="370" stroke="#475569" stroke-width="1"/>
  <text x="845" y="375" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">time</text>

  <!-- CPU line -->
  <path d="M 60 320 L 200 310 L 300 260 L 400 240 L 500 250 L 600 300 L 700 330 L 800 340" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="420" y="235" font-size="10" fill="#991b1b" font-family="system-ui, sans-serif">CPU %</text>

  <!-- Threshold line -->
  <line x1="60" y1="290" x2="840" y2="290" stroke="#d97706" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="65" y="285" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">70% threshold</text>

  <!-- Scale-up marker -->
  <rect x="350" y="380" width="80" height="30" rx="4" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1"/>
  <text x="390" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Scale Up</text>
  <path d="M 390 370 L 390 380" fill="none" stroke="#16a34a" stroke-width="1.5"/>

  <!-- New instances active -->
  <rect x="470" y="380" width="80" height="30" rx="4" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="1"/>
  <text x="510" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Warm-up</text>
  <path d="M 510 370 L 510 380" fill="none" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Scale-down marker -->
  <rect x="650" y="380" width="80" height="30" rx="4" fill="#db2777" opacity="0.2" stroke="#db2777" stroke-width="1"/>
  <text x="690" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Scale Down</text>
  <path d="M 690 370 L 690 380" fill="none" stroke="#db2777" stroke-width="1.5"/>

  <!-- Instance count line -->
  <path d="M 60 450 L 350 450 L 470 430 L 650 430 L 750 450 L 840 450" fill="none" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="445" text-anchor="middle" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">Instance Count</text>

  <!-- Instance count threshold -->
  <line x1="60" y1="430" x2="840" y2="430" stroke="#4f46e5" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="65" y="425" font-size="9" fill="#4338ca" font-family="system-ui, sans-serif">Target: 4 instances</text>

  <!-- Key metrics -->
  <rect x="30" y="465" width="840" height="40" rx="6" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="50" y="483" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">Scale-up triggers:</text>
  <text x="170" y="483" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">CPU &gt; 70% | Queue &gt; 100 | Latency &gt; 200ms</text>
  <text x="450" y="483" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">Scale-down triggers:</text>
  <text x="580" y="483" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">CPU &lt; 30% for 5min | Queue &lt; 10</text>

  <defs>
    <marker id="blueArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="amberArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="pinkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
  </defs>
</svg>