<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <title>Event sourcing vs state-stored architecture comparison showing overwrite versus append-only patterns</title>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Event Sourcing vs State-Stored Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Side-by-side comparison of data storage patterns</text>

  <!-- Divider line -->
  <line x1="450" y1="75" x2="450" y2="500" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- LEFT: STATE-STORED -->
  <rect x="20" y="85" width="410" height="415" rx="12" fill="none" stroke="#dc2626" stroke-width="2"/>
  <rect x="30" y="90" width="180" height="24" rx="4" fill="#dc2626"/>
  <text x="120" y="107" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Traditional State-Stored</text>
  <text x="225" y="107" font-size="10" fill="#dc2626">Current state only, overwrites previous data</text>

  <!-- Database icon -->
  <rect x="120" y="135" width="210" height="100" rx="10" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="225" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1822">Database</text>
  <text x="225" y="185" text-anchor="middle" font-size="12" fill="#64748b">orders table</text>
  <text x="225" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">OVERWRITES on UPDATE</text>

  <!-- Write operations showing overwrites -->
  <rect x="40" y="265" width="120" height="50" rx="6" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="1"/>
  <text x="100" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">WRITE #1</text>
  <text x="100" y="303" text-anchor="middle" font-size="10" fill="#1a1822">state: {status: "new"}</text>

  <line x1="165" y1="290" x2="195" y2="290" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <rect x="200" y="265" width="120" height="50" rx="6" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="1"/>
  <text x="260" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">WRITE #2</text>
  <text x="260" y="303" text-anchor="middle" font-size="10" fill="#1a1822">state: {status: "paid"}</text>

  <line x1="325" y1="290" x2="355" y2="290" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <rect x="360" y="265" width="120" height="50" rx="6" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="1"/>
  <text x="420" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">WRITE #3</text>
  <text x="420" y="303" text-anchor="middle" font-size="10" fill="#1a1822">state: {status: "shipped"}</text>

  <!-- Lost history indicator -->
  <rect x="80" y="345" width="300" height="50" rx="8" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="230" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">History Lost</text>
  <text x="230" y="383" text-anchor="middle" font-size="11" fill="#1a1822">Previous states are overwritten and unrecoverable</text>

  <!-- Current state badge -->
  <rect x="130" y="420" width="190" height="35" rx="17" fill="#2563eb"/>
  <text x="225" y="443" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Current: {status: "shipped"}</text>

  <!-- RIGHT: EVENT-SOURCED -->
  <rect x="470" y="85" width="410" height="415" rx="12" fill="none" stroke="#16a34a" stroke-width="2"/>
  <rect x="480" y="90" width="140" height="24" rx="4" fill="#16a34a"/>
  <text x="550" y="107" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Event-Sourced</text>
  <text x="675" y="107" font-size="10" fill="#16a34a">Append-only event log, state derived from events</text>

  <!-- Event log -->
  <rect x="560" y="135" width="230" height="100" rx="10" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="675" y="165" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1822">Event Store</text>
  <text x="675" y="185" text-anchor="middle" font-size="12" fill="#64748b">append-only log</text>
  <text x="675" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">NEVER MODIFIED</text>

  <!-- Event entries -->
  <rect x="500" y="265" width="110" height="50" rx="6" fill="#16a34a" opacity="0.1" stroke="#16a34a" stroke-width="1"/>
  <text x="555" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">EVENT #1</text>
  <text x="555" y="303" text-anchor="middle" font-size="10" fill="#1a1822">OrderCreated</text>

  <rect x="620" y="265" width="110" height="50" rx="6" fill="#16a34a" opacity="0.1" stroke="#16a34a" stroke-width="1"/>
  <text x="675" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">EVENT #2</text>
  <text x="675" y="303" text-anchor="middle" font-size="10" fill="#1a1822">PaymentProcessed</text>

  <rect x="740" y="265" width="110" height="50" rx="6" fill="#16a34a" opacity="0.1" stroke="#16a34a" stroke-width="1"/>
  <text x="795" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">EVENT #3</text>
  <text x="795" y="303" text-anchor="middle" font-size="10" fill="#1a1822">OrderShipped</text>

  <!-- History preserved indicator -->
  <rect x="530" y="345" width="300" height="50" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="680" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">Full History Preserved</text>
  <text x="680" y="383" text-anchor="middle" font-size="11" fill="#1a1822">All past events are queryable and auditable</text>

  <!-- State derived badge -->
  <rect x="570" y="420" width="210" height="35" rx="17" fill="#16a34a"/>
  <text x="675" y="443" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">State = f(Event1, Event2, Event3)</text>

  <!-- Arrow from events to state -->
  <line x1="675" y1="320" x2="675" y2="335" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
</svg>