<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" font-family="system-ui, sans-serif">
  <title>Split-Brain Detection and Resolution Flow showing fencing tokens and lease-based leadership</title>
  <defs>
    <marker id="arrG" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f3f1f8" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1a1822">Split-Brain Detection &amp; Resolution Flow</text>
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="normal" fill="#64748b">Fencing tokens and lease-based leadership prevent stale leaders from writing</text>

  <!-- Step 1: Detect Partition -->
  <rect x="40" y="80" width="160" height="70" rx="12" fill="#4f46e5" fill-opacity="0.85" stroke="#818cf8" stroke-width="2"/>
  <text x="120" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">1. Detect</text>
  <text x="120" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#e0e7ff">Partition found</text>
  <text x="120" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#e0e7ff">Heartbeat timeout</text>

  <!-- Arrow 1->2 -->
  <line x1="200" y1="115" x2="250" y2="115" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrG)"/>

  <!-- Step 2: Start Election -->
  <rect x="250" y="80" width="160" height="70" rx="12" fill="#16a34a" fill-opacity="0.8" stroke="#4ade80" stroke-width="2"/>
  <text x="330" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">2. Elect</text>
  <text x="330" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#dcfce7">New term / ballot</text>
  <text x="330" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#dcfce7">Quorum votes</text>

  <!-- Arrow 2->3 -->
  <line x1="410" y1="115" x2="460" y2="115" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrG)"/>

  <!-- Step 3: Fencing Token -->
  <rect x="460" y="80" width="160" height="70" rx="12" fill="#2563eb" fill-opacity="0.85" stroke="#60a5fa" stroke-width="2"/>
  <text x="540" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">3. Fence</text>
  <text x="540" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#dbeafe">Issue fencing token</text>
  <text x="540" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#dbeafe">Epoch = term + 1</text>

  <!-- Arrow 3->4 -->
  <line x1="620" y1="115" x2="670" y2="115" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrG)"/>

  <!-- Step 4: Leader Writes -->
  <rect x="670" y="80" width="110" height="70" rx="12" fill="#16a34a" fill-opacity="0.85" stroke="#4ade80" stroke-width="2"/>
  <text x="725" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">4. Write</text>
  <text x="725" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="normal" fill="#dcfce7">Valid token</text>
  <text x="725" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#dcfce7">Accept writes</text>

  <!-- Divider line -->
  <line x1="40" y1="180" x2="760" y2="180" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#64748b">Lease-Based Leadership Timeline</text>

  <!-- Timeline -->
  <line x1="60" y1="240" x2="740" y2="240" stroke="#475569" stroke-width="2"/>

  <!-- Time markers -->
  <text x="60" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#64748b">t=0</text>
  <text x="220" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#64748b">t=10</text>
  <text x="380" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#64748b">t=20</text>
  <text x="540" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#64748b">t=30</text>
  <text x="700" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#64748b">t=40</text>

  <!-- Leader A lease -->
  <rect x="60" y="280" width="160" height="36" rx="6" fill="#4f46e5" fill-opacity="0.7" stroke="#818cf8" stroke-width="1.5"/>
  <text x="140" y="303" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Leader A: Lease valid</text>

  <!-- Leader A stale (rejected) -->
  <rect x="220" y="280" width="120" height="36" rx="6" fill="#dc2626" fill-opacity="0.3" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="280" y="303" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Stale - REJECTED</text>

  <!-- Leader B lease -->
  <rect x="340" y="280" width="200" height="36" rx="6" fill="#16a34a" fill-opacity="0.7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="440" y="303" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Leader B: New lease (epoch 8)</text>

  <!-- Partition event -->
  <rect x="200" y="340" width="140" height="36" rx="6" fill="#d97706" fill-opacity="0.2" stroke="#d97706" stroke-width="2"/>
  <text x="270" y="363" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Partition occurs</text>

  <!-- Fence token annotation -->
  <rect x="440" y="340" width="160" height="36" rx="6" fill="#2563eb" fill-opacity="0.2" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="520" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1d4ed8">Fencing: old leader epoch=7</text>
  <text x="520" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#1d4ed8">rejected; new epoch=8</text>

  <!-- Lease expiration -->
  <rect x="540" y="280" width="160" height="36" rx="6" fill="#16a34a" fill-opacity="0.4" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="620" y="303" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#15803d">Lease expires, renew?</text>

  <!-- Decision box -->
  <rect x="60" y="400" width="220" height="80" rx="10" fill="#64748b" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="170" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822">Fencing Rule</text>
  <text x="170" y="448" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Storage layer rejects any write</text>
  <text x="170" y="464" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">with epoch lower than current max</text>

  <!-- Arrow from decision to fence -->
  <line x1="280" y1="440" x2="440" y2="360" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrA)"/>

  <!-- Safety annotation -->
  <rect x="460" y="400" width="300" height="80" rx="10" fill="#64748b" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="610" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822">Why Fencing Works</text>
  <text x="610" y="448" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Even if Leader A believes it is still leader,</text>
  <text x="610" y="464" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">the storage layer rejects its writes (epoch 7 &lt; 8)</text>
</svg>