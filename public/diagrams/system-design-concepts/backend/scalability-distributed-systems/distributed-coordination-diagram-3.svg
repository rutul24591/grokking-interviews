<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="system-ui, sans-serif">
  <title>Configuration Management with Watch Notifications</title>
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Configuration Management with Watch Notifications</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Dynamic configuration updates propagated to all services via coordination service watches</text>

  <!-- Configuration stored in coordination service -->
  <rect x="40" y="80" width="300" height="180" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="190" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Coordination Service Config Store</text>

  <rect x="60" y="120" width="260" height="25" rx="3" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="190" y="137" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">/config/database/max_connections = 100</text>

  <rect x="60" y="155" width="260" height="25" rx="3" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="190" y="172" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">/config/database/timeout_ms = 5000</text>

  <rect x="60" y="190" width="260" height="25" rx="3" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="190" y="207" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">/config/cache/ttl_seconds = 300</text>

  <rect x="60" y="225" width="260" height="25" rx="3" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="190" y="242" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">/config/feature_flags/new_ui = true</text>

  <!-- Admin updates config -->
  <rect x="40" y="280" width="300" height="50" rx="6" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="1.5"/>
  <text x="190" y="300" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Admin updates: max_connections = 200</text>
  <text x="190" y="318" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Coordination service notifies all watchers</text>

  <!-- Watch notification arrows -->
  <path d="M 340 180 L 430 140" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#amberArrow)"/>
  <path d="M 340 200 L 430 260" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#amberArrow)"/>
  <path d="M 340 220 L 430 380" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#amberArrow)"/>
  <text x="385" y="170" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">watch</text>
  <text x="385" y="250" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">watch</text>
  <text x="385" y="320" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">watch</text>

  <!-- Services watching config -->
  <rect x="430" y="100" width="200" height="80" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="530" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Service A</text>
  <text x="530" y="145" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Watches: /config/database/*</text>
  <text x="530" y="163" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Updates: connection pool size</text>

  <rect x="430" y="220" width="200" height="80" rx="8" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1.5"/>
  <text x="530" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Service B</text>
  <text x="530" y="265" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Watches: /config/cache/*</text>
  <text x="530" y="283" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Updates: cache TTL</text>

  <rect x="430" y="340" width="200" height="80" rx="8" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="1.5"/>
  <text x="530" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Service C</text>
  <text x="530" y="385" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Watches: /config/feature_flags/*</text>
  <text x="530" y="403" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Updates: feature flag state</text>

  <!-- Benefits -->
  <rect x="660" y="100" width="210" height="320" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="765" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Benefits</text>
  <text x="680" y="150" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; No restart needed</text>
  <text x="680" y="170" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Services update config in real-time</text>
  <text x="680" y="195" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Atomic updates</text>
  <text x="680" y="215" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">All services see same config version</text>
  <text x="680" y="240" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Selective watching</text>
  <text x="680" y="260" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Each service watches only its config</text>
  <text x="680" y="285" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Rollback capability</text>
  <text x="680" y="305" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Revert config to previous version</text>
  <text x="680" y="330" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Audit trail</text>
  <text x="680" y="350" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">All config changes logged with version</text>
  <text x="680" y="375" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Consistent across instances</text>
  <text x="680" y="395" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">All instances get same config update</text>

  <!-- Timeline -->
  <rect x="660" y="435" width="210" height="70" rx="6" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="765" y="455" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Config Update Timeline</text>
  <text x="680" y="475" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">T0: Admin updates config in ZK</text>
  <text x="680" y="490" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">T1: ZK sends watch notification</text>
  <text x="680" y="505" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">T2: Services read new config (&lt;100ms)</text>

  <defs>
    <marker id="amberArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>
</svg>