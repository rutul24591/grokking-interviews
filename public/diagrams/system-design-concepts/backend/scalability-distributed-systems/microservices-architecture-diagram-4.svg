<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>Monolith vs Microservices Comparison</title>
  <defs>
    <linearGradient id="bgGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="url(#bgGrad4)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1a1822">Monolith vs Microservices Comparison</text>

  <!-- Column headers -->
  <rect x="30" y="58" width="360" height="36" rx="8" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626" stroke-width="1.5"/>
  <text x="210" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#dc2626">Monolithic Architecture</text>

  <rect x="410" y="58" width="360" height="36" rx="8" fill="#16a34a" fill-opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="590" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#16a34a">Microservices Architecture</text>

  <!-- Row 1: Deployment -->
  <text x="30" y="120" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1a1822">Deployment</text>
  <line x1="30" y1="126" x2="770" y2="126" stroke="#64748b" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Monolith deployment -->
  <rect x="50" y="134" width="320" height="64" rx="8" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="210" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Single Deployable Unit</text>
  <text x="210" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">One build, one deploy, entire app restarts</text>
  <text x="210" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Deploy = all or nothing, high risk per deploy</text>

  <!-- Microservices deployment -->
  <rect x="430" y="134" width="320" height="64" rx="8" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="590" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Independent Deployable Units</text>
  <text x="590" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Each service builds and deploys independently</text>
  <text x="590" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Deploy = low risk per service, blue-green per svc</text>

  <!-- Row 2: Scaling -->
  <text x="30" y="224" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1a1822">Scaling</text>
  <line x1="30" y1="230" x2="770" y2="230" stroke="#64748b" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Monolith scaling -->
  <rect x="50" y="238" width="320" height="64" rx="8" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="210" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Scale Entire Application</text>
  <text x="210" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Clone the whole monolith even if one part is hot</text>
  <text x="210" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Wasteful resource usage, uniform scaling only</text>

  <!-- Microservices scaling -->
  <rect x="430" y="238" width="320" height="64" rx="8" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="590" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Scale Individual Services</text>
  <text x="590" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Scale only hot services independently</text>
  <text x="590" y="294" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Cost-efficient, heterogeneous resource allocation</text>

  <!-- Row 3: Failure Isolation -->
  <text x="30" y="328" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1a1822">Failure Isolation</text>
  <line x1="30" y1="334" x2="770" y2="334" stroke="#64748b" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Monolith failure -->
  <rect x="50" y="342" width="320" height="64" rx="8" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="210" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Single Point of Failure</text>
  <text x="210" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">One memory leak or crash brings down everything</text>
  <text x="210" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">No blast radius containment possible</text>

  <!-- Microservices failure -->
  <rect x="430" y="342" width="320" height="64" rx="8" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="590" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Bounded Failure Domains</text>
  <text x="590" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Failure isolated to one service, others survive</text>
  <text x="590" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Circuit breakers, retries, graceful degradation</text>

  <!-- Row 4: Team Structure -->
  <text x="30" y="432" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1a1822">Team Structure</text>
  <line x1="30" y1="438" x2="770" y2="438" stroke="#64748b" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Monolith teams -->
  <rect x="50" y="446" width="320" height="64" rx="8" fill="#dc2626" fill-opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="210" y="468" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Shared Codebase, Coordinated Teams</text>
  <text x="210" y="486" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">All teams work on same repo, merge conflicts common</text>
  <text x="210" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Coordinated releases, bottlenecks at scale</text>

  <!-- Microservices teams -->
  <rect x="430" y="446" width="320" height="64" rx="8" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="590" y="468" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Two-Pizza Teams, Independent Ownership</text>
  <text x="590" y="486" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Each team owns their service end-to-end</text>
  <text x="590" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">Independent releases, parallel development</text>

  <!-- Bottom summary box -->
  <rect x="100" y="524" width="600" height="30" rx="8" fill="#4f46e5" fill-opacity="0.08" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="400" y="544" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#4f46e5">Microservices trade operational complexity for organizational scaling and fault isolation</text>
</svg>
