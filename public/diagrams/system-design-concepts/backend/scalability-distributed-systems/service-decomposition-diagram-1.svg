<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Strangler Fig Pattern: Monolith to Microservices Migration</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Incrementally replace monolith features with microservices via a proxy facade</text>

  <!-- Phase 1: Monolith -->
  <rect x="30" y="80" width="260" height="140" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="160" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Phase 1: Monolith</text>

  <rect x="60" y="120" width="200" height="80" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="160" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Monolith</text>
  <text x="160" y="165" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Users | Orders | Products</text>
  <text x="160" y="180" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Inventory | Payments | Shipping</text>
  <text x="160" y="195" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Single database, single deploy</text>

  <!-- Phase 2: Facade + some services -->
  <rect x="320" y="80" width="260" height="140" rx="8" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Phase 2: Partial Migration</text>

  <rect x="340" y="115" width="220" height="30" rx="4" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">API Gateway / Facade</text>

  <rect x="340" y="155" width="100" height="50" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="390" y="175" text-anchor="middle" font-size="9" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Users svc</text>
  <text x="390" y="192" text-anchor="middle" font-size="8" fill="#4b5563" font-family="system-ui, sans-serif">Own DB</text>

  <rect x="450" y="155" width="110" height="50" rx="4" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="505" y="175" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Monolith</text>
  <text x="505" y="192" text-anchor="middle" font-size="8" fill="#4b5563" font-family="system-ui, sans-serif">Remaining features</text>

  <!-- Phase 3: Full microservices -->
  <rect x="610" y="80" width="260" height="140" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="740" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Phase 3: Full Migration</text>

  <rect x="630" y="115" width="220" height="30" rx="4" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <text x="740" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">API Gateway</text>

  <rect x="630" y="155" width="65" height="50" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="662" y="175" text-anchor="middle" font-size="8" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Users</text>
  <text x="662" y="192" text-anchor="middle" font-size="7" fill="#4b5563" font-family="system-ui, sans-serif">Own DB</text>

  <rect x="700" y="155" width="65" height="50" rx="4" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="732" y="175" text-anchor="middle" font-size="8" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Orders</text>
  <text x="732" y="192" text-anchor="middle" font-size="7" fill="#4b5563" font-family="system-ui, sans-serif">Own DB</text>

  <rect x="770" y="155" width="65" height="50" rx="4" fill="#db2777" opacity="0.15" stroke="#db2777" stroke-width="1.5"/>
  <text x="802" y="175" text-anchor="middle" font-size="8" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Payments</text>
  <text x="802" y="192" text-anchor="middle" font-size="7" fill="#4b5563" font-family="system-ui, sans-serif">Own DB</text>

  <!-- Arrows between phases -->
  <path d="M 290 150 L 320 150" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#grayArrow)"/>
  <path d="M 580 150 L 610 150" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#grayArrow)"/>

  <!-- Key principles -->
  <rect x="30" y="250" width="840" height="255" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Strangler Fig Key Principles</text>

  <rect x="50" y="295" width="390" height="45" rx="4" fill="#4f46e5" opacity="0.08"/>
  <text x="70" y="315" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">1. Intercept all traffic via a facade (proxy/gateway)</text>
  <text x="70" y="333" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">The facade routes requests to either the monolith or the new service</text>

  <rect x="460" y="295" width="390" height="45" rx="4" fill="#16a34a" opacity="0.08"/>
  <text x="480" y="315" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">2. Migrate one feature at a time</text>
  <text x="480" y="333" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Extract the simplest, least coupled feature first (e.g., Users)</text>

  <rect x="50" y="350" width="390" height="45" rx="4" fill="#d97706" opacity="0.08"/>
  <text x="70" y="370" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">3. Update the facade to route to the new service</text>
  <text x="70" y="388" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">The facade routes /users/* to the Users service, not the monolith</text>

  <rect x="460" y="350" width="390" height="45" rx="4" fill="#db2777" opacity="0.08"/>
  <text x="480" y="370" font-size="11" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">4. Repeat until the monolith is empty</text>
  <text x="480" y="388" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Each feature is extracted and routed through the facade</text>

  <rect x="50" y="405" width="390" height="45" rx="4" fill="#2563eb" opacity="0.08"/>
  <text x="70" y="425" font-size="11" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">5. Decommission the monolith</text>
  <text x="70" y="443" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Once all features are migrated, the monolith is shut down</text>

  <rect x="460" y="405" width="390" height="45" rx="4" fill="#7c3aed" opacity="0.08"/>
  <text x="480" y="425" font-size="11" font-weight="bold" fill="#5b21b6" font-family="system-ui, sans-serif">6. Each step is reversible</text>
  <text x="480" y="443" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">If the new service fails, the facade routes back to the monolith</text>

  <!-- Benefits -->
  <rect x="30" y="470" width="840" height="35" rx="6" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="50" y="492" font-size="11" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Zero-downtime migration</text>
  <text x="250" y="492" font-size="11" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Incremental risk reduction</text>
  <text x="470" y="492" font-size="11" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Each step independently deployable</text>
  <text x="720" y="492" font-size="11" fill="#92400e" font-family="system-ui, sans-serif">&#9888; Facade becomes critical path</text>

  <defs>
    <marker id="grayArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
</svg>