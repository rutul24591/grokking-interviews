<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <title>Virtual nodes distribution comparison showing load balancing improvement</title>

  <rect width="900" height="520" rx="12" fill="#f3f1f8"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Virtual Nodes Distribution</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">How virtual nodes eliminate hot spots and balance load evenly</text>
  
  <!-- LEFT PANEL: Without Virtual Nodes -->
  <text x="225" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">Without Virtual Nodes</text>
  <rect x="30" y="100" width="390" height="400" rx="8" fill="none" stroke="#d7d1e6" stroke-width="2"/>
  
  <!-- Hash Ring without virtual nodes -->
  <circle cx="225" cy="280" r="140" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  
  <!-- 3 physical nodes, uneven distribution -->
  <circle cx="225" cy="140" r="18" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="225" y="144" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">A</text>
  
  <circle cx="346" cy="350" r="18" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="346" y="354" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">B</text>
  
  <circle cx="104" cy="350" r="18" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="104" y="354" text-anchor="middle" font-size="10" font-weight="700" fill="#d97706">C</text>
  
  <!-- Uneven key distribution - Node A gets most keys -->
  <text x="225" y="115" text-anchor="middle" font-size="9" fill="#92400e">K1 K3 K5 K7 K9</text>
  <text x="346" y="325" text-anchor="middle" font-size="9" fill="#15803d">K2</text>
  <text x="104" y="325" text-anchor="middle" font-size="9" fill="#991b1b">K4</text>
  
  <!-- Ownership arcs - A owns huge arc -->
  <path d="M 243 158 A 140 140 0 0 1 346 332" fill="none" stroke="#4f46e5" stroke-width="3" opacity="0.5"/>
  
  <!-- Load bar chart -->
  <rect x="80" y="440" width="100" height="20" rx="3" fill="#4f46e5" opacity="0.7"/>
  <text x="75" y="454" text-anchor="end" font-size="9" fill="#64748b">A</text>
  <text x="185" y="454" font-size="9" fill="#1a1822">50%</text>
  
  <rect x="80" y="465" width="30" height="20" rx="3" fill="#16a34a" opacity="0.7"/>
  <text x="75" y="479" text-anchor="end" font-size="9" fill="#64748b">B</text>
  <text x="115" y="479" font-size="9" fill="#1a1822">25%</text>
  
  <rect x="80" y="490" width="30" height="20" rx="3" fill="#d97706" opacity="0.7"/>
  <text x="75" y="504" text-anchor="end" font-size="9" fill="#64748b">C</text>
  <text x="115" y="504" font-size="9" fill="#1a1822">25%</text>
  
  <!-- RIGHT PANEL: With Virtual Nodes -->
  <text x="675" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">With Virtual Nodes (3 per node)</text>
  <rect x="480" y="100" width="390" height="400" rx="8" fill="none" stroke="#d7d1e6" stroke-width="2"/>
  
  <!-- Hash Ring with virtual nodes -->
  <circle cx="675" cy="280" r="140" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
  
  <!-- Virtual nodes distributed evenly -->
  <!-- Node A virtual nodes -->
  <circle cx="675" cy="140" r="10" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="675" y="144" text-anchor="middle" font-size="7" font-weight="700" fill="#4f46e5">A1</text>
  <circle cx="796" cy="350" r="10" fill="#818cf8" opacity="0.2" stroke="#818cf8" stroke-width="1.5"/>
  <text x="796" y="354" text-anchor="middle" font-size="7" font-weight="700" fill="#4f46e5">A2</text>
  <circle cx="554" cy="350" r="10" fill="#4338ca" opacity="0.15" stroke="#4338ca" stroke-width="1.5"/>
  <text x="554" y="354" text-anchor="middle" font-size="7" font-weight="700" fill="#4338ca">A3</text>
  
  <!-- Node B virtual nodes -->
  <circle cx="755" cy="200" r="10" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="755" y="204" text-anchor="middle" font-size="7" font-weight="700" fill="#16a34a">B1</text>
  <circle cx="595" cy="360" r="10" fill="#4ade80" opacity="0.2" stroke="#4ade80" stroke-width="1.5"/>
  <text x="595" y="364" text-anchor="middle" font-size="7" font-weight="700" fill="#15803d">B2</text>
  <circle cx="755" y="360" r="10" fill="#15803d" opacity="0.15" stroke="#15803d" stroke-width="1.5"/>
  <text x="755" y="364" text-anchor="middle" font-size="7" font-weight="700" fill="#15803d">B3</text>
  
  <!-- Node C virtual nodes -->
  <circle cx="595" cy="200" r="10" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="595" y="204" text-anchor="middle" font-size="7" font-weight="700" fill="#d97706">C1</text>
  <circle cx="595" y="280" r="10" fill="#92400e" opacity="0.15" stroke="#92400e" stroke-width="1.5"/>
  <text x="595" y="284" text-anchor="middle" font-size="7" font-weight="700" fill="#92400e">C2</text>
  <circle cx="755" y="280" r="10" fill="#fcd34d" opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="755" y="284" text-anchor="middle" font-size="7" font-weight="700" fill="#92400e">C3</text>
  
  <!-- Even key distribution labels -->
  <text x="715" y="155" text-anchor="middle" font-size="8" fill="#92400e">K1 K4</text>
  <text x="775" y="225" text-anchor="middle" font-size="8" fill="#15803d">K2 K7</text>
  <text x="615" y="225" text-anchor="middle" font-size="8" fill="#991b1b">K3 K8</text>
  <text x="675" y="115" text-anchor="middle" font-size="8" fill="#1a1822">K5 K9</text>
  <text x="775" y="380" text-anchor="middle" font-size="8" fill="#1a1822">K6</text>
  <text x="575" y="380" text-anchor="middle" font-size="8" fill="#15803d">K10</text>
  
  <!-- Even load bar chart -->
  <rect x="510" y="440" width="40" height="20" rx="3" fill="#4f46e5" opacity="0.7"/>
  <text x="505" y="454" text-anchor="end" font-size="9" fill="#64748b">A</text>
  <text x="555" y="454" font-size="9" fill="#1a1822">33%</text>
  
  <rect x="510" y="465" width="40" height="20" rx="3" fill="#16a34a" opacity="0.7"/>
  <text x="505" y="479" text-anchor="end" font-size="9" fill="#64748b">B</text>
  <text x="555" y="479" font-size="9" fill="#1a1822">34%</text>
  
  <rect x="510" y="490" width="40" height="20" rx="3" fill="#d97706" opacity="0.7"/>
  <text x="505" y="504" text-anchor="end" font-size="9" fill="#64748b">C</text>
  <text x="555" y="504" font-size="9" fill="#1a1822">33%</text>
  
  <!-- Arrow between panels -->
  <text x="450" y="280" text-anchor="middle" font-size="24" fill="#64748b">&#8594;</text>
</svg>