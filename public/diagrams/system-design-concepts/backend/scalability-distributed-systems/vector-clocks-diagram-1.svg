<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Vector Clock Progression Across Processes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Each process maintains a vector of logical timestamps, incremented on events and exchanged on messages</text>

  <!-- Process A -->
  <rect x="40" y="80" width="260" height="420" rx="8" fill="#4f46e5" opacity="0.06" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="170" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Process A</text>

  <!-- Events on A -->
  <circle cx="170" cy="140" r="15" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="170" y="144" text-anchor="middle" font-size="9" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">e1</text>
  <text x="70" y="144" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: [1,0,0]</text>

  <circle cx="170" cy="200" r="15" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="170" y="204" text-anchor="middle" font-size="9" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">e2</text>
  <text x="70" y="204" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: [2,0,0]</text>

  <circle cx="170" cy="320" r="15" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="170" y="324" text-anchor="middle" font-size="9" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">e5</text>
  <text x="70" y="324" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: [4,2,1]</text>

  <circle cx="170" cy="380" r="15" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="170" y="384" text-anchor="middle" font-size="9" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">e6</text>
  <text x="70" y="384" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: [5,2,1]</text>

  <!-- A timeline -->
  <path d="M 170 140 L 170 200" fill="none" stroke="#4f46e5" stroke-width="1"/>
  <path d="M 170 200 L 170 320" fill="none" stroke="#4f46e5" stroke-width="1"/>
  <path d="M 170 320 L 170 380" fill="none" stroke="#4f46e5" stroke-width="1"/>

  <!-- Process B -->
  <rect x="320" y="80" width="260" height="420" rx="8" fill="#16a34a" opacity="0.06" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Process B</text>

  <circle cx="450" cy="170" r="15" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="174" text-anchor="middle" font-size="9" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">e3</text>
  <text x="350" y="174" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: [1,1,0]</text>

  <circle cx="450" cy="230" r="15" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="234" text-anchor="middle" font-size="9" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">e4</text>
  <text x="350" y="234" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: [2,2,0]</text>

  <circle cx="450" cy="350" r="15" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="354" text-anchor="middle" font-size="9" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">e7</text>
  <text x="350" y="354" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: [4,4,1]</text>

  <path d="M 450 170 L 450 230" fill="none" stroke="#16a34a" stroke-width="1"/>
  <path d="M 450 230 L 450 350" fill="none" stroke="#16a34a" stroke-width="1"/>

  <!-- Process C -->
  <rect x="600" y="80" width="260" height="420" rx="8" fill="#d97706" opacity="0.06" stroke="#d97706" stroke-width="1.5"/>
  <text x="730" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Process C</text>

  <circle cx="730" cy="290" r="15" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <text x="730" y="294" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">e8</text>
  <text x="630" y="294" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: [4,4,1]</text>

  <circle cx="730" cy="350" r="15" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <text x="730" y="354" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">e9</text>
  <text x="630" y="354" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: [4,4,2]</text>

  <path d="M 730 290 L 730 350" fill="none" stroke="#d97706" stroke-width="1"/>

  <!-- Messages between processes -->
  <path d="M 185 200 L 435 170" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <text x="280" y="175" font-size="9" fill="#9d174d" font-family="system-ui, sans-serif">m1: [2,0,0]</text>

  <path d="M 435 230 L 185 320" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <text x="280" y="265" font-size="9" fill="#9d174d" font-family="system-ui, sans-serif">m2: [2,2,0]</text>

  <path d="M 465 350 L 715 290" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <text x="560" y="310" font-size="9" fill="#9d174d" font-family="system-ui, sans-serif">m3: [4,4,1]</text>

  <!-- Rules -->
  <rect x="40" y="440" width="820" height="65" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="450" y="460" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Vector Clock Rules:</text>
  <text x="60" y="480" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">1. On local event: increment own component VC[i]++</text>
  <text x="300" y="480" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">2. On send: attach VC to message</text>
  <text x="540" y="480" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">3. On receive: VC[j] = max(VC[j], msg.VC[j]) for all j, then VC[i]++</text>

  <defs>
    <marker id="pinkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
  </defs>
</svg>