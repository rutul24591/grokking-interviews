<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>Inter-Service Communication Patterns</title>
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad2)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1a1822">Inter-Service Communication Patterns</text>

  <!-- Left panel: Synchronous -->
  <rect x="30" y="60" width="360" height="420" rx="12" fill="#2563eb" fill-opacity="0.05" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="210" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Synchronous (REST / gRPC)</text>

  <!-- Service A -->
  <rect x="50" y="120" width="130" height="48" rx="8" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-width="2"/>
  <text x="115" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Service A</text>
  <text x="115" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">(Caller)</text>

  <!-- Service B -->
  <rect x="240" y="120" width="130" height="48" rx="8" fill="#db2777" fill-opacity="0.2" stroke="#db2777" stroke-width="2"/>
  <text x="305" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Service B</text>
  <text x="305" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">(Callee)</text>

  <!-- Bidirectional arrows -->
  <line x1="180" y1="138" x2="240" y2="138" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <line x1="240" y1="150" x2="180" y2="150" stroke="#db2777" stroke-width="2" fill="none" marker-end="url(#arrowPink)"/>

  <!-- Request/Response labels -->
  <text x="210" y="133" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#2563eb">Request</text>
  <text x="210" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#db2777">Response</text>

  <!-- Sync characteristics -->
  <rect x="50" y="200" width="320" height="260" rx="8" fill="#4f46e5" fill-opacity="0.03" stroke="#4f46e5" stroke-opacity="0.2" stroke-width="1"/>
  <text x="210" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Characteristics</text>

  <text x="64" y="248" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Caller blocks until response arrives</text>
  <text x="64" y="270" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Tight temporal coupling between services</text>
  <text x="64" y="292" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Latency adds up across call chains</text>
  <text x="64" y="314" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Requires retries, timeouts, circuit breakers</text>
  <text x="64" y="336" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- REST: HTTP + JSON, human-readable, slower</text>
  <text x="64" y="358" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- gRPC: HTTP/2 + Protobuf, binary, 10x faster</text>
  <text x="64" y="380" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- gRPC supports streaming, REST does not</text>
  <text x="64" y="402" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Best for request-response, real-time queries</text>
  <text x="64" y="424" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Failure in callee cascades to caller</text>
  <text x="64" y="446" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Simple to debug with distributed tracing</text>

  <!-- Right panel: Asynchronous -->
  <rect x="410" y="60" width="360" height="420" rx="12" fill="#16a34a" fill-opacity="0.05" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="590" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#16a34a">Asynchronous (Message Queue)</text>

  <!-- Publisher -->
  <rect x="430" y="120" width="130" height="48" rx="8" fill="#dc2626" fill-opacity="0.2" stroke="#dc2626" stroke-width="2"/>
  <text x="495" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Publisher</text>
  <text x="495" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">(Event Producer)</text>

  <!-- Message Queue -->
  <rect x="430" y="210" width="320" height="48" rx="10" fill="#d97706" fill-opacity="0.2" stroke="#d97706" stroke-width="2"/>
  <text x="590" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Message Queue / Event Bus</text>
  <text x="590" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">Kafka / RabbitMQ / SQS</text>

  <!-- Subscriber -->
  <rect x="430" y="300" width="130" height="48" rx="8" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="495" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Subscriber</text>
  <text x="495" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">(Event Consumer)</text>

  <!-- Another subscriber -->
  <rect x="620" y="300" width="130" height="48" rx="8" fill="#db2777" fill-opacity="0.2" stroke="#db2777" stroke-width="2"/>
  <text x="685" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Subscriber 2</text>
  <text x="685" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#4b5563">(Fan-out)</text>

  <!-- Arrows publisher to queue -->
  <line x1="495" y1="168" x2="495" y2="210" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text x="510" y="194" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#dc2626">Publish</text>

  <!-- Arrows queue to subscribers -->
  <line x1="530" y1="258" x2="495" y2="300" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <line x1="650" y1="258" x2="685" y2="300" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="500" y="284" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#16a34a">Consume</text>
  <text x="695" y="284" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#16a34a">Consume</text>

  <!-- Async characteristics -->
  <rect x="430" y="370" width="320" height="100" rx="8" fill="#16a34a" fill-opacity="0.03" stroke="#16a34a" stroke-opacity="0.2" stroke-width="1"/>
  <text x="590" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a1822">Characteristics</text>
  <text x="444" y="414" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Publisher does not wait for response</text>
  <text x="444" y="432" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Decouples producer from consumer timing</text>
  <text x="444" y="450" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Supports fan-out to multiple consumers</text>
  <text x="444" y="468" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#4b5563">- Eventual consistency, not immediate</text>

  <!-- Arrow markers -->
  <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
  </marker>
  <marker id="arrowPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#db2777"/>
  </marker>
  <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
  </marker>
  <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
  </marker>
</svg>
