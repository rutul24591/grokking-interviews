<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Lock Failure Scenarios and Fencing Protection</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">How distributed locks fail and the fencing token pattern that prevents stale access</text>

  <!-- Scenario 1: Network Partition -->
  <rect x="30" y="80" width="410" height="130" rx="8" fill="#dc2626" opacity="0.06" stroke="#dc2626" stroke-width="2"/>
  <text x="235" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">Scenario 1: Network Partition During Lock Hold</text>
  <text x="50" y="130" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Client A holds lock (TTL=30s), gets partitioned from lock service</text>
  <text x="50" y="150" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Lock expires after 30s, Client B acquires lock</text>
  <text x="50" y="170" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Client A recovers, still thinks it holds the lock &#8594; writes to resource</text>
  <text x="50" y="195" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Both clients writing to the resource simultaneously!</text>

  <!-- Scenario 2: GC Pause -->
  <rect x="460" y="80" width="410" height="130" rx="8" fill="#d97706" opacity="0.06" stroke="#d97706" stroke-width="2"/>
  <text x="665" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Scenario 2: GC Pause Causes Lock Timeout</text>
  <text x="480" y="130" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Client A holds lock, enters 35s GC pause (TTL=30s)</text>
  <text x="480" y="150" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Lock expires, Client B acquires lock and writes to resource</text>
  <text x="480" y="170" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Client A resumes, still thinks it holds the lock &#8594; writes to resource</text>
  <text x="480" y="195" font-size="10" fill="#d97706" font-family="system-ui, sans-serif">&#9888; Concurrent writes corrupt the resource state!</text>

  <!-- Fencing token solution -->
  <rect x="30" y="240" width="840" height="265" rx="8" fill="#4f46e5" opacity="0.06" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Solution: Fencing Token Pattern</text>

  <!-- Without fencing -->
  <rect x="50" y="285" width="390" height="100" rx="6" fill="#dc2626" opacity="0.06" stroke="#dc2626" stroke-width="1"/>
  <text x="245" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">Without Fencing (Broken)</text>

  <!-- Timeline without fencing -->
  <line x1="70" y1="320" x2="420" y2="320" stroke="#475569" stroke-width="0.5"/>
  <rect x="70" y="310" width="100" height="20" rx="3" fill="#4f46e5" opacity="0.3"/>
  <text x="120" y="324" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">Client A: lock</text>
  <rect x="200" y="310" width="100" height="20" rx="3" fill="#16a34a" opacity="0.3"/>
  <text x="250" y="324" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">Client B: lock</text>
  <rect x="70" y="340" width="80" height="20" rx="3" fill="#4f46e5" opacity="0.3"/>
  <text x="110" y="354" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">A writes</text>
  <rect x="200" y="340" width="80" height="20" rx="3" fill="#16a34a" opacity="0.3"/>
  <text x="240" y="354" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">B writes</text>
  <text x="320" y="350" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#10007; Both write, corruption!</text>

  <!-- With fencing -->
  <rect x="460" y="285" width="390" height="100" rx="6" fill="#16a34a" opacity="0.06" stroke="#16a34a" stroke-width="1"/>
  <text x="655" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">With Fencing Token (Correct)</text>

  <!-- Timeline with fencing -->
  <line x1="480" y1="320" x2="830" y2="320" stroke="#475569" stroke-width="0.5"/>
  <rect x="480" y="310" width="100" height="20" rx="3" fill="#4f46e5" opacity="0.3"/>
  <text x="530" y="324" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">A: lock, token=1</text>
  <rect x="610" y="310" width="100" height="20" rx="3" fill="#16a34a" opacity="0.3"/>
  <text x="660" y="324" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">B: lock, token=2</text>
  <rect x="480" y="340" width="80" height="20" rx="3" fill="#4f46e5" opacity="0.3"/>
  <text x="520" y="354" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">A: write(1)</text>
  <rect x="610" y="340" width="80" height="20" rx="3" fill="#16a34a" opacity="0.3"/>
  <text x="650" y="354" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">B: write(2)</text>
  <text x="720" y="350" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Resource rejects A (1&lt;2)</text>

  <!-- Fencing explanation -->
  <rect x="50" y="400" width="800" height="90" rx="6" fill="#64748b" opacity="0.08" stroke="#475569" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">How Fencing Works:</text>
  <text x="70" y="442" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">1. Lock service returns a monotonically increasing token with each lock grant (token=1, token=2, ...)</text>
  <text x="70" y="462" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">2. Client includes the token in every write to the protected resource</text>
  <text x="70" y="482" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">3. Resource rejects writes with tokens lower than the highest token it has seen</text>
  <text x="450" y="442" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Client A writes with token=1, then Client B writes with token=2</text>
  <text x="450" y="462" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">If Client A tries to write again with token=1, the resource rejects it (1 &lt; 2)</text>
  <text x="450" y="482" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Stale clients cannot corrupt the resource, even if they think they hold the lock</text>
</svg>