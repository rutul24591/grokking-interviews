<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="#f3f1f8" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Write Path Architecture</text>

  <!-- Client -->
  <rect x="300" y="60" width="200" height="50" rx="8" fill="#4f46e5" fill-opacity="0.25" stroke="#4f46e5" stroke-width="2"/>
  <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Client Applications</text>

  <!-- Arrow: Client -> Write Buffer -->
  <line x1="400" y1="110" x2="400" y2="145" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="415" y="135" font-size="11" font-weight="400" fill="#4b5563">write requests</text>

  <!-- Write Buffer -->
  <rect x="250" y="150" width="300" height="55" rx="8" fill="#d97706" fill-opacity="0.2" stroke="#d97706" stroke-width="2"/>
  <text x="400" y="173" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Write Buffer / Queue</text>
  <text x="400" y="193" text-anchor="middle" font-size="11" font-weight="400" fill="#d97706">coalescing + backpressure</text>

  <!-- Arrow: Write Buffer -> WAL -->
  <line x1="400" y1="205" x2="400" y2="240" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="415" y="230" font-size="11" font-weight="400" fill="#4b5563">batched writes</text>

  <!-- WAL -->
  <rect x="250" y="245" width="300" height="55" rx="8" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="268" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Write-Ahead Log (WAL)</text>
  <text x="400" y="288" text-anchor="middle" font-size="11" font-weight="400" fill="#16a34a">sequential append, durability</text>

  <!-- Arrows: WAL -> Partition Nodes -->
  <line x1="330" y1="300" x2="170" y2="355" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="300" x2="400" y2="355" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="470" y1="300" x2="630" y2="355" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="245" y="335" font-size="10" font-weight="400" fill="#4b5563">partition A</text>
  <text x="415" y="335" font-size="10" font-weight="400" fill="#4b5563">partition B</text>
  <text x="555" y="335" font-size="10" font-weight="400" fill="#4b5563">partition C</text>

  <!-- Partitioned Write Nodes -->
  <rect x="50" y="360" width="180" height="55" rx="8" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Write Node A</text>
  <text x="140" y="403" text-anchor="middle" font-size="11" font-weight="400" fill="#2563eb">shard keys A-F</text>

  <rect x="310" y="360" width="180" height="55" rx="8" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Write Node B</text>
  <text x="400" y="403" text-anchor="middle" font-size="11" font-weight="400" fill="#2563eb">shard keys G-M</text>

  <rect x="570" y="360" width="180" height="55" rx="8" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-width="2"/>
  <text x="660" y="383" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Write Node C</text>
  <text x="660" y="403" text-anchor="middle" font-size="11" font-weight="400" fill="#2563eb">shard keys N-Z</text>

  <!-- Arrows: Nodes -> ACK -->
  <line x1="140" y1="415" x2="400" y2="460" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="415" x2="400" y2="460" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="660" y1="415" x2="400" y2="460" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Acknowledgment -->
  <rect x="280" y="465" width="240" height="45" rx="8" fill="#db2777" fill-opacity="0.2" stroke="#db2777" stroke-width="2"/>
  <text x="400" y="485" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Acknowledgment Flow</text>
  <text x="400" y="503" text-anchor="middle" font-size="11" font-weight="400" fill="#db2777">quorum confirmations</text>
</svg>
