<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>Anti-Entropy vs Gossip - Synchronization Strategies</title>
  <defs>
    <marker id="arrow-pink4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
    <marker id="arrow-blue4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-amber4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#f3f1f8" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Anti-Entropy vs. Gossip: Synchronization Strategies</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#4b5563">Left: Pull-based full synchronization. Right: Push-based partial exchange.</text>

  <!-- Divider -->
  <line x1="400" y1="70" x2="400" y2="500" stroke="#64748b" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="8,4"/>

  <!-- LEFT SIDE: Anti-Entropy -->
  <text x="200" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">Anti-Entropy (Pull-Based)</text>

  <!-- Node A -->
  <rect x="80" y="130" width="100" height="180" rx="8" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb">Node A</text>
  <text x="130" y="175" text-anchor="middle" font-size="11" fill="#2563eb">Full State:</text>
  <rect x="90" y="185" width="80" height="20" rx="3" fill="#2563eb" fill-opacity="0.2"/>
  <text x="130" y="199" text-anchor="middle" font-size="10" fill="#2563eb">K1=v1</text>
  <rect x="90" y="210" width="80" height="20" rx="3" fill="#2563eb" fill-opacity="0.2"/>
  <text x="130" y="224" text-anchor="middle" font-size="10" fill="#2563eb">K2=v2</text>
  <rect x="90" y="235" width="80" height="20" rx="3" fill="#2563eb" fill-opacity="0.2"/>
  <text x="130" y="249" text-anchor="middle" font-size="10" fill="#2563eb">K3=v3</text>
  <rect x="90" y="260" width="80" height="20" rx="3" fill="#2563eb" fill-opacity="0.2"/>
  <text x="130" y="274" text-anchor="middle" font-size="10" fill="#2563eb">K4=v4</text>
  <rect x="90" y="285" width="80" height="15" rx="3" fill="#2563eb" fill-opacity="0.2"/>
  <text x="130" y="296" text-anchor="middle" font-size="10" fill="#2563eb">K5=v5</text>

  <!-- Pull arrow: B requests full state from A -->
  <line x1="260" y1="180" x2="180" y2="180" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrow-amber4)"/>
  <text x="220" y="172" text-anchor="middle" font-size="11" fill="#d97706">REQUEST</text>
  <text x="220" y="186" text-anchor="middle" font-size="11" fill="#d97706">(DIGEST)</text>

  <!-- Response arrow: A sends full state to B -->
  <line x1="180" y1="230" x2="260" y2="230" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrow-amber4)"/>
  <text x="220" y="222" text-anchor="middle" font-size="11" fill="#d97706">FULL</text>
  <text x="220" y="236" text-anchor="middle" font-size="11" fill="#d97706">STATE</text>

  <!-- Node B (before sync - partial) -->
  <rect x="270" y="130" width="100" height="100" rx="8" fill="#db2777" fill-opacity="0.15" stroke="#db2777" stroke-width="2"/>
  <text x="320" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#db2777">Node B</text>
  <text x="320" y="175" text-anchor="middle" font-size="11" fill="#db2777">Before Sync:</text>
  <rect x="280" y="185" width="80" height="20" rx="3" fill="#db2777" fill-opacity="0.2"/>
  <text x="320" y="199" text-anchor="middle" font-size="10" fill="#db2777">K1=v1</text>
  <rect x="280" y="210" width="80" height="15" rx="3" fill="#db2777" fill-opacity="0.2"/>
  <text x="320" y="221" text-anchor="middle" font-size="10" fill="#db2777">K2=OLD</text>

  <!-- Node B (after sync - full) -->
  <rect x="270" y="260" width="100" height="50" rx="8" fill="#16a34a" fill-opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="320" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">After Sync</text>
  <text x="320" y="300" text-anchor="middle" font-size="11" fill="#16a34a">Full state replicated</text>

  <!-- Characteristics -->
  <rect x="60" y="350" width="280" height="140" rx="8" fill="#2563eb" fill-opacity="0.05" stroke="#2563eb" stroke-opacity="0.3" stroke-width="1"/>
  <text x="200" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb">Characteristics</text>
  <text x="75" y="396" font-size="11" fill="#4b5563">- Exchanges full state (or Merkle tree diff)</text>
  <text x="75" y="416" font-size="11" fill="#4b5563">- Periodic, scheduled (e.g., every 10s)</text>
  <text x="75" y="436" font-size="11" fill="#4b5563">- High bandwidth per exchange</text>
  <text x="75" y="456" font-size="11" fill="#4b5563">- Guarantees eventual consistency</text>
  <text x="75" y="476" font-size="11" fill="#4b5563">- Used in Dynamo, Cassandra (Merkle trees)</text>

  <!-- RIGHT SIDE: Gossip -->
  <text x="600" y="90" text-anchor="middle" font-size="16" font-weight="bold" fill="#db2777">Gossip (Push-Based)</text>

  <!-- Node A gossiping -->
  <rect x="480" y="130" width="90" height="60" rx="8" fill="#db2777" fill-opacity="0.15" stroke="#db2777" stroke-width="2"/>
  <text x="525" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#db2777">Node A</text>
  <text x="525" y="175" text-anchor="middle" font-size="10" fill="#db2777">Has: K1,K2,K3</text>

  <!-- Gossip arrows to random peers -->
  <line x1="570" y1="155" x2="650" y2="145" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-blue4)"/>
  <line x1="570" y1="155" x2="650" y2="230" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-blue4)"/>
  <text x="610" y="138" text-anchor="middle" font-size="10" fill="#4f46e5">push(K3)</text>
  <text x="610" y="205" text-anchor="middle" font-size="10" fill="#4f46e5">push(K2)</text>

  <!-- Peers -->
  <rect x="660" y="120" width="90" height="50" rx="8" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="705" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f46e5">Node B</text>
  <text x="705" y="158" text-anchor="middle" font-size="10" fill="#4f46e5">Receives: K3</text>

  <rect x="660" y="200" width="90" height="50" rx="8" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="705" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f46e5">Node C</text>
  <text x="705" y="238" text-anchor="middle" font-size="10" fill="#4f46e5">Receives: K2</text>

  <!-- Peers then gossip further -->
  <line x1="750" y1="145" x2="705" y2="260" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber4)"/>
  <text x="740" y="210" text-anchor="middle" font-size="9" fill="#d97706">forward</text>

  <rect x="660" y="270" width="90" height="50" rx="8" fill="#16a34a" fill-opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="705" y="292" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">Node D</text>
  <text x="705" y="308" text-anchor="middle" font-size="10" fill="#16a34a">Eventually gets all</text>

  <!-- Characteristics -->
  <rect x="460" y="350" width="280" height="140" rx="8" fill="#db2777" fill-opacity="0.05" stroke="#db2777" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#db2777">Characteristics</text>
  <text x="475" y="396" font-size="11" fill="#4b5563">- Exchanges partial state (random peers)</text>
  <text x="475" y="416" font-size="11" fill="#4b5563">- Continuous, periodic (e.g., every 1s)</text>
  <text x="475" y="436" font-size="11" fill="#4b5563">- Low bandwidth per exchange</text>
  <text x="475" y="456" font-size="11" fill="#4b5563">- Converges in O(log N) rounds</text>
  <text x="475" y="476" font-size="11" fill="#4b5563">- Used in SWIM, Cassandra, Consul</text>

  <!-- Summary box at bottom -->
  <rect x="60" y="490" width="680" height="25" rx="6" fill="#4f46e5" fill-opacity="0.05" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="400" y="508" text-anchor="middle" font-size="12" fill="#4b5563">Anti-entropy provides strong consistency guarantees; gossip provides fast convergence with lower bandwidth. Production systems use both together.</text>
</svg>
