<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="system-ui, sans-serif">
  <title>Denormalization Strategies: Four Approaches Compared</title>
  <defs>
    <marker id="arrowA" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
    <marker id="arrowC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowD" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1822">Denormalization Strategies: Four Approaches Compared</text>

  <!-- Strategy 1: Duplicate-and-Update -->
  <rect x="20" y="65" width="420" height="110" rx="10" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="230" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#4338ca">Strategy 1: Duplicate-and-Update (Synchronous)</text>
  <text x="40" y="115" font-size="11" fill="#4338ca">Application writes to source table AND all denormalized copies in a single transaction.</text>
  <text x="40" y="133" font-size="11" fill="#64748b">Strong consistency but high write latency. Fails if any copy write fails (atomic).</text>
  <text x="40" y="151" font-size="11" fill="#64748b">Best for: 2-3 copies, low-latency tolerance, same database.</text>

  <!-- Flow diagram for Strategy 1 -->
  <rect x="40" y="165" width="80" height="28" rx="5" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="80" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">App TX</text>
  <line x1="120" y1="179" x2="160" y2="179" stroke="#d97706" stroke-width="2" marker-end="url(#arrowA)"/>
  <rect x="160" y="165" width="80" height="28" rx="5" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1"/>
  <text x="200" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">Source</text>
  <line x1="240" y1="179" x2="270" y2="179" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowA)"/>
  <rect x="270" y="165" width="80" height="28" rx="5" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1"/>
  <text x="310" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">Copy A</text>
  <line x1="350" y1="179" x2="380" y2="179" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowA)"/>
  <rect x="380" y="165" width="80" height="28" rx="5" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1"/>
  <text x="420" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Copy B</text>

  <!-- Strategy 2: Event-Driven -->
  <rect x="20" y="210" width="420" height="110" rx="10" fill="#db2777" opacity="0.08" stroke="#db2777" stroke-width="2"/>
  <text x="230" y="237" text-anchor="middle" font-size="16" font-weight="bold" fill="#9d174d">Strategy 2: Event-Driven (Asynchronous)</text>
  <text x="40" y="260" font-size="11" fill="#9d174d">Application publishes event after source write. Consumers update copies independently.</text>
  <text x="40" y="278" font-size="11" fill="#64748b">Eventual consistency. Decoupled, scalable, but staleness window exists.</text>
  <text x="40" y="296" font-size="11" fill="#64748b">Best for: many consumers, cross-service denormalization, tolerance for stale reads.</text>

  <!-- Flow diagram for Strategy 2 -->
  <rect x="40" y="310" width="80" height="28" rx="5" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="80" y="329" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">App</text>
  <line x1="120" y1="324" x2="160" y2="324" stroke="#db2777" stroke-width="2" marker-end="url(#arrowB)"/>
  <rect x="160" y="310" width="80" height="28" rx="5" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1"/>
  <text x="200" y="329" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">Source</text>
  <line x1="240" y1="324" x2="270" y2="324" stroke="#db2777" stroke-width="2" marker-end="url(#arrowB)"/>
  <rect x="270" y="310" width="80" height="28" rx="5" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="310" y="329" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Event</text>
  <line x1="350" y1="324" x2="370" y2="324" stroke="#db2777" stroke-width="2" marker-end="url(#arrowB)"/>
  <rect x="370" y="310" width="80" height="28" rx="5" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1"/>
  <text x="410" y="329" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d">Consumers</text>

  <!-- Strategy 3: CDC-Based -->
  <rect x="460" y="65" width="420" height="110" rx="10" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="2"/>
  <text x="670" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#1d4ed8">Strategy 3: Change Data Capture (CDC)</text>
  <text x="480" y="115" font-size="11" fill="#1d4ed8">Database log (WAL/binlog) is streamed in real-time. External consumers parse the log</text>
  <text x="480" y="133" font-size="11" fill="#64748b">and apply changes to denormalized stores. Zero application code changes needed.</text>
  <text x="480" y="151" font-size="11" fill="#64748b">Best for: legacy systems, multi-store sync, Debezium/Kafka Connect pipelines.</text>

  <!-- Flow diagram for Strategy 3 -->
  <rect x="480" y="165" width="80" height="28" rx="5" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="520" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">App</text>
  <line x1="560" y1="179" x2="590" y2="179" stroke="#d97706" stroke-width="2" marker-end="url(#arrowC)"/>
  <rect x="590" y="165" width="80" height="28" rx="5" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1"/>
  <text x="630" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">WAL</text>
  <line x1="670" y1="179" x2="700" y2="179" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowC)"/>
  <rect x="700" y="165" width="80" height="28" rx="5" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1"/>
  <text x="740" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca">Debezium</text>
  <line x1="780" y1="179" x2="810" y2="179" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowC)"/>
  <rect x="810" y="165" width="80" height="28" rx="5" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="1"/>
  <text x="850" y="184" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d">Targets</text>

  <!-- Strategy 4: Batch Rebuild -->
  <rect x="460" y="210" width="420" height="110" rx="10" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="670" y="237" text-anchor="middle" font-size="16" font-weight="bold" fill="#15803d">Strategy 4: Batch Rebuild (Periodic)</text>
  <text x="480" y="260" font-size="11" fill="#15803d">Scheduled job (hourly/daily) recomputes denormalized views from source tables.</text>
  <text x="480" y="278" font-size="11" fill="#64748b">High staleness but simple, correct, and self-healing. Rebuilds fix any drift.</text>
  <text x="480" y="296" font-size="11" fill="#64748b">Best for: analytics, reporting, dashboards, acceptable staleness greater than minutes.</text>

  <!-- Flow diagram for Strategy 4 -->
  <rect x="480" y="310" width="80" height="28" rx="5" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="520" y="329" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Source</text>
  <line x1="560" y1="324" x2="590" y2="324" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowD)"/>
  <rect x="590" y="310" width="80" height="28" rx="5" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="630" y="329" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Scheduler</text>
  <line x1="670" y1="324" x2="700" y2="324" stroke="#d97706" stroke-width="2" marker-end="url(#arrowD)"/>
  <rect x="700" y="310" width="80" height="28" rx="5" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1"/>
  <text x="740" y="329" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca">ETL Job</text>
  <line x1="780" y1="324" x2="810" y2="324" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowD)"/>
  <rect x="810" y="310" width="80" height="28" rx="5" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1"/>
  <text x="850" y="329" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Views</text>

  <!-- Comparison table -->
  <rect x="20" y="360" width="860" height="190" rx="12" fill="#4f46e5" opacity="0.04" stroke="#64748b" stroke-width="2"/>
  <text x="450" y="390" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1822">Strategy Comparison</text>

  <!-- Table headers -->
  <text x="40" y="420" font-size="11" font-weight="bold" fill="#1a1822">Strategy</text>
  <text x="200" y="420" font-size="11" font-weight="bold" fill="#1a1822">Consistency</text>
  <text x="370" y="420" font-size="11" font-weight="bold" fill="#1a1822">Write Latency</text>
  <text x="530" y="420" font-size="11" font-weight="bold" fill="#1a1822">Complexity</text>
  <text x="680" y="420" font-size="11" font-weight="bold" fill="#1a1822">Staleness</text>
  <text x="800" y="420" font-size="11" font-weight="bold" fill="#1a1822">Use Case</text>

  <!-- Row 1 -->
  <text x="40" y="445" font-size="10" fill="#64748b">Duplicate-and-Update</text>
  <text x="200" y="445" font-size="10" fill="#64748b">Strong</text>
  <text x="370" y="445" font-size="10" fill="#64748b">High</text>
  <text x="530" y="445" font-size="10" fill="#64748b">Low</text>
  <text x="680" y="445" font-size="10" fill="#64748b">Zero</text>
  <text x="800" y="445" font-size="10" fill="#64748b">Same DB, few copies</text>

  <!-- Row 2 -->
  <text x="40" y="470" font-size="10" fill="#64748b">Event-Driven</text>
  <text x="200" y="470" font-size="10" fill="#64748b">Eventual</text>
  <text x="370" y="470" font-size="10" fill="#64748b">Low</text>
  <text x="530" y="470" font-size="10" fill="#64748b">Medium</text>
  <text x="680" y="470" font-size="10" fill="#64748b">100ms - 5s</text>
  <text x="800" y="470" font-size="10" fill="#64748b">Cross-service</text>

  <!-- Row 3 -->
  <text x="40" y="495" font-size="10" fill="#64748b">CDC-Based</text>
  <text x="200" y="495" font-size="10" fill="#64748b">Eventual</text>
  <text x="370" y="495" font-size="10" fill="#64748b">Low</text>
  <text x="530" y="495" font-size="10" fill="#64748b">High</text>
  <text x="680" y="495" font-size="10" fill="#64748b">10ms - 1s</text>
  <text x="800" y="495" font-size="10" fill="#64748b">Legacy, multi-store</text>

  <!-- Row 4 -->
  <text x="40" y="520" font-size="10" fill="#64748b">Batch Rebuild</text>
  <text x="200" y="520" font-size="10" fill="#64748b">Eventual</text>
  <text x="370" y="520" font-size="10" fill="#64748b">None</text>
  <text x="530" y="520" font-size="10" fill="#64748b">Low</text>
  <text x="680" y="520" font-size="10" fill="#64748b">Minutes-hours</text>
  <text x="800" y="520" font-size="10" fill="#64748b">Analytics, reports</text>
</svg>