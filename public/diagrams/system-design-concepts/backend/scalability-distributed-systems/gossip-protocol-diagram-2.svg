<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>SWIM Membership Protocol - Failure Detection Flow</title>
  <defs>
    <marker id="arrow-blue2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-amber2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arrow-red2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#f3f1f8" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">SWIM Membership Protocol -- Failure Detection Flow</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#4b5563">Ping, ping-ack, and indirect ping phases with suspicion timeline</text>

  <!-- Node lifelines -->
  <!-- Node A (monitor) -->
  <line x1="150" y1="80" x2="150" y2="490" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="110" y="80" width="80" height="36" rx="6" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="150" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#4f46e5">Node A</text>
  <text x="150" y="505" text-anchor="middle" font-size="11" fill="#4f46e5">(Monitor)</text>

  <!-- Node B (target) -->
  <line x1="350" y1="80" x2="350" y2="490" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="310" y="80" width="80" height="36" rx="6" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626" stroke-width="2"/>
  <text x="350" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">Node B</text>
  <text x="350" y="505" text-anchor="middle" font-size="11" fill="#dc2626">(Target)</text>

  <!-- Node C (indirect) -->
  <line x1="550" y1="80" x2="550" y2="490" stroke="#2563eb" stroke-width="2" stroke-dasharray="4,4"/>
  <rect x="510" y="80" width="80" height="36" rx="6" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="550" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb">Node C</text>
  <text x="550" y="505" text-anchor="middle" font-size="11" fill="#2563eb">(Indirect)</text>

  <!-- Phase 1: Ping from A to B -->
  <text x="400" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Phase 1: Direct Ping</text>
  <line x1="150" y1="175" x2="350" y2="175" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue2)"/>
  <text x="250" y="168" text-anchor="middle" font-size="12" fill="#2563eb">PING (t=0)</text>

  <!-- B fails to respond - crash marker -->
  <text x="350" y="200" text-anchor="middle" font-size="18" fill="#dc2626">&#x2717;</text>
  <text x="350" y="218" text-anchor="middle" font-size="11" fill="#dc2626">No response</text>

  <!-- Timeout period -->
  <rect x="330" y="230" width="40" height="30" rx="4" fill="#d97706" fill-opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <text x="350" y="250" text-anchor="middle" font-size="10" fill="#d97706">Timeout</text>

  <!-- Phase 2: Indirect Ping via C -->
  <text x="400" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Phase 2: Indirect Ping</text>
  <line x1="150" y1="315" x2="550" y2="315" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrow-amber2)"/>
  <text x="350" y="308" text-anchor="middle" font-size="12" fill="#d97706">INDIRECT-PING (t=timeout)</text>

  <line x1="550" y1="335" x2="350" y2="335" stroke="#d97706" stroke-width="2.5" marker-end="url(#arrow-amber2)"/>
  <text x="450" y="328" text-anchor="middle" font-size="12" fill="#d97706">PING</text>

  <!-- C also gets no response -->
  <text x="350" y="360" text-anchor="middle" font-size="18" fill="#dc2626">&#x2717;</text>
  <text x="350" y="378" text-anchor="middle" font-size="11" fill="#dc2626">No response</text>

  <!-- Phase 3: Suspicion -->
  <text x="400" y="415" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Phase 3: Suspect -&gt; Confirmed Dead</text>

  <!-- A marks B as suspect -->
  <rect x="110" y="430" width="80" height="30" rx="6" fill="#d97706" fill-opacity="0.2" stroke="#d97706" stroke-width="2"/>
  <text x="150" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">SUSPECT</text>

  <!-- After timeout period, confirmed dead -->
  <line x1="190" y1="445" x2="280" y2="445" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red2)"/>
  <text x="235" y="438" text-anchor="middle" font-size="10" fill="#dc2626">T + cleanup</text>

  <!-- A marks B as dead, gossips to C -->
  <rect x="290" y="430" width="80" height="30" rx="6" fill="#dc2626" fill-opacity="0.2" stroke="#dc2626" stroke-width="2"/>
  <text x="330" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">DEAD</text>

  <line x1="370" y1="445" x2="550" y2="445" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-purple2)"/>
  <text x="460" y="438" text-anchor="middle" font-size="10" fill="#4f46e5">GOSSIP: B is dead</text>

  <!-- C receives and updates -->
  <rect x="510" y="430" width="80" height="30" rx="6" fill="#dc2626" fill-opacity="0.2" stroke="#dc2626" stroke-width="2"/>
  <text x="550" y="450" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">DEAD</text>

  <!-- Annotation box -->
  <rect x="50" y="470" width="700" height="40" rx="6" fill="#4f46e5" fill-opacity="0.05" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="400" y="495" text-anchor="middle" font-size="12" fill="#4b5563">SWIM uses suspicion: Node A suspects B, gossips suspicion to C. If C also cannot reach B, B is confirmed dead. False positives possible under network jitter.</text>
</svg>
