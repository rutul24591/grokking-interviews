<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Causality Detection: Concurrent vs Causally Related Events</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Vector clocks enable detection of causal relationships and concurrent (incomparable) events</text>

  <!-- Causally related -->
  <rect x="30" y="80" width="410" height="200" rx="8" fill="#16a34a" opacity="0.06" stroke="#16a34a" stroke-width="2"/>
  <text x="235" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Causally Related (VC1 &lt; VC2)</text>

  <!-- Process A -->
  <rect x="60" y="120" width="150" height="140" rx="6" fill="#4f46e5" opacity="0.08"/>
  <text x="135" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Process A</text>
  <circle cx="135" cy="170" r="12" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="135" y="174" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">a</text>
  <text x="60" y="174" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[1,0]</text>
  <circle cx="135" cy="220" r="12" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="135" y="224" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">c</text>
  <text x="60" y="224" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[3,2]</text>
  <path d="M 135 182 L 135 208" fill="none" stroke="#4f46e5" stroke-width="1"/>

  <!-- Process B -->
  <rect x="240" y="120" width="150" height="140" rx="6" fill="#16a34a" opacity="0.08"/>
  <text x="315" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Process B</text>
  <circle cx="315" cy="170" r="12" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="315" y="174" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">b</text>
  <text x="240" y="174" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[1,1]</text>
  <circle cx="315" cy="220" r="12" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="315" y="224" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">d</text>
  <text x="240" y="224" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[3,3]</text>
  <path d="M 315 182 L 315 208" fill="none" stroke="#16a34a" stroke-width="1"/>

  <!-- Message a -> b -->
  <path d="M 147 170 L 303 170" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <!-- Message b -> c -->
  <path d="M 303 170 L 147 220" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <!-- Message c -> d -->
  <path d="M 147 220 L 303 220" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>

  <text x="235" y="270" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">a [1,0] &lt; b [1,1] &lt; c [3,2] &lt; d [3,3] — all causally related</text>
  <text x="235" y="288" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Each event depends on the previous event in the chain</text>

  <!-- Concurrent events -->
  <rect x="460" y="80" width="410" height="200" rx="8" fill="#dc2626" opacity="0.06" stroke="#dc2626" stroke-width="2"/>
  <text x="665" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">Concurrent (VC1 || VC2 — incomparable)</text>

  <rect x="490" y="120" width="150" height="140" rx="6" fill="#4f46e5" opacity="0.08"/>
  <text x="565" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Process A</text>
  <circle cx="565" cy="170" r="12" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="565" y="174" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">x</text>
  <text x="490" y="174" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[2,0]</text>
  <circle cx="565" cy="220" r="12" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="565" y="224" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">z</text>
  <text x="490" y="224" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[3,0]</text>
  <path d="M 565 182 L 565 208" fill="none" stroke="#4f46e5" stroke-width="1"/>

  <rect x="670" y="120" width="150" height="140" rx="6" fill="#d97706" opacity="0.08"/>
  <text x="745" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Process B</text>
  <circle cx="745" cy="170" r="12" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="745" y="174" text-anchor="middle" font-size="8" fill="#92400e" font-family="system-ui, sans-serif">y</text>
  <text x="670" y="174" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[0,2]</text>
  <circle cx="745" cy="220" r="12" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="745" y="224" text-anchor="middle" font-size="8" fill="#92400e" font-family="system-ui, sans-serif">w</text>
  <text x="670" y="224" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[0,3]</text>
  <path d="M 745 182 L 745 208" fill="none" stroke="#d97706" stroke-width="1"/>

  <!-- No messages between processes -->
  <text x="665" y="190" text-anchor="middle" font-size="16" fill="#dc2626" font-family="system-ui, sans-serif">&#10007;</text>
  <text x="665" y="205" text-anchor="middle" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">No communication</text>

  <text x="665" y="270" text-anchor="middle" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">x [2,0] || y [0,2] — concurrent (neither VC1 &lt; VC2 nor VC2 &lt; VC1)</text>
  <text x="665" y="288" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">No causal relationship — events happened independently</text>

  <!-- Comparison rules -->
  <rect x="30" y="310" width="840" height="195" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Vector Clock Comparison Rules</text>

  <rect x="50" y="355" width="390" height="50" rx="4" fill="#16a34a" opacity="0.08"/>
  <text x="70" y="375" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">VC1 &lt; VC2 (causally related):</text>
  <text x="70" y="395" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">All components of VC1 &#8804; VC2, and at least one is strictly &lt;</text>

  <rect x="460" y="355" width="390" height="50" rx="4" fill="#dc2626" opacity="0.08"/>
  <text x="480" y="375" font-size="11" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">VC1 || VC2 (concurrent):</text>
  <text x="480" y="395" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Some components of VC1 &gt; VC2, and some are &lt; (incomparable)</text>

  <rect x="50" y="415" width="390" height="50" rx="4" fill="#4f46e5" opacity="0.08"/>
  <text x="70" y="435" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">VC1 = VC2 (same event):</text>
  <text x="70" y="455" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">All components of VC1 = VC2 (same event or same state)</text>

  <rect x="460" y="415" width="390" height="50" rx="4" fill="#d97706" opacity="0.08"/>
  <text x="480" y="435" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Key Insight:</text>
  <text x="480" y="455" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Lamport timestamps cannot detect concurrency; vector clocks can</text>

  <defs>
    <marker id="pinkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
  </defs>
</svg>