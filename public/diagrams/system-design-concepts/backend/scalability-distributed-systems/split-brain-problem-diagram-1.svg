<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" font-family="system-ui, sans-serif">
  <title>Network Partition: Cluster Splits Into Two Leaders showing split brain scenario</title>
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#f3f1f8" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1a1822">Network Partition: Cluster Splits Into Two Leaders</text>
  <text x="400" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="normal" fill="#64748b">A 5-node cluster partitions; each side elects its own leader, creating split brain</text>

  <!-- Left partition box -->
  <rect x="40" y="90" width="320" height="300" rx="16" fill="#4f46e5" fill-opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="200" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#4f46e5">Partition A (Leader A)</text>

  <!-- Right partition box -->
  <rect x="440" y="90" width="320" height="300" rx="16" fill="#db2777" fill-opacity="0.12" stroke="#db2777" stroke-width="2"/>
  <text x="600" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#db2777">Partition B (Leader B)</text>

  <!-- Partition break line -->
  <line x1="390" y1="90" x2="390" y2="400" stroke="#dc2626" stroke-width="3" stroke-dasharray="10,6"/>
  <text x="390" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">NETWORK PARTITION</text>

  <!-- Node 1 - Leader A -->
  <rect x="80" y="145" width="100" height="60" rx="10" fill="#4f46e5" fill-opacity="0.85" stroke="#818cf8" stroke-width="2"/>
  <text x="130" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Leader A</text>
  <text x="130" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#e0e7ff">Term 7</text>

  <!-- Node 2 -->
  <rect x="200" y="145" width="100" height="60" rx="10" fill="#16a34a" fill-opacity="0.7" stroke="#4ade80" stroke-width="2"/>
  <text x="250" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Follower</text>
  <text x="250" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#dcfce7">Node 2</text>

  <!-- Node 3 (down) -->
  <rect x="310" y="240" width="100" height="60" rx="10" fill="#94a3b8" fill-opacity="0.3" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="360" y="267" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b">Node 3</text>
  <text x="360" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Unreachable</text>

  <!-- Node 4 -->
  <rect x="460" y="145" width="100" height="60" rx="10" fill="#16a34a" fill-opacity="0.7" stroke="#4ade80" stroke-width="2"/>
  <text x="510" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Follower</text>
  <text x="510" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#dcfce7">Node 4</text>

  <!-- Node 5 - Leader B -->
  <rect x="580" y="145" width="100" height="60" rx="10" fill="#db2777" fill-opacity="0.85" stroke="#fb7185" stroke-width="2"/>
  <text x="630" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Leader B</text>
  <text x="630" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#fce7f3">Term 7</text>

  <!-- Internal connections Partition A -->
  <line x1="180" y1="175" x2="200" y2="175" stroke="#818cf8" stroke-width="2"/>
  <line x1="250" y1="205" x2="310" y2="240" stroke="#818cf8" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Internal connections Partition B -->
  <line x1="510" y1="175" x2="580" y2="175" stroke="#fb7185" stroke-width="2"/>
  <line x1="510" y1="205" x2="360" y2="267" stroke="#fb7185" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Write arrows - both leaders accepting writes -->
  <line x1="130" y1="215" x2="130" y2="310" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="100" y="275" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#4f46e5">WRITE</text>

  <line x1="630" y1="215" x2="630" y2="310" stroke="#db2777" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="645" y="275" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#db2777">WRITE</text>

  <!-- Storage boxes -->
  <rect x="70" y="320" width="120" height="50" rx="8" fill="#4f46e5" fill-opacity="0.3" stroke="#818cf8" stroke-width="1.5"/>
  <text x="130" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822">Data Store A</text>
  <text x="130" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#4338ca">x=10, y=20</text>

  <rect x="570" y="320" width="120" height="50" rx="8" fill="#db2777" fill-opacity="0.3" stroke="#fb7185" stroke-width="1.5"/>
  <text x="630" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#9d174d">Data Store B</text>
  <text x="630" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#be185d">x=15, y=25</text>

  <!-- Conflict warning -->
  <rect x="260" y="330" width="260" height="40" rx="8" fill="#d97706" fill-opacity="0.2" stroke="#d97706" stroke-width="2"/>
  <text x="390" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#92400e">CONFLICTING WRITES: DIVERGENT STATE</text>

  <!-- Quorum note -->
  <rect x="40" y="400" width="720" height="55" rx="8" fill="#64748b" opacity="0.08" stroke="#475569" stroke-width="1"/>
  <text x="400" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822">Key Insight: Without quorum enforcement, both leaders believe they have majority and accept writes independently.</text>
  <text x="400" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">When the partition heals, the two data stores contain conflicting values that must be reconciled.</text>
</svg>