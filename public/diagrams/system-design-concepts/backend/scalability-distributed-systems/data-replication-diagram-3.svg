<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Multi-Leader Conflict Resolution</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">When two leaders update the same key simultaneously, conflict resolution strategies determine the outcome</text>

  <!-- Conflict scenario -->
  <rect x="30" y="80" width="840" height="100" rx="8" fill="#dc2626" opacity="0.06" stroke="#dc2626" stroke-width="1.5"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">Write Conflict: Two leaders update the same key simultaneously</text>

  <!-- Leader A -->
  <rect x="60" y="115" width="200" height="50" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="160" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Leader A (US-East)</text>
  <text x="160" y="155" text-anchor="middle" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">SET price = 99 (t=1000)</text>

  <!-- Conflict symbol -->
  <text x="360" y="145" text-anchor="middle" font-size="24" fill="#dc2626" font-family="system-ui, sans-serif">&#9889;</text>

  <!-- Leader B -->
  <rect x="460" y="115" width="200" height="50" rx="6" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="560" y="135" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Leader B (EU-West)</text>
  <text x="560" y="155" text-anchor="middle" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">SET price = 109 (t=1001)</text>

  <!-- Arrow to resolution strategies -->
  <path d="M 450 180 L 450 220" fill="none" stroke="#db2777" stroke-width="2" marker-end="url(#pinkArrow)"/>

  <!-- 4 Resolution strategies -->
  <!-- Strategy 1: LWW -->
  <rect x="30" y="230" width="195" height="130" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="127" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Last-Writer-Wins</text>
  <text x="50" y="280" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Latest timestamp wins</text>
  <text x="50" y="300" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Result: price = 109 (t=1001)</text>
  <text x="50" y="325" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Simple, deterministic</text>
  <text x="50" y="345" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Loses concurrent writes</text>

  <!-- Strategy 2: Custom Merge -->
  <rect x="240" y="230" width="195" height="130" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="337" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Custom Merge</text>
  <text x="260" y="280" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Application-defined merge</text>
  <text x="260" y="300" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Result: price = min(99, 109)</text>
  <text x="260" y="325" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Semantically correct</text>
  <text x="260" y="345" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Complex per data type</text>

  <!-- Strategy 3: CRDTs -->
  <rect x="450" y="230" width="195" height="130" rx="8" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
  <text x="547" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">CRDTs</text>
  <text x="470" y="280" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Mathematical convergence</text>
  <text x="470" y="300" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Result: max(counter_A, counter_B)</text>
  <text x="470" y="325" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Guaranteed convergence</text>
  <text x="470" y="345" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Limited data types</text>

  <!-- Strategy 4: Version Vectors -->
  <rect x="660" y="230" width="210" height="130" rx="8" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="2"/>
  <text x="765" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Version Vectors</text>
  <text x="680" y="280" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Detect concurrent writes</text>
  <text x="680" y="300" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Result: siblings to client</text>
  <text x="680" y="325" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; No data loss</text>
  <text x="680" y="345" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Client must resolve</text>

  <!-- Detailed conflict resolution flow -->
  <rect x="30" y="380" width="840" height="125" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">LWW Conflict Resolution Flow</text>

  <!-- Steps -->
  <circle cx="80" cy="445" r="18" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="80" y="449" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">1</text>
  <text x="110" y="440" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">Leader A writes price=99, timestamp=1000</text>
  <text x="110" y="458" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Replicates to Leader B</text>

  <path d="M 98 445 L 170 445" fill="none" stroke="#475569" stroke-width="1.5"/>

  <circle cx="200" cy="445" r="18" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
  <text x="200" y="449" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">2</text>
  <text x="230" y="440" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">Leader B writes price=109, timestamp=1001</text>
  <text x="230" y="458" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Replicates to Leader A</text>

  <path d="M 218 445 L 290 445" fill="none" stroke="#475569" stroke-width="1.5"/>

  <circle cx="320" cy="445" r="18" fill="#d97706" opacity="0.2" stroke="#d97706" stroke-width="1.5"/>
  <text x="320" y="449" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">3</text>
  <text x="350" y="440" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">Conflict detected: both have different values</text>
  <text x="350" y="458" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Compare timestamps: 1001 &gt; 1000</text>

  <path d="M 338 445 L 410 445" fill="none" stroke="#475569" stroke-width="1.5"/>

  <circle cx="440" cy="445" r="18" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="1.5"/>
  <text x="440" y="449" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">4</text>
  <text x="470" y="440" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">Leader A accepts price=109 from Leader B</text>
  <text x="470" y="458" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">price=99 discarded (lower timestamp)</text>

  <path d="M 458 445 L 530 445" fill="none" stroke="#475569" stroke-width="1.5"/>

  <circle cx="560" cy="445" r="18" fill="#db2777" opacity="0.2" stroke="#db2777" stroke-width="1.5"/>
  <text x="560" y="449" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">5</text>
  <text x="590" y="440" font-size="10" fill="#1a1822" font-family="system-ui, sans-serif">Both leaders converge: price = 109</text>
  <text x="590" y="458" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Converged! (but price=99 is lost)</text>

  <!-- Warning -->
  <rect x="30" y="480" width="840" height="30" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="450" y="500" text-anchor="middle" font-size="11" fill="#991b1b" font-family="system-ui, sans-serif">&#9888; Clock skew can cause incorrect LWW resolution — use hybrid logical clocks or vector clocks for accurate ordering</text>

  <defs>
    <marker id="pinkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
  </defs>
</svg>