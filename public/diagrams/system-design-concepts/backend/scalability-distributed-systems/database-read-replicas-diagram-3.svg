<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Failover Process: Primary Failure and Replica Promotion</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Step-by-step failover when the primary crashes and a replica is promoted</text>

  <!-- BEFORE: Normal operation -->
  <text x="225" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#16a34a" font-family="system-ui, sans-serif">Before: Healthy</text>
  <rect x="30" y="115" width="390" height="170" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>

  <rect x="100" y="130" width="160" height="50" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="180" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Primary</text>
  <text x="180" y="170" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Offset: 1000</text>

  <rect x="100" y="200" width="70" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="135" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">R1</text>
  <text x="135" y="235" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Off: 998</text>

  <rect x="185" y="200" width="70" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="220" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">R2</text>
  <text x="220" y="235" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Off: 995</text>

  <rect x="270" y="200" width="70" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="305" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">R3</text>
  <text x="305" y="235" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Off: 990</text>

  <path d="M 180 180 L 135 200" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M 180 180 L 220 200" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M 180 180 L 305 200" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Arrow between -->
  <path d="M 440 200 L 460 200" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#redArrow)"/>
  <text x="450" y="185" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626" font-family="system-ui, sans-serif">CRASH</text>

  <!-- AFTER: Failover -->
  <text x="675" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#dc2626" font-family="system-ui, sans-serif">After: Failover Complete</text>
  <rect x="480" y="115" width="390" height="170" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>

  <!-- New Primary R1 -->
  <rect x="550" y="130" width="160" height="50" rx="6" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="630" y="152" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">New Primary (R1)</text>
  <text x="630" y="170" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Offset: 998 &#8594; writable</text>

  <!-- Old primary dead -->
  <rect x="550" y="200" width="70" height="45" rx="6" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="585" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">Old</text>
  <text x="585" y="235" text-anchor="middle" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">DEAD</text>

  <rect x="635" y="200" width="70" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="670" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">R2</text>
  <text x="670" y="235" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Repl from R1</text>

  <rect x="720" y="200" width="70" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="755" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">R3</text>
  <text x="755" y="235" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Repl from R1</text>

  <path d="M 630 180 L 670 200" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M 630 180 L 755 200" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Failover timeline -->
  <rect x="30" y="310" width="840" height="195" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Failover Timeline</text>

  <!-- Step 1 -->
  <circle cx="100" cy="370" r="22" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="2"/>
  <text x="100" y="374" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">1</text>
  <text x="135" y="365" font-size="11" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Detect Primary Failure</text>
  <text x="135" y="385" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Heartbeat timeout (5-30s)</text>

  <path d="M 122 370 L 200 370" fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- Step 2 -->
  <circle cx="230" cy="370" r="22" fill="#d97706" opacity="0.2" stroke="#d97706" stroke-width="2"/>
  <text x="230" y="374" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">2</text>
  <text x="265" y="365" font-size="11" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Select New Primary</text>
  <text x="265" y="385" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Most up-to-date replica (R1, offset 998)</text>

  <path d="M 252 370 L 330 370" fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- Step 3 -->
  <circle cx="360" cy="370" r="22" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="360" y="374" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">3</text>
  <text x="395" y="365" font-size="11" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Promote R1 to Primary</text>
  <text x="395" y="385" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Enable writes, update routing</text>

  <path d="M 382 370 L 460 370" fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- Step 4 -->
  <circle cx="490" cy="370" r="22" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="2"/>
  <text x="490" y="374" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">4</text>
  <text x="525" y="365" font-size="11" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Reconfigure Replicas</text>
  <text x="525" y="385" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">R2, R3 replicate from new primary R1</text>

  <path d="M 512 370 L 590 370" fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- Step 5 -->
  <circle cx="620" cy="370" r="22" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="2"/>
  <text x="620" y="374" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">5</text>
  <text x="655" y="365" font-size="11" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Update Client Routing</text>
  <text x="655" y="385" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Proxy/DNS points writes to R1</text>

  <!-- Data loss warning -->
  <rect x="30" y="420" width="840" height="70" rx="8" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1.5"/>
  <text x="50" y="442" font-size="12" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">&#9888; Potential Data Loss:</text>
  <text x="50" y="462" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">Writes acknowledged by primary but not yet replicated to R1 (offset 998-1000) are lost.</text>
  <text x="50" y="480" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">Mitigation: Use semi-synchronous replication — primary waits for at least 1 replica to acknowledge before client ack.</text>

  <defs>
    <marker id="redArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
</svg>