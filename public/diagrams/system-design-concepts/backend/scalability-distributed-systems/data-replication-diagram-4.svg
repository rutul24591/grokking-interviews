<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Cross-Region Replication Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Geo-distributed data replication with latency-aware routing and regional failover</text>

  <!-- US Data Center -->
  <rect x="30" y="80" width="270" height="200" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="165" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">US-East (Primary)</text>

  <!-- US Primary -->
  <rect x="60" y="120" width="120" height="45" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="120" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Primary</text>
  <text x="120" y="156" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Accepts writes</text>

  <!-- US Replicas -->
  <rect x="195" y="120" width="80" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="235" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica</text>
  <text x="235" y="156" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Lag: 2ms</text>

  <rect x="60" y="180" width="80" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="100" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica</text>
  <text x="100" y="216" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Lag: 5ms</text>

  <rect x="195" y="180" width="80" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="235" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica</text>
  <text x="235" y="216" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Lag: 8ms</text>

  <!-- EU Data Center -->
  <rect x="315" y="80" width="270" height="200" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">EU-West (Async Replica)</text>

  <rect x="345" y="120" width="80" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="385" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica</text>
  <text x="385" y="156" text-anchor="middle" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">Lag: 80ms</text>

  <rect x="440" y="120" width="80" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="480" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica</text>
  <text x="480" y="156" text-anchor="middle" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">Lag: 85ms</text>

  <rect x="345" y="180" width="80" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="385" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica</text>
  <text x="385" y="216" text-anchor="middle" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">Lag: 90ms</text>

  <rect x="440" y="180" width="80" height="45" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="480" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica</text>
  <text x="480" y="216" text-anchor="middle" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">Lag: 95ms</text>

  <!-- APAC Data Center -->
  <rect x="600" y="80" width="270" height="200" rx="8" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
  <text x="735" y="105" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">APAC (Async Replica)</text>

  <rect x="630" y="120" width="80" height="45" rx="6" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="1.5"/>
  <text x="670" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Replica</text>
  <text x="670" y="156" text-anchor="middle" font-size="9" fill="#d97706" font-family="system-ui, sans-serif">Lag: 180ms</text>

  <rect x="725" y="120" width="80" height="45" rx="6" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="1.5"/>
  <text x="765" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Replica</text>
  <text x="765" y="156" text-anchor="middle" font-size="9" fill="#d97706" font-family="system-ui, sans-serif">Lag: 185ms</text>

  <rect x="630" y="180" width="80" height="45" rx="6" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="1.5"/>
  <text x="670" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Replica</text>
  <text x="670" y="216" text-anchor="middle" font-size="9" fill="#d97706" font-family="system-ui, sans-serif">Lag: 190ms</text>

  <rect x="725" y="180" width="80" height="45" rx="6" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="1.5"/>
  <text x="765" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Replica</text>
  <text x="765" y="216" text-anchor="middle" font-size="9" fill="#d97706" font-family="system-ui, sans-serif">Lag: 195ms</text>

  <!-- Cross-region replication arrows -->
  <path d="M 165 280 L 165 340 L 450 340 L 450 280" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="308" y="335" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">80ms replication lag</text>

  <path d="M 165 280 L 165 360 L 735 360 L 735 280" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="450" y="355" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">180ms replication lag</text>

  <!-- Client routing -->
  <rect x="30" y="390" width="840" height="115" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Client Routing Strategy</text>

  <text x="165" y="440" text-anchor="middle" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">US Users &#8594; US replicas</text>
  <text x="165" y="458" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Read latency: 5-15ms</text>
  <text x="165" y="476" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Write latency: 8ms (to primary)</text>

  <text x="450" y="440" text-anchor="middle" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">EU Users &#8594; EU replicas</text>
  <text x="450" y="458" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Read latency: 10-25ms</text>
  <text x="450" y="476" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">Write latency: 88ms (to US primary)</text>

  <text x="735" y="440" text-anchor="middle" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">APAC Users &#8594; APAC replicas</text>
  <text x="735" y="458" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Read latency: 15-35ms</text>
  <text x="735" y="476" text-anchor="middle" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">Write latency: 188ms (to US primary)</text>

  <!-- Failover arrow -->
  <rect x="680" y="500" width="190" height="15" rx="4" fill="#db2777" opacity="0.3"/>
  <text x="775" y="512" text-anchor="middle" font-size="9" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Regional failover: promote EU</text>
</svg>