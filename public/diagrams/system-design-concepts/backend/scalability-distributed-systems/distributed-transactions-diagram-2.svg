<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="system-ui, sans-serif">
  <title>Saga Pattern for Distributed Transactions - Sequence of local transactions with compensating actions for failure recovery</title>
  <rect width="900" height="520" fill="#f3f1f8" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Saga Pattern for Distributed Transactions</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Sequence of local transactions with compensating actions for failure recovery</text>
  
  <!-- Saga Steps Flow -->
  <text x="450" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1822">E-Commerce Order Flow</text>
  
  <!-- Step 1 -->
  <rect x="30" y="120" width="180" height="80" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="120" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca">Step 1: Create Order</text>
  <text x="120" y="165" text-anchor="middle" font-size="10" fill="#64748b">Local TX on Order Shard</text>
  <text x="120" y="185" text-anchor="middle" font-size="10" fill="#16a34a">INSERT order (PENDING)</text>
  
  <!-- Arrow -->
  <path d="M 210 160 L 250 160" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#grayArrow)"/>
  
  <!-- Step 2 -->
  <rect x="250" y="120" width="180" height="80" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="340" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">Step 2: Reserve Inventory</text>
  <text x="340" y="165" text-anchor="middle" font-size="10" fill="#64748b">Local TX on Inventory Shard</text>
  <text x="340" y="185" text-anchor="middle" font-size="10" fill="#16a34a">UPDATE stock -= qty</text>
  
  <!-- Arrow -->
  <path d="M 430 160 L 470 160" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#grayArrow)"/>
  
  <!-- Step 3 -->
  <rect x="470" y="120" width="180" height="80" rx="8" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
  <text x="560" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Step 3: Charge Payment</text>
  <text x="560" y="165" text-anchor="middle" font-size="10" fill="#64748b">Local TX on Payment Shard</text>
  <text x="560" y="185" text-anchor="middle" font-size="10" fill="#16a34a">UPDATE balance -= amount</text>
  
  <!-- Arrow -->
  <path d="M 650 160 L 690 160" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#grayArrow)"/>
  
  <!-- Step 4 -->
  <rect x="690" y="120" width="180" height="80" rx="8" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="2"/>
  <text x="780" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">Step 4: Notify Shipping</text>
  <text x="780" y="165" text-anchor="middle" font-size="10" fill="#64748b">Local TX on Shipping Shard</text>
  <text x="780" y="185" text-anchor="middle" font-size="10" fill="#16a34a">INSERT shipment request</text>
  
  <!-- Compensating Actions (reverse flow) -->
  <text x="450" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">Compensating Actions (executed in REVERSE order on failure)</text>
  
  <!-- Compensation Step 3 -->
  <rect x="470" y="260" width="180" height="60" rx="8" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="560" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Compensate 3: Refund</text>
  <text x="560" y="302" text-anchor="middle" font-size="10" fill="#64748b">UPDATE balance += amount</text>
  
  <!-- Compensation Step 2 -->
  <rect x="250" y="260" width="180" height="60" rx="8" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="340" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Compensate 2: Release Stock</text>
  <text x="340" y="302" text-anchor="middle" font-size="10" fill="#64748b">UPDATE stock += qty</text>
  
  <!-- Compensation Step 1 -->
  <rect x="30" y="260" width="180" height="60" rx="8" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="120" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Compensate 1: Cancel Order</text>
  <text x="120" y="302" text-anchor="middle" font-size="10" fill="#64748b">UPDATE order = CANCELLED</text>
  
  <!-- Compensation arrows (reverse) -->
  <path d="M 650 290 L 470 290" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#redArrow)"/>
  <path d="M 430 290 L 250 290" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#redArrow)"/>
  <text x="560" y="255" text-anchor="middle" font-size="10" fill="#dc2626">&#8592; REVERSE ORDER</text>
  
  <!-- Failure scenario example -->
  <rect x="30" y="350" width="840" height="155" rx="8" fill="#64748b" opacity="0.06" stroke="#64748b" stroke-width="1"/>
  <text x="450" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Failure Scenario: Step 3 (Payment) Fails</text>
  
  <!-- Timeline -->
  <rect x="50" y="395" width="150" height="30" rx="4" fill="#16a34a" opacity="0.15"/>
  <text x="125" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="#16a34a">Step 1: SUCCESS</text>
  
  <rect x="220" y="395" width="150" height="30" rx="4" fill="#16a34a" opacity="0.15"/>
  <text x="295" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="#16a34a">Step 2: SUCCESS</text>
  
  <rect x="390" y="395" width="150" height="30" rx="4" fill="#dc2626" opacity="0.15"/>
  <text x="465" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Step 3: FAILED</text>
  
  <rect x="560" y="395" width="150" height="30" rx="4" fill="#64748b" opacity="0.1"/>
  <text x="635" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="#64748b">Step 4: SKIPPED</text>
  
  <text x="50" y="455" font-size="12" font-weight="bold" fill="#92400e">Compensation triggered:</text>
  <text x="50" y="478" font-size="11" fill="#64748b">1. Compensate Step 2: Release reserved inventory (stock += qty)</text>
  <text x="50" y="498" font-size="11" fill="#64748b">2. Compensate Step 1: Cancel order (order = CANCELLED)</text>
  
  <defs>
    <marker id="grayArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
