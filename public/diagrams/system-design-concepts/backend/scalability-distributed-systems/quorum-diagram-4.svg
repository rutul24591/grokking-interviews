<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Consistency Levels: ONE vs QUORUM vs ALL</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Trade-off surface: latency vs consistency vs availability across quorum configurations</text>

  <!-- 3x3 grid of scenarios -->
  <!-- Row 1: ONE -->
  <rect x="30" y="80" width="270" height="130" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="165" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a" font-family="system-ui, sans-serif">ONE (R=1, W=1)</text>
  <text x="50" y="130" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Write: fastest node responds</text>
  <text x="50" y="150" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Read: fastest node responds</text>
  <text x="50" y="175" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Lowest latency (~5ms)</text>
  <text x="50" y="195" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Stale reads likely</text>

  <!-- Row 1: QUORUM -->
  <rect x="315" y="80" width="270" height="130" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">QUORUM (R=2, W=2)</text>
  <text x="335" y="130" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Write: majority responds</text>
  <text x="335" y="150" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Read: majority responds</text>
  <text x="335" y="175" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">&#9888; Moderate latency (~15ms)</text>
  <text x="335" y="195" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Strong consistency</text>

  <!-- Row 1: ALL -->
  <rect x="600" y="80" width="270" height="130" rx="8" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="2"/>
  <text x="735" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">ALL (R=N, W=N)</text>
  <text x="620" y="130" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Write: all nodes respond</text>
  <text x="620" y="150" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Read: all nodes respond</text>
  <text x="620" y="175" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Highest latency (~50ms)</text>
  <text x="620" y="195" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Maximum consistency</text>

  <!-- Latency chart -->
  <text x="450" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Latency vs Consistency Trade-off</text>

  <!-- Axes -->
  <line x1="100" y1="400" x2="800" y2="400" stroke="#475569" stroke-width="1.5"/>
  <line x1="100" y1="270" x2="100" y2="400" stroke="#475569" stroke-width="1.5"/>
  <text x="450" y="425" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Consistency Level &#8594;</text>
  <text x="50" y="335" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif" transform="rotate(-90, 50, 335)">Latency &#8594;</text>

  <!-- ONE bar -->
  <rect x="180" y="370" width="100" height="30" rx="4" fill="#16a34a" opacity="0.6"/>
  <text x="230" y="390" text-anchor="middle" font-size="9" font-weight="bold" fill="#16a34a" font-family="system-ui, sans-serif">5ms</text>
  <text x="230" y="415" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">ONE</text>

  <!-- QUORUM bar -->
  <rect x="380" y="330" width="100" height="70" rx="4" fill="#4f46e5" opacity="0.6"/>
  <text x="430" y="370" text-anchor="middle" font-size="9" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">15ms</text>
  <text x="430" y="415" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">QUORUM</text>

  <!-- ALL bar -->
  <rect x="580" y="280" width="100" height="120" rx="4" fill="#dc2626" opacity="0.6"/>
  <text x="630" y="345" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">50ms</text>
  <text x="630" y="415" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">ALL</text>

  <!-- Availability bars -->
  <rect x="180" y="280" width="100" height="15" rx="3" fill="#16a34a" opacity="0.4"/>
  <text x="230" y="292" text-anchor="middle" font-size="8" fill="#16a34a" font-family="system-ui, sans-serif">High avail</text>

  <rect x="380" y="280" width="100" height="15" rx="3" fill="#92400e" opacity="0.4"/>
  <text x="430" y="292" text-anchor="middle" font-size="8" fill="#92400e" font-family="system-ui, sans-serif">Med avail</text>

  <rect x="580" y="280" width="100" height="15" rx="3" fill="#dc2626" opacity="0.4"/>
  <text x="630" y="292" text-anchor="middle" font-size="8" fill="#991b1b" font-family="system-ui, sans-serif">Low avail</text>

  <!-- Read repair note -->
  <rect x="40" y="445" width="820" height="60" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="60" y="468" font-size="12" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Read Repair:</text>
  <text x="60" y="490" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">When a read detects stale replicas (different values across nodes), the read operation triggers a background repair that updates stale replicas to the latest value.</text>
</svg>