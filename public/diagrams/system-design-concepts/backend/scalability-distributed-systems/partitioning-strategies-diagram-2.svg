<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="system-ui, sans-serif">
  <title>Directory-Based Partitioning</title>
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Directory-Based Partitioning</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">A lookup service maps each key to its partition, enabling arbitrary reassignment</text>

  <!-- Client -->
  <rect x="40" y="100" width="160" height="50" rx="8" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Client</text>
  <text x="120" y="138" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Query: GET user:bob</text>

  <!-- Arrow to lookup service -->
  <path d="M 200 125 L 310 125" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#purpleArrow)"/>
  <text x="255" y="115" text-anchor="middle" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">1. Lookup</text>

  <!-- Lookup Service -->
  <rect x="310" y="90" width="280" height="70" rx="8" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Lookup Service (Directory)</text>

  <!-- Lookup table -->
  <rect x="330" y="130" width="240" height="100" rx="6" fill="#f3f1f8" stroke="#475569" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Key &#8594; Partition Mapping</text>
  <text x="360" y="172" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">user:alice  &#8594;  Partition A</text>
  <text x="360" y="192" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">user:bob    &#8594;  Partition B</text>
  <text x="360" y="212" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">user:charlie &#8594; Partition C</text>
  <text x="360" y="232" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">user:diana   &#8594; Partition C</text>

  <!-- Arrow from lookup to client -->
  <path d="M 310 145 L 200 145" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#greenArrow)" stroke-dasharray="4 2"/>
  <text x="255" y="140" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">2. Returns Partition B</text>

  <!-- Arrow from client to partition B -->
  <path d="M 120 150 L 120 240" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#greenArrow)"/>
  <text x="140" y="200" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">3. Direct query</text>

  <!-- Partitions below -->
  <rect x="40" y="260" width="250" height="80" rx="8" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="165" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Partition A</text>
  <text x="165" y="305" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">user:alice, user:eve, user:hank</text>
  <text x="165" y="325" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">~200K keys, 0.7 GB</text>

  <rect x="320" y="260" width="250" height="80" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="445" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Partition B</text>
  <text x="445" y="305" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">user:bob, user:frank, user:iris</text>
  <text x="445" y="325" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">~300K keys, 1.1 GB</text>

  <rect x="610" y="260" width="250" height="80" rx="8" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="735" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Partition C</text>
  <text x="735" y="305" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">user:charlie, user:diana, ...</text>
  <text x="735" y="325" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">~500K keys, 1.8 GB</text>

  <!-- Rebalancing example -->
  <rect x="40" y="370" width="820" height="130" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="450" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Rebalancing: Just update the directory entry -- no data migration needed initially</text>

  <rect x="60" y="410" width="370" height="75" rx="6" fill="#f3f1f8" stroke="#d97706" stroke-width="1"/>
  <text x="245" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Before: user:bob &#8594; Partition B</text>
  <text x="245" y="452" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Partition B is overloaded at 300K keys</text>
  <text x="245" y="472" text-anchor="middle" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">p99 latency: 45ms</text>

  <path d="M 450 447 L 470 447" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#greenArrow)"/>

  <rect x="490" y="410" width="370" height="75" rx="6" fill="#f3f1f8" stroke="#4ade80" stroke-width="1"/>
  <text x="675" y="432" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a" font-family="system-ui, sans-serif">After: user:bob &#8594; Partition A (just update mapping)</text>
  <text x="675" y="452" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Data migrated in background after remap</text>
  <text x="675" y="472" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Partition A p99: 12ms, Partition B p99: 28ms</text>

  <defs>
    <marker id="purpleArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
</svg>