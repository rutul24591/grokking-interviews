<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Primary-Replica Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Writes go to the primary, async replication flows to replicas, reads distribute across all nodes</text>

  <!-- Primary -->
  <rect x="340" y="90" width="220" height="90" rx="8" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Primary</text>
  <text x="450" y="138" text-anchor="middle" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">Accepts all writes</text>
  <text x="450" y="155" text-anchor="middle" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">Streams WAL to replicas</text>
  <text x="450" y="172" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">p99 write: 8ms</text>

  <!-- Client writes -->
  <rect x="40" y="110" width="140" height="50" rx="8" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="110" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Client Writes</text>
  <text x="110" y="148" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">INSERT, UPDATE, DELETE</text>

  <path d="M 180 135 L 340 135" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#purpleArrow)"/>
  <text x="260" y="125" text-anchor="middle" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">writes</text>

  <!-- Replication arrows -->
  <path d="M 450 180 L 200 310" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 3"/>
  <path d="M 450 180 L 450 310" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 3"/>
  <path d="M 450 180 L 700 310" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="310" y="240" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">WAL stream</text>
  <text x="470" y="240" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">WAL stream</text>
  <text x="590" y="240" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">WAL stream</text>

  <!-- Replicas -->
  <rect x="80" y="310" width="230" height="75" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="195" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica 1 (US-East)</text>
  <text x="195" y="355" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Serves reads | Lag: 12ms</text>
  <text x="195" y="373" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">p99 read: 5ms</text>

  <rect x="335" y="310" width="230" height="75" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica 2 (US-West)</text>
  <text x="450" y="355" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Serves reads | Lag: 45ms</text>
  <text x="450" y="373" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">p99 read: 8ms</text>

  <rect x="590" y="310" width="230" height="75" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="705" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica 3 (EU-West)</text>
  <text x="705" y="355" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Serves reads | Lag: 120ms</text>
  <text x="705" y="373" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">p99 read: 22ms</text>

  <!-- Client reads -->
  <rect x="40" y="420" width="140" height="50" rx="8" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="110" y="440" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Client Reads</text>
  <text x="110" y="458" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">SELECT queries</text>

  <path d="M 180 435 L 200 385" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 2"/>
  <path d="M 180 445 L 450 385" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 2"/>
  <path d="M 180 455 L 700 385" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="170" y="400" font-size="9" fill="#15803d" font-family="system-ui, sans-serif">load-balanced reads</text>

  <rect x="300" y="430" width="560" height="70" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="315" y="452" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">Read scaling: 3 replicas = 3x read throughput</text>
  <text x="315" y="472" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">Write scaling: still limited by single primary capacity</text>
  <text x="620" y="492" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">&#9888; Replication lag varies by distance</text>

  <defs>
    <marker id="purpleArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
  </defs>
</svg>