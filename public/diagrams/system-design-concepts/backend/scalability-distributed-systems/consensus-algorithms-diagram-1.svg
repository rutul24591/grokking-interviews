<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%">
  <defs>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="arrowhead-pink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1a1822" text-anchor="middle">Raft Leader Election Flow</text>
  <text x="450" y="55" font-family="system-ui, sans-serif" font-size="13" fill="#1a1822" text-anchor="middle">Term transition, candidate state, and vote collection</text>

  <!-- Phase 1: Timeout Detected -->
  <rect x="30" y="80" width="200" height="30" rx="6" fill="#d97706" opacity="0.2" stroke="#d97706" stroke-width="1.5"/>
  <text x="130" y="100" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Phase 1: Election Timeout</text>

  <!-- Node A - Candidate -->
  <rect x="60" y="140" width="120" height="80" rx="10" fill="#db2777" opacity="0.15" stroke="#db2777" stroke-width="2"/>
  <text x="120" y="168" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#db2777" text-anchor="middle">Node A</text>
  <text x="120" y="188" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Candidate</text>
  <text x="120" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Term 3</text>

  <!-- Arrow from Phase 1 to Node A -->
  <line x1="130" y1="115" x2="130" y2="138" stroke="#d97706" stroke-width="2" marker-end="url(#arrowhead-purple)"/>

  <!-- Nodes B, C, D, E - Followers -->
  <rect x="280" y="140" width="100" height="80" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="330" y="168" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Node B</text>
  <text x="330" y="188" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Follower</text>
  <text x="330" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Term 2</text>

  <rect x="420" y="140" width="100" height="80" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="470" y="168" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Node C</text>
  <text x="470" y="188" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Follower</text>
  <text x="470" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Term 2</text>

  <rect x="560" y="140" width="100" height="80" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="610" y="168" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Node D</text>
  <text x="610" y="188" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Follower</text>
  <text x="610" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Term 2</text>

  <rect x="700" y="140" width="100" height="80" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="750" y="168" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Node E</text>
  <text x="750" y="188" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Follower</text>
  <text x="750" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Term 2</text>

  <!-- Phase 2: Request Votes -->
  <rect x="30" y="260" width="200" height="30" rx="6" fill="#db2777" opacity="0.2" stroke="#db2777" stroke-width="1.5"/>
  <text x="130" y="280" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#db2777" text-anchor="middle">Phase 2: RequestVote RPCs</text>

  <!-- Vote request arrows from A to B, C, D, E -->
  <path d="M 185 170 Q 230 155 275 165" stroke="#db2777" stroke-width="2" fill="none" marker-end="url(#arrowhead-pink)"/>
  <text x="225" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">ReqVote</text>

  <path d="M 185 175 Q 300 160 415 165" stroke="#db2777" stroke-width="2" fill="none" marker-end="url(#arrowhead-pink)"/>
  <text x="290" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">ReqVote</text>

  <path d="M 185 180 Q 370 190 555 175" stroke="#db2777" stroke-width="2" fill="none" marker-end="url(#arrowhead-pink)"/>
  <text x="370" y="188" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">ReqVote</text>

  <path d="M 185 185 Q 440 210 695 180" stroke="#db2777" stroke-width="2" fill="none" marker-end="url(#arrowhead-pink)"/>
  <text x="440" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">ReqVote</text>

  <!-- Phase 3: Vote Responses -->
  <rect x="30" y="330" width="200" height="30" rx="6" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="1.5"/>
  <text x="130" y="350" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Phase 3: Votes Granted (3/5)</text>

  <!-- Vote response arrows back to A -->
  <path d="M 275 195 Q 230 210 185 200" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  <text x="225" y="218" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">Vote Yes</text>

  <path d="M 415 195 Q 300 215 185 205" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  <text x="290" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">Vote Yes</text>

  <path d="M 555 205 Q 370 240 185 210" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  <text x="370" y="235" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563">Vote Yes</text>

  <!-- Phase 4: Leader Elected -->
  <rect x="30" y="400" width="200" height="30" rx="6" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="130" y="420" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4f46e5" text-anchor="middle">Phase 4: Node A Elected Leader</text>

  <!-- Node A becomes Leader -->
  <rect x="60" y="450" width="120" height="55" rx="10" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="120" y="473" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#4f46e5" text-anchor="middle">Node A</text>
  <text x="120" y="493" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#4f46e5" text-anchor="middle">Leader - Term 3</text>

  <rect x="280" y="450" width="100" height="55" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="330" y="473" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Node B</text>
  <text x="330" y="493" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Follower T3</text>

  <rect x="420" y="450" width="100" height="55" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="470" y="473" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Node C</text>
  <text x="470" y="493" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Follower T3</text>

  <rect x="560" y="450" width="100" height="55" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="610" y="473" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Node D</text>
  <text x="610" y="493" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Follower T3</text>

  <rect x="700" y="450" width="100" height="55" rx="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="750" y="473" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2563eb" text-anchor="middle">Node E</text>
  <text x="750" y="493" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Follower T3</text>

  <!-- Legend -->
  <rect x="620" y="280" width="240" height="100" rx="8" fill="#f3f1f8" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="740" y="302" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822" text-anchor="middle">Legend</text>
  <circle cx="640" cy="322" r="6" fill="#db2777" opacity="0.6"/>
  <text x="655" y="326" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Candidate (seeking votes)</text>
  <circle cx="640" cy="342" r="6" fill="#2563eb" opacity="0.6"/>
  <text x="655" y="346" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Follower (voting member)</text>
  <circle cx="640" cy="362" r="6" fill="#4f46e5" opacity="0.6"/>
  <text x="655" y="366" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Leader (elected)</text>
</svg>