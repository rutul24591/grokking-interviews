@startuml
skinparam BoxPadding 25

Participant Client as C
Participant Proposer as P
box Acceptors
  Participant A as AA
  Participant B as AB
  Participant C as AC
end box
box Learners
  Participant A as LA
  Participant B as LB
end box

C ->> P:Request
note over P: Proposer selects\n1 as the identifier
== Phase 1a ==
P ->> AA: Prepare(1)
P ->> AB
P ->> AC
== Phase 1b ==
AA ->> P: Promise(1,Va)
AB ->> P: Promise(1,Vb)
AC ->> P: Promise(1,Vc)
== Phase 2a ==
P ->> AA: Accept!(1,V)
P ->> AB: 
P ->> AC: 
== Phase 2b ==
AA ->> P: Accepted(1,V)
AA ->> LA
AA ->> LB
AB ->> P: Accepted(1,V)
AB ->> LA
AB ->> LB
AC ->> P: Accepted(1,V)
AC ->> LA
AC ->> LB
LA ->> C: Response
LB ->> C:
@enduml

