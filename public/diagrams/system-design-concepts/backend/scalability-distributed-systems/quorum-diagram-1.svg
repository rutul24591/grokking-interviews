<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Quorum Intersection Proof (R + W &gt; N)</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">When read and write quorums overlap, at least one node has the latest value</text>

  <!-- 5 nodes -->
  <circle cx="150" cy="200" r="40" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="150" y="196" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">N1</text>
  <text x="150" y="212" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">v2</text>

  <circle cx="320" cy="140" r="40" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="320" y="136" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">N2</text>
  <text x="320" y="152" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">v2</text>

  <circle cx="490" cy="140" r="40" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="490" y="136" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">N3</text>
  <text x="490" y="152" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">v2</text>

  <circle cx="580" cy="260" r="40" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="580" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">N4</text>
  <text x="580" y="272" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">v1</text>

  <circle cx="320" cy="340" r="40" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="320" y="336" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">N5</text>
  <text x="320" y="352" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">v1</text>

  <!-- Write quorum highlight (N1, N2, N3) -->
  <ellipse cx="320" cy="160" rx="200" ry="80" fill="none" stroke="#4f46e5" stroke-width="3" stroke-dasharray="8 4"/>
  <text x="320" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Write Quorum (W=3)</text>

  <!-- Read quorum highlight (N3, N4, N5) -->
  <ellipse cx="465" cy="280" rx="180" ry="80" fill="none" stroke="#d97706" stroke-width="3" stroke-dasharray="8 4"/>
  <text x="465" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Read Quorum (R=3)</text>

  <!-- Intersection: N3 -->
  <circle cx="490" cy="140" r="45" fill="none" stroke="#db2777" stroke-width="4"/>
  <text x="490" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Intersection: N3</text>

  <!-- Legend -->
  <rect x="680" y="100" width="190" height="120" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="695" y="125" font-size="12" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Legend</text>
  <circle cx="710" cy="150" r="8" fill="#4f46e5" opacity="0.3"/>
  <text x="725" y="154" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Latest value (v2)</text>
  <circle cx="710" cy="175" r="8" fill="#16a34a" opacity="0.3"/>
  <text x="725" y="179" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Stale value (v1)</text>
  <rect x="700" y="190" width="15" height="3" fill="#db2777"/>
  <text x="725" y="195" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Intersection node</text>

  <!-- Formula -->
  <rect x="680" y="250" width="190" height="80" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="775" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">R + W &gt; N</text>
  <text x="775" y="298" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">3 + 3 &gt; 5 &#8594; TRUE</text>
  <text x="775" y="318" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Guaranteed overlap</text>

  <!-- Explanation -->
  <rect x="40" y="410" width="820" height="90" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="60" y="435" font-size="12" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Guarantee:</text>
  <text x="60" y="458" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">With N=5, W=3, R=3: any read quorum of 3 nodes intersects with any write quorum of 3 nodes in at least 1 node.</text>
  <text x="60" y="478" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">That intersecting node (N3) has the latest value (v2), ensuring the read returns the most recent write.</text>
</svg>