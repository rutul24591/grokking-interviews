<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <title>Snapshot optimization showing full replay versus optimized replay from checkpoint</title>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Snapshot Optimization</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Reducing replay time by checkpointing aggregate state</text>

  <!-- SECTION 1: FULL EVENT STREAM (WITHOUT SNAPSHOT) -->
  <text x="225" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">Without Snapshot: Full Replay Required</text>

  <!-- Event stream line -->
  <line x1="50" y1="130" x2="400" y2="130" stroke="#94a3b8" stroke-width="4"/>

  <!-- Events along the line -->
  <circle cx="60" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="60" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">1</text>

  <circle cx="100" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="100" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">2</text>

  <circle cx="140" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="140" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">3</text>

  <circle cx="180" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="180" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">4</text>

  <circle cx="220" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="220" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">5</text>

  <circle cx="260" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="260" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">6</text>

  <circle cx="300" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="300" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">7</text>

  <circle cx="340" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="340" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">8</text>

  <circle cx="380" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="380" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">9</text>

  <circle cx="420" cy="130" r="14" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="420" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#4f46e5">10</text>

  <!-- Replay cost indicator -->
  <rect x="50" y="165" width="370" height="30" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="235" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Replay cost: 10 events | Time: O(N) where N = total events</text>

  <!-- SECTION 2: WITH SNAPSHOT -->
  <text x="675" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#16a34a">With Snapshot: Optimized Replay</text>

  <!-- Event stream with snapshot -->
  <line x1="500" y1="130" x2="850" y2="130" stroke="#94a3b8" stroke-width="4"/>

  <!-- Events before snapshot (dimmed) -->
  <circle cx="510" cy="130" r="14" fill="#94a3b8" opacity="0.3" stroke="#94a3b8" stroke-width="2"/>
  <text x="510" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">1</text>

  <circle cx="550" cy="130" r="14" fill="#94a3b8" opacity="0.3" stroke="#94a3b8" stroke-width="2"/>
  <text x="550" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">2</text>

  <circle cx="590" cy="130" r="14" fill="#94a3b8" opacity="0.3" stroke="#94a3b8" stroke-width="2"/>
  <text x="590" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">3</text>

  <circle cx="630" cy="130" r="14" fill="#94a3b8" opacity="0.3" stroke="#94a3b8" stroke-width="2"/>
  <text x="630" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">4</text>

  <!-- SNAPSHOT at event 5 -->
  <rect x="655" y="110" width="50" height="40" rx="8" fill="#16a34a"/>
  <text x="680" y="130" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">SNAP</text>
  <text x="680" y="142" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">@5</text>

  <!-- Events after snapshot (bright) -->
  <circle cx="720" cy="130" r="14" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">6</text>

  <circle cx="760" cy="130" r="14" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="760" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">7</text>

  <circle cx="800" cy="130" r="14" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="800" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">8</text>

  <circle cx="840" cy="130" r="14" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="840" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">9</text>

  <!-- Snapshot label -->
  <text x="680" y="165" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Snapshot at Event #5</text>

  <!-- Replay cost indicator -->
  <rect x="500" y="185" width="350" height="30" rx="6" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="675" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a">Replay cost: 4 events only (6-9) | Time saved: 50%</text>

  <!-- SECTION 3: SNAPSHOT PROCESS DETAIL -->
  <rect x="30" y="240" width="840" height="260" rx="12" fill="none" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="270" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1822">Snapshot Creation &amp; Replay Process</text>

  <!-- Event stream visualization -->
  <line x1="80" y1="320" x2="820" y2="320" stroke="#94a3b8" stroke-width="3"/>

  <!-- Events -->
  <rect x="80" y="305" width="80" height="30" rx="4" fill="#4f46e5" opacity="0.1" stroke="#4f46e5" stroke-width="1"/>
  <text x="120" y="324" text-anchor="middle" font-size="10" fill="#4f46e5">Events 1-4</text>

  <!-- Snapshot point -->
  <rect x="200" y="300" width="100" height="40" rx="8" fill="#16a34a"/>
  <text x="250" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Snapshot</text>
  <text x="250" y="333" text-anchor="middle" font-size="9" fill="#ffffff">@ Event #5</text>

  <!-- Arrow from snapshot to replay zone -->
  <line x1="310" y1="320" x2="340" y2="320" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Replay zone -->
  <rect x="340" y="305" width="200" height="30" rx="4" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="440" y="324" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Replay Events 6-10 only</text>

  <!-- Result state -->
  <line x1="550" y1="320" x2="580" y2="320" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <rect x="580" y="290" width="120" height="60" rx="8" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
  <text x="640" y="313" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">Current</text>
  <text x="640" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">State</text>
  <text x="640" y="345" text-anchor="middle" font-size="10" fill="#64748b">Rebuilt in O(k)</text>

  <!-- Time saved visualization -->
  <text x="120" y="400" font-size="14" font-weight="700" fill="#1a1822">Time Saved:</text>

  <!-- Full replay bar -->
  <rect x="120" y="415" width="350" height="25" rx="4" fill="#dc2626" opacity="0.7"/>
  <text x="295" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Full Replay: 10 events (100% time)</text>

  <!-- Snapshot replay bar -->
  <rect x="120" y="450" width="160" height="25" rx="4" fill="#16a34a"/>
  <text x="200" y="467" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Snapshot: 4 events</text>

  <!-- Comparison text -->
  <text x="320" y="467" font-size="14" font-weight="700" fill="#d97706">60% faster</text>

  <!-- Key benefits -->
  <text x="600" y="400" font-size="14" font-weight="700" fill="#1a1822">Key Benefits:</text>

  <circle cx="610" cy="425" r="5" fill="#16a34a"/>
  <text x="625" y="429" font-size="12" fill="#1a1822">Reduced replay time</text>

  <circle cx="610" cy="448" r="5" fill="#16a34a"/>
  <text x="625" y="452" font-size="12" fill="#1a1822">Lower memory footprint</text>

  <circle cx="780" cy="425" r="5" fill="#16a34a"/>
  <text x="795" y="429" font-size="12" fill="#1a1822">Faster startup recovery</text>

  <circle cx="780" cy="448" r="5" fill="#16a34a"/>
  <text x="795" y="452" font-size="12" fill="#1a1822">Periodic checkpointing</text>
</svg>