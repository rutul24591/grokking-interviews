<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="system-ui, sans-serif">
  <title>Dynamo-Style Quorum: R/W/N Configuration</title>
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Dynamo-Style Quorum: R/W/N Configuration</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Tunable consistency through configurable read and write quorum sizes</text>

  <!-- Ring with 7 nodes -->
  <circle cx="450" cy="230" r="150" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- 7 nodes on ring -->
  <circle cx="450" cy="80" r="22" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">A</text>

  <circle cx="578" cy="125" r="22" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="578" y="129" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">B</text>

  <circle cx="600" cy="230" r="22" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">C</text>

  <circle cx="578" cy="335" r="22" fill="#db2777" opacity="0.15" stroke="#db2777" stroke-width="2"/>
  <text x="578" y="339" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">D</text>

  <circle cx="450" cy="380" r="22" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="384" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">E</text>

  <circle cx="322" cy="335" r="22" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="2"/>
  <text x="322" y="339" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">F</text>

  <circle cx="300" cy="230" r="22" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="2"/>
  <text x="300" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6" font-family="system-ui, sans-serif">G</text>

  <!-- Key position -->
  <circle cx="480" cy="100" r="14" fill="#e2e8f0" stroke="#db2777" stroke-width="2"/>
  <text x="480" y="104" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">K</text>

  <!-- Preference list: A, B, C (first 3 clockwise from K) -->
  <path d="M 480 114 L 578 125" fill="none" stroke="#db2777" stroke-width="1.5" stroke-dasharray="3 2"/>
  <path d="M 480 114 L 450 80" fill="none" stroke="#db2777" stroke-width="1.5" stroke-dasharray="3 2"/>
  <path d="M 480 114 L 600 230" fill="none" stroke="#db2777" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Write flow: W=2 -->
  <rect x="660" y="80" width="210" height="140" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="765" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Write (W=2)</text>
  <text x="675" y="128" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Client writes to N=3 nodes</text>
  <text x="675" y="148" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Ack after W=2 nodes confirm</text>
  <text x="675" y="168" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Written to: A, B (2 of 3)</text>
  <text x="675" y="188" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">C still replicating...</text>
  <text x="675" y="208" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Latency: min(2 node writes)</text>

  <!-- Read flow: R=2 -->
  <rect x="660" y="250" width="210" height="140" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1.5"/>
  <text x="765" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Read (R=2)</text>
  <text x="675" y="298" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Client reads from N=3 nodes</text>
  <text x="675" y="318" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Returns after R=2 responses</text>
  <text x="675" y="338" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Read from: A(v2), B(v2)</text>
  <text x="675" y="358" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Consistent: both have v2</text>
  <text x="675" y="378" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Latency: min(2 node reads)</text>

  <!-- Config options -->
  <rect x="40" y="420" width="600" height="85" rx="8" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="60" y="445" font-size="12" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Consistency Levels:</text>
  <text x="60" y="468" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">ONE (R=1, W=1): Low latency, eventual consistency</text>
  <text x="270" y="468" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">QUORUM (R=2, W=2, N=3): Strong consistency</text>
  <text x="480" y="468" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">ALL (R=3, W=3): Maximum consistency</text>
  <text x="60" y="490" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Rule: R + W &gt; N guarantees strong consistency (read sees latest write)</text>
</svg>