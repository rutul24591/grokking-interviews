<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="system-ui, sans-serif">
  <title>Performance and Consistency Trade-offs - Comparing 2PC, 3PC, and Saga across latency, correctness, and failure resilience</title>
  <rect width="900" height="520" fill="#f3f1f8" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Performance &amp; Consistency Trade-offs</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Comparing 2PC, 3PC, and Saga across latency, correctness, and failure resilience</text>
  
  <!-- Comparison Table -->
  <text x="450" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1822">Protocol Comparison Matrix</text>
  
  <!-- Header -->
  <rect x="30" y="115" width="840" height="35" rx="4" fill="#4f46e5" opacity="0.1" stroke="#4f46e5" stroke-width="1"/>
  <text x="150" y="137" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">Aspect</text>
  <text x="320" y="137" text-anchor="middle" font-size="11" font-weight="bold" fill="#4f46e5">2PC</text>
  <text x="490" y="137" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">3PC</text>
  <text x="660" y="137" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">Saga</text>
  <text x="820" y="137" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">Eventual</text>
  
  <!-- Row 1: Atomicity -->
  <rect x="30" y="150" width="840" height="35" rx="0" fill="#4f46e5" opacity="0.04" stroke="#64748b" stroke-width="0.5"/>
  <text x="150" y="172" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Atomicity</text>
  <text x="320" y="172" text-anchor="middle" font-size="10" fill="#16a34a">Strong</text>
  <text x="490" y="172" text-anchor="middle" font-size="10" fill="#16a34a">Strong</text>
  <text x="660" y="172" text-anchor="middle" font-size="10" fill="#92400e">Eventual</text>
  <text x="820" y="172" text-anchor="middle" font-size="10" fill="#dc2626">None</text>
  
  <!-- Row 2: Network RTTs -->
  <rect x="30" y="185" width="840" height="35" rx="0" fill="none" stroke="#64748b" stroke-width="0.5"/>
  <text x="150" y="207" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Network RTTs</text>
  <text x="320" y="207" text-anchor="middle" font-size="10" fill="#1a1822">2 (PREPARE + COMMIT)</text>
  <text x="490" y="207" text-anchor="middle" font-size="10" fill="#1a1822">3 (+ PRE_COMMIT)</text>
  <text x="660" y="207" text-anchor="middle" font-size="10" fill="#1a1822">1 per step (sequential)</text>
  <text x="820" y="207" text-anchor="middle" font-size="10" fill="#1a1822">0 (async)</text>
  
  <!-- Row 3: Blocking -->
  <rect x="30" y="220" width="840" height="35" rx="0" fill="#4f46e5" opacity="0.04" stroke="#64748b" stroke-width="0.5"/>
  <text x="150" y="242" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Blocking Risk</text>
  <text x="320" y="242" text-anchor="middle" font-size="10" fill="#dc2626">Yes - coordinator fail</text>
  <text x="490" y="242" text-anchor="middle" font-size="10" fill="#92400e">Reduced but not zero</text>
  <text x="660" y="242" text-anchor="middle" font-size="10" fill="#16a34a">No - non-blocking</text>
  <text x="820" y="242" text-anchor="middle" font-size="10" fill="#16a34a">No - async</text>
  
  <!-- Row 4: Isolation -->
  <rect x="30" y="255" width="840" height="35" rx="0" fill="none" stroke="#64748b" stroke-width="0.5"/>
  <text x="150" y="277" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Isolation Level</text>
  <text x="320" y="277" text-anchor="middle" font-size="10" fill="#16a34a">Serializable</text>
  <text x="490" y="277" text-anchor="middle" font-size="10" fill="#16a34a">Serializable</text>
  <text x="660" y="277" text-anchor="middle" font-size="10" fill="#dc2626">Read uncommitted</text>
  <text x="820" y="277" text-anchor="middle" font-size="10" fill="#dc2626">Read uncommitted</text>
  
  <!-- Row 5: Failure Recovery -->
  <rect x="30" y="290" width="840" height="35" rx="0" fill="#4f46e5" opacity="0.04" stroke="#64748b" stroke-width="0.5"/>
  <text x="150" y="312" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Failure Recovery</text>
  <text x="320" y="312" text-anchor="middle" font-size="10" fill="#92400e">Manual (timeout)</text>
  <text x="490" y="312" text-anchor="middle" font-size="10" fill="#92400e">Timeout-based</text>
  <text x="660" y="312" text-anchor="middle" font-size="10" fill="#16a34a">Compensation retry</text>
  <text x="820" y="312" text-anchor="middle" font-size="10" fill="#92400e">Reconciliation job</text>
  
  <!-- Row 6: Best Use Case -->
  <rect x="30" y="325" width="840" height="35" rx="0" fill="none" stroke="#64748b" stroke-width="0.5"/>
  <text x="150" y="347" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Best For</text>
  <text x="320" y="347" text-anchor="middle" font-size="10" fill="#1a1822">Banking, finance</text>
  <text x="490" y="347" text-anchor="middle" font-size="10" fill="#1a1822">Rarely used in practice</text>
  <text x="660" y="347" text-anchor="middle" font-size="10" fill="#1a1822">E-commerce, SaaS</text>
  <text x="820" y="347" text-anchor="middle" font-size="10" fill="#1a1822">Analytics, logging</text>
  
  <!-- Performance visualization -->
  <text x="450" y="400" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1822">Latency vs Correctness Trade-off Surface</text>
  
  <!-- Axes -->
  <line x1="100" y1="490" x2="800" y2="490" stroke="#64748b" stroke-width="1.5"/>
  <line x1="100" y1="420" x2="100" y2="490" stroke="#64748b" stroke-width="1.5"/>
  <text x="450" y="510" text-anchor="middle" font-size="11" fill="#64748b">Latency (lower is better) &#8594;</text>
  <text x="50" y="455" text-anchor="middle" font-size="10" fill="#64748b" transform="rotate(-90, 50, 455)">Correctness &#8594;</text>
  
  <!-- Data points -->
  <circle cx="200" cy="430" r="12" fill="#4f46e5" opacity="0.8"/>
  <text x="200" y="434" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">2PC</text>
  
  <circle cx="280" cy="435" r="12" fill="#16a34a" opacity="0.8"/>
  <text x="280" y="439" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">3PC</text>
  
  <circle cx="500" cy="460" r="14" fill="#d97706" opacity="0.8"/>
  <text x="500" y="464" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Saga</text>
  
  <circle cx="700" cy="480" r="14" fill="#2563eb" opacity="0.8"/>
  <text x="700" y="484" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Eventual</text>
  
  <!-- Arrow showing trade-off direction -->
  <path d="M 200 430 Q 350 440 700 480" fill="none" stroke="#db2777" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="480" y="445" font-size="10" fill="#db2777">Trade-off frontier</text>
</svg>
