<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="system-ui, sans-serif">
  <title>Service Discovery and Group Membership</title>
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Service Discovery and Group Membership</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Ephemeral znodes automatically register and deregister service instances</text>

  <!-- Service instances registering -->
  <rect x="40" y="80" width="160" height="55" rx="6" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Service A-1</text>
  <text x="120" y="118" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">10.0.1.1:8080</text>
  <text x="120" y="130" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Healthy</text>

  <rect x="40" y="150" width="160" height="55" rx="6" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="170" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Service A-2</text>
  <text x="120" y="188" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">10.0.1.2:8080</text>
  <text x="120" y="200" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Healthy</text>

  <rect x="40" y="220" width="160" height="55" rx="6" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="120" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">Service A-3</text>
  <text x="120" y="258" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">10.0.1.3:8080</text>
  <text x="120" y="270" text-anchor="middle" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">Unhealthy</text>

  <!-- Registration arrows -->
  <path d="M 200 107 L 270 107" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#greenArrow)"/>
  <text x="235" y="100" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">register</text>

  <path d="M 200 177 L 270 177" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#greenArrow)"/>
  <text x="235" y="170" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">register</text>

  <path d="M 200 247 L 270 247" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#redArrow)"/>
  <text x="235" y="240" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">session expired</text>

  <!-- Coordination service -->
  <rect x="270" y="80" width="360" height="200" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Coordination Service: /services/order/</text>

  <!-- Ephemeral znodes -->
  <rect x="300" y="120" width="140" height="35" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="370" y="142" text-anchor="middle" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">A-1: 10.0.1.1:8080</text>

  <rect x="300" y="165" width="140" height="35" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="370" y="187" text-anchor="middle" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">A-2: 10.0.1.2:8080</text>

  <!-- A-3 being deleted -->
  <rect x="300" y="210" width="140" height="35" rx="4" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="370" y="232" text-anchor="middle" font-size="10" fill="#991b1b" font-family="system-ui, sans-serif">A-3: deleting...</text>

  <!-- Watchers -->
  <rect x="470" y="120" width="140" height="35" rx="4" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="142" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">Watcher: LB</text>

  <rect x="470" y="165" width="140" height="35" rx="4" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="187" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">Watcher: Client</text>

  <rect x="470" y="210" width="140" height="35" rx="4" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="232" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">Watcher: Monitor</text>

  <!-- Discovery flow -->
  <rect x="660" y="80" width="210" height="200" rx="8" fill="#16a34a" opacity="0.06" stroke="#16a34a" stroke-width="1.5"/>
  <text x="765" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Discovery Flow</text>

  <text x="680" y="130" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">1. Instance starts, creates</text>
  <text x="680" y="148" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">   ephemeral znode with address</text>
  <text x="680" y="173" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">2. Load balancer watches /services/</text>
  <text x="680" y="191" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">   and adds instance to rotation</text>
  <text x="680" y="216" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">3. Instance crashes, session expires</text>
  <text x="680" y="234" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">   ZK deletes ephemeral znode</text>
  <text x="680" y="259" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">4. LB receives watch notification,</text>
  <text x="680" y="277" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">   removes instance from rotation</text>

  <!-- Group membership visualization -->
  <rect x="40" y="310" width="820" height="195" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Group Membership: Dynamic Service Registry</text>

  <!-- Before and after -->
  <text x="250" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Before: 3 instances</text>
  <text x="650" y="360" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">After: 2 instances (auto-updated)</text>

  <!-- Before -->
  <rect x="80" y="375" width="80" height="35" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="120" y="397" text-anchor="middle" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">A-1</text>
  <rect x="170" y="375" width="80" height="35" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="210" y="397" text-anchor="middle" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">A-2</text>
  <rect x="260" y="375" width="80" height="35" rx="4" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="300" y="397" text-anchor="middle" font-size="10" fill="#991b1b" font-family="system-ui, sans-serif">A-3</text>

  <!-- Arrow -->
  <path d="M 360 392 L 450 392" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#grayArrow)"/>
  <text x="405" y="382" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">A-3 crashes</text>

  <!-- After -->
  <rect x="480" y="375" width="80" height="35" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="520" y="397" text-anchor="middle" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">A-1</text>
  <rect x="570" y="375" width="80" height="35" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="610" y="397" text-anchor="middle" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">A-2</text>
  <rect x="660" y="375" width="80" height="35" rx="4" fill="#64748b" opacity="0.12" stroke="#64748b" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="700" y="397" text-anchor="middle" font-size="10" fill="#64748b" font-family="system-ui, sans-serif">(gone)</text>

  <!-- Key properties -->
  <text x="80" y="435" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Automatic registration: instance creates ephemeral znode on startup</text>
  <text x="80" y="455" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Automatic deregistration: ZK deletes znode when session expires</text>
  <text x="80" y="475" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Real-time notification: watchers are notified of membership changes</text>
  <text x="500" y="435" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; No manual intervention needed</text>
  <text x="500" y="455" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Consistent view: all watchers see same membership</text>
  <text x="500" y="475" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Health checking: session timeout acts as liveness probe</text>

  <defs>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="grayArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
</svg>