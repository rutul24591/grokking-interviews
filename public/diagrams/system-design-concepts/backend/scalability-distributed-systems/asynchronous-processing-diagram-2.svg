<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Delivery Guarantees Comparison</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">At-most-once, at-least-once, and exactly-once delivery semantics compared</text>

  <!-- At-most-once -->
  <rect x="30" y="80" width="270" height="200" rx="8" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
  <text x="165" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">At-Most-Once</text>

  <!-- Flow -->
  <rect x="50" y="120" width="80" height="35" rx="4" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="90" y="142" text-anchor="middle" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">Produce</text>
  <path d="M 130 137 L 165 137" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#amberArrow)"/>
  <rect x="165" y="120" width="80" height="35" rx="4" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1"/>
  <text x="205" y="142" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">Deliver</text>
  <path d="M 245 137 L 265 137" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#amberArrow)"/>
  <rect x="265" y="120" width="25" height="35" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="277" y="142" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">OK</text>

  <!-- X mark - message lost -->
  <text x="165" y="185" text-anchor="middle" font-size="20" fill="#dc2626" font-family="system-ui, sans-serif">&#10007;</text>
  <text x="165" y="205" text-anchor="middle" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">Message lost in transit</text>

  <text x="50" y="235" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Fire-and-forget: no acknowledgment</text>
  <text x="50" y="255" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Lowest latency, no duplicates</text>
  <text x="50" y="275" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Messages may be lost</text>

  <!-- At-least-once -->
  <rect x="315" y="80" width="270" height="200" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">At-Least-Once</text>

  <rect x="335" y="120" width="80" height="35" rx="4" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="375" y="142" text-anchor="middle" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">Produce</text>
  <path d="M 415 137 L 450 137" fill="none" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#purpleArrow)"/>
  <rect x="450" y="120" width="80" height="35" rx="4" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="490" y="142" text-anchor="middle" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">Deliver</text>
  <path d="M 530 137 L 550 137" fill="none" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#purpleArrow)"/>
  <rect x="550" y="120" width="25" height="35" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="562" y="142" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">OK</text>

  <!-- Retry arrows -->
  <path d="M 490 155 L 490 175 L 450 175 L 450 155" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="490" y="190" text-anchor="middle" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">Retry on timeout</text>
  <text x="490" y="205" text-anchor="middle" font-size="12" fill="#d97706" font-family="system-ui, sans-serif">&#8635;</text>

  <text x="335" y="235" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Ack after processing, retry on failure</text>
  <text x="335" y="255" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; No message loss</text>
  <text x="335" y="275" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Duplicates possible on retry</text>

  <!-- Exactly-once -->
  <rect x="600" y="80" width="270" height="200" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="735" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Exactly-Once</text>

  <rect x="620" y="120" width="80" height="35" rx="4" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="660" y="142" text-anchor="middle" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">Produce</text>
  <path d="M 700 137 L 735 137" fill="none" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#purpleArrow)"/>
  <rect x="735" y="120" width="80" height="35" rx="4" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="775" y="142" text-anchor="middle" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">Dedup + Deliver</text>
  <path d="M 815 137 L 835 137" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#greenArrow)"/>
  <rect x="835" y="120" width="25" height="35" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="847" y="142" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">OK</text>

  <!-- Dedup check -->
  <rect x="690" y="165" width="90" height="30" rx="4" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1"/>
  <text x="735" y="185" text-anchor="middle" font-size="9" fill="#1d4ed8" font-family="system-ui, sans-serif">Deduplication</text>
  <text x="735" y="200" text-anchor="middle" font-size="9" fill="#1d4ed8" font-family="system-ui, sans-serif">(idempotency key)</text>
  <path d="M 735 155 L 735 165" fill="none" stroke="#2563eb" stroke-width="1"/>

  <text x="620" y="235" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Dedup via idempotency keys + txn</text>
  <text x="620" y="255" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; No loss, no duplicates</text>
  <text x="620" y="275" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Highest latency, complex</text>

  <!-- Summary comparison -->
  <rect x="30" y="310" width="840" height="195" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Delivery Guarantee Trade-offs</text>

  <!-- Headers -->
  <text x="165" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">At-Most-Once</text>
  <text x="450" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">At-Least-Once</text>
  <text x="735" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Exactly-Once</text>

  <!-- Rows -->
  <text x="50" y="385" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Message Loss:</text>
  <text x="165" y="385" text-anchor="middle" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">Possible</text>
  <text x="450" y="385" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">None</text>
  <text x="735" y="385" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">None</text>

  <text x="50" y="410" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Duplicates:</text>
  <text x="165" y="410" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">None</text>
  <text x="450" y="410" text-anchor="middle" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">Possible</text>
  <text x="735" y="410" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">None</text>

  <text x="50" y="435" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Latency:</text>
  <text x="165" y="435" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Lowest</text>
  <text x="450" y="435" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">Medium</text>
  <text x="735" y="435" text-anchor="middle" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">Highest</text>

  <text x="50" y="460" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Complexity:</text>
  <text x="165" y="460" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Low</text>
  <text x="450" y="460" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">Medium</text>
  <text x="735" y="460" text-anchor="middle" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">High</text>

  <text x="50" y="485" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Use Case:</text>
  <text x="165" y="485" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Metrics, logging</text>
  <text x="450" y="485" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Orders, payments</text>
  <text x="735" y="485" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Financial ledgers</text>

  <defs>
    <marker id="amberArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="purpleArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
</svg>