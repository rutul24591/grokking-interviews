<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>Epidemic Information Dissemination</title>
  <defs>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#f3f1f8" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Epidemic Information Dissemination</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#4b5563">Exponential spread: each informed node shares with 2 random peers per round</text>

  <!-- Round 0 -->
  <text x="100" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Round 0</text>

  <!-- Node A - source (informed) -->
  <rect x="60" y="130" width="80" height="50" rx="8" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="100" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#4f46e5">Node A</text>
  <text x="100" y="172" text-anchor="middle" font-size="11" fill="#4f46e5">Informed</text>

  <!-- Nodes B-H (uninformed) -->
  <rect x="60" y="210" width="80" height="50" rx="8" fill="#4b5563" fill-opacity="0.15" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="240" text-anchor="middle" font-size="13" fill="#4b5563">Node B</text>

  <rect x="60" y="290" width="80" height="50" rx="8" fill="#4b5563" fill-opacity="0.15" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="320" text-anchor="middle" font-size="13" fill="#4b5563">Node C</text>

  <rect x="60" y="370" width="80" height="50" rx="8" fill="#4b5563" fill-opacity="0.15" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="400" text-anchor="middle" font-size="13" fill="#4b5563">Node D</text>

  <rect x="60" y="450" width="80" height="50" rx="8" fill="#4b5563" fill-opacity="0.15" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="480" text-anchor="middle" font-size="13" fill="#4b5563">Node E</text>

  <!-- Round 1 arrows: A -> B, A -> C -->
  <line x1="140" y1="155" x2="260" y2="155" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-purple)" stroke-dasharray="6,3"/>
  <line x1="140" y1="155" x2="260" y2="315" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-purple)" stroke-dasharray="6,3"/>

  <!-- Round 1 -->
  <text x="320" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Round 1</text>

  <!-- Informed after Round 1 -->
  <rect x="260" y="130" width="80" height="50" rx="8" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="300" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#4f46e5">Node A</text>
  <text x="300" y="172" text-anchor="middle" font-size="11" fill="#4f46e5">Informed</text>

  <rect x="260" y="210" width="80" height="50" rx="8" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="300" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#4f46e5">Node B</text>
  <text x="300" y="257" text-anchor="middle" font-size="11" fill="#4f46e5">New</text>

  <rect x="260" y="290" width="80" height="50" rx="8" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="300" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#4f46e5">Node C</text>
  <text x="300" y="337" text-anchor="middle" font-size="11" fill="#4f46e5">New</text>

  <rect x="260" y="370" width="80" height="50" rx="8" fill="#4b5563" fill-opacity="0.15" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="300" y="400" text-anchor="middle" font-size="13" fill="#4b5563">Node D</text>

  <rect x="260" y="450" width="80" height="50" rx="8" fill="#4b5563" fill-opacity="0.15" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="300" y="480" text-anchor="middle" font-size="13" fill="#4b5563">Node E</text>

  <!-- Round 2 arrows: B->D, B->E, C->D, C->E -->
  <line x1="340" y1="235" x2="460" y2="395" stroke="#db2777" stroke-width="2" marker-end="url(#arrow-pink)" stroke-dasharray="6,3"/>
  <line x1="340" y1="235" x2="460" y2="475" stroke="#db2777" stroke-width="2" marker-end="url(#arrow-pink)" stroke-dasharray="6,3"/>
  <line x1="340" y1="315" x2="460" y2="395" stroke="#db2777" stroke-width="2" marker-end="url(#arrow-pink)" stroke-dasharray="6,3"/>
  <line x1="340" y1="315" x2="460" y2="475" stroke="#db2777" stroke-width="2" marker-end="url(#arrow-pink)" stroke-dasharray="6,3"/>

  <!-- Round 2 -->
  <text x="520" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Round 2</text>

  <!-- All informed after Round 2 -->
  <rect x="460" y="130" width="80" height="50" rx="8" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="500" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#4f46e5">Node A</text>

  <rect x="460" y="210" width="80" height="50" rx="8" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="500" y="240" text-anchor="middle" font-size="14" font-weight="bold" fill="#4f46e5">Node B</text>

  <rect x="460" y="290" width="80" height="50" rx="8" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="500" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#4f46e5">Node C</text>

  <rect x="460" y="370" width="80" height="50" rx="8" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="400" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">Node D</text>
  <text x="500" y="417" text-anchor="middle" font-size="11" fill="#16a34a">New</text>

  <rect x="460" y="450" width="80" height="50" rx="8" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="480" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">Node E</text>
  <text x="500" y="497" text-anchor="middle" font-size="11" fill="#16a34a">New</text>

  <!-- Growth annotation -->
  <text x="660" y="160" font-size="13" font-weight="bold" fill="#4f46e5">1 informed</text>
  <text x="660" y="270" font-size="13" font-weight="bold" fill="#4f46e5">3 informed</text>
  <text x="660" y="400" font-size="13" font-weight="bold" fill="#16a34a">5 informed</text>

  <text x="660" y="460" font-size="12" fill="#4b5563">O(log N) rounds</text>
  <text x="660" y="480" font-size="12" fill="#4b5563">to converge</text>

  <!-- Legend -->
  <rect x="620" y="50" width="160" height="80" rx="6" fill="#4f46e5" fill-opacity="0.05" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="630" y="72" font-size="12" font-weight="bold" fill="#1a1822">Legend</text>
  <rect x="630" y="82" width="14" height="14" rx="3" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="652" y="94" font-size="11" fill="#4b5563">Informed node</text>
  <rect x="630" y="102" width="14" height="14" rx="3" fill="#4b5563" fill-opacity="0.15" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="652" y="114" font-size="11" fill="#4b5563">Uninformed node</text>
</svg>
