<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="system-ui, sans-serif">
  <title>Materialized View Update Flow: Source Change to View Propagation</title>
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1822">Materialized View Update Flow: Source Change to View Propagation</text>

  <!-- Step 1: Source Table Update -->
  <rect x="30" y="70" width="200" height="100" rx="10" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="130" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#4338ca">Step 1: Source Update</text>
  <text x="130" y="122" text-anchor="middle" font-size="11" fill="#4338ca">UPDATE users SET name=...</text>
  <text x="130" y="140" text-anchor="middle" font-size="11" fill="#64748b">Writes to source table</text>
  <text x="130" y="158" text-anchor="middle" font-size="11" fill="#64748b">Generates change event</text>

  <!-- Arrow 1->2 -->
  <line x1="230" y1="120" x2="290" y2="120" stroke="#db2777" stroke-width="3" marker-end="url(#arrowPink)"/>
  <text x="260" y="110" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d">event</text>

  <!-- Step 2: Change Capture -->
  <rect x="290" y="70" width="200" height="100" rx="10" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="2"/>
  <text x="390" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#9d174d">Step 2: Change Capture</text>
  <text x="390" y="122" text-anchor="middle" font-size="11" fill="#9d174d">CDC / Trigger / Log</text>
  <text x="390" y="140" text-anchor="middle" font-size="11" fill="#64748b">Captures old + new values</text>
  <text x="390" y="158" text-anchor="middle" font-size="11" fill="#64748b">Publishes to event bus</text>

  <!-- Arrow 2->3 -->
  <line x1="490" y1="120" x2="550" y2="120" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <text x="520" y="110" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca">stream</text>

  <!-- Step 3: Event Bus / Queue -->
  <rect x="550" y="70" width="160" height="100" rx="10" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="630" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">Step 3: Event Bus</text>
  <text x="630" y="122" text-anchor="middle" font-size="11" fill="#92400e">Kafka / SQS / PubSub</text>
  <text x="630" y="140" text-anchor="middle" font-size="11" fill="#64748b">Buffers &amp; fans out</text>
  <text x="630" y="158" text-anchor="middle" font-size="11" fill="#64748b">Guarantees ordering</text>

  <!-- Arrow 3->4 (fan out) -->
  <line x1="630" y1="170" x2="630" y2="230" stroke="#d97706" stroke-width="3" marker-end="url(#arrowAmber)"/>

  <!-- Step 4: View Updaters (parallel) -->
  <rect x="100" y="230" width="200" height="90" rx="10" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">View Updater A</text>
  <text x="200" y="278" text-anchor="middle" font-size="11" fill="#1d4ed8">User profile view</text>
  <text x="200" y="296" text-anchor="middle" font-size="11" fill="#64748b">Applies delta update</text>
  <text x="200" y="314" text-anchor="middle" font-size="11" fill="#64748b">Idempotent write</text>

  <rect x="350" y="230" width="200" height="90" rx="10" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d">View Updater B</text>
  <text x="450" y="278" text-anchor="middle" font-size="11" fill="#15803d">Search index view</text>
  <text x="450" y="296" text-anchor="middle" font-size="11" fill="#64748b">Re-indexes document</text>
  <text x="450" y="314" text-anchor="middle" font-size="11" fill="#64748b">Idempotent write</text>

  <rect x="600" y="230" width="200" height="90" rx="10" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="2"/>
  <text x="700" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">View Updater C</text>
  <text x="700" y="278" text-anchor="middle" font-size="11" fill="#991b1b">Analytics aggregation</text>
  <text x="700" y="296" text-anchor="middle" font-size="11" fill="#64748b">Updates rollup</text>
  <text x="700" y="314" text-anchor="middle" font-size="11" fill="#64748b">Idempotent write</text>

  <!-- Fan-out arrows from event bus -->
  <line x1="590" y1="190" x2="200" y2="230" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)" opacity="0.7"/>
  <line x1="630" y1="190" x2="450" y2="230" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)" opacity="0.7"/>
  <line x1="670" y1="190" x2="700" y2="230" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)" opacity="0.7"/>

  <!-- Step 5: Materialized Views -->
  <rect x="60" y="370" width="240" height="80" rx="8" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="180" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca">Materialized View: User Profile</text>
  <text x="180" y="415" text-anchor="middle" font-size="11" fill="#64748b">Pre-joined user + order data</text>
  <text x="180" y="433" text-anchor="middle" font-size="11" fill="#64748b">Staleness: &lt; 500ms</text>
  <line x1="200" y1="320" x2="180" y2="370" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowGreen2)"/>

  <rect x="330" y="370" width="240" height="80" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">Materialized View: Search Index</text>
  <text x="450" y="415" text-anchor="middle" font-size="11" fill="#64748b">Elasticsearch / full-text index</text>
  <text x="450" y="433" text-anchor="middle" font-size="11" fill="#64748b">Staleness: &lt; 1s</text>
  <line x1="450" y1="320" x2="450" y2="370" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen2)"/>

  <rect x="600" y="370" width="240" height="80" rx="8" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="720" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">Materialized View: Analytics</text>
  <text x="720" y="415" text-anchor="middle" font-size="11" fill="#64748b">Daily/weekly rollup tables</text>
  <text x="720" y="433" text-anchor="middle" font-size="11" fill="#64748b">Staleness: &lt; 5s</text>
  <line x1="700" y1="320" x2="720" y2="370" stroke="#d97706" stroke-width="2" marker-end="url(#arrowGreen2)"/>
</svg>