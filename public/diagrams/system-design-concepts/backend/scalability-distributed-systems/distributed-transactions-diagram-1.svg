<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="system-ui, sans-serif">
  <title>Two-Phase Commit (2PC) Protocol - Coordinator-driven atomic commitment across distributed participants</title>
  <rect width="900" height="520" fill="#f3f1f8" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Two-Phase Commit (2PC) Protocol</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Coordinator-driven atomic commitment across distributed participants</text>
  
  <!-- Participants -->
  <rect x="30" y="90" width="200" height="60" rx="8" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Participant A</text>
  <text x="130" y="135" text-anchor="middle" font-size="10" fill="#64748b">Shard 0 - Deduct balance</text>
  
  <rect x="350" y="90" width="200" height="60" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">Participant B</text>
  <text x="450" y="135" text-anchor="middle" font-size="10" fill="#64748b">Shard 1 - Create order</text>
  
  <rect x="670" y="90" width="200" height="60" rx="8" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="2"/>
  <text x="770" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Participant C</text>
  <text x="770" y="135" text-anchor="middle" font-size="10" fill="#64748b">Shard 2 - Update inventory</text>
  
  <!-- Coordinator -->
  <rect x="300" y="180" width="300" height="50" rx="8" fill="#db2777" opacity="0.08" stroke="#db2777" stroke-width="2"/>
  <text x="450" y="202" text-anchor="middle" font-size="14" font-weight="bold" fill="#9d174d">Transaction Coordinator</text>
  <text x="450" y="220" text-anchor="middle" font-size="10" fill="#64748b">Manages 2PC protocol state</text>
  
  <!-- Phase 1: VOTE REQUEST arrows -->
  <text x="20" y="270" font-size="12" font-weight="bold" fill="#4f46e5">Phase 1: VOTE</text>
  
  <path d="M 450 230 L 130 165" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="240" y="195" font-size="10" fill="#4338ca">PREPARE</text>
  
  <path d="M 450 230 L 450 165" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="465" y="195" font-size="10" fill="#15803d">PREPARE</text>
  
  <path d="M 450 230 L 770 165" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <text x="660" y="195" font-size="10" fill="#92400e">PREPARE</text>
  
  <!-- Vote responses -->
  <path d="M 130 150 L 320 185" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrowGreen)"/>
  <text x="180" y="155" font-size="9" fill="#16a34a">VOTE_COMMIT</text>
  
  <path d="M 450 150 L 450 185" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrowGreen)"/>
  <text x="465" y="165" font-size="9" fill="#16a34a">VOTE_COMMIT</text>
  
  <path d="M 770 150 L 580 185" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrowRed)"/>
  <text x="700" y="155" font-size="9" fill="#dc2626">VOTE_ABORT</text>
  
  <!-- Phase 2: DECISION -->
  <text x="20" y="310" font-size="12" font-weight="bold" fill="#dc2626">Phase 2: DECISION (ABORT - due to Participant C)</text>
  
  <path d="M 320 245 L 130 280" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="180" y="270" font-size="10" fill="#991b1b">ABORT</text>
  
  <path d="M 450 245 L 450 280" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="465" y="270" font-size="10" fill="#991b1b">ABORT</text>
  
  <path d="M 580 245 L 770 280" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="700" y="270" font-size="10" fill="#991b1b">ABORT</text>
  
  <!-- Timeline below -->
  <line x1="30" y1="340" x2="870" y2="340" stroke="#64748b" stroke-width="1"/>
  <text x="30" y="365" font-size="12" font-weight="bold" fill="#1a1822">Timeline of 2PC States:</text>
  
  <!-- State boxes -->
  <rect x="30" y="380" width="150" height="45" rx="6" fill="#64748b" opacity="0.08" stroke="#475569" stroke-width="1"/>
  <text x="105" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">INIT</text>
  <text x="105" y="415" text-anchor="middle" font-size="9" fill="#64748b">Coordinator starts</text>
  
  <rect x="200" y="380" width="150" height="45" rx="6" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="1"/>
  <text x="275" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">WAITING</text>
  <text x="275" y="415" text-anchor="middle" font-size="9" fill="#64748b">Collecting votes</text>
  
  <rect x="370" y="380" width="150" height="45" rx="6" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="1"/>
  <text x="445" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">UNDECIDED</text>
  <text x="445" y="415" text-anchor="middle" font-size="9" fill="#64748b">One vote received</text>
  
  <rect x="540" y="380" width="150" height="45" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="615" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">ABORTED</text>
  <text x="615" y="415" text-anchor="middle" font-size="9" fill="#64748b">At least 1 VOTE_ABORT</text>
  
  <rect x="710" y="380" width="150" height="45" rx="6" fill="#64748b" opacity="0.08" stroke="#475569" stroke-width="1"/>
  <text x="785" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">COMPLETED</text>
  <text x="785" y="415" text-anchor="middle" font-size="9" fill="#64748b">All participants aborted</text>
  
  <!-- Arrows between states -->
  <path d="M 180 402 L 200 402" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <path d="M 350 402 L 370 402" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <path d="M 520 402 L 540 402" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <path d="M 690 402 L 710 402" fill="none" stroke="#64748b" stroke-width="1.5"/>
  
  <!-- Warning box -->
  <rect x="30" y="450" width="840" height="55" rx="8" fill="#92400e" opacity="0.08" stroke="#92400e" stroke-width="1.5"/>
  <text x="45" y="472" font-size="12" font-weight="bold" fill="#92400e">&#9888; Blocking Protocol:</text>
  <text x="45" y="492" font-size="11" fill="#64748b">If the coordinator fails after sending PREPARE but before sending DECISION, participants are blocked holding locks indefinitely.</text>
  
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
