<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Sloppy Quorum vs Strict Quorum</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">How Dynamo extends quorum to maintain availability during node failures</text>

  <!-- LEFT: Strict Quorum -->
  <text x="225" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#4f46e5" font-family="system-ui, sans-serif">Strict Quorum (N=3, W=2, R=2)</text>
  <rect x="30" y="115" width="390" height="200" rx="8" fill="#4f46e5" opacity="0.06" stroke="#4f46e5" stroke-width="1.5"/>

  <!-- 3 nodes, all healthy -->
  <circle cx="130" cy="190" r="30" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="130" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">A</text>
  <text x="130" y="202" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">v2 &#9989;</text>

  <circle cx="225" cy="190" r="30" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="225" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">B</text>
  <text x="225" y="202" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">v2 &#9989;</text>

  <circle cx="320" cy="190" r="30" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="320" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">C</text>
  <text x="320" y="202" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">replicating</text>

  <text x="225" y="250" text-anchor="middle" font-size="11" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; W=2 satisfied (A, B acknowledged)</text>
  <text x="225" y="270" text-anchor="middle" font-size="11" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; R=2 will read latest from A, B</text>
  <text x="225" y="295" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">All preferred nodes reachable</text>

  <!-- RIGHT: Sloppy Quorum -->
  <text x="675" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#d97706" font-family="system-ui, sans-serif">Sloppy Quorum (N=3, W=2, R=2)</text>
  <rect x="480" y="115" width="390" height="200" rx="8" fill="#d97706" opacity="0.06" stroke="#d97706" stroke-width="1.5"/>

  <!-- Node A down -->
  <circle cx="580" cy="190" r="30" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="580" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">A</text>
  <text x="580" y="202" text-anchor="middle" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">DOWN &#9888;</text>

  <!-- B and C healthy -->
  <circle cx="675" cy="190" r="30" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="675" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">B</text>
  <text x="675" y="202" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">v2 &#9989;</text>

  <circle cx="770" cy="190" r="30" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="770" y="186" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">C</text>
  <text x="770" y="202" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">v2 &#9989;</text>

  <!-- Hinted handoff: D and E receive writes -->
  <circle cx="628" cy="260" r="22" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="628" y="264" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">D</text>
  <text x="628" y="276" text-anchor="middle" font-size="8" fill="#4b5563" font-family="system-ui, sans-serif">hinted</text>

  <circle cx="722" cy="260" r="22" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="722" y="264" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6" font-family="system-ui, sans-serif">E</text>
  <text x="722" y="276" text-anchor="middle" font-size="8" fill="#4b5563" font-family="system-ui, sans-serif">hinted</text>

  <!-- Arrows from B and C to D and E -->
  <path d="M 675 220 L 628 238" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M 675 220 L 722 238" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 2"/>

  <text x="675" y="250" text-anchor="middle" font-size="11" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; W=2 satisfied (B, C acknowledged)</text>
  <text x="675" y="270" text-anchor="middle" font-size="11" fill="#92400e" font-family="system-ui, sans-serif">&#9888; D, E hold hinted handoff for A</text>
  <text x="675" y="295" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">When A recovers: D, E forward data to A</text>

  <!-- Comparison summary -->
  <rect x="30" y="340" width="840" height="165" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Key Differences</text>

  <rect x="50" y="380" width="390" height="110" rx="6" fill="#4f46e5" opacity="0.06"/>
  <text x="65" y="400" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Strict Quorum</text>
  <text x="65" y="422" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; Writes go only to preferred nodes (N)</text>
  <text x="65" y="442" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; If a preferred node is down, W may not be</text>
  <text x="65" y="458" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">  satisfiable &#8594; write fails</text>
  <text x="65" y="478" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Strong consistency guarantee</text>

  <rect x="460" y="380" width="390" height="110" rx="6" fill="#d97706" opacity="0.06"/>
  <text x="475" y="400" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Sloppy Quorum</text>
  <text x="475" y="422" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; Writes can go to non-preferred nodes</text>
  <text x="475" y="442" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; Maintains W even if preferred nodes fail</text>
  <text x="475" y="458" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">  &#8594; always available</text>
  <text x="475" y="478" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Eventual consistency (read may miss latest)</text>
</svg>