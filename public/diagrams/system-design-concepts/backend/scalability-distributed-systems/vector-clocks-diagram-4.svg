<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Dynamo&apos;s Use of Vector Clocks for Conflict Detection</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Amazon Dynamo uses vector clocks to detect concurrent writes and return siblings to the client for resolution</text>

  <!-- Timeline of writes -->
  <text x="450" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Concurrent Writes Create Siblings</text>

  <!-- Client 1 -->
  <rect x="40" y="120" width="160" height="40" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="120" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Client 1 (Alice)</text>

  <!-- Client 2 -->
  <rect x="40" y="260" width="160" height="40" rx="6" fill="#db2777" opacity="0.15" stroke="#db2777" stroke-width="1.5"/>
  <text x="120" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Client 2 (Bob)</text>

  <!-- Dynamo nodes -->
  <rect x="340" y="100" width="530" height="220" rx="8" fill="#d97706" opacity="0.06" stroke="#d97706" stroke-width="2"/>
  <text x="605" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Dynamo Cluster (N=3, R=2, W=2)</text>

  <!-- Node A -->
  <rect x="370" y="140" width="140" height="70" rx="6" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="440" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Node A</text>
  <text x="390" y="185" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">cart: {item: [A]}</text>
  <text x="390" y="200" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: {Alice:1}</text>

  <!-- Node B -->
  <rect x="530" y="140" width="140" height="70" rx="6" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="600" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Node B</text>
  <text x="550" y="185" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">cart: {item: [A]}</text>
  <text x="550" y="200" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: {Alice:1}</text>

  <!-- Node C -->
  <rect x="690" y="140" width="140" height="70" rx="6" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="1.5"/>
  <text x="760" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Node C</text>
  <text x="710" y="185" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">cart: {item: [B]}</text>
  <text x="710" y="200" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">VC: {Bob:1}</text>

  <!-- Write arrows -->
  <path d="M 200 140 L 370 175" fill="none" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#purpleArrow)"/>
  <text x="270" y="145" font-size="9" fill="#4338ca" font-family="system-ui, sans-serif">Write: item=A</text>

  <path d="M 200 280 L 690 175" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <text x="420" y="240" font-size="9" fill="#9d174d" font-family="system-ui, sans-serif">Write: item=B</text>

  <!-- Conflict resolution -->
  <rect x="340" y="240" width="530" height="65" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1.5"/>
  <text x="605" y="260" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">Read returns siblings: {item:[A]} (VC:{Alice:1}) AND {item:[B]} (VC:{Bob:1})</text>
  <text x="605" y="280" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">VCs are incomparable ({Alice:1} || {Bob:1}) &#8594; concurrent writes detected</text>
  <text x="605" y="298" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Client merges: {item:[A,B]} and writes back with VC: {Alice:1, Bob:1}</text>

  <!-- Result -->
  <rect x="40" y="340" width="820" height="165" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Dynamo&apos;s Vector Clock Workflow</text>

  <text x="60" y="390" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">1. Client writes to coordinator node, which replicates to N-1 other nodes</text>
  <text x="60" y="412" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">2. Each node stores the value with its vector clock (client ID + counter)</text>
  <text x="60" y="434" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">3. Client reads from coordinator, which collects values from R nodes</text>
  <text x="60" y="456" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">4. Coordinator compares vector clocks: if incomparable, returns siblings</text>
  <text x="60" y="478" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">5. Client merges siblings and writes back the resolved value with merged VC</text>

  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; No write is lost — concurrent writes are detected and returned to the client for resolution</text>

  <defs>
    <marker id="purpleArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="pinkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
  </defs>
</svg>