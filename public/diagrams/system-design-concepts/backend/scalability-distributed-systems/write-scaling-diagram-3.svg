<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="#f3f1f8" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Batch Write Optimization</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" font-weight="400" fill="#4b5563">Individual writes coalesced into batches with time windows and size thresholds</text>

  <!-- Individual Writes Stream (left side) -->
  <text x="130" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Individual Writes</text>

  <rect x="40" y="110" width="180" height="30" rx="5" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="130" y="130" text-anchor="middle" font-size="11" font-weight="400" fill="#1a1822">write w1 (t=0ms)</text>

  <rect x="40" y="148" width="180" height="30" rx="5" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="130" y="168" text-anchor="middle" font-size="11" font-weight="400" fill="#1a1822">write w2 (t=5ms)</text>

  <rect x="40" y="186" width="180" height="30" rx="5" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="130" y="206" text-anchor="middle" font-size="11" font-weight="400" fill="#1a1822">write w3 (t=12ms)</text>

  <rect x="40" y="224" width="180" height="30" rx="5" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="130" y="244" text-anchor="middle" font-size="11" font-weight="400" fill="#1a1822">write w4 (t=18ms)</text>

  <rect x="40" y="262" width="180" height="30" rx="5" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="130" y="282" text-anchor="middle" font-size="11" font-weight="400" fill="#1a1822">write w5 (t=22ms)</text>

  <!-- Time Window Bracket -->
  <line x1="235" y1="110" x2="250" y2="110" stroke="#d97706" stroke-width="2"/>
  <line x1="235" y1="292" x2="250" y2="292" stroke="#d97706" stroke-width="2"/>
  <line x1="245" y1="110" x2="245" y2="292" stroke="#d97706" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="260" y="205" font-size="11" font-weight="400" fill="#d97706">time</text>
  <text x="260" y="220" font-size="11" font-weight="400" fill="#d97706">window</text>
  <text x="260" y="235" font-size="11" font-weight="400" fill="#d97706">= 50ms</text>

  <!-- Arrow to Collector -->
  <line x1="220" y1="200" x2="280" y2="200" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Batch Collector -->
  <rect x="285" y="140" width="230" height="120" rx="10" fill="#d97706" fill-opacity="0.15" stroke="#d97706" stroke-width="2.5"/>
  <text x="400" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Batch Collector</text>
  <text x="400" y="185" text-anchor="middle" font-size="11" font-weight="400" fill="#d97706">size threshold: 5 writes</text>
  <text x="400" y="203" text-anchor="middle" font-size="11" font-weight="400" fill="#d97706">time threshold: 50ms</text>
  <text x="400" y="221" text-anchor="middle" font-size="11" font-weight="400" fill="#d97706">partition key grouping</text>
  <text x="400" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">batch = {w1, w2, w3, w4, w5}</text>

  <!-- Arrow: Collector -> Flushed Batch -->
  <line x1="515" y1="200" x2="560" y2="200" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="540" y="190" font-size="10" font-weight="400" fill="#4b5563">flush</text>

  <!-- Flushed Batch -->
  <rect x="565" y="145" width="200" height="50" rx="8" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-width="2"/>
  <text x="665" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Flushed Batch</text>
  <text x="665" y="186" text-anchor="middle" font-size="11" font-weight="400" fill="#16a34a">single I/O operation</text>

  <!-- Arrow: Flushed Batch -> Storage -->
  <line x1="665" y1="195" x2="665" y2="240" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Storage Nodes -->
  <rect x="565" y="245" width="200" height="50" rx="8" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-width="2"/>
  <text x="665" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Storage Engine</text>
  <text x="665" y="286" text-anchor="middle" font-size="11" font-weight="400" fill="#2563eb">sequential write, 1 fsync</text>

  <!-- Comparison section -->
  <rect x="40" y="340" width="350" height="160" rx="10" fill="#dc2626" fill-opacity="0.1" stroke="#dc2626" stroke-width="1.5"/>
  <text x="215" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">Without Batching</text>
  <text x="60" y="395" font-size="12" font-weight="400" fill="#f87171">5 individual writes = 5 I/O ops</text>
  <text x="60" y="418" font-size="12" font-weight="400" fill="#f87171">5 fsync calls (each ~1-10ms)</text>
  <text x="60" y="441" font-size="12" font-weight="400" fill="#f87171">5 index lookups</text>
  <text x="60" y="464" font-size="12" font-weight="400" fill="#f87171">Total: ~25-50ms latency</text>
  <text x="60" y="487" font-size="12" font-weight="400" fill="#f87171">High disk contention</text>

  <rect x="410" y="340" width="355" height="160" rx="10" fill="#16a34a" fill-opacity="0.1" stroke="#16a34a" stroke-width="1.5"/>
  <text x="588" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">With Batching</text>
  <text x="430" y="395" font-size="12" font-weight="400" fill="#16a34a">1 batched write = 1 I/O op</text>
  <text x="430" y="418" font-size="12" font-weight="400" fill="#16a34a">1 fsync call (~1-10ms)</text>
  <text x="430" y="441" font-size="12" font-weight="400" fill="#16a34a">1 sequential index append</text>
  <text x="430" y="464" font-size="12" font-weight="400" fill="#16a34a">Total: ~5-15ms latency (80% reduction)</text>
  <text x="430" y="487" font-size="12" font-weight="400" fill="#16a34a">Low disk contention, higher throughput</text>
</svg>
