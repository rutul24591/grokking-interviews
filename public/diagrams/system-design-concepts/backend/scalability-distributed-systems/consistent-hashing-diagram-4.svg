<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <title>Hash function performance trade-offs comparing distribution quality versus computation cost</title>

  <rect width="900" height="520" rx="12" fill="#f3f1f8"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Performance Trade-offs: Hash Function Selection</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Distribution quality vs computation cost across hash algorithms</text>
  
  <!-- LEFT: Distribution comparison -->
  <text x="225" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1822">Key Distribution Quality</text>
  <rect x="30" y="105" width="390" height="395" rx="8" fill="none" stroke="#d7d1e6" stroke-width="2"/>
  
  <!-- Distribution bars - MD5 (good) -->
  <text x="50" y="140" font-size="11" font-weight="700" fill="#1a1822">MD5</text>
  <rect x="100" y="128" width="280" height="10" rx="2" fill="#16a34a" opacity="0.8"/>
  <rect x="100" y="142" width="275" height="10" rx="2" fill="#16a34a" opacity="0.6"/>
  <rect x="100" y="156" width="278" height="10" rx="2" fill="#16a34a" opacity="0.7"/>
  <rect x="100" y="170" width="272" height="10" rx="2" fill="#16a34a" opacity="0.5"/>
  <rect x="100" y="184" width="280" height="10" rx="2" fill="#16a34a" opacity="0.8"/>
  <rect x="100" y="198" width="276" height="10" rx="2" fill="#16a34a" opacity="0.6"/>
  <text x="390" y="170" font-size="10" font-weight="600" fill="#16a34a">Low variance</text>
  
  <!-- Distribution bars - MurmurHash (good) -->
  <text x="50" y="240" font-size="11" font-weight="700" fill="#1a1822">Murmur3</text>
  <rect x="100" y="228" width="278" height="10" rx="2" fill="#16a34a" opacity="0.7"/>
  <rect x="100" y="242" width="282" height="10" rx="2" fill="#16a34a" opacity="0.8"/>
  <rect x="100" y="256" width="275" height="10" rx="2" fill="#16a34a" opacity="0.6"/>
  <rect x="100" y="270" width="280" height="10" rx="2" fill="#16a34a" opacity="0.7"/>
  <rect x="100" y="284" width="273" height="10" rx="2" fill="#16a34a" opacity="0.5"/>
  <rect x="100" y="298" width="279" height="10" rx="2" fill="#16a34a" opacity="0.7"/>
  <text x="390" y="270" font-size="10" font-weight="600" fill="#16a34a">Low variance</text>
  
  <!-- Distribution bars - CRC32 (moderate) -->
  <text x="50" y="340" font-size="11" font-weight="700" fill="#1a1822">CRC32</text>
  <rect x="100" y="328" width="260" height="10" rx="2" fill="#92400e" opacity="0.7"/>
  <rect x="100" y="342" width="290" height="10" rx="2" fill="#92400e" opacity="0.8"/>
  <rect x="100" y="356" width="240" height="10" rx="2" fill="#92400e" opacity="0.5"/>
  <rect x="100" y="370" width="285" height="10" rx="2" fill="#92400e" opacity="0.7"/>
  <rect x="100" y="384" width="265" height="10" rx="2" fill="#92400e" opacity="0.6"/>
  <rect x="100" y="398" width="295" height="10" rx="2" fill="#92400e" opacity="0.9"/>
  <text x="405" y="370" font-size="10" font-weight="600" fill="#92400e">Med variance</text>
  
  <!-- Distribution bars - Simple Hash (poor) -->
  <text x="50" y="440" font-size="11" font-weight="700" fill="#1a1822">Simple %N</text>
  <rect x="100" y="428" width="320" height="10" rx="2" fill="#dc2626" opacity="0.9"/>
  <rect x="100" y="442" width="180" height="10" rx="2" fill="#dc2626" opacity="0.5"/>
  <rect x="100" y="456" width="300" height="10" rx="2" fill="#dc2626" opacity="0.8"/>
  <rect x="100" y="470" width="150" height="10" rx="2" fill="#dc2626" opacity="0.4"/>
  <rect x="100" y="484" width="310" height="10" rx="2" fill="#dc2626" opacity="0.8"/>
  <rect x="100" y="498" width="170" height="10" rx="2" fill="#dc2626" opacity="0.4"/>
  <text x="425" y="470" font-size="10" font-weight="600" fill="#dc2626">High variance</text>
  
  <!-- RIGHT: Performance metrics -->
  <text x="675" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1822">Computation Cost (ops/sec)</text>
  <rect x="480" y="105" width="390" height="395" rx="8" fill="none" stroke="#d7d1e6" stroke-width="2"/>
  
  <!-- Speed bars -->
  <text x="500" y="155" font-size="11" font-weight="700" fill="#1a1822">Simple %N</text>
  <rect x="620" y="143" width="220" height="16" rx="3" fill="#16a34a" opacity="0.8"/>
  <text x="845" y="155" font-size="10" font-weight="600" fill="#16a34a">15M ops/s</text>
  
  <text x="500" y="195" font-size="11" font-weight="700" fill="#1a1822">CRC32</text>
  <rect x="620" y="183" width="180" height="16" rx="3" fill="#16a34a" opacity="0.7"/>
  <text x="805" y="195" font-size="10" font-weight="600" fill="#16a34a">10M ops/s</text>
  
  <text x="500" y="235" font-size="11" font-weight="700" fill="#1a1822">Murmur3</text>
  <rect x="620" y="223" width="150" height="16" rx="3" fill="#4f46e5" opacity="0.7"/>
  <text x="775" y="235" font-size="10" font-weight="600" fill="#4338ca">7M ops/s</text>
  
  <text x="500" y="275" font-size="11" font-weight="700" fill="#1a1822">SHA-1</text>
  <rect x="620" y="263" width="80" height="16" rx="3" fill="#92400e" opacity="0.7"/>
  <text x="705" y="275" font-size="10" font-weight="600" fill="#92400e">3M ops/s</text>
  
  <text x="500" y="315" font-size="11" font-weight="700" fill="#1a1822">MD5</text>
  <rect x="620" y="303" width="100" height="16" rx="3" fill="#92400e" opacity="0.6"/>
  <text x="725" y="315" font-size="10" font-weight="600" fill="#92400e">4M ops/s</text>
  
  <!-- Recommendation box -->
  <rect x="500" y="355" width="350" height="125" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="515" y="380" font-size="13" font-weight="700" fill="#92400e">Production Recommendation</text>
  <text x="515" y="405" font-size="11" fill="#1a1822">MurmurHash3 or xxHash provide the best</text>
  <text x="515" y="423" font-size="11" fill="#1a1822">balance: near-uniform distribution with</text>
  <text x="515" y="441" font-size="11" fill="#1a1822">high throughput. Avoid cryptographic</text>
  <text x="515" y="459" font-size="11" fill="#1a1822">hashes (SHA, MD5) for hot-path routing.</text>
</svg>