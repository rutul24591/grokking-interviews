<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Dead-Letter Queue and Backpressure</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Handling failed messages and consumer slowdown in async processing systems</text>

  <!-- DLQ Flow (left side) -->
  <text x="225" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#dc2626" font-family="system-ui, sans-serif">Dead-Letter Queue Flow</text>
  <rect x="30" y="115" width="390" height="200" rx="8" fill="#dc2626" opacity="0.06" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Main queue -->
  <rect x="50" y="130" width="150" height="40" rx="6" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <text x="125" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Main Queue</text>

  <!-- Consumer -->
  <rect x="220" y="130" width="100" height="40" rx="6" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="270" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Consumer</text>

  <!-- Success path -->
  <path d="M 320 150 L 370 150" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#greenArrow)"/>
  <rect x="370" y="135" width="40" height="30" rx="4" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="390" y="155" text-anchor="middle" font-size="14" fill="#16a34a" font-family="system-ui, sans-serif">&#9989;</text>

  <!-- Retry path -->
  <path d="M 270 170 L 270 210 L 125 210 L 125 170" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="200" y="200" text-anchor="middle" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">Retry 1, 2, 3 (exponential backoff)</text>

  <!-- DLQ path -->
  <path d="M 270 170 L 270 260 L 125 260 L 125 230" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="50" y="260" width="150" height="40" rx="6" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1.5"/>
  <text x="125" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">Dead-Letter Queue</text>
  <text x="125" y="293" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Failed after 3 retries</text>

  <!-- DLQ consumer -->
  <rect x="50" y="180" width="150" height="35" rx="4" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="1"/>
  <text x="125" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">DLQ Consumer</text>
  <text x="125" y="215" text-anchor="middle" font-size="8" fill="#4b5563" font-family="system-ui, sans-serif">Manual processing / alert</text>

  <!-- Backpressure (right side) -->
  <text x="675" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563eb" font-family="system-ui, sans-serif">Backpressure Flow</text>
  <rect x="480" y="115" width="390" height="200" rx="8" fill="#2563eb" opacity="0.06" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Producer -->
  <rect x="500" y="130" width="100" height="40" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="550" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Producer</text>

  <!-- Queue filling up -->
  <rect x="620" y="130" width="150" height="40" rx="6" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <text x="695" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Queue: 95% full</text>
  <rect x="630" y="155" width="130" height="8" rx="2" fill="#d97706" opacity="0.3"/>
  <rect x="630" y="155" width="124" height="8" rx="2" fill="#dc2626" opacity="0.5"/>

  <!-- Consumer slow -->
  <rect x="790" y="130" width="60" height="40" rx="6" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-width="1.5"/>
  <text x="820" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Slow</text>

  <!-- Backpressure signal -->
  <path d="M 695 170 L 695 210 L 550 210 L 550 170" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="620" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">&#9888; SLOW DOWN</text>

  <!-- Producer throttling -->
  <rect x="500" y="220" width="100" height="35" rx="4" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1"/>
  <text x="550" y="242" text-anchor="middle" font-size="10" fill="#991b1b" font-family="system-ui, sans-serif">Throttle writes</text>

  <!-- Strategies -->
  <rect x="30" y="340" width="840" height="165" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Backpressure Strategies</text>

  <rect x="50" y="380" width="250" height="50" rx="4" fill="#4f46e5" opacity="0.08"/>
  <text x="175" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">1. Buffer</text>
  <text x="175" y="420" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Queue excess messages temporarily</text>

  <rect x="325" y="380" width="250" height="50" rx="4" fill="#16a34a" opacity="0.08"/>
  <text x="450" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">2. Drop</text>
  <text x="450" y="420" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Discard oldest messages when full</text>

  <rect x="600" y="380" width="250" height="50" rx="4" fill="#d97706" opacity="0.08"/>
  <text x="725" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">3. Signal</text>
  <text x="725" y="420" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Tell producer to slow down (TCP-style)</text>

  <rect x="50" y="445" width="250" height="50" rx="4" fill="#2563eb" opacity="0.08"/>
  <text x="175" y="465" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">4. Scale Consumers</text>
  <text x="175" y="485" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Auto-scale consumer count</text>

  <rect x="325" y="445" width="250" height="50" rx="4" fill="#db2777" opacity="0.08"/>
  <text x="450" y="465" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">5. Batch Process</text>
  <text x="450" y="485" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Process messages in batches</text>

  <rect x="600" y="445" width="250" height="50" rx="4" fill="#dc2626" opacity="0.08"/>
  <text x="725" y="465" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">6. Circuit Break</text>
  <text x="725" y="485" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Reject messages when overloaded</text>

  <defs>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
</svg>