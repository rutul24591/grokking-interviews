<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%">
  <defs>
    <marker id="arrow-paxos" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
    <marker id="arrow-raft" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1a1822" text-anchor="middle">Paxos vs Raft: Protocol Comparison</text>
  <text x="450" y="55" font-family="system-ui, sans-serif" font-size="13" fill="#1a1822" text-anchor="middle">Message flow complexity and phase differences</text>

  <!-- Divider Line -->
  <line x1="450" y1="70" x2="450" y2="500" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- PAXOS Side -->
  <rect x="30" y="70" width="400" height="40" rx="8" fill="#db2777" opacity="0.15" stroke="#db2777" stroke-width="2"/>
  <text x="230" y="96" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#db2777" text-anchor="middle">Paxos Protocol</text>

  <!-- Paxos Nodes -->
  <rect x="60" y="130" width="90" height="45" rx="8" fill="#db2777" opacity="0.15" stroke="#db2777" stroke-width="1.5"/>
  <text x="105" y="157" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#db2777" text-anchor="middle">P1</text>

  <rect x="185" y="130" width="90" height="45" rx="8" fill="#db2777" opacity="0.15" stroke="#db2777" stroke-width="1.5"/>
  <text x="230" y="157" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#db2777" text-anchor="middle">P2</text>

  <rect x="310" y="130" width="90" height="45" rx="8" fill="#db2777" opacity="0.15" stroke="#db2777" stroke-width="1.5"/>
  <text x="355" y="157" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#db2777" text-anchor="middle">P3</text>

  <!-- Paxos Phase 1: Prepare -->
  <text x="230" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Phase 1: Prepare (Proposer sends prepare with proposal n)</text>
  <path d="M 105 178 L 105 215" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-paxos)"/>
  <path d="M 230 178 L 230 215" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-paxos)"/>
  <path d="M 355 178 L 355 215" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-paxos)"/>

  <!-- Paxos Phase 2: Promise -->
  <text x="230" y="260" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Phase 2: Promise (Acceptors respond with highest accepted)</text>
  <path d="M 105 245 L 105 222" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-paxos)"/>
  <path d="M 230 245 L 230 222" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-paxos)"/>
  <path d="M 355 245 L 355 222" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-paxos)"/>

  <!-- Paxos Phase 3: Accept -->
  <text x="230" y="305" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4f46e5" text-anchor="middle">Phase 3: Accept (Proposer sends accept with value v)</text>
  <path d="M 105 275 L 105 312" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-paxos)"/>
  <path d="M 230 275 L 230 312" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-paxos)"/>
  <path d="M 355 275 L 355 312" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-paxos)"/>

  <!-- Paxos Phase 4: Accepted -->
  <text x="230" y="350" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#2563eb" text-anchor="middle">Phase 4: Accepted (Acceptors acknowledge value)</text>
  <path d="M 105 340 L 105 317" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-paxos)"/>
  <path d="M 230 340 L 230 317" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-paxos)"/>
  <path d="M 355 340 L 355 317" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-paxos)"/>

  <!-- Paxos Phase 5: Commit -->
  <text x="230" y="395" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="middle">Phase 5: Commit (Value learned by all acceptors)</text>
  <rect x="60" y="405" width="340" height="35" rx="8" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1.5"/>
  <text x="230" y="428" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Value committed across majority of acceptors</text>

  <!-- Message Count for Paxos -->
  <rect x="60" y="455" width="340" height="35" rx="8" fill="#db2777" opacity="0.1" stroke="#db2777" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="230" y="477" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#db2777" text-anchor="middle">Total Messages: 4N (N = number of nodes)</text>

  <!-- RAFT Side -->
  <rect x="470" y="70" width="400" height="40" rx="8" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="670" y="96" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#2563eb" text-anchor="middle">Raft Protocol</text>

  <!-- Raft Nodes -->
  <rect x="500" y="130" width="90" height="45" rx="8" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="545" y="157" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4f46e5" text-anchor="middle">Leader</text>

  <rect x="625" y="130" width="90" height="45" rx="8" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="670" y="157" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#2563eb" text-anchor="middle">Follower</text>

  <rect x="750" y="130" width="90" height="45" rx="8" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="795" y="157" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#2563eb" text-anchor="middle">Follower</text>

  <!-- Raft Phase 1: Leader Election -->
  <text x="670" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#d97706" text-anchor="middle">Phase 1: Leader Election (single round of voting)</text>
  <path d="M 545 178 L 545 215" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-raft)"/>
  <path d="M 670 178 L 670 215" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-raft)"/>
  <path d="M 795 178 L 795 215" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-raft)"/>

  <!-- Raft Election Response -->
  <text x="670" y="260" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">Phase 2: Votes Granted (majority wins)</text>
  <path d="M 545 245 L 545 222" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-raft)"/>
  <path d="M 670 245 L 670 222" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-raft)"/>
  <path d="M 795 245 L 795 222" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-raft)"/>

  <!-- Raft Phase 3: Log Replication -->
  <text x="670" y="305" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4f46e5" text-anchor="middle">Phase 3: AppendEntries (log replication + heartbeat)</text>
  <path d="M 545 275 L 545 312" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-raft)"/>
  <path d="M 670 275 L 670 312" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-raft)"/>
  <path d="M 795 275 L 795 312" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrow-raft)"/>

  <!-- Raft Phase 4: Ack + Commit -->
  <text x="670" y="350" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#2563eb" text-anchor="middle">Phase 4: Ack + Commit (single round-trip)</text>
  <path d="M 545 340 L 545 317" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-raft)"/>
  <path d="M 670 340 L 670 317" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-raft)"/>
  <path d="M 795 340 L 795 317" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-raft)"/>

  <!-- Raft Commit -->
  <rect x="500" y="365" width="340" height="35" rx="8" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="670" y="388" font-family="system-ui, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Leader commits after majority ack, applies to state machine</text>

  <!-- Message Count for Raft -->
  <rect x="500" y="455" width="340" height="35" rx="8" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="670" y="477" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2563eb" text-anchor="middle">Total Messages: 2N (N = number of nodes)</text>

  <!-- Key Difference -->
  <rect x="30" y="495" width="840" height="20" rx="4" fill="#4b5563" opacity="0.1"/>
  <text x="450" y="509" font-family="system-ui, sans-serif" font-size="11" fill="#4b5563" text-anchor="middle">Key Difference: Paxos requires 2 rounds of messaging per consensus. Raft combines election + replication into a simpler flow with a stable leader.</text>
</svg>