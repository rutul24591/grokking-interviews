<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Data Replication Topologies</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Single-leader, multi-leader, and leaderless replication compared</text>

  <!-- Single Leader -->
  <text x="150" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#4f46e5" font-family="system-ui, sans-serif">Single-Leader</text>
  <rect x="40" y="115" width="220" height="160" rx="8" fill="#4f46e5" opacity="0.06" stroke="#4f46e5" stroke-width="1.5"/>
  <circle cx="150" cy="150" r="25" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="150" y="154" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Leader</text>
  <circle cx="90" cy="230" r="18" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="90" y="234" text-anchor="middle" font-size="9" fill="#15803d" font-family="system-ui, sans-serif">F1</text>
  <circle cx="150" cy="230" r="18" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="150" y="234" text-anchor="middle" font-size="9" fill="#15803d" font-family="system-ui, sans-serif">F2</text>
  <circle cx="210" cy="230" r="18" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="210" y="234" text-anchor="middle" font-size="9" fill="#15803d" font-family="system-ui, sans-serif">F3</text>
  <path d="M 150 175 L 90 212" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M 150 175 L 150 212" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M 150 175 L 210 212" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="150" y="265" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">One writer, multiple readers</text>

  <!-- Multi-Leader -->
  <text x="450" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a" font-family="system-ui, sans-serif">Multi-Leader</text>
  <rect x="340" y="115" width="220" height="160" rx="8" fill="#16a34a" opacity="0.06" stroke="#16a34a" stroke-width="1.5"/>
  <circle cx="410" cy="170" r="20" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="410" y="174" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">L1</text>
  <circle cx="490" cy="170" r="20" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="490" y="174" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">L2</text>
  <circle cx="370" cy="240" r="15" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="370" y="244" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">F1</text>
  <circle cx="450" cy="240" r="15" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="244" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">F2</text>
  <circle cx="530" cy="240" r="15" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="530" y="244" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">F3</text>
  <path d="M 430 170 L 470 170" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <path d="M 470 185 L 430 185" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <path d="M 410 190 L 370 225" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M 490 190 L 450 225" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M 490 190 L 530 225" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="450" y="275" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Multiple writers, cross-replication</text>

  <!-- Leaderless -->
  <text x="750" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#d97706" font-family="system-ui, sans-serif">Leaderless</text>
  <rect x="640" y="115" width="220" height="160" rx="8" fill="#d97706" opacity="0.06" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="680" cy="170" r="18" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="680" y="174" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">N1</text>
  <circle cx="750" cy="150" r="18" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="750" y="154" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">N2</text>
  <circle cx="820" cy="170" r="18" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="820" y="174" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">N3</text>
  <circle cx="715" cy="235" r="18" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="715" y="239" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">N4</text>
  <circle cx="785" cy="235" r="18" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="785" y="239" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">N5</text>
  <!-- Mesh connections -->
  <path d="M 695 180 L 735 220" fill="none" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>
  <path d="M 765 165 L 770 217" fill="none" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>
  <path d="M 805 180 L 770 217" fill="none" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>
  <path d="M 695 180 L 765 217" fill="none" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>
  <path d="M 735 165 L 770 217" fill="none" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>
  <text x="750" y="275" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">All nodes equal, gossip propagation</text>

  <!-- Summary comparison -->
  <rect x="30" y="310" width="840" height="195" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Topology Comparison</text>

  <!-- Headers -->
  <text x="150" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#4f46e5" font-family="system-ui, sans-serif">Single-Leader</text>
  <text x="450" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a" font-family="system-ui, sans-serif">Multi-Leader</text>
  <text x="750" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706" font-family="system-ui, sans-serif">Leaderless</text>

  <!-- Rows -->
  <text x="50" y="385" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Write Path:</text>
  <text x="150" y="385" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Single leader</text>
  <text x="450" y="385" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Multiple leaders</text>
  <text x="750" y="385" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Any node</text>

  <text x="50" y="408" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Conflicts:</text>
  <text x="150" y="408" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">None</text>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Possible</text>
  <text x="750" y="408" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Possible</text>

  <text x="50" y="431" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Consistency:</text>
  <text x="150" y="431" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Strong (leader reads)</text>
  <text x="450" y="431" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Eventual</text>
  <text x="750" y="431" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Eventual (tunable)</text>

  <text x="50" y="454" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Availability:</text>
  <text x="150" y="454" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Leader-dependent</text>
  <text x="450" y="454" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Higher (per-DC)</text>
  <text x="750" y="454" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Highest</text>

  <text x="50" y="477" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Best For:</text>
  <text x="150" y="477" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Most apps</text>
  <text x="450" y="477" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Multi-DC writes</text>
  <text x="750" y="477" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">High availability</text>

  <text x="50" y="500" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Examples:</text>
  <text x="150" y="500" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">MySQL, PostgreSQL</text>
  <text x="450" y="500" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Cassandra, Riak</text>
  <text x="750" y="500" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">DynamoDB, Dynamo</text>

  <defs>
    <marker id="pinkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
  </defs>
</svg>