<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Distributed Lock Acquisition Flow</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Client acquires lock from lock service, performs operation, releases lock with TTL protection</text>

  <!-- Client -->
  <rect x="40" y="100" width="140" height="50" rx="8" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Client A</text>
  <text x="110" y="138" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">wants lock: /resource/X</text>

  <!-- Lock Service -->
  <rect x="350" y="80" width="200" height="90" rx="8" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Lock Service</text>
  <text x="450" y="128" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Redis / ZooKeeper / etcd</text>
  <text x="450" y="148" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Manages lock state</text>

  <!-- Lock state -->
  <rect x="370" y="180" width="160" height="50" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="450" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Lock: /resource/X</text>
  <text x="450" y="218" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Holder: Client A | TTL: 30s</text>

  <!-- Resource -->
  <rect x="620" y="100" width="240" height="70" rx="8" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="740" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Protected Resource</text>
  <text x="740" y="145" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Database row, file, counter</text>
  <text x="740" y="162" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Only accessible with valid lock</text>

  <!-- Flow arrows -->
  <path d="M 180 125 L 350 125" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#purpleArrow)"/>
  <text x="265" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">1. ACQUIRE</text>

  <path d="M 350 140 L 180 140" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#greenArrow)"/>
  <text x="265" y="155" text-anchor="middle" font-size="11" fill="#15803d" font-family="system-ui, sans-serif">2. GRANTED (token)</text>

  <path d="M 110 150 L 110 240 L 740 240 L 740 170" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="425" y="235" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">3. Perform exclusive operation on resource</text>

  <path d="M 180 160 L 350 160" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <text x="265" y="175" text-anchor="middle" font-size="11" fill="#9d174d" font-family="system-ui, sans-serif">4. RELEASE</text>

  <!-- Timeline -->
  <rect x="30" y="280" width="840" height="220" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Lock Lifecycle Timeline</text>

  <!-- Timeline bars -->
  <rect x="80" y="330" width="150" height="30" rx="4" fill="#4f46e5" opacity="0.5"/>
  <text x="155" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Acquire (5ms)</text>

  <rect x="240" y="330" width="250" height="30" rx="4" fill="#16a34a" opacity="0.3"/>
  <text x="365" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Hold &amp; Operate (variable)</text>

  <rect x="500" y="330" width="100" height="30" rx="4" fill="#db2777" opacity="0.4"/>
  <text x="550" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Release</text>

  <!-- TTL bar -->
  <rect x="80" y="375" width="520" height="20" rx="4" fill="#d97706" opacity="0.2" stroke="#d97706" stroke-width="1"/>
  <text x="340" y="390" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">TTL Window: 30 seconds (auto-release if client crashes)</text>

  <!-- Competing client -->
  <rect x="80" y="420" width="200" height="60" rx="6" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1"/>
  <text x="180" y="440" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">Client B: WAITING</text>
  <text x="180" y="460" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Blocked until Client A releases</text>
  <text x="180" y="475" text-anchor="middle" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">or TTL expires</text>

  <!-- Key properties -->
  <rect x="310" y="420" width="550" height="60" rx="6" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="325" y="442" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">&#8226; Mutual exclusion: only one client holds the lock at a time</text>
  <text x="325" y="462" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">&#8226; Deadlock freedom: TTL ensures locks are released even if client crashes</text>
  <text x="600" y="442" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">&#8226; Fencing: lock token prevents stale clients from accessing resource</text>
  <text x="600" y="462" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">&#8226; Liveness: waiting clients eventually acquire the lock</text>

  <defs>
    <marker id="purpleArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="pinkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
  </defs>
</svg>