<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>Replication Topologies: Single Leader, Multi-Leader, and Leaderless architectures</title>
  <rect width="900" height="520" fill="#f3f1f8" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="36" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1a1822" text-anchor="middle">Replication Topologies</text>
  
  <!-- ==================== SINGLE LEADER ==================== -->
  <text x="150" y="72" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#4f46e5" text-anchor="middle">Single Leader</text>
  
  <!-- Leader Node -->
  <rect x="80" y="95" width="140" height="50" rx="6" fill="#4f46e5" stroke="#818cf8" stroke-width="1"/>
  <text x="150" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Primary (Leader)</text>
  
  <!-- Arrow to Replica 1 -->
  <line x1="130" y1="145" x2="80" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Arrow to Replica 2 -->
  <line x1="170" y1="145" x2="220" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Replica 1 -->
  <rect x="20" y="210" width="120" height="45" rx="6" fill="#4f46e5" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="80" y="238" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822" text-anchor="middle">Replica 1</text>
  
  <!-- Replica 2 -->
  <rect x="160" y="210" width="120" height="45" rx="6" fill="#4f46e5" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="220" y="238" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822" text-anchor="middle">Replica 2</text>
  
  <!-- Single Leader Notes -->
  <rect x="20" y="280" width="260" height="200" rx="6" fill="#4f46e5" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="35" y="308" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822">Characteristics:</text>
  <text x="35" y="332" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Writes go to primary only</text>
  <text x="35" y="356" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Reads distributed to replicas</text>
  <text x="35" y="380" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Simple conflict resolution</text>
  <text x="35" y="404" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Single point of failure</text>
  <text x="35" y="428" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Used by: MySQL, PostgreSQL</text>
  <text x="35" y="452" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">                  Redis, MongoDB</text>
  
  <!-- ==================== MULTI LEADER ==================== -->
  <text x="450" y="72" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#d97706" text-anchor="middle">Multi-Leader</text>
  
  <!-- Leader A -->
  <rect x="360" y="95" width="140" height="50" rx="6" fill="#d97706" stroke="#92400e" stroke-width="1"/>
  <text x="430" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Leader A</text>
  
  <!-- Leader B -->
  <rect x="560" y="95" width="140" height="50" rx="6" fill="#d97706" stroke="#92400e" stroke-width="1"/>
  <text x="630" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Leader B</text>
  
  <!-- Bidirectional arrow between leaders -->
  <line x1="500" y1="120" x2="560" y2="120" stroke="#92400e" stroke-width="2.5" marker-end="url(#arrowYellow)" marker-start="url(#arrowYellowLeft)"/>
  <text x="530" y="110" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#92400e" text-anchor="middle">sync</text>
  
  <!-- Arrow from Leader A to Replica A1 -->
  <line x1="410" y1="145" x2="370" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Arrow from Leader B to Replica B1 -->
  <line x1="610" y1="145" x2="650" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Replica A1 -->
  <rect x="310" y="210" width="120" height="45" rx="6" fill="#d97706" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="370" y="238" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822" text-anchor="middle">Replica A1</text>
  
  <!-- Replica B1 -->
  <rect x="510" y="210" width="120" height="45" rx="6" fill="#d97706" opacity="0.08" stroke="#475569" stroke-width="1.5"/>
  <text x="570" y="238" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822" text-anchor="middle">Replica B1</text>
  
  <!-- Multi Leader Notes -->
  <rect x="310" y="280" width="280" height="200" rx="6" fill="#d97706" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="325" y="308" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822">Characteristics:</text>
  <text x="325" y="332" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Multiple nodes accept writes</text>
  <text x="325" y="356" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Conflict resolution required</text>
  <text x="325" y="380" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Better fault tolerance</text>
  <text x="325" y="404" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Multi-region writes possible</text>
  <text x="325" y="428" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Used by: CouchDB, Cassandra,</text>
  <text x="325" y="452" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">                  PostgreSQL BDR</text>
  
  <!-- ==================== LEADERLESS ==================== -->
  <text x="750" y="72" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#16a34a" text-anchor="middle">Leaderless</text>
  
  <!-- Node 1 -->
  <rect x="690" y="95" width="120" height="50" rx="6" fill="#16a34a" stroke="#4ade80" stroke-width="1"/>
  <text x="750" y="125" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Node 1</text>
  
  <!-- Node 2 -->
  <rect x="650" y="210" width="120" height="45" rx="6" fill="#16a34a" opacity="0.08" stroke="#4ade80" stroke-width="1.5"/>
  <text x="710" y="238" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822" text-anchor="middle">Node 2</text>
  
  <!-- Node 3 -->
  <rect x="790" y="210" width="120" height="45" rx="6" fill="#16a34a" opacity="0.08" stroke="#4ade80" stroke-width="1.5"/>
  <text x="850" y="238" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822" text-anchor="middle">Node 3</text>
  
  <!-- Connections between nodes (mesh) -->
  <line x1="730" y1="145" x2="690" y2="210" stroke="#4ade80" stroke-width="2"/>
  <line x1="770" y1="145" x2="830" y2="210" stroke="#4ade80" stroke-width="2"/>
  <line x1="770" y1="232" x2="810" y2="232" stroke="#4ade80" stroke-width="2"/>
  
  <!-- Leaderless Notes -->
  <rect x="650" y="280" width="240" height="200" rx="6" fill="#16a34a" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="665" y="308" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822">Characteristics:</text>
  <text x="665" y="332" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Any node accepts reads/writes</text>
  <text x="665" y="356" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Quorum-based consistency</text>
  <text x="665" y="380" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">No single point of failure</text>
  <text x="665" y="404" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Eventual consistency model</text>
  <text x="665" y="428" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Used by: DynamoDB, Riak,</text>
  <text x="665" y="452" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">                  Voldemort, Cassandra</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowYellow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#92400e"/>
    </marker>
    <marker id="arrowYellowLeft" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="180">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#92400e"/>
    </marker>
  </defs>
</svg>