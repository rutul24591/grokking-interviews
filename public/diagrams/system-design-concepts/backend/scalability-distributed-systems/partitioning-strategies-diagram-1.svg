<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Range Partitioning Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Data divided into contiguous key ranges, each assigned to a partition</text>

  <!-- Range bars -->
  <rect x="80" y="90" width="740" height="45" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Key Space: user_id 000000 — 999999</text>
  <text x="450" y="125" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Contiguous range split across partitions</text>

  <!-- Partition A -->
  <rect x="80" y="160" width="220" height="100" rx="8" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="190" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Partition A</text>
  <text x="190" y="205" text-anchor="middle" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">user_id: 000000 – 333333</text>
  <text x="190" y="225" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">333,334 keys</text>
  <text x="190" y="245" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">1.2 GB data</text>

  <!-- Partition B -->
  <rect x="340" y="160" width="220" height="100" rx="8" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Partition B</text>
  <text x="450" y="205" text-anchor="middle" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">user_id: 333334 – 666666</text>
  <text x="450" y="225" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">333,333 keys</text>
  <text x="450" y="245" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">1.1 GB data</text>

  <!-- Partition C -->
  <rect x="600" y="160" width="220" height="100" rx="8" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="710" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Partition C</text>
  <text x="710" y="205" text-anchor="middle" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">user_id: 666667 – 999999</text>
  <text x="710" y="225" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">333,333 keys</text>
  <text x="710" y="245" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">2.8 GB data</text>

  <!-- Hot spot indicator on Partition C -->
  <rect x="600" y="270" width="220" height="55" rx="6" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="710" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">&#9888; Hot Partition</text>
  <text x="710" y="310" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Most new users start with 9xxxxx IDs</text>

  <!-- Range split visualization -->
  <text x="450" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Range Split Operation (when partition grows beyond threshold)</text>

  <rect x="80" y="380" width="350" height="60" rx="6" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="2"/>
  <text x="255" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Partition C before split</text>
  <text x="255" y="420" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">666667 – 999999 (2.8 GB)</text>

  <path d="M 450 410 L 480 410" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#greenArrow)"/>

  <rect x="500" y="380" width="155" height="60" rx="6" fill="#4f46e5" opacity="0.12" stroke="#4f46e5" stroke-width="2"/>
  <text x="577" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Partition C1</text>
  <text x="577" y="420" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">666667 – 833333</text>

  <rect x="665" y="380" width="155" height="60" rx="6" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="2"/>
  <text x="742" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Partition C2</text>
  <text x="742" y="420" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">833334 – 999999</text>

  <rect x="80" y="460" width="740" height="45" rx="6" fill="#4f46e5" opacity="0.08" stroke="#475569" stroke-width="1"/>
  <text x="100" y="478" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">+ Efficient range queries (BETWEEN, &gt;, &lt;)</text>
  <text x="370" y="478" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">&#9888; Hot spots on skewed data distributions</text>
  <text x="620" y="478" font-size="11" fill="#4b5563" font-family="system-ui, sans-serif">&#9888; Requires range splitting when partition grows</text>

  <defs>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
</svg>