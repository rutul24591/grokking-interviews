<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Lamport Timestamps vs Vector Clocks</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Why Lamport timestamps cannot detect concurrent events, and how vector clocks solve this</text>

  <!-- Lamport side -->
  <rect x="30" y="80" width="410" height="210" rx="8" fill="#4f46e5" opacity="0.06" stroke="#4f46e5" stroke-width="2"/>
  <text x="235" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Lamport Timestamps</text>

  <!-- Process A with Lamport -->
  <rect x="60" y="120" width="150" height="140" rx="6" fill="#4f46e5" opacity="0.08"/>
  <text x="135" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Process A</text>
  <circle cx="135" cy="170" r="12" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="135" y="174" text-anchor="middle" font-size="9" fill="#4338ca" font-family="system-ui, sans-serif">a:3</text>
  <circle cx="135" cy="220" r="12" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="135" y="224" text-anchor="middle" font-size="9" fill="#4338ca" font-family="system-ui, sans-serif">c:5</text>
  <path d="M 135 182 L 135 208" fill="none" stroke="#4f46e5" stroke-width="1"/>

  <!-- Process B with Lamport -->
  <rect x="240" y="120" width="150" height="140" rx="6" fill="#16a34a" opacity="0.08"/>
  <text x="315" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Process B</text>
  <circle cx="315" cy="170" r="12" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="315" y="174" text-anchor="middle" font-size="9" fill="#15803d" font-family="system-ui, sans-serif">b:4</text>
  <circle cx="315" cy="220" r="12" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="315" y="224" text-anchor="middle" font-size="9" fill="#15803d" font-family="system-ui, sans-serif">d:7</text>
  <path d="M 315 182 L 315 208" fill="none" stroke="#16a34a" stroke-width="1"/>

  <!-- Message -->
  <path d="M 147 170 L 303 170" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <path d="M 147 220 L 303 220" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>

  <text x="235" y="280" text-anchor="middle" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; a:3 &lt; b:4 but a and b are NOT causally related!</text>
  <text x="235" y="298" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Lamport timestamps cannot detect concurrency</text>

  <!-- Vector clocks side -->
  <rect x="460" y="80" width="410" height="210" rx="8" fill="#16a34a" opacity="0.06" stroke="#16a34a" stroke-width="2"/>
  <text x="665" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Vector Clocks</text>

  <rect x="490" y="120" width="150" height="140" rx="6" fill="#4f46e5" opacity="0.08"/>
  <text x="565" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Process A</text>
  <circle cx="565" cy="170" r="12" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="565" y="174" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">a</text>
  <text x="490" y="174" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[1,0]</text>
  <circle cx="565" cy="220" r="12" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1"/>
  <text x="565" y="224" text-anchor="middle" font-size="8" fill="#4338ca" font-family="system-ui, sans-serif">c</text>
  <text x="490" y="224" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[2,1]</text>
  <path d="M 565 182 L 565 208" fill="none" stroke="#4f46e5" stroke-width="1"/>

  <rect x="670" y="120" width="150" height="140" rx="6" fill="#16a34a" opacity="0.08"/>
  <text x="745" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Process B</text>
  <circle cx="745" cy="170" r="12" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="745" y="174" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">b</text>
  <text x="670" y="174" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[0,1]</text>
  <circle cx="745" cy="220" r="12" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1"/>
  <text x="745" y="224" text-anchor="middle" font-size="8" fill="#15803d" font-family="system-ui, sans-serif">d</text>
  <text x="670" y="224" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">[2,2]</text>
  <path d="M 745 182 L 745 208" fill="none" stroke="#16a34a" stroke-width="1"/>

  <path d="M 577 170 L 733 170" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>
  <path d="M 577 220 L 733 220" fill="none" stroke="#db2777" stroke-width="1.5" marker-end="url(#pinkArrow)"/>

  <text x="665" y="280" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; [1,0] || [0,1] — concurrent detected correctly!</text>
  <text x="665" y="298" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Vector clocks can detect concurrent events</text>

  <!-- Comparison table -->
  <rect x="30" y="320" width="840" height="185" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Lamport Timestamps vs Vector Clocks: Comparison</text>

  <!-- Headers -->
  <text x="150" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Property</text>
  <text x="350" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Lamport</text>
  <text x="550" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Vector Clocks</text>
  <text x="750" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Hybrid Logical Clocks</text>

  <!-- Rows -->
  <text x="50" y="395" font-size="9" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Size:</text>
  <text x="350" y="395" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Single integer</text>
  <text x="550" y="395" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Vector of N integers</text>
  <text x="750" y="395" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Physical time + counter</text>

  <text x="50" y="420" font-size="9" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Detects causality:</text>
  <text x="350" y="420" text-anchor="middle" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">Partial</text>
  <text x="550" y="420" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Full</text>
  <text x="750" y="420" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Full</text>

  <text x="50" y="445" font-size="9" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Detects concurrency:</text>
  <text x="350" y="445" text-anchor="middle" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">No</text>
  <text x="550" y="445" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Yes</text>
  <text x="750" y="445" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Yes</text>

  <text x="50" y="470" font-size="9" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Message overhead:</text>
  <text x="350" y="470" text-anchor="middle" font-size="9" fill="#16a34a" font-family="system-ui, sans-serif">Low (1 int)</text>
  <text x="550" y="470" text-anchor="middle" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">High (N ints)</text>
  <text x="750" y="470" text-anchor="middle" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">Medium (time+counter)</text>

  <text x="50" y="495" font-size="9" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Best for:</text>
  <text x="350" y="495" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Ordering</text>
  <text x="550" y="495" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Conflict detection</text>
  <text x="750" y="495" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">Production systems</text>

  <defs>
    <marker id="pinkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db2777"/>
    </marker>
  </defs>
</svg>