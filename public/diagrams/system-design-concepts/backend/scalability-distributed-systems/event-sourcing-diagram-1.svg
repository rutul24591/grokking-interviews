<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <title>Event store architecture showing append-only log, replay process, and aggregate state reconstruction</title>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Event Store Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Events stored sequentially &amp; aggregates rebuilt by replaying</text>

  <!-- EVENT STORE SECTION -->
  <rect x="30" y="85" width="400" height="400" rx="12" fill="none" stroke="#4f46e5" stroke-width="2"/>
  <rect x="40" y="90" width="180" height="24" rx="4" fill="#4f46e5"/>
  <text x="130" y="107" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Event Store (Append-Only Log)</text>

  <!-- Event entries -->
  <rect x="50" y="130" width="360" height="50" rx="6" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="1"/>
  <text x="65" y="152" font-size="12" font-weight="700" fill="#16a34a">Event #1</text>
  <text x="65" y="170" font-size="11" fill="#1a1822">OrderCreated { orderId: 101, amount: $50 }</text>
  <text x="370" y="152" font-size="10" fill="#64748b">t=0</text>
  <text x="370" y="170" font-size="10" fill="#64748b">seq=1</text>

  <rect x="50" y="190" width="360" height="50" rx="6" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="1"/>
  <text x="65" y="212" font-size="12" font-weight="700" fill="#16a34a">Event #2</text>
  <text x="65" y="230" font-size="11" fill="#1a1822">ItemAdded { orderId: 101, item: "Widget" }</text>
  <text x="370" y="212" font-size="10" fill="#64748b">t=1</text>
  <text x="370" y="230" font-size="10" fill="#64748b">seq=2</text>

  <rect x="50" y="250" width="360" height="50" rx="6" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="1"/>
  <text x="65" y="272" font-size="12" font-weight="700" fill="#16a34a">Event #3</text>
  <text x="65" y="290" font-size="11" fill="#1a1822">ItemAdded { orderId: 101, item: "Gadget" }</text>
  <text x="370" y="272" font-size="10" fill="#64748b">t=2</text>
  <text x="370" y="290" font-size="10" fill="#64748b">seq=3</text>

  <rect x="50" y="310" width="360" height="50" rx="6" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="1"/>
  <text x="65" y="332" font-size="12" font-weight="700" fill="#d97706">Event #4</text>
  <text x="65" y="350" font-size="11" fill="#1a1822">PaymentProcessed { orderId: 101, status: "paid" }</text>
  <text x="370" y="332" font-size="10" fill="#64748b">t=3</text>
  <text x="370" y="350" font-size="10" fill="#64748b">seq=4</text>

  <rect x="50" y="370" width="360" height="50" rx="6" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="1"/>
  <text x="65" y="392" font-size="12" font-weight="700" fill="#2563eb">Event #5</text>
  <text x="65" y="410" font-size="11" fill="#1a1822">OrderShipped { orderId: 101, carrier: "FedEx" }</text>
  <text x="370" y="392" font-size="10" fill="#64748b">t=4</text>
  <text x="370" y="410" font-size="10" fill="#64748b">seq=5</text>

  <!-- ARROW from Event Store to Reconstruction -->
  <line x1="440" y1="280" x2="480" y2="280" stroke="#4f46e5" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- REPLAY PROCESS -->
  <rect x="480" y="220" width="120" height="130" rx="10" fill="#4f46e5" opacity="0.1" stroke="#4f46e5" stroke-width="2"/>
  <text x="540" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">Replay</text>
  <text x="540" y="270" text-anchor="middle" font-size="12" fill="#1a1822">Sequential</text>
  <text x="540" y="290" text-anchor="middle" font-size="12" fill="#1a1822">Event</text>
  <text x="540" y="310" text-anchor="middle" font-size="12" fill="#1a1822">Application</text>
  <text x="540" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#4f46e5">[t=0...t=N]</text>

  <!-- ARROW from Replay to Current State -->
  <line x1="610" y1="280" x2="650" y2="280" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowhead-green)"/>

  <!-- CURRENT STATE / AGGREGATE -->
  <rect x="660" y="130" width="210" height="320" rx="12" fill="none" stroke="#16a34a" stroke-width="2"/>
  <rect x="670" y="135" width="160" height="24" rx="4" fill="#16a34a"/>
  <text x="750" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Aggregate State</text>
  <text x="765" y="175" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">(Rebuilt from Events)</text>

  <!-- State fields -->
  <rect x="680" y="200" width="170" height="36" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="690" y="223" font-size="12" fill="#1a1822">orderId: 101</text>

  <rect x="680" y="245" width="170" height="36" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="690" y="268" font-size="12" fill="#1a1822">items: ["Widget", "Gadget"]</text>

  <rect x="680" y="290" width="170" height="36" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="690" y="313" font-size="12" fill="#1a1822">payment: "paid"</text>

  <rect x="680" y="335" width="170" height="36" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="690" y="358" font-size="12" fill="#1a1822">status: "shipped"</text>

  <rect x="680" y="380" width="170" height="36" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="690" y="403" font-size="12" fill="#1a1822">carrier: "FedEx"</text>

  <!-- Version badge -->
  <rect x="715" y="430" width="100" height="28" rx="14" fill="#16a34a"/>
  <text x="765" y="449" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Version: 5</text>
</svg>