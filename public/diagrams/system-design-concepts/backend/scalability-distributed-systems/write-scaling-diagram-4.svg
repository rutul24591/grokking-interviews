<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="#f3f1f8" font-family="system-ui, sans-serif">

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Write Scaling Strategies Comparison</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" font-weight="400" fill="#4b5563">Throughput vs complexity trade-offs across five strategies</text>

  <!-- Strategy 1: Sharding -->
  <rect x="30" y="80" width="220" height="100" rx="10" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="140" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#4338ca">Sharding</text>
  <text x="45" y="128" font-size="11" font-weight="400" fill="#1a1822">Throughput: Very High</text>
  <text x="45" y="146" font-size="11" font-weight="400" fill="#1a1822">Complexity: High</text>
  <text x="45" y="164" font-size="11" font-weight="400" fill="#1a1822">Consistency: Partitioned</text>
  <rect x="45" y="170" width="190" height="4" rx="2" fill="#4f46e5" fill-opacity="0.3"/>
  <rect x="45" y="170" width="170" height="4" rx="2" fill="#4f46e5"/>

  <!-- Strategy 2: Partitioning -->
  <rect x="290" y="80" width="220" height="100" rx="10" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#1d4ed8">Partitioning</text>
  <text x="305" y="128" font-size="11" font-weight="400" fill="#1a1822">Throughput: High</text>
  <text x="305" y="146" font-size="11" font-weight="400" fill="#1a1822">Complexity: Medium</text>
  <text x="305" y="164" font-size="11" font-weight="400" fill="#1a1822">Consistency: Partition-local</text>
  <rect x="305" y="170" width="190" height="4" rx="2" fill="#2563eb" fill-opacity="0.3"/>
  <rect x="305" y="170" width="145" height="4" rx="2" fill="#2563eb"/>

  <!-- Strategy 3: Batching -->
  <rect x="550" y="80" width="220" height="100" rx="10" fill="#16a34a" fill-opacity="0.15" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#15803d">Batching</text>
  <text x="565" y="128" font-size="11" font-weight="400" fill="#15803d">Throughput: High</text>
  <text x="565" y="146" font-size="11" font-weight="400" fill="#15803d">Complexity: Low-Medium</text>
  <text x="565" y="164" font-size="11" font-weight="400" fill="#15803d">Consistency: Strong (per batch)</text>
  <rect x="565" y="170" width="190" height="4" rx="2" fill="#16a34a" fill-opacity="0.3"/>
  <rect x="565" y="170" width="155" height="4" rx="2" fill="#16a34a"/>

  <!-- Strategy 4: Write Buffering -->
  <rect x="30" y="220" width="220" height="100" rx="10" fill="#d97706" fill-opacity="0.15" stroke="#d97706" stroke-width="2"/>
  <text x="140" y="245" text-anchor="middle" font-size="15" font-weight="700" fill="#fcd34d">Write Buffering</text>
  <text x="45" y="268" font-size="11" font-weight="400" fill="#1a1822">Throughput: Medium-High</text>
  <text x="45" y="286" font-size="11" font-weight="400" fill="#1a1822">Complexity: Medium</text>
  <text x="45" y="304" font-size="11" font-weight="400" fill="#1a1822">Consistency: Eventual</text>
  <rect x="45" y="310" width="190" height="4" rx="2" fill="#d97706" fill-opacity="0.3"/>
  <rect x="45" y="310" width="130" height="4" rx="2" fill="#d97706"/>

  <!-- Strategy 5: CQRS Write-Side -->
  <rect x="290" y="220" width="220" height="100" rx="10" fill="#db2777" fill-opacity="0.15" stroke="#db2777" stroke-width="2"/>
  <text x="400" y="245" text-anchor="middle" font-size="15" font-weight="700" fill="#f9a8d4">CQRS Write-Side</text>
  <text x="305" y="268" font-size="11" font-weight="400" fill="#1a1822">Throughput: High</text>
  <text x="305" y="286" font-size="11" font-weight="400" fill="#1a1822">Complexity: Very High</text>
  <text x="305" y="304" font-size="11" font-weight="400" fill="#1a1822">Consistency: Eventual</text>
  <rect x="305" y="310" width="190" height="4" rx="2" fill="#db2777" fill-opacity="0.3"/>
  <rect x="305" y="310" width="165" height="4" rx="2" fill="#db2777"/>

  <!-- Throughput vs Complexity Matrix -->
  <text x="400" y="365" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1822">Throughput vs Complexity Matrix</text>

  <!-- Y axis label -->
  <text x="60" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#4b5563" transform="rotate(-90, 60, 440)">Throughput</text>

  <!-- X axis label -->
  <text x="430" y="520" text-anchor="middle" font-size="12" font-weight="700" fill="#4b5563">Complexity</text>

  <!-- Axes -->
  <line x1="90" y1="380" x2="90" y2="500" stroke="#374151" stroke-width="1.5"/>
  <line x1="90" y1="500" x2="750" y2="500" stroke="#374151" stroke-width="1.5"/>

  <!-- Grid lines -->
  <line x1="90" y1="440" x2="750" y2="440" stroke="#374151" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="420" y1="380" x2="420" y2="500" stroke="#374151" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Data points -->
  <circle cx="250" cy="395" r="8" fill="#4f46e5" fill-opacity="0.8" stroke="#4f46e5" stroke-width="2"/>
  <text x="250" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#4338ca">Sharding</text>

  <circle cx="320" cy="410" r="8" fill="#2563eb" fill-opacity="0.8" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="400" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">Partitioning</text>

  <circle cx="280" cy="430" r="8" fill="#16a34a" fill-opacity="0.8" stroke="#16a34a" stroke-width="2"/>
  <text x="280" y="455" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">Batching</text>

  <circle cx="370" cy="425" r="8" fill="#d97706" fill-opacity="0.8" stroke="#d97706" stroke-width="2"/>
  <text x="370" y="420" text-anchor="middle" font-size="10" font-weight="700" fill="#fcd34d">Buffering</text>

  <circle cx="530" cy="400" r="8" fill="#db2777" fill-opacity="0.8" stroke="#db2777" stroke-width="2"/>
  <text x="560" y="395" text-anchor="start" font-size="10" font-weight="700" fill="#f9a8d4">CQRS</text>

  <!-- Quadrant labels -->
  <text x="250" y="390" text-anchor="middle" font-size="9" font-weight="400" fill="#374151" opacity="0.6">High T / Med C</text>
  <text x="600" y="395" text-anchor="middle" font-size="9" font-weight="400" fill="#374151" opacity="0.6">High T / High C</text>
  <text x="250" y="495" text-anchor="middle" font-size="9" font-weight="400" fill="#374151" opacity="0.6">Low T / Med C</text>
  <text x="600" y="495" text-anchor="middle" font-size="9" font-weight="400" fill="#374151" opacity="0.6">Low T / High C</text>
</svg>
