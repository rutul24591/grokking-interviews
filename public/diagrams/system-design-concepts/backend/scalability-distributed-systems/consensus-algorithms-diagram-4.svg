<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%">
  <defs>
    <marker id="axis-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1a1822" text-anchor="middle">Consensus Protocol Trade-offs</text>
  <text x="450" y="55" font-family="system-ui, sans-serif" font-size="13" fill="#1a1822" text-anchor="middle">Fault Tolerance vs Throughput positioning</text>

  <!-- Axes -->
  <!-- Y Axis -->
  <line x1="120" y1="90" x2="120" y2="450" stroke="#94a3b8" stroke-width="2" marker-end="url(#axis-arrow)"/>
  <text x="55" y="270" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1822" text-anchor="middle" transform="rotate(-90, 55, 270)">Fault Tolerance</text>

  <!-- X Axis -->
  <line x1="120" y1="450" x2="850" y2="450" stroke="#94a3b8" stroke-width="2" marker-end="url(#axis-arrow)"/>
  <text x="485" y="495" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1a1822" text-anchor="middle">Throughput (ops/sec)</text>

  <!-- Grid Lines -->
  <line x1="120" y1="180" x2="850" y2="180" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="270" x2="850" y2="270" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="120" y1="360" x2="850" y2="360" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>

  <line x1="300" y1="90" x2="300" y2="450" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="485" y1="90" x2="485" y2="450" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="670" y1="90" x2="670" y2="450" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Axis Labels -->
  <text x="70" y="185" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">High</text>
  <text x="70" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Medium</text>
  <text x="70" y="365" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Low</text>

  <text x="300" y="470" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Low</text>
  <text x="485" y="470" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Medium</text>
  <text x="670" y="470" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">High</text>

  <!-- PBFT Point - High fault tolerance, Low throughput -->
  <circle cx="250" cy="150" r="30" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="2"/>
  <text x="250" y="155" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">PBFT</text>

  <!-- PBFT Annotation -->
  <rect x="25" y="60" width="210" height="55" rx="6" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1"/>
  <text x="130" y="78" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#dc2626" text-anchor="middle">Byzantine Fault Tolerant</text>
  <text x="130" y="93" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" text-anchor="middle">Tolerates malicious nodes</text>
  <text x="130" y="107" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" text-anchor="middle">O(n^2) message complexity</text>

  <!-- Paxos Point - Medium fault tolerance, Medium throughput -->
  <circle cx="485" cy="250" r="30" fill="#db2777" opacity="0.2" stroke="#db2777" stroke-width="2"/>
  <text x="485" y="255" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#db2777" text-anchor="middle">Paxos</text>

  <!-- Paxos Annotation -->
  <rect x="395" y="170" width="180" height="55" rx="6" fill="#db2777" opacity="0.1" stroke="#db2777" stroke-width="1"/>
  <text x="485" y="188" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#db2777" text-anchor="middle">Crash Fault Tolerant</text>
  <text x="485" y="203" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" text-anchor="middle">Theoretical optimum</text>
  <text x="485" y="217" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" text-anchor="middle">Complex to implement</text>

  <!-- Raft Point - Medium fault tolerance, High throughput -->
  <circle cx="680" cy="260" r="30" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="2"/>
  <text x="680" y="265" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#4f46e5" text-anchor="middle">Raft</text>

  <!-- Raft Annotation -->
  <rect x="595" y="175" width="200" height="55" rx="6" fill="#4f46e5" opacity="0.1" stroke="#4f46e5" stroke-width="1"/>
  <text x="695" y="193" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#4f46e5" text-anchor="middle">Crash Fault Tolerant</text>
  <text x="695" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" text-anchor="middle">Leader-based, simpler</text>
  <text x="695" y="222" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" text-anchor="middle">Used in etcd, Consul</text>

  <!-- ZooKeeper Zab Point - Medium-high fault tolerance, High throughput -->
  <circle cx="720" cy="180" r="30" fill="#16a34a" opacity="0.2" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="185" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">ZK Zab</text>

  <!-- Zab Annotation -->
  <rect x="730" y="90" width="150" height="55" rx="6" fill="#16a34a" opacity="0.1" stroke="#16a34a" stroke-width="1"/>
  <text x="805" y="108" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#16a34a" text-anchor="middle">ZooKeeper ZAB</text>
  <text x="805" y="123" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" text-anchor="middle">Atomic broadcast</text>
  <text x="805" y="137" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" text-anchor="middle">Production proven</text>

  <!-- Connecting Lines to show trade-off surface -->
  <path d="M 250 150 Q 370 200 485 250" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
  <path d="M 485 250 Q 580 255 680 260" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" fill="none"/>
  <path d="M 680 260 Q 700 220 720 180" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" fill="none"/>

  <!-- Quadrant Labels -->
  <text x="210" y="430" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">Byzantine-safe</text>
  <text x="770" y="430" font-family="system-ui, sans-serif" font-size="10" fill="#4b5563" text-anchor="middle">High-perf CFT</text>

  <!-- Key Insight Box -->
  <rect x="140" y="355" width="520" height="70" rx="8" fill="#4b5563" opacity="0.08" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="375" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#1a1822" text-anchor="middle">Trade-off Insight</text>
  <text x="400" y="393" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">PBFT handles Byzantine faults but sacrifices throughput (O(n^2) messages). Raft/Paxos handle crash faults with O(n) messages.</text>
  <text x="400" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822" text-anchor="middle">Zab optimizes for ordered broadcast, trading generality for throughput in practice.</text>
</svg>