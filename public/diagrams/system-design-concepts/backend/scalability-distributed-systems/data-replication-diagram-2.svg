<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Sync vs Async Replication Flow</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">Timing and acknowledgment differences between synchronous and asynchronous replication</text>

  <!-- Top half: Synchronous -->
  <text x="225" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#4f46e5" font-family="system-ui, sans-serif">Synchronous Replication</text>
  <rect x="30" y="115" width="390" height="200" rx="8" fill="#4f46e5" opacity="0.06" stroke="#4f46e5" stroke-width="1.5"/>

  <!-- Client -->
  <rect x="50" y="130" width="100" height="40" rx="6" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="100" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Client</text>

  <!-- Primary -->
  <rect x="200" y="130" width="100" height="40" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="250" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Primary</text>

  <!-- Replica -->
  <rect x="350" y="130" width="60" height="40" rx="6" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica</text>

  <!-- Timeline arrows -->
  <path d="M 100 170 L 100 210" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#blueArrow)"/>
  <text x="115" y="195" font-size="9" fill="#1d4ed8" font-family="system-ui, sans-serif">Write</text>

  <path d="M 250 170 L 250 210" fill="none" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#purpleArrow)"/>
  <text x="265" y="195" font-size="9" fill="#4338ca" font-family="system-ui, sans-serif">Apply + WAL</text>

  <path d="M 250 210 L 380 210" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#amberArrow)"/>
  <text x="315" y="205" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">Replicate</text>

  <path d="M 380 210 L 380 240" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#greenArrow)"/>
  <text x="395" y="230" font-size="9" fill="#15803d" font-family="system-ui, sans-serif">Apply</text>

  <path d="M 380 240 L 250 240" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#greenArrow)"/>
  <text x="315" y="255" font-size="9" fill="#15803d" font-family="system-ui, sans-serif">ACK</text>

  <path d="M 250 240 L 100 240" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#blueArrow)"/>
  <text x="165" y="255" font-size="9" fill="#1d4ed8" font-family="system-ui, sans-serif">ACK to client</text>

  <text x="50" y="295" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Strong consistency — no data loss on failover</text>
  <text x="50" y="315" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Higher latency — waits for replica ACK</text>

  <!-- Bottom half: Asynchronous -->
  <text x="675" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#16a34a" font-family="system-ui, sans-serif">Asynchronous Replication</text>
  <rect x="480" y="115" width="390" height="200" rx="8" fill="#16a34a" opacity="0.06" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Client -->
  <rect x="500" y="130" width="100" height="40" rx="6" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="1.5"/>
  <text x="550" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Client</text>

  <!-- Primary -->
  <rect x="650" y="130" width="100" height="40" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="700" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Primary</text>

  <!-- Replica -->
  <rect x="800" y="130" width="60" height="40" rx="6" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="830" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica</text>

  <!-- Timeline arrows -->
  <path d="M 550 170 L 550 210" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#blueArrow)"/>
  <text x="565" y="195" font-size="9" fill="#1d4ed8" font-family="system-ui, sans-serif">Write</text>

  <path d="M 700 170 L 700 210" fill="none" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#purpleArrow)"/>
  <text x="715" y="195" font-size="9" fill="#4338ca" font-family="system-ui, sans-serif">Apply + WAL</text>

  <path d="M 700 210 L 550 210" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#blueArrow)"/>
  <text x="615" y="225" font-size="9" fill="#1d4ed8" font-family="system-ui, sans-serif">ACK to client (immediate)</text>

  <!-- Async replication happens later -->
  <path d="M 700 240 L 830 240" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#amberArrow)"/>
  <text x="765" y="235" font-size="9" fill="#92400e" font-family="system-ui, sans-serif">Async replicate (later)</text>

  <path d="M 830 240 L 830 270" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#greenArrow)"/>
  <text x="845" y="260" font-size="9" fill="#15803d" font-family="system-ui, sans-serif">Apply</text>

  <text x="500" y="295" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">&#9989; Lower latency — ACK after primary apply</text>
  <text x="500" y="315" font-size="10" fill="#dc2626" font-family="system-ui, sans-serif">&#9888; Data loss possible on primary failover</text>

  <!-- Latency comparison bar chart -->
  <rect x="30" y="350" width="840" height="155" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Write Latency Comparison</text>

  <!-- Sync bar -->
  <text x="100" y="400" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">Sync:</text>
  <rect x="160" y="390" width="250" height="20" rx="3" fill="#4f46e5" opacity="0.6"/>
  <text x="420" y="405" font-size="10" fill="#4338ca" font-family="system-ui, sans-serif">~15ms (primary + network + replica ACK)</text>

  <!-- Async bar -->
  <text x="100" y="430" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">Async:</text>
  <rect x="160" y="420" width="100" height="20" rx="3" fill="#16a34a" opacity="0.6"/>
  <text x="270" y="435" font-size="10" fill="#15803d" font-family="system-ui, sans-serif">~5ms (primary only)</text>

  <!-- Semi-sync bar -->
  <text x="100" y="460" font-size="11" fill="#1a1822" font-family="system-ui, sans-serif">Semi-Sync:</text>
  <rect x="160" y="450" width="150" height="20" rx="3" fill="#d97706" opacity="0.6"/>
  <text x="320" y="465" font-size="10" fill="#92400e" font-family="system-ui, sans-serif">~8ms (primary + network receipt)</text>

  <!-- Summary -->
  <text x="500" y="400" font-size="11" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Decision Guide:</text>
  <text x="500" y="422" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; Sync: Financial data, zero data loss tolerance</text>
  <text x="500" y="442" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; Semi-Sync: Most production workloads (balanced)</text>
  <text x="500" y="462" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; Async: Read replicas, analytics, non-critical data</text>
  <text x="500" y="482" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">&#8226; Async + anti-entropy: Eventual consistency acceptable</text>

  <defs>
    <marker id="blueArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="purpleArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="amberArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
</svg>