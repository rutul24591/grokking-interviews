<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <rect width="900" height="520" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Replication Lag and Stale Read Scenarios</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#4b5563" font-family="system-ui, sans-serif">How replication lag causes stale reads and strategies to mitigate them</text>

  <!-- Timeline -->
  <line x1="60" y1="100" x2="840" y2="100" stroke="#475569" stroke-width="1.5"/>
  <text x="845" y="105" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">time</text>

  <!-- Event 1: Write on Primary -->
  <rect x="100" y="75" width="120" height="50" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="160" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">T1: Write X=5</text>
  <text x="160" y="110" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">on Primary</text>
  <path d="M 160 125 L 160 160" fill="none" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#purpleArrow)"/>

  <!-- Primary state -->
  <rect x="80" y="160" width="160" height="50" rx="6" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="2"/>
  <text x="160" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Primary: X = 5</text>
  <text x="160" y="200" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Immediate</text>

  <!-- Replication delay gap -->
  <rect x="260" y="160" width="200" height="50" rx="6" fill="#d97706" opacity="0.1" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="360" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Replication Lag Window</text>
  <text x="360" y="200" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">50-500ms depending on distance</text>

  <!-- Event 2: Stale read from replica -->
  <path d="M 300 125 L 300 160" fill="none" stroke="#dc2626" stroke-width="1.5" marker-end="url(#redArrow)"/>
  <rect x="240" y="75" width="120" height="50" rx="6" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="2"/>
  <text x="300" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b" font-family="system-ui, sans-serif">T2: Read X</text>
  <text x="300" y="110" text-anchor="middle" font-size="9" fill="#dc2626" font-family="system-ui, sans-serif">stale read!</text>

  <!-- Replica state during lag -->
  <rect x="260" y="230" width="200" height="50" rx="6" fill="#d97706" opacity="0.12" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Replica: X = 3 (stale)</text>
  <text x="360" y="270" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Has not received replication yet</text>

  <!-- Event 3: Replication arrives -->
  <path d="M 480 125 L 480 160" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#greenArrow)"/>
  <rect x="420" y="75" width="140" height="50" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="2"/>
  <text x="490" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">T3: Replication</text>
  <text x="490" y="110" text-anchor="middle" font-size="9" fill="#4b5563" font-family="system-ui, sans-serif">arrives at replica</text>

  <!-- Replica state after replication -->
  <rect x="480" y="230" width="200" height="50" rx="6" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1.5"/>
  <text x="580" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Replica: X = 5 (current)</text>
  <text x="580" y="270" text-anchor="middle" font-size="10" fill="#16a34a" font-family="system-ui, sans-serif">Caught up with primary</text>

  <!-- Mitigation strategies -->
  <rect x="30" y="310" width="840" height="195" rx="8" fill="#4f46e5" opacity="0.04" stroke="#475569" stroke-width="1"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822" font-family="system-ui, sans-serif">Stale Read Mitigation Strategies</text>

  <!-- Strategy boxes -->
  <rect x="50" y="350" width="250" height="60" rx="6" fill="#4f46e5" opacity="0.08" stroke="#4f46e5" stroke-width="1"/>
  <text x="175" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca" font-family="system-ui, sans-serif">Read from Primary</text>
  <text x="175" y="390" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Always current but increases primary load</text>
  <text x="175" y="408" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Latency: +0ms (no lag)</text>

  <rect x="325" y="350" width="250" height="60" rx="6" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d" font-family="system-ui, sans-serif">Read-Your-Writes</text>
  <text x="450" y="390" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Route user&apos;s reads to caught-up replicas</text>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Balances load, avoids stale reads for own writes</text>

  <rect x="600" y="350" width="250" height="60" rx="6" fill="#d97706" opacity="0.08" stroke="#d97706" stroke-width="1"/>
  <text x="725" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e" font-family="system-ui, sans-serif">Monotonic Reads</text>
  <text x="725" y="390" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">User always reads from same or newer replica</text>
  <text x="725" y="408" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Prevents going backward in time</text>

  <rect x="50" y="425" width="250" height="60" rx="6" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="1"/>
  <text x="175" y="445" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8" font-family="system-ui, sans-serif">Lag-Aware Routing</text>
  <text x="175" y="465" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Only route to replicas within lag threshold</text>
  <text x="175" y="483" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Fallback to primary if all replicas lagging</text>

  <rect x="325" y="425" width="250" height="60" rx="6" fill="#db2777" opacity="0.08" stroke="#db2777" stroke-width="1"/>
  <text x="450" y="445" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d" font-family="system-ui, sans-serif">Optimistic UI</text>
  <text x="450" y="465" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Show write result immediately, reconcile later</text>
  <text x="450" y="483" text-anchor="middle" font-size="10" fill="#4b5563" font-family="system-ui, sans-serif">Best UX, requires idempotent operations</text>

  <defs>
    <marker id="purpleArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="redArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
</svg>