<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>Write Conflict Resolution in Multi-Leader Replication showing conflict scenarios and resolution strategies</title>
  <rect width="900" height="520" fill="#f3f1f8" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="36" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1a1822" text-anchor="middle">Write Conflict Resolution in Multi-Leader</text>
  
  <!-- ==================== CONFLICT SCENARIO ==================== -->
  <text x="450" y="78" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#dc2626" text-anchor="middle">Conflict Scenario: Simultaneous Writes</text>
  
  <!-- Client A -->
  <rect x="30" y="110" width="100" height="40" rx="6" fill="#2563eb" stroke="#60a5fa" stroke-width="1"/>
  <text x="80" y="135" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Client A</text>
  
  <!-- Client B -->
  <rect x="30" y="200" width="100" height="40" rx="6" fill="#2563eb" stroke="#60a5fa" stroke-width="1"/>
  <text x="80" y="225" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Client B</text>
  
  <!-- Arrow from Client A to Leader A -->
  <line x1="130" y1="130" x2="250" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="190" y="120" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#1a1822" text-anchor="middle">write X=5</text>
  
  <!-- Arrow from Client B to Leader B -->
  <line x1="130" y1="220" x2="250" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="190" y="210" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#1a1822" text-anchor="middle">write X=3</text>
  
  <!-- Leader A -->
  <rect x="250" y="105" width="140" height="50" rx="6" fill="#d97706" stroke="#92400e" stroke-width="1"/>
  <text x="320" y="135" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Leader A</text>
  <text x="320" y="175" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#92400e" text-anchor="middle">X = 5 (t1)</text>
  
  <!-- Leader B -->
  <rect x="250" y="195" width="140" height="50" rx="6" fill="#d97706" stroke="#92400e" stroke-width="1"/>
  <text x="320" y="225" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Leader B</text>
  <text x="320" y="265" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#92400e" text-anchor="middle">X = 3 (t1)</text>
  
  <!-- Conflict indicator -->
  <text x="450" y="175" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#dc2626" text-anchor="middle">CONFLICT</text>
  <text x="450" y="195" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b" text-anchor="middle">Both leaders wrote to X</text>
  <text x="450" y="210" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b" text-anchor="middle">at the same time</text>
  
  <!-- Sync arrow between leaders -->
  <line x1="390" y1="140" x2="390" y2="195" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="400" y1="195" x2="400" y2="140" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  
  <!-- ==================== RESOLUTION STRATEGIES ==================== -->
  <text x="450" y="295" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#4f46e5" text-anchor="middle">Resolution Strategies</text>
  
  <!-- Strategy 1: Last-Writer-Wins -->
  <rect x="30" y="320" width="270" height="170" rx="8" fill="#16a34a" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="165" y="348" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#16a34a" text-anchor="middle">Last-Writer-Wins (LWW)</text>
  <text x="45" y="378" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Uses timestamps to pick winner</text>
  <text x="45" y="402" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Leader B wrote at t2 &gt; t1</text>
  <text x="45" y="426" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Final value: X = 3</text>
  
  <!-- LWW Timeline -->
  <line x1="50" y1="460" x2="280" y2="460" stroke="#475569" stroke-width="2"/>
  <circle cx="100" cy="460" r="5" fill="#4f46e5"/>
  <text x="100" y="480" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#1a1822" text-anchor="middle">t1: X=5</text>
  <circle cx="230" cy="460" r="5" fill="#16a34a"/>
  <text x="230" y="480" font-family="system-ui, sans-serif" font-size="10" font-weight="normal" fill="#1a1822" text-anchor="middle">t2: X=3 (winner)</text>
  
  <!-- Strategy 2: Custom Merge -->
  <rect x="315" y="320" width="270" height="170" rx="8" fill="#d97706" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="450" y="348" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#d97706" text-anchor="middle">Custom Merge Function</text>
  <text x="330" y="378" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Application-defined merge logic</text>
  <text x="330" y="402" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">e.g., Union sets, merge lists</text>
  <text x="330" y="426" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Final value: X = merge(5, 3)</text>
  
  <!-- Merge visual -->
  <rect x="340" y="440" width="60" height="30" rx="4" fill="#4f46e5" stroke="#818cf8" stroke-width="1"/>
  <text x="370" y="460" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">X=5</text>
  <text x="415" y="460" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#d97706" text-anchor="middle">+</text>
  <rect x="460" y="440" width="60" height="30" rx="4" fill="#d97706" stroke="#92400e" stroke-width="1"/>
  <text x="490" y="460" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">X=3</text>
  <text x="545" y="460" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#64748b" text-anchor="middle">&#x2192;</text>
  <rect x="555" y="440" width="30" height="30" rx="4" fill="#16a34a" stroke="#4ade80" stroke-width="1"/>
  <text x="570" y="460" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">?</text>
  
  <!-- Strategy 3: CRDT -->
  <rect x="600" y="320" width="270" height="170" rx="8" fill="#2563eb" opacity="0.06" stroke="#475569" stroke-width="1"/>
  <text x="735" y="348" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#2563eb" text-anchor="middle">CRDT (Conflict-free)</text>
  <text x="615" y="378" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Mathematical guarantees</text>
  <text x="615" y="402" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">Converges without coordination</text>
  <text x="615" y="426" font-family="system-ui, sans-serif" font-size="11" font-weight="normal" fill="#64748b">G-Counter, PN-Counter, LWW-Set</text>
  
  <!-- CRDT visual -->
  <rect x="620" y="445" width="70" height="35" rx="4" fill="#4f46e5" stroke="#818cf8" stroke-width="1"/>
  <text x="655" y="467" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Op: +5</text>
  <text x="710" y="467" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">,</text>
  <rect x="740" y="445" width="70" height="35" rx="4" fill="#d97706" stroke="#92400e" stroke-width="1"/>
  <text x="775" y="467" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Op: +3</text>
  <text x="830" y="467" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#64748b" text-anchor="middle">&#x2192;</text>
  <rect x="840" y="445" width="30" height="35" rx="4" fill="#16a34a" stroke="#4ade80" stroke-width="1"/>
  <text x="855" y="467" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">8</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>