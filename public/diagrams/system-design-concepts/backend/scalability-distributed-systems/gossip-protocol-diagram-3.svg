  <rect x="160" y="290" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="240" y="290" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="320" y="290" width="80" height="40" rx="4" fill="#16a34a" fill-opacity="0.3" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="400" y="290" width="80" height="40" rx="4" fill="#16a34a" fill-opacity="0.3" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="480" y="290" width="80" height="40" rx="4" fill="#16a34a" fill-opacity="0.3" stroke="#16a34a" stroke-width="1.5"/>
