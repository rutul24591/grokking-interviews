  <text x="180" y="82" text-anchor="middle" font-size="11" fill="#64748b">R1</text>
  <text x="260" y="82" text-anchor="middle" font-size="11" fill="#64748b">R2</text>
  <text x="340" y="82" text-anchor="middle" font-size="11" fill="#64748b">R3</text>
  <text x="420" y="82" text-anchor="middle" font-size="11" fill="#64748b">R4</text>
  <text x="500" y="82" text-anchor="middle" font-size="11" fill="#64748b">R5</text>
  <text x="580" y="82" text-anchor="middle" font-size="11" fill="#64748b">R6</text>

  <!-- Grid lines -->
