  <rect x="160" y="210" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="240" y="210" width="80" height="40" rx="4" fill="#2563eb" fill-opacity="0.3" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="320" y="210" width="80" height="40" rx="4" fill="#2563eb" fill-opacity="0.3" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="400" y="210" width="80" height="40" rx="4" fill="#2563eb" fill-opacity="0.3" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="480" y="210" width="80" height="40" rx="4" fill="#2563eb" fill-opacity="0.3" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="560" y="210" width="60" height="40" rx="4" fill="#2563eb" fill-opacity="0.3" stroke="#2563eb" stroke-width="1.5"/>

