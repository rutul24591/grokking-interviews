  <rect x="240" y="330" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="320" y="330" width="80" height="40" rx="4" fill="#16a34a" fill-opacity="0.3" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="400" y="330" width="80" height="40" rx="4" fill="#16a34a" fill-opacity="0.3" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="480" y="330" width="80" height="40" rx="4" fill="#16a34a" fill-opacity="0.3" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="560" y="330" width="60" height="40" rx="4" fill="#16a34a" fill-opacity="0.3" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Row 7: informed R4 -->
  <rect x="80" y="370" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="160" y="370" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="240" y="370" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="320" y="370" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="400" y="370" width="80" height="40" rx="4" fill="#d97706" fill-opacity="0.3" stroke="#d97706" stroke-width="1.5"/>
  <rect x="480" y="370" width="80" height="40" rx="4" fill="#d97706" fill-opacity="0.3" stroke="#d97706" stroke-width="1.5"/>
  <rect x="560" y="370" width="60" height="40" rx="4" fill="#d97706" fill-opacity="0.3" stroke="#d97706" stroke-width="1.5"/>

  <!-- Row 8: informed R4 -->
  <rect x="80" y="410" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="160" y="410" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="240" y="410" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="320" y="410" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="400" y="410" width="80" height="40" rx="4" fill="#d97706" fill-opacity="0.3" stroke="#d97706" stroke-width="1.5"/>
  <rect x="480" y="410" width="80" height="40" rx="4" fill="#d97706" fill-opacity="0.3" stroke="#d97706" stroke-width="1.5"/>
  <rect x="560" y="410" width="60" height="40" rx="4" fill="#d97706" fill-opacity="0.3" stroke="#d97706" stroke-width="1.5"/>

  <!-- Row 9: informed R5 (last) -->
  <rect x="80" y="450" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="160" y="450" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="240" y="450" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="320" y="450" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="400" y="450" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="480" y="450" width="80" height="40" rx="4" fill="#dc2626" fill-opacity="0.3" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="560" y="450" width="60" height="40" rx="4" fill="#dc2626" fill-opacity="0.3" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Informed count per round -->
