  <text x="200" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#db2777">3</text>
  <text x="280" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">5</text>
  <text x="360" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">7</text>
  <text x="440" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#d97706">9</text>
  <text x="520" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">10</text>
  <text x="590" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#dc2626">10</text>

  <!-- Legend -->
  <rect x="640" y="120" width="140" height="100" rx="6" fill="#4f46e5" fill-opacity="0.05" stroke="#4f46e5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="650" y="142" font-size="12" font-weight="bold" fill="#1a1822">Legend</text>
  <rect x="650" y="152" width="14" height="14" rx="3" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <text x="672" y="164" font-size="11" fill="#4b5563">Uninformed</text>
  <rect x="650" y="172" width="14" height="14" rx="3" fill="#4f46e5" fill-opacity="0.3" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="672" y="184" font-size="11" fill="#4b5563">Informed</text>
  <text x="650" y="205" font-size="10" fill="#64748b">Convergence:</text>
  <text x="650" y="218" font-size="10" fill="#64748b">~ln(10) approx 5 rounds</text>

  <!-- Convergence line annotation -->
  <text x="520" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">All nodes</text>
  <text x="520" y="456" text-anchor="middle" font-size="12" font-weight="bold" fill="#16a34a">converged</text>
