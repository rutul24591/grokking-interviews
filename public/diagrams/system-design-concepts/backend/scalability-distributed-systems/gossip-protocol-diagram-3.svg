<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%" font-family="system-ui, sans-serif">
  <title>Convergence Timeline - 10-Node Cluster</title>
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#f3f1f8" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Convergence Timeline -- 10-Node Cluster</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#4b5563">Information spreads logarithmically: ~ln(N) rounds for all nodes to converge</text>

  <!-- Y axis: Nodes -->
  <text x="60" y="100" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 0</text>
  <text x="60" y="140" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 1</text>
  <text x="60" y="180" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 2</text>
  <text x="60" y="220" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 3</text>
  <text x="60" y="260" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 4</text>
  <text x="60" y="300" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 5</text>
  <text x="60" y="340" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 6</text>
  <text x="60" y="380" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 7</text>
  <text x="60" y="420" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 8</text>
  <text x="60" y="460" text-anchor="end" font-size="12" font-weight="bold" fill="#1a1822">Node 9</text>

  <!-- X axis: Rounds -->
