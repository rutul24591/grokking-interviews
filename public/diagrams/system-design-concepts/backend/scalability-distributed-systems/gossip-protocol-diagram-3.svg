  <rect x="160" y="90" width="80" height="40" rx="4" fill="#4f46e5" fill-opacity="0.3" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="240" y="90" width="80" height="40" rx="4" fill="#4f46e5" fill-opacity="0.3" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="320" y="90" width="80" height="40" rx="4" fill="#4f46e5" fill-opacity="0.3" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="400" y="90" width="80" height="40" rx="4" fill="#4f46e5" fill-opacity="0.3" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="480" y="90" width="80" height="40" rx="4" fill="#4f46e5" fill-opacity="0.3" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="560" y="90" width="60" height="40" rx="4" fill="#4f46e5" fill-opacity="0.3" stroke="#4f46e5" stroke-width="1.5"/>

  <!-- Row 1: informed R1 -->
  <rect x="80" y="130" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="160" y="130" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="240" y="130" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="320" y="130" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="400" y="130" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="480" y="130" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="560" y="130" width="60" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>

  <!-- Row 2: informed R1 -->
  <rect x="80" y="170" width="80" height="40" rx="4" fill="#4b5563" fill-opacity="0.1" stroke="#94a3b8" stroke-width="1"/>
  <rect x="160" y="170" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="240" y="170" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="320" y="170" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="400" y="170" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="480" y="170" width="80" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>
  <rect x="560" y="170" width="60" height="40" rx="4" fill="#db2777" fill-opacity="0.3" stroke="#db2777" stroke-width="1.5"/>

