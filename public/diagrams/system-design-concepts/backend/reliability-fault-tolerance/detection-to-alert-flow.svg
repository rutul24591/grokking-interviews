<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cc4444"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Detection to Alert Flow</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#555">End-to-end pipeline from raw system data to incident resolution</text>

  <!-- Step 1: Data Collection -->
  <rect x="30" y="120" width="110" height="80" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="85" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Data</text>
  <text x="85" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Collection</text>
  <text x="85" y="185" text-anchor="middle" font-size="9" fill="#666">Logs, metrics,</text>
  <text x="85" y="197" text-anchor="middle" font-size="9" fill="#666">traces, events</text>

  <!-- Arrow -->
  <line x1="140" y1="160" x2="185" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Step 2: Pattern Analysis -->
  <rect x="185" y="120" width="110" height="80" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="240" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Pattern</text>
  <text x="240" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Analysis</text>
  <text x="240" y="185" text-anchor="middle" font-size="9" fill="#666">Correlate signals,</text>
  <text x="240" y="197" text-anchor="middle" font-size="9" fill="#666">find anomalies</text>

  <!-- Arrow -->
  <line x1="295" y1="160" x2="340" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Step 3: Anomaly Detection -->
  <rect x="340" y="120" width="110" height="80" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="395" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Anomaly</text>
  <text x="395" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Detection</text>
  <text x="395" y="185" text-anchor="middle" font-size="9" fill="#666">Threshold breach,</text>
  <text x="395" y="197" text-anchor="middle" font-size="9" fill="#666">ML outlier</text>

  <!-- Arrow -->
  <line x1="450" y1="160" x2="495" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Step 4: Alert Generation -->
  <rect x="495" y="120" width="110" height="80" rx="8" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="550" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0ad4e">Alert</text>
  <text x="550" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0ad4e">Generation</text>
  <text x="550" y="185" text-anchor="middle" font-size="9" fill="#666">Create alert,</text>
  <text x="550" y="197" text-anchor="middle" font-size="9" fill="#666">set severity</text>

  <!-- Arrow down -->
  <line x1="550" y1="200" x2="550" y2="245" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Step 5: On-call Notification -->
  <rect x="495" y="245" width="110" height="80" rx="8" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="550" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0ad4e">On-call</text>
  <text x="550" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0ad4e">Notification</text>
  <text x="550" y="310" text-anchor="middle" font-size="9" fill="#666">PagerDuty,</text>
  <text x="550" y="322" text-anchor="middle" font-size="9" fill="#666">Slack, email</text>

  <!-- Arrow -->
  <line x1="605" y1="285" x2="650" y2="285" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Step 6: Incident Creation -->
  <rect x="650" y="245" width="110" height="80" rx="8" fill="#fff" stroke="#cc4444" stroke-width="2"/>
  <text x="705" y="275" text-anchor="middle" font-size="11" font-weight="bold" fill="#cc4444">Incident</text>
  <text x="705" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#cc4444">Creation</text>
  <text x="705" y="310" text-anchor="middle" font-size="9" fill="#666">Ticket, runbook,</text>
  <text x="705" y="322" text-anchor="middle" font-size="9" fill="#666">assign owner</text>

  <!-- Arrow down -->
  <line x1="705" y1="325" x2="705" y2="370" stroke="#cc4444" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Step 7: Resolution -->
  <rect x="650" y="370" width="110" height="80" rx="8" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <text x="705" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Resolution</text>
  <text x="705" y="420" text-anchor="middle" font-size="9" fill="#666">Debug, fix,</text>
  <text x="705" y="432" text-anchor="middle" font-size="9" fill="#666">verify, close</text>
  <text x="705" y="445" text-anchor="middle" font-size="9" fill="#666">post-mortem</text>

  <!-- Arrow left from resolution -->
  <line x1="650" y1="410" x2="470" y2="410" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-purple)" stroke-dasharray="6,4"/>
  <text x="560" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="#4caf50">Feedback loop</text>

  <!-- Feedback arrow to collection -->
  <line x1="470" y1="410" x2="470" y2="200" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-purple)" stroke-dasharray="6,4"/>
  <line x1="470" y1="200" x2="140" y2="200" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-purple)" stroke-dasharray="6,4"/>
  <text x="305" y="215" text-anchor="middle" font-size="10" font-weight="bold" fill="#4caf50">Learned patterns</text>
</svg>
