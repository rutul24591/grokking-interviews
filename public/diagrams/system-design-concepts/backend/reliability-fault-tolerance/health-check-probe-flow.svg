<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cc4444"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Health Check Probe Flow</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#555">Kubernetes probe execution flow from kubelet to service routing update</text>

  <!-- Kubelet -->
  <rect x="350" y="100" width="200" height="60" rx="10" fill="#6d5bd0"/>
  <text x="450" y="125" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Kubelet</text>
  <text x="450" y="145" text-anchor="middle" font-size="11" fill="#e0d8f0">Runs probes on schedule</text>

  <!-- Arrow down -->
  <line x1="450" y1="160" x2="450" y2="195" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Probe Types -->
  <rect x="300" y="195" width="300" height="70" rx="10" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">HTTP GET / TCP Exec / Command</text>
  <text x="450" y="240" text-anchor="middle" font-size="11" fill="#444">HTTP: GET /healthz | TCP: port 8080 | Exec: cat /tmp/ready</text>
  <text x="450" y="256" text-anchor="middle" font-size="10" fill="#666">Probe type configured in pod spec</text>

  <!-- Arrow down -->
  <line x1="450" y1="265" x2="450" y2="295" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Container Response -->
  <rect x="300" y="295" width="300" height="60" rx="10" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0ad4e">Container Response</text>
  <text x="450" y="340" text-anchor="middle" font-size="11" fill="#444">200 OK = ready | Non-200 or timeout = not-ready</text>

  <!-- Two paths -->
  <!-- Success path -->
  <line x1="350" y1="355" x2="200" y2="355" stroke="#4caf50" stroke-width="2"/>
  <line x1="200" y1="355" x2="200" y2="390" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="270" y="348" font-size="10" font-weight="bold" fill="#4caf50">200 OK</text>

  <!-- Failure path -->
  <line x1="550" y1="355" x2="700" y2="355" stroke="#cc4444" stroke-width="2"/>
  <line x1="700" y1="355" x2="700" y2="390" stroke="#cc4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="620" y="348" font-size="10" font-weight="bold" fill="#cc4444">Non-200 / Timeout</text>

  <!-- Mark as Ready -->
  <rect x="80" y="390" width="240" height="80" rx="10" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <text x="200" y="418" text-anchor="middle" font-size="14" font-weight="bold" fill="#4caf50">Mark as Ready</text>
  <text x="200" y="438" text-anchor="middle" font-size="11" fill="#444">Pod marked Ready</text>
  <text x="200" y="456" text-anchor="middle" font-size="11" fill="#444">Continues receiving traffic</text>

  <!-- Mark as Not-Ready -->
  <rect x="580" y="390" width="240" height="80" rx="10" fill="#fff" stroke="#cc4444" stroke-width="2"/>
  <text x="700" y="418" text-anchor="middle" font-size="14" font-weight="bold" fill="#cc4444">Mark as Not-Ready</text>
  <text x="700" y="438" text-anchor="middle" font-size="11" fill="#444">Pod marked Not-Ready</text>
  <text x="700" y="456" text-anchor="middle" font-size="11" fill="#444">Removed from service endpoints</text>

  <!-- Bottom section: Endpoint Controller -->
  <rect x="300" y="390" width="300" height="80" rx="10" fill="#fff" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="450" y="418" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Endpoint Controller</text>
  <text x="450" y="438" text-anchor="middle" font-size="11" fill="#444">Watches pod readiness changes</text>
  <text x="450" y="456" text-anchor="middle" font-size="11" fill="#444">Updates Endpoints/EndpointSlice objects</text>

  <!-- Arrows from endpoint controller to routing -->
  <line x1="450" y1="470" x2="450" y2="490" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="450" y="498" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Service routing updated</text>
</svg>
