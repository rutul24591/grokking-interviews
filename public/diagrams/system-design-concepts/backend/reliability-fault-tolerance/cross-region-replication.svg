<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Cross-Region Data Replication</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6d5bd0">Asynchronous replication from primary to secondary regions with lag monitoring and conflict resolution</text>

  <defs>
    <marker id="cr-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="cr-arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="cr-arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0ad4e"/>
    </marker>
  </defs>

  <!-- Region A: Primary -->
  <rect x="40" y="90" width="280" height="240" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="40" y="90" width="280" height="36" rx="10" fill="#4caf50"/>
  <rect x="40" y="115" width="280" height="8" fill="#4caf50"/>
  <text x="180" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Region A: Primary (us-east-1)</text>

  <!-- Writes go here -->
  <rect x="60" y="140" width="240" height="30" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="180" y="160" text-anchor="middle" font-size="11" fill="#cc4444" font-weight="600">All writes land here first</text>

  <rect x="60" y="180" width="240" height="30" rx="6" fill="#4caf50"/>
  <text x="180" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Primary Database</text>

  <rect x="60" y="220" width="240" height="30" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="180" y="240" text-anchor="middle" font-size="11" fill="#1a1822">App servers serving reads locally</text>

  <!-- Lag monitor -->
  <rect x="60" y="260" width="240" height="55" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="180" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Replication Lag Monitor</text>
  <text x="180" y="298" text-anchor="middle" font-size="10" fill="#1a1822">Lag: 50ms (RPO: ~100ms)</text>
  <text x="180" y="312" text-anchor="middle" font-size="9" fill="#f0ad4e">Alerts if lag > 500ms</text>

  <!-- Replication arrows to Region B -->
  <line x1="320" y1="200" x2="440" y2="200" stroke="#6d5bd0" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#cr-arrow)"/>
  <text x="380" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Async replication</text>
  <text x="380" y="205" text-anchor="middle" font-size="9" fill="#f0ad4e">~50ms lag</text>

  <!-- Replication arrow to Region C -->
  <line x1="320" y1="220" x2="660" y2="280" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#cr-arrow)"/>
  <text x="510" y="240" font-size="9" fill="#6d5bd0">Async (higher lag)</text>

  <!-- Region B: Secondary -->
  <rect x="440" y="130" width="220" height="160" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="440" y="130" width="220" height="36" rx="10" fill="#6d5bd0"/>
  <rect x="440" y="155" width="220" height="8" fill="#6d5bd0"/>
  <text x="550" y="154" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Region B: Secondary</text>
  <text x="550" y="178" text-anchor="middle" font-size="10" fill="#f3f1f8">(eu-west-1)</text>

  <rect x="455" y="190" width="190" height="30" rx="6" fill="#6d5bd0"/>
  <text x="550" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Read Replica DB</text>

  <rect x="455" y="230" width="190" height="30" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="550" y="250" text-anchor="middle" font-size="11" fill="#1a1822">App servers (read-only)</text>

  <rect x="455" y="265" width="190" height="20" rx="4" fill="#f0ad4e" opacity="0.15"/>
  <text x="550" y="279" text-anchor="middle" font-size="9" fill="#f0ad4e">Can serve reads, not writes</text>

  <!-- Conflict Resolution Box -->
  <rect x="440" y="310" width="430" height="145" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="440" y="310" width="430" height="36" rx="10" fill="#f0ad4e"/>
  <rect x="440" y="335" width="430" height="8" fill="#f0ad4e"/>
  <text x="655" y="334" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Conflict Resolution (Multi-Writer)</text>

  <rect x="460" y="360" width="120" height="75" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="520" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Last-Write-Wins</text>
  <text x="520" y="400" text-anchor="middle" font-size="9" fill="#1a1822">Simple, may lose data</text>
  <text x="520" y="415" text-anchor="middle" font-size="9" fill="#1a1822">Based on timestamps</text>
  <text x="520" y="430" text-anchor="middle" font-size="9" fill="#cc4444">Risk: clock skew</text>

  <rect x="595" y="360" width="120" height="75" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="655" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Version Vectors</text>
  <text x="655" y="400" text-anchor="middle" font-size="9" fill="#1a1822">Track causal order</text>
  <text x="655" y="415" text-anchor="middle" font-size="9" fill="#1a1822">Detect conflicts</text>
  <text x="655" y="430" text-anchor="middle" font-size="9" fill="#4caf50">No data loss</text>

  <rect x="730" y="360" width="120" height="75" rx="8" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="790" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">CRDTs</text>
  <text x="790" y="400" text-anchor="middle" font-size="9" fill="#1a1822">Mathematically</text>
  <text x="790" y="415" text-anchor="middle" font-size="9" fill="#1a1822">guaranteed converge</text>
  <text x="790" y="430" text-anchor="middle" font-size="9" fill="#4caf50">Best for collab</text>

  <!-- Region C: Tertiary -->
  <rect x="680" y="230" width="190" height="130" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="680" y="230" width="190" height="36" rx="10" fill="#d7d1e6"/>
  <rect x="680" y="255" width="190" height="8" fill="#d7d1e6"/>
  <text x="775" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Region C: Tertiary</text>
  <text x="775" y="278" text-anchor="middle" font-size="10" fill="#6d5bd0">(ap-southeast-1)</text>

  <rect x="695" y="290" width="160" height="30" rx="6" fill="#d7d1e6" stroke="#6d5bd0" stroke-width="1"/>
  <text x="775" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Read Replica DB</text>

  <rect x="695" y="328" width="160" height="22" rx="4" fill="#f0ad4e" opacity="0.15"/>
  <text x="775" y="343" text-anchor="middle" font-size="9" fill="#f0ad4e">Higher lag: ~200ms</text>

  <!-- Read routing -->
  <rect x="40" y="370" width="380" height="80" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="230" y="395" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Read Routing</text>
  <text x="230" y="415" text-anchor="middle" font-size="10" fill="#1a1822">Region A users read from Region A DB (fresh)</text>
  <text x="230" y="430" text-anchor="middle" font-size="10" fill="#1a1822">Region B users read from Region B replica (slightly stale)</text>
  <text x="230" y="445" text-anchor="middle" font-size="10" fill="#f0ad4e">Writes always route to primary Region A</text>
</svg>
