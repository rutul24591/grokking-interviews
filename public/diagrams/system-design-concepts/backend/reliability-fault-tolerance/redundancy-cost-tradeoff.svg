<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Redundancy Cost vs. Reliability Trade-off</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6d5bd0">Reliability increases with redundancy but cost grows with diminishing returns</text>

  <defs>
    <marker id="rc-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Chart area -->
  <rect x="80" y="80" width="720" height="340" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="35" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822" transform="rotate(-90, 35, 250)">Reliability (nines)</text>

  <!-- Y-axis ticks -->
  <text x="70" y="400" text-anchor="end" font-size="9" fill="#1a1822">99%</text>
  <text x="70" y="350" text-anchor="end" font-size="9" fill="#1a1822">99.9%</text>
  <text x="70" y="290" text-anchor="end" font-size="9" fill="#1a1822">99.99%</text>
  <text x="70" y="230" text-anchor="end" font-size="9" fill="#1a1822">99.999%</text>
  <text x="70" y="170" text-anchor="end" font-size="9" fill="#1a1822">99.9999%</text>
  <text x="70" y="110" text-anchor="end" font-size="9" fill="#1a1822">99.99999%</text>

  <!-- X-axis label -->
  <text x="440" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Cost (relative)</text>

  <!-- Grid lines -->
  <line x1="80" y1="400" x2="800" y2="400" stroke="#d7d1e6" stroke-width="1"/>
  <line x1="80" y1="350" x2="800" y2="350" stroke="#d7d1e6" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="80" y1="290" x2="800" y2="290" stroke="#d7d1e6" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="80" y1="230" x2="800" y2="230" stroke="#d7d1e6" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="80" y1="170" x2="800" y2="170" stroke="#d7d1e6" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="80" y1="110" x2="800" y2="110" stroke="#d7d1e6" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Reliability curve (smooth, steepening then flattening) -->
  <!-- Single node -> N+1 -> N+2 -> Multi-AZ -> Multi-region -> 2N+1 -->
  <path d="M140,400 Q200,395 260,365 T380,290 T500,230 T620,180 T740,155" fill="none" stroke="#6d5bd0" stroke-width="3" marker-end="url(#rc-arrow)"/>

  <!-- Shaded area under curve -->
  <path d="M140,400 Q200,395 260,365 T380,290 T500,230 T620,180 T740,155 L740,400 Z" fill="#6d5bd0" opacity="0.05"/>

  <!-- Data points -->
  <!-- Single Node -->
  <circle cx="140" cy="400" r="6" fill="#cc4444" stroke="#ffffff" stroke-width="2"/>
  <rect x="90" y="410" width="100" height="45" rx="6" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="140" y="428" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Single Node</text>
  <text x="140" y="442" text-anchor="middle" font-size="8" fill="#1a1822">Cost: 1x</text>
  <text x="140" y="452" text-anchor="middle" font-size="8" fill="#1a1822">~99% (72h downtime/yr)</text>

  <!-- N+1 -->
  <circle cx="260" cy="365" r="6" fill="#f0ad4e" stroke="#ffffff" stroke-width="2"/>
  <rect x="220" y="375" width="85" height="45" rx="6" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="262" y="393" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">N+1</text>
  <text x="262" y="407" text-anchor="middle" font-size="8" fill="#1a1822">Cost: 1.2x</text>
  <text x="262" y="417" text-anchor="middle" font-size="8" fill="#1a1822">~99.9% (8.7h/yr)</text>

  <!-- N+2 -->
  <circle cx="380" cy="290" r="6" fill="#f0ad4e" stroke="#ffffff" stroke-width="2"/>
  <rect x="345" y="300" width="75" height="45" rx="6" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="382" y="318" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">N+2</text>
  <text x="382" y="332" text-anchor="middle" font-size="8" fill="#1a1822">Cost: 1.4x</text>
  <text x="382" y="342" text-anchor="middle" font-size="8" fill="#1a1822">~99.95% (4.3h/yr)</text>

  <!-- Multi-AZ -->
  <circle cx="500" cy="230" r="6" fill="#6d5bd0" stroke="#ffffff" stroke-width="2"/>
  <rect x="465" y="240" width="75" height="45" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="502" y="258" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Multi-AZ</text>
  <text x="502" y="272" text-anchor="middle" font-size="8" fill="#1a1822">Cost: 2-2.5x</text>
  <text x="502" y="282" text-anchor="middle" font-size="8" fill="#1a1822">~99.99% (52m/yr)</text>

  <!-- Multi-region -->
  <circle cx="620" cy="180" r="6" fill="#6d5bd0" stroke="#ffffff" stroke-width="2"/>
  <rect x="585" y="190" width="85" height="45" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="627" y="208" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Multi-Region</text>
  <text x="627" y="222" text-anchor="middle" font-size="8" fill="#1a1822">Cost: 3x</text>
  <text x="627" y="232" text-anchor="middle" font-size="8" fill="#1a1822">~99.999% (5m/yr)</text>

  <!-- Diminishing returns zone -->
  <rect x="680" y="100" width="170" height="80" rx="8" fill="#cc4444" opacity="0.06" stroke="#cc4444" stroke-width="1.5"/>
  <text x="765" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#cc4444">Diminishing Returns</text>
  <text x="765" y="140" text-anchor="middle" font-size="9" fill="#1a1822">Cost rises exponentially</text>
  <text x="765" y="155" text-anchor="middle" font-size="9" fill="#1a1822">Reliability gain is marginal</text>
  <text x="765" y="170" text-anchor="middle" font-size="9" fill="#cc4444">Beyond business need</text>

  <!-- Optimal zone -->
  <rect x="440" y="100" width="150" height="65" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="2"/>
  <text x="515" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#4caf50">Sweet Spot</text>
  <text x="515" y="140" text-anchor="middle" font-size="9" fill="#1a1822">Match redundancy to</text>
  <text x="515" y="155" text-anchor="middle" font-size="9" fill="#1a1822">business availability target</text>

  <!-- Cost curve (steeper exponential) -->
  <path d="M140,400 Q200,398 260,390 T380,370 T500,330 T620,260 T740,160" fill="none" stroke="#cc4444" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="750" y="150" font-size="9" fill="#cc4444">Cost curve</text>

  <!-- Key insight -->
  <rect x="80" y="455" width="740" height="28" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="473" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Key insight: Each additional nine of availability costs exponentially more. Design for your actual SLO, not theoretical maximum.</text>
</svg>
