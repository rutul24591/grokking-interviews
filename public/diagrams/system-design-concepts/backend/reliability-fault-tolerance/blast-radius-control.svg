<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Blast radius control in chaos engineering</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Blast Radius Control</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Controlled failure injection with monitoring, auto-stop, and safe rollback</text>

  <defs>
    <marker id="arrowPbr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowRbr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
    <marker id="arrowGbr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrowObr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0ad4e"/>
    </marker>
  </defs>

  <!-- User traffic pool -->
  <rect x="30" y="100" width="160" height="80" rx="12" fill="#6d5bd0"/>
  <text x="110" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">User Traffic</text>
  <text x="110" y="150" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">10,000 req/s total</text>
  <text x="110" y="165" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">All user requests</text>

  <!-- Traffic split arrow -->
  <line x1="190" y1="140" x2="260" y2="140" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPbr)"/>
  <text x="225" y="130" text-anchor="middle" font-size="9" fill="#6d5bd0" font-weight="600">99% safe</text>

  <!-- Safe traffic (99%) -->
  <rect x="265" y="100" width="140" height="80" rx="12" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="2"/>
  <text x="335" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#4caf50">99% Traffic</text>
  <text x="335" y="150" text-anchor="middle" font-size="10" fill="#1a1822">Normal path</text>
  <text x="335" y="165" text-anchor="middle" font-size="10" fill="#1a1822">No failure injected</text>
  <text x="335" y="177" text-anchor="middle" font-size="10" fill="#4caf50" font-weight="600">Serving normally</text>

  <!-- Experiment traffic (1%) -->
  <line x1="190" y1="160" x2="260" y2="230" stroke="#cc4444" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowRbr)"/>
  <text x="210" y="210" font-size="9" fill="#cc4444" font-weight="600">1% blast</text>

  <rect x="265" y="230" width="140" height="80" rx="12" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="335" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#cc4444">1% Traffic</text>
  <text x="335" y="280" text-anchor="middle" font-size="10" fill="#1a1822">Experiment group</text>
  <text x="335" y="295" text-anchor="middle" font-size="10" fill="#1a1822">Failure injected</text>

  <!-- Chaos tool -->
  <rect x="450" y="230" width="170" height="80" rx="12" fill="#cc4444"/>
  <text x="535" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Chaos Tool</text>
  <text x="535" y="280" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">Injects failure:</text>
  <text x="535" y="295" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">latency, crash, partition</text>
  <line x1="405" y1="270" x2="445" y2="270" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowRbr)"/>
  <text x="425" y="260" text-anchor="middle" font-size="9" fill="#cc4444" font-weight="600">Inject</text>

  <!-- Monitoring -->
  <rect x="670" y="100" width="200" height="140" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="670" y="100" width="200" height="28" rx="12" fill="#f0ad4e"/>
  <rect x="670" y="120" width="200" height="8" fill="#f0ad4e"/>
  <text x="770" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Monitoring &amp; Alerts</text>
  <text x="770" y="150" text-anchor="middle" font-size="10" fill="#1a1822">Error rate (experiment vs baseline)</text>
  <text x="770" y="168" text-anchor="middle" font-size="10" fill="#1a1822">p95 / p99 latency comparison</text>
  <text x="770" y="186" text-anchor="middle" font-size="10" fill="#1a1822">Saturation signals (CPU, memory)</text>
  <text x="770" y="204" text-anchor="middle" font-size="10" fill="#1a1822">User-facing impact detection</text>
  <text x="770" y="225" text-anchor="middle" font-size="9" fill="#f0ad4e" font-weight="600">Compare experiment vs control</text>
  <line x1="405" y1="140" x2="665" y2="140" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="630" y1="270" x2="665" y2="190" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Decision: Blast too large? -->
  <polygon points="770,310 850,340 770,370 690,340" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="770" y="335" text-anchor="middle" font-size="9" font-weight="700" fill="#cc4444">Blast too</text>
  <text x="770" y="348" text-anchor="middle" font-size="9" font-weight="700" fill="#cc4444">large?</text>
  <line x1="770" y1="240" x2="770" y2="305" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowRbr)"/>
  <text x="785" y="275" font-size="8" fill="#cc4444" font-weight="600">Check</text>

  <!-- Yes: Auto-stop -->
  <rect x="560" y="360" width="150" height="60" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="635" y="383" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">Auto-Stop</text>
  <text x="635" y="403" text-anchor="middle" font-size="9" fill="#1a1822">Kill experiment,</text>
  <text x="635" y="416" text-anchor="middle" font-size="9" fill="#1a1822">restore normal</text>
  <line x1="690" y1="340" x2="710" y2="380" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrowRbr)"/>
  <text x="695" y="355" font-size="8" fill="#cc4444" font-weight="700">Yes</text>

  <!-- No: Continue -->
  <rect x="770" y="420" width="150" height="60" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="2"/>
  <text x="845" y="443" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Continue</text>
  <text x="845" y="463" text-anchor="middle" font-size="9" fill="#1a1822">Collect data, finish</text>
  <text x="845" y="476" text-anchor="middle" font-size="9" fill="#1a1822">experiment window</text>
  <line x1="770" y1="370" x2="790" y2="415" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrowGbr)"/>
  <text x="785" y="398" font-size="8" fill="#4caf50" font-weight="700">No</text>

  <!-- Rollback annotation -->
  <rect x="30" y="360" width="480" height="120" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="270" y="385" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Blast Radius Controls</text>
  <text x="270" y="405" text-anchor="middle" font-size="9" fill="#1a1822">Traffic percentage (1-5%): Limits how many users experience the injected failure.</text>
  <text x="270" y="422" text-anchor="middle" font-size="9" fill="#1a1822">Time window: Experiments run for a bounded duration, typically 5-30 minutes.</text>
  <text x="270" y="439" text-anchor="middle" font-size="9" fill="#1a1822">Scope: Single instance, single AZ, or single service -- never region-wide for early experiments.</text>
  <text x="270" y="456" text-anchor="middle" font-size="9" fill="#1a1822">Kill switch: Manual or automatic stop if any SLO breach is detected during the experiment.</text>
  <text x="270" y="473" text-anchor="middle" font-size="9" fill="#1a1822">Safe rollback: If the experiment reveals a weakness, the fix is deployed before expanding scope.</text>
</svg>