<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Chaos engineering process flywheel</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Chaos Engineering Process Flywheel</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Continuous improvement loop: hypothesize, experiment, learn, repeat</text>

  <defs>
    <marker id="arrowPce" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Center: Continuous Improvement -->
  <circle cx="450" cy="260" r="60" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="2"/>
  <circle cx="450" cy="260" r="45" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Continuous</text>
  <text x="450" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Improvement</text>
  <text x="450" y="286" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Flywheel</text>

  <!-- Stage 1: Hypothesis (top) -->
  <rect x="370" y="90" width="160" height="70" rx="12" fill="#6d5bd0"/>
  <text x="450" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1. Hypothesis</text>
  <text x="450" y="138" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">&quot;If cache node fails,</text>
  <text x="450" y="150" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">p99 stays within SLO&quot;</text>
  <line x1="450" y1="160" x2="450" y2="195" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPce)"/>

  <!-- Stage 2: Design Experiment (top-right) -->
  <rect x="620" y="130" width="160" height="70" rx="12" fill="#f0ad4e"/>
  <text x="700" y="158" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2. Design Experiment</text>
  <text x="700" y="178" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">Define blast radius,</text>
  <text x="700" y="190" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">guardrails, metrics</text>
  <line x1="530" y1="145" x2="615" y2="155" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowPce)"/>

  <!-- Stage 3: Run in Production (right) -->
  <rect x="710" y="230" width="160" height="70" rx="12" fill="#cc4444"/>
  <text x="790" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3. Run in Production</text>
  <text x="790" y="278" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">Inject fault on 1%</text>
  <text x="790" y="290" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">of traffic, observe</text>
  <line x1="700" y1="200" x2="720" y2="225" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowPce)"/>

  <!-- Stage 4: Monitor Blast Radius (bottom-right) -->
  <rect x="620" y="360" width="160" height="70" rx="12" fill="#f0ad4e"/>
  <text x="700" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4. Monitor Blast</text>
  <text x="700" y="408" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">Watch SLOs, error rates,</text>
  <text x="700" y="420" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">latency percentiles</text>
  <line x1="790" y1="300" x2="750" y2="355" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowPce)"/>

  <!-- Stage 5: Learn and Improve (bottom) -->
  <rect x="370" y="400" width="160" height="70" rx="12" fill="#4caf50"/>
  <text x="450" y="428" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">5. Learn &amp; Improve</text>
  <text x="450" y="448" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">Fix gaps, update runbooks,</text>
  <text x="450" y="460" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">add to backlog</text>
  <line x1="620" y1="395" x2="535" y2="420" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowPce)"/>

  <!-- Stage 6: Repeat (bottom-left) -->
  <rect x="120" y="360" width="160" height="70" rx="12" fill="#6d5bd0"/>
  <text x="200" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">6. Repeat</text>
  <text x="200" y="408" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">New hypothesis,</text>
  <text x="200" y="420" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">broader scope</text>
  <line x1="370" y1="435" x2="285" y2="410" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPce)"/>

  <!-- Back to top-left: arrow to top -->
  <rect x="30" y="230" width="160" height="70" rx="12" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="2"/>
  <text x="110" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Resilience</text>
  <text x="110" y="275" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Increases</text>
  <text x="110" y="292" text-anchor="middle" font-size="9" fill="#1a1822">Each cycle makes</text>
  <text x="110" y="304" text-anchor="middle" font-size="9" fill="#1a1822">the system stronger</text>
  <line x1="200" y1="355" x2="140" y2="300" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="110" y1="225" x2="110" y2="165" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="110" y1="165" x2="200" y2="165" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrowPce)"/>

  <!-- Arrow from repeat to resilience -->
  <line x1="120" y1="395" x2="115" y2="330" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>