<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#cc4444"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#f0ad4e"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#4caf50"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#2d2d2d">Data Integrity Enforcement Layers</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">Write request flows through multiple integrity layers with escalating scope</text>

  <!-- Flow arrow from top -->
  <text x="450" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Write Request</text>
  <line x1="450" y1="94" x2="450" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 1: Operational -->
  <rect x="30" y="120" width="840" height="105" rx="12" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="30" y="120" width="180" height="105" rx="12" fill="#f0ad4e" opacity="0.1"/>
  <text x="120" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0ad4e">OPERATIONAL LAYER</text>
  <text x="120" y="163" text-anchor="middle" font-size="11" fill="#666">Continuous monitoring &amp; repair</text>

  <!-- Operational boxes -->
  <rect x="230" y="135" width="190" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="325" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d2d2d">Reconciliation Jobs</text>
  <text x="325" y="176" text-anchor="middle" font-size="11" fill="#555">Compare source vs derived data</text>
  <text x="325" y="192" text-anchor="middle" font-size="11" fill="#555">Detect &amp; auto-correct drift</text>

  <rect x="440" y="135" width="190" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="535" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d2d2d">Anomaly Detection</text>
  <text x="535" y="176" text-anchor="middle" font-size="11" fill="#555">Statistical outlier analysis</text>
  <text x="535" y="192" text-anchor="middle" font-size="11" fill="#555">Pattern-based fraud detection</text>

  <rect x="650" y="135" width="190" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="745" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d2d2d">Alerting Pipeline</text>
  <text x="745" y="176" text-anchor="middle" font-size="11" fill="#555">PagerDuty, Slack notifications</text>
  <text x="745" y="192" text-anchor="middle" font-size="11" fill="#555">Runbook-triggered escalation</text>

  <!-- Arrow down -->
  <line x1="450" y1="225" x2="450" y2="250" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: Application -->
  <rect x="30" y="255" width="840" height="105" rx="12" fill="#fff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="255" width="180" height="105" rx="12" fill="#cc4444" opacity="0.1"/>
  <text x="120" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#cc4444">APPLICATION LAYER</text>
  <text x="120" y="298" text-anchor="middle" font-size="11" fill="#666">Per-request validation</text>

  <!-- Application boxes -->
  <rect x="230" y="270" width="190" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="325" y="293" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d2d2d">Input Validation</text>
  <text x="325" y="311" text-anchor="middle" font-size="11" fill="#555">Schema validation (JSON Schema)</text>
  <text x="325" y="327" text-anchor="middle" font-size="11" fill="#555">Business rule checks</text>

  <rect x="440" y="270" width="190" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="535" y="293" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d2d2d">Idempotency Keys</text>
  <text x="535" y="311" text-anchor="middle" font-size="11" fill="#555">Prevent duplicate mutations</text>
  <text x="535" y="327" text-anchor="middle" font-size="11" fill="#555">Retry-safe request handling</text>

  <rect x="650" y="270" width="190" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="745" y="293" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d2d2d">State Machines</text>
  <text x="745" y="311" text-anchor="middle" font-size="11" fill="#555">Valid transition enforcement</text>
  <text x="745" y="327" text-anchor="middle" font-size="11" fill="#555">Saga orchestration / choreography</text>

  <!-- Arrow down -->
  <line x1="450" y1="360" x2="450" y2="385" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3: Database -->
  <rect x="30" y="390" width="840" height="105" rx="12" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="390" width="180" height="105" rx="12" fill="#4caf50" opacity="0.1"/>
  <text x="120" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#4caf50">DATABASE LAYER</text>
  <text x="120" y="433" text-anchor="middle" font-size="11" fill="#666">Hard constraints &amp; guarantees</text>

  <!-- Database boxes -->
  <rect x="230" y="405" width="190" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="325" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d2d2d">Unique Constraints</text>
  <text x="325" y="446" text-anchor="middle" font-size="11" fill="#555">Primary keys, unique indexes</text>
  <text x="325" y="462" text-anchor="middle" font-size="11" fill="#555">Partial unique indexes</text>

  <rect x="440" y="405" width="190" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="535" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d2d2d">Foreign Keys</text>
  <text x="535" y="446" text-anchor="middle" font-size="11" fill="#555">Referential integrity enforcement</text>
  <text x="535" y="462" text-anchor="middle" font-size="11" fill="#555">CASCADE, RESTRICT, SET NULL</text>

  <rect x="650" y="405" width="190" height="75" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="745" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#2d2d2d">Check Constraints</text>
  <text x="745" y="446" text-anchor="middle" font-size="11" fill="#555">Value range validation</text>
  <text x="745" y="462" text-anchor="middle" font-size="11" fill="#555">Cross-field invariants</text>

  <!-- Legend -->
  <rect x="30" y="4" width="12" height="12" rx="3" fill="#4caf50"/>
  <text x="48" y="14" font-size="11" fill="#555">Database (hard)</text>
  <rect x="120" y="4" width="12" height="12" rx="3" fill="#cc4444"/>
  <text x="138" y="14" font-size="11" fill="#555">Application (per-request)</text>
  <rect x="230" y="4" width="12" height="12" rx="3" fill="#f0ad4e"/>
  <text x="248" y="14" font-size="11" fill="#555">Operational (continuous)</text>
</svg>
