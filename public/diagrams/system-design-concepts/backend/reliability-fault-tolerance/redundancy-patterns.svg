<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Redundancy Patterns Comparison</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6d5bd0">N+1, N+2, 2N, and 2N+1 patterns with availability, cost, and complexity</text>

  <defs>
    <marker id="rp-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- N+1 Column -->
  <rect x="30" y="85" width="210" height="380" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="30" y="85" width="210" height="38" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="110" width="210" height="8" fill="#6d5bd0"/>
  <text x="135" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">N+1</text>
  <text x="135" y="138" text-anchor="middle" font-size="10" fill="#6d5bd0">One spare instance</text>

  <!-- Instance boxes -->
  <rect x="50" y="155" width="170" height="30" rx="6" fill="#4caf50"/>
  <text x="135" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Instance 1 (active)</text>
  <rect x="50" y="190" width="170" height="30" rx="6" fill="#4caf50"/>
  <text x="135" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Instance 2 (active)</text>
  <rect x="50" y="225" width="170" height="30" rx="6" fill="#4caf50"/>
  <text x="135" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Instance 3 (active)</text>
  <rect x="50" y="260" width="170" height="30" rx="6" fill="#f0ad4e" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="135" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Instance 4 (spare)</text>

  <!-- Loss scenario -->
  <rect x="50" y="310" width="170" height="50" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="135" y="330" text-anchor="middle" font-size="9" fill="#1a1822">Lose 1 instance, 3 remain</text>
  <text x="135" y="346" text-anchor="middle" font-size="9" fill="#4caf50">Full capacity preserved</text>

  <!-- Metrics -->
  <rect x="40" y="380" width="190" height="75" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="135" y="400" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Characteristics</text>
  <text x="55" y="418" font-size="9" fill="#4caf50">Availability: ~99.9%</text>
  <text x="55" y="433" font-size="9" fill="#4caf50">Cost: +1 instance overhead</text>
  <text x="55" y="448" font-size="9" fill="#4caf50">Complexity: Lowest</text>

  <!-- N+2 Column -->
  <rect x="255" y="85" width="210" height="380" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="255" y="85" width="210" height="38" rx="10" fill="#6d5bd0"/>
  <rect x="255" y="110" width="210" height="8" fill="#6d5bd0"/>
  <text x="360" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">N+2</text>
  <text x="360" y="138" text-anchor="middle" font-size="10" fill="#6d5bd0">Two spare instances</text>

  <rect x="275" y="155" width="170" height="30" rx="6" fill="#4caf50"/>
  <text x="360" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Instance 1 (active)</text>
  <rect x="275" y="190" width="170" height="30" rx="6" fill="#4caf50"/>
  <text x="360" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Instance 2 (active)</text>
  <rect x="275" y="225" width="170" height="30" rx="6" fill="#4caf50"/>
  <text x="360" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Instance 3 (active)</text>
  <rect x="275" y="260" width="170" height="30" rx="6" fill="#f0ad4e" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="360" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Instance 4 (spare)</text>
  <rect x="275" y="295" width="170" height="30" rx="6" fill="#f0ad4e" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="360" y="315" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Instance 5 (spare)</text>

  <!-- Loss scenario -->
  <rect x="275" y="340" width="170" height="50" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="360" y="360" text-anchor="middle" font-size="9" fill="#1a1822">Lose 2 instances, 3 remain</text>
  <text x="360" y="376" text-anchor="middle" font-size="9" fill="#4caf50">Protects against correlated failure</text>

  <!-- Metrics -->
  <rect x="265" y="400" width="190" height="55" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="360" y="420" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Characteristics</text>
  <text x="280" y="438" font-size="9" fill="#4caf50">Availability: ~99.95%</text>
  <text x="280" y="450" font-size="9" fill="#f0ad4e">Cost: +2 instances overhead</text>

  <!-- 2N Column -->
  <rect x="480" y="85" width="210" height="380" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="480" y="85" width="210" height="38" rx="10" fill="#f0ad4e"/>
  <rect x="480" y="110" width="210" height="8" fill="#f0ad4e"/>
  <text x="585" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2N (Fully Duplicated)</text>
  <text x="585" y="138" text-anchor="middle" font-size="10" fill="#f0ad4e">Full mirrored system</text>

  <!-- Side A -->
  <rect x="500" y="155" width="170" height="30" rx="6" fill="#4caf50"/>
  <text x="585" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Side A: Instance 1</text>
  <rect x="500" y="190" width="170" height="30" rx="6" fill="#4caf50"/>
  <text x="585" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Side A: Instance 2</text>
  <rect x="500" y="225" width="170" height="30" rx="6" fill="#4caf50"/>
  <text x="585" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Side A: Instance 3</text>

  <!-- Divider -->
  <line x1="585" y1="265" x2="585" y2="280" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="585" y="278" text-anchor="middle" font-size="8" fill="#6d5bd0">Mirror</text>

  <!-- Side B -->
  <rect x="500" y="285" width="170" height="30" rx="6" fill="#4caf50" opacity="0.85"/>
  <text x="585" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Side B: Instance 1</text>
  <rect x="500" y="320" width="170" height="30" rx="6" fill="#4caf50" opacity="0.85"/>
  <text x="585" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Side B: Instance 2</text>
  <rect x="500" y="355" width="170" height="30" rx="6" fill="#4caf50" opacity="0.85"/>
  <text x="585" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Side B: Instance 3</text>

  <!-- Metrics -->
  <rect x="490" y="400" width="190" height="55" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="585" y="420" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Characteristics</text>
  <text x="505" y="438" font-size="9" fill="#4caf50">Availability: ~99.99%</text>
  <text x="505" y="450" font-size="9" fill="#cc4444">Cost: 2x infra (expensive)</text>

  <!-- 2N+1 Column -->
  <rect x="705" y="85" width="170" height="380" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="705" y="85" width="170" height="38" rx="10" fill="#cc4444"/>
  <rect x="705" y="110" width="170" height="8" fill="#cc4444"/>
  <text x="790" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2N+1</text>
  <text x="790" y="138" text-anchor="middle" font-size="10" fill="#cc4444">Duplicated + spare</text>

  <rect x="720" y="155" width="140" height="28" rx="6" fill="#4caf50"/>
  <text x="790" y="173" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Side A: 3 instances</text>
  <rect x="720" y="190" width="140" height="28" rx="6" fill="#4caf50" opacity="0.85"/>
  <text x="790" y="208" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Side B: 3 instances</text>
  <rect x="720" y="225" width="140" height="28" rx="6" fill="#f0ad4e" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="790" y="243" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Spare: +1 instance</text>

  <rect x="720" y="270" width="140" height="50" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="790" y="290" text-anchor="middle" font-size="9" fill="#1a1822">Lose entire side + 1 more</text>
  <text x="790" y="306" text-anchor="middle" font-size="9" fill="#4caf50">Maximum fault tolerance</text>

  <!-- Metrics -->
  <rect x="715" y="340" width="150" height="100" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="790" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Characteristics</text>
  <text x="725" y="380" font-size="9" fill="#4caf50">Availability: ~99.999%</text>
  <text x="725" y="395" font-size="9" fill="#cc4444">Cost: 2x + 1 (highest)</text>
  <text x="725" y="410" font-size="9" fill="#cc4444">Complexity: Highest</text>
  <text x="725" y="425" font-size="9" fill="#6d5bd0">Mission-critical only</text>

  <!-- Bottom summary bar -->
  <rect x="30" y="472" width="840" height="20" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="135" y="486" text-anchor="middle" font-size="9" fill="#1a1822" font-weight="600">N+1: Baseline</text>
  <text x="360" y="486" text-anchor="middle" font-size="9" fill="#1a1822" font-weight="600">N+2: Correlated failure protection</text>
  <text x="585" y="486" text-anchor="middle" font-size="9" fill="#1a1822" font-weight="600">2N: Full mirror</text>
  <text x="790" y="486" text-anchor="middle" font-size="9" fill="#1a1822" font-weight="600">2N+1: Maximum</text>
</svg>
