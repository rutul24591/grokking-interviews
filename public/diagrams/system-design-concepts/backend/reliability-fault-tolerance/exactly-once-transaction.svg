<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Exactly-once transactional flow with Kafka-style transactions</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Exactly-Once Transactional Flow</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Atomic read-process-write with rollback on failure</text>

  <defs>
    <marker id="arrowP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
    <marker id="arrowO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0ad4e"/>
    </marker>
  </defs>

  <!-- Transaction boundary -->
  <rect x="280" y="80" width="340" height="310" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="450" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Atomic Transaction Boundary</text>

  <!-- Step 1: Read Message -->
  <rect x="310" y="115" width="280" height="55" rx="8" fill="#6d5bd0"/>
  <text x="450" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Step 1: Read Message</text>
  <text x="450" y="156" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">Consume from Kafka with offset tracking</text>

  <!-- Arrow down -->
  <line x1="450" y1="170" x2="450" y2="195" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 2: Process -->
  <rect x="310" y="200" width="280" height="55" rx="8" fill="#6d5bd0"/>
  <text x="450" y="223" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Step 2: Process Business Logic</text>
  <text x="450" y="241" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">Apply side effects in memory</text>

  <!-- Arrow down -->
  <line x1="450" y1="255" x2="450" y2="280" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 3: Write Result + Offset -->
  <rect x="310" y="285" width="280" height="55" rx="8" fill="#4caf50"/>
  <text x="450" y="308" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Step 3: Commit Result + Offset</text>
  <text x="450" y="326" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.85">Write output + mark offset in single tx</text>

  <!-- Arrow down -->
  <line x1="450" y1="340" x2="450" y2="370" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Success -->
  <rect x="350" y="375" width="200" height="35" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="2"/>
  <text x="450" y="397" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">All steps succeed -- committed</text>

  <!-- Failure path -->
  <polygon points="750,200 800,225 750,250 700,225" fill="#ffffff" stroke="#cc4444" stroke-width="1.5"/>
  <text x="750" y="229" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Any step</text>
  <text x="750" y="241" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">fails?</text>

  <!-- Connection from transaction box to decision -->
  <line x1="620" y1="225" x2="695" y2="225" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Failure -->
  <rect x="690" y="270" width="120" height="60" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="750" y="290" text-anchor="middle" font-size="10" font-weight="700" fill="#cc4444">Rollback</text>
  <text x="750" y="305" text-anchor="middle" font-size="9" fill="#1a1822">Abort transaction</text>
  <text x="750" y="318" text-anchor="middle" font-size="9" fill="#1a1822">No partial state</text>
  <line x1="750" y1="250" x2="750" y2="265" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- Retry annotation -->
  <rect x="680" y="355" width="140" height="45" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="750" y="373" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">Message Retried</text>
  <text x="750" y="387" text-anchor="middle" font-size="9" fill="#1a1822">Broker redelivers,</text>
  <text x="750" y="399" text-anchor="middle" font-size="9" fill="#1a1822">offset not committed</text>
  <line x1="750" y1="330" x2="750" y2="350" stroke="#f0ad4e" stroke-width="1.5" marker-end="url(#arrowO)"/>

  <!-- Bottom annotation -->
  <rect x="30" y="420" width="640" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="350" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Exactly-Once Requires Atomic Commit Across Read, Process, and Write</text>
  <text x="350" y="458" text-anchor="middle" font-size="9" fill="#1a1822">Kafka achieves this via transactional producers with a transaction coordinator. The consumer reads offsets within the tx, and the</text>
  <text x="350" y="472" text-anchor="middle" font-size="9" fill="#1a1822">output write + offset commit happen atomically. If any step fails, the entire transaction is aborted and retried cleanly.</text>
</svg>