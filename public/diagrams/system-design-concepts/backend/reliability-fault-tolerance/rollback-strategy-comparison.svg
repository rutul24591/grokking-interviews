<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Rollback Strategy Comparison</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6d5bd0">Blue-green, canary, feature flags, and fix-forward compared on speed, cost, and risk</text>

  <defs>
    <marker id="rs-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Blue-Green Column -->
  <rect x="30" y="85" width="210" height="385" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="30" y="85" width="210" height="38" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="110" width="210" height="8" fill="#6d5bd0"/>
  <text x="135" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Blue-Green</text>
  <text x="135" y="138" text-anchor="middle" font-size="10" fill="#6d5bd0">Two environments, instant switch</text>

  <!-- Visual -->
  <rect x="50" y="155" width="170" height="45" rx="8" fill="#4caf50"/>
  <text x="135" y="173" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Blue (v1.0)</text>
  <text x="135" y="188" text-anchor="middle" font-size="9" fill="#f3f1f8">Receiving traffic</text>

  <rect x="50" y="210" width="170" height="45" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="135" y="228" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Green (v2.0)</text>
  <text x="135" y="243" text-anchor="middle" font-size="9" fill="#6d5bd0">Deployed, testing</text>

  <line x1="135" y1="200" x2="135" y2="210" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#rs-arrow)"/>
  <text x="190" y="210" font-size="8" fill="#6d5bd0">Switch</text>

  <!-- Metrics -->
  <rect x="40" y="275" width="190" height="80" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="135" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Trade-offs</text>
  <text x="55" y="315" font-size="9" fill="#4caf50">Rollback speed: Instant</text>
  <text x="55" y="330" font-size="9" fill="#cc4444">Infra cost: 2x (full dup)</text>
  <text x="55" y="345" font-size="9" fill="#4caf50">Risk: Low (tested before switch)</text>

  <!-- Best for -->
  <rect x="40" y="365" width="190" height="45" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="135" y="383" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Best for:</text>
  <text x="135" y="398" text-anchor="middle" font-size="9" fill="#1a1822">Stateless services, fast rollback needs</text>

  <!-- Summary bar -->
  <rect x="30" y="420" width="210" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="70" y="435" font-size="9" fill="#1a1822">Speed:</text>
  <rect x="110" y="430" width="120" height="10" rx="5" fill="#4caf50"/>
  <text x="70" y="452" font-size="9" fill="#1a1822">Cost:</text>
  <rect x="110" y="447" width="60" height="10" rx="5" fill="#cc4444"/>
  <rect x="170" y="447" width="60" height="10" rx="5" fill="#d7d1e6"/>

  <!-- Canary Column -->
  <rect x="255" y="85" width="210" height="385" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="255" y="85" width="210" height="38" rx="10" fill="#f0ad4e"/>
  <rect x="255" y="110" width="210" height="8" fill="#f0ad4e"/>
  <text x="360" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Canary</text>
  <text x="360" y="138" text-anchor="middle" font-size="10" fill="#f0ad4e">Gradual rollout, monitor at each stage</text>

  <!-- Visual: progressive rollout -->
  <rect x="275" y="155" width="170" height="28" rx="6" fill="#4caf50" opacity="0.3"/>
  <rect x="275" y="155" width="85" height="28" rx="6" fill="#4caf50"/>
  <text x="360" y="173" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">5% canary</text>

  <rect x="275" y="190" width="170" height="28" rx="6" fill="#4caf50" opacity="0.3"/>
  <rect x="275" y="190" width="120" height="28" rx="6" fill="#4caf50"/>
  <text x="360" y="208" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">25% canary</text>

  <rect x="275" y="225" width="170" height="28" rx="6" fill="#4caf50" opacity="0.3"/>
  <rect x="275" y="225" width="155" height="28" rx="6" fill="#4caf50"/>
  <text x="360" y="243" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">50% canary</text>

  <rect x="275" y="260" width="170" height="28" rx="6" fill="#4caf50"/>
  <text x="360" y="278" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">100% rollout</text>

  <!-- Metrics -->
  <rect x="265" y="300" width="190" height="80" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="360" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Trade-offs</text>
  <text x="280" y="340" font-size="9" fill="#f0ad4e">Rollback speed: Minutes</text>
  <text x="280" y="355" font-size="9" fill="#f0ad4e">Infra cost: 1.1-1.5x</text>
  <text x="280" y="370" font-size="9" fill="#4caf50">Risk: Lowest (small blast radius)</text>

  <!-- Best for -->
  <rect x="265" y="390" width="190" height="45" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="360" y="408" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">Best for:</text>
  <text x="360" y="423" text-anchor="middle" font-size="9" fill="#1a1822">Production-critical changes, risk-averse</text>

  <!-- Summary bar -->
  <rect x="255" y="440" width="210" height="25" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="295" y="450" font-size="8" fill="#1a1822">Speed:</text>
  <rect x="335" y="445" width="60" height="10" rx="5" fill="#f0ad4e"/>
  <rect x="395" y="445" width="60" height="10" rx="5" fill="#d7d1e6"/>
  <text x="295" y="462" font-size="8" fill="#1a1822">Cost:</text>
  <rect x="335" y="457" width="90" height="10" rx="5" fill="#4caf50"/>
  <rect x="425" y="457" width="30" height="10" rx="5" fill="#d7d1e6"/>

  <!-- Feature Flags Column -->
  <rect x="480" y="85" width="210" height="385" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="480" y="85" width="210" height="38" rx="10" fill="#4caf50"/>
  <rect x="480" y="110" width="210" height="8" fill="#4caf50"/>
  <text x="585" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Feature Flags</text>
  <text x="585" y="138" text-anchor="middle" font-size="10" fill="#4caf50">Single deployment, toggle features</text>

  <!-- Visual -->
  <rect x="500" y="155" width="170" height="40" rx="8" fill="#4caf50"/>
  <text x="585" y="173" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Single Deployment (v2.0)</text>
  <text x="585" y="188" text-anchor="middle" font-size="9" fill="#f3f1f8">All users get same code</text>

  <rect x="500" y="205" width="170" height="40" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="585" y="223" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Feature: new_checkout</text>
  <text x="585" y="238" text-anchor="middle" font-size="9" fill="#4caf50">enabled=true for 5% users</text>

  <rect x="500" y="255" width="170" height="40" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="585" y="273" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Feature: new_checkout</text>
  <text x="585" y="288" text-anchor="middle" font-size="9" fill="#cc4444">enabled=false (rollback)</text>

  <!-- Metrics -->
  <rect x="490" y="310" width="190" height="80" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="585" y="330" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Trade-offs</text>
  <text x="505" y="350" font-size="9" fill="#4caf50">Rollback speed: Instant (flag flip)</text>
  <text x="505" y="365" font-size="9" fill="#4caf50">Infra cost: No extra infra</text>
  <text x="505" y="380" font-size="9" fill="#f0ad4e">Risk: Low (but flag debt accumulates)</text>

  <!-- Best for -->
  <rect x="490" y="400" width="190" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="585" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Best for:</text>
  <text x="585" y="433" text-anchor="middle" font-size="9" fill="#1a1822">Feature-level control, A/B testing</text>

  <!-- Summary bar -->
  <rect x="480" y="450" width="210" height="20" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="520" y="464" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="600">Fastest rollback, zero infra cost</text>

  <!-- Fix-Forward Column -->
  <rect x="705" y="85" width="170" height="385" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="705" y="85" width="170" height="38" rx="10" fill="#cc4444"/>
  <rect x="705" y="110" width="170" height="8" fill="#cc4444"/>
  <text x="790" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Fix-Forward</text>
  <text x="790" y="138" text-anchor="middle" font-size="10" fill="#cc4444">Deploy fix, no rollback</text>

  <!-- Visual -->
  <rect x="720" y="155" width="140" height="35" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="1.5"/>
  <text x="790" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">v2.0 has bug</text>

  <line x1="790" y1="190" x2="790" y2="210" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#rs-arrow)"/>

  <rect x="720" y="215" width="140" height="35" rx="8" fill="#6d5bd0"/>
  <text x="790" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">v2.1 fix deployed</text>

  <text x="790" y="270" text-anchor="middle" font-size="10" fill="#1a1822">No revert, just fix</text>

  <!-- Metrics -->
  <rect x="715" y="285" width="150" height="80" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="790" y="305" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Trade-offs</text>
  <text x="730" y="325" font-size="9" fill="#cc4444">Rollback: None (fix forward)</text>
  <text x="730" y="340" font-size="9" fill="#4caf50">Infra cost: Same (no extra)</text>
  <text x="730" y="355" font-size="9" fill="#f0ad4e">Risk: Medium (users affected during fix)</text>

  <!-- Best for -->
  <rect x="715" y="375" width="150" height="45" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="790" y="393" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Best for:</text>
  <text x="790" y="408" text-anchor="middle" font-size="9" fill="#1a1822">Irreversible changes, fast fix ready</text>

  <!-- Summary bar -->
  <rect x="705" y="430" width="170" height="25" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="790" y="447" text-anchor="middle" font-size="9" fill="#cc4444" font-weight="600">No rollback, fastest recovery if fix ready</text>
</svg>
