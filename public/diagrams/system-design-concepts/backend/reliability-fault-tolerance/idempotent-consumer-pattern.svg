<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Idempotent consumer pattern for deduplication</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Idempotent Consumer Pattern</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Deduplication at the consumer boundary using message ID tracking</text>

  <!-- Flow: Producer -->
  <rect x="30" y="120" width="140" height="70" rx="12" fill="#6d5bd0"/>
  <text x="100" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Producer</text>
  <text x="100" y="170" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">Publishes message</text>
  <text x="100" y="182" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">with unique ID</text>

  <!-- Arrow 1 -->
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0ad4e"/>
    </marker>
  </defs>
  <line x1="170" y1="155" x2="240" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="205" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">msg: {id, payload}</text>

  <!-- Broker -->
  <rect x="240" y="120" width="140" height="70" rx="12" fill="#6d5bd0"/>
  <text x="310" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Message Broker</text>
  <text x="310" y="170" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">Stores &amp; delivers</text>
  <text x="310" y="182" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">at-least-once</text>

  <!-- Arrow 2 -->
  <line x1="380" y1="155" x2="450" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="415" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">deliver</text>

  <!-- Idempotent Consumer Box -->
  <rect x="450" y="90" width="220" height="200" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="450" y="90" width="220" height="30" rx="12" fill="#6d5bd0"/>
  <rect x="450" y="110" width="220" height="10" fill="#6d5bd0"/>
  <text x="560" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Idempotent Consumer</text>

  <!-- Step 1: Check dedup store -->
  <rect x="465" y="135" width="190" height="40" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="560" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">1. Check Dedup Store</text>
  <text x="560" y="167" text-anchor="middle" font-size="9" fill="#1a1822">Has msg ID been seen?</text>

  <!-- Decision diamond -->
  <polygon points="560,190 620,210 560,230 500,210" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="560" y="214" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Seen before?</text>

  <!-- Arrow: YES - skip -->
  <line x1="500" y1="210" x2="465" y2="210" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="465" y="240" width="85" height="38" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="507" y="255" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">YES - Skip</text>
  <text x="507" y="270" text-anchor="middle" font-size="8" fill="#1a1822">ACK &amp; discard</text>
  <text x="485" y="225" font-size="8" font-weight="700" fill="#cc4444">Yes</text>

  <!-- Arrow: NO - process -->
  <line x1="560" y1="230" x2="560" y2="245" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="575" y="240" font-size="8" font-weight="700" fill="#4caf50">No</text>
  <rect x="495" y="248" width="130" height="32" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="560" y="263" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">NO - Process &amp; Record</text>
  <text x="560" y="276" text-anchor="middle" font-size="8" fill="#1a1822">Write output + record ID in tx</text>

  <!-- Arrow 3: to Output -->
  <line x1="670" y1="155" x2="740" y2="155" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="705" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">process once</text>

  <!-- Output -->
  <rect x="740" y="120" width="140" height="70" rx="12" fill="#4caf50"/>
  <text x="810" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Output</text>
  <text x="810" y="170" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">Business effect</text>
  <text x="810" y="182" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">applied once</text>

  <!-- Dedup Store -->
  <rect x="500" y="320" width="200" height="70" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="500" y="320" width="200" height="28" rx="12" fill="#f0ad4e"/>
  <rect x="500" y="340" width="200" height="8" fill="#f0ad4e"/>
  <text x="600" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Deduplication Store</text>
  <text x="600" y="362" text-anchor="middle" font-size="9" fill="#1a1822">Redis / DynamoDB / DB table</text>
  <text x="600" y="376" text-anchor="middle" font-size="9" fill="#1a1822">Key: message_id, TTL: retention</text>

  <!-- Connection from consumer to dedup store -->
  <line x1="560" y1="290" x2="560" y2="315" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowOrange)" stroke-dasharray="4 3"/>
  <text x="575" y="305" font-size="8" fill="#f0ad4e">read/write</text>

  <!-- Bottom annotation -->
  <rect x="100" y="420" width="700" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Key Insight: Idempotency requires atomicity</text>
  <text x="450" y="458" text-anchor="middle" font-size="9" fill="#1a1822">The message ID must be recorded in the same transaction as the business write, otherwise a crash between the two creates duplicates.</text>
  <text x="450" y="472" text-anchor="middle" font-size="9" fill="#1a1822">Common pattern: transactional outbox or inbox that bundles the dedup record with the domain change.</text>
</svg>