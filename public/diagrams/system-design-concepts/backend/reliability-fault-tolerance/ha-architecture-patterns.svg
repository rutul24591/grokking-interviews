<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d5bd0"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">High Availability Architecture Patterns</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#555">Comparing Single Node, Active-Passive, Active-Active, and Multi-Region patterns</text>

  <!-- Column 1: Single Node -->
  <rect x="30" y="100" width="200" height="190" rx="12" fill="#fff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="100" width="200" height="36" rx="12" fill="#cc4444"/>
  <rect x="30" y="122" width="200" height="14" fill="#cc4444"/>
  <text x="130" y="123" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Single Node</text>

  <!-- Diagram -->
  <rect x="70" y="150" width="120" height="50" rx="8" fill="#fef0f0" stroke="#cc4444" stroke-width="1"/>
  <text x="130" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc4444">Single Server</text>
  <text x="130" y="189" text-anchor="middle" font-size="10" fill="#444">No redundancy</text>

  <!-- Metrics -->
  <rect x="50" y="215" width="160" height="60" rx="8" fill="#f8f8f8"/>
  <text x="130" y="235" text-anchor="middle" font-size="10" fill="#444">Availability: <text font-weight="bold" fill="#cc4444">99%</text></text>
  <text x="130" y="252" text-anchor="middle" font-size="10" fill="#444">Cost: <text font-weight="bold" fill="#4caf50">Low</text></text>
  <text x="130" y="269" text-anchor="middle" font-size="10" fill="#444">Complexity: <text font-weight="bold" fill="#4caf50">Low</text></text>

  <!-- Column 2: Active-Passive -->
  <rect x="250" y="100" width="200" height="190" rx="12" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="250" y="100" width="200" height="36" rx="12" fill="#f0ad4e"/>
  <rect x="250" y="122" width="200" height="14" fill="#f0ad4e"/>
  <text x="350" y="123" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Active-Passive</text>

  <!-- Diagram -->
  <rect x="270" y="150" width="80" height="50" rx="8" fill="#fef8ef" stroke="#f0ad4e" stroke-width="1"/>
  <text x="310" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0ad4e">Active</text>
  <text x="310" y="189" text-anchor="middle" font-size="10" fill="#444">Handles traffic</text>
  <text x="370" y="175" text-anchor="middle" font-size="16" fill="#f0ad4e">&#8594;</text>
  <rect x="390" y="150" width="80" height="50" rx="8" fill="#fef8ef" stroke="#f0ad4e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="430" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0ad4e">Passive</text>
  <text x="430" y="189" text-anchor="middle" font-size="10" fill="#444">Standby, synced</text>

  <!-- Metrics -->
  <rect x="270" y="215" width="160" height="60" rx="8" fill="#f8f8f8"/>
  <text x="350" y="235" text-anchor="middle" font-size="10" fill="#444">Availability: <text font-weight="bold" fill="#f0ad4e">99.9%</text></text>
  <text x="350" y="252" text-anchor="middle" font-size="10" fill="#444">Cost: <text font-weight="bold" fill="#f0ad4e">Medium</text></text>
  <text x="350" y="269" text-anchor="middle" font-size="10" fill="#444">Complexity: <text font-weight="bold" fill="#f0ad4e">Medium</text></text>

  <!-- Column 3: Active-Active -->
  <rect x="470" y="100" width="200" height="190" rx="12" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <rect x="470" y="100" width="200" height="36" rx="12" fill="#4caf50"/>
  <rect x="470" y="122" width="200" height="14" fill="#4caf50"/>
  <text x="570" y="123" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Active-Active</text>

  <!-- Diagram -->
  <rect x="490" y="150" width="70" height="50" rx="8" fill="#f0f9f0" stroke="#4caf50" stroke-width="1"/>
  <text x="525" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Node 1</text>
  <text x="525" y="189" text-anchor="middle" font-size="10" fill="#444">Active</text>
  <rect x="570" y="150" width="70" height="50" rx="8" fill="#f0f9f0" stroke="#4caf50" stroke-width="1"/>
  <text x="605" y="172" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Node 2</text>
  <text x="605" y="189" text-anchor="middle" font-size="10" fill="#444">Active</text>
  <text x="555" y="175" text-anchor="middle" font-size="12" fill="#4caf50">&#8646;</text>

  <!-- Metrics -->
  <rect x="490" y="215" width="160" height="60" rx="8" fill="#f8f8f8"/>
  <text x="570" y="235" text-anchor="middle" font-size="10" fill="#444">Availability: <text font-weight="bold" fill="#4caf50">99.95%</text></text>
  <text x="570" y="252" text-anchor="middle" font-size="10" fill="#444">Cost: <text font-weight="bold" fill="#f0ad4e">High</text></text>
  <text x="570" y="269" text-anchor="middle" font-size="10" fill="#444">Complexity: <text font-weight="bold" fill="#f0ad4e">High</text></text>

  <!-- Column 4: Multi-Region -->
  <rect x="690" y="100" width="180" height="190" rx="12" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="690" y="100" width="180" height="36" rx="12" fill="#6d5bd0"/>
  <rect x="690" y="122" width="180" height="14" fill="#6d5bd0"/>
  <text x="780" y="123" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Multi-Region</text>

  <!-- Diagram -->
  <rect x="705" y="145" width="70" height="55" rx="8" fill="#f8f7fc" stroke="#6d5bd0" stroke-width="1"/>
  <text x="740" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">Region A</text>
  <text x="740" y="180" text-anchor="middle" font-size="9" fill="#444">Active-Active</text>
  <text x="740" y="193" text-anchor="middle" font-size="9" fill="#444">nodes</text>
  <text x="790" y="172" text-anchor="middle" font-size="14" fill="#6d5bd0">&#8646;</text>
  <rect x="800" y="145" width="70" height="55" rx="8" fill="#f8f7fc" stroke="#6d5bd0" stroke-width="1"/>
  <text x="835" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">Region B</text>
  <text x="835" y="180" text-anchor="middle" font-size="9" fill="#444">Active-Active</text>
  <text x="835" y="193" text-anchor="middle" font-size="9" fill="#444">nodes</text>

  <!-- Metrics -->
  <rect x="710" y="215" width="140" height="60" rx="8" fill="#f8f8f8"/>
  <text x="780" y="235" text-anchor="middle" font-size="10" fill="#444">Availability: <text font-weight="bold" fill="#6d5bd0">99.99%+</text></text>
  <text x="780" y="252" text-anchor="middle" font-size="10" fill="#444">Cost: <text font-weight="bold" fill="#cc4444">Very High</text></text>
  <text x="780" y="269" text-anchor="middle" font-size="10" fill="#444">Complexity: <text font-weight="bold" fill="#cc4444">Very High</text></text>

  <!-- Comparison Table -->
  <rect x="30" y="310" width="840" height="160" rx="12" fill="#fff" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="338" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Pattern Comparison Matrix</text>

  <!-- Table headers -->
  <rect x="50" y="350" width="180" height="30" rx="4" fill="#6d5bd0"/>
  <text x="140" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Pattern</text>
  <rect x="230" y="350" width="140" height="30" rx="4" fill="#6d5bd0"/>
  <text x="300" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Availability</text>
  <rect x="370" y="350" width="120" height="30" rx="4" fill="#6d5bd0"/>
  <text x="430" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Cost</text>
  <rect x="490" y="350" width="140" height="30" rx="4" fill="#6d5bd0"/>
  <text x="560" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Complexity</text>
  <rect x="630" y="350" width="140" height="30" rx="4" fill="#6d5bd0"/>
  <text x="700" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Data Loss Risk</text>
  <rect x="770" y="350" width="80" height="30" rx="4" fill="#6d5bd0"/>
  <text x="810" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Use Case</text>

  <!-- Row 1 -->
  <rect x="50" y="380" width="180" height="28" rx="4" fill="#fef0f0"/>
  <text x="140" y="398" text-anchor="middle" font-size="10" fill="#444">Single Node</text>
  <rect x="230" y="380" width="140" height="28" rx="4" fill="#fef0f0"/>
  <text x="300" y="398" text-anchor="middle" font-size="10" fill="#444">99% (3.65d/yr)</text>
  <rect x="370" y="380" width="120" height="28" rx="4" fill="#fef0f0"/>
  <text x="430" y="398" text-anchor="middle" font-size="10" fill="#4caf50">Low</text>
  <rect x="490" y="380" width="140" height="28" rx="4" fill="#fef0f0"/>
  <text x="560" y="398" text-anchor="middle" font-size="10" fill="#4caf50">Low</text>
  <rect x="630" y="380" width="140" height="28" rx="4" fill="#fef0f0"/>
  <text x="700" y="398" text-anchor="middle" font-size="10" fill="#cc4444">High (no replica)</text>
  <rect x="770" y="380" width="80" height="28" rx="4" fill="#fef0f0"/>
  <text x="810" y="398" text-anchor="middle" font-size="10" fill="#444">Dev/Test</text>

  <!-- Row 2 -->
  <rect x="50" y="408" width="180" height="28" rx="4" fill="#fef8ef"/>
  <text x="140" y="426" text-anchor="middle" font-size="10" fill="#444">Active-Passive</text>
  <rect x="230" y="408" width="140" height="28" rx="4" fill="#fef8ef"/>
  <text x="300" y="426" text-anchor="middle" font-size="10" fill="#444">99.9% (8.76h/yr)</text>
  <rect x="370" y="408" width="120" height="28" rx="4" fill="#fef8ef"/>
  <text x="430" y="426" text-anchor="middle" font-size="10" fill="#f0ad4e">Medium</text>
  <rect x="490" y="408" width="140" height="28" rx="4" fill="#fef8ef"/>
  <text x="560" y="426" text-anchor="middle" font-size="10" fill="#f0ad4e">Medium</text>
  <rect x="630" y="408" width="140" height="28" rx="4" fill="#fef8ef"/>
  <text x="700" y="426" text-anchor="middle" font-size="10" fill="#f0ad4e">Medium (sync lag)</text>
  <rect x="770" y="408" width="80" height="28" rx="4" fill="#fef8ef"/>
  <text x="810" y="426" text-anchor="middle" font-size="10" fill="#444">Standard HA</text>

  <!-- Row 3 -->
  <rect x="50" y="436" width="180" height="28" rx="4" fill="#f0f9f0"/>
  <text x="140" y="454" text-anchor="middle" font-size="10" fill="#444">Active-Active</text>
  <rect x="230" y="436" width="140" height="28" rx="4" fill="#f0f9f0"/>
  <text x="300" y="454" text-anchor="middle" font-size="10" fill="#444">99.95% (4.38h/yr)</text>
  <rect x="370" y="436" width="120" height="28" rx="4" fill="#f0f9f0"/>
  <text x="430" y="454" text-anchor="middle" font-size="10" fill="#f0ad4e">High</text>
  <rect x="490" y="436" width="140" height="28" rx="4" fill="#f0f9f0"/>
  <text x="560" y="454" text-anchor="middle" font-size="10" fill="#f0ad4e">High</text>
  <rect x="630" y="436" width="140" height="28" rx="4" fill="#f0f9f0"/>
  <text x="700" y="454" text-anchor="middle" font-size="10" fill="#4caf50">Low (multi-write)</text>
  <rect x="770" y="436" width="80" height="28" rx="4" fill="#f0f9f0"/>
  <text x="810" y="454" text-anchor="middle" font-size="10" fill="#444">Scale-out</text>
</svg>
