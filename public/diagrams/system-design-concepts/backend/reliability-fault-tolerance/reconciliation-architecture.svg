<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#4caf50"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#cc4444"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#f0ad4e"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#2d2d2d">Reconciliation Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">Detect and repair data drift between source of truth and derived data stores</text>

  <!-- Source of Truth -->
  <rect x="30" y="90" width="220" height="110" rx="12" fill="#fff" stroke="#4caf50" stroke-width="2.5"/>
  <text x="140" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#4caf50">Source of Truth</text>
  <text x="140" y="140" text-anchor="middle" font-size="12" fill="#555">Primary Database (PostgreSQL)</text>
  <rect x="55" y="150" width="170" height="38" rx="8" fill="#4caf50" opacity="0.08"/>
  <text x="140" y="168" text-anchor="middle" font-size="11" fill="#555">Authoritative write path</text>
  <text x="140" y="184" text-anchor="middle" font-size="11" fill="#555">Single source for comparison</text>

  <!-- Arrow: Source to Reconciliation Job -->
  <line x1="250" y1="145" x2="305" y2="145" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Reconciliation Job -->
  <rect x="305" y="90" width="230" height="110" rx="12" fill="#fff" stroke="#6d5bd0" stroke-width="2.5"/>
  <text x="420" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#6d5bd0">Reconciliation Job</text>
  <rect x="325" y="128" width="190" height="60" rx="8" fill="#6d5bd0" opacity="0.06"/>
  <text x="420" y="148" text-anchor="middle" font-size="11" fill="#555">Compare source vs derived data</text>
  <text x="420" y="164" text-anchor="middle" font-size="11" fill="#555">Hash-based diff / row-by-row</text>
  <text x="420" y="180" text-anchor="middle" font-size="11" fill="#555">Checksum aggregation</text>

  <!-- Arrow: Reconciliation to Derived Data -->
  <line x1="535" y1="145" x2="590" y2="145" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="563" y="137" text-anchor="middle" font-size="10" fill="#555">Compare</text>

  <!-- Derived Data Store -->
  <rect x="590" y="90" width="280" height="110" rx="12" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="730" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#f0ad4e">Derived Data Stores</text>

  <!-- Derived store sub-boxes -->
  <rect x="610" y="130" width="75" height="58" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="647" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d2d2d">Search</text>
  <text x="647" y="168" text-anchor="middle" font-size="10" fill="#555">Elasticsearch</text>
  <text x="647" y="182" text-anchor="middle" font-size="10" fill="#555">indexes</text>

  <rect x="695" y="130" width="75" height="58" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="732" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d2d2d">Analytics</text>
  <text x="732" y="168" text-anchor="middle" font-size="10" fill="#555">ClickHouse</text>
  <text x="732" y="182" text-anchor="middle" font-size="10" fill="#555">materialized views</text>

  <rect x="780" y="130" width="75" height="58" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="817" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d2d2d">Cache</text>
  <text x="817" y="168" text-anchor="middle" font-size="10" fill="#555">Redis</text>
  <text x="817" y="182" text-anchor="middle" font-size="10" fill="#555">read replicas</text>

  <!-- Mismatch detected arrow going down -->
  <line x1="420" y1="200" x2="420" y2="250" stroke="#cc4444" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="470" y="230" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc4444">Mismatch Detected</text>

  <!-- Alert Pipeline -->
  <rect x="305" y="250" width="230" height="80" rx="12" fill="#fff" stroke="#cc4444" stroke-width="2"/>
  <text x="420" y="278" text-anchor="middle" font-size="15" font-weight="bold" fill="#cc4444">Alert Pipeline</text>
  <text x="420" y="300" text-anchor="middle" font-size="11" fill="#555">PagerDuty / OpsGenie alert</text>
  <text x="420" y="318" text-anchor="middle" font-size="11" fill="#555">Drift metrics emitted to monitoring</text>

  <!-- Arrow: Alert to Repair Job -->
  <line x1="420" y1="330" x2="420" y2="370" stroke="#cc4444" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- Repair Job -->
  <rect x="305" y="370" width="230" height="80" rx="12" fill="#fff" stroke="#cc4444" stroke-width="2"/>
  <text x="420" y="398" text-anchor="middle" font-size="15" font-weight="bold" fill="#cc4444">Corrective Repair Job</text>
  <text x="420" y="420" text-anchor="middle" font-size="11" fill="#555">Replay from source / backfill</text>
  <text x="420" y="438" text-anchor="middle" font-size="11" fill="#555">Idempotent write to derived store</text>

  <!-- Arrow: Repair back to Derived Data -->
  <path d="M 535 410 C 600 410, 870 410, 870 250 C 870 200, 870 200, 870 200" fill="none" stroke="#4caf50" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="890" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Repair</text>
  <text x="890" y="336" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Write</text>

  <!-- Continuous vs Periodic comparison boxes at bottom left -->
  <rect x="30" y="340" width="240" height="140" rx="12" fill="#fff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="150" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Continuous Reconciliation</text>
  <text x="150" y="387" text-anchor="middle" font-size="11" fill="#555">CDC stream (Debezium)</text>
  <text x="150" y="405" text-anchor="middle" font-size="11" fill="#555">Sub-second drift detection</text>
  <text x="150" y="423" text-anchor="middle" font-size="11" fill="#555">Higher compute cost</text>
  <text x="150" y="441" text-anchor="middle" font-size="11" fill="#555">Best for: payments, inventory</text>
  <text x="150" y="463" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Low data risk window</text>

  <!-- Periodic box -->
  <rect x="30" y="340" width="240" height="140" rx="12" fill="#fff" stroke="#6d5bd0" stroke-width="1.5" transform="translate(0, 0)"/>
  <!-- Re-positioning periodic box to the right of continuous -->
  <rect x="640" y="340" width="240" height="140" rx="12" fill="#fff" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="760" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0ad4e">Periodic Reconciliation</text>
  <text x="760" y="387" text-anchor="middle" font-size="11" fill="#555">Cron-based batch comparison</text>
  <text x="760" y="405" text-anchor="middle" font-size="11" fill="#555">Hourly/daily drift detection</text>
  <text x="760" y="423" text-anchor="middle" font-size="11" fill="#555">Lower compute overhead</text>
  <text x="760" y="441" text-anchor="middle" font-size="11" fill="#555">Best for: analytics, search</text>
  <text x="760" y="463" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0ad4e">Tolerates brief drift window</text>

  <!-- Legend -->
  <rect x="30" y="8" width="12" height="12" rx="3" fill="#4caf50"/>
  <text x="48" y="18" font-size="11" fill="#555">Source of Truth</text>
  <rect x="145" y="8" width="12" height="12" rx="3" fill="#6d5bd0"/>
  <text x="163" y="18" font-size="11" fill="#555">Comparison</text>
  <rect x="240" y="8" width="12" height="12" rx="3" fill="#f0ad4e"/>
  <text x="258" y="18" font-size="11" fill="#555">Derived Stores</text>
  <rect x="345" y="8" width="12" height="12" rx="3" fill="#cc4444"/>
  <text x="363" y="18" font-size="11" fill="#555">Alert &amp; Repair</text>
</svg>
