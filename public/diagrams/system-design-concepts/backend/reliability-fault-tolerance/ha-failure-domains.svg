<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4caf50"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">HA Failure Domain Isolation</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#555">Services replicated across availability zones with independent infrastructure and load-balanced traffic</text>

  <!-- Load Balancer -->
  <rect x="300" y="100" width="300" height="55" rx="10" fill="#6d5bd0"/>
  <text x="450" y="125" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Load Balancer</text>
  <text x="450" y="143" text-anchor="middle" font-size="11" fill="#e0d8f0">Distributes traffic across zones</text>

  <!-- Arrows to zones -->
  <line x1="380" y1="155" x2="200" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="450" y1="155" x2="450" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="520" y1="155" x2="700" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Availability Zone 1 -->
  <rect x="50" y="200" width="260" height="270" rx="12" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <rect x="50" y="200" width="260" height="36" rx="12" fill="#4caf50"/>
  <rect x="50" y="222" width="260" height="14" fill="#4caf50"/>
  <text x="180" y="223" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Availability Zone 1</text>

  <!-- Infrastructure -->
  <rect x="70" y="250" width="220" height="45" rx="8" fill="#f0f9f0"/>
  <text x="180" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#4caf50">Independent Infrastructure</text>
  <text x="180" y="285" text-anchor="middle" font-size="10" fill="#444">Power | Network | Cooling</text>

  <!-- Services -->
  <rect x="70" y="310" width="100" height="45" rx="8" fill="#4caf50"/>
  <text x="120" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">App Server</text>
  <text x="120" y="345" text-anchor="middle" font-size="9" fill="#e0f0e0">Running</text>
  <rect x="190" y="310" width="100" height="45" rx="8" fill="#4caf50"/>
  <text x="240" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">App Server</text>
  <text x="240" y="345" text-anchor="middle" font-size="9" fill="#e0f0e0">Running</text>

  <!-- Database -->
  <rect x="70" y="370" width="220" height="45" rx="8" fill="#f8f7fc" stroke="#6d5bd0" stroke-width="1"/>
  <text x="180" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Database Replica</text>
  <text x="180" y="406" text-anchor="middle" font-size="10" fill="#444">Sync replication from primary</text>

  <!-- Health indicator -->
  <circle cx="80" cy="445" r="8" fill="#4caf50"/>
  <text x="80" y="449" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">OK</text>
  <text x="100" y="448" font-size="10" fill="#444">Zone healthy, serving traffic</text>

  <!-- Availability Zone 2 -->
  <rect x="320" y="200" width="260" height="270" rx="12" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <rect x="320" y="200" width="260" height="36" rx="12" fill="#4caf50"/>
  <rect x="320" y="222" width="260" height="14" fill="#4caf50"/>
  <text x="450" y="223" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Availability Zone 2</text>

  <!-- Infrastructure -->
  <rect x="340" y="250" width="220" height="45" rx="8" fill="#f0f9f0"/>
  <text x="450" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#4caf50">Independent Infrastructure</text>
  <text x="450" y="285" text-anchor="middle" font-size="10" fill="#444">Power | Network | Cooling</text>

  <!-- Services -->
  <rect x="340" y="310" width="100" height="45" rx="8" fill="#4caf50"/>
  <text x="390" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">App Server</text>
  <text x="390" y="345" text-anchor="middle" font-size="9" fill="#e0f0e0">Running</text>
  <rect x="460" y="310" width="100" height="45" rx="8" fill="#4caf50"/>
  <text x="510" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">App Server</text>
  <text x="510" y="345" text-anchor="middle" font-size="9" fill="#e0f0e0">Running</text>

  <!-- Database -->
  <rect x="340" y="370" width="220" height="45" rx="8" fill="#f8f7fc" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Database Replica</text>
  <text x="450" y="406" text-anchor="middle" font-size="10" fill="#444">Sync replication from primary</text>

  <!-- Health indicator -->
  <circle cx="350" cy="445" r="8" fill="#4caf50"/>
  <text x="350" y="449" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">OK</text>
  <text x="370" y="448" font-size="10" fill="#444">Zone healthy, serving traffic</text>

  <!-- Availability Zone 3 -->
  <rect x="590" y="200" width="260" height="270" rx="12" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <rect x="590" y="200" width="260" height="36" rx="12" fill="#4caf50"/>
  <rect x="590" y="222" width="260" height="14" fill="#4caf50"/>
  <text x="720" y="223" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Availability Zone 3</text>

  <!-- Infrastructure -->
  <rect x="610" y="250" width="220" height="45" rx="8" fill="#f0f9f0"/>
  <text x="720" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#4caf50">Independent Infrastructure</text>
  <text x="720" y="285" text-anchor="middle" font-size="10" fill="#444">Power | Network | Cooling</text>

  <!-- Services -->
  <rect x="610" y="310" width="100" height="45" rx="8" fill="#4caf50"/>
  <text x="660" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">App Server</text>
  <text x="660" y="345" text-anchor="middle" font-size="9" fill="#e0f0e0">Running</text>
  <rect x="730" y="310" width="100" height="45" rx="8" fill="#4caf50"/>
  <text x="780" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">App Server</text>
  <text x="780" y="345" text-anchor="middle" font-size="9" fill="#e0f0e0">Running</text>

  <!-- Database -->
  <rect x="610" y="370" width="220" height="45" rx="8" fill="#f8f7fc" stroke="#6d5bd0" stroke-width="1"/>
  <text x="720" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Database Replica</text>
  <text x="720" y="406" text-anchor="middle" font-size="10" fill="#444">Sync replication from primary</text>

  <!-- Health indicator -->
  <circle cx="620" cy="445" r="8" fill="#4caf50"/>
  <text x="620" y="449" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">OK</text>
  <text x="640" y="448" font-size="10" fill="#444">Zone healthy, serving traffic</text>

  <!-- Replication arrows between zones -->
  <line x1="310" y1="392" x2="340" y2="392" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="580" y1="392" x2="610" y2="392" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="450" y="385" text-anchor="middle" font-size="9" fill="#6d5bd0">Sync Replication</text>
</svg>
