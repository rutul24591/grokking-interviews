<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Blue-Green Deployment Rollback</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6d5bd0">Instant rollback by switching traffic back to the previous stable environment</text>

  <defs>
    <marker id="bg-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="bg-arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="bg-arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
  </defs>

  <!-- Load Balancer -->
  <rect x="330" y="80" width="240" height="55" rx="10" fill="#6d5bd0"/>
  <rect x="330" y="80" width="240" height="55" rx="10" fill="#6d5bd0"/>
  <text x="450" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Load Balancer / DNS</text>
  <text x="450" y="122" text-anchor="middle" font-size="10" fill="#f3f1f8">Traffic routing control point</text>

  <!-- User traffic -->
  <line x1="450" y1="60" x2="450" y2="80" stroke="#1a1822" stroke-width="2"/>
  <text x="470" y="72" font-size="10" fill="#1a1822">User traffic</text>

  <!-- STEP 1: Blue serving -->
  <rect x="50" y="170" width="380" height="100" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="50" y="170" width="380" height="36" rx="10" fill="#4caf50"/>
  <rect x="50" y="194" width="380" height="8" fill="#4caf50"/>
  <text x="240" y="194" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Step 1: Blue (v1.0) Serving All Traffic</text>

  <rect x="70" y="220" width="140" height="35" rx="6" fill="#4caf50"/>
  <text x="140" y="242" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">App Server x3</text>

  <rect x="225" y="220" width="140" height="35" rx="6" fill="#f0ad4e"/>
  <text x="295" y="242" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Database</text>

  <text x="370" y="230" text-anchor="middle" font-size="10" fill="#4caf50" font-weight="600">100% traffic</text>

  <!-- Arrow to Step 2 -->
  <line x1="240" y1="270" x2="240" y2="310" stroke="#6d5bd0" stroke-width="2" marker-end="url(#bg-arrow)"/>

  <!-- STEP 2: Green deployed, testing -->
  <rect x="50" y="310" width="380" height="100" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="50" y="310" width="380" height="36" rx="10" fill="#6d5bd0" opacity="0.8"/>
  <rect x="50" y="334" width="380" height="8" fill="#6d5bd0" opacity="0.8"/>
  <text x="240" y="334" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Step 2: Green (v2.0) Deployed + Tested</text>

  <rect x="70" y="358" width="140" height="35" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="140" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Green App Server x3</text>

  <rect x="225" y="358" width="140" height="35" rx="6" fill="#f0ad4e" opacity="0.5" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="295" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">DB (shared)</text>

  <text x="370" y="370" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">0% traffic</text>

  <!-- Arrow to Step 3 -->
  <line x1="430" y1="360" x2="510" y2="360" stroke="#6d5bd0" stroke-width="2" marker-end="url(#bg-arrow)"/>
  <text x="470" y="352" text-anchor="middle" font-size="9" fill="#6d5bd0">Switch traffic</text>

  <!-- STEP 3a: Success path -->
  <rect x="510" y="310" width="360" height="100" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="510" y="310" width="360" height="36" rx="10" fill="#4caf50"/>
  <rect x="510" y="334" width="360" height="8" fill="#4caf50"/>
  <text x="690" y="334" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Step 3a: Green Healthy -- Blue Decommissioned</text>

  <rect x="530" y="358" width="140" height="35" rx="6" fill="#4caf50"/>
  <text x="600" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Green App x3</text>

  <rect x="685" y="358" width="140" height="35" rx="6" fill="#f0ad4e"/>
  <text x="755" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Database</text>

  <text x="840" y="370" text-anchor="middle" font-size="10" fill="#4caf50" font-weight="600">100% traffic</text>

  <!-- Arrow from Step 2 to Step 3b (rollback) -->
  <line x1="240" y1="410" x2="240" y2="440" stroke="#6d5bd0" stroke-width="2" marker-end="url(#bg-arrow)"/>
  <text x="300" y="430" font-size="9" fill="#6d5bd0">Health check passes</text>

  <!-- STEP 3b: Rollback path -->
  <rect x="50" y="440" width="380" height="45" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <rect x="50" y="440" width="380" height="36" rx="10" fill="#cc4444" opacity="0.9"/>
  <rect x="50" y="464" width="380" height="8" fill="#cc4444" opacity="0.9"/>
  <text x="240" y="466" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Step 3b: Green Failing -- Switch Back to Blue (ROLLBACK)</text>

  <!-- Rollback arrow -->
  <line x1="240" y1="485" x2="240" y2="270" stroke="#cc4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#bg-arrow-red)"/>
  <text x="170" y="380" text-anchor="end" font-size="9" fill="#cc4444" font-weight="600">Instant rollback</text>

  <!-- Failure detection -->
  <rect x="510" y="440" width="360" height="45" rx="10" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1.5"/>
  <text x="690" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#cc4444">Failure Detected: Error rate spike, latency degradation, or health check failure</text>
  <text x="690" y="477" text-anchor="middle" font-size="10" fill="#1a1822">Trigger: Switch LB routing from Green back to Blue</text>

  <!-- Key insight -->
  <rect x="510" y="170" width="360" height="120" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="690" y="195" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Key Properties</text>
  <text x="530" y="220" font-size="10" fill="#1a1822">Rollback speed: Seconds (LB switch)</text>
  <text x="530" y="240" font-size="10" fill="#1a1822">Infra cost: 2x during deployment</text>
  <text x="530" y="260" font-size="10" fill="#1a1822">Data: Both share same DB (backward compat required)</text>
  <text x="530" y="280" font-size="10" fill="#6d5bd0">Rollback = traffic switch, no redeploy needed</text>
</svg>
