<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>State recovery flow: failed node to fully restored service</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">State Recovery Flow</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">From failed node detection through state restoration and traffic shift</text>

  <defs>
    <marker id="arrowPf" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGf" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrowRf" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
    <marker id="arrowOf" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0ad4e"/>
    </marker>
  </defs>

  <!-- Step 1: Failed Node Detected -->
  <rect x="30" y="120" width="160" height="80" rx="12" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="120" width="160" height="28" rx="12" fill="#cc4444"/>
  <rect x="30" y="140" width="160" height="8" fill="#cc4444"/>
  <text x="110" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1. Node Fails</text>
  <text x="110" y="165" text-anchor="middle" font-size="10" fill="#1a1822">Health check fails</text>
  <text x="110" y="180" text-anchor="middle" font-size="10" fill="#1a1822">Alert triggered</text>
  <text x="110" y="195" text-anchor="middle" font-size="9" fill="#cc4444" font-weight="600">T+0s</text>

  <!-- Arrow -->
  <line x1="190" y1="160" x2="230" y2="160" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowOf)"/>
  <text x="210" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">Detect</text>

  <!-- Step 2: State Snapshot from Replica -->
  <rect x="235" y="120" width="160" height="80" rx="12" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="235" y="120" width="160" height="28" rx="12" fill="#f0ad4e"/>
  <rect x="235" y="140" width="160" height="8" fill="#f0ad4e"/>
  <text x="315" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">2. Snapshot State</text>
  <text x="315" y="165" text-anchor="middle" font-size="10" fill="#1a1822">Fetch from replica</text>
  <text x="315" y="180" text-anchor="middle" font-size="10" fill="#1a1822">WAL / snapshot copy</text>
  <text x="315" y="195" text-anchor="middle" font-size="9" fill="#f0ad4e" font-weight="600">T+5s</text>

  <!-- Arrow -->
  <line x1="395" y1="160" x2="435" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPf)"/>
  <text x="415" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Provision</text>

  <!-- Step 3: New Node Provisioned -->
  <rect x="440" y="120" width="160" height="80" rx="12" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="440" y="120" width="160" height="28" rx="12" fill="#6d5bd0"/>
  <rect x="440" y="140" width="160" height="8" fill="#6d5bd0"/>
  <text x="520" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3. Provision Node</text>
  <text x="520" y="165" text-anchor="middle" font-size="10" fill="#1a1822">EC2 / container spin</text>
  <text x="520" y="180" text-anchor="middle" font-size="10" fill="#1a1822">Image deploy + config</text>
  <text x="520" y="195" text-anchor="middle" font-size="9" fill="#6d5bd0" font-weight="600">T+30s</text>

  <!-- Arrow -->
  <line x1="600" y1="160" x2="640" y2="160" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowGf)"/>
  <text x="620" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Restore</text>

  <!-- Step 4: State Restored -->
  <rect x="645" y="120" width="160" height="80" rx="12" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="2"/>
  <rect x="645" y="120" width="160" height="28" rx="12" fill="#4caf50"/>
  <rect x="645" y="140" width="160" height="8" fill="#4caf50"/>
  <text x="725" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">4. Restore State</text>
  <text x="725" y="165" text-anchor="middle" font-size="10" fill="#1a1822">WAL replay / DB sync</text>
  <text x="725" y="180" text-anchor="middle" font-size="10" fill="#1a1822">Cache warmup</text>
  <text x="725" y="195" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="600">T+60s</text>

  <!-- Arrow down to Step 5 -->
  <line x1="725" y1="200" x2="725" y2="260" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowGf)"/>
  <text x="740" y="235" font-size="9" font-weight="600" fill="#4caf50">Verify</text>

  <!-- Step 5: Traffic Shifted -->
  <rect x="440" y="270" width="200" height="80" rx="12" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="2"/>
  <rect x="440" y="270" width="200" height="28" rx="12" fill="#4caf50"/>
  <rect x="440" y="290" width="200" height="8" fill="#4caf50"/>
  <text x="540" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">5. Shift Traffic</text>
  <text x="540" y="315" text-anchor="middle" font-size="10" fill="#1a1822">Gradual routing: 10% -&gt; 50% -&gt; 100%</text>
  <text x="540" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Monitor error rate + latency</text>
  <text x="540" y="345" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="600">T+90s</text>

  <!-- Arrow left to Step 6 -->
  <line x1="440" y1="310" x2="300" y2="310" stroke="#cc4444" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="300" y1="310" x2="300" y2="410" stroke="#cc4444" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="370" y="300" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Decommission</text>

  <!-- Step 6: Old Node Decommissioned -->
  <rect x="200" y="415" width="200" height="60" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="300" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">6. Decommission Old Node</text>
  <text x="300" y="460" text-anchor="middle" font-size="9" fill="#1a1822">Terminate, release resources, log event</text>

  <!-- Replica indicator -->
  <rect x="680" y="270" width="190" height="60" rx="12" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="775" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Replica / Healthy Node</text>
  <text x="775" y="308" text-anchor="middle" font-size="9" fill="#1a1822">Provides state snapshot</text>
  <text x="775" y="322" text-anchor="middle" font-size="9" fill="#1a1822">Continues serving traffic</text>
  <line x1="680" y1="300" x2="640" y2="300" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="725" y1="200" x2="725" y2="265" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Timeline bar -->
  <rect x="30" y="440" width="840" height="45" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="458" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Total Recovery Time: ~90-120 seconds (typical) -- Stateful recovery is dominated by WAL replay and cache warmup</text>
  <text x="450" y="476" text-anchor="middle" font-size="9" fill="#1a1822">Stateless services recover in seconds; stateful services require log replay, snapshot transfer, and consistency verification before accepting traffic.</text>
</svg>