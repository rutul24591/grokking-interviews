<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d5bd0"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Observability Pillars</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#555">Logs, Metrics, and Traces -- the three pillars of system observability</text>

  <!-- Column 1: Logs -->
  <rect x="40" y="100" width="260" height="370" rx="12" fill="#fff" stroke="#cc4444" stroke-width="2"/>
  <rect x="40" y="100" width="260" height="48" rx="12" fill="#cc4444"/>
  <rect x="40" y="130" width="260" height="18" fill="#cc4444"/>
  <text x="170" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Logs</text>

  <!-- Icon -->
  <rect x="120" y="165" width="100" height="60" rx="8" fill="#fef0f0" stroke="#cc4444" stroke-width="1"/>
  <text x="170" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#cc4444">&#128221; What happened</text>
  <text x="170" y="212" text-anchor="middle" font-size="11" fill="#666">Discrete events</text>

  <!-- Examples -->
  <rect x="60" y="245" width="220" height="100" rx="8" fill="#fef0f0"/>
  <text x="170" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Examples</text>
  <text x="75" y="290" font-size="10" fill="#444">[ERROR] 2024-01-15 10:23:45</text>
  <text x="75" y="305" font-size="10" fill="#444">Connection timeout to DB</text>
  <text x="75" y="320" font-size="10" fill="#444">after 30s on service-auth</text>
  <text x="75" y="335" font-size="10" fill="#444">req_id=abc123 user=456</text>

  <!-- Tools -->
  <rect x="60" y="360" width="220" height="90" rx="8" fill="#f8f8f8"/>
  <text x="170" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Common Tools</text>
  <text x="170" y="405" text-anchor="middle" font-size="11" fill="#444">ELK Stack, Splunk</text>
  <text x="170" y="422" text-anchor="middle" font-size="11" fill="#444">Datadog Log Management</text>
  <text x="170" y="439" text-anchor="middle" font-size="11" fill="#444">CloudWatch Logs</text>

  <!-- Column 2: Metrics -->
  <rect x="320" y="100" width="260" height="370" rx="12" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="320" y="100" width="260" height="48" rx="12" fill="#f0ad4e"/>
  <rect x="320" y="130" width="260" height="18" fill="#f0ad4e"/>
  <text x="450" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Metrics</text>

  <!-- Icon -->
  <rect x="400" y="165" width="100" height="60" rx="8" fill="#fef8ef" stroke="#f0ad4e" stroke-width="1"/>
  <text x="450" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#f0ad4e">&#128200; How is it doing</text>
  <text x="450" y="212" text-anchor="middle" font-size="11" fill="#666">Aggregated numbers</text>

  <!-- Examples -->
  <rect x="340" y="245" width="220" height="100" rx="8" fill="#fef8ef"/>
  <text x="450" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Examples</text>
  <text x="355" y="290" font-size="10" fill="#444">CPU Usage: 78.5%</text>
  <text x="355" y="305" font-size="10" fill="#444">P99 Latency: 245ms</text>
  <text x="355" y="320" font-size="10" fill="#444">Error Rate: 2.3%</text>
  <text x="355" y="335" font-size="10" fill="#444">Requests/sec: 12,450</text>

  <!-- Tools -->
  <rect x="340" y="360" width="220" height="90" rx="8" fill="#f8f8f8"/>
  <text x="450" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Common Tools</text>
  <text x="450" y="405" text-anchor="middle" font-size="11" fill="#444">Prometheus, Grafana</text>
  <text x="450" y="422" text-anchor="middle" font-size="11" fill="#444">Datadog, New Relic</text>
  <text x="450" y="439" text-anchor="middle" font-size="11" fill="#444">CloudWatch Metrics</text>

  <!-- Column 3: Traces -->
  <rect x="600" y="100" width="260" height="370" rx="12" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <rect x="600" y="100" width="260" height="48" rx="12" fill="#4caf50"/>
  <rect x="600" y="130" width="260" height="18" fill="#4caf50"/>
  <text x="730" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Traces</text>

  <!-- Icon -->
  <rect x="680" y="165" width="100" height="60" rx="8" fill="#f0f9f0" stroke="#4caf50" stroke-width="1"/>
  <text x="730" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="#4caf50">&#128269; Why it happened</text>
  <text x="730" y="212" text-anchor="middle" font-size="11" fill="#666">Request lifecycle</text>

  <!-- Examples -->
  <rect x="620" y="245" width="220" height="100" rx="8" fill="#f0f9f0"/>
  <text x="730" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Examples</text>
  <text x="635" y="290" font-size="10" fill="#444">Trace: req_abc123</text>
  <text x="635" y="305" font-size="10" fill="#444">  API Gateway: 12ms</text>
  <text x="635" y="320" font-size="10" fill="#444">  Auth Service: 45ms</text>
  <text x="635" y="335" font-size="10" fill="#444">  DB Query: 188ms</text>

  <!-- Tools -->
  <rect x="620" y="360" width="220" height="90" rx="8" fill="#f8f8f8"/>
  <text x="730" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Common Tools</text>
  <text x="730" y="405" text-anchor="middle" font-size="11" fill="#444">Jaeger, Zipkin</text>
  <text x="730" y="422" text-anchor="middle" font-size="11" fill="#444">OpenTelemetry</text>
  <text x="730" y="439" text-anchor="middle" font-size="11" fill="#444">AWS X-Ray</text>
</svg>
