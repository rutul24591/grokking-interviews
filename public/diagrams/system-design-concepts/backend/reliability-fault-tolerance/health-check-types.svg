<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d5bd0"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Health Check Types</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#555">Liveness, Readiness, and Startup probes -- purpose, configuration, and failure behavior</text>

  <!-- Column 1: Liveness -->
  <rect x="40" y="100" width="260" height="370" rx="12" fill="#fff" stroke="#4caf50" stroke-width="2"/>
  <rect x="40" y="100" width="260" height="48" rx="12" fill="#4caf50"/>
  <rect x="40" y="130" width="260" height="18" fill="#4caf50"/>
  <text x="170" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Liveness Probe</text>

  <!-- Purpose -->
  <rect x="60" y="165" width="220" height="70" rx="8" fill="#f0f9f0" stroke="#4caf50" stroke-width="1"/>
  <text x="170" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#4caf50">Is the process running?</text>
  <text x="170" y="212" text-anchor="middle" font-size="11" fill="#444">Detects deadlocks, crashes</text>
  <text x="170" y="228" text-anchor="middle" font-size="11" fill="#444">Restarts unhealthy containers</text>

  <!-- Configuration -->
  <rect x="60" y="255" width="220" height="90" rx="8" fill="#f8f8f8"/>
  <text x="170" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Configuration</text>
  <text x="80" y="300" font-size="11" fill="#444">Interval: 10 seconds</text>
  <text x="80" y="318" font-size="11" fill="#444">Timeout: 3 seconds</text>
  <text x="80" y="336" font-size="11" fill="#444">Failure threshold: 3</text>

  <!-- Failure Action -->
  <rect x="60" y="360" width="220" height="90" rx="8" fill="#fef0f0" stroke="#cc4444" stroke-width="1"/>
  <text x="170" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc4444">Failure Action</text>
  <text x="170" y="405" text-anchor="middle" font-size="11" fill="#444">Kill and restart</text>
  <text x="170" y="422" text-anchor="middle" font-size="11" fill="#444">the container (restart</text>
  <text x="170" y="439" text-anchor="middle" font-size="11" fill="#444">policy applies)</text>

  <!-- Column 2: Readiness -->
  <rect x="320" y="100" width="260" height="370" rx="12" fill="#fff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="320" y="100" width="260" height="48" rx="12" fill="#f0ad4e"/>
  <rect x="320" y="130" width="260" height="18" fill="#f0ad4e"/>
  <text x="450" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Readiness Probe</text>

  <!-- Purpose -->
  <rect x="340" y="165" width="220" height="70" rx="8" fill="#fef8ef" stroke="#f0ad4e" stroke-width="1"/>
  <text x="450" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0ad4e">Ready to serve traffic?</text>
  <text x="450" y="212" text-anchor="middle" font-size="11" fill="#444">Checks dependencies, warm-up</text>
  <text x="450" y="228" text-anchor="middle" font-size="11" fill="#444">Removes from service endpoints</text>

  <!-- Configuration -->
  <rect x="340" y="255" width="220" height="90" rx="8" fill="#f8f8f8"/>
  <text x="450" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Configuration</text>
  <text x="360" y="300" font-size="11" fill="#444">Interval: 5 seconds</text>
  <text x="360" y="318" font-size="11" fill="#444">Timeout: 3 seconds</text>
  <text x="360" y="336" font-size="11" fill="#444">Failure threshold: 3</text>

  <!-- Failure Action -->
  <rect x="340" y="360" width="220" height="90" rx="8" fill="#fef0f0" stroke="#cc4444" stroke-width="1"/>
  <text x="450" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc4444">Failure Action</text>
  <text x="450" y="405" text-anchor="middle" font-size="11" fill="#444">Remove from Service</text>
  <text x="450" y="422" text-anchor="middle" font-size="11" fill="#444">endpoints (no traffic</text>
  <text x="450" y="439" text-anchor="middle" font-size="11" fill="#444">routed, container lives)</text>

  <!-- Column 3: Startup -->
  <rect x="600" y="100" width="260" height="370" rx="12" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="600" y="100" width="260" height="48" rx="12" fill="#6d5bd0"/>
  <rect x="600" y="130" width="260" height="18" fill="#6d5bd0"/>
  <text x="730" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Startup Probe</text>

  <!-- Purpose -->
  <rect x="620" y="165" width="220" height="70" rx="8" fill="#f8f7fc" stroke="#6d5bd0" stroke-width="1"/>
  <text x="730" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">Is the app initializing?</text>
  <text x="730" y="212" text-anchor="middle" font-size="11" fill="#444">Slow startup, migrations</text>
  <text x="730" y="228" text-anchor="middle" font-size="11" fill="#444">Disables other probes until success</text>

  <!-- Configuration -->
  <rect x="620" y="255" width="220" height="90" rx="8" fill="#f8f8f8"/>
  <text x="730" y="278" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Configuration</text>
  <text x="640" y="300" font-size="11" fill="#444">Interval: 10 seconds</text>
  <text x="640" y="318" font-size="11" fill="#444">Timeout: 5 seconds</text>
  <text x="640" y="336" font-size="11" fill="#444">Failure threshold: 30</text>

  <!-- Failure Action -->
  <rect x="620" y="360" width="220" height="90" rx="8" fill="#fef0f0" stroke="#cc4444" stroke-width="1"/>
  <text x="730" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc4444">Failure Action</text>
  <text x="730" y="405" text-anchor="middle" font-size="11" fill="#444">Kill and restart the</text>
  <text x="730" y="422" text-anchor="middle" font-size="11" fill="#444">container (failed to</text>
  <text x="730" y="439" text-anchor="middle" font-size="11" fill="#444">start in time)</text>
</svg>
