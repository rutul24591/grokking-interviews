<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>DNS failover architecture with health checker monitoring primary and secondary</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">DNS Failover Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Client resolution through DNS with health-checked primary and standby secondary failover target</text>

  <!-- Client -->
  <rect x="350" y="70" width="200" height="70" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Client / Browser</text>
  <text x="450" y="118" text-anchor="middle" font-size="10" fill="#1a1822">"What is api.example.com?"</text>

  <!-- Arrow down to DNS -->
  <line x1="450" y1="140" x2="450" y2="185" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowDNS)"/>
  <text x="475" y="168" font-size="9" fill="#6d5bd0" font-weight="600">DNS Query</text>

  <!-- DNS Resolver -->
  <rect x="320" y="185" width="260" height="80" rx="12" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="213" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">DNS Resolver (Route53 / CloudFlare)</text>
  <text x="450" y="233" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">Authoritative nameserver with health check integration</text>
  <text x="450" y="250" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">TTL: 60 seconds for fast failover</text>

  <!-- Arrow to Primary -->
  <line x1="370" y1="265" x2="200" y2="330" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowDNSgreen)"/>
  <text x="250" y="290" font-size="9" fill="#4caf50" font-weight="600">Healthy</text>
  <text x="250" y="302" font-size="9" fill="#4caf50" font-weight="600">Return A: 10.0.1.1</text>

  <!-- Arrow to Secondary -->
  <line x1="530" y1="265" x2="700" y2="330" stroke="#f0ad4e" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowDNSorange)"/>
  <text x="640" y="290" font-size="9" fill="#f0ad4e" font-weight="600">Standby</text>
  <text x="640" y="302" font-size="9" fill="#f0ad4e" font-weight="600">A: 10.0.2.1</text>

  <!-- Primary Region -->
  <rect x="50" y="330" width="280" height="140" rx="12" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="50" y="330" width="280" height="30" rx="12" fill="#4caf50"/>
  <rect x="50" y="355" width="280" height="5" fill="#4caf50"/>
  <text x="190" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Primary Region (us-east-1)</text>

  <rect x="70" y="375" width="110" height="40" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="125" y="393" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Web Servers</text>
  <text x="125" y="408" text-anchor="middle" font-size="9" fill="#1a1822">Auto-scaling group</text>

  <rect x="200" y="375" width="110" height="40" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="255" y="393" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Database</text>
  <text x="255" y="408" text-anchor="middle" font-size="9" fill="#1a1822">Primary writer</text>

  <rect x="70" y="425" width="240" height="30" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="190" y="445" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Status: HEALTHY - Serving 100% traffic</text>

  <!-- Secondary Region -->
  <rect x="570" y="330" width="280" height="140" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="570" y="330" width="280" height="30" rx="12" fill="#f0ad4e"/>
  <rect x="570" y="355" width="280" height="5" fill="#f0ad4e"/>
  <text x="710" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Secondary Region (us-west-2)</text>

  <rect x="590" y="375" width="110" height="40" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="645" y="393" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Web Servers</text>
  <text x="645" y="408" text-anchor="middle" font-size="9" fill="#1a1822">Scaled down / idle</text>

  <rect x="720" y="375" width="110" height="40" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="775" y="393" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Database</text>
  <text x="775" y="408" text-anchor="middle" font-size="9" fill="#1a1822">Read replica / standby</text>

  <rect x="590" y="425" width="240" height="30" rx="6" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="710" y="445" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Status: STANDBY - Ready to take over</text>

  <!-- Health Checker -->
  <rect x="320" y="330" width="200" height="100" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="320" y="330" width="200" height="25" rx="12" fill="#cc4444"/>
  <rect x="320" y="350" width="200" height="5" fill="#cc4444"/>
  <text x="420" y="348" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Health Checker</text>

  <line x1="370" y1="365" x2="330" y2="395" stroke="#4caf50" stroke-width="1" marker-end="url(#arrowDNSgreen)"/>
  <text x="340" y="385" font-size="7" fill="#4caf50">TCP:80</text>

  <line x1="470" y1="365" x2="570" y2="395" stroke="#f0ad4e" stroke-width="1" marker-end="url(#arrowDNSorange)"/>
  <text x="530" y="385" font-size="7" fill="#f0ad4e">TCP:80</text>

  <rect x="340" y="400" width="160" height="22" rx="4" fill="#4caf50" opacity="0.1"/>
  <text x="420" y="415" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="600">Primary: PASS (200 OK)</text>

  <rect x="340" y="400" width="160" height="22" rx="4" fill="#4caf50" opacity="0.1"/>
  <text x="420" y="415" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="600">Primary: PASS (200 OK)</text>

  <!-- Failover scenario box -->
  <rect x="320" y="440" width="200" height="30" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="420" y="453" text-anchor="middle" font-size="8" fill="#cc4444">On failure: DNS switches</text>
  <text x="420" y="464" text-anchor="middle" font-size="8" fill="#cc4444">to secondary after TTL expires</text>

  <!-- TTL Note -->
  <rect x="30" y="475" width="840" height="18" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="488" text-anchor="middle" font-size="9" fill="#1a1822">TTL Consider: Lower TTL (30-60s) enables faster failover but increases DNS query load. Higher TTL (300s+) reduces load but increases failover time. Balance based on RTO requirements.</text>

  <defs>
    <marker id="arrowDNS" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowDNSgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrowDNSorange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0ad4e"/>
    </marker>
  </defs>
</svg>