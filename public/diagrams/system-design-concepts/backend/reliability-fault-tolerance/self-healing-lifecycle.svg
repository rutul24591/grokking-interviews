<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Self-healing lifecycle: detect, diagnose, remediate, verify</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Self-Healing Lifecycle</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Continuous loop from failure detection back to healthy state</text>

  <defs>
    <marker id="arrowPh" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Stage 1: Detection -->
  <rect x="30" y="110" width="190" height="100" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="110" width="190" height="30" rx="12" fill="#cc4444"/>
  <rect x="30" y="130" width="190" height="10" fill="#cc4444"/>
  <text x="125" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1. Detection</text>
  <text x="125" y="160" text-anchor="middle" font-size="10" fill="#1a1822">Health check fails</text>
  <text x="125" y="175" text-anchor="middle" font-size="10" fill="#1a1822">Error rate spikes</text>
  <text x="125" y="190" text-anchor="middle" font-size="10" fill="#1a1822">Timeout threshold hit</text>
  <text x="125" y="205" text-anchor="middle" font-size="9" fill="#cc4444" font-weight="600">Trigger alert</text>

  <!-- Arrow 1 to 2 -->
  <line x1="220" y1="160" x2="285" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPh)"/>
  <text x="252" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Alert</text>

  <!-- Stage 2: Diagnosis -->
  <rect x="290" y="110" width="190" height="100" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="290" y="110" width="190" height="30" rx="12" fill="#f0ad4e"/>
  <rect x="290" y="130" width="190" height="10" fill="#f0ad4e"/>
  <text x="385" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2. Diagnosis</text>
  <text x="385" y="160" text-anchor="middle" font-size="10" fill="#1a1822">Analyze root cause</text>
  <text x="385" y="175" text-anchor="middle" font-size="10" fill="#1a1822">Classify failure type</text>
  <text x="385" y="190" text-anchor="middle" font-size="10" fill="#1a1822">Scope blast radius</text>
  <text x="385" y="205" text-anchor="middle" font-size="9" fill="#f0ad4e" font-weight="600">Pick recovery action</text>

  <!-- Arrow 2 to 3 -->
  <line x1="480" y1="160" x2="545" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPh)"/>
  <text x="512" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Action</text>

  <!-- Stage 3: Remediation -->
  <rect x="550" y="110" width="190" height="100" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="550" y="110" width="190" height="30" rx="12" fill="#6d5bd0"/>
  <rect x="550" y="130" width="190" height="10" fill="#6d5bd0"/>
  <text x="645" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3. Remediation</text>
  <text x="645" y="160" text-anchor="middle" font-size="10" fill="#1a1822">Restart instance</text>
  <text x="645" y="175" text-anchor="middle" font-size="10" fill="#1a1822">Replace with new node</text>
  <text x="645" y="190" text-anchor="middle" font-size="10" fill="#1a1822">Rollback to previous</text>
  <text x="645" y="205" text-anchor="middle" font-size="9" fill="#6d5bd0" font-weight="600">Execute recovery</text>

  <!-- Arrow 3 to 4 -->
  <line x1="740" y1="160" x2="805" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPh)"/>
  <text x="772" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Wait</text>

  <!-- Stage 4: Verification -->
  <rect x="680" y="280" width="190" height="100" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="680" y="280" width="190" height="30" rx="12" fill="#f0ad4e"/>
  <rect x="680" y="300" width="190" height="10" fill="#f0ad4e"/>
  <text x="775" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4. Verification</text>
  <text x="775" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Health check passes</text>
  <text x="775" y="345" text-anchor="middle" font-size="10" fill="#1a1822">Error rate normalized</text>
  <text x="775" y="360" text-anchor="middle" font-size="10" fill="#1a1822">Latency within SLO</text>
  <text x="775" y="375" text-anchor="middle" font-size="9" fill="#f0ad4e" font-weight="600">System healthy?</text>

  <!-- Arrow 3 down to 4 -->
  <line x1="645" y1="210" x2="645" y2="330" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="645" y1="330" x2="675" y2="330" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPh)"/>

  <!-- Arrow 4 back to 1: Success path -->
  <line x1="680" y1="330" x2="450" y2="330" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowPh)"/>
  <text x="565" y="320" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Healthy -- back to monitoring</text>

  <!-- Arrow 4 back to 1: Failure path -->
  <line x1="680" y1="355" x2="220" y2="355" stroke="#cc4444" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="220" y1="355" x2="220" y2="215" stroke="#cc4444" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="220" y1="215" x2="220" y2="215" stroke="#cc4444" stroke-width="2"/>
  <line x1="220" y1="215" x2="125" y2="215" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowPh)"/>
  <text x="450" y="368" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Still unhealthy -- escalate to next recovery action</text>

  <!-- Normal state -->
  <rect x="300" y="280" width="220" height="100" rx="12" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="2"/>
  <text x="410" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#4caf50">System Healthy</text>
  <text x="410" y="338" text-anchor="middle" font-size="10" fill="#1a1822">Continuous monitoring</text>
  <text x="410" y="353" text-anchor="middle" font-size="10" fill="#1a1822">All SLOs within bounds</text>
  <text x="410" y="368" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="600">Normal operation</text>

  <!-- Arrow from monitoring to detection (failure) -->
  <line x1="300" y1="330" x2="220" y2="330" stroke="#cc4444" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="220" y1="330" x2="220" y2="215" stroke="#cc4444" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="220" y1="215" x2="125" y2="215" stroke="#cc4444" stroke-width="2"/>
  <text x="260" y="345" font-size="8" fill="#cc4444" font-weight="600">Failure</text>
</svg>