<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Canary Deployment Rollback</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#6d5bd0">Gradual traffic shift with monitoring gates at each stage, rollback at any point if metrics degrade</text>

  <defs>
    <marker id="can-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="can-arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="can-arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
  </defs>

  <!-- Progression stages across the top -->
  <!-- Stage 1: 5% -->
  <rect x="30" y="80" width="160" height="140" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="1.5"/>
  <rect x="30" y="80" width="160" height="34" rx="10" fill="#4caf50"/>
  <rect x="30" y="102" width="160" height="8" fill="#4caf50"/>
  <text x="110" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Stage 1: 5%</text>

  <!-- Traffic split visual -->
  <rect x="50" y="125" width="120" height="20" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <rect x="50" y="125" width="6" height="20" rx="4" fill="#6d5bd0"/>
  <rect x="56" y="125" width="114" height="20" rx="4" fill="#4caf50"/>
  <text x="110" y="140" text-anchor="middle" font-size="8" fill="#1a1822">5% new | 95% stable</text>

  <rect x="45" y="155" width="130" height="25" rx="4" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="110" y="172" text-anchor="middle" font-size="9" fill="#1a1822">Monitor 15 min</text>
  <text x="110" y="186" text-anchor="middle" font-size="8" fill="#6d5bd0">Check error rate, latency</text>
  <text x="110" y="200" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="600">Metrics OK</text>

  <!-- Arrow to Stage 2 -->
  <line x1="190" y1="150" x2="250" y2="150" stroke="#4caf50" stroke-width="2" marker-end="url(#can-arrow-green)"/>
  <text x="220" y="142" text-anchor="middle" font-size="8" fill="#4caf50">Pass</text>

  <!-- Stage 2: 25% -->
  <rect x="250" y="80" width="160" height="140" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="1.5"/>
  <rect x="250" y="80" width="160" height="34" rx="10" fill="#f0ad4e"/>
  <rect x="250" y="102" width="160" height="8" fill="#f0ad4e"/>
  <text x="330" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Stage 2: 25%</text>

  <rect x="270" y="125" width="120" height="20" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <rect x="270" y="125" width="30" height="20" rx="4" fill="#6d5bd0"/>
  <rect x="300" y="125" width="90" height="20" rx="4" fill="#4caf50"/>
  <text x="330" y="140" text-anchor="middle" font-size="8" fill="#1a1822">25% new | 75% stable</text>

  <rect x="265" y="155" width="130" height="25" rx="4" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="330" y="172" text-anchor="middle" font-size="9" fill="#1a1822">Monitor 15 min</text>
  <text x="330" y="186" text-anchor="middle" font-size="8" fill="#6d5bd0">Check error rate, latency</text>
  <text x="330" y="200" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="600">Metrics OK</text>

  <!-- Arrow to Stage 3 -->
  <line x1="410" y1="150" x2="470" y2="150" stroke="#4caf50" stroke-width="2" marker-end="url(#can-arrow-green)"/>
  <text x="440" y="142" text-anchor="middle" font-size="8" fill="#4caf50">Pass</text>

  <!-- Stage 3: 50% -->
  <rect x="470" y="80" width="160" height="140" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="470" y="80" width="160" height="34" rx="10" fill="#cc4444"/>
  <rect x="470" y="102" width="160" height="8" fill="#cc4444"/>
  <text x="550" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Stage 3: 50%</text>

  <rect x="490" y="125" width="120" height="20" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <rect x="490" y="125" width="60" height="20" rx="4" fill="#6d5bd0"/>
  <rect x="550" y="125" width="60" height="20" rx="4" fill="#4caf50"/>
  <text x="550" y="140" text-anchor="middle" font-size="8" fill="#1a1822">50% new | 50% stable</text>

  <rect x="485" y="155" width="130" height="25" rx="4" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1.5"/>
  <text x="550" y="172" text-anchor="middle" font-size="9" fill="#1a1822">Monitor 30 min</text>
  <text x="550" y="186" text-anchor="middle" font-size="8" fill="#6d5bd0">Check error rate, latency</text>
  <text x="550" y="200" text-anchor="middle" font-size="9" fill="#cc4444" font-weight="700">ERROR SPIKE</text>

  <!-- FAILURE: Rollback path down -->
  <line x1="550" y1="220" x2="550" y2="280" stroke="#cc4444" stroke-width="2.5" marker-end="url(#can-arrow-red)"/>
  <text x="600" y="255" font-size="10" fill="#cc4444" font-weight="700">FAILURE DETECTED</text>

  <!-- ROLLBACK action -->
  <rect x="380" y="280" width="340" height="70" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <rect x="380" y="280" width="340" height="34" rx="10" fill="#cc4444"/>
  <rect x="380" y="302" width="340" height="8" fill="#cc4444"/>
  <text x="550" y="303" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Rollback: Shift 100% to Stable</text>

  <text x="550" y="335" text-anchor="middle" font-size="10" fill="#1a1822">Stop canary rollout. Route all traffic back to stable version.</text>

  <!-- Arrow back to stable -->
  <line x1="380" y1="315" x2="110" y2="315" stroke="#cc4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#can-arrow-red)"/>

  <!-- Stable version state -->
  <rect x="30" y="280" width="280" height="70" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="280" width="280" height="34" rx="10" fill="#4caf50"/>
  <rect x="30" y="302" width="280" height="8" fill="#4caf50"/>
  <text x="170" y="303" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Stable Version (v1.0) Serving 100%</text>

  <text x="170" y="335" text-anchor="middle" font-size="10" fill="#1a1822">All traffic restored to stable. Users unaffected by canary issue.</text>

  <!-- Investigation box -->
  <rect x="380" y="370" width="490" height="110" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="380" y="370" width="490" height="34" rx="10" fill="#6d5bd0"/>
  <rect x="380" y="392" width="490" height="8" fill="#6d5bd0"/>
  <text x="625" y="393" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Post-Rollback Investigation</text>

  <rect x="400" y="418" width="140" height="50" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="470" y="438" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Root Cause</text>
  <text x="470" y="456" text-anchor="middle" font-size="9" fill="#1a1822">Analyze canary logs</text>

  <rect x="555" y="418" width="140" height="50" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="625" y="438" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Fix Deploy</text>
  <text x="625" y="456" text-anchor="middle" font-size="9" fill="#1a1822">Build v2.1 with fix</text>

  <rect x="710" y="418" width="140" height="50" rx="8" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="780" y="438" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Re-canary</text>
  <text x="780" y="456" text-anchor="middle" font-size="9" fill="#1a1822">Start rollout again</text>

  <!-- Monitoring gate details -->
  <rect x="30" y="370" width="330" height="110" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="195" y="393" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Monitoring Gates Between Stages</text>

  <text x="45" y="415" font-size="9" fill="#1a1822">Error rate: Must stay below SLO threshold</text>
  <text x="45" y="432" font-size="9" fill="#1a1822">P95 latency: No significant degradation</text>
  <text x="45" y="449" font-size="9" fill="#1a1822">Resource utilization: CPU, memory, connections</text>
  <text x="45" y="466" font-size="9" fill="#1a1822">Business metrics: Conversion, order rate, etc.</text>
</svg>
