<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">CRDT Replication and Convergence</title>
  <desc id="desc">CRDT showing concurrent updates and merge convergence</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">CRDT: Conflict-Free Replicated Data Types</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Concurrent updates converge without coordination</text>
  
  <!-- Initial State -->
  <rect x="30" y="85" width="180" height="100" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="120" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6)">Initial State</text>
  <rect x="50" y="125" width="140" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="120" y="150" text-anchor="middle" font-size="10" fill="white">Shopping Cart</text>
  <text x="120" y="165" text-anchor="middle" font-size="9" fill="#bfdbfe">Items: [A, B]</text>
  
  <!-- Arrows to replicas -->
  <line x1="210" y1="135" x2="280" y2="135" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="125" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Replicate</text>
  
  <line x1="210" y1="155" x2="280" y2="185" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Replica A -->
  <rect x="280" y="85" width="200" height="150" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="380" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Replica A</text>
  
  <rect x="300" y="125" width="160" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="380" y="150" text-anchor="middle" font-size="10" fill="white">Cart: [A, B]</text>
  <text x="380" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">Version: 1</text>
  
  <!-- Concurrent update on A -->
  <rect x="300" y="185" width="160" height="40" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="380" y="205" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">User 1 adds: C</text>
  <text x="380" y="220" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">Cart: [A, B, C]</text>
  
  <!-- Replica B -->
  <rect x="280" y="265" width="200" height="150" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="380" y="290" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #8b5cf6">Replica B</text>
  
  <rect x="300" y="305" width="160" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="380" y="330" text-anchor="middle" font-size="10" fill="white">Cart: [A, B]</text>
  <text x="380" y="345" text-anchor="middle" font-size="8" fill="#c4b5fd">Version: 1</text>
  
  <!-- Concurrent update on B -->
  <rect x="300" y="365" width="160" height="40" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="380" y="385" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">User 2 adds: D</text>
  <text x="380" y="400" text-anchor="middle" font-size="8" fill="var(--text-theme, #8b5cf6">Cart: [A, B, D]</text>
  
  <!-- Sync arrows -->
  <path d="M 480 185 Q 550 225 480 265" fill="none" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="530" y="220" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Sync</text>
  
  <path d="M 480 365 Q 550 325 480 285" fill="none" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Merged State -->
  <rect x="580" y="85" width="290" height="330" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="725" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #f59e0b">Merged State (Converged)</text>
  
  <!-- Merge visualization -->
  <rect x="600" y="125" width="250" height="80" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="725" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Merge Operation:</text>
  <text x="725" y="170" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">[A, B, C] ∪ [A, B, D]</text>
  <text x="725" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #f59e0b">= [A, B, C, D]</text>
  
  <!-- Final state on both replicas -->
  <rect x="600" y="220" width="110" height="70" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="655" y="245" text-anchor="middle" font-size="9" fill="white">Replica A</text>
  <text x="655" y="260" text-anchor="middle" font-size="8" fill="#6ee7b7">[A, B, C, D]</text>
  <text x="655" y="275" text-anchor="middle" font-size="7" fill="#6ee7b7">Version: 3</text>
  
  <rect x="730" y="220" width="110" height="70" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="785" y="245" text-anchor="middle" font-size="9" fill="white">Replica B</text>
  <text x="785" y="260" text-anchor="middle" font-size="8" fill="#c4b5fd">[A, B, C, D]</text>
  <text x="785" y="275" text-anchor="middle" font-size="7" fill="#c4b5fd">Version: 3</text>
  
  <!-- Converged indicator -->
  <line x1="710" y1="255" x2="730" y2="255" stroke="var(--text-theme, #10b981)" stroke-width="3"/>
  <text x="725" y="245" text-anchor="middle" font-size="14" fill="var(--text-theme, #10b981">✓</text>
  
  <text x="725" y="320" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981">Both replicas converge to same state!</text>
  <text x="725" y="340" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">No coordination required</text>
  <text x="725" y="360" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Order of updates doesn't matter</text>
  
  <!-- Key Properties -->
  <rect x="30" y="450" width="840" height="80" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="475" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">CRDT Properties</text>
  
  <text x="100" y="500" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">•</text>
  <text x="115" y="500" font-size="10" fill="var(--text-theme, #1e293b">Commutative: A ⊔ B = B ⊔ A</text>
  
  <text x="300" y="500" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">•</text>
  <text x="315" y="500" font-size="10" fill="var(--text-theme, #1e293b">Associative: (A ⊔ B) ⊔ C = A ⊔ (B ⊔ C)</text>
  
  <text x="550" y="500" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">•</text>
  <text x="565" y="500" font-size="10" fill="var(--text-theme, #1e293b">Idempotent: A ⊔ A = A</text>
  
  <text x="450" y="520" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981">These properties guarantee convergence regardless of update order</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
