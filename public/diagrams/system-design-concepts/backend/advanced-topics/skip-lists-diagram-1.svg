<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Skip List Structure</title>
  <desc id="desc">Skip list showing multiple levels of forward pointers</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Skip List Structure</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Layered linked lists with probabilistic height</text>
  
  <!-- Header -->
  <rect x="30" y="85" width="80" height="40" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="70" y="105" text-anchor="middle" font-size="10" fill="white">Header</text>
  <text x="70" y="120" text-anchor="middle" font-size="8" fill="#bfdbfe">Start here</text>
  
  <!-- Level 4 (top) -->
  <line x1="110" y1="105" x2="250" y2="105" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="250" y="85" width="70" height="40" rx="4" fill="var(--bg-theme, #a78bfa)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="285" y="105" text-anchor="middle" font-size="10" fill="white">25</text>
  <text x="285" y="120" text-anchor="middle" font-size="7" fill="#c4b5fd">Level 4</text>
  
  <line x1="320" y1="105" x2="500" y2="105" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="500" y="85" width="70" height="40" rx="4" fill="var(--bg-theme, #a78bfa)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="535" y="105" text-anchor="middle" font-size="10" fill="white">60</text>
  <text x="535" y="120" text-anchor="middle" font-size="7" fill="#c4b5fd">Level 4</text>
  
  <line x1="570" y1="105" x2="750" y2="105" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="750" y="85" width="70" height="40" rx="4" fill="var(--bg-theme, #a78bfa)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="785" y="105" text-anchor="middle" font-size="10" fill="white">85</text>
  <text x="785" y="120" text-anchor="middle" font-size="7" fill="#c4b5fd">Level 4</text>
  
  <!-- Level 3 -->
  <line x1="110" y1="165" x2="180" y2="165" stroke="var(--text-theme, #6366f1)" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <rect x="180" y="145" width="70" height="40" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="215" y="165" text-anchor="middle" font-size="10" fill="white">12</text>
  <text x="215" y="180" text-anchor="middle" font-size="7" fill="#c4b5fd">Level 3</text>
  
  <line x1="250" y1="165" x2="320" y2="165" stroke="var(--text-theme, #6366f1)" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <rect x="320" y="145" width="70" height="40" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="355" y="165" text-anchor="middle" font-size="10" fill="white">37</text>
  <text x="355" y="180" text-anchor="middle" font-size="7" fill="#c4b5fd">Level 3</text>
  
  <line x1="390" y1="165" x2="500" y2="165" stroke="var(--text-theme, #6366f1)" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <rect x="500" y="145" width="70" height="40" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="535" y="165" text-anchor="middle" font-size="10" fill="white">60</text>
  <text x="535" y="180" text-anchor="middle" font-size="7" fill="#c4b5fd">Level 3</text>
  
  <line x1="570" y1="165" x2="680" y2="165" stroke="var(--text-theme, #6366f1)" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <rect x="680" y="145" width="70" height="40" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="715" y="165" text-anchor="middle" font-size="10" fill="white">75</text>
  <text x="715" y="180" text-anchor="middle" font-size="7" fill="#c4b5fd">Level 3</text>
  
  <line x1="750" y1="165" x2="820" y2="165" stroke="var(--text-theme, #6366f1)" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <rect x="820" y="145" width="70" height="40" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="855" y="165" text-anchor="middle" font-size="10" fill="white">93</text>
  <text x="855" y="180" text-anchor="middle" font-size="7" fill="#c4b5fd">Level 3</text>
  
  <!-- Level 2 -->
  <line x1="110" y1="225" x2="150" y2="225" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="150" y="205" width="60" height="40" rx="4" fill="var(--bg-theme, #60a5fa)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="180" y="225" text-anchor="middle" font-size="10" fill="white">6</text>
  <text x="180" y="240" text-anchor="middle" font-size="7" fill="#bfdbfe">Level 2</text>
  
  <line x1="210" y1="225" x2="250" y2="225" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="250" y="205" width="60" height="40" rx="4" fill="var(--bg-theme, #60a5fa)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="280" y="225" text-anchor="middle" font-size="10" fill="white">25</text>
  <text x="280" y="240" text-anchor="middle" font-size="7" fill="#bfdbfe">Level 2</text>
  
  <line x1="310" y1="225" x2="355" y2="225" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="355" y="205" width="60" height="40" rx="4" fill="var(--bg-theme, #60a5fa)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="385" y="225" text-anchor="middle" font-size="10" fill="white">42</text>
  <text x="385" y="240" text-anchor="middle" font-size="7" fill="#bfdbfe">Level 2</text>
  
  <line x1="415" y1="225" x2="500" y2="225" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="500" y="205" width="60" height="40" rx="4" fill="var(--bg-theme, #60a5fa)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="530" y="225" text-anchor="middle" font-size="10" fill="white">60</text>
  <text x="530" y="240" text-anchor="middle" font-size="7" fill="#bfdbfe">Level 2</text>
  
  <line x1="560" y1="225" x2="620" y2="225" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="620" y="205" width="60" height="40" rx="4" fill="var(--bg-theme, #60a5fa)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="650" y="225" text-anchor="middle" font-size="10" fill="white">68</text>
  <text x="650" y="240" text-anchor="middle" font-size="7" fill="#bfdbfe">Level 2</text>
  
  <line x1="680" y1="225" x2="750" y2="225" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="750" y="205" width="60" height="40" rx="4" fill="var(--bg-theme, #60a5fa)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="780" y="225" text-anchor="middle" font-size="10" fill="white">85</text>
  <text x="780" y="240" text-anchor="middle" font-size="7" fill="#bfdbfe">Level 2</text>
  
  <!-- Level 1 (bottom - all elements) -->
  <line x1="110" y1="285" x2="135" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="135" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="160" y="285" text-anchor="middle" font-size="10" fill="white">3</text>
  
  <line x1="185" y1="285" x2="210" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="210" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="235" y="285" text-anchor="middle" font-size="10" fill="white">12</text>
  
  <line x1="260" y1="285" x2="285" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="285" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="310" y="285" text-anchor="middle" font-size="10" fill="white">25</text>
  
  <line x1="335" y1="285" x2="360" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="360" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="385" y="285" text-anchor="middle" font-size="10" fill="white">37</text>
  
  <line x1="410" y1="285" x2="435" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="435" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="460" y="285" text-anchor="middle" font-size="10" fill="white">42</text>
  
  <line x1="485" y1="285" x2="510" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="510" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="535" y="285" text-anchor="middle" font-size="10" fill="white">60</text>
  
  <line x1="560" y1="285" x2="585" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="585" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="610" y="285" text-anchor="middle" font-size="10" fill="white">68</text>
  
  <line x1="635" y1="285" x2="660" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="660" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="685" y="285" text-anchor="middle" font-size="10" fill="white">75</text>
  
  <line x1="710" y1="285" x2="735" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="735" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="760" y="285" text-anchor="middle" font-size="10" fill="white">85</text>
  
  <line x1="785" y1="285" x2="810" y2="285" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="810" y="265" width="50" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="835" y="285" text-anchor="middle" font-size="10" fill="white">93</text>
  
  <!-- Level labels -->
  <text x="15" y="105" text-anchor="end" font-size="9" fill="var(--text-theme, #64748b">L4</text>
  <text x="15" y="165" text-anchor="end" font-size="9" fill="var(--text-theme, #64748b">L3</text>
  <text x="15" y="225" text-anchor="end" font-size="9" fill="var(--text-theme, #64748b">L2</text>
  <text x="15" y="285" text-anchor="end" font-size="9" fill="var(--text-theme, #64748b">L1</text>
  
  <!-- Search path example -->
  <rect x="30" y="330" width="840" height="90" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Search Example: Find 68</text>
  
  <text x="50" y="380" text-anchor="start" font-size="11" fill="var(--text-theme, #64748b">1. Start at Header, Level 4: Skip to 25, 60, 85 (overshoot!)</text>
  <text x="50" y="405" text-anchor="start" font-size="11" fill="var(--text-theme, #64748b">2. Drop to Level 3 at 60: Next is 75 (overshoot!)</text>
  <text x="50" y="430" text-anchor="start" font-size="11" fill="var(--text-theme, #64748b">3. Drop to Level 2 at 60: Next is 68 ✓ Found!</text>
  <text x="50" y="455" text-anchor="start" font-size="11" fill="var(--text-theme, #10b981">4. Total hops: 5 instead of 7 (sequential search)</text>
  
  <!-- Bottom: Key Properties -->
  <rect x="30" y="435" width="400" height="95" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="230" y="460" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Key Properties</text>
  <text x="230" y="485" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Search: O(log n) expected</text>
  <text x="230" y="505" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Insert/Delete: O(log n) expected</text>
  <text x="230" y="525" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Space: O(n) expected</text>
  
  <rect x="450" y="435" width="420" height="95" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="660" y="460" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Probabilistic Height</text>
  <text x="660" y="485" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Each node promoted with p=0.5</text>
  <text x="660" y="505" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Max level typically 16-32</text>
  <text x="660" y="525" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• No rebalancing needed!</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #8b5cf6)"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #6366f1)"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
</svg>
