<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Merkle proof showing sibling hashes needed to verify a data block is part of the tree</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Merkle Proof (Audit Path)</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">To verify block D4 is in the tree: need D4&apos;s hash + sibling hashes at each level → recompute to root</text>

  <!-- Full tree with highlighted path -->
  <!-- Root -->
  <rect x="390" y="80" width="120" height="40" rx="8" fill="#4caf50"/>
  <text x="450" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">H12345678</text>
  <text x="450" y="118" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Known Root</text>

  <!-- Level 1 -->
  <line x1="420" y1="125" x2="300" y2="170" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="480" y1="125" x2="600" y2="170" stroke="#6d5bd0" stroke-width="2"/>

  <!-- Sibling H1234 (needed) -->
  <rect x="240" y="170" width="120" height="35" rx="8" fill="#f0ad4e" stroke="#f0ad4e" stroke-width="2"/>
  <text x="300" y="192" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">H1234</text>
  <text x="300" y="205" text-anchor="middle" font-size="8" fill="#ffffff">Proof Hash 3</text>

  <rect x="540" y="170" width="120" height="35" rx="8" fill="#6d5bd0" opacity="0.5"/>
  <text x="600" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">H5678</text>

  <!-- Level 2 -->
  <line x1="280" y1="210" x2="180" y2="260" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="320" y1="210" x2="420" y2="260" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="580" y1="210" x2="500" y2="260" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="620" y1="210" x2="720" y2="260" stroke="#6d5bd0" stroke-width="1.5"/>

  <!-- Sibling H3 (needed) -->
  <rect x="370" y="260" width="100" height="35" rx="8" fill="#f0ad4e" stroke="#f0ad4e" stroke-width="2"/>
  <text x="420" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">H3</text>
  <text x="420" y="295" text-anchor="middle" font-size="8" fill="#ffffff">Proof Hash 1</text>

  <rect x="130" y="260" width="100" height="35" rx="8" fill="#6d5bd0" opacity="0.3"/>
  <text x="180" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">H12</text>

  <!-- Sibling H56 (needed) -->
  <rect x="450" y="260" width="100" height="35" rx="8" fill="#f0ad4e" stroke="#f0ad4e" stroke-width="2"/>
  <text x="500" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">H56</text>
  <text x="500" y="295" text-anchor="middle" font-size="8" fill="#ffffff">Proof Hash 2</text>

  <rect x="670" y="260" width="100" height="35" rx="8" fill="#6d5bd0" opacity="0.3"/>
  <text x="720" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">H78</text>

  <!-- Leaf Level -->
  <line x1="160" y1="300" x2="80" y2="360" stroke="#6d5bd0" stroke-width="1"/>
  <line x1="200" y1="300" x2="260" y2="360" stroke="#6d5bd0" stroke-width="1"/>
  <line x1="400" y1="300" x2="340" y2="360" stroke="#6d5bd0" stroke-width="1"/>
  <line x1="440" y1="300" x2="500" y2="360" stroke="#4caf50" stroke-width="2"/>
  <line x1="480" y1="300" x2="420" y2="360" stroke="#6d5bd0" stroke-width="1"/>
  <line x1="520" y1="300" x2="580" y2="360" stroke="#6d5bd0" stroke-width="1"/>
  <line x1="700" y1="300" x2="660" y2="360" stroke="#6d5bd0" stroke-width="1"/>
  <line x1="740" y1="300" x2="820" y2="360" stroke="#6d5bd0" stroke-width="1"/>

  <!-- Target block D4 (highlighted) -->
  <rect x="460" y="360" width="80" height="60" rx="8" fill="#4caf50" opacity="0.3" stroke="#4caf50" stroke-width="3"/>
  <text x="500" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">H(D4)</text>
  <text x="500" y="405" text-anchor="middle" font-size="9" fill="#1a1822">Target Block</text>

  <!-- Other leaves -->
  <rect x="40" y="360" width="80" height="50" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="80" y="388" text-anchor="middle" font-size="10" fill="#1a1822">H(D1)</text>
  <rect x="220" y="360" width="80" height="50" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="260" y="388" text-anchor="middle" font-size="10" fill="#1a1822">H(D2)</text>
  <rect x="300" y="360" width="80" height="50" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="340" y="388" text-anchor="middle" font-size="10" fill="#1a1822">H(D3)</text>
  <rect x="380" y="360" width="80" height="50" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="420" y="388" text-anchor="middle" font-size="10" fill="#1a1822">H(D5)</text>
  <rect x="540" y="360" width="80" height="50" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="580" y="388" text-anchor="middle" font-size="10" fill="#1a1822">H(D6)</text>
  <rect x="620" y="360" width="80" height="50" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="660" y="388" text-anchor="middle" font-size="10" fill="#1a1822">H(D7)</text>
  <rect x="780" y="360" width="80" height="50" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="820" y="388" text-anchor="middle" font-size="10" fill="#1a1822">H(D8)</text>

  <!-- Verification steps on the right -->
  <rect x="620" y="430" width="250" height="60" rx="8" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="745" y="450" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">Verification: log N hashes</text>
  <text x="745" y="468" text-anchor="middle" font-size="10" fill="#1a1822">8 blocks → 3 proof hashes</text>
  <text x="745" y="483" text-anchor="middle" font-size="10" fill="#1a1822">1M blocks → 20 proof hashes</text>

  <defs>
    <marker id="arrowMP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
