<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">HyperLogLog Concept</title>
  <desc id="desc">HyperLogLog concept diagram showing registers derived from hashed inputs</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">HyperLogLog: Cardinality Estimation</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Estimate unique counts using probabilistic registers</text>
  
  <!-- Input Stream -->
  <rect x="30" y="85" width="200" height="180" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="130" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6)">Input Stream</text>
  
  <!-- Stream items -->
  <rect x="50" y="125" width="160" height="30" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="130" y="145" text-anchor="middle" font-size="10" fill="white">"alice"</text>
  
  <rect x="50" y="160" width="160" height="30" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="130" y="180" text-anchor="middle" font-size="10" fill="white">"bob"</text>
  
  <rect x="50" y="195" width="160" height="30" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="130" y="215" text-anchor="middle" font-size="10" fill="white">"charlie"</text>
  
  <rect x="50" y="230" width="160" height="30" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="130" y="250" text-anchor="middle" font-size="10" fill="white">"alice" (duplicate)</text>
  
  <!-- Hash Function -->
  <line x1="230" y1="175" x2="280" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="255" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Hash</text>
  
  <!-- Hashing Section -->
  <rect x="280" y="85" width="280" height="180" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="420" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6)">Hash &amp; Leading Zeros</text>
  
  <!-- Hash examples -->
  <rect x="300" y="125" width="240" height="35" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="320" y="148" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">H("alice") = </text>
  <text x="400" y="148" text-anchor="start" font-size="9" font-family="monospace" fill="var(--text-theme, #8b5cf6">00010110...</text>
  <text x="520" y="148" text-anchor="end" font-size="9" fill="var(--text-theme, #10b981">→ 3 zeros</text>
  
  <rect x="300" y="165" width="240" height="35" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="320" y="188" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">H("bob") = </text>
  <text x="400" y="188" text-anchor="start" font-size="9" font-family="monospace" fill="var(--text-theme, #10b981">00001011...</text>
  <text x="520" y="188" text-anchor="end" font-size="9" fill="var(--text-theme, #10b981">→ 4 zeros</text>
  
  <rect x="300" y="205" width="240" height="35" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="320" y="228" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">H("charlie") = </text>
  <text x="400" y="228" text-anchor="start" font-size="9" font-family="monospace" fill="var(--text-theme, #f59e0b">00101100...</text>
  <text x="520" y="228" text-anchor="end" font-size="9" fill="var(--text-theme, #f59e0b">→ 2 zeros</text>
  
  <text x="420" y="255" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">More leading zeros → likely more unique items</text>
  
  <!-- Register Array -->
  <line x1="560" y1="175" x2="610" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="585" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Update</text>
  
  <rect x="610" y="85" width="260" height="180" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="740" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Register Array</text>
  
  <!-- Register visualization -->
  <rect x="630" y="125" width="35" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="647" y="143" text-anchor="middle" font-size="8" fill="white">R0</text>
  <text x="647" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">3</text>
  
  <rect x="670" y="125" width="35" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="687" y="143" text-anchor="middle" font-size="8" fill="white">R1</text>
  <text x="687" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">4</text>
  
  <rect x="710" y="125" width="35" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="727" y="143" text-anchor="middle" font-size="8" fill="white">R2</text>
  <text x="727" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">2</text>
  
  <rect x="750" y="125" width="35" height="35" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="767" y="143" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">R3</text>
  <text x="767" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #64748b">0</text>
  
  <rect x="790" y="125" width="35" height="35" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="807" y="143" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">R4</text>
  <text x="807" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #64748b">0</text>
  
  <rect x="830" y="125" width="35" height="35" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="847" y="143" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">R5</text>
  <text x="847" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #64748b">0</text>
  
  <text x="740" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Each register tracks max zeros for its bucket</text>
  <text x="740" y="205" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Bucket = first bits of hash</text>
  <text x="740" y="225" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Value = count of leading zeros</text>
  
  <!-- Bottom: Estimation Formula -->
  <rect x="30" y="280" width="840" height="130" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Cardinality Estimation</text>
  
  <!-- Formula -->
  <rect x="50" y="320" width="380" height="80" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="240" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Harmonic Mean Formula</text>
  <text x="240" y="370" text-anchor="middle" font-size="11" font-family="monospace" fill="var(--text-theme, #1e293b">cardinality ≈ α × m² / Σ(2^(-R[i]))</text>
  <text x="240" y="390" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">m = number of registers, α = bias correction</text>
  
  <!-- Error rate -->
  <rect x="450" y="320" width="400" height="80" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="650" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Error Rate</text>
  <text x="650" y="370" text-anchor="middle" font-size="11" font-family="monospace" fill="var(--text-theme, #1e293b">error ≈ 1.04 / √m</text>
  <text x="650" y="390" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">More registers = lower error</text>
  <text x="650" y="405" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">256 registers → ~6.5% error</text>
  
  <!-- Key insight -->
  <rect x="50" y="420" width="800" height="50" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="450" y="445" text-anchor="middle" font-size="11" fill="var(--text-theme, #b45309">Key Insight: Probability of k leading zeros is 1/2^k, so max zeros observed indicates cardinality</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
