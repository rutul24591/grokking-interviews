<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>HyperLogLog cardinality estimation flow and query process</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">HyperLogLog Cardinality Estimation</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Query flow: compute harmonic mean, apply bias correction, return estimate with error bound</text>

  <!-- Register state after processing -->
  <rect x="30" y="80" width="840" height="120" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Register State After Processing All Elements</text>

  <!-- Register values visualization -->
  <rect x="50" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <text x="70" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">2</text>
  <rect x="95" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.6"/>
  <text x="115" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">5</text>
  <rect x="140" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.2"/>
  <text x="160" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">1</text>
  <rect x="185" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.5"/>
  <text x="205" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">4</text>
  <rect x="230" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.4"/>
  <text x="250" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">3</text>
  <rect x="275" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.7"/>
  <text x="295" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">6</text>
  <rect x="320" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <text x="340" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">2</text>
  <rect x="365" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.8"/>
  <text x="385" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">7</text>
  <rect x="410" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.1"/>
  <text x="430" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">0</text>
  <rect x="455" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.5"/>
  <text x="475" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">4</text>
  <rect x="500" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.2"/>
  <text x="520" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">1</text>
  <rect x="545" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.4"/>
  <text x="565" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">3</text>
  <rect x="590" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.6"/>
  <text x="610" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">5</text>
  <rect x="635" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <text x="655" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">2</text>
  <rect x="680" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.9"/>
  <text x="700" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">8</text>
  <rect x="725" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.5"/>
  <text x="745" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">4</text>
  <rect x="770" y="120" width="40" height="35" rx="4" fill="#6d5bd0" opacity="0.1"/>
  <text x="790" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">0</text>
  <text x="830" y="142" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.5">...</text>

  <text x="450" y="185" text-anchor="middle" font-size="11" fill="#1a1822">16 registers shown (m=16 for illustration; production uses m=16,384)</text>

  <!-- Estimation formula -->
  <rect x="30" y="220" width="840" height="100" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="450" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#f0ad4e">Estimation Formula</text>

  <rect x="50" y="260" width="400" height="45" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="250" y="287" text-anchor="middle" font-size="13" font-weight="600" fill="#f0ad4e">Raw Estimate = α_m × m² × (Σ 2^(-M[j]))^(-1)</text>

  <rect x="470" y="260" width="380" height="45" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="660" y="287" text-anchor="middle" font-size="12" font-weight="600" fill="#4caf50">Error Bound = 1.04/√m ≈ 0.81% (for m=16,384)</text>

  <!-- Bias correction -->
  <rect x="50" y="315" width="400" height="45" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="250" y="342" text-anchor="middle" font-size="12" font-weight="600" fill="#4caf50">Small cardinality: Linear counting correction</text>

  <rect x="470" y="315" width="380" height="45" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="660" y="342" text-anchor="middle" font-size="12" font-weight="600" fill="#cc4444">Large cardinality: Hash collision correction</text>

  <!-- Query example -->
  <rect x="30" y="340" width="840" height="140" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Query Example</text>

  <rect x="50" y="380" width="250" height="85" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="175" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Input: Register Array</text>
  <text x="175" y="420" text-anchor="middle" font-size="10" fill="#1a1822">M = [2,5,1,4,3,6,2,7,0,4,1,3,5,2,8,4]</text>
  <text x="175" y="440" text-anchor="middle" font-size="10" fill="#1a1822">m = 16</text>

  <line x1="305" y1="422" x2="330" y2="422" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowHLL)"/>

  <rect x="335" y="380" width="250" height="85" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="460" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#f0ad4e">Compute Harmonic Mean</text>
  <text x="460" y="420" text-anchor="middle" font-size="10" fill="#1a1822">Σ 2^(-M[j]) = 0.25+0.031+...</text>
  <text x="460" y="440" text-anchor="middle" font-size="10" fill="#1a1822">Raw = α_16 × 256 × (Σ)^(-1)</text>

  <line x1="590" y1="422" x2="615" y2="422" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowHLL)"/>

  <rect x="620" y="380" width="230" height="85" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="735" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">Apply Bias Correction</text>
  <text x="735" y="420" text-anchor="middle" font-size="10" fill="#1a1822">Check cardinality range</text>
  <text x="735" y="440" text-anchor="middle" font-size="10" fill="#1a1822">Apply correction if needed</text>
  <text x="735" y="455" text-anchor="middle" font-size="10" font-weight="700" fill="#4caf50">Estimate: ~4,200 distinct</text>

  <defs>
    <marker id="arrowHLL" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
