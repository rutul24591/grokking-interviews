<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">B-tree vs B+ Tree Comparison</title>
  <desc id="desc">Detailed comparison of B-tree and B+ tree showing data placement and range scan behavior</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">B-tree vs B+ Tree: Data Placement</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Where data lives affects range scan efficiency</text>
  
  <!-- Left: B-tree with data everywhere -->
  <rect x="30" y="85" width="400" height="320" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6)">B-tree: Data in All Nodes</text>
  
  <!-- B-tree Root with data -->
  <rect x="150" y="125" width="160" height="60" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="230" y="148" text-anchor="middle" font-size="11" fill="white">Keys: [50 | 100]</text>
  <text x="230" y="165" text-anchor="middle" font-size="9" fill="#bfdbfe">Data: Records for 50, 100</text>
  <text x="230" y="178" text-anchor="middle" font-size="8" fill="#93c5fd">Internal node has data</text>
  
  <!-- B-tree Level 1 with data -->
  <rect x="70" y="215" width="120" height="55" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="130" y="235" text-anchor="middle" font-size="9" fill="white">Keys: [20 | 35]</text>
  <text x="130" y="250" text-anchor="middle" font-size="8" fill="#6ee7b7">Data: 20, 35</text>
  <text x="130" y="263" text-anchor="middle" font-size="7" fill="#a7f3d0">Has data</text>
  
  <rect x="210" y="215" width="120" height="55" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="270" y="235" text-anchor="middle" font-size="9" fill="white">Keys: [70 | 85]</text>
  <text x="270" y="250" text-anchor="middle" font-size="8" fill="#6ee7b7">Data: 70, 85</text>
  <text x="270" y="263" text-anchor="middle" font-size="7" fill="#a7f3d0">Has data</text>
  
  <rect x="350" y="215" width="120" height="55" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="410" y="235" text-anchor="middle" font-size="9" fill="white">Keys: [120 | 150]</text>
  <text x="410" y="250" text-anchor="middle" font-size="8" fill="#6ee7b7">Data: 120, 150</text>
  <text x="410" y="263" text-anchor="middle" font-size="7" fill="#a7f3d0">Has data</text>
  
  <!-- B-tree Leaves with data -->
  <rect x="50" y="295" width="70" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="85" y="315" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Leaf:</text>
  <text x="85" y="328" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">5, 15, 25</text>
  <text x="85" y="340" text-anchor="middle" font-size="7" fill="#10b981">+ data</text>
  
  <rect x="130" y="295" width="70" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="165" y="315" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Leaf:</text>
  <text x="165" y="328" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">40, 45</text>
  <text x="165" y="340" text-anchor="middle" font-size="7" fill="#10b981">+ data</text>
  
  <rect x="210" y="295" width="70" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="245" y="315" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Leaf:</text>
  <text x="245" y="328" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">60, 75</text>
  <text x="245" y="340" text-anchor="middle" font-size="7" fill="#10b981">+ data</text>
  
  <rect x="290" y="295" width="70" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="325" y="315" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Leaf:</text>
  <text x="325" y="328" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">90, 95</text>
  <text x="325" y="340" text-anchor="middle" font-size="7" fill="#10b981">+ data</text>
  
  <rect x="370" y="295" width="70" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="405" y="315" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Leaf:</text>
  <text x="405" y="328" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">130, 160</text>
  <text x="405" y="340" text-anchor="middle" font-size="7" fill="#10b981">+ data</text>
  
  <!-- B-tree connections -->
  <line x1="230" y1="185" x2="130" y2="215" stroke="var(--text-theme, #64748b)" stroke-width="1.5"/>
  <line x1="230" y1="185" x2="270" y2="215" stroke="var(--text-theme, #64748b)" stroke-width="1.5"/>
  <line x1="230" y1="185" x2="410" y2="215" stroke="var(--text-theme, #64748b)" stroke-width="1.5"/>
  
  <line x1="130" y1="270" x2="85" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  <line x1="130" y1="270" x2="165" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  <line x1="270" y1="270" x2="245" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  <line x1="270" y1="270" x2="325" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  <line x1="410" y1="270" x2="405" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  
  <!-- Range scan indicator for B-tree -->
  <path d="M 50 370 Q 230 390 410 370" fill="none" stroke="var(--text-theme, #ef4444)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="230" y="400" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444)">Range scan: Tree traversal needed</text>
  
  <!-- Right: B+ tree with data only in leaves -->
  <rect x="470" y="85" width="400" height="320" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6)">B+ Tree: Data Only in Leaves</text>
  
  <!-- B+ tree Root (index only) -->
  <rect x="590" y="125" width="160" height="60" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="670" y="148" text-anchor="middle" font-size="11" fill="white">Keys: [50 | 100]</text>
  <text x="670" y="165" text-anchor="middle" font-size="9" fill="#c4b5fd">Index ONLY</text>
  <text x="670" y="178" text-anchor="middle" font-size="8" fill="#a78bfa">No data here</text>
  
  <!-- B+ tree Level 1 (index only) -->
  <rect x="510" y="215" width="120" height="55" rx="6" fill="var(--bg-theme, #a78bfa)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="570" y="238" text-anchor="middle" font-size="9" fill="white">Keys: [20 | 35]</text>
  <text x="570" y="255" text-anchor="middle" font-size="8" fill="#ddd6fe">Index</text>
  <text x="570" y="265" text-anchor="middle" font-size="7" fill="#c4b5fd">No data</text>
  
  <rect x="650" y="215" width="120" height="55" rx="6" fill="var(--bg-theme, #a78bfa)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="710" y="238" text-anchor="middle" font-size="9" fill="white">Keys: [70 | 85]</text>
  <text x="710" y="255" text-anchor="middle" font-size="8" fill="#ddd6fe">Index</text>
  <text x="710" y="265" text-anchor="middle" font-size="7" fill="#c4b5fd">No data</text>
  
  <rect x="790" y="215" width="120" height="55" rx="6" fill="var(--bg-theme, #a78bfa)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="850" y="238" text-anchor="middle" font-size="9" fill="white">Keys: [120 | 150]</text>
  <text x="850" y="255" text-anchor="middle" font-size="8" fill="#ddd6fe">Index</text>
  <text x="850" y="265" text-anchor="middle" font-size="7" fill="#c4b5fd">No data</text>
  
  <!-- B+ tree Leaves (with data) -->
  <rect x="490" y="295" width="75" height="50" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="527" y="312" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Data:</text>
  <text x="527" y="325" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">5,15,25</text>
  <text x="527" y="338" text-anchor="middle" font-size="7" fill="#8b5cf6">→ Records</text>
  
  <rect x="575" y="295" width="75" height="50" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="612" y="312" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Data:</text>
  <text x="612" y="325" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">40,45</text>
  <text x="612" y="338" text-anchor="middle" font-size="7" fill="#8b5cf6">→ Records</text>
  
  <rect x="660" y="295" width="75" height="50" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="697" y="312" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Data:</text>
  <text x="697" y="325" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">60,75</text>
  <text x="697" y="338" text-anchor="middle" font-size="7" fill="#8b5cf6">→ Records</text>
  
  <rect x="745" y="295" width="75" height="50" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="782" y="312" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Data:</text>
  <text x="782" y="325" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">90,95</text>
  <text x="782" y="338" text-anchor="middle" font-size="7" fill="#8b5cf6">→ Records</text>
  
  <rect x="830" y="295" width="75" height="50" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="867" y="312" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Data:</text>
  <text x="867" y="325" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">130,160</text>
  <text x="867" y="338" text-anchor="middle" font-size="7" fill="#8b5cf6">→ Records</text>
  
  <!-- B+ tree leaf links -->
  <line x1="565" y1="320" x2="575" y2="320" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="650" y1="320" x2="660" y2="320" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="735" y1="320" x2="745" y2="320" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="820" y1="320" x2="830" y2="320" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrow-purple)"/>
  
  <!-- B+ tree connections -->
  <line x1="670" y1="185" x2="570" y2="215" stroke="var(--text-theme, #64748b)" stroke-width="1.5"/>
  <line x1="670" y1="185" x2="710" y2="215" stroke="var(--text-theme, #64748b)" stroke-width="1.5"/>
  <line x1="670" y1="185" x2="850" y2="215" stroke="var(--text-theme, #64748b)" stroke-width="1.5"/>
  
  <line x1="570" y1="270" x2="527" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  <line x1="570" y1="270" x2="612" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  <line x1="710" y1="270" x2="697" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  <line x1="710" y1="270" x2="782" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  <line x1="850" y1="270" x2="867" y2="295" stroke="var(--text-theme, #64748b)" stroke-width="1"/>
  
  <!-- Range scan indicator for B+ tree -->
  <path d="M 490 370 L 905 370" fill="none" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="670" y="390" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981)">Range scan: Sequential leaf traversal</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #8b5cf6)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
  
  <!-- Bottom comparison table -->
  <rect x="30" y="425" width="840" height="105" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  
  <text x="150" y="450" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6)">B-tree</text>
  <text x="450" y="450" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #64748b)">Difference</text>
  <text x="750" y="450" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #8b5cf6)">B+ Tree</text>
  
  <text x="150" y="475" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Data in all nodes</text>
  <text x="450" y="475" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Data placement</text>
  <text x="750" y="475" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Data only in leaves</text>
  
  <text x="150" y="495" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Tree traversal</text>
  <text x="450" y="495" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Range scans</text>
  <text x="750" y="495" text-anchor="middle" font-size="11" fill="var(--text-theme, #10b981)">Linked leaves ✓</text>
  
  <text x="150" y="515" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">More cache hits</text>
  <text x="450" y="515" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Random access</text>
  <text x="750" y="515" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">More I/O for point</text>
  
  <text x="450" y="515" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981)">→ B+ trees preferred for databases</text>
</svg>
