<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Count-Min Sketch Error Trade-off</title>
  <desc id="desc">Count-Min Sketch error trade-off diagram showing width, depth, and overestimation risk</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Count-Min Sketch: Error Trade-offs</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Width controls collision error, depth controls failure probability</text>
  
  <!-- Width vs Error (Left side) -->
  <rect x="30" y="85" width="400" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6)">Width (w) vs Overestimation</text>
  
  <!-- Error curve for width -->
  <line x1="60" y1="260" x2="380" y2="260" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <line x1="60" y1="260" x2="60" y2="130" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  
  <text x="390" y="265" font-size="10" fill="var(--text-theme, #64748b">Width →</text>
  <text x="50" y="140" font-size="10" fill="var(--text-theme, #64748b" transform="rotate(-90, 50, 140)">Error →</text>
  
  <!-- Error curve -->
  <path d="M 80 150 Q 150 200 350 245" fill="none" stroke="var(--text-theme, #ef4444)" stroke-width="3"/>
  
  <!-- Data points -->
  <circle cx="100" cy="170" r="6" fill="var(--bg-theme, #ef4444)"/>
  <text x="100" y="195" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">w=100</text>
  <text x="100" y="160" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">~20%</text>
  
  <circle cx="180" cy="200" r="6" fill="var(--bg-theme, #f59e0b)"/>
  <text x="180" y="225" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">w=500</text>
  <text x="180" y="190" text-anchor="middle" font-size="8" fill="var(--text-theme, #f59e0b">~5%</text>
  
  <circle cx="280" cy="230" r="6" fill="var(--bg-theme, #10b981)"/>
  <text x="280" y="255" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">w=1000</text>
  <text x="280" y="220" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">~1%</text>
  
  <circle cx="350" cy="248" r="6" fill="var(--bg-theme, #3b82f6)"/>
  <text x="350" y="273" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">w=5000</text>
  <text x="350" y="238" text-anchor="middle" font-size="8" fill="var(--text-theme, #3b82f6">~0.5%</text>
  
  <text x="230" y="315" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Wider = fewer collisions = less overestimation</text>
  
  <!-- Depth vs Failure Probability (Right side) -->
  <rect x="470" y="85" width="400" height="220" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">Depth (d) vs Failure Probability</text>
  
  <!-- Failure probability curve -->
  <line x1="500" y1="260" x2="820" y2="260" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <line x1="500" y1="260" x2="500" y2="130" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  
  <text x="830" y="265" font-size="10" fill="var(--text-theme, #64748b">Depth →</text>
  <text x="490" y="140" font-size="10" fill="var(--text-theme, #64748b" transform="rotate(-90, 490, 140)">P(failure) →</text>
  
  <!-- Failure probability curve (exponential decay) -->
  <path d="M 520 150 Q 580 220 780 255" fill="none" stroke="var(--text-theme, #8b5cf6)" stroke-width="3"/>
  
  <!-- Data points -->
  <circle cx="540" cy="175" r="6" fill="var(--bg-theme, #ef4444)"/>
  <text x="540" y="195" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">d=2</text>
  <text x="540" y="165" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">~13%</text>
  
  <circle cx="600" cy="210" r="6" fill="var(--bg-theme, #f59e0b)"/>
  <text x="600" y="230" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">d=3</text>
  <text x="600" y="200" text-anchor="middle" font-size="8" fill="var(--text-theme, #f59e0b">~5%</text>
  
  <circle cx="680" cy="240" r="6" fill="var(--bg-theme, #10b981)"/>
  <text x="680" y="260" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">d=5</text>
  <text x="680" y="230" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">~0.7%</text>
  
  <circle cx="780" cy="255" r="6" fill="var(--bg-theme, #3b82f6)"/>
  <text x="780" y="275" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">d=7</text>
  <text x="780" y="245" text-anchor="middle" font-size="8" fill="var(--text-theme, #3b82f6">~0.1%</text>
  
  <text x="670" y="315" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Deeper = lower probability of large error</text>
  
  <!-- Bottom: Memory and Recommendations -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Memory Cost</text>
  
  <text x="50" y="375" text-anchor="start" font-size="11" fill="var(--text-theme, #64748b">Total counters = w × d</text>
  <text x="50" y="400" text-anchor="start" font-size="11" fill="var(--text-theme, #64748b">Memory = w × d × 4 bytes (32-bit counters)</text>
  
  <!-- Memory table -->
  <rect x="50" y="415" width="360" height="100" rx="4" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <rect x="55" y="425" width="80" height="25" rx="2" fill="var(--bg-theme, #3b82f6)"/>
  <text x="95" y="442" text-anchor="middle" font-size="9" fill="white">1K × 3</text>
  
  <rect x="140" y="425" width="80" height="25" rx="2" fill="var(--bg-panel-soft, #e2e8f0)"/>
  <text x="180" y="442" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">12 KB</text>
  
  <rect x="225" y="425" width="80" height="25" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="265" y="442" text-anchor="middle" font-size="9" fill="white">10K × 5</text>
  
  <rect x="310" y="425" width="100" height="25" rx="2" fill="var(--bg-panel-soft, #e2e8f0)"/>
  <text x="360" y="442" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">200 KB</text>
  
  <rect x="55" y="455" width="80" height="25" rx="2" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="95" y="472" text-anchor="middle" font-size="9" fill="white">100K × 7</text>
  
  <rect x="140" y="455" width="80" height="25" rx="2" fill="var(--bg-panel-soft, #e2e8f0)"/>
  <text x="180" y="472" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">2.8 MB</text>
  
  <rect x="225" y="455" width="80" height="25" rx="2" fill="var(--bg-theme, #f59e0b)"/>
  <text x="265" y="472" text-anchor="middle" font-size="9" fill="white">1M × 7</text>
  
  <rect x="310" y="455" width="100" height="25" rx="2" fill="var(--bg-panel-soft, #e2e8f0)"/>
  <text x="360" y="472" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">28 MB</text>
  
  <text x="230" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Trade memory for accuracy</text>
  
  <!-- Recommendations -->
  <rect x="470" y="320" width="400" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Recommended Configurations</text>
  
  <!-- Light -->
  <rect x="490" y="360" width="110" height="70" rx="4" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="545" y="383" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #ef4444">Light</text>
  <text x="545" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">w=500, d=3</text>
  <text x="545" y="415" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">~6 KB</text>
  <text x="545" y="427" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Quick estimates</text>
  
  <!-- Medium -->
  <rect x="615" y="360" width="110" height="70" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="670" y="383" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">Medium</text>
  <text x="670" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">w=1000, d=5</text>
  <text x="670" y="415" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">~20 KB</text>
  <text x="670" y="427" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Default choice</text>
  
  <!-- Heavy -->
  <rect x="740" y="360" width="110" height="70" rx="4" fill="var(--bg-panel-soft, #dbeafe)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="795" y="383" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #3b82f6">Heavy</text>
  <text x="795" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">w=10000, d=7</text>
  <text x="795" y="415" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">~280 KB</text>
  <text x="795" y="427" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">High accuracy</text>
  
  <!-- Formula -->
  <rect x="490" y="445" width="360" height="75" rx="4" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="670" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">Error Bounds</text>
  <text x="670" y="490" text-anchor="middle" font-size="10" font-family="monospace" fill="var(--text-theme, #64748b">ε = e/w, δ = 1/e^d</text>
  <text x="670" y="510" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Overestimate by ≤ εN with prob ≥ 1-δ</text>
</svg>
