<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Global consistency trade-offs: strong, eventual, causal consistency</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Consistency Trade-offs in Global Distribution</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Strong vs Eventual vs Causal consistency: latency vs correctness trade-offs</text>

  <!-- Strong Consistency -->
  <rect x="30" y="80" width="270" height="390" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="35" rx="12" fill="#cc4444"/>
  <rect x="30" y="105" width="270" height="10" fill="#cc4444"/>
  <text x="165" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Strong Consistency</text>

  <rect x="50" y="130" width="230" height="60" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="165" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Write Path</text>
  <text x="165" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Synchronous replication to all regions</text>
  <text x="165" y="185" text-anchor="middle" font-size="9" fill="#1a1822">Ack after all regions commit</text>

  <rect x="50" y="205" width="230" height="60" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="165" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Read Path</text>
  <text x="165" y="245" text-anchor="middle" font-size="9" fill="#1a1822">Read from leader/quorum</text>
  <text x="165" y="260" text-anchor="middle" font-size="9" fill="#1a1822">Always returns latest write</text>

  <rect x="50" y="280" width="230" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Write Latency</text>
  <text x="165" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">180ms+ (farthest RTT)</text>

  <rect x="50" y="345" width="230" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Availability</text>
  <text x="165" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">Reduced (needs quorum)</text>

  <rect x="50" y="410" width="230" height="50" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="430" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Best For:</text>
  <text x="165" y="448" text-anchor="middle" font-size="9" fill="#1a1822">Financial txns, inventory, payments</text>

  <!-- Eventual Consistency -->
  <rect x="315" y="80" width="270" height="390" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="315" y="80" width="270" height="35" rx="12" fill="#4caf50"/>
  <rect x="315" y="105" width="270" height="10" fill="#4caf50"/>
  <text x="450" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Eventual Consistency</text>

  <rect x="335" y="130" width="230" height="60" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Write Path</text>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Ack immediately (local only)</text>
  <text x="450" y="185" text-anchor="middle" font-size="9" fill="#1a1822">Async replication to other regions</text>

  <rect x="335" y="205" width="230" height="60" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Read Path</text>
  <text x="450" y="245" text-anchor="middle" font-size="9" fill="#1a1822">Read from local region</text>
  <text x="450" y="260" text-anchor="middle" font-size="9" fill="#1a1822">May return stale data (1-5s lag)</text>

  <rect x="335" y="280" width="230" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Write Latency</text>
  <text x="450" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">1-5ms (local only)</text>

  <rect x="335" y="345" width="230" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Availability</text>
  <text x="450" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">Maximum (always available)</text>

  <rect x="335" y="410" width="230" height="50" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="430" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Best For:</text>
  <text x="450" y="448" text-anchor="middle" font-size="9" fill="#1a1822">Social media, content, profiles</text>

  <!-- Causal Consistency -->
  <rect x="600" y="80" width="270" height="390" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="35" rx="12" fill="#f0ad4e"/>
  <rect x="600" y="105" width="270" height="10" fill="#f0ad4e"/>
  <text x="735" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Causal Consistency</text>

  <rect x="620" y="130" width="230" height="60" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="735" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Write Path</text>
  <text x="735" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Ack locally, async replication</text>
  <text x="735" y="185" text-anchor="middle" font-size="9" fill="#1a1822">Preserves causal ordering</text>

  <rect x="620" y="205" width="230" height="60" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="735" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Read Path</text>
  <text x="735" y="245" text-anchor="middle" font-size="9" fill="#1a1822">Causally related writes ordered</text>
  <text x="735" y="260" text-anchor="middle" font-size="9" fill="#1a1822">Concurrent writes may vary</text>

  <rect x="620" y="280" width="230" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="735" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Write Latency</text>
  <text x="735" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#f0ad4e">1-5ms (local + causal tracking)</text>

  <rect x="620" y="345" width="230" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="735" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Availability</text>
  <text x="735" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#f0ad4e">High (available during partitions)</text>

  <rect x="620" y="410" width="230" height="50" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="735" y="430" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Best For:</text>
  <text x="735" y="448" text-anchor="middle" font-size="9" fill="#1a1822">Collaborative docs, threaded comments</text>

  <defs>
    <marker id="arrowGC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
