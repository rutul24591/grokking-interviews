<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">B-tree Failure Modes</title>
  <desc id="desc">B-tree failure modes: page splits, hot pages, fragmentation, and bloat</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">B-tree Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Common performance pain points under real workloads</text>
  
  <!-- Top Left: Page Splits -->
  <rect x="30" y="85" width="270" height="240" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444)">1. Page Splits</text>
  <text x="165" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Write amplification from node splits</text>
  
  <!-- Before split -->
  <rect x="50" y="145" width="220" height="45" rx="4" fill="var(--bg-theme, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="160" y="165" text-anchor="middle" font-size="10" fill="var(--text-theme, #b91c1c)">Before: Full Page</text>
  <text x="160" y="180" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">[10|20|30|40|50|60|70]</text>
  
  <!-- Split operation -->
  <line x1="160" y1="195" x2="160" y2="215" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="180" y="210" font-size="9" fill="var(--text-theme, #64748b)">Insert 45</text>
  
  <!-- After split -->
  <rect x="50" y="225" width="100" height="45" rx="4" fill="var(--bg-theme, #fee2e2)" stroke="var(--border-theme, #f87171)" stroke-width="1"/>
  <text x="100" y="245" text-anchor="middle" font-size="9" fill="var(--text-theme, #b91c1c)">Page A</text>
  <text x="100" y="260" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">[10|20|30|40]</text>
  
  <rect x="160" y="225" width="100" height="45" rx="4" fill="var(--bg-theme, #fee2e2)" stroke="var(--border-theme, #f87171)" stroke-width="1"/>
  <text x="210" y="245" text-anchor="middle" font-size="9" fill="var(--text-theme, #b91c1c">Page B</text>
  <text x="210" y="260" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">[45|50|60|70]</text>
  
  <text x="165" y="300" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444)">Cost: 2x writes + parent update</text>
  <text x="165" y="315" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Effect: Latency spikes on writes</text>
  
  <!-- Top Right: Hot Pages -->
  <rect x="315" y="85" width="270" height="240" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #f59e0b">2. Hot Pages</text>
  <text x="450" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Contention on frequently accessed pages</text>
  
  <!-- Hot page visualization -->
  <rect x="335" y="145" width="230" height="80" rx="6" fill="var(--bg-theme, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="170" text-anchor="middle" font-size="11" fill="var(--text-theme, #b45309)">Hot Page (Root/Index)</text>
  <text x="450" y="190" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">[50|100|150|200]</text>
  <text x="450" y="210" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309)">Latch contention!</text>
  
  <!-- Request arrows -->
  <line x1="335" y1="175" x2="355" y2="175" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="335" y1="195" x2="355" y2="195" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="335" y1="215" x2="355" y2="215" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <line x1="545" y1="175" x2="565" y2="175" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="545" y1="195" x2="565" y2="195" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="545" y1="215" x2="565" y2="215" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <text x="350" y="165" text-anchor="start" font-size="8" fill="var(--text-theme, #ef4444)">Requests</text>
  <text x="570" y="165" text-anchor="start" font-size="8" fill="var(--text-theme, #ef4444)">Queue up</text>
  
  <text x="450" y="255" text-anchor="middle" font-size="10" fill="var(--text-theme, #f59e0b)">Cause: Monotonic keys, hot indexes</text>
  <text x="450" y="270" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Effect: Latch contention, p99 spikes</text>
  <text x="450" y="295" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981)">Fix: Hash partitioning, avoid sequences</text>
  
  <!-- Bottom Left: Fragmentation -->
  <rect x="30" y="340" width="270" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="165" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. Fragmentation &amp; Bloat</text>
  <text x="165" y="383" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Space waste from churn</text>
  
  <!-- Fragmented pages -->
  <rect x="50" y="400" width="230" height="70" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  
  <!-- Used space -->
  <rect x="55" y="405" width="80" height="30" rx="2" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="95" y="425" text-anchor="middle" font-size="9" fill="white">Used</text>
  <text x="95" y="438" text-anchor="middle" font-size="8" fill="#e9d5ff">40%</text>
  
  <!-- Free space -->
  <rect x="140" y="405" width="60" height="30" rx="2" fill="var(--bg-panel-soft, #ddd6fe)" stroke="var(--border-theme, #a78bfa)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="170" y="425" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Free</text>
  <text x="170" y="438" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">30%</text>
  
  <!-- Deleted space -->
  <rect x="205" y="405" width="70" height="30" rx="2" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="240" y="425" text-anchor="middle" font-size="9" fill="var(--text-theme, #b91c1c)">Deleted</text>
  <text x="240" y="438" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">30%</text>
  
  <text x="165" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">After heavy updates/deletes:</text>
  <text x="165" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444)">• Wasted space (bloat)</text>
  <text x="165" y="525" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444)">• More pages to scan</text>
  <text x="165" y="540" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444)">• Cache inefficiency</text>
  <text x="165" y="555" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981)">Fix: VACUUM, REINDEX, compaction</text>
  
  <!-- Bottom Right: Mitigation Summary -->
  <rect x="315" y="340" width="555" height="240" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="592" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Operational Mitigations</text>
  
  <!-- Fill Factor -->
  <rect x="335" y="380" width="250" height="85" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="460" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6)">Fill Factor Tuning</text>
  <text x="460" y="425" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Leave space in pages for updates</text>
  <text x="460" y="445" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Default: 100%, Update-heavy: 70-90%</text>
  <text x="460" y="460" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981)">Reduces splits, increases space</text>
  
  <!-- Monitoring -->
  <rect x="600" y="380" width="250" height="85" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="725" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981)">Monitor These</text>
  <text x="725" y="425" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Page split rate</text>
  <text x="725" y="440" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Index bloat ratio</text>
  <text x="725" y="455" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Latch wait events</text>
  
  <!-- Maintenance -->
  <rect x="335" y="480" width="250" height="85" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="460" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #f59e0b)">Regular Maintenance</text>
  <text x="460" y="525" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• REINDEX during low traffic</text>
  <text x="460" y="540" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• VACUUM FULL for bloat</text>
  <text x="460" y="555" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Monitor index size growth</text>
  
  <!-- Workload Design -->
  <rect x="600" y="480" width="250" height="85" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="725" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #8b5cf6">Workload Design</text>
  <text x="725" y="525" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Avoid monotonic keys</text>
  <text x="725" y="540" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Use UUID/hash sharding</text>
  <text x="725" y="555" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Batch writes when possible</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
