<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Snapshot Isolation Anomalies</title>
  <desc id="desc">Snapshot isolation anomalies: write skew, long transactions preventing vacuum, and replication lag</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Snapshot Isolation: Anomalies &amp; Risks</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Write skew, version bloat, and replication challenges</text>
  
  <!-- Top Left: Write Skew -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444">1. Write Skew Anomaly</text>
  <text x="235" y="128" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Cross-row invariant violated</text>
  
  <!-- Write skew scenario -->
  <rect x="50" y="145" width="370" height="170" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  
  <!-- Initial state -->
  <rect x="60" y="160" width="150" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="135" y="185" text-anchor="middle" font-size="9" fill="white">Initial State</text>
  <text x="135" y="200" text-anchor="middle" font-size="8" fill="#bfdbfe">A=1, B=1</text>
  <text x="135" y="210" text-anchor="middle" font-size="7" fill="#93c5fd">Invariant: A+B ≥ 1</text>
  
  <line x1="215" y1="185" x2="240" y2="185" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- T1 reads -->
  <rect x="250" y="160" width="70" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="285" y="180" text-anchor="middle" font-size="8" fill="white">T1 reads</text>
  <text x="285" y="192" text-anchor="middle" font-size="7" fill="#6ee7b7">A=1, B=1</text>
  
  <!-- T2 reads -->
  <rect x="250" y="200" width="70" height="35" rx="3" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="285" y="220" text-anchor="middle" font-size="8" fill="white">T2 reads</text>
  <text x="285" y="232" text-anchor="middle" font-size="7" fill="#c4b5fd">A=1, B=1</text>
  
  <line x1="325" y1="185" x2="350" y2="185" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- T1 writes -->
  <rect x="360" y="160" width="50" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="385" y="180" text-anchor="middle" font-size="7" fill="white">T1: A=0</text>
  
  <!-- T2 writes -->
  <rect x="360" y="200" width="50" height="35" rx="3" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="385" y="220" text-anchor="middle" font-size="7" fill="white">T2: B=0</text>
  
  <!-- Final state -->
  <rect x="60" y="240" width="350" height="60" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="235" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Final State: A=0, B=0</text>
  <text x="235" y="285" text-anchor="middle" font-size="9" fill="#fca5a5">Invariant VIOLATED! (A+B=0)</text>
  
  <text x="235" y="315" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Serializable isolation, lock the invariant</text>
  
  <!-- Top Right: Version Bloat -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">2. Version Bloat from Long Transactions</text>
  
  <!-- Version accumulation -->
  <rect x="480" y="145" width="370" height="170" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  
  <!-- Normal state -->
  <rect x="490" y="160" width="160" height="60" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="570" y="185" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #10b981">Normal Operation</text>
  <text x="570" y="205" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">2-3 versions per row</text>
  <text x="570" y="218" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Vacuum keeps up</text>
  
  <line x1="655" y1="190" x2="680" y2="190" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="667" y="180" text-anchor="middle" font-size="7" fill="var(--text-theme, #ef4444">Long txn!</text>
  
  <!-- Bloated state -->
  <rect x="690" y="160" width="150" height="60" rx="4" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="765" y="185" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #ef4444">Long Transaction</text>
  <text x="765" y="205" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">100+ versions per row</text>
  <text x="765" y="218" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Vacuum blocked!</text>
  
  <!-- Impact -->
  <rect x="490" y="235" width="350" height="70" rx="4" fill="var(--bg-theme, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="665" y="260" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">Impact:</text>
  <text x="510" y="280" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Storage grows unbounded</text>
  <text x="510" y="295" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Scan performance degrades</text>
  <text x="680" y="280" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Vacuum pressure increases</text>
  <text x="680" y="295" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Eventual disk full</text>
  
  <text x="665" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Timeout long transactions, monitor version count</text>
  
  <!-- Bottom Left: Replication Lag -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. Replication Lag</text>
  
  <!-- Lag scenario -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  
  <!-- Primary -->
  <rect x="60" y="395" width="120" height="55" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="120" y="420" text-anchor="middle" font-size="9" fill="white">Primary</text>
  <text x="120" y="435" text-anchor="middle" font-size="8" fill="#bfdbfe">LSN: 1000</text>
  <text x="120" y="447" text-anchor="middle" font-size="7" fill="#93c5fd">Current time</text>
  
  <line x1="185" y1="423" x2="235" y2="423" stroke="var(--text-theme, #64748b)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="210" y="413" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Async replication</text>
  <text x="210" y="438" text-anchor="middle" font-size="7" fill="var(--text-theme, #ef4444">+30s lag</text>
  
  <!-- Replica -->
  <rect x="245" y="395" width="120" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="305" y="420" text-anchor="middle" font-size="9" fill="white">Replica</text>
  <text x="305" y="435" text-anchor="middle" font-size="8" fill="#6ee7b7">LSN: 700</text>
  <text x="305" y="447" text-anchor="middle" font-size="7" fill="#6ee7b7">30s behind</text>
  
  <text x="235" y="475" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">Reads from replica see stale data!</text>
  <text x="235" y="495" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Impact: Inconsistent reads, backup lag</text>
  <text x="235" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Monitor lag, route reads appropriately</text>
  
  <!-- Bottom Right: Mitigation Summary -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Mitigation Strategies</text>
  
  <rect x="480" y="380" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="570" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Write Skew</text>
  <text x="570" y="427" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Use serializable isolation</text>
  <text x="570" y="442" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Lock invariant rows</text>
  <text x="570" y="457" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Redesign schema constraints</text>
  
  <rect x="680" y="380" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="770" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Version Bloat</text>
  <text x="770" y="427" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Timeout idle transactions</text>
  <text x="770" y="442" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Monitor version count</text>
  <text x="770" y="457" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Aggressive vacuum settings</text>
  
  <rect x="480" y="480" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="570" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Replication Lag</text>
  <text x="570" y="527" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Monitor LSN lag</text>
  <text x="570" y="542" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Alert on threshold breach</text>
  <text x="570" y="557" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Route reads to primary</text>
  
  <rect x="680" y="480" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="770" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #8b5cf6">General</text>
  <text x="770" y="527" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Keep transactions short</text>
  <text x="770" y="542" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Understand isolation levels</text>
  <text x="770" y="557" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Test concurrent scenarios</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
