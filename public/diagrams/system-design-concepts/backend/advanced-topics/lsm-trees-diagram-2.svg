<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">LSM Tree Amplification Trade-offs</title>
  <desc id="desc">LSM tree showing write amplification, read amplification, and space amplification trade-offs</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">LSM Tree: Amplification Trade-offs</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">The fundamental tension in LSM design</text>
  
  <!-- Write Amplification -->
  <rect x="30" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6)">Write Amplification</text>
  <text x="165" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Bytes written / Bytes ingested</text>
  
  <!-- Write flow visualization -->
  <rect x="50" y="145" width="80" height="50" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="90" y="168" text-anchor="middle" font-size="10" fill="white">1 MB</text>
  <text x="90" y="183" text-anchor="middle" font-size="9" fill="#bfdbfe">Client Write</text>
  
  <line x1="130" y1="170" x2="160" y2="170" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="145" y="160" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">WAL</text>
  
  <rect x="170" y="145" width="80" height="50" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="210" y="168" text-anchor="middle" font-size="10" fill="white">1 MB</text>
  <text x="210" y="183" text-anchor="middle" font-size="9" fill="#6ee7b7">Memtable</text>
  
  <line x1="250" y1="170" x2="280" y2="170" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="265" y="160" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Flush</text>
  
  <!-- Compaction cascade -->
  <rect x="50" y="215" width="200" height="70" rx="6" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="150" y="238" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">Compaction Cascade</text>
  <text x="150" y="255" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">L0→L1: 2x rewrite</text>
  <text x="150" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">L1→L2: 4x rewrite</text>
  
  <rect x="50" y="300" width="200" height="50" rx="6" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="150" y="323" text-anchor="middle" font-size="11" fill="white">Total: 10-50x</text>
  <text x="150" y="340" text-anchor="middle" font-size="9" fill="#fca5a5">Physical writes per logical write</text>
  
  <!-- Read Amplification -->
  <rect x="315" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #f59e0b)">Read Amplification</text>
  <text x="450" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Data read / Data returned</text>
  
  <!-- Read flow visualization -->
  <rect x="335" y="145" width="80" height="40" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="375" y="168" text-anchor="middle" font-size="10" fill="white">GET(k)</text>
  
  <line x1="415" y1="165" x2="440" y2="165" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Check multiple locations -->
  <rect x="450" y="145" width="120" height="80" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="510" y="168" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309)">Check Locations:</text>
  <text x="510" y="185" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">1. Memtable</text>
  <text x="510" y="198" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">2. L0 SSTables (4)</text>
  <text x="510" y="211" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">3. L1 SSTables (3)</text>
  
  <line x1="510" y1="225" x2="510" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <!-- Bloom filter help -->
  <rect x="450" y="255" width="120" height="50" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="510" y="278" text-anchor="middle" font-size="10" fill="white">Bloom Filters</text>
  <text x="510" y="295" text-anchor="middle" font-size="8" fill="#6ee7b7">Skip SSTables on miss</text>
  
  <rect x="335" y="320" width="230" height="35" rx="6" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="450" y="343" text-anchor="middle" font-size="10" fill="white">Typical: 5-20x for misses</text>
  
  <!-- Space Amplification -->
  <rect x="600" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981)">Space Amplification</text>
  <text x="735" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Storage used / Live data</text>
  
  <!-- Space visualization -->
  <rect x="620" y="145" width="230" height="100" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  
  <!-- Live data -->
  <rect x="630" y="155" width="180" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="720" y="173" text-anchor="middle" font-size="9" fill="white">Live Data (40%)</text>
  
  <!-- Old versions -->
  <rect x="630" y="185" width="100" height="25" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="680" y="203" text-anchor="middle" font-size="9" fill="white">Old Versions (30%)</text>
  
  <!-- Tombstones -->
  <rect x="630" y="215" width="60" height="25" rx="2" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="660" y="233" text-anchor="middle" font-size="9" fill="white">Tombstones</text>
  
  <text x="735" y="265" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Causes:</text>
  <text x="735" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Multiple versions during compaction</text>
  <text x="735" y="295" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Tombstones for deletions</text>
  <text x="735" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Bloom filters, indexes</text>
  <text x="735" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">Typical: 1.5-3x</text>
  
  <!-- Bottom: Compaction Strategies -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Compaction Strategy Trade-offs</text>
  
  <!-- Leveled Compaction -->
  <rect x="50" y="420" width="380" height="100" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="240" y="443" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6)">Leveled Compaction</text>
  <text x="240" y="463" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• SSTables sorted, non-overlapping within levels</text>
  <text x="240" y="480" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981">✓ Low read amplification</text>
  <text x="240" y="495" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">✗ Higher write amplification (10-50x)</text>
  <text x="240" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Used by: RocksDB (default), LevelDB</text>
  
  <!-- Tiered Compaction -->
  <rect x="450" y="420" width="380" height="100" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="640" y="443" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #8b5cf6">Tiered Compaction</text>
  <text x="640" y="463" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• SSTables can overlap, merged in batches</text>
  <text x="640" y="480" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981">✓ Low write amplification (2-4x)</text>
  <text x="640" y="495" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">✗ Higher read amplification</text>
  <text x="640" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Used by: Cassandra, InfluxDB</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
