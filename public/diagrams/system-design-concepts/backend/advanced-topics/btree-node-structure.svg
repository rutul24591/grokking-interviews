<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>B-tree node structure showing internal nodes with keys and child pointers, leaf nodes with data</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">B-Tree Node Structure</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Page-oriented storage with keys and child pointers (4KB-16KB pages)</text>

  <!-- Root node -->
  <rect x="320" y="80" width="260" height="60" rx="8" fill="#6d5bd0" stroke="#5a4ab8" stroke-width="2"/>
  <text x="360" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">[15]</text>
  <text x="450" y="105" text-anchor="middle" font-size="11" font-weight="400" fill="#ffffff" opacity="0.7">Keys</text>
  <text x="530" y="105" text-anchor="middle" font-size="11" font-weight="400" fill="#ffffff" opacity="0.7">Child Ptrs</text>
  <line x1="380" y1="90" x2="380" y2="130" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="330" y="132" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Root</text>

  <!-- Arrows from root to internal -->
  <line x1="370" y1="140" x2="230" y2="185" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="140" x2="450" y2="185" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="140" x2="670" y2="185" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Internal nodes -->
  <rect x="130" y="190" width="200" height="50" rx="8" fill="#6d5bd0" stroke="#5a4ab8" stroke-width="2"/>
  <text x="200" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">[6, 10]</text>
  <text x="290" y="212" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7">Ptrs: 3</text>
  <text x="140" y="235" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.5">Internal</text>

  <rect x="350" y="190" width="200" height="50" rx="8" fill="#6d5bd0" stroke="#5a4ab8" stroke-width="2"/>
  <text x="420" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">[25, 30]</text>
  <text x="510" y="212" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7">Ptrs: 3</text>
  <text x="360" y="235" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.5">Internal</text>

  <rect x="570" y="190" width="200" height="50" rx="8" fill="#6d5bd0" stroke="#5a4ab8" stroke-width="2"/>
  <text x="640" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">[40, 45]</text>
  <text x="730" y="212" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.7">Ptrs: 3</text>
  <text x="580" y="235" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.5">Internal</text>

  <!-- Arrows from internal to leaves -->
  <line x1="160" y1="240" x2="80" y2="285" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="240" x2="200" y2="285" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="240" x2="320" y2="285" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="240" x2="380" y2="285" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="240" x2="480" y2="285" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="240" x2="560" y2="285" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="240" x2="640" y2="285" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="240" x2="720" y2="285" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="240" x2="800" y2="285" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Leaf nodes -->
  <rect x="30" y="290" width="100" height="45" rx="8" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <text x="80" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">[2, 4]</text>
  <text x="80" y="328" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.8">Data</text>

  <rect x="150" y="290" width="100" height="45" rx="8" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <text x="200" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">[6, 8]</text>
  <text x="200" y="328" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.8">Data</text>

  <rect x="270" y="290" width="100" height="45" rx="8" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <text x="320" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">[10, 12]</text>
  <text x="320" y="328" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.8">Data</text>

  <rect x="390" y="290" width="100" height="45" rx="8" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <text x="440" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">[18, 22]</text>
  <text x="440" y="328" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.8">Data</text>

  <rect x="510" y="290" width="100" height="45" rx="8" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <text x="560" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">[25, 28]</text>
  <text x="560" y="328" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.8">Data</text>

  <rect x="630" y="290" width="100" height="45" rx="8" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <text x="680" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">[35, 38]</text>
  <text x="680" y="328" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.8">Data</text>

  <rect x="750" y="290" width="120" height="45" rx="8" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <text x="810" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">[40, 42, 50]</text>
  <text x="810" y="328" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.8">Data</text>

  <!-- Page size callout -->
  <rect x="30" y="360" width="840" height="120" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Page-Oriented Storage</text>

  <rect x="50" y="400" width="240" height="65" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="170" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Internal Node Page</text>
  <text x="170" y="438" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Keys + Child Pointers</text>
  <text x="170" y="453" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">No data payloads</text>

  <rect x="330" y="400" width="240" height="65" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Leaf Node Page</text>
  <text x="450" y="438" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Keys + Data Pointers</text>
  <text x="450" y="453" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Actual data or references</text>

  <rect x="610" y="400" width="240" height="65" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="730" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Page Size: 4KB-16KB</text>
  <text x="730" y="438" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Optimized for disk I/O</text>
  <text x="730" y="453" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">High fanout (100-1000 keys/page)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
