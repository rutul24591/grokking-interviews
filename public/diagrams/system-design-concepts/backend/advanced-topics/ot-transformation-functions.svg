<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>OT transformation functions showing how insert and delete operations are transformed against each other</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">OT Transformation Functions</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">When concurrent operations conflict, transformation adjusts positions to preserve operation intention</text>

  <!-- Scenario: Concurrent inserts -->
  <rect x="30" y="80" width="420" height="190" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="240" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Scenario: Concurrent Inserts</text>

  <rect x="50" y="120" width="160" height="60" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="130" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">User A: Insert(&quot;Hello &quot;, 0)</text>
  <text x="130" y="158" text-anchor="middle" font-size="9" fill="#1a1822">Insert at position 0</text>

  <rect x="250" y="120" width="180" height="60" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="340" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">User B: Insert(&quot;World!&quot;, 0)</text>
  <text x="340" y="158" text-anchor="middle" font-size="9" fill="#1a1822">Insert at position 0</text>

  <rect x="50" y="195" width="380" height="60" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="240" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#f0ad4e">Transform: T(B, A) → Insert(&quot;World!&quot;, 6)</text>
  <text x="240" y="235" text-anchor="middle" font-size="9" fill="#1a1822">B&apos;s position shifts from 0 to 6 (length of A&apos;s insertion)</text>
  <text x="240" y="250" text-anchor="middle" font-size="9" fill="#1a1822">Result: &quot;Hello World!&quot; regardless of application order</text>

  <!-- Delete vs Insert -->
  <rect x="465" y="80" width="405" height="190" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="667" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Delete vs Insert</text>

  <rect x="485" y="120" width="170" height="60" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="1"/>
  <text x="570" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#cc4444">User A: Delete(3, 5)</text>
  <text x="570" y="158" text-anchor="middle" font-size="9" fill="#1a1822">Delete chars 3-5</text>

  <rect x="670" y="120" width="180" height="60" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="760" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">User B: Insert(&quot;X&quot;, 4)</text>
  <text x="760" y="158" text-anchor="middle" font-size="9" fill="#1a1822">Insert at position 4</text>

  <rect x="485" y="195" width="365" height="60" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="667" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#f0ad4e">Transform: T(B, A) → Insert(&quot;X&quot;, 1)</text>
  <text x="667" y="235" text-anchor="middle" font-size="9" fill="#1a1822">B&apos;s position shifts from 4 to 1 (4 - 3 deleted = 1)</text>
  <text x="667" y="250" text-anchor="middle" font-size="9" fill="#1a1822">If position was within deleted range, insert is absorbed</text>

  <!-- Transformation matrix -->
  <rect x="30" y="290" width="840" height="190" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Transformation Rules</text>

  <!-- Headers -->
  <rect x="50" y="330" width="160" height="30" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="130" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Oa \ Ob</text>
  <rect x="220" y="330" width="200" height="30" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="320" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Insert(posB, text)</text>
  <rect x="430" y="330" width="200" height="30" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="530" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Delete(posB, length)</text>
  <rect x="640" y="330" width="210" height="30" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Retain(posB, count)</text>

  <!-- Row 1: Insert -->
  <rect x="50" y="365" width="160" height="45" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="130" y="392" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Insert(posA, textA)</text>
  <rect x="220" y="365" width="200" height="45" rx="4" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="320" y="385" text-anchor="middle" font-size="9" fill="#1a1822">if posA &lt;= posB: Insert(posA, textA)</text>
  <text x="320" y="400" text-anchor="middle" font-size="9" fill="#1a1822">else: Insert(posA+lenB, textA)</text>
  <rect x="430" y="365" width="200" height="45" rx="4" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="530" y="385" text-anchor="middle" font-size="9" fill="#1a1822">if posA &lt; posB: Insert(posA, textA)</text>
  <text x="530" y="400" text-anchor="middle" font-size="9" fill="#1a1822">else: Insert(posA-lenB, textA)</text>
  <rect x="640" y="365" width="210" height="45" rx="4" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="745" y="392" text-anchor="middle" font-size="9" fill="#1a1822">No transformation needed</text>

  <!-- Row 2: Delete -->
  <rect x="50" y="415" width="160" height="45" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="130" y="442" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Delete(posA, lenA)</text>
  <rect x="220" y="415" width="200" height="45" rx="4" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="320" y="435" text-anchor="middle" font-size="9" fill="#1a1822">if posA &lt;= posB: Delete(posA, lenA)</text>
  <text x="320" y="450" text-anchor="middle" font-size="9" fill="#1a1822">else: Delete(posA+lenB, lenA)</text>
  <rect x="430" y="415" width="200" height="45" rx="4" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="530" y="435" text-anchor="middle" font-size="9" fill="#1a1822">Complex: overlapping ranges</text>
  <text x="530" y="450" text-anchor="middle" font-size="9" fill="#1a1822">Merge or split delete ranges</text>
  <rect x="640" y="415" width="210" height="45" rx="4" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="745" y="442" text-anchor="middle" font-size="9" fill="#1a1822">Adjust position if delete range shifts</text>

  <!-- Key insight -->
  <rect x="50" y="465" width="800" height="25" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="482" text-anchor="middle" font-size="10" fill="#1a1822">Key: Transformation functions must satisfy TP1 (commutativity) and TP2 (consistency) to guarantee convergence</text>

  <defs>
    <marker id="arrowOT" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
