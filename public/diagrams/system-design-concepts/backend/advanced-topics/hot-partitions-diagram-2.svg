<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Hot Partition Observability</title>
  <desc id="desc">Hot partition observability diagram showing per-shard latency, saturation, and request distribution</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Detecting Hot Partitions</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Per-shard metrics reveal what averages hide</text>
  
  <!-- Per-Shard Latency Heatmap -->
  <rect x="30" y="85" width="400" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Per-Shard Latency (p99)</text>
  
  <!-- Shard latency bars -->
  <rect x="50" y="130" width="60" height="150" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="80" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Shard 1</text>
  <text x="80" y="150" text-anchor="middle" font-size="8" fill="white">25ms</text>
  
  <rect x="130" y="130" width="60" height="150" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="160" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Shard 2</text>
  <text x="160" y="140" text-anchor="middle" font-size="8" fill="white">850ms</text>
  <text x="160" y="155" text-anchor="middle" font-size="7" fill="#fca5a5">HOT!</text>
  
  <rect x="210" y="130" width="60" height="150" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="240" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Shard 3</text>
  <text x="240" y="155" text-anchor="middle" font-size="8" fill="white">30ms</text>
  
  <rect x="290" y="130" width="60" height="150" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="320" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Shard 4</text>
  <text x="320" y="155" text-anchor="middle" font-size="8" fill="white">28ms</text>
  
  <text x="230" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">Cluster avg: 233ms (hides the problem!)</text>
  
  <!-- Per-Shard CPU -->
  <rect x="470" y="85" width="400" height="220" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Per-Shard CPU Utilization</text>
  
  <!-- CPU gauges -->
  <!-- Shard 1 -->
  <rect x="490" y="130" width="80" height="60" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="530" y="155" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Shard 1</text>
  <rect x="500" y="165" width="60" height="15" rx="2" fill="var(--bg-panel-soft, #e2e8f0)"/>
  <rect x="500" y="165" width="24" height="15" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="530" y="178" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">40%</text>
  
  <!-- Shard 2 -->
  <rect x="580" y="130" width="80" height="60" rx="4" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="620" y="155" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Shard 2</text>
  <rect x="590" y="165" width="60" height="15" rx="2" fill="var(--bg-panel-soft, #e2e8f0)"/>
  <rect x="590" y="165" width="58" height="15" rx="2" fill="var(--bg-theme, #ef4444)"/>
  <text x="620" y="178" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">98%</text>
  
  <!-- Shard 3 -->
  <rect x="670" y="130" width="80" height="60" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="710" y="155" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Shard 3</text>
  <rect x="680" y="165" width="60" height="15" rx="2" fill="var(--bg-panel-soft, #e2e8f0)"/>
  <rect x="680" y="165" width="26" height="15" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="710" y="178" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">43%</text>
  
  <!-- Shard 4 -->
  <rect x="760" y="130" width="80" height="60" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="800" y="155" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Shard 4</text>
  <rect x="770" y="165" width="60" height="15" rx="2" fill="var(--bg-panel-soft, #e2e8f0)"/>
  <rect x="770" y="165" width="22" height="15" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="800" y="178" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">37%</text>
  
  <!-- Request distribution -->
  <rect x="490" y="210" width="360" height="80" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="670" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Request Distribution</text>
  
  <rect x="500" y="245" width="70" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="535" y="268" text-anchor="middle" font-size="8" fill="white">10%</text>
  <text x="535" y="285" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Shard 1</text>
  
  <rect x="580" y="245" width="70" height="35" rx="2" fill="var(--bg-theme, #ef4444)"/>
  <text x="615" y="268" text-anchor="middle" font-size="8" fill="white">70%</text>
  <text x="615" y="285" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Shard 2</text>
  
  <rect x="660" y="245" width="70" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="695" y="268" text-anchor="middle" font-size="8" fill="white">10%</text>
  <text x="695" y="285" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Shard 3</text>
  
  <rect x="740" y="245" width="70" height="35" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="775" y="268" text-anchor="middle" font-size="8" fill="white">10%</text>
  <text x="775" y="285" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Shard 4</text>
  
  <!-- Bottom: Key Metrics -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Key Metrics for Hot Partition Detection</text>
  
  <rect x="50" y="360" width="250" height="160" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="175" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Traffic Metrics</text>
  <text x="175" y="410" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Requests/sec per shard</text>
  <text x="175" y="430" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Traffic distribution %</text>
  <text x="175" y="450" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Top keys per shard</text>
  <text x="175" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Tenant traffic share</text>
  <text x="175" y="490" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Traffic skew ratio (max/avg)</text>
  
  <rect x="320" y="360" width="250" height="160" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="445" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Saturation Metrics</text>
  <text x="445" y="410" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• CPU per shard</text>
  <text x="445" y="430" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Memory per shard</text>
  <text x="445" y="450" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Disk I/O per shard</text>
  <text x="445" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Connection pool usage</text>
  <text x="445" y="490" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Queue depth per shard</text>
  
  <rect x="590" y="360" width="250" height="160" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="715" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Latency Metrics</text>
  <text x="715" y="410" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• p50/p95/p99 per shard</text>
  <text x="715" y="430" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Timeout rate per shard</text>
  <text x="715" y="450" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Error rate per shard</text>
  <text x="715" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Retry rate per shard</text>
  <text x="715" y="490" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Latency skew (max/avg)</text>
  
  <text x="450" y="550" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981">Alert on: Any shard &gt;2x average traffic or &gt;90% saturation</text>
</svg>
