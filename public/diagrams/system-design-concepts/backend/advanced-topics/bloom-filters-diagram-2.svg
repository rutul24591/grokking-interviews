<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Bloom Filter Sizing and False Positive Trade-off</title>
  <desc id="desc">Bloom filter showing how size and hash count affect false positive rate</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
