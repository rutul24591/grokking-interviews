  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981)">Well-Sized Filter</text>
  <text x="450" y="130" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Balanced False Positive Rate</text>
  
