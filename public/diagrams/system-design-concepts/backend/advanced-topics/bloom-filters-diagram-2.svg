  <text x="735" y="260" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">More memory</text>
  <text x="735" y="280" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Use when FP cost is high</text>
  
  <!-- Formula Section -->
  <rect x="30" y="330" width="840" height="110" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Sizing Formula</text>
  
  <text x="100" y="385" font-size="13" fill="var(--text-theme, #1e293b)">Optimal hash count:</text>
  <text x="250" y="385" font-size="13" font-family="monospace" fill="var(--text-theme, #3b82f6)">k = (m/n) × ln(2)</text>
  
  <text x="500" y="385" font-size="13" fill="var(--text-theme, #1e293b)">False positive rate:</text>
  <text x="680" y="385" font-size="13" font-family="monospace" fill="var(--text-theme, #ef4444)">p ≈ (1 - e^(-kn/m))^k</text>
  
  <text x="100" y="415" font-size="12" fill="var(--text-theme, #64748b)">m = bits, n = elements, k = hash functions</text>
  
  <text x="500" y="415" font-size="12" fill="var(--text-theme, #64748b)">Example: 1% FP for 1M items → ~9.6M bits</text>
  
  <!-- Hash Count Impact -->
  <rect x="30" y="460" width="840" height="70" rx="8" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="485" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309)">Hash Count (k) Trade-off</text>
  
  <text x="100" y="510" font-size="12" fill="var(--text-theme, #64748b)">Too few hashes:</text>
  <text x="220" y="510" font-size="12" fill="var(--text-theme, #ef4444)">Higher false positives</text>
  
  <text x="400" y="510" font-size="12" fill="var(--text-theme, #64748b)">Optimal:</text>
  <text x="480" y="510" font-size="12" fill="var(--text-theme, #10b981)">Best FP rate for given m</text>
  
  <text x="650" y="510" font-size="12" fill="var(--text-theme, #64748b)">Too many hashes:</text>
  <text x="790" y="510" font-size="12" fill="var(--text-theme, #f59e0b)">More CPU, faster saturation</text>
</svg>
