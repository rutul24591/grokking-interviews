  <rect x="225" y="175" width="20" height="20" rx="2" fill="var(--bg-theme, #ef4444)"/>
  
  <text x="165" y="220" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">m = 16 bits</text>
  <text x="165" y="240" text-anchor="middle" font-size="11" fill="var(--text-theme, #ef4444)">~40% false positives</text>
  <text x="165" y="260" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Saturates quickly</text>
  <text x="165" y="280" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Low memory, high error</text>
  
