  <rect x="565" y="195" width="18" height="18" rx="2" fill="var(--bg-theme, #10b981)"/>
  
  <text x="450" y="220" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">m = 33 bits</text>
  <text x="450" y="240" text-anchor="middle" font-size="11" fill="var(--text-theme, #10b981)">~5% false positives</text>
  <text x="450" y="260" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Good balance</text>
  <text x="450" y="280" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Recommended starting point</text>
  
  <!-- Right: Large Filter (Low FP) -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6)">Oversized Filter</text>
  <text x="735" y="130" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Low False Positive Rate</text>
  
  <!-- Large bit array - sparsely filled -->
  <rect x="620" y="145" width="14" height="14" rx="2" fill="var(--bg-panel-soft, #e2e8f0)"/>
