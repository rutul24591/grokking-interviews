  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Memory vs False Positive Rate vs Hash Count</text>
  
  <!-- Left: Small Filter (High FP) -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444)">Undersized Filter</text>
  <text x="165" y="130" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">High False Positive Rate</text>
  
  <!-- Small bit array - mostly filled -->
