<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>LSM tree read and write paths with bloom filter optimization</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">LSM Tree Read &amp; Write Paths</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Write: WAL → memtable → flush → L0 → compact; Read: memtable → L0 → LN with bloom filters</text>

  <!-- Write Path (Left) -->
  <rect x="30" y="80" width="420" height="390" rx="12" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="80" width="420" height="35" rx="12" fill="#4caf50"/>
  <rect x="30" y="105" width="420" height="10" fill="#4caf50"/>
  <text x="240" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Write Path (Sequential I/O)</text>

  <!-- Step 1 -->
  <rect x="60" y="130" width="160" height="50" rx="8" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="140" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">1. Write to WAL</text>
  <text x="140" y="168" text-anchor="middle" font-size="9" fill="#1a1822">Sequential append</text>

  <line x1="220" y1="155" x2="250" y2="155" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowLSM)"/>

  <!-- Step 2 -->
  <rect x="260" y="130" width="160" height="50" rx="8" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="340" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">2. Insert to Memtable</text>
  <text x="340" y="168" text-anchor="middle" font-size="9" fill="#1a1822">O(1) skip list insert</text>

  <line x1="340" y1="185" x2="340" y2="215" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowLSM)"/>

  <!-- Step 3 -->
  <rect x="260" y="220" width="160" height="50" rx="8" fill="#f0ad4e" opacity="0.2" stroke="#f0ad4e" stroke-width="1"/>
  <text x="340" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#f0ad4e">3. Flush to L0 SSTable</text>
  <text x="340" y="258" text-anchor="middle" font-size="9" fill="#1a1822">Sequential disk write</text>

  <line x1="340" y1="275" x2="340" y2="305" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowLSM)"/>

  <!-- Step 4 -->
  <rect x="260" y="310" width="160" height="50" rx="8" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="340" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">4. Compact L0 → L1 → LN</text>
  <text x="340" y="348" text-anchor="middle" font-size="9" fill="#1a1822">Background merge</text>

  <line x1="340" y1="365" x2="340" y2="395" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowLSM)"/>

  <!-- Step 5 -->
  <rect x="260" y="400" width="160" height="50" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="340" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">5. Acknowledge Write</text>
  <text x="340" y="438" text-anchor="middle" font-size="9" fill="#1a1822">After WAL + Memtable</text>

  <!-- Read Path (Right) -->
  <rect x="465" y="80" width="405" height="390" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="465" y="80" width="405" height="35" rx="12" fill="#cc4444"/>
  <rect x="465" y="105" width="405" height="10" fill="#cc4444"/>
  <text x="667" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Read Path (Multi-Source Lookup)</text>

  <!-- Step 1 -->
  <rect x="495" y="130" width="150" height="50" rx="8" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1"/>
  <text x="570" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">1. Check Memtable</text>
  <text x="570" y="168" text-anchor="middle" font-size="9" fill="#1a1822">Found → return value</text>

  <line x1="570" y1="185" x2="570" y2="215" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowLSM)"/>
  <text x="590" y="205" text-anchor="start" font-size="8" fill="#cc4444">Not found</text>

  <!-- Step 2 -->
  <rect x="495" y="220" width="150" height="50" rx="8" fill="#f0ad4e" opacity="0.2" stroke="#f0ad4e" stroke-width="1"/>
  <text x="570" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#f0ad4e">2. Check Immutable</text>
  <text x="570" y="258" text-anchor="middle" font-size="9" fill="#1a1822">Found → return value</text>

  <line x1="570" y1="275" x2="570" y2="305" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowLSM)"/>
  <text x="590" y="295" text-anchor="start" font-size="8" fill="#cc4444">Not found</text>

  <!-- Step 3 -->
  <rect x="495" y="310" width="150" height="50" rx="8" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="570" y="330" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">3. Check SSTables</text>
  <text x="570" y="348" text-anchor="middle" font-size="9" fill="#1a1822">L0 → L1 → LN</text>

  <line x1="570" y1="365" x2="570" y2="395" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowLSM)"/>
  <text x="590" y="385" text-anchor="start" font-size="8" fill="#cc4444">Bloom filter helps</text>

  <!-- Step 4 -->
  <rect x="495" y="400" width="150" height="50" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="570" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">4. Return Result</text>
  <text x="570" y="438" text-anchor="middle" font-size="9" fill="#1a1822">Latest version or null</text>

  <!-- Bloom filter callout -->
  <rect x="660" y="280" width="190" height="170" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="2"/>
  <text x="755" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Bloom Filter Optimization</text>
  <text x="755" y="320" text-anchor="middle" font-size="9" fill="#1a1822">For each SSTable:</text>
  <text x="755" y="340" text-anchor="middle" font-size="9" fill="#1a1822">BF negative → skip file</text>
  <text x="755" y="355" text-anchor="middle" font-size="9" fill="#1a1822">BF positive → binary search</text>
  <text x="755" y="375" text-anchor="middle" font-size="9" fill="#1a1822">False positive rate: 1%</text>
  <text x="755" y="390" text-anchor="middle" font-size="9" fill="#1a1822">Eliminates 99% of checks</text>
  <text x="755" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Read amp: O(N) → O(1)</text>
  <text x="755" y="428" text-anchor="middle" font-size="9" fill="#1a1822">Memory: 10 bits per key</text>

  <defs>
    <marker id="arrowLSM" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
  </defs>
</svg>
