<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Zero-copy use cases: web servers, database replication, and network proxies</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Zero-Copy in Production Systems</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Three real-world use cases: web servers, database replication, and network proxies leveraging zero-copy I/O</text>

  <!-- Use case 1: Web Servers (nginx) -->
  <rect x="30" y="80" width="270" height="390" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="30" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="100" width="270" height="10" fill="#6d5bd0"/>
  <text x="165" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Web Servers (nginx)</text>

  <!-- nginx icon/logo area -->
  <rect x="100" y="125" width="130" height="45" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">nginx</text>
  <text x="165" y="160" text-anchor="middle" font-size="9" fill="#1a1822">sendfile = on</text>

  <!-- Flow diagram -->
  <!-- Client request -->
  <rect x="50" y="190" width="110" height="40" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="105" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Client</text>
  <text x="105" y="222" text-anchor="middle" font-size="9" fill="#1a1822">HTTP GET /static</text>

  <!-- Arrow -->
  <line x1="160" y1="210" x2="195" y2="210" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUC)"/>

  <!-- nginx server -->
  <rect x="200" y="190" width="80" height="40" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <text x="240" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="#6d5bd0">nginx</text>

  <!-- Arrow to disk -->
  <line x1="240" y1="230" x2="240" y2="260" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowUC)"/>

  <!-- Disk -->
  <rect x="190" y="265" width="100" height="40" rx="8" fill="#f0ad4e" opacity="0.2" stroke="#f0ad4e" stroke-width="2"/>
  <text x="240" y="282" text-anchor="middle" font-size="10" font-weight="700" fill="#f0ad4e">Static File</text>
  <text x="240" y="297" text-anchor="middle" font-size="9" fill="#1a1822">Page cache</text>

  <!-- sendfile arrow back to socket -->
  <line x1="280" y1="270" x2="310" y2="240" stroke="#4caf50" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowUC)"/>
  <text x="310" y="260" text-anchor="start" font-size="8" font-weight="600" fill="#4caf50">sendfile()</text>

  <!-- Arrow back to client -->
  <line x1="200" y1="210" x2="165" y2="210" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowUC)"/>
  <text x="183" y="200" text-anchor="middle" font-size="8" fill="#4caf50">Response</text>

  <!-- Description -->
  <rect x="50" y="325" width="230" height="60" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="#6d5bd0">How it works:</text>
  <text x="165" y="362" text-anchor="middle" font-size="9" fill="#1a1822">nginx uses sendfile() to transfer</text>
  <text x="165" y="376" text-anchor="middle" font-size="9" fill="#1a1822">static files directly from page cache</text>
  <text x="165" y="390" text-anchor="middle" font-size="9" fill="#1a1822">to socket without user-space copies</text>

  <!-- Metrics -->
  <rect x="50" y="400" width="230" height="50" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="418" text-anchor="middle" font-size="10" font-weight="700" fill="#4caf50">Impact:</text>
  <text x="165" y="433" text-anchor="middle" font-size="9" fill="#1a1822">2-3x throughput increase for</text>
  <text x="165" y="446" text-anchor="middle" font-size="9" fill="#1a1822">static file serving, reduced CPU</text>

  <!-- Use case 2: Database Replication -->
  <rect x="315" y="80" width="270" height="390" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="315" y="80" width="270" height="30" rx="12" fill="#f0ad4e"/>
  <rect x="315" y="100" width="270" height="10" fill="#f0ad4e"/>
  <text x="450" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Database Replication</text>

  <!-- Primary -->
  <rect x="340" y="130" width="100" height="60" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="2"/>
  <text x="390" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">Primary</text>
  <text x="390" y="172" text-anchor="middle" font-size="9" fill="#1a1822">WAL generation</text>
  <text x="390" y="185" text-anchor="middle" font-size="9" fill="#1a1822">LSN tracking</text>

  <!-- Arrow -->
  <line x1="440" y1="160" x2="475" y2="160" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowUC)"/>
  <text x="458" y="152" text-anchor="middle" font-size="8" font-weight="600" fill="#f0ad4e">splice()</text>

  <!-- WAL stream -->
  <rect x="480" y="135" width="85" height="50" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="522" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#6d5bd0">WAL</text>
  <text x="522" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Stream</text>

  <!-- Arrow -->
  <line x1="565" y1="160" x2="595" y2="160" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowUC)"/>
  <text x="580" y="152" text-anchor="middle" font-size="8" fill="#4caf50">TCP</text>

  <!-- Replica -->
  <rect x="600" y="130" width="100" height="60" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="2"/>
  <text x="650" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Replica</text>
  <text x="650" y="172" text-anchor="middle" font-size="9" fill="#1a1822">WAL replay</text>
  <text x="650" y="185" text-anchor="middle" font-size="9" fill="#1a1822">Apply changes</text>

  <!-- Splice detail -->
  <rect x="340" y="215" width="360" height="55" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="520" y="235" text-anchor="middle" font-size="10" font-weight="700" fill="#f0ad4e">splice() for WAL streaming:</text>
  <text x="520" y="252" text-anchor="middle" font-size="9" fill="#1a1822">WAL records move from file descriptor → pipe → socket</text>
  <text x="520" y="266" text-anchor="middle" font-size="9" fill="#1a1822">without ever entering user-space memory</text>

  <!-- Replication modes -->
  <rect x="340" y="285" width="170" height="65" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="425" y="305" text-anchor="middle" font-size="10" font-weight="700" fill="#6d5bd0">Streaming replication</text>
  <text x="425" y="322" text-anchor="middle" font-size="9" fill="#1a1822">Continuous WAL transfer</text>
  <text x="425" y="336" text-anchor="middle" font-size="9" fill="#1a1822">Low latency (&lt;1s)</text>

  <rect x="520" y="285" width="180" height="65" rx="8" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="610" y="305" text-anchor="middle" font-size="10" font-weight="700" fill="#cc4444">Logical replication</text>
  <text x="610" y="322" text-anchor="middle" font-size="9" fill="#1a1822">Decoded changes only</text>
  <text x="610" y="336" text-anchor="middle" font-size="9" fill="#1a1822">Cross-version compatible</text>

  <!-- Description -->
  <rect x="340" y="365" width="360" height="60" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="520" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#f0ad4e">How it works:</text>
  <text x="520" y="402" text-anchor="middle" font-size="9" fill="#1a1822">PostgreSQL, MySQL use splice() to stream WAL/binlog</text>
  <text x="520" y="416" text-anchor="middle" font-size="9" fill="#1a1822">records to replicas with zero user-space copies</text>

  <!-- Metrics -->
  <rect x="340" y="435" width="360" height="25" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="520" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Impact: 30-50% CPU reduction on replication, lower replica lag</text>

  <!-- Use case 3: Network Proxies (Kafka) -->
  <rect x="600" y="80" width="270" height="390" rx="12" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="30" rx="12" fill="#4caf50"/>
  <rect x="600" y="100" width="270" height="10" fill="#4caf50"/>
  <text x="735" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Network Proxies (Kafka)</text>

  <!-- Kafka logo area -->
  <rect x="670" y="125" width="130" height="45" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="735" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#cc4444">Apache Kafka</text>
  <text x="735" y="160" text-anchor="middle" font-size="9" fill="#1a1822">zero-copy transfer</text>

  <!-- Producers -->
  <rect x="620" y="190" width="90" height="35" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="665" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Producers</text>

  <!-- Arrow -->
  <line x1="710" y1="207" x2="730" y2="207" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUC)"/>

  <!-- Kafka broker -->
  <rect x="735" y="190" width="110" height="50" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="2"/>
  <text x="790" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">Kafka Broker</text>
  <text x="790" y="228" text-anchor="middle" font-size="9" fill="#1a1822">Page cache + sendfile</text>

  <!-- Arrow -->
  <line x1="845" y1="215" x2="865" y2="215" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowUC)"/>

  <!-- Consumers -->
  <rect x="870" y="190" width="90" height="35" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="915" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Consumers</text>

  <!-- Storage layer -->
  <rect x="620" y="260" width="340" height="50" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="790" y="278" text-anchor="middle" font-size="10" font-weight="700" fill="#f0ad4e">Kafka Log Segments (Page Cache)</text>
  <text x="790" y="295" text-anchor="middle" font-size="9" fill="#1a1822">Sequential append, OS manages page cache eviction</text>

  <!-- Arrow broker to storage -->
  <line x1="790" y1="240" x2="790" y2="260" stroke="#f0ad4e" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- sendfile detail -->
  <rect x="620" y="325" width="340" height="65" rx="8" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="790" y="345" text-anchor="middle" font-size="10" font-weight="700" fill="#4caf50">How it works:</text>
  <text x="790" y="362" text-anchor="middle" font-size="9" fill="#1a1822">Kafka broker uses transferTo() (Linux: sendfile)</text>
  <text x="790" y="376" text-anchor="middle" font-size="9" fill="#1a1822">to move messages from page cache directly</text>
  <text x="790" y="390" text-anchor="middle" font-size="9" fill="#1a1822">to the consumer socket connection</text>

  <!-- Metrics -->
  <rect x="620" y="400" width="340" height="55" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="790" y="420" text-anchor="middle" font-size="10" font-weight="700" fill="#6d5bd0">Impact:</text>
  <text x="790" y="436" text-anchor="middle" font-size="9" fill="#1a1822">Single broker handles 100K+ msgs/sec</text>
  <text x="790" y="450" text-anchor="middle" font-size="9" fill="#1a1822">Linear scalability with network bandwidth</text>

  <defs>
    <marker id="arrowUC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
