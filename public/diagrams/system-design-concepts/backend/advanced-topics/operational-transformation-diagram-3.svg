<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">OT Failure Modes</title>
  <desc id="desc">OT failure modes: transform correctness bugs, reconnect behavior, and version tracking under message delay and duplication</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">OT Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Transform bugs, reconnect errors, and history management</text>
  
  <!-- Top Left: Transform Correctness -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444">1. Transform Correctness Bugs</text>
  
  <!-- Divergence scenario -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  
  <text x="235" y="160" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Same operations, different results:</text>
  
  <!-- Client A result -->
  <rect x="60" y="175" width="150" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="135" y="200" text-anchor="middle" font-size="9" fill="white">Client A</text>
  <text x="135" y="215" text-anchor="middle" font-size="8" fill="#6ee7b7">"Hello Beautiful World"</text>
  
  <line x1="215" y1="200" x2="235" y2="200" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="225" y="190" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">DIVERGE!</text>
  
  <!-- Client B result -->
  <rect x="250" y="175" width="150" height="50" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="325" y="200" text-anchor="middle" font-size="9" fill="white">Client B</text>
  <text x="325" y="215" text-anchor="middle" font-size="8" fill="#fca5a5">"Beautiful Hello World"</text>
  
  <text x="235" y="250" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Transform function has edge case bug!</text>
  <text x="235" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Causes: Rare operation interleavings</text>
  <text x="235" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Property-based testing, fuzzing</text>
  
  <!-- Top Right: Reconnect Errors -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">2. Reconnect &amp; Resync Errors</text>
  
  <!-- Reconnect scenario -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  
  <!-- Online -->
  <rect x="490" y="150" width="100" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="540" y="175" text-anchor="middle" font-size="9" fill="white">Online</text>
  <text x="540" y="190" text-anchor="middle" font-size="7" fill="#6ee7b7">Pending: [Op1, Op2]</text>
  
  <line x1="595" y1="175" x2="620" y2="175" stroke="var(--text-theme, #ef4444)" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="607" y="165" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">Network loss!</text>
  
  <!-- Offline -->
  <rect x="630" y="150" width="100" height="50" rx="4" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="680" y="175" text-anchor="middle" font-size="9" fill="white">Offline</text>
  <text x="680" y="190" text-anchor="middle" font-size="7" fill="#94a3b8">Local edits: [Op3, Op4]</text>
  
  <line x1="735" y1="175" x2="760" y2="175" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="747" y="165" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">Reconnect!</text>
  
  <!-- Reconnect -->
  <rect x="770" y="150" width="70" height="50" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="805" y="175" text-anchor="middle" font-size="9" fill="white">Sync?</text>
  <text x="805" y="190" text-anchor="middle" font-size="7" fill="#b45309">Version mismatch</text>
  
  <text x="665" y="250" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Pending ops conflict with server state!</text>
  <text x="665" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Causes: Edits lost, document jumps</text>
  <text x="665" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Version vectors, operation replay</text>
  
  <!-- Bottom Left: History Trimming -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. History Trimming Mistakes</text>
  
  <!-- History management -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  
  <!-- Full history -->
  <rect x="60" y="395" width="150" height="60" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="135" y="420" text-anchor="middle" font-size="9" fill="white">Full History</text>
  <text x="135" y="435" text-anchor="middle" font-size="7" fill="#bfdbfe">Op1...Op1000</text>
  <text x="135" y="448" text-anchor="middle" font-size="7" fill="#93c5fd">Memory: 10MB</text>
  
  <line x1="215" y1="425" x2="240" y2="425" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="227" y="415" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Trim</text>
  
  <!-- Trimmed history -->
  <rect x="250" y="395" width="150" height="60" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="325" y="420" text-anchor="middle" font-size="9" fill="white">Trimmed History</text>
  <text x="325" y="435" text-anchor="middle" font-size="7" fill="#c4b5fd">Op900...Op1000</text>
  <text x="325" y="448" text-anchor="middle" font-size="7" fill="#a78bfa">Memory: 1MB</text>
  
  <!-- Late joiner problem -->
  <rect x="60" y="470" width="350" height="40" rx="4" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="235" y="495" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">Problem: Late-joining client needs Op500!</text>
  
  <text x="235" y="535" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Snapshots + incremental history, server resync</text>
  
  <!-- Bottom Right: Mitigation Summary -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Best Practices</text>
  
  <rect x="480" y="380" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="570" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Testing</text>
  <text x="570" y="427" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Property-based tests</text>
  <text x="570" y="442" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Fuzz concurrent operations</text>
  <text x="570" y="457" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Test all interleavings</text>
  
  <rect x="680" y="380" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="770" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Reconnect</text>
  <text x="770" y="427" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Version tracking</text>
  <text x="770" y="442" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Operation replay buffer</text>
  <text x="770" y="457" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Graceful degradation</text>
  
  <rect x="480" y="480" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="570" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">History</text>
  <text x="570" y="527" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Periodic snapshots</text>
  <text x="570" y="542" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Configurable retention</text>
  <text x="570" y="557" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Server-side resync API</text>
  
  <rect x="680" y="480" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="770" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #8b5cf6">Monitoring</text>
  <text x="770" y="527" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Track divergence rate</text>
  <text x="770" y="542" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Alert on reconnect failures</text>
  <text x="770" y="557" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Measure transform latency</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
</svg>
