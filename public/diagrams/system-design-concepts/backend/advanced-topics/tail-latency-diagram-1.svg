<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Tail Latency Distribution</title>
  <desc id="desc">Tail latency distribution showing long tail and percentiles</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Understanding Tail Latency</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Why averages lie and percentiles matter</text>
  
  <!-- Latency Distribution Histogram -->
  <rect x="30" y="85" width="550" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="305" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Latency Distribution (10,000 requests)</text>
  
  <!-- Histogram bars -->
  <!-- 0-10ms -->
  <rect x="60" y="320" width="40" height="40" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="80" y="375" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">0-10ms</text>
  <text x="80" y="310" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">40%</text>
  
  <!-- 10-20ms -->
  <rect x="110" y="280" width="40" height="80" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="130" y="375" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">10-20ms</text>
  <text x="130" y="270" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">30%</text>
  
  <!-- 20-50ms -->
  <rect x="160" y="200" width="40" height="160" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="180" y="375" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">20-50ms</text>
  <text x="180" y="190" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">20%</text>
  
  <!-- 50-100ms -->
  <rect x="210" y="140" width="40" height="220" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="230" y="375" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">50-100ms</text>
  <text x="230" y="130" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">7%</text>
  
  <!-- 100-200ms -->
  <rect x="260" y="100" width="40" height="260" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="280" y="375" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">100-200ms</text>
  <text x="280" y="90" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">2%</text>
  
  <!-- 200-500ms -->
  <rect x="310" y="70" width="40" height="290" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="330" y="375" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">200-500ms</text>
  <text x="330" y="60" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">0.8%</text>
  
  <!-- 500ms-1s -->
  <rect x="360" y="50" width="40" height="310" rx="2" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="380" y="375" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">500ms-1s</text>
  <text x="380" y="40" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">0.15%</text>
  
  <!-- 1s+ -->
  <rect x="410" y="40" width="40" height="320" rx="2" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="430" y="375" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">1s+</text>
  <text x="430" y="30" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">0.05%</text>
  
  <!-- Percentile markers -->
  <line x1="200" y1="365" x2="200" y2="385" stroke="var(--text-theme, #8b5cf6)" stroke-width="2"/>
  <text x="200" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #8b5cf6">p50</text>
  <text x="200" y="415" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">~25ms</text>
  
  <line x1="300" y1="365" x2="300" y2="385" stroke="var(--text-theme, #8b5cf6)" stroke-width="2"/>
  <text x="300" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #8b5cf6">p95</text>
  <text x="300" y="415" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">~150ms</text>
  
  <line x1="350" y1="365" x2="350" y2="385" stroke="var(--text-theme, #ef4444)" stroke-width="2"/>
  <text x="350" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #ef4444">p99</text>
  <text x="350" y="415" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">~400ms</text>
  
  <line x1="400" y1="365" x2="400" y2="385" stroke="var(--text-theme, #ef4444)" stroke-width="2"/>
  <text x="400" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #ef4444">p99.9</text>
  <text x="400" y="415" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">~800ms</text>
  
  <text x="305" y="445" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Average: ~45ms (misleading!)</text>
  <text x="305" y="460" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">0.2% of users experience 10x slower</text>
  
  <!-- Why Tail Matters -->
  <rect x="600" y="85" width="270" height="130" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Why Tail Matters</text>
  
  <rect x="620" y="125" width="230" height="80" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="640" y="150" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• User experience = slowest request</text>
  <text x="640" y="170" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Page load = max of all resources</text>
  <text x="640" y="190" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• 1% slow = 1% users unhappy</text>
  <text x="640" y="210" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Tail grows with fanout</text>
  
  <!-- Fanout Effect -->
  <rect x="600" y="230" width="270" height="135" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="735" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Fanout Multiplies Tail</text>
  
  <rect x="620" y="270" width="230" height="85" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="735" y="295" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Single service p99: 100ms</text>
  <text x="735" y="315" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Page needs 10 services</text>
  <text x="735" y="335" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Page p99: ~400ms!</text>
  <text x="735" y="350" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">P(all 10 &amp;lt; 100ms) = 0.99^10 ≈ 90%</text>
  
  <!-- Bottom: Key Takeaways -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Key Takeaways</text>
  
  <rect x="50" y="420" width="260" height="100" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="180" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Monitor Percentiles</text>
  <text x="180" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">p50, p95, p99, p99.9</text>
  <text x="180" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Never just averages</text>
  <text x="180" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Use histograms</text>
  
  <rect x="325" y="420" width="260" height="100" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="455" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Reduce Fanout</text>
  <text x="455" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Batch requests</text>
  <text x="455" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Cache aggressively</text>
  <text x="455" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Precompute when possible</text>
  
  <rect x="600" y="420" width="260" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="730" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Set Budgets</text>
  <text x="730" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Per-hop latency budget</text>
  <text x="730" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Enforce with timeouts</text>
  <text x="730" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Alert on tail growth</text>
</svg>
