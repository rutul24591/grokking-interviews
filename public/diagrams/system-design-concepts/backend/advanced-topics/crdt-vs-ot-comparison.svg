<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">CRDT vs OT Comparison</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#555555">State-based merge (CRDT) vs operation-based transform (OT)</text>

  <!-- CRDT Column -->
  <rect x="30" y="70" width="400" height="200" rx="12" fill="white" stroke="#6d5bd0" stroke-width="1"/>
  <rect x="30" y="70" width="400" height="38" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="93" width="400" height="15" fill="#6d5bd0"/>
  <text x="230" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="white">CRDT (Conflict-free Replicated Data Type)</text>

  <!-- CRDT properties -->
  <rect x="50" y="120" width="160" height="35" rx="8" fill="#f0f0f0"/>
  <text x="130" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">State-Based</text>
  <rect x="240" y="120" width="160" height="35" rx="8" fill="#e8f5e9"/>
  <text x="320" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#4caf50">No Central Server</text>

  <rect x="50" y="165" width="160" height="35" rx="8" fill="#fff8e1"/>
  <text x="130" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Merge Function</text>
  <rect x="240" y="165" width="160" height="35" rx="8" fill="#ffebee"/>
  <text x="320" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc4444">Higher Bandwidth</text>

  <!-- CRDT convergence example -->
  <rect x="50" y="215" width="350" height="45" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="225" y="235" text-anchor="middle" font-size="11" fill="#666666">A = &quot;abc&quot;, B = &quot;abd&quot; --&gt; Merge via element-wise max</text>
  <text x="225" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Result: Convergent state, no coordination needed</text>

  <!-- OT Column -->
  <rect x="470" y="70" width="400" height="200" rx="12" fill="white" stroke="#4caf50" stroke-width="1"/>
  <rect x="470" y="70" width="400" height="38" rx="12" fill="#4caf50"/>
  <rect x="470" y="93" width="400" height="15" fill="#4caf50"/>
  <text x="670" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="white">OT (Operational Transformation)</text>

  <!-- OT properties -->
  <rect x="490" y="120" width="160" height="35" rx="8" fill="#f0f0f0"/>
  <text x="570" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Operation-Based</text>
  <rect x="680" y="120" width="160" height="35" rx="8" fill="#e8e4f0"/>
  <text x="760" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Needs Coordination Server</text>

  <rect x="490" y="165" width="160" height="35" rx="8" fill="#fff8e1"/>
  <text x="570" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Transform Function</text>
  <rect x="680" y="165" width="160" height="35" rx="8" fill="#e8f5e9"/>
  <text x="760" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="#4caf50">Lower Bandwidth</text>

  <!-- OT convergence example -->
  <rect x="490" y="215" width="350" height="45" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="665" y="235" text-anchor="middle" font-size="11" fill="#666666">Insert(5,&quot;x&quot;) transformed against Delete(3) --&gt; Insert(4,&quot;x&quot;)</text>
  <text x="665" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Result: Convergent via server-ordered transformation</text>

  <!-- Bottom comparison -->
  <rect x="30" y="290" width="840" height="195" rx="12" fill="white" stroke="#cccccc" stroke-width="1"/>
  <text x="450" y="318" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Detailed Comparison</text>

  <!-- Table header -->
  <rect x="50" y="330" width="200" height="28" rx="6" fill="#1a1a2e"/>
  <text x="150" y="349" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Aspect</text>
  <rect x="255" y="330" width="280" height="28" rx="6" fill="#6d5bd0"/>
  <text x="395" y="349" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CRDT</text>
  <rect x="540" y="330" width="310" height="28" rx="6" fill="#4caf50"/>
  <text x="695" y="349" text-anchor="middle" font-size="12" font-weight="bold" fill="white">OT</text>

  <!-- Row 1 -->
  <rect x="50" y="363" width="200" height="25" fill="#f9f9f9"/>
  <text x="150" y="380" text-anchor="middle" font-size="11" fill="#333333">Granularity</text>
  <rect x="255" y="363" width="280" height="25" fill="#f9f9f9"/>
  <text x="395" y="380" text-anchor="middle" font-size="11" fill="#333333">State (full or delta)</text>
  <rect x="540" y="363" width="310" height="25" fill="#f9f9f9"/>
  <text x="695" y="380" text-anchor="middle" font-size="11" fill="#333333">Operations (insert, delete, update)</text>

  <!-- Row 2 -->
  <rect x="50" y="393" width="200" height="25" fill="white"/>
  <text x="150" y="410" text-anchor="middle" font-size="11" fill="#333333">Coordination</text>
  <rect x="255" y="393" width="280" height="25" fill="white"/>
  <text x="395" y="410" text-anchor="middle" font-size="11" fill="#333333">None -- peer-to-peer sync</text>
  <rect x="540" y="393" width="310" height="25" fill="white"/>
  <text x="695" y="410" text-anchor="middle" font-size="11" fill="#333333">Central server for ordering</text>

  <!-- Row 3 -->
  <rect x="50" y="423" width="200" height="25" fill="#f9f9f9"/>
  <text x="150" y="440" text-anchor="middle" font-size="11" fill="#333333">Network</text>
  <rect x="255" y="423" width="280" height="25" fill="#f9f9f9"/>
  <text x="395" y="440" text-anchor="middle" font-size="11" fill="#cc4444">Higher (transmits state)</text>
  <rect x="540" y="423" width="310" height="25" fill="#f9f9f9"/>
  <text x="695" y="440" text-anchor="middle" font-size="11" fill="#4caf50">Lower (transmits ops only)</text>

  <!-- Row 4 -->
  <rect x="50" y="453" width="200" height="25" fill="white"/>
  <text x="150" y="470" text-anchor="middle" font-size="11" fill="#333333">Complexity</text>
  <rect x="255" y="453" width="280" height="25" fill="white"/>
  <text x="395" y="470" text-anchor="middle" font-size="11" fill="#333333">Data structure design</text>
  <rect x="540" y="453" width="310" height="25" fill="white"/>
  <text x="695" y="470" text-anchor="middle" font-size="11" fill="#333333">Transform function correctness</text>

  <!-- Use case note -->
  <rect x="30" y="490" width="840" height="0" rx="6" fill="#f0f0f0"/>
  <text x="450" y="495" text-anchor="middle" font-size="11" fill="#666666">Use CRDT for offline-first, multi-writer. Use OT for real-time collaborative editing (Google Docs).</text>
</svg>
