<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Hot partition mitigation strategies: key salting, sub-partitioning, caching, write coalescing</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Hot Partition Mitigation Strategies</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Key salting, sub-partitioning, caching, and write coalescing — each with different trade-offs</text>

  <!-- Key Salting -->
  <rect x="30" y="80" width="200" height="390" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="200" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="105" width="200" height="10" fill="#6d5bd0"/>
  <text x="130" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Key Salting</text>

  <rect x="50" y="130" width="160" height="70" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="130" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">How It Works</text>
  <text x="130" y="168" text-anchor="middle" font-size="9" fill="#1a1822">Add random suffix:</text>
  <text x="130" y="183" text-anchor="middle" font-size="9" fill="#1a1822">user_id_0, user_id_1</text>
  <text x="130" y="198" text-anchor="middle" font-size="9" fill="#1a1822">Distributes across N sub-partitions</text>

  <rect x="50" y="215" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="130" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Write Distribution</text>
  <text x="130" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">Even (1/N each)</text>

  <rect x="50" y="280" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="130" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Read Latency</text>
  <text x="130" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">Nx (query all N)</text>

  <rect x="50" y="345" width="160" height="110" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="130" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Best For:</text>
  <text x="130" y="385" text-anchor="middle" font-size="9" fill="#1a1822">Write-heavy hot partitions</text>
  <text x="130" y="405" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Avoid For:</text>
  <text x="130" y="425" text-anchor="middle" font-size="9" fill="#1a1822">Read-heavy (Nx read cost)</text>
  <text x="130" y="445" text-anchor="middle" font-size="9" fill="#1a1822">Use caching instead</text>

  <!-- Sub-Partitioning -->
  <rect x="245" y="80" width="200" height="390" rx="12" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="245" y="80" width="200" height="35" rx="12" fill="#4caf50"/>
  <rect x="245" y="105" width="200" height="10" fill="#4caf50"/>
  <text x="345" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Sub-Partitioning</text>

  <rect x="265" y="130" width="160" height="70" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="345" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">How It Works</text>
  <text x="345" y="168" text-anchor="middle" font-size="9" fill="#1a1822">Split hot partition into</text>
  <text x="345" y="183" text-anchor="middle" font-size="9" fill="#1a1822">smaller sub-partitions</text>
  <text x="345" y="198" text-anchor="middle" font-size="9" fill="#1a1822">Distribute across nodes</text>

  <rect x="265" y="215" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="345" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Write Distribution</text>
  <text x="345" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">Even (multiple nodes)</text>

  <rect x="265" y="280" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="345" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Read Latency</text>
  <text x="345" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">Normal (local reads)</text>

  <rect x="265" y="345" width="160" height="110" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="345" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Best For:</text>
  <text x="345" y="385" text-anchor="middle" font-size="9" fill="#1a1822">Mixed read/write workloads</text>
  <text x="345" y="405" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Used By:</text>
  <text x="345" y="425" text-anchor="middle" font-size="9" fill="#1a1822">DynamoDB, MongoDB, Cassandra</text>
  <text x="345" y="445" text-anchor="middle" font-size="9" fill="#1a1822">(automatic split)</text>

  <!-- Caching -->
  <rect x="460" y="80" width="200" height="390" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="460" y="80" width="200" height="35" rx="12" fill="#f0ad4e"/>
  <rect x="460" y="105" width="200" height="10" fill="#f0ad4e"/>
  <text x="560" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Caching</text>

  <rect x="480" y="130" width="160" height="70" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="560" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">How It Works</text>
  <text x="560" y="168" text-anchor="middle" font-size="9" fill="#1a1822">Cache hot data in Redis</text>
  <text x="560" y="183" text-anchor="middle" font-size="9" fill="#1a1822">with short TTL (1-5s)</text>
  <text x="560" y="198" text-anchor="middle" font-size="9" fill="#1a1822">Serve reads from cache</text>

  <rect x="480" y="215" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="560" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Read Reduction</text>
  <text x="560" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">90-99% reduction</text>

  <rect x="480" y="280" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="560" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Write Latency</text>
  <text x="560" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Normal (write-through)</text>

  <rect x="480" y="345" width="160" height="110" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="560" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Best For:</text>
  <text x="560" y="385" text-anchor="middle" font-size="9" fill="#1a1822">Read-heavy hot partitions</text>
  <text x="560" y="405" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Used By:</text>
  <text x="560" y="425" text-anchor="middle" font-size="9" fill="#1a1822">Twitter, Instagram (celebrity)</text>
  <text x="560" y="445" text-anchor="middle" font-size="9" fill="#1a1822">profiles, viral content)</text>

  <!-- Write Coalescing -->
  <rect x="675" y="80" width="195" height="390" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="675" y="80" width="195" height="35" rx="12" fill="#cc4444"/>
  <rect x="675" y="105" width="195" height="10" fill="#cc4444"/>
  <text x="772" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Write Coalescing</text>

  <rect x="695" y="130" width="155" height="70" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="772" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">How It Works</text>
  <text x="772" y="168" text-anchor="middle" font-size="9" fill="#1a1822">Buffer writes for 100-500ms</text>
  <text x="772" y="183" text-anchor="middle" font-size="9" fill="#1a1822">Merge into single write</text>
  <text x="772" y="198" text-anchor="middle" font-size="9" fill="#1a1822">Reduces write ops 10-100x</text>

  <rect x="695" y="215" width="155" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="772" y="235" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Write Reduction</text>
  <text x="772" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">10-100x fewer ops</text>

  <rect x="695" y="280" width="155" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="772" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Write Latency</text>
  <text x="772" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#f0ad4e">+100-500ms (buffer)</text>

  <rect x="695" y="345" width="155" height="110" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="772" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Best For:</text>
  <text x="772" y="385" text-anchor="middle" font-size="9" fill="#1a1822">Write-heavy counters</text>
  <text x="772" y="405" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Used By:</text>
  <text x="772" y="425" text-anchor="middle" font-size="9" fill="#1a1822">Instagram (like counts),</text>
  <text x="772" y="445" text-anchor="middle" font-size="9" fill="#1a1822">view counts, metrics)</text>

  <defs>
    <marker id="arrowHS" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
