  <line x1="695" y1="252" x2="715" y2="252" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="715" y="235" width="40" height="35" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="735" y="257" text-anchor="middle" font-size="10" fill="white">80</text>
  
  <line x1="755" y1="252" x2="775" y2="252" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
