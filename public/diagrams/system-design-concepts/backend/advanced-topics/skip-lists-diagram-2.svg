  <text x="795" y="257" text-anchor="middle" font-size="10" fill="white">85</text>
  
  <!-- Search path for 60 -->
  <path d="M 65 102 L 200 102 L 200 135 L 270 135 L 400 135 L 400 185 L 495 185 L 495 235 L 535 235" fill="none" stroke="var(--text-theme, #ef4444)" stroke-width="3" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  
  <circle cx="200" cy="102" r="5" fill="var(--bg-theme, #ef4444)"/>
  <circle cx="200" cy="135" r="5" fill="var(--bg-theme, #ef4444)"/>
  <circle cx="400" cy="135" r="5" fill="var(--bg-theme, #ef4444)"/>
  <circle cx="400" cy="185" r="5" fill="var(--bg-theme, #ef4444)"/>
  <circle cx="495" cy="185" r="5" fill="var(--bg-theme, #ef4444)"/>
  <circle cx="495" cy="235" r="5" fill="var(--bg-theme, #ef4444)"/>
  <circle cx="535" cy="235" r="5" fill="var(--bg-theme, #ef4444)"/>
  
  <rect x="520" y="280" width="100" height="35" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
