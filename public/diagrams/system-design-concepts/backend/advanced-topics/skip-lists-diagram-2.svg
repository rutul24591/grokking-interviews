  <!-- Search steps explanation -->
  <rect x="30" y="330" width="840" height="100" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Search Steps for Key = 60</text>
  
  <text x="50" y="380" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Step 1:</text>
  <text x="100" y="380" font-size="10" fill="var(--text-theme, #1e293b">Header → 20 → 50 (L4, next 75 > 60, drop down)</text>
  
  <text x="50" y="400" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Step 2:</text>
  <text x="100" y="400" font-size="10" fill="var(--text-theme, #1e293b">50 → 60 (L3, next 80 > 60, drop down)</text>
  
  <text x="50" y="420" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Step 3:</text>
  <text x="100" y="420" font-size="10" fill="var(--text-theme, #1e293b">50 → 55 → 60 ✓ Found at L2!</text>
  
  <text x="50" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">Total comparisons: 7 vs 11 (sequential)</text>
  
  <!-- Bottom: Complexity -->
  <rect x="30" y="445" width="400" height="85" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="230" y="470" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Time Complexity</text>
  <text x="230" y="495" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Search: O(log n) expected</text>
  <text x="230" y="515" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Insert: O(log n) expected</text>
  
  <rect x="450" y="445" width="420" height="85" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="660" y="470" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Why It Works</text>
  <text x="660" y="495" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Higher levels = express lanes</text>
  <text x="660" y="515" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Each level skips ~50% of elements</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
