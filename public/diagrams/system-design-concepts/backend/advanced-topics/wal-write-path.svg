<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>WAL write path showing transaction to disk flush sequence</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Write-Ahead Log: Write Path</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Transaction generates changes, appends to WAL, fsyncs to disk, applies to buffer pool, and checkpoints dirty pages</text>

  <!-- Step 1: Transaction -->
  <rect x="30" y="85" width="155" height="120" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="85" width="155" height="28" rx="8" fill="#cc4444"/>
  <rect x="30" y="103" width="155" height="10" fill="#cc4444"/>
  <text x="107" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1. Transaction</text>
  <text x="107" y="135" text-anchor="middle" font-size="10" fill="#1a1822">Client issues UPDATE</text>
  <text x="107" y="152" text-anchor="middle" font-size="10" fill="#1a1822">BEGIN TRAN;</text>
  <text x="107" y="169" text-anchor="middle" font-size="10" fill="#1a1822">Change set created</text>
  <text x="107" y="186" text-anchor="middle" font-size="10" fill="#1a1822">(LSN assigned)</text>

  <!-- Arrow 1->2 -->
  <line x1="185" y1="145" x2="225" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowWAL)"/>

  <!-- Step 2: WAL Buffer -->
  <rect x="230" y="85" width="155" height="120" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="230" y="85" width="155" height="28" rx="8" fill="#6d5bd0"/>
  <rect x="230" y="103" width="155" height="10" fill="#6d5bd0"/>
  <text x="307" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2. WAL Buffer</text>
  <text x="307" y="135" text-anchor="middle" font-size="10" fill="#1a1822">Append-only log</text>
  <text x="307" y="152" text-anchor="middle" font-size="10" fill="#1a1822">Sequential write</text>
  <text x="307" y="169" text-anchor="middle" font-size="10" fill="#1a1822">In-memory buffer</text>
  <text x="307" y="186" text-anchor="middle" font-size="10" fill="#1a1822">LSN: 1001, 1002...</text>

  <!-- Arrow 2->3 -->
  <line x1="385" y1="145" x2="425" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowWAL)"/>

  <!-- Step 3: fsync to disk -->
  <rect x="430" y="85" width="155" height="120" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="430" y="85" width="155" height="28" rx="8" fill="#f0ad4e"/>
  <rect x="430" y="103" width="155" height="10" fill="#f0ad4e"/>
  <text x="507" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3. fsync() to Disk</text>
  <text x="507" y="135" text-anchor="middle" font-size="10" fill="#1a1822">Durability guarantee</text>
  <text x="507" y="152" text-anchor="middle" font-size="10" fill="#1a1822">OS page cache flush</text>
  <text x="507" y="169" text-anchor="middle" font-size="10" fill="#1a1822">WAL on stable storage</text>
  <text x="507" y="186" text-anchor="middle" font-size="10" fill="#1a1822">~1-10ms latency</text>

  <!-- Arrow 3->4 -->
  <line x1="585" y1="145" x2="625" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowWAL)"/>

  <!-- Step 4: Buffer Pool -->
  <rect x="630" y="85" width="240" height="120" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="2"/>
  <rect x="630" y="85" width="240" height="28" rx="8" fill="#4caf50"/>
  <rect x="630" y="103" width="240" height="10" fill="#4caf50"/>
  <text x="750" y="104" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4. Apply to Buffer Pool</text>
  <text x="680" y="135" text-anchor="middle" font-size="10" fill="#1a1822">Dirty pages marked</text>
  <text x="790" y="135" text-anchor="middle" font-size="10" fill="#1a1822">In-memory pages updated</text>
  <text x="680" y="155" text-anchor="middle" font-size="10" fill="#1a1822">Page pinned</text>
  <text x="790" y="155" text-anchor="middle" font-size="10" fill="#1a1822">Not yet on disk</text>
  <text x="750" y="185" text-anchor="middle" font-size="10" fill="#1a1822">Transaction ACK sent to client</text>

  <!-- Down arrow to checkpoint section -->
  <line x1="750" y1="205" x2="750" y2="250" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowWAL)"/>
  <text x="770" y="235" text-anchor="start" font-size="10" font-weight="600" fill="#6d5bd0">Periodic</text>

  <!-- Checkpoint section -->
  <rect x="30" y="260" width="840" height="140" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="260" width="840" height="30" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="280" width="840" height="10" fill="#6d5bd0"/>
  <text x="450" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5. Checkpoint: Flush Dirty Pages to Data Files</text>

  <!-- Checkpoint sub-steps -->
  <rect x="50" y="310" width="170" height="70" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="135" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">5a. Identify</text>
  <text x="135" y="355" text-anchor="middle" font-size="10" fill="#1a1822">Scan buffer pool for</text>
  <text x="135" y="370" text-anchor="middle" font-size="10" fill="#1a1822">dirty pages (LSN &lt; checkpoint)</text>

  <line x1="220" y1="345" x2="260" y2="345" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowWAL)"/>

  <rect x="265" y="310" width="170" height="70" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="350" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">5b. Write</text>
  <text x="350" y="355" text-anchor="middle" font-size="10" fill="#1a1822">Sequential write to</text>
  <text x="350" y="370" text-anchor="middle" font-size="10" fill="#1a1822">data files (.dbf / .ibd)</text>

  <line x1="435" y1="345" x2="475" y2="345" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowWAL)"/>

  <rect x="480" y="310" width="170" height="70" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="565" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">5c. Persist</text>
  <text x="565" y="355" text-anchor="middle" font-size="10" fill="#1a1822">fsync() data files</text>
  <text x="565" y="370" text-anchor="middle" font-size="10" fill="#1a1822">Pages on stable storage</text>

  <line x1="650" y1="345" x2="690" y2="345" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowWAL)"/>

  <rect x="695" y="310" width="155" height="70" rx="8" fill="#4caf50" opacity="0.25" stroke="#4caf50" stroke-width="2"/>
  <text x="772" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">5d. Done</text>
  <text x="772" y="355" text-anchor="middle" font-size="10" fill="#1a1822">Dirty flag cleared,</text>
  <text x="772" y="370" text-anchor="middle" font-size="10" fill="#1a1822">WAL can be truncated</text>

  <!-- Key insight box -->
  <rect x="30" y="425" width="840" height="55" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="55" y="448" text-anchor="start" font-size="11" font-weight="700" fill="#cc4444">Key insight:</text>
  <text x="55" y="466" text-anchor="start" font-size="10" fill="#1a1822">WAL ensures durability BEFORE data files are updated. If crash occurs after step 3 but before step 5, recovery replays WAL to reconstruct state.</text>

  <defs>
    <marker id="arrowWAL" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
