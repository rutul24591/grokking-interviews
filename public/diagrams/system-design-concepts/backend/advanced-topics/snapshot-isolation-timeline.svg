<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Snapshot Isolation Transaction Timeline with Conflict</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Snapshot Isolation: Transaction Timeline with Write Conflict</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">T1 and T2 share a snapshot; T1 commits its write first, causing T2 to abort on conflicting write</text>

  <!-- Main timeline -->
  <rect x="30" y="80" width="840" height="280" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Transaction Timeline</text>

  <!-- Time axis -->
  <line x1="60" y1="140" x2="840" y2="140" stroke="#1a1822" stroke-width="1.5" opacity="0.3"/>

  <!-- Time labels on axis -->
  <line x1="100" y1="133" x2="100" y2="147" stroke="#1a1822" stroke-width="1.5"/>
  <text x="100" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">t=0</text>

  <line x1="240" y1="133" x2="240" y2="147" stroke="#1a1822" stroke-width="1.5"/>
  <text x="240" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">t=1</text>

  <line x1="380" y1="133" x2="380" y2="147" stroke="#1a1822" stroke-width="1.5"/>
  <text x="380" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">t=2</text>

  <line x1="520" y1="133" x2="520" y2="147" stroke="#1a1822" stroke-width="1.5"/>
  <text x="520" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">t=3</text>

  <line x1="660" y1="133" x2="660" y2="147" stroke="#1a1822" stroke-width="1.5"/>
  <text x="660" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">t=4</text>

  <line x1="780" y1="133" x2="780" y2="147" stroke="#1a1822" stroke-width="1.5"/>
  <text x="780" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">t=5</text>

  <!-- T1 timeline -->
  <rect x="90" y="190" width="450" height="30" rx="6" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="315" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Transaction T1</text>

  <!-- T1 start at t=0 -->
  <circle cx="100" cy="205" r="8" fill="#6d5bd0"/>
  <text x="100" y="209" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">T1</text>

  <!-- T1 write at t=2 -->
  <rect x="365" y="230" width="70" height="40" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="400" y="247" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">WRITE X</text>
  <text x="400" y="262" text-anchor="middle" font-size="8" fill="#1a1822">t=2</text>
  <line x1="380" y1="220" x2="390" y2="230" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- T1 commit at t=3 -->
  <rect x="505" y="230" width="80" height="40" rx="6" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="1.5"/>
  <text x="545" y="247" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">COMMIT</text>
  <text x="545" y="262" text-anchor="middle" font-size="8" fill="#1a1822">t=3</text>
  <line x1="545" y1="220" x2="520" y2="230" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- T1 end marker -->
  <circle cx="545" cy="205" r="6" fill="#4caf50"/>
  <text x="545" y="209" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">OK</text>

  <!-- T2 timeline -->
  <rect x="230" y="280" width="450" height="30" rx="6" fill="#f0ad4e" opacity="0.2" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="455" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Transaction T2</text>

  <!-- T2 start at t=1 -->
  <circle cx="240" cy="295" r="8" fill="#f0ad4e"/>
  <text x="240" y="299" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">T2</text>

  <!-- Shared snapshot bracket -->
  <rect x="85" y="180" width="170" height="130" rx="6" fill="none" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="170" y="177" text-anchor="middle" font-size="9" font-weight="700" fill="#4caf50">Same Snapshot S</text>

  <!-- T2 write at t=4 -->
  <rect x="645" y="230" width="70" height="40" rx="6" fill="#f0ad4e" opacity="0.2" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="680" y="247" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">WRITE X</text>
  <text x="680" y="262" text-anchor="middle" font-size="8" fill="#1a1822">t=4</text>
  <line x1="680" y1="280" x2="670" y2="270" stroke="#f0ad4e" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- T2 abort at t=5 -->
  <rect x="765" y="230" width="80" height="40" rx="6" fill="#cc4444" opacity="0.2" stroke="#cc4444" stroke-width="1.5"/>
  <text x="805" y="247" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">ABORT</text>
  <text x="805" y="262" text-anchor="middle" font-size="8" fill="#1a1822">t=5</text>
  <line x1="805" y1="280" x2="780" y2="270" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- T2 end marker -->
  <circle cx="805" cy="295" r="6" fill="#cc4444"/>
  <text x="805" y="299" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">X</text>

  <!-- Conflict explanation -->
  <rect x="30" y="390" width="840" height="85" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="450" y="415" text-anchor="middle" font-size="13" font-weight="700" fill="#cc4444">Write-Write Conflict Detected</text>
  <text x="450" y="437" text-anchor="middle" font-size="11" fill="#1a1822">T1 committed write to X at t=3. T2 attempts write to same X at t=4.</text>
  <text x="450" y="457" text-anchor="middle" font-size="11" fill="#1a1822">Snapshot isolation enforces first-commit-wins: T2 is aborted to prevent lost update.</text>

  <!-- Resolution box -->
  <rect x="30" y="495" width="400" height="65" rx="12" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="230" y="520" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">Result: T1&apos;s write to X is durable</text>
  <text x="230" y="540" text-anchor="middle" font-size="10" fill="#1a1822">X now reflects T1&apos;s committed value</text>

  <rect x="470" y="495" width="400" height="65" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="670" y="520" text-anchor="middle" font-size="12" font-weight="700" fill="#cc4444">Result: T2&apos;s write is discarded</text>
  <text x="670" y="540" text-anchor="middle" font-size="10" fill="#1a1822">T2 must retry or roll back entirely</text>

  <defs>
    <marker id="arrowTL" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>