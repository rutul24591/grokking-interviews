<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Global Distribution Routing</title>
  <desc id="desc">Global routing control points: health checks, traffic shifting, session affinity, and data dependencies</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Global Routing: Control Points</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Health signals and dependency readiness determine traffic routing</text>
  
  <!-- Global DNS/LB -->
  <rect x="30" y="85" width="180" height="80" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Global DNS / LB</text>
  <text x="120" y="135" text-anchor="middle" font-size="9" fill="#bfdbfe">Route53, Cloudflare</text>
  <text x="120" y="150" text-anchor="middle" font-size="8" fill="#93c5fd">Geolocation routing</text>
  <text x="120" y="162" text-anchor="middle" font-size="8" fill="#93c5fd">Health-based failover</text>
  
  <!-- Health Check arrows -->
  <line x1="210" y1="115" x2="260" y2="115" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="235" y="105" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">Health OK</text>
  
  <line x1="210" y1="135" x2="260" y2="135" stroke="var(--text-theme, #ef4444)" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arrow-red)"/>
  <text x="235" y="125" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">Unhealthy</text>
  
  <line x1="210" y1="155" x2="260" y2="155" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="235" y="145" text-anchor="middle" font-size="8" fill="var(--text-theme, #f59e0b">Degraded</text>
  
  <!-- Regional Endpoints -->
  <rect x="270" y="85" width="600" height="80" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <!-- US-East -->
  <rect x="290" y="95" width="100" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="340" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="white">US-East</text>
  <text x="340" y="133" text-anchor="middle" font-size="8" fill="#6ee7b7">✓ Healthy</text>
  <text x="340" y="147" text-anchor="middle" font-size="7" fill="#6ee7b7">Latency: 20ms</text>
  
  <!-- EU-West -->
  <rect x="410" y="95" width="100" height="60" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="460" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="white">EU-West</text>
  <text x="460" y="133" text-anchor="middle" font-size="8" fill="#fcd34d">~ Degraded</text>
  <text x="460" y="147" text-anchor="middle" font-size="7" fill="#fbbf24">Latency: 150ms</text>
  
  <!-- APAC -->
  <rect x="530" y="95" width="100" height="60" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="580" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="white">APAC</text>
  <text x="580" y="133" text-anchor="middle" font-size="8" fill="#fca5a5">✗ Unhealthy</text>
  <text x="580" y="147" text-anchor="middle" font-size="7" fill="#fca5a5">No response</text>
  
  <!-- Failover Region -->
  <rect x="650" y="95" width="100" height="60" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="700" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="white">US-West</text>
  <text x="700" y="133" text-anchor="middle" font-size="8" fill="#c4b5fd">○ Standby</text>
  <text x="700" y="147" text-anchor="middle" font-size="7" fill="#c4b5fd">Failover target</text>
  
  <!-- Data Dependency Check -->
  <rect x="30" y="180" width="400" height="140" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="230" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">Data Dependency Check</text>
  
  <rect x="50" y="220" width="360" height="90" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  
  <text x="70" y="245" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">Before routing to region, verify:</text>
  
  <rect x="80" y="255" width="25" height="25" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="115" y="273" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">User data replicated</text>
  
  <rect x="80" y="285" width="25" height="25" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="115" y="303" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">Session state available</text>
  
  <rect x="220" y="255" width="25" height="25" rx="3" fill="var(--bg-theme, #ef4444)"/>
  <text x="255" y="273" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">Auth keys synced</text>
  
  <rect x="220" y="285" width="25" height="25" rx="3" fill="var(--bg-theme, #f59e0b)"/>
  <text x="255" y="303" text-anchor="start" font-size="9" fill="var(--text-theme, #f59e0b">Rate limit state</text>
  
  <text x="230" y="340" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">Missing dependency = route elsewhere!</text>
  
  <!-- Traffic Shifting -->
  <rect x="450" y="180" width="420" height="140" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="660" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Traffic Shifting Strategies</text>
  
  <rect x="470" y="220" width="185" height="90" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="562" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Gradual Shift</text>
  <text x="562" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">1% → 5% → 25% → 100%</text>
  <text x="562" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Monitor error rates</text>
  <text x="562" y="300" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Auto-rollback on spike</text>
  
  <rect x="675" y="220" width="185" height="90" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="767" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Session Affinity</text>
  <text x="767" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Sticky sessions per user</text>
  <text x="767" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Prevents mid-session region</text>
  <text x="767" y="300" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">switch during failover</text>
  
  <!-- Bottom: Readiness Gates -->
  <rect x="30" y="335" width="840" height="195" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="450" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Readiness Gates for Failover</text>
  
  <rect x="50" y="375" width="190" height="70" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="145" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Infrastructure Ready</text>
  <text x="145" y="420" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">✓ Compute capacity</text>
  <text x="145" y="435" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">✓ Network connectivity</text>
  
  <rect x="260" y="375" width="190" height="70" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="355" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Data Ready</text>
  <text x="355" y="420" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">✓ Data replicated</text>
  <text x="355" y="435" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">✓ Replication lag &lt; threshold</text>
  
  <rect x="470" y="375" width="190" height="70" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="565" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #8b5cf6">Dependencies Ready</text>
  <text x="565" y="420" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">✓ Auth service healthy</text>
  <text x="565" y="435" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">✓ Rate limiter synced</text>
  
  <rect x="680" y="375" width="190" height="70" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="775" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Traffic Ready</text>
  <text x="775" y="420" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">✓ DNS propagated</text>
  <text x="775" y="435" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">✓ LB rules updated</text>
  
  <text x="450" y="480" text-anchor="middle" font-size="10" fill="var(--text-theme, #b45309">All gates must pass before traffic shift!</text>
  <text x="450" y="500" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Partial readiness = partial failover or wait</text>
  <text x="450" y="520" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Automated gate checks prevent failed failovers</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
  </defs>
</svg>
