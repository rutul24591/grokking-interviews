<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Operational Transformation Concept</title>
  <desc id="desc">Operational transformation diagram showing concurrent operations and transformation</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Operational Transformation (OT)</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Transform concurrent operations to achieve convergence</text>
  
  <!-- Initial State -->
  <rect x="30" y="85" width="200" height="100" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="130" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Initial Document</text>
  <rect x="50" y="125" width="160" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="130" y="150" text-anchor="middle" font-size="10" fill="white">"Hello World"</text>
  <text x="130" y="168" text-anchor="middle" font-size="8" fill="#bfdbfe">Version 0</text>
  
  <!-- Arrow to clients -->
  <line x1="230" y1="135" x2="300" y2="135" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Client A -->
  <rect x="300" y="85" width="280" height="180" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="440" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Client A</text>
  
  <rect x="320" y="125" width="240" height="50" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="440" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">"Hello World"</text>
  <text x="440" y="168" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Local state</text>
  
  <!-- Operation A -->
  <rect x="320" y="190" width="240" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="440" y="215" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Op A: Insert(6, "Beautiful ")</text>
  <text x="440" y="235" text-anchor="middle" font-size="9" fill="#6ee7b7">Result: "Hello Beautiful World"</text>
  
  <!-- Arrow to server -->
  <line x1="580" y1="175" x2="630" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="605" y="165" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Send Op A</text>
  
  <!-- Client B -->
  <rect x="300" y="285" width="280" height="180" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="440" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #8b5cf6">Client B</text>
  
  <rect x="320" y="325" width="240" height="50" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="440" y="350" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">"Hello World"</text>
  <text x="440" y="368" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Local state</text>
  
  <!-- Operation B -->
  <rect x="320" y="390" width="240" height="60" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="440" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Op B: Delete(0, 6)</text>
  <text x="440" y="435" text-anchor="middle" font-size="9" fill="#c4b5fd">Result: "World"</text>
  
  <!-- Arrow to server -->
  <line x1="580" y1="375" x2="630" y2="375" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="605" y="365" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Send Op B</text>
  
  <!-- Server / OT Engine -->
  <rect x="650" y="225" width="220" height="140" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="760" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">OT Server</text>
  
  <rect x="670" y="265" width="180" height="40" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="760" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Receives Op A and Op B</text>
  <text x="760" y="300" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Concurrent! Transform them.</text>
  
  <!-- Transformed operations -->
  <line x1="870" y1="260" x2="900" y2="260" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="885" y="250" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981">Transform A</text>
  
  <line x1="870" y1="330" x2="900" y2="330" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="885" y="320" text-anchor="middle" font-size="7" fill="var(--text-theme, #8b5cf6">Transform B</text>
  
  <!-- Final converged state -->
  <rect x="30" y="480" width="840" height="60" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="505" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Converged State (Both Clients)</text>
  <rect x="350" y="515" width="200" height="20" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="450" y="530" text-anchor="middle" font-size="10" fill="white">"Beautiful World"</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #8b5cf6)"/>
    </marker>
  </defs>
</svg>
