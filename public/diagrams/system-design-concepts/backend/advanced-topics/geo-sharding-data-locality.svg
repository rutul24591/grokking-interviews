<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Data residency compliance showing EU data stays in EU, US in US, with regulatory boundaries</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Data Residency &amp; Compliance</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Regulatory boundaries enforce data storage within geographic regions</text>

  <!-- EU Boundary -->
  <rect x="30" y="80" width="420" height="240" rx="12" fill="#ffffff" stroke="#4caf50" stroke-width="3"/>
  <rect x="30" y="80" width="420" height="35" rx="12" fill="#4caf50"/>
  <rect x="30" y="105" width="420" height="10" fill="#4caf50"/>
  <text x="240" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">EU Data Residency Zone (GDPR)</text>

  <rect x="50" y="130" width="170" height="70" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="135" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">EU Shard</text>
  <text x="135" y="175" text-anchor="middle" font-size="10" fill="#1a1822">EU user data stored here</text>
  <text x="135" y="190" text-anchor="middle" font-size="10" fill="#1a1822">Frankfurt, Dublin DCs</text>

  <rect x="240" y="130" width="190" height="70" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="335" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">EU Read Replicas</text>
  <text x="335" y="175" text-anchor="middle" font-size="10" fill="#1a1822">Local reads only</text>
  <text x="335" y="190" text-anchor="middle" font-size="10" fill="#1a1822">No data leaves EU</text>

  <rect x="50" y="220" width="380" height="80" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="240" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#cc4444">Data Must Not Leave EU Without:</text>
  <text x="240" y="265" text-anchor="middle" font-size="10" fill="#1a1822">• Explicit user consent  • Adequacy decision  • Standard Contractual Clauses (SCCs)</text>
  <text x="240" y="285" text-anchor="middle" font-size="10" fill="#1a1822">Violation: fines up to 4% of global revenue</text>

  <!-- US Boundary -->
  <rect x="465" y="80" width="405" height="240" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="3"/>
  <rect x="465" y="80" width="405" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="465" y="105" width="405" height="10" fill="#6d5bd0"/>
  <text x="667" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">US Data Residency Zone</text>

  <rect x="485" y="130" width="170" height="70" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="570" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">US Shard</text>
  <text x="570" y="175" text-anchor="middle" font-size="10" fill="#1a1822">US user data stored here</text>
  <text x="570" y="190" text-anchor="middle" font-size="10" fill="#1a1822">Virginia, Oregon DCs</text>

  <rect x="670" y="130" width="180" height="70" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="760" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">US Read Replicas</text>
  <text x="760" y="175" text-anchor="middle" font-size="10" fill="#1a1822">Local reads only</text>
  <text x="760" y="190" text-anchor="middle" font-size="10" fill="#1a1822">CCPA compliance</text>

  <rect x="485" y="220" width="365" height="80" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="667" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#f0ad4e">US Requirements:</text>
  <text x="667" y="265" text-anchor="middle" font-size="10" fill="#1a1822">• CCPA: California residents' data protection  • CLOUD Act: federal access to data</text>
  <text x="667" y="285" text-anchor="middle" font-size="10" fill="#1a1822">Less restrictive than GDPR, but state laws vary</text>

  <!-- Cross-region access -->
  <rect x="30" y="340" width="840" height="140" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Cross-Region Access Controls</text>

  <rect x="50" y="380" width="250" height="85" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="175" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">Allowed: Anonymized Analytics</text>
  <text x="175" y="420" text-anchor="middle" font-size="10" fill="#1a1822">Aggregate data, no PII</text>
  <text x="175" y="435" text-anchor="middle" font-size="10" fill="#1a1822">Cross-region reporting OK</text>
  <text x="175" y="452" text-anchor="middle" font-size="9" fill="#4caf50">✓ Compliant</text>

  <rect x="325" y="380" width="250" height="85" rx="8" fill="#f0ad4e" opacity="0.1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="450" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#f0ad4e">Allowed: Explicit Consent</text>
  <text x="450" y="420" text-anchor="middle" font-size="10" fill="#1a1822">User grants cross-region access</text>
  <text x="450" y="435" text-anchor="middle" font-size="10" fill="#1a1822">Logged and auditable</text>
  <text x="450" y="452" text-anchor="middle" font-size="9" fill="#f0ad4e">✓ Compliant (with consent)</text>

  <rect x="600" y="380" width="250" height="85" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="725" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#cc4444">Prohibited: Raw PII Transfer</text>
  <text x="725" y="420" text-anchor="middle" font-size="10" fill="#1a1822">Personal data without consent</text>
  <text x="725" y="435" text-anchor="middle" font-size="10" fill="#1a1822">Cross-region backup without SCCs</text>
  <text x="725" y="452" text-anchor="middle" font-size="9" fill="#cc4444">✗ Non-compliant</text>

  <defs>
    <marker id="arrowDR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
