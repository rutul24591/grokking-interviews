<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">LSM Tree Failure Modes</title>
  <desc id="desc">LSM tree failure modes: compaction debt, write stalls, read amplification spikes, and space amplification</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">LSM Tree Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">How LSM trees fail in production and how to prevent it</text>
  
  <!-- Top Left: Compaction Debt -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444)">1. Compaction Debt</text>
  <text x="235" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">The #1 cause of LSM incidents</text>
  
  <!-- Compaction backlog visualization -->
  <rect x="50" y="145" width="370" height="100" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  
  <!-- Healthy compaction -->
  <rect x="60" y="155" width="150" height="35" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="135" y="178" text-anchor="middle" font-size="10" fill="white">Compaction In</text>
  <text x="135" y="185" text-anchor="middle" font-size="8" fill="#6ee7b7">Keeping pace</text>
  
  <!-- Incoming flushes -->
  <rect x="220" y="155" width="150" height="35" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="295" y="178" text-anchor="middle" font-size="10" fill="white">Memtable Flushes</text>
  <text x="295" y="185" text-anchor="middle" font-size="8" fill="#bfdbfe">Incoming work</text>
  
  <!-- Arrow showing imbalance -->
  <line x1="295" y1="195" x2="295" y2="220" stroke="var(--text-theme, #ef4444)" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="320" y="210" font-size="9" fill="var(--text-theme, #ef4444)">Backlog grows!</text>
  
  <!-- Backlog indicator -->
  <rect x="60" y="200" width="350" height="35" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="235" y="223" text-anchor="middle" font-size="10" fill="white">Compaction Backlog (debt)</text>
  
  <text x="235" y="260" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444)">Symptoms:</text>
  <text x="70" y="280" font-size="9" fill="var(--text-theme, #64748b">• Read latency increases (more SSTables to check)</text>
  <text x="70" y="295" font-size="9" fill="var(--text-theme, #64748b">• Storage grows (uncompacted data)</text>
  <text x="70" y="310" font-size="9" fill="var(--text-theme, #64748b">• Eventually: write stalls</text>
  
  <!-- Top Right: Write Stalls -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #f59e0b">2. Write Stalls</text>
  <text x="665" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b">When compaction can't keep up</text>
  
  <!-- Stall progression -->
  <rect x="480" y="145" width="370" height="120" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  
  <!-- Stage 1: L0 files -->
  <rect x="490" y="155" width="100" height="30" rx="3" fill="var(--bg-theme, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="540" y="175" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">L0: 4 files</text>
  <text x="540" y="185" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Normal</text>
  
  <line x1="590" y1="170" x2="610" y2="170" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Stage 2: Too many L0 -->
  <rect x="620" y="155" width="100" height="30" rx="3" fill="var(--bg-theme, #fde68a)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="670" y="175" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">L0: 20 files</text>
  <text x="670" y="185" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">Slowdown!</text>
  
  <line x1="720" y1="170" x2="740" y2="170" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <!-- Stage 3: Stall -->
  <rect x="750" y="155" width="90" height="30" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="795" y="175" text-anchor="middle" font-size="9" fill="white">L0: 32 files</text>
  <text x="795" y="185" text-anchor="middle" font-size="8" fill="#fca5a5">STALL!</text>
  
  <!-- Stall explanation -->
  <rect x="490" y="200" width="350" height="55" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="665" y="220" text-anchor="middle" font-size="10" fill="var(--text-theme, #b45309">Write Stall Thresholds:</text>
  <text x="500" y="240" font-size="9" fill="var(--text-theme, #64748b">• L0 file count exceeded → slowdown</text>
  <text x="500" y="255" font-size="9" fill="var(--text-theme, #64748b">• Memtable count exceeded → full stall</text>
  
  <text x="665" y="280" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Impact: Write latency spikes 10-100x</text>
  <text x="665" y="300" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981">Fix: Increase compaction threads, reduce flush frequency</text>
  
  <!-- Bottom Left: Read Amplification Spikes -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. Read Amplification Spikes</text>
  
  <!-- Read path with many SSTables -->
  <rect x="50" y="380" width="370" height="110" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  
  <!-- Many SSTables to check -->
  <text x="235" y="405" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">GET(key) must check:</text>
  
  <rect x="60" y="415" width="50" height="20" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="85" y="429" text-anchor="middle" font-size="7" fill="white">Mem</text>
  
  <rect x="115" y="415" width="40" height="20" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b4530b)" stroke-width="1"/>
  <text x="135" y="429" text-anchor="middle" font-size="7" fill="white">L0×8</text>
  
  <rect x="160" y="415" width="40" height="20" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="180" y="429" text-anchor="middle" font-size="7" fill="white">L1×5</text>
  
  <rect x="205" y="415" width="40" height="20" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="225" y="429" text-anchor="middle" font-size="7" fill="white">L2×4</text>
  
  <rect x="250" y="415" width="40" height="20" rx="2" fill="var(--bg-theme, #64748b)" stroke="var(--border-theme, #475569)" stroke-width="1"/>
  <text x="270" y="429" text-anchor="middle" font-size="7" fill="white">L3+</text>
  
  <rect x="295" y="415" width="60" height="20" rx="2" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="325" y="429" text-anchor="middle" font-size="7" fill="white">Bloom?</text>
  
  <text x="235" y="455" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">20+ disk reads for a miss!</text>
  <text x="235" y="475" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Normal: 2-5 reads | Compaction debt: 20-50 reads</text>
  
  <text x="235" y="505" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981">Fix: Bloom filters, cache hot data, fix compaction</text>
  
  <!-- Bottom Right: Space Amplification -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">4. Space Amplification</text>
  
  <!-- Disk usage over time -->
  <rect x="480" y="380" width="370" height="110" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  
  <!-- Disk usage graph -->
  <line x1="500" y1="470" x2="830" y2="470" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <line x1="500" y1="400" x2="500" y2="470" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  
  <!-- Live data line -->
  <line x1="500" y1="440" x2="830" y2="440" stroke="var(--text-theme, #10b981)" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="840" y="445" font-size="9" fill="var(--text-theme, #10b981">Live Data</text>
  
  <!-- Actual usage (growing) -->
  <path d="M 500 435 L 580 430 L 660 420 L 740 405 L 830 395" fill="none" stroke="var(--text-theme, #ef4444)" stroke-width="3"/>
  <text x="840" y="400" font-size="9" fill="var(--text-theme, #ef4444">Actual Usage</text>
  
  <text x="665" y="505" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Causes:</text>
  <text x="500" y="525" font-size="9" fill="var(--text-theme, #64748b">• Uncompacted data (multiple versions)</text>
  <text x="500" y="540" font-size="9" fill="var(--text-theme, #64748b">• Tombstones not purged</text>
  <text x="500" y="555" font-size="9" fill="var(--text-theme, #64748b">• Bloom filters for deleted keys</text>
  
  <text x="665" y="575" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Risk: Disk full → complete outage</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
