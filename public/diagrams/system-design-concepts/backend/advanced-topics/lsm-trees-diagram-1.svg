<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">LSM Tree Architecture</title>
  <desc id="desc">LSM tree showing memtable, WAL, SSTables, and compaction levels</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">LSM Tree Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Write-optimized storage: buffer writes, flush immutable tables, compact in background</text>
  
  <!-- Write Path Section -->
  <rect x="30" y="85" width="400" height="200" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6)">Write Path</text>
  
  <!-- WAL -->
  <rect x="50" y="125" width="120" height="60" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="110" y="150" text-anchor="middle" font-size="11" fill="white">WAL</text>
  <text x="110" y="165" text-anchor="middle" font-size="9" fill="#bfdbfe">Write-Ahead Log</text>
  <text x="110" y="178" text-anchor="middle" font-size="8" fill="#93c5fd">Durability</text>
  
  <!-- Arrow to Memtable -->
  <line x1="170" y1="155" x2="200" y2="155" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Memtable -->
  <rect x="210" y="125" width="140" height="70" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="280" y="150" text-anchor="middle" font-size="11" fill="white">Memtable</text>
  <text x="280" y="165" text-anchor="middle" font-size="9" fill="#6ee7b7">In-memory (sorted)</text>
  <text x="280" y="178" text-anchor="middle" font-size="8" fill="#6ee7b7">Fast writes</text>
  <text x="280" y="190" text-anchor="middle" font-size="8" fill="#a7f3d0">Skip list / Red-black tree</text>
  
  <!-- Write arrow from top -->
  <line x1="280" y1="90" x2="280" y2="125" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="300" y="105" text-anchor="start" font-size="10" fill="var(--text-theme, #3b82f6)">Incoming Writes</text>
  
  <!-- Flush arrow -->
  <line x1="280" y1="195" x2="280" y2="240" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="300" y="220" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b)">Flush when full</text>
  
  <!-- Read Path Section -->
  <rect x="470" y="85" width="400" height="200" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6)">Read Path</text>
  
  <!-- Read flow -->
  <rect x="490" y="125" width="100" height="50" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="540" y="148" text-anchor="middle" font-size="10" fill="white">Query:</text>
  <text x="540" y="163" text-anchor="middle" font-size="10" fill="white">GET(key)</text>
  
  <!-- Check memtable -->
  <line x1="590" y1="150" x2="620" y2="150" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="630" y="125" width="110" height="50" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="685" y="145" text-anchor="middle" font-size="10" fill="white">1. Memtable</text>
  <text x="685" y="160" text-anchor="middle" font-size="9" fill="#6ee7b7">Check first</text>
  
  <!-- Check SSTables -->
  <line x1="685" y1="175" x2="685" y2="200" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <rect x="630" y="205" width="110" height="50" rx="6" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="685" y="225" text-anchor="middle" font-size="10" fill="white">2. SSTables</text>
  <text x="685" y="240" text-anchor="middle" font-size="9" fill="#fcd34d">L0 → L1 → L2...</text>
  
  <!-- Bloom filter note -->
  <rect x="760" y="125" width="100" height="50" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="810" y="148" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309)">Bloom Filter</text>
  <text x="810" y="163" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Skip SSTables</text>
  <text x="810" y="175" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">for misses</text>
  
  <!-- SSTable Levels Section -->
  <rect x="30" y="305" width="840" height="225" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="330" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">SSTable Levels &amp; Compaction</text>
  
  <!-- Level 0 -->
  <rect x="50" y="345" width="180" height="80" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="140" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #f59e0b)">Level 0 (L0)</text>
  <text x="140" y="385" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Fresh SSTables</text>
  <text x="140" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">From memtable flush</text>
  <text x="140" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">May overlap keys</text>
  
  <!-- SSTable files in L0 -->
  <rect x="60" y="390" width="30" height="25" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="75" y="408" text-anchor="middle" font-size="7" fill="white">SST1</text>
  
  <rect x="95" y="390" width="30" height="25" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="110" y="408" text-anchor="middle" font-size="7" fill="white">SST2</text>
  
  <rect x="130" y="390" width="30" height="25" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="145" y="408" text-anchor="middle" font-size="7" fill="white">SST3</text>
  
  <rect x="165" y="390" width="30" height="25" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="180" y="408" text-anchor="middle" font-size="7" fill="white">SST4</text>
  
  <!-- Arrow to L1 -->
  <line x1="230" y1="385" x2="260" y2="385" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="375" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Compact</text>
  
  <!-- Level 1 -->
  <rect x="270" y="345" width="180" height="80" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="360" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6)">Level 1 (L1)</text>
  <text x="360" y="385" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Sorted, non-overlapping</text>
  <text x="360" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Size limit: ~10MB</text>
  
  <!-- SSTable files in L1 -->
  <rect x="280" y="390" width="40" height="25" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="300" y="408" text-anchor="middle" font-size="7" fill="white">SST-A</text>
  
  <rect x="325" y="390" width="40" height="25" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="345" y="408" text-anchor="middle" font-size="7" fill="white">SST-B</text>
  
  <rect x="370" y="390" width="40" height="25" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="390" y="408" text-anchor="middle" font-size="7" fill="white">SST-C</text>
  
  <!-- Arrow to L2 -->
  <line x1="450" y1="385" x2="480" y2="385" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="375" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Compact</text>
  
  <!-- Level 2 -->
  <rect x="490" y="345" width="180" height="80" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="580" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981)">Level 2 (L2)</text>
  <text x="580" y="385" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Larger SSTables</text>
  <text x="580" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Size limit: ~100MB</text>
  
  <!-- SSTable files in L2 -->
  <rect x="500" y="390" width="50" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="525" y="408" text-anchor="middle" font-size="7" fill="white">SST-X</text>
  
  <rect x="555" y="390" width="50" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="580" y="408" text-anchor="middle" font-size="7" fill="white">SST-Y</text>
  
  <rect x="610" y="390" width="50" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="635" y="408" text-anchor="middle" font-size="7" fill="white">SST-Z</text>
  
  <!-- Arrow to deeper levels -->
  <line x1="670" y1="385" x2="700" y2="385" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="685" y="375" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">More levels...</text>
  
  <!-- Level N -->
  <rect x="710" y="345" width="150" height="80" rx="6" fill="white" stroke="var(--border-theme, #64748b)" stroke-width="2"/>
  <text x="785" y="368" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #64748b">Level N</text>
  <text x="785" y="385" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Largest SSTables</text>
  <text x="785" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Cold storage</text>
  <text x="785" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">GBs of data</text>
  
  <!-- Compaction indicator -->
  <rect x="50" y="445" width="800" height="70" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="450" y="468" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309)">Compaction: Background Merge Process</text>
  <text x="450" y="488" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Merges overlapping SSTables, removes deleted/expired keys, reduces read amplification</text>
  <text x="450" y="505" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Trade-off: Reduces read cost but increases write amplification</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
  </defs>
</svg>
