<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Leader Election Approaches</title>
  <desc id="desc">Leader election showing lease-based, consensus-based, and topology-based approaches</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Leader Election Approaches</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Different strategies for selecting a coordinator node</text>
  
  <!-- Left: Lease-Based -->
  <rect x="30" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6)">Lease-Based Election</text>
  <text x="165" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Time-bounded leadership</text>
  
  <!-- Lease visualization -->
  <rect x="50" y="145" width="230" height="100" rx="6" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  
  <!-- Shared store -->
  <rect x="80" y="160" width="80" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="120" y="183" text-anchor="middle" font-size="9" fill="white">Shared</text>
  <text x="120" y="198" text-anchor="middle" font-size="9" fill="white">Store</text>
  <text x="120" y="210" text-anchor="middle" font-size="7" fill="#bfdbfe">(Redis/ZK)</text>
  
  <!-- Leader node -->
  <rect x="200" y="160" width="60" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="230" y="183" text-anchor="middle" font-size="9" fill="white">Leader</text>
  <text x="230" y="198" text-anchor="middle" font-size="7" fill="#6ee7b7">Has lease</text>
  
  <!-- Lease arrow -->
  <line x1="160" y1="185" x2="200" y2="185" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="180" y="175" text-anchor="middle" font-size="7" fill="var(--text-theme, #10b981)">Acquire</text>
  
  <!-- Renewal arrow -->
  <path d="M 230 210 Q 230 230 200 230 Q 170 230 170 210" fill="none" stroke="var(--text-theme, #f59e0b)" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow-orange)"/>
  <text x="230" y="235" text-anchor="middle" font-size="7" fill="var(--text-theme, #f59e0b)">Renew</text>
  
  <text x="165" y="265" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">How it works:</text>
  <text x="60" y="285" font-size="8" fill="var(--text-theme, #64748b">1. Node acquires lease from shared store</text>
  <text x="60" y="300" font-size="8" fill="var(--text-theme, #64748b">2. Leader renews lease periodically</text>
  <text x="60" y="315" font-size="8" fill="var(--text-theme, #64748b">3. If lease expires, another node takes over</text>
  
  <text x="165" y="340" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Simple, good for background tasks</text>
  <text x="165" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">~ Brief dual-leader window possible</text>
  
  <!-- Middle: Consensus-Based -->
  <rect x="315" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">Consensus-Based</text>
  <text x="450" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Raft/Paxos style election</text>
  
  <!-- Consensus cluster -->
  <rect x="335" y="145" width="230" height="120" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  
  <!-- Nodes in cluster -->
  <circle cx="380" cy="190" r="25" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="380" y="188" text-anchor="middle" font-size="8" fill="white">Leader</text>
  <text x="380" y="200" text-anchor="middle" font-size="7" fill="#6ee7b7">Node 1</text>
  
  <circle cx="450" cy="210" r="25" fill="var(--bg-theme, #a78bfa)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="450" y="208" text-anchor="middle" font-size="7" fill="white">Follower</text>
  <text x="450" y="220" text-anchor="middle" font-size="7" fill="#c4b5fd">Node 2</text>
  
  <circle cx="520" cy="190" r="25" fill="var(--bg-theme, #a78bfa)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="520" y="188" text-anchor="middle" font-size="7" fill="white">Follower</text>
  <text x="520" y="200" text-anchor="middle" font-size="7" fill="#c4b5fd">Node 3</text>
  
  <!-- Vote arrows -->
  <line x1="405" y1="195" x2="425" y2="205" stroke="var(--text-theme, #8b5cf6)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="475" y1="205" x2="495" y2="195" stroke="var(--text-theme, #8b5cf6)" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <text x="450" y="235" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Quorum: 2 of 3</text>
  
  <text x="450" y="285" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">How it works:</text>
  <text x="345" y="305" font-size="8" fill="var(--text-theme, #64748b">1. Candidate requests votes from cluster</text>
  <text x="345" y="320" font-size="8" fill="var(--text-theme, #64748b">2. Majority vote determines leader</text>
  <text x="345" y="335" font-size="8" fill="var(--text-theme, #64748b">3. Leader heartbeats maintain authority</text>
  
  <text x="450" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Strong consistency, no split-brain</text>
  <text x="450" y="370" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">~ Requires odd node count, more complex</text>
  
  <!-- Right: Ring/Topology -->
  <rect x="600" y="85" width="270" height="280" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #f59e0b">Ring/Topology-Based</text>
  <text x="735" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Bully algorithm, ring election</text>
  
  <!-- Ring visualization -->
  <rect x="620" y="145" width="230" height="120" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <!-- Ring nodes -->
  <circle cx="660" cy="180" r="22" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="660" y="178" text-anchor="middle" font-size="7" fill="white">ID: 100</text>
  <text x="660" y="190" text-anchor="middle" font-size="7" fill="white">Leader</text>
  
  <circle cx="735" cy="170" r="22" fill="var(--bg-theme, #fcd34d)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="735" y="168" text-anchor="middle" font-size="7" fill="white">ID: 200</text>
  <text x="735" y="180" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Node</text>
  
  <circle cx="790" cy="210" r="22" fill="var(--bg-theme, #fcd34d)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="790" y="208" text-anchor="middle" font-size="7" fill="white">ID: 300</text>
  <text x="790" y="220" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Node</text>
  
  <circle cx="700" cy="235" r="22" fill="var(--bg-theme, #fcd34d)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="700" y="233" text-anchor="middle" font-size="7" fill="white">ID: 400</text>
  <text x="700" y="245" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Node</text>
  
  <!-- Ring connections -->
  <path d="M 675 185 Q 700 175 720 175" fill="none" stroke="var(--text-theme, #64748b)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 750 185 Q 770 195 780 205" fill="none" stroke="var(--text-theme, #64748b)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 780 225 Q 760 235 730 240" fill="none" stroke="var(--text-theme, #64748b)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 685 240 Q 660 230 650 210" fill="none" stroke="var(--text-theme, #64748b)" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <text x="735" y="285" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">How it works:</text>
  <text x="630" y="305" font-size="8" fill="var(--text-theme, #64748b">• Highest ID becomes leader (Bully)</text>
  <text x="630" y="320" font-size="8" fill="var(--text-theme, #64748b">• Or pass token around ring</text>
  <text x="630" y="335" font-size="8" fill="var(--text-theme, #64748b">• Detect failure via missing heartbeat</text>
  
  <text x="735" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Simple, no external dependency</text>
  <text x="735" y="370" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">✗ Less common in modern cloud systems</text>
  
  <!-- Bottom: Comparison -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">When to Use Each Approach</text>
  
  <rect x="50" y="420" width="260" height="100" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="180" y="443" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Lease-Based</text>
  <text x="180" y="465" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Best for:</text>
  <text x="180" y="485" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Background job schedulers</text>
  <text x="180" y="500" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Single coordinator tasks</text>
  <text x="180" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• When brief dual-leader is OK</text>
  
  <rect x="320" y="420" width="260" height="100" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="450" y="443" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #8b5cf6">Consensus-Based</text>
  <text x="450" y="465" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Best for:</text>
  <text x="450" y="485" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Critical single-writer state</text>
  <text x="450" y="500" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• When split-brain is unacceptable</text>
  <text x="450" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Distributed databases</text>
  
  <rect x="590" y="420" width="260" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="720" y="443" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #f59e0b">Ring/Topology</text>
  <text x="720" y="465" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Best for:</text>
  <text x="720" y="485" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Controlled environments</text>
  <text x="720" y="500" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Legacy systems</text>
  <text x="720" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• When external deps not available</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
  </defs>
</svg>
