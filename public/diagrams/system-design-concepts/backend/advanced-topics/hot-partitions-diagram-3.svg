<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Hot Partition Mitigation</title>
  <desc id="desc">Hot partition mitigation failure modes: over-salting, amplification, and unstable rebalancing</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Hot Partition Mitigation Strategies</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Key salting, caching, adaptive sharding, and fairness controls</text>
  
  <!-- Key Salting -->
  <rect x="30" y="85" width="400" height="240" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Key Salting (Write Distribution)</text>
  
  <!-- Before salting -->
  <rect x="50" y="130" width="360" height="80" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="230" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #ef4444">Before: Hot Key</text>
  
  <rect x="70" y="165" width="100" height="35" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="120" y="188" text-anchor="middle" font-size="9" fill="white">post:123</text>
  <text x="120" y="175" text-anchor="middle" font-size="7" fill="#fca5a5">10K req/s</text>
  
  <line x1="175" y1="183" x2="200" y2="183" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="210" y="165" width="180" height="35" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="300" y="188" text-anchor="middle" font-size="9" fill="white">Single Shard SATURATED</text>
  <text x="300" y="175" text-anchor="middle" font-size="7" fill="#fca5a5">CPU: 98%</text>
  
  <!-- After salting -->
  <rect x="50" y="225" width="360" height="90" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="230" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">After: Salted Keys</text>
  
  <rect x="70" y="260" width="60" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="100" y="277" text-anchor="middle" font-size="7" fill="white">post:123:0</text>
  <text x="100" y="290" text-anchor="middle" font-size="6" fill="#6ee7b7">2K req/s</text>
  
  <rect x="140" y="260" width="60" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="170" y="277" text-anchor="middle" font-size="7" fill="white">post:123:1</text>
  <text x="170" y="290" text-anchor="middle" font-size="6" fill="#6ee7b7">2K req/s</text>
  
  <rect x="210" y="260" width="60" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="240" y="277" text-anchor="middle" font-size="7" fill="white">post:123:2</text>
  <text x="240" y="290" text-anchor="middle" font-size="6" fill="#6ee7b7">2K req/s</text>
  
  <rect x="280" y="260" width="60" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="310" y="277" text-anchor="middle" font-size="7" fill="white">post:123:3</text>
  <text x="310" y="290" text-anchor="middle" font-size="6" fill="#6ee7b7">2K req/s</text>
  
  <rect x="350" y="260" width="50" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="375" y="277" text-anchor="middle" font-size="7" fill="white">post:123:4</text>
  <text x="375" y="290" text-anchor="middle" font-size="6" fill="#6ee7b7">2K req/s</text>
  
  <text x="230" y="340" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Load distributed across 5 shards</text>
  <text x="230" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">~ Read fanout: must query all 5 shards</text>
  
  <!-- Caching -->
  <rect x="470" y="85" width="400" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">Read Caching + Coalescing</text>
  
  <!-- Cache layer -->
  <rect x="490" y="130" width="360" height="90" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  
  <rect x="510" y="145" width="120" height="60" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="570" y="170" text-anchor="middle" font-size="10" fill="white">Cache Layer</text>
  <text x="570" y="188" text-anchor="middle" font-size="8" fill="#c4b5fd">95% hit rate</text>
  <text x="570" y="202" text-anchor="middle" font-size="7" fill="#c4b5fd">TTL: 60s</text>
  
  <line x1="635" y1="175" x2="665" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="650" y="165" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Cache hit</text>
  
  <rect x="670" y="145" width="160" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="750" y="170" text-anchor="middle" font-size="10" fill="white">Database</text>
  <text x="750" y="188" text-anchor="middle" font-size="8" fill="#6ee7b7">Only 5% of requests</text>
  <text x="750" y="202" text-anchor="middle" font-size="7" fill="#6ee7b7">Load reduced 20x</text>
  
  <!-- Request coalescing -->
  <rect x="490" y="235" width="360" height="75" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="670" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Request Coalescing</text>
  <text x="670" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Multiple requests for same key → single DB query</text>
  <text x="670" y="298" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Prevents cache stampede on expiry</text>
  
  <!-- Adaptive Sharding -->
  <rect x="30" y="340" width="400" height="240" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="230" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Adaptive Sharding (Split Hot Shards)</text>
  
  <!-- Before split -->
  <rect x="50" y="380" width="360" height="70" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="230" y="405" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #ef4444">Before: Single Hot Shard</text>
  
  <rect x="80" y="410" width="300" height="30" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="230" y="430" text-anchor="middle" font-size="8" fill="white">Shard A: Keys 1-1000000 (HOT)</text>
  
  <!-- After split -->
  <rect x="50" y="465" width="360" height="100" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="230" y="490" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">After: Split into Sub-shards</text>
  
  <rect x="80" y="500" width="90" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="125" y="517" text-anchor="middle" font-size="7" fill="white">A1: 1-250000</text>
  
  <rect x="180" y="500" width="90" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="225" y="517" text-anchor="middle" font-size="7" fill="white">A2: 250001-500000</text>
  
  <rect x="280" y="500" width="90" height="25" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="325" y="517" text-anchor="middle" font-size="7" fill="white">A3: 500001-750000</text>
  
  <rect x="30" y="535" width="380" height="35" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="230" y="558" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">Requires: Routing table update, data migration, careful cutover</text>
  
  <!-- Fairness Controls -->
  <rect x="470" y="340" width="400" height="240" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="670" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Fairness Controls (Prevention)</text>
  
  <rect x="490" y="385" width="360" height="180" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="510" y="410" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #3b82f6">Rate Limiting:</text>
  <text x="525" y="430" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Per-tenant QPS limits</text>
  <text x="525" y="448" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Per-key rate limits</text>
  <text x="525" y="466" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Burst allowance with tokens</text>
  
  <text x="670" y="410" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">Quotas:</text>
  <text x="685" y="430" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Daily/monthly limits</text>
  <text x="685" y="448" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Resource budgets</text>
  
  <text x="510" y="485" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #f59e0b">Isolation:</text>
  <text x="525" y="505" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Dedicated shards for large tenants</text>
  <text x="525" y="523" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Separate connection pools</text>
  <text x="525" y="541" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Priority queues for VIP tenants</text>
  
  <text x="670" y="545" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Prevents noisy neighbor problems</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
