<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>ARIES recovery showing analysis, redo, and undo phases after crash</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">ARIES Recovery Algorithm</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Three-phase recovery: Analysis (identify active transactions), Redo (replay all WAL), Undo (roll back uncommitted)</text>

  <!-- Timeline -->
  <line x1="80" y1="90" x2="820" y2="90" stroke="#1a1822" stroke-width="2" opacity="0.3"/>
  <text x="80" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">t0</text>
  <text x="450" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">Crash</text>
  <text x="820" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">Recovery complete</text>

  <!-- Checkpoint marker -->
  <rect x="70" y="78" width="22" height="24" rx="4" fill="#4caf50" opacity="0.3" stroke="#4caf50" stroke-width="2"/>
  <text x="81" y="94" text-anchor="middle" font-size="8" font-weight="700" fill="#4caf50">CKPT</text>

  <!-- Crash marker -->
  <line x1="450" y1="78" x2="450" y2="102" stroke="#cc4444" stroke-width="3" stroke-dasharray="4,3"/>
  <text x="450" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#cc4444">CRASH</text>

  <!-- WAL records on timeline -->
  <rect x="120" y="78" width="40" height="24" rx="4" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="140" y="94" text-anchor="middle" font-size="8" fill="#1a1822">T1:W1</text>

  <rect x="175" y="78" width="40" height="24" rx="4" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="195" y="94" text-anchor="middle" font-size="8" fill="#1a1822">T2:W1</text>

  <rect x="230" y="78" width="40" height="24" rx="4" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="250" y="94" text-anchor="middle" font-size="8" fill="#1a1822">T1:C</text>

  <rect x="285" y="78" width="40" height="24" rx="4" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="305" y="94" text-anchor="middle" font-size="8" fill="#1a1822">T2:W2</text>

  <rect x="340" y="78" width="40" height="24" rx="4" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="360" y="94" text-anchor="middle" font-size="8" fill="#1a1822">T3:W1</text>

  <rect x="395" y="78" width="40" height="24" rx="4" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="415" y="94" text-anchor="middle" font-size="8" fill="#1a1822">T3:W2</text>

  <!-- Phase 1: Analysis -->
  <rect x="30" y="130" width="840" height="100" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="30" y="130" width="840" height="30" rx="12" fill="#f0ad4e"/>
  <rect x="30" y="150" width="840" height="10" fill="#f0ad4e"/>
  <text x="450" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Phase 1: Analysis (Forward scan from checkpoint)</text>

  <!-- Analysis content -->
  <rect x="50" y="170" width="250" height="45" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="175" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Dirty Page Table (DPT)</text>
  <text x="175" y="205" text-anchor="middle" font-size="10" fill="#1a1822">Pages that may need redo</text>

  <rect x="325" y="170" width="250" height="45" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="450" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Transaction Table</text>
  <text x="450" y="205" text-anchor="middle" font-size="10" fill="#1a1822">T1:committed, T2:active, T3:active</text>

  <rect x="600" y="170" width="250" height="45" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="725" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Recovery LSN</text>
  <text x="725" y="205" text-anchor="middle" font-size="10" fill="#1a1822">Oldest LSN to start redo phase</text>

  <!-- Phase 2: Redo -->
  <rect x="30" y="250" width="840" height="100" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="250" width="840" height="30" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="270" width="840" height="10" fill="#6d5bd0"/>
  <text x="450" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Phase 2: Redo (Replay ALL WAL records from Recovery LSN)</text>

  <!-- Redo content -->
  <rect x="50" y="290" width="380" height="45" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="240" y="308" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Replay to stable point</text>
  <text x="240" y="325" text-anchor="middle" font-size="10" fill="#1a1822">Every change reapplied, even from uncommitted txns</text>

  <rect x="455" y="290" width="395" height="45" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="652" y="308" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Idempotent: Page LSN check prevents double-apply</text>
  <text x="652" y="325" text-anchor="middle" font-size="10" fill="#1a1822">If page.pageLSN >= wal.LSN, skip replay</text>

  <!-- Phase 3: Undo -->
  <rect x="30" y="370" width="840" height="110" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="370" width="840" height="30" rx="12" fill="#cc4444"/>
  <rect x="30" y="390" width="840" height="10" fill="#cc4444"/>
  <text x="450" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Phase 3: Undo (Roll back uncommitted transactions, backward scan)</text>

  <!-- Undo content - transaction states -->
  <rect x="50" y="410" width="170" height="55" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="135" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">T1: Committed</text>
  <text x="135" y="448" text-anchor="middle" font-size="10" fill="#1a1822">No undo needed</text>
  <text x="135" y="462" text-anchor="middle" font-size="10" fill="#1a1822">Changes persist</text>

  <rect x="245" y="410" width="170" height="55" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="1"/>
  <text x="330" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">T2: Active at crash</text>
  <text x="330" y="448" text-anchor="middle" font-size="10" fill="#1a1822">Undo T2:W2, T2:W1</text>
  <text x="330" y="462" text-anchor="middle" font-size="10" fill="#1a1822">Write CLR records</text>

  <rect x="440" y="410" width="170" height="55" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="1"/>
  <text x="525" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">T3: Active at crash</text>
  <text x="525" y="448" text-anchor="middle" font-size="10" fill="#1a1822">Undo T3:W2, T3:W1</text>
  <text x="525" y="462" text-anchor="middle" font-size="10" fill="#1a1822">Write CLR records</text>

  <rect x="635" y="410" width="215" height="55" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="742" y="430" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Compensation Log Records</text>
  <text x="742" y="448" text-anchor="middle" font-size="10" fill="#1a1822">Undo actions are logged</text>
  <text x="742" y="462" text-anchor="middle" font-size="10" fill="#1a1822">(CLR = idempotent undo)</text>

  <defs>
    <marker id="arrowARIES" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
