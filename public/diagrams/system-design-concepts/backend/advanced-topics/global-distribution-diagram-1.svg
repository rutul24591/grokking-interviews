<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Global Distribution Topologies</title>
  <desc id="desc">Global distribution diagram showing multiple regions with routing and replication</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Global Distribution Topologies</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Active-Active vs Active-Passive architectures</text>
  
  <!-- Active-Passive (Left) -->
  <rect x="30" y="85" width="400" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Active-Passive</text>
  <text x="230" y="128" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Single active region, standby backup</text>
  
  <!-- Primary Region -->
  <rect x="60" y="145" width="140" height="80" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="130" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PRIMARY</text>
  <text x="130" y="190" text-anchor="middle" font-size="9" fill="#6ee7b7">US-East</text>
  <text x="130" y="205" text-anchor="middle" font-size="8" fill="#6ee7b7">✓ Serving traffic</text>
  <text x="130" y="218" text-anchor="middle" font-size="8" fill="#6ee7b7">✓ Read/Write</text>
  
  <!-- Users to Primary -->
  <circle cx="60" cy="185" r="12" fill="var(--bg-theme, #3b82f6)"/>
  <text x="60" y="189" text-anchor="middle" font-size="7" fill="white">Users</text>
  <line x1="72" y1="185" x2="55" y2="185" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrow-green)"/>
  
  <!-- Replication arrow -->
  <line x1="205" y1="185" x2="245" y2="185" stroke="var(--text-theme, #64748b)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="225" y="175" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Async</text>
  <text x="225" y="200" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Replication</text>
  
  <!-- Passive Region -->
  <rect x="250" y="145" width="140" height="80" rx="6" fill="var(--bg-panel-soft, #f1f5f9)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="320" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #64748b">STANDBY</text>
  <text x="320" y="190" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">EU-West</text>
  <text x="320" y="205" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">○ Hot standby</text>
  <text x="320" y="218" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">○ Failover target</text>
  
  <!-- Pros/Cons -->
  <rect x="50" y="240" width="360" height="55" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="70" y="260" text-anchor="start" font-size="9" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="260" font-size="9" fill="var(--text-theme, #64748b">Simple consistency</text>
  <text x="220" y="260" font-size="9" fill="var(--text-theme, #ef4444">✗</text>
  <text x="235" y="260" font-size="9" fill="var(--text-theme, #64748b">Slow failover</text>
  <text x="70" y="280" font-size="9" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="280" font-size="9" fill="var(--text-theme, #64748b">No write conflicts</text>
  <text x="220" y="280" font-size="9" fill="var(--text-theme, #ef4444">✗</text>
  <text x="235" y="280" font-size="9" fill="var(--text-theme, #64748b">Wasted capacity</text>
  
  <!-- Active-Active (Right) -->
  <rect x="470" y="85" width="400" height="220" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">Active-Active</text>
  <text x="670" y="128" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Multiple regions serving traffic</text>
  
  <!-- Region 1 -->
  <rect x="500" y="145" width="120" height="70" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="560" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="white">US-East</text>
  <text x="560" y="188" text-anchor="middle" font-size="8" fill="#c4b5fd">✓ Read/Write</text>
  <text x="560" y="203" text-anchor="middle" font-size="8" fill="#c4b5fd">✓ Local users</text>
  
  <!-- Region 2 -->
  <rect x="640" y="145" width="120" height="70" rx="6" fill="var(--bg-theme, #a78bfa)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="700" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="white">EU-West</text>
  <text x="700" y="188" text-anchor="middle" font-size="8" fill="#ddd6fe">✓ Read/Write</text>
  <text x="700" y="203" text-anchor="middle" font-size="8" fill="#ddd6fe">✓ Local users</text>
  
  <!-- Region 3 -->
  <rect x="780" y="145" width="120" height="70" rx="6" fill="var(--bg-theme, #c4b5fd)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="840" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="white">APAC</text>
  <text x="840" y="188" text-anchor="middle" font-size="8" fill="#e9d5ff">✓ Read/Write</text>
  <text x="840" y="203" text-anchor="middle" font-size="8" fill="#e9d5ff">✓ Local users</text>
  
  <!-- Bi-directional replication -->
  <line x1="625" y1="180" x2="635" y2="180" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="765" y1="180" x2="775" y2="180" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="695" y="175" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Multi-master</text>
  <text x="695" y="205" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">replication</text>
  
  <!-- Pros/Cons -->
  <rect x="490" y="240" width="360" height="55" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="510" y="260" text-anchor="start" font-size="9" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="260" font-size="9" fill="var(--text-theme, #64748b">Low latency globally</text>
  <text x="680" y="260" font-size="9" fill="var(--text-theme, #ef4444">✗</text>
  <text x="695" y="260" font-size="9" fill="var(--text-theme, #64748b">Write conflicts</text>
  <text x="510" y="280" font-size="9" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="280" font-size="9" fill="var(--text-theme, #64748b">High availability</text>
  <text x="680" y="280" font-size="9" fill="var(--text-theme, #ef4444">✗</text>
  <text x="695" y="280" font-size="9" fill="var(--text-theme, #64748b">Complex consistency</text>
  
  <!-- Bottom: Decision Framework -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Choosing the Right Topology</text>
  
  <!-- Decision criteria -->
  <rect x="50" y="360" width="260" height="160" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="180" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Choose Active-Passive When:</text>
  <text x="180" y="410" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Strong consistency required</text>
  <text x="180" y="430" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Write conflicts unacceptable</text>
  <text x="180" y="450" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Failover time budget: minutes</text>
  <text x="180" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Examples: Banking, inventory</text>
  <text x="180" y="490" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Compliance: single write region</text>
  
  <rect x="330" y="360" width="260" height="160" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="460" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #8b5cf6">Choose Active-Active When:</text>
  <text x="460" y="410" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Low latency globally required</text>
  <text x="460" y="430" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Write conflicts resolvable</text>
  <text x="460" y="450" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Failover time budget: seconds</text>
  <text x="460" y="470" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Examples: Social, content, chat</text>
  <text x="460" y="490" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Eventual consistency acceptable</text>
  
  <rect x="610" y="360" width="260" height="160" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="740" y="385" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">Hybrid Approach</text>
  <text x="740" y="410" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Active-Active for reads</text>
  <text x="740" y="430" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Active-Passive for writes</text>
  <text x="740" y="455" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Best of both worlds:</text>
  <text x="740" y="475" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Low read latency</text>
  <text x="740" y="490" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• No write conflicts</text>
  <text x="740" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Common pattern for global apps</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
</svg>
