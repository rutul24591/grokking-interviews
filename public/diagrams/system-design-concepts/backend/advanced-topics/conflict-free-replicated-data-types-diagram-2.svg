<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">CRDT Types and Semantics</title>
  <desc id="desc">CRDT design trade-offs: state-based vs operation-based, metadata size, and merge frequency</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">CRDT Types and Semantics</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Different CRDT types encode different conflict resolution rules</text>
  
  <!-- Counters -->
  <rect x="30" y="85" width="270" height="180" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6)">Counters</text>
  
  <!-- G-Counter -->
  <rect x="50" y="125" width="230" height="55" rx="6" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="165" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6)">G-Counter (Grow-only)</text>
  <text x="165" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Only increments, merge = max per node</text>
  <text x="165" y="178" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">✓ Simple, ✓ No coordination</text>
  
  <!-- PN-Counter -->
  <rect x="50" y="190" width="230" height="65" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="165" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">PN-Counter (Inc/Dec)</text>
  <text x="165" y="230" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Two G-Counters: P (positive) + N (negative)</text>
  <text x="165" y="245" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Value = P - N</text>
  <text x="165" y="258" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">✓ Supports decrement</text>
  
  <!-- Registers -->
  <rect x="315" y="85" width="270" height="180" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">Registers</text>
  
  <!-- LWW Register -->
  <rect x="335" y="125" width="230" height="55" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="450" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #8b5cf6">LWW Register</text>
  <text x="450" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Last-Writer-Wins using timestamps</text>
  <text x="450" y="178" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">✗ May lose concurrent updates</text>
  
  <!-- MV Register -->
  <rect x="335" y="190" width="230" height="65" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">MV Register (Multi-Value)</text>
  <text x="450" y="230" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Keeps concurrent values, client resolves</text>
  <text x="450" y="245" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">✓ No data loss, ~ Client complexity</text>
  
  <!-- Sets -->
  <rect x="600" y="85" width="270" height="180" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Sets</text>
  
  <!-- G-Set -->
  <rect x="620" y="125" width="105" height="55" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="672" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">G-Set</text>
  <text x="672" y="165" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Grow-only</text>
  <text x="672" y="178" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Add only</text>
  
  <!-- 2P-Set -->
  <rect x="735" y="125" width="115" height="55" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="792" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">2P-Set</text>
  <text x="792" y="165" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Two G-Sets</text>
  <text x="792" y="178" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Add + Remove</text>
  
  <!-- OR-Set -->
  <rect x="620" y="190" width="230" height="55" rx="6" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="735" y="213" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">OR-Set (Observed-Remove)</text>
  <text x="735" y="230" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Track element identities with unique tags</text>
  <text x="735" y="243" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">✓ Add-wins semantics</text>
  
  <!-- Bottom: Common CRDT Operations -->
  <rect x="30" y="280" width="840" height="250" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="450" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">CRDT Operations and Merge Semantics</text>
  
  <!-- Counter operations -->
  <rect x="50" y="320" width="260" height="90" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="180" y="343" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Counter Merge</text>
  <text x="180" y="365" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Per-node max:</text>
  <text x="180" y="385" text-anchor="middle" font-size="11" font-family="monospace" fill="var(--text-theme, #1e293b">V[i] = max(A[i], B[i])</text>
  <text x="180" y="405" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Result: Sum of all V[i]</text>
  
  <!-- Set merge -->
  <rect x="320" y="320" width="260" height="90" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="450" y="343" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #10b981">Set Merge (OR-Set)</text>
  <text x="450" y="365" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Union of adds, minus removes:</text>
  <text x="450" y="385" text-anchor="middle" font-size="11" font-family="monospace" fill="var(--text-theme, #1e293b">(A ∪ B) - (R_A ∪ R_B)</text>
  <text x="450" y="405" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Add-wins on conflict</text>
  
  <!-- Register merge -->
  <rect x="590" y="320" width="260" height="90" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="720" y="343" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #8b5cf6">Register Merge</text>
  <text x="720" y="365" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">LWW: Max timestamp wins</text>
  <text x="720" y="385" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">MV: Keep concurrent values</text>
  <text x="720" y="405" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">Client must resolve MV conflicts</text>
  
  <!-- State-based vs Operation-based -->
  <rect x="50" y="425" width="380" height="95" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="240" y="448" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309">State-based (CvRDT) vs Operation-based (CmRDT)</text>
  <text x="240" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">State-based: Send full/ delta state, merge on receive</text>
  <text x="240" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Op-based: Send operations, apply in order</text>
  <text x="240" y="510" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">State: Simpler, more bandwidth | Op: Efficient, needs causal delivery</text>
  
  <!-- Metadata overhead -->
  <rect x="450" y="425" width="400" height="95" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #ef4444)" stroke-width="1"/>
  <text x="650" y="448" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #ef4444">Metadata Overhead Concerns</text>
  <text x="650" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Version vectors grow with replica count</text>
  <text x="650" y="490" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Tombstones accumulate for deletions</text>
  <text x="650" y="510" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Need garbage collection strategy</text>
</svg>
