<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Count-Min Sketch Use Cases</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#555555">Heavy Hitters, Frequency Estimation, and Network Monitoring</text>

  <!-- Heavy Hitters -->
  <rect x="30" y="75" width="270" height="390" rx="12" fill="white" stroke="#6d5bd0" stroke-width="1"/>
  <rect x="30" y="75" width="270" height="45" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="105" width="270" height="15" fill="#6d5bd0"/>
  <text x="165" y="104" text-anchor="middle" font-size="15" font-weight="bold" fill="white">1. Heavy Hitters</text>

  <text x="165" y="140" text-anchor="middle" font-size="11" fill="#666666">Find items with frequency > threshold</text>

  <!-- Sketch icon -->
  <rect x="50" y="155" width="230" height="80" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="165" y="175" text-anchor="middle" font-size="10" fill="#888888">Count-Min Sketch</text>
  <!-- Mini sketch -->
  <rect x="65" y="185" width="25" height="18" rx="3" fill="#e8e4f0" stroke="#6d5bd0" stroke-width="0.5"/>
  <text x="77" y="198" text-anchor="middle" font-size="9" fill="#6d5bd0">15</text>
  <rect x="93" y="185" width="25" height="18" rx="3" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text x="105" y="198" text-anchor="middle" font-size="9" fill="#666666">3</text>
  <rect x="121" y="185" width="25" height="18" rx="3" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text x="133" y="198" text-anchor="middle" font-size="9" fill="#666666">7</text>
  <rect x="149" y="185" width="25" height="18" rx="3" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text x="161" y="198" text-anchor="middle" font-size="9" fill="#666666">2</text>
  <rect x="177" y="185" width="25" height="18" rx="3" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text x="189" y="198" text-anchor="middle" font-size="9" fill="#666666">12</text>
  <rect x="205" y="185" width="25" height="18" rx="3" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text x="217" y="198" text-anchor="middle" font-size="9" fill="#666666">5</text>
  <rect x="233" y="185" width="25" height="18" rx="3" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text x="245" y="198" text-anchor="middle" font-size="9" fill="#666666">8</text>
  <rect x="261" y="185" width="25" height="18" rx="3" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text x="273" y="198" text-anchor="middle" font-size="9" fill="#666666">1</text>
  <rect x="65" y="206" width="221" height="18" rx="3" fill="#f0f0f0" stroke="#cccccc" stroke-width="0.5"/>
  <text x="175" y="219" text-anchor="middle" font-size="9" fill="#666666">... (d rows total) ...</text>

  <!-- Threshold comparison -->
  <rect x="50" y="250" width="230" height="55" rx="8" fill="#fff8e1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="165" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0ad4e">Threshold: epsilon * N</text>
  <text x="165" y="288" text-anchor="middle" font-size="10" fill="#666666">N = total stream elements</text>
  <text x="165" y="302" text-anchor="middle" font-size="10" fill="#666666">epsilon = fraction (e.g., 0.01)</text>

  <!-- Results -->
  <rect x="50" y="320" width="230" height="130" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="165" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Results</text>

  <rect x="60" y="355" width="210" height="22" rx="4" fill="#e8e4f0"/>
  <text x="80" y="370" font-size="10" fill="#6d5bd0">"google.com"  ~450</text>
  <rect x="230" y="355" width="35" height="22" rx="4" fill="#4caf50"/>
  <text x="247" y="370" text-anchor="middle" font-size="10" font-weight="bold" fill="white">YES</text>

  <rect x="60" y="382" width="210" height="22" rx="4" fill="#e8e4f0"/>
  <text x="80" y="397" font-size="10" fill="#6d5bd0">"example.io"  ~120</text>
  <rect x="230" y="382" width="35" height="22" rx="4" fill="#4caf50"/>
  <text x="247" y="397" text-anchor="middle" font-size="10" font-weight="bold" fill="white">YES</text>

  <rect x="60" y="409" width="210" height="22" rx="4" fill="#f0f0f0"/>
  <text x="80" y="424" font-size="10" fill="#666666">"rare.net"  ~5</text>
  <rect x="230" y="409" width="35" height="22" rx="4" fill="#cc4444"/>
  <text x="247" y="424" text-anchor="middle" font-size="10" font-weight="bold" fill="white">NO</text>

  <!-- Use cases -->
  <rect x="60" y="440" width="210" height="18" rx="4" fill="#f9f9f9"/>
  <text x="165" y="453" text-anchor="middle" font-size="9" fill="#666666">DDoS detection, trending topics</text>

  <!-- Frequency Estimation -->
  <rect x="320" y="75" width="270" height="390" rx="12" fill="white" stroke="#4caf50" stroke-width="1"/>
  <rect x="320" y="75" width="270" height="45" rx="12" fill="#4caf50"/>
  <rect x="320" y="105" width="270" height="15" fill="#4caf50"/>
  <text x="455" y="104" text-anchor="middle" font-size="15" font-weight="bold" fill="white">2. Frequency Estimation</text>

  <text x="455" y="140" text-anchor="middle" font-size="11" fill="#666666">Approximate counts with bounded error</text>

  <!-- Flow example -->
  <rect x="340" y="155" width="230" height="100" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="455" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Stream: [A, B, A, C, A, B, A, D, A]</text>

  <text x="455" y="198" text-anchor="middle" font-size="10" fill="#666666">Query: How many times did &quot;A&quot; appear?</text>

  <!-- Estimate -->
  <rect x="355" y="210" width="200" height="35" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="455" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#4caf50">Estimate: ~5 (actual: 5)</text>

  <!-- Error bound -->
  <rect x="355" y="260" width="200" height="60" rx="8" fill="#fff8e1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="455" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0ad4e">Error Bound</text>
  <text x="455" y="298" text-anchor="middle" font-size="10" fill="#333333">|estimate - actual| &gt;= epsilon * N</text>
  <text x="455" y="314" text-anchor="middle" font-size="10" fill="#666666">With prob 1 - delta, epsilon = e/w</text>

  <!-- Space advantage -->
  <rect x="340" y="335" width="230" height="60" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="455" y="355" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Space Efficiency</text>
  <text x="455" y="372" text-anchor="middle" font-size="10" fill="#333333">O(1/epsilon * log(1/delta)) space</text>
  <text x="455" y="388" text-anchor="middle" font-size="10" fill="#333333">vs O(distinct items) for exact count</text>

  <!-- Comparison -->
  <rect x="340" y="410" width="230" height="50" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="455" y="430" text-anchor="middle" font-size="10" fill="#666666">HashMap: exact, but O(n) memory</text>
  <text x="455" y="446" text-anchor="middle" font-size="10" font-weight="bold" fill="#4caf50">CMS: approx, but O(1) fixed memory</text>

  <!-- Network Monitoring -->
  <rect x="610" y="75" width="270" height="390" rx="12" fill="white" stroke="#cc4444" stroke-width="1"/>
  <rect x="610" y="75" width="270" height="45" rx="12" fill="#cc4444"/>
  <rect x="610" y="105" width="270" height="15" fill="#cc4444"/>
  <text x="745" y="104" text-anchor="middle" font-size="15" font-weight="bold" fill="white">3. Network Monitoring</text>

  <text x="745" y="140" text-anchor="middle" font-size="11" fill="#666666">Track flow sizes, detect anomalies</text>

  <!-- Network flows -->
  <rect x="630" y="155" width="230" height="80" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="745" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Network Flows</text>

  <rect x="640" y="185" width="65" height="35" rx="6" fill="#e8e4f0"/>
  <text x="672" y="200" text-anchor="middle" font-size="9" fill="#6d5bd0">Flow 1</text>
  <text x="672" y="214" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">2.1 GB</text>

  <rect x="712" y="185" width="65" height="35" rx="6" fill="#e8e4f0"/>
  <text x="744" y="200" text-anchor="middle" font-size="9" fill="#6d5bd0">Flow 2</text>
  <text x="744" y="214" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">0.3 GB</text>

  <rect x="784" y="185" width="65" height="35" rx="6" fill="#ffebee"/>
  <text x="816" y="200" text-anchor="middle" font-size="9" fill="#cc4444">Flow 3</text>
  <text x="816" y="214" text-anchor="middle" font-size="10" font-weight="bold" fill="#cc4444">15 GB!</text>

  <!-- Anomaly detection -->
  <rect x="630" y="250" width="230" height="60" rx="8" fill="#ffebee" stroke="#cc4444" stroke-width="1"/>
  <text x="745" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#cc4444">Anomaly Detected!</text>
  <text x="745" y="288" text-anchor="middle" font-size="10" fill="#333333">Flow 3 exceeds 3-sigma threshold</text>
  <text x="745" y="304" text-anchor="middle" font-size="10" fill="#cc4444">Possible DDoS or data exfiltration</text>

  <!-- Applications -->
  <rect x="630" y="325" width="230" height="130" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="745" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">Applications</text>

  <rect x="640" y="358" width="210" height="22" rx="4" fill="#fff8e1"/>
  <text x="745" y="373" text-anchor="middle" font-size="10" fill="#333333">Traffic engineering &amp; routing</text>

  <rect x="640" y="385" width="210" height="22" rx="4" fill="#fff8e1"/>
  <text x="745" y="400" text-anchor="middle" font-size="10" fill="#333333">Intrusion detection systems</text>

  <rect x="640" y="412" width="210" height="22" rx="4" fill="#fff8e1"/>
  <text x="745" y="427" text-anchor="middle" font-size="10" fill="#333333">Bandwidth accounting</text>

  <rect x="640" y="439" width="210" height="22" rx="4" fill="#fff8e1"/>
  <text x="745" y="454" text-anchor="middle" font-size="10" fill="#333333">QoS policy enforcement</text>
</svg>
