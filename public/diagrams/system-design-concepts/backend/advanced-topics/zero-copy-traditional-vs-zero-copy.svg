<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Traditional I/O vs zero-copy I/O comparing data copies and CPU usage</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Traditional I/O vs Zero-Copy I/O</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Traditional: 4 copies across kernel and user space; Zero-copy: 2 copies using sendfile() eliminating user-space buffer</text>

  <!-- Left: Traditional I/O -->
  <rect x="30" y="80" width="410" height="400" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="30" rx="12" fill="#cc4444"/>
  <rect x="30" y="100" width="410" height="10" fill="#cc4444"/>
  <text x="235" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Traditional I/O: read() + write() — 4 copies</text>

  <!-- User space -->
  <rect x="50" y="125" width="370" height="140" rx="8" fill="#f3f1f8" stroke="#1a1822" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="235" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">User Space</text>

  <!-- User buffer -->
  <rect x="130" y="160" width="210" height="80" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="2"/>
  <text x="235" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#cc4444">User Buffer</text>
  <text x="235" y="210" text-anchor="middle" font-size="10" fill="#1a1822">Application memory</text>
  <text x="235" y="227" text-anchor="middle" font-size="10" fill="#1a1822">Data copied here temporarily</text>

  <!-- Kernel space -->
  <rect x="50" y="285" width="370" height="175" rx="8" fill="#6d5bd0" opacity="0.05" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="235" y="305" text-anchor="middle" font-size="10" font-weight="700" fill="#6d5bd0">Kernel Space</text>

  <!-- Disk -->
  <rect x="60" y="320" width="120" height="50" rx="8" fill="#f0ad4e" opacity="0.2" stroke="#f0ad4e" stroke-width="2"/>
  <text x="120" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Disk</text>
  <text x="120" y="358" text-anchor="middle" font-size="9" fill="#1a1822">Page cache</text>

  <!-- Kernel buffer -->
  <rect x="200" y="320" width="120" height="50" rx="8" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="2"/>
  <text x="260" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Kernel Buffer</text>
  <text x="260" y="358" text-anchor="middle" font-size="9" fill="#1a1822">read() destination</text>

  <!-- Socket -->
  <rect x="340" y="320" width="70" height="50" rx="8" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="2"/>
  <text x="375" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Socket</text>
  <text x="375" y="358" text-anchor="middle" font-size="9" fill="#1a1822">NIC</text>

  <!-- Copy arrows - read() path -->
  <line x1="120" y1="320" x2="120" y2="270" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowZC)"/>
  <line x1="120" y1="270" x2="180" y2="240" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowZC)"/>
  <text x="100" y="295" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">Copy 1: DMA</text>
  <text x="135" y="255" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Copy 2: CPU</text>

  <!-- Copy arrows - write() path -->
  <line x1="280" y1="240" x2="330" y2="270" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowZC)"/>
  <line x1="330" y1="270" x2="375" y2="320" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowZC)"/>
  <text x="320" y="255" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Copy 3: CPU</text>
  <text x="360" y="295" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Copy 4: DMA</text>

  <!-- System calls -->
  <rect x="60" y="395" width="130" height="45" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="125" y="413" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">read(fd, buf)</text>
  <text x="125" y="430" text-anchor="middle" font-size="9" fill="#1a1822">Disk → kernel → user</text>

  <rect x="210" y="395" width="130" height="45" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="275" y="413" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">write(sock, buf)</text>
  <text x="275" y="430" text-anchor="middle" font-size="9" fill="#1a1822">User → kernel → socket</text>

  <!-- Cost -->
  <rect x="360" y="395" width="60" height="45" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="1"/>
  <text x="390" y="413" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">4x</text>
  <text x="390" y="430" text-anchor="middle" font-size="9" fill="#1a1822">copies</text>

  <!-- Right: Zero-Copy I/O -->
  <rect x="460" y="80" width="410" height="400" rx="12" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="30" rx="12" fill="#4caf50"/>
  <rect x="460" y="100" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Zero-Copy I/O: sendfile() — 2 copies</text>

  <!-- User space - empty/crossed out -->
  <rect x="480" y="125" width="370" height="140" rx="8" fill="#f3f1f8" stroke="#1a1822" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="665" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822" opacity="0.5">User Space (skipped)</text>
  <!-- X mark -->
  <line x1="620" y1="170" x2="710" y2="240" stroke="#cc4444" stroke-width="2" opacity="0.4"/>
  <line x1="710" y1="170" x2="620" y2="240" stroke="#cc4444" stroke-width="2" opacity="0.4"/>
  <text x="665" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#cc4444" opacity="0.6">No user buffer copy</text>

  <!-- Kernel space -->
  <rect x="480" y="285" width="370" height="175" rx="8" fill="#6d5bd0" opacity="0.05" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="665" y="305" text-anchor="middle" font-size="10" font-weight="700" fill="#6d5bd0">Kernel Space</text>

  <!-- Disk -->
  <rect x="490" y="320" width="120" height="50" rx="8" fill="#f0ad4e" opacity="0.2" stroke="#f0ad4e" stroke-width="2"/>
  <text x="550" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Disk</text>
  <text x="550" y="358" text-anchor="middle" font-size="9" fill="#1a1822">Page cache</text>

  <!-- Kernel buffer -->
  <rect x="630" y="320" width="120" height="50" rx="8" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="2"/>
  <text x="690" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Kernel Buffer</text>
  <text x="690" y="358" text-anchor="middle" font-size="9" fill="#1a1822">Page cache data</text>

  <!-- Socket -->
  <rect x="770" y="320" width="70" height="50" rx="8" fill="#4caf50" opacity="0.2" stroke="#4caf50" stroke-width="2"/>
  <text x="805" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Socket</text>
  <text x="805" y="358" text-anchor="middle" font-size="9" fill="#1a1822">NIC</text>

  <!-- Copy arrows - zero-copy path -->
  <line x1="550" y1="320" x2="550" y2="290" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowZC)"/>
  <text x="530" y="305" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">Copy 1: DMA</text>

  <line x1="630" y1="345" x2="770" y2="345" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowZC)"/>
  <text x="700" y="335" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Copy 2: DMA (gather)</text>

  <!-- Direct arrow kernel to socket -->
  <rect x="610" y="270" width="110" height="35" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="292" text-anchor="middle" font-size="10" font-weight="700" fill="#4caf50">sendfile()</text>

  <!-- System call -->
  <rect x="490" y="395" width="200" height="45" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="590" y="413" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">sendfile(sock, fd)</text>
  <text x="590" y="430" text-anchor="middle" font-size="9" fill="#1a1822">Kernel handles entire path</text>

  <!-- Cost -->
  <rect x="710" y="395" width="60" height="45" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="740" y="413" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">2x</text>
  <text x="740" y="430" text-anchor="middle" font-size="9" fill="#1a1822">copies</text>

  <!-- Bottom comparison -->
  <rect x="30" y="460" width="410" height="25" rx="6" fill="#cc4444" opacity="0.1"/>
  <text x="235" y="478" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">CPU copies: 4, Context switches: 4, User-space overhead: Yes</text>

  <rect x="460" y="460" width="410" height="25" rx="6" fill="#4caf50" opacity="0.1"/>
  <text x="665" y="478" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">CPU copies: 2, Context switches: 2, User-space overhead: None</text>

  <defs>
    <marker id="arrowZC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
