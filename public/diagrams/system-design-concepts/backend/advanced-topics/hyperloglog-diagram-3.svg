<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">HyperLogLog Failure Modes</title>
  <desc id="desc">HyperLogLog failure modes: inconsistent hashing, misuse for exactness, and windowing errors</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">HyperLogLog Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Common mistakes and how to avoid them</text>
  
  <!-- Top Left: Identity/Hashing Drift -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444)">1. Identity &amp; Hashing Drift</text>
  <text x="235" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b">Inconsistent identity = wrong estimates</text>
  
  <!-- Hashing inconsistency -->
  <rect x="50" y="145" width="370" height="130" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  
  <!-- Same user, different representations -->
  <rect x="60" y="160" width="150" height="45" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="135" y="180" text-anchor="middle" font-size="9" fill="white">User: "Alice"</text>
  <text x="135" y="195" text-anchor="middle" font-size="8" fill="#bfdbfe">HLL Counter A</text>
  
  <line x1="210" y1="183" x2="235" y2="183" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="222" y="173" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">Different!</text>
  
  <rect x="245" y="160" width="150" height="45" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="320" y="180" text-anchor="middle" font-size="9" fill="white">User: "alice@example"</text>
  <text x="320" y="195" text-anchor="middle" font-size="8" fill="#c4b5fd">HLL Counter B</text>
  
  <text x="235" y="235" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Same user counted twice!</text>
  
  <text x="235" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Causes:</text>
  <text x="70" y="280" font-size="8" fill="var(--text-theme, #64748b">• Different ID formats across services</text>
  <text x="70" y="295" font-size="8" fill="var(--text-theme, #64748b">• Hash function changes between deploys</text>
  <text x="70" y="310" font-size="8" fill="var(--text-theme, #64748b">• Case sensitivity, normalization issues</text>
  
  <text x="235" y="335" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Standardize identity, version hash scheme</text>
  
  <!-- Top Right: Misuse for Exactness -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #f59e0b">2. Misuse for Exact Counts</text>
  <text x="665" y="128" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b">Using estimates where exactness required</text>
  
  <!-- Example scenario -->
  <rect x="480" y="145" width="370" height="130" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  
  <text x="665" y="170" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Billing scenario (WRONG USE):</text>
  
  <rect x="490" y="185" width="160" height="50" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="570" y="208" text-anchor="middle" font-size="9" fill="white">HLL Estimate:</text>
  <text x="570" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1,065 users</text>
  <text x="570" y="235" text-anchor="middle" font-size="7" fill="#b45309">±6.5% error</text>
  
  <line x1="650" y1="210" x2="675" y2="210" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  
  <rect x="685" y="185" width="155" height="50" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="762" y="208" text-anchor="middle" font-size="9" fill="white">Actual Count:</text>
  <text x="762" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1,000 users</text>
  <text x="762" y="235" text-anchor="middle" font-size="7" fill="#fca5a5">65 user discrepancy!</text>
  
  <text x="665" y="260" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Result: Billing errors, customer disputes</text>
  
  <text x="665" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Use HLL for: Dashboards, alerts, exploration</text>
  <text x="665" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444">Don't use HLL for: Billing, enforcement, compliance</text>
  
  <!-- Bottom Left: Windowing Confusion -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. Windowing Confusion</text>
  <text x="235" y="383" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b">Accumulating across time windows</text>
  
  <!-- Window accumulation problem -->
  <rect x="50" y="400" width="370" height="120" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  
  <!-- Day 1 -->
  <rect x="60" y="415" width="80" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="100" y="435" text-anchor="middle" font-size="8" fill="white">Day 1</text>
  <text x="100" y="450" text-anchor="middle" font-size="9" font-weight="bold" fill="white">1K users</text>
  
  <line x1="140" y1="435" x2="160" y2="435" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="150" y="425" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Merge</text>
  
  <!-- Day 2 -->
  <rect x="165" y="415" width="80" height="40" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="205" y="435" text-anchor="middle" font-size="8" fill="white">Day 2</text>
  <text x="205" y="450" text-anchor="middle" font-size="9" font-weight="bold" fill="white">1K users</text>
  
  <line x1="245" y1="435" x2="265" y2="435" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Merged (wrong) -->
  <rect x="270" y="415" width="140" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="340" y="435" text-anchor="middle" font-size="8" fill="white">Merged (WRONG)</text>
  <text x="340" y="450" text-anchor="middle" font-size="9" font-weight="bold" fill="white">~1.5K users</text>
  
  <text x="235" y="485" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Problem: Many users overlap across days!</text>
  <text x="235" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">HLL merge ≠ sum of unique per window</text>
  
  <text x="235" y="530" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Keep separate HLL per window, don't merge for time-series</text>
  
  <!-- Bottom Right: Mitigation Summary -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Best Practices</text>
  
  <!-- Identity standardization -->
  <rect x="480" y="380" width="180" height="75" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="570" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Standardize Identity</text>
  <text x="570" y="425" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Normalize before hashing</text>
  <text x="570" y="440" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Document ID semantics</text>
  
  <!-- Use case matching -->
  <rect x="680" y="380" width="180" height="75" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="770" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Match Use Case</text>
  <text x="770" y="425" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Exploration: HLL OK</text>
  <text x="770" y="440" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Billing: Use exact</text>
  
  <!-- Window management -->
  <rect x="480" y="470" width="180" height="75" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="570" y="493" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #f59e0b">Window Management</text>
  <text x="570" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Rotate per time period</text>
  <text x="570" y="530" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Label with window info</text>
  
  <!-- Monitoring -->
  <rect x="680" y="470" width="180" height="75" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="770" y="493" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #8b5cf6">Monitor Drift</text>
  <text x="770" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Alert on step changes</text>
  <text x="770" y="530" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Validate against samples</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
