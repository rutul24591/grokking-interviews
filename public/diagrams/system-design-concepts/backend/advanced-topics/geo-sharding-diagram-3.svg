<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Geo-Sharding Failure Modes</title>
  <desc id="desc">Geo-sharding failure modes: wrong routing, directory outages, cross-region latency, and migration errors</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Geo-Sharding Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Routing errors, directory failures, and migration risks</text>
  
  <!-- Top Left: Wrong Routing -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #ef4444)">1. Wrong Routing &amp; Stale Directory Cache</text>
  
  <!-- Stale cache scenario -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  
  <!-- Before migration -->
  <rect x="60" y="150" width="150" height="55" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="135" y="175" text-anchor="middle" font-size="9" fill="white">Old State</text>
  <text x="135" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">User → US-East</text>
  <text x="135" y="203" text-anchor="middle" font-size="7" fill="#93c5fd">Cached in router</text>
  
  <line x1="210" y1="180" x2="235" y2="180" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="222" y="170" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">Migration!</text>
  
  <!-- After migration -->
  <rect x="245" y="150" width="150" height="55" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="320" y="175" text-anchor="middle" font-size="9" fill="white">New State</text>
  <text x="320" y="190" text-anchor="middle" font-size="8" fill="#6ee7b7">User → EU-West</text>
  <text x="320" y="203" text-anchor="middle" font-size="7" fill="#6ee7b7">Directory updated</text>
  
  <text x="235" y="250" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Router cache still points to US-East!</text>
  <text x="235" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Result: 404 errors, inconsistent reads</text>
  <text x="235" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Versioned routing, cache invalidation on migration</text>
  
  <!-- Top Right: Cross-Region Latency -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #f59e0b">2. Cross-Region Tail Latency</text>
  
  <!-- Cross-region query -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  
  <!-- User in US -->
  <circle cx="550" cy="170" r="20" fill="var(--bg-theme, #3b82f6)"/>
  <text x="550" y="175" text-anchor="middle" font-size="8" fill="white">US User</text>
  
  <!-- Query needs EU data -->
  <path d="M 570 170 Q 650 150 750 170" fill="none" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="660" y="145" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">Cross-region query</text>
  <text x="660" y="158" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">+80ms latency</text>
  
  <!-- EU Shard -->
  <rect x="730" y="150" width="80" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="770" y="173" text-anchor="middle" font-size="8" fill="white">EU Shard</text>
  
  <!-- Response -->
  <path d="M 750 195 Q 650 215 570 195" fill="none" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="660" y="225" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">Response +80ms</text>
  
  <text x="665" y="260" text-anchor="middle" font-size="10" fill="var(--text-theme, #ef4444">Global query = sum of regional latencies!</text>
  <text x="665" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Impact: p99 latency spikes, timeout errors</text>
  <text x="665" y="300" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Avoid cross-region queries, use derived global views</text>
  
  <!-- Bottom Left: Migration Errors -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #8b5cf6">3. Migration Errors</text>
  
  <!-- Migration phases -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  
  <text x="235" y="405" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Migration requires careful orchestration:</text>
  
  <!-- Phase 1 -->
  <rect x="60" y="415" width="90" height="45" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="105" y="435" text-anchor="middle" font-size="8" fill="white">1. Dual-Write</text>
  <text x="105" y="450" text-anchor="middle" font-size="7" fill="#bfdbfe">Both regions</text>
  
  <line x1="150" y1="437" x2="170" y2="437" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Phase 2 -->
  <rect x="175" y="415" width="90" height="45" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="220" y="435" text-anchor="middle" font-size="8" fill="white">2. Validate</text>
  <text x="220" y="450" text-anchor="middle" font-size="7" fill="#c4b5fd">Data matches</text>
  
  <line x1="265" y1="437" x2="285" y2="437" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Phase 3 -->
  <rect x="290" y="415" width="90" height="45" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="335" y="435" text-anchor="middle" font-size="8" fill="white">3. Cutover</text>
  <text x="335" y="450" text-anchor="middle" font-size="7" fill="#6ee7b7">Update directory</text>
  
  <line x1="195" y1="465" x2="195" y2="490" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="195" y="505" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444">Failure at any step = data loss!</text>
  
  <text x="235" y="530" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">Fix: Automated rollback, audit trails, staged cutover</text>
  
  <!-- Bottom Right: Mitigation Summary -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Mitigation Strategies</text>
  
  <rect x="480" y="380" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="570" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Directory HA</text>
  <text x="570" y="427" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Multi-region directory</text>
  <text x="570" y="442" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Consensus-based updates</text>
  <text x="570" y="457" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Versioned routing entries</text>
  
  <rect x="680" y="380" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="770" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Cache Invalidation</text>
  <text x="770" y="427" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">TTL-based expiry</text>
  <text x="770" y="442" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Explicit invalidation on migration</text>
  <text x="770" y="457" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Grace period for dual-routing</text>
  
  <rect x="480" y="480" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="570" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Migration Safety</text>
  <text x="570" y="527" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Dual-write during transition</text>
  <text x="570" y="542" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Automated validation checks</text>
  <text x="570" y="557" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">One-click rollback</text>
  
  <rect x="680" y="480" width="180" height="85" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="770" y="505" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #8b5cf6">Observability</text>
  <text x="770" y="527" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Track routing errors</text>
  <text x="770" y="542" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Monitor cross-region calls</text>
  <text x="770" y="557" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Alert on migration anomalies</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
  </defs>
</svg>
