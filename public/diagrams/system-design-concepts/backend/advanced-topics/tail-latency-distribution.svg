<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Tail Latency Distribution Curve</title>
  <desc>Histogram showing latency distribution with P50, P95, P99, P99.9 percentiles and amplification effect</desc>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Tail Latency Distribution</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Why percentiles matter — averages hide the slowest requests</text>

  <!-- Histogram Panel -->
  <rect x="25" y="70" width="560" height="300" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="305" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Request Latency Distribution (10,000 requests)</text>

  <!-- Y axis label -->
  <text x="38" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" transform="rotate(-90,38,210)">Frequency</text>

  <!-- X axis label -->
  <text x="305" y="360" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Response Time (ms, log scale)</text>

  <!-- Grid lines -->
  <line x1="60" y1="130" x2="560" y2="130" stroke="#e5e0ee" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="60" y1="180" x2="560" y2="180" stroke="#e5e0ee" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="60" y1="230" x2="560" y2="230" stroke="#e5e0ee" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="60" y1="280" x2="560" y2="280" stroke="#e5e0ee" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Y axis labels -->
  <text x="55" y="134" text-anchor="end" font-size="8" fill="#1a1822" opacity="0.6">40%</text>
  <text x="55" y="184" text-anchor="end" font-size="8" fill="#1a1822" opacity="0.6">30%</text>
  <text x="55" y="234" text-anchor="end" font-size="8" fill="#1a1822" opacity="0.6">20%</text>
  <text x="55" y="284" text-anchor="end" font-size="8" fill="#1a1822" opacity="0.6">10%</text>

  <!-- Histogram bars -->
  <!-- 0-10ms: 40% -->
  <rect x="80" y="120" width="48" height="180" rx="4" fill="#4caf50" stroke="#388e3c" stroke-width="1"/>
  <text x="104" y="112" text-anchor="middle" font-size="9" font-weight="700" fill="#388e3c">40%</text>
  <text x="104" y="316" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">0-10</text>

  <!-- 10-20ms: 25% -->
  <rect x="136" y="165" width="48" height="135" rx="4" fill="#4caf50" stroke="#388e3c" stroke-width="1"/>
  <text x="160" y="157" text-anchor="middle" font-size="9" font-weight="700" fill="#388e3c">25%</text>
  <text x="160" y="316" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">10-20</text>

  <!-- 20-50ms: 15% -->
  <rect x="192" y="200" width="48" height="100" rx="4" fill="#6d5bd0" stroke="#5a48b0" stroke-width="1"/>
  <text x="216" y="192" text-anchor="middle" font-size="9" font-weight="700" fill="#5a48b0">15%</text>
  <text x="216" y="316" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">20-50</text>

  <!-- 50-100ms: 10% -->
  <rect x="248" y="225" width="48" height="75" rx="4" fill="#6d5bd0" stroke="#5a48b0" stroke-width="1"/>
  <text x="272" y="217" text-anchor="middle" font-size="9" font-weight="700" fill="#5a48b0">10%</text>
  <text x="272" y="316" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">50-100</text>

  <!-- 100-200ms: 5% -->
  <rect x="304" y="250" width="48" height="50" rx="4" fill="#f0ad4e" stroke="#d4943a" stroke-width="1"/>
  <text x="328" y="242" text-anchor="middle" font-size="9" font-weight="700" fill="#d4943a">5%</text>
  <text x="328" y="316" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">100-200</text>

  <!-- 200-500ms: 3% -->
  <rect x="360" y="265" width="48" height="35" rx="4" fill="#f0ad4e" stroke="#d4943a" stroke-width="1"/>
  <text x="384" y="257" text-anchor="middle" font-size="9" font-weight="700" fill="#d4943a">3%</text>
  <text x="384" y="316" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">200-500</text>

  <!-- 500ms-1s: 1.5% -->
  <rect x="416" y="278" width="48" height="22" rx="4" fill="#cc4444" stroke="#a83333" stroke-width="1"/>
  <text x="440" y="272" text-anchor="middle" font-size="9" font-weight="700" fill="#a83333">1.5%</text>
  <text x="440" y="316" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">500ms-1s</text>

  <!-- 1s+: 0.5% -->
  <rect x="472" y="290" width="48" height="10" rx="4" fill="#cc4444" stroke="#a83333" stroke-width="1"/>
  <text x="496" y="284" text-anchor="middle" font-size="9" font-weight="700" fill="#a83333">0.5%</text>
  <text x="496" y="316" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.7">1s+</text>

  <!-- X axis tick values -->
  <text x="80" y="332" text-anchor="middle" font-size="7" fill="#1a1822" opacity="0.5">1ms</text>
  <text x="160" y="332" text-anchor="middle" font-size="7" fill="#1a1822" opacity="0.5">10ms</text>
  <text x="240" y="332" text-anchor="middle" font-size="7" fill="#1a1822" opacity="0.5">50ms</text>
  <text x="328" y="332" text-anchor="middle" font-size="7" fill="#1a1822" opacity="0.5">150ms</text>
  <text x="440" y="332" text-anchor="middle" font-size="7" fill="#1a1822" opacity="0.5">500ms</text>
  <text x="496" y="332" text-anchor="middle" font-size="7" fill="#1a1822" opacity="0.5">1000ms</text>

  <!-- Percentile markers -->
  <!-- P50 at ~20ms -->
  <line x1="200" y1="115" x2="200" y2="300" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="182" y="115" width="36" height="18" rx="4" fill="#6d5bd0"/>
  <text x="200" y="128" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">P50</text>
  <text x="200" y="108" text-anchor="middle" font-size="8" fill="#6d5bd0">~20ms</text>

  <!-- P95 at ~180ms -->
  <line x1="320" y1="115" x2="320" y2="300" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="302" y="115" width="36" height="18" rx="4" fill="#6d5bd0"/>
  <text x="320" y="128" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">P95</text>
  <text x="320" y="108" text-anchor="middle" font-size="8" fill="#6d5bd0">~180ms</text>

  <!-- P99 at ~400ms -->
  <line x1="380" y1="115" x2="380" y2="300" stroke="#cc4444" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="362" y="115" width="36" height="18" rx="4" fill="#cc4444"/>
  <text x="380" y="128" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">P99</text>
  <text x="380" y="108" text-anchor="middle" font-size="8" fill="#cc4444">~400ms</text>

  <!-- P99.9 at ~800ms -->
  <line x1="460" y1="115" x2="460" y2="300" stroke="#cc4444" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="442" y="115" width="42" height="18" rx="4" fill="#cc4444"/>
  <text x="463" y="128" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">P99.9</text>
  <text x="463" y="108" text-anchor="middle" font-size="8" fill="#cc4444">~800ms</text>

  <!-- Tail highlight zone -->
  <rect x="350" y="115" width="180" height="185" rx="4" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="440" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Tail Region (&lt;2% of requests)</text>

  <!-- Legend -->
  <rect x="80" y="345" width="12" height="12" rx="2" fill="#4caf50"/>
  <text x="98" y="355" font-size="9" fill="#1a1822">Fast (&lt;50ms)</text>
  <rect x="180" y="345" width="12" height="12" rx="2" fill="#6d5bd0"/>
  <text x="198" y="355" font-size="9" fill="#1a1822">Moderate</text>
  <rect x="290" y="345" width="12" height="12" rx="2" fill="#f0ad4e"/>
  <text x="308" y="355" font-size="9" fill="#1a1822">Slow</text>
  <rect x="360" y="345" width="12" height="12" rx="2" fill="#cc4444"/>
  <text x="378" y="355" font-size="9" fill="#1a1822">Stragglers</text>

  <!-- Right panel: Tail Amplification -->
  <rect x="605" y="70" width="270" height="300" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="740" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#cc4444">Tail Amplification Effect</text>

  <!-- Formula box -->
  <rect x="625" y="110" width="230" height="80" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="740" y="132" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Page with 100 sub-requests</text>
  <text x="740" y="155" text-anchor="middle" font-size="10" fill="#1a1822">Each request: P99 = 1%</text>
  <text x="740" y="178" text-anchor="middle" font-size="10" fill="#1a1822">P(all 100 fast) = 0.99^100</text>

  <!-- Result -->
  <rect x="625" y="200" width="230" height="45" rx="8" fill="#cc4444"/>
  <text x="740" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">P(at least 1 slow) = 63%</text>
  <text x="740" y="237" text-anchor="middle" font-size="9" fill="#fecaca">Most users see a slow page!</text>

  <!-- Implications list -->
  <rect x="625" y="258" width="230" height="95" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="640" y="278" font-size="9" font-weight="600" fill="#1a1822">Why tail latency matters:</text>
  <text x="640" y="296" font-size="9" fill="#1a1822">&#8226; Page load = max(all resources)</text>
  <text x="640" y="313" font-size="9" fill="#1a1822">&#8226; 1 slow resource blocks rendering</text>
  <text x="640" y="330" font-size="9" fill="#1a1822">&#8226; Tail grows with service fanout</text>
  <text x="640" y="347" font-size="9" fill="#1a1822">&#8226; Small % of slow = big % unhappy</text>

  <!-- Bottom panel -->
  <rect x="25" y="388" width="850" height="92" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>

  <!-- Card 1: Monitor -->
  <rect x="45" y="400" width="250" height="68" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="170" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Monitor Percentiles</text>
  <text x="170" y="438" text-anchor="middle" font-size="9" fill="#1a1822">Track P50, P95, P99, P99.9</text>
  <text x="170" y="456" text-anchor="middle" font-size="9" fill="#1a1822">Averages mask the tail</text>

  <!-- Card 2: Reduce Fanout -->
  <rect x="325" y="400" width="250" height="68" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Reduce Fanout</text>
  <text x="450" y="438" text-anchor="middle" font-size="9" fill="#1a1822">Batch requests, cache aggressively</text>
  <text x="450" y="456" text-anchor="middle" font-size="9" fill="#1a1822">Fewer calls = less tail amplification</text>

  <!-- Card 3: Set Budgets -->
  <rect x="605" y="400" width="250" height="68" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="730" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Enforce Latency Budgets</text>
  <text x="730" y="438" text-anchor="middle" font-size="9" fill="#1a1822">Per-hop timeout, alert on tail growth</text>
  <text x="730" y="456" text-anchor="middle" font-size="9" fill="#1a1822">Fail fast instead of waiting</text>
</svg>