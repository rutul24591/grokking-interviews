<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">B-Tree vs B+ Tree</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#555555">Data placement and leaf node linking strategies</text>

  <!-- B-Tree Section -->
  <rect x="30" y="70" width="400" height="400" fill="white" rx="12" stroke="#cccccc" stroke-width="1"/>
  <text x="230" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#6d5bd0">B-Tree</text>
  <text x="230" y="115" text-anchor="middle" font-size="11" fill="#666666">Data in internal + leaf nodes</text>

  <!-- B-Tree Root -->
  <rect x="180" y="130" width="100" height="35" rx="8" fill="#6d5bd0" stroke="#5a48b0" stroke-width="1"/>
  <text x="230" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="white">[15,30]</text>

  <!-- B-Tree Internal -->
  <rect x="80" y="195" width="100" height="35" rx="8" fill="#a89ee0" stroke="#8a7fc7" stroke-width="1"/>
  <text x="130" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="white">[8]</text>
  <rect x="280" y="195" width="100" height="35" rx="8" fill="#a89ee0" stroke="#8a7fc7" stroke-width="1"/>
  <text x="330" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="white">[22]</text>

  <!-- B-Tree Leaves with data -->
  <rect x="30" y="260" width="60" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="60" y="280" text-anchor="middle" font-size="11" fill="white">5</text>
  <rect x="100" y="260" width="60" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="130" y="280" text-anchor="middle" font-size="11" fill="white">8</text>
  <rect x="170" y="260" width="60" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="200" y="280" text-anchor="middle" font-size="11" fill="white">12</text>
  <rect x="250" y="260" width="60" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="280" y="280" text-anchor="middle" font-size="11" fill="white">15</text>
  <rect x="320" y="260" width="60" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="350" y="280" text-anchor="middle" font-size="11" fill="white">22</text>
  <rect x="390" y="260" width="60" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="420" y="280" text-anchor="middle" font-size="11" fill="white">28</text>

  <!-- B-Tree edges -->
  <line x1="230" y1="165" x2="130" y2="195" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="165" x2="330" y2="195" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="130" y1="230" x2="60" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="130" y1="230" x2="130" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="130" y1="230" x2="200" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="230" x2="280" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="230" x2="350" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="230" x2="420" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B-Tree note -->
  <rect x="60" y="310" width="340" height="50" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="230" y="330" text-anchor="middle" font-size="11" fill="#333333">Keys stored at ALL levels. Range queries require</text>
  <text x="230" y="346" text-anchor="middle" font-size="11" fill="#333333">traversing back up the tree.</text>

  <!-- B+ Tree Section -->
  <rect x="470" y="70" width="400" height="400" fill="white" rx="12" stroke="#cccccc" stroke-width="1"/>
  <text x="670" y="98" text-anchor="middle" font-size="16" font-weight="bold" fill="#6d5bd0">B+ Tree</text>
  <text x="670" y="115" text-anchor="middle" font-size="11" fill="#666666">Data only in leaves, leaves linked</text>

  <!-- B+ Tree Root -->
  <rect x="620" y="130" width="100" height="35" rx="8" fill="#6d5bd0" stroke="#5a48b0" stroke-width="1"/>
  <text x="670" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="white">[15,30]</text>

  <!-- B+ Tree Internal -->
  <rect x="520" y="195" width="100" height="35" rx="8" fill="#a89ee0" stroke="#8a7fc7" stroke-width="1"/>
  <text x="570" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="white">[8]</text>
  <rect x="720" y="195" width="100" height="35" rx="8" fill="#a89ee0" stroke="#8a7fc7" stroke-width="1"/>
  <text x="770" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="white">[22]</text>

  <!-- B+ Tree Leaves -->
  <rect x="470" y="260" width="55" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="497" y="280" text-anchor="middle" font-size="11" fill="white">5</text>
  <rect x="530" y="260" width="55" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="557" y="280" text-anchor="middle" font-size="11" fill="white">8</text>
  <rect x="590" y="260" width="55" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="617" y="280" text-anchor="middle" font-size="11" fill="white">12</text>
  <rect x="650" y="260" width="55" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="677" y="280" text-anchor="middle" font-size="11" fill="white">15</text>
  <rect x="710" y="260" width="55" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="737" y="280" text-anchor="middle" font-size="11" fill="white">22</text>
  <rect x="770" y="260" width="55" height="30" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="797" y="280" text-anchor="middle" font-size="11" fill="white">28</text>

  <!-- B+ Tree edges -->
  <line x1="670" y1="165" x2="570" y2="195" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="670" y1="165" x2="770" y2="195" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="230" x2="497" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="230" x2="557" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="230" x2="617" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="230" x2="677" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="230" x2="737" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="230" x2="797" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- B+ Tree leaf links -->
  <line x1="525" y1="305" x2="530" y2="305" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="585" y1="305" x2="590" y2="305" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="645" y1="305" x2="650" y2="305" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="705" y1="305" x2="710" y2="305" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="765" y1="305" x2="770" y2="305" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- B+ Tree note -->
  <rect x="500" y="320" width="340" height="50" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1"/>
  <text x="670" y="340" text-anchor="middle" font-size="11" fill="#333333">Leaves form ordered linked list. Range scans</text>
  <text x="670" y="356" text-anchor="middle" font-size="11" fill="#333333">are efficient sequential reads.</text>

  <!-- Bottom comparison -->
  <rect x="30" y="415" width="840" height="65" rx="8" fill="#e8e4f0" stroke="#6d5bd0" stroke-width="1"/>
  <text x="120" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Read (Range)</text>
  <text x="120" y="458" text-anchor="middle" font-size="11" fill="#4caf50">B+ tree faster: leaf scan</text>
  <text x="120" y="472" text-anchor="middle" font-size="11" fill="#4caf50">no tree traversal needed</text>

  <line x1="270" y1="420" x2="270" y2="475" stroke="#cccccc" stroke-width="1"/>

  <text x="370" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Read (Point)</text>
  <text x="370" y="458" text-anchor="middle" font-size="11" fill="#f0ad4e">Similar: both O(log n)</text>
  <text x="370" y="472" text-anchor="middle" font-size="11" fill="#f0ad4e">tree height lookup</text>

  <line x1="500" y1="420" x2="500" y2="475" stroke="#cccccc" stroke-width="1"/>

  <text x="600" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Write</text>
  <text x="600" y="458" text-anchor="middle" font-size="11" fill="#cc4444">Similar cost: both need</text>
  <text x="600" y="472" text-anchor="middle" font-size="11" fill="#cc4444">split/merge operations</text>

  <line x1="730" y1="420" x2="730" y2="475" stroke="#cccccc" stroke-width="1"/>

  <text x="820" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Space</text>
  <text x="820" y="458" text-anchor="middle" font-size="11" fill="#4caf50">B+ tree: keys duplicated</text>
  <text x="820" y="472" text-anchor="middle" font-size="11" fill="#4caf50">in internal nodes only</text>
</svg>
