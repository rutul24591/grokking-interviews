<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>MVCC Version Chain for Snapshot Isolation</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">MVCC Version Chain for Snapshot Isolation</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Each data item maintains multiple versions; transactions read the version visible at their snapshot time</text>

  <!-- Version chain row -->
  <rect x="30" y="80" width="840" height="140" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Data Item X: Version Chain</text>

  <!-- Version 1 -->
  <rect x="60" y="120" width="140" height="80" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="2"/>
  <text x="130" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">v1: X=10</text>
  <text x="130" y="165" text-anchor="middle" font-size="9" fill="#1a1822">Written by T1</text>
  <text x="130" y="180" text-anchor="middle" font-size="9" fill="#1a1822">t=1 (committed)</text>
  <text x="130" y="195" text-anchor="middle" font-size="9" fill="#4caf50" font-weight="600">Visible to t &gt;= 1</text>

  <!-- Arrow v1 to v2 -->
  <line x1="200" y1="160" x2="240" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowMVCC)"/>
  <text x="220" y="150" text-anchor="middle" font-size="8" fill="#6d5bd0">next</text>

  <!-- Version 2 -->
  <rect x="250" y="120" width="140" height="80" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="2"/>
  <text x="320" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">v2: X=25</text>
  <text x="320" y="165" text-anchor="middle" font-size="9" fill="#1a1822">Written by T2</text>
  <text x="320" y="180" text-anchor="middle" font-size="9" fill="#1a1822">t=3 (committed)</text>
  <text x="320" y="195" text-anchor="middle" font-size="9" fill="#f0ad4e" font-weight="600">Visible to t &gt;= 3</text>

  <!-- Arrow v2 to v3 -->
  <line x1="390" y1="160" x2="430" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowMVCC)"/>
  <text x="410" y="150" text-anchor="middle" font-size="8" fill="#6d5bd0">next</text>

  <!-- Version 3 -->
  <rect x="440" y="120" width="140" height="80" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="2"/>
  <text x="510" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">v3: X=50</text>
  <text x="510" y="165" text-anchor="middle" font-size="9" fill="#1a1822">Written by T3</text>
  <text x="510" y="180" text-anchor="middle" font-size="9" fill="#1a1822">t=5 (committed)</text>
  <text x="510" y="195" text-anchor="middle" font-size="9" fill="#cc4444" font-weight="600">Visible to t &gt;= 5</text>

  <!-- Timeline with transaction markers -->
  <line x1="60" y1="260" x2="840" y2="260" stroke="#1a1822" stroke-width="1" opacity="0.4"/>
  <text x="840" y="255" text-anchor="end" font-size="9" fill="#1a1822" opacity="0.6">Time</text>

  <!-- Time ticks -->
  <line x1="130" y1="255" x2="130" y2="265" stroke="#1a1822" stroke-width="1"/>
  <text x="130" y="280" text-anchor="middle" font-size="9" fill="#1a1822">t=1</text>
  <line x1="260" y1="255" x2="260" y2="265" stroke="#1a1822" stroke-width="1"/>
  <text x="260" y="280" text-anchor="middle" font-size="9" fill="#1a1822">t=3</text>
  <line x1="390" y1="255" x2="390" y2="265" stroke="#1a1822" stroke-width="1"/>
  <text x="390" y="280" text-anchor="middle" font-size="9" fill="#1a1822">t=4</text>
  <line x1="520" y1="255" x2="520" y2="265" stroke="#1a1822" stroke-width="1"/>
  <text x="520" y="280" text-anchor="middle" font-size="9" fill="#1a1822">t=5</text>
  <line x1="650" y1="255" x2="650" y2="265" stroke="#1a1822" stroke-width="1"/>
  <text x="650" y="280" text-anchor="middle" font-size="9" fill="#1a1822">t=6</text>

  <!-- Transaction T4 at t=4 -->
  <rect x="80" y="310" width="200" height="140" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="180" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#f0ad4e">Transaction T4 (t=4)</text>

  <rect x="100" y="350" width="160" height="35" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="180" y="372" text-anchor="middle" font-size="10" fill="#1a1822">Snapshot taken at t=4</text>

  <!-- Read arrow from T4 to v1 -->
  <path d="M 180 350 Q 180 310 130 210" fill="none" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowT4)" stroke-dasharray="4,3"/>
  <text x="108" y="290" text-anchor="start" font-size="8" font-weight="600" fill="#f0ad4e">reads v1</text>

  <rect x="100" y="395" width="160" height="45" rx="8" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="180" y="415" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Reads v1: X=10</text>
  <text x="180" y="430" text-anchor="middle" font-size="8" fill="#1a1822">v2 (t=3) not yet committed</text>

  <!-- Transaction T5 at t=6 -->
  <rect x="440" y="310" width="200" height="140" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="540" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#cc4444">Transaction T5 (t=6)</text>

  <rect x="460" y="350" width="160" height="35" rx="8" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="1"/>
  <text x="540" y="372" text-anchor="middle" font-size="10" fill="#1a1822">Snapshot taken at t=6</text>

  <!-- Read arrow from T5 to v2 -->
  <path d="M 540 350 Q 540 310 320 210" fill="none" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowT5)" stroke-dasharray="4,3"/>
  <text x="440" y="290" text-anchor="start" font-size="8" font-weight="600" fill="#cc4444">reads v2</text>

  <rect x="460" y="395" width="160" height="45" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="540" y="415" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Reads v2: X=25</text>
  <text x="540" y="430" text-anchor="middle" font-size="8" fill="#1a1822">v2 committed at t=3, visible at t=6</text>

  <!-- Visibility rule box -->
  <rect x="670" y="310" width="200" height="140" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="770" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Visibility Rule</text>
  <rect x="690" y="350" width="160" height="80" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="770" y="375" text-anchor="middle" font-size="10" fill="#1a1822">A version v written</text>
  <text x="770" y="395" text-anchor="middle" font-size="10" fill="#1a1822">at time t_v is visible</text>
  <text x="770" y="415" text-anchor="middle" font-size="10" fill="#1a1822">to transaction T with</text>
  <text x="770" y="435" text-anchor="middle" font-size="10" font-weight="700" fill="#6d5bd0">snapshot_t &gt;= t_v</text>

  <defs>
    <marker id="arrowMVCC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowT4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0ad4e"/>
    </marker>
    <marker id="arrowT5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
  </defs>
</svg>