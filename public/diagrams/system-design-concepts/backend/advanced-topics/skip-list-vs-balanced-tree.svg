<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>

  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#333">Skip List vs Balanced Tree (AVL/Red-Black)</text>
  <text x="450" y="64" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="#666">Production-scale trade-offs for ordered key-value storage</text>

  <!-- Skip List Column -->
  <rect x="20" y="80" width="420" height="400" rx="12" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <rect x="20" y="80" width="420" height="44" rx="12" fill="#4caf50"/>
  <text x="230" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Skip List</text>

  <!-- Skip list mini-diagram -->
  <text x="40" y="155" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#666">Structure:</text>

  <rect x="40" y="165" width="28" height="16" rx="6" fill="#6d5bd0"/>
  <text x="54" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">H</text>

