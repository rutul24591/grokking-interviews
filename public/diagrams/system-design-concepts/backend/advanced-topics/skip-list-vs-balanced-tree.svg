  <text x="480" y="155" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#666">Structure:</text>

  <!-- Tree structure -->
  <circle cx="670" cy="175" r="16" fill="#6d5bd0"/>
  <text x="670" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff">20</text>

  <line x1="658" y1="189" x2="610" y2="215" stroke="#333" stroke-width="1.5"/>
  <line x1="682" y1="189" x2="730" y2="215" stroke="#333" stroke-width="1.5"/>

  <circle cx="610" cy="215" r="16" fill="#f0ad4e"/>
  <text x="610" y="219" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff">10</text>

  <circle cx="730" cy="215" r="16" fill="#f0ad4e"/>
  <text x="730" y="219" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#fff">30</text>

  <line x1="600" y1="229" x2="570" y2="252" stroke="#333" stroke-width="1.5"/>
  <line x1="620" y1="229" x2="650" y2="252" stroke="#333" stroke-width="1.5"/>
  <line x1="720" y1="229" x2="690" y2="252" stroke="#333" stroke-width="1.5"/>
  <line x1="740" y1="229" x2="770" y2="252" stroke="#333" stroke-width="1.5"/>

  <circle cx="570" cy="252" r="14" fill="#cc4444"/>
  <text x="570" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff">5</text>

  <circle cx="650" cy="252" r="14" fill="#cc4444"/>
  <text x="650" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff">15</text>

  <circle cx="690" cy="252" r="14" fill="#cc4444"/>
  <text x="690" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff">25</text>

  <circle cx="770" cy="252" r="14" fill="#cc4444"/>
  <text x="770" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#fff">40</text>

  <!-- Rotation annotation -->
  <rect x="560" y="275" width="220" height="28" rx="8" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="670" y="293" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#f0ad4e">Rebalancing via rotations after insert/delete</text>

  <!-- Comparison metrics -->
  <text x="480" y="335" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#333">Comparison Metrics</text>

  <!-- Metric 1: Space Overhead -->
  <text x="480" y="360" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#333">Space Overhead</text>
  <rect x="480" y="368" width="180" height="18" rx="8" fill="#f3f1f8"/>
  <rect x="480" y="368" width="150" height="18" rx="8" fill="#cc4444" opacity="0.7"/>
  <text x="555" y="381" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">2 child ptrs + balance info</text>

  <!-- Metric 2: Search Performance -->
  <text x="480" y="405" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#333">Search Performance</text>
  <rect x="480" y="413" width="200" height="18" rx="8" fill="#f3f1f8"/>
  <rect x="480" y="413" width="180" height="18" rx="8" fill="#cc4444" opacity="0.7"/>
  <text x="570" y="426" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">O(log n) guaranteed worst-case</text>

  <!-- Metric 3: Implementation Complexity -->
  <text x="480" y="450" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#333">Implementation Complexity</text>
  <rect x="480" y="458" width="200" height="18" rx="8" fill="#f3f1f8"/>
  <rect x="480" y="458" width="170" height="18" rx="8" fill="#cc4444" opacity="0.7"/>
  <text x="565" y="471" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Complex rotations, recoloring</text>

  <!-- VS badge in center -->
  <circle cx="450" cy="280" r="22" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#6d5bd0">VS</text>
</svg>
