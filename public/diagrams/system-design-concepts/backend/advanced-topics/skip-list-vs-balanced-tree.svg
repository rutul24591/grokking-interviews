  <path d="M 118 221 L 140 221" stroke="#cc4444" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-green)"/>
  <path d="M 163 221 L 185 221" stroke="#cc4444" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-green)"/>
  <path d="M 210 221 L 232 221" stroke="#cc4444" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-green)"/>
  <path d="M 255 221 L 277 221" stroke="#cc4444" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-green)"/>

  <rect x="40" y="213" width="24" height="16" rx="6" fill="#cc4444"/>
  <text x="52" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">10</text>

  <rect x="95" y="213" width="24" height="16" rx="6" fill="#cc4444"/>
  <text x="107" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">15</text>

  <rect x="140" y="213" width="24" height="16" rx="6" fill="#cc4444"/>
  <text x="152" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">20</text>

  <rect x="185" y="213" width="24" height="16" rx="6" fill="#cc4444"/>
  <text x="197" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">30</text>

  <rect x="232" y="213" width="24" height="16" rx="6" fill="#cc4444"/>
  <text x="244" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">40</text>

  <!-- Comparison metrics -->
  <text x="40" y="265" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#333">Comparison Metrics</text>

  <!-- Metric 1: Space Overhead -->
  <text x="40" y="290" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#333">Space Overhead</text>
  <rect x="40" y="298" width="180" height="18" rx="8" fill="#f3f1f8"/>
  <rect x="40" y="298" width="130" height="18" rx="8" fill="#4caf50" opacity="0.8"/>
  <text x="130" y="311" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">O(n) extra pointers</text>

  <!-- Metric 2: Search Performance -->
  <text x="40" y="335" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#333">Search Performance</text>
  <rect x="40" y="343" width="200" height="18" rx="8" fill="#f3f1f8"/>
  <rect x="40" y="343" width="170" height="18" rx="8" fill="#4caf50" opacity="0.8"/>
  <text x="125" y="356" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">O(log n) expected, O(n) worst</text>

  <!-- Metric 3: Implementation Complexity -->
  <text x="40" y="380" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#333">Implementation Complexity</text>
  <rect x="40" y="388" width="160" height="18" rx="8" fill="#f3f1f8"/>
  <rect x="40" y="388" width="100" height="18" rx="8" fill="#4caf50" opacity="0.8"/>
  <text x="90" y="401" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Simple, no rotations</text>

  <!-- Metric 4: Concurrent Access -->
  <text x="40" y="425" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#333">Concurrent Access</text>
  <rect x="40" y="433" width="200" height="18" rx="8" fill="#f3f1f8"/>
  <rect x="40" y="433" width="180" height="18" rx="8" fill="#4caf50" opacity="0.8"/>
  <text x="130" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff">Lock-free, optimistic reads</text>

  <!-- Balanced Tree Column -->
  <rect x="460" y="80" width="420" height="400" rx="12" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <rect x="460" y="80" width="420" height="44" rx="12" fill="#cc4444"/>
  <text x="670" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fff">Balanced Tree (AVL / Red-Black)</text>

