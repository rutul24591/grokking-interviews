  <path d="M 138 173 L 180 173" stroke="#6d5bd0" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>

  <rect x="115" y="165" width="24" height="16" rx="6" fill="#6d5bd0"/>
  <text x="127" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">10</text>

  <rect x="185" y="165" width="24" height="16" rx="6" fill="#6d5bd0"/>
  <text x="197" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">40</text>

  <rect x="40" y="189" width="28" height="16" rx="6" fill="#f0ad4e"/>
  <text x="54" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">H</text>

  <path d="M 72 197 L 110 197" stroke="#f0ad4e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 138 197 L 155 197" stroke="#f0ad4e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 183 197 L 210 197" stroke="#f0ad4e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>

  <rect x="115" y="189" width="24" height="16" rx="6" fill="#f0ad4e"/>
  <text x="127" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">10</text>

  <rect x="158" y="189" width="24" height="16" rx="6" fill="#f0ad4e"/>
  <text x="170" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">20</text>

  <rect x="215" y="189" width="24" height="16" rx="6" fill="#f0ad4e"/>
  <text x="227" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#fff">40</text>

