  <text x="657" y="299" text-anchor="middle" font-size="14" font-weight="bold" fill="#cc4444">12</text>
  <rect x="685" y="274" width="45" height="40" rx="6" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="707" y="299" text-anchor="middle" font-size="12" fill="#666666">4</text>
  <text x="340" y="299" text-anchor="start" font-size="9" fill="#888888">h₄: </text>

  <!-- Arrows from hash to cells -->
  <line x1="280" y1="125" x2="435" y2="138" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="3,2"/>
  <line x1="280" y1="195" x2="585" y2="190" stroke="#f0ad4e" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <line x1="280" y1="270" x2="435" y2="242" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <line x1="280" y1="345" x2="635" y2="294" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,2"/>

  <!-- Query result -->
  <rect x="750" y="100" width="120" height="220" rx="12" fill="white" stroke="#cccccc" stroke-width="1"/>
  <text x="810" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Query Result</text>

  <rect x="760" y="140" width="100" height="25" rx="6" fill="#e8e4f0"/>
