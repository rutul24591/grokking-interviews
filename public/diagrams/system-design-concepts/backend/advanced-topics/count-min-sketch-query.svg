  <text x="507" y="247" text-anchor="middle" font-size="12" fill="#666666">9</text>
  <rect x="535" y="222" width="45" height="40" rx="6" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="557" y="247" text-anchor="middle" font-size="12" fill="#666666">2</text>
  <rect x="585" y="222" width="45" height="40" rx="6" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="607" y="247" text-anchor="middle" font-size="12" fill="#666666">13</text>
