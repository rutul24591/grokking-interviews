  </defs>
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Count-Min Sketch Query</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#555555">Query &quot;apple&quot;: return minimum of 4 counter values (overestimation guarantee)</text>

  <!-- Query element -->
