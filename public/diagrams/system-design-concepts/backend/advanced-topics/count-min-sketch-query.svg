  <line x1="140" y1="225" x2="190" y2="195" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="235" x2="190" y2="270" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="245" x2="190" y2="340" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

