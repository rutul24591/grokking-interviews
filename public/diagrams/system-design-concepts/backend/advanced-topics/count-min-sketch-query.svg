  <text x="235" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="white">h₁(x) = 2</text>

  <rect x="190" y="175" width="90" height="40" rx="8" fill="#f0ad4e" stroke="#d49540" stroke-width="1"/>
  <text x="235" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="white">h₂(x) = 5</text>

  <rect x="190" y="250" width="90" height="40" rx="8" fill="#4caf50" stroke="#3d8b40" stroke-width="1"/>
  <text x="235" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="white">h₃(x) = 2</text>

