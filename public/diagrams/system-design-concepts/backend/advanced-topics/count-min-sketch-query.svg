  <rect x="760" y="175" width="100" height="25" rx="6" fill="#fff8e1"/>
  <text x="810" y="192" text-anchor="middle" font-size="11" fill="#f0ad4e">h₂: 22</text>

  <rect x="760" y="210" width="100" height="25" rx="6" fill="#e8f5e9"/>
  <text x="810" y="227" text-anchor="middle" font-size="11" fill="#4caf50">h₃: 18</text>

  <rect x="760" y="245" width="100" height="25" rx="6" fill="#ffebee"/>
  <text x="810" y="262" text-anchor="middle" font-size="11" fill="#cc4444">h₄: 12</text>

  <!-- MIN result -->
  <rect x="760" y="280" width="100" height="30" rx="8" fill="#4caf50"/>
  <text x="810" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="white">min = 12</text>

  <!-- Overestimation note -->
  <rect x="30" y="350" width="840" height="125" rx="12" fill="white" stroke="#cccccc" stroke-width="1"/>
  <text x="450" y="378" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Overestimation Guarantee</text>

  <rect x="50" y="395" width="380" height="65" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="240" y="418" text-anchor="middle" font-size="12" fill="#333333">The minimum is always greater than or</text>
  <text x="240" y="436" text-anchor="middle" font-size="12" fill="#333333">equal to the true count. Count-Min Sketch</text>
  <text x="240" y="454" text-anchor="middle" font-size="12" font-weight="bold" fill="#4caf50">NEVER underestimates. May overestimate.</text>

  <rect x="470" y="395" width="380" height="65" rx="8" fill="#fff8e1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="660" y="418" text-anchor="middle" font-size="12" fill="#333333">True count of &quot;apple&quot; might be 10, but</text>
  <text x="660" y="436" text-anchor="middle" font-size="12" fill="#333333">hash collisions cause other items to increment</text>
  <text x="660" y="454" text-anchor="middle" font-size="12" font-weight="bold" fill="#f0ad4e">the same cells, giving estimate = 12.</text>
</svg>
