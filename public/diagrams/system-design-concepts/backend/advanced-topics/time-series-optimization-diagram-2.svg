<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Time-Series Data Layout</title>
  <desc id="desc">Time-series data layout showing chunking, columnar vs row storage, indexing, and retention boundaries</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Time-Series Data Layout</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Chunking strategies, columnar vs row storage, and indexing</text>
  
  <!-- Time-Based Chunking -->
  <rect x="30" y="85" width="400" height="240" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Time-Based Chunking</text>
  
  <!-- Chunks visualization -->
  <rect x="50" y="125" width="360" height="120" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  
  <!-- Hour chunks -->
  <rect x="60" y="135" width="80" height="50" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="100" y="163" text-anchor="middle" font-size="8" fill="white">Hour 1</text>
  <text x="100" y="178" text-anchor="middle" font-size="7" fill="#bfdbfe">Chunk A</text>
  
  <rect x="145" y="135" width="80" height="50" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="185" y="163" text-anchor="middle" font-size="8" fill="white">Hour 2</text>
  <text x="185" y="178" text-anchor="middle" font-size="7" fill="#bfdbfe">Chunk B</text>
  
  <rect x="230" y="135" width="80" height="50" rx="2" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="270" y="163" text-anchor="middle" font-size="8" fill="white">Hour 3</text>
  <text x="270" y="178" text-anchor="middle" font-size="7" fill="#bfdbfe">Chunk C</text>
  
  <rect x="315" y="135" width="80" height="50" rx="2" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="355" y="163" text-anchor="middle" font-size="8" fill="white">Hour 4</text>
  <text x="355" y="178" text-anchor="middle" font-size="7" fill="#6ee7b7">Current</text>
  
  <!-- Day boundary -->
  <line x1="60" y1="200" x2="420" y2="200" stroke="var(--text-theme, #f59e0b)" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="430" y="205" text-anchor="start" font-size="8" fill="var(--text-theme, #f59e0b">Day Boundary</text>
  
  <rect x="60" y="210" width="80" height="30" rx="2" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="100" y="230" text-anchor="middle" font-size="7" fill="white">Hour 5</text>
  
  <text x="230" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Benefits: Fast time-range queries, easy retention</text>
  
  <!-- Columnar vs Row Layout -->
  <rect x="470" y="85" width="400" height="240" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Columnar vs Row Layout</text>
  
  <!-- Row layout -->
  <rect x="490" y="125" width="170" height="120" rx="4" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="575" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #ef4444">Row-Oriented</text>
  
  <rect x="500" y="160" width="150" height="25" rx="2" fill="var(--bg-theme, #ef4444)"/>
  <text x="575" y="178" text-anchor="middle" font-size="7" fill="white">[T1, V1, M1]</text>
  
  <rect x="500" y="190" width="150" height="25" rx="2" fill="var(--bg-theme, #ef4444)"/>
  <text x="575" y="208" text-anchor="middle" font-size="7" fill="white">[T2, V2, M1]</text>
  
  <rect x="500" y="220" width="150" height="25" rx="2" fill="var(--bg-theme, #ef4444)"/>
  <text x="575" y="238" text-anchor="middle" font-size="7" fill="white">[T3, V3, M1]</text>
  
  <text x="575" y="260" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">✓ Good for writes</text>
  <text x="575" y="275" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">✗ Slower for aggregations</text>
  
  <!-- Columnar layout -->
  <rect x="680" y="125" width="170" height="120" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="765" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Columnar</text>
  
  <rect x="690" y="160" width="150" height="25" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="765" y="178" text-anchor="middle" font-size="7" fill="white">Timestamps: [T1,T2,T3]</text>
  
  <rect x="690" y="190" width="150" height="25" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="765" y="208" text-anchor="middle" font-size="7" fill="white">Values: [V1,V2,V3]</text>
  
  <rect x="690" y="220" width="150" height="25" rx="2" fill="var(--bg-theme, #10b981)"/>
  <text x="765" y="238" text-anchor="middle" font-size="7" fill="white">Metric: [M1,M1,M1]</text>
  
  <text x="765" y="260" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">✓ Better compression</text>
  <text x="765" y="275" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">✓ Fast aggregations</text>
  
  <!-- Indexing Strategies -->
  <rect x="30" y="340" width="400" height="190" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Indexing Strategies</text>
  
  <rect x="50" y="380" width="360" height="140" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="70" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="405" font-size="10" fill="var(--text-theme, #1e293b">Time index (primary)</text>
  
  <text x="70" y="425" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="425" font-size="10" fill="var(--text-theme, #1e293b">Metric name index</text>
  
  <text x="70" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="445" font-size="10" fill="var(--text-theme, #1e293b">Label/tag index (careful with cardinality)</text>
  
  <text x="70" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="465" font-size="10" fill="var(--text-theme, #1e293b">Inverted index for label matching</text>
  
  <text x="220" y="490" text-anchor="start" font-size="9" fill="var(--text-theme, #f59e0b">⚠ High cardinality labels explode index size</text>
  
  <!-- Compression Techniques -->
  <rect x="470" y="340" width="400" height="190" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="670" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Compression Techniques</text>
  
  <rect x="490" y="380" width="360" height="140" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <text x="510" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="405" font-size="10" fill="var(--text-theme, #1e293b">Delta encoding (timestamps)</text>
  
  <text x="510" y="425" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="425" font-size="10" fill="var(--text-theme, #1e293b">Gorilla encoding (floats)</text>
  
  <text x="510" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="445" font-size="10" fill="var(--text-theme, #1e293b">Run-length encoding (repeated values)</text>
  
  <text x="510" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="465" font-size="10" fill="var(--text-theme, #1e293b">Dictionary compression (labels)</text>
  
  <text x="510" y="490" text-anchor="start" font-size="9" fill="var(--text-theme, #10b981">Typical compression: 10-20x reduction</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
