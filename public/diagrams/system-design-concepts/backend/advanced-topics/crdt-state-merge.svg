<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">CRDT State Merge</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#555555">Convergent state: A merge B equals B merge A (commutativity)</text>

  <!-- Node A State -->
  <rect x="40" y="80" width="220" height="140" rx="12" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="80" width="220" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="40" y="100" width="220" height="15" fill="#6d5bd0"/>
  <text x="150" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Node A State</text>

  <rect x="60" y="130" width="80" height="30" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="100" y="150" text-anchor="middle" font-size="11" fill="#333333">Counter[A]</text>
  <rect x="60" y="165" width="80" height="25" rx="6" fill="#6d5bd0"/>
  <text x="100" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="white">5</text>

  <rect x="160" y="130" width="80" height="30" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="200" y="150" text-anchor="middle" font-size="11" fill="#333333">Counter[B]</text>
  <rect x="160" y="165" width="80" height="25" rx="6" fill="#4caf50"/>
  <text x="200" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="white">0</text>

  <!-- Node B State -->
  <rect x="640" y="80" width="220" height="140" rx="12" fill="white" stroke="#4caf50" stroke-width="2"/>
  <rect x="640" y="80" width="220" height="35" rx="12" fill="#4caf50"/>
  <rect x="640" y="100" width="220" height="15" fill="#4caf50"/>
  <text x="750" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Node B State</text>

  <rect x="660" y="130" width="80" height="30" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="700" y="150" text-anchor="middle" font-size="11" fill="#333333">Counter[A]</text>
  <rect x="660" y="165" width="80" height="25" rx="6" fill="#6d5bd0"/>
  <text x="700" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="white">2</text>

  <rect x="760" y="130" width="80" height="30" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="800" y="150" text-anchor="middle" font-size="11" fill="#333333">Counter[B]</text>
  <rect x="760" y="165" width="80" height="25" rx="6" fill="#4caf50"/>
  <text x="800" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="white">3</text>

  <!-- Merge arrows top path: A merge B -->
  <path d="M 260 120 Q 450 60 640 120" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="380" y="55" width="140" height="30" rx="8" fill="#e8e4f0" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Sync: A merge B</text>

  <!-- Merge arrows bottom path: B merge A -->
  <path d="M 260 180 Q 450 280 640 180" fill="none" stroke="#4caf50" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="380" y="260" width="140" height="30" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#4caf50">Sync: B merge A</text>

  <!-- Converged State -->
  <rect x="310" y="320" width="280" height="160" rx="12" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="310" y="320" width="280" height="35" rx="12" fill="#1a1a2e"/>
  <rect x="310" y="340" width="280" height="15" fill="#1a1a2e"/>
  <text x="450" y="344" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Converged State (both paths)</text>

  <rect x="335" y="370" width="90" height="30" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="380" y="390" text-anchor="middle" font-size="11" fill="#333333">Counter[A]</text>
  <rect x="335" y="405" width="90" height="30" rx="8" fill="#6d5bd0"/>
  <text x="380" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="white">max(5,2) = 5</text>

  <rect x="445" y="370" width="120" height="30" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1"/>
  <text x="505" y="390" text-anchor="middle" font-size="11" fill="#333333">Counter[B]</text>
  <rect x="445" y="405" width="120" height="30" rx="8" fill="#4caf50"/>
  <text x="505" y="425" text-anchor="middle" font-size="14" font-weight="bold" fill="white">max(0,3) = 3</text>

  <!-- Total value -->
  <rect x="335" y="445" width="230" height="25" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#4caf50">Total = 5 + 3 = 8 (convergent!)</text>

  <!-- Commutativity note -->
  <rect x="640" y="320" width="220" height="100" rx="12" fill="#fff8e1" stroke="#f0ad4e" stroke-width="1"/>
  <text x="750" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#f0ad4e">Commutativity</text>
  <text x="750" y="368" text-anchor="middle" font-size="11" fill="#333333">A merge B = B merge A</text>
  <text x="750" y="385" text-anchor="middle" font-size="11" fill="#333333">Both produce identical</text>
  <text x="750" y="402" text-anchor="middle" font-size="11" fill="#333333">convergent state regardless</text>
  <text x="750" y="419" text-anchor="middle" font-size="11" font-weight="bold" fill="#333333">of merge order or timing.</text>

  <!-- Properties -->
  <rect x="640" y="430" width="220" height="50" rx="8" fill="#e8e4f0" stroke="#6d5bd0" stroke-width="1"/>
  <text x="750" y="450" text-anchor="middle" font-size="11" fill="#333333">Idempotent: A merge A = A</text>
  <text x="750" y="468" text-anchor="middle" font-size="11" fill="#333333">Associative: (A merge B) merge C = A merge (B merge C)</text>
</svg>
