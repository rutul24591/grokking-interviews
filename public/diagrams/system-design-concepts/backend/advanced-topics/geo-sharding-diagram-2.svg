<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Geo-Sharding Control Points</title>
  <desc id="desc">Geo-sharding control points: routing, directory service, cross-region fallback, and consistency boundaries</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Geo-Sharding: Control Points</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Key components that determine routing correctness</text>
  
  <!-- Request Flow -->
  <rect x="30" y="85" width="840" height="200" rx="8" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  
  <!-- User Request -->
  <rect x="50" y="115" width="100" height="50" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="100" y="140" text-anchor="middle" font-size="10" fill="white">User Request</text>
  <text x="100" y="155" text-anchor="middle" font-size="8" fill="#bfdbfe">user_id: 12345</text>
  
  <!-- Arrow to Router -->
  <line x1="150" y1="140" x2="190" y2="140" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Global Router -->
  <rect x="190" y="105" width="140" height="70" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="260" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Global Router</text>
  <text x="260" y="148" text-anchor="middle" font-size="9" fill="#c4b5fd">Check directory</text>
  <text x="260" y="163" text-anchor="middle" font-size="8" fill="#a78bfa">Cache: 5min TTL</text>
  
  <!-- Arrow to Directory -->
  <line x1="330" y1="140" x2="350" y2="140" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="340" y="130" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Lookup</text>
  
  <!-- Directory Service -->
  <rect x="350" y="105" width="140" height="70" rx="6" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="420" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Directory</text>
  <text x="420" y="148" text-anchor="middle" font-size="9" fill="#fcd34d">user_12345 →</text>
  <text x="420" y="163" text-anchor="middle" font-size="8" fill="#fbbf24">Shard: US-East</text>
  
  <!-- Arrow back to Router -->
  <line x1="490" y1="140" x2="510" y2="140" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="130" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Return</text>
  
  <!-- Arrow to Shard -->
  <line x1="530" y1="140" x2="570" y2="140" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="550" y="130" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Route</text>
  
  <!-- Regional Shards -->
  <rect x="570" y="105" width="280" height="70" rx="6" fill="var(--bg-panel-soft, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <rect x="585" y="115" width="75" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="622" y="135" text-anchor="middle" font-size="8" fill="white">US-East</text>
  <text x="622" y="150" text-anchor="middle" font-size="7" fill="#bfdbfe">Primary</text>
  
  <rect x="670" y="115" width="75" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="707" y="135" text-anchor="middle" font-size="8" fill="white">EU-West</text>
  <text x="707" y="150" text-anchor="middle" font-size="7" fill="#6ee7b7">Backup</text>
  
  <rect x="755" y="115" width="75" height="50" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="792" y="135" text-anchor="middle" font-size="8" fill="white">APAC</text>
  <text x="792" y="150" text-anchor="middle" font-size="7" fill="#fcd34d">Backup</text>
  
  <text x="710" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Route to home shard with regional fallback</text>
  
  <!-- Consistency Boundaries -->
  <rect x="30" y="300" width="400" height="230" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Consistency Boundaries</text>
  
  <rect x="50" y="340" width="360" height="80" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="230" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Strong Consistency (Within Shard)</text>
  <text x="230" y="385" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• All reads/writes go to home shard</text>
  <text x="230" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Linearizable within region</text>
  <text x="230" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Standard replication within region</text>
  
  <rect x="50" y="435" width="360" height="80" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="230" y="460" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Eventual Consistency (Cross-Region)</text>
  <text x="230" y="480" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Async replication to backup regions</text>
  <text x="230" y="495" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Read-your-writes not guaranteed cross-region</text>
  <text x="230" y="510" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Conflict resolution on failover</text>
  
  <!-- Failure Scenarios -->
  <rect x="450" y="300" width="420" height="230" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="660" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Failure Scenarios</text>
  
  <rect x="470" y="340" width="185" height="85" rx="6" fill="var(--bg-panel-soft, #fef2f2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="562" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #ef4444">Directory Outage</text>
  <text x="562" y="385" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Router cache serves stale</text>
  <text x="562" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• New users can't be routed</text>
  <text x="562" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Mitigation: Multi-region directory</text>
  
  <rect x="675" y="340" width="185" height="85" rx="6" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="767" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309">Region Failure</text>
  <text x="767" y="385" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Directory marks region unhealthy</text>
  <text x="767" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Traffic fails over to backup</text>
  <text x="767" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Data may be stale during failover</text>
  
  <rect x="470" y="440" width="390" height="80" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="665" y="465" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Key Design Principles</text>
  <text x="665" y="485" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Directory is correctness dependency - must be highly available</text>
  <text x="665" y="500" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Router cache prevents directory overload</text>
  <text x="665" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">• Define clear failover and consistency semantics</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
