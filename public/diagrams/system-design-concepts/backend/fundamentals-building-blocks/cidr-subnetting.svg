<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>CIDR Subnetting Explained</title>
  <desc>Visual explanation of CIDR notation and subnet division</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">CIDR Subnetting Explained</text>
  
  <!-- CIDR Notation Example -->
  <rect x="50" y="60" width="700" height="70" rx="8" fill="#F8F9FC" stroke="#EC4899" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Example: 192.168.1.0/24</text>
  <text x="400" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Network: 192.168.1.0 | Prefix: /24 | Usable hosts: 254</text>
  <text x="400" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Range: 192.168.1.1 - 192.168.1.254 | Broadcast: 192.168.1.255</text>
  
  <!-- 32-Bit Breakdown -->
  <rect x="50" y="150" width="700" height="100" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">32-Bit Address Breakdown (/24)</text>
  
  <!-- Network Portion (24 bits) -->
  <rect x="80" y="195" width="480" height="45" rx="4" fill="#EC4899"/>
  <text x="320" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Network Portion (24 bits)</text>
  <text x="320" y="235" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">11000000.10101000.00000001</text>
  
  <!-- Host Portion (8 bits) -->
  <rect x="570" y="195" width="150" height="45" rx="4" fill="#10B981"/>
  <text x="645" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Host Portion (8 bits)</text>
  <text x="645" y="235" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">00000000</text>
  
  <!-- Divider -->
  <line x1="565" y1="190" x2="565" y2="245" stroke="#111827" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- Common CIDR Blocks -->
  <rect x="50" y="270" width="700" height="110" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Common CIDR Blocks</text>
  
  <!-- /8 Block -->
  <rect x="70" y="315" width="120" height="55" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="130" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">/8</text>
  <text x="130" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">16.7M hosts</text>
  
  <!-- /16 Block -->
  <rect x="210" y="315" width="120" height="55" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="270" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">/16</text>
  <text x="270" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">65K hosts</text>
  
  <!-- /24 Block (highlighted) -->
  <rect x="350" y="315" width="120" height="55" rx="4" fill="#EC4899" stroke="#EC4899" stroke-width="2"/>
  <text x="410" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">/24</text>
  <text x="410" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">254 hosts</text>
  
  <!-- /28 Block -->
  <rect x="490" y="315" width="120" height="55" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="550" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">/28</text>
  <text x="550" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">14 hosts</text>
  
  <!-- /30 Block -->
  <rect x="630" y="315" width="100" height="55" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="680" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">/30</text>
  <text x="680" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">2 hosts</text>
</svg>
