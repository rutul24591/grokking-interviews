<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <rect width="100%" height="100%" fill="#ffffff" />
  <style>
    text { font-family: 'Sora', Arial, sans-serif; fill: #1f2937; }
    .bit { fill: #f1f5f9; stroke: #cbd5f5; stroke-width: 2; rx: 8; }
    .label { font-size: 18px; font-weight: 600; }
    .small { font-size: 14px; fill: #475569; }
  </style>

  <text x="450" y="40" text-anchor="middle" class="label">IPv4 Address (32 bits)</text>
  <text x="450" y="70" text-anchor="middle" class="small">Dotted decimal: 192.168.1.10</text>

  <rect class="bit" x="120" y="120" width="140" height="60" />
  <rect class="bit" x="280" y="120" width="140" height="60" />
  <rect class="bit" x="440" y="120" width="140" height="60" />
  <rect class="bit" x="600" y="120" width="140" height="60" />

  <text x="190" y="155" text-anchor="middle" class="label">192</text>
  <text x="350" y="155" text-anchor="middle" class="label">168</text>
  <text x="510" y="155" text-anchor="middle" class="label">1</text>
  <text x="670" y="155" text-anchor="middle" class="label">10</text>

  <text x="190" y="195" text-anchor="middle" class="small">8 bits</text>
  <text x="350" y="195" text-anchor="middle" class="small">8 bits</text>
  <text x="510" y="195" text-anchor="middle" class="small">8 bits</text>
  <text x="670" y="195" text-anchor="middle" class="small">8 bits</text>
</svg>
