<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>DNS Hierarchy</title>
  <desc>DNS hierarchical structure from root to TLD to authoritative servers</desc>
  
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">DNS Hierarchy</text>
  
  <!-- Root Servers -->
  <rect x="300" y="60" width="200" height="50" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Root Servers (.)</text>
  <text x="400" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">13 root server clusters</text>
  
  <!-- Arrow to TLD -->
  <path d="M400 110 L400 140" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- TLD Servers -->
  <rect x="200" y="140" width="120" height="45" rx="4" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="260" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">.com TLD</text>
  
  <rect x="340" y="140" width="120" height="45" rx="4" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">.org TLD</text>
  
  <rect x="480" y="140" width="120" height="45" rx="4" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="540" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">.net TLD</text>
  
  <!-- Arrows to Authoritative -->
  <path d="M260 185 L260 225" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowGray)"/>
  <path d="M400 185 L400 225" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowGray)"/>
  <path d="M540 185 L540 225" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Authoritative Servers -->
  <rect x="150" y="225" width="220" height="55" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="260" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">example.com</text>
  <text x="260" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Authoritative Nameserver</text>
  
  <rect x="370" y="225" width="220" height="55" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="480" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">mozilla.org</text>
  <text x="480" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Authoritative Nameserver</text>
  
  <!-- Resolution Flow Box -->
  <rect x="50" y="300" width="700" height="80" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">DNS Resolution Flow for www.example.com</text>
  
  <text x="100" y="350" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#111827">1. Client → Root: "Where is .com?"</text>
  <text x="400" y="350" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#111827">2. Root → Client: "Ask .com TLD"</text>
  <text x="100" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#111827">3. Client → TLD: "Where is example.com?"</text>
  <text x="400" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#111827">4. TLD → Client: "Ask authoritative"</text>
  
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>
