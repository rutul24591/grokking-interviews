<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>NAT and Firewall Architecture</title>
  <desc>How NAT and firewalls protect internal networks</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">NAT and Firewall Architecture</text>
  
  <!-- Internet (Top) -->
  <rect x="50" y="60" width="700" height="70" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Internet (Public Network)</text>
  <text x="400" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">External IPs: 203.0.113.0/24 | Untrusted Zone</text>
  
  <!-- Firewall/NAT Gateway -->
  <rect x="300" y="150" width="200" height="70" rx="4" fill="#EC4899"/>
  <text x="400" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Firewall / NAT Gateway</text>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#FFFFFF">Public IP: 203.0.113.1</text>
  <text x="400" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">Stateful Inspection</text>
  
  <!-- Private Network (Bottom) -->
  <rect x="50" y="240" width="700" height="130" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Private Network (Internal)</text>
  <text x="400" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Private IPs: 192.168.1.0/24 | Trusted Zone</text>
  
  <!-- Internal Servers -->
  <rect x="100" y="300" width="120" height="55" rx="4" fill="#10B981"/>
  <text x="160" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Web Server</text>
  <text x="160" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">192.168.1.10</text>
  <text x="160" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#FFFFFF">Port 80/443</text>
  
  <rect x="280" y="300" width="120" height="55" rx="4" fill="#10B981"/>
  <text x="340" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">App Server</text>
  <text x="340" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">192.168.1.20</text>
  <text x="340" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#FFFFFF">Port 8080</text>
  
  <rect x="460" y="300" width="120" height="55" rx="4" fill="#10B981"/>
  <text x="520" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Database</text>
  <text x="520" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">192.168.1.30</text>
  <text x="520" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#FFFFFF">Port 5432</text>
  
  <!-- NAT Translation Box -->
  <rect x="550" y="150" width="200" height="70" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="650" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">NAT Translation</text>
  <text x="650" y="195" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">192.168.1.10:80</text>
  <text x="650" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#4B5563">↓ translates to ↓</text>
  <text x="650" y="220" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#EC4899">203.0.113.1:8080</text>
  
  <!-- Connection Arrows -->
  <path d="M400 130 L400 150" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <text x="415" y="145" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Inbound</text>
  
  <path d="M400 220 L400 240" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="415" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Outbound</text>
  
  <!-- Firewall Rules Box -->
  <rect x="50" y="380" width="700" height="15" rx="2" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Firewall Rules: Allow inbound 80/443 | Allow all outbound | Deny all other inbound</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>
</svg>
