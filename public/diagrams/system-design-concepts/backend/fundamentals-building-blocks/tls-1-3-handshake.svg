<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>TLS 1.3 Handshake</title>
  <desc>TLS 1.3 simplified handshake with 1-RTT</desc>
  
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">TLS 1.3 Handshake (1-RTT)</text>
  
  <!-- Client -->
  <rect x="50" y="70" width="120" height="260" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="110" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Client</text>
  
  <!-- Server -->
  <rect x="630" y="70" width="120" height="260" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="690" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Server</text>
  
  <!-- Step 1: Client Hello -->
  <path d="M170 110 L630 110" stroke="#EC4899" stroke-width="3" marker-end="url(#arrowPink)"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#EC4899">1. Client Hello</text>
  <text x="400" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Supported cipher suites, key share</text>
  
  <!-- Step 2: Server Hello + Certs + Finished -->
  <path d="M630 170 L170 170" stroke="#10B981" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="400" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#10B981">2. Server Hello + Certs + Finished</text>
  <text x="400" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Selected cipher, cert, key share, finished</text>
  
  <!-- Step 3: Client Finished -->
  <path d="M170 230 L630 230" stroke="#8B5CF6" stroke-width="3" marker-end="url(#arrowPurple)"/>
  <text x="400" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6">3. Client Finished</text>
  <text x="400" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Encrypted application data can begin</text>
  
  <!-- Secure Connection -->
  <rect x="250" y="270" width="300" height="50" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Secure Connection Established</text>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">All data encrypted with session keys</text>
  
  <!-- Comparison Box -->
  <rect x="50" y="335" width="700" height="50" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">TLS 1.3: 1-RTT handshake (faster) | TLS 1.2: 2-RTT handshake (slower)</text>
  <text x="400" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">TLS 1.3 removes obsolete algorithms, reduces handshake latency by 50%</text>
  
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>
