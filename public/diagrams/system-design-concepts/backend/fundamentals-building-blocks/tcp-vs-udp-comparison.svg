<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>TCP vs UDP Comparison</title>
  <desc>Side-by-side comparison of TCP and UDP protocols</desc>
  
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">TCP vs UDP Comparison</text>
  
  <!-- TCP Section -->
  <rect x="50" y="60" width="320" height="320" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="210" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">TCP (Transmission Control)</text>
  
  <!-- TCP Connection Diagram -->
  <rect x="80" y="110" width="260" height="80" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="1"/>
  <text x="210" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Connection-Oriented</text>
  <text x="210" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">3-way handshake before data</text>
  <text x="210" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Guaranteed delivery</text>
  <text x="210" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Ordered packets</text>
  
  <!-- TCP Use Cases -->
  <rect x="80" y="210" width="260" height="80" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="1"/>
  <text x="210" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Use Cases</text>
  <text x="210" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Web (HTTP/HTTPS)</text>
  <text x="210" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Email (SMTP, IMAP)</text>
  <text x="210" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">File Transfer (FTP)</text>
  
  <!-- TCP Pros/Cons -->
  <rect x="80" y="310" width="260" height="60" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="1"/>
  <text x="210" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">✓ Reliable, ordered, error-checked</text>
  <text x="210" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#EC4899">✗ Higher latency, more overhead</text>
  
  <!-- UDP Section -->
  <rect x="430" y="60" width="320" height="320" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="590" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">UDP (User Datagram)</text>
  
  <!-- UDP Connection Diagram -->
  <rect x="460" y="110" width="260" height="80" rx="4" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="590" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Connectionless</text>
  <text x="590" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">No handshake</text>
  <text x="590" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Best-effort delivery</text>
  <text x="590" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">No ordering guarantee</text>
  
  <!-- UDP Use Cases -->
  <rect x="460" y="210" width="260" height="80" rx="4" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="590" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Use Cases</text>
  <text x="590" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">DNS queries</text>
  <text x="590" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Video streaming</text>
  <text x="590" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">VoIP, Online gaming</text>
  
  <!-- UDP Pros/Cons -->
  <rect x="460" y="310" width="260" height="60" rx="4" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="590" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">✓ Low latency, low overhead</text>
  <text x="590" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#EC4899">✗ Unreliable, no ordering</text>
</svg>
