<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Client-Server Request Response Flow</title>
  <desc>Diagram showing the complete request-response cycle between client and server</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Client-Server Request Flow</text>
  
  <!-- Client Box -->
  <rect x="50" y="80" width="180" height="100" rx="8" fill="#F8F9FC" stroke="#EC4899" stroke-width="3"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Client</text>
  <text x="140" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Browser / Mobile</text>
  <text x="140" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Sends Request</text>
  
  <!-- Server Box -->
  <rect x="570" y="80" width="180" height="100" rx="8" fill="#F8F9FC" stroke="#8B5CF6" stroke-width="3"/>
  <text x="660" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Server</text>
  <text x="660" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">API / Backend</text>
  <text x="660" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Processes &amp; Responds</text>
  
  <!-- Database Box -->
  <rect x="570" y="220" width="180" height="80" rx="8" fill="#F8F9FC" stroke="#10B981" stroke-width="2"/>
  <text x="660" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Database</text>
  <text x="660" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Stores Data</text>
  
  <!-- Request Arrow -->
  <path d="M230 130 L570 130" stroke="#EC4899" stroke-width="3" marker-end="url(#arrowPink)"/>
  <text x="400" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#EC4899">HTTP Request</text>
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">GET /users, POST /orders</text>
  
  <!-- Query Arrow -->
  <path d="M660 180 L660 220" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowPurple)"/>
  <text x="700" y="210" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Query</text>
  
  <!-- Response Arrow -->
  <path d="M570 150 L230 150" stroke="#10B981" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#10B981">JSON Response</text>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Status 200, Data payload</text>
  
  <!-- Lifecycle Steps at Bottom -->
  <rect x="50" y="240" width="480" height="140" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="290" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Request Lifecycle Steps</text>
  
  <!-- Step 1 -->
  <circle cx="100" cy="310" r="22" fill="#EC4899"/>
  <text x="100" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  <text x="100" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#111827">DNS + TCP</text>
  <text x="100" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#111827">Connection</text>
  
  <!-- Step 2 -->
  <circle cx="200" cy="310" r="22" fill="#EC4899"/>
  <text x="200" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  <text x="200" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#111827">Send</text>
  <text x="200" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#111827">Request</text>
  
  <!-- Step 3 -->
  <circle cx="300" cy="310" r="22" fill="#8B5CF6"/>
  <text x="300" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  <text x="300" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#111827">Process</text>
  <text x="300" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#111827">&amp; Query</text>
  
  <!-- Step 4 -->
  <circle cx="400" cy="310" r="22" fill="#10B981"/>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
  <text x="400" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#111827">Return</text>
  <text x="400" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#111827">Response</text>
  
  <!-- Connecting lines -->
  <path d="M122 310 L178 310" stroke="#E2E8F0" stroke-width="2"/>
  <path d="M222 310 L278 310" stroke="#E2E8F0" stroke-width="2"/>
  <path d="M322 310 L378 310" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Key Metrics Box -->
  <rect x="550" y="320" width="200" height="60" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="650" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Typical Latency</text>
  <text x="650" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Network: 50-200ms</text>
  <text x="650" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Server: 10-100ms</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>
</svg>
