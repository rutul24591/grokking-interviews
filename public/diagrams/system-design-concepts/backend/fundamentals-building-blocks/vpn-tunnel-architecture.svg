<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>VPN Tunnel Architecture</title>
  <desc>How VPN creates encrypted tunnel over public internet</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">VPN Tunnel Architecture</text>
  
  <!-- Office Network (Left) -->
  <rect x="50" y="60" width="250" height="280" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="175" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Office Network</text>
  <text x="175" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">192.168.1.0/24</text>
  
  <!-- Office Firewall -->
  <rect x="100" y="125" width="150" height="45" rx="4" fill="#EC4899"/>
  <text x="175" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Office Firewall</text>
  
  <!-- Office PCs -->
  <rect x="80" y="190" width="80" height="45" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="120" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">PC 1</text>
  <text x="120" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">.1.10</text>
  
  <rect x="190" y="190" width="80" height="45" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="230" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">PC 2</text>
  <text x="230" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">.1.11</text>
  
  <!-- Office Server -->
  <rect x="135" y="255" width="80" height="45" rx="4" fill="#10B981"/>
  <text x="175" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Server</text>
  <text x="175" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">.1.100</text>
  
  <!-- Internet (Middle) -->
  <rect x="320" y="60" width="160" height="280" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8"/>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#4B5563">Internet</text>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Public Network</text>
  <text x="400" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Untrusted</text>
  
  <!-- VPN Tunnel -->
  <path d="M300 170 L500 170" stroke="#8B5CF6" stroke-width="8" stroke-dasharray="6,4" opacity="0.6"/>
  <path d="M300 230 L500 230" stroke="#8B5CF6" stroke-width="8" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="400" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6">Encrypted Tunnel</text>
  <text x="400" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8B5CF6">IPSec / SSL / WireGuard</text>
  
  <!-- Remote Network (Right) -->
  <rect x="500" y="60" width="250" height="280" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="625" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Remote Network</text>
  <text x="625" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">10.0.0.0/24</text>
  
  <!-- Remote Firewall -->
  <rect x="550" y="125" width="150" height="45" rx="4" fill="#EC4899"/>
  <text x="625" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Remote Firewall</text>
  
  <!-- Remote PCs -->
  <rect x="530" y="190" width="80" height="45" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="570" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">PC 3</text>
  <text x="570" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">.0.10</text>
  
  <rect x="640" y="190" width="80" height="45" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="680" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">PC 4</text>
  <text x="680" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">.0.11</text>
  
  <!-- Remote Server -->
  <rect x="585" y="255" width="80" height="45" rx="4" fill="#10B981"/>
  <text x="625" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Server</text>
  <text x="625" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">.0.100</text>
  
  <!-- Connection Arrows -->
  <path d="M250 170 L300 170" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowGray)"/>
  <path d="M500 170 L550 170" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowGray)"/>
  
  <!-- Key Benefits Box -->
  <rect x="50" y="350" width="700" height="25" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">VPN Benefits: Encrypted traffic | Private IPs over public internet | Secure remote access</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>
