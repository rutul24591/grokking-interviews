<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>API Versioning Strategies</title>
  <desc>Comparison of URL, Header, and Media Type versioning approaches</desc>
  
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">API Versioning Strategies</text>
  
  <!-- URL Versioning -->
  <rect x="50" y="60" width="220" height="320" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="160" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">URL Versioning</text>
  
  <rect x="70" y="110" width="180" height="45" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="2"/>
  <text x="160" y="135" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">/api/v1/users</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">/api/v2/users</text>
  
  <text x="160" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ Simple, explicit</text>
  <text x="160" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ Cacheable</text>
  <text x="160" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ Easy to test</text>
  <text x="160" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">✗ Clutters URLs</text>
  <text x="160" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">✗ Breaks REST principles</text>
  <text x="160" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827">Used by: Stripe, GitHub</text>
  
  <!-- Header Versioning -->
  <rect x="290" y="60" width="220" height="320" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Header Versioning</text>
  
  <rect x="310" y="110" width="180" height="45" rx="4" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#111827">GET /api/users</text>
  <text x="400" y="148" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#111827">API-Version: 2.0</text>
  
  <text x="400" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ Clean URLs</text>
  <text x="400" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ RESTful</text>
  <text x="400" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ Easy to change</text>
  <text x="400" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">✗ Hard to test</text>
  <text x="400" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">✗ Cache complexity</text>
  <text x="400" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827">Used by: Twitter, LinkedIn</text>
  
  <!-- Media Type Versioning -->
  <rect x="530" y="60" width="220" height="320" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="640" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Media Type Versioning</text>
  
  <rect x="550" y="110" width="180" height="45" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <text x="640" y="130" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#111827">GET /api/users</text>
  <text x="640" y="148" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#111827">Accept: application/vnd.api.v2+json</text>
  
  <text x="640" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ Most RESTful</text>
  <text x="640" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ Content negotiation</text>
  <text x="640" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ Clean URLs</text>
  <text x="640" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">✗ Complex to implement</text>
  <text x="640" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">✗ Hard to debug</text>
  <text x="640" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827">Used by: GitHub (also)</text>
  
  <!-- Recommendation Box -->
  <rect x="50" y="390" width="700" height="10" rx="2" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Recommendation: URL versioning for simplicity, Header versioning for RESTful APIs</text>
</svg>
