<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Routing vs Switching</title>
  <desc>Comparison of Layer 2 switching within LANs vs Layer 3 routing across networks</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Routing vs Switching</text>
  
  <!-- LAN 1 (Left) -->
  <rect x="50" y="60" width="300" height="300" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="200" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">LAN 1 (192.168.1.0/24)</text>
  
  <!-- Switch -->
  <rect x="140" y="150" width="120" height="50" rx="4" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="200" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Switch (L2)</text>
  <text x="200" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">MAC Address Table</text>
  
  <!-- PC 1 -->
  <rect x="80" y="110" width="80" height="40" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">PC 1</text>
  <text x="120" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">.1.10</text>
  
  <!-- PC 2 -->
  <rect x="80" y="220" width="80" height="40" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="120" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">PC 2</text>
  <text x="120" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">.1.11</text>
  
  <!-- PC 3 -->
  <rect x="260" y="165" width="80" height="40" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="300" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">PC 3</text>
  <text x="300" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">.1.12</text>
  
  <!-- Connections within LAN 1 -->
  <path d="M120 150 L140 170" stroke="#E2E8F0" stroke-width="2"/>
  <path d="M120 220 L140 200" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- LAN 2 (Right) -->
  <rect x="450" y="60" width="300" height="300" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="600" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">LAN 2 (192.168.2.0/24)</text>
  
  <!-- Switch LAN 2 -->
  <rect x="540" y="150" width="120" height="50" rx="4" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Switch (L2)</text>
  <text x="600" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">MAC Address Table</text>
  
  <!-- PC 4 -->
  <rect x="480" y="110" width="80" height="40" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="520" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">PC 4</text>
  <text x="520" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">.2.10</text>
  
  <!-- PC 5 -->
  <rect x="480" y="220" width="80" height="40" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="520" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">PC 5</text>
  <text x="520" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">.2.11</text>
  
  <!-- Router (Between LANs) -->
  <rect x="350" y="180" width="100" height="60" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Router (L3)</text>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">IP Routing Table</text>
  
  <!-- Router to Switches -->
  <path d="M350 210 L380 210" stroke="#EC4899" stroke-width="2"/>
  <path d="M450 210 L480 210" stroke="#EC4899" stroke-width="2"/>
  
  <!-- Key Differences Box -->
  <rect x="50" y="370" width="700" height="25" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Switching (L2): MAC addresses, same network | Routing (L3): IP addresses, different networks</text>
</svg>
