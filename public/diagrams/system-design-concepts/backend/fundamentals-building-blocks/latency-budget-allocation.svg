<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Latency Budget Allocation</title>
  <desc>How to allocate latency budget across request lifecycle stages</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Latency Budget Allocation (500ms SLO)</text>
  
  <!-- Total Budget Bar -->
  <rect x="50" y="60" width="700" height="50" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Total Budget: 500ms (p95)</text>
  <text x="400" y="103" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Target: Stay under 500ms for 95% of requests</text>
  
  <!-- Network Budget -->
  <rect x="50" y="140" width="140" height="70" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="120" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Network</text>
  <text x="120" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#EC4899">100ms</text>
  <text x="120" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">DNS + TCP + TLS</text>
  
  <!-- Middleware Budget -->
  <rect x="210" y="140" width="100" height="70" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="260" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Middleware</text>
  <text x="260" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#EC4899">50ms</text>
  <text x="260" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Auth + Validation</text>
  
  <!-- Business Logic Budget -->
  <rect x="330" y="140" width="140" height="70" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Business Logic</text>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#EC4899">100ms</text>
  <text x="400" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Processing</text>
  
  <!-- Data Access Budget -->
  <rect x="490" y="140" width="160" height="70" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="570" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Data Access</text>
  <text x="570" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#EC4899">200ms</text>
  <text x="570" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">DB + Cache</text>
  
  <!-- Serialization Budget -->
  <rect x="670" y="140" width="80" height="70" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="710" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827">Serialize</text>
  <text x="710" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#EC4899">50ms</text>
  <text x="710" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">JSON</text>
  
  <!-- Optimization Strategies -->
  <rect x="50" y="240" width="340" height="130" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="220" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Optimization Strategies</text>
  
  <text x="80" y="290" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Network:</text>
  <text x="80" y="308" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Connection pooling (reuse TCP)</text>
  <text x="80" y="323" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• TLS session resumption</text>
  <text x="80" y="338" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• HTTP/2 multiplexing</text>
  
  <text x="80" y="360" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Data Access:</text>
  <text x="80" y="378" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Add caching layer (Redis)</text>
  <text x="80" y="393" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Optimize queries (indexes)</text>
  
  <!-- Timeout Hierarchy -->
  <rect x="410" y="240" width="340" height="130" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="580" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Timeout Hierarchy</text>
  
  <text x="440" y="290" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Request Timeout:</text>
  <text x="580" y="290" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#EC4899">500ms</text>
  
  <text x="440" y="315" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Data Access Timeout:</text>
  <text x="580" y="315" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#111827">200ms</text>
  
  <text x="440" y="340" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">External API Timeout:</text>
  <text x="580" y="340" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#111827">100ms</text>
  
  <text x="440" y="365" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Cache Timeout:</text>
  <text x="580" y="365" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#111827">50ms</text>
  
  <text x="580" y="390" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#10B981">Rule: Child timeouts &lt; parent budget</text>
</svg>
