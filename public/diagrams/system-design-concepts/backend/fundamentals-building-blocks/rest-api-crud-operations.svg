<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>REST API CRUD Operations</title>
  <desc>CRUD operations mapped to HTTP methods in REST APIs</desc>
  
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">REST API CRUD Operations</text>
  
  <!-- Resource: /api/users -->
  <rect x="50" y="60" width="700" height="60" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Resource: /api/users</text>
  <text x="400" y="108" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" fill="#4B5563">Collection of user resources</text>
  
  <!-- CREATE -->
  <rect x="50" y="140" width="170" height="110" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="135" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">CREATE</text>
  <rect x="70" y="180" width="130" height="35" rx="4" fill="#10B981"/>
  <text x="135" y="203" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">POST</text>
  <text x="135" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">/api/users</text>
  <text x="135" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">→ 201 Created</text>
  
  <!-- READ -->
  <rect x="235" y="140" width="170" height="110" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="320" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">READ</text>
  <rect x="255" y="180" width="130" height="35" rx="4" fill="#EC4899"/>
  <text x="320" y="203" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">GET</text>
  <text x="320" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">/api/users or /api/users/{id}</text>
  <text x="320" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">→ 200 OK</text>
  
  <!-- UPDATE -->
  <rect x="420" y="140" width="170" height="110" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="505" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">UPDATE</text>
  <rect x="440" y="180" width="130" height="35" rx="4" fill="#8B5CF6"/>
  <text x="505" y="203" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">PUT/PATCH</text>
  <text x="505" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">/api/users/{id}</text>
  <text x="505" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">→ 200 OK</text>
  
  <!-- DELETE -->
  <rect x="605" y="140" width="170" height="110" rx="8" fill="#FEE2E2" stroke="#EC4899" stroke-width="2"/>
  <text x="690" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">DELETE</text>
  <rect x="625" y="180" width="130" height="35" rx="4" fill="#EC4899"/>
  <text x="690" y="203" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">DELETE</text>
  <text x="690" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">/api/users/{id}</text>
  <text x="690" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">→ 204 No Content</text>
  
  <!-- HTTP Methods Table -->
  <rect x="50" y="270" width="700" height="110" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">HTTP Method Semantics</text>
  
  <!-- Table Header -->
  <rect x="70" y="310" width="660" height="25" rx="2" fill="#E2E8F0"/>
  <text x="120" y="328" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Method</text>
  <text x="220" y="328" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Safe</text>
  <text x="320" y="328" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Idempotent</text>
  <text x="450" y="328" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Cacheable</text>
  <text x="600" y="328" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Use Case</text>
  
  <!-- Table Rows -->
  <rect x="70" y="338" width="660" height="18" rx="1" fill="#FFFFFF"/>
  <text x="120" y="351" text-anchor="start" font-family="monospace, sans-serif" font-size="9" font-weight="600" fill="#EC4899">GET</text>
  <text x="220" y="351" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#10B981">✓ Yes</text>
  <text x="320" y="351" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#10B981">✓ Yes</text>
  <text x="450" y="351" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#10B981">✓ Yes</text>
  <text x="600" y="351" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Read/Retrieve</text>
  
  <rect x="70" y="359" width="660" height="18" rx="1" fill="#FFFFFF"/>
  <text x="120" y="372" text-anchor="start" font-family="monospace, sans-serif" font-size="9" font-weight="600" fill="#10B981">POST</text>
  <text x="220" y="372" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#EC4899">✗ No</text>
  <text x="320" y="372" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#EC4899">✗ No</text>
  <text x="450" y="372" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#EC4899">✗ No</text>
  <text x="600" y="372" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Create resource</text>
  
  <rect x="70" y="380" width="660" height="18" rx="1" fill="#FFFFFF"/>
  <text x="120" y="393" text-anchor="start" font-family="monospace, sans-serif" font-size="9" font-weight="600" fill="#8B5CF6">PUT</text>
  <text x="220" y="393" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#EC4899">✗ No</text>
  <text x="320" y="393" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#10B981">✓ Yes</text>
  <text x="450" y="393" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#EC4899">✗ No</text>
  <text x="600" y="393" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Replace resource</text>
</svg>
