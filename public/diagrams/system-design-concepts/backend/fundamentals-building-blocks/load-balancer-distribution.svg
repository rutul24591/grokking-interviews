<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <title>Load Balancer Traffic Distribution</title>
  <desc>How load balancers distribute incoming traffic across backend servers</desc>
  
  <rect width="800" height="350" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Load Balancer Traffic Distribution</text>
  
  <!-- Clients -->
  <rect x="50" y="70" width="100" height="200" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Clients</text>
  
  <circle cx="100" cy="95" r="12" fill="#EC4899"/>
  <text x="100" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">1</text>
  
  <circle cx="100" cy="130" r="12" fill="#EC4899"/>
  <text x="100" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">2</text>
  
  <circle cx="100" cy="165" r="12" fill="#EC4899"/>
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">3</text>
  
  <circle cx="100" cy="200" r="12" fill="#EC4899"/>
  <text x="100" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">4</text>
  
  <circle cx="100" cy="235" r="12" fill="#EC4899"/>
  <text x="100" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">5</text>
  
  <!-- Load Balancer -->
  <rect x="250" y="120" width="140" height="100" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="3"/>
  <text x="320" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Load Balancer</text>
  <text x="320" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Round-Robin</text>
  <text x="320" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Health Checks</text>
  
  <!-- Request Arrows to LB -->
  <path d="M150 100 L250 140" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M150 135 L250 155" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M150 170 L250 170" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M150 205 L250 185" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M150 240 L250 200" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  
  <!-- Backend Servers -->
  <rect x="500" y="70" width="250" height="200" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="625" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Backend Servers</text>
  
  <!-- Server 1 -->
  <rect x="520" y="115" width="210" height="40" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <text x="625" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Server 1 (us-east-1)</text>
  <text x="700" y="125" text-anchor="end" font-family="system-ui, sans-serif" font-size="8" fill="#10B981">✓ Healthy</text>
  
  <!-- Server 2 -->
  <rect x="520" y="165" width="210" height="40" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <text x="625" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Server 2 (us-west-2)</text>
  <text x="700" y="175" text-anchor="end" font-family="system-ui, sans-serif" font-size="8" fill="#10B981">✓ Healthy</text>
  
  <!-- Server 3 -->
  <rect x="520" y="215" width="210" height="40" rx="4" fill="#FEE2E2" stroke="#EC4899" stroke-width="2" stroke-dasharray="4"/>
  <text x="625" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">Server 3 (eu-west-1)</text>
  <text x="700" y="225" text-anchor="end" font-family="system-ui, sans-serif" font-size="8" fill="#EC4899">✗ Unhealthy</text>
  
  <!-- Distribution Arrows from LB -->
  <path d="M390 145 L520 135" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <path d="M390 165 L520 185" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <!-- No arrow to unhealthy server -->
  
  <!-- Distribution Strategies Box -->
  <rect x="50" y="285" width="700" height="55" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Distribution Strategies</text>
  <text x="150" y="328" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Round-Robin: Equal distribution</text>
  <text x="350" y="328" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Least-Connections: Route to least busy</text>
  <text x="550" y="328" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• IP Hash: Sticky sessions</text>
  
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>
