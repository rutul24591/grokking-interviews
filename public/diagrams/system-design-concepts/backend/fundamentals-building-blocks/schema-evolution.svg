<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Schema Evolution</title>
  <desc>How schemas evolve with backward and forward compatibility</desc>
  
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Schema Evolution</text>
  
  <!-- Version 1 -->
  <rect x="50" y="70" width="200" height="260" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="150" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Version 1</text>
  
  <rect x="70" y="120" width="160" height="35" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="1"/>
  <text x="150" y="143" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">id: int = 1</text>
  
  <rect x="70" y="165" width="160" height="35" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="1"/>
  <text x="150" y="188" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">name: string</text>
  
  <rect x="70" y="210" width="160" height="35" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="1"/>
  <text x="150" y="233" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">email: string</text>
  
  <!-- Arrow to V2 -->
  <path d="M250 200 L300 200" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="275" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Evolve</text>
  
  <!-- Version 2 -->
  <rect x="300" y="70" width="200" height="260" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Version 2</text>
  
  <rect x="320" y="120" width="160" height="35" rx="4" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="400" y="143" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">id: int = 1</text>
  
  <rect x="320" y="165" width="160" height="35" rx="4" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="400" y="188" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">name: string</text>
  
  <rect x="320" y="210" width="160" height="35" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="233" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">phone: string?</text>
  <text x="485" y="225" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#F59E0B">NEW</text>
  
  <rect x="320" y="255" width="160" height="35" rx="4" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1"/>
  <text x="400" y="278" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">email: string</text>
  
  <!-- Arrow to V3 -->
  <path d="M500 200 L550 200" stroke="#4B5563" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="525" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Evolve</text>
  
  <!-- Version 3 -->
  <rect x="550" y="70" width="200" height="260" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="650" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Version 3</text>
  
  <rect x="570" y="120" width="160" height="35" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="1"/>
  <text x="650" y="143" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">id: int = 1</text>
  
  <rect x="570" y="165" width="160" height="35" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="650" y="188" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">full_name: string</text>
  <text x="735" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#F59E0B">RENAMED</text>
  
  <rect x="570" y="210" width="160" height="35" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="1"/>
  <text x="650" y="233" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#111827">phone: string?</text>
  
  <rect x="570" y="255" width="160" height="35" rx="4" fill="#FEE2E2" stroke="#EC4899" stroke-width="2" stroke-dasharray="4"/>
  <text x="650" y="278" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#EC4899" text-decoration="line-through">email: string</text>
  <text x="735" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#EC4899">DEPRECATED</text>
  
  <!-- Rules Box -->
  <rect x="50" y="345" width="700" height="45" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Rules: Add optional fields ✓ | Rename with alias ✓ | Deprecate before removing ✓ | Never reuse field numbers</text>
  <text x="400" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Backward compatible: Old readers can read new data | Forward compatible: New readers can read old data</text>
  
  <defs>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>
