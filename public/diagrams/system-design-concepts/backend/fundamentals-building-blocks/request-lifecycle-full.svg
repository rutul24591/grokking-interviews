<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <title>Request Response Lifecycle</title>
  <desc>Complete request lifecycle from DNS to response</desc>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Request/Response Lifecycle</text>
  
  <!-- Client -->
  <rect x="50" y="70" width="100" height="50" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="100" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Client</text>
  
  <!-- Step 1: DNS -->
  <rect x="200" y="70" width="90" height="50" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="245" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">1. DNS</text>
  <text x="245" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">10-100ms</text>
  
  <!-- Step 2: TCP -->
  <rect x="310" y="70" width="90" height="50" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="355" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">2. TCP</text>
  <text x="355" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">1 RTT</text>
  
  <!-- Step 3: TLS -->
  <rect x="420" y="70" width="90" height="50" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="465" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">3. TLS</text>
  <text x="465" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">1-2 RTT</text>
  
  <!-- Server -->
  <rect x="550" y="70" width="100" height="50" rx="4" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="600" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Server</text>
  
  <!-- Server Processing Steps -->
  <rect x="550" y="140" width="200" height="200" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="650" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Server Processing</text>
  
  <!-- Middleware -->
  <rect x="570" y="185" width="160" height="35" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="650" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">4. Middleware</text>
  <text x="650" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#4B5563">Auth, Validation (10-50ms)</text>
  
  <!-- Business Logic -->
  <rect x="570" y="230" width="160" height="35" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="650" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">5. Business Logic</text>
  <text x="650" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#4B5563">Processing (10-500ms)</text>
  
  <!-- Data Access -->
  <rect x="570" y="275" width="160" height="35" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="650" y="297" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">6. Data Access</text>
  <text x="650" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#4B5563">DB/Cache (1-1000ms)</text>
  
  <!-- Serialization -->
  <rect x="570" y="320" width="160" height="35" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="650" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">7. Serialization</text>
  <text x="650" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#4B5563">JSON Encode (5-50ms)</text>
  
  <!-- Response Path -->
  <path d="M550 95 L420 95" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <path d="M330 95 L310 95" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <path d="M220 95 L200 95" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <path d="M110 95 L90 95" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <text x="485" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#10B981">Response</text>
  
  <!-- Latency Breakdown -->
  <rect x="50" y="280" width="450" height="140" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="275" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Typical Latency Breakdown (500ms SLO)</text>
  
  <!-- Network Bar -->
  <rect x="80" y="330" width="90" height="25" rx="4" fill="#EC4899"/>
  <text x="125" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF">Network</text>
  <text x="125" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">50-150ms</text>
  
  <!-- Middleware Bar -->
  <rect x="190" y="330" width="70" height="25" rx="4" fill="#EC4899"/>
  <text x="225" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF">Middleware</text>
  <text x="225" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">10-50ms</text>
  
  <!-- Logic Bar -->
  <rect x="280" y="330" width="90" height="25" rx="4" fill="#EC4899"/>
  <text x="325" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF">Logic</text>
  <text x="325" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">50-200ms</text>
  
  <!-- Data Access Bar -->
  <rect x="390" y="330" width="90" height="25" rx="4" fill="#EC4899"/>
  <text x="435" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF">Data Access</text>
  <text x="435" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">100-500ms</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>
</svg>
