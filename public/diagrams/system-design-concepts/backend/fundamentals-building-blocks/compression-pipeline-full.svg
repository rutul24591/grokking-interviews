<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Compression Pipeline</title>
  <desc>How data flows through compression and decompression</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Compression Pipeline</text>
  
  <!-- Original Data -->
  <rect x="50" y="80" width="150" height="90" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="125" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Original Data</text>
  <text x="125" y="140" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">{"{"}</text>
  <text x="125" y="153" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">"name": "John"</text>
  <text x="125" y="166" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">...</text>
  <text x="125" y="179" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">{"}"}</text>
  <text x="125" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">10 KB</text>
  
  <!-- Compressor -->
  <rect x="250" y="105" width="120" height="50" rx="4" fill="#EC4899"/>
  <text x="310" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Compressor</text>
  <text x="310" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">gzip / Brotli</text>
  
  <!-- Compressed Data -->
  <rect x="420" y="80" width="150" height="90" rx="8" fill="#F8F9FC" stroke="#10B981" stroke-width="2"/>
  <text x="495" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#10B981">Compressed</text>
  <text x="495" y="140" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">[binary data]</text>
  <text x="495" y="153" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">0x1F 0x8B...</text>
  <text x="495" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#10B981">3 KB (70% smaller)</text>
  
  <!-- Decompressor -->
  <rect x="620" y="105" width="120" height="50" rx="4" fill="#EC4899"/>
  <text x="680" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Decompressor</text>
  <text x="680" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">gunzip / Brotli</text>
  
  <!-- Decompressed Data -->
  <rect x="50" y="250" width="150" height="90" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="125" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Decompressed</text>
  <text x="125" y="310" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">{"{"}</text>
  <text x="125" y="323" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">"name": "John"</text>
  <text x="125" y="336" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">...</text>
  <text x="125" y="349" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">{"}"}</text>
  <text x="125" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">10 KB (original)</text>
  
  <!-- Flow Arrows -->
  <path d="M200 130 L250 130" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M370 130 L420 130" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <path d="M570 130 L620 130" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M740 130 L760 130" stroke="#4B5563" stroke-width="2" stroke-dasharray="4"/>
  <text x="775" y="135" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">To Client</text>
  
  <!-- Network Transmission -->
  <path d="M125 170 L125 210 L125 250" stroke="#4B5563" stroke-width="2" stroke-dasharray="4"/>
  <text x="135" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#4B5563">Round trip</text>
  
  <!-- Trade-offs Box -->
  <rect x="450" y="220" width="300" height="120" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="600" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Compression Trade-offs</text>
  
  <text x="480" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">✓ Benefits:</text>
  <text x="480" y="288" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Reduced bandwidth (70-90% for text)</text>
  <text x="480" y="303" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Faster transfer on slow networks</text>
  <text x="480" y="318" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Lower egress costs</text>
  
  <text x="480" y="343" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#EC4899">✗ Costs:</text>
  <text x="480" y="361" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• CPU for compression/decompression</text>
  <text x="480" y="376" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Increased latency (small payloads)</text>
  <text x="480" y="391" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• No benefit for already-compressed data</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>
</svg>
