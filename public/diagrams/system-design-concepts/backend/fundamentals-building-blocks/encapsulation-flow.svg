<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <title>Data Encapsulation Flow</title>
  <desc>How data is encapsulated as it flows down the OSI layers</desc>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Data Encapsulation Flow</text>
  
  <!-- Sender Side (Left) -->
  <rect x="50" y="60" width="320" height="350" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="210" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Sender</text>
  
  <!-- Application Layer -->
  <rect x="80" y="105" width="260" height="45" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="210" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Application: Data</text>
  
  <!-- Arrow Down -->
  <path d="M210 150 L210 170" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  
  <!-- Transport Layer -->
  <rect x="80" y="170" width="260" height="45" rx="4" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="210" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Transport: + TCP Header</text>
  <text x="210" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Segment</text>
  
  <!-- Arrow Down -->
  <path d="M210 215 L210 235" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  
  <!-- Network Layer -->
  <rect x="80" y="235" width="260" height="45" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="210" y="257" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Network: + IP Header</text>
  <text x="210" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Packet</text>
  
  <!-- Arrow Down -->
  <path d="M210 280 L210 300" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  
  <!-- Data Link Layer -->
  <rect x="80" y="300" width="260" height="45" rx="4" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="210" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Data Link: + Header + Trailer</text>
  <text x="210" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Frame</text>
  
  <!-- Network Arrow -->
  <path d="M370 250 L430 250" stroke="#4B5563" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowGray)"/>
  <text x="400" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Transmission</text>
  
  <!-- Receiver Side (Right) -->
  <rect x="430" y="60" width="320" height="350" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="590" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Receiver</text>
  
  <!-- Data Link Layer (Receiver) -->
  <rect x="460" y="300" width="260" height="45" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="590" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Data Link: - Header - Trailer</text>
  <text x="590" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Frame → Packet</text>
  
  <!-- Arrow Up -->
  <path d="M590 300 L590 280" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Network Layer (Receiver) -->
  <rect x="460" y="235" width="260" height="45" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="590" y="257" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Network: - IP Header</text>
  <text x="590" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Packet → Segment</text>
  
  <!-- Arrow Up -->
  <path d="M590 235 L590 215" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Transport Layer (Receiver) -->
  <rect x="460" y="170" width="260" height="45" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="590" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Transport: - TCP Header</text>
  <text x="590" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Segment → Data</text>
  
  <!-- Arrow Up -->
  <path d="M590 170 L590 150" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Application Layer (Receiver) -->
  <rect x="460" y="105" width="260" height="45" rx="4" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="590" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Application: Data Received</text>
  
  <!-- Key Insight Box -->
  <rect x="50" y="420" width="700" height="25" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="438" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Encapsulation: Add headers at each layer | Decapsulation: Remove headers at each layer</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>
