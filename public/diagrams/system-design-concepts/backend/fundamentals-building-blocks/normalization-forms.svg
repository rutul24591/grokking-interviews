<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Unicode Normalization Forms</title>
  <desc>NFC vs NFD normalization and how they affect string comparison</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Unicode Normalization Forms</text>
  
  <!-- Same Visual Text, Different Bytes -->
  <rect x="50" y="60" width="700" height="70" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Same Visual Text, Different Byte Sequences</text>
  <text x="400" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#EC4899">café = café</text>
  <text x="400" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Visually identical but byte sequences differ!</text>
  
  <!-- NFD (Decomposed) -->
  <rect x="50" y="150" width="320" height="120" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="210" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">NFD (Decomposed)</text>
  <text x="210" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827">café</text>
  <text x="210" y="235" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">c a f e ́ (5 code points)</text>
  <text x="210" y="252" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">63 61 66 65 CC 81 (6 bytes)</text>
  <text x="210" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Base character + combining accent</text>
  
  <!-- NFC (Composed) -->
  <rect x="430" y="150" width="320" height="120" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="590" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">NFC (Composed)</text>
  <text x="590" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#111827">café</text>
  <text x="590" y="235" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">c a f é (4 code points)</text>
  <text x="590" y="252" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">63 61 66 C3 A9 (5 bytes)</text>
  <text x="590" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Precomposed character (single code point)</text>
  
  <!-- Comparison Problem -->
  <rect x="50" y="285" width="700" height="60" rx="8" fill="#F8F9FC" stroke="#EC4899" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#EC4899">Problem: "café" == "café" returns FALSE without normalization!</text>
  <text x="400" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Different byte sequences = different strings in most languages</text>
  
  <!-- Solution Box -->
  <rect x="50" y="355" width="700" height="35" rx="8" fill="#F8F9FC" stroke="#10B981" stroke-width="2"/>
  <text x="400" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#10B981">Solution: Normalize to NFC before comparison/storage</text>
  <text x="400" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">NFC is the default for most systems (web, databases, filesystems)</text>
</svg>
