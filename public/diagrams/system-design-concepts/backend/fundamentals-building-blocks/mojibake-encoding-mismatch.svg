<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Mojibake Encoding Mismatch</title>
  <desc>How encoding mismatches cause garbled text (mojibake)</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Mojibake: Encoding Mismatch</text>
  
  <!-- Original Text (Left) -->
  <rect x="50" y="70" width="300" height="90" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="200" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Original Text (UTF-8)</text>
  <text x="200" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#EC4899">café résumé</text>
  <text x="200" y="155" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#4B5563">Bytes: 63 61 66 C3 A9 20 72 C3 A9 73 75 6D C3 A9</text>
  
  <!-- Encoding Process Arrow -->
  <rect x="380" y="95" width="40" height="40" rx="4" fill="#EC4899"/>
  <text x="400" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" transform="rotate(-90, 400, 120)">Encode</text>
  
  <!-- Wrong Decoding (Right) -->
  <rect x="450" y="70" width="300" height="90" rx="8" fill="#F8F9FC" stroke="#EC4899" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#EC4899">Decoded as Latin-1 (WRONG)</text>
  <text x="600" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#EC4899">cafÃ© rÃ©sumÃ©</text>
  <text x="600" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Mojibake! Each UTF-8 byte interpreted separately</text>
  
  <!-- Byte Breakdown Section -->
  <rect x="50" y="180" width="700" height="120" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">What Happens: UTF-8 → Latin-1 Mismatch</text>
  
  <!-- Correct UTF-8 Interpretation -->
  <rect x="70" y="225" width="300" height="65" rx="4" fill="#10B981"/>
  <text x="220" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Correct (UTF-8)</text>
  <text x="220" y="270" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#FFFFFF">C3 A9 = é (1 character)</text>
  <text x="220" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">Multi-byte sequence decoded together</text>
  
  <!-- Wrong Latin-1 Interpretation -->
  <rect x="430" y="225" width="300" height="65" rx="4" fill="#F59E0B"/>
  <text x="580" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Wrong (Latin-1/ISO-8859-1)</text>
  <text x="580" y="270" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#FFFFFF">C3 = Ã, A9 = © (2 characters)</text>
  <text x="580" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">Each byte decoded separately = garbage</text>
  
  <!-- Common Scenarios -->
  <rect x="50" y="315" width="700" height="60" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Common Causes of Mojibake</text>
  
  <text x="100" y="360" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Database charset mismatch (UTF-8 stored, Latin-1 read)</text>
  <text x="100" y="375" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• HTTP header missing charset</text>
  <text x="450" y="360" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Double encoding (UTF-8 → UTF-8)</text>
  <text x="450" y="375" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">• Legacy systems using ISO-8859-1</text>
</svg>
