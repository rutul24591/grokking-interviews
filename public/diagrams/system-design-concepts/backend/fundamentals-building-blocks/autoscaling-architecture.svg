<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Autoscaling Architecture</title>
  <desc>How autoscaling adds/removes instances based on metrics</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Autoscaling Architecture</text>
  
  <!-- Load Balancer -->
  <rect x="300" y="60" width="200" height="55" rx="4" fill="#8B5CF6"/>
  <text x="400" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Load Balancer</text>
  <text x="400" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">Distributes traffic</text>
  
  <!-- Instance Group -->
  <rect x="150" y="140" width="500" height="180" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Auto Scaling Group</text>
  
  <!-- Active Instances -->
  <rect x="180" y="185" width="100" height="55" rx="4" fill="#10B981"/>
  <text x="230" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Instance 1</text>
  <text x="230" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">CPU: 45%</text>
  
  <rect x="300" y="185" width="100" height="55" rx="4" fill="#10B981"/>
  <text x="350" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Instance 2</text>
  <text x="350" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">CPU: 52%</text>
  
  <rect x="420" y="185" width="100" height="55" rx="4" fill="#10B981"/>
  <text x="470" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Instance 3</text>
  <text x="470" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">CPU: 48%</text>
  
  <!-- Scaling Up (dashed) -->
  <rect x="180" y="260" width="100" height="55" rx="4" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4"/>
  <text x="230" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#8B5CF6">Instance 4</text>
  <text x="230" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8B5CF6">Launching...</text>
  
  <!-- Metrics & Policies -->
  <rect x="550" y="185" width="200" height="130" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="650" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Scaling Policies</text>
  
  <text x="570" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Scale Out:</text>
  <text x="570" y="252" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">CPU &gt; 70% for 5 min</text>
  <text x="570" y="267" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Add 2 instances</text>
  
  <text x="570" y="292" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Scale In:</text>
  <text x="570" y="309" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">CPU &lt; 30% for 10 min</text>
  <text x="570" y="324" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Remove 1 instance</text>
  
  <!-- Arrows from LB to instances -->
  <path d="M400 115 L230 185" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <path d="M400 115 L350 185" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <path d="M400 115 L470 185" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  
  <!-- Metrics arrow -->
  <path d="M550 250 L520 250" stroke="#4B5563" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowGray)"/>
  <text x="535" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#4B5563">Metrics</text>
  
  <!-- Key Benefits Box -->
  <rect x="50" y="330" width="700" height="20" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Autoscaling Benefits: Handle traffic spikes | Reduce costs during low usage | Improve availability</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>
