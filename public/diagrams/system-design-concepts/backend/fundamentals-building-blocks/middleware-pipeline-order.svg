<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Middleware Pipeline</title>
  <desc>How middleware processes requests in order before reaching business logic</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Middleware Pipeline</text>
  
  <!-- Request Entry -->
  <rect x="50" y="175" width="80" height="50" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="90" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">Request</text>
  
  <!-- Middleware 1: Rate Limiting -->
  <rect x="180" y="175" width="100" height="50" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="230" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">1. Rate Limit</text>
  <text x="230" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">5ms</text>
  
  <!-- Middleware 2: Authentication -->
  <rect x="320" y="175" width="100" height="50" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="370" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">2. Auth</text>
  <text x="370" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">10ms</text>
  
  <!-- Middleware 3: Validation -->
  <rect x="460" y="175" width="100" height="50" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="510" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">3. Validation</text>
  <text x="510" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">5ms</text>
  
  <!-- Middleware 4: Logging -->
  <rect x="600" y="175" width="100" height="50" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="650" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">4. Logging</text>
  <text x="650" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">2ms</text>
  
  <!-- Business Logic -->
  <rect x="720" y="175" width="80" height="50" rx="4" fill="#10B981"/>
  <text x="760" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Handler</text>
  
  <!-- Request Flow Arrows -->
  <path d="M130 200 L180 200" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M280 200 L320 200" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M420 200 L460 200" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M560 200 L600 200" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M700 200 L720 200" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Early Exit Paths -->
  <path d="M230 225 L230 280 L100 280 L100 235" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowWarning)"/>
  <text x="250" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#F59E0B">429 Too Many</text>
  
  <path d="M370 225 L370 310 L100 310 L100 235" stroke="#EC4899" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowPink)"/>
  <text x="390" y="300" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#EC4899">401 Unauthorized</text>
  
  <path d="M510 225 L510 340 L100 340 L100 235" stroke="#EC4899" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowPink)"/>
  <text x="530" y="330" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#EC4899">400 Bad Request</text>
  
  <!-- Total Latency Box -->
  <rect x="50" y="60" width="700" height="80" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Middleware Ordering Impact</text>
  
  <text x="100" y="110" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Correct Order:</text>
  <text x="100" y="128" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Rate Limit → Auth → Validation → Logging → Handler</text>
  <text x="100" y="143" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#10B981">Total: 22ms before business logic</text>
  
  <text x="450" y="110" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Wrong Order:</text>
  <text x="450" y="128" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Logging → Validation → Auth → Rate Limit → Handler</text>
  <text x="450" y="143" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#EC4899">Wastes CPU on invalid/unauth requests</text>
  
  <!-- Key Principles Box -->
  <rect x="50" y="360" width="700" height="30" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Principles: Fast rejections first (rate limit, auth) | Expensive checks later (validation) | Logging at end (or async)</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrowWarning" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
  </defs>
</svg>
