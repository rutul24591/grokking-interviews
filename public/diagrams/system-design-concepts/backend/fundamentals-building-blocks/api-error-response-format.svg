<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>API Error Response Format</title>
  <desc>Standardized error response structure for REST APIs</desc>
  
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">API Error Response Format</text>
  
  <!-- Error Response Example -->
  <rect x="50" y="60" width="700" height="180" rx="8" fill="#FEE2E2" stroke="#EC4899" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Standard Error Response Structure</text>
  
  <!-- HTTP Status Line -->
  <rect x="70" y="100" width="660" height="30" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="2"/>
  <text x="85" y="120" text-anchor="start" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#EC4899">HTTP/1.1 400 Bad Request</text>
  <text x="600" y="120" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Status Line</text>
  
  <!-- Headers -->
  <rect x="70" y="135" width="660" height="30" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="85" y="155" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#4B5563">Content-Type: application/json</text>
  <text x="400" y="155" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#4B5563">X-Request-ID: req_abc123</text>
  
  <!-- Error Body -->
  <rect x="70" y="170" width="660" height="60" rx="4" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="85" y="190" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#111827">{</text>
  <text x="100" y="205" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#111827">"error": {</text>
  <text x="120" y="220" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#111827">"code": "validation_failed",</text>
  <text x="400" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">← Machine-readable code</text>
  <text x="120" y="235" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#111827">"message": "Invalid email format",</text>
  <text x="400" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">← Human-readable message</text>
  <text x="120" y="250" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#111827">"request_id": "req_abc123"</text>
  <text x="400" y="250" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">← For debugging/tracing</text>
  <text x="100" y="265" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#111827">}</text>
  <text x="85" y="280" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#111827">}</text>
  
  <!-- Field Validation Errors -->
  <rect x="50" y="255" width="700" height="125" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Field-Level Validation Errors</text>
  
  <!-- Validation Error Example -->
  <rect x="70" y="295" width="660" height="75" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="85" y="315" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#111827">{</text>
  <text x="100" y="330" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#111827">"errors": [</text>
  <text x="120" y="345" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#111827">{ "field": "email", "code": "invalid_format", "message": "Must be a valid email" },</text>
  <text x="120" y="360" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#111827">{ "field": "password", "code": "too_short", "message": "Minimum 8 characters" }</text>
  <text x="100" y="375" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#111827">]</text>
  <text x="85" y="390" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#111827">}</text>
  
  <!-- Best Practices -->
  <rect x="50" y="390" width="700" height="10" rx="2" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Best Practices: Use standard HTTP status codes | Include request_id for debugging | Provide actionable error messages</text>
</svg>
