<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Web API Architecture</title>
  <desc>Modern web API architecture with clients, load balancers, and servers</desc>
  
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Web API Architecture</text>
  
  <!-- Clients Row -->
  <rect x="50" y="60" width="150" height="280" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="125" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Clients</text>
  
  <rect x="65" y="110" width="120" height="45" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="2"/>
  <text x="125" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Web Browser</text>
  
  <rect x="65" y="170" width="120" height="45" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="2"/>
  <text x="125" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Mobile App</text>
  
  <rect x="65" y="230" width="120" height="45" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="2"/>
  <text x="125" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">3rd Party API</text>
  
  <rect x="65" y="290" width="120" height="45" rx="4" fill="#FFFFFF" stroke="#EC4899" stroke-width="2"/>
  <text x="125" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">IoT Devices</text>
  
  <!-- Load Balancer -->
  <rect x="280" y="150" width="140" height="100" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="3"/>
  <text x="350" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Load Balancer</text>
  <text x="350" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Distributes traffic</text>
  <text x="350" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Health checks</text>
  
  <!-- API Servers -->
  <rect x="500" y="60" width="250" height="280" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <text x="625" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">API Servers</text>
  
  <rect x="520" y="110" width="210" height="45" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <text x="625" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Server 1 (us-east-1)</text>
  
  <rect x="520" y="170" width="210" height="45" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <text x="625" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Server 2 (us-west-2)</text>
  
  <rect x="520" y="230" width="210" height="45" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <text x="625" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Server 3 (eu-west-1)</text>
  
  <rect x="520" y="290" width="210" height="45" rx="4" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
  <text x="625" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Server 4 (ap-south-1)</text>
  
  <!-- Request Arrows -->
  <path d="M200 132 L280 175" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M200 192 L280 185" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M200 252 L280 195" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  <path d="M200 312 L280 205" stroke="#EC4899" stroke-width="2" marker-end="url(#arrowPink)"/>
  
  <!-- Distribution Arrows -->
  <path d="M420 175 L500 132" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <path d="M420 185 L500 192" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <path d="M420 195 L500 252" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <path d="M420 205 L500 312" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  
  <!-- Key Benefits Box -->
  <rect x="50" y="350" width="700" height="40" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#111827">Benefits: Scalability | High Availability | Geographic Distribution | Load Distribution</text>
  <text x="400" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">RESTful APIs use standard HTTP methods (GET, POST, PUT, DELETE) with JSON payloads</text>
  
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>
