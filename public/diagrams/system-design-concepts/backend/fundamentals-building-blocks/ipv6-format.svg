<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <title>IPv6 Address Format</title>
  <desc>IPv6 128-bit address structure in hexadecimal notation</desc>
  
  <rect width="800" height="350" fill="#FFFFFF"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">IPv6 Address Format</text>
  
  <!-- Full Address -->
  <rect x="50" y="60" width="700" height="60" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="3"/>
  <text x="400" y="98" text-anchor="middle" font-family="monospace, sans-serif" font-size="20" font-weight="700" fill="#8B5CF6">2001:0db8:85a3:0000:0000:8a2e:0370:7334</text>
  
  <!-- Compressed Address -->
  <rect x="150" y="135" width="500" height="50" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="165" text-anchor="middle" font-family="monospace, sans-serif" font-size="18" font-weight="700" fill="#8B5CF6">2001:db8:85a3::8a2e:370:7334</text>
  
  <!-- Group Breakdown -->
  <rect x="50" y="200" width="700" height="80" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">128 bits = 8 groups × 16 bits</text>
  
  <!-- Groups -->
  <rect x="70" y="245" width="75" height="30" rx="2" fill="#8B5CF6"/>
  <text x="107" y="265" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">2001</text>
  
  <rect x="150" y="245" width="75" height="30" rx="2" fill="#8B5CF6"/>
  <text x="187" y="265" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">0db8</text>
  
  <rect x="230" y="245" width="75" height="30" rx="2" fill="#8B5CF6"/>
  <text x="267" y="265" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">85a3</text>
  
  <rect x="310" y="245" width="180" height="30" rx="2" fill="#E2E8F0" stroke="#E2E8F0" stroke-dasharray="4"/>
  <text x="400" y="265" text-anchor="middle" font-family="monospace, sans-serif" font-size="16" font-weight="700" fill="#4B5563">::</text>
  
  <rect x="495" y="245" width="75" height="30" rx="2" fill="#8B5CF6"/>
  <text x="532" y="265" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">8a2e</text>
  
  <rect x="575" y="245" width="75" height="30" rx="2" fill="#8B5CF6"/>
  <text x="612" y="265" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">0370</text>
  
  <rect x="655" y="245" width="75" height="30" rx="2" fill="#8B5CF6"/>
  <text x="692" y="265" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">7334</text>
  
  <!-- Stats Box -->
  <rect x="50" y="295" width="700" height="45" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Total Addresses: ~3.4 × 10³⁸ (2^128)</text>
  <text x="400" y="333" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">Compression: Leading zeros omitted, consecutive zeros replaced with ::</text>
</svg>
