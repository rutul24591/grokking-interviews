<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="100%" height="100%" fill="#ffffff" />
  <style>
    text { font-family: 'Sora', Arial, sans-serif; fill: #1f2937; }
    .bit { fill: #f1f5f9; stroke: #cbd5f5; stroke-width: 2; rx: 8; }
    .label { font-size: 18px; font-weight: 600; }
    .small { font-size: 14px; fill: #475569; }
  </style>

  <text x="450" y="40" text-anchor="middle" class="label">IPv6 Address (128 bits)</text>
  <text x="450" y="70" text-anchor="middle" class="small">Hex groups: 2001:0db8:85a3:0000:0000:8a2e:0370:7334</text>

  <rect class="bit" x="80" y="120" width="160" height="60" />
  <rect class="bit" x="250" y="120" width="160" height="60" />
  <rect class="bit" x="420" y="120" width="160" height="60" />
  <rect class="bit" x="590" y="120" width="160" height="60" />

  <rect class="bit" x="80" y="200" width="160" height="60" />
  <rect class="bit" x="250" y="200" width="160" height="60" />
  <rect class="bit" x="420" y="200" width="160" height="60" />
  <rect class="bit" x="590" y="200" width="160" height="60" />

  <text x="160" y="155" text-anchor="middle" class="label">2001</text>
  <text x="330" y="155" text-anchor="middle" class="label">0db8</text>
  <text x="500" y="155" text-anchor="middle" class="label">85a3</text>
  <text x="670" y="155" text-anchor="middle" class="label">0000</text>

  <text x="160" y="235" text-anchor="middle" class="label">0000</text>
  <text x="330" y="235" text-anchor="middle" class="label">8a2e</text>
  <text x="500" y="235" text-anchor="middle" class="label">0370</text>
  <text x="670" y="235" text-anchor="middle" class="label">7334</text>

  <text x="450" y="300" text-anchor="middle" class="small">8 groups × 16 bits = 128 bits</text>
</svg>
