<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <title>Stateful Request Flow</title>
  <desc>How stateful services maintain session state in server memory</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">Stateful Service Architecture</text>
  
  <!-- Client -->
  <rect x="50" y="80" width="120" height="55" rx="4" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="110" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Client</text>
  <text x="110" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Session Cookie</text>
  
  <!-- Load Balancer with Sticky Sessions -->
  <rect x="250" y="80" width="150" height="55" rx="4" fill="#8B5CF6"/>
  <text x="325" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Load Balancer</text>
  <text x="325" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">Sticky Sessions</text>
  
  <!-- App Server 1 (Session Owner) -->
  <rect x="480" y="60" width="140" height="70" rx="4" fill="#10B981"/>
  <text x="550" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">App Server 1</text>
  <text x="550" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">Session State</text>
  <text x="550" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FFFFFF">In Memory</text>
  <text x="550" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#FFFFFF">✓ Active Session</text>
  
  <!-- App Server 2 -->
  <rect x="480" y="150" width="140" height="70" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="550" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">App Server 2</text>
  <text x="550" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Session State</text>
  <text x="550" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">In Memory</text>
  <text x="550" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#4B5563">No Active Session</text>
  
  <!-- Request Flow Arrow (sticky to Server 1) -->
  <path d="M400 107 L480 95" stroke="#10B981" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="440" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10B981">Sticky Route</text>
  
  <!-- Session Data Box -->
  <rect x="680" y="60" width="100" height="70" rx="4" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="730" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827">Session Data</text>
  <text x="730" y="100" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#4B5563">user_id: 123</text>
  <text x="730" y="113" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#4B5563">cart: [...]</text>
  <text x="730" y="126" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#4B5563">auth: token</text>
  
  <!-- Challenges Box -->
  <rect x="50" y="250" width="700" height="120" rx="8" fill="#F8F9FC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="400" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Stateful Architecture Challenges</text>
  
  <text x="100" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#EC4899">✗ Server failure = session loss</text>
  <text x="100" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#EC4899">✗ Complex load balancing (sticky)</text>
  <text x="100" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#EC4899">✗ Harder to scale horizontally</text>
  <text x="400" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">✗ Deployment requires draining</text>
  <text x="400" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">✗ Uneven load distribution</text>
  <text x="400" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">✗ Session replication overhead</text>
  
  <text x="100" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">✓ Low latency (local session)</text>
  <text x="100" y="390" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">✓ No external dependency</text>
  <text x="400" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">✓ Simple for small scale</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>
</svg>
