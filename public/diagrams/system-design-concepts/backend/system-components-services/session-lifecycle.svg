<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Session Lifecycle: Creation, Validation, Renewal, Revocation</text>
  <!-- Session Creation -->
  <rect x="40" y="70" width="190" height="120" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="135" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e40af">1. Creation</text>
  <text x="135" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">User authenticates</text>
  <text x="135" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Generate session ID</text>
  <text x="135" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Store session state</text>
  <text x="135" y="174" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Return token/cookie</text>
  <!-- Arrow -->
  <line x1="230" y1="130" x2="260" y2="130" stroke="#64748b" stroke-width="2"/>
  <polygon points="260,125 270,130 260,135" fill="#64748b"/>
  <!-- Session Validation -->
  <rect x="270" y="70" width="190" height="120" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="365" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534">2. Validation</text>
  <text x="365" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Verify token signature</text>
  <text x="365" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Check expiration</text>
  <text x="365" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Load session state</text>
  <text x="365" y="174" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Check revocation list</text>
  <!-- Arrow -->
  <line x1="460" y1="130" x2="490" y2="130" stroke="#64748b" stroke-width="2"/>
  <polygon points="490,125 500,130 490,135" fill="#64748b"/>
  <!-- Session Renewal -->
  <rect x="500" y="70" width="190" height="120" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="595" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#a16207">3. Renewal</text>
  <text x="595" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Sliding expiration</text>
  <text x="595" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Rotate refresh token</text>
  <text x="595" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Extend session TTL</text>
  <text x="595" y="174" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Update last activity</text>
  <!-- Arrow -->
  <line x1="690" y1="130" x2="720" y2="130" stroke="#64748b" stroke-width="2"/>
  <polygon points="720,125 730,130 720,135" fill="#64748b"/>
  <!-- Session Revocation -->
  <rect x="730" y="70" width="140" height="120" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="800" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#991b1b">4. Revocation</text>
  <text x="800" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">User logout</text>
  <text x="800" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Password change</text>
  <text x="800" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Admin force-logout</text>
  <text x="800" y="174" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Session expiry</text>
  <!-- Token types -->
  <rect x="40" y="220" width="400" height="265" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="240" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Token Types and Properties</text>
  <!-- Access Token -->
  <rect x="60" y="270" width="360" height="30" rx="5" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#334155">Access Token (JWT)</text>
  <rect x="60" y="307" width="180" height="25" rx="4" fill="#f3e8ff"/>
  <text x="150" y="324" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b21a8">Lifetime: 15-60 minutes</text>
  <rect x="240" y="307" width="180" height="25" rx="4" fill="#f3e8ff"/>
  <text x="330" y="324" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b21a8">Stateless validation</text>
  <!-- Refresh Token -->
  <rect x="60" y="339" width="360" height="30" rx="5" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="359" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#334155">Refresh Token (opaque)</text>
  <rect x="60" y="376" width="180" height="25" rx="4" fill="#f3e8ff"/>
  <text x="150" y="393" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b21a8">Lifetime: 7-90 days</text>
  <rect x="240" y="376" width="180" height="25" rx="4" fill="#f3e8ff"/>
  <text x="330" y="393" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b21a8">Stored in session store</text>
  <!-- Session Cookie -->
  <rect x="60" y="408" width="360" height="30" rx="5" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="428" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#334155">Session Cookie (server-side)</text>
  <rect x="60" y="445" width="180" height="25" rx="4" fill="#f3e8ff"/>
  <text x="150" y="462" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b21a8">Lifetime: configurable</text>
  <rect x="240" y="445" width="180" height="25" rx="4" fill="#f3e8ff"/>
  <text x="330" y="462" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b21a8">Requires server lookup</text>
  <!-- Revocation patterns -->
  <rect x="460" y="220" width="400" height="265" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">Revocation Scenarios</text>
  <rect x="480" y="270" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="660" y="287" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Explicit logout: invalidate session immediately</text>
  <rect x="480" y="302" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="660" y="319" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Password change: invalidate all sessions for user</text>
  <rect x="480" y="334" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="660" y="351" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Security breach: force-logout all sessions globally</text>
  <rect x="480" y="366" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="660" y="383" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Session timeout: automatic expiry after inactivity</text>
  <rect x="480" y="398" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="660" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Concurrent session limit: oldest session evicted</text>
  <rect x="480" y="430" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="660" y="447" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Device change: suspicious location triggers re-auth</text>
  <rect x="480" y="462" width="360" height="15" rx="3" fill="#fef2f2"/>
  <text x="660" y="473" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#991b1b">Revocation must propagate to all service nodes within seconds</text>
</svg>