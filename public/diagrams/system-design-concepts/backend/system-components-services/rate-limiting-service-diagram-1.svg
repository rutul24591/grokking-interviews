<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Rate Limiting Service Architecture</title>
  <desc id="desc">Rate limiting architecture at gateway and service layers with a policy store and counters</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Rate Limiting Service Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Gateway and service layers with policy store and counters</text>
  
  <!-- Incoming Requests -->
  <rect x="30" y="85" width="150" height="180" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="105" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Requests</text>
  
  <rect x="50" y="125" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="148" text-anchor="middle" font-size="9" fill="#64748b">API Calls</text>
  
  <rect x="50" y="165" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="188" text-anchor="middle" font-size="9" fill="#64748b">Web Traffic</text>
  
  <rect x="50" y="205" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="228" text-anchor="middle" font-size="9" fill="#64748b">Webhooks</text>
  
  <!-- Request Flow -->
  <line x1="185" y1="175" x2="235" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="210" y="165" text-anchor="middle" font-size="9" fill="#64748b">Incoming</text>
  
  <!-- API Gateway -->
  <rect x="235" y="85" width="200" height="180" rx="8" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="335" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">API Gateway</text>
  
  <rect x="255" y="125" width="160" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="335" y="150" text-anchor="middle" font-size="9" fill="#64748b">Edge Rate Limiting</text>
  
  <rect x="255" y="175" width="160" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="335" y="200" text-anchor="middle" font-size="9" fill="#64748b">IP-based Limits</text>
  
  <rect x="255" y="225" width="160" height="30" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="335" y="245" text-anchor="middle" font-size="9" fill="#64748b">Global DDoS Protection</text>
  
  <!-- Rate Limit Check -->
  <line x1="440" y1="175" x2="490" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="465" y="165" text-anchor="middle" font-size="9" fill="#64748b">Check Limit</text>
  
  <!-- Rate Limiting Service -->
  <rect x="490" y="85" width="200" height="180" rx="8" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
  <text x="590" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Rate Limiter</text>
  
  <rect x="510" y="125" width="160" height="40" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="590" y="150" text-anchor="middle" font-size="9" fill="#64748b">Counter Store</text>
  
  <rect x="510" y="175" width="160" height="40" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="590" y="200" text-anchor="middle" font-size="9" fill="#64748b">Policy Lookup</text>
  
  <rect x="510" y="225" width="160" height="30" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="590" y="245" text-anchor="middle" font-size="9" fill="#64748b">Allow/Deny Decision</text>
  
  <!-- Decision Flow -->
  <line x1="695" y1="175" x2="745" y2="175" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="720" y="165" text-anchor="middle" font-size="9" fill="#10b981">Allow</text>
  
  <line x1="695" y1="215" x2="745" y2="215" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
  <text x="720" y="205" text-anchor="middle" font-size="9" fill="#ef4444">Deny (429)</text>
  
  <!-- Backend Services -->
  <rect x="745" y="85" width="125" height="180" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="807" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Backend</text>
  
  <rect x="765" y="125" width="85" height="40" rx="3" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="807" y="150" text-anchor="middle" font-size="8" fill="#64748b">Service A</text>
  
  <rect x="765" y="175" width="85" height="40" rx="3" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="807" y="200" text-anchor="middle" font-size="8" fill="#64748b">Service B</text>
  
  <rect x="765" y="225" width="85" height="30" rx="3" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="807" y="245" text-anchor="middle" font-size="8" fill="#64748b">Service C</text>
  
  <!-- Policy Store -->
  <rect x="30" y="280" width="280" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="170" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Policy Store</text>
  
  <rect x="50" y="320" width="240" height="110" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="345" text-anchor="middle" font-size="9" fill="#64748b">Rate Limit Policies</text>
  <text x="170" y="360" text-anchor="middle" font-size="9" fill="#64748b">Per-User Limits</text>
  <text x="170" y="375" text-anchor="middle" font-size="9" fill="#64748b">Per-Tenant Quotas</text>
  <text x="170" y="390" text-anchor="middle" font-size="9" fill="#64748b">Endpoint-specific</text>
  <text x="170" y="405" text-anchor="middle" font-size="9" fill="#64748b">Burst Allowances</text>
  
  <!-- Counter Store -->
  <rect x="330" y="280" width="280" height="160" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="470" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Counter Store</text>
  
  <rect x="350" y="320" width="240" height="110" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="470" y="345" text-anchor="middle" font-size="9" fill="#64748b">Redis/Memcached</text>
  <text x="470" y="360" text-anchor="middle" font-size="9" fill="#64748b">Key: user_id:endpoint</text>
  <text x="470" y="375" text-anchor="middle" font-size="9" fill="#64748b">Value: count, timestamp</text>
  <text x="470" y="390" text-anchor="middle" font-size="9" fill="#64748b">TTL: window duration</text>
  <text x="470" y="405" text-anchor="middle" font-size="9" fill="#64748b">Atomic increment</text>
  
  <!-- Headers -->
  <rect x="630" y="435" width="240" height="95" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="750" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Response Headers</text>
  
  <rect x="650" y="470" width="200" height="50" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="750" y="495" text-anchor="middle" font-size="9" fill="#64748b">X-RateLimit-Limit</text>
  <text x="750" y="510" text-anchor="middle" font-size="8" fill="#fcd34d">X-RateLimit-Remaining</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
