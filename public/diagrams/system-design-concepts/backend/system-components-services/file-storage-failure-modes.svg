<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">File Storage Service &#8212; Failure Modes &#38; Resilience</text>

  <!-- Failure Mode 1: Upload Interruption -->
  <rect x="30" y="65" width="270" height="130" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 1: Upload Interruption</text>

  <rect x="45" y="110" width="240" height="30" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="165" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Network drops mid-upload, client crash</text>

  <rect x="45" y="148" width="115" height="32" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="102" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Mitigation:</text>
  <text x="102" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Resume from last part</text>

  <rect x="170" y="148" width="115" height="32" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="227" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9a3412">Risk:</text>
  <text x="227" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Orphaned parts</text>

  <!-- Failure Mode 2: Storage Unavailable -->
  <rect x="330" y="65" width="270" height="130" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 2: Storage Zone Outage</text>

  <rect x="345" y="110" width="240" height="30" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="465" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">AZ failure makes objects temporarily unavailable</text>

  <rect x="345" y="148" width="115" height="32" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="402" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Mitigation:</text>
  <text x="402" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Cross-AZ replication</text>

  <rect x="470" y="148" width="115" height="32" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="527" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9a3412">Risk:</text>
  <text x="527" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Replication lag</text>

  <!-- Failure Mode 3: CDN Miss Storm -->
  <rect x="630" y="65" width="240" height="130" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 3: CDN Cache Invalidation Storm</text>

  <rect x="645" y="110" width="210" height="30" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="750" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Massive invalidation floods origin</text>

  <rect x="645" y="148" width="100" height="32" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="695" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Mitigation:</text>
  <text x="695" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Stagger invalidation</text>

  <rect x="755" y="148" width="100" height="32" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="805" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9a3412">Risk:</text>
  <text x="805" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Origin overload</text>

  <!-- Recovery Patterns -->
  <rect x="30" y="225" width="420" height="150" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">Recovery: Multipart Abort &#38; Cleanup</text>

  <rect x="50" y="275" width="380" height="35" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Incomplete multipart uploads are automatically aborted after configurable TTL (7 days)</text>

  <rect x="50" y="320" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Lifecycle policy deletes</text>
  <text x="140" y="353" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">orphaned parts automatically</text>

  <rect x="250" y="320" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Storage cost recovery</text>
  <text x="340" y="353" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">for incomplete uploads</text>

  <!-- Data Integrity -->
  <rect x="480" y="225" width="390" height="150" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Data Integrity: Checksums &#38; Versioning</text>

  <rect x="495" y="275" width="360" height="35" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="675" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Every object stored with SHA-256 checksum, verified on read</text>

  <rect x="495" y="320" width="170" height="40" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="580" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Object Versioning</text>
  <text x="580" y="353" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">retain all versions</text>

  <rect x="685" y="320" width="170" height="40" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="770" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">WORM Compliance</text>
  <text x="770" y="353" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">object lock for retention</text>

  <!-- Circuit Breaker for Downloads -->
  <rect x="30" y="405" width="420" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Circuit Breaker for Download Requests</text>

  <rect x="50" y="450" width="380" height="25" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="240" y="467" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">When origin error rate &#62; 5%, circuit opens and serves stale CDN cache</text>

  <rect x="50" y="483" width="180" height="22" rx="4" fill="#fefce8" stroke="#f59e0b" stroke-width="1"/>
  <text x="140" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Closed &#8594; Half-Open &#8594; Open</text>

  <rect x="250" y="483" width="180" height="22" rx="4" fill="#fefce8" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Recovery probe every 30s</text>

  <!-- Key Metrics -->
  <rect x="480" y="405" width="390" height="110" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#155e75">Durability &#38; Availability SLAs</text>

  <rect x="495" y="450" width="170" height="50" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="580" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#155e75">Durability</text>
  <text x="580" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">99.999999999% (11x9s)</text>

  <rect x="685" y="450" width="170" height="50" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="770" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#155e75">Availability</text>
  <text x="770" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">99.99% (4x9s)</text>

  <!-- Summary -->
  <rect x="30" y="520" width="840" height="25" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="120" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">Key Resilience:</text>
  <text x="230" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Multipart resume on network failure</text>
  <text x="460" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Cross-AZ replication for durability</text>
  <text x="680" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">CDN circuit breaker for origin protection</text>
</svg>