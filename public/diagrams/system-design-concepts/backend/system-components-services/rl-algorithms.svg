<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Rate Limiting Algorithms Comparison</text>
  <!-- Token Bucket -->
  <rect x="40" y="70" width="260" height="200" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1e40af">Token Bucket</text>
  <rect x="60" y="115" width="220" height="30" rx="5" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="170" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Bucket fills at fixed rate (tokens/sec)</text>
  <rect x="60" y="152" width="220" height="30" rx="5" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="170" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Each request consumes 1 token</text>
  <rect x="60" y="189" width="220" height="30" rx="5" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="170" y="209" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Bucket capacity limits burst size</text>
  <rect x="60" y="226" width="220" height="30" rx="5" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="170" y="246" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">No token = request rejected or queued</text>
  <!-- Sliding Window -->
  <rect x="320" y="70" width="260" height="200" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">Sliding Window Log</text>
  <rect x="340" y="115" width="220" height="30" rx="5" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Timestamp log of all requests</text>
  <rect x="340" y="152" width="220" height="30" rx="5" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="450" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Count requests in sliding time window</text>
  <rect x="340" y="189" width="220" height="30" rx="5" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="450" y="209" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Reject if count exceeds limit</text>
  <rect x="340" y="226" width="220" height="30" rx="5" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="450" y="246" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Accurate but memory-intensive</text>
  <!-- Leaky Bucket -->
  <rect x="600" y="70" width="260" height="200" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="730" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a16207">Leaky Bucket</text>
  <rect x="620" y="115" width="220" height="30" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="730" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Queue buffers incoming requests</text>
  <rect x="620" y="152" width="220" height="30" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="730" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Requests processed at fixed rate</text>
  <rect x="620" y="189" width="220" height="30" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="730" y="209" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Queue full = request rejected</text>
  <rect x="620" y="226" width="220" height="30" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="730" y="246" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Smooths traffic to constant rate</text>
  <!-- Fixed Window Counter -->
  <rect x="40" y="300" width="400" height="185" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="240" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Fixed Window Counter</text>
  <rect x="60" y="350" width="360" height="30" rx="5" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Divide time into fixed windows (e.g., 1-minute slots)</text>
  <rect x="60" y="387" width="360" height="30" rx="5" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Count requests per window, reset at window boundary</text>
  <rect x="60" y="424" width="360" height="30" rx="5" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="444" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Simple but allows 2x burst at window boundaries</text>
  <rect x="60" y="461" width="360" height="15" rx="3" fill="#faf5ff"/>
  <text x="240" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b21a8">Best for: simple use cases, low-accuracy requirements</text>
  <!-- Comparison summary -->
  <rect x="460" y="300" width="400" height="185" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="660" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Algorithm Selection Guide</text>
  <rect x="480" y="350" width="360" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="367" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Token Bucket: burst tolerance + smooth average &#8594; API gateways</text>
  <rect x="480" y="382" width="360" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="399" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Sliding Window: accuracy critical &#8594; billing, quotas</text>
  <rect x="480" y="414" width="360" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="431" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Leaky Bucket: traffic smoothing &#8594; downstream protection</text>
  <rect x="480" y="446" width="360" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="463" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Fixed Window: simplicity &#8594; basic abuse prevention</text>
</svg>