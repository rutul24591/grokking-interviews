<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Notification Service Architecture</title>
  <desc id="desc">Notification service architecture showing event triggers, routing, templates, provider integrations, and delivery tracking</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Notification Service Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Event triggers, routing, templates, provider integrations, and delivery tracking</text>
  
  <!-- Event Sources -->
  <rect x="30" y="85" width="180" height="180" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="120" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Event Sources</text>
  
  <rect x="50" y="125" width="140" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="120" y="148" text-anchor="middle" font-size="9" fill="#64748b">User Actions</text>
  
  <rect x="50" y="165" width="140" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="120" y="188" text-anchor="middle" font-size="9" fill="#64748b">System Events</text>
  
  <rect x="50" y="205" width="140" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="120" y="228" text-anchor="middle" font-size="9" fill="#64748b">Scheduled</text>
  
  <!-- Event Flow -->
  <line x1="215" y1="175" x2="265" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="240" y="165" text-anchor="middle" font-size="9" fill="#64748b">Trigger</text>
  
  <!-- Notification Service -->
  <rect x="265" y="85" width="300" height="180" rx="8" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="415" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Notification Service</text>
  
  <rect x="285" y="125" width="260" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="415" y="150" text-anchor="middle" font-size="9" fill="#64748b">Template Engine + Localization</text>
  
  <rect x="285" y="175" width="120" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="345" y="200" text-anchor="middle" font-size="9" fill="#64748b">Preference Check</text>
  
  <rect x="415" y="175" width="130" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="480" y="200" text-anchor="middle" font-size="9" fill="#64748b">Channel Routing</text>
  
  <!-- Provider Integration -->
  <line x1="570" y1="175" x2="620" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="595" y="165" text-anchor="middle" font-size="9" fill="#64748b">Route</text>
  
  <rect x="620" y="85" width="250" height="180" rx="8" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Providers</text>
  
  <rect x="640" y="125" width="210" height="35" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="745" y="148" text-anchor="middle" font-size="9" fill="#64748b">Email (SendGrid/SES)</text>
  
  <rect x="640" y="165" width="210" height="35" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="745" y="188" text-anchor="middle" font-size="9" fill="#64748b">SMS (Twilio)</text>
  
  <rect x="640" y="205" width="210" height="35" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="745" y="228" text-anchor="middle" font-size="9" fill="#64748b">Push (FCM/APNs)</text>
  
  <!-- Delivery Tracking -->
  <line x1="745" y1="265" x2="745" y2="315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-down)"/>
  
  <rect x="620" y="320" width="250" height="100" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="745" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Delivery Tracking</text>
  
  <rect x="640" y="355" width="210" height="55" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="745" y="380" text-anchor="middle" font-size="9" fill="#64748b">Delivery Status</text>
  <text x="745" y="395" text-anchor="middle" font-size="8" fill="#6ee7b7">Sent/Delivered/Failed</text>
  
  <!-- User Preferences -->
  <rect x="30" y="280" width="280" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="170" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">User Preferences</text>
  
  <rect x="50" y="320" width="240" height="110" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="345" text-anchor="middle" font-size="9" fill="#64748b">Channel Opt-ins</text>
  <text x="170" y="360" text-anchor="middle" font-size="9" fill="#64748b">Frequency Caps</text>
  <text x="170" y="375" text-anchor="middle" font-size="9" fill="#64748b">Quiet Hours</text>
  <text x="170" y="390" text-anchor="middle" font-size="9" fill="#64748b">Notification Types</text>
  <text x="170" y="405" text-anchor="middle" font-size="9" fill="#64748b">Unsubscribe Lists</text>
  
  <!-- Templates -->
  <rect x="330" y="280" width="280" height="160" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="470" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Templates</text>
  
  <rect x="350" y="320" width="240" height="110" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="470" y="345" text-anchor="middle" font-size="9" fill="#64748b">Multi-channel Templates</text>
  <text x="470" y="360" text-anchor="middle" font-size="9" fill="#64748b">Variable Substitution</text>
  <text x="470" y="375" text-anchor="middle" font-size="9" fill="#64748b">Localization (i18n)</text>
  <text x="470" y="390" text-anchor="middle" font-size="9" fill="#64748b">Version Control</text>
  <text x="470" y="405" text-anchor="middle" font-size="9" fill="#64748b">A/B Test Variants</text>
  
  <!-- Retry Logic -->
  <rect x="630" y="435" width="240" height="95" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="750" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Retry Logic</text>
  
  <rect x="650" y="470" width="200" height="50" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="750" y="495" text-anchor="middle" font-size="9" fill="#64748b">Exponential Backoff</text>
  <text x="750" y="510" text-anchor="middle" font-size="8" fill="#fcd34d">Max 3 retries</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
