<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <rect width="900" height="550" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">A/B Testing Service Architecture</text>

  <!-- Client Side -->
  <rect x="40" y="70" width="380" height="130" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="230" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e40af">Client Application</text>
  <rect x="60" y="115" width="340" height="35" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="230" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Request assignment: { experiment_id, user_id }</text>
  <rect x="60" y="160" width="340" height="35" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="230" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Render variant, log exposure event</text>

  <!-- Assignment Service -->
  <rect x="460" y="70" width="400" height="130" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#166534">Assignment Service</text>
  <rect x="480" y="115" width="360" height="35" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Deterministic hash: bucket(user_id + experiment_key)</text>
  <rect x="480" y="160" width="360" height="35" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Apply eligibility filters: region, device, tier</text>

  <!-- Arrows between client and assignment -->
  <line x1="420" y1="120" x2="460" y2="120" stroke="#64748b" stroke-width="2"/>
  <polygon points="460,115 470,120 460,125" fill="#64748b"/>
  <line x1="460" y1="160" x2="420" y2="160" stroke="#64748b" stroke-width="2"/>
  <polygon points="420,155 410,160 420,165" fill="#64748b"/>

  <!-- Event Ingestion -->
  <rect x="40" y="230" width="400" height="130" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="240" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#a16207">Event Ingestion Pipeline</text>
  <rect x="60" y="275" width="360" height="35" rx="6" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="240" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Receive exposure events from clients</text>
  <rect x="60" y="320" width="360" height="35" rx="6" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="240" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Deduplicate, validate, enqueue for processing</text>

  <!-- Metrics Computation -->
  <rect x="460" y="230" width="400" height="130" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#6b21a8">Metrics Computation Engine</text>
  <rect x="480" y="275" width="360" height="35" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Join exposure events with outcome events</text>
  <rect x="480" y="320" width="360" height="35" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Compute primary, secondary, guardrail metrics</text>

  <!-- Arrows between ingestion and metrics -->
  <line x1="440" y1="295" x2="460" y2="295" stroke="#64748b" stroke-width="2"/>
  <polygon points="460,290 470,295 460,300" fill="#64748b"/>

  <!-- Results Dashboard -->
  <rect x="40" y="390" width="820" height="70" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="450" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0c4a6e">Results Dashboard: Statistical significance, effect size, confidence intervals, guardrail status</text>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Primary: conversion rate &#8212; Guardrails: error rate, latency, cost &#8212; Decision: ship / iterate / rollback</text>

  <!-- Key principle -->
  <rect x="40" y="480" width="820" height="55" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Assignment is what the system intended. Exposure is what the user actually saw. They must be tracked separately.</text>
</svg>
