<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="55" fill="#f9fafb" rx="0"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#111827">Authorization Policy Models: RBAC, ABAC &amp; ReBAC</text>

  <!-- RBAC Column -->
  <rect x="30" y="80" width="270" height="440" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="165" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#3730a3">RBAC (Role-Based)</text>
  <text x="165" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Identity &#8594; Role &#8594; Permissions</text>

  <!-- RBAC Example -->
  <rect x="55" y="150" width="220" height="55" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1"/>
  <text x="165" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3730a3">User: alice</text>
  <text x="165" y="188" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Role: org-admin</text>
  <text x="165" y="203" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Perms: read, write, delete, admin</text>

  <rect x="55" y="215" width="220" height="55" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1"/>
  <text x="165" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3730a3">User: bob</text>
  <text x="165" y="253" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Role: viewer</text>
  <text x="165" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Perms: read</text>

  <rect x="55" y="285" width="220" height="60" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="165" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#374151">Strengths</text>
  <text x="165" y="323" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Simple admin UX, easy audit,</text>
  <text x="165" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">fast evaluation (role lookup)</text>

  <rect x="55" y="355" width="220" height="70" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="165" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#374151">Limitations</text>
  <text x="165" y="393" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Role explosion, no context,</text>
  <text x="165" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">cannot express &quot;own resources&quot;</text>
  <text x="165" y="423" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">or time/environment constraints</text>

  <!-- ABAC Column -->
  <rect x="320" y="80" width="270" height="440" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="455" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#166534">ABAC (Attribute-Based)</text>
  <text x="455" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Subject + Resource + Env &#8594; Policy</text>

  <rect x="345" y="150" width="220" height="75" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="455" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#166534">Policy Rule</text>
  <text x="455" y="188" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">IF user.tenant == resource.tenant</text>
  <text x="455" y="203" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">AND user.device_posture == &quot;trusted&quot;</text>
  <text x="455" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">AND resource.classification != &quot;secret&quot;</text>

  <rect x="345" y="235" width="220" height="55" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="455" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#166534">Attributes Used</text>
  <text x="455" y="273" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Tenant, device, time, IP,</text>
  <text x="455" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">data classification, location</text>

  <rect x="345" y="300" width="220" height="60" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="455" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#374151">Strengths</text>
  <text x="455" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Fine-grained, context-aware,</text>
  <text x="455" y="353" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">no role explosion, zero-trust ready</text>

  <rect x="345" y="370" width="220" height="70" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="455" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#374151">Limitations</text>
  <text x="455" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Complex to reason about, hard</text>
  <text x="455" y="423" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">to test all attribute combinations</text>
  <text x="455" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Slower evaluation, more data deps</text>

  <!-- ReBAC Column -->
  <rect x="610" y="80" width="270" height="440" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="745" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#78350f">ReBAC (Relationship-Based)</text>
  <text x="745" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Subject &#8594; Edge &#8594; Resource</text>

  <!-- Graph Example -->
  <rect x="635" y="150" width="220" height="110" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <!-- Nodes -->
  <circle cx="680" cy="190" r="20" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="680" y="194" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#5b21b6">alice</text>
  <circle cx="780" cy="190" r="20" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="780" y="194" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#166534">org-X</text>
  <circle cx="730" cy="240" r="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="730" y="244" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#78350f">doc-1</text>
  <!-- Edges -->
  <line x1="698" y1="185" x2="762" y2="185" stroke="#6b7280" stroke-width="1.5"/>
  <text x="730" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="400" fill="#6b7280">member</text>
  <line x1="765" y1="205" x2="745" y2="225" stroke="#6b7280" stroke-width="1.5"/>
  <text x="768" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="400" fill="#6b7280">owns</text>
  <text x="735" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#374151">Graph Query</text>

  <rect x="635" y="275" width="220" height="55" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="745" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#78350f">Access Check</text>
  <text x="745" y="313" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Can alice read doc-1?</text>
  <text x="745" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">alice &#8594; member org-X &#8594; owns doc-1</text>

  <rect x="635" y="340" width="220" height="60" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="745" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#374151">Strengths</text>
  <text x="745" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Natural for sharing/collaboration,</text>
  <text x="745" y="393" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Google Drive, GitHub-style perms</text>

  <rect x="635" y="410" width="220" height="70" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="745" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#374151">Limitations</text>
  <text x="745" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Graph traversal at scale, complex</text>
  <text x="745" y="463" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">caching strategies needed, Zanzibar-</text>
  <text x="745" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">style systems require heavy infra</text>

  <!-- Bottom Summary -->
  <rect x="30" y="530" width="850" height="1" fill="#e5e7eb"/>
</svg>