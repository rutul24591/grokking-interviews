<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Rate Limiting Control Points</title>
  <desc id="desc">Rate limiting control points showing local caches, centralized counters, sharding, and consistency trade-offs</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Rate Limiting Control Points</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Local caches, centralized counters, sharding, and consistency trade-offs</text>
  
  <!-- Algorithm Comparison -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">Rate Limit Algorithms</text>
  
  <rect x="50" y="125" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <rect x="60" y="140" width="180" height="30" rx="2" fill="#3b82f6"/>
  <text x="150" y="160" text-anchor="middle" font-size="8" fill="white">Token Bucket (burst allowed)</text>
  
  <rect x="60" y="175" width="180" height="30" rx="2" fill="#10b981"/>
  <text x="150" y="195" text-anchor="middle" font-size="8" fill="white">Leaky Bucket (smooth flow)</text>
  
  <rect x="50" y="235" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <rect x="60" y="250" width="180" height="30" rx="2" fill="#f59e0b"/>
  <text x="150" y="270" text-anchor="middle" font-size="8" fill="white">Sliding Window (accurate)</text>
  
  <rect x="60" y="285" width="180" height="30" rx="2" fill="#8b5cf6"/>
  <text x="150" y="305" text-anchor="middle" font-size="8" fill="white">Fixed Window (simple)</text>
  
  <!-- Distributed Enforcement -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">Distributed Enforcement</text>
  
  <rect x="335" y="125" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="#64748b">Local + Central Hybrid</text>
  
  <rect x="345" y="160" width="210" height="30" rx="2" fill="#10b981"/>
  <text x="450" y="180" text-anchor="middle" font-size="8" fill="white">Local Cache (fast)</text>
  
  <rect x="345" y="195" width="210" height="30" rx="2" fill="#3b82f6"/>
  <text x="450" y="215" text-anchor="middle" font-size="8" fill="white">Central Counter (accurate)</text>
  
  <rect x="335" y="235" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" font-size="10" fill="#64748b">Sync Strategy</text>
  
  <text x="355" y="285" text-anchor="start" font-size="9" fill="#64748b">- Async counter sync</text>
  <text x="355" y="300" text-anchor="start" font-size="9" fill="#64748b">- Periodic flush</text>
  <text x="355" y="315" text-anchor="start" font-size="9" fill="#64748b">- Accept overshoot</text>
  
  <!-- Sharding -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Counter Sharding</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="735" y="150" text-anchor="middle" font-size="10" fill="#64748b">Shard by Key</text>
  
  <rect x="630" y="160" width="210" height="30" rx="2" fill="#f59e0b"/>
  <text x="735" y="180" text-anchor="middle" font-size="8" fill="white">user_id % N shards</text>
  
  <rect x="630" y="195" width="210" height="30" rx="2" fill="#3b82f6"/>
  <text x="735" y="215" text-anchor="middle" font-size="8" fill="white">tenant_id % N shards</text>
  
  <rect x="620" y="235" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="260" text-anchor="middle" font-size="10" fill="#64748b">Benefits</text>
  
  <text x="640" y="285" text-anchor="start" font-size="9" fill="#64748b">- Horizontal scale</text>
  <text x="640" y="300" text-anchor="start" font-size="9" fill="#64748b">- Reduced contention</text>
  <text x="640" y="315" text-anchor="start" font-size="9" fill="#64748b">- Hot key isolation</text>
  
  <!-- Consistency Trade-offs -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Consistency Trade-offs</text>
  
  <rect x="50" y="360" width="360" height="160" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  
  <rect x="70" y="380" width="150" height="50" rx="4" fill="#10b981"/>
  <text x="145" y="405" text-anchor="middle" font-size="9" fill="white">Strong Consistency</text>
  <text x="145" y="420" text-anchor="middle" font-size="8" fill="#6ee7b7">Exact limits</text>
  
  <rect x="240" y="380" width="150" height="50" rx="4" fill="#f59e0b"/>
  <text x="315" y="405" text-anchor="middle" font-size="9" fill="white">Eventual Consistency</text>
  <text x="315" y="420" text-anchor="middle" font-size="8" fill="#fcd34d">Overshoot OK</text>
  
  <text x="230" y="460" text-anchor="middle" font-size="9" fill="#64748b">Choose based on use case</text>
  
  <text x="70" y="490" text-anchor="start" font-size="9" fill="#64748b">- Strong: Payment, auth</text>
  <text x="70" y="505" text-anchor="start" font-size="9" fill="#64748b">- Eventual: API rate limits</text>
  <text x="230" y="490" text-anchor="start" font-size="9" fill="#64748b">- Strong: Quota enforcement</text>
  <text x="230" y="505" text-anchor="start" font-size="9" fill="#64748b">- Eventual: DDoS protection</text>
  
  <!-- Fallback Behavior -->
  <rect x="470" y="320" width="400" height="210" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Fallback Behavior</text>
  
  <rect x="490" y="360" width="360" height="160" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
  
  <rect x="500" y="380" width="150" height="50" rx="4" fill="#10b981"/>
  <text x="575" y="405" text-anchor="middle" font-size="9" fill="white">Fail-Open</text>
  <text x="575" y="420" text-anchor="middle" font-size="8" fill="#6ee7b7">Allow if unsure</text>
  
  <rect x="670" y="380" width="160" height="50" rx="4" fill="#ef4444"/>
  <text x="750" y="405" text-anchor="middle" font-size="9" fill="white">Fail-Closed</text>
  <text x="750" y="420" text-anchor="middle" font-size="8" fill="#fca5a5">Deny if unsure</text>
  
  <text x="670" y="460" text-anchor="middle" font-size="9" fill="#64748b">Choose based on risk tolerance</text>
  
  <text x="510" y="490" text-anchor="start" font-size="9" fill="#64748b">- Fail-open: Availability focus</text>
  <text x="510" y="505" text-anchor="start" font-size="9" fill="#64748b">- Fail-closed: Security focus</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
