<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Payment Control Points</title>
  <desc id="desc">Payment control points showing idempotency keys, webhook processing, reconciliation, and anti-fraud checks</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Payment Control Points</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Idempotency keys, webhook processing, reconciliation, and anti-fraud checks</text>
  
  <!-- Idempotency Keys -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">Idempotency Keys</text>
  
  <rect x="50" y="125" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="150" y="150" text-anchor="middle" font-size="10" fill="#64748b">Key Generation</text>
  
  <rect x="60" y="160" width="180" height="30" rx="2" fill="#3b82f6"/>
  <text x="150" y="180" text-anchor="middle" font-size="8" fill="white">order_id + user_id + nonce</text>
  
  <rect x="60" y="195" width="180" height="30" rx="2" fill="#10b981"/>
  <text x="150" y="215" text-anchor="middle" font-size="8" fill="white">Store with request</text>
  
  <rect x="50" y="235" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="150" y="260" text-anchor="middle" font-size="10" fill="#64748b">Dedup Logic</text>
  
  <text x="70" y="285" text-anchor="start" font-size="9" fill="#64748b">- Check key exists</text>
  <text x="70" y="300" text-anchor="start" font-size="9" fill="#64748b">- Return cached response</text>
  <text x="70" y="315" text-anchor="start" font-size="9" fill="#64748b">- Prevents double-charge</text>
  
  <!-- Webhook Processing -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">Webhook Processing</text>
  
  <rect x="335" y="125" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="#64748b">Webhook Handling</text>
  
  <rect x="345" y="160" width="210" height="30" rx="2" fill="#10b981"/>
  <text x="450" y="180" text-anchor="middle" font-size="8" fill="white">Verify Signature</text>
  
  <rect x="345" y="195" width="210" height="30" rx="2" fill="#3b82f6"/>
  <text x="450" y="215" text-anchor="middle" font-size="8" fill="white">Idempotent Processing</text>
  
  <rect x="335" y="235" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" font-size="10" fill="#64748b">Event Types</text>
  
  <text x="355" y="285" text-anchor="start" font-size="9" fill="#64748b">- payment.succeeded</text>
  <text x="355" y="300" text-anchor="start" font-size="9" fill="#64748b">- payment.failed</text>
  <text x="355" y="315" text-anchor="start" font-size="9" fill="#64748b">- refund.completed</text>
  
  <!-- Fraud Detection -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Fraud Detection</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="735" y="150" text-anchor="middle" font-size="10" fill="#64748b">Risk Signals</text>
  
  <rect x="630" y="160" width="210" height="30" rx="2" fill="#f59e0b"/>
  <text x="735" y="180" text-anchor="middle" font-size="8" fill="white">Velocity Checks</text>
  
  <rect x="630" y="195" width="210" height="30" rx="2" fill="#ef4444"/>
  <text x="735" y="215" text-anchor="middle" font-size="8" fill="white">AVS/CVV Mismatch</text>
  
  <rect x="620" y="235" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="260" text-anchor="middle" font-size="10" fill="#64748b">Actions</text>
  
  <text x="640" y="285" text-anchor="start" font-size="9" fill="#64748b">- Allow (low risk)</text>
  <text x="640" y="300" text-anchor="start" font-size="9" fill="#64748b">- Review (medium risk)</text>
  <text x="640" y="315" text-anchor="start" font-size="9" fill="#64748b">- Block (high risk)</text>
  
  <!-- State Machine -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Payment State Machine</text>
  
  <rect x="50" y="360" width="360" height="160" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  
  <rect x="70" y="380" width="150" height="50" rx="4" fill="#3b82f6"/>
  <text x="145" y="405" text-anchor="middle" font-size="9" fill="white">Created</text>
  <text x="145" y="420" text-anchor="middle" font-size="8" fill="#bfdbfe">Initial state</text>
  
  <line x1="225" y1="405" x2="255" y2="405" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="265" y="380" width="130" height="50" rx="4" fill="#10b981"/>
  <text x="330" y="405" text-anchor="middle" font-size="9" fill="white">Authorized</text>
  
  <line x1="330" y1="435" x2="330" y2="465" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <rect x="265" y="470" width="130" height="40" rx="4" fill="#f59e0b"/>
  <text x="330" y="493" text-anchor="middle" font-size="8" fill="white">Captured</text>
  
  <text x="230" y="530" text-anchor="middle" font-size="9" fill="#64748b">Explicit transitions, no skipping</text>
  
  <!-- Reconciliation -->
  <rect x="470" y="320" width="400" height="210" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Reconciliation</text>
  
  <rect x="490" y="360" width="360" height="160" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
  
  <rect x="500" y="380" width="150" height="50" rx="4" fill="#f59e0b"/>
  <text x="575" y="405" text-anchor="middle" font-size="9" fill="white">Provider Report</text>
  <text x="575" y="420" text-anchor="middle" font-size="8" fill="#fcd34d">Daily CSV</text>
  
  <line x1="655" y1="405" x2="685" y2="405" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="695" y="380" width="140" height="50" rx="4" fill="#3b82f6"/>
  <text x="765" y="405" text-anchor="middle" font-size="9" fill="white">Internal Ledger</text>
  <text x="765" y="420" text-anchor="middle" font-size="8" fill="#bfdbfe">Our records</text>
  
  <line x1="765" y1="435" x2="765" y2="465" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <rect x="695" y="470" width="140" height="40" rx="4" fill="#ef4444"/>
  <text x="765" y="493" text-anchor="middle" font-size="8" fill="white">Discrepancies</text>
  
  <text x="575" y="530" text-anchor="middle" font-size="9" fill="#64748b">Catch provider mismatches</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
