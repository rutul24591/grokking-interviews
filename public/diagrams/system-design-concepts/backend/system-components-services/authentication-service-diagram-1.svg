<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Authentication Service Architecture</title>
  <desc id="desc">Authentication service architecture showing identity store, MFA, token issuance, and downstream validation</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Authentication Service Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Identity store, MFA, token issuance, and downstream validation</text>
  
  <!-- User/Client -->
  <rect x="30" y="85" width="150" height="180" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="105" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">User/Client</text>
  
  <rect x="50" y="125" width="110" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="105" y="148" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Web Browser</text>
  
  <rect x="50" y="165" width="110" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="105" y="188" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Mobile App</text>
  
  <rect x="50" y="205" width="110" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="105" y="228" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">API Client</text>
  
  <!-- Auth Request Flow -->
  <line x1="185" y1="175" x2="235" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="210" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Login</text>
  
  <!-- Authentication Service -->
  <rect x="235" y="85" width="300" height="180" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="385" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Authentication Service</text>
  
  <rect x="255" y="125" width="260" height="40" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="385" y="150" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Credential Verification</text>
  
  <rect x="255" y="175" width="120" height="40" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="315" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">MFA/2FA</text>
  
  <rect x="385" y="175" width="130" height="40" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="450" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Token Issuance</text>
  
  <!-- Identity Store -->
  <line x1="385" y1="265" x2="385" y2="315" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow-down)"/>
  
  <rect x="235" y="320" width="300" height="100" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="385" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Identity Store</text>
  
  <rect x="255" y="355" width="130" height="55" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="320" y="380" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">User Database</text>
  <text x="320" y="395" text-anchor="middle" font-size="8" fill="#6ee7b7">Passwords (hashed)</text>
  
  <rect x="395" y="355" width="120" height="55" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="455" y="380" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">MFA Secrets</text>
  <text x="455" y="395" text-anchor="middle" font-size="8" fill="#6ee7b7">TOTP/WebAuthn</text>
  
  <!-- Token Flow -->
  <line x1="540" y1="175" x2="590" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="565" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">JWT/Session</text>
  
  <!-- Downstream Services -->
  <rect x="590" y="85" width="280" height="180" rx="8" fill="var(--bg-theme, #06b6d4)" stroke="var(--border-theme, #0891b2)" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Downstream Services</text>
  
  <rect x="610" y="125" width="240" height="40" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #06b6d4)" stroke-width="1"/>
  <text x="730" y="150" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">API Gateway (validates token)</text>
  
  <rect x="610" y="175" width="240" height="40" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #06b6d4)" stroke-width="1"/>
  <text x="730" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Backend Services (trust token)</text>
  
  <rect x="610" y="225" width="240" height="30" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #06b6d4)" stroke-width="1"/>
  <text x="730" y="245" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">No auth service call needed</text>
  
  <!-- Security Features -->
  <rect x="30" y="280" width="180" height="160" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="120" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Security Features</text>
  
  <rect x="50" y="320" width="140" height="110" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="120" y="345" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Rate limiting</text>
  <text x="120" y="360" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Brute force protection</text>
  <text x="120" y="375" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Account lockout</text>
  <text x="120" y="390" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Risk-based auth</text>
  <text x="120" y="405" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Audit logging</text>
  
  <!-- SSO/OAuth -->
  <rect x="235" y="435" width="300" height="95" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="385" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">SSO / OAuth Integration</text>
  
  <rect x="255" y="475" width="260" height="45" rx="4" fill="var(--bg-panel-soft, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="385" y="500" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Google, GitHub, Microsoft, Okta, SAML</text>
  
  <!-- Token Types -->
  <rect x="590" y="280" width="280" height="160" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="730" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Token Types</text>
  
  <rect x="610" y="320" width="240" height="40" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="730" y="345" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Access Token (short-lived)</text>
  <text x="730" y="358" text-anchor="middle" font-size="8" fill="#fcd34d">15 min - 1 hour</text>
  
  <rect x="610" y="370" width="240" height="40" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="730" y="395" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Refresh Token (long-lived)</text>
  <text x="730" y="408" text-anchor="middle" font-size="8" fill="#fcd34d">7 days - 1 year</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
