<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="55" fill="#f9fafb" rx="0"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#111827">Content Moderation Pipeline: Evidence to Decision</text>

  <!-- Step 1: Ingestion -->
  <rect x="30" y="80" width="190" height="90" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="125" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Step 1: Ingestion</text>
  <text x="125" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Content arrives via</text>
  <text x="125" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">event stream or sync API</text>
  <text x="125" y="164" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Metadata + content blob</text>

  <!-- Arrow -->
  <line x1="220" y1="125" x2="265" y2="125" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Signal Collection -->
  <rect x="270" y="80" width="190" height="90" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="365" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Step 2: Signal Collection</text>
  <text x="365" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Text: keyword matching, NER,</text>
  <text x="365" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">sentiment, toxicity scoring</text>
  <text x="365" y="164" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Image: hash matching, CLIP</text>

  <!-- Arrow -->
  <line x1="460" y1="125" x2="505" y2="125" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: ML Classification -->
  <rect x="510" y="80" width="190" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="605" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534">Step 3: ML Classification</text>
  <text x="605" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Multi-label classifier outputs</text>
  <text x="605" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">confidence per violation class:</text>
  <text x="605" y="164" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">spam: 0.92, hate: 0.15, nsfw: 0.03</text>

  <!-- Arrow -->
  <line x1="700" y1="125" x2="745" y2="125" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Policy Evaluation -->
  <rect x="750" y="80" width="130" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="815" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#78350f">Step 4: Policy</text>
  <text x="815" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Apply rules:</text>
  <text x="815" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">IF spam &gt; 0.9</text>
  <text x="815" y="164" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">THEN block</text>

  <!-- Decision Point -->
  <polygon points="450,240 550,280 450,320 350,280" fill="#eef2ff" stroke="#6366f1" stroke-width="2.5"/>
  <text x="450" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#3730a3">Confidence</text>

  <!-- Arrows from Step 4 to Decision -->
  <path d="M 815 170 Q 815 250 550 280" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- High Confidence Block -->
  <rect x="30" y="360" width="260" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="160" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#991b1b">High Confidence Violation (&gt;95%)</text>
  <text x="160" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Auto-block content, notify user</text>
  <text x="160" y="426" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Log decision with reason code + evidence</text>

  <!-- Medium Confidence -->
  <rect x="320" y="360" width="260" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#78350f">Medium Confidence (60-95%)</text>
  <text x="450" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Route to human review queue</text>
  <text x="450" y="426" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Prioritized by severity and SLA</text>

  <!-- Low Confidence -->
  <rect x="610" y="360" width="260" height="80" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="740" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534">Low Confidence (&lt;60%)</text>
  <text x="740" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Auto-allow content</text>
  <text x="740" y="426" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Flag for post-hoc review / user reports</text>

  <!-- Arrows from Decision Diamond -->
  <line x1="350" y1="280" x2="160" y2="355" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="200" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#dc2626">High violation</text>
  <line x1="450" y1="320" x2="450" y2="355" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="480" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#f59e0b">Medium</text>
  <line x1="550" y1="280" x2="740" y2="355" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="700" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#16a34a">Low violation</text>

  <!-- Pre-Publication vs Post-Publication -->
  <rect x="30" y="470" width="420" height="60" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="240" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#374151">Pre-Publication Moderation</text>
  <text x="240" y="515" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Content held until decision made. Safe but higher latency. Used for: new accounts, high-risk surfaces.</text>

  <rect x="470" y="470" width="400" height="60" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="670" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#374151">Post-Publication Moderation</text>
  <text x="670" y="515" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Content published immediately, async moderation. Lower latency but violation window. Used for: trusted users, comments.</text>
</svg>