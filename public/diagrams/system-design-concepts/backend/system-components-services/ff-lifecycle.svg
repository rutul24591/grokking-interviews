<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Feature Flag Lifecycle Management</text>

  <!-- Lifecycle Stages -->
  <!-- Stage 1: Create -->
  <rect x="30" y="70" width="160" height="100" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">1. Create</text>
  <text x="110" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Define flag key, type,</text>
  <text x="110" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">default value, owner</text>
  <text x="110" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Set expected removal date</text>

  <!-- Stage 2: Test -->
  <rect x="220" y="70" width="160" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">2. Test (Internal)</text>
  <text x="300" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Enable for employees,</text>
  <text x="300" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">QA, beta testers</text>
  <text x="300" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Verify behavior in staging</text>

  <!-- Stage 3: Rollout -->
  <rect x="410" y="70" width="160" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#92400e">3. Gradual Rollout</text>
  <text x="490" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">1% &#8594; 5% &#8594; 10% &#8594; 25%</text>
  <text x="490" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">&#8594; 50% &#8594; 100%</text>
  <text x="490" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Monitor metrics at each step</text>

  <!-- Stage 4: Graduate -->
  <rect x="600" y="70" width="160" height="100" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6b21a8">4. Graduate</text>
  <text x="680" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Feature is fully rolled out</text>
  <text x="680" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Flag no longer needed</text>
  <text x="680" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Mark for cleanup</text>

  <!-- Stage 5: Cleanup -->
  <rect x="790" y="70" width="80" height="100" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2" filter="url(#shadow)"/>
  <text x="830" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#9f1239">5. Clean</text>
  <text x="830" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Delete flag config</text>
  <text x="830" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Remove dead code</text>
  <text x="830" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Update docs</text>

  <!-- Arrows between stages -->
  <line x1="190" y1="120" x2="220" y2="120" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="120" x2="410" y2="120" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="120" x2="600" y2="120" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="760" y1="120" x2="790" y2="120" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Rollout Gates Section -->
  <rect x="30" y="210" width="540" height="200" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Automated Rollout Gates</text>

  <!-- Gate 1 -->
  <rect x="50" y="260" width="230" height="60" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="165" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#166534">Error Rate Gate</text>
  <text x="165" y="302" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Block if error rate &#62; threshold</text>
  <text x="165" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Monitor 5xx, latency, SLO burn</text>

  <!-- Gate 2 -->
  <rect x="310" y="260" width="240" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="430" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Business Metric Gate</text>
  <text x="430" y="302" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Block if conversion drops &#62; X%</text>
  <text x="430" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Track revenue, engagement, UX</text>

  <!-- Gate 3 -->
  <rect x="50" y="335" width="230" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="165" y="357" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Latency Gate</text>
  <text x="165" y="377" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Block if p99 latency increases</text>
  <text x="165" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Compare baseline vs treatment</text>

  <!-- Gate 4 -->
  <rect x="310" y="335" width="240" height="60" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="430" y="357" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6b21a8">Capacity Gate</text>
  <text x="430" y="377" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Block if resource usage spikes</text>
  <text x="430" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">CPU, memory, downstream calls</text>

  <!-- Stale Flag Detection -->
  <rect x="600" y="210" width="270" height="320" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2" filter="url(#shadow)"/>
  <text x="735" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#9f1239">Stale Flag Detection</text>

  <rect x="615" y="260" width="240" height="45" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="735" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Age &#62; Removal Date</text>
  <text x="735" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Alert owner + team lead</text>

  <rect x="615" y="315" width="240" height="45" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="735" y="333" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Zero Evaluations (30d)</text>
  <text x="735" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Flag unused, safe to remove</text>

  <rect x="615" y="370" width="240" height="45" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="735" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">100% Rollout (7d)</text>
  <text x="735" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Feature fully deployed, graduate</text>

  <rect x="615" y="425" width="240" height="45" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="735" y="443" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Owner Inactive (90d)</text>
  <text x="735" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Reassign or flag for review</text>

  <rect x="615" y="480" width="240" height="40" rx="4" fill="#fef2f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="735" y="505" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Auto-create cleanup ticket</text>

  <!-- Rollout Progress Bar -->
  <rect x="30" y="440" width="540" height="80" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#155e75">Rollout Progress Visualization</text>

  <!-- Progress bar background -->
  <rect x="50" y="480" width="500" height="25" rx="4" fill="#e0f2fe"/>

  <!-- Progress segments -->
  <rect x="50" y="480" width="50" height="25" rx="4" fill="#22c55e"/>
  <rect x="100" y="480" width="25" height="25" fill="#22c55e"/>
  <rect x="125" y="480" width="50" height="25" fill="#84cc16"/>
  <rect x="175" y="480" width="75" height="25" fill="#eab308"/>
  <rect x="250" y="480" width="125" height="25" fill="#f97316"/>
  <rect x="375" y="480" width="175" height="25" fill="#ef4444"/>

  <!-- Labels -->
  <text x="75" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1%</text>
  <text x="150" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">5%</text>
  <text x="215" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">10%</text>
  <text x="290" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">25%</text>
  <text x="380" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">50%</text>
  <text x="500" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">100%</text>
</svg>