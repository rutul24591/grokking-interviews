<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Session Management Service Architecture</title>
  <desc id="desc">Session management architecture showing issuance, session store, refresh, device tracking, and revocation</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Session Management Service Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Issuance, session store, refresh, device tracking, and revocation</text>
  
  <!-- Login Request -->
  <rect x="30" y="85" width="150" height="180" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="105" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Login Request</text>
  
  <rect x="50" y="125" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="148" text-anchor="middle" font-size="9" fill="#64748b">Credentials</text>
  
  <rect x="50" y="165" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="188" text-anchor="middle" font-size="9" fill="#64748b">Device Info</text>
  
  <rect x="50" y="205" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="228" text-anchor="middle" font-size="9" fill="#64748b">MFA Code</text>
  
  <!-- Login Flow -->
  <line x1="185" y1="175" x2="235" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="210" y="165" text-anchor="middle" font-size="9" fill="#64748b">Authenticate</text>
  
  <!-- Session Service -->
  <rect x="235" y="85" width="280" height="180" rx="8" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="375" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Session Service</text>
  
  <rect x="255" y="125" width="240" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="375" y="150" text-anchor="middle" font-size="9" fill="#64748b">Session Issuance</text>
  
  <rect x="255" y="175" width="110" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="310" y="200" text-anchor="middle" font-size="9" fill="#64748b">Token Generation</text>
  
  <rect x="375" y="175" width="120" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="435" y="200" text-anchor="middle" font-size="9" fill="#64748b">Device Tracking</text>
  
  <!-- Session Store -->
  <line x1="375" y1="265" x2="375" y2="315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-down)"/>
  
  <rect x="225" y="320" width="300" height="100" rx="8" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
  <text x="375" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Session Store</text>
  
  <rect x="245" y="355" width="120" height="55" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="305" y="380" text-anchor="middle" font-size="8" fill="#64748b">Redis Cluster</text>
  <text x="305" y="395" text-anchor="middle" font-size="8" fill="#64748b">Session Data</text>
  
  <rect x="375" y="355" width="130" height="55" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="440" y="380" text-anchor="middle" font-size="8" fill="#64748b">Device Registry</text>
  <text x="440" y="395" text-anchor="middle" font-size="8" fill="#64748b">Active Sessions</text>
  
  <!-- Tokens -->
  <line x1="520" y1="175" x2="570" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="545" y="165" text-anchor="middle" font-size="9" fill="#64748b">Issue Tokens</text>
  
  <!-- Tokens -->
  <rect x="570" y="85" width="300" height="180" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="720" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Tokens</text>
  
  <rect x="590" y="125" width="120" height="55" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="650" y="150" text-anchor="middle" font-size="8" fill="#64748b">Access Token</text>
  <text x="650" y="165" text-anchor="middle" font-size="8" fill="#64748b">Short-lived (15m)</text>
  
  <rect x="720" y="125" width="130" height="55" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="785" y="150" text-anchor="middle" font-size="8" fill="#64748b">Refresh Token</text>
  <text x="785" y="165" text-anchor="middle" font-size="8" fill="#64748b">Long-lived (7d)</text>
  
  <rect x="590" y="190" width="260" height="30" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="720" y="210" text-anchor="middle" font-size="9" fill="#64748b">Signed JWT / Opaque Token</text>
  
  <!-- Client -->
  <line x1="720" y1="265" x2="720" y2="315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-down)"/>
  
  <rect x="570" y="320" width="300" height="100" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="720" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Client</text>
  
  <rect x="590" y="355" width="120" height="55" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="650" y="380" text-anchor="middle" font-size="8" fill="#64748b">Store Tokens</text>
  <text x="650" y="395" text-anchor="middle" font-size="8" fill="#64748b">Secure Storage</text>
  
  <rect x="720" y="355" width="130" height="55" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="785" y="380" text-anchor="middle" font-size="8" fill="#64748b">Auto Refresh</text>
  <text x="785" y="395" text-anchor="middle" font-size="8" fill="#64748b">Before Expiry</text>
  
  <!-- Revocation -->
  <rect x="30" y="280" width="180" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Revocation</text>
  
  <rect x="50" y="320" width="140" height="110" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="120" y="345" text-anchor="middle" font-size="9" fill="#64748b">Logout</text>
  <text x="120" y="360" text-anchor="middle" font-size="9" fill="#64748b">Revoke Device</text>
  <text x="120" y="375" text-anchor="middle" font-size="9" fill="#64748b">Revoke All</text>
  <text x="120" y="390" text-anchor="middle" font-size="9" fill="#64748b">Password Change</text>
  <text x="120" y="405" text-anchor="middle" font-size="9" fill="#64748b">Security Event</text>
  
  <!-- Session Metadata -->
  <rect x="235" y="435" width="300" height="95" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="385" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Session Metadata</text>
  
  <rect x="255" y="470" width="260" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="385" y="495" text-anchor="middle" font-size="9" fill="#64748b">Device Fingerprint, IP, Location</text>
  <text x="385" y="510" text-anchor="middle" font-size="8" fill="#64748b">Created At, Last Activity, Auth Method</text>
  
  <!-- Token Refresh -->
  <rect x="570" y="435" width="300" height="95" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="720" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Token Refresh Flow</text>
  
  <rect x="590" y="470" width="260" height="50" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="720" y="495" text-anchor="middle" font-size="9" fill="#64748b">Refresh Token + Session ID</text>
  <text x="720" y="510" text-anchor="middle" font-size="8" fill="#fcd34d">New Access + Refresh Token</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
