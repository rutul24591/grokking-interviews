<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Email Deliverability Control</title>
  <desc id="desc">Email deliverability showing authentication, bounce handling, complaint rates, and pacing</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Email Deliverability Control</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Authentication, bounce handling, complaint rates, and pacing</text>
  
  <!-- Sender Authentication -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">Sender Authentication</text>
  
  <rect x="50" y="125" width="200" height="80" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <rect x="60" y="140" width="180" height="25" rx="2" fill="#3b82f6"/>
  <text x="150" y="158" text-anchor="middle" font-size="9" fill="white">SPF (Sender Policy Framework)</text>
  
  <rect x="60" y="170" width="180" height="25" rx="2" fill="#10b981"/>
  <text x="150" y="188" text-anchor="middle" font-size="9" fill="white">DKIM (Domain Keys)</text>
  
  <text x="165" y="225" text-anchor="middle" font-size="10" fill="#64748b">Proves you own the domain</text>
  
  <rect x="50" y="235" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <rect x="60" y="250" width="180" height="25" rx="2" fill="#f59e0b"/>
  <text x="150" y="268" text-anchor="middle" font-size="9" fill="white">DMARC Policy</text>
  
  <text x="165" y="295" text-anchor="middle" font-size="9" fill="#64748b">Tells receivers what to do</text>
  <text x="165" y="310" text-anchor="middle" font-size="9" fill="#64748b">if SPF/DKIM fail</text>
  
  <text x="165" y="335" text-anchor="middle" font-size="9" fill="#10b981">Required for inbox placement</text>
  
  <!-- Bounce Handling -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">Bounce Handling</text>
  
  <rect x="335" y="125" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  
  <rect x="345" y="140" width="100" height="35" rx="3" fill="#ef4444"/>
  <text x="395" y="163" text-anchor="middle" font-size="9" fill="white">Hard Bounce</text>
  
  <rect x="455" y="140" width="100" height="35" rx="3" fill="#f59e0b"/>
  <text x="505" y="163" text-anchor="middle" font-size="9" fill="white">Soft Bounce</text>
  
  <text x="450" y="195" text-anchor="middle" font-size="9" fill="#64748b">Hard: Invalid, permanent</text>
  <text x="450" y="210" text-anchor="middle" font-size="9" fill="#64748b">Soft: Temporary, retry</text>
  
  <rect x="335" y="235" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" font-size="10" fill="#64748b">Bounce Processing</text>
  
  <text x="355" y="285" text-anchor="start" font-size="9" fill="#64748b">- Parse bounce codes</text>
  <text x="355" y="300" text-anchor="start" font-size="9" fill="#64748b">- Classify hard vs soft</text>
  <text x="355" y="315" text-anchor="start" font-size="9" fill="#64748b">- Update suppression list</text>
  <text x="355" y="330" text-anchor="start" font-size="9" fill="#64748b">- Retry soft bounces (3x)</text>
  
  <!-- Complaint Rates -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Complaint Rates</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="735" y="150" text-anchor="middle" font-size="10" fill="#64748b">Spam Complaint Threshold</text>
  
  <rect x="630" y="160" width="210" height="25" rx="2" fill="#10b981"/>
  <text x="735" y="178" text-anchor="middle" font-size="9" fill="white">&amp;lt; 0.1% Good</text>
  
  <rect x="630" y="190" width="210" height="25" rx="2" fill="#f59e0b"/>
  <text x="735" y="208" text-anchor="middle" font-size="9" fill="white">0.1-0.3% Warning</text>
  
  <rect x="630" y="220" width="210" height="25" rx="2" fill="#ef4444"/>
  <text x="735" y="238" text-anchor="middle" font-size="9" fill="white">&amp;gt; 0.3% Critical</text>
  
  <text x="735" y="270" text-anchor="middle" font-size="9" fill="#ef4444">High complaints = blocked!</text>
  
  <rect x="620" y="275" width="230" height="60" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="300" text-anchor="middle" font-size="9" fill="#64748b">Feedback Loops (FBL)</text>
  <text x="735" y="315" text-anchor="middle" font-size="9" fill="#64748b">Report complaints to ESPs</text>
  <text x="735" y="330" text-anchor="middle" font-size="8" fill="#fcd34d">Process within 24 hours</text>
  
  <!-- Sending Pace -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Sending Pace and Throttling</text>
  
  <rect x="50" y="360" width="360" height="160" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  
  <!-- Rate limits -->
  <rect x="70" y="380" width="150" height="50" rx="4" fill="#3b82f6"/>
  <text x="145" y="405" text-anchor="middle" font-size="9" fill="white">Per Domain</text>
  <text x="145" y="420" text-anchor="middle" font-size="8" fill="#bfdbfe">gmail.com: 100/min</text>
  
  <rect x="240" y="380" width="150" height="50" rx="4" fill="#10b981"/>
  <text x="315" y="405" text-anchor="middle" font-size="9" fill="white">Per IP</text>
  <text x="315" y="420" text-anchor="middle" font-size="8" fill="#6ee7b7">Provider limits</text>
  
  <text x="230" y="460" text-anchor="middle" font-size="9" fill="#64748b">Warm up new IPs gradually</text>
  <text x="230" y="480" text-anchor="middle" font-size="9" fill="#64748b">Separate transactional vs bulk</text>
  <text x="230" y="500" text-anchor="middle" font-size="9" fill="#64748b">Respect recipient server limits</text>
  
  <!-- Reputation Monitoring -->
  <rect x="470" y="320" width="400" height="210" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Reputation Monitoring</text>
  
  <rect x="490" y="360" width="360" height="160" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="510" y="385" text-anchor="start" font-size="10" fill="#10b981">+</text>
  <text x="525" y="385" font-size="10" fill="#1e293b">Google Postmaster Tools</text>
  
  <text x="510" y="405" text-anchor="start" font-size="10" fill="#10b981">+</text>
  <text x="525" y="405" font-size="10" fill="#1e293b">Microsoft SNDS</text>
  
  <text x="510" y="425" text-anchor="start" font-size="10" fill="#10b981">+</text>
  <text x="525" y="425" font-size="10" fill="#1e293b">Sender Score (Return Path)</text>
  
  <text x="510" y="445" text-anchor="start" font-size="10" fill="#10b981">+</text>
  <text x="525" y="445" font-size="10" fill="#1e293b">Blacklist monitoring</text>
  
  <text x="510" y="470" text-anchor="start" font-size="9" fill="#64748b">Alert on reputation drops</text>
  <text x="510" y="490" text-anchor="start" font-size="9" fill="#64748b">Pause sending if blacklisted</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
