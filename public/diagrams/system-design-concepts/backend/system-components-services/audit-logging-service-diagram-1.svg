<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Audit Logging Service Architecture</title>
  <desc id="desc">Audit logging architecture showing producers, ingestion, immutable storage, indexing, and query access</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Audit Logging Service Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Producers, ingestion, immutable storage, indexing, and query access</text>
  
  <!-- Event Producers -->
  <rect x="30" y="85" width="180" height="200" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Event Producers</text>
  
  <rect x="50" y="125" width="140" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="120" y="148" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Auth Service</text>
  
  <rect x="50" y="165" width="140" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="120" y="188" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Data Services</text>
  
  <rect x="50" y="205" width="140" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="120" y="228" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Admin Actions</text>
  
  <rect x="50" y="245" width="140" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="120" y="268" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">API Gateway</text>
  
  <!-- Audit Events Flow -->
  <line x1="215" y1="185" x2="265" y2="185" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="240" y="175" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Audit Events</text>
  
  <!-- Ingestion Pipeline -->
  <rect x="265" y="85" width="240" height="200" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="385" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Ingestion Pipeline</text>
  
  <rect x="285" y="125" width="200" height="40" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="385" y="150" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Async Queue (Buffer)</text>
  
  <rect x="285" y="175" width="200" height="40" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="385" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Schema Validation</text>
  
  <rect x="285" y="225" width="200" height="40" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="385" y="250" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Enrichment (IP, Geo)</text>
  
  <!-- Storage -->
  <line x1="510" y1="185" x2="560" y2="185" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="560" y="85" width="310" height="200" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="715" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Immutable Storage</text>
  
  <rect x="580" y="125" width="270" height="45" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="715" y="150" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Write-Once Storage (S3/GCS)</text>
  <text x="715" y="165" text-anchor="middle" font-size="8" fill="#6ee7b7">Tamper-evident</text>
  
  <rect x="580" y="180" width="270" height="45" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="715" y="205" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Search Index (Elasticsearch)</text>
  <text x="715" y="220" text-anchor="middle" font-size="8" fill="#6ee7b7">Fast queries</text>
  
  <rect x="580" y="235" width="270" height="40" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="715" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Hash Chain for Integrity</text>
  
  <!-- Access Layer -->
  <line x1="715" y1="285" x2="715" y2="335" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow-down)"/>
  
  <rect x="560" y="340" width="310" height="100" rx="8" fill="var(--bg-theme, #06b6d4)" stroke="var(--border-theme, #0891b2)" stroke-width="2"/>
  <text x="715" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Access &amp; Query Layer</text>
  
  <rect x="580" y="375" width="130" height="55" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #06b6d4)" stroke-width="1"/>
  <text x="645" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Query API</text>
  <text x="645" y="415" text-anchor="middle" font-size="8" fill="#67e8f9">RBAC enforced</text>
  
  <rect x="720" y="375" width="130" height="55" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #06b6d4)" stroke-width="1"/>
  <text x="785" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Export/Reports</text>
  <text x="785" y="415" text-anchor="middle" font-size="8" fill="#67e8f9">Compliance</text>
  
  <!-- Security Controls -->
  <rect x="30" y="320" width="280" height="120" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="170" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Security Controls</text>
  
  <rect x="50" y="360" width="240" height="70" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="170" y="385" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Signed audit entries</text>
  <text x="170" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Access logging</text>
  <text x="170" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Encryption at rest</text>
  
  <!-- Retention Policy -->
  <rect x="330" y="320" width="280" height="120" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="470" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Retention Policy</text>
  
  <rect x="350" y="360" width="240" height="70" rx="4" fill="var(--bg-panel-soft, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="470" y="385" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Configurable per event type</text>
  <text x="470" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Compliance-driven (7 years)</text>
  <text x="470" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Automated archival/deletion</text>
  
  <!-- Compliance -->
  <rect x="630" y="455" width="240" height="75" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="750" y="480" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Compliance Standards</text>
  
  <rect x="650" y="490" width="200" height="30" rx="3" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="750" y="510" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">SOC 2, HIPAA, GDPR, PCI-DSS</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
