<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Feature Flag Service &#8212; Failure Modes &#38; Resilience</text>

  <!-- Failure Mode 1: Flag Service Down -->
  <rect x="30" y="65" width="270" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 1: Flag Service Down</text>

  <rect x="45" y="110" width="240" height="35" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="165" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#374151">SDK cannot fetch config updates</text>

  <rect x="45" y="155" width="115" height="35" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="102" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Mitigation:</text>
  <text x="102" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Use cached config</text>

  <rect x="170" y="155" width="115" height="35" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="227" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9a3412">Risk:</text>
  <text x="227" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Stale evaluations</text>

  <!-- Failure Mode 2: Stale Cache -->
  <rect x="330" y="65" width="270" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 2: Stale Cache Divergence</text>

  <rect x="345" y="110" width="240" height="35" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="465" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#374151">Different SDKs have different configs</text>

  <rect x="345" y="155" width="115" height="35" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="402" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Mitigation:</text>
  <text x="402" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Force refresh via CDN</text>

  <rect x="470" y="155" width="115" height="35" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="527" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9a3412">Risk:</text>
  <text x="527" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Inconsistent UX</text>

  <!-- Failure Mode 3: Flag Explosion -->
  <rect x="630" y="65" width="240" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 3: Flag Explosion</text>

  <rect x="645" y="110" width="210" height="35" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="750" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#374151">Thousands of stale flags, config bloat</text>

  <rect x="645" y="155" width="100" height="35" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="695" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Mitigation:</text>
  <text x="695" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Auto-cleanup</text>

  <rect x="755" y="155" width="100" height="35" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="805" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9a3412">Risk:</text>
  <text x="805" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Config debt</text>

  <!-- Resilience Pattern 1: Fail Open -->
  <rect x="30" y="240" width="420" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">Resilience Pattern: Fail Open with Safe Defaults</text>

  <rect x="50" y="290" width="380" height="55" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">When flag service is unreachable, SDK returns the preconfigured safe default</text>
  <text x="240" y="327" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Kill switch defaults to OFF (risky behavior disabled). Feature flags default to ON.</text>

  <rect x="50" y="350" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Zero Network Dependency</text>

  <rect x="250" y="350" width="180" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">&#60; 1ms Eval Latency</text>

  <!-- Resilience Pattern 2: Circuit Breaker -->
  <rect x="480" y="240" width="390" height="120" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Resilience Pattern: Cache Invalidation Strategy</text>

  <rect x="495" y="290" width="360" height="55" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="675" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Version-based cache invalidation: each config change increments version</text>
  <text x="675" y="327" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">SDKs compare version, fetch only if newer. CDN purges stale entries.</text>

  <rect x="495" y="350" width="170" height="35" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="580" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Version Comparison</text>

  <rect x="685" y="350" width="170" height="35" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="770" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">CDN Cache Purge</text>

  <!-- Recovery Flow -->
  <rect x="30" y="395" width="840" height="130" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Recovery Flow After Flag Service Restoration</text>

  <!-- Recovery Steps -->
  <rect x="50" y="445" width="150" height="60" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="125" y="467" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">1. Health Check</text>
  <text x="125" y="485" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Service responds</text>
  <text x="125" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">to SDK ping</text>

  <line x1="200" y1="475" x2="220" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="220" y="445" width="150" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="467" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">2. Config Fetch</text>
  <text x="295" y="485" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">SDK fetches latest</text>
  <text x="295" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">config version</text>

  <line x1="370" y1="475" x2="390" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="390" y="445" width="150" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="465" y="467" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#92400e">3. Cache Update</text>
  <text x="465" y="485" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Atomic cache swap</text>
  <text x="465" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">(no partial state)</text>

  <line x1="540" y1="475" x2="560" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="560" y="445" width="150" height="60" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="635" y="467" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#6b21a8">4. Evaluate</text>
  <text x="635" y="485" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">New config active,</text>
  <text x="635" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">evaluations updated</text>

  <line x1="710" y1="475" x2="730" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="730" y="445" width="120" height="60" rx="6" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="790" y="467" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#155e75">5. Resume</text>
  <text x="790" y="485" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Exposure logging</text>
  <text x="790" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">resumes normally</text>

  <!-- Key Metrics Box -->
  <rect x="30" y="520" width="840" height="25" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="120" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">Key Metrics:</text>
  <text x="210" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">MTTR: &#60; 30s (config propagation)</text>
  <text x="440" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Cache hit rate: &#62; 99.9%</text>
  <text x="620" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Stale flags: &#60; 5% of total</text>
  <text x="780" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Eval p99: &#60; 2ms</text>
</svg>