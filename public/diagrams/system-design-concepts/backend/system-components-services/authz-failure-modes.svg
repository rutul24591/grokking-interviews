<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="55" fill="#f9fafb" rx="0"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#111827">Authorization Failure Modes</text>

  <!-- Row 1 -->
  <rect x="30" y="80" width="400" height="120" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="230" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">1. Stale Entitlements</text>
  <text x="230" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">User removed from org but cached decision still grants access</text>
  <rect x="55" y="145" width="350" height="40" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="230" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Mitigation: Risk-classified caching, revocation signals, bounded TTLs, event-driven invalidation</text>

  <rect x="470" y="80" width="400" height="120" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="670" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">2. Policy Rollout Regression</text>
  <text x="670" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Policy change silently over-permissions or blocks valid traffic</text>
  <rect x="495" y="145" width="350" height="40" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="670" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Mitigation: Policy simulation on replay traffic, staged rollout, instant rollback, canary evaluation</text>

  <!-- Row 2 -->
  <rect x="30" y="220" width="400" height="120" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="230" y="248" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#854d0e">3. Decision Engine Outage</text>
  <text x="230" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Central policy engine unavailable, services must choose fail-open or fail-closed</text>
  <rect x="55" y="285" width="350" height="40" rx="6" fill="#ffffff" stroke="#eab308" stroke-width="1"/>
  <text x="230" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Mitigation: Tiered enforcement, local fallback caches for low-risk, explicit fail mode per action class</text>

  <rect x="470" y="220" width="400" height="120" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="670" y="248" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#854d0e">4. Inconsistent Policy Versions</text>
  <text x="670" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Different services run different policy versions during rollout</text>
  <rect x="495" y="285" width="350" height="40" rx="6" fill="#ffffff" stroke="#eab308" stroke-width="1"/>
  <text x="670" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Mitigation: Atomic bundle distribution, version pinning, rollout coordination, feature flags for policies</text>

  <!-- Row 3 -->
  <rect x="30" y="360" width="400" height="120" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="230" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#9a3412">5. Explainability Gaps</text>
  <text x="230" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Denials cannot be explained; debugging requires code inspection</text>
  <rect x="55" y="425" width="350" height="40" rx="6" fill="#ffffff" stroke="#f97316" stroke-width="1"/>
  <text x="230" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#9a3412">Mitigation: Structured reason codes, decision traces, internal debug tooling, policy visualization dashboard</text>

  <rect x="470" y="360" width="400" height="120" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="670" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">6. Privilege Escalation via Logic Bug</text>
  <text x="670" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Policy evaluation bug allows bypass through edge case or missing check</text>
  <rect x="495" y="425" width="350" height="40" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="670" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#166534">Mitigation: Property-based testing, deny-by-default, fuzz testing, red team exercises, audit log anomaly detection</text>
</svg>