<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Session Validation Control Points</title>
  <desc id="desc">Session validation control points showing local validation, caches, refresh flows, and revocation propagation</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Session Validation Control Points</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Local validation, caches, refresh flows, and revocation propagation</text>
  
  <!-- Validation Strategies -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">Validation Strategies</text>
  
  <rect x="50" y="125" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="150" y="150" text-anchor="middle" font-size="10" fill="#64748b">Local Validation (JWT)</text>
  
  <rect x="60" y="160" width="180" height="30" rx="2" fill="#3b82f6"/>
  <text x="150" y="180" text-anchor="middle" font-size="8" fill="white">Verify signature locally</text>
  
  <rect x="60" y="195" width="180" height="30" rx="2" fill="#10b981"/>
  <text x="150" y="215" text-anchor="middle" font-size="8" fill="white">No network call</text>
  
  <rect x="50" y="235" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="150" y="260" text-anchor="middle" font-size="10" fill="#64748b">Remote Validation</text>
  
  <rect x="60" y="270" width="180" height="30" rx="2" fill="#f59e0b"/>
  <text x="150" y="290" text-anchor="middle" font-size="8" fill="white">Check session store</text>
  
  <rect x="60" y="305" width="180" height="30" rx="2" fill="#8b5cf6"/>
  <text x="150" y="325" text-anchor="middle" font-size="8" fill="white">Immediate revocation</text>
  
  <!-- Token Refresh -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">Token Refresh Flow</text>
  
  <rect x="335" y="125" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="#64748b">Refresh Flow</text>
  
  <rect x="345" y="160" width="210" height="30" rx="2" fill="#10b981"/>
  <text x="450" y="180" text-anchor="middle" font-size="8" fill="white">Client: Token expiring soon</text>
  
  <rect x="345" y="195" width="210" height="30" rx="2" fill="#3b82f6"/>
  <text x="450" y="215" text-anchor="middle" font-size="8" fill="white">Server: Validate refresh token</text>
  
  <rect x="335" y="235" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" font-size="10" fill="#64748b">Rotation Strategy</text>
  
  <text x="355" y="285" text-anchor="start" font-size="9" fill="#64748b">- Issue new refresh token</text>
  <text x="355" y="300" text-anchor="start" font-size="9" fill="#64748b">- Invalidate old token</text>
  <text x="355" y="315" text-anchor="start" font-size="9" fill="#64748b">- Detect reuse attacks</text>
  
  <!-- Revocation Propagation -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Revocation Propagation</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="735" y="150" text-anchor="middle" font-size="10" fill="#64748b">Revocation Methods</text>
  
  <rect x="630" y="160" width="210" height="30" rx="2" fill="#f59e0b"/>
  <text x="735" y="180" text-anchor="middle" font-size="8" fill="white">Delete from session store</text>
  
  <rect x="630" y="195" width="210" height="30" rx="2" fill="#3b82f6"/>
  <text x="735" y="215" text-anchor="middle" font-size="8" fill="white">Add to revocation list</text>
  
  <rect x="620" y="235" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="260" text-anchor="middle" font-size="10" fill="#64748b">Propagation Time</text>
  
  <text x="640" y="285" text-anchor="start" font-size="9" fill="#64748b">- JWT: TTL bound</text>
  <text x="640" y="300" text-anchor="start" font-size="9" fill="#64748b">- Opaque: Immediate</text>
  <text x="640" y="315" text-anchor="start" font-size="9" fill="#64748b">- Hybrid: Short-lived JWT</text>
  
  <!-- Device Management -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Device Management</text>
  
  <rect x="50" y="360" width="360" height="160" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  
  <rect x="70" y="380" width="150" height="50" rx="4" fill="#3b82f6"/>
  <text x="145" y="405" text-anchor="middle" font-size="9" fill="white">Active Devices</text>
  <text x="145" y="420" text-anchor="middle" font-size="8" fill="#bfdbfe">List all sessions</text>
  
  <rect x="240" y="380" width="150" height="50" rx="4" fill="#f59e0b"/>
  <text x="315" y="405" text-anchor="middle" font-size="9" fill="white">Selective Logout</text>
  <text x="315" y="420" text-anchor="middle" font-size="8" fill="#fcd34d">Revoke device</text>
  
  <text x="230" y="460" text-anchor="middle" font-size="9" fill="#64748b">User-visible session management</text>
  
  <text x="70" y="490" text-anchor="start" font-size="9" fill="#64748b">- Device name, location</text>
  <text x="70" y="505" text-anchor="start" font-size="9" fill="#64748b">- Last active timestamp</text>
  <text x="230" y="490" text-anchor="start" font-size="9" fill="#64748b">- "Log out of all devices"</text>
  <text x="230" y="505" text-anchor="start" font-size="9" fill="#64748b">- Suspicious activity alerts</text>
  
  <!-- Session Security -->
  <rect x="470" y="320" width="400" height="210" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Session Security</text>
  
  <rect x="490" y="360" width="360" height="160" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
  
  <rect x="500" y="380" width="150" height="50" rx="4" fill="#f59e0b"/>
  <text x="575" y="405" text-anchor="middle" font-size="9" fill="white">Session Binding</text>
  <text x="575" y="420" text-anchor="middle" font-size="8" fill="#fcd34d">IP, User-Agent</text>
  
  <rect x="670" y="380" width="160" height="50" rx="4" fill="#3b82f6"/>
  <text x="750" y="405" text-anchor="middle" font-size="9" fill="white">Anomaly Detection</text>
  <text x="750" y="420" text-anchor="middle" font-size="8" fill="#bfdbfe">Geo impossible travel</text>
  
  <line x1="670" y1="435" x2="670" y2="465" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <rect x="585" y="470" width="160" height="40" rx="4" fill="#ef4444"/>
  <text x="665" y="493" text-anchor="middle" font-size="8" fill="white">Auto-revoke suspicious</text>
  
  <text x="575" y="530" text-anchor="middle" font-size="9" fill="#64748b">Balance security vs UX</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
