<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Media Processing Service &#8212; Failure Modes &#38; Recovery</text>

  <!-- Failure Mode 1: Transcoder Crash -->
  <rect x="30" y="65" width="270" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 1: Transcoder Worker Crash</text>

  <rect x="45" y="110" width="240" height="28" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="165" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">GPU OOM, out of memory, process killed</text>

  <rect x="45" y="145" width="115" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="102" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Re-queue job</text>
  <text x="102" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">different worker</text>

  <rect x="170" y="145" width="115" height="28" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="227" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9a3412">Risk: partial output</text>
  <text x="227" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">clean up temp files</text>

  <!-- Failure Mode 2: Corrupt Input -->
  <rect x="330" y="65" width="270" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 2: Corrupt/Invalid Input</text>

  <rect x="345" y="110" width="240" height="28" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="465" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Malformed file, unsupported codec, truncated</text>

  <rect x="345" y="145" width="115" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="402" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Validate upfront</text>
  <text x="402" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">reject before queue</text>

  <rect x="470" y="145" width="115" height="28" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="527" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9a3412">Risk: worker crash</text>
  <text x="527" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">FFmpeg segfault</text>

  <!-- Failure Mode 3: Storage Full -->
  <rect x="630" y="65" width="240" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 3: Storage Exhaustion</text>

  <rect x="645" y="110" width="210" height="28" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="750" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Temp files accumulate, disk fills up</text>

  <rect x="645" y="145" width="100" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="695" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Auto-cleanup</text>
  <text x="695" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">TTL on temp files</text>

  <rect x="755" y="145" width="100" height="28" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="805" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9a3412">Risk: all workers</text>
  <text x="805" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">fail to write output</text>

  <!-- Recovery: Partial Output Cleanup -->
  <rect x="30" y="220" width="420" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">Recovery: Partial Output Cleanup</text>

  <rect x="50" y="270" width="380" height="28" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">When worker crashes, partial output files must be cleaned up</text>

  <rect x="50" y="308" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Unique temp directory</text>
  <text x="140" y="341" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">per job with TTL</text>

  <rect x="250" y="308" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="340" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Atomic rename on complete</text>
  <text x="340" y="341" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">no partial reads</text>

  <!-- Retry Strategy for Media Jobs -->
  <rect x="480" y="220" width="390" height="140" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Retry Strategy for Media Jobs</text>

  <rect x="495" y="270" width="360" height="28" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="675" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Distinguish transient (retry) vs permanent (fail) errors</text>

  <rect x="495" y="308" width="170" height="40" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="580" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Transient: timeout, OOM</text>
  <text x="580" y="341" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Retry 3x with backoff</text>

  <rect x="680" y="308" width="175" height="40" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="767" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Permanent: corrupt file</text>
  <text x="767" y="341" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Move to DLQ immediately</text>

  <!-- Quality Assurance -->
  <rect x="30" y="390" width="420" height="130" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Quality Assurance After Transcoding</text>

  <rect x="50" y="440" width="380" height="28" rx="4" fill="#fefce8" stroke="#f59e0b" stroke-width="1"/>
  <text x="240" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Verify output file integrity, duration match, codec correctness</text>

  <rect x="50" y="478" width="180" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="140" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">File size sanity check</text>

  <rect x="250" y="478" width="180" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Duration within 1% of source</text>

  <rect x="50" y="515" width="180" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="140" y="534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Codec/resolution check</text>

  <rect x="250" y="515" width="180" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="534" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Probe all output variants</text>

  <!-- Circuit Breaker -->
  <rect x="480" y="390" width="390" height="130" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#155e75">Circuit Breaker for Processing Pipeline</text>

  <rect x="495" y="440" width="360" height="28" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="675" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">If error rate &#62; 10% for 5min, open circuit and pause queue consumption</text>

  <rect x="495" y="478" width="170" height="30" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="580" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#155e75">Prevent cascade failure</text>

  <rect x="680" y="478" width="175" height="30" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="767" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#155e75">Auto-recovery probe every 60s</text>

  <!-- Key Metrics -->
  <rect x="30" y="520" width="840" height="25" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="120" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">Resilience Metrics:</text>
  <text x="240" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Transcoding success rate: target &#62; 99.5%</text>
  <text x="510" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">DLQ items reviewed daily</text>
  <text x="700" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Temp file cleanup: &#60; 1hr TTL</text>
</svg>