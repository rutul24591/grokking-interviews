<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">File Storage Failure Modes</title>
  <desc id="desc">File storage failure modes: storage exhaustion, malicious uploads, access control failures, and CDN cache poisoning</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">File Storage Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Storage exhaustion, malicious uploads, access control failures, and CDN cache poisoning</text>
  
  <!-- Storage Exhaustion -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="#ef4444" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">1. Storage Exhaustion</text>
  
  <!-- Exhaustion scenario -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <!-- Normal storage -->
  <rect x="60" y="150" width="140" height="60" rx="4" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-size="9" fill="white">Normal Storage</text>
  <text x="130" y="190" text-anchor="middle" font-size="8" fill="#6ee7b7">50% used</text>
  <text x="130" y="203" text-anchor="middle" font-size="7" fill="#6ee7b7">Lifecycle active</text>
  
  <line x1="205" y1="180" x2="235" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="220" y="170" text-anchor="middle" font-size="7" fill="#ef4444">No cleanup</text>
  
  <!-- Exhausted storage -->
  <rect x="245" y="150" width="140" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="315" y="175" text-anchor="middle" font-size="9" fill="white">Storage Full</text>
  <text x="315" y="190" text-anchor="middle" font-size="8" fill="#fca5a5">99% used</text>
  <text x="315" y="203" text-anchor="middle" font-size="7" fill="#fca5a5">Uploads fail</text>
  
  <text x="235" y="290" text-anchor="middle" font-size="10" fill="#ef4444">All uploads blocked, service degraded!</text>
  <text x="235" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: No lifecycle policies, unlimited retention</text>
  <text x="235" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: Quotas, lifecycle rules, monitoring alerts</text>
  
  <!-- Malicious Uploads -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">2. Malicious Uploads</text>
  
  <!-- Malware scenario -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  
  <!-- Upload -->
  <rect x="490" y="150" width="100" height="60" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <text x="540" y="175" text-anchor="middle" font-size="9" fill="white">User Upload</text>
  <text x="540" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">document.pdf</text>
  
  <line x1="595" y1="180" x2="625" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="610" y="170" text-anchor="middle" font-size="7" fill="#ef4444">Actually:</text>
  
  <!-- Malware -->
  <rect x="635" y="150" width="100" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="685" y="175" text-anchor="middle" font-size="9" fill="white">Malware</text>
  <text x="685" y="190" text-anchor="middle" font-size="8" fill="#fca5a5">Trojan/Ransom</text>
  
  <line x1="740" y1="180" x2="770" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="755" y="170" text-anchor="middle" font-size="7" fill="#ef4444">Infects</text>
  
  <!-- Victims -->
  <rect x="780" y="150" width="60" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="810" y="180" text-anchor="middle" font-size="9" fill="white">Users</text>
  <text x="810" y="200" text-anchor="middle" font-size="7" fill="#fca5a5">Infected</text>
  
  <text x="665" y="290" text-anchor="middle" font-size="10" fill="#ef4444">Malware distributed to other users!</text>
  <text x="665" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: No virus scanning, weak validation</text>
  <text x="665" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: AV scanning, content-type validation, sandbox</text>
  
  <!-- Access Control Failures -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#8b5cf6">3. Access Control Failures</text>
  
  <!-- IDOR scenario -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  
  <!-- Attacker -->
  <rect x="60" y="395" width="120" height="60" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
  <text x="120" y="420" text-anchor="middle" font-size="9" fill="white">Attacker</text>
  <text x="120" y="435" text-anchor="middle" font-size="8" fill="#c4b5fd">Guesses IDs</text>
  
  <line x1="185" y1="425" x2="215" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="200" y="415" text-anchor="middle" font-size="7" fill="#ef4444">IDOR Attack</text>
  
  <!-- Private file -->
  <rect x="225" y="395" width="120" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="285" y="420" text-anchor="middle" font-size="9" fill="white">Private File</text>
  <text x="285" y="435" text-anchor="middle" font-size="8" fill="#fca5a5">Exposed!</text>
  
  <text x="235" y="495" text-anchor="middle" font-size="10" fill="#ef4444">Private files accessible without auth!</text>
  <text x="235" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: Missing ACL checks, predictable URLs</text>
  <text x="235" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Enforce ACLs, use UUIDs, signed URLs</text>
  
  <!-- CDN Cache Poisoning -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">4. CDN Cache Poisoning</text>
  
  <!-- Poisoning scenario -->
  <rect x="480" y="380" width="370" height="140" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  
  <!-- Attacker uploads -->
  <rect x="490" y="395" width="120" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="550" y="420" text-anchor="middle" font-size="9" fill="white">Attacker</text>
  <text x="550" y="435" text-anchor="middle" font-size="8" fill="#fca5a5">Uploads malware</text>
  
  <line x1="615" y1="425" x2="645" y2="425" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <text x="630" y="415" text-anchor="middle" font-size="7" fill="#06b6d4">CDN caches</text>
  
  <!-- CDN -->
  <rect x="655" y="395" width="100" height="60" rx="4" fill="#06b6d4" stroke="#0891b2" stroke-width="1"/>
  <text x="705" y="420" text-anchor="middle" font-size="9" fill="white">CDN Edge</text>
  <text x="705" y="435" text-anchor="middle" font-size="8" fill="#67e8f9">Cached</text>
  
  <line x1="760" y1="425" x2="790" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="775" y="415" text-anchor="middle" font-size="7" fill="#ef4444">Serves to</text>
  
  <!-- Users -->
  <rect x="800" y="395" width="40" height="60" rx="2" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <text x="820" y="425" text-anchor="middle" font-size="9" fill="white">Users</text>
  
  <text x="665" y="495" text-anchor="middle" font-size="10" fill="#ef4444">Malware served from CDN cache!</text>
  <text x="665" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: Caching before scan, no cache-control</text>
  <text x="665" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Scan before CDN, cache private separately</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4"/>
    </marker>
  </defs>
</svg>
