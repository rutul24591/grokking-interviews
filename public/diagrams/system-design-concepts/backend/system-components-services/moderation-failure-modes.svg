<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="55" fill="#f9fafb" rx="0"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#111827">Content Moderation Failure Modes</text>

  <!-- Row 1 -->
  <rect x="30" y="80" width="400" height="120" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="230" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">1. False Positive Spike</text>
  <text x="230" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Policy/model change blocks legitimate content at scale, causing user churn</text>
  <rect x="55" y="145" width="350" height="40" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="230" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Mitigation: Shadow evaluation, staged rollout, block-rate guardrails, fast rollback</text>

  <rect x="470" y="80" width="400" height="120" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="670" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">2. False Negative Surge (Safety Incident)</text>
  <text x="670" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Abuse content slips through, legal and reputational risk, platform safety failure</text>
  <rect x="495" y="145" width="350" height="40" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1"/>
  <text x="670" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Mitigation: Multi-model consensus, conservative thresholds, user report backstop, rapid response</text>

  <!-- Row 2 -->
  <rect x="30" y="220" width="400" height="120" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="230" y="248" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#854d0e">3. Review Queue Backlog</text>
  <text x="230" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Human review queues grow beyond SLA, borderline content remains unresolved</text>
  <rect x="55" y="285" width="350" height="40" rx="6" fill="#ffffff" stroke="#eab308" stroke-width="1"/>
  <text x="230" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Mitigation: Auto-prioritize by severity, burst review capacity, outsource overflow, adjust thresholds</text>

  <rect x="470" y="220" width="400" height="120" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="670" y="248" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#854d0e">4. Adversarial Adaptation</text>
  <text x="670" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Attackers change behavior to bypass rules and models (obfuscation, homoglyphs)</text>
  <rect x="495" y="285" width="350" height="40" rx="6" fill="#ffffff" stroke="#eab308" stroke-width="1"/>
  <text x="670" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Mitigation: Layered signals, rapid rule updates, anomaly detection, red team testing, reputation systems</text>

  <!-- Row 3 -->
  <rect x="30" y="360" width="400" height="120" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="230" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#9a3412">5. Inconsistent Enforcement Across Surfaces</text>
  <text x="230" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Different posting flows apply different rules, creating moderation bypass paths</text>
  <rect x="55" y="425" width="350" height="40" rx="6" fill="#ffffff" stroke="#f97316" stroke-width="1"/>
  <text x="230" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#9a3412">Mitigation: Centralized policy engine, shared enforcement primitives, policy-as-code across all surfaces</text>

  <rect x="470" y="360" width="400" height="120" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="670" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">6. ML Pipeline Degradation</text>
  <text x="670" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Model serving latency spikes, GPU workers unavailable, or model staleness</text>
  <rect x="495" y="425" width="350" height="40" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="670" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#166534">Mitigation: Fallback to keyword rules, degrade gracefully to post-hoc review, circuit breaker on ML inference</text>
</svg>