<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Geolocation Service &#8212; Scaling Strategies</text>

  <!-- Cache Scaling -->
  <rect x="30" y="65" width="410" height="130" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="235" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Cache Layer Scaling</text>

  <rect x="50" y="110" width="370" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="235" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Redis Cluster with Consistent Hashing</text>

  <rect x="50" y="150" width="110" height="35" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#374151">Redis-1</text>

  <rect x="170" y="150" width="110" height="35" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="225" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#374151">Redis-2</text>

  <rect x="290" y="150" width="130" height="35" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="355" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#374151">Redis-N (add as needed)</text>

  <!-- Geo DB Scaling -->
  <rect x="470" y="65" width="400" height="130" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">Geolocation Database Scaling</text>

  <rect x="485" y="110" width="370" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="670" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">Read-Only Replicas for Query Load</text>

  <rect x="485" y="150" width="110" height="35" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="540" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#374151">Primary (Write)</text>

  <rect x="605" y="150" width="110" height="35" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="660" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#374151">Replica-1 (Read)</text>

  <rect x="725" y="150" width="110" height="35" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="780" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#374151">Replica-N (Read)</text>

  <!-- Geo DB Updates -->
  <rect x="30" y="225" width="410" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="235" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Database Update Strategy</text>

  <rect x="50" y="270" width="370" height="25" rx="4" fill="#fefce8" stroke="#f59e0b" stroke-width="1"/>
  <text x="235" y="287" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">IP Geolocation DB updates: monthly/quarterly from providers</text>

  <rect x="50" y="305" width="170" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="135" y="324" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#374151">Blue-green deployment</text>

  <rect x="235" y="305" width="185" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="327" y="324" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#374151">Hot-swap without downtime</text>

  <!-- API Scaling -->
  <rect x="470" y="225" width="400" height="120" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6b21a8">API Service Scaling</text>

  <rect x="485" y="270" width="370" height="25" rx="4" fill="#faf5ff" stroke="#a855f7" stroke-width="1"/>
  <text x="670" y="287" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#6b21a8">Auto-scaling based on RPS and latency</text>

  <rect x="485" y="305" width="170" height="30" rx="4" fill="#ffffff" stroke="#a855f7" stroke-width="1"/>
  <text x="570" y="324" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#374151">K8s HPA on CPU &#62; 60%</text>

  <rect x="665" y="305" width="185" height="30" rx="4" fill="#ffffff" stroke="#a855f7" stroke-width="1"/>
  <text x="757" y="324" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#374151">p99 latency &#62; 50ms trigger</text>

  <!-- Geographic Distribution -->
  <rect x="30" y="375" width="410" height="150" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="235" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#155e75">Geographic Distribution</text>

  <rect x="50" y="420" width="100" height="40" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="100" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#155e75">us-east</text>
  <text x="100" y="453" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">N. Virginia</text>

  <rect x="160" y="420" width="100" height="40" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="210" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#155e75">eu-west</text>
  <text x="210" y="453" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Ireland</text>

  <rect x="270" y="420" width="100" height="40" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="320" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#155e75">ap-south</text>
  <text x="320" y="453" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Mumbai</text>

  <rect x="380" y="420" width="50" height="40" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="405" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#155e75">...</text>

  <rect x="50" y="470" width="350" height="40" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="225" y="493" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#155e75">Route users to nearest region via DNS-based geo routing</text>

  <!-- Key Metrics -->
  <rect x="470" y="375" width="400" height="150" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#9f1239">Scaling Metrics &#38; Targets</text>

  <rect x="485" y="420" width="170" height="35" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="570" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9f1239">Cache Hit Rate</text>
  <text x="570" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Target: &#62; 90%</text>

  <rect x="665" y="420" width="185" height="35" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="757" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9f1239">RPS per Instance</text>
  <text x="757" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Target: 10,000+</text>

  <rect x="485" y="465" width="170" height="35" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="570" y="483" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9f1239">p99 Latency</text>
  <text x="570" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Target: &#60; 100ms</text>

  <rect x="665" y="465" width="185" height="35" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="757" y="483" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9f1239">DB Size</text>
  <text x="757" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">IP DB: ~10GB (fits in RAM)</text>

  <!-- Summary -->
  <rect x="30" y="520" width="840" height="25" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="120" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">Scaling Principles:</text>
  <text x="250" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Cache IP lookups aggressively</text>
  <text x="470" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Geo DB fits in memory, replicate reads</text>
  <text x="700" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Multi-region for low-latency access</text>
</svg>