<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Event Schema Design and Versioning</text>

  <!-- Event structure -->
  <rect x="40" y="70" width="400" height="200" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e40af">Event Structure</text>
  <rect x="60" y="115" width="360" height="30" rx="5" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Context (who, where, when)</text>
  <text x="80" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">user_id, session_id, device_id, timestamp, geo, app_version</text>
  <rect x="60" y="170" width="360" height="30" rx="5" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Event (what happened)</text>
  <text x="80" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">event_type, event_id, properties (key-value pairs)</text>
  <rect x="60" y="225" width="360" height="30" rx="5" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Metadata (provenance)</text>
  <text x="80" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">schema_version, source_sdk, ingestion_timestamp</text>

  <!-- Schema evolution -->
  <rect x="460" y="70" width="400" height="200" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#166534">Schema Evolution Rules</text>
  <rect x="480" y="115" width="360" height="35" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Adding fields: backward compatible (old consumers ignore new fields)</text>
  <rect x="480" y="157" width="360" height="35" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="179" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Removing fields: mark deprecated, keep for transition period</text>
  <rect x="480" y="199" width="360" height="35" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="221" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Renaming fields: add new name, keep old as alias, migrate gradually</text>
  <rect x="480" y="241" width="360" height="20" rx="3" fill="#f0fdf4"/>
  <text x="660" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#166534">Never break existing consumers with schema changes</text>

  <!-- Data quality pipeline -->
  <rect x="40" y="300" width="820" height="100" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="450" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#a16207">Data Quality Pipeline</text>
  <rect x="60" y="345" width="180" height="40" rx="6" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="150" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Validate against schema</text>
  <text x="150" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#a16207">Reject malformed events</text>
  <rect x="260" y="345" width="180" height="40" rx="6" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="350" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Deduplicate events</text>
  <text x="350" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#a16207">event_id + idempotency key</text>
  <rect x="460" y="345" width="180" height="40" rx="6" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="550" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Enrich with context</text>
  <text x="550" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#a16207">session, geo, user profile</text>
  <rect x="660" y="345" width="180" height="40" rx="6" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="750" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Monitor completeness</text>
  <text x="750" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#a16207">loss budget, alerting</text>

  <!-- Key principle -->
  <rect x="40" y="425" width="820" height="60" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Schema Evolution Principle</text>
  <text x="450" y="473" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#475569">Design schemas for forward and backward compatibility. Old clients must work with new schemas, and new clients must work with old events.</text>
</svg>
