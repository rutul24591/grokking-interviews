<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Media Processing Service Architecture</text>

  <!-- Upload Source -->
  <rect x="30" y="65" width="180" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Upload Source</text>
  <text x="120" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">User Upload</text>
  <text x="120" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Ingestion Pipeline</text>

  <!-- Processing Queue -->
  <rect x="240" y="65" width="180" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#166534">Processing Queue</text>
  <text x="330" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">SQS / Kafka / Redis</text>
  <text x="330" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Priority by media type</text>

  <!-- Transcoder Workers -->
  <rect x="450" y="65" width="200" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Transcoder Workers</text>
  <text x="550" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">FFmpeg / ImageMagick</text>
  <text x="550" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">GPU/CPU Auto-scaling</text>

  <!-- Output Storage -->
  <rect x="680" y="65" width="190" height="80" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="775" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#6b21a8">Output Storage</text>
  <text x="775" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Multi-format variants</text>
  <text x="775" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">CDN-ready structure</text>

  <!-- Processing Pipeline Detail -->
  <rect x="30" y="180" width="540" height="200" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Media Processing Pipeline Steps</text>

  <!-- Step boxes -->
  <rect x="50" y="230" width="100" height="60" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="100" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">1. Validate</text>
  <text x="100" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Format check</text>
  <text x="100" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Size limit</text>

  <line x1="150" y1="260" x2="170" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="170" y="230" width="100" height="60" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="220" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">2. Analyze</text>
  <text x="220" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Dimensions</text>
  <text x="220" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Codec, bitrate</text>

  <line x1="270" y1="260" x2="290" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="290" y="230" width="100" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">3. Transcode</text>
  <text x="340" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Resize, re-encode</text>
  <text x="340" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Multi-variant output</text>

  <line x1="390" y1="260" x2="410" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="410" y="230" width="100" height="60" rx="4" fill="#faf5ff" stroke="#a855f7" stroke-width="1"/>
  <text x="460" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#6b21a8">4. Thumbnail</text>
  <text x="460" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Generate previews</text>
  <text x="460" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">at multiple sizes</text>

  <line x1="510" y1="260" x2="530" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="530" y="230" width="30" height="60" rx="4" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="545" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#155e75">...</text>

  <!-- Video vs Image Pipeline -->
  <rect x="30" y="400" width="260" height="120" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#155e75">Video Processing Pipeline</text>
  <text x="160" y="452" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">HLS/DASH adaptive bitrate</text>
  <text x="160" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Multiple resolutions (360p-4K)</text>
  <text x="160" y="484" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Audio track extraction</text>
  <text x="160" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Subtitle/caption generation</text>

  <rect x="320" y="400" width="260" height="120" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#9f1239">Image Processing Pipeline</text>
  <text x="450" y="452" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Resize to standard sizes</text>
  <text x="450" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Format conversion (WebP, AVIF)</text>
  <text x="450" y="484" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Compression optimization</text>
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Metadata stripping</text>

  <rect x="610" y="400" width="260" height="120" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="740" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#0c4a6e">Audio Processing Pipeline</text>
  <text x="740" y="452" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Transcode to AAC/Opus/MP3</text>
  <text x="740" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Waveform generation</text>
  <text x="740" y="484" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Noise reduction</text>
  <text x="740" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Loudness normalization</text>

  <!-- Arrows -->
  <line x1="210" y1="105" x2="240" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="105" x2="450" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="650" y1="105" x2="680" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>