<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Session Management Failure Modes</title>
  <desc id="desc">Session management failure modes: session fixation, token theft, revocation delay, and refresh storms</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Session Management Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Session fixation, token theft, revocation delay, and refresh storms</text>
  
  <!-- Session Fixation -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="#ef4444" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">1. Session Fixation</text>
  
  <!-- Fixation scenario -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <!-- Attacker sets session -->
  <rect x="60" y="150" width="140" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="130" y="175" text-anchor="middle" font-size="9" fill="white">Attacker</text>
  <text x="130" y="190" text-anchor="middle" font-size="8" fill="#fca5a5">Sets session ID</text>
  
  <line x1="205" y1="180" x2="235" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="170" text-anchor="middle" font-size="7" fill="#64748b">Victim logs in</text>
  
  <!-- Victim uses -->
  <rect x="245" y="150" width="140" height="60" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <text x="315" y="175" text-anchor="middle" font-size="9" fill="white">Victim</text>
  <text x="315" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">Uses same session</text>
  
  <text x="235" y="290" text-anchor="middle" font-size="10" fill="#ef4444">Attacker hijacks authenticated session!</text>
  <text x="235" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: Session ID not regenerated on login</text>
  <text x="235" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: Regenerate session ID on auth state change</text>
  
  <!-- Token Theft -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">2. Token Theft (XSS)</text>
  
  <!-- Theft scenario -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  
  <!-- XSS attack -->
  <rect x="490" y="150" width="120" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="550" y="175" text-anchor="middle" font-size="9" fill="white">XSS Attack</text>
  <text x="550" y="190" text-anchor="middle" font-size="8" fill="#fca5a5">Malicious script</text>
  
  <line x1="615" y1="180" x2="645" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="630" y="170" text-anchor="middle" font-size="7" fill="#ef4444">Steals</text>
  
  <!-- Token stolen -->
  <rect x="655" y="150" width="120" height="60" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="715" y="175" text-anchor="middle" font-size="9" fill="white">Access Token</text>
  <text x="715" y="190" text-anchor="middle" font-size="8" fill="#fcd34d">From localStorage</text>
  
  <line x1="780" y1="180" x2="810" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="795" y="170" text-anchor="middle" font-size="7" fill="#ef4444">Impersonates</text>
  
  <!-- Attacker uses -->
  <rect x="820" y="150" width="20" height="60" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="830" y="180" text-anchor="middle" font-size="10" fill="white">!</text>
  
  <text x="665" y="290" text-anchor="middle" font-size="10" fill="#ef4444">Attacker impersonates user!</text>
  <text x="665" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: Token in localStorage, no httpOnly</text>
  <text x="665" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: httpOnly cookies, CSP, short token TTL</text>
  
  <!-- Revocation Delay -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#8b5cf6">3. Revocation Delay</text>
  
  <!-- Delay scenario -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  
  <!-- User logs out -->
  <rect x="60" y="395" width="140" height="60" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
  <text x="130" y="420" text-anchor="middle" font-size="9" fill="white">User Logs Out</text>
  <text x="130" y="435" text-anchor="middle" font-size="8" fill="#c4b5fd">Session revoked</text>
  
  <line x1="205" y1="425" x2="235" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="220" y="415" text-anchor="middle" font-size="7" fill="#ef4444">JWT still valid</text>
  
  <!-- Attacker uses -->
  <rect x="245" y="395" width="140" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="315" y="420" text-anchor="middle" font-size="9" fill="white">Stolen JWT</text>
  <text x="315" y="435" text-anchor="middle" font-size="8" fill="#fca5a5">Still works!</text>
  
  <text x="235" y="495" text-anchor="middle" font-size="10" fill="#ef4444">Logout doesn't invalidate immediately!</text>
  <text x="235" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: Long-lived JWT, no revocation list</text>
  <text x="235" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Short JWT TTL, revocation list, opaque tokens</text>
  
  <!-- Refresh Storm -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">4. Refresh Token Storm</text>
  
  <!-- Storm scenario -->
  <rect x="480" y="380" width="370" height="140" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  
  <!-- Many clients -->
  <rect x="490" y="395" width="120" height="60" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <text x="550" y="420" text-anchor="middle" font-size="9" fill="white">Many Clients</text>
  <text x="550" y="435" text-anchor="middle" font-size="8" fill="#bfdbfe">Same user</text>
  
  <line x1="615" y1="425" x2="645" y2="425" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="415" text-anchor="middle" font-size="7" fill="#64748b">All refresh at</text>
  
  <!-- Same time -->
  <rect x="655" y="395" width="120" height="60" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="715" y="420" text-anchor="middle" font-size="9" fill="white">Same Time</text>
  <text x="715" y="435" text-anchor="middle" font-size="8" fill="#fcd34d">Token expires</text>
  
  <line x1="780" y1="425" x2="810" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="795" y="415" text-anchor="middle" font-size="7" fill="#ef4444">Overloads</text>
  
  <!-- Auth service -->
  <rect x="820" y="395" width="20" height="60" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="830" y="425" text-anchor="middle" font-size="10" fill="white">!</text>
  
  <text x="665" y="495" text-anchor="middle" font-size="10" fill="#ef4444">Auth service overloaded by refresh!</text>
  <text x="665" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: Synchronized token expiry</text>
  <text x="665" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Jitter token TTL, stagger refresh</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
