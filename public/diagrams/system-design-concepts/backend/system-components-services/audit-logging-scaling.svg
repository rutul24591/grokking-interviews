<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Scaling Strategies: Partitioning, Sharding &amp; Retention</text>
  <text x="450" y="56" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="normal" fill="#555555">Horizontal scaling through partitioning with lifecycle-managed retention tiers</text>

  <!-- PARTITIONING section -->
  <text x="225" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">Time-Based Partitioning</text>

  <!-- Partition boxes -->
  <rect x="30" y="118" width="110" height="60" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
  <text x="85" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Partition</text>
  <text x="85" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#555555">2026-04-01</text>
  <text x="85" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#555555">~2M events</text>

  <rect x="150" y="118" width="110" height="60" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
  <text x="205" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Partition</text>
  <text x="205" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#555555">2026-04-02</text>
  <text x="205" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#555555">~2.1M events</text>

  <rect x="270" y="118" width="110" height="60" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="1.5"/>
  <text x="325" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Partition</text>
  <text x="325" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#555555">2026-04-03</text>
  <text x="325" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#555555">~1.9M events</text>

  <rect x="390" y="118" width="110" height="60" rx="6" fill="#fff3e0" stroke="#f5a623" stroke-width="2"/>
  <text x="445" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Active</text>
  <text x="445" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#555555">2026-04-04</text>
  <text x="445" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#555555">~800K events</text>

  <!-- SHARDING section -->
  <text x="225" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">Multi-Tenant Sharding</text>

  <!-- Tenant shards -->
  <rect x="30" y="250" width="180" height="100" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="120" y="272" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Shard A: Tenant Org-1</text>
  <text x="45" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Dedicated index + storage</text>
  <text x="45" y="307" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Isolated compute resources</text>
  <text x="45" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">500GB / 30-day retention</text>
  <text x="45" y="337" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#4caf50">Query latency: &lt;200ms</text>

  <rect x="230" y="250" width="180" height="100" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="320" y="272" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Shard B: Tenant Org-2</text>
  <text x="245" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Dedicated index + storage</text>
  <text x="245" y="307" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Isolated compute resources</text>
  <text x="245" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">1.2TB / 90-day retention</text>
  <text x="245" y="337" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#4caf50">Query latency: &lt;350ms</text>

  <rect x="430" y="250" width="180" height="100" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="520" y="272" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Shard C: Tenant Org-3</text>
  <text x="445" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Dedicated index + storage</text>
  <text x="445" y="307" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Isolated compute resources</text>
  <text x="445" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">200GB / 7-day retention</text>
  <text x="445" y="337" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#4caf50">Query latency: &lt;150ms</text>

  <!-- RETENTION TIERS section -->
  <text x="680" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a2e">Retention Tiers</text>

  <!-- Hot tier -->
  <rect x="630" y="118" width="240" height="55" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
  <text x="750" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Hot (0-7 days)</text>
  <text x="750" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#555555">NVMe SSD, sub-100ms queries, highest cost</text>

  <!-- Warm tier -->
  <rect x="630" y="185" width="240" height="55" rx="6" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="750" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Warm (7-90 days)</text>
  <text x="750" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#555555">Standard SSD, sub-500ms queries, moderate cost</text>

  <!-- Cold tier -->
  <rect x="630" y="252" width="240" height="55" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/>
  <text x="750" y="274" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Cold (90 days-7 yrs)</text>
  <text x="750" y="292" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#555555">S3 Glacier / Archive, minutes to restore, lowest cost</text>

  <!-- Expired -->
  <rect x="630" y="319" width="240" height="55" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1.5"/>
  <text x="750" y="341" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">Expired (after retention)</text>
  <text x="750" y="359" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#555555">Secure deletion, certificate of destruction logged</text>

  <!-- Arrows between tiers -->
  <line x1="750" y1="173" x2="750" y2="185" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="750" y1="240" x2="750" y2="252" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="750" y1="307" x2="750" y2="319" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Bottom: Trade-off summary -->
  <rect x="30" y="400" width="840" height="130" rx="8" fill="#f0f4f8" stroke="#c8d6e5" stroke-width="1.5"/>
  <text x="450" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Scaling Trade-offs Summary</text>

  <text x="50" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Partition by time:</text>
  <text x="210" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Simple to reason about, but hot partitions get disproportionate write load. Mitigation: sub-partition by tenant within each day.</text>

  <text x="50" y="472" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Shard by tenant:</text>
  <text x="185" y="472" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Isolates noisy neighbors, enables per-tenant SLAs, but increases operational overhead (N indices to manage).</text>

  <text x="50" y="494" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Tiered retention:</text>
  <text x="190" y="494" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Reduces cost 60-80%, but cold data queries require restoration lead time. Compliance rules dictate minimum retention per jurisdiction.</text>

  <text x="50" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Hybrid approach:</text>
  <text x="165" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Combine time partitions + tenant shards + tiered retention. Most production systems use this; complexity is in lifecycle automation.</text>
</svg>