<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Notification Service &#8212; Failure Modes &#38; Recovery</text>

  <!-- Failure Mode 1: Provider Down -->
  <rect x="30" y="65" width="270" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 1: Email Provider Outage</text>

  <rect x="45" y="110" width="240" height="28" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="165" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">SendGrid/SES API returns 5xx errors</text>

  <rect x="45" y="145" width="115" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="102" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Failover to backup</text>
  <text x="102" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">circuit breaker opens</text>

  <rect x="170" y="145" width="115" height="28" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="227" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9a3412">Risk: queue backup</text>
  <text x="227" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">slower backup provider</text>

  <!-- Failure Mode 2: Push Token Expired -->
  <rect x="330" y="65" width="270" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 2: Stale Push Tokens</text>

  <rect x="345" y="110" width="240" height="28" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="465" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">User uninstalled app, token invalidated</text>

  <rect x="345" y="145" width="115" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="402" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Clean token on 410</text>
  <text x="402" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">remove from DB</text>

  <rect x="470" y="145" width="115" height="28" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="527" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9a3412">Risk: wasted API calls</text>
  <text x="527" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">FCM penalizes high fail rate</text>

  <!-- Failure Mode 3: SMS Delivery Failure -->
  <rect x="630" y="65" width="240" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 3: SMS Carrier Rejection</text>

  <rect x="645" y="110" width="210" height="28" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="750" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Carrier flags content as spam, blocks delivery</text>

  <rect x="645" y="145" width="100" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="695" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Review content</text>
  <text x="695" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">use approved templates</text>

  <rect x="755" y="145" width="100" height="28" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="805" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9a3412">Risk: number blocked</text>
  <text x="805" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">by carrier permanently</text>

  <!-- Bounce Handling -->
  <rect x="30" y="220" width="420" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">Bounce &#38; Complaint Handling</text>

  <rect x="50" y="270" width="380" height="28" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Webhook from provider notifies of bounces and spam complaints</text>

  <rect x="50" y="308" width="180" height="38" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Hard Bounce</text>
  <text x="140" y="341" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Remove email permanently</text>

  <rect x="250" y="308" width="180" height="38" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">Soft Bounce</text>
  <text x="340" y="341" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Retry 3x, then suppress</text>

  <rect x="50" y="355" width="180" height="38" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="140" y="373" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Spam Complaint</text>
  <text x="140" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Unsubscribe immediately</text>

  <rect x="250" y="355" width="180" height="38" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="340" y="373" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Add to suppression list</text>
  <text x="340" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">block all future sends</text>

  <!-- Webhook Processing -->
  <rect x="480" y="220" width="390" height="140" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Webhook Processing Pipeline</text>

  <rect x="495" y="270" width="360" height="28" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="675" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Provider webhooks processed asynchronously via message queue</text>

  <rect x="495" y="308" width="170" height="38" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="580" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Validate Webhook</text>
  <text x="580" y="341" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">verify signature</text>

  <rect x="680" y="308" width="175" height="38" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="767" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Update Delivery Status</text>
  <text x="767" y="341" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">mark delivered/bounced</text>

  <!-- Retry Queue Recovery -->
  <rect x="30" y="390" width="420" height="130" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Retry Queue for Failed Deliveries</text>

  <rect x="50" y="440" width="380" height="28" rx="4" fill="#fefce8" stroke="#f59e0b" stroke-width="1"/>
  <text x="240" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Failed notifications re-queued with exponential backoff</text>

  <rect x="50" y="478" width="115" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="107" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Retry 1: 1min</text>

  <rect x="175" y="478" width="115" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="232" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Retry 2: 5min</text>

  <rect x="300" y="478" width="130" height="30" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="365" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Retry 3: 30min</text>

  <rect x="50" y="515" width="380" height="28" rx="4" fill="#fff1f2" stroke="#ef4444" stroke-width="1"/>
  <text x="240" y="533" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">After 3 retries: move to DLQ for manual review</text>

  <!-- Key Metrics -->
  <rect x="480" y="390" width="390" height="130" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#155e75">Monitoring Alerts</text>

  <rect x="495" y="440" width="170" height="28" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="580" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#155e75">Delivery rate &#60; 95%</text>

  <rect x="680" y="440" width="175" height="28" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="767" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#155e75">Bounce rate &#62; 5%</text>

  <rect x="495" y="478" width="170" height="28" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="580" y="496" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#155e75">Queue depth growing</text>

  <rect x="680" y="478" width="175" height="28" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="767" y="496" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#155e75">Provider error rate spike</text>

  <!-- Bottom -->
  <rect x="30" y="520" width="840" height="25" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="120" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">Resilience Pattern:</text>
  <text x="230" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Multi-provider failover + circuit breakers + bounce handling + retry queue</text>
  <text x="680" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">DLQ for permanent failures</text>
</svg>