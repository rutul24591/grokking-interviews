<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Analytics Failure Modes: Data Loss and Integrity</text>

  <!-- Failure Mode 1: Event Loss -->
  <rect x="40" y="70" width="400" height="180" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">Event Loss During Ingestion</text>
  <rect x="60" y="115" width="360" height="30" rx="5" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Cause: Ingestion service overloaded, network partition</text>
  <rect x="60" y="152" width="360" height="30" rx="5" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Impact: Incomplete data, biased metrics, wrong decisions</text>
  <rect x="60" y="189" width="360" height="30" rx="5" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="209" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Mitigation: Client-side buffering, retry with backoff, loss budget</text>
  <rect x="60" y="226" width="360" height="15" rx="3" fill="#fef2f2"/>
  <text x="240" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#991b1b">Monitor: event volume vs expected, gap detection alerts</text>

  <!-- Failure Mode 2: Duplicate Events -->
  <rect x="460" y="70" width="400" height="180" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a16207">Duplicate Event Ingestion</text>
  <rect x="480" y="115" width="360" height="30" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="660" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Cause: Client retries on timeout, network retransmission</text>
  <rect x="480" y="152" width="360" height="30" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="660" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Impact: Inflated counts, wrong conversion rates, false trends</text>
  <rect x="480" y="189" width="360" height="30" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="660" y="209" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Mitigation: Idempotency keys, dedup window, exactly-once processing</text>
  <rect x="480" y="226" width="360" height="15" rx="3" fill="#fefce8"/>
  <text x="660" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#a16207">Monitor: duplicate detection rate, idempotency hit ratio</text>

  <!-- Failure Mode 3: Schema Drift -->
  <rect x="40" y="280" width="400" height="180" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">Schema Drift and Incompatibility</text>
  <rect x="60" y="325" width="360" height="30" rx="5" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="240" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Cause: Client sends new fields, consumer expects old schema</text>
  <rect x="60" y="362" width="360" height="30" rx="5" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="240" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Impact: Parsing failures, dropped events, silent data corruption</text>
  <rect x="60" y="399" width="360" height="30" rx="5" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="240" y="419" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Mitigation: Schema registry, backward-compatible evolution, validation</text>
  <rect x="60" y="436" width="360" height="15" rx="3" fill="#ecfdf5"/>
  <text x="240" y="447" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#166534">Monitor: schema validation failure rate, rejected event volume</text>

  <!-- Failure Mode 4: Clock Skew -->
  <rect x="460" y="280" width="400" height="180" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="660" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Clock Skew and Timestamp Issues</text>
  <rect x="480" y="325" width="360" height="30" rx="5" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Cause: Device clocks out of sync, timezone confusion</text>
  <rect x="480" y="362" width="360" height="30" rx="5" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Impact: Wrong session boundaries, incorrect daily aggregates</text>
  <rect x="480" y="399" width="360" height="30" rx="5" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="419" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Mitigation: Server-side timestamps, NTP sync, clock skew tolerance</text>
  <rect x="480" y="436" width="360" height="15" rx="3" fill="#faf5ff"/>
  <text x="660" y="447" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b21a8">Monitor: timestamp delta distribution, out-of-order event rate</text>
</svg>
