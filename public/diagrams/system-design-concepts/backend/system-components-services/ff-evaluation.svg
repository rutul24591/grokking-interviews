<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Flag Evaluation Flow &#8212; Local Evaluation with Context</text>

  <!-- Step 1: Request Context -->
  <rect x="30" y="65" width="170" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="115" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Step 1: Request</text>
  <text x="115" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Context: userId, tenant,</text>
  <text x="115" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">geo, device, custom attrs</text>

  <!-- Step 2: Local Cache -->
  <rect x="230" y="65" width="170" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="315" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#166534">Step 2: Local Cache</text>
  <text x="315" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">In-memory flag config</text>
  <text x="315" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Updated via polling/streaming</text>

  <!-- Step 3: Rule Matching -->
  <rect x="430" y="65" width="170" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Step 3: Rule Matching</text>
  <text x="515" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">1. Explicit targeting</text>
  <text x="515" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">2. Segment membership</text>

  <!-- Step 4: Percentage Check -->
  <rect x="630" y="65" width="170" height="80" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="715" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#6b21a8">Step 4: Percentage Rollout</text>
  <text x="715" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">hash(flagKey, userId)</text>
  <text x="715" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Consistent hash &#8594; bucket</text>

  <!-- Step 5: Decision -->
  <rect x="30" y="185" width="250" height="90" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="155" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#155e75">Step 5: Decision Returned</text>
  <text x="155" y="238" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">variant: "control" | "treatment"</text>
  <text x="155" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">reason: "rule_match" | "default"</text>
  <text x="155" y="272" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">eval time: &#60; 1ms (in-process)</text>

  <!-- Step 6: Exposure Logging -->
  <rect x="310" y="185" width="250" height="90" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2" filter="url(#shadow)"/>
  <text x="435" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#9f1239">Step 6: Async Exposure Logging</text>
  <text x="435" y="238" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Batch events (50-100 or timer)</text>
  <text x="435" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">flagKey, variant, userId, timestamp</text>
  <text x="435" y="272" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Non-blocking, fire-and-forget</text>

  <!-- Step 7: Analytics -->
  <rect x="590" y="185" width="250" height="90" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="715" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#0c4a6e">Step 7: Analytics Pipeline</text>
  <text x="715" y="238" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">A/B test analysis dashboard</text>
  <text x="715" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Flag usage monitoring</text>
  <text x="715" y="272" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Exposure auditing &amp; compliance</text>

  <!-- Default Value Path -->
  <rect x="830" y="65" width="50" height="80" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="855" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Default</text>
  <text x="855" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Cache</text>
  <text x="855" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Miss</text>

  <!-- Arrows top row -->
  <line x1="200" y1="105" x2="230" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="105" x2="430" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="105" x2="630" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="800" y1="105" x2="830" y2="105" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowred)"/>

  <!-- Arrows to bottom row -->
  <line x1="515" y1="145" x2="515" y2="185" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="155" y1="145" x2="155" y2="185" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="715" y1="145" x2="715" y2="185" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="855" y1="145" x2="855" y2="230" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowred)"/>

  <!-- Bottom row arrows -->
  <line x1="280" y1="230" x2="310" y2="230" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="230" x2="590" y2="230" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision Tree Box -->
  <rect x="30" y="320" width="420" height="200" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Evaluation Decision Tree (Ordered Priority)</text>

  <!-- Decision boxes -->
  <rect x="50" y="370" width="380" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="240" y="392" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Priority 1: Explicit Targeting (allowlist/denylist)</text>

  <line x1="240" y1="405" x2="240" y2="420" stroke="#64748b" stroke-width="1.5"/>

  <rect x="50" y="420" width="380" height="35" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="240" y="442" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Priority 2: Segment Membership (beta, internal, geo)</text>

  <line x1="240" y1="455" x2="240" y2="470" stroke="#64748b" stroke-width="1.5"/>

  <rect x="50" y="470" width="380" height="35" rx="4" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="240" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6b21a8">Priority 3: Percentage Rollout (consistent hashing)</text>

  <!-- No match path -->
  <line x1="430" y1="487" x2="600" y2="487" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowred)"/>

  <rect x="600" y="465" width="140" height="45" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="670" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">No Match &#8594; Default</text>

  <!-- Cache Refresh Flow -->
  <rect x="480" y="320" width="390" height="110" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#166534">Cache Refresh Mechanisms</text>

  <rect x="495" y="365" width="170" height="50" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="580" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">Polling</text>
  <text x="580" y="402" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Every 30s-5min</text>

  <rect x="685" y="365" width="170" height="50" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="770" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">Streaming (SSE)</text>
  <text x="770" y="402" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#374151">Real-time push</text>

  <line x1="675" y1="425" x2="675" y2="415" stroke="#64748b" stroke-width="1"/>
  <line x1="580" y1="415" x2="770" y2="415" stroke="#64748b" stroke-width="1"/>

  <rect x="590" y="415" width="170" height="40" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="675" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">CDN Edge Cache (TTL)</text>

  <!-- Key Metrics -->
  <rect x="480" y="450" width="390" height="70" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#155e75">Key Performance Metrics</text>
  <text x="520" y="498" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Eval latency: &#60; 1ms</text>
  <text x="670" y="498" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Cache hit: ~100%</text>
  <text x="800" y="498" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Staleness: 30s-5min</text>
</svg>