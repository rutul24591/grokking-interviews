<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Geolocation Resolution Methods &#38; Accuracy Hierarchy</text>

  <!-- Accuracy Pyramid -->
  <text x="450" y="75" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Resolution Accuracy Hierarchy (Most to Least Accurate)</text>

  <!-- GPS -->
  <polygon points="380,100 520,100 500,140 400,140" fill="#22c55e" stroke="#166534" stroke-width="2"/>
  <text x="450" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">GPS</text>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#ffffff">3-10m accuracy</text>

  <!-- Cell Tower -->
  <polygon points="340,145 560,145 540,185 360,185" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="450" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Cell Tower Triangulation</text>
  <text x="450" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#ffffff">100-1000m accuracy</text>

  <!-- WiFi -->
  <polygon points="300,190 600,190 580,230 320,230" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
  <text x="450" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">WiFi Positioning (CSS)</text>
  <text x="450" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#ffffff">10-50m accuracy</text>

  <!-- IP Geolocation -->
  <polygon points="250,235 650,235 630,280 270,280" fill="#a855f7" stroke="#6b21a8" stroke-width="2"/>
  <text x="450" y="258" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">IP Geolocation Database</text>
  <text x="450" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#ffffff">1-50km accuracy (city-level)</text>

  <!-- Fallback: ISP -->
  <polygon points="200,285 700,285 680,330 220,330" fill="#ef4444" stroke="#991b1b" stroke-width="2"/>
  <text x="450" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">ISP Registry Data (Fallback)</text>
  <text x="450" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="normal" fill="#ffffff">Regional accuracy, often incorrect</text>

  <!-- Resolution Details -->
  <rect x="30" y="360" width="260" height="170" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#166534">GPS Resolution</text>
  <text x="160" y="412" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Satellite signals (24+ sats)</text>
  <text x="160" y="428" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Trilateration from 4+ satellites</text>
  <text x="160" y="444" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">A-GPS: assisted via cell network</text>
  <text x="160" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Requires clear sky visibility</text>
  <text x="160" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Battery: high drain</text>
  <text x="160" y="496" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Time-to-fix: 10-60 seconds</text>

  <rect x="320" y="360" width="260" height="170" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">IP Geolocation</text>
  <text x="450" y="412" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">IP &#8594; ISP assignment lookup</text>
  <text x="450" y="428" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Based on ISP registry data</text>
  <text x="450" y="444" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Often maps to ISP HQ, not user</text>
  <text x="450" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">VPN/proxy: returns exit node loc</text>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Battery: no drain (server-side)</text>
  <text x="450" y="496" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Time-to-fix: instant (DB lookup)</text>

  <rect x="610" y="360" width="260" height="170" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="740" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">WiFi Positioning</text>
  <text x="740" y="412" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Scan nearby WiFi BSSIDs</text>
  <text x="740" y="428" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Match against known AP database</text>
  <text x="740" y="444" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Signal strength triangulation</text>
  <text x="740" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Works indoors (unlike GPS)</text>
  <text x="740" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Battery: moderate drain</text>
  <text x="740" y="496" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Time-to-fix: 1-5 seconds</text>

  <!-- Spatial Indexing -->
  <rect x="30" y="520" width="840" height="25" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="120" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">Spatial Indexing:</text>
  <text x="230" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">S2 Geometry (Google) or H3 (Uber) for hierarchical spatial indexing</text>
  <text x="570" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Geohash for URL-friendly encoding</text>
</svg>