<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Notification Service Failure Modes</title>
  <desc id="desc">Notification service failure modes: notification storms, duplicate sends, provider outages, and preference bypass</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Notification Service Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Notification storms, duplicate sends, provider outages, and preference bypass</text>
  
  <!-- Notification Storm -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="#ef4444" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">1. Notification Storm</text>
  
  <!-- Storm scenario -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <!-- Bug triggers -->
  <rect x="60" y="150" width="140" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="130" y="175" text-anchor="middle" font-size="9" fill="white">Bug in Code</text>
  <text x="130" y="190" text-anchor="middle" font-size="8" fill="#fca5a5">Infinite loop</text>
  
  <line x1="205" y1="180" x2="235" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="220" y="170" text-anchor="middle" font-size="7" fill="#ef4444">Spams</text>
  
  <!-- User receives -->
  <rect x="245" y="150" width="140" height="60" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="1"/>
  <text x="315" y="175" text-anchor="middle" font-size="9" fill="white">User Gets</text>
  <text x="315" y="190" text-anchor="middle" font-size="8" fill="#fcd34d">1000 emails!</text>
  
  <text x="235" y="290" text-anchor="middle" font-size="10" fill="#ef4444">Users overwhelmed, mass unsubscribe!</text>
  <text x="235" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: No rate limiting, bug in trigger</text>
  <text x="235" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: Per-user caps, circuit breakers, alerts</text>
  
  <!-- Duplicate Sends -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">2. Duplicate Sends</text>
  
  <!-- Duplicate scenario -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  
  <!-- Event retry -->
  <rect x="490" y="150" width="120" height="60" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <text x="550" y="175" text-anchor="middle" font-size="9" fill="white">Event Retry</text>
  <text x="550" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">Network timeout</text>
  
  <line x1="615" y1="180" x2="645" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="630" y="170" text-anchor="middle" font-size="7" fill="#ef4444">No dedup</text>
  
  <!-- Sent twice -->
  <rect x="655" y="150" width="100" height="25" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="1"/>
  <text x="705" y="168" text-anchor="middle" font-size="7" fill="white">Send 1</text>
  
  <rect x="655" y="180" width="100" height="25" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="1"/>
  <text x="705" y="198" text-anchor="middle" font-size="7" fill="white">Send 2</text>
  
  <line x1="760" y1="180" x2="790" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="775" y="170" text-anchor="middle" font-size="7" fill="#ef4444">User gets</text>
  
  <!-- User annoyed -->
  <rect x="800" y="150" width="40" height="60" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="820" y="180" text-anchor="middle" font-size="10" fill="white">2x</text>
  
  <text x="665" y="290" text-anchor="middle" font-size="10" fill="#ef4444">User receives same notification twice!</text>
  <text x="665" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: No idempotency key, event replay</text>
  <text x="665" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: Idempotency keys, dedup window</text>
  
  <!-- Provider Outage -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#8b5cf6">3. Provider Outage</text>
  
  <!-- Outage scenario -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  
  <!-- Notifications queued -->
  <rect x="60" y="395" width="140" height="60" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
  <text x="130" y="420" text-anchor="middle" font-size="9" fill="white">Notifications</text>
  <text x="130" y="435" text-anchor="middle" font-size="8" fill="#c4b5fd">10K queued</text>
  
  <line x1="205" y1="425" x2="235" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="220" y="415" text-anchor="middle" font-size="7" fill="#ef4444">Provider</text>
  
  <!-- Provider down -->
  <rect x="245" y="395" width="140" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="315" y="420" text-anchor="middle" font-size="9" fill="white">SendGrid DOWN</text>
  <text x="315" y="435" text-anchor="middle" font-size="8" fill="#fca5a5">503 errors</text>
  
  <text x="235" y="495" text-anchor="middle" font-size="10" fill="#ef4444">Critical notifications delayed!</text>
  <text x="235" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: Single provider, no fallback</text>
  <text x="235" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Multi-provider, failover, queue persistence</text>
  
  <!-- Preference Bypass -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">4. Preference Bypass</text>
  
  <!-- Bypass scenario -->
  <rect x="480" y="380" width="370" height="140" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  
  <!-- User opted out -->
  <rect x="490" y="395" width="120" height="60" rx="4" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="550" y="420" text-anchor="middle" font-size="9" fill="white">User Opted Out</text>
  <text x="550" y="435" text-anchor="middle" font-size="8" fill="#6ee7b7">No marketing</text>
  
  <line x1="615" y1="425" x2="645" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="630" y="415" text-anchor="middle" font-size="7" fill="#ef4444">Bug skips</text>
  
  <!-- Sent anyway -->
  <rect x="655" y="395" width="120" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="715" y="420" text-anchor="middle" font-size="9" fill="white">Sent Anyway</text>
  <text x="715" y="435" text-anchor="middle" font-size="8" fill="#fca5a5">Preference ignored</text>
  
  <line x1="780" y1="425" x2="810" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="795" y="415" text-anchor="middle" font-size="7" fill="#ef4444">Complaint</text>
  
  <!-- User complains -->
  <rect x="820" y="395" width="20" height="60" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="830" y="425" text-anchor="middle" font-size="10" fill="white">!</text>
  
  <text x="665" y="495" text-anchor="middle" font-size="10" fill="#ef4444">User complains, legal risk!</text>
  <text x="665" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: Preference check bypassed, bug</text>
  <text x="665" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Central preference service, audit logs</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
