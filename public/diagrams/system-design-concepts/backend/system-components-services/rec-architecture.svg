<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <rect width="900" height="550" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Recommendation Engine Architecture</text>
  <!-- Data Sources -->
  <rect x="40" y="70" width="240" height="130" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1e40af">Data Sources</text>
  <rect x="60" y="115" width="200" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="160" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">User interactions (clicks, views)</text>
  <rect x="60" y="145" width="200" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="160" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Item catalog (metadata, features)</text>
  <rect x="60" y="175" width="200" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="160" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Context (time, device, location)</text>
  <!-- Feature Store -->
  <rect x="310" y="70" width="240" height="130" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">Feature Store</text>
  <rect x="330" y="115" width="200" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="430" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">User embeddings, item embeddings</text>
  <rect x="330" y="145" width="200" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="430" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Behavioral features (history, trends)</text>
  <rect x="330" y="175" width="200" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="430" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Real-time + batch feature computation</text>
  <!-- Model Serving -->
  <rect x="580" y="70" width="280" height="130" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="720" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a16207">Model Serving Tier</text>
  <rect x="600" y="115" width="240" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="720" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Retrieval: candidate generation (10K &#8594; 500)</text>
  <rect x="600" y="145" width="240" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="720" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Ranking: scoring &amp; ordering (500 &#8594; 50)</text>
  <rect x="600" y="175" width="240" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="720" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Filtering: business rules, diversity</text>
  <!-- Training Pipeline -->
  <rect x="40" y="230" width="400" height="130" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="240" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Offline Training Pipeline</text>
  <rect x="60" y="275" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="292" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Historical interaction data &#8594; training examples</text>
  <rect x="60" y="305" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Model training: collaborative filtering, deep learning</text>
  <rect x="60" y="335" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="352" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Model validation, A/B testing, deployment</text>
  <!-- User Request Flow -->
  <rect x="460" y="230" width="400" height="130" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Online Request Flow</text>
  <rect x="480" y="275" width="360" height="25" rx="4" fill="#ffffff" stroke="#bae6fd" stroke-width="1"/>
  <text x="660" y="292" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">User request &#8594; feature lookup (&lt;10ms)</text>
  <rect x="480" y="305" width="360" height="25" rx="4" fill="#ffffff" stroke="#bae6fd" stroke-width="1"/>
  <text x="660" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Retrieval + Ranking + Filtering (&lt;50ms)</text>
  <rect x="480" y="335" width="360" height="25" rx="4" fill="#ffffff" stroke="#bae6fd" stroke-width="1"/>
  <text x="660" y="352" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Return top-N recommendations to client</text>
  <!-- Feedback Loop -->
  <rect x="40" y="390" width="820" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="418" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">Feedback Loop: User Interactions &#8594; Training Data &#8594; Model Updates &#8594; Improved Recommendations</text>
  <text x="450" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#475569">Real-time feedback updates user features; batch feedback retrains models on a schedule (daily, weekly)</text>
  <!-- Key metrics -->
  <rect x="40" y="495" width="400" height="40" rx="8" fill="#ecfdf5" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#166534">Precision, Recall, NDCG, CTR, Conversion Rate</text>
  <rect x="460" y="495" width="400" height="40" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1"/>
  <text x="660" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Latency: Retrieval &lt; 20ms, Ranking &lt; 30ms, Total &lt; 100ms</text>
</svg>