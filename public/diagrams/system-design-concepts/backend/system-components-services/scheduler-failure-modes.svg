<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Job Scheduler &#8212; Failure Modes &#38; Recovery</text>

  <!-- Failure Mode 1: Worker Crash -->
  <rect x="30" y="65" width="270" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 1: Worker Crash Mid-Job</text>

  <rect x="45" y="110" width="240" height="28" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="165" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Worker OOM kill, pod evicted, process crash</text>

  <rect x="45" y="145" width="115" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="102" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Heartbeat timeout</text>
  <text x="102" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">requeues job</text>

  <rect x="170" y="145" width="115" height="28" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="227" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9a3412">Risk: duplicate exec</text>
  <text x="227" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">need idempotency</text>

  <!-- Failure Mode 2: Queue Overflow -->
  <rect x="330" y="65" width="270" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 2: Queue Overflow</text>

  <rect x="345" y="110" width="240" height="28" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="465" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Producers outpace consumers, queue fills</text>

  <rect x="345" y="145" width="115" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="402" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Auto-scale workers</text>
  <text x="402" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">or reject new jobs</text>

  <rect x="470" y="145" width="115" height="28" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="527" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9a3412">Risk: job loss</text>
  <text x="527" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">if queue bounded</text>

  <!-- Failure Mode 3: Stale Jobs -->
  <rect x="630" y="65" width="240" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Failure Mode 3: Stale/Orphaned Jobs</text>

  <rect x="645" y="110" width="210" height="28" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <text x="750" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Job claimed but worker never completed it</text>

  <rect x="645" y="145" width="100" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="695" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Visibility timeout</text>
  <text x="695" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">releases job</text>

  <rect x="755" y="145" width="100" height="28" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="805" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9a3412">Risk: double exec</text>
  <text x="805" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">idempotent handlers</text>

  <!-- Recovery: Visibility Timeout -->
  <rect x="30" y="220" width="420" height="150" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">Visibility Timeout Mechanism</text>

  <rect x="50" y="270" width="380" height="28" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">When worker claims job, set visibility timeout (e.g., 5 minutes)</text>

  <rect x="50" y="308" width="180" height="45" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="140" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Worker completes in time</text>
  <text x="140" y="343" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Job removed from queue</text>

  <rect x="250" y="308" width="180" height="45" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="340" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Timeout expires</text>
  <text x="340" y="343" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Job re-queued for retry</text>

  <!-- Duplicate Prevention -->
  <rect x="480" y="220" width="390" height="150" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Duplicate Prevention: Idempotency</text>

  <rect x="495" y="270" width="360" height="28" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="675" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Each job has unique idempotency key checked before execution</text>

  <rect x="495" y="308" width="170" height="45" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="580" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Idempotency Key Store</text>
  <text x="580" y="343" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Redis SETNX with TTL</text>

  <rect x="680" y="308" width="175" height="45" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="767" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Already Executed?</text>
  <text x="767" y="343" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Skip, return cached result</text>

  <!-- Recovery Flow -->
  <rect x="30" y="400" width="840" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Recovery Flow After Worker Failure</text>

  <rect x="50" y="450" width="150" height="55" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="125" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">1. Detect Failure</text>
  <text x="125" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Heartbeat missed,</text>
  <text x="125" y="502" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">timeout triggered</text>

  <line x1="200" y1="477" x2="220" y2="477" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="220" y="450" width="150" height="55" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="295" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">2. Release Job</text>
  <text x="295" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Visibility timeout</text>
  <text x="295" y="502" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">expires, job re-queued</text>

  <line x1="370" y1="477" x2="390" y2="477" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="390" y="450" width="150" height="55" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="465" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">3. Increment Retry</text>
  <text x="465" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Check retry count,</text>
  <text x="465" y="502" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">apply backoff delay</text>

  <line x1="540" y1="477" x2="560" y2="477" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="560" y="450" width="150" height="55" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="635" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">4. Re-dispatch</text>
  <text x="635" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Available worker</text>
  <text x="635" y="502" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">claims and retries</text>

  <line x1="710" y1="477" x2="730" y2="477" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="730" y="450" width="120" height="55" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="790" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">5. DLQ if max</text>
  <text x="790" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">If retries exhausted,</text>
  <text x="790" y="502" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">move to dead letter</text>

  <!-- Key Metrics -->
  <rect x="30" y="520" width="840" height="25" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="120" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">Resilience Metrics:</text>
  <text x="240" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Visibility timeout: 5-30min per job type</text>
  <text x="510" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Max retries: 3-5 with exponential backoff</text>
  <text x="750" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">DLQ processing: manual review daily</text>
</svg>