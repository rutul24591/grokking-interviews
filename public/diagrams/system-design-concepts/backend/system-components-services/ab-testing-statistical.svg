<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Statistical Analysis: Significance Testing Approaches</text>

  <!-- Frequentist -->
  <rect x="40" y="70" width="400" height="200" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e40af">Frequentist Approach</text>
  <rect x="60" y="120" width="360" height="35" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Null hypothesis: no difference between variants</text>
  <rect x="60" y="162" width="360" height="35" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Compute p-value: probability of observed result by chance</text>
  <rect x="60" y="204" width="360" height="35" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="226" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Decision: reject null if p &lt; 0.05 (95% confidence)</text>
  <rect x="60" y="246" width="360" height="15" rx="3" fill="#eff6ff"/>
  <text x="240" y="257" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#1e40af">Simple, widely understood; requires fixed sample size</text>

  <!-- Bayesian -->
  <rect x="460" y="70" width="400" height="200" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#6b21a8">Bayesian Approach</text>
  <rect x="480" y="120" width="360" height="35" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Prior distribution: beliefs about effect before data</text>
  <rect x="480" y="162" width="360" height="35" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Update with observed data to get posterior distribution</text>
  <rect x="480" y="204" width="360" height="35" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="226" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Decision: probability that B is better than A exceeds threshold</text>
  <rect x="480" y="246" width="360" height="15" rx="3" fill="#faf5ff"/>
  <text x="660" y="257" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6b21a8">Flexible sample size; intuitive probability statements</text>

  <!-- Comparison table -->
  <rect x="40" y="300" width="820" height="190" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Key Trade-offs</text>

  <!-- Row 1 -->
  <rect x="60" y="345" width="250" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="185" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#334155">Sample Size Requirement</text>
  <rect x="320" y="345" width="250" height="30" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="445" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#1e40af">Fixed upfront (power analysis)</text>
  <rect x="580" y="345" width="250" height="30" rx="4" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="705" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6b21a8">Adaptive (stop when confident)</text>

  <!-- Row 2 -->
  <rect x="60" y="382" width="250" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="185" y="402" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#334155">Peeking Problem</text>
  <rect x="320" y="382" width="250" height="30" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="445" y="402" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#1e40af">Inflates false positive rate</text>
  <rect x="580" y="382" width="250" height="30" rx="4" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="705" y="402" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6b21a8">Naturally handles sequential data</text>

  <!-- Row 3 -->
  <rect x="60" y="419" width="250" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="185" y="439" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#334155">Interpretability</text>
  <rect x="320" y="419" width="250" height="30" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="445" y="439" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#1e40af">p-value often misunderstood</text>
  <rect x="580" y="419" width="250" height="30" rx="4" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="705" y="439" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6b21a8">Direct probability statements</text>

  <!-- Column headers -->
  <rect x="320" y="330" width="250" height="18" rx="3" fill="#e0f2fe"/>
  <text x="445" y="343" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#1e40af">Frequentist</text>
  <rect x="580" y="330" width="250" height="18" rx="3" fill="#f3e8ff"/>
  <text x="705" y="343" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#6b21a8">Bayesian</text>
</svg>
