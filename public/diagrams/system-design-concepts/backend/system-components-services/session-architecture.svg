<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <rect width="900" height="550" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Session Management Service Architecture</text>
  <!-- Client -->
  <rect x="40" y="70" width="240" height="130" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1e40af">Client Applications</text>
  <rect x="60" y="115" width="200" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="160" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Web browsers (cookies, localStorage)</text>
  <rect x="60" y="145" width="200" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="160" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Mobile apps (secure storage, tokens)</text>
  <rect x="60" y="175" width="200" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="160" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">API clients (Bearer tokens, API keys)</text>
  <!-- Session Store -->
  <rect x="310" y="70" width="240" height="130" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">Session Store</text>
  <rect x="330" y="115" width="200" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="430" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Redis/Memcached for active sessions</text>
  <rect x="330" y="145" width="200" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="430" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">TTL-based session expiration</text>
  <rect x="330" y="175" width="200" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="430" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Distributed session replication</text>
  <!-- Token Management -->
  <rect x="580" y="70" width="280" height="130" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="720" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a16207">Token Management</text>
  <rect x="600" y="115" width="240" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="720" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">JWT access tokens (short-lived)</text>
  <rect x="600" y="145" width="240" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="720" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Refresh tokens (long-lived, stored securely)</text>
  <rect x="600" y="175" width="240" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="720" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Token rotation, revocation, blacklist</text>
  <!-- Session Lifecycle -->
  <rect x="40" y="230" width="400" height="130" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="240" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Session Lifecycle</text>
  <rect x="60" y="275" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="292" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Create: authenticate, generate session ID, store state</text>
  <rect x="60" y="305" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Validate: verify token, check expiration, load state</text>
  <rect x="60" y="335" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="240" y="352" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Renew: sliding expiration, rotate tokens, extend TTL</text>
  <!-- Security Layer -->
  <rect x="460" y="230" width="400" height="130" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Security Layer</text>
  <rect x="480" y="275" width="360" height="25" rx="4" fill="#ffffff" stroke="#bae6fd" stroke-width="1"/>
  <text x="660" y="292" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Session fixation prevention (regenerate on login)</text>
  <rect x="480" y="305" width="360" height="25" rx="4" fill="#ffffff" stroke="#bae6fd" stroke-width="1"/>
  <text x="660" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Concurrent session limits, device fingerprinting</text>
  <rect x="480" y="335" width="360" height="25" rx="4" fill="#ffffff" stroke="#bae6fd" stroke-width="1"/>
  <text x="660" y="352" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#334155">Revocation: logout, password change, admin force-logout</text>
  <!-- Arrows -->
  <line x1="280" y1="130" x2="310" y2="130" stroke="#64748b" stroke-width="2"/>
  <polygon points="310,125 320,130 310,135" fill="#64748b"/>
  <line x1="550" y1="130" x2="580" y2="130" stroke="#64748b" stroke-width="2"/>
  <polygon points="580,125 590,130 580,135" fill="#64748b"/>
  <line x1="440" y1="295" x2="460" y2="295" stroke="#64748b" stroke-width="2"/>
  <polygon points="460,290 470,295 460,300" fill="#64748b"/>
  <!-- Key metrics -->
  <rect x="40" y="390" width="400" height="80" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="418" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534">Performance Metrics</text>
  <text x="240" y="442" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Session validation latency: &lt;5ms</text>
  <text x="240" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Active sessions: millions concurrent</text>
  <!-- Security metrics -->
  <rect x="460" y="390" width="400" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="418" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Security Metrics</text>
  <text x="660" y="442" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Session hijacking attempts, concurrent session violations</text>
  <text x="660" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Token refresh failures, expired session access attempts</text>
  <!-- Key principle -->
  <rect x="40" y="495" width="820" height="45" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="450" y="523" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#a16207">Stateless JWT tokens for validation efficiency, stateful session store for revocation capability — best of both worlds</text>
</svg>