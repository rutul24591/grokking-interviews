<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Feature Flag Service Architecture</title>
  <desc id="desc">Feature flag architecture showing control plane, evaluation SDKs, caches, and rollout targeting</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Feature Flag Service Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Control plane, evaluation SDKs, caches, and rollout targeting</text>
  
  <!-- Flag Management UI -->
  <rect x="30" y="85" width="200" height="180" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="130" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Flag Management</text>
  
  <rect x="50" y="125" width="160" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="148" text-anchor="middle" font-size="9" fill="#64748b">Create/Edit Flags</text>
  
  <rect x="50" y="165" width="160" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="188" text-anchor="middle" font-size="9" fill="#64748b">Targeting Rules</text>
  
  <rect x="50" y="205" width="160" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="228" text-anchor="middle" font-size="9" fill="#64748b">Rollout % Control</text>
  
  <!-- Flag Distribution -->
  <line x1="235" y1="175" x2="285" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="260" y="165" text-anchor="middle" font-size="9" fill="#64748b">Push/Sync</text>
  
  <!-- Flag Service -->
  <rect x="285" y="85" width="280" height="180" rx="8" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="425" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Flag Service</text>
  
  <rect x="305" y="125" width="240" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="425" y="150" text-anchor="middle" font-size="9" fill="#64748b">Flag Store (Database)</text>
  
  <rect x="305" y="175" width="110" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="360" y="200" text-anchor="middle" font-size="9" fill="#64748b">Audit Log</text>
  
  <rect x="425" y="175" width="120" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="485" y="200" text-anchor="middle" font-size="9" fill="#64748b">Change Stream</text>
  
  <!-- SDK Distribution -->
  <line x1="570" y1="175" x2="620" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="595" y="165" text-anchor="middle" font-size="9" fill="#64748b">SDK Fetch</text>
  
  <!-- Application SDKs -->
  <rect x="620" y="85" width="250" height="180" rx="8" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Application SDKs</text>
  
  <rect x="640" y="125" width="210" height="40" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="745" y="150" text-anchor="middle" font-size="9" fill="#64748b">Local Flag Cache</text>
  
  <rect x="640" y="175" width="210" height="40" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="745" y="200" text-anchor="middle" font-size="9" fill="#64748b">Evaluation Engine</text>
  
  <rect x="640" y="225" width="210" height="30" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="745" y="245" text-anchor="middle" font-size="9" fill="#64748b">Exposure Logging</text>
  
  <!-- Evaluation Flow -->
  <line x1="745" y1="265" x2="745" y2="315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-down)"/>
  
  <!-- Applications -->
  <rect x="620" y="320" width="250" height="100" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="745" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Applications</text>
  
  <rect x="640" y="355" width="100" height="55" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="690" y="380" text-anchor="middle" font-size="9" fill="#64748b">Web App</text>
  <text x="690" y="395" text-anchor="middle" font-size="8" fill="#6ee7b7">isFeatureEnabled()</text>
  
  <rect x="750" y="355" width="100" height="55" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="800" y="380" text-anchor="middle" font-size="9" fill="#64748b">Backend API</text>
  <text x="800" y="395" text-anchor="middle" font-size="8" fill="#6ee7b7">evaluateFlag()</text>
  
  <!-- Flag Types -->
  <rect x="30" y="280" width="280" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="170" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Flag Types</text>
  
  <rect x="50" y="320" width="240" height="110" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="345" text-anchor="middle" font-size="9" fill="#64748b">Release Flags (gradual rollout)</text>
  <text x="170" y="360" text-anchor="middle" font-size="9" fill="#64748b">Kill Switches (emergency off)</text>
  <text x="170" y="375" text-anchor="middle" font-size="9" fill="#64748b">Experiment Flags (A/B tests)</text>
  <text x="170" y="390" text-anchor="middle" font-size="9" fill="#64748b">Permission Gates (entitlements)</text>
  <text x="170" y="405" text-anchor="middle" font-size="9" fill="#64748b">Ops Flags (runtime config)</text>
  
  <!-- Targeting Rules -->
  <rect x="330" y="280" width="280" height="160" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="470" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Targeting Rules</text>
  
  <rect x="350" y="320" width="240" height="110" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="470" y="345" text-anchor="middle" font-size="9" fill="#64748b">User ID / Segment targeting</text>
  <text x="470" y="360" text-anchor="middle" font-size="9" fill="#64748b">Percentage rollout</text>
  <text x="470" y="375" text-anchor="middle" font-size="9" fill="#64748b">Environment filters</text>
  <text x="470" y="390" text-anchor="middle" font-size="9" fill="#64748b">Country/Region rules</text>
  <text x="470" y="405" text-anchor="middle" font-size="9" fill="#64748b">Custom attribute matching</text>
  
  <!-- Analytics -->
  <rect x="630" y="435" width="240" height="95" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="750" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Analytics and Audit</text>
  
  <rect x="650" y="470" width="200" height="50" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="750" y="495" text-anchor="middle" font-size="9" fill="#64748b">Flag evaluation logs</text>
  <text x="750" y="510" text-anchor="middle" font-size="8" fill="#fcd34d">Change history</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
