<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Recommendation Engine Failure Modes</title>
  <desc id="desc">Recommendation engine failure modes: feedback loops, filter bubbles, cold start, and model drift</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Recommendation Engine Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Feedback loops, filter bubbles, cold start, and model drift</text>
  
  <!-- Feedback Loops -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="#ef4444" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">1. Feedback Loops (Runaway)</text>
  
  <!-- Feedback loop scenario -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <!-- Model recommends -->
  <rect x="60" y="150" width="140" height="60" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-size="9" fill="white">Model Recommends</text>
  <text x="130" y="190" text-anchor="middle" font-size="8" fill="#c4b5fd">Item A</text>
  
  <line x1="205" y1="180" x2="235" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="170" text-anchor="middle" font-size="7" fill="#64748b">User clicks</text>
  
  <!-- Training data -->
  <rect x="245" y="150" width="140" height="60" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <text x="315" y="175" text-anchor="middle" font-size="9" fill="white">Training Data</text>
  <text x="315" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">Item A: +1 click</text>
  
  <line x1="315" y1="210" x2="315" y2="240" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="335" y="225" text-anchor="start" font-size="7" fill="#64748b">Retrain</text>
  
  <!-- Model reinforces -->
  <rect x="245" y="250" width="140" height="20" rx="2" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
  <text x="315" y="265" text-anchor="middle" font-size="7" fill="white">Model now prefers A more</text>
  
  <text x="235" y="290" text-anchor="middle" font-size="10" fill="#ef4444">Rich get richer, diversity dies!</text>
  <text x="235" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: Training on own outputs</text>
  <text x="235" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: De-bias training data, exploration</text>
  
  <!-- Filter Bubbles -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">2. Filter Bubbles</text>
  
  <!-- Bubble scenario -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  
  <!-- User likes X -->
  <rect x="490" y="150" width="120" height="60" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <text x="550" y="175" text-anchor="middle" font-size="9" fill="white">User Likes</text>
  <text x="550" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">Category X</text>
  
  <line x1="615" y1="180" x2="645" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="170" text-anchor="middle" font-size="7" fill="#64748b">Only shows</text>
  
  <!-- Only X shown -->
  <rect x="655" y="150" width="120" height="60" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="715" y="175" text-anchor="middle" font-size="9" fill="white">Only Category X</text>
  <text x="715" y="190" text-anchor="middle" font-size="8" fill="#fcd34d">No diversity</text>
  
  <line x1="780" y1="180" x2="810" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="795" y="170" text-anchor="middle" font-size="7" fill="#ef4444">User stuck</text>
  
  <!-- Echo chamber -->
  <rect x="820" y="150" width="20" height="60" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="830" y="180" text-anchor="middle" font-size="10" fill="white">!</text>
  
  <text x="665" y="290" text-anchor="middle" font-size="10" fill="#ef4444">User never discovers new interests!</text>
  <text x="665" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: Over-optimization for engagement</text>
  <text x="665" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: Diversity injection, serendipity</text>
  
  <!-- Cold Start -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#8b5cf6">3. Cold Start Problem</text>
  
  <!-- Cold start scenario -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  
  <!-- New user -->
  <rect x="60" y="395" width="140" height="60" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
  <text x="130" y="420" text-anchor="middle" font-size="9" fill="white">New User</text>
  <text x="130" y="435" text-anchor="middle" font-size="8" fill="#c4b5fd">No history</text>
  
  <line x1="205" y1="425" x2="235" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="220" y="415" text-anchor="middle" font-size="7" fill="#ef4444">No signal</text>
  
  <!-- Bad recs -->
  <rect x="245" y="395" width="140" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="315" y="420" text-anchor="middle" font-size="9" fill="white">Generic Recs</text>
  <text x="315" y="435" text-anchor="middle" font-size="8" fill="#fca5a5">Low relevance</text>
  
  <text x="235" y="495" text-anchor="middle" font-size="10" fill="#ef4444">Poor first experience, user leaves!</text>
  <text x="235" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: No user history for personalization</text>
  <text x="235" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Onboarding, popularity fallback, content-based</text>
  
  <!-- Model Drift -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">4. Model Drift</text>
  
  <!-- Drift scenario -->
  <rect x="480" y="380" width="370" height="140" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  
  <!-- Model trained -->
  <rect x="490" y="395" width="120" height="60" rx="4" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="550" y="420" text-anchor="middle" font-size="9" fill="white">Model Trained</text>
  <text x="550" y="435" text-anchor="middle" font-size="8" fill="#6ee7b7">Jan 2024</text>
  
  <line x1="615" y1="425" x2="645" y2="425" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="415" text-anchor="middle" font-size="7" fill="#64748b">Time passes</text>
  
  <!-- World changes -->
  <rect x="655" y="395" width="120" height="60" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="715" y="420" text-anchor="middle" font-size="9" fill="white">World Changes</text>
  <text x="715" y="435" text-anchor="middle" font-size="8" fill="#fcd34d">Trends shift</text>
  
  <line x1="780" y1="425" x2="810" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="795" y="415" text-anchor="middle" font-size="7" fill="#ef4444">Model stale</text>
  
  <!-- Bad predictions -->
  <rect x="820" y="395" width="20" height="60" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="830" y="425" text-anchor="middle" font-size="10" fill="white">!</text>
  
  <text x="665" y="495" text-anchor="middle" font-size="10" fill="#ef4444">Recommendations become irrelevant!</text>
  <text x="665" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: User behavior changes, model not updated</text>
  <text x="665" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Continuous training, drift detection</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
