<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Experiment Scaling: Progressive Rollout Pipeline</text>

  <!-- Phase 1 -->
  <rect x="40" y="70" width="190" height="120" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="135" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">Phase 1: Canary</text>
  <text x="135" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">1-5% of traffic</text>
  <text x="135" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Catch critical bugs</text>
  <text x="135" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Duration: 1-2 hours</text>

  <!-- Arrow -->
  <line x1="230" y1="130" x2="260" y2="130" stroke="#64748b" stroke-width="2"/>
  <polygon points="260,125 270,130 260,135" fill="#64748b"/>

  <!-- Phase 2 -->
  <rect x="270" y="70" width="190" height="120" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="365" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a16207">Phase 2: Ramp</text>
  <text x="365" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">10-25% of traffic</text>
  <text x="365" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Validate metrics</text>
  <text x="365" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Duration: 1-3 days</text>

  <!-- Arrow -->
  <line x1="460" y1="130" x2="490" y2="130" stroke="#64748b" stroke-width="2"/>
  <polygon points="490,125 500,130 490,135" fill="#64748b"/>

  <!-- Phase 3 -->
  <rect x="500" y="70" width="190" height="120" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="595" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">Phase 3: Expand</text>
  <text x="595" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">50% of traffic</text>
  <text x="595" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Statistical power</text>
  <text x="595" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Duration: 3-7 days</text>

  <!-- Arrow -->
  <line x1="690" y1="130" x2="720" y2="130" stroke="#64748b" stroke-width="2"/>
  <polygon points="720,125 730,130 720,135" fill="#64748b"/>

  <!-- Phase 4 -->
  <rect x="730" y="70" width="140" height="120" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="800" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Phase 4: Ship</text>
  <text x="800" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">100% rollout</text>
  <text x="800" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Significant lift</text>
  <text x="800" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Remove old code</text>

  <!-- Guardrail monitoring bar -->
  <rect x="40" y="220" width="830" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="248" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">Continuous Guardrail Monitoring</text>
  <text x="150" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Error rate</text>
  <text x="300" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Latency p99</text>
  <text x="450" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Revenue impact</text>
  <text x="600" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">System load</text>
  <text x="750" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Abuse signals</text>

  <!-- Rollback path -->
  <path d="M 450 300 Q 450 340 135 340 Q 40 340 40 190" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="40,190 45,200 35,200" fill="#ef4444"/>
  <text x="250" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#dc2626">Automatic rollback on guardrail breach</text>

  <!-- Sample ratio mismatch check -->
  <rect x="40" y="360" width="400" height="120" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534">Sample Ratio Mismatch (SRM) Check</text>
  <text x="240" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Expected split: 50/50, Observed: 49.8/50.2 &#8212; PASS</text>
  <text x="240" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Expected split: 50/50, Observed: 45/55 &#8212; FAIL (alert!)</text>
  <text x="240" y="462" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">SRM indicates assignment or logging inconsistency</text>

  <!-- Statistical power check -->
  <rect x="460" y="360" width="410" height="120" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="665" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Statistical Power Analysis</text>
  <text x="665" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Minimum detectable effect (MDE): 2% lift in conversion</text>
  <text x="665" y="438" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Required sample size: 50,000 users per variant</text>
  <text x="665" y="462" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Current sample: 35,000 &#8212; need 15,000 more (70% powered)</text>
</svg>
