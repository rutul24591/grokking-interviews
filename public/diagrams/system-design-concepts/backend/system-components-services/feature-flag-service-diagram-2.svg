<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Feature Flag Control Points</title>
  <desc id="desc">Feature flag control points showing local caching, streaming updates, audit trail, and safety defaults</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Feature Flag Control Points</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Local caching, streaming updates, audit trail, and safety defaults</text>
  
  <!-- Local Caching -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">Local Caching</text>
  
  <rect x="50" y="125" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <rect x="60" y="140" width="180" height="35" rx="3" fill="#3b82f6"/>
  <text x="150" y="163" text-anchor="middle" font-size="9" fill="white">In-Memory Cache</text>
  
  <text x="150" y="200" text-anchor="middle" font-size="9" fill="#64748b">Flags cached locally</text>
  <text x="150" y="215" text-anchor="middle" font-size="9" fill="#64748b">No network call per eval</text>
  
  <rect x="50" y="235" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="260" text-anchor="middle" font-size="10" fill="#64748b">Cache Strategies</text>
  
  <text x="70" y="285" text-anchor="start" font-size="9" fill="#64748b">- Polling (every 30-60s)</text>
  <text x="70" y="300" text-anchor="start" font-size="9" fill="#64748b">- Streaming (SSE/WebSocket)</text>
  <text x="70" y="315" text-anchor="start" font-size="9" fill="#64748b">- Hybrid (poll + invalidation)</text>
  
  <text x="150" y="345" text-anchor="middle" font-size="9" fill="#10b981">+ Low latency evaluation</text>
  <text x="150" y="360" text-anchor="middle" font-size="9" fill="#f59e0b">- Stale cache risk</text>
  
  <!-- Streaming Updates -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">Streaming Updates</text>
  
  <rect x="335" y="125" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  
  <rect x="345" y="140" width="100" height="35" rx="3" fill="#10b981"/>
  <text x="395" y="163" text-anchor="middle" font-size="9" fill="white">Flag Service</text>
  
  <line x1="450" y1="158" x2="480" y2="158" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="148" text-anchor="middle" font-size="7" fill="#64748b">SSE Stream</text>
  
  <rect x="485" y="140" width="70" height="35" rx="3" fill="#3b82f6"/>
  <text x="520" y="163" text-anchor="middle" font-size="9" fill="white">SDK</text>
  
  <text x="450" y="200" text-anchor="middle" font-size="9" fill="#64748b">Real-time flag changes</text>
  <text x="450" y="215" text-anchor="middle" font-size="9" fill="#64748b">Sub-second propagation</text>
  
  <rect x="335" y="235" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" font-size="10" fill="#64748b">Benefits</text>
  
  <text x="355" y="285" text-anchor="start" font-size="9" fill="#64748b">- Immediate updates</text>
  <text x="355" y="300" text-anchor="start" font-size="9" fill="#64748b">- No polling overhead</text>
  <text x="355" y="315" text-anchor="start" font-size="9" fill="#64748b">- Connection resilient</text>
  
  <text x="450" y="345" text-anchor="middle" font-size="9" fill="#10b981">+ Fresh flags</text>
  <text x="450" y="360" text-anchor="middle" font-size="9" fill="#f59e0b">- Connection management</text>
  
  <!-- Audit Trail -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Audit Trail</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="735" y="150" text-anchor="middle" font-size="10" fill="#64748b">Every Change Logged</text>
  
  <text x="640" y="175" text-anchor="start" font-size="9" fill="#64748b">- Who changed it</text>
  <text x="640" y="190" text-anchor="start" font-size="9" fill="#64748b">- What changed</text>
  <text x="640" y="205" text-anchor="start" font-size="9" fill="#64748b">- When it changed</text>
  <text x="640" y="220" text-anchor="start" font-size="9" fill="#64748b">- Why (comment/ticket)</text>
  
  <rect x="620" y="235" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="260" text-anchor="middle" font-size="10" fill="#64748b">Audit Data</text>
  
  <text x="640" y="285" text-anchor="start" font-size="9" fill="#64748b">- Before/after values</text>
  <text x="640" y="300" text-anchor="start" font-size="9" fill="#64748b">- Rollback capability</text>
  <text x="640" y="315" text-anchor="start" font-size="9" fill="#64748b">- Compliance reporting</text>
  
  <text x="735" y="345" text-anchor="middle" font-size="9" fill="#10b981">+ Accountability</text>
  <text x="735" y="360" text-anchor="middle" font-size="9" fill="#10b981">+ Incident investigation</text>
  
  <!-- Safety Defaults -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Safety Defaults</text>
  
  <rect x="50" y="360" width="360" height="160" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  
  <rect x="70" y="380" width="150" height="50" rx="4" fill="#ef4444"/>
  <text x="145" y="405" text-anchor="middle" font-size="9" fill="white">Service Down</text>
  <text x="145" y="420" text-anchor="middle" font-size="8" fill="#fca5a5">Fallback: Default value</text>
  
  <rect x="240" y="380" width="150" height="50" rx="4" fill="#f59e0b"/>
  <text x="315" y="405" text-anchor="middle" font-size="9" fill="white">Cache Miss</text>
  <text x="315" y="420" text-anchor="middle" font-size="8" fill="#fcd34d">Fallback: Conservative</text>
  
  <text x="230" y="460" text-anchor="middle" font-size="9" fill="#64748b">Default to safe behavior when uncertain</text>
  
  <text x="70" y="490" text-anchor="start" font-size="9" fill="#64748b">- Kill switches: default OFF</text>
  <text x="70" y="505" text-anchor="start" font-size="9" fill="#64748b">- Release flags: default disabled</text>
  <text x="230" y="490" text-anchor="start" font-size="9" fill="#64748b">- Experiments: default control</text>
  <text x="230" y="505" text-anchor="start" font-size="9" fill="#64748b">- Entitlements: default deny</text>
  
  <!-- Evaluation Flow -->
  <rect x="470" y="320" width="400" height="210" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Evaluation Flow</text>
  
  <rect x="490" y="360" width="360" height="160" rx="6" fill="white" stroke="#f59e0b" stroke-width="1"/>
  
  <rect x="500" y="380" width="80" height="40" rx="3" fill="#3b82f6"/>
  <text x="540" y="403" text-anchor="middle" font-size="8" fill="white">Request</text>
  
  <line x1="585" y1="400" x2="615" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="620" y="380" width="80" height="40" rx="3" fill="#8b5cf6"/>
  <text x="660" y="403" text-anchor="middle" font-size="8" fill="white">Check Cache</text>
  
  <line x1="705" y1="400" x2="735" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="740" y="380" width="100" height="40" rx="3" fill="#10b981"/>
  <text x="790" y="403" text-anchor="middle" font-size="8" fill="white">Evaluate Rules</text>
  
  <line x1="790" y1="420" x2="790" y2="450" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <rect x="740" y="455" width="100" height="40" rx="3" fill="#06b6d4"/>
  <text x="790" y="478" text-anchor="middle" font-size="8" fill="white">Return Result</text>
  
  <text x="670" y="510" text-anchor="middle" font-size="9" fill="#64748b">Evaluation: &amp;lt; 1ms with local cache</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
