<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Authentication Token and Session Control</title>
  <desc id="desc">Authentication showing token lifecycle, TTL, rotation, validation paths, and revocation</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Authentication Token &amp; Session Control</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Token lifecycle, TTL, rotation, validation paths, and revocation</text>
  
  <!-- Token Lifecycle -->
  <rect x="30" y="85" width="400" height="240" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Token Lifecycle</text>
  
  <!-- Issuance -->
  <rect x="50" y="125" width="140" height="60" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="120" y="155" text-anchor="middle" font-size="10" fill="white">Issuance</text>
  <text x="120" y="173" text-anchor="middle" font-size="8" fill="#bfdbfe">After login</text>
  
  <line x1="195" y1="155" x2="225" y2="155" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Validation -->
  <rect x="235" y="125" width="140" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="305" y="155" text-anchor="middle" font-size="10" fill="white">Validation</text>
  <text x="305" y="173" text-anchor="middle" font-size="8" fill="#6ee7b7">Each request</text>
  
  <line x1="305" y1="185" x2="305" y2="215" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  
  <!-- Refresh -->
  <rect x="235" y="220" width="140" height="60" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="305" y="250" text-anchor="middle" font-size="10" fill="white">Refresh</text>
  <text x="305" y="268" text-anchor="middle" font-size="8" fill="#fcd34d">Before expiry</text>
  
  <line x1="230" y1="250" x2="200" y2="250" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-left)"/>
  
  <!-- Rotation -->
  <rect x="50" y="220" width="140" height="60" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="120" y="250" text-anchor="middle" font-size="10" fill="white">Rotation</text>
  <text x="120" y="268" text-anchor="middle" font-size="8" fill="#c4b5fd">New refresh token</text>
  
  <line x1="120" y1="185" x2="120" y2="215" stroke="var(--text-theme, #ef4444)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="140" y="200" text-anchor="start" font-size="7" fill="var(--text-theme, #ef4444">Revoke</text>
  
  <!-- Revocation -->
  <rect x="50" y="330" width="140" height="60" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="120" y="360" text-anchor="middle" font-size="10" fill="white">Revocation</text>
  <text x="120" y="378" text-anchor="middle" font-size="8" fill="#fca5a5">Logout/compromise</text>
  
  <!-- Token Validation Paths -->
  <rect x="470" y="85" width="400" height="240" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Token Validation Paths</text>
  
  <!-- Stateless (JWT) -->
  <rect x="490" y="125" width="360" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Stateless (JWT)</text>
  
  <rect x="500" y="160" width="160" height="55" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="580" y="185" text-anchor="middle" font-size="9" fill="white">Local Validation</text>
  <text x="580" y="200" text-anchor="middle" font-size="8" fill="#6ee7b7">Verify signature</text>
  <text x="580" y="213" text-anchor="middle" font-size="7" fill="#6ee7b7">Check expiry</text>
  
  <line x1="665" y1="188" x2="695" y2="188" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="705" y="160" width="135" height="55" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="772" y="185" text-anchor="middle" font-size="9" fill="white">Fast, scalable</text>
  <text x="772" y="200" text-anchor="middle" font-size="8" fill="#6ee7b7">No DB call</text>
  <text x="772" y="213" text-anchor="middle" font-size="7" fill="#6ee7b7">Hard to revoke</text>
  
  <!-- Stateful (Session) -->
  <rect x="490" y="235" width="360" height="80" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #10b981">Stateful (Session)</text>
  
  <rect x="500" y="270" width="160" height="35" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="580" y="293" text-anchor="middle" font-size="9" fill="white">Session Store Lookup</text>
  
  <line x1="665" y1="288" x2="695" y2="288" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="705" y="270" width="135" height="35" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="772" y="293" text-anchor="middle" font-size="9" fill="white">Easy revocation</text>
  
  <!-- TTL Strategies -->
  <rect x="30" y="340" width="400" height="190" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">TTL Strategies</text>
  
  <rect x="50" y="380" width="360" height="140" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="70" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="405" font-size="10" fill="var(--text-theme, #1e293b">Access token: 15 min - 1 hour</text>
  
  <text x="70" y="425" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="425" font-size="10" fill="var(--text-theme, #1e293b">Refresh token: 7 days - 1 year</text>
  
  <text x="70" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="445" font-size="10" fill="var(--text-theme, #1e293b">Session: 30 days (with activity)</text>
  
  <text x="70" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="85" y="465" font-size="10" fill="var(--text-theme, #1e293b">Absolute expiry: force re-auth</text>
  
  <text x="220" y="490" text-anchor="start" font-size="9" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="235" y="490" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">Short TTL = more refresh calls</text>
  
  <text x="220" y="510" text-anchor="start" font-size="9" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="235" y="510" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">Long TTL = larger breach window</text>
  
  <!-- Revocation Strategies -->
  <rect x="470" y="340" width="400" height="190" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="670" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Revocation Strategies</text>
  
  <rect x="490" y="380" width="360" height="140" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <text x="510" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="405" font-size="10" fill="var(--text-theme, #1e293b">Logout: invalidate session</text>
  
  <text x="510" y="425" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="425" font-size="10" fill="var(--text-theme, #1e293b">Password change: revoke all</text>
  
  <text x="510" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="445" font-size="10" fill="var(--text-theme, #1e293b">Compromise: token blacklist</text>
  
  <text x="510" y="465" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="465" font-size="10" fill="var(--text-theme, #1e293b">Device logout: selective revoke</text>
  
  <text x="510" y="490" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">JWT revocation requires blocklist or short TTL</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
</svg>
