<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Payment Processing Flow &#8212; Authorization, Capture, Settlement</text>

  <!-- Step 1: Checkout Initiation -->
  <rect x="30" y="65" width="160" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">1. Checkout</text>
  <text x="110" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">User submits</text>
  <text x="110" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">payment details</text>

  <!-- Step 2: Tokenize -->
  <rect x="220" y="65" width="160" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#166534">2. Tokenize</text>
  <text x="300" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Card &#8594; Token via</text>
  <text x="300" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Elements.js / SDK</text>

  <!-- Step 3: Authorize -->
  <rect x="410" y="65" width="160" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">3. Authorize</text>
  <text x="490" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Processor contacts</text>
  <text x="490" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">issuing bank</text>

  <!-- Step 4: 3D Secure -->
  <rect x="600" y="65" width="160" height="80" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#6b21a8">4. 3D Secure</text>
  <text x="680" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Challenge if required</text>
  <text x="680" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">(SCA compliance)</text>

  <!-- Step 5: Response -->
  <rect x="790" y="65" width="80" height="80" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="830" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#155e75">5. Auth</text>
  <text x="830" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Approved</text>
  <text x="830" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">or Declined</text>

  <!-- Arrows -->
  <line x1="190" y1="105" x2="220" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="105" x2="410" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="570" y1="105" x2="600" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="760" y1="105" x2="790" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Capture & Settlement Flow -->
  <rect x="30" y="180" width="840" height="120" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Post-Authorization: Capture &#8594; Settlement &#8594; Payout</text>

  <rect x="50" y="230" width="240" height="55" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="170" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">Capture (Merchant Action)</text>
  <text x="170" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Funds held, now captured</text>
  <text x="170" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Can be partial or full amount</text>

  <line x1="290" y1="257" x2="310" y2="257" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="310" y="230" width="240" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="430" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Settlement (Bank Processing)</text>
  <text x="430" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Batch settlement (end of day)</text>
  <text x="430" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Funds move between banks</text>

  <line x1="550" y1="257" x2="570" y2="257" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="570" y="230" width="280" height="55" rx="6" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="710" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#155e75">Payout (Funds to Merchant)</text>
  <text x="710" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">T+1 to T+7 business days</text>
  <text x="710" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Minus processing fees</text>

  <!-- Idempotency Detail -->
  <rect x="30" y="330" width="420" height="190" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Idempotency: Preventing Double Charges</text>

  <rect x="50" y="380" width="380" height="28" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="240" y="398" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Client generates unique idempotency key per payment attempt</text>

  <rect x="50" y="418" width="380" height="28" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="240" y="436" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Server checks key: if exists, return cached response; if not, process and store</text>

  <rect x="50" y="456" width="180" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="474" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Key: UUID v4</text>
  <text x="140" y="489" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Generated client-side</text>
  <text x="140" y="502" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Retried with same key</text>

  <rect x="250" y="456" width="180" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="340" y="474" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Storage: Redis/DB</text>
  <text x="340" y="489" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Key &#8594; response mapping</text>
  <text x="340" y="502" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">TTL: 24 hours</text>

  <!-- Webhook Flow -->
  <rect x="480" y="330" width="390" height="190" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Webhook Event Flow</text>

  <rect x="495" y="380" width="360" height="28" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="675" y="398" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Processor sends async events for state changes (succeeded, failed, refunded)</text>

  <rect x="495" y="418" width="170" height="45" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="580" y="436" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">1. Verify Signature</text>
  <text x="580" y="451" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">HMAC validation</text>

  <rect x="680" y="418" width="175" height="45" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="767" y="436" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">2. Process Event</text>
  <text x="767" y="451" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Update payment state</text>

  <rect x="495" y="473" width="170" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="580" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">3. Deduplicate</text>

  <rect x="680" y="473" width="175" height="35" rx="4" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="767" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">4. Trigger Actions</text>

  <!-- Bottom -->
  <rect x="30" y="520" width="840" height="25" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="120" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">Key Timeline:</text>
  <text x="210" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Authorization: 2-5 seconds</text>
  <text x="400" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Settlement: end of day batch</text>
  <text x="590" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Payout: T+1 to T+7 days</text>
  <text x="760" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Refund: 5-10 business days</text>
</svg>