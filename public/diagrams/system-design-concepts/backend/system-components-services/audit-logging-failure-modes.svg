<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e">Failure Modes &amp; Mitigations</text>
  <text x="450" y="56" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="normal" fill="#555555">Common failure scenarios in audit logging and their architectural mitigations</text>

  <!-- FAILURE 1: Ingestion Drop -->
  <rect x="30" y="80" width="410" height="115" rx="8" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
  <text x="235" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c62828">FAILURE 1: Ingestion Drop Under Load</text>

  <text x="45" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Scenario:</text>
  <text x="125" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Traffic spike overwhelms message queue. Events buffer fills up and drops.</text>

  <text x="45" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Impact:</text>
  <text x="110" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Gaps in audit trail. Compliance violations. Unable to reconstruct incident timeline.</text>

  <text x="45" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Mitigation:</text>
  <text x="125" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Local disk buffering on producers, backpressure with bounded queues, dead-letter</text>
  <text x="125" y="183" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">queue for overflow, explicit loss budget with alerting, auto-scale consumers.</text>

  <!-- FAILURE 2: Schema Drift -->
  <rect x="460" y="80" width="410" height="115" rx="8" fill="#fff3e0" stroke="#f5a623" stroke-width="2"/>
  <text x="665" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#e65100">FAILURE 2: Schema Drift &amp; Incompatibility</text>

  <text x="475" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Scenario:</text>
  <text x="555" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Service updates event format without coordination. Old fields renamed or removed.</text>

  <text x="475" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Impact:</text>
  <text x="540" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Compliance queries fail across time boundaries. Incomplete audit records.</text>

  <text x="475" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Mitigation:</text>
  <text x="555" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Schema registry with backward-compatible evolution, validation at ingestion gate,</text>
  <text x="555" y="183" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">versioned event types, schema change requires audit team approval + migration plan.</text>

  <!-- FAILURE 3: Storage Corruption -->
  <rect x="30" y="215" width="410" height="115" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  <text x="235" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#880e4f">FAILURE 3: Storage Corruption or Tampering</text>

  <text x="45" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Scenario:</text>
  <text x="125" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Malicious insider or compromised service modifies audit records to cover tracks.</text>

  <text x="45" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Impact:</text>
  <text x="110" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Evidence is unreliable. Regulatory findings invalidated. Legal liability for the org.</text>

  <text x="45" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Mitigation:</text>
  <text x="125" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Hash chain verification (periodic scan), Merkle root anchoring to external ledger,</text>
  <text x="125" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">append-only database permissions, object lock on cold storage, separate access audit.</text>

  <!-- FAILURE 4: Query Unavailability -->
  <rect x="460" y="215" width="410" height="115" rx="8" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="665" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#0d47a1">FAILURE 4: Query Unavailability During Incident</text>

  <text x="475" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Scenario:</text>
  <text x="555" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Index cluster crashes during active security incident. No audit data accessible.</text>

  <text x="475" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Impact:</text>
  <text x="540" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Incident response blind. Cannot determine attack scope. Regulatory clock starts.</text>

  <text x="475" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Mitigation:</text>
  <text x="555" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">Read replica of index, fallback direct-to-log access path, index rebuild from source</text>
  <text x="555" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#333333">of truth (append-only log), multi-AZ deployment with automatic failover.</text>

  <!-- Failure severity scale at bottom -->
  <rect x="30" y="360" width="840" height="120" rx="8" fill="#f0f4f8" stroke="#c8d6e5" stroke-width="1.5"/>
  <text x="450" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">Failure Severity &amp; Detection Matrix</text>

  <!-- Table header -->
  <rect x="45" y="398" width="180" height="24" rx="3" fill="#e0e0e0"/>
  <text x="135" y="414" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Failure Mode</text>
  <rect x="225" y="398" width="140" height="24" rx="3" fill="#e0e0e0"/>
  <text x="295" y="414" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Severity</text>
  <rect x="365" y="398" width="160" height="24" rx="3" fill="#e0e0e0"/>
  <text x="445" y="414" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Detection Signal</text>
  <rect x="525" y="398" width="330" height="24" rx="3" fill="#e0e0e0"/>
  <text x="690" y="414" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e">Recovery Action</text>

  <!-- Row 1 -->
  <text x="135" y="436" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Ingestion drop</text>
  <text x="295" y="436" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#c62828">Critical</text>
  <text x="445" y="436" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Queue depth, drop rate alerts</text>
  <text x="690" y="436" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Scale consumers, replay from DLQ</text>

  <!-- Row 2 -->
  <text x="135" y="454" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Schema drift</text>
  <text x="295" y="454" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#e65100">High</text>
  <text x="445" y="454" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Validation failure rate spike</text>
  <text x="690" y="454" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Reject incompatible, route to migration</text>

  <!-- Row 3 -->
  <text x="135" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Storage tampering</text>
  <text x="295" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#880e4f">Critical</text>
  <text x="445" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Hash chain mismatch, anchor diff</text>
  <text x="690" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#333333">Quarantine affected range, alert security</text>
</svg>