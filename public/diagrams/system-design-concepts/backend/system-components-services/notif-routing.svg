<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Notification Channel Routing &#38; Delivery Strategy</text>

  <!-- Routing Decision -->
  <rect x="30" y="65" width="420" height="160" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Channel Routing Decision Tree</text>

  <rect x="50" y="110" width="380" height="28" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="240" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Step 1: Check user preferences - is this notification type enabled?</text>

  <rect x="50" y="148" width="380" height="28" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#166534">Step 2: Check quiet hours - is current time within quiet window?</text>

  <rect x="50" y="186" width="380" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="240" y="204" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">Step 3: Select primary channel based on notification priority</text>

  <rect x="50" y="224" width="380" height="28" rx="4" fill="#faf5ff" stroke="#a855f7" stroke-width="1"/>
  <text x="240" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#6b21a8">Step 4: Apply rate limiting - has user exceeded daily limit?</text>

  <!-- Channel Priority Matrix -->
  <rect x="480" y="65" width="390" height="160" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Channel Selection by Notification Priority</text>

  <table x="495" y="110" width="360">
    <rect x="495" y="110" width="90" height="25" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="540" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">Priority</text>
    <rect x="585" y="110" width="90" height="25" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="630" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">Primary</text>
    <rect x="675" y="110" width="90" height="25" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="720" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">Fallback</text>
    <rect x="765" y="110" width="90" height="25" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="810" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">Latency</text>

    <rect x="495" y="135" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="540" y="149" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Critical</text>
    <rect x="585" y="135" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="630" y="149" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Push + SMS</text>
    <rect x="675" y="135" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="720" y="149" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Email</text>
    <rect x="765" y="135" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="810" y="149" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">&#60; 30s</text>

    <rect x="495" y="157" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="540" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">High</text>
    <rect x="585" y="157" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="630" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Push</text>
    <rect x="675" y="157" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="720" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Email</text>
    <rect x="765" y="157" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="810" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">&#60; 5min</text>

    <rect x="495" y="179" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="540" y="193" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Normal</text>
    <rect x="585" y="179" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="630" y="193" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Email</text>
    <rect x="675" y="179" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="720" y="193" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">In-App</text>
    <rect x="765" y="179" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="810" y="193" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">&#60; 1hr</text>

    <rect x="495" y="201" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="540" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Low</text>
    <rect x="585" y="201" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="630" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">In-App</text>
    <rect x="675" y="201" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="720" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Digest</text>
    <rect x="765" y="201" width="90" height="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
    <text x="810" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Batch</text>
  </table>

  <!-- Multi-Channel Delivery -->
  <rect x="30" y="260" width="420" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">Multi-Channel Delivery with Fallback</text>

  <rect x="50" y="310" width="380" height="28" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Send via primary channel, if delivery fails after timeout, try fallback channel</text>

  <rect x="50" y="348" width="115" height="38" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="107" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#166534">Primary: Push</text>
  <text x="107" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">timeout: 30s</text>

  <line x1="165" y1="367" x2="180" y2="367" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="180" y="348" width="115" height="38" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="237" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Fallback: Email</text>
  <text x="237" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">timeout: 5min</text>

  <line x1="295" y1="367" x2="310" y2="367" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="310" y="348" width="115" height="38" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="367" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#991b1b">Fallback: SMS</text>
  <text x="367" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">timeout: 2min</text>

  <!-- Deduplication -->
  <rect x="480" y="260" width="390" height="140" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#6b21a8">Notification Deduplication</text>

  <rect x="495" y="310" width="360" height="28" rx="4" fill="#ffffff" stroke="#a855f7" stroke-width="1"/>
  <text x="675" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Prevent duplicate notifications from multiple triggering events</text>

  <rect x="495" y="348" width="170" height="38" rx="4" fill="#ffffff" stroke="#a855f7" stroke-width="1"/>
  <text x="580" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#6b21a8">Idempotency Key</text>
  <text x="580" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">hash(type + userId + ref)</text>

  <rect x="680" y="348" width="175" height="38" rx="4" fill="#ffffff" stroke="#a855f7" stroke-width="1"/>
  <text x="767" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#6b21a8">Cooldown Window</text>
  <text x="767" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">suppress duplicates for N min</text>

  <!-- Channel Provider Health -->
  <rect x="30" y="430" width="420" height="95" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#155e75">Channel Provider Health Monitoring</text>
  <text x="240" y="482" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Monitor delivery rates per provider, detect degradation</text>
  <text x="240" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Auto-failover to backup provider if primary degrades</text>
  <text x="240" y="514" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Circuit breaker: open if error rate &#62; 10% for 5 minutes</text>

  <!-- Key Metrics -->
  <rect x="480" y="430" width="390" height="95" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#9f1239">Delivery SLA by Channel</text>
  <rect x="495" y="475" width="110" height="40" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="550" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9f1239">Push: 95% &#60; 30s</text>
  <text x="550" y="506" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">FCM/APNs dependent</text>
  <rect x="615" y="475" width="110" height="40" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="670" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9f1239">Email: 95% &#60; 5min</text>
  <text x="670" y="506" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Provider dependent</text>
  <rect x="735" y="475" width="110" height="40" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="790" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#9f1239">SMS: 95% &#60; 2min</text>
  <text x="790" y="506" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#374151">Carrier dependent</text>
</svg>