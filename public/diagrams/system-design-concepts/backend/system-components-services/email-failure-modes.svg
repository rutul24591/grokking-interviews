<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Email Failure Modes and Mitigations</text>
  <!-- Failure 1 -->
  <rect x="40" y="70" width="400" height="180" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#991b1b">High Bounce Rate</text>
  <rect x="60" y="120" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Cause: Stale email lists, invalid addresses, typos</text>
  <rect x="60" y="152" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="169" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Impact: Sender reputation damage, potential blacklisting</text>
  <rect x="60" y="184" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="201" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Mitigation: Email validation, bounce suppression lists</text>
  <rect x="60" y="216" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Monitor: Bounce rate per campaign, hard vs soft bounce ratio</text>
  <!-- Failure 2 -->
  <rect x="460" y="70" width="400" height="180" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a16207">Spam Complaint Spike</text>
  <rect x="480" y="120" width="360" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="660" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Cause: Unsolicited emails, poor content quality, frequency</text>
  <rect x="480" y="152" width="360" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="660" y="169" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Impact: ISP blocks, domain blacklisting, reputation loss</text>
  <rect x="480" y="184" width="360" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="660" y="201" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Mitigation: Opt-in confirmation, easy unsubscribe, frequency caps</text>
  <rect x="480" y="216" width="360" height="25" rx="4" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="660" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Monitor: Complaint rate per campaign, ISP feedback loops</text>
  <!-- Failure 3 -->
  <rect x="40" y="280" width="400" height="180" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">Provider Outage</text>
  <rect x="60" y="330" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="240" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Cause: SMTP provider downtime, API failures, rate limit blocks</text>
  <rect x="60" y="362" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="240" y="379" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Impact: Email delivery delays, password resets not arriving</text>
  <rect x="60" y="394" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="240" y="411" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Mitigation: Multi-provider failover, queue persistence, alerts</text>
  <rect x="60" y="426" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="240" y="443" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Monitor: Provider health, queue depth, retry counts</text>
  <!-- Failure 4 -->
  <rect x="460" y="280" width="400" height="180" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="660" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Template Rendering Failure</text>
  <rect x="480" y="330" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Cause: Missing variables, broken HTML, rendering engine bugs</text>
  <rect x="480" y="362" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="379" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Impact: Unreadable emails, broken links, user confusion</text>
  <rect x="480" y="394" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="411" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Mitigation: Template validation, fallback content, test sends</text>
  <rect x="480" y="426" width="360" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="443" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Monitor: Template error rate, rendering failures per template</text>
</svg>