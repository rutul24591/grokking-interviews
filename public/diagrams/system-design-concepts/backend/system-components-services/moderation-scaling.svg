<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="55" fill="#f9fafb" rx="0"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#111827">Scaling Content Moderation</text>

  <!-- Left: Volume Challenges -->
  <rect x="30" y="80" width="400" height="440" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="230" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#111827">Volume &amp; Compute Challenges</text>

  <rect x="55" y="130" width="350" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="230" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#374151">Text Moderation (Lightweight)</text>
  <text x="230" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">High throughput, low latency. Can run sync in request path.</text>
  <text x="230" y="193" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Keyword rules + lightweight classifier. Scale horizontally easily.</text>

  <rect x="55" y="225" width="350" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="230" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#374151">Image Moderation (Moderate Compute)</text>
  <text x="230" y="270" text-anchor="middle" font-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Hash matching (perceptual hash) for known bad content.</text>
  <text x="230" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">ML inference (CNN/ViT) for novel content. GPU-backed workers.</text>

  <rect x="55" y="320" width="350" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="230" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#374151">Video Moderation (Heavy Compute)</text>
  <text x="230" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Frame extraction at intervals, then image classification.</text>
  <text x="230" y="383" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Audio transcription + text analysis. Async pipeline only.</text>

  <rect x="55" y="415" width="350" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="230" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#374151">Human Review Capacity</text>
  <text x="230" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Limited by reviewer count, SLA, and reviewer wellbeing.</text>
  <text x="230" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Auto-scaling: prioritize by severity, outsource overflow.</text>

  <!-- Right: Scaling Strategies -->
  <rect x="460" y="80" width="410" height="440" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="665" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="#111827">Scaling Strategies</text>

  <rect x="485" y="130" width="360" height="90" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="665" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#374151">Strategy 1: Async Pipeline for Heavy Content</text>
  <text x="665" y="177" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Images/video processed asynchronously via message queue.</text>
  <text x="665" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Content published with post-hoc moderation. Violations trigger</text>
  <text x="665" y="213" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">takedown + user notification after the fact.</text>

  <rect x="485" y="240" width="360" height="90" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="665" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#374151">Strategy 2: Model Distillation &amp; Caching</text>
  <text x="665" y="287" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Use smaller distilled models for common cases, reserve large</text>
  <text x="665" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">models for borderline content. Cache results for duplicate</text>
  <text x="665" y="323" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">content (perceptual hashing, URL canonicalization).</text>

  <rect x="485" y="350" width="360" height="90" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="665" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#374151">Strategy 3: Reputation-Based Triage</text>
  <text x="665" y="397" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Trusted users get lighter moderation. New/suspicious accounts</text>
  <text x="665" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">get pre-publication review. Reduces overall moderation load</text>
  <text x="665" y="433" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">while maintaining safety for high-risk content.</text>

  <rect x="485" y="460" width="360" height="45" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="665" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#3730a3">Strategy 4: Geographic Distribution</text>
  <text x="665" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Regional moderation queues for localized content, language, and policy.</text>
</svg>