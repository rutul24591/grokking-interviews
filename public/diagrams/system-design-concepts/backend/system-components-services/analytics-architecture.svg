<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <rect width="900" height="550" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Analytics Service Architecture</text>

  <!-- Client Event Sources -->
  <rect x="40" y="70" width="380" height="130" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="230" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e40af">Client Event Sources</text>
  <rect x="60" y="115" width="340" height="35" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="230" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Web (JavaScript), Mobile SDK (iOS, Android)</text>
  <rect x="60" y="160" width="340" height="35" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="230" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Server-side events (backend services, APIs)</text>

  <!-- Event Ingestion -->
  <rect x="460" y="70" width="400" height="130" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#a16207">Event Ingestion Layer</text>
  <rect x="480" y="115" width="360" height="35" rx="6" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="660" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">HTTPS endpoint, batched event submission</text>
  <rect x="480" y="160" width="360" height="35" rx="6" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="660" y="182" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Validate schema, deduplicate, enqueue to message bus</text>

  <!-- Arrows -->
  <line x1="420" y1="120" x2="460" y2="120" stroke="#64748b" stroke-width="2"/>
  <polygon points="460,115 470,120 460,125" fill="#64748b"/>

  <!-- Stream Processing -->
  <rect x="40" y="230" width="400" height="130" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#166534">Stream Processing Pipeline</text>
  <rect x="60" y="275" width="360" height="35" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="240" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Real-time enrichment: session, user profile, geo</text>
  <rect x="60" y="320" width="360" height="35" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="240" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Route: real-time dashboards, alerting systems</text>

  <!-- Batch Processing / Data Lake -->
  <rect x="460" y="230" width="400" height="130" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#6b21a8">Batch Processing &amp; Data Lake</text>
  <rect x="480" y="275" width="360" height="35" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Write to data lake (Parquet, partitioned by date)</text>
  <rect x="480" y="320" width="360" height="35" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="660" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Batch jobs: ETL, aggregation, ML feature pipelines</text>

  <!-- Arrows between stream and batch -->
  <line x1="440" y1="295" x2="460" y2="295" stroke="#64748b" stroke-width="2"/>
  <polygon points="460,290 470,295 460,300" fill="#64748b"/>

  <!-- Storage and Query -->
  <rect x="40" y="390" width="400" height="80" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="240" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0c4a6e">Storage &amp; Query Layer</text>
  <text x="240" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">ClickHouse, Druid, BigQuery &#8212; columnar, fast aggregation</text>

  <!-- Dashboards and APIs -->
  <rect x="460" y="390" width="400" height="80" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#991b1b">Dashboards &amp; APIs</text>
  <text x="660" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#334155">Real-time dashboards, programmatic access, alerting</text>

  <!-- Key principle -->
  <rect x="40" y="495" width="820" height="45" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="450" y="523" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#a16207">Lambda architecture: real-time stream for low-latency insights, batch pipeline for accuracy and historical analysis</text>
</svg>
