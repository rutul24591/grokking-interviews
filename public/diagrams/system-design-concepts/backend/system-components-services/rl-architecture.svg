<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Rate Limiting Service Architecture</text>

  <!-- Client Requests -->
  <rect x="30" y="65" width="180" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Client Requests</text>
  <text x="120" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">API calls with API key</text>
  <text x="120" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">IP address, user ID</text>

  <!-- Rate Limiter -->
  <rect x="240" y="65" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="340" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#166534">Rate Limiter Engine</text>
  <text x="340" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Token Bucket / Sliding Window</text>
  <text x="340" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Distributed counter (Redis)</text>

  <!-- Rate Limit Store -->
  <rect x="470" y="65" width="200" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="570" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Rate Limit Store</text>
  <text x="570" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Redis Cluster</text>
  <text x="570" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Counters + TTLs</text>

  <!-- Response -->
  <rect x="700" y="65" width="170" height="80" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="785" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#6b21a8">Response</text>
  <text x="785" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">200 OK or 429 Too Many</text>
  <text x="785" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#374151">Rate limit headers</text>

  <!-- Algorithm Comparison -->
  <rect x="30" y="180" width="420" height="180" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#155e75">Rate Limiting Algorithms</text>

  <rect x="50" y="230" width="380" height="30" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="240" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#155e75">Fixed Window Counter</text>

  <rect x="50" y="268" width="380" height="30" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="240" y="288" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#155e75">Sliding Window Log</text>

  <rect x="50" y="306" width="380" height="30" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="240" y="326" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#155e75">Token Bucket</text>

  <rect x="50" y="344" width="380" height="30" rx="4" fill="#ffffff" stroke="#06b6d4" stroke-width="1"/>
  <text x="240" y="364" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#155e75">Leaky Bucket</text>

  <!-- Rate Limit Tiers -->
  <rect x="480" y="180" width="390" height="180" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#9f1239">Rate Limit Tiers by Plan</text>

  <rect x="495" y="230" width="360" height="28" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="675" y="248" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Different limits based on subscription tier</text>

  <rect x="495" y="268" width="110" height="35" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="550" y="286" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9f1239">Free: 100/hr</text>
  <text x="550" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">burst: 10</text>

  <rect x="615" y="268" width="110" height="35" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="670" y="286" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9f1239">Pro: 1K/hr</text>
  <text x="670" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">burst: 50</text>

  <rect x="735" y="268" width="110" height="35" rx="4" fill="#ffffff" stroke="#f43f5e" stroke-width="1"/>
  <text x="790" y="286" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#9f1239">Enterprise</text>
  <text x="790" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">custom limits</text>

  <rect x="495" y="315" width="360" height="35" rx="4" fill="#fff1f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="675" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Multiple limit dimensions: per-second, per-minute, per-hour, per-day</text>

  <!-- Response Headers -->
  <rect x="30" y="390" width="420" height="130" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Rate Limit Response Headers</text>

  <rect x="50" y="440" width="380" height="25" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="240" y="457" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#334155">X-RateLimit-Limit: 1000</text>

  <rect x="50" y="470" width="380" height="25" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="240" y="487" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#334155">X-RateLimit-Remaining: 847</text>

  <rect x="50" y="500" width="380" height="25" rx="4" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="240" y="517" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#334155">X-RateLimit-Reset: 1712345678</text>

  <!-- Distributed Sync -->
  <rect x="480" y="390" width="390" height="130" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="675" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0c4a6e">Distributed Counter Synchronization</text>

  <rect x="495" y="440" width="360" height="28" rx="4" fill="#ffffff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="675" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="#374151">Redis INCR + EXPIRE for atomic counter operations</text>

  <rect x="495" y="478" width="170" height="30" rx="4" fill="#ffffff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="580" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#0c4a6e">Single Redis: simple</text>

  <rect x="680" y="478" width="175" height="30" rx="4" fill="#ffffff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="767" y="497" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#0c4a6e">Redis Cluster: scalable</text>

  <!-- Bottom -->
  <rect x="30" y="520" width="840" height="25" rx="4" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="120" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#0c4a6e">Key Metrics:</text>
  <text x="210" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Latency overhead: &#60; 1ms per check</text>
  <text x="460" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">429 rate: monitor for abuse patterns</text>
  <text x="710" y="537" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Accuracy: eventually consistent across nodes</text>
</svg>