<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Email Service Architecture</title>
  <desc id="desc">Email service architecture showing templates, provider integration, sending pipeline, and bounce processing</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Email Service Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Templates, provider integration, sending pipeline, and bounce processing</text>
  
  <!-- Request Sources -->
  <rect x="30" y="85" width="150" height="180" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="105" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Request Sources</text>
  
  <rect x="50" y="125" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="148" text-anchor="middle" font-size="9" fill="#64748b">Transactional</text>
  
  <rect x="50" y="165" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="188" text-anchor="middle" font-size="9" fill="#64748b">Marketing/Bulk</text>
  
  <rect x="50" y="205" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="228" text-anchor="middle" font-size="9" fill="#64748b">Notifications</text>
  
  <!-- Email Request Flow -->
  <line x1="185" y1="175" x2="235" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="210" y="165" text-anchor="middle" font-size="9" fill="#64748b">Send Request</text>
  
  <!-- Email Service -->
  <rect x="235" y="85" width="350" height="180" rx="8" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="410" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Email Service</text>
  
  <rect x="255" y="125" width="310" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="410" y="150" text-anchor="middle" font-size="9" fill="#64748b">Template Engine + Validation</text>
  
  <rect x="255" y="175" width="145" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="327" y="200" text-anchor="middle" font-size="9" fill="#64748b">Queue Management</text>
  
  <rect x="410" y="175" width="155" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="487" y="200" text-anchor="middle" font-size="9" fill="#64748b">Rate Limiting</text>
  
  <!-- Provider Integration -->
  <line x1="590" y1="175" x2="640" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="615" y="165" text-anchor="middle" font-size="9" fill="#64748b">SMTP/API</text>
  
  <!-- Email Providers -->
  <rect x="640" y="85" width="230" height="180" rx="8" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
  <text x="755" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Email Providers</text>
  
  <rect x="660" y="125" width="190" height="35" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="755" y="148" text-anchor="middle" font-size="9" fill="#64748b">SendGrid/AWS SES</text>
  
  <rect x="660" y="165" width="190" height="35" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="755" y="188" text-anchor="middle" font-size="9" fill="#64748b">Mailgun/Postmark</text>
  
  <rect x="660" y="205" width="190" height="35" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="755" y="228" text-anchor="middle" font-size="9" fill="#64748b">Self-hosted (Postfix)</text>
  
  <!-- Bounce/Feedback Loop -->
  <line x1="755" y1="265" x2="755" y2="315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-down)"/>
  <text x="775" y="290" text-anchor="start" font-size="8" fill="#64748b">Bounces/Complaints</text>
  
  <rect x="640" y="320" width="230" height="100" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="755" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Bounce Processing</text>
  
  <rect x="660" y="355" width="190" height="55" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="755" y="380" text-anchor="middle" font-size="9" fill="#64748b">Classify bounces</text>
  <text x="755" y="395" text-anchor="middle" font-size="8" fill="#fcd34d">Hard vs Soft</text>
  <text x="755" y="408" text-anchor="middle" font-size="7" fill="#fcd34d">Update suppression list</text>
  
  <!-- Template System -->
  <rect x="30" y="280" width="280" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="170" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Template System</text>
  
  <rect x="50" y="320" width="240" height="110" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="345" text-anchor="middle" font-size="9" fill="#64748b">Versioned templates</text>
  <text x="170" y="360" text-anchor="middle" font-size="9" fill="#64748b">Variable substitution</text>
  <text x="170" y="375" text-anchor="middle" font-size="9" fill="#64748b">HTML + Text versions</text>
  <text x="170" y="390" text-anchor="middle" font-size="9" fill="#64748b">Preview and test</text>
  <text x="170" y="405" text-anchor="middle" font-size="9" fill="#64748b">Localization support</text>
  
  <!-- Suppression List -->
  <rect x="330" y="280" width="280" height="160" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="470" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Suppression List</text>
  
  <rect x="350" y="320" width="240" height="110" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="470" y="345" text-anchor="middle" font-size="9" fill="#64748b">Hard bounces (permanent)</text>
  <text x="470" y="360" text-anchor="middle" font-size="9" fill="#64748b">Complaints (spam reports)</text>
  <text x="470" y="375" text-anchor="middle" font-size="9" fill="#64748b">Unsubscribes</text>
  <text x="470" y="390" text-anchor="middle" font-size="9" fill="#64748b">Invalid addresses</text>
  <text x="470" y="405" text-anchor="middle" font-size="9" fill="#64748b">Checked before send</text>
  
  <!-- Authentication -->
  <rect x="630" y="435" width="240" height="95" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="750" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Email Authentication</text>
  
  <rect x="650" y="470" width="200" height="50" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="750" y="495" text-anchor="middle" font-size="9" fill="#64748b">SPF, DKIM, DMARC</text>
  <text x="750" y="510" text-anchor="middle" font-size="8" fill="#fcd34d">Required for deliverability</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
