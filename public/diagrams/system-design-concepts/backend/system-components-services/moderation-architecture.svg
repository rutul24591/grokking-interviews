<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="55" fill="#f9fafb" rx="0"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#111827">Content Moderation Architecture</text>

  <!-- Content Sources -->
  <rect x="30" y="90" width="160" height="110" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="110" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Content Sources</text>
  <text x="110" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Posts, comments,</text>
  <text x="110" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">images, videos,</text>
  <text x="110" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">profiles, messages</text>
  <text x="110" y="189" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">User reports</text>

  <!-- Moderation Pipeline -->
  <rect x="250" y="80" width="200" height="130" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2.5"/>
  <text x="350" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#3730a3">Moderation Pipeline</text>
  <rect x="270" y="120" width="160" height="28" rx="5" fill="#ffffff" stroke="#6366f1" stroke-width="1"/>
  <text x="350" y="139" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#3730a3">Signal Collection</text>
  <rect x="270" y="153" width="160" height="28" rx="5" fill="#ffffff" stroke="#6366f1" stroke-width="1"/>
  <text x="350" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#3730a3">ML Classification</text>
  <rect x="270" y="186" width="160" height="20" rx="5" fill="#ffffff" stroke="#6366f1" stroke-width="1"/>
  <text x="350" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Confidence scoring</text>

  <!-- Policy Engine -->
  <rect x="500" y="80" width="170" height="130" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="585" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#78350f">Policy Engine</text>
  <text x="585" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Maps signals to</text>
  <text x="585" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">outcomes based on</text>
  <text x="585" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">policy rules &amp; severity</text>
  <text x="585" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Versioned policies</text>
  <text x="585" y="202" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">with rollback</text>

  <!-- Decision Router -->
  <rect x="720" y="80" width="160" height="130" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="800" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#5b21b6">Decision Router</text>
  <text x="800" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Confidence &gt; 95%:</text>
  <text x="800" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Auto-allow/block</text>
  <text x="800" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Confidence 60-95%:</text>
  <text x="800" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Human review queue</text>
  <text x="800" y="202" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Confidence &lt; 60%:</text>

  <!-- Arrows: Sources to Pipeline -->
  <line x1="190" y1="145" x2="245" y2="145" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: Pipeline to Policy -->
  <line x1="450" y1="145" x2="495" y2="145" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: Policy to Router -->
  <line x1="670" y1="145" x2="715" y2="145" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Outcome: Auto Allow -->
  <rect x="30" y="280" width="180" height="80" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="120" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534">Auto Allow</text>
  <text x="120" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Content published</text>
  <text x="120" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Logged for audit</text>

  <!-- Outcome: Auto Block -->
  <rect x="250" y="280" width="180" height="80" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="340" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Auto Block</text>
  <text x="340" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Content rejected</text>
  <text x="340" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">User notified, appealed</text>

  <!-- Outcome: Human Review -->
  <rect x="470" y="280" width="180" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="560" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#78350f">Human Review</text>
  <text x="560" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Queued by priority</text>
  <text x="560" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">SLA per severity</text>

  <!-- Outcome: User Report -->
  <rect x="690" y="280" width="180" height="80" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="780" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#9a3412">User Report Path</text>
  <text x="780" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Community reports</text>
  <text x="780" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#6b7280">fast-track to review</text>

  <!-- Arrows from Router to Outcomes -->
  <path d="M 800 210 Q 800 250 120 275" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="360" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#16a34a">Allow</text>
  <path d="M 800 210 Q 700 250 340 275" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
  <text x="560" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#dc2626">Block</text>
  <line x1="800" y1="210" x2="560" y2="275" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="720" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#f59e0b">Review</text>
  <line x1="800" y1="210" x2="780" y2="275" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Feedback Loop -->
  <rect x="30" y="400" width="840" height="120" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#111827">Feedback Loop &amp; Model Retraining</text>
  <rect x="55" y="445" width="180" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="145" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#374151">Human Review Labels</text>
  <text x="145" y="483" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Reviewer decisions become</text>
  <text x="145" y="496" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">training data for ML models</text>
  <line x1="235" y1="472" x2="270" y2="472" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="275" y="445" width="180" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="365" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#374151">Appeal Outcomes</text>
  <text x="365" y="483" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Successful appeals correct</text>
  <text x="365" y="496" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">false positives in training set</text>
  <line x1="455" y1="472" x2="490" y2="472" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="495" y="445" width="180" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="585" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#374151">Model Retraining</text>
  <text x="585" y="483" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Periodic retraining with</text>
  <text x="585" y="496" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">updated labeled datasets</text>
  <line x1="675" y1="472" x2="710" y2="472" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="715" y="445" width="130" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="780" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#374151">Deploy to Pipeline</text>
  <text x="780" y="483" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Shadow eval then</text>
  <text x="780" y="496" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">gradual rollout</text>

  <!-- Feedback arrow back to pipeline -->
  <path d="M 780 440 Q 780 350 350 215" stroke="#6b7280" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="620" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6b7280">Improved models</text>
</svg>