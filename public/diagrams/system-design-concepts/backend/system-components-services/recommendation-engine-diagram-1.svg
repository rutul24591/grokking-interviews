<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Recommendation Engine Architecture</title>
  <desc id="desc">Recommendation architecture showing candidate retrieval, ranking, feature store, and experimentation</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Recommendation Engine Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Candidate retrieval, ranking, feature store, and experimentation</text>
  
  <!-- User Request -->
  <rect x="30" y="85" width="150" height="180" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="105" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">User Request</text>
  
  <rect x="50" y="125" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="148" text-anchor="middle" font-size="9" fill="#64748b">Homepage</text>
  
  <rect x="50" y="165" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="188" text-anchor="middle" font-size="9" fill="#64748b">Product Page</text>
  
  <rect x="50" y="205" width="110" height="35" rx="3" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="105" y="228" text-anchor="middle" font-size="9" fill="#64748b">Email/App</text>
  
  <!-- Request Flow -->
  <line x1="185" y1="175" x2="235" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="210" y="165" text-anchor="middle" font-size="9" fill="#64748b">Get Recs</text>
  
  <!-- Retrieval Stage -->
  <rect x="235" y="85" width="200" height="180" rx="8" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="335" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Retrieval</text>
  
  <rect x="255" y="125" width="160" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="335" y="150" text-anchor="middle" font-size="9" fill="#64748b">Candidate Generation</text>
  
  <rect x="255" y="175" width="160" height="40" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="335" y="200" text-anchor="middle" font-size="9" fill="#64748b">Embedding Search</text>
  
  <rect x="255" y="225" width="160" height="30" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="335" y="245" text-anchor="middle" font-size="9" fill="#64748b">~1000 candidates</text>
  
  <!-- Ranking Stage -->
  <line x1="440" y1="175" x2="490" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="465" y="165" text-anchor="middle" font-size="9" fill="#64748b">Candidates</text>
  
  <rect x="490" y="85" width="200" height="180" rx="8" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
  <text x="590" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Ranking</text>
  
  <rect x="510" y="125" width="160" height="40" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="590" y="150" text-anchor="middle" font-size="9" fill="#64748b">ML Model Scoring</text>
  
  <rect x="510" y="175" width="160" height="40" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="590" y="200" text-anchor="middle" font-size="9" fill="#64748b">Feature Enrichment</text>
  
  <rect x="510" y="225" width="160" height="30" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="590" y="245" text-anchor="middle" font-size="9" fill="#64748b">~100 ranked items</text>
  
  <!-- Response -->
  <line x1="695" y1="175" x2="745" y2="175" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="720" y="165" text-anchor="middle" font-size="9" fill="#64748b">Top N</text>
  
  <!-- Response -->
  <rect x="745" y="85" width="125" height="180" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="807" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Response</text>
  
  <rect x="765" y="125" width="85" height="40" rx="3" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="807" y="150" text-anchor="middle" font-size="8" fill="#64748b">Top 10</text>
  
  <rect x="765" y="175" width="85" height="40" rx="3" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="807" y="200" text-anchor="middle" font-size="8" fill="#64748b">Render</text>
  
  <rect x="765" y="225" width="85" height="30" rx="3" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="807" y="245" text-anchor="middle" font-size="8" fill="#64748b">Track</text>
  
  <!-- Feature Store -->
  <line x1="590" y1="265" x2="590" y2="315" stroke="#64748b" stroke-width="3" marker-end="url(#arrow-down)"/>
  
  <rect x="440" y="320" width="300" height="100" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="590" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Feature Store</text>
  
  <rect x="460" y="355" width="120" height="55" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="520" y="380" text-anchor="middle" font-size="8" fill="#64748b">User Features</text>
  <text x="520" y="395" text-anchor="middle" font-size="8" fill="#64748b">History, prefs</text>
  
  <rect x="595" y="355" width="120" height="55" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="655" y="380" text-anchor="middle" font-size="8" fill="#64748b">Item Features</text>
  <text x="655" y="395" text-anchor="middle" font-size="8" fill="#64748b">Metadata, quality</text>
  
  <!-- Data Sources -->
  <rect x="30" y="280" width="280" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="170" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Data Sources</text>
  
  <rect x="50" y="320" width="240" height="110" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="345" text-anchor="middle" font-size="9" fill="#64748b">User Behavior Logs</text>
  <text x="170" y="360" text-anchor="middle" font-size="9" fill="#64748b">Item Catalog</text>
  <text x="170" y="375" text-anchor="middle" font-size="9" fill="#64748b">Real-time Events</text>
  <text x="170" y="390" text-anchor="middle" font-size="9" fill="#64748b">Offline Features</text>
  <text x="170" y="405" text-anchor="middle" font-size="9" fill="#64748b">Training Data</text>
  
  <!-- Model Training -->
  <rect x="330" y="280" width="280" height="160" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="470" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Model Training</text>
  
  <rect x="350" y="320" width="240" height="110" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="470" y="345" text-anchor="middle" font-size="9" fill="#64748b">Offline Training</text>
  <text x="470" y="360" text-anchor="middle" font-size="9" fill="#64748b">Model Validation</text>
  <text x="470" y="375" text-anchor="middle" font-size="9" fill="#64748b">A/B Testing</text>
  <text x="470" y="390" text-anchor="middle" font-size="9" fill="#64748b">Model Registry</text>
  <text x="470" y="405" text-anchor="middle" font-size="9" fill="#64748b">Canary Deployment</text>
  
  <!-- Feedback Loop -->
  <rect x="630" y="435" width="240" height="95" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="750" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Feedback Loop</text>
  
  <rect x="650" y="470" width="200" height="50" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="750" y="495" text-anchor="middle" font-size="9" fill="#64748b">Click/Conversion Tracking</text>
  <text x="750" y="510" text-anchor="middle" font-size="8" fill="#fcd34d">Model Retraining</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
