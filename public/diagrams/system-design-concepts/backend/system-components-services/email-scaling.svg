<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Email Scaling: Throughput and Reputation Management</text>
  <!-- Volume challenges -->
  <rect x="40" y="70" width="400" height="180" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#991b1b">Volume Challenges</text>
  <rect x="60" y="120" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Provider rate limits (SendGrid: 10K/sec, SES: scalable but throttled)</text>
  <rect x="60" y="152" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="169" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">ISP throttling (Gmail, Outlook limit incoming volume per sender)</text>
  <rect x="60" y="184" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="201" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Reputation warming (new IPs must ramp volume gradually)</text>
  <rect x="60" y="216" width="360" height="25" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="240" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Queue management during traffic spikes</text>
  <!-- Scaling strategies -->
  <rect x="460" y="70" width="400" height="180" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#166534">Scaling Strategies</text>
  <rect x="480" y="120" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Multi-provider failover (primary + backup SMTP)</text>
  <rect x="480" y="152" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="169" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">IP pool management (dedicated IPs per sender/domain)</text>
  <rect x="480" y="184" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="201" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Warm-up schedules (gradual volume increase for new IPs)</text>
  <rect x="480" y="216" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Queue prioritization (transactional before marketing)</text>
  <!-- IP warming schedule -->
  <rect x="40" y="280" width="820" height="100" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="450" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a16207">IP Warm-Up Schedule</text>
  <rect x="60" y="325" width="140" height="40" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="130" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Day 1-3: 50/day</text>
  <text x="130" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#a16207">Establish baseline</text>
  <rect x="220" y="325" width="140" height="40" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="290" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Day 4-7: 500/day</text>
  <text x="290" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#a16207">Monitor engagement</text>
  <rect x="380" y="325" width="140" height="40" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="450" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Day 8-14: 5K/day</text>
  <text x="450" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#a16207">Check complaint rate</text>
  <rect x="540" y="325" width="140" height="40" rx="5" fill="#ffffff" stroke="#fef08a" stroke-width="1"/>
  <text x="610" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Day 15-21: 25K/day</text>
  <text x="610" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#a16207">Validate consistency</text>
  <rect x="700" y="325" width="140" height="40" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="770" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#166534">Day 22+: Full</text>
  <text x="770" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#166534">Monitor continuously</text>
  <!-- Key metrics -->
  <rect x="40" y="400" width="400" height="85" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Reputation Metrics</text>
  <text x="240" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Bounce rate &lt; 2%, Complaint rate &lt; 0.1%, Spam trap hits = 0</text>
  <text x="240" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Open rate &gt; 20%, Unsubscribe rate &lt; 0.5%</text>
  <!-- Provider distribution -->
  <rect x="460" y="400" width="400" height="85" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="660" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Provider Distribution</text>
  <text x="660" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Route by volume, cost, and deliverability score</text>
  <text x="660" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Failover to backup provider when primary degrades</text>
</svg>