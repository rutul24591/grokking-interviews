<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <rect width="900" height="500" fill="#ffffff" rx="12"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b">Session Scaling: Stateful vs Stateless, Distributed Storage</text>
  <!-- Stateless JWT -->
  <rect x="40" y="70" width="400" height="180" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1e40af">Stateless JWT Tokens</text>
  <rect x="60" y="120" width="360" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Token contains all session data (claims)</text>
  <rect x="60" y="152" width="360" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="169" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Validation is cryptographic (no server lookup)</text>
  <rect x="60" y="184" width="360" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="201" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Scales infinitely — no shared state</text>
  <rect x="60" y="216" width="360" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="240" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Cannot revoke individual tokens before expiry</text>
  <!-- Stateful Sessions -->
  <rect x="460" y="70" width="400" height="180" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#166534">Stateful Session Store</text>
  <rect x="480" y="120" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Session ID references server-side data</text>
  <rect x="480" y="152" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="169" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Each validation requires store lookup</text>
  <rect x="480" y="184" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="201" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Immediate revocation (delete from store)</text>
  <rect x="480" y="216" width="360" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Store must scale with active sessions</text>
  <!-- Hybrid approach -->
  <rect x="40" y="280" width="820" height="100" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="450" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a16207">Hybrid Approach: Stateless Access + Stateful Refresh</text>
  <text x="450" y="332" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#475569">Short-lived JWT access tokens (stateless validation, 15-min expiry) + long-lived refresh tokens (stateful, stored in Redis, revocable)</text>
  <text x="450" y="356" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#475569">Balance: efficiency for frequent validation, revocation capability via refresh token invalidation</text>
  <!-- Scaling patterns -->
  <rect x="40" y="400" width="400" height="85" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="240" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Redis Cluster Scaling</text>
  <text x="240" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Hash slots distribute sessions across nodes</text>
  <text x="240" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Replicas for read scaling and failover</text>
  <rect x="460" y="400" width="400" height="85" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Session Affinity (Sticky Sessions)</text>
  <text x="660" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Route user to same node (reduces store lookups)</text>
  <text x="660" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Risk: node failure loses sessions for affected users</text>
</svg>