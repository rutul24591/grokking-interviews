<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Analytics Service Architecture</title>
  <desc id="desc">Analytics service architecture showing event producers, ingestion, storage, and query/metrics outputs</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Analytics Service Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Event producers, ingestion pipeline, storage, and query outputs</text>
  
  <!-- Event Producers -->
  <rect x="30" y="85" width="180" height="180" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Event Producers</text>
  
  <rect x="50" y="125" width="140" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="120" y="148" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Web/Mobile Apps</text>
  
  <rect x="50" y="165" width="140" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="120" y="188" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Backend Services</text>
  
  <rect x="50" y="205" width="140" height="35" rx="3" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="120" y="228" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Third-party Integrations</text>
  
  <!-- Events flow -->
  <line x1="215" y1="175" x2="265" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="240" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Events</text>
  
  <!-- Ingestion Pipeline -->
  <rect x="265" y="85" width="280" height="180" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="405" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Ingestion Pipeline</text>
  
  <rect x="285" y="125" width="240" height="35" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="405" y="148" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">API Gateway / Collector</text>
  
  <rect x="285" y="165" width="240" height="35" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="405" y="188" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Message Queue (Kafka/Kinesis)</text>
  
  <rect x="285" y="205" width="240" height="35" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="405" y="228" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Stream Processor (Flink/Spark)</text>
  
  <!-- Storage -->
  <line x1="550" y1="175" x2="600" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow)"/>
  
  <rect x="600" y="85" width="270" height="180" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Storage Layer</text>
  
  <rect x="620" y="125" width="230" height="35" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="735" y="148" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Raw Events (S3/GCS)</text>
  
  <rect x="620" y="165" width="230" height="35" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="735" y="188" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Processed (ClickHouse/BigQuery)</text>
  
  <rect x="620" y="205" width="230" height="35" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="735" y="228" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Aggregates (Redis/Druid)</text>
  
  <!-- Outputs -->
  <line x1="735" y1="265" x2="735" y2="315" stroke="var(--text-theme, #64748b)" stroke-width="3" marker-end="url(#arrow-down)"/>
  
  <rect x="600" y="320" width="270" height="100" rx="8" fill="var(--bg-theme, #06b6d4)" stroke="var(--border-theme, #0891b2)" stroke-width="2"/>
  <text x="735" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Query &amp; Output</text>
  
  <rect x="620" y="355" width="110" height="55" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #06b6d4)" stroke-width="1"/>
  <text x="675" y="380" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Dashboards</text>
  <text x="675" y="395" text-anchor="middle" font-size="8" fill="#67e8f9">Metrics</text>
  
  <rect x="740" y="355" width="110" height="55" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #06b6d4)" stroke-width="1"/>
  <text x="795" y="380" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">APIs</text>
  <text x="795" y="395" text-anchor="middle" font-size="8" fill="#67e8f9">Exports</text>
  
  <!-- Schema Registry -->
  <rect x="30" y="320" width="280" height="120" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="170" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Schema Registry</text>
  
  <rect x="50" y="360" width="240" height="70" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="170" y="385" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Event definitions</text>
  <text x="170" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Validation rules</text>
  <text x="170" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Version control</text>
  
  <!-- Data Quality -->
  <rect x="330" y="320" width="250" height="120" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="455" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Data Quality</text>
  
  <rect x="350" y="360" width="210" height="70" rx="4" fill="var(--bg-panel-soft, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="455" y="385" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Deduplication</text>
  <text x="455" y="400" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Validation</text>
  <text x="455" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Monitoring</text>
  
  <!-- Privacy &amp; Compliance -->
  <rect x="600" y="435" width="270" height="95" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Privacy &amp; Compliance</text>
  
  <rect x="620" y="470" width="230" height="50" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="495" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">PII masking</text>
  <text x="735" y="510" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Retention policies</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
