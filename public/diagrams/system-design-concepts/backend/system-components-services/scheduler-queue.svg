<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#111827">Job Queue Processing Model &#38; Priority Handling</text>

  <!-- Queue Structure -->
  <rect x="30" y="65" width="540" height="200" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Multi-Priority Queue Structure</text>

  <!-- Priority High -->
  <rect x="50" y="110" width="500" height="35" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="80" y="132" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">HIGH</text>
  <text x="150" y="132" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Job-101 | Job-102 | Job-103 | Job-104 | Job-105</text>

  <!-- Priority Medium -->
  <rect x="50" y="155" width="500" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="177" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#92400e">MEDIUM</text>
  <text x="170" y="177" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Job-201 | Job-202 | Job-203 | Job-204 | Job-205 | Job-206 | Job-207</text>

  <!-- Priority Low -->
  <rect x="50" y="200" width="500" height="35" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="80" y="222" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">LOW</text>
  <text x="130" y="222" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Job-301 | Job-302 | Job-303 | Job-304 | Job-305 | Job-306 | Job-307 | Job-308</text>

  <!-- Processing Strategy -->
  <rect x="600" y="65" width="270" height="200" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="735" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Processing Strategy</text>

  <rect x="615" y="110" width="240" height="40" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="735" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Strict Priority</text>
  <text x="735" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Always drain HIGH first</text>

  <rect x="615" y="160" width="240" height="40" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="735" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Weighted Fair Queuing</text>
  <text x="735" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">50% HIGH, 30% MED, 20% LOW</text>

  <rect x="615" y="210" width="240" height="40" rx="4" fill="#ffffff" stroke="#3b82f6" stroke-width="1"/>
  <text x="735" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#1e40af">Aging Priority</text>
  <text x="735" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Boost old jobs to prevent starvation</text>

  <!-- Job Lifecycle -->
  <rect x="30" y="295" width="840" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#166534">Job Lifecycle: Enqueue &#8594; Dispatch &#8594; Execute &#8594; Complete/Fail</text>

  <rect x="50" y="345" width="150" height="55" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="125" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">1. Enqueue</text>
  <text x="125" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Job created with</text>
  <text x="125" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">priority, payload, id</text>

  <line x1="200" y1="372" x2="220" y2="372" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="220" y="345" width="150" height="55" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="295" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">2. Dispatch</text>
  <text x="295" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Scheduler picks job</text>
  <text x="295" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">from queue by priority</text>

  <line x1="370" y1="372" x2="390" y2="372" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="390" y="345" width="150" height="55" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="465" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">3. Execute</text>
  <text x="465" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Worker claims job,</text>
  <text x="465" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">runs handler, heartbeat</text>

  <line x1="540" y1="372" x2="560" y2="372" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="560" y="345" width="140" height="55" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="630" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">4a. Complete</text>
  <text x="630" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Success: mark done,</text>
  <text x="630" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">trigger chained jobs</text>

  <line x1="700" y1="372" x2="720" y2="372" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="720" y="345" width="140" height="55" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="790" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#166534">4b. Fail/Retry</text>
  <text x="790" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">Exponential backoff,</text>
  <text x="790" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#374151">max retries then DLQ</text>

  <!-- Retry Strategy -->
  <rect x="30" y="445" width="410" height="85" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="235" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Exponential Backoff Retry</text>

  <rect x="50" y="490" width="70" height="30" rx="4" fill="#fefce8" stroke="#f59e0b" stroke-width="1"/>
  <text x="85" y="509" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">1s</text>

  <rect x="135" y="490" width="70" height="30" rx="4" fill="#fefce8" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="509" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">2s</text>

  <rect x="220" y="490" width="70" height="30" rx="4" fill="#fefce8" stroke="#f59e0b" stroke-width="1"/>
  <text x="255" y="509" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">4s</text>

  <rect x="305" y="490" width="70" height="30" rx="4" fill="#fefce8" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="509" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#92400e">8s</text>

  <rect x="390" y="490" width="40" height="30" rx="4" fill="#fff1f2" stroke="#ef4444" stroke-width="1"/>
  <text x="410" y="509" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#991b1b">DLQ</text>

  <!-- Dead Letter Queue -->
  <rect x="470" y="445" width="400" height="85" rx="8" fill="#fff1f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="670" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#9f1239">Dead Letter Queue (DLQ)</text>
  <text x="670" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Jobs that fail after max retries are moved to DLQ</text>
  <text x="670" y="515" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Manual inspection, replay, or permanent discard</text>
</svg>