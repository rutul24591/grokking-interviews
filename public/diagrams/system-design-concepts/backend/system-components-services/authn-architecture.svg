<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-accent" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="55" fill="#f9fafb" rx="0"/>
  <text x="450" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#111827">Authentication Service Architecture</text>

  <!-- Client -->
  <rect x="30" y="100" width="140" height="90" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="100" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Client</text>
  <text x="100" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Browser / Mobile</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">/ Desktop App</text>

  <!-- API Gateway -->
  <rect x="240" y="100" width="140" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="310" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#78350f">API Gateway</text>
  <text x="310" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Token Validation</text>
  <text x="310" y="173" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">&amp; Rate Limiting</text>

  <!-- Auth Service -->
  <rect x="450" y="80" width="160" height="130" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2.5"/>
  <text x="530" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#3730a3">Auth Service</text>
  <text x="530" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Credential Verification</text>
  <text x="530" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">MFA Challenge</text>
  <text x="530" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Token Issuance</text>
  <text x="530" y="186" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Session Management</text>
  <text x="530" y="204" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Risk Engine</text>

  <!-- MFA Provider -->
  <rect x="450" y="280" width="160" height="70" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534">MFA Provider</text>
  <text x="530" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">TOTP / SMS / Push</text>

  <!-- Identity Store -->
  <rect x="680" y="80" width="190" height="130" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="2"/>
  <text x="775" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#9d174d">Identity Store</text>
  <text x="775" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">User Credentials</text>
  <text x="775" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Password Hashes</text>
  <text x="775" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">(bcrypt/Argon2id)</text>
  <text x="775" y="186" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">MFA Secrets</text>
  <text x="775" y="204" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Sign. Key Material</text>

  <!-- Session/Token Store -->
  <rect x="240" y="280" width="160" height="70" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="320" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#854d0e">Session / Token Store</text>
  <text x="320" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Redis / DynamoDB</text>

  <!-- Backend Services -->
  <rect x="30" y="380" width="140" height="90" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="100" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#5b21b6">Backend Services</text>
  <text x="100" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Validate tokens</text>
  <text x="100" y="453" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">locally via JWKS</text>

  <!-- Audit Log -->
  <rect x="240" y="380" width="160" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="320" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534">Audit Log</text>
  <text x="320" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Login attempts,</text>
  <text x="320" y="453" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">token events, MFA</text>

  <!-- Key Discovery -->
  <rect x="450" y="380" width="160" height="90" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="530" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#9a3412">Key Discovery</text>
  <text x="530" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">/.well-known/jwks.json</text>
  <text x="530" y="453" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Public key rotation</text>

  <!-- SSO/OIDC -->
  <rect x="680" y="280" width="190" height="70" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="775" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#155e75">SSO / OIDC Provider</text>
  <text x="775" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#6b7280">Google, Okta, Azure AD</text>

  <!-- Arrows: Client to Gateway -->
  <line x1="170" y1="145" x2="235" y2="145" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="203" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">HTTPS</text>

  <!-- Arrows: Gateway to Auth Service -->
  <line x1="380" y1="145" x2="445" y2="145" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="413" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Creds</text>

  <!-- Arrows: Auth Service to Identity Store -->
  <line x1="610" y1="145" x2="675" y2="145" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <text x="643" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6366f1">Verify</text>

  <!-- Arrows: Auth Service to MFA -->
  <line x1="530" y1="210" x2="530" y2="275" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: Auth Service to Session Store -->
  <line x1="480" y1="210" x2="370" y2="275" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: Auth Service to Backend Services -->
  <line x1="530" y1="80" x2="530" y2="65" stroke="none"/>
  <line x1="100" y1="380" x2="100" y2="195" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="100" y1="195" x2="25" y2="195" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="25" y1="195" x2="25" y2="105" stroke="none"/>
  <line x1="25" y1="105" x2="25" y2="100" stroke="none"/>
  <!-- Direct path: Auth Service to Backend via token -->
  <path d="M 450 200 Q 200 200 100 375" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow-accent)" stroke-dasharray="6,3"/>
  <text x="220" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6366f1">JWT / Access Token</text>

  <!-- Arrows: Auth Service to Audit Log -->
  <line x1="470" y1="210" x2="350" y2="375" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: Auth Service to Key Discovery -->
  <line x1="530" y1="210" x2="530" y2="375" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrows: Auth Service to SSO -->
  <line x1="610" y1="145" x2="775" y2="145" stroke="none"/>
  <line x1="610" y1="145" x2="675" y2="145" stroke="none"/>
  <path d="M 610 145 Q 700 200 775 275" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="710" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#06b6d4">OAuth2/OIDC</text>

  <!-- Arrows: Gateway to Backend -->
  <path d="M 100 375 Q 100 250 310 195" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="160" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Forward after auth</text>

  <!-- Legend -->
  <rect x="30" y="490" width="840" height="45" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="55" y1="512" x2="100" y2="512" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="108" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">= Token flow (stateless validation)</text>
  <line x1="310" y1="512" x2="355" y2="512" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="363" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">= Sync RPC call</text>
  <line x1="490" y1="512" x2="535" y2="512" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="543" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151">= External IdP integration</text>
</svg>