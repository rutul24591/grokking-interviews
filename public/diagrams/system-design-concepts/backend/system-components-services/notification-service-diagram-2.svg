<svg xmlns="http://www.w3.org/2000/svg" " viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Notification Control Points</title>
  <desc id="desc">Notification control points showing idempotency keys, queues, retry policies, and preference enforcement</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Notification Control Points</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Idempotency keys, queues, retry policies, and preference enforcement</text>
  
  <!-- Idempotency Keys -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#3b82f6">Idempotency Keys</text>
  
  <rect x="50" y="125" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="150" y="150" text-anchor="middle" font-size="10" fill="#64748b">Key Generation</text>
  
  <rect x="60" y="160" width="180" height="30" rx="2" fill="#3b82f6"/>
  <text x="150" y="180" text-anchor="middle" font-size="8" fill="white">user_id + type + timestamp</text>
  
  <rect x="60" y="195" width="180" height="30" rx="2" fill="#10b981"/>
  <text x="150" y="215" text-anchor="middle" font-size="8" fill="white">Hash for stability</text>
  
  <rect x="50" y="235" width="200" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="150" y="260" text-anchor="middle" font-size="10" fill="#64748b">Dedup Window</text>
  
  <text x="70" y="285" text-anchor="start" font-size="9" fill="#64748b">- Store seen keys (24h)</text>
  <text x="70" y="300" text-anchor="start" font-size="9" fill="#64748b">- Reject duplicates</text>
  <text x="70" y="315" text-anchor="start" font-size="9" fill="#64748b">- Prevents double-notify</text>
  
  <!-- Queue Management -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">Queue Management</text>
  
  <rect x="335" y="125" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="#64748b">Priority Queues</text>
  
  <rect x="345" y="160" width="210" height="30" rx="2" fill="#ef4444"/>
  <text x="450" y="180" text-anchor="middle" font-size="8" fill="white">Critical (2FA, Security)</text>
  
  <rect x="345" y="195" width="210" height="30" rx="2" fill="#f59e0b"/>
  <text x="450" y="215" text-anchor="middle" font-size="8" fill="white">Normal (Updates)</text>
  
  <rect x="335" y="235" width="230" height="100" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" font-size="10" fill="#64748b">Rate Limiting</text>
  
  <text x="355" y="285" text-anchor="start" font-size="9" fill="#64748b">- Per-user: 10/hour</text>
  <text x="355" y="300" text-anchor="start" font-size="9" fill="#64748b">- Per-channel: 1/minute</text>
  <text x="355" y="315" text-anchor="start" font-size="9" fill="#64748b">- Global: provider limits</text>
  
  <!-- Retry Policies -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Retry Policies</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="735" y="150" text-anchor="middle" font-size="10" fill="#64748b">Retry Strategy</text>
  
  <rect x="630" y="160" width="210" height="30" rx="2" fill="#f59e0b"/>
  <text x="735" y="180" text-anchor="middle" font-size="8" fill="white">Exponential Backoff</text>
  
  <rect x="630" y="195" width="210" height="30" rx="2" fill="#3b82f6"/>
  <text x="735" y="215" text-anchor="middle" font-size="8" fill="white">1s, 5s, 30s, 2min</text>
  
  <rect x="620" y="235" width="230" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="260" text-anchor="middle" font-size="10" fill="#64748b">Failure Classification</text>
  
  <text x="640" y="285" text-anchor="start" font-size="9" fill="#64748b">- Retry: Network, timeout</text>
  <text x="640" y="300" text-anchor="start" font-size="9" fill="#64748b">- Fail: Invalid number</text>
  <text x="640" y="315" text-anchor="start" font-size="9" fill="#64748b">- DLQ: After max retries</text>
  
  <!-- Preference Enforcement -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Preference Enforcement</text>
  
  <rect x="50" y="360" width="360" height="160" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  
  <rect x="70" y="380" width="150" height="50" rx="4" fill="#10b981"/>
  <text x="145" y="405" text-anchor="middle" font-size="9" fill="white">Opt-in Check</text>
  <text x="145" y="420" text-anchor="middle" font-size="8" fill="#6ee7b7">Channel allowed?</text>
  
  <rect x="240" y="380" width="150" height="50" rx="4" fill="#f59e0b"/>
  <text x="315" y="405" text-anchor="middle" font-size="9" fill="white">Frequency Cap</text>
  <text x="315" y="420" text-anchor="middle" font-size="8" fill="#fcd34d">Max per hour</text>
  
  <text x="230" y="460" text-anchor="middle" font-size="9" fill="#64748b">Respect user