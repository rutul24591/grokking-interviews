<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Payment Processing Failure Modes</title>
  <desc id="desc">Payment processing failure modes: double charges, lost payments, webhook replay, and fraud bypass</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Payment Processing Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Double charges, lost payments, webhook replay, and fraud bypass</text>
  
  <!-- Double Charges -->
  <rect x="30" y="85" width="410" height="240" rx="8" fill="white" stroke="#ef4444" stroke-width="2"/>
  <text x="235" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">1. Double Charges</text>
  
  <!-- Double charge scenario -->
  <rect x="50" y="135" width="370" height="140" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <!-- User clicks pay -->
  <rect x="60" y="150" width="140" height="60" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-size="9" fill="white">User Clicks Pay</text>
  <text x="130" y="190" text-anchor="middle" font-size="8" fill="#bfdbfe">$100 order</text>
  
  <line x1="205" y1="180" x2="235" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="220" y="170" text-anchor="middle" font-size="7" fill="#ef4444">Timeout</text>
  
  <!-- User retries -->
  <rect x="245" y="150" width="140" height="60" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="1"/>
  <text x="315" y="175" text-anchor="middle" font-size="9" fill="white">User Retries</text>
  <text x="315" y="190" text-anchor="middle" font-size="8" fill="#fcd34d">No idempotency</text>
  
  <text x="235" y="290" text-anchor="middle" font-size="10" fill="#ef4444">User charged $200 for $100 order!</text>
  <text x="235" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: No idempotency key, client retry</text>
  <text x="235" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: Idempotency keys, dedup on charge ID</text>
  
  <!-- Lost Payments -->
  <rect x="460" y="85" width="410" height="240" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="665" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">2. Lost Payments (Webhook Lost)</text>
  
  <!-- Lost webhook scenario -->
  <rect x="480" y="135" width="370" height="140" rx="6" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  
  <!-- Payment authorized -->
  <rect x="490" y="150" width="140" height="60" rx="4" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="560" y="175" text-anchor="middle" font-size="9" fill="white">Payment Authorized</text>
  <text x="560" y="190" text-anchor="middle" font-size="8" fill="#6ee7b7">Provider: Success</text>
  
  <line x1="635" y1="180" x2="665" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="650" y="170" text-anchor="middle" font-size="7" fill="#ef4444">Webhook</text>
  
  <!-- Webhook lost -->
  <rect x="675" y="150" width="140" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="745" y="175" text-anchor="middle" font-size="9" fill="white">Webhook Lost</text>
  <text x="745" y="190" text-anchor="middle" font-size="8" fill="#fca5a5">Network issue</text>
  
  <line x1="820" y1="180" x2="850" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="835" y="170" text-anchor="middle" font-size="7" fill="#ef4444">State stuck</text>
  
  <!-- Order not fulfilled -->
  <rect x="860" y="150" width="20" height="60" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="870" y="180" text-anchor="middle" font-size="10" fill="white">!</text>
  
  <text x="665" y="290" text-anchor="middle" font-size="10" fill="#ef4444">Order not fulfilled, customer angry!</text>
  <text x="665" y="310" text-anchor="middle" font-size="9" fill="#64748b">Cause: No webhook retry, no polling</text>
  <text x="665" y="330" text-anchor="middle" font-size="9" fill="#10b981">Fix: Webhook retries, status polling, alerts</text>
  
  <!-- Webhook Replay -->
  <rect x="30" y="340" width="410" height="240" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="235" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#8b5cf6">3. Webhook Replay (Double Refund)</text>
  
  <!-- Replay scenario -->
  <rect x="50" y="380" width="370" height="140" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  
  <!-- Refund webhook -->
  <rect x="60" y="395" width="140" height="60" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1"/>
  <text x="130" y="420" text-anchor="middle" font-size="9" fill="white">Refund Webhook</text>
  <text x="130" y="435" text-anchor="middle" font-size="8" fill="#c4b5fd">$50 refund</text>
  
  <line x1="205" y1="425" x2="235" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="220" y="415" text-anchor="middle" font-size="7" fill="#ef4444">Delivered 2x</text>
  
  <!-- Processed twice -->
  <rect x="245" y="395" width="140" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="315" y="420" text-anchor="middle" font-size="9" fill="white">Processed 2x</text>
  <text x="315" y="435" text-anchor="middle" font-size="8" fill="#fca5a5">$100 refunded</text>
  
  <text x="235" y="495" text-anchor="middle" font-size="10" fill="#ef4444">Customer refunded double!</text>
  <text x="235" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: Webhook not idempotent</text>
  <text x="235" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Idempotent webhook handlers, event ID tracking</text>
  
  <!-- Fraud Bypass -->
  <rect x="460" y="340" width="410" height="240" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="665" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">4. Fraud Detection Bypass</text>
  
  <!-- Bypass scenario -->
  <rect x="480" y="380" width="370" height="140" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  
  <!-- Fraudulent card -->
  <rect x="490" y="395" width="140" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="560" y="420" text-anchor="middle" font-size="9" fill="white">Stolen Card</text>
  <text x="560" y="435" text-anchor="middle" font-size="8" fill="#fca5a5">High risk</text>
  
  <line x1="635" y1="425" x2="665" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="650" y="415" text-anchor="middle" font-size="7" fill="#ef4444">Fraud check</text>
  
  <!-- Fraud service down -->
  <rect x="675" y="395" width="140" height="60" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="745" y="420" text-anchor="middle" font-size="9" fill="white">Fraud Service</text>
  <text x="745" y="435" text-anchor="middle" font-size="8" fill="#fcd34d">Timeout!</text>
  
  <line x1="820" y1="425" x2="850" y2="425" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="835" y="415" text-anchor="middle" font-size="7" fill="#10b981">Fail-open</text>
  
  <!-- Payment approved -->
  <rect x="860" y="395" width="20" height="60" rx="2" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="870" y="425" text-anchor="middle" font-size="9" fill="white">OK</text>
  
  <text x="665" y="495" text-anchor="middle" font-size="10" fill="#ef4444">Fraudulent payment approved!</text>
  <text x="665" y="515" text-anchor="middle" font-size="9" fill="#64748b">Cause: Fail-open on fraud check timeout</text>
  <text x="665" y="535" text-anchor="middle" font-size="9" fill="#10b981">Fix: Fail-closed, queue for review, async check</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
</svg>
