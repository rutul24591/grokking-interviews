<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Authorization Policy Models</title>
  <desc id="desc">Authorization showing RBAC, ABAC, relationship-based access, policy distribution, and caching</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Authorization Policy Models</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">RBAC, ABAC, relationship-based access, and policy distribution</text>
  
  <!-- RBAC -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">RBAC (Role-Based)</text>
  
  <rect x="50" y="125" width="200" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  
  <rect x="60" y="140" width="80" height="55" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="100" y="165" text-anchor="middle" font-size="9" fill="white">User</text>
  
  <line x1="145" y1="168" x2="175" y2="168" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="160" y="158" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">has role</text>
  
  <rect x="185" y="140" width="55" height="55" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="212" y="165" text-anchor="middle" font-size="9" fill="white">Role</text>
  
  <line x1="212" y1="195" x2="212" y2="225" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="232" y="210" text-anchor="start" font-size="7" fill="var(--text-theme, #64748b">grants</text>
  
  <rect x="185" y="230" width="55" height="40" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="212" y="253" text-anchor="middle" font-size="8" fill="white">Permission</text>
  
  <text x="165" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Simple to understand</text>
  <text x="165" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Easy administration</text>
  <text x="165" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Role explosion risk</text>
  
  <!-- ABAC -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">ABAC (Attribute-Based)</text>
  
  <rect x="335" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  
  <text x="450" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Decision = f(attributes)</text>
  
  <text x="355" y="175" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• User: role, department</text>
  <text x="355" y="190" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Resource: sensitivity, owner</text>
  <text x="355" y="205" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Action: read, write, delete</text>
  <text x="355" y="220" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Context: time, location, device</text>
  
  <text x="450" y="250" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Very flexible</text>
  <text x="450" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Context-aware</text>
  <text x="450" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Complex to reason about</text>
  
  <text x="450" y="305" text-anchor="middle" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">allow if:</text>
  <text x="450" y="320" text-anchor="middle" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">user.department == resource.owner</text>
  <text x="450" y="335" text-anchor="middle" font-size="8" font-family="monospace" fill="var(--text-theme, #64748b">&amp;&amp; resource.sensitivity &amp;lt;= user.clearance</text>
  
  <!-- Relationship-Based -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Relationship-Based (ReBAC)</text>
  
  <rect x="620" y="125" width="230" height="100" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <!-- Graph representation -->
  <circle cx="670" cy="165" r="25" fill="var(--bg-theme, #3b82f6)"/>
  <text x="670" y="170" text-anchor="middle" font-size="8" fill="white">User</text>
  
  <line x1="695" y1="165" x2="745" y2="165" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="720" y="155" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">member</text>
  
  <circle cx="775" cy="165" r="25" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="775" y="170" text-anchor="middle" font-size="8" fill="white">Group</text>
  
  <line x1="775" y1="190" x2="775" y2="220" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow-down)"/>
  <text x="795" y="205" text-anchor="start" font-size="7" fill="var(--text-theme, #64748b">owns</text>
  
  <circle cx="775" cy="245" r="25" fill="var(--bg-theme, #f59e0b)"/>
  <text x="775" y="250" text-anchor="middle" font-size="8" fill="white">Resource</text>
  
  <text x="735" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Great for collaboration</text>
  <text x="735" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981">✓ Natural for sharing</text>
  <text x="735" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b">⚠ Graph complexity at scale</text>
  
  <!-- Policy Distribution -->
  <rect x="30" y="320" width="400" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="230" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Policy Distribution</text>
  
  <rect x="50" y="360" width="360" height="160" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <!-- Centralized -->
  <rect x="70" y="380" width="140" height="60" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="140" y="405" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #3b82f6">Centralized</text>
  <text x="140" y="425" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Every request calls</text>
  <text x="140" y="438" text-anchor="middle" font-size="8" fill="#64748b">✓ Always fresh</text>
  
  <line x1="215" y1="410" x2="245" y2="410" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Distributed -->
  <rect x="255" y="380" width="140" height="60" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="325" y="405" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #10b981">Distributed</text>
  <text x="325" y="425" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Policy bundles pushed</text>
  <text x="325" y="438" text-anchor="middle" font-size="8" fill="#64748b">✓ Low latency</text>
  
  <text x="230" y="470" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Hybrid: Cache with invalidation</text>
  <text x="230" y="490" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">TTL: 1-5 minutes for most use cases</text>
  
  <!-- Caching Strategy -->
  <rect x="470" y="320" width="400" height="210" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="670" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Caching Strategy</text>
  
  <rect x="490" y="360" width="360" height="160" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  
  <text x="510" y="385" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="385" font-size="10" fill="var(--text-theme, #1e293b">Cache decision tuples</text>
  
  <text x="510" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="405" font-size="10" fill="var(--text-theme, #1e293b">Key: user + action + resource</text>
  
  <text x="510" y="425" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="425" font-size="10" fill="var(--text-theme, #1e293b">TTL based on risk tolerance</text>
  
  <text x="510" y="445" text-anchor="start" font-size="10" fill="var(--text-theme, #10b981">✓</text>
  <text x="525" y="445" font-size="10" fill="var(--text-theme, #1e293b">Invalidate on entitlement change</text>
  
  <text x="510" y="470" text-anchor="start" font-size="9" fill="var(--text-theme, #f59e0b">⚠</text>
  <text x="525" y="470" font-size="9" fill="var(--text-theme, #1e293b">Stale cache = security risk</text>
  
  <text x="510" y="495" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">Typical TTL: 30s - 5 min</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
