<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Content Moderation Detection and Review</title>
  <desc id="desc">Moderation control points showing detection signals, thresholds, quarantine, review queues, and appeals</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Content Moderation Detection &amp; Review</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Detection signals, thresholds, quarantine, review queues, and appeals</text>
  
  <!-- Detection Pipeline -->
  <rect x="30" y="85" width="400" height="240" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #3b82f6">Detection Pipeline</text>
  
  <!-- Content enters -->
  <rect x="50" y="125" width="360" height="100" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  
  <rect x="60" y="140" width="100" height="35" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="110" y="163" text-anchor="middle" font-size="9" fill="white">Text Analysis</text>
  
  <rect x="170" y="140" width="100" height="35" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="220" y="163" text-anchor="middle" font-size="9" fill="white">Image Analysis</text>
  
  <rect x="280" y="140" width="100" height="35" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="330" y="163" text-anchor="middle" font-size="9" fill="white">Hash Matching</text>
  
  <rect x="60" y="185" width="100" height="35" rx="3" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="110" y="208" text-anchor="middle" font-size="9" fill="white">Link Reputation</text>
  
  <rect x="170" y="185" width="100" height="35" rx="3" fill="var(--bg-theme, #06b6d4)" stroke="var(--border-theme, #0891b2)" stroke-width="1"/>
  <text x="220" y="208" text-anchor="middle" font-size="9" fill="white">User History</text>
  
  <rect x="280" y="185" width="100" height="35" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="330" y="208" text-anchor="middle" font-size="9" fill="white">User Reports</text>
  
  <!-- Scoring -->
  <rect x="50" y="235" width="360" height="80" rx="4" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="230" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #3b82f6">Risk Scoring</text>
  
  <rect x="70" y="270" width="100" height="35" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="120" y="293" text-anchor="middle" font-size="9" fill="white">Low (0-30)</text>
  <text x="120" y="308" text-anchor="middle" font-size="8" fill="#6ee7b7">Auto-allow</text>
  
  <rect x="180" y="270" width="100" height="35" rx="3" fill="var(--bg-theme, #f59e0b)"/>
  <text x="230" y="293" text-anchor="middle" font-size="9" fill="white">Medium (31-70)</text>
  <text x="230" y="308" text-anchor="middle" font-size="8" fill="#fcd34d">Review queue</text>
  
  <rect x="290" y="270" width="100" height="35" rx="3" fill="var(--bg-theme, #ef4444)"/>
  <text x="340" y="293" text-anchor="middle" font-size="9" fill="white">High (71-100)</text>
  <text x="340" y="308" text-anchor="middle" font-size="8" fill="#fca5a5">Auto-block</text>
  
  <!-- Review Queue -->
  <rect x="470" y="85" width="400" height="240" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #10b981">Human Review Queue</text>
  
  <rect x="490" y="125" width="360" height="100" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Queue Prioritization</text>
  
  <rect x="500" y="160" width="100" height="55" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="550" y="185" text-anchor="middle" font-size="9" fill="white">High Priority</text>
  <text x="550" y="200" text-anchor="middle" font-size="8" fill="#fca5a5">SLA: 1 hour</text>
  
  <rect x="610" y="160" width="100" height="55" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="660" y="185" text-anchor="middle" font-size="9" fill="white">Medium Priority</text>
  <text x="660" y="200" text-anchor="middle" font-size="8" fill="#fcd34d">SLA: 24 hours</text>
  
  <rect x="720" y="160" width="100" height="55" rx="3" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="770" y="185" text-anchor="middle" font-size="9" fill="white">Low Priority</text>
  <text x="770" y="200" text-anchor="middle" font-size="8" fill="#bfdbfe">SLA: 7 days</text>
  
  <!-- Review Actions -->
  <rect x="490" y="235" width="360" height="80" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="670" y="260" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Reviewer Actions</text>
  
  <rect x="500" y="270" width="65" height="35" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="532" y="293" text-anchor="middle" font-size="8" fill="white">Allow</text>
  
  <rect x="575" y="270" width="65" height="35" rx="3" fill="var(--bg-theme, #ef4444)"/>
  <text x="607" y="293" text-anchor="middle" font-size="8" fill="white">Remove</text>
  
  <rect x="650" y="270" width="65" height="35" rx="3" fill="var(--bg-theme, #f59e0b)"/>
  <text x="682" y="293" text-anchor="middle" font-size="8" fill="white">Escalate</text>
  
  <rect x="725" y="270" width="65" height="35" rx="3" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="757" y="293" text-anchor="middle" font-size="8" fill="white">Ban User</text>
  
  <rect x="790" y="270" width="50" height="35" rx="3" fill="var(--bg-theme, #06b6d4)"/>
  <text x="815" y="293" text-anchor="middle" font-size="8" fill="white">Appeal</text>
  
  <!-- Quarantine -->
  <rect x="30" y="340" width="280" height="190" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="170" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Quarantine System</text>
  
  <rect x="50" y="380" width="240" height="140" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="170" y="405" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">Content held pending review</text>
  
  <text x="70" y="430" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• User sees "pending"</text>
  <text x="70" y="450" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Not visible to others</text>
  <text x="70" y="470" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Auto-expiry timeout</text>
  <text x="70" y="490" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Notification on decision</text>
  <text x="70" y="510" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Audit trail maintained</text>
  
  <!-- Appeals Process -->
  <rect x="330" y="340" width="540" height="190" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="600" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Appeals &amp; Feedback Loop</text>
  
  <rect x="350" y="380" width="500" height="140" rx="4" fill="var(--bg-panel-soft, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  
  <text x="370" y="405" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">User can appeal moderation decisions</text>
  
  <rect x="370" y="420" width="100" height="40" rx="3" fill="var(--bg-theme, #3b82f6)"/>
  <text x="420" y="443" text-anchor="middle" font-size="8" fill="white">User Appeal</text>
  
  <line x1="475" y1="440" x2="505" y2="440" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="515" y="420" width="100" height="40" rx="3" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="565" y="443" text-anchor="middle" font-size="8" fill="white">Senior Review</text>
  
  <line x1="620" y1="440" x2="650" y2="440" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="660" y="420" width="80" height="40" rx="3" fill="var(--bg-theme, #10b981)"/>
  <text x="700" y="443" text-anchor="middle" font-size="8" fill="white">Decision</text>
  
  <line x1="745" y1="440" x2="775" y2="440" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="785" y="420" width="55" height="40" rx="3" fill="var(--bg-theme, #06b6d4)"/>
  <text x="812" y="443" text-anchor="middle" font-size="8" fill="white">ML Feed</text>
  
  <text x="600" y="490" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Appeal outcomes improve ML models over time</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
