  <text x="750" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#334155">Application Services</text>
  <text x="750" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Web Frontend</text>
  <text x="750" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Backend APIs</text>
  <text x="750" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Mobile App</text>
  <text x="750" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Edge Functions</text>
  <text x="750" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Worker Jobs</text>
  <text x="750" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Batch Processors</text>

  <!-- Flag Types -->
  <rect x="630" y="320" width="240" height="150" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#0c4a6e">Flag Types</text>
  <text x="750" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Boolean (On/Off Toggle)</text>
  <text x="750" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Multivariate (A/B/C Variants)</text>
  <text x="750" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Targeting (Rule-Based)</text>
  <text x="750" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Percentage Rollout</text>
  <text x="750" y="455" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#374151">Kill Switch (Emergency Off)</text>

  <!-- Arrows -->
  <line x1="140" y1="185" x2="140" y2="220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="140" y1="310" x2="140" y2="340" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="140" x2="340" y2="140" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="300" x2="340" y2="300" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="405" x2="340" y2="445" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="580" y1="130" x2="630" y2="130" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="580" y1="295" x2="630" y2="200" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <line x1="580" y1="430" x2="630" y2="380" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="195" x2="500" y2="230" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="360" x2="420" y2="395" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>

  <!-- Legend -->
  <rect x="30" y="495" width="15" height="15" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="55" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Control Plane</text>
  <rect x="155" y="495" width="15" height="15" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="180" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Store</text>
  <rect x="240" y="495" width="15" height="15" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="265" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Distribution</text>
  <rect x="380" y="495" width="15" height="15" fill="#faf5ff" stroke="#a855f7" stroke-width="1"/>
  <text x="405" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Server SDK</text>
  <rect x="510" y="495" width="15" height="15" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="535" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Client SDK</text>
  <rect x="640" y="495" width="15" height="15" fill="#f8fafc" stroke="#64748b" stroke-width="1"/>
  <text x="665" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Application</text>
  <rect x="770" y="495" width="15" height="15" fill="#fff1f2" stroke="#f43f5e" stroke-width="1"/>
  <text x="795" y="507" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Analytics</text>
  <line x1="30" y1="525" x2="60" y2="525" stroke="#3b82f6" stroke-width="2"/>
  <text x="70" y="529" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Sync</text>
  <line x1="130" y1="525" x2="160" y2="525" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="170" y="529" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151">Async</text>
</svg>