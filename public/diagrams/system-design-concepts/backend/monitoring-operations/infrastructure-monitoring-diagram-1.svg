<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f6f8"/>
    </linearGradient>
    <style>
      .title { font: bold 20px Arial, sans-serif; fill: #1a1a2e; }
      .label { font: bold 13px Arial, sans-serif; fill: #1a1a2e; }
      .sublabel { font: 12px Arial, sans-serif; fill: #555555; }
      .impact-label { font: bold 13px Arial, sans-serif; fill: #c0392b; }
      .arrow { fill: none; stroke: #3498db; stroke-width: 2; marker-end: url(#arrowhead); }
      .arrow-impact { fill: none; stroke: #c0392b; stroke-width: 2; stroke-dasharray: 6,3; marker-end: url(#arrowhead-red); }
      .box { rx: 8; ry: 8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" class="title" text-anchor="middle">Core Platform Signals Mapped to User Impact</text>

  <!-- Left column: Platform Signals -->
  <rect x="40" y="60" width="200" height="340" fill="#eaf2fb" rx="10" stroke="#3498db" stroke-width="1.5"/>
  <text x="140" y="88" class="label" text-anchor="middle" font-size="14">Platform Signals</text>

  <!-- CPU -->
  <rect x="60" y="108" width="160" height="48" fill="#ffffff" rx="8" stroke="#2980b9" stroke-width="1"/>
  <text x="140" y="130" class="label" text-anchor="middle">CPU</text>
  <text x="140" y="148" class="sublabel" text-anchor="middle">utilization, throttling, run queue</text>

  <!-- Memory -->
  <rect x="60" y="168" width="160" height="48" fill="#ffffff" rx="8" stroke="#2980b9" stroke-width="1"/>
  <text x="140" y="190" class="label" text-anchor="middle">Memory</text>
  <text x="140" y="208" class="sublabel" text-anchor="middle">working set, page faults, OOM kills</text>

  <!-- Disk -->
  <rect x="60" y="228" width="160" height="48" fill="#ffffff" rx="8" stroke="#2980b9" stroke-width="1"/>
  <text x="140" y="250" class="label" text-anchor="middle">Disk / Storage</text>
  <text x="140" y="268" class="sublabel" text-anchor="middle">I/O latency, queue depth, free space</text>

  <!-- Network -->
  <rect x="60" y="288" width="160" height="48" fill="#ffffff" rx="8" stroke="#2980b9" stroke-width="1"/>
  <text x="140" y="310" class="label" text-anchor="middle">Network</text>
  <text x="140" y="328" class="sublabel" text-anchor="middle">packet loss, retransmits, DNS latency</text>

  <!-- Scheduler -->
  <rect x="60" y="348" width="160" height="48" fill="#ffffff" rx="8" stroke="#2980b9" stroke-width="1"/>
  <text x="140" y="370" class="label" text-anchor="middle">Scheduler</text>
  <text x="140" y="388" class="sublabel" text-anchor="middle">pending pods, evictions, failed placements</text>

  <!-- Middle column: Saturation State -->
  <rect x="370" y="60" width="220" height="340" fill="#fef9e7" rx="10" stroke="#f39c12" stroke-width="1.5"/>
  <text x="480" y="88" class="label" text-anchor="middle" font-size="14">Saturation State</text>

  <rect x="390" y="108" width="180" height="48" fill="#ffffff" rx="8" stroke="#e67e22" stroke-width="1"/>
  <text x="480" y="130" class="label" text-anchor="middle">Compute Pressure</text>
  <text x="480" y="148" class="sublabel" text-anchor="middle">CPU throttling, run queue backlog</text>

  <rect x="390" y="168" width="180" height="48" fill="#ffffff" rx="8" stroke="#e67e22" stroke-width="1"/>
  <text x="480" y="190" class="label" text-anchor="middle">Memory Pressure</text>
  <text x="480" y="208" class="sublabel" text-anchor="middle">swapping, OOM kill risk</text>

  <rect x="390" y="228" width="180" height="48" fill="#ffffff" rx="8" stroke="#e67e22" stroke-width="1"/>
  <text x="480" y="250" class="label" text-anchor="middle">I/O Saturation</text>
  <text x="480" y="268" class="sublabel" text-anchor="middle">disk queue depth, latency spikes</text>

  <rect x="390" y="288" width="180" height="48" fill="#ffffff" rx="8" stroke="#e67e22" stroke-width="1"/>
  <text x="480" y="310" class="label" text-anchor="middle">Network Degradation</text>
  <text x="480" y="328" class="sublabel" text-anchor="middle">retransmit storms, DNS failures</text>

  <rect x="390" y="348" width="180" height="48" fill="#ffffff" rx="8" stroke="#e67e22" stroke-width="1"/>
  <text x="480" y="370" class="label" text-anchor="middle">Scheduling Failure</text>
  <text x="480" y="388" class="sublabel" text-anchor="middle">unschedulable pods, eviction cascade</text>

  <!-- Right column: User Impact -->
  <rect x="720" y="60" width="200" height="340" fill="#fdedec" rx="10" stroke="#c0392b" stroke-width="1.5"/>
  <text x="820" y="88" class="impact-label" text-anchor="middle" font-size="14">User Impact</text>

  <rect x="740" y="108" width="160" height="64" fill="#ffffff" rx="8" stroke="#e74c3c" stroke-width="1"/>
  <text x="820" y="136" class="impact-label" text-anchor="middle">Increased Latency</text>
  <text x="820" y="156" class="sublabel" text-anchor="middle">P95/P99 tail latency spike</text>

  <rect x="740" y="188" width="160" height="64" fill="#ffffff" rx="8" stroke="#e74c3c" stroke-width="1"/>
  <text x="820" y="216" class="impact-label" text-anchor="middle">Error Bursts</text>
  <text x="820" y="236" class="sublabel" text-anchor="middle">5xx, timeouts, dropped requests</text>

  <rect x="740" y="268" width="160" height="64" fill="#ffffff" rx="8" stroke="#e74c3c" stroke-width="1"/>
  <text x="820" y="296" class="impact-label" text-anchor="middle">Cascading Retries</text>
  <text x="820" y="316" class="sublabel" text-anchor="middle">retry storms amplify load</text>

  <rect x="740" y="348" width="160" height="64" fill="#ffffff" rx="8" stroke="#e74c3c" stroke-width="1"/>
  <text x="820" y="376" class="impact-label" text-anchor="middle">Availability Drop</text>
  <text x="820" y="396" class="sublabel" text-anchor="middle">SLA/SLO breach risk</text>

  <!-- Arrows from Platform Signals to Saturation -->
  <line x1="220" y1="132" x2="390" y2="132" class="arrow"/>
  <line x1="220" y1="192" x2="390" y2="192" class="arrow"/>
  <line x1="220" y1="252" x2="390" y2="252" class="arrow"/>
  <line x1="220" y1="312" x2="390" y2="312" class="arrow"/>
  <line x1="220" y1="372" x2="390" y2="372" class="arrow"/>

  <!-- Arrows from Saturation to User Impact -->
  <line x1="570" y1="132" x2="740" y2="140" class="arrow-impact"/>
  <line x1="570" y1="192" x2="740" y2="220" class="arrow-impact"/>
  <line x1="570" y1="252" x2="740" y2="300" class="arrow-impact"/>
  <line x1="570" y1="312" x2="740" y2="300" class="arrow-impact"/>
  <line x1="570" y1="372" x2="740" y2="380" class="arrow-impact"/>
</svg>