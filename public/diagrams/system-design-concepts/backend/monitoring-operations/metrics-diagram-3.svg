<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect fill="#f8fafc" width="960" height="440"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Alerting Patterns: Burn-Rate vs Static Thresholds</text>

  <!-- LEFT PANEL: Static Threshold (Naive) -->
  <text x="240" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0f172a">Static Threshold Alerting (Naive)</text>

  <!-- Left chart area -->
  <rect x="40" y="90" width="400" height="200" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Left axes -->
  <line x1="70" y1="100" x2="70" y2="270" stroke="#334155" stroke-width="2"/>
  <line x1="70" y1="270" x2="420" y2="270" stroke="#334155" stroke-width="2"/>

  <!-- Static threshold line -->
  <line x1="70" y1="160" x2="420" y2="160" stroke="#dc3545" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="425" y="164" fill="#dc3545" font-family="Arial, sans-serif" font-size="11" font-weight="bold">threshold</text>

  <!-- Erratic metric line with many threshold crossings -->
  <polyline points="80,240 100,230 120,220 140,180 145,150 150,170 155,155 160,200 180,210 200,175 210,155 215,145 220,160 225,150 230,190 260,220 280,180 290,160 295,148 300,158 310,200 340,230 360,170 365,152 370,165 380,140 390,170 400,210" fill="none" stroke="#4a9eff" stroke-width="2"/>

  <!-- Alert markers (X) at each crossing -->
  <text x="145" y="140" fill="#dc3545" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>
  <text x="210" y="140" fill="#dc3545" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>
  <text x="290" y="140" fill="#dc3545" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>
  <text x="365" y="140" fill="#dc3545" font-family="Arial, sans-serif" font-size="14" font-weight="bold">X</text>

  <!-- Alert noise label -->
  <text x="240" y="310" text-anchor="middle" fill="#dc3545" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Noise: 4+ pages from normal variation</text>

  <!-- RIGHT PANEL: Burn-Rate (SLO-Aligned) -->
  <text x="720" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0f172a">Burn-Rate Alerting (SLO-Aligned)</text>

  <!-- Right chart area -->
  <rect x="520" y="90" width="400" height="200" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Right axes -->
  <line x1="550" y1="100" x2="550" y2="270" stroke="#334155" stroke-width="2"/>
  <line x1="550" y1="270" x2="900" y2="270" stroke="#334155" stroke-width="2"/>

  <!-- SLO budget line -->
  <line x1="550" y1="140" x2="900" y2="140" stroke="#28a745" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="905" y="144" fill="#28a745" font-family="Arial, sans-serif" font-size="11" font-weight="bold">SLO budget</text>

  <!-- Burn rate line - sustained violation only -->
  <polyline points="560,250 580,240 600,230 620,220 640,200 660,180 680,160 700,130 720,120 740,115 760,125 780,140 800,170 820,200 840,230 860,250 880,260" fill="none" stroke="#28a745" stroke-width="2"/>

  <!-- Burn rate zone - only sustained alert -->
  <rect x="690" y="100" width="80" height="40" rx="4" fill="#f8d7da" opacity="0.5"/>
  <text x="730" y="95" text-anchor="middle" fill="#dc3545" font-family="Arial, sans-serif" font-size="12" font-weight="bold">PAGE</text>

  <!-- Burn rate label -->
  <text x="720" y="310" text-anchor="middle" fill="#28a745" font-family="Arial, sans-serif" font-size="13" font-weight="bold">1 alert for sustained user impact</text>

  <!-- Bottom comparison box -->
  <rect x="40" y="340" width="880" height="80" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="480" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f172a">Burn-Rate Alerting: Noise Reduction by Design</text>
  <text x="480" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Static thresholds fire on every spike. Burn-rate ties alerting to SLO budget consumption, paging only when sustained user impact</text>
  <text x="480" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">drains error budget fast enough to warrant action. Multi-window burn-rate (short + long) separates transient blips from real incidents.</text>
</svg>