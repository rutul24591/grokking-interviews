<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .body { font-family: Arial, sans-serif; font-size: 12px; font-weight: normal; }
      .label { font-family: Arial, sans-serif; font-size: 11px; font-weight: normal; }
      .bold-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="460" fill="#ffffff" rx="8"/>

  <!-- Main Title -->
  <text x="480" y="36" class="title" text-anchor="middle" fill="#1f2937">Database Governance: Preventing Predictable Incidents</text>

  <!-- Four pillars as columns -->
  <!-- Pillar 1: Change Control -->
  <rect x="30" y="60" width="220" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="140" y="90" class="subtitle" text-anchor="middle" fill="#166534">Change Control</text>
  <line x1="60" y1="100" x2="220" y2="100" stroke="#22c55e" stroke-width="1"/>
  <text x="50" y="125" class="label" fill="#15803d">&#x2022; Migration review checklist</text>
  <text x="50" y="148" class="label" fill="#15803d">&#x2022; Reversible by design</text>
  <text x="50" y="171" class="label" fill="#15803d">&#x2022; Statement timeouts per route</text>
  <text x="50" y="194" class="label" fill="#15803d">&#x2022; Plan validation pre-deploy</text>
  <text x="50" y="217" class="label" fill="#15803d">&#x2022; Canary + observe pattern</text>
  <text x="50" y="240" class="label" fill="#15803d">&#x2022; Rollback runbook ready</text>

  <!-- Pillar 2: Query Budgets -->
  <rect x="270" y="60" width="220" height="200" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="380" y="90" class="subtitle" text-anchor="middle" fill="#1e40af">Query Budgets</text>
  <line x1="300" y1="100" x2="460" y2="100" stroke="#3b82f6" stroke-width="1"/>
  <text x="290" y="125" class="label" fill="#1e3a8a">&#x2022; Max query cost per endpoint</text>
  <text x="290" y="148" class="label" fill="#1e3a8a">&#x2022; Rows scanned limits</text>
  <text x="290" y="171" class="label" fill="#1e3a8a">&#x2022; Fanout constraints</text>
  <text x="290" y="194" class="label" fill="#1e3a8a">&#x2022; Index usage enforcement</text>
  <text x="290" y="217" class="label" fill="#1e3a8a">&#x2022; Budget breach = alert + block</text>
  <text x="290" y="240" class="label" fill="#1e3a8a">&#x2022; Per-team query dashboards</text>

  <!-- Pillar 3: Capacity Targets -->
  <rect x="510" y="60" width="220" height="200" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="620" y="90" class="subtitle" text-anchor="middle" fill="#854d0e">Capacity Targets</text>
  <line x1="540" y1="100" x2="700" y2="100" stroke="#eab308" stroke-width="1"/>
  <text x="530" y="125" class="label" fill="#a16207">&#x2022; Disk headroom &#x2265; 30%</text>
  <text x="530" y="148" class="label" fill="#a16207">&#x2022; IOPS budget per workload</text>
  <text x="530" y="171" class="label" fill="#a16207">&#x2022; Connection pool limits</text>
  <text x="530" y="194" class="label" fill="#a16207">&#x2022; Memory / buffer targets</text>
  <text x="530" y="217" class="label" fill="#a16207">&#x2022; Load testing before growth</text>
  <text x="530" y="240" class="label" fill="#a16207">&#x2022; Growth trend projections</text>

  <!-- Pillar 4: Failover Readiness -->
  <rect x="750" y="60" width="180" height="200" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="840" y="90" class="subtitle" text-anchor="middle" fill="#991b1b">Failover Readiness</text>
  <line x1="770" y1="100" x2="910" y2="100" stroke="#ef4444" stroke-width="1"/>
  <text x="765" y="125" class="label" fill="#7f1d1d">&#x2022; Replica lag SLO</text>
  <text x="765" y="148" class="label" fill="#7f1d1d">&#x2022; Automated failover tested</text>
  <text x="765" y="171" class="label" fill="#7f1d1d">&#x2022; Connection drain strategy</text>
  <text x="765" y="194" class="label" fill="#7f1d1d">&#x2022; Warm-up procedures</text>
  <text x="765" y="217" class="label" fill="#7f1d1d">&#x2022; Runbook + game days</text>

  <!-- Monitoring feedback loop -->
  <rect x="30" y="280" width="900" height="160" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="480" y="310" class="subtitle" text-anchor="middle" fill="#6b21a8">Monitoring as the Feedback Loop</text>
  <line x1="100" y1="320" x2="860" y2="320" stroke="#a855f7" stroke-width="1"/>

  <!-- Flow arrows -->
  <text x="100" y="350" class="bold-label" fill="#6b21a8">Governance Policies</text>
  <line x1="260" y1="345" x2="380" y2="345" stroke="#6b21a8" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="320" y="335" class="label" fill="#6b21a8" font-weight="bold">drive</text>

  <text x="390" y="350" class="bold-label" fill="#6b21a8">Monitoring Dashboards</text>
  <line x1="560" y1="345" x2="680" y2="345" stroke="#6b21a8" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="620" y="335" class="label" fill="#6b21a8" font-weight="bold">measure</text>

  <text x="690" y="350" class="bold-label" fill="#6b21a8">Alerts and Runbooks</text>
  <line x1="840" y1="350" x2="840" y2="380" stroke="#6b21a8" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Feedback arrows -->
  <text x="100" y="400" class="label" fill="#6b21a8">&#x2022; Are migrations safe?</text>
  <text x="100" y="420" class="label" fill="#6b21a8">&#x2022; Are query budgets respected?</text>
  <text x="350" y="400" class="label" fill="#6b21a8">&#x2022; Is capacity within targets?</text>
  <text x="350" y="420" class="label" fill="#6b21a8">&#x2022; Is replication lag within SLO?</text>
  <text x="620" y="400" class="label" fill="#6b21a8">&#x2022; Failover drills pass?</text>
  <text x="620" y="420" class="label" fill="#6b21a8">&#x2022; Tail latency regressions caught?</text>

  <!-- Loop back arrow -->
  <path d="M 840 395 Q 840 430 480 440 Q 120 450 100 395" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowPurple)"/>
  <text x="480" y="448" class="label" fill="#6b21a8" text-anchor="middle" font-weight="bold">continuous feedback</text>

  <marker id="arrowPurple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
  </marker>
</svg>