<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="100%" height="100%">
  <style>
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #0f172a; }
    .label { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #0f172a; }
    .sublabel { font-family: Arial, sans-serif; font-size: 12px; font-weight: normal; fill: #475569; }
    .axis { stroke: #666; stroke-width: 1; }
    .grid { stroke: #e0e0e0; stroke-width: 0.5; stroke-dasharray: 4,4; }
  </style>

  <!-- Background -->
  <rect fill="#f8fafc" width="960" height="460" rx="8"/>

  <!-- Title -->
  <text class="title" x="480" y="35" text-anchor="middle">
    Burn Rate: Fast vs Slow Budget Consumption
  </text>

  <!-- Axes -->
  <line class="axis" x1="100" y1="70" x2="100" y2="380"/>
  <line class="axis" x1="100" y1="380" x2="900" y2="380"/>

  <!-- Y-axis label -->
  <text class="label" x="35" y="225" text-anchor="middle" transform="rotate(-90, 35, 225)">
    Budget Remaining (%)
  </text>

  <!-- X-axis label -->
  <text class="label" x="500" y="420" text-anchor="middle">
    Time (Days within 30-Day Window)
  </text>

  <!-- Grid lines -->
  <line class="grid" x1="100" y1="120" x2="900" y2="120"/>
  <line class="grid" x1="100" y1="180" x2="900" y2="180"/>
  <line class="grid" x1="100" y1="240" x2="900" y2="240"/>
  <line class="grid" x1="100" y1="300" x2="900" y2="300"/>

  <!-- Y-axis labels -->
  <text class="sublabel" x="90" y="124" text-anchor="end">100%</text>
  <text class="sublabel" x="90" y="184" text-anchor="end">75%</text>
  <text class="sublabel" x="90" y="244" text-anchor="end">50%</text>
  <text class="sublabel" x="90" y="304" text-anchor="end">25%</text>
  <text class="sublabel" x="90" y="384" text-anchor="end">0%</text>

  <!-- X-axis labels -->
  <text class="sublabel" x="100" y="400" text-anchor="middle">Day 0</text>
  <text class="sublabel" x="300" y="400" text-anchor="middle">Day 7</text>
  <text class="sublabel" x="500" y="400" text-anchor="middle">Day 15</text>
  <text class="sublabel" x="700" y="400" text-anchor="middle">Day 22</text>
  <text class="sublabel" x="900" y="400" text-anchor="middle">Day 30</text>

  <!-- Fast burn line: steep drop early -->
  <path d="M 100 120 L 180 120 L 220 380" stroke="#f44336" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Fast burn annotation -->
  <rect x="230" y="290" width="200" height="70" rx="6" fill="#ffebee" stroke="#f44336" stroke-width="1.5"/>
  <text class="label" x="330" y="315" text-anchor="middle" fill="#c62828">Fast Burn (Acute Incident)</text>
  <text class="sublabel" x="330" y="335" text-anchor="middle">Budget exhausted in ~3 days</text>
  <text class="sublabel" x="330" y="350" text-anchor="middle">Pager-level severity</text>

  <!-- Slow burn line: gradual decline -->
  <path d="M 100 120 L 300 140 L 500 200 L 700 280 L 900 340" stroke="#ff9800" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Slow burn annotation -->
  <rect x="600" y="190" width="210" height="70" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5"/>
  <text class="label" x="705" y="215" text-anchor="middle" fill="#e65100">Slow Burn (Sustained Degradation)</text>
  <text class="sublabel" x="705" y="235" text-anchor="middle">Budget consumed over ~30 days</text>
  <text class="sublabel" x="705" y="250" text-anchor="middle">Requires long-window alerting</text>

  <!-- Legend -->
  <rect x="100" y="435" width="16" height="3" fill="#f44336"/>
  <text class="sublabel" x="122" y="442">Fast burn: immediate, severe</text>
  <rect x="340" y="435" width="16" height="3" fill="#ff9800"/>
  <text class="sublabel" x="362" y="442">Slow burn: gradual, cumulative</text>
  <rect x="580" y="435" width="16" height="3" fill="#4caf50"/>
  <text class="sublabel" x="596" y="442">Healthy: minimal burn rate</text>

  <!-- Healthy baseline reference line -->
  <line x1="100" y1="130" x2="900" y2="130" stroke="#4caf50" stroke-width="1" stroke-dasharray="6,4"/>
  <text class="sublabel" x="910" y="134" fill="#2e7d32">Healthy baseline</text>
</svg>