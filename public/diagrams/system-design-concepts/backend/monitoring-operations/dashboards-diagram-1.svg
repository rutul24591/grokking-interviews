<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <linearGradient id="overviewGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="serviceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="depGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" fill="#ffffff"/>
  <rect width="960" height="440" fill="#111827"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827">Dashboard Layering Hierarchy</text>
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f9fafb">Dashboard Layering Hierarchy</text>

  <!-- Layer 1: Overview -->
  <rect x="60" y="60" width="840" height="80" rx="8" fill="url(#overviewGrad)" stroke="#ef4444" stroke-width="2"/>
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#b91c1c">LAYER 1</text>
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fca5a5">LAYER 1</text>
  <text x="190" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#dc2626">Overview Dashboard</text>
  <text x="190" y="90" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f87171">Overview Dashboard</text>
  <text x="100" y="118" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#374151">User journeys: availability, p95/p99 latency, SLO burn rate, error rate across all services</text>
  <text x="100" y="118" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#d1d5db">User journeys: availability, p95/p99 latency, SLO burn rate, error rate across all services</text>
  <text x="700" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Audience: All responders</text>
  <text x="700" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fca5a5">Audience: All responders</text>

  <!-- Arrow 1-2 -->
  <path d="M 480 140 L 480 160" stroke="#6b7280" stroke-width="2" fill="none"/>
  <polygon points="480,165 473,155 487,155" fill="#6b7280"/>
  <text x="500" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#6b7280">drill into</text>

  <!-- Layer 2: Service Drilldown -->
  <rect x="60" y="170" width="840" height="80" rx="8" fill="url(#serviceGrad)" stroke="#f97316" stroke-width="2"/>
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#c2410c">LAYER 2</text>
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fdba74">LAYER 2</text>
  <text x="190" y="200" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ea580c">Service Drilldown</text>
  <text x="190" y="200" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fb923c">Service Drilldown</text>
  <text x="100" y="228" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#374151">Single service: errors, saturation, request rate, response times, thread pools, connection pools</text>
  <text x="100" y="228" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#d1d5db">Single service: errors, saturation, request rate, response times, thread pools, connection pools</text>
  <text x="700" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9a3412">Audience: Service owner</text>
  <text x="700" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fdba74">Audience: Service owner</text>

  <!-- Arrow 2-3 -->
  <path d="M 480 250 L 480 270" stroke="#6b7280" stroke-width="2" fill="none"/>
  <polygon points="480,275 473,265 487,265" fill="#6b7280"/>
  <text x="500" y="265" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#6b7280">drill into</text>

  <!-- Layer 3: Dependency Drilldown -->
  <rect x="60" y="280" width="840" height="80" rx="8" fill="url(#depGrad)" stroke="#eab308" stroke-width="2"/>
  <text x="100" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#a16207">LAYER 3</text>
  <text x="100" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fde047">LAYER 3</text>
  <text x="190" y="310" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ca8a04">Dependency Drilldown</text>
  <text x="190" y="310" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#facc15">Dependency Drilldown</text>
  <text x="100" y="338" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#374151">Downstream health: timeouts, retry rates, error fingerprints, circuit breaker state, dependency latency contribution</text>
  <text x="100" y="338" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#d1d5db">Downstream health: timeouts, retry rates, error fingerprints, circuit breaker state, dependency latency contribution</text>
  <text x="690" y="325" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#854d0e">Audience: Dep. owners</text>
  <text x="690" y="325" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fde047">Audience: Dep. owners</text>

  <!-- Arrow 3-4 -->
  <path d="M 480 360 L 480 380" stroke="#6b7280" stroke-width="2" fill="none"/>
  <polygon points="480,385 473,375 487,375" fill="#6b7280"/>
  <text x="500" y="375" font-family="Arial, sans-serif" font-size="12" font-weight="normal" fill="#6b7280">drill into</text>

  <!-- Layer 4: Infrastructure Drilldown -->
  <rect x="60" y="390" width="840" height="44" rx="8" fill="url(#infraGrad)" stroke="#22c55e" stroke-width="2"/>
  <text x="100" y="416" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#374151">LAYER 4 | Infrastructure: node pressure, CPU, memory, disk I/O, network, resource contention, pod evictions</text>
  <text x="100" y="416" font-family="Arial, sans-serif" font-size="14" font-weight="normal" fill="#d1d5db">LAYER 4 | Infrastructure: node pressure, CPU, memory, disk I/O, network, resource contention, pod evictions</text>
  <text x="770" y="416" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Infra team</text>
  <text x="770" y="416" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#86efac">Infra team</text>
</svg>
