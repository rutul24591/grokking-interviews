<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <!-- Background -->
  <rect width="960" height="440" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827">Dashboard Anti-Patterns</text>

  <!-- Anti-Pattern 1: Christmas Tree Effect -->
  <rect x="30" y="60" width="290" height="350" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  
  <text x="175" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#991b1b">1. Christmas Tree Effect</text>
  
  <!-- Mock dashboard with too many panels -->
  <rect x="50" y="110" width="120" height="50" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="110" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7f1d1d">CPU %</text>
  
  <rect x="180" y="110" width="120" height="50" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="240" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7f1d1d">Memory %</text>
  
  <rect x="50" y="170" width="120" height="50" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="110" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7f1d1d">Disk I/O</text>
  
  <rect x="180" y="170" width="120" height="50" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="240" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7f1d1d">Network</text>
  
  <rect x="50" y="230" width="120" height="50" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="110" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7f1d1d">GC Pauses</text>
  
  <rect x="180" y="230" width="120" height="50" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="240" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7f1d1d">Thread Count</text>
  
  <rect x="50" y="290" width="120" height="50" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="110" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7f1d1d">Request Rate</text>
  
  <rect x="180" y="290" width="120" height="50" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="240" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7f1d1d">Error Rate</text>
  
  <rect x="50" y="350" width="250" height="40" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="175" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#7f1d1d">And 12 more panels...</text>
  
  <text x="175" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#991b1b">Too many panels, no decision mapping</text>

  <!-- Anti-Pattern 2: Inconsistent Units -->
  <rect x="335" y="60" width="290" height="350" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  
  <text x="480" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400e">2. Inconsistent Units</text>
  
  <rect x="355" y="110" width="250" height="60" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="370" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Panel A: Latency (milliseconds)</text>
  <text x="370" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#78350f">p99 = 450 ms</text>
  
  <rect x="355" y="180" width="250" height="60" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="370" y="205" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Panel B: Latency (seconds)</text>
  <text x="370" y="225" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#78350f">p99 = 0.45 s</text>
  
  <rect x="355" y="250" width="250" height="60" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="370" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Panel C: Error Rate (per minute)</text>
  <text x="370" y="295" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#78350f">rate = 120/min</text>
  
  <rect x="355" y="320" width="250" height="60" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="370" y="345" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Panel D: Error Rate (per second)</text>
  <text x="370" y="365" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#78350f">rate = 2/s</text>
  
  <text x="480" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#92400e">Mixed units slow incident response</text>

  <!-- Anti-Pattern 3: Panels Without Decision Mapping -->
  <rect x="640" y="60" width="290" height="350" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  
  <text x="785" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0c4a6e">3. No Decision Mapping</text>
  
  <rect x="660" y="110" width="250" height="70" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="675" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0c4a6e">Panel: Average CPU</text>
  <text x="675" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#0369a1">Value: 65%</text>
  <text x="675" y="170" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#dc2626">What action does this inform? None.</text>
  
  <rect x="660" y="190" width="250" height="70" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="675" y="215" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0c4a6e">Panel: Total Requests</text>
  <text x="675" y="235" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#0369a1">Value: 1.2M</text>
  <text x="675" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#dc2626">No threshold. No comparison. Vanity.</text>
  
  <rect x="660" y="270" width="250" height="70" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="675" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0c4a6e">Panel: Memory Usage</text>
  <text x="675" y="315" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#0369a1">Value: 78%</text>
  <text x="675" y="330" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#dc2626">No link to user impact or action.</text>
  
  <text x="785" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#0c4a6e">Every panel must answer:</text>
  <text x="785" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#0c4a6e">"What decision does this enable?"</text>
  
  <text x="785" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#0c4a6e">If no answer exists, remove the panel</text>
</svg>
