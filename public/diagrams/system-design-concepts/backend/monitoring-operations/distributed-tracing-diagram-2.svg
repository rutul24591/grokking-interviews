<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="460" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a">Common Failure Modes in Distributed Tracing</text>

  <!-- Failure Mode 1: Broken Propagation -->
  <rect x="30" y="56" width="440" height="120" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="50" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#991b1b">1. Broken Context Propagation</text>

  <rect x="50" y="92" width="100" height="36" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="100" y="114" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#0c4a6e">Gateway</text>

  <line x1="150" y1="110" x2="195" y2="110" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ah-red)"/>
  <text x="172" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#dc2626" font-weight="bold">DROP</text>

  <rect x="200" y="92" width="100" height="36" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="250" y="114" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#052e16">Auth Svc</text>

  <line x1="300" y1="110" x2="345" y2="110" stroke="#475569" stroke-width="1.5" marker-end="url(#ah2)"/>

  <rect x="350" y="92" width="100" height="36" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="114" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#422006">Order Svc</text>

  <text x="50" y="152" font-family="Arial" font-size="11" fill="#475569">Gateway strips trace headers. Downstream spans</text>
  <text x="50" y="166" font-family="Arial" font-size="11" fill="#475569">form orphaned traces. Trace appears fragmented.</text>

  <!-- Failure Mode 2: Sampling Bias -->
  <rect x="490" y="56" width="440" height="120" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="510" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#92400e">2. Sampling Bias</text>

  <text x="510" y="104" font-family="Arial" font-size="11" fill="#475569">1% uniform sampling means:</text>
  <text x="510" y="122" font-family="Arial" font-size="11" fill="#475569">- Rare failures likely missed</text>
  <text x="510" y="138" font-family="Arial" font-size="11" fill="#475569">- Tail-latency patterns diluted</text>
  <text x="510" y="154" font-family="Arial" font-size="11" fill="#475569">- Baseline unavailable for comparison</text>

  <rect x="760" y="96" width="140" height="60" rx="6" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="830" y="118" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#9a3412">Sampled Traces</text>
  <text x="830" y="134" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">99% of requests</text>
  <text x="830" y="148" text-anchor="middle" font-family="Arial" font-size="10" fill="#dc2626" font-weight="bold">discarded</text>

  <!-- Failure Mode 3: Cardinality Explosion -->
  <rect x="30" y="196" width="440" height="120" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="50" y="220" font-family="Arial" font-size="14" font-weight="bold" fill="#581c87">3. Cardinality Explosion</text>

  <text x="50" y="244" font-family="Arial" font-size="11" fill="#475569">Unbounded attributes create indexing blowup:</text>

  <rect x="50" y="256" width="170" height="44" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="60" y="273" font-family="Arial" font-size="10" fill="#475569">user_id, request_id,</text>
  <text x="60" y="289" font-family="Arial" font-size="10" fill="#475569">order_id, session_id...</text>

  <text x="230" y="283" text-anchor="middle" font-family="Arial" font-size="16" fill="#dc2626" font-weight="bold">&amp;#x2192;</text>

  <rect x="260" y="256" width="180" height="44" rx="6" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <text x="270" y="273" font-family="Arial" font-size="10" font-weight="bold" fill="#991b1b">Query latency increases</text>
  <text x="270" y="289" font-family="Arial" font-size="10" font-weight="bold" fill="#991b1b">Storage costs spike</text>

  <!-- Failure Mode 4: Missing Async Context -->
  <rect x="490" y="196" width="440" height="120" rx="8" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="510" y="220" font-family="Arial" font-size="14" font-weight="bold" fill="#0c4a6e">4. Missing Async Context</text>

  <rect x="510" y="236" width="110" height="34" rx="6" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <text x="565" y="257" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#422006">HTTP Request</text>

  <line x1="620" y1="270" x2="620" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#ah2)"/>

  <rect x="560" y="295" width="120" height="34" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="620" y="316" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#3b0764">Message Queue</text>

  <line x1="680" y1="312" x2="720" y2="312" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ah-red)"/>
  <text x="700" y="304" text-anchor="middle" font-family="Arial" font-size="9" fill="#dc2626" font-weight="bold">LOST</text>

  <rect x="725" y="295" width="120" height="34" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="785" y="316" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#991b1b">Worker (orphan)</text>

  <text x="510" y="350" font-family="Arial" font-size="11" fill="#475569">Async workers don&apos;t receive trace context. Spans</text>
  <text x="510" y="364" font-family="Arial" font-size="11" fill="#475569">become disconnected from the parent trace.</text>

  <!-- Key Takeaway -->
  <rect x="30" y="340" width="440" height="96" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="50" y="364" font-family="Arial" font-size="13" font-weight="bold" fill="#052e16">Key Takeaway</text>
  <text x="50" y="386" font-family="Arial" font-size="11" fill="#475569">Tracing fails silently. Incomplete traces look</text>
  <text x="50" y="402" font-family="Arial" font-size="11" fill="#475569">plausible but mislead incident response. Monitor</text>
  <text x="50" y="418" font-family="Arial" font-size="11" fill="#475569">propagation completeness as a first-class SLO.</text>

  <!-- Cost Impact -->
  <rect x="490" y="340" width="440" height="96" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="510" y="364" font-family="Arial" font-size="13" font-weight="bold" fill="#9a3412">Cost Impact of Each Failure</text>
  <text x="510" y="386" font-family="Arial" font-size="11" fill="#475569">Broken propagation: +MTTR (cannot trace end-to-end)</text>
  <text x="510" y="402" font-family="Arial" font-size="11" fill="#475569">Sampling bias: rare outages lack forensic evidence</text>
  <text x="510" y="418" font-family="Arial" font-size="11" fill="#475569">Cardinality explosion: query timeouts during incident</text>
</svg>
