  <text x="55" y="368" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#57534e">- Access control enforced</text>
  <text x="55" y="368" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#a8a29e">- Access control enforced</text>
  <text x="55" y="388" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#57534e">- Query budgets tracked</text>
  <text x="55" y="388" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#a8a29e">- Query budgets tracked</text>
