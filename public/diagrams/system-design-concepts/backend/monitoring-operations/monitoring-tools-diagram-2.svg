<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" fill="#ffffff" rx="8"/>

  <!-- Header -->
  <rect width="960" height="48" fill="url(#headerGrad)" rx="8"/>
  <rect y="24" width="960" height="24" fill="url(#headerGrad)"/>
  <text x="480" y="32" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="18">Monitoring Stack Failure Modes</text>

  <!-- Failure Mode 1: Ingestion Overload -->
  <rect x="30" y="72" width="210" height="160" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="72" width="210" height="32" rx="8" fill="#ef4444"/>
  <text x="135" y="94" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="13">Ingestion Overload</text>

  <!-- Ingestion flow diagram -->
  <rect x="48" y="116" width="44" height="28" rx="4" fill="#f87171"/>
  <text x="70" y="134" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Agents</text>

  <text x="105" y="134" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="14">&#9654;</text>

  <rect x="118" y="116" width="44" height="28" rx="4" fill="#dc2626"/>
  <text x="140" y="130" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Ingest</text>
  <text x="140" y="142" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Queue</text>

  <text x="175" y="134" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="14">&#9654;</text>

  <rect x="188" y="116" width="44" height="28" rx="4" fill="#991b1b"/>
  <text x="210" y="130" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Data</text>
  <text x="210" y="142" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Dropped</text>

  <text x="135" y="172" text-anchor="middle" fill="#7f1d1d" font-family="Arial, sans-serif" font-size="10">Result: Gaps in telemetry</text>
  <text x="135" y="188" text-anchor="middle" fill="#7f1d1d" font-family="Arial, sans-serif" font-size="10">False recovery signals</text>
  <text x="135" y="204" text-anchor="middle" fill="#7f1d1d" font-family="Arial, sans-serif" font-size="10">Blind spots during incidents</text>

  <!-- Failure Mode 2: Query Overload -->
  <rect x="270" y="72" width="210" height="160" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="270" y="72" width="210" height="32" rx="8" fill="#f59e0b"/>
  <text x="375" y="94" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="13">Query Overload</text>

  <!-- Query flow diagram -->
  <rect x="288" y="116" width="52" height="28" rx="4" fill="#fbbf24"/>
  <text x="314" y="134" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="10">Dashboard</text>

  <text x="353" y="134" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="14">&#9654;</text>

  <rect x="366" y="116" width="52" height="28" rx="4" fill="#d97706"/>
  <text x="392" y="130" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Query</text>
  <text x="392" y="142" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Engine</text>

  <text x="431" y="134" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="14">&#9654;</text>

  <rect x="444" y="116" width="28" height="28" rx="4" fill="#92400e"/>
  <text x="458" y="134" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16">&#x23f1;</text>

  <text x="375" y="172" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="10">Result: Dashboard timeouts</text>
  <text x="375" y="188" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="10">Responders cannot validate</text>
  <text x="375" y="204" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="10">Mitigation attempts stall</text>

  <!-- Failure Mode 3: Cardinality Explosion -->
  <rect x="510" y="72" width="210" height="160" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="510" y="72" width="210" height="32" rx="8" fill="#7c3aed"/>
  <text x="615" y="94" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="13">Cardinality Explosion</text>

  <!-- Cardinality diagram -->
  <text x="615" y="130" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="10">service=auth</text>
  <text x="540" y="148" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="10">+ user_id: 10K values</text>
  <text x="540" y="164" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="10">+ request_id: 1M values</text>
  <text x="540" y="180" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="10">+ trace_id: 10M values</text>

  <text x="690" y="148" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-weight="bold" font-size="14">&#x2192;</text>
  <text x="690" y="164" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-weight="bold" font-size="14">&#x2192;</text>
  <text x="690" y="180" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-weight="bold" font-size="14">&#x2192;</text>

  <rect x="700" y="124" width="48" height="64" rx="4" fill="#6d28d9"/>
  <text x="724" y="146" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Series</text>
  <text x="724" y="158" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">count</text>
  <text x="724" y="174" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="11">100x</text>

  <text x="615" y="212" text-anchor="middle" fill="#4c1d95" font-family="Arial, sans-serif" font-size="10">Result: Cost spike, unusable queries</text>
  <text x="615" y="228" text-anchor="middle" fill="#4c1d95" font-family="Arial, sans-serif" font-size="10">Memory pressure, degraded writes</text>

  <!-- Failure Mode 4: Broken Correlation -->
  <rect x="750" y="72" width="190" height="160" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="750" y="72" width="190" height="32" rx="8" fill="#3b82f6"/>
  <text x="845" y="94" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="13">Broken Correlation</text>

  <!-- Correlation broken diagram -->
  <rect x="768" y="116" width="48" height="28" rx="4" fill="#60a5fa"/>
  <text x="792" y="134" text-anchor="middle" fill="#1e3a5f" font-family="Arial, sans-serif" font-size="10">Metrics</text>

  <rect x="768" y="152" width="48" height="28" rx="4" fill="#3b82f6"/>
  <text x="792" y="170" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Logs</text>

  <rect x="768" y="188" width="48" height="28" rx="4" fill="#2563eb"/>
  <text x="792" y="206" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Traces</text>

  <text x="845" y="140" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-weight="bold" font-size="20">&#x2717;</text>
  <text x="845" y="176" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-weight="bold" font-size="20">&#x2717;</text>
  <text x="845" y="212" text-anchor="middle" fill="#dc2626" font-family="Arial, sans-serif" font-weight="bold" font-size="20">&#x2717;</text>

  <rect x="870" y="116" width="52" height="100" rx="4" fill="#1e3a5f"/>
  <text x="896" y="154" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Manual</text>
  <text x="896" y="166" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Context</text>
  <text x="896" y="178" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">Stitching</text>
  <text x="896" y="196" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="9">(Slow)</text>

  <text x="845" y="248" text-anchor="middle" fill="#1e3a5f" font-family="Arial, sans-serif" font-size="10">Result: Slow diagnosis</text>
  <text x="845" y="264" text-anchor="middle" fill="#1e3a5f" font-family="Arial, sans-serif" font-size="10">Cross-tool investigation</text>
  <text x="845" y="280" text-anchor="middle" fill="#1e3a5f" font-family="Arial, sans-serif" font-size="10">MTTR increases</text>

  <!-- Bottom summary bar -->
  <rect x="30" y="310" width="910" height="56" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="485" y="334" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-weight="bold" font-size="13">Impact During Incidents</text>
  <text x="485" y="354" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="12">Ingestion overload &#8226; Query overload &#8226; Cardinality explosion &#8226; Broken correlation &#8594; Visibility loss exactly when needed most</text>
</svg>