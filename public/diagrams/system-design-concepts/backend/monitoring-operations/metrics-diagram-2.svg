<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect fill="#f8fafc" width="960" height="460"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Histogram Buckets and Tail Latency: Averages Hide Pain</text>

  <!-- Y-axis label -->
  <text x="40" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155" transform="rotate(-90 40 200)">Request Count</text>

  <!-- X-axis label -->
  <text x="480" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#334155">Latency (ms, log scale)</text>

  <!-- Axes -->
  <line x1="70" y1="70" x2="70" y2="380" stroke="#334155" stroke-width="2"/>
  <line x1="70" y1="380" x2="920" y2="380" stroke="#334155" stroke-width="2"/>

  <!-- Histogram bars (bucket ranges) -->
  <!-- 0-10ms -->
  <rect x="80" y="340" width="60" height="40" fill="#4a9eff"/>
  <text x="110" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">0-10</text>

  <!-- 10-50ms -->
  <rect x="150" y="260" width="60" height="120" fill="#4a9eff"/>
  <text x="180" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">10-50</text>

  <!-- 50-100ms -->
  <rect x="220" y="160" width="60" height="220" fill="#1a73e8"/>
  <text x="250" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">50-100</text>

  <!-- 100-200ms -->
  <rect x="290" y="220" width="60" height="160" fill="#4a9eff"/>
  <text x="320" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">100-200</text>

  <!-- 200-500ms -->
  <rect x="360" y="290" width="60" height="90" fill="#4a9eff"/>
  <text x="390" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">200-500</text>

  <!-- 500ms-1s -->
  <rect x="430" y="340" width="60" height="40" fill="#4a9eff"/>
  <text x="460" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">500-1s</text>

  <!-- 1s-2s -->
  <rect x="500" y="360" width="60" height="20" fill="#dc3545"/>
  <text x="530" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">1s-2s</text>

  <!-- 2s-5s -->
  <rect x="570" y="370" width="60" height="10" fill="#dc3545"/>
  <text x="600" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">2s-5s</text>

  <!-- 5s+ -->
  <rect x="640" y="375" width="60" height="5" fill="#dc3545"/>
  <text x="670" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">5s+</text>

  <!-- average line -->
  <line x1="80" y1="280" x2="700" y2="280" stroke="#ffc107" stroke-width="3" stroke-dasharray="8, 4"/>
  <text x="710" y="284" font-family="Arial, sans-serif" font-size="14" fill="#ffc107" font-weight="bold">avg ~120ms</text>

  <!-- p99 line -->
  <line x1="80" y1="200" x2="700" y2="200" stroke="#dc3545" stroke-width="3"/>
  <text x="710" y="204" font-family="Arial, sans-serif" font-size="14" fill="#dc3545" font-weight="bold">p99 ~800ms</text>

  <!-- p999 line -->
  <line x1="80" y1="130" x2="700" y2="130" stroke="#6f42c1" stroke-width="3"/>
  <text x="710" y="134" font-family="Arial, sans-serif" font-size="14" fill="#6f42c1" font-weight="bold">p999 ~3s</text>

  <!-- Callout box -->
  <rect x="720" y="180" width="210" height="170" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="825" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0f172a">Why Averages Lie</text>
  <text x="735" y="235" font-family="Arial, sans-serif" font-size="12" fill="#475569">Average: 120ms (looks OK)</text>
  <text x="735" y="255" font-family="Arial, sans-serif" font-size="12" fill="#475569">p99: 800ms (users hurting)</text>
  <text x="735" y="275" font-family="Arial, sans-serif" font-size="12" fill="#475569">p999: 3s (incidents)</text>
  <text x="735" y="305" font-family="Arial, sans-serif" font-size="12" fill="#475569">Tail = saturation signal.</text>
  <text x="735" y="325" font-family="Arial, sans-serif" font-size="12" fill="#475569">Always alert on tail.</text>
</svg>