<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480">
  <style>
    .bg { fill: #f8fafc; }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #0f172a; }
    .axis { stroke: #94a3b8; stroke-width: 1.5; }
    .line { stroke: #3b82f6; stroke-width: 2.5; fill: none; }
    .baseline { stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 6,4; fill: none; }
    .band { fill: #fef3c7; opacity: 0.5; }
    .anomaly { fill: #ef4444; }
    .label { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
    .label-bold { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #0f172a; }
    .point { font-family: Arial, sans-serif; font-size: 10px; fill: #ef4444; font-weight: bold; }
    .grid { stroke: #e2e8f0; stroke-width: 0.5; }
  </style>
  <rect class="bg" width="960" height="480"/>
  <text class="title" x="40" y="40">Anomaly Types: Point, Change Point, and Collective Anomalies</text>
  <line class="axis" x1="80" y1="80" x2="80" y2="200"/>
  <line class="axis" x1="80" y1="200" x2="900" y2="200"/>
  <line class="grid" x1="80" y1="120" x2="900" y2="120"/>
  <line class="grid" x1="80" y1="160" x2="900" y2="160"/>
  <text class="label" x="20" y="145" transform="rotate(-90, 20, 145)">Value</text>
  <text class="label" x="490" y="225">Time</text>
  <text class="label-bold" x="80" y="260">Point Anomaly: Single spike deviates from baseline, often noise unless correlated</text>
  <polyline class="line" points="80,180 120,178 160,182 200,179 240,180 280,181 320,180 360,178 400,180 440,179 480,181 520,180"/>
  <polyline class="baseline" points="80,180 120,180 160,180 200,180 240,180 280,180 320,180 360,180 400,180 440,180 480,180 520,180"/>
  <polygon class="band" points="80,172 520,172 520,188 80,188"/>
  <circle class="anomaly" cx="300" cy="120" r="6"/>
  <text class="point" x="305" y="115">Point</text>
  <text class="point" x="305" y="127">anomaly</text>
  <line class="axis" x1="80" y1="260" x2="80" y2="380"/>
  <line class="axis" x1="80" y1="380" x2="900" y2="380"/>
  <line class="grid" x1="80" y1="300" x2="900" y2="300"/>
  <line class="grid" x1="80" y1="340" x2="900" y2="340"/>
  <text class="label" x="20" y="325" transform="rotate(-90, 20, 325)">Value</text>
  <text class="label" x="490" y="405">Time</text>
  <text class="label-bold" x="80" y="440">Change Point: New steady state after configuration or release change</text>
  <polyline class="line" points="80,360 120,358 160,362 200,359 240,360 280,361 320,340 360,338 400,342 440,339 480,341 520,340"/>
  <polyline class="baseline" points="80,360 120,360 160,360 200,360 240,360 280,360"/>
  <polyline class="baseline" points="320,340 360,340 400,340 440,340 480,340 520,340"/>
  <polygon class="band" points="80,352 280,352 280,368 80,368"/>
  <polygon class="band" points="320,332 520,332 520,348 320,348"/>
  <line stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" x1="300" y1="300" x2="300" y2="380"/>
  <text class="point" x="305" y="315">Change</text>
  <text class="point" x="305" y="327">point</text>
  <line class="axis" x1="600" y1="80" x2="600" y2="200"/>
  <line class="axis" x1="600" y1="200" x2="900" y2="200"/>
  <text class="label" x="550" y="145" transform="rotate(-90, 550, 145)">Value</text>
  <text class="label" x="750" y="225">Time</text>
  <text class="label-bold" x="600" y="260">Collective: Pattern change over a window (stalls, bursts, cycles)</text>
  <polyline class="line" points="600,180 630,178 660,182 690,179 720,180 750,140 780,145 810,138 840,142 870,180 900,178"/>
  <polyline class="baseline" points="600,180 630,180 660,180 690,180 720,180"/>
  <polyline class="baseline" points="870,180 900,180"/>
  <polygon class="band" points="600,172 720,172 720,188 600,188"/>
  <polygon class="band" points="870,172 900,172 900,188 870,188"/>
  <rect fill="#fef3c7" opacity="0.5" x="745" y="130" width="130" height="58" rx="4"/>
  <text class="point" x="770" y="160">Collective</text>
  <text class="point" x="770" y="175">anomaly</text>
</svg>