<svg viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="960" height="460" rx="8" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f172a">Trace Context Propagation</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">HTTP headers, message queue context, and propagation failure points</text>

  <!-- Legend -->
  <rect x="740" y="70" width="200" height="68" rx="6" fill="#e2e8f0"/>
  <line x1="750" y1="86" x2="766" y2="86" stroke="#22c55e" stroke-width="2.5"/>
  <text x="774" y="90" font-family="Arial, sans-serif" font-size="11" fill="#0f172a">Propagation intact</text>
  <line x1="750" y1="104" x2="766" y2="104" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="4,3"/>
  <text x="774" y="108" font-family="Arial, sans-serif" font-size="11" fill="#0f172a">Propagation broken</text>
  <rect x="750" y="118" width="16" height="10" rx="2" fill="#f59e0b"/>
  <text x="774" y="127" font-family="Arial, sans-serif" font-size="11" fill="#0f172a">Context injected</text>

  <!-- Service 1: API Gateway -->
  <rect x="40" y="80" width="170" height="70" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
  <text x="125" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">API Gateway</text>
  <text x="125" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dbeafe">Generates trace_id</text>
  <text x="125" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dbeafe">span_id = a1b2c3</text>

  <!-- HTTP Request line -->
  <line x1="210" y1="115" x2="310" y2="115" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="310,110 320,115 310,120" fill="#22c55e"/>
  <text x="265" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#16a34a">HTTP: traceparent</text>
  <text x="265" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">00-traceId-spanId-01</text>

  <!-- Service 2: Checkout Service -->
  <rect x="320" y="80" width="180" height="70" rx="8" fill="#8b5cf6" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="410" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Checkout Service</text>
  <text x="410" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ede9fe">Propagates context</text>
  <text x="410" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ede9fe">spans: d4e5f6</text>

  <!-- Async boundary: Message Queue -->
  <line x1="500" y1="115" x2="590" y2="115" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="590,110 600,115 590,120" fill="#22c55e"/>
  <text x="548" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#16a34a">MQ headers</text>
  <text x="548" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">context in envelope</text>

  <!-- Message Queue Box -->
  <rect x="600" y="80" width="140" height="70" rx="8" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <text x="670" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Message Queue</text>
  <text x="670" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fef3c7">Kafka / SQS</text>
  <text x="670" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fef3c7">context in headers</text>

  <!-- Broken propagation line to Worker 2 -->
  <line x1="670" y1="150" x2="670" y2="200" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="665,196 670,206 675,196" fill="#ef4444"/>
  <text x="720" y="180" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#dc2626">BROKEN</text>
  <text x="720" y="194" font-family="Arial, sans-serif" font-size="9" fill="#64748b">no context forward</text>

  <!-- HTTP to Payment: propagation intact -->
  <line x1="410" y1="150" x2="410" y2="210" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="405,206 410,216 415,206" fill="#22c55e"/>
  <text x="430" y="185" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#16a34a">HTTP OK</text>

  <!-- Service 3: Payment Service -->
  <rect x="310" y="220" width="200" height="70" rx="8" fill="#06b6d4" stroke="#0891b2" stroke-width="1.5"/>
  <text x="410" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Payment Service</text>
  <text x="410" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cffafe">trace_id preserved</text>
  <text x="410" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cffafe">span_id = g7h8i9</text>

  <!-- Worker 1: Email (intact from MQ) -->
  <rect x="60" y="220" width="180" height="70" rx="8" fill="#22c55e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="150" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Email Worker</text>
  <text x="150" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dcfce7">trace_id preserved</text>
  <text x="150" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dcfce7">span_id = j0k1l2</text>

  <!-- MQ to Email Worker: intact -->
  <line x1="600" y1="150" x2="150" y2="220" stroke="#22c55e" stroke-width="2"/>
  <text x="310" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#16a34a">context propagated</text>

  <!-- Worker 2: Analytics (broken) -->
  <rect x="560" y="220" width="220" height="70" rx="8" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
  <text x="670" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Analytics Worker</text>
  <text x="670" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fecaca">NEW trace_id (orphan)</text>
  <text x="670" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fecaca">span disconnected</text>

  <!-- Bottom annotation box -->
  <rect x="40" y="330" width="880" height="115" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Where Propagation Breaks</text>

  <text x="70" y="380" font-family="Arial, sans-serif" font-size="11" fill="#334155">1. Background workers that do not read MQ headers</text>
  <text x="70" y="400" font-family="Arial, sans-serif" font-size="11" fill="#334155">2. Third-party SDKs that strip unknown headers</text>
  <text x="70" y="420" font-family="Arial, sans-serif" font-size="11" fill="#334155">3. Cron / scheduler jobs with no incoming request context</text>
  <text x="480" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#334155">4. Gateway rewrites that drop W3C Trace Context headers</text>
  <text x="480" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#334155">5. gRPC services using metadata incorrectly</text>
  <text x="480" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#334155">6. Cross-account / cross-org boundaries with no trust</text>
</svg>