<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420">
  <!-- Background -->
  <rect width="960" height="420" fill="none"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827">Utilization vs Latency: The Saturation Cliff</text>

  <!-- Chart area -->
  <!-- Axes -->
  <line x1="100" y1="360" x2="880" y2="360" stroke="#374151" stroke-width="2"/>
  <line x1="100" y1="60" x2="100" y2="360" stroke="#374151" stroke-width="2"/>

  <!-- X-axis label -->
  <text x="490" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#111827">Resource Utilization (%)</text>

  <!-- Y-axis label -->
  <text x="30" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#111827" transform="rotate(-90, 30, 210)">Latency (log scale)</text>

  <!-- X-axis ticks -->
  <text x="100" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">0</text>
  <text x="256" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">20</text>
  <text x="412" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">40</text>
  <text x="568" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">60</text>
  <text x="724" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">80</text>
  <text x="880" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">100</text>

  <!-- Y-axis ticks -->
  <text x="90" y="360" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">1ms</text>
  <text x="90" y="285" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">10ms</text>
  <text x="90" y="210" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">100ms</text>
  <text x="90" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">1s</text>
  <text x="90" y="70" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="normal" fill="#4b5563">10s</text>

  <!-- Grid lines (horizontal) -->
  <line x1="100" y1="285" x2="880" y2="285" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="210" x2="880" y2="210" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="135" x2="880" y2="135" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="100" y1="70" x2="880" y2="70" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Latency curve: stays flat then rises sharply near saturation -->
  <!-- Path goes from (100,350) through flat region then curves up near 80%+ -->
  <path d="M 100 350 L 256 348 L 412 345 L 568 340 L 646 335 L 724 310 L 763 260 L 790 180 L 815 110 L 840 70 L 870 55"
        fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- p50 line (median) - stays relatively flat -->
  <path d="M 100 352 L 256 351 L 412 350 L 568 348 L 646 345 L 724 340 L 763 330 L 790 310 L 815 280 L 840 250 L 870 220"
        fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3" stroke-linecap="round"/>

  <!-- Knee of the curve marker -->
  <circle cx="763" cy="260" r="8" fill="#f59e0b" stroke="#92400e" stroke-width="2"/>
  <rect x="640" y="100" width="180" height="65" rx="6" ry="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="730" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Knee of the Curve</text>
  <text x="730" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#78350f">~70-80% utilization:</text>
  <text x="730" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#78350f">tail latency explodes</text>

  <!-- Safe zone -->
  <rect x="100" y="60" width="568" height="300" fill="#d1fae5" opacity="0.2"/>
  <text x="384" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#065f46">Safe Zone</text>
  <text x="384" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#047857">Headroom maintained</text>

  <!-- Danger zone -->
  <rect x="646" y="60" width="234" height="300" fill="#fee2e2" opacity="0.3"/>
  <text x="763" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">Danger Zone</text>
  <text x="763" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#b91c1c">Nonlinear latency growth</text>

  <!-- Legend -->
  <rect x="120" y="390" width="120" height="20" rx="3" fill="none" stroke="#dc2626" stroke-width="2"/>
  <line x1="125" y1="400" x2="160" y2="400" stroke="#dc2626" stroke-width="3"/>
  <text x="170" y="404" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#374151">p99 latency</text>

  <line x1="240" y1="400" x2="275" y2="400" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="285" y="404" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#374151">p50 latency</text>
</svg>