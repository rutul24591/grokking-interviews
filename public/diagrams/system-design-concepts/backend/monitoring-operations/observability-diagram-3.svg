<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" fill="#f8fafc" />

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">Observability Governance Loop</text>
  <text x="480" y="56" text-anchor="middle" font-family="Arial" font-size="13" fill="#475569">Standards -> Measure quality -> Review after incidents -> Improve instrumentation</text>

  <!-- Circular loop: 4 nodes arranged in a diamond pattern -->
  
  <!-- Top node: Standards -->
  <rect x="370" y="90" width="220" height="80" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" />
  <text x="480" y="120" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#0f172a">STANDARDS</text>
  <text x="480" y="142" text-anchor="middle" font-family="Arial" font-size="11" fill="#334155">Naming, attributes, correlation IDs</text>
  <text x="480" y="158" text-anchor="middle" font-family="Arial" font-size="11" fill="#334155">Cardinality budgets, privacy rules</text>

  <!-- Arrow: Standards to Measure Quality -->
  <line x1="590" y1="130" x2="720" y2="190" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Right node: Measure Quality -->
  <rect x="720" y="180" width="200" height="90" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2" />
  <text x="820" y="210" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#0f172a">MEASURE QUALITY</text>
  <text x="820" y="232" text-anchor="middle" font-family="Arial" font-size="11" fill="#334155">Coverage of golden paths</text>
  <text x="820" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#334155">Trace completeness, pivot success</text>

  <!-- Arrow: Measure Quality to Review -->
  <line x1="720" y1="250" x2="590" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Bottom node: Review After Incidents -->
  <rect x="370" y="300" width="220" height="90" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <text x="480" y="330" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#0f172a">REVIEW AFTER INCIDENTS</text>
  <text x="480" y="352" text-anchor="middle" font-family="Arial" font-size="11" fill="#334155">What was missing?</text>
  <text x="480" y="370" text-anchor="middle" font-family="Arial" font-size="11" fill="#334155">What was misleading?</text>

  <!-- Arrow: Review to Improve -->
  <line x1="370" y1="340" x2="240" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Left node: Improve Instrumentation -->
  <rect x="40" y="180" width="200" height="90" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" />
  <text x="140" y="210" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#0f172a">IMPROVE INSTRUMENTATION</text>
  <text x="140" y="232" text-anchor="middle" font-family="Arial" font-size="11" fill="#334155">Add missing attributes</text>
  <text x="140" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#334155">Update runbooks, dashboards</text>

  <!-- Arrow: Improve to Standards -->
  <line x1="240" y1="200" x2="370" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Center annotation -->
  <circle cx="480" cy="230" r="50" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
  <text x="480" y="222" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#475569">Continuous</text>
  <text x="480" y="240" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#475569">Improvement</text>

  <!-- Bottom key takeaway -->
  <rect x="40" y="400" width="880" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="480" y="420" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">Each incident should improve the observability system -- not just fix the immediate failure.</text>
</svg>