<svg viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="960" height="440" rx="8" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f172a">Span Tree &amp; Critical Path</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Root span branching into child spans with critical path highlighted</text>

  <!-- Legend -->
  <rect x="740" y="75" width="200" height="72" rx="6" fill="#e2e8f0"/>
  <rect x="750" y="85" width="16" height="12" rx="2" fill="#3b82f6"/>
  <text x="774" y="96" font-family="Arial, sans-serif" font-size="11" fill="#0f172a">Critical path span</text>
  <rect x="750" y="103" width="16" height="12" rx="2" fill="#94a3b8"/>
  <text x="774" y="114" font-family="Arial, sans-serif" font-size="11" fill="#0f172a">Parallel / non-critical</text>
  <line x1="750" y1="130" x2="766" y2="130" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="774" y="134" font-family="Arial, sans-serif" font-size="11" fill="#0f172a">Critical path flow</text>

  <!-- Root Span: GET /api/checkout -->
  <rect x="340" y="80" width="280" height="52" rx="8" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">GET /api/checkout</text>
  <text x="480" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#dbeafe">root span | 340ms total</text>

  <!-- Lines from root to children -->
  <line x1="420" y1="132" x2="160" y2="180" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="480" y1="132" x2="480" y2="180" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="540" y1="132" x2="800" y2="180" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Child Span 1: auth.verify -->
  <rect x="60" y="180" width="200" height="48" rx="6" fill="#94a3b8"/>
  <text x="160" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">auth.verify</text>
  <text x="160" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f1f5f9">25ms</text>

  <!-- Child Span 2: db.getCart (CRITICAL PATH) -->
  <rect x="350" y="180" width="260" height="48" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">db.getCart</text>
  <text x="480" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dbeafe">85ms | critical path</text>

  <!-- Child Span 3: cache.checkPricing -->
  <rect x="680" y="180" width="240" height="48" rx="6" fill="#94a3b8"/>
  <text x="800" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">cache.checkPricing</text>
  <text x="800" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f1f5f9">8ms</text>

  <!-- Lines from db.getCart to its children -->
  <line x1="440" y1="228" x2="300" y2="275" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="520" y1="228" x2="620" y2="275" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Grandchild Span 1: db.query.items (CRITICAL PATH) -->
  <rect x="180" y="275" width="240" height="48" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">db.query.items</text>
  <text x="300" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dbeafe">62ms | SELECT 12 rows</text>

  <!-- Grandchild Span 2: cache.validate (CRITICAL PATH) -->
  <rect x="480" y="275" width="260" height="48" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="610" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">cache.validateStock</text>
  <text x="610" y="311" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dbeafe">18ms | Redis HIT</text>

  <!-- Lines from db.query.items to payment downstream -->
  <line x1="300" y1="323" x2="300" y2="370" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Downstream: payment.process (CRITICAL PATH) -->
  <rect x="160" y="370" width="280" height="48" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">downstream.payment.process</text>
  <text x="300" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dbeafe">120ms | HTTP POST</text>

  <!-- Parallel: inventory.reserve (non-critical) -->
  <line x1="610" y1="323" x2="610" y2="370" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="480" y="370" width="260" height="48" rx="6" fill="#94a3b8"/>
  <text x="610" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">inventory.reserve</text>
  <text x="610" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f1f5f9">35ms | async fire-and-forget</text>

  <!-- Critical path annotation -->
  <rect x="20" y="355" width="120" height="65" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="80" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#dc2626">Critical Path</text>
  <text x="80" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0f172a">root &#x2192; db &#x2192;</text>
  <text x="80" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0f172a">payment = 287ms</text>
</svg>