<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480">
  <!-- Background -->
  <rect width="960" height="480" fill="#f8fafc" />
  <text x="480" y="36" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#0f172a">Health Signal Integration: Routing and Response</text>

  <!-- Top row: Load Balancer -->
  <rect x="40" y="60" width="260" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <rect x="40" y="60" width="260" height="36" rx="10" fill="#2563eb" />
  <text x="170" y="84" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#ffffff">Load Balancer / Ingress</text>
  <text x="170" y="120" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">Consumes: readiness</text>
  <text x="170" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">Action: add/remove from</text>
  <text x="170" y="158" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">backend pool; slow-start</text>
  <text x="170" y="176" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">weight on new instances</text>
  <circle cx="170" cy="220" r="16" fill="#dbeafe" />
  <text x="170" y="225" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1d4ed8">ROUTE</text>

  <!-- Orchestrator -->
  <rect x="350" y="60" width="260" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <rect x="350" y="60" width="260" height="36" rx="10" fill="#16a34a" />
  <text x="480" y="84" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#ffffff">Orchestrator (K8s)</text>
  <text x="480" y="120" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">Consumes: liveness, startup,</text>
  <text x="480" y="138" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">readiness</text>
  <text x="480" y="158" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">Action: restart (liveness fail),</text>
  <text x="480" y="176" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">route (readiness), delay (startup)</text>
  <circle cx="480" cy="220" r="16" fill="#dcfce7" />
  <text x="480" y="225" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#15803d">MANAGE</text>

  <!-- Incident Responder -->
  <rect x="660" y="60" width="260" height="140" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <rect x="660" y="60" width="260" height="36" rx="10" fill="#d97706" />
  <text x="790" y="84" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#ffffff">Incident Responder</text>
  <text x="790" y="120" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">Consumes: all health signals</text>
  <text x="790" y="140" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">+ synthetic, error rates,</text>
  <text x="790" y="158" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">latency percentiles</text>
  <text x="790" y="176" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">Action: diagnose, degrade,</text>
  <text x="790" y="194" text-anchor="middle" font-family="Arial" font-size="12" fill="#334155">isolate, recover</text>
  <circle cx="790" cy="220" r="16" fill="#fef3c7" />
  <text x="790" y="225" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#b45309">DIAGNOSE</text>

  <!-- Middle: Health endpoint as source -->
  <rect x="260" y="280" width="440" height="90" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <text x="480" y="314" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#334155">/healthz, /readyz, /startupz, /health/synthetic</text>
  <text x="480" y="340" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Endpoints expose health state — consumed by routing, orchestration, and observability</text>

  <!-- Arrows from health endpoints to consumers -->
  <path d="M 340 280 L 200 210" fill="none" stroke="#94a3b8" stroke-width="1.5" />
  <path d="M 480 280 L 480 210" fill="none" stroke="#94a3b8" stroke-width="1.5" />
  <path d="M 620 280 L 760 210" fill="none" stroke="#94a3b8" stroke-width="1.5" />

  <!-- Bottom row: Response actions -->
  <rect x="40" y="400" width="280" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="180" y="422" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1d4ed8">Traffic Shift</text>
  <text x="180" y="442" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">Eject failing, gradual re-entry</text>

  <rect x="340" y="400" width="280" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="480" y="422" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#15803d">Restart / Reschedule</text>
  <text x="480" y="442" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">Liveness fail triggers pod restart</text>

  <rect x="640" y="400" width="280" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="780" y="422" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#b45309">Degrade / Isolate</text>
  <text x="780" y="442" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">Disable soft deps, reduce load</text>

  <!-- Arrows from responders down to actions -->
  <path d="M 180 280 L 180 395" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" />
  <path d="M 480 280 L 480 395" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" />
  <path d="M 780 280 L 780 395" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3" />
</svg>
