<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <!-- Background -->
  <rect width="960" height="480" fill="none"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#111827">Failure Capacity Planning: N+1 and Multi-AZ Headroom</text>

  <!-- Scenario 1: Steady State with N+1 -->
  <text x="240" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827">Scenario 1: Steady State (N+1)</text>

  <!-- 4 normal nodes + 1 spare -->
  <!-- Node 1 -->
  <rect x="80" y="95" width="70" height="80" rx="6" ry="6" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="115" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065f46">N1</text>
  <text x="115" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#047857">65%</text>
  <text x="115" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#047857">util</text>

  <!-- Node 2 -->
  <rect x="165" y="95" width="70" height="80" rx="6" ry="6" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="200" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065f46">N2</text>
  <text x="200" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#047857">65%</text>
  <text x="200" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#047857">util</text>

  <!-- Node 3 -->
  <rect x="250" y="95" width="70" height="80" rx="6" ry="6" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="285" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065f46">N3</text>
  <text x="285" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#047857">65%</text>
  <text x="285" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#047857">util</text>

  <!-- Node 4 -->
  <rect x="335" y="95" width="70" height="80" rx="6" ry="6" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="370" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065f46">N4</text>
  <text x="370" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#047857">65%</text>
  <text x="370" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#047857">util</text>

  <!-- Spare node -->
  <rect x="420" y="95" width="70" height="80" rx="6" ry="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="455" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">N+1</text>
  <text x="455" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#78350f">spare</text>
  <text x="455" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#78350f">capacity</text>

  <!-- Label -->
  <rect x="80" y="190" width="410" height="35" rx="5" ry="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="285" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">Total capacity: 5 nodes. Demand uses 4. One node headroom.</text>

  <!-- Scenario 2: Node Failure - remaining nodes absorb load -->
  <text x="240" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827">Scenario 2: Node Failure (N3 down)</text>

  <!-- Node 1 - now at higher util -->
  <rect x="80" y="280" width="70" height="80" rx="6" ry="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="115" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">N1</text>
  <text x="115" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#78350f">80%</text>
  <text x="115" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#78350f">util</text>

  <!-- Node 2 -->
  <rect x="165" y="280" width="70" height="80" rx="6" ry="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">N2</text>
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#78350f">80%</text>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#78350f">util</text>

  <!-- Node 3 - FAILED -->
  <rect x="250" y="280" width="70" height="80" rx="6" ry="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="285" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">N3</text>
  <text x="285" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#b91c1c">DOWN</text>
  <!-- X mark -->
  <line x1="265" y1="340" x2="305" y2="355" stroke="#dc2626" stroke-width="3"/>
  <line x1="305" y1="340" x2="265" y2="355" stroke="#dc2626" stroke-width="3"/>

  <!-- Node 4 -->
  <rect x="335" y="280" width="70" height="80" rx="6" ry="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="370" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">N4</text>
  <text x="370" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#78350f">80%</text>
  <text x="370" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#78350f">util</text>

  <!-- Spare node - now active -->
  <rect x="420" y="280" width="70" height="80" rx="6" ry="6" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="455" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#065f46">N+1</text>
  <text x="455" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#047857">80%</text>
  <text x="455" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#047857">util</text>

  <!-- Label -->
  <rect x="80" y="375" width="410" height="35" rx="5" ry="5" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="285" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#78350f">N3 failed. Spare activated. Remaining nodes at 80% — safe.</text>

  <!-- Scenario 3: Multi-AZ without headroom -->
  <text x="720" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827">Multi-AZ: Without Headroom</text>

  <!-- AZ1 -->
  <rect x="560" y="90" width="320" height="100" rx="8" ry="8" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="720" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4b5563">AZ-1</text>

  <!-- AZ1 nodes all at high util -->
  <rect x="580" y="120" width="55" height="55" rx="4" ry="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="607" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">85%</text>
  <text x="607" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">util</text>

  <rect x="650" y="120" width="55" height="55" rx="4" ry="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="677" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">85%</text>
  <text x="677" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">util</text>

  <rect x="720" y="120" width="55" height="55" rx="4" ry="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="747" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">85%</text>
  <text x="747" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">util</text>

  <rect x="790" y="120" width="55" height="55" rx="4" ry="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="817" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">85%</text>
  <text x="817" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">util</text>

  <!-- AZ2 -->
  <rect x="560" y="205" width="320" height="100" rx="8" ry="8" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="720" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4b5563">AZ-2</text>

  <!-- AZ2 nodes all at high util -->
  <rect x="580" y="235" width="55" height="55" rx="4" ry="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="607" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">85%</text>
  <text x="607" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">util</text>

  <rect x="650" y="235" width="55" height="55" rx="4" ry="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="677" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">85%</text>
  <text x="677" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">util</text>

  <rect x="720" y="235" width="55" height="55" rx="4" ry="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="747" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">85%</text>
  <text x="747" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">util</text>

  <rect x="790" y="235" width="55" height="55" rx="4" ry="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="817" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">85%</text>
  <text x="817" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#b91c1c">util</text>

  <!-- Warning label -->
  <rect x="560" y="320" width="320" height="30" rx="5" ry="5" fill="#fee2e2" stroke="#f87171" stroke-width="1"/>
  <text x="720" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">AZ loss: remaining nodes exceed 100% capacity</text>

  <!-- Scenario 4: Multi-AZ with headroom -->
  <text x="720" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827">Multi-AZ: With Headroom</text>

  <!-- AZ1 with headroom -->
  <rect x="560" y="405" width="320" height="60" rx="8" ry="8" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="720" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#065f46">AZ-1 (50% util each)</text>

  <rect x="580" y="430" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="600" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <rect x="630" y="430" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="650" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <rect x="680" y="430" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="700" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <rect x="730" y="430" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="750" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <rect x="780" y="430" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="800" y="447" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <!-- AZ2 with headroom -->
  <rect x="560" y="465" width="320" height="60" rx="8" ry="8" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="720" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#065f46">AZ-2 (50% util each)</text>

  <rect x="580" y="490" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="600" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <rect x="630" y="490" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="650" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <rect x="680" y="490" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="700" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <rect x="730" y="490" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="750" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <rect x="780" y="490" width="40" height="25" rx="3" ry="3" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="800" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#065f46">50%</text>

  <!-- Arrow and note -->
  <text x="720" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#065f46">AZ loss: remaining nodes at 100% util — still within capacity, tail latency manageable</text>
</svg>