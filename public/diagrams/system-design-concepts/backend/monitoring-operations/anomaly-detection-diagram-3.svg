<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480">
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
    .gate { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #0f172a; }
    .box-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #0f172a; }
    .box-desc { font-family: Arial, sans-serif; font-size: 11px; fill: #475569; }
    .gate-title { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #92400e; }
    .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .deny { stroke: #ef4444; stroke-width: 2; stroke-dasharray: 6,4; fill: none; marker-end: url(#arrowhead-red); }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #475569; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="480"/>
  <text class="title" x="40" y="40">Anomaly Gating and Routing Workflow</text>
  <rect class="box" x="60" y="80" width="180" height="80" rx="8"/>
  <text class="box-title" x="80" y="110">Anomaly</text>
  <text class="box-title" x="80" y="127">Detected</text>
  <text class="box-desc" x="80" y="145">Deviation from</text>
  <text class="box-desc" x="80" y="160">expected baseline</text>
  <path class="arrow" d="M 240 120 L 280 120"/>
  <rect class="gate" x="280" y="70" width="200" height="100" rx="8"/>
  <text class="gate-title" x="300" y="100">Gate 1: Persistence</text>
  <text class="box-desc" x="300" y="120">Abnormal for N</text>
  <text class="box-desc" x="300" y="135">consecutive windows?</text>
  <path class="arrow" d="M 480 120 L 520 120"/>
  <text class="label" x="485" y="112">Yes</text>
  <rect class="gate" x="520" y="70" width="200" height="100" rx="8"/>
  <text class="gate-title" x="540" y="100">Gate 2: Multi-Signal</text>
  <text class="box-desc" x="540" y="120">Correlated movement</text>
  <text class="box-desc" x="540" y="135">in second signal?</text>
  <path class="arrow" d="M 720 120 L 760 120"/>
  <text class="label" x="725" y="112">Yes</text>
  <rect class="gate" x="760" y="70" width="160" height="100" rx="8"/>
  <text class="gate-title" x="780" y="100">Gate 3: Impact</text>
  <text class="box-desc" x="780" y="120">SLI or burn rate</text>
  <text class="box-desc" x="780" y="135">elevated?</text>
  <path class="arrow" d="M 840 170 L 840 260"/>
  <text class="label" x="845" y="220">Yes</text>
  <rect class="box" x="740" y="260" width="160" height="80" rx="8"/>
  <text class="box-title" x="760" y="290">Page On-Call</text>
  <text class="box-desc" x="760" y="310">High severity,</text>
  <text class="box-desc" x="760" y="325">immediate response</text>
  <path class="deny" d="M 380 170 L 380 350"/>
  <text class="label" x="385" y="265" fill="#ef4444">No</text>
  <path class="deny" d="M 620 170 L 620 350"/>
  <text class="label" x="625" y="265" fill="#ef4444">No</text>
  <path class="arrow" d="M 620 350 L 520 350"/>
  <rect class="box" x="340" y="310" width="180" height="80" rx="8"/>
  <text class="box-title" x="360" y="340">Dashboard Annotation</text>
  <text class="box-desc" x="360" y="360">Enrich dashboards</text>
  <text class="box-desc" x="360" y="375">with anomaly context</text>
  <path class="arrow" d="M 340 350 L 260 350"/>
  <rect class="box" x="60" y="310" width="180" height="80" rx="8"/>
  <text class="box-title" x="80" y="340">Investigation Queue</text>
  <text class="box-desc" x="80" y="360">Store for post-incident</text>
  <text class="box-desc" x="80" y="375">analysis and trending</text>
  <path class="deny" d="M 280 70 L 280 420"/>
  <path class="arrow" d="M 280 420 L 150 420"/>
  <text class="label" x="245" y="415">No</text>
  <rect class="box" x="60" y="390" width="180" height="80" rx="8"/>
  <text class="box-title" x="80" y="420">Suppress</text>
  <text class="box-desc" x="80" y="440">Likely false positive,</text>
  <text class="box-desc" x="80" y="455">no action needed</text>
</svg>