<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .body { font-family: Arial, sans-serif; font-size: 12px; font-weight: normal; }
      .label { font-family: Arial, sans-serif; font-size: 11px; font-weight: normal; }
      .bold-label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" fill="#ffffff" rx="8"/>

  <!-- Main Title -->
  <text x="480" y="36" class="title" text-anchor="middle" fill="#1f2937">Lock Contention and Tail Latency Amplification</text>

  <!-- Timeline axis -->
  <line x1="60" y1="100" x2="900" y2="100" stroke="#374151" stroke-width="2"/>
  <text x="60" y="85" class="label" fill="#6b7280">Time &#x2192;</text>

  <!-- Long Transaction (holding lock) -->
  <rect x="120" y="120" width="340" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
  <text x="290" y="150" class="bold-label" text-anchor="middle" fill="#991b1b">Long Transaction (holds lock on Row X)</text>
  <text x="140" y="165" class="label" fill="#7f1d1d">UPDATE accounts SET balance = ... WHERE region = &#x2018;US&#x2019;</text>

  <!-- Blocked Short Transactions -->
  <rect x="120" y="185" width="80" height="36" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="160" y="207" class="label" text-anchor="middle" fill="#92400e" font-weight="bold">Txn A</text>
  <text x="160" y="235" class="label" text-anchor="middle" fill="#78350f">blocked</text>

  <rect x="220" y="185" width="80" height="36" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="260" y="207" class="label" text-anchor="middle" fill="#92400e" font-weight="bold">Txn B</text>
  <text x="260" y="235" class="label" text-anchor="middle" fill="#78350f">blocked</text>

  <rect x="320" y="185" width="80" height="36" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="207" class="label" text-anchor="middle" fill="#92400e" font-weight="bold">Txn C</text>
  <text x="360" y="235" class="label" text-anchor="middle" fill="#78350f">blocked</text>

  <rect x="420" y="185" width="80" height="36" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <text x="460" y="207" class="label" text-anchor="middle" fill="#92400e" font-weight="bold">Txn D</text>
  <text x="460" y="235" class="label" text-anchor="middle" fill="#78350f">blocked</text>

  <!-- Lock released -->
  <line x1="460" y1="115" x2="460" y2="230" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="475" y="130" class="label" fill="#991b1b" font-weight="bold">Lock released</text>

  <!-- Cascade effect annotation -->
  <rect x="560" y="120" width="340" height="110" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="730" y="148" class="subtitle" text-anchor="middle" fill="#1e40af">Cascade Effect on Tail Latency</text>
  <text x="580" y="170" class="label" fill="#1e3a8a">&#x2022; 4 short txns queued behind 1 long txn</text>
  <text x="580" y="190" class="label" fill="#1e3a8a">&#x2022; p99 latency = sum of all blocked txns</text>
  <text x="580" y="210" class="label" fill="#1e3a8a">&#x2022; Connection pool threads held idle</text>

  <!-- Latency distribution visual -->
  <rect x="60" y="280" width="430" height="140" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="275" y="308" class="subtitle" text-anchor="middle" fill="#374151">Latency Distribution (Before Contention)</text>

  <!-- Normal distribution curve -->
  <path d="M 100 390 Q 180 310 275 310 Q 370 310 450 390" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="100" y="405" class="label" fill="#4b5563">p50</text>
  <text x="275" y="300" class="label" fill="#4b5563" font-weight="bold">p95</text>
  <text x="440" y="395" class="label" fill="#4b5563">p99</text>
  <line x1="440" y1="310" x2="440" y2="390" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- After contention -->
  <rect x="510" y="280" width="420" height="140" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="720" y="308" class="subtitle" text-anchor="middle" fill="#374151">Latency Distribution (During Contention)</text>

  <!-- Skewed distribution -->
  <path d="M 550 390 Q 600 370 650 360 Q 700 340 750 320 Q 800 310 870 310" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="550" y="405" class="label" fill="#4b5563">p50</text>
  <text x="750" y="310" class="label" fill="#4b5563" font-weight="bold">p95</text>
  <text x="860" y="300" class="label" fill="#dc2626" font-weight="bold">p99 &#x2191;&#x2191;</text>
  <line x1="870" y1="310" x2="870" y2="390" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Annotation arrow -->
  <line x1="490" y1="350" x2="510" y2="350" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Key insight box -->
  <rect x="60" y="405" width="840" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="424" class="bold-label" text-anchor="middle" fill="#92400e">Key: A single long transaction can block dozens of short ones, turning a healthy system into a queueing system.</text>

  <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
  </marker>
</svg>