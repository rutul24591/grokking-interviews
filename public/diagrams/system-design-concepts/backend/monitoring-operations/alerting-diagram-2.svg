<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480">
  <style>
    .bg { fill: #f8fafc; }
    .tier-1 { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
    .tier-2 { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
    .tier-3 { fill: #fce7f3; stroke: #ec4899; stroke-width: 2; }
    .tier-4 { fill: #e0e7ff; stroke: #6366f1; stroke-width: 2; }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #0f172a; }
    .tier-title { font-family: Arial, sans-serif; font-size: 15px; font-weight: bold; fill: #0f172a; }
    .tier-desc { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
    .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #475569; }
    .brace { stroke: #64748b; stroke-width: 1.5; fill: none; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="480"/>
  <text class="title" x="40" y="40">Alert Signal Hierarchy: Symptoms First, Causes Second</text>
  <rect class="tier-1" x="60" y="70" width="840" height="80" rx="8"/>
  <text class="tier-title" x="80" y="100">Tier 1: User Impact (Page Immediately)</text>
  <text class="tier-desc" x="80" y="120">SLO burn rate, availability drops, tail latency breaches, correctness failures</text>
  <path class="arrow" d="M 480 150 L 480 170"/>
  <text class="label" x="490" y="165">Escalates if sustained</text>
  <rect class="tier-2" x="60" y="170" width="840" height="80" rx="8"/>
  <text class="tier-title" x="80" y="200">Tier 2: Saturation and Capacity (Page if Impact Imminent)</text>
  <text class="tier-desc" x="80" y="220">Connection pool exhaustion, disk IOPS near limit, memory pressure, queue depth growth</text>
  <path class="arrow" d="M 480 250 L 480 270"/>
  <text class="label" x="490" y="265">Correlates with Tier 1</text>
  <rect class="tier-3" x="60" y="270" width="840" height="80" rx="8"/>
  <text class="tier-title" x="80" y="300">Tier 3: Dependency Health (Dashboard, Page Only if Cascading)</text>
  <text class="tier-desc" x="80" y="320">Downstream timeouts, upstream error rates, DNS failures, TLS handshake delays</text>
  <path class="arrow" d="M 480 350 L 480 370"/>
  <text class="label" x="490" y="365">Context for diagnosis</text>
  <rect class="tier-4" x="60" y="370" width="840" height="80" rx="8"/>
  <text class="tier-title" x="80" y="400">Tier 4: System Telemetry (Investigate, Do Not Page)</text>
  <text class="tier-desc" x="80" y="420">CPU utilization, memory usage, network throughput, log volume spikes</text>
  <path class="brace" d="M 30 70 L 20 70 L 20 450 L 30 450"/>
  <text class="label" x="10" y="260" transform="rotate(-90, 10, 260)" text-anchor="middle">Paging Priority</text>
</svg>