<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
  <defs>
    <filter id="shadow2" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="460" fill="#f8fafc" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="960" height="56" fill="#f1f5f9" rx="8"/>
  <rect x="0" y="32" width="960" height="24" fill="#f1f5f9"/>
  <text x="480" y="36" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Flame Graph Interpretation</text>

  <!-- Flame graph visualization -->
  <!-- Row 0 (top - deepest) -->
  <rect x="360" y="80" width="240" height="30" rx="2" fill="#3b82f6" filter="url(#shadow2)"/>
  <text x="480" y="100" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">handleRequest()</text>

  <!-- Row 1 -->
  <rect x="360" y="114" width="120" height="30" rx="2" fill="#60a5fa" filter="url(#shadow2)"/>
  <text x="420" y="134" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">auth()</text>
  <rect x="484" y="114" width="116" height="30" rx="2" fill="#60a5fa" filter="url(#shadow2)"/>
  <text x="542" y="134" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">processPayload()</text>

  <!-- Row 2 -->
  <rect x="360" y="148" width="50" height="30" rx="2" fill="#93c5fd" filter="url(#shadow2)"/>
  <text x="385" y="168" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">verify()</text>
  <rect x="414" y="148" width="66" height="30" rx="2" fill="#93c5fd" filter="url(#shadow2)"/>
  <text x="447" y="168" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">lookup()</text>
  <rect x="484" y="148" width="56" height="30" rx="2" fill="#f59e0b" filter="url(#shadow2)"/>
  <text x="512" y="168" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">serialize()</text>
  <rect x="544" y="148" width="56" height="30" rx="2" fill="#93c5fd" filter="url(#shadow2)"/>
  <text x="572" y="168" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">transform()</text>

  <!-- Row 3 -->
  <rect x="484" y="182" width="28" height="30" rx="2" fill="#fbbf24" filter="url(#shadow2)"/>
  <text x="498" y="202" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">enc()</text>
  <rect x="516" y="182" width="24" height="30" rx="2" fill="#ef4444" filter="url(#shadow2)"/>
  <text x="528" y="202" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">alloc()</text>

  <!-- Axis labels -->
  <line x1="60" y1="226" x2="340" y2="226" stroke="#94a3b8" stroke-width="1"/>
  <text x="60" y="220" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Depth = call nesting</text>
  <text x="60" y="240" font-family="Arial, sans-serif" font-size="11" fill="#64748b">(caller above callee)</text>

  <!-- Width annotation -->
  <line x1="484" y1="148" x2="484" y2="280" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="540" y1="148" x2="540" y2="280" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="470" y="282" width="84" height="28" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="512" y="296" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#dc2626" text-anchor="middle">WIDEST</text>
  <text x="512" y="308" font-family="Arial, sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">= dominant</text>

  <!-- Inclusive vs Exclusive time panel -->
  <rect x="640" y="80" width="280" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow2)"/>
  <text x="780" y="106" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Inclusive vs Exclusive Time</text>
  <line x1="660" y1="116" x2="900" y2="116" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="660" y="128" width="16" height="16" rx="3" fill="#3b82f6"/>
  <text x="684" y="141" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Inclusive time</text>
  <text x="684" y="157" font-family="Arial, sans-serif" font-size="11" fill="#475569">Total time in a function</text>
  <text x="684" y="172" font-family="Arial, sans-serif" font-size="11" fill="#475569">including all children it calls.</text>
  <text x="684" y="188" font-family="Arial, sans-serif" font-size="11" fill="#475569">handleRequest() has high</text>
  <text x="684" y="203" font-family="Arial, sans-serif" font-size="11" fill="#475569">inclusive time (expected).</text>

  <rect x="660" y="218" width="16" height="16" rx="3" fill="#ef4444"/>
  <text x="684" y="231" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Exclusive time</text>
  <text x="684" y="247" font-family="Arial, sans-serif" font-size="11" fill="#475569">Time spent in the function</text>
  <text x="684" y="262" font-family="Arial, sans-serif" font-size="11" fill="#475569">body itself, excluding children.</text>
  <text x="684" y="278" font-family="Arial, sans-serif" font-size="11" fill="#475569">alloc() has high exclusive time</text>
  <text x="684" y="293" font-family="Arial, sans-serif" font-size="11" fill="#475569">(true hotspot to optimize).</text>

  <!-- Key heuristics panel -->
  <rect x="60" y="340" width="560" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow2)"/>
  <text x="340" y="364" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Key Heuristics for Finding the Root Cause</text>
  <line x1="80" y1="374" x2="600" y2="374" stroke="#e2e8f0" stroke-width="1"/>

  <text x="80" y="394" font-family="Arial, sans-serif" font-size="11" fill="#334155">1. Find the widest frame -- width represents share of total sampled CPU time.</text>
  <text x="80" y="412" font-family="Arial, sans-serif" font-size="11" fill="#334155">2. Check if the wide frame is a dispatcher (many children) or real work (high exclusive time).</text>
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="11" fill="#334155">3. Look for alloc()/serialize()/regex() -- common culprits for work amplification and GC pressure.</text>

  <!-- Right bottom annotation -->
  <rect x="640" y="340" width="280" height="100" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1" filter="url(#shadow2)"/>
  <text x="780" y="364" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e" text-anchor="middle">Why serialize() + alloc()?</text>
  <line x1="660" y1="374" x2="900" y2="374" stroke="#fde68a" stroke-width="1"/>
  <text x="780" y="396" font-family="Arial, sans-serif" font-size="11" fill="#78350f" text-anchor="middle">Wide serialize() with wide</text>
  <text x="780" y="412" font-family="Arial, sans-serif" font-size="11" fill="#78350f" text-anchor="middle">alloc() child often means</text>
  <text x="780" y="428" font-family="Arial, sans-serif" font-size="11" fill="#78350f" text-anchor="middle">excessive object creation</text>
  <text x="780" y="444" font-family="Arial, sans-serif" font-size="11" fill="#78350f" text-anchor="middle">during serialization -- a</text>
  <text x="780" y="460" font-family="Arial, sans-serif" font-size="11" fill="#78350f" text-anchor="middle">common regression pattern.</text>

  <!-- Bottom annotation -->
  <text x="480" y="455" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Flame graphs aggregate sampled stacks -- width is a proxy for time share, not absolute duration.</text>
</svg>