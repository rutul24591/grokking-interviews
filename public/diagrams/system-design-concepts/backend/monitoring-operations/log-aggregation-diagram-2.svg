<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" fill="url(#bgGrad)" rx="8"/>

  <!-- Title -->
  <text x="480" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1e293b" text-anchor="middle">Log Aggregation Failure Modes</text>
  <text x="480" y="62" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">How pipelines break during incidents and how to mitigate each mode</text>

  <!-- Failure Mode 1: Log Storms -->
  <rect x="40" y="100" width="430" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="60" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#991b1b">Log Storms</text>
  <text x="60" y="155" font-family="Arial, sans-serif" font-size="12" fill="#7f1d1d">Retry loops and cascading errors amplify log volume 10-100x</text>
  <text x="60" y="175" font-family="Arial, sans-serif" font-size="12" fill="#7f1d1d">during outages, overwhelming ingestion and storage.</text>
  <rect x="60" y="190" width="390" height="38" rx="4" fill="#ffffff" stroke="#f87171" stroke-width="1"/>
  <text x="70" y="207" font-family="Arial, sans-serif" font-size="11" fill="#991b1b" font-weight="bold">Mitigation:</text>
  <text x="140" y="207" font-family="Arial, sans-serif" font-size="11" fill="#991b1d">Per-service rate limits, error-first sampling, budget caps</text>
  <text x="70" y="223" font-family="Arial, sans-serif" font-size="11" fill="#991b1b" font-weight="bold"></text>
  <text x="140" y="223" font-family="Arial, sans-serif" font-size="11" fill="#991b1d">on log volume, automatic incident-mode escalation</text>

  <!-- Failure Mode 2: Ingestion Lag -->
  <rect x="490" y="100" width="430" height="140" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="510" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9a3412">Ingestion Lag</text>
  <text x="510" y="155" font-family="Arial, sans-serif" font-size="12" fill="#7c2d12">Logs arrive minutes behind real-time during high load,</text>
  <text x="510" y="175" font-family="Arial, sans-serif" font-size="12" fill="#7c2d12">breaking incident timelines and delaying root-cause detection.</text>
  <rect x="510" y="190" width="390" height="38" rx="4" fill="#ffffff" stroke="#fb923c" stroke-width="1"/>
  <text x="520" y="207" font-family="Arial, sans-serif" font-size="11" fill="#9a3412" font-weight="bold">Mitigation:</text>
  <text x="598" y="207" font-family="Arial, sans-serif" font-size="11" fill="#7c2d12">Monitor queue depth, scale buffer consumers</text>
  <text x="520" y="223" font-family="Arial, sans-serif" font-size="11" fill="#9a3412" font-weight="bold"></text>
  <text x="598" y="223" font-family="Arial, sans-serif" font-size="11" fill="#7c2d12">dynamically, alert on lag thresholds (&gt;30s)</text>

  <!-- Failure Mode 3: Parsing Failures -->
  <rect x="40" y="260" width="430" height="140" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="60" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#854d0e">Parsing Failures</text>
  <text x="60" y="315" font-family="Arial, sans-serif" font-size="12" fill="#713f12">Schema changes, missing fields, or malformed JSON cause</text>
  <text x="60" y="335" font-family="Arial, sans-serif" font-size="12" fill="#713f12">logs to become unsearchable. Parsing drift during deploys</text>
  <text x="60" y="355" font-family="Arial, sans-serif" font-size="12" fill="#713f12">silently corrupts evidence.</text>
  <rect x="60" y="368" width="390" height="26" rx="4" fill="#ffffff" stroke="#facc15" stroke-width="1"/>
  <text x="70" y="385" font-family="Arial, sans-serif" font-size="11" fill="#854d0e" font-weight="bold">Mitigation:</text>
  <text x="140" y="385" font-family="Arial, sans-serif" font-size="11" fill="#713f12">Schema validation gates, fallback raw log capture</text>

  <!-- Failure Mode 4: Dropped Logs -->
  <rect x="490" y="260" width="430" height="140" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="510" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#991b1b">Dropped Logs During Incidents</text>
  <text x="510" y="315" font-family="Arial, sans-serif" font-size="12" fill="#7f1d1d">When buffers overflow or pipelines collapse, the most</text>
  <text x="510" y="335" font-family="Arial, sans-serif" font-size="12" fill="#7f1d1d">critical evidence is lost. Dropped logs are often invisible</text>
  <text x="510" y="355" font-family="Arial, sans-serif" font-size="12" fill="#7f1d1d">unless explicitly monitored.</text>
  <rect x="510" y="368" width="390" height="26" rx="4" fill="#ffffff" stroke="#f87171" stroke-width="1"/>
  <text x="520" y="385" font-family="Arial, sans-serif" font-size="11" fill="#991b1b" font-weight="bold">Mitigation:</text>
  <text x="598" y="385" font-family="Arial, sans-serif" font-size="11" fill="#7f1d1d">Track drop rate metrics, disk-backed buffers</text>

  <!-- Summary banner -->
  <rect x="40" y="410" width="880" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="480" y="425" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">Monitor all four failure modes continuously. A healthy pipeline shows near-zero drop rate, &lt;5s lag, and &lt;1% parse failures.</text>
</svg>