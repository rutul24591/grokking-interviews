<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ioGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" fill="#ffffff" rx="8"/>

  <!-- Header -->
  <rect x="0" y="0" width="960" height="56" fill="url(#headerGrad)" rx="8"/>
  <text x="480" y="36" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle">Profiling Modalities: What to Measure and Why</text>

  <!-- Center hub -->
  <circle cx="480" cy="230" r="52" fill="#1e293b" filter="url(#shadow)"/>
  <text x="480" y="224" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Production</text>
  <text x="480" y="244" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Profiler</text>

  <!-- CPU Profiling card -->
  <rect x="40" y="90" width="200" height="140" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="90" width="200" height="36" rx="10" fill="url(#cpuGrad)"/>
  <rect x="40" y="110" width="200" height="16" fill="url(#cpuGrad)"/>
  <text x="140" y="114" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">CPU Profiling</text>
  <text x="140" y="152" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Samples stack traces at</text>
  <text x="140" y="168" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">fixed intervals to find</text>
  <text x="140" y="184" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">hot functions and call</text>
  <text x="140" y="200" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">stacks consuming CPU.</text>
  <text x="140" y="222" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2563eb" text-anchor="middle">Targets: latency, throughput</text>

  <!-- Allocation/Memory Profiling card -->
  <rect x="720" y="90" width="200" height="140" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="720" y="90" width="200" height="36" rx="10" fill="url(#memGrad)"/>
  <rect x="720" y="110" width="200" height="16" fill="url(#memGrad)"/>
  <text x="820" y="114" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Allocation / Heap</text>
  <text x="820" y="152" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Tracks object allocation</text>
  <text x="820" y="168" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">rates and heap retention.</text>
  <text x="820" y="184" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Identifies GC pressure</text>
  <text x="820" y="200" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">sources and memory leaks.</text>
  <text x="820" y="222" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#059669" text-anchor="middle">Targets: GC pauses, OOM</text>

  <!-- Lock Contention Profiling card -->
  <rect x="40" y="300" width="200" height="120" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="300" width="200" height="36" rx="10" fill="url(#lockGrad)"/>
  <rect x="40" y="320" width="200" height="16" fill="url(#lockGrad)"/>
  <text x="140" y="324" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Lock Contention</text>
  <text x="140" y="360" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Measures time threads</text>
  <text x="140" y="376" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">spend waiting on mutexes,</text>
  <text x="140" y="392" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">semaphores, and thread pools.</text>
  <text x="140" y="412" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d97706" text-anchor="middle">Targets: p99 spikes, stalls</text>

  <!-- I/O Wait Profiling card -->
  <rect x="720" y="300" width="200" height="120" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="720" y="300" width="200" height="36" rx="10" fill="url(#ioGrad)"/>
  <rect x="720" y="320" width="200" height="16" fill="url(#ioGrad)"/>
  <text x="820" y="324" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">I/O Wait Profiling</text>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Attributes wall-clock time</text>
  <text x="820" y="376" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">spent blocking on disk, net,</text>
  <text x="820" y="392" font-family="Arial, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">or kernel scheduling waits.</text>
  <text x="820" y="412" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7c3aed" text-anchor="middle">Targets: disk, network waits</text>

  <!-- Connecting lines from center to cards -->
  <line x1="428" y1="210" x2="248" y2="160" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="532" y1="210" x2="712" y2="160" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="428" y1="260" x2="248" y2="350" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="532" y1="260" x2="712" y2="350" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Decision labels on lines -->
  <rect x="290" y="168" width="80" height="22" rx="11" fill="#dbeafe"/>
  <text x="330" y="183" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1d4ed8" text-anchor="middle">High CPU?</text>

  <rect x="590" y="168" width="90" height="22" rx="11" fill="#d1fae5"/>
  <text x="635" y="183" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#047857" text-anchor="middle">GC / OOM?</text>

  <rect x="290" y="340" width="80" height="22" rx="11" fill="#fef3c7"/>
  <text x="330" y="355" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#b45309" text-anchor="middle">Lock wait?</text>

  <rect x="590" y="340" width="80" height="22" rx="11" fill="#ede9fe"/>
  <text x="630" y="355" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6d28d9" text-anchor="middle">Disk/Net?</text>

  <!-- Bottom annotation -->
  <text x="480" y="432" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Select the profiling modality that matches the observed saturation signal -- CPU, memory, contention, or I/O wait.</text>

</svg>
