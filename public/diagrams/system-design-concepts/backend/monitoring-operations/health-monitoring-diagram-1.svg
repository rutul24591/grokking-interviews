<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <!-- Background -->
  <rect width="960" height="460" fill="#f8fafc" />
  <text x="480" y="40" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#0f172a">Health Check Types and Their Purposes</text>

  <!-- Card 1: Liveness -->
  <rect x="40" y="70" width="210" height="340" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <rect x="40" y="70" width="210" height="52" rx="10" fill="#22c55e" />
  <text x="145" y="103" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Liveness</text>
  <text x="145" y="155" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">Question</text>
  <text x="145" y="175" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Is the process stuck</text>
  <text x="145" y="193" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">or unrecoverable?</text>
  <text x="145" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">Used To</text>
  <text x="145" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Decide when to</text>
  <text x="145" y="268" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">restart the instance</text>
  <circle cx="145" cy="320" r="22" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
  <text x="145" y="326" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#15803d">RESTART</text>

  <!-- Card 2: Readiness -->
  <rect x="275" y="70" width="210" height="340" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <rect x="275" y="70" width="210" height="52" rx="10" fill="#3b82f6" />
  <text x="380" y="103" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Readiness</text>
  <text x="380" y="155" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">Question</text>
  <text x="380" y="175" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Can this instance</text>
  <text x="380" y="193" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">serve traffic now?</text>
  <text x="380" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">Used To</text>
  <text x="380" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Route traffic in/out</text>
  <text x="380" y="268" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">of load balancer pool</text>
  <circle cx="380" cy="320" r="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" />
  <text x="380" y="326" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1d4ed8">ROUTE</text>

  <!-- Card 3: Startup -->
  <rect x="510" y="70" width="210" height="340" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <rect x="510" y="70" width="210" height="52" rx="10" fill="#f59e0b" />
  <text x="615" y="103" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Startup</text>
  <text x="615" y="155" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">Question</text>
  <text x="615" y="175" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Is initialization or</text>
  <text x="615" y="193" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">warm-up still ongoing?</text>
  <text x="615" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">Used To</text>
  <text x="615" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Delay liveness checks</text>
  <text x="615" y="268" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">during cold start</text>
  <circle cx="615" cy="320" r="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <text x="615" y="326" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#b45309">WAIT</text>

  <!-- Card 4: Synthetic -->
  <rect x="745" y="70" width="175" height="340" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
  <rect x="745" y="70" width="175" height="52" rx="10" fill="#8b5cf6" />
  <text x="832" y="103" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Synthetic</text>
  <text x="832" y="155" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">Question</text>
  <text x="832" y="175" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Can a real user</text>
  <text x="832" y="193" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">journey succeed E2E?</text>
  <text x="832" y="230" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#334155">Used To</text>
  <text x="832" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Detect user-impacting</text>
  <text x="832" y="268" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">failures from outside</text>
  <circle cx="832" cy="320" r="22" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" />
  <text x="832" y="326" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#6d28d9">PROBE</text>

  <!-- Bottom annotation -->
  <line x1="145" y1="430" x2="832" y2="430" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" />
  <text x="490" y="452" text-anchor="middle" font-family="Arial" font-size="12" fill="#475569">Separate checks by intent — never overload a single endpoint with all health meanings</text>
</svg>
