<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- Light mode background -->
  <rect class="bg" width="960" height="460" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#0f172a" class="title-text">APM Architecture: Instrument, Collect, Correlate</text>

  <!-- LAYER 1: Instrumentation -->
  <rect x="30" y="60" width="270" height="340" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="8" class="layer-bg"/>

  <text x="165" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="15" fill="#1e293b" class="layer-title-text">1. Instrumentation</text>

  <!-- Service boxes -->
  <rect x="55" y="115" width="90" height="48" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="6"/>
  <text x="100" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#1e40af">API Service</text>
  <text x="100" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">spans + attrs</text>

  <rect x="185" y="115" width="90" height="48" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="6"/>
  <text x="230" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#1e40af">Worker</text>
  <text x="230" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">async spans</text>

  <rect x="55" y="185" width="90" height="48" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="6"/>
  <text x="100" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#1e40af">DB Layer</text>
  <text x="100" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">query spans</text>

  <rect x="185" y="185" width="90" height="48" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="6"/>
  <text x="230" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#1e40af">Cache</text>
  <text x="230" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">hit/miss spans</text>

  <rect x="55" y="255" width="220" height="48" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="6"/>
  <text x="165" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#1e40af">Trace Context Propagation</text>
  <text x="165" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">trace_id, span_id across boundaries</text>

  <rect x="55" y="320" width="220" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="6"/>
  <text x="165" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#92400e">OpenTelemetry SDK / Agent</text>
  <text x="165" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">auto + manual instrumentation</text>

  <!-- LAYER 2: Collector Pipeline -->
  <rect x="340" y="60" width="280" height="340" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="8" class="layer-bg"/>

  <text x="480" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="15" fill="#1e293b" class="layer-title-text">2. Collector Pipeline</text>

  <rect x="365" y="115" width="230" height="42" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" rx="6"/>
  <text x="480" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#166534">Receive &#38; Buffer</text>
  <text x="480" y="151" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">batch, compress, backpressure</text>

  <rect x="365" y="175" width="230" height="42" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" rx="6"/>
  <text x="480" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#166534">Enrich &#38; Normalize</text>
  <text x="480" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">add region, version, tenant tier</text>

  <rect x="365" y="235" width="230" height="42" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" rx="6"/>
  <text x="480" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#166534">Sampling Decision</text>
  <text x="480" y="271" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">head / tail / adaptive</text>

  <rect x="365" y="295" width="230" height="42" fill="#f0fdf4" stroke="#22c55e" stroke-width="1" rx="6"/>
  <text x="480" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="11" fill="#166534">PII Redaction</text>
  <text x="480" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">drop sensitive attributes</text>

  <!-- Arrows between layer 1 and 2 -->
  <line x1="300" y1="170" x2="340" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)" class="arrow-light"/>
  <text x="320" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b" class="arrow-label-light">telemetry</text>

  <!-- LAYER 3: Storage and Correlation -->
  <rect x="660" y="60" width="270" height="340" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="8" class="layer-bg"/>

  <text x="795" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="15" fill="#1e293b" class="layer-title-text">3. Storage &#38; Correlation</text>

  <!-- Trace store -->
  <rect x="685" y="115" width="220" height="52" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1" rx="6"/>
  <text x="795" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#5b21b6">Trace Store</text>
  <text x="795" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">distributed traces, span trees</text>

  <!-- Metrics store -->
  <rect x="685" y="185" width="220" height="52" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1" rx="6"/>
  <text x="795" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#5b21b6">Metrics Store</text>
  <text x="795" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">RED/USE aggregations, SLOs</text>

  <!-- Log store -->
  <rect x="685" y="255" width="220" height="52" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1" rx="6"/>
  <text x="795" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#5b21b6">Log Store</text>
  <text x="795" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">structured logs, trace_id linking</text>

  <!-- Correlation engine -->
  <rect x="685" y="325" width="220" height="48" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" rx="6"/>
  <text x="795" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#9a3412">Correlation Engine</text>
  <text x="795" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">trace_id links traces &#8596; logs &#8596; metrics</text>

  <!-- Arrows between layer 2 and 3 -->
  <line x1="620" y1="200" x2="660" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)" class="arrow-light"/>
  <text x="640" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b" class="arrow-label-light">enriched</text>
</svg>
