<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <defs>
    <linearGradient id="slo-zone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="buffer-zone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="sla-zone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="420" rx="8" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="36" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">SLO-SLA Buffer: Operational Risk Reduction</text>

  <!-- Reliability scale -->
  <text x="60" y="76" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b">Lower Reliability</text>
  <text x="900" y="76" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#64748b" text-anchor="end">Higher Reliability</text>

  <!-- Arrow across -->
  <line x1="140" y1="72" x2="830" y2="72" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="830,68 840,72 830,76" fill="#94a3b8"/>
  <polygon points="140,68 130,72 140,76" fill="#94a3b8"/>

  <!-- Main bar - percentage scale -->
  <!-- Background bar (full range) -->
  <rect x="100" y="110" width="760" height="50" rx="6" fill="#e2e8f0"/>

  <!-- SLA zone (99.0% to 100%) - the loosest boundary -->
  <rect x="100" y="110" width="760" height="50" rx="6" fill="url(#sla-zone)" stroke="#ef4444" stroke-width="2"/>

  <!-- Buffer zone (between SLO and SLA) -->
  <rect x="250" y="110" width="230" height="50" fill="url(#buffer-zone)" stroke-dasharray="6,4"/>

  <!-- SLO zone (99.9% to 100%) - tighter internal target -->
  <rect x="400" y="110" width="460" height="50" rx="6" fill="url(#slo-zone)" stroke="#22c55e" stroke-width="2"/>

  <!-- Labels on the bar -->
  <text x="170" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#b91c1c" text-anchor="middle">BREACH ZONE</text>
  <text x="170" y="155" font-family="Arial, sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">(SLA violated)</text>

  <text x="365" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#b45309" text-anchor="middle">BUFFER</text>
  <text x="365" y="150" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">(operational room)</text>

  <text x="630" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d" text-anchor="middle">INTERNAL SLO ZONE</text>
  <text x="630" y="150" font-family="Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">(engineering target)</text>

  <!-- Percentage markers -->
  <line x1="100" y1="160" x2="100" y2="175" stroke="#64748b" stroke-width="1.5"/>
  <text x="100" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">99.0%</text>
  <text x="100" y="206" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SLA</text>

  <line x1="400" y1="160" x2="400" y2="175" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d" text-anchor="middle">99.9%</text>
  <text x="400" y="206" font-family="Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">SLO</text>

  <line x1="860" y1="160" x2="860" y2="175" stroke="#22c55e" stroke-width="1.5"/>
  <text x="860" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">100%</text>

  <!-- Downtime equivalents -->
  <rect x="80" y="230" width="230" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="195" y="255" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">SLA: 99.0%</text>
  <text x="195" y="273" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">~43.2 min downtime</text>
  <text x="195" y="289" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">per month allowed</text>

  <rect x="365" y="230" width="230" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="480" y="255" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">SLO: 99.9%</text>
  <text x="480" y="273" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">~43.2 min downtime</text>
  <text x="480" y="289" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">per month (internal)</text>

  <rect x="650" y="230" width="230" height="70" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="765" y="255" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a" text-anchor="middle">Buffer: 0.9%</text>
  <text x="765" y="273" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">~38.9 min extra</text>
  <text x="765" y="289" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">before SLA breach</text>

  <!-- Key benefits -->
  <text x="480" y="336" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a" text-anchor="middle">Why the Buffer Matters</text>

  <rect x="60" y="350" width="240" height="55" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="180" y="372" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#15803d" text-anchor="middle">1. Incident Recovery</text>
  <text x="180" y="390" font-family="Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">Team can fix issues before</text>
  <text x="180" y="404" font-family="Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">contractual consequences</text>

  <rect x="360" y="350" width="240" height="55" rx="8" fill="#fffbeb" stroke="#fde68a"/>
  <text x="480" y="372" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#b45309" text-anchor="middle">2. Measurement Gaps</text>
  <text x="480" y="390" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">Telemetry noise or blind</text>
  <text x="480" y="404" font-family="Arial, sans-serif" font-size="10" fill="#92400e" text-anchor="middle">spots absorbed by buffer</text>

  <rect x="660" y="350" width="240" height="55" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="780" y="372" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1d4ed8" text-anchor="middle">3. Deployment Risk</text>
  <text x="780" y="390" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">Risky releases tested</text>
  <text x="780" y="404" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">without threatening SLA</text>
</svg>