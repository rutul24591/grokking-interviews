<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Light mode background -->
  <rect class="bg" width="960" height="440" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#0f172a" class="title-text">Incident Workflow: SLO Burn &#8594; Traces &#8594; Logs &#8594; Metrics Verification</text>

  <!-- STEP 1: SLO Burn Alert -->
  <rect x="40" y="70" width="200" height="110" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="8"/>
  <text x="140" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#991b1b">Step 1: SLO Burn</text>
  <text x="140" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Error budget exhaustion</text>
  <text x="140" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">p99 latency spike</text>
  <text x="140" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Availability drop detected</text>
  <text x="140" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#991b1b">DETECT IMPACT</text>

  <!-- Arrow Step 1 to 2 -->
  <line x1="240" y1="125" x2="290" y2="125" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="265" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#dc2626">pivot</text>

  <!-- STEP 2: Trace Analysis -->
  <rect x="290" y="70" width="200" height="110" fill="#eff6ff" stroke="#2563eb" stroke-width="2" rx="8"/>
  <text x="390" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#1e40af">Step 2: Trace Analysis</text>
  <text x="390" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Filter by affected routes</text>
  <text x="390" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Find slowest traces (tail)</text>
  <text x="390" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Identify dominant span hop</text>
  <text x="390" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#1e40af">ISOLATE CAUSE</text>

  <!-- Arrow Step 2 to 3 -->
  <line x1="490" y1="125" x2="540" y2="125" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="515" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#dc2626">correlate</text>

  <!-- STEP 3: Log Correlation -->
  <rect x="540" y="70" width="200" height="110" fill="#fefce8" stroke="#ca8a04" stroke-width="2" rx="8"/>
  <text x="640" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#854d0e">Step 3: Log Correlation</text>
  <text x="640" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Query by trace_id</text>
  <text x="640" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Find error fingerprints</text>
  <text x="640" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Retry storms, timeouts</text>
  <text x="640" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#854d0e">CONFIRM ROOT</text>

  <!-- Arrow Step 3 to 4 -->
  <line x1="740" y1="125" x2="790" y2="125" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="765" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#dc2626">verify</text>

  <!-- STEP 4: Metrics Verification -->
  <rect x="790" y="70" width="140" height="110" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" rx="8"/>
  <text x="860" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#166534">Step 4:</text>
  <text x="860" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#166534">Metrics Verify</text>
  <text x="860" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">CPU, memory, threads</text>
  <text x="860" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Saturation levels</text>
  <text x="860" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#166534">VALIDATE</text>

  <!-- Mitigation block below -->
  <rect x="200" y="230" width="560" height="80" fill="#ffffff" stroke="#64748b" stroke-width="1.5" rx="8"/>
  <text x="480" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#1e293b">Mitigation Actions</text>
  <text x="340" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Rollback bad deploy</text>
  <text x="480" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Scale up saturated tier</text>
  <text x="620" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Circuit-break dependency</text>
  <text x="760" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Kill query pattern</text>

  <!-- Arrows from Step 2/3 down to Mitigation -->
  <line x1="390" y1="180" x2="390" y2="230" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="640" y1="180" x2="640" y2="230" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- Recovery verification loop -->
  <rect x="200" y="350" width="560" height="70" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" rx="8"/>
  <text x="480" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#166534">Recovery Verification Loop</text>
  <text x="300" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">Confirm SLO error budget stable</text>
  <text x="480" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">p99 latency normalized</text>
  <text x="660" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">No new error clusters</text>

  <!-- Arrow from Mitigation to Recovery -->
  <line x1="480" y1="310" x2="480" y2="350" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="500" y="336" text-anchor="start" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#16a34a">after fix</text>

  <!-- Loop back arrow from Recovery to Step 1 -->
  <path d="M 200 385 Q 120 385 120 280 Q 120 180 120 130" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5,4"/>
  <text x="100" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b" transform="rotate(-90, 100, 260)">continuous</text>
</svg>
