<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#0f172a">Trace Flow Across Services with Context Propagation</text>

  <!-- Context propagation banner -->
  <rect x="40" y="52" width="880" height="30" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="480" y="72" text-anchor="middle" font-family="Arial" font-size="12" fill="#1e40af">trace_id=a1b2c3d4 | span_id=root | sampled=true &amp;#x2192; propagated via W3C Trace Context headers</text>

  <!-- API Gateway -->
  <rect x="40" y="106" width="180" height="80" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="130" y="136" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#0c4a6e">API Gateway</text>
  <text x="130" y="156" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">span: gateway-route</text>
  <text x="130" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">12ms | status: ok</text>

  <!-- Auth Service -->
  <rect x="270" y="106" width="180" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="360" y="136" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#052e16">Auth Service</text>
  <text x="360" y="156" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">span: validate-token</text>
  <text x="360" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">8ms | status: ok</text>

  <!-- Order Service -->
  <rect x="500" y="106" width="180" height="80" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="590" y="136" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#422006">Order Service</text>
  <text x="590" y="156" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">span: create-order</text>
  <text x="590" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">45ms | status: ok</text>

  <!-- Database -->
  <rect x="730" y="106" width="190" height="80" rx="8" fill="#fdf2f8" stroke="#ec4899" stroke-width="2"/>
  <text x="825" y="136" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#500724">PostgreSQL</text>
  <text x="825" y="156" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">span: insert-order</text>
  <text x="825" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">28ms | rows: 1</text>

  <!-- Flow arrows between services -->
  <line x1="220" y1="146" x2="265" y2="146" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="450" y1="146" x2="495" y2="146" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="680" y1="146" x2="725" y2="146" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Cache call from Order Service (down arrow) -->
  <line x1="590" y1="186" x2="590" y2="248" stroke="#475569" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ah)"/>
  <text x="605" y="222" font-family="Arial" font-size="10" fill="#64748b">async call</text>

  <!-- Cache -->
  <rect x="480" y="248" width="220" height="68" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="590" y="276" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#3b0764">Redis Cache</text>
  <text x="590" y="296" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">span: cache-lookup | 3ms | hit</text>

  <!-- Span Timeline (Waterfall View) -->
  <text x="40" y="350" font-family="Arial" font-size="15" font-weight="bold" fill="#0f172a">Span Timeline (Waterfall)</text>

  <!-- Gateway span -->
  <rect x="40" y="365" width="14" height="16" rx="3" fill="#0ea5e9"/>
  <text x="62" y="378" font-family="Arial" font-size="11" fill="#475569">gateway-route</text>
  <text x="170" y="378" font-family="Arial" font-size="11" fill="#64748b">12ms</text>

  <!-- Auth span -->
  <rect x="40" y="387" width="10" height="16" rx="3" fill="#22c55e"/>
  <text x="58" y="400" font-family="Arial" font-size="11" fill="#475569">validate-token</text>
  <text x="170" y="400" font-family="Arial" font-size="11" fill="#64748b">8ms</text>

  <!-- Order span -->
  <rect x="40" y="409" width="52" height="16" rx="3" fill="#eab308"/>
  <text x="100" y="422" font-family="Arial" font-size="11" fill="#475569">create-order</text>
  <text x="200" y="422" font-family="Arial" font-size="11" fill="#64748b">45ms</text>

  <!-- DB span (nested) -->
  <rect x="92" y="409" width="32" height="16" rx="3" fill="#ec4899" opacity="0.8"/>
  <text x="240" y="422" font-family="Arial" font-size="11" fill="#64748b">insert-order (28ms), cache-lookup (3ms)</text>

  <!-- Legend -->
  <rect x="680" y="365" width="12" height="12" rx="2" fill="#0ea5e9"/>
  <text x="700" y="376" font-family="Arial" font-size="11" fill="#475569">HTTP span</text>
  <rect x="680" y="387" width="12" height="12" rx="2" fill="#ec4899" opacity="0.8"/>
  <text x="700" y="398" font-family="Arial" font-size="11" fill="#475569">Child span (nested)</text>
  <line x1="680" y1="413" x2="692" y2="413" stroke="#475569" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="700" y="417" font-family="Arial" font-size="11" fill="#475569">Async call</text>
</svg>
