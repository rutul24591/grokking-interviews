<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f6f8"/>
    </linearGradient>
    <style>
      .title { font: bold 20px Arial, sans-serif; fill: #1a1a2e; }
      .section-title { font: bold 14px Arial, sans-serif; fill: #1a1a2e; }
      .step-num { font: bold 28px Arial, sans-serif; fill: #ffffff; }
      .step-label { font: bold 15px Arial, sans-serif; fill: #1a1a2e; }
      .step-desc { font: 12px Arial, sans-serif; fill: #555555; }
      .col-title { font: bold 12px Arial, sans-serif; }
      .sublabel { font: 11px Arial, sans-serif; fill: #95a5a6; }
      .arrow-flow { fill: none; stroke: #2c3e50; stroke-width: 2.5; marker-end: url(#arrow-dark); }
    </style>
    <marker id="arrow-dark" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="440" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" class="title" text-anchor="middle">Incident Response Workflow: Infrastructure Failure</text>

  <!-- Step 1: Confirm Impact -->
  <rect x="30" y="64" width="200" height="120" fill="#eaf2fb" rx="12" stroke="#2980b9" stroke-width="2"/>
  <circle cx="130" cy="96" r="22" fill="#2980b9"/>
  <text x="130" y="104" class="step-num" text-anchor="middle">1</text>
  <text x="130" y="136" class="step-label" text-anchor="middle">Confirm Impact</text>
  <text x="130" y="156" class="step-desc" text-anchor="middle">Correlate platform</text>
  <text x="130" y="172" class="step-desc" text-anchor="middle">saturation with</text>
  <text x="130" y="188" class="step-desc" text-anchor="middle">service latency/errors</text>

  <!-- Arrow 1->2 -->
  <line x1="230" y1="124" x2="290" y2="124" class="arrow-flow"/>

  <!-- Step 2: Isolate Layer -->
  <rect x="290" y="64" width="200" height="120" fill="#fef9e7" rx="12" stroke="#f39c12" stroke-width="2"/>
  <circle cx="390" cy="96" r="22" fill="#f39c12"/>
  <text x="390" y="104" class="step-num" text-anchor="middle">2</text>
  <text x="390" y="136" class="step-label" text-anchor="middle">Isolate Layer</text>
  <text x="390" y="156" class="step-desc" text-anchor="middle">Segment by zone,</text>
  <text x="390" y="172" class="step-desc" text-anchor="middle">node pool, workload</text>
  <text x="390" y="188" class="step-desc" text-anchor="middle">to pinpoint source</text>

  <!-- Arrow 2->3 -->
  <line x1="490" y1="124" x2="550" y2="124" class="arrow-flow"/>

  <!-- Step 3: Mitigate Safely -->
  <rect x="550" y="64" width="200" height="120" fill="#fdedec" rx="12" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="650" cy="96" r="22" fill="#e74c3c"/>
  <text x="650" y="104" class="step-num" text-anchor="middle">3</text>
  <text x="650" y="136" class="step-label" text-anchor="middle">Mitigate Safely</text>
  <text x="650" y="156" class="step-desc" text-anchor="middle">Cordon/drain nodes,</text>
  <text x="650" y="172" class="step-desc" text-anchor="middle">shift traffic, scale</text>
  <text x="650" y="188" class="step-desc" text-anchor="middle">capacity, reduce demand</text>

  <!-- Arrow 3->4 -->
  <line x1="750" y1="124" x2="810" y2="124" class="arrow-flow"/>

  <!-- Step 4: Verify Recovery -->
  <rect x="810" y="64" width="130" height="120" fill="#e8f8f5" rx="12" stroke="#27ae60" stroke-width="2"/>
  <circle cx="875" cy="96" r="22" fill="#27ae60"/>
  <text x="875" y="104" class="step-num" text-anchor="middle">4</text>
  <text x="875" y="136" class="step-label" text-anchor="middle">Verify</text>
  <text x="875" y="156" class="step-desc" text-anchor="middle">Tail latency</text>
  <text x="875" y="172" class="step-desc" text-anchor="middle">and saturation</text>
  <text x="875" y="188" class="step-desc" text-anchor="middle">recover fully</text>

  <!-- Feedback loop arrow: Verify back to Confirm -->
  <path d="M 875 184 L 875 260 L 130 260 L 130 184" fill="none" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-dark)"/>
  <text x="500" y="276" class="sublabel" text-anchor="middle" font-style="italic">If recovery incomplete, re-evaluate and iterate</text>

  <!-- Bottom: Key Actions per Phase -->
  <rect x="30" y="300" width="900" height="130" fill="#f8f9fa" rx="12" stroke="#bdc3c7" stroke-width="1"/>
  <text x="480" y="328" class="section-title" text-anchor="middle">Key Actions and Decision Points</text>

  <!-- Column 1: Confirm -->
  <text x="130" y="356" class="col-title" text-anchor="middle">Confirm Impact</text>
  <text x="130" y="376" class="step-desc" text-anchor="middle">Check P95 latency, error rate</text>
  <text x="130" y="394" class="step-desc" text-anchor="middle">Compare to SLO thresholds</text>
  <text x="130" y="412" class="step-desc" text-anchor="middle">Assess blast radius scope</text>

  <!-- Column 2: Isolate -->
  <text x="370" y="356" class="col-title" text-anchor="middle">Isolate Layer</text>
  <text x="370" y="376" class="step-desc" text-anchor="middle">Per-node and per-zone metrics</text>
  <text x="370" y="394" class="step-desc" text-anchor="middle">Workload attribution analysis</text>
  <text x="370" y="412" class="step-desc" text-anchor="middle">Identify noisy neighbor patterns</text>

  <!-- Column 3: Mitigate -->
  <text x="610" y="356" class="col-title" text-anchor="middle">Mitigate Safely</text>
  <text x="610" y="376" class="step-desc" text-anchor="middle">Drain unhealthy nodes first</text>
  <text x="610" y="394" class="step-desc" text-anchor="middle">Scale cluster capacity</text>
  <text x="610" y="412" class="step-desc" text-anchor="middle">Avoid mass restarts (amplifies)</text>

  <!-- Column 4: Verify -->
  <text x="850" y="356" class="col-title" text-anchor="middle">Verify Recovery</text>
  <text x="850" y="376" class="step-desc" text-anchor="middle">Monitor warm-up latency</text>
  <text x="850" y="394" class="step-desc" text-anchor="middle">Confirm scheduling stabilizes</text>
  <text x="850" y="412" class="step-desc" text-anchor="middle">Document for post-mortem</text>
</svg>