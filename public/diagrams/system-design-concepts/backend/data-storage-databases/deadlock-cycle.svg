<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Deadlock Cycle</text>

  <circle cx="260" cy="220" r="60" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="240" y="225" font-family="Arial, sans-serif" font-size="14" fill="#0f172a">Tx A</text>

  <circle cx="700" cy="220" r="60" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
