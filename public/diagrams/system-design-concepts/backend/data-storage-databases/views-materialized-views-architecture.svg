<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Views and Materialized Views Architecture</title>
  <desc id="desc">Views (virtual tables) vs materialized views (stored results) with refresh strategies</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Views &amp; Materialized Views</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Virtual Tables vs Stored Results</text>
  
  <!-- Standard View (Top Left) -->
  <rect x="50" y="85" width="400" height="200" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Standard View (Virtual Table)</text>
  
  <rect x="70" y="125" width="360" height="150" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <!-- Query flow -->
  <rect x="85" y="140" width="100" height="40" rx="3" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="135" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Query View</text>
  <text x="135" y="175" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">SELECT * FROM active_users</text>
  
  <line x1="190" y1="160" x2="220" y2="160" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="205" y="150" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Expands to:</text>
  
  <rect x="230" y="140" width="180" height="40" rx="3" fill="#fbbf24" stroke="#b45309" stroke-width="1"/>
  <text x="320" y="160" text-anchor="middle" font-size="7" font-weight="700" fill="#78350f">Underlying Query</text>
  <text x="320" y="175" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">SELECT * FROM users WHERE status='active'</text>
  
  <line x1="320" y1="185" x2="320" y2="215" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Base tables -->
  <rect x="230" y="220" width="180" height="40" rx="3" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="320" y="240" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Base Tables</text>
  <text x="320" y="255" text-anchor="middle" font-size="7" font-weight="600" fill="#6ee7b7">users table scanned</text>
  
  <text x="250" y="280" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">✓ Always current (runs query each time)</text>
  <text x="250" y="295" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Slow for complex queries</text>
  
  <!-- Materialized View (Top Right) -->
  <rect x="465" y="85" width="385" height="200" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Materialized View (Stored Results)</text>
  
  <rect x="485" y="125" width="345" height="150" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <!-- Query flow -->
  <rect x="500" y="140" width="100" height="40" rx="3" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="550" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Query MV</text>
  <text x="550" y="175" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">SELECT * FROM daily_sales_mv</text>
  
  <line x1="605" y1="160" x2="635" y2="160" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="620" y="150" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Reads from:</text>
  
  <rect x="645" y="140" width="170" height="40" rx="3" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="730" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Stored Results</text>
  <text x="730" y="175" text-anchor="middle" font-size="7" font-weight="600" fill="#6ee7b7">Pre-computed data</text>
  
  <line x1="730" y1="185" x2="730" y2="215" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="750" y="200" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Fast read!</text>
  
  <!-- Refresh -->
  <rect x="645" y="220" width="170" height="40" rx="3" fill="#fbbf24" stroke="#b45309" stroke-width="1"/>
  <text x="730" y="240" text-anchor="middle" font-size="8" font-weight="700" fill="#78350f">Periodic Refresh</text>
  <text x="730" y="255" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">REFRESH MATERIALIZED VIEW</text>
  
  <text x="657" y="280" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">✓ Fast reads (pre-computed)</text>
  <text x="657" y="295" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Stale between refreshes</text>
  
  <!-- Refresh Strategies (Bottom) -->
  <rect x="50" y="295" width="800" height="240" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Refresh Strategies</text>
  
  <!-- ON COMMIT -->
  <rect x="70" y="335" width="240" height="190" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="190" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">ON COMMIT Refresh</text>
  
  <rect x="85" y="375" width="210" height="60" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="190" y="395" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Refreshes on every base table change</text>
  <text x="190" y="410" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Strong consistency</text>
  <text x="190" y="425" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Impacts write performance</text>
  
  <text x="190" y="455" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Always current</text>
  <text x="190" y="470" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Slow writes</text>
  <text x="190" y="490" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: Low write volume, need freshness</text>
  
  <!-- Scheduled -->
  <rect x="325" y="335" width="240" height="190" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="445" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Scheduled Refresh</text>
  
  <rect x="340" y="375" width="210" height="60" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="445" y="395" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Refreshes at intervals (hourly, daily)</text>
  <text x="445" y="410" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Bounded staleness</text>
  <text x="445" y="425" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Predictable load</text>
  
  <text x="445" y="455" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Balanced performance</text>
  <text x="445" y="470" text-anchor="middle" font-size="8" font-weight="700" fill="#f59e0b">⚠ Data may be stale</text>
  <text x="445" y="490" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: Dashboards, reports</text>
  
  <!-- Manual -->
  <rect x="580" y="335" width="240" height="190" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="700" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Manual Refresh</text>
  
  <rect x="595" y="375" width="210" height="60" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="700" y="395" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Refresh on demand</text>
  <text x="700" y="410" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Full control</text>
  <text x="700" y="425" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Application triggers refresh</text>
  
  <text x="700" y="455" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Full control</text>
  <text x="700" y="470" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Must manage manually</text>
  <text x="700" y="490" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: Ad-hoc analysis</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>