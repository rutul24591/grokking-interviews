<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">NoSQL Database Selection Framework</title>
  <desc id="desc">Decision framework for choosing the right NoSQL database</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">NoSQL Database Selection Framework</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Choosing the Right NoSQL Database</text>
  
  <!-- Decision Tree (Top) -->
  <rect x="50" y="85" width="800" height="120" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Decision Tree</text>
  
  <!-- Q1 -->
  <rect x="70" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Need Relationships?</text>
  <line x1="160" y1="165" x2="160" y2="185" stroke="#374151" stroke-width="2"/>
  <text x="80" y="200" text-anchor="start" font-size="8" font-weight="700" fill="#059669">YES → Graph DB</text>
  <text x="80" y="215" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(Neo4j, Neptune)</text>
  <text x="220" y="200" text-anchor="start" font-size="8" font-weight="700" fill="#b91c1c">NO → Next Q</text>
  
  <!-- Q2 -->
  <rect x="265" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="355" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Key-Value Lookup Only?</text>
  <line x1="355" y1="165" x2="355" y2="185" stroke="#374151" stroke-width="2"/>
  <text x="275" y="200" text-anchor="start" font-size="8" font-weight="700" fill="#059669">YES → Key-Value</text>
  <text x="275" y="215" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(Redis, DynamoDB)</text>
  <text x="415" y="200" text-anchor="start" font-size="8" font-weight="700" fill="#b91c1c">NO → Next Q</text>
  
  <!-- Q3 -->
  <rect x="460" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="550" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Time-Series Data?</text>
  <line x1="550" y1="165" x2="550" y2="185" stroke="#374151" stroke-width="2"/>
  <text x="470" y="200" text-anchor="start" font-size="8" font-weight="700" fill="#059669">YES → Time-Series DB</text>
  <text x="470" y="215" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(InfluxDB, Timescale)</text>
  <text x="610" y="200" text-anchor="start" font-size="8" font-weight="700" fill="#b91c1c">NO → Next Q</text>
  
  <!-- Q4 -->
  <rect x="655" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="745" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Document or Column?</text>
  <line x1="745" y1="165" x2="745" y2="185" stroke="#374151" stroke-width="2"/>
  <text x="665" y="200" text-anchor="start" font-size="8" font-weight="700" fill="#059669">Document → Doc DB</text>
  <text x="665" y="215" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(MongoDB, CouchDB)</text>
  <text x="805" y="200" text-anchor="start" font-size="8" font-weight="700" fill="#059669">Column → Column-Family</text>
  
  <!-- Database Comparison (Bottom) -->
  <rect x="50" y="215" width="800" height="320" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">NoSQL Database Comparison</text>
  
  <!-- Header -->
  <rect x="70" y="255" width="140" height="25" rx="3" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="140" y="272" text-anchor="middle" font-size="8" font-weight="700" fill="#0369a1">Database Type</text>
  <rect x="220" y="255" width="140" height="25" rx="3" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="290" y="272" text-anchor="middle" font-size="8" font-weight="700" fill="#0369a1">Best For</text>
  <rect x="370" y="255" width="140" height="25" rx="3" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="440" y="272" text-anchor="middle" font-size="8" font-weight="700" fill="#0369a1">Examples</text>
  <rect x="520" y="255" width="140" height="25" rx="3" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="590" y="272" text-anchor="middle" font-size="8" font-weight="700" fill="#0369a1">Strengths</text>
  <rect x="670" y="255" width="160" height="25" rx="3" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="750" y="272" text-anchor="middle" font-size="8" font-weight="700" fill="#0369a1">Limitations</text>
  
  <!-- Row 1: Document -->
  <rect x="70" y="283" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="140" y="308" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Document DB</text>
  <rect x="220" y="283" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="290" y="308" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Hierarchical data</text>
  <rect x="370" y="283" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="440" y="308" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">MongoDB, CouchDB</text>
  <rect x="520" y="283" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="590" y="308" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Flexible schema</text>
  <rect x="670" y="283" width="160" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="750" y="308" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">No complex joins</text>
  
  <!-- Row 2: Key-Value -->
  <rect x="70" y="331" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="140" y="356" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Key-Value Store</text>
  <rect x="220" y="331" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="290" y="356" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Simple lookups</text>
  <rect x="370" y="331" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="440" y="356" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Redis, DynamoDB</text>
  <rect x="520" y="331" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="590" y="356" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">High performance</text>
  <rect x="670" y="331" width="160" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="750" y="356" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">No query flexibility</text>
  
  <!-- Row 3: Column-Family -->
  <rect x="70" y="379" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="140" y="404" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Column-Family</text>
  <rect x="220" y="379" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="290" y="404" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Write-heavy, wide rows</text>
  <rect x="370" y="379" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="440" y="404" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Cassandra, HBase</text>
  <rect x="520" y="379" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="590" y="404" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Massive scale</text>
  <rect x="670" y="379" width="160" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="750" y="404" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Complex queries hard</text>
  
  <!-- Row 4: Graph -->
  <rect x="70" y="427" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="140" y="452" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Graph Database</text>
  <rect x="220" y="427" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="290" y="452" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Relationships</text>
  <rect x="370" y="427" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="440" y="452" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Neo4j, Neptune</text>
  <rect x="520" y="427" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="590" y="452" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Deep traversals</text>
  <rect x="670" y="427" width="160" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="750" y="452" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Not for aggregates</text>
  
  <!-- Row 5: Time-Series -->
  <rect x="70" y="475" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="140" y="500" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Time-Series DB</text>
  <rect x="220" y="475" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="290" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Metrics, events</text>
  <rect x="370" y="475" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="440" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">InfluxDB, Timescale</text>
  <rect x="520" y="475" width="140" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="590" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Time optimization</text>
  <rect x="670" y="475" width="160" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="750" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Time-focused only</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>