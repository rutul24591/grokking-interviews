<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Search Engines Indexing</title>
  <desc id="desc">Tokenization, analysis, and TF-IDF/BM25 ranking</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Search Engine Indexing &amp; Ranking</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Tokenization, Analysis, and Relevance Scoring</text>
  
  <!-- Tokenization Process (Top Left) -->
  <rect x="50" y="85" width="400" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Tokenization &amp; Analysis</text>
  
  <rect x="70" y="125" width="360" height="130" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <text x="250" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Input: "The Running Shoes are great!"</text>
  
  <rect x="85" y="165" width="330" height="25" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="182" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">1. Lowercase: "the running shoes are great!"</text>
  
  <rect x="85" y="193" width="330" height="25" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="210" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">2. Remove punctuation: "the running shoes are great"</text>
  
  <rect x="85" y="221" width="330" height="25" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="238" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">3. Remove stop words: "running shoes great"</text>
  
  <text x="250" y="265" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">Tokens: ["running", "shoes", "great"]</text>
  
  <!-- TF-IDF Ranking (Top Right) -->
  <rect x="465" y="85" width="385" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">TF-IDF Ranking</text>
  
  <rect x="485" y="125" width="345" height="130" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <text x="657" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Term Frequency (TF): How often term appears in doc</text>
  <text x="657" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">TF("shoes", doc1) = 3 occurrences / 100 words = 0.03</text>
  
  <text x="657" y="190" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Inverse Document Frequency (IDF): How rare is term</text>
  <text x="657" y="205" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">IDF("shoes") = log(1000 docs / 50 docs with "shoes") = 3.0</text>
  
  <text x="657" y="230" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Score = TF × IDF</text>
  <text x="657" y="245" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Score("shoes", doc1) = 0.03 × 3.0 = 0.09</text>
  
  <!-- BM25 (Bottom) -->
  <rect x="50" y="275" width="800" height="160" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">BM25 (Modern Ranking Algorithm)</text>
  
  <rect x="70" y="315" width="360" height="110" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="250" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Improves on TF-IDF:</text>
  <text x="250" y="360" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Term frequency saturation (diminishing returns)</text>
  <text x="250" y="375" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Document length normalization</text>
  <text x="250" y="390" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• k1, b parameters for tuning</text>
  <text x="250" y="410" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Prevents long docs from ranking too high</text>
  <text x="250" y="425" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Used by: Elasticsearch, Solr (default)</text>
  
  <rect x="445" y="315" width="360" height="110" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="625" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">BM25 Formula:</text>
  <text x="625" y="360" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Score(q, d) = Σ IDF(qi) × (TF(qi, d) × (k1 + 1)) / (TF(qi, d) + k1 × (1 - b + b × |d|/avgdl))</text>
  <text x="625" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Where:</text>
  <text x="625" y="395" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• qi = query term i</text>
  <text x="625" y="408" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• d = document</text>
  <text x="625" y="421" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• k1 = term frequency saturation (default 1.2)</text>
  <text x="625" y="434" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• b = document length normalization (default 0.75)</text>
  
  <!-- Query Types (Bottom) -->
  <rect x="50" y="445" width="800" height="90" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">Query Types Supported</text>
  
  <rect x="70" y="485" width="180" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Match Query</text>
  <text x="160" y="518" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Full-text match</text>
  
  <rect x="265" y="485" width="180" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="355" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Term Query</text>
  <text x="355" y="518" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Exact term match</text>
  
  <rect x="460" y="485" width="180" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="550" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Fuzzy Query</text>
  <text x="550" y="518" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Typo tolerance</text>
  
  <rect x="655" y="485" width="180" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="745" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Range Query</text>
  <text x="745" y="518" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Price, date ranges</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>