<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">NoSQL Replication Patterns</title>
  <desc id="desc">Single-leader, multi-leader, and leaderless replication</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">NoSQL Replication Patterns</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Single-Leader, Multi-Leader, and Leaderless</text>
  
  <!-- Single Leader (Top Left) -->
  <rect x="50" y="85" width="260" height="200" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Single Leader Replication</text>
  
  <rect x="65" y="125" width="230" height="150" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <!-- Leader -->
  <rect x="80" y="140" width="100" height="50" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="130" y="165" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Leader</text>
  <text x="130" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">Accepts writes</text>
  
  <!-- Arrows to followers -->
  <line x1="130" y1="195" x2="90" y2="220" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="130" y1="195" x2="130" y2="220" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="130" y1="195" x2="170" y2="220" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Followers -->
  <rect x="65" y="225" width="50" height="40" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="90" y="245" text-anchor="middle" font-size="7" font-weight="600" fill="#1e3a8a">F1</text>
  <text x="90" y="258" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Read</text>
  
  <rect x="115" y="225" width="50" height="40" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="140" y="245" text-anchor="middle" font-size="7" font-weight="600" fill="#1e3a8a">F2</text>
  <text x="140" y="258" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Read</text>
  
  <rect x="165" y="225" width="50" height="40" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="190" y="245" text-anchor="middle" font-size="7" font-weight="600" fill="#1e3a8a">F3</text>
  <text x="190" y="258" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Read</text>
  
  <text x="180" y="285" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Simple, no conflicts</text>
  <text x="180" y="298" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Single point of failure</text>
  
  <!-- Multi Leader (Top Middle) -->
  <rect x="320" y="85" width="260" height="200" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Multi-Leader Replication</text>
  
  <rect x="335" y="125" width="230" height="150" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <!-- Leaders -->
  <rect x="350" y="140" width="80" height="40" rx="3" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <text x="390" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#78350f">Leader A</text>
  <text x="390" y="175" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">US Region</text>
  
  <rect x="485" y="140" width="80" height="40" rx="3" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <text x="525" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#78350f">Leader B</text>
  <text x="525" y="175" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">EU Region</text>
  
  <!-- Bi-directional replication -->
  <path d="M 435 160 L 480 160" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 480 170 L 435 170" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="457" y="185" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Sync</text>
  
  <!-- Followers -->
  <rect x="365" y="200" width="50" height="35" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="390" y="220" text-anchor="middle" font-size="6" font-weight="600" fill="#92400e">F1</text>
  
  <rect x="500" y="200" width="50" height="35" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="525" y="220" text-anchor="middle" font-size="6" font-weight="600" fill="#92400e">F2</text>
  
  <text x="450" y="260" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Regional writes, low latency</text>
  <text x="450" y="273" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Write conflicts possible</text>
  
  <!-- Leaderless (Top Right) -->
  <rect x="590" y="85" width="260" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Leaderless (Dynamo-style)</text>
  
  <rect x="605" y="125" width="230" height="150" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <!-- All nodes equal -->
  <circle cx="650" cy="170" r="25" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="650" y="175" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Node A</text>
  
  <circle cx="720" cy="150" r="25" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="720" y="155" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Node B</text>
  
  <circle cx="770" cy="180" r="25" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="770" y="185" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Node C</text>
  
  <circle cx="680" cy="220" r="25" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="680" y="225" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Node D</text>
  
  <circle cx="750" cy="230" r="25" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="750" y="235" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Node E</text>
  
  <text x="720" y="270" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ High availability</text>
  <text x="720" y="283" text-anchor="middle" font-size="7" font-weight="700" fill="#1f2937">Write to N nodes, read from N</text>
  
  <!-- Quorum Calculation (Bottom) -->
  <rect x="50" y="295" width="800" height="140" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Quorum Configuration (Leaderless)</text>
  
  <rect x="70" y="335" width="240" height="90" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="190" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Strong Consistency</text>
  <text x="190" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">N=3, R=2, W=2</text>
  <text x="190" y="395" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">R+W &gt; N guarantees</text>
  <text x="190" y="408" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Latest data on read</text>
  <text x="190" y="421" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Consistent but slower</text>
  
  <rect x="325" y="335" width="240" height="90" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="445" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Eventual Consistency</text>
  <text x="445" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">N=3, R=1, W=1</text>
  <text x="445" y="395" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Fastest reads/writes</text>
  <text x="445" y="408" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">May read stale data</text>
  <text x="445" y="421" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Converges eventually</text>
  <text x="445" y="434" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Fast but may be stale</text>
  
  <rect x="580" y="335" width="240" height="90" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="700" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Tunable Consistency</text>
  <text x="700" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Per-operation choice</text>
  <text x="700" y="395" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">ONE, QUORUM, ALL</text>
  <text x="700" y="408" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Balance latency vs consistency</text>
  <text x="700" y="421" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Critical ops: QUORUM</text>
  <text x="700" y="434" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Flexible per use case</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>