<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Block Storage Architecture</title>
  <desc id="desc">Block device model, volume types, and attachment model</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Block Storage Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Block Device Model and Volume Types</text>
  
  <!-- Block Device Model (Top) -->
  <rect x="50" y="85" width="800" height="160" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Block Device Model</text>
  
  <!-- Fixed-size blocks -->
  <rect x="100" y="125" width="40" height="40" rx="2" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="120" y="150" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Block 0</text>
  
  <rect x="145" y="125" width="40" height="40" rx="2" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="165" y="150" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Block 1</text>
  
  <rect x="190" y="125" width="40" height="40" rx="2" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="210" y="150" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Block 2</text>
  
  <rect x="235" y="125" width="40" height="40" rx="2" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="255" y="150" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Block 3</text>
  
  <text x="300" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">...</text>
  
  <rect x="330" y="125" width="40" height="40" rx="2" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="350" y="145" text-anchor="middle" font-size="6" font-weight="700" fill="#ffffff">Block N</text>
  
  <text x="450" y="145" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Fixed-size blocks (512B - 4KB)</text>
  <text x="450" y="160" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Addressed by LBA (Logical Block Address)</text>
  <text x="450" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Random read/write at block level</text>
  
  <!-- Volume Types (Middle) -->
  <rect x="50" y="255" width="800" height="140" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Volume Types</text>
  
  <!-- SSD -->
  <rect x="70" y="295" width="240" height="90" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="190" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">SSD Volumes</text>
  <text x="190" y="335" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• High IOPS (10K-100K+)</text>
  <text x="190" y="350" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Low latency (sub-ms)</text>
  <text x="190" y="365" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Higher cost/GB</text>
  <text x="190" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Best for: Databases, boot volumes</text>
  
  <!-- HDD -->
  <rect x="325" y="295" width="240" height="90" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="445" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">HDD Volumes</text>
  <text x="445" y="335" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Lower IOPS (100-500)</text>
  <text x="445" y="350" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Higher latency (ms)</text>
  <text x="445" y="365" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Lower cost/GB</text>
  <text x="445" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Best for: Backups, cold data</text>
  
  <!-- Provisioned IOPS -->
  <rect x="580" y="295" width="240" height="90" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="700" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Provisioned IOPS</text>
  <text x="700" y="335" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Guaranteed IOPS</text>
  <text x="700" y="350" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Predictable performance</text>
  <text x="700" y="365" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Highest cost</text>
  <text x="700" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Best for: Critical databases</text>
  
  <!-- Attachment Model (Bottom) -->
  <rect x="50" y="405" width="800" height="130" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Volume Attachment Model</text>
  
  <!-- EC2 Instance -->
  <rect x="100" y="445" width="200" height="80" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="200" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">EC2 Instance</text>
  <text x="200" y="490" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">Single-AZ attachment</text>
  <text x="200" y="505" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">One volume per instance</text>
  <text x="200" y="520" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">Multi-attach limited</text>
  
  <!-- Arrow -->
  <line x1="305" y1="485" x2="335" y2="485" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="475" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Attaches to</text>
  
  <!-- EBS Volume -->
  <rect x="350" y="445" width="200" height="80" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">EBS Volume</text>
  <text x="450" y="490" text-anchor="middle" font-size="8" font-weight="600" fill="#6ee7b7">Tied to Availability Zone</text>
  <text x="450" y="505" text-anchor="middle" font-size="8" font-weight="600" fill="#6ee7b7">Persistent beyond instance</text>
  <text x="450" y="520" text-anchor="middle" font-size="8" font-weight="600" fill="#6ee7b7">Snapshot to S3 for backup</text>
  
  <!-- Arrow -->
  <line x1="555" y1="485" x2="585" y2="485" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="570" y="475" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Formatted with</text>
  
  <!-- File System -->
  <rect x="600" y="445" width="200" height="80" rx="4" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <text x="700" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">File System</text>
  <text x="700" y="490" text-anchor="middle" font-size="8" font-weight="600" fill="#fef3c7">ext4, XFS, NTFS</text>
  <text x="700" y="505" text-anchor="middle" font-size="8" font-weight="600" fill="#fef3c7">OS manages files</text>
  <text x="700" y="520" text-anchor="middle" font-size="8" font-weight="600" fill="#fef3c7">Database stores data files</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>