<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Document Database Sharding Strategies</title>
  <desc id="desc">Shard key selection and sharding strategies for document databases</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Document Database Sharding</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Shard Key Selection and Distribution Strategies</text>
  
  <!-- Shard Key Selection Criteria (Top Left) -->
  <rect x="50" y="85" width="260" height="140" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="180" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">Bad Shard Keys</text>
  
  <!-- Bad Examples -->
  <rect x="65" y="120" width="230" height="95" rx="4" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  
  <rect x="75" y="135" width="210" height="25" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="180" y="152" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">Low Cardinality</text>
  <text x="180" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">status, type, category</text>
  <text x="180" y="175" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Uneven distribution</text>
  
  <rect x="75" y="170" width="210" height="25" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="180" y="187" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">Monotonically Increasing</text>
  <text x="180" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">timestamp, created_at</text>
  <text x="180" y="210" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Hot spot on latest shard</text>
  
  <!-- Good Shard Key Criteria (Top Middle) -->
  <rect x="320" y="85" width="260" height="140" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Good Shard Keys</text>
  
  <rect x="335" y="120" width="230" height="95" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  
  <rect x="345" y="135" width="210" height="25" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="152" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">High Cardinality</text>
  <text x="450" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">user_id, product_id</text>
  <text x="450" y="175" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">→ Many unique values</text>
  
  <rect x="345" y="170" width="210" height="25" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="187" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">Even Distribution</text>
  <text x="450" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">No hot spots</text>
  <text x="450" y="210" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">→ Balanced load</text>
  
  <rect x="345" y="205" width="210" height="10" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="213" text-anchor="middle" font-size="6" font-weight="700" fill="#059669">✓ Frequently queried</text>
  
  <!-- Hash-Based Sharding (Top Right) -->
  <rect x="590" y="85" width="260" height="140" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="720" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Hash-Based Sharding</text>
  
  <rect x="605" y="120" width="230" height="95" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Hash Formula -->
  <rect x="615" y="135" width="210" height="35" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="720" y="155" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">shard = hash(key) % N</text>
  <text x="720" y="170" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Even distribution guaranteed</text>
  
  <!-- Pros/Cons -->
  <rect x="615" y="180" width="100" height="30" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="665" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Even distribution</text>
  <text x="665" y="205" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ No hot spots</text>
  
  <rect x="725" y="180" width="100" height="30" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="775" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Range queries slow</text>
  <text x="775" y="205" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Must scan all shards</text>
  
  <!-- Range-Based Sharding (Left Bottom) -->
  <rect x="50" y="235" width="400" height="140" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Range-Based Sharding</text>
  
  <!-- Shard Visualization -->
  <rect x="70" y="275" width="360" height="90" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Shard A -->
  <rect x="85" y="290" width="100" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="135" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Shard A</text>
  <text x="135" y="325" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">A-G range</text>
  <text x="135" y="338" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Users: Alice, Bob...</text>
  
  <!-- Shard B -->
  <rect x="200" y="290" width="100" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Shard B</text>
  <text x="250" y="325" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">H-M range</text>
  <text x="250" y="338" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Users: Henry, Mike...</text>
  
  <!-- Shard C -->
  <rect x="315" y="290" width="100" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="365" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Shard C</text>
  <text x="365" y="325" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">N-Z range</text>
  <text x="365" y="338" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Users: Nancy, Zoe...</text>
  
  <!-- Pros/Cons -->
  <text x="250" y="360" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Efficient range queries | ✗ Uneven distribution possible</text>
  
  <!-- Tag-Based Sharding (Right Bottom) -->
  <rect x="460" y="235" width="390" height="140" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="655" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Tag-Based Sharding</text>
  
  <!-- Shard Visualization -->
  <rect x="480" y="275" width="350" height="90" rx="4" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  
  <!-- Shard US -->
  <rect x="495" y="290" width="100" height="60" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="545" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Shard US</text>
  <text x="545" y="325" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">region=US</text>
  <text x="545" y="338" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">US customers</text>
  
  <!-- Shard EU -->
  <rect x="610" y="290" width="100" height="60" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="660" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Shard EU</text>
  <text x="660" y="325" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">region=EU</text>
  <text x="660" y="338" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">EU customers</text>
  
  <!-- Shard APAC -->
  <rect x="725" y="290" width="100" height="60" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="775" y="310" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Shard APAC</text>
  <text x="775" y="325" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">region=APAC</text>
  <text x="775" y="338" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Asia customers</text>
  
  <!-- Pros/Cons -->
  <text x="655" y="360" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Natural isolation | ✗ Skewed distribution possible</text>
  
  <!-- Sharding Challenges and Solutions (Bottom) -->
  <rect x="50" y="385" width="800" height="150" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Sharding Challenges &amp; Solutions</text>
  
  <!-- Challenge 1: Hot Spots -->
  <rect x="70" y="425" width="180" height="100" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="160" y="445" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">Hot Spots</text>
  <text x="160" y="460" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Problem: One shard</text>
  <text x="160" y="472" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">overloaded</text>
  <text x="160" y="487" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Solution: Hash-based</text>
  <text x="160" y="499" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">or choose high-cardinality</text>
  <text x="160" y="511" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">key (user_id vs status)</text>
  
  <!-- Challenge 2: Cross-Shard Queries -->
  <rect x="265" y="425" width="180" height="100" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="355" y="445" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">Cross-Shard Queries</text>
  <text x="355" y="460" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Problem: Query needs</text>
  <text x="355" y="472" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">data from multiple shards</text>
  <text x="355" y="487" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Solution: Include shard</text>
  <text x="355" y="499" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">key in queries</text>
  <text x="355" y="511" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">or use scatter-gather</text>
  
  <!-- Challenge 3: Resharding -->
  <rect x="460" y="425" width="180" height="100" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="550" y="445" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">Resharding</text>
  <text x="550" y="460" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Problem: Need to rebalance</text>
  <text x="550" y="472" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">data as system grows</text>
  <text x="550" y="487" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Solution: Use consistent</text>
  <text x="550" y="499" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">hashing with virtual shards</text>
  <text x="550" y="511" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">(100+ virtual shards)</text>
  
  <!-- Challenge 4: Distributed Transactions -->
  <rect x="655" y="425" width="180" height="100" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="745" y="445" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">Distributed Transactions</text>
  <text x="745" y="460" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Problem: Multi-shard</text>
  <text x="745" y="472" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">transactions are slow</text>
  <text x="745" y="487" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Solution: Co-locate related</text>
  <text x="745" y="499" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">data on same shard</text>
  <text x="745" y="511" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">or use eventual consistency</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>