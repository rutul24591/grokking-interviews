<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">BASE Replication Patterns</title>
  <desc id="desc">BASE replication patterns: single leader, multi leader, and leaderless</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">BASE Replication Patterns</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Single leader, multi leader, and leaderless (Dynamo-style)</text>
  
  <!-- Single Leader -->
  <rect x="30" y="85" width="270" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Single Leader</text>
  
  <!-- Leader node -->
  <rect x="80" y="125" width="170" height="60" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="165" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Leader</text>
  <text x="165" y="170" text-anchor="middle" font-size="8" fill="#fef3c7">Accepts ALL writes</text>
  
  <!-- Replication arrows -->
  <line x1="100" y1="190" x2="80" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="165" y1="190" x2="165" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="190" x2="250" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Follower nodes -->
  <rect x="50" y="225" width="80" height="50" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="90" y="250" text-anchor="middle" font-size="9" fill="#64748b">Follower 1</text>
  
  <rect x="125" y="225" width="80" height="50" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="165" y="250" text-anchor="middle" font-size="9" fill="#64748b">Follower 2</text>
  
  <rect x="200" y="225" width="80" height="50" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="240" y="250" text-anchor="middle" font-size="9" fill="#64748b">Follower 3</text>
  
  <text x="165" y="295" text-anchor="middle" font-size="8" fill="#64748b">Async replication</text>
  
  <!-- Trade-offs -->
  <rect x="50" y="310" width="230" height="80" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="165" y="335" text-anchor="middle" font-size="9" fill="#64748b">+ Simple, no conflicts</text>
  <text x="165" y="350" text-anchor="middle" font-size="9" fill="#64748b">- Write bottleneck</text>
  <text x="165" y="365" text-anchor="middle" font-size="9" fill="#64748b">- Single point of failure</text>
  <text x="165" y="380" text-anchor="middle" font-size="8" fill="#b45309">Example: MySQL, MongoDB</text>
  
  <!-- Multi Leader -->
  <rect x="315" y="85" width="270" height="220" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#0369a1">Multi Leader</text>
  
  <!-- Leader nodes -->
  <rect x="335" y="125" width="100" height="50" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="385" y="150" text-anchor="middle" font-size="9" fill="white">Leader A</text>
  <text x="385" y="165" text-anchor="middle" font-size="8" fill="#bfdbfe">US Region</text>
  
  <rect x="485" y="125" width="80" height="50" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="525" y="150" text-anchor="middle" font-size="9" fill="white">Leader B</text>
  <text x="525" y="165" text-anchor="middle" font-size="8" fill="#bfdbfe">EU Region</text>
  
  <!-- Bi-directional replication -->
  <line x1="440" y1="150" x2="480" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="160" x2="440" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="460" y="180" text-anchor="middle" font-size="7" fill="#64748b">Bi-directional</text>
  
  <!-- Followers -->
  <rect x="335" y="190" width="100" height="40" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="385" y="215" text-anchor="middle" font-size="8" fill="#64748b">Followers A</text>
  
  <rect x="485" y="190" width="80" height="40" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="525" y="215" text-anchor="middle" font-size="8" fill="#64748b">Followers B</text>
  
  <!-- Trade-offs -->
  <rect x="335" y="245" width="230" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="450" y="265" text-anchor="middle" font-size="8" fill="#64748b">+ Regional writes, no single PoF</text>
  <text x="450" y="280" text-anchor="middle" font-size="8" fill="#64748b">- Write conflicts possible</text>
  <text x="450" y="295" text-anchor="middle" font-size="8" fill="#0369a1">Example: Cassandra, CouchDB</text>
  
  <!-- Leaderless (Dynamo-style) -->
  <rect x="600" y="85" width="270" height="220" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="735" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Leaderless (Dynamo)</text>
  
  <!-- All nodes equal -->
  <rect x="620" y="125" width="70" height="50" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="655" y="150" text-anchor="middle" font-size="8" fill="white">Node A</text>
  
  <rect x="700" y="125" width="70" height="50" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="735" y="150" text-anchor="middle" font-size="8" fill="white">Node B</text>
  
  <rect x="780" y="125" width="70" height="50" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="815" y="150" text-anchor="middle" font-size="8" fill="white">Node C</text>
  
  <!-- Write to N nodes -->
  <text x="735" y="195" text-anchor="middle" font-size="8" fill="#64748b">Write to N=3 nodes</text>
  <text x="735" y="210" text-anchor="middle" font-size="8" fill="#64748b">Read from R nodes</text>
  <text x="735" y="225" text-anchor="middle" font-size="8" fill="#64748b">Quorum: W+R &gt; N</text>
  
  <!-- Trade-offs -->
  <rect x="620" y="245" width="230" height="50" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="735" y="265" text-anchor="middle" font-size="8" fill="#64748b">+ High availability, no leader</text>
  <text x="735" y="280" text-anchor="middle" font-size="8" fill="#64748b">- Eventual consistency, complex</text>
  <text x="735" y="295" text-anchor="middle" font-size="8" fill="#6d28d9">Example: DynamoDB, Riak</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Pattern Comparison</text>
  
  <!-- Table headers -->
  <rect x="50" y="355" width="800" height="35" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="1"/>
  <text x="165" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Pattern</text>
  <text x="320" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Write Availability</text>
  <text x="480" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Read Consistency</text>
  <text x="640" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Conflict Risk</text>
  <text x="780" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Best For</text>
  
  <!-- Row 1 -->
  <rect x="50" y="390" width="800" height="40" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="165" y="413" text-anchor="middle" font-size="9" fill="#b45309">Single Leader</text>
  <text x="320" y="413" text-anchor="middle" font-size="9" fill="#ef4444">Low (leader bottleneck)</text>
  <text x="480" y="413" text-anchor="middle" font-size="9" fill="#10b981">High (after replication)</text>
  <text x="640" y="413" text-anchor="middle" font-size="9" fill="#10b981">None</text>
  <text x="780" y="408" text-anchor="middle" font-size="8" fill="#64748b">Simple apps,</text>
  <text x="780" y="420" text-anchor="middle" font-size="8" fill="#64748b">strong consistency</text>
  
  <!-- Row 2 -->
  <rect x="50" y="430" width="800" height="40" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="165" y="453" text-anchor="middle" font-size="9" fill="#3b82f6">Multi Leader</text>
  <text x="320" y="453" text-anchor="middle" font-size="9" fill="#10b981">High (multiple leaders)</text>
  <text x="480" y="453" text-anchor="middle" font-size="9" fill="#f59e0b">Eventual</text>
  <text x="640" y="453" text-anchor="middle" font-size="9" fill="#ef4444">High (concurrent writes)</text>
  <text x="780" y="448" text-anchor="middle" font-size="8" fill="#64748b">Multi-region,</text>
  <text x="780" y="460" text-anchor="middle" font-size="8" fill="#64748b">collaborative apps</text>
  
  <!-- Row 3 -->
  <rect x="50" y="470" width="800" height="40" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="165" y="493" text-anchor="middle" font-size="9" fill="#8b5cf6">Leaderless</text>
  <text x="320" y="493" text-anchor="middle" font-size="9" fill="#10b981">Very High (any node)</text>
  <text x="480" y="493" text-anchor="middle" font-size="9" fill="#f59e0b">Tunable (quorum)</text>
  <text x="640" y="493" text-anchor="middle" font-size="9" fill="#f59e0b">Medium (vector clocks)</text>
  <text x="780" y="488" text-anchor="middle" font-size="8" fill="#64748b">High availability,</text>
  <text x="780" y="500" text-anchor="middle" font-size="8" fill="#64748b">fault tolerance</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>