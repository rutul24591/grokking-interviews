<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Normalization Levels</text>

  <rect x="60" y="100" width="180" height="80" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">1NF</text>
  <text x="90" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Atomic values</text>

  <rect x="260" y="100" width="180" height="80" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="290" y="145" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">2NF</text>
  <text x="290" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">No partial deps</text>

  <rect x="460" y="100" width="180" height="80" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="490" y="145" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">3NF</text>
  <text x="490" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">No transitive deps</text>

  <rect x="660" y="100" width="180" height="80" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="690" y="145" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">BCNF</text>
  <text x="690" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Every determinant is key</text>

  <line x1="240" y1="140" x2="260" y2="140" stroke="#64748b" stroke-width="2"/>
  <line x1="440" y1="140" x2="460" y2="140" stroke="#64748b" stroke-width="2"/>
  <line x1="640" y1="140" x2="660" y2="140" stroke="#64748b" stroke-width="2"/>
</svg>
