<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Object Storage Architecture</title>
  <desc id="desc">Object storage showing flat namespace, objects with metadata, and access patterns</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Object Storage Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Flat Namespace with Objects and Metadata</text>
  
  <!-- Object Structure (Top) -->
  <rect x="50" y="85" width="800" height="160" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Object Structure</text>
  
  <!-- Object components -->
  <rect x="100" y="125" width="200" height="110" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="200" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Object</text>
  
  <rect x="115" y="160" width="170" height="25" rx="3" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="200" y="177" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Key (Unique ID)</text>
  <text x="200" y="190" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">photos/2024/vacation.jpg</text>
  
  <rect x="115" y="190" width="170" height="25" rx="3" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="200" y="207" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Metadata</text>
  <text x="200" y="220" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">content-type, size, custom tags</text>
  
  <rect x="115" y="220" width="170" height="25" rx="3" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="200" y="237" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Data (Blob)</text>
  <text x="200" y="250" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">Immutable binary data</text>
  
  <!-- Arrow -->
  <line x1="305" y1="180" x2="335" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="170" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Stored in</text>
  
  <!-- Bucket -->
  <rect x="350" y="125" width="200" height="110" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="450" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Bucket</text>
  <text x="450" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#6ee7b7">my-photo-bucket</text>
  <text x="450" y="185" text-anchor="middle" font-size="7" font-weight="600" fill="#6ee7b7">Flat namespace</text>
  <text x="450" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#6ee7b7">No folders/hierarchy</text>
  <text x="450" y="215" text-anchor="middle" font-size="7" font-weight="600" fill="#6ee7b7">Billions of objects</text>
  
  <!-- Arrow -->
  <line x1="555" y1="180" x2="585" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="570" y="170" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Accessed via</text>
  
  <!-- HTTP API -->
  <rect x="600" y="125" width="200" height="110" rx="4" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <text x="700" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">HTTP API</text>
  <text x="700" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#fef3c7">GET /bucket/key</text>
  <text x="700" y="185" text-anchor="middle" font-size="8" font-weight="600" fill="#fef3c7">PUT /bucket/key</text>
  <text x="700" y="200" text-anchor="middle" font-size="8" font-weight="600" fill="#fef3c7">DELETE /bucket/key</text>
  <text x="700" y="215" text-anchor="middle" font-size="8" font-weight="600" fill="#fef3c7">LIST /bucket?prefix=</text>
  
  <!-- Access Patterns (Bottom) -->
  <rect x="50" y="255" width="800" height="280" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Access Patterns</text>
  
  <!-- GET Object -->
  <rect x="70" y="295" width="180" height="110" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="160" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">GET Object</text>
  <text x="160" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Retrieve by key</text>
  <text x="160" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">GET /bucket/photo.jpg</text>
  <text x="160" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Returns: data + metadata</text>
  <text x="160" y="385" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Fast retrieval</text>
  
  <!-- PUT Object -->
  <rect x="265" y="295" width="180" height="110" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="355" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">PUT Object</text>
  <text x="355" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Upload (creates version)</text>
  <text x="355" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">PUT /bucket/photo.jpg</text>
  <text x="355" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Immutable (new version)</text>
  <text x="355" y="385" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Versioning support</text>
  
  <!-- DELETE Object -->
  <rect x="460" y="295" width="180" height="110" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="550" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">DELETE Object</text>
  <text x="550" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Remove or delete marker</text>
  <text x="550" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">DELETE /bucket/photo.jpg</text>
  <text x="550" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Soft delete (versioning)</text>
  <text x="550" y="385" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Recoverable</text>
  
  <!-- LIST Objects -->
  <rect x="655" y="295" width="180" height="110" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="745" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">LIST Objects</text>
  <text x="745" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Prefix-based listing</text>
  <text x="745" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">LIST /bucket?prefix=photos/</text>
  <text x="745" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Simulates folders</text>
  <text x="745" y="385" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Hierarchical illusion</text>
  
  <!-- Key Characteristics (Bottom) -->
  <rect x="70" y="415" width="760" height="110" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="450" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#0369a1">Key Characteristics</text>
  
  <text x="85" y="465" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">✓ Flat namespace (no hierarchy limits)</text>
  <text x="85" y="480" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">✓ Immutable objects (updates create new versions)</text>
  <text x="85" y="495" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">✓ Metadata stored separately (queryable)</text>
  <text x="450" y="465" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">✓ HTTP API access (RESTful)</text>
  <text x="450" y="480" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">✓ Massive scale (exabytes, billions of objects)</text>
  <text x="450" y="495" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">✓ High durability (99.999999999%)</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>