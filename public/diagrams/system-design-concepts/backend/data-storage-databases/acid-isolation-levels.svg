<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">ACID Isolation Levels</title>
  <desc id="desc">Transaction isolation levels matrix showing anomalies allowed/prevented at each level</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Transaction Isolation Levels</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Anomalies allowed (✓) or prevented (✗) at each level</text>
  
  <!-- Isolation Levels Matrix -->
  <rect x="50" y="85" width="800" height="280" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Header Row -->
  <rect x="50" y="85" width="800" height="50" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="180" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Isolation Level</text>
  <text x="320" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Dirty Read</text>
  <text x="450" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Non-Repeatable</text>
  <text x="580" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Phantom Read</text>
  <text x="720" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Use Case</text>
  
  <!-- Row 1: Read Uncommitted -->
  <rect x="50" y="135" width="800" height="55" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="180" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">Read Uncommitted</text>
  <text x="320" y="160" text-anchor="middle" font-size="14" fill="#ef4444">✓ Allowed</text>
  <text x="450" y="160" text-anchor="middle" font-size="14" fill="#ef4444">✓ Allowed</text>
  <text x="580" y="160" text-anchor="middle" font-size="14" fill="#ef4444">✓ Allowed</text>
  <text x="720" y="155" text-anchor="middle" font-size="9" fill="#64748b">Rarely used</text>
  <text x="720" y="170" text-anchor="middle" font-size="8" fill="#64748b">Dangerous</text>
  
  <!-- Row 2: Read Committed -->
  <rect x="50" y="190" width="800" height="55" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="180" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="#3b82f6">Read Committed</text>
  <text x="320" y="215" text-anchor="middle" font-size="14" fill="#10b981">✗ Prevented</text>
  <text x="450" y="215" text-anchor="middle" font-size="14" fill="#ef4444">✓ Allowed</text>
  <text x="580" y="215" text-anchor="middle" font-size="14" fill="#ef4444">✓ Allowed</text>
  <text x="720" y="210" text-anchor="middle" font-size="9" fill="#64748b">PostgreSQL/Oracle</text>
  <text x="720" y="225" text-anchor="middle" font-size="8" fill="#64748b">Default level</text>
  
  <!-- Row 3: Repeatable Read -->
  <rect x="50" y="245" width="800" height="55" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="180" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#10b981">Repeatable Read</text>
  <text x="320" y="270" text-anchor="middle" font-size="14" fill="#10b981">✗ Prevented</text>
  <text x="450" y="270" text-anchor="middle" font-size="14" fill="#10b981">✗ Prevented</text>
  <text x="580" y="270" text-anchor="middle" font-size="14" fill="#ef4444">✓ Allowed</text>
  <text x="720" y="265" text-anchor="middle" font-size="9" fill="#64748b">MySQL default</text>
  <text x="720" y="280" text-anchor="middle" font-size="8" fill="#64748b">Most common</text>
  
  <!-- Row 4: Serializable -->
  <rect x="50" y="300" width="800" height="55" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="180" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b5cf6">Serializable</text>
  <text x="320" y="325" text-anchor="middle" font-size="14" fill="#10b981">✗ Prevented</text>
  <text x="450" y="325" text-anchor="middle" font-size="14" fill="#10b981">✗ Prevented</text>
  <text x="580" y="325" text-anchor="middle" font-size="14" fill="#10b981">✗ Prevented</text>
  <text x="720" y="320" text-anchor="middle" font-size="9" fill="#64748b">Critical data</text>
  <text x="720" y="335" text-anchor="middle" font-size="8" fill="#64748b">Highest overhead</text>
  
  <!-- Anomaly Examples Section -->
  <rect x="50" y="380" width="400" height="150" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="250" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Anomaly Examples</text>
  
  <!-- Dirty Read Example -->
  <rect x="70" y="420" width="360" height="35" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="442" text-anchor="middle" font-size="10" font-weight="bold" fill="#b91c1c">Dirty Read:</text>
  <text x="250" y="455" text-anchor="middle" font-size="8" fill="#64748b">T1 reads uncommitted write from T2, T2 rolls back</text>
  
  <!-- Non-Repeatable Read Example -->
  <rect x="70" y="460" width="360" height="35" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="482" text-anchor="middle" font-size="10" font-weight="bold" fill="#b91c1c">Non-Repeatable Read:</text>
  <text x="250" y="495" text-anchor="middle" font-size="8" fill="#64748b">T1 reads X=5, T2 updates X=10, T1 reads X=10</text>
  
  <!-- Phantom Read Example -->
  <rect x="70" y="500" width="360" height="25" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="517" text-anchor="middle" font-size="8" fill="#64748b">Phantom Read: T1 counts rows=5, T2 inserts row, T1 counts rows=6</text>
  
  <!-- Performance vs Consistency -->
  <rect x="470" y="380" width="380" height="150" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="660" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#0369a1">Performance Trade-off</text>
  
  <rect x="490" y="420" width="340" height="100" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  
  <!-- Performance scale -->
  <line x1="510" y1="450" x2="810" y2="450" stroke="#3b82f6" stroke-width="3"/>
  <text x="510" y="470" text-anchor="middle" font-size="9" fill="#64748b">High Perf</text>
  <text x="810" y="470" text-anchor="middle" font-size="9" fill="#64748b">Low Perf</text>
  
  <!-- Markers on scale -->
  <circle cx="560" cy="450" r="6" fill="#ef4444"/>
  <text x="560" y="440" text-anchor="middle" font-size="8" fill="#64748b">Read Uncommitted</text>
  
  <circle cx="630" cy="450" r="6" fill="#3b82f6"/>
  <text x="630" y="440" text-anchor="middle" font-size="8" fill="#64748b">Read Committed</text>
  
  <circle cx="710" cy="450" r="6" fill="#10b981"/>
  <text x="710" y="440" text-anchor="middle" font-size="8" fill="#64748b">Repeatable Read</text>
  
  <circle cx="780" cy="450" r="6" fill="#8b5cf6"/>
  <text x="780" y="440" text-anchor="middle" font-size="8" fill="#64748b">Serializable</text>
  
  <!-- Consistency arrow -->
  <line x1="510" y1="490" x2="810" y2="490" stroke="#10b981" stroke-width="3"/>
  <text x="510" y="510" text-anchor="middle" font-size="9" fill="#64748b">Low Consistency</text>
  <text x="810" y="510" text-anchor="middle" font-size="9" fill="#64748b">High Consistency</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>