<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Column-Family Store Architecture</title>
  <desc id="desc">SSTable architecture with memtable, WAL, and compaction</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Column-Family Store Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">SSTable Architecture with Memtable and Compaction</text>
  
  <!-- Write Path (Top Left) -->
  <rect x="50" y="85" width="400" height="200" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Write Path</text>
  
  <!-- Client Write -->
  <rect x="70" y="125" width="80" height="40" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="110" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Client</text>
  <text x="110" y="160" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">PUT/DELETE</text>
  
  <!-- Arrow -->
  <line x1="155" y1="145" x2="185" y2="145" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- WAL -->
  <rect x="190" y="125" width="100" height="60" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="240" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Write-Ahead Log</text>
  <text x="240" y="168" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Durability</text>
  <text x="240" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Sequential writes</text>
  
  <!-- Arrow -->
  <line x1="295" y1="155" x2="325" y2="155" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Memtable -->
  <rect x="330" y="125" width="100" height="60" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="380" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Memtable</text>
  <text x="380" y="168" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">In-memory</text>
  <text x="380" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Sorted (SkipList)</text>
  
  <!-- Flush to SSTable -->
  <path d="M 380 190 L 380 220 L 250 220 L 250 245" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="300" y="235" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Flush when full</text>
  
  <!-- SSTable -->
  <rect x="200" y="250" width="100" height="30" rx="3" fill="#e0e7ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="250" y="270" text-anchor="middle" font-size="8" font-weight="700" fill="#5b21b6">SSTable 1</text>
  
  <rect x="200" y="285" width="100" height="30" rx="3" fill="#c7d2fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="250" y="305" text-anchor="middle" font-size="8" font-weight="700" fill="#5b21b6">SSTable 2</text>
  
  <!-- Read Path (Top Right) -->
  <rect x="465" y="85" width="385" height="200" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Read Path</text>
  
  <!-- Client Read -->
  <rect x="485" y="125" width="80" height="40" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="525" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Client</text>
  <text x="525" y="160" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">GET</text>
  
  <!-- Arrow -->
  <line x1="570" y1="145" x2="600" y2="145" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Check Memtable -->
  <rect x="605" y="125" width="100" height="35" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="655" y="147" text-anchor="middle" font-size="8" font-weight="700" fill="#065f46">1. Memtable</text>
  
  <!-- Arrow -->
  <line x1="655" y1="165" x2="655" y2="185" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Check SSTables -->
  <rect x="605" y="190" width="100" height="35" rx="3" fill="#e0e7ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="655" y="212" text-anchor="middle" font-size="8" font-weight="700" fill="#5b21b6">2. SSTables</text>
  <text x="655" y="225" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">(newest first)</text>
  
  <!-- Bloom Filter -->
  <rect x="720" y="125" width="120" height="60" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="780" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Bloom Filter</text>
  <text x="780" y="168" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Probabilistic</text>
  <text x="780" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Skip unnecessary reads</text>
  
  <!-- Arrow -->
  <line x1="720" y1="155" x2="705" y2="155" stroke="#374151" stroke-width="2" marker-end="url(#arrow-left)"/>
  <text x="712" y="145" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Check first</text>
  
  <!-- SSTable Structure (Bottom) -->
  <rect x="50" y="295" width="800" height="160" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">SSTable Structure (Sorted String Table)</text>
  
  <!-- Data Block -->
  <rect x="70" y="335" width="180" height="50" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Data Block</text>
  <text x="160" y="375" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Sorted key-value pairs</text>
  
  <!-- Index Block -->
  <rect x="265" y="335" width="180" height="50" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="355" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Index Block</text>
  <text x="355" y="375" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Sparse index for data blocks</text>
  
  <!-- Bloom Filter Block -->
  <rect x="460" y="335" width="180" height="50" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="550" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Bloom Filter</text>
  <text x="550" y="375" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Membership test</text>
  
  <!-- Metadata Block -->
  <rect x="655" y="335" width="180" height="50" rx="4" fill="#e0e7ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="745" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">Metadata Block</text>
  <text x="745" y="375" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Compression, checksums</text>
  
  <!-- Key Characteristics -->
  <rect x="70" y="400" width="760" height="45" rx="4" fill="#ffffff" stroke="#6b7280" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2937">Key Characteristics:</text>
  <text x="450" y="435" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Immutable (never updated, only appended)</text>
  <text x="450" y="448" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Sorted by key (enables efficient range scans)</text>
  <text x="450" y="461" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Compressed (saves disk space, reduces I/O)</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#374151"/>
    </marker>
  </defs>
</svg>