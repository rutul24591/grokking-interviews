<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Concurrency Retry Strategies</title>
  <desc id="desc">Retry patterns for handling concurrency failures</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Retry Strategies</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Handling Concurrency Failures Gracefully</text>
  
  <!-- Retry Scenarios (Top) -->
  <rect x="50" y="85" width="800" height="120" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">When to Retry</text>
  
  <!-- Deadlock -->
  <rect x="70" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Deadlock</text>
  <text x="160" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Transaction aborted by DB</text>
  <text x="160" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Retry immediately</text>
  <text x="160" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Safe to retry</text>
  
  <!-- Serialization Failure -->
  <rect x="265" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="355" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Serialization Failure</text>
  <text x="355" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Serializable isolation conflict</text>
  <text x="355" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Retry with backoff</text>
  <text x="355" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Expected at Serializable</text>
  
  <!-- Optimistic Lock Failure -->
  <rect x="460" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="550" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Optimistic Lock Fail</text>
  <text x="550" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Version mismatch</text>
  <text x="550" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Read new, retry</text>
  <text x="550" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Normal for optimistic</text>
  
  <!-- Timeout -->
  <rect x="655" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="745" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Lock Timeout</text>
  <text x="745" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Couldn't acquire lock</text>
  <text x="745" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Retry after delay</text>
  <text x="745" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#f59e0b">⚠ May indicate contention</text>
  
  <!-- Retry Patterns (Middle Left) -->
  <rect x="50" y="215" width="400" height="200" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="250" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Retry Patterns</text>
  
  <rect x="70" y="255" width="360" height="150" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <!-- Simple Retry -->
  <text x="250" y="280" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">1. Simple Retry (Fixed Delay)</text>
  <rect x="85" y="295" width="330" height="45" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="250" y="315" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">for (i=0; i&lt;maxRetries; i++) {</text>
  <text x="250" y="328" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">  try { execute(); return; }</text>
  <text x="250" y="341" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">  catch { sleep(100ms); }</text>
  <text x="250" y="354" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">}</text>
  <text x="250" y="370" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Thundering herd problem</text>
  
  <!-- Exponential Backoff -->
  <text x="250" y="395" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">2. Exponential Backoff (Recommended)</text>
  <rect x="85" y="410" width="330" height="45" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="250" y="430" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">delay = baseDelay * 2^retryCount</text>
  <text x="250" y="443" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">sleep(delay + random_jitter)</text>
  <text x="250" y="456" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Example: 100ms, 200ms, 400ms, 800ms</text>
  <text x="250" y="472" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Spreads out retries</text>
  
  <!-- Retry with Jitter (Middle Right) -->
  <rect x="465" y="215" width="385" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="657" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Adding Jitter</text>
  
  <rect x="485" y="255" width="345" height="150" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <text x="657" y="280" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Why Jitter?</text>
  <text x="657" y="300" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Without jitter, all retries sync up</text>
  <text x="657" y="315" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Creates retry waves, more conflicts</text>
  
  <text x="657" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Full Jitter:</text>
  <text x="657" y="360" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">sleep(random(0, baseDelay * 2^retry))</text>
  
  <text x="657" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Equal Jitter:</text>
  <text x="657" y="405" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">sleep(baseDelay * 2^retry / 2 + random(0, half))</text>
  
  <!-- Best Practices (Bottom) -->
  <rect x="50" y="425" width="800" height="110" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Best Practices</text>
  
  <rect x="70" y="465" width="180" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Set Max Retries</text>
  <text x="160" y="502" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Prevent infinite loops</text>
  <text x="160" y="515" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Typically 3-5 retries</text>
  
  <rect x="265" y="465" width="180" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="355" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Make Idempotent</text>
  <text x="355" y="502" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Safe to retry multiple times</text>
  <text x="355" y="515" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">No duplicate effects</text>
  
  <rect x="460" y="465" width="180" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="550" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Log Retries</text>
  <text x="550" y="502" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Monitor retry rates</text>
  <text x="550" y="515" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Alert on high rates</text>
  
  <rect x="655" y="465" width="180" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="745" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Circuit Breaker</text>
  <text x="745" y="502" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Stop retrying if failing</text>
  <text x="745" y="515" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Give system time to recover</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>