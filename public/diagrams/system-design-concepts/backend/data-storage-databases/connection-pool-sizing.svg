<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Connection Pool Sizing</title>
  <desc id="desc">How to size connection pools correctly</desc>
  
  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Connection Pool Sizing</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Finding the Optimal Pool Size</text>
  
  <rect x="50" y="85" width="400" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Pool Sizing Formula</text>
  <rect x="70" y="125" width="360" height="130" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">pool_size = ((core_count * 2) + effective_spindle_count)</text>
  <text x="250" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#1f2937">Example: 8 CPU cores, SSD (effective_spindle=1)</text>
  <text x="250" y="185" text-anchor="middle" font-size="9" font-weight="600" fill="#1f2937">pool_size = (8 * 2) + 1 = 17 connections</text>
  <text x="250" y="210" text-anchor="middle" font-size="9" font-weight="700" fill="#0369a1">Alternative: pool_size = max_concurrent_requests * avg_query_time / available_time</text>
  <text x="250" y="230" text-anchor="middle" font-size="9" font-weight="600" fill="#1f2937">Start small, monitor, adjust based on metrics</text>
  <text x="250" y="245" text-anchor="middle" font-size="9" font-weight="600" fill="#1f2937">Too small = queueing, too large = contention</text>
  
  <rect x="465" y="85" width="385" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Sizing Factors</text>
  <rect x="485" y="125" width="345" height="130" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="500" y="150" text-anchor="start" font-size="9" font-weight="700" fill="#92400e">Factors to Consider:</text>
  <text x="500" y="170" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• CPU cores on database server</text>
  <text x="500" y="185" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• Query complexity (simple vs complex)</text>
  <text x="500" y="200" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• Average query duration</text>
  <text x="500" y="215" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• Network latency</text>
  <text x="500" y="230" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• Connection validation overhead</text>
  <text x="500" y="245" text-anchor="start" font-size="8" font-weight="700" fill="#059669">Rule: Start with (CPU * 2 + 1), monitor, adjust</text>
  
  <rect x="50" y="275" width="800" height="140" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Too Small vs Too Large</text>
  
  <rect x="70" y="315" width="360" height="90" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="250" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Pool Too Small</text>
  <text x="250" y="355" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Requests queue waiting for connections</text>
  <text x="250" y="370" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• High latency, timeout errors</text>
  <text x="250" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Underutilized database</text>
  <text x="250" y="400" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">Symptom: Connection wait time high</text>
  
  <rect x="445" y="315" width="360" height="90" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="625" y="335" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Pool Too Large</text>
  <text x="625" y="355" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Too many connections to database</text>
  <text x="625" y="370" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Context switching overhead</text>
  <text x="625" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Database resource contention</text>
  <text x="625" y="400" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">Symptom: DB CPU high, queries slower</text>
  
  <rect x="50" y="425" width="800" height="110" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">Monitoring &amp; Tuning</text>
  <rect x="70" y="465" width="760" height="60" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="450" y="485" text-anchor="middle" font-size="9" font-weight="600" fill="#1f2937">Monitor: active connections, wait time, pool utilization, query duration, connection validation failures</text>
  <text x="450" y="500" text-anchor="middle" font-size="9" font-weight="600" fill="#1f2937">Tune: Increase if wait time high, decrease if DB CPU high, set max_connections to prevent exhaustion</text>
  <text x="450" y="515" text-anchor="middle" font-size="9" font-weight="700" fill="#0369a1">Best Practice: Set pool max &lt; DB max_connections, leave 20% headroom for admin connections</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>