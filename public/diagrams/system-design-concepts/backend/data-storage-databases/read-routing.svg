  <text x="60" y="70" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1f2937">Read Routing</text>

  <rect x="80" y="160" width="200" height="120" rx="14" fill="#e2e8f0" stroke="#cbd5f5"/>
