<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">CAP Theorem Triangle</title>
  <desc id="desc">CAP theorem showing Consistency, Availability, and Partition Tolerance trade-offs</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">CAP Theorem</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">You can only have 2 of 3 during network partition</text>
  
  <!-- CAP Triangle -->
  <polygon points="450,100 200,400 700,400" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  
  <!-- Consistency vertex -->
  <circle cx="450" cy="100" r="50" fill="#3b82f6" stroke="#1e40af" stroke-width="3"/>
  <text x="450" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="white">C</text>
  <text x="450" y="165" text-anchor="middle" font-size="10" fill="#1e40af">Consistency</text>
  <text x="450" y="180" text-anchor="middle" font-size="8" fill="#64748b">All nodes see</text>
  <text x="450" y="192" text-anchor="middle" font-size="8" fill="#64748b">same data</text>
  
  <!-- Availability vertex -->
  <circle cx="200" cy="400" r="50" fill="#10b981" stroke="#059669" stroke-width="3"/>
  <text x="200" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="white">A</text>
  <text x="200" y="465" text-anchor="middle" font-size="10" fill="#059669">Availability</text>
  <text x="200" y="480" text-anchor="middle" font-size="8" fill="#64748b">Every request</text>
  <text x="200" y="492" text-anchor="middle" font-size="8" fill="#64748b">gets response</text>
  
  <!-- Partition Tolerance vertex -->
  <circle cx="700" cy="400" r="50" fill="#f59e0b" stroke="#b45309" stroke-width="3"/>
  <text x="700" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="white">P</text>
  <text x="700" y="465" text-anchor="middle" font-size="10" fill="#b45309">Partition Tolerance</text>
  <text x="700" y="480" text-anchor="middle" font-size="8" fill="#64748b">Works despite</text>
  <text x="700" y="492" text-anchor="middle" font-size="8" fill="#64748b">network failures</text>
  
  <!-- Edge labels -->
  <text x="320" y="245" text-anchor="middle" font-size="9" fill="#64748b">CP: Consistent + Partition-tolerant</text>
  <text x="580" y="245" text-anchor="middle" font-size="9" fill="#64748b">AP: Available + Partition-tolerant</text>
  <text x="450" y="420" text-anchor="middle" font-size="9" fill="#64748b">CA: Not possible in distributed systems</text>
  
  <!-- Partition scenario -->
  <rect x="50" y="250" width="380" height="180" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="240" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">During Network Partition</text>
  
  <!-- CP choice -->
  <rect x="70" y="290" width="160" height="120" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="150" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#3b82f6">Choose CP</text>
  <text x="150" y="335" text-anchor="middle" font-size="8" fill="#64748b">Block writes on minority</text>
  <text x="150" y="350" text-anchor="middle" font-size="8" fill="#64748b">Maintain consistency</text>
  <text x="150" y="365" text-anchor="middle" font-size="8" fill="#ef4444">Sacrifice availability</text>
  <text x="150" y="385" text-anchor="middle" font-size="8" fill="#64748b">Examples: MongoDB,</text>
  <text x="150" y="397" text-anchor="middle" font-size="8" fill="#64748b">PostgreSQL, Spanner</text>
  
  <!-- AP choice -->
  <rect x="250" y="290" width="160" height="120" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="330" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#10b981">Choose AP</text>
  <text x="330" y="335" text-anchor="middle" font-size="8" fill="#64748b">Accept writes everywhere</text>
  <text x="330" y="350" text-anchor="middle" font-size="8" fill="#64748b">Stay available</text>
  <text x="330" y="365" text-anchor="middle" font-size="8" fill="#ef4444">Sacrifice consistency</text>
  <text x="330" y="385" text-anchor="middle" font-size="8" fill="#64748b">Examples: Cassandra,</text>
  <text x="330" y="397" text-anchor="middle" font-size="8" fill="#64748b">DynamoDB, DNS</text>
  
  <!-- Important note -->
  <rect x="450" y="250" width="400" height="180" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="650" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#0369a1">Important: P is NOT Optional</text>
  
  <rect x="470" y="290" width="360" height="130" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="650" y="320" text-anchor="middle" font-size="9" fill="#64748b">In distributed systems, network partitions WILL happen.</text>
  <text x="650" y="335" text-anchor="middle" font-size="9" fill="#64748b">You cannot opt out of partition tolerance.</text>
  <text x="650" y="355" text-anchor="middle" font-size="9" fill="#0369a1">The real choice is: CP or AP (not CA)</text>
  <text x="650" y="380" text-anchor="middle" font-size="8" fill="#64748b">CA systems are single-node (not distributed)</text>
  <text x="650" y="395" text-anchor="middle" font-size="8" fill="#64748b">During normal operation, you can have all three</text>
  <text x="650" y="410" text-anchor="middle" font-size="8" fill="#64748b">The trade-off only applies DURING partition</text>
  
  <!-- Key takeaway -->
  <rect x="50" y="445" width="800" height="85" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Key Takeaway</text>
  <rect x="70" y="480" width="760" height="40" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="500" text-anchor="middle" font-size="9" fill="#64748b">CAP is often misunderstood as "pick 2 of 3 permanently." The truth: during normal operation, well-designed systems provide all three.</text>
  <text x="450" y="515" text-anchor="middle" font-size="9" fill="#64748b">The choice is forced ONLY when network partition occurs—then you must choose between C and A.</text>
</svg>