<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Triggers Architecture</title>
  <desc id="desc">Database triggers showing BEFORE, AFTER, INSTEAD OF execution flow</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Triggers Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">BEFORE, AFTER, and INSTEAD OF Trigger Execution</text>
  
  <!-- BEFORE Trigger (Top Left) -->
  <rect x="50" y="85" width="260" height="200" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">BEFORE Trigger</text>
  
  <rect x="65" y="125" width="230" height="150" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <!-- Flow -->
  <rect x="80" y="140" width="200" height="30" rx="3" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="180" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">1. INSERT/UPDATE/DELETE</text>
  
  <line x1="180" y1="175" x2="180" y2="195" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="80" y="200" width="200" height="30" rx="3" fill="#fbbf24" stroke="#b45309" stroke-width="2"/>
  <text x="180" y="220" text-anchor="middle" font-size="8" font-weight="700" fill="#78350f">2. BEFORE Trigger Fires</text>
  
  <line x1="180" y1="235" x2="180" y2="255" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="80" y="260" width="200" height="30" rx="3" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="180" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">3. Execute Operation (if valid)</text>
  
  <text x="180" y="305" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Use: Validation, modify data before save</text>
  
  <!-- AFTER Trigger (Top Middle) -->
  <rect x="320" y="85" width="260" height="200" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">AFTER Trigger</text>
  
  <rect x="335" y="125" width="230" height="150" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <!-- Flow -->
  <rect x="350" y="140" width="200" height="30" rx="3" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="450" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">1. INSERT/UPDATE/DELETE</text>
  
  <line x1="450" y1="175" x2="450" y2="195" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="350" y="200" width="200" height="30" rx="3" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="450" y="220" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">2. Execute Operation</text>
  
  <line x1="450" y1="235" x2="450" y2="255" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="350" y="260" width="200" height="30" rx="3" fill="#fbbf24" stroke="#b45309" stroke-width="2"/>
  <text x="450" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#78350f">3. AFTER Trigger Fires</text>
  
  <text x="450" y="305" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Use: Audit logging, notifications</text>
  
  <!-- INSTEAD OF Trigger (Top Right) -->
  <rect x="590" y="85" width="260" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">INSTEAD OF Trigger</text>
  
  <rect x="605" y="125" width="230" height="150" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <!-- Flow -->
  <rect x="620" y="140" width="200" height="30" rx="3" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="720" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">1. INSERT/UPDATE/DELETE on View</text>
  
  <line x1="720" y1="175" x2="720" y2="195" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="620" y="200" width="200" height="30" rx="3" fill="#fbbf24" stroke="#b45309" stroke-width="2"/>
  <text x="720" y="220" text-anchor="middle" font-size="8" font-weight="700" fill="#78350f">2. INSTEAD OF Trigger Fires</text>
  
  <line x1="720" y1="235" x2="720" y2="255" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="620" y="260" width="200" height="30" rx="3" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="720" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">3. Custom Logic (replaces operation)</text>
  
  <text x="720" y="305" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Use: Make views updatable</text>
  
  <!-- Trigger Execution Levels (Bottom) -->
  <rect x="50" y="295" width="800" height="240" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Trigger Execution Levels</text>
  
  <!-- ROW Level -->
  <rect x="70" y="335" width="360" height="190" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="250" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2937">ROW Level (FOR EACH ROW)</text>
  
  <text x="250" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Executes once per affected row:</text>
  
  <!-- Example -->
  <rect x="85" y="400" width="330" height="115" rx="3" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="250" y="420" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">UPDATE orders SET status = 'shipped' WHERE date = '2024-01-15'</text>
  <text x="250" y="435" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ 100 rows match</text>
  <text x="250" y="450" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ Trigger fires 100 times (once per row)</text>
  <text x="250" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ Can access OLD and NEW values</text>
  <text x="250" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ NEW.status = 'shipped', OLD.status = 'pending'</text>
  <text x="250" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Use: Per-row validation, audit logging</text>
  
  <!-- STATEMENT Level -->
  <rect x="445" y="335" width="360" height="190" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="625" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2937">STATEMENT Level</text>
  
  <text x="625" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Executes once per statement:</text>
  
  <!-- Example -->
  <rect x="460" y="400" width="330" height="115" rx="3" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="625" y="420" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">UPDATE orders SET status = 'shipped' WHERE date = '2024-01-15'</text>
  <text x="625" y="435" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ 100 rows match</text>
  <text x="625" y="450" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ Trigger fires 1 time (once per statement)</text>
  <text x="625" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ Cannot access individual row values</text>
  <text x="625" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ Good for statement-level logging</text>
  <text x="625" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Use: Statement logging, bulk operations</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>