<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">ORM Performance Issues</title>
  <desc id="desc">N+1 query problem, lazy vs eager loading, and optimization techniques</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">ORM Performance Issues</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">N+1 Problem and Optimization Techniques</text>
  
  <!-- N+1 Query Problem (Top Left) -->
  <rect x="50" y="85" width="400" height="200" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">N+1 Query Problem</text>
  
  <rect x="70" y="125" width="360" height="150" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  
  <!-- Code example -->
  <text x="250" y="150" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">Problem Code:</text>
  <text x="250" y="170" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">users = User.all()  # 1 query</text>
  <text x="250" y="185" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">for user in users:</text>
  <text x="250" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">  print(user.orders)  # N queries (one per user)</text>
  
  <text x="250" y="225" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">Result: 1 + N queries</text>
  <text x="250" y="240" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">100 users = 101 queries!</text>
  <text x="250" y="255" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Very slow for large datasets</text>
  
  <text x="250" y="275" text-anchor="middle" font-size="8" font-weight="700" fill="#dc2626">✗ Most common ORM performance issue</text>
  
  <!-- Solution: Eager Loading (Top Right) -->
  <rect x="465" y="85" width="385" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Solution: Eager Loading</text>
  
  <rect x="485" y="125" width="345" height="150" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <text x="657" y="150" text-anchor="middle" font-size="8" font-weight="700" fill="#065f46">Fixed Code:</text>
  <text x="657" y="170" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">users = User.includes(:orders).all  # 2 queries total</text>
  <text x="657" y="185" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937"># Query 1: SELECT * FROM users</text>
  <text x="657" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937"># Query 2: SELECT * FROM orders WHERE user_id IN (...)</text>
  
  <text x="657" y="225" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">Result: 2 queries (regardless of N)</text>
  <text x="657" y="240" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">100 users = 2 queries!</text>
  <text x="657" y="255" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Much faster</text>
  
  <text x="657" y="275" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Use includes/join for relationships</text>
  
  <!-- Lazy vs Eager Loading (Bottom) -->
  <rect x="50" y="295" width="800" height="240" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Lazy Loading vs Eager Loading</text>
  
  <!-- Lazy Loading -->
  <rect x="70" y="335" width="360" height="190" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Lazy Loading (Default)</text>
  
  <text x="250" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Loads related data on first access</text>
  <text x="250" y="400" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• user.orders triggers query when accessed</text>
  <text x="250" y="415" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Good when you don't always need related data</text>
  
  <text x="250" y="445" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Saves memory/queries when not needed</text>
  <text x="250" y="460" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ N+1 problem if used in loops</text>
  <text x="250" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: Single object access, optional relationships</text>
  
  <!-- Eager Loading -->
  <rect x="445" y="335" width="360" height="190" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="625" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Eager Loading</text>
  
  <text x="625" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Loads related data upfront</text>
  <text x="625" y="400" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• user.orders already loaded (no extra query)</text>
  <text x="625" y="415" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Good when you always need related data</text>
  
  <text x="625" y="445" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Prevents N+1, predictable queries</text>
  <text x="625" y="460" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Loads data even if not used</text>
  <text x="625" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: Lists, iterations, always-needed relationships</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>