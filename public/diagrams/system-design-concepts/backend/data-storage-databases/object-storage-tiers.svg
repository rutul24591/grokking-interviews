<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Object Storage Tiers</title>
  <desc id="desc">Storage tiers and lifecycle management for object storage</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Object Storage Tiers</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Hot, Cool, Cold, and Archive Tiers</text>
  
  <!-- Storage Tiers (Top) -->
  <rect x="50" y="85" width="800" height="200" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Storage Tiers by Access Frequency</text>
  
  <!-- Hot Tier -->
  <rect x="70" y="125" width="180" height="150" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="160" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">Hot Tier</text>
  <text x="160" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Frequent access</text>
  <text x="160" y="185" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Low latency (ms)</text>
  <text x="160" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Highest cost/GB</text>
  <text x="160" y="215" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Active data</text>
  <text x="160" y="235" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Example: Website assets</text>
  <text x="160" y="255" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">User-uploaded photos</text>
  <text x="160" y="270" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">$$$</text>
  
  <!-- Cool Tier -->
  <rect x="265" y="125" width="180" height="150" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="355" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Cool Tier</text>
  <text x="355" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Infrequent access</text>
  <text x="355" y="185" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Moderate latency</text>
  <text x="355" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Lower cost/GB</text>
  <text x="355" y="215" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">30+ days old</text>
  <text x="355" y="235" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Example: Old backups</text>
  <text x="355" y="255" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Quarterly reports</text>
  <text x="355" y="270" text-anchor="middle" font-size="7" font-weight="700" fill="#d97706">$$</text>
  
  <!-- Cold Tier -->
  <rect x="460" y="125" width="180" height="150" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="550" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Cold Tier</text>
  <text x="550" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Rare access</text>
  <text x="550" y="185" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Higher latency</text>
  <text x="550" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Low cost/GB</text>
  <text x="550" y="215" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">90+ days old</text>
  <text x="550" y="235" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Example: Year-old logs</text>
  <text x="550" y="255" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Compliance archives</text>
  <text x="550" y="270" text-anchor="middle" font-size="7" font-weight="700" fill="#2563eb">$</text>
  
  <!-- Archive Tier -->
  <rect x="655" y="125" width="180" height="150" rx="4" fill="#e0e7ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="745" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#6d28d9">Archive Tier</text>
  <text x="745" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Long-term retention</text>
  <text x="745" y="185" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Hours to retrieve</text>
  <text x="745" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Lowest cost/GB</text>
  <text x="745" y="215" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">180+ days old</text>
  <text x="745" y="235" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Example: Legal holds</text>
  <text x="745" y="255" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Tax records (7+ years)</text>
  <text x="745" y="270" text-anchor="middle" font-size="7" font-weight="700" fill="#6d28d9">¢</text>
  
  <!-- Lifecycle Management (Bottom) -->
  <rect x="50" y="295" width="800" height="240" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Lifecycle Management (Automatic Transitions)</text>
  
  <!-- Timeline -->
  <line x1="100" y1="380" x2="800" y2="380" stroke="#374151" stroke-width="2"/>
  
  <!-- Time markers -->
  <text x="100" y="400" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Day 0</text>
  <text x="300" y="400" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Day 30</text>
  <text x="500" y="400" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Day 90</text>
  <text x="700" y="400" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Day 180</text>
  
  <!-- Transition arrows -->
  <rect x="100" y="365" width="190" height="30" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="195" y="385" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">Hot</text>
  
  <line x1="295" y1="380" x2="305" y2="380" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="305" y="365" width="190" height="30" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="385" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Cool</text>
  
  <line x1="495" y1="380" x2="505" y2="380" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="505" y="365" width="190" height="30" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="600" y="385" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Cold</text>
  
  <line x1="695" y1="380" x2="705" y2="380" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="705" y="365" width="90" height="30" rx="3" fill="#e0e7ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="750" y="385" text-anchor="middle" font-size="8" font-weight="700" fill="#6d28d9">Archive</text>
  
  <!-- Lifecycle Rules -->
  <rect x="100" y="420" width="700" height="100" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  
  <text x="450" y="445" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Lifecycle Rules Example:</text>
  <text x="115" y="465" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• Day 0: Upload to Hot tier (frequent access)</text>
  <text x="115" y="480" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• Day 30: Transition to Cool (infrequent access)</text>
  <text x="115" y="495" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• Day 90: Transition to Cold (rare access)</text>
  <text x="115" y="510" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• Day 180: Transition to Archive (long-term retention)</text>
  <text x="115" y="525" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">• Day 365: Delete (retention period expired)</text>
  
  <!-- Key Benefits -->
  <rect x="100" y="535" text-anchor="middle" font-size="0" fill="none" stroke="none"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>