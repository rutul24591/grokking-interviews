<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">File System Architecture</title>
  <desc id="desc">Hierarchical namespace, POSIX semantics, and NFS/SMB protocols</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">File System Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Hierarchical Namespace and POSIX Semantics</text>
  
  <!-- Hierarchical Structure (Top) -->
  <rect x="50" y="85" width="800" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Hierarchical Directory Structure</text>
  
  <!-- Root -->
  <rect x="380" y="125" width="140" height="35" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="450" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">/ (Root)</text>
  
  <!-- Level 1 -->
  <line x1="410" y1="165" x2="250" y2="190" stroke="#374151" stroke-width="2"/>
  <line x1="450" y1="165" x2="450" y2="190" stroke="#374151" stroke-width="2"/>
  <line x1="490" y1="165" x2="650" y2="190" stroke="#374151" stroke-width="2"/>
  
  <rect x="180" y="190" width="140" height="35" rx="4" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="213" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">/home</text>
  
  <rect x="380" y="190" width="140" height="35" rx="4" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="450" y="213" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">/var</text>
  
  <rect x="580" y="190" width="140" height="35" rx="4" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="650" y="213" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">/etc</text>
  
  <!-- Level 2 -->
  <line x1="210" y1="230" x2="150" y2="250" stroke="#374151" stroke-width="1"/>
  <line x1="250" y1="230" x2="250" y2="250" stroke="#374151" stroke-width="1"/>
  <line x1="290" y1="230" x2="350" y2="250" stroke="#374151" stroke-width="1"/>
  
  <rect x="100" y="250" width="100" height="30" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="150" y="270" text-anchor="middle" font-size="8" font-weight="600" fill="#1e3a8a">/home/user</text>
  
  <rect x="210" y="250" width="100" height="30" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="260" y="270" text-anchor="middle" font-size="8" font-weight="600" fill="#1e3a8a">/home/admin</text>
  
  <rect x="320" y="250" width="100" height="30" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="370" y="270" text-anchor="middle" font-size="8" font-weight="600" fill="#1e3a8a">/var/log</text>
  
  <rect x="430" y="250" width="100" height="30" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="480" y="270" text-anchor="middle" font-size="8" font-weight="600" fill="#1e3a8a">/var/data</text>
  
  <!-- File -->
  <rect x="320" y="290" width="100" height="25" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="370" y="307" text-anchor="middle" font-size="7" font-weight="600" fill="#15803d">app.log</text>
  
  <text x="650" y="270" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Path: /home/user/documents/file.txt</text>
  <text x="650" y="285" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Parent-child relationships</text>
  
  <!-- POSIX Semantics (Bottom Left) -->
  <rect x="50" y="275" width="400" height="160" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="250" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">POSIX Semantics</text>
  
  <rect x="70" y="315" width="360" height="110" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <text x="250" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Standard File Operations:</text>
  <text x="250" y="360" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• read() - Read from file at offset</text>
  <text x="250" y="375" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• write() - Write to file at offset</text>
  <text x="250" y="390" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• seek() - Move file pointer</text>
  <text x="250" y="405" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• append() - Add to end of file</text>
  <text x="250" y="420" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• File locking (flock, fcntl)</text>
  
  <!-- Protocols (Bottom Right) -->
  <rect x="465" y="275" width="385" height="160" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="657" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Network File System Protocols</text>
  
  <rect x="485" y="315" width="345" height="110" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <text x="657" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">NFS (Network File System):</text>
  <text x="657" y="360" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Unix/Linux standard</text>
  <text x="657" y="375" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Stateful protocol</text>
  <text x="657" y="390" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• NFSv4: improved security</text>
  
  <text x="657" y="415" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">SMB/CIFS (Server Message Block):</text>
  <text x="657" y="435" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Windows standard</text>
  <text x="657" y="450" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Cross-platform support</text>
  <text x="657" y="465" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Active Directory integration</text>
  
  <!-- File System Types (Bottom) -->
  <rect x="50" y="445" width="800" height="90" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2937">File System Types</text>
  
  <rect x="70" y="485" width="240" height="40" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="190" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Local: ext4, XFS, NTFS (single machine)</text>
  
  <rect x="325" y="485" width="240" height="40" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="445" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Network: NFS, SMB/CIFS (shared over network)</text>
  
  <rect x="580" y="485" width="240" height="40" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="700" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Distributed: HDFS, Ceph, GlusterFS (scale-out)</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>