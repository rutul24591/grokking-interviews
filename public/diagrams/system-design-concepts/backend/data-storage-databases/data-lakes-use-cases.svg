<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Data Lakes Use Cases</title>
  <desc id="desc">When to use data lakes and real-world examples</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Data Lakes Use Cases</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">When to Use Data Lakes</text>
  
  <!-- Ideal Use Cases (Left Column) -->
  <rect x="50" y="85" width="400" height="280" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Ideal Use Cases</text>
  
  <!-- Use Case 1: ML/AI -->
  <rect x="70" y="125" width="170" height="105" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="155" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Machine Learning</text>
  <text x="155" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Training data storage</text>
  <text x="155" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Feature stores</text>
  <text x="155" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Model artifacts</text>
  <text x="155" y="204" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Diverse data formats</text>
  <text x="155" y="217" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Schema flexibility</text>
  <text x="155" y="230" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Spark, TensorFlow input</text>
  
  <!-- Use Case 2: Data Exploration -->
  <rect x="255" y="125" width="170" height="105" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="340" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Data Exploration</text>
  <text x="340" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Raw data access</text>
  <text x="340" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Ad-hoc queries</text>
  <text x="340" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Hypothesis testing</text>
  <text x="340" y="204" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Data discovery</text>
  <text x="340" y="217" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• No schema upfront</text>
  <text x="340" y="230" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Schema-on-read</text>
  
  <!-- Use Case 3: Log Analytics -->
  <rect x="70" y="240" width="170" height="115" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="155" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Log Analytics</text>
  <text x="155" y="280" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Application logs</text>
  <text x="155" y="293" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• System metrics</text>
  <text x="155" y="306" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• ELK stack input</text>
  <text x="155" y="319" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Historical analysis</text>
  <text x="155" y="332" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Compliance auditing</text>
  <text x="155" y="345" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Centralized log storage</text>
  
  <!-- Use Case 4: IoT -->
  <rect x="255" y="240" width="170" height="115" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="340" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">IoT &amp; Sensor Data</text>
  <text x="340" y="280" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• High-volume streams</text>
  <text x="340" y="293" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Time-series data</text>
  <text x="340" y="306" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Event ingestion</text>
  <text x="340" y="319" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Real-time processing</text>
  <text x="340" y="332" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Batch + streaming</text>
  <text x="340" y="345" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Massive scale ingestion</text>
  
  <!-- When NOT to Use (Right Column) -->
  <rect x="465" y="85" width="385" height="280" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">When NOT to Use Data Lakes</text>
  
  <!-- Anti-Pattern 1: No Governance -->
  <rect x="485" y="125" width="170" height="105" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="570" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">No Governance Framework</text>
  <text x="570" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Becomes "data swamp"</text>
  <text x="570" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• No data catalog</text>
  <text x="570" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• No quality checks</text>
  <text x="570" y="204" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Unusable data</text>
  <text x="570" y="217" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Use data warehouse</text>
  <text x="570" y="230" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Govern before building</text>
  
  <!-- Anti-Pattern 2: BI Only -->
  <rect x="670" y="125" width="170" height="105" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="755" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">BI/Reporting Only</text>
  <text x="755" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Structured data only</text>
  <text x="755" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Consistent metrics</text>
  <text x="755" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Executive dashboards</text>
  <text x="755" y="204" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• No raw data needed</text>
  <text x="755" y="217" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Use data warehouse</text>
  <text x="755" y="230" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Use warehouse for BI</text>
  
  <!-- Anti-Pattern 3: Small Data -->
  <rect x="485" y="240" width="170" height="115" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="570" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Small Data Volume</text>
  <text x="570" y="280" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• &lt;1 TB total</text>
  <text x="570" y="293" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Single source</text>
  <text x="570" y="306" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Simple queries</text>
  <text x="570" y="319" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• No ML needs</text>
  <text x="570" y="332" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Use traditional DB</text>
  <text x="570" y="345" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Over-engineering</text>
  
  <!-- Anti-Pattern 4: Real-Time Only -->
  <rect x="670" y="240" width="170" height="115" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="755" y="260" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Only Real-Time Queries</text>
  <text x="755" y="280" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Sub-second latency</text>
  <text x="755" y="293" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• OLTP workloads</text>
  <text x="755" y="306" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Transactions needed</text>
  <text x="755" y="319" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Use operational DB</text>
  <text x="755" y="332" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Lakes are batch-focused</text>
  <text x="755" y="345" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Use operational DB</text>
  
  <!-- Real-World Examples (Bottom) -->
  <rect x="50" y="375" width="800" height="160" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Real-World Examples</text>
  
  <!-- Netflix -->
  <rect x="70" y="415" width="240" height="110" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="190" y="435" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Netflix: Analytics Lake</text>
  <text x="190" y="455" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• S3 as data lake storage</text>
  <text x="190" y="468" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Viewing events, logs</text>
  <text x="190" y="481" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• ML model training</text>
  <text x="190" y="494" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• A/B testing analysis</text>
  <text x="190" y="507" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Result: Data-driven content</text>
  
  <!-- LinkedIn -->
  <rect x="325" y="415" width="240" height="110" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="445" y="435" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">LinkedIn: Hadoop Lake</text>
  <text x="445" y="455" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Petabyte-scale HDFS</text>
  <text x="445" y="468" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• User activity events</text>
  <text x="445" y="481" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Recommendation training</text>
  <text x="445" y="494" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Spark processing</text>
  <text x="445" y="507" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Result: People you may know</text>
  
  <!-- Airbnb -->
  <rect x="580" y="415" width="240" height="110" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="700" y="435" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Airbnb: Data Platform</text>
  <text x="700" y="455" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• S3 + Athena/Redshift</text>
  <text x="700" y="468" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Booking events, logs</text>
  <text x="700" y="481" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Price optimization ML</text>
  <text x="700" y="494" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Self-service analytics</text>
  <text x="700" y="507" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Result: Data-driven pricing</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>