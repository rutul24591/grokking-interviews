<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Index Selection Framework</title>
  <desc id="desc">Decision framework for choosing the right index type</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Index Selection Framework</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Choosing the Right Index for Your Query Pattern</text>
  
  <!-- Query Pattern Analysis (Top) -->
  <rect x="50" y="85" width="800" height="120" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Step 1: Analyze Query Pattern</text>
  
  <!-- Equality Query -->
  <rect x="70" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Equality (WHERE id = ?)</text>
  <text x="160" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">→ Hash Index (O(1))</text>
  <text x="160" y="180" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">→ B-Tree (O(log n))</text>
  
  <!-- Range Query -->
  <rect x="265" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="355" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Range (WHERE date BETWEEN)</text>
  <text x="355" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">→ B-Tree Index</text>
  <text x="355" y="180" text-anchor="middle" font-size="8" font-weight="600" fill="#b91c1c">✗ Hash (no range support)</text>
  
  <!-- Multi-Column Query -->
  <rect x="460" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="550" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Multi-Column (WHERE a=? AND b=?)</text>
  <text x="550" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">→ Composite Index (a,b)</text>
  <text x="550" y="180" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Order: equality first</text>
  
  <!-- Array/JSON Query -->
  <rect x="655" y="125" width="180" height="70" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="745" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Array/JSON (tags @&gt; ?)</text>
  <text x="745" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">→ GIN Index</text>
  <text x="745" y="180" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">For containment queries</text>
  
  <!-- Index Type Decision Tree (Middle) -->
  <rect x="50" y="215" width="800" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Step 2: Choose Index Type</text>
  
  <!-- B-Tree Path -->
  <rect x="70" y="255" width="240" height="130" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="190" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">B-Tree (Default)</text>
  <text x="190" y="305" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Use when:</text>
  <text x="190" y="320" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Range queries (BETWEEN, &gt;, &lt;)</text>
  <text x="190" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• ORDER BY / GROUP BY</text>
  <text x="190" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Prefix pattern matching (LIKE 'abc%')</text>
  <text x="190" y="368" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Most common, versatile</text>
  
  <!-- Hash Path -->
  <rect x="325" y="255" width="240" height="130" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="445" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Hash Index</text>
  <text x="445" y="305" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Use when:</text>
  <text x="445" y="320" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Exact equality only (=)</text>
  <text x="445" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• No range queries needed</text>
  <text x="445" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• High-performance lookups</text>
  <text x="445" y="368" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ O(1) lookup time</text>
  
  <!-- GIN Path -->
  <rect x="580" y="255" width="240" height="130" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="700" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">GIN Index</text>
  <text x="700" y="305" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Use when:</text>
  <text x="700" y="320" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Array containment (@&gt;, &lt;@)</text>
  <text x="700" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• JSON/JSONB queries</text>
  <text x="700" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Full-text search (tsvector)</text>
  <text x="700" y="368" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Complex data types</text>
  
  <!-- Performance Comparison (Bottom Left) -->
  <rect x="50" y="405" width="400" height="130" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="250" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Performance Comparison</text>
  
  <rect x="70" y="445" width="360" height="80" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  
  <text x="250" y="470" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">1M rows, lookup time:</text>
  
  <text x="85" y="490" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Hash:    ~0.01ms (O(1))</text>
  <rect x="180" y="483" width="40" height="12" rx="2" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  
  <text x="85" y="508" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">B-Tree:  ~0.1ms (O(log n))</text>
  <rect x="180" y="501" width="60" height="12" rx="2" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  
  <text x="85" y="526" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Seq Scan: ~50ms (O(n))</text>
  <rect x="180" y="519" width="240" height="12" rx="2" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>
  
  <!-- Best Practices (Bottom Right) -->
  <rect x="465" y="405" width="385" height="130" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="657" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Best Practices</text>
  
  <rect x="485" y="445" width="345" height="80" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  
  <text x="500" y="465" text-anchor="start" font-size="8" font-weight="700" fill="#1f2937">✓ Start with B-Tree (works for most cases)</text>
  <text x="500" y="480" text-anchor="start" font-size="8" font-weight="700" fill="#1f2937">✓ Use EXPLAIN ANALYZE to verify index usage</text>
  <text x="500" y="495" text-anchor="start" font-size="8" font-weight="700" fill="#1f2937">✓ Monitor pg_stat_user_indexes for unused indexes</text>
  <text x="500" y="510" text-anchor="start" font-size="8" font-weight="700" fill="#1f2937">✗ Avoid over-indexing (write overhead)</text>
  <text x="500" y="525" text-anchor="start" font-size="8" font-weight="700" fill="#1f2937">✗ Don't index low-cardinality columns (gender)</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>