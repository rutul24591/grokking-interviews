<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Time Series vs Column-Family Databases</title>
  <desc id="desc">Comparison between time series databases and column-family stores</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Time Series vs Column-Family Databases</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Choosing Between Specialized vs General-Purpose Stores</text>
  
  <!-- Time Series Database (Left) -->
  <rect x="50" y="85" width="380" height="280" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Time Series Database (TSDB)</text>
  
  <rect x="70" y="125" width="340" height="230" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <!-- TSDB Characteristics -->
  <text x="240" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Specialized for Time-Stamped Data</text>
  
  <text x="240" y="175" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Strengths:</text>
  <text x="240" y="192" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Time-based aggregations (AVG, MAX, MIN)</text>
  <text x="240" y="207" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Downsampling &amp; retention policies</text>
  <text x="240" y="222" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Continuous queries (auto-aggregation)</text>
  <text x="240" y="237" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Time-range queries optimized</text>
  <text x="240" y="252" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Gorilla compression (10:1 ratio)</text>
  <text x="240" y="267" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Built-in functions (rate, derivative)</text>
  
  <text x="240" y="295" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">Limitations:</text>
  <text x="240" y="312" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✗ Time-series data only</text>
  <text x="240" y="327" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✗ Limited query flexibility</text>
  <text x="240" y="342" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✗ Not suitable for non-time data</text>
  
  <text x="240" y="365" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Examples:</text>
  <text x="240" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">InfluxDB, Prometheus, TimescaleDB, OpenTSDB</text>
  
  <!-- Column-Family Store (Right) -->
  <rect x="470" y="85" width="380" height="280" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Column-Family Store</text>
  
  <rect x="490" y="125" width="340" height="230" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <!-- CF Characteristics -->
  <text x="660" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">General-Purpose Wide-Column Store</text>
  
  <text x="660" y="175" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">Strengths:</text>
  <text x="660" y="192" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Flexible schema (varying columns)</text>
  <text x="660" y="207" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ High write throughput (sequential)</text>
  <text x="660" y="222" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Horizontal scaling (linear)</text>
  <text x="660" y="237" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Wide rows (millions of columns)</text>
  <text x="660" y="252" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Time-range queries (with design)</text>
  <text x="660" y="267" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ TTL per column/cell</text>
  
  <text x="660" y="295" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">Limitations:</text>
  <text x="660" y="312" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✗ No built-in aggregations</text>
  <text x="660" y="327" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✗ Manual downsampling</text>
  <text x="660" y="342" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✗ Query patterns fixed at design time</text>
  
  <text x="660" y="365" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Examples:</text>
  <text x="660" y="380" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Cassandra, HBase, ScyllaDB</text>
  
  <!-- Comparison Table (Middle) -->
  <rect x="50" y="375" width="800" height="160" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Feature Comparison</text>
  
  <!-- Header -->
  <rect x="70" y="410" width="180" height="25" rx="3" fill="#e0f2fe" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="427" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Feature</text>
  <rect x="260" y="410" width="180" height="25" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="427" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Time Series DB</text>
  <rect x="450" y="410" width="180" height="25" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="427" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Column-Family</text>
  <rect x="640" y="410" width="190" height="25" rx="3" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/>
  <text x="735" y="427" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2937">Winner</text>
  
  <!-- Row 1: Write Throughput -->
  <rect x="70" y="438" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="452" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Write Throughput</text>
  <rect x="260" y="438" width="180" height="20" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="452" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">1M+/sec/node</text>
  <rect x="450" y="438" width="180" height="20" rx="2" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="452" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">1M+/sec/node</text>
  <rect x="640" y="438" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="452" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Tie (both optimized)</text>
  
  <!-- Row 2: Aggregations -->
  <rect x="70" y="461" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="475" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Built-in Aggregations</text>
  <rect x="260" y="461" width="180" height="20" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="475" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">Yes (AVG, MAX, rate)</text>
  <rect x="450" y="461" width="180" height="20" rx="2" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="475" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">Limited/None</text>
  <rect x="640" y="461" width="190" height="20" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="735" y="475" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Time Series DB</text>
  
  <!-- Row 3: Downsampling -->
  <rect x="70" y="484" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="498" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Automatic Downsampling</text>
  <rect x="260" y="484" width="180" height="20" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="498" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">Yes (continuous queries)</text>
  <rect x="450" y="484" width="180" height="20" rx="2" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="498" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">Manual (custom code)</text>
  <rect x="640" y="484" width="190" height="20" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="735" y="498" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Time Series DB</text>
  
  <!-- Row 4: Schema Flexibility -->
  <rect x="70" y="507" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="521" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Schema Flexibility</text>
  <rect x="260" y="507" width="180" height="20" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="521" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">Fixed (measurement+tags)</text>
  <rect x="450" y="507" width="180" height="20" rx="2" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="521" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">Flexible (per row)</text>
  <rect x="640" y="507" width="190" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="735" y="521" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Column-Family</text>
  
  <!-- Decision Framework (Bottom) -->
  <rect x="50" y="540" width="800" height="0" rx="0" fill="none" stroke="none"/>
  
  <!-- Decision Guide -->
  <rect x="70" y="550" width="760" height="85" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="575" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">Decision Framework</text>
  
  <rect x="85" y="585" width="220" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="195" y="605" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Choose TSDB When:</text>
  <text x="195" y="618" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Metrics/monitoring, need aggregations</text>
  
  <rect x="320" y="585" width="220" height="40" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="430" y="605" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Choose Column-Family When:</text>
  <text x="430" y="618" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Flexible schema, messaging, wide rows</text>
  
  <rect x="555" y="585" width="260" height="40" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="685" y="605" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Hybrid Approach:</text>
  <text x="685" y="618" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">TSDB for metrics, CF for events/logs</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>