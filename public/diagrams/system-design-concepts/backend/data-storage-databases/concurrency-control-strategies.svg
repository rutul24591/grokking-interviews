<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Concurrency Control Strategies</title>
  <desc id="desc">Pessimistic, optimistic, and MVCC concurrency control</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Concurrency Control Strategies</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Pessimistic, Optimistic, and MVCC</text>
  
  <!-- Pessimistic (2PL) (Top Left) -->
  <rect x="50" y="85" width="260" height="200" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Pessimistic (2PL)</text>
  
  <rect x="65" y="125" width="230" height="150" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  
  <!-- T1 acquires lock -->
  <rect x="80" y="140" width="100" height="40" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="130" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">T1: LOCK row</text>
  <text x="130" y="175" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Exclusive lock</text>
  
  <!-- T2 blocked -->
  <rect x="80" y="190" width="100" height="40" rx="3" fill="#fca5a5" stroke="#dc2626" stroke-width="1"/>
  <text x="130" y="210" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">T2: WAIT</text>
  <text x="130" y="225" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Blocked until T1 commits</text>
  
  <!-- T1 commits -->
  <rect x="80" y="240" width="100" height="30" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="130" y="260" text-anchor="middle" font-size="7" font-weight="700" fill="#15803d">T1: COMMIT</text>
  
  <text x="180" y="285" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Prevents conflicts</text>
  <text x="180" y="298" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Reduced concurrency, deadlocks</text>
  
  <!-- Optimistic (Version-Based) (Top Middle) -->
  <rect x="320" y="85" width="260" height="200" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Optimistic (Version-Based)</text>
  
  <rect x="335" y="125" width="230" height="150" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <!-- T1 reads with version -->
  <rect x="350" y="140" width="100" height="35" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="160" text-anchor="middle" font-size="7" font-weight="700" fill="#92400e">T1: READ v1</text>
  <text x="400" y="172" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">version=1</text>
  
  <!-- T2 reads with version -->
  <rect x="350" y="185" width="100" height="35" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="205" text-anchor="middle" font-size="7" font-weight="700" fill="#92400e">T2: READ v1</text>
  <text x="400" y="217" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">version=1</text>
  
  <!-- T1 commits -->
  <rect x="350" y="230" width="100" height="25" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="400" y="247" text-anchor="middle" font-size="6" font-weight="700" fill="#15803d">T1: COMMIT v2</text>
  
  <!-- T2 commit fails -->
  <rect x="350" y="260" width="100" height="25" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="400" y="277" text-anchor="middle" font-size="6" font-weight="700" fill="#b91c1c">T2: FAIL (v1≠v2)</text>
  
  <text x="450" y="300" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ High concurrency, no locks</text>
  <text x="450" y="313" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Retries on conflict</text>
  
  <!-- MVCC (Top Right) -->
  <rect x="590" y="85" width="260" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">MVCC (Multi-Version)</text>
  
  <rect x="605" y="125" width="230" height="150" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <!-- Version chain -->
  <rect x="620" y="140" width="80" height="30" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="660" y="160" text-anchor="middle" font-size="7" font-weight="700" fill="#15803d">v1 (old)</text>
  <text x="660" y="172" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">T2,T3 see this</text>
  
  <line x1="705" y1="155" x2="725" y2="155" stroke="#374151" stroke-width="2"/>
  
  <rect x="730" y="140" width="80" height="30" rx="3" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <text x="770" y="160" text-anchor="middle" font-size="7" font-weight="700" fill="#065f46">v2 (current)</text>
  <text x="770" y="172" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">T1 sees this</text>
  
  <!-- Readers see snapshot -->
  <rect x="620" y="185" width="200" height="35" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="720" y="205" text-anchor="middle" font-size="7" font-weight="700" fill="#1e3a8a">Readers see snapshot at txn start</text>
  <text x="720" y="218" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">No blocking, no locks</text>
  
  <text x="720" y="250" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Best read concurrency</text>
  <text x="720" y="263" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Storage overhead, vacuum needed</text>
  
  <!-- Comparison Table (Bottom) -->
  <rect x="50" y="295" width="800" height="240" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Strategy Comparison</text>
  
  <!-- Pessimistic column -->
  <rect x="70" y="335" width="240" height="190" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="190" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">Pessimistic (2PL)</text>
  <text x="190" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Use when:</text>
  <text x="190" y="400" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• High contention</text>
  <text x="190" y="413" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Conflicts are expensive</text>
  <text x="190" y="426" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Financial transactions</text>
  <text x="190" y="445" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ No conflicts</text>
  <text x="190" y="460" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Deadlocks, low concurrency</text>
  <text x="190" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Examples: SELECT FOR UPDATE</text>
  
  <!-- Optimistic column -->
  <rect x="325" y="335" width="240" height="190" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="445" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Optimistic</text>
  <text x="445" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Use when:</text>
  <text x="445" y="400" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Low contention</text>
  <text x="445" y="413" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Read-heavy workload</text>
  <text x="445" y="426" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Conflicts are rare</text>
  <text x="445" y="445" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ No locks, high concurrency</text>
  <text x="445" y="460" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Retries on conflict</text>
  <text x="445" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Examples: Version column, CAS</text>
  
  <!-- MVCC column -->
  <rect x="580" y="335" width="240" height="190" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="700" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">MVCC</text>
  <text x="700" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Use when:</text>
  <text x="700" y="400" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Read-heavy workload</text>
  <text x="700" y="413" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Need snapshot isolation</text>
  <text x="700" y="426" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Can afford storage</text>
  <text x="700" y="445" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Readers never block writers</text>
  <text x="700" y="460" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Storage overhead, vacuum</text>
  <text x="700" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Examples: PostgreSQL, Oracle</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>