<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Document Database Indexing Strategies</title>
  <desc id="desc">Single-field, compound, and multikey indexes in document databases</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Document Database Indexing</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Index Types and Selection Strategies</text>
  
  <!-- Single-Field Index (Top Left) -->
  <rect x="50" y="85" width="260" height="150" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Single-Field Index</text>
  
  <!-- B-Tree Visualization -->
  <rect x="70" y="120" width="220" height="100" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Root Node -->
  <rect x="140" y="130" width="90" height="25" rx="3" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="185" y="147" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Root</text>
  
  <!-- Lines to leaf nodes -->
  <line x1="155" y1="155" x2="110" y2="180" stroke="#374151" stroke-width="2"/>
  <line x1="185" y1="155" x2="185" y2="180" stroke="#374151" stroke-width="2"/>
  <line x1="215" y1="155" x2="260" y2="180" stroke="#374151" stroke-width="2"/>
  
  <!-- Leaf Nodes -->
  <rect x="80" y="180" width="60" height="30" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="110" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#1e3a8a">A-G</text>
  <text x="110" y="205" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">ptr → docs</text>
  
  <rect x="155" y="180" width="60" height="30" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="185" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#1e3a8a">H-M</text>
  <text x="185" y="205" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">ptr → docs</text>
  
  <rect x="230" y="180" width="60" height="30" rx="2" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="260" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#1e3a8a">N-Z</text>
  <text x="260" y="205" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">ptr → docs</text>
  
  <text x="180" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Example: index on email</text>
  
  <!-- Compound Index (Top Middle) -->
  <rect x="320" y="85" width="260" height="150" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Compound Index</text>
  
  <rect x="340" y="120" width="220" height="100" rx="4" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  
  <!-- Index Structure -->
  <text x="450" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2937">Index: {customer_id, order_date}</text>
  
  <!-- Sorted Entries -->
  <rect x="355" y="155" width="190" height="55" rx="2" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="365" y="170" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">CUST001 → 2024-01-15 → doc_ptr</text>
  <text x="365" y="183" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">CUST001 → 2024-02-20 → doc_ptr</text>
  <text x="365" y="196" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">CUST002 → 2024-01-10 → doc_ptr</text>
  <text x="365" y="209" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">CUST003 → 2024-03-05 → doc_ptr</text>
  
  <text x="450" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Prefix rule: equality fields first</text>
  
  <!-- Multikey Index (Top Right) -->
  <rect x="590" y="85" width="260" height="150" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Multikey Index (Array)</text>
  
  <rect x="610" y="120" width="220" height="100" rx="4" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  
  <!-- Document with Array -->
  <rect x="620" y="135" width="90" height="35" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="665" y="150" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Document:</text>
  <text x="665" y="163" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">{tags: ["js", "py"]}</text>
  
  <!-- Arrow -->
  <line x1="715" y1="152" x2="735" y2="152" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Index Entries -->
  <rect x="740" y="135" width="80" height="35" rx="3" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="780" y="150" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Index Entries:</text>
  <text x="780" y="163" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">"js" → doc_ptr</text>
  
  <rect x="740" y="175" width="80" height="30" rx="3" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="780" y="190" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">"py" → doc_ptr</text>
  
  <text x="720" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">One entry per array element</text>
  
  <!-- Index Selection Example (Middle) -->
  <rect x="50" y="245" width="800" height="110" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Index Selection Example</text>
  
  <!-- Query -->
  <rect x="70" y="285" width="200" height="60" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="170" y="305" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Query</text>
  <text x="170" y="320" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">db.orders.find({</text>
  <text x="170" y="333" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">customer_id: "C123",</text>
  <text x="170" y="345" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">status: "pending"</text>
  <text x="170" y="357" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">}).sort({order_date: -1})</text>
  
  <!-- Arrow -->
  <line x1="275" y1="315" x2="295" y2="315" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Optimal Index -->
  <rect x="300" y="285" width="250" height="60" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="425" y="305" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Optimal Index</text>
  <text x="425" y="325" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2937">{customer_id, status, order_date}</text>
  <text x="425" y="340" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Equality fields first, then sort field</text>
  
  <!-- Arrow -->
  <line x1="555" y1="315" x2="575" y2="315" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Index Scan Path -->
  <rect x="580" y="285" width="260" height="60" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="710" y="305" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Index Scan Path</text>
  <text x="710" y="320" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">1. Seek to customer_id="C123"</text>
  <text x="710" y="333" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">2. Filter status="pending"</text>
  <text x="710" y="345" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">3. Return sorted by order_date</text>
  
  <!-- Best Practices (Bottom) -->
  <rect x="50" y="365" width="800" height="170" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Index Best Practices</text>
  
  <!-- Practice 1: Analyze Query Patterns -->
  <rect x="70" y="405" width="170" height="115" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="155" y="425" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">1. Analyze Query Patterns</text>
  <text x="155" y="445" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Identify frequent queries</text>
  <text x="155" y="458" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Note filter + sort fields</text>
  <text x="155" y="471" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Check field cardinality</text>
  <text x="155" y="484" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Monitor slow query logs</text>
  <text x="155" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">→ Create targeted indexes</text>
  
  <!-- Practice 2: Use explain() -->
  <rect x="255" y="405" width="170" height="115" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="340" y="425" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">2. Use explain()</text>
  <text x="340" y="445" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Verify index usage</text>
  <text x="340" y="458" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Check COLLSCAN vs IXSCAN</text>
  <text x="340" y="471" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Review execution time</text>
  <text x="340" y="484" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Monitor docs examined</text>
  <text x="340" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">→ Optimize based on metrics</text>
  
  <!-- Practice 3: Monitor Index Size -->
  <rect x="440" y="405" width="170" height="115" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="525" y="425" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">3. Monitor Index Size</text>
  <text x="525" y="445" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Indexes consume RAM</text>
  <text x="525" y="458" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Large indexes = less cache</text>
  <text x="525" y="471" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Track index growth rate</text>
  <text x="525" y="484" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Remove unused indexes</text>
  <text x="525" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">→ Balance performance vs memory</text>
  
  <!-- Practice 4: Compound Index Order -->
  <rect x="625" y="405" width="205" height="115" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="727" y="425" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">4. Compound Index Order</text>
  <text x="727" y="445" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Equality fields first</text>
  <text x="727" y="458" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Range fields after</text>
  <text x="727" y="471" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Sort fields last</text>
  <text x="727" y="484" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Match query pattern</text>
  <text x="727" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">→ {equality, range, sort}</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>