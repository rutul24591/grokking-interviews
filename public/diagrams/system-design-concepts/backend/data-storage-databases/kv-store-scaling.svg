<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Key-Value Store Scaling Strategies</title>
  <desc id="desc">Scaling patterns for key-value stores including sharding and replication</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Key-Value Store Scaling</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Sharding, Replication, and Consistency Patterns</text>
  
  <!-- Horizontal Scaling with Sharding (Top Left) -->
  <rect x="50" y="85" width="400" height="140" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Horizontal Scaling: Sharding</text>
  
  <!-- Client -->
  <rect x="70" y="125" width="70" height="35" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="105" y="147" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Client</text>
  
  <!-- Router/Partitioner -->
  <line x1="145" y1="142" x2="175" y2="142" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="180" y="125" width="80" height="35" rx="4" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="220" y="142" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Router</text>
  <text x="220" y="154" text-anchor="middle" font-size="6" font-weight="600" fill="#e9d5ff">hash(key) % 3</text>
  
  <!-- Shard 0 -->
  <line x1="265" y1="132" x2="295" y2="132" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="105" width="70" height="50" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="335" y="125" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Shard 0</text>
  <text x="335" y="140" text-anchor="middle" font-size="6" font-weight="600" fill="#6ee7b7">Keys A-G</text>
  <text x="335" y="150" text-anchor="middle" font-size="6" font-weight="600" fill="#6ee7b7">~33% data</text>
  
  <!-- Shard 1 -->
  <line x1="265" y1="142" x2="295" y2="142" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="145" width="70" height="50" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="335" y="165" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Shard 1</text>
  <text x="335" y="180" text-anchor="middle" font-size="6" font-weight="600" fill="#6ee7b7">Keys H-M</text>
  <text x="335" y="190" text-anchor="middle" font-size="6" font-weight="600" fill="#6ee7b7">~33% data</text>
  
  <!-- Shard 2 -->
  <line x1="265" y1="152" x2="295" y2="152" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="185" width="70" height="50" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="335" y="205" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Shard 2</text>
  <text x="335" y="220" text-anchor="middle" font-size="6" font-weight="600" fill="#6ee7b7">Keys N-Z</text>
  <text x="335" y="230" text-anchor="middle" font-size="6" font-weight="600" fill="#6ee7b7">~33% data</text>
  
  <text x="390" y="180" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Linear scale</text>
  <text x="390" y="195" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Parallel ops</text>
  
  <!-- Replication Patterns (Top Right) -->
  <rect x="465" y="85" width="385" height="140" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Replication Patterns</text>
  
  <!-- Single Leader -->
  <rect x="485" y="125" width="170" height="90" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="570" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Single Leader</text>
  
  <rect x="500" y="155" width="60" height="35" rx="3" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <text x="530" y="172" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Leader</text>
  <text x="530" y="185" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Accepts writes</text>
  
  <line x1="565" y1="162" x2="585" y2="162" stroke="#374151" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="565" y1="172" x2="585" y2="172" stroke="#374151" stroke-width="1" marker-end="url(#arrow)"/>
  
  <rect x="590" y="150" width="55" height="25" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="617" y="167" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Follower 1</text>
  <rect x="590" y="180" width="55" height="25" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="617" y="197" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Follower 2</text>
  
  <text x="570" y="210" text-anchor="middle" font-size="6" font-weight="700" fill="#059669">✓ Strong consistency</text>
  <text x="570" y="220" text-anchor="middle" font-size="6" font-weight="700" fill="#b91c1c">✗ Single point of failure</text>
  
  <!-- Multi-Leader -->
  <rect x="670" y="125" width="170" height="90" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="755" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Multi-Leader</text>
  
  <rect x="685" y="155" width="55" height="25" rx="2" fill="#d97706" stroke="#b45309" stroke-width="1"/>
  <text x="712" y="172" text-anchor="middle" font-size="6" font-weight="700" fill="#ffffff">Leader 1</text>
  <rect x="750" y="155" width="55" height="25" rx="2" fill="#d97706" stroke="#b45309" stroke-width="1"/>
  <text x="777" y="172" text-anchor="middle" font-size="6" font-weight="700" fill="#ffffff">Leader 2</text>
  
  <line x1="745" y1="167" x2="750" y2="167" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="747" y="162" text-anchor="middle" font-size="5" font-weight="600" fill="#1f2937">sync</text>
  
  <text x="755" y="195" text-anchor="middle" font-size="6" font-weight="700" fill="#059669">✓ High availability</text>
  <text x="755" y="205" text-anchor="middle" font-size="6" font-weight="700" fill="#b91c1c">✗ Conflict resolution</text>
  
  <text x="755" y="220" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Leaderless (Dynamo): R + W &gt; N</text>
  
  <!-- Consistency vs Availability (Middle) -->
  <rect x="50" y="235" width="800" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Consistency vs Availability Trade-off</text>
  
  <!-- Strong Consistency -->
  <rect x="70" y="275" width="180" height="60" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Strong Consistency</text>
  <text x="160" y="312" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Read from leader or quorum</text>
  <text x="160" y="325" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Guarantee: Latest data</text>
  <text x="160" y="338" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Higher latency</text>
  
  <!-- Eventual Consistency -->
  <rect x="265" y="275" width="180" height="60" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="355" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Eventual Consistency</text>
  <text x="355" y="312" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Read from any node</text>
  <text x="355" y="325" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Guarantee: Converges over time</text>
  <text x="355" y="338" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Lowest latency</text>
  
  <!-- Tunable Consistency -->
  <rect x="460" y="275" width="180" height="60" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="550" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Tunable Consistency</text>
  <text x="550" y="312" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Per-operation choice</text>
  <text x="550" y="325" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">ONE, QUORUM, ALL</text>
  <text x="550" y="338" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Flexible trade-offs</text>
  
  <!-- Quorum Calculation -->
  <rect x="655" y="275" width="180" height="60" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="745" y="295" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Quorum Formula</text>
  <text x="745" y="315" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">R + W &gt; N</text>
  <text x="745" y="330" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">N=3, R=2, W=2 → Strong</text>
  <text x="745" y="343" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">N=3, R=1, W=1 → Eventual</text>
  
  <!-- Performance Characteristics (Bottom) -->
  <rect x="50" y="355" width="800" height="180" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="380" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Performance Characteristics</text>
  
  <!-- Latency -->
  <rect x="70" y="395" width="240" height="125" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="190" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Latency (In-Memory)</text>
  
  <text x="190" y="435" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">GET: ~1ms (Redis)</text>
  <rect x="90" y="445" width="200" height="15" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <rect x="90" y="445" width="40" height="15" rx="2" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="300" y="457" text-anchor="end" font-size="7" font-weight="600" fill="#1f2937">1ms</text>
  
  <text x="190" y="475" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">SET: ~1-2ms</text>
  <rect x="90" y="485" width="200" height="15" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <rect x="90" y="485" width="50" height="15" rx="2" fill="#d97706" stroke="#92400e" stroke-width="1"/>
  <text x="300" y="497" text-anchor="end" font-size="7" font-weight="600" fill="#1f2937">2ms</text>
  
  <text x="190" y="515" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Disk-based (DynamoDB): 5-10ms</text>
  
  <!-- Throughput -->
  <rect x="330" y="395" width="240" height="125" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="450" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Throughput</text>
  
  <text x="450" y="435" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Single node: 100K+ ops/sec</text>
  <rect x="350" y="445" width="200" height="15" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <rect x="350" y="445" width="150" height="15" rx="2" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="560" y="457" text-anchor="end" font-size="7" font-weight="600" fill="#1f2937">100K/s</text>
  
  <text x="450" y="475" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Cluster (10 nodes): 1M+ ops/sec</text>
  <rect x="350" y="485" width="200" height="15" rx="2" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <rect x="350" y="485" width="180" height="15" rx="2" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="560" y="497" text-anchor="end" font-size="7" font-weight="600" fill="#1f2937">1M/s</text>
  
  <text x="450" y="515" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Linear scale with shards</text>
  
  <!-- Memory vs Disk -->
  <rect x="590" y="395" width="240" height="125" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="710" y="415" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Memory vs Disk</text>
  
  <rect x="605" y="430" width="105" height="40" rx="3" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text x="657" y="450" text-anchor="middle" font-size="8" font-weight="700" fill="#065f46">In-Memory</text>
  <text x="657" y="463" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Fastest, volatile</text>
  
  <rect x="720" y="430" width="105" height="40" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="772" y="450" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Disk-Based</text>
  <text x="772" y="463" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Slower, durable</text>
  
  <text x="710" y="495" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Hybrid: Redis with AOF/RDB</text>
  <text x="710" y="510" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Best of both: speed + persistence</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>