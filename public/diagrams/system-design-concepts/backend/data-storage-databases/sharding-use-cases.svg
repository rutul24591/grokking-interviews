<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Sharding Use Cases</title>
  <desc id="desc">When to use sharding and real-world examples</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Sharding Use Cases</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">When to Shard and Real-World Examples</text>
  
  <!-- When to Shard (Left Column) -->
  <rect x="50" y="85" width="400" height="240" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">When to Shard</text>
  
  <!-- Use Case 1: Write Scaling -->
  <rect x="70" y="125" width="170" height="85" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="155" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Write Scaling</text>
  <text x="155" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Single DB can't handle writes</text>
  <text x="155" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• 10K+ writes/second</text>
  <text x="155" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Write-heavy workload</text>
  <text x="155" y="204" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Example: Twitter tweets, IoT data</text>
  
  <!-- Use Case 2: Storage Scaling -->
  <rect x="255" y="125" width="170" height="85" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="340" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Storage Scaling</text>
  <text x="340" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Data exceeds single disk</text>
  <text x="340" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• TB+ of data</text>
  <text x="340" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Growing rapidly</text>
  <text x="340" y="204" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Example: Logs, archives, media</text>
  
  <!-- Use Case 3: Geographic -->
  <rect x="70" y="220" width="170" height="95" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="155" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Geographic Distribution</text>
  <text x="155" y="260" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Global user base</text>
  <text x="155" y="273" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Data residency requirements</text>
  <text x="155" y="286" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Low latency per region</text>
  <text x="155" y="299" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• GDPR compliance</text>
  <text x="155" y="312" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Example: EU users in EU shard</text>
  
  <!-- Use Case 4: Multi-tenant -->
  <rect x="255" y="220" width="170" height="95" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="340" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Multi-Tenant Isolation</text>
  <text x="340" y="260" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• SaaS application</text>
  <text x="340" y="273" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Tenant data isolation</text>
  <text x="340" y="286" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Per-tenant performance</text>
  <text x="340" y="299" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Enterprise customers</text>
  <text x="340" y="312" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Example: Shopify shops, Slack teams</text>
  
  <!-- When NOT to Shard (Right Column) -->
  <rect x="465" y="85" width="385" height="240" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">When NOT to Shard</text>
  
  <!-- Anti-Pattern 1: Premature -->
  <rect x="485" y="125" width="170" height="85" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="570" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Premature Sharding</text>
  <text x="570" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Data fits on one server</text>
  <text x="570" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Low write volume</text>
  <text x="570" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Complex cross-shard queries</text>
  <text x="570" y="204" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Start with read replicas</text>
  
  <!-- Anti-Pattern 2: Complex Joins -->
  <rect x="670" y="125" width="170" height="85" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="755" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Complex Join Requirements</text>
  <text x="755" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Frequent cross-table joins</text>
  <text x="755" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• ACID transactions needed</text>
  <text x="755" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Financial/booking systems</text>
  <text x="755" y="204" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Use relational with partitioning</text>
  
  <!-- Anti-Pattern 3: Small Data -->
  <rect x="485" y="220" width="170" height="95" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="570" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Small Data Volume</text>
  <text x="570" y="260" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• &lt;100 GB total</text>
  <text x="570" y="273" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• &lt;1K writes/second</text>
  <text x="570" y="286" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Simple queries</text>
  <text x="570" y="299" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Single region</text>
  <text x="570" y="312" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Single DB is simpler</text>
  
  <!-- Anti-Pattern 4: No Operational Maturity -->
  <rect x="670" y="220" width="170" height="95" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="755" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">No Operational Maturity</text>
  <text x="755" y="260" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• No monitoring</text>
  <text x="755" y="273" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• No alerting</text>
  <text x="755" y="286" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• No backup strategy</text>
  <text x="755" y="299" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Small team</text>
  <text x="755" y="312" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">→ Build ops maturity first</text>
  
  <!-- Real-World Examples (Bottom) -->
  <rect x="50" y="335" width="800" height="200" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">Real-World Sharding Examples</text>
  
  <!-- Twitter -->
  <rect x="70" y="375" width="240" height="150" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="190" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Twitter: Tweet Sharding</text>
  <text x="190" y="420" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Shard by user_id (hash-based)</text>
  <text x="190" y="435" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• User's tweets on same shard</text>
  <text x="190" y="450" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Timeline: fanout from followed</text>
  <text x="190" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• 500M+ tweets/day</text>
  <text x="190" y="485" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Result: Scales to billions of tweets</text>
  
  <!-- Shopify -->
  <rect x="325" y="375" width="240" height="150" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="445" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Shopify: Order Sharding</text>
  <text x="445" y="420" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Shard by shop_id</text>
  <text x="445" y="435" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Each shop's data isolated</text>
  <text x="445" y="450" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Enterprise shops get dedicated shards</text>
  <text x="445" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• 1M+ merchants</text>
  <text x="445" y="485" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Result: Multi-tenant at scale</text>
  
  <!-- Uber -->
  <rect x="580" y="375" width="240" height="150" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="700" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Uber: Trip Data Sharding</text>
  <text x="700" y="420" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Shard by city/region</text>
  <text x="700" y="435" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Geographic distribution</text>
  <text x="700" y="450" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Low latency per region</text>
  <text x="700" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Millions of trips/day</text>
  <text x="700" y="485" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">Result: Global ride-sharing platform</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>