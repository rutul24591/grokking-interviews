<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" fill="#f8fafc"/>
  <rect x="30" y="30" width="860" height="460" rx="18" fill="#ffffff" stroke="#d7dbe2"/>
  <text x="60" y="70" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937">Session Guarantees</text>
  <text x="60" y="95" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Per-session consistency properties that improve UX without global strong consistency</text>

  <!-- Read-Your-Writes Section -->
  <rect x="60" y="120" width="240" height="170" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="150" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af" text-anchor="middle">Read-Your-Writes</text>
  
  <!-- RYW Timeline -->
  <rect x="80" y="165" width="200" height="8" rx="4" fill="#bfdbfe"/>
  <rect x="80" y="165" width="80" height="8" rx="4" fill="#3b82f6"/>
  <circle cx="165" cy="169" r="5" fill="#1e40af"/>
  
  <rect x="80" y="185" width="200" height="8" rx="4" fill="#bfdbfe"/>
  <rect x="80" y="185" width="140" height="8" rx="4" fill="#3b82f6"/>
  <text x="90" y="165" font-family="Arial" font-size="9" fill="#1e3a8a">Write</text>
  <text x="90" y="185" font-family="Arial" font-size="9" fill="#1e3a8a">Read sees write</text>
  
  <text x="180" y="215" font-family="Arial" font-size="10" fill="#1e3a8a" text-anchor="middle">Client sees own writes</text>
  <text x="180" y="230" font-family="Arial" font-size="10" fill="#1e3a8a" text-anchor="middle">immediately</text>
  <text x="180" y="250" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">Use case: Profile updates,</text>
  <text x="180" y="262" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">shopping cart</text>

  <!-- Monotonic Reads Section -->
  <rect x="340" y="120" width="240" height="170" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="460" y="150" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="bold" fill="#14532d" text-anchor="middle">Monotonic Reads</text>
  
  <!-- Monotonic Reads Timeline -->
  <rect x="360" y="165" width="200" height="8" rx="4" fill="#bbf7d0"/>
  <rect x="360" y="165" width="100" height="8" rx="4" fill="#22c55e"/>
  <text x="370" y="165" font-family="Arial" font-size="9" fill="#14532d">Read v1</text>
  
  <rect x="360" y="185" width="200" height="8" rx="4" fill="#bbf7d0"/>
  <rect x="360" y="185" width="140" height="8" rx="4" fill="#22c55e"/>
  <text x="370" y="185" font-family="Arial" font-size="9" fill="#14532d">Read v2 (v2&amp;gt;v1)</text>
  
  <rect x="360" y="205" width="200" height="8" rx="4" fill="#bbf7d0"/>
  <rect x="360" y="205" width="170" height="8" rx="4" fill="#22c55e"/>
  <text x="370" y="205" font-family="Arial" font-size="9" fill="#14532d">Read v3 (v3&amp;gt;v2)</text>
  
  <text x="460" y="235" font-family="Arial" font-size="10" fill="#14532d" text-anchor="middle">Never go backward</text>
  <text x="460" y="255" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">Use case: Pagination,</text>
  <text x="460" y="267" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">feed scrolling</text>

  <!-- Monotonic Writes Section -->
  <rect x="620" y="120" width="240" height="170" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="740" y="150" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e" text-anchor="middle">Monotonic Writes</text>
  
  <!-- Monotonic Writes Timeline -->
  <rect x="640" y="165" width="200" height="8" rx="4" fill="#fde68a"/>
  <rect x="640" y="165" width="60" height="8" rx="4" fill="#f59e0b"/>
  <text x="650" y="165" font-family="Arial" font-size="9" fill="#92400e">W1</text>
  
  <rect x="640" y="185" width="200" height="8" rx="4" fill="#fde68a"/>
  <rect x="640" y="185" width="110" height="8" rx="4" fill="#f59e0b"/>
  <text x="650" y="185" font-family="Arial" font-size="9" fill="#92400e">W2 (after W1)</text>
  
  <rect x="640" y="205" width="200" height="8" rx="4" fill="#fde68a"/>
  <rect x="640" y="205" width="160" height="8" rx="4" fill="#f59e0b"/>
  <text x="650" y="205" font-family="Arial" font-size="9" fill="#92400e">W3 (after W2)</text>
  
  <text x="740" y="235" font-family="Arial" font-size="10" fill="#92400e" text-anchor="middle">Writes ordered</text>
  <text x="740" y="255" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">Use case: Chat messages,</text>
  <text x="740" y="267" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">activity timeline</text>

  <!-- Writes-Follow-Reads Section -->
  <rect x="200" y="320" width="240" height="150" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="320" y="350" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="bold" fill="#6b21a8" text-anchor="middle">Writes-Follow-Reads</text>
  
  <!-- WFR Diagram -->
  <rect x="220" y="365" width="200" height="8" rx="4" fill="#e9d5ff"/>
  <rect x="220" y="365" width="90" height="8" rx="4" fill="#a855f7"/>
  <text x="230" y="365" font-family="Arial" font-size="9" fill="#6b21a8">Read value</text>
  
  <path d="M 310 373 L 310 385" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="220" y="390" width="200" height="8" rx="4" fill="#e9d5ff"/>
  <rect x="220" y="390" width="150" height="8" rx="4" fill="#a855f7"/>
  <text x="230" y="390" font-family="Arial" font-size="9" fill="#6b21a8">Write based on read</text>
  
  <text x="320" y="420" font-family="Arial" font-size="10" fill="#6b21a8" text-anchor="middle">Write ordered after read</text>
  <text x="320" y="440" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">Use case: Edit after view,</text>
  <text x="320" y="452" font-family="Arial" font-size="9" fill="#334155" text-anchor="middle">conditional updates</text>

  <!-- Implementation Box -->
  <rect x="480" y="320" width="380" height="150" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="670" y="350" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">Implementation Strategies</text>
  
  <text x="500" y="375" font-family="Arial" font-size="11" fill="#334155">• Sticky sessions (route to same node)</text>
  <text x="500" y="395" font-family="Arial" font-size="11" fill="#334155">• Client-side version tracking</text>
  <text x="500" y="415" font-family="Arial" font-size="11" fill="#334155">• Wait-for-replication before ack</text>
  <text x="500" y="435" font-family="Arial" font-size="11" fill="#334155">• Read-from-leader for session data</text>
  <text x="500" y="455" font-family="Arial" font-size="11" fill="#334155">• Database features (Cosmos DB session)</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>
</svg>
