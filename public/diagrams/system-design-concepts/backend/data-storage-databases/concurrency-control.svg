<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Concurrency Control (Overview)</text>

  <rect x="60" y="100" width="260" height="90" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Pessimistic Locking</text>
  <text x="90" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Locks first, then work</text>

  <rect x="350" y="100" width="260" height="90" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="380" y="145" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Optimistic Locking</text>
  <text x="380" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Work first, validate later</text>

  <rect x="640" y="100" width="260" height="90" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="680" y="145" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">MVCC</text>
  <text x="680" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Versioned rows</text>
</svg>
