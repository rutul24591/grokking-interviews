<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Foreign Key Constraints and Referential Integrity</title>
  <desc id="desc">Foreign key relationships and referential integrity enforcement</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Foreign Key &amp; Referential Integrity</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Enforcing Relationships Between Tables</text>
  
  <!-- Parent-Child Relationship (Top) -->
  <rect x="50" y="85" width="800" height="160" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Parent-Child Relationship</text>
  
  <!-- Parent table -->
  <rect x="100" y="125" width="250" height="110" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="225" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">users (Parent)</text>
  
  <rect x="115" y="155" width="220" height="25" rx="2" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="130" y="172" text-anchor="start" font-size="7" font-weight="700" fill="#ffffff">PK</text>
  <text x="155" y="172" text-anchor="start" font-size="7" font-weight="600" fill="#dbeafe">user_id (INT)</text>
  
  <rect x="115" y="183" width="220" height="25" rx="2" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="155" y="200" text-anchor="start" font-size="7" font-weight="600" fill="#dbeafe">name (VARCHAR)</text>
  
  <rect x="115" y="211" width="220" height="25" rx="2" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="155" y="228" text-anchor="start" font-size="7" font-weight="600" fill="#dbeafe">email (VARCHAR)</text>
  
  <!-- Arrow -->
  <line x1="355" y1="180" x2="385" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="370" y="170" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">FK</text>
  
  <!-- Child table -->
  <rect x="400" y="125" width="250" height="110" rx="4" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
  <text x="525" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">orders (Child)</text>
  
  <rect x="415" y="155" width="220" height="25" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="430" y="172" text-anchor="start" font-size="7" font-weight="700" fill="#1e3a8a">PK</text>
  <text x="455" y="172" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">order_id (INT)</text>
  
  <rect x="415" y="183" width="220" height="25" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="430" y="200" text-anchor="start" font-size="7" font-weight="700" fill="#1e3a8a">FK</text>
  <text x="455" y="200" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">user_id → users(user_id)</text>
  
  <rect x="415" y="211" width="220" height="25" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="1"/>
  <text x="455" y="228" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">total (DECIMAL)</text>
  
  <!-- Referential Integrity Rules (Bottom) -->
  <rect x="50" y="255" width="800" height="280" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Referential Integrity Enforcement</text>
  
  <!-- Valid Insert -->
  <rect x="70" y="295" width="240" height="110" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="190" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Valid Insert</text>
  <text x="190" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">INSERT INTO orders (user_id=1, total=100)</text>
  <text x="190" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ user_id=1 exists in users table</text>
  <text x="190" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ Insert succeeds</text>
  <text x="190" y="385" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Referential integrity maintained</text>
  
  <!-- Invalid Insert -->
  <rect x="325" y="295" width="240" height="110" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="445" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Invalid Insert (Rejected)</text>
  <text x="445" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">INSERT INTO orders (user_id=999, total=100)</text>
  <text x="445" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ user_id=999 NOT in users table</text>
  <text x="445" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ ERROR: foreign key violation</text>
  <text x="445" y="385" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Prevents orphaned records</text>
  
  <!-- Delete with CASCADE -->
  <rect x="580" y="295" width="240" height="110" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="700" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Delete with CASCADE</text>
  <text x="700" y="335" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">DELETE FROM users WHERE user_id=1</text>
  <text x="700" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ ON DELETE CASCADE</text>
  <text x="700" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">→ All orders for user_id=1 deleted</text>
  <text x="700" y="385" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Clean deletion, no orphans</text>
  
  <!-- Best Practices (Bottom) -->
  <rect x="70" y="415" width="760" height="110" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="450" y="440" text-anchor="middle" font-size="11" font-weight="700" fill="#0369a1">Best Practices</text>
  
  <text x="85" y="465" text-anchor="start" font-size="8" font-weight="700" fill="#0369a1">1.</text>
  <text x="105" y="465" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Always index foreign key columns (improves JOIN performance)</text>
  
  <text x="85" y="485" text-anchor="start" font-size="8" font-weight="700" fill="#0369a1">2.</text>
  <text x="105" y="485" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Choose appropriate ON DELETE action (CASCADE for dependent data, RESTRICT for critical data)</text>
  
  <text x="85" y="505" text-anchor="start" font-size="8" font-weight="700" fill="#0369a1">3.</text>
  <text x="105" y="505" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Use constraints for critical rules, validate business logic in application</text>
  
  <text x="85" y="525" text-anchor="start" font-size="8" font-weight="700" fill="#0369a1">4.</text>
  <text x="105" y="525" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Avoid CASCADE everywhere (can cause unintended data loss)</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>