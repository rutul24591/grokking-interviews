<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
  <rect width="920" height="420" fill="#f8fafc"/>
  <rect x="30" y="30" width="860" height="360" rx="18" fill="#ffffff" stroke="#d7dbe2"/>
  <text x="60" y="70" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1f2937">TSDB Query Patterns</text>

  <rect x="90" y="140" width="740" height="200" rx="14" fill="#0f172a"/>
  <text x="120" y="185" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">SELECT mean(cpu)</text>
  <text x="120" y="210" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">FROM metrics</text>
  <text x="120" y="235" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">WHERE time &gt; now() - 1h</text>
  <text x="120" y="260" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e2e8f0">GROUP BY time(1m)</text>
</svg>
