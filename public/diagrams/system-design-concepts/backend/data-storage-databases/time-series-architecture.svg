<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Time Series Database Architecture</title>
  <desc id="desc">TSDB architecture showing write path, storage, and query execution</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Time Series Database Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Write Path, Storage Engine, and Query Execution</text>
  
  <!-- Write Path (Top Left) -->
  <rect x="50" y="85" width="400" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Write Path: Optimized for High Throughput</text>
  
  <!-- Client -->
  <rect x="70" y="125" width="80" height="40" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="110" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Client</text>
  <text x="110" y="160" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">WRITE</text>
  
  <!-- Arrow -->
  <line x1="155" y1="145" x2="185" y2="145" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- WAL -->
  <rect x="190" y="125" width="90" height="60" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="235" y="150" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">WAL</text>
  <text x="235" y="168" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Durability</text>
  <text x="235" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Sequential</text>
  
  <!-- Arrow -->
  <line x1="285" y1="155" x2="315" y2="155" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- In-Memory Buffer -->
  <rect x="320" y="125" width="110" height="60" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="375" y="150" text-anchor="middle" font-size="8" font-weight="700" fill="#065f46">In-Memory Buffer</text>
  <text x="375" y="168" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">TSM Engine</text>
  <text x="375" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Sorted by time</text>
  
  <!-- Flush -->
  <path d="M 375 190 L 375 220 L 250 220 L 250 245" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="300" y="235" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Flush when full</text>
  
  <!-- TSM Files -->
  <rect x="200" y="250" width="100" height="25" rx="3" fill="#e0e7ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="250" y="268" text-anchor="middle" font-size="7" font-weight="700" fill="#5b21b6">TSM File 1</text>
  
  <rect x="200" y="280" width="100" height="25" rx="3" fill="#c7d2fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="250" y="298" text-anchor="middle" font-size="7" font-weight="700" fill="#5b21b6">TSM File 2</text>
  
  <!-- Compaction -->
  <rect x="70" y="250" width="110" height="55" rx="4" fill="#faf3dd" stroke="#d97706" stroke-width="1"/>
  <text x="125" y="275" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Compaction</text>
  <text x="125" y="290" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Merge &amp; compress</text>
  <text x="125" y="302" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Remove old data</text>
  
  <!-- Query Path (Top Right) -->
  <rect x="465" y="85" width="385" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Query Path: Time-Range Scans</text>
  
  <!-- Client Query -->
  <rect x="485" y="125" width="80" height="40" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="525" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Client</text>
  <text x="525" y="160" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">QUERY</text>
  
  <!-- Arrow -->
  <line x1="570" y1="145" x2="600" y2="145" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Query Parser -->
  <rect x="605" y="125" width="100" height="60" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="655" y="150" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Query Parser</text>
  <text x="655" y="168" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Parse InfluxQL</text>
  <text x="655" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Validate series</text>
  
  <!-- Arrow -->
  <line x1="710" y1="155" x2="740" y2="155" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Series Executor -->
  <rect x="745" y="125" width="90" height="60" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="790" y="150" text-anchor="middle" font-size="8" font-weight="700" fill="#065f46">Series Executor</text>
  <text x="790" y="168" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Scan TSM files</text>
  <text x="790" y="180" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Aggregate results</text>
  
  <!-- Query Optimization -->
  <rect x="485" y="200" width="350" height="55" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="660" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Query Optimization</text>
  <text x="660" y="237" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Predicate pushdown (filter early)</text>
  <text x="660" y="250" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Series pruning (skip irrelevant series)</text>
  
  <!-- Storage Engine (Bottom Left) -->
  <rect x="50" y="275" width="400" height="180" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="250" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Storage Engine: TSM (Time-Structured Merge Tree)</text>
  
  <rect x="70" y="315" width="360" height="130" rx="4" fill="#ffffff" stroke="#38bdf8" stroke-width="1"/>
  
  <!-- TSM Structure -->
  <text x="250" y="340" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2937">TSM File Structure:</text>
  
  <rect x="85" y="355" width="330" height="25" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="372" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Data Blocks (compressed, time-ordered)</text>
  
  <rect x="85" y="385" width="330" height="25" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="250" y="402" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Index Block (sparse index for data blocks)</text>
  
  <rect x="85" y="415" width="330" height="25" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="250" y="432" text-anchor="middle" font-size="8" font-weight="700" fill="#065f46">Footer (checksum, metadata)</text>
  
  <!-- Key Characteristics -->
  <rect x="70" y="455" width="360" height="45" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="475" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Key Characteristics:</text>
  <text x="250" y="488" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">✓ Immutable files (append-only)</text>
  <text x="250" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">✓ Gorilla compression (1.3 bits per value)</text>
  
  <!-- Performance Metrics (Bottom Right) -->
  <rect x="465" y="275" width="385" height="180" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="657" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Performance Characteristics</text>
  
  <rect x="485" y="315" width="345" height="130" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  
  <!-- Write Performance -->
  <text x="657" y="340" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Write Performance:</text>
  <rect x="500" y="355" width="315" height="15" rx="2" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <rect x="500" y="355" width="280" height="15" rx="2" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="825" y="367" text-anchor="end" font-size="7" font-weight="700" fill="#1f2937">1M+ writes/sec/node</text>
  
  <!-- Query Performance -->
  <text x="657" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Query Performance:</text>
  <rect x="500" y="400" width="315" height="15" rx="2" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <rect x="500" y="400" width="250" height="15" rx="2" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="825" y="412" text-anchor="end" font-size="7" font-weight="700" fill="#1f2937">Time-range scans: ~10ms</text>
  
  <!-- Compression Ratio -->
  <text x="657" y="430" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Compression Ratio:</text>
  <rect x="500" y="445" width="315" height="15" rx="2" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <rect x="500" y="445" width="290" height="15" rx="2" fill="#d97706" stroke="#b45309" stroke-width="1"/>
  <text x="825" y="457" text-anchor="end" font-size="7" font-weight="700" fill="#1f2937">10:1 (Gorilla compression)</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>