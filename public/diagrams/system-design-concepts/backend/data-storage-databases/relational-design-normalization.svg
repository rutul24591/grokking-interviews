<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Database Normalization Levels</title>
  <desc id="desc">Normalization levels 1NF, 2NF, 3NF showing progressive elimination of redundancy</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Database Normalization</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Progressive Elimination of Redundancy (1NF → 2NF → 3NF)</text>
  
  <!-- Unnormalized Table (Top Left) -->
  <rect x="50" y="85" width="260" height="180" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Unnormalized Form (UNF)</text>
  
  <rect x="65" y="125" width="230" height="130" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  
  <!-- UNF Table Header -->
  <rect x="70" y="130" width="220" height="25" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="180" y="147" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">order_id | customer | products</text>
  
  <!-- UNF Data -->
  <rect x="70" y="158" width="220" height="45" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="173" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">1001 | Alice | [{id:1,name:"Laptop"},</text>
  <text x="80" y="185" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">         {id:2,name:"Mouse"}]</text>
  <text x="80" y="197" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">1002 | Bob   | [{id:3,name:"Keyboard"}]</text>
  
  <text x="180" y="245" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Repeating groups</text>
  <text x="180" y="258" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Non-atomic values</text>
  
  <!-- 1NF Table (Top Middle) -->
  <rect x="320" y="85" width="260" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">First Normal Form (1NF)</text>
  
  <rect x="335" y="125" width="230" height="130" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <!-- 1NF Table Header -->
  <rect x="340" y="130" width="220" height="25" rx="2" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="450" y="147" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">order_id | customer | product_id | product_name</text>
  
  <!-- 1NF Data -->
  <rect x="340" y="158" width="220" height="90" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="350" y="173" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">1001 | Alice | 1 | Laptop</text>
  <text x="350" y="185" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">1001 | Alice | 2 | Mouse</text>
  <text x="350" y="197" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">1002 | Bob   | 3 | Keyboard</text>
  <text x="350" y="209" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">1002 | Bob   | 4 | Monitor</text>
  <text x="350" y="221" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">1003 | Alice | 1 | Laptop</text>
  
  <text x="450" y="245" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Atomic values</text>
  <text x="450" y="258" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Redundancy (Alice repeated)</text>
  
  <!-- 2NF Table (Top Right) -->
  <rect x="590" y="85" width="260" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="720" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Second Normal Form (2NF)</text>
  
  <rect x="605" y="125" width="230" height="130" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <text x="720" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Orders Table</text>
  <rect x="610" y="160" width="220" height="40" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="620" y="175" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">order_id | customer_id | order_date</text>
  <text x="620" y="190" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">1001     | 1 (Alice)   | 2024-01-15</text>
  <text x="620" y="202" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">1002     | 2 (Bob)     | 2024-01-16</text>
  
  <text x="720" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Order Items Table</text>
  <rect x="610" y="230" width="220" height="25" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="620" y="247" text-anchor="start" font-size="6" font-weight="600" fill="#1f2937">order_id | product_id | quantity</text>
  
  <text x="720" y="265" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ No partial dependencies</text>
  
  <!-- 3NF Tables (Bottom) -->
  <rect x="50" y="275" width="800" height="260" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Third Normal Form (3NF) - Eliminate Transitive Dependencies</text>
  
  <!-- Customers Table -->
  <rect x="70" y="315" width="180" height="120" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <rect x="70" y="315" width="180" height="28" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="160" y="334" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">customers</text>
  
  <rect x="80" y="350" width="160" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="90" y="365" text-anchor="start" font-size="7" font-weight="700" fill="#065f46">PK</text>
  <text x="110" y="365" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">customer_id</text>
  
  <rect x="80" y="375" width="160" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="110" y="390" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">name</text>
  
  <rect x="80" y="400" width="160" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="110" y="415" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">email</text>
  
  <!-- Orders Table -->
  <rect x="270" y="315" width="180" height="120" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <rect x="270" y="315" width="180" height="28" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="360" y="334" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">orders</text>
  
  <rect x="280" y="350" width="160" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="290" y="365" text-anchor="start" font-size="7" font-weight="700" fill="#065f46">PK</text>
  <text x="310" y="365" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">order_id</text>
  
  <rect x="280" y="375" width="160" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="290" y="390" text-anchor="start" font-size="7" font-weight="700" fill="#065f46">FK</text>
  <text x="310" y="390" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">customer_id</text>
  
  <rect x="280" y="400" width="160" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="310" y="415" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">order_date</text>
  
  <!-- Products Table -->
  <rect x="470" y="315" width="180" height="120" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <rect x="470" y="315" width="180" height="28" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="560" y="334" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">products</text>
  
  <rect x="480" y="350" width="160" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="490" y="365" text-anchor="start" font-size="7" font-weight="700" fill="#065f46">PK</text>
  <text x="510" y="365" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">product_id</text>
  
  <rect x="480" y="375" width="160" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="510" y="390" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">name</text>
  
  <rect x="480" y="400" width="160" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="510" y="415" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">price</text>
  
  <!-- Order Items Table -->
  <rect x="670" y="315" width="160" height="120" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <rect x="670" y="315" width="160" height="28" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="750" y="334" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">order_items</text>
  
  <rect x="680" y="350" width="140" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="690" y="365" text-anchor="start" font-size="7" font-weight="700" fill="#065f46">PK,FK</text>
  <text x="730" y="365" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">order_id</text>
  
  <rect x="680" y="375" width="140" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="690" y="390" text-anchor="start" font-size="7" font-weight="700" fill="#065f46">PK,FK</text>
  <text x="730" y="390" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">product_id</text>
  
  <rect x="680" y="400" width="140" height="22" rx="2" fill="#ffffff" stroke="#16a34a" stroke-width="1"/>
  <text x="710" y="415" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">quantity</text>
  
  <!-- Relationships -->
  <path d="M 255 375 L 265 375" stroke="#374151" stroke-width="2"/>
  <path d="M 455 375 L 465 375" stroke="#374151" stroke-width="2"/>
  <path d="M 655 365 L 665 365" stroke="#374151" stroke-width="2"/>
  
  <text x="450" y="455" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">3NF Benefits:</text>
  <text x="450" y="475" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ No transitive dependencies (all columns depend only on primary key)</text>
  <text x="450" y="492" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Minimal redundancy (customer name stored once)</text>
  <text x="450" y="509" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">✓ Update anomalies eliminated (change email in one place)</text>
  
  <!-- Normalization Rules Summary -->
  <rect x="50" y="540" width="800" height="0" rx="0" fill="none" stroke="none"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>