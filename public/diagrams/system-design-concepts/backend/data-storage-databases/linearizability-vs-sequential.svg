<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Linearizability vs Sequential Consistency</title>
  <desc id="desc">Comparing linearizability and sequential consistency with examples</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Linearizability vs Sequential Consistency</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Two strong consistency models compared</text>
  
  <!-- Linearizability Section -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Linearizability (Strongest)</text>
  
  <!-- Timeline for Linearizability -->
  <rect x="50" y="125" width="360" height="100" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <text x="230" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#64748b">Global Real-Time Order</text>
  
  <!-- Process P1 -->
  <line x1="80" y1="165" x2="350" y2="165" stroke="#3b82f6" stroke-width="2"/>
  <text x="65" y="170" text-anchor="end" font-size="8" fill="#3b82f6">P1:</text>
  <circle cx="120" cy="165" r="5" fill="#3b82f6"/>
  <text x="120" y="185" text-anchor="middle" font-size="7" fill="#64748b">W(x)=1</text>
  <circle cx="280" cy="165" r="5" fill="#3b82f6"/>
  <text x="280" y="185" text-anchor="middle" font-size="7" fill="#64748b">R(x)=1</text>
  
  <!-- Process P2 -->
  <line x1="80" y1="195" x2="350" y2="195" stroke="#10b981" stroke-width="2"/>
  <text x="65" y="200" text-anchor="end" font-size="8" fill="#10b981">P2:</text>
  <circle cx="200" cy="195" r="5" fill="#10b981"/>
  <text x="200" y="215" text-anchor="middle" font-size="7" fill="#64748b">R(x)=1</text>
  
  <!-- Real-time boundary -->
  <line x1="120" y1="155" x2="120" y2="225" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="120" y="235" text-anchor="middle" font-size="7" fill="#ef4444">Real-time</text>
  
  <text x="230" y="255" text-anchor="middle" font-size="8" fill="#64748b">All operations appear in real-time order</text>
  
  <!-- Key properties -->
  <rect x="50" y="270" width="360" height="80" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="230" y="295" text-anchor="middle" font-size="10" font-weight="bold" fill="#b91c1c">Key Properties</text>
  <text x="230" y="315" text-anchor="middle" font-size="8" fill="#64748b">• Single global timeline</text>
  <text x="230" y="330" text-anchor="middle" font-size="8" fill="#64748b">• Respects real-time ordering</text>
  <text x="230" y="345" text-anchor="middle" font-size="8" fill="#64748b">• Write appears instantaneously</text>
  
  <!-- Sequential Consistency Section -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#0369a1">Sequential Consistency</text>
  
  <!-- Timeline for Sequential -->
  <rect x="490" y="125" width="360" height="100" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  
  <text x="670" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#64748b">Per-Process Order Preserved</text>
  
  <!-- Process P1 -->
  <line x1="520" y1="165" x2="790" y2="165" stroke="#3b82f6" stroke-width="2"/>
  <text x="505" y="170" text-anchor="end" font-size="8" fill="#3b82f6">P1:</text>
  <circle cx="560" cy="165" r="5" fill="#3b82f6"/>
  <text x="560" y="185" text-anchor="middle" font-size="7" fill="#64748b">W(x)=1</text>
  <circle cx="720" cy="165" r="5" fill="#3b82f6"/>
  <text x="720" y="185" text-anchor="middle" font-size="7" fill="#64748b">R(x)=1</text>
  
  <!-- Process P2 -->
  <line x1="520" y1="195" x2="790" y2="195" stroke="#10b981" stroke-width="2"/>
  <text x="505" y="200" text-anchor="end" font-size="8" fill="#10b981">P2:</text>
  <circle cx="600" cy="195" r="5" fill="#10b981"/>
  <text x="600" y="215" text-anchor="middle" font-size="7" fill="#64748b">R(x)=1</text>
  
  <!-- No real-time boundary -->
  <text x="670" y="235" text-anchor="middle" font-size="8" fill="#64748b">Operations can be reordered if per-process order preserved</text>
  
  <!-- Key properties -->
  <rect x="490" y="270" width="360" height="80" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="670" y="295" text-anchor="middle" font-size="10" font-weight="bold" fill="#0369a1">Key Properties</text>
  <text x="670" y="315" text-anchor="middle" font-size="8" fill="#64748b">• All processes see same order</text>
  <text x="670" y="330" text-anchor="middle" font-size="8" fill="#64748b">• Per-process program order preserved</text>
  <text x="670" y="345" text-anchor="middle" font-size="8" fill="#64748b">• Does NOT respect real-time</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Key Differences</text>
  
  <!-- Headers -->
  <rect x="50" y="415" width="800" height="35" rx="4" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <text x="200" y="438" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Aspect</text>
  <text x="450" y="438" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Linearizability</text>
  <text x="700" y="438" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Sequential</text>
  
  <!-- Row 1 -->
  <rect x="50" y="450" width="800" height="35" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="472" text-anchor="middle" font-size="9" fill="#64748b">Real-Time Order</text>
  <text x="450" y="472" text-anchor="middle" font-size="9" fill="#10b981">✓ Preserved</text>
  <text x="700" y="472" text-anchor="middle" font-size="9" fill="#ef4444">✗ Not Required</text>
  
  <!-- Row 2 -->
  <rect x="50" y="485" width="800" height="35" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="507" text-anchor="middle" font-size="9" fill="#64748b">Implementation Cost</text>
  <text x="450" y="507" text-anchor="middle" font-size="9" fill="#ef4444">High (sync required)</text>
  <text x="700" y="507" text-anchor="middle" font-size="9" fill="#10b981">Lower (async possible)</text>
  
  <!-- Row 3 -->
  <rect x="50" y="520" width="800" height="10" rx="2" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="200" y="528" text-anchor="middle" font-size="8" fill="#64748b">Examples</text>
  <text x="450" y="528" text-anchor="middle" font-size="8" fill="#64748b">Spanner, etcd, ZooKeeper</text>
  <text x="700" y="528" text-anchor="middle" font-size="8" fill="#64748b">Some replicated databases</text>
</svg>