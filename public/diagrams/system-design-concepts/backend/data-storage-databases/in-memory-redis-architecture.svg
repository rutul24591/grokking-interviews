<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">In-Memory Database Architecture</title>
  <desc id="desc">In-memory database showing master-replica replication, persistence modes, and eviction policies</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">In-Memory Database Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Master-Replica, Persistence, and Eviction</text>
  
  <!-- Master-Replica Architecture (Top) -->
  <rect x="50" y="85" width="800" height="160" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Master-Replica Architecture</text>
  
  <!-- Master -->
  <rect x="100" y="125" width="200" height="110" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="200" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Master (Primary)</text>
  <text x="200" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">Accepts writes</text>
  <text x="200" y="185" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">In-memory data store</text>
  <text x="200" y="200" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">100K+ ops/sec</text>
  <text x="200" y="215" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">Microsecond latency</text>
  
  <!-- Replication arrows -->
  <line x1="305" y1="155" x2="335" y2="140" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="305" y1="180" x2="335" y2="180" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="305" y1="205" x2="335" y2="220" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Replicas -->
  <rect x="350" y="125" width="150" height="80" rx="4" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="425" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Replica 1</text>
  <text x="425" y="168" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">Read-only</text>
  <text x="425" y="183" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">Async replication</text>
  <text x="425" y="198" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">Read scaling</text>
  
  <rect x="350" y="215" width="150" height="80" rx="4" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="425" y="240" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Replica 2</text>
  <text x="425" y="258" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">Read-only</text>
  <text x="425" y="273" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">Failover target</text>
  <text x="425" y="288" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">Read scaling</text>
  
  <!-- Persistence (Right) -->
  <rect x="520" y="125" width="310" height="110" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="675" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Persistence Modes</text>
  
  <rect x="535" y="165" width="140" height="55" rx="3" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="605" y="185" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">RDB Snapshots</text>
  <text x="605" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Point-in-time backup</text>
  <text x="605" y="213" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Fast recovery</text>
  
  <rect x="685" y="165" width="140" height="55" rx="3" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="755" y="185" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">AOF Log</text>
  <text x="755" y="200" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Every write logged</text>
  <text x="755" y="213" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Minimal data loss</text>
  
  <!-- Eviction Policies (Bottom) -->
  <rect x="50" y="255" width="800" height="160" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="280" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Eviction Policies (When Memory is Full)</text>
  
  <!-- LRU -->
  <rect x="70" y="295" width="180" height="110" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="160" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">LRU</text>
  <text x="160" y="335" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Least Recently Used</text>
  <text x="160" y="350" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Evict oldest accessed</text>
  <text x="160" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Good for caches</text>
  <text x="160" y="380" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Hot data stays in memory</text>
  <text x="160" y="395" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Default for caching</text>
  
  <!-- LFU -->
  <rect x="265" y="295" width="180" height="110" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="355" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">LFU</text>
  <text x="355" y="335" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Least Frequently Used</text>
  <text x="355" y="350" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Evict least accessed</text>
  <text x="355" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Good for hot data</text>
  <text x="355" y="380" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Frequently used stays</text>
  <text x="355" y="395" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Best for popular items</text>
  
  <!-- TTL -->
  <rect x="460" y="295" width="180" height="110" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="550" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">TTL-Based</text>
  <text x="550" y="335" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Time-to-Live expiry</text>
  <text x="550" y="350" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Auto-remove expired</text>
  <text x="550" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Good for sessions</text>
  <text x="550" y="380" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Predictable lifetime</text>
  <text x="550" y="395" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Good for session data</text>
  
  <!-- No Eviction -->
  <rect x="655" y="295" width="180" height="110" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="745" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">No Eviction</text>
  <text x="745" y="335" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Block writes when full</text>
  <text x="745" y="350" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Return errors</text>
  <text x="745" y="365" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Dangerous for prod</text>
  <text x="745" y="380" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">App must handle errors</text>
  <text x="745" y="395" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Avoid in production</text>
  
  <!-- Data Structures (Bottom) -->
  <rect x="50" y="425" width="800" height="110" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">Redis Data Structures</text>
  
  <rect x="70" y="465" width="110" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="125" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Strings</text>
  <text x="125" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Key-value, counters</text>
  
  <rect x="195" y="465" width="110" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Hashes</text>
  <text x="250" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Object fields</text>
  
  <rect x="320" y="465" width="110" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="375" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Lists</text>
  <text x="375" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Queues, stacks</text>
  
  <rect x="445" y="465" width="110" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="500" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Sets</text>
  <text x="500" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Unique items</text>
  
  <rect x="570" y="465" width="110" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="625" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Sorted Sets</text>
  <text x="625" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Leaderboards</text>
  
  <rect x="695" y="465" width="110" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="750" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Bitmaps</text>
  <text x="750" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Boolean flags</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>