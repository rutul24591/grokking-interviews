<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Block Storage vs Object vs File Storage</title>
  <desc id="desc">Comparison of block, object, and file storage</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Block vs Object vs File Storage</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Choosing the Right Storage Type</text>
  
  <!-- Block Storage (Left) -->
  <rect x="50" y="85" width="260" height="240" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Block Storage</text>
  
  <rect x="65" y="125" width="230" height="190" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <text x="180" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Raw storage volumes</text>
  <text x="180" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Fixed-size blocks</text>
  <text x="180" y="185" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Random read/write</text>
  <text x="180" y="200" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Low latency (sub-ms)</text>
  <text x="180" y="215" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Single-instance attach</text>
  <text x="180" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• File system required</text>
  
  <text x="180" y="260" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Lowest latency</text>
  <text x="180" y="275" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Single-AZ, no sharing</text>
  <text x="180" y="295" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: Databases, boot volumes</text>
  <text x="180" y="310" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Examples: EBS, Azure Disk</text>
  
  <!-- Object Storage (Middle) -->
  <rect x="320" y="85" width="260" height="240" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Object Storage</text>
  
  <rect x="335" y="125" width="230" height="190" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <text x="450" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Flat namespace objects</text>
  <text x="450" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• HTTP API access</text>
  <text x="450" y="185" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Immutable objects</text>
  <text x="450" y="200" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Massive scale (exabytes)</text>
  <text x="450" y="215" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Metadata + data</text>
  <text x="450" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• No random writes</text>
  
  <text x="450" y="260" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Massive scale, durable</text>
  <text x="450" y="275" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Higher latency, immutable</text>
  <text x="450" y="295" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: Media, backups, archives</text>
  <text x="450" y="310" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Examples: S3, GCS, Azure Blob</text>
  
  <!-- File Storage (Right) -->
  <rect x="590" y="85" width="260" height="240" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">File Storage</text>
  
  <rect x="605" y="125" width="230" height="190" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <text x="720" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Hierarchical directories</text>
  <text x="720" y="170" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• POSIX semantics</text>
  <text x="720" y="185" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Shared access (NFS/SMB)</text>
  <text x="720" y="200" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• File locking support</text>
  <text x="720" y="215" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Directory structure</text>
  <text x="720" y="230" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Moderate latency (ms)</text>
  
  <text x="720" y="260" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Shared access, POSIX</text>
  <text x="720" y="275" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Higher latency than block</text>
  <text x="720" y="295" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: Shared files, home dirs</text>
  <text x="720" y="310" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Examples: EFS, Azure Files</text>
  
  <!-- Decision Framework (Bottom) -->
  <rect x="50" y="335" width="800" height="200" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Decision Framework</text>
  
  <rect x="70" y="375" width="240" height="150" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="190" y="400" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Need Low Latency?</text>
  <line x1="190" y1="415" x2="190" y2="445" stroke="#374151" stroke-width="2"/>
  <text x="100" y="470" text-anchor="start" font-size="8" font-weight="700" fill="#059669">YES → Block Storage</text>
  <text x="100" y="485" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(Databases, boot)</text>
  <text x="250" y="470" text-anchor="start" font-size="8" font-weight="700" fill="#b91c1c">NO → Next question</text>
  
  <rect x="325" y="375" width="240" height="150" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="445" y="400" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Need Shared Access?</text>
  <line x1="445" y1="415" x2="445" y2="445" stroke="#374151" stroke-width="2"/>
  <text x="355" y="470" text-anchor="start" font-size="8" font-weight="700" fill="#059669">YES → File Storage</text>
  <text x="355" y="485" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(NFS, shared files)</text>
  <text x="505" y="470" text-anchor="start" font-size="8" font-weight="700" fill="#b91c1c">NO → Next question</text>
  
  <rect x="580" y="375" width="240" height="150" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="700" y="400" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Massive Scale + HTTP?</text>
  <line x1="700" y1="415" x2="700" y2="445" stroke="#374151" stroke-width="2"/>
  <text x="610" y="470" text-anchor="start" font-size="8" font-weight="700" fill="#059669">YES → Object Storage</text>
  <text x="610" y="485" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(Media, backups)</text>
  <text x="760" y="470" text-anchor="start" font-size="8" font-weight="700" fill="#059669">NO → Re-evaluate needs</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>