<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Concurrency Decision Framework</title>
  <desc id="desc">Choosing the right concurrency control strategy</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Concurrency Decision Framework</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Choosing the Right Concurrency Strategy</text>
  
  <!-- Decision Tree (Top) -->
  <rect x="50" y="85" width="800" height="200" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Decision Tree</text>
  
  <!-- Q1: Read/Write Ratio -->
  <rect x="70" y="125" width="240" height="150" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="190" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">1. Read/Write Ratio?</text>
  <line x1="190" y1="165" x2="190" y2="195" stroke="#374151" stroke-width="2"/>
  <text x="100" y="220" text-anchor="start" font-size="8" font-weight="700" fill="#059669">Read-Heavy → MVCC</text>
  <text x="100" y="235" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(PostgreSQL, Oracle)</text>
  <text x="250" y="220" text-anchor="start" font-size="8" font-weight="700" fill="#b91c1c">Write-Heavy → Next Q</text>
  
  <!-- Q2: Contention Level -->
  <rect x="330" y="125" width="240" height="150" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">2. Contention Level?</text>
  <line x1="450" y1="165" x2="450" y2="195" stroke="#374151" stroke-width="2"/>
  <text x="360" y="220" text-anchor="start" font-size="8" font-weight="700" fill="#059669">Low → Optimistic</text>
  <text x="360" y="235" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(Version-based)</text>
  <text x="510" y="220" text-anchor="start" font-size="8" font-weight="700" fill="#b91c1c">High → Next Q</text>
  
  <!-- Q3: Consistency Requirements -->
  <rect x="590" y="125" width="240" height="150" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="710" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">3. Consistency Needs?</text>
  <line x1="710" y1="165" x2="710" y2="195" stroke="#374151" stroke-width="2"/>
  <text x="620" y="220" text-anchor="start" font-size="8" font-weight="700" fill="#059669">Strong → Pessimistic</text>
  <text x="620" y="235" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">(SELECT FOR UPDATE)</text>
  <text x="770" y="220" text-anchor="start" font-size="8" font-weight="700" fill="#059669">Snapshot → MVCC</text>
  
  <!-- Strategy Comparison (Bottom Left) -->
  <rect x="50" y="295" width="400" height="240" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Strategy Comparison</text>
  
  <rect x="70" y="335" width="360" height="190" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <text x="250" y="360" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Pessimistic Locking:</text>
  <text x="250" y="380" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: High contention, financial</text>
  <text x="250" y="395" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Pros: No conflicts, simple</text>
  <text x="250" y="410" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Cons: Deadlocks, reduced concurrency</text>
  <text x="250" y="430" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Optimistic Locking:</text>
  <text x="250" y="450" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Best for: Low contention, read-heavy</text>
  <text x="250" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Pros: High concurrency, no locks</text>
  <text x="250" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Cons: Retries on conflict</text>
  
  <!-- Use Case Examples (Bottom Right) -->
  <rect x="465" y="295" width="385" height="240" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Use Case Examples</text>
  
  <rect x="485" y="335" width="345" height="190" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <text x="500" y="360" text-anchor="start" font-size="8" font-weight="700" fill="#92400e">E-commerce Inventory:</text>
  <text x="500" y="378" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Pessimistic (SELECT FOR UPDATE)</text>
  <text x="500" y="393" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Prevent overselling</text>
  <text x="500" y="408" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• High contention on popular items</text>
  
  <text x="500" y="435" text-anchor="start" font-size="8" font-weight="700" fill="#92400e">User Profile Updates:</text>
  <text x="500" y="453" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Optimistic (version column)</text>
  <text x="500" y="468" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Low contention (own profile)</text>
  <text x="500" y="483" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Retry on conflict</text>
  
  <text x="500" y="510" text-anchor="start" font-size="8" font-weight="700" fill="#92400e">Analytics Dashboard:</text>
  <text x="500" y="528" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• MVCC (snapshot isolation)</text>
  <text x="500" y="543" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Consistent view without locking</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>