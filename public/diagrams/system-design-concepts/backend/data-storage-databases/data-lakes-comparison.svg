<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Data Lakes vs Data Warehouses Comparison</title>
  <desc id="desc">Comparison of data lakes and data warehouses</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Data Lakes vs Data Warehouses</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Key Differences and When to Use Each</text>
  
  <!-- Data Lake (Left) -->
  <rect x="50" y="85" width="400" height="240" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Data Lake</text>
  
  <rect x="70" y="125" width="360" height="190" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <text x="250" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Schema-on-Read (flexible)</text>
  <text x="250" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Stores all data (structured, semi, unstructured)</text>
  <text x="250" y="190" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Raw data stored as-is</text>
  <text x="250" y="205" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Schema applied at query time</text>
  <text x="250" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Object storage (S3, ADLS)</text>
  <text x="250" y="235" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Cost-effective ($0.023/GB)</text>
  <text x="250" y="250" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• ML, exploration, raw analytics</text>
  
  <text x="250" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Flexible, cheap, stores everything</text>
  <text x="250" y="295" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Can become "data swamp" without governance</text>
  <text x="250" y="310" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Best for: Data science, ML, raw data storage</text>
  
  <!-- Data Warehouse (Right) -->
  <rect x="465" y="85" width="385" height="240" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Data Warehouse</text>
  
  <rect x="485" y="125" width="345" height="190" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <text x="657" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Schema-on-Write (structured)</text>
  <text x="657" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Stores structured data only</text>
  <text x="657" y="190" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Clean, transformed data</text>
  <text x="657" y="205" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Schema enforced before loading</text>
  <text x="657" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Columnar storage (Parquet, ORC)</text>
  <text x="657" y="235" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Higher cost ($0.05-0.30/GB)</text>
  <text x="657" y="250" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• BI, reporting, dashboards</text>
  
  <text x="657" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Reliable, fast queries, governed</text>
  <text x="657" y="295" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Expensive, rigid schema, ETL overhead</text>
  <text x="657" y="310" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Best for: BI, reporting, executive dashboards</text>
  
  <!-- Comparison Table (Bottom) -->
  <rect x="50" y="335" width="800" height="200" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Feature Comparison</text>
  
  <!-- Header -->
  <rect x="70" y="375" width="180" height="25" rx="3" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="160" y="392" text-anchor="middle" font-size="9" font-weight="700" fill="#0369a1">Feature</text>
  <rect x="260" y="375" width="180" height="25" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="392" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Data Lake</text>
  <rect x="450" y="375" width="180" height="25" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="392" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Data Warehouse</text>
  <rect x="640" y="375" width="190" height="25" rx="3" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/>
  <text x="735" y="392" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2937">Use When</text>
  
  <!-- Row 1 -->
  <rect x="70" y="403" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="417" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Schema</text>
  <rect x="260" y="403" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="417" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Schema-on-Read</text>
  <rect x="450" y="403" width="180" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="417" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Schema-on-Write</text>
  <rect x="640" y="403" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="417" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Flexibility vs structure?</text>
  
  <!-- Row 2 -->
  <rect x="70" y="426" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="440" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Data Types</text>
  <rect x="260" y="426" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="440" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">All (structured + raw)</text>
  <rect x="450" y="426" width="180" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="440" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Structured only</text>
  <rect x="640" y="426" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="440" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Diverse data sources?</text>
  
  <!-- Row 3 -->
  <rect x="70" y="449" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="463" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Cost</text>
  <rect x="260" y="449" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="463" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Low (object storage)</text>
  <rect x="450" y="449" width="180" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="463" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Higher (compute + storage)</text>
  <rect x="640" y="449" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="463" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Budget constraints?</text>
  
  <!-- Row 4 -->
  <rect x="70" y="472" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="486" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Users</text>
  <rect x="260" y="472" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="486" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Data scientists, engineers</text>
  <rect x="450" y="472" width="180" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="486" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Business analysts, executives</text>
  <rect x="640" y="472" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="486" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Who will query data?</text>
  
  <!-- Row 5 -->
  <rect x="70" y="495" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="509" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Use Case</text>
  <rect x="260" y="495" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="509" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">ML, exploration, raw data</text>
  <rect x="450" y="495" width="180" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="509" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">BI, reporting, dashboards</text>
  <rect x="640" y="495" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="509" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Analytics type?</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>