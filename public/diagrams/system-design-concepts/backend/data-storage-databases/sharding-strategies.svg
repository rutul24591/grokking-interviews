<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Database Sharding Strategies</title>
  <desc id="desc">Comparison of different database sharding strategies including key-based, range-based, hash-based, and directory-based sharding</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-theme, #1e293b)">Database Sharding Strategies</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="var(--text-theme, #64748b)">Horizontal partitioning techniques for distributed databases</text>
  
  <!-- Key-Based Sharding -->
  <rect x="30" y="80" width="270" height="160" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="165" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Key-Based Sharding</text>
  
  <!-- Key-Based Visualization -->
  <rect x="50" y="120" width="60" height="40" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="80" y="145" text-anchor="middle" font-size="10" fill="white">Key: 101</text>
  
  <line x1="110" y1="140" x2="140" y2="140" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="145" y="120" width="70" height="40" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="180" y="140" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Shard A</text>
  <text x="180" y="153" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Keys 1-200</text>
  
  <rect x="220" y="120" width="70" height="40" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="255" y="140" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Shard B</text>
  <text x="255" y="153" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Keys 201-400</text>
  
  <text x="165" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✓ Simple implementation</text>
  <text x="165" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✗ Uneven distribution</text>
  <text x="165" y="215" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✗ Hot spots possible</text>
  <text x="165" y="230" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Use: User IDs, sequential keys</text>
  
  <!-- Range-Based Sharding -->
  <rect x="315" y="80" width="270" height="160" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Range-Based Sharding</text>
  
  <!-- Range-Based Visualization -->
  <rect x="335" y="120" width="80" height="40" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="375" y="140" text-anchor="middle" font-size="9" fill="white">Date: 2024-Q1</text>
  <text x="375" y="153" text-anchor="middle" font-size="8" fill="white">Jan-Mar</text>
  
  <line x1="415" y1="140" x2="445" y2="140" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="450" y="120" width="60" height="40" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="480" y="138" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b)">Shard Q1</text>
  <text x="480" y="153" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Jan-Mar</text>
  
  <rect x="515" y="120" width="60" height="40" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="545" y="138" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b)">Shard Q2</text>
  <text x="545" y="153" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Apr-Jun</text>
  
  <text x="450" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✓ Good for range queries</text>
  <text x="450" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✗ Data skew by time</text>
  <text x="450" y="215" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✗ Rebalancing complex</text>
  <text x="450" y="230" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Use: Time-series, dates</text>
  
  <!-- Hash-Based Sharding -->
  <rect x="600" y="80" width="270" height="160" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="735" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Hash-Based Sharding</text>
  
  <!-- Hash-Based Visualization -->
  <rect x="620" y="120" width="60" height="40" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="650" y="140" text-anchor="middle" font-size="9" fill="white">Key: A</text>
  <text x="650" y="153" text-anchor="middle" font-size="8" fill="white">hash(A)</text>
  
  <line x1="680" y1="140" x2="700" y2="140" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  <text x="690" y="135" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">hash()</text>
  
  <rect x="705" y="120" width="70" height="40" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="740" y="138" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b)">Shard 0</text>
  <text x="740" y="150" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">hash % 4 = 0</text>
  
  <rect x="780" y="120" width="70" height="40" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="815" y="138" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b)">Shard 1</text>
  <text x="815" y="150" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">hash % 4 = 1</text>
  
  <text x="735" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✓ Even distribution</text>
  <text x="735" y="200" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✗ Range queries slow</text>
  <text x="735" y="215" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✓ Minimizes hot spots</text>
  <text x="735" y="230" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Use: High-volume OLTP</text>
  
  <!-- Directory-Based Sharding -->
  <rect x="30" y="260" width="270" height="160" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="165" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Directory-Based Sharding</text>
  
  <!-- Directory Visualization -->
  <rect x="50" y="300" width="80" height="50" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="90" y="320" text-anchor="middle" font-size="9" fill="white">Lookup</text>
  <text x="90" y="333" text-anchor="middle" font-size="9" fill="white">Service</text>
  
  <line x1="130" y1="325" x2="160" y2="325" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="145" y="320" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">query</text>
  
  <rect x="165" y="300" width="120" height="50" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="225" y="318" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b)">Shard Map</text>
  <text x="225" y="332" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b)">Key → Shard mapping</text>
  
  <line x1="225" y1="350" x2="225" y2="380" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="185" y="385" width="80" height="30" rx="4" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="225" y="403" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b)">Target Shard</text>
  
  <text x="165" y="440" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✓ Flexible mapping</text>
  <text x="165" y="455" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✗ Lookup overhead</text>
  <text x="165" y="470" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✓ Easy rebalancing</text>
  <text x="165" y="485" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Use: Complex routing logic</text>
  
  <!-- Consistent Hashing -->
  <rect x="315" y="260" width="270" height="160" rx="8" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="450" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Consistent Hashing</text>
  
  <!-- Consistent Hash Ring -->
  <circle cx="450" cy="340" r="50" fill="none" stroke="var(--bg-theme, #ef4444)" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Nodes on ring -->
  <circle cx="450" cy="290" r="8" fill="var(--bg-theme, #10b981)"/>
  <text x="450" y="285" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b)">Node A</text>
  
  <circle cx="500" cy="340" r="8" fill="var(--bg-theme, #3b82f6)"/>
  <text x="515" y="345" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b)">Node B</text>
  
  <circle cx="450" cy="390" r="8" fill="var(--bg-theme, #f59e0b)"/>
  <text x="450" y="405" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b)">Node C</text>
  
  <circle cx="400" cy="340" r="8" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="385" y="345" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b)">Node D</text>
  
  <!-- Data items -->
  <circle cx="470" cy="310" r="5" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="485" y="315" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b)">Key1</text>
  
  <circle cx="430" cy="370" r="5" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="415" y="380" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b)">Key2</text>
  
  <text x="450" y="440" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✓ Minimal rehashing</text>
  <text x="450" y="455" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✓ Easy scaling</text>
  <text x="450" y="470" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">✗ Complex implementation</text>
  <text x="450" y="485" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Use: Distributed caches</text>
  
  <!-- Comparison Table -->
  <rect x="600" y="260" width="270" height="160" rx="8" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="735" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Strategy Comparison</text>
  
  <text x="615" y="310" text-anchor="start" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b)">Strategy</text>
  <text x="700" y="310" text-anchor="start" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b)">Distribution</text>
  <text x="790" y="310" text-anchor="start" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b)">Range Query</text>
  
  <text x="615" y="330" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b)">Key-Based</text>
  <text x="700" y="330" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b)">Uneven</text>
  <text x="790" y="330" text-anchor="start" font-size="8" fill="var(--text-theme, #10b981)">✓ Good</text>
  
  <text x="615" y="350" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b)">Range-Based</text>
  <text x="700" y="350" text-anchor="start" font-size="8" fill="var(--text-theme, #f59e0b)">Skewed</text>
  <text x="790" y="350" text-anchor="start" font-size="8" fill="var(--text-theme, #10b981)">✓ Excellent</text>
  
  <text x="615" y="370" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b)">Hash-Based</text>
  <text x="700" y="370" text-anchor="start" font-size="8" fill="var(--text-theme, #10b981)">✓ Even</text>
  <text x="790" y="370" text-anchor="start" font-size="8" fill="var(--text-theme, #ef4444)">✗ Poor</text>
  
  <text x="615" y="390" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b)">Directory</text>
  <text x="700" y="390" text-anchor="start" font-size="8" fill="var(--text-theme, #10b981)">✓ Flexible</text>
  <text x="790" y="390" text-anchor="start" font-size="8" fill="var(--text-theme, #10b981)">✓ Good</text>
  
  <text x="615" y="410" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b)">Consistent</text>
  <text x="700" y="410" text-anchor="start" font-size="8" fill="var(--text-theme, #10b981)">✓ Even</text>
  <text x="790" y="410" text-anchor="start" font-size="8" fill="var(--text-theme, #f59e0b)">△ Fair</text>
  
  <!-- Best Practices -->
  <rect x="600" y="435" width="270" height="75" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="735" y="455" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">Best Practices</text>
  <text x="615" y="475" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Choose shard key carefully to avoid hot spots</text>
  <text x="615" y="490" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Plan for rebalancing from the start</text>
  <text x="615" y="505" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Monitor shard size and query distribution</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
