<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Query Optimization Use Cases</title>
  <desc id="desc">Real-world query optimization examples</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Query Optimization Use Cases</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Before and After Optimization</text>
  
  <!-- E-commerce Product Search (Left) -->
  <rect x="50" y="85" width="400" height="220" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">E-commerce: Product Search</text>
  
  <rect x="70" y="125" width="360" height="85" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="250" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Before (Slow):</text>
  <text x="85" y="165" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">SELECT * FROM products WHERE category_id = ?</text>
  <text x="85" y="180" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">ORDER BY created_at DESC LIMIT 20</text>
  <text x="85" y="195" text-anchor="start" font-size="7" font-weight="600" fill="#b91c1c">Problem: Seq Scan + filesort</text>
  <text x="380" y="205" text-anchor="end" font-size="7" font-weight="700" fill="#b91c1c">500ms</text>
  
  <rect x="70" y="220" width="360" height="75" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="250" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">After (Fast):</text>
  <text x="85" y="260" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">CREATE INDEX idx_cat_created ON products(category_id, created_at)</text>
  <text x="85" y="275" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">SELECT id, name, price FROM products WHERE category_id = ?</text>
  <text x="85" y="290" text-anchor="start" font-size="7" font-weight="600" fill="#059669">Result: Index Scan, no filesort</text>
  <text x="380" y="290" text-anchor="end" font-size="7" font-weight="700" fill="#059669">5ms (100x faster!)</text>
  
  <!-- Social Media Feed (Right) -->
  <rect x="465" y="85" width="385" height="220" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Social Media: User Feed</text>
  
  <rect x="485" y="125" width="345" height="85" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="657" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Before (Slow):</text>
  <text x="500" y="165" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">SELECT * FROM posts WHERE user_id IN (followed_users)</text>
  <text x="500" y="180" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">ORDER BY created_at DESC LIMIT 50</text>
  <text x="500" y="195" text-anchor="start" font-size="7" font-weight="600" fill="#b91c1c">Problem: N+1 query, no index</text>
  <text x="810" y="205" text-anchor="end" font-size="7" font-weight="700" fill="#b91c1c">2000ms</text>
  
  <rect x="485" y="220" width="345" height="75" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="657" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">After (Fast):</text>
  <text x="500" y="260" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">CREATE INDEX idx_user_created ON posts(user_id, created_at)</text>
  <text x="500" y="275" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Use JOIN with followed_users table</text>
  <text x="500" y="290" text-anchor="start" font-size="7" font-weight="600" fill="#059669">Result: Single query with index</text>
  <text x="810" y="290" text-anchor="end" font-size="7" font-weight="700" fill="#059669">20ms (100x faster!)</text>
  
  <!-- Analytics Dashboard (Bottom Left) -->
  <rect x="50" y="315" width="400" height="220" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="250" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#0369a1">Analytics: Dashboard Aggregation</text>
  
  <rect x="70" y="355" width="360" height="85" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="250" y="375" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Before (Slow):</text>
  <text x="85" y="395" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">SELECT DATE(created_at), COUNT(*), SUM(amount)</text>
  <text x="85" y="408" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">FROM orders GROUP BY DATE(created_at)</text>
  <text x="85" y="423" text-anchor="start" font-size="7" font-weight="600" fill="#b91c1c">Problem: Full table scan every request</text>
  <text x="380" y="435" text-anchor="end" font-size="7" font-weight="700" fill="#b91c1c">5000ms</text>
  
  <rect x="70" y="450" width="360" height="75" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="250" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">After (Fast):</text>
  <text x="85" y="490" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Pre-aggregate daily stats in summary table</text>
  <text x="85" y="505" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Query summary table instead</text>
  <text x="85" y="520" text-anchor="start" font-size="7" font-weight="600" fill="#059669">Result: Read pre-computed data</text>
  <text x="380" y="520" text-anchor="end" font-size="7" font-weight="700" fill="#059669">10ms (500x faster!)</text>
  
  <!-- Multi-tenant SaaS (Bottom Right) -->
  <rect x="465" y="315" width="385" height="220" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">SaaS: Multi-tenant Query</text>
  
  <rect x="485" y="355" width="345" height="85" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="657" y="375" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Before (Slow):</text>
  <text x="500" y="395" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">SELECT * FROM data WHERE tenant_id = ? AND status = ?</text>
  <text x="500" y="410" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Problem: No composite index</text>
  <text x="500" y="425" text-anchor="start" font-size="7" font-weight="600" fill="#b91c1c">Scans all tenant data</text>
  <text x="810" y="435" text-anchor="end" font-size="7" font-weight="700" fill="#b91c1c">800ms</text>
  
  <rect x="485" y="450" width="345" height="75" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="657" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">After (Fast):</text>
  <text x="500" y="490" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">CREATE INDEX idx_tenant_status ON data(tenant_id, status)</text>
  <text x="500" y="505" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Add PARTIAL INDEX WHERE status = 'active'</text>
  <text x="500" y="520" text-anchor="start" font-size="7" font-weight="600" fill="#059669">Result: Tenant isolation + status filter</text>
  <text x="810" y="520" text-anchor="end" font-size="7" font-weight="700" fill="#059669">8ms (100x faster!)</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>