<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">CAP Real World Examples</title>
  <desc id="desc">Real-world systems positioned on CAP spectrum with tunable consistency</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Real-World CAP Examples</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Systems positioned on CAP spectrum</text>
  
  <!-- CAP Spectrum Line -->
  <line x1="100" y1="150" x2="800" y2="150" stroke="#64748b" stroke-width="3"/>
  
  <!-- CP End -->
  <circle cx="100" cy="150" r="40" fill="#3b82f6" stroke="#1e40af" stroke-width="3"/>
  <text x="100" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="white">CP</text>
  <text x="100" y="200" text-anchor="middle" font-size="10" fill="#1e40af">Consistency</text>
  <text x="100" y="215" text-anchor="middle" font-size="9" fill="#64748b">Priority</text>
  
  <!-- Middle -->
  <circle cx="450" cy="150" r="30" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="450" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Tunable</text>
  
  <!-- AP End -->
  <circle cx="800" cy="150" r="40" fill="#10b981" stroke="#059669" stroke-width="3"/>
  <text x="800" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="white">AP</text>
  <text x="800" y="200" text-anchor="middle" font-size="10" fill="#059669">Availability</text>
  <text x="800" y="215" text-anchor="middle" font-size="9" fill="#64748b">Priority</text>
  
  <!-- CP Systems -->
  <rect x="50" y="230" width="200" height="150" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="150" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="#0369a1">CP Systems</text>
  
  <rect x="70" y="270" width="160" height="35" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="292" text-anchor="middle" font-size="9" fill="#1e40af">PostgreSQL</text>
  <text x="150" y="305" text-anchor="middle" font-size="7" fill="#64748b">Strong consistency</text>
  
  <rect x="70" y="310" width="160" height="35" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="332" text-anchor="middle" font-size="9" fill="#1e40af">MongoDB (majority)</text>
  <text x="150" y="345" text-anchor="middle" font-size="7" fill="#64748b">Quorum writes</text>
  
  <rect x="70" y="350" width="160" height="25" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="150" y="367" text-anchor="middle" font-size="8" fill="#1e40af">Google Spanner</text>
  
  <!-- Tunable Systems -->
  <rect x="350" y="230" width="200" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Tunable Consistency</text>
  
  <rect x="370" y="270" width="160" height="35" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="292" text-anchor="middle" font-size="9" fill="#b45309">Cassandra</text>
  <text x="450" y="305" text-anchor="middle" font-size="7" fill="#64748b">W+R&gt;N quorum</text>
  
  <rect x="370" y="310" width="160" height="35" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="332" text-anchor="middle" font-size="9" fill="#b45309">DynamoDB</text>
  <text x="450" y="345" text-anchor="middle" font-size="7" fill="#64748b">Configurable consistency</text>
  
  <rect x="370" y="350" width="160" height="25" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="367" text-anchor="middle" font-size="8" fill="#b45309">Cosmos DB</text>
  
  <!-- AP Systems -->
  <rect x="650" y="230" width="200" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="750" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">AP Systems</text>
  
  <rect x="670" y="270" width="160" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="750" y="292" text-anchor="middle" font-size="9" fill="#047857">DNS</text>
  <text x="750" y="305" text-anchor="middle" font-size="7" fill="#64748b">Eventually consistent</text>
  
  <rect x="670" y="310" width="160" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="750" y="332" text-anchor="middle" font-size="9" fill="#047857">CDN (CloudFlare)</text>
  <text x="750" y="345" text-anchor="middle" font-size="7" fill="#64748b">High availability</text>
  
  <rect x="670" y="350" width="160" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="750" y="367" text-anchor="middle" font-size="8" fill="#047857">Riak</text>
  
  <!-- Tunable Consistency Detail -->
  <rect x="50" y="400" width="400" height="130" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="250" y="425" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Tunable Consistency: Quorum</text>
  
  <rect x="70" y="440" width="360" height="80" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  
  <text x="250" y="465" text-anchor="middle" font-size="10" fill="#64748b">Formula: W + R &gt; N</text>
  <text x="250" y="485" text-anchor="middle" font-size="8" fill="#64748b">W = Write quorum, R = Read quorum, N = Replicas</text>
  
  <rect x="90" y="495" width="150" height="20" rx="3" fill="#3b82f6"/>
  <text x="165" y="510" text-anchor="middle" font-size="8" fill="white">Strong: W=N, R=1</text>
  
  <rect x="260" y="495" width="150" height="20" rx="3" fill="#10b981"/>
  <text x="335" y="510" text-anchor="middle" font-size="8" fill="white">Available: W=1, R=N</text>
  
  <!-- Use Case Decision -->
  <rect x="470" y="400" width="380" height="130" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="660" y="425" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">Choosing CP vs AP</text>
  
  <rect x="490" y="440" width="340" height="80" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <rect x="510" y="455" width="300" height="25" rx="3" fill="#ef4444"/>
  <text x="660" y="472" text-anchor="middle" font-size="8" fill="white">Choose CP: Financial transactions, inventory</text>
  
  <rect x="510" y="485" width="300" height="25" rx="3" fill="#10b981"/>
  <text x="660" y="502" text-anchor="middle" font-size="8" fill="white">Choose AP: Social feeds, shopping cart, DNS</text>
  
  <rect x="510" y="515" width="300" height="10" rx="2" fill="#f59e0b"/>
  <text x="660" y="525" text-anchor="middle" font-size="7" fill="#64748b">Key question: What's worse—downtime or stale data?</text>
</svg>