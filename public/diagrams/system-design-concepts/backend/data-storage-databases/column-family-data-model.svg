<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Column-Family Data Model</title>
  <desc id="desc">Wide row structure showing column families and flexible schema</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Column-Family Data Model</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Wide Row Structure with Flexible Schema</text>
  
  <!-- Wide Row Structure (Left) -->
  <rect x="50" y="85" width="400" height="240" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Wide Row Structure</text>
  
  <!-- Row Key -->
  <rect x="70" y="125" width="100" height="40" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="120" y="145" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Row Key</text>
  <text x="120" y="160" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">user:123</text>
  
  <!-- Arrow -->
  <line x1="175" y1="145" x2="205" y2="145" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Column Families -->
  <rect x="210" y="125" width="220" height="180" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Profile Column Family -->
  <rect x="220" y="135" width="200" height="50" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="320" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Column Family: profile</text>
  <text x="230" y="170" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">name: "Alice" @ts=1000</text>
  <text x="230" y="182" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">email: "alice@example.com" @ts=1000</text>
  
  <!-- Posts Column Family -->
  <rect x="220" y="190" width="200" height="50" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="320" y="207" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Column Family: posts</text>
  <text x="230" y="225" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">post:100: "Hello..." @ts=2000</text>
  <text x="230" y="237" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">post:101: "World..." @ts=2001</text>
  
  <!-- Comments Column Family -->
  <rect x="220" y="245" width="200" height="50" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="320" y="262" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Column Family: comments</text>
  <text x="230" y="280" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">comment:500: "Nice!" @ts=3000</text>
  
  <!-- Flexible Schema Comparison (Right) -->
  <rect x="465" y="85" width="385" height="240" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Flexible Schema per Row</text>
  
  <!-- Row 1 -->
  <rect x="485" y="125" width="170" height="90" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="570" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Row: sensor:001</text>
  <text x="570" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">temperature: 25.5</text>
  <text x="570" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">humidity: 60%</text>
  <text x="570" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">pressure: 1013 hPa</text>
  <text x="570" y="204" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">battery: 85%</text>
  
  <!-- Row 2 -->
  <rect x="670" y="125" width="170" height="90" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="755" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Row: sensor:002</text>
  <text x="755" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">temperature: 26.1</text>
  <text x="755" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">humidity: 55%</text>
  <text x="755" y="191" text-anchor="middle" font-size="7" font-weight="600" fill="#9ca3af">pressure: (missing)</text>
  <text x="755" y="204" text-anchor="middle" font-size="7" font-weight="600" fill="#9ca3af">battery: (missing)</text>
  
  <text x="657" y="235" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ No storage waste for missing columns</text>
  
  <!-- Column Structure Detail (Bottom Left) -->
  <rect x="50" y="335" width="400" height="120" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="250" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Column Structure</text>
  
  <rect x="70" y="375" width="360" height="70" rx="4" fill="#ffffff" stroke="#38bdf8" stroke-width="1"/>
  
  <!-- Column components -->
  <rect x="85" y="390" width="70" height="40" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="120" y="410" text-anchor="middle" font-size="8" font-weight="700" fill="#1e3a8a">Column Key</text>
  <text x="120" y="423" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">"name"</text>
  
  <line x1="160" y1="410" x2="175" y2="410" stroke="#374151" stroke-width="2"/>
  
  <rect x="180" y="390" width="70" height="40" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="215" y="410" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Value</text>
  <text x="215" y="423" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">"Alice"</text>
  
  <line x1="255" y1="410" x2="270" y2="410" stroke="#374151" stroke-width="2"/>
  
  <rect x="275" y="390" width="70" height="40" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="310" y="410" text-anchor="middle" font-size="8" font-weight="700" fill="#065f46">Timestamp</text>
  <text x="310" y="423" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">1000</text>
  
  <line x1="350" y1="410" x2="365" y2="410" stroke="#374151" stroke-width="2"/>
  
  <rect x="370" y="390" width="55" height="40" rx="3" fill="#faf3dd" stroke="#d97706" stroke-width="1"/>
  <text x="397" y="410" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">TTL</text>
  <text x="397" y="423" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">3600s</text>
  
  <!-- Relational vs Column-Family (Bottom Right) -->
  <rect x="465" y="335" width="385" height="120" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="657" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Relational vs Column-Family</text>
  
  <!-- Relational -->
  <rect x="485" y="375" width="170" height="70" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="570" y="395" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">Relational Table</text>
  <text x="570" y="415" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Fixed schema</text>
  <text x="570" y="428" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• All columns stored together</text>
  <text x="570" y="441" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ NULL waste storage</text>
  
  <!-- Column-Family -->
  <rect x="670" y="375" width="170" height="70" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="755" y="395" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Column-Family Store</text>
  <text x="755" y="415" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Flexible schema per row</text>
  <text x="755" y="428" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">• Column families stored separately</text>
  <text x="755" y="441" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ No storage waste</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>