<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Consistency Models Spectrum</title>
  <desc id="desc">Consistency models from strong to eventual with examples</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Consistency Models Spectrum</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">From strong consistency to eventual consistency</text>
  
  <!-- Consistency Spectrum -->
  <line x1="100" y1="120" x2="800" y2="120" stroke="#64748b" stroke-width="4"/>
  
  <!-- Strong end -->
  <text x="100" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444">Strong</text>
  
  <!-- Weak end -->
  <text x="800" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#10b981">Eventual</text>
  
  <!-- Linearizability -->
  <rect x="80" y="130" width="120" height="70" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="140" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Linearizability</text>
  <text x="140" y="175" text-anchor="middle" font-size="7" fill="#fca5a5">Strongest guarantee</text>
  <text x="140" y="190" text-anchor="middle" font-size="7" fill="#fca5a5">Single global order</text>
  
  <!-- Sequential -->
  <rect x="220" y="130" width="120" height="70" rx="4" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="280" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Sequential</text>
  <text x="280" y="175" text-anchor="middle" font-size="7" fill="#fef3c7">Per-process order</text>
  <text x="280" y="190" text-anchor="middle" font-size="7" fill="#fef3c7">All see same order</text>
  
  <!-- Causal -->
  <rect x="360" y="130" width="120" height="70" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="420" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Causal</text>
  <text x="420" y="175" text-anchor="middle" font-size="7" fill="#bfdbfe">Causally related</text>
  <text x="420" y="190" text-anchor="middle" font-size="7" fill="#bfdbfe">preserved</text>
  
  <!-- Read-your-writes -->
  <rect x="500" y="130" width="120" height="70" rx="4" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2"/>
  <text x="560" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Read-Your-Writes</text>
  <text x="560" y="175" text-anchor="middle" font-size="7" fill="#c4b5fd">Session consistency</text>
  <text x="560" y="190" text-anchor="middle" font-size="7" fill="#c4b5fd">See your own writes</text>
  
  <!-- Bounded Staleness -->
  <rect x="640" y="130" width="120" height="70" rx="4" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="700" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Bounded Staleness</text>
  <text x="700" y="175" text-anchor="middle" font-size="7" fill="#6ee7b7">Max K versions</text>
  <text x="700" y="190" text-anchor="middle" font-size="7" fill="#6ee7b7">or T time behind</text>
  
  <!-- Eventual -->
  <rect x="780" y="130" width="100" height="70" rx="4" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="830" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Eventual</text>
  <text x="830" y="175" text-anchor="middle" font-size="7" fill="#6ee7b7">Converge over time</text>
  <text x="830" y="190" text-anchor="middle" font-size="7" fill="#6ee7b7">No timing guarantee</text>
  
  <!-- Detailed Examples -->
  <rect x="50" y="220" width="260" height="150" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="180" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#b91c1c">Linearizability</text>
  
  <rect x="70" y="260" width="220" height="100" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="180" y="285" text-anchor="middle" font-size="8" fill="#64748b">Write X=10 completes at T1</text>
  <text x="180" y="300" text-anchor="middle" font-size="8" fill="#64748b">ALL reads after T1 see X=10</text>
  <text x="180" y="315" text-anchor="middle" font-size="8" fill="#64748b">Or reads before T1 see old value</text>
  <text x="180" y="335" text-anchor="middle" font-size="8" fill="#b91c1c">Examples: Spanner, etcd, ZooKeeper</text>
  
  <rect x="325" y="220" width="260" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="455" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Causal Consistency</text>
  
  <rect x="345" y="260" width="220" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="455" y="285" text-anchor="middle" font-size="8" fill="#64748b">If A happens-before B</text>
  <text x="455" y="300" text-anchor="middle" font-size="8" fill="#64748b">All nodes see A before B</text>
  <text x="455" y="315" text-anchor="middle" font-size="8" fill="#64748b">Unrelated ops can be reordered</text>
  <text x="455" y="335" text-anchor="middle" font-size="8" fill="#b45309">Examples: Facebook photos, comments</text>
  
  <rect x="600" y="220" width="260" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="245" text-anchor="middle" font-size="12" font-weight="bold" fill="#047857">Eventual Consistency</text>
  
  <rect x="620" y="260" width="220" height="100" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="730" y="285" text-anchor="middle" font-size="8" fill="#64748b">Write X=10 to Node A</text>
  <text x="730" y="300" text-anchor="middle" font-size="8" fill="#64748b">Node B may return X=5 (stale)</text>
  <text x="730" y="315" text-anchor="middle" font-size="8" fill="#64748b">Eventually all return X=10</text>
  <text x="730" y="335" text-anchor="middle" font-size="8" fill="#047857">Examples: DNS, CDN, DynamoDB</text>
  
  <!-- Trade-offs -->
  <rect x="50" y="385" width="400" height="145" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="250" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#0369a1">Strong Consistency Trade-offs</text>
  
  <rect x="70" y="425" width="360" height="95" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  
  <rect x="90" y="440" width="320" height="30" rx="3" fill="#3b82f6"/>
  <text x="250" y="460" text-anchor="middle" font-size="9" fill="white">+ Simple programming model</text>
  
  <rect x="90" y="475" width="320" height="30" rx="3" fill="#10b981"/>
  <text x="250" y="495" text-anchor="middle" font-size="9" fill="white">+ No stale reads</text>
  
  <rect x="90" y="510" width="320" height="10" rx="2" fill="#ef4444"/>
  <text x="250" y="520" text-anchor="middle" font-size="8" fill="#64748b">- Higher latency, lower availability during partitions</text>
  
  <rect x="470" y="385" width="380" height="145" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="410" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Eventual Consistency Trade-offs</text>
  
  <rect x="490" y="425" width="340" height="95" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  
  <rect x="510" y="440" width="300" height="30" rx="3" fill="#10b981"/>
  <text x="660" y="460" text-anchor="middle" font-size="9" fill="white">+ Low latency, high availability</text>
  
  <rect x="510" y="475" width="300" height="30" rx="3" fill="#3b82f6"/>
  <text x="660" y="495" text-anchor="middle" font-size="9" fill="white">+ Works during network partitions</text>
  
  <rect x="510" y="510" width="300" height="10" rx="2" fill="#ef4444"/>
  <text x="660" y="520" text-anchor="middle" font-size="8" fill="#64748b">- Complex application logic, stale reads possible</text>
</svg>