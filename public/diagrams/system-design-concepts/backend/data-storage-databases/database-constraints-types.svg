<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Database Constraints Types</title>
  <desc id="desc">PRIMARY KEY, FOREIGN KEY, UNIQUE, CHECK, NOT NULL constraints</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Database Constraints Types</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Enforcing Data Integrity at Database Level</text>
  
  <!-- PRIMARY KEY (Top Left) -->
  <rect x="50" y="85" width="260" height="140" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">PRIMARY KEY</text>
  
  <rect x="65" y="125" width="230" height="90" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="180" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Unique + NOT NULL</text>
  <text x="180" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• One per table</text>
  <text x="180" y="180" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Auto-indexed</text>
  <text x="180" y="195" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Example: user_id INT PRIMARY KEY</text>
  <text x="180" y="210" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Uniquely identifies rows</text>
  
  <!-- FOREIGN KEY (Top Middle) -->
  <rect x="320" y="85" width="260" height="140" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">FOREIGN KEY</text>
  
  <rect x="335" y="125" width="230" height="90" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• References another table</text>
  <text x="450" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Referential integrity</text>
  <text x="450" y="180" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• CASCADE/SET NULL/RESTRICT</text>
  <text x="450" y="195" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Example: user_id INT REFERENCES users(id)</text>
  <text x="450" y="210" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Prevents orphaned records</text>
  
  <!-- UNIQUE (Top Right) -->
  <rect x="590" y="85" width="260" height="140" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">UNIQUE</text>
  
  <rect x="605" y="125" width="230" height="90" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="720" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• No duplicate values</text>
  <text x="720" y="165" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Allows NULL (one NULL)</text>
  <text x="720" y="180" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Auto-indexed</text>
  <text x="720" y="195" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Example: email VARCHAR UNIQUE</text>
  <text x="720" y="210" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Prevents duplicates</text>
  
  <!-- CHECK (Bottom Left) -->
  <rect x="50" y="235" width="400" height="140" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="250" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">CHECK Constraint</text>
  
  <rect x="70" y="275" width="360" height="90" rx="4" fill="#dbeafe" stroke="#38bdf8" stroke-width="1"/>
  <text x="250" y="300" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Custom condition must be true</text>
  <text x="250" y="315" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Example: CHECK (age &gt;= 0 AND age &lt; 150)</text>
  <text x="250" y="330" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Example: CHECK (total &gt;= 0)</text>
  <text x="250" y="345" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Example: CHECK (status IN ('active', 'inactive', 'pending'))</text>
  <text x="250" y="360" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Enforces business rules at database level</text>
  
  <!-- NOT NULL (Bottom Right) -->
  <rect x="465" y="235" width="385" height="140" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="657" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">NOT NULL Constraint</text>
  
  <rect x="485" y="275" width="345" height="90" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="657" y="300" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Column cannot be NULL</text>
  <text x="657" y="315" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Required field</text>
  <text x="657" y="330" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Example: name VARCHAR NOT NULL</text>
  <text x="657" y="345" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Example: email VARCHAR NOT NULL</text>
  <text x="657" y="360" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Ensures required data is present</text>
  
  <!-- Foreign Key Actions (Bottom) -->
  <rect x="50" y="385" width="800" height="150" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="410" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Foreign Key Actions (ON DELETE)</text>
  
  <!-- CASCADE -->
  <rect x="70" y="425" width="180" height="100" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="160" y="445" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">CASCADE</text>
  <text x="160" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Delete parent → delete children</text>
  <text x="160" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Example: Delete user → delete orders</text>
  <text x="160" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Clean deletion</text>
  <text x="160" y="515" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Data loss risk</text>
  
  <!-- SET NULL -->
  <rect x="265" y="425" width="180" height="100" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="355" y="445" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">SET NULL</text>
  <text x="355" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Delete parent → FK = NULL</text>
  <text x="355" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Example: Delete category → products orphaned</text>
  <text x="355" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Preserves children</text>
  <text x="355" y="515" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Orphaned records</text>
  
  <!-- RESTRICT -->
  <rect x="460" y="425" width="180" height="100" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="550" y="445" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">RESTRICT</text>
  <text x="550" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Prevent delete if children exist</text>
  <text x="550" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Example: Can't delete user with orders</text>
  <text x="550" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Safe, prevents data loss</text>
  <text x="550" y="515" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Must delete children first</text>
  
  <!-- SET DEFAULT -->
  <rect x="655" y="425" width="180" height="100" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="745" y="445" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">SET DEFAULT</text>
  <text x="745" y="465" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Delete parent → FK = default value</text>
  <text x="745" y="480" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Example: Delete user → orders assigned to "Unknown"</text>
  <text x="745" y="500" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Preserves children</text>
  <text x="745" y="515" text-anchor="middle" font-size="7" font-weight="700" fill="#b91c1c">✗ Needs default record</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>