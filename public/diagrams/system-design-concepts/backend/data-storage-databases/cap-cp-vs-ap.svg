<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">CP vs AP During Partition</title>
  <desc id="desc">CP vs AP behavior during network partition with examples</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">CP vs AP During Network Partition</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">How different systems behave when network fails</text>
  
  <!-- CP System (Left) -->
  <rect x="30" y="85" width="400" height="280" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#0369a1">CP System: Consistency Over Availability</text>
  
  <!-- Before partition -->
  <rect x="50" y="125" width="360" height="70" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="230" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Before Partition: Normal Operation</text>
  
  <circle cx="120" cy="175" r="20" fill="#3b82f6"/>
  <text x="120" y="180" text-anchor="middle" font-size="8" fill="white">Node A</text>
  
  <line x1="145" y1="175" x2="195" y2="175" stroke="#64748b" stroke-width="2"/>
  
  <circle cx="220" cy="175" r="20" fill="#3b82f6"/>
  <text x="220" y="180" text-anchor="middle" font-size="8" fill="white">Node B</text>
  
  <line x1="245" y1="175" x2="295" y2="175" stroke="#64748b" stroke-width="2"/>
  
  <circle cx="320" cy="175" r="20" fill="#3b82f6"/>
  <text x="320" y="180" text-anchor="middle" font-size="8" fill="white">Node C</text>
  
  <text x="230" y="205" text-anchor="middle" font-size="8" fill="#64748b">All nodes synchronized, X=5</text>
  
  <!-- After partition -->
  <rect x="50" y="210" width="360" height="140" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="230" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#b91c1c">During Partition: CP Behavior</text>
  
  <!-- Node A isolated -->
  <rect x="70" y="250" width="80" height="60" rx="4" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="110" y="275" text-anchor="middle" font-size="8" fill="white">Node A</text>
  <text x="110" y="295" text-anchor="middle" font-size="7" fill="#fca5a5">MINORITY</text>
  <text x="110" y="305" text-anchor="middle" font-size="7" fill="#ef4444">✗ Writes BLOCKED</text>
  
  <!-- Partition barrier -->
  <line x1="165" y1="250" x2="165" y2="310" stroke="#ef4444" stroke-width="3" stroke-dasharray="5,3"/>
  <text x="165" y="330" text-anchor="middle" font-size="7" fill="#ef4444">NETWORK PARTITION</text>
  
  <!-- Nodes B+C majority -->
  <rect x="185" y="250" width="200" height="60" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="285" y="275" text-anchor="middle" font-size="8" fill="white">Node B + Node C</text>
  <text x="285" y="295" text-anchor="middle" font-size="7" fill="#22c55e">MAJORITY (quorum)</text>
  <text x="285" y="305" text-anchor="middle" font-size="7" fill="#22c55e">✓ Writes ACCEPTED</text>
  
  <text x="230" y="345" text-anchor="middle" font-size="8" fill="#64748b">CP: Minority partition blocks writes to preserve consistency</text>
  
  <!-- AP System (Right) -->
  <rect x="470" y="85" width="400" height="280" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">AP System: Availability Over Consistency</text>
  
  <!-- Before partition -->
  <rect x="490" y="125" width="360" height="70" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="670" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#b45309">Before Partition: Normal Operation</text>
  
  <circle cx="560" cy="175" r="20" fill="#f59e0b"/>
  <text x="560" y="180" text-anchor="middle" font-size="8" fill="white">Node A</text>
  
  <line x1="585" y1="175" x2="635" y2="175" stroke="#64748b" stroke-width="2"/>
  
  <circle cx="660" cy="175" r="20" fill="#f59e0b"/>
  <text x="660" y="180" text-anchor="middle" font-size="8" fill="white">Node B</text>
  
  <line x1="685" y1="175" x2="735" y2="175" stroke="#64748b" stroke-width="2"/>
  
  <circle cx="760" cy="175" r="20" fill="#f59e0b"/>
  <text x="760" y="180" text-anchor="middle" font-size="8" fill="white">Node C</text>
  
  <text x="670" y="205" text-anchor="middle" font-size="8" fill="#64748b">All nodes synchronized, X=5</text>
  
  <!-- After partition -->
  <rect x="490" y="210" width="360" height="140" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="670" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#b91c1c">During Partition: AP Behavior</text>
  
  <!-- Node A accepts writes -->
  <rect x="510" y="250" width="100" height="60" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="275" text-anchor="middle" font-size="8" fill="white">Node A</text>
  <text x="560" y="295" text-anchor="middle" font-size="7" fill="#22c55e">✓ Writes ACCEPTED</text>
  <text x="560" y="305" text-anchor="middle" font-size="7" fill="#ef4444">X=10 (diverges!)</text>
  
  <!-- Partition barrier -->
  <line x1="625" y1="250" x2="625" y2="310" stroke="#ef4444" stroke-width="3" stroke-dasharray="5,3"/>
  <text x="625" y="330" text-anchor="middle" font-size="7" fill="#ef4444">NETWORK PARTITION</text>
  
  <!-- Nodes B+C accept writes -->
  <rect x="645" y="250" width="180" height="60" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="275" text-anchor="middle" font-size="8" fill="white">Node B + Node C</text>
  <text x="735" y="295" text-anchor="middle" font-size="7" fill="#22c55e">✓ Writes ACCEPTED</text>
  <text x="735" y="305" text-anchor="middle" font-size="7" fill="#ef4444">X=15 (diverges!)</text>
  
  <text x="670" y="345" text-anchor="middle" font-size="8" fill="#64748b">AP: All partitions accept writes, replicas diverge, conflict resolution needed later</text>
  
  <!-- Comparison Summary -->
  <rect x="30" y="380" width="840" height="150" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Trade-off Summary</text>
  
  <rect x="50" y="420" width="380" height="100" rx="4" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="240" y="445" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">CP Systems</text>
  <text x="240" y="465" text-anchor="middle" font-size="8" fill="#64748b">• Preserve data correctness</text>
  <text x="240" y="480" text-anchor="middle" font-size="8" fill="#64748b">• Block during partition</text>
  <text x="240" y="495" text-anchor="middle" font-size="8" fill="#64748b">• No conflict resolution needed</text>
  <text x="240" y="510" text-anchor="middle" font-size="8" fill="#64748b">Examples: PostgreSQL, MongoDB (majority), HBase, Spanner</text>
  
  <rect x="470" y="420" width="380" height="100" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="660" y="445" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">AP Systems</text>
  <text x="660" y="465" text-anchor="middle" font-size="8" fill="#64748b">• Always available</text>
  <text x="660" y="480" text-anchor="middle" font-size="8" fill="#64748b">• Accept writes during partition</text>
  <text x="660" y="495" text-anchor="middle" font-size="8" fill="#64748b">• Conflict resolution required</text>
  <text x="660" y="510" text-anchor="middle" font-size="8" fill="#64748b">Examples: Cassandra, DynamoDB, Riak, DNS, CDN</text>
</svg>