<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Data Warehouses Architecture</title>
  <desc id="desc">Data warehouse architecture with ETL/ELT pipelines and dimensional modeling</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Data Warehouse Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">ETL/ELT Pipelines and Dimensional Modeling</text>
  
  <!-- Data Sources (Top) -->
  <rect x="50" y="85" width="800" height="100" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Data Sources</text>
  
  <rect x="70" y="125" width="160" height="50" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="150" y="148" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">OLTP Databases</text>
  <text x="150" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">MySQL, PostgreSQL</text>
  
  <rect x="245" y="125" width="160" height="50" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="325" y="148" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Apps/APIs</text>
  <text x="325" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">REST, GraphQL</text>
  
  <rect x="420" y="125" width="160" height="50" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="500" y="148" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">External Sources</text>
  <text x="500" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">3rd party APIs</text>
  
  <rect x="595" y="125" width="160" height="50" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="675" y="148" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Files</text>
  <text x="675" y="162" text-anchor="middle" font-size="7" font-weight="600" fill="#dbeafe">CSV, JSON, XML</text>
  
  <!-- Arrow -->
  <line x1="450" y1="190" x2="450" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- ETL/ELT Pipeline (Middle) -->
  <rect x="50" y="220" width="800" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">ETL/ELT Pipeline</text>
  
  <rect x="70" y="255" width="180" height="50" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="160" y="275" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Extract</text>
  <text x="160" y="292" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Pull from sources</text>
  
  <line x1="255" y1="280" x2="275" y2="280" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="280" y="255" width="180" height="50" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="370" y="275" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Transform</text>
  <text x="370" y="292" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Clean, validate, join</text>
  
  <line x1="465" y1="280" x2="485" y2="280" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <rect x="490" y="255" width="180" height="50" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="580" y="275" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Load</text>
  <text x="580" y="292" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Into warehouse</text>
  
  <text x="700" y="275" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">ETL: Transform before load</text>
  <text x="700" y="292" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">ELT: Load raw, transform in DW</text>
  
  <!-- Data Warehouse (Bottom Middle) -->
  <rect x="50" y="330" width="800" height="205" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="355" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Data Warehouse (Dimensional Modeling)</text>
  
  <!-- Star Schema -->
  <rect x="350" y="370" width="100" height="80" rx="4" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Fact Table</text>
  <text x="400" y="412" text-anchor="middle" font-size="7" font-weight="600" fill="#6ee7b7">sales</text>
  <text x="400" y="425" text-anchor="middle" font-size="7" font-weight="600" fill="#6ee7b7">revenue, qty</text>
  <text x="400" y="438" text-anchor="middle" font-size="7" font-weight="600" fill="#6ee7b7">FKs to dims</text>
  
  <!-- Dimension Tables -->
  <rect x="100" y="370" width="100" height="60" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="150" y="395" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Dim Time</text>
  <text x="150" y="410" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">date, month, year</text>
  
  <rect x="100" y="460" width="100" height="60" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="150" y="485" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Dim Product</text>
  <text x="150" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">name, category</text>
  
  <rect x="600" y="370" width="100" height="60" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="650" y="395" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Dim Customer</text>
  <text x="650" y="410" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">name, region</text>
  
  <rect x="600" y="460" width="100" height="60" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="650" y="485" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Dim Store</text>
  <text x="650" y="500" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">location, size</text>
  
  <!-- Lines from fact to dimensions -->
  <line x1="345" y1="400" x2="205" y2="400" stroke="#374151" stroke-width="1"/>
  <line x1="345" y1="480" x2="205" y2="490" stroke="#374151" stroke-width="1"/>
  <line x1="455" y1="400" x2="595" y2="400" stroke="#374151" stroke-width="1"/>
  <line x1="455" y1="480" x2="595" y2="490" stroke="#374151" stroke-width="1"/>
  
  <!-- Consumption Layer (Bottom) -->
  <rect x="50" y="540" width="800" height="0" rx="0" fill="none" stroke="none"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>