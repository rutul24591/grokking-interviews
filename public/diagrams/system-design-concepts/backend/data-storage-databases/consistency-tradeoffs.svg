<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520">
  <rect width="920" height="520" fill="#f8fafc"/>
  <rect x="30" y="30" width="860" height="460" rx="18" fill="#ffffff" stroke="#d7dbe2"/>
  <text x="60" y="70" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1f2937">Consistency Trade-offs</text>
  <text x="60" y="95" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b">Comparing latency, availability, and complexity across consistency models</text>

  <!-- Axes -->
  <line x1="100" y1="140" x2="100" y2="420" stroke="#64748b" stroke-width="2"/>
  <line x1="100" y1="420" x2="850" y2="420" stroke="#64748b" stroke-width="2"/>
  
  <text x="50" y="280" font-family="Arial" font-size="13" fill="#334155" text-anchor="middle" transform="rotate(-90, 50, 280)">Strength</text>
  <text x="475" y="455" font-family="Arial" font-size="13" fill="#334155" text-anchor="middle">Consistency Model</text>
  
  <!-- Y-axis labels -->
  <text x="90" y="145" font-family="Arial" font-size="11" fill="#64748b" text-anchor="end">High</text>
  <text x="90" y="280" font-family="Arial" font-size="11" fill="#64748b" text-anchor="end">Medium</text>
  <text x="90" y="415" font-family="Arial" font-size="11" fill="#64748b" text-anchor="end">Low</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="210" x2="850" y2="210" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="280" x2="850" y2="280" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="350" x2="850" y2="350" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Bars for each consistency model -->
  
  <!-- Linearizability -->
  <rect x="130" y="160" width="80" height="240" rx="6" fill="#3b82f6" opacity="0.8"/>
  <text x="170" y="435" font-family="Arial" font-size="11" fill="#334155" text-anchor="middle">Linearizable</text>
  <text x="170" y="150" font-family="Arial" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">Strongest</text>
  
  <!-- Sequential -->
  <rect x="240" y="190" width="80" height="210" rx="6" fill="#60a5fa" opacity="0.8"/>
  <text x="280" y="435" font-family="Arial" font-size="11" fill="#334155" text-anchor="middle">Sequential</text>
  
  <!-- Causal -->
  <rect x="350" y="230" width="80" height="170" rx="6" fill="#93c5fd" opacity="0.8"/>
  <text x="390" y="435" font-family="Arial" font-size="11" fill="#334155" text-anchor="middle">Causal</text>
  
  <!-- RYW -->
  <rect x="460" y="260" width="80" height="140" rx="6" fill="#bfdbfe" opacity="0.8"/>
  <text x="500" y="435" font-family="Arial" font-size="11" fill="#334155" text-anchor="middle">RYW</text>
  
  <!-- Bounded Staleness -->
  <rect x="570" y="300" width="80" height="100" rx="6" fill="#dbeafe" opacity="0.8"/>
  <text x="610" y="435" font-family="Arial" font-size="11" fill="#334155" text-anchor="middle">Bounded</text>
  <text x="610" y="448" font-family="Arial" font-size="11" fill="#334155" text-anchor="middle">Staleness</text>
  
  <!-- Eventual -->
  <rect x="680" y="350" width="80" height="50" rx="6" fill="#eff6ff" opacity="0.8" stroke="#3b82f6" stroke-width="2"/>
  <text x="720" y="435" font-family="Arial" font-size="11" fill="#334155" text-anchor="middle">Eventual</text>

  <!-- Latency overlay (red line) -->
  <polyline points="170,170 280,200 390,240 500,270 610,310 720,360" fill="none" stroke="#ef4444" stroke-width="3"/>
  <circle cx="170" cy="170" r="5" fill="#ef4444"/>
  <circle cx="280" cy="200" r="5" fill="#ef4444"/>
  <circle cx="390" cy="240" r="5" fill="#ef4444"/>
  <circle cx="500" cy="270" r="5" fill="#ef4444"/>
  <circle cx="610" cy="310" r="5" fill="#ef4444"/>
  <circle cx="720" cy="360" r="5" fill="#ef4444"/>
  
  <!-- Availability overlay (green line) -->
  <polyline points="170,390 280,370 390,340 500,310 610,280 720,240" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="170" cy="390" r="5" fill="#22c55e"/>
  <circle cx="280" cy="370" r="5" fill="#22c55e"/>
  <circle cx="390" cy="340" r="5" fill="#22c55e"/>
  <circle cx="500" cy="310" r="5" fill="#22c55e"/>
  <circle cx="610" cy="280" r="5" fill="#22c55e"/>
  <circle cx="720" cy="240" r="5" fill="#22c55e"/>

  <!-- Legend -->
  <rect x="550" y="130" width="280" height="90" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="690" y="155" font-family="Arial" font-size="12" font-weight="bold" fill="#334155" text-anchor="middle">Legend</text>
  
  <rect x="565" y="165" width="30" height="12" rx="3" fill="#3b82f6" opacity="0.8"/>
  <text x="605" y="175" font-family="Arial" font-size="10" fill="#334155">Consistency Strength</text>
  
  <line x1="565" y1="190" x2="595" y2="190" stroke="#ef4444" stroke-width="3"/>
  <circle cx="565" cy="190" r="4" fill="#ef4444"/>
  <text x="605" y="194" font-family="Arial" font-size="10" fill="#334155">Latency (higher = slower)</text>
  
  <line x1="565" y1="210" x2="595" y2="210" stroke="#22c55e" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="565" cy="210" r="4" fill="#22c55e"/>
  <text x="605" y="214" font-family="Arial" font-size="10" fill="#334155">Availability</text>

  <!-- Key insights box -->
  <rect x="60" y="470" width="800" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="490" font-family="Arial" font-size="11" fill="#92400e" text-anchor="middle">
    <tspan font-weight="bold">Key Insight:</tspan> Stronger consistency (left) provides simpler programming model but higher latency and lower availability.
  </text>
  <text x="460" y="503" font-family="Arial" font-size="11" fill="#92400e" text-anchor="middle">
    <tspan font-weight="bold">Trade-off:</tspan> Weaker consistency (right) offers better performance but requires application-level conflict handling.
  </text>
</svg>
