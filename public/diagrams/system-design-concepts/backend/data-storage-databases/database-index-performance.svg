<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Database Index Performance</title>
  <desc id="desc">Index performance impact on read and write operations</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Database Index Performance</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Read Speedup vs Write Overhead Trade-off</text>
  
  <!-- Read Performance (Top Left) -->
  <rect x="50" y="85" width="400" height="200" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Read Performance Improvement</text>
  
  <rect x="70" y="125" width="360" height="150" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <!-- Query time comparison -->
  <text x="250" y="155" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Query: SELECT * FROM users WHERE email = ?</text>
  
  <text x="250" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">Without Index (Full Table Scan):</text>
  <rect x="85" y="195" width="330" height="20" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <rect x="85" y="195" width="330" height="20" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="425" y="210" text-anchor="end" font-size="8" font-weight="700" fill="#b91c1c">5000ms (10M rows)</text>
  
  <text x="250" y="230" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937">With B-Tree Index:</text>
  <rect x="85" y="245" width="330" height="20" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <rect x="85" y="245" width="5" height="20" rx="2" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="425" y="260" text-anchor="end" font-size="8" font-weight="700" fill="#059669">5ms (O(log n))</text>
  
  <text x="250" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ 1000x faster with index</text>
  
  <!-- Write Overhead (Top Right) -->
  <rect x="465" y="85" width="385" height="200" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">Write Overhead Cost</text>
  
  <rect x="485" y="125" width="345" height="150" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  
  <text x="657" y="155" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">INSERT/UPDATE must update all indexes:</text>
  
  <!-- No index -->
  <rect x="500" y="170" width="315" height="35" rx="3" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="515" y="192" text-anchor="start" font-size="8" font-weight="700" fill="#1f2937">No Index:</text>
  <text x="580" y="192" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Write to table only</text>
  <text x="780" y="192" text-anchor="end" font-size="8" font-weight="700" fill="#059669">1ms</text>
  
  <!-- 1 index -->
  <rect x="500" y="210" width="315" height="35" rx="3" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="515" y="232" text-anchor="start" font-size="8" font-weight="700" fill="#1f2937">1 Index:</text>
  <text x="580" y="232" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Table + 1 index update</text>
  <text x="780" y="232" text-anchor="end" font-size="8" font-weight="700" fill="#d97706">1.5ms (+50%)</text>
  
  <!-- 5 indexes -->
  <rect x="500" y="250" width="315" height="35" rx="3" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="515" y="272" text-anchor="start" font-size="8" font-weight="700" fill="#1f2937">5 Indexes:</text>
  <text x="580" y="272" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Table + 5 index updates</text>
  <text x="780" y="272" text-anchor="end" font-size="8" font-weight="700" fill="#dc2626">3ms (+200%)</text>
  
  <!-- Storage Overhead (Bottom Left) -->
  <rect x="50" y="295" width="400" height="140" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Storage Overhead</text>
  
  <rect x="70" y="335" width="360" height="90" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  
  <text x="250" y="360" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Index Size vs Table Size:</text>
  
  <text x="85" y="385" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">Table: 10 GB (10M rows)</text>
  <text x="85" y="400" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">1 B-Tree Index: ~1-2 GB (10-20%)</text>
  <text x="85" y="415" text-anchor="start" font-size="8" font-weight="600" fill="#1f2937">5 Indexes: ~5-10 GB (50-100%)</text>
  
  <text x="250" y="435" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">⚠ Each index adds 10-30% of table size</text>
  
  <!-- Index Usage Monitoring (Bottom Right) -->
  <rect x="465" y="295" width="385" height="140" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Index Usage Monitoring</text>
  
  <rect x="485" y="335" width="345" height="90" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <text x="657" y="360" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">PostgreSQL: pg_stat_user_indexes</text>
  
  <text x="500" y="380" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">SELECT indexrelname, idx_scan, idx_tup_read</text>
  <text x="500" y="395" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">FROM pg_stat_user_indexes</text>
  <text x="500" y="410" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">WHERE idx_scan = 0  -- Unused indexes!</text>
  
  <text x="657" y="435" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Drop unused indexes to reduce write overhead</text>
  
  <!-- Key Trade-offs (Bottom) -->
  <rect x="50" y="445" width="800" height="90" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2937">Key Trade-offs: Index Strategically</text>
  
  <rect x="70" y="485" width="230" height="40" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="185" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Index frequently queried columns</text>
  
  <rect x="315" y="485" width="230" height="40" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="430" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Avoid indexing rarely-used columns</text>
  
  <rect x="560" y="485" width="230" height="40" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="675" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Monitor and drop unused indexes</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>