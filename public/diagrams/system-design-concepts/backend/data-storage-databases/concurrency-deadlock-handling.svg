<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Concurrency Deadlock Handling</title>
  <desc id="desc">Deadlock detection, prevention, and resolution</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Deadlock Handling</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Detection, Prevention, and Resolution</text>
  
  <!-- Deadlock Example (Top Left) -->
  <rect x="50" y="85" width="400" height="180" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Deadlock Scenario</text>
  
  <rect x="70" y="125" width="360" height="130" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  
  <!-- T1 and T2 circular wait -->
  <circle cx="150" cy="180" r="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="180" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">T1</text>
  <text x="150" y="195" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Holds: A</text>
  <text x="150" y="208" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Wants: B</text>
  
  <circle cx="350" cy="180" r="40" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="350" y="180" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">T2</text>
  <text x="350" y="195" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Holds: B</text>
  <text x="350" y="208" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Wants: A</text>
  
  <!-- Circular arrows -->
  <path d="M 195 165 Q 275 140 305 165" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M 305 195 Q 275 220 195 195" stroke="#dc2626" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  
  <text x="250" y="150" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">T1 waits for T2</text>
  <text x="250" y="230" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">T2 waits for T1</text>
  
  <text x="250" y="255" text-anchor="middle" font-size="8" font-weight="700" fill="#dc2626">DEADLOCK! Neither can proceed.</text>
  
  <!-- Deadlock Prevention (Top Right) -->
  <rect x="465" y="85" width="385" height="180" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Deadlock Prevention</text>
  
  <rect x="485" y="125" width="345" height="130" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <text x="500" y="150" text-anchor="start" font-size="8" font-weight="700" fill="#065f46">1. Lock Ordering:</text>
  <text x="500" y="168" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Always acquire locks in same order</text>
  <text x="500" y="183" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">T1: A→B, T2: A→B (not B→A)</text>
  
  <text x="500" y="205" text-anchor="start" font-size="8" font-weight="700" fill="#065f46">2. Lock Timeout:</text>
  <text x="500" y="223" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">SET lock_timeout = 5000ms</text>
  <text x="500" y="238" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Abort if can't acquire in time</text>
  
  <text x="650" y="260" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Prevents deadlocks</text>
  <text x="650" y="273" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">But may reduce concurrency</text>
  
  <!-- Deadlock Detection (Middle) -->
  <rect x="50" y="275" width="400" height="160" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="250" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Deadlock Detection</text>
  
  <rect x="70" y="315" width="360" height="110" rx="4" fill="#dbeafe" stroke="#38bdf8" stroke-width="1"/>
  
  <!-- Wait-for graph -->
  <text x="250" y="340" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Database builds wait-for graph:</text>
  
  <circle cx="120" cy="375" r="20" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="120" y="378" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">T1</text>
  
  <circle cx="220" cy="375" r="20" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <text x="220" y="378" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">T2</text>
  
  <circle cx="320" cy="375" r="20" fill="#16a34a" stroke="#065f46" stroke-width="2"/>
  <text x="320" y="378" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">T3</text>
  
  <line x1="140" y1="375" x2="200" y2="375" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="240" y1="375" x2="300" y2="375" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="390" x2="140" y2="390" stroke="#dc2626" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  
  <text x="250" y="415" text-anchor="middle" font-size="7" font-weight="600" fill="#b91c1c">Cycle detected = DEADLOCK</text>
  
  <!-- Deadlock Resolution (Bottom) -->
  <rect x="465" y="275" width="385" height="160" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Deadlock Resolution</text>
  
  <rect x="485" y="315" width="345" height="110" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <text x="500" y="340" text-anchor="start" font-size="8" font-weight="700" fill="#92400e">Victim Selection:</text>
  <text x="500" y="358" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Choose transaction with least work done</text>
  <text x="500" y="373" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Abort and rollback victim</text>
  <text x="500" y="388" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Other transactions proceed</text>
  
  <text x="500" y="410" text-anchor="start" font-size="8" font-weight="700" fill="#92400e">Application Retry:</text>
  <text x="500" y="428" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Catch deadlock error</text>
  <text x="500" y="443" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Exponential backoff</text>
  <text x="500" y="458" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">• Retry transaction</text>
  
  <!-- Retry Strategy (Bottom) -->
  <rect x="50" y="445" width="800" height="90" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2937">Retry Strategy with Exponential Backoff</text>
  
  <rect x="70" y="485" width="230" height="40" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="185" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">try { execute(); } catch (Deadlock) {</text>
  
  <rect x="315" y="485" width="230" height="40" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="430" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">sleep(100ms * 2^retry_count)</text>
  
  <rect x="560" y="485" width="230" height="40" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="675" y="505" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">retry++; if (retry &lt; max) retry;</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>