<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">In-Memory Database Trade-offs</title>
  <desc id="desc">In-memory vs disk-based databases comparison</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">In-Memory Database Trade-offs</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Speed vs Durability vs Cost</text>
  
  <!-- In-Memory Databases (Left) -->
  <rect x="50" y="85" width="400" height="240" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">In-Memory Databases</text>
  
  <rect x="70" y="125" width="360" height="190" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <text x="250" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Characteristics:</text>
  <text x="250" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Data stored in RAM (microsecond latency)</text>
  <text x="250" y="190" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• 100K+ operations/second per node</text>
  <text x="250" y="205" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Expensive memory ($0.02-0.05/GB/hour)</text>
  <text x="250" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Optional persistence (RDB, AOF)</text>
  <text x="250" y="235" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Rich data structures (Redis)</text>
  <text x="250" y="250" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Best for: Caching, sessions, leaderboards</text>
  
  <text x="250" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Lowest latency, high throughput</text>
  <text x="250" y="295" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Data loss risk, expensive memory</text>
  <text x="250" y="310" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Examples: Redis, Memcached, Apache Ignite</text>
  
  <!-- Disk-Based Databases (Right) -->
  <rect x="465" y="85" width="385" height="240" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Disk-Based Databases</text>
  
  <rect x="485" y="125" width="345" height="190" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  
  <text x="657" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Characteristics:</text>
  <text x="657" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Data stored on disk (ms latency)</text>
  <text x="657" y="190" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• 1K-10K operations/second per node</text>
  <text x="657" y="205" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Cheap storage ($0.0001/GB/hour)</text>
  <text x="657" y="220" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Durable by design (ACID)</text>
  <text x="657" y="235" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Complex queries, joins, transactions</text>
  <text x="657" y="250" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">• Best for: Persistent data, transactions</text>
  
  <text x="657" y="280" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✓ Durable, cheap, feature-rich</text>
  <text x="657" y="295" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">✗ Higher latency, slower throughput</text>
  <text x="657" y="310" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Examples: PostgreSQL, MySQL, MongoDB</text>
  
  <!-- Comparison Table (Bottom) -->
  <rect x="50" y="335" width="800" height="200" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Feature Comparison</text>
  
  <!-- Header -->
  <rect x="70" y="375" width="180" height="25" rx="3" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="160" y="392" text-anchor="middle" font-size="9" font-weight="700" fill="#0369a1">Feature</text>
  <rect x="260" y="375" width="180" height="25" rx="3" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="392" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">In-Memory</text>
  <rect x="450" y="375" width="180" height="25" rx="3" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="392" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Disk-Based</text>
  <rect x="640" y="375" width="190" height="25" rx="3" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/>
  <text x="735" y="392" text-anchor="middle" font-size="9" font-weight="700" fill="#1f2937">When to Choose</text>
  
  <!-- Row 1 -->
  <rect x="70" y="403" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="417" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Latency</text>
  <rect x="260" y="403" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="417" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Microseconds</text>
  <rect x="450" y="403" width="180" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="417" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Milliseconds</text>
  <rect x="640" y="403" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="417" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Need sub-ms response?</text>
  
  <!-- Row 2 -->
  <rect x="70" y="426" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="440" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Durability</text>
  <rect x="260" y="426" width="180" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="350" y="440" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Optional (configurable)</text>
  <rect x="450" y="426" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="540" y="440" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Built-in (ACID)</text>
  <rect x="640" y="426" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="440" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Can tolerate data loss?</text>
  
  <!-- Row 3 -->
  <rect x="70" y="449" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="463" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Cost</text>
  <rect x="260" y="449" width="180" height="20" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="350" y="463" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Expensive (RAM)</text>
  <rect x="450" y="449" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="540" y="463" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Cheap (disk)</text>
  <rect x="640" y="449" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="463" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Budget constraints?</text>
  
  <!-- Row 4 -->
  <rect x="70" y="472" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="486" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Use Case</text>
  <rect x="260" y="472" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="486" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Cache, sessions, realtime</text>
  <rect x="450" y="472" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="540" y="486" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Persistent data, transactions</text>
  <rect x="640" y="472" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="486" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Data criticality?</text>
  
  <!-- Row 5 -->
  <rect x="70" y="495" width="180" height="20" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="509" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Best Practice</text>
  <rect x="260" y="495" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="509" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Use alongside disk DB</text>
  <rect x="450" y="495" width="180" height="20" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="540" y="509" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Primary data store</text>
  <rect x="640" y="495" width="190" height="20" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="509" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Use both (cache-aside pattern)</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>