<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Read Replicas Architecture</title>
  <desc id="desc">Primary-replica setup with replication lag and failover</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Read Replicas Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Primary-Replica Setup with Failover</text>
  
  <!-- Primary-Replica Setup (Top) -->
  <rect x="50" y="85" width="800" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Primary-Replica Architecture</text>
  
  <!-- Primary -->
  <rect x="100" y="125" width="150" height="80" rx="4" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="175" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Primary</text>
  <text x="175" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">Accepts Writes</text>
  <text x="175" y="190" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">Serves Reads</text>
  
  <!-- Write arrow -->
  <path d="M 50 165 L 95 165" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="70" y="155" text-anchor="middle" font-size="8" font-weight="700" fill="#1f2937">Writes</text>
  
  <!-- Replication arrows -->
  <line x1="255" y1="145" x2="305" y2="135" stroke="#374151" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="255" y1="165" x2="305" y2="165" stroke="#374151" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="255" y1="185" x2="305" y2="195" stroke="#374151" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="280" y="155" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Async</text>
  <text x="280" y="170" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Replication</text>
  
  <!-- Replicas -->
  <rect x="320" y="125" width="120" height="60" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="380" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Replica 1</text>
  <text x="380" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Read-Only</text>
  <text x="380" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">us-east</text>
  
  <rect x="320" y="195" width="120" height="60" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="380" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Replica 2</text>
  <text x="380" y="235" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Read-Only</text>
  <text x="380" y="248" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">us-west</text>
  
  <rect x="500" y="125" width="120" height="60" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="560" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Replica 3</text>
  <text x="560" y="165" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Read-Only</text>
  <text x="560" y="178" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">eu-west</text>
  
  <rect x="500" y="195" width="120" height="60" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="560" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Replica 4</text>
  <text x="560" y="235" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Read-Only</text>
  <text x="560" y="248" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">ap-south</text>
  
  <!-- Read arrows -->
  <path d="M 445 155 L 495 155" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 625 155 L 675 155" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 445 225 L 495 225" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 625 225 L 675 225" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  
  <text x="470" y="145" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Reads</text>
  <text x="650" y="145" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Reads</text>
  
  <!-- Replication Lag Visualization (Middle) -->
  <rect x="50" y="275" width="400" height="140" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="250" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">Replication Lag</text>
  
  <rect x="70" y="315" width="360" height="90" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  
  <!-- Timeline -->
  <line x1="85" y1="350" x2="415" y2="350" stroke="#374151" stroke-width="2"/>
  <text x="85" y="370" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">T-10s</text>
  <text x="415" y="370" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Now</text>
  
  <!-- Primary position -->
  <rect x="380" y="335" width="30" height="30" rx="3" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="395" y="355" text-anchor="middle" font-size="6" font-weight="700" fill="#ffffff">P</text>
  <text x="395" y="385" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Primary</text>
  
  <!-- Replica position -->
  <rect x="280" y="335" width="30" height="30" rx="3" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
  <text x="295" y="355" text-anchor="middle" font-size="6" font-weight="600" fill="#1e3a8a">R</text>
  <text x="295" y="385" text-anchor="middle" font-size="6" font-weight="600" fill="#1f2937">Replica</text>
  
  <!-- Lag indicator -->
  <line x1="315" y1="350" x2="375" y2="350" stroke="#dc2626" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="345" y="340" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">5s lag</text>
  
  <text x="250" y="415" text-anchor="middle" font-size="7" font-weight="600" fill="#b91c1c">Cause: Network, heavy writes, long transactions</text>
  
  <!-- Failover (Middle Right) -->
  <rect x="465" y="275" width="385" height="140" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="657" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Failover Process</text>
  
  <rect x="485" y="315" width="345" height="90" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  
  <!-- Before failover -->
  <text x="500" y="340" text-anchor="start" font-size="8" font-weight="700" fill="#065f46">Before:</text>
  <text x="500" y="355" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Primary: DB-1 (healthy)</text>
  <text x="500" y="368" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">Replicas: DB-2, DB-3 (reading)</text>
  
  <!-- After failover -->
  <text x="500" y="388" text-anchor="start" font-size="8" font-weight="700" fill="#065f46">After Primary Failure:</text>
  <text x="500" y="403" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">DB-1: FAILED</text>
  <text x="500" y="416" text-anchor="start" font-size="7" font-weight="600" fill="#1f2937">DB-2: Promoted to Primary (new writes)</text>
  <text x="650" y="416" text-anchor="start" font-size="7" font-weight="700" fill="#059669">✓ Automatic or manual</text>
  
  <!-- Key Benefits (Bottom) -->
  <rect x="50" y="425" width="800" height="110" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="450" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Key Benefits</text>
  
  <rect x="70" y="465" width="180" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Read Scaling</text>
  <text x="160" y="502" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Distribute reads across replicas</text>
  <text x="160" y="515" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Handle 10x read traffic</text>
  
  <rect x="265" y="465" width="180" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="355" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Geographic Distribution</text>
  <text x="355" y="502" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Place replicas near users</text>
  <text x="355" y="515" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Low latency reads</text>
  
  <rect x="460" y="465" width="180" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="550" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">High Availability</text>
  <text x="550" y="502" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Automatic failover</text>
  <text x="550" y="515" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ Minimal downtime</text>
  
  <rect x="655" y="465" width="180" height="60" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="745" y="485" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Backup/Analytics</text>
  <text x="745" y="502" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Run heavy queries on replica</text>
  <text x="745" y="515" text-anchor="middle" font-size="7" font-weight="700" fill="#059669">✓ No impact on primary</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>