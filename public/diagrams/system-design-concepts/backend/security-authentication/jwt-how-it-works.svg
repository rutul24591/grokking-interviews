<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">JWT How It Works</title>
  <desc id="desc">JWT issuance and verification flow showing token creation, signing, and API access with bearer token</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">JWT: Issuance and Verification Flow</text>
  
  <!-- Client -->
  <rect x="50" y="70" width="140" height="80" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Client</text>
  <text x="120" y="125" text-anchor="middle" font-size="10" fill="white">(Browser/App)</text>
  <text x="120" y="140" text-anchor="middle" font-size="9" fill="white">Credentials</text>
  
  <!-- Auth Server -->
  <rect x="280" y="70" width="180" height="120" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="3"/>
  <text x="370" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Authorization</text>
  <text x="370" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Server</text>
  <text x="370" y="145" text-anchor="middle" font-size="10" fill="white">Token Service</text>
  <text x="370" y="165" text-anchor="middle" font-size="10" fill="white">Signing Keys</text>
  <text x="370" y="185" text-anchor="middle" font-size="10" fill="white">(JWK Set)</text>
  
  <!-- API Server -->
  <rect x="550" y="70" width="140" height="80" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="620" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="white">API Server</text>
  <text x="620" y="125" text-anchor="middle" font-size="10" fill="white">(Resource)</text>
  <text x="620" y="140" text-anchor="middle" font-size="9" fill="white">JWT Middleware</text>
  
  <!-- Step 1: Authentication -->
  <defs>
    <marker id="arrowAuth" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowToken" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #8b5cf6)"/>
    </marker>
    <marker id="arrowApi" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
  
  <line x1="190" y1="110" x2="280" y2="110" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowAuth)"/>
  <text x="235" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">1. Authenticate</text>
  <text x="235" y="120" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">(username/password)</text>
  
  <!-- Step 2: Generate JWT -->
  <rect x="300" y="210" width="140" height="100" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="370" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">2. Generate JWT</text>
  <text x="370" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Create header + payload</text>
  <text x="370" y="278" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Sign with private key</text>
  <text x="370" y="296" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Return JWT to client</text>
  
  <!-- Step 3: JWT Response -->
  <line x1="280" y1="170" x2="190" y2="170" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowToken)"/>
  <text x="235" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">3. JWT Token</text>
  <text x="235" y="180" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">(Bearer token)</text>
  
  <!-- JWT Token Visual -->
  <rect x="50" y="200" width="200" height="80" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="150" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">JWT Token Format</text>
  <text x="150" y="245" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">header.payload.signature</text>
  <text x="150" y="265" text-anchor="middle" font-size="8" fill="var(--text-theme, #3b82f6">eyJhbGciOiJSUzI1NiJ9</text>
  <text x="150" y="277" text-anchor="middle" font-size="8" fill="var(--text-theme, #8b5cf6">eyJzdWIiOiIxMjM0In0</text>
  <text x="150" y="289" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981">Signature_Here</text>
  
  <!-- Step 4: API Request -->
  <line x1="250" y1="340" x2="550" y2="340" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowApi)"/>
  <text x="400" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">4. API Request</text>
  <text x="400" y="350" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Authorization: Bearer &lt;jwt&gt;</text>
  
  <!-- Step 5: Verify JWT -->
  <rect x="550" y="200" width="140" height="100" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="620" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">5. Verify JWT</text>
  <text x="620" y="250" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Check signature</text>
  <text x="620" y="268" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Validate claims</text>
  <text x="620" y="286" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Check expiry</text>
  
  <!-- Step 6: Response -->
  <line x1="550" y1="380" x2="250" y2="380" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowApi)"/>
  <text x="400" y="375" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">6. Response</text>
  <text x="400" y="390" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">(protected data)</text>
  
  <!-- JWT Claims Box -->
  <rect x="550" y="330" width="200" height="120" rx="8" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="650" y="352" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Common JWT Claims</text>
  <text x="650" y="375" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• sub (subject/user ID)</text>
  <text x="650" y="392" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• iss (issuer)</text>
  <text x="650" y="409" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• aud (audience)</text>
  <text x="650" y="426" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• exp (expiration)</text>
  <text x="650" y="443" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• scope/permissions</text>
</svg>
