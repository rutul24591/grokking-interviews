<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Authentication methods comparison showing passwords, MFA, OAuth, and security keys</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Authentication Methods &amp; Their Security Levels</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">From weakest (passwords) to strongest (passkeys / security keys)</text>

  <!-- Row 1: Passwords -->
  <rect x="30" y="80" width="840" height="80" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="80" width="8" height="80" rx="4" fill="#cc4444"/>
  <text x="80" y="108" text-anchor="start" font-size="13" font-weight="600" fill="#cc4444">1. Passwords / PINs</text>
  <text x="80" y="128" text-anchor="start" font-size="10" fill="#1a1822">Single factor. Vulnerable to brute force, phishing, credential stuffing.</text>
  <rect x="80" y="138" width="80" height="16" rx="8" fill="#cc4444" opacity="0.15"/>
  <text x="120" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#cc4444">WEAK</text>
  <text x="400" y="118" text-anchor="start" font-size="10" fill="#1a1822">Best Practice:</text>
  <text x="500" y="118" text-anchor="start" font-size="10" fill="#1a1822">Enforce strong passwords, rate-limit login attempts, use breach databases.</text>

  <!-- Row 2: MFA -->
  <rect x="30" y="175" width="840" height="80" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="30" y="175" width="8" height="80" rx="4" fill="#f0ad4e"/>
  <text x="80" y="203" text-anchor="start" font-size="13" font-weight="600" fill="#f0ad4e">2. Multi-Factor Authentication (MFA)</text>
  <text x="80" y="223" text-anchor="start" font-size="10" fill="#1a1822">Something you know + something you have (TOTP, SMS, push notification).</text>
  <rect x="80" y="233" width="80" height="16" rx="8" fill="#f0ad4e" opacity="0.15"/>
  <text x="120" y="245" text-anchor="middle" font-size="8" font-weight="600" fill="#f0ad4e">STRONGER</text>
  <text x="400" y="213" text-anchor="start" font-size="10" fill="#1a1822">Best Practice:</text>
  <text x="500" y="213" text-anchor="start" font-size="10" fill="#1a1822">Use TOTP over SMS. Push notifications are user-friendly. Avoid SMS if possible.</text>

  <!-- Row 3: OAuth / OIDC -->
  <rect x="30" y="270" width="840" height="80" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="270" width="8" height="80" rx="4" fill="#6d5bd0"/>
  <text x="80" y="298" text-anchor="start" font-size="13" font-weight="600" fill="#6d5bd0">3. OAuth 2.0 / OpenID Connect</text>
  <text x="80" y="318" text-anchor="start" font-size="10" fill="#1a1822">Delegated authentication via identity providers (Google, GitHub, etc.).</text>
  <rect x="80" y="328" width="80" height="16" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="120" y="340" text-anchor="middle" font-size="8" font-weight="600" fill="#6d5bd0">STRONG</text>
  <text x="400" y="308" text-anchor="start" font-size="10" fill="#1a1822">Best Practice:</text>
  <text x="500" y="308" text-anchor="start" font-size="10" fill="#1a1822">Use PKCE for all flows. Validate tokens server-side. Short token lifetimes.</text>

  <!-- Row 4: Security Keys / Passkeys -->
  <rect x="30" y="365" width="840" height="80" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="365" width="8" height="80" rx="4" fill="#4caf50"/>
  <text x="80" y="393" text-anchor="start" font-size="13" font-weight="600" fill="#4caf50">4. Security Keys / Passkeys (WebAuthn)</text>
  <text x="80" y="413" text-anchor="start" font-size="10" fill="#1a1822">Phishing-resistant. Private key stays on device. Public key on server.</text>
  <rect x="80" y="423" width="80" height="16" rx="8" fill="#4caf50" opacity="0.15"/>
  <text x="120" y="435" text-anchor="middle" font-size="8" font-weight="600" fill="#4caf50">STRONGEST</text>
  <text x="400" y="403" text-anchor="start" font-size="10" fill="#1a1822">Best Practice:</text>
  <text x="500" y="403" text-anchor="start" font-size="10" fill="#1a1822">Offer as primary auth method. Fallback to MFA. Supports biometric enrollment.</text>

  <!-- Bottom summary -->
  <rect x="30" y="460" width="840" height="30" rx="8" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="480" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Recommendation: Layer multiple methods. Require MFA for sensitive operations. Migrate to passkeys where possible.</text>
</svg>