<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>TOTP generation and verification flow showing shared secret, time steps, and code validation</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">TOTP: Time-Based One-Time Password Generation &amp; Verification</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">TOTP generates 6-digit codes that change every 30 seconds using a shared secret and current time</text>

  <!-- Setup Phase -->
  <rect x="30" y="80" width="840" height="100" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="840" height="35" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="105" width="840" height="10" fill="#6d5bd0"/>
  <text x="450" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Phase 1: Initial Setup (One-Time)</text>

  <rect x="50" y="125" width="250" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="175" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Server generates random secret (base32)</text>
  <text x="175" y="160" text-anchor="middle" font-size="9" fill="#1a1822">160-bit secret, stored server-side</text>

  <line x1="300" y1="145" x2="340" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowTOTP)"/>

  <rect x="340" y="125" width="250" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="465" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Secret shared with user's authenticator app</text>
  <text x="465" y="160" text-anchor="middle" font-size="9" fill="#1a1822">Via QR code or manual entry</text>

  <line x1="590" y1="145" x2="630" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowTOTP)"/>

  <rect x="630" y="125" width="220" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="740" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">User verifies first TOTP code</text>
  <text x="740" y="160" text-anchor="middle" font-size="9" fill="#1a1822">Confirms setup is correct</text>

  <!-- Code Generation -->
  <rect x="30" y="210" width="410" height="260" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="210" width="410" height="35" rx="10" fill="#4caf50"/>
  <rect x="30" y="235" width="410" height="10" fill="#4caf50"/>
  <text x="235" y="233" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Phase 2: TOTP Code Generation</text>

  <rect x="50" y="260" width="370" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="235" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Step 1: Get current Unix timestamp</text>
  <text x="235" y="300" text-anchor="middle" font-size="9" fill="#1a1822">Current time in seconds since epoch</text>

  <line x1="235" y1="310" x2="235" y2="330" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowTOTP)"/>

  <rect x="50" y="330" width="370" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="235" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Step 2: Calculate time step (T = floor(timestamp / 30))</text>
  <text x="235" y="370" text-anchor="middle" font-size="9" fill="#1a1822">Divide by 30 seconds (default time step)</text>

  <line x1="235" y1="380" x2="235" y2="400" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowTOTP)"/>

  <rect x="50" y="400" width="370" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="235" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Step 3: HMAC-SHA1(secret, T) → truncate to 6 digits</text>
  <text x="235" y="440" text-anchor="middle" font-size="9" fill="#1a1822">HMAC-SHA1 produces 20-byte output, truncated to 6-digit code</text>

  <!-- Verification -->
  <rect x="460" y="210" width="410" height="260" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="460" y="210" width="410" height="35" rx="10" fill="#f0ad4e"/>
  <rect x="460" y="235" width="410" height="10" fill="#f0ad4e"/>
  <text x="665" y="233" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Phase 3: Server Verification</text>

  <rect x="480" y="260" width="370" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Server receives user's 6-digit code</text>
  <text x="665" y="300" text-anchor="middle" font-size="9" fill="#1a1822">User enters code from authenticator app</text>

  <line x1="665" y1="310" x2="665" y2="330" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowTOTP)"/>

  <rect x="480" y="330" width="370" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Server computes TOTP for T-1, T, T+1</text>
  <text x="665" y="370" text-anchor="middle" font-size="9" fill="#1a1822">Accounts for clock drift (±1 time step window)</text>

  <line x1="665" y1="380" x2="665" y2="400" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowTOTP)"/>

  <rect x="480" y="400" width="370" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Match → authenticate. No match → reject.</text>
  <text x="665" y="440" text-anchor="middle" font-size="9" fill="#1a1822">Rate-limit attempts to prevent brute force</text>

  <defs>
    <marker id="arrowTOTP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>