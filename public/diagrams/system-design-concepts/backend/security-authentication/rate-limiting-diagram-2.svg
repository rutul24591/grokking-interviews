<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Distributed rate limiting architecture showing Redis-based rate limiting across multiple API servers</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Distributed Rate Limiting Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Centralized rate limit counters in Redis ensure consistent limiting across all API server instances</text>

  <!-- Clients -->
  <rect x="30" y="80" width="140" height="100" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="100" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#cc4444">Clients</text>
  <text x="100" y="128" text-anchor="middle" font-size="9" fill="#1a1822">API keys, IP addresses,</text>
  <text x="100" y="143" text-anchor="middle" font-size="9" fill="#1a1822">user IDs, service accounts</text>
  <text x="100" y="163" text-anchor="middle" font-size="9" fill="#64748b">Each has its own limit</text>

  <!-- Arrow to API servers -->
  <line x1="170" y1="130" x2="300" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrowRate)"/>
  <text x="235" y="120" text-anchor="middle" font-size="9" fill="#64748b">Requests</text>

  <!-- API Servers -->
  <rect x="300" y="80" width="180" height="200" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="390" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">API Servers</text>

  <rect x="320" y="120" width="140" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="390" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Server 1</text>
  <text x="390" y="155" text-anchor="middle" font-size="9" fill="#64748b">Checks Redis before processing</text>

  <rect x="320" y="170" width="140" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="390" y="190" text-anchor="middle" font-size="10" fill="#1a1822">Server 2</text>
  <text x="390" y="205" text-anchor="middle" font-size="9" fill="#64748b">Checks Redis before processing</text>

  <rect x="320" y="220" width="140" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="390" y="240" text-anchor="middle" font-size="10" fill="#1a1822">Server N</text>
  <text x="390" y="255" text-anchor="middle" font-size="9" fill="#64748b">Checks Redis before processing</text>

  <!-- Arrow to Redis -->
  <line x1="480" y1="180" x2="580" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrowRate)"/>
  <text x="530" y="170" text-anchor="middle" font-size="9" fill="#64748b">INCR + EXPIRE</text>

  <!-- Redis -->
  <rect x="580" y="80" width="290" height="200" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="725" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#4caf50">Redis (Rate Limit Store)</text>

  <rect x="600" y="120" width="250" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="725" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Key: ratelimit:user:123:minute</text>
  <text x="725" y="158" text-anchor="middle" font-size="9" fill="#64748b">Value: 47 (current count)</text>
  <text x="725" y="173" text-anchor="middle" font-size="9" fill="#64748b">TTL: 60 seconds</text>

  <rect x="600" y="180" width="250" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="725" y="200" text-anchor="middle" font-size="10" fill="#1a1822">Key: ratelimit:ip:10.0.0.1:minute</text>
  <text x="725" y="218" text-anchor="middle" font-size="9" fill="#64748b">Value: 12 (current count)</text>
  <text x="725" y="233" text-anchor="middle" font-size="9" fill="#64748b">TTL: 60 seconds</text>

  <rect x="600" y="240" width="250" height="30" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="725" y="260" text-anchor="middle" font-size="9" fill="#1a1822">Atomic: INCR + EXPIRE in single operation</text>

  <!-- Response flow -->
  <line x1="580" y1="180" x2="480" y2="180" stroke="#4caf50" stroke-width="2"/>
  <polygon points="480,177 472,180 480,183" fill="#4caf50"/>
  <text x="530" y="200" text-anchor="middle" font-size="9" fill="#4caf50">Allow/Deny + remaining count</text>

  <!-- Response headers -->
  <rect x="300" y="300" width="570" height="180" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="585" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Rate Limit Response Headers</text>

  <rect x="320" y="345" width="250" height="30" rx="4" fill="#f0f0f5"/>
  <text x="445" y="365" text-anchor="middle" font-size="9" font-family="monospace" fill="#1a1822">X-RateLimit-Limit: 100</text>

  <rect x="580" y="345" width="270" height="30" rx="4" fill="#f0f0f5"/>
  <text x="715" y="365" text-anchor="middle" font-size="9" font-family="monospace" fill="#1a1822">X-RateLimit-Remaining: 53</text>

  <rect x="320" y="385" width="250" height="30" rx="4" fill="#f0f0f5"/>
  <text x="445" y="405" text-anchor="middle" font-size="9" font-family="monospace" fill="#1a1822">X-RateLimit-Reset: 1704067200</text>

  <rect x="580" y="385" width="270" height="30" rx="4" fill="#f0f0f5"/>
  <text x="715" y="405" text-anchor="middle" font-size="9" font-family="monospace" fill="#1a1822">Retry-After: 30 (when rate limited)</text>

  <rect x="320" y="425" width="530" height="45" rx="6" fill="#f0f0f5" stroke="#d7d7e6" stroke-width="1"/>
  <text x="585" y="445" text-anchor="middle" font-size="9" fill="#1a1822">429 Too Many Requests response when limit exceeded</text>
  <text x="585" y="462" text-anchor="middle" font-size="9" fill="#64748b">Client should back off and retry after Retry-After seconds</text>

  <defs>
    <marker id="arrowRate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>