<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>CORS preflight flow showing OPTIONS request, response headers, and actual request</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">CORS Preflight Flow: OPTIONS Request and Actual Request</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Non-simple requests require a preflight OPTIONS request before the actual request</text>

  <!-- Actors -->
  <rect x="50" y="80" width="140" height="60" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="120" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">Browser</text>
  <text x="120" y="125" text-anchor="middle" font-size="9" fill="#1a1822">Page on origin A</text>

  <rect x="710" y="80" width="140" height="60" rx="10" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <text x="780" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">API Server</text>
  <text x="780" y="125" text-anchor="middle" font-size="9" fill="#1a1822">Origin B</text>

  <!-- Step 1: Preflight OPTIONS -->
  <line x1="190" y1="170" x2="710" y2="170" stroke="#f0ad4e" stroke-width="2"/>
  <polygon points="710,167 718,170 710,173" fill="#f0ad4e"/>
  <rect x="220" y="155" width="460" height="30" rx="6" fill="#ffffff" stroke="#f0ad4e" stroke-width="1"/>
  <text x="450" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">1. Preflight: OPTIONS /api/data</text>

  <!-- Preflight request headers -->
  <rect x="220" y="190" width="460" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="450" y="208" text-anchor="middle" font-size="9" fill="#1a1822">Origin: https://app.example.com</text>
  <text x="450" y="225" text-anchor="middle" font-size="9" fill="#1a1822">Access-Control-Request-Method: PUT</text>
  <text x="450" y="240" text-anchor="middle" font-size="9" fill="#1a1822">Access-Control-Request-Headers: Authorization, Content-Type</text>

  <!-- Step 2: Preflight response -->
  <line x1="710" y1="260" x2="190" y2="260" stroke="#4caf50" stroke-width="2"/>
  <polygon points="190,257 182,260 190,263" fill="#4caf50"/>
  <rect x="220" y="265" width="460" height="30" rx="6" fill="#ffffff" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">2. Preflight Response: 204 No Content</text>

  <!-- Preflight response headers -->
  <rect x="220" y="300" width="460" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="318" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Access-Control-Allow-Origin: https://app.example.com</text>
  <text x="450" y="335" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Access-Control-Allow-Methods: GET, POST, PUT, DELETE</text>
  <text x="450" y="352" text-anchor="middle" font-size="9" fill="#1a1822">Access-Control-Allow-Headers: Authorization, Content-Type</text>
  <text x="450" y="369" text-anchor="middle" font-size="9" fill="#1a1822">Access-Control-Max-Age: 86400 (cache for 24 hours)</text>

  <!-- Step 3: Actual request -->
  <line x1="190" y1="390" x2="710" y2="390" stroke="#6d5bd0" stroke-width="2"/>
  <polygon points="710,387 718,390 710,393" fill="#6d5bd0"/>
  <rect x="220" y="395" width="460" height="30" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="415" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">3. Actual Request: PUT /api/data</text>

  <!-- Step 4: Actual response -->
  <line x1="710" y1="440" x2="190" y2="440" stroke="#6d5bd0" stroke-width="2"/>
  <polygon points="190,437 182,440 190,443" fill="#6d5bd0"/>
  <rect x="220" y="445" width="460" height="30" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="465" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">4. Actual Response: 200 OK + Access-Control-Allow-Origin</text>

  <!-- Bottom note -->
  <rect x="30" y="480" width="840" height="16" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">If preflight fails (403, no CORS headers), browser blocks the actual request. Preflight is cached per Access-Control-Max-Age.</text>
</svg>