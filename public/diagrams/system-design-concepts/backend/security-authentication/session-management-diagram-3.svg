<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Session attacks and defenses showing session hijacking, fixation, and CSRF with mitigations</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Session Attacks &amp; Defenses</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Common session-based attacks and how to defend against them</text>

  <!-- Attack 1: Session Hijacking -->
  <rect x="30" y="80" width="410" height="120" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="35" rx="10" fill="#cc4444"/>
  <rect x="30" y="105" width="410" height="10" fill="#cc4444"/>
  <text x="235" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1. Session Hijacking</text>

  <text x="50" y="135" text-anchor="start" font-size="10" fill="#1a1822">Attacker steals session ID (XSS, network sniffing, log files)</text>
  <text x="50" y="155" text-anchor="start" font-size="10" fill="#1a1822">Uses stolen session ID to impersonate the user</text>
  <text x="50" y="175" text-anchor="start" font-size="10" font-weight="600" fill="#4caf50">Defense: httpOnly cookies, HTTPS, regenerate session ID after login</text>

  <!-- Attack 2: Session Fixation -->
  <rect x="30" y="215" width="410" height="120" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="215" width="410" height="35" rx="10" fill="#cc4444"/>
  <rect x="30" y="240" width="410" height="10" fill="#cc4444"/>
  <text x="235" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2. Session Fixation</text>

  <text x="50" y="270" text-anchor="start" font-size="10" fill="#1a1822">Attacker sets known session ID before user logs in</text>
  <text x="50" y="290" text-anchor="start" font-size="10" fill="#1a1822">After login, attacker uses same session ID to access account</text>
  <text x="50" y="310" text-anchor="start" font-size="10" font-weight="600" fill="#4caf50">Defense: Issue new session ID after authentication (session rotation)</text>

  <!-- Attack 3: CSRF -->
  <rect x="30" y="350" width="410" height="120" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="350" width="410" height="35" rx="10" fill="#cc4444"/>
  <rect x="30" y="375" width="410" height="10" fill="#cc4444"/>
  <text x="235" y="373" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3. Cross-Site Request Forgery (CSRF)</text>

  <text x="50" y="405" text-anchor="start" font-size="10" fill="#1a1822">Attacker tricks user&apos;s browser into making authenticated request</text>
  <text x="50" y="425" text-anchor="start" font-size="10" fill="#1a1822">Browser sends session cookie automatically with request</text>
  <text x="50" y="445" text-anchor="start" font-size="10" font-weight="600" fill="#4caf50">Defense: CSRF tokens, SameSite cookie attribute, check Origin header</text>

  <!-- Defense summary -->
  <rect x="460" y="80" width="410" height="390" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="35" rx="10" fill="#4caf50"/>
  <rect x="460" y="105" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Session Security Checklist</text>

  <rect x="480" y="125" width="370" height="40" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Session ID: 128+ bits, generated by CSPRNG</text>
  <text x="665" y="160" text-anchor="middle" font-size="9" fill="#1a1822">Prevents brute force and prediction attacks</text>

  <rect x="480" y="175" width="370" height="40" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Cookie Flags: httpOnly, Secure, SameSite=Strict</text>
  <text x="665" y="210" text-anchor="middle" font-size="9" fill="#1a1822">Prevents XSS theft, ensures HTTPS-only, prevents CSRF</text>

  <rect x="480" y="225" width="370" height="40" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Session Rotation: New ID after login, privilege change</text>
  <text x="665" y="260" text-anchor="middle" font-size="9" fill="#1a1822">Prevents session fixation attacks</text>

  <rect x="480" y="275" width="370" height="40" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="295" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Timeouts: Idle (15-30 min), Absolute (8-24 hours)</text>
  <text x="665" y="310" text-anchor="middle" font-size="9" fill="#1a1822">Limits window of opportunity for hijacking</text>

  <rect x="480" y="325" width="370" height="40" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="345" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Scope: Domain and Path attributes restrict cookie scope</text>
  <text x="665" y="360" text-anchor="middle" font-size="9" fill="#1a1822">Limits cookie exposure to necessary endpoints</text>

  <rect x="480" y="375" width="370" height="40" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Logout: Delete session server-side and clear cookie</text>
  <text x="665" y="410" text-anchor="middle" font-size="9" fill="#1a1822">Ensures session cannot be reused after logout</text>

  <rect x="480" y="425" width="370" height="40" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="445" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Monitor: Log session creation, use, and termination</text>
  <text x="665" y="460" text-anchor="middle" font-size="9" fill="#1a1822">Detect anomalous patterns (concurrent sessions, IP changes)</text>
</svg>