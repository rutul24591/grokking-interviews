<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Secrets rotation lifecycle showing old secret, new secret generation, overlap period, and old secret retirement</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Secrets Rotation Lifecycle: Zero-Downtime Rotation</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Generate new secret, overlap period for migration, retire old secret without service disruption</text>

  <!-- Timeline -->
  <text x="80" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Secret Rotation Timeline</text>
  <line x1="40" y1="120" x2="860" y2="120" stroke="#64748b" stroke-width="2"/>
  <text x="860" y="115" text-anchor="end" font-size="9" fill="#64748b">Time →</text>

  <!-- Phase 1: Old Secret Active -->
  <rect x="60" y="135" width="180" height="60" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="150" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Phase 1: Old Secret Active</text>
  <text x="150" y="178" text-anchor="middle" font-size="9" fill="#64748b">Only old secret is valid</text>
  <text x="150" y="193" text-anchor="middle" font-size="9" fill="#64748b">Normal operation</text>

  <!-- Arrow -->
  <line x1="240" y1="165" x2="280" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrowRotation)"/>

  <!-- Phase 2: New Secret Generated -->
  <rect x="280" y="135" width="180" height="60" rx="6" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="370" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Phase 2: New Secret Generated</text>
  <text x="370" y="178" text-anchor="middle" font-size="9" fill="#64748b">Both old and new are valid</text>
  <text x="370" y="193" text-anchor="middle" font-size="9" fill="#64748b">Overlap period begins</text>

  <!-- Arrow -->
  <line x1="460" y1="165" x2="500" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrowRotation)"/>

  <!-- Phase 3: Migration -->
  <rect x="500" y="135" width="180" height="60" rx="6" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="590" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Phase 3: Migration</text>
  <text x="590" y="178" text-anchor="middle" font-size="9" fill="#64748b">Clients migrate to new secret</text>
  <text x="590" y="193" text-anchor="middle" font-size="9" fill="#64748b">Both secrets remain valid</text>

  <!-- Arrow -->
  <line x1="680" y1="165" x2="720" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrowRotation)"/>

  <!-- Phase 4: Old Secret Retired -->
  <rect x="720" y="135" width="180" height="60" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1.5"/>
  <text x="810" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Phase 4: Old Secret Retired</text>
  <text x="810" y="178" text-anchor="middle" font-size="9" fill="#64748b">Only new secret is valid</text>
  <text x="810" y="193" text-anchor="middle" font-size="9" fill="#64748b">Old secret is revoked</text>

  <!-- Secret types rotation -->
  <rect x="30" y="220" width="840" height="260" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Secret Types and Rotation Strategies</text>

  <!-- API Keys -->
  <rect x="50" y="265" width="390" height="60" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="245" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">API Keys: Generate new key, activate alongside old</text>
  <text x="245" y="303" text-anchor="middle" font-size="9" fill="#64748b">Overlap: 7 days. Update clients, then revoke old key</text>

  <!-- Database Passwords -->
  <rect x="460" y="265" width="390" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="655" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Database Passwords: ALTER USER with new password</text>
  <text x="655" y="303" text-anchor="middle" font-size="9" fill="#64748b">Overlap: Both passwords valid briefly. Update apps, then disable old</text>

  <!-- TLS Certificates -->
  <rect x="50" y="335" width="390" height="60" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="245" y="355" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">TLS Certificates: Install new cert alongside old</text>
  <text x="245" y="373" text-anchor="middle" font-size="9" fill="#64748b">Overlap: Until old cert expires. Deploy new cert, wait for propagation</text>

  <!-- Signing Keys -->
  <rect x="460" y="335" width="390" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="655" y="355" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Signing Keys (JWT): Publish new public key</text>
  <text x="655" y="373" text-anchor="middle" font-size="9" fill="#64748b">Overlap: Sign with new, accept both. Retire old after tokens expire</text>

  <!-- Bottom note -->
  <rect x="30" y="410" width="840" height="60" rx="8" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="435" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Emergency Rotation</text>
  <text x="450" y="458" text-anchor="middle" font-size="10" fill="#1a1822">Compromise detected → immediately revoke old secret, generate new, distribute to clients. May cause brief disruption.</text>
  <text x="450" y="475" text-anchor="middle" font-size="9" fill="#64748b">No overlap period — security over availability during compromise</text>

  <defs>
    <marker id="arrowRotation" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>