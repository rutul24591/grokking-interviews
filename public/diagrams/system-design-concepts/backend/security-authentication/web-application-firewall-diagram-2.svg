<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>WAF rule types showing OWASP Core Rule Set, custom rules, rate limiting, and bot management</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">WAF Rule Types: Managed vs Custom Rules</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">WAF combines managed rule sets (OWASP CRS) with custom rules for application-specific protection</text>

  <!-- OWASP CRS -->
  <rect x="30" y="80" width="410" height="180" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="35" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="105" width="410" height="10" fill="#6d5bd0"/>
  <text x="235" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">OWASP Core Rule Set (CRS)</text>

  <rect x="50" y="125" width="370" height="45" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Rule 941: XSS Attack Detected</text>
  <text x="235" y="163" text-anchor="middle" font-size="9" fill="#64748b">Blocks: &lt;script&gt;, javascript:, event handlers, encoded variants</text>

  <rect x="50" y="175" width="370" height="45" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Rule 942: SQL Injection Attack Detected</text>
  <text x="235" y="213" text-anchor="middle" font-size="9" fill="#64748b">Blocks: UNION SELECT, OR 1=1, DROP TABLE, comment sequences</text>

  <rect x="50" y="225" width="370" height="45" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Rule 930: File Inclusion Attack Detected</text>
  <text x="235" y="263" text-anchor="middle" font-size="9" fill="#64748b">Blocks: ../../../etc/passwd, php://input, file:// protocol</text>

  <!-- Custom Rules -->
  <rect x="460" y="80" width="410" height="180" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="35" rx="10" fill="#4caf50"/>
  <rect x="460" y="105" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Custom Rules</text>

  <rect x="480" y="125" width="370" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Block specific user agents</text>
  <text x="665" y="163" text-anchor="middle" font-size="9" fill="#64748b">Block: known scraping bots, malicious crawlers</text>

  <rect x="480" y="175" width="370" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Geo-blocking</text>
  <text x="665" y="213" text-anchor="middle" font-size="9" fill="#64748b">Block: traffic from countries where service is not offered</text>

  <rect x="480" y="225" width="370" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="245" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">API-specific rules</text>
  <text x="665" y="263" text-anchor="middle" font-size="9" fill="#64748b">Block: requests without required headers, invalid API keys</text>

  <!-- Rate Limiting -->
  <rect x="30" y="280" width="410" height="100" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="30" y="280" width="410" height="30" rx="10" fill="#f0ad4e"/>
  <rect x="30" y="300" width="410" height="10" fill="#f0ad4e"/>
  <text x="235" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Rate Limiting &amp; Bot Management</text>

  <rect x="50" y="320" width="370" height="45" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="235" y="340" text-anchor="middle" font-size="9" fill="#1a1822">Rate limiting: 100 requests/min per IP. Block after 5 failed logins.</text>
  <text x="235" y="358" text-anchor="middle" font-size="9" fill="#64748b">Bot management: Challenge suspicious bots, block known bad bots</text>

  <!-- WAF Operation Modes -->
  <rect x="460" y="280" width="410" height="100" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="460" y="280" width="410" height="30" rx="10" fill="#cc4444"/>
  <rect x="460" y="300" width="410" height="10" fill="#cc4444"/>
  <text x="665" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">WAF Operation Modes</text>

  <rect x="480" y="320" width="370" height="45" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="665" y="340" text-anchor="middle" font-size="9" fill="#1a1822">Monitor Mode: Log violations, do not block. Use for tuning.</text>
  <text x="665" y="358" text-anchor="middle" font-size="9" fill="#64748b">Blocking Mode: Block violations. Use after tuning to minimize false positives.</text>

  <!-- False positive management -->
  <rect x="30" y="400" width="840" height="80" rx="10" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="425" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">Managing False Positives</text>
  <text x="450" y="448" text-anchor="middle" font-size="9" fill="#1a1822">WAF rules may block legitimate requests. Use rule exclusions for specific paths (e.g., /api/webhook with XML payloads).</text>
  <text x="450" y="468" text-anchor="middle" font-size="9" fill="#64748b">Best practice: Start in monitor mode, review logs for false positives, add exclusions, then switch to blocking mode.</text>
</svg>