<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Authentication vs Authorization flow showing identity verification followed by permission enforcement</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Authentication Then Authorization: The Security Flow</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">AuthN establishes identity; AuthZ enforces permissions on each request</text>

  <!-- Authentication Phase -->
  <rect x="30" y="80" width="400" height="400" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="400" height="40" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="110" width="400" height="10" fill="#6d5bd0"/>
  <text x="230" y="107" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Phase 1: Authentication (AuthN)</text>

  <!-- User -->
  <rect x="60" y="145" width="120" height="55" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1.5"/>
  <text x="120" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#cc4444">User / Client</text>
  <text x="120" y="186" text-anchor="middle" font-size="9" fill="#1a1822">"I am alice@example.com"</text>

  <line x1="180" y1="172" x2="240" y2="172" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowAuth)"/>

  <!-- Identity Provider -->
  <rect x="245" y="145" width="155" height="55" rx="8" fill="#6d5bd0"/>
  <text x="322" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Identity Provider</text>
  <text x="322" y="186" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Validates credentials</text>

  <line x1="322" y1="200" x2="322" y2="230" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowAuth)"/>

  <!-- Token -->
  <rect x="245" y="230" width="155" height="65" rx="8" fill="#6d5bd0" opacity="0.9"/>
  <text x="322" y="255" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Identity Token Issued</text>
  <text x="322" y="273" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">JWT / Session Cookie</text>
  <text x="322" y="286" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Contains: sub, email, iat</text>

  <line x1="245" y1="262" x2="180" y2="262" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowAuth)"/>

  <!-- AuthN Result -->
  <rect x="60" y="320" width="120" height="65" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1.5"/>
  <text x="120" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">Identity Verified</text>
  <text x="120" y="360" text-anchor="middle" font-size="9" fill="#1a1822">User is authenticated</text>
  <text x="120" y="375" text-anchor="middle" font-size="9" fill="#1a1822">But NOT yet authorized</text>

  <!-- Methods -->
  <rect x="60" y="400" width="340" height="60" rx="8" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="230" y="418" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Common AuthN Methods:</text>
  <text x="100" y="438" text-anchor="start" font-size="9" fill="#1a1822">Passwords, MFA, OAuth, SSO, SAML</text>
  <text x="320" y="438" text-anchor="start" font-size="9" fill="#1a1822">Biometrics, Security Keys</text>

  <!-- Arrow from AuthN to AuthZ -->
  <line x1="430" y1="280" x2="470" y2="280" stroke="#f0ad4e" stroke-width="3" marker-end="url(#arrowAuth)"/>
  <text x="450" y="265" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">Then</text>

  <!-- Authorization Phase -->
  <rect x="470" y="80" width="400" height="400" rx="12" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="470" y="80" width="400" height="40" rx="12" fill="#f0ad4e"/>
  <rect x="470" y="110" width="400" height="10" fill="#f0ad4e"/>
  <text x="670" y="107" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Phase 2: Authorization (AuthZ)</text>

  <!-- Authenticated User -->
  <rect x="500" y="145" width="120" height="55" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1.5"/>
  <text x="560" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#4caf50">Authenticated User</text>
  <text x="560" y="186" text-anchor="middle" font-size="9" fill="#1a1822">Token: alice@example.com</text>

  <line x1="620" y1="172" x2="680" y2="172" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowAuth)"/>

  <!-- Policy Engine -->
  <rect x="685" y="145" width="155" height="55" rx="8" fill="#f0ad4e"/>
  <text x="762" y="167" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Policy Engine</text>
  <text x="762" y="186" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">RBAC / ABAC / ACL</text>

  <line x1="762" y1="200" x2="762" y2="230" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowAuth)"/>

  <!-- Access Decision -->
  <rect x="685" y="230" width="155" height="65" rx="8" fill="#f0ad4e" opacity="0.9"/>
  <text x="762" y="255" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Access Decision</text>
  <text x="762" y="273" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">ALLOW or DENY</text>
  <text x="762" y="286" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Based on roles, policies</text>

  <line x1="685" y1="262" x2="620" y2="262" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowAuth)"/>

  <!-- Result -->
  <rect x="500" y="320" width="120" height="65" rx="8" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1.5"/>
  <text x="560" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">Access Granted</text>
  <text x="560" y="360" text-anchor="middle" font-size="9" fill="#1a1822">Resource: /api/orders</text>
  <text x="560" y="375" text-anchor="middle" font-size="9" fill="#1a1822">Action: GET</text>

  <!-- Models -->
  <rect x="500" y="400" width="340" height="60" rx="8" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="670" y="418" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Common AuthZ Models:</text>
  <text x="540" y="438" text-anchor="start" font-size="9" fill="#1a1822">RBAC, ABAC, ACL, ReBAC</text>
  <text x="740" y="438" text-anchor="start" font-size="9" fill="#1a1822">Capabilities, PBAC</text>

  <defs>
    <marker id="arrowAuth" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>