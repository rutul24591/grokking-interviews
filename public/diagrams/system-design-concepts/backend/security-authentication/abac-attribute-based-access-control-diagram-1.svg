<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>ABAC decision flow showing how user attributes, resource attributes, action, and environment attributes combine to make access decisions</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">ABAC Decision Flow: Multi-Attribute Access Control</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Access decisions evaluate user, resource, action, and environment attributes together</text>

  <!-- User Attributes -->
  <rect x="30" y="80" width="200" height="180" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="200" height="35" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="105" width="200" height="10" fill="#6d5bd0"/>
  <text x="130" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">User Attributes</text>

  <text x="50" y="130" text-anchor="start" font-size="9" fill="#1a1822">• user.role = "manager"</text>
  <text x="50" y="148" text-anchor="start" font-size="9" fill="#1a1822">• user.department = "finance"</text>
  <text x="50" y="166" text-anchor="start" font-size="9" fill="#1a1822">• user.clearance = "secret"</text>
  <text x="50" y="184" text-anchor="start" font-size="9" fill="#1a1822">• user.location = "US"</text>
  <text x="50" y="202" text-anchor="start" font-size="9" fill="#1a1822">• user.employment = "active"</text>
  <text x="50" y="220" text-anchor="start" font-size="9" fill="#1a1822">• user.mfa_verified = true</text>
  <text x="50" y="242" text-anchor="start" font-size="9" fill="#64748b">Identity &amp; context attributes</text>

  <!-- Resource Attributes -->
  <rect x="250" y="80" width="200" height="180" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="250" y="80" width="200" height="35" rx="10" fill="#f0ad4e"/>
  <rect x="250" y="105" width="200" height="10" fill="#f0ad4e"/>
  <text x="350" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Resource Attributes</text>

  <text x="270" y="130" text-anchor="start" font-size="9" fill="#1a1822">• resource.type = "document"</text>
  <text x="270" y="148" text-anchor="start" font-size="9" fill="#1a1822">• resource.classification = "confidential"</text>
  <text x="270" y="166" text-anchor="start" font-size="9" fill="#1a1822">• resource.owner = "finance-dept"</text>
  <text x="270" y="184" text-anchor="start" font-size="9" fill="#1a1822">• resource.project = "project-alpha"</text>
  <text x="270" y="202" text-anchor="start" font-size="9" fill="#1a1822">• resource.region = "us-east-1"</text>
  <text x="270" y="220" text-anchor="start" font-size="9" fill="#1a1822">• resource.sensitivity = "high"</text>
  <text x="270" y="242" text-anchor="start" font-size="9" fill="#64748b">Data &amp; metadata attributes</text>

  <!-- Action -->
  <rect x="470" y="80" width="180" height="180" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="470" y="80" width="180" height="35" rx="10" fill="#4caf50"/>
  <rect x="470" y="105" width="180" height="10" fill="#4caf50"/>
  <text x="560" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Action</text>

  <text x="490" y="130" text-anchor="start" font-size="9" fill="#1a1822">• action = "read"</text>
  <text x="490" y="148" text-anchor="start" font-size="9" fill="#1a1822">• action = "write"</text>
  <text x="490" y="166" text-anchor="start" font-size="9" fill="#1a1822">• action = "delete"</text>
  <text x="490" y="184" text-anchor="start" font-size="9" fill="#1a1822">• action = "share"</text>
  <text x="490" y="202" text-anchor="start" font-size="9" fill="#1a1822">• action = "export"</text>
  <text x="490" y="220" text-anchor="start" font-size="9" fill="#1a1822">• action = "approve"</text>
  <text x="490" y="242" text-anchor="start" font-size="9" fill="#64748b">What user wants to do</text>

  <!-- Environment Attributes -->
  <rect x="670" y="80" width="200" height="180" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="670" y="80" width="200" height="35" rx="10" fill="#cc4444"/>
  <rect x="670" y="105" width="200" height="10" fill="#cc4444"/>
  <text x="770" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Environment Attributes</text>

  <text x="690" y="130" text-anchor="start" font-size="9" fill="#1a1822">• time = 14:30 UTC</text>
  <text x="690" y="148" text-anchor="start" font-size="9" fill="#1a1822">• day_of_week = "Wednesday"</text>
  <text x="690" y="166" text-anchor="start" font-size="9" fill="#1a1822">• source_ip = "10.0.0.5"</text>
  <text x="690" y="184" text-anchor="start" font-size="9" fill="#1a1822">• network = "corporate"</text>
  <text x="690" y="202" text-anchor="start" font-size="9" fill="#1a1822">• device.managed = true</text>
  <text x="690" y="220" text-anchor="start" font-size="9" fill="#1a1822">• risk_score = 0.15</text>
  <text x="690" y="242" text-anchor="start" font-size="9" fill="#64748b">Context &amp; risk attributes</text>

  <!-- Policy Engine -->
  <rect x="200" y="280" width="500" height="100" rx="10" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Policy Engine (OPA, Cedar, XACML)</text>
  <text x="450" y="335" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">Evaluates: IF user.department == resource.owner.department</text>
  <text x="450" y="355" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">AND time in 09:00-18:00 AND risk_score &lt; 0.5 THEN allow ELSE deny</text>
  <text x="450" y="375" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">Combines all attributes to make a single access decision</text>

  <!-- Arrows to Policy Engine -->
  <line x1="130" y1="260" x2="350" y2="280" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowABAC)"/>
  <line x1="350" y1="260" x2="400" y2="280" stroke="#f0ad4e" stroke-width="1.5" marker-end="url(#arrowABAC)"/>
  <line x1="560" y1="260" x2="500" y2="280" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrowABAC)"/>
  <line x1="770" y1="260" x2="550" y2="280" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrowABAC)"/>

  <!-- Decision Output -->
  <rect x="350" y="400" width="200" height="80" rx="10" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="2"/>
  <text x="450" y="430" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">Decision</text>
  <text x="450" y="455" text-anchor="middle" font-size="11" fill="#1a1822">Allow / Deny / Conditional</text>
  <text x="450" y="472" text-anchor="middle" font-size="9" fill="#64748b">With obligations (log, MFA)</text>

  <!-- Arrow from Policy Engine to Decision -->
  <line x1="450" y1="380" x2="450" y2="400" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowABAC)"/>

  <defs>
    <marker id="arrowABAC" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>