<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Factor Authentication (MFA)</title>
  <desc id="desc">Multi-Factor Authentication showing authentication factors (knowledge, possession, inherence) and MFA methods with security levels</desc>
  
  <!-- Background -->
  <rect width="950" height="700" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b)">Multi-Factor Authentication (MFA)</text>
  <text x="475" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Multiple authentication factors for enhanced security</text>
  
  <!-- Authentication Factors Section -->
  <rect x="30" y="80" width="890" height="180" rx="8" fill="var(--bg-panel-hover, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="475" y="108" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e40af)">Three Authentication Factors</text>
  
  <!-- Factor 1: Knowledge -->
  <rect x="50" y="130" width="270" height="120" rx="6" fill="white" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <rect x="50" y="130" width="270" height="35" rx="6" fill="var(--bg-theme, #3b82f6)"/>
  <text x="185" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1. Knowledge Factor</text>
  <text x="185" y="185" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b">"Something You Know"</text>
  
  <text x="70" y="205" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Passwords / PINs</text>
  <text x="70" y="223" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Security questions</text>
  <text x="70" y="241" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Passphrases</text>
  
  <rect x="70" y="250" width="230" height="35" rx="4" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="185" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #b91c1c">⚠️ Weakest factor (easily compromised)</text>
  <text x="185" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #b91c1c">Phishing, breaches, guessing</text>
  
  <!-- Factor 2: Possession -->
  <rect x="340" y="130" width="270" height="120" rx="6" fill="white" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <rect x="340" y="130" width="270" height="35" rx="6" fill="var(--bg-theme, #f59e0b)"/>
  <text x="475" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="white">2. Possession Factor</text>
  <text x="475" y="185" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b">"Something You Have"</text>
  
  <text x="360" y="205" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Mobile phone (SMS/App)</text>
  <text x="360" y="223" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Hardware tokens (YubiKey)</text>
  <text x="360" y="241" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Smart cards</text>
  
  <rect x="360" y="250" width="230" height="35" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="475" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ Stronger than knowledge alone</text>
  <text x="475" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">Requires physical device</text>
  
  <!-- Factor 3: Inherence -->
  <rect x="630" y="130" width="270" height="120" rx="6" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <rect x="630" y="130" width="270" height="35" rx="6" fill="var(--bg-theme, #10b981)"/>
  <text x="765" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="white">3. Inherence Factor</text>
  <text x="765" y="185" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b">"Something You Are"</text>
  
  <text x="650" y="205" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Fingerprint scan</text>
  <text x="650" y="223" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Face recognition</text>
  <text x="650" y="241" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Voice patterns</text>
  
  <rect x="650" y="250" width="230" height="35" rx="4" fill="var(--bg-panel-soft, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="765" y="265" text-anchor="middle" font-size="9" fill="var(--text-theme, #059669">✓ Strongest factor (hard to steal)</text>
  <text x="765" y="280" text-anchor="middle" font-size="9" fill="var(--text-theme, #059669">Biometric verification</text>
  
  <!-- MFA Methods Comparison -->
  <rect x="30" y="275" width="890" height="280" rx="8" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="475" y="303" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #b45309">MFA Methods Comparison</text>
  
  <!-- SMS OTP -->
  <rect x="50" y="320" width="270" height="100" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="185" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b">SMS OTP</text>
  
  <text x="70" y="365" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">How it works:</text>
  <text x="70" y="380" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">6-digit code via SMS</text>
  
  <rect x="70" y="390" width="230" height="25" rx="3" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="185" y="407" text-anchor="middle" font-size="9" fill="var(--text-theme, #b91c1c">⚠️ Vulnerable to SIM swapping</text>
  
  <text x="185" y="430" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b">Security: ⭐⭐☆☆☆</text>
  
  <!-- TOTP App -->
  <rect x="340" y="320" width="270" height="100" rx="6" fill="white" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="475" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b">TOTP App</text>
  
  <text x="360" y="365" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">How it works:</text>
  <text x="360" y="380" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">Time-based code (Google/Microsoft Authenticator)</text>
  
  <rect x="360" y="390" width="230" height="25" rx="3" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="475" y="407" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309">✓ No network needed, works offline</text>
  
  <text x="475" y="430" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b">Security: ⭐⭐⭐⭐☆</text>
  
  <!-- Push Notification -->
  <rect x="630" y="320" width="270" height="100" rx="6" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="765" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b">Push Notification</text>
  
  <text x="650" y="365" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">How it works:</text>
  <text x="650" y="380" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">Approve/Deny prompt on device</text>
  
  <rect x="650" y="390" width="230" height="25" rx="3" fill="var(--bg-panel-soft, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="765" y="407" text-anchor="middle" font-size="9" fill="var(--text-theme, #059669">✓ User-friendly, phishing-resistant</text>
  
  <text x="765" y="430" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b">Security: ⭐⭐⭐⭐☆</text>
  
  <!-- Hardware Token -->
  <rect x="50" y="435" width="270" height="100" rx="6" fill="white" stroke="var(--border-theme, #a78bfa)" stroke-width="1"/>
  <text x="185" y="460" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b">Hardware Token (FIDO2)</text>
  
  <text x="70" y="480" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">How it works:</text>
  <text x="70" y="495" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">Physical key (YubiKey, Titan)</text>
  
  <rect x="70" y="505" width="230" height="25" rx="3" fill="var(--bg-panel-soft, #ede9fe)" stroke="var(--border-theme, #a78bfa)" stroke-width="1"/>
  <text x="185" y="522" text-anchor="middle" font-size="9" fill="var(--text-theme, #6d28d9">✓ Highest security, phishing-proof</text>
  
  <text x="185" y="545" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b">Security: ⭐⭐⭐⭐⭐</text>
  
  <!-- Backup Codes -->
  <rect x="340" y="435" width="270" height="100" rx="6" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="475" y="460" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b">Backup/Recovery Codes</text>
  
  <text x="360" y="480" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">How it works:</text>
  <text x="360" y="495" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">One-time use codes for recovery</text>
  
  <rect x="360" y="505" width="230" height="25" rx="3" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="475" y="522" text-anchor="middle" font-size="9" fill="var(--text-theme, #b91c1c">⚠️ Store securely, single-use only</text>
  
  <text x="475" y="545" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b">Security: ⭐⭐⭐☆☆</text>
  
  <!-- Biometric -->
  <rect x="630" y="435" width="270" height="100" rx="6" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="765" y="460" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b">Biometric</text>
  
  <text x="650" y="480" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">How it works:</text>
  <text x="650" y="495" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">Fingerprint, Face ID, Touch ID</text>
  
  <rect x="650" y="505" width="230" height="25" rx="3" fill="var(--bg-panel-soft, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="765" y="522" text-anchor="middle" font-size="9" fill="var(--text-theme, #059669">✓ Convenient, tied to user</text>
  
  <text x="765" y="545" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b">Security: ⭐⭐⭐⭐☆</text>
  
  <!-- MFA Implementation Flow -->
  <rect x="30" y="570" width="890" height="110" rx="8" fill="var(--bg-panel-hover, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="475" y="595" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">MFA Enrollment and Authentication Flow</text>
  
  <!-- Enrollment -->
  <rect x="50" y="610" width="270" height="60" rx="6" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="185" y="635" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669">1. Enrollment</text>
  <text x="185" y="655" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">User registers MFA method</text>
  
  <!-- Verification -->
  <rect x="340" y="610" width="270" height="60" rx="6" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="475" y="635" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669">2. Login + MFA Challenge</text>
  <text x="475" y="655" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Password + second factor</text>
  
  <!-- Access Granted -->
  <rect x="630" y="610" width="270" height="60" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="765" y="635" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3. Access Granted</text>
  <text x="765" y="655" text-anchor="middle" font-size="9" fill="#6ee7b7">Session created</text>
  
  <!-- Arrows between steps -->
  <line x1="320" y1="640" x2="335" y2="640" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="610" y1="640" x2="625" y2="640" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
