<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Secrets management architecture showing centralized vault, applications, and key rotation</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Secrets Management Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Centralized secrets management with encryption, access control, and audit logging</text>

  <!-- Central Vault -->
  <rect x="330" y="80" width="240" height="160" rx="12" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Secrets Vault</text>
  <text x="450" y="128" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">HashiCorp Vault / AWS Secrets Manager</text>

  <rect x="350" y="140" width="200" height="35" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="450" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Encrypted at rest (AES-256)</text>

  <rect x="350" y="185" width="200" height="35" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="450" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Access control policies</text>

  <!-- Applications -->
  <rect x="30" y="100" width="140" height="80" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="100" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">App Server 1</text>
  <text x="100" y="148" text-anchor="middle" font-size="9" fill="#1a1822">Retrieves secrets</text>
  <text x="100" y="165" text-anchor="middle" font-size="9" fill="#1a1822">via API at startup</text>

  <rect x="30" y="200" width="140" height="80" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="100" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">App Server 2</text>
  <text x="100" y="248" text-anchor="middle" font-size="9" fill="#1a1822">Auto-refreshes</text>
  <text x="100" y="265" text-anchor="middle" font-size="9" fill="#1a1822">secrets on rotation</text>

  <rect x="730" y="100" width="140" height="80" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="800" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#f0ad4e">CI/CD Pipeline</text>
  <text x="800" y="148" text-anchor="middle" font-size="9" fill="#1a1822">Injects secrets</text>
  <text x="800" y="165" text-anchor="middle" font-size="9" fill="#1a1822">at deploy time</text>

  <rect x="730" y="200" width="140" height="80" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="800" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#f0ad4e">Developer Tools</text>
  <text x="800" y="248" text-anchor="middle" font-size="9" fill="#1a1822">Local dev secrets</text>
  <text x="800" y="265" text-anchor="middle" font-size="9" fill="#1a1822">via CLI auth</text>

  <!-- Connection lines -->
  <line x1="170" y1="140" x2="330" y2="140" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowSec)"/>
  <line x1="170" y1="240" x2="330" y2="200" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowSec)"/>
  <line x1="730" y1="140" x2="570" y2="140" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowSec)"/>
  <line x1="730" y1="240" x2="570" y2="200" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arrowSec)"/>

  <!-- Secret types -->
  <rect x="30" y="310" width="840" height="170" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Types of Managed Secrets</text>

  <rect x="50" y="360" width="250" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="175" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">API Keys (Stripe, AWS, GCP)</text>
  <text x="175" y="395" text-anchor="middle" font-size="9" fill="#1a1822">External service credentials</text>

  <rect x="320" y="360" width="250" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="445" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Database Credentials</text>
  <text x="445" y="395" text-anchor="middle" font-size="9" fill="#1a1822">DB usernames, passwords, connection strings</text>

  <rect x="590" y="360" width="260" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="720" y="380" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">TLS Certificates &amp; Private Keys</text>
  <text x="720" y="395" text-anchor="middle" font-size="9" fill="#1a1822">SSL certs, signing keys, encryption keys</text>

  <rect x="50" y="410" width="250" height="40" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="175" y="430" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">OAuth Client Secrets</text>
  <text x="175" y="445" text-anchor="middle" font-size="9" fill="#1a1822">OAuth client_id, client_secret</text>

  <rect x="320" y="410" width="250" height="40" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="445" y="430" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">JWT Signing Keys</text>
  <text x="445" y="445" text-anchor="middle" font-size="9" fill="#1a1822">Private keys for token signing</text>

  <rect x="590" y="410" width="260" height="40" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="720" y="430" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Service Account Credentials</text>
  <text x="720" y="445" text-anchor="middle" font-size="9" fill="#1a1822">M2M authentication credentials</text>

  <defs>
    <marker id="arrowSec" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>