<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" role="img" aria-labelledby="title desc">
  <title id="title">Secrets Management Architecture</title>
  <desc id="desc">Secrets management architecture showing KMS/HSM integration, secret access patterns, and encryption at rest</desc>
  
  <!-- Background -->
  <rect width="950" height="700" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b">Secrets Management Architecture</text>
  <text x="475" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b">Secure storage, access, and encryption patterns</text>
  
  <!-- Secrets Management Core -->
  <rect x="30" y="80" width="570" height="340" rx="8" fill="var(--bg-panel-hover, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="315" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #1e40af">Secrets Management Core</text>
  
  <!-- Applications -->
  <rect x="50" y="125" width="140" height="285" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Applications</text>
  
  <rect x="65" y="170" width="110" height="35" rx="4" fill="var(--bg-panel-soft, #dbeafe)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="120" y="192" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Web App</text>
  
  <rect x="65" y="215" width="110" height="35" rx="4" fill="var(--bg-panel-soft, #dbeafe)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="120" y="237" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">API Service</text>
  
  <rect x="65" y="260" width="110" height="35" rx="4" fill="var(--bg-panel-soft, #dbeafe)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="120" y="282" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Lambda</text>
  
  <rect x="65" y="305" width="110" height="35" rx="4" fill="var(--bg-panel-soft, #dbeafe)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="120" y="327" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">CI/CD Pipeline</text>
  
  <!-- Arrow -->
  <line x1="190" y1="267" x2="225" y2="267" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="207" y="257" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Request</text>
  <text x="207" y="287" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Secret</text>
  
  <!-- Secrets Manager -->
  <rect x="230" y="125" width="180" height="285" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="320" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Secrets Manager</text>
  
  <rect x="245" y="170" width="150" height="230" rx="4" fill="var(--bg-panel-soft, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="320" y="195" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">Features:</text>
  
  <text x="260" y="220" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Secret storage</text>
  <text x="260" y="238" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Version control</text>
  <text x="260" y="256" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Access policies</text>
  <text x="260" y="274" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Audit logging</text>
  <text x="260" y="292" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Auto-rotation</text>
  <text x="260" y="310" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Secret retrieval</text>
  <text x="260" y="328" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Access control</text>
  <text x="260" y="346" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Encryption</text>
  <text x="260" y="364" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Secret sharing</text>
  
  <!-- Arrow -->
  <line x1="410" y1="267" x2="445" y2="267" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="427" y="257" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Encrypt/</text>
  <text x="427" y="287" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Decrypt</text>
  
  <!-- KMS/HSM -->
  <rect x="450" y="125" width="140" height="285" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="520" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="white">KMS / HSM</text>
  
  <rect x="465" y="170" width="110" height="230" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  <text x="520" y="195" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #6d28d9">Key Management</text>
  
  <text x="480" y="220" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Master keys</text>
  <text x="480" y="238" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Key rotation</text>
  <text x="480" y="256" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Key policies</text>
  <text x="480" y="274" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Audit trails</text>
  <text x="480" y="292" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Encryption</text>
  <text x="480" y="310" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Decryption</text>
  <text x="480" y="328" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Key generation</text>
  <text x="480" y="346" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Key storage</text>
  <text x="480" y="364" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Access control</text>
  
  <!-- Envelope Encryption -->
  <rect x="50" y="435" width="550" height="245" rx="8" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="325" y="460" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b45309">Envelope Encryption Pattern</text>
  
  <!-- Step 1 -->
  <rect x="70" y="480" width="150" height="190" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="145" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="white">1. Generate Data Key</text>
  
  <rect x="85" y="525" width="120" height="135" rx="4" fill="var(--bg-panel-soft, #dbeafe)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="145" y="545" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Application requests</text>
  <text x="145" y="560" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">data key from KMS</text>
  <text x="145" y="580" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">KMS generates</text>
  <text x="145" y="595" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">plaintext + encrypted</text>
  <text x="145" y="610" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">data key pair</text>
  <text x="145" y="630" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Plaintext key used</text>
  <text x="145" y="645" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">locally, then deleted</text>
  
  <!-- Arrow -->
  <line x1="220" y1="575" x2="250" y2="575" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2 -->
  <rect x="255" y="480" width="150" height="190" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="330" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="white">2. Encrypt Data</text>
  
  <rect x="270" y="525" width="120" height="135" rx="4" fill="var(--bg-panel-soft, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="330" y="545" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Application uses</text>
  <text x="330" y="560" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">plaintext data key</text>
  <text x="330" y="580" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">to encrypt secret</text>
  <text x="330" y="600" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">locally</text>
  <text x="330" y="620" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Plaintext key deleted</text>
  <text x="330" y="640" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">from memory</text>
  <text x="330" y="660" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Encrypted data stored</text>
  
  <!-- Arrow -->
  <line x1="405" y1="575" x2="435" y2="575" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3 -->
  <rect x="440" y="480" width="150" height="190" rx="6" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="515" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="white">3. Store Encrypted</text>
  
  <rect x="455" y="525" width="120" height="135" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="515" y="545" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Store encrypted data</text>
  <text x="515" y="560" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">key with encrypted</text>
  <text x="515" y="575" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">secret</text>
  <text x="515" y="595" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">To decrypt: send</text>
  <text x="515" y="610" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">encrypted key to</text>
  <text x="515" y="625" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">KMS for decryption</text>
  <text x="515" y="645" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Use returned plaintext</text>
  <text x="515" y="660" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">key to decrypt data</text>
  
  <!-- Benefits -->
  <rect x="615" y="80" width="305" height="340" rx="8" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="767" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">Benefits of Envelope Encryption</text>
  
  <rect x="630" y="125" width="275" height="285" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  
  <text x="645" y="155" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">✓ Performance:</text>
  <text x="660" y="175" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Encrypt/decrypt locally</text>
  <text x="660" y="190" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• No KMS call for each operation</text>
  <text x="660" y="205" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Faster data access</text>
  
  <text x="645" y="235" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">✓ Security:</text>
  <text x="660" y="255" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Master key never leaves KMS</text>
  <text x="660" y="270" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Data keys rotated frequently</text>
  <text x="660" y="285" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Plaintext keys deleted after use</text>
  
  <text x="645" y="315" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">✓ Cost:</text>
  <text x="660" y="335" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Fewer KMS API calls</text>
  <text x="660" y="350" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Reduced latency</text>
  <text x="660" y="365" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Lower KMS costs</text>
  
  <text x="645" y="395" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">✓ Compliance:</text>
  <text x="660" y="415" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Encryption at rest</text>
  <text x="660" y="430" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Key management controls</text>
  <text x="660" y="445" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Audit trails</text>
  
  <!-- Secret Access Patterns -->
  <rect x="615" y="435" width="305" height="245" rx="8" fill="var(--bg-panel-soft, #f0fdf4)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="767" y="460" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">Secret Access Patterns</text>
  
  <rect x="630" y="480" width="275" height="190" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  
  <text x="645" y="505" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">✓ IAM Roles (Best):</text>
  <text x="660" y="525" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• EC2 instance roles</text>
  <text x="660" y="540" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Lambda execution roles</text>
  <text x="660" y="555" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• ECS task roles</text>
  <text x="660" y="570" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• No credentials in code</text>
  
  <text x="645" y="595" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #f59e0b">△ API Keys (Acceptable):</text>
  <text x="660" y="615" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• For external services</text>
  <text x="660" y="630" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Rotate regularly</text>
  <text x="660" y="645" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Store in Secrets Manager</text>
  
  <text x="645" y="670" text-anchor="start" font-size="10" font-weight="bold" fill="var(--text-theme, #ef4444">✗ Hardcoded (Never):</text>
  <text x="660" y="690" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Never in source code</text>
  <text x="660" y="705" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">• Never in config files</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
