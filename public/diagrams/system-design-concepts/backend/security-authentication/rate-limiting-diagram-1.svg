<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Rate limiting algorithms comparison showing fixed window, sliding window, token bucket, and leaky bucket</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Rate Limiting Algorithms: Fixed Window, Sliding Window, Token Bucket, Leaky Bucket</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Different algorithms handle request bursts, fairness, and memory usage differently</text>

  <!-- Fixed Window -->
  <rect x="30" y="80" width="200" height="200" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="200" height="30" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="100" width="200" height="10" fill="#6d5bd0"/>
  <text x="130" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Fixed Window</text>

  <!-- Request pattern visualization -->
  <rect x="45" y="120" width="170" height="30" rx="4" fill="#6d5bd0" opacity="0.2"/>
  <text x="130" y="140" text-anchor="middle" font-size="8" fill="#1a1822">[100 requests in 00:00-00:60]</text>

  <rect x="45" y="160" width="170" height="30" rx="4" fill="#6d5bd0" opacity="0.2"/>
  <text x="130" y="180" text-anchor="middle" font-size="8" fill="#1a1822">[100 requests in 01:00-01:60]</text>

  <rect x="45" y="200" width="170" height="30" rx="4" fill="#cc4444" opacity="0.2"/>
  <text x="130" y="220" text-anchor="middle" font-size="8" fill="#cc4444">[200 requests at boundary]</text>
  <text x="130" y="235" text-anchor="middle" font-size="8" fill="#cc4444">→ Spike allowed!</text>

  <rect x="45" y="245" width="170" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="130" y="262" text-anchor="middle" font-size="8" fill="#64748b">Simple, memory-efficient,</text>
  <text x="130" y="275" text-anchor="middle" font-size="8" fill="#cc4444">but boundary spike problem</text>

  <!-- Sliding Window -->
  <rect x="250" y="80" width="200" height="200" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="250" y="80" width="200" height="30" rx="10" fill="#4caf50"/>
  <rect x="250" y="100" width="200" height="10" fill="#4caf50"/>
  <text x="350" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Sliding Window</text>

  <rect x="265" y="120" width="170" height="30" rx="4" fill="#4caf50" opacity="0.2"/>
  <text x="350" y="140" text-anchor="middle" font-size="8" fill="#1a1822">[Window slides continuously]</text>

  <rect x="265" y="160" width="170" height="30" rx="4" fill="#4caf50" opacity="0.2"/>
  <text x="350" y="180" text-anchor="middle" font-size="8" fill="#1a1822">[Counts last N seconds]</text>

  <rect x="265" y="200" width="170" height="30" rx="4" fill="#4caf50" opacity="0.2"/>
  <text x="350" y="220" text-anchor="middle" font-size="8" fill="#4caf50">[No boundary spike]</text>
  <text x="350" y="235" text-anchor="middle" font-size="8" fill="#4caf50">→ Smooth limiting!</text>

  <rect x="265" y="245" width="170" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="350" y="262" text-anchor="middle" font-size="8" fill="#64748b">No boundary spike,</text>
  <text x="350" y="275" text-anchor="middle" font-size="8" fill="#4caf50">but higher memory usage</text>

  <!-- Token Bucket -->
  <rect x="470" y="80" width="200" height="200" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="470" y="80" width="200" height="30" rx="10" fill="#f0ad4e"/>
  <rect x="470" y="100" width="200" height="10" fill="#f0ad4e"/>
  <text x="570" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Token Bucket</text>

  <rect x="485" y="120" width="170" height="30" rx="4" fill="#f0ad4e" opacity="0.2"/>
  <text x="570" y="140" text-anchor="middle" font-size="8" fill="#1a1822">[Bucket: 100 tokens]</text>

  <rect x="485" y="160" width="170" height="30" rx="4" fill="#f0ad4e" opacity="0.2"/>
  <text x="570" y="180" text-anchor="middle" font-size="8" fill="#1a1822">[+1 token/sec refill]</text>

  <rect x="485" y="200" width="170" height="30" rx="4" fill="#f0ad4e" opacity="0.2"/>
  <text x="570" y="220" text-anchor="middle" font-size="8" fill="#f0ad4e">[Burst up to 100]</text>
  <text x="570" y="235" text-anchor="middle" font-size="8" fill="#f0ad4e">→ Controlled bursts!</text>

  <rect x="485" y="245" width="170" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="570" y="262" text-anchor="middle" font-size="8" fill="#64748b">Allows bursts, smooth</text>
  <text x="570" y="275" text-anchor="middle" font-size="8" fill="#f0ad4e">long-term rate limiting</text>

  <!-- Leaky Bucket -->
  <rect x="690" y="80" width="200" height="200" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="690" y="80" width="200" height="30" rx="10" fill="#cc4444"/>
  <rect x="690" y="100" width="200" height="10" fill="#cc4444"/>
  <text x="790" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Leaky Bucket</text>

  <rect x="705" y="120" width="170" height="30" rx="4" fill="#cc4444" opacity="0.2"/>
  <text x="790" y="140" text-anchor="middle" font-size="8" fill="#1a1822">[Queue: FIFO buffer]</text>

  <rect x="705" y="160" width="170" height="30" rx="4" fill="#cc4444" opacity="0.2"/>
  <text x="790" y="180" text-anchor="middle" font-size="8" fill="#1a1822">[-1 request/sec drain]</text>

  <rect x="705" y="200" width="170" height="30" rx="4" fill="#cc4444" opacity="0.2"/>
  <text x="790" y="220" text-anchor="middle" font-size="8" fill="#cc4444">[Overflow → reject]</text>
  <text x="790" y="235" text-anchor="middle" font-size="8" fill="#cc4444">→ Constant output rate!</text>

  <rect x="705" y="245" width="170" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="790" y="262" text-anchor="middle" font-size="8" fill="#64748b">Constant output rate,</text>
  <text x="790" y="275" text-anchor="middle" font-size="8" fill="#cc4444">no bursts allowed</text>

  <!-- Algorithm selection -->
  <rect x="30" y="300" width="840" height="180" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="328" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Algorithm Selection Guide</text>

  <rect x="50" y="345" width="390" height="30" rx="4" fill="#f0f0f5"/>
  <text x="245" y="365" text-anchor="middle" font-size="9" fill="#1a1822">API Gateway: Sliding Window or Token Bucket (smooth limiting, allows bursts)</text>

  <rect x="460" y="345" width="390" height="30" rx="4" fill="#f0f0f5"/>
  <text x="655" y="365" text-anchor="middle" font-size="9" fill="#1a1822">Login Endpoints: Fixed Window (strict, no bursts allowed)</text>

  <rect x="50" y="385" width="390" height="30" rx="4" fill="#f0f0f5"/>
  <text x="245" y="405" text-anchor="middle" font-size="9" fill="#1a1822">File Uploads: Token Bucket (allows burst, then throttles)</text>

  <rect x="460" y="385" width="390" height="30" rx="4" fill="#f0f0f5"/>
  <text x="655" y="405" text-anchor="middle" font-size="9" fill="#1a1822">Message Processing: Leaky Bucket (constant output rate)</text>

  <rect x="50" y="425" width="390" height="30" rx="4" fill="#f0f0f5"/>
  <text x="245" y="445" text-anchor="middle" font-size="9" fill="#1a1822">Distributed Systems: Sliding Window Log (Redis, accurate across nodes)</text>

  <rect x="460" y="425" width="390" height="30" rx="4" fill="#f0f0f5"/>
  <text x="655" y="445" text-anchor="middle" font-size="9" fill="#1a1822">Cost-Sensitive: Fixed Window Counter (Redis INCR, minimal memory)</text>
</svg>