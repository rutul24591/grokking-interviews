<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>SameSite cookie attribute modes showing Strict, Lax, and None behavior for cross-site requests</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">SameSite Cookie Attribute: Strict, Lax, and None</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">SameSite controls whether cookies are sent with cross-site requests</text>

  <!-- Strict -->
  <rect x="30" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="40" rx="10" fill="#cc4444"/>
  <rect x="30" y="110" width="270" height="10" fill="#cc4444"/>
  <text x="165" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Strict</text>

  <text x="165" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Cookie NEVER sent cross-site</text>

  <rect x="50" y="155" width="230" height="45" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="165" y="173" text-anchor="middle" font-size="9" fill="#1a1822">Link click: ✗ No cookie</text>
  <text x="165" y="190" text-anchor="middle" font-size="9" fill="#64748b">User not authenticated</text>

  <rect x="50" y="210" width="230" height="45" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="165" y="228" text-anchor="middle" font-size="9" fill="#1a1822">Form submit: ✗ No cookie</text>
  <text x="165" y="245" text-anchor="middle" font-size="9" fill="#64748b">POST blocked</text>

  <rect x="50" y="265" width="230" height="45" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="165" y="283" text-anchor="middle" font-size="9" fill="#1a1822">API fetch: ✗ No cookie</text>
  <text x="165" y="300" text-anchor="middle" font-size="9" fill="#64748b">XHR blocked</text>

  <rect x="50" y="320" width="230" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="338" text-anchor="middle" font-size="9" fill="#1a1822">Same-site: ✓ Cookie sent</text>
  <text x="165" y="355" text-anchor="middle" font-size="9" fill="#64748b">Only same-site navigation</text>

  <rect x="50" y="380" width="230" height="65" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="400" text-anchor="middle" font-size="9" fill="#1a1822">Use: Banking, high-security apps</text>
  <text x="165" y="418" text-anchor="middle" font-size="9" fill="#1a1822">Trade-off: Breaks OAuth flows,</text>
  <text x="165" y="435" text-anchor="middle" font-size="9" fill="#1a1822">external links, embedded content</text>

  <!-- Lax -->
  <rect x="320" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="320" y="80" width="270" height="40" rx="10" fill="#f0ad4e"/>
  <rect x="320" y="110" width="270" height="10" fill="#f0ad4e"/>
  <text x="455" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Lax (Default in modern browsers)</text>

  <text x="455" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Cookie sent for top-level GET only</text>

  <rect x="340" y="155" width="230" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="455" y="173" text-anchor="middle" font-size="9" fill="#1a1822">Link click: ✓ Cookie sent</text>
  <text x="455" y="190" text-anchor="middle" font-size="9" fill="#64748b">Top-level GET navigation</text>

  <rect x="340" y="210" width="230" height="45" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="455" y="228" text-anchor="middle" font-size="9" fill="#1a1822">Form POST: ✗ No cookie</text>
  <text x="455" y="245" text-anchor="middle" font-size="9" fill="#64748b">POST blocked</text>

  <rect x="340" y="265" width="230" height="45" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="455" y="283" text-anchor="middle" font-size="9" fill="#1a1822">API fetch: ✗ No cookie</text>
  <text x="455" y="300" text-anchor="middle" font-size="9" fill="#64748b">XHR blocked</text>

  <rect x="340" y="320" width="230" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="455" y="338" text-anchor="middle" font-size="9" fill="#1a1822">Same-site: ✓ Cookie sent</text>
  <text x="455" y="355" text-anchor="middle" font-size="9" fill="#64748b">All same-site requests</text>

  <rect x="340" y="380" width="230" height="65" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="455" y="400" text-anchor="middle" font-size="9" fill="#1a1822">Use: Most web applications</text>
  <text x="455" y="418" text-anchor="middle" font-size="9" fill="#1a1822">Best balance: CSRF protection</text>
  <text x="455" y="435" text-anchor="middle" font-size="9" fill="#1a1822">+ OAuth/link compatibility</text>

  <!-- None -->
  <rect x="610" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="610" y="80" width="270" height="40" rx="10" fill="#4caf50"/>
  <rect x="610" y="110" width="270" height="10" fill="#4caf50"/>
  <text x="745" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">None</text>

  <text x="745" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Cookie ALWAYS sent cross-site</text>

  <rect x="630" y="155" width="230" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="173" text-anchor="middle" font-size="9" fill="#1a1822">Link click: ✓ Cookie sent</text>
  <text x="745" y="190" text-anchor="middle" font-size="9" fill="#64748b">All cross-site requests</text>

  <rect x="630" y="210" width="230" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="228" text-anchor="middle" font-size="9" fill="#1a1822">Form POST: ✓ Cookie sent</text>
  <text x="745" y="245" text-anchor="middle" font-size="9" fill="#64748b">All cross-site requests</text>

  <rect x="630" y="265" width="230" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="283" text-anchor="middle" font-size="9" fill="#1a1822">API fetch: ✓ Cookie sent</text>
  <text x="745" y="300" text-anchor="middle" font-size="9" fill="#64748b">All cross-site requests</text>

  <rect x="630" y="320" width="230" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="338" text-anchor="middle" font-size="9" fill="#1a1822">Same-site: ✓ Cookie sent</text>
  <text x="745" y="355" text-anchor="middle" font-size="9" fill="#64748b">All requests</text>

  <rect x="630" y="380" width="230" height="65" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="745" y="400" text-anchor="middle" font-size="9" fill="#1a1822">Requires Secure attribute</text>
  <text x="745" y="418" text-anchor="middle" font-size="9" fill="#1a1822">Vulnerable to CSRF — use</text>
  <text x="745" y="435" text-anchor="middle" font-size="9" fill="#1a1822">only with CSRF tokens</text>
</svg>