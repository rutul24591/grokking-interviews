<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Automated secrets rotation architecture showing secrets manager generating, distributing, and retiring secrets across applications</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Automated Secrets Rotation Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Secrets manager generates, distributes, and retires secrets automatically without manual intervention</text>

  <!-- Secrets Manager -->
  <rect x="330" y="80" width="240" height="120" rx="10" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Secrets Manager</text>
  <text x="450" y="128" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">Vault / AWS Secrets Manager</text>
  <text x="450" y="148" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">Generates, stores, rotates secrets</text>
  <text x="450" y="168" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">Triggers rotation on schedule or event</text>
  <text x="450" y="188" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">Audits all secret access</text>

  <!-- Applications -->
  <rect x="30" y="80" width="140" height="120" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="100" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">App Server 1</text>
  <text x="100" y="128" text-anchor="middle" font-size="9" fill="#1a1822">Fetches secret at startup</text>
  <text x="100" y="148" text-anchor="middle" font-size="9" fill="#1a1822">Receives rotation notification</text>
  <text x="100" y="168" text-anchor="middle" font-size="9" fill="#64748b">Updates in-memory secret</text>

  <rect x="730" y="80" width="140" height="120" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="800" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">App Server N</text>
  <text x="800" y="128" text-anchor="middle" font-size="9" fill="#1a1822">Fetches secret at startup</text>
  <text x="800" y="148" text-anchor="middle" font-size="9" fill="#1a1822">Receives rotation notification</text>
  <text x="800" y="168" text-anchor="middle" font-size="9" fill="#64748b">Updates in-memory secret</text>

  <!-- Arrows -->
  <line x1="170" y1="140" x2="330" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowSR)"/>
  <line x1="570" y1="140" x2="730" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowSR)"/>

  <!-- Rotation process -->
  <rect x="30" y="220" width="840" height="260" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Automated Rotation Process</text>

  <!-- Step 1 -->
  <rect x="50" y="265" width="180" height="80" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="140" y="288" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">1. Generate New Secret</text>
  <text x="140" y="308" text-anchor="middle" font-size="9" fill="#64748b">Secrets Manager generates</text>
  <text x="140" y="323" text-anchor="middle" font-size="9" fill="#64748b">new secret (CSPRNG)</text>
  <text x="140" y="338" text-anchor="middle" font-size="9" fill="#64748b">Stores alongside old secret</text>

  <!-- Step 2 -->
  <rect x="250" y="265" width="180" height="80" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="340" y="288" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">2. Notify Applications</text>
  <text x="340" y="308" text-anchor="middle" font-size="9" fill="#64748b">Webhook or polling notifies</text>
  <text x="340" y="323" text-anchor="middle" font-size="9" fill="#64748b">applications of new secret</text>
  <text x="340" y="338" text-anchor="middle" font-size="9" fill="#64748b">Applications fetch new secret</text>

  <!-- Step 3 -->
  <rect x="450" y="265" width="180" height="80" rx="8" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="540" y="288" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">3. Overlap Period</text>
  <text x="540" y="308" text-anchor="middle" font-size="9" fill="#64748b">Both old and new secrets</text>
  <text x="540" y="323" text-anchor="middle" font-size="9" fill="#64748b">are valid during overlap</text>
  <text x="540" y="338" text-anchor="middle" font-size="9" fill="#64748b">7-14 days typical overlap</text>

  <!-- Step 4 -->
  <rect x="650" y="265" width="180" height="80" rx="8" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="740" y="288" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">4. Retire Old Secret</text>
  <text x="740" y="308" text-anchor="middle" font-size="9" fill="#64748b">After overlap expires,</text>
  <text x="740" y="323" text-anchor="middle" font-size="9" fill="#64748b">old secret is revoked</text>
  <text x="740" y="338" text-anchor="middle" font-size="9" fill="#64748b">Only new secret is valid</text>

  <!-- Monitoring -->
  <rect x="50" y="365" width="390" height="100" rx="8" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="245" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="#cc4444">Monitoring &amp; Alerting</text>
  <text x="245" y="408" text-anchor="middle" font-size="9" fill="#1a1822">Track secret usage (old vs new), rotation success rate,</text>
  <text x="245" y="423" text-anchor="middle" font-size="9" fill="#1a1822">applications still using old secret after overlap period.</text>
  <text x="245" y="443" text-anchor="middle" font-size="9" fill="#64748b">Alert on: rotation failures, stale secret usage, unauthorized access</text>

  <!-- Compliance -->
  <rect x="460" y="365" width="390" height="100" rx="8" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="655" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">Compliance Requirements</text>
  <text x="655" y="408" text-anchor="middle" font-size="9" fill="#1a1822">PCI-DSS: 90-day rotation for all credentials</text>
  <text x="655" y="423" text-anchor="middle" font-size="9" fill="#1a1822">SOC 2: Regular rotation with audit trail</text>
  <text x="655" y="443" text-anchor="middle" font-size="9" fill="#64748b">HIPAA: Access logging and rotation policies</text>

  <defs>
    <marker id="arrowSR" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>