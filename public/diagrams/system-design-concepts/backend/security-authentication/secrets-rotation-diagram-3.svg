<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Database credential rotation showing automatic password rotation with zero-downtime for applications</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Database Credential Rotation: Zero-Downtime Password Rotation</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Automatically rotate database passwords without disrupting active application connections</text>

  <!-- Before rotation -->
  <rect x="30" y="80" width="410" height="180" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="35" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="105" width="410" height="10" fill="#6d5bd0"/>
  <text x="235" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Before Rotation</text>

  <rect x="50" y="125" width="370" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="145" text-anchor="middle" font-size="10" fill="#1a1822">Database: User app_user with password OldPassword123</text>
  <text x="235" y="163" text-anchor="middle" font-size="9" fill="#64748b">Applications connect with OldPassword123</text>

  <rect x="50" y="185" width="370" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="235" y="205" text-anchor="middle" font-size="9" fill="#1a1822">App Server 1: Connected with OldPassword123</text>
  <text x="235" y="223" text-anchor="middle" font-size="9" fill="#1a1822">App Server 2: Connected with OldPassword123</text>

  <!-- After rotation -->
  <rect x="460" y="80" width="410" height="180" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="35" rx="10" fill="#4caf50"/>
  <rect x="460" y="105" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">After Rotation (Overlap Period)</text>

  <rect x="480" y="125" width="370" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="145" text-anchor="middle" font-size="10" fill="#1a1822">Database: User app_user accepts both OldPassword123</text>
  <text x="665" y="163" text-anchor="middle" font-size="9" fill="#64748b">and NewPassword456 during overlap period</text>

  <rect x="480" y="185" width="370" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="665" y="205" text-anchor="middle" font-size="9" fill="#1a1822">App Server 1: Migrated to NewPassword456</text>
  <text x="665" y="223" text-anchor="middle" font-size="9" fill="#1a1822">App Server 2: Still using OldPassword123 (migrating)</text>

  <!-- Rotation steps -->
  <rect x="30" y="280" width="840" height="200" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Database Password Rotation Steps</text>

  <rect x="50" y="325" width="390" height="35" rx="4" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="245" y="347" text-anchor="middle" font-size="9" fill="#1a1822">1. Generate new password (CSPRNG, 32+ chars)</text>

  <rect x="460" y="325" width="390" height="35" rx="4" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="655" y="347" text-anchor="middle" font-size="9" fill="#1a1822">2. ALTER USER: add new password (keep old active)</text>

  <rect x="50" y="365" width="390" height="35" rx="4" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="245" y="387" text-anchor="middle" font-size="9" fill="#1a1822">3. Notify applications: update connection strings</text>

  <rect x="460" y="365" width="390" height="35" rx="4" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="655" y="387" text-anchor="middle" font-size="9" fill="#1a1822">4. Wait for overlap period (all apps migrated)</text>

  <rect x="50" y="405" width="390" height="35" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="245" y="427" text-anchor="middle" font-size="9" fill="#1a1822">5. ALTER USER: remove old password (only new valid)</text>

  <rect x="460" y="405" width="390" height="35" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="655" y="427" text-anchor="middle" font-size="9" fill="#1a1822">6. Audit: log rotation event, verify no old password usage</text>

  <rect x="50" y="450" width="800" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="468" text-anchor="middle" font-size="9" fill="#64748b">Alternative: Use IAM database authentication (AWS RDS) — no passwords to rotate, tokens expire automatically</text>
</svg>