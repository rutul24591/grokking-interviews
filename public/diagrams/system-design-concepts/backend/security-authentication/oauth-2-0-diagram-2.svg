<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>OAuth 2.0 grant types comparison showing authorization code, client credentials, implicit, and device code flows</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">OAuth 2.0 Grant Types &amp; When to Use Each</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Different flows for different client types and security requirements</text>

  <!-- Row 1: Auth Code + PKCE -->
  <rect x="30" y="80" width="840" height="90" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="80" width="8" height="90" rx="4" fill="#4caf50"/>
  <text x="70" y="108" text-anchor="start" font-size="13" font-weight="600" fill="#4caf50">Authorization Code + PKCE</text>
  <text x="70" y="128" text-anchor="start" font-size="10" fill="#1a1822">Web apps, mobile apps, SPAs. Most secure for public clients.</text>
  <rect x="70" y="138" width="100" height="16" rx="8" fill="#4caf50" opacity="0.15"/>
  <text x="120" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#4caf50">RECOMMENDED</text>
  <text x="350" y="118" text-anchor="start" font-size="10" fill="#1a1822">Server-to-server: No. Public client: Yes. Confidential client: Yes.</text>
  <text x="350" y="138" text-anchor="start" font-size="10" fill="#1a1822">Tokens: access_token + refresh_token (rotated). Scope: delegated access.</text>

  <!-- Row 2: Client Credentials -->
  <rect x="30" y="185" width="840" height="90" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="185" width="8" height="90" rx="4" fill="#6d5bd0"/>
  <text x="70" y="213" text-anchor="start" font-size="13" font-weight="600" fill="#6d5bd0">Client Credentials</text>
  <text x="70" y="233" text-anchor="start" font-size="10" fill="#1a1822">Service-to-service. Machine-to-machine API access.</text>
  <rect x="70" y="243" width="80" height="16" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="110" y="255" text-anchor="middle" font-size="8" font-weight="600" fill="#6d5bd0">M2M ONLY</text>
  <text x="350" y="223" text-anchor="start" font-size="10" fill="#1a1822">Server-to-server: Yes. Public client: No. Confidential client: Yes.</text>
  <text x="350" y="243" text-anchor="start" font-size="10" fill="#1a1822">Tokens: access_token only (no user context). Scope: API permissions.</text>

  <!-- Row 3: Device Code -->
  <rect x="30" y="290" width="840" height="90" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="30" y="290" width="8" height="90" rx="4" fill="#f0ad4e"/>
  <text x="70" y="318" text-anchor="start" font-size="13" font-weight="600" fill="#f0ad4e">Device Authorization Grant</text>
  <text x="70" y="338" text-anchor="start" font-size="10" fill="#1a1822">Smart TVs, IoT devices, CLI tools. No browser required.</text>
  <rect x="70" y="348" width="100" height="16" rx="8" fill="#f0ad4e" opacity="0.15"/>
  <text x="120" y="360" text-anchor="middle" font-size="8" font-weight="600" fill="#f0ad4e">INPUT-CONSTRAINED</text>
  <text x="350" y="328" text-anchor="start" font-size="10" fill="#1a1822">Server-to-server: No. Public client: Yes. Confidential client: Yes.</text>
  <text x="350" y="348" text-anchor="start" font-size="10" fill="#1a1822">Tokens: access_token + refresh_token. User approves on separate device.</text>

  <!-- Row 4: Implicit (DEPRECATED) -->
  <rect x="30" y="395" width="840" height="90" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="395" width="8" height="90" rx="4" fill="#cc4444"/>
  <text x="70" y="423" text-anchor="start" font-size="13" font-weight="600" fill="#cc4444">Implicit Grant (DEPRECATED)</text>
  <text x="70" y="443" text-anchor="start" font-size="10" fill="#1a1822">Legacy SPAs. Tokens in URL fragment. Vulnerable to token leakage.</text>
  <rect x="70" y="453" width="80" height="16" rx="8" fill="#cc4444" opacity="0.15"/>
  <text x="110" y="465" text-anchor="middle" font-size="8" font-weight="600" fill="#cc4444">DO NOT USE</text>
  <text x="350" y="433" text-anchor="start" font-size="10" fill="#1a1822">Server-to-server: No. Public client: No (use PKCE). Confidential: No.</text>
  <text x="350" y="453" text-anchor="start" font-size="10" fill="#1a1822">Replaced by: Authorization Code + PKCE for all public client flows.</text>

  <!-- Bottom summary -->
  <rect x="30" y="475" width="840" height="20" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="489" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Rule: Use Auth Code + PKCE for all user-facing flows. Client Credentials for service-to-service. Never use Implicit.</text>
</svg>