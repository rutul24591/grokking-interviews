<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Encryption at rest, in transit, and end-to-end showing where encryption is applied in the system</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Encryption Coverage: At-Rest, In-Transit, and End-to-End</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Different encryption scopes protect data at different stages of its lifecycle</text>

  <!-- At-Rest -->
  <rect x="30" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="40" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="110" width="270" height="10" fill="#6d5bd0"/>
  <text x="165" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Encryption at Rest</text>

  <rect x="50" y="130" width="230" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Data encrypted when stored</text>
  <text x="165" y="170" text-anchor="middle" font-size="9" fill="#1a1822">On disk, in database, in backups</text>

  <rect x="50" y="190" width="230" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Protects against:</text>
  <text x="165" y="230" text-anchor="middle" font-size="9" fill="#1a1822">Disk theft, unauthorized file access</text>

  <rect x="50" y="250" width="230" height="50" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="165" y="272" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Does NOT protect:</text>
  <text x="165" y="290" text-anchor="middle" font-size="9" fill="#1a1822">Data in memory, network traffic</text>

  <rect x="50" y="310" width="230" height="40" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="328" text-anchor="middle" font-size="9" fill="#1a1822">AES-256, envelope encryption</text>
  <text x="165" y="343" text-anchor="middle" font-size="9" fill="#1a1822">AWS SSE, GCP CMEK, disk encryption</text>

  <rect x="50" y="360" width="230" height="40" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="378" text-anchor="middle" font-size="9" fill="#1a1822">Required by: HIPAA, PCI-DSS, SOC 2</text>
  <text x="165" y="393" text-anchor="middle" font-size="9" fill="#1a1822">Compliance mandate for sensitive data</text>

  <rect x="50" y="410" width="230" height="40" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="428" text-anchor="middle" font-size="9" fill="#1a1822">Key management: KMS, HSM</text>
  <text x="165" y="443" text-anchor="middle" font-size="9" fill="#1a1822">Keys separate from encrypted data</text>

  <!-- In-Transit -->
  <rect x="320" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="320" y="80" width="270" height="40" rx="10" fill="#f0ad4e"/>
  <rect x="320" y="110" width="270" height="10" fill="#f0ad4e"/>
  <text x="455" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Encryption in Transit</text>

  <rect x="340" y="130" width="230" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="455" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Data encrypted during transfer</text>
  <text x="455" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Between client and server, service to service</text>

  <rect x="340" y="190" width="230" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="455" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Protects against:</text>
  <text x="455" y="230" text-anchor="middle" font-size="9" fill="#1a1822">Network sniffing, MITM attacks</text>

  <rect x="340" y="250" width="230" height="50" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="455" y="272" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Does NOT protect:</text>
  <text x="455" y="290" text-anchor="middle" font-size="9" fill="#1a1822">Data at rest, data in memory</text>

  <rect x="340" y="310" width="230" height="40" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="455" y="328" text-anchor="middle" font-size="9" fill="#1a1822">TLS 1.2/1.3, HTTPS, mTLS</text>
  <text x="455" y="343" text-anchor="middle" font-size="9" fill="#1a1822">Certificate validation, cipher suites</text>

  <rect x="340" y="360" width="230" height="40" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="455" y="378" text-anchor="middle" font-size="9" fill="#1a1822">Required by: All compliance standards</text>
  <text x="455" y="393" text-anchor="middle" font-size="9" fill="#1a1822">TLS 1.3 is current best practice</text>

  <rect x="340" y="410" width="230" height="40" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="455" y="428" text-anchor="middle" font-size="9" fill="#1a1822">Certificate management: ACME, Let's Encrypt</text>
  <text x="455" y="443" text-anchor="middle" font-size="9" fill="#1a1822">Auto-renewal, certificate pinning</text>

  <!-- End-to-End -->
  <rect x="610" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="610" y="80" width="270" height="40" rx="10" fill="#4caf50"/>
  <rect x="610" y="110" width="270" height="10" fill="#4caf50"/>
  <text x="745" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">End-to-End Encryption</text>

  <rect x="630" y="130" width="230" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Data encrypted at source, decrypted at destination</text>
  <text x="745" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Server never sees plaintext</text>

  <rect x="630" y="190" width="230" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Protects against:</text>
  <text x="745" y="230" text-anchor="middle" font-size="9" fill="#1a1822">Server compromise, insider threats</text>

  <rect x="630" y="250" width="230" height="50" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="745" y="272" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Does NOT protect:</text>
  <text x="745" y="290" text-anchor="middle" font-size="9" fill="#1a1822">Endpoints (client devices)</text>

  <rect x="630" y="310" width="230" height="40" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="328" text-anchor="middle" font-size="9" fill="#1a1822">Signal Protocol, PGP, client-side encryption</text>
  <text x="745" y="343" text-anchor="middle" font-size="9" fill="#1a1822">Keys managed by end users</text>

  <rect x="630" y="360" width="230" height="40" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="378" text-anchor="middle" font-size="9" fill="#1a1822">Use: Messaging (Signal, WhatsApp),</text>
  <text x="745" y="393" text-anchor="middle" font-size="9" fill="#1a1822">file sharing, healthcare data</text>

  <rect x="630" y="410" width="230" height="40" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="428" text-anchor="middle" font-size="9" fill="#1a1822">Key exchange: Diffie-Hellman, X25519</text>
  <text x="745" y="443" text-anchor="middle" font-size="9" fill="#1a1822">Forward secrecy, deniability</text>

  <!-- Bottom summary -->
  <rect x="30" y="470" width="840" height="20" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="484" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Recommendation: Implement all three. At-rest + in-transit are minimum. E2E for highest security requirements.</text>
</svg>