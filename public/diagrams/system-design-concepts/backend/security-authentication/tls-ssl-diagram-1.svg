<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>TLS handshake flow showing ClientHello, ServerHello, certificate exchange, key exchange, and encrypted communication</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">TLS 1.3 Handshake: Establishing a Secure Connection</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">One round-trip handshake with forward secrecy and authenticated encryption</text>

  <!-- Client and Server -->
  <rect x="50" y="80" width="120" height="50" rx="8" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="110" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">Client</text>

  <rect x="730" y="80" width="120" height="50" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <text x="790" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Server</text>

  <!-- Handshake messages -->
  <!-- Step 1: ClientHello -->
  <line x1="170" y1="160" x2="730" y2="160" stroke="#4caf50" stroke-width="2"/>
  <polygon points="730,157 738,160 730,163" fill="#4caf50"/>
  <rect x="200" y="145" width="500" height="30" rx="6" fill="#ffffff" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">1. ClientHello: Supported versions, cipher suites, key shares (ECDHE), SNI</text>

  <!-- Step 2: ServerHello + Certificate + Finished -->
  <line x1="730" y1="210" x2="170" y2="210" stroke="#6d5bd0" stroke-width="2"/>
  <polygon points="170,207 162,210 170,213" fill="#6d5bd0"/>
  <rect x="200" y="195" width="500" height="30" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">2. ServerHello: Chosen version, cipher suite, key share + Certificate + CertificateVerify + Finished</text>

  <!-- Step 3: Client Finished -->
  <line x1="170" y1="260" x2="730" y2="260" stroke="#4caf50" stroke-width="2"/>
  <polygon points="730,257 738,260 730,263" fill="#4caf50"/>
  <rect x="200" y="245" width="500" height="30" rx="6" fill="#ffffff" stroke="#4caf50" stroke-width="1"/>
  <text x="450" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">3. Client Finished: Verify handshake integrity, derive shared secrets</text>

  <!-- Encrypted communication -->
  <rect x="30" y="300" width="840" height="60" rx="10" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="2"/>
  <text x="450" y="325" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">4. Encrypted Application Data</text>
  <text x="450" y="345" text-anchor="middle" font-size="10" fill="#1a1822">All subsequent communication is encrypted using AES-256-GCM with shared session keys derived from ECDHE key exchange</text>

  <!-- Key points -->
  <rect x="30" y="380" width="840" height="100" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">TLS 1.3 Key Improvements Over TLS 1.2</text>

  <rect x="50" y="420" width="390" height="25" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="245" y="437" text-anchor="middle" font-size="9" fill="#1a1822">One round-trip (1-RTT) vs two round-trips (2-RTT) in TLS 1.2</text>

  <rect x="460" y="420" width="390" height="25" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="655" y="437" text-anchor="middle" font-size="9" fill="#1a1822">Removed insecure cipher suites (RC4, 3DES, CBC, static RSA)</text>

  <rect x="50" y="450" width="390" height="25" rx="4" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="245" y="467" text-anchor="middle" font-size="9" fill="#1a1822">Mandatory forward secrecy (ECDHE for all connections)</text>

  <rect x="460" y="450" width="390" height="25" rx="4" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="655" y="467" text-anchor="middle" font-size="9" fill="#1a1822">0-RTT resumption for repeat connections (with replay risk)</text>

  <rect x="50" y="480" width="800" height="25" rx="4" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="450" y="497" text-anchor="middle" font-size="9" fill="#1a1822">Server certificate is encrypted — unlike TLS 1.2 where it was sent in plaintext</text>
</svg>