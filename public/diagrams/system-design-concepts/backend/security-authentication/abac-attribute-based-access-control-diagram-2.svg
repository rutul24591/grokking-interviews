<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>ABAC policy evaluation showing how OPA evaluates a policy against input attributes to produce an allow/deny decision</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">ABAC Policy Evaluation: Open Policy Agent (OPA) Example</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Rego policies evaluate input attributes against rules to produce allow/deny decisions</text>

  <!-- Input -->
  <rect x="30" y="80" width="270" height="320" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="35" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="105" width="270" height="10" fill="#6d5bd0"/>
  <text x="165" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Input</text>

  <text x="50" y="130" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">{</text>
  <text x="70" y="148" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">"input": {</text>
  <text x="90" y="166" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">"user": {</text>
  <text x="110" y="184" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">"role": "manager",</text>
  <text x="110" y="202" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">"department": "finance"</text>
  <text x="90" y="220" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">},</text>
  <text x="90" y="238" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">"resource": {</text>
  <text x="110" y="256" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">"type": "document",</text>
  <text x="110" y="274" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">"owner": "finance"</text>
  <text x="90" y="292" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">},</text>
  <text x="90" y="310" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">"action": "read",</text>
  <text x="90" y="328" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">"time": "14:30"</text>
  <text x="70" y="346" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">}</text>
  <text x="50" y="364" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">}</text>
  <text x="50" y="388" text-anchor="start" font-size="9" fill="#64748b">Request context with all attributes</text>

  <!-- Policy -->
  <rect x="320" y="80" width="270" height="320" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="320" y="80" width="270" height="35" rx="10" fill="#f0ad4e"/>
  <rect x="320" y="105" width="270" height="10" fill="#f0ad4e"/>
  <text x="455" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Policy (Rego)</text>

  <text x="340" y="130" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">package authz</text>
  <text x="340" y="154" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">default allow = false</text>
  <text x="340" y="184" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">allow {</text>
  <text x="360" y="202" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">input.user.department</text>
  <text x="360" y="220" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">== input.resource.owner</text>
  <text x="360" y="244" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">input.action == "read"</text>
  <text x="360" y="268" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">input.time &gt;= "09:00"</text>
  <text x="360" y="286" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">input.time &lt;= "18:00"</text>
  <text x="340" y="310" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822">}</text>
  <text x="340" y="334" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822"># All conditions must be true</text>
  <text x="340" y="358" text-anchor="start" font-size="9" font-family="monospace" fill="#1a1822"># for allow to be true</text>
  <text x="340" y="388" text-anchor="start" font-size="9" fill="#64748b">Declarative policy: department match,</text>
  <text x="340" y="403" text-anchor="start" font-size="9" fill="#64748b">read action, business hours only</text>

  <!-- Output -->
  <rect x="610" y="80" width="270" height="320" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="610" y="80" width="270" height="35" rx="10" fill="#4caf50"/>
  <rect x="610" y="105" width="270" height="10" fill="#4caf50"/>
  <text x="745" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Output</text>

  <rect x="630" y="130" width="230" height="80" rx="6" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">allow = true</text>
  <text x="745" y="178" text-anchor="middle" font-size="10" fill="#1a1822">All conditions satisfied:</text>
  <text x="745" y="196" text-anchor="middle" font-size="9" fill="#1a1822">✓ department matches</text>
  <text x="745" y="212" text-anchor="middle" font-size="9" fill="#1a1822">✓ action is "read"</text>
  <text x="745" y="228" text-anchor="middle" font-size="9" fill="#1a1822">✓ time within business hours</text>

  <rect x="630" y="230" width="230" height="80" rx="6" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="745" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#cc4444">Example: allow = false</text>
  <text x="745" y="278" text-anchor="middle" font-size="10" fill="#1a1822">If user.department != resource.owner</text>
  <text x="745" y="296" text-anchor="middle" font-size="9" fill="#1a1822">✗ department mismatch</text>
  <text x="745" y="312" text-anchor="middle" font-size="9" fill="#1a1822">→ Request denied</text>

  <rect x="630" y="330" width="230" height="55" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="350" text-anchor="middle" font-size="9" fill="#1a1822">OPA returns decision + explanation</text>
  <text x="745" y="368" text-anchor="middle" font-size="9" fill="#64748b">Used for audit logging and debugging</text>

  <!-- Bottom summary -->
  <rect x="30" y="420" width="840" height="60" rx="10" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="445" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">ABAC Advantages Over RBAC</text>
  <text x="450" y="468" text-anchor="middle" font-size="10" fill="#1a1822">Context-aware decisions (time, location, device), no role explosion, fine-grained control, dynamic policy updates without code changes</text>
</svg>