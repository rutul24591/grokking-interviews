<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" role="img" aria-labelledby="title desc">
  <title id="title">Secrets Rotation Workflow</title>
  <desc id="desc">Comprehensive visualization of automated secrets rotation workflow including blue-green rotation, rollback procedures, and rotation best practices</desc>
  
  <!-- Background -->
  <rect width="950" height="700" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b)">Secrets Rotation Workflow</text>
  <text x="475" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Automated credential rotation for enhanced security</text>
  
  <!-- Why Rotate Section -->
  <rect x="30" y="80" width="890" height="100" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="475" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b45309">Why Rotate Secrets?</text>
  
  <rect x="50" y="120" width="200" height="50" rx="4" fill="white" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="150" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">🔒 Limit exposure window</text>
  
  <rect x="270" y="120" width="200" height="50" rx="4" fill="white" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="370" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">🛡️ Mitigate credential theft</text>
  
  <rect x="490" y="120" width="200" height="50" rx="4" fill="white" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="590" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">✓ Compliance requirement</text>
  
  <rect x="710" y="120" width="200" height="50" rx="4" fill="white" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="810" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">🔄 Remove stale access</text>
  
  <!-- Rotation Strategies -->
  <rect x="30" y="195" width="570" height="280" rx="8" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="315" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #1e40af">Rotation Strategies</text>
  
  <!-- Blue-Green Rotation -->
  <rect x="50" y="240" width="530" height="225" rx="6" fill="white" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="315" y="265" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e40af">Blue-Green Rotation (Zero Downtime)</text>
  
  <!-- Step 1 -->
  <rect x="70" y="280" width="490" height="45" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="315" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 1: Create New Secret Version</text>
  <text x="315" y="318" text-anchor="middle" font-size="9" fill="#bfdbfe">Generate new credential, store alongside old version</text>
  
  <!-- Arrow -->
  <line x1="315" y1="325" x2="315" y2="335" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2 -->
  <rect x="70" y="340" width="490" height="45" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="315" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 2: Gradual Traffic Migration</text>
  <text x="315" y="378" text-anchor="middle" font-size="9" fill="#6ee7b7">Update applications to use new secret, keep old active</text>
  
  <!-- Arrow -->
  <line x1="315" y1="385" x2="315" y2="395" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3 -->
  <rect x="70" y="400" width="490" height="45" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="315" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 3: Deprecate Old Secret</text>
  <text x="315" y="438" text-anchor="middle" font-size="9" fill="#fcd34d">After grace period (24-48h), disable old version</text>
  
  <!-- Step 4 -->
  <rect x="70" y="450" width="490" height="35" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="315" y="472" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Step 4: Delete Old Secret</text>
  <text x="315" y="485" text-anchor="middle" font-size="9" fill="#c4b5fd">Remove from secrets manager after verification</text>
  
  <!-- Rotation Frequency -->
  <rect x="615" y="195" width="305" height="280" rx="8" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="767" y="220" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">Rotation Frequency</text>
  
  <rect x="630" y="240" width="275" height="225" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  
  <text x="767" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #059669">Recommended Intervals:</text>
  
  <rect x="645" y="280" width="245" height="35" rx="3" fill="var(--bg-panel-hover, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">API Keys</text>
  <text x="767" y="315" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Every 30-90 days</text>
  
  <rect x="645" y="320" width="245" height="35" rx="3" fill="var(--bg-panel-hover, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="340" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">Database Passwords</text>
  <text x="767" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Every 30-60 days</text>
  
  <rect x="645" y="360" width="245" height="35" rx="3" fill="var(--bg-panel-hover, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="380" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">TLS Certificates</text>
  <text x="767" y="395" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Every 90 days (Let's Encrypt)</text>
  
  <rect x="645" y="400" width="245" height="35" rx="3" fill="var(--bg-panel-hover, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">Encryption Keys</text>
  <text x="767" y="435" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Every 6-12 months</text>
  
  <rect x="645" y="440" width="245" height="15" rx="3" fill="var(--bg-theme, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="767" y="452" text-anchor="middle" font-size="8" fill="var(--text-theme, #b45309">⚠️ Rotate immediately on suspected compromise</text>
  
  <!-- Rollback Procedures -->
  <rect x="30" y="490" width="890" height="190" rx="8" fill="var(--bg-panel-hover, #fef2f2)" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="475" y="515" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b91c1c">Rollback Procedures</text>
  
  <!-- Rollback Flow -->
  <rect x="50" y="535" width="530" height="135" rx="6" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="315" y="560" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b91c1c">When Rollback is Needed</text>
  
  <text x="70" y="585" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">🔴 New secret causes authentication failures</text>
  <text x="70" y="605" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">🔴 Application errors after rotation</text>
  <text x="70" y="625" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">🔴 Dependency service rejects new credentials</text>
  <text x="70" y="645" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">🔴 Performance degradation detected</text>
  <text x="300" y="585" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">🔴 Configuration mismatch</text>
  <text x="300" y="605" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">🔴 Audit/compliance issues</text>
  <text x="300" y="625" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">🔴 Security incident during rotation</text>
  
  <!-- Rollback Steps -->
  <rect x="595" y="535" width="315" height="135" rx="6" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="752" y="560" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b91c1c">Rollback Steps</text>
  
  <rect x="610" y="575" width="285" height="25" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="752" y="592" text-anchor="middle" font-size="9" font-weight="bold" fill="white">1. Stop rotation immediately</text>
  
  <rect x="610" y="605" width="285" height="25" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="752" y="622" text-anchor="middle" font-size="9" font-weight="bold" fill="white">2. Revert to previous secret version</text>
  
  <rect x="610" y="635" width="285" height="25" rx="3" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="752" y="652" text-anchor="middle" font-size="9" font-weight="bold" fill="white">3. Verify service restoration</text>
  
  <!-- Best Practices -->
  <rect x="30" y="540" width="890" height="140" rx="8" fill="var(--bg-panel-soft, #f0fdf4)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="475" y="565" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">Rotation Best Practices</text>
  
  <rect x="50" y="585" width="260" height="85" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="180" y="605" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #059669">Automation</text>
  <text x="180" y="625" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Use AWS Secrets Manager</text>
  <text x="180" y="640" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Azure Key Vault rotation</text>
  <text x="180" y="655" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ HashiCorp Vault</text>
  <text x="180" y="670" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Custom Lambda functions</text>
  
  <rect x="325" y="585" width="260" height="85" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="455" y="605" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #059669">Monitoring</text>
  <text x="455" y="625" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Alert on rotation failures</text>
  <text x="455" y="640" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Track secret age</text>
  <text x="455" y="655" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Log all access attempts</text>
  <text x="455" y="670" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Monitor auth error rates</text>
  
  <rect x="600" y="585" width="260" height="85" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="730" y="605" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #059669">Testing</text>
  <text x="730" y="625" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Test in staging first</text>
  <text x="730" y="640" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Validate rollback procedure</text>
  <text x="730" y="655" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Document runbooks</text>
  <text x="730" y="670" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Practice disaster recovery</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
