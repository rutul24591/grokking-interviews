<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>ABAC use cases showing fine-grained access control for cloud, healthcare, and multi-tenant applications</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">ABAC Use Cases: Fine-Grained, Context-Aware Access Control</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">ABAC excels where RBAC is too rigid — dynamic, context-aware access decisions</text>

  <!-- Cloud Infrastructure -->
  <rect x="30" y="80" width="410" height="190" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="35" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="105" width="410" height="10" fill="#6d5bd0"/>
  <text x="235" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Cloud Infrastructure Access</text>

  <rect x="50" y="125" width="370" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="145" text-anchor="middle" font-size="10" fill="#1a1822">Policy: Allow engineers to access production only from corporate network</text>
  <text x="235" y="163" text-anchor="middle" font-size="9" fill="#64748b">user.role == "engineer" AND network == "corporate" AND mfa == true</text>

  <rect x="50" y="185" width="370" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="203" text-anchor="middle" font-size="10" fill="#1a1822">Policy: Deny access to production from personal devices</text>
  <text x="235" y="221" text-anchor="middle" font-size="9" fill="#64748b">device.managed == false → deny, regardless of user role</text>

  <rect x="50" y="245" width="370" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="235" y="262" text-anchor="middle" font-size="9" fill="#64748b">RBAC cannot express device/network context; ABAC can</text>

  <!-- Healthcare -->
  <rect x="460" y="80" width="410" height="190" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="35" rx="10" fill="#4caf50"/>
  <rect x="460" y="105" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Healthcare (HIPAA Compliance)</text>

  <rect x="480" y="125" width="370" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="145" text-anchor="middle" font-size="10" fill="#1a1822">Policy: Doctors can access patient records only for their assigned patients</text>
  <text x="665" y="163" text-anchor="middle" font-size="9" fill="#64748b">user.role == "doctor" AND patient.assigned_doctor == user.id</text>

  <rect x="480" y="185" width="370" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="203" text-anchor="middle" font-size="10" fill="#1a1822">Policy: Emergency access during off-hours requires additional approval</text>
  <text x="665" y="221" text-anchor="middle" font-size="9" fill="#64748b">time outside 08:00-20:00 AND emergency == true → require approval</text>

  <rect x="480" y="245" width="370" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="665" y="262" text-anchor="middle" font-size="9" fill="#64748b">RBAC cannot express patient-doctor relationships; ABAC can</text>

  <!-- Multi-tenant SaaS -->
  <rect x="30" y="290" width="410" height="190" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="30" y="290" width="410" height="35" rx="10" fill="#f0ad4e"/>
  <rect x="30" y="315" width="410" height="10" fill="#f0ad4e"/>
  <text x="235" y="313" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Multi-Tenant SaaS</text>

  <rect x="50" y="335" width="370" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="235" y="355" text-anchor="middle" font-size="10" fill="#1a1822">Policy: Users can only access resources within their tenant</text>
  <text x="235" y="373" text-anchor="middle" font-size="9" fill="#64748b">user.tenant_id == resource.tenant_id → allow, otherwise deny</text>

  <rect x="50" y="395" width="370" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="235" y="415" text-anchor="middle" font-size="10" fill="#1a1822">Policy: Tenant admins can manage users only within their tenant</text>
  <text x="235" y="433" text-anchor="middle" font-size="9" fill="#64748b">user.role == "tenant_admin" AND user.tenant_id == target.tenant_id</text>

  <rect x="50" y="455" width="370" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="235" y="472" text-anchor="middle" font-size="9" fill="#64748b">RBAC requires per-tenant roles; ABAC uses tenant_id attribute</text>

  <!-- Financial Services -->
  <rect x="460" y="290" width="410" height="190" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="460" y="290" width="410" height="35" rx="10" fill="#cc4444"/>
  <rect x="460" y="315" width="410" height="10" fill="#cc4444"/>
  <text x="665" y="313" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Financial Services (SOX Compliance)</text>

  <rect x="480" y="335" width="370" height="50" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="665" y="355" text-anchor="middle" font-size="10" fill="#1a1822">Policy: Transactions over $10K require dual approval</text>
  <text x="665" y="373" text-anchor="middle" font-size="9" fill="#64748b">transaction.amount > 10000 AND approvers.count >= 2 → allow</text>

  <rect x="480" y="395" width="370" height="50" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="665" y="415" text-anchor="middle" font-size="10" fill="#1a1822">Policy: Creator cannot approve their own transactions (SoD)</text>
  <text x="665" y="433" text-anchor="middle" font-size="9" fill="#64748b">user.id != transaction.creator_id → allow approval</text>

  <rect x="480" y="455" width="370" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="665" y="472" text-anchor="middle" font-size="9" fill="#64748b">RBAC cannot express amount-based rules; ABAC can</text>
</svg>