<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">JWT vs SAML Token Comparison</title>
  <desc id="desc">Comparison of JWT and SAML token formats showing structure, size, use cases, and trade-offs</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">JWT vs SAML: Token Format Comparison</text>
  
  <!-- JWT Column -->
  <rect x="50" y="70" width="340" height="380" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="220" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="white">JWT</text>
  <text x="220" y="125" text-anchor="middle" font-size="12" fill="white">JSON Web Token</text>
  
  <!-- JWT Structure -->
  <rect x="70" y="145" width="300" height="80" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="220" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Token Structure</text>
  <text x="220" y="195" text-anchor="middle" font-size="10" fill="var(--text-theme, #3b82f6" font-family="monospace">eyJhbGciOiJSUzI1NiJ9</text>
  <text x="220" y="212" text-anchor="middle" font-size="10" fill="var(--text-theme, #8b5cf6" font-family="monospace">eyJzdWIiOiIxMjM0In0</text>
  <text x="220" y="229" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981" font-family="monospace">Signature</text>
  
  <!-- JWT Characteristics -->
  <rect x="70" y="240" width="300" height="100" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="220" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Characteristics</text>
  <text x="220" y="285" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Compact: URL-safe, small</text>
  <text x="220" y="305" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Format: JSON-based</text>
  <text x="220" y="325" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Signing: HMAC, RSA, ECDSA</text>
  <text x="220" y="345" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Encryption: JWE (optional)</text>
  
  <!-- JWT Use Cases -->
  <rect x="70" y="355" width="300" height="80" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="220" y="377" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Best For</text>
  <text x="220" y="397" text-anchor="start" font-size="10" fill="white">• Mobile/Web APIs</text>
  <text x="220" y="415" text-anchor="start" font-size="10" fill="white">• Microservices auth</text>
  <text x="220" y="433" text-anchor="start" font-size="10" fill="white">• OAuth 2.0 / OIDC</text>
  
  <!-- SAML Column -->
  <rect x="410" y="70" width="340" height="380" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="2"/>
  <text x="580" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="white">SAML</text>
  <text x="580" y="125" text-anchor="middle" font-size="12" fill="white">Security Assertion Markup Language</text>
  
  <!-- SAML Structure -->
  <rect x="430" y="145" width="300" height="120" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="580" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Token Structure (XML)</text>
  <text x="580" y="190" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b" font-family="monospace">&amp;lt;Assertion ID="_123"&amp;gt;</text>
  <text x="580" y="205" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b" font-family="monospace">  &amp;lt;Subject&amp;gt;user@corp.com&amp;lt;/Subject&amp;gt;</text>
  <text x="580" y="220" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b" font-family="monospace">  &amp;lt;Conditions&amp;gt;...&amp;lt;/Conditions&amp;gt;</text>
  <text x="580" y="235" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b" font-family="monospace">  &amp;lt;AttributeStatement&amp;gt;...&amp;lt;/Attribute&amp;gt;</text>
  <text x="580" y="250" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b" font-family="monospace">  &amp;lt;Signature&amp;gt;...&amp;lt;/Signature&amp;gt;</text>
  <text x="580" y="265" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b" font-family="monospace">&amp;lt;/Assertion&amp;gt;</text>
  
  <!-- SAML Characteristics -->
  <rect x="430" y="280" width="300" height="85" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="580" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Characteristics</text>
  <text x="580" y="325" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Verbose: XML-based, large</text>
  <text x="580" y="345" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Format: XML schema</text>
  <text x="580" y="365" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b">• Signing: XML-DSig</text>
  
  <!-- SAML Use Cases -->
  <rect x="430" y="380" width="300" height="70" rx="6" fill="var(--bg-theme, #dc2626)" stroke="var(--border-theme, #991b1b)" stroke-width="1"/>
  <text x="580" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Best For</text>
  <text x="580" y="422" text-anchor="start" font-size="10" fill="white">• Enterprise SSO</text>
  <text x="580" y="440" text-anchor="start" font-size="10" fill="white">• SAML 2.0 IdP/SP flows</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="460" width="700" height="35" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="400" y="482" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">Key Difference: JWT is compact and API-friendly; SAML is verbose and enterprise SSO-focused</text>
</svg>
