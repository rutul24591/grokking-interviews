<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>CORS misconfigurations showing common vulnerabilities and secure configurations</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">CORS Misconfigurations &amp; Secure Configuration</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Common CORS mistakes that expose data vs properly configured CORS policies</text>

  <!-- Insecure configurations -->
  <rect x="30" y="80" width="410" height="380" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="35" rx="10" fill="#cc4444"/>
  <rect x="30" y="105" width="410" height="10" fill="#cc4444"/>
  <text x="235" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Insecure CORS Configurations</text>

  <rect x="50" y="125" width="370" height="55" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="235" y="147" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Access-Control-Allow-Origin: *</text>
  <text x="235" y="167" text-anchor="middle" font-size="9" fill="#1a1822">Allows any origin. Dangerous with credentials.</text>

  <rect x="50" y="190" width="370" height="55" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="235" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Reflecting Origin header blindly</text>
  <text x="235" y="232" text-anchor="middle" font-size="9" fill="#1a1822">echo Origin → Allow-Origin. Enables any site to access data.</text>

  <rect x="50" y="255" width="370" height="55" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="235" y="277" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Allow-Origin: null</text>
  <text x="235" y="297" text-anchor="middle" font-size="9" fill="#1a1822">sandboxed iframes can read responses. Bypasses origin check.</text>

  <rect x="50" y="320" width="370" height="55" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="235" y="342" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Wildcard + Allow-Credentials: true</text>
  <text x="235" y="362" text-anchor="middle" font-size="9" fill="#1a1822">Browser rejects this combo, but misconfigured servers expose data.</text>

  <rect x="50" y="385" width="370" height="55" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="235" y="407" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Subdomain wildcard: *.example.com</text>
  <text x="235" y="427" text-anchor="middle" font-size="9" fill="#1a1822">Any subdomain (including attacker-controlled) can access data.</text>

  <!-- Secure configurations -->
  <rect x="460" y="80" width="410" height="380" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="35" rx="10" fill="#4caf50"/>
  <rect x="460" y="105" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Secure CORS Configuration</text>

  <rect x="480" y="125" width="370" height="55" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="147" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Explicit origin whitelist</text>
  <text x="665" y="167" text-anchor="middle" font-size="9" fill="#1a1822">Only trusted origins in Allow-Origin header</text>

  <rect x="480" y="190" width="370" height="55" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Minimal Allow-Methods</text>
  <text x="665" y="232" text-anchor="middle" font-size="9" fill="#1a1822">Only methods the API actually supports</text>

  <rect x="480" y="255" width="370" height="55" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="277" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Minimal Allow-Headers</text>
  <text x="665" y="297" text-anchor="middle" font-size="9" fill="#1a1822">Only headers the API actually needs</text>

  <rect x="480" y="320" width="370" height="55" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="342" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">No credentials unless required</text>
  <text x="665" y="362" text-anchor="middle" font-size="9" fill="#1a1822">Omit Allow-Credentials if not needed</text>

  <rect x="480" y="385" width="370" height="55" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="407" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Set Max-Age for preflight cache</text>
  <text x="665" y="427" text-anchor="middle" font-size="9" fill="#1a1822">Reduces OPTIONS requests (e.g., 86400 = 24h)</text>

  <!-- Bottom note -->
  <rect x="30" y="470" width="840" height="20" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="450" y="484" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">CORS is a browser security feature — misconfigurations expose data to attacker-controlled origins.</text>
</svg>