<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>API security threat model showing common attack vectors and their defense mechanisms</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">API Security Threat Model &amp; Defenses</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Common API attack vectors and the security controls that defend against each</text>

  <!-- Broken Authentication -->
  <rect x="30" y="80" width="270" height="120" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="165" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">Broken Authentication</text>
  <text x="165" y="123" text-anchor="middle" font-size="9" fill="#1a1822">Weak tokens, credential stuffing</text>
  <text x="165" y="138" text-anchor="middle" font-size="9" fill="#1a1822">Missing MFA, password reset flaws</text>
  <rect x="50" y="150" width="230" height="40" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="168" text-anchor="middle" font-size="9" fill="#4caf50">Defense: Strong auth (OAuth 2.0 + MFA),</text>
  <text x="165" y="182" text-anchor="middle" font-size="9" fill="#4caf50">rate limiting, secure password policies</text>

  <!-- Broken Object Level Auth -->
  <rect x="320" y="80" width="270" height="120" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="455" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">Broken Object Level Auth (BOLA)</text>
  <text x="455" y="123" text-anchor="middle" font-size="9" fill="#1a1822">Accessing other users' resources</text>
  <text x="455" y="138" text-anchor="middle" font-size="9" fill="#1a1822">IDOR, horizontal privilege escalation</text>
  <rect x="340" y="150" width="230" height="40" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="455" y="168" text-anchor="middle" font-size="9" fill="#4caf50">Defense: Authorization checks per request,</text>
  <text x="455" y="182" text-anchor="middle" font-size="9" fill="#4caf50">UUIDs instead of sequential IDs</text>

  <!-- Excessive Data Exposure -->
  <rect x="610" y="80" width="270" height="120" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="745" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">Excessive Data Exposure</text>
  <text x="745" y="123" text-anchor="middle" font-size="9" fill="#1a1822">Returning more data than needed</text>
  <text x="745" y="138" text-anchor="middle" font-size="9" fill="#1a1822">PII leakage, over-fetching</text>
  <rect x="630" y="150" width="230" height="40" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="168" text-anchor="middle" font-size="9" fill="#4caf50">Defense: Response filtering, field-level</text>
  <text x="745" y="182" text-anchor="middle" font-size="9" fill="#4caf50">permissions, data minimization</text>

  <!-- Injection -->
  <rect x="30" y="220" width="270" height="120" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="165" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Injection Attacks</text>
  <text x="165" y="263" text-anchor="middle" font-size="9" fill="#1a1822">SQLi, XSS, command injection</text>
  <text x="165" y="278" text-anchor="middle" font-size="9" fill="#1a1822">LDAP injection, NoSQL injection</text>
  <rect x="50" y="290" width="230" height="40" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="308" text-anchor="middle" font-size="9" fill="#4caf50">Defense: Parameterized queries, output</text>
  <text x="165" y="322" text-anchor="middle" font-size="9" fill="#4caf50">encoding, input validation, WAF</text>

  <!-- Security Misconfiguration -->
  <rect x="320" y="220" width="270" height="120" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="455" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Security Misconfiguration</text>
  <text x="455" y="263" text-anchor="middle" font-size="9" fill="#1a1822">Verbose errors, default credentials</text>
  <text x="455" y="278" text-anchor="middle" font-size="9" fill="#1a1822">Missing security headers, debug mode</text>
  <rect x="340" y="290" width="230" height="40" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="455" y="308" text-anchor="middle" font-size="9" fill="#4caf50">Defense: Hardened configs, automated</text>
  <text x="455" y="322" text-anchor="middle" font-size="9" fill="#4caf50">scanning, security headers, logging</text>

  <!-- Lack of Monitoring -->
  <rect x="610" y="220" width="270" height="120" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="745" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Lack of Monitoring &amp; Logging</text>
  <text x="745" y="263" text-anchor="middle" font-size="9" fill="#1a1822">Undetected breaches, slow response</text>
  <text x="745" y="278" text-anchor="middle" font-size="9" fill="#1a1822">No audit trail, blind spots</text>
  <rect x="630" y="290" width="230" height="40" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="308" text-anchor="middle" font-size="9" fill="#4caf50">Defense: Centralized logging, SIEM,</text>
  <text x="745" y="322" text-anchor="middle" font-size="9" fill="#4caf50">alerting, audit trails, incident response</text>

  <!-- Bottom summary -->
  <rect x="30" y="360" width="840" height="120" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="388" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">OWASP API Security Top 10 (2023)</text>

  <rect x="50" y="405" width="250" height="25" rx="4" fill="#f0f0f5"/>
  <text x="175" y="422" text-anchor="middle" font-size="9" fill="#1a1822">1. Broken Object Level Authorization</text>

  <rect x="320" y="405" width="250" height="25" rx="4" fill="#f0f0f5"/>
  <text x="445" y="422" text-anchor="middle" font-size="9" fill="#1a1822">2. Broken Authentication</text>

  <rect x="590" y="405" width="260" height="25" rx="4" fill="#f0f0f5"/>
  <text x="720" y="422" text-anchor="middle" font-size="9" fill="#1a1822">3. Broken Object Property Level Auth</text>

  <rect x="50" y="440" width="250" height="25" rx="4" fill="#f0f0f5"/>
  <text x="175" y="457" text-anchor="middle" font-size="9" fill="#1a1822">4. Unrestricted Resource Consumption</text>

  <rect x="320" y="440" width="250" height="25" rx="4" fill="#f0f0f5"/>
  <text x="445" y="457" text-anchor="middle" font-size="9" fill="#1a1822">5. Broken Function Level Auth</text>

  <rect x="590" y="440" width="260" height="25" rx="4" fill="#f0f0f5"/>
  <text x="720" y="457" text-anchor="middle" font-size="9" fill="#1a1822">6-10: See OWASP API Security Top 10</text>
</svg>