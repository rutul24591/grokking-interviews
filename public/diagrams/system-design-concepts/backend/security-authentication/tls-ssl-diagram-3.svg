<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>TLS deployment best practices showing cipher suite selection, HSTS, certificate pinning, and mTLS</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">TLS Deployment Best Practices</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Configuration choices that determine the security of your TLS deployment</text>

  <!-- Cipher suites -->
  <rect x="30" y="80" width="410" height="190" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="35" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="105" width="410" height="10" fill="#6d5bd0"/>
  <text x="235" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Cipher Suite Selection</text>

  <rect x="50" y="125" width="370" height="30" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="235" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">RECOMMENDED: TLS_AES_256_GCM_SHA384</text>

  <rect x="50" y="160" width="370" height="30" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="235" y="180" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">RECOMMENDED: TLS_CHACHA20_POLY1305_SHA256</text>

  <rect x="50" y="195" width="370" height="30" rx="4" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="235" y="215" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">ACCEPTABLE: TLS_AES_128_GCM_SHA256</text>

  <rect x="50" y="230" width="370" height="30" rx="4" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="235" y="250" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">DISABLE: RC4, 3DES, CBC, MD5, static RSA</text>

  <!-- HSTS & Cert Management -->
  <rect x="460" y="80" width="410" height="190" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="35" rx="10" fill="#4caf50"/>
  <rect x="460" y="105" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Certificate Management &amp; HSTS</text>

  <rect x="480" y="125" width="370" height="30" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">HSTS: Strict-Transport-Security header (max-age=31536000)</text>

  <rect x="480" y="160" width="370" height="30" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="180" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Auto-renewal: ACME protocol, Let's Encrypt, cert-manager</text>

  <rect x="480" y="195" width="370" height="30" rx="4" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="215" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">OCSP Stapling: Server provides revocation status during handshake</text>

  <rect x="480" y="230" width="370" height="30" rx="4" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="250" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Certificate Transparency: Public log of all issued certificates</text>

  <!-- mTLS -->
  <rect x="30" y="290" width="410" height="190" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="30" y="290" width="410" height="35" rx="10" fill="#f0ad4e"/>
  <rect x="30" y="315" width="410" height="10" fill="#f0ad4e"/>
  <text x="235" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Mutual TLS (mTLS)</text>

  <rect x="50" y="335" width="370" height="30" rx="4" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="235" y="355" text-anchor="middle" font-size="9" fill="#1a1822">Both client and server present certificates</text>

  <rect x="50" y="370" width="370" height="30" rx="4" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="235" y="390" text-anchor="middle" font-size="9" fill="#1a1822">Use: Service-to-service authentication in microservices</text>

  <rect x="50" y="405" width="370" height="30" rx="4" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="235" y="425" text-anchor="middle" font-size="9" fill="#1a1822">Istio, Linkerd, Envoy provide automatic mTLS</text>

  <rect x="50" y="440" width="370" height="30" rx="4" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="235" y="460" text-anchor="middle" font-size="9" fill="#1a1822">Complexity: Certificate lifecycle, rotation, revocation</text>

  <!-- Security Headers -->
  <rect x="460" y="290" width="410" height="190" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="460" y="290" width="410" height="35" rx="10" fill="#cc4444"/>
  <rect x="460" y="315" width="410" height="10" fill="#cc4444"/>
  <text x="665" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Common TLS Misconfigurations</text>

  <rect x="480" y="335" width="370" height="30" rx="4" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="665" y="355" text-anchor="middle" font-size="9" fill="#1a1822">Allowing TLS 1.0/1.1 (deprecated, vulnerable)</text>

  <rect x="480" y="370" width="370" height="30" rx="4" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="665" y="390" text-anchor="middle" font-size="9" fill="#1a1822">Weak cipher suites (RC4, 3DES, export ciphers)</text>

  <rect x="480" y="405" width="370" height="30" rx="4" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="665" y="425" text-anchor="middle" font-size="9" fill="#1a1822">Expired or self-signed certificates in production</text>

  <rect x="480" y="440" width="370" height="30" rx="4" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="665" y="460" text-anchor="middle" font-size="9" fill="#1a1822">Missing HSTS (allows SSL stripping attacks)</text>

  <!-- Bottom -->
  <rect x="30" y="485" width="840" height="15" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="497" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Test: SSL Labs (ssllabs.com), testssl.sh, Mozilla SSL Configuration Generator</text>
</svg>