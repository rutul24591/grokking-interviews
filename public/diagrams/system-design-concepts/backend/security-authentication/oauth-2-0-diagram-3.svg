<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>OAuth 2.0 token lifecycle showing issuance, use, refresh, and revocation of access and refresh tokens</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">OAuth 2.0 Token Lifecycle &amp; Security Controls</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Token issuance, usage, refresh rotation, and revocation patterns</text>

  <!-- Token issuance -->
  <rect x="30" y="80" width="200" height="100" rx="10" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="2"/>
  <text x="130" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Token Issuance</text>
  <text x="130" y="130" text-anchor="middle" font-size="10" fill="#1a1822">After successful AuthN</text>
  <text x="130" y="148" text-anchor="middle" font-size="9" fill="#1a1822">Access token: 5-15 min</text>
  <text x="130" y="165" text-anchor="middle" font-size="9" fill="#1a1822">Refresh token: 7-30 days</text>

  <!-- Arrow -->
  <line x1="230" y1="130" x2="310" y2="130" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowOAUTH)"/>

  <!-- Token usage -->
  <rect x="310" y="80" width="200" height="100" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="410" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#4caf50">Token Usage</text>
  <text x="410" y="130" text-anchor="middle" font-size="10" fill="#1a1822">Authorization: Bearer header</text>
  <text x="410" y="148" text-anchor="middle" font-size="9" fill="#1a1822">Resource server validates</text>
  <text x="410" y="165" text-anchor="middle" font-size="9" fill="#1a1822">signature + expiry + scope</text>

  <!-- Arrow -->
  <line x1="510" y1="130" x2="590" y2="130" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowOAUTH)"/>

  <!-- Refresh -->
  <rect x="590" y="80" width="200" height="100" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="690" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#f0ad4e">Token Refresh</text>
  <text x="690" y="130" text-anchor="middle" font-size="10" fill="#1a1822">Old refresh token consumed</text>
  <text x="690" y="148" text-anchor="middle" font-size="9" fill="#1a1822">New access + refresh issued</text>
  <text x="690" y="165" text-anchor="middle" font-size="9" fill="#1a1822">Refresh token rotation</text>

  <!-- Revocation box -->
  <rect x="30" y="210" width="840" height="120" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="450" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">Token Revocation Triggers</text>

  <rect x="50" y="255" width="240" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="170" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">User Logout</text>
  <text x="170" y="298" text-anchor="middle" font-size="9" fill="#1a1822">Revoke refresh token. Access token expires naturally.</text>

  <rect x="310" y="255" width="240" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="430" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Compromise Detected</text>
  <text x="430" y="298" text-anchor="middle" font-size="9" fill="#1a1822">Revoke token family. Force re-authentication.</text>

  <rect x="570" y="255" width="280" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="710" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Refresh Token Reuse Detection</text>
  <text x="710" y="298" text-anchor="middle" font-size="9" fill="#1a1822">Two uses of same refresh token = theft. Revoke entire family.</text>

  <!-- Security controls -->
  <rect x="30" y="360" width="410" height="120" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="235" y="388" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Token Security Controls</text>

  <text x="50" y="410" text-anchor="start" font-size="10" fill="#1a1822">• PKCE for all public clients</text>
  <text x="50" y="428" text-anchor="start" font-size="10" fill="#1a1822">• Short access token lifetime</text>
  <text x="50" y="446" text-anchor="start" font-size="10" fill="#1a1822">• Refresh token rotation</text>
  <text x="50" y="464" text-anchor="start" font-size="10" fill="#1a1822">• Token binding to client</text>

  <rect x="460" y="360" width="410" height="120" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="665" y="388" text-anchor="middle" font-size="13" font-weight="700" fill="#f0ad4e">Common Attack Vectors</text>

  <text x="480" y="410" text-anchor="start" font-size="10" fill="#1a1822">• Authorization code interception</text>
  <text x="480" y="428" text-anchor="start" font-size="10" fill="#1a1822">• Refresh token theft (XSS, malware)</text>
  <text x="480" y="446" text-anchor="start" font-size="10" fill="#1a1822">• Token replay (no binding)</text>
  <text x="480" y="464" text-anchor="start" font-size="10" fill="#1a1822">• Misconfigured redirect URIs</text>

  <defs>
    <marker id="arrowOAUTH" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>