<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>API security layers showing authentication, authorization, rate limiting, input validation, and encryption</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">API Security: Defense-in-Depth Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Multiple security layers protect APIs from authentication bypass to data exfiltration</text>

  <!-- Layer 1: Authentication -->
  <rect x="30" y="80" width="840" height="60" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="180" height="60" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="120" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Layer 1: Authentication</text>
  <text x="120" y="125" text-anchor="middle" font-size="9" fill="#1a1822">Who are you?</text>
  <text x="300" y="105" text-anchor="middle" font-size="10" fill="#1a1822">JWT, OAuth 2.0, API Keys, mTLS</text>
  <text x="300" y="125" text-anchor="middle" font-size="9" fill="#64748b">Validates identity before granting access</text>

  <!-- Layer 2: Authorization -->
  <rect x="30" y="155" width="840" height="60" rx="8" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="155" width="180" height="60" rx="8" fill="#4caf50" opacity="0.15"/>
  <text x="120" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">Layer 2: Authorization</text>
  <text x="120" y="200" text-anchor="middle" font-size="9" fill="#1a1822">What can you do?</text>
  <text x="300" y="180" text-anchor="middle" font-size="10" fill="#1a1822">RBAC, ABAC, Scopes, Permissions</text>
  <text x="300" y="200" text-anchor="middle" font-size="9" fill="#64748b">Validates permissions for each request</text>

  <!-- Layer 3: Input Validation -->
  <rect x="30" y="230" width="840" height="60" rx="8" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="30" y="230" width="180" height="60" rx="8" fill="#f0ad4e" opacity="0.15"/>
  <text x="120" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#f0ad4e">Layer 3: Input Validation</text>
  <text x="120" y="275" text-anchor="middle" font-size="9" fill="#1a1822">Is the input safe?</text>
  <text x="300" y="255" text-anchor="middle" font-size="10" fill="#1a1822">Schema validation, sanitization, SQLi/XSS prevention</text>
  <text x="300" y="275" text-anchor="middle" font-size="9" fill="#64748b">Rejects malicious input before processing</text>

  <!-- Layer 4: Rate Limiting -->
  <rect x="30" y="305" width="840" height="60" rx="8" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="305" width="180" height="60" rx="8" fill="#cc4444" opacity="0.15"/>
  <text x="120" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#cc4444">Layer 4: Rate Limiting</text>
  <text x="120" y="350" text-anchor="middle" font-size="9" fill="#1a1822">How fast can you go?</text>
  <text x="300" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Per-user, per-IP, per-endpoint limits</text>
  <text x="300" y="350" text-anchor="middle" font-size="9" fill="#64748b">Prevents abuse and protects infrastructure</text>

  <!-- Layer 5: Encryption -->
  <rect x="30" y="380" width="840" height="60" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="380" width="180" height="60" rx="8" fill="#6d5bd0" opacity="0.15"/>
  <text x="120" y="405" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Layer 5: Encryption</text>
  <text x="120" y="425" text-anchor="middle" font-size="9" fill="#1a1822">Is data protected?</text>
  <text x="300" y="405" text-anchor="middle" font-size="10" fill="#1a1822">TLS 1.3, encrypted responses, data at rest</text>
  <text x="300" y="425" text-anchor="middle" font-size="9" fill="#64748b">Protects data in transit and at rest</text>

  <!-- Bottom summary -->
  <rect x="30" y="455" width="840" height="30" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="475" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Each layer is independent — if one layer fails, others still provide protection. Defense-in-depth.</text>
</svg>