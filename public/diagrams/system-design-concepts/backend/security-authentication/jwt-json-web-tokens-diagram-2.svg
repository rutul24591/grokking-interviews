<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>JWT vs Session Tokens comparison showing stateless vs stateful authentication approaches</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">JWT vs Session Tokens: Stateless vs Stateful Authentication</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Different approaches to maintaining authentication state across requests</text>

  <!-- JWT Column -->
  <rect x="30" y="80" width="410" height="380" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="40" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="110" width="410" height="10" fill="#6d5bd0"/>
  <text x="235" y="107" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">JWT (Stateless)</text>

  <!-- JWT Flow -->
  <rect x="50" y="135" width="370" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">1. User authenticates → Auth server issues JWT</text>
  <text x="235" y="173" text-anchor="middle" font-size="9" fill="#1a1822">JWT contains claims + signature. Self-contained.</text>

  <rect x="50" y="200" width="370" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">2. Client stores JWT (cookie / secure storage)</text>
  <text x="235" y="238" text-anchor="middle" font-size="9" fill="#1a1822">Sends JWT with each request (Authorization header)</text>

  <rect x="50" y="265" width="370" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">3. Resource server validates signature locally</text>
  <text x="235" y="303" text-anchor="middle" font-size="9" fill="#1a1822">No database call. Stateless validation.</text>

  <rect x="50" y="330" width="370" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="235" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">4. Serves request if valid, rejects if expired/invalid</text>
  <text x="235" y="368" text-anchor="middle" font-size="9" fill="#1a1822">Claims extracted from JWT payload</text>

  <!-- Pros/Cons -->
  <rect x="50" y="395" width="170" height="55" rx="6" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="135" y="415" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Pros:</text>
  <text x="135" y="432" text-anchor="middle" font-size="9" fill="#1a1822">Scalable, no session store</text>

  <rect x="230" y="395" width="190" height="55" rx="6" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="325" y="415" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Cons:</text>
  <text x="325" y="432" text-anchor="middle" font-size="9" fill="#1a1822">Cannot revoke until expiry, large payload</text>

  <!-- Session Token Column -->
  <rect x="460" y="80" width="410" height="380" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="40" rx="10" fill="#f0ad4e"/>
  <rect x="460" y="110" width="410" height="10" fill="#f0ad4e"/>
  <text x="665" y="107" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Session Token (Stateful)</text>

  <!-- Session Flow -->
  <rect x="480" y="135" width="370" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">1. User authenticates → Server creates session</text>
  <text x="665" y="173" text-anchor="middle" font-size="9" fill="#1a1822">Session ID stored in DB/cache. Token = session ID.</text>

  <rect x="480" y="200" width="370" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">2. Client stores session ID (httpOnly cookie)</text>
  <text x="665" y="238" text-anchor="middle" font-size="9" fill="#1a1822">Sends session ID with each request (cookie)</text>

  <rect x="480" y="265" width="370" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">3. Server looks up session in database/cache</text>
  <text x="665" y="303" text-anchor="middle" font-size="9" fill="#1a1822">Validates session is active, not expired</text>

  <rect x="480" y="330" width="370" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">4. Serves request if session valid</text>
  <text x="665" y="368" text-anchor="middle" font-size="9" fill="#1a1822">User data retrieved from session store</text>

  <!-- Pros/Cons -->
  <rect x="480" y="395" width="170" height="55" rx="6" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
  <text x="565" y="415" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Pros:</text>
  <text x="565" y="432" text-anchor="middle" font-size="9" fill="#1a1822">Immediate revocation</text>

  <rect x="660" y="395" width="210" height="55" rx="6" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1"/>
  <text x="765" y="415" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Cons:</text>
  <text x="765" y="432" text-anchor="middle" font-size="9" fill="#1a1822">Session store required, DB call per request</text>

  <!-- Bottom comparison -->
  <rect x="30" y="470" width="840" height="20" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="484" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Recommendation: Use JWTs for distributed systems where scalability matters. Use sessions when immediate revocation is required.</text>
</svg>