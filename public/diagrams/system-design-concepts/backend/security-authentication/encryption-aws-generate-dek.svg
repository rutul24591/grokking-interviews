<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Data Encryption Key Generation</title>
  <desc id="desc">KMS-backed data key generation path showing how AWS KMS generates and returns data encryption keys</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">KMS-Backed Data Key Generation</text>
  
  <!-- CMK in KMS -->
  <rect x="550" y="70" width="200" height="100" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="3"/>
  <text x="650" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">AWS KMS</text>
  <text x="650" y="125" text-anchor="middle" font-size="12" fill="white">Customer Master Key</text>
  <text x="650" y="145" text-anchor="middle" font-size="10" fill="white">(CMK - Never leaves KMS)</text>
  <text x="650" y="160" text-anchor="middle" font-size="10" fill="white">Key ID: cmk-xxxx</text>
  
  <!-- Application Request -->
  <rect x="50" y="70" width="180" height="60" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Application</text>
  <text x="140" y="115" text-anchor="middle" font-size="11" fill="white">GenerateDataKey</text>
  
  <!-- Request Arrow -->
  <defs>
    <marker id="arrowRequest" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowResponse" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
  </defs>
  
  <line x1="230" y1="100" x2="550" y2="100" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowRequest)"/>
  <text x="390" y="95" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">GenerateDataKey Request</text>
  <text x="390" y="110" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">(KeyId, KeySpec=AES_256)</text>
  
  <!-- DEK Generation inside KMS -->
  <rect x="570" y="190" width="160" height="70" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="650" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">DEK Generation</text>
  <text x="650" y="235" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Random 256-bit key</text>
  <text x="650" y="250" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">using CSPRNG</text>
  
  <!-- Encrypt DEK with CMK -->
  <rect x="570" y="275" width="160" height="60" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #7c3aed)" stroke-width="2"/>
  <text x="650" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Encrypt with CMK</text>
  <text x="650" y="320" text-anchor="middle" font-size="9" fill="white">→ Encrypted DEK</text>
  
  <!-- Response Arrow -->
  <line x1="550" y1="350" x2="230" y2="350" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrowResponse)"/>
  <rect x="300" y="335" width="200" height="30" rx="4" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="400" y="355" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Response: CiphertextBlob + Plaintext</text>
  
  <!-- Application receives keys -->
  <rect x="50" y="300" width="200" height="100" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="150" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Application</text>
  <text x="150" y="350" text-anchor="middle" font-size="10" fill="white">Receives:</text>
  <text x="150" y="370" text-anchor="middle" font-size="9" fill="white">• Plaintext DEK (use now)</text>
  <text x="150" y="387" text-anchor="middle" font-size="9" fill="white">• Encrypted DEK (store)</text>
  
  <!-- Key Usage -->
  <rect x="280" y="410" width="240" height="80" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="400" y="435" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Plaintext DEK Usage</text>
  <text x="400" y="458" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Encrypt/Decrypt data in memory</text>
  <text x="400" y="478" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Zero out after use</text>
  
  <!-- Storage -->
  <rect x="550" y="410" width="200" height="80" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="650" y="435" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Stored With Data</text>
  <text x="650" y="458" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Encrypted DEK</text>
  <text x="650" y="478" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">+ Ciphertext</text>
  
  <!-- Security Notes -->
  <rect x="50" y="160" width="450" height="110" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="275" y="182" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309)">Key Security Properties</text>
  <text x="275" y="205" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b)">• CMK never leaves KMS boundary</text>
  <text x="275" y="225" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b)">• Plaintext DEK exists only in application memory</text>
  <text x="275" y="245" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b)">• Encrypted DEK can be safely stored with data</text>
  <text x="275" y="265" text-anchor="start" font-size="10" fill="var(--text-theme, #64748b)">• Key rotation: generate new DEK, re-encrypt data</text>
</svg>
