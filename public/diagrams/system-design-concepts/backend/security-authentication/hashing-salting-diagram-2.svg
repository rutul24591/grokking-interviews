<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Brute force attack comparison showing how slow hash functions defend against GPU and ASIC attacks</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Why Slow Hash Functions Matter: Defending Against Brute Force</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Fast hashes (MD5, SHA-256) enable billions of guesses per second; slow hashes (bcrypt, Argon2) limit to thousands</text>

  <!-- Attack speed comparison -->
  <rect x="30" y="80" width="840" height="200" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Hash Cracking Speed (Guesses per Second on GPU)</text>

  <!-- MD5 -->
  <rect x="50" y="125" width="180" height="25" rx="4" fill="#f0f0f5"/>
  <text x="140" y="142" text-anchor="middle" font-size="9" fill="#1a1822">MD5</text>
  <rect x="240" y="125" width="620" height="25" rx="4" fill="#cc4444" opacity="0.3"/>
  <text x="550" y="142" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">~100 billion guesses/sec — CRACKED IN SECONDS</text>

  <!-- SHA-256 -->
  <rect x="50" y="155" width="180" height="25" rx="4" fill="#f0f0f5"/>
  <text x="140" y="172" text-anchor="middle" font-size="9" fill="#1a1822">SHA-256</text>
  <rect x="240" y="155" width="520" height="25" rx="4" fill="#cc4444" opacity="0.3"/>
  <text x="500" y="172" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">~10 billion guesses/sec — CRACKED IN MINUTES</text>

  <!-- PBKDF2 -->
  <rect x="50" y="185" width="180" height="25" rx="4" fill="#f0f0f5"/>
  <text x="140" y="202" text-anchor="middle" font-size="9" fill="#1a1822">PBKDF2 (100k iterations)</text>
  <rect x="240" y="185" width="300" height="25" rx="4" fill="#f0ad4e" opacity="0.3"/>
  <text x="390" y="202" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">~1 million guesses/sec — CRACKED IN HOURS</text>

  <!-- bcrypt -->
  <rect x="50" y="215" width="180" height="25" rx="4" fill="#f0f0f5"/>
  <text x="140" y="232" text-anchor="middle" font-size="9" fill="#1a1822">bcrypt (cost=12)</text>
  <rect x="240" y="215" width="150" height="25" rx="4" fill="#4caf50" opacity="0.3"/>
  <text x="315" y="232" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">~1,000 guesses/sec — YEARS</text>

  <!-- Argon2 -->
  <rect x="50" y="245" width="180" height="25" rx="4" fill="#f0f0f5"/>
  <text x="140" y="262" text-anchor="middle" font-size="9" fill="#1a1822">Argon2id (default params)</text>
  <rect x="240" y="245" width="100" height="25" rx="4" fill="#4caf50" opacity="0.3"/>
  <text x="290" y="262" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">~100 guesses/sec — DECADES</text>

  <!-- Cost factor impact -->
  <rect x="30" y="300" width="410" height="180" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="300" width="410" height="30" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="320" width="410" height="10" fill="#6d5bd0"/>
  <text x="235" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">bcrypt Cost Factor Impact</text>

  <text x="50" y="345" text-anchor="start" font-size="9" fill="#1a1822">cost=10: ~4 hashes/sec per core, ~400ms per hash</text>
  <text x="50" y="363" text-anchor="start" font-size="9" fill="#1a1822">cost=11: ~2 hashes/sec per core, ~800ms per hash</text>
  <text x="50" y="381" text-anchor="start" font-size="9" fill="#1a1822">cost=12: ~1 hash/sec per core,   ~1.6s per hash</text>
  <text x="50" y="399" text-anchor="start" font-size="9" fill="#1a1822">cost=13: ~0.5 hashes/sec,       ~3.2s per hash</text>

  <text x="50" y="425" text-anchor="start" font-size="9" fill="#64748b">Each +1 doubles the computation time</text>
  <text x="50" y="442" text-anchor="start" font-size="9" fill="#64748b">Target: 0.25-0.5s per hash for login UX</text>
  <text x="50" y="460" text-anchor="start" font-size="9" fill="#64748b">Recommendation: cost=12 for most systems</text>

  <!-- Salt importance -->
  <rect x="460" y="300" width="410" height="180" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="300" width="410" height="30" rx="10" fill="#4caf50"/>
  <rect x="460" y="320" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Why Unique Salt Per Password?</text>

  <text x="480" y="345" text-anchor="start" font-size="9" fill="#1a1822">Without salt: identical passwords → identical hashes</text>
  <text x="480" y="363" text-anchor="start" font-size="9" fill="#1a1822">Rainbow tables work against unsalted hashes</text>
  <text x="480" y="381" text-anchor="start" font-size="9" fill="#1a1822">With unique salt: each hash is unique</text>
  <text x="480" y="399" text-anchor="start" font-size="9" fill="#1a1822">Rainbow tables are ineffective — must brute force each</text>

  <text x="480" y="425" text-anchor="start" font-size="9" fill="#64748b">Salt size: 128 bits minimum (16 bytes)</text>
  <text x="480" y="442" text-anchor="start" font-size="9" fill="#64748b">Generated by CSPRNG (cryptographically secure RNG)</text>
  <text x="480" y="460" text-anchor="start" font-size="9" fill="#64748b">Stored alongside the hash (not secret)</text>
</svg>