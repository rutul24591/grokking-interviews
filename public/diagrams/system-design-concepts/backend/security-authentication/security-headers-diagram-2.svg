<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>CSP directives showing how Content-Security-Policy controls resource loading from different sources</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Content-Security-Policy Directives</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">CSP controls which resources the browser can load and execute</text>

  <!-- Page -->
  <rect x="350" y="80" width="200" height="120" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Web Page</text>
  <text x="450" y="128" text-anchor="middle" font-size="10" fill="#1a1822">https://example.com/app</text>
  <text x="450" y="148" text-anchor="middle" font-size="9" fill="#64748b">CSP header applied</text>
  <text x="450" y="168" text-anchor="middle" font-size="9" fill="#64748b">Browser enforces policy</text>

  <!-- Scripts -->
  <rect x="30" y="240" width="180" height="100" rx="8" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="120" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Scripts</text>
  <text x="120" y="288" text-anchor="middle" font-size="9" font-family="monospace" fill="#1a1822">script-src 'self'</text>
  <text x="120" y="308" text-anchor="middle" font-size="9" fill="#1a1822">✓ Same-origin scripts</text>
  <text x="120" y="326" text-anchor="middle" font-size="9" fill="#cc4444">✗ Inline scripts</text>

  <!-- Styles -->
  <rect x="240" y="240" width="180" height="100" rx="8" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="330" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">Styles</text>
  <text x="330" y="288" text-anchor="middle" font-size="9" font-family="monospace" fill="#1a1822">style-src 'self' 'unsafe-inline'</text>
  <text x="330" y="308" text-anchor="middle" font-size="9" fill="#1a1822">✓ Same-origin styles</text>
  <text x="330" y="326" text-anchor="middle" font-size="9" fill="#1a1822">✓ Inline styles (needed)</text>

  <!-- Images -->
  <rect x="450" y="240" width="180" height="100" rx="8" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="540" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#f0ad4e">Images</text>
  <text x="540" y="288" text-anchor="middle" font-size="9" font-family="monospace" fill="#1a1822">img-src 'self' https: data:</text>
  <text x="540" y="308" text-anchor="middle" font-size="9" fill="#1a1822">✓ Same-origin images</text>
  <text x="540" y="326" text-anchor="middle" font-size="9" fill="#1a1822">✓ HTTPS images, data URIs</text>

  <!-- Frames -->
  <rect x="660" y="240" width="180" height="100" rx="8" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="750" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">Frames</text>
  <text x="750" y="288" text-anchor="middle" font-size="9" font-family="monospace" fill="#1a1822">frame-ancestors 'none'</text>
  <text x="750" y="308" text-anchor="middle" font-size="9" fill="#1a1822">✓ Cannot be iframed</text>
  <text x="750" y="326" text-anchor="middle" font-size="9" fill="#1a1822">Prevents clickjacking</text>

  <!-- Arrows from page to resources -->
  <line x1="400" y1="200" x2="120" y2="240" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrowSH)"/>
  <line x1="420" y1="200" x2="330" y2="240" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrowSH)"/>
  <line x1="480" y1="200" x2="540" y2="240" stroke="#f0ad4e" stroke-width="1.5" marker-end="url(#arrowSH)"/>
  <line x1="500" y1="200" x2="750" y2="240" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrowSH)"/>

  <!-- CSP Report-Only -->
  <rect x="30" y="370" width="410" height="110" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="235" y="398" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Content-Security-Policy-Report-Only</text>
  <text x="235" y="420" text-anchor="middle" font-size="9" fill="#1a1822">Tests CSP without enforcing it</text>
  <text x="235" y="438" text-anchor="middle" font-size="9" fill="#1a1822">Violations are reported (not blocked)</text>
  <text x="235" y="456" text-anchor="middle" font-size="9" fill="#64748b">Use: Testing new CSP before enforcing</text>

  <!-- CSP Violation Reporting -->
  <rect x="460" y="370" width="410" height="110" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="665" y="398" text-anchor="middle" font-size="13" font-weight="700" fill="#f0ad4e">CSP Violation Reporting</text>
  <text x="665" y="420" text-anchor="middle" font-size="9" fill="#1a1822">report-uri /csp-report or report-to endpoint</text>
  <text x="665" y="438" text-anchor="middle" font-size="9" fill="#1a1822">Browser sends violation reports to server</text>
  <text x="665" y="456" text-anchor="middle" font-size="9" fill="#64748b">Use: Monitor violations, tune CSP policy</text>

  <defs>
    <marker id="arrowSH" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>