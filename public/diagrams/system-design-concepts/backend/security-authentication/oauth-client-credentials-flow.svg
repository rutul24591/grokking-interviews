<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">OAuth 2.0 Client Credentials Flow</title>
  <desc id="desc">OAuth 2.0 client credentials flow for machine-to-machine (M2M) authentication showing service-to-service token acquisition</desc>
  
  <!-- Background -->
  <rect width="800" height="450" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">OAuth 2.0 Client Credentials Flow (M2M)</text>
  
  <!-- Client Service -->
  <rect x="50" y="70" width="180" height="100" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="140" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Client Service</text>
  <text x="140" y="125" text-anchor="middle" font-size="10" fill="white">(Backend API)</text>
  <text x="140" y="145" text-anchor="middle" font-size="9" fill="white">client_id</text>
  <text x="140" y="160" text-anchor="middle" font-size="9" fill="white">client_secret</text>
  
  <!-- Authorization Server -->
  <rect x="350" y="70" width="200" height="150" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="3"/>
  <text x="450" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Authorization</text>
  <text x="450" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Server</text>
  <text x="450" y="145" text-anchor="middle" font-size="10" fill="white">Token Endpoint</text>
  <text x="450" y="165" text-anchor="middle" font-size="10" fill="white">/oauth2/token</text>
  <text x="450" y="185" text-anchor="middle" font-size="10" fill="white">Client Registry</text>
  <text x="450" y="205" text-anchor="middle" font-size="10" fill="white">(credentials)</text>
  
  <!-- Resource Server -->
  <rect x="600" y="70" width="150" height="100" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="675" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Resource</text>
  <text x="675" y="125" text-anchor="middle" font-size="10" fill="white">Server (API)</text>
  <text x="675" y="145" text-anchor="middle" font-size="9" fill="white">Protected</text>
  <text x="675" y="160" text-anchor="middle" font-size="9" fill="white">Endpoints</text>
  
  <!-- Flow Arrows -->
  <defs>
    <marker id="arrowTokenReq" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowToken" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #8b5cf6)"/>
    </marker>
    <marker id="arrowApi" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
  
  <!-- Step 1: Token Request -->
  <line x1="230" y1="120" x2="350" y2="120" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowTokenReq)"/>
  <text x="290" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">1. Token Request</text>
  <text x="290" y="130" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">grant_type=client_credentials</text>
  <text x="290" y="142" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">client_id + client_secret</text>
  
  <!-- Step 2: Validate Credentials -->
  <rect x="370" y="240" width="160" height="70" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="450" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">2. Validate</text>
  <text x="450" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Check client credentials</text>
  <text x="450" y="300" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Verify scopes</text>
  
  <!-- Step 3: Issue Access Token -->
  <line x1="350" y1="170" x2="230" y2="170" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowToken)"/>
  <text x="290" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">3. Access Token</text>
  <text x="290" y="180" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">(JWT, scoped)</text>
  
  <!-- Token Example -->
  <rect x="50" y="200" width="280" height="80" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="190" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">Access Token (JWT)</text>
  <text x="190" y="245" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...</text>
  <text x="190" y="260" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">{ "sub": "client-123", "scope": "read:users" }</text>
  <text x="190" y="275" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">exp: 3600s (typically short-lived)</text>
  
  <!-- Step 4: API Request -->
  <line x1="330" y1="340" x2="600" y2="340" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowApi)"/>
  <text x="465" y="335" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">4. API Request</text>
  <text x="465" y="350" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Authorization: Bearer &lt;token&gt;</text>
  
  <!-- Step 5: Validate Token -->
  <rect x="600" y="200" width="150" height="80" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="675" y="225" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">5. Validate</text>
  <text x="675" y="245" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Verify signature</text>
  <text x="675" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Check scopes</text>
  <text x="675" y="275" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Check expiry</text>
  
  <!-- Step 6: Response -->
  <line x1="600" y1="380" x2="330" y2="380" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowApi)"/>
  <text x="465" y="375" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">6. Response</text>
  <text x="465" y="390" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">(protected data)</text>
  
  <!-- Use Cases Box -->
  <rect x="50" y="310" width="280" height="120" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="190" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #3b82f6">Use Cases</text>
  <text x="190" y="355" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Service-to-service (M2M) auth</text>
  <text x="190" y="372" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Backend API calling another API</text>
  <text x="190" y="389" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Microservice communication</text>
  <text x="190" y="406" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• CI/CD pipelines</text>
  <text x="190" y="423" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Automated scripts</text>
  
  <!-- Security Notes Box -->
  <rect x="600" y="310" width="150" height="120" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="2"/>
  <text x="675" y="332" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Security Notes</text>
  <text x="675" y="352" text-anchor="start" font-size="9" fill="white">• No user context</text>
  <text x="675" y="369" text-anchor="start" font-size="9" fill="white">• Store secrets securely</text>
  <text x="675" y="386" text-anchor="start" font-size="9" fill="white">• Short token TTL</text>
  <text x="675" y="403" text-anchor="start" font-size="9" fill="white">• Rotate credentials</text>
  <text x="675" y="420" text-anchor="start" font-size="9" fill="white">• Use secrets manager</text>
</svg>
