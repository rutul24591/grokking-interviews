<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">OAuth 2.0 Authorization Code Flow</title>
  <desc id="desc">OAuth 2.0 authorization code flow showing the exchange between client, authorization server, and resource server</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">OAuth 2.0 Authorization Code Flow</text>
  
  <!-- Participants -->
  <!-- Client -->
  <rect x="50" y="80" width="180" height="70" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="140" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Client</text>
  <text x="140" y="130" text-anchor="middle" font-size="11" fill="white">(Web App)</text>
  
  <!-- Authorization Server -->
  <rect x="310" y="80" width="180" height="70" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Authorization</text>
  <text x="400" y="130" text-anchor="middle" font-size="11" fill="white">Server</text>
  
  <!-- Resource Server -->
  <rect x="570" y="80" width="180" height="70" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Resource</text>
  <text x="660" y="130" text-anchor="middle" font-size="11" fill="white">Server (API)</text>
  
  <!-- User Browser (implicit) -->
  <text x="400" y="180" text-anchor="middle" font-size="12" font-style="italic" fill="var(--text-theme, #64748b)">User interacts via browser</text>
  
  <!-- Flow Steps -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #8b5cf6)"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
  
  <!-- Step 1: Authorization Request -->
  <line x1="230" y1="210" x2="310" y2="210" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="270" y="205" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">1. Auth Request</text>
  <text x="270" y="220" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">(redirect_uri)</text>
  
  <!-- Step 2: User Authentication -->
  <rect x="310" y="195" width="180" height="30" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="400" y="215" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b)">2. User Login &amp; Consent</text>
  
  <!-- Step 3: Authorization Code -->
  <line x1="310" y1="250" x2="230" y2="250" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="270" y="245" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">3. Auth Code</text>
  <text x="270" y="260" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">(via redirect)</text>
  
  <!-- Step 4: Token Request -->
  <line x1="230" y1="290" x2="310" y2="290" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="270" y="285" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">4. Token Request</text>
  <text x="270" y="300" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">(code + client_secret)</text>
  
  <!-- Step 5: Access + Refresh Tokens -->
  <line x1="310" y1="330" x2="230" y2="330" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="270" y="325" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">5. Tokens</text>
  <text x="270" y="340" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">(access + refresh)</text>
  
  <!-- Step 6: API Request -->
  <line x1="230" y1="370" x2="570" y2="370" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="400" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">6. API Request</text>
  <text x="400" y="380" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">(with access token)</text>
  
  <!-- Step 7: Protected Resource -->
  <line x1="570" y1="410" x2="230" y2="410" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="400" y="405" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">7. Protected Resource</text>
  <text x="400" y="420" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">(API response)</text>
  
  <!-- Token Refresh Section -->
  <rect x="50" y="440" width="700" height="50" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="400" y="460" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">Token Refresh Flow (when access token expires):</text>
  <text x="400" y="478" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Client sends refresh token → Auth Server validates → Issues new access + refresh tokens</text>
  
  <!-- Security Notes -->
  <rect x="550" y="200" width="200" height="100" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="650" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309)">Security Notes</text>
  <text x="650" y="240" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">• Use PKCE for public clients</text>
  <text x="650" y="255" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">• Validate redirect_uri</text>
  <text x="650" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">• Rotate refresh tokens</text>
  <text x="650" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">• Short-lived access tokens</text>
</svg>
