<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>MFA attack vectors showing phishing, SIM swapping, MFA fatigue, and man-in-the-middle attacks</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">MFA Attack Vectors &amp; Defenses</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Even MFA can be bypassed — understand attack vectors and how to defend against them</text>

  <!-- Attack 1: Phishing -->
  <rect x="30" y="80" width="410" height="110" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="30" rx="10" fill="#cc4444"/>
  <rect x="30" y="100" width="410" height="10" fill="#cc4444"/>
  <text x="235" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1. Phishing / Adversary-in-the-Middle</text>

  <text x="50" y="130" text-anchor="start" font-size="10" fill="#1a1822">Attacker creates fake login page, captures password + TOTP code in real-time.</text>
  <text x="50" y="150" text-anchor="start" font-size="10" fill="#1a1822">Uses captured credentials + TOTP to authenticate as victim immediately.</text>
  <text x="50" y="175" text-anchor="start" font-size="10" font-weight="600" fill="#4caf50">Defense: Use security keys / passkeys (WebAuthn). Phishing-resistant by design.</text>

  <!-- Attack 2: SIM Swapping -->
  <rect x="30" y="200" width="410" height="110" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="200" width="410" height="30" rx="10" fill="#cc4444"/>
  <rect x="30" y="220" width="410" height="10" fill="#cc4444"/>
  <text x="235" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2. SIM Swapping</text>

  <text x="50" y="250" text-anchor="start" font-size="10" fill="#1a1822">Attacker convinces carrier to transfer victim's phone number to attacker's SIM.</text>
  <text x="50" y="270" text-anchor="start" font-size="10" fill="#1a1822">Receives victim's SMS OTP codes, bypasses SMS-based MFA.</text>
  <text x="50" y="295" text-anchor="start" font-size="10" font-weight="600" fill="#4caf50">Defense: Avoid SMS MFA. Use TOTP, push, or security keys instead.</text>

  <!-- Attack 3: MFA Fatigue -->
  <rect x="30" y="320" width="410" height="110" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="320" width="410" height="30" rx="10" fill="#cc4444"/>
  <rect x="30" y="340" width="410" height="10" fill="#cc4444"/>
  <text x="235" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3. MFA Fatigue (Push Bombing)</text>

  <text x="50" y="370" text-anchor="start" font-size="10" fill="#1a1822">Attacker sends many push notifications, hoping user approves out of frustration.</text>
  <text x="50" y="390" text-anchor="start" font-size="10" fill="#1a1822">Common in targeted attacks (Uber, Microsoft breaches).</text>
  <text x="50" y="415" text-anchor="start" font-size="10" font-weight="600" fill="#4caf50">Defense: Use number matching (Duo, Okta Verify). User must enter matching number.</text>

  <!-- Defense summary -->
  <rect x="460" y="80" width="410" height="350" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="35" rx="10" fill="#4caf50"/>
  <rect x="460" y="105" width="410" height="10" fill="#4caf50"/>
  <text x="665" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">MFA Defense Strategy</text>

  <rect x="480" y="130" width="370" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Primary: Security Keys / Passkeys (WebAuthn)</text>
  <text x="665" y="168" text-anchor="middle" font-size="9" fill="#1a1822">Phishing-resistant, strongest MFA available</text>

  <rect x="480" y="185" width="370" height="45" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="665" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Fallback: TOTP (Authenticator App)</text>
  <text x="665" y="223" text-anchor="middle" font-size="9" fill="#1a1822">Good security, widely supported</text>

  <rect x="480" y="240" width="370" height="45" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="665" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Avoid: SMS / Email OTP</text>
  <text x="665" y="278" text-anchor="middle" font-size="9" fill="#1a1822">Vulnerable to interception, SIM swapping</text>

  <rect x="480" y="295" width="370" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="315" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Recovery Codes: Generate and store securely</text>
  <text x="665" y="333" text-anchor="middle" font-size="9" fill="#1a1822">For account recovery when MFA device is lost</text>

  <rect x="480" y="350" width="370" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Rate Limiting: Max 5 attempts per 5 minutes</text>
  <text x="665" y="388" text-anchor="middle" font-size="9" fill="#1a1822">Prevents brute force of TOTP codes</text>

  <rect x="480" y="405" width="370" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="665" y="425" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Monitor: Alert on MFA anomalies</text>
  <text x="665" y="443" text-anchor="middle" font-size="9" fill="#1a1822">Failed attempts, device changes, location changes</text>

  <!-- Bottom warning -->
  <rect x="30" y="470" width="840" height="20" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="450" y="484" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">MFA is not absolute security. Use phishing-resistant methods for high-value accounts. Layer defenses.</text>
</svg>