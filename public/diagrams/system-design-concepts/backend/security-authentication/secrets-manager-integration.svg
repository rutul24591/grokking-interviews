<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Secrets Manager Integration</title>
  <desc id="desc">Applications retrieving secrets from AWS Secrets Manager with caching, IAM authorization, and automatic rotation</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Secrets Manager Integration Pattern</text>
  
  <!-- Applications -->
  <rect x="50" y="70" width="180" height="180" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Applications</text>
  
  <rect x="70" y="110" width="140" height="35" rx="4" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="140" y="132" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">Web Service</text>
  
  <rect x="70" y="150" width="140" height="35" rx="4" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="140" y="172" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">API Service</text>
  
  <rect x="70" y="190" width="140" height="35" rx="4" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="140" y="212" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">Worker Service</text>
  
  <rect x="70" y="230" width="140" height="15" rx="4" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="140" y="242" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">+ More services...</text>
  
  <!-- Secrets Manager -->
  <rect x="350" y="70" width="250" height="300" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="3"/>
  <text x="475" y="100" text-anchor="middle" font-size="16" font-weight="bold" fill="white">AWS Secrets Manager</text>
  
  <!-- Secret Versions -->
  <rect x="370" y="120" width="210" height="80" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="475" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Secret: prod/db/password</text>
  <text x="475" y="165" text-anchor="middle" font-size="10" fill="var(--text-theme, #10b981" font-weight="bold">✓ AWSCURRENT: v3</text>
  <text x="475" y="182" text-anchor="middle" font-size="10" fill="var(--text-theme, #f59e0b" font-weight="bold">⚠ AWSPREVIOUS: v2</text>
  
  <!-- Rotation Configuration -->
  <rect x="370" y="215" width="210" height="70" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="475" y="237" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">Rotation Config</text>
  <text x="475" y="257" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Lambda: arn:aws:lambda:...</text>
  <text x="475" y="272" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Schedule: 30 days</text>
  
  <!-- IAM Policy -->
  <rect x="370" y="295" width="210" height="65" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="475" y="317" text-anchor="middle" font-size="11" font-weight="bold" fill="white">IAM Access Control</text>
  <text x="475" y="337" text-anchor="middle" font-size="9" fill="white">secretsmanager:GetSecretValue</text>
  <text x="475" y="352" text-anchor="middle" font-size="9" fill="white">Resource: prod/db/*</text>
  
  <!-- Target Databases/Services -->
  <rect x="650" y="70" width="100" height="180" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="700" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Target</text>
  <text x="700" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Services</text>
  
  <rect x="660" y="125" width="80" height="30" rx="4" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="700" y="145" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">RDS</text>
  
  <rect x="660" y="165" width="80" height="30" rx="4" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="700" y="185" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Redis</text>
  
  <rect x="660" y="205" width="80" height="30" rx="4" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="700" y="225" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Queue</text>
  
  <rect x="660" y="245" width="80" height="15" rx="4" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="700" y="257" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">+ More</text>
  
  <!-- Flow Arrows -->
  <defs>
    <marker id="arrowGet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowSet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
  </defs>
  
  <!-- App to Secrets Manager -->
  <line x1="230" y1="160" x2="350" y2="160" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowGet)"/>
  <text x="290" y="155" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">GetSecretValue</text>
  
  <!-- Secrets Manager to Target -->
  <line x1="600" y1="160" x2="650" y2="160" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrowSet)"/>
  <text x="625" y="155" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Update Secret</text>
  
  <!-- Local Cache -->
  <rect x="50" y="280" width="250" height="100" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="175" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b">Local Secret Cache</text>
  <text x="175" y="330" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Cache TTL: 5 minutes</text>
  <text x="175" y="350" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• Refresh on rotation event</text>
  <text x="175" y="370" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">• In-memory (not logged)</text>
  
  <!-- CloudWatch Events -->
  <rect x="350" y="400" width="250" height="80" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="475" y="425" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CloudWatch Events</text>
  <text x="475" y="445" text-anchor="middle" font-size="9" fill="white">Rotation events → SNS/Lambda</text>
  <text x="475" y="460" text-anchor="middle" font-size="9" fill="white">Cache invalidation trigger</text>
  
  <!-- Audit Log -->
  <rect x="650" y="280" width="100" height="100" rx="8" fill="var(--bg-theme, #dc2626)" stroke="var(--border-theme, #991b1b)" stroke-width="2"/>
  <text x="700" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="white">CloudTrail</text>
  <text x="700" y="335" text-anchor="middle" font-size="9" fill="white">Audit Log</text>
  <text x="700" y="355" text-anchor="middle" font-size="9" fill="white">• GetSecretValue</text>
  <text x="700" y="370" text-anchor="middle" font-size="9" fill="white">• Rotation events</text>
  
  <!-- Cache to CloudWatch -->
  <path d="M 175 380 L 175 420 L 350 420" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGet)"/>
  <text x="250" y="415" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Subscribe</text>
  
  <!-- Best Practices Box -->
  <rect x="550" y="400" width="200" height="80" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="650" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">Integration Tips</text>
  <text x="650" y="438" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Cache secrets locally</text>
  <text x="650" y="453" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Use IAM roles, not keys</text>
  <text x="650" y="468" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Monitor rotation events</text>
</svg>
