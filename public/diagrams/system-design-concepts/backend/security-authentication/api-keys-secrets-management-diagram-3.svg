<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Key rotation workflow showing old key, new key, overlap period, and cutover</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Zero-Downtime Key Rotation</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Rotate keys without service interruption using overlap period and gradual cutover</text>

  <!-- Timeline -->
  <text x="80" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Rotation Timeline</text>
  <line x1="40" y1="130" x2="860" y2="130" stroke="#64748b" stroke-width="2"/>
  <text x="860" y="125" text-anchor="end" font-size="9" fill="#64748b">Time →</text>

  <!-- Phase markers -->
  <rect x="80" y="115" width="160" height="30" rx="6" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1"/>
  <text x="160" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Phase 1: Normal Operation</text>

  <rect x="240" y="115" width="160" height="30" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="320" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Phase 2: Generate New Key</text>

  <rect x="400" y="115" width="160" height="30" rx="6" fill="#f0ad4e" opacity="0.15" stroke="#f0ad4e" stroke-width="1"/>
  <text x="480" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">Phase 3: Overlap Period</text>

  <rect x="560" y="115" width="160" height="30" rx="6" fill="#cc4444" opacity="0.15" stroke="#cc4444" stroke-width="1"/>
  <text x="640" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Phase 4: Disable Old Key</text>

  <!-- Old key timeline -->
  <text x="40" y="175" text-anchor="end" font-size="10" font-weight="600" fill="#1a1822">Old Key:</text>
  <rect x="80" y="160" width="480" height="30" rx="4" fill="#4caf50" opacity="0.3"/>
  <text x="320" y="180" text-anchor="middle" font-size="10" fill="#1a1822">Active — accepting requests with old key</text>
  <rect x="560" y="160" width="160" height="30" rx="4" fill="#cc4444" opacity="0.3"/>
  <text x="640" y="180" text-anchor="middle" font-size="10" fill="#1a1822">Disabled — requests rejected</text>

  <!-- New key timeline -->
  <text x="40" y="225" text-anchor="end" font-size="10" font-weight="600" fill="#1a1822">New Key:</text>
  <rect x="240" y="210" width="160" height="30" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <text x="320" y="230" text-anchor="middle" font-size="10" fill="#1a1822">Generated, distributed</text>
  <rect x="400" y="210" width="160" height="30" rx="4" fill="#4caf50" opacity="0.3"/>
  <text x="480" y="230" text-anchor="middle" font-size="10" fill="#1a1822">Active — accepting requests</text>
  <rect x="560" y="210" width="300" height="30" rx="4" fill="#4caf50" opacity="0.3"/>
  <text x="710" y="230" text-anchor="middle" font-size="10" fill="#1a1822">Active — now the only valid key</text>

  <!-- Client update timeline -->
  <text x="40" y="275" text-anchor="end" font-size="10" font-weight="600" fill="#1a1822">Clients:</text>
  <rect x="80" y="260" width="320" height="30" rx="4" fill="#f0f0f5"/>
  <text x="240" y="280" text-anchor="middle" font-size="10" fill="#1a1822">Using old key</text>
  <rect x="400" y="260" width="160" height="30" rx="4" fill="#f0ad4e" opacity="0.3"/>
  <text x="480" y="280" text-anchor="middle" font-size="10" fill="#1a1822">Updating to new key</text>
  <rect x="560" y="260" width="300" height="30" rx="4" fill="#4caf50" opacity="0.3"/>
  <text x="710" y="280" text-anchor="middle" font-size="10" fill="#1a1822">All clients using new key</text>

  <!-- Rotation patterns -->
  <rect x="30" y="320" width="410" height="160" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="320" width="410" height="30" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="340" width="410" height="10" fill="#6d5bd0"/>
  <text x="235" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Automated Rotation</text>

  <text x="50" y="365" text-anchor="start" font-size="10" fill="#1a1822">• Scheduled rotation (every 90 days)</text>
  <text x="50" y="385" text-anchor="start" font-size="10" fill="#1a1822">• Vault generates new key automatically</text>
  <text x="50" y="405" text-anchor="start" font-size="10" fill="#1a1822">• Clients fetch new key via API</text>
  <text x="50" y="425" text-anchor="start" font-size="10" fill="#1a1822">• Old key disabled after overlap period</text>
  <text x="50" y="445" text-anchor="start" font-size="10" fill="#1a1822">• Zero downtime, no manual intervention</text>
  <text x="50" y="465" text-anchor="start" font-size="10" fill="#1a1822">• Best for: API keys, database credentials</text>

  <!-- Emergency rotation -->
  <rect x="460" y="320" width="410" height="160" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="460" y="320" width="410" height="30" rx="10" fill="#cc4444"/>
  <rect x="460" y="340" width="410" height="10" fill="#cc4444"/>
  <text x="665" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Emergency Rotation</text>

  <text x="480" y="365" text-anchor="start" font-size="10" fill="#1a1822">• Triggered by compromise detection</text>
  <text x="480" y="385" text-anchor="start" font-size="10" fill="#1a1822">• Old key immediately revoked</text>
  <text x="480" y="405" text-anchor="start" font-size="10" fill="#1a1822">• New key generated and distributed</text>
  <text x="480" y="425" text-anchor="start" font-size="10" fill="#1a1822">• Clients must update immediately</text>
  <text x="480" y="445" text-anchor="start" font-size="10" fill="#1a1822">• May cause brief service disruption</text>
  <text x="480" y="465" text-anchor="start" font-size="10" fill="#1a1822">• Best for: compromised keys, breaches</text>

  <defs>
    <marker id="arrowAPI" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>