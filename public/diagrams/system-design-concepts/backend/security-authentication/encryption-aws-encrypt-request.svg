<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Envelope Encryption Request Flow</title>
  <desc id="desc">AWS KMS envelope encryption showing request flow with KMS and data key usage for encrypting data</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Envelope Encryption Request Flow</text>
  
  <!-- Application -->
  <rect x="50" y="70" width="180" height="80" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="140" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Application</text>
  <text x="140" y="125" text-anchor="middle" font-size="11" fill="white">Needs to encrypt</text>
  <text x="140" y="140" text-anchor="middle" font-size="11" fill="white">sensitive data</text>
  
  <!-- KMS -->
  <rect x="570" y="70" width="180" height="80" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">AWS KMS</text>
  <text x="660" y="125" text-anchor="middle" font-size="11" fill="white">Key Management</text>
  <text x="660" y="140" text-anchor="middle" font-size="11" fill="white">Service</text>
  
  <!-- Step 1: Generate Data Key -->
  <defs>
    <marker id="arrowStep1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowStep2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
    <marker id="arrowStep3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
  
  <line x1="230" y1="110" x2="570" y2="110" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowStep1)"/>
  <text x="400" y="105" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">1. GenerateDataKey</text>
  <text x="400" y="120" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">(KeyId, KeySpec)</text>
  
  <!-- Step 2: Return Data Key -->
  <line x1="570" y1="170" x2="230" y2="170" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrowStep2)"/>
  <rect x="250" y="155" width="300" height="30" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="400" y="175" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">2. Plaintext DEK + Encrypted DEK</text>
  
  <!-- Data Key Storage -->
  <rect x="50" y="200" width="340" height="80" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="220" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">Application Stores:</text>
  <text x="220" y="248" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Plaintext DEK → Encrypt data (in memory)</text>
  <text x="220" y="268" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Encrypted DEK → Store with ciphertext</text>
  
  <!-- Encryption Process -->
  <rect x="420" y="200" width="330" height="80" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="585" y="225" text-anchor="middle" font-size="13" font-weight="bold" fill="white">3. Encrypt Data</text>
  <text x="585" y="248" text-anchor="middle" font-size="10" fill="white">Plaintext DEK + Data → Ciphertext</text>
  <text x="585" y="268" text-anchor="middle" font-size="10" fill="white">(AES-GCM, AES-256)</text>
  
  <!-- Stored Result -->
  <rect x="50" y="310" width="700" height="70" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="400" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">Stored Result</text>
  <text x="400" y="360" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">[Encrypted DEK] + [Ciphertext] + [Encryption Context]</text>
  
  <!-- Decryption Flow -->
  <rect x="50" y="400" width="700" height="90" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="400" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">Decryption Flow</text>
  <text x="400" y="450" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">1. Retrieve Encrypted DEK + Ciphertext</text>
  <text x="400" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">2. KMS.Decrypt(Encrypted DEK) → Plaintext DEK</text>
  <text x="400" y="485" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">3. Decrypt(Ciphertext, Plaintext DEK) → Original Data</text>
  
  <!-- CMK Label -->
  <rect x="570" y="160" width="180" height="30" rx="4" fill="var(--bg-theme, #dc2626)" stroke="var(--border-theme, #991b1b)" stroke-width="1"/>
  <text x="660" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="white">CMK (Master Key)</text>
</svg>
