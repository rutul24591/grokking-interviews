<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>API key lifecycle showing generation, distribution, usage, rotation, and revocation</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">API Key Lifecycle: Generation, Distribution, Usage, Rotation, Revocation</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">API keys must be managed throughout their lifecycle to prevent unauthorized access</text>

  <!-- Phase 1: Generation -->
  <rect x="30" y="80" width="160" height="120" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="160" height="30" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="100" width="160" height="10" fill="#6d5bd0"/>
  <text x="110" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1. Generation</text>

  <text x="50" y="125" text-anchor="start" font-size="9" fill="#1a1822">• Random, high entropy</text>
  <text x="50" y="142" text-anchor="start" font-size="9" fill="#1a1822">• Prefix for identification</text>
  <text x="50" y="159" text-anchor="start" font-size="9" fill="#1a1822">• Scoped permissions</text>
  <text x="50" y="176" text-anchor="start" font-size="9" fill="#1a1822">• Expiration set</text>

  <!-- Arrow -->
  <line x1="190" y1="140" x2="230" y2="140" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowAPI)"/>

  <!-- Phase 2: Distribution -->
  <rect x="230" y="80" width="160" height="120" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="230" y="80" width="160" height="30" rx="10" fill="#f0ad4e"/>
  <rect x="230" y="100" width="160" height="10" fill="#f0ad4e"/>
  <text x="310" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">2. Distribution</text>

  <text x="250" y="125" text-anchor="start" font-size="9" fill="#1a1822">• Secure channel only</text>
  <text x="250" y="142" text-anchor="start" font-size="9" fill="#1a1822">• Displayed once</text>
  <text x="250" y="159" text-anchor="start" font-size="9" fill="#1a1822">• Stored in KMS / vault</text>
  <text x="250" y="176" text-anchor="start" font-size="9" fill="#1a1822">• Never in code repos</text>

  <!-- Arrow -->
  <line x1="390" y1="140" x2="430" y2="140" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowAPI)"/>

  <!-- Phase 3: Usage -->
  <rect x="430" y="80" width="160" height="120" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="430" y="80" width="160" height="30" rx="10" fill="#4caf50"/>
  <rect x="430" y="100" width="160" height="10" fill="#4caf50"/>
  <text x="510" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3. Usage</text>

  <text x="450" y="125" text-anchor="start" font-size="9" fill="#1a1822">• Authorization header</text>
  <text x="450" y="142" text-anchor="start" font-size="9" fill="#1a1822">• Rate limited</text>
  <text x="450" y="159" text-anchor="start" font-size="9" fill="#1a1822">• Logged for audit</text>
  <text x="450" y="176" text-anchor="start" font-size="9" fill="#1a1822">• Scope enforced</text>

  <!-- Arrow -->
  <line x1="590" y1="140" x2="630" y2="140" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowAPI)"/>

  <!-- Phase 4: Rotation -->
  <rect x="630" y="80" width="160" height="120" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="630" y="80" width="160" height="30" rx="10" fill="#f59e0b"/>
  <rect x="630" y="100" width="160" height="10" fill="#f59e0b"/>
  <text x="710" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">4. Rotation</text>

  <text x="650" y="125" text-anchor="start" font-size="9" fill="#1a1822">• New key generated</text>
  <text x="650" y="142" text-anchor="start" font-size="9" fill="#1a1822">• Old key overlaps briefly</text>
  <text x="650" y="159" text-anchor="start" font-size="9" fill="#1a1822">• Clients update</text>
  <text x="650" y="176" text-anchor="start" font-size="9" fill="#1a1822">• Old key disabled</text>

  <!-- Arrow -->
  <line x1="790" y1="140" x2="830" y2="140" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowAPI)"/>

  <!-- Phase 5: Revocation -->
  <rect x="830" y="80" width="50" height="120" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="855" y="145" text-anchor="middle" font-size="10" font-weight="700" fill="#cc4444">5.</text>
  <text x="855" y="160" text-anchor="middle" font-size="9" fill="#cc4444">Revoke</text>

  <!-- Bottom details -->
  <rect x="30" y="230" width="840" height="250" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">API Key Security Best Practices</text>

  <rect x="50" y="280" width="390" height="45" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="245" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Store in secrets manager (AWS Secrets Manager, HashiCorp Vault)</text>
  <text x="245" y="318" text-anchor="middle" font-size="9" fill="#1a1822">Never commit to version control or expose in client-side code</text>

  <rect x="460" y="280" width="390" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="655" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Use key prefixes to identify type and environment</text>
  <text x="655" y="318" text-anchor="middle" font-size="9" fill="#1a1822">Example: sk_live_xxx, pk_test_yyy, ak_prod_zzz</text>

  <rect x="50" y="335" width="390" height="45" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="245" y="355" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Enforce least-privilege scopes per key</text>
  <text x="245" y="373" text-anchor="middle" font-size="9" fill="#1a1822">read:orders, write:users, admin:settings — not "full_access"</text>

  <rect x="460" y="335" width="390" height="45" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="655" y="355" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Rotate keys regularly (90 days) and on compromise</text>
  <text x="655" y="373" text-anchor="middle" font-size="9" fill="#1a1822">Automate rotation with zero-downtime overlap period</text>

  <rect x="50" y="390" width="390" height="45" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="245" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Monitor usage patterns and alert on anomalies</text>
  <text x="245" y="428" text-anchor="middle" font-size="9" fill="#1a1822">Unusual IP, spike in requests, scope escalation</text>

  <rect x="460" y="390" width="390" height="45" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="655" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Implement rate limiting and quota per key</text>
  <text x="655" y="428" text-anchor="middle" font-size="9" fill="#1a1822">Prevent abuse and limit blast radius if key is compromised</text>

  <defs>
    <marker id="arrowAPI" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>