<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Rate limiting strategy showing per-user, per-IP, per-endpoint, and global rate limits with their scopes</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Rate Limiting Strategies: Multi-Tier Protection</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Apply rate limits at multiple levels — user, IP, endpoint, and global — for comprehensive protection</text>

  <!-- Per-User Limits -->
  <rect x="30" y="80" width="270" height="200" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="35" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="105" width="270" height="10" fill="#6d5bd0"/>
  <text x="165" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Per-User Limits</text>

  <rect x="50" y="125" width="230" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="145" text-anchor="middle" font-size="10" fill="#1a1822">Key: user_id or API key</text>
  <text x="165" y="163" text-anchor="middle" font-size="9" fill="#64748b">Most common and fair approach</text>

  <rect x="50" y="185" width="230" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="205" text-anchor="middle" font-size="10" fill="#1a1822">Tier-based limits: Free=100/min,</text>
  <text x="165" y="223" text-anchor="middle" font-size="9" fill="#64748b">Pro=1000/min, Enterprise=10000/min</text>

  <rect x="50" y="245" width="230" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="262" text-anchor="middle" font-size="9" fill="#64748b">Requires authentication</text>

  <!-- Per-IP Limits -->
  <rect x="320" y="80" width="270" height="200" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="320" y="80" width="270" height="35" rx="10" fill="#f0ad4e"/>
  <rect x="320" y="105" width="270" height="10" fill="#f0ad4e"/>
  <text x="455" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Per-IP Limits</text>

  <rect x="340" y="125" width="230" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="455" y="145" text-anchor="middle" font-size="10" fill="#1a1822">Key: client IP address</text>
  <text x="455" y="163" text-anchor="middle" font-size="9" fill="#64748b">No authentication required</text>

  <rect x="340" y="185" width="230" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="455" y="205" text-anchor="middle" font-size="10" fill="#1a1822">Protects against anonymous abuse</text>
  <text x="455" y="223" text-anchor="middle" font-size="9" fill="#64748b">DDoS, scraping, credential stuffing</text>

  <rect x="340" y="245" width="230" height="25" rx="4" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="455" y="262" text-anchor="middle" font-size="9" fill="#cc4444">NAT/CGNAT: shared IP problem</text>

  <!-- Per-Endpoint Limits -->
  <rect x="610" y="80" width="270" height="200" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="610" y="80" width="270" height="35" rx="10" fill="#4caf50"/>
  <rect x="610" y="105" width="270" height="10" fill="#4caf50"/>
  <text x="745" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Per-Endpoint Limits</text>

  <rect x="630" y="125" width="230" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="145" text-anchor="middle" font-size="10" fill="#1a1822">Key: endpoint path + identifier</text>
  <text x="745" y="163" text-anchor="middle" font-size="9" fill="#64748b">Different limits per endpoint</text>

  <rect x="630" y="185" width="230" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="205" text-anchor="middle" font-size="10" fill="#1a1822">Login: 5/min, Search: 30/min,</text>
  <text x="745" y="223" text-anchor="middle" font-size="9" fill="#64748b">Data export: 2/hour</text>

  <rect x="630" y="245" width="230" height="25" rx="4" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="262" text-anchor="middle" font-size="9" fill="#64748b">Expensive endpoints get stricter limits</text>

  <!-- Global Limits -->
  <rect x="30" y="300" width="410" height="180" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="30" y="300" width="410" height="35" rx="10" fill="#cc4444"/>
  <rect x="30" y="325" width="410" height="10" fill="#cc4444"/>
  <text x="235" y="323" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Global Limits</text>

  <rect x="50" y="345" width="370" height="50" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="235" y="365" text-anchor="middle" font-size="10" fill="#1a1822">Key: none (applies to all requests)</text>
  <text x="235" y="383" text-anchor="middle" font-size="9" fill="#64748b">Protects overall system capacity</text>

  <rect x="50" y="405" width="370" height="50" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="235" y="425" text-anchor="middle" font-size="10" fill="#1a1822">Example: 10,000 requests/min across all users</text>
  <text x="235" y="443" text-anchor="middle" font-size="9" fill="#64748b">Prevents system overload during traffic spikes</text>

  <!-- Defense layers -->
  <rect x="460" y="300" width="410" height="180" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="665" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Multi-Tier Defense Strategy</text>

  <rect x="480" y="345" width="370" height="30" rx="4" fill="#f0f0f5"/>
  <text x="665" y="365" text-anchor="middle" font-size="9" fill="#1a1822">Layer 1: Global limit (protects infrastructure)</text>

  <rect x="480" y="380" width="370" height="30" rx="4" fill="#f0f0f5"/>
  <text x="665" y="400" text-anchor="middle" font-size="9" fill="#1a1822">Layer 2: Per-endpoint limit (protects expensive operations)</text>

  <rect x="480" y="415" width="370" height="30" rx="4" fill="#f0f0f5"/>
  <text x="665" y="435" text-anchor="middle" font-size="9" fill="#1a1822">Layer 3: Per-user limit (fair usage, tier enforcement)</text>

  <rect x="480" y="450" width="370" height="30" rx="4" fill="#f0f0f5"/>
  <text x="665" y="470" text-anchor="middle" font-size="9" fill="#1a1822">Layer 4: Per-IP limit (anonymous abuse prevention)</text>
</svg>