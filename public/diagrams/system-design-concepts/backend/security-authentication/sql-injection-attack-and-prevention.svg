<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 750" role="img" aria-labelledby="title desc">
  <title id="title">SQL Injection Attack and Prevention</title>
  <desc id="desc">Comprehensive visualization of SQL injection attack vectors, exploitation techniques, and prevention mechanisms including parameterized queries and input validation</desc>
  
  <!-- Background -->
  <rect width="950" height="750" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b)">SQL Injection (SQLi) Attack and Prevention</text>
  <text x="475" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">How attackers exploit vulnerable queries and how to prevent it</text>
  
  <!-- Attack Section -->
  <rect x="30" y="80" width="890" height="280" rx="8" fill="var(--bg-panel-hover, #fef2f2)" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="475" y="108" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #b91c1c)">SQL Injection Attack Vectors</text>
  
  <!-- Attacker -->
  <rect x="60" y="135" width="140" height="70" rx="6" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="130" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Attacker</text>
  <text x="130" y="185" text-anchor="middle" font-size="11" fill="#fca5a5">Malicious Input</text>
  
  <!-- Vulnerable App -->
  <rect x="280" y="135" width="160" height="70" rx="6" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="360" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Vulnerable</text>
  <text x="360" y="185" text-anchor="middle" font-size="11" fill="#fcd34d">String Concatenation</text>
  
  <!-- Database -->
  <rect x="520" y="135" width="140" height="70" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="590" y="165" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Database</text>
  <text x="590" y="185" text-anchor="middle" font-size="11" fill="#6ee7b7">SQL Server</text>
  
  <!-- Data Exfiltration -->
  <rect x="740" y="135" width="140" height="70" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="810" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Data</text>
  <text x="810" y="185" text-anchor="middle" font-size="11" fill="#c4b5fd">Exfiltrated</text>
  
  <!-- Attack Flow Arrows -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #8b5cf6)"/>
    </marker>
  </defs>
  
  <line x1="200" y1="170" x2="275" y2="170" stroke="var(--text-theme, #ef4444)" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="237" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #b91c1c)">1. Input</text>
  
  <line x1="440" y1="170" x2="515" y2="170" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="477" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309)">2. Execute</text>
  
  <line x1="660" y1="170" x2="735" y2="170" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="697" y="165" text-anchor="middle" font-size="9" fill="var(--text-theme, #059669)">3. Query</text>
  
  <line x1="660" y1="190" x2="735" y2="190" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="697" y="215" text-anchor="middle" font-size="9" fill="var(--text-theme, #6d28d9)">4. Extract</text>
  
  <!-- Attack Examples -->
  <rect x="60" y="230" width="860" height="115" rx="6" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="1"/>
  <text x="490" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b91c1c)">Common SQL Injection Payloads</text>
  
  <!-- Example 1 -->
  <rect x="75" y="270" width="270" height="65" rx="4" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="210" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b91c1c)">Authentication Bypass</text>
  <text x="210" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)" font-family="monospace">Input: admin' OR '1'='1</text>
  <text x="210" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Result: Logs in as admin</text>
  
  <!-- Example 2 -->
  <rect x="360" y="270" width="270" height="65" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="495" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309)">UNION-based Data Extraction</text>
  <text x="495" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)" font-family="monospace">Input: ' UNION SELECT</text>
  <text x="495" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Result: Extract other tables</text>
  
  <!-- Example 3 -->
  <rect x="645" y="270" width="260" height="65" rx="4" fill="var(--bg-panel-soft, #dbeafe)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="775" y="290" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e40af)">Blind SQL Injection</text>
  <text x="775" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)" font-family="monospace">Input: ' AND SLEEP(5)</text>
  <text x="775" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Result: Time-based extraction</text>
  
  <!-- Prevention Section -->
  <rect x="30" y="380" width="890" height="350" rx="8" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="475" y="408" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #059669)">SQL Injection Prevention Strategies</text>
  
  <!-- Prevention 1: Parameterized Queries -->
  <rect x="50" y="435" width="275" height="280" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <rect x="50" y="435" width="275" height="35" rx="6" fill="var(--bg-theme, #10b981)"/>
  <text x="187" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="white">1. Parameterized Queries</text>
  
  <text x="187" y="495" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">Use prepared statements</text>
  <text x="187" y="512" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">with placeholders</text>
  
  <rect x="65" y="525" width="245" height="100" rx="4" fill="var(--bg-panel-hover, #f0fdf4)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="187" y="545" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b)">Vulnerable (DON'T DO):</text>
  <text x="187" y="562" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444)" font-family="monospace">query = "SELECT * FROM users</text>
  <text x="187" y="575" text-anchor="middle" font-size="8" fill="var(--text-theme, #ef4444)" font-family="monospace">WHERE name = '" + userInput + "'"</text>
  
  <text x="187" y="595" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b)">Safe (DO THIS):</text>
  <text x="187" y="612" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981)" font-family="monospace">query = "SELECT * FROM users</text>
  <text x="187" y="625" text-anchor="middle" font-size="8" fill="var(--text-theme, #10b981)" font-family="monospace">WHERE name = ?"</text>
  
  <rect x="65" y="635" width="245" height="65" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="187" y="655" text-anchor="middle" font-size="10" font-weight="bold" fill="white">✓ Input treated as data</text>
  <text x="187" y="672" text-anchor="middle" font-size="10" font-weight="bold" fill="white">✓ SQL structure preserved</text>
  <text x="187" y="689" text-anchor="middle" font-size="10" font-weight="bold" fill="white">✓ Injection impossible</text>
  
  <!-- Prevention 2: Input Validation -->
  <rect x="340" y="435" width="275" height="280" rx="6" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <rect x="340" y="435" width="275" height="35" rx="6" fill="var(--bg-theme, #3b82f6)"/>
  <text x="477" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="white">2. Input Validation</text>
  
  <text x="477" y="495" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">Validate and sanitize</text>
  <text x="477" y="512" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">all user input</text>
  
  <rect x="355" y="525" width="245" height="100" rx="4" fill="var(--bg-panel-hover, #eff6ff)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="477" y="545" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b)">Validation Layers:</text>
  <text x="370" y="565" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Whitelist allowed characters</text>
  <text x="370" y="582" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Enforce length limits</text>
  <text x="370" y="599" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Type checking (int, email, etc.)</text>
  <text x="370" y="616" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Pattern matching (regex)</text>
  
  <rect x="355" y="635" width="245" height="65" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="477" y="655" text-anchor="middle" font-size="10" font-weight="bold" fill="white">⚠ Never trust client input</text>
  <text x="477" y="672" text-anchor="middle" font-size="10" font-weight="bold" fill="white">⚠ Validate on server-side</text>
  <text x="477" y="689" text-anchor="middle" font-size="10" font-weight="bold" fill="white">⚠ Defense in depth</text>
  
  <!-- Prevention 3: ORM &amp; Stored Procedures -->
  <rect x="630" y="435" width="275" height="280" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <rect x="630" y="435" width="275" height="35" rx="6" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="767" y="460" text-anchor="middle" font-size="14" font-weight="bold" fill="white">3. ORM / Stored Procs</text>
  
  <text x="767" y="495" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">Use abstraction layers</text>
  <text x="767" y="512" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">that handle escaping</text>
  
  <rect x="645" y="525" width="245" height="100" rx="4" fill="var(--bg-panel-hover, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  <text x="767" y="545" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b)">ORM Examples:</text>
  <text x="660" y="565" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Hibernate (Java)</text>
  <text x="660" y="582" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Entity Framework (.NET)</text>
  <text x="660" y="599" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• SQLAlchemy (Python)</text>
  <text x="660" y="616" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b)">• Sequelize (Node.js)</text>
  
  <rect x="645" y="635" width="245" height="65" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="767" y="655" text-anchor="middle" font-size="10" font-weight="bold" fill="white">✓ Automatic escaping</text>
  <text x="767" y="672" text-anchor="middle" font-size="10" font-weight="bold" fill="white">✓ Type safety</text>
  <text x="767" y="689" text-anchor="middle" font-size="10" font-weight="bold" fill="white">✓ Query building</text>
  
  <!-- Additional Defenses -->
  <rect x="30" y="745" width="890" height="95" rx="6" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="475" y="770" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309)">Additional Defense Layers</text>
  
  <rect x="50" y="780" width="170" height="50" rx="4" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="135" y="800" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Least Privilege</text>
  <text x="135" y="817" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">DB user permissions</text>
  
  <rect x="235" y="780" width="170" height="50" rx="4" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="320" y="800" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">WAF Rules</text>
  <text x="320" y="817" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Block SQLi patterns</text>
  
  <rect x="420" y="780" width="170" height="50" rx="4" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="505" y="800" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Error Handling</text>
  <text x="505" y="817" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">No SQL errors to users</text>
  
  <rect x="605" y="780" width="170" height="50" rx="4" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="690" y="800" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Regular Audits</text>
  <text x="690" y="817" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Pentesting &amp; scans</text>
  
  <rect x="790" y="780" width="120" height="50" rx="4" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="850" y="800" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Monitoring</text>
  <text x="850" y="817" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Anomaly detection</text>
</svg>
