<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" role="img" aria-labelledby="title desc">
  <title id="title">Input Validation and Sanitization</title>
  <desc id="desc">Comprehensive visualization of input validation vs sanitization, allowlist vs blocklist approaches, and context-specific encoding strategies</desc>
  
  <!-- Background -->
  <rect width="950" height="700" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b)">Input Validation &amp; Sanitization</text>
  <text x="475" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">First line of defense against injection attacks</text>
  
  <!-- Validation vs Sanitization -->
  <rect x="30" y="80" width="890" height="180" rx="8" fill="var(--bg-panel-hover, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="475" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #1e40af">Validation vs Sanitization</text>
  
  <!-- Validation -->
  <rect x="50" y="125" width="420" height="125" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="260" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #059669">Validation (Accept/Reject)</text>
  
  <rect x="70" y="165" width="380" height="75" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="260" y="185" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">Checks if input meets criteria BEFORE processing</text>
  
  <text x="85" y="210" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Email format validation</text>
  <text x="85" y="225" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Phone number format</text>
  <text x="260" y="210" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Age must be positive</text>
  <text x="260" y="225" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ File size limits</text>
  
  <!-- Sanitization -->
  <rect x="500" y="125" width="400" height="125" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="700" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b45309">Sanitization (Clean/Transform)</text>
  
  <rect x="520" y="165" width="360" height="75" rx="4" fill="var(--bg-panel-soft, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="700" y="185" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">Removes or escapes dangerous characters</text>
  
  <text x="535" y="210" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ HTML entity encoding</text>
  <text x="535" y="225" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ SQL special character escaping</text>
  <text x="700" y="210" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Strip script tags</text>
  <text x="700" y="225" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Normalize Unicode</text>
  
  <!-- Allowlist vs Blocklist -->
  <rect x="30" y="275" width="570" height="250" rx="8" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="315" y="300" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b45309">Allowlist vs Blocklist</text>
  
  <!-- Allowlist -->
  <rect x="50" y="320" width="260" height="195" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="180" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #059669">Allowlist (Whitelist)</text>
  
  <rect x="70" y="360" width="220" height="145" rx="4" fill="var(--bg-panel-hover, #ecfdf5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="180" y="380" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #059669">"Allow only known good"</text>
  
  <text x="85" y="405" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ More secure approach</text>
  <text x="85" y="420" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Default deny</text>
  <text x="85" y="435" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Prevents unknown attacks</text>
  <text x="85" y="450" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ Requires maintenance</text>
  <text x="85" y="465" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ May block valid input</text>
  <text x="85" y="485" text-anchor="start" font-size="9" font-weight="bold" fill="var(--text-theme, #059669">Example:</text>
  <text x="85" y="500" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b" font-family="monospace">Allowed: [a-zA-Z0-9]</text>
  
  <!-- Blocklist -->
  <rect x="330" y="320" width="260" height="195" rx="6" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="1"/>
  <text x="460" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #b91c1c">Blocklist (Blacklist)</text>
  
  <rect x="350" y="360" width="220" height="145" rx="4" fill="var(--bg-panel-hover, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="460" y="380" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #b91c1c">"Block known bad"</text>
  
  <text x="365" y="405" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Easier to implement</text>
  <text x="365" y="420" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Less maintenance</text>
  <text x="365" y="435" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ Less secure</text>
  <text x="365" y="450" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ Misses new attacks</text>
  <text x="365" y="465" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ Bypass possible</text>
  <text x="365" y="485" text-anchor="start" font-size="9" font-weight="bold" fill="var(--text-theme, #b91c1c">Example:</text>
  <text x="365" y="500" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b" font-family="monospace">Block: &lt;script&gt;, DROP TABLE</text>
  
  <!-- Context-Specific Encoding -->
  <rect x="615" y="275" width="305" height="250" rx="8" fill="var(--bg-panel-soft, #f0fdf4)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="767" y="300" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">Context-Specific Encoding</text>
  
  <!-- HTML Context -->
  <rect x="630" y="320" width="275" height="55" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #059669">HTML Body Context</text>
  <text x="767" y="365" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">&lt; → &amp;lt;  &gt; → &amp;gt;</text>
  
  <!-- Attribute Context -->
  <rect x="630" y="380" width="275" height="55" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #059669">HTML Attribute Context</text>
  <text x="767" y="425" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">" → &amp;quot;  ' → &amp;#x27;</text>
  
  <!-- JavaScript Context -->
  <rect x="630" y="440" width="275" height="55" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="465" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #059669">JavaScript Context</text>
  <text x="767" y="485" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">\ → \\  " → \"  &lt; → \u003C</text>
  
  <!-- URL Context -->
  <rect x="630" y="500" width="275" height="55" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="525" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #059669">URL Parameter Context</text>
  <text x="767" y="545" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">space → %20  &amp; → %26</text>
  
  <!-- Validation Pipeline -->
  <rect x="30" y="540" width="890" height="140" rx="8" fill="var(--bg-panel-hover, #faf5ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="475" y="565" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #6d28d9">Input Validation Pipeline</text>
  
  <!-- Step 1: Length Check -->
  <rect x="50" y="585" width="150" height="85" rx="6" fill="white" stroke="var(--border-theme, #a78bfa)" stroke-width="1"/>
  <text x="125" y="610" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #6d28d9">1. Length Check</text>
  <text x="125" y="630" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Min/Max length</text>
  <text x="125" y="645" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Byte size limits</text>
  <text x="125" y="660" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Reject oversized</text>
  
  <!-- Arrow -->
  <line x1="200" y1="627" x2="230" y2="627" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Character Set -->
  <rect x="235" y="585" width="150" height="85" rx="6" fill="white" stroke="var(--border-theme, #a78bfa)" stroke-width="1"/>
  <text x="310" y="610" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #6d28d9">2. Character Set</text>
  <text x="310" y="630" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Allowlist chars</text>
  <text x="310" y="645" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Unicode normalization</text>
  <text x="310" y="660" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Reject null bytes</text>
  
  <!-- Arrow -->
  <line x1="385" y1="627" x2="415" y2="627" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: Format Validation -->
  <rect x="420" y="585" width="150" height="85" rx="6" fill="white" stroke="var(--border-theme, #a78bfa)" stroke-width="1"/>
  <text x="495" y="610" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #6d28d9">3. Format Validation</text>
  <text x="495" y="630" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Regex patterns</text>
  <text x="495" y="645" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Type checking</text>
  <text x="495" y="660" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Schema validation</text>
  
  <!-- Arrow -->
  <line x1="570" y1="627" x2="600" y2="627" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Sanitization -->
  <rect x="605" y="585" width="150" height="85" rx="6" fill="white" stroke="var(--border-theme, #a78bfa)" stroke-width="1"/>
  <text x="680" y="610" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #6d28d9">4. Sanitization</text>
  <text x="680" y="630" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Context encoding</text>
  <text x="680" y="645" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Strip dangerous</text>
  <text x="680" y="660" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Normalize input</text>
  
  <!-- Arrow -->
  <line x1="755" y1="627" x2="785" y2="627" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5: Business Logic -->
  <rect x="790" y="585" width="120" height="85" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="850" y="620" text-anchor="middle" font-size="11" font-weight="bold" fill="white">5. Process</text>
  <text x="850" y="645" text-anchor="middle" font-size="10" fill="#6ee7b7">Valid Input</text>
  <text x="850" y="660" text-anchor="middle" font-size="9" fill="#6ee7b7">Accepted</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
