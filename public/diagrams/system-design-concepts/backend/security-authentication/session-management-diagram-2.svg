<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Session storage comparison: server-side sessions, JWT sessions, and distributed session stores</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Session Storage Patterns</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Server-side sessions, JWT-based sessions, and distributed session stores compared</text>

  <!-- Server-side sessions -->
  <rect x="30" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="40" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="110" width="270" height="10" fill="#6d5bd0"/>
  <text x="165" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Server-Side Sessions</text>

  <rect x="50" y="130" width="230" height="60" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">How it works:</text>
  <text x="165" y="172" text-anchor="middle" font-size="9" fill="#1a1822">Session data stored on server</text>
  <text x="165" y="185" text-anchor="middle" font-size="9" fill="#1a1822">Client receives session ID cookie</text>

  <rect x="50" y="200" width="230" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Pros:</text>
  <text x="165" y="240" text-anchor="middle" font-size="9" fill="#1a1822">Immediate revocation</text>
  <text x="165" y="253" text-anchor="middle" font-size="9" fill="#1a1822">Server controls session state</text>

  <rect x="50" y="270" width="230" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="165" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Cons:</text>
  <text x="165" y="310" text-anchor="middle" font-size="9" fill="#1a1822">Server lookup per request</text>
  <text x="165" y="323" text-anchor="middle" font-size="9" fill="#1a1822">Scaling requires sticky sessions</text>

  <rect x="50" y="340" width="230" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="360" text-anchor="middle" font-size="9" fill="#1a1822">Best for: Single-server apps,</text>
  <text x="165" y="376" text-anchor="middle" font-size="9" fill="#1a1822">high-security requirements</text>

  <!-- JWT sessions -->
  <rect x="320" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="320" y="80" width="270" height="40" rx="10" fill="#f0ad4e"/>
  <rect x="320" y="110" width="270" height="10" fill="#f0ad4e"/>
  <text x="455" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">JWT-Based Sessions</text>

  <rect x="340" y="130" width="230" height="60" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="455" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">How it works:</text>
  <text x="455" y="172" text-anchor="middle" font-size="9" fill="#1a1822">Session data encoded in JWT</text>
  <text x="455" y="185" text-anchor="middle" font-size="9" fill="#1a1822">Self-contained, stateless</text>

  <rect x="340" y="200" width="230" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="455" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Pros:</text>
  <text x="455" y="240" text-anchor="middle" font-size="9" fill="#1a1822">Stateless validation</text>
  <text x="455" y="253" text-anchor="middle" font-size="9" fill="#1a1822">No server lookup, scales easily</text>

  <rect x="340" y="270" width="230" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="455" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Cons:</text>
  <text x="455" y="310" text-anchor="middle" font-size="9" fill="#1a1822">Cannot revoke until expiry</text>
  <text x="455" y="323" text-anchor="middle" font-size="9" fill="#1a1822">Larger payload (base64url)</text>

  <rect x="340" y="340" width="230" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="455" y="360" text-anchor="middle" font-size="9" fill="#1a1822">Best for: Distributed systems,</text>
  <text x="455" y="376" text-anchor="middle" font-size="9" fill="#1a1822">APIs, microservices</text>

  <!-- Distributed sessions -->
  <rect x="610" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="610" y="80" width="270" height="40" rx="10" fill="#4caf50"/>
  <rect x="610" y="110" width="270" height="10" fill="#4caf50"/>
  <text x="745" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Distributed Sessions</text>

  <rect x="630" y="130" width="230" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">How it works:</text>
  <text x="745" y="172" text-anchor="middle" font-size="9" fill="#1a1822">Sessions in Redis/Memcached</text>
  <text x="745" y="185" text-anchor="middle" font-size="9" fill="#1a1822">All servers share session store</text>

  <rect x="630" y="200" width="230" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Pros:</text>
  <text x="745" y="240" text-anchor="middle" font-size="9" fill="#1a1822">Immediate revocation</text>
  <text x="745" y="253" text-anchor="middle" font-size="9" fill="#1a1822">Scales horizontally, no sticky</text>

  <rect x="630" y="270" width="230" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="745" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Cons:</text>
  <text x="745" y="310" text-anchor="middle" font-size="9" fill="#1a1822">Session store is dependency</text>
  <text x="745" y="323" text-anchor="middle" font-size="9" fill="#1a1822">Network latency per request</text>

  <rect x="630" y="340" width="230" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="360" text-anchor="middle" font-size="9" fill="#1a1822">Best for: Multi-server apps</text>
  <text x="745" y="376" text-anchor="middle" font-size="9" fill="#1a1822">requiring revocation</text>

  <!-- Bottom comparison -->
  <rect x="30" y="470" width="840" height="20" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="484" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Recommendation: Use distributed sessions (Redis) for most production systems. JWTs for stateless APIs. Server-side for simple apps.</text>
</svg>