<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Password hashing flow showing plaintext password, salt generation, hashing with bcrypt/Argon2, and stored hash</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Password Hashing with Salt: How Passwords Are Securely Stored</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Passwords are never stored in plaintext — they are hashed with a unique salt using a slow hash function</text>

  <!-- Input -->
  <rect x="50" y="100" width="160" height="80" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="130" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#cc4444">User Password</text>
  <text x="130" y="150" text-anchor="middle" font-size="10" fill="#1a1822">"myP@ssw0rd!"</text>
  <text x="130" y="168" text-anchor="middle" font-size="9" fill="#64748b">Plaintext, never stored</text>

  <!-- Salt generation -->
  <rect x="260" y="100" width="160" height="80" rx="10" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="2"/>
  <text x="340" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Generate Salt</text>
  <text x="340" y="150" text-anchor="middle" font-size="10" fill="#1a1822">Random 128-bit value</text>
  <text x="340" y="168" text-anchor="middle" font-size="9" fill="#64748b">Unique per password</text>

  <!-- Hashing -->
  <rect x="470" y="80" width="180" height="120" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="560" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#f0ad4e">Slow Hash Function</text>
  <text x="560" y="128" text-anchor="middle" font-size="10" fill="#1a1822">bcrypt / Argon2id</text>
  <text x="560" y="145" text-anchor="middle" font-size="10" fill="#1a1822">hash(password + salt)</text>
  <text x="560" y="162" text-anchor="middle" font-size="9" fill="#64748b">Configurable work factor</text>
  <text x="560" y="178" text-anchor="middle" font-size="9" fill="#64748b">Memory-hard (Argon2)</text>
  <text x="560" y="194" text-anchor="middle" font-size="9" fill="#64748b">Resists GPU/ASIC attacks</text>

  <!-- Stored result -->
  <rect x="700" y="100" width="160" height="80" rx="10" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="2"/>
  <text x="780" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#4caf50">Stored in Database</text>
  <text x="780" y="150" text-anchor="middle" font-size="9" fill="#1a1822">$argon2id$v=19$m=65536,</text>
  <text x="780" y="165" text-anchor="middle" font-size="9" fill="#1a1822">t=3,p=4$salt$hash</text>

  <!-- Arrows -->
  <line x1="210" y1="140" x2="260" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowHash)"/>
  <line x1="420" y1="140" x2="470" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowHash)"/>
  <line x1="650" y1="140" x2="700" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrowHash)"/>

  <!-- Verification flow -->
  <rect x="30" y="240" width="840" height="120" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="268" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Password Verification Flow</text>

  <rect x="50" y="285" width="250" height="60" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="175" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">1. User submits password</text>
  <text x="175" y="325" text-anchor="middle" font-size="9" fill="#64748b">During login attempt</text>
  <text x="175" y="340" text-anchor="middle" font-size="9" fill="#64748b">Over HTTPS (encrypted)</text>

  <rect x="320" y="285" width="250" height="60" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="445" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">2. Retrieve stored hash + salt</text>
  <text x="445" y="325" text-anchor="middle" font-size="9" fill="#64748b">From database by username</text>
  <text x="445" y="340" text-anchor="middle" font-size="9" fill="#64748b">Extract salt from stored hash</text>

  <rect x="590" y="285" width="260" height="60" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="720" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">3. Hash submitted password + salt</text>
  <text x="720" y="325" text-anchor="middle" font-size="9" fill="#64748b">Same algorithm, same salt</text>
  <text x="720" y="340" text-anchor="middle" font-size="9" fill="#64748b">Compare: match → authenticate</text>

  <!-- Algorithm comparison -->
  <rect x="30" y="380" width="840" height="100" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Hashing Algorithm Comparison</text>

  <rect x="50" y="420" width="190" height="50" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="145" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">MD5, SHA-1, SHA-256</text>
  <text x="145" y="458" text-anchor="middle" font-size="9" fill="#1a1822">DO NOT USE — too fast</text>

  <rect x="260" y="420" width="190" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="355" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">PBKDF2</text>
  <text x="355" y="458" text-anchor="middle" font-size="9" fill="#1a1822">Acceptable, not memory-hard</text>

  <rect x="470" y="420" width="190" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="565" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">bcrypt</text>
  <text x="565" y="458" text-anchor="middle" font-size="9" fill="#1a1822">Recommended, widely supported</text>

  <rect x="680" y="420" width="190" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="775" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Argon2id</text>
  <text x="775" y="458" text-anchor="middle" font-size="9" fill="#1a1822">Best — memory-hard, GPU-resistant</text>

  <defs>
    <marker id="arrowHash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>