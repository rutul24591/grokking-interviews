<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 750" role="img" aria-labelledby="title desc">
  <title id="title">CORS - Cross-Origin Resource Sharing</title>
  <desc id="desc">Comprehensive visualization of CORS explaining same-origin policy, simple vs preflight requests, CORS headers, and common misconfigurations</desc>
  
  <!-- Background -->
  <rect width="950" height="750" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b)">CORS - Cross-Origin Resource Sharing</text>
  <text x="475" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Understanding same-origin policy and cross-origin requests</text>
  
  <!-- Same-Origin Policy Section -->
  <rect x="30" y="80" width="890" height="140" rx="8" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="475" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b45309">Same-Origin Policy (SOP)</text>
  
  <!-- Same Origin Example -->
  <rect x="50" y="125" width="420" height="85" rx="6" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="260" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #059669">✓ Same Origin (Allowed)</text>
  
  <rect x="70" y="165" width="170" height="35" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="155" y="187" text-anchor="middle" font-size="9" fill="white">https://example.com</text>
  
  <text x="260" y="187" text-anchor="middle" font-size="14" fill="var(--text-theme, #64748b">→</text>
  
  <rect x="280" y="165" width="170" height="35" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="365" y="187" text-anchor="middle" font-size="9" fill="white">https://example.com</text>
  
  <text x="260" y="205" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Protocol + Domain + Port match</text>
  
  <!-- Different Origin Example -->
  <rect x="500" y="125" width="400" height="85" rx="6" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="1"/>
  <text x="700" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #b91c1c">✗ Different Origin (Blocked)</text>
  
  <rect x="520" y="165" width="150" height="35" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="595" y="187" text-anchor="middle" font-size="9" fill="white">https://example.com</text>
  
  <text x="700" y="187" text-anchor="middle" font-size="14" fill="var(--text-theme, #64748b">→</text>
  
  <rect x="720" y="165" width="150" height="35" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="795" y="187" text-anchor="middle" font-size="9" fill="white">https://api.other.com</text>
  
  <text x="700" y="205" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Domain mismatch - requires CORS</text>
  
  <!-- CORS Request Types Section -->
  <rect x="30" y="235" width="570" height="300" rx="8" fill="var(--bg-panel-soft, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="315" y="260" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #1e40af">CORS Request Types</text>
  
  <!-- Simple Request -->
  <rect x="50" y="280" width="530" height="115" rx="6" fill="white" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="315" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e40af">Simple Request (No Preflight)</text>
  
  <!-- Simple Request Flow -->
  <rect x="70" y="320" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="345" text-anchor="middle" font-size="9" fill="white">Browser</text>
  
  <line x1="170" y1="345" x2="210" y2="345" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="190" y="335" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">GET/POST</text>
  
  <rect x="215" y="320" width="100" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="265" y="345" text-anchor="middle" font-size="9" fill="white">Server</text>
  
  <line x1="315" y1="345" x2="355" y2="345" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="335" y="335" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Access-Control-</text>
  <text x="335" y="365" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Allow-Origin: *</text>
  
  <rect x="360" y="320" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="410" y="345" text-anchor="middle" font-size="9" fill="white">Browser</text>
  
  <text x="315" y="385" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Methods: GET, POST, HEAD | Headers: Accept, Content-Type (simple types)</text>
  
  <!-- Preflight Request -->
  <rect x="50" y="410" width="530" height="115" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="315" y="435" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #b45309">Preflight Request (OPTIONS)</text>
  
  <!-- Preflight Flow -->
  <rect x="70" y="450" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="475" text-anchor="middle" font-size="9" fill="white">Browser</text>
  
  <line x1="170" y1="465" x2="210" y2="465" stroke="var(--text-theme, #f59e0b)" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="190" y="455" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">OPTIONS</text>
  <text x="190" y="485" text-anchor="middle" font-size="7" fill="var(--text-theme, #64748b">Preflight</text>
  
  <rect x="215" y="450" width="100" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="265" y="475" text-anchor="middle" font-size="9" fill="white">Server</text>
  
  <line x1="315" y1="465" x2="355" y2="465" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="335" y="455" text-anchor="middle" font-size="7" fill="var(--text-theme, #1e293b">Access-Control-</text>
  <text x="335" y="485" text-anchor="middle" font-size="7" fill="var(--text-theme, #1e293b">Allow-* headers</text>
  
  <rect x="360" y="450" width="100" height="50" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="410" y="475" text-anchor="middle" font-size="9" fill="white">Browser</text>
  
  <line x1="460" y1="475" x2="500" y2="475" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="480" y="465" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Actual</text>
  <text x="480" y="495" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Request</text>
  
  <rect x="505" y="450" width="60" height="50" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="535" y="480" text-anchor="middle" font-size="9" fill="white">Server</text>
  
  <text x="315" y="515" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Triggers: Non-simple methods (PUT, DELETE), custom headers, non-simple Content-Type</text>
  
  <!-- CORS Headers Section -->
  <rect x="615" y="235" width="305" height="300" rx="8" fill="var(--bg-panel-hover, #f0fdf4)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="767" y="260" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">Essential CORS Headers</text>
  
  <!-- Request Headers -->
  <rect x="630" y="280" width="275" height="100" rx="4" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="1"/>
  <text x="767" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e40af">Request Headers</text>
  
  <text x="645" y="325" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Origin:</text>
  <text x="720" y="325" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">https://example.com</text>
  
  <text x="645" y="345" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Access-Control-</text>
  <text x="645" y="358" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Request-Method:</text>
  <text x="720" y="358" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">POST</text>
  
  <text x="645" y="375" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Access-Control-</text>
  <text x="645" y="388" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Request-Headers:</text>
  <text x="720" y="388" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">X-Custom-Header</text>
  
  <!-- Response Headers -->
  <rect x="630" y="390" width="275" height="135" rx="4" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="1"/>
  <text x="767" y="415" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669">Response Headers</text>
  
  <text x="645" y="435" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Access-Control-</text>
  <text x="645" y="448" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Allow-Origin:</text>
  <text x="720" y="448" text-anchor="start" font-size="9" fill="var(--text-theme, #059669">*</text>
  
  <text x="645" y="465" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Access-Control-</text>
  <text x="645" y="478" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Allow-Methods:</text>
  <text x="720" y="478" text-anchor="start" font-size="9" fill="var(--text-theme, #059669">GET, POST</text>
  
  <text x="645" y="495" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Access-Control-</text>
  <text x="645" y="508" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Allow-Headers:</text>
  <text x="720" y="508" text-anchor="start" font-size="9" fill="var(--text-theme, #059669">Content-Type</text>
  
  <text x="645" y="525" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Access-Control-</text>
  <text x="645" y="538" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Allow-Credentials:</text>
  <text x="720" y="538" text-anchor="start" font-size="9" fill="var(--text-theme, #059669">true</text>
  
  <!-- Common Misconfigurations -->
  <rect x="30" y="550" width="890" height="180" rx="8" fill="var(--bg-panel-hover, #fef2f2)" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="475" y="575" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b91c1c">Common CORS Misconfigurations</text>
  
  <!-- Misconfig 1 -->
  <rect x="50" y="590" width="270" height="130" rx="6" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="185" y="615" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b91c1c">✗ Wildcard with Credentials</text>
  
  <text x="185" y="640" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Access-Control-Allow-Origin: *</text>
  <text x="185" y="655" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Access-Control-Allow-Credentials: true</text>
  
  <rect x="70" y="670" width="230" height="40" rx="4" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="185" y="690" text-anchor="middle" font-size="8" fill="var(--text-theme, #b91c1c">⚠️ INVALID: Browsers reject this</text>
  <text x="185" y="705" text-anchor="middle" font-size="8" fill="var(--text-theme, #b91c1c">combination. Specify exact origin.</text>
  
  <!-- Misconfig 2 -->
  <rect x="340" y="590" width="270" height="130" rx="6" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="475" y="615" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b91c1c">✗ Reflecting User Input</text>
  
  <text x="475" y="640" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">Origin: https://evil.com</text>
  <text x="475" y="655" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">→ Access-Control-Allow-Origin:</text>
  <text x="475" y="670" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b" font-family="monospace">https://evil.com</text>
  
  <rect x="360" y="680" width="230" height="30" rx="4" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="475" y="700" text-anchor="middle" font-size="8" fill="var(--text-theme, #b91c1c">⚠️ Vulnerable to DNS rebinding</text>
  
  <!-- Misconfig 3 -->
  <rect x="630" y="590" width="270" height="130" rx="6" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="765" y="615" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b91c1c">✗ Missing Headers on Error</text>
  
  <text x="765" y="640" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">CORS headers only on 200 OK</text>
  <text x="765" y="655" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">4xx/5xx errors lack CORS headers</text>
  
  <rect x="650" y="680" width="230" height="30" rx="4" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="765" y="700" text-anchor="middle" font-size="8" fill="var(--text-theme, #b91c1c">⚠️ Browser blocks error responses</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #f59e0b)"/>
    </marker>
  </defs>
</svg>
