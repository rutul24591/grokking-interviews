<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Encryption types comparison showing symmetric, asymmetric, and envelope encryption patterns</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Encryption Types: Symmetric, Asymmetric, and Envelope Encryption</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Different encryption patterns for different use cases and security requirements</text>

  <!-- Symmetric -->
  <rect x="30" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="40" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="110" width="270" height="10" fill="#6d5bd0"/>
  <text x="165" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Symmetric Encryption</text>

  <rect x="50" y="130" width="230" height="60" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Same key for encrypt &amp; decrypt</text>
  <text x="165" y="170" text-anchor="middle" font-size="9" fill="#1a1822">AES-256, ChaCha20</text>
  <text x="165" y="185" text-anchor="middle" font-size="9" fill="#1a1822">Fast, efficient for bulk data</text>

  <rect x="50" y="200" width="230" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Pros:</text>
  <text x="165" y="240" text-anchor="middle" font-size="9" fill="#1a1822">Very fast, simple key management</text>
  <text x="165" y="253" text-anchor="middle" font-size="9" fill="#1a1822">Ideal for large data volumes</text>

  <rect x="50" y="270" width="230" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="165" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Cons:</text>
  <text x="165" y="310" text-anchor="middle" font-size="9" fill="#1a1822">Key distribution challenge</text>
  <text x="165" y="323" text-anchor="middle" font-size="9" fill="#1a1822">Same key = single point of failure</text>

  <rect x="50" y="340" width="230" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="360" text-anchor="middle" font-size="9" fill="#1a1822">Use: Database encryption, file encryption,</text>
  <text x="165" y="376" text-anchor="middle" font-size="9" fill="#1a1822">disk encryption, bulk data encryption</text>

  <rect x="50" y="400" width="230" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="420" text-anchor="middle" font-size="9" fill="#1a1822">Key size: 128, 192, 256 bits</text>
  <text x="165" y="436" text-anchor="middle" font-size="9" fill="#1a1822">AES-256 is industry standard</text>

  <!-- Asymmetric -->
  <rect x="320" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="320" y="80" width="270" height="40" rx="10" fill="#f0ad4e"/>
  <rect x="320" y="110" width="270" height="10" fill="#f0ad4e"/>
  <text x="455" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Asymmetric Encryption</text>

  <rect x="340" y="130" width="230" height="60" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="455" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Public key encrypts, private decrypts</text>
  <text x="455" y="170" text-anchor="middle" font-size="9" fill="#1a1822">RSA, ECDSA, Ed25519</text>
  <text x="455" y="185" text-anchor="middle" font-size="9" fill="#1a1822">Enables secure key exchange</text>

  <rect x="340" y="200" width="230" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="455" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Pros:</text>
  <text x="455" y="240" text-anchor="middle" font-size="9" fill="#1a1822">No shared secret needed</text>
  <text x="455" y="253" text-anchor="middle" font-size="9" fill="#1a1822">Enables digital signatures</text>

  <rect x="340" y="270" width="230" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="455" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Cons:</text>
  <text x="455" y="310" text-anchor="middle" font-size="9" fill="#1a1822">Slower than symmetric (100-1000x)</text>
  <text x="455" y="323" text-anchor="middle" font-size="9" fill="#1a1822">Larger ciphertext size</text>

  <rect x="340" y="340" width="230" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="455" y="360" text-anchor="middle" font-size="9" fill="#1a1822">Use: Key exchange, digital signatures,</text>
  <text x="455" y="376" text-anchor="middle" font-size="9" fill="#1a1822">TLS handshake, certificate validation</text>

  <rect x="340" y="400" width="230" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="455" y="420" text-anchor="middle" font-size="9" fill="#1a1822">Key size: RSA 2048-4096, EC 256-521</text>
  <text x="455" y="436" text-anchor="middle" font-size="9" fill="#1a1822">ECDSA preferred for new systems</text>

  <!-- Envelope -->
  <rect x="610" y="80" width="270" height="380" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="610" y="80" width="270" height="40" rx="10" fill="#4caf50"/>
  <rect x="610" y="110" width="270" height="10" fill="#4caf50"/>
  <text x="745" y="107" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Envelope Encryption</text>

  <rect x="630" y="130" width="230" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Symmetric DEK encrypted by KEK</text>
  <text x="745" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Data encrypted with DEK (AES-256)</text>
  <text x="745" y="185" text-anchor="middle" font-size="9" fill="#1a1822">DEK encrypted with KEK (RSA/KMS)</text>

  <rect x="630" y="200" width="230" height="60" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="745" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Pros:</text>
  <text x="745" y="240" text-anchor="middle" font-size="9" fill="#1a1822">Best of both worlds</text>
  <text x="745" y="253" text-anchor="middle" font-size="9" fill="#1a1822">Fast encryption, secure key management</text>

  <rect x="630" y="270" width="230" height="60" rx="6" fill="#cc4444" opacity="0.08" stroke="#cc4444" stroke-width="1"/>
  <text x="745" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#cc4444">Cons:</text>
  <text x="745" y="310" text-anchor="middle" font-size="9" fill="#1a1822">Complex key hierarchy</text>
  <text x="745" y="323" text-anchor="middle" font-size="9" fill="#1a1822">Requires KMS integration</text>

  <rect x="630" y="340" width="230" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="360" text-anchor="middle" font-size="9" fill="#1a1822">Use: Cloud storage (S3, GCS), database</text>
  <text x="745" y="376" text-anchor="middle" font-size="9" fill="#1a1822">encryption, compliance (HIPAA, PCI)</text>

  <rect x="630" y="400" width="230" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="420" text-anchor="middle" font-size="9" fill="#1a1822">AWS: KMS + S3 SSE-KMS</text>
  <text x="745" y="436" text-anchor="middle" font-size="9" fill="#1a1822">GCP: Cloud KMS + CMEK</text>
</svg>