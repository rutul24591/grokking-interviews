<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>WAF architecture showing how WAF sits between clients and application servers to filter malicious requests</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Web Application Firewall (WAF): Request Filtering Architecture</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">WAF inspects HTTP requests and blocks malicious traffic before it reaches the application</text>

  <!-- Clients -->
  <rect x="30" y="100" width="120" height="100" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="90" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#cc4444">Clients</text>
  <text x="90" y="150" text-anchor="middle" font-size="9" fill="#1a1822">Legitimate users</text>
  <text x="90" y="168" text-anchor="middle" font-size="9" fill="#1a1822">Bots, scrapers</text>
  <text x="90" y="186" text-anchor="middle" font-size="9" fill="#cc4444">Attackers</text>

  <!-- Arrow to WAF -->
  <line x1="150" y1="150" x2="280" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrowWAF)"/>
  <text x="215" y="140" text-anchor="middle" font-size="9" fill="#64748b">HTTP Requests</text>

  <!-- WAF -->
  <rect x="280" y="80" width="340" height="200" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="280" y="80" width="340" height="40" rx="12" fill="#6d5bd0"/>
  <rect x="280" y="110" width="340" height="10" fill="#6d5bd0"/>
  <text x="450" y="107" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Web Application Firewall</text>

  <!-- WAF Rules -->
  <rect x="300" y="130" width="300" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">SQL Injection Rules</text>
  <text x="450" y="163" text-anchor="middle" font-size="9" fill="#64748b">Blocks: SELECT, UNION, DROP, --, etc.</text>

  <rect x="300" y="178" width="300" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="196" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">XSS Rules</text>
  <text x="450" y="211" text-anchor="middle" font-size="9" fill="#64748b">Blocks: &lt;script&gt;, javascript:, onerror=, etc.</text>

  <rect x="300" y="226" width="300" height="40" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Rate Limiting &amp; Bot Detection</text>
  <text x="450" y="259" text-anchor="middle" font-size="9" fill="#64748b">Blocks: Excessive requests, known bad bots</text>

  <!-- Arrows from WAF -->
  <!-- Allowed -->
  <line x1="620" y1="130" x2="750" y2="130" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowWAF)"/>
  <rect x="650" y="115" width="70" height="20" rx="4" fill="#4caf50" opacity="0.2"/>
  <text x="685" y="130" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Allowed</text>

  <!-- Blocked -->
  <line x1="620" y1="230" x2="750" y2="230" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowWAF)"/>
  <rect x="650" y="215" width="70" height="20" rx="4" fill="#cc4444" opacity="0.2"/>
  <text x="685" y="230" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Blocked</text>

  <!-- Application Servers -->
  <rect x="750" y="80" width="120" height="100" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="810" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">App Servers</text>
  <text x="810" y="135" text-anchor="middle" font-size="9" fill="#1a1822">Clean traffic only</text>
  <text x="810" y="153" text-anchor="middle" font-size="9" fill="#1a1822">Reduced attack surface</text>
  <text x="810" y="171" text-anchor="middle" font-size="9" fill="#64748b">Focus on business logic</text>

  <!-- Blocked traffic destination -->
  <rect x="750" y="200" width="120" height="60" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="2"/>
  <text x="810" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#cc4444">Blocked</text>
  <text x="810" y="245" text-anchor="middle" font-size="9" fill="#1a1822">403 Forbidden</text>

  <!-- WAF deployment modes -->
  <rect x="30" y="310" width="840" height="170" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">WAF Deployment Modes</text>

  <rect x="50" y="355" width="250" height="55" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="175" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Reverse Proxy Mode</text>
  <text x="175" y="393" text-anchor="middle" font-size="9" fill="#1a1822">WAF sits in front of app servers</text>
  <text x="175" y="408" text-anchor="middle" font-size="9" fill="#64748b">Cloudflare, AWS WAF, Azure WAF</text>

  <rect x="320" y="355" width="250" height="55" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="445" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#4caf50">Embedded Mode</text>
  <text x="445" y="393" text-anchor="middle" font-size="9" fill="#1a1822">WAF runs as library in app</text>
  <text x="445" y="408" text-anchor="middle" font-size="9" fill="#64748b">ModSecurity, libinjection</text>

  <rect x="590" y="355" width="260" height="55" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="720" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#f0ad4e">Host-Based Mode</text>
  <text x="720" y="393" text-anchor="middle" font-size="9" fill="#1a1822">WAF installed on app server</text>
  <text x="720" y="408" text-anchor="middle" font-size="9" fill="#64748b">ModSecurity on Apache/Nginx</text>

  <rect x="50" y="420" width="800" height="50" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="440" text-anchor="middle" font-size="9" fill="#1a1822">Recommended: Cloud-based WAF (Cloudflare, AWS WAF) for most applications — managed rules, automatic updates, DDoS protection included.</text>
  <text x="450" y="458" text-anchor="middle" font-size="9" fill="#64748b">Run WAF in monitor mode first, then switch to blocking mode after tuning false positives.</text>

  <defs>
    <marker id="arrowWAF" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>