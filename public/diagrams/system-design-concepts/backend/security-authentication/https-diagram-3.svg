<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>HTTPS security properties showing confidentiality, integrity, authentication, and common attacks prevented</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">HTTPS Security Properties &amp; Attack Prevention</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">What HTTPS protects against and what it does not protect</text>

  <!-- Three pillars -->
  <rect x="30" y="80" width="270" height="220" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="80" width="270" height="35" rx="10" fill="#4caf50"/>
  <rect x="30" y="105" width="270" height="10" fill="#4caf50"/>
  <text x="165" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Confidentiality</text>

  <rect x="50" y="125" width="230" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="147" text-anchor="middle" font-size="10" fill="#1a1822">Data encrypted with AES-256-GCM</text>
  <text x="165" y="165" text-anchor="middle" font-size="9" fill="#64748b">Only client and server can read</text>

  <rect x="50" y="185" width="230" height="50" rx="6" fill="#4caf50" opacity="0.08" stroke="#4caf50" stroke-width="1"/>
  <text x="165" y="207" text-anchor="middle" font-size="10" fill="#1a1822">Prevents: eavesdropping, sniffing</text>
  <text x="165" y="225" text-anchor="middle" font-size="9" fill="#64748b">Public Wi-Fi, ISP surveillance</text>

  <rect x="50" y="245" width="230" height="45" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="267" text-anchor="middle" font-size="9" fill="#1a1822">Encryption: AES-256-GCM or</text>
  <text x="165" y="282" text-anchor="middle" font-size="9" fill="#1a1822">ChaCha20-Poly1305</text>

  <rect x="315" y="80" width="270" height="220" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="315" y="80" width="270" height="35" rx="10" fill="#6d5bd0"/>
  <rect x="315" y="105" width="270" height="10" fill="#6d5bd0"/>
  <text x="450" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Integrity</text>

  <rect x="335" y="125" width="230" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="147" text-anchor="middle" font-size="10" fill="#1a1822">Authentication tag (GCM)</text>
  <text x="450" y="165" text-anchor="middle" font-size="9" fill="#64748b">Detects any modification</text>

  <rect x="335" y="185" width="230" height="50" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="207" text-anchor="middle" font-size="10" fill="#1a1822">Prevents: MITM, tampering</text>
  <text x="450" y="225" text-anchor="middle" font-size="9" fill="#64748b">Injection, content modification</text>

  <rect x="335" y="245" width="230" height="45" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="267" text-anchor="middle" font-size="9" fill="#1a1822">MAC: Galois/Counter Mode</text>
  <text x="450" y="282" text-anchor="middle" font-size="9" fill="#1a1822">(authenticated encryption)</text>

  <rect x="600" y="80" width="270" height="220" rx="10" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <rect x="600" y="80" width="270" height="35" rx="10" fill="#f0ad4e"/>
  <rect x="600" y="105" width="270" height="10" fill="#f0ad4e"/>
  <text x="735" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Authentication</text>

  <rect x="620" y="125" width="230" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="735" y="147" text-anchor="middle" font-size="10" fill="#1a1822">Server certificate validated</text>
  <text x="735" y="165" text-anchor="middle" font-size="9" fill="#64748b">Chain of trust to root CA</text>

  <rect x="620" y="185" width="230" height="50" rx="6" fill="#f0ad4e" opacity="0.08" stroke="#f0ad4e" stroke-width="1"/>
  <text x="735" y="207" text-anchor="middle" font-size="10" fill="#1a1822">Prevents: impersonation</text>
  <text x="735" y="225" text-anchor="middle" font-size="9" fill="#64748b">Fake servers, phishing sites</text>

  <rect x="620" y="245" width="230" height="45" rx="6" fill="#f0f0f5" stroke="#d7d1e6" stroke-width="1"/>
  <text x="735" y="267" text-anchor="middle" font-size="9" fill="#1a1822">Certificate: X.509, signed by</text>
  <text x="735" y="282" text-anchor="middle" font-size="9" fill="#1a1822">trusted Certificate Authority</text>

  <!-- Attacks prevented -->
  <rect x="30" y="320" width="410" height="160" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="320" width="410" height="30" rx="10" fill="#4caf50"/>
  <rect x="30" y="340" width="410" height="10" fill="#4caf50"/>
  <text x="235" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Attacks Prevented by HTTPS</text>

  <text x="50" y="365" text-anchor="start" font-size="9" fill="#1a1822">✓ Eavesdropping (network sniffing)</text>
  <text x="50" y="383" text-anchor="start" font-size="9" fill="#1a1822">✓ Man-in-the-middle (MITM) attacks</text>
  <text x="50" y="401" text-anchor="start" font-size="9" fill="#1a1822">✓ SSL stripping (downgrade to HTTP)</text>
  <text x="50" y="419" text-anchor="start" font-size="9" fill="#1a1822">✓ Session hijacking (cookie theft)</text>
  <text x="50" y="437" text-anchor="start" font-size="9" fill="#1a1822">✓ Content injection (ISP ads, malware)</text>
  <text x="50" y="455" text-anchor="start" font-size="9" fill="#1a1822">✓ Credential theft on public Wi-Fi</text>
  <text x="50" y="473" text-anchor="start" font-size="9" fill="#1a1822">✓ Data tampering in transit</text>

  <!-- What HTTPS does NOT protect -->
  <rect x="460" y="320" width="410" height="160" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="460" y="320" width="410" height="30" rx="10" fill="#cc4444"/>
  <rect x="460" y="340" width="410" height="10" fill="#cc4444"/>
  <text x="665" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">HTTPS Does NOT Protect Against</text>

  <text x="480" y="365" text-anchor="start" font-size="9" fill="#1a1822">✗ Server-side data breaches</text>
  <text x="480" y="383" text-anchor="start" font-size="9" fill="#1a1822">✗ Client-side malware/keyloggers</text>
  <text x="480" y="401" text-anchor="start" font-size="9" fill="#1a1822">✗ Phishing (fake sites with valid certs)</text>
  <text x="480" y="419" text-anchor="start" font-size="9" fill="#1a1822">✗ DNS spoofing (without HSTS/DNSSEC)</text>
  <text x="480" y="437" text-anchor="start" font-size="9" fill="#1a1822">✗ Social engineering attacks</text>
  <text x="480" y="455" text-anchor="start" font-size="9" fill="#1a1822">✗ Weak application security (SQLi, XSS)</text>
  <text x="480" y="473" text-anchor="start" font-size="9" fill="#1a1822">✗ Data at rest on client or server</text>
</svg>