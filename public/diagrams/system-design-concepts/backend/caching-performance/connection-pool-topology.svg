<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Connection Pool Topology</title>
  <desc id="desc">Connection pool architecture showing shared vs per-service pool topologies</desc>

  <rect width="900" height="550" fill="#ffffff"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Connection Pool Topology</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Shared vs Per-Service vs Tiered Pool Architectures</text>

  <!-- Shared Pool (Left) -->
  <rect x="50" y="85" width="260" height="220" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Shared Pool</text>
  <rect x="65" y="125" width="230" height="170" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <rect x="80" y="140" width="200" height="40" rx="3" fill="#2563eb" stroke="#1e3a8a" stroke-width="1"/>
  <text x="180" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">Shared Connection Pool</text>
  <text x="180" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#dbeafe">20 connections, all services share</text>
  <rect x="80" y="190" width="60" height="30" rx="3" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="110" y="210" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Service A</text>
  <rect x="150" y="190" width="60" height="30" rx="3" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="180" y="210" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Service B</text>
  <rect x="220" y="190" width="60" height="30" rx="3" fill="#60a5fa" stroke="#2563eb" stroke-width="1"/>
  <text x="250" y="210" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Service C</text>
  <line x1="110" y1="225" x2="110" y2="245" stroke="#374151" stroke-width="1"/>
  <line x1="180" y1="225" x2="180" y2="245" stroke="#374151" stroke-width="1"/>
  <line x1="250" y1="225" x2="250" y2="245" stroke="#374151" stroke-width="1"/>
  <rect x="80" y="250" width="200" height="35" rx="3" fill="#1e3a8a" stroke="#0f172a" stroke-width="1"/>
  <text x="180" y="272" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Database (PostgreSQL)</text>
  <text x="180" y="290" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Simple, but noisy neighbor risk</text>

  <!-- Per-Service Pool (Middle) -->
  <rect x="320" y="85" width="260" height="220" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Per-Service Pool</text>
  <rect x="335" y="125" width="230" height="170" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1"/>
  <rect x="350" y="140" width="60" height="40" rx="3" fill="#d97706" stroke="#b45309" stroke-width="1"/>
  <text x="380" y="160" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Pool A</text>
  <text x="380" y="175" text-anchor="middle" font-size="6" font-weight="600" fill="#fef3c7">5 conns</text>
  <rect x="420" y="140" width="60" height="40" rx="3" fill="#d97706" stroke="#b45309" stroke-width="1"/>
  <text x="450" y="160" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Pool B</text>
  <text x="450" y="175" text-anchor="middle" font-size="6" font-weight="600" fill="#fef3c7">8 conns</text>
  <rect x="490" y="140" width="60" height="40" rx="3" fill="#d97706" stroke="#b45309" stroke-width="1"/>
  <text x="520" y="160" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Pool C</text>
  <text x="520" y="175" text-anchor="middle" font-size="6" font-weight="600" fill="#fef3c7">7 conns</text>
  <rect x="350" y="190" width="60" height="30" rx="3" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <text x="380" y="210" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Service A</text>
  <rect x="420" y="190" width="60" height="30" rx="3" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <text x="450" y="210" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Service B</text>
  <rect x="490" y="190" width="60" height="30" rx="3" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <text x="520" y="210" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Service C</text>
  <line x1="380" y1="225" x2="380" y2="245" stroke="#374151" stroke-width="1"/>
  <line x1="450" y1="225" x2="450" y2="245" stroke="#374151" stroke-width="1"/>
  <line x1="520" y1="225" x2="520" y2="245" stroke="#374151" stroke-width="1"/>
  <rect x="350" y="250" width="200" height="35" rx="3" fill="#92400e" stroke="#78350f" stroke-width="1"/>
  <text x="450" y="272" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">Database (PostgreSQL)</text>
  <text x="450" y="290" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Isolated, but higher total connections</text>

  <!-- Tiered Pool (Right) -->
  <rect x="590" y="85" width="260" height="220" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Tiered Pool</text>
  <rect x="605" y="125" width="230" height="170" rx="4" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <rect x="620" y="140" width="200" height="30" rx="3" fill="#16a34a" stroke="#065f46" stroke-width="1"/>
  <text x="720" y="160" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">Global Pool (10 conns) - Shared baseline</text>
  <rect x="620" y="180" width="60" height="30" rx="3" fill="#22c55e" stroke="#16a34a" stroke-width="1"/>
  <text x="650" y="200" text-anchor="middle" font-size="6" font-weight="700" fill="#ffffff">Pool A</text>
  <text x="650" y="210" text-anchor="middle" font-size="5" font-weight="600" fill="#ecfdf5">+3 conns</text>
  <rect x="690" y="180" width="60" height="30" rx="3" fill="#22c55e" stroke="#16a34a" stroke-width="1"/>
  <text x="720" y="200" text-anchor="middle" font-size="6" font-weight="700" fill="#ffffff">Pool B</text>
  <text x="720" y="210" text-anchor="middle" font-size="5" font-weight="600" fill="#ecfdf5">+5 conns</text>
  <rect x="760" y="180" width="60" height="30" rx="3" fill="#22c55e" stroke="#16a34a" stroke-width="1"/>
  <text x="790" y="200" text-anchor="middle" font-size="6" font-weight="700" fill="#ffffff">Pool C</text>
  <text x="790" y="210" text-anchor="middle" font-size="5" font-weight="600" fill="#ecfdf5">+4 conns</text>
  <rect x="620" y="220" width="60" height="25" rx="3" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="650" y="237" text-anchor="middle" font-size="7" font-weight="700" fill="#065f46">Svc A</text>
  <rect x="690" y="220" width="60" height="25" rx="3" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="720" y="237" text-anchor="middle" font-size="7" font-weight="700" fill="#065f46">Svc B</text>
  <rect x="760" y="220" width="60" height="25" rx="3" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="790" y="237" text-anchor="middle" font-size="7" font-weight="700" fill="#065f46">Svc C</text>
  <line x1="650" y1="250" x2="650" y2="265" stroke="#374151" stroke-width="1"/>
  <line x1="720" y1="250" x2="720" y2="265" stroke="#374151" stroke-width="1"/>
  <line x1="790" y1="250" x2="790" y2="265" stroke="#374151" stroke-width="1"/>
  <rect x="620" y="268" width="200" height="20" rx="3" fill="#065f46" stroke="#022c22" stroke-width="1"/>
  <text x="720" y="282" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">Database</text>
  <text x="720" y="295" text-anchor="middle" font-size="7" font-weight="600" fill="#1f2937">Balanced: isolation + efficiency</text>

  <!-- Comparison Table (Bottom) -->
  <rect x="50" y="315" width="800" height="150" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="2"/>
  <text x="450" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Topology Comparison</text>
  <rect x="70" y="355" width="180" height="25" rx="3" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1"/>
  <text x="160" y="372" text-anchor="middle" font-size="9" font-weight="700" fill="#0369a1">Property</text>
  <rect x="260" y="355" width="180" height="25" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="350" y="372" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">Shared</text>
  <rect x="450" y="355" width="180" height="25" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="372" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Per-Service</text>
  <rect x="640" y="355" width="190" height="25" rx="3" fill="#ecfdf5" stroke="#16a34a" stroke-width="1"/>
  <text x="735" y="372" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">Tiered</text>

  <rect x="70" y="383" width="180" height="22" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="398" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Isolation</text>
  <rect x="260" y="383" width="180" height="22" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="350" y="398" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">None</text>
  <rect x="450" y="383" width="180" height="22" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="540" y="398" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">Full</text>
  <rect x="640" y="383" width="190" height="22" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="735" y="398" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">Partial (global + dedicated)</text>

  <rect x="70" y="408" width="180" height="22" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="423" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Efficiency</text>
  <rect x="260" y="408" width="180" height="22" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="350" y="423" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">High (shared)</text>
  <rect x="450" y="408" width="180" height="22" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="540" y="423" text-anchor="middle" font-size="8" font-weight="700" fill="#b91c1c">Low (over-provisioned)</text>
  <rect x="640" y="408" width="190" height="22" rx="2" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="735" y="423" text-anchor="middle" font-size="8" font-weight="700" fill="#15803d">High (baseline shared)</text>

  <rect x="70" y="433" width="180" height="22" rx="2" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="160" y="448" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Best For</text>
  <rect x="260" y="433" width="180" height="22" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="350" y="448" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Single service apps</text>
  <rect x="450" y="433" width="180" height="22" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="540" y="448" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Multi-tenant, strict SLAs</text>
  <rect x="640" y="433" width="190" height="22" rx="2" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="448" text-anchor="middle" font-size="8" font-weight="600" fill="#1f2937">Microservices, balanced needs</text>
</svg>