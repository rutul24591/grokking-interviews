<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="cacheGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="sentinelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fecaca"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="450" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Negative Caching Flow</text>
  <text x="450" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">How caching responses for non-existent keys prevents repeated database lookups</text>

  <!-- ============================================== -->
  <!-- POSITIVE CACHING FLOW (Top Half)               -->
  <!-- ============================================== -->
  <text x="450" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Positive Caching vs Negative Caching Comparison</text>

  <!-- Positive Caching Flow -->
  <rect x="30" y="105" width="410" height="270" fill="#f0fdf4" stroke="#86efac" stroke-width="2" rx="8"/>
  <text x="235" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">Positive Caching (Key Exists)</text>

  <!-- Client -->
  <rect x="60" y="145" width="100" height="45" fill="url(#clientGrad)" stroke="#6366f1" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="110" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3730a3" text-anchor="middle">Client</text>

  <!-- Arrow -->
  <line x1="160" y1="167" x2="210" y2="167" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="185" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#374151" text-anchor="middle">GET /user/123</text>

  <!-- Cache Hit -->
  <rect x="220" y="145" width="100" height="45" fill="url(#cacheGrad)" stroke="#f59e0b" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="270" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">Cache</text>
  <text x="270" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#16a34a" text-anchor="middle">HIT</text>

  <!-- Response arrow -->
  <line x1="270" y1="190" x2="270" y2="220" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="220" y="220" width="100" height="35" fill="url(#successGrad)" stroke="#16a34a" stroke-width="2" rx="4"/>
  <text x="270" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#166534" text-anchor="middle">Return: { name: "Alice" }</text>
  <text x="270" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">TTL: 300s</text>

  <!-- Arrow back to client -->
  <path d="M 220 237 Q 160 237 110 190" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  <text x="155" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#374151" text-anchor="middle">Response: 200 OK</text>

  <!-- Performance box -->
  <rect x="60" y="270" width="290" height="45" fill="#ffffff" stroke="#86efac" stroke-width="2" rx="4"/>
  <text x="205" y="287" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">Performance Characteristics</text>
  <text x="205" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Latency: ~1ms | DB Queries: 0 | Cache Memory: Proportional to active keys</text>
  <text x="205" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Hit Rate: Typically 80-95% for hot keys</text>

  <!-- ============================================== -->
  <!-- NEGATIVE CACHING FLOW (Bottom Half)             -->
  <!-- ============================================== -->

  <!-- Negative Caching Flow -->
  <rect x="460" y="105" width="410" height="270" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" rx="8"/>
  <text x="665" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#991b1b" text-anchor="middle">Negative Caching (Key Not Found)</text>

  <!-- Client -->
  <rect x="490" y="145" width="100" height="45" fill="url(#clientGrad)" stroke="#6366f1" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="540" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3730a3" text-anchor="middle">Client</text>

  <!-- Arrow -->
  <line x1="590" y1="167" x2="640" y2="167" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="615" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#374151" text-anchor="middle">GET /user/999</text>

  <!-- Cache Miss -->
  <rect x="650" y="145" width="100" height="45" fill="url(#cacheGrad)" stroke="#f59e0b" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="700" y="163" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">Cache</text>
  <text x="700" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">MISS</text>

  <!-- Arrow to DB -->
  <line x1="700" y1="190" x2="700" y2="220" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="720" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#374151">DB query</text>

  <!-- Database -->
  <rect x="650" y="220" width="100" height="45" fill="url(#dbGrad)" stroke="#2563eb" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="700" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1e40af" text-anchor="middle">Database</text>
  <text x="700" y="253" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">NOT FOUND</text>

  <!-- Sentinel box -->
  <line x1="650" y1="242" x2="570" y2="242" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <rect x="470" y="225" width="100" height="45" fill="url(#sentinelGrad)" stroke="#dc2626" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="520" y="243" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#991b1b" text-anchor="middle">Negative</text>
  <text x="520" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#991b1b" text-anchor="middle">Sentinel Cached</text>

  <!-- TTL annotation -->
  <rect x="470" y="275" width="100" height="25" fill="#ffffff" stroke="#dc2626" stroke-width="1" rx="3"/>
  <text x="520" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#991b1b" text-anchor="middle">TTL: 30-120s</text>

  <!-- Arrow back to cache -->
  <line x1="570" y1="242" x2="650" y2="200" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)" stroke-dasharray="4,2"/>
  <text x="595" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#dc2626" text-anchor="middle">Cache sentinel</text>

  <!-- Response to client -->
  <path d="M 650 167 Q 590 167 590 190" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)" fill="none"/>
  <text x="615" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#374151" text-anchor="middle">Response: 404</text>

  <!-- Subsequent request box -->
  <rect x="490" y="305" width="290" height="55" fill="#ffffff" stroke="#fca5a5" stroke-width="2" rx="4"/>
  <text x="635" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#111827" text-anchor="middle">Subsequent Requests (Same Key)</text>
  <text x="635" y="337" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Cache returns 404 directly - no DB query</text>
  <text x="635" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Saves ~50ms per request, prevents DB overload</text>

  <!-- ============================================== -->
  <!-- TTL CONSIDERATIONS SECTION                     -->
  <!-- ============================================== -->

  <rect x="30" y="395" width="840" height="305" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="450" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">TTL Consider for Negative Cache Entries</text>

  <!-- TTL Comparison Table -->
  <rect x="50" y="440" width="800" height="30" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="80" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">TTL Strategy</text>
  <text x="230" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Duration</text>
  <text x="380" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Pros</text>
  <text x="580" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Cons</text>
  <text x="730" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Use Case</text>

  <!-- Row 1: Short TTL -->
  <rect x="50" y="470" width="800" height="50" fill="#ffffff"/>
  <text x="80" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#374151">Short TTL</text>
  <text x="230" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">30-60 seconds</text>
  <text x="380" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Quick recovery when</text>
  <text x="380" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">item is created</text>
  <text x="580" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">More DB queries if</text>
  <text x="580" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">repeated misses occur</text>
  <text x="730" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">E-commerce (item</text>
  <text x="730" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">creation frequent)</text>

  <!-- Row 2: Medium TTL -->
  <rect x="50" y="520" width="800" height="50" fill="#f9fafb"/>
  <text x="80" y="538" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#374151">Medium TTL</text>
  <text x="230" y="538" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">2-5 minutes</text>
  <text x="380" y="538" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Balanced protection</text>
  <text x="380" y="552" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">against abuse</text>
  <text x="580" y="538" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Delayed visibility of</text>
  <text x="580" y="552" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">newly created items</text>
  <text x="730" y="538" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">User profiles,</text>
  <text x="730" y="552" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">social media</text>

  <!-- Row 3: Long TTL -->
  <rect x="50" y="570" width="800" height="50" fill="#ffffff"/>
  <text x="80" y="588" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#374151">Long TTL</text>
  <text x="230" y="588" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">10-30 minutes</text>
  <text x="380" y="588" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Maximum DB protection</text>
  <text x="380" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">from probing attacks</text>
  <text x="580" y="588" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Stale 404s for long</text>
  <text x="580" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">after item exists</text>
  <text x="730" y="588" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Immutable resources,</text>
  <text x="730" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">archival data</text>

  <!-- Row 4: Adaptive TTL -->
  <rect x="50" y="620" width="800" height="50" fill="#e0e7ff"/>
  <text x="80" y="638" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#3730a3">Adaptive TTL (Recommended)</text>
  <text x="230" y="638" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">30s initial, scales</text>
  <text x="230" y="652" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">with miss frequency</text>
  <text x="380" y="638" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Self-adjusting based</text>
  <text x="380" y="652" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">on request patterns</text>
  <text x="580" y="638" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Complexity in</text>
  <text x="580" y="652" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">implementation</text>
  <text x="730" y="638" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Production systems</text>
  <text x="730" y="652" font-family="system-ui, -apache-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">at scale</text>

  <!-- Key Insight -->
  <rect x="50" y="678" width="800" height="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="3"/>
  <text x="450" y="691" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">Interview Tip: Adaptive TTL that starts short (30s) and exponentially backs off is the production-standard approach for negative caching.</text>
</svg>