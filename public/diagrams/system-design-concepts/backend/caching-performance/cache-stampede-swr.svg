<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="70" font-size="28" font-family="Arial" fill="#0f172a">Stale-While-Revalidate</text>
  <rect x="80" y="140" width="360" height="140" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="110" y="190" font-size="18" font-family="Arial" fill="#0f172a">Serve Stale</text>
  <text x="110" y="220" font-size="14" font-family="Arial" fill="#475569">Immediate response</text>
  <rect x="520" y="140" width="360" height="140" rx="12" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="550" y="190" font-size="18" font-family="Arial" fill="#0f172a">Background Refresh</text>
  <text x="550" y="220" font-size="14" font-family="Arial" fill="#475569">Single loader updates cache</text>
  <rect x="940" y="140" width="220" height="140" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="960" y="190" font-size="18" font-family="Arial" fill="#0f172a">Fresh Cache</text>
  <line x1="440" y1="210" x2="520" y2="210" stroke="#94a3b8" stroke-width="4"/>
  <line x1="880" y1="210" x2="940" y2="210" stroke="#94a3b8" stroke-width="4"/>
  <rect x="80" y="340" width="1040" height="160" rx="12" fill="#f1f5f9" stroke="#cbd5f5"/>
  <text x="110" y="385" font-size="16" font-family="Arial" fill="#0f172a">SWR trades freshness for low latency and reduces stampede risk.</text>
  <text x="80" y="560" font-size="16" font-family="Arial" fill="#475569">Common in CDNs and high-traffic APIs.</text>
</svg>
