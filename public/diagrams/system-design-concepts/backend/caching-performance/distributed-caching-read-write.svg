<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">Cache-Aside Read and Write Flow</text>

  <rect x="60" y="110" width="180" height="70" rx="12" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="110" y="150" font-family="Arial" font-size="14" fill="#0f172a">Client</text>

  <rect x="300" y="110" width="180" height="70" rx="12" fill="#dbeafe" stroke="#60a5fa" />
  <text x="350" y="150" font-family="Arial" font-size="14" fill="#0f172a">App</text>

  <rect x="540" y="80" width="180" height="70" rx="12" fill="#e0f2fe" stroke="#38bdf8" />
  <text x="580" y="120" font-family="Arial" font-size="14" fill="#0f172a">Cache</text>

  <rect x="540" y="200" width="180" height="70" rx="12" fill="#fee2e2" stroke="#fca5a5" />
  <text x="585" y="240" font-family="Arial" font-size="14" fill="#0f172a">Database</text>

  <line x1="240" y1="145" x2="300" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="480" y1="135" x2="540" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="540" y1="230" x2="480" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="60" y="300" width="840" height="80" rx="12" fill="#f1f5f9" stroke="#cbd5f5" />
  <text x="90" y="335" font-family="Arial" font-size="14" fill="#0f172a">Read path: App checks cache, falls back to DB on miss, then populates cache.</text>
  <text x="90" y="360" font-family="Arial" font-size="14" fill="#0f172a">Write path: App writes DB, then invalidates or updates cache.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569" />
    </marker>
  </defs>
</svg>
