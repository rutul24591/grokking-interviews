<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="70" font-size="28" font-family="Arial" fill="#0f172a">Singleflight / Lock Protection</text>
  <rect x="80" y="140" width="300" height="140" rx="12" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="110" y="190" font-size="18" font-family="Arial" fill="#0f172a">Client Requests</text>
  <text x="110" y="220" font-size="14" font-family="Arial" fill="#475569">All miss at once</text>
  <rect x="450" y="140" width="300" height="140" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="480" y="190" font-size="18" font-family="Arial" fill="#0f172a">Distributed Lock</text>
  <text x="480" y="220" font-size="14" font-family="Arial" fill="#475569">Only one loader</text>
  <rect x="820" y="140" width="300" height="140" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="850" y="190" font-size="18" font-family="Arial" fill="#0f172a">DB Load</text>
  <text x="850" y="220" font-size="14" font-family="Arial" fill="#475569">Single refresh</text>
  <line x1="380" y1="210" x2="450" y2="210" stroke="#94a3b8" stroke-width="4"/>
  <line x1="750" y1="210" x2="820" y2="210" stroke="#94a3b8" stroke-width="4"/>
  <rect x="80" y="340" width="1040" height="160" rx="12" fill="#f1f5f9" stroke="#cbd5f5"/>
  <text x="110" y="385" font-size="16" font-family="Arial" fill="#0f172a">Waiting requests reuse the refreshed value and avoid a DB storm.</text>
  <text x="80" y="560" font-size="16" font-family="Arial" fill="#475569">Locks reduce stampedes but add latency for waiting requests.</text>
</svg>
