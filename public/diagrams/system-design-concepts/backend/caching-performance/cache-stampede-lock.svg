<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Single-Flight / Distributed Lock Pattern</text>
  <text x="60" y="76" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#374151">First request acquires a lock to regenerate; others wait or receive a fallback value</text>

  <!-- Lock Acquisition Flow -->
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Lock Acquisition Flow (Redis SETNX)</text>

  <!-- Step 1: Cache Miss -->
  <rect x="60" y="145" width="180" height="80" rx="8" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
  <text x="80" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Cache Miss</text>
  <text x="80" y="203" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Key expired / not found</text>

  <!-- Arrow -->
  <line x1="240" y1="185" x2="290" y2="185" stroke="#6b7280" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Step 2: SETNX -->
  <rect x="290" y="145" width="200" height="80" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="310" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">SETNX lock:key</text>
  <text x="310" y="203" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Atomic lock acquisition</text>
  <text x="310" y="220" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Returns 1 if acquired, 0 if held</text>

  <!-- Branch: Success and Failure -->
  <line x1="490" y1="170" x2="540" y2="140" stroke="#22c55e" stroke-width="2" marker-end="url(#ah-green)"/>
  <text x="495" y="138" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#16a34a">SETNX = 1 (acquired)</text>

  <line x1="490" y1="200" x2="540" y2="230" stroke="#ef4444" stroke-width="2" marker-end="url(#ah-red)"/>
  <text x="495" y="235" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#dc2626">SETNX = 0 (lock held)</text>

  <!-- Success Path -->
  <rect x="540" y="100" width="200" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="133" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Lock Acquired</text>
  <text x="560" y="158" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">This request loads from DB</text>

  <line x1="740" y1="140" x2="790" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="790" y="100" width="200" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="810" y="133" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">DB Query + Cache Set</text>
  <text x="810" y="158" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Regenerate value, store it</text>

  <line x1="990" y1="140" x2="1040" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="1040" y="100" width="130" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="1055" y="133" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Release Lock</text>
  <text x="1055" y="158" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">DEL lock:key</text>

  <!-- Failure Path - Others Wait or Fallback -->
  <rect x="540" y="200" width="200" height="80" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <text x="560" y="233" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Lock Not Acquired</text>
  <text x="560" y="258" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Another request is loading</text>

  <!-- Sub-branch -->
  <line x1="740" y1="225" x2="790" y2="200" stroke="#3b82f6" stroke-width="2" marker-end="url(#ah)"/>
  <text x="745" y="215" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Option A: Wait</text>

  <line x1="740" y1="255" x2="790" y2="280" stroke="#a855f7" stroke-width="2" marker-end="url(#ah)"/>
  <text x="745" y="285" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Option B: Fallback</text>

  <!-- Wait Option -->
  <rect x="790" y="180" width="200" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="810" y="213" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Wait + Retry</text>
  <text x="810" y="238" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Poll with backoff</text>
  <text x="810" y="255" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Max wait = acquire timeout</text>

  <!-- Fallback Option -->
  <rect x="790" y="260" width="200" height="80" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="810" y="293" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Serve Stale / Default</text>
  <text x="810" y="318" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Return old value if available</text>
  <text x="810" y="335" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Or return cached default</text>

  <!-- Lock Safety Mechanisms -->
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Lock Safety Mechanisms</text>

  <rect x="60" y="345" width="350" height="130" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="80" y="378" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Lock Timeout (Deadlock Prevention)</text>
  <text x="80" y="408" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#1f2937">SETNX lock:key 1 EX 30</text>
  <text x="80" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Lock auto-expires after 30 seconds even if</text>
  <text x="80" y="453" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">the holder crashes without releasing it</text>
  <text x="80" y="470" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Timeout should exceed max expected DB query time</text>

  <rect x="440" y="345" width="350" height="130" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="460" y="378" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Lock Lease (Ownership Token)</text>
  <text x="460" y="408" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#1f2937">SETNX lock:key "request-uuid-12345" EX 30</text>
  <text x="460" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Only the request that set the UUID can delete it.</text>
  <text x="460" y="453" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Prevents releasing another request's lock if it</text>
  <text x="460" y="470" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">expires while a slow query is still running.</text>

  <rect x="820" y="345" width="320" height="130" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="840" y="378" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">RedLock (Multi-Instance)</text>
  <text x="840" y="408" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#1f2937">Acquire lock on N/2+1 Redis</text>
  <text x="840" y="428" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">instances for fault tolerance</text>
  <text x="840" y="453" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Protects against single-node</text>
  <text x="840" y="470" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">failures causing split-brain locks</text>

  <!-- Strategy Comparison -->
  <text x="60" y="520" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Stampede Prevention Strategy Comparison</text>

  <!-- Table Header -->
  <rect x="60" y="545" width="1080" height="40" rx="4" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="75" y="571" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Strategy</text>
  <text x="300" y="571" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Latency Impact</text>
  <text x="520" y="571" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Freshness</text>
  <text x="720" y="571" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Complexity</text>
  <text x="920" y="571" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Best For</text>

  <!-- Row 1: Locking -->
  <rect x="60" y="585" width="1080" height="55" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="75" y="611" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Single-Flight Lock</text>
  <text x="300" y="611" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Waiters: +lock timeout</text>
  <text x="520" y="611" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Always fresh after refresh</text>
  <text x="720" y="611" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Medium (lock lifecycle)</text>
  <text x="920" y="611" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Financial, inventory data</text>

  <!-- Row 2: SWR -->
  <rect x="60" y="640" width="1080" height="55" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="75" y="666" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Stale-While-Revalidate</text>
  <text x="300" y="666" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Zero (stale returned)</text>
  <text x="520" y="666" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Briefly stale during grace</text>
  <text x="720" y="666" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Low (TTL + grace config)</text>
  <text x="920" y="666" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Product catalogs, feeds</text>

  <!-- Row 3: Probabilistic -->
  <rect x="60" y="695" width="1080" height="55" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="75" y="721" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Probabilistic Early Expiration</text>
  <text x="300" y="721" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Random refresh, no wait</text>
  <text x="520" y="721" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Smooth distribution</text>
  <text x="720" y="721" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Low (random threshold)</text>
  <text x="920" y="721" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">CDN, high-traffic keys</text>

  <!-- Row 4: Hybrid -->
  <rect x="60" y="750" width="1080" height="55" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="75" y="776" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Hybrid: SWR + Lock (Recommended)</text>
  <text x="300" y="776" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Zero for most; lock as backup</text>
  <text x="520" y="776" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Fresh after grace + refresh</text>
  <text x="720" y="776" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Medium-High (both mechanisms)</text>
  <text x="920" y="776" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Production systems at scale</text>
</svg>