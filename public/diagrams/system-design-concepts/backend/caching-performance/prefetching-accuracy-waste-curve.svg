<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780" width="900" height="780">
  <!-- Background -->
  <rect width="900" height="780" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">Prefetching Accuracy vs. Waste Analysis</text>
  <text x="450" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Accuracy-waste trade-off curve, optimal threshold selection, budget allocation, and feedback loop</text>
  
  <!-- MAIN CHART: Accuracy vs Waste Curve -->
  <rect x="20" y="85" width="560" height="480" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  
  <text x="300" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Accuracy vs. Cache Waste Trade-off</text>
  
  <!-- Chart area -->
  <!-- Axes -->
  <line x1="80" y1="450" x2="540" y2="450" stroke="#111827" stroke-width="2"/>
  <line x1="80" y1="140" x2="80" y2="450" stroke="#111827" stroke-width="2"/>
  
  <!-- Y-axis label -->
  <text x="35" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle" transform="rotate(-90, 35, 300)">Percentage (%)</text>
  
  <!-- X-axis label -->
  <text x="310" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Prefetch Confidence Threshold</text>
  
  <!-- Y-axis ticks and labels -->
  <line x1="75" y1="450" x2="80" y2="450" stroke="#111827" stroke-width="2"/>
  <text x="70" y="454" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="end">0</text>
  
  <line x1="75" y1="372" x2="80" y2="372" stroke="#d1d5db" stroke-width="1"/>
  <text x="70" y="376" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="end">25</text>
  
  <line x1="75" y1="295" x2="80" y2="295" stroke="#d1d5db" stroke-width="1"/>
  <text x="70" y="299" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="end">50</text>
  
  <line x1="75" y1="217" x2="80" y2="217" stroke="#d1d5db" stroke-width="1"/>
  <text x="70" y="221" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="end">75</text>
  
  <line x1="75" y1="140" x2="80" y2="140" stroke="#d1d5db" stroke-width="1"/>
  <text x="70" y="144" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="end">100</text>
  
  <!-- X-axis ticks and labels -->
  <line x1="80" y1="450" x2="80" y2="455" stroke="#111827" stroke-width="2"/>
  <text x="80" y="472" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">0%</text>
  
  <line x1="172" y1="450" x2="172" y2="455" stroke="#d1d5db" stroke-width="1"/>
  <text x="172" y="472" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">20%</text>
  
  <line x1="264" y1="450" x2="264" y2="455" stroke="#d1d5db" stroke-width="1"/>
  <text x="264" y="472" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">40%</text>
  
  <line x1="356" y1="450" x2="356" y2="455" stroke="#d1d5db" stroke-width="1"/>
  <text x="356" y="472" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">60%</text>
  
  <line x1="448" y1="450" x2="448" y2="455" stroke="#d1d5db" stroke-width="1"/>
  <text x="448" y="472" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">80%</text>
  
  <line x1="540" y1="450" x2="540" y2="455" stroke="#d1d5db" stroke-width="1"/>
  <text x="540" y="472" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">100%</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="372" x2="540" y2="372" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="295" x2="540" y2="295" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="217" x2="540" y2="217" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Waste Curve (red) - decreases as confidence increases -->
  <path d="M 80 155 Q 126 180 172 230 Q 218 290 264 340 Q 310 380 356 400 Q 402 415 448 425 Q 494 435 540 440" fill="none" stroke="#dc2626" stroke-width="3"/>
  
  <!-- Accuracy Curve (green) - increases as confidence increases -->
  <path d="M 80 435 Q 126 425 172 400 Q 218 365 264 320 Q 310 270 356 220 Q 402 180 448 155 Q 494 140 540 145" fill="none" stroke="#166534" stroke-width="3"/>
  
  <!-- Net Benefit Curve (blue) - peaks at optimal point -->
  <path d="M 80 400 Q 126 370 172 310 Q 218 250 264 210 Q 310 190 356 185 Q 402 195 448 220 Q 494 260 540 310" fill="none" stroke="#1e40af" stroke-width="3"/>
  
  <!-- Optimal point marker -->
  <circle cx="356" cy="185" r="8" fill="#ffffff" stroke="#1e40af" stroke-width="3"/>
  <circle cx="356" cy="185" r="4" fill="#1e40af"/>
  
  <!-- Optimal threshold vertical line -->
  <line x1="356" y1="185" x2="356" y2="450" stroke="#1e40af" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="356" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">Optimal: 60-70%</text>
  
  <!-- Zone annotations -->
  <!-- Low accuracy zone -->
  <rect x="80" y="140" width="184" height="310" fill="#fee2e2" opacity="0.3"/>
  <text x="172" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">HIGH WASTE ZONE</text>
  <text x="172" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Waste &gt; 50%, not viable</text>
  
  <!-- Optimal zone -->
  <rect x="310" y="140" width="92" height="310" fill="#dcfce7" opacity="0.3"/>
  <text x="356" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#166534" text-anchor="middle">OPTIMAL</text>
  <text x="356" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Sweet spot</text>
  
  <!-- Low coverage zone -->
  <rect x="448" y="140" width="92" height="310" fill="#fef3c7" opacity="0.3"/>
  <text x="494" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ca8a04" text-anchor="middle">LOW COVERAGE</text>
  <text x="494" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Missed opportunities</text>
  
  <!-- Legend -->
  <rect x="400" y="530" width="170" height="95" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="485" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Legend</text>
  
  <line x1="415" y1="568" x2="440" y2="568" stroke="#dc2626" stroke-width="3"/>
  <text x="448" y="572" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Cache Waste (%)</text>
  
  <line x1="415" y1="588" x2="440" y2="588" stroke="#166534" stroke-width="3"/>
  <text x="448" y="592" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Hit Accuracy (%)</text>
  
  <line x1="415" y1="608" x2="440" y2="608" stroke="#1e40af" stroke-width="3"/>
  <text x="448" y="612" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Net Benefit Score</text>
  
  <!-- RIGHT PANEL: Budget Allocation -->
  <rect x="600" y="85" width="280" height="280" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="740" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Budget Allocation by Strategy</text>
  <line x1="620" y1="130" x2="860" y2="130" stroke="#d1d5db" stroke-width="1"/>
  
  <!-- Budget bars -->
  <!-- User-Driven: 40% -->
  <text x="620" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#374151">User-Driven</text>
  <text x="860" y="160" font-family="monospace" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="end">40% of budget</text>
  <rect x="620" y="168" width="240" height="16" rx="3" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <rect x="620" y="168" width="96" height="16" rx="3" fill="#7c3aed"/>
  
  <!-- ML-Based: 35% -->
  <text x="620" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#374151">ML-Based</text>
  <text x="860" y="205" font-family="monospace" font-size="12" font-weight="700" fill="#ca8a04" text-anchor="end">35% of budget</text>
  <rect x="620" y="213" width="240" height="16" rx="3" fill="#fef3c7" stroke="#ca8a04" stroke-width="1"/>
  <rect x="620" y="213" width="84" height="16" rx="3" fill="#ca8a04"/>
  
  <!-- Hint-Based: 25% -->
  <text x="620" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#374151">Hint-Based</text>
  <text x="860" y="250" font-family="monospace" font-size="12" font-weight="700" fill="#166534" text-anchor="end">25% of budget</text>
  <rect x="620" y="258" width="240" height="16" rx="3" fill="#dcfce7" stroke="#166534" stroke-width="1"/>
  <rect x="620" y="258" width="60" height="16" rx="3" fill="#166534"/>
  
  <!-- Total budget info -->
  <text x="740" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Total Daily Budget: 50,000 prefetch requests</text>
  <text x="740" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Token replenish rate: 35/min per service</text>
  <text x="740" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Burst allowance: 2x for high-accuracy periods</text>
  <text x="740" y="354" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Cool-down: 5s after 80% budget consumed</text>
  
  <!-- BOTTOM RIGHT: Feedback Loop -->
  <rect x="600" y="385" width="280" height="250" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="740" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Accuracy Feedback Loop</text>
  <line x1="620" y1="430" x2="860" y2="430" stroke="#d1d5db" stroke-width="1"/>
  
  <!-- Feedback cycle steps -->
  <!-- Step 1 -->
  <circle cx="740" cy="465" r="22" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="740" y="469" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#1e40af" text-anchor="middle">Track</text>
  <text x="740" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Log hit/miss per</text>
  <text x="740" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">prefetch strategy</text>
  
  <!-- Arrow -->
  <line x1="762" y1="465" x2="795" y2="465" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2 -->
  <circle cx="820" cy="465" r="22" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/>
  <text x="820" y="469" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ca8a04" text-anchor="middle">Score</text>
  <text x="820" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Calculate accuracy</text>
  <text x="820" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">= hits / total</text>
  
  <!-- Arrow down -->
  <line x1="820" y1="487" x2="820" y2="520" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3 -->
  <circle cx="820" cy="545" r="22" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="820" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#166534" text-anchor="middle">Adjust</text>
  <text x="820" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Raise threshold if</text>
  <text x="820" y="594" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">accuracy &lt; 50%</text>
  
  <!-- Arrow left -->
  <line x1="798" y1="545" x2="765" y2="545" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4 -->
  <circle cx="740" cy="545" r="22" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="740" y="549" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#7c3aed" text-anchor="middle">Apply</text>
  <text x="740" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Update model weights</text>
  <text x="740" y="594" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">and token budget</text>
  
  <!-- Arrow up -->
  <line x1="740" y1="523" x2="740" y2="490" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Cycle label -->
  <text x="740" y="625" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#374151" text-anchor="middle">Cycle runs every 5 minutes</text>
  
  <!-- BOTTOM SECTION: Key Metrics -->
  <rect x="600" y="655" width="280" height="110" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="740" y="683" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Key Performance Metrics</text>
  <line x1="620" y1="695" x2="860" y2="695" stroke="#d1d5db" stroke-width="1"/>
  
  <text x="620" y="715" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151">Target Accuracy:</text>
  <text x="860" y="715" font-family="monospace" font-size="11" font-weight="700" fill="#166534" text-anchor="end">&gt; 65%</text>
  
  <text x="620" y="735" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151">Max Acceptable Waste:</text>
  <text x="860" y="735" font-family="monospace" font-size="11" font-weight="700" fill="#dc2626" text-anchor="end">&lt; 35%</text>
  
  <text x="620" y="755" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151">Net Benefit Threshold:</text>
  <text x="860" y="755" font-family="monospace" font-size="11" font-weight="700" fill="#1e40af" text-anchor="end">Score &gt; 0.6</text>
  
  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>