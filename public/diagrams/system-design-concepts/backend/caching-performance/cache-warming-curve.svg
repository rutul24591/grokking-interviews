<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="780" viewBox="0 0 960 780">
  <rect width="960" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="45" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">Cache Warming Curve &amp; Hit Rate Progression</text>
  <text x="480" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="middle">Cold start to steady-state: how cache hit rates evolve over time with different warming strategies</text>

  <!-- ======================== MAIN WARMING CURVE CHART ======================== -->
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Cache Hit Rate Over Time</text>

  <!-- Chart area -->
  <rect x="60" y="140" width="840" height="340" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Grid lines (horizontal) -->
  <line x1="120" y1="170" x2="870" y2="170" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="220" x2="870" y2="220" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="270" x2="870" y2="270" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="320" x2="870" y2="320" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="370" x2="870" y2="370" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="120" y1="420" x2="870" y2="420" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Y-axis labels -->
  <text x="110" y="174" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="end">100%</text>
  <text x="110" y="224" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="end">80%</text>
  <text x="110" y="274" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="end">60%</text>
  <text x="110" y="324" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="end">40%</text>
  <text x="110" y="374" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="end">20%</text>
  <text x="110" y="424" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="end">0%</text>

  <!-- X-axis labels -->
  <text x="120" y="450" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">0 min</text>
  <text x="270" y="450" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">5 min</text>
  <text x="420" y="450" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">10 min</text>
  <text x="570" y="450" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">20 min</text>
  <text x="720" y="450" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">40 min</text>
  <text x="870" y="450" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">60 min</text>

  <!-- Axis titles -->
  <text x="30" y="300" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" transform="rotate(-90,30,300)">Cache Hit Rate</text>
  <text x="495" y="475" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Time Since Deployment / Purge</text>

  <!-- Curve 1: No Warming (Cold Start) - RED -->
  <!-- Starts at 0%, very slow rise, reaches ~90% at ~50 min -->
  <path d="M120,420 C180,410 240,380 300,350 C360,320 420,290 480,260 C540,230 600,200 660,185 C720,172 780,165 870,160" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <text x="870" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ef4444">No Warming</text>

  <!-- Curve 2: Batch Pre-Load - BLUE -->
  <!-- Starts at ~30%, faster rise, reaches ~93% at ~25 min -->
  <path d="M120,360 C150,340 180,310 210,280 C240,250 270,225 300,210 C330,195 360,185 390,180 C420,175 450,172 480,170 C540,167 600,165 660,163 C720,162 780,161 870,158" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="870" y="153" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3b82f6">Batch Pre-Load</text>

  <!-- Curve 3: Traffic Replay - GREEN -->
  <!-- Starts at ~45%, rapid rise, reaches ~94% at ~15 min -->
  <path d="M120,330 C140,300 160,260 180,235 C200,210 220,195 240,188 C260,181 280,178 300,176 C330,174 360,172 390,171 C420,170 450,169 480,168 C540,167 600,166 660,165 C720,164 780,164 870,163" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <text x="870" y="158" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#10b981">Traffic Replay</text>

  <!-- Curve 4: Predictive Warming - PURPLE -->
  <!-- Starts at ~70%, very fast to steady state ~95% at ~8 min -->
  <path d="M120,250 C140,220 155,200 170,190 C185,180 200,175 220,172 C240,170 260,169 280,168 C300,167 330,166 360,166 C390,165 420,165 450,165 C480,164 540,164 600,164 C660,163 720,163 780,163 C840,163 870,163 870,163" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="870" y="158" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#8b5cf6">Predictive Warming</text>

  <!-- Steady state line -->
  <line x1="120" y1="163" x2="870" y2="163" stroke="#374151" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="125" y="158" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#374151">Steady State (~95%)</text>

  <!-- Phase labels on the no-warming curve -->
  <rect x="130" y="395" width="100" height="22" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="180" y="410" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">Cold Start</text>

  <rect x="300" y="310" width="90" height="22" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="345" y="325" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#b45309" text-anchor="middle">Warming</text>

  <rect x="600" y="175" width="110" height="22" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="655" y="190" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#059669" text-anchor="middle">Steady State</text>

  <!-- ======================== ORIGIN LOAD DURING WARM-UP ======================== -->
  <text x="60" y="520" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Origin Load During Warm-Up</text>

  <!-- Without warming -->
  <rect x="60" y="545" width="400" height="100" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="260" y="572" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Without Cache Warming</text>
  <line x1="100" y1="582" x2="420" y2="582" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Spike illustration -->
  <rect x="100" y="590" width="320" height="40" rx="4" fill="#fecaca"/>
  <text x="260" y="610" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#dc2626" text-anchor="middle">Origin Load: 100% of traffic</text>
  <text x="260" y="630" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Every request hits origin until cache populates</text>

  <!-- With warming -->
  <rect x="500" y="545" width="420" height="100" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="710" y="572" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">With Cache Warming</text>
  <line x1="540" y1="582" x2="880" y2="582" stroke="#10b981" stroke-width="1.5"/>

  <!-- Reduced load illustration -->
  <rect x="540" y="590" width="340" height="20" rx="4" fill="#86efac"/>
  <rect x="540" y="610" width="340" height="20" rx="4" fill="#bbf7d0"/>
  <text x="710" y="610" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">Origin Load: 5-15% of traffic</text>
  <text x="710" y="630" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Pre-populated cache absorbs majority of requests</text>

  <!-- ======================== TIME-TO-STEADY-STATE COMPARISON ======================== -->
  <text x="60" y="690" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Time to Steady State Comparison</text>

  <!-- Bar chart -->
  <rect x="60" y="710" width="840" height="50" rx="6" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>

  <!-- No Warming: 50 min -->
  <rect x="80" y="720" width="500" height="28" rx="4" fill="#ef4444"/>
  <text x="75" y="740" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="end">No Warming:</text>
  <text x="590" y="740" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">~50 min</text>

  <!-- Batch Pre-load: 25 min -->
  <rect x="80" y="748" width="250" height="28" rx="4" fill="#3b82f6"/>
  <text x="75" y="768" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="end">Batch Pre-Load:</text>
  <text x="340" y="768" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">~25 min</text>

  <!-- Traffic Replay: 15 min -->
  <rect x="80" y="776" width="150" height="28" rx="4" fill="#10b981"/>
  <text x="75" y="796" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="end">Traffic Replay:</text>
  <text x="240" y="796" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">~15 min</text>

  <!-- Predictive: 8 min -->
  <rect x="80" y="804" width="80" height="28" rx="4" fill="#8b5cf6"/>
  <text x="75" y="824" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="end">Predictive:</text>
  <text x="170" y="824" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">~8 min</text>

  <!-- X-axis scale -->
  <line x1="80" y1="840" x2="580" y2="840" stroke="#374151" stroke-width="1.5"/>
  <text x="80" y="858" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">0 min</text>
  <text x="180" y="858" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">10 min</text>
  <text x="280" y="858" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">20 min</text>
  <text x="380" y="858" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">30 min</text>
  <text x="480" y="858" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">40 min</text>
  <text x="580" y="858" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">50 min</text>

</svg>