<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="hashGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="collisionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Query Cache Key Design</text>
  <text x="550" y="66" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="middle">Key composition, collision scenarios, cardinality management, and memory overhead</text>

  <!-- KEY COMPOSITION SECTION (Left) -->
  <rect x="40" y="90" width="500" height="320" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="290" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Cache Key Components</text>

  <!-- Component 1: Normalized SQL -->
  <rect x="60" y="140" width="460" height="55" rx="6" fill="url(#keyGrad)" stroke="#7c3aed" stroke-width="2"/>
  <text x="290" y="162" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">1. Normalized SQL Query</text>
  <text x="290" y="182" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Whitespace removed, keywords uppercased, literals replaced with placeholders</text>

  <!-- Component 2: Parameter Hash -->
  <rect x="60" y="205" width="460" height="55" rx="6" fill="url(#hashGrad)" stroke="#2563eb" stroke-width="2"/>
  <text x="290" y="227" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">2. Parameter Hash (SHA-256 of bound parameters)</text>
  <text x="290" y="247" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">params: {"$1": "us-east", "$2": "active"} -&gt; hash: a3f8c2...</text>

  <!-- Component 3: Session Context -->
  <rect x="60" y="270" width="460" height="55" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="290" y="292" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">3. Session Context (timezone, locale, search_path)</text>
  <text x="290" y="312" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">session: {"tz": "UTC", "locale": "en-US", "schema": "public"}</text>

  <!-- Component 4: User Permissions -->
  <rect x="60" y="335" width="460" height="55" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="290" y="357" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">4. User Permissions / Row-Level Security Context</text>
  <text x="290" y="377" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">user_role: "analyst", tenant_id: "org_42", allowed_regions: ["us", "eu"]</text>

  <!-- Key Assembly -->
  <rect x="60" y="400" width="460" height="50" rx="6" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="290" y="422" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Final Cache Key Assembly</text>
  <text x="290" y="440" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">key = "query:" + md5(normalized_sql) + ":" + sha256(params) + ":" + crc32(session) + ":" + crc32(perms)</text>

  <!-- COLLISION SCENARIOS SECTION (Right) -->
  <rect x="570" y="90" width="490" height="320" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="815" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Key Collision Scenarios</text>

  <!-- Collision 1: Same SQL, Different Params -->
  <rect x="590" y="140" width="450" height="120" rx="6" fill="url(#collisionGrad)" stroke="#dc2626" stroke-width="2"/>
  <text x="815" y="163" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Scenario A: Same SQL, Different Parameters (DANGEROUS)</text>
  <text x="610" y="183" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Query 1: SELECT * FROM users WHERE region = "us"    -&gt; key: q1_a3f8</text>
  <text x="610" y="200" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Query 2: SELECT * FROM users WHERE region = "eu"    -&gt; key: q1_b7e2</text>
  <text x="610" y="217" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">If param hash omitted: BOTH map to q1 = WRONG DATA RETURNED!</text>
  <text x="815" y="247" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">Severity: CRITICAL | Impact: Data leakage, incorrect results</text>

  <!-- Collision 2: Same Params, Different SQL -->
  <rect x="590" y="275" width="450" height="120" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="815" y="298" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Scenario B: Same Params, Different SQL Structure</text>
  <text x="610" y="318" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Query 1: SELECT id, name FROM users WHERE status = "active"</text>
  <text x="610" y="335" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Query 2: SELECT id, email FROM users WHERE status = "active"</text>
  <text x="610" y="352" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Different columns but same params = different keys needed</text>
  <text x="815" y="382" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#d97706" text-anchor="middle">Severity: HIGH | Impact: Missing columns, schema mismatch</text>

  <!-- KEY CARDINALITY MANAGEMENT (Bottom Left) -->
  <rect x="40" y="440" width="500" height="260" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="290" y="470" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Key Cardinality Management</text>

  <!-- Strategy 1: Remove unnecessary params -->
  <rect x="60" y="490" width="460" height="60" rx="6" fill="url(#cardGrad)" stroke="#059669" stroke-width="2"/>
  <text x="290" y="512" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Remove Unnecessary Parameters</text>
  <text x="290" y="532" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Exclude: request_id, trace_id, correlation_id (unique per request)</text>
  <text x="290" y="546" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Reduces key space by 40-60% | Prevents cache fragmentation</text>

  <!-- Strategy 2: Canonical ordering -->
  <rect x="60" y="560" width="460" height="60" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="290" y="582" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Canonical Parameter Ordering</text>
  <text x="290" y="602" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Sort params alphabetically: {a:1, b:2} same as {b:2, a:1}</text>
  <text x="290" y="616" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Ensures consistent keys regardless of parameter insertion order</text>

  <!-- Strategy 3: Parameter grouping -->
  <rect x="60" y="630" width="460" height="60" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="290" y="652" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Parameter Grouping / Bucketing</text>
  <text x="290" y="672" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Bucket timestamps: "2024-01-15 14:32:17" -&gt; "2024-01-15 14:00"</text>
  <text x="290" y="686" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Reduces cardinality for time-range queries by 60-80%</text>

  <!-- MEMORY OVERHEAD SECTION (Bottom Right) -->
  <rect x="570" y="440" width="490" height="260" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
  <text x="815" y="470" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Memory Overhead Per Key</text>

  <!-- Overhead breakdown table -->
  <rect x="590" y="490" width="450" height="100" rx="6" fill="url(#memGrad)" stroke="#d97706" stroke-width="2"/>
  <text x="815" y="512" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Key Size Breakdown</text>
  <text x="610" y="535" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Normalized SQL (avg):        128 bytes</text>
  <text x="610" y="553" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Parameter hash (SHA-256):     32 bytes</text>
  <text x="610" y="571" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Session context (CRC32):       4 bytes</text>
  <text x="610" y="589" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Permissions context:          16 bytes</text>

  <!-- Mitigation strategies -->
  <rect x="590" y="600" width="450" height="90" rx="6" fill="#ffffff" stroke="#374151" stroke-width="2"/>
  <text x="815" y="622" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Mitigation Strategies</text>
  <text x="610" y="642" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">1. Hash SQL to 64-bit fingerprint: saves 60-90 bytes/key</text>
  <text x="610" y="658" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">2. Use LRU eviction with TTL: caps max memory at configured limit</text>
  <text x="610" y="674" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">3. Compress rarely-changing session data: saves 50% on context</text>
  <text x="610" y="690" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">4. Estimated total: ~48 bytes/key (with hashing) vs ~180 bytes (raw)</text>

  <!-- Connecting arrows between sections -->
  <line x1="290" y1="450" x2="290" y2="490" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="475" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#7c3aed">assemble</text>

  <!-- Arrow from collision to cardinality -->
  <line x1="815" y1="410" x2="815" y2="440" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="835" y="430" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#dc2626">requires management</text>
</svg>