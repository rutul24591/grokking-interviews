<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <linearGradient id="wtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="caGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="wbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="transparent" />

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="currentColor">Cache Consistency Models</text>

  <!-- Write-Through Section -->
  <rect x="30" y="65" width="230" height="440" rx="12" fill="url(#wtGrad)" stroke="#3b82f6" stroke-width="1.5" />
  <text x="145" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">Write-Through</text>

  <!-- Write-Through flow -->
  <!-- App box -->
  <rect x="60" y="120" width="170" height="45" rx="8" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5" />
  <text x="145" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3b82f6">Application</text>

  <!-- Arrow down to Cache -->
  <line x1="145" y1="165" x2="145" y2="200" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)" />
  <text x="160" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.7">Step 1</text>

  <!-- Cache box -->
  <rect x="60" y="200" width="170" height="45" rx="8" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5" />
  <text x="145" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3b82f6">Cache (L1/L2)</text>

  <!-- Arrow down to DB -->
  <line x1="145" y1="245" x2="145" y2="280" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)" />
  <text x="160" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.7">Step 2</text>

  <!-- DB box -->
  <rect x="60" y="280" width="170" height="45" rx="8" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5" />
  <text x="145" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#3b82f6">Database</text>

  <!-- Write-Through properties -->
  <text x="145" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="currentColor">Properties:</text>
  <text x="145" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Strong consistency</text>
  <text x="145" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Higher write latency</text>
  <text x="145" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">(cache + DB writes)</text>
  <text x="145" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Cache always in sync</text>
  <text x="145" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">No stale reads</text>
  <text x="145" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Best for: read-heavy,</text>
  <text x="145" y="505" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">consistency-critical data</text>

  <!-- Cache-Aside Section -->
  <rect x="285" y="65" width="230" height="440" rx="12" fill="url(#caGrad)" stroke="#10b981" stroke-width="1.5" />
  <text x="400" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#10b981">Cache-Aside</text>

  <!-- Cache-Aside flow: Read path -->
  <text x="400" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="currentColor">Read Path:</text>

  <!-- App box -->
  <rect x="315" y="140" width="170" height="40" rx="8" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1.5" />
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981">Application</text>

  <!-- Arrow down to Cache -->
  <line x1="400" y1="180" x2="400" y2="210" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)" />
  <text x="415" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.7">Check</text>

  <!-- Cache box -->
  <rect x="315" y="210" width="170" height="40" rx="8" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1.5" />
  <text x="400" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981">Cache (L1/L2)</text>

  <!-- Arrow: Cache miss to DB -->
  <line x1="400" y1="250" x2="400" y2="280" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowGreen)" />
  <text x="415" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.7">On miss</text>

  <!-- DB box -->
  <rect x="315" y="280" width="170" height="40" rx="8" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1.5" />
  <text x="400" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981">Database</text>

  <!-- Write path note -->
  <text x="400" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="currentColor">Write Path:</text>
  <text x="400" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">1. Write to Database</text>
  <text x="400" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">2. Invalidate Cache entry</text>
  <text x="400" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">(pub/sub to all L1s)</text>

  <!-- Cache-Aside properties -->
  <text x="400" y="455" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="currentColor">Properties:</text>
  <text x="400" y="478" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Eventual consistency</text>
  <text x="400" y="498" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Staleness window: TTL</text>

  <!-- Write-Behind Section -->
  <rect x="540" y="65" width="230" height="440" rx="12" fill="url(#wbGrad)" stroke="#f59e0b" stroke-width="1.5" />
  <text x="655" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">Write-Behind</text>

  <!-- Write-Behind flow -->
  <!-- App box -->
  <rect x="570" y="120" width="170" height="45" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5" />
  <text x="655" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">Application</text>

  <!-- Arrow down to Cache -->
  <line x1="655" y1="165" x2="655" y2="200" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)" />
  <text x="670" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.7">Step 1</text>

  <!-- Cache box -->
  <rect x="570" y="200" width="170" height="45" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5" />
  <text x="655" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">Cache (updated)</text>

  <!-- Async arrow to Write Queue -->
  <line x1="655" y1="245" x2="655" y2="275" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowAmber)" />
  <text x="670" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.7">Async</text>

  <!-- Write Queue box -->
  <rect x="570" y="275" width="170" height="40" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" />
  <text x="655" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">Write Queue</text>

  <!-- Arrow to DB -->
  <line x1="655" y1="315" x2="655" y2="345" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowAmber)" />
  <text x="670" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.7">Flush</text>

  <!-- DB box -->
  <rect x="570" y="345" width="170" height="40" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5" />
  <text x="655" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#f59e0b">Database</text>

  <!-- Write-Behind properties -->
  <text x="655" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="currentColor">Properties:</text>
  <text x="655" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Lowest write latency</text>
  <text x="655" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Eventual consistency</text>
  <text x="655" y="485" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Risk: data loss if queue</text>
  <text x="655" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">lost before flush to DB</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
</svg>
