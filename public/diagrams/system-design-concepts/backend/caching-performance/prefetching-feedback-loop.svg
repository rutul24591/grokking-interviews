<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <!-- Background -->
  <rect width="900" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">Adaptive Prefetching Feedback Loop</text>
  <text x="450" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Track results, score accuracy, adjust strategy, and apply changes with adaptive budget control</text>

  <!-- ============================================ -->
  <!-- MAIN FEEDBACK LOOP (Circular Flow)          -->
  <!-- ============================================ -->

  <!-- Cycle background circle -->
  <circle cx="450" cy="340" r="180" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Step 1: Track Prefetch Results (Top) -->
  <rect x="340" y="90" width="220" height="110" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#1e40af" text-anchor="middle">Track Prefetch Results</text>
  <line x1="360" y1="130" x2="540" y2="130" stroke="#2563eb" stroke-width="1"/>
  <text x="450" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Log every prefetch attempt</text>
  <text x="450" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Record: hit/miss, TTL, latency</text>
  <text x="450" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Tag: strategy, confidence score</text>

  <!-- Arrow: Track -> Score (clockwise) -->
  <path d="M 560 150 Q 640 200 640 280" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Score Accuracy (Right) -->
  <rect x="590" y="260" width="220" height="110" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="700" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#15803d" text-anchor="middle">Score Accuracy</text>
  <line x1="610" y1="300" x2="790" y2="300" stroke="#16a34a" stroke-width="1"/>
  <text x="700" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Accuracy = hits / attempts</text>
  <text x="700" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Waste ratio = unused / prefetched</text>
  <text x="700" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Per-strategy breakdown</text>

  <!-- Arrow: Score -> Adjust -->
  <path d="M 640 370 Q 580 440 560 440" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Adjust Strategy (Bottom) -->
  <rect x="340" y="440" width="220" height="110" rx="10" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a16207" text-anchor="middle">Adjust Strategy</text>
  <line x1="360" y1="480" x2="540" y2="480" stroke="#ca8a04" stroke-width="1"/>
  <text x="450" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Raise/lower confidence thresholds</text>
  <text x="450" y="516" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Shift budget between strategies</text>
  <text x="450" y="532" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Tune TTL based on hit patterns</text>

  <!-- Arrow: Adjust -> Apply -->
  <path d="M 340 490 Q 260 430 260 290" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Apply Changes (Left) -->
  <rect x="90" y="260" width="220" height="110" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="200" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#6d28d9" text-anchor="middle">Apply Changes</text>
  <line x1="110" y1="300" x2="290" y2="300" stroke="#7c3aed" stroke-width="1"/>
  <text x="200" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Update prediction weights</text>
  <text x="200" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Rebalance token allocation</text>
  <text x="200" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Deploy new config (rolling)</text>

  <!-- Arrow: Apply -> Track (completing the loop) -->
  <path d="M 260 260 Q 320 200 340 150" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ============================================ -->
  <!-- METRICS DASHBOARD (Center of loop)          -->
  <!-- ============================================ -->
  <rect x="350" y="240" width="200" height="160" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="450" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Feedback Metrics</text>
  <line x1="370" y1="280" x2="530" y2="280" stroke="#d1d5db" stroke-width="1"/>

  <!-- Metric 1: Hit Rate Improvement -->
  <text x="370" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151">Hit Rate Improvement</text>
  <!-- Bar background -->
  <rect x="370" y="310" width="160" height="8" rx="4" fill="#e5e7eb"/>
  <!-- Bar fill -->
  <rect x="370" y="310" width="128" height="8" rx="4" fill="#16a34a"/>
  <text x="540" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#15803d">80%</text>

  <!-- Metric 2: Waste Reduction -->
  <text x="370" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151">Waste Reduction</text>
  <rect x="370" y="342" width="160" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="370" y="342" width="96" height="8" rx="4" fill="#f59e0b"/>
  <text x="540" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#a16207">60%</text>

  <!-- Metric 3: Accuracy Score -->
  <text x="370" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151">Accuracy Score</text>
  <rect x="370" y="374" width="160" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="370" y="374" width="144" height="8" rx="4" fill="#2563eb"/>
  <text x="540" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#1e40af">90%</text>

  <!-- ============================================ -->
  <!-- ADAPTIVE BUDGET ADJUSTMENT (Bottom panel)   -->
  <!-- ============================================ -->
  <text x="450" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Adaptive Budget Adjustment Based on Accuracy</text>

  <!-- Budget Allocation Table -->
  <rect x="40" y="610" width="820" height="95" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>

  <!-- Column headers -->
  <text x="100" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Accuracy Range</text>
  <text x="280" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Token Budget</text>
  <text x="460" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Prefetch Rate</text>
  <text x="640" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Confidence Threshold</text>
  <text x="800" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Action</text>

  <!-- Divider line -->
  <line x1="40" y1="644" x2="860" y2="644" stroke="#d1d5db" stroke-width="1"/>

  <!-- Row 1: Low accuracy -->
  <text x="100" y="664" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">&lt; 40%</text>
  <text x="280" y="664" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">10% (minimal)</text>
  <text x="460" y="664" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">50 req/min</text>
  <text x="640" y="664" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">0.90 (very high)</text>
  <text x="800" y="664" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#dc2626" text-anchor="middle">Restrict aggressively</text>

  <!-- Row 2: Medium accuracy -->
  <text x="100" y="686" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">40-70%</text>
  <text x="280" y="686" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">40% (moderate)</text>
  <text x="460" y="686" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">200 req/min</text>
  <text x="640" y="686" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">0.70 (moderate)</text>
  <text x="800" y="686" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ca8a04" text-anchor="middle">Cautious scaling</text>

  <!-- Row 3: High accuracy -->
  <text x="100" y="708" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">&gt; 70%</text>
  <text x="280" y="708" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">80%+ (generous)</text>
  <text x="460" y="708" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">500+ req/min</text>
  <text x="640" y="708" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">0.55 (permissive)</text>
  <text x="800" y="708" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#16a34a" text-anchor="middle">Expand aggressively</text>

  <!-- ============================================ -->
  <!-- Arrowhead Marker                              -->
  <!-- ============================================ -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
</svg>