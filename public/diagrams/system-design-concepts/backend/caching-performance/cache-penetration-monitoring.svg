<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowhead-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="alertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="responseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="450" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Cache Penetration Monitoring &amp; Alerting</text>
  <text x="450" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Real-time metrics, alert thresholds, and incident response for cache penetration attacks</text>

  <!-- ============================================== -->
  <!-- MONITORING DASHBOARD (Top Left)                -->
  <!-- ============================================== -->

  <rect x="30" y="80" width="420" height="300" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="240" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Monitoring Dashboard Metrics</text>

  <!-- Metric 1: Cache Hit Rate -->
  <rect x="50" y="120" width="380" height="55" fill="url(#chartGrad)" stroke="#86efac" stroke-width="2" rx="6"/>
  <text x="70" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#166534">Cache Hit Rate</text>
  <text x="70" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Percentage of requests served from cache</text>

  <!-- Progress bar -->
  <rect x="280" y="135" width="130" height="18" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" rx="9"/>
  <rect x="280" y="135" width="110" height="18" fill="#22c55e" rx="9"/>
  <text x="345" y="149" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">85% (Normal)</text>

  <!-- Metric 2: Cache Miss Rate -->
  <rect x="50" y="185" width="380" height="55" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" rx="6"/>
  <text x="70" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#991b1b">Cache Miss Rate</text>
  <text x="70" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Requests resulting in cache miss</text>

  <rect x="280" y="200" width="130" height="18" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" rx="9"/>
  <rect x="280" y="200" width="20" height="18" fill="#ef4444" rx="9"/>
  <text x="345" y="214" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">15% (Elevated)</text>

  <!-- Metric 3: Negative Cache Hit Rate -->
  <rect x="50" y="250" width="380" height="55" fill="#fffbeb" stroke="#fde68a" stroke-width="2" rx="6"/>
  <text x="70" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#92400e">Negative Cache Hit Rate</text>
  <text x="70" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">404 responses served from negative cache</text>

  <rect x="280" y="265" width="130" height="18" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" rx="9"/>
  <rect x="280" y="265" width="52" height="18" fill="#f59e0b" rx="9"/>
  <text x="345" y="279" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">8% (Watch)</text>

  <!-- Metric 4: DB Query Rate -->
  <rect x="50" y="315" width="380" height="55" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" rx="6"/>
  <text x="70" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1e40af">Database Query Rate</text>
  <text x="70" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Queries hitting the database per second</text>

  <rect x="280" y="330" width="130" height="18" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1" rx="9"/>
  <rect x="280" y="330" width="30" height="18" fill="#3b82f6" rx="9"/>
  <text x="345" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">120 QPS</text>

  <!-- ============================================== -->
  <!-- ALERT THRESHOLDS (Top Right)                    -->
  <!-- ============================================== -->

  <rect x="470" y="80" width="400" height="300" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="670" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Alert Thresholds</text>

  <!-- Alert 1: Sudden Drop in Hit Rate -->
  <rect x="490" y="120" width="360" height="65" fill="url(#alertGrad)" stroke="#dc2626" stroke-width="2" rx="6"/>
  <rect x="505" y="135" width="18" height="18" fill="#dc2626" rx="3"/>
  <text x="514" y="149" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">!</text>
  <text x="535" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#991b1b">CRITICAL: Hit Rate Drop</text>
  <text x="535" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Trigger: Hit rate drops below 70% for 2+ minutes</text>
  <text x="535" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#dc2626">Possible cause: Cache penetration attack or cache eviction spike</text>

  <!-- Alert 2: Spike in DB Queries -->
  <rect x="490" y="195" width="360" height="65" fill="url(#alertGrad)" stroke="#dc2626" stroke-width="2" rx="6"/>
  <rect x="505" y="210" width="18" height="18" fill="#dc2626" rx="3"/>
  <text x="514" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">!</text>
  <text x="535" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#991b1b">CRITICAL: DB Query Spike</text>
  <text x="535" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Trigger: DB QPS exceeds 500 (4x baseline) for 1+ minute</text>
  <text x="535" y="251" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#dc2626">Possible cause: Cache miss storm or bloom filter misconfiguration</text>

  <!-- Alert 3: Negative Cache Overflow -->
  <rect x="490" y="270" width="360" height="50" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <rect x="505" y="285" width="18" height="18" fill="#f59e0b" rx="3"/>
  <text x="514" y="299" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">W</text>
  <text x="535" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#92400e">WARNING: Negative Cache Overflow</text>
  <text x="535" y="311" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Trigger: Negative cache entries exceed 50% of total cache capacity</text>

  <!-- Alert 4: False Positive Rate Increase -->
  <rect x="490" y="330" width="360" height="38" fill="#f0fdf4" stroke="#86efac" stroke-width="2" rx="6"/>
  <rect x="505" y="345" width="18" height="18" fill="#16a34a" rx="3"/>
  <text x="514" y="359" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">i</text>
  <text x="535" y="353" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#166534">INFO: Bloom Filter FP Rate</text>
  <text x="535" y="366" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Trigger: False positive rate exceeds 3% (baseline: 1%)</text>

  <!-- ============================================== -->
  <!-- INCIDENT RESPONSE FLOWCHART (Bottom Section)    -->
  <!-- ============================================== -->

  <rect x="30" y="400" width="840" height="300" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="450" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Incident Response Flowchart</text>

  <!-- Start Node -->
  <rect x="370" y="445" width="160" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="20"/>
  <text x="450" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">ALERT TRIGGERED</text>

  <!-- Arrow down -->
  <line x1="450" y1="485" x2="450" y2="510" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision Node 1: Check hit rate -->
  <rect x="330" y="510" width="240" height="45" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" rx="6"/>
  <text x="450" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#3730a3" text-anchor="middle">Check: Hit Rate &lt; 70%?</text>
  <text x="450" y="546" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#3730a3" text-anchor="middle">AND DB QPS &gt; 500?</text>

  <!-- Yes branch -->
  <line x1="330" y1="532" x2="250" y2="532" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="290" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">YES</text>

  <!-- Action: Enable rate limiting -->
  <rect x="50" y="515" width="190" height="50" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
  <text x="145" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">Step 1: Enable Rate Limiting</text>
  <text x="145" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Reduce per-client QPS limit by 50%</text>
  <text x="145" y="562" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Block suspicious IP ranges</text>

  <!-- Arrow to Step 2 -->
  <line x1="145" y1="565" x2="145" y2="590" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Action: Check bloom filter -->
  <rect x="50" y="590" width="190" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="145" y="608" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">Step 2: Verify Bloom Filter</text>
  <text x="145" y="625" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Check FP rate, reload if corrupted</text>
  <text x="145" y="637" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Ensure sync across all nodes</text>

  <!-- Arrow to Step 3 -->
  <line x1="145" y1="640" x2="145" y2="665" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Action: Scale negative cache -->
  <rect x="50" y="665" width="190" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="6"/>
  <text x="145" y="683" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1e40af" text-anchor="middle">Step 3: Scale Negative Cache</text>
  <text x="145" y="700" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Increase capacity by 2x</text>
  <text x="145" y="712" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Reduce TTL to 30s temporarily</text>

  <!-- No branch -->
  <line x1="570" y1="532" x2="680" y2="532" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="625" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#16a34a" text-anchor="middle">NO</text>

  <!-- Decision: Check negative cache -->
  <rect x="680" y="515" width="160" height="40" fill="#d1fae5" stroke="#16a34a" stroke-width="2" rx="6"/>
  <text x="760" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#166534" text-anchor="middle">Negative Cache</text>
  <text x="760" y="547" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#166534" text-anchor="middle">Overflowing?</text>

  <!-- Yes branch from negative cache -->
  <line x1="760" y1="555" x2="760" y2="580" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-yellow)"/>
  <text x="775" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#f59e0b">YES</text>

  <!-- Action: Evict old entries -->
  <rect x="670" y="580" width="180" height="45" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="760" y="598" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400e" text-anchor="middle">Evict oldest 30% entries</text>
  <text x="760" y="614" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Monitor for 5 minutes</text>

  <!-- No branch from negative cache -->
  <line x1="840" y1="535" x2="860" y2="535" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="855" y="528" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#16a34a">NO</text>

  <!-- Action: Continue monitoring -->
  <rect x="860" y="515" width="200" height="40" fill="#d1fae5" stroke="#16a34a" stroke-width="2" rx="20"/>
  <text x="960" y="533" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#166534" text-anchor="middle">Continue Monitoring</text>
  <text x="960" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151" text-anchor="middle">Normal operation, no action needed</text>

  <!-- End node -->
  <line x1="760" y1="625" x2="760" y2="650" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="670" y="650" width="180" height="35" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="18"/>
  <text x="760" y="672" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">RESOLVED - Document</text>

  <!-- Key Takeaway -->
  <rect x="50" y="445" width="250" height="55" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="175" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400e" text-anchor="middle">Interview Focus Area:</text>
  <text x="175" y="482" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#92400e" text-anchor="middle">Be prepared to explain how you would</text>
  <text x="175" y="496" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#92400e" text-anchor="middle">detect and mitigate cache penetration</text>
  <text x="175" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#92400e" text-anchor="middle">in a production environment at scale.</text>
</svg>