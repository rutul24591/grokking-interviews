<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <rect width="1100" height="720" fill="#ffffff" />

  <!-- Title -->
  <text x="550" y="42" font-family="Arial" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">Cache Warming Strategies Comparison</text>
  <text x="550" y="68" font-family="Arial" font-size="15" fill="#374151" text-anchor="middle">Batch Pre-Load, Traffic Replay, Predictive Warming, On-Demand</text>

  <!-- Strategy 1: Batch Pre-Load -->
  <rect x="30" y="95" width="500" height="145" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" />
  <text x="280" y="125" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">A. Batch Pre-Load</text>
  <text x="280" y="150" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Load top-N keys in bulk before deployment or at scheduled intervals</text>

  <text x="50" y="178" font-family="Arial" font-size="13" font-weight="700" fill="#059669">Pros:</text>
  <text x="50" y="198" font-family="Arial" font-size="12" fill="#1f2937">Fast time-to-steady-state (30s - 2 min)</text>
  <text x="50" y="216" font-family="Arial" font-size="12" fill="#1f2937">Simple to implement and reason about</text>
  <text x="50" y="234" font-family="Arial" font-size="12" fill="#1f2937">Predictable origin load with rate limits</text>

  <text x="290" y="178" font-family="Arial" font-size="13" font-weight="700" fill="#dc2626">Cons:</text>
  <text x="290" y="198" font-family="Arial" font-size="12" fill="#1f2937">Warms keys that may not be accessed</text>
  <text x="290" y="216" font-family="Arial" font-size="12" fill="#1f2937">Requires manual top-N list maintenance</text>
  <text x="290" y="234" font-family="Arial" font-size="12" fill="#1f2937">Single burst may spike origin load</text>

  <!-- Strategy 2: Traffic Replay -->
  <rect x="570" y="95" width="500" height="145" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" />
  <text x="820" y="125" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">B. Traffic Replay</text>
  <text x="820" y="150" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Replay recorded production traffic against new cache at reduced rate</text>

  <text x="590" y="178" font-family="Arial" font-size="13" font-weight="700" fill="#059669">Pros:</text>
  <text x="590" y="198" font-family="Arial" font-size="12" fill="#1f2937">Mirrors real access patterns accurately</text>
  <text x="590" y="216" font-family="Arial" font-size="12" fill="#1f2937">Handles temporal patterns naturally</text>
  <text x="590" y="234" font-family="Arial" font-size="12" fill="#1f2937">Self-adjusting to workload changes</text>

  <text x="830" y="178" font-family="Arial" font-size="13" font-weight="700" fill="#dc2626">Cons:</text>
  <text x="830" y="198" font-family="Arial" font-size="12" fill="#1f2937">Requires traffic capture infrastructure</text>
  <text x="830" y="216" font-family="Arial" font-size="12" fill="#1f2937">Longer warm time (2 - 10 min)</text>
  <text x="830" y="234" font-family="Arial" font-size="12" fill="#1f2937">Replay rate must be carefully throttled</text>

  <!-- Strategy 3: Predictive Warming -->
  <rect x="30" y="270" width="500" height="145" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" />
  <text x="280" y="300" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">C. Predictive Warming</text>
  <text x="280" y="325" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Use ML models to predict likely-to-be-accessed keys based on historical patterns</text>

  <text x="50" y="353" font-family="Arial" font-size="13" font-weight="700" fill="#059669">Pros:</text>
  <text x="50" y="373" font-family="Arial" font-size="12" fill="#1f2937">Proactive warming before requests arrive</text>
  <text x="50" y="391" font-family="Arial" font-size="12" fill="#1f2937">Adapts to diurnal and seasonal patterns</text>
  <text x="50" y="409" font-family="Arial" font-size="12" fill="#1f2937">Minimizes unnecessary origin queries</text>

  <text x="290" y="353" font-family="Arial" font-size="13" font-weight="700" fill="#dc2626">Cons:</text>
  <text x="290" y="373" font-family="Arial" font-size="12" fill="#1f2937">Complex ML pipeline to maintain</text>
  <text x="290" y="391" font-family="Arial" font-size="12" fill="#1f2937">Prediction errors cause wasted cache space</text>
  <text x="290" y="409" font-family="Arial" font-size="12" fill="#1f2937">Model training needs historical data</text>

  <!-- Strategy 4: On-Demand -->
  <rect x="570" y="270" width="500" height="145" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" />
  <text x="820" y="300" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">D. On-Demand (Lazy)</text>
  <text x="820" y="325" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">No pre-warming; populate cache entries as real requests arrive (cache miss triggers load)</text>

  <text x="590" y="353" font-family="Arial" font-size="13" font-weight="700" fill="#059669">Pros:</text>
  <text x="590" y="373" font-family="Arial" font-size="12" fill="#1f2937">Zero wasted cache entries</text>
  <text x="590" y="391" font-family="Arial" font-size="12" fill="#1f2937">Simplest strategy to implement</text>
  <text x="590" y="409" font-family="Arial" font-size="12" fill="#1f2937">No additional origin load beyond requests</text>

  <text x="830" y="353" font-family="Arial" font-size="13" font-weight="700" fill="#dc2626">Cons:</text>
  <text x="830" y="373" font-family="Arial" font-size="12" fill="#1f2937">High initial miss rate after deploy</text>
  <text x="830" y="391" font-family="Arial" font-size="12" fill="#1f2937">Risk of cache stampede without guards</text>
  <text x="830" y="409" font-family="Arial" font-size="12" fill="#1f2937">Long time-to-steady-state (5 - 30 min)</text>

  <!-- Comparison Metrics Table -->
  <rect x="30" y="445" width="1040" height="140" rx="8" fill="#f9fafb" stroke="#374151" stroke-width="2" />
  <text x="550" y="475" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Strategy Comparison Metrics</text>

  <!-- Table headers -->
  <text x="160" y="505" font-family="Arial" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Strategy</text>
  <text x="380" y="505" font-family="Arial" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Time to Steady State</text>
  <text x="590" y="505" font-family="Arial" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Origin Load Impact</text>
  <text x="800" y="505" font-family="Arial" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Complexity</text>
  <text x="980" y="505" font-family="Arial" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Hit Rate After Warm</text>

  <!-- Table row lines -->
  <line x1="50" y1="515" x2="1050" y2="515" stroke="#d1d5db" stroke-width="1" />

  <!-- Row 1 -->
  <text x="160" y="535" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Batch Pre-Load</text>
  <text x="380" y="535" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">30s - 2 min</text>
  <text x="590" y="535" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">High burst</text>
  <text x="800" y="535" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Low</text>
  <text x="980" y="535" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">85-90%</text>
  <line x1="50" y1="545" x2="1050" y2="545" stroke="#d1d5db" stroke-width="1" />

  <!-- Row 2 -->
  <text x="160" y="565" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Traffic Replay</text>
  <text x="380" y="565" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">2 - 10 min</text>
  <text x="590" y="565" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Medium (throttled)</text>
  <text x="800" y="565" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Medium</text>
  <text x="980" y="565" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">90-95%</text>
  <line x1="50" y1="575" x2="1050" y2="575" stroke="#d1d5db" stroke-width="1" />

  <!-- Row 3 -->
  <text x="160" y="595" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Predictive</text>
  <text x="380" y="595" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">1 - 5 min</text>
  <text x="590" y="595" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Low (targeted)</text>
  <text x="800" y="595" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">High</text>
  <text x="980" y="595" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">80-88%</text>
  <line x1="50" y1="605" x2="1050" y2="605" stroke="#d1d5db" stroke-width="1" />

  <!-- Row 4 -->
  <text x="160" y="625" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">On-Demand</text>
  <text x="380" y="625" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">5 - 30 min</text>
  <text x="590" y="625" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">None (natural)</text>
  <text x="800" y="625" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">None</text>
  <text x="980" y="625" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">95%+ (eventual)</text>

  <!-- Decision Framework -->
  <rect x="30" y="610" width="1040" height="95" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" />
  <text x="550" y="637" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Decision Framework</text>
  <text x="550" y="660" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Known access patterns + short deploy window -> Batch Pre-Load | Unknown patterns + capture infra available -> Traffic Replay</text>
  <text x="550" y="680" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Strong diurnal patterns + ML team -> Predictive | Low traffic impact + tolerant of initial misses -> On-Demand</text>
  <text x="550" y="700" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Hybrid recommended: Batch Pre-Load for known hot keys + On-Demand fallback for long-tail</text>
</svg>