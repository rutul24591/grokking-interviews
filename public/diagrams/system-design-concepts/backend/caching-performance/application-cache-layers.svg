<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">Application Cache Layers</text>

  <rect x="80" y="100" width="260" height="90" rx="12" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="120" y="145" font-family="Arial" font-size="14" fill="#0f172a">Per-Request Cache</text>

  <rect x="380" y="100" width="260" height="90" rx="12" fill="#dbeafe" stroke="#60a5fa" />
  <text x="420" y="145" font-family="Arial" font-size="14" fill="#0f172a">Process-Local Cache</text>

  <rect x="680" y="100" width="220" height="90" rx="12" fill="#e0f2fe" stroke="#38bdf8" />
  <text x="710" y="145" font-family="Arial" font-size="14" fill="#0f172a">Shared Cache</text>

  <rect x="80" y="240" width="820" height="100" rx="12" fill="#f1f5f9" stroke="#cbd5f5" />
  <text x="110" y="280" font-family="Arial" font-size="14" fill="#0f172a">Each layer reduces load on the next. Local caches are fastest but least consistent.</text>
  <text x="110" y="305" font-family="Arial" font-size="14" fill="#0f172a">Shared caches provide cross-instance reuse and higher hit ratio.</text>
</svg>
