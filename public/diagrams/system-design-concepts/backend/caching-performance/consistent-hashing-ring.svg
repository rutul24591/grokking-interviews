<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" width="900" height="820">
  <!-- Background -->
  <rect width="900" height="820" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">Consistent Hashing Ring: Data Partitioning &amp; Node Management</text>
  <text x="450" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Virtual node distribution, data assignment, and dynamic rebalancing during node addition/removal</text>
  
  <!-- Main Ring Center -->
  <circle cx="320" cy="380" r="220" fill="none" stroke="#111827" stroke-width="3"/>
  <!-- Ring tick marks for hash space -->
  <g stroke="#9ca3af" stroke-width="1">
    <line x1="320" y1="160" x2="320" y2="170"/>
    <line x1="540" y1="380" x2="530" y2="380"/>
    <line x1="320" y1="600" x2="320" y2="590"/>
    <line x1="100" y1="380" x2="110" y2="380"/>
    <line x1="476" y1="224" x2="469" y2="231"/>
    <line x1="476" y1="536" x2="469" y2="529"/>
    <line x1="164" y1="536" x2="171" y2="529"/>
    <line x1="164" y1="224" x2="171" y2="231"/>
  </g>
  
  <!-- Hash space labels -->
  <text x="320" y="148" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">0</text>
  <text x="560" y="384" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="start">2^31</text>
  <text x="320" y="620" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="middle">2^32</text>
  <text x="90" y="384" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937" text-anchor="end">2^30</text>
  
  <!-- Physical Node A -->
  <circle cx="320" cy="160" r="28" fill="#dbeafe" stroke="#1e40af" stroke-width="3"/>
  <text x="320" y="156" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e40af" text-anchor="middle">Node A</text>
  <text x="320" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1e40af" text-anchor="middle">Physical</text>
  
  <!-- Physical Node B -->
  <circle cx="540" cy="380" r="28" fill="#dcfce7" stroke="#166534" stroke-width="3"/>
  <text x="540" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">Node B</text>
  <text x="540" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#166534" text-anchor="middle">Physical</text>
  
  <!-- Physical Node C -->
  <circle cx="210" cy="570" r="28" fill="#fef3c7" stroke="#92400e" stroke-width="3"/>
  <text x="210" y="566" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">Node C</text>
  <text x="210" y="582" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#92400e" text-anchor="middle">Physical</text>
  
  <!-- Virtual Nodes for Node A (V1) -->
  <circle cx="200" cy="224" r="16" fill="#93c5fd" stroke="#1e40af" stroke-width="2"/>
  <text x="200" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#1e40af" text-anchor="middle">A1</text>
  
  <circle cx="440" cy="224" r="16" fill="#93c5fd" stroke="#1e40af" stroke-width="2"/>
  <text x="440" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#1e40af" text-anchor="middle">A2</text>
  
  <!-- Virtual Nodes for Node B (V2) -->
  <circle cx="440" cy="536" r="16" fill="#86efac" stroke="#166534" stroke-width="2"/>
  <text x="440" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#166534" text-anchor="middle">B1</text>
  
  <circle cx="100" y="380" r="16" fill="#86efac" stroke="#166534" stroke-width="2"/>
  <text x="100" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#166534" text-anchor="middle">B2</text>
  
  <!-- Virtual Nodes for Node C (V3) -->
  <circle cx="210" cy="280" r="16" fill="#fde68a" stroke="#92400e" stroke-width="2"/>
  <text x="210" y="284" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">C1</text>
  
  <circle cx="430" cy="460" r="16" fill="#fde68a" stroke="#92400e" stroke-width="2"/>
  <text x="430" y="464" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#92400e" text-anchor="middle">C2</text>
  
  <!-- Data Items on the Ring -->
  <circle cx="260" cy="200" r="10" fill="#f3f4f6" stroke="#4b5563" stroke-width="2"/>
  <text x="260" y="204" font-family="monospace" font-size="9" font-weight="700" fill="#1f2937" text-anchor="middle">K1</text>
  
  <circle cx="480" cy="300" r="10" fill="#f3f4f6" stroke="#4b5563" stroke-width="2"/>
  <text x="480" y="304" font-family="monospace" font-size="9" font-weight="700" fill="#1f2937" text-anchor="middle">K2</text>
  
  <circle cx="380" cy="500" r="10" fill="#f3f4f6" stroke="#4b5563" stroke-width="2"/>
  <text x="380" y="504" font-family="monospace" font-size="9" font-weight="700" fill="#1f2937" text-anchor="middle">K3</text>
  
  <circle cx="150" cy="480" r="10" fill="#f3f4f6" stroke="#4b5563" stroke-width="2"/>
  <text x="150" y="484" font-family="monospace" font-size="9" font-weight="700" fill="#1f2937" text-anchor="middle">K4</text>
  
  <circle cx="370" cy="260" r="10" fill="#f3f4f6" stroke="#4b5563" stroke-width="2"/>
  <text x="370" y="264" font-family="monospace" font-size="9" font-weight="700" fill="#1f2937" text-anchor="middle">K5</text>
  
  <!-- Arc Segments showing data ranges -->
  <path d="M 320 160 A 220 220 0 0 1 540 380" fill="none" stroke="#1e40af" stroke-width="6" stroke-dasharray="8,4" opacity="0.6"/>
  <path d="M 540 380 A 220 220 0 0 1 210 570" fill="none" stroke="#166534" stroke-width="6" stroke-dasharray="8,4" opacity="0.6"/>
  <path d="M 210 570 A 220 220 0 0 1 320 160" fill="none" stroke="#92400e" stroke-width="6" stroke-dasharray="8,4" opacity="0.6"/>
  
  <!-- Arrow annotations for data assignment -->
  <line x1="260" y1="200" x2="320" y2="160" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="480" y1="300" x2="540" y2="380" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="500" x2="210" y2="570" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="480" x2="100" y2="380" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="370" y1="260" x2="440" y2="224" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
  </defs>
  
  <!-- RIGHT PANEL: Node Addition Scenario -->
  <rect x="640" y="90" width="240" height="320" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="760" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Node Addition (Node D)</text>
  
  <line x1="660" y1="130" x2="860" y2="130" stroke="#d1d5db" stroke-width="1"/>
  
  <!-- Before state -->
  <text x="760" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#374151" text-anchor="middle">Before: 3 Physical Nodes</text>
  <text x="760" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Each node owns ~33% of hash space</text>
  <text x="760" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">A: keys 0-&gt;2^31, B: 2^31-&gt;2^30</text>
  <text x="760" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">C: 2^30-&gt;0 (wrapping)</text>
  
  <text x="760" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#374151" text-anchor="middle">After: Add Node D at position 400</text>
  <text x="760" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Node D takes keys between C and D</text>
  <text x="760" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Only ~25% of keys move (C-&gt;D)</text>
  <text x="760" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">A and B remain unaffected</text>
  
  <text x="760" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Minimal Data Movement</text>
  <text x="760" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Only adjacent node redistributes</text>
  <text x="760" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">O(K/N) keys move vs O(K) for modulo</text>
  <text x="760" y="354" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">K=total keys, N=node count</text>
  <text x="760" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#166534" text-anchor="middle">vs O(K) for hash modulo</text>
  
  <!-- BOTTOM PANEL: Comparison Table -->
  <rect x="20" y="640" width="560" height="160" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="300" y="668" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Consistent Hashing vs Traditional Modulo Hashing</text>
  
  <line x1="40" y1="680" x2="560" y2="680" stroke="#d1d5db" stroke-width="2"/>
  
  <!-- Table Headers -->
  <text x="160" y="702" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Property</text>
  <text x="300" y="702" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Consistent Hashing</text>
  <text x="440" y="702" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Modulo Hashing</text>
  
  <line x1="40" y1="710" x2="560" y2="710" stroke="#d1d5db" stroke-width="1"/>
  
  <!-- Row 1 -->
  <text x="160" y="728" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Keys moved on add/remove</text>
  <text x="300" y="728" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#166534" text-anchor="middle">O(K/N) - Minimal</text>
  <text x="440" y="728" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">O(K) - All keys</text>
  
  <line x1="40" y1="736" x2="560" y2="736" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Row 2 -->
  <text x="160" y="754" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Load distribution</text>
  <text x="300" y="754" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#166534" text-anchor="middle">Balanced (virtual nodes)</text>
  <text x="440" y="754" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#d97706" text-anchor="middle">Uneven possible</text>
  
  <line x1="40" y1="762" x2="560" y2="762" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Row 3 -->
  <text x="160" y="780" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Scalability</text>
  <text x="300" y="780" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#166534" text-anchor="middle">Horizontal, elastic</text>
  <text x="440" y="780" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">Requires rehashing</text>
  
  <line x1="40" y1="788" x2="560" y2="788" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Row 4 -->
  <text x="160" y="806" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Use case</text>
  <text x="300" y="806" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Distributed caches, DBs</text>
  <text x="440" y="806" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Static partitioning</text>
  
  <!-- RIGHT BOTTOM: Virtual Node Benefits -->
  <rect x="640" y="430" width="240" height="370" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="760" y="458" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Virtual Node Benefits</text>
  
  <line x1="660" y1="470" x2="860" y2="470" stroke="#d1d5db" stroke-width="1"/>
  
  <text x="760" y="496" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#374151" text-anchor="middle">Load Balancing</text>
  <text x="760" y="514" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Each physical node gets 100-200</text>
  <text x="760" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">virtual nodes spread across ring</text>
  <text x="760" y="546" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Ensures uniform data distribution</text>
  
  <line x1="660" y1="560" x2="860" y2="560" stroke="#d1d5db" stroke-width="1"/>
  
  <text x="760" y="584" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#374151" text-anchor="middle">Heterogeneous Capacity</text>
  <text x="760" y="602" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Nodes with more RAM get more</text>
  <text x="760" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">virtual nodes proportional to capacity</text>
  <text x="760" y="634" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">16GB node gets 2x virtual nodes vs 8GB</text>
  
  <line x1="660" y1="648" x2="860" y2="648" stroke="#d1d5db" stroke-width="1"/>
  
  <text x="760" y="672" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#374151" text-anchor="middle">Failure Resilience</text>
  <text x="760" y="690" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">When a node fails, its virtual nodes</text>
  <text x="760" y="706" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">redistribute to multiple neighbors</text>
  <text x="760" y="722" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Prevents thundering herd on single node</text>
  
  <line x1="660" y1="736" x2="860" y2="736" stroke="#d1d5db" stroke-width="1"/>
  
  <text x="760" y="760" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#374151" text-anchor="middle">Hash Function</text>
  <text x="760" y="778" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Typically MD5, MurmurHash3, or</text>
  <text x="760" y="794" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">SHA-256 mapped to 0..2^32-1 range</text>
</svg>