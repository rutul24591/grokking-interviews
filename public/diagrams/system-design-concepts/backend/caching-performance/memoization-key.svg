<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Memoization Cache Key Design — Serialization, Collision &amp; Normalization</text>

  <!-- ============ TOP: Key Construction Pipeline ============ -->
  <text x="550" y="78" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Key Construction Pipeline</text>

  <!-- Step 1: Function Args -->
  <rect x="30" y="100" width="150" height="60" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="122" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">Function</text>
  <text x="105" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">Arguments</text>

  <!-- Arrow -->
  <line x1="180" y1="130" x2="225" y2="130" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="202" y="122" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">serialize</text>

  <!-- Step 2: Context -->
  <rect x="225" y="100" width="150" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="300" y="122" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0c4a6e" text-anchor="middle">Context</text>
  <text x="300" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0c4a6e" text-anchor="middle">Injection</text>

  <!-- Arrow -->
  <line x1="375" y1="130" x2="420" y2="130" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="397" y="122" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">merge</text>

  <!-- Step 3: Normalize -->
  <rect x="420" y="100" width="150" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="495" y="122" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#92400e" text-anchor="middle">Normalize</text>
  <text x="495" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#92400e" text-anchor="middle">&amp; Canonicalize</text>

  <!-- Arrow -->
  <line x1="570" y1="130" x2="615" y2="130" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="592" y="122" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">hash</text>

  <!-- Step 4: Version -->
  <rect x="615" y="100" width="150" height="60" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="690" y="122" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#5b21b6" text-anchor="middle">Version</text>
  <text x="690" y="140" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#5b21b6" text-anchor="middle">Prefix (v2)</text>

  <!-- Arrow -->
  <line x1="765" y1="130" x2="810" y2="130" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="787" y="122" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">concat</text>

  <!-- Step 5: Final Key -->
  <rect x="810" y="100" width="260" height="60" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="940" y="122" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle">Final Cache Key</text>
  <text x="940" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">v2:computePrice:user=42|items=[12,45]|us-east</text>

  <!-- ============ MIDDLE-LEFT: Key Collision Scenarios ============ -->
  <text x="275" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Key Collision Scenarios</text>

  <!-- Collision 1: Arg order -->
  <rect x="40" y="220" width="470" height="80" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="275" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">Collision #1: Argument Order</text>
  <text x="60" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">f(a=1, b=2) -&gt; key "a:1,b:2"</text>
  <text x="60" y="282" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">f(b=2, a=1) -&gt; key "b:2,a:1"  — DIFFERENT keys, SAME result (wasted entry)</text>

  <!-- Collision 2: Reference vs deep equality -->
  <rect x="40" y="315" width="470" height="80" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="275" y="335" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">Collision #2: Reference vs Deep Equality</text>
  <text x="60" y="357" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">f({x:1, y:2}) objRef1 -&gt; key "[object Object]" (identity hash)</text>
  <text x="60" y="377" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">f({x:1, y:2}) objRef2 -&gt; key "[object Object]" — SAME key, DIFFERENT objects (stale cache)</text>

  <!-- Collision 3: NaN / undefined -->
  <rect x="40" y="410" width="470" height="80" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="275" y="430" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">Collision #3: Special Values</text>
  <text x="60" y="452" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">f(NaN) and f(undefined) both serialize to "null" in JSON — KEY COLLISION, wrong result returned</text>

  <!-- ============ MIDDLE-RIGHT: Normalization Strategies ============ -->
  <text x="825" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Key Normalization Strategies</text>

  <!-- Strategy 1: Canonical ordering -->
  <rect x="570" y="220" width="490" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="815" y="242" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle">Canonical Key Ordering</text>
  <text x="815" y="262" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">Sort keys alphabetically: {b:2,a:1} -&gt; "a:1,b:2" — deterministic key regardless of call order</text>

  <!-- Strategy 2: Deep hashing -->
  <rect x="570" y="305" width="490" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="815" y="327" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle">Deep Hash for Objects</text>
  <text x="815" y="347" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">SHA-256 of canonical JSON: {x:1,y:2} -&gt; "sha256:a1b2c3..." — content-based key avoids reference collisions</text>

  <!-- Strategy 3: Type tagging -->
  <rect x="570" y="390" width="490" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="815" y="412" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle">Type-Aware Serialization</text>
  <text x="815" y="432" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">Tag types: "NaN:!", "undefined:?u", "null:?n" — prevents special-value collisions in key space</text>

  <!-- Strategy 4: Context scoping -->
  <rect x="570" y="475" width="490" height="70" rx="8" fill="#ffffff" stroke="#059669" stroke-width="2"/>
  <text x="815" y="497" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle">Context / Scope Prefixing</text>
  <text x="815" y="517" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">Prefix with tenant, region, env: "prod:tenant-5:us-east:" — prevents cross-scope cache poisoning</text>

  <!-- ============ BOTTOM: Memory Overhead &amp; Serialization Cost ============ -->
  <text x="550" y="570" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Memory Overhead per Key &amp; Serialization Cost Analysis</text>

  <!-- Memory Overhead Table -->
  <rect x="40" y="590" width="500" height="120" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="290" y="612" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Memory Cost per Key Strategy</text>

  <!-- Row 1 -->
  <rect x="55" y="625" width="150" height="28" rx="4" fill="#f3f4f6"/>
  <text x="130" y="644" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">String concat key</text>
  <rect x="205" y="625" width="140" height="28" rx="4" fill="#d1fae5"/>
  <text x="275" y="644" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">~48 bytes avg</text>
  <rect x="345" y="625" width="180" height="28" rx="4" fill="#dbeafe"/>
  <text x="435" y="644" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">Lowest overhead</text>

  <!-- Row 2 -->
  <rect x="55" y="658" width="150" height="28" rx="4" fill="#f3f4f6"/>
  <text x="130" y="677" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">JSON serialized</text>
  <rect x="205" y="658" width="140" height="28" rx="4" fill="#fef3c7"/>
  <text x="275" y="677" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">~120-400 bytes</text>
  <rect x="345" y="658" width="180" height="28" rx="4" fill="#dbeafe"/>
  <text x="435" y="677" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">Moderate, grows with args</text>

  <!-- Row 3 -->
  <rect x="55" y="691" width="150" height="28" rx="4" fill="#f3f4f6"/>
  <text x="130" y="710" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">SHA-256 hash key</text>
  <rect x="205" y="691" width="140" height="28" rx="4" fill="#d1fae5"/>
  <text x="275" y="710" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">64 bytes (hex)</text>
  <rect x="345" y="691" width="180" height="28" rx="4" fill="#dbeafe"/>
  <text x="435" y="710" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">Fixed size, CPU for hash</text>

  <!-- Serialization Cost Panel -->
  <rect x="560" y="590" width="500" height="120" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="810" y="612" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Serialization Cost (per borrow)</text>

  <!-- Cost 1 -->
  <rect x="575" y="625" width="150" height="28" rx="4" fill="#f3f4f6"/>
  <text x="650" y="644" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">JSON.stringify</text>
  <rect x="725" y="625" width="140" height="28" rx="4" fill="#d1fae5"/>
  <text x="795" y="644" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">~0.02ms avg</text>
  <rect x="865" y="625" width="180" height="28" rx="4" fill="#fee2e2"/>
  <text x="955" y="644" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">Fails on circular refs</text>

  <!-- Cost 2 -->
  <rect x="575" y="658" width="150" height="28" rx="4" fill="#f3f4f6"/>
  <text x="650" y="677" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Deep equal + sort</text>
  <rect x="725" y="658" width="140" height="28" rx="4" fill="#fef3c7"/>
  <text x="795" y="677" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">~0.08ms avg</text>
  <rect x="865" y="658" width="180" height="28" rx="4" fill="#fee2e2"/>
  <text x="955" y="677" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">O(n log n) sort on keys</text>

  <!-- Cost 3 -->
  <rect x="575" y="691" width="150" height="28" rx="4" fill="#f3f4f6"/>
  <text x="650" y="710" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">SHA-256 hash</text>
  <rect x="725" y="691" width="140" height="28" rx="4" fill="#fef3c7"/>
  <text x="795" y="710" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">~0.15ms avg</text>
  <rect x="865" y="691" width="180" height="28" rx="4" fill="#d1fae5"/>
  <text x="955" y="710" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">Collision-proof, safe</text>

  <!-- Markers -->
  <defs>
    <marker id="arrowR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
  </defs>
</svg>