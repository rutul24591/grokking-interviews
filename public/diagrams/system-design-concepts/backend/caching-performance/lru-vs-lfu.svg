<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="860" viewBox="0 0 1100 860">
  <!-- White background -->
  <rect width="1100" height="860" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="44" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">LRU vs LFU: Architecture &amp; Eviction Comparison</text>
  <text x="550" y="68" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#374151">Same Access Pattern, Different Eviction Outcomes</text>

  <!-- ==================== ACCESS PATTERN (shared) ==================== -->
  <rect x="30" y="90" width="1040" height="60" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="550" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Shared Access Pattern (time flows left to right):</text>
  <text x="550" y="136" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e3a5f">A -&gt; B -&gt; C -&gt; A -&gt; A -&gt; B -&gt; D -&gt; A -&gt; E -&gt; F</text>
  <text x="550" y="142" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151"></text>

  <!-- Access pattern visual timeline -->
  <!-- A -->
  <rect x="100" y="100" width="50" height="30" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e40af">A</text>
  <!-- B -->
  <rect x="165" y="100" width="50" height="30" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="190" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">B</text>
  <!-- C -->
  <rect x="230" y="100" width="50" height="30" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="255" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#5b21b6">C</text>
  <!-- A -->
  <rect x="295" y="100" width="50" height="30" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e40af">A</text>
  <!-- A -->
  <rect x="360" y="100" width="50" height="30" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="385" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e40af">A</text>
  <!-- B -->
  <rect x="425" y="100" width="50" height="30" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">B</text>
  <!-- D -->
  <rect x="490" y="100" width="50" height="30" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="515" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#166534">D</text>
  <!-- A -->
  <rect x="555" y="100" width="50" height="30" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="580" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e40af">A</text>
  <!-- E -->
  <rect x="620" y="100" width="50" height="30" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="645" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#9d174d">E</text>
  <!-- F -->
  <rect x="685" y="100" width="50" height="30" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <text x="710" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#374151">F</text>

  <!-- Cache capacity label -->
  <text x="800" y="112" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Cache Capacity: 4 slots</text>
  <text x="800" y="130" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">When F arrives, cache is full</text>

  <!-- ==================== LRU SECTION ==================== -->
  <text x="275" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">LRU (Least Recently Used)</text>
  <text x="275" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Evicts the entry accessed longest ago</text>

  <!-- LRU State Before F arrives -->
  <rect x="30" y="230" width="490" height="180" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="275" y="255" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Cache State Before F Arrives (after access to E):</text>

  <!-- Linked list: Head (most recent) -> ... -> Tail (least recent / to evict) -->
  <!-- Head marker -->
  <rect x="60" y="275" width="70" height="32" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <text x="95" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#374151">HEAD</text>
  <text x="95" y="318" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="400" fill="#374151">Most Recent</text>

  <!-- E (most recent access) -->
  <line x1="130" y1="291" x2="160" y2="291" stroke="#1f2937" stroke-width="2"/>
  <polygon points="160,295 166,291 160,287" fill="#1f2937"/>
  <rect x="170" y="275" width="60" height="32" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="200" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#9d174d">E</text>

  <!-- A (accessed before E) -->
  <line x1="230" y1="291" x2="260" y2="291" stroke="#1f2937" stroke-width="2"/>
  <polygon points="260,295 266,291 260,287" fill="#1f2937"/>
  <rect x="270" y="275" width="60" height="32" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e40af">A</text>
  <text x="300" y="322" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="400" fill="#374151">freq=4</text>

  <!-- D (accessed before A) -->
  <line x1="330" y1="291" x2="360" y2="291" stroke="#1f2937" stroke-width="2"/>
  <polygon points="360,295 366,291 360,287" fill="#1f2937"/>
  <rect x="370" y="275" width="60" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#166534">D</text>

  <!-- B (least recent - TO BE EVICTED) -->
  <line x1="430" y1="291" x2="460" y2="291" stroke="#1f2937" stroke-width="2"/>
  <polygon points="460,295 466,291 460,287" fill="#1f2937"/>
  <rect x="470" y="275" width="60" height="32" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="500" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#dc2626">B</text>
  <text x="500" y="322" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="700" fill="#dc2626">EVICT</text>

  <!-- Tail marker -->
  <line x1="530" y1="291" x2="560" y2="291" stroke="#1f2937" stroke-width="2"/>
  <polygon points="560,295 566,291 560,287" fill="#1f2937"/>
  <rect x="570" y="275" width="70" height="32" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <text x="605" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#374151">TAIL</text>
  <text x="605" y="318" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="400" fill="#374151">Least Recent</text>

  <!-- Key insight -->
  <rect x="30" y="330" width="490" height="65" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="275" y="352" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">LRU Eviction Decision:</text>
  <text x="275" y="372" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">B is evicted because it was accessed longest ago (step 6), even though</text>
  <text x="275" y="388" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">B has frequency=2 (tied with D). LRU ignores access frequency entirely.</text>

  <!-- LRU Cache After F -->
  <rect x="30" y="410" width="490" height="70" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="275" y="432" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">After Inserting F (B evicted):</text>
  <text x="275" y="455" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a5f">E -&gt; F -&gt; A -&gt; D</text>
  <text x="275" y="472" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">B removed despite being accessed 2 times</text>

  <!-- ==================== LFU SECTION ==================== -->
  <text x="825" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">LFU (Least Frequently Used)</text>
  <text x="825" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Evicts the entry with lowest access count</text>

  <!-- LFU frequency counts -->
  <rect x="580" y="230" width="490" height="180" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="825" y="255" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Frequency Counts Before F Arrives:</text>

  <!-- Frequency bars -->
  <!-- A: 4 accesses -->
  <text x="620" y="290" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e40af">A:</text>
  <rect x="650" y="278" width="200" height="22" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="750" y="294" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#1e40af">4 accesses</text>

  <!-- B: 2 accesses -->
  <text x="620" y="320" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">B:</text>
  <rect x="650" y="308" width="100" height="22" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="700" y="324" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#92400e">2 accesses</text>

  <!-- C: 1 access -->
  <text x="620" y="350" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#5b21b6">C:</text>
  <rect x="650" y="338" width="50" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="675" y="354" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#dc2626">1</text>
  <text x="700" y="354" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#dc2626">EVICT</text>

  <!-- D: 1 access -->
  <text x="770" y="350" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#166534">D:</text>
  <rect x="800" y="338" width="50" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="825" y="354" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#dc2626">1</text>

  <!-- E: 1 access -->
  <text x="870" y="350" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#9d174d">E:</text>
  <rect x="900" y="338" width="50" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="925" y="354" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#dc2626">1</text>

  <!-- Tie-break note -->
  <rect x="960" y="330" width="95" height="36" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1007" y="347" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="400" fill="#1f2937">3 entries tied</text>
  <text x="1007" y="359" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="400" fill="#1f2937">at freq=1</text>

  <!-- Key insight -->
  <rect x="580" y="330" width="490" height="65" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="825" y="352" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">LFU Eviction Decision:</text>
  <text x="825" y="372" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">C, D, E all have frequency=1. With FIFO tie-breaking, C is evicted</text>
  <text x="825" y="388" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">(oldest among ties). B survives with freq=2 despite being less recent.</text>

  <!-- LFU Cache After F -->
  <rect x="580" y="410" width="490" height="70" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="825" y="432" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">After Inserting F (C evicted):</text>
  <text x="825" y="455" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e3a5f">A(4) -&gt; B(2) -&gt; D(1) -&gt; F(1)</text>
  <text x="825" y="472" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">C removed; B retained due to higher frequency despite being older</text>

  <!-- ==================== DIFFERENCE HIGHLIGHT ==================== -->
  <rect x="30" y="500" width="1040" height="80" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="550" y="522" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#dc2626">Key Difference: Different Entry Evicted</text>
  <text x="275" y="550" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">LRU evicts B</text>
  <text x="275" y="568" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">(least recently accessed)</text>
  <text x="825" y="550" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">LFU evicts C</text>
  <text x="825" y="568" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">(lowest frequency, oldest among ties)</text>

  <!-- ==================== STRENGTHS & WEAKNESSES ==================== -->
  <text x="550" y="620" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Strengths &amp; Weaknesses Comparison</text>

  <!-- LRU Strengths -->
  <rect x="30" y="640" width="500" height="90" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <rect x="30" y="640" width="130" height="32" rx="10" fill="#16a34a"/>
  <text x="95" y="661" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">LRU Strengths</text>

  <text x="50" y="686" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Simple O(1) implementation with doubly-linked list + HashMap</text>
  <text x="50" y="704" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Excellent for temporal locality (recently accessed = likely needed)</text>
  <text x="50" y="722" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Low memory overhead (2 pointers per entry)</text>

  <!-- LRU Weaknesses -->
  <rect x="570" y="640" width="500" height="90" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <rect x="570" y="640" width="145" height="32" rx="10" fill="#dc2626"/>
  <text x="642" y="661" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">LRU Weaknesses</text>

  <text x="590" y="686" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Poor for scan-heavy workloads (one-pass scans evict hot entries)</text>
  <text x="590" y="704" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Ignores access frequency (a rarely-accessed entry survives if recent)</text>
  <text x="590" y="722" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Cache pollution from batch operations or background sync tasks</text>

  <!-- LFU Strengths -->
  <rect x="30" y="745" width="500" height="90" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <rect x="30" y="745" width="130" height="32" rx="10" fill="#16a34a"/>
  <text x="95" y="766" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">LFU Strengths</text>

  <text x="50" y="791" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Excellent for skewed access patterns (hot keys stay cached longer)</text>
  <text x="50" y="809" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Resilient to scan workloads (infrequent entries evicted, not hot ones)</text>
  <text x="50" y="827" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Better cache hit rates for workloads with stable hot-key distributions</text>

  <!-- LFU Weaknesses -->
  <rect x="570" y="745" width="500" height="90" rx="10" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <rect x="570" y="745" width="145" height="32" rx="10" fill="#dc2626"/>
  <text x="642" y="766" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">LFU Weaknesses</text>

  <text x="590" y="791" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Higher memory overhead (frequency counters + multiple data structures)</text>
  <text x="590" y="809" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Stale hot-key problem (old hot keys with high freq block new entries)</text>
  <text x="590" y="827" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Slow adaptation to changing access patterns without aging mechanism</text>

  <!-- ==================== WHEN TO USE ==================== -->
  <rect x="30" y="850" width="1040" height="0" rx="0" fill="none" stroke="none"/>
</svg>