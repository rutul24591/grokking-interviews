<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="sketchGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="transparent" />

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="currentColor">Caffeine Window TinyLFU Internals</text>

  <!-- Admission Window -->
  <rect x="60" y="65" width="320" height="160" rx="12" fill="url(#windowGrad)" stroke="#8b5cf6" stroke-width="2" />
  <text x="220" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#8b5cf6">Admission Window (1% of cache)</text>
  <text x="220" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="currentColor" opacity="0.7">LRU-based, new entries enter here</text>

  <!-- Window entries -->
  <rect x="85" y="135" width="55" height="35" rx="4" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" />
  <text x="112" y="157" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#8b5cf6">Key A</text>

  <rect x="150" y="135" width="55" height="35" rx="4" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" />
  <text x="177" y="157" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#8b5cf6">Key B</text>

  <rect x="215" y="135" width="55" height="35" rx="4" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" />
  <text x="242" y="157" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#8b5cf6">Key C</text>

  <rect x="280" y="135" width="55" height="35" rx="4" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1" />
  <text x="307" y="157" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#8b5cf6">Key D</text>

  <!-- Arrow: Admission Window -> Main Space (promote) -->
  <text x="220" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#8b5cf6">On re-access: evaluate for promotion</text>

  <!-- Arrow down to Main Space -->
  <line x1="220" y1="225" x2="220" y2="280" stroke="#8b5cf6" stroke-width="2" stroke-opacity="0.6" marker-end="url(#arrowheadPurple)" />
  <text x="240" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#8b5cf6">Promote</text>

  <!-- Main Space -->
  <rect x="60" y="280" width="320" height="210" rx="12" fill="url(#mainGrad)" stroke="#3b82f6" stroke-width="2" />
  <text x="220" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">Main Space (99% of cache)</text>
  <text x="220" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="currentColor" opacity="0.7">Governed by TinyLFU frequency sketch</text>

  <!-- Main space entries -->
  <rect x="85" y="350" width="60" height="40" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" />
  <text x="115" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#3b82f6">Key X</text>
  <text x="115" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.6">freq: 150</text>

  <rect x="160" y="350" width="60" height="40" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" />
  <text x="190" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#3b82f6">Key Y</text>
  <text x="190" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.6">freq: 89</text>

  <rect x="235" y="350" width="60" height="40" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" />
  <text x="265" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#3b82f6">Key Z</text>
  <text x="265" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.6">freq: 234</text>

  <rect x="310" y="350" width="60" height="40" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" />
  <text x="340" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="#3b82f6">Key W</text>
  <text x="340" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.6">freq: 12</text>

  <!-- Eviction note -->
  <text x="220" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Lowest frequency entry (Key W: freq 12) is candidate for eviction</text>
  <text x="220" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">New entry admitted only if its frequency &gt; victim frequency</text>
  <text x="220" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Periodic frequency decay: all counters halved (solves recency bias)</text>

  <!-- TinyLFU Frequency Sketch -->
  <rect x="440" y="65" width="310" height="440" rx="12" fill="url(#sketchGrad)" stroke="#f59e0b" stroke-width="2" />
  <text x="595" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">TinyLFU Frequency Sketch</text>
  <text x="595" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="currentColor" opacity="0.7">Count-Min Sketch: fixed-size, probabilistic</text>

  <!-- Sketch matrix visualization -->
  <text x="470" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="normal" fill="currentColor" opacity="0.8">4 Hash Functions, 4 Rows:</text>

  <!-- Row 1 -->
  <text x="470" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">h1:</text>
  <rect x="500" y="180" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="520" y="196" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">150</text>
  <rect x="550" y="180" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="570" y="196" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">89</text>
  <rect x="600" y="180" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="620" y="196" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">234</text>
  <rect x="650" y="180" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="670" y="196" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">12</text>

  <!-- Row 2 -->
  <text x="470" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">h2:</text>
  <rect x="500" y="215" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="520" y="231" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">148</text>
  <rect x="550" y="215" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="570" y="231" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">91</text>
  <rect x="600" y="215" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="620" y="231" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">236</text>
  <rect x="650" y="215" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="670" y="231" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">11</text>

  <!-- Row 3 -->
  <text x="470" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">h3:</text>
  <rect x="500" y="250" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="520" y="266" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">151</text>
  <rect x="550" y="250" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="570" y="266" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">88</text>
  <rect x="600" y="250" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="620" y="266" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">235</text>
  <rect x="650" y="250" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="670" y="266" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">12</text>

  <!-- Row 4 -->
  <text x="470" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">h4:</text>
  <rect x="500" y="285" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="520" y="301" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">149</text>
  <rect x="550" y="285" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="570" y="301" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">90</text>
  <rect x="600" y="285" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="620" y="301" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">233</text>
  <rect x="650" y="285" width="40" height="24" rx="3" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" />
  <text x="670" y="301" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">13</text>

  <!-- Column labels -->
  <text x="520" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.6">Key X</text>
  <text x="570" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.6">Key Y</text>
  <text x="620" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.6">Key Z</text>
  <text x="670" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="normal" fill="currentColor" opacity="0.6">Key W</text>

  <!-- Frequency estimation note -->
  <text x="595" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Estimated freq = min of 4 hash counters</text>
  <text x="595" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">Example: Key Z freq = min(234, 236, 235, 233) = 233</text>

  <!-- Decay mechanism -->
  <rect x="470" y="405" width="250" height="70" rx="8" fill="currentColor" opacity="0.05" stroke="currentColor" stroke-width="1" stroke-opacity="0.2" />
  <text x="595" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="currentColor">Frequency Decay (Periodic)</text>
  <text x="595" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">All counters halved to prevent</text>
  <text x="595" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.7">historical frequency from dominating</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowheadPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6" />
    </marker>
  </defs>

  <!-- Segments label -->
  <text x="220" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="normal" fill="currentColor" opacity="0.6">Cache divided into segments for concurrent access (one lock per segment)</text>
</svg>
