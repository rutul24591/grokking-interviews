<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100">
  <!-- Background -->
  <rect width="1400" height="1100" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#111827">Lazy Loading: On-Demand Cache Population</text>
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#374151">Cache-aside pattern flow and N+1 query optimization with DataLoader batching</text>

  <!-- ============================================ -->
  <!-- SECTION 1: LAZY LOADING FLOW (top half)      -->
  <!-- ============================================ -->

  <text x="60" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Cache-Aside Pattern: Lazy Load Flow</text>

  <!-- Step 1: Client Request -->
  <rect x="60" y="165" width="200" height="70" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="160" y="193" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">Client Request</text>
  <text x="160" y="215" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">GET /users/12345</text>

  <!-- Arrow 1 -->
  <line x1="260" y1="200" x2="310" y2="200" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Cache Lookup -->
  <rect x="310" y="165" width="200" height="70" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="410" y="193" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">Cache Lookup</text>
  <text x="410" y="215" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">cache.get("user:12345")</text>

  <!-- Arrow 2 - CACHE MISS path -->
  <line x1="510" y1="200" x2="560" y2="200" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="520" y="190" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#dc2626">MISS</text>

  <!-- Step 3: Load from Origin -->
  <rect x="560" y="165" width="220" height="70" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="670" y="193" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">Origin Database</text>
  <text x="670" y="215" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">SELECT * FROM users WHERE id=12345</text>

  <!-- Arrow 3 -->
  <line x1="780" y1="200" x2="830" y2="200" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Populate Cache -->
  <rect x="830" y="165" width="220" height="70" rx="10" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="940" y="193" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">Populate Cache</text>
  <text x="940" y="215" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">cache.set("user:12345", data, TTL)</text>

  <!-- Arrow 4 -->
  <line x1="1050" y1="200" x2="1100" y2="200" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Return Response -->
  <rect x="1100" y="165" width="240" height="70" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="1220" y="193" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">Return Response</text>
  <text x="1220" y="215" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">JSON: { id, name, email }</text>

  <!-- CACHE HIT path (subsequent request) -->
  <line x1="410" y1="235" x2="410" y2="260" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="420" y="255" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#16a34a">HIT (next request)</text>

  <rect x="310" y="260" width="200" height="55" rx="10" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="410" y="285" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle">Direct Cache Return</text>
  <text x="410" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Latency: ~1-5ms (Redis)</text>

  <!-- ============================================ -->
  <!-- SECTION 2: N+1 QUERY PROBLEM                 -->
  <!-- ============================================ -->

  <text x="60" y="370" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">The N+1 Query Problem in Lazy Loading</text>

  <!-- Problem scenario -->
  <rect x="60" y="395" width="620" height="280" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="80" y="425" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Problem: Sequential N+1 Queries</text>

  <text x="80" y="455" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#374151">Fetching 5 products with their sellers:</text>

  <!-- Query 1 -->
  <rect x="80" y="470" width="580" height="30" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="100" y="490" font-family="monospace" font-size="12" font-weight="700" fill="#dc2626">1. SELECT * FROM products LIMIT 5</text>

  <!-- Query 2-6 (N+1) -->
  <rect x="80" y="505" width="580" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="100" y="524" font-family="monospace" font-size="12" font-weight="700" fill="#dc2626">2. SELECT * FROM sellers WHERE id = 101</text>

  <rect x="80" y="538" width="580" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="100" y="557" font-family="monospace" font-size="12" font-weight="700" fill="#dc2626">3. SELECT * FROM sellers WHERE id = 102</text>

  <rect x="80" y="571" width="580" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="100" y="590" font-family="monospace" font-size="12" font-weight="700" fill="#dc2626">4. SELECT * FROM sellers WHERE id = 103</text>

  <rect x="80" y="604" width="580" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="100" y="623" font-family="monospace" font-size="12" font-weight="700" fill="#dc2626">5. SELECT * FROM sellers WHERE id = 104</text>

  <rect x="80" y="637" width="580" height="28" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="100" y="656" font-family="monospace" font-size="12" font-weight="700" fill="#dc2626">6. SELECT * FROM sellers WHERE id = 105</text>

  <!-- ============================================ -->
  <!-- SECTION 3: DATALOADER BATCHING SOLUTION      -->
  <!-- ============================================ -->

  <rect x="710" y="395" width="630" height="280" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="730" y="425" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Solution: DataLoader Batching</text>

  <text x="730" y="455" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#374151">Collect IDs during event loop tick, then batch:</text>

  <!-- Step 1: Collect -->
  <rect x="730" y="470" width="260" height="50" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="860" y="492" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937" text-anchor="middle">Collect IDs</text>
  <text x="860" y="510" font-family="monospace" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">[101, 102, 103, 104, 105]</text>

  <line x1="860" y1="520" x2="860" y2="545" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Single Query -->
  <rect x="730" y="545" width="260" height="50" rx="8" fill="#d1fae5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="860" y="567" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937" text-anchor="middle">Single Batched Query</text>
  <text x="860" y="585" font-family="monospace" font-size="11" font-weight="700" fill="#16a34a" text-anchor="middle">SELECT * FROM sellers WHERE id IN (...)</text>

  <line x1="860" y1="595" x2="860" y2="620" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Distribute -->
  <rect x="730" y="620" width="260" height="50" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="860" y="642" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937" text-anchor="middle">Distribute Results</text>
  <text x="860" y="660" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Map results back to each caller</text>

  <!-- Comparison note -->
  <rect x="1010" y="470" width="310" height="200" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="1165" y="495" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Impact</text>
  <text x="1030" y="525" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Before: 1 + 5 = 6 queries</text>
  <text x="1030" y="550" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">After:  1 + 1 = 2 queries</text>
  <text x="1030" y="575" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Reduction: 66% fewer queries</text>
  <line x1="1030" y1="590" x2="1300" y2="590" stroke="#d1d5db" stroke-width="1"/>
  <text x="1030" y="615" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">For N=1000: 1001 to 2 queries</text>
  <text x="1030" y="640" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#16a34a">99.8% reduction!</text>

  <!-- ============================================ -->
  <!-- SECTION 4: WATERFALL DIAGRAM                 -->
  <!-- ============================================ -->

  <text x="60" y="730" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Latency Waterfall: Sequential vs Batched</text>

  <!-- SEQUENTIAL Waterfall -->
  <rect x="60" y="755" width="620" height="320" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="80" y="785" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Sequential (N+1)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="810" x2="660" y2="810" stroke="#d1d5db" stroke-width="1"/>

  <!-- Time markers -->
  <text x="80" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">0ms</text>
  <text x="220" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">50ms</text>
  <text x="360" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">100ms</text>
  <text x="500" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">150ms</text>
  <text x="640" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">200ms</text>

  <!-- Query bars - sequential -->
  <text x="80" y="855" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Q1: Products</text>
  <rect x="160" y="842" width="60" height="20" rx="3" fill="#3b82f6"/>
  <text x="225" y="857" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">20ms</text>

  <text x="80" y="885" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Q2: Seller 101</text>
  <rect x="225" y="872" width="55" height="20" rx="3" fill="#ef4444"/>
  <text x="285" y="887" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">18ms</text>

  <text x="80" y="915" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Q3: Seller 102</text>
  <rect x="285" y="902" width="55" height="20" rx="3" fill="#ef4444"/>
  <text x="345" y="917" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">22ms</text>

  <text x="80" y="945" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Q4: Seller 103</text>
  <rect x="345" y="932" width="55" height="20" rx="3" fill="#ef4444"/>
  <text x="405" y="947" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">19ms</text>

  <text x="80" y="975" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Q5: Seller 104</text>
  <rect x="405" y="962" width="55" height="20" rx="3" fill="#ef4444"/>
  <text x="465" y="977" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">21ms</text>

  <text x="80" y="1005" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Q6: Seller 105</text>
  <rect x="465" y="992" width="55" height="20" rx="3" fill="#ef4444"/>
  <text x="525" y="1007" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">20ms</text>

  <!-- Total -->
  <rect x="560" y="1030" width="110" height="35" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="615" y="1053" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#dc2626" text-anchor="middle">Total: ~120ms</text>

  <!-- BATCHED Waterfall -->
  <rect x="710" y="755" width="630" height="320" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="730" y="785" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Batched (DataLoader)</text>

  <!-- Timeline axis -->
  <line x1="730" y1="810" x2="1310" y2="810" stroke="#d1d5db" stroke-width="1"/>

  <!-- Time markers -->
  <text x="730" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">0ms</text>
  <text x="870" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">10ms</text>
  <text x="1010" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">20ms</text>
  <text x="1150" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">30ms</text>
  <text x="1290" y="830" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">40ms</text>

  <!-- Query bars - batched -->
  <text x="730" y="855" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Q1: Products</text>
  <rect x="810" y="842" width="40" height="20" rx="3" fill="#3b82f6"/>
  <text x="855" y="857" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">10ms</text>

  <text x="730" y="890" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Q2: All Sellers</text>
  <rect x="855" y="877" width="80" height="20" rx="3" fill="#22c55e"/>
  <text x="940" y="892" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">25ms (IN clause)</text>

  <!-- Distribution bars -->
  <text x="730" y="930" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Distribute results</text>
  <rect x="940" y="917" width="60" height="20" rx="3" fill="#f59e0b"/>
  <text x="1005" y="932" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">~5ms</text>

  <!-- Cache population -->
  <text x="730" y="970" font-family="monospace" font-size="11" font-weight="700" fill="#1f2937">Cache population</text>
  <rect x="1005" y="957" width="50" height="20" rx="3" fill="#8b5cf6"/>
  <text x="1060" y="972" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">~3ms</text>

  <!-- Total -->
  <rect x="1100" y="1030" width="110" height="35" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="1155" y="1053" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#16a34a" text-anchor="middle">Total: ~43ms</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>