<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 820" width="950" height="820">
  <!-- Background -->
  <rect width="950" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="475" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">Memoization Architecture Flow</text>
  <text x="475" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">Function call to cache population pipeline with single-flight deduplication and memory management</text>

  <!-- ============================================ -->
  <!-- MAIN FLOW: Left to Right                     -->
  <!-- ============================================ -->

  <!-- Step 1: Function Call -->
  <rect x="40" y="100" width="140" height="70" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">Function Call</text>
  <text x="110" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">computeExpensive(x)</text>
  <text x="110" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Concurrent: N callers</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="180" y1="135" x2="230" y2="135" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Cache Key Generation -->
  <rect x="230" y="90" width="160" height="90" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="310" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#6d28d9" text-anchor="middle">Cache Key Generation</text>
  <line x1="250" y1="128" x2="370" y2="128" stroke="#7c3aed" stroke-width="1"/>
  <text x="310" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Serialize args: JSON/hash</text>
  <text x="310" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Include: context, version</text>
  <text x="310" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#7c3aed" text-anchor="middle">Key: "fn:expensive:{hash}"</text>

  <!-- Arrow 2 -> 3 -->
  <line x1="390" y1="135" x2="440" y2="135" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Cache Lookup -->
  <rect x="440" y="80" width="170" height="110" rx="8" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/>
  <text x="525" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#a16207" text-anchor="middle">Cache Lookup</text>
  <line x1="460" y1="118" x2="590" y2="118" stroke="#ca8a04" stroke-width="1"/>

  <!-- Cache Hit -->
  <rect x="455" y="128" width="140" height="26" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="525" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#15803d" text-anchor="middle">Cache HIT</text>

  <!-- Cache Miss -->
  <rect x="455" y="160" width="140" height="26" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="525" y="177" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">Cache MISS</text>

  <!-- ============================================ -->
  <!-- HIT PATH: Down and Left                      -->
  <!-- ============================================ -->
  <!-- Arrow from Cache HIT to Return -->
  <path d="M 525 186 L 525 400 L 850 400 L 850 500" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="700" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#15803d">Return cached result (~1ns)</text>

  <!-- ============================================ -->
  <!-- MISS PATH: Down to Compute                   -->
  <!-- ============================================ -->
  <line x1="525" y1="190" x2="525" y2="240" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="545" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#dc2626">Miss path</text>

  <!-- Step 4: Single-Flight Deduplication -->
  <rect x="420" y="240" width="210" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="525" y="266" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#6d28d9" text-anchor="middle">Single-Flight Deduplication</text>
  <line x1="440" y1="278" x2="610" y2="278" stroke="#7c3aed" stroke-width="1"/>
  <text x="525" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Is another call already computing</text>
  <text x="525" y="314" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">this same key?</text>
  <text x="525" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#7c3aed" text-anchor="middle">Yes -> Wait on shared promise</text>

  <!-- Arrow: Single-flight -> Compute -->
  <line x1="525" y1="340" x2="525" y2="380" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Compute (if miss and no single-flight) -->
  <rect x="400" y="380" width="250" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="525" y="406" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#dc2626" text-anchor="middle">Execute Computation</text>
  <line x1="420" y1="418" x2="630" y2="418" stroke="#dc2626" stroke-width="1"/>
  <text x="525" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Expensive operation: DB query, API call,</text>
  <text x="525" y="454" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">complex calculation, I/O</text>
  <text x="525" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">Latency: 10ms - 500ms+</text>

  <!-- Arrow: Compute -> Cache Result -->
  <path d="M 650 420 L 720 420 L 720 310" fill="none" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 6: Cache Result -->
  <rect x="660" y="240" width="210" height="100" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="765" y="266" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#15803d" text-anchor="middle">Cache Result + Resolve Waiters</text>
  <line x1="680" y1="278" x2="850" y2="278" stroke="#16a34a" stroke-width="1"/>
  <text x="765" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Store: key -> result + TTL</text>
  <text x="765" y="314" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Resolve: shared promise for</text>
  <text x="765" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">waiting callers (single-flight)</text>

  <!-- ============================================ -->
  <!-- MEMORY MANAGEMENT PANEL (Bottom-left)        -->
  <!-- ============================================ -->
  <text x="240" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Memory Management &amp; Eviction</text>

  <!-- Eviction Policies -->
  <rect x="30" y="555" width="420" height="140" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="240" y="582" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Eviction Strategies</text>
  <line x1="50" y1="594" x2="430" y2="594" stroke="#d1d5db" stroke-width="1"/>

  <!-- LRU -->
  <rect x="50" y="606" width="115" height="72" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="107" y="626" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#1e40af" text-anchor="middle">LRU</text>
  <text x="107" y="644" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">Evict least recently</text>
  <text x="107" y="658" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">used entries first</text>
  <text x="107" y="672" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">O(1) with doubly-linked</text>

  <!-- LFU -->
  <rect x="175" y="606" width="115" height="72" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="232" y="626" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#15803d" text-anchor="middle">LFU</text>
  <text x="232" y="644" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">Evict least frequently</text>
  <text x="232" y="658" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">accessed entries first</text>
  <text x="232" y="672" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">Good for skewed access</text>

  <!-- TTL -->
  <rect x="300" y="606" width="115" height="72" rx="6" fill="#fef3c7" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="357" y="626" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a16207" text-anchor="middle">TTL-Based</text>
  <text x="357" y="644" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">Expire entries after</text>
  <text x="357" y="658" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">configured duration</text>
  <text x="357" y="672" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#1f2937" text-anchor="middle">Stale data prevention</text>

  <!-- ============================================ -->
  <!-- CONCURRENCY PATTERN (Bottom-right)           -->
  <!-- ============================================ -->
  <text x="710" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Concurrency Patterns</text>

  <rect x="470" y="555" width="450" height="140" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="695" y="582" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Single-Flight Promise Deduplication</text>
  <line x1="490" y1="594" x2="900" y2="594" stroke="#d1d5db" stroke-width="1"/>

  <!-- Timeline -->
  <text x="490" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151">Caller 1:</text>
  <rect x="570" y="608" width="80" height="20" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="610" y="622" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#dc2626" text-anchor="middle">Compute</text>
  <rect x="650" y="608" width="60" height="20" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="680" y="622" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#15803d" text-anchor="middle">Return</text>
  <line x1="710" y1="618" x2="880" y2="618" stroke="#16a34a" stroke-width="2"/>
  <text x="800" y="614" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#15803d" text-anchor="middle">cached</text>

  <text x="490" y="646" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151">Caller 2:</text>
  <rect x="570" y="636" width="60" height="20" rx="4" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="600" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#4b5563" text-anchor="middle">Wait</text>
  <line x1="630" y1="646" x2="650" y2="646" stroke="#9ca3af" stroke-width="2"/>
  <rect x="650" y="636" width="60" height="20" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="680" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#15803d" text-anchor="middle">Return</text>
  <line x1="710" y1="646" x2="880" y2="646" stroke="#16a34a" stroke-width="2"/>
  <text x="800" y="642" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#15803d" text-anchor="middle">cached</text>

  <text x="490" y="674" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151">Caller 3:</text>
  <rect x="570" y="664" width="60" height="20" rx="4" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="600" y="678" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#4b5563" text-anchor="middle">Wait</text>
  <line x1="630" y1="674" x2="650" y2="674" stroke="#9ca3af" stroke-width="2"/>
  <rect x="650" y="664" width="60" height="20" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="680" y="678" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#15803d" text-anchor="middle">Return</text>
  <line x1="710" y1="674" x2="880" y2="674" stroke="#16a34a" stroke-width="2"/>
  <text x="800" y="670" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#15803d" text-anchor="middle">cached</text>

  <!-- Key insight -->
  <rect x="490" y="690" width="410" height="30" rx="4" fill="#fef3c7" stroke="#ca8a04" stroke-width="1"/>
  <text x="695" y="710" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#a16207" text-anchor="middle">Only 1 computation runs; all callers share the result. Eliminates cache stampede.</text>

  <!-- ============================================ -->
  <!-- Bottom: Cache Size Management                -->
  <!-- ============================================ -->
  <text x="475" y="740" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Cache Size Management</text>

  <rect x="40" y="755" width="870" height="50" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="475" y="778" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Size-based: max entries | Weight-based: approximate memory footprint | Time-based: refresh-after-write</text>
  <text x="475" y="796" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Monitoring: track hit/miss ratio, average latency, memory consumption, eviction rate, and single-flight contention rate</text>

  <!-- ============================================ -->
  <!-- Arrowhead Markers                            -->
  <!-- ============================================ -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
