<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="780" viewBox="0 0 1100 780">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowDown" markerWidth="7" markerHeight="10" refX="3.5" refY="9" orient="auto">
      <polygon points="0 0, 7 0, 3.5 10" fill="#1f2937"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">HTTP Cache Participants — Multi-Layer Caching</text>
  <text x="550" y="64" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="middle">Browser, CDN, Reverse Proxy, and Origin Server with per-layer TTLs, policies, hit rates, and latency reduction</text>

  <!-- ============================================= -->
  <!-- REQUEST FLOW: Top row (left to right)         -->
  <!-- ============================================= -->

  <!-- Browser -->
  <rect x="40" y="90" width="230" height="170" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#shadow)"/>
  <text x="155" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Browser Cache</text>
  <line x1="60" y1="128" x2="250" y2="128" stroke="#93c5fd" stroke-width="1"/>
  <text x="55" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Scope: Per-user, per-origin</text>
  <text x="55" y="168" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">TTL: max-age from Cache-Control</text>
  <text x="55" y="186" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Policy: private, no-store respected</text>
  <text x="55" y="204" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Validators: ETag, Last-Modified</text>
  <text x="55" y="222" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Hit Rate: 10-30%</text>
  <text x="55" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Latency on hit: ~0ms</text>
  <text x="55" y="258" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Key: URL + request headers</text>

  <!-- Arrow Browser -> CDN -->
  <line x1="270" y1="175" x2="310" y2="175" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="165" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">miss</text>

  <!-- CDN Edge -->
  <rect x="310" y="90" width="230" height="170" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2" filter="url(#shadow)"/>
  <text x="425" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">CDN Edge Cache</text>
  <line x1="330" y1="128" x2="520" y2="128" stroke="#6ee7b7" stroke-width="1"/>
  <text x="325" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Scope: Shared across all users</text>
  <text x="325" y="168" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">TTL: s-maxage overrides max-age</text>
  <text x="325" y="186" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Policy: public resources only</text>
  <text x="325" y="204" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Stale-while-revalidate support</text>
  <text x="325" y="222" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Hit Rate: 70-95%</text>
  <text x="325" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Latency on hit: 20-50ms</text>
  <text x="325" y="258" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Key: URL + Vary headers</text>

  <!-- Arrow CDN -> Reverse Proxy -->
  <line x1="540" y1="175" x2="580" y2="175" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="550" y="165" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">miss</text>

  <!-- Reverse Proxy -->
  <rect x="580" y="90" width="230" height="170" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="2" filter="url(#shadow)"/>
  <text x="695" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Reverse Proxy (Nginx/Varnish)</text>
  <line x1="600" y1="128" x2="790" y2="128" stroke="#fcd34d" stroke-width="1"/>
  <text x="595" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Scope: Internal application layer</text>
  <text x="595" y="168" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">TTL: Custom rules, often 5-60 min</text>
  <text x="595" y="186" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Policy: Purge-on-write, ban lists</text>
  <text x="595" y="204" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Can override origin Cache-Control</text>
  <text x="595" y="222" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Hit Rate: 50-80%</text>
  <text x="595" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Latency on hit: 5-15ms</text>
  <text x="595" y="258" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Key: URL + custom VCL rules</text>

  <!-- Arrow Reverse Proxy -> Origin -->
  <line x1="810" y1="175" x2="850" y2="175" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="820" y="165" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">miss</text>

  <!-- Origin Server -->
  <rect x="850" y="90" width="220" height="170" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2" filter="url(#shadow)"/>
  <text x="960" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Origin Server</text>
  <line x1="870" y1="128" x2="1050" y2="128" stroke="#fca5a5" stroke-width="1"/>
  <text x="865" y="150" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Scope: Authoritative source</text>
  <text x="865" y="168" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">TTL: Determines max-age, s-maxage</text>
  <text x="865" y="186" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Policy: Sets ETag, Last-Modified</text>
  <text x="865" y="204" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Revalidates: 304 vs 200 response</text>
  <text x="865" y="222" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Hit Rate: N/A (always fresh)</text>
  <text x="865" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Latency: 100-500ms+ (DB, compute)</text>
  <text x="865" y="258" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Key: Full request context</text>

  <!-- ============================================= -->
  <!-- RESPONSE FLOW: Bottom arrows (right to left)  -->
  <!-- ============================================= -->
  <line x1="960" y1="260" x2="960" y2="280" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="960" y1="280" x2="695" y2="280" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="695" y1="280" x2="695" y2="260" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <line x1="695" y1="260" x2="695" y2="295" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="695" y1="295" x2="425" y2="295" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="425" y1="295" x2="425" y2="260" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <line x1="425" y1="260" x2="425" y2="310" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="425" y1="310" x2="155" y2="310" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="155" y1="310" x2="155" y2="260" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <text x="970" y="278" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#059669">200 OK + body</text>
  <text x="705" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#059669">caches + forwards</text>
  <text x="435" y="300" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#059669">caches + forwards</text>
  <text x="165" y="300" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#059669">caches + renders</text>

  <!-- ============================================= -->
  <!-- BOTTOM SECTION: Cache headers per hop          -->
  <!-- ============================================= -->
  <rect x="30" y="330" width="1040" height="200" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="360" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Cache Headers at Each Hop</text>
  <line x1="50" y1="372" x2="1050" y2="372" stroke="#d1d5db" stroke-width="1"/>

  <!-- Table headers -->
  <rect x="50" y="382" width="940" height="30" fill="#e5e7eb"/>
  <text x="100" y="402" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Hop</text>
  <text x="250" y="402" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Request Headers Added</text>
  <text x="500" y="402" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Response Headers Set</text>
  <text x="750" y="402" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Cache Behavior</text>
  <text x="930" y="402" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Effect</text>
  <line x1="50" y1="412" x2="990" y2="412" stroke="#d1d5db" stroke-width="1"/>

  <!-- Row 1: Browser -->
  <rect x="50" y="414" width="940" height="30" fill="#ffffff"/>
  <text x="100" y="434" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Browser</text>
  <text x="250" y="434" font-family="monospace" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">If-None-Match, If-Modified-Since</text>
  <text x="500" y="434" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Consumes Cache-Control</text>
  <text x="750" y="434" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Respects private, no-store</text>
  <text x="930" y="434" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">User-local cache</text>

  <!-- Row 2: CDN -->
  <rect x="50" y="446" width="940" height="30" fill="#f9fafb"/>
  <text x="100" y="466" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">CDN Edge</text>
  <text x="250" y="466" font-family="monospace" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Via: 1.1 cdn-provider, Forwarded</text>
  <text x="500" y="466" font-family="monospace" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Age, X-Cache: HIT/MISS</text>
  <text x="750" y="466" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Uses s-maxage; stale-while-revalidate</text>
  <text x="930" y="466" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Global edge distribution</text>

  <!-- Row 3: Reverse Proxy -->
  <rect x="50" y="478" width="940" height="30" fill="#ffffff"/>
  <text x="100" y="498" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Reverse Proxy</text>
  <text x="250" y="498" font-family="monospace" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">X-Forwarded-For, X-Real-IP</text>
  <text x="500" y="498" font-family="monospace" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">X-Proxy-Cache, Surrogate-Control</text>
  <text x="750" y="498" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Custom TTL rules; purge on demand</text>
  <text x="930" y="498" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Origin offload &amp; rate limiting</text>

  <!-- Row 4: Origin -->
  <rect x="50" y="510" width="940" height="30" fill="#f9fafb"/>
  <text x="100" y="530" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Origin Server</text>
  <text x="250" y="530" font-family="monospace" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Host, Authorization, Cookie</text>
  <text x="500" y="530" font-family="monospace" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Cache-Control, ETag, Vary, Last-Modified</text>
  <text x="750" y="530" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Sets all caching directives</text>
  <text x="930" y="530" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Authoritative source of truth</text>

  <!-- ============================================= -->
  <!-- BOTTOM: Latency Reduction Funnel              -->
  <!-- ============================================= -->
  <rect x="30" y="550" width="1040" height="210" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="580" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Latency Reduction &amp; Cache Hit Rates per Layer</text>
  <line x1="50" y1="592" x2="1050" y2="592" stroke="#d1d5db" stroke-width="1"/>

  <!-- Funnel: Browser -->
  <rect x="60" y="610" width="980" height="44" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="120" y="630" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Browser</text>
  <text x="350" y="630" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Hit Rate: 10-30%</text>
  <text x="550" y="630" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Latency: ~0ms</text>
  <text x="720" y="630" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Saves: Full network round-trip</text>
  <text x="920" y="630" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Scope: 1 user</text>

  <!-- Funnel: CDN -->
  <rect x="110" y="662" width="880" height="44" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="170" y="682" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">CDN Edge</text>
  <text x="400" y="682" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Hit Rate: 70-95%</text>
  <text x="600" y="682" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Latency: 20-50ms</text>
  <text x="770" y="682" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Saves: Origin compute + DB</text>
  <text x="950" y="682" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Scope: Global</text>

  <!-- Funnel: Reverse Proxy -->
  <rect x="170" y="714" width="760" height="44" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="230" y="734" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Reverse Proxy</text>
  <text x="460" y="734" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Hit Rate: 50-80%</text>
  <text x="660" y="734" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Latency: 5-15ms</text>
  <text x="830" y="734" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Saves: App processing</text>
  <text x="960" y="734" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Scope: Internal</text>

  <!-- Funnel: Origin -->
  <rect x="240" y="766" width="620" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="300" y="786" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Origin Server</text>
  <text x="530" y="786" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Hit Rate: N/A (always serves)</text>
  <text x="730" y="786" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Latency: 100-500ms+</text>
  <text x="900" y="786" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Scope: Authoritative</text>
</svg>