<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">HTTP Cache Headers</text>

  <rect x="80" y="100" width="800" height="70" rx="12" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="110" y="140" font-family="Arial" font-size="14" fill="#0f172a">Cache-Control: public, max-age=60, s-maxage=300, stale-while-revalidate=30</text>

  <rect x="80" y="200" width="380" height="70" rx="12" fill="#dbeafe" stroke="#60a5fa" />
  <text x="110" y="240" font-family="Arial" font-size="14" fill="#0f172a">ETag: "v123"</text>

  <rect x="500" y="200" width="380" height="70" rx="12" fill="#e0f2fe" stroke="#38bdf8" />
  <text x="530" y="240" font-family="Arial" font-size="14" fill="#0f172a">Vary: Accept-Encoding</text>
</svg>
