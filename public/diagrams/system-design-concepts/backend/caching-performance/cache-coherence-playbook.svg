<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">Cache Coherence Playbook</text>

  <rect x="80" y="100" width="800" height="70" rx="12" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="110" y="140" font-family="Arial" font-size="14" fill="#0f172a">1. Detect mismatch rate spike</text>

  <rect x="80" y="190" width="800" height="70" rx="12" fill="#dbeafe" stroke="#60a5fa" />
  <text x="110" y="230" font-family="Arial" font-size="14" fill="#0f172a">2. Reduce TTLs or bypass cache for critical paths</text>

  <rect x="80" y="280" width="800" height="70" rx="12" fill="#e0f2fe" stroke="#38bdf8" />
  <text x="110" y="320" font-family="Arial" font-size="14" fill="#0f172a">3. Fix invalidation and restore normal TTLs</text>
</svg>
