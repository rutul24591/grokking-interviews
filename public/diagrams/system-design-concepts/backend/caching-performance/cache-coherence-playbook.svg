<svg xmlns="http://www.w3.org/2000/svg" width="960" height="750" viewBox="0 0 960 750">
  <!-- Background -->
  <rect width="960" height="750" fill="#ffffff" />

  <!-- Title -->
  <text x="480" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Cache Coherence Maintenance Playbook</text>
  <text x="480" y="66" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="middle">Monitoring, versioning, shadow read auditing, and rollback procedures</text>

  <!-- ============================================================ -->
  <!-- SECTION 1: MONITORING PIPELINE (top left) -->
  <!-- ============================================================ -->

  <rect x="30" y="90" width="440" height="200" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text x="250" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Coherence Monitoring Pipeline</text>

  <!-- Step 1: Metrics Collection -->
  <rect x="50" y="135" width="130" height="60" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="115" y="157" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Metrics</text>
  <text x="115" y="173" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Collection</text>
  <text x="115" y="187" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">cache_hit_ratio</text>

  <!-- Arrow -->
  <line x1="180" y1="165" x2="215" y2="165" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 2: Anomaly Detection -->
  <rect x="215" y="135" width="130" height="60" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="280" y="157" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Anomaly</text>
  <text x="280" y="173" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Detection</text>
  <text x="280" y="187" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">staleness &gt; threshold</text>

  <!-- Arrow -->
  <line x1="345" y1="165" x2="380" y2="165" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 3: Alerting -->
  <rect x="380" y="135" width="80" height="60" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="420" y="157" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Alert</text>
  <text x="420" y="173" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">PagerDuty</text>
  <text x="420" y="187" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Slack</text>

  <!-- Metrics detail row -->
  <rect x="50" y="210" width="410" height="65" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="255" y="232" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Key Metrics to Track</text>
  <text x="80" y="252" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Cache hit ratio by layer</text>
  <text x="240" y="252" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Invalidation latency (p99)</text>
  <text x="80" y="268" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Stale read count (per minute)</text>
  <text x="240" y="268" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Replication lag across regions</text>

  <!-- ============================================================ -->
  <!-- SECTION 2: VERSION-BASED COHERENCE (top right) -->
  <!-- ============================================================ -->

  <rect x="495" y="90" width="435" height="310" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="712" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Version-Based Coherence</text>

  <!-- Version Registry -->
  <rect x="515" y="135" width="395" height="80" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="712" y="157" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Version Registry</text>
  <text x="540" y="178" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">user:1042 -> v2 (current) | v1 (deprecated, TTL=60s)</text>
  <text x="540" y="196" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">product:5589 -> v7 (current) | v6 (expired)</text>
  <text x="540" y="210" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">session:abc -> v1 (current)</text>

  <!-- Version transition flow -->
  <text x="712" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Versioned Cache Key Flow</text>

  <!-- Key:v1 box -->
  <rect x="515" y="255" width="120" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2" />
  <text x="575" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">user:1042:v1</text>
  <text x="575" y="293" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Deprecated</text>

  <!-- Arrow with version bump -->
  <line x1="635" y1="280" x2="695" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="665" y="272" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#2563eb" text-anchor="middle">bump</text>

  <!-- Key:v2 box -->
  <rect x="695" y="255" width="120" height="50" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text x="755" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">user:1042:v2</text>
  <text x="755" y="293" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Current (active)</text>

  <!-- Lookup flow -->
  <rect x="515" y="325" width="395" height="60" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="712" y="347" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Read: resolve key via registry -> fetch user:1042:v2</text>
  <text x="712" y="365" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Old readers with v1 reference get cache miss -> registry redirect -> v2</text>

  <!-- ============================================================ -->
  <!-- SECTION 3: SHADOW READ AUDITING (middle left) -->
  <!-- ============================================================ -->

  <rect x="30" y="315" width="440" height="210" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" />
  <text x="250" y="343" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Shadow Read Auditing</text>

  <!-- Shadow read flow diagram -->
  <!-- Client request -->
  <rect x="50" y="360" width="100" height="45" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="100" y="378" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Client</text>
  <text x="100" y="394" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Request</text>

  <!-- Arrow -->
  <line x1="150" y1="383" x2="180" y2="383" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Primary cache read -->
  <rect x="180" y="360" width="110" height="45" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="235" y="378" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Primary</text>
  <text x="235" y="394" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Cache Read</text>

  <!-- Arrow to client response -->
  <line x1="235" y1="405" x2="235" y2="430" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Client response -->
  <rect x="180" y="430" width="110" height="35" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text x="235" y="452" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Response to Client</text>

  <!-- Shadow branch -->
  <line x1="290" y1="383" x2="320" y2="383" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowhead-orange)" />
  <text x="305" y="374" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#f59e0b" text-anchor="middle">shadow</text>

  <!-- Shadow read -->
  <rect x="320" y="360" width="120" height="45" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="2" />
  <text x="380" y="378" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Source of Truth</text>
  <text x="380" y="394" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">(DB) Read</text>

  <!-- Comparison -->
  <rect x="320" y="430" width="120" height="45" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="380" y="452" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Compare Results</text>

  <!-- Arrow from DB to Compare -->
  <line x1="380" y1="405" x2="380" y2="430" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Comparison outcomes -->
  <rect x="50" y="485" width="190" height="30" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" />
  <text x="145" y="505" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#16a34a" text-anchor="middle">Match: coherence OK</text>

  <rect x="250" y="485" width="190" height="30" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="2" />
  <text x="345" y="505" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">Mismatch: log violation</text>

  <!-- ============================================================ -->
  <!-- SECTION 4: ROLLBACK PROCEDURES (middle right) -->
  <!-- ============================================================ -->

  <rect x="495" y="425" width="435" height="305" rx="10" fill="#fff5f5" stroke="#dc2626" stroke-width="2" />
  <text x="712" y="453" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#dc2626" text-anchor="middle">Rollback Procedures for Coherence Failures</text>

  <!-- Step 1: Detect -->
  <rect x="515" y="470" width="395" height="45" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="535" y="489" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Step 1:</text>
  <text x="590" y="489" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Detect violation rate exceeds SLO (&gt;0.1% stale reads)</text>
  <text x="590" y="507" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Trigger: Shadow read audit, client complaints, monitoring alert</text>

  <!-- Arrow -->
  <line x1="712" y1="515" x2="712" y2="528" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 2: Bypass -->
  <rect x="515" y="528" width="395" height="45" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="535" y="547" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Step 2:</text>
  <text x="590" y="547" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Bypass cache for affected key patterns</text>
  <text x="590" y="565" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Set TTL=0 for key prefix, force DB reads</text>

  <!-- Arrow -->
  <line x1="712" y1="573" x2="712" y2="586" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 3: Invalidate -->
  <rect x="515" y="586" width="395" height="45" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="535" y="605" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Step 3:</text>
  <text x="590" y="605" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Bulk invalidate all layers (L1/L2/L3) for key prefix</text>
  <text x="590" y="623" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Broadcast DELETE via pub/sub to all cache nodes</text>

  <!-- Arrow -->
  <line x1="712" y1="631" x2="712" y2="644" stroke="#1f2937" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 4: Restore -->
  <rect x="515" y="644" width="395" height="45" rx="6" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="535" y="663" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Step 4:</text>
  <text x="590" y="663" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Restore normal TTLs after validation window</text>
  <text x="590" y="681" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Monitor shadow reads for 15min to confirm coherence restored</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b" />
    </marker>
  </defs>
</svg>