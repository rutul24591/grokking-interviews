<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="740" viewBox="0 0 1100 740">
  <rect width="1100" height="740" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Memoization Hit Rate Analysis — Purity, Eviction &amp; Candidate Selection</text>

  <!-- ============ TOP-LEFT: Hit Rate Over Time (Pure vs Impure) ============ -->
  <text x="275" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Hit Rate Over Time: Pure vs Impure Functions</text>

  <!-- Chart area -->
  <rect x="40" y="95" width="470" height="280" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>

  <!-- Y axis -->
  <line x1="80" y1="120" x2="80" y2="345" stroke="#6b7280" stroke-width="2"/>
  <!-- X axis -->
  <line x1="80" y1="345" x2="490" y2="345" stroke="#6b7280" stroke-width="2"/>

  <!-- Y axis labels -->
  <text x="70" y="124" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="end">100%</text>
  <text x="70" y="180" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="end">75%</text>
  <text x="70" y="236" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="end">50%</text>
  <text x="70" y="292" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="end">25%</text>
  <text x="70" y="349" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="end">0%</text>

  <!-- X axis labels -->
  <text x="80" y="365" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">0</text>
  <text x="180" y="365" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">1k</text>
  <text x="280" y="365" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">5k</text>
  <text x="380" y="365" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">10k</text>
  <text x="470" y="365" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">50k</text>

  <text x="285" y="390" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">Calls -&gt;</text>
  <text x="30" y="230" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle" transform="rotate(-90,30,230)">Hit Rate</text>

  <!-- Pure function curve (high hit rate) -->
  <path d="M80 340 L120 310 L160 270 L200 230 L240 195 L280 170 L320 155 L360 148 L400 142 L440 138 L480 135" fill="none" stroke="#059669" stroke-width="3"/>
  <circle cx="480" cy="135" r="4" fill="#059669"/>
  <text x="485" y="130" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#065f46">Pure fn (~92%)</text>

  <!-- Impure function curve (low hit rate, erratic) -->
  <path d="M80 340 L120 330 L160 320 L200 310 L240 305 L280 298 L320 295 L360 290 L400 288 L440 285 L480 283" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="8,4"/>
  <circle cx="480" cy="283" r="4" fill="#dc2626"/>
  <text x="485" y="278" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#991b1b">Impure fn (~18%)</text>

  <!-- Impure with context curve (moderate) -->
  <path d="M80 340 L120 320 L160 295 L200 270 L240 255 L280 245 L320 238 L360 232 L400 228 L440 225 L480 223" fill="none" stroke="#d97706" stroke-width="3" stroke-dasharray="4,4"/>
  <circle cx="480" cy="223" r="4" fill="#d97706"/>
  <text x="485" y="218" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#92400e">Impure+context (~48%)</text>

  <!-- ============ TOP-RIGHT: Call Frequency Distribution ============ -->
  <text x="825" y="80" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Call Frequency Distribution (Zipf-like)</text>

  <rect x="580" y="95" width="480" height="280" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>

  <!-- Bar chart -->
  <!-- Function 1 - hottest -->
  <rect x="600" y="130" width="50" height="220" rx="4" fill="#059669"/>
  <text x="625" y="370" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">f1</text>
  <text x="625" y="125" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#065f46" text-anchor="middle">45%</text>

  <!-- Function 2 -->
  <rect x="665" y="200" width="50" height="150" rx="4" fill="#059669"/>
  <text x="690" y="370" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">f2</text>
  <text x="690" y="195" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#065f46" text-anchor="middle">22%</text>

  <!-- Function 3 -->
  <rect x="730" y="260" width="50" height="90" rx="4" fill="#d97706"/>
  <text x="755" y="370" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">f3</text>
  <text x="755" y="255" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#92400e" text-anchor="middle">12%</text>

  <!-- Function 4 -->
  <rect x="795" y="300" width="50" height="50" rx="4" fill="#d97706"/>
  <text x="820" y="370" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">f4</text>
  <text x="820" y="295" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#92400e" text-anchor="middle">8%</text>

  <!-- Function 5 -->
  <rect x="860" y="325" width="50" height="25" rx="4" fill="#dc2626"/>
  <text x="885" y="370" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">f5</text>
  <text x="885" y="320" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#991b1b" text-anchor="middle">5%</text>

  <!-- Function 6 -->
  <rect x="925" y="335" width="50" height="15" rx="4" fill="#dc2626"/>
  <text x="950" y="370" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">f6</text>
  <text x="950" y="330" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#991b1b" text-anchor="middle">3%</text>

  <!-- Function 7 -->
  <rect x="990" y="340" width="50" height="10" rx="4" fill="#dc2626"/>
  <text x="1015" y="370" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">f7+</text>
  <text x="1015" y="335" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#991b1b" text-anchor="middle">5%</text>

  <!-- Legend -->
  <text x="820" y="395" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Top 2 functions = 67% of all calls — prioritize memoization on hot path</text>

  <!-- ============ MIDDLE: Hit Rate Impact from Eviction ============ -->
  <text x="550" y="430" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Cache Eviction Impact on Hit Rate</text>

  <rect x="40" y="445" width="1020" height="130" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>

  <!-- Eviction strategy comparison -->
  <!-- LRU -->
  <rect x="55" y="465" width="230" height="90" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="170" y="485" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">LRU Eviction</text>
  <text x="170" y="505" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Hit rate: ~78%</text>
  <text x="170" y="522" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Memory: bounded</text>
  <text x="170" y="539" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Evicts least-recently-used</text>

  <!-- TTL -->
  <rect x="305" y="465" width="230" height="90" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="420" y="485" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">TTL Expiry</text>
  <text x="420" y="505" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Hit rate: ~65%</text>
  <text x="420" y="522" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Memory: bounded</text>
  <text x="420" y="539" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Expires after fixed duration</text>

  <!-- LFU -->
  <rect x="555" y="465" width="230" height="90" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="670" y="485" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">LFU Eviction</text>
  <text x="670" y="505" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Hit rate: ~85%</text>
  <text x="670" y="522" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Memory: bounded</text>
  <text x="670" y="539" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Evicts least-frequently-used</text>

  <!-- No eviction (unbounded) -->
  <rect x="805" y="465" width="230" height="90" rx="8" fill="#f9fafb" stroke="#6b7280" stroke-width="1"/>
  <text x="920" y="485" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Unbounded (No Eviction)</text>
  <text x="920" y="505" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Hit rate: ~95%</text>
  <text x="920" y="522" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Memory: UNBOUNDED risk</text>
  <text x="920" y="539" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Memory leak if cardinality high</text>

  <!-- Arrow: unbounded -> memory risk -->
  <path d="M920 555 L920 565" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowD)"/>
  <text x="920" y="580" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">Memory grows linearly with unique keys</text>

  <!-- ============ BOTTOM: Optimal Memoization Candidates ============ -->
  <text x="550" y="615" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Optimal Memoization Candidates by Function Characteristics</text>

  <rect x="40" y="630" width="1020" height="100" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>

  <!-- Candidate 1 -->
  <rect x="55" y="645" width="230" height="70" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="170" y="665" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">EXPENSIVE + PURE</text>
  <text x="170" y="685" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">High compute, deterministic</text>
  <text x="170" y="702" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">e.g., Fibonacci, hashing</text>
  <text x="170" y="719" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">Hit Rate: 80-95%</text>

  <!-- Candidate 2 -->
  <rect x="305" y="645" width="230" height="70" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="420" y="665" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#065f46" text-anchor="middle">I/O BOUND + STABLE</text>
  <text x="420" y="685" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Network/DB calls, rare changes</text>
  <text x="420" y="702" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">e.g., API responses, config</text>
  <text x="420" y="719" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">Hit Rate: 70-90%</text>

  <!-- Candidate 3 -->
  <rect x="555" y="645" width="230" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="670" y="665" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">PURE + LOW CARDINALITY</text>
  <text x="670" y="685" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Few unique arg combos</text>
  <text x="670" y="702" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">e.g., status codes, flags</text>
  <text x="670" y="719" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">Hit Rate: 60-80%</text>

  <!-- Candidate 4 -->
  <rect x="805" y="645" width="230" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="920" y="665" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#991b1b" text-anchor="middle">IMPURE + HIGH CARDINALITY</text>
  <text x="920" y="685" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Time-dependent, unique per call</text>
  <text x="920" y="702" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">e.g., UUID, timestamp</text>
  <text x="920" y="719" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#991b1b" text-anchor="middle">Hit Rate: &lt; 5% (avoid)</text>

  <!-- Markers -->
  <defs>
    <marker id="arrowD" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>