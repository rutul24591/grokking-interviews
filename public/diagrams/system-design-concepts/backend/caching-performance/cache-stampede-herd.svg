<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="70" font-size="28" font-family="Arial" fill="#0f172a">Cache Stampede (Thundering Herd)</text>
  <rect x="80" y="140" width="260" height="120" rx="12" fill="#fee2e2" stroke="#ef4444"/>
  <text x="110" y="195" font-size="18" font-family="Arial" fill="#0f172a">Cache Expired</text>
  <rect x="480" y="120" width="640" height="160" rx="12" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="510" y="165" font-size="16" font-family="Arial" fill="#0f172a">Many clients miss at once</text>
  <text x="510" y="195" font-size="16" font-family="Arial" fill="#0f172a">All requests hit the database</text>
  <text x="510" y="225" font-size="16" font-family="Arial" fill="#0f172a">Latency spikes and DB overload</text>
  <line x1="340" y1="200" x2="480" y2="200" stroke="#94a3b8" stroke-width="4"/>
  <rect x="80" y="340" width="1040" height="160" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="110" y="385" font-size="16" font-family="Arial" fill="#0f172a">Mitigation: locks, request coalescing, refresh-ahead, stale-while-revalidate</text>
  <text x="80" y="560" font-size="16" font-family="Arial" fill="#475569">Stampedes are a reliability issue, not just a performance issue.</text>
</svg>
