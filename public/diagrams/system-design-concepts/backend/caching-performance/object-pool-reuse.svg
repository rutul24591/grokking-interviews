<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="800" viewBox="0 0 1100 800">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="40" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">Object Pool Reuse Pattern</text>
  <text x="550" y="64" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="middle">Lifecycle: create, acquire, use, return, validate, reuse, destroy — with connection states and pool sizing</text>

  <!-- ============================================= -->
  <!-- TOP: Object Lifecycle Flow                    -->
  <!-- ============================================= -->
  <rect x="30" y="85" width="1040" height="280" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="116" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Object Lifecycle: Creation to Destruction</text>
  <line x1="50" y1="128" x2="1050" y2="128" stroke="#d1d5db" stroke-width="1"/>

  <!-- Pool (center) -->
  <rect x="440" y="150" width="220" height="90" rx="12" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="550" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Object Pool</text>
  <text x="550" y="198" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">Idle objects queue</text>
  <text x="550" y="216" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">FIFO / LRU ordering</text>
  <text x="550" y="232" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">State: idle</text>

  <!-- Create (top) -->
  <rect x="140" y="155" width="160" height="75" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="220" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">1. Create</text>
  <text x="220" y="200" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Pool starts empty</text>
  <text x="220" y="216" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Allocate to min-idle</text>
  <text x="220" y="232" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">State: new, opening</text>

  <!-- Arrow: Create -> Pool -->
  <line x1="300" y1="195" x2="440" y2="195" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="350" y="185" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#059669">add idle</text>

  <!-- Acquire (left) -->
  <rect x="50" y="260" width="160" height="75" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="130" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">2. Acquire</text>
  <text x="130" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Borrow from pool</text>
  <text x="130" y="321" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Wait if pool empty</text>
  <text x="130" y="337" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">State: in-use</text>

  <!-- Arrow: Pool -> Acquire -->
  <line x1="440" y1="230" x2="210" y2="280" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="300" y="250" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#2563eb">checkout</text>

  <!-- Use (right) -->
  <rect x="890" y="260" width="160" height="75" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="970" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">3. Use</text>
  <text x="970" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Execute query / I/O</text>
  <text x="970" y="321" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">State: active, leased</text>
  <text x="970" y="337" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Timeout if exceeded</text>

  <!-- Arrow: Acquire -> Use -->
  <line x1="210" y1="297" x2="890" y2="297" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="550" y="287" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937" text-anchor="middle">borrowed object</text>

  <!-- Return (below Use) -->
  <rect x="890" y="410" width="160" height="75" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="970" y="435" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">4. Return</text>
  <text x="970" y="455" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Back to idle queue</text>
  <text x="970" y="471" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">State: returning</text>
  <text x="970" y="487" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Mark idle available</text>

  <!-- Arrow: Use -> Return -->
  <line x1="970" y1="335" x2="970" y2="410" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="985" y="375" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">done</text>

  <!-- Validate (left of Return) -->
  <rect x="650" y="410" width="160" height="75" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="730" y="435" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">5. Validate</text>
  <text x="730" y="455" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Check health / TTL</text>
  <text x="730" y="471" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Ping / test query</text>
  <text x="730" y="487" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">State: validating</text>

  <!-- Arrow: Return -> Validate -->
  <line x1="890" y1="447" x2="810" y2="447" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="840" y="437" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#1f2937">pre-return</text>

  <!-- Decision: Valid? -->
  <polygon points="470,447 550,420 630,447 550,474" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="550" y="445" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Valid?</text>

  <!-- Arrow: Validate -> Decision -->
  <line x1="650" y1="447" x2="630" y2="447" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Decision YES -> Pool (reuse) -->
  <line x1="470" y1="447" x2="440" y2="240" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="430" y="350" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#059669">YES: return to idle</text>

  <!-- Arrow: Decision NO -> Destroy -->
  <line x1="550" y1="474" x2="550" y2="500" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="560" y="490" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#dc2626">NO</text>

  <!-- Destroy (bottom) -->
  <rect x="470" y="500" width="160" height="60" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="550" y="525" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">6. Destroy</text>
  <text x="550" y="545" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Close connection, free memory</text>

  <!-- Arrow: Destroy -> Create (replenish) -->
  <path d="M470,520 Q350,540 300,480 Q250,420 220,230" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>
  <text x="300" y="520" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#059669">replenish pool</text>

  <!-- ============================================= -->
  <!-- MIDDLE: Connection State Management           -->
  <!-- ============================================= -->
  <rect x="30" y="385" width="510" height="200" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
  <text x="285" y="415" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Connection State Management</text>
  <line x1="50" y1="427" x2="520" y2="427" stroke="#d1d5db" stroke-width="1"/>

  <!-- State boxes in a row -->
  <rect x="50" y="442" width="105" height="50" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="102" y="463" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Open</text>
  <text x="102" y="480" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">TCP established</text>

  <line x1="155" y1="467" x2="175" y2="467" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="175" y="442" width="105" height="50" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="227" y="463" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Idle</text>
  <text x="227" y="480" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">In pool, available</text>

  <line x1="280" y1="467" x2="298" y2="467" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="298" y="442" width="105" height="50" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="350" y="463" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">In-Use</text>
  <text x="350" y="480" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Leased to client</text>

  <line x1="403" y1="467" x2="421" y2="467" stroke="#1f2937" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="421" y="442" width="105" height="50" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="473" y="463" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Broken</text>
  <text x="473" y="480" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Timeout, error</text>

  <!-- State transitions below -->
  <text x="50" y="520" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827">Transitions:</text>
  <text x="50" y="540" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Open -&gt; Idle: connection ready, added to idle queue</text>
  <text x="50" y="558" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Idle -&gt; In-Use: acquire() called, removed from queue</text>
  <text x="50" y="576" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">In-Use -&gt; Idle: return() called, validation passes</text>
  <text x="50" y="594" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Any -&gt; Broken: network error, timeout, protocol violation</text>

  <!-- ============================================= -->
  <!-- MIDDLE RIGHT: Pool Sizing                     -->
  <!-- ============================================= -->
  <rect x="560" y="385" width="510" height="200" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
  <text x="815" y="415" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Pool Sizing Configuration</text>
  <line x1="580" y1="427" x2="1050" y2="427" stroke="#d1d5db" stroke-width="1"/>

  <!-- Visual bar showing pool levels -->
  <rect x="600" y="450" width="440" height="30" rx="6" fill="#e5e7eb"/>
  <rect x="600" y="450" width="132" height="30" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <rect x="600" y="450" width="308" height="30" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <rect x="600" y="450" width="396" height="30" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="666" y="470" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Min Idle: 10</text>
  <text x="754" y="470" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Max Idle: 30</text>
  <text x="842" y="470" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Max Active: 50</text>

  <!-- Max Wait label -->
  <rect x="600" y="490" width="440" height="24" rx="4" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="820" y="507" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Max Wait Time: 30s (then throw PoolExhaustedException)</text>

  <!-- Detail items -->
  <text x="580" y="535" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Min Idle: Pre-warmed connections kept ready at startup. Avoids cold-start latency.</text>
  <text x="580" y="555" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Max Idle: Upper bound on idle objects. Excess idle objects evicted after idle-timeout.</text>
  <text x="580" y="575" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Max Active: Hard cap on concurrent leased objects. Prevents resource exhaustion.</text>
  <text x="580" y="595" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Max Wait: Blocking timeout when pool is exhausted. Prevents infinite queue buildup.</text>

  <!-- ============================================= -->
  <!-- BOTTOM: Common Patterns & Anti-patterns       -->
  <!-- ============================================= -->
  <rect x="30" y="605" width="1040" height="175" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="635" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="middle">Pool Management Patterns &amp; Trade-offs</text>
  <line x1="50" y1="647" x2="1050" y2="647" stroke="#d1d5db" stroke-width="1"/>

  <!-- Best practices column -->
  <rect x="50" y="660" width="490" height="105" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="295" y="683" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Best Practices</text>
  <line x1="70" y1="693" x2="520" y2="693" stroke="#6ee7b7" stroke-width="1"/>
  <text x="70" y="712" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Validate on return (testOnReturn) and on borrow (testOnBorrow)</text>
  <text x="70" y="730" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Use keep-alive probes to detect broken connections before lease</text>
  <text x="70" y="748" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Set max lifetime per object to prevent stale state accumulation</text>
  <text x="70" y="766" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Size pool based on QPS x avg latency / concurrency factor</text>

  <!-- Anti-patterns column -->
  <rect x="560" y="660" width="490" height="105" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="805" y="683" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Anti-Patterns</text>
  <line x1="580" y1="693" x2="1030" y2="693" stroke="#fca5a5" stroke-width="1"/>
  <text x="580" y="712" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Unbounded pool growth: no max-active cap causes memory / FD exhaustion</text>
  <text x="580" y="730" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Skipping validation: broken objects returned cause intermittent failures</text>
  <text x="580" y="748" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Oversized pools: excessive idle connections waste resources and DB slots</text>
  <text x="580" y="766" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Long-lived objects: network partitions go undetected until lease time</text>
</svg>