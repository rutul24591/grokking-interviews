<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Connection Pool Timeout Cascade</text>
  <text x="60" y="76" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#374151">Three timeout layers that protect database availability under connection exhaustion</text>

  <!-- Three Timeout Types -->
  <rect x="60" y="105" width="340" height="135" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="140" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">1. Acquire Timeout</text>
  <text x="80" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#1f2937">Max wait time for a connection</text>
  <text x="80" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#1f2937">from the pool before failing</text>
  <text x="80" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Typical: 1-5 seconds</text>
  <text x="80" y="236" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Error: PoolTimeoutException</text>

  <rect x="430" y="105" width="340" height="135" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="140" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">2. Query Execution Timeout</text>
  <text x="450" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#1f2937">Max duration a single query can</text>
  <text x="450" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#1f2937">run before being terminated</text>
  <text x="450" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Typical: 30s - 5 minutes</text>
  <text x="450" y="236" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Error: QueryTimeoutException</text>

  <rect x="800" y="105" width="340" height="135" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="820" y="140" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">3. Connection Max Lifetime</text>
  <text x="820" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#1f2937">Maximum age of a pooled connection</text>
  <text x="820" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#1f2937">before forced replacement</text>
  <text x="820" y="218" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Typical: 30 min - 1 hour</text>
  <text x="820" y="236" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Prevents stale TCP connections</text>

  <!-- Cascade Flow Section -->
  <text x="60" y="290" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Timeout Cascade Under Load</text>

  <!-- Step 1: Healthy Pool -->
  <rect x="60" y="310" width="190" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="80" y="348" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Healthy Pool</text>
  <text x="80" y="373" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Connections available</text>
  <text x="80" y="393" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Latency: 2-5ms</text>

  <!-- Arrow 1 -->
  <line x1="250" y1="360" x2="300" y2="360" stroke="#6b7280" stroke-width="2" marker-end="url(#ah)"/>
  <text x="255" y="348" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Traffic spike</text>

  <!-- Step 2: Pool Exhausted -->
  <rect x="300" y="310" width="190" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="348" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Pool Exhausted</text>
  <text x="320" y="373" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">All connections in use</text>
  <text x="320" y="393" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Wait queue forms</text>

  <!-- Arrow 2 -->
  <line x1="490" y1="360" x2="540" y2="360" stroke="#6b7280" stroke-width="2" marker-end="url(#ah)"/>
  <text x="495" y="348" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Wait exceeds</text>
  <text x="495" y="364" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">acquire timeout</text>

  <!-- Step 3: Acquire Timeout -->
  <rect x="540" y="310" width="190" height="100" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="560" y="348" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Acquire Timeout</text>
  <text x="560" y="373" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Requests rejected</text>
  <text x="560" y="393" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Errors propagate upstream</text>

  <!-- Arrow 3 -->
  <line x1="730" y1="360" x2="780" y2="360" stroke="#6b7280" stroke-width="2" marker-end="url(#ah)"/>
  <text x="735" y="348" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Error rate exceeds</text>
  <text x="735" y="364" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">threshold</text>

  <!-- Step 4: Circuit Breaker -->
  <rect x="780" y="310" width="200" height="100" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="800" y="348" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Circuit Breaker Opens</text>
  <text x="800" y="373" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Fail fast, reject all</text>
  <text x="800" y="393" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#1f2937">Half-open after cooldown</text>

  <!-- Monitoring Panel -->
  <rect x="60" y="450" width="520" height="340" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="80" y="485" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Monitoring and Alerting</text>

  <rect x="80" y="505" width="480" height="52" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="95" y="530" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">pool.waiting.connections</text>
  <text x="340" y="530" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Alert if &gt; 50% of max pool size</text>

  <rect x="80" y="565" width="480" height="52" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="95" y="590" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">pool.acquire.timeout.rate</text>
  <text x="340" y="590" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Alert if &gt; 5% of total requests</text>

  <rect x="80" y="625" width="480" height="52" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="95" y="650" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">pool.query.timeout.rate</text>
  <text x="340" y="650" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Alert if &gt; 2% of executed queries</text>

  <rect x="80" y="685" width="480" height="52" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="95" y="710" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">pool.connection.avg.age</text>
  <text x="340" y="710" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Alert if approaching max lifetime</text>

  <rect x="80" y="745" width="480" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="95" y="768" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">pool.idle.connection.count</text>
  <text x="340" y="768" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Detect connection leaks</text>

  <!-- Best Practices Panel -->
  <rect x="610" y="450" width="530" height="340" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="630" y="485" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Configuration Best Practices</text>

  <rect x="630" y="505" width="490" height="52" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="645" y="530" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">acquire &lt; query &lt; gateway timeout</text>
  <text x="645" y="550" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Enforce timeout hierarchy to avoid cascading failures</text>

  <rect x="630" y="565" width="490" height="52" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="645" y="590" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">maxLifetime &lt; DB wait_timeout</text>
  <text x="645" y="610" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Prevent server-side connection drops (MySQL: 28800s default)</text>

  <rect x="630" y="625" width="490" height="52" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="645" y="650" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Use validationQuery on borrow</text>
  <text x="645" y="670" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">SELECT 1 before handing connection to caller</text>

  <rect x="630" y="685" width="490" height="52" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="645" y="710" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Circuit breaker + exponential backoff</text>
  <text x="645" y="730" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Recover gracefully after pool exhaustion</text>

  <rect x="630" y="745" width="490" height="35" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="645" y="768" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Avoid infinite timeouts</text>
  <text x="645" y="772" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Never set acquire timeout to 0 or -1 in production</text>
</svg>