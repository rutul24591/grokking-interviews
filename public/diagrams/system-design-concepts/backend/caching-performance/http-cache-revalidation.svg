<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">HTTP Cache Revalidation</text>

  <rect x="60" y="110" width="200" height="70" rx="12" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="100" y="150" font-family="Arial" font-size="14" fill="#0f172a">Client Cache</text>

  <rect x="360" y="110" width="200" height="70" rx="12" fill="#dbeafe" stroke="#60a5fa" />
  <text x="405" y="150" font-family="Arial" font-size="14" fill="#0f172a">Origin</text>

  <line x1="260" y1="145" x2="360" y2="145" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="360" y1="165" x2="260" y2="165" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <text x="90" y="210" font-family="Arial" font-size="13" fill="#0f172a">If-None-Match: "etag"</text>
  <text x="90" y="235" font-family="Arial" font-size="13" fill="#0f172a">If-Modified-Since: ...</text>
  <text x="90" y="265" font-family="Arial" font-size="13" fill="#0f172a">304 Not Modified</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569" />
    </marker>
  </defs>
</svg>
