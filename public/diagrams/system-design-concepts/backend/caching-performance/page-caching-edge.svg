<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="820" viewBox="0 0 1100 820">
  <!-- White background -->
  <rect width="1100" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="44" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#111827">Edge Page Caching: Architecture &amp; Flow</text>
  <text x="550" y="68" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#374151">CDN Edge Cache Storing Full HTML Pages with Invalidations &amp; Failover</text>

  <!-- ==================== REQUEST FLOW SECTION ==================== -->
  <text x="550" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Request Routing to Nearest Edge</text>

  <!-- User 1 - US -->
  <rect x="40" y="130" width="120" height="55" rx="8" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <text x="100" y="152" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">User (US)</text>
  <text x="100" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Latency: 12ms</text>

  <!-- Arrow to US Edge -->
  <line x1="160" y1="157" x2="240" y2="157" stroke="#1f2937" stroke-width="2"/>
  <polygon points="246,157 236,151 236,163" fill="#1f2937"/>

  <!-- US Edge Cache -->
  <rect x="250" y="130" width="140" height="55" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="152" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Edge (US-East)</text>
  <text x="320" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Cached HTML</text>

  <!-- User 2 - EU -->
  <rect x="40" y="210" width="120" height="55" rx="8" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <text x="100" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">User (EU)</text>
  <text x="100" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Latency: 8ms</text>

  <!-- Arrow to EU Edge -->
  <line x1="160" y1="237" x2="240" y2="237" stroke="#1f2937" stroke-width="2"/>
  <polygon points="246,237 236,231 236,243" fill="#1f2937"/>

  <!-- EU Edge Cache -->
  <rect x="250" y="210" width="140" height="55" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="232" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Edge (EU-West)</text>
  <text x="320" y="250" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Cached HTML</text>

  <!-- User 3 - APAC -->
  <rect x="40" y="290" width="120" height="55" rx="8" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <text x="100" y="312" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">User (APAC)</text>
  <text x="100" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Latency: 15ms</text>

  <!-- Arrow to APAC Edge -->
  <line x1="160" y1="317" x2="240" y2="317" stroke="#1f2937" stroke-width="2"/>
  <polygon points="246,317 236,311 236,323" fill="#1f2937"/>

  <!-- APAC Edge Cache -->
  <rect x="250" y="290" width="140" height="55" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="312" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Edge (APAC)</text>
  <text x="320" y="330" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Cached HTML</text>

  <!-- Global load balancer / DNS -->
  <rect x="440" y="200" width="140" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="510" y="224" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#92400e">GeoDNS / GSLB</text>
  <text x="510" y="242" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Routes to nearest</text>

  <!-- Arrows from edges to GeoDNS -->
  <line x1="390" y1="157" x2="440" y2="210" stroke="#1f2937" stroke-width="2"/>
  <polygon points="440,216 434,206 446,210" fill="#1f2937"/>
  <line x1="390" y1="237" x2="440" y2="230" stroke="#1f2937" stroke-width="2"/>
  <polygon points="446,230 436,224 436,236" fill="#1f2937"/>
  <line x1="390" y1="317" x2="440" y2="250" stroke="#1f2937" stroke-width="2"/>
  <polygon points="440,244 434,254 446,254" fill="#1f2937"/>

  <!-- ==================== CACHE LOOKUP FLOW ==================== -->
  <text x="550" y="390" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Cache Lookup &amp; Personalization Decision</text>

  <!-- Request arrives at edge -->
  <rect x="640" y="130" width="130" height="45" rx="8" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <text x="705" y="157" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">GET /page</text>

  <!-- Arrow down -->
  <line x1="705" y1="175" x2="705" y2="200" stroke="#1f2937" stroke-width="2"/>
  <polygon points="705,206 699,196 711,196" fill="#1f2937"/>

  <!-- Edge cache lookup -->
  <rect x="630" y="200" width="150" height="45" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="705" y="226" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#111827">Edge Cache Lookup</text>

  <!-- Decision diamond: cache hit? -->
  <polygon points="705,275 780,310 705,345 630,310" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="705" y="306" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#92400e">Cache Hit?</text>

  <!-- Arrow left: YES -->
  <line x1="630" y1="310" x2="560" y2="310" stroke="#1f2937" stroke-width="2"/>
  <polygon points="554,310 564,304 564,316" fill="#1f2937"/>
  <text x="590" y="300" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#16a34a">YES</text>

  <!-- Serve cached page -->
  <rect x="440" y="290" width="115" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="497" y="307" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#166534">Serve Cached</text>
  <text x="497" y="321" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="400" fill="#374151">HTML Page</text>

  <!-- Arrow right: NO -->
  <line x1="780" y1="310" x2="850" y2="310" stroke="#1f2937" stroke-width="2"/>
  <polygon points="856,310 846,304 846,316" fill="#1f2937"/>
  <text x="820" y="300" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#dc2626">NO</text>

  <!-- Fetch from origin -->
  <rect x="855" y="290" width="130" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="920" y="307" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#991b1b">Fetch Origin</text>
  <text x="920" y="321" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="400" fill="#374151">Generate &amp; Cache</text>

  <!-- Arrow down to personalized check -->
  <line x1="705" y1="345" x2="705" y2="380" stroke="#1f2937" stroke-width="2"/>
  <polygon points="705,386 699,376 711,376" fill="#1f2937"/>

  <!-- Personalization check -->
  <rect x="620" y="380" width="170" height="45" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="705" y="407" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#5b21b6">Personalized Content?</text>

  <!-- Arrow left: No (cacheable) -->
  <line x1="620" y1="402" x2="540" y2="402" stroke="#1f2937" stroke-width="2"/>
  <polygon points="534,402 544,396 544,408" fill="#1f2937"/>
  <text x="575" y="392" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#16a34a">NO</text>
  <rect x="430" y="382" width="105" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="482" y="399" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#166534">Cache &amp; Serve</text>
  <text x="482" y="413" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="400" fill="#374151">TTL: 5m-1h</text>

  <!-- Arrow right: Yes (dynamic) -->
  <line x1="790" y1="402" x2="870" y2="402" stroke="#1f2937" stroke-width="2"/>
  <polygon points="876,402 866,396 866,408" fill="#1f2937"/>
  <text x="835" y="392" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#dc2626">YES</text>
  <rect x="875" y="382" width="110" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="930" y="399" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#991b1b">ESI Assembly</text>
  <text x="930" y="413" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="400" fill="#374151">or Pass-through</text>

  <!-- ==================== INVALIDATION SECTION ==================== -->
  <text x="550" y="480" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Edge Cache Invalidation Strategies</text>

  <!-- URL-based invalidation -->
  <rect x="40" y="500" width="320" height="100" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="200" y="522" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">URL-Based Purge</text>
  <text x="200" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Invalidates specific URL path across all</text>
  <text x="200" y="560" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">edge locations. Example: PURGE /blog/post-1</text>
  <text x="200" y="580" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#16a34a">Propagation: 10-30s across all edges</text>

  <!-- Tag-based invalidation -->
  <rect x="390" y="500" width="320" height="100" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="550" y="522" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Tag-Based Invalidation</text>
  <text x="550" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Purge all pages with specific cache tags.</text>
  <text x="550" y="560" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Example: tag:product:123 invalidates all</text>
  <text x="550" y="580" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#ca8a04">Selective, efficient for content updates</text>

  <!-- Purge All -->
  <rect x="740" y="500" width="320" height="100" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="900" y="522" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Purge All (Nuclear Option)</text>
  <text x="900" y="545" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Clears entire CDN cache. Causes thundering</text>
  <text x="900" y="560" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">herd on origin. Use only for emergencies.</text>
  <text x="900" y="580" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="#dc2626">HIGH RISK: Origin overload likely</text>

  <!-- ==================== FAILOVER / STALE SERVING ==================== -->
  <text x="550" y="650" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Origin Failure: Stale Content Serving</text>

  <!-- Normal flow -->
  <rect x="40" y="675" width="240" height="110" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="160" y="697" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Normal Operation</text>

  <!-- Timeline bar -->
  <rect x="60" y="710" width="200" height="12" rx="6" fill="#e5e7eb"/>
  <rect x="60" y="710" width="160" height="12" rx="6" fill="#16a34a"/>
  <text x="160" y="738" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Fresh content from origin (TTL valid)</text>
  <text x="160" y="755" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Hit Rate: 95%+ | Latency: &lt;20ms</text>

  <!-- Degraded flow -->
  <rect x="310" y="675" width="240" height="110" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="430" y="697" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Origin Unhealthy</text>

  <!-- Timeline bar with stale -->
  <rect x="330" y="710" width="200" height="12" rx="6" fill="#e5e7eb"/>
  <rect x="330" y="710" width="100" height="12" rx="6" fill="#16a34a"/>
  <rect x="430" y="710" width="100" height="12" rx="6" fill="#fbbf24"/>
  <text x="430" y="738" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#d97706">SERVE STALE</text>
  <text x="430" y="755" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Stale-while-revalidate: up to 24h</text>

  <!-- Recovery flow -->
  <rect x="580" y="675" width="240" height="110" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="700" y="697" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Origin Recovery</text>

  <!-- Timeline bar with recovery -->
  <rect x="600" y="710" width="200" height="12" rx="6" fill="#e5e7eb"/>
  <rect x="600" y="710" width="60" height="12" rx="6" fill="#fbbf24"/>
  <rect x="660" y="710" width="140" height="12" rx="6" fill="#16a34a"/>
  <text x="700" y="738" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="#16a34a">BACKGROUD REFRESH</text>
  <text x="700" y="755" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Origin healthy, stale entries replaced</text>

  <!-- Health check -->
  <rect x="850" y="675" width="220" height="110" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="960" y="697" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Health Check Config</text>

  <!-- Check interval -->
  <text x="870" y="720" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Interval: 10s</text>
  <text x="870" y="738" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Timeout: 5s</text>
  <text x="870" y="756" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Unhealthy threshold: 3</text>

  <!-- Status indicator -->
  <circle cx="1030" cy="720" r="6" fill="#16a34a"/>
  <text x="1045" y="724" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Healthy</text>
  <circle cx="1030" cy="738" r="6" fill="#fbbf24"/>
  <text x="1045" y="742" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Degraded</text>
  <circle cx="1030" cy="756" r="6" fill="#dc2626"/>
  <text x="1045" y="760" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">Unhealthy</text>
</svg>