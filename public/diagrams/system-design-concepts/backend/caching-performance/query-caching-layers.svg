<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">Query Caching Layers</text>

  <rect x="80" y="100" width="240" height="90" rx="12" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="110" y="145" font-family="Arial" font-size="14" fill="#0f172a">Application Cache</text>

  <rect x="360" y="100" width="240" height="90" rx="12" fill="#dbeafe" stroke="#60a5fa" />
  <text x="395" y="145" font-family="Arial" font-size="14" fill="#0f172a">Proxy Cache</text>

  <rect x="640" y="100" width="240" height="90" rx="12" fill="#e0f2fe" stroke="#38bdf8" />
  <text x="685" y="145" font-family="Arial" font-size="14" fill="#0f172a">DB Result Cache</text>

  <rect x="80" y="240" width="800" height="100" rx="12" fill="#f1f5f9" stroke="#cbd5f5" />
  <text x="110" y="280" font-family="Arial" font-size="14" fill="#0f172a">Higher layers are more flexible, lower layers are more transparent.</text>
  <text x="110" y="305" font-family="Arial" font-size="14" fill="#0f172a">All layers require correct invalidation to avoid stale data.</text>
</svg>
