<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680">
  <rect width="1100" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Object Pool Contention — Multi-Thread Lock Contention &amp; Mitigation</text>

  <!-- ============ LEFT PANEL: Per-Thread Pool vs Shared Pool ============ -->
  <text x="280" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Per-Thread Pool (No Contention)</text>

  <!-- Thread A -->
  <rect x="40" y="100" width="220" height="130" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="150" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Thread A Pool</text>
  <rect x="55" y="135" width="42" height="28" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="76" y="154" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 1</text>
  <rect x="105" y="135" width="42" height="28" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="126" y="154" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 2</text>
  <rect x="155" y="135" width="42" height="28" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="176" y="154" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 3</text>
  <text x="150" y="190" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">3 idle, 0 active</text>
  <text x="150" y="210" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Lock-free access</text>

  <!-- Thread B -->
  <rect x="40" y="250" width="220" height="130" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="150" y="270" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Thread B Pool</text>
  <rect x="55" y="285" width="42" height="28" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="76" y="304" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 1</text>
  <rect x="105" y="285" width="42" height="28" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="126" y="304" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 2</text>
  <rect x="155" y="285" width="42" height="28" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="176" y="304" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 3</text>
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">2 idle, 1 active</text>
  <text x="150" y="360" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">No cross-thread blocking</text>

  <!-- Arrow between panels -->
  <line x1="270" y1="220" x2="290" y2="220" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- ============ CENTER PANEL: Shared Pool Contention ============ -->
  <text x="550" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Shared Pool (Lock Contention)</text>

  <!-- Shared Pool -->
  <rect x="350" y="100" width="400" height="280" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="550" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Shared Object Pool</text>

  <!-- Pool objects -->
  <rect x="370" y="140" width="55" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="397" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 1</text>
  <rect x="435" y="140" width="55" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="462" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 2</text>
  <rect x="500" y="140" width="55" height="30" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="527" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 3</text>
  <rect x="565" y="140" width="55" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="592" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 4</text>
  <rect x="630" y="140" width="55" height="30" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="657" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 5</text>
  <rect x="695" y="140" width="40" height="30" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="715" y="160" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937" text-anchor="middle">Obj 6</text>

  <!-- Lock icon -->
  <rect x="420" y="190" width="260" height="35" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="550" y="213" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#92400e" text-anchor="middle">Pool Mutex Lock (serializes borrow/return)</text>

  <!-- Threads competing -->
  <rect x="370" y="240" width="100" height="30" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="420" y="260" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">Thread 1</text>
  <rect x="500" y="240" width="100" height="30" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="550" y="260" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">Thread 2</text>
  <rect x="630" y="240" width="100" height="30" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="680" y="260" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">Thread 3</text>

  <!-- Contention arrows -->
  <path d="M420 240 L420 225" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrowUp)"/>
  <path d="M550 240 L550 225" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrowUp)"/>
  <path d="M680 240 L680 225" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#arrowUp)"/>

  <!-- Wait Queue -->
  <rect x="370" y="295" width="360" height="60" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="550" y="315" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#991b1b" text-anchor="middle">Wait Queue (blocked threads)</text>
  <text x="550" y="338" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Avg wait: 12ms | Max wait: 85ms | Timeout: 200ms</text>

  <!-- ============ RIGHT PANEL: Timeout Scenarios ============ -->
  <text x="820" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Timeout &amp; Failure Paths</text>

  <!-- Timeout scenario -->
  <rect x="710" y="100" width="350" height="130" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
  <text x="885" y="122" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">Borrow Timeout (200ms exceeded)</text>
  <path d="M730 140 L745 155 L730 170" stroke="#dc2626" stroke-width="2" fill="none"/>
  <text x="885" y="160" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">Fallback: Create new object (costly)</text>
  <text x="885" y="180" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">Or reject request (circuit-breaker)</text>
  <text x="885" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">Or retry with backoff (adds latency)</text>

  <!-- Contention timeline -->
  <rect x="710" y="250" width="350" height="170" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="885" y="272" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Contention Timeline</text>

  <!-- Timeline bar -->
  <line x1="740" y1="380" x2="1030" y2="380" stroke="#6b7280" stroke-width="2"/>

  <!-- Time segments -->
  <rect x="740" y="350" width="60" height="30" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="770" y="370" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Low</text>

  <rect x="800" y="330" width="60" height="50" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="830" y="360" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Med</text>

  <rect x="860" y="300" width="60" height="80" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <text x="890" y="350" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">High</text>

  <rect x="920" y="285" width="60" height="95" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="950" y="340" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Crit</text>

  <rect x="980" y="310" width="50" height="70" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="1005" y="350" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Med</text>

  <text x="885" y="405" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151" text-anchor="middle">Time -&gt; (request rate increases then subsides)</text>

  <!-- ============ BOTTOM PANEL: Contention Metrics &amp; Mitigation ============ -->
  <text x="550" y="445" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Contention Metrics &amp; Mitigation Strategies</text>

  <!-- Metrics Table -->
  <rect x="40" y="460" width="500" height="200" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="290" y="482" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Key Metrics</text>

  <!-- Row 1 -->
  <rect x="55" y="495" width="140" height="28" rx="4" fill="#f3f4f6"/>
  <text x="125" y="514" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Lock Hold Time</text>
  <rect x="195" y="495" width="160" height="28" rx="4" fill="#d1fae5"/>
  <text x="275" y="514" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">0.5ms (target)</text>
  <rect x="355" y="495" width="160" height="28" rx="4" fill="#fee2e2"/>
  <text x="435" y="514" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">8.2ms (observed)</text>

  <!-- Row 2 -->
  <rect x="55" y="528" width="140" height="28" rx="4" fill="#f3f4f6"/>
  <text x="125" y="547" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Queue Depth</text>
  <rect x="195" y="528" width="160" height="28" rx="4" fill="#d1fae5"/>
  <text x="275" y="547" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">&lt; 5 (healthy)</text>
  <rect x="355" y="528" width="160" height="28" rx="4" fill="#fee2e2"/>
  <text x="435" y="547" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">47 (contention)</text>

  <!-- Row 3 -->
  <rect x="55" y="561" width="140" height="28" rx="4" fill="#f3f4f6"/>
  <text x="125" y="580" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Timeout Rate</text>
  <rect x="195" y="561" width="160" height="28" rx="4" fill="#d1fae5"/>
  <text x="275" y="580" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">&lt; 0.1%</text>
  <rect x="355" y="561" width="160" height="28" rx="4" fill="#fee2e2"/>
  <text x="435" y="580" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">3.7%</text>

  <!-- Row 4 -->
  <rect x="55" y="594" width="140" height="28" rx="4" fill="#f3f4f6"/>
  <text x="125" y="613" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Pool Utilization</text>
  <rect x="195" y="594" width="160" height="28" rx="4" fill="#d1fae5"/>
  <text x="275" y="613" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">70-80%</text>
  <rect x="355" y="594" width="160" height="28" rx="4" fill="#fee2e2"/>
  <text x="435" y="613" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">98% (exhausted)</text>

  <!-- Row 5 -->
  <rect x="55" y="627" width="140" height="28" rx="4" fill="#f3f4f6"/>
  <text x="125" y="646" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">Avg Borrow Wait</text>
  <rect x="195" y="627" width="160" height="28" rx="4" fill="#d1fae5"/>
  <text x="275" y="646" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">&lt; 1ms</text>
  <rect x="355" y="627" width="160" height="28" rx="4" fill="#fee2e2"/>
  <text x="435" y="646" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937" text-anchor="middle">34ms</text>

  <!-- Mitigation Strategies -->
  <rect x="560" y="460" width="500" height="200" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="810" y="482" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Mitigation Strategies</text>

  <!-- Strategy 1 -->
  <rect x="575" y="495" width="470" height="28" rx="4" fill="#d1fae5"/>
  <text x="590" y="514" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#065f46">1.</text>
  <text x="615" y="514" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Use lock-free concurrent pool (e.g., MPMC queue with CAS operations)</text>

  <!-- Strategy 2 -->
  <rect x="575" y="528" width="470" height="28" rx="4" fill="#d1fae5"/>
  <text x="590" y="547" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#065f46">2.</text>
  <text x="615" y="547" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Size pool to match thread count (poolSize = corePoolSize + 1)</text>

  <!-- Strategy 3 -->
  <rect x="575" y="561" width="470" height="28" rx="4" fill="#d1fae5"/>
  <text x="590" y="580" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#065f46">3.</text>
  <text x="615" y="580" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Implement per-CPU sub-pools to eliminate false sharing &amp; cache-line contention</text>

  <!-- Strategy 4 -->
  <rect x="575" y="594" width="470" height="28" rx="4" fill="#d1fae5"/>
  <text x="590" y="613" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#065f46">4.</text>
  <text x="615" y="613" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Add adaptive pool resizing based on queue depth and wait-time thresholds</text>

  <!-- Strategy 5 -->
  <rect x="575" y="627" width="470" height="28" rx="4" fill="#d1fae5"/>
  <text x="590" y="646" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#065f46">5.</text>
  <text x="615" y="646" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Set aggressive borrow timeouts with exponential backoff retry on exhaustion</text>

  <!-- Marker definitions -->
  <defs>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowUp" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 10 L 5 0 L 10 10 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>