<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">Distributed Caching Topology</text>

  <rect x="60" y="90" width="200" height="90" rx="12" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="90" y="140" font-family="Arial" font-size="16" fill="#0f172a">App Instances</text>

  <rect x="360" y="90" width="240" height="90" rx="12" fill="#dbeafe" stroke="#60a5fa" />
  <text x="420" y="140" font-family="Arial" font-size="16" fill="#0f172a">Cache Cluster</text>

  <rect x="720" y="90" width="180" height="90" rx="12" fill="#fee2e2" stroke="#fca5a5" />
  <text x="770" y="140" font-family="Arial" font-size="16" fill="#0f172a">Database</text>

  <line x1="260" y1="135" x2="360" y2="135" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="600" y1="135" x2="720" y2="135" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="100" y="250" width="760" height="90" rx="12" fill="#f1f5f9" stroke="#cbd5f5" />
  <text x="130" y="285" font-family="Arial" font-size="14" fill="#0f172a">Reads hit cache when warm; misses fall through to the database and repopulate the cache.</text>
  <text x="130" y="310" font-family="Arial" font-size="14" fill="#0f172a">Cache capacity and eviction policy determine hit ratio and latency.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569" />
    </marker>
  </defs>
</svg>
