<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="70" font-size="28" font-family="Arial" fill="#0f172a">Distributed Cache Topology</text>
  <rect x="80" y="140" width="260" height="120" rx="12" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="110" y="195" font-size="18" font-family="Arial" fill="#0f172a">App Servers</text>
  <rect x="420" y="140" width="300" height="120" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="195" font-size="18" font-family="Arial" fill="#0f172a">Cache Router</text>
  <rect x="820" y="110" width="300" height="90" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="850" y="160" font-size="16" font-family="Arial" fill="#0f172a">Shard A</text>
  <rect x="820" y="230" width="300" height="90" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="850" y="280" font-size="16" font-family="Arial" fill="#0f172a">Shard B</text>
  <rect x="820" y="350" width="300" height="90" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="850" y="400" font-size="16" font-family="Arial" fill="#0f172a">Shard C</text>
  <line x1="340" y1="200" x2="420" y2="200" stroke="#94a3b8" stroke-width="4"/>
  <line x1="720" y1="180" x2="820" y2="155" stroke="#94a3b8" stroke-width="4"/>
  <line x1="720" y1="200" x2="820" y2="275" stroke="#94a3b8" stroke-width="4"/>
  <line x1="720" y1="220" x2="820" y2="395" stroke="#94a3b8" stroke-width="4"/>
  <text x="60" y="520" font-size="16" font-family="Arial" fill="#475569">Keys are routed to shards via consistent hashing or a proxy layer.</text>
</svg>
