<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Distributed Cache Topology</text>
  <text x="60" y="76" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#374151">Sharded, replicated, and hybrid architectures with consistent hashing and data redistribution</text>

  <!-- Topology Comparison -->
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Three Cache Topology Patterns</text>

  <!-- 1. Sharded Topology -->
  <rect x="60" y="145" width="340" height="280" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="178" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Sharded (Partitioned)</text>
  <text x="80" y="198" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Each key maps to exactly one shard</text>

  <!-- App Servers -->
  <rect x="80" y="215" width="120" height="40" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="100" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">App Server</text>

  <!-- Arrows to shards -->
  <line x1="200" y1="235" x2="230" y2="235" stroke="#3b82f6" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Shard A -->
  <rect x="230" y="215" width="150" height="40" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="250" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Shard A (keys A-M)</text>

  <!-- Shard B -->
  <rect x="230" y="265" width="150" height="40" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="250" y="290" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Shard B (keys N-Z)</text>

  <!-- Characteristics -->
  <rect x="80" y="320" width="300" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="95" y="338" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Read: O(1) - direct to correct shard</text>

  <rect x="80" y="350" width="300" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="95" y="368" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Write: O(1) - direct to correct shard</text>

  <rect x="80" y="380" width="300" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="95" y="398" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Capacity: Sum of all shard capacities</text>

  <rect x="80" y="410" width="300" height="25" rx="4" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="95" y="428" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Risk: Shard failure = data loss for that partition</text>

  <!-- 2. Replicated Topology -->
  <rect x="430" y="145" width="340" height="280" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="178" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Replicated (Mirrored)</text>
  <text x="450" y="198" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Every node holds all data</text>

  <!-- App Server -->
  <rect x="450" y="215" width="120" height="40" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="470" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">App Server</text>

  <!-- Arrows to replicas -->
  <line x1="570" y1="230" x2="600" y2="230" stroke="#22c55e" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="570" y1="250" x2="600" y2="275" stroke="#22c55e" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="570" y1="260" x2="600" y2="320" stroke="#22c55e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Replica nodes -->
  <rect x="600" y="210" width="150" height="35" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="620" y="233" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Node A (full copy)</text>

  <rect x="600" y="255" width="150" height="35" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="620" y="278" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Node B (full copy)</text>

  <rect x="600" y="300" width="150" height="35" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="620" y="323" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Node C (full copy)</text>

  <!-- Characteristics -->
  <rect x="450" y="350" width="300" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="465" y="368" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Read: O(1) - any node, load balanced</text>

  <rect x="450" y="380" width="300" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="465" y="398" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Write: O(N) - must update all N nodes</text>

  <rect x="450" y="410" width="300" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="465" y="428" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Capacity: Single node capacity (bottleneck)</text>

  <rect x="450" y="440" width="300" height="25" rx="4" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <text x="465" y="458" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Risk: Write conflicts, consistency challenges</text>

  <!-- 3. Hybrid Topology -->
  <rect x="800" y="145" width="340" height="280" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="820" y="178" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Hybrid (Sharded + Replicated)</text>
  <text x="820" y="198" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Shards with intra-shard replication</text>

  <!-- App Server -->
  <rect x="820" y="215" width="120" height="40" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="840" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">App Server</text>

  <!-- Consistent Hash Ring -->
  <line x1="940" y1="235" x2="970" y2="235" stroke="#eab308" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Shard group A (with replicas) -->
  <rect x="970" y="200" width="155" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="985" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Shard A (primary)</text>
  <rect x="985" y="235" width="125" height="22" rx="3" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="995" y="251" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">+ 2 replicas</text>

  <!-- Shard group B (with replicas) -->
  <rect x="970" y="285" width="155" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="985" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Shard B (primary)</text>
  <rect x="985" y="320" width="125" height="22" rx="3" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="995" y="336" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">+ 2 replicas</text>

  <!-- Characteristics -->
  <rect x="820" y="370" width="300" height="25" rx="4" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
  <text x="835" y="388" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Read: O(1) - shard + replica for availability</text>

  <rect x="820" y="400" width="300" height="25" rx="4" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
  <text x="835" y="418" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Write: O(replicas_per_shard) - not O(all nodes)</text>

  <rect x="820" y="430" width="300" height="25" rx="4" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
  <text x="835" y="448" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Capacity: Sum of shard capacities</text>

  <rect x="820" y="460" width="300" height="25" rx="4" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
  <text x="835" y="478" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Best of both: scale + fault tolerance</text>

  <!-- Consistent Hashing Ring -->
  <text x="60" y="470" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Consistent Hashing Ring with Virtual Nodes</text>

  <!-- Hash Ring Circle -->
  <circle cx="300" cy="640" r="130" fill="none" stroke="#d1d5db" stroke-width="2"/>
  <text x="260" y="640" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#6b7280">Hash Ring</text>

  <!-- Physical Nodes on Ring -->
  <circle cx="300" cy="510" r="8" fill="#3b82f6"/>
  <text x="315" y="515" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Node A</text>

  <circle cx="430" cy="640" r="8" fill="#22c55e"/>
  <text x="445" y="645" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Node B</text>

  <circle cx="300" cy="770" r="8" fill="#eab308"/>
  <text x="315" y="775" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Node C</text>

  <circle cx="170" cy="640" r="8" fill="#a855f7"/>
  <text x="100" y="645" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Node D</text>

  <!-- Virtual Nodes (smaller dots) -->
  <circle cx="250" cy="540" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="360" cy="570" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="380" cy="700" r="4" fill="#eab308" opacity="0.5"/>
  <circle cx="220" cy="720" r="4" fill="#a855f7" opacity="0.5"/>
  <circle cx="340" cy="520" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="400" cy="670" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="250" cy="740" r="4" fill="#eab308" opacity="0.5"/>
  <circle cx="200" cy="580" r="4" fill="#a855f7" opacity="0.5"/>

  <!-- Key placement -->
  <circle cx="280" cy="560" r="3" fill="#ef4444"/>
  <text x="285" y="555" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">key:user:1</text>
  <circle cx="350" cy="680" r="3" fill="#ef4444"/>
  <text x="355" y="695" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151">key:order:2</text>

  <!-- Node Addition/Removal Panel -->
  <rect x="480" y="500" width="660" height="300" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="2"/>
  <text x="500" y="535" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Node Addition and Removal</text>

  <rect x="500" y="555" width="300" height="55" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="515" y="578" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Node Addition</text>
  <text x="515" y="600" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Only K/N keys migrate (not all keys)</text>

  <rect x="500" y="620" width="300" height="55" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="515" y="643" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Node Removal</text>
  <text x="515" y="665" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Keys redistributed to next node on ring</text>

  <rect x="500" y="685" width="300" height="55" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="515" y="708" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Virtual Nodes Benefit</text>
  <text x="515" y="730" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Better load distribution across physical nodes</text>

  <rect x="830" y="555" width="290" height="115" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="845" y="578" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Without Virtual Nodes</text>
  <text x="845" y="600" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">4 nodes = 4 ring positions</text>
  <text x="845" y="620" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Uneven distribution (25% each ring arc)</text>
  <text x="845" y="640" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Hot spots if key distribution is skewed</text>

  <rect x="830" y="685" width="290" height="115" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="845" y="708" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">With Virtual Nodes (100-200 per physical)</text>
  <text x="845" y="730" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">400-800 ring positions for 4 physical nodes</text>
  <text x="845" y="750" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Near-perfect distribution, automatic rebalancing</text>
  <text x="845" y="770" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Removal impact: only 1/N of total keys migrate</text>
</svg>