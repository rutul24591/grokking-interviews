<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <!-- Background -->
  <rect width="1200" height="900" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#111827">Cache Key Design Patterns</text>
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#374151">Key structures, collision avoidance, and memory overhead analysis</text>

  <!-- ============================================ -->
  <!-- SECTION 1: KEY PATTERN COMPARISON (top area) -->
  <!-- ============================================ -->

  <!-- Simple Key -->
  <rect x="60" y="120" width="340" height="150" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <rect x="60" y="120" width="340" height="36" rx="10" fill="#f3f4f6"/>
  <rect x="60" y="142" width="340" height="14" fill="#f3f4f6"/>
  <text x="80" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Simple Key</text>
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Format: "user:12345"</text>
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Pros: Low memory overhead</text>
  <text x="80" y="230" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Cons: High collision risk</text>
  <text x="80" y="250" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Memory: ~32 bytes/key</text>

  <!-- Composite Key -->
  <rect x="430" y="120" width="340" height="150" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <rect x="430" y="120" width="340" height="36" rx="10" fill="#f3f4f6"/>
  <rect x="430" y="142" width="340" height="14" fill="#f3f4f6"/>
  <text x="450" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Composite Key</text>
  <text x="450" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Format: "user:v2:profile:12345"</text>
  <text x="450" y="210" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Pros: Namespace isolation</text>
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Cons: Moderate memory cost</text>
  <text x="450" y="250" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Memory: ~64 bytes/key</text>

  <!-- Versioned Key -->
  <rect x="800" y="120" width="340" height="150" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <rect x="800" y="120" width="340" height="36" rx="10" fill="#f3f4f6"/>
  <rect x="800" y="142" width="340" height="14" fill="#f3f4f6"/>
  <text x="820" y="145" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Versioned Key</text>
  <text x="820" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Format: "user:v3:prof:12345:ts"</text>
  <text x="820" y="210" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Pros: Zero collision, safe migrations</text>
  <text x="820" y="230" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Cons: Higher memory + serialization</text>
  <text x="820" y="250" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Memory: ~96 bytes/key</text>

  <!-- ============================================ -->
  <!-- SECTION 2: KEY COLLISION SCENARIOS           -->
  <!-- ============================================ -->

  <text x="60" y="320" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Key Collision Scenarios &amp; Avoidance</text>

  <!-- Collision Example 1: Ambiguous delimiter -->
  <rect x="60" y="345" width="530" height="175" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="80" y="375" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Collision: Ambiguous Delimiter</text>

  <rect x="80" y="390" width="490" height="30" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="100" y="411" font-family="monospace" font-size="13" font-weight="700" fill="#dc2626">BAD: "user_john_doe_profile"  (underscores in value)</text>

  <rect x="80" y="430" width="490" height="30" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="100" y="451" font-family="monospace" font-size="13" font-weight="700" fill="#dc2626">BAD: "user_john_doe" == "user_john" + "_doe" (ambiguous)</text>

  <rect x="80" y="470" width="490" height="35" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="100" y="493" font-family="monospace" font-size="13" font-weight="700" fill="#16a34a">GOOD: "user:john:doe:profile" (use colon delimiter)</text>

  <!-- Collision Example 2: Type confusion -->
  <rect x="620" y="345" width="520" height="175" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="640" y="375" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Collision: Type Confusion</text>

  <rect x="640" y="390" width="480" height="30" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="660" y="411" font-family="monospace" font-size="13" font-weight="700" fill="#dc2626">BAD: "item:123" (could be orderId or userId)</text>

  <rect x="640" y="430" width="480" height="30" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="660" y="451" font-family="monospace" font-size="13" font-weight="700" fill="#dc2626">BAD: "cart:456"  vs  "wishlist:456"  (same ID)</text>

  <rect x="640" y="470" width="480" height="35" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="660" y="493" font-family="monospace" font-size="13" font-weight="700" fill="#16a34a">GOOD: "order:item:123" vs "user:cart:456" (full namespace)</text>

  <!-- ============================================ -->
  <!-- SECTION 3: KEY SERIALIZATION & DELIMITER ESCAPING -->
  <!-- ============================================ -->

  <text x="60" y="570" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Key Serialization &amp; Delimiter Escaping</text>

  <!-- Serialization Flow -->
  <rect x="60" y="595" width="530" height="280" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="80" y="625" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Serialization Pipeline</text>

  <!-- Step boxes -->
  <rect x="80" y="645" width="120" height="40" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="140" y="671" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle">Input Object</text>

  <line x1="200" y1="665" x2="225" y2="665" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="225" y="645" width="120" height="40" rx="8" fill="#fefce8" stroke="#facc15" stroke-width="2"/>
  <text x="285" y="671" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle">JSON Encode</text>

  <line x1="345" y1="665" x2="370" y2="665" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="370" y="645" width="120" height="40" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="430" y="671" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle">Delimiter Join</text>

  <line x1="490" y1="665" x2="515" y2="665" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="515" y="645" width="60" height="40" rx="8" fill="#faf5ff" stroke="#c084fc" stroke-width="2"/>
  <text x="545" y="671" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937" text-anchor="middle">Hash</text>

  <!-- Example below pipeline -->
  <text x="80" y="720" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Object: { userId: 123, region: "us-east" }</text>
  <text x="80" y="745" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Step 1: JSON = '{"userId":123,"region":"us-east"}'</text>
  <text x="80" y="770" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Step 2: Join  = "user:123:region:us-east"</text>
  <text x="80" y="795" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Step 3: SHA256 = "a3f8c2..." (fixed 32 bytes)</text>
  <text x="80" y="820" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">Step 4: MD5   = "7b9d1e..." (fixed 16 bytes)</text>

  <!-- Delimiter escaping -->
  <rect x="620" y="595" width="520" height="280" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="640" y="625" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">Delimiter Escape Strategy</text>

  <text x="640" y="655" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#374151">When values contain the delimiter character:</text>

  <rect x="640" y="670" width="480" height="35" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="660" y="693" font-family="monospace" font-size="12" font-weight="700" fill="#dc2626">Value: "user:name:with:colons" (contains colons!)</text>

  <rect x="640" y="715" width="480" height="35" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="660" y="738" font-family="monospace" font-size="12" font-weight="700" fill="#16a34a">Escape: "user:user\\:name\\:with\\:colons"</text>

  <rect x="640" y="760" width="480" height="35" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="660" y="783" font-family="monospace" font-size="12" font-weight="700" fill="#1d4ed8">Or use: "user:base64(dXNlcjpuYW1l)" encoding</text>

  <rect x="640" y="805" width="480" height="55" rx="6" fill="#faf5ff" stroke="#c084fc" stroke-width="2"/>
  <text x="660" y="828" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#6b21a8">Best Practice: Use URL-safe Base64 or SHA-256</text>
  <text x="660" y="848" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">for arbitrary user input to guarantee no collisions.</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>