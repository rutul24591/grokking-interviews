<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 850" width="100%" height="100%">
  <defs>
    <linearGradient id="cdnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.04" />
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.04" />
    </linearGradient>
    <linearGradient id="cacheLayerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.04" />
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.04" />
    </linearGradient>
    <linearGradient id="threatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.05" />
    </linearGradient>
    <marker id="arrowAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#f59e0b" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#10b981" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#3b82f6" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#8b5cf6" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#ef4444" />
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6b7280" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="950" height="850" fill="#ffffff" />

  <!-- Title -->
  <text x="475" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827">Cache Stampede: Defense-in-Depth Architecture</text>
  <text x="475" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151">Multi-layer protection: each layer independently handles stampede, with monitoring at every level</text>

  <!-- ============================================================ -->
  <!-- THREAT ARRIVAL -->
  <!-- ============================================================ -->
  <rect x="30" y="85" width="890" height="55" rx="10" fill="url(#threatGrad)" stroke="#ef4444" stroke-width="2" />
  <text x="60" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ef4444">Incoming Threat:</text>
  <text x="230" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151">Hot key expires at t=0. 10,000 concurrent requests arrive simultaneously for the same cache key.</text>
  <text x="780" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ef4444">10K reqs</text>

  <!-- Down arrow -->
  <line x1="475" y1="140" x2="475" y2="165" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)" />

  <!-- ============================================================ -->
  <!-- LAYER 1: CDN LAYER -->
  <!-- ============================================================ -->
  <rect x="30" y="170" width="890" height="170" rx="12" fill="url(#cdnGrad)" stroke="#f59e0b" stroke-width="2" />
  <text x="475" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#f59e0b">Layer 1: CDN Edge (Request Coalescing)</text>
  <text x="475" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">First line of defense: CDN collapses identical requests at the edge before they reach origin</text>

  <!-- CDN nodes -->
  <rect x="60" y="240" width="100" height="80" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2" />
  <text x="110" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1f2937">CDN Edge</text>
  <text x="110" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">us-east-1</text>
  <text x="110" y="298" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">CloudFront</text>
  <text x="110" y="314" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#10b981">Coalesces 3K reqs</text>

  <rect x="200" y="240" width="100" height="80" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2" />
  <text x="250" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1f2937">CDN Edge</text>
  <text x="250" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">eu-west-1</text>
  <text x="250" y="298" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">CloudFront</text>
  <text x="250" y="314" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#10b981">Coalesces 4K reqs</text>

  <rect x="340" y="240" width="100" height="80" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2" />
  <text x="390" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1f2937">CDN Edge</text>
  <text x="390" y="282" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">ap-south-1</text>
  <text x="390" y="298" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">CloudFront</text>
  <text x="390" y="314" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#10b981">Coalesces 3K reqs</text>

  <!-- Coalescing mechanism -->
  <rect x="480" y="240" width="200" height="80" rx="8" fill="#111827" opacity="0.04" stroke="#6b7280" stroke-width="1.5" />
  <text x="580" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Coalescing Logic</text>
  <text x="580" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Identical URL + headers = 1</text>
  <text x="580" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">origin fetch. All waiters get</text>
  <text x="580" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">same response when ready.</text>

  <!-- Reduction arrow -->
  <text x="720" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1f2937">10K reqs -&gt;</text>
  <rect x="720" y="280" width="180" height="40" rx="6" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2" />
  <text x="810" y="298" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#10b981">~3 origin requests</text>
  <text x="810" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">(one per edge PoP)</text>

  <!-- Monitoring label for CDN -->
  <rect x="480" y="325" width="420" height="10" rx="3" fill="#8b5cf6" opacity="0.2" />
  <text x="690" y="333" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#8b5cf6">Monitor: CDN cache hit ratio, origin request count, coalesce ratio per PoP</text>

  <!-- Down arrow to next layer -->
  <line x1="475" y1="340" x2="475" y2="365" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowGray)" />
  <text x="490" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">3 reqs pass through</text>

  <!-- ============================================================ -->
  <!-- LAYER 2: APPLICATION LAYER -->
  <!-- ============================================================ -->
  <rect x="30" y="370" width="890" height="170" rx="12" fill="url(#appGrad)" stroke="#10b981" stroke-width="2" />
  <text x="475" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#10b981">Layer 2: Application Layer (Single-Flight / Mutex Locking)</text>
  <text x="475" y="418" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">In-process locking ensures only ONE goroutine/thread fetches from DB per cache key</text>

  <!-- App instances -->
  <rect x="60" y="440" width="180" height="85" rx="8" fill="#10b981" opacity="0.12" stroke="#10b981" stroke-width="2" />
  <text x="150" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1f2937">App Instance #1</text>

  <!-- Lock box -->
  <rect x="75" y="480" width="80" height="35" rx="5" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2" />
  <text x="115" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#10b981">LOCKED</text>
  <text x="115" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151">key:user:100</text>

  <!-- Waiting requests -->
  <rect x="165" y="480" width="60" height="35" rx="5" fill="#6b7280" opacity="0.1" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,2" />
  <text x="195" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#6b7280">WAIT</text>
  <text x="195" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151">2 reqs</text>

  <!-- Arrow to DB -->
  <line x1="240" y1="497" x2="310" y2="497" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)" />

  <!-- DB query -->
  <rect x="310" y="475" width="120" height="45" rx="6" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2" />
  <text x="370" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1f2937">Database</text>
  <text x="370" y="512" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">1 query total</text>

  <!-- Distributed lock note -->
  <rect x="470" y="440" width="210" height="85" rx="8" fill="#111827" opacity="0.04" stroke="#6b7280" stroke-width="1.5" />
  <text x="575" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1f2937">Distributed Lock (Optional)</text>
  <text x="575" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">For cross-instance stampede:</text>
  <text x="575" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Use Redis SET NX for</text>
  <text x="575" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">distributed mutex per key.</text>

  <!-- App instance #2 -->
  <rect x="720" y="440" width="180" height="85" rx="8" fill="#6b7280" opacity="0.08" stroke="#6b7280" stroke-width="1.5" />
  <text x="810" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1f2937">App Instance #2</text>
  <rect x="755" y="480" width="110" height="35" rx="5" fill="#6b7280" opacity="0.1" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3,2" />
  <text x="810" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#6b7280">No lock needed</text>
  <text x="810" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#374151">(different key requested)</text>

  <!-- Monitoring label for App layer -->
  <rect x="480" y="525" width="420" height="10" rx="3" fill="#8b5cf6" opacity="0.2" />
  <text x="690" y="533" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#8b5cf6">Monitor: Lock contention rate, wait queue depth, single-flight dedup ratio, timeout rate</text>

  <!-- Down arrow to next layer -->
  <line x1="475" y1="540" x2="475" y2="565" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowGray)" />
  <text x="490" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">1 req passes through</text>

  <!-- ============================================================ -->
  <!-- LAYER 3: CACHE LAYER -->
  <!-- ============================================================ -->
  <rect x="30" y="570" width="890" height="170" rx="12" fill="url(#cacheLayerGrad)" stroke="#3b82f6" stroke-width="2" />
  <text x="475" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#3b82f6">Layer 3: Cache Layer (Stale-While-Revalidate)</text>
  <text x="475" y="618" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#374151">Even if lock fails, SWR serves stale data while asynchronously refreshing, avoiding any blocking</text>

  <!-- SWR timeline -->
  <rect x="60" y="640" width="260" height="85" rx="8" fill="#111827" opacity="0.04" stroke="#6b7280" stroke-width="1" />
  <text x="190" y="665" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1f2937">SWR Timeline</text>

  <!-- Fresh period -->
  <rect x="75" y="680" width="100" height="30" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1.5" />
  <text x="125" y="699" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#10b981">Fresh: 5 min</text>

  <!-- SWR period -->
  <rect x="175" y="680" width="80" height="30" rx="4" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5" />
  <text x="215" y="699" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#f59e0b">SWR: 2 min</text>

  <!-- Expired -->
  <rect x="255" y="680" width="50" height="30" rx="4" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1.5" />
  <text x="280" y="699" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#ef4444">Evict</text>

  <!-- Behavior description -->
  <rect x="350" y="640" width="280" height="85" rx="8" fill="#111827" opacity="0.04" stroke="#6b7280" stroke-width="1" />
  <text x="490" y="665" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1f2937">SWR Behavior</text>
  <text x="490" y="688" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">During SWR window, expired reads</text>
  <text x="490" y="703" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">return stale immediately + trigger</text>
  <text x="490" y="718" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">async background refresh. Zero block.</text>

  <!-- Grace period -->
  <rect x="660" y="640" width="240" height="85" rx="8" fill="#111827" opacity="0.04" stroke="#6b7280" stroke-width="1" />
  <text x="780" y="665" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1f2937">Grace + Stale Config</text>
  <text x="780" y="688" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Redis: GET + EXPIRE grace</text>
  <text x="780" y="703" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Caffeine: refreshAfterWrite()</text>
  <text x="780" y="718" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#374151">Varnish: grace mode TTL</text>

  <!-- Monitoring label for Cache layer -->
  <rect x="30" y="730" width="890" height="10" rx="3" fill="#8b5cf6" opacity="0.2" />
  <text x="475" y="738" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#8b5cf6">Monitor: Stale serve ratio, SWR trigger rate, grace period utilization, refresh latency, cache hit rate during SWR</text>

  <!-- ============================================================ -->
  <!-- MONITORING & ALERTING OVERLAY -->
  <!-- ============================================================ -->
  <rect x="30" y="755" width="890" height="80" rx="12" fill="url(#monitorGrad)" stroke="#8b5cf6" stroke-width="2" />
  <text x="475" y="785" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#8b5cf6">Cross-Layer Monitoring &amp; Alerting</text>

  <!-- CDN alerts -->
  <rect x="50" y="798" width="270" height="30" rx="4" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1" />
  <text x="185" y="818" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1f2937">CDN: origin_request_rate &gt; threshold, coalesce_fail_rate &gt; 5%</text>

  <!-- App alerts -->
  <rect x="340" y="798" width="270" height="30" rx="4" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1" />
  <text x="475" y="818" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1f2937">App: lock_timeout_rate &gt; 1%, single_flight_queue &gt; 100</text>

  <!-- Cache alerts -->
  <rect x="630" y="798" width="270" height="30" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" />
  <text x="765" y="818" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1f2937">Cache: stale_serve_pct &gt; 20%, swr_refresh_latency &gt; p99</text>

</svg>