<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="820" viewBox="0 0 960 820">
  <rect width="960" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="45" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">CDN Edge Architecture &amp; Origin Shielding</text>
  <text x="480" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="middle">Global PoP distribution, tiered caching hierarchy, origin load reduction, and cache warming for new edge nodes</text>

  <!-- ======================== GLOBAL MAP / PoP DISTRIBUTION ======================== -->
  <text x="60" y="115" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Global Points of Presence (PoPs)</text>

  <!-- World outline (simplified) -->
  <rect x="60" y="130" width="500" height="250" rx="12" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/>

  <!-- North America PoPs -->
  <circle cx="180" cy="210" r="10" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <text x="180" y="214" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">US</text>
  <text x="180" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">N. Virginia</text>
  <text x="180" y="256" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Oregon</text>
  <text x="180" y="270" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">S&amp;#227;o Paulo</text>

  <!-- Europe PoPs -->
  <circle cx="320" cy="195" r="10" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <text x="320" y="199" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">EU</text>
  <text x="320" y="225" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Frankfurt</text>
  <text x="320" y="241" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">London</text>
  <text x="320" y="255" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Warsaw</text>

  <!-- Asia PoPs -->
  <circle cx="440" cy="210" r="10" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <text x="440" y="214" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">AP</text>
  <text x="440" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#111827" text-anchor="middle">Tokyo</text>
  <text x="440" y="256" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Singapore</text>
  <text x="440" y="270" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Mumbai</text>

  <!-- Stats box -->
  <rect x="60" y="395" width="500" height="70" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="80" y="418" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Typical CDN: 200-400+ PoPs globally</text>
  <text x="80" y="438" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">User routed to nearest PoP via GeoDNS / Anycast</text>
  <text x="80" y="456" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151">Edge latency: 5-20ms vs 80-200ms to origin</text>

  <!-- ======================== TIERED CACHING HIERARCHY ======================== -->
  <text x="600" y="115" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Tiered Caching Hierarchy</text>

  <!-- Users -->
  <rect x="640" y="140" width="280" height="45" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="780" y="168" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Global Users</text>

  <!-- Arrow -->
  <line x1="780" y1="185" x2="780" y2="210" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="795" y="202" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">GeoDNS</text>

  <!-- Edge PoPs -->
  <rect x="620" y="215" width="320" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="780" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Edge PoPs (Regional)</text>
  <text x="640" y="260" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Cache hit: serve directly (5-15ms)</text>

  <!-- Arrow -->
  <line x1="780" y1="275" x2="780" y2="300" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="795" y="292" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#dc2626">MISS</text>

  <!-- Origin Shield -->
  <rect x="620" y="305" width="320" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="780" y="330" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Origin Shield Tier</text>
  <text x="640" y="350" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Aggregates duplicate requests from all edges</text>

  <!-- Arrow -->
  <line x1="780" y1="365" x2="780" y2="390" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="795" y="382" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#dc2626">MISS</text>

  <!-- Origin Server -->
  <rect x="620" y="395" width="320" height="60" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="780" y="420" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Origin Server</text>
  <text x="640" y="440" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Single fetch per unique cache key</text>

  <!-- ======================== ORIGIN LOAD REDUCTION ======================== -->
  <text x="60" y="510" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Origin Load Reduction with CDN</text>

  <!-- Without CDN -->
  <rect x="60" y="530" width="400" height="120" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="260" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Without CDN</text>
  <line x1="100" y1="565" x2="420" y2="565" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Request arrows all going to origin -->
  <line x1="120" y1="580" x2="260" y2="620" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="200" y1="580" x2="260" y2="620" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="280" y1="580" x2="260" y2="620" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="360" y1="580" x2="260" y2="620" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="578" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Req 1</text>
  <text x="200" y="578" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Req 2</text>
  <text x="280" y="578" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Req 3</text>
  <text x="360" y="578" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#374151" text-anchor="middle">Req N</text>

  <rect x="180" y="610" width="160" height="30" rx="6" fill="#dc2626"/>
  <text x="260" y="630" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Origin (100% load)</text>

  <!-- With CDN -->
  <rect x="500" y="530" width="420" height="120" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="710" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">With CDN + Origin Shield</text>
  <line x1="540" y1="565" x2="880" y2="565" stroke="#10b981" stroke-width="1.5"/>

  <!-- 95% hit at edge -->
  <rect x="520" y="575" width="170" height="55" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="605" y="598" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">95% Cache Hit</text>
  <text x="535" y="618" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Served at edge (5-15ms)</text>

  <!-- 5% miss to origin -->
  <rect x="710" y="575" width="170" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="795" y="598" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#111827" text-anchor="middle">5% Cache Miss</text>
  <text x="720" y="618" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">Shield deduplicates -&gt; Origin</text>

  <!-- ======================== CACHE WARMING STRATEGIES ======================== -->
  <text x="60" y="690" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Cache Warming for New Edge Nodes</text>

  <!-- Strategy 1: Batch Pre-load -->
  <rect x="60" y="710" width="270" height="80" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="80" y="735" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Batch Pre-Load</text>
  <text x="75" y="755" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Proactively request top 1000 URLs</text>
  <text x="75" y="772" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">from origin to populate edge cache</text>

  <!-- Strategy 2: Traffic Replay -->
  <rect x="350" y="710" width="270" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="370" y="735" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Traffic Replay</text>
  <text x="365" y="755" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Replay recent traffic logs against</text>
  <text x="365" y="772" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">new edge to pre-populate cache</text>

  <!-- Strategy 3: Predictive Warming -->
  <rect x="640" y="710" width="280" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="735" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Predictive Warming</text>
  <text x="655" y="755" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">ML model predicts hot content for region</text>
  <text x="655" y="772" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">based on time, events, and trends</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>