<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="100%" height="100%">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="attackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fecaca"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="layer4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="layer5Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="450" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Multi-Layer Cache Penetration Defense</text>
  <text x="450" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#374151" text-anchor="middle">How each layer filters invalid requests before they reach the database</text>

  <!-- Attack Source Box -->
  <rect x="20" y="80" width="160" height="65" fill="url(#attackGrad)" stroke="#dc2626" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="100" y="103" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">ATTACK SCENARIO</text>
  <text x="100" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#7f1d1d" text-anchor="middle">Random Key Probing</text>
  <text x="100" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#991b1b" text-anchor="middle">10K+ requests/sec</text>

  <!-- Attack arrows -->
  <path d="M 180 112 L 250 112" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)" stroke-dasharray="6,3"/>
  <text x="215" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#dc2626" text-anchor="middle">invalid_key_8a7f</text>
  <path d="M 180 127 L 250 127" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)" stroke-dasharray="6,3"/>
  <text x="215" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#dc2626" text-anchor="middle">nonexistent_id_9c2e</text>
  <path d="M 180 142 L 250 142" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)" stroke-dasharray="6,3"/>
  <text x="215" y="137" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#dc2626" text-anchor="middle">fake_user_3d4b</text>

  <!-- Layer 1: Input Validation -->
  <rect x="260" y="85" width="140" height="95" fill="url(#layer1Grad)" stroke="#6366f1" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="330" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#3730a3" text-anchor="middle">Layer 1</text>
  <text x="330" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#3730a3" text-anchor="middle">Input Validation</text>
  <text x="330" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Format checking</text>
  <text x="330" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Length validation</text>
  <text x="330" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Type coercion</text>

  <!-- Blocked indicator -->
  <rect x="260" y="185" width="140" height="22" fill="#fecaca" stroke="#dc2626" stroke-width="1" rx="3"/>
  <text x="330" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#991b1b" text-anchor="middle">BLOCKS: malformed keys (~30%)</text>

  <!-- Arrow Layer 1 to Layer 2 -->
  <line x1="400" y1="132" x2="450" y2="132" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="425" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#16a34a" text-anchor="middle">pass</text>

  <!-- Layer 2: Bloom Filter -->
  <rect x="460" y="85" width="140" height="95" fill="url(#layer2Grad)" stroke="#f59e0b" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="530" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">Layer 2</text>
  <text x="530" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">Bloom Filter</text>
  <text x="530" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Probabilistic lookup</text>
  <text x="530" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">O(1) time check</text>
  <text x="530" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">~1% false positive</text>

  <!-- Blocked indicator -->
  <rect x="460" y="185" width="140" height="22" fill="#fecaca" stroke="#dc2626" stroke-width="1" rx="3"/>
  <text x="530" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#991b1b" text-anchor="middle">BLOCKS: known-miss keys (~60%)</text>

  <!-- Arrow Layer 2 to Layer 3 -->
  <line x1="600" y1="132" x2="650" y2="132" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="625" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#16a34a" text-anchor="middle">possible</text>

  <!-- Layer 3: Negative Cache -->
  <rect x="660" y="85" width="140" height="95" fill="url(#layer3Grad)" stroke="#16a34a" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="730" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#166534" text-anchor="middle">Layer 3</text>
  <text x="730" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#166534" text-anchor="middle">Negative Cache</text>
  <text x="730" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Sentinel values</text>
  <text x="730" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">TTL: 30-300 sec</text>
  <text x="730" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">404 responses</text>

  <!-- Blocked indicator -->
  <rect x="660" y="185" width="140" height="22" fill="#fecaca" stroke="#dc2626" stroke-width="1" rx="3"/>
  <text x="730" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#991b1b" text-anchor="middle">BLOCKS: repeated misses (~5%)</text>

  <!-- Arrow Layer 3 to Layer 4 -->
  <line x1="800" y1="132" x2="800" y2="170" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="820" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#16a34a" text-anchor="middle">miss</text>

  <!-- Layer 4: Rate Limiting -->
  <rect x="660" y="200" width="140" height="95" fill="url(#layer4Grad)" stroke="#dc2626" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="730" y="223" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#991b1b" text-anchor="middle">Layer 4</text>
  <text x="730" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#991b1b" text-anchor="middle">Rate Limiting</text>
  <text x="730" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Token bucket algo</text>
  <text x="730" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Per-client limits</text>
  <text x="730" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Sliding windows</text>

  <!-- Blocked indicator -->
  <rect x="660" y="300" width="140" height="22" fill="#fecaca" stroke="#dc2626" stroke-width="1" rx="3"/>
  <text x="730" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#991b1b" text-anchor="middle">BLOCKS: excessive requests (~3%)</text>

  <!-- Arrow Layer 4 to Layer 5 -->
  <line x1="660" y1="247" x2="540" y2="247" stroke="#374151" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="600" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#16a34a" text-anchor="middle">within limit</text>

  <!-- Layer 5: Database -->
  <rect x="400" y="210" width="140" height="95" fill="url(#layer5Grad)" stroke="#2563eb" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="470" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">Layer 5</text>
  <text x="470" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">Database</text>
  <text x="470" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Final query</text>
  <text x="470" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">Index scans only</text>
  <text x="470" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937" text-anchor="middle">~2% reach here</text>

  <!-- Result box -->
  <rect x="400" y="310" width="140" height="28" fill="#d1fae5" stroke="#16a34a" stroke-width="2" rx="4"/>
  <text x="470" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#166534" text-anchor="middle">NOT FOUND (404)</text>

  <!-- Feedback loop arrow -->
  <path d="M 400 324 Q 250 324 250 200 Q 250 150 260 150" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowhead-green)" stroke-dasharray="5,3" fill="none"/>
  <text x="275" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#166534" text-anchor="middle">Cache 404 result</text>
  <text x="275" y="323" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#166534" text-anchor="middle">TTL: 120s</text>

  <!-- Effectiveness Summary Table -->
  <rect x="50" y="370" width="800" height="330" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="6" filter="url(#shadow)"/>
  <text x="450" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Defense Layer Effectiveness</text>

  <!-- Table Header -->
  <rect x="70" y="415" width="760" height="30" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="100" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Defense Layer</text>
  <text x="280" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Blocks</text>
  <text x="420" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Latency Impact</text>
  <text x="580" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Memory Cost</text>
  <text x="720" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#111827">Bypass Risk</text>

  <!-- Row 1 -->
  <rect x="70" y="445" width="760" height="28" fill="#ffffff"/>
  <text x="100" y="463" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#374151">Input Validation</text>
  <text x="280" y="463" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">~30% of attacks</text>
  <text x="420" y="463" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Negligible (&lt;1ms)</text>
  <text x="580" y="463" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">None</text>
  <text x="720" y="463" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Low</text>

  <!-- Row 2 -->
  <rect x="70" y="473" width="760" height="28" fill="#f9fafb"/>
  <text x="100" y="491" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#374151">Bloom Filter</text>
  <text x="280" y="491" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">~60% of attacks</text>
  <text x="420" y="491" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">O(1) hash check (~2ms)</text>
  <text x="580" y="491" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">~100MB for 1B keys</text>
  <text x="720" y="491" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Medium (false positives)</text>

  <!-- Row 3 -->
  <rect x="70" y="501" width="760" height="28" fill="#ffffff"/>
  <text x="100" y="519" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#374151">Negative Cache</text>
  <text x="280" y="519" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">~5% of attacks</text>
  <text x="420" y="519" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Cache lookup (~1ms)</text>
  <text x="580" y="519" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Proportional to misses</text>
  <text x="720" y="519" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Low (TTL expiration)</text>

  <!-- Row 4 -->
  <rect x="70" y="529" width="760" height="28" fill="#f9fafb"/>
  <text x="100" y="547" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#374151">Rate Limiting</text>
  <text x="280" y="547" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">~3% of attacks</text>
  <text x="420" y="547" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Token check (&lt;1ms)</text>
  <text x="580" y="547" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Minimal (counters)</text>
  <text x="720" y="547" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Low (distributed limits)</text>

  <!-- Row 5 -->
  <rect x="70" y="557" width="760" height="28" fill="#ffffff"/>
  <text x="100" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#374151">Database</text>
  <text x="280" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">~2% (final check)</text>
  <text x="420" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Index scan (5-50ms)</text>
  <text x="580" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">IOPS cost</text>
  <text x="720" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">N/A (last resort)</text>

  <!-- Total Row -->
  <rect x="70" y="585" width="760" height="28" fill="#e0e7ff"/>
  <text x="100" y="603" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#3730a3">TOTAL PROTECTION</text>
  <text x="280" y="603" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#3730a3">~98% blocked before DB</text>
  <text x="420" y="603" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#3730a3">Avg latency: &lt;5ms</text>
  <text x="580" y="603" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#3730a3">~150MB total</text>
  <text x="720" y="603" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#3730a3">Defense-in-depth</text>

  <!-- Key Takeaway Box -->
  <rect x="70" y="625" width="760" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="100" y="648" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#92400e">Key Takeaway for Interviews:</text>
  <text x="100" y="665" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">A single cache layer is insufficient. Production systems need defense-in-depth with multiple filtering stages.</text>
  <text x="100" y="680" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#1f2937">Each layer should be independently deployable and have its own circuit breaker to prevent cascade failures.</text>
</svg>