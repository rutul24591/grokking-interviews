<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="70" font-size="28" font-family="Arial" fill="#0f172a">TTL Invalidation Timeline</text>
  <line x1="80" y1="140" x2="1120" y2="140" stroke="#94a3b8" stroke-width="4"/>
  <circle cx="200" cy="140" r="10" fill="#22c55e"/>
  <circle cx="520" cy="140" r="10" fill="#0ea5e9"/>
  <circle cx="880" cy="140" r="10" fill="#ef4444"/>
  <text x="170" y="190" font-size="18" font-family="Arial" fill="#0f172a">Write</text>
  <text x="470" y="190" font-size="18" font-family="Arial" fill="#0f172a">Cache Hit</text>
  <text x="850" y="190" font-size="18" font-family="Arial" fill="#0f172a">TTL Expired</text>
  <rect x="140" y="250" width="360" height="120" rx="12" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="170" y="285" font-size="16" font-family="Arial" fill="#0f172a">Key: user:v1:123</text>
  <text x="170" y="315" font-size="16" font-family="Arial" fill="#0f172a">TTL: 300s</text>
  <text x="170" y="345" font-size="16" font-family="Arial" fill="#0f172a">Value served until expiry</text>
  <rect x="620" y="250" width="420" height="120" rx="12" fill="#fee2e2" stroke="#ef4444"/>
  <text x="650" y="285" font-size="16" font-family="Arial" fill="#0f172a">After expiry: cache miss</text>
  <text x="650" y="315" font-size="16" font-family="Arial" fill="#0f172a">Load from DB, refresh key</text>
  <text x="650" y="345" font-size="16" font-family="Arial" fill="#0f172a">Add TTL jitter to spread load</text>
  <text x="80" y="520" font-size="16" font-family="Arial" fill="#475569">TTL invalidation is simple but trades freshness for simplicity.</text>
</svg>
