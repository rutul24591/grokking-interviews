<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="800" viewBox="0 0 960 800">
  <rect width="960" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="45" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">CDN Cache Request Flow</text>
  <text x="480" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="middle">Complete request lifecycle: cache evaluation, revalidation, and stale-content serving strategies</text>

  <!-- ======================== MAIN FLOW DIAGRAM ======================== -->

  <!-- Client -->
  <rect x="390" y="100" width="180" height="60" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="480" y="125" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Client Request</text>
  <text x="480" y="145" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="middle">GET /products/42</text>

  <!-- Arrow down -->
  <line x1="480" y1="160" x2="480" y2="195" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="495" y="182" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#374151">DNS / Anycast routing</text>

  <!-- CDN Edge Node -->
  <rect x="340" y="200" width="280" height="100" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="228" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">CDN Edge Node</text>
  <line x1="370" y1="238" x2="590" y2="238" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="258" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">1. Normalize URL</text>
  <text x="360" y="276" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">2. Compute cache key</text>
  <text x="360" y="294" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">3. Evaluate Cache-Control headers</text>

  <!-- Arrow: Cache Hit path -->
  <line x1="620" y1="250" x2="720" y2="250" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="242" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#059669" text-anchor="middle">HIT</text>

  <!-- Cache Hit Response -->
  <rect x="720" y="210" width="200" height="80" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="820" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="middle">Cached Response</text>
  <text x="740" y="260" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">X-Cache: HIT</text>
  <text x="740" y="276" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Age: 120s</text>

  <!-- Arrow from Hit to Client -->
  <path d="M820,210 Q820,130 570,130" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="750" y="120" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#059669">Response ~5ms</text>

  <!-- Arrow: Cache Miss path -->
  <line x1="480" y1="300" x2="480" y2="355" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="495" y="332" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#dc2626">MISS</text>

  <!-- ======================== Cache-Control Decision ======================== -->
  <text x="60" y="380" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Cache-Control Header Evaluation</text>

  <!-- Cache-Control header boxes -->
  <rect x="60" y="400" width="200" height="55" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="80" y="422" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">max-age=3600</text>
  <text x="80" y="442" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Cache for 1 hour at CDN</text>

  <rect x="280" y="400" width="200" height="55" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="300" y="422" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">s-maxage=86400</text>
  <text x="300" y="442" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Override: 24h for shared cache</text>

  <rect x="500" y="400" width="200" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="520" y="422" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">no-store</text>
  <text x="520" y="442" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Never cache, always to origin</text>

  <rect x="720" y="400" width="200" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="740" y="422" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">no-cache</text>
  <text x="740" y="442" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Cache but always revalidate</text>

  <!-- ======================== Revalidation Flow ======================== -->
  <text x="60" y="500" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Revalidation Flow (ETag / Last-Modified)</text>

  <!-- Client sends conditional request -->
  <rect x="60" y="520" width="260" height="90" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Conditional Request</text>
  <text x="75" y="568" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">If-None-Match: &quot;abc123&quot;</text>
  <text x="75" y="588" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">If-Modified-Since: Wed, 01 Apr</text>

  <!-- Arrow -->
  <line x1="320" y1="565" x2="410" y2="565" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Origin evaluates -->
  <rect x="410" y="520" width="220" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="520" y="545" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">Origin Checks</text>
  <text x="430" y="568" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Has resource changed since</text>
  <text x="430" y="588" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">the cached ETag / date?</text>

  <!-- Arrow: Not Modified -->
  <line x1="630" y1="550" x2="720" y2="550" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="665" y="542" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#059669" text-anchor="middle">Not Modified</text>

  <!-- Arrow: Modified -->
  <line x1="630" y1="580" x2="720" y2="580" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="665" y="605" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">Modified</text>

  <!-- 304 Response -->
  <rect x="720" y="515" width="200" height="60" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="820" y="538" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">304 Not Modified</text>
  <text x="740" y="558" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">Freshens cache, no body transfer</text>

  <!-- 200 Response -->
  <rect x="720" y="580" width="200" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="820" y="603" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827" text-anchor="middle">200 OK (New Body)</text>
  <text x="740" y="623" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#1f2937">New content replaces cached</text>

  <!-- ======================== Stale Content Strategies ======================== -->
  <text x="60" y="660" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Stale Content Serving Strategies</text>

  <!-- Stale-while-revalidate -->
  <rect x="60" y="685" width="420" height="85" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="80" y="710" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">stale-while-revalidate=60</text>
  <text x="75" y="732" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">Serve stale content immediately while</text>
  <text x="75" y="752" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">fetching fresh version in background.</text>
  <text x="75" y="768" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#059669">User sees content instantly; next request gets fresh data</text>

  <!-- Stale-if-error -->
  <rect x="500" y="685" width="420" height="85" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="520" y="710" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">stale-if-error=86400</text>
  <text x="515" y="732" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">If origin returns 5xx or times out,</text>
  <text x="515" y="752" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#1f2937">serve stale content for up to 24 hours.</text>
  <text x="515" y="768" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#b45309">Resilience layer: origin outage does not break user experience</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6b7280"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#10b981"/>
    </marker>
  </defs>
</svg>