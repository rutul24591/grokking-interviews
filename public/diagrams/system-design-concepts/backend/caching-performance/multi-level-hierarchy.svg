<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">Multi-Level Cache Hierarchy</text>

  <rect x="120" y="90" width="220" height="70" rx="12" fill="#dbeafe" stroke="#60a5fa" />
  <text x="160" y="130" font-family="Arial" font-size="14" fill="#0f172a">L1 In-Process</text>

  <rect x="120" y="180" width="220" height="70" rx="12" fill="#e0f2fe" stroke="#38bdf8" />
  <text x="160" y="220" font-family="Arial" font-size="14" fill="#0f172a">L2 Shared Cache</text>

  <rect x="120" y="270" width="220" height="70" rx="12" fill="#fee2e2" stroke="#fca5a5" />
  <text x="160" y="310" font-family="Arial" font-size="14" fill="#0f172a">L3 Origin</text>

  <rect x="420" y="120" width="420" height="200" rx="12" fill="#f1f5f9" stroke="#cbd5f5" />
  <text x="450" y="165" font-family="Arial" font-size="14" fill="#0f172a">Lower layers are slower but have more capacity</text>
  <text x="450" y="195" font-family="Arial" font-size="14" fill="#0f172a">Higher layers are faster but smaller</text>
</svg>
