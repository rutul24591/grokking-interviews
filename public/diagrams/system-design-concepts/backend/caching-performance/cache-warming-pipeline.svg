<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="810" viewBox="0 0 1100 810">
  <rect width="1100" height="810" fill="#ffffff" />

  <!-- Title -->
  <text x="550" y="42" font-family="Arial" font-size="26" font-weight="700" fill="#111827" text-anchor="middle">Cache Warming Pipeline</text>
  <text x="550" y="68" font-family="Arial" font-size="15" fill="#374151" text-anchor="middle">Identify hot keys, prioritize, batch load, populate cache, verify hit rate</text>

  <!-- Phase 1: Identify Hot Keys -->
  <rect x="30" y="100" width="200" height="100" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" />
  <text x="130" y="130" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">1. Identify Hot Keys</text>
  <text x="130" y="155" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Traffic log analysis</text>
  <text x="130" y="173" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Access frequency count</text>
  <text x="130" y="191" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Temporal pattern detect</text>

  <!-- Arrow 1->2 -->
  <line x1="230" y1="150" x2="270" y2="150" stroke="#374151" stroke-width="2" />
  <polygon points="270,142 285,150 270,158" fill="#374151" />

  <!-- Phase 2: Prioritize -->
  <rect x="285" y="100" width="200" height="100" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" />
  <text x="385" y="130" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">2. Prioritize by Frequency</text>
  <text x="385" y="155" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Rank by access count</text>
  <text x="385" y="173" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Apply decay weight</text>
  <text x="385" y="191" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Filter stale entries</text>

  <!-- Arrow 2->3 -->
  <line x1="485" y1="150" x2="525" y2="150" stroke="#374151" stroke-width="2" />
  <polygon points="525,142 540,150 525,158" fill="#374151" />

  <!-- Phase 3: Batch Load -->
  <rect x="540" y="100" width="200" height="100" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" />
  <text x="640" y="130" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">3. Batch Load</text>
  <text x="640" y="155" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Chunk by priority</text>
  <text x="640" y="173" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Rate-limited queries</text>
  <text x="640" y="191" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Parallel workers</text>

  <!-- Arrow 3->4 -->
  <line x1="740" y1="150" x2="780" y2="150" stroke="#374151" stroke-width="2" />
  <polygon points="780,142 795,150 780,158" fill="#374151" />

  <!-- Phase 4: Populate Cache -->
  <rect x="795" y="100" width="200" height="100" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" />
  <text x="895" y="130" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">4. Populate Cache</text>
  <text x="895" y="155" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">MSET / pipeline writes</text>
  <text x="895" y="173" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Set appropriate TTL</text>
  <text x="895" y="191" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Write verification</text>

  <!-- Warming Budget Box -->
  <rect x="30" y="230" width="460" height="110" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" />
  <text x="260" y="260" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Warming Budget Controls</text>
  <text x="260" y="285" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Max origin QPS: 10% of normal traffic capacity</text>
  <text x="260" y="305" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Circuit breaker: abort if origin p99 exceeds 2x baseline</text>
  <text x="260" y="325" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Backpressure: exponential backoff on origin errors</text>

  <!-- Arrow from budget to batch -->
  <line x1="490" y1="285" x2="640" y2="200" stroke="#d97706" stroke-width="2" stroke-dasharray="6,4" />
  <polygon points="635,206 640,200 645,206" fill="#d97706" />

  <!-- Success Criteria Box -->
  <rect x="510" y="230" width="485" height="110" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2" />
  <text x="752" y="260" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Success Criteria &amp; Verification</text>
  <text x="752" y="285" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Hit rate threshold: >= 85% for warmed keys within 5 min</text>
  <text x="752" y="305" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Origin load returns to baseline within 10 min</text>
  <text x="752" y="325" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">No cache stampede detected during verification window</text>

  <!-- Arrow from populate to success -->
  <line x1="895" y1="200" x2="895" y2="230" stroke="#059669" stroke-width="2" />
  <polygon points="887,228 895,240 903,228" fill="#059669" />

  <!-- Blue-Green Deployment Timeline -->
  <rect x="30" y="370" width="1040" height="160" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" />
  <text x="550" y="400" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Blue-Green Deployment Warming Timeline</text>

  <!-- Blue environment -->
  <rect x="60" y="420" width="200" height="90" rx="6" fill="#bfdbfe" stroke="#2563eb" stroke-width="2" />
  <text x="160" y="445" font-family="Arial" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Blue (Active)</text>
  <text x="160" y="468" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Serving traffic</text>
  <text x="160" y="486" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Logs capture hot keys</text>
  <text x="160" y="504" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Hit rate: 92%</text>

  <!-- Arrow Blue -> Green -->
  <line x1="260" y1="465" x2="310" y2="465" stroke="#374151" stroke-width="2" />
  <polygon points="310,457 325,465 310,473" fill="#374151" />
  <text x="292" y="450" font-family="Arial" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Switch</text>

  <!-- Green environment (warming) -->
  <rect x="325" y="420" width="200" height="90" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" />
  <text x="425" y="445" font-family="Arial" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Green (Warming)</text>
  <text x="425" y="468" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Pre-populate cache</text>
  <text x="425" y="486" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">From blue logs</text>
  <text x="425" y="504" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Warm 2 min before cutover</text>

  <!-- Arrow Green -> Verify -->
  <line x1="525" y1="465" x2="575" y2="465" stroke="#374151" stroke-width="2" />
  <polygon points="575,457 590,465 575,473" fill="#374151" />

  <!-- Verify box -->
  <rect x="590" y="420" width="200" height="90" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2" />
  <text x="690" y="445" font-family="Arial" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Verify Hit Rate</text>
  <text x="690" y="468" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Check >= 85% hit rate</text>
  <text x="690" y="486" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Monitor origin load</text>
  <text x="690" y="504" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">No stampede signals</text>

  <!-- Arrow Verify -> Route -->
  <line x1="790" y1="465" x2="840" y2="465" stroke="#374151" stroke-width="2" />
  <polygon points="840,457 855,465 840,473" fill="#374151" />

  <!-- Route traffic -->
  <rect x="855" y="420" width="200" height="90" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" />
  <text x="955" y="445" font-family="Arial" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Route Traffic</text>
  <text x="955" y="468" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Gradual shift 10% -> 100%</text>
  <text x="955" y="486" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Continue monitoring</text>
  <text x="955" y="504" font-family="Arial" font-size="12" fill="#1f2937" text-anchor="middle">Full cutover if stable</text>

  <!-- Rollback Procedure -->
  <rect x="30" y="560" width="1040" height="100" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2" />
  <text x="550" y="590" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Rollback Procedure</text>
  <text x="550" y="615" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Trigger: hit rate below 70% after 10 min OR origin p99 exceeds 3x baseline OR error rate above 1%</text>
  <text x="550" y="637" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Action: immediate traffic shift back to blue, abort warming jobs, alert on-call engineer, post-mortem within 24h</text>

  <!-- Warming Metrics Dashboard -->
  <rect x="30" y="680" width="1040" height="110" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" />
  <text x="550" y="710" font-family="Arial" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Warming Metrics Dashboard</text>
  <text x="200" y="740" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Keys queued: 50,000</text>
  <text x="200" y="760" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Keys warmed: 42,350 (84.7%)</text>
  <text x="200" y="780" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Remaining: 7,650 (ETA 45s)</text>

  <text x="550" y="740" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Origin QPS: 120 (limit: 500)</text>
  <text x="550" y="760" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Origin p99: 18ms (baseline: 15ms)</text>
  <text x="550" y="780" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Error rate: 0.02% (threshold: 1%)</text>

  <text x="900" y="740" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Cache write QPS: 2,400</text>
  <text x="900" y="760" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Write success: 99.98%</text>
  <text x="900" y="780" font-family="Arial" font-size="13" fill="#1f2937" text-anchor="middle">Avg key size: 1.2KB</text>
</svg>