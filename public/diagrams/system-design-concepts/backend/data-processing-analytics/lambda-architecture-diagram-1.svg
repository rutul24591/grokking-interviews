<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Lambda Architecture: Batch, Speed, and Serving Layers</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Dual pipeline design: batch layer for accuracy, speed layer for low latency, serving layer for merging</text>

  <!-- Event Sources -->
  <rect x="400" y="40" width="160" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Event Sources</text>
  <text x="480" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">All events fan out</text>

  <!-- Arrows down to batch and speed -->
  <defs>
    <marker id="arrL" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="430" y1="100" x2="200" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrL)"/>
  <line x1="530" y1="100" x2="760" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrL)"/>
  <line x1="480" y1="100" x2="480" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrL)"/>

  <!-- Batch Layer -->
  <rect x="30" y="130" width="280" height="140" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e40af">Batch Layer</text>
  <text x="170" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Immutability: append-only data</text>
  <text x="170" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Recomputation: periodic full recomputation</text>
  <text x="170" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">High latency, high accuracy</text>
  <text x="170" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Technology: Hadoop, Spark, Hive</text>

  <!-- Master Dataset -->
  <rect x="30" y="290" width="280" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="170" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Master Dataset</text>
  <text x="170" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Immutable, append-only data store</text>
  <text x="170" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Source of truth for all computation</text>

  <!-- Speed Layer -->
  <rect x="640" y="130" width="280" height="140" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="780" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#166534">Speed Layer</text>
  <text x="780" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Incremental updates only</text>
  <text x="780" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Low latency, approximate accuracy</text>
  <text x="780" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Compensates for batch layer latency</text>
  <text x="780" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Technology: Storm, Flink, Spark Streaming</text>

  <!-- Speed View -->
  <rect x="640" y="290" width="280" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="780" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Speed View</text>
  <text x="780" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Incremental updates from speed layer</text>
  <text x="780" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Replaced by batch view when ready</text>

  <!-- Arrows to Serving Layer -->
  <line x1="170" y1="370" x2="360" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrL)"/>
  <line x1="780" y1="370" x2="600" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arrL)"/>

  <!-- Serving Layer -->
  <rect x="360" y="390" width="240" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="480" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Serving Layer</text>
  <text x="480" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Merges batch + speed views</text>

  <!-- Batch View -->
  <rect x="360" y="290" width="240" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Batch View</text>
  <text x="480" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Pre-computed results from batch layer</text>
  <text x="480" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">High accuracy, updated periodically</text>

  <line x1="480" y1="370" x2="480" y2="390" stroke="#64748b" stroke-width="2" marker-end="url(#arrL)"/>
</svg>