<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Data Deduplication: Exact vs Probabilistic Approaches</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Exact deduplication uses hashes or unique keys; probabilistic uses sketches for bounded memory</text>

  <!-- Exact deduplication flow -->
  <rect x="30" y="80" width="430" height="350" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="245" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0369a1">Exact Deduplication</text>

  <rect x="50" y="125" width="390" height="55" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="245" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Step 1: Compute unique key for each record</text>
  <text x="245" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Primary key, hash of content, or business key</text>

  <rect x="50" y="190" width="390" height="55" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="245" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Step 2: Check key against seen-keys store</text>
  <text x="245" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Hash set, Bloom filter (with false positives), or DB index</text>

  <rect x="50" y="255" width="390" height="55" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="245" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Step 3: Keep first occurrence, discard duplicates</text>
  <text x="245" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Or keep latest (last-write-wins) based on timestamp</text>

  <rect x="50" y="320" width="390" height="55" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="245" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Step 4: Output deduplicated records</text>
  <text x="245" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Each unique key appears exactly once in output</text>

  <!-- Probabilistic deduplication flow -->
  <rect x="500" y="80" width="430" height="350" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#92400e">Probabilistic Deduplication</text>

  <rect x="520" y="125" width="390" height="55" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="715" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Use: when exact dedup exceeds memory budget</text>
  <text x="715" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Billions of unique keys cannot fit in a hash set</text>

  <rect x="520" y="190" width="390" height="55" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="715" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Bloom Filter: fixed-size bit array + hash functions</text>
  <text x="715" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">May return false positive, never false negative</text>

  <rect x="520" y="255" width="390" height="55" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="715" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">HyperLogLog: estimate unique count</text>
  <text x="715" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Fixed ~12 KB memory, ~1-2% error for billions of keys</text>

  <rect x="520" y="320" width="390" height="55" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="715" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Trade-off: bounded memory, bounded error</text>
  <text x="715" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Acceptable for analytics, not for billing/compliance</text>

  <!-- Bottom comparison -->
  <rect x="30" y="440" width="430" height="16" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="245" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">Exact: 100% correct, memory grows with unique keys</text>

  <rect x="500" y="440" width="430" height="16" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="715" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">Probabilistic: fixed memory, known error bounds</text>
</svg>