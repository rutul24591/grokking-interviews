<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Kafka Log-Based Architecture: Topics, Partitions, and Consumer Groups</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Producers append to partition logs; consumers read independently at their own pace</text>

  <!-- Producers -->
  <text x="140" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Producers</text>
  <rect x="60" y="105" width="80" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Producer 1</text>
  <rect x="60" y="155" width="80" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Producer 2</text>
  <rect x="60" y="205" width="80" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Producer 3</text>

  <!-- Kafka Topic with Partitions -->
  <rect x="200" y="90" width="500" height="180" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Topic: orders (3 Partitions)</text>

  <!-- Partition 0 -->
  <rect x="220" y="130" width="140" height="120" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="290" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Partition 0</text>
  <text x="290" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 0</text>
  <text x="290" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 1</text>
  <text x="290" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 2</text>
  <text x="290" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 3</text>
  <text x="290" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">append-only log</text>

  <!-- Partition 1 -->
  <rect x="380" y="130" width="140" height="120" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Partition 1</text>
  <text x="450" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 0</text>
  <text x="450" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 1</text>
  <text x="450" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 2</text>
  <text x="450" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 3</text>
  <text x="450" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 4</text>
  <text x="450" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">append-only log</text>

  <!-- Partition 2 -->
  <rect x="540" y="130" width="140" height="120" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="610" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Partition 2</text>
  <text x="610" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 0</text>
  <text x="610" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 1</text>
  <text x="610" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">offset: 2</text>
  <text x="610" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">append-only log</text>

  <!-- Consumer Groups -->
  <text x="830" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Consumers</text>

  <rect x="740" y="105" width="180" height="50" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="830" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Group A: Payment Svc</text>
  <text x="830" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">3 consumers, 1 per partition</text>

  <rect x="740" y="170" width="180" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="830" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3730a3">Group B: Analytics</text>
  <text x="830" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">2 consumers, own offsets</text>

  <!-- Arrows: Producers to Partitions -->
  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="140" y1="125" x2="220" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="140" y1="175" x2="220" y2="185" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="140" y1="225" x2="220" y2="215" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Arrows: Partitions to Consumers -->
  <line x1="700" y1="155" x2="740" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="700" y1="200" x2="740" y2="195" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Key insight -->
  <rect x="30" y="310" width="900" height="130" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Key Kafka Design Principles</text>
  <text x="120" y="365" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Partitions enable parallelism: each partition is consumed by one consumer per group</text>
  <text x="120" y="385" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Offsets are per-consumer-group: groups read independently at their own pace</text>
  <text x="120" y="405" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Ordering is guaranteed within a partition, not across partitions</text>
  <text x="520" y="365" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Retention is time or size-based: logs are retained, not deleted on consume</text>
  <text x="520" y="385" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Producers choose partition via key hash or round-robin</text>
  <text x="520" y="405" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Replication factor determines durability and fault tolerance per partition</text>
</svg>