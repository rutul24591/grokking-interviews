<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">CDC Lag and Its Impact on Downstream Systems</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">CDC lag accumulates across the pipeline: database log flush, connector read, broker write, consumer process</text>

  <!-- Source DB timeline -->
  <text x="80" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Source Database</text>
  <line x1="40" y1="110" x2="920" y2="110" stroke="#3b82f6" stroke-width="3"/>
  <text x="920" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Time &#x2192;</text>

  <!-- Change events on DB timeline -->
  <circle cx="200" cy="110" r="8" fill="#3b82f6"/>
  <text x="200" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">T1: INSERT</text>
  <circle cx="400" cy="110" r="8" fill="#3b82f6"/>
  <text x="400" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">T2: UPDATE</text>
  <circle cx="600" cy="110" r="8" fill="#3b82f6"/>
  <text x="600" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">T3: DELETE</text>
  <circle cx="800" cy="110" r="8" fill="#3b82f6"/>
  <text x="800" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">T4: INSERT</text>

  <!-- Connector lag -->
  <text x="80" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">CDC Connector</text>
  <line x1="40" y1="195" x2="920" y2="195" stroke="#f59e0b" stroke-width="3"/>

  <circle cx="220" cy="195" r="8" fill="#f59e0b"/>
  <text x="220" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">T1 read (+20ms)</text>
  <circle cx="420" cy="195" r="8" fill="#f59e0b"/>
  <text x="420" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">T2 read (+15ms)</text>
  <circle cx="620" cy="195" r="8" fill="#f59e0b"/>
  <text x="620" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">T3 read (+25ms)</text>
  <circle cx="820" cy="195" r="8" fill="#f59e0b"/>
  <text x="820" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">T4 read (+30ms)</text>

  <!-- Broker lag -->
  <text x="80" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Message Broker</text>
  <line x1="40" y1="280" x2="920" y2="280" stroke="#6366f1" stroke-width="3"/>

  <circle cx="235" cy="280" r="8" fill="#6366f1"/>
  <text x="235" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3730a3">T1 committed (+10ms)</text>
  <circle cx="435" cy="280" r="8" fill="#6366f1"/>
  <text x="435" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3730a3">T2 committed (+8ms)</text>
  <circle cx="635" cy="280" r="8" fill="#6366f1"/>
  <text x="635" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3730a3">T3 committed (+12ms)</text>
  <circle cx="835" cy="280" r="8" fill="#6366f1"/>
  <text x="835" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3730a3">T4 committed (+15ms)</text>

  <!-- Consumer lag -->
  <text x="80" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Consumer Application</text>
  <line x1="40" y1="365" x2="920" y2="365" stroke="#22c55e" stroke-width="3"/>

  <circle cx="270" cy="365" r="8" fill="#22c55e"/>
  <text x="270" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">T1 processed (+35ms)</text>
  <circle cx="470" cy="365" r="8" fill="#22c55e"/>
  <text x="470" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">T2 processed (+30ms)</text>
  <circle cx="670" cy="365" r="8" fill="#22c55e"/>
  <text x="670" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">T3 processed (+45ms)</text>
  <circle cx="870" cy="365" r="8" fill="#22c55e"/>
  <text x="870" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">T4 processed (+50ms)</text>

  <!-- Total lag annotation -->
  <rect x="40" y="410" width="880" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="480" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">End-to-End CDC Lag = Connector Read + Broker Commit + Consumer Process</text>
  <text x="480" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Typical range: 50ms-5s. Monitor at each stage. Alert when consumer lag exceeds SLA threshold.</text>
</svg>