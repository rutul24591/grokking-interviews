<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">CDC Failure Modes and Recovery Patterns</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Schema changes, connector crashes, log truncation, and duplicate events require specific mitigation strategies</text>

  <!-- Failure Mode 1 -->
  <rect x="30" y="80" width="280" height="110" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="170" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">1. Source Schema Change</text>
  <text x="170" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Column added, removed, or type</text>
  <text x="170" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">changed. Connector may fail or</text>
  <text x="170" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">emit events with changed schema.</text>
  <rect x="50" y="168" width="240" height="18" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Mitigate: schema registry, compatibility mode</text>

  <!-- Failure Mode 2 -->
  <rect x="340" y="80" width="280" height="110" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9a3412">2. Connector Crash / Restart</text>
  <text x="480" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">Connector restarts from last</text>
  <text x="480" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">committed offset. May re-process</text>
  <text x="480" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">events, causing downstream dupes.</text>
  <rect x="360" y="168" width="240" height="18" rx="3" fill="#ffedd5" stroke="#fed7aa" stroke-width="1"/>
  <text x="480" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9a3412">Mitigate: idempotent consumers, dedup keys</text>

  <!-- Failure Mode 3 -->
  <rect x="650" y="80" width="280" height="110" rx="8" fill="#fefce8" stroke="#fef08a" stroke-width="1.5"/>
  <text x="790" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#854d0e">3. Transaction Log Truncation</text>
  <text x="790" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">Database purges WAL/binlog before</text>
  <text x="790" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">connector reads it. Connector cannot</text>
  <text x="790" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">catch up — must do full snapshot.</text>
  <rect x="670" y="168" width="240" height="18" rx="3" fill="#fef9c3" stroke="#fef08a" stroke-width="1"/>
  <text x="790" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#854d0e">Mitigate: monitor lag, increase log retention</text>

  <!-- Recovery patterns -->
  <rect x="30" y="220" width="440" height="190" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="250" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0369a1">Snapshot + Streaming Recovery</text>

  <rect x="50" y="265" width="400" height="40" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Phase 1: Take consistent snapshot of source tables</text>
  <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Read entire table state at a single point in time</text>

  <rect x="50" y="313" width="400" height="40" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Phase 2: Stream changes from snapshot LSN onward</text>
  <text x="250" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Switch from snapshot to streaming at the exact LSN</text>

  <rect x="50" y="361" width="400" height="40" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Phase 3: Deduplicate snapshot vs streaming overlap</text>
  <text x="250" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Use transaction ID and LSN to resolve duplicates</text>

  <!-- Operational monitoring -->
  <rect x="500" y="220" width="430" height="190" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="715" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">CDC Health Monitoring</text>

  <rect x="520" y="265" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Connector lag: current LSN vs database head LSN</text>

  <rect x="520" y="301" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Consumer lag: committed offset vs latest topic offset</text>

  <rect x="520" y="337" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Error rate: connector exceptions per minute</text>

  <rect x="520" y="373" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Schema changes: alert on incompatible schema evolution</text>
</svg>