<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Skew and Hot Key Mitigation Strategies</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">One key dominates data volume, creating tail latency and instability</text>

  <!-- Left: Skew problem -->
  <text x="160" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Without Mitigation</text>

  <rect x="40" y="110" width="100" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="90" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Worker 1</text>
  <text x="90" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">10K records</text>

  <rect x="40" y="175" width="100" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="90" y="197" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Worker 2</text>
  <text x="90" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">8K records</text>

  <rect x="40" y="240" width="100" height="50" rx="6" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
  <text x="90" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Worker 3</text>
  <text x="90" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fecaca">500K records</text>

  <rect x="40" y="305" width="100" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="90" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Worker 4</text>
  <text x="90" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">12K records</text>

  <!-- Hot key label -->
  <rect x="160" y="240" width="140" height="50" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="230" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">HOT KEY</text>
  <text x="230" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">tenant=enterprise_x</text>
  <line x1="140" y1="265" x2="160" y2="265" stroke="#dc2626" stroke-width="2"/>
  <polygon points="160,262 168,265 160,268" fill="#dc2626"/>

  <!-- Arrow -->
  <text x="370" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">&#x2192;</text>

  <!-- Right: With salted key -->
  <text x="640" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">With Key Salting</text>

  <rect x="440" y="110" width="100" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="490" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">W1: x_0</text>
  <text x="490" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">85K records</text>

  <rect x="560" y="110" width="100" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">W2: x_1</text>
  <text x="610" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">82K records</text>

  <rect x="680" y="110" width="100" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="730" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">W3: x_2</text>
  <text x="730" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">78K records</text>

  <rect x="440" y="170" width="100" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="490" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">W4: x_3</text>
  <text x="490" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">90K records</text>

  <rect x="560" y="170" width="100" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">W5: x_4</text>
  <text x="610" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">88K records</text>

  <rect x="680" y="170" width="100" height="45" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="730" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">W6: x_5</text>
  <text x="730" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">77K records</text>

  <!-- Secondary merge -->
  <rect x="540" y="250" width="200" height="55" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="640" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3730a3">Secondary Merge</text>
  <text x="640" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Recombine salted partials</text>

  <!-- Arrows from salted workers to merge -->
  <line x1="490" y1="215" x2="490" y2="250" stroke="#64748b" stroke-width="1.5"/>
  <line x1="610" y1="215" x2="610" y2="250" stroke="#64748b" stroke-width="1.5"/>
  <line x1="730" y1="215" x2="730" y2="250" stroke="#64748b" stroke-width="1.5"/>
  <line x1="490" y1="250" x2="540" y2="275" stroke="#64748b" stroke-width="1"/>
  <line x1="610" y1="250" x2="610" y2="275" stroke="#64748b" stroke-width="1"/>
  <line x1="730" y1="250" x2="680" y2="275" stroke="#64748b" stroke-width="1"/>

  <!-- Bottom comparison -->
  <rect x="40" y="360" width="420" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">Without Salting: One worker handles 95% of data</text>
  <text x="250" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Result: Tail latency 50x, job stalls, OOM risk</text>

  <rect x="500" y="360" width="420" height="60" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="710" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">With Salting: Load distributed across 6 workers</text>
  <text x="710" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Result: Balanced load, predictable latency, safe merge</text>
</svg>