<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Aggregation Implementation</title>
  <desc id="desc">Aggregation implementation: windowed aggregations, materialized views, and query optimization</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Aggregation Implementation</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Windowed aggregations, materialized views, and query optimization</text>
  
  <!-- Windowed Aggregations -->
  <rect x="30" y="85" width="280" height="240" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Windowed Aggregations</text>
  
  <rect x="50" y="125" width="240" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="150" text-anchor="middle" font-size="10" fill="#64748b">Aggregate over time windows</text>
  <text x="170" y="170" text-anchor="middle" font-size="10" fill="#64748b">Tumbling, hopping, session</text>
  <text x="170" y="190" text-anchor="middle" font-size="10" fill="#64748b">Emit results on window close</text>
  <text x="170" y="210" text-anchor="middle" font-size="10" fill="#64748b">Handle late data</text>
  
  <rect x="50" y="235" width="240" height="80" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="260" text-anchor="middle" font-size="9" fill="#1e40af">Tumbling: [00:00-00:05), [00:05-00:10)</text>
  <text x="170" y="280" text-anchor="middle" font-size="9" fill="#1e40af">Hopping: 5min window, 1min hop</text>
  <text x="170" y="295" text-anchor="middle" font-size="9" fill="#1e40af">Session: Gap-based (30min timeout)</text>
  <text x="170" y="310" text-anchor="middle" font-size="9" fill="#64748b">Use: Real-time metrics</text>
  
  <!-- Materialized Views -->
  <rect x="325" y="85" width="280" height="240" rx="8" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="465" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Materialized Views</text>
  
  <rect x="345" y="125" width="240" height="100" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="465" y="150" text-anchor="middle" font-size="10" fill="#64748b">Pre-computed aggregate tables</text>
  <text x="465" y="170" text-anchor="middle" font-size="10" fill="#64748b">Refreshed on schedule or CDC</text>
  <text x="465" y="190" text-anchor="middle" font-size="10" fill="#64748b">Query reads from MV, not base</text>
  <text x="465" y="210" text-anchor="middle" font-size="10" fill="#64748b">Trade storage for compute</text>
  
  <rect x="345" y="235" width="240" height="80" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="465" y="260" text-anchor="middle" font-size="9" fill="#64748b">CREATE MATERIALIZED VIEW daily_sales AS</text>
  <text x="465" y="275" text-anchor="middle" font-size="9" fill="#64748b">SELECT date, SUM(amount) FROM orders</text>
  <text x="465" y="290" text-anchor="middle" font-size="9" fill="#64748b">GROUP BY date</text>
  <text x="465" y="305" text-anchor="middle" font-size="9" fill="#64748b">REFRESH: incremental or complete</text>
  
  <!-- Query Optimization -->
  <rect x="620" y="85" width="250" height="240" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Query Optimization</text>
  
  <rect x="640" y="125" width="210" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="745" y="150" text-anchor="middle" font-size="10" fill="#64748b">Push down aggregations</text>
  <text x="745" y="170" text-anchor="middle" font-size="10" fill="#64748b">Combine before shuffle</text>
  <text x="745" y="190" text-anchor="middle" font-size="10" fill="#64748b">Use appropriate indexes</text>
  <text x="745" y="210" text-anchor="middle" font-size="10" fill="#64748b">Partition pruning</text>
  
  <rect x="640" y="235" width="210" height="80" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="745" y="260" text-anchor="middle" font-size="9" fill="#b45309">Before: Full scan → Aggregate</text>
  <text x="745" y="280" text-anchor="middle" font-size="9" fill="#10b981">After: Index scan → Partial agg → Merge</text>
  <text x="745" y="295" text-anchor="middle" font-size="9" fill="#10b981">10-100x speedup</text>
  <text x="745" y="310" text-anchor="middle" font-size="9" fill="#64748b">Use: Query engines, OLAP</text>
  
  <!-- Aggregation Patterns -->
  <rect x="30" y="340" width="400" height="190" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="230" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Aggregation Patterns</text>
  
  <rect x="50" y="380" width="360" height="140" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <text x="70" y="405" text-anchor="start" font-size="9" fill="#64748b">Map-Side Combine:</text>
  <text x="200" y="405" text-anchor="start" font-size="9" fill="#10b981">Pre-aggregate before shuffle</text>
  
  <text x="70" y="425" text-anchor="start" font-size="9" fill="#64748b">Two-Phase Aggregation:</text>
  <text x="230" y="425" text-anchor="start" font-size="9" fill="#10b981">Local + Global reduce</text>
  
  <text x="70" y="445" text-anchor="start" font-size="9" fill="#64748b">Incremental Update:</text>
  <text x="210" y="445" text-anchor="start" font-size="9" fill="#10b981">Update existing aggregates</text>
  
  <text x="70" y="465" text-anchor="start" font-size="9" fill="#64748b">Approximate Aggregation:</text>
  <text x="240" y="465" text-anchor="start" font-size="9" fill="#f59e0b">HLL, t-digest for scale</text>
  
  <text x="70" y="485" text-anchor="start" font-size="9" fill="#64748b">Hierarchical Aggregation:</text>
  <text x="240" y="485" text-anchor="start" font-size="9" fill="#10b981">Rollup by time/geo</text>
  
  <text x="70" y="510" text-anchor="start" font-size="9" fill="#b91c1c">Pattern selection depends on:</text>
  <text x="250" y="510" text-anchor="start" font-size="9" fill="#64748b">accuracy needs, scale, latency</text>
  
  <!-- Storage Strategies -->
  <rect x="450" y="340" width="420" height="190" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="660" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">Storage Strategies</text>
  
  <rect x="470" y="380" width="380" height="140" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  
  <text x="490" y="405" text-anchor="start" font-size="9" fill="#64748b">Choose storage based on access pattern:</text>
  
  <text x="510" y="425" text-anchor="start" font-size="9" fill="#4338ca">Time-series DB:</text>
  <text x="640" y="425" text-anchor="start" font-size="9" fill="#64748b">InfluxDB, Timescale (time-based)</text>
  
  <text x="510" y="445" text-anchor="start" font-size="9" fill="#4338ca">Columnar store:</text>
  <text x="640" y="445" text-anchor="start" font-size="9" fill="#64748b">Parquet, ORC (analytics)</text>
  
  <text x="510" y="465" text-anchor="start" font-size="9" fill="#4338ca">Key-value store:</text>
  <text x="640" y="465" text-anchor="start" font-size="9" fill="#64748b">Redis (low latency lookup)</text>
  
  <text x="510" y="485" text-anchor="start" font-size="9" fill="#4338ca">Search engine:</text>
  <text x="640" y="485" text-anchor="start" font-size="9" fill="#64748b">Elasticsearch (faceted agg)</text>
  
  <text x="510" y="510" text-anchor="start" font-size="9" fill="#10b981">Match storage to query pattern!</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
