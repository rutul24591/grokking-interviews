<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Pipeline Orchestration DAG: Dependencies and Execution</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Tasks execute in dependency order: a task runs only when all upstream tasks have succeeded</text>

  <!-- DAG nodes -->
  <rect x="380" y="80" width="200" height="55" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">ingest_raw_data</text>
  <text x="480" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Extract from source systems</text>

  <line x1="430" y1="135" x2="200" y2="180" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="200,177 192,182 204,183" fill="#64748b"/>
  <line x1="530" y1="135" x2="760" y2="180" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="760,177 752,182 764,183" fill="#64748b"/>

  <rect x="80" y="185" width="240" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">validate_schema</text>
  <text x="200" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Check schema, data quality</text>

  <rect x="640" y="185" width="240" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="760" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">deduplicate</text>
  <text x="760" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Remove duplicate records</text>

  <line x1="200" y1="240" x2="320" y2="285" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="320,282 312,287 324,288" fill="#64748b"/>
  <line x1="760" y1="240" x2="640" y2="285" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="640,282 632,287 644,288" fill="#64748b"/>

  <rect x="200" y="290" width="240" height="55" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="320" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3730a3">transform_join</text>
  <text x="320" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Join, enrich, compute metrics</text>

  <rect x="520" y="290" width="240" height="55" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="640" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3730a3">aggregate</text>
  <text x="640" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Group by, summarize</text>

  <line x1="320" y1="345" x2="440" y2="390" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="440,387 432,392 444,393" fill="#64748b"/>
  <line x1="640" y1="345" x2="520" y2="390" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="520,387 512,392 524,393" fill="#64748b"/>

  <rect x="380" y="395" width="200" height="55" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="480" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">write_output</text>
  <text x="480" y="437" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Atomic swap to production</text>

  <!-- Legend -->
  <rect x="30" y="80" width="140" height="80" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="100" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Legend</text>
  <text x="40" y="120" font-family="Arial, sans-serif" font-size="8" fill="#334155">&#x25cf; Extract</text>
  <text x="40" y="135" font-family="Arial, sans-serif" font-size="8" fill="#334155">&#x25cf; Validate</text>
  <text x="40" y="150" font-family="Arial, sans-serif" font-size="8" fill="#334155">&#x25cf; Transform</text>
  <text x="40" y="165" font-family="Arial, sans-serif" font-size="8" fill="#334155">&#x25cf; Output</text>

  <!-- Retry info -->
  <rect x="30" y="395" width="140" height="55" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="100" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Retry Policy</text>
  <text x="100" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#334155">3 retries, exponential</text>
  <text x="100" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#334155">backoff, alert on fail</text>
</svg>