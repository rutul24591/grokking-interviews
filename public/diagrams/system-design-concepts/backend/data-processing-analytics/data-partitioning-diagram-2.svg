<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Data Skew and Hot Partition Problem</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Uneven key distribution creates hot partitions that bottleneck the entire system</text>

  <!-- Skewed distribution -->
  <text x="160" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Skewed Key Distribution</text>

  <rect x="40" y="105" width="240" height="25" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="55" y="123" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Partition 0 (key=user_1): 80% of data</text>
  <rect x="40" y="105" width="192" height="25" rx="4" fill="#fca5a5" stroke="#fca5a5" stroke-width="0"/>

  <rect x="40" y="135" width="240" height="25" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="55" y="153" font-family="Arial, sans-serif" font-size="9" fill="#9a3412">Partition 1 (key=user_2): 10% of data</text>
  <rect x="40" y="135" width="24" height="25" rx="4" fill="#fed7aa" stroke="#fed7aa" stroke-width="0"/>

  <rect x="40" y="165" width="240" height="25" rx="4" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
  <text x="55" y="183" font-family="Arial, sans-serif" font-size="9" fill="#854d0e">Partition 2 (key=user_3):  6% of data</text>
  <rect x="40" y="165" width="14" height="25" rx="4" fill="#fef08a" stroke="#fef08a" stroke-width="0"/>

  <rect x="40" y="195" width="240" height="25" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="55" y="213" font-family="Arial, sans-serif" font-size="9" fill="#166534">Partition 3 (key=user_4):  4% of data</text>
  <rect x="40" y="195" width="10" height="25" rx="4" fill="#86efac" stroke="#86efac" stroke-width="0"/>

  <!-- Impact -->
  <rect x="310" y="105" width="250" height="115" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="435" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Impact on Processing</text>
  <text x="435" y="152" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Partition 0 becomes bottleneck</text>
  <text x="435" y="170" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Other partitions idle, waiting</text>
  <text x="435" y="188" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Overall throughput = slowest partition</text>
  <text x="435" y="206" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Storage uneven, may fill one disk</text>

  <!-- Mitigation: Salting -->
  <rect x="310" y="240" width="620" height="170" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="620" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0369a1">Mitigation: Key Salting</text>

  <rect x="330" y="285" width="580" height="35" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="620" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Step 1: Append random suffix to hot key</text>
  <text x="620" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">user_1 becomes user_1_0, user_1_1, ..., user_1_N</text>

  <rect x="330" y="326" width="580" height="35" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="620" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Step 2: Records distribute across partitions</text>
  <text x="620" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Each salted key hashes to a different partition</text>

  <rect x="330" y="367" width="580" height="35" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="620" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Step 3: Aggregate salted partitions, then combine</text>
  <text x="620" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Sum/merge partial results for user_1 across all salts</text>

  <!-- Before/After comparison -->
  <rect x="30" y="240" width="260" height="80" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="160" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Before: 80/10/6/4 split</text>
  <text x="160" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f1d1d">One partition dominates</text>
  <text x="160" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f1d1d">Processing bottlenecked</text>

  <rect x="30" y="330" width="260" height="80" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="160" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">After: ~25/25/25/25 split</text>
  <text x="160" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#15803d">Data evenly distributed</text>
  <text x="160" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#15803d">All partitions utilized</text>
</svg>