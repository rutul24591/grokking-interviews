<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Data Partitioning Rebalancing</title>
  <desc id="desc">Partition rebalancing strategies: consistent hashing, virtual nodes, and dynamic scaling</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Data Partitioning: Rebalancing &amp; Scaling</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Consistent hashing, virtual nodes, and dynamic scaling strategies</text>
  
  <!-- Consistent Hashing Ring -->
  <rect x="30" y="85" width="280" height="280" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Consistent Hashing Ring</text>
  
  <!-- Hash Ring -->
  <circle cx="170" cy="220" r="100" fill="none" stroke="#60a5fa" stroke-width="3" stroke-dasharray="5,5"/>
  
  <!-- Nodes on ring -->
  <circle cx="170" cy="120" r="12" fill="#1e40af"/>
  <text x="170" y="125" text-anchor="middle" font-size="9" fill="white">N1</text>
  
  <circle cx="250" cy="180" r="12" fill="#1e40af"/>
  <text x="250" y="185" text-anchor="middle" font-size="9" fill="white">N2</text>
  
  <circle cx="220" cy="280" r="12" fill="#1e40af"/>
  <text x="220" y="285" text-anchor="middle" font-size="9" fill="white">N3</text>
  
  <circle cx="100" cy="260" r="12" fill="#1e40af"/>
  <text x="100" y="265" text-anchor="middle" font-size="9" fill="white">N4</text>
  
  <!-- Keys on ring -->
  <circle cx="200" cy="140" r="8" fill="#10b981"/>
  <text x="200" y="145" text-anchor="middle" font-size="7" fill="white">K1</text>
  <path d="M 200 148 L 250 180" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3"/>
  
  <circle cx="140" cy="160" r="8" fill="#10b981"/>
  <text x="140" y="165" text-anchor="middle" font-size="7" fill="white">K2</text>
  <path d="M 140 168 L 170 120" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3"/>
  
  <text x="170" y="350" text-anchor="middle" font-size="9" fill="#eff6ff">Key → clockwise to node</text>
  <text x="170" y="365" text-anchor="middle" font-size="9" fill="#10b981">✓ Minimal movement on add/remove</text>
  
  <!-- Virtual Nodes -->
  <rect x="325" y="85" width="280" height="280" rx="8" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="465" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Virtual Nodes (Vnodes)</text>
  
  <rect x="345" y="125" width="240" height="80" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="465" y="150" text-anchor="middle" font-size="10" fill="#64748b">Each physical node = many vnodes</text>
  <text x="465" y="170" text-anchor="middle" font-size="10" fill="#64748b">N1 → v1, v5, v9, v13...</text>
  <text x="465" y="190" text-anchor="middle" font-size="10" fill="#64748b">Better distribution</text>
  <text x="465" y="210" text-anchor="middle" font-size="10" fill="#64748b">Faster rebalancing</text>
  
  <!-- Vnode Visualization -->
  <rect x="345" y="215" width="240" height="140" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  
  <rect x="365" y="235" width="200" height="20" rx="2" fill="#a78bfa"/>
  <text x="465" y="249" text-anchor="middle" font-size="8" fill="white">v1(N1) | v2(N2) | v3(N3) | v4(N4)</text>
  
  <rect x="365" y="260" width="200" height="20" rx="2" fill="#8b5cf6"/>
  <text x="465" y="274" text-anchor="middle" font-size="8" fill="white">v5(N1) | v6(N2) | v7(N3) | v8(N4)</text>
  
  <rect x="365" y="285" width="200" height="20" rx="2" fill="#7c3aed"/>
  <text x="465" y="299" text-anchor="middle" font-size="8" fill="white">v9(N1) | v10(N2) | v11(N3) | v12(N4)</text>
  
  <rect x="365" y="310" width="200" height="20" rx="2" fill="#6d28d9"/>
  <text x="465" y="324" text-anchor="middle" font-size="8" fill="white">v13(N1) | v14(N2) | v15(N3) | v16(N4)</text>
  
  <text x="465" y="345" text-anchor="middle" font-size="9" fill="#10b981">✓ Even distribution</text>
  <text x="465" y="360" text-anchor="middle" font-size="9" fill="#10b981">✓ Heterogeneous hardware</text>
  
  <!-- Scaling Out -->
  <rect x="620" y="85" width="250" height="180" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Scaling Out (Add Node)</text>
  
  <rect x="640" y="125" width="210" height="130" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="745" y="150" text-anchor="middle" font-size="10" fill="#64748b">1. New node joins ring</text>
  <text x="745" y="170" text-anchor="middle" font-size="10" fill="#64748b">2. Takes over key ranges</text>
  <text x="745" y="190" text-anchor="middle" font-size="10" fill="#64748b">3. Data migrates from neighbors</text>
  <text x="745" y="210" text-anchor="middle" font-size="10" fill="#64748b">4. Only affected keys move</text>
  <text x="745" y="235" text-anchor="middle" font-size="10" fill="#b45309">With vnodes: ~1/N of data moves</text>
  
  <!-- Scaling In -->
  <rect x="620" y="280" width="250" height="180" rx="8" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
  <text x="745" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Scaling In (Remove Node)</text>
  
  <rect x="640" y="320" width="210" height="130" rx="4" fill="#ecfdf5" stroke="#06b6d4" stroke-width="1"/>
  <text x="745" y="345" text-anchor="middle" font-size="10" fill="#64748b">1. Node marked for removal</text>
  <text x="745" y="365" text-anchor="middle" font-size="10" fill="#64748b">2. Data replicated to neighbors</text>
  <text x="745" y="385" text-anchor="middle" font-size="10" fill="#64748b">3. Traffic redirected</text>
  <text x="745" y="405" text-anchor="middle" font-size="10" fill="#64748b">4. Node decommissioned</text>
  <text x="745" y="430" text-anchor="middle" font-size="10" fill="#0e7490">Graceful: no data loss</text>
  
  <!-- Rebalancing Strategies -->
  <rect x="30" y="380" width="280" height="150" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="170" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Rebalancing Strategies</text>
  
  <rect x="50" y="420" width="240" height="100" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="445" text-anchor="middle" font-size="10" fill="#64748b">Gradual: stream data over time</text>
  <text x="170" y="465" text-anchor="middle" font-size="10" fill="#64748b">Batch: copy then switch</text>
  <text x="170" y="485" text-anchor="middle" font-size="10" fill="#64748b">Dual-write: during transition</text>
  <text x="170" y="505" text-anchor="middle" font-size="10" fill="#64748b">Throttle: limit bandwidth</text>
  
  <!-- Hot Spot Prevention -->
  <rect x="325" y="380" width="280" height="150" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="465" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">Hot Spot Prevention</text>
  
  <rect x="345" y="420" width="240" height="100" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="465" y="445" text-anchor="middle" font-size="10" fill="#64748b">Salting: add random prefix</text>
  <text x="465" y="465" text-anchor="middle" font-size="10" fill="#64748b">Pre-split: create partitions early</text>
  <text x="465" y="485" text-anchor="middle" font-size="10" fill="#64748b">Monitor: detect skew early</text>
  <text x="465" y="505" text-anchor="middle" font-size="10" fill="#64748b">Auto-split: divide hot partitions</text>
  
  <!-- Partition Count Guidelines -->
  <rect x="620" y="475" width="250" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="745" y="495" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">Partition Count Guidelines</text>
  <text x="745" y="515" text-anchor="middle" font-size="9" fill="#64748b">10-100 partitions per node | Size: 10GB-100GB each</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
