<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Compression Failure Modes</title>
  <desc id="desc">Compression failure modes: CPU spikes, corruption, and compression ratio issues</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Compression Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">CPU spikes, corruption, and compression ratio issues</text>
  
  <!-- CPU Spikes -->
  <rect x="30" y="85" width="280" height="210" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">CPU Spikes from Compression</text>
  
  <rect x="50" y="125" width="240" height="150" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="155" text-anchor="middle" font-size="10" fill="#64748b">High compression levels or</text>
  <text x="170" y="175" text-anchor="middle" font-size="10" fill="#64748b">large data volumes cause CPU</text>
  <text x="170" y="190" text-anchor="middle" font-size="10" fill="#64748b">saturation</text>
  <text x="170" y="215" text-anchor="middle" font-size="10" fill="#b91c1c">Signal:</text>
  <text x="210" y="215" text-anchor="middle" font-size="10" fill="#64748b">CPU at 100% during compress,</text>
  <text x="170" y="235" text-anchor="middle" font-size="10" fill="#64748b">latency spikes correlate with</text>
  <text x="170" y="250" text-anchor="middle" font-size="10" fill="#64748b">compression operations</text>
  <text x="170" y="270" text-anchor="middle" font-size="10" fill="#b91c1c">Mitigation:</text>
  <text x="220" y="270" text-anchor="middle" font-size="10" fill="#64748b">Use faster algorithm (LZ4),</text>
  <text x="170" y="290" text-anchor="middle" font-size="10" fill="#64748b">lower compression level, parallel</text>
  
  <!-- Data Corruption -->
  <rect x="325" y="85" width="280" height="210" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="465" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Data Corruption</text>
  
  <rect x="345" y="125" width="240" height="150" rx="4" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="465" y="155" text-anchor="middle" font-size="10" fill="#64748b">Bit rot, incomplete writes, or</text>
  <text x="465" y="175" text-anchor="middle" font-size="10" fill="#64748b">transmission errors corrupt</text>
  <text x="465" y="190" text-anchor="middle" font-size="10" fill="#64748b">compressed data</text>
  <text x="465" y="215" text-anchor="middle" font-size="10" fill="#b45309">Signal:</text>
  <text x="505" y="215" text-anchor="middle" font-size="10" fill="#64748b">Checksum failures, decompression</text>
  <text x="465" y="235" text-anchor="middle" font-size="10" fill="#64748b">errors, CRC mismatches</text>
  <text x="465" y="255" text-anchor="middle" font-size="10" fill="#b45309">Mitigation:</text>
  <text x="515" y="255" text-anchor="middle" font-size="10" fill="#64748b">Checksums (CRC32), replication,</text>
  <text x="465" y="275" text-anchor="middle" font-size="10" fill="#64748b">verify after write, parity</text>
  
  <!-- Compression Amplification -->
  <rect x="620" y="85" width="250" height="210" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">Compression Amplification</text>
  
  <rect x="640" y="125" width="210" height="150" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="745" y="155" text-anchor="middle" font-size="10" fill="#64748b">Already-compressed data</text>
  <text x="745" y="175" text-anchor="middle" font-size="10" fill="#64748b">(images, video) gets larger</text>
  <text x="745" y="190" text-anchor="middle" font-size="10" fill="#64748b">when compressed again</text>
  <text x="745" y="215" text-anchor="middle" font-size="10" fill="#4338ca">Signal:</text>
  <text x="785" y="215" text-anchor="middle" font-size="10" fill="#64748b">Compressed size > original,</text>
  <text x="745" y="235" text-anchor="middle" font-size="10" fill="#64748b">negative compression ratio</text>
  <text x="745" y="255" text-anchor="middle" font-size="10" fill="#4338ca">Mitigation:</text>
  <text x="795" y="255" text-anchor="middle" font-size="10" fill="#64748b">Detect pre-compressed data,</text>
  <text x="745" y="275" text-anchor="middle" font-size="10" fill="#64748b">skip compression, passthrough</text>
  
  <!-- Memory Pressure -->
  <rect x="30" y="310" width="280" height="210" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="170" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Memory Pressure</text>
  
  <rect x="50" y="350" width="240" height="150" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="170" y="380" text-anchor="middle" font-size="10" fill="#64748b">Compression buffers and</text>
  <text x="170" y="395" text-anchor="middle" font-size="10" fill="#64748b">dictionaries consume memory,</text>
  <text x="170" y="410" text-anchor="middle" font-size="10" fill="#64748b">causing OOM</text>
  <text x="170" y="435" text-anchor="middle" font-size="10" fill="#1e293b">Signal:</text>
  <text x="210" y="435" text-anchor="middle" font-size="10" fill="#64748b">GC pressure, OOM errors,</text>
  <text x="170" y="450" text-anchor="middle" font-size="10" fill="#64748b">memory usage spikes during</text>
  <text x="170" y="465" text-anchor="middle" font-size="10" fill="#64748b">compression operations</text>
  <text x="170" y="485" text-anchor="middle" font-size="10" fill="#1e293b">Mitigation:</text>
  <text x="220" y="485" text-anchor="middle" font-size="10" fill="#64748b">Stream compression, limit</text>
  <text x="170" y="500" text-anchor="middle" font-size="10" fill="#64748b">buffer sizes, chunk large data</text>
  
  <!-- Dictionary Blowup -->
  <rect x="325" y="310" width="280" height="210" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="465" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">Dictionary Blowup</text>
  
  <rect x="345" y="350" width="240" height="150" rx="4" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1"/>
  <text x="465" y="380" text-anchor="middle" font-size="10" fill="#64748b">High cardinality columns cause</text>
  <text x="465" y="395" text-anchor="middle" font-size="10" fill="#64748b">dictionary encoding to use</text>
  <text x="465" y="410" text-anchor="middle" font-size="10" fill="#64748b">more space than raw data</text>
  <text x="465" y="435" text-anchor="middle" font-size="10" fill="#047857">Signal:</text>
  <text x="505" y="435" text-anchor="middle" font-size="10" fill="#64748b">Dictionary size exceeds column</text>
  <text x="465" y="450" text-anchor="middle" font-size="10" fill="#64748b">data size, cardinality warnings</text>
  <text x="465" y="470" text-anchor="middle" font-size="10" fill="#047857">Mitigation:</text>
  <text x="515" y="470" text-anchor="middle" font-size="10" fill="#64748b">Cardinality threshold, fallback</text>
  <text x="465" y="490" text-anchor="middle" font-size="10" fill="#64748b">to raw encoding, sample data</text>
  
  <!-- Incompatible Compression -->
  <rect x="620" y="310" width="250" height="210" rx="8" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/>
  <text x="745" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#c2410c">Incompatible Compression</text>
  
  <rect x="640" y="350" width="210" height="150" rx="4" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="745" y="380" text-anchor="middle" font-size="10" fill="#64748b">Reader doesn't support the</text>
  <text x="745" y="395" text-anchor="middle" font-size="10" fill="#64748b">compression codec used by</text>
  <text x="745" y="410" text-anchor="middle" font-size="10" fill="#64748b">writer</text>
  <text x="745" y="435" text-anchor="middle" font-size="10" fill="#c2410c">Signal:</text>
  <text x="785" y="435" text-anchor="middle" font-size="10" fill="#64748b">"Unknown codec" errors, version</text>
  <text x="745" y="450" text-anchor="middle" font-size="10" fill="#64748b">mismatch in metadata</text>
  <text x="745" y="470" text-anchor="middle" font-size="10" fill="#c2410c">Mitigation:</text>
  <text x="795" y="470" text-anchor="middle" font-size="10" fill="#64748b">Negotiate codec, embed codec</text>
  <text x="745" y="490" text-anchor="middle" font-size="10" fill="#64748b">in metadata, use common codecs</text>
  
  <!-- Best Practices -->
  <rect x="30" y="530" width="280" height="15" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="542" text-anchor="middle" font-size="8" fill="#b45309">Always verify compressed data with checksums</text>
  
  <rect x="325" y="530" width="280" height="15" rx="2" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="465" y="542" text-anchor="middle" font-size="8" fill="#4338ca">Monitor compression ratio for anomalies</text>
  
  <rect x="620" y="530" width="250" height="15" rx="2" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="745" y="542" text-anchor="middle" font-size="8" fill="#047857">Use streaming for large data</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
