<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Compression Failure Modes and Impact</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Common compression failures: wrong algorithm choice, CPU bottleneck, corrupted data, and incompatible readers</text>

  <!-- Failure Mode 1: CPU Bottleneck -->
  <rect x="30" y="80" width="280" height="110" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="170" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">1. CPU Bottleneck from High Compression</text>
  <text x="170" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Using maximum compression level</text>
  <text x="170" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">consumes all CPU, throttling</text>
  <text x="170" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">throughput and increasing latency.</text>
  <rect x="50" y="168" width="240" height="18" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Mitigate: benchmark, use moderate levels</text>

  <!-- Failure Mode 2: Incompatible Reader -->
  <rect x="340" y="80" width="280" height="110" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9a3412">2. Incompatible Reader / Writer</text>
  <text x="480" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">Data compressed with algorithm A</text>
  <text x="480" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">but reader only supports algorithm B.</text>
  <text x="480" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">Data unreadable until codec installed.</text>
  <rect x="360" y="168" width="240" height="18" rx="3" fill="#ffedd5" stroke="#fed7aa" stroke-width="1"/>
  <text x="480" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9a3412">Mitigate: store codec metadata, validate</text>

  <!-- Failure Mode 3: Corruption -->
  <rect x="650" y="80" width="280" height="110" rx="8" fill="#fefce8" stroke="#fef08a" stroke-width="1.5"/>
  <text x="790" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#854d0e">3. Silent Data Corruption</text>
  <text x="790" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">Bit flips in compressed data corrupt</text>
  <text x="790" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">the entire block on decompression,</text>
  <text x="790" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">not just the flipped byte.</text>
  <rect x="670" y="168" width="240" height="18" rx="3" fill="#fef9c3" stroke="#fef08a" stroke-width="1"/>
  <text x="790" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#854d0e">Mitigate: checksums per compressed block</text>

  <!-- Impact of wrong choice -->
  <rect x="30" y="220" width="440" height="190" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="250" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0369a1">Impact of Wrong Compression Choice</text>

  <rect x="50" y="265" width="400" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="250" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Too aggressive: CPU-bound job, pipeline stalls, SLA missed</text>

  <rect x="50" y="301" width="400" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="250" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Too light: storage cost explodes, network saturated, I/O bottleneck</text>

  <rect x="50" y="337" width="400" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="250" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Wrong type: random access impossible on block-compressed data</text>

  <rect x="50" y="373" width="400" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="250" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">No metadata: reader cannot determine codec, data becomes orphaned</text>

  <!-- Best practice checklist -->
  <rect x="500" y="220" width="430" height="190" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="715" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">Compression Best Practices</text>

  <rect x="520" y="265" width="390" height="24" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="715" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Benchmark with representative data before choosing algorithm</text>

  <rect x="520" y="295" width="390" height="24" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="715" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Use Zstd at level 3 as default — best ratio/speed balance</text>

  <rect x="520" y="325" width="390" height="24" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="715" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Store codec metadata alongside compressed data</text>

  <rect x="520" y="355" width="390" height="24" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="715" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Add checksums per block to detect silent corruption</text>

  <rect x="520" y="385" width="390" height="24" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="715" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Monitor CPU utilization and decompression latency in production</text>
</svg>