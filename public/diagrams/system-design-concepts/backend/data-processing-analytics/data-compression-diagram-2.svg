<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Compression Pipeline: When and Where to Compress</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Compression can be applied at multiple stages: in-memory, on-disk, on-network, and at rest</text>

  <!-- Raw data source -->
  <rect x="40" y="90" width="160" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Raw Data</text>
  <text x="120" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">JSON, CSV, Parquet</text>
  <text x="120" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">100 GB uncompressed</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrComp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="200" y1="130" x2="250" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrComp)"/>

  <!-- Compression decision -->
  <rect x="250" y="80" width="200" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="350" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Compression Decision</text>
  <text x="350" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Choose algorithm based on:</text>
  <text x="350" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">CPU budget, latency SLA,</text>
  <text x="350" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">storage cost, data type</text>

  <line x1="450" y1="130" x2="500" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrComp)"/>

  <!-- Compressed data -->
  <rect x="500" y="90" width="160" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="580" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">Compressed Data</text>
  <text x="580" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Zstd/Snappy/Gzip</text>
  <text x="580" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">~35 GB (3x ratio)</text>

  <line x1="660" y1="130" x2="710" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrComp)"/>

  <!-- Storage / Network -->
  <rect x="710" y="90" width="210" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="815" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3730a3">Storage / Network</text>
  <text x="815" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">S3, HDFS, Kafka, HTTP</text>
  <text x="815" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Reduced I/O and bandwidth</text>

  <!-- Decompression -->
  <line x1="815" y1="170" x2="815" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrComp)"/>
  <rect x="710" y="210" width="210" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="815" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Decompression</text>
  <text x="815" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">CPU cost on read path</text>
  <text x="815" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Must match compress algo</text>

  <line x1="710" y1="250" x2="500" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arrComp)"/>
  <rect x="500" y="210" width="160" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="580" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Raw Data</text>
  <text x="580" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">100 GB restored</text>
  <text x="580" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Lossless reconstruction</text>

  <!-- Cost trade-offs -->
  <rect x="40" y="210" width="430" height="200" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="255" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Compression Trade-offs</text>

  <rect x="60" y="260" width="400" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Higher compression ratio = more CPU time to compress and decompress</text>

  <rect x="60" y="296" width="400" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Network compression saves bandwidth but adds CPU on both ends</text>

  <rect x="60" y="332" width="400" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Storage compression saves disk cost but slows random access</text>

  <rect x="60" y="368" width="400" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Columnar formats + compression = best overall storage efficiency</text>
</svg>