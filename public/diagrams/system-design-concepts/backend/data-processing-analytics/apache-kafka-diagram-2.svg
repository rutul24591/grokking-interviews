<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Kafka Replication and Leader Election</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Each partition has a leader and followers; leader handles all reads and writes</text>

  <!-- Broker 1 -->
  <rect x="40" y="80" width="260" height="320" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="170" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Broker 1</text>

  <rect x="60" y="120" width="220" height="55" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="170" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Partition 0 — LEADER</text>
  <text x="170" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Handles all reads/writes for P0</text>

  <rect x="60" y="190" width="220" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="170" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Partition 1 — FOLLOWER</text>
  <text x="170" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Replicates from Broker 2</text>

  <rect x="60" y="260" width="220" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="170" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Partition 2 — FOLLOWER</text>
  <text x="170" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Replicates from Broker 3</text>

  <rect x="60" y="330" width="220" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="170" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3730a3">ISR: P0[1,2], P1[2], P2[3]</text>
  <text x="170" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">In-Sync Replicas list</text>

  <!-- Broker 2 -->
  <rect x="350" y="80" width="260" height="320" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Broker 2</text>

  <rect x="370" y="120" width="220" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Partition 0 — FOLLOWER</text>
  <text x="480" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Replicates from Broker 1</text>

  <rect x="370" y="190" width="220" height="55" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="480" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Partition 1 — LEADER</text>
  <text x="480" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Handles all reads/writes for P1</text>

  <rect x="370" y="260" width="220" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Partition 2 — FOLLOWER</text>
  <text x="480" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Replicates from Broker 3</text>

  <rect x="370" y="330" width="220" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="480" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3730a3">ISR: P0[1,2], P1[1,2], P2[3]</text>
  <text x="480" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">In-Sync Replicas list</text>

  <!-- Broker 3 -->
  <rect x="660" y="80" width="260" height="320" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="790" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Broker 3</text>

  <rect x="680" y="120" width="220" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="790" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Partition 0 — FOLLOWER</text>
  <text x="790" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Replicates from Broker 1</text>

  <rect x="680" y="190" width="220" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="790" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Partition 1 — FOLLOWER</text>
  <text x="790" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Replicates from Broker 2</text>

  <rect x="680" y="260" width="220" height="55" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="790" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Partition 2 — LEADER</text>
  <text x="790" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Handles all reads/writes for P2</text>

  <rect x="680" y="330" width="220" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="790" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3730a3">ISR: P0[1], P1[2], P2[1,3]</text>
  <text x="790" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">In-Sync Replicas list</text>

  <!-- Replication arrows -->
  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
  </defs>
</svg>