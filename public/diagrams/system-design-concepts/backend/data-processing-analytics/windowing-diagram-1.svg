<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Window Types: Tumbling, Sliding, Session, and Global Windows</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Different window types for different computation patterns — choosing the right window is critical for correctness</text>

  <!-- Tumbling Windows -->
  <rect x="30" y="80" width="430" height="120" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="245" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Tumbling Windows (Non-overlapping, Fixed-size)</text>

  <line x1="50" y1="130" x2="410" y2="130" stroke="#64748b" stroke-width="2"/>
  <rect x="50" y="118" width="80" height="24" rx="3" fill="#3b82f6" opacity="0.3"/>
  <text x="90" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:00-10:05</text>
  <rect x="130" y="118" width="80" height="24" rx="3" fill="#3b82f6" opacity="0.3"/>
  <text x="170" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:05-10:10</text>
  <rect x="210" y="118" width="80" height="24" rx="3" fill="#3b82f6" opacity="0.3"/>
  <text x="250" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:10-10:15</text>
  <rect x="290" y="118" width="80" height="24" rx="3" fill="#3b82f6" opacity="0.3"/>
  <text x="330" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:15-10:20</text>

  <text x="245" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Use: hourly/daily aggregations, non-overlapping time buckets</text>
  <text x="245" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Each event belongs to exactly one window</text>

  <!-- Sliding Windows -->
  <rect x="500" y="80" width="430" height="120" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="715" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Sliding Windows (Overlapping, Fixed-size + Slide)</text>

  <line x1="520" y1="130" x2="880" y2="130" stroke="#64748b" stroke-width="2"/>
  <rect x="520" y="118" width="120" height="24" rx="3" fill="#22c55e" opacity="0.3"/>
  <text x="580" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#166534">10:00-10:10</text>
  <rect x="560" y="142" width="120" height="24" rx="3" fill="#22c55e" opacity="0.3"/>
  <text x="620" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#166534">10:05-10:15</text>
  <rect x="600" y="118" width="120" height="24" rx="3" fill="#22c55e" opacity="0.3"/>
  <text x="660" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#166534">10:10-10:20</text>
  <rect x="640" y="142" width="120" height="24" rx="3" fill="#22c55e" opacity="0.3"/>
  <text x="700" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#166534">10:15-10:25</text>

  <text x="715" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Use: moving averages, trend analysis, overlapping time buckets</text>
  <text x="715" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Each event may belong to multiple windows</text>

  <!-- Session Windows -->
  <rect x="30" y="230" width="430" height="120" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="245" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Session Windows (Variable-size, Gap-based)</text>

  <line x1="50" y1="280" x2="410" y2="280" stroke="#64748b" stroke-width="2"/>
  <!-- Events -->
  <circle cx="80" cy="280" r="6" fill="#f59e0b"/>
  <circle cx="120" cy="280" r="6" fill="#f59e0b"/>
  <circle cx="160" cy="280" r="6" fill="#f59e0b"/>
  <circle cx="240" cy="280" r="6" fill="#f59e0b"/>
  <circle cx="320" cy="280" r="6" fill="#f59e0b"/>
  <circle cx="360" cy="280" r="6" fill="#f59e0b"/>
  <circle cx="390" cy="280" r="6" fill="#f59e0b"/>

  <!-- Session windows -->
  <rect x="60" y="265" width="120" height="30" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="120" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#92400e">Session 1</text>
  <rect x="220" y="265" width="40" height="30" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="240" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#92400e">Session 2</text>
  <rect x="300" y="265" width="110" height="30" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="355" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#92400e">Session 3</text>

  <text x="245" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Use: user sessions, activity bursts, variable-length groupings</text>
  <text x="245" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Window size depends on activity gap (e.g., 30 min of inactivity)</text>

  <!-- Global Windows -->
  <rect x="500" y="230" width="430" height="120" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="715" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Global Windows (Unbounded, No Time Bounds)</text>

  <line x1="520" y1="280" x2="880" y2="280" stroke="#64748b" stroke-width="2"/>
  <rect x="520" y="265" width="360" height="30" rx="4" fill="#6366f1" opacity="0.2"/>
  <text x="700" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3730a3">One window for all time</text>

  <circle cx="560" cy="280" r="6" fill="#6366f1"/>
  <circle cx="620" cy="280" r="6" fill="#6366f1"/>
  <circle cx="680" cy="280" r="6" fill="#6366f1"/>
  <circle cx="740" cy="280" r="6" fill="#6366f1"/>
  <circle cx="800" cy="280" r="6" fill="#6366f1"/>
  <circle cx="860" cy="280" r="6" fill="#6366f1"/>

  <text x="715" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Use: running totals, cumulative counts, all-time aggregations</text>
  <text x="715" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Requires trigger to emit results (e.g., every N events)</text>

  <!-- Selection guide -->
  <rect x="30" y="380" width="900" height="60" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Window Selection Guide</text>
  <text x="200" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Fixed buckets? → Tumbling</text>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Trends/moving avg? → Sliding</text>
  <text x="600" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Activity-based? → Session</text>
  <text x="780" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Cumulative? → Global</text>
</svg>