<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Data Aggregation Patterns</title>
  <desc id="desc">Data aggregation patterns: batch, streaming, and incremental aggregation strategies</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Data Aggregation Patterns</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Batch, streaming, and incremental aggregation strategies</text>
  
  <!-- Batch Aggregation -->
  <rect x="30" y="85" width="280" height="240" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Batch Aggregation</text>
  
  <rect x="50" y="125" width="240" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="150" text-anchor="middle" font-size="10" fill="#64748b">Process all data at once</text>
  <text x="170" y="170" text-anchor="middle" font-size="10" fill="#64748b">GROUP BY in SQL/Spark</text>
  <text x="170" y="190" text-anchor="middle" font-size="10" fill="#64748b">Scheduled execution (hourly/daily)</text>
  <text x="170" y="210" text-anchor="middle" font-size="10" fill="#64748b">Complete and accurate</text>
  
  <rect x="50" y="235" width="240" height="80" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="260" text-anchor="middle" font-size="10" fill="#10b981">✓ Accurate, complete</text>
  <text x="170" y="280" text-anchor="middle" font-size="10" fill="#10b981">✓ Easy to implement</text>
  <text x="170" y="300" text-anchor="middle" font-size="10" fill="#ef4444">✗ High latency</text>
  <text x="170" y="320" text-anchor="middle" font-size="10" fill="#64748b">Use: Daily reports, BI</text>
  
  <!-- Streaming Aggregation -->
  <rect x="325" y="85" width="280" height="240" rx="8" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="465" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Streaming Aggregation</text>
  
  <rect x="345" y="125" width="240" height="100" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="465" y="150" text-anchor="middle" font-size="10" fill="#64748b">Update aggregates incrementally</text>
  <text x="465" y="170" text-anchor="middle" font-size="10" fill="#64748b">Stateful operators maintain state</text>
  <text x="465" y="190" text-anchor="middle" font-size="10" fill="#64748b">Windowed or unbounded</text>
  <text x="465" y="210" text-anchor="middle" font-size="10" fill="#64748b">Low latency, approximate</text>
  
  <rect x="345" y="235" width="240" height="80" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="465" y="260" text-anchor="middle" font-size="10" fill="#10b981">✓ Low latency</text>
  <text x="465" y="280" text-anchor="middle" font-size="10" fill="#10b981">✓ Real-time insights</text>
  <text x="465" y="300" text-anchor="middle" font-size="10" fill="#f59e0b">⚠ State management</text>
  <text x="465" y="320" text-anchor="middle" font-size="10" fill="#64748b">Use: Dashboards, alerts</text>
  
  <!-- Incremental Aggregation -->
  <rect x="620" y="85" width="250" height="240" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Incremental Aggregation</text>
  
  <rect x="640" y="125" width="210" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="745" y="150" text-anchor="middle" font-size="10" fill="#64748b">Update existing aggregates</text>
  <text x="745" y="170" text-anchor="middle" font-size="10" fill="#64748b">with new data only</text>
  <text x="745" y="190" text-anchor="middle" font-size="10" fill="#64748b">Merge partial results</text>
  <text x="745" y="210" text-anchor="middle" font-size="10" fill="#64748b">Balance of batch + streaming</text>
  
  <rect x="640" y="235" width="210" height="100" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="745" y="260" text-anchor="middle" font-size="10" fill="#10b981">✓ Efficient updates</text>
  <text x="745" y="280" text-anchor="middle" font-size="10" fill="#10b981">✓ Scalable</text>
  <text x="745" y="300" text-anchor="middle" font-size="10" fill="#f59e0b">⚠ Complex merge logic</text>
  <text x="745" y="320" text-anchor="middle" font-size="10" fill="#64748b">Use: Materialized views</text>
  
  <!-- Aggregation Functions -->
  <rect x="30" y="340" width="400" height="190" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="230" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Common Aggregation Functions</text>
  
  <rect x="50" y="380" width="360" height="140" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <text x="70" y="405" text-anchor="start" font-size="9" fill="#64748b">Simple:</text>
  <text x="130" y="405" text-anchor="start" font-size="9" fill="#10b981">COUNT, SUM, AVG, MIN, MAX</text>
  
  <text x="70" y="425" text-anchor="start" font-size="9" fill="#64748b">Distinct:</text>
  <text x="140" y="425" text-anchor="start" font-size="9" fill="#10b981">COUNT(DISTINCT x), HLL</text>
  
  <text x="70" y="445" text-anchor="start" font-size="9" fill="#64748b">Percentile:</text>
  <text x="150" y="445" text-anchor="start" font-size="9" fill="#10b981">PERCENTILE, MEDIAN</text>
  
  <text x="70" y="465" text-anchor="start" font-size="9" fill="#64748b">Array:</text>
  <text x="130" y="465" text-anchor="start" font-size="9" fill="#10b981">COLLECT_LIST, COLLECT_SET</text>
  
  <text x="70" y="485" text-anchor="start" font-size="9" fill="#64748b">Windowed:</text>
  <text x="145" y="485" text-anchor="start" font-size="9" fill="#10b981">SUM OVER, running totals</text>
  
  <text x="70" y="510" text-anchor="start" font-size="9" fill="#b91c1c">Approximate for scale:</text>
  <text x="200" y="510" text-anchor="start" font-size="9" fill="#64748b">HLL, t-digest, sampling</text>
  
  <!-- Aggregation Strategies -->
  <rect x="450" y="340" width="420" height="190" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="660" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">Multi-Level Aggregation</text>
  
  <rect x="470" y="380" width="380" height="140" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  
  <text x="490" y="405" text-anchor="start" font-size="9" fill="#64748b">Distribute aggregation across layers:</text>
  
  <text x="510" y="425" text-anchor="start" font-size="9" fill="#4338ca">1. Edge/Producer:</text>
  <text x="650" y="425" text-anchor="start" font-size="9" fill="#64748b">Pre-aggregate locally</text>
  
  <text x="510" y="445" text-anchor="start" font-size="9" fill="#4338ca">2. Stream Processor:</text>
  <text x="650" y="445" text-anchor="start" font-size="9" fill="#64748b">Real-time partial aggregates</text>
  
  <text x="510" y="465" text-anchor="start" font-size="9" fill="#4338ca">3. Batch Layer:</text>
  <text x="650" y="465" text-anchor="start" font-size="9" fill="#64748b">Daily correction/accuracy</text>
  
  <text x="510" y="485" text-anchor="start" font-size="9" fill="#4338ca">4. Serving Layer:</text>
  <text x="650" y="485" text-anchor="start" font-size="9" fill="#64748b">Merge and serve</text>
  
  <text x="490" y="510" text-anchor="start" font-size="9" fill="#10b981">Benefit: Scale + accuracy</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
