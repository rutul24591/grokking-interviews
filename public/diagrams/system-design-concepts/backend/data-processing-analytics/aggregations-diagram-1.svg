<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Distributed Aggregation: Partial-Then-Merge Architecture</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Compute partials close to data, then merge into a final result to minimize shuffle</text>

  <!-- Source partitions -->
  <text x="120" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Source Partitions</text>

  <rect x="40" y="110" width="120" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Partition A</text>
  <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">1M events</text>

  <rect x="180" y="110" width="120" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="240" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Partition B</text>
  <text x="240" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">1M events</text>

  <rect x="320" y="110" width="120" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="380" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Partition C</text>
  <text x="380" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">1M events</text>

  <!-- Partial aggregation boxes -->
  <text x="600" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Partial Aggregation</text>

  <rect x="500" y="110" width="100" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="550" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Partial A</text>
  <text x="550" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">count=800K</text>

  <rect x="620" y="110" width="100" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="670" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Partial B</text>
  <text x="670" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">count=750K</text>

  <rect x="740" y="110" width="100" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="790" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Partial C</text>
  <text x="790" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">count=820K</text>

  <!-- Arrows: Source to Partial -->
  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="100" y1="170" x2="100" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="240" y1="170" x2="240" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="380" y1="170" x2="380" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="100" y1="220" x2="550" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="240" y1="220" x2="670" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="380" y1="220" x2="790" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>

  <!-- Final merge box -->
  <rect x="480" y="270" width="200" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="580" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">Final Merge</text>
  <text x="580" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">count = 2.37M (combined)</text>

  <!-- Arrows: Partial to Merge -->
  <line x1="550" y1="170" x2="550" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="670" y1="170" x2="620" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="790" y1="170" x2="640" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>

  <!-- Output -->
  <rect x="480" y="370" width="200" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="580" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Aggregated Result</text>

  <line x1="580" y1="340" x2="580" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr1)"/>

  <!-- Key insight callout -->
  <rect x="40" y="300" width="260" height="90" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="170" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">Key Insight</text>
  <text x="170" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Associative operations (SUM, COUNT)</text>
  <text x="170" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">enable partial-then-merge, reducing</text>
  <text x="170" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">network shuffle by orders of magnitude</text>
</svg>