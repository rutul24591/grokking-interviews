<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Message Ordering: Why Order Matters and How It Breaks</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Ordering guarantees depend on partitioning, network behavior, and consumer configuration</text>

  <!-- Ordered scenario -->
  <rect x="30" y="80" width="430" height="170" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="245" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">Ordered Within a Partition</text>

  <rect x="50" y="120" width="100" height="30" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="100" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Msg A (offset 0)</text>

  <rect x="160" y="120" width="100" height="30" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="210" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Msg B (offset 1)</text>

  <rect x="270" y="120" width="100" height="30" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="320" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Msg C (offset 2)</text>

  <rect x="380" y="120" width="60" height="30" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="410" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Msg D</text>

  <text x="245" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Consumer reads: A → B → C → D</text>
  <text x="245" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Offsets guarantee order within partition</text>

  <rect x="50" y="210" width="390" height="28" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="245" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">&#x2713; Correct: order preserved, state consistent</text>

  <!-- Out-of-order scenario -->
  <rect x="500" y="80" width="430" height="170" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="715" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Out-of-Order Across Partitions</text>

  <rect x="520" y="120" width="120" height="30" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="580" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Partition 0: Msg A</text>

  <rect x="650" y="120" width="120" height="30" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="710" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Partition 1: Msg B</text>

  <rect x="780" y="120" width="120" height="30" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="840" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Partition 0: Msg C</text>

  <text x="715" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">Consumer may read: B → A → C or A → B → C</text>
  <text x="715" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">No ordering guarantee across partitions</text>

  <rect x="520" y="210" width="390" height="28" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#991b1b">&#x2717; Incorrect: order depends on consumer timing</text>

  <!-- How to ensure ordering -->
  <rect x="30" y="280" width="900" height="160" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Strategies for Maintaining Order</text>

  <rect x="50" y="325" width="270" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="185" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">1. Single partition per key</text>
  <text x="185" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Same key → same partition → ordered</text>

  <rect x="345" y="325" width="270" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">2. Sequence numbers in messages</text>
  <text x="480" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Consumer reorders by sequence number</text>

  <rect x="640" y="325" width="270" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="775" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">3. Idempotent state updates</text>
  <text x="775" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Out-of-order updates don't corrupt state</text>

  <rect x="50" y="370" width="270" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="185" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">4. Version numbers on updates</text>
  <text x="185" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Reject updates with stale versions</text>

  <rect x="345" y="370" width="270" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">5. Buffer and reorder at consumer</text>
  <text x="480" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Wait for gaps before processing</text>

  <rect x="640" y="370" width="270" height="35" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="775" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Trade-off: ordering vs throughput</text>
  <text x="775" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">More ordering = less parallelism</text>
</svg>