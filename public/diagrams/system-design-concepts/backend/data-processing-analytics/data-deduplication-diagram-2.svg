<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Deduplication Implementation</title>
  <desc id="desc">Deduplication implementation: idempotency keys, seen records, and distributed deduplication</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Deduplication Implementation</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Idempotency keys, seen records, and distributed deduplication</text>
  
  <!-- Idempotency Key Pattern -->
  <rect x="30" y="85" width="280" height="240" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Idempotency Key Pattern</text>
  
  <rect x="50" y="125" width="240" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="150" text-anchor="middle" font-size="10" fill="#64748b">Client generates unique key</text>
  <text x="170" y="170" text-anchor="middle" font-size="10" fill="#64748b">Server checks if key seen</text>
  <text x="170" y="190" text-anchor="middle" font-size="10" fill="#64748b">If seen: return cached result</text>
  <text x="170" y="210" text-anchor="middle" font-size="10" fill="#64748b">If new: process and store</text>
  
  <rect x="50" y="235" width="240" height="80" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="260" text-anchor="middle" font-size="9" fill="#1e40af">Request: {idempotency_key: "abc123", ...}</text>
  <text x="170" y="280" text-anchor="middle" font-size="9" fill="#10b981">First: process + cache</text>
  <text x="170" y="295" text-anchor="middle" font-size="9" fill="#10b981">Retry: return cached</text>
  <text x="170" y="310" text-anchor="middle" font-size="9" fill="#64748b">Use: Payment APIs, webhooks</text>
  
  <!-- Seen Records Table -->
  <rect x="325" y="85" width="280" height="240" rx="8" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="465" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Seen Records Table</text>
  
  <rect x="345" y="125" width="240" height="100" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="465" y="150" text-anchor="middle" font-size="10" fill="#64748b">Maintain table of seen IDs</text>
  <text x="465" y="170" text-anchor="middle" font-size="10" fill="#64748b">Unique constraint on ID</text>
  <text x="465" y="190" text-anchor="middle" font-size="10" fill="#64748b">INSERT IGNORE or UPSERT</text>
  <text x="465" y="210" text-anchor="middle" font-size="10" fill="#64748b">Periodic cleanup of old entries</text>
  
  <rect x="345" y="235" width="240" height="80" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="465" y="260" text-anchor="middle" font-size="9" fill="#64748b">seen_records (event_id, ts)</text>
  <text x="465" y="280" text-anchor="middle" font-size="9" fill="#64748b">INSERT ... ON CONFLICT</text>
  <text x="465" y="295" text-anchor="middle" font-size="9" fill="#64748b">DO NOTHING</text>
  <text x="465" y="310" text-anchor="middle" font-size="9" fill="#64748b">Use: Event processing pipelines</text>
  
  <!-- Distributed Dedup -->
  <rect x="620" y="85" width="250" height="240" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Distributed Deduplication</text>
  
  <rect x="640" y="125" width="210" height="100" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="745" y="150" text-anchor="middle" font-size="10" fill="#64748b">Shared state across nodes</text>
  <text x="745" y="170" text-anchor="middle" font-size="10" fill="#64748b">Redis, Cassandra, or</text>
  <text x="745" y="190" text-anchor="middle" font-size="10" fill="#64748b">distributed Bloom filter</text>
  <text x="745" y="210" text-anchor="middle" font-size="10" fill="#64748b">Consistent hashing for lookup</text>
  
  <rect x="640" y="235" width="210" height="80" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="745" y="260" text-anchor="middle" font-size="9" fill="#b45309">Challenge: Network partition</text>
  <text x="745" y="280" text-anchor="middle" font-size="9" fill="#64748b">Solution: Quorum reads/writes</text>
  <text x="745" y="295" text-anchor="middle" font-size="9" fill="#64748b">Or: Accept eventual dedup</text>
  <text x="745" y="310" text-anchor="middle" font-size="9" fill="#64748b">Use: High-scale streaming</text>
  
  <!-- Dedup Strategies Comparison -->
  <rect x="30" y="340" width="400" height="190" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="230" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Dedup Strategies Comparison</text>
  
  <rect x="50" y="380" width="360" height="140" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <text x="70" y="405" text-anchor="start" font-size="9" fill="#64748b">At-least-once + idempotent sink</text>
  <text x="280" y="405" text-anchor="start" font-size="9" fill="#10b981">✓ Simple</text>
  
  <text x="70" y="425" text-anchor="start" font-size="9" fill="#64748b">Exactly-once semantics</text>
  <text x="280" y="425" text-anchor="start" font-size="9" fill="#10b981">✓ Strong guarantee</text>
  
  <text x="70" y="445" text-anchor="start" font-size="9" fill="#64748b">Pre-filter with Bloom filter</text>
  <text x="280" y="445" text-anchor="start" font-size="9" fill="#f59e0b">⚠ False positives</text>
  
  <text x="70" y="465" text-anchor="start" font-size="9" fill="#64748b">Windowed dedup (stateful)</text>
  <text x="280" y="465" text-anchor="start" font-size="9" fill="#10b981">✓ Bounded memory</text>
  
  <text x="70" y="485" text-anchor="start" font-size="9" fill="#64748b">Database unique constraint</text>
  <text x="280" y="485" text-anchor="start" font-size="9" fill="#10b981">✓ Simple, reliable</text>
  
  <text x="70" y="510" text-anchor="start" font-size="9" fill="#b91c1c">Choose based on:</text>
  <text x="180" y="510" text-anchor="start" font-size="9" fill="#64748b">scale, latency, consistency needs</text>
  
  <!-- TTL Management -->
  <rect x="450" y="340" width="420" height="190" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="660" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">TTL &amp; State Management</text>
  
  <rect x="470" y="380" width="380" height="140" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="490" y="405" text-anchor="start" font-size="9" fill="#64748b">State grows unbounded without cleanup:</text>
  <text x="490" y="425" text-anchor="start" font-size="9" fill="#64748b">• Set TTL on seen records (Redis EXPIRE)</text>
  <text x="490" y="445" text-anchor="start" font-size="9" fill="#64748b">• Periodic cleanup job (DELETE WHERE ts &amp;lt; ...)</text>
  <text x="490" y="465" text-anchor="start" font-size="9" fill="#64748b">• LRU eviction for in-memory caches</text>
  <text x="490" y="490" text-anchor="start" font-size="9" fill="#4338ca">TTL should exceed:</text>
  <text x="490" y="510" text-anchor="start" font-size="9" fill="#64748b">• Max retry window + max delay</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
