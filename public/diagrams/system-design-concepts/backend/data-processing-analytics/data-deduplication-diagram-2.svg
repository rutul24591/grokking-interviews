<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Deduplication Across Boundaries: Within and Across Systems</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Duplicates originate from retries, replays, out-of-order delivery, and multiple ingestion paths</text>

  <!-- Source systems with duplicates -->
  <text x="160" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Duplicate Sources</text>

  <rect x="30" y="105" width="160" height="60" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="110" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Retries</text>
  <text x="110" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Producer retries after timeout</text>
  <text x="110" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">send same record twice</text>

  <rect x="210" y="105" width="160" height="60" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="290" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#9a3412">Pipeline Replays</text>
  <text x="290" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Bug fix requires reprocessing</text>
  <text x="290" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">same events sent again</text>

  <rect x="390" y="105" width="160" height="60" rx="6" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
  <text x="470" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#854d0e">Out-of-Order Delivery</text>
  <text x="470" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Network retransmission or</text>
  <text x="470" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">CDC connector restart</text>

  <rect x="570" y="105" width="160" height="60" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="650" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3730a3">Multiple Ingestion Paths</text>
  <text x="650" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Same event via API and</text>
  <text x="650" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">CDC from database</text>

  <rect x="750" y="105" width="180" height="60" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="840" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">Consumer Rebalance</text>
  <text x="840" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Kafka consumer group</text>
  <text x="840" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">rebalance re-delivers msgs</text>

  <!-- Dedup pipeline -->
  <rect x="30" y="200" width="900" height="100" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Deduplication Layer</text>

  <rect x="60" y="245" width="260" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="190" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Windowed Dedup (Stream)</text>
  <text x="190" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Fixed window, state TTL</text>

  <rect x="350" y="245" width="260" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="480" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Global Dedup (Batch)</text>
  <text x="480" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Group by key, keep first/latest</text>

  <rect x="640" y="245" width="260" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="770" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Idempotent Sink (Storage)</text>
  <text x="770" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Upsert by key, overwrite</text>

  <!-- Output -->
  <rect x="30" y="330" width="900" height="90" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="480" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">Deduplicated Output</text>
  <text x="480" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Each unique record appears exactly once. Duplicate count tracked as operational metric.</text>
  <text x="480" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Duplicate rate should trend to zero as ingestion paths stabilize and retry logic improves.</text>
</svg>