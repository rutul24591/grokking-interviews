<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Word Count Example: Map, Shuffle, and Reduce in Action</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Classic MapReduce example: counting word frequencies across a large document corpus</text>

  <!-- Input documents -->
  <rect x="30" y="80" width="180" height="120" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Input Documents</text>
  <text x="120" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Split 1: "the cat sat"</text>
  <text x="120" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Split 2: "the dog ran"</text>
  <text x="120" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Split 3: "the cat ran"</text>
  <text x="120" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Each split → one map task</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrWC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="210" y1="140" x2="260" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrWC)"/>

  <!-- Map output -->
  <rect x="260" y="80" width="200" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Map Output (key, 1)</text>

  <text x="280" y="125" font-family="Arial, sans-serif" font-size="9" fill="#334155">Map 1: (the,1) (cat,1) (sat,1)</text>
  <text x="280" y="142" font-family="Arial, sans-serif" font-size="9" fill="#334155">Map 2: (the,1) (dog,1) (ran,1)</text>
  <text x="280" y="159" font-family="Arial, sans-serif" font-size="9" fill="#334155">Map 3: (the,1) (cat,1) (ran,1)</text>

  <rect x="280" y="170" width="160" height="20" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="360" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#991b1b">Combiner: local aggregation</text>

  <text x="280" y="205" font-family="Arial, sans-serif" font-size="9" fill="#334155">After combiner:</text>
  <text x="280" y="220" font-family="Arial, sans-serif" font-size="9" fill="#334155">(the,1) (cat,1) (sat,1)</text>
  <text x="280" y="235" font-family="Arial, sans-serif" font-size="9" fill="#334155">(the,1) (dog,1) (ran,1)</text>

  <line x1="460" y1="160" x2="520" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrWC)"/>

  <!-- Shuffle output -->
  <rect x="520" y="80" width="180" height="160" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="610" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3730a3">Shuffle: Group by Key</text>

  <text x="540" y="125" font-family="Arial, sans-serif" font-size="9" fill="#334155">Reducer 0 gets:</text>
  <text x="540" y="142" font-family="Arial, sans-serif" font-size="9" fill="#334155">(cat, [1, 1])</text>
  <text x="540" y="159" font-family="Arial, sans-serif" font-size="9" fill="#334155">(dog, [1])</text>

  <text x="540" y="185" font-family="Arial, sans-serif" font-size="9" fill="#334155">Reducer 1 gets:</text>
  <text x="540" y="202" font-family="Arial, sans-serif" font-size="9" fill="#334155">(ran, [1, 1])</text>
  <text x="540" y="219" font-family="Arial, sans-serif" font-size="9" fill="#334155">(sat, [1])</text>
  <text x="540" y="236" font-family="Arial, sans-serif" font-size="9" fill="#334155">(the, [1, 1, 1])</text>

  <line x1="700" y1="160" x2="750" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrWC)"/>

  <!-- Reduce output -->
  <rect x="750" y="80" width="180" height="160" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="840" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">Reduce: Sum Values</text>

  <text x="770" y="125" font-family="Arial, sans-serif" font-size="9" fill="#334155">Reducer 0 output:</text>
  <text x="770" y="142" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">(cat, 2)</text>
  <text x="770" y="159" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">(dog, 1)</text>

  <text x="770" y="185" font-family="Arial, sans-serif" font-size="9" fill="#334155">Reducer 1 output:</text>
  <text x="770" y="202" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">(ran, 2)</text>
  <text x="770" y="219" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">(sat, 1)</text>
  <text x="770" y="236" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">(the, 3)</text>

  <!-- Key insight box -->
  <rect x="30" y="280" width="900" height="140" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Why MapReduce Works for Large-Scale Computation</text>

  <rect x="50" y="325" width="420" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Data locality: map tasks run on nodes where data is stored</text>

  <rect x="50" y="359" width="420" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Parallelism: map and reduce tasks run in parallel across nodes</text>

  <rect x="50" y="393" width="420" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Fault tolerance: failed tasks are automatically re-executed</text>

  <rect x="500" y="325" width="410" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="705" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Combiner reduces shuffle volume by local pre-aggregation</text>

  <rect x="500" y="359" width="410" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="705" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Deterministic: same input always produces same output</text>

  <rect x="500" y="393" width="410" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="705" y="411" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Scales linearly: add more nodes to process more data</text>
</svg>