<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Deduplication Failure Modes and State Management</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">State growth, key collisions, clock skew, and window boundary issues cause dedup failures</text>

  <!-- Failure Mode 1 -->
  <rect x="30" y="80" width="280" height="110" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="170" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">1. State Growth OOM</text>
  <text x="170" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Dedup state (hash set, Bloom</text>
  <text x="170" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">filter) grows without bound,</text>
  <text x="170" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">eventually exhausting memory.</text>
  <rect x="50" y="168" width="240" height="18" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Mitigate: TTL, windowed state, eviction</text>

  <!-- Failure Mode 2 -->
  <rect x="340" y="80" width="280" height="110" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9a3412">2. Key Collision (Hash)</text>
  <text x="480" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">Two different records produce</text>
  <text x="480" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">same hash, one is incorrectly</text>
  <text x="480" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">discarded as a duplicate.</text>
  <rect x="360" y="168" width="240" height="18" rx="3" fill="#ffedd5" stroke="#fed7aa" stroke-width="1"/>
  <text x="480" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9a3412">Mitigate: 128-bit+ hashes, composite keys</text>

  <!-- Failure Mode 3 -->
  <rect x="650" y="80" width="280" height="110" rx="8" fill="#fefce8" stroke="#fef08a" stroke-width="1.5"/>
  <text x="790" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#854d0e">3. Clock Skew / Time Gaps</text>
  <text x="790" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">Late events arrive after the</text>
  <text x="790" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">dedup window closed, treated</text>
  <text x="790" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">as new records instead of dupes.</text>
  <rect x="670" y="168" width="240" height="18" rx="3" fill="#fef9c3" stroke="#fef08a" stroke-width="1"/>
  <text x="790" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#854d0e">Mitigate: generous window, watermark</text>

  <!-- State management patterns -->
  <rect x="30" y="220" width="440" height="210" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="250" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0369a1">Dedup State Management Strategies</text>

  <rect x="50" y="265" width="400" height="35" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">In-Memory Hash Set:</text>
  <text x="250" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Fast, exact, but unbounded growth — needs TTL or windowing</text>

  <rect x="50" y="306" width="400" height="35" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Bloom Filter:</text>
  <text x="250" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Fixed memory, may have false positives, no deletion without Counting BF</text>

  <rect x="50" y="347" width="400" height="35" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">External Store (Redis/DB):</text>
  <text x="250" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Persistent, scalable, but adds network latency per record</text>

  <rect x="50" y="388" width="400" height="35" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Idempotent Sink:</text>
  <text x="250" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">No dedup state needed — sink handles duplicates via upsert by key</text>

  <!-- Monitoring -->
  <rect x="500" y="220" width="430" height="210" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="715" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Dedup Health Monitoring</text>

  <rect x="520" y="265" width="390" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Duplicate rate: duplicates / total records (should trend to zero)</text>

  <rect x="520" y="299" width="390" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">State size: memory/disk used by dedup store (alert on growth)</text>

  <rect x="520" y="333" width="390" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Late event rate: events arriving after dedup window closed</text>

  <rect x="520" y="367" width="390" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">False positive rate: for Bloom filters, estimated from fill ratio</text>

  <rect x="520" y="401" width="390" height="28" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Dedup latency: time spent checking dedup store per record</text>
</svg>