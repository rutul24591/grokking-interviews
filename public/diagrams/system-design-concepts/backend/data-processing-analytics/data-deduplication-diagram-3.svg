<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Deduplication Failure Modes</title>
  <desc id="desc">Deduplication failure modes: false positives, state loss, and performance issues</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Deduplication Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">False positives, state loss, and performance issues</text>
  
  <!-- False Positives -->
  <rect x="30" y="85" width="280" height="210" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">False Positives (Over-Dedup)</text>
  
  <rect x="50" y="125" width="240" height="150" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="155" text-anchor="middle" font-size="10" fill="#64748b">Valid records incorrectly</text>
  <text x="170" y="175" text-anchor="middle" font-size="10" fill="#64748b">identified as duplicates,</text>
  <text x="170" y="190" text-anchor="middle" font-size="10" fill="#64748b">causing data loss</text>
  <text x="170" y="215" text-anchor="middle" font-size="10" fill="#b91c1c">Signal:</text>
  <text x="210" y="215" text-anchor="middle" font-size="10" fill="#64748b">Missing records, lower counts</text>
  <text x="170" y="235" text-anchor="middle" font-size="10" fill="#64748b">than source, user complaints</text>
  <text x="170" y="255" text-anchor="middle" font-size="10" fill="#b91c1c">Mitigation:</text>
  <text x="220" y="255" text-anchor="middle" font-size="10" fill="#64748b">Use exact match for critical data,</text>
  <text x="170" y="275" text-anchor="middle" font-size="10" fill="#64748b">tune Bloom filter false positive rate</text>
  
  <!-- False Negatives -->
  <rect x="325" y="85" width="280" height="210" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="465" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">False Negatives (Under-Dedup)</text>
  
  <rect x="345" y="125" width="240" height="150" rx="4" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="465" y="155" text-anchor="middle" font-size="10" fill="#64748b">Duplicates not detected,</text>
  <text x="465" y="175" text-anchor="middle" font-size="10" fill="#64748b">causing inflated counts and</text>
  <text x="465" y="190" text-anchor="middle" font-size="10" fill="#64748b">duplicate side effects</text>
  <text x="465" y="215" text-anchor="middle" font-size="10" fill="#b45309">Signal:</text>
  <text x="505" y="215" text-anchor="middle" font-size="10" fill="#64748b">Duplicate charges, inflated</text>
  <text x="465" y="235" text-anchor="middle" font-size="10" fill="#64748b">metrics, duplicate emails</text>
  <text x="465" y="255" text-anchor="middle" font-size="10" fill="#b45309">Mitigation:</text>
  <text x="515" y="255" text-anchor="middle" font-size="10" fill="#64748b">Idempotent sinks, post-hoc</text>
  <text x="465" y="275" text-anchor="middle" font-size="10" fill="#64748b">dedup job, reconciliation</text>
  
  <!-- State Loss -->
  <rect x="620" y="85" width="250" height="210" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">State Loss</text>
  
  <rect x="640" y="125" width="210" height="150" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="745" y="155" text-anchor="middle" font-size="10" fill="#64748b">Dedup state (seen IDs) lost</text>
  <text x="745" y="175" text-anchor="middle" font-size="10" fill="#64748b">due to crash, eviction, or</text>
  <text x="745" y="190" text-anchor="middle" font-size="10" fill="#64748b">TTL expiry</text>
  <text x="745" y="215" text-anchor="middle" font-size="10" fill="#4338ca">Signal:</text>
  <text x="785" y="215" text-anchor="middle" font-size="10" fill="#64748b">Duplicates appear after restart,</text>
  <text x="745" y="235" text-anchor="middle" font-size="10" fill="#64748b">cache miss rate spikes</text>
  <text x="745" y="255" text-anchor="middle" font-size="10" fill="#4338ca">Mitigation:</text>
  <text x="795" y="255" text-anchor="middle" font-size="10" fill="#64748b">Persist state, replicate across</text>
  <text x="745" y="275" text-anchor="middle" font-size="10" fill="#64748b">nodes, use durable storage</text>
  
  <!-- Hash Collisions -->
  <rect x="30" y="310" width="280" height="210" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="170" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Hash Collisions</text>
  
  <rect x="50" y="350" width="240" height="150" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="170" y="380" text-anchor="middle" font-size="10" fill="#64748b">Different records produce</text>
  <text x="170" y="395" text-anchor="middle" font-size="10" fill="#64748b">same hash, causing incorrect</text>
  <text x="170" y="410" text-anchor="middle" font-size="10" fill="#64748b">deduplication</text>
  <text x="170" y="435" text-anchor="middle" font-size="10" fill="#1e293b">Signal:</text>
  <text x="210" y="435" text-anchor="middle" font-size="10" fill="#64748b">Rare but catastrophic data</text>
  <text x="170" y="450" text-anchor="middle" font-size="10" fill="#64748b">loss, hard to debug</text>
  <text x="170" y="470" text-anchor="middle" font-size="10" fill="#1e293b">Mitigation:</text>
  <text x="220" y="470" text-anchor="middle" font-size="10" fill="#64748b">Use strong hash (SHA256),</text>
  <text x="170" y="490" text-anchor="middle" font-size="10" fill="#64748b">double-hash for critical data</text>
  
  <!-- Performance Degradation -->
  <rect x="325" y="310" width="280" height="210" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="465" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">Performance Degradation</text>
  
  <rect x="345" y="350" width="240" height="150" rx="4" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1"/>
  <text x="465" y="380" text-anchor="middle" font-size="10" fill="#64748b">Dedup state grows too large,</text>
  <text x="465" y="395" text-anchor="middle" font-size="10" fill="#64748b">causing slow lookups and</text>
  <text x="465" y="410" text-anchor="middle" font-size="10" fill="#64748b">memory pressure</text>
  <text x="465" y="435" text-anchor="middle" font-size="10" fill="#047857">Signal:</text>
  <text x="505" y="435" text-anchor="middle" font-size="10" fill="#64748b">Latency increases over time,</text>
  <text x="465" y="450" text-anchor="middle" font-size="10" fill="#64748b">memory usage grows</text>
  <text x="465" y="470" text-anchor="middle" font-size="10" fill="#047857">Mitigation:</text>
  <text x="515" y="470" text-anchor="middle" font-size="10" fill="#64748b">TTL on state, partition dedup</text>
  <text x="465" y="490" text-anchor="middle" font-size="10" fill="#64748b">state, use probabilistic structures</text>
  
  <!-- Race Conditions -->
  <rect x="620" y="310" width="250" height="210" rx="8" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/>
  <text x="745" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#c2410c">Race Conditions</text>
  
  <rect x="640" y="350" width="210" height="150" rx="4" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="745" y="380" text-anchor="middle" font-size="10" fill="#64748b">Concurrent processing of</text>
  <text x="745" y="395" text-anchor="middle" font-size="10" fill="#64748b">same record before dedup</text>
  <text x="745" y="410" text-anchor="middle" font-size="10" fill="#64748b">check completes</text>
  <text x="745" y="435" text-anchor="middle" font-size="10" fill="#c2410c">Signal:</text>
  <text x="785" y="435" text-anchor="middle" font-size="10" fill="#64748b">Duplicates during high load,</text>
  <text x="745" y="450" text-anchor="middle" font-size="10" fill="#64748b">TOCTOU (time-of-check-time-of-use)</text>
  <text x="745" y="470" text-anchor="middle" font-size="10" fill="#c2410c">Mitigation:</text>
  <text x="795" y="470" text-anchor="middle" font-size="10" fill="#64748b">Atomic check-and-insert,</text>
  <text x="745" y="490" text-anchor="middle" font-size="10" fill="#64748b">distributed locks, serialization</text>
  
  <!-- Best Practices -->
  <rect x="30" y="530" width="280" height="15" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="542" text-anchor="middle" font-size="8" fill="#b45309">Use idempotent sinks as final safety net</text>
  
  <rect x="325" y="530" width="280" height="15" rx="2" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="465" y="542" text-anchor="middle" font-size="8" fill="#4338ca">Monitor dedup rate for anomalies</text>
  
  <rect x="620" y="530" width="250" height="15" rx="2" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="745" y="542" text-anchor="middle" font-size="8" fill="#047857">Persist dedup state for recovery</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
