<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Compression Algorithm Comparison: CPU vs Ratio vs Speed</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Choosing the right compression algorithm based on workload: CPU budget, compression ratio, and throughput needs</text>

  <!-- Compression spectrum bar -->
  <rect x="60" y="90" width="840" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="60" y="90" width="140" height="40" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="130" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Fast / Low CPU</text>

  <rect x="200" y="90" width="200" height="40" rx="0" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="300" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#854d0e">Balanced</text>

  <rect x="400" y="90" width="200" height="40" rx="0" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="500" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">High Compression</text>

  <rect x="600" y="90" width="300" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="750" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Maximum Compression / High CPU</text>

  <!-- Algorithms positioned along the spectrum -->
  <circle cx="100" cy="170" r="40" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="100" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">LZ4</text>
  <text x="100" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Fastest</text>
  <line x1="100" y1="130" x2="100" y2="130" stroke="#22c55e" stroke-width="2"/>

  <circle cx="230" cy="170" r="40" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="230" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#854d0e">Snappy</text>
  <text x="230" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Balanced</text>

  <circle cx="360" cy="170" r="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="360" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Zstd</text>
  <text x="360" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Tunable</text>

  <circle cx="490" cy="170" r="40" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="490" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9a3412">Gzip</text>
  <text x="490" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Universal</text>

  <circle cx="620" cy="170" r="40" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="620" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Brotli</text>
  <text x="620" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Web</text>

  <circle cx="750" cy="170" r="40" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="750" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Zstandard</text>
  <text x="750" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Level 22</text>

  <!-- Comparison table -->
  <rect x="30" y="240" width="900" height="200" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Compression Algorithm Comparison (JSON/Log Data)</text>

  <!-- Table header -->
  <rect x="50" y="280" width="860" height="30" rx="4" fill="#e2e8f0"/>
  <text x="180" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Algorithm</text>
  <text x="340" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Compression Ratio</text>
  <text x="500" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Compress Speed</text>
  <text x="660" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Decompress Speed</text>
  <text x="820" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Best Use Case</text>

  <!-- Rows -->
  <rect x="50" y="310" width="860" height="24" rx="2" fill="#ffffff"/>
  <text x="180" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">LZ4</text>
  <text x="340" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">2.1x</text>
  <text x="500" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16a34a">Very Fast</text>
  <text x="660" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16a34a">Very Fast</text>
  <text x="820" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Real-time streams</text>

  <rect x="50" y="334" width="860" height="24" rx="2" fill="#f8fafc"/>
  <text x="180" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Snappy</text>
  <text x="340" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">2.3x</text>
  <text x="500" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16a34a">Fast</text>
  <text x="660" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16a34a">Fast</text>
  <text x="820" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Kafka, Parquet</text>

  <rect x="50" y="358" width="860" height="24" rx="2" fill="#ffffff"/>
  <text x="180" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Zstd (level 3)</text>
  <text x="340" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">2.8x</text>
  <text x="500" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ca8a04">Moderate</text>
  <text x="660" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16a34a">Fast</text>
  <text x="820" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Default for new systems</text>

  <rect x="50" y="382" width="860" height="24" rx="2" fill="#f8fafc"/>
  <text x="180" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Gzip (level 6)</text>
  <text x="340" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">3.0x</text>
  <text x="500" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">Slow</text>
  <text x="660" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ca8a04">Moderate</text>
  <text x="820" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">HTTP, S3 objects</text>

  <rect x="50" y="406" width="860" height="24" rx="2" fill="#ffffff"/>
  <text x="180" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Brotli (level 6)</text>
  <text x="340" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">3.5x</text>
  <text x="500" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">Slow</text>
  <text x="660" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16a34a">Fast</text>
  <text x="820" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Web content, APIs</text>
</svg>