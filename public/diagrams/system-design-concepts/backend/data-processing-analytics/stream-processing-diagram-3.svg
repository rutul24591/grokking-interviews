<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Stream vs Batch: When to Use Each Processing Model</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Stream processing for low-latency, batch for large-scale — many systems use both</text>

  <!-- Decision tree -->
  <rect x="350" y="40" width="260" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="480" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">What is the latency requirement?</text>
  <text x="480" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">How fresh must results be?</text>

  <!-- Branch 1: Low latency -->
  <line x1="350" y1="65" x2="200" y2="120" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">Seconds or less</text>

  <rect x="60" y="120" width="280" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="200" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Stream Processing</text>
  <text x="200" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Fraud detection, alerting</text>
  <text x="200" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Real-time dashboards</text>
  <text x="200" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Event-driven microservices</text>

  <!-- Branch 2: High latency OK -->
  <line x1="610" y1="65" x2="760" y2="120" stroke="#3b82f6" stroke-width="2"/>
  <text x="710" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">Minutes to hours OK</text>

  <rect x="620" y="120" width="280" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="760" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Batch Processing</text>
  <text x="760" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Daily/weekly reports</text>
  <text x="760" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; ETL pipelines</text>
  <text x="760" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Historical analysis</text>

  <!-- Sub-questions -->
  <line x1="200" y1="220" x2="200" y2="260" stroke="#64748b" stroke-width="1.5"/>
  <rect x="60" y="260" width="280" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3730a3">Is data volume very large?</text>
  <text x="200" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Yes → Micro-batch (Spark Streaming)</text>
  <text x="200" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">No → Continuous (Flink, Kafka Streams)</text>

  <line x1="760" y1="220" x2="760" y2="260" stroke="#64748b" stroke-width="1.5"/>
  <rect x="620" y="260" width="280" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="760" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3730a3">Is iterative computation needed?</text>
  <text x="760" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Yes → Spark (in-memory iterations)</text>
  <text x="760" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">No → MapReduce or SQL engine</text>

  <!-- Hybrid recommendation -->
  <rect x="30" y="370" width="900" height="70" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="480" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">Common Pattern: Hybrid (Lambda or Kappa)</text>
  <text x="480" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Stream for real-time results, batch for accurate historical recomputation — best of both worlds</text>
</svg>