<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Cost and Complexity Trade-offs: ETL vs ELT</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">ETL shifts complexity to the pipeline; ELT shifts complexity and cost to the warehouse</text>

  <!-- ETL cost breakdown -->
  <rect x="30" y="80" width="430" height="330" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="245" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">ETL Cost Structure</text>

  <rect x="50" y="125" width="390" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Compute: ETL engine (Spark, Airflow workers)</text>
  <text x="245" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">High — transforms run on dedicated compute</text>

  <rect x="50" y="185" width="390" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Storage: warehouse (transformed data only)</text>
  <text x="245" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Low — only transformed data is stored</text>

  <rect x="50" y="245" width="390" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Complexity: ETL pipeline logic</text>
  <text x="245" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">High — transforms managed in pipeline code</text>

  <rect x="50" y="305" width="390" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Network: source → ETL → warehouse</text>
  <text x="245" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Medium — transformed data (smaller) is transferred</text>

  <rect x="50" y="365" width="390" height="35" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="245" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">Best for: compliance, PII, limited warehouse budget</text>

  <!-- ELT cost breakdown -->
  <rect x="500" y="80" width="430" height="330" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="715" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">ELT Cost Structure</text>

  <rect x="520" y="125" width="390" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Compute: warehouse (SQL transforms)</text>
  <text x="715" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Variable — warehouse compute billed per query</text>

  <rect x="520" y="185" width="390" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Storage: lake + warehouse (raw + transformed)</text>
  <text x="715" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Higher — raw data stored in addition to transformed</text>

  <rect x="520" y="245" width="390" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Complexity: SQL transformations in warehouse</text>
  <text x="715" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Lower for analysts — SQL is familiar and auditable</text>

  <rect x="520" y="305" width="390" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Network: source → warehouse (raw data)</text>
  <text x="715" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Higher — full raw data is transferred to warehouse</text>

  <rect x="520" y="365" width="390" height="35" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="715" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">Best for: cloud warehouses, analyst-driven transforms</text>
</svg>