<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Window Triggers, Late Data, and Result Emission</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Triggers control when window results are emitted; late data handling determines what happens after the window closes</text>

  <!-- Timeline with events and watermarks -->
  <text x="80" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Event Timeline with Watermark</text>
  <line x1="40" y1="120" x2="920" y2="120" stroke="#64748b" stroke-width="2"/>
  <text x="920" y="115" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Processing time &#x2192;</text>

  <!-- Events on timeline -->
  <circle cx="100" cy="120" r="8" fill="#3b82f6"/>
  <text x="100" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">E1 (10:01)</text>
  <circle cx="180" cy="120" r="8" fill="#3b82f6"/>
  <text x="180" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">E2 (10:02)</text>
  <circle cx="260" cy="120" r="8" fill="#3b82f6"/>
  <text x="260" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">E3 (10:03)</text>
  <circle cx="340" cy="120" r="8" fill="#3b82f6"/>
  <text x="340" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">E4 (10:04)</text>
  <circle cx="420" cy="120" r="8" fill="#3b82f6"/>
  <text x="420" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">E5 (10:05)</text>

  <!-- Watermark -->
  <line x1="420" y1="85" x2="420" y2="155" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="420" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#dc2626">Watermark: 10:05</text>

  <!-- Window closes -->
  <rect x="60" y="85" width="360" height="70" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <text x="240" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">Window [10:00, 10:05)</text>

  <!-- Late events -->
  <circle cx="520" cy="120" r="8" fill="#f59e0b"/>
  <text x="520" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#92400e">E6 (10:03) LATE</text>
  <circle cx="620" cy="120" r="8" fill="#f59e0b"/>
  <text x="620" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#92400e">E7 (10:04) LATE</text>

  <!-- Result emission strategies -->
  <rect x="30" y="190" width="900" height="230" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Result Emission Strategies</text>

  <rect x="50" y="235" width="420" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">On Window Close: emit final result</text>
  <text x="260" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Single result, no updates after window closes</text>

  <rect x="50" y="276" width="420" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Early + On-time + Late: emit updates</text>
  <text x="260" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Early result, updated at close, corrected for late</text>

  <rect x="50" y="317" width="420" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Continuous: emit on every event</text>
  <text x="260" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Real-time running result, no window close</text>

  <rect x="50" y="358" width="420" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="260" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Count-based: emit every N events</text>
  <text x="260" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Fixed number of events per result</text>

  <!-- Late data handling -->
  <rect x="500" y="235" width="410" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="705" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Drop: discard late events</text>
  <text x="705" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Simple but loses data</text>

  <rect x="500" y="276" width="410" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="705" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Allow lateness: process within grace period</text>
  <text x="705" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Buffer and update results for late events</text>

  <rect x="500" y="317" width="410" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="705" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Side output: route to separate stream</text>
  <text x="705" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Main result + late data for analysis</text>

  <rect x="500" y="358" width="410" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="705" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">Idempotent update: apply regardless</text>
  <text x="705" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Final state correct regardless of order</text>
</svg>