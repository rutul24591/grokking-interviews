<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Data Partitioning Failure Modes</title>
  <desc id="desc">Partitioning failure modes: hot spots, skew, rebalancing issues, and partition explosion</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Data Partitioning Failure Modes</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Hot spots, skew, rebalancing issues, and partition explosion</text>
  
  <!-- Hot Spots -->
  <rect x="30" y="85" width="280" height="210" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Hot Spots</text>
  
  <rect x="50" y="125" width="240" height="150" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="155" text-anchor="middle" font-size="10" fill="#64748b">Uneven access patterns overload</text>
  <text x="170" y="175" text-anchor="middle" font-size="10" fill="#64748b">specific partitions (celebrity users,</text>
  <text x="170" y="190" text-anchor="middle" font-size="10" fill="#64748b">trending content, sequential IDs)</text>
  <text x="170" y="215" text-anchor="middle" font-size="10" fill="#b91c1c">Signal:</text>
  <text x="210" y="215" text-anchor="middle" font-size="10" fill="#64748b">One partition has 10x traffic,</text>
  <text x="170" y="235" text-anchor="middle" font-size="10" fill="#64748b">latency spikes on specific node</text>
  <text x="170" y="255" text-anchor="middle" font-size="10" fill="#b91c1c">Mitigation:</text>
  <text x="220" y="255" text-anchor="middle" font-size="10" fill="#64748b">Salting, cache hot keys, split hot</text>
  <text x="170" y="275" text-anchor="middle" font-size="10" fill="#64748b">partitions, read replicas</text>
  
  <!-- Partition Skew -->
  <rect x="325" y="85" width="280" height="210" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="465" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Partition Skew</text>
  
  <rect x="345" y="125" width="240" height="150" rx="4" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="465" y="155" text-anchor="middle" font-size="10" fill="#64748b">Data distribution uneven due to</text>
  <text x="465" y="175" text-anchor="middle" font-size="10" fill="#64748b">poor key choice or natural skew</text>
  <text x="465" y="190" text-anchor="middle" font-size="10" fill="#64748b">in data</text>
  <text x="465" y="215" text-anchor="middle" font-size="10" fill="#b45309">Signal:</text>
  <text x="505" y="215" text-anchor="middle" font-size="10" fill="#64748b">Partition sizes vary 100x, some</text>
  <text x="465" y="235" text-anchor="middle" font-size="10" fill="#64748b">nodes at 90% while others at 10%</text>
  <text x="465" y="255" text-anchor="middle" font-size="10" fill="#b45309">Mitigation:</text>
  <text x="515" y="255" text-anchor="middle" font-size="10" fill="#64748b">Better partition key, virtual nodes,</text>
  <text x="465" y="275" text-anchor="middle" font-size="10" fill="#64748b">periodic rebalancing</text>
  
  <!-- Rebalancing Storm -->
  <rect x="620" y="85" width="250" height="210" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">Rebalancing Storm</text>
  
  <rect x="640" y="125" width="210" height="150" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="745" y="155" text-anchor="middle" font-size="10" fill="#64748b">Adding/removing nodes triggers</text>
  <text x="745" y="175" text-anchor="middle" font-size="10" fill="#64748b">massive data movement,</text>
  <text x="745" y="190" text-anchor="middle" font-size="10" fill="#64748b">overloading network and disks</text>
  <text x="745" y="215" text-anchor="middle" font-size="10" fill="#4338ca">Signal:</text>
  <text x="785" y="215" text-anchor="middle" font-size="10" fill="#64748b">Network saturation, high I/O wait,</text>
  <text x="745" y="235" text-anchor="middle" font-size="10" fill="#64748b">query latency spikes during rebalance</text>
  <text x="745" y="255" text-anchor="middle" font-size="10" fill="#4338ca">Mitigation:</text>
  <text x="795" y="255" text-anchor="middle" font-size="10" fill="#64748b">Throttle rebalance, gradual rollout,</text>
  <text x="745" y="275" text-anchor="middle" font-size="10" fill="#64748b">schedule during low traffic</text>
  
  <!-- Partition Explosion -->
  <rect x="30" y="310" width="280" height="210" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="170" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Partition Explosion</text>
  
  <rect x="50" y="350" width="240" height="150" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="170" y="380" text-anchor="middle" font-size="10" fill="#64748b">Too many small partitions from</text>
  <text x="170" y="395" text-anchor="middle" font-size="10" fill="#64748b">over-splitting or high cardinality</text>
  <text x="170" y="410" text-anchor="middle" font-size="10" fill="#64748b">keys</text>
  <text x="170" y="435" text-anchor="middle" font-size="10" fill="#1e293b">Signal:</text>
  <text x="210" y="435" text-anchor="middle" font-size="10" fill="#64748b">Metadata overhead high, too many</text>
  <text x="170" y="450" text-anchor="middle" font-size="10" fill="#64748b">small files, slow partition listing</text>
  <text x="170" y="470" text-anchor="middle" font-size="10" fill="#1e293b">Mitigation:</text>
  <text x="220" y="470" text-anchor="middle" font-size="10" fill="#64748b">Set min partition size, merge small</text>
  <text x="170" y="490" text-anchor="middle" font-size="10" fill="#64748b">partitions, limit partition count</text>
  
  <!-- Wrong Partition Key -->
  <rect x="325" y="310" width="280" height="210" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="465" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">Wrong Partition Key</text>
  
  <rect x="345" y="350" width="240" height="150" rx="4" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1"/>
  <text x="465" y="380" text-anchor="middle" font-size="10" fill="#64748b">Key choice doesn't match query</text>
  <text x="465" y="395" text-anchor="middle" font-size="10" fill="#64748b">patterns, requiring scatter-gather</text>
  <text x="465" y="410" text-anchor="middle" font-size="10" fill="#64748b">queries</text>
  <text x="465" y="435" text-anchor="middle" font-size="10" fill="#047857">Signal:</text>
  <text x="505" y="435" text-anchor="middle" font-size="10" fill="#64748b">All queries hit all partitions,</text>
  <text x="465" y="450" text-anchor="middle" font-size="10" fill="#64748b">high network traffic per query</text>
  <text x="465" y="470" text-anchor="middle" font-size="10" fill="#047857">Mitigation:</text>
  <text x="515" y="470" text-anchor="middle" font-size="10" fill="#64748b">Analyze query patterns, use</text>
  <text x="465" y="490" text-anchor="middle" font-size="10" fill="#64748b">composite keys, secondary indexes</text>
  
  <!-- Node Failure Cascade -->
  <rect x="620" y="310" width="250" height="210" rx="8" fill="#ffedd5" stroke="#fdba74" stroke-width="2"/>
  <text x="745" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#c2410c">Node Failure Cascade</text>
  
  <rect x="640" y="350" width="210" height="150" rx="4" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="745" y="380" text-anchor="middle" font-size="10" fill="#64748b">Node failure causes data to shift</text>
  <text x="745" y="395" text-anchor="middle" font-size="10" fill="#64748b">to remaining nodes, potentially</text>
  <text x="745" y="410" text-anchor="middle" font-size="10" fill="#64748b">overloading them</text>
  <text x="745" y="435" text-anchor="middle" font-size="10" fill="#c2410c">Signal:</text>
  <text x="785" y="435" text-anchor="middle" font-size="10" fill="#64748b">Multiple nodes fail in sequence,</text>
  <text x="745" y="450" text-anchor="middle" font-size="10" fill="#64748b">cascading overload</text>
  <text x="745" y="470" text-anchor="middle" font-size="10" fill="#c2410c">Mitigation:</text>
  <text x="795" y="470" text-anchor="middle" font-size="10" fill="#64748b">Replication, N+2 capacity, circuit</text>
  <text x="745" y="490" text-anchor="middle" font-size="10" fill="#64748b">breakers, gradual failover</text>
  
  <!-- Best Practices -->
  <rect x="30" y="530" width="280" height="15" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="170" y="542" text-anchor="middle" font-size="8" fill="#b45309">Monitor partition size and access distribution</text>
  
  <rect x="325" y="530" width="280" height="15" rx="2" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="465" y="542" text-anchor="middle" font-size="8" fill="#4338ca">Use virtual nodes for even distribution</text>
  
  <rect x="620" y="530" width="250" height="15" rx="2" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="745" y="542" text-anchor="middle" font-size="8" fill="#047857">Throttle rebalancing to prevent storms</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
