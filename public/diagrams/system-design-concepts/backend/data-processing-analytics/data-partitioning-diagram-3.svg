<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Partition Evolution and Repartitioning</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">As data grows, partition count and strategy must evolve — repartitioning is expensive but sometimes necessary</text>

  <!-- Stage 1: Initial partitioning -->
  <rect x="30" y="80" width="260" height="140" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Stage 1: Initial (4 partitions)</text>
  <text x="160" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">1M records, ~250K per partition</text>

  <rect x="50" y="140" width="220" height="65" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">P0: A-M (250K)  P1: N-Z (250K)</text>
  <text x="160" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">P2: 0-9 (250K)  P3: other (250K)</text>
  <text x="160" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">&#x2713; Balanced, fast queries</text>

  <!-- Arrow -->
  <text x="310" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#64748b">&#x2192;</text>
  <text x="310" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Data grows 10x</text>

  <!-- Stage 2: Unbalanced -->
  <rect x="350" y="80" width="260" height="140" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="480" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c2410c">Stage 2: Unbalanced (still 4)</text>
  <text x="480" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">10M records, uneven distribution</text>

  <rect x="370" y="140" width="220" height="65" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="480" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c2410c">P0: 5M (HOT)  P1: 2M</text>
  <text x="480" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c2410c">P2: 2M          P3: 1M</text>
  <text x="480" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">&#x2717; P0 is bottleneck, slow</text>

  <text x="630" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#64748b">&#x2192;</text>
  <text x="630" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Repartition needed</text>

  <!-- Stage 3: Repartitioned -->
  <rect x="670" y="80" width="260" height="140" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="800" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Stage 3: Repartitioned (16)</text>
  <text x="800" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">10M records, ~625K per partition</text>

  <rect x="690" y="140" width="220" height="65" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="800" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">P0-P3: A-E, P4-P7: F-K,</text>
  <text x="800" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">P8-P11: L-Q, P12-P15: R-Z+</text>
  <text x="800" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">&#x2713; Balanced, fast queries</text>

  <!-- Repartitioning cost -->
  <rect x="30" y="250" width="900" height="180" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="480" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Repartitioning Cost and Considerations</text>

  <rect x="50" y="295" width="420" height="30" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="260" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Full data rewrite: every record must be re-partitioned</text>

  <rect x="50" y="331" width="420" height="30" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="260" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Hash partition change: old partitioning function becomes obsolete</text>

  <rect x="50" y="367" width="420" height="30" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="260" y="387" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Downstream consumers must update partition discovery logic</text>

  <rect x="50" y="403" width="420" height="24" rx="4" fill="#ffffff" stroke="#fca5a5" stroke-width="1"/>
  <text x="260" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Downtime: pipeline may be paused during repartitioning</text>

  <rect x="510" y="295" width="400" height="132" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="710" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Best Practices</text>
  <text x="710" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Over-partition initially (more than needed)</text>
  <text x="710" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Use hash partitioning (easier to add partitions)</text>
  <text x="710" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Monitor partition sizes, alert on imbalance</text>
  <text x="710" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Plan repartitioning during low-traffic windows</text>
  <text x="710" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">&#x2022; Consider hierarchical partitioning (date + key)</text>
</svg>