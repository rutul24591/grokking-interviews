<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Kafka Producer Delivery Semantics and Failure Handling</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Ack levels determine durability vs latency trade-offs; retries handle transient failures</text>

  <!-- acks=0 -->
  <rect x="30" y="80" width="280" height="140" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="170" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">acks=0: Fire and Forget</text>
  <text x="170" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Producer sends, no wait for ack.</text>
  <text x="170" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Highest throughput, lowest latency.</text>
  <text x="170" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Data loss if broker fails before write.</text>
  <rect x="50" y="180" width="240" height="30" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">Use: Metrics, logs where loss is acceptable</text>

  <!-- acks=1 -->
  <rect x="340" y="80" width="280" height="140" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9a3412">acks=1: Leader Ack</text>
  <text x="480" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">Producer waits for leader write ack.</text>
  <text x="480" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">Moderate throughput and latency.</text>
  <text x="480" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">Data loss if leader fails before replication.</text>
  <rect x="360" y="180" width="240" height="30" rx="4" fill="#ffedd5" stroke="#fed7aa" stroke-width="1"/>
  <text x="480" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412">Use: General purpose, default setting</text>

  <!-- acks=all -->
  <rect x="650" y="80" width="280" height="140" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="790" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">acks=all: Full ISR Ack</text>
  <text x="790" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Producer waits for leader + all ISR ack.</text>
  <text x="790" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">Lowest throughput, highest latency.</text>
  <text x="790" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">No data loss if min.insync.replicas met.</text>
  <rect x="670" y="180" width="240" height="30" rx="4" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="790" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Use: Billing, compliance, critical data</text>

  <!-- Retry flow -->
  <rect x="30" y="250" width="900" height="190" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Producer Retry and Idempotence Flow</text>

  <!-- Step 1 -->
  <rect x="50" y="300" width="160" height="55" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Step 1: Send</text>
  <text x="130" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Producer sends record</text>

  <!-- Arrow -->
  <text x="230" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">&#x2192;</text>

  <!-- Step 2 -->
  <rect x="250" y="300" width="160" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="330" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Step 2: Broker Response</text>
  <text x="330" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Success or error?</text>

  <!-- Decision branches -->
  <text x="430" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#22c55e">&#x2192;</text>
  <text x="430" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Success</text>

  <rect x="450" y="295" width="160" height="55" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="530" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Record Committed</text>
  <text x="530" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Producer advances</text>

  <!-- Error path -->
  <text x="430" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">&#x2193;</text>
  <text x="460" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">Error</text>

  <rect x="250" y="390" width="160" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="330" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Retriable?</text>

  <text x="210" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22c55e">&#x2190;</text>
  <text x="210" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Yes: Retry</text>

  <text x="430" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ef4444">&#x2192;</text>
  <text x="460" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">No: Fail</text>

  <rect x="450" y="390" width="160" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="530" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Producer Error</text>

  <!-- Idempotence note -->
  <rect x="650" y="300" width="260" height="120" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="780" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3730a3">Idempotent Producer</text>
  <text x="780" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#312e81">With enable.idempotence=true,</text>
  <text x="780" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#312e81">retries use sequence numbers</text>
  <text x="780" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#312e81">to prevent duplicate writes.</text>
  <text x="780" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3730a3">Exactly-once within partition</text>
  <text x="780" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">(not across partitions)</text>
</svg>