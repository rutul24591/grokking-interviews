<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Serialization Pipeline: Schema Registry and Compatibility Checks</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Schema registry manages schema versions and enforces compatibility during schema evolution</text>

  <!-- Producer flow -->
  <rect x="30" y="80" width="200" height="260" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Producer Flow</text>

  <rect x="50" y="120" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">1. Define schema</text>
  <text x="130" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Write .proto or Avro schema</text>

  <rect x="50" y="170" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">2. Register schema</text>
  <text x="130" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Submit to schema registry</text>

  <rect x="50" y="220" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">3. Compatibility check</text>
  <text x="130" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Registry checks compat</text>

  <rect x="50" y="270" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">4. Serialize + write</text>
  <text x="130" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Encode data with schema</text>

  <!-- Schema Registry -->
  <rect x="260" y="80" width="440" height="130" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="480" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Schema Registry</text>

  <rect x="280" y="120" width="180" height="75" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="370" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Version Store</text>
  <text x="370" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Subject: topic-value</text>
  <text x="370" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">v1: {name, age}</text>
  <text x="370" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">v2: {name, age, email}</text>

  <rect x="490" y="120" width="190" height="75" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="585" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Compatibility Engine</text>
  <text x="585" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Mode: BACKWARD</text>
  <text x="585" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Check: v2 vs v1</text>
  <text x="585" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">&#x2713; Compatible - accepted</text>

  <!-- Consumer flow -->
  <rect x="730" y="80" width="200" height="260" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="830" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Consumer Flow</text>

  <rect x="750" y="120" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="830" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">1. Read schema ID</text>
  <text x="830" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">From message header</text>

  <rect x="750" y="170" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="830" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">2. Fetch schema</text>
  <text x="830" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">From registry by ID</text>

  <rect x="750" y="220" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="830" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">3. Deserialize</text>
  <text x="830" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Decode data with schema</text>

  <rect x="750" y="270" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="830" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f172a">4. Process data</text>
  <text x="830" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Handle missing fields</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrSR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="230" y1="145" x2="260" y2="145" stroke="#64748b" stroke-width="2" marker-end="url(#arrSR)"/>
  <line x1="700" y1="145" x2="730" y2="145" stroke="#64748b" stroke-width="2" marker-end="url(#arrSR)"/>

  <!-- Bottom: compatibility modes -->
  <rect x="30" y="370" width="900" height="70" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Registry Compatibility Modes</text>
  <text x="180" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">BACKWARD: new reads old</text>
  <text x="380" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">FORWARD: old reads new</text>
  <text x="580" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">FULL: both directions</text>
  <text x="780" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">NONE: no checks</text>
</svg>