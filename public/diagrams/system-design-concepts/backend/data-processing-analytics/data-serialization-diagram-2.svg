<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Schema Evolution: Backward, Forward, and Full Compatibility</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Schema compatibility determines whether producers and consumers can evolve independently</text>

  <!-- Backward compatibility -->
  <rect x="30" y="80" width="280" height="180" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Backward Compatibility</text>
  <text x="170" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">New schema reads old data</text>

  <rect x="50" y="140" width="240" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">Old schema: {name, age}</text>
  <text x="170" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">New schema: {name, age, email}</text>

  <rect x="50" y="180" width="240" height="30" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">New reader handles old data</text>
  <text x="170" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">email = null for old records</text>

  <rect x="50" y="220" width="240" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="170" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">&#x2713; Add field with default</text>
  <text x="170" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">&#x2717; Remove required field</text>

  <!-- Forward compatibility -->
  <rect x="340" y="80" width="280" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="480" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">Forward Compatibility</text>
  <text x="480" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Old schema reads new data</text>

  <rect x="360" y="140" width="240" height="30" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="480" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Old schema: {name, age}</text>
  <text x="480" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">New schema: {name, age, email}</text>

  <rect x="360" y="180" width="240" height="30" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="480" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">Old reader handles new data</text>
  <text x="480" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">email field is ignored</text>

  <rect x="360" y="220" width="240" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="480" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">&#x2713; Add optional field</text>
  <text x="480" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">&#x2717; Remove field that old needs</text>

  <!-- Full compatibility -->
  <rect x="650" y="80" width="280" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="790" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Full Compatibility</text>
  <text x="790" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Both directions work</text>

  <rect x="670" y="140" width="240" height="30" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="790" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">Both backward and forward</text>
  <text x="790" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">compatible simultaneously</text>

  <rect x="670" y="180" width="240" height="30" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="790" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">Rolling upgrades work</text>
  <text x="790" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">Mixed versions coexist</text>

  <rect x="670" y="220" width="240" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="790" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">&#x2713; Add field with default</text>
  <text x="790" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">&#x2717; Change field type</text>

  <!-- Evolution timeline -->
  <rect x="30" y="290" width="900" height="130" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Schema Evolution Timeline</text>

  <line x1="80" y1="350" x2="880" y2="350" stroke="#64748b" stroke-width="3"/>
  <text x="880" y="345" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Time &#x2192;</text>

  <circle cx="180" cy="350" r="15" fill="#3b82f6"/>
  <text x="180" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">v1: {name, age}</text>
  <text x="180" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Initial schema</text>

  <circle cx="380" cy="350" r="15" fill="#3b82f6"/>
  <text x="380" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">v2: {name, age, email}</text>
  <text x="380" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Add field (safe)</text>

  <circle cx="580" cy="350" r="15" fill="#f59e0b"/>
  <text x="580" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#92400e">v3: {name, phone}</text>
  <text x="580" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Remove field (breaks!)</text>

  <circle cx="780" cy="350" r="15" fill="#ef4444"/>
  <text x="780" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#dc2626">v4: {name, age, phone}</text>
  <text x="780" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#64748b">Re-add age (fix)</text>
</svg>