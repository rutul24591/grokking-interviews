<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Serialization Performance and Compatibility</title>
  <desc id="desc">Serialization performance comparison and schema compatibility matrix for different formats</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Serialization: Performance &amp; Compatibility</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Speed benchmarks and schema compatibility matrix</text>
  
  <!-- Performance Benchmarks -->
  <rect x="30" y="85" width="400" height="240" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Performance Benchmarks (Relative)</text>
  
  <!-- Serialization Speed -->
  <rect x="50" y="125" width="360" height="100" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="230" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Serialization Speed (higher = faster)</text>
  
  <rect x="70" y="160" width="320" height="20" rx="2" fill="#ef4444"/>
  <text x="60" y="175" text-anchor="end" font-size="9" fill="#64748b">JSON</text>
  <text x="395" y="175" text-anchor="start" font-size="9" fill="#64748b">1x</text>
  
  <rect x="70" y="185" width="240" height="20" rx="2" fill="#f59e0b"/>
  <text x="60" y="200" text-anchor="end" font-size="9" fill="#64748b">Avro</text>
  <text x="315" y="200" text-anchor="start" font-size="9" fill="#64748b">5-10x</text>
  
  <rect x="70" y="210" width="200" height="20" rx="2" fill="#10b981"/>
  <text x="60" y="225" text-anchor="end" font-size="9" fill="#64748b">Protobuf</text>
  <text x="275" y="225" text-anchor="start" font-size="9" fill="#64748b">10-20x</text>
  
  <!-- Deserialization Speed -->
  <rect x="50" y="235" width="360" height="80" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="230" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Deserialization Speed</text>
  
  <rect x="70" y="270" width="300" height="18" rx="2" fill="#ef4444"/>
  <text x="60" y="283" text-anchor="end" font-size="9" fill="#64748b">JSON</text>
  <text x="375" y="283" text-anchor="start" font-size="9" fill="#64748b">1x</text>
  
  <rect x="70" y="293" width="220" height="18" rx="2" fill="#f59e0b"/>
  <text x="60" y="306" text-anchor="end" font-size="9" fill="#64748b">Avro</text>
  <text x="295" y="306" text-anchor="start" font-size="9" fill="#64748b">3-5x</text>
  
  <!-- Schema Compatibility Matrix -->
  <rect x="450" y="85" width="420" height="240" rx="8" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Schema Compatibility Matrix</text>
  
  <rect x="470" y="125" width="380" height="190" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  
  <!-- Matrix Header -->
  <text x="520" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#64748b">Format</text>
  <text x="600" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#64748b">Backward</text>
  <text x="680" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#64748b">Forward</text>
  <text x="760" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#64748b">Full</text>
  
  <!-- Matrix Rows -->
  <line x1="480" y1="160" x2="840" y2="160" stroke="#e9d5ff" stroke-width="1"/>
  
  <text x="520" y="180" text-anchor="start" font-size="9" fill="#64748b">JSON</text>
  <text x="600" y="180" text-anchor="middle" font-size="9" fill="#10b981">✓ N/A</text>
  <text x="680" y="180" text-anchor="middle" font-size="9" fill="#10b981">✓ N/A</text>
  <text x="760" y="180" text-anchor="middle" font-size="9" fill="#10b981">✓ Flexible</text>
  
  <line x1="480" y1="190" x2="840" y2="190" stroke="#e9d5ff" stroke-width="1"/>
  
  <text x="520" y="210" text-anchor="start" font-size="9" fill="#64748b">Avro</text>
  <text x="600" y="210" text-anchor="middle" font-size="9" fill="#10b981">✓ Yes</text>
  <text x="680" y="210" text-anchor="middle" font-size="9" fill="#10b981">✓ Yes</text>
  <text x="760" y="210" text-anchor="middle" font-size="9" fill="#10b981">✓ Yes</text>
  
  <line x1="480" y1="220" x2="840" y2="220" stroke="#e9d5ff" stroke-width="1"/>
  
  <text x="520" y="240" text-anchor="start" font-size="9" fill="#64748b">Protobuf</text>
  <text x="600" y="240" text-anchor="middle" font-size="9" fill="#10b981">✓ Yes</text>
  <text x="680" y="240" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Limited</text>
  <text x="760" y="240" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Careful</text>
  
  <line x1="480" y1="250" x2="840" y2="250" stroke="#e9d5ff" stroke-width="1"/>
  
  <text x="520" y="270" text-anchor="start" font-size="9" fill="#64748b">Thrift</text>
  <text x="600" y="270" text-anchor="middle" font-size="9" fill="#10b981">✓ Yes</text>
  <text x="680" y="270" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Limited</text>
  <text x="760" y="270" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Careful</text>
  
  <line x1="480" y1="280" x2="840" y2="280" stroke="#e9d5ff" stroke-width="1"/>
  
  <text x="520" y="300" text-anchor="start" font-size="9" fill="#64748b">Parquet</text>
  <text x="600" y="300" text-anchor="middle" font-size="9" fill="#10b981">✓ Yes</text>
  <text x="680" y="300" text-anchor="middle" font-size="9" fill="#10b981">✓ Yes</text>
  <text x="760" y="300" text-anchor="middle" font-size="9" fill="#10b981">✓ Yes</text>
  
  <text x="660" y="335" text-anchor="middle" font-size="9" fill="#64748b">Backward: new reader, old writer</text>
  <text x="660" y="350" text-anchor="middle" font-size="9" fill="#64748b">Forward: old reader, new writer</text>
  
  <!-- Ecosystem Support -->
  <rect x="30" y="340" width="400" height="190" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="230" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#b45309">Language Ecosystem Support</text>
  
  <rect x="50" y="380" width="360" height="140" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  
  <text x="70" y="405" text-anchor="start" font-size="9" fill="#64748b">JSON:</text>
  <text x="120" y="405" text-anchor="start" font-size="9" fill="#10b981">All languages</text>
  
  <text x="70" y="425" text-anchor="start" font-size="9" fill="#64748b">Avro:</text>
  <text x="120" y="425" text-anchor="start" font-size="9" fill="#10b981">Java, Python, Go, Rust, C++</text>
  
  <text x="70" y="445" text-anchor="start" font-size="9" fill="#64748b">Protobuf:</text>
  <text x="140" y="445" text-anchor="start" font-size="9" fill="#10b981">All major languages</text>
  
  <text x="70" y="465" text-anchor="start" font-size="9" fill="#64748b">Thrift:</text>
  <text x="120" y="465" text-anchor="start" font-size="9" fill="#f59e0b">Many, but declining</text>
  
  <text x="70" y="485" text-anchor="start" font-size="9" fill="#64748b">Parquet:</text>
  <text x="130" y="485" text-anchor="start" font-size="9" fill="#10b981">Java, Python, Spark, Pandas</text>
  
  <text x="70" y="510" text-anchor="start" font-size="9" fill="#64748b">MessagePack:</text>
  <text x="160" y="510" text-anchor="start" font-size="9" fill="#10b981">Most languages</text>
  
  <!-- Selection Guide -->
  <rect x="450" y="340" width="420" height="190" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="660" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">Format Selection Guide</text>
  
  <rect x="470" y="380" width="380" height="140" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  
  <text x="490" y="405" text-anchor="start" font-size="9" fill="#64748b">Need human readability?</text>
  <text x="650" y="405" text-anchor="start" font-size="9" fill="#10b981">→ JSON</text>
  
  <text x="490" y="425" text-anchor="start" font-size="9" fill="#64748b">Kafka + schema evolution?</text>
  <text x="650" y="425" text-anchor="start" font-size="9" fill="#10b981">→ Avro</text>
  
  <text x="490" y="445" text-anchor="start" font-size="9" fill="#64748b">gRPC / performance critical?</text>
  <text x="650" y="445" text-anchor="start" font-size="9" fill="#10b981">→ Protobuf</text>
  
  <text x="490" y="465" text-anchor="start" font-size="9" fill="#64748b">Analytics / columnar?</text>
  <text x="650" y="465" text-anchor="start" font-size="9" fill="#10b981">→ Parquet</text>
  
  <text x="490" y="485" text-anchor="start" font-size="9" fill="#64748b">Caching / simple binary?</text>
  <text x="650" y="485" text-anchor="start" font-size="9" fill="#10b981">→ MessagePack</text>
  
  <text x="490" y="510" text-anchor="start" font-size="9" fill="#64748b">Legacy / multi-language RPC?</text>
  <text x="650" y="510" text-anchor="start" font-size="9" fill="#f59e0b">→ Thrift</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
