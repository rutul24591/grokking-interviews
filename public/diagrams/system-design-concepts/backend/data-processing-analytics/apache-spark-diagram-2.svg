<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Shuffle: The Most Expensive Phase in Spark</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Shuffle moves data across the network to group records by key — the dominant cost in Spark jobs</text>

  <!-- Map side -->
  <text x="240" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Map Tasks (Stage 0)</text>

  <rect x="60" y="105" width="160" height="80" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Map Task 0</text>
  <text x="140" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">key=A: 3 records</text>
  <text x="140" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">key=B: 5 records</text>
  <text x="140" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">key=C: 2 records</text>

  <rect x="240" y="105" width="160" height="80" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Map Task 1</text>
  <text x="320" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">key=A: 4 records</text>
  <text x="320" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">key=B: 2 records</text>
  <text x="320" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">key=C: 6 records</text>

  <rect x="420" y="105" width="160" height="80" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="500" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Map Task 2</text>
  <text x="500" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">key=A: 2 records</text>
  <text x="500" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">key=B: 8 records</text>
  <text x="500" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">key=C: 1 record</text>

  <!-- Shuffle arrows -->
  <defs>
    <marker id="arrS" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- All A records to Reduce 0 -->
  <line x1="140" y1="185" x2="140" y2="280" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="320" y1="185" x2="170" y2="280" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="500" y1="185" x2="200" y2="280" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrS)"/>

  <!-- All B records to Reduce 1 -->
  <line x1="140" y1="185" x2="400" y2="280" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="320" y1="185" x2="430" y2="280" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="500" y1="185" x2="460" y2="280" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrS)"/>

  <!-- All C records to Reduce 2 -->
  <line x1="140" y1="185" x2="660" y2="280" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="320" y1="185" x2="690" y2="280" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrS)"/>
  <line x1="500" y1="185" x2="720" y2="280" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrS)"/>

  <!-- Reduce side -->
  <text x="480" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Shuffle: Network I/O to group by key</text>

  <rect x="60" y="290" width="200" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="160" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Reduce 0: key=A</text>
  <text x="160" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">3+4+2 = 9 records</text>
  <text x="160" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">from 3 map tasks</text>

  <rect x="320" y="290" width="200" height="70" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="420" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Reduce 1: key=B</text>
  <text x="420" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">5+2+8 = 15 records</text>
  <text x="420" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">from 3 map tasks</text>

  <rect x="580" y="290" width="200" height="70" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="680" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Reduce 2: key=C</text>
  <text x="680" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">2+6+1 = 9 records</text>
  <text x="680" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">from 3 map tasks</text>

  <!-- Cost breakdown -->
  <rect x="40" y="385" width="880" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="480" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">Shuffle Cost: M map tasks &#x00D7; R reduce tasks = M&#x00D7;R data transfers. Disk I/O for spill + Network I/O + Deserialization</text>
  <text x="480" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Optimization: reduce partition count, use broadcast join for small datasets, cache intermediate results</text>
</svg>