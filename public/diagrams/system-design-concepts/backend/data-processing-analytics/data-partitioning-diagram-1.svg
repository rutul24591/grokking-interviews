<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Data Partitioning Strategies and Their Trade-offs</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Hash, range, list, and round-robin partitioning — each strategy optimizes for different access patterns</text>

  <!-- Hash partitioning -->
  <rect x="30" y="80" width="210" height="240" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="135" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">Hash Partitioning</text>
  <text x="135" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">partition = hash(key) % N</text>

  <rect x="50" y="145" width="170" height="25" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="135" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">key=A &#x2192; hash(A)%4 = P2</text>

  <rect x="50" y="175" width="170" height="25" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="135" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">key=B &#x2192; hash(B)%4 = P0</text>

  <rect x="50" y="205" width="170" height="25" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="135" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">key=C &#x2192; hash(C)%4 = P2</text>

  <rect x="50" y="235" width="170" height="25" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="135" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">key=D &#x2192; hash(D)%4 = P1</text>

  <rect x="50" y="270" width="170" height="38" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="135" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Pros: Even distribution</text>
  <text x="135" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Cons: Range queries scatter</text>

  <!-- Range partitioning -->
  <rect x="270" y="80" width="210" height="240" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="375" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Range Partitioning</text>
  <text x="375" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">partition by key value ranges</text>

  <rect x="290" y="145" width="170" height="25" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="375" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">A-F &#x2192; Partition 0</text>

  <rect x="290" y="175" width="170" height="25" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="375" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">G-M &#x2192; Partition 1</text>

  <rect x="290" y="205" width="170" height="25" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="375" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">N-S &#x2192; Partition 2</text>

  <rect x="290" y="235" width="170" height="25" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="375" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#166534">T-Z &#x2192; Partition 3</text>

  <rect x="290" y="270" width="170" height="38" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="375" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Pros: Range queries efficient</text>
  <text x="375" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Cons: Hot partitions possible</text>

  <!-- List partitioning -->
  <rect x="510" y="80" width="210" height="240" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="615" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">List Partitioning</text>
  <text x="615" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">explicit key-to-partition mapping</text>

  <rect x="530" y="145" width="170" height="25" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="615" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">US, CA &#x2192; Partition 0</text>

  <rect x="530" y="175" width="170" height="25" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="615" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">EU, UK &#x2192; Partition 1</text>

  <rect x="530" y="205" width="170" height="25" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="615" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">APAC, JP &#x2192; Partition 2</text>

  <rect x="530" y="235" width="170" height="25" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="615" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">LATAM &#x2192; Partition 3</text>

  <rect x="530" y="270" width="170" height="38" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="615" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Pros: Control over placement</text>
  <text x="615" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Cons: Manual rebalancing</text>

  <!-- Round-robin -->
  <rect x="750" y="80" width="180" height="240" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="840" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Round-Robin</text>
  <text x="840" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">cycle through partitions</text>

  <rect x="770" y="145" width="140" height="25" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="840" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3730a3">Record 1 &#x2192; P0</text>

  <rect x="770" y="175" width="140" height="25" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="840" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3730a3">Record 2 &#x2192; P1</text>

  <rect x="770" y="205" width="140" height="25" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="840" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3730a3">Record 3 &#x2192; P2</text>

  <rect x="770" y="235" width="140" height="25" rx="4" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="840" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3730a3">Record 4 &#x2192; P3</text>

  <rect x="770" y="270" width="140" height="38" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="840" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Pros: Simple, even spread</text>
  <text x="840" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Cons: No key locality</text>

  <!-- Bottom decision guide -->
  <rect x="30" y="350" width="900" height="90" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Choosing a Partitioning Strategy</text>
  <text x="160" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Point lookups? &#x2192; Hash</text>
  <text x="370" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Range queries? &#x2192; Range</text>
  <text x="570" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Known categories? &#x2192; List</text>
  <text x="770" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">No key? &#x2192; Round-Robin</text>
  <text x="480" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Most systems combine strategies: hash for point queries, range for time-series, list for geo-partitioning</text>
</svg>