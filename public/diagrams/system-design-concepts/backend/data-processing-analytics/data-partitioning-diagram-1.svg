<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Data Partitioning Strategies</title>
  <desc id="desc">Data partitioning strategies: hash, range, list, and round-robin partitioning with trade-offs</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Data Partitioning Strategies</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">Hash, range, list, and round-robin partitioning with trade-offs</text>
  
  <!-- Hash Partitioning -->
  <rect x="30" y="85" width="280" height="240" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Hash Partitioning</text>
  
  <rect x="50" y="125" width="240" height="70" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="150" text-anchor="middle" font-size="10" fill="#64748b">partition = hash(key) % N</text>
  <text x="170" y="170" text-anchor="middle" font-size="10" fill="#64748b">Same key → same partition</text>
  <text x="170" y="190" text-anchor="middle" font-size="10" fill="#64748b">Even distribution</text>
  
  <!-- Hash Visualization -->
  <rect x="50" y="205" width="240" height="110" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="225" text-anchor="middle" font-size="9" fill="#1e40af">Keys → Hash → Partition</text>
  
  <rect x="70" y="235" width="50" height="30" rx="3" fill="#3b82f6"/>
  <text x="95" y="253" text-anchor="middle" font-size="8" fill="white">user-1</text>
  <line x1="125" y1="250" x2="145" y2="250" stroke="#64748b" stroke-width="2"/>
  <rect x="150" y="245" width="30" height="10" rx="2" fill="#1e40af"/>
  <text x="165" y="253" text-anchor="middle" font-size="7" fill="white">P0</text>
  
  <rect x="70" y="275" width="50" height="30" rx="3" fill="#3b82f6"/>
  <text x="95" y="293" text-anchor="middle" font-size="8" fill="white">user-5</text>
  <line x1="125" y1="290" x2="145" y2="290" stroke="#64748b" stroke-width="2"/>
  <rect x="150" y="285" width="30" height="10" rx="2" fill="#1e40af"/>
  <text x="165" y="293" text-anchor="middle" font-size="7" fill="white">P0</text>
  
  <rect x="190" y="235" width="50" height="30" rx="3" fill="#3b82f6"/>
  <text x="215" y="253" text-anchor="middle" font-size="8" fill="white">user-2</text>
  <line x1="245" y1="250" x2="265" y2="250" stroke="#64748b" stroke-width="2"/>
  <rect x="270" y="245" width="30" height="10" rx="2" fill="#1e40af"/>
  <text x="285" y="253" text-anchor="middle" font-size="7" fill="white">P1</text>
  
  <text x="170" y="330" text-anchor="middle" font-size="9" fill="#10b981">✓ Even distribution</text>
  <text x="170" y="345" text-anchor="middle" font-size="9" fill="#10b981">✓ Point queries efficient</text>
  <text x="170" y="360" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Range queries scatter</text>
  
  <!-- Range Partitioning -->
  <rect x="325" y="85" width="280" height="240" rx="8" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="465" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Range Partitioning</text>
  
  <rect x="345" y="125" width="240" height="70" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="465" y="150" text-anchor="middle" font-size="10" fill="#64748b">Partition by value ranges</text>
  <text x="465" y="170" text-anchor="middle" font-size="10" fill="#64748b">P0: A-M, P1: N-Z</text>
  <text x="465" y="190" text-anchor="middle" font-size="10" fill="#64748b">Or by date: 2024-Q1, Q2...</text>
  
  <!-- Range Visualization -->
  <rect x="345" y="205" width="240" height="110" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="465" y="225" text-anchor="middle" font-size="9" fill="#6d28d9">Continuous ranges</text>
  
  <rect x="365" y="235" width="200" height="25" rx="2" fill="#a78bfa"/>
  <text x="465" y="252" text-anchor="middle" font-size="8" fill="white">P0: Keys 0-999</text>
  
  <rect x="365" y="265" width="200" height="25" rx="2" fill="#8b5cf6"/>
  <text x="465" y="282" text-anchor="middle" font-size="8" fill="white">P1: Keys 1000-1999</text>
  
  <rect x="365" y="295" width="200" height="25" rx="2" fill="#7c3aed"/>
  <text x="465" y="312" text-anchor="middle" font-size="8" fill="white">P2: Keys 2000-2999</text>
  
  <text x="465" y="330" text-anchor="middle" font-size="9" fill="#10b981">✓ Range queries efficient</text>
  <text x="465" y="345" text-anchor="middle" font-size="9" fill="#10b981">✓ Ordered scans</text>
  <text x="465" y="360" text-anchor="middle" font-size="9" fill="#ef4444">✗ Hot spots (uneven)</text>
  
  <!-- List Partitioning -->
  <rect x="620" y="85" width="250" height="240" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">List Partitioning</text>
  
  <rect x="640" y="125" width="210" height="70" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="745" y="150" text-anchor="middle" font-size="10" fill="#64748b">Explicit key lists per partition</text>
  <text x="745" y="170" text-anchor="middle" font-size="10" fill="#64748b">P0: US, CA, MX</text>
  <text x="745" y="190" text-anchor="middle" font-size="10" fill="#64748b">P1: UK, DE, FR...</text>
  
  <!-- List Visualization -->
  <rect x="640" y="205" width="210" height="110" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  
  <rect x="660" y="225" width="170" height="25" rx="2" fill="#fcd34d"/>
  <text x="745" y="242" text-anchor="middle" font-size="8" fill="#64748b">P0: [US, CA, MX, BR]</text>
  
  <rect x="660" y="255" width="170" height="25" rx="2" fill="#fbbf24"/>
  <text x="745" y="272" text-anchor="middle" font-size="8" fill="#64748b">P1: [UK, DE, FR, ES]</text>
  
  <rect x="660" y="285" width="170" height="25" rx="2" fill="#f59e0b"/>
  <text x="745" y="302" text-anchor="middle" font-size="8" fill="white">P2: [CN, JP, KR, IN]</text>
  
  <text x="745" y="330" text-anchor="middle" font-size="9" fill="#10b981">✓ Logical grouping</text>
  <text x="745" y="345" text-anchor="middle" font-size="9" fill="#10b981">✓ Regional isolation</text>
  <text x="745" y="360" text-anchor="middle" font-size="9" fill="#f59e0b">⚠ Manual management</text>
  
  <!-- Round-Robin -->
  <rect x="30" y="340" width="280" height="190" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="170" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Round-Robin Partitioning</text>
  
  <rect x="50" y="380" width="240" height="70" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="170" y="405" text-anchor="middle" font-size="10" fill="#64748b">Sequential assignment</text>
  <text x="170" y="425" text-anchor="middle" font-size="10" fill="#64748b">Row 1→P0, Row 2→P1...</text>
  <text x="170" y="445" text-anchor="middle" font-size="10" fill="#64748b">No key consideration</text>
  
  <rect x="50" y="460" width="240" height="60" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="170" y="480" text-anchor="middle" font-size="9" fill="#10b981">✓ Perfect distribution</text>
  <text x="170" y="495" text-anchor="middle" font-size="9" fill="#10b981">✓ No hot spots</text>
  <text x="170" y="510" text-anchor="middle" font-size="9" fill="#ef4444">✗ No key locality</text>
  <text x="170" y="525" text-anchor="middle" font-size="9" fill="#ef4444">✗ Point queries scatter</text>
  
  <!-- Partition Key Selection -->
  <rect x="325" y="340" width="280" height="190" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="465" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">Partition Key Selection</text>
  
  <rect x="345" y="380" width="240" height="140" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="365" y="405" text-anchor="start" font-size="9" fill="#64748b">Good keys have:</text>
  <text x="365" y="425" text-anchor="start" font-size="9" fill="#64748b">• High cardinality</text>
  <text x="365" y="445" text-anchor="start" font-size="9" fill="#64748b">• Even distribution</text>
  <text x="365" y="465" text-anchor="start" font-size="9" fill="#64748b">• Query pattern alignment</text>
  <text x="365" y="485" text-anchor="start" font-size="9" fill="#64748b">• Stable over time</text>
  <text x="365" y="505" text-anchor="start" font-size="9" fill="#ef4444">Avoid: timestamps, monotonic IDs</text>
  
  <!-- Trade-offs Summary -->
  <rect x="620" y="340" width="250" height="190" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="745" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Trade-offs Summary</text>
  
  <rect x="640" y="380" width="210" height="140" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="660" y="405" text-anchor="start" font-size="9" fill="#64748b">Hash: balanced, no ranges</text>
  <text x="660" y="425" text-anchor="start" font-size="9" fill="#64748b">Range: efficient scans, skew</text>
  <text x="660" y="445" text-anchor="start" font-size="9" fill="#64748b">List: logical, manual</text>
  <text x="660" y="465" text-anchor="start" font-size="9" fill="#64748b">Round-robin: even, no locality</text>
  <text x="660" y="490" text-anchor="start" font-size="9" fill="#b91c1c">Choose based on:</text>
  <text x="660" y="510" text-anchor="start" font-size="9" fill="#64748b">Query patterns + data distribution</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
