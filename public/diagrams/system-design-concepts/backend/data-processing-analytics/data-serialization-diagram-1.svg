<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
  <title id="title">Data Serialization Formats</title>
  <desc id="desc">Data serialization formats comparison: JSON, Avro, Protobuf, and their trade-offs</desc>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Data Serialization Formats</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#64748b">JSON, Avro, Protobuf, and their trade-offs for data systems</text>
  
  <!-- JSON -->
  <rect x="30" y="85" width="280" height="240" rx="8" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  <text x="170" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">JSON (Text-based)</text>
  
  <rect x="50" y="125" width="240" height="90" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="170" y="148" text-anchor="middle" font-size="9" fill="#64748b">{</text>
  <text x="170" y="165" text-anchor="middle" font-size="9" fill="#64748b">"id": 123,</text>
  <text x="170" y="182" text-anchor="middle" font-size="9" fill="#64748b">"name": "Order",</text>
  <text x="170" y="199" text-anchor="middle" font-size="9" fill="#64748b">"items": [...]</text>
  <text x="170" y="216" text-anchor="middle" font-size="9" fill="#64748b">}</text>
  
  <rect x="50" y="225" width="240" height="90" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="250" text-anchor="middle" font-size="10" fill="#10b981">✓ Human readable</text>
  <text x="170" y="270" text-anchor="middle" font-size="10" fill="#10b981">✓ Schema-less, flexible</text>
  <text x="170" y="290" text-anchor="middle" font-size="10" fill="#10b981">✓ Universal support</text>
  <text x="170" y="310" text-anchor="middle" font-size="10" fill="#ef4444">✗ Verbose (large size)</text>
  <text x="170" y="330" text-anchor="middle" font-size="10" fill="#ef4444">✗ Slow parsing</text>
  <text x="170" y="350" text-anchor="middle" font-size="10" fill="#f59e0b">⚠ No schema enforcement</text>
  
  <!-- Avro -->
  <rect x="325" y="85" width="280" height="240" rx="8" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="465" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Avro (Binary + Schema)</text>
  
  <rect x="345" y="125" width="240" height="90" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="465" y="148" text-anchor="middle" font-size="9" fill="#64748b">Schema (JSON):</text>
  <text x="465" y="165" text-anchor="middle" font-size="9" fill="#64748b">{"type":"record", "fields":[...]}</text>
  <text x="465" y="185" text-anchor="middle" font-size="9" fill="#64748b">Data (Binary):</text>
  <text x="465" y="205" text-anchor="middle" font-size="9" fill="#64748b">[bytes without field names]</text>
  
  <rect x="345" y="225" width="240" height="90" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="465" y="250" text-anchor="middle" font-size="10" fill="#10b981">✓ Compact binary</text>
  <text x="465" y="270" text-anchor="middle" font-size="10" fill="#10b981">✓ Schema evolution</text>
  <text x="465" y="290" text-anchor="middle" font-size="10" fill="#10b981">✓ Fast serialization</text>
  <text x="465" y="310" text-anchor="middle" font-size="10" fill="#ef4444">✗ Requires schema</text>
  <text x="465" y="330" text-anchor="middle" font-size="10" fill="#f59e0b">⚠ Schema registry needed</text>
  
  <!-- Protobuf -->
  <rect x="620" y="85" width="250" height="240" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Protobuf (Binary + .proto)</text>
  
  <rect x="640" y="125" width="210" height="90" rx="4" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="745" y="148" text-anchor="middle" font-size="9" fill="#64748b">.proto file:</text>
  <text x="745" y="165" text-anchor="middle" font-size="9" fill="#64748b">message Order {</text>
  <text x="745" y="182" text-anchor="middle" font-size="9" fill="#64748b">int32 id = 1;</text>
  <text x="745" y="199" text-anchor="middle" font-size="9" fill="#64748b">string name = 2;</text>
  <text x="745" y="216" text-anchor="middle" font-size="9" fill="#64748b">}</text>
  
  <rect x="640" y="225" width="210" height="90" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="745" y="250" text-anchor="middle" font-size="10" fill="#10b981">✓ Very compact</text>
  <text x="745" y="270" text-anchor="middle" font-size="10" fill="#10b981">✓ Very fast</text>
  <text x="745" y="290" text-anchor="middle" font-size="10" fill="#10b981">✓ Strong typing</text>
  <text x="745" y="310" text-anchor="middle" font-size="10" fill="#ef4444">✗ Code generation needed</text>
  <text x="745" y="330" text-anchor="middle" font-size="10" fill="#f59e0b">⚠ Less flexible evolution</text>
  
  <!-- Size Comparison -->
  <rect x="30" y="340" width="280" height="190" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="170" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#b91c1c">Size Comparison</text>
  
  <rect x="50" y="380" width="240" height="140" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  
  <!-- Bar chart -->
  <rect x="70" y="400" width="200" height="25" rx="2" fill="#fca5a5"/>
  <text x="80" y="418" text-anchor="start" font-size="9" fill="#b91c1c">JSON</text>
  <text x="275" y="418" text-anchor="end" font-size="9" fill="#64748b">100%</text>
  
  <rect x="70" y="430" width="100" height="25" rx="2" fill="#fbbf24"/>
  <text x="80" y="448" text-anchor="start" font-size="9" fill="#b45309">Avro</text>
  <text x="175" y="448" text-anchor="end" font-size="9" fill="#64748b">~50%</text>
  
  <rect x="70" y="460" width="80" height="25" rx="2" fill="#6ee7b7"/>
  <text x="80" y="478" text-anchor="start" font-size="9" fill="#047857">Protobuf</text>
  <text x="155" y="478" text-anchor="end" font-size="9" fill="#64748b">~40%</text>
  
  <text x="170" y="510" text-anchor="middle" font-size="9" fill="#64748b">Relative size for same data</text>
  
  <!-- Use Cases -->
  <rect x="325" y="340" width="280" height="190" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text x="465" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#4338ca">Use Cases</text>
  
  <rect x="345" y="380" width="240" height="140" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="365" y="405" text-anchor="start" font-size="9" fill="#64748b">JSON: APIs, config, debugging</text>
  <text x="365" y="425" text-anchor="start" font-size="9" fill="#64748b">Avro: Kafka, data lakes, CDC</text>
  <text x="365" y="445" text-anchor="start" font-size="9" fill="#64748b">Protobuf: gRPC, internal RPC</text>
  <text x="365" y="465" text-anchor="start" font-size="9" fill="#64748b">Parquet: Analytics, columnar</text>
  <text x="365" y="485" text-anchor="start" font-size="9" fill="#64748b">MessagePack: Caching</text>
  
  <!-- Schema Evolution -->
  <rect x="620" y="340" width="250" height="190" rx="8" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="2"/>
  <text x="745" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#047857">Schema Evolution</text>
  
  <rect x="640" y="380" width="210" height="140" rx="4" fill="#f0fdf4" stroke="#6ee7b7" stroke-width="1"/>
  <text x="660" y="405" text-anchor="start" font-size="9" fill="#64748b">Backward compatible:</text>
  <text x="660" y="425" text-anchor="start" font-size="9" fill="#64748b">• Add optional field</text>
  <text x="660" y="445" text-anchor="start" font-size="9" fill="#64748b">• Add field with default</text>
  <text x="660" y="465" text-anchor="start" font-size="9" fill="#ef4444">Breaking changes:</text>
  <text x="660" y="485" text-anchor="start" font-size="9" fill="#ef4444">• Remove required field</text>
  <text x="660" y="505" text-anchor="start" font-size="9" fill="#ef4444">• Change field type</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
