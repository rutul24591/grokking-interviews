<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Serialization Format Comparison: JSON, Avro, Parquet, Protobuf</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Choosing the right format based on schema evolution needs, compression, and processing requirements</text>

  <!-- JSON -->
  <rect x="30" y="80" width="210" height="150" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="135" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">JSON</text>
  <text x="135" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Human-readable text format</text>
  <text x="50" y="145" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Schema: schemaless</text>
  <text x="50" y="160" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Size: large (text overhead)</text>
  <text x="50" y="175" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Speed: slow parse/serialize</text>
  <text x="50" y="190" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Evolution: no enforcement</text>
  <text x="50" y="205" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Use: APIs, configs, logs</text>
  <text x="135" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">Best for: interchange</text>

  <!-- Avro -->
  <rect x="270" y="80" width="210" height="150" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="375" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Avro</text>
  <text x="375" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Binary with schema in file header</text>
  <text x="290" y="145" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Schema: JSON schema in header</text>
  <text x="290" y="160" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Size: compact binary</text>
  <text x="290" y="175" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Speed: fast serialize/deserialize</text>
  <text x="290" y="190" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Evolution: full compat support</text>
  <text x="290" y="205" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Use: Kafka, Hadoop, CDC</text>
  <text x="375" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">Best for: event streaming</text>

  <!-- Protobuf -->
  <rect x="510" y="80" width="210" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="615" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Protobuf</text>
  <text x="615" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Binary with .proto schema</text>
  <text x="530" y="145" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Schema: .proto definition</text>
  <text x="530" y="160" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Size: very compact binary</text>
  <text x="530" y="175" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Speed: fastest encode/decode</text>
  <text x="530" y="190" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Evolution: backward compat</text>
  <text x="530" y="205" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Use: gRPC, microservices</text>
  <text x="615" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">Best for: RPC, low-latency</text>

  <!-- Parquet -->
  <rect x="750" y="80" width="180" height="150" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="840" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">Parquet</text>
  <text x="840" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Columnar binary format</text>
  <text x="770" y="145" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Schema: embedded in footer</text>
  <text x="770" y="160" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Size: most compact</text>
  <text x="770" y="175" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Speed: column-level read</text>
  <text x="770" y="190" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Evolution: schema evolution</text>
  <text x="770" y="205" font-family="Arial, sans-serif" font-size="9" fill="#334155">&#x2022; Use: data lakes, warehouses</text>
  <text x="840" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">Best for: analytics</text>

  <!-- Decision matrix -->
  <rect x="30" y="260" width="900" height="180" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Serialization Format Decision Matrix</text>

  <!-- Table header -->
  <rect x="50" y="300" width="860" height="24" rx="3" fill="#e2e8f0"/>
  <text x="150" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#0f172a">Use Case</text>
  <text x="300" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#0f172a">Recommended Format</text>
  <text x="500" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#0f172a">Why</text>
  <text x="750" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#0f172a">Avoid</text>

  <!-- Rows -->
  <rect x="50" y="324" width="860" height="22" rx="2" fill="#ffffff"/>
  <text x="150" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">API request/response</text>
  <text x="300" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">JSON / Protobuf</text>
  <text x="500" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Human-readable or fast binary</text>
  <text x="750" y="339" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Parquet (not row-oriented)</text>

  <rect x="50" y="346" width="860" height="22" rx="2" fill="#f8fafc"/>
  <text x="150" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Event streaming (Kafka)</text>
  <text x="300" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">Avro</text>
  <text x="500" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Schema in header, compat checks</text>
  <text x="750" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">JSON (large, no schema)</text>

  <rect x="50" y="368" width="860" height="22" rx="2" fill="#ffffff"/>
  <text x="150" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Data lake storage</text>
  <text x="300" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">Parquet</text>
  <text x="500" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Columnar, predicate pushdown</text>
  <text x="750" y="383" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">JSON (large, no pruning)</text>

  <rect x="50" y="390" width="860" height="22" rx="2" fill="#f8fafc"/>
  <text x="150" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Microservice RPC</text>
  <text x="300" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">Protobuf (gRPC)</text>
  <text x="500" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Fast, typed, auto-generated code</text>
  <text x="750" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">JSON (slow, no type safety)</text>

  <rect x="50" y="412" width="860" height="22" rx="2" fill="#ffffff"/>
  <text x="150" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Configuration files</text>
  <text x="300" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">JSON / YAML</text>
  <text x="500" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Human-readable, widely supported</text>
  <text x="750" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#334155">Protobuf (not human-readable)</text>
</svg>