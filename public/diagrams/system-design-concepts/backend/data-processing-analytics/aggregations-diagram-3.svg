<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Aggregation Failure Modes and Detection</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Common failure modes: hot keys, late data, duplicate inflation, non-determinism, sketch errors</text>

  <!-- Failure Mode 1: Hot Keys -->
  <rect x="30" y="80" width="280" height="110" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="170" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#991b1b">1. Hot Key Skew</text>
  <text x="170" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">One key dominates data volume,</text>
  <text x="170" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">forcing one worker to process</text>
  <text x="170" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">95% of data, stalling the job.</text>
  <text x="170" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">Detect: Top-key volume charts</text>

  <!-- Failure Mode 2: Late Data -->
  <rect x="340" y="80" width="280" height="110" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9a3412">2. Late Data Undercounting</text>
  <text x="480" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">Events arrive after window closes,</text>
  <text x="480" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">leading to undercounting unless</text>
  <text x="480" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">late-data correction policy exists.</text>
  <text x="480" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#9a3412">Detect: Watermark lag metrics</text>

  <!-- Failure Mode 3: Duplicate Inflation -->
  <rect x="650" y="80" width="280" height="110" rx="8" fill="#fefce8" stroke="#fef08a" stroke-width="1.5"/>
  <text x="790" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#854d0e">3. Duplicate Inflation</text>
  <text x="790" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">Retries or replays process the</text>
  <text x="790" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">same events twice, inflating</text>
  <text x="790" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">counts when idempotency is missing.</text>
  <text x="790" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#854d0e">Detect: Reconciliation vs source</text>

  <!-- Failure Mode 4: Non-Determinism -->
  <rect x="30" y="220" width="280" height="110" rx="8" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5"/>
  <text x="170" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#9d174d">4. Non-Determinism</text>
  <text x="170" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#831843">Random ordering or time-dependent</text>
  <text x="170" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#831843">filters produce different results on</text>
  <text x="170" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#831843">rerun, making debugging impossible.</text>
  <text x="170" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#9d174d">Detect: Rerun diff comparison</text>

  <!-- Failure Mode 5: Sketch Error Bounds -->
  <rect x="340" y="220" width="280" height="110" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="480" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3730a3">5. Approximation Without Bounds</text>
  <text x="480" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#312e81">Using approximate algorithms (HLL,</text>
  <text x="480" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#312e81">t-digest) without publishing error</text>
  <text x="480" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#312e81">bounds leads to false confidence.</text>
  <text x="480" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3730a3">Detect: Error bound validation</text>

  <!-- Correctness vs Performance matrix -->
  <rect x="650" y="220" width="280" height="200" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="790" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f172a">Detection Matrix</text>

  <rect x="665" y="260" width="250" height="30" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="790" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#991b1b">Skew: Monitor top-key volume &amp; state size per worker</text>

  <rect x="665" y="295" width="250" height="30" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="790" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9a3412">Late data: Track watermark lag vs event-time SLAs</text>

  <rect x="665" y="330" width="250" height="30" rx="4" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
  <text x="790" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#854d0e">Duplicates: Reconcile output counts vs source totals</text>

  <rect x="665" y="365" width="250" height="30" rx="4" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="790" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3730a3">Non-determinism: Rerun with same inputs, diff output</text>

  <!-- Bottom summary banner -->
  <rect x="30" y="370" width="590" height="60" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="325" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#166534">Key Principle: Correctness Over Performance</text>
  <text x="325" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#15803d">A fast pipeline that produces wrong numbers is worse than a slow one. Always validate output against trusted invariants, and publish error bounds for approximate results.</text>
</svg>