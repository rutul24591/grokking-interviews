<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Pipeline Failure Modes and Recovery Patterns</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Source failures, transform errors, data quality issues, and output failures require specific recovery strategies</text>

  <!-- Failure 1 -->
  <rect x="30" y="80" width="280" height="110" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="170" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991b1b">1. Source Unavailable</text>
  <text x="170" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Source system down, API rate</text>
  <text x="170" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">limited, or credentials expired.</text>
  <text x="170" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f1d1d">Pipeline cannot extract data.</text>
  <rect x="50" y="168" width="240" height="18" rx="3" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="170" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">Mitigate: retry with backoff, alert ops</text>

  <!-- Failure 2 -->
  <rect x="340" y="80" width="280" height="110" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#9a3412">2. Schema Drift</text>
  <text x="480" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">Source column changed, added,</text>
  <text x="480" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">or removed. Transform logic</text>
  <text x="480" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c2d12">breaks on unexpected schema.</text>
  <rect x="360" y="168" width="240" height="18" rx="3" fill="#ffedd5" stroke="#fed7aa" stroke-width="1"/>
  <text x="480" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9a3412">Mitigate: schema validation on ingest</text>

  <!-- Failure 3 -->
  <rect x="650" y="80" width="280" height="110" rx="8" fill="#fefce8" stroke="#fef08a" stroke-width="1.5"/>
  <text x="790" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#854d0e">3. Transform Error</text>
  <text x="790" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">Join fails, UDF crashes, or OOM</text>
  <text x="790" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">during aggregation. Partial output</text>
  <text x="790" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#713f12">may be written to output.</text>
  <rect x="670" y="168" width="240" height="18" rx="3" fill="#fef9c3" stroke="#fef08a" stroke-width="1"/>
  <text x="790" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#854d0e">Mitigate: atomic writes, temp output</text>

  <!-- Recovery patterns -->
  <rect x="30" y="220" width="440" height="190" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="250" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0369a1">Recovery: Idempotent Rerun</text>

  <rect x="50" y="265" width="400" height="35" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Step 1: Identify failure point in DAG</text>
  <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Which task failed? What was the error?</text>

  <rect x="50" y="306" width="400" height="35" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Step 2: Fix root cause</text>
  <text x="250" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Restore source, update schema, fix logic</text>

  <rect x="50" y="347" width="400" height="35" rx="6" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
  <text x="250" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Step 3: Rerun from failure point</text>
  <text x="250" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">Idempotent rerun produces same output</text>

  <!-- Monitoring checklist -->
  <rect x="500" y="220" width="430" height="190" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="715" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Pipeline Health Checklist</text>

  <rect x="520" y="265" width="390" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Freshness: data arrived within expected SLA window</text>

  <rect x="520" y="295" width="390" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Volume: row count within expected range (not 2x or 0.5x)</text>

  <rect x="520" y="325" width="390" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Schema: output schema matches expected, no unexpected changes</text>

  <rect x="520" y="355" width="390" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Quality: null rates, duplicate rates, and invariant checks pass</text>

  <rect x="520" y="385" width="390" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Duration: pipeline completed within expected time window</text>
</svg>