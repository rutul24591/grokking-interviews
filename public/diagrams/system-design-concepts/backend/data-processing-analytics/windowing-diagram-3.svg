<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Windowed Aggregation: State, Triggers, and Cleanup</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Windowed aggregations maintain state per window, emit results on triggers, and clean up state after window closes</text>

  <!-- Window lifecycle -->
  <rect x="30" y="80" width="900" height="140" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Window Lifecycle</text>

  <!-- Stage 1: Create -->
  <rect x="50" y="125" width="190" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="145" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">1. Create Window</text>
  <text x="145" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">First event arrives</text>
  <text x="145" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Allocate state for window</text>
  <text x="145" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Initialize accumulators</text>

  <!-- Arrow -->
  <text x="250" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">&#x2192;</text>

  <!-- Stage 2: Accumulate -->
  <rect x="270" y="125" width="190" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="365" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">2. Accumulate</text>
  <text x="365" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Events arrive in window</text>
  <text x="365" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Update accumulators</text>
  <text x="365" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Optionally emit early results</text>

  <!-- Arrow -->
  <text x="470" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">&#x2192;</text>

  <!-- Stage 3: Trigger -->
  <rect x="490" y="125" width="190" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="585" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">3. Trigger / Emit</text>
  <text x="585" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Watermark passes window end</text>
  <text x="585" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Compute final result</text>
  <text x="585" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Emit to downstream operator</text>

  <!-- Arrow -->
  <text x="690" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#64748b">&#x2192;</text>

  <!-- Stage 4: Cleanup -->
  <rect x="710" y="125" width="190" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="805" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3730a3">4. Cleanup</text>
  <text x="805" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Window state evicted</text>
  <text x="805" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Memory freed</text>
  <text x="805" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Allowed lateness period</text>

  <!-- Detailed example -->
  <rect x="30" y="250" width="900" height="190" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">Example: 5-Minute Tumbling Window Count</text>

  <!-- Timeline with events -->
  <text x="80" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Events:</text>
  <line x1="150" y1="310" x2="880" y2="310" stroke="#64748b" stroke-width="1"/>

  <circle cx="200" cy="310" r="6" fill="#3b82f6"/>
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:01</text>
  <circle cx="260" cy="310" r="6" fill="#3b82f6"/>
  <text x="260" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:02</text>
  <circle cx="320" cy="310" r="6" fill="#3b82f6"/>
  <text x="320" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:03</text>
  <circle cx="380" cy="310" r="6" fill="#3b82f6"/>
  <text x="380" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:04</text>
  <circle cx="440" cy="310" r="6" fill="#3b82f6"/>
  <text x="440" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:05</text>
  <circle cx="500" cy="310" r="6" fill="#3b82f6"/>
  <text x="500" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:06</text>
  <circle cx="560" cy="310" r="6" fill="#3b82f6"/>
  <text x="560" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">10:07</text>
  <circle cx="620" cy="310" r="6" fill="#f59e0b"/>
  <text x="620" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#92400e">10:03 (LATE)</text>

  <!-- Window boundaries -->
  <rect x="180" y="295" width="280" height="30" rx="3" fill="#3b82f6" opacity="0.1"/>
  <text x="320" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">Window 1: 10:00-10:05 (count=5 → 6 with late)</text>
  <rect x="480" y="295" width="200" height="30" rx="3" fill="#3b82f6" opacity="0.1"/>
  <text x="580" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">Window 2: 10:05-10:10 (count=2)</text>

  <!-- Result emission -->
  <text x="80" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Results:</text>
  <rect x="150" y="355" width="200" height="25" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="250" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">Result 1: count=5 (early)</text>

  <rect x="370" y="355" width="200" height="25" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="470" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">Result 1: count=5 (final)</text>

  <rect x="590" y="355" width="200" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="690" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#92400e">Result 1: count=6 (corrected)</text>

  <rect x="150" y="390" width="200" height="25" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="250" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">Result 2: count=2 (final)</text>

  <rect x="370" y="390" width="200" height="25" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="470" y="407" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">Result 2: count=2 (late)</text>

  <text x="700" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Late event</text>
  <text x="700" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">within grace period</text>
  <text x="700" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">triggers correction</text>
</svg>