<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Ordering vs Throughput: The Fundamental Trade-off</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Strict ordering reduces parallelism; maximum throughput sacrifices ordering guarantees</text>

  <!-- Spectrum bar -->
  <rect x="60" y="80" width="840" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="60" y="80" width="140" height="40" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="130" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534">Strict Order</text>
  <rect x="200" y="80" width="160" height="40" rx="0" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="280" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">Per-Key Order</text>
  <rect x="360" y="80" width="160" height="40" rx="0" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="440" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#854d0e">Partial Order</text>
  <rect x="520" y="80" width="160" height="40" rx="0" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="600" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">Best-Effort Order</text>
  <rect x="680" y="80" width="220" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="790" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#991b1b">No Ordering</text>

  <!-- Trade-off analysis -->
  <rect x="30" y="150" width="440" height="280" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="250" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Ordering Guarantees</text>

  <rect x="50" y="195" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Single partition: total order, lowest throughput</text>

  <rect x="50" y="231" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Per-key partition: order per key, moderate throughput</text>

  <rect x="50" y="267" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Sequence numbers: order enforced at consumer</text>

  <rect x="50" y="303" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Idempotent updates: order not required</text>

  <rect x="50" y="339" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Version numbers: reject stale updates</text>

  <rect x="50" y="375" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="245" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Causal ordering: only causally related events ordered</text>

  <!-- Throughput analysis -->
  <rect x="500" y="150" width="430" height="280" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="715" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">Throughput Implications</text>

  <rect x="520" y="195" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Single partition: 1x throughput (bottleneck)</text>

  <rect x="520" y="231" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Per-key partition: Nx throughput (N = number of keys)</text>

  <rect x="520" y="267" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Best-effort: parallel processing, reorder at consumer</text>

  <rect x="520" y="303" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">No ordering: maximum parallelism, no reordering cost</text>

  <rect x="520" y="339" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Key insight: ordering is a throughput tax</text>

  <rect x="520" y="375" width="390" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Design: order only what is causally necessary</text>

  <!-- Bottom recommendation -->
  <rect x="30" y="440" width="900" height="16" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#92400e">Recommendation: use per-key partitioning with idempotent state updates for the best balance</text>
</svg>