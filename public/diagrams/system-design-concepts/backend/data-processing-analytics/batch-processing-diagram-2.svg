<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440">
  <rect width="960" height="440" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Batch vs Stream Processing Trade-offs</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Choosing between batch and streaming based on latency, cost, complexity, and correctness requirements</text>

  <!-- Batch column -->
  <rect x="30" y="80" width="430" height="320" rx="10" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
  <text x="245" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0369a1">Batch Processing</text>

  <text x="50" y="140" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Latency:</text>
  <text x="140" y="140" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Minutes to hours</text>
  <text x="50" y="162" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Correctness:</text>
  <text x="170" y="162" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Exact, deterministic, reproducible</text>
  <text x="50" y="184" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Cost:</text>
  <text x="120" y="184" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Pay for compute time only when running</text>
  <text x="50" y="206" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Complexity:</text>
  <text x="170" y="206" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Simple to reason about, debug</text>
  <text x="50" y="228" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Reprocessing:</text>
  <text x="170" y="228" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Trivial — rerun on full dataset</text>
  <text x="50" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Best for:</text>
  <text x="140" y="250" font-family="Arial, sans-serif" font-size="11" fill="#64748b">ETL, reporting, billing, ML training,</text>
  <text x="140" y="266" font-family="Arial, sans-serif" font-size="11" fill="#64748b">compliance, reconciliation</text>

  <rect x="50" y="290" width="390" height="90" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="245" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Strengths</text>
  <text x="245" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">&#x2022; Easy to reason about: entire dataset at once</text>
  <text x="245" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">&#x2022; Reproducible: same input and code = same output</text>
  <text x="245" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">&#x2022; Cost-efficient for large, scheduled workloads</text>

  <!-- Stream column -->
  <rect x="500" y="80" width="430" height="320" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400e">Stream Processing</text>

  <text x="520" y="140" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Latency:</text>
  <text x="620" y="140" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Milliseconds to seconds</text>
  <text x="520" y="162" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Correctness:</text>
  <text x="640" y="162" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Eventually consistent, late data handling</text>
  <text x="520" y="184" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Cost:</text>
  <text x="590" y="184" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Always-on infrastructure cost</text>
  <text x="520" y="206" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Complexity:</text>
  <text x="640" y="206" font-family="Arial, sans-serif" font-size="11" fill="#64748b">State management, watermarks, ordering</text>
  <text x="520" y="228" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Reprocessing:</text>
  <text x="640" y="228" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Requires replayable log (Kafka)</text>
  <text x="520" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Best for:</text>
  <text x="610" y="250" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Alerting, real-time dashboards,</text>
  <text x="610" y="266" font-family="Arial, sans-serif" font-size="11" fill="#64748b">fraud detection, personalization</text>

  <rect x="520" y="290" width="390" height="90" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="715" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Strengths</text>
  <text x="715" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">&#x2022; Low latency: results available as events arrive</text>
  <text x="715" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">&#x2022; Incremental: only process new events, not full data</text>
  <text x="715" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">&#x2022; Enables real-time decisions and reactions</text>

  <!-- Bottom comparison note -->
  <rect x="30" y="410" width="900" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="480" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">Hybrid approach: batch for accuracy and backfills, streaming for low-latency operational visibility</text>
</svg>