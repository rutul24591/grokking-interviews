<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460">
  <rect width="960" height="460" fill="#f8fafc"/>
  <text x="480" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Kappa Architecture: When It Works and When It Doesn't</text>
  <text x="480" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Kappa simplifies architecture but has limitations for complex batch computations and historical joins</text>

  <!-- When Kappa Works -->
  <rect x="30" y="80" width="430" height="350" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="245" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">Kappa Works Well When...</text>

  <rect x="50" y="125" width="390" height="45" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="245" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">&#x2713; Event-time processing is the primary workload</text>
  <text x="245" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Real-time aggregations, windowed counts, stream joins</text>

  <rect x="50" y="180" width="390" height="45" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="245" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">&#x2713; Reprocessing is occasional and bounded</text>
  <text x="245" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Bug fixes, logic updates, small historical windows</text>

  <rect x="50" y="235" width="390" height="45" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="245" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">&#x2713; Log retention is sufficient for reprocessing needs</text>
  <text x="245" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Days to weeks of retention in Kafka/Pulsar</text>

  <rect x="50" y="290" width="390" height="45" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="245" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">&#x2713; Team wants to maintain one codebase</text>
  <text x="245" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">No separate batch and streaming code paths</text>

  <rect x="50" y="345" width="390" height="45" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="245" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#166534">&#x2713; Stateful stream processing is well-supported</text>
  <text x="245" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Flink, Kafka Streams, or similar framework available</text>

  <!-- When Lambda is Better -->
  <rect x="500" y="80" width="430" height="350" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="715" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#991b1b">Lambda is Better When...</text>

  <rect x="520" y="125" width="390" height="45" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">&#x2717; Heavy historical joins and aggregations</text>
  <text x="715" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Reprocessing terabytes from months ago is expensive</text>

  <rect x="520" y="180" width="390" height="45" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">&#x2717; Log retention cannot cover reprocessing window</text>
  <text x="715" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Need months of history but can only store days</text>

  <rect x="520" y="235" width="390" height="45" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">&#x2717; Complex batch computations (ML training)</text>
  <text x="715" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Iterative algorithms are not stream-friendly</text>

  <rect x="520" y="290" width="390" height="45" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">&#x2717; Ad-hoc historical analysis is common</text>
  <text x="715" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Analysts need SQL access to full historical data</text>

  <rect x="520" y="345" width="390" height="45" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#991b1b">&#x2717; Reprocessing is frequent and large-scale</text>
  <text x="715" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Batch is more efficient for large reprocessing jobs</text>
</svg>