<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Resource hints taxonomy showing preload, prefetch, preconnect, dns-prefetch, and modulepreload with their use cases and network cost" font-family="system-ui, sans-serif">
  <rect width="900" height="520" fill="#f3f1f8" rx="8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Resource Hints Taxonomy</text>

  <!-- Header row -->
  <rect x="30" y="55" width="160" height="32" rx="4" fill="#6d5bd0"/>
  <text x="110" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Hint Type</text>
  <rect x="200" y="55" width="240" height="32" rx="4" fill="#6d5bd0"/>
  <text x="320" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">What It Does</text>
  <rect x="450" y="55" width="210" height="32" rx="4" fill="#6d5bd0"/>
  <text x="555" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Use Case</text>
  <rect x="670" y="55" width="200" height="32" rx="4" fill="#6d5bd0"/>
  <text x="770" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Cost / Priority</text>

  <!-- dns-prefetch -->
  <rect x="30" y="97" width="160" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="110" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">dns-prefetch</text>
  <text x="110" y="140" text-anchor="middle" font-size="10" fill="#1a1822">rel="dns-prefetch"</text>
  <text x="110" y="155" text-anchor="middle" font-size="10" fill="#1a1822">Connection: DNS only</text>
  <rect x="200" y="97" width="240" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="320" y="122" text-anchor="middle" font-size="11" fill="#1a1822">Resolves DNS for an</text>
  <text x="320" y="138" text-anchor="middle" font-size="11" fill="#1a1822">external origin. ~1KB UDP</text>
  <text x="320" y="154" text-anchor="middle" font-size="11" fill="#1a1822">packet, saves 20-120ms.</text>
  <rect x="450" y="97" width="210" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="555" y="122" text-anchor="middle" font-size="11" fill="#1a1822">Third-party analytics,</text>
  <text x="555" y="138" text-anchor="middle" font-size="11" fill="#1a1822">CDN domains, API hosts</text>
  <text x="555" y="154" text-anchor="middle" font-size="11" fill="#1a1822">you will contact later.</text>
  <rect x="670" y="97" width="200" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="770" y="126" text-anchor="middle" font-size="11" fill="#1a1822">Negligible cost.</text>
  <text x="770" y="146" text-anchor="middle" font-size="11" fill="#1a1822">Use liberally.</text>

  <!-- preconnect -->
  <rect x="30" y="177" width="160" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="110" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">preconnect</text>
  <text x="110" y="220" text-anchor="middle" font-size="10" fill="#1a1822">rel="preconnect"</text>
  <text x="110" y="235" text-anchor="middle" font-size="10" fill="#1a1822">DNS + TCP + TLS</text>
  <rect x="200" y="177" width="240" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="320" y="202" text-anchor="middle" font-size="11" fill="#1a1822">Full connection setup:</text>
  <text x="320" y="218" text-anchor="middle" font-size="11" fill="#1a1822">DNS + TCP + TLS handshake.</text>
  <text x="320" y="234" text-anchor="middle" font-size="11" fill="#1a1822">Saves 100-300ms per origin.</text>
  <rect x="450" y="177" width="210" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="555" y="202" text-anchor="middle" font-size="11" fill="#1a1822">Google Fonts, critical</text>
  <text x="555" y="218" text-anchor="middle" font-size="11" fill="#1a1822">API origins. Limit to</text>
  <text x="555" y="234" text-anchor="middle" font-size="11" fill="#1a1822">2-4 origins max.</text>
  <rect x="670" y="177" width="200" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="770" y="206" text-anchor="middle" font-size="11" fill="#1a1822">Low-medium cost.</text>
  <text x="770" y="226" text-anchor="middle" font-size="11" fill="#1a1822">Holds socket open 10s.</text>

  <!-- preload -->
  <rect x="30" y="257" width="160" height="70" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="110" y="282" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">preload</text>
  <text x="110" y="300" text-anchor="middle" font-size="10" fill="#1a1822">rel="preload"</text>
  <text x="110" y="315" text-anchor="middle" font-size="10" fill="#1a1822">Full fetch, high priority</text>
  <rect x="200" y="257" width="240" height="70" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="320" y="282" text-anchor="middle" font-size="11" fill="#1a1822">Fetches resource NOW for</text>
  <text x="320" y="298" text-anchor="middle" font-size="11" fill="#1a1822">current navigation. Must</text>
  <text x="320" y="314" text-anchor="middle" font-size="11" fill="#1a1822">specify as="type" attribute.</text>
  <rect x="450" y="257" width="210" height="70" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="555" y="282" text-anchor="middle" font-size="11" fill="#1a1822">Critical fonts, hero</text>
  <text x="555" y="298" text-anchor="middle" font-size="11" fill="#1a1822">images, above-fold CSS,</text>
  <text x="555" y="314" text-anchor="middle" font-size="11" fill="#1a1822">late-discovered scripts.</text>
  <rect x="670" y="257" width="200" height="70" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="770" y="282" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="bold">High cost if unused!</text>
  <text x="770" y="302" text-anchor="middle" font-size="11" fill="#1a1822">Console warning if not</text>
  <text x="770" y="318" text-anchor="middle" font-size="11" fill="#1a1822">consumed within 3s.</text>

  <!-- prefetch -->
  <rect x="30" y="337" width="160" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="110" y="362" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">prefetch</text>
  <text x="110" y="380" text-anchor="middle" font-size="10" fill="#1a1822">rel="prefetch"</text>
  <text x="110" y="395" text-anchor="middle" font-size="10" fill="#1a1822">Full fetch, low priority</text>
  <rect x="200" y="337" width="240" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="320" y="362" text-anchor="middle" font-size="11" fill="#1a1822">Fetches resource for FUTURE</text>
  <text x="320" y="378" text-anchor="middle" font-size="11" fill="#1a1822">navigations. Low priority,</text>
  <text x="320" y="394" text-anchor="middle" font-size="11" fill="#1a1822">runs during idle time.</text>
  <rect x="450" y="337" width="210" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="555" y="362" text-anchor="middle" font-size="11" fill="#1a1822">Next-page JS bundles,</text>
  <text x="555" y="378" text-anchor="middle" font-size="11" fill="#1a1822">route-based code splits,</text>
  <text x="555" y="394" text-anchor="middle" font-size="11" fill="#1a1822">likely navigation targets.</text>
  <rect x="670" y="337" width="200" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="770" y="366" text-anchor="middle" font-size="11" fill="#1a1822">Medium cost. Wasted</text>
  <text x="770" y="386" text-anchor="middle" font-size="11" fill="#1a1822">if user never navigates.</text>

  <!-- modulepreload -->
  <rect x="30" y="417" width="160" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="110" y="442" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">modulepreload</text>
  <text x="110" y="460" text-anchor="middle" font-size="10" fill="#1a1822">rel="modulepreload"</text>
  <text x="110" y="475" text-anchor="middle" font-size="10" fill="#1a1822">Fetch + parse + compile</text>
  <rect x="200" y="417" width="240" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="320" y="442" text-anchor="middle" font-size="11" fill="#1a1822">Like preload for ES modules.</text>
  <text x="320" y="458" text-anchor="middle" font-size="11" fill="#1a1822">Also parses &amp; compiles the</text>
  <text x="320" y="474" text-anchor="middle" font-size="11" fill="#1a1822">module into the module map.</text>
  <rect x="450" y="417" width="210" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="555" y="442" text-anchor="middle" font-size="11" fill="#1a1822">ES module dependency</text>
  <text x="555" y="458" text-anchor="middle" font-size="11" fill="#1a1822">chains, Vite production</text>
  <text x="555" y="474" text-anchor="middle" font-size="11" fill="#1a1822">builds, import maps.</text>
  <rect x="670" y="417" width="200" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="770" y="446" text-anchor="middle" font-size="11" fill="#1a1822">High cost. Triggers</text>
  <text x="770" y="466" text-anchor="middle" font-size="11" fill="#1a1822">full module graph walk.</text>

  <!-- Legend -->
  <rect x="30" y="497" width="12" height="12" rx="2" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="48" y="508" font-size="10" fill="#1a1822">= Current page resource (mandatory)</text>
  <rect x="280" y="497" width="12" height="12" rx="2" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="298" y="508" font-size="10" fill="#1a1822">= Speculative / future resource (optional)</text>
</svg>