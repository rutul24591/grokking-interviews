<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Image format decision tree showing when to use JPEG, PNG, WebP, AVIF, or SVG based on content type" font-family="system-ui, sans-serif">
  <rect width="900" height="520" fill="#f3f1f8" rx="8"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1822">Image Format Decision Tree</text>

  <!-- Start node -->
  <rect x="340" y="50" width="220" height="40" rx="20" fill="#6d5bd0"/>
  <text x="450" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">What type of image?</text>

  <!-- Branch lines from start -->
  <line x1="370" y1="90" x2="130" y2="130" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="450" y1="90" x2="450" y2="130" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="530" y1="90" x2="770" y2="130" stroke="#6d5bd0" stroke-width="2"/>

  <!-- Left branch: Vector / Icon -->
  <rect x="50" y="130" width="160" height="36" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="130" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Vector / Icon / Logo</text>
  <line x1="130" y1="166" x2="130" y2="196" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="196" width="140" height="50" rx="6" fill="#6d5bd0"/>
  <text x="130" y="218" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">SVG</text>
  <text x="130" y="236" text-anchor="middle" font-size="10" fill="#ffffff">Scalable, tiny size</text>

  <!-- Middle branch: Photograph -->
  <rect x="360" y="130" width="180" height="36" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Photograph / Complex</text>
  <line x1="450" y1="166" x2="450" y2="196" stroke="#6d5bd0" stroke-width="2"/>

  <rect x="350" y="196" width="200" height="36" rx="18" fill="#6d5bd0"/>
  <text x="450" y="219" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Browser supports AVIF?</text>

  <!-- AVIF yes -->
  <line x1="390" y1="232" x2="310" y2="262" stroke="#6d5bd0" stroke-width="2"/>
  <text x="338" y="253" font-size="10" fill="#1a1822" font-weight="600">Yes</text>
  <rect x="230" y="262" width="140" height="50" rx="6" fill="#6d5bd0"/>
  <text x="300" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">AVIF</text>
  <text x="300" y="302" text-anchor="middle" font-size="10" fill="#ffffff">Best compression</text>

  <!-- AVIF no -->
  <line x1="510" y1="232" x2="580" y2="262" stroke="#6d5bd0" stroke-width="2"/>
  <text x="552" y="253" font-size="10" fill="#1a1822" font-weight="600">No</text>
  <rect x="510" y="262" width="200" height="36" rx="18" fill="#6d5bd0"/>
  <text x="610" y="285" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Browser supports WebP?</text>

  <!-- WebP yes -->
  <line x1="560" y1="298" x2="500" y2="330" stroke="#6d5bd0" stroke-width="2"/>
  <text x="518" y="320" font-size="10" fill="#1a1822" font-weight="600">Yes</text>
  <rect x="420" y="330" width="140" height="50" rx="6" fill="#6d5bd0"/>
  <text x="490" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">WebP</text>
  <text x="490" y="370" text-anchor="middle" font-size="10" fill="#ffffff">Good compression</text>

  <!-- WebP no -->
  <line x1="660" y1="298" x2="710" y2="330" stroke="#6d5bd0" stroke-width="2"/>
  <text x="692" y="320" font-size="10" fill="#1a1822" font-weight="600">No</text>
  <rect x="640" y="330" width="140" height="50" rx="6" fill="#6d5bd0"/>
  <text x="710" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">JPEG</text>
  <text x="710" y="370" text-anchor="middle" font-size="10" fill="#ffffff">Universal fallback</text>

  <!-- Right branch: Transparency / Animation -->
  <rect x="690" y="130" width="170" height="36" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="775" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Needs transparency?</text>

  <line x1="735" y1="166" x2="680" y2="196" stroke="#6d5bd0" stroke-width="2"/>
  <text x="694" y="187" font-size="10" fill="#1a1822" font-weight="600">Yes</text>
  <line x1="815" y1="166" x2="850" y2="196" stroke="#6d5bd0" stroke-width="2"/>
  <text x="842" y="187" font-size="10" fill="#1a1822" font-weight="600">Animation</text>

  <!-- Transparency branch -->
  <rect x="600" y="196" width="160" height="36" rx="18" fill="#6d5bd0"/>
  <text x="680" y="219" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Few colors (&amp;lt;256)?</text>

  <line x1="640" y1="232" x2="610" y2="262" stroke="#6d5bd0" stroke-width="2"/>
  <text x="612" y="253" font-size="10" fill="#1a1822" font-weight="600">Yes</text>
  <rect x="540" y="262" width="130" height="50" rx="6" fill="#6d5bd0"/>
  <text x="605" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">PNG-8</text>
  <text x="605" y="302" text-anchor="middle" font-size="10" fill="#ffffff">Small, indexed</text>

  <line x1="720" y1="232" x2="750" y2="262" stroke="#6d5bd0" stroke-width="2"/>
  <text x="744" y="253" font-size="10" fill="#1a1822" font-weight="600">No</text>
  <rect x="690" y="262" width="130" height="50" rx="6" fill="#6d5bd0"/>
  <text x="755" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">PNG-24</text>
  <text x="755" y="302" text-anchor="middle" font-size="10" fill="#ffffff">Full alpha</text>

  <!-- Animation node -->
  <rect x="790" y="196" width="100" height="50" rx="6" fill="#6d5bd0"/>
  <text x="840" y="218" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">WebP</text>
  <text x="840" y="236" text-anchor="middle" font-size="10" fill="#ffffff">or MP4 video</text>

  <!-- Legend -->
  <rect x="30" y="420" width="840" height="85" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="50" y="444" font-size="12" font-weight="700" fill="#1a1822">Format Summary:</text>
  <text x="50" y="464" font-size="11" fill="#1a1822"><tspan font-weight="600">AVIF</tspan> — 50% smaller than JPEG, excellent quality, slower encode. <tspan font-weight="600">WebP</tspan> — 25-35% smaller than JPEG, wide support (97%+).</text>
  <text x="50" y="482" font-size="11" fill="#1a1822"><tspan font-weight="600">JPEG</tspan> — Universal, lossy, no transparency. <tspan font-weight="600">PNG</tspan> — Lossless, transparency, larger files. <tspan font-weight="600">SVG</tspan> — Vector, resolution-independent.</text>
  <text x="50" y="500" font-size="11" fill="#1a1822"><tspan font-weight="600">Key rule:</tspan> Always serve modern formats (AVIF/WebP) with &amp;lt;picture&amp;gt; fallback to JPEG/PNG for maximum performance.</text>
</svg>