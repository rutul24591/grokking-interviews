<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Static asset hosting architecture showing S3 or GCS origin, CloudFront or Cloud CDN edge layer, and client browser layers" font-family="system-ui, sans-serif">
  <rect width="900" height="520" fill="#f3f1f8" rx="8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Static Asset Hosting Architecture</text>

  <!-- Client Layer -->
  <rect x="30" y="60" width="840" height="100" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="60" y="85" font-size="13" font-weight="bold" fill="#6d5bd0">CLIENT LAYER</text>

  <rect x="60" y="100" width="130" height="45" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="125" y="127" text-anchor="middle" font-size="11" fill="#1a1822">Browser Cache (L1)</text>

  <rect x="220" y="100" width="130" height="45" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="285" y="120" text-anchor="middle" font-size="11" fill="#1a1822">Service Worker</text>
  <text x="285" y="135" text-anchor="middle" font-size="10" fill="#6d5bd0">Cache API</text>

  <rect x="380" y="100" width="140" height="45" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="120" text-anchor="middle" font-size="11" fill="#1a1822">SRI Verification</text>
  <text x="450" y="135" text-anchor="middle" font-size="10" fill="#6d5bd0">integrity=sha384-...</text>

  <rect x="550" y="100" width="140" height="45" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="620" y="120" text-anchor="middle" font-size="11" fill="#1a1822">CORS Preflight</text>
  <text x="620" y="135" text-anchor="middle" font-size="10" fill="#6d5bd0">cross-origin assets</text>

  <rect x="720" y="100" width="130" height="45" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="785" y="120" text-anchor="middle" font-size="11" fill="#1a1822">Brotli/Gzip</text>
  <text x="785" y="135" text-anchor="middle" font-size="10" fill="#6d5bd0">Accept-Encoding</text>

  <!-- Arrow down -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
  <path d="M 450 160 L 450 185" stroke="#6d5bd0" stroke-width="2" marker-end="url(#ah)"/>
  <text x="470" y="178" font-size="10" fill="#6d5bd0">Cache MISS</text>

  <!-- Edge Layer -->
  <rect x="30" y="190" width="840" height="120" rx="8" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="60" y="215" font-size="13" font-weight="bold" fill="#ffffff">EDGE LAYER (CDN)</text>

  <rect x="60" y="230" width="150" height="65" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="135" y="250" text-anchor="middle" font-size="11" fill="#ffffff">CloudFront PoP</text>
  <text x="135" y="266" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">US-East (Virginia)</text>
  <text x="135" y="282" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Edge Cache (L2)</text>

  <rect x="240" y="230" width="150" height="65" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="315" y="250" text-anchor="middle" font-size="11" fill="#ffffff">CloudFront PoP</text>
  <text x="315" y="266" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">EU-West (Dublin)</text>
  <text x="315" y="282" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Edge Cache (L2)</text>

  <rect x="420" y="230" width="150" height="65" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="495" y="250" text-anchor="middle" font-size="11" fill="#ffffff">Cloud CDN PoP</text>
  <text x="495" y="266" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">AP-South (Mumbai)</text>
  <text x="495" y="282" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Edge Cache (L2)</text>

  <rect x="600" y="230" width="250" height="65" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="725" y="250" text-anchor="middle" font-size="11" fill="#ffffff">Edge Functions</text>
  <text x="725" y="266" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Header rewriting, A/B routing</text>
  <text x="725" y="282" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Geo-based content selection</text>

  <!-- Arrow down -->
  <path d="M 450 310 L 450 340" stroke="#6d5bd0" stroke-width="2" marker-end="url(#ah)"/>
  <text x="470" y="330" font-size="10" fill="#6d5bd0">Cache MISS</text>

  <!-- Origin Layer -->
  <rect x="30" y="345" width="840" height="160" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="60" y="370" font-size="13" font-weight="bold" fill="#6d5bd0">ORIGIN LAYER</text>

  <rect x="60" y="385" width="180" height="105" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="150" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">S3 / GCS Bucket</text>
  <text x="150" y="425" text-anchor="middle" font-size="10" fill="#6d5bd0">Primary Origin</text>
  <line x1="80" y1="435" x2="220" y2="435" stroke="#d7d1e6" stroke-width="1"/>
  <text x="150" y="452" text-anchor="middle" font-size="10" fill="#1a1822">Bucket Policy: CDN-only</text>
  <text x="150" y="467" text-anchor="middle" font-size="10" fill="#1a1822">Versioned objects</text>
  <text x="150" y="482" text-anchor="middle" font-size="10" fill="#1a1822">Cross-region replication</text>

  <path d="M 240 437 L 280 437" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="280" y="385" width="180" height="105" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="370" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">Origin Shield</text>
  <text x="370" y="425" text-anchor="middle" font-size="10" fill="#6d5bd0">Regional Cache (L3)</text>
  <line x1="300" y1="435" x2="440" y2="435" stroke="#d7d1e6" stroke-width="1"/>
  <text x="370" y="452" text-anchor="middle" font-size="10" fill="#1a1822">Collapse duplicate fetches</text>
  <text x="370" y="467" text-anchor="middle" font-size="10" fill="#1a1822">Reduce origin load</text>
  <text x="370" y="482" text-anchor="middle" font-size="10" fill="#1a1822">Single upstream request</text>

  <path d="M 460 437 L 500 437" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#ah)"/>

  <rect x="500" y="385" width="170" height="105" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="585" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">Asset Manifest</text>
  <text x="585" y="425" text-anchor="middle" font-size="10" fill="#6d5bd0">manifest.json</text>
  <line x1="520" y1="435" x2="650" y2="435" stroke="#d7d1e6" stroke-width="1"/>
  <text x="585" y="452" text-anchor="middle" font-size="10" fill="#1a1822">file &amp;rarr; hashed path</text>
  <text x="585" y="467" text-anchor="middle" font-size="10" fill="#1a1822">SRI hashes</text>
  <text x="585" y="482" text-anchor="middle" font-size="10" fill="#1a1822">Atomic deployments</text>

  <rect x="690" y="385" width="160" height="105" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="770" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">Monitoring</text>
  <text x="770" y="425" text-anchor="middle" font-size="10" fill="#6d5bd0">Observability</text>
  <line x1="710" y1="435" x2="830" y2="435" stroke="#d7d1e6" stroke-width="1"/>
  <text x="770" y="452" text-anchor="middle" font-size="10" fill="#1a1822">Cache hit ratio</text>
  <text x="770" y="467" text-anchor="middle" font-size="10" fill="#1a1822">Origin error rate</text>
  <text x="770" y="482" text-anchor="middle" font-size="10" fill="#1a1822">p50/p95/p99 latency</text>
</svg>