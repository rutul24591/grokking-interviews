<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="FOIT vs FOUT vs FOFT timeline comparison showing what the user sees during font loading for each strategy" font-family="system-ui, sans-serif">
  <rect width="900" height="520" fill="#f3f1f8" rx="12"/>
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">FOIT vs FOUT vs FOFT — User Experience Timeline</text>

  <!-- Time axis -->
  <line x1="140" y1="480" x2="860" y2="480" stroke="#d7d1e6" stroke-width="2"/>
  <text x="140" y="510" text-anchor="middle" font-size="11" fill="#1a1822">0 ms</text>
  <text x="380" y="510" text-anchor="middle" font-size="11" fill="#1a1822">~100 ms</text>
  <text x="620" y="510" text-anchor="middle" font-size="11" fill="#1a1822">~1000 ms</text>
  <text x="860" y="510" text-anchor="middle" font-size="11" fill="#1a1822">~3000 ms</text>
  <text x="500" y="510" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">Font Download Duration</text>

  <!-- Tick marks -->
  <line x1="140" y1="475" x2="140" y2="485" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="380" y1="475" x2="380" y2="485" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="620" y1="475" x2="620" y2="485" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="860" y1="475" x2="860" y2="485" stroke="#1a1822" stroke-width="1.5"/>

  <!-- FOIT Row -->
  <text x="70" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">FOIT</text>
  <text x="70" y="122" text-anchor="middle" font-size="9" fill="#1a1822">Flash of</text>
  <text x="70" y="133" text-anchor="middle" font-size="9" fill="#1a1822">Invisible Text</text>

  <!-- FOIT: Invisible period -->
  <rect x="140" y="75" width="480" height="70" rx="6" fill="#e8e4f0" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="380" y="106" text-anchor="middle" font-size="13" fill="#888" font-style="italic">Invisible text — nothing rendered</text>
  <text x="380" y="124" text-anchor="middle" font-size="10" fill="#888">(browser hides text up to 3s)</text>

  <!-- FOIT: Custom font appears -->
  <rect x="620" y="75" width="240" height="70" rx="6" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="740" y="106" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">Custom Font</text>
  <text x="740" y="124" text-anchor="middle" font-size="10" fill="#ffffff">rendered</text>

  <!-- Arrow -->
  <path d="M618,110 L624,110" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- FOUT Row -->
  <text x="70" y="225" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">FOUT</text>
  <text x="70" y="242" text-anchor="middle" font-size="9" fill="#1a1822">Flash of</text>
  <text x="70" y="253" text-anchor="middle" font-size="9" fill="#1a1822">Unstyled Text</text>

  <!-- FOUT: Fallback font -->
  <rect x="140" y="195" width="480" height="70" rx="6" fill="#fff3cd" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="380" y="226" text-anchor="middle" font-size="13" fill="#1a1822" font-weight="500">System/Fallback Font visible</text>
  <text x="380" y="244" text-anchor="middle" font-size="10" fill="#1a1822">(content readable immediately)</text>

  <!-- FOUT: Swap to custom font -->
  <rect x="620" y="195" width="240" height="70" rx="6" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="740" y="226" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">Custom Font</text>
  <text x="740" y="244" text-anchor="middle" font-size="10" fill="#ffffff">swaps in (reflow!)</text>

  <!-- FOUT swap flash indicator -->
  <rect x="614" y="195" width="12" height="70" rx="2" fill="#ff6b35"/>
  <text x="620" y="278" text-anchor="middle" font-size="9" fill="#ff6b35" font-weight="600">CLS</text>

  <!-- FOFT Row -->
  <text x="70" y="345" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">FOFT</text>
  <text x="70" y="362" text-anchor="middle" font-size="9" fill="#1a1822">Flash of</text>
  <text x="70" y="373" text-anchor="middle" font-size="9" fill="#1a1822">Faux Text</text>

  <!-- FOFT: Fallback -->
  <rect x="140" y="315" width="240" height="70" rx="6" fill="#fff3cd" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="260" y="346" text-anchor="middle" font-size="13" fill="#1a1822" font-weight="500">Fallback Font</text>
  <text x="260" y="364" text-anchor="middle" font-size="10" fill="#1a1822">(readable)</text>

  <!-- FOFT: Roman subset loaded -->
  <rect x="380" y="315" width="240" height="70" rx="6" fill="#d0e8d0" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="500" y="340" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="600">Roman Subset</text>
  <text x="500" y="356" text-anchor="middle" font-size="10" fill="#1a1822">loaded first (small file)</text>
  <text x="500" y="372" text-anchor="middle" font-size="10" fill="#1a1822">faux bold/italic via CSS</text>

  <!-- FOFT: Full family loaded -->
  <rect x="620" y="315" width="240" height="70" rx="6" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="740" y="346" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">Full Font Family</text>
  <text x="740" y="364" text-anchor="middle" font-size="10" fill="#ffffff">bold, italic, etc.</text>

  <!-- FOFT tiny swap indicators -->
  <rect x="374" y="315" width="12" height="70" rx="2" fill="#ffc107"/>
  <rect x="614" y="315" width="12" height="70" rx="2" fill="#ffc107"/>
  <text x="500" y="398" text-anchor="middle" font-size="9" fill="#ffc107" font-weight="600">Minimal CLS — two small swaps</text>

  <!-- Legend -->
  <rect x="140" y="430" width="16" height="12" rx="3" fill="#e8e4f0" stroke="#d7d1e6"/>
  <text x="162" y="441" font-size="10" fill="#1a1822">Invisible</text>
  <rect x="230" y="430" width="16" height="12" rx="3" fill="#fff3cd" stroke="#d7d1e6"/>
  <text x="252" y="441" font-size="10" fill="#1a1822">Fallback Font</text>
  <rect x="350" y="430" width="16" height="12" rx="3" fill="#d0e8d0" stroke="#6d5bd0"/>
  <text x="372" y="441" font-size="10" fill="#1a1822">Subset Font</text>
  <rect x="460" y="430" width="16" height="12" rx="3" fill="#6d5bd0"/>
  <text x="482" y="441" font-size="10" fill="#1a1822">Custom Font</text>
  <rect x="570" y="430" width="16" height="12" rx="3" fill="#ff6b35"/>
  <text x="592" y="441" font-size="10" fill="#1a1822">Layout Shift</text>
  <rect x="680" y="430" width="16" height="12" rx="3" fill="#ffc107"/>
  <text x="702" y="441" font-size="10" fill="#1a1822">Minor Shift</text>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>