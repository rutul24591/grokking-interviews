<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Multi-CDN failover architecture showing DNS-based routing, health checks, and fallback paths" font-family="system-ui, sans-serif">
  <rect width="900" height="520" fill="#f3f1f8" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Multi-CDN Failover Architecture</text>

  <!-- Client -->
  <rect x="30" y="100" width="100" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="80" y="128" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="600">Client</text>
  <text x="80" y="145" text-anchor="middle" font-size="10" fill="#6d5bd0">Browser/App</text>

  <!-- DNS / Traffic Manager -->
  <rect x="185" y="70" width="160" height="120" rx="10" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="265" y="98" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="700">DNS Traffic Manager</text>
  <text x="265" y="118" text-anchor="middle" font-size="10" fill="#ffffff">(Route 53 / NS1 / Cedexis)</text>

  <rect x="200" y="132" width="130" height="48" rx="6" fill="rgba(255,255,255,0.15)"/>
  <text x="265" y="150" text-anchor="middle" font-size="10" fill="#ffffff">Routing Policies:</text>
  <text x="265" y="165" text-anchor="middle" font-size="9" fill="#ffffff">Latency | Weighted | Geo | Failover</text>

  <!-- Arrow: Client to DNS -->
  <line x1="130" y1="130" x2="185" y2="130" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowM)"/>
  <text x="157" y="122" text-anchor="middle" font-size="9" fill="#6d5bd0">DNS</text>

  <!-- Primary CDN -->
  <rect x="410" y="40" width="200" height="100" rx="10" fill="#ffffff" stroke="#4ade80" stroke-width="2"/>
  <rect x="410" y="40" width="200" height="30" rx="10" fill="#4ade80"/>
  <rect x="410" y="55" width="200" height="15" fill="#4ade80"/>
  <text x="510" y="60" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="700">Primary CDN (Cloudflare)</text>
  <text x="510" y="90" text-anchor="middle" font-size="10" fill="#1a1822">300+ PoPs globally</text>
  <text x="510" y="106" text-anchor="middle" font-size="10" fill="#1a1822">DDoS protection + WAF</text>
  <text x="510" y="122" text-anchor="middle" font-size="10" fill="#4ade80" font-weight="600">Status: HEALTHY</text>

  <!-- Secondary CDN -->
  <rect x="410" y="160" width="200" height="100" rx="10" fill="#ffffff" stroke="#facc15" stroke-width="2"/>
  <rect x="410" y="160" width="200" height="30" rx="10" fill="#facc15"/>
  <rect x="410" y="175" width="200" height="15" fill="#facc15"/>
  <text x="510" y="180" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="700">Secondary CDN (Fastly)</text>
  <text x="510" y="210" text-anchor="middle" font-size="10" fill="#1a1822">Instant purge (&amp;lt;150ms)</text>
  <text x="510" y="226" text-anchor="middle" font-size="10" fill="#1a1822">VCL edge compute</text>
  <text x="510" y="242" text-anchor="middle" font-size="10" fill="#facc15" font-weight="600">Status: STANDBY</text>

  <!-- Tertiary CDN -->
  <rect x="410" y="280" width="200" height="80" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <rect x="410" y="280" width="200" height="30" rx="10" fill="#d7d1e6"/>
  <rect x="410" y="295" width="200" height="15" fill="#d7d1e6"/>
  <text x="510" y="300" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="700">Tertiary CDN (CloudFront)</text>
  <text x="510" y="326" text-anchor="middle" font-size="10" fill="#1a1822">AWS integration</text>
  <text x="510" y="342" text-anchor="middle" font-size="10" fill="#d7d1e6" font-weight="600">Status: STANDBY</text>

  <!-- Arrows: DNS to CDNs -->
  <line x1="345" y1="110" x2="410" y2="85" stroke="#4ade80" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="370" y="86" font-size="9" fill="#4ade80" font-weight="600">80%</text>

  <line x1="345" y1="140" x2="410" y2="200" stroke="#facc15" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowYellow)"/>
  <text x="370" y="175" font-size="9" fill="#facc15" font-weight="600">15%</text>

  <line x1="345" y1="165" x2="410" y2="310" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGr)"/>
  <text x="360" y="260" font-size="9" fill="#d7d1e6" font-weight="600">5%</text>

  <!-- Health Check System -->
  <rect x="670" y="40" width="200" height="150" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="770" y="65" text-anchor="middle" font-size="13" fill="#6d5bd0" font-weight="700">Health Check System</text>

  <text x="690" y="90" font-size="10" fill="#1a1822">Every 30s from multiple regions:</text>

  <circle cx="700" cy="110" r="5" fill="#4ade80"/>
  <text x="715" y="114" font-size="10" fill="#1a1822">Cloudflare: 12ms (healthy)</text>
  <circle cx="700" cy="130" r="5" fill="#4ade80"/>
  <text x="715" y="134" font-size="10" fill="#1a1822">Fastly: 18ms (healthy)</text>
  <circle cx="700" cy="150" r="5" fill="#4ade80"/>
  <text x="715" y="154" font-size="10" fill="#1a1822">CloudFront: 22ms (healthy)</text>

  <text x="690" y="178" font-size="10" fill="#6d5bd0" font-weight="600">Checks: HTTP 200, latency, TLS</text>

  <!-- Arrows: CDNs to Health -->
  <line x1="610" y1="80" x2="670" y2="100" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="610" y1="200" x2="670" y2="130" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="610" y1="310" x2="670" y2="155" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Origin -->
  <rect x="670" y="220" width="200" height="70" rx="10" fill="#1a1822"/>
  <text x="770" y="252" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="600">Origin Server(s)</text>
  <text x="770" y="272" text-anchor="middle" font-size="10" fill="#d7d1e6">Multi-region deployment</text>

  <!-- Arrows: CDNs to Origin -->
  <line x1="610" y1="90" x2="670" y2="240" stroke="#1a1822" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDk)"/>
  <line x1="610" y1="210" x2="670" y2="250" stroke="#1a1822" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDk)"/>
  <line x1="610" y1="320" x2="670" y2="265" stroke="#1a1822" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowDk)"/>

  <!-- Failover scenario -->
  <rect x="30" y="380" width="840" height="120" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Failover Scenario: Primary CDN Goes Down</text>

  <rect x="55" y="418" width="170" height="35" rx="6" fill="#f87171"/>
  <text x="140" y="440" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">1. Health check fails (3x)</text>

  <line x1="225" y1="435" x2="255" y2="435" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowM)"/>

  <rect x="255" y="418" width="170" height="35" rx="6" fill="#6d5bd0"/>
  <text x="340" y="440" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">2. DNS TTL expires (30s)</text>

  <line x1="425" y1="435" x2="455" y2="435" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowM)"/>

  <rect x="455" y="418" width="170" height="35" rx="6" fill="#facc15"/>
  <text x="540" y="440" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="600">3. Traffic shifts to Fastly</text>

  <line x1="625" y1="435" x2="655" y2="435" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowM)"/>

  <rect x="655" y="418" width="190" height="35" rx="6" fill="#4ade80"/>
  <text x="750" y="440" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="600">4. Service restored (~60s RTO)</text>

  <text x="450" y="480" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="600">Total failover time: health check interval (30s) + DNS TTL (30s) = ~60s recovery time objective (RTO)</text>

  <defs>
    <marker id="arrowM" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#facc15"/>
    </marker>
    <marker id="arrowGr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d7d1e6"/>
    </marker>
    <marker id="arrowDk" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822"/>
    </marker>
  </defs>
</svg>