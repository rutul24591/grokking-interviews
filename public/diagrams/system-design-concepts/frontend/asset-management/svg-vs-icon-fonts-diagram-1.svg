<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="SVG sprite sheet system architecture showing symbol definitions, use references, and build pipeline from source SVGs through SVGO and svg-sprite to final sprite sheet" font-family="system-ui, sans-serif">
  <rect width="900" height="520" fill="#f3f1f8" rx="8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">SVG Sprite Sheet System Architecture</text>

  <!-- Source SVG Icons -->
  <rect x="30" y="65" width="170" height="190" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="115" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">Source SVG Icons</text>
  <rect x="45" y="105" width="140" height="26" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="115" y="123" text-anchor="middle" font-size="11" fill="#1a1822">home.svg</text>
  <rect x="45" y="137" width="140" height="26" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="115" y="155" text-anchor="middle" font-size="11" fill="#1a1822">search.svg</text>
  <rect x="45" y="169" width="140" height="26" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="115" y="187" text-anchor="middle" font-size="11" fill="#1a1822">settings.svg</text>
  <rect x="45" y="201" width="140" height="26" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="115" y="219" text-anchor="middle" font-size="11" fill="#1a1822">user.svg</text>

  <!-- Arrow 1 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
  <path d="M 200 160 L 245 160" stroke="#6d5bd0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- SVGO Optimization -->
  <rect x="250" y="95" width="140" height="130" rx="8" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="320" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">SVGO</text>
  <line x1="265" y1="130" x2="375" y2="130" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="320" y="150" text-anchor="middle" font-size="10" fill="#ffffff">Remove metadata</text>
  <text x="320" y="167" text-anchor="middle" font-size="10" fill="#ffffff">Collapse groups</text>
  <text x="320" y="184" text-anchor="middle" font-size="10" fill="#ffffff">Optimize paths</text>
  <text x="320" y="201" text-anchor="middle" font-size="10" fill="#ffffff">Minify output</text>

  <!-- Arrow 2 -->
  <path d="M 390 160 L 435 160" stroke="#6d5bd0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- svg-sprite Builder -->
  <rect x="440" y="95" width="140" height="130" rx="8" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="510" y="120" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">svg-sprite</text>
  <line x1="455" y1="130" x2="565" y2="130" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="510" y="150" text-anchor="middle" font-size="10" fill="#ffffff">Wrap in &lt;symbol&gt;</text>
  <text x="510" y="167" text-anchor="middle" font-size="10" fill="#ffffff">Add viewBox attr</text>
  <text x="510" y="184" text-anchor="middle" font-size="10" fill="#ffffff">Set unique IDs</text>
  <text x="510" y="201" text-anchor="middle" font-size="10" fill="#ffffff">Bundle into sheet</text>

  <!-- Arrow 3 -->
  <path d="M 580 160 L 625 160" stroke="#6d5bd0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Sprite Sheet Output -->
  <rect x="630" y="65" width="240" height="220" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="750" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">sprites.svg</text>
  <rect x="645" y="105" width="210" height="55" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="750" y="122" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">&lt;symbol id="icon-home"&gt;</text>
  <text x="750" y="140" text-anchor="middle" font-size="9" fill="#6d5bd0">&lt;path d="M10 20..." /&gt;</text>
  <text x="750" y="153" text-anchor="middle" font-size="10" fill="#1a1822">&lt;/symbol&gt;</text>
  <rect x="645" y="165" width="210" height="55" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="750" y="182" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">&lt;symbol id="icon-search"&gt;</text>
  <text x="750" y="200" text-anchor="middle" font-size="9" fill="#6d5bd0">&lt;path d="M5 15..." /&gt;</text>
  <text x="750" y="213" text-anchor="middle" font-size="10" fill="#1a1822">&lt;/symbol&gt;</text>
  <text x="750" y="270" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.5">... more symbols</text>

  <!-- Usage Section -->
  <text x="450" y="320" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1822">Usage in Components</text>

  <!-- Inline Embed -->
  <rect x="30" y="340" width="260" height="150" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="160" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Inline Sprite (Hidden)</text>
  <rect x="45" y="380" width="230" height="50" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="160" y="398" text-anchor="middle" font-size="9" fill="#1a1822">&lt;svg style="display:none"&gt;</text>
  <text x="160" y="414" text-anchor="middle" font-size="9" fill="#1a1822">  &lt;symbol id="icon-home"&gt;...&lt;/symbol&gt;</text>
  <text x="160" y="425" text-anchor="middle" font-size="9" fill="#1a1822">&lt;/svg&gt;</text>
  <rect x="45" y="435" width="230" height="30" rx="4" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="1"/>
  <text x="160" y="455" text-anchor="middle" font-size="9" fill="#ffffff">&lt;svg&gt;&lt;use href="#icon-home" /&gt;&lt;/svg&gt;</text>

  <!-- External Reference -->
  <rect x="320" y="340" width="260" height="150" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">External Reference</text>
  <rect x="335" y="380" width="230" height="35" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="402" text-anchor="middle" font-size="9" fill="#1a1822">Sprite loaded via HTTP request</text>
  <rect x="335" y="420" width="230" height="45" rx="4" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="440" text-anchor="middle" font-size="9" fill="#ffffff">&lt;svg&gt;</text>
  <text x="450" y="455" text-anchor="middle" font-size="9" fill="#ffffff">  &lt;use href="/sprites.svg#icon-home" /&gt;</text>

  <!-- React Component -->
  <rect x="610" y="340" width="260" height="150" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="740" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">React Component</text>
  <rect x="625" y="380" width="230" height="85" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="740" y="398" text-anchor="middle" font-size="9" fill="#1a1822">function Icon({{ name, size }}) {{</text>
  <text x="740" y="413" text-anchor="middle" font-size="9" fill="#1a1822">  return (</text>
  <text x="740" y="428" text-anchor="middle" font-size="9" fill="#6d5bd0">    &lt;svg width={{size}} height={{size}}&gt;</text>
  <text x="740" y="443" text-anchor="middle" font-size="9" fill="#6d5bd0">      &lt;use href={{`#${{name}}`}} /&gt;</text>
  <text x="740" y="458" text-anchor="middle" font-size="9" fill="#1a1822">    &lt;/svg&gt;)}</text>
</svg>