<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Responsive images pipeline showing srcset, sizes, picture element, and art direction" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1822">Responsive Images Pipeline</text>

  <!-- Row 1: HTML markup patterns -->
  <text x="40" y="62" font-size="13" font-weight="700" fill="#6d5bd0">1. HTML Markup Strategies</text>

  <!-- srcset box -->
  <rect x="30" y="74" width="260" height="120" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="160" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">srcset + sizes (Resolution)</text>
  <text x="42" y="114" font-size="10" fill="#1a1822" font-family="monospace">&lt;img</text>
  <text x="52" y="128" font-size="10" fill="#1a1822" font-family="monospace">srcset="img-400.jpg 400w,</text>
  <text x="100" y="142" font-size="10" fill="#1a1822" font-family="monospace">img-800.jpg 800w,</text>
  <text x="100" y="156" font-size="10" fill="#1a1822" font-family="monospace">img-1200.jpg 1200w"</text>
  <text x="52" y="170" font-size="10" fill="#1a1822" font-family="monospace">sizes="(max-width:800px) 100vw,</text>
  <text x="100" y="184" font-size="10" fill="#1a1822" font-family="monospace">50vw" /&gt;</text>

  <!-- picture box -->
  <rect x="310" y="74" width="280" height="120" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">&lt;picture&gt; (Format Negotiation)</text>
  <text x="322" y="114" font-size="10" fill="#1a1822" font-family="monospace">&lt;picture&gt;</text>
  <text x="332" y="128" font-size="10" fill="#1a1822" font-family="monospace">&lt;source type="image/avif"</text>
  <text x="352" y="142" font-size="10" fill="#1a1822" font-family="monospace">srcset="photo.avif" /&gt;</text>
  <text x="332" y="156" font-size="10" fill="#1a1822" font-family="monospace">&lt;source type="image/webp"</text>
  <text x="352" y="170" font-size="10" fill="#1a1822" font-family="monospace">srcset="photo.webp" /&gt;</text>
  <text x="332" y="184" font-size="10" fill="#1a1822" font-family="monospace">&lt;img src="photo.jpg" /&gt;</text>

  <!-- Art direction box -->
  <rect x="610" y="74" width="270" height="120" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="745" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">&lt;picture&gt; (Art Direction)</text>
  <text x="622" y="114" font-size="10" fill="#1a1822" font-family="monospace">&lt;picture&gt;</text>
  <text x="632" y="128" font-size="10" fill="#1a1822" font-family="monospace">&lt;source media="(max-width:600px)"</text>
  <text x="652" y="142" font-size="10" fill="#1a1822" font-family="monospace">srcset="hero-mobile.jpg" /&gt;</text>
  <text x="632" y="156" font-size="10" fill="#1a1822" font-family="monospace">&lt;source media="(min-width:601px)"</text>
  <text x="652" y="170" font-size="10" fill="#1a1822" font-family="monospace">srcset="hero-desktop.jpg" /&gt;</text>
  <text x="632" y="184" font-size="10" fill="#1a1822" font-family="monospace">&lt;img src="hero-fallback.jpg" /&gt;</text>

  <!-- Row 2: Browser Selection Flow -->
  <text x="40" y="224" font-size="13" font-weight="700" fill="#6d5bd0">2. Browser Selection Flow</text>

  <!-- Flow boxes -->
  <rect x="30" y="238" width="130" height="55" rx="6" fill="#6d5bd0"/>
  <text x="95" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Parse HTML</text>
  <text x="95" y="278" text-anchor="middle" font-size="10" fill="#ffffff">&lt;picture&gt; / &lt;img&gt;</text>

  <line x1="160" y1="265" x2="185" y2="265" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="185" y="238" width="140" height="55" rx="6" fill="#6d5bd0"/>
  <text x="255" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Check Format</text>
  <text x="255" y="278" text-anchor="middle" font-size="10" fill="#ffffff">AVIF &gt; WebP &gt; JPEG</text>

  <line x1="325" y1="265" x2="350" y2="265" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="350" y="238" width="140" height="55" rx="6" fill="#6d5bd0"/>
  <text x="420" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Evaluate sizes</text>
  <text x="420" y="278" text-anchor="middle" font-size="10" fill="#ffffff">Match media query</text>

  <line x1="490" y1="265" x2="515" y2="265" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="515" y="238" width="155" height="55" rx="6" fill="#6d5bd0"/>
  <text x="592" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Pick from srcset</text>
  <text x="592" y="278" text-anchor="middle" font-size="10" fill="#ffffff">DPR + viewport width</text>

  <line x1="670" y1="265" x2="695" y2="265" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="695" y="238" width="180" height="55" rx="6" fill="#6d5bd0"/>
  <text x="785" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Download &amp; Render</text>
  <text x="785" y="278" text-anchor="middle" font-size="10" fill="#ffffff">Smallest valid candidate</text>

  <!-- Row 3: Device resolution examples -->
  <text x="40" y="328" font-size="13" font-weight="700" fill="#6d5bd0">3. Device-Specific Selection Example</text>

  <!-- Mobile -->
  <rect x="30" y="342" width="260" height="75" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="160" y="362" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Mobile (375px, 2x DPR)</text>
  <text x="42" y="382" font-size="10" fill="#1a1822">sizes="100vw" = 375px effective</text>
  <text x="42" y="398" font-size="10" fill="#1a1822">375px x 2 = 750px needed</text>
  <text x="42" y="412" font-size="10" font-weight="600" fill="#6d5bd0">Selected: img-800.jpg (closest &gt;= 750w)</text>

  <!-- Tablet -->
  <rect x="310" y="342" width="280" height="75" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="362" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Tablet (768px, 2x DPR)</text>
  <text x="322" y="382" font-size="10" fill="#1a1822">sizes="100vw" = 768px effective</text>
  <text x="322" y="398" font-size="10" fill="#1a1822">768px x 2 = 1536px needed</text>
  <text x="322" y="412" font-size="10" font-weight="600" fill="#6d5bd0">Selected: img-1600.jpg (if available)</text>

  <!-- Desktop -->
  <rect x="610" y="342" width="270" height="75" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="745" y="362" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Desktop (1440px, 1x DPR)</text>
  <text x="622" y="382" font-size="10" fill="#1a1822">sizes="50vw" = 720px effective</text>
  <text x="622" y="398" font-size="10" fill="#1a1822">720px x 1 = 720px needed</text>
  <text x="622" y="412" font-size="10" font-weight="600" fill="#6d5bd0">Selected: img-800.jpg (closest &gt;= 720w)</text>

  <!-- Key insight box -->
  <rect x="30" y="435" width="850" height="50" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="455" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Key Insight</text>
  <text x="450" y="475" text-anchor="middle" font-size="11" fill="#1a1822">The browser picks the smallest image that satisfies (viewport width from sizes) x (device pixel ratio). Over-serving wastes bandwidth; under-serving degrades quality.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>