<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Content-hash based versioning pipeline showing source files through build tool to hashed output files and deployment" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Content-Hash Based Versioning Pipeline</text>

  <!-- Source Files -->
  <rect x="30" y="70" width="180" height="160" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="120" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Source Files</text>
  <rect x="50" y="110" width="140" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="129" text-anchor="middle" font-size="11" fill="#1a1822">app.js</text>
  <rect x="50" y="145" width="140" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="164" text-anchor="middle" font-size="11" fill="#1a1822">styles.css</text>
  <rect x="50" y="180" width="140" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="120" y="199" text-anchor="middle" font-size="11" fill="#1a1822">logo.png</text>

  <!-- Arrow 1 -->
  <path d="M 210 150 L 270 150" stroke="#6d5bd0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Build Tool -->
  <rect x="270" y="80" width="170" height="140" rx="8" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="355" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Build Tool</text>
  <text x="355" y="132" text-anchor="middle" font-size="11" fill="#ffffff">Webpack / Vite / Rollup</text>
  <line x1="290" y1="145" x2="420" y2="145" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <text x="355" y="165" text-anchor="middle" font-size="11" fill="#ffffff">1. Parse modules</text>
  <text x="355" y="183" text-anchor="middle" font-size="11" fill="#ffffff">2. Compute MD5/SHA</text>
  <text x="355" y="201" text-anchor="middle" font-size="11" fill="#ffffff">3. Inject hash in name</text>

  <!-- Arrow 2 -->
  <path d="M 440 150 L 500 150" stroke="#6d5bd0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Hashed Output -->
  <rect x="500" y="70" width="210" height="160" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="605" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Hashed Output</text>
  <rect x="515" y="110" width="180" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="605" y="129" text-anchor="middle" font-size="10" fill="#1a1822">app.a3f8c2b1.js</text>
  <rect x="515" y="145" width="180" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="605" y="164" text-anchor="middle" font-size="10" fill="#1a1822">styles.7d4e1f09.css</text>
  <rect x="515" y="180" width="180" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="605" y="199" text-anchor="middle" font-size="10" fill="#1a1822">logo.b2c9e4a7.png</text>

  <!-- Arrow 3 -->
  <path d="M 710 150 L 760 150" stroke="#6d5bd0" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- CDN / Deploy -->
  <rect x="760" y="90" width="120" height="120" rx="8" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="820" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">CDN</text>
  <text x="820" y="150" text-anchor="middle" font-size="11" fill="#ffffff">Deploy</text>
  <text x="820" y="175" text-anchor="middle" font-size="10" fill="#ffffff">Cache-Control:</text>
  <text x="820" y="192" text-anchor="middle" font-size="10" fill="#ffffff">immutable,</text>
  <text x="820" y="207" text-anchor="middle" font-size="10" fill="#ffffff">max-age=31536000</text>

  <!-- Asset Manifest -->
  <rect x="330" y="280" width="250" height="190" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="455" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Asset Manifest (manifest.json)</text>
  <line x1="345" y1="315" x2="565" y2="315" stroke="#d7d1e6" stroke-width="1"/>
  <text x="365" y="340" font-size="11" fill="#1a1822" font-weight="bold">{</text>
  <text x="380" y="360" font-size="11" fill="#1a1822">&amp;quot;app.js&amp;quot;:</text>
  <text x="380" y="378" font-size="10" fill="#6d5bd0">    &amp;quot;app.a3f8c2b1.js&amp;quot;,</text>
  <text x="380" y="398" font-size="11" fill="#1a1822">&amp;quot;styles.css&amp;quot;:</text>
  <text x="380" y="416" font-size="10" fill="#6d5bd0">    &amp;quot;styles.7d4e1f09.css&amp;quot;,</text>
  <text x="380" y="436" font-size="11" fill="#1a1822">&amp;quot;logo.png&amp;quot;:</text>
  <text x="380" y="454" font-size="10" fill="#6d5bd0">    &amp;quot;logo.b2c9e4a7.png&amp;quot;</text>

  <!-- Arrow from build to manifest -->
  <path d="M 355 220 L 355 260 L 420 280" stroke="#6d5bd0" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  <text x="340" y="255" font-size="10" fill="#6d5bd0">generates</text>

  <!-- Arrow from manifest to HTML -->
  <rect x="650" y="310" width="220" height="130" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="760" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">HTML Template</text>
  <line x1="665" y1="345" x2="855" y2="345" stroke="#d7d1e6" stroke-width="1"/>
  <text x="670" y="368" font-size="10" fill="#1a1822">&amp;lt;script src=&amp;quot;/app.a3f8c2b1.js&amp;quot;&amp;gt;</text>
  <text x="670" y="388" font-size="10" fill="#1a1822">&amp;lt;link href=&amp;quot;/styles.7d4e1f09.css&amp;quot;&amp;gt;</text>
  <text x="670" y="408" font-size="10" fill="#1a1822">&amp;lt;img src=&amp;quot;/logo.b2c9e4a7.png&amp;quot;&amp;gt;</text>
  <text x="760" y="432" text-anchor="middle" font-size="9" fill="#6d5bd0">References resolve via manifest</text>

  <path d="M 580 375 L 650 375" stroke="#6d5bd0" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="600" y="368" font-size="10" fill="#6d5bd0">resolves</text>

  <!-- Key insight -->
  <rect x="30" y="290" width="270" height="80" rx="8" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2" opacity="0.1"/>
  <rect x="30" y="290" width="270" height="80" rx="8" fill="none" stroke="#6d5bd0" stroke-width="2"/>
  <text x="165" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Key Insight</text>
  <text x="165" y="335" text-anchor="middle" font-size="10" fill="#1a1822">Content changes = new hash = new URL</text>
  <text x="165" y="352" text-anchor="middle" font-size="10" fill="#1a1822">Same content = same hash = cache hit</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>