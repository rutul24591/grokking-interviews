<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Image optimization build pipeline showing upload, processing, variant generation, and CDN delivery" font-family="system-ui, sans-serif">
  <rect width="900" height="520" fill="#f3f1f8" rx="8"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1822">Image Optimization Pipeline: Upload to Delivery</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Stage 1: Upload -->
  <rect x="30" y="55" width="150" height="140" rx="8" fill="#6d5bd0"/>
  <text x="105" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1. Upload</text>
  <line x1="45" y1="88" x2="165" y2="88" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="105" y="108" text-anchor="middle" font-size="10" fill="#ffffff">Original image</text>
  <text x="105" y="124" text-anchor="middle" font-size="10" fill="#ffffff">(e.g., 4000x3000px)</text>
  <text x="105" y="144" text-anchor="middle" font-size="10" fill="#ffffff">EXIF metadata</text>
  <text x="105" y="160" text-anchor="middle" font-size="10" fill="#ffffff">Color profile (sRGB)</text>
  <text x="105" y="180" text-anchor="middle" font-size="10" fill="#ffffff">~3-8 MB raw</text>

  <line x1="180" y1="125" x2="210" y2="125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 2: Processing -->
  <rect x="210" y="55" width="170" height="140" rx="8" fill="#6d5bd0"/>
  <text x="295" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2. Processing</text>
  <line x1="225" y1="88" x2="365" y2="88" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="295" y="108" text-anchor="middle" font-size="10" fill="#ffffff">Strip EXIF metadata</text>
  <text x="295" y="124" text-anchor="middle" font-size="10" fill="#ffffff">Color space normalize</text>
  <text x="295" y="140" text-anchor="middle" font-size="10" fill="#ffffff">Auto-orient (rotation)</text>
  <text x="295" y="156" text-anchor="middle" font-size="10" fill="#ffffff">Content-aware crop</text>
  <text x="295" y="172" text-anchor="middle" font-size="10" fill="#ffffff">Generate BlurHash/LQIP</text>
  <text x="295" y="188" text-anchor="middle" font-size="10" fill="#ffffff">Compute aspect ratio</text>

  <line x1="380" y1="125" x2="410" y2="125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 3: Variant Generation -->
  <rect x="410" y="55" width="170" height="140" rx="8" fill="#6d5bd0"/>
  <text x="495" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3. Variants</text>
  <line x1="425" y1="88" x2="565" y2="88" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="495" y="108" text-anchor="middle" font-size="10" fill="#ffffff">Resize: 400, 800, 1200,</text>
  <text x="495" y="122" text-anchor="middle" font-size="10" fill="#ffffff">1600, 2000w</text>
  <text x="495" y="140" text-anchor="middle" font-size="10" fill="#ffffff">Encode: AVIF (q=50-65)</text>
  <text x="495" y="156" text-anchor="middle" font-size="10" fill="#ffffff">Encode: WebP (q=75-80)</text>
  <text x="495" y="172" text-anchor="middle" font-size="10" fill="#ffffff">Encode: JPEG (q=80-85)</text>
  <text x="495" y="188" text-anchor="middle" font-size="10" fill="#ffffff">= 15 variants per image</text>

  <line x1="580" y1="125" x2="610" y2="125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 4: Storage + CDN -->
  <rect x="610" y="55" width="150" height="140" rx="8" fill="#6d5bd0"/>
  <text x="685" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4. Storage</text>
  <line x1="625" y1="88" x2="745" y2="88" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  <text x="685" y="108" text-anchor="middle" font-size="10" fill="#ffffff">Object storage (S3)</text>
  <text x="685" y="124" text-anchor="middle" font-size="10" fill="#ffffff">CDN origin pull</text>
  <text x="685" y="140" text-anchor="middle" font-size="10" fill="#ffffff">Cache-Control headers</text>
  <text x="685" y="156" text-anchor="middle" font-size="10" fill="#ffffff">Content negotiation</text>
  <text x="685" y="172" text-anchor="middle" font-size="10" fill="#ffffff">Accept: image/avif</text>
  <text x="685" y="188" text-anchor="middle" font-size="10" fill="#ffffff">Vary: Accept header</text>

  <line x1="760" y1="125" x2="790" y2="125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 5: Delivery -->
  <rect x="790" y="80" width="90" height="90" rx="45" fill="#6d5bd0"/>
  <text x="835" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">CDN</text>
  <text x="835" y="138" text-anchor="middle" font-size="10" fill="#ffffff">Edge PoP</text>
  <text x="835" y="154" text-anchor="middle" font-size="10" fill="#ffffff">~50ms</text>

  <!-- Build-time vs Runtime section -->
  <text x="40" y="230" font-size="13" font-weight="700" fill="#6d5bd0">Build-Time vs Runtime Optimization</text>

  <!-- Build-time -->
  <rect x="30" y="245" width="410" height="120" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <rect x="30" y="245" width="410" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="30" y="260" width="410" height="15" fill="#6d5bd0"/>
  <text x="235" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Build-Time (Static)</text>
  <text x="42" y="296" font-size="11" fill="#1a1822">Tools: sharp, imagemin, next/image (static import)</text>
  <text x="42" y="314" font-size="11" fill="#1a1822">Pros: Zero runtime cost, deterministic output</text>
  <text x="42" y="332" font-size="11" fill="#1a1822">Cons: Longer build times, re-deploy for new images</text>
  <text x="42" y="350" font-size="11" fill="#1a1822">Best for: Marketing sites, blogs, documentation</text>

  <!-- Runtime -->
  <rect x="460" y="245" width="410" height="120" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <rect x="460" y="245" width="410" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="460" y="260" width="410" height="15" fill="#6d5bd0"/>
  <text x="665" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Runtime (Dynamic / On-Demand)</text>
  <text x="472" y="296" font-size="11" fill="#1a1822">Tools: Cloudinary, Imgix, Cloudflare Images</text>
  <text x="472" y="314" font-size="11" fill="#1a1822">Pros: No build overhead, on-demand transforms</text>
  <text x="472" y="332" font-size="11" fill="#1a1822">Cons: First-request latency, vendor cost/lock-in</text>
  <text x="472" y="350" font-size="11" fill="#1a1822">Best for: UGC platforms, e-commerce, social media</text>

  <!-- LQIP / Placeholder section -->
  <text x="40" y="400" font-size="13" font-weight="700" fill="#6d5bd0">Placeholder Strategies (Preventing CLS)</text>

  <rect x="30" y="415" width="200" height="90" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="130" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">BlurHash</text>
  <text x="130" y="456" text-anchor="middle" font-size="10" fill="#1a1822">~20-30 byte string</text>
  <text x="130" y="472" text-anchor="middle" font-size="10" fill="#1a1822">Decoded client-side</text>
  <text x="130" y="488" text-anchor="middle" font-size="10" fill="#1a1822">Smooth color gradient</text>

  <rect x="250" y="415" width="200" height="90" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="350" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">LQIP (base64)</text>
  <text x="350" y="456" text-anchor="middle" font-size="10" fill="#1a1822">~200-500 byte inline</text>
  <text x="350" y="472" text-anchor="middle" font-size="10" fill="#1a1822">Tiny JPEG/WebP preview</text>
  <text x="350" y="488" text-anchor="middle" font-size="10" fill="#1a1822">Blurred CSS transition</text>

  <rect x="470" y="415" width="200" height="90" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="570" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Dominant Color</text>
  <text x="570" y="456" text-anchor="middle" font-size="10" fill="#1a1822">~7 byte hex value</text>
  <text x="570" y="472" text-anchor="middle" font-size="10" fill="#1a1822">background-color fill</text>
  <text x="570" y="488" text-anchor="middle" font-size="10" fill="#1a1822">Simplest, least data</text>

  <rect x="690" y="415" width="185" height="90" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="782" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Aspect Ratio Box</text>
  <text x="782" y="456" text-anchor="middle" font-size="10" fill="#1a1822">width + height attrs</text>
  <text x="782" y="472" text-anchor="middle" font-size="10" fill="#1a1822">CSS aspect-ratio prop</text>
  <text x="782" y="488" text-anchor="middle" font-size="10" fill="#1a1822">Reserves layout space</text>
</svg>