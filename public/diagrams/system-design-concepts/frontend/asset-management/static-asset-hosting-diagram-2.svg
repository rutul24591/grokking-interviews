<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-label="Asset deployment pipeline showing CI/CD build, upload to object storage, CDN invalidation, and verification stages" font-family="system-ui, sans-serif">
  <rect width="900" height="480" fill="#f3f1f8" rx="8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Asset Deployment Pipeline</text>

  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="ah2g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d8a4e"/>
    </marker>
  </defs>

  <!-- Stage 1: CI/CD Trigger -->
  <rect x="30" y="60" width="155" height="130" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="30" y="60" width="155" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="30" y="75" width="155" height="15" fill="#6d5bd0"/>
  <text x="107" y="81" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">1. CI/CD Trigger</text>
  <text x="107" y="110" text-anchor="middle" font-size="10" fill="#1a1822">Git push to main</text>
  <text x="107" y="128" text-anchor="middle" font-size="10" fill="#1a1822">GitHub Actions /</text>
  <text x="107" y="143" text-anchor="middle" font-size="10" fill="#1a1822">GitLab CI / CircleCI</text>
  <text x="107" y="163" text-anchor="middle" font-size="10" fill="#6d5bd0">Webhook trigger</text>
  <text x="107" y="178" text-anchor="middle" font-size="10" fill="#6d5bd0">PR merge event</text>

  <path d="M 185 125 L 215 125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#ah2)"/>

  <!-- Stage 2: Build -->
  <rect x="220" y="60" width="155" height="130" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="220" y="60" width="155" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="220" y="75" width="155" height="15" fill="#6d5bd0"/>
  <text x="297" y="81" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">2. Build &amp; Hash</text>
  <text x="297" y="110" text-anchor="middle" font-size="10" fill="#1a1822">next build / vite build</text>
  <text x="297" y="128" text-anchor="middle" font-size="10" fill="#1a1822">Content-hash filenames</text>
  <text x="297" y="146" text-anchor="middle" font-size="10" fill="#1a1822">Generate manifest.json</text>
  <text x="297" y="164" text-anchor="middle" font-size="10" fill="#6d5bd0">Brotli pre-compress</text>
  <text x="297" y="179" text-anchor="middle" font-size="10" fill="#6d5bd0">SRI hash generation</text>

  <path d="M 375 125 L 405 125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#ah2)"/>

  <!-- Stage 3: Upload -->
  <rect x="410" y="60" width="155" height="130" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="410" y="60" width="155" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="410" y="75" width="155" height="15" fill="#6d5bd0"/>
  <text x="487" y="81" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">3. Upload Assets</text>
  <text x="487" y="110" text-anchor="middle" font-size="10" fill="#1a1822">aws s3 sync / gsutil</text>
  <text x="487" y="128" text-anchor="middle" font-size="10" fill="#1a1822">Upload new hashed files</text>
  <text x="487" y="146" text-anchor="middle" font-size="10" fill="#1a1822">Keep old versions (7d)</text>
  <text x="487" y="164" text-anchor="middle" font-size="10" fill="#6d5bd0">Parallel uploads</text>
  <text x="487" y="179" text-anchor="middle" font-size="10" fill="#6d5bd0">Set Cache-Control</text>

  <path d="M 565 125 L 595 125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#ah2)"/>

  <!-- Stage 4: CDN Invalidation -->
  <rect x="600" y="60" width="155" height="130" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="600" y="60" width="155" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="600" y="75" width="155" height="15" fill="#6d5bd0"/>
  <text x="677" y="81" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">4. CDN Update</text>
  <text x="677" y="110" text-anchor="middle" font-size="10" fill="#1a1822">Invalidate index.html</text>
  <text x="677" y="128" text-anchor="middle" font-size="10" fill="#1a1822">Hashed files = no inv.</text>
  <text x="677" y="146" text-anchor="middle" font-size="10" fill="#1a1822">Update manifest pointer</text>
  <text x="677" y="164" text-anchor="middle" font-size="10" fill="#6d5bd0">Propagation: ~30s</text>
  <text x="677" y="179" text-anchor="middle" font-size="10" fill="#6d5bd0">Wildcard: /index.html*</text>

  <!-- Stage 5: Verify -->
  <rect x="765" y="60" width="120" height="130" rx="8" fill="#ffffff" stroke="#2d8a4e" stroke-width="2"/>
  <rect x="765" y="60" width="120" height="30" rx="8" fill="#2d8a4e"/>
  <rect x="765" y="75" width="120" height="15" fill="#2d8a4e"/>
  <text x="825" y="81" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">5. Verify</text>
  <text x="825" y="110" text-anchor="middle" font-size="10" fill="#1a1822">Smoke tests</text>
  <text x="825" y="128" text-anchor="middle" font-size="10" fill="#1a1822">SRI validation</text>
  <text x="825" y="146" text-anchor="middle" font-size="10" fill="#1a1822">Multi-region curl</text>
  <text x="825" y="164" text-anchor="middle" font-size="10" fill="#2d8a4e">200 OK checks</text>
  <text x="825" y="179" text-anchor="middle" font-size="10" fill="#2d8a4e">Lighthouse CI</text>

  <path d="M 755 125 L 765 125" stroke="#2d8a4e" stroke-width="2" marker-end="url(#ah2g)"/>

  <!-- Atomic Deploy Detail -->
  <rect x="30" y="220" width="410" height="240" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="235" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Atomic Deploy Strategy</text>

  <!-- Blue deployment -->
  <rect x="50" y="265" width="170" height="80" rx="6" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="135" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Blue (Current)</text>
  <text x="135" y="303" text-anchor="middle" font-size="10" fill="#1a1822">/v42/app.a1b2c3.js</text>
  <text x="135" y="318" text-anchor="middle" font-size="10" fill="#1a1822">/v42/styles.d4e5f6.css</text>
  <text x="135" y="333" text-anchor="middle" font-size="10" fill="#1a1822">/v42/manifest.json</text>

  <!-- Green deployment -->
  <rect x="250" y="265" width="170" height="80" rx="6" fill="#f3f1f8" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="335" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d8a4e">Green (New)</text>
  <text x="335" y="303" text-anchor="middle" font-size="10" fill="#1a1822">/v43/app.x7y8z9.js</text>
  <text x="335" y="318" text-anchor="middle" font-size="10" fill="#1a1822">/v43/styles.m1n2o3.css</text>
  <text x="335" y="333" text-anchor="middle" font-size="10" fill="#1a1822">/v43/manifest.json</text>

  <!-- Switch arrow -->
  <rect x="120" y="365" width="230" height="35" rx="6" fill="#6d5bd0"/>
  <text x="235" y="387" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Switch: update index.html pointer</text>

  <text x="235" y="420" text-anchor="middle" font-size="10" fill="#1a1822">Rollback = revert pointer to /v42/manifest.json</text>
  <text x="235" y="438" text-anchor="middle" font-size="10" fill="#6d5bd0">Both versions coexist in bucket &amp;mdash; zero downtime</text>

  <!-- Caching Strategy Detail -->
  <rect x="460" y="220" width="420" height="240" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="670" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Cache-Control Strategy</text>

  <rect x="480" y="265" width="380" height="40" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="490" y="283" font-size="10" font-weight="bold" fill="#6d5bd0">Hashed assets</text>
  <text x="490" y="296" font-size="9" fill="#1a1822">Cache-Control: public, max-age=31536000, immutable</text>

  <rect x="480" y="315" width="380" height="40" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="490" y="333" font-size="10" font-weight="bold" fill="#6d5bd0">index.html</text>
  <text x="490" y="346" font-size="9" fill="#1a1822">Cache-Control: no-cache, must-revalidate (always fresh)</text>

  <rect x="480" y="365" width="380" height="40" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="490" y="383" font-size="10" font-weight="bold" fill="#6d5bd0">manifest.json</text>
  <text x="490" y="396" font-size="9" fill="#1a1822">Cache-Control: no-cache (ETag-based revalidation)</text>

  <rect x="480" y="415" width="380" height="35" rx="4" fill="#6d5bd0"/>
  <text x="670" y="437" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Key: hashed = cache forever, entry points = revalidate</text>
</svg>