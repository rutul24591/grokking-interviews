<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Cache busting strategies comparison showing query string, filename hash, and ETag approaches with pros and cons" font-family="system-ui, sans-serif">
  <rect width="900" height="520" fill="#f3f1f8" rx="8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Cache Busting Strategies Comparison</text>

  <!-- Strategy 1: Query String -->
  <rect x="30" y="60" width="270" height="440" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="30" y="60" width="270" height="45" rx="8" fill="#6d5bd0"/>
  <rect x="30" y="85" width="270" height="20" fill="#6d5bd0"/>
  <text x="165" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Query String Versioning</text>

  <text x="165" y="130" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Example:</text>
  <rect x="45" y="138" width="240" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="157" text-anchor="middle" font-size="10" fill="#6d5bd0">app.js?v=1.2.3</text>

  <text x="50" y="190" font-size="12" font-weight="bold" fill="#1a1822">Pros</text>
  <circle cx="55" cy="210" r="4" fill="#22c55e"/>
  <text x="65" y="214" font-size="10" fill="#1a1822">Simple to implement</text>
  <circle cx="55" cy="232" r="4" fill="#22c55e"/>
  <text x="65" y="236" font-size="10" fill="#1a1822">No build tool changes needed</text>
  <circle cx="55" cy="254" r="4" fill="#22c55e"/>
  <text x="65" y="258" font-size="10" fill="#1a1822">Easy manual version bumps</text>

  <text x="50" y="285" font-size="12" font-weight="bold" fill="#1a1822">Cons</text>
  <circle cx="55" cy="305" r="4" fill="#ef4444"/>
  <text x="65" y="309" font-size="10" fill="#1a1822">Some CDNs ignore query strings</text>
  <circle cx="55" cy="327" r="4" fill="#ef4444"/>
  <text x="65" y="331" font-size="10" fill="#1a1822">Proxies may strip params</text>
  <circle cx="55" cy="349" r="4" fill="#ef4444"/>
  <text x="65" y="353" font-size="10" fill="#1a1822">Not content-aware (manual)</text>
  <circle cx="55" cy="371" r="4" fill="#ef4444"/>
  <text x="65" y="375" font-size="10" fill="#1a1822">All files bust on any change</text>

  <rect x="45" y="395" width="240" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">Cache Reliability: LOW</text>
  <text x="165" y="428" text-anchor="middle" font-size="9" fill="#1a1822">Not recommended for production</text>

  <rect x="45" y="445" width="240" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="165" y="462" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Cache-Control:</text>
  <text x="165" y="478" text-anchor="middle" font-size="9" fill="#6d5bd0">max-age=3600, must-revalidate</text>

  <!-- Strategy 2: Filename Hash -->
  <rect x="315" y="60" width="270" height="440" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="3"/>
  <rect x="315" y="60" width="270" height="45" rx="8" fill="#6d5bd0"/>
  <rect x="315" y="85" width="270" height="20" fill="#6d5bd0"/>
  <text x="450" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Filename Hash (Best)</text>

  <text x="450" y="130" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Example:</text>
  <rect x="330" y="138" width="240" height="28" rx="4" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="157" text-anchor="middle" font-size="10" fill="#6d5bd0">app.a3f8c2b1.js</text>

  <text x="335" y="190" font-size="12" font-weight="bold" fill="#1a1822">Pros</text>
  <circle cx="340" cy="210" r="4" fill="#22c55e"/>
  <text x="350" y="214" font-size="10" fill="#1a1822">Content-aware (precise busting)</text>
  <circle cx="340" cy="232" r="4" fill="#22c55e"/>
  <text x="350" y="236" font-size="10" fill="#1a1822">Works with all CDNs/proxies</text>
  <circle cx="340" cy="254" r="4" fill="#22c55e"/>
  <text x="350" y="258" font-size="10" fill="#1a1822">Enables immutable caching</text>
  <circle cx="340" cy="276" r="4" fill="#22c55e"/>
  <text x="350" y="280" font-size="10" fill="#1a1822">Only changed files get new URLs</text>

  <text x="335" y="305" font-size="12" font-weight="bold" fill="#1a1822">Cons</text>
  <circle cx="340" cy="325" r="4" fill="#ef4444"/>
  <text x="350" y="329" font-size="10" fill="#1a1822">Requires build tool setup</text>
  <circle cx="340" cy="347" r="4" fill="#ef4444"/>
  <text x="350" y="351" font-size="10" fill="#1a1822">Needs asset manifest for refs</text>
  <circle cx="340" cy="369" r="4" fill="#ef4444"/>
  <text x="350" y="373" font-size="10" fill="#1a1822">Old files need cleanup strategy</text>

  <rect x="330" y="395" width="240" height="40" rx="6" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="1" opacity="0.15"/>
  <text x="450" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">Cache Reliability: HIGH</text>
  <text x="450" y="428" text-anchor="middle" font-size="9" fill="#1a1822">Industry standard for production</text>

  <rect x="330" y="445" width="240" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="462" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Cache-Control:</text>
  <text x="450" y="478" text-anchor="middle" font-size="9" fill="#6d5bd0">max-age=31536000, immutable</text>

  <!-- Strategy 3: ETag -->
  <rect x="600" y="60" width="270" height="440" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="600" y="60" width="270" height="45" rx="8" fill="#6d5bd0"/>
  <rect x="600" y="85" width="270" height="20" fill="#6d5bd0"/>
  <text x="735" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">ETag / Last-Modified</text>

  <text x="735" y="130" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Example:</text>
  <rect x="615" y="138" width="240" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="735" y="157" text-anchor="middle" font-size="10" fill="#6d5bd0">ETag: &quot;33a64df5&quot;</text>

  <text x="620" y="190" font-size="12" font-weight="bold" fill="#1a1822">Pros</text>
  <circle cx="625" cy="210" r="4" fill="#22c55e"/>
  <text x="635" y="214" font-size="10" fill="#1a1822">No URL changes needed</text>
  <circle cx="625" cy="232" r="4" fill="#22c55e"/>
  <text x="635" y="236" font-size="10" fill="#1a1822">Server-managed validation</text>
  <circle cx="625" cy="254" r="4" fill="#22c55e"/>
  <text x="635" y="258" font-size="10" fill="#1a1822">304 Not Modified saves bytes</text>

  <text x="620" y="285" font-size="12" font-weight="bold" fill="#1a1822">Cons</text>
  <circle cx="625" cy="305" r="4" fill="#ef4444"/>
  <text x="635" y="309" font-size="10" fill="#1a1822">Still requires revalidation RTT</text>
  <circle cx="625" cy="327" r="4" fill="#ef4444"/>
  <text x="635" y="331" font-size="10" fill="#1a1822">Cannot use immutable caching</text>
  <circle cx="625" cy="349" r="4" fill="#ef4444"/>
  <text x="635" y="353" font-size="10" fill="#1a1822">ETag mismatch across servers</text>
  <circle cx="625" cy="371" r="4" fill="#ef4444"/>
  <text x="635" y="375" font-size="10" fill="#1a1822">inode-based ETags break CDNs</text>

  <rect x="615" y="395" width="240" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="735" y="412" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">Cache Reliability: MEDIUM</text>
  <text x="735" y="428" text-anchor="middle" font-size="9" fill="#1a1822">Good for HTML, not ideal for assets</text>

  <rect x="615" y="445" width="240" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="735" y="462" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Cache-Control:</text>
  <text x="735" y="478" text-anchor="middle" font-size="9" fill="#6d5bd0">no-cache (always revalidate)</text>
</svg>