<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Origin shield and caching hierarchy showing L1 browser cache, L2 edge cache, L3 origin shield, and origin storage layers" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Caching Hierarchy &amp; Origin Shield Pattern</text>

  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="ah3r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d8a4e"/>
    </marker>
  </defs>

  <!-- L1: Browser Cache -->
  <rect x="30" y="55" width="840" height="75" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="40" y="63" width="70" height="22" rx="4" fill="#6d5bd0"/>
  <text x="75" y="79" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">L1 Cache</text>

  <rect x="130" y="68" width="155" height="50" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="207" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">Browser Disk Cache</text>
  <text x="207" y="102" text-anchor="middle" font-size="9" fill="#6d5bd0">max-age / immutable</text>
  <text x="207" y="113" text-anchor="middle" font-size="9" fill="#1a1822">~100ms lookup</text>

  <rect x="310" y="68" width="155" height="50" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="387" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">Memory Cache</text>
  <text x="387" y="102" text-anchor="middle" font-size="9" fill="#6d5bd0">In-process, sub-ms</text>
  <text x="387" y="113" text-anchor="middle" font-size="9" fill="#1a1822">Cleared on tab close</text>

  <rect x="490" y="68" width="155" height="50" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="567" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">Service Worker</text>
  <text x="567" y="102" text-anchor="middle" font-size="9" fill="#6d5bd0">Cache-first strategy</text>
  <text x="567" y="113" text-anchor="middle" font-size="9" fill="#1a1822">Programmable</text>

  <text x="750" y="90" font-size="12" font-weight="bold" fill="#1a1822">Hit rate: ~85%</text>
  <text x="750" y="108" font-size="10" fill="#6d5bd0">Latency: 0-5ms</text>

  <!-- Arrow L1 to L2 -->
  <path d="M 450 130 L 450 150" stroke="#6d5bd0" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="462" y="145" font-size="9" fill="#6d5bd0">MISS</text>

  <!-- L2: Edge PoPs -->
  <rect x="30" y="155" width="840" height="100" rx="8" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="163" width="70" height="22" rx="4" fill="#ffffff"/>
  <text x="75" y="179" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">L2 Cache</text>

  <rect x="130" y="170" width="140" height="70" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="200" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Edge PoP 1</text>
  <text x="200" y="206" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">New York</text>
  <text x="200" y="220" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">SSD-backed cache</text>
  <text x="200" y="232" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">~20ms RTT</text>

  <rect x="290" y="170" width="140" height="70" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="360" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Edge PoP 2</text>
  <text x="360" y="206" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">London</text>
  <text x="360" y="220" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">SSD-backed cache</text>
  <text x="360" y="232" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">~25ms RTT</text>

  <rect x="450" y="170" width="140" height="70" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="520" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Edge PoP 3</text>
  <text x="520" y="206" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Singapore</text>
  <text x="520" y="220" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">SSD-backed cache</text>
  <text x="520" y="232" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">~30ms RTT</text>

  <rect x="610" y="170" width="140" height="70" rx="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="680" y="190" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Edge PoP N</text>
  <text x="680" y="206" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">200+ locations</text>
  <text x="680" y="220" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Anycast routing</text>
  <text x="680" y="232" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">DNS-based</text>

  <text x="790" y="200" font-size="12" font-weight="bold" fill="#ffffff">Hit: ~92%</text>
  <text x="790" y="218" font-size="10" fill="rgba(255,255,255,0.8)">10-50ms</text>

  <!-- Arrows L2 to L3 (converging) -->
  <path d="M 200 240 L 200 280 L 380 290" stroke="#6d5bd0" stroke-width="1.5" fill="none" marker-end="url(#ah3)"/>
  <path d="M 360 240 L 360 280 L 400 290" stroke="#6d5bd0" stroke-width="1.5" fill="none" marker-end="url(#ah3)"/>
  <path d="M 520 240 L 520 280 L 470 290" stroke="#6d5bd0" stroke-width="1.5" fill="none" marker-end="url(#ah3)"/>
  <path d="M 680 240 L 680 280 L 510 290" stroke="#6d5bd0" stroke-width="1.5" fill="none" marker-end="url(#ah3)"/>
  <text x="455" y="282" text-anchor="middle" font-size="9" fill="#6d5bd0">All MISSes converge</text>

  <!-- L3: Origin Shield -->
  <rect x="200" y="295" width="500" height="85" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2.5"/>
  <rect x="210" y="303" width="70" height="22" rx="4" fill="#6d5bd0"/>
  <text x="245" y="319" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">L3 Cache</text>

  <text x="450" y="322" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Origin Shield (Regional Consolidation)</text>
  <text x="450" y="342" text-anchor="middle" font-size="10" fill="#6d5bd0">Collapses N edge requests into 1 origin fetch &amp;mdash; request coalescing</text>
  <text x="450" y="358" text-anchor="middle" font-size="10" fill="#1a1822">Located near origin region (e.g., us-east-1 for S3 in Virginia)</text>
  <text x="450" y="372" text-anchor="middle" font-size="10" fill="#1a1822">Hit rate: ~98% | Latency: 50-100ms</text>

  <!-- Arrow L3 to Origin -->
  <path d="M 450 380 L 450 405" stroke="#6d5bd0" stroke-width="2" marker-end="url(#ah3)"/>
  <text x="462" y="397" font-size="9" fill="#6d5bd0">MISS (~2%)</text>

  <!-- Origin -->
  <rect x="250" y="410" width="400" height="75" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="435" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Origin: S3 / GCS / Azure Blob</text>
  <text x="450" y="455" text-anchor="middle" font-size="10" fill="#6d5bd0">Object storage &amp;mdash; 11 nines durability | Cross-region replicated</text>
  <text x="450" y="472" text-anchor="middle" font-size="10" fill="#1a1822">Latency: 50-200ms | Cost: $0.023/GB stored | $0.09/GB transferred</text>

  <!-- Response arrows (green, going up on right side) -->
  <path d="M 820 405 L 820 260" stroke="#2d8a4e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#ah3r)"/>
  <text x="830" y="340" font-size="9" fill="#2d8a4e" transform="rotate(-90, 830, 340)">Response propagates up</text>
</svg>