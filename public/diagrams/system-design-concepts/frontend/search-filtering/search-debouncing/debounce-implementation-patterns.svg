<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Debounce Implementation Patterns</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Custom hook vs Utility function vs Ref-based approaches</text>
  
  <!-- Custom Hook Pattern -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Custom Hook Pattern</text>
  
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
  
  <!-- Code snippet -->
  <text x="65" y="180" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">function useDebounce(value, delay) {"{"}</text>
  <text x="65" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">  const [debounced, setDebounced] =</text>
  <text x="65" y="210" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">    useState(value);</text>
  <text x="65" y="225" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">  useEffect(() =>{" "{"}</text>
  <text x="65" y="240" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">    const timer = setTimeout(() =></text>
  <text x="65" y="255" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">      setDebounced(value), delay);</text>
  <text x="65" y="270" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">    return () =>{" "}clearTimeout(timer);</text>
  <text x="65" y="285" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">  }, [value, delay]);</text>
  <text x="65" y="280" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">{"}"}"}</text>
  
  <rect x="50" y="290" width="230" height="35" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="70" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1d4ed8">✓ React-idiomatic</text>
  <text x="70" y="320" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1d4ed8">✓ Automatic cleanup</text>
  
  <!-- Utility Function Pattern -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Utility Function Pattern</text>
  
  <rect x="335" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  
  <!-- Code snippet -->
  <text x="350" y="180" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">import {"{ "}debounce{"}"} from 'lodash';</text>
  <text x="350" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d"></text>
  <text x="350" y="210" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">const searchHandler = useCallback(</text>
  <text x="350" y="225" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">  debounce((query) =>{" "{"}</text>
  <text x="350" y="240" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">    executeSearch(query);</text>
  <text x="350" y="255" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">  {"}"}, 300),</text>
  <text x="350" y="270" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">  []</text>
  <text x="350" y="285" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">);</text>
  
  <rect x="335" y="290" width="230" height="35" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="355" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#15803d">✓ Well-tested library</text>
  <text x="355" y="320" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#15803d">✓ Additional features</text>
  
  <!-- Ref-Based Pattern -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Ref-Based Pattern</text>
  
  <rect x="620" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  
  <!-- Code snippet -->
  <text x="635" y="180" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">const timerRef = useRef(null);</text>
  <text x="635" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8"></text>
  <text x="635" y="210" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">const handleSearch = (query) =>{" "{"}</text>
  <text x="635" y="225" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">  if (timerRef.current) {"{"}</text>
  <text x="635" y="240" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">    clearTimeout(timerRef.current);</text>
  <text x="635" y="255" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">  {"}"}</text>
  <text x="635" y="270" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">  timerRef.current = setTimeout(() =></text>
  <text x="635" y="285" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">    executeSearch(query), 300);</text>
  <text x="635" y="280" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">{"}"};</text>
  
  <rect x="620" y="290" width="230" height="35" rx="4" fill="#e9d5ff" stroke="#7c3aed"/>
  <text x="640" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b21a8">✓ Minimal overhead</text>
  <text x="640" y="320" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b21a8">✓ Simple implementation</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Pattern Comparison</text>
  
  <!-- Table headers -->
  <rect x="50" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="150" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Pattern</text>
  <rect x="250" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="350" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Pros</text>
  <rect x="450" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="550" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Cons</text>
  <rect x="650" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="750" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Best For</text>
  
  <!-- Row 1: Custom Hook -->
  <text x="60" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0369a1">Custom Hook</text>
  <text x="260" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Reusable, automatic cleanup</text>
  <text x="460" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">More boilerplate</text>
  <text x="660" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">React applications</text>
  
  <!-- Row 2: Utility Function -->
  <text x="60" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">Utility Function</text>
  <text x="260" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Battle-tested, feature-rich</text>
  <text x="460" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Bundle size (~5KB)</text>
  <text x="660" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Projects with lodash</text>
  
  <!-- Row 3: Ref-Based -->
  <text x="60" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b21a8">Ref-Based</text>
  <text x="260" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Zero dependencies, simple</text>
  <text x="460" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Manual cleanup needed</text>
  <text x="660" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Simple use cases</text>
  
  <!-- Recommendation -->
  <rect x="30" y="540" width="840" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">Recommendation: Use custom hook for React apps, utility function if lodash already installed, ref-based for simple cases</text>
</svg>
