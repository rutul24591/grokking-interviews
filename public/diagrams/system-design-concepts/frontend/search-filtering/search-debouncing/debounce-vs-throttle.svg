<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Debounce vs Throttle Timing</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Comparing execution timing for different strategies</text>
  
  <!-- Trailing Debounce -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Trailing Debounce</text>
  
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  
  <!-- Timeline -->
  <line x1="65" y1="185" x2="265" y2="185" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Keystroke events -->
  <circle cx="85" cy="185" r="5" fill="#0284c7"/>
  <circle cx="115" cy="185" r="5" fill="#0284c7"/>
  <circle cx="145" cy="185" r="5" fill="#0284c7"/>
  <circle cx="175" cy="185" r="5" fill="#0284c7"/>
  <circle cx="205" cy="185" r="5" fill="#0284c7"/>
  
  <!-- Timer resets -->
  <path d="M 85 185 L 85 205 L 115 205" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M 115 185 L 115 205 L 145 205" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M 145 185 L 145 205 L 175 205" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
  <path d="M 175 185 L 175 205 L 205 205" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3"/>
  
  <!-- Execution -->
  <rect x="235" y="170" width="30" height="30" rx="4" fill="#22c55e"/>
  <text x="250" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">✓</text>
  
  <text x="165" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Executes AFTER typing stops</text>
  <text x="165" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Timer resets on each keystroke</text>
  <text x="165" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Best for: Search inputs</text>
  
  <!-- Leading Debounce -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Leading Debounce</text>
  
  <rect x="335" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  
  <!-- Timeline -->
  <line x1="350" y1="185" x2="550" y2="185" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Keystroke events -->
  <circle cx="370" cy="185" r="5" fill="#0284c7"/>
  <circle cx="400" cy="185" r="5" fill="#0284c7"/>
  <circle cx="430" cy="185" r="5" fill="#0284c7"/>
  <circle cx="460" cy="185" r="5" fill="#0284c7"/>
  <circle cx="490" cy="185" r="5" fill="#0284c7"/>
  
  <!-- Execution on first -->
  <rect x="355" y="170" width="30" height="30" rx="4" fill="#22c55e"/>
  <text x="370" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">✓</text>
  
  <!-- Cooldown period -->
  <rect x="390" y="205" width="140" height="15" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="460" y="217" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Cooldown period</text>
  
  <text x="450" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Executes IMMEDIATELY on first</text>
  <text x="450" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Then waits for cooldown</text>
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">Best for: Immediate feedback</text>
  
  <!-- Throttling -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Throttling</text>
  
  <rect x="620" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
  
  <!-- Timeline -->
  <line x1="635" y1="185" x2="835" y2="185" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Keystroke events -->
  <circle cx="655" cy="185" r="5" fill="#0284c7"/>
  <circle cx="685" cy="185" r="5" fill="#0284c7"/>
  <circle cx="715" cy="185" r="5" fill="#0284c7"/>
  <circle cx="745" cy="185" r="5" fill="#0284c7"/>
  <circle cx="775" cy="185" r="5" fill="#0284c7"/>
  <circle cx="805" cy="185" r="5" fill="#0284c7"/>
  
  <!-- Execution at fixed intervals -->
  <rect x="640" y="170" width="30" height="30" rx="4" fill="#22c55e"/>
  <text x="655" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">✓</text>
  
  <rect x="730" y="170" width="30" height="30" rx="4" fill="#22c55e"/>
  <text x="745" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">✓</text>
  
  <rect x="820" y="170" width="30" height="30" rx="4" fill="#22c55e"/>
  <text x="835" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">✓</text>
  
  <!-- Interval markers -->
  <path d="M 670 205 L 730 205" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="700" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Fixed interval</text>
  
  <text x="735" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Executes at MOST once per interval</text>
  <text x="735" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Regardless of event frequency</text>
  <text x="735" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0c4a6e">Best for: Scroll handlers</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Strategy Comparison</text>
  
  <!-- Table headers -->
  <rect x="50" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="150" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Strategy</text>
  <rect x="250" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="350" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">When It Executes</text>
  <rect x="450" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="550" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Use Case</text>
  <rect x="650" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="750" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Not Ideal For</text>
  
  <!-- Row 1: Trailing Debounce -->
  <text x="60" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Trailing Debounce</text>
  <text x="260" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">After delay from last event</text>
  <text x="460" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Search inputs, form validation</text>
  <text x="660" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Immediate feedback needed</text>
  
  <!-- Row 2: Leading Debounce -->
  <text x="60" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">Leading Debounce</text>
  <text x="260" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Immediately, then after delay</text>
  <text x="460" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Button clicks, initial feedback</text>
  <text x="660" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Final state important</text>
  
  <!-- Row 3: Throttling -->
  <text x="60" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0c4a6e">Throttling</text>
  <text x="260" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">At fixed intervals</text>
  <text x="460" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Scroll handlers, resize events</text>
  <text x="660" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Search (incomplete queries)</text>
  
  <!-- Row 4: No Debounce -->
  <text x="60" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#dc2626">No Debounce</text>
  <text x="260" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Every event</text>
  <text x="460" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Critical real-time updates</text>
  <text x="660" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Search, typing handlers</text>
</svg>
