<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="600" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Debounce Timing Diagram</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">How keystrokes reset timer and trigger search execution</text>
  
  <!-- Main timeline -->
  <rect x="30" y="100" width="840" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">300ms Debounce Timeline</text>
  
  <!-- Time axis -->
  <line x1="60" y1="170" x2="840" y2="170" stroke="#f59e0b" stroke-width="3"/>
  <text x="850" y="175" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">Time →</text>
  
  <!-- Keystroke events -->
  <g>
    <circle cx="100" cy="170" r="8" fill="#0284c7"/>
    <text x="100" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">R</text>
    
    <circle cx="150" cy="170" r="8" fill="#0284c7"/>
    <text x="150" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">e</text>
    
    <circle cx="200" cy="170" r="8" fill="#0284c7"/>
    <text x="200" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">a</text>
    
    <circle cx="250" cy="170" r="8" fill="#0284c7"/>
    <text x="250" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">c</text>
    
    <circle cx="300" cy="170" r="8" fill="#0284c7"/>
    <text x="300" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">t</text>
    
    <!-- Gap - user pauses -->
    <rect x="330" y="155" width="240" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="450" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">300ms wait period</text>
    
    <!-- Search execution -->
    <rect x="580" y="155" width="50" height="30" rx="4" fill="#22c55e"/>
    <text x="605" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">SEARCH</text>
    
    <!-- More keystrokes -->
    <circle cx="680" cy="170" r="8" fill="#0284c7"/>
    <text x="680" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">H</text>
    
    <circle cx="730" cy="170" r="8" fill="#0284c7"/>
    <text x="730" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">o</text>
    
    <circle cx="780" cy="170" r="8" fill="#0284c7"/>
    <text x="780" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">o</text>
    
    <circle cx="830" cy="170" r="8" fill="#0284c7"/>
    <text x="830" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">k</text>
  </g>
  
  <!-- Timer visualization -->
  <rect x="30" y="300" width="840" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Timer Reset Mechanism</text>
  
  <!-- Timer bars -->
  <g>
    <!-- First timer (cancelled) -->
    <rect x="60" y="360" width="80" height="25" rx="3" fill="#fee2e2" stroke="#ef4444"/>
    <text x="100" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Timer 1 ✗</text>
    <path d="M 140 372 L 150 372" stroke="#ef4444" stroke-width="2" marker-end="url(#x)" fill="none"/>
    
    <!-- Second timer (cancelled) -->
    <rect x="110" y="360" width="80" height="25" rx="3" fill="#fee2e2" stroke="#ef4444"/>
    <text x="150" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Timer 2 ✗</text>
    <path d="M 190 372 L 200 372" stroke="#ef4444" stroke-width="2" marker-end="url(#x)" fill="none"/>
    
    <!-- Third timer (cancelled) -->
    <rect x="160" y="360" width="80" height="25" rx="3" fill="#fee2e2" stroke="#ef4444"/>
    <text x="200" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Timer 3 ✗</text>
    <path d="M 240 372 L 250 372" stroke="#ef4444" stroke-width="2" marker-end="url(#x)" fill="none"/>
    
    <!-- Fourth timer (cancelled) -->
    <rect x="210" y="360" width="80" height="25" rx="3" fill="#fee2e2" stroke="#ef4444"/>
    <text x="250" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Timer 4 ✗</text>
    <path d="M 290 372 L 300 372" stroke="#ef4444" stroke-width="2" marker-end="url(#x)" fill="none"/>
    
    <!-- Fifth timer (completes) -->
    <rect x="260" y="360" width="300" height="25" rx="3" fill="#dcfce7" stroke="#22c55e"/>
    <text x="410" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Timer 5 — 300ms countdown</text>
    <rect x="565" y="360" width="50" height="25" rx="3" fill="#22c55e"/>
    <text x="590" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">EXECUTE</text>
  </g>
  
  <!-- Query state -->
  <rect x="30" y="460" width="400" height="120" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="230" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Query State Over Time</text>
  
  <rect x="50" y="510" width="360" height="55" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="535" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475569">t=0ms: ""</text>
  <text x="65" y="552" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475569">t=200ms: "React" → SEARCH</text>
  <text x="200" y="535" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475569">t=50ms: "R"</text>
  <text x="200" y="552" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475569">t=250ms: "ReactH"</text>
  <text x="330" y="535" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475569">t=100ms: "Re"</text>
  <text x="330" y="552" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475569">t=300ms: "ReactHo"</text>
  
  <!-- Key insight -->
  <rect x="450" y="460" width="420" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Key Insight</text>
  
  <rect x="470" y="510" width="380" height="55" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="485" y="535" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">
    <tspan font-weight="600">Without debounce:</tspan> 8 searches (one per keystroke)
  </text>
  <text x="485" y="552" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">
    <tspan font-weight="600">With debounce:</tspan> 1 search (after typing stops)
  </text>
  <text x="660" y="580" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">87.5% reduction in searches!</text>
  
  <!-- Arrow and X markers -->
  <defs>
    <marker id="x" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 10 M 10 0 L 0 10" stroke="#ef4444" stroke-width="2"/>
    </marker>
  </defs>
</svg>
