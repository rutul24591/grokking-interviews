<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Facet Structure &amp; States</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Facets, values, counts, and enabled/disabled/selected states</text>
  
  <!-- Facet Example: Brand -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Facet: Brand</text>
  
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- Facet values -->
  <rect x="65" y="175" width="200" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="80" y="192" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">✓ Nike</text>
  <text x="240" y="192" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#15803d">123</text>
  
  <rect x="65" y="205" width="200" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="80" y="222" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">☐ Adidas</text>
  <text x="240" y="222" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#475569">89</text>
  
  <rect x="65" y="235" width="200" height="25" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="80" y="252" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">☐ Puma</text>
  <text x="240" y="252" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">0</text>
  
  <text x="165" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">
    <tspan fill="#15803d" font-weight="600">Selected</tspan> | <tspan fill="#475569" font-weight="600">Enabled</tspan> | <tspan fill="#94a3b8" font-weight="600">Disabled</tspan>
  </text>
  
  <!-- Facet Example: Price -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Facet: Price Range</text>
  
  <rect x="335" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Price ranges -->
  <rect x="350" y="175" width="200" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="365" y="192" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">☐ $0 - $50</text>
  <text x="530" y="192" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#475569">45</text>
  
  <rect x="350" y="205" width="200" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="365" y="222" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">✓ $50 - $100</text>
  <text x="530" y="222" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">78</text>
  
  <rect x="350" y="235" width="200" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="365" y="252" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">☐ $100+</text>
  <text x="530" y="252" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#475569">34</text>
  
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Mutually exclusive (radio-style)</text>
  
  <!-- Facet Example: Color -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Facet: Color</text>
  
  <rect x="620" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- Color swatches -->
  <rect x="635" y="175" width="30" height="30" rx="4" fill="#000000" stroke="#22c55e" stroke-width="3"/>
  <text x="675" y="195" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Black</text>
  <text x="830" y="195" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#475569">56</text>
  
  <rect x="635" y="210" width="30" height="30" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="675" y="230" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">White</text>
  <text x="830" y="230" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#475569">43</text>
  
  <rect x="635" y="245" width="30" height="30" rx="4" fill="#dc2626" stroke="#e2e8f0" stroke-width="1"/>
  <text x="675" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Red</text>
  <text x="830" y="265" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">0</text>
  
  <text x="735" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Multi-select with swatches</text>
  
  <!-- Legend -->
  <rect x="30" y="320" width="840" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Facet Value States</text>
  
  <rect x="60" y="365" width="150" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="135" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#15803d">Selected</text>
  
  <rect x="240" y="365" width="150" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="315" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">Enabled</text>
  
  <rect x="420" y="365" width="150" height="25" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="495" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">Disabled (0 results)</text>
  
  <text x="700" y="382" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#647480">Count shows matching results</text>
  
  <!-- Applied Filters -->
  <rect x="30" y="420" width="840" height="110" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Applied Filters (Chips)</text>
  
  <rect x="60" y="465" width="120" height="35" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="80" y="488" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Brand: Nike</text>
  <text x="170" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">✕</text>
  
  <rect x="195" y="465" width="140" height="35" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="215" y="488" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Price: $50-$100</text>
  <text x="325" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">✕</text>
  
  <rect x="350" y="465" width="100" height="35" rx="6" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="400" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Clear all</text>
</svg>
