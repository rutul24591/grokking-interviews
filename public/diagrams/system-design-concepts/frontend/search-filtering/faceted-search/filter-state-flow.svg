<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Filter State Flow</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">State changes as filters are applied and removed</text>
  
  <!-- Initial State -->
  <rect x="30" y="100" width="200" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Initial State</text>
  
  <rect x="50" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="130" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Applied: []</text>
  <text x="130" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Results: 1,234</text>
  <text x="130" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">URL: /products</text>
  
  <!-- Arrow: User selects Nike -->
  <path d="M 230 170 L 270 170" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="250" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Select Nike</text>
  
  <!-- After Brand Filter -->
  <rect x="270" y="100" width="200" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">After Brand Filter</text>
  
  <rect x="290" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="370" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Applied: [Brand:Nike]</text>
  <text x="370" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Results: 234</text>
  <text x="370" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">URL: ?brand=nike</text>
  
  <!-- Arrow: User selects $50-100 -->
  <path d="M 470 170 L 510 170" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="490" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Select $50-100</text>
  
  <!-- After Price Filter -->
  <rect x="510" y="100" width="200" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="610" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">After Price Filter</text>
  
  <rect x="530" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="610" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Applied: [Brand:Nike,</text>
  <text x="610" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Price:$50-100]</text>
  <text x="610" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Results: 45</text>
  <text x="610" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">URL: ?brand=nike&amp;price=50-100</text>
  
  <!-- Arrow: User removes Brand -->
  <path d="M 710 170 L 750 170" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  <text x="730" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Remove Brand</text>
  
  <!-- After Remove -->
  <rect x="750" y="100" width="120" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="810" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">After Remove</text>
  
  <rect x="770" y="155" width="80" height="70" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="810" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Applied:</text>
  <text x="810" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">[Price:$50-100]</text>
  <text x="810" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Results: 189</text>
  
  <!-- Facet Count Updates -->
  <rect x="30" y="270" width="400" height="260" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Facet Count Updates</text>
  
  <rect x="50" y="320" width="360" height="195" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  
  <!-- Before filter -->
  <text x="65" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">Before Filter (All Products):</text>
  <rect x="65" y="360" width="330" height="25" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="80" y="377" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Nike (456)</text>
  <text x="250" y="377" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Adidas (389)</text>
  
  <rect x="65" y="390" width="330" height="25" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="80" y="407" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">$0-50 (234)</text>
  <text x="250" y="407" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">$50-100 (567)</text>
  
  <!-- After filter -->
  <text x="65" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">After Filter (Nike selected):</text>
  <rect x="65" y="460" width="330" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="80" y="477" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">Nike ✓ (456)</text>
  <text x="250" y="477" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Adidas (0) ✗</text>
  
  <rect x="65" y="490" width="330" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="80" y="507" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">$0-50 (189)</text>
  <text x="250" y="507" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">$50-100 (234)</text>
  
  <!-- Applied Filters Chips -->
  <rect x="450" y="270" width="420" height="260" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="660" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Applied Filters (Chips)</text>
  
  <rect x="470" y="320" width="380" height="195" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  
  <!-- Chip 1 -->
  <rect x="485" y="340" width="140" height="40" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="500" y="365" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Brand: Nike</text>
  <text x="615" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">✕</text>
  
  <!-- Chip 2 -->
  <rect x="485" y="390" width="160" height="40" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="500" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Price: $50-$100</text>
  <text x="635" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">✕</text>
  
  <!-- Clear all button -->
  <rect x="485" y="450" width="120" height="40" rx="6" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="545" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Clear all</text>
  
  <!-- Result count -->
  <rect x="650" y="450" width="180" height="40" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="740" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">45 products found</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
