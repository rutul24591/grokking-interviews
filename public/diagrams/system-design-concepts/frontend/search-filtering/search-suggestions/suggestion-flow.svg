<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Suggestion Flow Pipeline</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">From keystroke to displayed suggestions with timing</text>
  
  <!-- Timeline -->
  <line x1="60" y1="120" x2="840" y2="120" stroke="#e2e8f0" stroke-width="3"/>
  <text x="850" y="125" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#647480">Time →</text>
  
  <!-- t=0ms: User types 'r' -->
  <circle cx="100" cy="120" r="10" fill="#0284c7"/>
  <text x="100" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">t=0ms</text>
  <text x="100" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">User types</text>
  <rect x="70" y="175" width="60" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="100" y="195" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#1e293b">"r"</text>
  
  <!-- t=100ms: User types 're' -->
  <circle cx="200" cy="120" r="10" fill="#0284c7"/>
  <text x="200" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">t=100ms</text>
  <text x="200" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">User types</text>
  <rect x="170" y="175" width="60" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="200" y="195" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#1e293b">"re"</text>
  
  <!-- t=200ms: User types 'rea' -->
  <circle cx="300" cy="120" r="10" fill="#0284c7"/>
  <text x="300" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">t=200ms</text>
  <text x="300" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">User types</text>
  <rect x="270" y="175" width="60" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="300" y="195" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#1e293b">"rea"</text>
  
  <!-- t=200ms: Debounce timer starts -->
  <rect x="320" y="105" width="100" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="370" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">Debounce 200ms</text>
  
  <!-- t=400ms: Debounce complete, fetch starts -->
  <circle cx="420" cy="120" r="10" fill="#f59e0b"/>
  <text x="420" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">t=400ms</text>
  <text x="420" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Fetch</text>
  <rect x="390" y="175" width="60" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="420" y="195" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#92400e">API call</text>
  
  <!-- Network delay -->
  <path d="M 450 120 L 580 120" stroke="#f59e0b" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="515" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">~150ms latency</text>
  
  <!-- t=550ms: Response received, display -->
  <circle cx="580" cy="120" r="10" fill="#22c55e"/>
  <text x="580" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">t=550ms</text>
  <text x="580" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Display</text>
  <rect x="550" y="175" width="60" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="580" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Show 8</text>
  
  <!-- Suggestions dropdown visual -->
  <rect x="520" y="210" width="120" height="100" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="580" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">react hooks</text>
  <text x="580" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">react native</text>
  <text x="580" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">react docs</text>
  <text x="580" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">...</text>
  
  <!-- t=600ms: User types 'react' -->
  <circle cx="680" cy="120" r="10" fill="#0284c7"/>
  <text x="680" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">t=600ms</text>
  <text x="680" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">User types</text>
  <rect x="650" y="175" width="60" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="680" y="195" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#1e293b">"react"</text>
  
  <!-- Previous request cancelled -->
  <rect x="470" y="240" width="80" height="25" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="510" y="257" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Cancelled ✗</text>
  <path d="M 550 252 L 570 252" stroke="#ef4444" stroke-width="2" marker-end="url(#x)" fill="none"/>
  
  <!-- New debounce starts -->
  <rect x="700" y="105" width="100" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="750" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">Debounce 200ms</text>
  
  <!-- t=800ms: New fetch -->
  <circle cx="800" cy="120" r="10" fill="#f59e0b"/>
  <text x="800" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">t=800ms</text>
  <text x="800" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">New fetch</text>
  
  <!-- X marker -->
  <defs>
    <marker id="x" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 0 L 10 10 M 10 0 L 0 10" stroke="#ef4444" stroke-width="2"/>
    </marker>
  </defs>
  
  <!-- Key Metrics -->
  <rect x="30" y="350" width="400" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Key Timing Metrics</text>
  
  <rect x="50" y="400" width="360" height="115" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="425" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475560">Debounce Delay:</text>
  <text x="200" y="425" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475560">200ms (configurable)</text>
  <text x="65" y="450" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475560">API Latency:</text>
  <text x="200" y="450" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475560">100-200ms typical</text>
  <text x="65" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475560">Total Time:</text>
  <text x="200" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475560">300-500ms (debounce + API)</text>
  <text x="65" y="500" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475560">Target:</text>
  <text x="200" y="500" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">&lt;500ms for good UX</text>
  
  <!-- Cancellation Logic -->
  <rect x="450" y="350" width="420" height="180" rx="8" fill="#fef2f2" stroke="#ef4444"/>
  <text x="660" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#b91c1c">Request Cancellation Logic</text>
  
  <rect x="470" y="400" width="380" height="115" rx="6" fill="#ffffff" stroke="#fecaca"/>
  <text x="485" y="425" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#b91c1c">const controller = new AbortController();</text>
  <text x="485" y="445" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#b91c1c"></text>
  <text x="485" y="465" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#b91c1c">// On new input:</text>
  <text x="485" y="485" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#b91c1c">if (controller) controller.abort();</text>
  <text x="485" y="505" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#b91c1c">controller = new AbortController();</text>
</svg>
