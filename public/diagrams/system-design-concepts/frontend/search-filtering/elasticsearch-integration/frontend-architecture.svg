<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Frontend Architecture for Elasticsearch</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Query builder, API client, response parser, and UI components</text>
  
  <!-- Query Builder -->
  <rect x="30" y="100" width="200" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Query Builder</text>
  
  <rect x="50" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="65" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Input:</text>
  <text x="65" y="197" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">• Search query</text>
  <text x="65" y="212" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">• Filters</text>
  <text x="65" y="227" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">• Sort, pagination</text>
  
  <!-- Arrow -->
  <path d="M 230 170 L 260 170" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- API Client -->
  <rect x="260" y="100" width="200" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="360" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">API Client</text>
  
  <rect x="280" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="295" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• HTTP requests</text>
  <text x="295" y="197" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Caching</text>
  <text x="295" y="212" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Error handling</text>
  <text x="295" y="227" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Retry logic</text>
  
  <!-- Arrow -->
  <path d="M 460 170 L 490 170" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Response Parser -->
  <rect x="490" y="100" width="200" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Response Parser</text>
  
  <rect x="510" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="525" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Extract hits</text>
  <text x="525" y="197" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Parse aggregations</text>
  <text x="525" y="212" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Process highlights</text>
  <text x="525" y="227" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Format for UI</text>
  
  <!-- Arrow -->
  <path d="M 690 170 L 720 170" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- UI Components -->
  <rect x="720" y="100" width="150" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="795" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">UI Components</text>
  
  <rect x="740" y="155" width="110" height="70" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="745" y="175" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">• Search box</text>
  <text x="745" y="190" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">• Filters</text>
  <text x="745" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">• Results</text>
  <text x="745" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">• Pagination</text>
  
  <!-- State Management -->
  <rect x="30" y="270" width="400" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">State Management</text>
  
  <rect x="50" y="320" width="360" height="55" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">query, filters, sort, pagination, results, facets, loading, error</text>
  
  <!-- Query Construction Patterns -->
  <rect x="450" y="270" width="420" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Query Construction Patterns</text>
  
  <rect x="470" y="320" width="180" height="55" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="485" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Client-Side DSL</text>
  <text x="485" y="365" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Frontend builds full query</text>
  
  <rect x="670" y="320" width="180" height="55" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="685" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Backend API</text>
  <text x="685" y="365" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Frontend sends params</text>
  
  <!-- Example Query -->
  <rect x="30" y="410" width="400" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="230" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Example Query DSL</text>
  
  <rect x="50" y="460" width="360" height="55" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="65" y="485" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">{"{ query: {"}"}</text>
  <text x="65" y="500" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">  "bool": {"{"} "must": [{"}"}</text>
  <text x="65" y="515" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">    {"{ "multi_match": {"}"} {"}"}]</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
