<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Query Construction Patterns</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Client-side DSL construction vs Backend API parameterization</text>
  
  <!-- Client-Side DSL -->
  <rect x="30" y="100" width="400" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="230" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Client-Side DSL Construction</text>
  
  <rect x="50" y="155" width="360" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Flow diagram -->
  <rect x="65" y="175" width="100" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="115" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">UI State</text>
  
  <path d="M 165 195 L 185 195" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="185" y="175" width="120" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="245" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">Build Query DSL</text>
  
  <path d="M 305 195 L 325 195" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  
  <rect x="325" y="175" width="70" height="40" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="360" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">POST /search</text>
  
  <!-- Example code -->
  <rect x="65" y="230" width="330" height="45" rx="4" fill="#1e293b"/>
  <text x="80" y="250" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#22c55e">const query = {"{"}</text>
  <text x="80" y="265" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#22c55e">  "query": {"{"} "match": {"}"} {"}"}</text>
  
  <rect x="50" y="290" width="360" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="65" y="312" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#92400e">✓ Flexible, ✗ Exposes query logic</text>
  
  <!-- Backend API -->
  <rect x="470" y="100" width="400" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Backend API Parameterization</text>
  
  <rect x="490" y="155" width="360" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- Flow diagram -->
  <rect x="505" y="175" width="100" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="555" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">UI State</text>
  
  <path d="M 605 195 L 625 195" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="625" y="175" width="120" height="40" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="685" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Send Params</text>
  
  <path d="M 745 195 L 765 195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  
  <rect x="765" y="175" width="70" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="800" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">Backend DSL</text>
  
  <!-- Example code -->
  <rect x="505" y="230" width="330" height="45" rx="4" fill="#1e293b"/>
  <text x="520" y="250" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#22c55e">POST /api/search</text>
  <text x="520" y="265" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#22c55e">{"{ "} q: "react", category: "docs" {"}"}</text>
  
  <rect x="490" y="290" width="360" height="35" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="505" y="312" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#15803d">✓ Secure, validated, ✗ Less flexible</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Pattern Comparison</text>
  
  <!-- Table headers -->
  <rect x="50" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="150" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Aspect</text>
  <rect x="250" y="365" width="300" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Client-Side DSL</text>
  <rect x="550" y="365" width="300" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="700" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#15803d">Backend API</text>
  
  <!-- Row 1: Security -->
  <text x="60" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Security</text>
  <text x="260" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Exposes query structure</text>
  <text x="560" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Query logic hidden</text>
  
  <!-- Row 2: Validation -->
  <text x="60" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Validation</text>
  <text x="260" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Client-side only</text>
  <text x="560" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Server-side validation</text>
  
  <!-- Row 3: Flexibility -->
  <text x="60" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Flexibility</text>
  <text x="260" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Full DSL access</text>
  <text x="560" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">~ Limited by API</text>
  
  <!-- Row 4: Performance -->
  <text x="60" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Performance</text>
  <text x="260" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">~ Same latency</text>
  <text x="560" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Can optimize queries</text>
  
  <!-- Recommendation -->
  <rect x="30" y="540" width="840" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">Recommendation: Use Backend API for production, Client-Side DSL only for internal tools</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
