<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Search Flow Pipeline</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">From user query to ranked results with highlighting</text>
  
  <!-- Step 1: User Input -->
  <rect x="30" y="100" width="160" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="110" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">1. User Input</text>
  <rect x="50" y="155" width="120" height="35" rx="6" fill="#ffffff" stroke="#0284c7"/>
  <text x="110" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">"React Hooks"</text>
  
  <!-- Arrow -->
  <path d="M 190 150 L 220 150" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Step 2: Normalization -->
  <rect x="220" y="100" width="160" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="300" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">2. Normalization</text>
  <text x="300" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Lowercase</text>
  <text x="300" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Remove accents</text>
  <text x="300" y="199" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Trim whitespace</text>
  
  <!-- Arrow -->
  <path d="M 380 150 L 410 150" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Step 3: Tokenization -->
  <rect x="410" y="100" width="160" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="490" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">3. Tokenization</text>
  <text x="490" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Split on spaces</text>
  <text x="490" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Remove stopwords</text>
  <text x="490" y="199" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Stemming</text>
  
  <!-- Arrow -->
  <path d="M 570 150 L 600 150" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- Step 4: Index Lookup -->
  <rect x="600" y="100" width="160" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="680" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">4. Index Lookup</text>
  <text x="680" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">Query inverted index</text>
  <text x="680" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">Get doc IDs</text>
  <text x="680" y="199" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">Intersect results</text>
  
  <!-- Arrow -->
  <path d="M 760 150 L 790 150" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)" fill="none"/>
  
  <!-- Step 5: Scoring -->
  <rect x="790" y="100" width="160" height="100" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="870" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#9d174d">5. Scoring &amp; Rank</text>
  <text x="870" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9d174d">Calculate relevance</text>
  <text x="870" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9d174d">Apply field weights</text>
  <text x="870" y="199" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9d174d">Sort descending</text>
  
  <!-- Bottom: Detailed flow visualization -->
  <rect x="30" y="230" width="840" height="300" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Detailed Query Processing Example</text>
  
  <!-- Query transformation -->
  <rect x="50" y="280" width="800" height="80" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  
  <text x="65" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">Original Query:</text>
  <rect x="180" y="290" width="150" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="255" y="310" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" fill="#1e293b">"React Hooks"</text>
  
  <path d="M 340 305 L 370 305" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  
  <text x="385" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">Normalized:</text>
  <rect x="480" y="290" width="150" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="555" y="310" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" fill="#92400e">"react hooks"</text>
  
  <path d="M 640 305 L 670 305" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  
  <text x="685" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">Tokens:</text>
  <rect x="750" y="290" width="40" height="30" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="770" y="310" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#15803d">react</text>
  <rect x="800" y="290" width="40" height="30" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="820" y="310" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#15803d">hooks</text>
  
  <!-- Index lookup visualization -->
  <rect x="50" y="380" width="800" height="135" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  
  <text x="65" y="405" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">Index Lookup &amp; Intersection:</text>
  
  <!-- Token 1 results -->
  <rect x="65" y="420" width="350" height="40" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="80" y="440" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#1d4ed8">"react" →</text>
  <text x="135" y="440" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#1e40af">[doc1, doc5, doc12, doc45, doc78]</text>
  
  <!-- Token 2 results -->
  <rect x="65" y="470" width="350" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="80" y="490" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#15803d">"hooks" →</text>
  <text x="135" y="490" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#14532d">[doc5, doc12, doc23, doc67]</text>
  
  <!-- Intersection arrow -->
  <path d="M 430 445 L 470 445 L 470 460 L 510 460" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  <text x="450" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#647480">Intersect</text>
  
  <!-- Result -->
  <rect x="520" y="440" width="320" height="50" rx="4" fill="#fce7f3" stroke="#ec4899"/>
  <text x="535" y="460" text-anchor="start" font-family="monospace, sans-serif" font-size="10" font-weight="600" fill="#9d174d">Result:</text>
  <text x="590" y="460" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#9d174d">[doc5, doc12]</text>
  <text x="535" y="480" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#9d174d">Documents containing BOTH "react" AND "hooks"</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
