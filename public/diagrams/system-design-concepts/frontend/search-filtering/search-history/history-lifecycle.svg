<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Search History Lifecycle</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Add, deduplicate, rank, expire, and delete operations</text>
  
  <!-- Add Operation -->
  <rect x="30" y="100" width="170" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="115" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">1. Add</text>
  <text x="115" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">On search submit</text>
  <text x="115" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Store: query + timestamp</text>
  <text x="115" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Optional: result count</text>
  <rect x="50" y="215" width="130" height="20" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="115" y="229" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">{"{ query, ts }"}</text>
  
  <!-- Arrow -->
  <path d="M 200 170 L 230 170" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Deduplicate -->
  <rect x="230" y="100" width="170" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="315" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">2. Deduplicate</text>
  <text x="315" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Query exists?</text>
  <text x="315" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Yes → Update timestamp</text>
  <text x="315" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">No → Add new entry</text>
  <rect x="250" y="215" width="130" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="315" y="229" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#92400e">ts = Date.now()</text>
  
  <!-- Arrow -->
  <path d="M 400 170 L 430 170" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Rank -->
  <rect x="430" y="100" width="170" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="515" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">3. Rank</text>
  <text x="515" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Sort by:</text>
  <text x="515" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• Recency (newest)</text>
  <text x="515" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• Frequency (optional)</text>
  <rect x="450" y="215" width="130" height="20" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="515" y="229" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#15803d">sort((a,b) => b.ts - a.ts)</text>
  
  <!-- Arrow -->
  <path d="M 600 170 L 630 170" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- Limit -->
  <rect x="630" y="100" width="170" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="715" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">4. Limit</text>
  <text x="715" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">Max entries: 20-50</text>
  <text x="715" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">Remove oldest if over</text>
  <text x="715" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">(LRU eviction)</text>
  <rect x="650" y="215" width="130" height="20" rx="4" fill="#e9d5ff" stroke="#7c3aed"/>
  <text x="715" y="229" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">slice(0, MAX)</text>
  
  <!-- Display -->
  <path d="M 800 170 L 850 170" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)" fill="none"/>
  <rect x="850" y="100" width="120" height="140" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="910" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#9d174d">Display</text>
  
  <!-- Delete Operation (side flow) -->
  <rect x="30" y="270" width="400" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#b91c1c">Delete Operations</text>
  
  <rect x="50" y="320" width="360" height="55" rx="6" fill="#ffffff" stroke="#fecaca"/>
  <text x="65" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Individual delete: Remove specific entry</text>
  <text x="65" y="365" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Clear all: Remove all history entries</text>
  
  <!-- Expire Operation -->
  <rect x="450" y="270" width="420" height="120" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="660" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#9a3412">Expiration Policy</text>
  
  <rect x="470" y="320" width="380" height="55" rx="6" fill="#ffffff" stroke="#fed7aa"/>
  <text x="485" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Time-based: Remove entries &gt;30 days old</text>
  <text x="485" y="365" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Count-based: Keep only last 50 entries</text>
  
  <!-- Example History List -->
  <rect x="30" y="410" width="400" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Example History List</text>
  
  <rect x="50" y="460" width="360" height="55" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="485" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">1. react hooks tutorial (2 min ago) ✕</text>
  <text x="65" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">2. react native vs flutter (1 hour ago) ✕</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
