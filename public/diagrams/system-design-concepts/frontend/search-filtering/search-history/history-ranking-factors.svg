<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">History Ranking Factors</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Recency, frequency, and engagement signals for ordering history</text>
  
  <!-- Recency Factor -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Recency (50% weight)</text>
  
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="65" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">📅 Newer searches rank higher</text>
  <text x="65" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">⏰ Decay over time</text>
  <text x="65" y="230" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">📊 Formula: 1 / (days_ago + 1)</text>
  
  <!-- Example timeline -->
  <rect x="65" y="250" width="200" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="80" y="267" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">Today: score=1.0</text>
  <rect x="65" y="280" width="150" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b" opacity="0.7"/>
  <text x="80" y="297" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">7 days ago: score=0.125</text>
  
  <!-- Frequency Factor -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Frequency (30% weight)</text>
  
  <rect x="335" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="350" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">🔄 Repeated searches rank higher</text>
  <text x="350" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">📈 Count search occurrences</text>
  <text x="350" y="230" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">📊 Formula: log(count + 1)</text>
  
  <!-- Example counts -->
  <rect x="350" y="250" width="200" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="365" y="267" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Searched 10×: score=1.04</text>
  <rect x="350" y="280" width="200" height="25" rx="4" fill="#dcfce7" stroke="#22c55e" opacity="0.7"/>
  <text x="365" y="297" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Searched 1×: score=0.30</text>
  
  <!-- Engagement Factor -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Engagement (20% weight)</text>
  
  <rect x="620" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="635" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">👆 Clicks boost ranking</text>
  <text x="635" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">❌ Zero results lower ranking</text>
  <text x="635" y="230" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">📊 Formula: click_rate</text>
  
  <!-- Example engagement -->
  <rect x="635" y="250" width="200" height="25" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="650" y="267" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Clicked results: score=1.0</text>
  <rect x="635" y="280" width="200" height="25" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="650" y="297" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#647480">No clicks: score=0.0</text>
  
  <!-- Combined Score -->
  <rect x="30" y="320" width="840" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Combined Score Formula</text>
  
  <rect x="60" y="370" width="780" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="393" text-anchor="middle" font-family="monospace, sans-serif" font-size="11" fill="#475560">score = (recency × 0.5) + (frequency × 0.3) + (engagement × 0.2)</text>
  
  <!-- Example Ranking -->
  <rect x="30" y="440" width="400" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="230" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Example: Ranked History</text>
  
  <rect x="50" y="490" width="360" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="65" y="510" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">1. react hooks (score=0.95) - searched 5×, clicked</text>
  
  <rect x="450" y="440" width="420" height="90" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="660" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Tune Weights Based On</text>
  
  <rect x="470" y="490" width="380" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="485" y="510" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Analytics: What predicts re-search for your users?</text>
</svg>
