<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1822">Performance Budget Monitoring Dashboard</text>

  <!-- Chart area background -->
  <rect x="60" y="70" width="520" height="280" rx="8" fill="white" stroke="#e0dce8" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="50" y="100" text-anchor="end" font-size="10" fill="#666">3.0s</text>
  <text x="50" y="150" text-anchor="end" font-size="10" fill="#666">2.5s</text>
  <text x="50" y="200" text-anchor="end" font-size="10" fill="#666">2.0s</text>
  <text x="50" y="250" text-anchor="end" font-size="10" fill="#666">1.5s</text>
  <text x="50" y="300" text-anchor="end" font-size="10" fill="#666">1.0s</text>
  <text x="50" y="340" text-anchor="end" font-size="10" fill="#666">0.5s</text>

  <!-- Grid lines -->
  <line x1="60" y1="96" x2="580" y2="96" stroke="#f0eef5" stroke-width="1"/>
  <line x1="60" y1="146" x2="580" y2="146" stroke="#f0eef5" stroke-width="1"/>
  <line x1="60" y1="196" x2="580" y2="196" stroke="#f0eef5" stroke-width="1"/>
  <line x1="60" y1="246" x2="580" y2="246" stroke="#f0eef5" stroke-width="1"/>
  <line x1="60" y1="296" x2="580" y2="296" stroke="#f0eef5" stroke-width="1"/>

  <!-- Budget threshold line (LCP = 2.5s) -->
  <line x1="60" y1="146" x2="580" y2="146" stroke="#d97843" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="583" y="136" width="80" height="20" rx="4" fill="#d97843"/>
  <text x="623" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Budget: 2.5s</text>

  <!-- LCP trend line (mostly under, with a spike) -->
  <polyline points="80,220 130,210 180,215 230,200 280,195 330,180 380,160 430,155 460,130 480,140 530,190 560,205" fill="none" stroke="#6d5bd0" stroke-width="2.5"/>
  <!-- Data points -->
  <circle cx="80" cy="220" r="4" fill="#6d5bd0"/>
  <circle cx="130" cy="210" r="4" fill="#6d5bd0"/>
  <circle cx="180" cy="215" r="4" fill="#6d5bd0"/>
  <circle cx="230" cy="200" r="4" fill="#6d5bd0"/>
  <circle cx="280" cy="195" r="4" fill="#6d5bd0"/>
  <circle cx="330" cy="180" r="4" fill="#6d5bd0"/>
  <circle cx="380" cy="160" r="4" fill="#6d5bd0"/>
  <circle cx="430" cy="155" r="4" fill="#6d5bd0"/>
  <circle cx="460" cy="130" r="5" fill="#d97843" stroke="#d97843" stroke-width="2"/>
  <circle cx="480" cy="140" r="5" fill="#d97843" stroke="#d97843" stroke-width="2"/>
  <circle cx="530" cy="190" r="4" fill="#6d5bd0"/>
  <circle cx="560" cy="205" r="4" fill="#6d5bd0"/>

  <!-- Violation callout -->
  <rect x="430" y="85" width="95" height="35" rx="6" fill="#d97843" opacity="0.15" stroke="#d97843" stroke-width="1"/>
  <text x="477" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#d97843">Over budget!</text>
  <text x="477" y="114" text-anchor="middle" font-size="9" fill="#d97843">2.7s, 2.6s</text>

  <!-- FCP trend line -->
  <polyline points="80,280 130,275 180,270 230,265 280,268 330,260 380,255 430,250 460,248 480,252 530,260 560,265" fill="none" stroke="#2f9d74" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- X axis labels (weeks) -->
  <text x="80" y="365" text-anchor="middle" font-size="9" fill="#666">W1</text>
  <text x="180" y="365" text-anchor="middle" font-size="9" fill="#666">W3</text>
  <text x="280" y="365" text-anchor="middle" font-size="9" fill="#666">W5</text>
  <text x="380" y="365" text-anchor="middle" font-size="9" fill="#666">W7</text>
  <text x="480" y="365" text-anchor="middle" font-size="9" fill="#666">W9</text>
  <text x="560" y="365" text-anchor="middle" font-size="9" fill="#666">W11</text>

  <!-- Legend -->
  <line x1="80" y1="385" x2="110" y2="385" stroke="#6d5bd0" stroke-width="2.5"/>
  <text x="118" y="389" font-size="11" fill="#1a1822">LCP (p75)</text>
  <line x1="200" y1="385" x2="230" y2="385" stroke="#2f9d74" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="238" y="389" font-size="11" fill="#1a1822">FCP (p75)</text>
  <line x1="330" y1="385" x2="360" y2="385" stroke="#d97843" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="368" y="389" font-size="11" fill="#1a1822">Budget threshold</text>

  <!-- Metric cards on the right -->
  <rect x="620" y="70" width="260" height="85" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="750" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">LCP (p75)</text>
  <text x="750" y="120" text-anchor="middle" font-size="28" font-weight="bold" fill="#2f9d74">2.05s</text>
  <text x="750" y="145" text-anchor="middle" font-size="11" fill="#2f9d74">Under budget (2.5s)</text>

  <rect x="620" y="170" width="260" height="85" rx="8" fill="white" stroke="#d97843" stroke-width="2"/>
  <text x="750" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#d97843">JS Bundle</text>
  <text x="750" y="220" text-anchor="middle" font-size="28" font-weight="bold" fill="#2f9d74">187 KB</text>
  <text x="750" y="245" text-anchor="middle" font-size="11" fill="#2f9d74">Under budget (200 KB)</text>

  <rect x="620" y="270" width="260" height="85" rx="8" fill="white" stroke="#2f9d74" stroke-width="2"/>
  <text x="750" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f9d74">Lighthouse</text>
  <text x="750" y="320" text-anchor="middle" font-size="28" font-weight="bold" fill="#2f9d74">94</text>
  <text x="750" y="345" text-anchor="middle" font-size="11" fill="#2f9d74">Above budget (&amp;ge;90)</text>

  <!-- Alert history -->
  <rect x="620" y="370" width="260" height="100" rx="8" fill="white" stroke="#d97843" stroke-width="1"/>
  <text x="750" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">Recent Alerts</text>
  <circle cx="640" cy="418" r="5" fill="#d97843"/>
  <text x="655" y="422" font-size="10" fill="#1a1822">W9: LCP exceeded 2.5s (2.7s)</text>
  <circle cx="640" cy="440" r="5" fill="#d97843"/>
  <text x="655" y="444" font-size="10" fill="#1a1822">W9: LCP exceeded 2.5s (2.6s)</text>
  <circle cx="640" cy="462" r="5" fill="#2f9d74"/>
  <text x="655" y="466" font-size="10" fill="#1a1822">W10: LCP back under budget</text>

  <!-- Bottom summary -->
  <text x="320" y="430" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Track real user metrics (RUM) over time</text>
  <text x="320" y="450" text-anchor="middle" font-size="11" fill="#666">Alert when p75 values exceed thresholds for two consecutive data points</text>
</svg>