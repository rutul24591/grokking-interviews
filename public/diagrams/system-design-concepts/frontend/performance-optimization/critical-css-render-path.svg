<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" role="img" aria-labelledby="criticalCssRenderPathTitle criticalCssRenderPathDesc">
  <title id="criticalCssRenderPathTitle">Critical CSS Render Path Comparison</title>
  <desc id="criticalCssRenderPathDesc">Comparison of render blocking CSS vs critical CSS inline approach showing network round trips</desc>
  
  <defs>
    <linearGradient id="renderBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="850" height="480" fill="url(#renderBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Critical CSS: Render Path Comparison</text>
  
  <!-- Without Critical CSS (Top) -->
  <rect x="30" y="60" width="790" height="180" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2" />
  <rect x="30" y="60" width="200" height="40" rx="8" fill="#fef2f2" />
  <text x="130" y="87" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#dc2626">Without Critical CSS</text>
  
  <!-- Timeline without critical CSS -->
  <line x1="50" y1="120" x2="800" y2="120" stroke="#cbd5e1" stroke-width="2" />
  
  <rect x="50" y="110" width="100" height="20" rx="3" fill="#3b82f6" />
  <text x="100" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#ffffff">HTML</text>
  
  <line x1="150" y1="120" x2="170" y2="120" stroke="#475569" stroke-width="2" stroke-dasharray="4,3" />
  
  <rect x="170" y="110" width="150" height="20" rx="3" fill="#ef4444" />
  <text x="245" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#ffffff">Download CSS (200KB)</text>
  
  <rect x="320" y="110" width="100" height="20" rx="3" fill="#f59e0b" />
  <text x="370" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#ffffff">Parse CSS</text>
  
  <rect x="420" y="110" width="120" height="20" rx="3" fill="#8b5cf6" />
  <text x="480" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#ffffff">Build CSSOM</text>
  
  <rect x="540" y="110" width="150" height="20" rx="3" fill="#22c55e" />
  <text x="615" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#ffffff">Render (FCP)</text>
  
  <text x="50" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#dc2626">Total: ~1.8s to First Paint</text>
  
  <!-- With Critical CSS (Bottom) -->
  <rect x="30" y="260" width="790" height="180" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2" />
  <rect x="30" y="260" width="200" height="40" rx="8" fill="#f0fdf4" />
  <text x="130" y="287" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#16a34a">With Critical CSS</text>
  
  <!-- Timeline with critical CSS -->
  <line x1="50" y1="320" x2="800" y2="320" stroke="#cbd5e1" stroke-width="2" />
  
  <rect x="50" y="310" width="120" height="20" rx="3" fill="#3b82f6" />
  <text x="110" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#ffffff">HTML + Inline CSS</text>
  
  <rect x="170" y="310" width="100" height="20" rx="3" fill="#22c55e" />
  <text x="220" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#ffffff">Render (FCP)</text>
  
  <line x1="270" y1="320" x2="290" y2="320" stroke="#475569" stroke-width="2" stroke-dasharray="4,3" />
  
  <rect x="290" y="310" width="130" height="20" rx="3" fill="#3b82f6" opacity="0.6" />
  <text x="355" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#475569">Async CSS Load</text>
  
  <rect x="420" y="310" width="100" height="20" rx="3" fill="#8b5cf6" opacity="0.6" />
  <text x="470" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#475569">Apply Full CSS</text>
  
  <text x="50" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#16a34a">Total: ~0.4s to First Paint (78% faster)</text>
  
  <!-- Improvement indicator -->
  <rect x="30" y="450" width="790" height="20" rx="6" fill="#f0fdf4" stroke="#22c55e" />
  <text x="425" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#16a34a">Improvement: 1.8s → 0.4s (78% faster FCP)</text>
</svg>
