<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Business Impact of Minification</title>
  <desc id="desc">Before and after comparison showing how minification reduces bundle sizes, improves load times, and positively impacts business metrics</desc>
  
  <!-- Background -->
  <rect width="900" height="600" fill="#ffffff" rx="8"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="bold">Business Impact of Minification</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="12">Before vs After Comparison</text>
  
  <!-- BEFORE Section -->
  <rect x="30" y="80" width="400" height="220" fill="#fef2f2" rx="6" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" fill="#dc2626" font-size="16" font-weight="bold">BEFORE: Unminified Code</text>
  
  <!-- Bundle Size Before -->
  <rect x="50" y="130" width="160" height="90" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="155" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Bundle Size</text>
  <text x="130" y="180" text-anchor="middle" fill="#dc2626" font-size="24" font-weight="bold">850 KB</text>
  <text x="130" y="200" text-anchor="middle" fill="#64748b" font-size="9">Full whitespace</text>
  <text x="130" y="213" text-anchor="middle" fill="#64748b" font-size="9">comments, long names</text>
  
  <!-- Load Time Before -->
  <rect x="230" y="130" width="160" height="90" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="155" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Load Time (3G)</text>
  <text x="310" y="180" text-anchor="middle" fill="#dc2626" font-size="24" font-weight="bold">6.8s</text>
  <text x="310" y="200" text-anchor="middle" fill="#64748b" font-size="9">Slow parsing</text>
  <text x="310" y="213" text-anchor="middle" fill="#64748b" font-size="9">high bandwidth</text>
  
  <!-- Parse Time Before -->
  <rect x="50" y="235" width="160" height="55" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="260" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Parse Time</text>
  <text x="130" y="278" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="bold">420ms</text>
  
  <!-- First Input Delay Before -->
  <rect x="230" y="235" width="160" height="55" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="260" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">First Input Delay</text>
  <text x="310" y="278" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="bold">580ms</text>
  
  <!-- Arrow Separator -->
  <line x1="440" y1="190" x2="460" y2="190" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="450" y="185" text-anchor="middle" fill="#64748b" font-size="10">vs</text>
  
  <!-- AFTER Section -->
  <rect x="470" y="80" width="400" height="220" fill="#f0fdf4" rx="6" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" fill="#16a34a" font-size="16" font-weight="bold">AFTER: Minified + Uglified</text>
  
  <!-- Bundle Size After -->
  <rect x="490" y="130" width="160" height="90" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="570" y="155" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Bundle Size</text>
  <text x="570" y="180" text-anchor="middle" fill="#22c55e" font-size="24" font-weight="bold">340 KB</text>
  <text x="570" y="200" text-anchor="middle" fill="#64748b" font-size="9">No whitespace</text>
  <text x="570" y="213" text-anchor="middle" fill="#64748b" font-size="9">mangled names</text>
  
  <!-- Load Time After -->
  <rect x="670" y="130" width="160" height="90" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="750" y="155" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Load Time (3G)</text>
  <text x="750" y="180" text-anchor="middle" fill="#22c55e" font-size="24" font-weight="bold">2.7s</text>
  <text x="750" y="200" text-anchor="middle" fill="#64748b" font-size="9">Fast parsing</text>
  <text x="750" y="213" text-anchor="middle" fill="#64748b" font-size="9">low bandwidth</text>
  
  <!-- Parse Time After -->
  <rect x="490" y="235" width="160" height="55" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="570" y="260" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Parse Time</text>
  <text x="570" y="278" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="bold">180ms</text>
  <text x="570" y="288" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="bold">-57%</text>
  
  <!-- First Input Delay After -->
  <rect x="670" y="235" width="160" height="55" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="750" y="260" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">First Input Delay</text>
  <text x="750" y="278" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="bold">240ms</text>
  <text x="750" y="288" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="bold">-59%</text>
  
  <!-- Loading Timeline Comparison -->
  <rect x="30" y="320" width="840" height="120" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="345" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Loading Timeline Comparison (3G Network)</text>
  
  <!-- Before Timeline -->
  <text x="80" y="375" fill="#dc2626" font-size="11" font-weight="bold">BEFORE:</text>
  <rect x="140" y="360" width="520" height="30" fill="#fecaca" rx="3"/>
  <text x="400" y="380" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="bold">6.8s Total Load</text>
  
  <!-- Before phases -->
  <rect x="140" y="360" width="320" height="30" fill="#fca5a5" rx="3"/>
  <text x="300" y="380" text-anchor="middle" fill="#991b1b" font-size="9">Download (850KB)</text>
  <rect x="460" y="360" width="200" height="30" fill="#f87171" rx="3"/>
  <text x="560" y="380" text-anchor="middle" fill="#991b1b" font-size="9">Parse (420ms)</text>
  
  <!-- After Timeline -->
  <text x="80" y="415" fill="#22c55e" font-size="11" font-weight="bold">AFTER:</text>
  <rect x="140" y="400" width="210" height="30" fill="#bbf7d0" rx="3"/>
  <text x="245" y="420" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="bold">2.7s</text>
  
  <!-- After phases -->
  <rect x="140" y="400" width="130" height="30" fill="#86efac" rx="3"/>
  <text x="205" y="420" text-anchor="middle" fill="#166534" font-size="9">Download (340KB)</text>
  <rect x="270" y="400" width="80" height="30" fill="#4ade80" rx="3"/>
  <text x="310" y="420" text-anchor="middle" fill="#166534" font-size="9">Parse (180ms)</text>
  
  <!-- Time markers -->
  <line x1="140" y1="440" x2="660" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <text x="140" y="455" text-anchor="middle" fill="#64748b" font-size="9">0s</text>
  <text x="245" y="455" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="bold">2.7s</text>
  <text x="400" y="455" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="bold">6.8s</text>
  <text x="660" y="455" text-anchor="middle" fill="#64748b" font-size="9">8s</text>
  
  <!-- Key Metrics Summary -->
  <rect x="30" y="460" width="840" height="125" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="485" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Business Metrics Impact</text>
  
  <!-- Metric 1: Bundle Size -->
  <rect x="60" y="500" width="170" height="75" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="145" y="520" text-anchor="middle" fill="#64748b" font-size="9">Bundle Size</text>
  <text x="145" y="545" text-anchor="middle" fill="#dc2626" font-size="10">850 KB → 340 KB</text>
  <text x="145" y="565" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">-60%</text>
  
  <!-- Metric 2: Load Time -->
  <rect x="250" y="500" width="170" height="75" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="335" y="520" text-anchor="middle" fill="#64748b" font-size="9">Load Time (3G)</text>
  <text x="335" y="545" text-anchor="middle" fill="#dc2626" font-size="10">6.8s → 2.7s</text>
  <text x="335" y="565" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">-60%</text>
  
  <!-- Metric 3: Parse Time -->
  <rect x="440" y="500" width="170" height="75" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="525" y="520" text-anchor="middle" fill="#64748b" font-size="9">Parse Time</text>
  <text x="525" y="545" text-anchor="middle" fill="#dc2626" font-size="10">420ms → 180ms</text>
  <text x="525" y="565" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">-57%</text>
  
  <!-- Metric 4: FID -->
  <rect x="630" y="500" width="170" height="75" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="715" y="520" text-anchor="middle" fill="#64748b" font-size="9">First Input Delay</text>
  <text x="715" y="545" text-anchor="middle" fill="#dc2626" font-size="10">580ms → 240ms</text>
  <text x="715" y="565" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">-59%</text>
  
  <!-- Bottom Impact Summary -->
  <rect x="30" y="605" width="840" height="70" fill="#eff6ff" rx="6" stroke="#3b82f6" stroke-width="1"/>
  <text x="450" y="630" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Business Outcomes</text>
  <text x="150" y="655" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">↑ Conversion Rate (+15-25%)</text>
  <text x="350" y="655" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">↑ Page Views per Session</text>
  <text x="550" y="655" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">↓ Bounce Rate (-20-35%)</text>
  <text x="750" y="655" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">↑ SEO Ranking</text>
</svg>
