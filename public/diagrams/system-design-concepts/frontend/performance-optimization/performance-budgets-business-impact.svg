<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#ffffff" width="800" height="500" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="bold">Business Impact of Performance Budgets</text>
  
  <!-- E-commerce Case Study -->
  <rect x="40" y="70" width="340" height="180" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="100" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">E-commerce: Budget-Driven</text>
  <text x="60" y="130" fill="#64748b" font-size="11">Six-month optimization:</text>
  <text x="60" y="155" fill="#22c55e" font-size="12" font-weight="bold">JS: 450KB to 180KB</text>
  <text x="60" y="175" fill="#22c55e" font-size="12" font-weight="bold">Conversion: +12%</text>
  <text x="60" y="195" fill="#22c55e" font-size="12" font-weight="bold">Bounce rate: -18%</text>
  <text x="60" y="225" fill="#1e293b" font-size="10" font-weight="bold">What they did:</text>
  <text x="60" y="240" fill="#64748b" font-size="9">bundlewatch in CI/CD</text>
  <text x="60" y="255" fill="#64748b" font-size="9">Quarterly dependency audits</text>
  
  <!-- SaaS Case Study -->
  <rect x="420" y="70" width="340" height="180" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="100" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">SaaS: Third-Party Budget</text>
  <text x="440" y="130" fill="#64748b" font-size="11">Third-party optimization:</text>
  <text x="440" y="155" fill="#22c55e" font-size="12" font-weight="bold">Scripts: 15 to 6</text>
  <text x="440" y="175" fill="#22c55e" font-size="12" font-weight="bold">TTI: 5.2s to 2.8s</text>
  <text x="440" y="195" fill="#22c55e" font-size="12" font-weight="bold">Support tickets: -40%</text>
  <text x="440" y="225" fill="#1e293b" font-size="10" font-weight="bold">What they did:</text>
  <text x="440" y="240" fill="#64748b" font-size="9">100KB third-party budget</text>
  <text x="440" y="255" fill="#64748b" font-size="9">Lazy-loaded widgets</text>
  
  <!-- News/Media Case Study -->
  <rect x="40" y="280" width="340" height="180" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="310" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">News/Media: Mobile-First</text>
  <text x="60" y="340" fill="#64748b" font-size="11">Mobile budgets:</text>
  <text x="60" y="365" fill="#22c55e" font-size="12" font-weight="bold">LCP: 4.5s to 2.2s</text>
  <text x="60" y="385" fill="#22c55e" font-size="12" font-weight="bold">Engagement: +22%</text>
  <text x="60" y="405" fill="#22c55e" font-size="12" font-weight="bold">Ad revenue: +15%</text>
  <text x="60" y="435" fill="#1e293b" font-size="10" font-weight="bold">What they did:</text>
  <text x="60" y="450" fill="#64748b" font-size="9">Separate mobile budgets</text>
  <text x="60" y="465" fill="#64748b" font-size="9">Tested on 3G throttling</text>
  
  <!-- Startup Case Study -->
  <rect x="420" y="280" width="340" height="180" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="310" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Startup: Day One Budgets</text>
  <text x="440" y="340" fill="#64748b" font-size="11">From project start:</text>
  <text x="440" y="365" fill="#22c55e" font-size="12" font-weight="bold">Team: 5 to 50 devs</text>
  <text x="440" y="385" fill="#22c55e" font-size="12" font-weight="bold">Performance: Stable</text>
  <text x="440" y="405" fill="#22c55e" font-size="12" font-weight="bold">Features: Doubled</text>
  <text x="440" y="435" fill="#1e293b" font-size="10" font-weight="bold">What they did:</text>
  <text x="440" y="450" fill="#64748b" font-size="9">CI budgets from start</text>
  <text x="440" y="465" fill="#64748b" font-size="9">Slack reports, team culture</text>
  
  <!-- Key Insight -->
  <rect x="180" y="470" width="440" height="25" fill="#f8fafc" rx="4" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="488" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold">Performance budgets drive measurable improvements in conversion, engagement, and revenue</text>
</svg>