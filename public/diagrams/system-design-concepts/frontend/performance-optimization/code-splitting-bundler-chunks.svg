<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, sans-serif">
  <rect width="900" height="620" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1822">How Bundlers Process Code Splitting</text>

  <!-- Entry Point -->
  <rect x="340" y="55" width="220" height="40" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="450" y="80" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">Entry Point: index.js</text>

  <!-- Arrow down -->
  <line x1="450" y1="95" x2="450" y2="115" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Static Analysis -->
  <rect x="355" y="115" width="190" height="36" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="138" text-anchor="middle" font-size="12" fill="#1a1822">Static Analysis</text>

  <!-- Arrow down -->
  <line x1="450" y1="151" x2="450" y2="171" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Build Dependency Graph -->
  <rect x="330" y="171" width="240" height="36" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="194" text-anchor="middle" font-size="12" fill="#1a1822">Build Dependency Graph</text>

  <!-- Arrow down -->
  <line x1="450" y1="207" x2="450" y2="230" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision Diamond -->
  <polygon points="450,230 570,270 450,310 330,270" fill="#fff" stroke="#d97843" stroke-width="1.5"/>
  <text x="450" y="267" text-anchor="middle" font-size="11" fill="#1a1822">Dynamic import</text>
  <text x="450" y="280" text-anchor="middle" font-size="11" fill="#1a1822">found?</text>

  <!-- Yes branch (left) -->
  <line x1="330" y1="270" x2="220" y2="270" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="280" y="263" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="600">Yes</text>

  <!-- Create Split Point -->
  <rect x="90" y="252" width="130" height="36" rx="8" fill="#2f9d74" stroke="#247d5c" stroke-width="1.5"/>
  <text x="155" y="275" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Create Split Point</text>

  <!-- Arrow down from split point -->
  <line x1="155" y1="288" x2="155" y2="318" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- New Async Chunk -->
  <rect x="80" y="318" width="150" height="36" rx="8" fill="#fff" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="155" y="341" text-anchor="middle" font-size="11" fill="#1a1822">New Async Chunk</text>

  <!-- Arrow down -->
  <line x1="155" y1="354" x2="155" y2="380" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Shared Dependencies Diamond -->
  <polygon points="155,380 245,410 155,440 65,410" fill="#fff" stroke="#d97843" stroke-width="1.5"/>
  <text x="155" y="407" text-anchor="middle" font-size="10" fill="#1a1822">Shared</text>
  <text x="155" y="419" text-anchor="middle" font-size="10" fill="#1a1822">deps?</text>

  <!-- Yes - Extract shared -->
  <line x1="65" y1="410" x2="30" y2="410" stroke="#2f9d74" stroke-width="1.5"/>
  <line x1="30" y1="410" x2="30" y2="470" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="40" y="403" font-size="10" fill="#2f9d74" font-weight="600">Yes</text>

  <rect x="-30" y="470" width="120" height="36" rx="8" fill="#fff" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="30" y="488" text-anchor="middle" font-size="10" fill="#1a1822">Extract to</text>
  <text x="30" y="500" text-anchor="middle" font-size="10" fill="#1a1822">Shared Chunk</text>

  <!-- No - Self-contained -->
  <line x1="245" y1="410" x2="290" y2="410" stroke="#d97843" stroke-width="1.5"/>
  <line x1="290" y1="410" x2="290" y2="470" stroke="#d97843" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="270" y="403" font-size="10" fill="#d97843" font-weight="600">No</text>

  <rect x="225" y="470" width="130" height="36" rx="8" fill="#fff" stroke="#d97843" stroke-width="1.5"/>
  <text x="290" y="488" text-anchor="middle" font-size="10" fill="#1a1822">Self-contained</text>
  <text x="290" y="500" text-anchor="middle" font-size="10" fill="#1a1822">Chunk</text>

  <!-- No branch (right) from main diamond -->
  <line x1="570" y1="270" x2="660" y2="270" stroke="#d97843" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="610" y="263" text-anchor="middle" font-size="11" fill="#d97843" font-weight="600">No</text>

  <!-- Add to Current Chunk -->
  <rect x="660" y="252" width="170" height="36" rx="8" fill="#d97843" stroke="#b8622f" stroke-width="1.5"/>
  <text x="745" y="275" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Add to Current Chunk</text>

  <!-- Arrow down to Main Bundle -->
  <line x1="745" y1="288" x2="745" y2="470" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="675" y="470" width="140" height="36" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="745" y="493" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Main Bundle</text>

  <!-- Output Files -->
  <rect x="280" y="545" width="340" height="55" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="2"/>
  <text x="450" y="565" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Output Files</text>
  <text x="450" y="582" text-anchor="middle" font-size="10" fill="#e0d8f5">main.abc123.js | dashboard.def456.js | vendors-shared.ghi789.js</text>

  <!-- Arrows to output -->
  <line x1="30" y1="506" x2="30" y2="535" stroke="#1a1822" stroke-width="1"/>
  <line x1="30" y1="535" x2="350" y2="535" stroke="#1a1822" stroke-width="1"/>
  <line x1="350" y1="535" x2="350" y2="545" stroke="#1a1822" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="290" y1="506" x2="290" y2="530" stroke="#1a1822" stroke-width="1"/>
  <line x1="290" y1="530" x2="420" y2="530" stroke="#1a1822" stroke-width="1"/>
  <line x1="420" y1="530" x2="420" y2="545" stroke="#1a1822" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="745" y1="506" x2="745" y2="535" stroke="#1a1822" stroke-width="1"/>
  <line x1="745" y1="535" x2="550" y2="535" stroke="#1a1822" stroke-width="1"/>
  <line x1="550" y1="535" x2="550" y2="545" stroke="#1a1822" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1a1822"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2f9d74"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d97843"/>
    </marker>
  </defs>
</svg>