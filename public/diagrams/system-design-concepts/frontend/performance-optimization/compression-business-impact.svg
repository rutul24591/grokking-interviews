<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: var(--bg-primary, #ffffff); }
      .card { fill: var(--bg-panel, #f8fafc); }
      .text { fill: var(--text-primary, #1e293b); }
      .text-muted { fill: var(--text-muted, #64748b); }
      .border { stroke: var(--border-color, #e2e8f0); }
      .accent { fill: var(--accent-color, #3b82f6); }
      .success { fill: var(--success-color, #22c55e); }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="text" font-size="18" font-weight="bold">Business Impact of Compression</text>
  
  <!-- E-commerce Case Study -->
  <rect x="40" y="70" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="210" y="100" text-anchor="middle" class="text" font-size="14" font-weight="bold">E-commerce: Enabling Brotli</text>
  
  <text x="60" y="130" class="text-muted" font-size="11">Static assets optimization:</text>
  <text x="60" y="155" class="success" font-size="12" font-weight="bold">Transfer size: -25%</text>
  <text x="60" y="175" class="success" font-size="12" font-weight="bold">Mobile load time: -400ms</text>
  <text x="60" y="195" class="success" font-size="12" font-weight="bold">Conversion rate: +3%</text>
  
  <text x="60" y="225" class="text" font-size="10" font-weight="bold">What they did:</text>
  <text x="60" y="240" class="text-muted" font-size="9">Pre-compressed with Brotli level 11</text>
  <text x="60" y="255" class="text-muted" font-size="9">Nginx brotli_static configuration</text>
  
  <!-- SaaS API Case Study -->
  <rect x="420" y="70" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="590" y="100" text-anchor="middle" class="text" font-size="14" font-weight="bold">SaaS API: Compression Optimization</text>
  
  <text x="440" y="130" class="text-muted" font-size="11">Dynamic compression tuning:</text>
  <text x="440" y="155" class="success" font-size="12" font-weight="bold">API response size: -70%</text>
  <text x="440" y="175" class="success" font-size="12" font-weight="bold">CPU usage: -40%</text>
  <text x="440" y="195" class="success" font-size="12" font-weight="bold">Server costs: -20%</text>
  
  <text x="440" y="225" class="text" font-size="10" font-weight="bold">What they did:</text>
  <text x="440" y="240" class="text-muted" font-size="9">Brotli level 4 for HTTPS APIs</text>
  <text x="440" y="255" class="text-muted" font-size="9">Response caching to avoid recompression</text>
  
  <!-- News/Media Case Study -->
  <rect x="40" y="280" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="210" y="310" text-anchor="middle" class="text" font-size="14" font-weight="bold">News/Media: CDN Compression</text>
  
  <text x="60" y="340" class="text-muted" font-size="11">Cloudflare migration:</text>
  <text x="60" y="365" class="success" font-size="12" font-weight="bold">Bandwidth costs: -60%</text>
  <text x="60" y="385" class="success" font-size="12" font-weight="bold">Global load time: 30-50% faster</text>
  
  <text x="60" y="415" class="text" font-size="10" font-weight="bold">What they did:</text>
  <text x="60" y="430" class="text-muted" font-size="9">Enabled automatic Brotli compression</text>
  <text x="60" y="445" class="text-muted" font-size="9">Pre-compressed static assets for edge caching</text>
  
  <!-- Mobile App Case Study -->
  <rect x="420" y="280" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="590" y="310" text-anchor="middle" class="text" font-size="14" font-weight="bold">Mobile App: API Compression</text>
  
  <text x="440" y="340" class="text-muted" font-size="11">Gzip on all API endpoints:</text>
  <text x="440" y="365" class="success" font-size="12" font-weight="bold">API data usage: -75%</text>
  <text x="440" y="385" class="success" font-size="12" font-weight="bold">App store ratings: Improved</text>
  
  <text x="440" y="415" class="text" font-size="10" font-weight="bold">What they did:</text>
  <text x="440" y="430" class="text-muted" font-size="9">Enabled Gzip on all API endpoints</text>
  <text x="440" y="445" class="text-muted" font-size="9">Verified mobile clients send Accept-Encoding</text>
  
  <!-- Key Insight -->
  <rect x="180" y="470" width="440" height="25" class="card" rx="4" stroke="var(--accent-color, #3b82f6)" stroke-width="2"/>
  <text x="400" y="488" text-anchor="middle" class="accent" font-size="11" font-weight="bold">Compression reduces transfer sizes 60-85% → faster loads, lower costs, better UX</text>
</svg>
