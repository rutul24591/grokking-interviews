<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#ffffff" width="800" height="500" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="bold">Request Deduplication Concept</text>
  
  <!-- Without Deduplication -->
  <rect x="40" y="70" width="340" height="200" fill="#f8fafc" rx="6" stroke="#ef4444" stroke-width="2"/>
  <text x="210" y="100" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">Without Deduplication</text>
  
  <!-- Component 1 -->
  <rect x="60" y="120" width="80" height="40" fill="#3b82f6" rx="4"/>
  <text x="100" y="145" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Component 1</text>
  <path d="M140 140 L180 140" stroke="#ef4444" stroke-width="2"/>
  <polygon points="180,140 175,137 175,143" fill="#ef4444"/>
  <text x="200" y="145" fill="#64748b" font-size="9">GET /users/1</text>
  
  <!-- Component 2 -->
  <rect x="60" y="170" width="80" height="40" fill="#3b82f6" rx="4"/>
  <text x="100" y="195" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Component 2</text>
  <path d="M140 190 L180 190" stroke="#ef4444" stroke-width="2"/>
  <polygon points="180,190 175,187 175,193" fill="#ef4444"/>
  <text x="200" y="195" fill="#64748b" font-size="9">GET /users/1</text>
  
  <!-- Component 3 -->
  <rect x="60" y="220" width="80" height="40" fill="#3b82f6" rx="4"/>
  <text x="100" y="245" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Component 3</text>
  <path d="M140 240 L180 240" stroke="#ef4444" stroke-width="2"/>
  <polygon points="180,240 175,237 175,243" fill="#ef4444"/>
  <text x="200" y="245" fill="#64748b" font-size="9">GET /users/1</text>
  
  <text x="210" y="290" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">3 identical requests!</text>
  
  <!-- With Deduplication -->
  <rect x="420" y="70" width="340" height="200" fill="#f8fafc" rx="6" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="100" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">With Deduplication</text>
  
  <!-- Component 1 -->
  <rect x="440" y="120" width="80" height="40" fill="#3b82f6" rx="4"/>
  <text x="480" y="145" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Component 1</text>
  
  <!-- Component 2 -->
  <rect x="440" y="170" width="80" height="40" fill="#3b82f6" rx="4"/>
  <text x="480" y="195" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Component 2</text>
  
  <!-- Component 3 -->
  <rect x="440" y="220" width="80" height="40" fill="#3b82f6" rx="4"/>
  <text x="480" y="245" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Component 3</text>
  
  <!-- Shared Request -->
  <path d="M520 140 L560 140 L560 160" stroke="#22c55e" stroke-width="2"/>
  <path d="M520 190 L560 190 L560 160" stroke="#22c55e" stroke-width="2"/>
  <path d="M520 240 L560 240 L560 160" stroke="#22c55e" stroke-width="2"/>
  
  <rect x="560" y="140" width="100" height="40" fill="#22c55e" rx="4"/>
  <text x="610" y="165" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">1 Shared Request</text>
  <text x="610" y="185" text-anchor="middle" fill="#ffffff" font-size="9">GET /users/1</text>
  
  <text x="590" y="290" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">1 request shared by all!</text>
  
  <!-- Promise Map -->
  <rect x="180" y="320" width="440" height="150" fill="#f8fafc" rx="6" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="350" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">Promise Map (In-Flight Requests)</text>
  
  <rect x="200" y="370" width="400" height="80" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="395" fill="#64748b" font-size="10">Key: "GET /users/1"</text>
  <text x="220" y="415" fill="#64748b" font-size="10">Value: Promise { pending }
</text>
  <text x="220" y="435" fill="#64748b" font-size="10">Callers: [Component1, Component2, Component3]</text>
  
  <text x="400" y="485" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">All callers receive same Promise result</text>
</svg>
