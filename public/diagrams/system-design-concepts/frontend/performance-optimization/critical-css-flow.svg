<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" role="img" aria-labelledby="criticalCssFlowTitle criticalCssFlowDesc">
  <title id="criticalCssFlowTitle">Critical CSS Extraction Flow</title>
  <desc id="criticalCssFlowDesc">Diagram showing the critical CSS extraction process from full stylesheet to inlined critical CSS</desc>
  
  <defs>
    <linearGradient id="criticalBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="850" height="480" fill="url(#criticalBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Critical CSS: Extraction &amp; Delivery Flow</text>
  
  <!-- Full Stylesheet (Left) -->
  <rect x="40" y="70" width="180" height="340" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2" />
  <rect x="40" y="70" width="180" height="45" rx="8" fill="#475569" />
  <text x="130" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Full Stylesheet</text>
  <text x="130" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">~200-300 KB</text>
  
  <text x="55" y="155" font-family="monospace" font-size="10" font-weight="400" fill="#1e293b">/* Above-fold styles */</text>
  <text x="55" y="175" font-family="monospace" font-size="10" font-weight="400" fill="#16a34a">.header {'{}'}</text>
  <text x="55" y="190" font-family="monospace" font-size="10" font-weight="400" fill="#16a34a">.hero {'{}'}</text>
  <text x="55" y="205" font-family="monospace" font-size="10" font-weight="400" fill="#16a34a">.nav {'{}'}</text>
  <text x="55" y="230" font-family="monospace" font-size="10" font-weight="400" fill="#dc2626">/* Below-fold styles */</text>
  <text x="55" y="250" font-family="monospace" font-size="10" font-weight="400" fill="#dc2626">.footer {'{}'}</text>
  <text x="55" y="265" font-family="monospace" font-size="10" font-weight="400" fill="#dc2626">.comments {'{}'}</text>
  <text x="55" y="280" font-family="monospace" font-size="10" font-weight="400" fill="#dc2626">.sidebar {'{}'}</text>
  <text x="55" y="310" font-family="monospace" font-size="10" font-weight="400" fill="#dc2626">... (more rules)</text>
  
  <!-- Arrow to Extraction -->
  <line x1="220" y1="240" x2="260" y2="240" stroke="#475569" stroke-width="2" />
  <polygon points="260,240 250,235 250,245" fill="#475569" />
  <text x="240" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#475569">Extract</text>
  
  <!-- Critical CSS Tool (Center) -->
  <rect x="260" y="150" width="200" height="180" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" />
  <rect x="260" y="150" width="200" height="45" rx="8" fill="#8b5cf6" />
  <text x="360" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Critical CSS Tool</text>
  
  <text x="275" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Tools:</text>
  <text x="275" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">• critical (npm)</text>
  <text x="275" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">• Critters (Webpack)</text>
  <text x="275" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">• Penthouse</text>
  <text x="275" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">• next/font (Next.js)</text>
  
  <!-- Arrow to Output -->
  <line x1="460" y1="240" x2="500" y2="240" stroke="#475569" stroke-width="2" />
  <polygon points="500,240 490,235 490,245" fill="#475569" />
  <text x="480" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#475569">Output</text>
  
  <!-- Critical CSS (Right Top) -->
  <rect x="500" y="80" width="310" height="150" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" />
  <rect x="500" y="80" width="310" height="40" rx="8" fill="#22c55e" />
  <text x="655" y="107" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Critical CSS (Inlined)</text>
  <text x="655" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">~10-30 KB</text>
  
  <text x="515" y="155" font-family="monospace" font-size="10" font-weight="600" fill="#16a34a">.header {'{}'}</text>
  <text x="515" y="170" font-family="monospace" font-size="10" font-weight="600" fill="#16a34a">.hero {'{}'}</text>
  <text x="515" y="185" font-family="monospace" font-size="10" font-weight="600" fill="#16a34a">.nav {'{}'}</text>
  <text x="515" y="200" font-family="monospace" font-size="10" font-weight="600" fill="#16a34a">.btn {'{}'}</text>
  <text x="515" y="215" font-family="monospace" font-size="10" font-weight="400" fill="#166534">... above-fold only</text>
  
  <!-- Non-Critical CSS (Right Bottom) -->
  <rect x="500" y="250" width="310" height="150" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2" />
  <rect x="500" y="250" width="310" height="40" rx="8" fill="#fef2f2" />
  <text x="655" y="277" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#dc2626">Non-Critical CSS (Async)</text>
  <text x="655" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#dc2626">~170-270 KB</text>
  
  <text x="515" y="325" font-family="monospace" font-size="10" font-weight="400" fill="#dc2626">.footer {'{}'}</text>
  <text x="515" y="340" font-family="monospace" font-size="10" font-weight="400" fill="#dc2626">.comments {'{}'}</text>
  <text x="515" y="355" font-family="monospace" font-size="10" font-weight="400" fill="#dc2626">.sidebar {'{}'}</text>
  <text x="515" y="370" font-family="monospace" font-size="10" font-weight="400" fill="#dc2626">... loaded asynchronously</text>
  
  <!-- Bottom: HTML Structure -->
  <rect x="40" y="420" width="770" height="50" rx="6" fill="#ffffff" stroke="#cbd5e1" />
  <text x="425" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">HTML Output: &lt;style&gt;critical CSS&lt;/style&gt; + &lt;link rel="preload" onload="this.rel='stylesheet'" href="full.css"&gt;</text>
</svg>
