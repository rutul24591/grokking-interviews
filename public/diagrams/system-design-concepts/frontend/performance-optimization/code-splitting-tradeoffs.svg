<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500" role="img" aria-labelledby="codeSplittingTradeoffsTitle codeSplittingTradeoffsDesc">
  <title id="codeSplittingTradeoffsTitle">Code Splitting Trade-offs Comparison</title>
  <desc id="codeSplittingTradeoffsDesc">Visual comparison of benefits and trade-offs when implementing code splitting strategies</desc>
  
  <defs>
    <linearGradient id="tradeoffBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <rect width="850" height="500" fill="url(#tradeoffBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Code Splitting: Benefits vs Trade-offs</text>
  
  <!-- Benefits Column (Left) -->
  <rect x="30" y="60" width="380" height="410" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="3" filter="url(#shadow)" />
  <rect x="30" y="60" width="380" height="50" rx="10" fill="#22c55e" />
  <text x="220" y="93" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Benefits ✓</text>
  
  <!-- Benefit Items -->
  <g transform="translate(50, 130)">
    <circle cx="15" cy="15" r="8" fill="#22c55e" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Faster Initial Load</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">50-80% reduction in initial bundle size</text>
  </g>
  
  <g transform="translate(50, 190)">
    <circle cx="15" cy="15" r="8" fill="#22c55e" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Better Cache Efficiency</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Changed code invalidates only its chunk</text>
  </g>
  
  <g transform="translate(50, 250)">
    <circle cx="15" cy="15" r="8" fill="#22c55e" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">3</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Improved Core Web Vitals</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Lower TTI, FCP, and Total Blocking Time</text>
  </g>
  
  <g transform="translate(50, 310)">
    <circle cx="15" cy="15" r="8" fill="#22c55e" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">4</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Bandwidth Savings</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Users only download code they actually use</text>
  </g>
  
  <g transform="translate(50, 370)">
    <circle cx="15" cy="15" r="8" fill="#22c55e" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">5</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Parallel Downloads</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">HTTP/2 can fetch multiple chunks simultaneously</text>
  </g>
  
  <!-- Trade-offs Column (Right) -->
  <rect x="440" y="60" width="380" height="410" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)" />
  <rect x="440" y="60" width="380" height="50" rx="10" fill="#f59e0b" />
  <text x="630" y="93" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Trade-offs ⚠</text>
  
  <!-- Trade-off Items -->
  <g transform="translate(460, 130)">
    <circle cx="15" cy="15" r="8" fill="#f59e0b" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Navigation Latency</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Chunk download adds 100-500ms delay</text>
  </g>
  
  <g transform="translate(460, 190)">
    <circle cx="15" cy="15" r="8" fill="#f59e0b" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Increased HTTP Requests</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Too many chunks = request overhead</text>
  </g>
  
  <g transform="translate(460, 250)">
    <circle cx="15" cy="15" r="8" fill="#f59e0b" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">3</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Loading Waterfalls</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Sequential chunk dependencies cause delays</text>
  </g>
  
  <g transform="translate(460, 310)">
    <circle cx="15" cy="15" r="8" fill="#f59e0b" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">4</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Complexity in SSR</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">React.lazy doesn't work with SSR out of box</text>
  </g>
  
  <g transform="translate(460, 370)">
    <circle cx="15" cy="15" r="8" fill="#f59e0b" />
    <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">5</text>
    <text x="35" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Cache Fragmentation</text>
    <text x="35" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Many small files may reduce cache efficiency</text>
  </g>
  
  <!-- Bottom: Mitigation Strategies -->
  <rect x="30" y="480" width="790" height="15" rx="3" fill="#e2e8f0" />
  <text x="425" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#64748b">Mitigation: Prefetch likely routes, limit chunks to 5-10, use HTTP/2, implement loading states</text>
</svg>
