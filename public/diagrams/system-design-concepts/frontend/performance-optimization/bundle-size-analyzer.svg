<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="bundleAnalyzerTitle bundleAnalyzerDesc">
  <title id="bundleAnalyzerTitle">Bundle Analyzer Visualization</title>
  <desc id="bundleAnalyzerDesc">Treemap showing how bundle analyzer displays module sizes visually</desc>
  
  <defs>
    <linearGradient id="analyzerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="url(#analyzerBg)" />
  
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Bundle Analyzer: Visual Module Breakdown</text>
  
  <!-- Main treemap container -->
  <rect x="50" y="60" width="700" height="280" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  
  <!-- React (largest) -->
  <rect x="60" y="70" width="280" height="260" rx="4" fill="#22c55e" opacity="0.8" />
  <text x="200" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">React + ReactDOM</text>
  <text x="200" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#ffffff">130 KB (26%)</text>
  
  <!-- Lodash -->
  <rect x="350" y="70" width="200" height="130" rx="4" fill="#3b82f6" opacity="0.8" />
  <text x="450" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">lodash</text>
  <text x="450" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">70 KB (14%)</text>
  
  <!-- App Code -->
  <rect x="560" y="70" width="180" height="130" rx="4" fill="#8b5cf6" opacity="0.8" />
  <text x="650" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">App Code</text>
  <text x="650" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">150 KB (30%)</text>
  
  <!-- Router -->
  <rect x="350" y="210" width="200" height="130" rx="4" fill="#f59e0b" opacity="0.8" />
  <text x="450" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">React Router</text>
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">80 KB (16%)</text>
  
  <!-- Utilities -->
  <rect x="560" y="210" width="180" height="130" rx="4" fill="#ef4444" opacity="0.8" />
  <text x="650" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Utilities</text>
  <text x="650" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">70 KB (14%)</text>
  
  <!-- Legend -->
  <rect x="50" y="350" width="700" height="35" rx="6" fill="#f1f5f9" />
  <text x="400" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#475569">Total Bundle: 500 KB | Use analyzer to identify optimization targets</text>
</svg>
