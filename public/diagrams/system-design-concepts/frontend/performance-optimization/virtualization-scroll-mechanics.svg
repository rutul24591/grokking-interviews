<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">How Virtualization Works: Scroll-Driven Rendering</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Step 1: Scroll Event -->
  <rect x="30" y="70" width="160" height="100" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="110" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">STEP 1</text>
  <text x="110" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Scroll Event</text>
  <text x="110" y="120" text-anchor="middle" font-size="11" fill="#1a1822">User scrolls</text>
  <text x="110" y="136" text-anchor="middle" font-size="11" fill="#1a1822">scrollTop = 2400px</text>
  <text x="110" y="156" text-anchor="middle" font-size="10" fill="#6d5bd0">onScroll listener</text>

  <line x1="190" y1="120" x2="230" y2="120" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Calculate Range -->
  <rect x="230" y="70" width="175" height="100" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="317" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">STEP 2</text>
  <text x="317" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Calculate Range</text>
  <text x="317" y="120" text-anchor="middle" font-size="10" fill="#1a1822">start = floor(2400 / 48)</text>
  <text x="317" y="136" text-anchor="middle" font-size="10" fill="#d97843" font-weight="600">startIndex = 50</text>
  <text x="317" y="152" text-anchor="middle" font-size="10" fill="#d97843" font-weight="600">endIndex = 63</text>

  <line x1="405" y1="120" x2="445" y2="120" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Render Items -->
  <rect x="445" y="70" width="175" height="100" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="532" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">STEP 3</text>
  <text x="532" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Render Visible</text>
  <text x="532" y="120" text-anchor="middle" font-size="11" fill="#1a1822">Create DOM for</text>
  <text x="532" y="136" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="600">items 50-63 only</text>
  <text x="532" y="156" text-anchor="middle" font-size="10" fill="#1a1822">(14 elements)</text>

  <line x1="620" y1="120" x2="660" y2="120" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Position with CSS -->
  <rect x="660" y="70" width="210" height="100" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="765" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">STEP 4</text>
  <text x="765" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Position with CSS</text>
  <text x="765" y="120" text-anchor="middle" font-size="10" fill="#1a1822">position: absolute</text>
  <text x="765" y="138" text-anchor="middle" font-size="10" fill="#d97843" font-weight="600">translateY(2400px)</text>
  <text x="765" y="156" text-anchor="middle" font-size="10" fill="#1a1822">to translateY(3024px)</text>

  <!-- Visual representation below -->
  <text x="450" y="210" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Scroll Container Structure</text>

  <!-- Outer container -->
  <rect x="150" y="225" width="600" height="250" rx="8" fill="white" stroke="#1a1822" stroke-width="2"/>
  <text x="160" y="245" font-size="10" fill="#1a1822" font-weight="600">Outer Container (overflow: auto, height: 600px)</text>

  <!-- Inner container (tall) -->
  <rect x="170" y="255" width="560" height="210" rx="6" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="180" y="275" font-size="10" fill="#6d5bd0" font-weight="600">Inner Container (height: 480,000px — creates scrollbar)</text>

  <!-- Items before viewport -->
  <rect x="190" y="290" width="130" height="50" rx="4" fill="#f3f1f8" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <text x="255" y="320" text-anchor="middle" font-size="10" fill="#999">Items 0-49</text>
  <text x="255" y="332" text-anchor="middle" font-size="9" fill="#999">NOT in DOM</text>

  <!-- Rendered items -->
  <rect x="340" y="290" width="160" height="50" rx="4" fill="#2f9d74" opacity="0.15" stroke="#2f9d74" stroke-width="2"/>
  <text x="420" y="308" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="700">Items 50-63</text>
  <text x="420" y="323" text-anchor="middle" font-size="9" fill="#2f9d74">RENDERED in DOM</text>
  <text x="420" y="336" text-anchor="middle" font-size="9" fill="#1a1822">absolute positioned</text>

  <!-- Items after viewport -->
  <rect x="520" y="290" width="190" height="50" rx="4" fill="#f3f1f8" stroke="#ccc" stroke-width="1" stroke-dasharray="4"/>
  <text x="615" y="320" text-anchor="middle" font-size="10" fill="#999">Items 64-9,999</text>
  <text x="615" y="332" text-anchor="middle" font-size="9" fill="#999">NOT in DOM</text>

  <!-- Positioning detail -->
  <text x="190" y="370" font-size="10" fill="#1a1822">Each item positioned:</text>
  <text x="190" y="386" font-size="10" fill="#d97843" font-weight="600">style=&amp;#123; position: "absolute", transform: `translateY($&amp;#123;index * itemHeight&amp;#125;px)` &amp;#125;</text>

  <!-- Key insight -->
  <rect x="190" y="400" width="520" height="55" rx="6" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Key Insight: The inner container's height creates the correct scrollbar size,</text>
  <text x="450" y="438" text-anchor="middle" font-size="11" fill="#1a1822">while only the visible items exist as actual DOM nodes (position: absolute).</text>

  <!-- Cycle arrow -->
  <path d="M 765 172 C 765 192, 110 192, 110 172" stroke="#d97843" stroke-width="1.5" fill="none" stroke-dasharray="5" marker-end="url(#arrow-orange)"/>
  <text x="440" y="198" text-anchor="middle" font-size="10" fill="#d97843" font-weight="600">Repeats on every scroll event (~60fps)</text>
</svg>