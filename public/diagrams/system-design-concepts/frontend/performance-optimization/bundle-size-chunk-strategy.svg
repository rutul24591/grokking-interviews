<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="900" height="500" rx="8" fill="#f3f1f8"/>

  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">Chunk Splitting Strategy</text>
  <text x="450" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#6d5bd0">How splitChunks divides your application</text>

  <!-- Full app bundle (before) -->
  <rect x="50" y="85" width="180" height="180" rx="8" fill="#c44d4d" opacity="0.15" stroke="#c44d4d" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#c44d4d">Monolithic Bundle</text>
  <text x="140" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a1822">~2 MB single file</text>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">Everything bundled</text>
  <text x="140" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">together. Any change</text>
  <text x="140" y="201" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#666">busts entire cache.</text>
  <text x="140" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" fill="#c44d4d">✗</text>

  <!-- Arrow -->
  <path d="M 230 175 L 290 175" fill="none" stroke="#6d5bd0" stroke-width="3" marker-end="url(#arrowSplit)"/>
  <text x="260" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d5bd0" font-weight="bold">split</text>

  <!-- Split chunks (after) -->
  <!-- Main Chunk -->
  <rect x="310" y="85" width="250" height="90" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="435" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Main Chunk</text>
  <text x="435" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d4ccf0">App entry point, bootstrap code,</text>
  <text x="435" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d4ccf0">global styles, layout components</text>

  <!-- Vendor Chunk -->
  <rect x="580" y="85" width="270" height="90" rx="8" fill="#d97843" stroke="#c06a35" stroke-width="2"/>
  <text x="715" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Vendor Chunk</text>
  <text x="715" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fde0cc">node_modules: React, React DOM,</text>
  <text x="715" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#fde0cc">router, state management libs</text>

  <!-- Route Chunks -->
  <rect x="310" y="195" width="540" height="120" rx="8" fill="#ffffff" stroke="#2f9d74" stroke-width="2"/>
  <text x="580" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#2f9d74">Route Chunks (lazy-loaded)</text>

  <rect x="330" y="240" width="120" height="55" rx="6" fill="#2f9d74" opacity="0.15" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="390" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2f9d74">/dashboard</text>
  <text x="390" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2f9d74">~45 KB</text>

  <rect x="470" y="240" width="120" height="55" rx="6" fill="#2f9d74" opacity="0.15" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="530" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2f9d74">/settings</text>
  <text x="530" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2f9d74">~30 KB</text>

  <rect x="610" y="240" width="120" height="55" rx="6" fill="#2f9d74" opacity="0.15" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="670" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2f9d74">/profile</text>
  <text x="670" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#2f9d74">~25 KB</text>

  <rect x="750" y="240" width="80" height="55" rx="6" fill="#2f9d74" opacity="0.1" stroke="#2f9d74" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="790" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#2f9d74">...</text>

  <!-- Shared Chunk -->
  <rect x="310" y="335" width="540" height="70" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="580" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#6d5bd0">Shared Chunk</text>
  <text x="580" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6d5bd0">Common components &amp; utilities used by 2+ route chunks (minChunks: 2)</text>

  <!-- Connecting dashed lines from route chunks to shared -->
  <line x1="390" y1="295" x2="390" y2="335" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="530" y1="295" x2="530" y2="335" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="670" y1="295" x2="670" y2="335" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom summary -->
  <rect x="50" y="425" width="800" height="55" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822">Caching benefit: Vendor chunk rarely changes. Route chunks update independently.</text>
  <text x="450" y="468" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#666">Users only re-download the specific chunk that changed — not the entire application.</text>

  <defs>
    <marker id="arrowSplit" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>