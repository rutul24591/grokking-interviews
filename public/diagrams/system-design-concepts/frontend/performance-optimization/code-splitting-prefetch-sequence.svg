<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <rect width="900" height="520" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1822">Prefetching During Idle Time Eliminates Navigation Latency</text>

  <!-- Participant labels -->
  <rect x="100" y="50" width="90" height="32" rx="6" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="145" y="71" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">User</text>

  <rect x="370" y="50" width="90" height="32" rx="6" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="415" y="71" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Browser</text>

  <rect x="650" y="50" width="90" height="32" rx="6" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="695" y="71" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Server</text>

  <!-- Lifelines -->
  <line x1="145" y1="82" x2="145" y2="500" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="415" y1="82" x2="415" y2="500" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="695" y1="82" x2="695" y2="500" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Phase 1: Initial Page Load -->
  <rect x="30" y="100" width="810" height="22" rx="4" fill="#e8e4f3"/>
  <text x="450" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Initial Page Load</text>

  <!-- User visits /home -->
  <line x1="145" y1="135" x2="415" y2="135" stroke="#1a1822" stroke-width="1.5" marker-end="url(#seqArr)"/>
  <text x="280" y="130" text-anchor="middle" font-size="11" fill="#1a1822">Visit /home</text>

  <!-- Browser requests main.js -->
  <line x1="415" y1="160" x2="695" y2="160" stroke="#d97843" stroke-width="1.5" marker-end="url(#seqArrO)"/>
  <text x="555" y="155" text-anchor="middle" font-size="11" fill="#d97843">GET main.js</text>

  <!-- Server returns main.js -->
  <line x1="695" y1="185" x2="415" y2="185" stroke="#2f9d74" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#seqArrG)"/>
  <text x="555" y="180" text-anchor="middle" font-size="11" fill="#2f9d74">main.js (120KB)</text>

  <!-- Browser parses -->
  <rect x="395" y="200" width="40" height="25" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <text x="490" y="217" font-size="10" fill="#1a1822">Parse &amp; render Home</text>

  <!-- Phase 2: Idle Prefetch -->
  <rect x="30" y="245" width="810" height="22" rx="4" fill="#ecf7f1"/>
  <text x="450" y="261" text-anchor="middle" font-size="11" font-weight="700" fill="#2f9d74">Idle Time Prefetch</text>

  <!-- Browser prefetches -->
  <line x1="415" y1="280" x2="695" y2="280" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#seqArrG)"/>
  <text x="555" y="275" text-anchor="middle" font-size="11" fill="#2f9d74">prefetch dashboard.js</text>

  <!-- Server returns -->
  <line x1="695" y1="305" x2="415" y2="305" stroke="#2f9d74" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#seqArrG)"/>
  <text x="555" y="300" text-anchor="middle" font-size="11" fill="#2f9d74">dashboard.js (85KB, cached)</text>

  <!-- Phase 3: Navigation -->
  <rect x="30" y="340" width="810" height="22" rx="4" fill="#fdf3ec"/>
  <text x="450" y="356" text-anchor="middle" font-size="11" font-weight="700" fill="#d97843">User Navigates</text>

  <!-- User clicks -->
  <line x1="145" y1="380" x2="415" y2="380" stroke="#1a1822" stroke-width="1.5" marker-end="url(#seqArr)"/>
  <text x="280" y="375" text-anchor="middle" font-size="11" fill="#1a1822">Click "Dashboard"</text>

  <!-- Already cached -->
  <rect x="395" y="395" width="40" height="25" rx="4" fill="#2f9d74" opacity="0.3"/>
  <text x="490" y="408" font-size="11" fill="#2f9d74" font-weight="600">dashboard.js already cached!</text>

  <!-- Instant render -->
  <rect x="395" y="430" width="40" height="25" rx="4" fill="#2f9d74" opacity="0.3"/>
  <text x="490" y="448" font-size="13" fill="#2f9d74" font-weight="700">Instant render</text>

  <!-- Summary -->
  <rect x="180" y="475" width="540" height="30" rx="6" fill="#fff" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="450" y="495" text-anchor="middle" font-size="11" fill="#1a1822">Prefetching during idle time eliminates navigation latency completely</text>

  <defs>
    <marker id="seqArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1a1822"/>
    </marker>
    <marker id="seqArrO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d97843"/>
    </marker>
    <marker id="seqArrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2f9d74"/>
    </marker>
  </defs>
</svg>