<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: var(--bg-primary, #ffffff); }
      .card { fill: var(--bg-panel, #f8fafc); }
      .text { fill: var(--text-primary, #1e293b); }
      .text-muted { fill: var(--text-muted, #64748b); }
      .border { stroke: var(--border-color, #e2e8f0); }
      .accent { fill: var(--accent-color, #3b82f6); }
      .success { fill: var(--success-color, #22c55e); }
      .arrow { stroke: var(--accent-color, #3b82f6); stroke-width: 2; fill: none; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="text" font-size="18" font-weight="bold">Business Impact of Web Vitals</text>
  
  <!-- E-commerce Case Study -->
  <rect x="40" y="70" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="210" y="100" text-anchor="middle" class="text" font-size="14" font-weight="bold">E-commerce: LCP → Conversion</text>
  
  <text x="60" y="130" class="text-muted" font-size="11">Amazon Study:</text>
  <text x="60" y="150" class="text" font-size="12" font-weight="bold">Every 100ms latency = 1% sales loss</text>
  
  <text x="60" y="180" class="text-muted" font-size="11">Optimization Results:</text>
  <text x="70" y="200" class="success" font-size="11">✓ LCP: 4.0s → 1.5s</text>
  <text x="70" y="220" class="success" font-size="11">✓ Conversion: +15-20%</text>
  <text x="70" y="240" class="text" font-size="10">For $100M site = $1M-2M annual revenue</text>
  
  <!-- News/Media Case Study -->
  <rect x="420" y="70" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="590" y="100" text-anchor="middle" class="text" font-size="14" font-weight="bold">News/Media: INP → Engagement</text>
  
  <text x="440" y="130" class="text-muted" font-size="11">Washington Post:</text>
  <text x="440" y="150" class="text" font-size="12" font-weight="bold">Better INP = More engagement</text>
  
  <text x="440" y="180" class="text-muted" font-size="11">Optimization Results:</text>
  <text x="450" y="200" class="success" font-size="11">✓ INP: 400ms → 150ms</text>
  <text x="450" y="220" class="success" font-size="11">✓ Engagement: +20%</text>
  <text x="450" y="240" class="text" font-size="10">Time on site, pages per session increased</text>
  
  <!-- SaaS Case Study -->
  <rect x="40" y="280" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="210" y="310" text-anchor="middle" class="text" font-size="14" font-weight="bold">SaaS: INP → User Retention</text>
  
  <text x="60" y="340" class="text-muted" font-size="11">B2B Dashboard:</text>
  <text x="60" y="360" class="text" font-size="12" font-weight="bold">Faster INP = Fewer support tickets</text>
  
  <text x="60" y="390" class="text-muted" font-size="11">Optimization Results:</text>
  <text x="70" y="410" class="success" font-size="11">✓ INP: 500ms → 150ms</text>
  <text x="70" y="430" class="success" font-size="11">✓ Support tickets: -40%</text>
  <text x="70" y="450" class="success" font-size="11">✓ User retention: +8%</text>
  
  <!-- SEO Impact -->
  <rect x="420" y="280" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="590" y="310" text-anchor="middle" class="text" font-size="14" font-weight="bold">SEO: CWV → Search Ranking</text>
  
  <text x="440" y="340" class="text-muted" font-size="11">Google Ranking Factor:</text>
  <text x="440" y="360" class="text" font-size="12" font-weight="bold">Passing CWV = Better visibility</text>
  
  <text x="440" y="390" class="text-muted" font-size="11">Impact:</text>
  <text x="450" y="410" class="success" font-size="11">✓ 5-10% ranking improvement</text>
  <text x="450" y="430" class="success" font-size="11">✓ Higher organic traffic</text>
  <text x="450" y="450" class="text" font-size="10">Sites passing all CWV thresholds rank higher</text>
  
  <!-- ROI Summary -->
  <rect x="180" y="470" width="440" height="25" class="card" rx="4" stroke="var(--accent-color, #3b82f6)" stroke-width="2"/>
  <text x="400" y="488" text-anchor="middle" class="accent" font-size="11" font-weight="bold">Web Vitals optimization directly impacts revenue, engagement, and search visibility</text>
</svg>
