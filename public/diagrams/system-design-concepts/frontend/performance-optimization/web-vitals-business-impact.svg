<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" role="img" aria-labelledby="webVitalsImpactTitle webVitalsImpactDesc">
  <title id="webVitalsImpactTitle">Web Vitals Business Impact</title>
  <desc id="webVitalsImpactDesc">Chart showing correlation between Web Vitals scores and business metrics like bounce rate and conversion</desc>
  
  <defs>
    <linearGradient id="impactBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="850" height="450" fill="url(#impactBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Web Vitals: Business Impact Correlation</text>
  
  <!-- LCP Impact -->
  <rect x="40" y="70" width="240" height="170" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2" />
  <rect x="40" y="70" width="240" height="40" rx="8" fill="#f0fdf4" />
  <text x="160" y="97" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#16a34a">LCP Impact</text>
  
  <text x="55" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">E-Commerce:</text>
  <text x="55" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">LCP 4.2s → 2.1s</text>
  <text x="55" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#16a34a">+18% organic traffic</text>
  
  <text x="55" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">News Site:</text>
  <text x="55" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">LCP 3.5s → 1.8s</text>
  <text x="55" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#16a34a">-12% bounce rate</text>
  
  <!-- INP Impact -->
  <rect x="305" y="70" width="240" height="170" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" />
  <rect x="305" y="70" width="240" height="40" rx="8" fill="#ede9fe" />
  <text x="425" y="97" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#7c3aed">INP Impact</text>
  
  <text x="320" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">SaaS Dashboard:</text>
  <text x="320" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">INP 650ms → 180ms</text>
  <text x="320" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">+22% user satisfaction</text>
  
  <text x="320" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Web App:</text>
  <text x="320" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">INP 800ms → 150ms</text>
  <text x="320" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">+15% engagement</text>
  
  <!-- CLS Impact -->
  <rect x="570" y="70" width="240" height="170" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
  <rect x="570" y="70" width="240" height="40" rx="8" fill="#dbeafe" />
  <text x="690" y="97" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1d4ed8">CLS Impact</text>
  
  <text x="585" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">News Publisher:</text>
  <text x="585" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">CLS 0.35 → 0.08</text>
  <text x="585" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1d4ed8">+15% time on page</text>
  
  <text x="585" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Blog:</text>
  <text x="585" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">CLS 0.45 → 0.05</text>
  <text x="585" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1d4ed8">-20% bounce rate</text>
  
  <!-- Summary Stats (Bottom) -->
  <rect x="40" y="260" width="770" height="160" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2" />
  <text x="425" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Industry-Wide Impact Statistics</text>
  
  <!-- Stats grid -->
  <rect x="60" y="310" width="170" height="90" rx="6" fill="#f8fafc" stroke="#e2e8f0" />
  <text x="145" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#dc2626">24%</text>
  <text x="145" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Lower bounce rate</text>
  <text x="145" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#64748b">(Google average)</text>
  
  <rect x="250" y="310" width="170" height="90" rx="6" fill="#f8fafc" stroke="#e2e8f0" />
  <text x="335" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#16a34a">8-24%</text>
  <text x="335" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Conversion increase</text>
  <text x="335" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#64748b">(Vodafone, BBC)</text>
  
  <rect x="440" y="310" width="170" height="90" rx="6" fill="#f8fafc" stroke="#e2e8f0" />
  <text x="525" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#7c3aed">15%</text>
  <text x="525" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">User satisfaction</text>
  <text x="525" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#64748b">(Financial Times)</text>
  
  <rect x="630" y="310" width="170" height="90" rx="6" fill="#f8fafc" stroke="#e2e8f0" />
  <text x="715" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#2563eb">10%</text>
  <text x="715" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Traffic per 1s</text>
  <text x="715" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#64748b">(BBC finding)</text>
</svg>
