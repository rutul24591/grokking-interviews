<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" role="img" aria-labelledby="coreWebVitalsTitle coreWebVitalsDesc">
  <title id="coreWebVitalsTitle">Core Web Vitals Overview</title>
  <desc id="coreWebVitalsDesc">Diagram showing the three Core Web Vitals metrics: LCP, INP, and CLS with their thresholds and what they measure</desc>
  
  <defs>
    <linearGradient id="vitalsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="850" height="520" fill="url(#vitalsBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Core Web Vitals: The Three Key Metrics</text>
  
  <!-- LCP Card (Left) -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="240" height="420" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2" />
    <rect x="0" y="0" width="240" height="55" rx="10" fill="#22c55e" />
    <text x="120" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#ffffff">LOADING</text>
    <text x="120" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#ffffff">LCP</text>
    
    <text x="20" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Largest Contentful Paint</text>
    
    <!-- Visualization -->
    <rect x="20" y="105" width="200" height="120" rx="4" fill="#f1f5f9" />
    <rect x="30" y="115" width="180" height="80" rx="4" fill="#86efac" />
    <text x="120" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#166534">LCP Element</text>
    <text x="120" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">(hero image or text)</text>
    
    <text x="20" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Thresholds:</text>
    <rect x="20" y="270" width="200" height="28" rx="4" fill="#dcfce7" />
    <text x="35" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#166534">Good: ≤ 2.5s</text>
    
    <rect x="20" y="305" width="200" height="28" rx="4" fill="#fef9c3" />
    <text x="35" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Needs Improvement: 2.5-4.0s</text>
    
    <rect x="20" y="340" width="200" height="28" rx="4" fill="#fee2e2" />
    <text x="35" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Poor: &gt; 4.0s</text>
    
    <text x="20" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Measures:</text>
    <text x="20" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Time until largest content element renders</text>
    <text x="20" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Target: ≤ 2.5 seconds</text>
  </g>
  
  <!-- INP Card (Center) -->
  <g transform="translate(305, 70)">
    <rect x="0" y="0" width="240" height="420" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" />
    <rect x="0" y="0" width="240" height="55" rx="10" fill="#8b5cf6" />
    <text x="120" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#ffffff">INTERACTIVITY</text>
    <text x="120" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#ffffff">INP</text>
    
    <text x="20" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Interaction to Next Paint</text>
    
    <!-- Visualization -->
    <rect x="20" y="105" width="200" height="120" rx="4" fill="#f1f5f9" />
    <circle cx="120" cy="155" r="35" fill="#c4b5fd" />
    <text x="120" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6d28d9">Click/Tap</text>
    <text x="120" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#6d28d9">→ Response Time</text>
    
    <text x="20" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Thresholds:</text>
    <rect x="20" y="270" width="200" height="28" rx="4" fill="#ede9fe" />
    <text x="35" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#6d28d9">Good: ≤ 200ms</text>
    
    <rect x="20" y="305" width="200" height="28" rx="4" fill="#fef9c3" />
    <text x="35" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Needs Improvement: 200-500ms</text>
    
    <rect x="20" y="340" width="200" height="28" rx="4" fill="#fee2e2" />
    <text x="35" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Poor: &gt; 500ms</text>
    
    <text x="20" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Measures:</text>
    <text x="20" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Worst interaction latency during page lifetime</text>
    <text x="20" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Target: ≤ 200 milliseconds</text>
  </g>
  
  <!-- CLS Card (Right) -->
  <g transform="translate(570, 70)">
    <rect x="0" y="0" width="240" height="420" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <rect x="0" y="0" width="240" height="55" rx="10" fill="#3b82f6" />
    <text x="120" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#ffffff">VISUAL STABILITY</text>
    <text x="120" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#ffffff">CLS</text>
    
    <text x="20" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Cumulative Layout Shift</text>
    
    <!-- Visualization -->
    <rect x="20" y="105" width="200" height="120" rx="4" fill="#f1f5f9" />
    <rect x="30" y="115" width="180" height="50" rx="4" fill="#93c5fd" />
    <rect x="30" y="175" width="180" height="50" rx="4" fill="#93c5fd" opacity="0.5" />
    <path d="M40 165 L40 185" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" />
    <text x="120" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#dc2626">Layout Shift</text>
    
    <text x="20" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Thresholds:</text>
    <rect x="20" y="270" width="200" height="28" rx="4" fill="#dbeafe" />
    <text x="35" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Good: ≤ 0.1</text>
    
    <rect x="20" y="305" width="200" height="28" rx="4" fill="#fef9c3" />
    <text x="35" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#854d0e">Needs Improvement: 0.1-0.25</text>
    
    <rect x="20" y="340" width="200" height="28" rx="4" fill="#fee2e2" />
    <text x="35" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Poor: &gt; 0.25</text>
    
    <text x="20" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Measures:</text>
    <text x="20" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Sum of all unexpected layout shifts</text>
    <text x="20" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Target: ≤ 0.1</text>
  </g>
  
  <!-- Bottom Summary -->
  <rect x="40" y="500" width="770" height="15" rx="3" fill="#f1f5f9" />
  <text x="425" y="511" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#64748b">Core Web Vitals directly impact Google Search ranking and represent real user experience</text>
</svg>
