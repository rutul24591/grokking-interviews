<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="intersectionObserverTitle intersectionObserverDesc">
  <title id="intersectionObserverTitle">Intersection Observer Lazy Loading Flow</title>
  <desc id="intersectionObserverDesc">Diagram showing how Intersection Observer triggers lazy loading when elements enter the viewport</desc>
  
  <defs>
    <linearGradient id="viewportBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <marker id="viewportArrow" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 L2,5 Z" fill="#475569" />
    </marker>
  </defs>
  
  <rect width="800" height="480" fill="url(#viewportBg)" />
  
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Intersection Observer: Lazy Loading Flow</text>
  
  <!-- Browser Viewport -->
  <rect x="50" y="60" width="500" height="280" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2" />
  <text x="300" y="85" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Browser Viewport</text>
  
  <!-- Viewport content -->
  <rect x="80" y="100" width="440" height="60" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" />
  <text x="300" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#166534">Above-fold content (loaded)</text>
  
  <rect x="80" y="175" width="440" height="60" rx="4" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-dasharray="5,3" />
  <text x="300" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#92400e">Viewport threshold (200px)</text>
  
  <rect x="80" y="250" width="440" height="60" rx="4" fill="#e2e8f0" stroke="#cbd5e1" />
  <text x="300" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#64748b">Image 3 (not yet loaded)</text>
  
  <!-- Below viewport -->
  <rect x="80" y="325" width="440" height="60" rx="4" fill="#e2e8f0" stroke="#cbd5e1" opacity="0.5" />
  <text x="300" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">Image 4 (below viewport)</text>
  
  <!-- Observer Box -->
  <rect x="580" y="100" width="180" height="180" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" />
  <text x="670" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Observer</text>
  
  <text x="595" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569">Configuration:</text>
  <text x="595" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#64748b">rootMargin: "200px"</text>
  <text x="595" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#64748b">threshold: 0</text>
  <text x="595" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#64748b">target: img.lazy</text>
  
  <text x="595" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569">Callback:</text>
  <text x="595" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#64748b">if (entry.isIntersecting)</text>
  
  <!-- Flow arrows -->
  <line x1="550" y1="200" x2="575" y2="200" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,3" />
  
  <!-- Steps on the right -->
  <rect x="580" y="300" width="180" height="150" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
  <text x="670" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Loading Steps</text>
  
  <circle cx="595" cy="355" r="10" fill="#3b82f6" />
  <text x="595" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff">1</text>
  <text x="615" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Observe targets</text>
  
  <circle cx="595" cy="385" r="10" fill="#3b82f6" />
  <text x="595" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff">2</text>
  <text x="615" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Scroll detected</text>
  
  <circle cx="595" cy="415" r="10" fill="#3b82f6" />
  <text x="595" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff">3</text>
  <text x="615" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Callback fires</text>
  
  <circle cx="595" cy="445" r="10" fill="#22c55e" />
  <text x="595" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff">4</text>
  <text x="615" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Image loads</text>
  
  <!-- Scroll indicator -->
  <line x1="570" y1="60" x2="570" y2="340" stroke="#64748b" stroke-width="2" />
  <polygon points="570,340 565,330 575,330" fill="#64748b" />
  <text x="585" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#64748b">Scroll ↓</text>
</svg>
