<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" role="img" aria-labelledby="resourceHintsOverviewTitle resourceHintsOverviewDesc">
  <title id="resourceHintsOverviewTitle">Resource Hints Overview</title>
  <desc id="resourceHintsOverviewDesc">Diagram showing four main resource hints: dns-prefetch, preconnect, prefetch, and preload with their use cases</desc>
  
  <defs>
    <linearGradient id="hintsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="850" height="480" fill="url(#hintsBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Resource Hints: Four Key Types</text>
  
  <!-- dns-prefetch -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="180" height="180" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <rect x="0" y="0" width="180" height="45" rx="8" fill="#dbeafe" />
    <text x="90" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e40af">dns-prefetch</text>
    
    <text x="20" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">What:</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">DNS lookup only</text>
    
    <text x="20" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Cost:</text>
    <text x="20" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Negligible (~20-120ms)</text>
    
    <text x="20" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Use:</text>
    <text x="20" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Third-party domains</text>
    
    <text x="20" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#3b82f6">Save: 20-120ms per domain</text>
  </g>
  
  <!-- preconnect -->
  <g transform="translate(245, 70)">
    <rect x="0" y="0" width="180" height="180" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2" />
    <rect x="0" y="0" width="180" height="45" rx="8" fill="#dcfce7" />
    <text x="90" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#166534">preconnect</text>
    
    <text x="20" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">What:</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">DNS + TCP + TLS</text>
    
    <text x="20" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Cost:</text>
    <text x="20" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Low (open socket)</text>
    
    <text x="20" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Use:</text>
    <text x="20" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Critical origins (2-4)</text>
    
    <text x="20" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#16a34a">Save: 100-300ms</text>
  </g>
  
  <!-- prefetch -->
  <g transform="translate(450, 70)">
    <rect x="0" y="0" width="180" height="180" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2" />
    <rect x="0" y="0" width="180" height="45" rx="8" fill="#fef3c7" />
    <text x="90" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#92400e">prefetch</text>
    
    <text x="20" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">What:</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Full download</text>
    
    <text x="20" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Priority:</text>
    <text x="20" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Low (idle time)</text>
    
    <text x="20" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Use:</text>
    <text x="20" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Next page resources</text>
    
    <text x="20" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#d97706">Future navigation</text>
  </g>
  
  <!-- preload -->
  <g transform="translate(655, 70)">
    <rect x="0" y="0" width="180" height="180" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2" />
    <rect x="0" y="0" width="180" height="45" rx="8" fill="#fee2e2" />
    <text x="90" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#991b1b">preload</text>
    
    <text x="20" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">What:</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Full download</text>
    
    <text x="20" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Priority:</text>
    <text x="20" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">High (mandatory)</text>
    
    <text x="20" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Use:</text>
    <text x="20" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Current page critical</text>
    
    <text x="20" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#dc2626">Current page</text>
  </g>
  
  <!-- Comparison Table (Bottom) -->
  <rect x="40" y="270" width="770" height="190" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  <text x="425" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Quick Comparison</text>
  
  <!-- Table Header -->
  <rect x="60" y="315" width="730" height="35" rx="4" fill="#f8fafc" stroke="#e2e8f0" />
  <text x="150" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Hint</text>
  <text x="280" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1e293b">What It Does</text>
  <text x="450" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Priority</text>
  <text x="580" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Best For</text>
  
  <!-- Row 1 -->
  <text x="150" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#3b82f6">dns-prefetch</text>
  <text x="280" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">DNS lookup</text>
  <text x="450" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">N/A</text>
  <text x="580" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Any third-party domain</text>
  
  <!-- Row 2 -->
  <text x="150" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#22c55e">preconnect</text>
  <text x="280" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">DNS + TCP + TLS</text>
  <text x="450" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">N/A</text>
  <text x="580" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Critical origins (2-4)</text>
  
  <!-- Row 3 -->
  <text x="150" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#d97706">prefetch</text>
  <text x="280" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Download (idle)</text>
  <text x="450" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Low</text>
  <text x="580" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Next page resources</text>
  
  <!-- Row 4 -->
  <text x="150" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#dc2626">preload</text>
  <text x="280" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Download (now)</text>
  <text x="450" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">High</text>
  <text x="580" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Current page critical</text>
</svg>
