<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 420" role="img" aria-labelledby="imageOptimizationPipelineTitle imageOptimizationPipelineDesc">
  <title id="imageOptimizationPipelineTitle">Image Optimization Pipeline</title>
  <desc id="imageOptimizationPipelineDesc">Diagram showing the complete image optimization workflow from upload to delivery</desc>
  
  <defs>
    <linearGradient id="pipelineBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="850" height="420" fill="url(#pipelineBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Image Optimization Pipeline</text>
  
  <!-- Upload -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2" />
    <text x="70" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">1. Upload</text>
    <text x="70" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Original image</text>
    <text x="70" y="85" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#dc2626">5 MB JPEG</text>
  </g>
  
  <!-- Arrow -->
  <line x1="180" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="2" />
  <polygon points="210,120 200,115 200,125" fill="#475569" />
  
  <!-- Process -->
  <g transform="translate(220, 70)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" />
    <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">2. Process</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">• Resize to breakpoints</text>
    <text x="90" y="75" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">• Convert to WebP/AVIF</text>
    <text x="90" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">• Compress (quality 75-85)</text>
  </g>
  
  <!-- Arrow -->
  <line x1="400" y1="120" x2="430" y2="120" stroke="#475569" stroke-width="2" />
  <polygon points="430,120 420,115 420,125" fill="#475569" />
  
  <!-- Generate Variants -->
  <g transform="translate(440, 70)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="2" />
    <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">3. Generate Variants</text>
    <text x="90" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">400w, 800w, 1200w, 1600w</text>
    <text x="90" y="75" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">WebP + AVIF + JPEG fallback</text>
    <text x="90" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#16a34a">~12 files total</text>
  </g>
  
  <!-- Arrow -->
  <line x1="620" y1="120" x2="650" y2="120" stroke="#475569" stroke-width="2" />
  <polygon points="650,120 640,115 640,125" fill="#475569" />
  
  <!-- Deliver -->
  <g transform="translate(660, 70)">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" />
    <text x="75" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#1e293b">4. Deliver</text>
    <text x="75" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">CDN with auto-format</text>
    <text x="75" y="85" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#16a34a">User gets optimal</text>
  </g>
  
  <!-- Results (Bottom) -->
  <rect x="40" y="200" width="770" height="200" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  <text x="425" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Results: Before vs After Optimization</text>
  
  <!-- Before -->
  <rect x="60" y="250" width="300" height="130" rx="6" fill="#fef2f2" stroke="#ef4444" />
  <text x="210" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#dc2626">Before Optimization</text>
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• Single 5 MB JPEG</text>
  <text x="80" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• No responsive sizes</text>
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• Desktop serves to mobile</text>
  <text x="210" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#dc2626">5 MB download</text>
  
  <!-- After -->
  <rect x="410" y="250" width="380" height="130" rx="6" fill="#f0fdf4" stroke="#22c55e" />
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#16a34a">After Optimization</text>
  <text x="430" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• WebP/AVIF with JPEG fallback</text>
  <text x="430" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• 4 responsive sizes (400w-1600w)</text>
  <text x="430" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• Quality 75-85 compression</text>
  <text x="600" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#16a34a">50-200 KB download</text>
  
  <!-- Improvement arrow -->
  <path d="M 370 315 L 400 315" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="385" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#16a34a">96% reduction</text>
</svg>
