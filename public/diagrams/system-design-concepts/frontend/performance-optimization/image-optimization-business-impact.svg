<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: var(--bg-primary, #ffffff); }
      .card { fill: var(--bg-panel, #f8fafc); }
      .text { fill: var(--text-primary, #1e293b); }
      .text-muted { fill: var(--text-muted, #64748b); }
      .border { stroke: var(--border-color, #e2e8f0); }
      .accent { fill: var(--accent-color, #3b82f6); }
      .success { fill: var(--success-color, #22c55e); }
      .arrow { stroke: var(--accent-color, #3b82f6); stroke-width: 2; fill: none; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="text" font-size="18" font-weight="bold">Business Impact of Image Optimization</text>
  
  <!-- E-commerce Case Study -->
  <rect x="40" y="70" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="210" y="100" text-anchor="middle" class="text" font-size="14" font-weight="bold">E-commerce: Product Photos</text>
  
  <text x="60" y="130" class="text-muted" font-size="11">10,000 products optimized:</text>
  <text x="60" y="155" class="success" font-size="12" font-weight="bold">• Page weight: -60%</text>
  <text x="60" y="175" class="success" font-size="12" font-weight="bold">• LCP: 4.2s → 1.8s</text>
  <text x="60" y="195" class="success" font-size="12" font-weight="bold">• Conversion rate: +12%</text>
  
  <text x="60" y="225" class="text" font-size="10" font-weight="bold">What they did:</text>
  <text x="60" y="240" class="text-muted" font-size="9">• Build-time pipeline (sharp)</text>
  <text x="60" y="255" class="text-muted" font-size="9">• 4 sizes × 3 formats (AVIF/WebP/JPEG)</text>
  <text x="60" y="270" class="text-muted" font-size="9">• srcset + lazy loading + blur placeholders</text>
  
  <!-- News/Media Case Study -->
  <rect x="420" y="70" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="590" y="100" text-anchor="middle" class="text" font-size="14" font-weight="bold">News/Media: Article Images</text>
  
  <text x="440" y="130" class="text-muted" font-size="11">Image CDN implementation:</text>
  <text x="440" y="155" class="success" font-size="12" font-weight="bold">• Bandwidth: -70%</text>
  <text x="440" y="175" class="success" font-size="12" font-weight="bold">• Mobile load: 8s → 3s</text>
  <text x="440" y="195" class="success" font-size="12" font-weight="bold">• Bounce rate: -15%</text>
  
  <text x="440" y="225" class="text" font-size="10" font-weight="bold">What they did:</text>
  <text x="440" y="240" class="text-muted" font-size="9">• Cloudinary for on-demand optimization</text>
  <text x="440" y="255" class="text-muted" font-size="9">• Automatic format negotiation</text>
  <text x="440" y="270" class="text-muted" font-size="9">• Lazy loading + aggressive caching</text>
  
  <!-- Social Media Case Study -->
  <rect x="40" y="280" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="210" y="310" text-anchor="middle" class="text" font-size="14" font-weight="bold">Social Media: UGC</text>
  
  <text x="60" y="340" class="text-muted" font-size="11">Millions of daily uploads:</text>
  <text x="60" y="365" class="success" font-size="12" font-weight="bold">• Storage costs: -50%</text>
  <text x="60" y="385" class="success" font-size="12" font-weight="bold">• Feed load time: -40%</text>
  
  <text x="60" y="415" class="text" font-size="10" font-weight="bold">What they did:</text>
  <text x="60" y="430" class="text-muted" font-size="9">• Real-time processing pipeline</text>
  <text x="60" y="445" class="text-muted" font-size="9">• 5 sizes in WebP + JPEG</text>
  <text x="60" y="460" class="text-muted" font-size="9">• CDN edge caching + progressive loading</text>
  
  <!-- SEO Impact -->
  <rect x="420" y="280" width="340" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="590" y="310" text-anchor="middle" class="text" font-size="14" font-weight="bold">SEO: Core Web Vitals</text>
  
  <text x="440" y="340" class="text-muted" font-size="11">Image-heavy sites:</text>
  <text x="440" y="365" class="success" font-size="12" font-weight="bold">• Organic rankings: +5-10%</text>
  <text x="440" y="385" class="success" font-size="12" font-weight="bold">• Search visibility: Improved</text>
  
  <text x="440" y="415" class="text" font-size="10" font-weight="bold">What they did:</text>
  <text x="440" y="430" class="text-muted" font-size="9">• Identified LCP images</text>
  <text x="440" y="445" class="text-muted" font-size="9">• Preloaded with fetchPriority="high"</text>
  <text x="440" y="460" class="text-muted" font-size="9">• Converted to AVIF/WebP + proper dimensions</text>
  
  <!-- ROI Summary -->
  <rect x="180" y="470" width="440" height="25" class="card" rx="4" stroke="var(--accent-color, #3b82f6)" stroke-width="2"/>
  <text x="400" y="488" text-anchor="middle" class="accent" font-size="11" font-weight="bold">Image optimization delivers 60-80% weight reduction → Better UX, SEO, and conversions</text>
</svg>
