<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1822">Browser Resource Priority Levels</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#555">How Chrome prioritizes different resource types during loading</text>

  <!-- Table Header -->
  <rect x="30" y="68" width="840" height="32" rx="6" fill="#6d5bd0"/>
  <text x="120" y="89" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Resource Type</text>
  <text x="300" y="89" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Default Priority</text>
  <text x="470" y="89" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">With fetchpriority</text>
  <text x="680" y="89" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">Above-Fold Recommendation</text>

  <!-- Row 1: CSS -->
  <rect x="30" y="104" width="840" height="38" rx="0" fill="#fff" stroke="#e8e4f3" stroke-width="1"/>
  <text x="120" y="128" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">CSS (&lt;link&gt;)</text>
  <rect x="255" y="112" width="90" height="22" rx="4" fill="#d97843"/>
  <text x="300" y="128" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Highest</text>
  <text x="470" y="128" text-anchor="middle" font-size="10" fill="#555">N/A (always highest)</text>
  <text x="680" y="128" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Inline critical, defer rest</text>

  <!-- Row 2: Fonts -->
  <rect x="30" y="142" width="840" height="38" rx="0" fill="#f8f7fb" stroke="#e8e4f3" stroke-width="1"/>
  <text x="120" y="166" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Fonts (@font-face)</text>
  <rect x="255" y="150" width="90" height="22" rx="4" fill="#d97843"/>
  <text x="300" y="166" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">Highest</text>
  <text x="470" y="166" text-anchor="middle" font-size="10" fill="#555">N/A (always highest)</text>
  <text x="680" y="166" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Preload + font-display: swap</text>

  <!-- Row 3: Scripts (head, sync) -->
  <rect x="30" y="180" width="840" height="38" rx="0" fill="#fff" stroke="#e8e4f3" stroke-width="1"/>
  <text x="120" y="204" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Script (sync)</text>
  <rect x="260" y="188" width="80" height="22" rx="4" fill="#d97843" opacity="0.8"/>
  <text x="300" y="204" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">High</text>
  <text x="470" y="204" text-anchor="middle" font-size="10" fill="#555">"high" / "low"</text>
  <text x="680" y="204" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Use defer, move to body end</text>

  <!-- Row 4: Scripts (async) -->
  <rect x="30" y="218" width="840" height="38" rx="0" fill="#f8f7fb" stroke="#e8e4f3" stroke-width="1"/>
  <text x="120" y="242" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Script (async)</text>
  <rect x="260" y="226" width="80" height="22" rx="4" fill="#e8c840"/>
  <text x="300" y="242" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="600">Low</text>
  <text x="470" y="242" text-anchor="middle" font-size="10" fill="#555">"high" / "low"</text>
  <text x="680" y="242" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Good for analytics, non-critical</text>

  <!-- Row 5: LCP Image -->
  <rect x="30" y="256" width="840" height="38" rx="0" fill="#fff" stroke="#e8e4f3" stroke-width="1"/>
  <text x="120" y="280" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">LCP Image</text>
  <rect x="260" y="264" width="80" height="22" rx="4" fill="#e8c840"/>
  <text x="300" y="280" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="600">Medium</text>
  <rect x="425" y="264" width="90" height="22" rx="4" fill="#d97843"/>
  <text x="470" y="280" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">"high" ★</text>
  <text x="680" y="280" text-anchor="middle" font-size="10" fill="#d97843" font-weight="700">fetchpriority="high" + preload</text>

  <!-- Row 6: Other images -->
  <rect x="30" y="294" width="840" height="38" rx="0" fill="#f8f7fb" stroke="#e8e4f3" stroke-width="1"/>
  <text x="120" y="318" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Images (other)</text>
  <rect x="260" y="302" width="80" height="22" rx="4" fill="#e8c840"/>
  <text x="300" y="318" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="600">Low</text>
  <text x="470" y="318" text-anchor="middle" font-size="10" fill="#555">"high" / "low"</text>
  <text x="680" y="318" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">loading="lazy" for below-fold</text>

  <!-- Row 7: Preloaded resources -->
  <rect x="30" y="332" width="840" height="38" rx="0" fill="#fff" stroke="#e8e4f3" stroke-width="1"/>
  <text x="120" y="356" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Preloaded (link)</text>
  <rect x="260" y="340" width="80" height="22" rx="4" fill="#d97843" opacity="0.8"/>
  <text x="300" y="356" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">High</text>
  <text x="470" y="356" text-anchor="middle" font-size="10" fill="#555">Matches resource type</text>
  <text x="680" y="356" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Use for LCP image, key fonts</text>

  <!-- Row 8: Fetch/XHR -->
  <rect x="30" y="370" width="840" height="38" rx="0" fill="#f8f7fb" stroke="#e8e4f3" stroke-width="1"/>
  <text x="120" y="394" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Fetch / XHR</text>
  <rect x="260" y="378" width="80" height="22" rx="4" fill="#d97843" opacity="0.8"/>
  <text x="300" y="394" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">High</text>
  <text x="470" y="394" text-anchor="middle" font-size="10" fill="#555">"high" / "low" / "auto"</text>
  <text x="680" y="394" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">fetchpriority="low" for non-critical</text>

  <!-- Key takeaway box -->
  <rect x="30" y="425" width="840" height="60" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="448" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Key Takeaway for Above-the-Fold</text>
  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#1a1822">Use fetchpriority="high" on the LCP element • Preload critical fonts and hero images • Defer/lazy-load everything below the fold</text>
</svg>