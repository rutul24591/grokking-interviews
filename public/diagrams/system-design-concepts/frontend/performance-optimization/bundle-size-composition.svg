<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500" role="img" aria-labelledby="bundleSizeCompositionTitle bundleSizeCompositionDesc">
  <title id="bundleSizeCompositionTitle">Bundle Size Composition Analysis</title>
  <desc id="bundleSizeCompositionDesc">Treemap visualization showing typical JavaScript bundle composition and optimization opportunities</desc>
  
  <defs>
    <linearGradient id="bundleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="850" height="500" fill="url(#bundleBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Typical Bundle Composition (Before Optimization)</text>
  
  <!-- Main treemap area -->
  <rect x="50" y="60" width="750" height="350" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  
  <!-- Application Code (30%) -->
  <rect x="60" y="70" width="220" height="330" rx="4" fill="#3b82f6" opacity="0.8" />
  <text x="170" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">App Code</text>
  <text x="170" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#ffffff">~450 KB</text>
  <text x="170" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">30% of bundle</text>
  
  <!-- React + ReactDOM (25%) -->
  <rect x="290" y="70" width="200" height="200" rx="4" fill="#22c55e" opacity="0.8" />
  <text x="390" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">React + ReactDOM</text>
  <text x="390" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#ffffff">~130 KB</text>
  <text x="390" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">25% of bundle</text>
  
  <!-- Third-party Libraries (35%) -->
  <rect x="500" y="70" width="290" height="160" rx="4" fill="#f59e0b" opacity="0.8" />
  <text x="645" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Third-party Libraries</text>
  <text x="645" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#ffffff">~520 KB</text>
  <text x="645" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">35% of bundle</text>
  
  <!-- Router (10%) -->
  <rect x="290" y="280" width="200" height="120" rx="4" fill="#8b5cf6" opacity="0.8" />
  <text x="390" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Router</text>
  <text x="390" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">~80 KB</text>
  <text x="390" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#ffffff">10% of bundle</text>
  
  <!-- Utilities (10%) -->
  <rect x="500" y="240" width="290" height="180" rx="4" fill="#ef4444" opacity="0.8" />
  <text x="645" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Utilities (lodash, moment, etc.)</text>
  <text x="645" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#ffffff">~350 KB</text>
  <text x="645" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#ffffff">23% of bundle</text>
  
  <!-- Optimization Potential (Bottom) -->
  <rect x="50" y="420" width="750" height="60" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" />
  <text x="425" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#16a34a">Optimization Potential</text>
  <text x="425" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#166534">Tree shaking + Code splitting + Library replacement can reduce bundle by 60-75%</text>
</svg>
