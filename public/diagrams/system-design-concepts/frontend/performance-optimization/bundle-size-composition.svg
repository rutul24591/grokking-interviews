<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#ffffff" width="800" height="500" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="bold">Bundle Size Composition</text>
  
  <!-- Pie Chart Representation -->
  <g transform="translate(200, 250)">
    <!-- Framework slice -->
    <path d="M 0,0 L 0,-120 A 120,120 0 0,1 70,-97 Z" fill="#3b82f6" opacity="0.8"/>
    <!-- Libraries slice -->
    <path d="M 0,0 L 70,-97 A 120,120 0 0,1 100,65 Z" fill="#f59e0b" opacity="0.8"/>
    <!-- Application code slice -->
    <path d="M 0,0 L 100,65 A 120,120 0 0,1 -100,65 Z" fill="#22c55e" opacity="0.8"/>
    <!-- Polyfills slice -->
    <path d="M 0,0 L -100,65 A 120,120 0 0,1 0,-120 Z" fill="#ef4444" opacity="0.8"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="50" fill="#ffffff"/>
    <text x="0" y="5" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Total</text>
    <text x="0" y="20" text-anchor="middle" fill="#64748b" font-size="10">Bundle</text>
  </g>
  
  <!-- Legend -->
  <rect x="400" y="100" width="360" height="280" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="580" y="130" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Component Breakdown</text>
  
  <!-- Framework -->
  <rect x="420" y="150" width="30" height="30" fill="#3b82f6" opacity="0.8" rx="4"/>
  <text x="460" y="170" fill="#1e293b" font-size="12" font-weight="bold">Framework (React, Vue)</text>
  <text x="650" y="170" text-anchor="end" fill="#64748b" font-size="12">~40KB gzipped</text>
  <text x="460" y="190" fill="#64748b" font-size="10">Fixed cost per app</text>
  
  <!-- Libraries -->
  <rect x="420" y="210" width="30" height="30" fill="#f59e0b" opacity="0.8" rx="4"/>
  <text x="460" y="230" fill="#1e293b" font-size="12" font-weight="bold">Third-Party Libraries</text>
  <text x="650" y="230" text-anchor="end" fill="#64748b" font-size="12">Variable (50-500KB)</text>
  <text x="460" y="250" fill="#64748b" font-size="10">lodash, moment, axios, etc.</text>
  
  <!-- Application Code -->
  <rect x="420" y="270" width="30" height="30" fill="#22c55e" opacity="0.8" rx="4"/>
  <text x="460" y="290" fill="#1e293b" font-size="12" font-weight="bold">Application Code</text>
  <text x="650" y="290" text-anchor="end" fill="#64748b" font-size="12">Variable (100-500KB)</text>
  <text x="460" y="310" fill="#64748b" font-size="10">Your source code</text>
  
  <!-- Polyfills -->
  <rect x="420" y="330" width="30" height="30" fill="#ef4444" opacity="0.8" rx="4"/>
  <text x="460" y="350" fill="#1e293b" font-size="12" font-weight="bold">Polyfills</text>
  <text x="650" y="350" text-anchor="end" fill="#64748b" font-size="12">~20-50KB</text>
  <text x="460" y="370" fill="#64748b" font-size="10">core-js, regenerator</text>
  
  <!-- Optimization Targets -->
  <rect x="40" y="380" width="720" height="90" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="410" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Optimization Priority</text>
  
  <text x="80" y="435" fill="#f59e0b" font-size="11" font-weight="bold">1. Libraries (highest impact)</text>
  <text x="80" y="455" fill="#64748b" font-size="10">Replace heavy libs, lazy-load, tree-shake</text>
  
  <text x="300" y="435" fill="#22c55e" font-size="11" font-weight="bold">2. Application Code</text>
  <text x="300" y="455" fill="#64748b" font-size="10">Code splitting, remove dead code</text>
  
  <text x="500" y="435" fill="#3b82f6" font-size="11" font-weight="bold">3. Framework</text>
  <text x="500" y="455" fill="#64748b" font-size="10">Consider lighter alternatives</text>
  
  <text x="650" y="435" fill="#ef4444" font-size="11" font-weight="bold">4. Polyfills</text>
  <text x="650" y="455" fill="#64748b" font-size="10">Use modern browsers, conditional loading</text>
</svg>