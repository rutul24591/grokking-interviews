<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1822">Browser Rendering Pipeline — Critical Path to First Paint</text>

  <!-- Step 1: HTML Parse -->
  <rect x="30" y="60" width="110" height="52" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="85" y="82" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">HTML Parse</text>
  <text x="85" y="100" text-anchor="middle" font-size="9" fill="#e8e4f3">Tokenize + Build</text>

  <line x1="140" y1="86" x2="165" y2="86" stroke="#1a1822" stroke-width="1.5" marker-end="url(#pipeArr)"/>

  <!-- Step 2: DOM -->
  <rect x="165" y="60" width="90" height="52" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="210" y="82" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">DOM</text>
  <text x="210" y="100" text-anchor="middle" font-size="9" fill="#e8e4f3">Document Object</text>

  <line x1="255" y1="86" x2="280" y2="86" stroke="#1a1822" stroke-width="1.5" marker-end="url(#pipeArr)"/>

  <!-- Step 3: CSSOM -->
  <rect x="280" y="60" width="90" height="52" rx="8" fill="#d97843" stroke="#c06a38" stroke-width="1.5"/>
  <text x="325" y="82" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">CSSOM</text>
  <text x="325" y="100" text-anchor="middle" font-size="9" fill="#fef3ec">CSS Object Model</text>

  <!-- CSS Download note -->
  <rect x="270" y="120" width="120" height="28" rx="6" fill="#fff" stroke="#d97843" stroke-width="1.2"/>
  <text x="330" y="139" text-anchor="middle" font-size="9" fill="#d97843" font-weight="600">Render-Blocking!</text>
  <line x1="325" y1="112" x2="325" y2="120" stroke="#d97843" stroke-width="1" stroke-dasharray="3,2"/>

  <line x1="370" y1="86" x2="395" y2="86" stroke="#1a1822" stroke-width="1.5" marker-end="url(#pipeArr)"/>

  <!-- Step 4: Render Tree -->
  <rect x="395" y="60" width="110" height="52" rx="8" fill="#2f9d74" stroke="#278562" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Render Tree</text>
  <text x="450" y="100" text-anchor="middle" font-size="9" fill="#e6f5ef">DOM + CSSOM</text>

  <line x1="505" y1="86" x2="530" y2="86" stroke="#1a1822" stroke-width="1.5" marker-end="url(#pipeArr)"/>

  <!-- Step 5: Layout -->
  <rect x="530" y="60" width="90" height="52" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="575" y="82" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Layout</text>
  <text x="575" y="100" text-anchor="middle" font-size="9" fill="#e8e4f3">Geometry</text>

  <line x1="620" y1="86" x2="645" y2="86" stroke="#1a1822" stroke-width="1.5" marker-end="url(#pipeArr)"/>

  <!-- Step 6: Paint -->
  <rect x="645" y="60" width="90" height="52" rx="8" fill="#d97843" stroke="#c06a38" stroke-width="1.5"/>
  <text x="690" y="82" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Paint</text>
  <text x="690" y="100" text-anchor="middle" font-size="9" fill="#fef3ec">Draw Pixels</text>

  <line x1="735" y1="86" x2="760" y2="86" stroke="#1a1822" stroke-width="1.5" marker-end="url(#pipeArr)"/>

  <!-- Step 7: Composite -->
  <rect x="760" y="60" width="110" height="52" rx="8" fill="#2f9d74" stroke="#278562" stroke-width="1.5"/>
  <text x="815" y="82" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Composite</text>
  <text x="815" y="100" text-anchor="middle" font-size="9" fill="#e6f5ef">Layer Merge</text>

  <!-- Divider -->
  <line x1="30" y1="165" x2="870" y2="165" stroke="#c8c3d6" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="450" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">Render-Blocking vs Parser-Blocking Resources</text>

  <!-- Render-Blocking Section -->
  <rect x="40" y="200" width="390" height="270" rx="8" fill="#fff" stroke="#d97843" stroke-width="1.5"/>
  <rect x="40" y="200" width="390" height="30" rx="8" fill="#d97843"/>
  <rect x="40" y="218" width="390" height="12" fill="#d97843"/>
  <text x="235" y="220" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Render-Blocking (Delays Paint)</text>

  <text x="60" y="255" font-size="11" fill="#1a1822" font-weight="600">CSS Stylesheets</text>
  <text x="60" y="275" font-size="10" fill="#555">• External &amp;lt;link rel="stylesheet"&amp;gt;</text>
  <text x="60" y="293" font-size="10" fill="#555">• Blocks CSSOM construction</text>
  <text x="60" y="311" font-size="10" fill="#555">• No render tree without CSSOM</text>

  <line x1="60" y1="325" x2="410" y2="325" stroke="#e8e4f3" stroke-width="1"/>

  <text x="60" y="345" font-size="11" fill="#1a1822" font-weight="600">Solution: Critical CSS Inlining</text>
  <text x="60" y="365" font-size="10" fill="#2f9d74">• Inline above-fold styles in &amp;lt;head&amp;gt;</text>
  <text x="60" y="383" font-size="10" fill="#2f9d74">• Async-load remaining CSS</text>
  <text x="60" y="401" font-size="10" fill="#2f9d74">• Use media queries to scope</text>

  <rect x="60" y="420" width="350" height="35" rx="6" fill="#e6f5ef" stroke="#2f9d74" stroke-width="1"/>
  <text x="235" y="442" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Goal: FCP in ≤ 1 network round-trip (~14KB)</text>

  <!-- Parser-Blocking Section -->
  <rect x="470" y="200" width="390" height="270" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="470" y="200" width="390" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="470" y="218" width="390" height="12" fill="#6d5bd0"/>
  <text x="665" y="220" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">Parser-Blocking (Delays DOM)</text>

  <text x="490" y="255" font-size="11" fill="#1a1822" font-weight="600">Synchronous JavaScript</text>
  <text x="490" y="275" font-size="10" fill="#555">• &amp;lt;script src="app.js"&amp;gt; (no async/defer)</text>
  <text x="490" y="293" font-size="10" fill="#555">• Stops HTML parsing entirely</text>
  <text x="490" y="311" font-size="10" fill="#555">• Downloads + executes before continuing</text>

  <line x1="490" y1="325" x2="840" y2="325" stroke="#e8e4f3" stroke-width="1"/>

  <text x="490" y="345" font-size="11" fill="#1a1822" font-weight="600">Solution: defer / async / dynamic import</text>
  <text x="490" y="365" font-size="10" fill="#2f9d74">• defer: download parallel, execute after parse</text>
  <text x="490" y="383" font-size="10" fill="#2f9d74">• async: download parallel, execute when ready</text>
  <text x="490" y="401" font-size="10" fill="#2f9d74">• dynamic import(): load on demand</text>

  <rect x="490" y="420" width="350" height="35" rx="6" fill="#e8e4f3" stroke="#6d5bd0" stroke-width="1"/>
  <text x="665" y="442" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">Goal: Unblock HTML parser for faster DOM</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="pipeArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822"/>
    </marker>
  </defs>
</svg>