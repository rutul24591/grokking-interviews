<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" role="img" aria-labelledby="resourceHintsTimelineTitle resourceHintsTimelineDesc">
  <title id="resourceHintsTimelineTitle">Resource Hints Timeline</title>
  <desc id="resourceHintsTimelineDesc">Timeline showing when each resource hint operates during page load lifecycle</desc>
  
  <defs>
    <linearGradient id="timelineBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="850" height="450" fill="url(#timelineBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">Resource Hints: Page Load Timeline</text>
  
  <!-- Timeline axis -->
  <line x1="50" y1="100" x2="800" y2="100" stroke="#475569" stroke-width="3" />
  <polygon points="800,100 790,95 790,105" fill="#475569" />
  
  <!-- Timeline labels -->
  <text x="50" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">HTML Parse</text>
  <text x="300" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Page Load</text>
  <text x="550" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Idle Time</text>
  <text x="750" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569">Navigation</text>
  
  <!-- dns-prefetch -->
  <rect x="60" y="160" width="120" height="50" rx="6" fill="#3b82f6" opacity="0.8" />
  <text x="120" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">dns-prefetch</text>
  <text x="120" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">During HTML parse</text>
  
  <!-- preconnect -->
  <rect x="200" y="160" width="120" height="50" rx="6" fill="#22c55e" opacity="0.8" />
  <text x="260" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">preconnect</text>
  <text x="260" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Early in page load</text>
  
  <!-- preload -->
  <rect x="340" y="160" width="120" height="50" rx="6" fill="#ef4444" opacity="0.8" />
  <text x="400" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">preload</text>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">Immediately (high priority)</text>
  
  <!-- prefetch -->
  <rect x="500" y="160" width="120" height="50" rx="6" fill="#f59e0b" opacity="0.8" />
  <text x="560" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff">prefetch</text>
  <text x="560" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#475569">During idle time</text>
  
  <!-- Resource Discovery Flow (Bottom) -->
  <rect x="50" y="260" width="750" height="170" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  <text x="425" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Resource Discovery: With vs Without Hints</text>
  
  <!-- Without Hints -->
  <text x="80" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#dc2626">Without Hints:</text>
  <line x1="80" y1="345" x2="400" y2="345" stroke="#cbd5e1" stroke-width="2" />
  <rect x="80" y="335" width="80" height="20" rx="3" fill="#3b82f6" />
  <text x="120" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#ffffff">HTML</text>
  <line x1="160" y1="345" x2="180" y2="345" stroke="#475569" stroke-dasharray="4,3" />
  <rect x="180" y="335" width="70" height="20" rx="3" fill="#ef4444" />
  <text x="215" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#ffffff">Discover</text>
  <line x1="250" y1="345" x2="270" y2="345" stroke="#475569" stroke-dasharray="4,3" />
  <rect x="270" y="335" width="80" height="20" rx="3" fill="#f59e0b" />
  <text x="310" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#ffffff">Download</text>
  <line x1="350" y1="345" x2="370" y2="345" stroke="#475569" stroke-dasharray="4,3" />
  <rect x="370" y="335" width="60" height="20" rx="3" fill="#22c55e" />
  <text x="400" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#ffffff">Use</text>
  <text x="430" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#dc2626">Late discovery = delay</text>
  
  <!-- With Hints -->
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#16a34a">With Hints:</text>
  <line x1="80" y1="410" x2="400" y2="410" stroke="#cbd5e1" stroke-width="2" />
  <rect x="80" y="400" width="80" height="20" rx="3" fill="#3b82f6" />
  <text x="120" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#ffffff">HTML</text>
  <rect x="160" y="400" width="90" height="20" rx="3" fill="#ef4444" opacity="0.6" />
  <text x="205" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#475569">Preloaded</text>
  <line x1="250" y1="410" x2="270" y2="410" stroke="#475569" stroke-dasharray="4,3" />
  <rect x="270" y="400" width="60" height="20" rx="3" fill="#22c55e" />
  <text x="300" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#ffffff">Ready</text>
  <line x1="330" y1="410" x2="350" y2="410" stroke="#475569" stroke-dasharray="4,3" />
  <rect x="350" y="400" width="50" height="20" rx="3" fill="#22c55e" />
  <text x="375" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#ffffff">Use</text>
  <text x="430" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#16a34a">Early hint = instant</text>
  
  <!-- Key Insight -->
  <rect x="450" y="320" width="330" height="100" rx="6" fill="#f0fdf4" stroke="#22c55e" />
  <text x="615" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#16a34a">Key Insight</text>
  <text x="615" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">Without hints: discover → wait → download</text>
  <text x="615" y="405" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">With hints: hint → download early → ready</text>
</svg>
