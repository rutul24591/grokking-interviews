<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: var(--bg-primary, #ffffff); }
      .card { fill: var(--bg-panel, #f8fafc); }
      .text { fill: var(--text-primary, #1e293b); }
      .text-muted { fill: var(--text-muted, #64748b); }
      .border { stroke: var(--border-color, #e2e8f0); }
      .accent { fill: var(--accent-color, #3b82f6); }
      .success { fill: var(--success-color, #22c55e); }
      .warning { fill: var(--warning-color, #f59e0b); }
      .danger { fill: var(--danger-color, #ef4444); }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="text" font-size="18" font-weight="bold">Core Web Vitals Overview</text>
  
  <!-- LCP Card -->
  <rect x="40" y="60" width="220" height="140" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="150" y="85" text-anchor="middle" class="text" font-size="16" font-weight="bold">LCP</text>
  <text x="150" y="105" text-anchor="middle" class="text-muted" font-size="12">Largest Contentful Paint</text>
  <text x="150" y="125" text-anchor="middle" class="text" font-size="11">Loading Performance</text>
  
  <rect x="60" y="135" width="180" height="8" class="success" rx="2"/>
  <text x="70" y="155" class="text" font-size="10">Good: ≤2.5s</text>
  
  <rect x="60" y="165" width="180" height="8" class="warning" rx="2"/>
  <text x="70" y="185" class="text" font-size="10">Needs Improvement: 2.5-4s</text>
  
  <rect x="60" y="195" width="180" height="8" class="danger" rx="2"/>
  <text x="70" y="215" class="text" font-size="10">Poor: &gt;4s</text>
  
  <!-- INP Card -->
  <rect x="290" y="60" width="220" height="140" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="400" y="85" text-anchor="middle" class="text" font-size="16" font-weight="bold">INP</text>
  <text x="400" y="105" text-anchor="middle" class="text-muted" font-size="12">Interaction to Next Paint</text>
  <text x="400" y="125" text-anchor="middle" class="text" font-size="11">Interactivity</text>
  
  <rect x="310" y="135" width="180" height="8" class="success" rx="2"/>
  <text x="320" y="155" class="text" font-size="10">Good: ≤200ms</text>
  
  <rect x="310" y="165" width="180" height="8" class="warning" rx="2"/>
  <text x="320" y="185" class="text" font-size="10">Needs Improvement: 200-500ms</text>
  
  <rect x="310" y="195" width="180" height="8" class="danger" rx="2"/>
  <text x="320" y="215" class="text" font-size="10">Poor: &gt;500ms</text>
  
  <!-- CLS Card -->
  <rect x="540" y="60" width="220" height="140" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="650" y="85" text-anchor="middle" class="text" font-size="16" font-weight="bold">CLS</text>
  <text x="650" y="105" text-anchor="middle" class="text-muted" font-size="12">Cumulative Layout Shift</text>
  <text x="650" y="125" text-anchor="middle" class="text" font-size="11">Visual Stability</text>
  
  <rect x="560" y="135" width="180" height="8" class="success" rx="2"/>
  <text x="570" y="155" class="text" font-size="10">Good: ≤0.1</text>
  
  <rect x="560" y="165" width="180" height="8" class="warning" rx="2"/>
  <text x="570" y="185" class="text" font-size="10">Needs Improvement: 0.1-0.25</text>
  
  <rect x="560" y="195" width="180" height="8" class="danger" rx="2"/>
  <text x="570" y="215" class="text" font-size="10">Poor: &gt;0.25</text>
  
  <!-- User Experience Pillars -->
  <rect x="40" y="230" width="720" height="80" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="400" y="255" text-anchor="middle" class="text" font-size="14" font-weight="bold">Three Pillars of User Experience</text>
  
  <text x="150" y="280" text-anchor="middle" class="text" font-size="12">How quickly does content load?</text>
  <text x="400" y="280" text-anchor="middle" class="text" font-size="12">How responsive is the page?</text>
  <text x="650" y="280" text-anchor="middle" class="text" font-size="12">How stable is the layout?</text>
  
  <text x="150" y="300" text-anchor="middle" class="text-muted" font-size="11">LCP measures perceived load time</text>
  <text x="400" y="300" text-anchor="middle" class="text-muted" font-size="11">INP measures interaction latency</text>
  <text x="650" y="300" text-anchor="middle" class="text-muted" font-size="11">CLS measures visual stability</text>
  
  <!-- SEO Impact -->
  <rect x="40" y="340" width="720" height="120" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" class="text" font-size="14" font-weight="bold">SEO &amp; Business Impact</text>
  
  <text x="200" y="395" class="text" font-size="12">• Direct Google ranking factor</text>
  <text x="200" y="415" class="text" font-size="12">• Affects search visibility</text>
  <text x="200" y="435" class="text" font-size="12">• Impacts conversion rates</text>
  
  <text x="500" y="395" class="text" font-size="12">• 100ms latency = 1% sales loss</text>
  <text x="500" y="415" class="text" font-size="12">• Poor CWV = 5-10% SEO penalty</text>
  <text x="500" y="435" class="text" font-size="12">• Better UX = higher engagement</text>
</svg>
