<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="esModuleTreeShakingTitle esModuleTreeShakingDesc">
  <title id="esModuleTreeShakingTitle">ES Modules vs CommonJS Tree Shaking</title>
  <desc id="esModuleTreeShakingDesc">Comparison showing why ES modules enable tree shaking while CommonJS does not</desc>
  
  <defs>
    <linearGradient id="comparisonBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="450" fill="url(#comparisonBg)" />
  
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b">ES Modules vs CommonJS: Tree Shaking Support</text>
  
  <!-- ES Modules (Left) -->
  <rect x="30" y="70" width="350" height="350" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2" />
  <rect x="30" y="70" width="350" height="50" rx="10" fill="#f0fdf4" />
  <text x="205" y="102" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#16a34a">ES Modules (✓ Tree-Shakeable)</text>
  
  <text x="45" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Static Analysis:</text>
  <text x="45" y="170" font-family="monospace" font-size="12" font-weight="400" fill="#16a34a">import</text>
  <text x="105" y="170" font-family="monospace" font-size="12" font-weight="400" fill="#1e293b">{ map, filter } from 'lodash-es';</text>
  
  <text x="45" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">
    <tspan font-weight="600" fill="#1e293b">Why it works:</tspan> Import/export structure is fixed at build time.
  </text>
  <text x="45" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">
    Bundler can statically analyze which exports are used.
  </text>
  
  <rect x="45" y="255" width="320" height="80" rx="6" fill="#f1f5f9" />
  <text x="60" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Build-Time Analysis:</text>
  <text x="60" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">1. Parse all import/export statements</text>
  <text x="60" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">2. Build dependency graph</text>
  <text x="60" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">3. Mark unused exports for removal</text>
  
  <rect x="45" y="355" width="320" height="55" rx="4" fill="#dcfce7" stroke="#22c55e" />
  <text x="205" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#166534">Result: Only map() + filter() included (~4KB)</text>
  
  <!-- CommonJS (Right) -->
  <rect x="420" y="70" width="350" height="350" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2" />
  <rect x="420" y="70" width="350" height="50" rx="10" fill="#fef2f2" />
  <text x="595" y="102" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#dc2626">CommonJS (✗ NOT Tree-Shakeable)</text>
  
  <text x="435" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Dynamic Resolution:</text>
  <text x="435" y="170" font-family="monospace" font-size="12" font-weight="400" fill="#dc2626">const</text>
  <text x="485" y="170" font-family="monospace" font-size="12" font-weight="400" fill="#1e293b">{ map, filter } = require('lodash');</text>
  
  <text x="435" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">
    <tspan font-weight="600" fill="#1e293b">Why it fails:</tspan> require() is a runtime function call.
  </text>
  <text x="435" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">
    Bundler cannot determine which exports are used at build time.
  </text>
  
  <rect x="435" y="255" width="320" height="80" rx="6" fill="#f1f5f9" />
  <text x="450" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Runtime Behavior:</text>
  <text x="450" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">1. require() executes at runtime</text>
  <text x="450" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">2. Returns entire module exports object</text>
  <text x="450" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#475569">3. Destructuring happens after load</text>
  
  <rect x="435" y="355" width="320" height="55" rx="4" fill="#fee2e2" stroke="#ef4444" />
  <text x="595" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#991b1b">Result: Entire lodash included (~70KB)</text>
  
  <!-- Bottom Summary -->
  <rect x="30" y="430" width="740" height="15" rx="3" fill="#f1f5f9" />
  <text x="400" y="441" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#64748b">Key Insight: ES modules are statically analyzable; CommonJS is dynamic</text>
</svg>
