<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" role="img" aria-labelledby="lazyLoadingPerformanceTitle lazyLoadingPerformanceDesc">
  <title id="lazyLoadingPerformanceTitle">Lazy Loading Performance Impact</title>
  <desc id="lazyLoadingPerformanceDesc">Comparison chart showing performance metrics with and without lazy loading for images and components</desc>
  
  <defs>
    <linearGradient id="perfBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="850" height="450" fill="url(#perfBg)" />
  
  <text x="425" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1e293b">Lazy Loading: Performance Impact</text>
  
  <!-- Without Lazy Loading (Left) -->
  <rect x="40" y="60" width="360" height="360" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2" />
  <rect x="40" y="60" width="360" height="50" rx="10" fill="#fef2f2" />
  <text x="220" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#dc2626">Without Lazy Loading</text>
  
  <!-- Initial load visualization -->
  <rect x="60" y="125" width="320" height="40" rx="4" fill="#ef4444" />
  <text x="220" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Initial Load: 2.4 MB (All images)</text>
  
  <text x="60" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Timeline:</text>
  
  <rect x="60" y="215" width="280" height="25" rx="3" fill="#fca5a5" />
  <text x="200" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#7f1d1d">0-3s: Download all images</text>
  
  <rect x="60" y="245" width="200" height="25" rx="3" fill="#fca5a5" />
  <text x="160" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#7f1d1d">3-5s: Parse &amp; render</text>
  
  <rect x="60" y="275" width="150" height="25" rx="3" fill="#86efac" />
  <text x="135" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#166534">5s+: Interactive</text>
  
  <text x="60" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Metrics:</text>
  <text x="60" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• LCP: 4.8s (Poor)</text>
  <text x="60" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• TTI: 5.2s (Poor)</text>
  <text x="60" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• Data wasted: 1.8 MB (unused images)</text>
  
  <!-- With Lazy Loading (Right) -->
  <rect x="450" y="60" width="360" height="360" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2" />
  <rect x="450" y="60" width="360" height="50" rx="10" fill="#f0fdf4" />
  <text x="630" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#16a34a">With Lazy Loading</text>
  
  <!-- Initial load visualization -->
  <rect x="470" y="125" width="320" height="40" rx="4" fill="#22c55e" />
  <text x="630" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Initial Load: 450 KB (Above-fold only)</text>
  
  <text x="470" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Timeline:</text>
  
  <rect x="470" y="215" width="120" height="25" rx="3" fill="#86efac" />
  <text x="530" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#166534">0-0.8s: Initial</text>
  
  <rect x="470" y="245" width="100" height="25" rx="3" fill="#86efac" />
  <text x="520" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#166534">0.8s: Ready</text>
  
  <rect x="470" y="275" width="180" height="25" rx="3" fill="#fde047" />
  <text x="560" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#854d0e">Scroll: Load on demand</text>
  
  <text x="470" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Metrics:</text>
  <text x="470" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• LCP: 1.2s (Good) ✓</text>
  <text x="470" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• TTI: 1.5s (Good) ✓</text>
  <text x="470" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">• Data saved: 82% reduction</text>
  
  <!-- Improvement arrow -->
  <path d="M 420 240 L 445 240" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowhead)" />
</svg>
