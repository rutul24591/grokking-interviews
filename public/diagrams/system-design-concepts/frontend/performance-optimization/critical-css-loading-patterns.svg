<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#ffffff" width="800" height="500" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="bold">Critical CSS Loading Patterns</text>
  
  <!-- Pattern 1: Inline -->
  <rect x="40" y="70" width="220" height="140" fill="#f8fafc" rx="6" stroke="#22c55e" stroke-width="2"/>
  <text x="150" y="100" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">1. Inline Critical CSS</text>
  
  <rect x="60" y="115" width="180" height="80" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="135" fill="#64748b" font-size="9">&lt;html&gt;</text>
  <text x="70" y="150" fill="#64748b" font-size="9">  &lt;head&gt;</text>
  <text x="70" y="165" fill="#22c55e" font-size="9">    &lt;style&gt;/* Critical CSS */}&lt;/style&gt;</text>
  <text x="70" y="180" fill="#64748b" font-size="9">  &lt;/head&gt;</text>
  
  <text x="150" y="220" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">No extra request</text>
  <text x="150" y="240" text-anchor="middle" fill="#64748b" font-size="9">Best FCP, +5-30KB HTML</text>
  
  <!-- Pattern 2: Preload -->
  <rect x="290" y="70" width="220" height="140" fill="#f8fafc" rx="6" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">2. Preload Non-Critical</text>
  
  <rect x="310" y="115" width="180" height="80" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="135" fill="#3b82f6" font-size="9">&lt;link rel="preload" href="css.css" as="style"&gt;</text>
  <text x="320" y="150" fill="#3b82f6" font-size="9">&lt;link rel="stylesheet" href="css.css" media="print" onload="this.media='all'"&gt;</text>
  <text x="320" y="170" fill="#64748b" font-size="9">&lt;noscript&gt;&lt;link rel="stylesheet" href="css.css"&gt;&lt;/noscript&gt;</text>
  
  <text x="400" y="220" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Async loading</text>
  <text x="400" y="240" text-anchor="middle" fill="#64748b" font-size="9">High priority download</text>
  
  <!-- Pattern 3: Media Query -->
  <rect x="540" y="70" width="220" height="140" fill="#f8fafc" rx="6" stroke="#3b82f6" stroke-width="2"/>
  <text x="650" y="100" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">3. Media Query Trick</text>
  
  <rect x="560" y="115" width="180" height="80" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="570" y="135" fill="#64748b" font-size="9">&lt;link rel="stylesheet" href="css.css" media="print" onload="this.media='all'"&gt;</text>
  <text x="570" y="155" fill="#64748b" font-size="9">Browser doesn't block for print media</text>
  <text x="570" y="175" fill="#64748b" font-size="9">Changes to 'all' after load</text>
  
  <text x="650" y="220" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Simple implementation</text>
  <text x="650" y="240" text-anchor="middle" fill="#64748b" font-size="9">No JavaScript needed</text>
  
  <!-- Pattern 4: JS Injection -->
  <rect x="40" y="240" width="220" height="140" fill="#f8fafc" rx="6" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="270" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">4. JavaScript Injection</text>
  
  <rect x="60" y="285" width="180" height="80" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="305" fill="#64748b" font-size="9">window.addEventListener('load', () =&gt; {</text>
  <text x="70" y="320" fill="#64748b" font-size="9">  const link = document.createElement('link');</text>
  <text x="70" y="335" fill="#64748b" font-size="9">  link.rel = 'stylesheet';</text>
  <text x="70" y="350" fill="#64748b" font-size="9">  link.href = 'non-critical.css';</text>
  <text x="70" y="365" fill="#64748b" font-size="9">  document.head.appendChild(link);</text>
  <text x="70" y="380" fill="#64748b" font-size="9">});</text>
  
  <text x="150" y="390" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Full control</text>
  <text x="150" y="410" text-anchor="middle" fill="#64748b" font-size="9">Requires JavaScript</text>
  
  <!-- Comparison Table -->
  <rect x="290" y="240" width="470" height="140" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="525" y="270" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Pattern Comparison</text>
  
  <text x="310" y="295" fill="#1e293b" font-size="10" font-weight="bold">Pattern</text>
  <text x="400" y="295" fill="#1e293b" font-size="10" font-weight="bold">FCP</text>
  <text x="480" y="295" fill="#1e293b" font-size="10" font-weight="bold">Complexity</text>
  <text x="580" y="295" fill="#1e293b" font-size="10" font-weight="bold">Use Case</text>
  
  <text x="310" y="315" fill="#64748b" font-size="9">Inline</text>
  <text x="400" y="315" fill="#22c55e" font-size="9">Best</text>
  <text x="480" y="315" fill="#64748b" font-size="9">Low</text>
  <text x="580" y="315" fill="#64748b" font-size="9">Most sites</text>
  
  <text x="310" y="335" fill="#64748b" font-size="9">Preload</text>
  <text x="400" y="335" fill="#22c55e" font-size="9">Best</text>
  <text x="480" y="335" fill="#64748b" font-size="9">Medium</text>
  <text x="580" y="335" fill="#64748b" font-size="9">Recommended</text>
  
  <text x="310" y="355" fill="#64748b" font-size="9">Media Query</text>
  <text x="400" y="355" fill="#1e293b" font-size="9">Good</text>
  <text x="480" y="355" fill="#64748b" font-size="9">Low</text>
  <text x="580" y="355" fill="#64748b" font-size="9">Simple sites</text>
  
  <text x="310" y="375" fill="#64748b" font-size="9">JS Injection</text>
  <text x="400" y="375" fill="#1e293b" font-size="9">Good</text>
  <text x="480" y="375" fill="#64748b" font-size="9">High</text>
  <text x="580" y="375" fill="#64748b" font-size="9">Custom timing</text>
  
  <!-- Key Insight -->
  <rect x="180" y="395" width="440" height="80" fill="#f8fafc" rx="6" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="425" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">Recommended Pattern</text>
  <text x="400" y="445" text-anchor="middle" fill="#64748b" font-size="10">Inline critical CSS + preload non-critical with onload</text>
  <text x="400" y="465" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">Best FCP + async loading for remaining CSS</text>
</svg>