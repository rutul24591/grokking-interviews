<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="bold">Performance Metrics Timeline</text>
  
  <!-- Timeline Arrow -->
  <line x1="60" y1="100" x2="740" y2="100" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <polygon points="740,100 735,97 735,103" fill="#3b82f6"/>
  
  <!-- TTFB Marker -->
  <circle cx="80" cy="100" r="8" fill="#3b82f6"/>
  <text x="80" y="130" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">TTFB</text>
  <text x="80" y="145" text-anchor="middle" fill="#64748b" font-size="9">Time to First Byte</text>
  <text x="80" y="160" text-anchor="middle" fill="#1e293b" font-size="9">≤800ms</text>
  <rect x="50" y="170" width="60" height="50" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="80" y="190" text-anchor="middle" fill="#64748b" font-size="8">Server +</text>
  <text x="80" y="205" text-anchor="middle" fill="#64748b" font-size="8">Network</text>
  
  <!-- FCP Marker -->
  <circle cx="180" cy="100" r="8" fill="#3b82f6"/>
  <text x="180" y="130" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">FCP</text>
  <text x="180" y="145" text-anchor="middle" fill="#64748b" font-size="9">First Contentful</text>
  <text x="180" y="160" text-anchor="middle" fill="#1e293b" font-size="9">≤1.8s</text>
  <rect x="150" y="170" width="60" height="50" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="180" y="190" text-anchor="middle" fill="#64748b" font-size="8">First text</text>
  <text x="180" y="205" text-anchor="middle" fill="#64748b" font-size="8">or image</text>
  
  <!-- LCP Marker -->
  <circle cx="320" cy="100" r="8" fill="#3b82f6"/>
  <text x="320" y="130" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">LCP</text>
  <text x="320" y="145" text-anchor="middle" fill="#64748b" font-size="9">Largest Contentful</text>
  <text x="320" y="160" text-anchor="middle" fill="#1e293b" font-size="9">≤2.5s</text>
  <rect x="290" y="170" width="60" height="50" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="190" text-anchor="middle" fill="#64748b" font-size="8">Largest</text>
  <text x="320" y="205" text-anchor="middle" fill="#64748b" font-size="8">element</text>
  
  <!-- TBT Region -->
  <rect x="180" y="240" width="200" height="60" fill="#f8fafc" rx="4" stroke="#f59e0b" stroke-width="2"/>
  <text x="280" y="265" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">TBT Region</text>
  <text x="280" y="285" text-anchor="middle" fill="#64748b" font-size="9">Total Blocking Time</text>
  <text x="280" y="300" text-anchor="middle" fill="#1e293b" font-size="9">≤200ms (sum of long tasks)</text>
  
  <!-- TTI Marker -->
  <circle cx="500" cy="100" r="8" fill="#3b82f6"/>
  <text x="500" y="130" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">TTI</text>
  <text x="500" y="145" text-anchor="middle" fill="#64748b" font-size="9">Time to Interactive</text>
  <text x="500" y="160" text-anchor="middle" fill="#1e293b" font-size="9">≤3.8s</text>
  <rect x="470" y="170" width="60" height="50" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="190" text-anchor="middle" fill="#64748b" font-size="8">Fully</text>
  <text x="500" y="205" text-anchor="middle" fill="#64748b" font-size="8">interactive</text>
  
  <!-- INP Note -->
  <rect x="580" y="240" width="180" height="60" fill="#f8fafc" rx="4" stroke="#3b82f6" stroke-width="2"/>
  <text x="670" y="265" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold">INP (separate)</text>
  <text x="670" y="285" text-anchor="middle" fill="#64748b" font-size="9">Interaction to Next Paint</text>
  <text x="670" y="300" text-anchor="middle" fill="#1e293b" font-size="9">≤200ms (measured throughout session)</text>
  
  <!-- Metric Categories -->
  <rect x="60" y="340" width="680" height="120" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Metric Categories</text>
  
  <!-- Loading Metrics -->
  <rect x="80" y="380" width="200" height="60" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="180" y="405" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Loading Metrics</text>
  <text x="180" y="425" text-anchor="middle" fill="#64748b" font-size="9">TTFB → FCP → LCP</text>
  
  <!-- Interactivity Metrics -->
  <rect x="300" y="380" width="200" height="60" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="405" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Interactivity Metrics</text>
  <text x="400" y="425" text-anchor="middle" fill="#64748b" font-size="9">TBT, TTI, INP</text>
  
  <!-- Stability Metrics -->
  <rect x="520" y="380" width="200" height="60" fill="#f8fafc" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="620" y="405" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Stability Metrics</text>
  <text x="620" y="425" text-anchor="middle" fill="#64748b" font-size="9">CLS (Cumulative Layout Shift)</text>
  
  <!-- Key Insight -->
  <rect x="180" y="470" width="440" height="25" fill="#f8fafc" rx="4" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="488" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold">Optimize in order: TTFB first, then FCP/LCP, then TBT/TTI, while monitoring CLS</text>
</svg>