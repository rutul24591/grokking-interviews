<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: var(--bg-primary, #ffffff); }
      .card { fill: var(--bg-panel, #f8fafc); }
      .text { fill: var(--text-primary, #1e293b); }
      .text-muted { fill: var(--text-muted, #64748b); }
      .border { stroke: var(--border-color, #e2e8f0); }
      .accent { fill: var(--accent-color, #3b82f6); }
      .success { fill: var(--success-color, #22c55e); }
      .warning { fill: var(--warning-color, #f59e0b); }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="800" height="500" rx="8"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="text" font-size="18" font-weight="bold">Lazy Loading Placeholder Strategies</text>
  
  <!-- Skeleton Screen -->
  <rect x="40" y="70" width="220" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="150" y="100" text-anchor="middle" class="text" font-size="13" font-weight="bold">Skeleton Screen</text>
  
  <rect x="60" y="120" width="180" height="12" class="border" rx="2" stroke-width="1"/>
  <rect x="60" y="140" width="160" height="12" class="border" rx="2" stroke-width="1"/>
  <rect x="60" y="160" width="180" height="12" class="border" rx="2" stroke-width="1"/>
  <rect x="60" y="180" width="140" height="12" class="border" rx="2" stroke-width="1"/>
  <rect x="60" y="200" width="100" height="30" class="border" rx="2" stroke-width="1"/>
  
  <text x="150" y="240" text-anchor="middle" class="success" font-size="11" font-weight="bold">✓ Sets accurate expectations</text>
  <text x="150" y="260" text-anchor="middle" class="success" font-size="11" font-weight="bold">✓ Feels faster than spinners</text>
  <text x="150" y="280" text-anchor="middle" class="text-muted" font-size="10">Used by: Facebook, LinkedIn, YouTube</text>
  
  <!-- Blur-Up Placeholder -->
  <rect x="290" y="70" width="220" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="400" y="100" text-anchor="middle" class="text" font-size="13" font-weight="bold">Blur-Up Placeholder</text>
  
  <rect x="310" y="120" width="180" height="120" class="card" rx="4" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="400" y="185" text-anchor="middle" class="text-muted" font-size="20" font-weight="bold" style="filter: blur(8px);">Image</text>
  
  <text x="400" y="240" text-anchor="middle" class="success" font-size="11" font-weight="bold">✓ Progressive enhancement</text>
  <text x="400" y="260" text-anchor="middle" class="success" font-size="11" font-weight="bold">✓ Visually appealing</text>
  <text x="400" y="280" text-anchor="middle" class="text-muted" font-size="10">Used by: Medium, Pinterest</text>
  
  <!-- Color Placeholder -->
  <rect x="540" y="70" width="220" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="650" y="100" text-anchor="middle" class="text" font-size="13" font-weight="bold">Color Placeholder</text>
  
  <rect x="560" y="120" width="180" height="120" class="card" rx="4" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <rect x="560" y="120" width="180" height="120" class="accent" opacity="0.3" rx="4"/>
  <text x="650" y="185" text-anchor="middle" class="text-muted" font-size="11">Dominant color</text>
  
  <text x="650" y="240" text-anchor="middle" class="success" font-size="11" font-weight="bold">✓ Tiny payload</text>
  <text x="650" y="260" text-anchor="middle" class="success" font-size="11" font-weight="bold">✓ Simple implementation</text>
  <text x="650" y="280" text-anchor="middle" class="text-muted" font-size="10">Used by: Instagram, Unsplash</text>
  
  <!-- Empty Space -->
  <rect x="40" y="280" width="220" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="150" y="310" text-anchor="middle" class="text" font-size="13" font-weight="bold">Content-Sized Empty Space</text>
  
  <rect x="60" y="330" width="180" height="120" class="card" rx="4" stroke="var(--border-color, #e2e8f0)" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="150" y="395" text-anchor="middle" class="text-muted" font-size="10">Reserved space</text>
  <text x="150" y="410" text-anchor="middle" class="text-muted" font-size="10">(aspect-ratio)</text>
  
  <text x="150" y="440" text-anchor="middle" class="success" font-size="11" font-weight="bold">✓ Simplest</text>
  <text x="150" y="460" text-anchor="middle" class="warning" font-size="11" font-weight="bold">~ Users see blank space</text>
  
  <!-- Comparison Table -->
  <rect x="290" y="280" width="470" height="180" class="card" rx="6" stroke="var(--border-color, #e2e8f0)" stroke-width="1"/>
  <text x="525" y="310" text-anchor="middle" class="text" font-size="13" font-weight="bold">Strategy Comparison</text>
  
  <table x="310" y="320" width="430" height="130">
    <thead>
      <tr>
        <th x="310" y="335" class="text" font-size="10" font-weight="bold">Strategy</th>
        <th x="400" y="335" class="text" font-size="10" font-weight="bold">Payload</th>
        <th x="480" y="335" class="text" font-size="10" font-weight="bold">UX</th>
        <th x="580" y="335" class="text" font-size="10" font-weight="bold">Complexity</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td x="310" y="355" class="text-muted" font-size="9">Skeleton</td>
        <td x="400" y="355" class="text-muted" font-size="9">Medium</td>
        <td x="480" y="355" class="success" font-size="9">Excellent</td>
        <td x="580" y="355" class="text-muted" font-size="9">Medium</td>
      </tr>
      <tr>
        <td x="310" y="375" class="text-muted" font-size="9">Blur-Up</td>
        <td x="400" y="375" class="text-muted" font-size="9">Small</td>
        <td x="480" y="375" class="success" font-size="9">Excellent</td>
        <td x="580" y="375" class="warning" font-size="9">High</td>
      </tr>
      <tr>
        <td x="310" y="395" class="text-muted" font-size="9">Color</td>
        <td x="400" y="395" class="text-muted" font-size="9">Tiny</td>
        <td x="480" y="395" class="warning" font-size="9">Good</td>
        <td x="580" y="395" class="success" font-size="9">Low</td>
      </tr>
      <tr>
        <td x="310" y="415" class="text-muted" font-size="9">Empty</td>
        <td x="400" y="415" class="text-muted" font-size="9">None</td>
        <td x="480" y="415" class="warning" font-size="9">Fair</td>
        <td x="580" y="415" class="success" font-size="9">Lowest</td>
      </tr>
    </tbody>
  </table>
  
  <!-- Key Insight -->
  <rect x="180" y="470" width="440" height="25" class="card" rx="4" stroke="var(--accent-color, #3b82f6)" stroke-width="2"/>
  <text x="400" y="488" text-anchor="middle" class="accent" font-size="11" font-weight="bold">Key: Always reserve space to prevent CLS, regardless of placeholder type</text>
</svg>
