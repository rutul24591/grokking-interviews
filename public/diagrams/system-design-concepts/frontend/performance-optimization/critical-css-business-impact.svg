<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect fill="#ffffff" width="800" height="500" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="bold">Business Impact of Critical CSS</text>
  
  <!-- E-commerce Case Study -->
  <rect x="40" y="70" width="340" height="180" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="100" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">E-commerce: FCP Improvement</text>
  <text x="60" y="130" fill="#64748b" font-size="11">Critical CSS implementation:</text>
  <text x="60" y="155" fill="#22c55e" font-size="12" font-weight="bold">FCP: 2.8s -&gt; 1.2s</text>
  <text x="60" y="175" fill="#22c55e" font-size="12" font-weight="bold">Bounce rate: -12%</text>
  <text x="60" y="195" fill="#22c55e" font-size="12" font-weight="bold">Conversion: +8%</text>
  <text x="60" y="225" fill="#1e293b" font-size="10" font-weight="bold">What they did:</text>
  <text x="60" y="240" fill="#64748b" font-size="9">Penthouse extraction per template</text>
  <text x="60" y="255" fill="#64748b" font-size="9">18KB critical CSS inlined</text>
  
  <!-- News/Media Case Study -->
  <rect x="420" y="70" width="340" height="180" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="100" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">News/Media: Above-the-Fold</text>
  <text x="440" y="130" fill="#64748b" font-size="11">Mobile optimization:</text>
  <text x="440" y="155" fill="#22c55e" font-size="12" font-weight="bold">First paint: 60% faster</text>
  <text x="440" y="175" fill="#22c55e" font-size="12" font-weight="bold">Engagement: +15%</text>
  <text x="440" y="210" fill="#1e293b" font-size="10" font-weight="bold">What they did:</text>
  <text x="440" y="225" fill="#64748b" font-size="9">Critical CSS for article templates</text>
  <text x="440" y="240" fill="#64748b" font-size="9">Deferred ad CSS</text>
  
  <!-- SaaS Case Study -->
  <rect x="40" y="280" width="340" height="180" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="310" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">SaaS: SSR Critical CSS</text>
  <text x="60" y="340" fill="#64748b" font-size="11">Server-side rendering:</text>
  <text x="60" y="365" fill="#22c55e" font-size="12" font-weight="bold">FCP: 3.2s -&gt; 1.4s</text>
  <text x="60" y="385" fill="#22c55e" font-size="12" font-weight="bold">Onboarding: +20%</text>
  <text x="60" y="420" fill="#1e293b" font-size="10" font-weight="bold">What they did:</text>
  <text x="60" y="435" fill="#64748b" font-size="9">styled-components ServerStyleSheet</text>
  <text x="60" y="450" fill="#64748b" font-size="9">Collected styles during SSR</text>
  
  <!-- Blog Case Study -->
  <rect x="420" y="280" width="340" height="180" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="590" y="310" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Blog: Static Site</text>
  <text x="440" y="340" fill="#64748b" font-size="11">Static site generation:</text>
  <text x="440" y="365" fill="#22c55e" font-size="12" font-weight="bold">Lighthouse: 75 -&gt; 95</text>
  <text x="440" y="385" fill="#22c55e" font-size="12" font-weight="bold">SEO rankings: Improved</text>
  <text x="440" y="420" fill="#1e293b" font-size="10" font-weight="bold">What they did:</text>
  <text x="440" y="435" fill="#64748b" font-size="9">critical npm package during SSG</text>
  <text x="440" y="450" fill="#64748b" font-size="9">Per-page critical CSS extraction</text>
  
  <!-- Key Insight -->
  <rect x="180" y="470" width="440" height="25" fill="#f8fafc" rx="4" stroke="#3b82f6" stroke-width="2"/>
  <text x="400" y="488" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold">Critical CSS reduces FCP 40-60% -&gt; better engagement and conversions</text>
</svg>