<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">OAuth Token Lifecycle and Refresh Flow</text>
  
  <!-- Token Storage -->
  <rect x="50" y="80" width="250" height="200" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="175" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Token Storage</text>
  
  <rect x="70" y="135" width="210" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="175" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Access Token</text>
  <text x="175" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Lifetime: 15-60 min</text>
  
  <rect x="70" y="200" width="210" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="175" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Refresh Token</text>
  <text x="175" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Lifetime: days-weeks</text>
  
  <!-- Arrow to API -->
  <line x1="300" y1="162" x2="380" y2="162" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="340" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" font-weight="600">API Request</text>
  
  <!-- API Gateway -->
  <rect x="390" y="80" width="250" height="200" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="515" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">API Gateway</text>
  
  <rect x="410" y="135" width="210" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="515" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Validate Access Token</text>
  <text x="515" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Signature + Expiry</text>
  
  <!-- Decision diamond -->
  <path d="M 465 210 L 515 235 L 565 210 L 515 185 Z" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="515" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#92400e">Valid?</text>
  
  <!-- Valid path -->
  <line x1="565" y1="210" x2="620" y2="210" stroke="#10b981" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  <text x="590" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#10b981" font-weight="600">Yes</text>
  
  <!-- Expired path -->
  <line x1="515" y1="235" x2="515" y2="300" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="535" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" font-weight="600">No (Expired)</text>
  
  <!-- Backend API -->
  <rect x="630" y="80" width="220" height="200" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="740" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Backend API</text>
  
  <rect x="650" y="135" width="180" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="740" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Process Request</text>
  <text x="740" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Return data</text>
  
  <!-- Refresh Token Flow -->
  <rect x="390" y="320" width="250" height="210" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="515" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Refresh Token Flow</text>
  
  <rect x="410" y="370" width="210" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="515" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">1. Send Refresh Token</text>
  <text x="515" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">POST /oauth/token</text>
  
  <!-- Arrow to Auth Server -->
  <line x1="640" y1="395" x2="700" y2="395" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow4)"/>
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>
  
  <!-- Auth Server -->
  <rect x="710" y="320" width="140" height="210" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="780" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#3730a3">Auth Server</text>
  
  <rect x="725" y="370" width="110" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="780" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1e293b">2. Validate</text>
  <text x="780" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">Check revocation</text>
  
  <!-- Arrow back -->
  <line x1="710" y1="440" x2="640" y2="440" stroke="#10b981" stroke-width="2" marker-end="url(#arrow5)"/>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  
  <rect x="410" y="420" width="210" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="515" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">3. New Token Pair</text>
  <text x="515" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">access + refresh token</text>
  
  <!-- Security notes -->
  <rect x="50" y="300" width="250" height="230" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="175" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Security Best Practices</text>
  
  <rect x="70" y="350" width="210" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="175" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" font-weight="600">⚠ Short access token lifetime</text>
  
  <rect x="70" y="400" width="210" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="175" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" font-weight="600">⚠ Rotate refresh tokens</text>
  
  <rect x="70" y="450" width="210" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="175" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" font-weight="600">⚠ Revoke on logout</text>
  
  <rect x="70" y="500" width="210" height="25" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="175" y="518" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e" font-weight="600">⚠ Detect token reuse</text>
  
  <!-- Bottom note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Silent refresh: Refresh token before access token expires to maintain seamless session</text>
</svg>
