<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>
  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Payment UI Trade-offs (UX vs PCI vs Risk)
  </text>

  <rect x="70" y="85" width="760" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="110" y="130" width="320" height="140" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="270" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Hosted Page</text>
  <text x="270" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">lower PCI scope</text>
  <text x="270" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">vendor-managed UI</text>
  <text x="270" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">cost: redirects</text>

  <rect x="470" y="130" width="320" height="140" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="630" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Embedded Components</text>
  <text x="630" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">best conversion UX</text>
  <text x="630" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">more control</text>
  <text x="630" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">cost: 3P runtime surface</text>

  <rect x="110" y="305" width="680" height="110" rx="14" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="450" y="337" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Staff-level principle</text>
  <text x="450" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">
    Optimize conversion only after security boundaries and webhook-driven finality are correct.
  </text>
  <text x="450" y="384" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">
    Keep payment scripts on-demand and budgeted to avoid global performance regressions.
  </text>
</svg>

