  <text x="475" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Validation</text>
  <text x="475" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">allowlists</text>
  <text x="475" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">drop invalid</text>

