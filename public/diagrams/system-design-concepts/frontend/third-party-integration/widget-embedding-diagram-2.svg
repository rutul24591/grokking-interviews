<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Widget Embedding Trade-offs (Performance &amp; Risk)
  </text>

  <rect x="70" y="85" width="760" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Axes -->
  <line x1="140" y1="395" x2="780" y2="395" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="140" y1="135" x2="140" y2="395" stroke="#E2E8F0" stroke-width="2"/>
  <text x="460" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Integration depth / privilege</text>
  <text x="115" y="265" text-anchor="middle" transform="rotate(-90 115 265)" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">
    Isolation / blast radius reduction
  </text>

  <!-- Points -->
  <circle cx="260" cy="320" r="8" fill="#EC4899"/>
  <text x="260" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827">In-page</text>
  <text x="260" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">max risk</text>

  <circle cx="520" cy="240" r="8" fill="#3B82F6"/>
  <text x="520" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827">Same-origin iframe</text>
  <text x="520" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">medium</text>

  <circle cx="700" cy="170" r="8" fill="#10B981"/>
  <text x="700" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#111827">Cross-origin iframe</text>
  <text x="700" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">best boundary</text>

  <!-- Callout -->
  <rect x="170" y="110" width="630" height="70" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="485" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#111827">
    More integration usually means more performance and memory impact (listeners, timers, network) and more security exposure.
  </text>
  <text x="485" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">
    Isolation reduces blast radius, but requires explicit communication and sizing/theming strategies.
  </text>
</svg>

