<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>
  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Chat Loading Strategy (Performance Trade-offs)
  </text>

  <rect x="70" y="85" width="760" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="110" y="130" width="320" height="140" rx="14" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="270" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Always-on</text>
  <text x="270" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">instant chat</text>
  <text x="270" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">global CPU cost</text>
  <text x="270" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">global privacy surface</text>

  <rect x="470" y="130" width="320" height="140" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="630" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">On-demand</text>
  <text x="630" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">protect critical path</text>
  <text x="630" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">lower global risk</text>
  <text x="630" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">small open delay</text>

  <rect x="110" y="305" width="680" height="110" rx="14" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="450" y="337" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Recommendation</text>
  <text x="450" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">
    Default to on-demand loading with strong fallback UX; use always-on only with strict budgets and governance.
  </text>
  <text x="450" y="384" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">
    Make chat reversible via kill switch because vendor behavior can change without your deploy.
  </text>
</svg>

