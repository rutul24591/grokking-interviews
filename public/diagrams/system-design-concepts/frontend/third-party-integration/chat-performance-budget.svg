<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Chat Widget Performance Budget</text>
  
  <!-- Performance Metrics -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Performance Budgets</text>
  
  <!-- Load Time -->
  <rect x="70" y="135" width="360" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Widget Load Time</text>
  <text x="250" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#16a34a" font-weight="600">Target: &lt; 2 seconds</text>
  
  <!-- Bundle Size -->
  <rect x="70" y="220" width="360" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Bundle Size (gzipped)</text>
  <text x="250" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#16a34a" font-weight="600">Target: &lt; 150 KB</text>
  
  <!-- Memory -->
  <rect x="70" y="305" width="360" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Memory Usage</text>
  <text x="250" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#16a34a" font-weight="600">Target: &lt; 50 MB</text>
  
  <!-- CPU -->
  <rect x="70" y="390" width="360" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">CPU Impact</text>
  <text x="250" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#16a34a" font-weight="600">Target: &lt; 5% main thread</text>
  
  <!-- Loading Strategies -->
  <rect x="470" y="80" width="380" height="220" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Loading Strategies</text>
  
  <!-- Lazy Load -->
  <rect x="490" y="135" width="340" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Lazy Load on Interaction</text>
  <text x="660" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Load on button click, not page load</text>
  
  <!-- Preconnect -->
  <rect x="490" y="200" width="340" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Preconnect to Chat Domain</text>
  <text x="660" y="247" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Reduce connection latency</text>
  
  <!-- Defer -->
  <rect x="490" y="265" width="340" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Defer Until After LCP</text>
  <text x="660" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Don't block critical rendering</text>
  
  <!-- Monitoring -->
  <rect x="470" y="320" width="380" height="210" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Monitoring &amp; Kill Switch</text>
  
  <!-- Metrics to Track -->
  <rect x="490" y="370" width="340" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Track in Production</text>
  <text x="660" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Load time, error rate, memory</text>
  
  <!-- Kill Switch -->
  <rect x="490" y="455" width="340" height="60" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="660" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Remote Kill Switch</text>
  <text x="660" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Disable widget if issues detected</text>
  
  <!-- Bottom note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Key Principle: Set budgets | Monitor continuously | Have kill switch ready | Lazy load by default</text>
</svg>
