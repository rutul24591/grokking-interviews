<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Chat Widget Identity Handoff</text>
  
  <!-- Your App -->
  <rect x="50" y="80" width="250" height="450" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="175" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Your Application</text>
  
  <!-- User Info -->
  <rect x="70" y="140" width="210" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="175" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">User Identity</text>
  <text x="175" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">user_id, email, name</text>
  <text x="175" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">account_tier, locale</text>
  <text x="175" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">conversation_context</text>
  
  <!-- Generate Hash -->
  <rect x="70" y="260" width="210" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="175" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Generate Identity Hash</text>
  <text x="175" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">HMAC(user_id, secret)</text>
  <text x="175" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Prevents impersonation</text>
  
  <!-- Arrow to chat -->
  <line x1="280" y1="300" x2="350" y2="300" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="315" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" font-weight="600">Init Chat</text>
  
  <!-- Chat Widget -->
  <rect x="370" y="80" width="280" height="450" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="510" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Chat Widget</text>
  
  <!-- Receive Identity -->
  <rect x="390" y="140" width="240" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="510" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Receive Identity</text>
  <text x="510" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">user_id + hash</text>
  <text x="510" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">user attributes</text>
  
  <!-- Verify Hash -->
  <rect x="390" y="240" width="240" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="510" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Verify Hash</text>
  <text x="510" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Compare with backend</text>
  
  <!-- Arrow to backend -->
  <line x1="650" y1="275" x2="700" y2="275" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Chat Backend -->
  <rect x="720" y="80" width="130" height="450" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="785" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Chat Backend</text>
  
  <!-- Verify -->
  <rect x="735" y="140" width="100" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="785" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Verify</text>
  <text x="785" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">HMAC check</text>
  
  <!-- Arrow back -->
  <line x1="700" y1="300" x2="650" y2="300" stroke="#10b981" stroke-width="2" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  <text x="675" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#10b981" font-weight="600">Valid</text>
  
  <!-- Load History -->
  <rect x="390" y="330" width="240" height="70" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="510" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Load Conversation</text>
  <text x="510" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Previous messages</text>
  
  <!-- Ready -->
  <rect x="390" y="420" width="240" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="510" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Widget Ready</text>
  <text x="510" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Personalized greeting</text>
  
  <!-- Security Notes -->
  <rect x="50" y="540" width="400" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" font-weight="600">⚠ Never pass raw user tokens to chat widget</text>
  
  <rect x="470" y="540" width="380" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="660" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569" font-weight="600">Best Practice: Use HMAC identity verification</text>
</svg>
