<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Script Loading Strategy Decision Tree</text>
  
  <!-- Start node -->
  <rect x="350" y="80" width="200" height="60" rx="30" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Load Third-Party Script</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="140" x2="450" y2="170" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- First decision: Critical? -->
  <rect x="300" y="170" width="300" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Is script critical for initial render?</text>
  
  <!-- Yes branch -->
  <line x1="350" y1="220" x2="200" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="280" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Yes</text>
  
  <!-- No branch -->
  <line x1="550" y1="220" x2="700" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="620" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">No</text>
  
  <!-- Critical path: Is it from same origin? -->
  <rect x="50" y="260" width="300" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Is script from same origin?</text>
  
  <!-- Same origin yes -->
  <line x1="100" y1="310" x2="50" y2="360" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="70" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Yes</text>
  
  <!-- Same origin no -->
  <line x1="300" y1="310" x2="350" y2="360" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">No</text>
  
  <!-- Same origin result -->
  <rect x="0" y="360" width="150" height="70" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="75" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#065f46">Inline or &lt;script&gt;</text>
  <text x="75" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Small: inline</text>
  <text x="75" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Large: normal script</text>
  
  <!-- Different origin result -->
  <rect x="275" y="360" width="150" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e">Preconnect + &lt;script&gt;</text>
  <text x="350" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Warm connection</text>
  <text x="350" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Load normally</text>
  
  <!-- Non-critical path: Independent? -->
  <rect x="550" y="260" width="300" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Does order matter? (depends on other scripts)</text>
  
  <!-- Order matters yes -->
  <line x1="600" y1="310" x2="500" y2="360" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="545" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Yes</text>
  
  <!-- Order matters no -->
  <line x1="800" y1="310" x2="850" y2="360" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="830" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">No</text>
  
  <!-- Order matters result -->
  <rect x="425" y="360" width="150" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1e40af">&lt;script defer&gt;</text>
  <text x="500" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">Preserves order</text>
  <text x="500" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">Executes after parse</text>
  
  <!-- Order doesn't matter result -->
  <rect x="775" y="360" width="150" height="70" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="850" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#3730a3">&lt;script async&gt;</text>
  <text x="850" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4338ca">Independent script</text>
  <text x="850" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4338ca">Execute when ready</text>
  
  <!-- Bottom section: Special cases -->
  <rect x="50" y="460" width="800" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="450" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Special Cases</text>
  
  <!-- Module -->
  <rect x="70" y="500" width="180" height="30" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="160" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">type="module": Always defer</text>
  
  <!-- JSONP -->
  <rect x="270" y="500" width="180" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">JSONP: Legacy, avoid</text>
  
  <!-- Dynamic Import -->
  <rect x="470" y="500" width="180" height="30" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="560" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e40af">import(): On-demand</text>
  
  <!-- NoScript -->
  <rect x="670" y="500" width="180" height="30" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="760" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">&lt;noscript&gt;: Fallback</text>
</svg>
