<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">3DS/SCA Authentication Flow</text>
  
  <!-- Left: Frictionless Flow -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Frictionless Flow (Low Risk)</text>
  
  <!-- Frictionless steps -->
  <rect x="70" y="135" width="360" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">1. Customer submits payment</text>
  
  <line x1="250" y1="185" x2="250" y2="205" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <rect x="70" y="210" width="360" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">2. Gateway performs risk assessment</text>
  
  <line x1="250" y1="260" x2="250" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow1)"/>
  
  <rect x="70" y="285" width="360" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="250" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">3. Low risk → Approved without challenge</text>
  
  <line x1="250" y1="335" x2="250" y2="355" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow1)"/>
  
  <rect x="70" y="360" width="360" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="250" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">4. Payment complete (no user action)</text>
  
  <rect x="70" y="430" width="360" height="40" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="250" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857" font-weight="600">✓ Best UX: No interruption</text>
  
  <!-- Right: Challenge Flow -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Challenge Flow (High Risk)</text>
  
  <!-- Challenge steps -->
  <rect x="490" y="135" width="340" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">1. Customer submits payment</text>
  
  <line x1="660" y1="185" x2="660" y2="205" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  
  <rect x="490" y="210" width="340" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">2. Gateway flags as high risk</text>
  
  <line x1="660" y1="260" x2="660" y2="280" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <rect x="490" y="285" width="340" height="70" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="660" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">3. Challenge required</text>
  <text x="660" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">OTP SMS / Email / Biometric</text>
  
  <line x1="660" y1="355" x2="660" y2="375" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <rect x="490" y="380" width="340" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">4. User completes challenge</text>
  
  <line x1="660" y1="430" x2="660" y2="450" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <rect x="490" y="455" width="340" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">5. Payment complete (with friction)</text>
  
  <rect x="490" y="515" width="340" height="30" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="535" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d" font-weight="600">⚠ Higher abandonment rate</text>
  
  <!-- Bottom: Risk Factors -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Risk factors: Transaction amount, merchant category, device fingerprint, location mismatch, velocity</text>
</svg>
