<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Webhook Delivery and Reliability</text>
  
  <!-- Payment Gateway -->
  <rect x="50" y="80" width="200" height="450" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="150" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Payment Gateway</text>
  
  <!-- Your Backend -->
  <rect x="650" y="80" width="200" height="450" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="750" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Your Backend</text>
  
  <!-- Event occurs -->
  <rect x="70" y="140" width="160" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="150" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Payment Event</text>
  
  <!-- Webhook Queue -->
  <rect x="70" y="220" width="160" height="80" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="150" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Webhook Queue</text>
  <text x="150" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Retry with backoff</text>
  <text x="150" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Max 3-5 attempts</text>
  
  <!-- Arrow with retry logic -->
  <path d="M 230 260 L 630 260" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="430" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b" font-weight="600">POST /webhook</text>
  <text x="430" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">Retry: 1m, 5m, 30m...</text>
  
  <!-- Webhook Handler -->
  <rect x="670" y="220" width="160" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="750" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Webhook Handler</text>
  <text x="750" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Verify signature</text>
  <text x="750" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Process event</text>
  
  <!-- Decision: Success or Failure -->
  <path d="M 750 300 L 750 340" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Success path -->
  <path d="M 750 340 L 850 340 L 850 380" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  <text x="810" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#10b981" font-weight="600">200 OK</text>
  
  <!-- Failure path -->
  <path d="M 750 340 L 650 340 L 650 260" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow4)"/>
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="680" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" font-weight="600">5xx Error</text>
  
  <!-- Idempotency Check -->
  <rect x="670" y="380" width="160" height="70" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="750" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Idempotency Check</text>
  <text x="750" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">event_id already processed?</text>
  
  <!-- Update State -->
  <rect x="670" y="460" width="160" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="750" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Update Order State</text>
  
  <!-- Acknowledge -->
  <path d="M 650 485 L 230 485 L 230 300" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow5)"/>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  <text x="430" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#10b981" font-weight="600">200 OK - Remove from queue</text>
  
  <!-- Best Practices -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Best Practices: Verify signature ✓ | Idempotency ✓ | Fast 200 response ✓ | Async processing ✓ | Alert on failures ✓</text>
</svg>
