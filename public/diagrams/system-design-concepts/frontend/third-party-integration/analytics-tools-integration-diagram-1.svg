<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>
  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Analytics as a Pipeline (Architecture)
  </text>

  <defs>
    <marker id="arrowAN1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="60" y="85" width="780" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="95" y="125" width="190" height="80" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="190" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Taxonomy</text>
  <text x="190" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">event semantics</text>

  <line x1="285" y1="165" x2="325" y2="165" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowAN1)"/>

  <rect x="325" y="125" width="220" height="80" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="435" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Privacy Gate</text>
  <text x="435" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">consent • filtering</text>

  <line x1="545" y1="165" x2="585" y2="165" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowAN1)"/>

  <rect x="585" y="125" width="255" height="80" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="712.5" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Batch + Deliver</text>
  <text x="712.5" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">queue • sample • flush</text>

  <rect x="95" y="245" width="745" height="165" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="467.5" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Outputs and monitoring</text>
  <text x="120" y="305" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• third-party SDK endpoints</text>
  <text x="120" y="328" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• internal data pipeline (optional)</text>
  <text x="120" y="351" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• monitors: volume, schema drift, drops, errors</text>
  <text x="120" y="374" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• kill switch and cohort rollout</text>
</svg>

