<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>
  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    OAuth for SPAs (Architecture &amp; Flow)
  </text>

  <defs>
    <marker id="arrowOA1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="60" y="85" width="780" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="95" y="125" width="250" height="95" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="220" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Browser SPA</text>
  <text x="220" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">redirects + PKCE</text>
  <text x="220" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">session state</text>

  <rect x="400" y="125" width="240" height="95" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="520" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Identity Provider</text>
  <text x="520" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">auth + consent</text>
  <text x="520" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">issues code/tokens</text>

  <rect x="680" y="125" width="160" height="95" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="760" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Your APIs</text>
  <text x="760" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">resource server</text>
  <text x="760" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">scoped access</text>

  <line x1="345" y1="172" x2="400" y2="172" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowOA1)"/>
  <text x="372" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">authorize</text>

  <line x1="400" y1="205" x2="345" y2="205" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowOA1)"/>
  <text x="372" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">code + state</text>

  <rect x="95" y="255" width="745" height="150" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="467.5" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">
    Key controls
  </text>
  <text x="120" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• PKCE binds code redemption to the initiating client</text>
  <text x="120" y="338" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• Strict redirect allowlist prevents exfiltration</text>
  <text x="120" y="361" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• Short-lived access tokens reduce exposure</text>
  <text x="120" y="384" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• Observability detects IdP outages and misconfigurations</text>

  <line x1="640" y1="172" x2="680" y2="172" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowOA1)"/>
  <text x="660" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">access token</text>
</svg>

