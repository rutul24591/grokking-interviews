<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Open Graph and Social Preview Flow</text>
  
  <!-- Your Website -->
  <rect x="50" y="80" width="200" height="450" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Your Website</text>
  
  <!-- Social Platform -->
  <rect x="350" y="80" width="200" height="450" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Social Platform</text>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4338ca">(Twitter/FB/LinkedIn)</text>
  
  <!-- Link Preview -->
  <rect x="650" y="80" width="200" height="450" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="750" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Link Preview</text>
  
  <!-- Step 1: Add OG Tags -->
  <rect x="70" y="140" width="160" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="150" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">1. Add OG Tags</text>
  <text x="150" y="195" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">og:title</text>
  <text x="150" y="210" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">og:description</text>
  <text x="150" y="225" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">og:image</text>
  
  <!-- Arrow to crawler -->
  <line x1="210" y1="190" x2="330" y2="190" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="270" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" font-weight="600">Share URL</text>
  
  <!-- Step 2: Crawler Fetches -->
  <rect x="370" y="140" width="160" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="450" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">2. Crawler Fetches</text>
  <text x="450" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Bot requests page</text>
  <text x="450" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Parses OG tags</text>
  <text x="450" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Downloads image</text>
  
  <!-- Arrow to cache -->
  <line x1="450" y1="240" x2="450" y2="280" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Step 3: Cache Preview -->
  <rect x="370" y="290" width="160" height="80" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3730a3">3. Cache Preview</text>
  <text x="450" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4338ca">Store for hours-days</text>
  <text x="450" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4338ca">Avoid refetching</text>
  
  <!-- Arrow to preview -->
  <line x1="550" y1="330" x2="630" y2="330" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Step 4: Display Preview -->
  <rect x="670" y="290" width="160" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="750" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">4. Display Preview</text>
  
  <!-- Preview card mockup -->
  <rect x="685" y="335" width="130" height="60" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="690" y="340" width="120" height="35" rx="2" fill="#cbd5e1"/>
  <rect x="690" y="380" width="100" height="6" rx="2" fill="#94a3b8"/>
  <rect x="690" y="390" width="80" height="4" rx="2" fill="#cbd5e1"/>
  
  <!-- OG Tag Examples -->
  <rect x="70" y="270" width="160" height="150" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="150" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Required OG Tags</text>
  <text x="85" y="320" text-anchor="start" font-family="monospace" font-size="8" fill="#78350f">og:title</text>
  <text x="85" y="335" text-anchor="start" font-family="monospace" font-size="8" fill="#78350f">og:type</text>
  <text x="85" y="350" text-anchor="start" font-family="monospace" font-size="8" fill="#78350f">og:image</text>
  <text x="85" y="365" text-anchor="start" font-family="monospace" font-size="8" fill="#78350f">og:url</text>
  <text x="85" y="385" text-anchor="start" font-family="monospace" font-size="8" fill="#78350f">twitter:card</text>
  <text x="85" y="400" text-anchor="start" font-family="monospace" font-size="8" fill="#78350f">twitter:site</text>
  
  <!-- Image Requirements -->
  <rect x="70" y="435" width="160" height="85" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="150" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Image Requirements</text>
  <text x="150" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#78350f">Min: 1200x630px</text>
  <text x="150" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#78350f">Format: JPG/PNG</text>
  <text x="150" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#78350f">Size: &lt;5MB</text>
  
  <!-- Debug Tools -->
  <rect x="650" y="435" width="200" height="85" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="750" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Debug Tools</text>
  <text x="750" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#047857">Twitter Card Validator</text>
  <text x="750" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#047857">Facebook Sharing Debugger</text>
  <text x="750" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#047857">LinkedIn Post Inspector</text>
  
  <!-- Bottom note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Tip: Use absolute URLs for og:image | Cache is cleared via platform debug tools</text>
</svg>
