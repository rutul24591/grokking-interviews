<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>
  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    OAuth Operations (Scaling &amp; Availability)
  </text>

  <defs>
    <marker id="arrowOA3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="60" y="85" width="780" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="95" y="125" width="220" height="90" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="205" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Config as Data</text>
  <text x="205" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">tenants • redirect URIs</text>
  <text x="205" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">scopes • clients</text>

  <line x1="315" y1="170" x2="355" y2="170" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowOA3)"/>

  <rect x="355" y="125" width="240" height="90" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="475" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Security Hygiene</text>
  <text x="475" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">key rotation</text>
  <text x="475" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">token lifetimes</text>

  <line x1="595" y1="170" x2="635" y2="170" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowOA3)"/>

  <rect x="635" y="125" width="205" height="90" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="737.5" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Monitoring</text>
  <text x="737.5" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">latency • errors</text>
  <text x="737.5" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">redirect mismatches</text>

  <line x1="450" y1="215" x2="450" y2="255" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowOA3)"/>

  <rect x="95" y="260" width="745" height="150" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="467.5" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Incident playbook</text>
  <text x="120" y="320" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• IdP outage: degrade UX, avoid loops, show actionable errors</text>
  <text x="120" y="343" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• Compromise: revoke sessions, rotate keys, restrict scopes temporarily</text>
  <text x="120" y="366" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• Misconfig: safe rollout for tenant configs with validation</text>
  <text x="120" y="389" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• Observability: correlate errors to tenants, browsers, and routes</text>
</svg>

