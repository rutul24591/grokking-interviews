<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">OAuth Security Threat Model</text>
  
  <!-- Left: Attack Vectors -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Attack Vectors</text>
  
  <!-- Attack 1: Code Interception -->
  <rect x="70" y="135" width="360" height="70" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#991b1b">1. Authorization Code Interception</text>
  <text x="250" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Attacker intercepts auth code in redirect</text>
  <text x="250" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Mitigation: PKCE, short code lifetime</text>
  
  <!-- Attack 2: Token Theft -->
  <rect x="70" y="215" width="360" height="70" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#991b1b">2. Access Token Theft (XSS)</text>
  <text x="250" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">XSS extracts token from localStorage</text>
  <text x="250" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Mitigation: httpOnly cookies, CSP</text>
  
  <!-- Attack 3: CSRF -->
  <rect x="70" y="295" width="360" height="70" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#991b1b">3. CSRF on Redirect URI</text>
  <text x="250" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Attacker triggers OAuth flow from their site</text>
  <text x="250" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Mitigation: state parameter validation</text>
  
  <!-- Attack 4: Refresh Token Theft -->
  <rect x="70" y="375" width="360" height="70" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#991b1b">4. Refresh Token Theft</text>
  <text x="250" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Long-lived token stolen = persistent access</text>
  <text x="250" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Mitigation: Token rotation, detection</text>
  
  <!-- Right: Defense Layers -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Defense Layers</text>
  
  <!-- Layer 1: PKCE -->
  <rect x="490" y="135" width="340" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">PKCE (RFC 7636)</text>
  <text x="660" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Prevents code interception attacks</text>
  
  <!-- Layer 2: State Parameter -->
  <rect x="490" y="205" width="340" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">State Parameter</text>
  <text x="660" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Prevents CSRF, ties request to response</text>
  
  <!-- Layer 3: Token Storage -->
  <rect x="490" y="275" width="340" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Secure Token Storage</text>
  <text x="660" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">httpOnly cookies or memory (not localStorage)</text>
  
  <!-- Layer 4: Token Validation -->
  <rect x="490" y="345" width="340" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Token Validation</text>
  <text x="660" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Signature, expiry, issuer, audience</text>
  
  <!-- Layer 5: Monitoring -->
  <rect x="490" y="415" width="340" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Monitoring &amp; Detection</text>
  <text x="660" y="462" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Token reuse detection, anomaly alerts</text>
  
  <!-- Bottom: Checklist -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">OAuth Security Checklist: PKCE ✓ | State ✓ | https ✓ | Short lifetimes ✓ | Token rotation ✓</text>
</svg>
