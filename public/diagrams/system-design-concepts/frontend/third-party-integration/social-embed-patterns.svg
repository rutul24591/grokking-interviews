<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Social Embed Loading Patterns</text>
  
  <!-- Pattern 1: Eager Load -->
  <rect x="50" y="80" width="250" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="175" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Eager Load</text>
  <text x="175" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7f1d1d">❌ Not Recommended</text>
  
  <rect x="70" y="160" width="210" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="175" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">How it works:</text>
  <text x="175" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Load all embeds on page load</text>
  <text x="175" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Twitter, YouTube, Instagram scripts</text>
  <text x="175" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Render all embeds immediately</text>
  
  <rect x="70" y="280" width="210" height="80" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="175" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Problems:</text>
  <text x="175" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">• Slow initial page load</text>
  <text x="175" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">• Wastes bandwidth</text>
  <text x="175" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">• Third-party tracking</text>
  
  <rect x="70" y="380" width="210" height="50" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="175" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d" font-weight="600">LCP: 3.5s+</text>
  <text x="175" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Many third-party requests</text>
  
  <!-- Pattern 2: Lazy Load -->
  <rect x="325" y="80" width="250" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Lazy Load</text>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#047857">✓ Recommended</text>
  
  <rect x="345" y="160" width="210" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="450" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">How it works:</text>
  <text x="450" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Show placeholder image</text>
  <text x="450" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Load script on scroll/interaction</text>
  <text x="450" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Replace placeholder with embed</text>
  
  <rect x="345" y="280" width="210" height="80" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Benefits:</text>
  <text x="450" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">• Fast initial page load</text>
  <text x="450" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">• Only loads visible embeds</text>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">• User choice to load</text>
  
  <rect x="345" y="380" width="210" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857" font-weight="600">LCP: 1.5s</text>
  <text x="450" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Deferred third-party requests</text>
  
  <!-- Pattern 3: Static Fallback -->
  <rect x="600" y="80" width="250" height="450" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="725" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Static Fallback</text>
  <text x="725" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78350f">⚠ Privacy-Focused</text>
  
  <rect x="620" y="160" width="210" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="725" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">How it works:</text>
  <text x="725" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Generate static preview at build</text>
  <text x="725" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">No third-party scripts by default</text>
  <text x="725" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">"Load tweet" button optional</text>
  
  <rect x="620" y="280" width="210" height="80" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="725" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Benefits:</text>
  <text x="725" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">• Maximum privacy</text>
  <text x="725" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">• No third-party tracking</text>
  <text x="725" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">• Fastest page load</text>
  
  <rect x="620" y="380" width="210" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="725" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f" font-weight="600">LCP: 1.2s</text>
  <text x="725" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Zero third-party by default</text>
  
  <!-- Bottom comparison -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Recommendation: Lazy load for UX | Static fallback for privacy-focused sites</text>
</svg>
