<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>
  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Social Integration Surfaces (Architecture)
  </text>

  <rect x="60" y="85" width="780" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="95" y="125" width="230" height="110" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="210" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Sharing UI</text>
  <text x="210" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">share links</text>
  <text x="210" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">platform share dialogs</text>
  <text x="210" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">low runtime cost</text>

  <rect x="355" y="125" width="240" height="110" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="475" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Embeds</text>
  <text x="475" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">iframes / scripts</text>
  <text x="475" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">privacy + perf impact</text>
  <text x="475" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">should be gated</text>

  <rect x="625" y="125" width="215" height="110" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="732.5" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Link Previews</text>
  <text x="732.5" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Open Graph metadata</text>
  <text x="732.5" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">server-rendered</text>
  <text x="732.5" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">cacheable</text>

  <rect x="95" y="270" width="745" height="140" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="467.5" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Policy controls</text>
  <text x="120" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• Consent gating for tracking-capable widgets</text>
  <text x="120" y="353" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• CSP allowlist and domain monitoring</text>
  <text x="120" y="376" font-family="system-ui, sans-serif" font-size="11" fill="#334155">• Lazy loading and facades to protect critical path</text>
</svg>

