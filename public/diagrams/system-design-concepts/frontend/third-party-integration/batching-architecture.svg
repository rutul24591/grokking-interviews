<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Event Batching Architecture</text>
  
  <!-- Event Sources -->
  <rect x="50" y="80" width="180" height="450" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Event Sources</text>
  
  <rect x="70" y="140" width="140" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Page Views</text>
  
  <rect x="70" y="190" width="140" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="140" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Clicks</text>
  
  <rect x="70" y="240" width="140" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="140" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Form Submits</text>
  
  <rect x="70" y="290" width="140" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="140" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Purchases</text>
  
  <!-- Arrows to queue -->
  <line x1="230" y1="215" x2="280" y2="215" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Event Queue -->
  <rect x="290" y="80" width="250" height="450" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="415" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Client-Side Queue</text>
  
  <!-- Queue storage -->
  <rect x="310" y="140" width="210" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="415" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">In-Memory Array</text>
  <text x="415" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">events.push(event)</text>
  <text x="415" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Max: 50 events</text>
  <text x="415" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Max age: 30 seconds</text>
  
  <!-- Flush triggers -->
  <rect x="310" y="260" width="210" height="100" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="415" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Flush Triggers</text>
  <text x="415" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">• Queue size ≥ 10</text>
  <text x="415" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">• Timer expires (30s)</text>
  <text x="415" y="349" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">• Page unload</text>
  <text x="415" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">• Visibility change</text>
  
  <!-- Retry logic -->
  <rect x="310" y="380" width="210" height="70" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="415" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Retry on Failure</text>
  <text x="415" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Exponential backoff</text>
  <text x="415" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Max 3 retries</text>
  
  <!-- Arrow to beacon -->
  <line x1="540" y1="300" x2="590" y2="300" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  <text x="565" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6366f1" font-weight="600">Batch Send</text>
  
  <!-- Send Mechanism -->
  <rect x="600" y="80" width="250" height="450" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="725" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Send Mechanism</text>
  
  <!-- Navigator.sendBeacon -->
  <rect x="620" y="140" width="210" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="725" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">sendBeacon()</text>
  <text x="725" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">✓ Works on page unload</text>
  <text x="725" y="217" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">✓ Queued by browser</text>
  <text x="725" y="234" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">✗ Limited payload (~64KB)</text>
  
  <!-- Fallback: fetch -->
  <rect x="620" y="240" width="210" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="725" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">fetch() Fallback</text>
  <text x="725" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">✓ Larger payloads</text>
  <text x="725" y="317" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">✗ May not complete on unload</text>
  <text x="725" y="334" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Use keepalive: true</text>
  
  <!-- Decision -->
  <rect x="620" y="340" width="210" height="80" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="725" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Strategy</text>
  <text x="725" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Page unload → sendBeacon</text>
  <text x="725" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Otherwise → fetch()</text>
  
  <!-- Analytics Backend -->
  <rect x="620" y="440" width="210" height="70" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="725" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Analytics Backend</text>
  <text x="725" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Process batch</text>
  
  <!-- Bottom: Benefits -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Benefits: Reduced requests | Better reliability | Lower bandwidth | Improved page performance</text>
</svg>
