<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Widget Lifecycle and Teardown</text>
  
  <!-- Lifecycle stages -->
  <rect x="50" y="80" width="800" height="200" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Stage 1: Load -->
  <rect x="70" y="110" width="170" height="140" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="155" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e40af">1. Load</text>
  <line x1="90" y1="155" x2="220" y2="155" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">• Inject script</text>
  <text x="155" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">• Initialize SDK</text>
  <text x="155" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">• Create container</text>
  
  <!-- Arrow -->
  <line x1="240" y1="180" x2="270" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Stage 2: Mount -->
  <rect x="280" y="110" width="170" height="140" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="365" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#065f46">2. Mount</text>
  <line x1="300" y1="155" x2="430" y2="155" stroke="#10b981" stroke-width="1.5"/>
  <text x="365" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">• Render widget</text>
  <text x="365" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">• Attach listeners</text>
  <text x="365" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">• Start timers</text>
  
  <!-- Arrow -->
  <line x1="450" y1="180" x2="480" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Stage 3: Active -->
  <rect x="490" y="110" width="170" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="575" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#92400e">3. Active</text>
  <line x1="510" y1="155" x2="640" y2="155" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="575" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">• User interaction</text>
  <text x="575" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">• API calls</text>
  <text x="575" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">• State updates</text>
  
  <!-- Arrow -->
  <line x1="660" y1="180" x2="690" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Stage 4: Unmount -->
  <rect x="700" y="110" width="130" height="140" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="765" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#991b1b">4. Unmount</text>
  <line x1="720" y1="155" x2="810" y2="155" stroke="#ef4444" stroke-width="1.5"/>
  <text x="765" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">• Remove widget</text>
  <text x="765" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">• Cleanup</text>
  <text x="765" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">• Release refs</text>
  
  <!-- Cleanup details -->
  <rect x="50" y="300" width="400" height="230" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Cleanup Checklist</text>
  
  <rect x="70" y="350" width="360" height="35" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="372" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#166534">✓ Remove event listeners</text>
  
  <rect x="70" y="395" width="360" height="35" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="417" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#166534">✓ Clear timers (setTimeout/setInterval)</text>
  
  <rect x="70" y="440" width="360" height="35" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="462" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#166534">✓ Cancel animation frames</text>
  
  <rect x="70" y="485" width="360" height="35" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="90" y="507" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#166534">✓ Disconnect observers</text>
  
  <!-- Memory leak warning -->
  <rect x="470" y="300" width="380" height="230" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Memory Leak Risks</text>
  
  <rect x="490" y="350" width="340" height="45" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">⚠ Event Listeners</text>
  <text x="660" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Not removed → Widget GC'd but listeners remain</text>
  
  <rect x="490" y="405" width="340" height="45" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">⚠ Timers</text>
  <text x="660" y="443" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Not cleared → Callbacks fire after unmount</text>
  
  <rect x="490" y="460" width="340" height="45" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">⚠ References</text>
  <text x="660" y="498" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Not nullified → DOM nodes retained</text>
  
  <!-- Bottom note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Proper teardown is critical: unmount() must reverse everything mount() did</text>
</svg>
