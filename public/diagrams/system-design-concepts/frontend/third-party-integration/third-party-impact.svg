<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Third-Party Script Impact on Performance</text>
  
  <!-- Left: Without Optimization -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Without Optimization</text>
  
  <!-- Waterfall chart -->
  <rect x="70" y="135" width="360" height="380" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Time markers -->
  <line x1="100" y1="150" x2="100" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="100" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">0ms</text>
  
  <line x1="200" y1="150" x2="200" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="200" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">1000ms</text>
  
  <line x1="300" y1="150" x2="300" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="300" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">2000ms</text>
  
  <line x1="400" y1="150" x2="400" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="400" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">3000ms</text>
  
  <!-- HTML -->
  <rect x="100" y="165" width="80" height="25" rx="4" fill="#3b82f6"/>
  <text x="140" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">HTML</text>
  
  <!-- Analytics Script (blocks) -->
  <rect x="180" y="165" width="100" height="25" rx="4" fill="#f59e0b"/>
  <text x="230" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">Analytics</text>
  
  <!-- Chat Widget (blocks) -->
  <rect x="280" y="165" width="100" height="25" rx="4" fill="#ef4444"/>
  <text x="330" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">Chat</text>
  
  <!-- CSS -->
  <rect x="100" y="200" width="60" height="25" rx="4" fill="#8b5cf6"/>
  <text x="130" y="217" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">CSS</text>
  
  <!-- App Script (delayed) -->
  <rect x="380" y="200" width="80" height="25" rx="4" fill="#10b981"/>
  <text x="420" y="217" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">App</text>
  
  <!-- Images -->
  <rect x="160" y="235" width="120" height="25" rx="4" fill="#06b6d4"/>
  <text x="220" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">Images</text>
  
  <!-- A/B Test Script -->
  <rect x="280" y="235" width="80" height="25" rx="4" fill="#f97316"/>
  <text x="320" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">A/B Test</text>
  
  <!-- Payment Script -->
  <rect x="360" y="235" width="80" height="25" rx="4" fill="#dc2626"/>
  <text x="400" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">Payment</text>
  
  <!-- FCP marker -->
  <line x1="350" y1="150" x2="350" y2="500" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="350" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" font-weight="600">FCP</text>
  
  <!-- TTI marker -->
  <line x1="420" y1="150" x2="420" y2="500" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="420" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626" font-weight="600">TTI</text>
  
  <!-- Metrics -->
  <rect x="70" y="450" width="360" height="50" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#991b1b">FCP: 2.8s | TTI: 3.5s</text>
  <text x="250" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Third-party scripts block critical path</text>
  
  <!-- Right: With Optimization -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">With Optimization</text>
  
  <!-- Waterfall chart -->
  <rect x="490" y="135" width="340" height="380" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Time markers -->
  <line x1="520" y1="150" x2="520" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="520" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">0ms</text>
  
  <line x1="600" y1="150" x2="600" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="600" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">500ms</text>
  
  <line x1="680" y1="150" x2="680" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="680" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">1000ms</text>
  
  <line x1="760" y1="150" x2="760" y2="500" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="760" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">1500ms</text>
  
  <!-- HTML -->
  <rect x="520" y="165" width="60" height="25" rx="4" fill="#3b82f6"/>
  <text x="550" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">HTML</text>
  
  <!-- CSS (parallel) -->
  <rect x="580" y="165" width="50" height="25" rx="4" fill="#8b5cf6"/>
  <text x="605" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">CSS</text>
  
  <!-- App Script (defer, parallel) -->
  <rect x="630" y="165" width="70" height="25" rx="4" fill="#10b981"/>
  <text x="665" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">App</text>
  
  <!-- Images (parallel) -->
  <rect x="700" y="165" width="100" height="25" rx="4" fill="#06b6d4"/>
  <text x="750" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">Images</text>
  
  <!-- Analytics (async, after FCP) -->
  <rect x="580" y="210" width="80" height="25" rx="4" fill="#f59e0b" opacity="0.7"/>
  <text x="620" y="227" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">Analytics</text>
  
  <!-- Chat (lazy, user triggered) -->
  <rect x="660" y="210" width="80" height="25" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="700" y="227" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">Chat</text>
  
  <!-- A/B Test (async) -->
  <rect x="580" y="245" width="70" height="25" rx="4" fill="#f97316" opacity="0.7"/>
  <text x="615" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">A/B</text>
  
  <!-- Payment (on demand) -->
  <rect x="650" y="245" width="80" height="25" rx="4" fill="#dc2626" opacity="0.7"/>
  <text x="690" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#ffffff">Payment</text>
  
  <!-- FCP marker -->
  <line x1="620" y1="150" x2="620" y2="500" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="620" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#16a34a" font-weight="600">FCP</text>
  
  <!-- TTI marker -->
  <line x1="680" y1="150" x2="680" y2="500" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="680" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#10b981" font-weight="600">TTI</text>
  
  <!-- Metrics -->
  <rect x="490" y="450" width="340" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#065f46">FCP: 0.8s | TTI: 1.2s</text>
  <text x="660" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Defer + async + lazy loading</text>
  
  <!-- Bottom comparison -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Optimization: 71% faster FCP, 66% faster TTI through defer, async, and lazy loading</text>
</svg>
