<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Consent Gating and Privacy Compliance</text>
  
  <!-- Left: Consent Flow -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Consent Collection Flow</text>
  
  <!-- Step 1: Page Load -->
  <rect x="70" y="135" width="360" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">1. Page Load - Check Consent State</text>
  
  <line x1="250" y1="185" x2="250" y2="205" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Decision: Has Consent? -->
  <path d="M 200 205 L 250 235 L 300 205 L 250 175 Z" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Consent</text>
  <text x="250" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Stored?</text>
  
  <!-- No: Show Banner -->
  <line x1="200" y1="235" x2="150" y2="260" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="170" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b" font-weight="600">No</text>
  
  <rect x="70" y="265" width="160" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="150" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Show Consent Banner</text>
  <text x="150" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Block tracking scripts</text>
  
  <!-- Yes: Load Scripts -->
  <line x1="300" y1="235" x2="350" y2="260" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  <text x="330" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#22c55e" font-weight="600">Yes</text>
  
  <rect x="270" y="265" width="160" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="350" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Load Tracking Scripts</text>
  <text x="350" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Initialize analytics</text>
  
  <!-- Step 2: User Choice -->
  <line x1="150" y1="325" x2="150" y2="365" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow4)"/>
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <rect x="70" y="370" width="160" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="150" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">2. User Makes Choice</text>
  <text x="150" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Accept / Reject / Customize</text>
  
  <!-- Step 3: Store & Act -->
  <line x1="150" y1="440" x2="350" y2="440" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow5)"/>
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <rect x="270" y="370" width="160" height="70" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="350" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">3. Store &amp; Act</text>
  <text x="350" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Save to localStorage</text>
  <text x="350" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Enable/disable scripts</text>
  
  <!-- Right: Compliance Requirements -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Compliance Requirements</text>
  
  <!-- GDPR -->
  <rect x="490" y="135" width="340" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">GDPR (EU)</text>
  <text x="660" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Explicit opt-in required</text>
  <text x="660" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Right to withdraw consent</text>
  
  <!-- CCPA -->
  <rect x="490" y="215" width="340" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">CCPA (California)</text>
  <text x="660" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Opt-out mechanism</text>
  <text x="660" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">"Do Not Sell My Info" link</text>
  
  <!-- LGPD -->
  <rect x="490" y="295" width="340" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">LGPD (Brazil)</text>
  <text x="660" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Similar to GDPR</text>
  <text x="660" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Legal basis required</text>
  
  <!-- Implementation Checklist -->
  <rect x="490" y="375" width="340" height="145" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Implementation Checklist</text>
  <text x="510" y="425" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">✓ Consent banner before tracking</text>
  <text x="510" y="442" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">✓ Granular consent options</text>
  <text x="510" y="459" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">✓ Store consent proof</text>
  <text x="510" y="476" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">✓ Easy withdrawal mechanism</text>
  <text x="510" y="493" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">✓ Respect Global Privacy Control</text>
  <text x="510" y="510" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">✓ Regular consent renewal</text>
  
  <!-- Bottom note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Key Principle: No tracking before consent | Document consent | Honor withdrawal immediately</text>
</svg>
