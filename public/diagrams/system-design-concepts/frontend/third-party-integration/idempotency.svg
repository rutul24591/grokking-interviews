<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Idempotency: Preventing Duplicate Charges</text>
  
  <!-- Left: Without Idempotency -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Without Idempotency</text>
  
  <!-- Client sends request -->
  <rect x="70" y="135" width="360" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Client: POST /charge $100</text>
  
  <!-- Network timeout -->
  <rect x="70" y="200" width="360" height="50" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Network Timeout (no response)</text>
  
  <!-- Client retries -->
  <rect x="70" y="265" width="360" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Client: POST /charge $100 (retry)</text>
  
  <!-- Server processes both -->
  <rect x="70" y="330" width="360" height="70" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Server processes BOTH requests</text>
  <text x="250" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">❌ Customer charged $200!</text>
  
  <rect x="70" y="420" width="360" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="250" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d" font-weight="600">Result: Duplicate charge, refund needed</text>
  
  <!-- Right: With Idempotency -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">With Idempotency Key</text>
  
  <!-- Client sends request with key -->
  <rect x="490" y="135" width="340" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Client: POST /charge $100</text>
  <text x="660" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Idempotency-Key: abc123</text>
  
  <!-- Server stores key -->
  <rect x="490" y="200" width="340" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Server: Store key + process</text>
  <text x="660" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Key: abc123 → Processing</text>
  
  <!-- Network timeout -->
  <rect x="490" y="275" width="340" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Network Timeout (no response)</text>
  
  <!-- Client retries with same key -->
  <rect x="490" y="340" width="340" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Client: POST /charge $100 (retry)</text>
  <text x="660" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Idempotency-Key: abc123</text>
  
  <!-- Server recognizes key -->
  <rect x="490" y="405" width="340" height="70" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Server: Key exists → Return cached</text>
  <text x="660" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">✓ Return original response (no re-process)</text>
  
  <rect x="490" y="485" width="340" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="660" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857" font-weight="600">Result: Customer charged once ✓</text>
  
  <!-- Bottom note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Idempotency Key: UUID from client | Store for 24h+ | Return same response for duplicate keys</text>
</svg>
