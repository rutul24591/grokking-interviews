<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">CSP and SRI Security Flow</text>
  
  <!-- Left: CSP Flow -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Content Security Policy (CSP)</text>
  
  <!-- CSP Meta/Header -->
  <rect x="70" y="135" width="360" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="85" y="160" font-family="monospace" font-size="10" fill="#22c55e">Content-Security-Policy:</text>
  <text x="85" y="180" font-family="monospace" font-size="9" fill="#e2e8f0">script-src 'self' https://cdn.example.com</text>
  
  <!-- Arrow down -->
  <line x1="250" y1="195" x2="250" y2="215" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowCsp)"/>
  <defs>
    <marker id="arrowCsp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Script Request -->
  <rect x="70" y="220" width="360" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="250" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Browser Requests Script</text>
  <text x="250" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">https://cdn.example.com/analytics.js</text>
  
  <!-- Arrow down -->
  <line x1="250" y1="270" x2="250" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowCsp)"/>
  
  <!-- CSP Check -->
  <rect x="70" y="295" width="360" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">CSP Validation</text>
  <text x="250" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Does script-src allow this origin?</text>
  
  <!-- Arrow down split -->
  <line x1="160" y1="365" x2="160" y2="385" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowCsp)"/>
  <line x1="340" y1="365" x2="340" y2="385" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowCsp)"/>
  
  <!-- Allowed -->
  <rect x="70" y="390" width="170" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="155" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#065f46">✓ Allowed</text>
  <text x="155" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Script executes</text>
  
  <!-- Blocked -->
  <rect x="260" y="390" width="170" height="60" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="345" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#991b1b">✗ Blocked</text>
  <text x="345" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Console error logged</text>
  
  <!-- Right: SRI Flow -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Subresource Integrity (SRI)</text>
  
  <!-- SRI Hash -->
  <rect x="490" y="135" width="340" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="660" y="160" font-family="monospace" font-size="9" fill="#22c55e">&lt;script src="..."</text>
  <text x="660" y="180" font-family="monospace" font-size="8" fill="#e2e8f0">integrity="sha384-oqVuAfXRKap..."&gt;</text>
  
  <!-- Arrow down -->
  <line x1="660" y1="205" x2="660" y2="225" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowSri)"/>
  <defs>
    <marker id="arrowSri" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  
  <!-- Script Download -->
  <rect x="490" y="230" width="340" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="660" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Download Script</text>
  <text x="660" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">Fetch from CDN</text>
  
  <!-- Arrow down -->
  <line x1="660" y1="280" x2="660" y2="300" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowSri)"/>
  
  <!-- Hash Calculation -->
  <rect x="490" y="305" width="340" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Calculate Hash</text>
  <text x="660" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">SHA-384 of downloaded content</text>
  
  <!-- Arrow down split -->
  <line x1="570" y1="375" x2="570" y2="395" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowSri)"/>
  <line x1="750" y1="375" x2="750" y2="395" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowSri)"/>
  
  <!-- Match -->
  <rect x="490" y="400" width="150" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="565" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#065f46">✓ Match</text>
  <text x="565" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Execute script</text>
  
  <!-- Mismatch -->
  <rect x="660" y="400" width="170" height="60" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="745" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#991b1b">✗ Mismatch</text>
  <text x="745" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Block &amp; log error</text>
  
  <!-- Bottom note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">CSP controls WHERE scripts load from; SRI ensures WHAT loads is untampered</text>
</svg>
