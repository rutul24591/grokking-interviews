<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Analytics Event Tracking Flow</text>
  
  <!-- User Action -->
  <rect x="50" y="80" width="150" height="450" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="125" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">User Action</text>
  
  <rect x="70" y="140" width="110" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="125" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Click, View,</text>
  <text x="125" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Purchase, etc.</text>
  
  <!-- Event Queue -->
  <rect x="220" y="80" width="200" height="450" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="320" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Event Queue</text>
  
  <rect x="240" y="140" width="160" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="320" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Batch Events</text>
  <text x="320" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Collect up to N events</text>
  <text x="320" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Or wait T seconds</text>
  
  <!-- Arrow to batching -->
  <line x1="320" y1="220" x2="320" y2="260" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <rect x="240" y="270" width="160" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="320" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Add Metadata</text>
  <text x="320" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">user_id, session_id</text>
  <text x="320" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">timestamp, page_url</text>
  
  <!-- Arrow to send -->
  <line x1="320" y1="340" x2="320" y2="380" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow1)"/>
  
  <rect x="240" y="390" width="160" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="320" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Send Batch</text>
  
  <!-- Arrow to analytics -->
  <line x1="420" y1="420" x2="500" y2="420" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  <text x="460" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6366f1" font-weight="600">POST /track</text>
  
  <!-- Analytics Backend -->
  <rect x="520" y="80" width="200" height="450" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="620" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Analytics Backend</text>
  
  <rect x="540" y="140" width="160" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="620" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Validate Events</text>
  
  <line x1="620" y1="200" x2="620" y2="240" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <rect x="540" y="250" width="160" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="620" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Enrich Data</text>
  
  <line x1="620" y1="310" x2="620" y2="350" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow3)"/>
  
  <rect x="540" y="360" width="160" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="620" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Store Events</text>
  
  <line x1="620" y1="420" x2="620" y2="460" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow3)"/>
  
  <rect x="540" y="470" width="160" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="620" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Dashboards</text>
  
  <!-- Consent Gate -->
  <rect x="740" y="80" width="110" height="450" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="795" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#475569">Consent</text>
  
  <rect x="755" y="140" width="80" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="795" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Check</text>
  <text x="795" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Consent</text>
  <text x="795" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Status</text>
  
  <line x1="795" y1="220" x2="795" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow4)"/>
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <rect x="755" y="270" width="80" height="70" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="795" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Allowed</text>
  <text x="795" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#047857">Track event</text>
  
  <line x1="795" y1="340" x2="795" y2="380" stroke="#64748b" stroke-width="2" marker-end="url(#arrow4)"/>
  
  <rect x="755" y="390" width="80" height="70" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="795" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Denied</text>
  <text x="795" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7f1d1d">Drop event</text>
  
  <!-- Bottom note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Best Practice: Batch events | Respect consent | Retry on failure | Sample high-volume events</text>
</svg>
