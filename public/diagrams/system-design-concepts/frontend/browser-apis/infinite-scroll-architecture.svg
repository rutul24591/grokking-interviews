<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Infinite Scroll Architecture</text>
  
  <!-- Content Feed -->
  <rect x="50" y="70" width="380" height="380" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="240" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Content Feed</text>
  
  <!-- Posts -->
  <rect x="70" y="120" width="340" height="50" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Post 1</text>
  
  <rect x="70" y="180" width="340" height="50" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Post 2</text>
  
  <rect x="70" y="240" width="340" height="50" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Post 3</text>
  
  <!-- Sentinel -->
  <rect x="70" y="310" width="340" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="4,4"/>
  <text x="240" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Sentinel Element</text>
  
  <!-- Arrow to Loading -->
  <path d="M 430 250 L 480 250" stroke="#647480" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Loading State -->
  <rect x="480" y="150" width="180" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="570" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Loading</text>
  
  <rect x="500" y="210" width="140" height="60" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="570" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">isLoading = true</text>
  <text x="570" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Prevent duplicates</text>
  
  <!-- Arrow to API -->
  <path d="M 660 250 L 710 250" stroke="#647480" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  
  <!-- API Request -->
  <rect x="710" y="150" width="140" height="200" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="780" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">API</text>
  
  <rect x="730" y="210" width="100" height="60" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="780" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">GET /posts</text>
  <text x="780" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">page=2</text>
  
  <!-- New Content -->
  <rect x="480" y="370" width="370" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="665" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">New Content Appended</text>
  
  <rect x="500" y="415" width="330" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="665" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Post 4, Post 5 (new)</text>
  
  <!-- Best Practices -->
  <rect x="50" y="470" width="800" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Best Practices: Loading state prevents duplicates | Handle empty state | Disconnect when no more content</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
