<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Broadcast Channel Flow</text>
  
  <!-- Tab 1 -->
  <rect x="50" y="70" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Tab 1</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">postMessage</text>
  
  <!-- Channel -->
  <rect x="280" y="70" width="340" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">BroadcastChannel</text>
  <text x="450" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Channel: "channel-name"</text>
  <text x="450" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Broadcasts to all tabs</text>
  
  <!-- Tab 2 -->
  <rect x="670" y="70" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="760" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Tab 2</text>
  <text x="760" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">onmessage</text>
  
  <!-- Arrows -->
  <path d="M 230 130 L 280 130" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 620 130 L 670 130" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Use Cases -->
  <rect x="50" y="210" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Use Cases</text>
  
  <rect x="70" y="265" width="760" height="60" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Cross-tab sync | Logout in one tab logs out all | Deduplicate analytics events | Share state between tabs</text>
  
  <!-- Comparison -->
  <rect x="50" y="330" width="400" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="250" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">BroadcastChannel</text>
  
  <rect x="70" y="380" width="360" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="250" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Simple pub/sub | Same-origin only</text>
  
  <rect x="470" y="330" width="380" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Shared Worker</text>
  
  <rect x="490" y="380" width="340" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Shared state | Port communication | More complex</text>
  
  <!-- Browser Support -->
  <rect x="50" y="450" width="800" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">Browser Support</text>
  
  <rect x="70" y="500" width="760" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="450" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">✓ Chrome, Firefox, Edge | ✗ Safari (use localStorage events fallback)</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
