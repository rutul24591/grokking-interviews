<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Clipboard API Flow</text>
  
  <!-- Copy Flow -->
  <rect x="50" y="70" width="380" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Copy (Write)</text>
  
  <rect x="70" y="130" width="340" height="50" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">User clicks "Copy" button</text>
  
  <path d="M 240 190 L 240 220" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="70" y="230" width="340" height="50" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="240" y="260" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#15803d">navigator.clipboard.writeText()</text>
  
  <!-- Paste Flow -->
  <rect x="470" y="70" width="380" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Paste (Read)</text>
  
  <rect x="490" y="130" width="340" height="50" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">User clicks "Paste" button</text>
  
  <path d="M 660" y="190 L 660 220" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="490" y="230" width="340" height="50" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Browser permission prompt</text>
  
  <!-- Security Requirements -->
  <rect x="50" y="290" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Security Requirements</text>
  
  <rect x="70" y="345" width="760" height="60" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">HTTPS required | User gesture required for write | Explicit permission required for read</text>
  
  <!-- Use Cases -->
  <rect x="50" y="410" width="400" height="120" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="250" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Copy Use Cases</text>
  
  <rect x="70" y="460" width="360" height="60" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="250" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Share links | Copy codes | Copy content | Referral codes</text>
  
  <rect x="470" y="410" width="380" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Paste Use Cases</text>
  
  <rect x="490" y="460" width="340" height="60" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Quick input | Paste codes | Paste content | Import data</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
