<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Shared Worker Message Flow</text>
  <rect x="50" y="80" width="260" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Tab Sends Message</text>
  <rect x="70" y="140" width="220" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">worker.port.postMessage(data)</text>
  <rect x="70" y="185" width="220" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Message sent to shared worker</text>
  <rect x="70" y="230" width="220" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Structured clone data</text>
  <rect x="330" y="80" width="260" height="200" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">Shared Worker Processes</text>
  <rect x="350" y="140" width="220" height="35" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="460" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Receive on connect port</text>
  <rect x="350" y="185" width="220" height="35" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="460" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Process message</text>
  <rect x="350" y="230" width="220" height="35" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="460" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Broadcast to all ports</text>
  <rect x="610" y="80" width="240" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">All Tabs Receive</text>
  <rect x="630" y="140" width="200" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">port.onmessage handler</text>
  <rect x="630" y="185" width="200" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Each tab processes message</text>
  <rect x="630" y="230" width="200" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="730" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Update local UI state</text>
  <rect x="50" y="300" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Connection Lifecycle</text>
  <rect x="70" y="350" width="760" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Tab creates SharedWorker -> onconnect event -> port.start() -> port.onmessage -> port.postMessage</text>
  <rect x="50" y="410" width="800" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Best Practices</text>
  <rect x="70" y="460" width="760" height="45" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="487" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Start ports after setting up handlers | Track connected ports | Remove ports on disconnect | Handle port errors gracefully</text>
</svg>
