<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Mutation Observer Flow</text>
  
  <!-- DOM Tree -->
  <rect x="50" y="70" width="350" height="380" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="225" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">DOM Tree</text>
  
  <!-- Target Node -->
  <rect x="100" y="130" width="250" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="225" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Target Node (observed)</text>
  
  <!-- Children -->
  <rect x="120" y="220" width="80" height="40" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="160" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Child 1</text>
  
  <rect x="215" y="220" width="80" height="40" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="255" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Child 2</text>
  
  <!-- New Node -->
  <rect x="310" y="220" width="80" height="40" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="350" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">New Node</text>
  
  <!-- Mutation arrow -->
  <path d="M 300 240 L 310 240" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Observer -->
  <rect x="450" y="150" width="200" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="550" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">Observer</text>
  
  <rect x="470" y="200" width="160" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="550" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Options: childList, subtree</text>
  
  <!-- Arrow to Callback -->
  <path d="M 650 210 L 700 210" stroke="#647480" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Callback -->
  <rect x="700" y="150" width="150" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="775" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Callback</text>
  
  <rect x="720" y="200" width="110" height="50" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="775" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Process mutations</text>
  
  <!-- Entry Properties -->
  <rect x="50" y="470" width="800" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">MutationRecord: type, target, addedNodes, removedNodes, attributeName</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
