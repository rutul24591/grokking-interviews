<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Web Workers Architecture</text>
  
  <!-- Main Thread -->
  <rect x="50" y="70" width="280" height="380" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="190" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Main Thread</text>
  
  <rect x="70" y="120" width="240" height="60" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="190" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">UI Rendering (DOM)</text>
  
  <rect x="70" y="190" width="240" height="60" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="190" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">User Input Handling</text>
  
  <rect x="70" y="260" width="240" height="60" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="190" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Event Listeners</text>
  
  <rect x="70" y="330" width="240" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">postMessage / onmessage</text>
  
  <!-- Arrow to Worker 1 -->
  <path d="M 330 200 L 380 200" stroke="#0284c7" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  <text x="355" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">postMessage</text>
  
  <!-- Worker 1 -->
  <rect x="380" y="100" width="280" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="520" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Worker 1</text>
  
  <rect x="400" y="160" width="240" height="60" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="520" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Data Processing</text>
  
  <rect x="400" y="230" width="240" height="60" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="520" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Heavy Computation</text>
  
  <!-- Arrow to Worker 2 -->
  <path d="M 330 300 L 380 300" stroke="#0284c7" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  <text x="355" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">postMessage</text>
  
  <!-- Worker 2 -->
  <rect x="380" y="320" width="280" height="130" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="520" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Worker 2</text>
  
  <rect x="400" y="370" width="240" height="60" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="520" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Image Processing</text>
  
  <!-- Memory Separation Note -->
  <rect x="50" y="470" width="800" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Memory Separation: Each thread has separate memory space — data transferred via structured cloning or Transferable objects</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
