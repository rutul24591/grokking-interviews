<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Battery Status Flow</text>
  
  <!-- Get Battery -->
  <rect x="50" y="70" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Get Battery</text>
  <text x="140" y="145" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">getBattery()</text>
  
  <!-- Arrow to Battery Manager -->
  <path d="M 230 130 L 280 130" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Battery Manager -->
  <rect x="280" y="70" width="200" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">BatteryManager</text>
  
  <rect x="300" y="135" width="160" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="380" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">level, charging</text>
  
  <!-- Arrow to Monitor -->
  <path d="M 480 130 L 530 130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Monitor Changes -->
  <rect x="530" y="70" width="180" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="620" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Monitor Changes</text>
  <text x="620" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">levelchange</text>
  <text x="620" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">chargingchange</text>
  
  <!-- Arrow to Adapt -->
  <path d="M 710 130 L 760 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Adapt Behavior -->
  <rect x="760" y="70" width="120" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="820" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b21a8">Adapt</text>
  <text x="820" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Behavior</text>
  
  <!-- Battery Levels -->
  <rect x="50" y="210" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Battery Levels</text>
  
  <!-- Full -->
  <rect x="70" y="265" width="180" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="160" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Full (1.0)</text>
  <text x="160" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Normal operation</text>
  
  <!-- Medium -->
  <rect x="270" y="265" width="180" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="360" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Medium (0.5)</text>
  <text x="360" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Reduce animations</text>
  
  <!-- Low -->
  <rect x="470" y="265" width="180" height="60" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="560" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Low (0.2)</text>
  <text x="560" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Power save mode</text>
  
  <!-- Critical -->
  <rect x="670" y="265" width="180" height="60" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="760" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Critical (0.05)</text>
  <text x="760" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Warn user</text>
  
  <!-- Use Cases -->
  <rect x="50" y="330" width="400" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="250" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Use Cases</text>
  
  <rect x="70" y="380" width="360" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="250" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Reduce animations | Defer non-critical tasks | Power optimization</text>
  
  <!-- Privacy Note -->
  <rect x="470" y="330" width="380" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Privacy Considerations</text>
  
  <rect x="490" y="380" width="340" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Battery fingerprinting concern | Some browsers restrict access</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
