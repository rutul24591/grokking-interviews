<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Intersection Observer Flow</text>
  
  <!-- Viewport Container -->
  <rect x="50" y="70" width="400" height="350" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="250" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Viewport</text>
  
  <!-- Target Element 1 (Fully Visible) -->
  <rect x="80" y="120" width="340" height="60" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#15803d">Target 1 - 100% Visible</text>
  
  <!-- Target Element 2 (Partially Visible) -->
  <rect x="80" y="200" width="340" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#b45309">Target 2 - 50% Visible</text>
  
  <!-- Target Element 3 (Not Visible) -->
  <rect x="80" y="280" width="340" height="60" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#b91c1c">Target 3 - 0% Visible</text>
  
  <!-- Arrow to Observer -->
  <path d="M 450 250 L 500 250" stroke="#647480" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Observer Box -->
  <rect x="500" y="150" width="350" height="200" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="675" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">IntersectionObserver</text>
  
  <!-- Options -->
  <rect x="520" y="200" width="310" height="60" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="535" y="225" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Options:</text>
  <text x="535" y="245" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#6b21a8">threshold: [0, 0.5, 1]</text>
  
  <!-- Callback -->
  <rect x="520" y="280" width="310" height="50" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="675" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">Callback fires on intersection change</text>
  
  <!-- Entry Properties -->
  <rect x="50" y="440" width="800" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">IntersectionObserverEntry Properties</text>
  
  <text x="100" y="495" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475560">• target — observed element</text>
  <text x="300" y="495" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475560">• isIntersecting — true/false</text>
  <text x="500" y="495" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475560">• intersectionRatio — 0.0 to 1.0</text>
  <text x="700" y="495" text-anchor="start" font-family="monospace, sans-serif" font-size="10" fill="#475560">• boundingClientRect — element bounds</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
