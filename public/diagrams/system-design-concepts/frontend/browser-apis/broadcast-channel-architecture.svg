<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Broadcast Channel Architecture</text>
  <rect x="50" y="80" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0c4a6e">Tab 1</text>
  <rect x="50" y="140" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0c4a6e">Tab 2</text>
  <rect x="50" y="260" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0c4a6e">Tab 3</text>
  <rect x="350" y="150" width="200" height="200" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">BroadcastChannel</text>
  <rect x="370" y="210" width="160" height="40" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="450" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Same origin</text>
  <rect x="370" y="260" width="160" height="40" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="450" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Named channel</text>
  <rect x="370" y="310" width="160" height="40" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="450" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Structured clone</text>
  <rect x="670" y="80" width="180" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="760" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Message Router</text>
  <rect x="670" y="210" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="760" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#b45309">Event Handlers</text>
  <rect x="50" y="400" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Message Flow</text>
  <rect x="70" y="450" width="760" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">postMessage broadcasts to all subscribers | onmessage receives messages | Same-origin isolation prevents cross-origin leakage</text>
</svg>
