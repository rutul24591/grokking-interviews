<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Payment Security Flow</text>
  <rect x="50" y="80" width="380" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Client-Side Security</text>
  <rect x="70" y="140" width="340" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">HTTPS required for all payment operations</text>
  <rect x="70" y="185" width="340" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Tokenized payment data (not raw card numbers)</text>
  <rect x="70" y="230" width="340" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Browser handles sensitive data, not application</text>
  <rect x="470" y="80" width="380" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Server-Side Processing</text>
  <rect x="490" y="140" width="340" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Send token to payment processor (Stripe, etc.)</text>
  <rect x="490" y="185" width="340" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Never process raw payment data client-side</text>
  <rect x="490" y="230" width="340" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">PCI DSS compliance required</text>
  <rect x="50" y="300" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Security Architecture</text>
  <rect x="70" y="350" width="760" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Browser tokenizes -> Server receives token -> Processor authorizes -> Result returned -> Complete payment</text>
  <rect x="50" y="410" width="800" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Security Best Practices</text>
  <rect x="70" y="460" width="760" height="45" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="487" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Always use HTTPS | Never handle raw payment data | Use payment processor vault | Comply with PCI DSS | Validate server-side</text>
</svg>
