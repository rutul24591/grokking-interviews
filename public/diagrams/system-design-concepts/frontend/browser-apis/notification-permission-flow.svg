<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Notification Permission Flow</text>
  
  <!-- User Action -->
  <rect x="50" y="70" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">User Action</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Click enable</text>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">notifications</text>
  
  <!-- Arrow to Permission -->
  <path d="M 230 130 L 280 130" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Permission Request -->
  <rect x="280" y="70" width="200" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Permission Request</text>
  
  <rect x="300" y="135" width="160" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="380" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Allow notifications?</text>
  
  <!-- Arrow to Result -->
  <path d="M 480 130 L 530 130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Granted Path -->
  <rect x="530" y="70" width="180" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="620" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Granted</text>
  
  <rect x="550" y="135" width="140" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="620" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Enable notifications</text>
  
  <!-- Arrow to Display -->
  <path d="M 710 130 L 760 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Display Notification -->
  <rect x="760" y="70" width="120" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="820" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b21a8">Display</text>
  <text x="820" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Notification</text>
  <text x="820" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">shown</text>
  
  <!-- Denied Path -->
  <path d="M 380 200 L 380 250 L 530 250" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  <text x="390" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Denied</text>
  
  <!-- Denied Result -->
  <rect x="530" y="210" width="180" height="80" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="620" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b91c1c">Denied</text>
  
  <rect x="550" y="260" width="140" height="40" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="620" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Show settings link</text>
  
  <!-- Best Practices -->
  <rect x="50" y="310" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Best Practices</text>
  
  <rect x="70" y="365" width="760" height="60" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Request on user action (not page load) | Explain value before requesting | Handle denial gracefully with settings link</text>
  
  <!-- Use Cases -->
  <rect x="50" y="430" width="400" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="250" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Use Cases</text>
  
  <rect x="70" y="480" width="360" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="250" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Messages | Alerts | Updates | Reminders</text>
  
  <!-- Privacy Note -->
  <rect x="470" y="430" width="380" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Privacy Considerations</text>
  
  <rect x="490" y="480" width="340" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Respect user choice | Don't spam notifications</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
