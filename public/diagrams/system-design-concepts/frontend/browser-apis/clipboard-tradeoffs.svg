<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Clipboard Trade-offs</text>
  <rect x="50" y="80" width="260" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Async Clipboard API</text>
  <rect x="70" y="140" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Promise-based, modern</text>
  <rect x="70" y="185" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Supports multiple data types</text>
  <rect x="70" y="230" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Requires HTTPS and permission</text>
  <rect x="330" y="80" width="260" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">execCommand Fallback</text>
  <rect x="350" y="140" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Works everywhere</text>
  <rect x="350" y="185" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Deprecated, unreliable</text>
  <rect x="350" y="230" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Text-only, no images</text>
  <rect x="610" y="80" width="240" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Manual Fallback</text>
  <rect x="630" y="140" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Show text for manual copy</text>
  <rect x="630" y="185" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Always works</text>
  <rect x="630" y="230" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Extra user effort required</text>
  <rect x="50" y="280" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Data Type Support</text>
  <rect x="70" y="330" width="240" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Text: Full support</text>
  <rect x="330" y="330" width="240" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">HTML: Limited support</text>
  <rect x="590" y="330" width="240" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="710" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Images: Varies by browser</text>
  <rect x="50" y="410" width="800" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Recommendation</text>
  <rect x="70" y="460" width="760" height="45" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="487" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Use Async Clipboard API as primary | Fallback to execCommand for older browsers | Manual copy as last resort</text>
</svg>
