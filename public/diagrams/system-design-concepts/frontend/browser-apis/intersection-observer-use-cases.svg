<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Intersection Observer Use Cases</text>
  
  <!-- Lazy Loading -->
  <rect x="50" y="70" width="260" height="220" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Lazy Loading</text>
  
  <rect x="70" y="120" width="220" height="80" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="180" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#647480">Image Placeholder</text>
  
  <path d="M 180 210 L 180 240" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="70" y="250" width="220" height="80" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="180" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Image Loaded</text>
  
  <text x="70" y="320" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">• 50-80% bandwidth savings</text>
  <text x="70" y="340" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">• Faster initial page load</text>
  
  <!-- Infinite Scroll -->
  <rect x="330" y="70" width="260" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Infinite Scroll</text>
  
  <rect x="350" y="120" width="220" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="460" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Post 1</text>
  
  <rect x="350" y="170" width="220" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="460" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Post 2</text>
  
  <rect x="350" y="220" width="220" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-dasharray="4,4"/>
  <text x="460" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Sentinel</text>
  
  <text x="350" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">• Seamless content discovery</text>
  <text x="350" y="290" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">• No pagination friction</text>
  
  <!-- Scroll Animations -->
  <rect x="610" y="70" width="240" height="220" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Scroll Animations</text>
  
  <rect x="630" y="120" width="200" height="80" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="730" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#647480">Element (hidden)</text>
  
  <path d="M 730 210 L 730 240" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="630" y="250" width="200" height="80" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="730" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Element (animated)</text>
  
  <text x="630" y="320" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• Fade in on scroll</text>
  <text x="630" y="340" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• Engaging storytelling</text>
  
  <!-- Analytics -->
  <rect x="50" y="310" width="400" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="250" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">Analytics Tracking</text>
  
  <rect x="70" y="365" width="360" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="250" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Track impressions &amp; engagement time</text>
  
  <!-- Performance -->
  <rect x="470" y="310" width="380" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Performance Benefits</text>
  
  <rect x="490" y="365" width="340" height="50" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">No scroll event listeners | Browser-optimized batching</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
