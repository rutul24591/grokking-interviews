<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Battery Privacy Model</text>
  <rect x="50" y="80" width="380" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Privacy Risks</text>
  <rect x="70" y="140" width="340" height="40" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Battery level fingerprinting</text>
  <rect x="70" y="190" width="340" height="40" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Cross-site user tracking</text>
  <rect x="70" y="240" width="340" height="40" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Device identification</text>
  <rect x="470" y="80" width="380" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Browser Mitigations</text>
  <rect x="490" y="140" width="340" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Restrict high-precision values</text>
  <rect x="490" y="190" width="340" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Require user gesture for access</text>
  <rect x="490" y="240" width="340" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Return constant values in some browsers</text>
  <rect x="50" y="300" width="800" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Browser Support for Battery API</text>
  <rect x="70" y="350" width="240" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Chrome: Supported</text>
  <rect x="330" y="350" width="240" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Firefox: Restricted</text>
  <rect x="590" y="350" width="240" height="40" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="710" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Safari: Not Supported</text>
  <rect x="50" y="400" width="800" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">Best Practices</text>
  <rect x="70" y="450" width="760" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Use only for power optimization | Do not use for tracking | Provide fallback when unavailable | Respect user privacy</text>
</svg>
