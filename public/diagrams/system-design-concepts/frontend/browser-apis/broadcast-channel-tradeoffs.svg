<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Broadcast Channel Trade-offs</text>
  <rect x="50" y="80" width="260" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Simplicity</text>
  <rect x="70" y="140" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Simple API, easy to use</text>
  <rect x="70" y="185" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">No shared state management</text>
  <rect x="70" y="230" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">No message persistence</text>
  <rect x="330" y="80" width="260" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Shared Workers</text>
  <rect x="350" y="140" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Shared state across tabs</text>
  <rect x="350" y="185" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Complex port communication</text>
  <rect x="350" y="230" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">No Safari support</text>
  <rect x="610" y="80" width="240" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">localStorage Events</text>
  <rect x="630" y="140" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Universal browser support</text>
  <rect x="630" y="185" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">String-only data</text>
  <rect x="630" y="230" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Storage quota limits</text>
  <rect x="50" y="280" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Selection Criteria</text>
  <rect x="70" y="330" width="360" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Simple messaging: BroadcastChannel</text>
  <rect x="470" y="330" width="360" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="650" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Shared state: Shared Workers</text>
  <rect x="70" y="380" width="360" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="250" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Legacy support: localStorage</text>
  <rect x="470" y="380" width="360" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="650" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Cross-origin: postMessage with iframes</text>
  <rect x="50" y="420" width="800" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Best Practice</text>
  <rect x="70" y="470" width="760" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Use BroadcastChannel for simple same-origin messaging | Fallback to localStorage for older browsers</text>
</svg>
