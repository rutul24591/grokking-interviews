<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Mutation Observer Comparison</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Polling vs Observer, specific node vs subtree observation</text>
  
  <!-- Polling vs Observer -->
  <rect x="30" y="100" width="400" height="220" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="230" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Polling vs Observer</text>
  
  <rect x="50" y="155" width="360" height="150" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- Polling -->
  <rect x="65" y="175" width="150" height="60" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="140" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#b91c1c">Polling</text>
  <text x="140" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b91c1c">setInterval check</text>
  
  <path d="M 225 205 L 255 205" stroke="#647480" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  
  <!-- Observer -->
  <rect x="265" y="175" width="150" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="340" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#15803d">Observer</text>
  <text x="340" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">Async notification</text>
  
  <!-- Comparison table -->
  <rect x="65" y="250" width="330" height="45" rx="3" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="80" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#475560">Polling: Inefficient, latency</text>
  <text x="80" y="285" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#475560">Observer: Efficient, immediate</text>
  
  <!-- Specific Node vs Subtree -->
  <rect x="450" y="100" width="420" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Observation Scope</text>
  
  <rect x="465" y="155" width="390" height="150" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Specific Node -->
  <rect x="480" y="175" width="170" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="565" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#b45309">Specific Node</text>
  <text x="565" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">Minimal overhead</text>
  
  <path d="M 660 205 L 690 205" stroke="#647480" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  
  <!-- Subtree -->
  <rect x="700" y="175" width="140" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="770" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#b45309">Subtree</text>
  <text x="770" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">Comprehensive</text>
  
  <!-- Comparison table -->
  <rect x="480" y="250" width="360" height="45" rx="3" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="495" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#475560">Specific: Precise, misses descendants</text>
  <text x="495" y="285" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#475560">Subtree: Complete, higher overhead</text>
  
  <!-- Browser Support -->
  <rect x="30" y="340" width="400" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="230" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Browser Support</text>
  
  <rect x="50" y="390" width="360" height="40" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="65" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">✓ Chrome 26+, Firefox 14+, Safari 6.1+</text>
  <text x="250" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626">✗ Internet Explorer</text>
  
  <!-- Performance Comparison -->
  <rect x="450" y="340" width="420" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="660" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15803d">Performance</text>
  
  <rect x="465" y="390" width="390" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="480" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Observer: Batched, async, efficient</text>
  <text x="480" y="430" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Polling: Frequent DOM queries, wasteful</text>
  
  <!-- Key Takeaway -->
  <rect x="30" y="460" width="840" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Key Takeaway</text>
  <text x="450" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Mutation Observer is the modern, efficient replacement for polling and mutation events</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
