<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Resize Observer Flow</text>
  
  <!-- Container -->
  <rect x="50" y="70" width="400" height="380" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="250" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Container</text>
  
  <!-- Target Element (Before) -->
  <rect x="100" y="130" width="300" height="100" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="250" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#b45309">Target Element</text>
  <text x="250" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">300×100px</text>
  
  <!-- Resize Arrow -->
  <path d="M 250 240 L 250 280" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text x="260" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Container resizes</text>
  
  <!-- Target Element (After) -->
  <rect x="100" y="290" width="200" height="100" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="200" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#15803d">Target Element</text>
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">200×100px</text>
  
  <!-- Observer -->
  <rect x="500" y="150" width="350" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="675" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">ResizeObserver</text>
  
  <rect x="520" y="200" width="310" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="675" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Callback receives ResizeObserverEntry</text>
  
  <!-- Arrow from Container to Observer -->
  <path d="M 450 250 L 500 250" stroke="#647480" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  
  <!-- Entry Properties -->
  <rect x="50" y="470" width="800" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">ResizeObserverEntry: target, contentRect, borderBoxSize, contentBoxSize</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
