<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Lazy Loading Patterns</text>
  
  <!-- Image Lazy Loading -->
  <rect x="50" y="70" width="260" height="220" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Image Lazy Loading</text>
  
  <rect x="70" y="120" width="220" height="80" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="180" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#647480">Placeholder</text>
  
  <path d="M 180 210 L 180 240" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text x="190" y="230" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Intersects</text>
  
  <rect x="70" y="250" width="220" height="80" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="180" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Image Loaded</text>
  
  <!-- Content Prefetching -->
  <rect x="330" y="70" width="260" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Content Prefetching</text>
  
  <rect x="350" y="120" width="220" height="80" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="4,4"/>
  <text x="460" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">rootMargin: 200px</text>
  
  <path d="M 460 210 L 460 240" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="350" y="250" width="220" height="80" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="460" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Content Preloaded</text>
  
  <!-- Component Lazy Loading -->
  <rect x="610" y="70" width="240" height="220" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Component Lazy Loading</text>
  
  <rect x="630" y="120" width="200" height="80" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="730" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#647480">Component (not rendered)</text>
  
  <path d="M 730 210 L 730 240" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <text x="740" y="230" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Visible</text>
  
  <rect x="630" y="250" width="200" height="80" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="730" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Component (rendered)</text>
  
  <!-- Performance Impact -->
  <rect x="50" y="310" width="800" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Performance Impact</text>
  
  <rect x="70" y="355" width="240" height="50" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">50-80% initial load reduction</text>
  
  <rect x="330" y="355" width="240" height="50" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Faster Time to Interactive</text>
  
  <rect x="590" y="355" width="240" height="50" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="710" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Reduced bandwidth usage</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
