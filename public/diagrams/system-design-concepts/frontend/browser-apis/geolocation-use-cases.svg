<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Geolocation Use Cases</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Delivery tracking, nearby businesses, fitness tracking, local content</text>
  
  <!-- Delivery Tracking -->
  <rect x="30" y="100" width="280" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="170" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Delivery Tracking</text>
  
  <rect x="50" y="155" width="240" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- Map with driver -->
  <rect x="65" y="175" width="210" height="70" rx="3" fill="#f1f5f9" stroke="#cbd5e1"/>
  <circle cx="120" cy="210" r="8" fill="#0284c7"/>
  <text x="120" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#0369a1">Driver</text>
  <path d="M 120 210 L 180 210" stroke="#0284c7" stroke-width="2" stroke-dasharray="4,4"/>
  <circle cx="180" cy="210" r="5" fill="#ef4444"/>
  <text x="180" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b91c1c">You</text>
  
  <text x="65" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• watchPosition (continuous)</text>
  <text x="65" y="290" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• High accuracy for ETA</text>
  <text x="65" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• Clear watch on delivery</text>
  
  <!-- Nearby Businesses -->
  <rect x="330" y="100" width="280" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Nearby Businesses</text>
  
  <rect x="350" y="155" width="240" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Map with pins -->
  <rect x="365" y="175" width="210" height="70" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <circle cx="420" cy="210" r="6" fill="#ef4444"/>
  <circle cx="480" cy="200" r="6" fill="#ef4444"/>
  <circle cx="520" cy="220" r="6" fill="#ef4444"/>
  <text x="470" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">Nearby places</text>
  
  <text x="365" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">• getCurrentPosition (one-time)</text>
  <text x="365" y="290" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">• WiFi accuracy sufficient</text>
  <text x="365" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">• Manual fallback if denied</text>
  
  <!-- Fitness Tracking -->
  <rect x="630" y="100" width="240" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="750" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Fitness Tracking</text>
  
  <rect x="650" y="155" width="200" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- Route trace -->
  <rect x="665" y="175" width="170" height="70" rx="3" fill="#f0fdf4" stroke="#22c55e"/>
  <path d="M 680 210 Q 720 180 750 210 T 820 210" stroke="#22c55e" stroke-width="2" fill="none"/>
  <text x="750" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">Route trace</text>
  
  <text x="665" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">• watchPosition + highAccuracy</text>
  <text x="665" y="290" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">• GPS for distance accuracy</text>
  <text x="665" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">• Background permission needed</text>
  
  <!-- Local Content -->
  <rect x="30" y="320" width="400" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="230" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Local Content</text>
  
  <rect x="50" y="375" width="360" height="50" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="65" y="400" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">• getCurrentPosition or IP fallback</text>
  <text x="65" y="420" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">• City-level accuracy sufficient</text>
  
  <!-- Permission Flow -->
  <rect x="450" y="320" width="420" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Permission Best Practices</text>
  
  <rect x="465" y="375" width="390" height="50" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="480" y="400" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">• Request on user action (not page load)</text>
  <text x="480" y="420" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">• Explain why before requesting</text>
  
  <!-- Privacy Note -->
  <rect x="30" y="460" width="400" height="70" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="230" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">Privacy Considerations</text>
  <text x="230" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Only request when needed, be transparent, provide manual alternative</text>
  
  <!-- Battery Note -->
  <rect x="450" y="460" width="420" height="70" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="660" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#15803d">Battery Impact</text>
  <text x="660" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">GPS drains 10-20%/hour | WiFi/cell much less | Clear watch when done</text>
</svg>
