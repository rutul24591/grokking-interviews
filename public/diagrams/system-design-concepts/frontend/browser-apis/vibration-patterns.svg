<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Vibration Patterns</text>
  
  <!-- Single Vibration -->
  <rect x="50" y="70" width="260" height="220" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Single Vibration</text>
  
  <rect x="70" y="130" width="220" height="60" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="180" y="165" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#647480">vibrate(1000)</text>
  
  <path d="M 180 200 L 180 230" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="70" y="240" width="220" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="180" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Vibrate 1 second</text>
  
  <text x="70" y="320" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">• Simple notification</text>
  <text x="70" y="340" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">• Button feedback</text>
  
  <!-- Pattern Vibration -->
  <rect x="330" y="70" width="260" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Pattern Vibration</text>
  
  <rect x="350" y="130" width="220" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="460" y="165" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#b45309">vibrate([200,100,200])</text>
  
  <path d="M 460 200 L 460 230" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="350" y="240" width="220" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="460" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Vibrate-Pause-Vibrate</text>
  
  <text x="350" y="320" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">• Custom patterns</text>
  <text x="350" y="340" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">• Morse code</text>
  <text x="350" y="360" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">• Distinct alerts</text>
  
  <!-- Cancel Vibration -->
  <rect x="610" y="70" width="240" height="220" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Cancel Vibration</text>
  
  <rect x="630" y="130" width="200" height="60" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="730" y="165" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#15803d">vibrate(0)</text>
  
  <path d="M 730 200 L 730 230" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="630" y="240" width="200" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="730" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Stop vibration</text>
  
  <text x="630" y="320" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• User leaves page</text>
  <text x="630" y="340" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• Cancel alert</text>
  <text x="630" y="360" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• Stop ongoing pattern</text>
  
  <!-- Use Cases -->
  <rect x="50" y="310" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Use Cases</text>
  
  <rect x="70" y="365" width="760" height="60" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Mobile game feedback | Notification alerts | Accessibility (haptic feedback for visually impaired)</text>
  
  <!-- Platform Support -->
  <rect x="50" y="430" width="400" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="250" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Platform Support</text>
  
  <rect x="70" y="480" width="360" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="250" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Android | ✗ iOS Safari</text>
  
  <!-- Best Practices -->
  <rect x="470" y="430" width="380" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Best Practices</text>
  
  <rect x="490" y="480" width="340" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Use sparingly | Provide value | Respect user preferences</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
