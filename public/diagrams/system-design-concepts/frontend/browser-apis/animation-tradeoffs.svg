<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Animation Trade-offs</text>
  <rect x="50" y="80" width="260" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Web Animations API</text>
  <rect x="70" y="140" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Full programmatic control</text>
  <rect x="70" y="185" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">JavaScript-driven logic</text>
  <rect x="70" y="230" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">More complex setup</text>
  <rect x="330" y="80" width="260" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">CSS Animations</text>
  <rect x="350" y="140" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Declarative, simpler</text>
  <rect x="350" y="185" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Limited runtime control</text>
  <rect x="350" y="230" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Good browser support</text>
  <rect x="610" y="80" width="240" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Animation Libraries</text>
  <rect x="630" y="140" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">GSAP, Anime.js, Framer</text>
  <rect x="630" y="185" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Rich feature sets</text>
  <rect x="630" y="230" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Adds bundle size</text>
  <rect x="50" y="280" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">When to Use Each</text>
  <rect x="70" y="330" width="240" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Simple: CSS animations</text>
  <rect x="330" y="330" width="240" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Complex: Web Animations API</text>
  <rect x="590" y="330" width="240" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="710" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Advanced: GSAP/Anime.js</text>
  <rect x="50" y="410" width="800" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Recommendation</text>
  <rect x="70" y="460" width="760" height="45" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="487" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Use CSS for simple transitions | Use Web Animations API for interactive animations | Use libraries for complex timelines</text>
</svg>
