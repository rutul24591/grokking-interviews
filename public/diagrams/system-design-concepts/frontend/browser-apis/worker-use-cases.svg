<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Worker Use Cases</text>
  
  <!-- Data Processing -->
  <rect x="50" y="70" width="260" height="220" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Data Processing</text>
  
  <rect x="70" y="120" width="220" height="60" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="180" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#647480">Large JSON/Array</text>
  
  <path d="M 180 190 L 180 220" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="70" y="230" width="220" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="180" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Processed Result</text>
  
  <text x="70" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">• Parse large JSON</text>
  <text x="70" y="330" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">• Filter/sort arrays</text>
  <text x="70" y="350" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">• Aggregate data</text>
  
  <!-- Image Processing -->
  <rect x="330" y="70" width="260" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Image Processing</text>
  
  <rect x="350" y="120" width="220" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="460" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Image + Filter</text>
  
  <path d="M 460 190 L 460 220" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="350" y="230" width="220" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="460" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Processed Image</text>
  
  <text x="350" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">• Image filters</text>
  <text x="350" y="330" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">• Resize/convert</text>
  <text x="350" y="350" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">• Use Transferable</text>
  
  <!-- Complex Calculations -->
  <rect x="610" y="70" width="240" height="220" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Complex Calculations</text>
  
  <rect x="630" y="120" width="200" height="60" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="730" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Encryption/Hash</text>
  
  <path d="M 730 190 L 730 220" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="630" y="230" width="200" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="730" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Result</text>
  
  <text x="630" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• Encryption</text>
  <text x="630" y="330" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• Hashing</text>
  <text x="630" y="350" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">• ML inference</text>
  
  <!-- Background Polling -->
  <rect x="50" y="310" width="400" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="250" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">Background Polling</text>
  
  <rect x="70" y="360" width="360" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="250" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Periodic data fetching | Keep connection alive</text>
  
  <!-- Best Practices -->
  <rect x="470" y="310" width="380" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Best Practices</text>
  
  <rect x="490" y="360" width="340" height="50" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Terminate workers when done | Use Transferable for large data</text>
  
  <!-- Performance Note -->
  <rect x="50" y="410" width="800" height="60" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Performance Impact: Workers keep UI responsive | Message passing has overhead | Use for tasks >100ms</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
