<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Worker Message Flow</text>
  
  <!-- Main Thread -->
  <rect x="50" y="70" width="250" height="380" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="175" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Main Thread</text>
  
  <rect x="70" y="120" width="210" height="60" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="175" y="155" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#0369a1">new Worker()</text>
  
  <path d="M 175 190 L 175 220" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="70" y="230" width="210" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="175" y="265" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#15803d">worker.postMessage()</text>
  
  <path d="M 175 300 L 175 330" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="70" y="340" width="210" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="175" y="375" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#b45309">worker.onmessage</text>
  
  <path d="M 175 410 L 175 440" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="70" y="450" width="210" height="60" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="175" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Update UI with result</text>
  
  <!-- Arrow to Worker -->
  <path d="M 300 260 L 350 260" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <text x="325" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Message with data</text>
  
  <!-- Worker Thread -->
  <rect x="350" y="70" width="250" height="380" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="475" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Worker Thread</text>
  
  <rect x="370" y="120" width="210" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="475" y="155" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#b45309">self.onmessage</text>
  
  <path d="M 475 190 L 475 220" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="370" y="230" width="210" height="60" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="475" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Process data</text>
  
  <path d="M 475 300 L 475 330" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <rect x="370" y="340" width="210" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="475" y="375" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#15803d">postMessage(result)</text>
  
  <!-- Arrow back to Main -->
  <path d="M 600 370 L 650 370" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow)" fill="none"/>
  <text x="625" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Result message</text>
  
  <!-- Data Transfer Note -->
  <rect x="50" y="470" width="800" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Data Transfer: Structured cloning (copy) for regular data | Transferable objects (zero-copy) for ArrayBuffer, ImageBitmap</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
