<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Battery Adaptation Strategies</text>
  <rect x="50" y="80" width="260" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">High Battery</text>
  <rect x="70" y="140" width="220" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Full features enabled</text>
  <rect x="70" y="190" width="220" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Animations enabled</text>
  <rect x="330" y="80" width="260" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Medium Battery</text>
  <rect x="350" y="140" width="220" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Reduce animations</text>
  <rect x="350" y="190" width="220" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Defer background tasks</text>
  <rect x="610" y="80" width="240" height="200" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b91c1c">Low Battery</text>
  <rect x="630" y="140" width="200" height="40" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="730" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Disable animations</text>
  <rect x="630" y="190" width="200" height="40" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="730" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Minimal features only</text>
  <rect x="50" y="300" width="800" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Adaptation Flow</text>
  <rect x="70" y="350" width="760" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Monitor battery level via BatteryManager | Adjust app features based on level | Warn user at critical levels</text>
  <rect x="50" y="400" width="800" height="120" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Event Handlers</text>
  <rect x="70" y="450" width="760" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">levelchange | chargingchange | chargingtimechange | dischargingtimechange</text>
</svg>
