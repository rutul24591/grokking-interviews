<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Component Composition Patterns</text>
  
  <!-- Children Prop -->
  <rect x="50" y="80" width="400" height="140" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Children Prop</text>
  <text x="250" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e3a8a">Simplest composition</text>
  
  <rect x="70" y="155" width="360" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">&lt;Card&gt;&lt;h2&gt;Title&lt;/h2&gt;&lt;/Card&gt;</text>
  <text x="250" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Single insertion point, clean syntax</text>
  
  <!-- Named Slots -->
  <rect x="470" y="80" width="400" height="140" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Named Slots</text>
  <text x="670" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4338ca">Multiple insertion points</text>
  
  <rect x="490" y="155" width="360" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="670" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">&lt;Card header={...} body={...} footer={...}/&gt;</text>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Multiple distinct sections</text>
  
  <!-- Render Props -->
  <rect x="50" y="240" width="400" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Render Props</text>
  <text x="250" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78350f">Function as prop</text>
  
  <rect x="70" y="315" width="360" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">&lt;DataFetcher render={(data) =&gt; ...}/&gt;</text>
  <text x="250" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Component passes data to render function</text>
  
  <!-- Compound Components -->
  <rect x="470" y="240" width="400" height="140" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="670" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Compound Components</text>
  <text x="670" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#047857">Context-based composition</text>
  
  <rect x="490" y="315" width="360" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="670" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">&lt;Select&gt;&lt;Option value="1"/&gt;&lt;Option value="2"/&gt;&lt;/Select&gt;</text>
  <text x="670" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Shared state via context</text>
  
  <!-- HOCs -->
  <rect x="50" y="400" width="400" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Higher-Order Components</text>
  <text x="250" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Function wrapping components</text>
  
  <rect x="70" y="475" width="360" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">const Enhanced = withAuth(Component)</text>
  <text x="250" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Adds functionality by wrapping</text>
  
  <!-- Hooks -->
  <rect x="470" y="400" width="400" height="140" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="670" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Custom Hooks</text>
  <text x="670" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Logic reuse without wrapping</text>
  
  <rect x="490" y="475" width="360" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="670" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">const data = useDataFetcher(url)</text>
  <text x="670" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Modern approach for logic reuse</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Choose pattern based on needs: children for simple, compound for cohesive APIs, hooks for modern logic reuse</text>
</svg>
