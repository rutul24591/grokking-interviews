<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Smart vs Dumb Components</text>
  
  <!-- Smart/Container -->
  <rect x="50" y="80" width="400" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#92400e">Smart (Container)</text>
  <text x="250" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#78350f">Manages State &amp; Logic</text>
  
  <!-- Responsibilities -->
  <rect x="70" y="170" width="360" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Responsibilities</text>
  <text x="250" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Connects to data sources (API, store)</text>
  <text x="250" y="260" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Manages application state</text>
  <text x="250" y="285" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Handles business logic</text>
  
  <!-- Example -->
  <rect x="70" y="305" width="360" height="80" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">Example</text>
  <text x="250" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">UserContainer fetches user data,</text>
  <text x="250" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">passes to UserProfile</text>
  
  <!-- Arrow -->
  <line x1="450" y1="250" x2="500" y2="250" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow1)"/>
  <text x="475" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">passes props</text>
  
  <!-- Dumb/Presentational -->
  <rect x="500" y="80" width="370" height="220" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="685" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#065f46">Dumb (Presentational)</text>
  <text x="685" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#047857">Manages UI Only</text>
  
  <!-- Responsibilities -->
  <rect x="520" y="170" width="330" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="685" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Responsibilities</text>
  <text x="685" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Receives data via props</text>
  <text x="685" y="260" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Emits events via callbacks</text>
  <text x="685" y="285" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Pure function of props</text>
  
  <!-- Example -->
  <rect x="520" y="305" width="330" height="80" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="685" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#065f46">Example</text>
  <text x="685" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">UserProfile renders user data,</text>
  <text x="685" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">doesn't know data source</text>
  
  <!-- Benefits -->
  <rect x="50" y="320" width="820" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="460" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Benefits of Separation</text>
  
  <!-- Benefit 1 -->
  <rect x="70" y="380" width="380" height="130" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="260" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Reusability</text>
  <text x="260" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Dumb components work with any data source.</text>
  <text x="260" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">UserProfile can render any user data,</text>
  <text x="260" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">not tied to specific API</text>
  
  <!-- Benefit 2 -->
  <rect x="470" y="380" width="380" height="130" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Testability</text>
  <text x="660" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Test dumb components with props.</text>
  <text x="660" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Test smart components by mocking</text>
  <text x="660" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">data sources</text>
  
  <!-- Modern Approach -->
  <rect x="50" y="545" width="820" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="460" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Modern approach: Custom hooks contain smart logic, components use hooks and remain presentational. Separation of concerns remains essential</text>
</svg>
