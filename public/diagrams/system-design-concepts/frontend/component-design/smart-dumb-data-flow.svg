<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Smart vs Dumb Data Flow</text>
  
  <!-- Smart Component -->
  <rect x="50" y="80" width="350" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="225" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#92400e">Smart Component</text>
  <text x="225" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#78350f">(Container)</text>
  
  <rect x="70" y="165" width="310" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="225" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Fetches from API/Store</text>
  <text x="225" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Manages state</text>
  <text x="225" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Handles business logic</text>
  
  <!-- Data Flow Arrow Down -->
  <line x1="225" y1="260" x2="225" y2="300" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrowDown)"/>
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="245" y="285" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#f59e0b" font-weight="600">props down</text>
  
  <!-- Dumb Component -->
  <rect x="50" y="300" width="350" height="180" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="225" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#065f46">Dumb Component</text>
  <text x="225" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#047857">(Presentational)</text>
  
  <rect x="70" y="385" width="310" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="225" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Receives data via props</text>
  <text x="225" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Renders UI</text>
  <text x="225" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Emits events via callbacks</text>
  
  <!-- Event Flow Arrow Up -->
  <line x1="425" y1="390" x2="425" y2="170" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowUp)"/>
  <defs>
    <marker id="arrowUp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="445" y="285" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#3b82f6" font-weight="600">events up</text>
  
  <!-- External Data Sources -->
  <rect x="450" y="80" width="400" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="650" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Data Sources</text>
  
  <rect x="470" y="135" width="360" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="650" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">REST API / GraphQL</text>
  
  <rect x="470" y="195" width="360" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="650" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3730a3">Redux / Zustand Store</text>
  
  <!-- User Interaction -->
  <rect x="450" y="300" width="400" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="650" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">User Interactions</text>
  
  <rect x="470" y="355" width="360" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="650" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">onClick, onChange, onSubmit</text>
  
  <rect x="470" y="415" width="360" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="650" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#065f46">Callback handlers in Smart</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Unidirectional flow: Data flows down via props, events flow up via callbacks. Smart components connect to data sources, dumb components render UI</text>
</svg>
