<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">HOC Wrapper Chain</text>
  
  <!-- Base Component -->
  <rect x="50" y="100" width="180" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">UserProfile</text>
  <text x="140" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Base Component</text>
  <text x="140" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Renders UI</text>
  
  <!-- Arrow 1 -->
  <line x1="230" y1="150" x2="280" y2="150" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="255" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" font-weight="600">withAuth</text>
  
  <!-- HOC 1 -->
  <rect x="280" y="100" width="180" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">withAuth</text>
  <text x="370" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Adds auth check</text>
  <text x="370" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Injects user prop</text>
  
  <!-- Arrow 2 -->
  <line x1="460" y1="150" x2="510" y2="150" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="485" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b" font-weight="600">withData</text>
  
  <!-- HOC 2 -->
  <rect x="510" y="100" width="180" height="100" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">withData</text>
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Fetches data</text>
  <text x="600" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Injects data prop</text>
  
  <!-- Arrow 3 -->
  <line x1="690" y1="150" x2="740" y2="150" stroke="#10b981" stroke-width="3" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  <text x="715" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#10b981" font-weight="600">withMemo</text>
  
  <!-- Enhanced Component -->
  <rect x="740" y="100" width="130" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="805" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">Enhanced</text>
  <text x="805" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">UserProfile</text>
  <text x="805" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">+ auth + data + memo</text>
  
  <!-- Problems -->
  <rect x="50" y="240" width="820" height="290" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="460" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Wrapper Hell Problems</text>
  
  <!-- Problem 1 -->
  <rect x="70" y="300" width="380" height="100" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="260" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Debugging Difficulty</text>
  <text x="260" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">Deep wrapper trees in DevTools</text>
  <text x="260" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">Hard to find actual component</text>
  
  <!-- Problem 2 -->
  <rect x="470" y="300" width="380" height="100" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="660" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Prop Namespace Collisions</text>
  <text x="660" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">Multiple HOCs inject same prop name</text>
  <text x="660" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">Outermost HOC wins silently</text>
  
  <!-- Solution -->
  <rect x="70" y="420" width="780" height="90" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="460" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#065f46">Solution: Use Hooks Instead</text>
  <text x="460" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Hooks provide logic reuse without wrapper chains. Clean syntax, no prop collisions, better DevTools experience.</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">HOC composition: withAuth(withData(withMemo(Component))). Each HOC adds a wrapper layer. Hooks avoid this problem entirely</text>
</svg>
