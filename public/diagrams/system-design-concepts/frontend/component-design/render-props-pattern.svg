<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Render Props Pattern</text>
  
  <!-- Basic Pattern -->
  <rect x="50" y="80" width="800" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Basic Render Props Pattern</text>
  
  <rect x="70" y="135" width="760" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="90" y="165" font-family="monospace" font-size="10" fill="#22c55e">&lt;Mouse&gt;</text>
  <text x="110" y="185" font-family="monospace" font-size="10" fill="#f59e0b">render={(mouse) =&gt; (</text>
  <text x="130" y="205" font-family="monospace" font-size="10" fill="#e2e8f0">&lt;Cat mouse={mouse} /&gt;</text>
  <text x="110" y="225" font-family="monospace" font-size="10" fill="#f59e0b">)}</text>
  <text x="90" y="245" font-family="monospace" font-size="10" fill="#22c55e">&lt;/Mouse&gt;</text>
  
  <!-- Children as Function -->
  <rect x="50" y="250" width="400" height="140" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e40af">Children as Function</text>
  
  <rect x="70" y="305" width="360" height="75" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="90" y="330" font-family="monospace" font-size="10" fill="#22c55e">&lt;Mouse&gt;</text>
  <text x="110" y="350" font-family="monospace" font-size="10" fill="#f59e0b">{(mouse) =&gt; &lt;Cat mouse={mouse}/&gt;}</text>
  <text x="90" y="370" font-family="monospace" font-size="10" fill="#22c55e">&lt;/Mouse&gt;</text>
  
  <!-- Named Render Prop -->
  <rect x="470" y="250" width="400" height="140" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="670" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#3730a3">Named Render Prop</text>
  
  <rect x="490" y="305" width="360" height="75" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="510" y="330" font-family="monospace" font-size="10" fill="#22c55e">&lt;Mouse</text>
  <text x="530" y="350" font-family="monospace" font-size="10" fill="#f59e0b">render={(mouse) =&gt; &lt;Cat mouse={mouse}/&gt;}</text>
  <text x="510" y="370" font-family="monospace" font-size="10" fill="#22c55e">/&gt;</text>
  
  <!-- Use Cases -->
  <rect x="50" y="410" width="820" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="460" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Common Use Cases</text>
  
  <rect x="70" y="465" width="180" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="160" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Data Fetching</text>
  <text x="160" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Pass data to render</text>
  
  <rect x="270" y="465" width="180" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="360" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Event Handling</text>
  <text x="360" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Pass event data</text>
  
  <rect x="470" y="465" width="180" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="560" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Animation</text>
  <text x="560" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Pass animation state</text>
  
  <rect x="670" y="465" width="180" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="760" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Virtual Lists</text>
  <text x="760" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Render visible items</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="820" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="460" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Render props: Component receives function prop, calls it with data, renders result. Enables flexible composition with data sharing</text>
</svg>
