<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Atomic Design Hierarchy</text>
  
  <!-- Atoms -->
  <rect x="50" y="80" width="800" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="110" text-anchor="start" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Atoms</text>
  <text x="100" y="135" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#1e3a8a">Basic building blocks - Buttons, Inputs, Labels, Icons, Colors</text>
  
  <!-- Atom examples -->
  <circle cx="650" cy="120" r="25" fill="#3b82f6"/>
  <text x="650" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">Btn</text>
  
  <rect x="690" y="95" width="50" height="50" rx="4" fill="#60a5fa"/>
  <text x="715" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">Input</text>
  
  <rect x="755" y="95" width="50" height="50" rx="25" fill="#93c5fd"/>
  <text x="780" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Icon</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="160" x2="450" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Molecules -->
  <rect x="50" y="180" width="800" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="100" y="210" text-anchor="start" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Molecules</text>
  <text x="100" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#4338ca">Groups of atoms - Search Form, Card Header, Input Group</text>
  
  <!-- Molecule examples -->
  <rect x="600" y="195" width="100" height="50" rx="4" fill="#6366f1"/>
  <text x="650" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">Search Form</text>
  
  <rect x="715" y="195" width="100" height="50" rx="4" fill="#818cf8"/>
  <text x="765" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">Card Header</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="260" x2="450" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Organisms -->
  <rect x="50" y="280" width="800" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="100" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Organisms</text>
  <text x="100" y="335" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#78350f">Complex sections - Navigation, Product Card, Footer</text>
  
  <!-- Organism examples -->
  <rect x="550" y="295" width="140" height="50" rx="4" fill="#f59e0b"/>
  <text x="620" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">Navigation Bar</text>
  
  <rect x="705" y="295" width="140" height="50" rx="4" fill="#fbbf24"/>
  <text x="775" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">Product Card</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="360" x2="450" y2="380" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Templates -->
  <rect x="50" y="380" width="800" height="70" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="100" y="410" text-anchor="start" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Templates</text>
  <text x="100" y="435" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#047857">Page layouts without content - Dashboard, Article, Product Page</text>
  
  <!-- Arrow down -->
  <line x1="450" y1="450" x2="450" y2="470" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Pages -->
  <rect x="50" y="470" width="800" height="70" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="100" y="500" text-anchor="start" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Pages</text>
  <text x="100" y="525" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Templates with real content - Actual dashboard with user data</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Atoms → Molecules → Organisms → Templates → Pages: Each level builds on the previous</text>
</svg>
