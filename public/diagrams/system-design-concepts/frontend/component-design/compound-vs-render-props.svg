<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Compound Components vs Render Props</text>
  
  <!-- Render Props Approach -->
  <rect x="50" y="80" width="400" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#92400e">Render Props Approach</text>
  
  <rect x="70" y="135" width="360" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="90" y="165" font-family="monospace" font-size="9" fill="#22c55e">&lt;Select</text>
  <text x="110" y="185" font-family="monospace" font-size="9" fill="#f59e0b">renderOption={(option) =&gt; (</text>
  <text x="130" y="205" font-family="monospace" font-size="9" fill="#e2e8f0">&lt;Option key={option.id}&gt;</text>
  <text x="90" y="225" font-family="monospace" font-size="9" fill="#22c55e">}/&gt;</text>
  
  <rect x="70" y="235" width="360" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78350f">✓ Flexible rendering</text>
  <text x="250" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#78350f">✗ More verbose syntax</text>
  
  <!-- Arrow -->
  <line x1="450" y1="190" x2="500" y2="190" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Compound Components Approach -->
  <rect x="500" y="80" width="370" height="220" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="685" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#065f46">Compound Components</text>
  
  <rect x="520" y="135" width="330" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="540" y="165" font-family="monospace" font-size="9" fill="#22c55e">&lt;Select value={val}&gt;</text>
  <text x="560" y="185" font-family="monospace" font-size="9" fill="#e2e8f0">&lt;Option value="1"&gt;One&lt;/Option&gt;</text>
  <text x="560" y="205" font-family="monospace" font-size="9" fill="#e2e8f0">&lt;Option value="2"&gt;Two&lt;/Option&gt;</text>
  <text x="540" y="225" font-family="monospace" font-size="9" fill="#22c55e">&lt;/Select&gt;</text>
  
  <rect x="520" y="235" width="330" height="55" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="685" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#047857">✓ Clean JSX syntax</text>
  <text x="685" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#047857">✓ Implicit state sharing</text>
  
  <!-- Comparison Table -->
  <rect x="50" y="320" width="820" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="460" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">When to Use Each</text>
  
  <!-- Use Render Props -->
  <rect x="70" y="380" width="380" height="130" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="260" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Use Render Props When</text>
  <text x="260" y="440" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Component needs to control</text>
  <text x="260" y="460" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">  when render function is called</text>
  <text x="260" y="485" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Passing data to arbitrary children</text>
  <text x="260" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Working with class components</text>
  
  <!-- Use Compound -->
  <rect x="470" y="380" width="380" height="130" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Use Compound Components When</text>
  <text x="660" y="440" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Building cohesive component APIs</text>
  <text x="660" y="460" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Multiple related parts share state</text>
  <text x="660" y="485" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Clean JSX syntax is important</text>
  <text x="660" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Select, Accordion, Tabs, Form</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Compound components provide cleaner syntax for cohesive APIs. Render props offer more flexibility for arbitrary rendering</text>
</svg>
