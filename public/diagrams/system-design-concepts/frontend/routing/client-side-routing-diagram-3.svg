<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Data router architecture with parallel loader and component resolution</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Data Router Architecture: Parallel Loading</text>

  <!-- ===== TOP SECTION: Parallel Pattern ===== -->
  <text x="40" y="68" font-size="13" font-weight="700" fill="#6d5bd0">Data Router Pattern (Parallel)</text>

  <!-- URL Change trigger -->
  <rect x="40" y="82" width="130" height="56" rx="8" fill="#6d5bd0"/>
  <text x="105" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">URL Change</text>
  <text x="105" y="122" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">/users/123</text>

  <!-- Arrow from URL to Router -->
  <line x1="170" y1="110" x2="210" y2="110" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Router box -->
  <rect x="210" y="82" width="120" height="56" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="270" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Data Router</text>
  <text x="270" y="122" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Route matched</text>

  <!-- Fork: two parallel arrows from Router -->
  <!-- Upper arrow to Route Loader -->
  <path d="M 330 97 L 370 97 L 400 78" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow1)"/>
  <!-- Lower arrow to Component Import -->
  <path d="M 330 123 L 370 123 L 400 142" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Parallel indicator -->
  <rect x="355" y="100" width="50" height="20" rx="10" fill="#6d5bd0" opacity="0.15"/>
  <text x="380" y="114" text-anchor="middle" font-size="8" font-weight="700" fill="#6d5bd0">PARALLEL</text>

  <!-- Route Loader -->
  <rect x="400" y="55" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="480" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Route Loader</text>
  <text x="480" y="93" text-anchor="middle" font-size="9" fill="#6d5bd0">fetch('/api/users/123')</text>

  <!-- Component Import -->
  <rect x="400" y="118" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="480" y="139" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Component Import</text>
  <text x="480" y="156" text-anchor="middle" font-size="9" fill="#6d5bd0">import('./UserPage')</text>

  <!-- Join arrows to Render -->
  <path d="M 560 80 L 600 80 L 630 107" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow1)"/>
  <path d="M 560 143 L 600 143 L 630 117" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Render box -->
  <rect x="630" y="90" width="140" height="50" rx="8" fill="#6d5bd0"/>
  <text x="700" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Render</text>
  <text x="700" y="128" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.85">Data + Component ready</text>

  <!-- Painted screen -->
  <rect x="800" y="90" width="60" height="50" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="808" y="98" width="44" height="8" rx="2" fill="#6d5bd0" opacity="0.3"/>
  <rect x="808" y="110" width="44" height="4" rx="1" fill="#d7d1e6"/>
  <rect x="808" y="118" width="30" height="4" rx="1" fill="#d7d1e6"/>
  <rect x="808" y="126" width="44" height="8" rx="2" fill="#6d5bd0" opacity="0.15"/>
  <line x1="770" y1="115" x2="800" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Time bar for parallel -->
  <rect x="40" y="165" width="820" height="24" rx="4" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="55" y="181" font-size="9" font-weight="600" fill="#1a1822">Time:</text>
  <rect x="100" y="170" width="140" height="14" rx="3" fill="#6d5bd0" opacity="0.25"/>
  <text x="170" y="181" text-anchor="middle" font-size="8" fill="#6d5bd0" font-weight="600">Router + Match</text>
  <rect x="240" y="170" width="200" height="14" rx="3" fill="#6d5bd0" opacity="0.5"/>
  <text x="340" y="181" text-anchor="middle" font-size="8" fill="#ffffff" font-weight="600">Loader + Component (parallel)</text>
  <rect x="440" y="170" width="80" height="14" rx="3" fill="#6d5bd0"/>
  <text x="480" y="181" text-anchor="middle" font-size="8" fill="#ffffff" font-weight="600">Render</text>
  <text x="540" y="181" font-size="9" font-weight="700" fill="#6d5bd0">~400ms total</text>

  <!-- ===== Divider ===== -->
  <line x1="40" y1="210" x2="860" y2="210" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="390" y="200" width="120" height="20" rx="10" fill="#f3f1f8"/>
  <text x="450" y="214" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">vs.</text>

  <!-- ===== BOTTOM SECTION: Sequential Pattern ===== -->
  <text x="40" y="242" font-size="13" font-weight="700" fill="#1a1822" opacity="0.5">Traditional Pattern (Sequential)</text>

  <!-- URL Change trigger -->
  <rect x="40" y="256" width="110" height="50" rx="8" fill="#1a1822" opacity="0.15" stroke="#d7d1e6" stroke-width="1"/>
  <text x="95" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">URL Change</text>
  <text x="95" y="294" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.5">/users/123</text>

  <!-- Arrow -->
  <line x1="150" y1="281" x2="180" y2="281" stroke="#1a1822" stroke-width="1.5" opacity="0.3" marker-end="url(#arrow2)"/>

  <!-- Route Match -->
  <rect x="180" y="256" width="100" height="50" rx="8" fill="#1a1822" opacity="0.08" stroke="#d7d1e6" stroke-width="1"/>
  <text x="230" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">Route Match</text>

  <!-- Arrow -->
  <line x1="280" y1="281" x2="310" y2="281" stroke="#1a1822" stroke-width="1.5" opacity="0.3" marker-end="url(#arrow2)"/>

  <!-- Component Load -->
  <rect x="310" y="256" width="120" height="50" rx="8" fill="#1a1822" opacity="0.08" stroke="#d7d1e6" stroke-width="1"/>
  <text x="370" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">Component</text>
  <text x="370" y="290" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">Load</text>

  <!-- Arrow -->
  <line x1="430" y1="281" x2="460" y2="281" stroke="#1a1822" stroke-width="1.5" opacity="0.3" marker-end="url(#arrow2)"/>

  <!-- useEffect fetch -->
  <rect x="460" y="256" width="120" height="50" rx="8" fill="#1a1822" opacity="0.08" stroke="#d7d1e6" stroke-width="1"/>
  <text x="520" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">useEffect</text>
  <text x="520" y="290" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.5">fetch data</text>

  <!-- Arrow -->
  <line x1="580" y1="281" x2="610" y2="281" stroke="#1a1822" stroke-width="1.5" opacity="0.3" marker-end="url(#arrow2)"/>

  <!-- Render -->
  <rect x="610" y="256" width="100" height="50" rx="8" fill="#1a1822" opacity="0.15" stroke="#d7d1e6" stroke-width="1"/>
  <text x="660" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822" opacity="0.6">Render</text>
  <text x="660" y="294" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.5">with data</text>

  <!-- Time bar for sequential -->
  <rect x="40" y="318" width="820" height="24" rx="4" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="55" y="334" font-size="9" font-weight="600" fill="#1a1822" opacity="0.5">Time:</text>
  <rect x="100" y="323" width="100" height="14" rx="3" fill="#1a1822" opacity="0.1"/>
  <text x="150" y="334" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.5">Match</text>
  <rect x="200" y="323" width="150" height="14" rx="3" fill="#1a1822" opacity="0.15"/>
  <text x="275" y="334" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.5">Component Load</text>
  <rect x="350" y="323" width="180" height="14" rx="3" fill="#1a1822" opacity="0.2"/>
  <text x="440" y="334" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.6">Data Fetch (after mount)</text>
  <rect x="530" y="323" width="80" height="14" rx="3" fill="#1a1822" opacity="0.3"/>
  <text x="570" y="334" text-anchor="middle" font-size="8" fill="#1a1822" opacity="0.6">Render</text>
  <text x="630" y="334" font-size="9" font-weight="700" fill="#cc3333">~700ms total</text>

  <!-- ===== Comparison Summary ===== -->
  <rect x="40" y="365" width="820" height="120" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>

  <text x="450" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Why Data Routers Win</text>

  <!-- Three columns -->
  <!-- Column 1: No waterfalls -->
  <rect x="65" y="405" width="230" height="60" rx="8" fill="#6d5bd0" opacity="0.08"/>
  <text x="180" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">No Render+Fetch Waterfall</text>
  <text x="180" y="443" text-anchor="middle" font-size="9" fill="#1a1822">Data fetching starts before</text>
  <text x="180" y="456" text-anchor="middle" font-size="9" fill="#1a1822">the component even loads</text>

  <!-- Column 2: Parallel -->
  <rect x="315" y="405" width="230" height="60" rx="8" fill="#6d5bd0" opacity="0.08"/>
  <text x="430" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Parallel Execution</text>
  <text x="430" y="443" text-anchor="middle" font-size="9" fill="#1a1822">Loader + lazy import run</text>
  <text x="430" y="456" text-anchor="middle" font-size="9" fill="#1a1822">simultaneously via Promise.all</text>

  <!-- Column 3: Instant render -->
  <rect x="565" y="405" width="270" height="60" rx="8" fill="#6d5bd0" opacity="0.08"/>
  <text x="700" y="425" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">Instant Data Availability</text>
  <text x="700" y="443" text-anchor="middle" font-size="9" fill="#1a1822">Component receives data as props</text>
  <text x="700" y="456" text-anchor="middle" font-size="9" fill="#1a1822">on first render. No loading spinner.</text>

  <!-- Arrowhead defs -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822" opacity="0.3"/>
    </marker>
  </defs>
</svg>