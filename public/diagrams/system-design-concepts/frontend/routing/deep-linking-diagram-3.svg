<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Deferred deep linking flow from click through install to app launch</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Deferred Deep Linking Flow</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Preserving deep link context across app installation</text>

  <!-- Timeline line -->
  <line x1="80" y1="100" x2="820" y2="100" stroke="#d7d1e6" stroke-width="3"/>

  <!-- Step 1: Click -->
  <circle cx="120" cy="100" r="20" fill="#6d5bd0"/>
  <text x="120" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
  <rect x="40" y="135" width="160" height="90" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="120" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">User Clicks Link</text>
  <line x1="120" y1="120" x2="120" y2="135" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="120" y="178" text-anchor="middle" font-size="10" fill="#1a1822">Opens landing page</text>
  <text x="120" y="195" text-anchor="middle" font-size="10" fill="#6d5bd0">app.com/products/42</text>
  <text x="120" y="212" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">"Open in App" shown</text>

  <!-- Step 2: Save data -->
  <circle cx="290" cy="100" r="20" fill="#6d5bd0"/>
  <text x="290" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
  <rect x="210" y="135" width="160" height="90" rx="10" fill="#6d5bd0"/>
  <text x="290" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Save Link Data</text>
  <line x1="290" y1="120" x2="290" y2="135" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="290" y="178" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">Fingerprint stored:</text>
  <text x="290" y="195" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">IP, User-Agent, Screen</text>
  <text x="290" y="212" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Deep link: /products/42</text>

  <!-- Step 3: App Store -->
  <circle cx="460" cy="100" r="20" fill="#6d5bd0"/>
  <text x="460" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
  <rect x="380" y="135" width="160" height="90" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="460" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">App Store</text>
  <line x1="460" y1="120" x2="460" y2="135" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="460" y="178" text-anchor="middle" font-size="10" fill="#1a1822">User redirected to</text>
  <text x="460" y="195" text-anchor="middle" font-size="10" fill="#1a1822">App Store / Play Store</text>
  <text x="460" y="212" text-anchor="middle" font-size="10" fill="#6d5bd0">Downloads &amp; installs</text>

  <!-- Step 4: First launch -->
  <circle cx="630" cy="100" r="20" fill="#6d5bd0"/>
  <text x="630" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
  <rect x="550" y="135" width="160" height="90" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="630" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">First Launch</text>
  <line x1="630" y1="120" x2="630" y2="135" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="630" y="178" text-anchor="middle" font-size="10" fill="#1a1822">SDK initializes</text>
  <text x="630" y="195" text-anchor="middle" font-size="10" fill="#1a1822">Sends fingerprint to</text>
  <text x="630" y="212" text-anchor="middle" font-size="10" fill="#6d5bd0">attribution server</text>

  <!-- Step 5: Navigate -->
  <circle cx="800" cy="100" r="20" fill="#4caf50"/>
  <text x="800" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5</text>
  <rect x="720" y="135" width="160" height="90" rx="10" fill="#4caf50"/>
  <text x="800" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Deep Link Restored</text>
  <line x1="800" y1="120" x2="800" y2="135" stroke="#4caf50" stroke-width="1.5"/>
  <text x="800" y="178" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">Match found!</text>
  <text x="800" y="195" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">Navigate to</text>
  <text x="800" y="212" text-anchor="middle" font-size="10" fill="#ffffff">/products/42</text>

  <!-- Install gap indicator -->
  <rect x="330" y="70" width="200" height="18" rx="4" fill="#cc4444" opacity="0.15"/>
  <text x="430" y="83" text-anchor="middle" font-size="9" font-weight="700" fill="#cc4444">← INSTALL GAP →</text>

  <!-- Data persistence mechanism -->
  <rect x="30" y="270" width="840" height="110" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">How Data Survives the Install Gap</text>

  <!-- Three methods -->
  <rect x="50" y="310" width="240" height="55" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#d7d1e6" stroke-width="1"/>
  <text x="170" y="332" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Fingerprint Matching</text>
  <text x="170" y="350" text-anchor="middle" font-size="10" fill="#1a1822">IP + User-Agent + timestamp</text>
  <text x="170" y="362" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">~80% accuracy, probabilistic</text>

  <rect x="330" y="310" width="240" height="55" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="332" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Clipboard (iOS)</text>
  <text x="450" y="350" text-anchor="middle" font-size="10" fill="#1a1822">Copy link data to pasteboard</text>
  <text x="450" y="362" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Requires user permission (iOS 16+)</text>

  <rect x="610" y="310" width="240" height="55" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#d7d1e6" stroke-width="1"/>
  <text x="730" y="332" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Google Play Referrer</text>
  <text x="730" y="350" text-anchor="middle" font-size="10" fill="#1a1822">Play Install Referrer API</text>
  <text x="730" y="362" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">100% accurate, Android only</text>

  <!-- Common providers -->
  <rect x="30" y="400" width="840" height="85" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Common Deferred Deep Linking Providers</text>

  <rect x="60" y="440" width="150" height="30" rx="6" fill="#6d5bd0"/>
  <text x="135" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Branch.io</text>

  <rect x="240" y="440" width="150" height="30" rx="6" fill="#6d5bd0"/>
  <text x="315" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">AppsFlyer</text>

  <rect x="420" y="440" width="150" height="30" rx="6" fill="#6d5bd0"/>
  <text x="495" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Firebase DL</text>

  <rect x="600" y="440" width="150" height="30" rx="6" fill="#6d5bd0"/>
  <text x="675" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Adjust</text>

  <defs>
    <marker id="arrowDD" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
