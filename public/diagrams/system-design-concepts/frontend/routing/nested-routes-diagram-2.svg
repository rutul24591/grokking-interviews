<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Layout composition showing multiple nesting levels with persistent state</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Layout Composition &amp; State Persistence</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d04b4b"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3d8c40"/>
    </marker>
  </defs>

  <!-- LEFT: Nesting Levels Visualization -->
  <text x="250" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Three Nesting Levels</text>

  <!-- Level 1: App Layout -->
  <rect x="25" y="75" width="450" height="405" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2.5"/>

  <!-- Level 1 label -->
  <rect x="35" y="82" width="120" height="22" rx="4" fill="#6d5bd0"/>
  <text x="95" y="97" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">LEVEL 1: App Layout</text>

  <!-- Header -->
  <rect x="40" y="112" width="425" height="32" rx="6" fill="#6d5bd0"/>
  <text x="80" y="132" font-size="10" font-weight="600" fill="#ffffff">🏠 Logo</text>
  <text x="250" y="132" text-anchor="middle" font-size="10" fill="#ffffff">Global Search</text>
  <text x="420" y="132" text-anchor="middle" font-size="10" fill="#ffffff">User ▼</text>

  <!-- Sidebar -->
  <rect x="40" y="152" width="85" height="315" rx="6" fill="#6d5bd0" opacity="0.8"/>
  <text x="82" y="175" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Sidebar</text>
  <rect x="48" y="188" width="70" height="16" rx="3" fill="#ffffff" opacity="0.2"/>
  <text x="83" y="200" text-anchor="middle" font-size="8" fill="#ffffff">Dashboard</text>
  <rect x="48" y="210" width="70" height="16" rx="3" fill="#ffffff" opacity="0.3"/>
  <text x="83" y="222" text-anchor="middle" font-size="8" fill="#ffffff">Projects</text>
  <rect x="48" y="232" width="70" height="16" rx="3" fill="#ffffff" opacity="0.2"/>
  <text x="83" y="244" text-anchor="middle" font-size="8" fill="#ffffff">Settings</text>

  <!-- Level 2: Section Layout -->
  <rect x="135" y="152" width="330" height="315" rx="8" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Level 2 label -->
  <rect x="145" y="159" width="145" height="22" rx="4" fill="#6d5bd0" opacity="0.8"/>
  <text x="217" y="174" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">LEVEL 2: Section Layout</text>

  <!-- Section nav tabs -->
  <rect x="150" y="190" width="300" height="28" rx="5" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="195" y="208" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Overview</text>
  <line x1="230" y1="195" x2="230" y2="213" stroke="#d7d1e6" stroke-width="1"/>
  <text x="275" y="208" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">Members</text>
  <line x1="315" y1="195" x2="315" y2="213" stroke="#d7d1e6" stroke-width="1"/>
  <text x="370" y="208" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">Billing</text>

  <!-- Form state indicator -->
  <rect x="150" y="226" width="300" height="32" rx="5" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="240" font-size="8" fill="#6d5bd0" font-weight="600">📋 Section State:</text>
  <text x="165" y="253" font-size="8" fill="#6d5bd0">filterQuery="active" | sortBy="date"</text>

  <!-- Level 3: Page Content -->
  <rect x="150" y="268" width="300" height="185" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>

  <!-- Level 3 label -->
  <rect x="160" y="275" width="140" height="22" rx="4" fill="#d7d1e6"/>
  <text x="230" y="290" text-anchor="middle" font-size="9" font-weight="700" fill="#1a1822">LEVEL 3: Page Content</text>

  <text x="300" y="330" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.5">Page-specific content</text>
  <text x="300" y="348" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.5">renders here</text>

  <rect x="195" y="370" width="210" height="30" rx="5" fill="#6d5bd0" opacity="0.12"/>
  <text x="300" y="389" text-anchor="middle" font-size="9" fill="#6d5bd0" font-weight="600">/projects/proj-123/overview</text>

  <rect x="195" y="408" width="210" height="30" rx="5" fill="#d7d1e6" opacity="0.4"/>
  <text x="300" y="427" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.5">/projects/proj-123/members</text>

  <!-- RIGHT: State Persistence &amp; Re-render Diagram -->
  <text x="690" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Re-render Behavior</text>

  <!-- Navigation scenario -->
  <rect x="520" y="80" width="360" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="700" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Navigation: /overview → /members</text>
  <text x="700" y="118" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">(within same project section)</text>

  <!-- Level 1 block -->
  <rect x="540" y="160" width="320" height="55" rx="8" fill="#ffffff" stroke="#3d8c40" stroke-width="2"/>
  <rect x="552" y="168" width="85" height="18" rx="3" fill="#3d8c40"/>
  <text x="594" y="181" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">LEVEL 1</text>
  <text x="660" y="181" font-size="10" font-weight="600" fill="#1a1822">App Layout</text>
  <text x="560" y="202" font-size="9" fill="#3d8c40" font-weight="600">✓ No re-render — stays mounted</text>
  <text x="780" y="202" font-size="9" fill="#1a1822" opacity="0.5">Header, Sidebar</text>

  <!-- Arrow down -->
  <line x1="700" y1="215" x2="700" y2="235" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Level 2 block -->
  <rect x="540" y="240" width="320" height="55" rx="8" fill="#ffffff" stroke="#3d8c40" stroke-width="2"/>
  <rect x="552" y="248" width="85" height="18" rx="3" fill="#3d8c40"/>
  <text x="594" y="261" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">LEVEL 2</text>
  <text x="660" y="261" font-size="10" font-weight="600" fill="#1a1822">Section Layout</text>
  <text x="560" y="282" font-size="9" fill="#3d8c40" font-weight="600">✓ No re-render — state preserved</text>
  <text x="793" y="282" font-size="9" fill="#1a1822" opacity="0.5">Tabs, Filters</text>

  <!-- Arrow down -->
  <line x1="700" y1="295" x2="700" y2="315" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Level 3 block -->
  <rect x="540" y="320" width="320" height="55" rx="8" fill="#ffffff" stroke="#d04b4b" stroke-width="2"/>
  <rect x="552" y="328" width="85" height="18" rx="3" fill="#d04b4b"/>
  <text x="594" y="341" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">LEVEL 3</text>
  <text x="660" y="341" font-size="10" font-weight="600" fill="#1a1822">Page Content</text>
  <text x="560" y="362" font-size="9" fill="#d04b4b" font-weight="600">⟳ Re-renders — component swaps</text>
  <text x="790" y="362" font-size="9" fill="#1a1822" opacity="0.5">New page</text>

  <!-- Key insight box -->
  <rect x="520" y="400" width="360" height="78" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="540" y="422" font-size="11" font-weight="700" fill="#6d5bd0">Key Benefit: State Persistence</text>
  <text x="540" y="442" font-size="9" fill="#1a1822">Form inputs in Level 2 survive Level 3 navigation.</text>
  <text x="540" y="458" font-size="9" fill="#1a1822">Filters, search queries, scroll position all preserved.</text>
  <text x="540" y="474" font-size="9" fill="#6d5bd0" font-weight="600">Only the innermost &lt;Outlet&gt; re-renders.</text>
</svg>