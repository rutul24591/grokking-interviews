<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Route specificity ranking: static &gt; dynamic &gt; catch-all</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Route Specificity Ranking</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Higher priority routes match first when multiple patterns could apply</text>

  <!-- Column Headers -->
  <text x="60" y="95" font-size="11" font-weight="700" fill="#6d5bd0">PRIORITY</text>
  <text x="160" y="95" font-size="11" font-weight="700" fill="#6d5bd0">ROUTE PATTERN</text>
  <text x="400" y="95" font-size="11" font-weight="700" fill="#6d5bd0">TYPE</text>
  <text x="560" y="95" font-size="11" font-weight="700" fill="#6d5bd0">MATCHES</text>

  <!-- Row 1: Static exact -->
  <rect x="30" y="108" width="840" height="52" rx="8" fill="#6d5bd0"/>
  <text x="80" y="138" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">1</text>
  <text x="160" y="138" font-size="13" font-weight="600" fill="#ffffff">/users/settings</text>
  <text x="400" y="138" font-size="12" fill="#ffffff">Exact static</text>
  <text x="560" y="138" font-size="12" fill="#ffffff">Only "/users/settings"</text>

  <!-- Row 2: Mixed static + dynamic -->
  <rect x="30" y="168" width="840" height="52" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="80" y="198" text-anchor="middle" font-size="22" font-weight="700" fill="#6d5bd0">2</text>
  <text x="160" y="198" font-size="13" font-weight="600" fill="#1a1822">/users/:id/posts</text>
  <text x="400" y="198" font-size="12" fill="#1a1822">Mixed segments</text>
  <text x="560" y="198" font-size="12" fill="#1a1822">"/users/42/posts", "/users/abc/posts"</text>

  <!-- Row 3: Single dynamic param -->
  <rect x="30" y="228" width="840" height="52" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="80" y="258" text-anchor="middle" font-size="22" font-weight="700" fill="#6d5bd0">3</text>
  <text x="160" y="258" font-size="13" font-weight="600" fill="#1a1822">/users/:id</text>
  <text x="400" y="258" font-size="12" fill="#1a1822">Single param</text>
  <text x="560" y="258" font-size="12" fill="#1a1822">"/users/42", "/users/jane"</text>

  <!-- Row 4: Wildcard -->
  <rect x="30" y="288" width="840" height="52" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="80" y="318" text-anchor="middle" font-size="22" font-weight="700" fill="#6d5bd0">4</text>
  <text x="160" y="318" font-size="13" font-weight="600" fill="#1a1822">/users/*</text>
  <text x="400" y="318" font-size="12" fill="#1a1822">Wildcard</text>
  <text x="560" y="318" font-size="12" fill="#1a1822">"/users/anything/nested/here"</text>

  <!-- Row 5: Catch-all -->
  <rect x="30" y="348" width="840" height="52" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="80" y="378" text-anchor="middle" font-size="22" font-weight="700" fill="#6d5bd0">5</text>
  <text x="160" y="378" font-size="13" font-weight="600" fill="#1a1822">/*</text>
  <text x="400" y="378" font-size="12" fill="#1a1822">Catch-all</text>
  <text x="560" y="378" font-size="12" fill="#1a1822">Everything (404 fallback)</text>

  <!-- Conflict resolution example -->
  <rect x="30" y="420" width="840" height="65" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="50" y="445" font-size="12" font-weight="700" fill="#6d5bd0">Conflict Resolution Example:</text>
  <text x="50" y="465" font-size="12" fill="#1a1822">URL "/users/settings" matches both /users/settings (Priority 1) and /users/:id (Priority 3)</text>
  <text x="50" y="480" font-size="12" fill="#1a1822">→ Static route wins. The :id param would receive "settings" as a string, but exact match takes precedence.</text>

  <!-- Arrow showing priority direction -->
  <text x="870" y="135" text-anchor="end" font-size="10" fill="#ffffff">HIGHEST</text>
  <line x1="878" y1="145" x2="878" y2="370" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowD)"/>
  <text x="870" y="395" text-anchor="end" font-size="10" fill="#6d5bd0">LOWEST</text>

  <defs>
    <marker id="arrowD" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
