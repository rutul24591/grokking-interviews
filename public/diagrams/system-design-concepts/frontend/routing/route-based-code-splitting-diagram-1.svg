<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Bundle Comparison: Monolithic vs Route-Split</text>

  <!-- LEFT SIDE: Monolithic Bundle -->
  <text x="220" y="75" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1822">Monolithic Bundle</text>

  <!-- Large single rectangle -->
  <rect x="70" y="90" width="300" height="320" rx="8" fill="#6d5bd0" stroke="#1a1822" stroke-width="1.5"/>
  <text x="220" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">app.bundle.js</text>
  <text x="220" y="148" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.85">2.4 MB</text>

  <!-- Sections inside monolith -->
  <rect x="90" y="165" width="260" height="45" rx="5" fill="#ffffff" opacity="0.2"/>
  <text x="220" y="193" text-anchor="middle" font-size="13" fill="#ffffff">Home Components</text>

  <rect x="90" y="220" width="260" height="45" rx="5" fill="#ffffff" opacity="0.2"/>
  <text x="220" y="248" text-anchor="middle" font-size="13" fill="#ffffff">Dashboard Components</text>

  <rect x="90" y="275" width="260" height="45" rx="5" fill="#ffffff" opacity="0.2"/>
  <text x="220" y="303" text-anchor="middle" font-size="13" fill="#ffffff">Settings Components</text>

  <rect x="90" y="330" width="260" height="45" rx="5" fill="#ffffff" opacity="0.2"/>
  <text x="220" y="358" text-anchor="middle" font-size="13" fill="#ffffff">Admin Components</text>

  <!-- Arrow indicating all downloaded -->
  <rect x="100" y="425" width="240" height="36" rx="6" fill="#d93025" opacity="0.9"/>
  <text x="220" y="448" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Initial Download: 2.4 MB</text>

  <!-- VS divider -->
  <text x="450" y="260" text-anchor="middle" font-size="22" font-weight="700" fill="#6d5bd0">vs</text>
  <line x1="450" y1="90" x2="450" y2="230" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="450" y1="280" x2="450" y2="410" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- RIGHT SIDE: Route-Split Bundles -->
  <text x="680" y="75" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1822">Route-Split Bundles</text>

  <!-- Core bundle (initially loaded) -->
  <rect x="560" y="90" width="240" height="60" rx="8" fill="#6d5bd0" stroke="#1a1822" stroke-width="1.5"/>
  <text x="680" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">core.bundle.js (Runtime + Router)</text>
  <text x="680" y="136" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.85">200 KB</text>
  <rect x="770" y="93" width="25" height="14" rx="3" fill="#34a853"/>
  <text x="782" y="103" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">INIT</text>

  <!-- Home chunk -->
  <rect x="530" y="170" width="130" height="50" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="595" y="193" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">home.chunk.js</text>
  <text x="595" y="208" text-anchor="middle" font-size="11" fill="#6d5bd0">80 KB</text>
  <rect x="627" y="173" width="28" height="12" rx="3" fill="#34a853"/>
  <text x="641" y="182" text-anchor="middle" font-size="7" font-weight="700" fill="#ffffff">INIT</text>

  <!-- Dashboard chunk -->
  <rect x="680" y="170" width="130" height="50" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="745" y="193" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">dashboard.chunk.js</text>
  <text x="745" y="208" text-anchor="middle" font-size="11" fill="#6d5bd0">150 KB</text>

  <!-- Settings chunk -->
  <rect x="530" y="240" width="130" height="50" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="595" y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">settings.chunk.js</text>
  <text x="595" y="278" text-anchor="middle" font-size="11" fill="#6d5bd0">60 KB</text>

  <!-- Admin chunk -->
  <rect x="680" y="240" width="130" height="50" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="745" y="263" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">admin.chunk.js</text>
  <text x="745" y="278" text-anchor="middle" font-size="11" fill="#6d5bd0">120 KB</text>

  <!-- Legend for on-demand -->
  <rect x="565" y="310" width="12" height="12" rx="2" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="585" y="320" font-size="11" fill="#1a1822">= Loaded on demand (lazy)</text>

  <rect x="565" y="330" width="12" height="12" rx="2" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="585" y="340" font-size="11" fill="#1a1822">= Loaded initially</text>

  <!-- Initial download indicator -->
  <rect x="560" y="425" width="240" height="36" rx="6" fill="#34a853"/>
  <text x="680" y="448" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Initial Download: 280 KB</text>

  <!-- Savings callout -->
  <rect x="310" y="470" width="280" height="26" rx="5" fill="#6d5bd0" opacity="0.12"/>
  <text x="450" y="488" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">88% reduction in initial bundle size</text>
</svg>