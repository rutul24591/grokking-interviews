<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">History API: Session History Stack</text>

  <!-- Stack container -->
  <rect x="180" y="60" width="400" height="400" rx="10" fill="none" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="380" y="82" text-anchor="middle" font-size="13" fill="#6d5bd0" font-weight="600">Session History Stack</text>

  <!-- Entry 1 - /home -->
  <rect x="210" y="340" width="340" height="54" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="230" y="363" font-size="13" font-weight="600" fill="#1a1822">/home</text>
  <text x="230" y="383" font-size="11" fill="#6d5bd0">state: null</text>
  <rect x="460" y="349" width="78" height="22" rx="4" fill="#e8e4f3"/>
  <text x="499" y="364" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">Entry 1</text>

  <!-- Entry 2 - /products (crossed out, replaced) -->
  <rect x="210" y="272" width="340" height="54" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="230" y="295" font-size="13" font-weight="600" fill="#1a1822" opacity="0.4" text-decoration="line-through">/products</text>
  <line x1="230" y1="293" x2="310" y2="293" stroke="#1a1822" stroke-width="1.5" opacity="0.5"/>
  <text x="230" y="315" font-size="11" fill="#6d5bd0" opacity="0.4">state: { page: 1 }</text>
  <rect x="460" y="281" width="78" height="22" rx="4" fill="#e8e4f3" opacity="0.4"/>
  <text x="499" y="296" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600" opacity="0.4">Entry 2</text>

  <!-- Entry 2 replaced - /products?page=2 -->
  <rect x="210" y="204" width="340" height="54" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="230" y="227" font-size="13" font-weight="600" fill="#1a1822">/products?page=2</text>
  <text x="230" y="247" font-size="11" fill="#6d5bd0">state: { page: 2 }</text>
  <rect x="460" y="213" width="78" height="22" rx="4" fill="#6d5bd0"/>
  <text x="499" y="228" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">Entry 2</text>

  <!-- Arrow from old entry 2 to new entry 2 -->
  <path d="M 380 272 L 380 262" stroke="#6d5bd0" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- Entry 3 - /cart -->
  <rect x="210" y="136" width="340" height="54" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="230" y="159" font-size="13" font-weight="600" fill="#1a1822">/cart</text>
  <text x="230" y="179" font-size="11" fill="#6d5bd0">state: { items: 3 }</text>
  <rect x="460" y="145" width="78" height="22" rx="4" fill="#e8e4f3"/>
  <text x="499" y="160" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">Entry 3</text>

  <!-- Current position pointer -->
  <polygon points="195,163 175,153 175,173" fill="#6d5bd0"/>
  <text x="170" y="167" text-anchor="end" font-size="12" font-weight="600" fill="#6d5bd0">Current</text>
  <text x="170" y="181" text-anchor="end" font-size="11" fill="#6d5bd0">Position</text>

  <!-- Back / Forward arrows on the left -->
  <line x1="100" y1="200" x2="100" y2="350" stroke="#d7d1e6" stroke-width="2"/>
  <!-- Back arrow (down) -->
  <path d="M 100 350 L 93 338 M 100 350 L 107 338" stroke="#1a1822" stroke-width="2" fill="none"/>
  <text x="100" y="372" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Back</text>
  <text x="100" y="385" text-anchor="middle" font-size="10" fill="#6d5bd0">history.back()</text>
  <!-- Forward arrow (up) -->
  <path d="M 100 200 L 93 212 M 100 200 L 107 212" stroke="#1a1822" stroke-width="2" fill="none"/>
  <text x="100" y="195" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Forward</text>
  <text x="100" y="182" text-anchor="middle" font-size="10" fill="#6d5bd0">history.forward()</text>

  <!-- Right side annotations -->
  <!-- pushState label for entry 1→2 -->
  <line x1="560" y1="367" x2="620" y2="367" stroke="#d7d1e6" stroke-width="1"/>
  <line x1="620" y1="367" x2="620" y2="299" stroke="#d7d1e6" stroke-width="1"/>
  <line x1="620" y1="299" x2="560" y2="299" stroke="#d7d1e6" stroke-width="1"/>
  <rect x="630" y="318" width="240" height="42" rx="6" fill="#6d5bd0"/>
  <text x="750" y="336" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">pushState()</text>
  <text x="750" y="352" text-anchor="middle" font-size="11" fill="#ffffff">Adds new entry to stack</text>

  <!-- replaceState label -->
  <line x1="560" y1="231" x2="620" y2="231" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="630" y="210" width="240" height="42" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="750" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">replaceState()</text>
  <text x="750" y="244" text-anchor="middle" font-size="11" fill="#6d5bd0">Modifies current entry</text>

  <!-- pushState label for entry 2→3 -->
  <line x1="560" y1="163" x2="620" y2="163" stroke="#d7d1e6" stroke-width="1"/>
  <line x1="620" y1="231" x2="620" y2="163" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="630" y="105" width="240" height="42" rx="6" fill="#6d5bd0"/>
  <text x="750" y="123" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">pushState()</text>
  <text x="750" y="139" text-anchor="middle" font-size="11" fill="#ffffff">Adds new entry to stack</text>
  <line x1="620" y1="126" x2="630" y2="126" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="620" y1="163" x2="620" y2="126" stroke="#d7d1e6" stroke-width="1"/>

  <!-- Bottom note -->
  <rect x="200" y="460" width="500" height="28" rx="6" fill="#e8e4f3"/>
  <text x="450" y="479" text-anchor="middle" font-size="11" fill="#6d5bd0">Stack grows upward. pushState adds entries; replaceState overwrites without adding.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>