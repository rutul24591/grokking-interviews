<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Universal Links setup showing association file, app registration, and URL handling</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Universal Links / App Links Setup</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Verification chain between server, OS, and app</text>

  <!-- Three main entities -->
  <!-- Server -->
  <rect x="30" y="90" width="250" height="170" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="90" width="250" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="115" width="250" height="10" fill="#6d5bd0"/>
  <text x="155" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Web Server</text>

  <text x="50" y="148" font-size="11" font-weight="600" fill="#6d5bd0">Hosts association file:</text>
  <text x="50" y="168" font-size="10" fill="#1a1822">iOS: /.well-known/</text>
  <text x="50" y="183" font-size="10" fill="#1a1822">  apple-app-site-association</text>
  <text x="50" y="203" font-size="10" fill="#1a1822">Android: /.well-known/</text>
  <text x="50" y="218" font-size="10" fill="#1a1822">  assetlinks.json</text>
  <text x="50" y="248" font-size="9" fill="#1a1822" opacity="0.7">Must be HTTPS, no redirects</text>

  <!-- OS -->
  <rect x="325" y="90" width="250" height="170" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="325" y="90" width="250" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="325" y="115" width="250" height="10" fill="#6d5bd0"/>
  <text x="450" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Operating System</text>

  <text x="345" y="148" font-size="11" font-weight="600" fill="#6d5bd0">On app install:</text>
  <text x="345" y="168" font-size="10" fill="#1a1822">1. Reads app entitlements</text>
  <text x="345" y="185" font-size="10" fill="#1a1822">2. Fetches association file from</text>
  <text x="345" y="200" font-size="10" fill="#1a1822">   each associated domain</text>
  <text x="345" y="220" font-size="10" fill="#1a1822">3. Verifies app ID matches</text>
  <text x="345" y="240" font-size="10" fill="#1a1822">4. Caches URL patterns to</text>
  <text x="345" y="255" font-size="10" fill="#1a1822">   intercept for this app</text>

  <!-- App -->
  <rect x="620" y="90" width="250" height="170" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="620" y="90" width="250" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="620" y="115" width="250" height="10" fill="#6d5bd0"/>
  <text x="745" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Native App</text>

  <text x="640" y="148" font-size="11" font-weight="600" fill="#6d5bd0">Registers in entitlements:</text>
  <text x="640" y="168" font-size="10" fill="#1a1822">Associated Domains:</text>
  <text x="640" y="185" font-size="10" fill="#6d5bd0">  applinks:app.com</text>
  <text x="640" y="205" font-size="11" font-weight="600" fill="#6d5bd0">URL handler:</text>
  <text x="640" y="225" font-size="10" fill="#1a1822">Parses incoming URL path</text>
  <text x="640" y="242" font-size="10" fill="#1a1822">Maps to native screen</text>

  <!-- Verification arrows -->
  <line x1="280" y1="160" x2="325" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUL)"/>
  <text x="302" y="152" text-anchor="middle" font-size="8" fill="#6d5bd0">fetches</text>

  <line x1="575" y1="160" x2="620" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUL)"/>
  <text x="597" y="152" text-anchor="middle" font-size="8" fill="#6d5bd0">reads</text>

  <!-- Runtime Flow -->
  <text x="450" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Runtime: URL Interception Flow</text>

  <!-- Flow boxes -->
  <rect x="30" y="320" width="160" height="60" rx="8" fill="#6d5bd0"/>
  <text x="110" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">User taps link</text>
  <text x="110" y="362" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">app.com/products/42</text>

  <line x1="190" y1="350" x2="220" y2="350" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUL)"/>

  <rect x="220" y="320" width="160" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="300" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">OS checks cache</text>
  <text x="300" y="362" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Is domain registered?</text>

  <line x1="380" y1="350" x2="410" y2="350" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUL)"/>
  <text x="395" y="340" font-size="9" fill="#4caf50" font-weight="600">Yes</text>

  <rect x="410" y="320" width="160" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="490" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">OS launches app</text>
  <text x="490" y="362" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Passes URL to app</text>

  <line x1="570" y1="350" x2="600" y2="350" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUL)"/>

  <rect x="600" y="320" width="160" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="680" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">App parses URL</text>
  <text x="680" y="362" text-anchor="middle" font-size="10" fill="#6d5bd0">/products/42 → screen</text>

  <line x1="760" y1="350" x2="790" y2="350" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUL)"/>

  <rect x="790" y="320" width="80" height="60" rx="8" fill="#4caf50"/>
  <text x="830" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Product</text>
  <text x="830" y="368" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Screen</text>

  <!-- Fallback path -->
  <line x1="300" y1="380" x2="300" y2="420" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrowRD)"/>
  <text x="315" y="405" font-size="9" fill="#cc4444" font-weight="600">No</text>

  <rect x="220" y="420" width="160" height="50" rx="8" fill="#ffffff" stroke="#cc4444" stroke-width="1.5"/>
  <text x="300" y="442" text-anchor="middle" font-size="11" font-weight="600" fill="#cc4444">Opens in browser</text>
  <text x="300" y="459" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Web app fallback</text>

  <!-- Key requirements -->
  <rect x="500" y="410" width="370" height="75" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="520" y="432" font-size="11" font-weight="700" fill="#6d5bd0">Requirements for Universal Links:</text>
  <text x="520" y="450" font-size="10" fill="#1a1822">• HTTPS required (no HTTP)</text>
  <text x="520" y="465" font-size="10" fill="#1a1822">• Association file served from exact domain</text>
  <text x="520" y="480" font-size="10" fill="#1a1822">• App must be signed with matching team ID</text>

  <defs>
    <marker id="arrowUL" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowRD" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
  </defs>
</svg>
