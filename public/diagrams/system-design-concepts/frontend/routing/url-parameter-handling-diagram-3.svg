<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Search params sync flow showing debounced input to URL to data fetch</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Debounced Search Params Sync</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Preventing unnecessary URL updates and API calls with debouncing</text>

  <!-- Timeline header -->
  <text x="80" y="90" font-size="11" font-weight="700" fill="#6d5bd0">TIME →</text>
  <line x1="130" y1="86" x2="850" y2="86" stroke="#d7d1e6" stroke-width="1"/>

  <!-- Time markers -->
  <text x="160" y="100" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">0ms</text>
  <text x="260" y="100" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">50ms</text>
  <text x="360" y="100" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">120ms</text>
  <text x="460" y="100" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">180ms</text>
  <text x="560" y="100" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">250ms</text>
  <text x="660" y="100" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">550ms</text>
  <text x="760" y="100" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">600ms</text>
  <text x="840" y="100" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">800ms</text>

  <!-- Row 1: User Input -->
  <text x="30" y="135" font-size="11" font-weight="700" fill="#1a1822">User</text>
  <text x="30" y="150" font-size="11" font-weight="700" fill="#1a1822">Input</text>
  <rect x="130" y="115" width="730" height="48" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>

  <!-- Keystroke events -->
  <circle cx="160" cy="139" r="14" fill="#6d5bd0"/>
  <text x="160" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">r</text>

  <circle cx="260" cy="139" r="14" fill="#6d5bd0"/>
  <text x="260" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">re</text>

  <circle cx="360" cy="139" r="14" fill="#6d5bd0"/>
  <text x="360" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">rea</text>

  <circle cx="460" cy="139" r="14" fill="#6d5bd0"/>
  <text x="460" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">reac</text>

  <circle cx="560" cy="139" r="14" fill="#6d5bd0"/>
  <text x="560" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">react</text>

  <text x="620" y="143" font-size="9" fill="#1a1822" opacity="0.5">...done typing</text>

  <!-- Row 2: Debounce Timer -->
  <text x="30" y="200" font-size="11" font-weight="700" fill="#1a1822">Debounce</text>
  <text x="30" y="215" font-size="11" font-weight="700" fill="#1a1822">Timer</text>
  <rect x="130" y="180" width="730" height="48" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>

  <!-- Timer resets on each keystroke -->
  <rect x="160" y="195" width="90" height="18" rx="3" fill="#cc4444" opacity="0.2"/>
  <text x="205" y="208" text-anchor="middle" font-size="8" fill="#cc4444">reset</text>

  <rect x="260" y="195" width="90" height="18" rx="3" fill="#cc4444" opacity="0.2"/>
  <text x="305" y="208" text-anchor="middle" font-size="8" fill="#cc4444">reset</text>

  <rect x="360" y="195" width="90" height="18" rx="3" fill="#cc4444" opacity="0.2"/>
  <text x="405" y="208" text-anchor="middle" font-size="8" fill="#cc4444">reset</text>

  <rect x="460" y="195" width="90" height="18" rx="3" fill="#cc4444" opacity="0.2"/>
  <text x="505" y="208" text-anchor="middle" font-size="8" fill="#cc4444">reset</text>

  <!-- Final timer runs to completion -->
  <rect x="560" y="195" width="100" height="18" rx="3" fill="#4caf50" opacity="0.3"/>
  <text x="610" y="208" text-anchor="middle" font-size="8" fill="#4caf50" font-weight="600">300ms wait ✓</text>

  <!-- Row 3: URL Updates -->
  <text x="30" y="268" font-size="11" font-weight="700" fill="#1a1822">URL</text>
  <text x="30" y="283" font-size="11" font-weight="700" fill="#1a1822">Updates</text>
  <rect x="130" y="248" width="730" height="48" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>

  <!-- No updates for first 4 keystrokes -->
  <text x="160" y="276" font-size="9" fill="#cc4444">✗</text>
  <text x="260" y="276" font-size="9" fill="#cc4444">✗</text>
  <text x="360" y="276" font-size="9" fill="#cc4444">✗</text>
  <text x="460" y="276" font-size="9" fill="#cc4444">✗</text>

  <!-- Single URL update after debounce -->
  <rect x="640" y="256" width="170" height="32" rx="6" fill="#4caf50"/>
  <text x="725" y="277" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">?q=react</text>

  <!-- Arrow from debounce to URL -->
  <line x1="660" y1="228" x2="660" y2="248" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Row 4: API Calls -->
  <text x="30" y="333" font-size="11" font-weight="700" fill="#1a1822">API</text>
  <text x="30" y="348" font-size="11" font-weight="700" fill="#1a1822">Calls</text>
  <rect x="130" y="315" width="730" height="48" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>

  <!-- Single API call -->
  <rect x="670" y="323" width="180" height="32" rx="6" fill="#6d5bd0"/>
  <text x="760" y="344" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">GET /api/search?q=react</text>

  <line x1="725" y1="296" x2="725" y2="315" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUS)"/>

  <!-- Row 5: Results -->
  <text x="30" y="398" font-size="11" font-weight="700" fill="#1a1822">Results</text>
  <rect x="130" y="380" width="730" height="48" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>

  <rect x="810" y="388" width="40" height="32" rx="6" fill="#4caf50"/>
  <text x="830" y="408" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Render</text>

  <line x1="830" y1="363" x2="830" y2="380" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Comparison: Without vs With debounce -->
  <rect x="30" y="440" width="400" height="50" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1.5"/>
  <text x="50" y="462" font-size="11" font-weight="700" fill="#cc4444">Without Debounce:</text>
  <text x="50" y="480" font-size="10" fill="#1a1822">5 URL updates, 5 API calls, 5 re-renders</text>

  <rect x="470" y="440" width="400" height="50" rx="10" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1.5"/>
  <text x="490" y="462" font-size="11" font-weight="700" fill="#4caf50">With Debounce (300ms):</text>
  <text x="490" y="480" font-size="10" fill="#1a1822">1 URL update, 1 API call, 1 re-render — 80% reduction</text>

  <defs>
    <marker id="arrowUS" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
    </marker>
  </defs>
</svg>
