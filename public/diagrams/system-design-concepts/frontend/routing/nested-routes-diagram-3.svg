<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Error boundary isolation in nested routes showing contained failure</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Error Boundary Isolation in Nested Routes</text>

  <!-- Defs -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d04b4b"/>
    </marker>
  </defs>

  <!-- LEFT: Route Tree with Error Boundaries -->
  <text x="220" y="65" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Route Tree with Error Boundaries</text>

  <!-- Root node -->
  <rect x="155" y="80" width="130" height="40" rx="8" fill="#6d5bd0"/>
  <text x="220" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">/  (Root Layout)</text>

  <!-- Root error boundary label -->
  <rect x="295" y="82" width="95" height="22" rx="4" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="342" y="97" text-anchor="middle" font-size="8" font-weight="600" fill="#6d5bd0">Error Boundary</text>

  <!-- Line from root to dashboard -->
  <line x1="220" y1="120" x2="220" y2="155" stroke="#6d5bd0" stroke-width="2"/>

  <!-- Dashboard node -->
  <rect x="140" y="155" width="160" height="40" rx="8" fill="#6d5bd0" opacity="0.85"/>
  <text x="220" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">/dashboard</text>

  <!-- Dashboard error boundary label -->
  <rect x="310" y="157" width="95" height="22" rx="4" fill="#d04b4b" opacity="0.15" stroke="#d04b4b" stroke-width="1"/>
  <text x="357" y="172" text-anchor="middle" font-size="8" font-weight="600" fill="#d04b4b">Error Boundary</text>

  <!-- Lines from dashboard to children -->
  <line x1="180" y1="195" x2="180" y2="220" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="180" y1="220" x2="115" y2="220" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="115" y1="220" x2="115" y2="245" stroke="#6d5bd0" stroke-width="1.5"/>

  <line x1="260" y1="195" x2="260" y2="220" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="260" y1="220" x2="325" y2="220" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="325" y1="220" x2="325" y2="245" stroke="#6d5bd0" stroke-width="1.5"/>

  <!-- Analytics node (ERROR) -->
  <rect x="35" y="245" width="160" height="40" rx="8" fill="#d04b4b" opacity="0.15" stroke="#d04b4b" stroke-width="2"/>
  <text x="115" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#d04b4b">/dashboard/analytics</text>
  <text x="115" y="280" text-anchor="middle" font-size="9" fill="#d04b4b">⚠ throws Error!</text>

  <!-- Settings node (OK) -->
  <rect x="245" y="245" width="160" height="40" rx="8" fill="#ffffff" stroke="#3d8c40" stroke-width="2"/>
  <text x="325" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#3d8c40">/dashboard/settings</text>
  <text x="325" y="280" text-anchor="middle" font-size="9" fill="#3d8c40">✓ works fine</text>

  <!-- Error propagation arrow -->
  <line x1="115" y1="285" x2="115" y2="320" stroke="#d04b4b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <text x="115" y="345" text-anchor="middle" font-size="9" font-weight="600" fill="#d04b4b">Error bubbles up to</text>
  <text x="115" y="360" text-anchor="middle" font-size="9" font-weight="600" fill="#d04b4b">Dashboard Error Boundary</text>

  <!-- Catch indicator -->
  <rect x="40" y="375" width="150" height="30" rx="6" fill="#d04b4b" opacity="0.15" stroke="#d04b4b" stroke-width="1"/>
  <text x="115" y="394" text-anchor="middle" font-size="9" font-weight="600" fill="#d04b4b">CAUGHT HERE ✓</text>

  <!-- Does NOT reach root -->
  <rect x="40" y="415" width="190" height="26" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="135" y="433" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">Does NOT reach Root Error Boundary</text>

  <!-- RIGHT: Visual Result -->
  <text x="670" y="65" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">What the User Sees</text>

  <!-- Root Layout (intact) -->
  <rect x="480" y="80" width="390" height="400" rx="10" fill="#ffffff" stroke="#3d8c40" stroke-width="2.5"/>
  <rect x="490" y="88" width="80" height="18" rx="3" fill="#3d8c40"/>
  <text x="530" y="101" text-anchor="middle" font-size="8" font-weight="700" fill="#ffffff">INTACT ✓</text>

  <!-- Navbar (intact) -->
  <rect x="495" y="112" width="360" height="32" rx="6" fill="#6d5bd0"/>
  <text x="530" y="132" font-size="10" font-weight="600" fill="#ffffff">Logo</text>
  <text x="675" y="132" text-anchor="middle" font-size="10" fill="#ffffff">Navigation Bar (still functional)</text>

  <!-- Sidebar (intact) -->
  <rect x="495" y="152" width="80" height="315" rx="6" fill="#6d5bd0" opacity="0.8"/>
  <text x="535" y="178" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Sidebar</text>
  <text x="535" y="195" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.8">(functional)</text>
  <rect x="502" y="210" width="66" height="16" rx="3" fill="#ffffff" opacity="0.2"/>
  <text x="535" y="222" text-anchor="middle" font-size="8" fill="#ffffff">Home</text>
  <rect x="502" y="232" width="66" height="16" rx="3" fill="#ffffff" opacity="0.3"/>
  <text x="535" y="244" text-anchor="middle" font-size="8" fill="#ffffff">Dashboard</text>
  <rect x="502" y="254" width="66" height="16" rx="3" fill="#ffffff" opacity="0.2"/>
  <text x="535" y="266" text-anchor="middle" font-size="8" fill="#ffffff">Profile</text>

  <!-- Dashboard area -->
  <rect x="583" y="152" width="275" height="315" rx="8" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Dashboard nav (intact) -->
  <rect x="593" y="162" width="255" height="28" rx="5" fill="#6d5bd0" opacity="0.7"/>
  <text x="640" y="180" font-size="9" fill="#ffffff" opacity="0.7">Analytics</text>
  <text x="720" y="180" font-size="9" font-weight="600" fill="#ffffff">Settings</text>
  <text x="795" y="180" font-size="9" fill="#ffffff" opacity="0.7">Reports</text>

  <!-- Error Fallback UI (in outlet area) -->
  <rect x="593" y="200" width="255" height="130" rx="6" fill="#d04b4b" opacity="0.08" stroke="#d04b4b" stroke-width="1.5"/>

  <text x="720" y="235" text-anchor="middle" font-size="22" fill="#d04b4b">⚠</text>
  <text x="720" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#d04b4b">Something went wrong</text>
  <text x="720" y="278" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">Failed to load Analytics dashboard</text>

  <!-- Retry button -->
  <rect x="680" y="290" width="80" height="26" rx="5" fill="#6d5bd0"/>
  <text x="720" y="307" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Try Again</text>

  <!-- Settings still accessible indicator -->
  <rect x="593" y="340" width="255" height="55" rx="6" fill="#3d8c40" opacity="0.08" stroke="#3d8c40" stroke-width="1.5"/>
  <text x="720" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#3d8c40">✓ Settings page still accessible</text>
  <text x="720" y="380" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">User can navigate to /dashboard/settings</text>

  <!-- Key takeaway -->
  <rect x="593" y="405" width="255" height="55" rx="6" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="610" y="424" font-size="9" font-weight="700" fill="#6d5bd0">Isolation benefit:</text>
  <text x="610" y="440" font-size="8" fill="#1a1822">Error in one child route doesn't crash</text>
  <text x="610" y="453" font-size="8" fill="#1a1822">the entire app or sibling routes.</text>
</svg>