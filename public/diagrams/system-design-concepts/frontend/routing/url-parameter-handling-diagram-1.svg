<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>URL anatomy showing path parameters vs query parameters</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">URL Anatomy — Parameters Breakdown</text>

  <!-- Full URL display -->
  <rect x="30" y="60" width="840" height="50" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="50" y="90" font-size="12" font-weight="600" fill="#1a1822">https://store.com</text>
  <text x="208" y="90" font-size="12" font-weight="600" fill="#6d5bd0">/products/shoes/running</text>
  <text x="432" y="90" font-size="12" font-weight="600" fill="#cc4444">?color=red&amp;size=10&amp;sort=price</text>
  <text x="700" y="90" font-size="12" font-weight="600" fill="#4caf50">#reviews</text>

  <!-- Bracket lines pointing down from URL segments -->
  <!-- Protocol + Domain -->
  <line x1="50" y1="110" x2="50" y2="135" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="195" y1="110" x2="195" y2="135" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="50" y1="135" x2="195" y2="135" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="122" y1="135" x2="122" y2="150" stroke="#1a1822" stroke-width="1.5"/>
  <text x="122" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Origin</text>
  <text x="122" y="183" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Protocol + Domain</text>

  <!-- Path params -->
  <line x1="215" y1="110" x2="215" y2="135" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="420" y1="110" x2="420" y2="135" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="215" y1="135" x2="420" y2="135" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="317" y1="135" x2="317" y2="150" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="317" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Path Parameters</text>
  <text x="317" y="183" text-anchor="middle" font-size="9" fill="#6d5bd0">Resource identity</text>

  <!-- Query params -->
  <line x1="435" y1="110" x2="435" y2="135" stroke="#cc4444" stroke-width="1.5"/>
  <line x1="690" y1="110" x2="690" y2="135" stroke="#cc4444" stroke-width="1.5"/>
  <line x1="435" y1="135" x2="690" y2="135" stroke="#cc4444" stroke-width="1.5"/>
  <line x1="562" y1="135" x2="562" y2="150" stroke="#cc4444" stroke-width="1.5"/>
  <text x="562" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#cc4444">Query Parameters</text>
  <text x="562" y="183" text-anchor="middle" font-size="9" fill="#cc4444">Modifiers / Filters</text>

  <!-- Fragment -->
  <line x1="700" y1="110" x2="700" y2="135" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="760" y1="110" x2="760" y2="135" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="700" y1="135" x2="760" y2="135" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="730" y1="135" x2="730" y2="150" stroke="#4caf50" stroke-width="1.5"/>
  <text x="730" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">Fragment</text>
  <text x="730" y="183" text-anchor="middle" font-size="9" fill="#4caf50">Client-only anchor</text>

  <!-- Path Parameters Detail -->
  <rect x="30" y="210" width="410" height="270" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="210" width="410" height="35" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="235" width="410" height="10" fill="#6d5bd0"/>
  <text x="235" y="234" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Path Parameters</text>

  <text x="50" y="270" font-size="11" font-weight="600" fill="#1a1822">Route Pattern:</text>
  <text x="180" y="270" font-size="11" fill="#6d5bd0">/products/:category/:type</text>

  <text x="50" y="300" font-size="11" font-weight="600" fill="#1a1822">Extracted Values:</text>

  <rect x="50" y="315" width="170" height="35" rx="6" fill="#6d5bd0" opacity="0.1"/>
  <text x="65" y="337" font-size="11" fill="#6d5bd0" font-weight="600">category</text>
  <text x="155" y="337" font-size="11" fill="#1a1822">= "shoes"</text>

  <rect x="240" y="315" width="180" height="35" rx="6" fill="#6d5bd0" opacity="0.1"/>
  <text x="255" y="337" font-size="11" fill="#6d5bd0" font-weight="600">type</text>
  <text x="305" y="337" font-size="11" fill="#1a1822">= "running"</text>

  <text x="50" y="380" font-size="11" font-weight="600" fill="#1a1822">Characteristics:</text>
  <text x="50" y="400" font-size="10" fill="#1a1822">• Required — route won't match without them</text>
  <text x="50" y="418" font-size="10" fill="#1a1822">• Define WHAT resource to show</text>
  <text x="50" y="436" font-size="10" fill="#1a1822">• Hierarchical — position matters</text>
  <text x="50" y="454" font-size="10" fill="#1a1822">• Sent to server in request URL</text>
  <text x="50" y="472" font-size="10" fill="#1a1822">• SEO-friendly (part of the path)</text>

  <!-- Query Parameters Detail -->
  <rect x="460" y="210" width="410" height="270" rx="12" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="460" y="210" width="410" height="35" rx="12" fill="#cc4444"/>
  <rect x="460" y="235" width="410" height="10" fill="#cc4444"/>
  <text x="665" y="234" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Query Parameters</text>

  <text x="480" y="270" font-size="11" font-weight="600" fill="#1a1822">Query String:</text>
  <text x="590" y="270" font-size="11" fill="#cc4444">?color=red&amp;size=10&amp;sort=price</text>

  <text x="480" y="300" font-size="11" font-weight="600" fill="#1a1822">Key-Value Pairs:</text>

  <rect x="480" y="315" width="130" height="35" rx="6" fill="#cc4444" opacity="0.1"/>
  <text x="495" y="337" font-size="11" fill="#cc4444" font-weight="600">color</text>
  <text x="550" y="337" font-size="11" fill="#1a1822">= "red"</text>

  <rect x="620" y="315" width="110" height="35" rx="6" fill="#cc4444" opacity="0.1"/>
  <text x="635" y="337" font-size="11" fill="#cc4444" font-weight="600">size</text>
  <text x="682" y="337" font-size="11" fill="#1a1822">= "10"</text>

  <rect x="740" y="315" width="115" height="35" rx="6" fill="#cc4444" opacity="0.1"/>
  <text x="755" y="337" font-size="11" fill="#cc4444" font-weight="600">sort</text>
  <text x="805" y="337" font-size="11" fill="#1a1822">= "price"</text>

  <text x="480" y="380" font-size="11" font-weight="600" fill="#1a1822">Characteristics:</text>
  <text x="480" y="400" font-size="10" fill="#1a1822">• Optional — page works without them</text>
  <text x="480" y="418" font-size="10" fill="#1a1822">• Define HOW to show the resource</text>
  <text x="480" y="436" font-size="10" fill="#1a1822">• Flat — order doesn't matter</text>
  <text x="480" y="454" font-size="10" fill="#1a1822">• Sent to server in request URL</text>
  <text x="480" y="472" font-size="10" fill="#1a1822">• Shareable — bookmarks preserve state</text>
</svg>
