<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Nested route hierarchy showing parent layout with outlet rendering child routes</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Nested Route Hierarchy &amp; Outlet Rendering</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822" opacity="0.4"/>
    </marker>
  </defs>

  <!-- LEFT SIDE: Visual Page Layout -->
  <text x="235" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Visual Page Layout</text>

  <!-- Root Layout (outermost box) -->
  <rect x="30" y="75" width="410" height="400" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2.5"/>
  <text x="50" y="98" font-size="12" font-weight="700" fill="#6d5bd0">Root Layout</text>

  <!-- Navbar -->
  <rect x="45" y="108" width="380" height="35" rx="6" fill="#6d5bd0"/>
  <text x="235" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Navbar (persistent)</text>

  <!-- Sidebar + Content area -->
  <!-- Sidebar -->
  <rect x="45" y="153" width="90" height="305" rx="6" fill="#6d5bd0" opacity="0.85"/>
  <text x="90" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Sidebar</text>
  <text x="90" y="196" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">(persistent)</text>
  <rect x="55" y="210" width="70" height="18" rx="4" fill="#ffffff" opacity="0.2"/>
  <text x="90" y="223" text-anchor="middle" font-size="8" fill="#ffffff">Home</text>
  <rect x="55" y="234" width="70" height="18" rx="4" fill="#ffffff" opacity="0.35"/>
  <text x="90" y="247" text-anchor="middle" font-size="8" fill="#ffffff">Dashboard</text>
  <rect x="55" y="258" width="70" height="18" rx="4" fill="#ffffff" opacity="0.2"/>
  <text x="90" y="271" text-anchor="middle" font-size="8" fill="#ffffff">Profile</text>

  <!-- Dashboard Layout (inner box) -->
  <rect x="145" y="153" width="280" height="305" rx="8" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="160" y="175" font-size="11" font-weight="700" fill="#6d5bd0">Dashboard Layout</text>

  <!-- Dashboard Nav -->
  <rect x="160" y="185" width="250" height="30" rx="5" fill="#6d5bd0" opacity="0.7"/>
  <text x="200" y="204" font-size="9" font-weight="600" fill="#ffffff">Analytics</text>
  <text x="270" y="204" font-size="9" fill="#ffffff" opacity="0.8">Settings</text>
  <text x="335" y="204" font-size="9" fill="#ffffff" opacity="0.8">Reports</text>

  <!-- Outlet area -->
  <rect x="160" y="225" width="250" height="218" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="285" y="255" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">&lt;Outlet /&gt;</text>
  <text x="285" y="278" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">Child Route Content</text>
  <text x="285" y="296" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">renders here</text>

  <!-- Swap indicator arrows -->
  <text x="285" y="330" text-anchor="middle" font-size="9" fill="#6d5bd0" font-weight="600">Currently showing:</text>
  <rect x="200" y="340" width="170" height="28" rx="5" fill="#6d5bd0" opacity="0.15"/>
  <text x="285" y="359" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">/dashboard/analytics</text>

  <!-- Swap arrows -->
  <text x="230" y="390" font-size="9" fill="#1a1822" opacity="0.5">swaps to</text>
  <rect x="200" y="398" width="170" height="28" rx="5" fill="#d7d1e6" opacity="0.5"/>
  <text x="285" y="417" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">/dashboard/settings</text>

  <!-- RIGHT SIDE: Route Tree -->
  <text x="670" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Route Tree</text>

  <!-- / root -->
  <rect x="610" y="80" width="120" height="36" rx="8" fill="#6d5bd0"/>
  <text x="670" y="103" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">/  (Root)</text>

  <!-- Line from / to /dashboard -->
  <line x1="670" y1="116" x2="670" y2="145" stroke="#6d5bd0" stroke-width="2"/>

  <!-- /dashboard -->
  <rect x="590" y="145" width="160" height="36" rx="8" fill="#6d5bd0" opacity="0.85"/>
  <text x="670" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">/dashboard</text>

  <!-- Lines from /dashboard to children -->
  <line x1="640" y1="181" x2="640" y2="210" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="640" y1="210" x2="570" y2="210" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="570" y1="210" x2="570" y2="230" stroke="#6d5bd0" stroke-width="1.5"/>

  <line x1="700" y1="181" x2="700" y2="210" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="700" y1="210" x2="770" y2="210" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="770" y1="210" x2="770" y2="230" stroke="#6d5bd0" stroke-width="1.5"/>

  <!-- /dashboard/analytics -->
  <rect x="490" y="230" width="160" height="36" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="570" y="253" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">/dashboard/analytics</text>

  <!-- /dashboard/settings -->
  <rect x="690" y="230" width="160" height="36" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="770" y="253" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">/dashboard/settings</text>

  <!-- Annotation: What stays the same -->
  <rect x="490" y="300" width="370" height="85" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="510" y="322" font-size="11" font-weight="700" fill="#1a1822">Navigation Behavior:</text>
  <text x="510" y="342" font-size="10" fill="#1a1822" opacity="0.75">Navigating /analytics → /settings:</text>
  <text x="520" y="360" font-size="9" fill="#6d5bd0" font-weight="600">✓ Root Layout stays mounted (no re-render)</text>
  <text x="520" y="376" font-size="9" fill="#6d5bd0" font-weight="600">✓ Dashboard Layout stays mounted (no re-render)</text>

  <!-- Annotation: What changes -->
  <rect x="490" y="395" width="370" height="55" rx="8" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="510" y="416" font-size="10" fill="#6d5bd0" font-weight="600">Only the &lt;Outlet /&gt; content swaps:</text>
  <text x="520" y="435" font-size="9" fill="#1a1822" opacity="0.75">Analytics component unmounts → Settings component mounts</text>
</svg>