<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Dynamic Route Pattern Matching &amp; Parameter Extraction</text>

  <!-- URL Bar -->
  <rect x="60" y="60" width="780" height="46" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="80" y="88" font-size="13" fill="#999">/</text>
  <!-- Color-coded URL segments -->
  <text x="92" y="88" font-size="14" fill="#1a1822">users/</text>
  <rect x="142" y="70" width="32" height="28" rx="4" fill="#6d5bd0" opacity="0.15"/>
  <text x="146" y="88" font-size="14" font-weight="700" fill="#6d5bd0">42</text>
  <text x="178" y="88" font-size="14" fill="#1a1822">/posts/</text>
  <rect x="238" y="70" width="108" height="28" rx="4" fill="#e07c3e" opacity="0.15"/>
  <text x="242" y="88" font-size="14" font-weight="700" fill="#e07c3e">hello-world</text>

  <!-- Arrow down from URL -->
  <line x1="450" y1="110" x2="450" y2="148" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple1)"/>
  <defs>
    <marker id="arrowPurple1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGray1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822"/>
    </marker>
  </defs>
  <text x="470" y="134" font-size="11" fill="#6d5bd0" font-weight="600">MATCH</text>

  <!-- Route Pattern Box -->
  <rect x="120" y="152" width="660" height="56" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="140" y="172" font-size="11" fill="#999" font-weight="600">ROUTE PATTERN</text>
  <text x="140" y="194" font-size="14" fill="#1a1822">/users/</text>
  <rect x="196" y="180" width="62" height="22" rx="4" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="202" y="196" font-size="14" font-weight="700" fill="#6d5bd0">:userId</text>
  <text x="264" y="194" font-size="14" fill="#1a1822">/posts/</text>
  <rect x="318" y="180" width="48" height="22" rx="4" fill="#e07c3e" opacity="0.2" stroke="#e07c3e" stroke-width="1"/>
  <text x="324" y="196" font-size="14" font-weight="700" fill="#e07c3e">:slug</text>

  <!-- Segment mapping lines -->
  <!-- Left mapping: 42 -> :userId -->
  <rect x="60" y="236" width="380" height="108" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="250" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">SEGMENT MATCHING</text>

  <!-- Static segments -->
  <rect x="80" y="270" width="70" height="28" rx="4" fill="#e8e5f0"/>
  <text x="115" y="289" text-anchor="middle" font-size="12" fill="#1a1822">users</text>
  <text x="158" y="289" font-size="11" fill="#999">=</text>
  <rect x="170" y="270" width="70" height="28" rx="4" fill="#e8e5f0"/>
  <text x="205" y="289" text-anchor="middle" font-size="12" fill="#1a1822">users</text>
  <text x="250" y="289" font-size="11" fill="#4caf50" font-weight="700">&#x2713; static</text>

  <!-- Dynamic userId -->
  <rect x="80" y="304" width="70" height="28" rx="4" fill="#6d5bd0" opacity="0.15"/>
  <text x="115" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">42</text>
  <text x="158" y="323" font-size="11" fill="#999">&#x2192;</text>
  <rect x="170" y="304" width="70" height="28" rx="4" fill="#6d5bd0" opacity="0.2" stroke="#6d5bd0" stroke-width="1"/>
  <text x="205" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">:userId</text>
  <text x="250" y="323" font-size="11" fill="#6d5bd0" font-weight="700">&#x2713; capture</text>

  <!-- Right mapping -->
  <rect x="460" y="236" width="380" height="108" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="650" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">SEGMENT MATCHING</text>

  <!-- Static posts -->
  <rect x="480" y="270" width="70" height="28" rx="4" fill="#e8e5f0"/>
  <text x="515" y="289" text-anchor="middle" font-size="12" fill="#1a1822">posts</text>
  <text x="558" y="289" font-size="11" fill="#999">=</text>
  <rect x="570" y="270" width="70" height="28" rx="4" fill="#e8e5f0"/>
  <text x="605" y="289" text-anchor="middle" font-size="12" fill="#1a1822">posts</text>
  <text x="650" y="289" font-size="11" fill="#4caf50" font-weight="700">&#x2713; static</text>

  <!-- Dynamic slug -->
  <rect x="480" y="304" width="100" height="28" rx="4" fill="#e07c3e" opacity="0.15"/>
  <text x="530" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#e07c3e">hello-world</text>
  <text x="588" y="323" font-size="11" fill="#999">&#x2192;</text>
  <rect x="600" y="304" width="60" height="28" rx="4" fill="#e07c3e" opacity="0.2" stroke="#e07c3e" stroke-width="1"/>
  <text x="630" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#e07c3e">:slug</text>
  <text x="670" y="323" font-size="11" fill="#e07c3e" font-weight="700">&#x2713; capture</text>

  <!-- Arrow down to extracted params -->
  <line x1="450" y1="350" x2="450" y2="378" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple1)"/>
  <text x="470" y="368" font-size="11" fill="#6d5bd0" font-weight="600">EXTRACT</text>

  <!-- Extracted Params -->
  <rect x="160" y="382" width="260" height="100" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="170" y="404" font-size="11" font-weight="700" fill="#6d5bd0">EXTRACTED PARAMS</text>
  <rect x="176" y="414" width="228" height="26" rx="4" fill="#6d5bd0" opacity="0.08"/>
  <text x="186" y="432" font-size="13" fill="#1a1822">userId</text>
  <text x="270" y="432" font-size="13" fill="#999">=</text>
  <text x="290" y="432" font-size="13" font-weight="700" fill="#6d5bd0">"42"</text>
  <rect x="176" y="446" width="228" height="26" rx="4" fill="#e07c3e" opacity="0.08"/>
  <text x="186" y="464" font-size="13" fill="#1a1822">slug</text>
  <text x="270" y="464" font-size="13" fill="#999">=</text>
  <text x="290" y="464" font-size="13" font-weight="700" fill="#e07c3e">"hello-world"</text>

  <!-- Arrow to component -->
  <line x1="420" y1="432" x2="478" y2="432" stroke="#1a1822" stroke-width="2" marker-end="url(#arrowGray1)"/>
  <text x="432" y="424" font-size="11" fill="#1a1822" font-weight="600">PROPS</text>

  <!-- Component Box -->
  <rect x="482" y="382" width="340" height="100" rx="8" fill="#6d5bd0" stroke="#5a4ab8" stroke-width="1.5"/>
  <text x="502" y="404" font-size="11" font-weight="700" fill="#ffffff" opacity="0.8">COMPONENT RECEIVES</text>
  <rect x="498" y="414" width="308" height="56" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="514" y="434" font-size="13" fill="#ffffff" font-family="monospace">function PostPage(&#123; params &#125;) &#123;</text>
  <text x="530" y="452" font-size="13" fill="#ffffff" font-family="monospace">// params.userId = "42"</text>
  <text x="530" y="468" font-size="13" fill="#ffffff" font-family="monospace">// params.slug = "hello-world"</text>
</svg>