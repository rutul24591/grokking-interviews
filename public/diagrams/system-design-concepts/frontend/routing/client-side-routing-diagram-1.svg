<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Client-side routing lifecycle showing URL change interception, route matching, and DOM update</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Client-Side Routing Lifecycle</text>

  <!-- Row 1: Steps 1-3 -->
  <!-- Step 1: User Clicks Link -->
  <rect x="30" y="70" width="170" height="90" rx="10" fill="#6d5bd0"/>
  <text x="115" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">1. User Clicks Link</text>
  <text x="115" y="123" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">&lt;a href="/dashboard"&gt;</text>
  <text x="115" y="140" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">or navigate()</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="115" x2="240" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Event Intercepted -->
  <rect x="240" y="70" width="170" height="90" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="325" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">2. Event Intercepted</text>
  <text x="325" y="118" text-anchor="middle" font-size="10" fill="#6d5bd0">e.preventDefault()</text>
  <text x="325" y="135" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Browser default navigation</text>
  <text x="325" y="148" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">is blocked</text>

  <!-- Arrow 2→3 -->
  <line x1="410" y1="115" x2="450" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: URL Updated -->
  <rect x="450" y="70" width="170" height="90" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="535" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">3. URL Updated</text>
  <text x="535" y="118" text-anchor="middle" font-size="10" fill="#6d5bd0">history.pushState()</text>
  <text x="535" y="135" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Address bar changes</text>
  <text x="535" y="148" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">without full page reload</text>

  <!-- Connector: row 1 to row 2 (step 3 down to step 4) -->
  <path d="M 620 160 L 620 195 L 115 195 L 115 230" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Row 2: Steps 4-6 -->
  <!-- Step 4: Route Matcher -->
  <rect x="30" y="230" width="170" height="90" rx="10" fill="#6d5bd0"/>
  <text x="115" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">4. Route Matcher</text>
  <text x="115" y="278" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">URL pattern matching</text>
  <text x="115" y="296" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">/dashboard → Route</text>

  <!-- Arrow 4→5 -->
  <line x1="200" y1="275" x2="240" y2="275" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Component Resolved -->
  <rect x="240" y="230" width="170" height="90" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="325" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">5. Component Resolved</text>
  <text x="325" y="278" text-anchor="middle" font-size="10" fill="#6d5bd0">import('./Dashboard')</text>
  <text x="325" y="296" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Lazy-loaded or pre-loaded</text>
  <text x="325" y="309" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">component bundle</text>

  <!-- Arrow 5→6 -->
  <line x1="410" y1="275" x2="450" y2="275" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 6: DOM Updated -->
  <rect x="450" y="230" width="170" height="90" rx="10" fill="#6d5bd0"/>
  <text x="535" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">6. DOM Updated</text>
  <text x="535" y="278" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">React reconciliation</text>
  <text x="535" y="296" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.9">renders new view</text>

  <!-- Connector: step 6 to step 7 -->
  <path d="M 620 320 L 620 355 L 115 355 L 115 390" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Row 3: Step 7 -->
  <!-- Step 7: Scroll Restored -->
  <rect x="30" y="390" width="170" height="90" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="115" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">7. Scroll Restored</text>
  <text x="115" y="438" text-anchor="middle" font-size="10" fill="#6d5bd0">scrollTo(0, savedY)</text>
  <text x="115" y="456" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">Scroll position restored</text>
  <text x="115" y="469" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">or reset to top</text>

  <!-- Key insight box -->
  <rect x="560" y="370" width="310" height="110" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="715" y="395" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Key Insight</text>
  <text x="715" y="415" text-anchor="middle" font-size="10" fill="#1a1822">No full-page reload occurs at any step.</text>
  <text x="715" y="432" text-anchor="middle" font-size="10" fill="#1a1822">The browser stays on the same HTML</text>
  <text x="715" y="449" text-anchor="middle" font-size="10" fill="#1a1822">document. Only the relevant DOM</text>
  <text x="715" y="466" text-anchor="middle" font-size="10" fill="#1a1822">subtree is replaced, preserving state.</text>

  <!-- Popstate listener note -->
  <rect x="660" y="70" width="210" height="90" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="765" y="95" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Back/Forward Button</text>
  <text x="765" y="113" text-anchor="middle" font-size="9" fill="#1a1822">Triggers popstate event</text>
  <text x="765" y="128" text-anchor="middle" font-size="9" fill="#1a1822">which re-enters the flow</text>
  <text x="765" y="143" text-anchor="middle" font-size="9" fill="#1a1822">at Step 4 (Route Matcher)</text>
  <!-- Dotted arrow from popstate to step 4 -->
  <path d="M 660 145 L 200 230" fill="none" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>