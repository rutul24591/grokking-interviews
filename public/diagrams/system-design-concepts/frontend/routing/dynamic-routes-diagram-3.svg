<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Data fetching flow with dynamic route params from URL to rendered component</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Dynamic Route Data Fetching Flow</text>

  <!-- Step 1: URL -->
  <rect x="30" y="80" width="180" height="80" rx="10" fill="#6d5bd0"/>
  <text x="120" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">URL</text>
  <text x="120" y="130" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.9">/products/42</text>
  <text x="120" y="145" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">User navigates</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="120" x2="260" y2="120" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowDF)"/>

  <!-- Step 2: Router extracts params -->
  <rect x="260" y="80" width="180" height="80" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="350" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Router Extracts</text>
  <text x="350" y="125" text-anchor="middle" font-size="11" fill="#6d5bd0">params.id = "42"</text>
  <text x="350" y="145" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Pattern: /products/:id</text>

  <!-- Arrow 2→3 (splits into two parallel paths) -->
  <line x1="440" y1="105" x2="500" y2="105" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="500" y1="105" x2="500" y2="200" stroke="#6d5bd0" stroke-width="2"/>

  <!-- Parallel path: top (validation) -->
  <line x1="500" y1="105" x2="540" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowDF)"/>

  <!-- Step 3a: Validation -->
  <rect x="540" y="70" width="160" height="70" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="620" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Param Validation</text>
  <text x="620" y="115" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Is "42" a valid ID?</text>
  <text x="620" y="130" text-anchor="middle" font-size="10" fill="#6d5bd0">parseInt, UUID check</text>

  <!-- Invalid path → 404 -->
  <line x1="700" y1="95" x2="760" y2="95" stroke="#cc4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="760" y="72" width="110" height="48" rx="8" fill="#cc4444"/>
  <text x="815" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">404 Not Found</text>
  <text x="815" y="110" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.9">Invalid param</text>

  <!-- Valid path → Data loader -->
  <line x1="620" y1="140" x2="620" y2="185" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowDF)"/>
  <text x="640" y="168" font-size="9" fill="#4caf50" font-weight="600">Valid</text>

  <!-- Step 3b: Data Loader -->
  <rect x="500" y="185" width="240" height="80" rx="10" fill="#6d5bd0"/>
  <text x="620" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Data Loader</text>
  <text x="620" y="232" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.9">GET /api/products/42</text>
  <text x="620" y="250" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">Fetches product data from API</text>

  <!-- Loading state (shown while fetching) -->
  <rect x="30" y="195" width="180" height="60" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="120" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Loading State</text>
  <text x="120" y="238" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Skeleton / Spinner shown</text>
  <line x1="500" y1="225" x2="210" y2="225" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowDF)"/>

  <!-- Arrow to component -->
  <line x1="620" y1="265" x2="620" y2="310" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowDF)"/>

  <!-- Data not found path -->
  <line x1="740" y1="225" x2="815" y2="225" stroke="#cc4444" stroke-width="1.5"/>
  <line x1="815" y1="120" x2="815" y2="225" stroke="#cc4444" stroke-width="1.5"/>
  <text x="780" y="215" font-size="9" fill="#cc4444" font-weight="600">Not found</text>

  <!-- Step 4: Component receives data -->
  <rect x="400" y="310" width="440" height="80" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="620" y="335" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Component Receives Props</text>
  <text x="620" y="358" text-anchor="middle" font-size="11" fill="#6d5bd0">ProductPage({ params: { id: "42" }, data: { name: "Widget", price: 29.99 } })</text>
  <text x="620" y="378" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Component has access to both route params and fetched data</text>

  <!-- Arrow to render -->
  <line x1="620" y1="390" x2="620" y2="420" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowDF)"/>

  <!-- Step 5: Rendered page -->
  <rect x="400" y="420" width="440" height="65" rx="10" fill="#6d5bd0"/>
  <text x="620" y="448" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Rendered Product Page</text>
  <text x="620" y="470" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.9">Widget — $29.99 — Full product details rendered</text>

  <!-- Legend -->
  <rect x="30" y="310" width="170" height="100" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="50" y="332" font-size="10" font-weight="700" fill="#1a1822">Legend</text>
  <line x1="50" y1="348" x2="80" y2="348" stroke="#6d5bd0" stroke-width="2"/>
  <text x="90" y="352" font-size="9" fill="#1a1822">Happy path</text>
  <line x1="50" y1="368" x2="80" y2="368" stroke="#cc4444" stroke-width="2"/>
  <text x="90" y="372" font-size="9" fill="#1a1822">Error path</text>
  <line x1="50" y1="388" x2="80" y2="388" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="90" y="392" font-size="9" fill="#1a1822">Loading state</text>

  <defs>
    <marker id="arrowDF" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc4444"/>
    </marker>
  </defs>
</svg>
