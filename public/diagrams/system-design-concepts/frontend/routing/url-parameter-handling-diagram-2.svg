<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>URL-as-state pattern showing bidirectional sync between URL and components</title>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">URL-as-State Pattern</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Bidirectional sync between URL and component state</text>

  <!-- URL Bar -->
  <rect x="150" y="80" width="600" height="55" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="160" y="88" width="20" height="6" rx="3" fill="#d7d1e6"/>
  <rect x="160" y="98" width="20" height="6" rx="3" fill="#d7d1e6"/>
  <rect x="160" y="108" width="20" height="6" rx="3" fill="#d7d1e6"/>
  <circle cx="200" cy="107" r="8" fill="#cc4444" opacity="0.3"/>
  <circle cx="220" cy="107" r="8" fill="#f0ad4e" opacity="0.3"/>
  <circle cx="240" cy="107" r="8" fill="#4caf50" opacity="0.3"/>
  <rect x="260" y="95" width="470" height="28" rx="6" fill="#f3f1f8"/>
  <text x="275" y="114" font-size="11" fill="#1a1822">store.com/products?</text>
  <text x="412" y="114" font-size="11" fill="#cc4444" font-weight="600">page=2</text>
  <text x="462" y="114" font-size="11" fill="#1a1822">&amp;</text>
  <text x="475" y="114" font-size="11" fill="#cc4444" font-weight="600">sort=price</text>
  <text x="545" y="114" font-size="11" fill="#1a1822">&amp;</text>
  <text x="558" y="114" font-size="11" fill="#cc4444" font-weight="600">filter=sale</text>

  <!-- Bidirectional arrows -->
  <line x1="380" y1="135" x2="380" y2="185" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUP)"/>
  <line x1="520" y1="185" x2="520" y2="135" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowUP)"/>
  <text x="450" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Bidirectional Sync</text>

  <!-- Component State -->
  <rect x="200" y="185" width="500" height="65" rx="12" fill="#6d5bd0"/>
  <text x="450" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Component State</text>
  <text x="450" y="232" text-anchor="middle" font-size="12" fill="#ffffff" opacity="0.9">{"{ page: 2, sort: \"price\", filter: \"sale\" }"}</text>

  <!-- Three scenarios side by side -->
  <!-- Scenario 1: User interaction -->
  <rect x="30" y="280" width="260" height="200" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="30" y="280" width="260" height="32" rx="12" fill="#6d5bd0"/>
  <rect x="30" y="302" width="260" height="10" fill="#6d5bd0"/>
  <text x="160" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">User Interaction</text>

  <circle cx="55" cy="335" r="10" fill="#6d5bd0"/>
  <text x="55" y="339" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">1</text>
  <text x="75" y="339" font-size="10" fill="#1a1822">User changes sort dropdown</text>

  <circle cx="55" cy="365" r="10" fill="#6d5bd0"/>
  <text x="55" y="369" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">2</text>
  <text x="75" y="369" font-size="10" fill="#1a1822">Handler calls setSearchParams</text>

  <circle cx="55" cy="395" r="10" fill="#6d5bd0"/>
  <text x="55" y="399" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">3</text>
  <text x="75" y="399" font-size="10" fill="#1a1822">URL updates to ?sort=name</text>

  <circle cx="55" cy="425" r="10" fill="#6d5bd0"/>
  <text x="55" y="429" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">4</text>
  <text x="75" y="429" font-size="10" fill="#1a1822">Other components re-render</text>

  <circle cx="55" cy="455" r="10" fill="#4caf50"/>
  <text x="55" y="459" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">✓</text>
  <text x="75" y="459" font-size="10" fill="#4caf50" font-weight="600">All components stay in sync</text>

  <!-- Scenario 2: Share URL -->
  <rect x="320" y="280" width="260" height="200" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="320" y="280" width="260" height="32" rx="12" fill="#6d5bd0"/>
  <rect x="320" y="302" width="260" height="10" fill="#6d5bd0"/>
  <text x="450" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Share &amp; Restore</text>

  <circle cx="345" cy="335" r="10" fill="#6d5bd0"/>
  <text x="345" y="339" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">1</text>
  <text x="365" y="339" font-size="10" fill="#1a1822">User A copies URL from bar</text>

  <circle cx="345" cy="365" r="10" fill="#6d5bd0"/>
  <text x="345" y="369" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">2</text>
  <text x="365" y="369" font-size="10" fill="#1a1822">Shares with User B</text>

  <circle cx="345" cy="395" r="10" fill="#6d5bd0"/>
  <text x="345" y="399" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">3</text>
  <text x="365" y="399" font-size="10" fill="#1a1822">User B opens link</text>

  <circle cx="345" cy="425" r="10" fill="#6d5bd0"/>
  <text x="345" y="429" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">4</text>
  <text x="365" y="429" font-size="10" fill="#1a1822">URL parsed → state restored</text>

  <circle cx="345" cy="455" r="10" fill="#4caf50"/>
  <text x="345" y="459" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">✓</text>
  <text x="365" y="459" font-size="10" fill="#4caf50" font-weight="600">Exact same view rendered</text>

  <!-- Scenario 3: Back/Forward -->
  <rect x="610" y="280" width="260" height="200" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="610" y="280" width="260" height="32" rx="12" fill="#6d5bd0"/>
  <rect x="610" y="302" width="260" height="10" fill="#6d5bd0"/>
  <text x="740" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Back / Forward</text>

  <circle cx="635" cy="335" r="10" fill="#6d5bd0"/>
  <text x="635" y="339" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">1</text>
  <text x="655" y="339" font-size="10" fill="#1a1822">User clicks browser back</text>

  <circle cx="635" cy="365" r="10" fill="#6d5bd0"/>
  <text x="635" y="369" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">2</text>
  <text x="655" y="369" font-size="10" fill="#1a1822">URL reverts to previous state</text>

  <circle cx="635" cy="395" r="10" fill="#6d5bd0"/>
  <text x="635" y="399" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">3</text>
  <text x="655" y="399" font-size="10" fill="#1a1822">popstate event fires</text>

  <circle cx="635" cy="425" r="10" fill="#6d5bd0"/>
  <text x="635" y="429" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">4</text>
  <text x="655" y="429" font-size="10" fill="#1a1822">Components read new params</text>

  <circle cx="635" cy="455" r="10" fill="#4caf50"/>
  <text x="635" y="459" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">✓</text>
  <text x="655" y="459" font-size="10" fill="#4caf50" font-weight="600">Previous state fully restored</text>

  <defs>
    <marker id="arrowUP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
