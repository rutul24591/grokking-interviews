<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif" role="img" aria-label="Polyfill Delivery Strategies Comparison">
  <defs>
    <marker id="pt2-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Polyfill Delivery Strategies</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#6d5bd0">Bundled vs Service vs Feature-Detect-and-Load</text>

  <!-- Strategy 1: Bundled -->
  <rect x="30" y="75" width="270" height="370" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="75" width="270" height="35" rx="8" fill="#6d5bd0"/>
  <rect x="30" y="102" width="270" height="8" fill="#6d5bd0"/>
  <text x="165" y="99" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1. Bundled Polyfills</text>

  <!-- Flow -->
  <rect x="55" y="125" width="220" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Build Time: Import core-js</text>

  <line x1="165" y1="160" x2="165" y2="175" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#pt2-arrow)"/>

  <rect x="55" y="180" width="220" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Bundle: All polyfills included</text>

  <line x1="165" y1="215" x2="165" y2="230" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#pt2-arrow)"/>

  <rect x="55" y="235" width="220" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1"/>
  <text x="165" y="257" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Serve: Single JS file to all</text>

  <!-- Pros/Cons -->
  <text x="55" y="295" font-size="11" font-weight="600" fill="#6d5bd0">Pros:</text>
  <text x="55" y="312" font-size="10" fill="#1a1822">+ Simple setup</text>
  <text x="55" y="327" font-size="10" fill="#1a1822">+ No external dependency</text>
  <text x="55" y="342" font-size="10" fill="#1a1822">+ Offline works</text>

  <text x="55" y="365" font-size="11" font-weight="600" fill="#d04b4b">Cons:</text>
  <text x="55" y="382" font-size="10" fill="#1a1822">- Largest bundle size</text>
  <text x="55" y="397" font-size="10" fill="#1a1822">- All users pay the cost</text>
  <text x="55" y="412" font-size="10" fill="#1a1822">- Modern browsers get bloat</text>

  <rect x="55" y="420" width="220" height="18" rx="4" fill="#d7d1e6"/>
  <text x="165" y="434" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Bundle: ~45KB+ gzipped overhead</text>

  <!-- Strategy 2: Service (polyfill.io) -->
  <rect x="315" y="75" width="270" height="370" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="315" y="75" width="270" height="35" rx="8" fill="#8b7de0"/>
  <rect x="315" y="102" width="270" height="8" fill="#8b7de0"/>
  <text x="450" y="99" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2. Polyfill Service</text>

  <rect x="340" y="125" width="220" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Request: Send User-Agent</text>

  <line x1="450" y1="160" x2="450" y2="175" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#pt2-arrow)"/>

  <rect x="340" y="180" width="220" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Service: Returns needed polyfills</text>

  <line x1="450" y1="215" x2="450" y2="230" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#pt2-arrow)"/>

  <rect x="340" y="235" width="220" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1"/>
  <text x="450" y="257" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Browser: Only what it needs</text>

  <text x="340" y="295" font-size="11" font-weight="600" fill="#6d5bd0">Pros:</text>
  <text x="340" y="312" font-size="10" fill="#1a1822">+ Tailored per browser</text>
  <text x="340" y="327" font-size="10" fill="#1a1822">+ Modern browsers get ~0 bytes</text>
  <text x="340" y="342" font-size="10" fill="#1a1822">+ CDN cached</text>

  <text x="340" y="365" font-size="11" font-weight="600" fill="#d04b4b">Cons:</text>
  <text x="340" y="382" font-size="10" fill="#1a1822">- External service dependency</text>
  <text x="340" y="397" font-size="10" fill="#1a1822">- Supply chain risk</text>
  <text x="340" y="412" font-size="10" fill="#1a1822">- Extra network request</text>

  <rect x="340" y="420" width="220" height="18" rx="4" fill="#8b7de0" opacity="0.3"/>
  <text x="450" y="434" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Bundle: 0-30KB per browser</text>

  <!-- Strategy 3: Feature-Detect-and-Load -->
  <rect x="600" y="75" width="270" height="370" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="600" y="75" width="270" height="35" rx="8" fill="#6d5bd0" opacity="0.7"/>
  <rect x="600" y="102" width="270" height="8" fill="#6d5bd0" opacity="0.7"/>
  <text x="735" y="99" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3. Detect &amp; Load</text>

  <rect x="625" y="125" width="220" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1"/>
  <text x="735" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Runtime: Check if API exists</text>

  <line x1="735" y1="160" x2="735" y2="175" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#pt2-arrow)"/>

  <rect x="625" y="180" width="220" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1"/>
  <text x="735" y="202" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Missing? Dynamic import()</text>

  <line x1="735" y1="215" x2="735" y2="230" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#pt2-arrow)"/>

  <rect x="625" y="235" width="220" height="35" rx="6" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1"/>
  <text x="735" y="257" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Load only specific polyfills</text>

  <text x="625" y="295" font-size="11" font-weight="600" fill="#6d5bd0">Pros:</text>
  <text x="625" y="312" font-size="10" fill="#1a1822">+ Most precise — zero waste</text>
  <text x="625" y="327" font-size="10" fill="#1a1822">+ Self-hosted, no 3rd party</text>
  <text x="625" y="342" font-size="10" fill="#1a1822">+ Granular control</text>

  <text x="625" y="365" font-size="11" font-weight="600" fill="#d04b4b">Cons:</text>
  <text x="625" y="382" font-size="10" fill="#1a1822">- Complex implementation</text>
  <text x="625" y="397" font-size="10" fill="#1a1822">- Async loading complexity</text>
  <text x="625" y="412" font-size="10" fill="#1a1822">- Maintenance burden</text>

  <rect x="625" y="420" width="220" height="18" rx="4" fill="#6d5bd0" opacity="0.15"/>
  <text x="735" y="434" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Bundle: 0-15KB on-demand</text>

  <!-- Bottom comparison -->
  <text x="450" y="480" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Recommendation: Use "Detect &amp; Load" for apps, "Service" for simple sites, "Bundled" for offline-first</text>
</svg>