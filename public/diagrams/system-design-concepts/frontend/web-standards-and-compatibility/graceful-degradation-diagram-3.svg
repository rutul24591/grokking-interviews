<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif" role="img" aria-label="JavaScript Degradation Boundaries">
  <defs>
    <marker id="gd3-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="gd3-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d04b4b"/>
    </marker>
  </defs>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">JavaScript Degradation Boundaries</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#6d5bd0">Error boundaries, capability checks, and fallback component trees</text>

  <!-- App Shell -->
  <rect x="30" y="70" width="840" height="400" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Application Shell — Error Boundary Root</text>

  <!-- Top-level error boundary -->
  <rect x="50" y="105" width="380" height="350" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="2"/>
  <text x="240" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Error Boundary: Feature A</text>

  <!-- Capability Check -->
  <rect x="75" y="140" width="330" height="40" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="240" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Capability Check: WebSocket API</text>
  <text x="240" y="172" text-anchor="middle" font-size="10" fill="#6d5bd0">"WebSocket" in window</text>

  <!-- Branches -->
  <line x1="160" y1="180" x2="130" y2="205" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#gd3-arrow)"/>
  <text x="120" y="200" font-size="10" font-weight="600" fill="#6d5bd0">Yes</text>
  <line x1="320" y1="180" x2="340" y2="205" stroke="#d04b4b" stroke-width="1.5" marker-end="url(#gd3-red)"/>
  <text x="348" y="200" font-size="10" font-weight="600" fill="#d04b4b">No</text>

  <!-- Full component -->
  <rect x="70" y="210" width="150" height="80" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="145" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Real-time Chat</text>
  <text x="145" y="252" text-anchor="middle" font-size="10" fill="#1a1822">WebSocket</text>
  <text x="145" y="265" text-anchor="middle" font-size="10" fill="#1a1822">connection</text>
  <text x="145" y="278" text-anchor="middle" font-size="10" fill="#1a1822">Live updates</text>

  <!-- Fallback component -->
  <rect x="250" y="210" width="160" height="80" rx="8" fill="#d7d1e6" opacity="0.4" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="330" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Polling Fallback</text>
  <text x="330" y="252" text-anchor="middle" font-size="10" fill="#1a1822">setInterval polling</text>
  <text x="330" y="265" text-anchor="middle" font-size="10" fill="#1a1822">HTTP requests</text>
  <text x="330" y="278" text-anchor="middle" font-size="10" fill="#1a1822">Delayed updates</text>

  <!-- Runtime error handling -->
  <rect x="75" y="310" width="330" height="40" rx="8" fill="#ffffff" stroke="#d04b4b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="240" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#d04b4b">Runtime Error &#x2192; componentDidCatch()</text>
  <text x="240" y="342" text-anchor="middle" font-size="10" fill="#1a1822">Catches JS errors, renders fallback UI</text>

  <line x1="240" y1="350" x2="240" y2="370" stroke="#d04b4b" stroke-width="1.5" marker-end="url(#gd3-red)"/>

  <rect x="120" y="375" width="240" height="35" rx="8" fill="#d7d1e6" opacity="0.4" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="240" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Graceful Error Message UI</text>

  <!-- Right side: Feature B -->
  <rect x="470" y="105" width="380" height="350" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="2"/>
  <text x="660" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Error Boundary: Feature B</text>

  <!-- Capability Check -->
  <rect x="495" y="140" width="330" height="40" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="660" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Capability Check: Web Animations API</text>
  <text x="660" y="172" text-anchor="middle" font-size="10" fill="#6d5bd0">Element.prototype.animate</text>

  <line x1="580" y1="180" x2="550" y2="205" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#gd3-arrow)"/>
  <text x="540" y="200" font-size="10" font-weight="600" fill="#6d5bd0">Yes</text>
  <line x1="740" y1="180" x2="760" y2="205" stroke="#d04b4b" stroke-width="1.5" marker-end="url(#gd3-red)"/>
  <text x="768" y="200" font-size="10" font-weight="600" fill="#d04b4b">No</text>

  <!-- Full component -->
  <rect x="490" y="210" width="150" height="80" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="565" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Rich Animations</text>
  <text x="565" y="252" text-anchor="middle" font-size="10" fill="#1a1822">WAAPI driven</text>
  <text x="565" y="265" text-anchor="middle" font-size="10" fill="#1a1822">60fps transitions</text>
  <text x="565" y="278" text-anchor="middle" font-size="10" fill="#1a1822">Complex sequences</text>

  <!-- Fallback component -->
  <rect x="670" y="210" width="160" height="80" rx="8" fill="#d7d1e6" opacity="0.4" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="750" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">CSS Transitions</text>
  <text x="750" y="252" text-anchor="middle" font-size="10" fill="#1a1822">Simple fade/slide</text>
  <text x="750" y="265" text-anchor="middle" font-size="10" fill="#1a1822">CSS keyframes</text>
  <text x="750" y="278" text-anchor="middle" font-size="10" fill="#1a1822">No sequencing</text>

  <!-- Runtime error handling -->
  <rect x="495" y="310" width="330" height="40" rx="8" fill="#ffffff" stroke="#d04b4b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="660" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#d04b4b">Runtime Error &#x2192; componentDidCatch()</text>
  <text x="660" y="342" text-anchor="middle" font-size="10" fill="#1a1822">Isolates failure to this boundary only</text>

  <line x1="660" y1="350" x2="660" y2="370" stroke="#d04b4b" stroke-width="1.5" marker-end="url(#gd3-red)"/>

  <rect x="540" y="375" width="240" height="35" rx="8" fill="#d7d1e6" opacity="0.4" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="660" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Static Content Fallback</text>

  <!-- Bottom note -->
  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#6d5bd0">Each feature boundary isolates failures — one broken feature does not crash the app</text>
</svg>