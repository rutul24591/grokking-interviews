<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif" role="img" aria-label="Degradation Tier Architecture">
  <defs>
    <marker id="gd1-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Degradation Tier Architecture</text>

  <!-- Full App Entry -->
  <rect x="320" y="55" width="260" height="48" rx="8" fill="#6d5bd0" stroke="#1a1822" stroke-width="2"/>
  <text x="450" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Full Application</text>
  <text x="450" y="93" text-anchor="middle" font-size="10" fill="#f3f1f8">Built for modern browsers</text>

  <line x1="450" y1="103" x2="450" y2="128" stroke="#6d5bd0" stroke-width="2" marker-end="url(#gd1-arrow)"/>

  <!-- Capability Detection -->
  <rect x="280" y="133" width="340" height="48" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="155" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Capability Detection Engine</text>
  <text x="450" y="172" text-anchor="middle" font-size="10" fill="#6d5bd0">User agent + feature detection + @supports queries</text>

  <!-- Three tier branches -->
  <line x1="340" y1="181" x2="150" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#gd1-arrow)"/>
  <line x1="450" y1="181" x2="450" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#gd1-arrow)"/>
  <line x1="560" y1="181" x2="750" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#gd1-arrow)"/>

  <!-- Tier 1: Full Experience -->
  <rect x="40" y="225" width="220" height="130" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="225" width="220" height="32" rx="8" fill="#6d5bd0"/>
  <rect x="40" y="248" width="220" height="8" fill="#6d5bd0"/>
  <text x="150" y="247" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Tier 1: Full</text>
  <text x="150" y="280" text-anchor="middle" font-size="11" fill="#1a1822">WebGL animations</text>
  <text x="150" y="296" text-anchor="middle" font-size="11" fill="#1a1822">CSS Grid layout</text>
  <text x="150" y="312" text-anchor="middle" font-size="11" fill="#1a1822">Service Worker caching</text>
  <text x="150" y="328" text-anchor="middle" font-size="11" fill="#1a1822">Web Push notifications</text>
  <text x="150" y="344" text-anchor="middle" font-size="10" fill="#6d5bd0">Chrome, Edge, Firefox latest</text>

  <!-- Tier 2: Reduced Experience -->
  <rect x="340" y="225" width="220" height="130" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="340" y="225" width="220" height="32" rx="8" fill="#8b7de0"/>
  <rect x="340" y="248" width="220" height="8" fill="#8b7de0"/>
  <text x="450" y="247" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Tier 2: Reduced</text>
  <text x="450" y="280" text-anchor="middle" font-size="11" fill="#1a1822">CSS animations fallback</text>
  <text x="450" y="296" text-anchor="middle" font-size="11" fill="#1a1822">Flexbox layout</text>
  <text x="450" y="312" text-anchor="middle" font-size="11" fill="#1a1822">HTTP caching only</text>
  <text x="450" y="328" text-anchor="middle" font-size="11" fill="#1a1822">No push — polling</text>
  <text x="450" y="344" text-anchor="middle" font-size="10" fill="#6d5bd0">Safari, older Chrome/Firefox</text>

  <!-- Tier 3: Basic Experience -->
  <rect x="640" y="225" width="220" height="130" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="640" y="225" width="220" height="32" rx="8" fill="#a99de8"/>
  <rect x="640" y="248" width="220" height="8" fill="#a99de8"/>
  <text x="750" y="247" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Tier 3: Basic</text>
  <text x="750" y="280" text-anchor="middle" font-size="11" fill="#1a1822">No animations</text>
  <text x="750" y="296" text-anchor="middle" font-size="11" fill="#1a1822">Float-based layout</text>
  <text x="750" y="312" text-anchor="middle" font-size="11" fill="#1a1822">Full page reloads</text>
  <text x="750" y="328" text-anchor="middle" font-size="11" fill="#1a1822">Static content only</text>
  <text x="750" y="344" text-anchor="middle" font-size="10" fill="#6d5bd0">IE11, older mobile browsers</text>

  <!-- Arrows to rendered output -->
  <line x1="150" y1="355" x2="150" y2="390" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#gd1-arrow)"/>
  <line x1="450" y1="355" x2="450" y2="390" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#gd1-arrow)"/>
  <line x1="750" y1="355" x2="750" y2="390" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#gd1-arrow)"/>

  <!-- Component Rendering -->
  <rect x="40" y="395" width="220" height="40" rx="8" fill="#6d5bd0" opacity="0.12" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="150" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Rich Components</text>

  <rect x="340" y="395" width="220" height="40" rx="8" fill="#6d5bd0" opacity="0.08" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Standard Components</text>

  <rect x="640" y="395" width="220" height="40" rx="8" fill="#d7d1e6" opacity="0.3" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="750" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Minimal Components</text>

  <!-- Arrow showing degradation direction -->
  <line x1="260" y1="460" x2="640" y2="460" stroke="#6d5bd0" stroke-width="2" marker-end="url(#gd1-arrow)"/>
  <text x="450" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Degradation Direction: Full &#x2192; Reduced &#x2192; Basic</text>
</svg>