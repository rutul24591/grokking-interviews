<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow-cb3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Test Matrix Prioritization Strategy</text>

  <!-- Tier 1: Critical -->
  <rect x="30" y="60" width="840" height="130" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2.5"/>

  <!-- Tier badge -->
  <rect x="30" y="60" width="100" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="30" y="80" width="100" height="10" fill="#6d5bd0"/>
  <text x="80" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">TIER 1</text>

  <text x="145" y="80" font-size="14" font-weight="700" fill="#1a1822">Critical Flows — 100% Browser Coverage</text>
  <text x="145" y="96" font-size="10" fill="#6d5bd0">Every PR, every commit. Must pass before merge.</text>

  <!-- Tier 1 browsers -->
  <rect x="50" y="110" width="110" height="65" rx="6" fill="#6d5bd0"/>
  <text x="105" y="132" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Chrome Latest</text>
  <text x="105" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Desktop + Mobile</text>
  <text x="105" y="162" text-anchor="middle" font-size="8" fill="#ffffff">~65% users</text>

  <rect x="175" y="110" width="110" height="65" rx="6" fill="#6d5bd0"/>
  <text x="230" y="132" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Safari Latest</text>
  <text x="230" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Desktop + iOS</text>
  <text x="230" y="162" text-anchor="middle" font-size="8" fill="#ffffff">~19% users</text>

  <rect x="300" y="110" width="110" height="65" rx="6" fill="#6d5bd0"/>
  <text x="355" y="132" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Firefox Latest</text>
  <text x="355" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Desktop</text>
  <text x="355" y="162" text-anchor="middle" font-size="8" fill="#ffffff">~7% users</text>

  <rect x="425" y="110" width="110" height="65" rx="6" fill="#6d5bd0"/>
  <text x="480" y="132" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Edge Latest</text>
  <text x="480" y="147" text-anchor="middle" font-size="9" fill="#ffffff">Desktop</text>
  <text x="480" y="162" text-anchor="middle" font-size="8" fill="#ffffff">~5% users</text>

  <!-- Test types for Tier 1 -->
  <rect x="570" y="108" width="280" height="70" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="580" y="128" font-size="10" font-weight="600" fill="#1a1822">Tests Run:</text>
  <text x="580" y="145" font-size="9" fill="#6d5bd0">Login/Signup, Checkout, Search</text>
  <text x="580" y="158" font-size="9" fill="#6d5bd0">Payment, Navigation, Core CRUD</text>
  <text x="580" y="171" font-size="9" fill="#1a1822">Full E2E + Visual Regression</text>

  <!-- Tier 2: Feature Testing -->
  <rect x="30" y="205" width="840" height="120" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>

  <rect x="30" y="205" width="100" height="30" rx="8" fill="#6d5bd0" opacity="0.8"/>
  <rect x="30" y="225" width="100" height="10" fill="#6d5bd0" opacity="0.8"/>
  <text x="80" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">TIER 2</text>

  <text x="145" y="225" font-size="14" font-weight="700" fill="#1a1822">Feature Tests — Top 3 Browsers</text>
  <text x="145" y="241" font-size="10" fill="#6d5bd0">Nightly builds. Runs on schedule, not every commit.</text>

  <rect x="50" y="255" width="110" height="55" rx="6" fill="#6d5bd0" opacity="0.8"/>
  <text x="105" y="277" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Chrome Latest</text>
  <text x="105" y="297" text-anchor="middle" font-size="9" fill="#ffffff">Desktop + Mobile</text>

  <rect x="175" y="255" width="110" height="55" rx="6" fill="#6d5bd0" opacity="0.8"/>
  <text x="230" y="277" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Safari Latest</text>
  <text x="230" y="297" text-anchor="middle" font-size="9" fill="#ffffff">Desktop + iOS</text>

  <rect x="300" y="255" width="110" height="55" rx="6" fill="#6d5bd0" opacity="0.8"/>
  <text x="355" y="277" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Firefox Latest</text>
  <text x="355" y="297" text-anchor="middle" font-size="9" fill="#ffffff">Desktop</text>

  <rect x="570" y="253" width="280" height="60" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="580" y="273" font-size="10" font-weight="600" fill="#1a1822">Tests Run:</text>
  <text x="580" y="290" font-size="9" fill="#6d5bd0">Settings, Profile, Notifications</text>
  <text x="580" y="303" font-size="9" fill="#1a1822">Feature-specific integration tests</text>

  <!-- Tier 3: Secondary -->
  <rect x="30" y="340" width="840" height="120" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>

  <rect x="30" y="340" width="100" height="30" rx="8" fill="#6d5bd0" opacity="0.5"/>
  <rect x="30" y="360" width="100" height="10" fill="#6d5bd0" opacity="0.5"/>
  <text x="80" y="360" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">TIER 3</text>

  <text x="145" y="360" font-size="14" font-weight="700" fill="#1a1822">Secondary — Reduced Coverage</text>
  <text x="145" y="376" font-size="10" fill="#6d5bd0">Weekly or pre-release only. Smoke tests on older browsers.</text>

  <rect x="50" y="390" width="110" height="55" rx="6" fill="#6d5bd0" opacity="0.5"/>
  <text x="105" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Chrome N-1</text>
  <text x="105" y="432" text-anchor="middle" font-size="9" fill="#ffffff">Previous version</text>

  <rect x="175" y="390" width="110" height="55" rx="6" fill="#6d5bd0" opacity="0.5"/>
  <text x="230" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Safari N-1</text>
  <text x="230" y="432" text-anchor="middle" font-size="9" fill="#ffffff">Previous version</text>

  <rect x="300" y="390" width="110" height="55" rx="6" fill="#6d5bd0" opacity="0.5"/>
  <text x="355" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Samsung Internet</text>
  <text x="355" y="432" text-anchor="middle" font-size="9" fill="#ffffff">Mobile</text>

  <rect x="570" y="388" width="280" height="60" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="580" y="408" font-size="10" font-weight="600" fill="#1a1822">Tests Run:</text>
  <text x="580" y="425" font-size="9" fill="#6d5bd0">Smoke tests: app loads, login works</text>
  <text x="580" y="438" font-size="9" fill="#1a1822">Basic navigation &amp; rendering checks</text>

  <!-- Coverage indicator on right -->
  <text x="870" y="145" text-anchor="end" font-size="10" font-weight="600" fill="#6d5bd0">100%</text>
  <text x="870" y="285" text-anchor="end" font-size="10" font-weight="600" fill="#6d5bd0">60%</text>
  <text x="870" y="425" text-anchor="end" font-size="10" font-weight="600" fill="#6d5bd0">20%</text>

  <!-- Watermark -->
  <text x="870" y="490" text-anchor="end" font-size="8" fill="#d7d1e6">Test Matrix Prioritization Strategy</text>
</svg>