<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif" role="img" aria-label="Differential Serving with module/nomodule Pattern">
  <defs>
    <marker id="pt3-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="pt3-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9e6d"/>
    </marker>
    <marker id="pt3-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c07a30"/>
    </marker>
  </defs>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Differential Serving: module/nomodule Pattern</text>

  <!-- HTML Source -->
  <rect x="280" y="55" width="340" height="100" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">HTML Document</text>
  <rect x="300" y="88" width="300" height="25" rx="4" fill="#6d5bd0" opacity="0.1"/>
  <text x="450" y="105" text-anchor="middle" font-size="10" fill="#6d5bd0">&lt;script type="module" src="app.modern.js"&gt;</text>
  <rect x="300" y="118" width="300" height="25" rx="4" fill="#d7d1e6" opacity="0.5"/>
  <text x="450" y="135" text-anchor="middle" font-size="10" fill="#1a1822">&lt;script nomodule src="app.legacy.js"&gt;</text>

  <!-- Branching -->
  <line x1="350" y1="155" x2="200" y2="200" stroke="#4a9e6d" stroke-width="2" marker-end="url(#pt3-green)"/>
  <line x1="550" y1="155" x2="700" y2="200" stroke="#c07a30" stroke-width="2" marker-end="url(#pt3-orange)"/>

  <!-- Modern Browser Path -->
  <rect x="60" y="205" width="280" height="50" rx="8" fill="#ffffff" stroke="#4a9e6d" stroke-width="2"/>
  <text x="200" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#4a9e6d">Modern Browser</text>
  <text x="200" y="245" text-anchor="middle" font-size="10" fill="#1a1822">Understands type="module"</text>

  <line x1="200" y1="255" x2="200" y2="278" stroke="#4a9e6d" stroke-width="2" marker-end="url(#pt3-green)"/>

  <rect x="60" y="283" width="280" height="40" rx="8" fill="#4a9e6d" opacity="0.1" stroke="#4a9e6d" stroke-width="1.5"/>
  <text x="200" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#4a9e6d">Downloads: app.modern.js</text>
  <text x="200" y="315" text-anchor="middle" font-size="10" fill="#1a1822">Ignores nomodule scripts</text>

  <line x1="200" y1="323" x2="200" y2="345" stroke="#4a9e6d" stroke-width="2" marker-end="url(#pt3-green)"/>

  <!-- Modern bundle details -->
  <rect x="40" y="350" width="320" height="100" rx="8" fill="#ffffff" stroke="#4a9e6d" stroke-width="2"/>
  <text x="200" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#4a9e6d">Modern Bundle</text>
  <text x="200" y="392" text-anchor="middle" font-size="10" fill="#1a1822">ES2020 syntax: arrow functions, async/await</text>
  <text x="200" y="407" text-anchor="middle" font-size="10" fill="#1a1822">Native: Promise, Map, Set, fetch</text>
  <text x="200" y="422" text-anchor="middle" font-size="10" fill="#1a1822">No polyfills needed</text>
  <text x="200" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#4a9e6d">Size: ~120KB gzipped</text>

  <!-- Legacy Browser Path -->
  <rect x="560" y="205" width="280" height="50" rx="8" fill="#ffffff" stroke="#c07a30" stroke-width="2"/>
  <text x="700" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#c07a30">Legacy Browser</text>
  <text x="700" y="245" text-anchor="middle" font-size="10" fill="#1a1822">Ignores type="module"</text>

  <line x1="700" y1="255" x2="700" y2="278" stroke="#c07a30" stroke-width="2" marker-end="url(#pt3-orange)"/>

  <rect x="560" y="283" width="280" height="40" rx="8" fill="#c07a30" opacity="0.1" stroke="#c07a30" stroke-width="1.5"/>
  <text x="700" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#c07a30">Downloads: app.legacy.js</text>
  <text x="700" y="315" text-anchor="middle" font-size="10" fill="#1a1822">Processes nomodule scripts</text>

  <line x1="700" y1="323" x2="700" y2="345" stroke="#c07a30" stroke-width="2" marker-end="url(#pt3-orange)"/>

  <!-- Legacy bundle details -->
  <rect x="540" y="350" width="320" height="100" rx="8" fill="#ffffff" stroke="#c07a30" stroke-width="2"/>
  <text x="700" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#c07a30">Legacy Bundle</text>
  <text x="700" y="392" text-anchor="middle" font-size="10" fill="#1a1822">ES5 syntax: var, .then(), functions</text>
  <text x="700" y="407" text-anchor="middle" font-size="10" fill="#1a1822">Polyfills: core-js, regenerator-runtime</text>
  <text x="700" y="422" text-anchor="middle" font-size="10" fill="#1a1822">Full compatibility shims</text>
  <text x="700" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#c07a30">Size: ~280KB gzipped</text>

  <!-- Bottom summary -->
  <text x="450" y="480" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">~85% of users get the modern bundle — faster load, less code, same functionality</text>
</svg>