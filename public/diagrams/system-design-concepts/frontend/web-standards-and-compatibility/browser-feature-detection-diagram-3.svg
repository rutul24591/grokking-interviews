<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow-bd3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">CSS Feature Detection Flow with @supports &amp; matchMedia</text>

  <!-- CSS Source -->
  <rect x="30" y="60" width="160" height="50" rx="8" fill="#6d5bd0"/>
  <text x="110" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">CSS Stylesheet</text>

  <!-- Arrow to @supports -->
  <line x1="190" y1="85" x2="240" y2="85" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-bd3)"/>

  <!-- @supports Check -->
  <rect x="250" y="55" width="180" height="60" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="340" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">@supports Check</text>
  <text x="340" y="100" text-anchor="middle" font-size="10" fill="#6d5bd0">(display: grid)</text>

  <!-- Yes branch -->
  <line x1="340" y1="115" x2="340" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-bd3)"/>
  <text x="355" y="140" font-size="10" fill="#1a1822" font-weight="600">Supported</text>

  <!-- Modern Styles -->
  <rect x="260" y="165" width="160" height="45" rx="8" fill="#6d5bd0"/>
  <text x="340" y="192" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Apply Grid Layout</text>

  <!-- No branch -->
  <line x1="430" y1="85" x2="480" y2="85" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrow-bd3)"/>
  <text x="455" y="78" font-size="10" fill="#1a1822" font-weight="600">Not Supported</text>

  <!-- Fallback -->
  <rect x="490" y="60" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="570" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Fallback Styles</text>
  <text x="570" y="100" text-anchor="middle" font-size="10" fill="#6d5bd0">Flexbox / Float</text>

  <!-- Separator -->
  <line x1="30" y1="240" x2="870" y2="240" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="450" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">JavaScript matchMedia Integration</text>

  <!-- JS Entry -->
  <rect x="30" y="280" width="160" height="50" rx="8" fill="#6d5bd0"/>
  <text x="110" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">window.matchMedia()</text>
  <text x="110" y="320" text-anchor="middle" font-size="10" fill="#ffffff">(prefers-reduced-motion)</text>

  <!-- Arrow -->
  <line x1="190" y1="305" x2="240" y2="305" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-bd3)"/>

  <!-- Media Query Check -->
  <polygon points="340,275 420,305 340,335 260,305" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="340" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">matches?</text>

  <!-- Yes -->
  <line x1="340" y1="335" x2="340" y2="375" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-bd3)"/>
  <text x="355" y="360" font-size="10" fill="#1a1822" font-weight="600">Yes</text>

  <!-- Reduced Motion -->
  <rect x="260" y="385" width="160" height="45" rx="8" fill="#6d5bd0"/>
  <text x="340" y="405" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Disable Animations</text>
  <text x="340" y="420" text-anchor="middle" font-size="10" fill="#ffffff">CSS class toggle</text>

  <!-- No -->
  <line x1="420" y1="305" x2="490" y2="305" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrow-bd3)"/>
  <text x="455" y="298" font-size="10" fill="#1a1822" font-weight="600">No</text>

  <!-- Full Animations -->
  <rect x="500" y="280" width="160" height="50" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="580" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Enable Animations</text>
  <text x="580" y="318" text-anchor="middle" font-size="10" fill="#6d5bd0">Full motion effects</text>

  <!-- Event Listener -->
  <rect x="500" y="385" width="160" height="45" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="580" y="405" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">addEventListener</text>
  <text x="580" y="420" text-anchor="middle" font-size="10" fill="#6d5bd0">&quot;change&quot; event</text>

  <!-- Arrow from listener back -->
  <line x1="660" y1="407" x2="720" y2="407" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="720" y1="407" x2="720" y2="305" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="720" y1="305" x2="690" y2="305" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-bd3)"/>
  <text x="740" y="360" font-size="9" fill="#6d5bd0" transform="rotate(-90,740,360)">Re-evaluate</text>

  <!-- Cascade Summary -->
  <rect x="700" y="60" width="170" height="150" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="785" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">Cascade Priority</text>
  <line x1="715" y1="90" x2="855" y2="90" stroke="#d7d1e6" stroke-width="1"/>
  <text x="725" y="110" font-size="10" fill="#1a1822">1. @supports (grid)</text>
  <text x="725" y="128" font-size="10" fill="#1a1822">2. @supports (flex)</text>
  <text x="725" y="146" font-size="10" fill="#1a1822">3. @media (prefers-*)</text>
  <text x="725" y="164" font-size="10" fill="#1a1822">4. Base fallback styles</text>
  <text x="725" y="185" font-size="9" fill="#6d5bd0">Most specific wins</text>

  <!-- Connection arrows from cascade to flows -->
  <line x1="700" y1="135" x2="650" y2="85" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
</svg>