<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif" role="img" aria-label="CSS Degradation Cascade with @supports Feature Queries">
  <defs>
    <marker id="gd2-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">CSS Degradation Cascade</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#6d5bd0">@supports feature queries and fallback value layering</text>

  <!-- Base CSS Layer -->
  <rect x="50" y="75" width="800" height="75" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="50" y="75" width="800" height="28" rx="8" fill="#d7d1e6"/>
  <rect x="50" y="95" width="800" height="8" fill="#d7d1e6"/>
  <text x="450" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Base CSS — Always Applied (Fallback Values)</text>
  <text x="170" y="125" text-anchor="middle" font-size="11" fill="#1a1822">display: block</text>
  <text x="350" y="125" text-anchor="middle" font-size="11" fill="#1a1822">float: left</text>
  <text x="530" y="125" text-anchor="middle" font-size="11" fill="#1a1822">background: #6d5bd0</text>
  <text x="730" y="125" text-anchor="middle" font-size="11" fill="#1a1822">border-radius: 0</text>

  <!-- Arrow down -->
  <line x1="450" y1="150" x2="450" y2="170" stroke="#6d5bd0" stroke-width="2" marker-end="url(#gd2-arrow)"/>
  <text x="465" y="165" font-size="10" font-weight="600" fill="#6d5bd0">Override if supported</text>

  <!-- @supports flexbox layer -->
  <rect x="80" y="175" width="740" height="75" rx="8" fill="#ffffff" stroke="#8b7de0" stroke-width="2"/>
  <rect x="80" y="175" width="740" height="28" rx="8" fill="#8b7de0"/>
  <rect x="80" y="195" width="740" height="8" fill="#8b7de0"/>
  <text x="450" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">@supports (display: flex) — Flexbox Layer</text>
  <text x="200" y="225" text-anchor="middle" font-size="11" fill="#1a1822">display: flex</text>
  <text x="380" y="225" text-anchor="middle" font-size="11" fill="#1a1822">gap: 1rem</text>
  <text x="560" y="225" text-anchor="middle" font-size="11" fill="#1a1822">flex-wrap: wrap</text>
  <text x="720" y="225" text-anchor="middle" font-size="11" fill="#1a1822">align-items: center</text>

  <!-- Arrow down -->
  <line x1="450" y1="250" x2="450" y2="270" stroke="#6d5bd0" stroke-width="2" marker-end="url(#gd2-arrow)"/>
  <text x="465" y="265" font-size="10" font-weight="600" fill="#6d5bd0">Override if supported</text>

  <!-- @supports grid layer -->
  <rect x="110" y="275" width="680" height="75" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="110" y="275" width="680" height="28" rx="8" fill="#6d5bd0"/>
  <rect x="110" y="295" width="680" height="8" fill="#6d5bd0"/>
  <text x="450" y="294" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">@supports (display: grid) — Grid Layer</text>
  <text x="230" y="325" text-anchor="middle" font-size="11" fill="#1a1822">display: grid</text>
  <text x="410" y="325" text-anchor="middle" font-size="11" fill="#1a1822">grid-template-columns</text>
  <text x="610" y="325" text-anchor="middle" font-size="11" fill="#1a1822">grid-gap: 1.5rem</text>

  <!-- Arrow down -->
  <line x1="450" y1="350" x2="450" y2="370" stroke="#6d5bd0" stroke-width="2" marker-end="url(#gd2-arrow)"/>
  <text x="465" y="365" font-size="10" font-weight="600" fill="#6d5bd0">Override if supported</text>

  <!-- @supports subgrid / container queries layer -->
  <rect x="150" y="375" width="600" height="75" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="150" y="375" width="600" height="28" rx="8" fill="#6d5bd0" opacity="0.7"/>
  <rect x="150" y="395" width="600" height="8" fill="#6d5bd0" opacity="0.7"/>
  <text x="450" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">@supports (container-type: inline-size) — Container Queries</text>
  <text x="300" y="425" text-anchor="middle" font-size="11" fill="#1a1822">container-type: inline-size</text>
  <text x="530" y="425" text-anchor="middle" font-size="11" fill="#1a1822">@container (min-width: 400px)</text>

  <!-- Bottom labels -->
  <text x="80" y="475" font-size="12" font-weight="600" fill="#1a1822">Cascade Priority:</text>
  <rect x="210" y="462" width="100" height="20" rx="4" fill="#d7d1e6"/>
  <text x="260" y="477" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Base (all)</text>
  <text x="320" y="477" font-size="12" fill="#6d5bd0">&#x2192;</text>
  <rect x="335" y="462" width="100" height="20" rx="4" fill="#8b7de0"/>
  <text x="385" y="477" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Flex (~97%)</text>
  <text x="445" y="477" font-size="12" fill="#6d5bd0">&#x2192;</text>
  <rect x="460" y="462" width="100" height="20" rx="4" fill="#6d5bd0"/>
  <text x="510" y="477" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Grid (~95%)</text>
  <text x="570" y="477" font-size="12" fill="#6d5bd0">&#x2192;</text>
  <rect x="585" y="462" width="130" height="20" rx="4" fill="#6d5bd0" opacity="0.7"/>
  <text x="650" y="477" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Container (~85%)</text>
</svg>