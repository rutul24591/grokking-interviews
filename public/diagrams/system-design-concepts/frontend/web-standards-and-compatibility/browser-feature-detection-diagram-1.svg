<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif" role="img" aria-label="Centralized Detection Service Architecture">
  <defs>
    <marker id="bd1-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Centralized Feature Detection Service Architecture</text>

  <!-- Detection Service (center) -->
  <rect x="300" y="60" width="300" height="65" rx="8" fill="#6d5bd0" stroke="#1a1822" stroke-width="2"/>
  <text x="450" y="87" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Feature Detection Service</text>
  <text x="450" y="108" text-anchor="middle" font-size="11" fill="#f3f1f8">Singleton — initialized once at app boot</text>

  <!-- Three probes feeding in -->
  <line x1="450" y1="125" x2="150" y2="165" stroke="#6d5bd0" stroke-width="2" marker-end="url(#bd1-arrow)"/>
  <line x1="450" y1="125" x2="450" y2="165" stroke="#6d5bd0" stroke-width="2" marker-end="url(#bd1-arrow)"/>
  <line x1="450" y1="125" x2="750" y2="165" stroke="#6d5bd0" stroke-width="2" marker-end="url(#bd1-arrow)"/>

  <!-- Probe 1: API Detection -->
  <rect x="40" y="170" width="220" height="80" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="150" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">API Probes</text>
  <text x="150" y="212" text-anchor="middle" font-size="10" fill="#6d5bd0">"IntersectionObserver" in window</text>
  <text x="150" y="226" text-anchor="middle" font-size="10" fill="#6d5bd0">"serviceWorker" in navigator</text>
  <text x="150" y="240" text-anchor="middle" font-size="10" fill="#6d5bd0">"WebSocket" in window</text>

  <!-- Probe 2: CSS Detection -->
  <rect x="340" y="170" width="220" height="80" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">CSS Probes</text>
  <text x="450" y="212" text-anchor="middle" font-size="10" fill="#6d5bd0">CSS.supports("display", "grid")</text>
  <text x="450" y="226" text-anchor="middle" font-size="10" fill="#6d5bd0">CSS.supports("container-type")</text>
  <text x="450" y="240" text-anchor="middle" font-size="10" fill="#6d5bd0">matchMedia("(hover: hover)")</text>

  <!-- Probe 3: Hardware Detection -->
  <rect x="640" y="170" width="220" height="80" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="750" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Hardware Probes</text>
  <text x="750" y="212" text-anchor="middle" font-size="10" fill="#6d5bd0">navigator.hardwareConcurrency</text>
  <text x="750" y="226" text-anchor="middle" font-size="10" fill="#6d5bd0">navigator.deviceMemory</text>
  <text x="750" y="240" text-anchor="middle" font-size="10" fill="#6d5bd0">navigator.connection.effectiveType</text>

  <!-- Arrows merge to profile -->
  <line x1="150" y1="250" x2="450" y2="290" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="450" y1="250" x2="450" y2="290" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="750" y1="250" x2="450" y2="290" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Browser Profile -->
  <rect x="250" y="295" width="400" height="70" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Browser Capability Profile</text>
  <text x="450" y="340" text-anchor="middle" font-size="11" fill="#6d5bd0">Immutable object: { hasGrid, hasWebGL, hasSW, tier, ... }</text>
  <text x="450" y="355" text-anchor="middle" font-size="10" fill="#1a1822">Cached in memory — computed once, queried many times</text>

  <!-- Distribution via Context -->
  <line x1="450" y1="365" x2="450" y2="385" stroke="#6d5bd0" stroke-width="2" marker-end="url(#bd1-arrow)"/>

  <rect x="280" y="390" width="340" height="35" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="413" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">React Context / Provider</text>

  <!-- Consuming components -->
  <line x1="330" y1="425" x2="150" y2="445" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#bd1-arrow)"/>
  <line x1="450" y1="425" x2="450" y2="445" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#bd1-arrow)"/>
  <line x1="570" y1="425" x2="750" y2="445" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#bd1-arrow)"/>

  <rect x="70" y="450" width="160" height="32" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="150" y="471" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Image Component</text>

  <rect x="370" y="450" width="160" height="32" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="471" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Layout Component</text>

  <rect x="670" y="450" width="160" height="32" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="750" y="471" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Data Fetcher</text>
</svg>