<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow-vp3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Vendor Prefix Lifecycle</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#6d5bd0">From Experimental to Fully Standardized</text>

  <!-- Timeline Arrow -->
  <line x1="50" y1="90" x2="850" y2="90" stroke="#6d5bd0" stroke-width="3" marker-end="url(#arrow-vp3)"/>
  <text x="50" y="82" font-size="9" fill="#6d5bd0">Time</text>

  <!-- Phase markers on timeline -->
  <circle cx="150" cy="90" r="8" fill="#6d5bd0"/>
  <circle cx="400" cy="90" r="8" fill="#6d5bd0"/>
  <circle cx="650" cy="90" r="8" fill="#6d5bd0"/>

  <!-- Phase 1: Experimental -->
  <rect x="50" y="110" width="240" height="160" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="50" y="110" width="240" height="35" rx="8" fill="#6d5bd0"/>
  <rect x="50" y="135" width="240" height="5" fill="#6d5bd0"/>
  <text x="170" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Experimental Phase</text>

  <text x="70" y="168" font-size="10" font-weight="600" fill="#1a1822">Prefix Required</text>
  <text x="70" y="185" font-size="9" fill="#6d5bd0">-webkit-backdrop-filter</text>
  <text x="70" y="199" font-size="9" fill="#6d5bd0">-moz-appearance</text>
  <text x="70" y="213" font-size="9" fill="#6d5bd0">-ms-grid-columns</text>

  <line x1="65" y1="222" x2="275" y2="222" stroke="#d7d1e6" stroke-width="1"/>
  <text x="70" y="240" font-size="9" fill="#1a1822">Behind browser flags</text>
  <text x="70" y="254" font-size="9" fill="#1a1822">Syntax may change</text>
  <text x="70" y="268" font-size="9" fill="#1a1822">No interop guarantee</text>

  <!-- Arrow between phases -->
  <line x1="290" y1="190" x2="330" y2="190" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-vp3)"/>

  <!-- Phase 2: Transition -->
  <rect x="330" y="110" width="240" height="160" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="330" y="110" width="240" height="35" rx="8" fill="#6d5bd0"/>
  <rect x="330" y="135" width="240" height="5" fill="#6d5bd0"/>
  <text x="450" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Transition Phase</text>

  <text x="350" y="168" font-size="10" font-weight="600" fill="#1a1822">Prefix + Standard</text>
  <text x="350" y="185" font-size="9" fill="#6d5bd0">-webkit-user-select: none;</text>
  <text x="350" y="199" font-size="9" fill="#1a1822">user-select: none;</text>

  <line x1="345" y1="212" x2="555" y2="212" stroke="#d7d1e6" stroke-width="1"/>
  <text x="350" y="230" font-size="9" fill="#1a1822">Both forms needed</text>
  <text x="350" y="244" font-size="9" fill="#1a1822">Spec stabilizing</text>
  <text x="350" y="258" font-size="9" fill="#1a1822">Autoprefixer handles this</text>

  <!-- Arrow between phases -->
  <line x1="570" y1="190" x2="610" y2="190" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow-vp3)"/>

  <!-- Phase 3: Standard -->
  <rect x="610" y="110" width="240" height="160" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="610" y="110" width="240" height="35" rx="8" fill="#6d5bd0"/>
  <rect x="610" y="135" width="240" height="5" fill="#6d5bd0"/>
  <text x="730" y="133" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Standard Phase</text>

  <text x="630" y="168" font-size="10" font-weight="600" fill="#1a1822">No Prefix Needed</text>
  <text x="630" y="185" font-size="9" fill="#1a1822">border-radius</text>
  <text x="630" y="199" font-size="9" fill="#1a1822">display: grid</text>
  <text x="630" y="213" font-size="9" fill="#1a1822">display: flex</text>

  <line x1="625" y1="222" x2="835" y2="222" stroke="#d7d1e6" stroke-width="1"/>
  <text x="630" y="240" font-size="9" fill="#1a1822">Full browser support</text>
  <text x="630" y="254" font-size="9" fill="#1a1822">Old prefixes removable</text>
  <text x="630" y="268" font-size="9" fill="#1a1822">Spec is a W3C Rec</text>

  <!-- Browser Support Timeline -->
  <text x="450" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Browser Support Timeline</text>

  <!-- Chrome -->
  <text x="50" y="338" font-size="11" font-weight="600" fill="#1a1822">Chrome</text>
  <rect x="150" y="325" width="80" height="18" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <text x="190" y="338" text-anchor="middle" font-size="8" fill="#1a1822">-webkit-</text>
  <rect x="230" y="325" width="100" height="18" rx="4" fill="#6d5bd0" opacity="0.6"/>
  <text x="280" y="338" text-anchor="middle" font-size="8" fill="#ffffff">prefixed+std</text>
  <rect x="330" y="325" width="520" height="18" rx="4" fill="#6d5bd0"/>
  <text x="590" y="338" text-anchor="middle" font-size="8" fill="#ffffff">Standard (unprefixed)</text>

  <!-- Firefox -->
  <text x="50" y="368" font-size="11" font-weight="600" fill="#1a1822">Firefox</text>
  <rect x="150" y="355" width="120" height="18" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <text x="210" y="368" text-anchor="middle" font-size="8" fill="#1a1822">-moz-</text>
  <rect x="270" y="355" width="80" height="18" rx="4" fill="#6d5bd0" opacity="0.6"/>
  <text x="310" y="368" text-anchor="middle" font-size="8" fill="#ffffff">transition</text>
  <rect x="350" y="355" width="500" height="18" rx="4" fill="#6d5bd0"/>
  <text x="600" y="368" text-anchor="middle" font-size="8" fill="#ffffff">Standard (unprefixed)</text>

  <!-- Safari -->
  <text x="50" y="398" font-size="11" font-weight="600" fill="#1a1822">Safari</text>
  <rect x="150" y="385" width="150" height="18" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <text x="225" y="398" text-anchor="middle" font-size="8" fill="#1a1822">-webkit-</text>
  <rect x="300" y="385" width="150" height="18" rx="4" fill="#6d5bd0" opacity="0.6"/>
  <text x="375" y="398" text-anchor="middle" font-size="8" fill="#ffffff">prefixed+std</text>
  <rect x="450" y="385" width="400" height="18" rx="4" fill="#6d5bd0"/>
  <text x="650" y="398" text-anchor="middle" font-size="8" fill="#ffffff">Standard (unprefixed)</text>

  <!-- Edge -->
  <text x="50" y="428" font-size="11" font-weight="600" fill="#1a1822">Edge</text>
  <rect x="150" y="415" width="100" height="18" rx="4" fill="#6d5bd0" opacity="0.3"/>
  <text x="200" y="428" text-anchor="middle" font-size="8" fill="#1a1822">-ms-</text>
  <rect x="250" y="415" width="60" height="18" rx="4" fill="#6d5bd0" opacity="0.6"/>
  <text x="280" y="428" text-anchor="middle" font-size="8" fill="#ffffff">trans.</text>
  <rect x="310" y="415" width="540" height="18" rx="4" fill="#6d5bd0"/>
  <text x="580" y="428" text-anchor="middle" font-size="8" fill="#ffffff">Chromium-based (unprefixed)</text>

  <!-- Legend -->
  <rect x="150" y="450" width="15" height="12" rx="2" fill="#6d5bd0" opacity="0.3"/>
  <text x="170" y="460" font-size="9" fill="#1a1822">Experimental</text>
  <rect x="260" y="450" width="15" height="12" rx="2" fill="#6d5bd0" opacity="0.6"/>
  <text x="280" y="460" font-size="9" fill="#1a1822">Transition</text>
  <rect x="360" y="450" width="15" height="12" rx="2" fill="#6d5bd0"/>
  <text x="380" y="460" font-size="9" fill="#1a1822">Fully Standard</text>

  <!-- Watermark -->
  <text x="870" y="490" text-anchor="end" font-size="8" fill="#d7d1e6">Vendor Prefix Lifecycle</text>
</svg>