<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif" role="img" aria-label="Feature Detection Decision Tree">
  <defs>
    <marker id="bd2-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="bd2-yes" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9e6d"/>
    </marker>
    <marker id="bd2-no" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d04b4b"/>
    </marker>
  </defs>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Feature Detection Decision Tree</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#6d5bd0">Cascading capability checks to component variant selection</text>

  <!-- Root: Component Request -->
  <rect x="325" y="62" width="250" height="40" rx="8" fill="#6d5bd0" stroke="#1a1822" stroke-width="2"/>
  <text x="450" y="87" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Render Media Gallery</text>

  <line x1="450" y1="102" x2="450" y2="120" stroke="#6d5bd0" stroke-width="2" marker-end="url(#bd2-arrow)"/>

  <!-- Check 1: WebGL -->
  <rect x="330" y="125" width="240" height="36" rx="20" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">WebGL2 Supported?</text>

  <!-- Yes branch -->
  <line x1="350" y1="161" x2="180" y2="190" stroke="#4a9e6d" stroke-width="2" marker-end="url(#bd2-yes)"/>
  <text x="250" y="175" font-size="10" font-weight="700" fill="#4a9e6d">Yes</text>

  <!-- No branch -->
  <line x1="550" y1="161" x2="680" y2="190" stroke="#d04b4b" stroke-width="2" marker-end="url(#bd2-no)"/>
  <text x="620" y="175" font-size="10" font-weight="700" fill="#d04b4b">No</text>

  <!-- Left: WebGL path -->
  <rect x="75" y="195" width="210" height="36" rx="20" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="180" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">GPU Memory &gt; 2GB?</text>

  <line x1="110" y1="231" x2="80" y2="260" stroke="#4a9e6d" stroke-width="1.5" marker-end="url(#bd2-yes)"/>
  <text x="75" y="252" font-size="9" font-weight="700" fill="#4a9e6d">Yes</text>
  <line x1="250" y1="231" x2="270" y2="260" stroke="#d04b4b" stroke-width="1.5" marker-end="url(#bd2-no)"/>
  <text x="275" y="252" font-size="9" font-weight="700" fill="#d04b4b">No</text>

  <!-- 3D Gallery -->
  <rect x="15" y="265" width="130" height="55" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="80" y="288" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">3D Gallery</text>
  <text x="80" y="303" text-anchor="middle" font-size="9" fill="#1a1822">WebGL renderer</text>
  <text x="80" y="314" text-anchor="middle" font-size="9" fill="#1a1822">3D transitions</text>

  <!-- Simple WebGL -->
  <rect x="200" y="265" width="140" height="55" rx="8" fill="#6d5bd0" opacity="0.10" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="270" y="288" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">2.5D Gallery</text>
  <text x="270" y="303" text-anchor="middle" font-size="9" fill="#1a1822">Simple WebGL</text>
  <text x="270" y="314" text-anchor="middle" font-size="9" fill="#1a1822">Parallax effects</text>

  <!-- Right: No WebGL path -->
  <rect x="580" y="195" width="210" height="36" rx="20" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="685" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">CSS Animations?</text>

  <line x1="620" y1="231" x2="545" y2="260" stroke="#4a9e6d" stroke-width="1.5" marker-end="url(#bd2-yes)"/>
  <text x="560" y="252" font-size="9" font-weight="700" fill="#4a9e6d">Yes</text>
  <line x1="750" y1="231" x2="790" y2="260" stroke="#d04b4b" stroke-width="1.5" marker-end="url(#bd2-no)"/>
  <text x="795" y="252" font-size="9" font-weight="700" fill="#d04b4b">No</text>

  <!-- CSS Animated Gallery -->
  <rect x="470" y="265" width="150" height="55" rx="8" fill="#d7d1e6" opacity="0.4" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="545" y="288" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Animated Gallery</text>
  <text x="545" y="303" text-anchor="middle" font-size="9" fill="#1a1822">CSS transitions</text>
  <text x="545" y="314" text-anchor="middle" font-size="9" fill="#1a1822">Slide/fade effects</text>

  <!-- Check IntersectionObserver for lazy load -->
  <rect x="700" y="265" width="180" height="36" rx="20" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="790" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">IntersectionObserver?</text>

  <line x1="745" y1="301" x2="710" y2="325" stroke="#4a9e6d" stroke-width="1.5" marker-end="url(#bd2-yes)"/>
  <text x="705" y="318" font-size="9" font-weight="700" fill="#4a9e6d">Yes</text>
  <line x1="835" y1="301" x2="855" y2="325" stroke="#d04b4b" stroke-width="1.5" marker-end="url(#bd2-no)"/>
  <text x="862" y="318" font-size="9" font-weight="700" fill="#d04b4b">No</text>

  <rect x="640" y="330" width="130" height="50" rx="8" fill="#d7d1e6" opacity="0.3" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="705" y="352" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Lazy Grid</text>
  <text x="705" y="367" text-anchor="middle" font-size="9" fill="#1a1822">Lazy-loaded images</text>

  <rect x="790" y="330" width="100" height="50" rx="8" fill="#d7d1e6" opacity="0.2" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="840" y="352" text-anchor="middle" font-size="10" font-weight="700" fill="#1a1822">Static Grid</text>
  <text x="840" y="367" text-anchor="middle" font-size="9" fill="#1a1822">Eager load all</text>

  <!-- Legend -->
  <rect x="50" y="370" width="300" height="100" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="200" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">Component Variants Selected</text>

  <rect x="70" y="400" width="12" height="12" rx="2" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1"/>
  <text x="90" y="411" font-size="10" fill="#1a1822">Full feature: best experience</text>

  <rect x="70" y="418" width="12" height="12" rx="2" fill="#d7d1e6" opacity="0.4" stroke="#d7d1e6" stroke-width="1"/>
  <text x="90" y="429" font-size="10" fill="#1a1822">Reduced feature: good experience</text>

  <rect x="70" y="436" width="12" height="12" rx="2" fill="#d7d1e6" opacity="0.2" stroke="#d7d1e6" stroke-width="1"/>
  <text x="90" y="447" font-size="10" fill="#1a1822">Basic feature: functional fallback</text>

  <text x="450" y="490" text-anchor="middle" font-size="11" fill="#6d5bd0">Each decision node narrows to the best component variant the browser can support</text>
</svg>