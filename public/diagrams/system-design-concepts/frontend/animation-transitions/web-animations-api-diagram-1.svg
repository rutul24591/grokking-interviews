<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Web Animations API Object Model</text>

  <!-- KeyframeEffect -->
  <rect x="30" y="60" width="260" height="150" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="160" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">KeyframeEffect</text>
  <text x="160" y="100" text-anchor="middle" font-size="9" fill="#6d5bd0">Defines WHAT happens</text>
  <text x="45" y="122" font-size="9" fill="#1a1822">• target: Element to animate</text>
  <text x="45" y="138" font-size="9" fill="#1a1822">• keyframes: [{opacity:0},{opacity:1}]</text>
  <text x="45" y="154" font-size="9" fill="#1a1822">• options: duration, easing, fill</text>
  <text x="45" y="170" font-size="9" fill="#1a1822">• composite: replace | add | accumulate</text>
  <text x="45" y="186" font-size="9" fill="#1a1822">• iterationComposite: replace | accumulate</text>
  <text x="45" y="202" font-size="9" fill="#1a1822">Reusable — same effect, different timelines</text>

  <!-- Timeline -->
  <rect x="320" y="60" width="260" height="150" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">AnimationTimeline</text>
  <text x="450" y="100" text-anchor="middle" font-size="9" fill="#6d5bd0">Defines WHEN it happens</text>

  <rect x="335" y="112" width="230" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="450" y="130" text-anchor="middle" font-size="9" fill="#1a1822">DocumentTimeline (default) — wall clock</text>

  <rect x="335" y="145" width="230" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="450" y="163" text-anchor="middle" font-size="9" fill="#1a1822">ScrollTimeline — scroll position</text>

  <rect x="335" y="178" width="230" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="450" y="196" text-anchor="middle" font-size="9" fill="#1a1822">ViewTimeline — element intersection</text>

  <!-- Animation -->
  <rect x="610" y="60" width="260" height="150" rx="8" fill="#6d5bd0"/>
  <text x="740" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Animation</text>
  <text x="740" y="100" text-anchor="middle" font-size="9" fill="#ffffff">Controls HOW it plays</text>
  <text x="625" y="122" font-size="9" fill="#ffffff">• play() / pause() / cancel()</text>
  <text x="625" y="138" font-size="9" fill="#ffffff">• reverse() / finish()</text>
  <text x="625" y="154" font-size="9" fill="#ffffff">• currentTime (read/write)</text>
  <text x="625" y="170" font-size="9" fill="#ffffff">• playbackRate (speed control)</text>
  <text x="625" y="186" font-size="9" fill="#ffffff">• finished: Promise</text>
  <text x="625" y="202" font-size="9" fill="#ffffff">• ready: Promise</text>

  <!-- Arrows connecting -->
  <line x1="290" y1="135" x2="610" y2="135" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="450" y="230" text-anchor="middle" font-size="10" fill="#6d5bd0">Animation = Effect + Timeline + Playback Control</text>

  <!-- Shorthand -->
  <rect x="30" y="250" width="840" height="70" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="272" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Shorthand: Element.animate(keyframes, options)</text>
  <text x="50" y="295" font-size="10" fill="#1a1822">element.animate([{`{opacity:0}`}, {`{opacity:1}`}], {`{duration:300, easing:"ease-out"}`})</text>
  <text x="50" y="312" font-size="9" fill="#6d5bd0">Creates KeyframeEffect + Animation with document timeline in one call — returns Animation object</text>

  <!-- Lifecycle -->
  <rect x="30" y="340" width="840" height="145" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Animation Lifecycle &amp; Memory Management</text>

  <rect x="50" y="378" width="150" height="35" rx="4" fill="#6d5bd0"/>
  <text x="125" y="400" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">animate()</text>

  <line x1="200" y1="395" x2="230" y2="395" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="230" y="378" width="120" height="35" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="290" y="400" text-anchor="middle" font-size="9" fill="#1a1822">Running</text>

  <line x1="350" y1="395" x2="380" y2="395" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="380" y="378" width="120" height="35" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="440" y="400" text-anchor="middle" font-size="9" fill="#1a1822">Finished</text>

  <line x1="500" y1="395" x2="530" y2="395" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="530" y="378" width="140" height="35" rx="4" fill="#228B22" opacity="0.15" stroke="#228B22"/>
  <text x="600" y="400" text-anchor="middle" font-size="9" fill="#228B22">commitStyles()</text>

  <line x1="670" y1="395" x2="700" y2="395" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="700" y="378" width="150" height="35" rx="4" fill="#228B22"/>
  <text x="775" y="400" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">cancel() → GC safe</text>

  <text x="50" y="438" font-size="9" fill="#1a1822">fill: &quot;forwards&quot; keeps Animation alive indefinitely → memory leak risk with many animations</text>
  <text x="50" y="455" font-size="9" fill="#228B22" font-weight="600">Best practice: await finished → commitStyles() → cancel() — persists values, releases resources</text>
  <text x="50" y="472" font-size="9" fill="#1a1822">getAnimations() returns all active animations on element — use to cancel conflicts before starting new ones</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
