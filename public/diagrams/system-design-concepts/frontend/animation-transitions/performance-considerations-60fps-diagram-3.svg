<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Layout Thrashing vs Batched DOM Access</text>

  <!-- Thrashing example -->
  <rect x="30" y="55" width="410" height="250" rx="8" fill="#ffffff" stroke="#cc3333" stroke-width="2"/>
  <text x="235" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#cc3333">Layout Thrashing (BAD)</text>

  <text x="50" y="100" font-size="9" fill="#1a1822">// Animating 5 elements based on each other:</text>
  <rect x="50" y="110" width="370" height="24" rx="3" fill="#cc3333" opacity="0.1" stroke="#cc3333"/>
  <text x="60" y="127" font-size="9" fill="#1a1822">h1 = el1.offsetHeight  // READ → forces layout #1</text>
  <rect x="50" y="138" width="370" height="24" rx="3" fill="#FFB800" opacity="0.1"/>
  <text x="60" y="155" font-size="9" fill="#1a1822">el2.style.top = h1 + &apos;px&apos;  // WRITE → invalidates layout</text>
  <rect x="50" y="166" width="370" height="24" rx="3" fill="#cc3333" opacity="0.1" stroke="#cc3333"/>
  <text x="60" y="183" font-size="9" fill="#1a1822">h2 = el2.offsetHeight  // READ → forces layout #2</text>
  <rect x="50" y="194" width="370" height="24" rx="3" fill="#FFB800" opacity="0.1"/>
  <text x="60" y="211" font-size="9" fill="#1a1822">el3.style.top = h2 + &apos;px&apos;  // WRITE → invalidates</text>
  <rect x="50" y="222" width="370" height="24" rx="3" fill="#cc3333" opacity="0.1" stroke="#cc3333"/>
  <text x="60" y="239" font-size="9" fill="#1a1822">h3 = el3.offsetHeight  // READ → forces layout #3</text>

  <rect x="50" y="260" width="370" height="30" rx="4" fill="#cc3333"/>
  <text x="235" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">5 forced layout passes per frame = ~25ms</text>

  <!-- Batched example -->
  <rect x="460" y="55" width="410" height="250" rx="8" fill="#ffffff" stroke="#228B22" stroke-width="2"/>
  <text x="665" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#228B22">Batched Read/Write (GOOD)</text>

  <text x="480" y="100" font-size="9" fill="#1a1822">// Phase 1: Read ALL values first</text>
  <rect x="480" y="110" width="370" height="24" rx="3" fill="#228B22" opacity="0.1" stroke="#228B22"/>
  <text x="490" y="127" font-size="9" fill="#1a1822">h1 = el1.offsetHeight  // READ</text>
  <rect x="480" y="138" width="370" height="24" rx="3" fill="#228B22" opacity="0.1" stroke="#228B22"/>
  <text x="490" y="155" font-size="9" fill="#1a1822">h2 = el2.offsetHeight  // READ (same layout pass)</text>
  <rect x="480" y="166" width="370" height="24" rx="3" fill="#228B22" opacity="0.1" stroke="#228B22"/>
  <text x="490" y="183" font-size="9" fill="#1a1822">h3 = el3.offsetHeight  // READ (same layout pass)</text>

  <text x="480" y="205" font-size="9" fill="#1a1822">// Phase 2: Write ALL mutations</text>
  <rect x="480" y="215" width="370" height="24" rx="3" fill="#6d5bd0" opacity="0.1"/>
  <text x="490" y="232" font-size="9" fill="#1a1822">el2.style.top = h1; el3.style.top = h2; el4.style.top = h3</text>

  <rect x="480" y="260" width="370" height="30" rx="4" fill="#228B22"/>
  <text x="665" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">1 layout read + 1 layout write = ~2ms</text>

  <!-- Impact comparison -->
  <rect x="30" y="320" width="840" height="60" rx="8" fill="#6d5bd0"/>
  <text x="450" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Performance Impact: 25ms → 2ms (12.5x improvement)</text>
  <text x="450" y="368" text-anchor="middle" font-size="10" fill="#ffffff">With 100 elements: thrashing = ~500ms (30 frame drops) vs batched = ~10ms (no frame drops)</text>

  <!-- Properties that trigger layout -->
  <rect x="30" y="395" width="840" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="417" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Properties That Force Synchronous Layout When Read</text>
  <text x="50" y="440" font-size="9" fill="#1a1822">offsetTop, offsetLeft, offsetWidth, offsetHeight, offsetParent</text>
  <text x="50" y="456" font-size="9" fill="#1a1822">clientTop, clientLeft, clientWidth, clientHeight, scrollTop, scrollLeft, scrollWidth, scrollHeight</text>
  <text x="50" y="472" font-size="9" fill="#1a1822">getComputedStyle(), getBoundingClientRect(), innerText, scrollIntoView(), focus()</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
