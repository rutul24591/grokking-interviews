<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Browser Frame Lifecycle: Where rAF Fits</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#6d5bd0">One frame at 60fps = 16.67ms total budget</text>

  <!-- Frame timeline bar -->
  <rect x="50" y="75" width="800" height="40" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="50" y="70" font-size="9" fill="#1a1822">0ms</text>
  <text x="825" y="70" font-size="9" fill="#1a1822">16.67ms</text>

  <!-- Input events -->
  <rect x="50" y="75" width="100" height="40" rx="6" fill="#FFB800" opacity="0.8"/>
  <text x="100" y="99" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Input Events</text>

  <!-- rAF -->
  <rect x="150" y="75" width="150" height="40" rx="0" fill="#6d5bd0"/>
  <text x="225" y="99" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">rAF Callbacks</text>

  <!-- Style -->
  <rect x="300" y="75" width="120" height="40" rx="0" fill="#8b7de0"/>
  <text x="360" y="99" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Style Recalc</text>

  <!-- Layout -->
  <rect x="420" y="75" width="120" height="40" rx="0" fill="#a89bd8"/>
  <text x="480" y="99" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Layout</text>

  <!-- Paint -->
  <rect x="540" y="75" width="110" height="40" rx="0" fill="#228B22" opacity="0.7"/>
  <text x="595" y="99" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Paint</text>

  <!-- Composite -->
  <rect x="650" y="75" width="100" height="40" rx="0" fill="#228B22"/>
  <text x="700" y="99" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Composite</text>

  <!-- Display -->
  <rect x="750" y="75" width="100" height="40" rx="6" fill="#1a1822"/>
  <text x="800" y="99" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Display</text>

  <!-- Detail boxes -->
  <rect x="30" y="140" width="200" height="100" rx="6" fill="#ffffff" stroke="#FFB800" stroke-width="1.5"/>
  <text x="130" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#FFB800">Input Processing</text>
  <text x="42" y="180" font-size="9" fill="#1a1822">• click, scroll, keydown</text>
  <text x="42" y="195" font-size="9" fill="#1a1822">• touch, pointer events</text>
  <text x="42" y="210" font-size="9" fill="#1a1822">• resize, orientation change</text>
  <text x="42" y="225" font-size="9" fill="#1a1822">• Event handlers execute</text>

  <rect x="250" y="140" width="200" height="100" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="350" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">rAF Callbacks</text>
  <text x="262" y="180" font-size="9" fill="#1a1822">• Your animation code runs</text>
  <text x="262" y="195" font-size="9" fill="#1a1822">• Compute new values</text>
  <text x="262" y="210" font-size="9" fill="#1a1822">• Apply DOM mutations</text>
  <text x="262" y="225" font-size="9" fill="#1a1822">• Target: &lt;10ms execution</text>

  <rect x="470" y="140" width="200" height="100" rx="6" fill="#ffffff" stroke="#8b7de0" stroke-width="1.5"/>
  <text x="570" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#8b7de0">Style + Layout</text>
  <text x="482" y="180" font-size="9" fill="#1a1822">• Match CSS selectors</text>
  <text x="482" y="195" font-size="9" fill="#1a1822">• Compute cascaded values</text>
  <text x="482" y="210" font-size="9" fill="#1a1822">• Calculate geometry</text>
  <text x="482" y="225" font-size="9" fill="#1a1822">• Reflow affected elements</text>

  <rect x="690" y="140" width="180" height="100" rx="6" fill="#ffffff" stroke="#228B22" stroke-width="1.5"/>
  <text x="780" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#228B22">Paint + Composite</text>
  <text x="702" y="180" font-size="9" fill="#1a1822">• Rasterize to bitmaps</text>
  <text x="702" y="195" font-size="9" fill="#1a1822">• Create GPU textures</text>
  <text x="702" y="210" font-size="9" fill="#1a1822">• Blend compositing layers</text>
  <text x="702" y="225" font-size="9" fill="#1a1822">• Send to display at vsync</text>

  <!-- Key insight -->
  <rect x="30" y="260" width="840" height="50" rx="8" fill="#6d5bd0"/>
  <text x="450" y="282" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">rAF fires AFTER input is known but BEFORE rendering — the ideal time for visual updates</text>
  <text x="450" y="300" text-anchor="middle" font-size="10" fill="#ffffff">DOM mutations in rAF are guaranteed to be captured in the current frame&apos;s paint</text>

  <!-- What happens when budget exceeded -->
  <rect x="30" y="330" width="840" height="155" rx="8" fill="#ffffff" stroke="#cc3333" stroke-width="2"/>
  <text x="450" y="352" text-anchor="middle" font-size="13" font-weight="600" fill="#cc3333">When Frame Budget Is Exceeded</text>

  <!-- Good frame -->
  <rect x="50" y="370" width="380" height="30" rx="4" fill="#228B22" opacity="0.15" stroke="#228B22"/>
  <rect x="50" y="370" width="250" height="30" rx="4" fill="#228B22" opacity="0.3"/>
  <text x="175" y="389" text-anchor="middle" font-size="9" fill="#1a1822">15ms total (under budget)</text>
  <text x="350" y="389" font-size="9" fill="#228B22" font-weight="600">✓ On time</text>

  <!-- Bad frame -->
  <rect x="50" y="410" width="380" height="30" rx="4" fill="#cc3333" opacity="0.15" stroke="#cc3333"/>
  <rect x="50" y="410" width="380" height="30" rx="4" fill="#cc3333" opacity="0.3"/>
  <text x="240" y="429" text-anchor="middle" font-size="9" fill="#1a1822">28ms total (over budget!)</text>
  <text x="450" y="429" font-size="9" fill="#cc3333" font-weight="600">✗ Frame dropped</text>

  <text x="50" y="462" font-size="10" fill="#1a1822">When a frame takes longer than 16.67ms, the browser skips it entirely.</text>
  <text x="50" y="478" font-size="10" fill="#1a1822">The user sees the previous frame held for 2× the normal duration (33ms gap) = visible jank.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
