<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">AnimatePresence Exit Animation Lifecycle</text>

  <!-- Timeline -->
  <line x1="50" y1="80" x2="850" y2="80" stroke="#d7d1e6" stroke-width="2"/>

  <!-- Phase 1: Mount -->
  <circle cx="120" cy="80" r="8" fill="#6d5bd0"/>
  <text x="120" y="65" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Mount</text>

  <rect x="60" y="100" width="120" height="80" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="120" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Component A</text>
  <text x="120" y="138" text-anchor="middle" font-size="8" fill="#1a1822">initial: opacity 0</text>
  <text x="120" y="152" text-anchor="middle" font-size="8" fill="#1a1822">animate: opacity 1</text>
  <text x="120" y="170" text-anchor="middle" font-size="8" fill="#228B22">→ Fades in</text>

  <!-- Phase 2: Active -->
  <circle cx="300" cy="80" r="8" fill="#228B22"/>
  <text x="300" y="65" text-anchor="middle" font-size="10" font-weight="600" fill="#228B22">Active</text>

  <rect x="240" y="100" width="120" height="80" rx="6" fill="#228B22" opacity="0.15" stroke="#228B22" stroke-width="2"/>
  <text x="300" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#228B22">Component A</text>
  <text x="300" y="140" text-anchor="middle" font-size="8" fill="#1a1822">opacity: 1</text>
  <text x="300" y="155" text-anchor="middle" font-size="8" fill="#1a1822">Fully visible</text>
  <text x="300" y="170" text-anchor="middle" font-size="8" fill="#228B22">In DOM ✓</text>

  <!-- Phase 3: Key changes (A removed, B added) -->
  <circle cx="480" cy="80" r="8" fill="#cc3333"/>
  <text x="480" y="65" text-anchor="middle" font-size="10" font-weight="600" fill="#cc3333">Key Change</text>

  <rect x="420" y="100" width="120" height="55" rx="6" fill="#cc3333" opacity="0.15" stroke="#cc3333" stroke-width="2"/>
  <text x="480" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#cc3333">Component A</text>
  <text x="480" y="138" text-anchor="middle" font-size="8" fill="#1a1822">exit: opacity 0</text>
  <text x="480" y="150" text-anchor="middle" font-size="8" fill="#cc3333">Fading out...</text>

  <rect x="420" y="165" width="120" height="50" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <text x="480" y="185" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Component B</text>
  <text x="480" y="202" text-anchor="middle" font-size="8" fill="#1a1822">Waiting to enter...</text>

  <!-- Phase 4: Exit complete -->
  <circle cx="660" cy="80" r="8" fill="#6d5bd0"/>
  <text x="660" y="65" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Exit Done</text>

  <rect x="600" y="100" width="120" height="45" rx="6" fill="#d7d1e6" opacity="0.3" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="660" y="120" text-anchor="middle" font-size="9" fill="#d7d1e6">Component A</text>
  <text x="660" y="138" text-anchor="middle" font-size="8" fill="#d7d1e6">Removed from DOM</text>

  <rect x="600" y="155" width="120" height="55" rx="6" fill="#228B22" opacity="0.15" stroke="#228B22" stroke-width="2"/>
  <text x="660" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#228B22">Component B</text>
  <text x="660" y="193" text-anchor="middle" font-size="8" fill="#228B22">Entering: opacity 1</text>

  <!-- Phase 5: New active -->
  <circle cx="810" cy="80" r="8" fill="#228B22"/>
  <text x="810" y="65" text-anchor="middle" font-size="10" font-weight="600" fill="#228B22">Settled</text>

  <rect x="750" y="100" width="100" height="55" rx="6" fill="#228B22" opacity="0.15" stroke="#228B22" stroke-width="2"/>
  <text x="800" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#228B22">Component B</text>
  <text x="800" y="140" text-anchor="middle" font-size="8" fill="#228B22">Active ✓</text>

  <!-- How it works -->
  <rect x="30" y="240" width="840" height="115" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">AnimatePresence Internal Mechanism</text>

  <rect x="50" y="278" width="190" height="60" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="145" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">1. Detect Key Removal</text>
  <text x="60" y="314" font-size="8" fill="#1a1822">Children array changed —</text>
  <text x="60" y="326" font-size="8" fill="#1a1822">key &quot;A&quot; no longer present</text>

  <line x1="240" y1="308" x2="270" y2="308" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="270" y="278" width="190" height="60" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="365" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">2. Keep in DOM</text>
  <text x="280" y="314" font-size="8" fill="#1a1822">Don&apos;t unmount A yet —</text>
  <text x="280" y="326" font-size="8" fill="#1a1822">trigger exit variant instead</text>

  <line x1="460" y1="308" x2="490" y2="308" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="490" y="278" width="170" height="60" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="575" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">3. Animate Exit</text>
  <text x="500" y="314" font-size="8" fill="#1a1822">Play exit animation</text>
  <text x="500" y="326" font-size="8" fill="#1a1822">(opacity 0, translateY...)</text>

  <line x1="660" y1="308" x2="690" y2="308" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="690" y="278" width="160" height="60" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="770" y="296" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">4. Remove + Enter</text>
  <text x="700" y="314" font-size="8" fill="#1a1822">onExitComplete:</text>
  <text x="700" y="326" font-size="8" fill="#1a1822">remove A, mount B</text>

  <!-- Without vs With -->
  <rect x="30" y="370" width="400" height="115" rx="8" fill="#cc3333" opacity="0.1" stroke="#cc3333" stroke-width="2"/>
  <text x="230" y="392" text-anchor="middle" font-size="12" font-weight="600" fill="#cc3333">Without AnimatePresence</text>
  <text x="50" y="415" font-size="10" fill="#1a1822">1. State changes → React unmounts A immediately</text>
  <text x="50" y="433" font-size="10" fill="#1a1822">2. A disappears instantly — no exit animation possible</text>
  <text x="50" y="451" font-size="10" fill="#1a1822">3. B mounts and enters — jarring pop-in appearance</text>
  <text x="50" y="469" font-size="10" fill="#cc3333" font-weight="600">Result: Elements vanish abruptly, no goodbye motion</text>

  <rect x="460" y="370" width="410" height="115" rx="8" fill="#228B22" opacity="0.1" stroke="#228B22" stroke-width="2"/>
  <text x="665" y="392" text-anchor="middle" font-size="12" font-weight="600" fill="#228B22">With AnimatePresence</text>
  <text x="480" y="415" font-size="10" fill="#1a1822">1. State changes → AP intercepts unmount</text>
  <text x="480" y="433" font-size="10" fill="#1a1822">2. A plays exit animation (fade, slide, collapse)</text>
  <text x="480" y="451" font-size="10" fill="#1a1822">3. Exit completes → A removed, B mounts + enters</text>
  <text x="480" y="469" font-size="10" fill="#228B22" font-weight="600">Result: Smooth, choreographed component transitions</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
