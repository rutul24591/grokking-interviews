<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Frame Budget Allocation: 16.67ms at 60fps</text>

  <!-- Frame bar -->
  <rect x="50" y="60" width="800" height="60" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>

  <!-- JS -->
  <rect x="50" y="60" width="280" height="60" rx="6" fill="#FFB800" opacity="0.8"/>
  <text x="190" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">JavaScript (rAF + events)</text>
  <text x="190" y="105" text-anchor="middle" font-size="10" fill="#1a1822">~3-8ms target</text>

  <!-- Style -->
  <rect x="330" y="60" width="120" height="60" fill="#8b7de0"/>
  <text x="390" y="87" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Style</text>
  <text x="390" y="105" text-anchor="middle" font-size="9" fill="#ffffff">1-3ms</text>

  <!-- Layout -->
  <rect x="450" y="60" width="130" height="60" fill="#a89bd8"/>
  <text x="515" y="87" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Layout</text>
  <text x="515" y="105" text-anchor="middle" font-size="9" fill="#1a1822">1-5ms</text>

  <!-- Paint -->
  <rect x="580" y="60" width="120" height="60" fill="#228B22" opacity="0.7"/>
  <text x="640" y="87" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Paint</text>
  <text x="640" y="105" text-anchor="middle" font-size="9" fill="#ffffff">1-3ms</text>

  <!-- Composite -->
  <rect x="700" y="60" width="80" height="60" fill="#228B22"/>
  <text x="740" y="87" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Comp</text>
  <text x="740" y="105" text-anchor="middle" font-size="9" fill="#ffffff">&lt;1ms</text>

  <!-- Idle -->
  <rect x="780" y="60" width="70" height="60" rx="6" fill="#d7d1e6" opacity="0.5"/>
  <text x="815" y="95" text-anchor="middle" font-size="9" fill="#1a1822">Idle</text>

  <!-- Budget line -->
  <line x1="850" y1="50" x2="850" y2="130" stroke="#cc3333" stroke-width="2"/>
  <text x="855" y="95" font-size="9" fill="#cc3333" font-weight="600">16.67ms</text>

  <!-- Good frame vs Bad frame -->
  <text x="450" y="155" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Budget Scenarios</text>

  <!-- Good: Compositor only -->
  <rect x="50" y="170" width="800" height="45" rx="4" fill="#228B22" opacity="0.1" stroke="#228B22" stroke-width="1.5"/>
  <rect x="50" y="170" width="120" height="45" fill="#228B22" opacity="0.3" rx="4"/>
  <text x="110" y="195" text-anchor="middle" font-size="9" fill="#1a1822">JS: 5ms</text>
  <rect x="170" y="170" width="30" height="45" fill="#228B22" opacity="0.5"/>
  <text x="230" y="195" font-size="9" fill="#228B22" font-weight="600">Composite only: 5.5ms total ✓ (10ms headroom)</text>
  <text x="630" y="195" font-size="9" fill="#228B22">animate: transform, opacity</text>

  <!-- OK: With paint -->
  <rect x="50" y="225" width="800" height="45" rx="4" fill="#FFB800" opacity="0.1" stroke="#FFB800" stroke-width="1.5"/>
  <rect x="50" y="225" width="120" height="45" fill="#FFB800" opacity="0.3" rx="4"/>
  <rect x="170" y="225" width="50" height="45" fill="#FFB800" opacity="0.4"/>
  <rect x="220" y="225" width="80" height="45" fill="#228B22" opacity="0.3"/>
  <text x="230" y="250" font-size="9" fill="#FFB800" font-weight="600">With paint: 12ms total ⚠ (tight margin)</text>
  <text x="630" y="250" font-size="9" fill="#FFB800">animate: color, background</text>

  <!-- Bad: With layout -->
  <rect x="50" y="280" width="800" height="45" rx="4" fill="#cc3333" opacity="0.1" stroke="#cc3333" stroke-width="1.5"/>
  <rect x="50" y="280" width="120" height="45" fill="#cc3333" opacity="0.3" rx="4"/>
  <rect x="170" y="280" width="80" height="45" fill="#cc3333" opacity="0.4"/>
  <rect x="250" y="280" width="150" height="45" fill="#cc3333" opacity="0.3"/>
  <rect x="400" y="280" width="80" height="45" fill="#228B22" opacity="0.3"/>
  <text x="520" y="305" font-size="9" fill="#cc3333" font-weight="600">With layout: 28ms total ✗ FRAME DROPPED</text>
  <text x="630" y="318" font-size="9" fill="#cc3333">animate: width, height, margin</text>

  <!-- 120Hz note -->
  <rect x="50" y="340" width="800" height="40" rx="6" fill="#6d5bd0"/>
  <text x="450" y="358" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">At 120Hz (iPad Pro, iPhone ProMotion): budget shrinks to 8.33ms — even paint animations may jank</text>
  <text x="450" y="374" text-anchor="middle" font-size="9" fill="#ffffff">Compositor-only animations become even more critical on high-refresh-rate devices</text>

  <!-- DevTools guidance -->
  <rect x="50" y="395" width="390" height="90" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="245" y="417" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Diagnosing with DevTools</text>
  <text x="65" y="437" font-size="9" fill="#1a1822">Performance panel → record animation</text>
  <text x="65" y="452" font-size="9" fill="#1a1822">Red bars = dropped frames</text>
  <text x="65" y="467" font-size="9" fill="#1a1822">Purple blocks = forced synchronous layout</text>
  <text x="65" y="482" font-size="9" fill="#1a1822">Green flash = paint flashing (repaint regions)</text>

  <rect x="460" y="395" width="390" height="90" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="655" y="417" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Quick Performance Audit</text>
  <text x="475" y="437" font-size="9" fill="#1a1822">1. Enable Paint Flashing (Rendering tab)</text>
  <text x="475" y="452" font-size="9" fill="#1a1822">2. Trigger your animation — green = repaint</text>
  <text x="475" y="467" font-size="9" fill="#1a1822">3. If large areas flash → switch to transforms</text>
  <text x="475" y="482" font-size="9" fill="#1a1822">4. Check Layers panel → excess layer count?</text>
</svg>
