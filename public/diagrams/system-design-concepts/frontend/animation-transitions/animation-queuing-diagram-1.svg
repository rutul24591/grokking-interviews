<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Animation Queue Strategies Comparison</text>

  <!-- Column Headers -->
  <text x="120" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Sequential (FIFO)</text>
  <text x="340" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Interruption</text>
  <text x="560" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Debounced</text>
  <text x="780" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Priority</text>

  <!-- Sequential Column -->
  <rect x="30" y="85" width="180" height="340" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="120" y="110" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Queue</text>
  <rect x="50" y="120" width="140" height="30" rx="4" fill="#6d5bd0"/>
  <text x="120" y="140" text-anchor="middle" font-size="10" fill="#ffffff">Anim A (playing)</text>
  <rect x="50" y="158" width="140" height="30" rx="4" fill="#d7d1e6"/>
  <text x="120" y="178" text-anchor="middle" font-size="10" fill="#1a1822">Anim B (waiting)</text>
  <rect x="50" y="196" width="140" height="30" rx="4" fill="#d7d1e6"/>
  <text x="120" y="216" text-anchor="middle" font-size="10" fill="#1a1822">Anim C (waiting)</text>
  <line x1="120" y1="240" x2="120" y2="260" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="120" y="280" text-anchor="middle" font-size="10" fill="#1a1822">A completes → B starts</text>
  <text x="120" y="295" text-anchor="middle" font-size="10" fill="#1a1822">B completes → C starts</text>
  <rect x="50" y="310" width="140" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="120" y="325" text-anchor="middle" font-size="9" fill="#1a1822" font-weight="600">Best for:</text>
  <text x="120" y="340" text-anchor="middle" font-size="9" fill="#6d5bd0">Onboarding, wizards</text>
  <text x="120" y="400" text-anchor="middle" font-size="10" fill="#1a1822">Predictable order</text>
  <text x="120" y="415" text-anchor="middle" font-size="10" fill="#6d5bd0">Higher latency</text>

  <!-- Interruption Column -->
  <rect x="250" y="85" width="180" height="340" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="340" y="110" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Immediate Replace</text>
  <rect x="270" y="120" width="140" height="30" rx="4" fill="#6d5bd0" opacity="0.4"/>
  <text x="340" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Anim A (cancelled)</text>
  <line x1="340" y1="155" x2="340" y2="170" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="270" y="175" width="140" height="30" rx="4" fill="#6d5bd0"/>
  <text x="340" y="195" text-anchor="middle" font-size="10" fill="#ffffff">Anim B (playing)</text>
  <text x="340" y="230" text-anchor="middle" font-size="10" fill="#1a1822">New input instantly</text>
  <text x="340" y="245" text-anchor="middle" font-size="10" fill="#1a1822">replaces current anim</text>
  <rect x="270" y="260" width="140" height="50" rx="6" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="340" y="280" text-anchor="middle" font-size="9" fill="#1a1822" font-weight="600">Best for:</text>
  <text x="340" y="295" text-anchor="middle" font-size="9" fill="#6d5bd0">Hover, scroll, drag</text>
  <rect x="270" y="320" width="140" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="340" y="335" text-anchor="middle" font-size="9" fill="#1a1822" font-weight="600">Blended variant:</text>
  <text x="340" y="350" text-anchor="middle" font-size="9" fill="#6d5bd0">Cross-fade at interrupt</text>
  <text x="340" y="400" text-anchor="middle" font-size="10" fill="#1a1822">Lowest latency</text>
  <text x="340" y="415" text-anchor="middle" font-size="10" fill="#6d5bd0">May look abrupt</text>

  <!-- Debounced Column -->
  <rect x="470" y="85" width="180" height="340" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="560" y="110" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Coalesce &amp; Play</text>
  <rect x="490" y="120" width="60" height="24" rx="4" fill="#d7d1e6"/>
  <text x="520" y="137" text-anchor="middle" font-size="9" fill="#1a1822">A</text>
  <rect x="555" y="120" width="60" height="24" rx="4" fill="#d7d1e6"/>
  <text x="585" y="137" text-anchor="middle" font-size="9" fill="#1a1822">B</text>
  <rect x="490" y="150" width="60" height="24" rx="4" fill="#d7d1e6"/>
  <text x="520" y="167" text-anchor="middle" font-size="9" fill="#1a1822">C</text>
  <rect x="555" y="150" width="60" height="24" rx="4" fill="#d7d1e6"/>
  <text x="585" y="167" text-anchor="middle" font-size="9" fill="#1a1822">D</text>
  <text x="560" y="195" text-anchor="middle" font-size="10" fill="#1a1822">Wait for idle period...</text>
  <line x1="560" y1="205" x2="560" y2="225" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <rect x="490" y="230" width="140" height="30" rx="4" fill="#6d5bd0"/>
  <text x="560" y="250" text-anchor="middle" font-size="10" fill="#ffffff">Play final (D)</text>
  <text x="560" y="280" text-anchor="middle" font-size="10" fill="#1a1822">A, B, C discarded</text>
  <rect x="490" y="300" width="140" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="560" y="315" text-anchor="middle" font-size="9" fill="#1a1822" font-weight="600">Best for:</text>
  <text x="560" y="330" text-anchor="middle" font-size="9" fill="#6d5bd0">Resize, search, typing</text>
  <text x="560" y="400" text-anchor="middle" font-size="10" fill="#1a1822">Reduces jank</text>
  <text x="560" y="415" text-anchor="middle" font-size="10" fill="#6d5bd0">Delayed feedback</text>

  <!-- Priority Column -->
  <rect x="690" y="85" width="180" height="340" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="780" y="110" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="600">Ranked Execution</text>
  <rect x="710" y="120" width="140" height="24" rx="4" fill="#6d5bd0"/>
  <text x="740" y="137" font-size="9" fill="#ffffff">P1</text>
  <text x="820" y="137" text-anchor="end" font-size="9" fill="#ffffff">Critical alert</text>
  <rect x="710" y="150" width="140" height="24" rx="4" fill="#6d5bd0" opacity="0.7"/>
  <text x="740" y="167" font-size="9" fill="#ffffff">P2</text>
  <text x="820" y="167" text-anchor="end" font-size="9" fill="#ffffff">User action</text>
  <rect x="710" y="180" width="140" height="24" rx="4" fill="#d7d1e6"/>
  <text x="740" y="197" font-size="9" fill="#1a1822">P3</text>
  <text x="820" y="197" text-anchor="end" font-size="9" fill="#1a1822">Ambient</text>
  <line x1="780" y1="215" x2="780" y2="240" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="780" y="260" text-anchor="middle" font-size="10" fill="#1a1822">P1 preempts P3</text>
  <text x="780" y="275" text-anchor="middle" font-size="10" fill="#1a1822">P2 queues behind P1</text>
  <rect x="710" y="300" width="140" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="780" y="315" text-anchor="middle" font-size="9" fill="#1a1822" font-weight="600">Best for:</text>
  <text x="780" y="330" text-anchor="middle" font-size="9" fill="#6d5bd0">Notifications, dashboards</text>
  <text x="780" y="400" text-anchor="middle" font-size="10" fill="#1a1822">Importance-aware</text>
  <text x="780" y="415" text-anchor="middle" font-size="10" fill="#6d5bd0">Complex to implement</text>

  <!-- Bottom comparison bar -->
  <rect x="30" y="440" width="840" height="45" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="50" y="460" font-size="10" fill="#1a1822" font-weight="600">Latency:</text>
  <text x="120" y="460" font-size="10" fill="#1a1822">High</text>
  <text x="340" y="460" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">Lowest</text>
  <text x="560" y="460" text-anchor="middle" font-size="10" fill="#1a1822">Medium</text>
  <text x="780" y="460" text-anchor="middle" font-size="10" fill="#1a1822">Variable</text>
  <text x="50" y="478" font-size="10" fill="#1a1822" font-weight="600">Complexity:</text>
  <text x="120" y="478" font-size="10" fill="#6d5bd0" font-weight="600">Low</text>
  <text x="340" y="478" text-anchor="middle" font-size="10" fill="#1a1822">Low</text>
  <text x="560" y="478" text-anchor="middle" font-size="10" fill="#1a1822">Medium</text>
  <text x="780" y="478" text-anchor="middle" font-size="10" fill="#1a1822">High</text>

  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
