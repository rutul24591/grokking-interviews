<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="450" fill="white"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">Browser Scheduling Decision Flow for Periodic Sync</text>

  <defs>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3B82F6"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#EF4444"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10B981"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Start: Periodic Sync Registered -->
  <rect x="60" y="60" width="200" height="44" rx="22" fill="#3B82F6" stroke="none"/>
  <text x="160" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="white">Periodic Sync Registered</text>
  <text x="160" y="94" text-anchor="middle" font-size="10" fill="#DBEAFE">register(tag, {'{'}minInterval{'}'})</text>

  <!-- Arrow down -->
  <line x1="160" y1="104" x2="160" y2="140" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- Decision 1: PWA Installed? -->
  <polygon points="160,145 260,185 160,225 60,185" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="160" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">PWA Installed?</text>

  <!-- No path - right -->
  <line x1="260" y1="185" x2="340" y2="185" stroke="#EF4444" stroke-width="2" marker-end="url(#arrRed)"/>
  <text x="296" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#EF4444">No</text>
  <rect x="345" y="167" width="140" height="36" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="415" y="189" text-anchor="middle" font-size="11" font-weight="600" fill="#DC2626">Registration Rejected</text>

  <!-- Yes path - down -->
  <line x1="160" y1="225" x2="160" y2="260" stroke="#10B981" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="175" y="245" font-size="10" font-weight="600" fill="#10B981">Yes</text>

  <!-- Decision 2: Engagement Score? -->
  <polygon points="160,265 270,305 160,345 50,305" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="160" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Engagement</text>
  <text x="160" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Sufficient?</text>

  <!-- No path - right -->
  <line x1="270" y1="305" x2="340" y2="305" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrAmber)"/>
  <text x="300" y="298" text-anchor="middle" font-size="10" font-weight="600" fill="#F59E0B">No</text>
  <rect x="345" y="285" width="150" height="40" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="420" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#D97706">Delayed / Rejected</text>
  <text x="420" y="316" text-anchor="middle" font-size="9" fill="#92400E">Interval increased to 12h+</text>

  <!-- Yes path - down and right -->
  <line x1="160" y1="345" x2="160" y2="370" stroke="#10B981" stroke-width="2"/>
  <line x1="160" y1="370" x2="380" y2="370" stroke="#10B981" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="175" y="363" font-size="10" font-weight="600" fill="#10B981">Yes</text>

  <!-- Decision 3: Battery & Wi-Fi? -->
  <polygon points="460,340 550,370 460,400 370,370" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="460" y="367" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Battery OK?</text>
  <text x="460" y="382" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Wi-Fi?</text>

  <!-- No path - down -->
  <line x1="460" y1="400" x2="460" y2="425" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrAmber)"/>
  <text x="475" y="415" font-size="10" font-weight="600" fill="#F59E0B">No</text>
  <rect x="395" y="428" width="130" height="20" rx="4" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/>
  <text x="460" y="442" text-anchor="middle" font-size="10" font-weight="600" fill="#D97706">Deferred</text>

  <!-- Yes path - right -->
  <line x1="550" y1="370" x2="585" y2="370" stroke="#10B981" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="565" y="363" font-size="10" font-weight="600" fill="#10B981">Yes</text>

  <!-- Schedule sync -->
  <rect x="590" y="350" width="170" height="40" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <text x="675" y="367" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">Schedule Sync Event</text>
  <text x="675" y="382" text-anchor="middle" font-size="9" fill="#065F46">May batch with other origins</text>

  <!-- Arrow down from schedule -->
  <line x1="675" y1="390" x2="675" y2="410" stroke="#10B981" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- SW fires -->
  <rect x="590" y="415" width="170" height="30" rx="6" fill="#10B981"/>
  <text x="675" y="434" text-anchor="middle" font-size="11" font-weight="600" fill="white">SW fires periodicsync</text>

  <!-- Arrow to final step -->
  <line x1="675" y1="292" x2="675" y2="345" stroke="#10B981" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Fetch + cache -->
  <rect x="600" y="260" width="150" height="36" rx="6" fill="#3B82F6"/>
  <text x="675" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="white">Fetch + Cache Data</text>
  <text x="675" y="290" text-anchor="middle" font-size="9" fill="#DBEAFE">Cache API / IndexedDB</text>

  <!-- Connect SW to fetch (upward arrow) -->
  <path d="M 755 430 Q 785 430 785 290 Q 785 265 755 265" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>
  <text x="788" y="350" font-size="9" fill="#3B82F6" transform="rotate(90, 788, 350)">event handler</text>

  <!-- Legend -->
  <rect x="50" y="410" width="240" height="35" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="70" cy="427" r="5" fill="#10B981"/>
  <text x="80" y="431" font-size="9" fill="#475569">Approved</text>
  <circle cx="130" cy="427" r="5" fill="#EF4444"/>
  <text x="140" y="431" font-size="9" fill="#475569">Rejected</text>
  <circle cx="195" cy="427" r="5" fill="#F59E0B"/>
  <text x="205" y="431" font-size="9" fill="#475569">Deferred</text>
  <circle cx="260" cy="427" r="5" fill="#3B82F6"/>
  <text x="270" y="431" font-size="9" fill="#475569">Action</text>
</svg>
