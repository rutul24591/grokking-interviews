<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000010"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">PWA vs Native vs Hybrid - Capability Matrix</text>

  <!-- Column Headers -->
  <rect x="40" y="48" width="280" height="36" rx="4" fill="#F1F5F9"/>
  <text x="180" y="71" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Capability</text>

  <rect x="325" y="48" width="130" height="36" rx="4" fill="#EFF6FF"/>
  <text x="390" y="71" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">PWA</text>

  <rect x="460" y="48" width="160" height="36" rx="4" fill="#F0FDF4"/>
  <text x="540" y="71" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">Native (iOS/Android)</text>

  <rect x="625" y="48" width="145" height="36" rx="4" fill="#EEF2FF"/>
  <text x="697" y="71" text-anchor="middle" font-size="13" font-weight="700" fill="#3730A3">Hybrid (RN/Flutter)</text>

  <!-- Row data -->
  <!-- Row 1: Offline Support -->
  <rect x="40" y="88" width="280" height="36" fill="#FAFAFA"/>
  <text x="55" y="111" font-size="12" fill="#334155">Offline Support</text>
  <rect x="325" y="88" width="130" height="36" fill="#FAFAFA"/>
  <text x="390" y="111" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="460" y="88" width="160" height="36" fill="#FAFAFA"/>
  <text x="540" y="111" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="625" y="88" width="145" height="36" fill="#FAFAFA"/>
  <text x="697" y="111" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>

  <!-- Row 2: Push Notifications -->
  <rect x="40" y="124" width="280" height="36" fill="#FFFFFF"/>
  <text x="55" y="147" font-size="12" fill="#334155">Push Notifications</text>
  <rect x="325" y="124" width="130" height="36" fill="#FFFFFF"/>
  <text x="390" y="148" text-anchor="middle" font-size="14" fill="#F59E0B" font-weight="700">&amp;#9684;</text>
  <text x="390" y="158" text-anchor="middle" font-size="8" fill="#92400E">iOS 16.4+</text>
  <rect x="460" y="124" width="160" height="36" fill="#FFFFFF"/>
  <text x="540" y="147" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="625" y="124" width="145" height="36" fill="#FFFFFF"/>
  <text x="697" y="147" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>

  <!-- Row 3: File System Access -->
  <rect x="40" y="160" width="280" height="36" fill="#FAFAFA"/>
  <text x="55" y="183" font-size="12" fill="#334155">File System Access</text>
  <rect x="325" y="160" width="130" height="36" fill="#FAFAFA"/>
  <text x="390" y="184" text-anchor="middle" font-size="14" fill="#F59E0B" font-weight="700">&amp;#9684;</text>
  <text x="390" y="194" text-anchor="middle" font-size="8" fill="#92400E">Chromium only</text>
  <rect x="460" y="160" width="160" height="36" fill="#FAFAFA"/>
  <text x="540" y="183" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="625" y="160" width="145" height="36" fill="#FAFAFA"/>
  <text x="697" y="183" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>

  <!-- Row 4: Camera/Mic -->
  <rect x="40" y="196" width="280" height="36" fill="#FFFFFF"/>
  <text x="55" y="219" font-size="12" fill="#334155">Camera / Microphone</text>
  <rect x="325" y="196" width="130" height="36" fill="#FFFFFF"/>
  <text x="390" y="219" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="460" y="196" width="160" height="36" fill="#FFFFFF"/>
  <text x="540" y="219" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="625" y="196" width="145" height="36" fill="#FFFFFF"/>
  <text x="697" y="219" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>

  <!-- Row 5: Bluetooth/NFC -->
  <rect x="40" y="232" width="280" height="36" fill="#FAFAFA"/>
  <text x="55" y="255" font-size="12" fill="#334155">Bluetooth / NFC</text>
  <rect x="325" y="232" width="130" height="36" fill="#FAFAFA"/>
  <text x="390" y="256" text-anchor="middle" font-size="14" fill="#F59E0B" font-weight="700">&amp;#9684;</text>
  <text x="390" y="266" text-anchor="middle" font-size="8" fill="#92400E">Chrome only</text>
  <rect x="460" y="232" width="160" height="36" fill="#FAFAFA"/>
  <text x="540" y="255" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="625" y="232" width="145" height="36" fill="#FAFAFA"/>
  <text x="697" y="256" text-anchor="middle" font-size="14" fill="#F59E0B" font-weight="700">&amp;#9684;</text>

  <!-- Row 6: App Store Distribution -->
  <rect x="40" y="268" width="280" height="36" fill="#FFFFFF"/>
  <text x="55" y="291" font-size="12" fill="#334155">App Store Distribution</text>
  <rect x="325" y="268" width="130" height="36" fill="#FFFFFF"/>
  <text x="390" y="292" text-anchor="middle" font-size="14" fill="#F59E0B" font-weight="700">&amp;#9684;</text>
  <text x="390" y="302" text-anchor="middle" font-size="8" fill="#92400E">TWA/PWABuilder</text>
  <rect x="460" y="268" width="160" height="36" fill="#FFFFFF"/>
  <text x="540" y="291" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="625" y="268" width="145" height="36" fill="#FFFFFF"/>
  <text x="697" y="291" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>

  <!-- Row 7: Auto-Updates -->
  <rect x="40" y="304" width="280" height="36" fill="#FAFAFA"/>
  <text x="55" y="327" font-size="12" fill="#334155">Auto-Updates (no user action)</text>
  <rect x="325" y="304" width="130" height="36" fill="#FAFAFA"/>
  <text x="390" y="327" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="460" y="304" width="160" height="36" fill="#FAFAFA"/>
  <text x="540" y="328" text-anchor="middle" font-size="14" fill="#F59E0B" font-weight="700">&amp;#9684;</text>
  <text x="540" y="338" text-anchor="middle" font-size="8" fill="#92400E">Store review</text>
  <rect x="625" y="304" width="145" height="36" fill="#FAFAFA"/>
  <text x="697" y="328" text-anchor="middle" font-size="14" fill="#F59E0B" font-weight="700">&amp;#9684;</text>
  <text x="697" y="338" text-anchor="middle" font-size="8" fill="#92400E">Store review</text>

  <!-- Row 8: Discoverability (SEO) -->
  <rect x="40" y="340" width="280" height="36" fill="#FFFFFF"/>
  <text x="55" y="363" font-size="12" fill="#334155">Discoverability (SEO)</text>
  <rect x="325" y="340" width="130" height="36" fill="#FFFFFF"/>
  <text x="390" y="363" text-anchor="middle" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <rect x="460" y="340" width="160" height="36" fill="#FFFFFF"/>
  <text x="540" y="363" text-anchor="middle" font-size="16" fill="#EF4444" font-weight="700">&amp;#10007;</text>
  <rect x="625" y="340" width="145" height="36" fill="#FFFFFF"/>
  <text x="697" y="363" text-anchor="middle" font-size="16" fill="#EF4444" font-weight="700">&amp;#10007;</text>

  <!-- Row 9: Install Size -->
  <rect x="40" y="376" width="280" height="36" fill="#FAFAFA"/>
  <text x="55" y="399" font-size="12" fill="#334155">Install Size</text>
  <rect x="325" y="376" width="130" height="36" fill="#FAFAFA"/>
  <text x="390" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981">&amp;lt;1 MB</text>
  <rect x="460" y="376" width="160" height="36" fill="#FAFAFA"/>
  <text x="540" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444">50-200 MB</text>
  <rect x="625" y="376" width="145" height="36" fill="#FAFAFA"/>
  <text x="697" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#F59E0B">20-80 MB</text>

  <!-- Row 10: Development Cost -->
  <rect x="40" y="412" width="280" height="36" fill="#FFFFFF"/>
  <text x="55" y="435" font-size="12" fill="#334155">Development Cost</text>
  <rect x="325" y="412" width="130" height="36" fill="#FFFFFF"/>
  <text x="390" y="432" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981">Low</text>
  <text x="390" y="445" text-anchor="middle" font-size="9" fill="#10B981">1 codebase</text>
  <rect x="460" y="412" width="160" height="36" fill="#FFFFFF"/>
  <text x="540" y="432" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444">High</text>
  <text x="540" y="445" text-anchor="middle" font-size="9" fill="#EF4444">2+ codebases</text>
  <rect x="625" y="412" width="145" height="36" fill="#FFFFFF"/>
  <text x="697" y="432" text-anchor="middle" font-size="11" font-weight="600" fill="#F59E0B">Medium</text>
  <text x="697" y="445" text-anchor="middle" font-size="9" fill="#F59E0B">1 codebase + native</text>

  <!-- Legend -->
  <rect x="40" y="460" width="730" height="30" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="80" y="480" font-size="16" fill="#10B981" font-weight="700">&amp;#10003;</text>
  <text x="98" y="479" font-size="11" fill="#475569">Full support</text>
  <text x="250" y="480" font-size="14" fill="#F59E0B" font-weight="700">&amp;#9684;</text>
  <text x="268" y="479" font-size="11" fill="#475569">Partial support</text>
  <text x="430" y="480" font-size="16" fill="#EF4444" font-weight="700">&amp;#10007;</text>
  <text x="448" y="479" font-size="11" fill="#475569">Not supported</text>
</svg>
