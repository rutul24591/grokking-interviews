<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#3B82F6">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#10B981">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#F59E0B">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6366F1">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">PWA Architecture</text>

  <!-- Browser Layer -->
  <rect x="200" y="50" width="400" height="70" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="78" text-anchor="middle" font-size="14" font-weight="600" fill="#1E40AF">Browser</text>
  <text x="400" y="98" text-anchor="middle" font-size="11" fill="#3B82F6">User interface, DOM rendering, JavaScript engine</text>

  <!-- App Shell -->
  <rect x="200" y="145" width="400" height="70" rx="10" fill="#F0FDF4" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="173" text-anchor="middle" font-size="14" font-weight="600" fill="#065F46">App Shell</text>
  <text x="400" y="193" text-anchor="middle" font-size="11" fill="#10B981">Minimal HTML + CSS + JS skeleton (cached locally)</text>

  <!-- Arrow: Browser to App Shell -->
  <line x1="400" y1="120" x2="400" y2="143" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="430" y="136" font-size="10" fill="#3B82F6">renders</text>

  <!-- Service Worker Layer -->
  <rect x="200" y="245" width="400" height="70" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="273" text-anchor="middle" font-size="14" font-weight="600" fill="#3730A3">Service Worker</text>
  <text x="400" y="293" text-anchor="middle" font-size="11" fill="#6366F1">Network proxy &amp;middot; Fetch interceptor &amp;middot; Background thread</text>

  <!-- Arrow: App Shell to Service Worker -->
  <line x1="400" y1="215" x2="400" y2="243" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigo)"/>
  <text x="430" y="233" font-size="10" fill="#6366F1">fetch events</text>

  <!-- Cache Storage -->
  <rect x="100" y="370" width="250" height="80" rx="10" fill="#F0FDF4" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <text x="225" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#065F46">Cache Storage</text>
  <text x="225" y="418" text-anchor="middle" font-size="11" fill="#10B981">App Shell assets</text>
  <text x="225" y="433" text-anchor="middle" font-size="11" fill="#10B981">API response cache</text>

  <!-- Network -->
  <rect x="450" y="370" width="250" height="80" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="575" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#92400E">Network</text>
  <text x="575" y="418" text-anchor="middle" font-size="11" fill="#F59E0B">Origin server / CDN</text>
  <text x="575" y="433" text-anchor="middle" font-size="11" fill="#F59E0B">API endpoints</text>

  <!-- Arrow: SW to Cache Storage -->
  <line x1="320" y1="315" x2="240" y2="368" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="235" y="340" font-size="10" fill="#10B981">cache-first</text>

  <!-- Arrow: Cache Storage to SW (return) -->
  <line x1="270" y1="370" x2="350" y2="315" stroke="#10B981" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>

  <!-- Arrow: SW to Network -->
  <line x1="480" y1="315" x2="560" y2="368" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <text x="540" y="340" font-size="10" fill="#F59E0B">network-first</text>

  <!-- Arrow: Network to SW (return) -->
  <line x1="530" y1="370" x2="450" y2="315" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowAmber)"/>

  <!-- Legend -->
  <rect x="40" y="55" width="130" height="95" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="105" y="72" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Legend</text>
  <line x1="52" y1="84" x2="82" y2="84" stroke="#10B981" stroke-width="2"/>
  <text x="88" y="88" font-size="9" fill="#475569">Cached path</text>
  <line x1="52" y1="102" x2="82" y2="102" stroke="#F59E0B" stroke-width="2"/>
  <text x="88" y="106" font-size="9" fill="#475569">Network path</text>
  <line x1="52" y1="120" x2="82" y2="120" stroke="#6366F1" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="88" y="124" font-size="9" fill="#475569">Response</text>

  <!-- Flow annotations -->
  <rect x="630" y="55" width="140" height="115" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="700" y="72" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Load Sequence</text>
  <text x="645" y="90" font-size="9" fill="#475569">1. First visit: Network</text>
  <text x="645" y="105" font-size="9" fill="#475569">2. SW caches shell</text>
  <text x="645" y="120" font-size="9" fill="#475569">3. Repeat visit: Cache</text>
  <text x="645" y="135" font-size="9" fill="#475569">4. Dynamic: Network</text>
  <text x="645" y="150" font-size="9" fill="#475569">5. Fallback: Cache</text>

  <!-- Bottom annotation -->
  <text x="400" y="482" text-anchor="middle" font-size="10" fill="#94A3B8">Service Worker acts as a programmable network proxy between the app and the network</text>
</svg>
