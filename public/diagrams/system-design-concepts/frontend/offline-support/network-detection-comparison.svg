<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Network Detection Methods Comparison</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#6b7280">Trade-offs between accuracy, speed, resource cost, and coverage</text>

  <!-- Table header -->
  <rect x="30" y="70" width="740" height="40" rx="6" fill="#F3F4F6"/>
  <text x="140" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Method</text>
  <text x="310" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Accuracy</text>
  <text x="420" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Speed</text>
  <text x="530" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Battery Impact</text>
  <text x="650" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">Detects "Lie-Fi"</text>

  <!-- Row 1: navigator.onLine -->
  <rect x="30" y="115" width="740" height="50" rx="0" fill="#ffffff" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="50" y="140" font-size="11" font-weight="bold" fill="#374151">navigator.onLine</text>
  <text x="50" y="155" font-size="9" fill="#6b7280">Boolean property</text>
  <!-- Accuracy: Low -->
  <rect x="275" y="130" width="70" height="22" rx="11" fill="#EF4444" fill-opacity="0.12"/>
  <text x="310" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#EF4444">Low</text>
  <!-- Speed: High -->
  <rect x="385" y="130" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="420" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">Instant</text>
  <!-- Battery: None -->
  <rect x="495" y="130" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="530" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">None</text>
  <!-- Lie-Fi: No -->
  <rect x="615" y="130" width="70" height="22" rx="11" fill="#EF4444" fill-opacity="0.12"/>
  <text x="650" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#EF4444">No</text>

  <!-- Row 2: Online/Offline Events -->
  <rect x="30" y="170" width="740" height="50" rx="0" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="50" y="195" font-size="11" font-weight="bold" fill="#374151">Online/Offline Events</text>
  <text x="50" y="210" font-size="9" fill="#6b7280">Event listeners</text>
  <!-- Accuracy: Low -->
  <rect x="275" y="185" width="70" height="22" rx="11" fill="#EF4444" fill-opacity="0.12"/>
  <text x="310" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#EF4444">Low</text>
  <!-- Speed: High -->
  <rect x="385" y="185" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="420" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">Instant</text>
  <!-- Battery: None -->
  <rect x="495" y="185" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="530" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">None</text>
  <!-- Lie-Fi: No -->
  <rect x="615" y="185" width="70" height="22" rx="11" fill="#EF4444" fill-opacity="0.12"/>
  <text x="650" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#EF4444">No</text>

  <!-- Row 3: Heartbeat/Ping -->
  <rect x="30" y="225" width="740" height="50" rx="0" fill="#ffffff" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="50" y="250" font-size="11" font-weight="bold" fill="#374151">Heartbeat / Ping</text>
  <text x="50" y="265" font-size="9" fill="#6b7280">HEAD /api/health</text>
  <!-- Accuracy: High -->
  <rect x="275" y="240" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="310" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">High</text>
  <!-- Speed: Medium -->
  <rect x="385" y="240" width="70" height="22" rx="11" fill="#F59E0B" fill-opacity="0.12"/>
  <text x="420" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#F59E0B">Medium</text>
  <!-- Battery: Medium -->
  <rect x="495" y="240" width="70" height="22" rx="11" fill="#F59E0B" fill-opacity="0.12"/>
  <text x="530" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#F59E0B">Medium</text>
  <!-- Lie-Fi: Yes -->
  <rect x="615" y="240" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="650" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">Yes</text>

  <!-- Row 4: Fetch Monitoring -->
  <rect x="30" y="280" width="740" height="50" rx="0" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="50" y="305" font-size="11" font-weight="bold" fill="#374151">Fetch Monitoring</text>
  <text x="50" y="320" font-size="9" fill="#6b7280">Track failed requests</text>
  <!-- Accuracy: High -->
  <rect x="275" y="295" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="310" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">High</text>
  <!-- Speed: Reactive -->
  <rect x="385" y="295" width="70" height="22" rx="11" fill="#F59E0B" fill-opacity="0.12"/>
  <text x="420" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#F59E0B">Reactive</text>
  <!-- Battery: Low -->
  <rect x="495" y="295" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="530" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">Low</text>
  <!-- Lie-Fi: Yes -->
  <rect x="615" y="295" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="650" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">Yes</text>

  <!-- Row 5: Network Info API -->
  <rect x="30" y="335" width="740" height="50" rx="0" fill="#ffffff" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="50" y="360" font-size="11" font-weight="bold" fill="#374151">Network Info API</text>
  <text x="50" y="375" font-size="9" fill="#6b7280">navigator.connection</text>
  <!-- Accuracy: Medium -->
  <rect x="275" y="350" width="70" height="22" rx="11" fill="#F59E0B" fill-opacity="0.12"/>
  <text x="310" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#F59E0B">Medium</text>
  <!-- Speed: High -->
  <rect x="385" y="350" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="420" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">Instant</text>
  <!-- Battery: None -->
  <rect x="495" y="350" width="70" height="22" rx="11" fill="#10B981" fill-opacity="0.12"/>
  <text x="530" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#10B981">None</text>
  <!-- Lie-Fi: Partial -->
  <rect x="615" y="350" width="70" height="22" rx="11" fill="#F59E0B" fill-opacity="0.12"/>
  <text x="650" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#F59E0B">Partial</text>
</svg>