<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" width="700" height="600" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#3B82F6">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#10B981">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#EF4444">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrI" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto" fill="#6366F1">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="600" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">PWA Installation Flow</text>

  <!-- Step 1: User visits HTTPS site -->
  <rect x="225" y="48" width="250" height="42" rx="20" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2" filter="url(#shadow2)"/>
  <text x="350" y="74" text-anchor="middle" font-size="12" font-weight="600" fill="#1E40AF">User visits HTTPS site</text>

  <!-- Arrow 1-2 -->
  <line x1="350" y1="90" x2="350" y2="112" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- Step 2: Diamond - Manifest + SW present? -->
  <polygon points="350,115 460,155 350,195 240,155" fill="#EEF2FF" stroke="#6366F1" stroke-width="2" filter="url(#shadow2)"/>
  <text x="350" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#3730A3">Manifest + SW</text>
  <text x="350" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#3730A3">present?</text>

  <!-- No path from Diamond 1 -->
  <line x1="460" y1="155" x2="560" y2="155" stroke="#EF4444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="500" y="148" font-size="10" font-weight="600" fill="#EF4444">No</text>
  <rect x="562" y="138" width="120" height="34" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="622" y="159" text-anchor="middle" font-size="10" fill="#991B1B">Regular website</text>

  <!-- Yes arrow -->
  <line x1="350" y1="195" x2="350" y2="218" stroke="#10B981" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="365" y="210" font-size="10" font-weight="600" fill="#10B981">Yes</text>

  <!-- Step 3: Diamond - Meets engagement heuristics? -->
  <polygon points="350,220 470,260 350,300 230,260" fill="#EEF2FF" stroke="#6366F1" stroke-width="2" filter="url(#shadow2)"/>
  <text x="350" y="255" text-anchor="middle" font-size="11" font-weight="600" fill="#3730A3">Meets engagement</text>
  <text x="350" y="269" text-anchor="middle" font-size="11" font-weight="600" fill="#3730A3">heuristics?</text>

  <!-- No path from Diamond 2 -->
  <line x1="230" y1="260" x2="130" y2="260" stroke="#EF4444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="185" y="253" font-size="10" font-weight="600" fill="#EF4444">No</text>
  <rect x="18" y="243" width="110" height="34" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="73" y="264" text-anchor="middle" font-size="10" fill="#991B1B">Wait for criteria</text>

  <!-- Yes arrow -->
  <line x1="350" y1="300" x2="350" y2="322" stroke="#10B981" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="365" y="314" font-size="10" font-weight="600" fill="#10B981">Yes</text>

  <!-- Step 4: beforeinstallprompt fires -->
  <rect x="225" y="324" width="250" height="42" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="2" filter="url(#shadow2)"/>
  <text x="350" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#3730A3">beforeinstallprompt</text>
  <text x="350" y="357" text-anchor="middle" font-size="11" fill="#6366F1">event fires</text>

  <!-- Arrow -->
  <line x1="350" y1="366" x2="350" y2="388" stroke="#6366F1" stroke-width="2" marker-end="url(#arrI)"/>

  <!-- Step 5: Diamond - Show custom install UI? -->
  <polygon points="350,390 455,425 350,460 245,425" fill="#F0FDF4" stroke="#10B981" stroke-width="2" filter="url(#shadow2)"/>
  <text x="350" y="422" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">Show custom</text>
  <text x="350" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">install UI?</text>

  <!-- Custom UI path (left) -->
  <line x1="245" y1="425" x2="138" y2="425" stroke="#10B981" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="195" y="418" font-size="10" font-weight="600" fill="#10B981">Yes</text>
  <rect x="18" y="406" width="118" height="38" rx="6" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <text x="77" y="422" text-anchor="middle" font-size="10" fill="#065F46">Defer prompt,</text>
  <text x="77" y="436" text-anchor="middle" font-size="10" fill="#065F46">show custom UI</text>

  <!-- Rejoin arrow from custom UI -->
  <line x1="77" y1="444" x2="77" y2="490" stroke="#10B981" stroke-width="1.5"/>
  <line x1="77" y1="490" x2="248" y2="490" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Default prompt path (right) -->
  <line x1="455" y1="425" x2="555" y2="425" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="495" y="418" font-size="10" font-weight="600" fill="#3B82F6">No</text>
  <rect x="557" y="406" width="118" height="38" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="616" y="422" text-anchor="middle" font-size="10" fill="#1E40AF">Browser shows</text>
  <text x="616" y="436" text-anchor="middle" font-size="10" fill="#1E40AF">default banner</text>

  <!-- Rejoin arrow from default -->
  <line x1="616" y1="444" x2="616" y2="490" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="616" y1="490" x2="452" y2="490" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- Step 6: User clicks install -->
  <rect x="250" y="472" width="200" height="38" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="2" filter="url(#shadow2)"/>
  <text x="350" y="496" text-anchor="middle" font-size="12" font-weight="600" fill="#3730A3">User clicks Install</text>

  <!-- Arrow to result -->
  <line x1="350" y1="510" x2="350" y2="530" stroke="#10B981" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Step 7: Result -->
  <rect x="195" y="532" width="310" height="42" rx="20" fill="#F0FDF4" stroke="#10B981" stroke-width="2.5" filter="url(#shadow2)"/>
  <text x="350" y="557" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">App added to Home Screen / Taskbar</text>

  <!-- Dismiss side path -->
  <rect x="250" y="472" width="200" height="38" rx="8" fill="none"/>
  <!-- Arrow from "User clicks install" going right for dismiss -->
  <line x1="450" y1="491" x2="530" y2="491" stroke="#EF4444" stroke-width="1.5"/>
  <text x="482" y="485" font-size="9" font-weight="600" fill="#EF4444">Dismiss</text>
  <line x1="530" y1="491" x2="530" y2="345" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="530" y1="345" x2="477" y2="345" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrR)"/>
  <text x="545" y="420" font-size="9" fill="#EF4444" transform="rotate(-90,545,420)">Re-prompt later</text>
</svg>
