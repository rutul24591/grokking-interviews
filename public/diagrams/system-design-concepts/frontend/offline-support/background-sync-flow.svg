<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="550" fill="white"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">Background Sync Lifecycle Flow</text>

  <!-- Timeline bar -->
  <rect x="60" y="60" width="680" height="36" rx="6" fill="#F1F5F9"/>
  <!-- Online segment 1 -->
  <rect x="60" y="60" width="180" height="36" rx="6" fill="#D1FAE5"/>
  <text x="150" y="83" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">ONLINE</text>
  <!-- Offline segment -->
  <rect x="240" y="60" width="180" height="36" rx="0" fill="#E5E7EB"/>
  <text x="330" y="83" text-anchor="middle" font-size="11" font-weight="600" fill="#6B7280">OFFLINE</text>
  <!-- App Closed segment -->
  <rect x="420" y="60" width="160" height="36" rx="0" fill="#D1D5DB"/>
  <text x="500" y="83" text-anchor="middle" font-size="11" font-weight="600" fill="#4B5563">APP CLOSED</text>
  <!-- Online segment 2 -->
  <rect x="580" y="60" width="160" height="36" rx="6" fill="#D1FAE5"/>
  <text x="660" y="83" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">ONLINE</text>

  <!-- Vertical dashed lines for phase transitions -->
  <line x1="240" y1="96" x2="240" y2="520" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="420" y1="96" x2="420" y2="520" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="580" y1="96" x2="580" y2="520" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: User submits -->
  <rect x="70" y="120" width="160" height="48" rx="8" fill="#3B82F6"/>
  <text x="150" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="white">User Submits</text>
  <text x="150" y="156" text-anchor="middle" font-size="10" fill="#DBEAFE">Form / Action</text>

  <!-- Arrow down -->
  <line x1="150" y1="168" x2="150" y2="190" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: Store in IDB -->
  <rect x="70" y="190" width="160" height="48" rx="8" fill="#F59E0B"/>
  <text x="150" y="211" text-anchor="middle" font-size="11" font-weight="600" fill="white">Stored in IndexedDB</text>
  <text x="150" y="226" text-anchor="middle" font-size="10" fill="#FEF3C7">Outbox record created</text>

  <!-- Arrow down -->
  <line x1="150" y1="238" x2="150" y2="260" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <!-- Step 3: Sync registered -->
  <rect x="70" y="260" width="160" height="48" rx="8" fill="#6366F1"/>
  <text x="150" y="281" text-anchor="middle" font-size="11" font-weight="600" fill="white">Sync Registered</text>
  <text x="150" y="296" text-anchor="middle" font-size="10" fill="#E0E7FF">sync.register('tag')</text>

  <!-- Horizontal arrow across offline/closed -->
  <line x1="230" y1="284" x2="590" y2="284" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="405" y="275" text-anchor="middle" font-size="10" fill="#6B7280">Browser persists sync tag across lifecycle</text>

  <!-- Offline period indicator -->
  <rect x="260" y="350" width="140" height="40" rx="6" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1"/>
  <text x="330" y="367" text-anchor="middle" font-size="10" fill="#6B7280">User goes offline</text>
  <text x="330" y="381" text-anchor="middle" font-size="10" fill="#9CA3AF">No network activity</text>

  <!-- App closed indicator -->
  <rect x="440" y="350" width="120" height="40" rx="6" fill="#E5E7EB" stroke="#9CA3AF" stroke-width="1"/>
  <text x="500" y="367" text-anchor="middle" font-size="10" fill="#6B7280">Tab / browser</text>
  <text x="500" y="381" text-anchor="middle" font-size="10" fill="#9CA3AF">closed by user</text>

  <!-- Step 5: Connectivity restored -->
  <rect x="596" y="120" width="148" height="48" rx="8" fill="#10B981"/>
  <text x="670" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="white">Connectivity</text>
  <text x="670" y="156" text-anchor="middle" font-size="10" fill="#D1FAE5">Restored</text>

  <!-- Arrow down -->
  <line x1="670" y1="168" x2="670" y2="190" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 6: SW wakes -->
  <rect x="596" y="190" width="148" height="48" rx="8" fill="#3B82F6"/>
  <text x="670" y="211" text-anchor="middle" font-size="11" font-weight="600" fill="white">SW Wakes Up</text>
  <text x="670" y="226" text-anchor="middle" font-size="10" fill="#DBEAFE">Browser spawns SW</text>

  <!-- Arrow down -->
  <line x1="670" y1="238" x2="670" y2="260" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 7: Sync event fires -->
  <rect x="596" y="260" width="148" height="48" rx="8" fill="#6366F1"/>
  <text x="670" y="281" text-anchor="middle" font-size="11" font-weight="600" fill="white">Sync Event Fires</text>
  <text x="670" y="296" text-anchor="middle" font-size="10" fill="#E0E7FF">SyncEvent dispatched</text>

  <!-- Arrow down -->
  <line x1="670" y1="308" x2="670" y2="330" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigo)"/>

  <!-- Step 8: Read IDB -->
  <rect x="596" y="330" width="148" height="48" rx="8" fill="#F59E0B"/>
  <text x="670" y="351" text-anchor="middle" font-size="11" font-weight="600" fill="white">Read IndexedDB</text>
  <text x="670" y="366" text-anchor="middle" font-size="10" fill="#FEF3C7">Fetch outbox entries</text>

  <!-- Arrow down -->
  <line x1="670" y1="378" x2="670" y2="400" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowAmber)"/>

  <!-- Step 9: Send to server -->
  <rect x="596" y="400" width="148" height="48" rx="8" fill="#3B82F6"/>
  <text x="670" y="421" text-anchor="middle" font-size="11" font-weight="600" fill="white">Send to Server</text>
  <text x="670" y="436" text-anchor="middle" font-size="10" fill="#DBEAFE">fetch() each entry</text>

  <!-- Arrow down -->
  <line x1="670" y1="448" x2="670" y2="470" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 10: IDB cleared -->
  <rect x="596" y="470" width="148" height="48" rx="8" fill="#10B981"/>
  <text x="670" y="491" text-anchor="middle" font-size="11" font-weight="600" fill="white">IDB Cleared</text>
  <text x="670" y="506" text-anchor="middle" font-size="10" fill="#D1FAE5">Success — done!</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#10B981"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6366F1"/>
    </marker>
  </defs>
</svg>
