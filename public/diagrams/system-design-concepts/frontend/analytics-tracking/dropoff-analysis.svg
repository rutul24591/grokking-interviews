<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Funnel Drop-Off Analysis</text>
  
  <!-- Left: Drop-off by Step -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Drop-Off Rate by Step</text>
  
  <!-- Bar chart -->
  <line x1="100" y1="450" x2="400" y2="450" stroke="#64748b" stroke-width="2"/>
  <line x1="100" y1="150" x2="100" y2="450" stroke="#64748b" stroke-width="2"/>
  
  <!-- Step 1 bar -->
  <rect x="120" y="270" width="50" height="180" rx="4" fill="#ef4444"/>
  <text x="145" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d" font-weight="600">50%</text>
  <text x="145" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Step 1</text>
  
  <!-- Step 2 bar -->
  <rect x="190" y="360" width="50" height="90" rx="4" fill="#f97316"/>
  <text x="215" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7c2d12" font-weight="600">25%</text>
  <text x="215" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Step 2</text>
  
  <!-- Step 3 bar -->
  <rect x="260" y="396" width="50" height="54" rx="4" fill="#f59e0b"/>
  <text x="285" y="386" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f" font-weight="600">15%</text>
  <text x="285" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Step 3</text>
  
  <!-- Step 4 bar -->
  <rect x="330" y="414" width="50" height="36" rx="4" fill="#eab308"/>
  <text x="355" y="404" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#713f12" font-weight="600">10%</text>
  <text x="355" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Step 4</text>
  
  <!-- Y-axis labels -->
  <text x="90" y="455" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">0%</text>
  <text x="90" y="375" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">25%</text>
  <text x="90" y="295" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">50%</text>
  <text x="90" y="215" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">75%</text>
  <text x="90" y="155" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">100%</text>
  
  <!-- Right: Drop-Off Reasons -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Drop-Off Reasons (Step 1→2)</text>
  
  <!-- Reason 1 -->
  <rect x="490" y="135" width="340" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Form Too Long (35%)</text>
  <text x="660" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Reduce fields, progressive disclosure</text>
  
  <!-- Reason 2 -->
  <rect x="490" y="210" width="340" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Email Already Exists (25%)</text>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Add login link, password reset</text>
  
  <!-- Reason 3 -->
  <rect x="490" y="285" width="340" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Privacy Concerns (20%)</text>
  <text x="660" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Add trust signals, privacy policy</text>
  
  <!-- Reason 4 -->
  <rect x="490" y="360" width="340" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Technical Errors (15%)</text>
  <text x="660" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Fix validation, error handling</text>
  
  <!-- Reason 5 -->
  <rect x="490" y="435" width="340" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Other (5%)</text>
  <text x="660" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Investigate with user research</text>
  
  <!-- Bottom note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Combine quantitative (drop-off rates) with qualitative (user research, session recordings) for actionable insights</text>
</svg>
