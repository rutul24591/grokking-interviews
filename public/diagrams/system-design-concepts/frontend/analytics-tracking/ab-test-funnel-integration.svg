<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">A/B Test Integration with Funnels</text>
  
  <!-- Experiment Setup -->
  <rect x="50" y="80" width="250" height="450" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="175" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Experiment Setup</text>
  
  <rect x="70" y="135" width="210" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="175" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Define Variants</text>
  <text x="175" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Control (A): Original</text>
  <text x="175" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Treatment (B): New design</text>
  
  <rect x="70" y="235" width="210" height="80" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="175" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Random Assignment</text>
  <text x="175" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">50/50 split by user_id</text>
  <text x="175" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Consistent across sessions</text>
  
  <rect x="70" y="335" width="210" height="80" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="175" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Sample Size</text>
  <text x="175" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">~400 users/variant</text>
  <text x="175" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">For 20% improvement detection</text>
  
  <!-- Arrow to funnel -->
  <line x1="300" y1="250" x2="380" y2="250" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Funnel with variants -->
  <rect x="390" y="80" width="460" height="450" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="620" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Funnel Analysis by Variant</text>
  
  <!-- Control funnel -->
  <rect x="410" y="135" width="200" height="380" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="510" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#991b1b">Control (A)</text>
  
  <rect x="425" y="180" width="170" height="40" rx="4" fill="#ef4444"/>
  <text x="510" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">Step 1: 10,000 (100%)</text>
  
  <rect x="440" y="230" width="140" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="510" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">Step 2: 5,000 (50%)</text>
  
  <rect x="455" y="280" width="110" height="40" rx="4" fill="#ef4444" opacity="0.6"/>
  <text x="510" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">Step 3: 2,500</text>
  
  <rect x="470" y="330" width="80" height="40" rx="4" fill="#ef4444" opacity="0.4"/>
  <text x="510" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">Conv: 1,000</text>
  
  <rect x="425" y="390" width="170" height="50" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="510" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b" font-weight="600">Overall: 10% conversion</text>
  
  <!-- Treatment funnel -->
  <rect x="630" y="135" width="200" height="380" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="730" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">Treatment (B)</text>
  
  <rect x="645" y="180" width="170" height="40" rx="4" fill="#22c55e"/>
  <text x="730" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">Step 1: 10,000 (100%)</text>
  
  <rect x="660" y="230" width="140" height="40" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="730" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">Step 2: 6,000 (60%)</text>
  
  <rect x="675" y="280" width="110" height="40" rx="4" fill="#22c55e" opacity="0.6"/>
  <text x="730" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">Step 3: 3,600</text>
  
  <rect x="690" y="330" width="80" height="40" rx="4" fill="#22c55e" opacity="0.4"/>
  <text x="730" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">Conv: 1,800</text>
  
  <rect x="645" y="390" width="170" height="50" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="730" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#065f46" font-weight="600">Overall: 18% conversion</text>
  
  <!-- Arrow to results -->
  <line x1="850" y1="250" x2="890" y2="250" stroke="#10b981" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  
  <!-- Results -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Results: Treatment B shows 80% improvement (10% → 18%), p &lt; 0.05, statistically significant | Roll out to 100%</text>
</svg>
