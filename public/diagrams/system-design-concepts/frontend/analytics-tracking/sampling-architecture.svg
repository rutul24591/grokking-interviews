<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Page View Sampling Architecture</text>
  
  <!-- Left: Without Sampling -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Without Sampling (100%)</text>
  
  <!-- All page views tracked -->
  <rect x="70" y="135" width="360" height="380" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Page view streams -->
  <rect x="90" y="155" width="320" height="25" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="250" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Page View 1 → Track</text>
  
  <rect x="90" y="185" width="320" height="25" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="250" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Page View 2 → Track</text>
  
  <rect x="90" y="215" width="320" height="25" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="250" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Page View 3 → Track</text>
  
  <rect x="90" y="245" width="320" height="25" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="250" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Page View 4 → Track</text>
  
  <rect x="90" y="275" width="320" height="25" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="250" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Page View 5 → Track</text>
  
  <rect x="90" y="305" width="320" height="25" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="250" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d" font-style="italic">... (100,000 more page views)</text>
  
  <!-- Cost label -->
  <rect x="70" y="350" width="360" height="60" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#991b1b">Cost: 100,000 events/month</text>
  <text x="250" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">High storage, high query costs</text>
  
  <!-- Right: With Sampling -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">With Sampling (10%)</text>
  
  <!-- Hash function -->
  <rect x="490" y="135" width="340" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Hash(session_id) mod 100</text>
  <text x="660" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Consistent sampling per user</text>
  
  <!-- Arrow -->
  <line x1="660" y1="195" x2="660" y2="215" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Sampled page views -->
  <rect x="490" y="220" width="340" height="200" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <rect x="510" y="240" width="300" height="25" rx="4" fill="#22c55e"/>
  <text x="660" y="257" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Hash=03 → Track (10%)</text>
  
  <rect x="510" y="270" width="300" height="25" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="660" y="287" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d" font-style="italic">Hash=47 → Skip (90%)</text>
  
  <rect x="510" y="300" width="300" height="25" rx="4" fill="#22c55e"/>
  <text x="660" y="317" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Hash=08 → Track (10%)</text>
  
  <rect x="510" y="330" width="300" height="25" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="660" y="347" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d" font-style="italic">Hash=72 → Skip (90%)</text>
  
  <rect x="510" y="360" width="300" height="25" rx="4" fill="#22c55e"/>
  <text x="660" y="377" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Hash=01 → Track (10%)</text>
  
  <!-- Cost label -->
  <rect x="490" y="435" width="340" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Cost: 10,000 events/month (90% savings)</text>
  <text x="660" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Multiply metrics by 10 for accurate totals</text>
  
  <!-- Bottom: Statistical Accuracy -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">10% sampling provides statistically accurate data at 10% cost | Use consistent hashing for same-user tracking</text>
</svg>
