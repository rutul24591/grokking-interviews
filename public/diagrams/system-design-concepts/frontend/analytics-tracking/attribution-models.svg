<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Attribution Models Comparison</text>
  
  <!-- Touchpoints timeline -->
  <line x1="100" y1="100" x2="800" y2="100" stroke="#64748b" stroke-width="2"/>
  <text x="810" y="105" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Journey →</text>
  
  <!-- Touchpoints -->
  <circle cx="150" cy="100" r="25" fill="#3b82f6"/>
  <text x="150" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Social</text>
  
  <circle cx="300" cy="100" r="25" fill="#8b5cf6"/>
  <text x="300" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Email</text>
  
  <circle cx="450" cy="100" r="25" fill="#f59e0b"/>
  <text x="450" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Search</text>
  
  <circle cx="600" cy="100" r="25" fill="#10b981"/>
  <text x="600" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Direct</text>
  
  <circle cx="750" cy="100" r="30" fill="#ef4444" stroke="#dc2626" stroke-width="3"/>
  <text x="750" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="700">Convert!</text>
  
  <!-- First-Touch Model -->
  <rect x="50" y="150" width="800" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af">First-Touch Attribution</text>
  
  <rect x="125" y="190" width="50" height="25" rx="4" fill="#3b82f6"/>
  <text x="150" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">100%</text>
  
  <rect x="275" y="190" width="50" height="25" rx="4" fill="#e5e7eb"/>
  <text x="300" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">0%</text>
  
  <rect x="425" y="190" width="50" height="25" rx="4" fill="#e5e7eb"/>
  <text x="450" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">0%</text>
  
  <rect x="575" y="190" width="50" height="25" rx="4" fill="#e5e7eb"/>
  <text x="600" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">0%</text>
  
  <text x="700" y="207" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Best for: Acquisition analysis</text>
  
  <!-- Last-Touch Model -->
  <rect x="50" y="240" width="800" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#3730a3">Last-Touch Attribution</text>
  
  <rect x="125" y="280" width="50" height="25" rx="4" fill="#e5e7eb"/>
  <text x="150" y="297" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">0%</text>
  
  <rect x="275" y="280" width="50" height="25" rx="4" fill="#e5e7eb"/>
  <text x="300" y="297" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">0%</text>
  
  <rect x="425" y="280" width="50" height="25" rx="4" fill="#e5e7eb"/>
  <text x="450" y="297" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">0%</text>
  
  <rect x="575" y="280" width="50" height="25" rx="4" fill="#6366f1"/>
  <text x="600" y="297" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">100%</text>
  
  <text x="700" y="297" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Most common but oversimplified</text>
  
  <!-- Linear Model -->
  <rect x="50" y="330" width="800" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Linear Attribution</text>
  
  <rect x="125" y="370" width="50" height="25" rx="4" fill="#f59e0b"/>
  <text x="150" y="387" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">25%</text>
  
  <rect x="275" y="370" width="50" height="25" rx="4" fill="#f59e0b"/>
  <text x="300" y="387" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">25%</text>
  
  <rect x="425" y="370" width="50" height="25" rx="4" fill="#f59e0b"/>
  <text x="450" y="387" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">25%</text>
  
  <rect x="575" y="370" width="50" height="25" rx="4" fill="#f59e0b"/>
  <text x="600" y="387" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">25%</text>
  
  <text x="700" y="387" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Equal credit to all touchpoints</text>
  
  <!-- Time-Decay Model -->
  <rect x="50" y="420" width="800" height="80" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Time-Decay Attribution</text>
  
  <rect x="125" y="460" width="50" height="25" rx="4" fill="#10b981" opacity="0.4"/>
  <text x="150" y="477" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857" font-weight="600">10%</text>
  
  <rect x="275" y="460" width="50" height="25" rx="4" fill="#10b981" opacity="0.6"/>
  <text x="300" y="477" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857" font-weight="600">20%</text>
  
  <rect x="425" y="460" width="50" height="25" rx="4" fill="#10b981" opacity="0.8"/>
  <text x="450" y="477" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857" font-weight="600">30%</text>
  
  <rect x="575" y="460" width="50" height="25" rx="4" fill="#10b981"/>
  <text x="600" y="477" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">40%</text>
  
  <text x="700" y="477" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Later touches get more credit</text>
  
  <!-- Bottom note -->
  <rect x="50" y="510" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Position-Based (U-Shaped): First 40%, Last 40%, Middle 20% shared | Data-Driven: ML-based credit assignment</text>
</svg>
