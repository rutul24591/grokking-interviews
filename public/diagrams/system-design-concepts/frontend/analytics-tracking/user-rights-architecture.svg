<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">User Data Rights Architecture</text>
  
  <!-- User Request -->
  <rect x="50" y="80" width="200" height="450" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">User Request</text>
  
  <rect x="70" y="140" width="160" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="150" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Access Request</text>
  <text x="150" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Export my data</text>
  
  <rect x="70" y="220" width="160" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="150" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Deletion Request</text>
  <text x="150" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Erase my data</text>
  
  <rect x="70" y="300" width="160" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="150" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Portability Request</text>
  <text x="150" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Download in JSON</text>
  
  <rect x="70" y="380" width="160" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="150" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Rectification Request</text>
  <text x="150" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Correct my data</text>
  
  <!-- Arrow to processing -->
  <line x1="250" y1="250" x2="320" y2="250" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow1)"/>
  
  <!-- Request Processing -->
  <rect x="330" y="80" width="240" height="450" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Request Processing</text>
  
  <rect x="350" y="135" width="200" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="450" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">1. Verify Identity</text>
  <text x="450" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Authenticate user</text>
  
  <line x1="450" y1="205" x2="450" y2="225" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <rect x="350" y="230" width="200" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">2. Locate All Data</text>
  <text x="450" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Query all data stores</text>
  
  <line x1="450" y1="300" x2="450" y2="320" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <rect x="350" y="330" width="200" height="70" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="450" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">3. Execute Request</text>
  <text x="450" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Export / Delete / Correct</text>
  
  <line x1="450" y1="400" x2="450" y2="420" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <rect x="350" y="430" width="200" height="70" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">4. Confirm Completion</text>
  <text x="450" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Notify user (within 30 days)</text>
  
  <!-- Arrow to data stores -->
  <line x1="570" y1="250" x2="630" y2="250" stroke="#10b981" stroke-width="3" marker-end="url(#arrow2)"/>
  
  <!-- Data Stores -->
  <rect x="640" y="80" width="210" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Data Stores</text>
  
  <rect x="660" y="135" width="170" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="745" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Analytics Database</text>
  
  <rect x="660" y="200" width="170" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="745" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">User Profiles</text>
  
  <rect x="660" y="265" width="170" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="745" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Consent Records</text>
  
  <rect x="660" y="330" width="170" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="745" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Third-Party Systems</text>
  
  <rect x="660" y="395" width="170" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="745" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Audit Log</text>
  <text x="745" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">All actions logged</text>
  
  <!-- Bottom compliance note -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">GDPR requires response within 30 days | All requests must be authenticated | Deletion must propagate to all systems including backups</text>
</svg>
