<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Event Batching Architecture</text>
  
  <!-- Event Queue -->
  <rect x="50" y="80" width="350" height="450" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="225" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Client-Side Event Queue</text>
  
  <!-- Events flowing in -->
  <rect x="70" y="135" width="310" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="225" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Event 1: button_clicked</text>
  
  <rect x="70" y="180" width="310" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="225" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Event 2: page_viewed</text>
  
  <rect x="70" y="225" width="310" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="225" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Event 3: video_started ← 10th event</text>
  
  <rect x="70" y="270" width="310" height="40" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <text x="225" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Event 4: (queued)</text>
  
  <!-- Flush triggers -->
  <rect x="70" y="330" width="310" height="100" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="225" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Flush Triggers</text>
  <text x="225" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">• Queue reaches 10 events</text>
  <text x="225" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">• Timer expires (30 seconds)</text>
  <text x="225" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">• Page unload (sendBeacon)</text>
  
  <!-- Arrow to send mechanism -->
  <line x1="400" y1="250" x2="480" y2="250" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="440" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" font-weight="600">Batch (10 events)</text>
  
  <!-- Send Mechanism -->
  <rect x="490" y="80" width="360" height="200" rx="12" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Send Mechanism</text>
  
  <!-- sendBeacon -->
  <rect x="510" y="135" width="320" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="670" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">navigator.sendBeacon()</text>
  <text x="670" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">✓ Queued by browser</text>
  
  <!-- fetch fallback -->
  <rect x="510" y="210" width="320" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="670" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">fetch() + keepalive</text>
  <text x="670" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Fallback when sendBeacon unavailable</text>
  
  <!-- Arrow to backend -->
  <line x1="850" y1="250" x2="850" y2="320" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Backend -->
  <rect x="490" y="330" width="360" height="200" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Analytics Backend</text>
  
  <!-- Process batch -->
  <rect x="510" y="385" width="320" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="670" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Parse Batch</text>
  
  <rect x="510" y="445" width="320" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="670" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Store Events</text>
  
  <!-- Retry logic -->
  <rect x="510" y="505" width="320" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="670" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d" font-weight="600">Retry on failure (exponential backoff)</text>
  
  <!-- Bottom benefits -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Benefits: 10x fewer requests | Better reliability with sendBeacon | Lower bandwidth overhead | Improved battery life on mobile</text>
</svg>
