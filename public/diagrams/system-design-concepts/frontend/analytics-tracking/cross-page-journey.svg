<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Cross-Page User Journey</text>
  
  <!-- User journey timeline -->
  <rect x="50" y="80" width="800" height="450" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Time axis -->
  <line x1="100" y1="450" x2="800" y2="450" stroke="#64748b" stroke-width="2"/>
  <text x="810" y="455" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Time →</text>
  
  <!-- Day labels -->
  <text x="100" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Day 1</text>
  <text x="350" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Day 2</text>
  <text x="600" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Day 3</text>
  
  <!-- Session 1 -->
  <rect x="100" y="120" width="200" height="280" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="200" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af">Session 1</text>
  <text x="200" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">Organic Search</text>
  
  <!-- Page views in session 1 -->
  <rect x="120" y="180" width="160" height="35" rx="4" fill="#3b82f6"/>
  <text x="200" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Homepage</text>
  
  <line x1="200" y1="215" x2="200" y2="230" stroke="#3b82f6" stroke-width="2"/>
  
  <rect x="120" y="230" width="160" height="35" rx="4" fill="#3b82f6" opacity="0.8"/>
  <text x="200" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Blog Post</text>
  
  <line x1="200" y1="265" x2="200" y2="280" stroke="#3b82f6" stroke-width="2"/>
  
  <rect x="120" y="280" width="160" height="35" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="200" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Pricing Page</text>
  
  <rect x="120" y="330" width="160" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e" font-style="italic">Exit (no conversion)</text>
  
  <!-- Session 2 -->
  <rect x="350" y="120" width="200" height="280" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="450" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#3730a3">Session 2</text>
  <text x="450" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4338ca">Email Campaign</text>
  
  <rect x="370" y="180" width="160" height="35" rx="4" fill="#6366f1"/>
  <text x="450" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Landing Page</text>
  
  <line x1="450" y1="215" x2="450" y2="230" stroke="#6366f1" stroke-width="2"/>
  
  <rect x="370" y="230" width="160" height="35" rx="4" fill="#6366f1" opacity="0.8"/>
  <text x="450" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Product Page</text>
  
  <line x1="450" y1="265" x2="450" y2="280" stroke="#6366f1" stroke-width="2"/>
  
  <rect x="370" y="280" width="160" height="35" rx="4" fill="#6366f1" opacity="0.6"/>
  <text x="450" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Cart Added</text>
  
  <rect x="370" y="330" width="160" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e" font-style="italic">Exit (cart abandoned)</text>
  
  <!-- Session 3 -->
  <rect x="600" y="120" width="200" height="280" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="700" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Session 3</text>
  <text x="700" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Direct</text>
  
  <rect x="620" y="180" width="160" height="35" rx="4" fill="#10b981"/>
  <text x="700" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Cart Page</text>
  
  <line x1="700" y1="215" x2="700" y2="230" stroke="#10b981" stroke-width="2"/>
  
  <rect x="620" y="230" width="160" height="35" rx="4" fill="#10b981" opacity="0.8"/>
  <text x="700" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Checkout</text>
  
  <line x1="700" y1="265" x2="700" y2="280" stroke="#10b981" stroke-width="2"/>
  
  <rect x="620" y="280" width="160" height="35" rx="4" fill="#10b981" opacity="0.6"/>
  <text x="700" y="302" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Payment</text>
  
  <line x1="700" y1="315" x2="700" y2="330" stroke="#10b981" stroke-width="2"/>
  
  <rect x="620" y="330" width="160" height="40" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="700" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#065f46" font-weight="700">✓ Purchase Complete!</text>
  
  <!-- Journey summary -->
  <rect x="100" y="485" width="700" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="450" y="508" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Journey: 3 sessions over 3 days | 9 page views | 1 conversion | Attribution: Email (last non-direct)</text>
</svg>
