<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Social Media Preview Rendering Pipeline</text>

  <!-- Step 1: URL Shared -->
  <rect x="20" y="80" width="110" height="70" rx="8" fill="#6d5bd0"/>
  <text x="75" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">URL Shared</text>
  <text x="75" y="126" text-anchor="middle" font-size="10" fill="#ffffff">in chat/post</text>

  <!-- Arrow 1 -->
  <line x1="130" y1="115" x2="150" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowM2)"/>

  <!-- Step 2: Platform Crawler -->
  <rect x="155" y="80" width="110" height="70" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="210" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Platform</text>
  <text x="210" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Crawler</text>
  <text x="210" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Fetches page</text>

  <!-- Arrow 2 -->
  <line x1="265" y1="115" x2="285" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowM2)"/>

  <!-- Step 3: Parse HTML Head -->
  <rect x="290" y="80" width="110" height="70" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="345" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Parse HTML</text>
  <text x="345" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">&amp;lt;head&amp;gt;</text>
  <text x="345" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Reads meta tags</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="115" x2="420" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowM2)"/>

  <!-- Step 4: Extract OG/Twitter -->
  <rect x="425" y="80" width="110" height="70" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="480" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Extract</text>
  <text x="480" y="121" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">OG / Twitter</text>
  <text x="480" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Tags extracted</text>

  <!-- Arrow 4 -->
  <line x1="535" y1="115" x2="555" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowM2)"/>

  <!-- Step 5: Download og:image -->
  <rect x="560" y="80" width="110" height="70" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="615" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Download</text>
  <text x="615" y="121" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">og:image</text>
  <text x="615" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Fetches image</text>

  <!-- Arrow 5 -->
  <line x1="670" y1="115" x2="690" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowM2)"/>

  <!-- Step 6: Generate Preview -->
  <rect x="695" y="80" width="110" height="70" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="750" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Generate</text>
  <text x="750" y="121" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Preview Card</text>
  <text x="750" y="140" text-anchor="middle" font-size="10" fill="#1a1822">Assembles UI</text>

  <!-- Arrow down from Generate -->
  <line x1="750" y1="150" x2="750" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowM2)"/>

  <!-- Step 7: Cache -->
  <rect x="695" y="180" width="110" height="50" rx="8" fill="#6d5bd0"/>
  <text x="750" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Cache Result</text>

  <!-- Preview Card Example -->
  <rect x="100" y="265" width="700" height="210" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Rendered Preview Card</text>

  <!-- Image placeholder -->
  <rect x="120" y="285" width="280" height="170" rx="6" fill="#d7d1e6"/>
  <text x="260" y="370" text-anchor="middle" font-size="14" fill="#6d5bd0" font-weight="600">og:image</text>
  <text x="260" y="390" text-anchor="middle" font-size="11" fill="#1a1822">1200 x 630 recommended</text>

  <!-- Text content -->
  <rect x="420" y="295" width="360" height="24" rx="4" fill="#f3f1f8"/>
  <text x="430" y="312" font-size="11" fill="#1a1822" font-weight="600">og:site_name</text>
  <text x="530" y="312" font-size="11" fill="#6d5bd0">example.com</text>

  <rect x="420" y="330" width="360" height="30" rx="4" fill="none"/>
  <text x="430" y="350" font-size="15" fill="#1a1822" font-weight="700">og:title - Page Title Here</text>

  <rect x="420" y="370" width="360" height="40" rx="4" fill="none"/>
  <text x="430" y="388" font-size="12" fill="#1a1822">og:description - A compelling description</text>
  <text x="430" y="404" font-size="12" fill="#1a1822">of the shared page content...</text>

  <rect x="420" y="420" width="360" height="24" rx="4" fill="#f3f1f8"/>
  <text x="430" y="437" font-size="10" fill="#1a1822">og:url</text>
  <text x="470" y="437" font-size="10" fill="#6d5bd0">https://example.com/page</text>

  <defs>
    <marker id="arrowM2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>