<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Rich Result Pipeline</text>

  <!-- Step 1: Page with JSON-LD -->
  <rect x="20" y="120" width="120" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="20" y="120" width="120" height="30" rx="8" fill="#6d5bd0"/>
  <text x="80" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Web Page</text>
  <text x="80" y="165" text-anchor="middle" font-size="10" fill="#1a1822">Contains</text>
  <text x="80" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">JSON-LD</text>
  <text x="80" y="200" text-anchor="middle" font-size="9" fill="#1a1822">&amp;lt;script type=</text>
  <text x="80" y="204" text-anchor="middle" font-size="0" fill="#1a1822"></text>

  <!-- Arrow 1 -->
  <line x1="140" y1="165" x2="168" y2="165" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowSD2)"/>

  <!-- Step 2: Googlebot -->
  <rect x="175" y="120" width="120" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="175" y="120" width="120" height="30" rx="8" fill="#6d5bd0"/>
  <text x="235" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Googlebot</text>
  <text x="235" y="165" text-anchor="middle" font-size="10" fill="#1a1822">Crawls page</text>
  <text x="235" y="180" text-anchor="middle" font-size="10" fill="#1a1822">Renders JavaScript</text>
  <text x="235" y="195" text-anchor="middle" font-size="10" fill="#1a1822">Extracts structured</text>
  <text x="235" y="205" text-anchor="middle" font-size="10" fill="#1a1822">data</text>

  <!-- Arrow 2 -->
  <line x1="295" y1="165" x2="323" y2="165" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowSD2)"/>

  <!-- Step 3: Validate Schema.org -->
  <rect x="330" y="120" width="120" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="330" y="120" width="120" height="30" rx="8" fill="#6d5bd0"/>
  <text x="390" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Validate</text>
  <text x="390" y="165" text-anchor="middle" font-size="10" fill="#1a1822">Checks against</text>
  <text x="390" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Schema.org</text>
  <text x="390" y="195" text-anchor="middle" font-size="10" fill="#1a1822">vocabulary</text>

  <!-- Arrow 3 -->
  <line x1="450" y1="165" x2="478" y2="165" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowSD2)"/>

  <!-- Step 4: Google Requirements -->
  <rect x="485" y="120" width="120" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="485" y="120" width="120" height="30" rx="8" fill="#6d5bd0"/>
  <text x="545" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Requirements</text>
  <text x="545" y="165" text-anchor="middle" font-size="10" fill="#1a1822">Checks Google-</text>
  <text x="545" y="180" text-anchor="middle" font-size="10" fill="#1a1822">specific required</text>
  <text x="545" y="195" text-anchor="middle" font-size="10" fill="#1a1822">&amp; recommended</text>
  <text x="545" y="205" text-anchor="middle" font-size="10" fill="#1a1822">properties</text>

  <!-- Arrow 4 -->
  <line x1="605" y1="165" x2="633" y2="165" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowSD2)"/>

  <!-- Step 5: Rich Result Candidacy -->
  <rect x="640" y="120" width="120" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="640" y="120" width="120" height="30" rx="8" fill="#6d5bd0"/>
  <text x="700" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Candidacy</text>
  <text x="700" y="165" text-anchor="middle" font-size="10" fill="#1a1822">Eligible for</text>
  <text x="700" y="180" text-anchor="middle" font-size="10" fill="#1a1822">rich results?</text>
  <text x="700" y="195" text-anchor="middle" font-size="10" fill="#1a1822">Quality checks</text>

  <!-- Arrow 5 -->
  <line x1="760" y1="165" x2="788" y2="165" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowSD2)"/>

  <!-- Step 6: SERP Display -->
  <rect x="795" y="120" width="90" height="90" rx="8" fill="#6d5bd0"/>
  <text x="840" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">SERP</text>
  <text x="840" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Rich</text>
  <text x="840" y="189" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Result</text>

  <!-- Rich Result Types -->
  <text x="450" y="270" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1822">Supported Rich Result Types</text>

  <!-- Row 1 -->
  <rect x="40" y="290" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="117" y="314" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Recipe</text>
  <text x="117" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Image, rating, time</text>

  <rect x="210" y="290" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="287" y="314" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Product</text>
  <text x="287" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Price, availability, reviews</text>

  <rect x="380" y="290" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="457" y="314" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">FAQ</text>
  <text x="457" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Expandable Q&amp;A pairs</text>

  <rect x="550" y="290" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="627" y="314" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">HowTo</text>
  <text x="627" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Steps, tools, time</text>

  <rect x="720" y="290" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="797" y="314" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Breadcrumb</text>
  <text x="797" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Navigation trail</text>

  <!-- Row 2 -->
  <rect x="40" y="360" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="117" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Article</text>
  <text x="117" y="400" text-anchor="middle" font-size="10" fill="#1a1822">Headline, image, date</text>

  <rect x="210" y="360" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="287" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Event</text>
  <text x="287" y="400" text-anchor="middle" font-size="10" fill="#1a1822">Date, location, offers</text>

  <rect x="380" y="360" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="457" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Job Posting</text>
  <text x="457" y="400" text-anchor="middle" font-size="10" fill="#1a1822">Title, salary, company</text>

  <rect x="550" y="360" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="627" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Video</text>
  <text x="627" y="400" text-anchor="middle" font-size="10" fill="#1a1822">Thumbnail, duration</text>

  <rect x="720" y="360" width="155" height="55" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="797" y="384" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Review</text>
  <text x="797" y="400" text-anchor="middle" font-size="10" fill="#1a1822">Stars, author, item</text>

  <!-- Testing tools -->
  <rect x="150" y="435" width="600" height="45" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="462" text-anchor="middle" font-size="12" fill="#1a1822">Testing Tools: <tspan font-weight="600" fill="#6d5bd0">Rich Results Test</tspan> | <tspan font-weight="600" fill="#6d5bd0">Schema Markup Validator</tspan> | <tspan font-weight="600" fill="#6d5bd0">Search Console</tspan></text>

  <defs>
    <marker id="arrowSD2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>