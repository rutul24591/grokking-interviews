<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Meta Tag Hierarchy &amp; Consumer Mapping</text>

  <!-- HTML Head container -->
  <rect x="30" y="55" width="340" height="420" rx="8" fill="none" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="30" y="55" width="340" height="36" rx="8" fill="#6d5bd0"/>
  <text x="200" y="78" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">&amp;lt;head&amp;gt; Meta Tags</text>

  <!-- Title tag -->
  <rect x="50" y="105" width="300" height="40" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="200" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">&amp;lt;title&amp;gt; Tag</text>

  <!-- Meta description -->
  <rect x="50" y="157" width="300" height="40" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="200" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">&amp;lt;meta name="description"&amp;gt;</text>

  <!-- Meta robots -->
  <rect x="50" y="209" width="300" height="40" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="200" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">&amp;lt;meta name="robots"&amp;gt;</text>

  <!-- Meta viewport -->
  <rect x="50" y="261" width="300" height="40" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="200" y="286" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">&amp;lt;meta name="viewport"&amp;gt;</text>

  <!-- OG Tags -->
  <rect x="50" y="313" width="300" height="40" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="200" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Open Graph Tags (og:*)</text>

  <!-- Twitter Cards -->
  <rect x="50" y="365" width="300" height="40" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="200" y="390" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Twitter Card Tags (twitter:*)</text>

  <!-- Canonical -->
  <rect x="50" y="417" width="300" height="40" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="200" y="442" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">&amp;lt;link rel="canonical"&amp;gt;</text>

  <!-- Consumers -->
  <!-- Search Engines -->
  <rect x="530" y="70" width="200" height="80" rx="8" fill="#6d5bd0" stroke="none"/>
  <text x="630" y="102" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Search Engines</text>
  <text x="630" y="122" text-anchor="middle" font-size="11" fill="#ffffff">Google, Bing, DuckDuckGo</text>

  <!-- Social Platforms -->
  <rect x="530" y="175" width="200" height="80" rx="8" fill="#6d5bd0" stroke="none"/>
  <text x="630" y="207" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Social Platforms</text>
  <text x="630" y="227" text-anchor="middle" font-size="11" fill="#ffffff">Facebook, LinkedIn, Slack</text>

  <!-- Twitter/X -->
  <rect x="530" y="280" width="200" height="80" rx="8" fill="#6d5bd0" stroke="none"/>
  <text x="630" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Twitter / X</text>
  <text x="630" y="332" text-anchor="middle" font-size="11" fill="#ffffff">Card previews</text>

  <!-- Browsers -->
  <rect x="530" y="385" width="200" height="80" rx="8" fill="#6d5bd0" stroke="none"/>
  <text x="630" y="417" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Browsers</text>
  <text x="630" y="437" text-anchor="middle" font-size="11" fill="#ffffff">Chrome, Safari, Firefox</text>

  <!-- Arrows: title → Search Engines -->
  <line x1="350" y1="125" x2="525" y2="105" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- description → Search Engines -->
  <line x1="350" y1="177" x2="525" y2="115" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- robots → Search Engines -->
  <line x1="350" y1="229" x2="525" y2="120" stroke="#d7d1e6" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <!-- canonical → Search Engines -->
  <line x1="350" y1="437" x2="525" y2="130" stroke="#d7d1e6" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- OG → Social -->
  <line x1="350" y1="333" x2="525" y2="215" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- title → Social (fallback) -->
  <line x1="350" y1="125" x2="525" y2="195" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow2)"/>

  <!-- Twitter Cards → Twitter -->
  <line x1="350" y1="385" x2="525" y2="320" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- OG → Twitter (fallback) -->
  <line x1="350" y1="340" x2="525" y2="310" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow2)"/>

  <!-- viewport → Browsers -->
  <line x1="350" y1="281" x2="525" y2="420" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- title → Browsers -->
  <line x1="350" y1="130" x2="525" y2="400" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow2)"/>

  <!-- Legend -->
  <line x1="540" y1="482" x2="575" y2="482" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="580" y="486" font-size="11" fill="#1a1822">Primary consumer</text>
  <line x1="700" y1="482" x2="735" y2="482" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="740" y="486" font-size="11" fill="#1a1822">Fallback / secondary</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d7d1e6"/>
    </marker>
  </defs>
</svg>