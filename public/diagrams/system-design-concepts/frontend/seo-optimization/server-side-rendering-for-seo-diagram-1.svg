<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">SSR vs CSR: Googlebot Indexing Perspective</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
  </defs>

  <!-- SSR Lane -->
  <rect x="30" y="55" width="840" height="185" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="2"/>
  <rect x="30" y="55" width="840" height="34" rx="8" fill="#2e7d32"/>
  <text x="450" y="77" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">SSR (Server-Side Rendering) Lane</text>

  <!-- SSR steps -->
  <rect x="50" y="105" width="120" height="55" rx="6" fill="#6d5bd0"/>
  <text x="110" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Googlebot</text>
  <text x="110" y="146" text-anchor="middle" font-size="10" fill="#ffffff">Request URL</text>

  <line x1="170" y1="132" x2="200" y2="132" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="200" y="105" width="140" height="55" rx="6" fill="#6d5bd0"/>
  <text x="270" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Server renders</text>
  <text x="270" y="146" text-anchor="middle" font-size="10" fill="#ffffff">Full HTML response</text>

  <line x1="340" y1="132" x2="370" y2="132" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="370" y="105" width="150" height="55" rx="6" fill="#2e7d32"/>
  <text x="445" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Complete HTML</text>
  <text x="445" y="146" text-anchor="middle" font-size="10" fill="#ffffff">received immediately</text>

  <line x1="520" y1="132" x2="550" y2="132" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="550" y="105" width="140" height="55" rx="6" fill="#2e7d32"/>
  <text x="620" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">First Wave</text>
  <text x="620" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Indexing</text>
  <text x="620" y="152" text-anchor="middle" font-size="10" fill="#ffffff">Indexes full content</text>

  <line x1="690" y1="132" x2="720" y2="132" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="720" y="100" width="130" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="785" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">INDEXED</text>
  <text x="785" y="145" text-anchor="middle" font-size="10" fill="#2e7d32">Immediately</text>
  <text x="785" y="158" text-anchor="middle" font-size="10" fill="#2e7d32">Complete content</text>

  <!-- Timeline indicator for SSR -->
  <rect x="50" y="175" width="810" height="18" rx="4" fill="#e8f5e9"/>
  <text x="450" y="189" text-anchor="middle" font-size="10" font-weight="600" fill="#2e7d32">~seconds from crawl to index</text>

  <!-- CSR Lane -->
  <rect x="30" y="260" width="840" height="220" rx="8" fill="#ffffff" stroke="#e65100" stroke-width="2"/>
  <rect x="30" y="260" width="840" height="34" rx="8" fill="#e65100"/>
  <text x="450" y="282" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">CSR (Client-Side Rendering) Lane</text>

  <!-- CSR steps -->
  <rect x="50" y="310" width="120" height="55" rx="6" fill="#6d5bd0"/>
  <text x="110" y="333" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Googlebot</text>
  <text x="110" y="351" text-anchor="middle" font-size="10" fill="#ffffff">Request URL</text>

  <line x1="170" y1="337" x2="200" y2="337" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="200" y="310" width="120" height="55" rx="6" fill="#e65100"/>
  <text x="260" y="333" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Empty Shell</text>
  <text x="260" y="351" text-anchor="middle" font-size="10" fill="#ffffff">&amp;lt;div id="root"&amp;gt;</text>

  <line x1="320" y1="337" x2="345" y2="337" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="345" y="310" width="120" height="55" rx="6" fill="#e65100"/>
  <text x="405" y="333" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Queue for</text>
  <text x="405" y="351" text-anchor="middle" font-size="10" fill="#ffffff">JS Rendering</text>

  <!-- Delay indicator -->
  <rect x="480" y="318" width="100" height="40" rx="20" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="530" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">DELAY</text>
  <text x="530" y="354" text-anchor="middle" font-size="9" fill="#e65100">hours/days</text>

  <line x1="580" y1="337" x2="605" y2="337" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="605" y="310" width="110" height="55" rx="6" fill="#e65100"/>
  <text x="660" y="327" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Second Wave</text>
  <text x="660" y="343" text-anchor="middle" font-size="10" fill="#ffffff">JS executes</text>
  <text x="660" y="357" text-anchor="middle" font-size="10" fill="#ffffff">Content renders</text>

  <line x1="715" y1="337" x2="740" y2="337" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="740" y="305" width="110" height="65" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="795" y="330" text-anchor="middle" font-size="13" font-weight="700" fill="#e65100">INDEXED</text>
  <text x="795" y="348" text-anchor="middle" font-size="10" fill="#e65100">Eventually</text>
  <text x="795" y="362" text-anchor="middle" font-size="10" fill="#e65100">If JS works</text>

  <!-- Risk callouts for CSR -->
  <rect x="50" y="385" width="195" height="34" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
  <text x="147" y="407" text-anchor="middle" font-size="10" fill="#c62828">JS errors block indexing</text>

  <rect x="260" y="385" width="195" height="34" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
  <text x="357" y="407" text-anchor="middle" font-size="10" fill="#c62828">Render budget limits</text>

  <rect x="470" y="385" width="195" height="34" rx="5" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
  <text x="567" y="407" text-anchor="middle" font-size="10" fill="#c62828">API timeouts = empty content</text>

  <!-- Timeline indicator for CSR -->
  <rect x="50" y="430" width="810" height="18" rx="4" fill="#fff3e0"/>
  <text x="450" y="444" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">~hours to days from crawl to index (if successful)</text>

  <!-- Bottom comparison -->
  <text x="450" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">SSR: Immediate, reliable indexing | CSR: Delayed, JS-dependent indexing with risk of failure</text>
</svg>