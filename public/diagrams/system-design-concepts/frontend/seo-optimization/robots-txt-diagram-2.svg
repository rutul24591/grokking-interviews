<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Directive Specificity: Allow vs Disallow Resolution</text>

  <!-- Rules box -->
  <rect x="30" y="55" width="840" height="80" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">robots.txt Rules</text>
  <text x="160" y="105" text-anchor="middle" font-size="13" fill="#1a1822">User-agent: *</text>
  <text x="420" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Disallow: /admin/</text>
  <text x="680" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Allow: /admin/public/</text>

  <!-- URL being tested -->
  <rect x="250" y="160" width="400" height="45" rx="8" fill="#6d5bd0"/>
  <text x="450" y="182" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">URL: /admin/public/page.html</text>
  <text x="450" y="198" text-anchor="middle" font-size="10" fill="#ffffff">Which rule wins?</text>

  <line x1="450" y1="205" x2="450" y2="235" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowR2)"/>

  <!-- Visual overlap diagram -->
  <rect x="100" y="240" width="700" height="190" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="265" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Path Matching Visualization</text>

  <!-- Full URL path -->
  <text x="120" y="295" font-size="12" fill="#1a1822" font-weight="600">URL Path:</text>
  <rect x="200" y="280" width="570" height="25" rx="4" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <!-- Path segments -->
  <text x="210" y="298" font-size="13" font-weight="600" fill="#1a1822">/</text>
  <text x="222" y="298" font-size="13" font-weight="600" fill="#1a1822">admin</text>
  <text x="270" y="298" font-size="13" font-weight="600" fill="#1a1822">/</text>
  <text x="282" y="298" font-size="13" font-weight="600" fill="#1a1822">public</text>
  <text x="338" y="298" font-size="13" font-weight="600" fill="#1a1822">/</text>
  <text x="350" y="298" font-size="13" font-weight="600" fill="#1a1822">page.html</text>

  <!-- Disallow match -->
  <text x="120" y="340" font-size="12" fill="#1a1822" font-weight="600">Disallow:</text>
  <rect x="200" y="325" width="80" height="25" rx="4" fill="#d7d1e6" stroke="#d7d1e6" stroke-width="2"/>
  <text x="210" y="343" font-size="13" font-weight="600" fill="#1a1822">/admin/</text>
  <text x="300" y="343" font-size="11" fill="#1a1822">matches 7 characters</text>

  <!-- Allow match -->
  <text x="120" y="380" font-size="12" fill="#1a1822" font-weight="600">Allow:</text>
  <rect x="200" y="365" width="145" height="25" rx="4" fill="#6d5bd0" opacity="0.3" stroke="#6d5bd0" stroke-width="2"/>
  <text x="210" y="383" font-size="13" font-weight="600" fill="#6d5bd0">/admin/public/</text>
  <text x="365" y="383" font-size="11" fill="#1a1822">matches 14 characters</text>

  <!-- Winner indicator -->
  <text x="120" y="420" font-size="12" fill="#1a1822" font-weight="600">Winner:</text>
  <rect x="200" y="405" width="300" height="25" rx="4" fill="#6d5bd0"/>
  <text x="350" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Allow wins (longer/more specific match)</text>

  <!-- Rule explanation -->
  <rect x="100" y="445" width="700" height="45" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="464" text-anchor="middle" font-size="12" fill="#1a1822">
    <tspan font-weight="700" fill="#6d5bd0">Rule:</tspan> When both Allow and Disallow match a URL, the directive with the
  </text>
  <text x="450" y="481" text-anchor="middle" font-size="12" fill="#1a1822">
    <tspan font-weight="700" fill="#6d5bd0">longer path pattern</tspan> takes precedence. Equal length = Allow wins (Google behavior).
  </text>

  <defs>
    <marker id="arrowR2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>