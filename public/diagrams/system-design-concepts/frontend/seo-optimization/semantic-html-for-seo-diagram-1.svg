<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Semantic Document Outline</text>

  <!-- Outer page -->
  <rect x="40" y="55" width="820" height="430" rx="8" fill="none" stroke="#d7d1e6" stroke-width="2"/>
  <text x="55" y="75" font-size="11" fill="#6d5bd0" font-weight="600">&amp;lt;body&amp;gt;</text>

  <!-- header / banner -->
  <rect x="60" y="85" width="780" height="50" rx="6" fill="#6d5bd0"/>
  <text x="450" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">&amp;lt;header&amp;gt; — role="banner"</text>

  <!-- nav -->
  <rect x="60" y="145" width="780" height="36" rx="6" fill="#8b7de0" opacity="0.85"/>
  <text x="450" y="169" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">&amp;lt;nav&amp;gt; — role="navigation"</text>

  <!-- main + aside row -->
  <rect x="60" y="191" width="540" height="250" rx="6" fill="none" stroke="#6d5bd0" stroke-width="2"/>
  <text x="75" y="210" font-size="12" fill="#6d5bd0" font-weight="600">&amp;lt;main&amp;gt; — role="main"</text>

  <!-- article inside main -->
  <rect x="80" y="220" width="500" height="145" rx="5" fill="#ece8f6"/>
  <text x="95" y="240" font-size="12" fill="#6d5bd0" font-weight="600">&amp;lt;article&amp;gt;</text>

  <!-- section inside article -->
  <rect x="100" y="250" width="220" height="100" rx="4" fill="#ddd6f0"/>
  <text x="115" y="270" font-size="11" fill="#1a1822" font-weight="600">&amp;lt;section&amp;gt;</text>
  <text x="115" y="290" font-size="10" fill="#1a1822">Grouped thematic content</text>
  <text x="115" y="306" font-size="10" fill="#1a1822">with its own heading</text>
  <text x="115" y="322" font-size="10" fill="#1a1822">Improves content structure</text>
  <text x="115" y="338" font-size="10" fill="#1a1822">for crawlers</text>

  <rect x="340" y="250" width="220" height="100" rx="4" fill="#ddd6f0"/>
  <text x="355" y="270" font-size="11" fill="#1a1822" font-weight="600">&amp;lt;section&amp;gt;</text>
  <text x="355" y="290" font-size="10" fill="#1a1822">Another thematic group</text>
  <text x="355" y="306" font-size="10" fill="#1a1822">Signals topical boundaries</text>
  <text x="355" y="322" font-size="10" fill="#1a1822">to search engines</text>

  <!-- Supplementary content label -->
  <text x="95" y="385" font-size="10" fill="#1a1822">Primary page content — highest SEO weight</text>

  <!-- aside / sidebar -->
  <rect x="620" y="191" width="220" height="250" rx="6" fill="#ece8f6" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="635" y="215" font-size="12" fill="#6d5bd0" font-weight="600">&amp;lt;aside&amp;gt;</text>
  <text x="635" y="235" font-size="11" fill="#1a1822">role="complementary"</text>
  <text x="635" y="260" font-size="10" fill="#1a1822">Related links</text>
  <text x="635" y="278" font-size="10" fill="#1a1822">Sidebar widgets</text>
  <text x="635" y="296" font-size="10" fill="#1a1822">Advertisements</text>
  <text x="635" y="324" font-size="10" fill="#6d5bd0" font-weight="600">Lower SEO weight</text>
  <text x="635" y="342" font-size="10" fill="#1a1822">Crawlers deprioritize</text>
  <text x="635" y="358" font-size="10" fill="#1a1822">complementary content</text>

  <!-- footer -->
  <rect x="60" y="451" width="780" height="24" rx="6" fill="#8b7de0" opacity="0.7"/>
  <text x="450" y="468" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">&amp;lt;footer&amp;gt; — role="contentinfo"</text>
</svg>