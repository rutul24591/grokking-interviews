<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Sitemap Index Architecture</text>

  <!-- Sitemap Index -->
  <rect x="310" y="55" width="280" height="65" rx="10" fill="#6d5bd0"/>
  <text x="450" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">sitemap-index.xml</text>
  <text x="450" y="102" text-anchor="middle" font-size="11" fill="#ffffff">Root index file referenced in robots.txt</text>

  <!-- Connector lines -->
  <line x1="450" y1="120" x2="450" y2="150" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="120" y1="150" x2="780" y2="150" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="120" y1="150" x2="120" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowXS1)"/>
  <line x1="340" y1="150" x2="340" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowXS1)"/>
  <line x1="560" y1="150" x2="560" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowXS1)"/>
  <line x1="780" y1="150" x2="780" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowXS1)"/>

  <!-- Products Sitemap -->
  <rect x="20" y="180" width="200" height="130" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="20" y="180" width="200" height="35" rx="8" fill="#6d5bd0"/>
  <text x="120" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">products-sitemap.xml</text>
  <text x="120" y="235" text-anchor="middle" font-size="24" font-weight="700" fill="#6d5bd0">50,000</text>
  <text x="120" y="255" text-anchor="middle" font-size="12" fill="#1a1822">URLs</text>
  <text x="120" y="278" text-anchor="middle" font-size="10" fill="#1a1822">changefreq: daily</text>
  <text x="120" y="295" text-anchor="middle" font-size="10" fill="#1a1822">priority: 0.8</text>

  <!-- Categories Sitemap -->
  <rect x="240" y="180" width="200" height="130" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="240" y="180" width="200" height="35" rx="8" fill="#6d5bd0"/>
  <text x="340" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">categories-sitemap.xml</text>
  <text x="340" y="235" text-anchor="middle" font-size="24" font-weight="700" fill="#6d5bd0">5,000</text>
  <text x="340" y="255" text-anchor="middle" font-size="12" fill="#1a1822">URLs</text>
  <text x="340" y="278" text-anchor="middle" font-size="10" fill="#1a1822">changefreq: weekly</text>
  <text x="340" y="295" text-anchor="middle" font-size="10" fill="#1a1822">priority: 0.7</text>

  <!-- Blog Sitemap -->
  <rect x="460" y="180" width="200" height="130" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="460" y="180" width="200" height="35" rx="8" fill="#6d5bd0"/>
  <text x="560" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">blog-sitemap.xml</text>
  <text x="560" y="235" text-anchor="middle" font-size="24" font-weight="700" fill="#6d5bd0">10,000</text>
  <text x="560" y="255" text-anchor="middle" font-size="12" fill="#1a1822">URLs</text>
  <text x="560" y="278" text-anchor="middle" font-size="10" fill="#1a1822">changefreq: daily</text>
  <text x="560" y="295" text-anchor="middle" font-size="10" fill="#1a1822">priority: 0.6</text>

  <!-- Pages Sitemap -->
  <rect x="680" y="180" width="200" height="130" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="680" y="180" width="200" height="35" rx="8" fill="#6d5bd0"/>
  <text x="780" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">pages-sitemap.xml</text>
  <text x="780" y="235" text-anchor="middle" font-size="24" font-weight="700" fill="#6d5bd0">500</text>
  <text x="780" y="255" text-anchor="middle" font-size="12" fill="#1a1822">URLs</text>
  <text x="780" y="278" text-anchor="middle" font-size="10" fill="#1a1822">changefreq: monthly</text>
  <text x="780" y="295" text-anchor="middle" font-size="10" fill="#1a1822">priority: 0.5</text>

  <!-- Constraints box -->
  <rect x="50" y="340" width="380" height="140" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="240" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Sitemap Limits</text>
  <line x1="60" y1="375" x2="420" y2="375" stroke="#d7d1e6" stroke-width="1"/>
  <text x="70" y="398" font-size="12" fill="#1a1822">Max 50,000 URLs per sitemap file</text>
  <text x="70" y="418" font-size="12" fill="#1a1822">Max 50 MB (uncompressed) per file</text>
  <text x="70" y="438" font-size="12" fill="#1a1822">Sitemap index: up to 50,000 sitemaps</text>
  <text x="70" y="458" font-size="12" fill="#1a1822">Total capacity: 2.5 billion URLs</text>
  <text x="70" y="478" font-size="12" fill="#1a1822">Supports gzip compression (.xml.gz)</text>

  <!-- URL entry example -->
  <rect x="470" y="340" width="400" height="140" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="670" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">URL Entry Structure</text>
  <line x1="480" y1="375" x2="860" y2="375" stroke="#d7d1e6" stroke-width="1"/>
  <text x="490" y="396" font-size="11" fill="#1a1822">&amp;lt;url&amp;gt;</text>
  <text x="510" y="414" font-size="11" fill="#6d5bd0">&amp;lt;loc&amp;gt;</text><text x="545" y="414" font-size="11" fill="#1a1822">https://example.com/page</text><text x="740" y="414" font-size="11" fill="#6d5bd0">&amp;lt;/loc&amp;gt;</text>
  <text x="510" y="432" font-size="11" fill="#6d5bd0">&amp;lt;lastmod&amp;gt;</text><text x="577" y="432" font-size="11" fill="#1a1822">2025-01-15</text><text x="650" y="432" font-size="11" fill="#6d5bd0">&amp;lt;/lastmod&amp;gt;</text>
  <text x="510" y="450" font-size="11" fill="#6d5bd0">&amp;lt;changefreq&amp;gt;</text><text x="597" y="450" font-size="11" fill="#1a1822">weekly</text><text x="642" y="450" font-size="11" fill="#6d5bd0">&amp;lt;/changefreq&amp;gt;</text>
  <text x="510" y="468" font-size="11" fill="#6d5bd0">&amp;lt;priority&amp;gt;</text><text x="578" y="468" font-size="11" fill="#1a1822">0.8</text><text x="598" y="468" font-size="11" fill="#6d5bd0">&amp;lt;/priority&amp;gt;</text>
  <text x="490" y="478" font-size="0" fill="#1a1822"></text>

  <defs>
    <marker id="arrowXS1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>