<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">URL Migration: Redirect Mapping &amp; Parallel Processes</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Old URLs (left) -->
  <text x="130" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Old URLs</text>

  <rect x="30" y="85" width="200" height="36" rx="5" fill="#d7d1e6"/>
  <text x="130" y="108" text-anchor="middle" font-size="10" fill="#1a1822">/blog/2024/my-post</text>

  <rect x="30" y="130" width="200" height="36" rx="5" fill="#d7d1e6"/>
  <text x="130" y="153" text-anchor="middle" font-size="10" fill="#1a1822">/products.php?id=123</text>

  <rect x="30" y="175" width="200" height="36" rx="5" fill="#d7d1e6"/>
  <text x="130" y="198" text-anchor="middle" font-size="10" fill="#1a1822">/category/old-name</text>

  <rect x="30" y="220" width="200" height="36" rx="5" fill="#d7d1e6"/>
  <text x="130" y="243" text-anchor="middle" font-size="10" fill="#1a1822">/page/about-us.html</text>

  <!-- 301 redirect mapping (center) -->
  <rect x="280" y="75" width="160" height="195" rx="8" fill="#6d5bd0"/>
  <text x="360" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">301 Redirect</text>
  <text x="360" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Mapping</text>

  <text x="360" y="148" text-anchor="middle" font-size="10" fill="#ffffff">Permanent redirect</text>
  <text x="360" y="165" text-anchor="middle" font-size="10" fill="#ffffff">Passes ~95% of</text>
  <text x="360" y="180" text-anchor="middle" font-size="10" fill="#ffffff">link equity (PageRank)</text>
  <text x="360" y="200" text-anchor="middle" font-size="10" fill="#ffffff">Configured in server</text>
  <text x="360" y="215" text-anchor="middle" font-size="10" fill="#ffffff">nginx / next.config.js</text>
  <text x="360" y="235" text-anchor="middle" font-size="10" fill="#ffffff">Map every old URL</text>
  <text x="360" y="252" text-anchor="middle" font-size="10" fill="#ffffff">to its new equivalent</text>

  <!-- Arrows old to center -->
  <line x1="230" y1="103" x2="280" y2="150" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="230" y1="148" x2="280" y2="160" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="230" y1="193" x2="280" y2="170" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="230" y1="238" x2="280" y2="180" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- New URLs (right) -->
  <text x="590" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">New URLs</text>

  <rect x="490" y="85" width="200" height="36" rx="5" fill="#6d5bd0"/>
  <text x="590" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">/blog/my-post</text>

  <rect x="490" y="130" width="200" height="36" rx="5" fill="#6d5bd0"/>
  <text x="590" y="153" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">/products/widget-name</text>

  <rect x="490" y="175" width="200" height="36" rx="5" fill="#6d5bd0"/>
  <text x="590" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">/category/new-name</text>

  <rect x="490" y="220" width="200" height="36" rx="5" fill="#6d5bd0"/>
  <text x="590" y="243" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">/about</text>

  <!-- Arrows center to new -->
  <line x1="440" y1="150" x2="490" y2="103" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="160" x2="490" y2="148" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="170" x2="490" y2="193" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="180" x2="490" y2="238" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Parallel processes -->
  <text x="450" y="310" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1822">Parallel Migration Processes</text>

  <!-- Process 1: Sitemap update -->
  <rect x="30" y="330" width="260" height="150" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="330" width="260" height="34" rx="8" fill="#6d5bd0"/>
  <text x="160" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1. Sitemap Update</text>
  <text x="45" y="382" font-size="10" fill="#1a1822">Remove old URLs from sitemap.xml</text>
  <text x="45" y="400" font-size="10" fill="#1a1822">Add all new URLs</text>
  <text x="45" y="418" font-size="10" fill="#1a1822">Update lastmod dates</text>
  <text x="45" y="436" font-size="10" fill="#1a1822">Submit to Search Console</text>
  <text x="45" y="462" font-size="10" font-weight="600" fill="#6d5bd0">Triggers re-crawl of new URLs</text>

  <!-- Process 2: Canonical update -->
  <rect x="320" y="330" width="260" height="150" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="320" y="330" width="260" height="34" rx="8" fill="#6d5bd0"/>
  <text x="450" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2. Canonical Update</text>
  <text x="335" y="382" font-size="10" fill="#1a1822">Set rel="canonical" on new pages</text>
  <text x="335" y="400" font-size="10" fill="#1a1822">Point to new URLs only</text>
  <text x="335" y="418" font-size="10" fill="#1a1822">Remove old canonical references</text>
  <text x="335" y="436" font-size="10" fill="#1a1822">Update hreflang if multilingual</text>
  <text x="335" y="462" font-size="10" font-weight="600" fill="#6d5bd0">Consolidates ranking signals</text>

  <!-- Process 3: Internal link rewrite -->
  <rect x="610" y="330" width="260" height="150" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="610" y="330" width="260" height="34" rx="8" fill="#6d5bd0"/>
  <text x="740" y="352" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3. Internal Link Rewrite</text>
  <text x="625" y="382" font-size="10" fill="#1a1822">Audit all internal &amp;lt;a href&amp;gt; links</text>
  <text x="625" y="400" font-size="10" fill="#1a1822">Update to point to new URLs</text>
  <text x="625" y="418" font-size="10" fill="#1a1822">Avoid redirect chains</text>
  <text x="625" y="436" font-size="10" fill="#1a1822">Update navigation menus</text>
  <text x="625" y="462" font-size="10" font-weight="600" fill="#6d5bd0">Preserves crawl efficiency</text>
</svg>