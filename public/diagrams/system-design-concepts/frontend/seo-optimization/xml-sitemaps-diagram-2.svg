<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Crawl Budget Optimization: Without vs With Sitemaps</text>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="490" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- LEFT: Without Sitemaps -->
  <text x="225" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1822">Without Sitemaps</text>

  <!-- Crawler -->
  <rect x="150" y="90" width="150" height="45" rx="8" fill="#6d5bd0"/>
  <text x="225" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Search Crawler</text>

  <!-- Random discovery arrows -->
  <line x1="225" y1="135" x2="225" y2="160" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrowXS2g)"/>
  <text x="225" y="175" text-anchor="middle" font-size="10" fill="#1a1822" font-style="italic">Discovers randomly via links</text>

  <!-- Pages grid - mixed priority -->
  <rect x="30" y="190" width="390" height="200" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="225" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Pages Crawled (Budget: 100 pages/day)</text>

  <!-- High value pages (few found) -->
  <rect x="50" y="225" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="87" y="245" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Product A</text>

  <rect x="135" y="225" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="172" y="245" text-anchor="middle" font-size="9" fill="#1a1822">/tag/old</text>

  <rect x="220" y="225" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="257" y="245" text-anchor="middle" font-size="9" fill="#1a1822">/filter?p=3</text>

  <rect x="305" y="225" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="342" y="245" text-anchor="middle" font-size="9" fill="#1a1822">/search?q=x</text>

  <rect x="50" y="267" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="87" y="287" text-anchor="middle" font-size="9" fill="#1a1822">/page?ref=1</text>

  <rect x="135" y="267" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="172" y="287" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Category B</text>

  <rect x="220" y="267" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="257" y="287" text-anchor="middle" font-size="9" fill="#1a1822">/print/page</text>

  <rect x="305" y="267" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="342" y="287" text-anchor="middle" font-size="9" fill="#1a1822">/sort=price</text>

  <rect x="50" y="309" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="87" y="329" text-anchor="middle" font-size="9" fill="#1a1822">/login</text>

  <rect x="135" y="309" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="172" y="329" text-anchor="middle" font-size="9" fill="#1a1822">/cart</text>

  <rect x="220" y="309" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="257" y="329" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Blog Post</text>

  <rect x="305" y="309" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="342" y="329" text-anchor="middle" font-size="9" fill="#1a1822">/archive/old</text>

  <rect x="50" y="351" width="75" height="32" rx="4" fill="#d7d1e6"/>
  <text x="87" y="371" text-anchor="middle" font-size="9" fill="#1a1822">/filter?c=5</text>

  <!-- Result -->
  <rect x="80" y="405" width="290" height="75" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="225" y="430" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">Result: 75% budget wasted</text>
  <text x="225" y="450" text-anchor="middle" font-size="11" fill="#1a1822">Only 3/12 important pages found</text>
  <text x="225" y="468" text-anchor="middle" font-size="11" fill="#1a1822">Most budget on low-value URLs</text>

  <!-- RIGHT: With Sitemaps -->
  <text x="675" y="70" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">With Sitemaps</text>

  <!-- Crawler -->
  <rect x="600" y="90" width="150" height="45" rx="8" fill="#6d5bd0"/>
  <text x="675" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Search Crawler</text>

  <!-- Guided arrows -->
  <line x1="675" y1="135" x2="675" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowXS2)"/>
  <text x="675" y="175" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">Guided by sitemap + lastmod</text>

  <!-- Pages grid - prioritized -->
  <rect x="480" y="190" width="390" height="200" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="675" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Pages Crawled (Budget: 100 pages/day)</text>

  <!-- All high value pages found -->
  <rect x="500" y="225" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="537" y="245" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Product A</text>

  <rect x="585" y="225" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="622" y="245" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Product B</text>

  <rect x="670" y="225" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="707" y="245" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Product C</text>

  <rect x="755" y="225" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="792" y="245" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Product D</text>

  <rect x="500" y="267" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="537" y="287" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Category A</text>

  <rect x="585" y="267" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="622" y="287" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Category B</text>

  <rect x="670" y="267" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="707" y="287" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Category C</text>

  <rect x="755" y="267" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="792" y="287" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Blog Post 1</text>

  <rect x="500" y="309" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="537" y="329" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Blog Post 2</text>

  <rect x="585" y="309" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="622" y="329" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Blog Post 3</text>

  <rect x="670" y="309" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="707" y="329" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Landing A</text>

  <rect x="755" y="309" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="792" y="329" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Landing B</text>

  <rect x="500" y="351" width="75" height="32" rx="4" fill="#6d5bd0"/>
  <text x="537" y="371" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">Home</text>

  <!-- Result -->
  <rect x="530" y="405" width="290" height="75" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="675" y="430" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Result: 100% budget optimized</text>
  <text x="675" y="450" text-anchor="middle" font-size="11" fill="#1a1822">All 13 important pages crawled</text>
  <text x="675" y="468" text-anchor="middle" font-size="11" fill="#1a1822">lastmod skips unchanged pages</text>

  <!-- Legend -->
  <rect x="50" y="486" width="14" height="10" rx="2" fill="#6d5bd0"/>
  <text x="70" y="495" font-size="10" fill="#1a1822">High-value page</text>
  <rect x="180" y="486" width="14" height="10" rx="2" fill="#d7d1e6"/>
  <text x="200" y="495" font-size="10" fill="#1a1822">Low-value / duplicate page</text>

  <defs>
    <marker id="arrowXS2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowXS2g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d7d1e6"/>
    </marker>
  </defs>
</svg>