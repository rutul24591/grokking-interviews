<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">URL Hierarchy Mapping to Site Taxonomy</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowDown" markerWidth="7" markerHeight="10" refX="3.5" refY="10" orient="auto">
      <polygon points="0 0, 3.5 10, 7 0" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Site Taxonomy (left side) -->
  <text x="220" y="65" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1822">Site Taxonomy</text>

  <!-- Root -->
  <rect x="155" y="80" width="130" height="40" rx="6" fill="#6d5bd0"/>
  <text x="220" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Home</text>

  <line x1="170" y1="120" x2="120" y2="145" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="220" y1="120" x2="220" y2="145" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="270" y1="120" x2="320" y2="145" stroke="#6d5bd0" stroke-width="2"/>

  <!-- Level 1 categories -->
  <rect x="50" y="145" width="130" height="40" rx="6" fill="#7b6ad5"/>
  <text x="115" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Electronics</text>

  <rect x="200" y="145" width="130" height="40" rx="6" fill="#a89fd0"/>
  <text x="265" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Clothing</text>

  <rect x="350" y="145" width="130" height="40" rx="6" fill="#a89fd0"/>
  <text x="415" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Books</text>

  <!-- Level 2 under Electronics -->
  <line x1="85" y1="185" x2="60" y2="210" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="115" y1="185" x2="115" y2="210" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="145" y1="185" x2="180" y2="210" stroke="#6d5bd0" stroke-width="2"/>

  <rect x="15" y="210" width="95" height="36" rx="5" fill="#8b7de0"/>
  <text x="62" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Phones</text>

  <rect x="120" y="210" width="95" height="36" rx="5" fill="#a89fd0"/>
  <text x="167" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Laptops</text>

  <!-- Level 3 under Phones -->
  <line x1="40" y1="246" x2="25" y2="270" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="75" y1="246" x2="100" y2="270" stroke="#6d5bd0" stroke-width="1.5"/>

  <rect x="0" y="270" width="65" height="32" rx="4" fill="#d7d1e6"/>
  <text x="32" y="291" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">iPhone</text>

  <rect x="75" y="270" width="65" height="32" rx="4" fill="#d7d1e6"/>
  <text x="107" y="291" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Samsung</text>

  <!-- Large arrow pointing right -->
  <text x="450" y="195" text-anchor="middle" font-size="16" font-weight="700" fill="#6d5bd0">maps to</text>
  <line x1="410" y1="205" x2="490" y2="205" stroke="#6d5bd0" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- URL Paths (right side) -->
  <text x="680" y="65" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1822">URL Paths</text>

  <rect x="530" y="80" width="300" height="36" rx="6" fill="#6d5bd0"/>
  <text x="680" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">/</text>

  <rect x="530" y="126" width="300" height="36" rx="6" fill="#7b6ad5"/>
  <text x="680" y="149" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">/electronics</text>

  <rect x="530" y="172" width="300" height="36" rx="6" fill="#8b7de0"/>
  <text x="680" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">/electronics/phones</text>

  <rect x="530" y="218" width="300" height="36" rx="6" fill="#a89fd0"/>
  <text x="680" y="241" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">/electronics/phones/iphone</text>

  <!-- Breadcrumbs generated from URL -->
  <text x="450" y="335" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1822">Breadcrumbs Generated from URL Structure</text>

  <rect x="60" y="355" width="780" height="55" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>

  <rect x="80" y="365" width="70" height="34" rx="5" fill="#6d5bd0"/>
  <text x="115" y="387" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Home</text>

  <text x="168" y="387" font-size="16" fill="#6d5bd0">&amp;gt;</text>

  <rect x="185" y="365" width="110" height="34" rx="5" fill="#7b6ad5"/>
  <text x="240" y="387" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Electronics</text>

  <text x="313" y="387" font-size="16" fill="#6d5bd0">&amp;gt;</text>

  <rect x="330" y="365" width="90" height="34" rx="5" fill="#8b7de0"/>
  <text x="375" y="387" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Phones</text>

  <text x="438" y="387" font-size="16" fill="#6d5bd0">&amp;gt;</text>

  <rect x="455" y="365" width="90" height="34" rx="5" fill="#a89fd0"/>
  <text x="500" y="387" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">iPhone</text>

  <text x="570" y="387" font-size="11" fill="#1a1822">Current page</text>

  <!-- Rich result note -->
  <rect x="60" y="425" width="780" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="448" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Google Rich Results: Breadcrumb Schema (BreadcrumbList)</text>
  <text x="450" y="470" text-anchor="middle" font-size="11" fill="#1a1822">Clean URL hierarchy enables automatic breadcrumb structured data, displayed in search results as navigational path</text>
</svg>