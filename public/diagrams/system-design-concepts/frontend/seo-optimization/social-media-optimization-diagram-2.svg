<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Dynamic OG Image Generation Pipeline</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- og:image URL reference -->
  <rect x="40" y="60" width="820" height="50" rx="8" fill="#1a1822"/>
  <text x="450" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">&amp;lt;meta property="og:image" content="https://example.com/api/og?title=My+Post&amp;amp;author=Jane" /&amp;gt;</text>
  <text x="450" y="100" text-anchor="middle" font-size="9" fill="#a89fd0">og:image URL points to the dynamic generation endpoint</text>

  <!-- Arrow down -->
  <line x1="450" y1="110" x2="450" y2="140" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pipeline steps -->
  <!-- Step 1: Page Data -->
  <rect x="40" y="145" width="145" height="110" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="145" width="145" height="32" rx="8" fill="#6d5bd0"/>
  <text x="112" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1. Page Data</text>
  <text x="55" y="198" font-size="10" fill="#1a1822">title: "My Post"</text>
  <text x="55" y="214" font-size="10" fill="#1a1822">author: "Jane"</text>
  <text x="55" y="230" font-size="10" fill="#1a1822">date: "2024-01"</text>
  <text x="55" y="246" font-size="10" fill="#6d5bd0" font-weight="600">Query params</text>

  <!-- Arrow -->
  <line x1="185" y1="200" x2="215" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Edge Function -->
  <rect x="215" y="145" width="145" height="110" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="215" y="145" width="145" height="32" rx="8" fill="#6d5bd0"/>
  <text x="287" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">2. Edge Function</text>
  <text x="230" y="198" font-size="10" fill="#1a1822">Vercel Edge /</text>
  <text x="230" y="214" font-size="10" fill="#1a1822">Cloudflare Worker</text>
  <text x="230" y="234" font-size="10" fill="#1a1822">Parses params</text>
  <text x="230" y="250" font-size="10" fill="#6d5bd0" font-weight="600">Low latency, global</text>

  <!-- Arrow -->
  <line x1="360" y1="200" x2="390" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Satori -->
  <rect x="390" y="145" width="145" height="110" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="390" y="145" width="145" height="32" rx="8" fill="#6d5bd0"/>
  <text x="462" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3. Satori Render</text>
  <text x="405" y="198" font-size="10" fill="#1a1822">React JSX to SVG</text>
  <text x="405" y="214" font-size="10" fill="#1a1822">Flexbox layout</text>
  <text x="405" y="230" font-size="10" fill="#1a1822">Custom fonts loaded</text>
  <text x="405" y="246" font-size="10" fill="#6d5bd0" font-weight="600">@vercel/og</text>

  <!-- Arrow -->
  <line x1="535" y1="200" x2="565" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Convert -->
  <rect x="565" y="145" width="145" height="110" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="565" y="145" width="145" height="32" rx="8" fill="#6d5bd0"/>
  <text x="637" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">4. SVG to PNG</text>
  <text x="580" y="198" font-size="10" fill="#1a1822">Resvg (Rust WASM)</text>
  <text x="580" y="214" font-size="10" fill="#1a1822">1200x630 pixels</text>
  <text x="580" y="230" font-size="10" fill="#1a1822">PNG output</text>
  <text x="580" y="246" font-size="10" fill="#6d5bd0" font-weight="600">Fast rasterization</text>

  <!-- Arrow -->
  <line x1="710" y1="200" x2="740" y2="200" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Return -->
  <rect x="740" y="145" width="130" height="110" rx="8" fill="#6d5bd0"/>
  <text x="805" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">5. Response</text>
  <text x="805" y="198" text-anchor="middle" font-size="10" fill="#ffffff">Content-Type:</text>
  <text x="805" y="214" text-anchor="middle" font-size="10" fill="#ffffff">image/png</text>
  <text x="805" y="236" text-anchor="middle" font-size="10" fill="#ffffff">Cache-Control:</text>
  <text x="805" y="250" text-anchor="middle" font-size="10" fill="#ffffff">s-maxage=86400</text>

  <!-- Example output image mockup -->
  <text x="450" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Generated OG Image (1200x630)</text>

  <rect x="175" y="315" width="550" height="170" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>

  <!-- Simulated OG image content -->
  <rect x="185" y="325" width="530" height="150" rx="6" fill="#6d5bd0"/>
  <rect x="195" y="335" width="50" height="50" rx="25" fill="#8b7de0"/>
  <text x="220" y="365" text-anchor="middle" font-size="16" fill="#ffffff">J</text>
  <text x="260" y="365" font-size="22" font-weight="800" fill="#ffffff">My Post Title</text>
  <text x="260" y="390" font-size="13" fill="#d7d1e6">by Jane | January 2024</text>
  <text x="195" y="430" font-size="11" fill="#d7d1e6">example.com</text>
  <rect x="195" y="445" width="510" height="30" rx="4" fill="#8b7de0" opacity="0.5"/>
  <text x="450" y="465" text-anchor="middle" font-size="10" fill="#ffffff">A brief description of the post content goes here...</text>
</svg>