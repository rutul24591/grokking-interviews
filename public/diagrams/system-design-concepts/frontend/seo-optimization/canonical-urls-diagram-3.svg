<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Cross-Domain Canonical: Content Syndication</text>

  <!-- Original Publisher (Site A) -->
  <rect x="300" y="60" width="300" height="90" rx="10" fill="#6d5bd0"/>
  <text x="450" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Site A (Original Publisher)</text>
  <text x="450" y="112" text-anchor="middle" font-size="12" fill="#ffffff">https://original.com/article</text>
  <text x="450" y="132" text-anchor="middle" font-size="11" fill="#ffffff">Owns the canonical version</text>

  <!-- Syndication arrows down -->
  <text x="450" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Content Syndicated To</text>

  <line x1="350" y1="150" x2="150" y2="220" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrowC3g)"/>
  <line x1="450" y1="150" x2="450" y2="220" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrowC3g)"/>
  <line x1="550" y1="150" x2="750" y2="220" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrowC3g)"/>

  <!-- Site B -->
  <rect x="30" y="225" width="240" height="100" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="150" y="252" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Site B (Syndication Partner)</text>
  <text x="150" y="272" text-anchor="middle" font-size="10" fill="#1a1822">https://medium.com/article</text>
  <rect x="50" y="285" width="200" height="28" rx="4" fill="#f3f1f8"/>
  <text x="150" y="304" text-anchor="middle" font-size="9" fill="#6d5bd0">&amp;lt;link rel="canonical" href="https://original.com/article"&amp;gt;</text>

  <!-- Site C -->
  <rect x="330" y="225" width="240" height="100" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="252" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Site C (News Aggregator)</text>
  <text x="450" y="272" text-anchor="middle" font-size="10" fill="#1a1822">https://news-agg.com/article</text>
  <rect x="350" y="285" width="200" height="28" rx="4" fill="#f3f1f8"/>
  <text x="450" y="304" text-anchor="middle" font-size="9" fill="#6d5bd0">&amp;lt;link rel="canonical" href="https://original.com/article"&amp;gt;</text>

  <!-- Site D -->
  <rect x="630" y="225" width="240" height="100" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="750" y="252" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1822">Site D (Industry Blog)</text>
  <text x="750" y="272" text-anchor="middle" font-size="10" fill="#1a1822">https://blog.example/article</text>
  <rect x="650" y="285" width="200" height="28" rx="4" fill="#f3f1f8"/>
  <text x="750" y="304" text-anchor="middle" font-size="9" fill="#6d5bd0">&amp;lt;link rel="canonical" href="https://original.com/article"&amp;gt;</text>

  <!-- Canonical arrows back to Site A -->
  <line x1="150" y1="225" x2="370" y2="150" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowC3)"/>
  <line x1="450" y1="225" x2="450" y2="150" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowC3)"/>
  <line x1="750" y1="225" x2="530" y2="150" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowC3)"/>

  <!-- Labels on arrows -->
  <text x="220" y="195" font-size="9" fill="#6d5bd0" font-weight="600" transform="rotate(-20,220,195)">rel=canonical</text>
  <text x="460" y="195" font-size="9" fill="#6d5bd0" font-weight="600">rel=canonical</text>
  <text x="640" y="195" font-size="9" fill="#6d5bd0" font-weight="600" transform="rotate(20,640,195)">rel=canonical</text>

  <!-- Search Engine sees -->
  <rect x="150" y="365" width="600" height="120" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="150" y="365" width="600" height="35" rx="10" fill="#6d5bd0"/>
  <text x="450" y="388" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Search Engine Understands</text>

  <text x="200" y="420" font-size="12" fill="#1a1822">All ranking signals from Sites B, C, D are consolidated to Site A</text>
  <text x="200" y="440" font-size="12" fill="#1a1822">Only Site A appears in search results (avoids duplicate listings)</text>
  <text x="200" y="460" font-size="12" fill="#1a1822">Link equity from syndicated copies flows to original publisher</text>
  <text x="200" y="480" font-size="12" fill="#1a1822">Site A gets full SEO benefit of wider content distribution</text>

  <defs>
    <marker id="arrowC3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowC3g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d7d1e6"/>
    </marker>
  </defs>
</svg>