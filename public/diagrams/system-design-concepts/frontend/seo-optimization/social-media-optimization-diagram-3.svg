<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Social Platform Cache Flow: URL Share to Preview</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
  </defs>

  <!-- Step 1: URL Shared -->
  <rect x="360" y="55" width="180" height="50" rx="8" fill="#6d5bd0"/>
  <text x="450" y="77" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">URL Shared</text>
  <text x="450" y="95" text-anchor="middle" font-size="10" fill="#ffffff">User pastes link in post</text>

  <line x1="450" y1="105" x2="450" y2="135" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Platform checks cache -->
  <rect x="335" y="135" width="230" height="50" rx="8" fill="#8b7de0"/>
  <text x="450" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Platform Checks Cache</text>
  <text x="450" y="175" text-anchor="middle" font-size="10" fill="#ffffff">Redis / CDN edge cache lookup</text>

  <line x1="450" y1="185" x2="450" y2="218" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Decision: Cache hit? -->
  <rect x="370" y="218" width="160" height="50" rx="8" fill="#6d5bd0"/>
  <text x="450" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Cache Hit?</text>
  <text x="450" y="258" text-anchor="middle" font-size="10" fill="#ffffff">URL in cache store?</text>

  <!-- YES path (left) -->
  <line x1="370" y1="243" x2="200" y2="243" stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="285" y="235" font-size="12" font-weight="700" fill="#2e7d32">YES</text>

  <rect x="60" y="218" width="140" height="50" rx="8" fill="#2e7d32"/>
  <text x="130" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Return Cached</text>
  <text x="130" y="258" text-anchor="middle" font-size="10" fill="#ffffff">Preview Card</text>

  <line x1="130" y1="268" x2="130" y2="430" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- NO path (right) — fetch chain -->
  <line x1="530" y1="243" x2="610" y2="243" stroke="#e65100" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="570" y="235" font-size="12" font-weight="700" fill="#e65100">NO</text>

  <!-- Fetch page -->
  <rect x="610" y="218" width="140" height="50" rx="8" fill="#e65100"/>
  <text x="680" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Fetch Page</text>
  <text x="680" y="258" text-anchor="middle" font-size="10" fill="#ffffff">HTTP GET to URL</text>

  <line x1="680" y1="268" x2="680" y2="295" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Parse OG tags -->
  <rect x="610" y="295" width="140" height="50" rx="8" fill="#e65100"/>
  <text x="680" y="317" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Parse OG Tags</text>
  <text x="680" y="335" text-anchor="middle" font-size="10" fill="#ffffff">Extract meta tags</text>

  <line x1="680" y1="345" x2="680" y2="372" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Download image -->
  <rect x="610" y="372" width="140" height="50" rx="8" fill="#e65100"/>
  <text x="680" y="394" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Download Image</text>
  <text x="680" y="412" text-anchor="middle" font-size="10" fill="#ffffff">Fetch og:image URL</text>

  <line x1="610" y1="397" x2="520" y2="397" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Generate card -->
  <rect x="370" y="372" width="150" height="50" rx="8" fill="#6d5bd0"/>
  <text x="445" y="394" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Generate Card</text>
  <text x="445" y="412" text-anchor="middle" font-size="10" fill="#ffffff">Build preview layout</text>

  <line x1="370" y1="397" x2="310" y2="397" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Cache it -->
  <rect x="230" y="372" width="80" height="50" rx="8" fill="#8b7de0"/>
  <text x="270" y="393" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Cache</text>
  <text x="270" y="411" text-anchor="middle" font-size="10" fill="#ffffff">~30 days</text>

  <line x1="270" y1="422" x2="270" y2="430" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="130" y1="430" x2="800" y2="430" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4"/>

  <!-- Return preview -->
  <rect x="250" y="440" width="400" height="50" rx="8" fill="#6d5bd0"/>
  <text x="450" y="462" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Return Social Preview Card</text>
  <text x="450" y="480" text-anchor="middle" font-size="10" fill="#ffffff">Image + Title + Description displayed in feed / chat</text>

  <!-- Cache duration notes -->
  <rect x="770" y="295" width="110" height="130" rx="6" fill="#ece8f6" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="825" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#6d5bd0">Cache TTL</text>
  <text x="825" y="335" text-anchor="middle" font-size="9" fill="#1a1822">Facebook: ~30d</text>
  <text x="825" y="350" text-anchor="middle" font-size="9" fill="#1a1822">Twitter: ~7d</text>
  <text x="825" y="365" text-anchor="middle" font-size="9" fill="#1a1822">LinkedIn: ~7d</text>
  <text x="825" y="385" text-anchor="middle" font-size="9" fill="#6d5bd0" font-weight="600">To refresh:</text>
  <text x="825" y="400" text-anchor="middle" font-size="9" fill="#1a1822">FB Debugger</text>
  <text x="825" y="415" text-anchor="middle" font-size="9" fill="#1a1822">Twitter Validator</text>
</svg>