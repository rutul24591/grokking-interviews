<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#1e293b" font-size="18" font-weight="bold">Queue Strategies Comparison</text>
  
  <!-- FIFO Queue -->
  <rect x="20" y="60" width="180" height="100" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="85" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">FIFO Queue</text>
  <rect x="40" y="95" width="140" height="8" fill="#3b82f6" rx="2"/>
  <rect x="40" y="107" width="140" height="8" fill="#3b82f6" rx="2"/>
  <rect x="40" y="119" width="140" height="8" fill="#3b82f6" rx="2"/>
  <text x="110" y="145" text-anchor="middle" fill="#64748b" font-size="11">First In, First Out</text>
  <text x="110" y="160" text-anchor="middle" fill="#64748b" font-size="11">Simple, fair ordering</text>
  
  <!-- Priority Queue -->
  <rect x="220" y="60" width="180" height="100" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="85" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Priority Queue</text>
  <rect x="240" y="95" width="140" height="8" fill="#ef4444" rx="2"/>
  <text x="310" y="108" text-anchor="middle" fill="#ffffff" font-size="9">Critical</text>
  <rect x="240" y="107" width="140" height="8" fill="#f59e0b" rx="2"/>
  <text x="310" y="120" text-anchor="middle" fill="#ffffff" font-size="9">High</text>
  <rect x="240" y="119" width="140" height="8" fill="#3b82f6" rx="2"/>
  <text x="310" y="132" text-anchor="middle" fill="#ffffff" font-size="9">Normal</text>
  <text x="310" y="155" text-anchor="middle" fill="#64748b" font-size="11">Priority-based ordering</text>
  
  <!-- Rate-Limited Queue -->
  <rect x="420" y="60" width="180" height="100" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="510" y="85" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Rate-Limited</text>
  <circle cx="460" cy="115" r="15" fill="#22c55e" opacity="0.3"/>
  <circle cx="490" cy="115" r="15" fill="#22c55e" opacity="0.5"/>
  <circle cx="520" cy="115" r="15" fill="#22c55e" opacity="0.7"/>
  <circle cx="550" cy="115" r="15" fill="#ef4444" opacity="0.3"/>
  <text x="510" y="145" text-anchor="middle" fill="#64748b" font-size="11">Token bucket / Throttle</text>
  
  <!-- Offline Queue -->
  <rect x="620" y="60" width="160" height="100" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="700" y="85" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Offline Queue</text>
  <rect x="640" y="95" width="120" height="30" fill="#3b82f6" rx="4" opacity="0.2"/>
  <text x="700" y="115" text-anchor="middle" fill="#1e293b" font-size="10">IndexedDB</text>
  <text x="700" y="145" text-anchor="middle" fill="#64748b" font-size="11">Persist &amp; replay</text>
  
  <!-- Comparison Table -->
  <rect x="20" y="180" width="760" height="280" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Table Header -->
  <rect x="20" y="180" width="760" height="40" fill="#ffffff" rx="6"/>
  <text x="110" y="205" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Strategy</text>
  <text x="260" y="205" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Use Case</text>
  <text x="430" y="205" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Pros</text>
  <text x="650" y="205" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Cons</text>
  
  <!-- Row 1: FIFO -->
  <line x1="20" y1="220" x2="780" y2="220" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="240" text-anchor="middle" fill="#1e293b" font-size="11">FIFO</text>
  <text x="260" y="240" text-anchor="middle" fill="#64748b" font-size="10">Simple requests</text>
  <text x="430" y="240" text-anchor="middle" fill="#64748b" font-size="10">Fair, simple</text>
  <text x="650" y="240" text-anchor="middle" fill="#64748b" font-size="10">No priority</text>
  
  <!-- Row 2: Priority -->
  <line x1="20" y1="255" x2="780" y2="255" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="275" text-anchor="middle" fill="#1e293b" font-size="11">Priority</text>
  <text x="260" y="275" text-anchor="middle" fill="#64748b" font-size="10">Critical actions</text>
  <text x="430" y="275" text-anchor="middle" fill="#64748b" font-size="10">Handles urgency</text>
  <text x="650" y="275" text-anchor="middle" fill="#64748b" font-size="10">Complex logic</text>
  
  <!-- Row 3: Rate-Limited -->
  <line x1="20" y1="290" x2="780" y2="290" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="310" text-anchor="middle" fill="#1e293b" font-size="11">Rate-Limited</text>
  <text x="260" y="310" text-anchor="middle" fill="#64748b" font-size="10">API limits</text>
  <text x="430" y="310" text-anchor="middle" fill="#64748b" font-size="10">Prevents abuse</text>
  <text x="650" y="310" text-anchor="middle" fill="#64748b" font-size="10">Slower throughput</text>
  
  <!-- Row 4: Offline -->
  <line x1="20" y1="325" x2="780" y2="325" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="345" text-anchor="middle" fill="#1e293b" font-size="11">Offline</text>
  <text x="260" y="345" text-anchor="middle" fill="#64748b" font-size="10">Unreliable network</text>
  <text x="430" y="345" text-anchor="middle" fill="#64748b" font-size="10">Works offline</text>
  <text x="650" y="345" text-anchor="middle" fill="#64748b" font-size="10">Storage limits</text>
  
  <!-- Row 5: Combined -->
  <line x1="20" y1="360" x2="780" y2="360" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="380" text-anchor="middle" fill="#1e293b" font-size="11">Combined</text>
  <text x="260" y="380" text-anchor="middle" fill="#64748b" font-size="10">Production apps</text>
  <text x="430" y="380" text-anchor="middle" fill="#64748b" font-size="10">Best of all</text>
  <text x="650" y="380" text-anchor="middle" fill="#64748b" font-size="10">Most complex</text>
  
  <line x1="20" y1="395" x2="780" y2="395" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Legend -->
  <text x="400" y="435" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Implementation Complexity</text>
  <rect x="200" y="445" width="80" height="16" fill="#22c55e" rx="3"/>
  <text x="240" y="457" text-anchor="middle" fill="#ffffff" font-size="10">Low</text>
  <rect x="300" y="445" width="80" height="16" fill="#f59e0b" rx="3"/>
  <text x="340" y="457" text-anchor="middle" fill="#ffffff" font-size="10">Medium</text>
  <rect x="400" y="445" width="80" height="16" fill="#ef4444" rx="3"/>
  <text x="440" y="457" text-anchor="middle" fill="#ffffff" font-size="10">High</text>
  
  <!-- Arrow indicators -->
  <text x="550" y="457" text-anchor="middle" fill="#64748b" font-size="10">← Simpler</text>
  <text x="650" y="457" text-anchor="middle" fill="#64748b" font-size="10">More Complex →</text>
</svg>