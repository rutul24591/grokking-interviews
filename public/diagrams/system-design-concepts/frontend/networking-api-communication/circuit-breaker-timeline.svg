<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="350" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Circuit Breaker Behavior Timeline</text>

  <!-- Timeline axis -->
  <line x1="50" y1="270" x2="770" y2="270" stroke="#94a3b8" stroke-width="2"/>
  <text x="410" y="340" text-anchor="middle" font-size="12" fill="#64748b">Time</text>

  <!-- Phase backgrounds -->
  <!-- Normal operation -->
  <rect x="50" y="50" width="140" height="220" rx="0" fill="#f0fdf4" opacity="0.5"/>
  <!-- Failures accumulate -->
  <rect x="190" y="50" width="120" height="220" rx="0" fill="#fffbeb" opacity="0.5"/>
  <!-- Circuit OPEN -->
  <rect x="310" y="50" width="180" height="220" rx="0" fill="#fef2f2" opacity="0.5"/>
  <!-- Half-Open probe -->
  <rect x="490" y="50" width="100" height="220" rx="0" fill="#fffbeb" opacity="0.5"/>
  <!-- Recovery -->
  <rect x="590" y="50" width="180" height="220" rx="0" fill="#f0fdf4" opacity="0.5"/>

  <!-- Phase labels -->
  <text x="120" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981">Normal</text>
  <text x="250" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#F59E0B">Degrading</text>
  <text x="400" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444">Circuit OPEN</text>
  <text x="540" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#F59E0B">Half-Open</text>
  <text x="680" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981">Recovered</text>

  <!-- Success dots (normal operation) -->
  <circle cx="70" cy="130" r="5" fill="#10B981"/>
  <circle cx="90" cy="130" r="5" fill="#10B981"/>
  <circle cx="110" cy="130" r="5" fill="#10B981"/>
  <circle cx="130" cy="130" r="5" fill="#10B981"/>
  <circle cx="150" cy="130" r="5" fill="#10B981"/>
  <circle cx="170" cy="130" r="5" fill="#10B981"/>

  <!-- Mixed results (degrading) -->
  <circle cx="200" cy="130" r="5" fill="#10B981"/>
  <circle cx="220" cy="180" r="5" fill="#EF4444"/>
  <circle cx="240" cy="130" r="5" fill="#10B981"/>
  <circle cx="260" cy="180" r="5" fill="#EF4444"/>
  <circle cx="280" cy="180" r="5" fill="#EF4444"/>
  <circle cx="295" cy="180" r="5" fill="#EF4444"/>

  <!-- Trip indicator -->
  <line x1="310" y1="80" x2="310" y2="265" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="310" y="300" text-anchor="middle" font-size="9" font-weight="600" fill="#EF4444">TRIP!</text>

  <!-- Fail-fast responses (circuit open) -->
  <g opacity="0.7">
    <rect x="330" y="192" width="30" height="20" rx="3" fill="#EF4444" opacity="0.3"/>
    <text x="345" y="206" text-anchor="middle" font-size="8" fill="#EF4444">fallback</text>

    <rect x="370" y="192" width="30" height="20" rx="3" fill="#EF4444" opacity="0.3"/>
    <text x="385" y="206" text-anchor="middle" font-size="8" fill="#EF4444">fallback</text>

    <rect x="410" y="192" width="30" height="20" rx="3" fill="#EF4444" opacity="0.3"/>
    <text x="425" y="206" text-anchor="middle" font-size="8" fill="#EF4444">fallback</text>

    <rect x="450" y="192" width="30" height="20" rx="3" fill="#EF4444" opacity="0.3"/>
    <text x="465" y="206" text-anchor="middle" font-size="8" fill="#EF4444">fallback</text>
  </g>

  <!-- No network calls label -->
  <text x="400" y="165" text-anchor="middle" font-size="10" fill="#991b1b" font-style="italic">No network calls made</text>
  <text x="400" y="180" text-anchor="middle" font-size="10" fill="#991b1b" font-style="italic">Cached data returned instantly</text>

  <!-- Timeout indicator -->
  <line x1="490" y1="80" x2="490" y2="265" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="490" y="300" text-anchor="middle" font-size="9" font-weight="600" fill="#F59E0B">Timeout</text>

  <!-- Half-open probe -->
  <circle cx="540" cy="130" r="8" fill="#F59E0B" stroke="#d97706" stroke-width="1"/>
  <text x="540" y="134" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="bold">?</text>
  <text x="540" y="158" text-anchor="middle" font-size="9" fill="#92400e">Probe</text>

  <!-- Probe success arrow -->
  <line x1="555" y1="130" x2="585" y2="130" stroke="#10B981" stroke-width="2"/>
  <circle cx="575" cy="120" r="4" fill="#10B981"/>

  <!-- Recovery indicator -->
  <line x1="590" y1="80" x2="590" y2="265" stroke="#10B981" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="590" y="300" text-anchor="middle" font-size="9" font-weight="600" fill="#10B981">Close</text>

  <!-- Success dots (recovered) -->
  <circle cx="610" cy="130" r="5" fill="#10B981"/>
  <circle cx="630" cy="130" r="5" fill="#10B981"/>
  <circle cx="650" cy="130" r="5" fill="#10B981"/>
  <circle cx="670" cy="130" r="5" fill="#10B981"/>
  <circle cx="690" cy="130" r="5" fill="#10B981"/>
  <circle cx="710" cy="130" r="5" fill="#10B981"/>
  <circle cx="730" cy="130" r="5" fill="#10B981"/>
  <circle cx="750" cy="130" r="5" fill="#10B981"/>

  <!-- Y axis labels -->
  <text x="40" y="133" text-anchor="end" font-size="9" fill="#10B981">Success</text>
  <text x="40" y="183" text-anchor="end" font-size="9" fill="#EF4444">Failure</text>
  <text x="40" y="205" text-anchor="end" font-size="9" fill="#64748b">Fallback</text>

  <!-- Legend -->
  <circle cx="180" y="320" r="5" fill="#10B981"/>
  <text x="190" y="324" font-size="10" fill="#64748b">Successful request</text>
  <circle cx="320" y="320" r="5" fill="#EF4444"/>
  <text x="330" y="324" font-size="10" fill="#64748b">Failed request</text>
  <rect x="440" y="315" width="20" height="12" rx="2" fill="#EF4444" opacity="0.3"/>
  <text x="465" y="325" font-size="10" fill="#64748b">Fail-fast (fallback)</text>
  <circle cx="590" y="320" r="6" fill="#F59E0B"/>
  <text x="600" y="324" font-size="10" fill="#64748b">Probe request</text>
</svg>
