<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">SSE vs WebSocket Comparison</text>

  <!-- SSE Column -->
  <rect x="30" y="55" width="360" height="330" rx="12" fill="#F0F9FF" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="30" y="55" width="360" height="40" rx="12" fill="#3B82F6"/>
  <rect x="30" y="82" width="360" height="13" fill="#3B82F6"/>
  <text x="210" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Server-Sent Events (SSE)</text>

  <!-- WebSocket Column -->
  <rect x="410" y="55" width="360" height="330" rx="12" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <rect x="410" y="55" width="360" height="40" rx="12" fill="#10B981"/>
  <rect x="410" y="82" width="360" height="13" fill="#10B981"/>
  <text x="590" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">WebSocket</text>

  <!-- SSE: Direction -->
  <text x="50" y="118" font-size="11" font-weight="600" fill="#1E293B">Direction</text>
  <rect x="50" y="124" width="140" height="24" rx="5" fill="#3B82F6" opacity="0.12"/>
  <text x="120" y="140" text-anchor="middle" font-size="11" fill="#3B82F6" font-weight="500">Unidirectional</text>

  <!-- SSE: Direction diagram -->
  <rect x="220" y="124" width="50" height="24" rx="5" fill="#DBEAFE"/>
  <text x="245" y="140" text-anchor="middle" font-size="9" fill="#3B82F6">Client</text>
  <line x1="330" y1="136" x2="280" y2="136" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrSSE)"/>
  <rect x="330" y="124" width="50" height="24" rx="5" fill="#DBEAFE"/>
  <text x="355" y="140" text-anchor="middle" font-size="9" fill="#3B82F6">Server</text>

  <!-- WS: Direction -->
  <text x="430" y="118" font-size="11" font-weight="600" fill="#1E293B">Direction</text>
  <rect x="430" y="124" width="140" height="24" rx="5" fill="#10B981" opacity="0.12"/>
  <text x="500" y="140" text-anchor="middle" font-size="11" fill="#10B981" font-weight="500">Bidirectional</text>

  <!-- WS: Direction diagram -->
  <rect x="600" y="124" width="50" height="24" rx="5" fill="#D1FAE5"/>
  <text x="625" y="140" text-anchor="middle" font-size="9" fill="#10B981">Client</text>
  <line x1="660" y1="132" x2="700" y2="132" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrWS)"/>
  <line x1="700" y1="142" x2="660" y2="142" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrWS2)"/>
  <rect x="700" y="124" width="50" height="24" rx="5" fill="#D1FAE5"/>
  <text x="725" y="140" text-anchor="middle" font-size="9" fill="#10B981">Server</text>

  <!-- Row: Protocol -->
  <text x="50" y="175" font-size="11" font-weight="600" fill="#1E293B">Protocol</text>
  <text x="50" y="192" font-size="11" fill="#475569">HTTP (no upgrade needed)</text>
  <text x="50" y="207" font-size="11" fill="#475569">Works with proxies &amp; CDNs natively</text>

  <text x="430" y="175" font-size="11" font-weight="600" fill="#1E293B">Protocol</text>
  <text x="430" y="192" font-size="11" fill="#475569">ws:// / wss:// (HTTP upgrade handshake)</text>
  <text x="430" y="207" font-size="11" fill="#475569">May need proxy/LB configuration</text>

  <!-- Row: Reconnection -->
  <text x="50" y="232" font-size="11" font-weight="600" fill="#1E293B">Reconnection</text>
  <rect x="50" y="238" width="100" height="20" rx="4" fill="#3B82F6" opacity="0.1"/>
  <text x="100" y="252" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="500">Auto-reconnect</text>
  <text x="160" y="252" font-size="10" fill="#475569">+ Last-Event-ID resume</text>

  <text x="430" y="232" font-size="11" font-weight="600" fill="#1E293B">Reconnection</text>
  <rect x="430" y="238" width="80" height="20" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="470" y="252" text-anchor="middle" font-size="10" fill="#F59E0B" font-weight="500">Manual</text>
  <text x="520" y="252" font-size="10" fill="#475569">Must implement yourself</text>

  <!-- Row: Data format -->
  <text x="50" y="278" font-size="11" font-weight="600" fill="#1E293B">Data Format</text>
  <text x="50" y="295" font-size="11" fill="#475569">Text only (UTF-8)</text>
  <text x="50" y="310" font-size="11" fill="#475569">JSON via data: field</text>

  <text x="430" y="278" font-size="11" font-weight="600" fill="#1E293B">Data Format</text>
  <text x="430" y="295" font-size="11" fill="#475569">Text + Binary frames</text>
  <text x="430" y="310" font-size="11" fill="#475569">Protobuf, MessagePack, raw bytes</text>

  <!-- Row: Use cases -->
  <text x="50" y="335" font-size="11" font-weight="600" fill="#1E293B">Best For</text>
  <text x="50" y="352" font-size="11" fill="#475569">LLM streaming, notifications, feeds,</text>
  <text x="50" y="367" font-size="11" fill="#475569">dashboards, build logs</text>

  <text x="430" y="335" font-size="11" font-weight="600" fill="#1E293B">Best For</text>
  <text x="430" y="352" font-size="11" fill="#475569">Chat, collaborative editing, gaming,</text>
  <text x="430" y="367" font-size="11" fill="#475569">binary streaming, high-frequency</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrSSE" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#3B82F6"/>
    </marker>
    <marker id="arrWS" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#10B981"/>
    </marker>
    <marker id="arrWS2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#10B981"/>
    </marker>
  </defs>
</svg>
