<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-labelledby="webrtcNatTitle webrtcNatDesc">
  <title id="webrtcNatTitle">WebRTC NAT Traversal Diagram</title>
  <desc id="webrtcNatDesc">Diagram showing STUN discovering public IP for direct P2P and TURN relaying when direct connection fails due to symmetric NAT or firewall</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--background, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text, #1a1a1a)">WebRTC NAT Traversal</text>
  
  <!-- Peer A Network -->
  <rect x="30" y="70" width="240" height="180" rx="8" fill="var(--bg-primary, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="2"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="var(--text, #1a1a1a)">Peer A Network</text>
  
  <!-- Peer A -->
  <circle cx="150" cy="150" r="35" fill="var(--accent, #3b82f6)" stroke="var(--accent, #3b82f6)" stroke-width="2"/>
  <text x="150" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="white">Peer A</text>
  <text x="150" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">192.168.1.10</text>
  
  <!-- NAT A -->
  <rect x="100" y="200" width="100" height="40" rx="4" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="150" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text, #1a1a1a)">NAT A</text>
  
  <!-- Peer B Network -->
  <rect x="530" y="70" width="240" height="180" rx="8" fill="var(--bg-primary, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="2"/>
  <text x="650" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="var(--text, #1a1a1a)">Peer B Network</text>
  
  <!-- Peer B -->
  <circle cx="650" cy="150" r="35" fill="var(--accent, #3b82f6)" stroke="var(--accent, #3b82f6)" stroke-width="2"/>
  <text x="650" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="white">Peer B</text>
  <text x="650" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="white">192.168.2.20</text>
  
  <!-- NAT B -->
  <rect x="600" y="200" width="100" height="40" rx="4" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="650" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text, #1a1a1a)">NAT B</text>
  
  <!-- Internet -->
  <rect x="30" y="280" width="740" height="100" rx="8" fill="var(--bg-primary, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="2" stroke-dasharray="8"/>
  <text x="400" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="var(--text, #1a1a1a)">Internet</text>
  
  <!-- STUN Server -->
  <rect x="150" y="330" width="120" height="40" rx="6" fill="var(--success, #22c55e)" stroke="var(--success, #22c55e)" stroke-width="1.5"/>
  <text x="210" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="white">STUN Server</text>
  
  <!-- TURN Server -->
  <rect x="530" y="330" width="120" height="40" rx="6" fill="var(--warning, #f59e0b)" stroke="var(--warning, #f59e0b)" stroke-width="1.5"/>
  <text x="590" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="white">TURN Server</text>
  
  <!-- Public IPs -->
  <text x="150" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Public: 203.0.113.1:5000</text>
  <text x="650" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Public: 198.51.100.1:6000</text>
  
  <!-- Direct P2P path (successful) -->
  <path d="M200 240 Q400 260 600 240" stroke="var(--success, #22c55e)" stroke-width="3" stroke-dasharray="8" fill="none" marker-end="url(#arrowhead)"/>
  <text x="400" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--success, #22c55e)">Direct P2P (via STUN)</text>
  
  <!-- TURN relay path (fallback) -->
  <path d="M150 240 L150 330" stroke="var(--warning, #f59e0b)" stroke-width="2" stroke-dasharray="4"/>
  <path d="M150 330 L530 330" stroke="var(--warning, #f59e0b)" stroke-width="2" stroke-dasharray="4"/>
  <path d="M590 330 L590 240" stroke="var(--warning, #f59e0b)" stroke-width="2" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
  <text x="370" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--warning, #f59e0b)">TURN Relay (fallback when P2P fails)</text>
  
  <!-- Legend -->
  <rect x="30" y="410" width="350" height="70" rx="6" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="205" y="435" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="var(--text, #1a1a1a)">Connection Methods</text>
  <text x="60" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--success, #22c55e)">● Direct P2P</text>
  <text x="180" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--warning, #f59e0b)">● TURN Relay</text>
  <text x="280" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">● STUN Discovery</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent, #3b82f6)"/>
    </marker>
  </defs>
</svg>
