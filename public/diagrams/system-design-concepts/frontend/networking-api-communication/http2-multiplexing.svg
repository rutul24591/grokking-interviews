<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
  </defs>

  <rect width="800" height="400" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" font-size="16" font-weight="700" fill="#1E293B" text-anchor="middle">HTTP/2 Multiplexing: Interleaved Streams on a Single Connection</text>

  <!-- Client box -->
  <rect x="30" y="55" width="120" height="300" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="90" y="78" font-size="12" font-weight="600" fill="#3B82F6" text-anchor="middle">Client</text>
  <text x="90" y="93" font-size="9" fill="#64748B" text-anchor="middle">(Browser)</text>

  <!-- Request labels on client side -->
  <rect x="40" y="110" width="100" height="22" rx="4" fill="#3B82F6" opacity="0.15"/>
  <text x="90" y="125" font-size="9" font-weight="500" fill="#3B82F6" text-anchor="middle">GET /index.html</text>

  <rect x="40" y="140" width="100" height="22" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="90" y="155" font-size="9" font-weight="500" fill="#10B981" text-anchor="middle">GET /style.css</text>

  <rect x="40" y="170" width="100" height="22" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="90" y="185" font-size="9" font-weight="500" fill="#F59E0B" text-anchor="middle">GET /app.js</text>

  <rect x="40" y="200" width="100" height="22" rx="4" fill="#6366F1" opacity="0.15"/>
  <text x="90" y="215" font-size="9" font-weight="500" fill="#6366F1" text-anchor="middle">GET /hero.png</text>

  <rect x="40" y="230" width="100" height="22" rx="4" fill="#EF4444" opacity="0.15"/>
  <text x="90" y="245" font-size="9" font-weight="500" fill="#EF4444" text-anchor="middle">GET /font.woff2</text>

  <text x="90" y="280" font-size="8" font-weight="400" fill="#94A3B8" text-anchor="middle">All requests sent</text>
  <text x="90" y="292" font-size="8" font-weight="400" fill="#94A3B8" text-anchor="middle">concurrently on</text>
  <text x="90" y="304" font-size="8" font-weight="400" fill="#94A3B8" text-anchor="middle">one connection</text>

  <!-- Server box -->
  <rect x="650" y="55" width="120" height="300" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="710" y="78" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle">Server</text>
  <text x="710" y="93" font-size="9" fill="#64748B" text-anchor="middle">(Origin/CDN)</text>

  <!-- Response labels on server side -->
  <rect x="660" y="110" width="100" height="22" rx="4" fill="#3B82F6" opacity="0.15"/>
  <text x="710" y="125" font-size="9" font-weight="500" fill="#3B82F6" text-anchor="middle">Stream 1: HTML</text>

  <rect x="660" y="140" width="100" height="22" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="710" y="155" font-size="9" font-weight="500" fill="#10B981" text-anchor="middle">Stream 3: CSS</text>

  <rect x="660" y="170" width="100" height="22" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="710" y="185" font-size="9" font-weight="500" fill="#F59E0B" text-anchor="middle">Stream 5: JS</text>

  <rect x="660" y="200" width="100" height="22" rx="4" fill="#6366F1" opacity="0.15"/>
  <text x="710" y="215" font-size="9" font-weight="500" fill="#6366F1" text-anchor="middle">Stream 7: IMG</text>

  <rect x="660" y="230" width="100" height="22" rx="4" fill="#EF4444" opacity="0.15"/>
  <text x="710" y="245" font-size="9" font-weight="500" fill="#EF4444" text-anchor="middle">Stream 9: Font</text>

  <text x="710" y="280" font-size="8" font-weight="400" fill="#94A3B8" text-anchor="middle">Responses sent as</text>
  <text x="710" y="292" font-size="8" font-weight="400" fill="#94A3B8" text-anchor="middle">interleaved frames</text>
  <text x="710" y="304" font-size="8" font-weight="400" fill="#94A3B8" text-anchor="middle">by priority</text>

  <!-- Connection pipe (the wire) -->
  <rect x="170" y="60" width="460" height="290" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="400" y="80" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">Single TCP Connection (TLS encrypted)</text>

  <!-- Time arrow -->
  <line x1="185" y1="95" x2="185" y2="340" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="183" y="92" font-size="8" fill="#94A3B8" text-anchor="middle">Time</text>

  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Interleaved frames on the wire -->
  <!-- Row 1 -->
  <rect x="200" y="95" width="80" height="20" rx="4" fill="#3B82F6" opacity="0.85"/>
  <text x="240" y="109" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">HEADERS :1</text>

  <rect x="285" y="95" width="80" height="20" rx="4" fill="#10B981" opacity="0.85"/>
  <text x="325" y="109" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">HEADERS :3</text>

  <rect x="370" y="95" width="80" height="20" rx="4" fill="#F59E0B" opacity="0.85"/>
  <text x="410" y="109" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">HEADERS :5</text>

  <rect x="455" y="95" width="80" height="20" rx="4" fill="#6366F1" opacity="0.85"/>
  <text x="495" y="109" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">HEADERS :7</text>

  <rect x="540" y="95" width="75" height="20" rx="4" fill="#EF4444" opacity="0.75"/>
  <text x="577" y="109" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">HEADERS :9</text>

  <!-- Row 2 -->
  <rect x="200" y="122" width="105" height="20" rx="4" fill="#3B82F6" opacity="0.7"/>
  <text x="252" y="136" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :1 (HTML part 1)</text>

  <rect x="310" y="122" width="100" height="20" rx="4" fill="#10B981" opacity="0.7"/>
  <text x="360" y="136" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :3 (CSS part 1)</text>

  <rect x="415" y="122" width="100" height="20" rx="4" fill="#F59E0B" opacity="0.7"/>
  <text x="465" y="136" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :5 (JS part 1)</text>

  <rect x="520" y="122" width="95" height="20" rx="4" fill="#EF4444" opacity="0.65"/>
  <text x="567" y="136" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :9 (Font p1)</text>

  <!-- Row 3 -->
  <rect x="200" y="149" width="100" height="20" rx="4" fill="#10B981" opacity="0.7"/>
  <text x="250" y="163" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :3 (CSS part 2)</text>

  <rect x="305" y="149" width="105" height="20" rx="4" fill="#3B82F6" opacity="0.7"/>
  <text x="357" y="163" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :1 (HTML part 2)</text>

  <rect x="415" y="149" width="100" height="20" rx="4" fill="#6366F1" opacity="0.7"/>
  <text x="465" y="163" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :7 (IMG part 1)</text>

  <rect x="520" y="149" width="95" height="20" rx="4" fill="#F59E0B" opacity="0.7"/>
  <text x="567" y="163" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :5 (JS part 2)</text>

  <!-- Row 4 -->
  <rect x="200" y="176" width="105" height="20" rx="4" fill="#F59E0B" opacity="0.7"/>
  <text x="252" y="190" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :5 (JS part 3)</text>

  <rect x="310" y="176" width="100" height="20" rx="4" fill="#3B82F6" opacity="0.7"/>
  <text x="360" y="190" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :1 (HTML end)</text>

  <rect x="415" y="176" width="100" height="20" rx="4" fill="#10B981" opacity="0.7"/>
  <text x="465" y="190" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :3 (CSS end)</text>

  <rect x="520" y="176" width="95" height="20" rx="4" fill="#EF4444" opacity="0.65"/>
  <text x="567" y="190" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :9 (Font p2)</text>

  <!-- Row 5 -->
  <rect x="200" y="203" width="100" height="20" rx="4" fill="#6366F1" opacity="0.7"/>
  <text x="250" y="217" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :7 (IMG part 2)</text>

  <rect x="305" y="203" width="105" height="20" rx="4" fill="#F59E0B" opacity="0.7"/>
  <text x="357" y="217" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :5 (JS part 4)</text>

  <rect x="415" y="203" width="100" height="20" rx="4" fill="#EF4444" opacity="0.65"/>
  <text x="465" y="217" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :9 (Font end)</text>

  <rect x="520" y="203" width="95" height="20" rx="4" fill="#6366F1" opacity="0.7"/>
  <text x="567" y="217" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :7 (IMG p3)</text>

  <!-- Row 6 -->
  <rect x="200" y="230" width="105" height="20" rx="4" fill="#6366F1" opacity="0.7"/>
  <text x="252" y="244" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :7 (IMG part 4)</text>

  <rect x="310" y="230" width="100" height="20" rx="4" fill="#F59E0B" opacity="0.7"/>
  <text x="360" y="244" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :5 (JS end)</text>

  <rect x="415" y="230" width="100" height="20" rx="4" fill="#6366F1" opacity="0.7"/>
  <text x="465" y="244" font-size="8" font-weight="500" fill="#fff" text-anchor="middle">DATA :7 (IMG end)</text>

  <!-- Completion markers -->
  <text x="400" y="272" font-size="9" font-weight="500" fill="#64748B" text-anchor="middle">Stream Completion Order (by priority):</text>

  <rect x="195" y="280" width="60" height="18" rx="4" fill="#3B82F6"/>
  <text x="225" y="293" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">:1 HTML</text>
  <text x="260" y="293" font-size="10" fill="#94A3B8">&amp;#x2192;</text>

  <rect x="270" y="280" width="55" height="18" rx="4" fill="#10B981"/>
  <text x="297" y="293" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">:3 CSS</text>
  <text x="330" y="293" font-size="10" fill="#94A3B8">&amp;#x2192;</text>

  <rect x="340" y="280" width="55" height="18" rx="4" fill="#EF4444" opacity="0.8"/>
  <text x="367" y="293" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">:9 Font</text>
  <text x="400" y="293" font-size="10" fill="#94A3B8">&amp;#x2192;</text>

  <rect x="410" y="280" width="50" height="18" rx="4" fill="#F59E0B"/>
  <text x="435" y="293" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">:5 JS</text>
  <text x="465" y="293" font-size="10" fill="#94A3B8">&amp;#x2192;</text>

  <rect x="475" y="280" width="55" height="18" rx="4" fill="#6366F1"/>
  <text x="502" y="293" font-size="8" font-weight="600" fill="#fff" text-anchor="middle">:7 IMG</text>

  <!-- Key insight callout -->
  <rect x="195" y="310" width="410" height="30" rx="6" fill="#F0FDF4" stroke="#10B981" stroke-width="1"/>
  <text x="400" y="329" font-size="9" font-weight="500" fill="#065F46" text-anchor="middle">Key: High-priority resources (HTML, CSS) complete first despite all starting simultaneously</text>

  <!-- Legend -->
  <rect x="200" y="370" width="12" height="12" rx="2" fill="#3B82F6"/>
  <text x="217" y="381" font-size="9" fill="#475569">Stream 1 (HTML)</text>
  <rect x="310" y="370" width="12" height="12" rx="2" fill="#10B981"/>
  <text x="327" y="381" font-size="9" fill="#475569">Stream 3 (CSS)</text>
  <rect x="410" y="370" width="12" height="12" rx="2" fill="#F59E0B"/>
  <text x="427" y="381" font-size="9" fill="#475569">Stream 5 (JS)</text>
  <rect x="500" y="370" width="12" height="12" rx="2" fill="#6366F1"/>
  <text x="517" y="381" font-size="9" fill="#475569">Stream 7 (IMG)</text>
  <rect x="590" y="370" width="12" height="12" rx="2" fill="#EF4444" opacity="0.75"/>
  <text x="607" y="381" font-size="9" fill="#475569">Stream 9 (Font)</text>
</svg>
