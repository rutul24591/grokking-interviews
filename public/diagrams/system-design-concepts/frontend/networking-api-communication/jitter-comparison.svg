<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Jitter Strategy Comparison</text>

  <!-- Graph 1: No Jitter (Thundering Herd) -->
  <g transform="translate(30, 55)">
    <rect width="230" height="300" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="115" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#EF4444">No Jitter</text>
    <text x="115" y="42" text-anchor="middle" font-size="10" fill="#64748b">(Thundering Herd)</text>

    <!-- Y axis -->
    <line x1="40" y1="60" x2="40" y2="260" stroke="#94a3b8" stroke-width="1"/>
    <text x="18" y="165" text-anchor="middle" font-size="9" fill="#64748b" transform="rotate(-90, 18, 165)">Request Density</text>

    <!-- X axis -->
    <line x1="40" y1="260" x2="210" y2="260" stroke="#94a3b8" stroke-width="1"/>
    <text x="125" y="280" text-anchor="middle" font-size="9" fill="#64748b">Time</text>

    <!-- Spike bars (synchronized retries) -->
    <rect x="55" y="80" width="12" height="180" rx="2" fill="#EF4444" opacity="0.8"/>
    <text x="61" y="290" text-anchor="middle" font-size="8" fill="#64748b">1s</text>

    <rect x="95" y="90" width="12" height="170" rx="2" fill="#EF4444" opacity="0.8"/>
    <text x="101" y="290" text-anchor="middle" font-size="8" fill="#64748b">2s</text>

    <rect x="135" y="110" width="12" height="150" rx="2" fill="#EF4444" opacity="0.8"/>
    <text x="141" y="290" text-anchor="middle" font-size="8" fill="#64748b">4s</text>

    <rect x="175" y="130" width="12" height="130" rx="2" fill="#EF4444" opacity="0.8"/>
    <text x="181" y="290" text-anchor="middle" font-size="8" fill="#64748b">8s</text>

    <!-- Danger indicator -->
    <text x="115" y="75" text-anchor="middle" font-size="9" font-weight="600" fill="#EF4444">All clients retry together</text>
  </g>

  <!-- Graph 2: Full Jitter -->
  <g transform="translate(285, 55)">
    <rect width="230" height="300" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="115" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#10B981">Full Jitter</text>
    <text x="115" y="42" text-anchor="middle" font-size="10" fill="#64748b">random(0, backoff)</text>

    <!-- Y axis -->
    <line x1="40" y1="60" x2="40" y2="260" stroke="#94a3b8" stroke-width="1"/>
    <text x="18" y="165" text-anchor="middle" font-size="9" fill="#64748b" transform="rotate(-90, 18, 165)">Request Density</text>

    <!-- X axis -->
    <line x1="40" y1="260" x2="210" y2="260" stroke="#94a3b8" stroke-width="1"/>
    <text x="125" y="280" text-anchor="middle" font-size="9" fill="#64748b">Time</text>

    <!-- Spread bars (randomized retries) -->
    <rect x="50" y="170" width="8" height="90" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="62" y="185" width="8" height="75" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="74" y="160" width="8" height="100" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="86" y="195" width="8" height="65" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="98" y="175" width="8" height="85" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="110" y="200" width="8" height="60" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="122" y="180" width="8" height="80" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="134" y="210" width="8" height="50" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="146" y="190" width="8" height="70" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="158" y="215" width="8" height="45" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="170" y="205" width="8" height="55" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="182" y="225" width="8" height="35" rx="2" fill="#10B981" opacity="0.6"/>
    <rect x="194" y="220" width="8" height="40" rx="2" fill="#10B981" opacity="0.6"/>

    <!-- Label -->
    <text x="115" y="75" text-anchor="middle" font-size="9" font-weight="600" fill="#10B981">Wide spread, some short delays</text>
  </g>

  <!-- Graph 3: Decorrelated Jitter -->
  <g transform="translate(540, 55)">
    <rect width="230" height="300" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="115" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#6366F1">Decorrelated Jitter</text>
    <text x="115" y="42" text-anchor="middle" font-size="10" fill="#64748b">random(base, prev*3)</text>

    <!-- Y axis -->
    <line x1="40" y1="60" x2="40" y2="260" stroke="#94a3b8" stroke-width="1"/>
    <text x="18" y="165" text-anchor="middle" font-size="9" fill="#64748b" transform="rotate(-90, 18, 165)">Request Density</text>

    <!-- X axis -->
    <line x1="40" y1="260" x2="210" y2="260" stroke="#94a3b8" stroke-width="1"/>
    <text x="125" y="280" text-anchor="middle" font-size="9" fill="#64748b">Time</text>

    <!-- Smooth distribution bars -->
    <rect x="48" y="185" width="8" height="75" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="58" y="190" width="8" height="70" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="68" y="195" width="8" height="65" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="78" y="192" width="8" height="68" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="88" y="198" width="8" height="62" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="98" y="200" width="8" height="60" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="108" y="205" width="8" height="55" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="118" y="208" width="8" height="52" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="128" y="210" width="8" height="50" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="138" y="215" width="8" height="45" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="148" y="218" width="8" height="42" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="158" y="222" width="8" height="38" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="168" y="225" width="8" height="35" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="178" y="230" width="8" height="30" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="188" y="233" width="8" height="27" rx="2" fill="#6366F1" opacity="0.6"/>
    <rect x="198" y="237" width="8" height="23" rx="2" fill="#6366F1" opacity="0.6"/>

    <!-- Label -->
    <text x="115" y="75" text-anchor="middle" font-size="9" font-weight="600" fill="#6366F1">Smooth spread, optimal recovery</text>
  </g>

  <!-- Bottom comparison -->
  <rect x="120" y="370" width="12" height="12" rx="2" fill="#EF4444"/>
  <text x="140" y="381" font-size="10" fill="#64748b">High server load risk</text>
  <rect x="310" y="370" width="12" height="12" rx="2" fill="#10B981"/>
  <text x="330" y="381" font-size="10" fill="#64748b">Good spread</text>
  <rect x="460" y="370" width="12" height="12" rx="2" fill="#6366F1"/>
  <text x="480" y="381" font-size="10" fill="#64748b">Best performance (recommended)</text>
</svg>
