<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Long Polling Sequence Detail</text>

  <!-- Actors -->
  <rect x="60" y="45" width="90" height="30" rx="6" fill="#6366F1"/>
  <text x="105" y="65" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Client</text>

  <rect x="340" y="45" width="120" height="30" rx="6" fill="#3B82F6"/>
  <text x="400" y="65" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Server (Async)</text>

  <rect x="600" y="45" width="120" height="30" rx="6" fill="#10B981"/>
  <text x="660" y="65" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">Event Source</text>

  <!-- Lifelines -->
  <line x1="105" y1="75" x2="105" y2="385" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="400" y1="75" x2="400" y2="385" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="660" y1="75" x2="660" y2="385" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>

  <defs>
    <marker id="sq-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366F1"/>
    </marker>
    <marker id="sq-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="sq-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="sq-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Step 1: Client sends request with seq ID -->
  <line x1="105" y1="95" x2="390" y2="95" stroke="#6366F1" stroke-width="1.5" marker-end="url(#sq-purple)"/>
  <rect x="140" y="82" width="210" height="16" rx="3" fill="#eef2ff"/>
  <text x="245" y="94" text-anchor="middle" font-size="9" fill="#6366F1">1. GET /poll?since=seq_41&amp;topics=chat,notify</text>

  <!-- Step 2: Server registers in connection pool -->
  <rect x="380" y="102" width="40" height="20" rx="3" fill="#dbeafe"/>
  <text x="400" y="116" text-anchor="middle" font-size="8" fill="#3B82F6">register</text>

  <!-- Step 2 note -->
  <text x="480" y="116" font-size="8" fill="#64748b" font-style="italic">Add to connection registry</text>

  <!-- Step 3: Server waits... (activation box) -->
  <rect x="393" y="122" width="14" height="50" rx="2" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <text x="480" y="148" font-size="8" fill="#3B82F6" font-style="italic">Holding... (async wait)</text>

  <!-- Step 4: Event arrives at server -->
  <line x1="660" y1="172" x2="410" y2="172" stroke="#10B981" stroke-width="1.5" marker-end="url(#sq-green)"/>
  <rect x="450" y="160" width="170" height="16" rx="3" fill="#ecfdf5"/>
  <text x="535" y="172" text-anchor="middle" font-size="9" fill="#10B981">2. Event published (seq_42)</text>

  <!-- Step 5: Server resolves pending connection -->
  <rect x="380" y="178" width="40" height="20" rx="3" fill="#dbeafe"/>
  <text x="400" y="192" text-anchor="middle" font-size="8" fill="#3B82F6">resolve</text>

  <!-- Step 6: Server sends response -->
  <line x1="400" y1="205" x2="115" y2="205" stroke="#10B981" stroke-width="2" marker-end="url(#sq-green)"/>
  <rect x="140" y="192" width="230" height="16" rx="3" fill="#ecfdf5"/>
  <text x="255" y="204" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">3. 200 OK {data: [...], seq: 42, hasMore: false}</text>

  <!-- Step 7: Client processes and immediately re-requests -->
  <rect x="90" y="210" width="30" height="16" rx="3" fill="#eef2ff"/>
  <text x="105" y="222" text-anchor="middle" font-size="7" fill="#6366F1">process</text>

  <line x1="105" y1="232" x2="390" y2="232" stroke="#6366F1" stroke-width="1.5" marker-end="url(#sq-purple)"/>
  <rect x="140" y="219" width="200" height="16" rx="3" fill="#eef2ff"/>
  <text x="240" y="231" text-anchor="middle" font-size="9" fill="#6366F1">4. GET /poll?since=seq_42 (immediate)</text>

  <!-- Server registers again -->
  <rect x="380" y="238" width="40" height="20" rx="3" fill="#dbeafe"/>
  <text x="400" y="252" text-anchor="middle" font-size="8" fill="#3B82F6">register</text>

  <!-- Server holds again -->
  <rect x="393" y="258" width="14" height="60" rx="2" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <text x="480" y="288" font-size="8" fill="#3B82F6" font-style="italic">Holding... (30s timeout)</text>

  <!-- Timeout fires -->
  <rect x="380" y="318" width="40" height="20" rx="3" fill="#fef3c7"/>
  <text x="400" y="332" text-anchor="middle" font-size="8" fill="#F59E0B">timeout</text>

  <!-- Server sends timeout response -->
  <line x1="400" y1="342" x2="115" y2="342" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#sq-amber)"/>
  <rect x="140" y="330" width="230" height="16" rx="3" fill="#fffbeb"/>
  <text x="255" y="342" text-anchor="middle" font-size="9" fill="#F59E0B">5. 200 OK {data: [], seq: 42, timeout: true}</text>

  <!-- Client immediately re-requests -->
  <line x1="105" y1="360" x2="390" y2="360" stroke="#6366F1" stroke-width="1.5" marker-end="url(#sq-purple)"/>
  <rect x="140" y="347" width="200" height="16" rx="3" fill="#eef2ff"/>
  <text x="240" y="359" text-anchor="middle" font-size="9" fill="#6366F1">6. GET /poll?since=seq_42 (immediate)</text>

  <!-- Server holds -->
  <rect x="393" y="366" width="14" height="18" rx="2" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <text x="480" y="378" font-size="8" fill="#3B82F6" font-style="italic">Holding... cycle continues</text>

  <!-- Annotations on right side -->
  <rect x="10" y="95" width="4" height="110" rx="2" fill="#10B981"/>
  <text x="25" y="155" font-size="8" fill="#10B981" font-weight="bold" transform="rotate(-90, 25, 155)">Event delivery</text>

  <rect x="10" y="232" width="4" height="130" rx="2" fill="#F59E0B"/>
  <text x="25" y="300" font-size="8" fill="#F59E0B" font-weight="bold" transform="rotate(-90, 25, 300)">Timeout cycle</text>
</svg>
