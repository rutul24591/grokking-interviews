<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none" role="img" aria-labelledby="streamingJsonTitle streamingJsonDesc">
  <title id="streamingJsonTitle">Streaming JSON Parse Diagram</title>
  <desc id="streamingJsonDesc">Diagram showing how chunks are accumulated, split by newline delimiter, and each JSON object parsed incrementally</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="var(--background, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text, #1a1a1a)">Streaming JSON Parse (NDJSON)</text>
  
  <!-- Incoming Chunks -->
  <rect x="30" y="70" width="220" height="280" rx="8" fill="var(--bg-primary, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="2"/>
  <text x="140" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text, #1a1a1a)">Incoming Chunks</text>
  
  <!-- Chunk 1 -->
  <rect x="50" y="120" width="180" height="40" rx="4" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1"/>
  <text x="140" y="138" text-anchor="middle" font-family="monospace" font-size="9" fill="var(--text, #1a1a1a)">{"id":1,"data":"A"}</text>
  <text x="140" y="153" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">\n</text>
  
  <!-- Chunk 2 -->
  <rect x="50" y="170" width="180" height="40" rx="4" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1"/>
  <text x="140" y="188" text-anchor="middle" font-family="monospace" font-size="9" fill="var(--text, #1a1a1a)">{"id":2,"data":"B"}</text>
  <text x="140" y="203" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">\n</text>
  
  <!-- Chunk 3 (partial) -->
  <rect x="50" y="220" width="180" height="40" rx="4" fill="var(--accent, #3b82f6)" stroke="var(--accent, #3b82f6)" stroke-width="1"/>
  <text x="140" y="238" text-anchor="middle" font-family="monospace" font-size="9" fill="white">{"id":3,"data":</text>
  <text x="140" y="253" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">incomplete...</text>
  
  <!-- Arrow -->
  <path d="M250 200 L290 200" stroke="var(--accent, #3b82f6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="270" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Accumulate</text>
  
  <!-- Buffer -->
  <rect x="290" y="70" width="220" height="280" rx="8" fill="var(--bg-primary, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text, #1a1a1a)">Text Buffer</text>
  
  <!-- Buffer content -->
  <rect x="310" y="120" width="180" height="180" rx="4" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1"/>
  <text x="400" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="var(--text, #1a1a1a)">{"id":1,"data":"A"}\n</text>
  <text x="400" y="165" text-anchor="middle" font-family="monospace" font-size="9" fill="var(--text, #1a1a1a)">{"id":2,"data":"B"}\n</text>
  <text x="400" y="185" text-anchor="middle" font-family="monospace" font-size="9" fill="var(--accent, #3b82f6)">{"id":3,"data":</text>
  <text x="400" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">↑ incomplete line</text>
  <text x="400" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">stays in buffer</text>
  
  <!-- Arrow -->
  <path d="M510 200 L550 200" stroke="var(--accent, #3b82f6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="530" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Split by \n</text>
  
  <!-- Parsed Objects -->
  <rect x="550" y="70" width="220" height="280" rx="8" fill="var(--bg-primary, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="2"/>
  <text x="660" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text, #1a1a1a)">Parsed Objects</text>
  
  <!-- Object 1 -->
  <rect x="570" y="120" width="180" height="45" rx="4" fill="var(--success, #22c55e)" stroke="var(--success, #22c55e)" stroke-width="1"/>
  <text x="660" y="140" text-anchor="middle" font-family="monospace" font-size="9" fill="white">{"id":1,"data":"A"}</text>
  <text x="660" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">✓ Processed</text>
  
  <!-- Object 2 -->
  <rect x="570" y="180" width="180" height="45" rx="4" fill="var(--success, #22c55e)" stroke="var(--success, #22c55e)" stroke-width="1"/>
  <text x="660" y="200" text-anchor="middle" font-family="monospace" font-size="9" fill="white">{"id":2,"data":"B"}</text>
  <text x="660" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white">✓ Processed</text>
  
  <!-- Waiting -->
  <rect x="570" y="240" width="180" height="45" rx="4" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1" stroke-dasharray="4"/>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Waiting for rest of</text>
  <text x="660" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">{"id":3,...}</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent, #3b82f6)"/>
    </marker>
  </defs>
</svg>
