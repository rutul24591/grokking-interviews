<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="450" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Request Queue Architecture</text>

  <defs>
    <marker id="qaArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="qaArrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Incoming requests -->
  <text x="55" y="60" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">Incoming</text>
  <text x="55" y="74" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">Requests</text>

  <rect x="20" y="90" width="70" height="28" rx="5" fill="#EF4444"/>
  <text x="55" y="108" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="600">Auth Token</text>

  <rect x="20" y="128" width="70" height="28" rx="5" fill="#3B82F6"/>
  <text x="55" y="146" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="600">User Data</text>

  <rect x="20" y="166" width="70" height="28" rx="5" fill="#3B82F6"/>
  <text x="55" y="184" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="600">Feed Items</text>

  <rect x="20" y="204" width="70" height="28" rx="5" fill="#F59E0B"/>
  <text x="55" y="222" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="600">Prefetch</text>

  <rect x="20" y="242" width="70" height="28" rx="5" fill="#F59E0B"/>
  <text x="55" y="260" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="600">Analytics</text>

  <rect x="20" y="280" width="70" height="28" rx="5" fill="#94a3b8"/>
  <text x="55" y="298" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="600">Image Pre</text>

  <!-- Arrows to priority lanes -->
  <line x1="90" y1="104" x2="135" y2="104" stroke="#64748b" stroke-width="1.5" marker-end="url(#qaArrow)"/>
  <line x1="90" y1="142" x2="135" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#qaArrow)"/>
  <line x1="90" y1="180" x2="135" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#qaArrow)"/>
  <line x1="90" y1="218" x2="135" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#qaArrow)"/>
  <line x1="90" y1="256" x2="135" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#qaArrow)"/>
  <line x1="90" y1="294" x2="135" y2="330" stroke="#64748b" stroke-width="1.5" marker-end="url(#qaArrow)"/>

  <!-- Priority Lanes -->
  <rect x="140" y="55" width="200" height="300" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="240" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Priority Queue</text>

  <!-- High priority lane -->
  <rect x="155" y="75" width="170" height="55" rx="6" fill="#fef2f2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="240" y="92" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="bold">HIGH PRIORITY</text>
  <rect x="165" y="100" width="60" height="20" rx="4" fill="#EF4444"/>
  <text x="195" y="114" text-anchor="middle" font-size="8" fill="#fff">Auth</text>
  <text x="250" y="122" font-size="8" fill="#94a3b8">Reserved slot</text>

  <!-- Normal priority lane -->
  <rect x="155" y="145" width="170" height="55" rx="6" fill="#eff6ff" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="240" y="162" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="bold">NORMAL PRIORITY</text>
  <rect x="165" y="170" width="50" height="20" rx="4" fill="#3B82F6"/>
  <text x="190" y="184" text-anchor="middle" font-size="8" fill="#fff">User</text>
  <rect x="220" y="170" width="50" height="20" rx="4" fill="#3B82F6"/>
  <text x="245" y="184" text-anchor="middle" font-size="8" fill="#fff">Feed</text>

  <!-- Low priority lane -->
  <rect x="155" y="215" width="170" height="55" rx="6" fill="#fffbeb" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="240" y="232" text-anchor="middle" font-size="10" fill="#F59E0B" font-weight="bold">LOW PRIORITY</text>
  <rect x="165" y="240" width="60" height="20" rx="4" fill="#F59E0B"/>
  <text x="195" y="254" text-anchor="middle" font-size="8" fill="#fff">Prefetch</text>
  <rect x="230" y="240" width="60" height="20" rx="4" fill="#F59E0B"/>
  <text x="260" y="254" text-anchor="middle" font-size="8" fill="#fff">Analytics</text>

  <!-- Background lane -->
  <rect x="155" y="285" width="170" height="55" rx="6" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="240" y="302" text-anchor="middle" font-size="10" fill="#64748b" font-weight="bold">BACKGROUND</text>
  <rect x="165" y="310" width="60" height="20" rx="4" fill="#94a3b8"/>
  <text x="195" y="324" text-anchor="middle" font-size="8" fill="#fff">Images</text>

  <!-- Arrow to concurrency limiter -->
  <line x1="340" y1="205" x2="385" y2="205" stroke="#64748b" stroke-width="2" marker-end="url(#qaArrow)"/>

  <!-- Concurrency Limiter -->
  <rect x="390" y="100" width="130" height="210" rx="10" fill="#f0fdf4" stroke="#10B981" stroke-width="2"/>
  <text x="455" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Concurrency</text>
  <text x="455" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Limiter</text>

  <!-- Slots -->
  <text x="455" y="140" text-anchor="middle" font-size="10" fill="#047857" font-weight="600">Max: 4 slots</text>

  <rect x="410" y="150" width="90" height="28" rx="5" fill="#10B981"/>
  <text x="455" y="168" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="600">Slot 1: Auth</text>

  <rect x="410" y="185" width="90" height="28" rx="5" fill="#10B981"/>
  <text x="455" y="203" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="600">Slot 2: User</text>

  <rect x="410" y="220" width="90" height="28" rx="5" fill="#10B981"/>
  <text x="455" y="238" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="600">Slot 3: Feed</text>

  <rect x="410" y="255" width="90" height="28" rx="5" fill="#10B981" opacity="0.3"/>
  <text x="455" y="273" text-anchor="middle" font-size="9" fill="#065f46" font-weight="600">Slot 4: Open</text>

  <!-- Arrow to Network -->
  <line x1="520" y1="205" x2="565" y2="205" stroke="#10B981" stroke-width="2" marker-end="url(#qaArrowGreen)"/>

  <!-- Network -->
  <rect x="570" y="140" width="100" height="130" rx="10" fill="#6366F1" stroke="#4f46e5" stroke-width="2"/>
  <text x="620" y="170" text-anchor="middle" font-size="12" fill="#ffffff" font-weight="bold">Network</text>
  <text x="620" y="190" text-anchor="middle" font-size="10" fill="#e0e7ff">HTTP/2</text>
  <text x="620" y="210" text-anchor="middle" font-size="10" fill="#e0e7ff">Multiplex</text>
  <text x="620" y="240" text-anchor="middle" font-size="9" fill="#c7d2fe">3 in-flight</text>
  <text x="620" y="258" text-anchor="middle" font-size="9" fill="#c7d2fe">1 headroom</text>

  <!-- Arrow to Response Router -->
  <line x1="670" y1="205" x2="705" y2="205" stroke="#64748b" stroke-width="2" marker-end="url(#qaArrow)"/>

  <!-- Response Router -->
  <rect x="710" y="140" width="75" height="130" rx="10" fill="#F59E0B" stroke="#d97706" stroke-width="2"/>
  <text x="747" y="170" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Response</text>
  <text x="747" y="185" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Router</text>
  <text x="747" y="210" text-anchor="middle" font-size="8" fill="#fef3c7">Resolve</text>
  <text x="747" y="225" text-anchor="middle" font-size="8" fill="#fef3c7">Promises</text>
  <text x="747" y="248" text-anchor="middle" font-size="8" fill="#fef3c7">Free slot</text>
  <text x="747" y="260" text-anchor="middle" font-size="8" fill="#fef3c7">-&amp;gt; drain</text>

  <!-- Legend -->
  <rect x="140" y="385" width="10" height="10" rx="2" fill="#EF4444"/>
  <text x="155" y="394" font-size="9" fill="#64748b">High Priority</text>
  <rect x="240" y="385" width="10" height="10" rx="2" fill="#3B82F6"/>
  <text x="255" y="394" font-size="9" fill="#64748b">Normal</text>
  <rect x="310" y="385" width="10" height="10" rx="2" fill="#F59E0B"/>
  <text x="325" y="394" font-size="9" fill="#64748b">Low Priority</text>
  <rect x="400" y="385" width="10" height="10" rx="2" fill="#94a3b8"/>
  <text x="415" y="394" font-size="9" fill="#64748b">Background</text>
  <rect x="490" y="385" width="10" height="10" rx="2" fill="#10B981"/>
  <text x="505" y="394" font-size="9" fill="#64748b">In-Flight Slot</text>

  <!-- Aging indicator -->
  <rect x="140" y="410" width="520" height="30" rx="6" fill="#faf5ff" stroke="#6366F1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="429" text-anchor="middle" font-size="9" fill="#6366F1">Aging: Low-priority requests waiting &amp;gt;10s are promoted to Normal priority to prevent starvation</text>
</svg>
