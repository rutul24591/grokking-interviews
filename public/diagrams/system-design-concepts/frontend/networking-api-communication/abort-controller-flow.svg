<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="white"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">AbortController Lifecycle Flow</text>

  <!-- Step boxes -->
  <!-- 1. Create Controller -->
  <rect x="30" y="70" width="120" height="56" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="90" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="#6366F1">1. Create</text>
  <text x="90" y="108" text-anchor="middle" font-size="10" fill="#1e293b">AbortController</text>

  <!-- Arrow -->
  <line x1="150" y1="98" x2="185" y2="98" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 2. Pass signal to fetch -->
  <rect x="190" y="70" width="120" height="56" rx="8" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="250" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="#6366F1">2. Pass signal</text>
  <text x="250" y="108" text-anchor="middle" font-size="10" fill="#1e293b">fetch(url, {signal})</text>

  <!-- Arrow -->
  <line x1="310" y1="98" x2="345" y2="98" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- 3. Request in flight -->
  <rect x="350" y="70" width="120" height="56" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="410" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981">3. In Flight</text>
  <text x="410" y="108" text-anchor="middle" font-size="10" fill="#1e293b">Request pending...</text>

  <!-- Branch: Success path (down-right) -->
  <line x1="470" y1="98" x2="505" y2="98" stroke="#10B981" stroke-width="1.5"/>
  <line x1="505" y1="98" x2="505" y2="70" stroke="#10B981" stroke-width="1.5"/>
  <line x1="505" y1="70" x2="540" y2="70" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Success box -->
  <rect x="545" y="50" width="110" height="44" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="600" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#10B981">Response OK</text>
  <text x="600" y="84" text-anchor="middle" font-size="10" fill="#1e293b">Process data</text>

  <!-- Branch: Abort path (down) -->
  <line x1="410" y1="126" x2="410" y2="165" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- 4. User navigates / triggers abort -->
  <rect x="310" y="170" width="200" height="56" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="410" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444">4. Trigger: controller.abort()</text>
  <text x="410" y="206" text-anchor="middle" font-size="10" fill="#1e293b">User navigates / timeout / new query</text>

  <!-- Arrow down -->
  <line x1="410" y1="226" x2="410" y2="255" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- 5. AbortError thrown -->
  <rect x="310" y="260" width="200" height="56" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="410" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444">5. Fetch throws AbortError</text>
  <text x="410" y="296" text-anchor="middle" font-size="10" fill="#1e293b">signal.aborted = true, reason set</text>

  <!-- Arrow down -->
  <line x1="410" y1="316" x2="410" y2="345" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- 6. Cleanup -->
  <rect x="310" y="350" width="200" height="44" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="410" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#F59E0B">6. Cleanup</text>
  <text x="410" y="384" text-anchor="middle" font-size="10" fill="#1e293b">Catch AbortError, skip state update</text>

  <!-- Side annotation: signal properties -->
  <rect x="590" y="165" width="180" height="100" rx="8" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4"/>
  <text x="680" y="185" text-anchor="middle" font-size="10" font-weight="600" fill="#64748B">AbortSignal Properties</text>
  <text x="600" y="205" font-size="10" fill="#1e293b">signal.aborted (boolean)</text>
  <text x="600" y="222" font-size="10" fill="#1e293b">signal.reason (string/Error)</text>
  <text x="600" y="239" font-size="10" fill="#1e293b">signal.onabort (handler)</text>
  <text x="600" y="256" font-size="10" fill="#1e293b">signal.throwIfAborted()</text>

  <!-- Side annotation: what gets cancelled -->
  <rect x="590" y="280" width="180" height="90" rx="8" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4"/>
  <text x="680" y="300" text-anchor="middle" font-size="10" font-weight="600" fill="#64748B">Signal-Aware APIs</text>
  <text x="600" y="318" font-size="10" fill="#1e293b">fetch(url, {signal})</text>
  <text x="600" y="335" font-size="10" fill="#1e293b">addEventListener(e, fn, {signal})</text>
  <text x="600" y="352" font-size="10" fill="#1e293b">ReadableStream</text>
  <text x="600" y="365" font-size="10" fill="#1e293b">AbortSignal.timeout(ms)</text>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366F1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10B981"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#EF4444"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F59E0B"/>
    </marker>
  </defs>
</svg>