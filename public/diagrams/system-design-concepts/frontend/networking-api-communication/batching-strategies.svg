<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="350" fill="#ffffff"/>
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Batching Strategies Comparison</text>

  <!-- Column headers -->
  <text x="110" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">No Batching</text>
  <text x="310" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Time-Window</text>
  <text x="510" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Size-Based</text>
  <text x="710" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Hybrid</text>

  <!-- Divider lines -->
  <line x1="200" y1="50" x2="200" y2="340" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="400" y1="50" x2="400" y2="340" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="600" y1="50" x2="600" y2="340" stroke="#e2e8f0" stroke-width="1"/>

  <!-- No Batching: 5 separate requests -->
  <rect x="50" y="80" width="120" height="24" rx="5" fill="#EF4444"/>
  <text x="110" y="96" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">GET /user/1</text>
  <rect x="50" y="110" width="120" height="24" rx="5" fill="#EF4444"/>
  <text x="110" y="126" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">GET /user/2</text>
  <rect x="50" y="140" width="120" height="24" rx="5" fill="#EF4444"/>
  <text x="110" y="156" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">GET /user/3</text>
  <rect x="50" y="170" width="120" height="24" rx="5" fill="#EF4444"/>
  <text x="110" y="186" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">GET /user/4</text>
  <rect x="50" y="200" width="120" height="24" rx="5" fill="#EF4444"/>
  <text x="110" y="216" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="600">GET /user/5</text>

  <text x="110" y="252" text-anchor="middle" font-size="11" fill="#EF4444" font-weight="bold">5 requests</text>
  <text x="110" y="268" text-anchor="middle" font-size="10" fill="#64748b">5 connections</text>
  <text x="110" y="284" text-anchor="middle" font-size="10" fill="#64748b">5x header overhead</text>
  <text x="110" y="300" text-anchor="middle" font-size="10" fill="#64748b">0ms added latency</text>

  <!-- Time-Window: collect for 10ms then send -->
  <rect x="225" y="80" width="16" height="10" rx="3" fill="#3B82F6" opacity="0.5"/>
  <rect x="245" y="80" width="16" height="10" rx="3" fill="#3B82F6" opacity="0.5"/>
  <rect x="265" y="80" width="16" height="10" rx="3" fill="#3B82F6" opacity="0.5"/>
  <rect x="285" y="80" width="16" height="10" rx="3" fill="#3B82F6" opacity="0.5"/>
  <rect x="305" y="80" width="16" height="10" rx="3" fill="#3B82F6" opacity="0.5"/>

  <!-- Bracket -->
  <path d="M225 95 L225 100 L320 100 L320 95" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="272" y1="100" x2="272" y2="115" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="310" y="115" text-anchor="middle" font-size="9" fill="#3B82F6">10ms window</text>

  <rect x="240" y="125" width="140" height="90" rx="8" fill="#3B82F6"/>
  <text x="310" y="148" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">1 Batch Request</text>
  <text x="310" y="168" text-anchor="middle" font-size="10" fill="#dbeafe">POST /api/batch</text>
  <text x="310" y="185" text-anchor="middle" font-size="10" fill="#dbeafe">[1, 2, 3, 4, 5]</text>
  <text x="310" y="205" text-anchor="middle" font-size="9" fill="#bfdbfe">Fires after timer</text>

  <text x="310" y="252" text-anchor="middle" font-size="11" fill="#3B82F6" font-weight="bold">1 request</text>
  <text x="310" y="268" text-anchor="middle" font-size="10" fill="#64748b">1 connection</text>
  <text x="310" y="284" text-anchor="middle" font-size="10" fill="#64748b">1x header overhead</text>
  <text x="310" y="300" text-anchor="middle" font-size="10" fill="#64748b">+10ms added latency</text>

  <!-- Size-Based: batch at 5 items -->
  <rect x="425" y="80" width="16" height="10" rx="3" fill="#10B981" opacity="0.5"/>
  <rect x="445" y="80" width="16" height="10" rx="3" fill="#10B981" opacity="0.5"/>
  <rect x="465" y="80" width="16" height="10" rx="3" fill="#10B981" opacity="0.5"/>
  <rect x="485" y="80" width="16" height="10" rx="3" fill="#10B981" opacity="0.5"/>
  <rect x="505" y="80" width="16" height="10" rx="3" fill="#10B981" opacity="0.5"/>

  <path d="M425 95 L425 100 L520 100 L520 95" fill="none" stroke="#10B981" stroke-width="1.5"/>
  <line x1="472" y1="100" x2="472" y2="115" stroke="#10B981" stroke-width="1.5"/>
  <text x="510" y="115" text-anchor="middle" font-size="9" fill="#10B981">size = 5 reached</text>

  <rect x="440" y="125" width="140" height="90" rx="8" fill="#10B981"/>
  <text x="510" y="148" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">1 Batch Request</text>
  <text x="510" y="168" text-anchor="middle" font-size="10" fill="#ecfdf5">POST /api/batch</text>
  <text x="510" y="185" text-anchor="middle" font-size="10" fill="#ecfdf5">[1, 2, 3, 4, 5]</text>
  <text x="510" y="205" text-anchor="middle" font-size="9" fill="#a7f3d0">Fires at threshold</text>

  <text x="510" y="252" text-anchor="middle" font-size="11" fill="#10B981" font-weight="bold">1 request</text>
  <text x="510" y="268" text-anchor="middle" font-size="10" fill="#64748b">1 connection</text>
  <text x="510" y="284" text-anchor="middle" font-size="10" fill="#64748b">1x header overhead</text>
  <text x="510" y="300" text-anchor="middle" font-size="10" fill="#64748b">Variable latency</text>

  <!-- Hybrid: whichever first -->
  <rect x="625" y="80" width="16" height="10" rx="3" fill="#6366F1" opacity="0.5"/>
  <rect x="645" y="80" width="16" height="10" rx="3" fill="#6366F1" opacity="0.5"/>
  <rect x="665" y="80" width="16" height="10" rx="3" fill="#6366F1" opacity="0.5"/>
  <rect x="685" y="80" width="16" height="10" rx="3" fill="#6366F1" opacity="0.5"/>
  <rect x="705" y="80" width="16" height="10" rx="3" fill="#6366F1" opacity="0.5"/>

  <path d="M625 95 L625 100 L720 100 L720 95" fill="none" stroke="#6366F1" stroke-width="1.5"/>
  <line x1="672" y1="100" x2="672" y2="115" stroke="#6366F1" stroke-width="1.5"/>
  <text x="710" y="115" text-anchor="middle" font-size="9" fill="#6366F1">first threshold</text>

  <rect x="640" y="125" width="140" height="90" rx="8" fill="#6366F1"/>
  <text x="710" y="148" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="bold">1 Batch Request</text>
  <text x="710" y="168" text-anchor="middle" font-size="10" fill="#e0e7ff">POST /api/batch</text>
  <text x="710" y="185" text-anchor="middle" font-size="10" fill="#e0e7ff">10ms OR size=5</text>
  <text x="710" y="205" text-anchor="middle" font-size="9" fill="#c7d2fe">Whichever first</text>

  <text x="710" y="252" text-anchor="middle" font-size="11" fill="#6366F1" font-weight="bold">1 request</text>
  <text x="710" y="268" text-anchor="middle" font-size="10" fill="#64748b">1 connection</text>
  <text x="710" y="284" text-anchor="middle" font-size="10" fill="#64748b">Bounded latency</text>
  <text x="710" y="300" text-anchor="middle" font-size="10" fill="#64748b">Optimal batch size</text>

  <!-- Bottom summary -->
  <rect x="50" y="320" width="700" height="24" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="336" text-anchor="middle" font-size="10" fill="#475569">Hybrid approach (time + size) provides the best balance of latency, throughput, and network efficiency</text>
</svg>
