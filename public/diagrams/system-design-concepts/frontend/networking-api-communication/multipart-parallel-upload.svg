<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none" role="img" aria-labelledby="multipartParallelTitle multipartParallelDesc">
  <title id="multipartParallelTitle">Parallel Chunk Upload Diagram</title>
  <desc id="multipartParallelDesc">Diagram showing multiple chunks uploading concurrently with configurable concurrency</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="var(--background, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text, #1a1a1a)">Parallel Chunk Upload</text>
  
  <!-- File -->
  <rect x="50" y="80" width="120" height="240" rx="6" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="2"/>
  <text x="110" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text, #1a1a1a)">File</text>
  <text x="110" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="var(--text-muted, #666666)">100 MB</text>
  
  <!-- Chunk divisions -->
  <line x1="50" y1="130" x2="170" y2="130" stroke="var(--border, #e0e0e0)" stroke-width="1" stroke-dasharray="4"/>
  <line x1="50" y1="180" x2="170" y2="180" stroke="var(--border, #e0e0e0)" stroke-width="1" stroke-dasharray="4"/>
  <line x1="50" y1="230" x2="170" y2="230" stroke="var(--border, #e0e0e0)" stroke-width="1" stroke-dasharray="4"/>
  <line x1="50" y1="280" x2="170" y2="280" stroke="var(--border, #e0e0e0)" stroke-width="1" stroke-dasharray="4"/>
  
  <text x="185" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text, #1a1a1a)">Chunk 1 (10MB)</text>
  <text x="185" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text, #1a1a1a)">Chunk 2 (10MB)</text>
  <text x="185" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text, #1a1a1a)">Chunk 3 (10MB)</text>
  <text x="185" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text, #1a1a1a)">Chunk 4 (10MB)</text>
  <text x="185" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text-muted, #666666)">...more chunks</text>
  
  <!-- Parallel arrows -->
  <path d="M280 115 L380 115" stroke="var(--accent, #3b82f6)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M280 165 L380 165" stroke="var(--accent, #3b82f6)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M280 215 L380 215" stroke="var(--accent, #3b82f6)" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M280 265 L380 265" stroke="var(--accent, #3b82f6)" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Concurrency label -->
  <rect x="300" y="70" width="60" height="30" rx="4" fill="var(--accent, #3b82f6)"/>
  <text x="330" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white">N=4</text>
  <text x="330" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">concurrent</text>
  
  <!-- Server -->
  <rect x="420" y="80" width="330" height="240" rx="8" fill="var(--bg-primary, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="2"/>
  <text x="585" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text, #1a1a1a)">Server Storage</text>
  
  <!-- Stored chunks -->
  <rect x="450" y="130" width="270" height="40" rx="4" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="585" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text, #1a1a1a)">Chunk 1 Stored ✓</text>
  
  <rect x="450" y="180" width="270" height="40" rx="4" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="585" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text, #1a1a1a)">Chunk 2 Stored ✓</text>
  
  <rect x="450" y="230" width="270" height="40" rx="4" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="585" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text, #1a1a1a)">Chunk 3 Stored ✓</text>
  
  <rect x="450" y="280" width="270" height="40" rx="4" fill="var(--accent, #3b82f6)" stroke="var(--accent, #3b82f6)" stroke-width="1.5"/>
  <text x="585" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white">Chunk 4 Uploading...</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent, #3b82f6)"/>
    </marker>
  </defs>
</svg>
