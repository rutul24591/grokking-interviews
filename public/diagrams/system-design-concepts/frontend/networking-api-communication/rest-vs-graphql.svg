<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">REST vs GraphQL: Architecture Comparison</text>

  <!-- Divider -->
  <line x1="400" y1="48" x2="400" y2="390" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="46" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="bold">VS</text>

  <!-- ===== REST Side (Left) ===== -->
  <text x="200" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#3B82F6">REST</text>
  <text x="200" y="78" text-anchor="middle" font-size="10" fill="#64748b">Multiple Endpoints, Fixed Responses</text>

  <!-- Client -->
  <rect x="30" y="95" width="90" height="36" rx="8" fill="#3B82F6"/>
  <text x="75" y="117" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Client</text>

  <!-- Endpoints -->
  <rect x="180" y="90" width="180" height="28" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="270" y="108" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="bold">GET /api/users/42</text>

  <rect x="180" y="124" width="180" height="28" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="270" y="142" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="bold">GET /api/users/42/posts</text>

  <rect x="180" y="158" width="180" height="28" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="270" y="176" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="bold">GET /api/posts/7/comments</text>

  <!-- Arrows from client to endpoints -->
  <line x1="120" y1="107" x2="178" y2="104" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="120" y1="113" x2="178" y2="138" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="120" y1="119" x2="178" y2="172" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="147" y="98" font-size="8" fill="#3B82F6">3 requests</text>

  <!-- Over-fetching visual -->
  <rect x="30" y="205" width="340" height="80" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="200" y="222" text-anchor="middle" font-size="11" fill="#EF4444" font-weight="bold">Over-fetching Problem</text>

  <rect x="45" y="232" width="310" height="18" rx="3" fill="#DBEAFE"/>
  <rect x="45" y="232" width="100" height="18" rx="3" fill="#3B82F6"/>
  <text x="95" y="244" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">name, avatar</text>
  <text x="240" y="244" text-anchor="middle" font-size="8" fill="#93C5FD">email, phone, address, bio, settings...</text>

  <text x="200" y="270" text-anchor="middle" font-size="9" fill="#EF4444">Client needs 2 fields, receives 8 fields per endpoint</text>

  <!-- REST response boxes -->
  <rect x="30" y="300" width="160" height="85" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="110" y="318" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="bold">Response Shape</text>
  <text x="44" y="336" font-size="9" fill="#334155">Fixed by server</text>
  <text x="44" y="352" font-size="9" fill="#334155">Same shape for all clients</text>
  <text x="44" y="368" font-size="9" fill="#334155">Versioned: /v1/ vs /v2/</text>

  <rect x="210" y="300" width="160" height="85" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="290" y="318" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="bold">Caching</text>
  <text x="224" y="336" font-size="9" fill="#334155">HTTP cache (ETags, 304)</text>
  <text x="224" y="352" font-size="9" fill="#334155">CDN-friendly (GET URLs)</text>
  <text x="224" y="368" font-size="9" fill="#10B981" font-weight="bold">Native browser caching</text>

  <!-- ===== GraphQL Side (Right) ===== -->
  <text x="600" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#6366F1">GraphQL</text>
  <text x="600" y="78" text-anchor="middle" font-size="10" fill="#64748b">Single Endpoint, Flexible Queries</text>

  <!-- Client -->
  <rect x="680" y="95" width="90" height="36" rx="8" fill="#6366F1"/>
  <text x="725" y="117" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Client</text>

  <!-- Single Endpoint -->
  <rect x="430" y="95" width="220" height="90" rx="8" fill="#F5F3FF" stroke="#A5B4FC" stroke-width="1"/>
  <text x="540" y="114" text-anchor="middle" font-size="11" fill="#6366F1" font-weight="bold">POST /graphql</text>

  <text x="445" y="132" font-size="9" fill="#334155">query {"{"}</text>
  <text x="455" y="146" font-size="9" fill="#334155">  user(id: 42) {"{"} name, avatar</text>
  <text x="455" y="160" font-size="9" fill="#334155">    posts {"{"} title, comments {"{"} text {"}"} {"}"}</text>
  <text x="445" y="174" font-size="9" fill="#334155">{"}"} {"}"}</text>

  <!-- Arrow from client to endpoint -->
  <line x1="678" y1="113" x2="652" y2="140" stroke="#6366F1" stroke-width="1.5"/>
  <text x="668" y="134" font-size="8" fill="#6366F1">1 request</text>

  <!-- Exact-fetching visual -->
  <rect x="430" y="205" width="340" height="80" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="600" y="222" text-anchor="middle" font-size="11" fill="#10B981" font-weight="bold">Exact-fetching</text>

  <rect x="445" y="232" width="100" height="18" rx="3" fill="#6366F1"/>
  <text x="495" y="244" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">name, avatar</text>

  <text x="600" y="270" text-anchor="middle" font-size="9" fill="#10B981">Client specifies exactly which fields to return</text>

  <!-- GraphQL characteristics -->
  <rect x="430" y="300" width="160" height="85" rx="8" fill="#F5F3FF" stroke="#A5B4FC" stroke-width="1"/>
  <text x="510" y="318" text-anchor="middle" font-size="10" fill="#6366F1" font-weight="bold">Response Shape</text>
  <text x="444" y="336" font-size="9" fill="#334155">Defined by client query</text>
  <text x="444" y="352" font-size="9" fill="#334155">Different per client / screen</text>
  <text x="444" y="368" font-size="9" fill="#334155">Schema evolution (no versions)</text>

  <rect x="610" y="300" width="160" height="85" rx="8" fill="#F5F3FF" stroke="#A5B4FC" stroke-width="1"/>
  <text x="690" y="318" text-anchor="middle" font-size="10" fill="#6366F1" font-weight="bold">Caching</text>
  <text x="624" y="336" font-size="9" fill="#334155">Requires normalized cache</text>
  <text x="624" y="352" font-size="9" fill="#334155">POST defeats HTTP cache</text>
  <text x="624" y="368" font-size="9" fill="#EF4444" font-weight="bold">Extra tooling needed</text>
</svg>
