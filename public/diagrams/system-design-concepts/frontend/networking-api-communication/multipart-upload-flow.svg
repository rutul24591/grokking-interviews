<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" role="img" aria-labelledby="multipartUploadFlowTitle multipartUploadFlowDesc">
  <title id="multipartUploadFlowTitle">Multipart Upload Flow Diagram</title>
  <desc id="multipartUploadFlowDesc">Diagram showing the multipart upload lifecycle from file selection through chunk upload to final assembly</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--background, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text, #1a1a1a)">Multipart Upload Flow</text>
  
  <!-- Client Side -->
  <rect x="50" y="60" width="300" height="400" rx="8" fill="var(--bg-primary, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="2"/>
  <text x="200" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text, #1a1a1a)">Client</text>
  
  <!-- Server Side -->
  <rect x="450" y="60" width="300" height="400" rx="8" fill="var(--bg-primary, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="2"/>
  <text x="600" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text, #1a1a1a)">Server</text>
  
  <!-- Step 1: File Selection -->
  <rect x="80" y="120" width="240" height="50" rx="6" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="200" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text, #1a1a1a)">1. Select File</text>
  
  <!-- Step 2: Init Session -->
  <rect x="80" y="190" width="240" height="50" rx="6" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="200" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text, #1a1a1a)">2. Init Upload Session</text>
  
  <!-- Arrow to server -->
  <path d="M320 215 L430 215" stroke="var(--accent, #3b82f6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="375" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">POST /init</text>
  
  <!-- Step 2 Server Response -->
  <rect x="480" y="190" width="240" height="50" rx="6" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="600" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text, #1a1a1a)">Create Session ID</text>
  
  <!-- Arrow back -->
  <path d="M430 245 L320 245" stroke="var(--accent, #3b82f6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="375" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Return uploadId</text>
  
  <!-- Step 3: Chunk Upload -->
  <rect x="80" y="270" width="240" height="50" rx="6" fill="var(--accent, #3b82f6)" stroke="var(--accent, #3b82f6)" stroke-width="1.5"/>
  <text x="200" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white">3. Upload Chunks (Parallel)</text>
  
  <!-- Multiple chunk arrows -->
  <path d="M320 285 L430 285" stroke="var(--accent, #3b82f6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M320 295 L430 295" stroke="var(--accent, #3b82f6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M320 305 L430 305" stroke="var(--accent, #3b82f6)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="375" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Chunk 1,2,3...</text>
  
  <!-- Step 3 Server -->
  <rect x="480" y="270" width="240" height="50" rx="6" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text, #1a1a1a)">Store Chunks</text>
  
  <!-- Step 4: Complete -->
  <rect x="80" y="350" width="240" height="50" rx="6" fill="var(--bg-secondary, #ffffff)" stroke="var(--border, #e0e0e0)" stroke-width="1.5"/>
  <text x="200" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text, #1a1a1a)">4. Complete Upload</text>
  
  <!-- Arrow to server -->
  <path d="M320 375 L430 375" stroke="var(--success, #22c55e)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="375" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">POST /complete</text>
  
  <!-- Step 4 Server: Assembly -->
  <rect x="480" y="350" width="240" height="50" rx="6" fill="var(--success, #22c55e)" stroke="var(--success, #22c55e)" stroke-width="1.5"/>
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white">5. Assemble File</text>
  
  <!-- Arrow markers definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent, #3b82f6)"/>
    </marker>
  </defs>
</svg>
