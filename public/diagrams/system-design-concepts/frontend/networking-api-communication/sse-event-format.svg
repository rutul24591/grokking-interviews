<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="350" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">SSE Event Stream Format (text/event-stream)</text>

  <!-- Left: Format specification -->
  <rect x="30" y="55" width="350" height="260" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="205" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">Field Specification</text>

  <!-- Field rows -->
  <!-- id: -->
  <rect x="50" y="95" width="60" height="26" rx="4" fill="#3B82F6" opacity="0.15"/>
  <text x="80" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="#3B82F6" font-family="monospace">id:</text>
  <text x="125" y="113" font-size="11" fill="#475569">Sets event ID for Last-Event-ID on reconnect</text>

  <!-- event: -->
  <rect x="50" y="135" width="60" height="26" rx="4" fill="#10B981" opacity="0.15"/>
  <text x="80" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#10B981" font-family="monospace">event:</text>
  <text x="125" y="153" font-size="11" fill="#475569">Names the event type (triggers addEventListener)</text>

  <!-- data: -->
  <rect x="50" y="175" width="60" height="26" rx="4" fill="#6366F1" opacity="0.15"/>
  <text x="80" y="193" text-anchor="middle" font-size="12" font-weight="600" fill="#6366F1" font-family="monospace">data:</text>
  <text x="125" y="193" font-size="11" fill="#475569">Event payload (multiple lines concatenated)</text>

  <!-- retry: -->
  <rect x="50" y="215" width="60" height="26" rx="4" fill="#F59E0B" opacity="0.15"/>
  <text x="80" y="233" text-anchor="middle" font-size="12" font-weight="600" fill="#F59E0B" font-family="monospace">retry:</text>
  <text x="125" y="233" font-size="11" fill="#475569">Reconnection delay in milliseconds</text>

  <!-- Comment -->
  <rect x="50" y="255" width="60" height="26" rx="4" fill="#94A3B8" opacity="0.15"/>
  <text x="80" y="273" text-anchor="middle" font-size="12" font-weight="600" fill="#94A3B8" font-family="monospace">:</text>
  <text x="125" y="273" font-size="11" fill="#475569">Comment line (keep-alive heartbeat)</text>

  <!-- Separator note -->
  <rect x="50" y="290" width="310" height="18" rx="3" fill="#FEF3C7"/>
  <text x="205" y="303" text-anchor="middle" font-size="10" fill="#92400E" font-weight="500">Events separated by blank line (double \n)</text>

  <!-- Right: Example stream -->
  <rect x="420" y="55" width="350" height="260" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="595" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#E2E8F0">Wire Format Example</text>

  <!-- Code lines -->
  <text x="440" y="105" font-size="11" fill="#94A3B8" font-family="monospace">: connected</text>
  <text x="440" y="120" font-size="11" fill="#94A3B8" font-family="monospace"></text>

  <!-- Event 1 -->
  <text x="440" y="138" font-size="11" fill="#F59E0B" font-family="monospace">retry: 3000</text>
  <text x="440" y="153" font-size="11" fill="#3B82F6" font-family="monospace">id: evt-001</text>
  <text x="440" y="168" font-size="11" fill="#10B981" font-family="monospace">event: notification</text>
  <text x="440" y="183" font-size="11" fill="#6366F1" font-family="monospace">data: {"{"}"type":"alert","text":</text>
  <text x="440" y="198" font-size="11" fill="#6366F1" font-family="monospace">data: "Deploy complete"{"}"}</text>
  <text x="440" y="213" font-size="11" fill="#475569" font-family="monospace"></text>

  <!-- Event 2 (unnamed) -->
  <text x="440" y="228" font-size="11" fill="#3B82F6" font-family="monospace">id: evt-002</text>
  <text x="440" y="243" font-size="11" fill="#6366F1" font-family="monospace">data: {"{"}"count":42{"}"}</text>
  <text x="440" y="258" font-size="11" fill="#475569" font-family="monospace"></text>

  <!-- Keep-alive -->
  <text x="440" y="276" font-size="11" fill="#94A3B8" font-family="monospace">: heartbeat</text>

  <!-- Annotations -->
  <text x="750" y="138" text-anchor="end" font-size="9" fill="#F59E0B">reconnect delay</text>
  <text x="750" y="153" text-anchor="end" font-size="9" fill="#3B82F6">resume marker</text>
  <text x="750" y="168" text-anchor="end" font-size="9" fill="#10B981">named type</text>
  <text x="750" y="190" text-anchor="end" font-size="9" fill="#6366F1">multi-line payload</text>
  <text x="750" y="243" text-anchor="end" font-size="9" fill="#E2E8F0">default "message"</text>
  <text x="750" y="276" text-anchor="end" font-size="9" fill="#94A3B8">keep-alive</text>
</svg>
