<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">WebSocket Connection Lifecycle</text>

  <!-- Client and Server lifelines -->
  <rect x="80" y="52" width="120" height="36" rx="6" fill="#3B82F6" />
  <text x="140" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Client</text>
  <line x1="140" y1="88" x2="140" y2="480" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6,4"/>

  <rect x="600" y="52" width="120" height="36" rx="6" fill="#6366F1" />
  <text x="660" y="75" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Server</text>
  <line x1="660" y1="88" x2="660" y2="480" stroke="#6366F1" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Phase 1: HTTP Upgrade Handshake -->
  <rect x="20" y="100" width="760" height="100" rx="4" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <text x="40" y="116" font-size="10" font-weight="600" fill="#3B82F6">HANDSHAKE PHASE</text>

  <!-- Arrow: Client -> Server (Upgrade Request) -->
  <line x1="150" y1="135" x2="648" y2="135" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="400" y="128" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">GET / HTTP/1.1</text>
  <text x="400" y="148" text-anchor="middle" font-size="10" fill="#64748B">Upgrade: websocket | Sec-WebSocket-Key: dGhlIH...</text>

  <!-- Arrow: Server -> Client (101 Response) -->
  <line x1="650" y1="175" x2="152" y2="175" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowIndigo)"/>
  <text x="400" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">HTTP/1.1 101 Switching Protocols</text>
  <text x="400" y="188" text-anchor="middle" font-size="10" fill="#64748B">Upgrade: websocket | Sec-WebSocket-Accept: s3pP...</text>

  <!-- Phase 2: WebSocket Frames -->
  <rect x="20" y="210" width="760" height="130" rx="4" fill="#F0FDF4" stroke="#10B981" stroke-width="1" opacity="0.5"/>
  <text x="40" y="226" font-size="10" font-weight="600" fill="#10B981">COMMUNICATION PHASE (Full-Duplex)</text>

  <!-- Bidirectional frames -->
  <line x1="150" y1="248" x2="648" y2="248" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="400" y="243" text-anchor="middle" font-size="11" fill="#1E293B">Text Frame: {"{ \"type\": \"subscribe\", \"channel\": \"#general\" }"}</text>

  <line x1="650" y1="278" x2="152" y2="278" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreenLeft)"/>
  <text x="400" y="273" text-anchor="middle" font-size="11" fill="#1E293B">Text Frame: {"{ \"type\": \"message\", \"data\": \"Hello!\" }"}</text>

  <line x1="650" y1="308" x2="152" y2="308" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreenLeft)"/>
  <text x="400" y="303" text-anchor="middle" font-size="11" fill="#1E293B">Binary Frame: [protobuf payload]</text>

  <line x1="150" y1="332" x2="648" y2="332" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="400" y="327" text-anchor="middle" font-size="11" fill="#1E293B">Text Frame: {"{ \"type\": \"ack\", \"id\": 42 }"}</text>

  <!-- Phase 3: Heartbeat -->
  <rect x="20" y="350" width="760" height="70" rx="4" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1" opacity="0.5"/>
  <text x="40" y="366" font-size="10" font-weight="600" fill="#F59E0B">HEARTBEAT</text>

  <line x1="650" y1="390" x2="152" y2="390" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>
  <text x="400" y="385" text-anchor="middle" font-size="11" font-weight="500" fill="#92400E">Ping (opcode 0x9)</text>

  <line x1="150" y1="410" x2="648" y2="410" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowAmberRight)"/>
  <text x="400" y="405" text-anchor="middle" font-size="11" font-weight="500" fill="#92400E">Pong (opcode 0xA)</text>

  <!-- Phase 4: Close -->
  <rect x="20" y="430" width="760" height="60" rx="4" fill="#FEF2F2" stroke="#EF4444" stroke-width="1" opacity="0.5"/>
  <text x="40" y="446" font-size="10" font-weight="600" fill="#EF4444">CLOSE HANDSHAKE</text>

  <line x1="150" y1="465" x2="648" y2="465" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="330" y="460" text-anchor="middle" font-size="11" fill="#1E293B">Close Frame (1000: Normal)</text>

  <line x1="650" y1="478" x2="152" y2="478" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRedLeft)"/>
  <text x="480" y="476" text-anchor="middle" font-size="11" fill="#1E293B">Close Frame (1000: Normal)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrowGreenLeft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowAmberRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowRedLeft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF4444"/>
    </marker>
  </defs>
</svg>
