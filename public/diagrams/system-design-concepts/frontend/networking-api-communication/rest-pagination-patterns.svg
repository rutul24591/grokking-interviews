<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="400" fill="#ffffff"/>
  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">Comparison of REST Pagination Strategies</text>

  <!-- Column 1: Offset-Based -->
  <rect x="20" y="50" width="240" height="335" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <rect x="20" y="50" width="240" height="40" rx="12" fill="#3B82F6"/>
  <rect x="20" y="78" width="240" height="12" fill="#3B82F6"/>
  <text x="140" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Offset-Based</text>

  <text x="140" y="112" text-anchor="middle" font-size="11" fill="#3B82F6" font-weight="bold">?page=2&amp;limit=20</text>

  <!-- Visual representation -->
  <rect x="50" y="128" width="180" height="60" rx="6" fill="#fff" stroke="#93C5FD" stroke-width="1"/>
  <text x="140" y="146" text-anchor="middle" font-size="9" fill="#64748b">Page 1: rows 1-20</text>
  <rect x="62" y="153" width="36" height="6" rx="2" fill="#93C5FD"/>
  <rect x="102" y="153" width="36" height="6" rx="2" fill="#93C5FD"/>
  <rect x="142" y="153" width="36" height="6" rx="2" fill="#93C5FD"/>
  <text x="140" y="176" text-anchor="middle" font-size="9" fill="#3B82F6" font-weight="bold">SKIP 20 → return 20</text>

  <!-- Pros -->
  <text x="36" y="210" font-size="10" fill="#10B981" font-weight="bold">Pros</text>
  <text x="36" y="226" font-size="9" fill="#334155">+ Simple to implement</text>
  <text x="36" y="242" font-size="9" fill="#334155">+ Random page access (jump to p.5)</text>
  <text x="36" y="258" font-size="9" fill="#334155">+ Easy to show total page count</text>

  <!-- Cons -->
  <text x="36" y="282" font-size="10" fill="#EF4444" font-weight="bold">Cons</text>
  <text x="36" y="298" font-size="9" fill="#334155">- Slow at high offsets (scan + skip)</text>
  <text x="36" y="314" font-size="9" fill="#334155">- Data drift: items shift between pages</text>
  <text x="36" y="330" font-size="9" fill="#334155">- Inconsistent with concurrent writes</text>

  <!-- Use case -->
  <rect x="36" y="344" width="208" height="28" rx="4" fill="#DBEAFE"/>
  <text x="140" y="362" text-anchor="middle" font-size="9" fill="#3B82F6" font-weight="bold">Best for: small, static datasets</text>

  <!-- Column 2: Cursor-Based -->
  <rect x="280" y="50" width="240" height="335" rx="12" fill="#F0FDF4" stroke="#10B981" stroke-width="1.5"/>
  <rect x="280" y="50" width="240" height="40" rx="12" fill="#10B981"/>
  <rect x="280" y="78" width="240" height="12" fill="#10B981"/>
  <text x="400" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Cursor-Based</text>

  <text x="400" y="112" text-anchor="middle" font-size="11" fill="#10B981" font-weight="bold">?after=abc123&amp;limit=20</text>

  <!-- Visual representation -->
  <rect x="310" y="128" width="180" height="60" rx="6" fill="#fff" stroke="#6EE7B7" stroke-width="1"/>
  <text x="400" y="146" text-anchor="middle" font-size="9" fill="#64748b">Cursor points to last item</text>
  <rect x="322" y="153" width="36" height="6" rx="2" fill="#6EE7B7"/>
  <rect x="362" y="153" width="36" height="6" rx="2" fill="#6EE7B7"/>
  <rect x="402" y="153" width="36" height="6" rx="2" fill="#10B981"/>
  <text x="420" y="164" font-size="7" fill="#10B981" font-weight="bold">← cursor</text>
  <text x="400" y="176" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">WHERE id &gt; cursor → 20</text>

  <!-- Pros -->
  <text x="296" y="210" font-size="10" fill="#10B981" font-weight="bold">Pros</text>
  <text x="296" y="226" font-size="9" fill="#334155">+ Consistent under concurrent writes</text>
  <text x="296" y="242" font-size="9" fill="#334155">+ O(1) performance at any depth</text>
  <text x="296" y="258" font-size="9" fill="#334155">+ No duplicate items in infinite scroll</text>

  <!-- Cons -->
  <text x="296" y="282" font-size="10" fill="#EF4444" font-weight="bold">Cons</text>
  <text x="296" y="298" font-size="9" fill="#334155">- No random page access</text>
  <text x="296" y="314" font-size="9" fill="#334155">- Opaque cursor (harder to debug)</text>
  <text x="296" y="330" font-size="9" fill="#334155">- Requires ordered, unique key</text>

  <!-- Use case -->
  <rect x="296" y="344" width="208" height="28" rx="4" fill="#D1FAE5"/>
  <text x="400" y="362" text-anchor="middle" font-size="9" fill="#10B981" font-weight="bold">Best for: feeds, real-time data</text>

  <!-- Column 3: Keyset -->
  <rect x="540" y="50" width="240" height="335" rx="12" fill="#F5F3FF" stroke="#6366F1" stroke-width="1.5"/>
  <rect x="540" y="50" width="240" height="40" rx="12" fill="#6366F1"/>
  <rect x="540" y="78" width="240" height="12" fill="#6366F1"/>
  <text x="660" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Keyset</text>

  <text x="660" y="112" text-anchor="middle" font-size="11" fill="#6366F1" font-weight="bold">?after_id=100&amp;limit=20</text>

  <!-- Visual representation -->
  <rect x="570" y="128" width="180" height="60" rx="6" fill="#fff" stroke="#A5B4FC" stroke-width="1"/>
  <text x="660" y="146" text-anchor="middle" font-size="9" fill="#64748b">Uses actual column values</text>
  <text x="597" y="162" font-size="8" fill="#64748b">id=98</text>
  <text x="637" y="162" font-size="8" fill="#64748b">id=99</text>
  <text x="677" y="162" font-size="8" fill="#6366F1" font-weight="bold">id=100</text>
  <text x="717" y="162" font-size="8" fill="#64748b">id=101</text>
  <text x="660" y="176" text-anchor="middle" font-size="9" fill="#6366F1" font-weight="bold">WHERE id &gt; 100 LIMIT 20</text>

  <!-- Pros -->
  <text x="556" y="210" font-size="10" fill="#10B981" font-weight="bold">Pros</text>
  <text x="556" y="226" font-size="9" fill="#334155">+ Most performant (index seek)</text>
  <text x="556" y="242" font-size="9" fill="#334155">+ Transparent values (easy debugging)</text>
  <text x="556" y="258" font-size="9" fill="#334155">+ Consistent with writes</text>

  <!-- Cons -->
  <text x="556" y="282" font-size="10" fill="#EF4444" font-weight="bold">Cons</text>
  <text x="556" y="298" font-size="9" fill="#334155">- Client tracks last sort value</text>
  <text x="556" y="314" font-size="9" fill="#334155">- Breaks with non-unique sort keys</text>
  <text x="556" y="330" font-size="9" fill="#334155">- Exposes internal schema details</text>

  <!-- Use case -->
  <rect x="556" y="344" width="208" height="28" rx="4" fill="#EDE9FE"/>
  <text x="660" y="362" text-anchor="middle" font-size="9" fill="#6366F1" font-weight="bold">Best for: sorted, indexed data</text>
</svg>
