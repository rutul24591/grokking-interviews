<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
  </defs>

  <rect width="800" height="450" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" font-size="16" font-weight="700" fill="#1E293B" text-anchor="middle">Protocol Stack Comparison: HTTP/1.1 vs HTTP/2 vs HTTP/3</text>

  <!-- ===== HTTP/1.1 Stack ===== -->
  <text x="135" y="65" font-size="13" font-weight="600" fill="#3B82F6" text-anchor="middle">HTTP/1.1</text>
  <text x="135" y="80" font-size="9" fill="#94A3B8" text-anchor="middle">(1997 / RFC 2616)</text>

  <!-- HTTP Layer -->
  <rect x="35" y="95" width="200" height="50" rx="6" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="135" y="118" font-size="12" font-weight="600" fill="#3B82F6" text-anchor="middle">HTTP/1.1</text>
  <text x="135" y="133" font-size="8" fill="#64748B" text-anchor="middle">Text-based, sequential requests</text>

  <!-- TLS Layer (optional) -->
  <rect x="35" y="150" width="200" height="40" rx="6" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="135" y="174" font-size="11" font-weight="600" fill="#F59E0B" text-anchor="middle">TLS 1.2 (optional)</text>

  <!-- TCP Layer -->
  <rect x="35" y="195" width="200" height="50" rx="6" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="135" y="218" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle">TCP</text>
  <text x="135" y="233" font-size="8" fill="#64748B" text-anchor="middle">Reliable, ordered byte stream</text>

  <!-- IP Layer -->
  <rect x="35" y="250" width="200" height="40" rx="6" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1.5"/>
  <text x="135" y="275" font-size="12" font-weight="600" fill="#6366F1" text-anchor="middle">IP</text>

  <!-- RTT callout -->
  <rect x="35" y="300" width="200" height="55" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
  <text x="135" y="318" font-size="9" font-weight="600" fill="#DC2626" text-anchor="middle">Connection Setup: 2-3 RTT</text>
  <text x="135" y="332" font-size="8" fill="#DC2626" text-anchor="middle">1 RTT: TCP handshake (SYN/ACK)</text>
  <text x="135" y="344" font-size="8" fill="#DC2626" text-anchor="middle">1-2 RTT: TLS handshake</text>

  <!-- ===== HTTP/2 Stack ===== -->
  <text x="400" y="65" font-size="13" font-weight="600" fill="#10B981" text-anchor="middle">HTTP/2</text>
  <text x="400" y="80" font-size="9" fill="#94A3B8" text-anchor="middle">(2015 / RFC 7540)</text>

  <!-- HTTP/2 Layer -->
  <rect x="300" y="95" width="200" height="50" rx="6" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="400" y="118" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle">HTTP/2</text>
  <text x="400" y="133" font-size="8" fill="#64748B" text-anchor="middle">Binary framing, multiplexed streams</text>

  <!-- TLS Layer (required in browsers) -->
  <rect x="300" y="150" width="200" height="40" rx="6" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="400" y="168" font-size="11" font-weight="600" fill="#F59E0B" text-anchor="middle">TLS 1.2+</text>
  <text x="400" y="181" font-size="8" fill="#92400E" text-anchor="middle">(required in browsers via ALPN)</text>

  <!-- TCP Layer -->
  <rect x="300" y="195" width="200" height="50" rx="6" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="400" y="218" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle">TCP</text>
  <text x="400" y="233" font-size="8" fill="#64748B" text-anchor="middle">Single connection, HOL blocking</text>

  <!-- IP Layer -->
  <rect x="300" y="250" width="200" height="40" rx="6" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1.5"/>
  <text x="400" y="275" font-size="12" font-weight="600" fill="#6366F1" text-anchor="middle">IP</text>

  <!-- RTT callout -->
  <rect x="300" y="300" width="200" height="55" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="400" y="318" font-size="9" font-weight="600" fill="#92400E" text-anchor="middle">Connection Setup: 2 RTT</text>
  <text x="400" y="332" font-size="8" fill="#92400E" text-anchor="middle">1 RTT: TCP handshake</text>
  <text x="400" y="344" font-size="8" fill="#92400E" text-anchor="middle">1 RTT: TLS (via ALPN negotiation)</text>

  <!-- ===== HTTP/3 Stack ===== -->
  <text x="665" y="65" font-size="13" font-weight="600" fill="#6366F1" text-anchor="middle">HTTP/3</text>
  <text x="665" y="80" font-size="9" fill="#94A3B8" text-anchor="middle">(2022 / RFC 9114)</text>

  <!-- HTTP/3 Layer -->
  <rect x="565" y="95" width="200" height="50" rx="6" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1.5"/>
  <text x="665" y="118" font-size="12" font-weight="600" fill="#6366F1" text-anchor="middle">HTTP/3</text>
  <text x="665" y="133" font-size="8" fill="#64748B" text-anchor="middle">Binary framing, QPACK headers</text>

  <!-- QUIC Layer (includes TLS 1.3) -->
  <rect x="565" y="150" width="200" height="95" rx="6" fill="#6366F1" opacity="0.1" stroke="#6366F1" stroke-width="2"/>

  <!-- TLS 1.3 built into QUIC -->
  <rect x="575" y="158" width="180" height="30" rx="4" fill="#F59E0B" opacity="0.2" stroke="#F59E0B" stroke-width="1"/>
  <text x="665" y="177" font-size="10" font-weight="600" fill="#F59E0B" text-anchor="middle">TLS 1.3 (built-in)</text>

  <!-- QUIC transport features -->
  <text x="665" y="205" font-size="11" font-weight="700" fill="#6366F1" text-anchor="middle">QUIC</text>
  <text x="665" y="218" font-size="7" fill="#64748B" text-anchor="middle">Reliability + Congestion Control + Flow Control</text>
  <text x="665" y="229" font-size="7" fill="#64748B" text-anchor="middle">Independent streams + Connection migration</text>

  <!-- Arrow label -->
  <text x="732" y="152" font-size="7" font-weight="600" fill="#6366F1" transform="rotate(90,755,175)">Integrated</text>

  <!-- UDP Layer -->
  <rect x="565" y="250" width="200" height="40" rx="6" fill="#EF4444" opacity="0.12" stroke="#EF4444" stroke-width="1.5"/>
  <text x="665" y="268" font-size="12" font-weight="600" fill="#EF4444" text-anchor="middle">UDP</text>
  <text x="665" y="281" font-size="8" fill="#64748B" text-anchor="middle">Minimal transport, no HOL blocking</text>

  <!-- IP Layer -->
  <rect x="565" y="295" width="200" height="40" rx="6" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1.5"/>
  <text x="665" y="320" font-size="12" font-weight="600" fill="#6366F1" text-anchor="middle">IP</text>

  <!-- RTT callout -->
  <rect x="565" y="345" width="200" height="55" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
  <text x="665" y="363" font-size="9" font-weight="600" fill="#065F46" text-anchor="middle">Connection Setup: 1 RTT / 0 RTT</text>
  <text x="665" y="377" font-size="8" fill="#065F46" text-anchor="middle">1 RTT: QUIC + TLS combined</text>
  <text x="665" y="389" font-size="8" fill="#065F46" text-anchor="middle">0 RTT: Resumed connections</text>

  <!-- Evolution arrows -->
  <line x1="240" y1="170" x2="295" y2="170" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowEvo)"/>
  <text x="267" y="163" font-size="7" fill="#94A3B8" text-anchor="middle">evolution</text>

  <line x1="505" y1="170" x2="560" y2="170" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrowEvo)"/>
  <text x="532" y="163" font-size="7" fill="#94A3B8" text-anchor="middle">evolution</text>

  <defs>
    <marker id="arrowEvo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Key differences callout at bottom -->
  <rect x="35" y="370" width="465" height="70" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="267" y="390" font-size="10" font-weight="600" fill="#334155" text-anchor="middle">Key Architectural Differences</text>
  <text x="50" y="408" font-size="8" fill="#475569">HTTP/1.1: TLS optional, each connection independent, text protocol overhead</text>
  <text x="50" y="422" font-size="8" fill="#475569">HTTP/2: TLS required (browsers), single TCP connection = single point of HOL blocking</text>
  <text x="50" y="436" font-size="8" fill="#475569">HTTP/3: TLS built into QUIC, UDP eliminates TCP HOL blocking, connection survives network changes</text>

  <!-- Legend -->
  <rect x="520" y="410" width="12" height="12" rx="2" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <text x="537" y="420" font-size="8" fill="#475569">Application</text>
  <rect x="590" y="410" width="12" height="12" rx="2" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1"/>
  <text x="607" y="420" font-size="8" fill="#475569">Security</text>
  <rect x="660" y="410" width="12" height="12" rx="2" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1"/>
  <text x="677" y="420" font-size="8" fill="#475569">Transport</text>
  <rect x="730" y="410" width="12" height="12" rx="2" fill="#6366F1" opacity="0.15" stroke="#6366F1" stroke-width="1"/>
  <text x="747" y="420" font-size="8" fill="#475569">Network</text>
</svg>
