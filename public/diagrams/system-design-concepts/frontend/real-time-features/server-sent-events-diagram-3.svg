<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">SSE vs WebSocket Decision Matrix</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Choosing the right real-time technology for your use case</text>
  
  <!-- Decision Flow -->
  <rect x="30" y="100" width="840" height="430" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  
  <!-- Starting Question -->
  <rect x="350" y="120" width="200" height="60" rx="30" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="450" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0c4a6e">Need bidirectional</text>
  <text x="450" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0c4a6e">communication?</text>
  
  <!-- Yes arrow -->
  <path d="M 450 180 L 450 220" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="460" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0369a1">YES</text>
  
  <!-- No arrow -->
  <path d="M 350 150 L 200 150" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="280" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#b45309">NO</text>
  
  <!-- WebSocket Recommendation -->
  <rect x="350" y="220" width="200" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">WebSocket</text>
  <text x="450" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Chat, gaming, collaborative</text>
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">editing, trading platforms</text>
  
  <!-- SSE path continues -->
  <path d="M 200 150 L 120 150 L 120 250" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Secondary Question -->
  <rect x="30" y="250" width="180" height="60" rx="30" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e">Need auto-reconnect</text>
  <text x="120" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e">&amp; simple deployment?</text>
  
  <!-- Yes arrow to SSE -->
  <path d="M 120 310 L 120 350" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="130" y="335" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#b45309">YES</text>
  
  <!-- No arrow to Polling -->
  <path d="M 30 280 L 200 280 L 200 350" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="210" y="272" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#b91c1c">NO</text>
  
  <!-- SSE Recommendation -->
  <rect x="30" y="350" width="180" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="120" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#b45309">SSE</text>
  <text x="120" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Notifications, live</text>
  <text x="120" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">dashboards, feeds</text>
  
  <!-- Polling Recommendation -->
  <rect x="230" y="350" width="180" height="80" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="320" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#b91c1c">Long Polling</text>
  <text x="320" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Legacy support,</text>
  <text x="320" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">infrequent updates</text>
  
  <!-- Feature Comparison Table -->
  <rect x="450" y="320" width="400" height="200" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="650" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Feature Comparison</text>
  
  <rect x="465" y="370" width="370" height="140" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  
  <!-- Table headers -->
  <rect x="480" y="385" width="100" height="25" rx="3" fill="#f3e8ff"/>
  <text x="530" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b21a8">Feature</text>
  <rect x="580" y="385" width="100" height="25" rx="3" fill="#f3e8ff"/>
  <text x="630" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b21a8">SSE</text>
  <rect x="680" y="385" width="100" height="25" rx="3" fill="#f3e8ff"/>
  <text x="730" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b21a8">WebSocket</text>
  
  <!-- Row 1: Direction -->
  <text x="485" y="430" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Direction</text>
  <text x="585" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Server&#8594;Client</text>
  <text x="685" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Full-duplex</text>
  
  <!-- Row 2: Reconnect -->
  <text x="485" y="455" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Reconnect</text>
  <text x="585" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Automatic</text>
  <text x="685" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444">✗ Manual</text>
  
  <!-- Row 3: HTTP/2 -->
  <text x="485" y="480" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">HTTP/2</text>
  <text x="585" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Native</text>
  <text x="685" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">~ Upgrade</text>
  
  <!-- Row 4: Latency -->
  <text x="485" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Latency</text>
  <text x="585" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475560">~50-100ms</text>
  <text x="685" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">&lt;10ms</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
