<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Collaborative Editing: OT vs CRDT</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Operational Transformation vs Conflict-free Replicated Data Types</text>
  
  <!-- OT Approach -->
  <rect x="30" y="100" width="400" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="230" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Operational Transformation (OT)</text>
  
  <rect x="50" y="155" width="360" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- Central server -->
  <rect x="150" y="175" width="100" height="60" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="200" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0369a1">Central</text>
  <text x="200" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0369a1">Server</text>
  
  <!-- Clients -->
  <circle cx="80" cy="205" r="25" fill="#dbeafe" stroke="#0284c7"/>
  <text x="80" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">A</text>
  
  <circle cx="320" cy="205" r="25" fill="#dbeafe" stroke="#0284c7"/>
  <text x="320" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">B</text>
  
  <!-- Arrows to server -->
  <path d="M 105 205 L 150 205" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  <path d="M 295 205 L 250 205" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <text x="230" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Server orders &amp; transforms operations</text>
  <text x="230" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Google Docs approach</text>
  
  <!-- CRDT Approach -->
  <rect x="470" y="100" width="400" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">CRDT (Conflict-free Replicated Data Types)</text>
  
  <rect x="490" y="155" width="360" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Peers -->
  <circle cx="550" cy="205" r="25" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="550" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">A</text>
  
  <circle cx="670" cy="180" r="25" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="670" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">B</text>
  
  <circle cx="790" cy="205" r="25" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="790" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">C</text>
  
  <!-- Peer connections -->
  <path d="M 575 195 L 645 190" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 695 190 L 765 195" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 575 215 L 670 250 L 765 215" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4"/>
  
  <text x="670" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">P2P or via relay, no central ordering</text>
  <text x="670" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Figma, Yjs, Automerge approach</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="320" width="840" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">OT vs CRDT Comparison</text>
  
  <rect x="50" y="370" width="800" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">OT: Central server, transform functions | CRDT: Mathematically commutative, no central coordination</text>
  
  <!-- Character ID Example -->
  <rect x="30" y="440" width="400" height="90" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="230" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">CRDT: Unique Character IDs</text>
  
  <rect x="50" y="490" width="360" height="30" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="230" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Each char: (client_id, clock) — deterministic ordering</text>
  
  <!-- Convergence Guarantee -->
  <rect x="450" y="440" width="420" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Convergence Guarantee</text>
  
  <rect x="465" y="490" width="390" height="30" rx="4" fill="#fef3c7" stroke="#fde68a"/>
  <text x="660" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">All replicas converge to same state regardless of operation order</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
  </defs>
</svg>
