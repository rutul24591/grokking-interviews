<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Notification System Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Event pipeline, channel routing, and multi-channel delivery</text>
  
  <!-- Event Sources -->
  <rect x="30" y="100" width="140" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="100" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Event Sources</text>
  
  <rect x="45" y="155" width="110" height="25" rx="3" fill="#dbeafe" stroke="#0284c7"/>
  <text x="100" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">New message</text>
  
  <rect x="45" y="185" width="110" height="25" rx="3" fill="#dbeafe" stroke="#0284c7"/>
  <text x="100" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Order update</text>
  
  <rect x="45" y="215" width="110" height="25" rx="3" fill="#dbeafe" stroke="#0284c7"/>
  <text x="100" y="232" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Mention/like</text>
  
  <rect x="45" y="245" width="110" height="25" rx="3" fill="#dbeafe" stroke="#0284c7"/>
  <text x="100" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">System alert</text>
  
  <!-- Arrow to Message Queue -->
  <path d="M 170 190 L 230 190" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Message Queue -->
  <rect x="230" y="140" width="160" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="310" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Message Queue</text>
  <text x="310" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Kafka / RabbitMQ</text>
  <text x="310" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Event buffering</text>
  
  <!-- Arrow to Generator -->
  <path d="M 390 190 L 450 190" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Notification Generator -->
  <rect x="450" y="140" width="160" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">Notification</text>
  <text x="530" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">Generator</text>
  <text x="530" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Determine recipients</text>
  
  <!-- Arrow to Router -->
  <path d="M 610 190 L 670 190" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- Channel Router -->
  <rect x="670" y="140" width="140" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="740" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b21a8">Channel</text>
  <text x="740" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b21a8">Router</text>
  <text x="740" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7e22ce">User preferences</text>
  
  <!-- Arrows to Delivery Channels -->
  <path d="M 740 240 L 740 290 L 200 290 L 200 330" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  <path d="M 740 240 L 740 290 L 450 290 L 450 330" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  <path d="M 740 240 L 740 290 L 700 290 L 700 330" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  
  <!-- Delivery Channels -->
  <rect x="120" y="330" width="160" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="200" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0c4a6e">In-App</text>
  <text x="200" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">WebSocket</text>
  <text x="200" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Real-time</text>
  
  <rect x="370" y="330" width="160" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Push</text>
  <text x="450" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">FCM / APNs</text>
  <text x="450" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Mobile/Desktop</text>
  
  <rect x="620" y="330" width="160" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">Email</text>
  <text x="700" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">SMTP / SES</text>
  <text x="700" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Batched digest</text>
  
  <!-- Batching/De duplication -->
  <rect x="30" y="450" width="400" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Batching &amp; Deduplication</text>
  
  <rect x="50" y="495" width="360" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="230" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Group related notifications, rate limit per user, suppress duplicates</text>
  
  <!-- User Preferences -->
  <rect x="450" y="450" width="420" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="660" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">User Preferences Drive Routing</text>
  
  <rect x="465" y="495" width="390" height="25" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="660" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Quiet hours, channel preferences, notification frequency settings</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
