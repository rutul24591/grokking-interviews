<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Notification Channel Orchestration</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Intelligent routing based on engagement, preferences, and urgency</text>
  
  <!-- User Engagement State -->
  <rect x="30" y="100" width="200" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">User Engagement</text>
  
  <rect x="50" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="65" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• App active?</text>
  <text x="65" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Notification clicked?</text>
  <text x="65" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Time since last visit</text>
  
  <!-- Arrow to Router -->
  <path d="M 230 170 L 290 170" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Channel Router -->
  <rect x="290" y="100" width="200" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="390" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Channel Router</text>
  
  <rect x="310" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="325" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• User preferences</text>
  <text x="325" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Quiet hours</text>
  <text x="325" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Urgency level</text>
  
  <!-- Arrows to Channels -->
  <path d="M 490 140 L 550 120" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  <path d="M 490 170 L 550 170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  <path d="M 490 200 L 550 220" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- In-App Channel -->
  <rect x="550" y="80" width="140" height="80" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="620" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0c4a6e">In-App</text>
  <text x="620" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">If app active</text>
  
  <!-- Push Channel -->
  <rect x="550" y="170" width="140" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="620" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Push</text>
  <text x="620" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">If high urgency</text>
  
  <!-- Email Channel -->
  <rect x="550" y="260" width="140" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="620" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">Email</text>
  <text x="620" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Batched digest</text>
  
  <!-- Feedback Loop -->
  <path d="M 690 200 L 750 200 L 750 350 L 130 350 L 130 240" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-gray)" fill="none"/>
  
  <!-- Feedback Loop Box -->
  <rect x="30" y="370" width="840" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="450" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Engagement Feedback Loop</text>
  
  <rect x="50" y="415" width="800" height="25" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="450" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Track opens, clicks, dismissals &#8594; Adjust future channel selection</text>
  
  <!-- Decision Rules -->
  <rect x="710" y="100" width="160" height="240" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="790" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Decision Rules</text>
  
  <rect x="725" y="155" width="130" height="170" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="735" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">App active &#8594; In-app only</text>
  <text x="735" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">High urgency + inactive &#8594; Push</text>
  <text x="735" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Low urgency &#8594; Email digest</text>
  <text x="735" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Quiet hours &#8594; Defer</text>
  <text x="735" y="260" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">User disabled &#8594; Skip</text>
  <text x="735" y="280" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Rate limit &#8594; Defer</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
