<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">SSE Use Case Patterns</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Live dashboards, notifications, and streaming responses</text>
  
  <!-- Pattern 1: Live Dashboard -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Live Dashboard</text>
  
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- Chart visualization -->
  <rect x="65" y="175" width="200" height="80" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <path d="M 75 235 L 105 220 L 135 235 L 165 200 L 195 215 L 225 190 L 255 205" stroke="#0284c7" stroke-width="2" fill="none"/>
  <circle cx="75" cy="235" r="3" fill="#0284c7"/>
  <circle cx="105" cy="220" r="3" fill="#0284c7"/>
  <circle cx="135" cy="235" r="3" fill="#0284c7"/>
  <circle cx="165" cy="200" r="3" fill="#0284c7"/>
  <circle cx="195" cy="215" r="3" fill="#0284c7"/>
  <circle cx="225" cy="190" r="3" fill="#0284c7"/>
  <circle cx="255" cy="205" r="3" fill="#0284c7"/>
  
  <text x="165" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Metrics streaming at 1s intervals</text>
  
  <!-- Pattern 2: Notifications -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Push Notifications</text>
  
  <rect x="335" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Notification cards -->
  <rect x="350" y="175" width="200" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="365" y="197" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">🔔 New message from Alice</text>
  
  <rect x="350" y="215" width="200" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="365" y="237" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">🔔 Order #1234 shipped</text>
  
  <rect x="350" y="255" width="200" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b" opacity="0.5"/>
  <text x="365" y="277" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">🔔 Payment received</text>
  
  <text x="450" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Event-driven, low frequency</text>
  
  <!-- Pattern 3: Streaming Response -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Streaming Response</text>
  
  <rect x="620" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- LLM streaming -->
  <rect x="635" y="175" width="200" height="80" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="650" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">data: {"chunk": "The"}</text>
  <text x="650" y="210" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">data: {"chunk": " answer"}</text>
  <text x="650" y="225" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">data: {"chunk": " is..."}</text>
  <text x="650" y="240" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">data: {"done": true}</text>
  
  <text x="735" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">LLM tokens, progressive rendering</text>
  
  <!-- HTTP/2 Impact -->
  <rect x="30" y="320" width="840" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">HTTP/2 Multiplexing Advantage</text>
  
  <rect x="60" y="370" width="780" height="35" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">HTTP/1.1: 6 concurrent connections limit per origin — SSE streams consume slots</text>
  
  <rect x="60" y="410" width="780" height="35" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="433" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">HTTP/2: All streams multiplexed over single TCP connection — no slot contention</text>
  
  <!-- Best For / Not For -->
  <rect x="30" y="440" width="400" height="90" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="230" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">Best For SSE</text>
  <text x="45" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Server-push only (no client&#8594;server)</text>
  <text x="45" y="512" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Auto-reconnect required</text>
  <text x="45" y="529" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Simple deployment (standard HTTP)</text>
  
  <rect x="450" y="440" width="420" height="90" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="660" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">Not For SSE</text>
  <text x="465" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">✗ Bidirectional communication needed</text>
  <text x="465" y="512" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">✗ Low-latency bidirectional (gaming)</text>
  <text x="465" y="529" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">✗ Binary data transfer</text>
</svg>
