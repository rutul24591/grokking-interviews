<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Presence System Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Heartbeat ingestion, status computation, and fan-out delivery</text>
  
  <!-- Clients -->
  <rect x="30" y="100" width="150" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="105" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Clients</text>
  
  <circle cx="70" cy="170" r="20" fill="#dbeafe" stroke="#0284c7"/>
  <text x="70" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">User 1</text>
  
  <circle cx="140" cy="170" r="20" fill="#dbeafe" stroke="#0284c7"/>
  <text x="140" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">User 2</text>
  
  <circle cx="70" cy="230" r="20" fill="#dbeafe" stroke="#0284c7"/>
  <text x="70" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">User 3</text>
  
  <circle cx="140" cy="230" r="20" fill="#dbeafe" stroke="#0284c7"/>
  <text x="140" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">User 4</text>
  
  <!-- Heartbeat arrow -->
  <path d="M 180 190 L 240 190" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="210" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#0369a1">Heartbeat</text>
  <text x="210" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#0369a1">every 30s</text>
  
  <!-- Gateway Servers -->
  <rect x="240" y="120" width="160" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Gateway Servers</text>
  <text x="320" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Stateless ingestion</text>
  <text x="320" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Write to Redis (TTL)</text>
  <text x="320" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Publish to Pub/Sub</text>
  
  <!-- Arrow to Redis -->
  <path d="M 400 190 L 460 190" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Redis -->
  <rect x="460" y="140" width="140" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Redis</text>
  <text x="530" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Presence keys</text>
  <text x="530" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">(TTL = 90s)</text>
  
  <!-- Arrow to Status Service -->
  <path d="M 600 190 L 660 190" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- Status Computation -->
  <rect x="660" y="140" width="140" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="730" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b21a8">Status Service</text>
  <text x="730" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7e22ce">Compute online/offline</text>
  <text x="730" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7e22ce">from session count</text>
  
  <!-- Arrow to Pub/Sub -->
  <path d="M 730 240 L 730 290 L 530 290 L 530 330" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)" fill="none"/>
  
  <!-- Pub/Sub -->
  <rect x="460" y="330" width="140" height="80" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="530" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b21a8">Pub/Sub</text>
  <text x="530" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7e22ce">Redis Pub/Sub / Kafka</text>
  
  <!-- Arrow back to Gateway -->
  <path d="M 460 370 L 400 370 L 400 260" stroke="#a855f7" stroke-width="2.5" marker-end="url(#arrow-purple)" fill="none"/>
  
  <!-- Subscribers -->
  <rect x="240" y="280" width="160" height="100" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="320" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">Subscribers</text>
  <text x="320" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Receive presence updates</text>
  <text x="320" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">via WebSocket</text>
  
  <!-- Multi-device merging -->
  <rect x="30" y="410" width="400" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Multi-Device Presence Merging</text>
  
  <rect x="50" y="460" width="360" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="485" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">User has 3 sessions: Phone (active), Laptop (idle), Tablet (away)</text>
  <text x="65" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Merged status: online (highest priority session wins)</text>
  
  <!-- Priority legend -->
  <rect x="450" y="410" width="420" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="660" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Status Priority Order</text>
  
  <rect x="465" y="460" width="390" height="60" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="480" y="485" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">1. online (active interaction)</text>
  <text x="480" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">2. idle (no interaction &gt;5min)</text>
  <text x="480" y="525" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">3. away (no interaction &gt;30min)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
