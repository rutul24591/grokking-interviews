<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Presence Delivery Patterns</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Real-time push, batched delivery, and lazy evaluation</text>
  
  <!-- Pattern 1: Real-time Push -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Real-time Push</text>
  
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- WebSocket connection -->
  <rect x="65" y="175" width="200" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="165" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">WebSocket Connection</text>
  
  <path d="M 165 215 L 165 240" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="85" y="240" width="160" height="35" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="165" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Presence update pushed</text>
  
  <text x="165" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Use when: Actively viewed context</text>
  
  <!-- Pattern 2: Batched Delivery -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Batched Delivery</text>
  
  <rect x="335" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Queue -->
  <rect x="350" y="175" width="200" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Event Queue (buffer)</text>
  
  <path d="M 450 215 L 450 240" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  
  <rect x="370" y="240" width="160" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Batch sent every 5s</text>
  
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Use when: Background context</text>
  
  <!-- Pattern 3: Lazy Evaluation -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Lazy Evaluation</text>
  
  <rect x="620" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- On-demand fetch -->
  <rect x="635" y="175" width="200" height="40" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="735" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">On-demand API call</text>
  
  <path d="M 735 215 L 735 240" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  
  <rect x="655" y="240" width="160" height="35" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="735" y="262" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Presence fetched on view</text>
  
  <text x="735" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Use when: Off-screen users</text>
  
  <!-- Tiered Delivery Strategy -->
  <rect x="30" y="320" width="840" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Tiered Delivery Strategy</text>
  
  <rect x="50" y="370" width="800" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Actively Viewed &#8594; Real-time Push | Background Tabs &#8594; Batched (5s) | Off-screen &#8594; Lazy (on-demand)</text>
  
  <!-- Grace Period -->
  <rect x="30" y="440" width="400" height="90" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="230" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Grace Period for Offline Transition</text>
  
  <rect x="50" y="490" width="360" height="30" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="230" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Wait 5-10s before showing offline (prevents flicker)</text>
  
  <!-- Heartbeat Timeout -->
  <rect x="450" y="440" width="420" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Heartbeat Timeout Strategy</text>
  
  <rect x="465" y="490" width="390" height="30" rx="4" fill="#fef3c7" stroke="#fde68a"/>
  <text x="660" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Offline = No heartbeat for 2-3× heartbeat interval (60-90s for 30s heartbeat)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
