<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">WebSocket Scaling Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Load balancing, pub/sub backbone, and cross-node message routing</text>
  
  <!-- Clients -->
  <rect x="30" y="100" width="180" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Clients</text>
  
  <circle cx="80" cy="165" r="15" fill="#dbeafe" stroke="#0284c7"/>
  <text x="80" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">C1</text>
  
  <circle cx="120" cy="165" r="15" fill="#dbeafe" stroke="#0284c7"/>
  <text x="120" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">C2</text>
  
  <circle cx="160" cy="165" r="15" fill="#dbeafe" stroke="#0284c7"/>
  <text x="160" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">C3</text>
  
  <circle cx="80" cy="210" r="15" fill="#dbeafe" stroke="#0284c7"/>
  <text x="80" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">C4</text>
  
  <circle cx="120" cy="210" r="15" fill="#dbeafe" stroke="#0284c7"/>
  <text x="120" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">C5</text>
  
  <circle cx="160" cy="210" r="15" fill="#dbeafe" stroke="#0284c7"/>
  <text x="160" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">C6</text>
  
  <text x="120" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Thousands of connections</text>
  
  <!-- Arrow to Load Balancer -->
  <path d="M 210 190 L 250 190" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Load Balancer -->
  <rect x="250" y="140" width="140" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Load Balancer</text>
  <text x="320" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Layer 4 (TCP) or</text>
  <text x="320" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Layer 7 (WebSocket-aware)</text>
  
  <!-- Arrows to WebSocket Servers -->
  <path d="M 390 160 L 430 140" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  <path d="M 390 190 L 430 190" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  <path d="M 390 220 L 430 240" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- WebSocket Server 1 -->
  <rect x="430" y="100" width="140" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="500" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">WS Server 1</text>
  <text x="500" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">50K-100K connections</text>
  <text x="500" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">(file descriptors)</text>
  
  <!-- WebSocket Server 2 -->
  <rect x="430" y="220" width="140" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="500" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">WS Server 2</text>
  <text x="500" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">50K-100K connections</text>
  <text x="500" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">(file descriptors)</text>
  
  <!-- Arrows to Pub/Sub -->
  <path d="M 570 150 L 610 150" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  <path d="M 570 270 L 610 270" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- Pub/Sub Backbone -->
  <rect x="610" y="180" width="160" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="690" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Pub/Sub Backbone</text>
  <text x="690" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">Redis / NATS / Kafka</text>
  <text x="690" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">Cross-node messaging</text>
  
  <!-- Arrows from Pub/Sub -->
  <path d="M 770 200 L 810 180" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  <path d="M 770 260 L 810 280" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  
  <!-- Message Routing Example -->
  <rect x="30" y="310" width="840" height="220" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Cross-Node Message Routing Example</text>
  
  <!-- C1 wants to send to C5 -->
  <text x="50" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475560">Scenario: Client C1 (Server 1) sends message to C5 (Server 2)</text>
  
  <!-- Step 1 -->
  <rect x="50" y="385" width="800" height="35" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="65" y="408" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">1. C1 sends message to WS Server 1</text>
  
  <!-- Step 2 -->
  <rect x="50" y="425" width="800" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="65" y="448" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">2. Server 1 publishes to Pub/Sub channel for C5</text>
  
  <!-- Step 3 -->
  <rect x="50" y="465" width="800" height="35" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="65" y="488" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">3. Server 2 (subscribed to C5 channel) receives message</text>
  
  <!-- Step 4 -->
  <rect x="50" y="505" width="800" height="35" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="65" y="528" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">4. Server 2 delivers message to C5 via WebSocket</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
