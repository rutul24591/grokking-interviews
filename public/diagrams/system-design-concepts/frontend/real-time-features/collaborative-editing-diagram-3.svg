<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Collaborative Editing Architecture Comparison</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Centralized (Google Docs) vs Decentralized (Figma) approaches</text>
  
  <!-- Centralized (OT) -->
  <rect x="30" y="100" width="400" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="230" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Centralized (OT - Google Docs)</text>
  
  <rect x="50" y="155" width="360" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- Central server -->
  <rect x="150" y="175" width="100" height="80" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="200" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0369a1">Central</text>
  <text x="200" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0369a1">Server</text>
  <text x="200" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Orders operations</text>
  
  <!-- Clients -->
  <circle cx="80" cy="215" r="25" fill="#dbeafe" stroke="#0284c7"/>
  <text x="80" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">A</text>
  
  <circle cx="320" cy="190" r="25" fill="#dbeafe" stroke="#0284c7"/>
  <text x="320" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">B</text>
  
  <circle cx="320" cy="240" r="25" fill="#dbeafe" stroke="#0284c7"/>
  <text x="320" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">C</text>
  
  <!-- Arrows to server -->
  <path d="M 105 215 L 150 215" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  <path d="M 295 200 L 250 200" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  <path d="M 295 230 L 250 225" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <text x="230" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">✓ Simple conflict resolution</text>
  <text x="230" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Single point of failure</text>
  
  <!-- Decentralized (CRDT) -->
  <rect x="470" y="100" width="400" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Decentralized (CRDT - Figma)</text>
  
  <rect x="490" y="155" width="360" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Peers -->
  <circle cx="550" cy="200" r="30" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="550" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">A</text>
  
  <circle cx="670" cy="170" r="30" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="670" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">B</text>
  
  <circle cx="790" cy="200" r="30" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="790" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">C</text>
  
  <!-- Peer connections -->
  <path d="M 580 190 L 640 180" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 700 180 L 760 190" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 580 210 L 670 250 L 760 210" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4"/>
  
  <text x="670" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">✓ Works offline, P2P</text>
  <text x="670" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Higher memory overhead</text>
  
  <!-- Hybrid Approach -->
  <rect x="30" y="350" width="840" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="450" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Hybrid Approach (Notion, etc.)</text>
  
  <rect x="50" y="395" width="800" height="25" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="450" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">CRDT for text blocks + Central server for document structure and permissions</text>
  
  <!-- Performance Comparison -->
  <rect x="30" y="450" width="400" height="80" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="230" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0c4a6e">Latency</text>
  
  <rect x="50" y="495" width="360" height="25" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="230" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">OT: Round-trip to server | CRDT: Local apply, async broadcast</text>
  
  <rect x="450" y="450" width="420" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Scaling</text>
  
  <rect x="465" y="495" width="390" height="25" rx="4" fill="#fef3c7" stroke="#fde68a"/>
  <text x="660" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">OT: Scale server | CRDT: P2P or relay (mediasoup, Liveblocks)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
  </defs>
</svg>
