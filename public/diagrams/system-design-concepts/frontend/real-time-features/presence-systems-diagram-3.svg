<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Presence System: State Transitions</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Online, idle, away, offline states with grace periods</text>
  
  <!-- State Machine -->
  <rect x="30" y="100" width="840" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Presence State Machine</text>
  
  <!-- Online State -->
  <rect x="80" y="155" width="120" height="80" rx="40" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
  <text x="140" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15803d">online</text>
  <text x="140" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Active interaction</text>
  
  <!-- Idle State -->
  <path d="M 200 195 L 280 195" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="240" y="187" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">5 min inactive</text>
  
  <rect x="280" y="155" width="120" height="80" rx="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="340" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">idle</text>
  <text x="340" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">No interaction</text>
  
  <!-- Away State -->
  <path d="M 400 195 L 480 195" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="440" y="187" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">30 min total</text>
  
  <rect x="480" y="155" width="120" height="80" rx="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" stroke-dasharray="4,4"/>
  <text x="540" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">away</text>
  <text x="540" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Extended absence</text>
  
  <!-- Offline State -->
  <path d="M 600 195 L 680 195" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="640" y="187" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">90 min / TTL</text>
  
  <rect x="680" y="155" width="120" height="80" rx="40" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="740" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#b91c1c">offline</text>
  <text x="740" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">No heartbeat</text>
  
  <!-- Reconnect path -->
  <path d="M 140 235 L 140 280 L 740 280 L 740 235" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-green)" fill="none"/>
  <text x="440" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Heartbeat received &#8594; online</text>
  
  <!-- Grace Period Detail -->
  <rect x="30" y="320" width="400" height="110" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="230" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Grace Period (Prevents Flicker)</text>
  
  <rect x="50" y="370" width="360" height="50" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="65" y="395" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Connection drops &#8594; Start 5-10s timer</text>
  <text x="65" y="412" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Reconnect within timer &#8594; Never showed offline</text>
  
  <!-- Multi-Device Merging -->
  <rect x="450" y="320" width="420" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Multi-Device State Merging</text>
  
  <rect x="465" y="370" width="390" height="50" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="480" y="395" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Phone: active | Laptop: idle | Tablet: away</text>
  <text x="480" y="412" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">&#8594; Merged: online (highest priority wins)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
