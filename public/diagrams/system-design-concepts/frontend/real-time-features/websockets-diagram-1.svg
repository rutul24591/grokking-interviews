<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">WebSocket Connection Lifecycle</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">HTTP upgrade handshake, bidirectional messaging, and connection close</text>
  
  <!-- Client -->
  <rect x="50" y="120" width="150" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="125" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Client</text>
  <text x="125" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Browser/App</text>
  
  <!-- Arrow to Server -->
  <path d="M 200 170 L 300 170" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="250" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0369a1">1. HTTP Upgrade</text>
  
  <!-- Server -->
  <rect x="300" y="120" width="150" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="375" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Server</text>
  <text x="375" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">WebSocket Server</text>
  
  <!-- Arrow back to Client -->
  <path d="M 300 190 L 200 190" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="250" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b45309">2. 101 Switching</text>
  
  <!-- WebSocket Connection -->
  <rect x="200" y="250" width="500" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="450" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Persistent WebSocket Connection</text>
  <text x="450" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Full-duplex, bidirectional messaging</text>
  
  <!-- Client to Server message -->
  <path d="M 220 320 L 680 320" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  <text x="450" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Client to Server messages</text>
  
  <!-- Server to Client message -->
  <path d="M 680 350 L 220 350" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  <text x="450" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Server to Client messages</text>
  
  <!-- Connection Close -->
  <path d="M 700 170 L 800 170" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="750" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">3. Close Frame</text>
  
  <!-- Closed State -->
  <rect x="800" y="120" width="80" height="100" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="840" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Closed</text>
  
  <!-- Handshake Detail Box -->
  <rect x="50" y="400" width="400" height="130" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="250" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">HTTP Upgrade Handshake</text>
  
  <rect x="65" y="450" width="370" height="70" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="80" y="475" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#475560">Client Request:</text>
  <text x="80" y="490" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">GET /chat HTTP/1.1</text>
  <text x="80" y="505" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">Upgrade: websocket</text>
  <text x="200" y="475" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#475560">Server Response:</text>
  <text x="200" y="490" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">HTTP/1.1 101 Switching</text>
  <text x="200" y="505" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">Upgrade: websocket</text>
  
  <!-- Frame Format Box -->
  <rect x="470" y="400" width="380" height="130" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="660" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">WebSocket Frame Format</text>
  
  <rect x="485" y="450" width="350" height="70" rx="6" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="500" y="475" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">[FIN:1][RSV:3][Opcode:4]</text>
  <text x="500" y="490" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">[MASK:1][PayloadLen:7]</text>
  <text x="500" y="505" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">[MaskingKey][PayloadData]</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
