<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Progressive Hydration — Priority Orchestration</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
  </defs>

  <!-- Page Loads -->
  <rect x="340" y="55" width="220" height="46" rx="10" fill="#6d5bd0"/>
  <text x="450" y="75" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Page Loads</text>
  <text x="450" y="93" text-anchor="middle" font-size="11" fill="#edeaf5">Full HTML rendered, JS starts</text>

  <!-- Arrow down -->
  <line x1="450" y1="101" x2="450" y2="125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Hydration Orchestrator -->
  <rect x="315" y="125" width="270" height="50" rx="10" fill="#1a1822"/>
  <text x="450" y="146" text-anchor="middle" font-size="13" fill="#edeaf5" font-weight="bold">Hydration Orchestrator</text>
  <text x="450" y="165" text-anchor="middle" font-size="11" fill="#d7d1e6">Analyzes components, assigns priorities</text>

  <!-- Five branch arrows -->
  <line x1="310" y1="175" x2="100" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="340" y1="175" x2="240" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="450" y1="175" x2="450" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="560" y1="175" x2="660" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="175" x2="810" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Priority boxes -->
  <!-- 1: Immediate (Critical) -->
  <rect x="20" y="220" width="150" height="70" rx="8" fill="#6d5bd0"/>
  <text x="95" y="242" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Immediate</text>
  <text x="95" y="258" text-anchor="middle" font-size="10" fill="#edeaf5">(Critical)</text>
  <text x="95" y="275" text-anchor="middle" font-size="10" fill="#edeaf5">React.hydrate()</text>
  <text x="95" y="285" text-anchor="middle" font-size="9" fill="#edeaf5">on page load</text>

  <!-- 2: On Scroll -->
  <rect x="185" y="220" width="150" height="70" rx="8" fill="#d97843"/>
  <text x="260" y="242" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">On Scroll</text>
  <text x="260" y="258" text-anchor="middle" font-size="10" fill="#fff">(Visibility)</text>
  <text x="260" y="275" text-anchor="middle" font-size="10" fill="#fff">IntersectionObserver</text>
  <text x="260" y="285" text-anchor="middle" font-size="9" fill="#fff">threshold: 0.1</text>

  <!-- 3: On Idle -->
  <rect x="370" y="220" width="160" height="70" rx="8" fill="#d97843" opacity="0.75"/>
  <text x="450" y="242" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">On Idle</text>
  <text x="450" y="258" text-anchor="middle" font-size="10" fill="#fff">(Low priority)</text>
  <text x="450" y="275" text-anchor="middle" font-size="10" fill="#fff">requestIdleCallback</text>
  <text x="450" y="285" text-anchor="middle" font-size="9" fill="#fff">{ timeout: 2000 }</text>

  <!-- 4: On Interaction -->
  <rect x="550" y="220" width="160" height="70" rx="8" fill="#d97843" opacity="0.55"/>
  <text x="630" y="242" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">On Interaction</text>
  <text x="630" y="258" text-anchor="middle" font-size="10" fill="#fff">(Lazy)</text>
  <text x="630" y="275" text-anchor="middle" font-size="10" fill="#fff">addEventListener</text>
  <text x="630" y="285" text-anchor="middle" font-size="9" fill="#fff">click / mouseover</text>

  <!-- 5: Never -->
  <rect x="730" y="220" width="150" height="70" rx="8" fill="#d7d1e6"/>
  <text x="805" y="242" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Never</text>
  <text x="805" y="258" text-anchor="middle" font-size="10" fill="#1a1822">(Static)</text>
  <text x="805" y="275" text-anchor="middle" font-size="10" fill="#1a1822">No JS attached</text>
  <text x="805" y="285" text-anchor="middle" font-size="9" fill="#1a1822">Pure HTML/CSS</text>

  <!-- Component examples below each -->
  <line x1="95" y1="290" x2="95" y2="320" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="20" y="320" width="150" height="80" rx="6" fill="#fff" stroke="#6d5bd0"/>
  <text x="95" y="340" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="bold">Components:</text>
  <text x="95" y="358" text-anchor="middle" font-size="11" fill="#1a1822">• Header/Nav</text>
  <text x="95" y="374" text-anchor="middle" font-size="11" fill="#1a1822">• Hero section</text>
  <text x="95" y="390" text-anchor="middle" font-size="11" fill="#1a1822">• CTA buttons</text>

  <line x1="260" y1="290" x2="260" y2="320" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="185" y="320" width="150" height="80" rx="6" fill="#fff" stroke="#d97843"/>
  <text x="260" y="340" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Components:</text>
  <text x="260" y="358" text-anchor="middle" font-size="11" fill="#1a1822">• Content cards</text>
  <text x="260" y="374" text-anchor="middle" font-size="11" fill="#1a1822">• Image carousel</text>
  <text x="260" y="390" text-anchor="middle" font-size="11" fill="#1a1822">• Below-fold UI</text>

  <line x1="450" y1="290" x2="450" y2="320" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="370" y="320" width="160" height="80" rx="6" fill="#fff" stroke="#d97843"/>
  <text x="450" y="340" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Components:</text>
  <text x="450" y="358" text-anchor="middle" font-size="11" fill="#1a1822">• Analytics</text>
  <text x="450" y="374" text-anchor="middle" font-size="11" fill="#1a1822">• Social widgets</text>
  <text x="450" y="390" text-anchor="middle" font-size="11" fill="#1a1822">• Chat widget</text>

  <line x1="630" y1="290" x2="630" y2="320" stroke="#d97843" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="550" y="320" width="160" height="80" rx="6" fill="#fff" stroke="#d97843"/>
  <text x="630" y="340" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Components:</text>
  <text x="630" y="358" text-anchor="middle" font-size="11" fill="#1a1822">• Modal dialogs</text>
  <text x="630" y="374" text-anchor="middle" font-size="11" fill="#1a1822">• Dropdown menus</text>
  <text x="630" y="390" text-anchor="middle" font-size="11" fill="#1a1822">• Tooltips</text>

  <line x1="805" y1="290" x2="805" y2="320" stroke="#d7d1e6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="730" y="320" width="150" height="80" rx="6" fill="#fff" stroke="#d7d1e6"/>
  <text x="805" y="340" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Components:</text>
  <text x="805" y="358" text-anchor="middle" font-size="11" fill="#1a1822">• Static footer</text>
  <text x="805" y="374" text-anchor="middle" font-size="11" fill="#1a1822">• Legal text</text>
  <text x="805" y="390" text-anchor="middle" font-size="11" fill="#1a1822">• Pure content</text>

  <!-- Bottom key insight -->
  <rect x="20" y="418" width="860" height="60" rx="8" fill="#edeaf5" stroke="#6d5bd0"/>
  <text x="450" y="440" text-anchor="middle" font-size="12" fill="#6d5bd0" font-weight="bold">Result: Only critical components block interactivity.</text>
  <text x="450" y="458" text-anchor="middle" font-size="11" fill="#1a1822">Lower-priority components hydrate progressively — users can interact with the page much sooner.</text>
  <text x="450" y="472" text-anchor="middle" font-size="11" fill="#1a1822">JS bundle size per hydration is small, reducing main-thread blocking and improving TTI significantly.</text>
</svg>
