<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Streaming SSR — Architecture &amp; Suspense Flow</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
  </defs>

  <!-- Left: User Request -->
  <rect x="20" y="215" width="100" height="50" rx="10" fill="#6d5bd0"/>
  <text x="70" y="237" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">User</text>
  <text x="70" y="255" text-anchor="middle" font-size="11" fill="#edeaf5">Request</text>
  <line x1="120" y1="240" x2="150" y2="240" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Server processing box -->
  <rect x="150" y="90" width="380" height="360" rx="12" fill="#fff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="340" y="118" text-anchor="middle" font-size="13" fill="#6d5bd0" font-weight="bold">Server (React renderToPipeableStream)</text>

  <!-- Shell HTML (immediate) -->
  <rect x="165" y="130" width="350" height="50" rx="8" fill="#2f9d74"/>
  <text x="340" y="151" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">HTML Shell Sent Immediately</text>
  <text x="340" y="168" text-anchor="middle" font-size="11" fill="#e8f5f0">&amp;lt;html&amp;gt;&amp;lt;head&amp;gt;...&amp;lt;/head&amp;gt;&amp;lt;body&amp;gt;&amp;lt;div id="root"&amp;gt;</text>

  <!-- Suspense Boundary 1 -->
  <rect x="165" y="195" width="350" height="80" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="340" y="218" text-anchor="middle" font-size="12" fill="#6d5bd0" font-weight="bold">Suspense Boundary 1</text>
  <text x="340" y="238" text-anchor="middle" font-size="11" fill="#1a1822">fallback: &amp;lt;NavSkeleton /&amp;gt;</text>
  <text x="340" y="255" text-anchor="middle" font-size="10" fill="#6d5bd0">→ Streams &amp;lt;Nav&amp;gt; when ready (~200ms)</text>
  <text x="340" y="270" text-anchor="middle" font-size="10" fill="#6d5bd0">→ Injects via script tag out-of-order</text>

  <!-- Suspense Boundary 2 -->
  <rect x="165" y="288" width="350" height="80" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="340" y="312" text-anchor="middle" font-size="12" fill="#6d5bd0" font-weight="bold">Suspense Boundary 2</text>
  <text x="340" y="332" text-anchor="middle" font-size="11" fill="#1a1822">fallback: &amp;lt;ArticleSkeleton /&amp;gt;</text>
  <text x="340" y="349" text-anchor="middle" font-size="10" fill="#6d5bd0">→ Streams &amp;lt;Article&amp;gt; when DB returns (~500ms)</text>
  <text x="340" y="365" text-anchor="middle" font-size="10" fill="#6d5bd0">→ Replaces skeleton in-place</text>

  <!-- Closing HTML -->
  <rect x="165" y="380" width="350" height="40" rx="8" fill="#2f9d74" opacity="0.7"/>
  <text x="340" y="395" text-anchor="middle" font-size="11" fill="#fff">Closing: &amp;lt;/body&amp;gt;&amp;lt;/html&amp;gt;</text>
  <text x="340" y="410" text-anchor="middle" font-size="10" fill="#fff">Stream ends — JS hydration begins</text>

  <!-- Arrow from server to browser -->
  <line x1="530" y1="240" x2="570" y2="240" stroke="#2f9d74" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="550" y="232" text-anchor="middle" font-size="10" fill="#2f9d74">chunks</text>

  <!-- Browser rendering column -->
  <rect x="570" y="90" width="305" height="360" rx="12" fill="#fff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="722" y="118" text-anchor="middle" font-size="13" fill="#6d5bd0" font-weight="bold">Browser Rendering</text>

  <rect x="585" y="130" width="275" height="46" rx="8" fill="#2f9d74"/>
  <text x="722" y="151" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Receives shell → Renders HTML</text>
  <text x="722" y="167" text-anchor="middle" font-size="11" fill="#e8f5f0">FCP — user sees skeleton UI</text>

  <rect x="585" y="190" width="275" height="50" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="722" y="210" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Receives Boundary 1 content</text>
  <text x="722" y="228" text-anchor="middle" font-size="11" fill="#6d5bd0">Nav appears, replaces skeleton</text>

  <rect x="585" y="254" width="275" height="50" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="722" y="274" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Receives Boundary 2 content</text>
  <text x="722" y="292" text-anchor="middle" font-size="11" fill="#6d5bd0">Article appears with DB data</text>

  <rect x="585" y="318" width="275" height="50" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="722" y="338" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Stream ends</text>
  <text x="722" y="356" text-anchor="middle" font-size="11" fill="#6d5bd0">JS arrives → hydration begins</text>

  <rect x="585" y="380" width="275" height="40" rx="8" fill="#6d5bd0"/>
  <text x="722" y="397" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">Fully interactive — TTI</text>
  <text x="722" y="412" text-anchor="middle" font-size="11" fill="#edeaf5">All components hydrated</text>

  <!-- HTTP note -->
  <rect x="20" y="60" width="130" height="42" rx="6" fill="#1a1822"/>
  <text x="85" y="78" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">HTTP Response:</text>
  <text x="85" y="93" text-anchor="middle" font-size="10" fill="#d7d1e6">Transfer-Encoding:</text>
  <text x="85" y="103" text-anchor="middle" font-size="10" fill="#2f9d74">chunked</text>
</svg>
