<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">SSG vs SSR vs CSR — Attribute Comparison</text>

  <!-- Header row -->
  <rect x="20" y="58" width="860" height="40" rx="8" fill="#6d5bd0"/>
  <text x="160" y="83" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">Metric</text>
  <text x="380" y="83" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">SSG</text>
  <text x="560" y="83" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">SSR</text>
  <text x="750" y="83" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">CSR</text>

  <!-- Column separators -->
  <line x1="280" y1="58" x2="280" y2="460" stroke="#d7d1e6" stroke-width="1.5"/>
  <line x1="460" y1="58" x2="460" y2="460" stroke="#d7d1e6" stroke-width="1.5"/>
  <line x1="650" y1="58" x2="650" y2="460" stroke="#d7d1e6" stroke-width="1.5"/>

  <!-- Row 1: Build Time -->
  <rect x="20" y="98" width="860" height="50" rx="0" fill="#fff"/>
  <text x="160" y="128" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Build Time</text>
  <rect x="295" y="108" width="150" height="28" rx="6" fill="#d97843"/>
  <text x="370" y="126" text-anchor="middle" font-size="11" fill="#fff">Long (pre-renders all pages)</text>
  <rect x="475" y="108" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="550" y="126" text-anchor="middle" font-size="11" fill="#fff">Minimal</text>
  <rect x="665" y="108" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="740" y="126" text-anchor="middle" font-size="11" fill="#fff">Minimal</text>

  <!-- Row 2: Runtime Cost -->
  <rect x="20" y="148" width="860" height="50" rx="0" fill="#edeaf5"/>
  <text x="160" y="178" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Runtime Cost</text>
  <rect x="295" y="158" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="370" y="176" text-anchor="middle" font-size="11" fill="#fff">Very Low (CDN serves)</text>
  <rect x="475" y="158" width="150" height="28" rx="6" fill="#d97843"/>
  <text x="550" y="176" text-anchor="middle" font-size="11" fill="#fff">High (server per request)</text>
  <rect x="665" y="158" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="740" y="176" text-anchor="middle" font-size="11" fill="#fff">Low (client renders)</text>

  <!-- Row 3: TTFB -->
  <rect x="20" y="198" width="860" height="50" rx="0" fill="#fff"/>
  <text x="160" y="228" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">TTFB</text>
  <rect x="295" y="208" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="370" y="226" text-anchor="middle" font-size="11" fill="#fff">~10-50ms (CDN edge)</text>
  <rect x="475" y="208" width="150" height="28" rx="6" fill="#d97843"/>
  <text x="550" y="226" text-anchor="middle" font-size="11" fill="#fff">200-800ms (server)</text>
  <rect x="665" y="208" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="740" y="226" text-anchor="middle" font-size="11" fill="#fff">~50-100ms (CDN)</text>

  <!-- Row 4: SEO -->
  <rect x="20" y="248" width="860" height="50" rx="0" fill="#edeaf5"/>
  <text x="160" y="278" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">SEO</text>
  <rect x="295" y="258" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="370" y="276" text-anchor="middle" font-size="11" fill="#fff">Excellent (full HTML)</text>
  <rect x="475" y="258" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="550" y="276" text-anchor="middle" font-size="11" fill="#fff">Excellent (full HTML)</text>
  <rect x="665" y="258" width="150" height="28" rx="6" fill="#d97843"/>
  <text x="740" y="276" text-anchor="middle" font-size="11" fill="#fff">Poor (empty shell)</text>

  <!-- Row 5: Data Freshness -->
  <rect x="20" y="298" width="860" height="50" rx="0" fill="#fff"/>
  <text x="160" y="328" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Data Freshness</text>
  <rect x="295" y="308" width="150" height="28" rx="6" fill="#d97843"/>
  <text x="370" y="326" text-anchor="middle" font-size="11" fill="#fff">Stale (until rebuild)</text>
  <rect x="475" y="308" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="550" y="326" text-anchor="middle" font-size="11" fill="#fff">Always fresh</text>
  <rect x="665" y="308" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="740" y="326" text-anchor="middle" font-size="11" fill="#fff">Always fresh</text>

  <!-- Row 6: Scalability -->
  <rect x="20" y="348" width="860" height="50" rx="0" fill="#edeaf5"/>
  <text x="160" y="378" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Scalability</text>
  <rect x="295" y="358" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="370" y="376" text-anchor="middle" font-size="11" fill="#fff">Infinite (CDN)</text>
  <rect x="475" y="358" width="150" height="28" rx="6" fill="#d97843"/>
  <text x="550" y="376" text-anchor="middle" font-size="11" fill="#fff">Limited (server capacity)</text>
  <rect x="665" y="358" width="150" height="28" rx="6" fill="#2f9d74"/>
  <text x="740" y="376" text-anchor="middle" font-size="11" fill="#fff">High (client-side)</text>

  <!-- Legend -->
  <rect x="20" y="420" width="860" height="36" rx="6" fill="#fff" stroke="#d7d1e6"/>
  <rect x="35" y="432" width="14" height="14" rx="3" fill="#2f9d74"/>
  <text x="56" y="443" font-size="11" fill="#1a1822">Advantage</text>
  <rect x="155" y="432" width="14" height="14" rx="3" fill="#d97843"/>
  <text x="176" y="443" font-size="11" fill="#1a1822">Disadvantage</text>
  <text x="450" y="443" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="bold">SSG is ideal for content that doesn't change frequently (blogs, docs, marketing)</text>
</svg>
