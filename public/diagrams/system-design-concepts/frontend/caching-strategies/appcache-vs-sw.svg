<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">AppCache vs Service Workers</text>

  <!-- Left Panel: AppCache (Deprecated) -->
  <rect x="30" y="56" width="410" height="424" rx="8" fill="#fff" stroke="#d97843" stroke-width="2"/>
  <rect x="30" y="56" width="410" height="40" rx="8" fill="#d97843"/>
  <rect x="30" y="80" width="410" height="16" fill="#d97843"/>
  <text x="235" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">AppCache (Deprecated)</text>
  <text x="390" y="82" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">REMOVED</text>

  <!-- AppCache items -->
  <rect x="50" y="116" width="370" height="52" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1"/>
  <text x="66" y="138" font-size="13" font-weight="600" fill="#1a1822">Declarative Manifest</text>
  <text x="66" y="156" font-size="11" fill="#555">Static text file. No conditional logic possible.</text>

  <rect x="50" y="182" width="370" height="52" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1"/>
  <text x="66" y="204" font-size="13" font-weight="600" fill="#1a1822">All-or-Nothing Cache</text>
  <text x="66" y="222" font-size="11" fill="#555">Any change re-downloads everything. No partial updates.</text>

  <rect x="50" y="248" width="370" height="52" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1"/>
  <text x="66" y="270" font-size="13" font-weight="600" fill="#1a1822">Opaque Update Cycle</text>
  <text x="66" y="288" font-size="11" fill="#555">Double-reload required. Users always one version behind.</text>

  <rect x="50" y="314" width="370" height="52" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1"/>
  <text x="66" y="336" font-size="13" font-weight="600" fill="#1a1822">No Runtime Control</text>
  <text x="66" y="354" font-size="11" fill="#555">Cannot vary behavior by request type, user, or network.</text>

  <rect x="50" y="380" width="370" height="52" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1"/>
  <text x="66" y="402" font-size="13" font-weight="600" fill="#1a1822">Implicit Master Entries</text>
  <text x="66" y="420" font-size="11" fill="#555">Pages auto-cached with no opt-out. Silent stale serving.</text>

  <!-- Right Panel: Service Workers (Modern) -->
  <rect x="460" y="56" width="410" height="424" rx="8" fill="#fff" stroke="#2f9d74" stroke-width="2"/>
  <rect x="460" y="56" width="410" height="40" rx="8" fill="#2f9d74"/>
  <rect x="460" y="80" width="410" height="16" fill="#2f9d74"/>
  <text x="665" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">Service Workers (Modern)</text>
  <text x="820" y="82" text-anchor="middle" font-size="10" fill="#fff" opacity="0.9">STANDARD</text>

  <!-- Service Worker items -->
  <rect x="480" y="116" width="370" height="52" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="496" y="138" font-size="13" font-weight="600" fill="#1a1822">Programmatic Cache API</text>
  <text x="496" y="156" font-size="11" fill="#555">Full JavaScript control. Arbitrary logic per request.</text>

  <rect x="480" y="182" width="370" height="52" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="496" y="204" font-size="13" font-weight="600" fill="#1a1822">Granular Control</text>
  <text x="496" y="222" font-size="11" fill="#555">Add, update, or delete individual cache entries.</text>

  <rect x="480" y="248" width="370" height="52" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="496" y="270" font-size="13" font-weight="600" fill="#1a1822">Transparent Lifecycle</text>
  <text x="496" y="288" font-size="11" fill="#555">install → activate → fetch. skipWaiting() for instant updates.</text>

  <rect x="480" y="314" width="370" height="52" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="496" y="336" font-size="13" font-weight="600" fill="#1a1822">Full Fetch Interception</text>
  <text x="496" y="354" font-size="11" fill="#555">Intercept all requests. Modify, forge, or route responses.</text>

  <rect x="480" y="380" width="370" height="52" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="496" y="402" font-size="13" font-weight="600" fill="#1a1822">DevTools Integration</text>
  <text x="496" y="420" font-size="11" fill="#555">Cache inspector, network panel, source debugging, logging.</text>

  <!-- Center arrow -->
  <line x1="445" y1="240" x2="455" y2="240" stroke="#6d5bd0" stroke-width="2"/>
  <polygon points="455,234 467,240 455,246" fill="#6d5bd0"/>
  <text x="456" y="265" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600" transform="rotate(-90, 456, 265)">REPLACED BY</text>
</svg>
