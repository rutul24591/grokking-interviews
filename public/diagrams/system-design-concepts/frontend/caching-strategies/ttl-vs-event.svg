<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">TTL-Based vs Event-Driven Invalidation Timeline</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97843"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2f9d74"/>
    </marker>
  </defs>

  <!-- === TTL-BASED SECTION === -->
  <rect x="30" y="50" width="840" height="185" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1"/>
  <text x="50" y="72" font-size="14" font-weight="bold" fill="#6d5bd0">TTL-Based Invalidation</text>

  <!-- Timeline axis -->
  <line x1="80" y1="150" x2="840" y2="150" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="855" y="154" font-size="10" fill="#1a1822">time</text>

  <!-- Time markers -->
  <line x1="120" y1="145" x2="120" y2="155" stroke="#1a1822" stroke-width="1.5"/>
  <text x="120" y="170" text-anchor="middle" font-size="9" fill="#1a1822">t=0</text>
  <text x="120" y="182" text-anchor="middle" font-size="8" fill="#6d5bd0">Cache set</text>

  <line x1="350" y1="145" x2="350" y2="155" stroke="#1a1822" stroke-width="1.5"/>
  <text x="350" y="170" text-anchor="middle" font-size="9" fill="#1a1822">t=45s</text>

  <line x1="450" y1="145" x2="450" y2="155" stroke="#1a1822" stroke-width="1.5"/>
  <text x="450" y="170" text-anchor="middle" font-size="9" fill="#d97843" font-weight="bold">t=60s</text>
  <text x="450" y="182" text-anchor="middle" font-size="8" fill="#d97843">Data changes!</text>

  <line x1="700" y1="145" x2="700" y2="155" stroke="#1a1822" stroke-width="1.5"/>
  <text x="700" y="170" text-anchor="middle" font-size="9" fill="#1a1822">t=120s</text>
  <text x="700" y="182" text-anchor="middle" font-size="8" fill="#2f9d74">TTL expires</text>

  <line x1="780" y1="145" x2="780" y2="155" stroke="#1a1822" stroke-width="1.5"/>
  <text x="780" y="170" text-anchor="middle" font-size="9" fill="#1a1822">t=121s</text>
  <text x="780" y="182" text-anchor="middle" font-size="8" fill="#2f9d74">Fresh data</text>

  <!-- Cache state bars -->
  <!-- Fresh period -->
  <rect x="120" y="95" width="330" height="22" rx="4" fill="#2f9d74"/>
  <text x="285" y="110" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Serving Fresh Data (v1)</text>

  <!-- STALENESS WINDOW - highlighted in orange -->
  <rect x="450" y="95" width="250" height="22" rx="4" fill="#d97843"/>
  <text x="575" y="110" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">STALE! Serving Old Data (v1)</text>

  <!-- Staleness window label -->
  <line x1="450" y1="85" x2="450" y2="75" stroke="#d97843" stroke-width="1"/>
  <line x1="700" y1="85" x2="700" y2="75" stroke="#d97843" stroke-width="1"/>
  <line x1="450" y1="78" x2="700" y2="78" stroke="#d97843" stroke-width="2"/>
  <text x="575" y="72" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">Staleness Window (60 seconds!)</text>

  <!-- Fresh after revalidation -->
  <rect x="700" y="95" width="110" height="22" rx="4" fill="#2f9d74"/>
  <text x="755" y="110" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Fresh (v2)</text>

  <!-- Data change marker -->
  <line x1="450" y1="90" x2="450" y2="200" stroke="#d97843" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- === EVENT-DRIVEN SECTION === -->
  <rect x="30" y="250" width="840" height="185" rx="8" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="50" y="272" font-size="14" font-weight="bold" fill="#2f9d74">Event-Driven Invalidation</text>

  <!-- Timeline axis -->
  <line x1="80" y1="350" x2="840" y2="350" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="855" y="354" font-size="10" fill="#1a1822">time</text>

  <!-- Time markers -->
  <line x1="120" y1="345" x2="120" y2="355" stroke="#1a1822" stroke-width="1.5"/>
  <text x="120" y="370" text-anchor="middle" font-size="9" fill="#1a1822">t=0</text>
  <text x="120" y="382" text-anchor="middle" font-size="8" fill="#6d5bd0">Cache set</text>

  <line x1="350" y1="345" x2="350" y2="355" stroke="#1a1822" stroke-width="1.5"/>
  <text x="350" y="370" text-anchor="middle" font-size="9" fill="#1a1822">t=45s</text>

  <line x1="450" y1="345" x2="450" y2="355" stroke="#1a1822" stroke-width="1.5"/>
  <text x="450" y="370" text-anchor="middle" font-size="9" fill="#d97843" font-weight="bold">t=60s</text>
  <text x="450" y="382" text-anchor="middle" font-size="8" fill="#d97843">Data changes!</text>

  <line x1="475" y1="345" x2="475" y2="355" stroke="#1a1822" stroke-width="1.5"/>
  <text x="475" y="402" text-anchor="middle" font-size="8" fill="#2f9d74">Event received</text>
  <text x="475" y="414" text-anchor="middle" font-size="8" fill="#2f9d74">Cache purged</text>

  <line x1="495" y1="345" x2="495" y2="355" stroke="#1a1822" stroke-width="1.5"/>
  <text x="530" y="370" text-anchor="middle" font-size="9" fill="#1a1822">t=61s</text>
  <text x="530" y="382" text-anchor="middle" font-size="8" fill="#2f9d74">Fresh data</text>

  <!-- Cache state bars -->
  <!-- Fresh period -->
  <rect x="120" y="295" width="330" height="22" rx="4" fill="#2f9d74"/>
  <text x="285" y="310" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Serving Fresh Data (v1)</text>

  <!-- Tiny staleness window -->
  <rect x="450" y="295" width="25" height="22" rx="4" fill="#d97843"/>

  <!-- Fresh after event -->
  <rect x="475" y="295" width="335" height="22" rx="4" fill="#2f9d74"/>
  <text x="642" y="310" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">Serving Fresh Data (v2)</text>

  <!-- Tiny staleness label -->
  <line x1="450" y1="285" x2="450" y2="275" stroke="#d97843" stroke-width="1"/>
  <line x1="475" y1="285" x2="475" y2="275" stroke="#d97843" stroke-width="1"/>
  <line x1="450" y1="278" x2="475" y2="278" stroke="#d97843" stroke-width="2"/>
  <text x="462" y="272" text-anchor="middle" font-size="9" fill="#d97843" font-weight="bold">~1s</text>

  <!-- Data change marker -->
  <line x1="450" y1="290" x2="450" y2="420" stroke="#d97843" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Event arrow -->
  <path d="M 450 320 Q 462 340 475 320" fill="none" stroke="#2f9d74" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="462" y="340" text-anchor="middle" font-size="8" fill="#2f9d74">push</text>

  <!-- Bottom comparison summary -->
  <rect x="30" y="450" width="410" height="40" rx="6" fill="#d97843" opacity="0.15" stroke="#d97843" stroke-width="1"/>
  <text x="235" y="475" text-anchor="middle" font-size="11" fill="#d97843" font-weight="bold">TTL: 60s staleness window — simple but imprecise</text>

  <rect x="460" y="450" width="410" height="40" rx="6" fill="#2f9d74" opacity="0.15" stroke="#2f9d74" stroke-width="1"/>
  <text x="665" y="475" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="bold">Event: ~1s staleness — precise but complex</text>
</svg>
