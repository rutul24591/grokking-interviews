<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">React Query Cache Lifecycle Flow</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Step 1: Component Mounts -->
  <rect x="30" y="60" width="130" height="50" rx="8" fill="#6d5bd0"/>
  <text x="95" y="82" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Component</text>
  <text x="95" y="98" text-anchor="middle" font-size="11" fill="#fff">Mounts</text>

  <!-- Arrow -->
  <line x1="160" y1="85" x2="195" y2="85" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 2: useQuery(key) -->
  <rect x="200" y="60" width="130" height="50" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="265" y="82" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">useQuery(key)</text>
  <text x="265" y="98" text-anchor="middle" font-size="10" fill="#6d5bd0">Called on mount</text>

  <!-- Arrow to decision -->
  <line x1="330" y1="85" x2="375" y2="85" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>

  <!-- Decision: Check Cache -->
  <polygon points="440,55 505,85 440,115 375,85" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="440" y="82" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">Cache</text>
  <text x="440" y="94" text-anchor="middle" font-size="10" fill="#1a1822">Hit?</text>

  <!-- === MISS PATH (down) === -->
  <line x1="440" y1="115" x2="440" y2="155" stroke="#d97843" stroke-width="2" marker-end="url(#ao)"/>
  <text x="455" y="140" font-size="10" fill="#d97843" font-weight="bold">MISS</text>

  <!-- Show Loading -->
  <rect x="375" y="160" width="130" height="45" rx="8" fill="#d97843"/>
  <text x="440" y="180" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Show Loading</text>
  <text x="440" y="196" text-anchor="middle" font-size="10" fill="#fff">isLoading: true</text>

  <!-- Arrow to Fetch -->
  <line x1="440" y1="205" x2="440" y2="240" stroke="#d97843" stroke-width="2" marker-end="url(#ao)"/>

  <!-- Fetch from API -->
  <rect x="375" y="245" width="130" height="45" rx="8" fill="#2f9d74"/>
  <text x="440" y="265" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Fetch from API</text>
  <text x="440" y="281" text-anchor="middle" font-size="10" fill="#fff">GET /api/data</text>

  <!-- Arrow to Update Cache -->
  <line x1="440" y1="290" x2="440" y2="320" stroke="#2f9d74" stroke-width="2" marker-end="url(#ag)"/>

  <!-- Update Cache -->
  <rect x="375" y="325" width="130" height="45" rx="8" fill="#edeaf5" stroke="#2f9d74" stroke-width="2"/>
  <text x="440" y="345" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Update Cache</text>
  <text x="440" y="361" text-anchor="middle" font-size="10" fill="#2f9d74">status: fresh</text>

  <!-- Arrow to re-render -->
  <line x1="440" y1="370" x2="440" y2="400" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>

  <!-- Re-render -->
  <rect x="375" y="405" width="130" height="45" rx="8" fill="#6d5bd0"/>
  <text x="440" y="425" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Re-render</text>
  <text x="440" y="441" text-anchor="middle" font-size="10" fill="#fff">Component with data</text>

  <!-- === HIT PATH (right) === -->
  <line x1="505" y1="85" x2="545" y2="85" stroke="#2f9d74" stroke-width="2" marker-end="url(#ag)"/>
  <text x="525" y="75" font-size="10" fill="#2f9d74" font-weight="bold">HIT</text>

  <!-- Decision: Fresh or Stale? -->
  <polygon points="610,55 675,85 610,115 545,85" fill="#fff" stroke="#2f9d74" stroke-width="2"/>
  <text x="610" y="82" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">Fresh</text>
  <text x="610" y="94" text-anchor="middle" font-size="10" fill="#1a1822">or Stale?</text>

  <!-- FRESH path (right) -->
  <line x1="675" y1="85" x2="715" y2="85" stroke="#2f9d74" stroke-width="2" marker-end="url(#ag)"/>
  <text x="700" y="75" font-size="10" fill="#2f9d74" font-weight="bold">FRESH</text>

  <rect x="720" y="60" width="150" height="50" rx="8" fill="#2f9d74"/>
  <text x="795" y="80" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Return Cached</text>
  <text x="795" y="96" text-anchor="middle" font-size="10" fill="#fff">No network request</text>

  <!-- STALE path (down) -->
  <line x1="610" y1="115" x2="610" y2="155" stroke="#d97843" stroke-width="2" marker-end="url(#ao)"/>
  <text x="635" y="140" font-size="10" fill="#d97843" font-weight="bold">STALE</text>

  <!-- Return stale data -->
  <rect x="545" y="160" width="130" height="45" rx="8" fill="#edeaf5" stroke="#d97843" stroke-width="2"/>
  <text x="610" y="178" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Return Stale</text>
  <text x="610" y="194" text-anchor="middle" font-size="10" fill="#d97843">Show cached data</text>

  <!-- Arrow down to background refetch -->
  <line x1="610" y1="205" x2="610" y2="240" stroke="#d97843" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ao)"/>

  <!-- Background refetch -->
  <rect x="545" y="245" width="130" height="45" rx="8" fill="#d97843"/>
  <text x="610" y="263" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Background</text>
  <text x="610" y="279" text-anchor="middle" font-size="10" fill="#fff">Refetch (SWR)</text>

  <!-- Arrow to Update Cache (stale path) -->
  <line x1="610" y1="290" x2="610" y2="320" stroke="#2f9d74" stroke-width="2" marker-end="url(#ag)"/>

  <!-- Update Cache (stale path) -->
  <rect x="545" y="325" width="130" height="45" rx="8" fill="#edeaf5" stroke="#2f9d74" stroke-width="2"/>
  <text x="610" y="345" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Update Cache</text>
  <text x="610" y="361" text-anchor="middle" font-size="10" fill="#2f9d74">Notify subscribers</text>

  <!-- Arrow to silent re-render -->
  <line x1="610" y1="370" x2="610" y2="400" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>

  <!-- Silent re-render -->
  <rect x="545" y="405" width="130" height="45" rx="8" fill="#6d5bd0"/>
  <text x="610" y="425" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Silent Re-render</text>
  <text x="610" y="441" text-anchor="middle" font-size="10" fill="#fff">Updated data</text>

  <!-- Time labels -->
  <rect x="720" y="155" width="150" height="90" rx="8" fill="#fff" stroke="#d7d1e6"/>
  <text x="795" y="175" text-anchor="middle" font-size="12" fill="#1a1822" font-weight="bold">Key Timings</text>
  <rect x="730" y="185" width="80" height="18" rx="4" fill="#2f9d74"/>
  <text x="770" y="198" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">staleTime</text>
  <text x="818" y="198" font-size="9" fill="#1a1822">0 - 5min</text>
  <rect x="730" y="210" width="80" height="18" rx="4" fill="#d97843"/>
  <text x="770" y="223" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">gcTime</text>
  <text x="818" y="223" font-size="9" fill="#1a1822">5min def</text>

  <!-- Bottom note -->
  <rect x="30" y="465" width="840" height="25" rx="6" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="450" y="482" text-anchor="middle" font-size="11" fill="#1a1822">staleTime controls when data becomes stale (triggers refetch). gcTime controls when inactive cache entries are garbage collected.</text>
</svg>