<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Network-First Strategy Flow</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#6d5bd0">Network is attempted first. Cache serves as offline/timeout fallback.</text>

  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Step 1: Fetch Event -->
  <rect x="30" y="80" width="140" height="50" rx="8" fill="#6d5bd0"/>
  <text x="100" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Fetch Event</text>
  <text x="100" y="118" text-anchor="middle" font-size="10" fill="#ffffff">(Request arrives)</text>

  <!-- Arrow to Network -->
  <line x1="170" y1="105" x2="240" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Step 2: Network Fetch -->
  <rect x="245" y="80" width="155" height="50" rx="8" fill="#6d5bd0"/>
  <text x="322" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Network Fetch</text>
  <text x="322" y="118" text-anchor="middle" font-size="10" fill="#ffffff">(Origin server)</text>

  <!-- Timeout annotation -->
  <rect x="245" y="140" width="155" height="32" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="322" y="155" text-anchor="middle" font-size="9" fill="#d97843" font-weight="bold">⏱ Timeout: 3-5 seconds</text>
  <text x="322" y="167" text-anchor="middle" font-size="8" fill="#d97843">(networkTimeoutSeconds)</text>

  <!-- Arrow to success check -->
  <line x1="400" y1="105" x2="470" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Step 3: Network Success? -->
  <polygon points="545,65 625,105 545,145 465,105" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2"/>
  <text x="545" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Network</text>
  <text x="545" y="114" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Success?</text>

  <!-- SUCCESS path (green, going up-right) -->
  <line x1="625" y1="105" x2="700" y2="105" stroke="#2f9d74" stroke-width="2.5" marker-end="url(#a2)"/>
  <text x="660" y="98" font-size="11" fill="#2f9d74" font-weight="bold">YES</text>

  <!-- Update Cache + Return -->
  <rect x="705" y="75" width="175" height="60" rx="8" fill="#2f9d74"/>
  <text x="792" y="97" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Update Cache</text>
  <text x="792" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">+ Return Response</text>
  <text x="792" y="128" text-anchor="middle" font-size="9" fill="#ffffff">(fresh data)</text>

  <!-- Timing for success -->
  <rect x="715" y="145" width="155" height="24" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="792" y="162" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="bold">Latency: 50-500ms (network)</text>

  <!-- Arrow to client from success -->
  <line x1="792" y1="169" x2="792" y2="210" stroke="#2f9d74" stroke-width="2" marker-end="url(#a2)"/>
  <rect x="732" y="215" width="120" height="36" rx="8" fill="#2f9d74"/>
  <text x="792" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Client ✓</text>

  <!-- FAILURE path (orange, going down) -->
  <line x1="545" y1="145" x2="545" y2="210" stroke="#d97843" stroke-width="2.5" marker-end="url(#a3)"/>
  <text x="565" y="175" font-size="10" fill="#d97843" font-weight="bold">NO</text>
  <text x="565" y="188" font-size="8" fill="#d97843">(timeout / offline / 5xx)</text>

  <!-- Step 4: Check Cache -->
  <polygon points="545,215 625,255 545,295 465,255" fill="#edeaf5" stroke="#d97843" stroke-width="2"/>
  <text x="545" y="250" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Cache</text>
  <text x="545" y="264" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Hit?</text>

  <!-- Cache HIT (green, going right) -->
  <line x1="625" y1="255" x2="700" y2="255" stroke="#2f9d74" stroke-width="2.5" marker-end="url(#a2)"/>
  <text x="660" y="248" font-size="11" fill="#2f9d74" font-weight="bold">YES</text>

  <!-- Return stale cached -->
  <rect x="705" y="270" width="175" height="55" rx="8" fill="#d97843"/>
  <text x="792" y="292" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Return Cached</text>
  <text x="792" y="308" text-anchor="middle" font-size="10" fill="#ffffff">(stale but usable)</text>
  <text x="792" y="320" text-anchor="middle" font-size="9" fill="#ffffff">Last successful response</text>

  <!-- Timing for cache fallback -->
  <rect x="715" y="335" width="155" height="24" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1"/>
  <text x="792" y="352" text-anchor="middle" font-size="9" fill="#d97843" font-weight="bold">Latency: 3-5s (waited for timeout)</text>

  <!-- Arrow to client from cache fallback -->
  <line x1="792" y1="359" x2="792" y2="390" stroke="#d97843" stroke-width="2" marker-end="url(#a3)"/>
  <rect x="732" y="395" width="120" height="36" rx="8" fill="#d97843"/>
  <text x="792" y="418" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Client (stale)</text>

  <!-- Cache MISS (going down) -->
  <line x1="545" y1="295" x2="545" y2="345" stroke="#d97843" stroke-width="2" marker-end="url(#a3)"/>
  <text x="565" y="325" font-size="10" fill="#d97843" font-weight="bold">NO</text>

  <!-- Offline page -->
  <rect x="470" y="350" width="150" height="50" rx="8" fill="#d97843"/>
  <text x="545" y="372" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Show Offline</text>
  <text x="545" y="388" text-anchor="middle" font-size="10" fill="#ffffff">Fallback Page</text>

  <!-- Summary box -->
  <rect x="30" y="285" width="380" height="145" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="220" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Network-First Key Properties</text>
  <text x="45" y="328" font-size="9" fill="#1a1822">• Prioritizes freshness — always tries network first</text>
  <text x="45" y="344" font-size="9" fill="#1a1822">• networkTimeoutSeconds prevents indefinite waits on slow networks</text>
  <text x="45" y="360" font-size="9" fill="#1a1822">• Cache fallback = last successful network response</text>
  <text x="45" y="376" font-size="9" fill="#1a1822">• Best for API data and content pages needing offline access</text>
  <text x="45" y="396" font-size="9" fill="#d97843" font-weight="bold">⚠ Without timeout, degraded networks cause worst UX</text>
  <text x="45" y="412" font-size="9" fill="#d97843" font-weight="bold">  (user waits 30s+ even though cache has usable data)</text>
</svg>
