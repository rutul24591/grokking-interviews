<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Service Worker Fetch Event Interception Flow</text>

  <!-- Browser -->
  <rect x="30" y="100" width="120" height="60" rx="8" fill="#6d5bd0"/>
  <text x="90" y="127" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Browser</text>
  <text x="90" y="145" text-anchor="middle" font-size="10" fill="#e0dcf0">makes request</text>

  <!-- Arrow: Browser -> SW -->
  <line x1="150" y1="130" x2="198" y2="130" stroke="#6d5bd0" stroke-width="2" marker-end="url(#af-purple)"/>
  <text x="174" y="122" text-anchor="middle" font-size="9" fill="#6d5bd0">fetch</text>

  <!-- Service Worker -->
  <rect x="200" y="90" width="140" height="80" rx="8" fill="#6d5bd0"/>
  <text x="270" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Service Worker</text>
  <text x="270" y="136" text-anchor="middle" font-size="10" fill="#e0dcf0">Intercepts fetch event</text>
  <text x="270" y="152" text-anchor="middle" font-size="10" fill="#e0dcf0">respondWith()</text>

  <!-- Arrow: SW -> Cache Check -->
  <line x1="340" y1="130" x2="388" y2="130" stroke="#2f9d74" stroke-width="2" marker-end="url(#af-green)"/>
  <text x="364" y="122" text-anchor="middle" font-size="9" fill="#2f9d74">lookup</text>

  <!-- Cache Check -->
  <rect x="390" y="95" width="130" height="70" rx="8" fill="#2f9d74"/>
  <text x="455" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Check Cache</text>
  <text x="455" y="138" text-anchor="middle" font-size="10" fill="#e8f5f0">cache.match(request)</text>
  <text x="455" y="153" text-anchor="middle" font-size="10" fill="#e8f5f0">Search named caches</text>

  <!-- Diamond: Cache Hit? -->
  <polygon points="455,200 515,240 455,280 395,240" fill="#edeaf5" stroke="#1a1822" stroke-width="1.5"/>
  <text x="455" y="237" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Cache</text>
  <text x="455" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Hit?</text>

  <!-- Arrow: Cache Check -> Diamond -->
  <line x1="455" y1="165" x2="455" y2="198" stroke="#1a1822" stroke-width="1.5" marker-end="url(#af-black)"/>

  <!-- YES path: Cache Hit -> Return Cached -->
  <line x1="395" y1="240" x2="210" y2="240" stroke="#2f9d74" stroke-width="2" marker-end="url(#af-green)"/>
  <text x="300" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#2f9d74">YES</text>

  <!-- Return Cached Response -->
  <rect x="70" y="215" width="140" height="50" rx="8" fill="#2f9d74"/>
  <text x="140" y="237" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Return Cached</text>
  <text x="140" y="253" text-anchor="middle" font-size="10" fill="#e8f5f0">Response to browser</text>

  <!-- NO path: Cache Miss -> Network -->
  <line x1="515" y1="240" x2="598" y2="240" stroke="#d97843" stroke-width="2" marker-end="url(#af-orange)"/>
  <text x="556" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#d97843">NO</text>

  <!-- Forward to Network -->
  <rect x="600" y="215" width="140" height="50" rx="8" fill="#d97843"/>
  <text x="670" y="237" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Fetch from</text>
  <text x="670" y="253" text-anchor="middle" font-size="10" fill="#fff8f0">Network</text>

  <!-- Arrow: Network -> Get Response -->
  <line x1="740" y1="240" x2="778" y2="240" stroke="#d97843" stroke-width="2" marker-end="url(#af-orange)"/>

  <!-- Network Response -->
  <rect x="780" y="210" width="100" height="60" rx="8" fill="#d97843"/>
  <text x="830" y="235" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Network</text>
  <text x="830" y="252" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Response</text>
  <text x="830" y="265" text-anchor="middle" font-size="9" fill="#fff8f0">200 OK</text>

  <!-- Arrow: Network Response -> Clone -->
  <line x1="830" y1="270" x2="830" y2="318" stroke="#6d5bd0" stroke-width="2" marker-end="url(#af-purple)"/>

  <!-- Clone &amp; Cache -->
  <rect x="750" y="320" width="130" height="60" rx="8" fill="#6d5bd0"/>
  <text x="815" y="345" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Clone &amp; Cache</text>
  <text x="815" y="362" text-anchor="middle" font-size="10" fill="#e0dcf0">response.clone()</text>
  <text x="815" y="375" text-anchor="middle" font-size="10" fill="#e0dcf0">cache.put(req, clone)</text>

  <!-- Arrow: Clone -> Cache Storage -->
  <line x1="750" y1="350" x2="668" y2="350" stroke="#2f9d74" stroke-width="2" marker-end="url(#af-green)"/>

  <!-- Cache Storage -->
  <rect x="540" y="325" width="126" height="50" rx="8" fill="#2f9d74" opacity="0.8"/>
  <text x="603" y="347" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Cache Storage</text>
  <text x="603" y="363" text-anchor="middle" font-size="10" fill="#e8f5f0">Updated for next time</text>

  <!-- Arrow: Clone -> Return to Browser -->
  <line x1="815" y1="380" x2="815" y2="430" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="815" y1="430" x2="210" y2="430" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="210" y1="430" x2="140" y2="430" stroke="#6d5bd0" stroke-width="2" marker-end="url(#af-purple)"/>

  <!-- Return Original Response -->
  <rect x="70" y="410" width="140" height="50" rx="8" fill="#6d5bd0"/>
  <text x="140" y="432" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Return Original</text>
  <text x="140" y="448" text-anchor="middle" font-size="10" fill="#e0dcf0">Response to browser</text>

  <!-- Legend -->
  <rect x="30" y="320" width="180" height="80" rx="6" fill="#edeaf5" stroke="#ccc" stroke-width="1"/>
  <text x="40" y="340" font-size="11" font-weight="600" fill="#1a1822">Key Insight:</text>
  <text x="40" y="358" font-size="10" fill="#1a1822">Response bodies are streams.</text>
  <text x="40" y="373" font-size="10" fill="#1a1822">Must clone() before caching</text>
  <text x="40" y="388" font-size="10" fill="#1a1822">one copy to cache, one to page.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="af-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0"/>
    </marker>
    <marker id="af-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d97843"/>
    </marker>
    <marker id="af-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2f9d74"/>
    </marker>
    <marker id="af-black" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1a1822"/>
    </marker>
  </defs>
</svg>
