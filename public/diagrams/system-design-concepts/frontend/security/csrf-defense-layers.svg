<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" fill="none" stroke="#0f172a" stroke-width="1">
  <!-- Background -->
  <rect width="1100" height="850" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">CSRF Defense-in-Depth Strategy</text>
  <text x="550" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569">Multiple overlapping layers ensure comprehensive protection</text>
  
  <!-- Layer 1: CSRF Tokens -->
  <g transform="translate(50, 85)">
    <rect x="0" y="0" width="1000" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="500" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#d97706">Layer 1: CSRF Tokens (Synchronizer Token Pattern)</text>
    <text x="500" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569">Unique, unpredictable token per session/request - the gold standard</text>
    
    <!-- Flow -->
    <g transform="translate(40, 58)">
      <rect x="0" y="0" width="130" height="40" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="65" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">Server Generates</text>
      <text x="65" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Crypto-random token</text>
      
      <line x1="130" y1="20" x2="160" y2="20" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <rect x="160" y="0" width="130" height="40" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="225" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">Client Receives</text>
      <text x="225" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Hidden field / Meta tag</text>
      
      <line x1="290" y1="20" x2="320" y2="20" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <rect x="320" y="0" width="130" height="40" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="385" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">Request Includes</text>
      <text x="385" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Form field / Header</text>
      
      <line x1="450" y1="20" x2="480" y2="20" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <rect x="480" y="0" width="130" height="40" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="545" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">Server Validates</text>
      <text x="545" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Constant-time compare</text>
      
      <line x1="610" y1="20" x2="640" y2="20" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <rect x="640" y="0" width="130" height="40" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
      <text x="705" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#16a34a">✓ Request OK</text>
      <text x="705" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Process action</text>
      
      <rect x="780" y="0" width="130" height="40" rx="4" fill="#fef2f2" stroke="#ef4444"/>
      <text x="845" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#dc2626">✗ Invalid Token</text>
      <text x="845" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">403 Forbidden</text>
    </g>
  </g>
  
  <!-- Layer 2: SameSite Cookies -->
  <g transform="translate(50, 215)">
    <rect x="0" y="0" width="1000" height="130" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="500" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#2563eb">Layer 2: SameSite Cookies (Browser-Enforced)</text>
    <text x="500" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569">Controls when browser sends cookies with cross-origin requests</text>
    
    <!-- SameSite options -->
    <g transform="translate(40, 58)">
      <!-- Strict -->
      <rect x="0" y="0" width="280" height="60" rx="6" fill="#fef2f2" stroke="#ef4444"/>
      <text x="140" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#dc2626">SameSite=Strict</text>
      <text x="140" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Never send cross-origin</text>
      <text x="140" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#16a34a">✓ Maximum protection | ✗ Breaks cross-origin flows</text>
      
      <!-- Lax -->
      <rect x="300" y="0" width="280" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="440" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#d97706">SameSite=Lax (Default)</text>
      <text x="440" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Top-level nav OK, no subrequests</text>
      <text x="440" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#16a34a">✓ Good balance | ✗ Some edge cases</text>
      
      <!-- None -->
      <rect x="600" y="0" width="280" height="60" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
      <text x="740" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#9333ea">SameSite=None</text>
      <text x="740" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Always send (requires Secure)</text>
      <text x="740" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#dc2626">✗ CSRF vulnerable | Only for cross-origin needs</text>
      
      <!-- Browser support note -->
      <rect x="80" y="70" width="840" height="50" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="4,2"/>
      <text x="420" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Browser Support: Chrome 80+, Firefox 80+, Safari 13.1+, Edge 80+</text>
      <text x="420" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#dc2626">⚠️ Not supported in IE or older browsers - combine with CSRF tokens</text>
    </g>
  </g>
  
  <!-- Layer 3: Origin/Referer Validation -->
  <g transform="translate(50, 365)">
    <rect x="0" y="0" width="1000" height="110" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="500" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#4f46e5">Layer 3: Origin/Referer Header Validation</text>
    <text x="500" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569">Server validates request origin - good secondary defense</text>
    
    <!-- Header comparison -->
    <g transform="translate(40, 58)">
      <rect x="0" y="0" width="200" height="40" rx="4" fill="#ffffff" stroke="#6366f1"/>
      <text x="100" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#0f172a">Origin Header</text>
      <text x="100" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">https://example.com</text>
      
      <rect x="220" y="0" width="200" height="40" rx="4" fill="#ffffff" stroke="#6366f1"/>
      <text x="320" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#0f172a">Referer Header</text>
      <text x="320" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">https://example.com/page</text>
      
      <rect x="440" y="0" width="520" height="40" rx="4" fill="#ffffff" stroke="#6366f1"/>
      <text x="700" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#0f172a">Validation Logic</text>
      <text x="700" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">if (!allowedOrigins.includes(origin)) return 403</text>
      
      <!-- Pros/Cons -->
      <rect x="0" y="50" width="480" height="45" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="240" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">✓ No client changes needed | ✗ Headers can be missing (privacy settings)</text>
      <text x="240" y="85" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">✓ Stateless validation | ✗ Not reliable as primary defense</text>
    </g>
  </g>
  
  <!-- Layer 4: Custom Headers + CORS -->
  <g transform="translate(50, 495)">
    <rect x="0" y="0" width="1000" height="100" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
    <text x="500" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#9333ea">Layer 4: Custom Headers + CORS Protection</text>
    <text x="500" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569">Require custom headers that trigger CORS preflight</text>
    
    <g transform="translate(40, 58)">
      <rect x="0" y="0" width="280" height="35" rx="4" fill="#ffffff" stroke="#a855f7"/>
      <text x="140" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">Custom Header Required</text>
      <text x="140" y="33" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">X-Requested-With: XMLHttpRequest</text>
      
      <rect x="300" y="0" width="340" height="35" rx="4" fill="#ffffff" stroke="#a855f7"/>
      <text x="470" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">CORS Preflight (OPTIONS) Required</text>
      <text x="470" y="33" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Server must approve with Access-Control-Allow-Headers</text>
      
      <rect x="660" y="0" width="300" height="35" rx="4" fill="#fef2f2" stroke="#ef4444"/>
      <text x="810" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#dc2626">⚠️ Only protects AJAX/fetch - not form-based CSRF</text>
    </g>
  </g>
  
  <!-- Layer 5: User Interaction -->
  <g transform="translate(50, 615)">
    <rect x="0" y="0" width="1000" height="90" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
    <text x="500" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#db2777">Layer 5: User Interaction Requirements (High-Risk Actions)</text>
    
    <g transform="translate(40, 40)">
      <rect x="0" y="0" width="180" height="40" rx="4" fill="#ffffff" stroke="#ec4899"/>
      <text x="90" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">Re-authentication</text>
      <text x="90" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Password for critical actions</text>
      
      <rect x="200" y="0" width="180" height="40" rx="4" fill="#ffffff" stroke="#ec4899"/>
      <text x="290" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">CAPTCHA</text>
      <text x="290" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Challenge-response test</text>
      
      <rect x="400" y="0" width="180" height="40" rx="4" fill="#ffffff" stroke="#ec4899"/>
      <text x="490" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">Multi-step Confirmation</text>
      <text x="490" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Multiple clicks required</text>
      
      <rect x="600" y="0" width="180" height="40" rx="4" fill="#ffffff" stroke="#ec4899"/>
      <text x="690" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#0f172a">Time-based Delays</text>
      <text x="690" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Waiting period before execution</text>
      
      <rect x="800" y="0" width="160" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="880" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">Adds friction but necessary</text>
      <text x="880" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#92400e">for high-risk operations</text>
    </g>
  </g>
  
  <!-- Key insight -->
  <g transform="translate(50, 725)">
    <rect x="0" y="0" width="1000" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="500" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#d97706">Key Insight: Layer Your Defenses</text>
    <text x="500" y="43" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">Minimum recommended: CSRF tokens + SameSite=Lax cookies. Add Origin validation for defense in depth.</text>
    <text x="500" y="57" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">No single defense is perfect—combine multiple layers for comprehensive protection.</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a"/>
    </marker>
  </defs>
</svg>
