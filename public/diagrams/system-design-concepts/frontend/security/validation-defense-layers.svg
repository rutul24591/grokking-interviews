<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" fill="none" stroke="#0f172a" stroke-width="2">
  <!-- Background -->
  <rect width="1000" height="650" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Input Validation & Sanitization Layers</text>
  <text x="500" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#475569">Defense-in-depth: Client, Server, Database, and Output validation</text>
  
  <!-- Layer 1: Client-Side -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="280" height="140" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#2563eb">Layer 1: Client-Side</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#3b82f6" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Purpose: UX + Immediate Feedback</text>
    
    <text x="20" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">✓ HTML5 validation (required, pattern)</text>
    <text x="20" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">✓ JavaScript validation (regex, type checks)</text>
    <text x="20" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">✗ NOT security - easily bypassed</text>
  </g>
  
  <!-- Arrow to Layer 2 -->
  <path d="M 190 240 L 190 280" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowhead-blue)"/>
  <text x="190" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2563eb">Submit</text>
  
  <!-- Layer 2: Server-Side -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="280" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#d97706">Layer 2: Server-Side</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#f59e0b" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#92400e">Purpose: Security (MANDATORY)</text>
    
    <text x="20" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">✓ Allowlist validation</text>
    <text x="20" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">✓ Type checking, range validation</text>
    <text x="20" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">✓ Sanitization (DOMPurify, parameterized queries)</text>
  </g>
  
  <!-- Arrow to Layer 3 -->
  <path d="M 190 420 L 190 460" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowhead-orange)"/>
  <text x="190" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d97706">Store</text>
  
  <!-- Layer 3: Database -->
  <g transform="translate(50, 460)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#4f46e5">Layer 3: Database</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#6366f1" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#3730a3">Purpose: Data Integrity</text>
    
    <text x="20" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3730a3">✓ Constraints (NOT NULL, UNIQUE, CHECK)</text>
    <text x="20" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#3730a3">✓ Parameterized queries (prevent SQL injection)</text>
  </g>
  
  <!-- Arrow to Layer 4 -->
  <path d="M 330 520 L 380 520" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrowhead-indigo)"/>
  <text x="355" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#4f46e5">Query</text>
  
  <!-- Layer 4: Output -->
  <g transform="translate(380, 460)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#16a34a">Layer 4: Output Encoding</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#22c55e" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#15803d">Purpose: Prevent XSS on Render</text>
    
    <text x="20" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#15803d">✓ HTML entity encoding</text>
    <text x="20" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#15803d">✓ Context-aware encoding (HTML, JS, URL, CSS)</text>
  </g>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead-indigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Attack Prevention Table -->
  <g transform="translate(50, 100)">
    <rect x="700" y="0" width="250" height="340" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="825" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#475569">Attacks Prevented</text>
    <line x1="720" y1="45" x2="930" y2="45" stroke="#cbd5e1" stroke-width="1"/>
    
    <!-- Row 1 -->
    <rect x="720" y="60" width="230" height="65" fill="#ffffff" stroke="#cbd5e1" rx="4"/>
    <text x="825" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">XSS</text>
    <text x="730" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Prevented by: Server validation,</text>
    <text x="730" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Output encoding, CSP</text>
    
    <!-- Row 2 -->
    <rect x="720" y="135" width="230" height="65" fill="#ffffff" stroke="#cbd5e1" rx="4"/>
    <text x="825" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">SQL Injection</text>
    <text x="730" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Prevented by: Parameterized</text>
    <text x="730" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">queries, Input validation</text>
    
    <!-- Row 3 -->
    <rect x="720" y="210" width="230" height="65" fill="#ffffff" stroke="#cbd5e1" rx="4"/>
    <text x="825" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">Command Injection</text>
    <text x="730" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Prevented by: Input validation,</text>
    <text x="730" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Allowlist, Never use shell exec</text>
  </g>
  
  <!-- Key Insight Box -->
  <g transform="translate(50, 610)">
    <rect x="0" y="0" width="900" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="450" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Key Insight</text>
    <text x="450" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">Never trust user input. Validate at every layer: Client (UX), Server (Security), Database (Integrity), Output (XSS Prevention). Each layer provides defense-in-depth.</text>
  </g>
</svg>
