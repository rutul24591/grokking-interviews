<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" fill="none" stroke="#0f172a" stroke-width="2">
  <!-- Background -->
  <rect width="1100" height="700" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Clickjacking Attack Diagram</text>
  <text x="550" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Attacker overlays transparent iframe over decoy interface</text>
  
  <!-- User's View (What they see) -->
  <g transform="translate(50, 85)">
    <rect x="0" y="0" width="480" height="280" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="240" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#dc2626">What User Sees (Decoy)</text>
    
    <!-- Decoy Page -->
    <rect x="20" y="45" width="440" height="220" rx="4" fill="#ffffff" stroke="#ef4444"/>
    
    <!-- Fake prize notification -->
    <rect x="100" y="80" width="280" height="120" rx="8" fill="#22c55e" stroke="#16a34a"/>
    <text x="240" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">🎉 CONGRATULATIONS!</text>
    <text x="240" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">You've won a prize!</text>
    <text x="240" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff">Click here to claim</text>
    
    <!-- Cursor -->
    <circle cx="240" cy="180" r="15" fill="#f59e0b" opacity="0.8"/>
    <text x="240" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">CLICK</text>
    
    <!-- Arrow to Reality -->
    <line x1="490" y1="225" x2="540" y2="225" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="515" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Actually...</text>
  </g>
  
  <!-- Reality (What's actually happening) -->
  <g transform="translate(570, 85)">
    <rect x="0" y="0" width="480" height="280" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="240" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#d97706">Reality (Hidden Layers)</text>
    
    <!-- Layers diagram -->
    <rect x="20" y="45" width="440" height="220" rx="4" fill="#ffffff" stroke="#f59e0b"/>
    
    <!-- Bottom layer: Target site -->
    <rect x="40" y="70" width="400" height="100" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-dasharray="4,2"/>
    <text x="240" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#2563eb">Layer 1: Hidden Iframe</text>
    <text x="240" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">https://bank.com/transfer</text>
    <rect x="140" y="125" width="200" height="35" rx="4" fill="#ef4444" stroke="#dc2626"/>
    <text x="240" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#ffffff">"Send $1000" button</text>
    <text x="240" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ef4444">opacity: 0.01 (invisible)</text>
    
    <!-- Top layer: Decoy -->
    <rect x="40" y="185" width="400" height="70" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="240" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#d97706">Layer 2: Visible Decoy</text>
    <text x="240" y="225" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">"Click to Win" button (visible)</text>
    <text x="240" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#16a34a">z-index: 1 (below iframe)</text>
    
    <!-- Click path -->
    <circle cx="240" cy="200" r="20" fill="#f59e0b" opacity="0.5"/>
    <path d="M 240 200 L 240 142" stroke="#ef4444" stroke-width="3" stroke-dasharray="4,2" marker-end="url(#arrowhead-red)"/>
  </g>
  
  <!-- Attack Flow -->
  <g transform="translate(50, 390)">
    <rect x="0" y="0" width="1000" height="280" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="500" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0f172a">Attack Flow: Step by Step</text>
    
    <!-- Step 1 -->
    <g transform="translate(20, 45)">
      <rect x="0" y="0" width="220" height="100" rx="6" fill="#ffffff" stroke="#3b82f6"/>
      <text x="110" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#2563eb">Step 1: Attacker Prepares</text>
      <text x="15" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Creates decoy page</text>
      <text x="15" y="63" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Loads target site in iframe</text>
      <text x="15" y="81" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Makes iframe transparent</text>
      <text x="15" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Positions over decoy button</text>
    </g>
    
    <!-- Arrow -->
    <line x1="245" y1="95" x2="275" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Step 2 -->
    <g transform="translate(280, 45)">
      <rect x="0" y="0" width="220" height="100" rx="6" fill="#ffffff" stroke="#3b82f6"/>
      <text x="110" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#2563eb">Step 2: User Visits Page</text>
      <text x="15" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• User sees decoy interface</text>
      <text x="15" y="63" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Iframe is invisible</text>
      <text x="15" y="81" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• User is logged into target site</text>
      <text x="15" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Session cookie in browser</text>
    </g>
    
    <!-- Arrow -->
    <line x1="505" y1="95" x2="535" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Step 3 -->
    <g transform="translate(540, 45)">
      <rect x="0" y="0" width="220" height="100" rx="6" fill="#ffffff" stroke="#3b82f6"/>
      <text x="110" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#2563eb">Step 3: User Clicks Decoy</text>
      <text x="15" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• User intends to click decoy</text>
      <text x="15" y="63" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Click passes through to iframe</text>
      <text x="15" y="81" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Click hits hidden button</text>
      <text x="15" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Action performed on target site</text>
    </g>
    
    <!-- Arrow -->
    <line x1="765" y1="95" x2="795" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Step 4 -->
    <g transform="translate(800, 45)">
      <rect x="0" y="0" width="220" height="100" rx="6" fill="#fef2f2" stroke="#ef4444"/>
      <text x="110" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">Step 4: Damage Done</text>
      <text x="15" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Money transferred</text>
      <text x="15" y="63" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Post liked/shared</text>
      <text x="15" y="81" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• Settings changed</text>
      <text x="15" y="99" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">• User unaware until too late</text>
    </g>
    
    <!-- Example Code -->
    <g transform="translate(20, 160)">
      <rect x="0" y="0" width="960" height="100" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="480" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Attacker's CSS (Simplified)</text>
      
      <text x="20" y="45" font-family="monospace" font-size="9" fill="#475569">/* Decoy button - visible to user */</text>
      <text x="20" y="60" font-family="monospace" font-size="9" fill="#0f172a">.decoy-button {'{'}</text>
      <text x="35" y="75" font-family="monospace" font-size="9" fill="#0f172a">position: fixed; top: 200px; left: 300px;</text>
      <text x="35" y="90" font-family="monospace" font-size="9" fill="#0f172a">z-index: 1; /* Below iframe */</text>
      <text x="20" y="105" font-family="monospace" font-size="9" fill="#0f172a">{'}'}</text>
      
      <text x="250" y="45" font-family="monospace" font-size="9" fill="#475569">/* Hidden iframe - where click actually goes */</text>
      <text x="250" y="60" font-family="monospace" font-size="9" fill="#0f172a">iframe {'{'}</text>
      <text x="265" y="75" font-family="monospace" font-size="9" fill="#0f172a">position: fixed; top: 200px; left: 300px;</text>
      <text x="265" y="90" font-family="monospace" font-size="9" fill="#0f172a">opacity: 0.01; z-index: 2; /* Above decoy */</text>
      <text x="250" y="105" font-family="monospace" font-size="9" fill="#0f172a">{'}'}</text>
      
      <text x="500" y="45" font-family="monospace" font-size="9" fill="#475569">/* Result: User clicks decoy, */</text>
      <text x="500" y="60" font-family="monospace" font-size="9" fill="#475569">/* click goes to iframe button */</text>
      <text x="500" y="80" font-family="monospace" font-size="9" fill="#dc2626">/* Action performed on target site! */</text>
    </g>
  </g>
  
  <!-- Prevention hint -->
  <g transform="translate(50, 685)">
    <rect x="0" y="0" width="1000" height="40" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="500" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">Prevention: X-Frame-Options: DENY | CSP frame-ancestors 'none' | SameSite Cookies</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
