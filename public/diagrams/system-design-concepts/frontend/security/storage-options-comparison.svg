<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" fill="none" stroke="#0f172a" stroke-width="1">
  <!-- Background -->
  <rect width="1100" height="700" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Client-Side Storage Options Comparison</text>
  <text x="550" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#475569">Security characteristics of different storage mechanisms</text>
  
  <!-- localStorage -->
  <g transform="translate(50, 85)">
    <rect x="0" y="0" width="240" height="200" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="120" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">localStorage</text>
    
    <!-- Icon -->
    <rect x="90" y="40" width="60" height="50" rx="4" fill="#ffffff" stroke="#ef4444"/>
    <text x="120" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">5-10MB</text>
    <text x="120" y="80" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">persistent</text>
    
    <!-- Security indicators -->
    <g transform="translate(15, 105)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">XSS Safe:</text>
      <circle cx="100" cy="-5" r="8" fill="#ef4444"/>
      <text x="100" y="0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">×</text>
      
      <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">CSRF Safe:</text>
      <circle cx="100" cy="15" r="8" fill="#22c55e"/>
      <text x="100" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">✓</text>
      
      <text x="0" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Encryption:</text>
      <text x="100" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#dc2626">None</text>
      
      <text x="0" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Use for:</text>
      <text x="100" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Non-sensitive</text>
      <text x="100" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">cached data</text>
    </g>
    
    <!-- Warning -->
    <rect x="10" y="180" width="220" height="15" rx="3" fill="#fef2f2" stroke="#ef4444" stroke-dasharray="3,2"/>
    <text x="120" y="191" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#dc2626">⚠️ NOT for tokens/PII</text>
  </g>
  
  <!-- sessionStorage -->
  <g transform="translate(310, 85)">
    <rect x="0" y="0" width="240" height="200" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="120" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">sessionStorage</text>
    
    <!-- Icon -->
    <rect x="90" y="40" width="60" height="50" rx="4" fill="#ffffff" stroke="#ef4444"/>
    <text x="120" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">5-10MB</text>
    <text x="120" y="80" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">per-tab</text>
    
    <!-- Security indicators -->
    <g transform="translate(15, 105)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">XSS Safe:</text>
      <circle cx="100" cy="-5" r="8" fill="#ef4444"/>
      <text x="100" y="0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">×</text>
      
      <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">CSRF Safe:</text>
      <circle cx="100" cy="15" r="8" fill="#22c55e"/>
      <text x="100" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">✓</text>
      
      <text x="0" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Encryption:</text>
      <text x="100" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#dc2626">None</text>
      
      <text x="0" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Use for:</text>
      <text x="100" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Per-tab temp</text>
      <text x="100" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">data</text>
    </g>
    
    <!-- Warning -->
    <rect x="10" y="180" width="220" height="15" rx="3" fill="#fef2f2" stroke="#ef4444" stroke-dasharray="3,2"/>
    <text x="120" y="191" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#dc2626">⚠️ Cleared on tab close</text>
  </g>
  
  <!-- Cookies (HttpOnly) -->
  <g transform="translate(570, 85)">
    <rect x="0" y="0" width="240" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="120" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Cookies (HttpOnly)</text>
    
    <!-- Icon -->
    <rect x="90" y="40" width="60" height="50" rx="4" fill="#ffffff" stroke="#22c55e"/>
    <text x="120" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">~4KB</text>
    <text x="120" y="80" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">auto-sent</text>
    
    <!-- Security indicators -->
    <g transform="translate(15, 105)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">XSS Safe:</text>
      <circle cx="100" cy="-5" r="8" fill="#22c55e"/>
      <text x="100" y="0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">✓</text>
      
      <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">CSRF Safe:</text>
      <circle cx="100" cy="15" r="8" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="100" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#92400e">△</text>
      <text x="120" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">w/SameSite</text>
      
      <text x="0" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Encryption:</text>
      <text x="100" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">In transit</text>
      
      <text x="0" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Use for:</text>
      <text x="100" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Auth tokens</text>
      <text x="100" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Sessions</text>
    </g>
    
    <!-- Recommended -->
    <rect x="10" y="180" width="220" height="15" rx="3" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="120" y="191" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">✓ BEST for tokens</text>
  </g>
  
  <!-- IndexedDB -->
  <g transform="translate(830, 85)">
    <rect x="0" y="0" width="240" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="120" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#d97706">IndexedDB</text>
    
    <!-- Icon -->
    <rect x="90" y="40" width="60" height="50" rx="4" fill="#ffffff" stroke="#f59e0b"/>
    <text x="120" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">50MB+</text>
    <text x="120" y="80" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">structured</text>
    
    <!-- Security indicators -->
    <g transform="translate(15, 105)">
      <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">XSS Safe:</text>
      <circle cx="100" cy="-5" r="8" fill="#ef4444"/>
      <text x="100" y="0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">×</text>
      
      <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">CSRF Safe:</text>
      <circle cx="100" cy="15" r="8" fill="#22c55e"/>
      <text x="100" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">✓</text>
      
      <text x="0" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Encryption:</text>
      <text x="100" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Browser-dep</text>
      
      <text x="0" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Use for:</text>
      <text x="100" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Large data</text>
      <text x="100" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">w/ encryption</text>
    </g>
    
    <!-- Note -->
    <rect x="10" y="180" width="220" height="15" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="3,2"/>
    <text x="120" y="191" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#92400e">Encrypt sensitive data</text>
  </g>
  
  <!-- Use Case Matrix -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="1000" height="220" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="500" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#0f172a">What to Store Where</text>
    
    <!-- Header -->
    <rect x="20" y="40" width="200" height="30" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="120" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">Data Type</text>
    
    <rect x="220" y="40" width="190" height="30" fill="#fef2f2" stroke="#ef4444"/>
    <text x="315" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">AVOID</text>
    
    <rect x="410" y="40" width="290" height="30" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="555" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#92400e">CAUTION (Encrypt)</text>
    
    <rect x="700" y="40" width="300" height="30" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="850" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">RECOMMENDED</text>
    
    <!-- Row 1: Auth Tokens -->
    <rect x="20" y="70" width="200" height="35" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="120" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Auth Tokens</text>
    
    <rect x="220" y="70" width="190" height="35" fill="#fef2f2" stroke="#ef4444"/>
    <text x="315" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#dc2626">localStorage, sessionStorage</text>
    
    <rect x="410" y="70" width="290" height="35" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="555" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">IndexedDB (encrypted)</text>
    
    <rect x="700" y="70" width="300" height="35" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="850" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#16a34a">HttpOnly Cookies (Secure, SameSite)</text>
    
    <!-- Row 2: PII -->
    <rect x="20" y="105" width="200" height="35" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="120" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Personal Data (PII)</text>
    
    <rect x="220" y="105" width="190" height="35" fill="#fef2f2" stroke="#ef4444"/>
    <text x="315" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#dc2626">localStorage (plaintext)</text>
    
    <rect x="410" y="105" width="290" height="35" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="555" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#92400e">IndexedDB (AES-GCM encrypted)</text>
    
    <rect x="700" y="105" width="300" height="35" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="850" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Server-side (fetch on-demand)</text>
    
    <!-- Row 3: Passwords -->
    <rect x="20" y="140" width="200" height="35" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="120" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Passwords</text>
    
    <rect x="220" y="140" width="580" height="35" fill="#fef2f2" stroke="#ef4444"/>
    <text x="510" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#dc2626">NEVER store client-side (any form)</text>
    
    <rect x="700" y="140" width="300" height="35" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="850" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Server-side hash only</text>
    
    <!-- Row 4: UI State -->
    <rect x="20" y="175" width="200" height="35" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="120" y="197" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">UI State / Preferences</text>
    
    <rect x="220" y="175" width="190" height="35" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="315" y="197" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">—</text>
    
    <rect x="410" y="175" width="290" height="35" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="555" y="197" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">—</text>
    
    <rect x="700" y="175" width="300" height="35" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="850" y="197" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="bold" fill="#16a34a">localStorage, sessionStorage</text>
  </g>
  
  <!-- Key insight -->
  <g transform="translate(50, 550)">
    <rect x="0" y="0" width="1000" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="500" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Security Hierarchy (Most to Least Secure)</text>
    <text x="500" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">1. Server-side storage (no client storage) → 2. HttpOnly Cookies → 3. Encrypted IndexedDB → 4. sessionStorage → 5. localStorage</text>
    <text x="500" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">Rule: Never store tokens in localStorage. Never store passwords anywhere client-side.</text>
  </g>
  
  <!-- XSS vulnerability illustration -->
  <g transform="translate(50, 650)">
    <rect x="0" y="0" width="480" height="40" rx="6" fill="#fef2f2" stroke="#ef4444"/>
    <text x="240" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#dc2626">⚠️ localStorage/sessionStorage/IndexedDB: XSS = Full data access</text>
    
    <rect x="500" y="0" width="550" height="40" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="775" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#16a34a">✓ HttpOnly Cookies: XSS cannot access token (but still use CSP!)</text>
  </g>
</svg>
