<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" fill="none" stroke="#0f172a" stroke-width="2">
  <!-- Background -->
  <rect width="1000" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Rate Limiting Techniques Comparison</text>
  <text x="500" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#475569">Debouncing vs Throttling vs Rate Limiting</text>
  
  <!-- Debouncing Column -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="280" height="220" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#2563eb">Debouncing</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#3b82f6" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1e40af">"Wait until they're done"</text>
    
    <!-- Timeline visualization -->
    <rect x="20" y="85" width="240" height="60" fill="#ffffff" stroke="#3b82f6" rx="4"/>
    <text x="140" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Input Events</text>
    <circle cx="40" cy="125" r="4" fill="#3b82f6"/>
    <circle cx="70" cy="125" r="4" fill="#3b82f6"/>
    <circle cx="100" cy="125" r="4" fill="#3b82f6"/>
    <circle cx="130" cy="125" r="4" fill="#3b82f6"/>
    <text x="200" cy="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">EXECUTE</text>
    <text x="20" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e40af">Delay: 300ms after last input</text>
    
    <!-- Use Cases -->
    <text x="20" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Use Cases:</text>
    <text x="30" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">• Search autocomplete</text>
    <text x="30" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1e40af">• Form validation</text>
  </g>
  
  <!-- Throttling Column -->
  <g transform="translate(360, 100)">
    <rect x="0" y="0" width="280" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#d97706">Throttling</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#f59e0b" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#92400e">"Once per interval"</text>
    
    <!-- Timeline visualization -->
    <rect x="20" y="85" width="240" height="60" fill="#ffffff" stroke="#f59e0b" rx="4"/>
    <text x="140" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Input Events</text>
    <circle cx="40" cy="125" r="4" fill="#f59e0b"/>
    <circle cx="70" cy="125" r="4" fill="#f59e0b"/>
    <circle cx="100" cy="125" r="4" fill="#f59e0b"/>
    <circle cx="130" cy="125" r="4" fill="#f59e0b"/>
    <circle cx="160" cy="125" r="4" fill="#f59e0b"/>
    <text x="200" cy="125" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">EXECUTE</text>
    <text x="20" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#92400e">Interval: 100ms fixed</text>
    
    <!-- Use Cases -->
    <text x="20" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#92400e">Use Cases:</text>
    <text x="30" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">• Scroll handlers</text>
    <text x="30" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">• Mouse move events</text>
  </g>
  
  <!-- Rate Limiting Column -->
  <g transform="translate(670, 100)">
    <rect x="0" y="0" width="280" height="220" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#16a34a">Rate Limiting</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#22c55e" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#15803d">"Quota per time window"</text>
    
    <!-- Token Bucket visualization -->
    <rect x="20" y="85" width="240" height="60" fill="#ffffff" stroke="#22c55e" rx="4"/>
    <text x="140" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Token Bucket</text>
    <rect x="40" y="115" width="160" height="20" rx="3" fill="#f0fdf4" stroke="#22c55e"/>
    <rect x="40" y="115" width="100" height="20" rx="3" fill="#22c55e"/>
    <text x="210" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">5/10 tokens</text>
    <text x="20" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#15803d">Quota: 100 requests/hour</text>
    
    <!-- Use Cases -->
    <text x="20" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#15803d">Use Cases:</text>
    <text x="30" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#15803d">• Form submissions</text>
    <text x="30" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#15803d">• API calls</text>
  </g>
  
  <!-- Comparison Table -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="900" height="200" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="450" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#475569">Technique Comparison</text>
    
    <!-- Table Header -->
    <rect x="20" y="45" width="860" height="35" fill="#e2e8f0" stroke="#cbd5e1" rx="4"/>
    <text x="160" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#475569">Technique</text>
    <text x="350" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#475569">Execution Timing</text>
    <text x="550" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#475569">Guarantees</text>
    <text x="750" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#475569">Best For</text>
    
    <!-- Row 1: Debouncing -->
    <rect x="20" y="85" width="860" height="35" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="160" y="107" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#2563eb">Debouncing</text>
    <text x="350" y="107" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">After pause</text>
    <text x="550" y="107" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Once after delay</text>
    <text x="750" y="107" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Search, validation</text>
    
    <!-- Row 2: Throttling -->
    <rect x="20" y="125" width="860" height="35" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="160" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#d97706">Throttling</text>
    <text x="350" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Fixed interval</text>
    <text x="550" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Max once per interval</text>
    <text x="750" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Scroll, resize</text>
    
    <!-- Row 3: Rate Limiting -->
    <rect x="20" y="165" width="860" height="35" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="160" y="187" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#16a34a">Rate Limiting</text>
    <text x="350" y="187" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Quota-based</text>
    <text x="550" y="187" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">N times per window</text>
    <text x="750" y="187" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Submissions, API</text>
  </g>
  
  <!-- Key Insight Box -->
  <g transform="translate(50, 570)">
    <rect x="0" y="0" width="900" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="450" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Key Insight</text>
    <text x="450" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">Choose based on your goal: Debouncing = wait for completion | Throttling = limit frequency | Rate Limiting = enforce quota</text>
  </g>
</svg>
