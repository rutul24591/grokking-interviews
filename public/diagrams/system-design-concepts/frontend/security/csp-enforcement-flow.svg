<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" fill="none" stroke="#0f172a" stroke-width="2">
  <!-- Background -->
  <rect width="1000" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">CSP Enforcement Flow</text>
  <text x="500" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#475569">How Content Security Policy blocks untrusted resources</text>
  
  <!-- Server Box -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="200" height="120" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#2563eb">Server</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#3b82f6" stroke-width="1"/>
    <text x="100" y="75" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1e40af">Sends CSP Header:</text>
    <text x="100" y="95" text-anchor="middle" font-family="monospace" font-size="10" fill="#1e40af">Content-Security-Policy</text>
    <text x="100" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#1e40af">script-src 'self' https://cdn.com</text>
  </g>
  
  <!-- Arrow from Server to Browser -->
  <path d="M 250 160 L 350 160" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowhead-blue)"/>
  <text x="300" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2563eb">HTTP Response</text>
  <text x="300" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2563eb">+ CSP Policy</text>
  
  <!-- Browser Box -->
  <g transform="translate(350, 100)">
    <rect x="0" y="0" width="250" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="125" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#d97706">Browser</text>
    <line x1="20" y1="45" x2="230" y2="45" stroke="#f59e0b" stroke-width="1"/>
    
    <!-- Step 1 -->
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#92400e">1. Parse CSP Policy</text>
    <text x="30" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">Extract allowed sources</text>
    
    <!-- Step 2 -->
    <text x="20" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#92400e">2. Encounter Resource</text>
    <text x="30" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">Script, Style, Image, etc.</text>
    
    <!-- Step 3 -->
    <text x="20" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#92400e">3. Validate Source</text>
    <text x="30" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">Check against allowed sources</text>
    
    <!-- Step 4 -->
    <text x="20" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#92400e">4. Allow or Block</text>
  </g>
  
  <!-- Arrow from Browser to Resources -->
  <path d="M 600 180 L 700 180" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowhead-orange)"/>
  <text x="650" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d97706">Resource Request</text>
  
  <!-- Trusted Resource Box -->
  <g transform="translate(700, 100)">
    <rect x="0" y="0" width="250" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="125" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Trusted Resource</text>
    <line x1="20" y1="45" x2="230" y2="45" stroke="#22c55e" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#15803d">✓ Source matches policy</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#15803d">✓ Allowed origin</text>
    <text x="20" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#15803d">✓ Correct protocol (HTTPS)</text>
    
    <!-- ALLOW Badge -->
    <rect x="75" y="130" width="100" height="30" rx="4" fill="#22c55e" stroke="#16a34a"/>
    <text x="125" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">ALLOWED</text>
  </g>
  
  <!-- Arrow from Browser to Untrusted -->
  <path d="M 600 250 L 700 350" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="650" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#dc2626">Blocked Request</text>
  
  <!-- Untrusted Resource Box -->
  <g transform="translate(700, 350)">
    <rect x="0" y="0" width="250" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="125" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Untrusted Resource</text>
    <line x1="20" y1="45" x2="230" y2="45" stroke="#ef4444" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#991b1b">✗ Source NOT in policy</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#991b1b">✗ Blocked origin (malicious.com)</text>
    <text x="20" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#991b1b">✗ Inline script without nonce</text>
    
    <!-- BLOCK Badge -->
    <rect x="75" y="130" width="100" height="30" rx="4" fill="#ef4444" stroke="#dc2626"/>
    <text x="125" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">BLOCKED</text>
  </g>
  
  <!-- CSP Violation Report Box -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="280" height="150" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#475569">CSP Violation Report</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#64748b" stroke-width="1"/>
    
    <text x="20" y="70" font-family="monospace" font-size="10" fill="#64748b">{`{`}</text>
    <text x="30" y="85" font-family="monospace" font-size="10" fill="#64748b">"blocked-uri": "https://malicious.com/evil.js",</text>
    <text x="30" y="100" font-family="monospace" font-size="10" fill="#64748b">"violated-directive": "script-src 'self'",</text>
    <text x="30" y="115" font-family="monospace" font-size="10" fill="#64748b">"document-uri": "https://yoursite.com/page",</text>
    <text x="30" y="130" font-family="monospace" font-size="10" fill="#64748b">"referrer": "https://attacker.com"</text>
    <text x="20" y="145" font-family="monospace" font-size="10" fill="#64748b">{`}`}</text>
  </g>
  
  <!-- Arrow from Untrusted to Report -->
  <path d="M 700 420 L 350 420" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead-gray)"/>
  <text x="525" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Report sent to</text>
  <text x="525" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">report-uri endpoint</text>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <g transform="translate(50, 530)">
    <rect x="0" y="0" width="900" height="60" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="450" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#475569">CSP Protection Summary</text>
    <text x="50" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">✓ Blocks XSS from untrusted sources</text>
    <text x="250" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">✓ Prevents data injection attacks</text>
    <text x="450" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">✓ Provides violation reporting</text>
    <text x="650" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">✓ Defense-in-depth layer</text>
  </g>
</svg>
