<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" fill="none" stroke="#0f172a" stroke-width="1">
  <!-- Background -->
  <rect width="1000" height="700" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">TLS Certificate Chain</text>
  <text x="500" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569">Chain of trust from server certificate to trusted root CA</text>
  
  <!-- Root CA -->
  <g transform="translate(350, 100)">
    <rect x="0" y="0" width="300" height="100" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="3"/>
    <text x="150" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#9333ea">Root CA Certificate</text>
    
    <text x="20" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Issuer: Self-signed</text>
    <text x="20" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Subject: O=DigiCert, CN=DigiCert Global Root CA</text>
    
    <rect x="20" y="78" width="100" height="18" rx="3" fill="#a855f7" stroke="#9333ea"/>
    <text x="70" y="91" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="400" fill="#ffffff">Trusted by Default</text>
    
    <rect x="130" y="78" width="150" height="18" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="205" y="91" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#92400e">Private Key Offline</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="500" y1="200" x2="500" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="510" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Signed by</text>
  
  <!-- Intermediate CA 1 -->
  <g transform="translate(350, 240)">
    <rect x="0" y="0" width="300" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="150" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#2563eb">Intermediate CA Certificate</text>
    
    <text x="20" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Issuer: DigiCert Global Root CA</text>
    <text x="20" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Subject: O=DigiCert, CN=DigiCert TLS RSA SHA256</text>
    
    <rect x="20" y="75" width="120" height="12" rx="2" fill="#3b82f6"/>
    <text x="80" y="84" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="400" fill="#ffffff">Can Sign End-Entity</text>
    
    <rect x="150" y="75" width="130" height="12" rx="2" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="215" y="84" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#92400e">Revocable by Root</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="500" y1="330" x2="500" y2="360" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="510" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Signed by</text>
  
  <!-- Intermediate CA 2 (optional) -->
  <g transform="translate(350, 370)">
    <rect x="0" y="0" width="300" height="70" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="150" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#4f46e5">Intermediate CA 2 (Optional)</text>
    
    <text x="20" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Issuer: DigiCert TLS RSA SHA256</text>
    <text x="20" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Subject: O=DigiCert, CN=DigiCert TLS RSA SHA256 R2</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="500" y1="440" x2="500" y2="470" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="510" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Signed by</text>
  
  <!-- Server Certificate -->
  <g transform="translate(350, 480)">
    <rect x="0" y="0" width="300" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="150" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#d97706">Server Certificate (End-Entity)</text>
    
    <text x="20" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Issuer: DigiCert TLS RSA SHA256 R2</text>
    <text x="20" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Subject: CN=example.com</text>
    <text x="20" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">SAN: example.com, www.example.com</text>
    
    <rect x="20" y="95" width="80" height="12" rx="2" fill="#f59e0b"/>
    <text x="60" y="104" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="400" fill="#ffffff">Valid: 90 days</text>
    
    <rect x="110" y="95" width="90" height="12" rx="2" fill="#f0fdf4" stroke="#22c55e"/>
    <text x="155" y="104" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#16a34a">Public Key: RSA 2048</text>
    
    <rect x="210" y="95" width="70" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="245" y="104" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#2563eb">DV Certificate</text>
  </g>
  
  <!-- Arrow to browser -->
  <line x1="500" y1="590" x2="500" y2="620" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="510" y="610" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Verified by</text>
  
  <!-- Browser verification -->
  <g transform="translate(350, 630)">
    <rect x="0" y="0" width="300" height="50" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="150" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#16a34a">Browser/OS Trust Store</text>
    <text x="150" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">Validates chain back to trusted root</text>
  </g>
  
  <!-- Side notes -->
  <g transform="translate(700, 200)">
    <rect x="0" y="0" width="270" height="280" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="135" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#0f172a">Why Intermediates?</text>
    
    <text x="15" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Root CAs keep private keys</text>
    <text x="15" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">offline in HSMs for security.</text>
    <text x="15" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Intermediates sign certificates</text>
    <text x="15" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">and can be revoked if compromised</text>
    <text x="15" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">without affecting the root.</text>
    
    <rect x="0" y="140" width="270" height="130" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="4,2"/>
    <text x="135" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#92400e">Certificate Validation Steps</text>
    
    <text x="15" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">1. Verify signature chain</text>
    <text x="15" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">2. Check validity dates</text>
    <text x="15" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">3. Verify domain match (SAN)</text>
    <text x="15" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">4. Check revocation (OCSP/CRL)</text>
  </g>
  
  <!-- Trust indicators -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="270" height="200" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="135" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#0f172a">Browser Trust Indicators</text>
    
    <!-- Valid -->
    <g transform="translate(15, 45)">
      <circle cx="15" cy="15" r="12" fill="#22c55e"/>
      <path d="M 10 15 L 14 19 L 20 11" stroke="#ffffff" stroke-width="2" fill="none"/>
      <text x="35" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#16a34a">Valid Certificate</text>
      <text x="35" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Padlock icon shown</text>
    </g>
    
    <!-- Expired -->
    <g transform="translate(15, 90)">
      <circle cx="15" cy="15" r="12" fill="#ef4444"/>
      <line x1="10" y1="10" x2="20" y2="20" stroke="#ffffff" stroke-width="2"/>
      <line x1="20" y1="10" x2="10" y2="20" stroke="#ffffff" stroke-width="2"/>
      <text x="35" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#dc2626">Expired/Invalid</text>
      <text x="35" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Full-page warning</text>
    </g>
    
    <!-- Self-signed -->
    <g transform="translate(15, 135)">
      <circle cx="15" cy="15" r="12" fill="#f59e0b"/>
      <text x="15" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#ffffff">!</text>
      <text x="35" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#92400e">Self-Signed</text>
      <text x="35" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Not trusted by default</text>
    </g>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
