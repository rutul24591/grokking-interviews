<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" fill="none" stroke="#0f172a" stroke-width="2">
  <!-- Background -->
  <rect width="1100" height="700" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Session-Based Authentication Flow</text>
  <text x="550" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#475569">Server maintains session state, client holds session ID in cookie</text>
  
  <!-- Client (Browser) -->
  <g transform="translate(50, 85)">
    <rect x="0" y="0" width="300" height="550" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="150" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#2563eb">Client (Browser)</text>
    
    <!-- Login Form -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="260" height="70" rx="4" fill="#ffffff" stroke="#3b82f6"/>
      <text x="130" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Login Form</text>
      <text x="130" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">username, password</text>
      <text x="130" y="58" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">POST /login</text>
    </g>
    
    <!-- Cookie Storage -->
    <g transform="translate(20, 140)">
      <rect x="0" y="0" width="260" height="60" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
      <text x="130" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">Cookie Storage</text>
      <text x="130" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Set-Cookie: sessionId=abc123;</text>
      <text x="130" y="55" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">HttpOnly; Secure; SameSite=Lax</text>
    </g>
    
    <!-- Authenticated Requests -->
    <g transform="translate(20, 220)">
      <rect x="0" y="0" width="260" height="60" rx="4" fill="#ffffff" stroke="#3b82f6"/>
      <text x="130" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Authenticated Requests</text>
      <text x="130" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Cookie: sessionId=abc123</text>
      <text x="130" y="55" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">(auto-included by browser)</text>
    </g>
    
    <!-- Logout -->
    <g transform="translate(20, 300)">
      <rect x="0" y="0" width="260" height="50" rx="4" fill="#fef2f2" stroke="#ef4444"/>
      <text x="130" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">Logout</text>
      <text x="130" y="40" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">POST /logout → Clear cookie</text>
    </g>
  </g>
  
  <!-- Server -->
  <g transform="translate(750, 85)">
    <rect x="0" y="0" width="300" height="550" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="150" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#d97706">Server</text>
    
    <!-- Login Handler -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="260" height="80" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="130" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Login Handler</text>
      <text x="130" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">1. Verify credentials</text>
      <text x="130" y="57" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">2. Generate session ID</text>
      <text x="130" y="72" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">3. Store session in DB/Redis</text>
    </g>
    
    <!-- Session Store -->
    <g transform="translate(20, 150)">
      <rect x="0" y="0" width="260" height="90" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="130" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Session Store</text>
      <text x="130" y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Database / Redis</text>
      <text x="20" y="62" font-family="monospace" font-size="8" fill="#475569">Key: session:abc123</text>
      <text x="20" y="75" font-family="monospace" font-size="8" fill="#475569">Value: { userId: 1, exp: 1234 }</text>
      <text x="20" y="88" font-family="monospace" font-size="8" fill="#475569">TTL: 24 hours</text>
    </g>
    
    <!-- Session Middleware -->
    <g transform="translate(20, 260)">
      <rect x="0" y="0" width="260" height="70" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="130" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Session Middleware</text>
      <text x="130" y="42" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">1. Extract sessionId from cookie</text>
      <text x="130" y="57" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">2. Lookup session in store</text>
    </g>
    
    <!-- Logout Handler -->
    <g transform="translate(20, 350)">
      <rect x="0" y="0" width="260" height="50" rx="4" fill="#fef2f2" stroke="#ef4444"/>
      <text x="130" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">Logout Handler</text>
      <text x="130" y="40" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Delete session from store</text>
    </g>
  </g>
  
  <!-- Flow arrows -->
  <g transform="translate(380, 120)">
    <!-- Step 1: Login -->
    <line x1="0" y1="0" x2="340" y2="0" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
    <text x="170" y="-10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">1. Login Request</text>
    <text x="170" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">POST /login</text>
    
    <!-- Step 2: Set Cookie -->
    <line x1="340" y1="60" x2="0" y2="60" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="170" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">2. Set-Cookie Header</text>
    <text x="170" y="75" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">sessionId=abc123; HttpOnly</text>
    
    <!-- Step 3: Auth Request -->
    <line x1="0" y1="150" x2="340" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
    <text x="170" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">3. Authenticated Request</text>
    <text x="170" y="165" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Cookie: sessionId=abc123</text>
    
    <!-- Step 4: Response -->
    <line x1="340" y1="210" x2="0" y2="210" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="170" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">4. Response</text>
    <text x="170" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">200 OK + Data</text>
    
    <!-- Step 5: Logout -->
    <line x1="0" y1="300" x2="340" y2="300" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead-red)"/>
    <text x="170" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">5. Logout Request</text>
    <text x="170" y="315" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">POST /logout</text>
    
    <!-- Step 6: Clear Cookie -->
    <line x1="340" y1="360" x2="0" y2="360" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="170" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">6. Clear Cookie</text>
    <text x="170" y="375" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Set-Cookie: sessionId=; Max-Age=0</text>
  </g>
  
  <!-- Security notes -->
  <g transform="translate(50, 655)">
    <rect x="0" y="0" width="1000" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="500" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Security: HttpOnly prevents XSS theft | Secure prevents interception | SameSite prevents CSRF</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
