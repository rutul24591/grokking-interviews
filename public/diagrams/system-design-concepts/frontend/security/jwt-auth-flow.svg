<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" fill="none" stroke="#0f172a" stroke-width="2">
  <!-- Background -->
  <rect width="1100" height="700" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">JWT Token Authentication Flow</text>
  <text x="550" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#475569">Server signs tokens, client stores and sends them, server verifies signature</text>
  
  <!-- Client (Browser/App) -->
  <g transform="translate(50, 85)">
    <rect x="0" y="0" width="350" height="550" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="175" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#2563eb">Client (Browser / Mobile App)</text>
    
    <!-- Login -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="310" height="60" rx="4" fill="#ffffff" stroke="#3b82f6"/>
      <text x="155" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Login Request</text>
      <text x="155" y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">POST /api/login { username, password }</text>
    </g>
    
    <!-- Token Storage -->
    <g transform="translate(20, 130)">
      <rect x="0" y="0" width="310" height="80" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
      <text x="155" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">Token Storage</text>
      <text x="15" y="42" font-family="monospace" font-size="9" fill="#475569">Option A: HttpOnly Cookie (Recommended)</text>
      <text x="15" y="57" font-family="monospace" font-size="9" fill="#475569">Option B: localStorage (Vulnerable to XSS)</text>
      <text x="15" y="72" font-family="monospace" font-size="9" fill="#475569">Store: access_token + refresh_token</text>
    </g>
    
    <!-- API Request -->
    <g transform="translate(20, 230)">
      <rect x="0" y="0" width="310" height="60" rx="4" fill="#ffffff" stroke="#3b82f6"/>
      <text x="155" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Authenticated API Request</text>
      <text x="155" y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Authorization: Bearer &amp;lt;access_token&amp;gt;</text>
    </g>
    
    <!-- Token Refresh -->
    <g transform="translate(20, 310)">
      <rect x="0" y="0" width="310" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="155" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Token Refresh (when expired)</text>
      <text x="155" y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">POST /api/refresh { refresh_token }</text>
    </g>
    
    <!-- Token Structure -->
    <g transform="translate(20, 390)">
      <rect x="0" y="0" width="310" height="100" rx="4" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="155" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">JWT Structure</text>
      <text x="15" y="42" font-family="monospace" font-size="8" fill="#475569">header.payload.signature</text>
      <text x="15" y="57" font-family="monospace" font-size="8" fill="#475569">{ "sub": "user123", "exp": 1234567890 }</text>
      <text x="15" y="72" font-family="monospace" font-size="8" fill="#475569">Signature: HMACSHA256(..., secret)</text>
      <text x="15" y="87" font-family="monospace" font-size="8" fill="#475569">Base64Url encoded</text>
    </g>
  </g>
  
  <!-- Server -->
  <g transform="translate(700, 85)">
    <rect x="0" y="0" width="350" height="550" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="175" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#d97706">Server / API</text>
    
    <!-- Auth Endpoint -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="310" height="70" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="155" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Authentication Endpoint</text>
      <text x="15" y="42" font-family="monospace" font-size="9" fill="#475569">POST /api/login</text>
      <text x="15" y="57" font-family="monospace" font-size="9" fill="#475569">1. Verify credentials (bcrypt)</text>
      <text x="155" y="72" font-family="monospace" font-size="9" fill="#475569">2. Generate JWT (sign with secret)</text>
    </g>
    
    <!-- Token Generation -->
    <g transform="translate(20, 140)">
      <rect x="0" y="0" width="310" height="80" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="155" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Token Generation</text>
      <text x="15" y="42" font-family="monospace" font-size="9" fill="#475569">Access Token: 15-60 min expiry</text>
      <text x="15" y="57" font-family="monospace" font-size="9" fill="#475569">Refresh Token: 7-30 days expiry</text>
      <text x="15" y="72" font-family="monospace" font-size="9" fill="#475569">Sign: HS256 or RS256</text>
    </g>
    
    <!-- Token Verification -->
    <g transform="translate(20, 240)">
      <rect x="0" y="0" width="310" height="80" rx="4" fill="#ffffff" stroke="#f59e0b"/>
      <text x="155" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Token Verification Middleware</text>
      <text x="15" y="42" font-family="monospace" font-size="9" fill="#475569">1. Extract token from Authorization header</text>
      <text x="15" y="57" font-family="monospace" font-size="9" fill="#475569">2. Verify signature (HMAC/RSA)</text>
      <text x="15" y="72" font-family="monospace" font-size="9" fill="#475569">3. Check expiration (exp claim)</text>
    </g>
    
    <!-- Refresh Endpoint -->
    <g transform="translate(20, 340)">
      <rect x="0" y="0" width="310" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
      <text x="155" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Refresh Endpoint</text>
      <text x="155" y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">POST /api/refresh → New access token</text>
    </g>
    
    <!-- Secret Key -->
    <g transform="translate(20, 420)">
      <rect x="0" y="0" width="310" height="50" rx="4" fill="#fef2f2" stroke="#ef4444"/>
      <text x="155" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">Secret Key (HS256) / Private Key (RS256)</text>
      <text x="155" y="40" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">NEVER expose to client!</text>
    </g>
  </g>
  
  <!-- Flow arrows -->
  <g transform="translate(420, 120)">
    <!-- Step 1: Login -->
    <line x1="0" y1="0" x2="260" y2="0" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
    <text x="130" y="-10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">1. Login</text>
    
    <!-- Step 2: Return Tokens -->
    <line x1="260" y1="50" x2="0" y2="50" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="130" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">2. Return Tokens</text>
    <text x="130" y="65" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">{ access, refresh }</text>
    
    <!-- Step 3: API Request -->
    <line x1="0" y1="150" x2="260" y2="150" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
    <text x="130" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">3. API Request + Token</text>
    
    <!-- Step 4: Response -->
    <line x1="260" y1="200" x2="0" y2="200" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="130" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">4. Response</text>
    
    <!-- Step 5: Token Expired -->
    <line x1="0" y1="280" x2="260" y2="280" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead-orange)"/>
    <text x="130" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">5. Token Expired</text>
    
    <!-- Step 6: Refresh -->
    <line x1="260" y1="330" x2="0" y2="330" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="130" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">6. New Access Token</text>
  </g>
  
  <!-- Security notes -->
  <g transform="translate(50, 655)">
    <rect x="0" y="0" width="1000" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="500" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Security: Use HttpOnly cookies | Short expiration | Refresh tokens | Verify signature server-side</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
