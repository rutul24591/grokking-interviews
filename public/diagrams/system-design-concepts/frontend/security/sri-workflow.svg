<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" fill="none" stroke="#0f172a" stroke-width="2">
  <!-- Background -->
  <rect width="1000" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Subresource Integrity (SRI) Workflow</text>
  <text x="500" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#475569">How SRI protects against compromised CDN resources</text>
  
  <!-- Build Process -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="280" height="150" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#2563eb">Build Process</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#3b82f6" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1e40af">1. Bundle JavaScript/CSS</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1e40af">2. Generate SHA-384 hash</text>
    <text x="20" y="120" font-family="monospace" font-size="10" fill="#1e40af">sha384-oqVuAfXRKap7fdgc...</text>
    <text x="20" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1e40af">3. Inject into HTML</text>
  </g>
  
  <!-- Arrow to CDN -->
  <path d="M 330 175 L 420 175" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowhead-blue)"/>
  <text x="375" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2563eb">Deploy</text>
  
  <!-- CDN -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="200" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#d97706">CDN</text>
    <line x1="20" y1="45" x2="180" y2="45" stroke="#f59e0b" stroke-width="1"/>
    
    <text x="20" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#92400e">Serves resource:</text>
    <text x="20" y="100" font-family="monospace" font-size="10" fill="#92400e">library.min.js</text>
    <text x="20" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">With CORS headers</text>
    <text x="20" y="140" font-family="monospace" font-size="10" fill="#92400e">Access-Control-Allow-Origin: *</text>
  </g>
  
  <!-- Arrow to Browser -->
  <path d="M 620 175 L 710 175" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowhead-orange)"/>
  <text x="665" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d97706">Fetch</text>
  
  <!-- Browser Verification -->
  <g transform="translate(710, 100)">
    <rect x="0" y="0" width="240" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="120" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#16a34a">Browser Verification</text>
    <line x1="20" y1="45" x2="220" y2="45" stroke="#22c55e" stroke-width="1"/>
    
    <text x="20" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#15803d">1. Download resource from CDN</text>
    <text x="20" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#15803d">2. Compute SHA-384 hash</text>
    <text x="20" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#15803d">3. Compare with integrity attribute</text>
    
    <!-- Decision box -->
    <rect x="20" y="135" width="200" height="55" fill="#ffffff" stroke="#22c55e" rx="4"/>
    <text x="120" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">Hash Match?</text>
    <text x="40" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#15803d">✓ YES: Execute resource</text>
    <text x="40" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#dc2626">✗ NO: Block resource</text>
  </g>
  
  <!-- Arrow to Outcomes -->
  <path d="M 830 300 L 830 350" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowhead-green)"/>
  
  <!-- Outcomes -->
  <g transform="translate(630, 350)">
    <rect x="0" y="0" width="400" height="120" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="200" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#475569">Outcomes</text>
    <line x1="20" y1="45" x2="380" y2="45" stroke="#cbd5e1" stroke-width="1"/>
    
    <!-- Success -->
    <rect x="20" y="60" width="170" height="50" fill="#f0fdf4" stroke="#22c55e" rx="4"/>
    <text x="105" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">✓ ALLOWED</text>
    <text x="105" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#15803d">Resource executes</text>
    
    <!-- Blocked -->
    <rect x="210" y="60" width="170" height="50" fill="#fef2f2" stroke="#ef4444" rx="4"/>
    <text x="295" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">✗ BLOCKED</text>
    <text x="295" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#991b1b">Console error logged</text>
  </g>
  
  <!-- Example Code Box -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="550" height="200" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="275" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#475569">HTML Implementation</text>
    <line x1="20" y1="45" x2="530" y2="45" stroke="#cbd5e1" stroke-width="1"/>
    
    <text x="30" y="70" font-family="monospace" font-size="11" fill="#475569">&lt;!-- Script with SRI --&gt;</text>
    <text x="30" y="90" font-family="monospace" font-size="11" fill="#059669">&lt;script</text>
    <text x="50" y="110" font-family="monospace" font-size="11" fill="#059669">  src="https://cdn.example.com/library.js"</text>
    <text x="50" y="130" font-family="monospace" font-size="11" fill="#dc2626">  integrity="sha384-oqVuAfXRKap7fdgc..."</text>
    <text x="50" y="150" font-family="monospace" font-size="11" fill="#2563eb">  crossorigin="anonymous"&gt;</text>
    <text x="30" y="170" font-family="monospace" font-size="11" fill="#059669">&lt;/script&gt;</text>
  </g>
  
  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Key Insight Box -->
  <g transform="translate(50, 570)">
    <rect x="0" y="0" width="900" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="450" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#92400e">Key Insight</text>
    <text x="450" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#92400e">SRI protects against compromised CDNs by verifying resource integrity. Always use with CORS-enabled CDNs and combine with CSP for defense-in-depth.</text>
  </g>
</svg>
