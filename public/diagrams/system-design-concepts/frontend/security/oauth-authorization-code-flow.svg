<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" fill="none" stroke="#0f172a" stroke-width="1">
  <!-- Background -->
  <rect width="1200" height="750" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">OAuth 2.0 Authorization Code Flow</text>
  <text x="600" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#475569">Most secure OAuth flow for server-side applications</text>
  
  <!-- User -->
  <g transform="translate(50, 85)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
    <circle cx="90" cy="40" r="20" fill="#ffffff" stroke="#a855f7"/>
    <text x="90" y="75" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#9333ea">User</text>
    <text x="90" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">(Resource Owner)</text>
  </g>
  
  <!-- Client App -->
  <g transform="translate(350, 85)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#2563eb">Client App</text>
    <text x="100" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">(Your Application)</text>
    <text x="100" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">client_id, client_secret</text>
  </g>
  
  <!-- Auth Server -->
  <g transform="translate(650, 85)">
    <rect x="0" y="0" width="220" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="110" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#d97706">Authorization Server</text>
    <text x="110" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">(Google, Auth0, Okta)</text>
    <text x="110" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Issues tokens</text>
  </g>
  
  <!-- Resource Server -->
  <g transform="translate(950, 85)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Resource Server</text>
    <text x="100" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">(API / User Data)</text>
    <text x="100" y="85" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">Protected resources</text>
  </g>
  
  <!-- Flow Steps -->
  <g transform="translate(100, 220)">
    <!-- Step 1: Authorization Request -->
    <line x1="140" y1="0" x2="410" y2="0" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
    <text x="275" y="-10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">1. Authorization Request</text>
    <text x="275" y="15" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">GET /authorize?client_id=xxx</text>
    <text x="275" y="27" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">&amp;redirect_uri,scope,state</text>
    
    <!-- Step 2: User Authentication -->
    <line x1="410" y1="60" x2="610" y2="60" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowhead-purple)"/>
    <text x="510" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#9333ea">2. User Logs In</text>
    <text x="510" y="75" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">(at Auth Server)</text>
    
    <!-- Step 3: Authorization Code -->
    <line x1="610" y1="120" x2="140" y2="120" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="375" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">3. Redirect with Code</text>
    <text x="375" y="135" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">redirect_uri?code=AUTH_CODE&amp;state=xxx</text>
    
    <!-- Step 4: Token Request -->
    <line x1="410" y1="180" x2="610" y2="180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
    <text x="510" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">4. Token Request (Server-to-Server)</text>
    <text x="510" y="195" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">POST /token { code, client_id, client_secret }</text>
    
    <!-- Step 5: Access + Refresh Tokens -->
    <line x1="610" y1="240" x2="410" y2="240" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead-orange)"/>
    <text x="510" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">5. Return Tokens</text>
    <text x="510" y="255" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">{ access_token, refresh_token, id_token }</text>
    
    <!-- Step 6: API Request -->
    <line x1="410" y1="300" x2="810" y2="300" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
    <text x="610" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">6. API Request with Access Token</text>
    <text x="610" y="315" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">Authorization: Bearer &amp;lt;access_token&amp;gt;</text>
    
    <!-- Step 7: Protected Resource -->
    <line x1="810" y1="360" x2="410" y2="360" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <text x="610" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">7. Protected Resource Data</text>
    <text x="610" y="375" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">200 OK + User Data</text>
    
    <!-- Step 8: Token Refresh -->
    <line x1="410" y1="420" x2="610" y2="420" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowhead-orange)"/>
    <text x="510" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#d97706">8. Refresh Token (when expired)</text>
    <text x="510" y="435" text-anchor="middle" font-family="monospace" font-size="8" fill="#475569">POST /token { refresh_token, grant_type=refresh_token }</text>
  </g>
  
  <!-- Security Notes -->
  <g transform="translate(100, 680)">
    <rect x="0" y="0" width="1000" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="500" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Security Features</text>
    <text x="500" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">• client_secret never exposed to browser (server-to-server token exchange)</text>
    <text x="500" y="57" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">• state parameter prevents CSRF attacks | Use PKCE for additional protection</text>
  </g>
  
  <!-- PKCE Note -->
  <g transform="translate(100, 600)">
    <rect x="0" y="0" width="1000" height="60" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-dasharray="4,2"/>
    <text x="500" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#9333ea">PKCE (Proof Key for Code Exchange)</text>
    <text x="500" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569">Recommended for ALL clients (including server-side). Prevents authorization code interception attacks.</text>
    <text x="500" y="57" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">code_challenge = SHA256(code_verifier) | Server verifies code_verifier matches challenge</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
