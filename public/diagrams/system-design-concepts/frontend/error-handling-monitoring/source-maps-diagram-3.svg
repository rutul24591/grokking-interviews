<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <title>Production source map security strategies comparing inline, external, hidden, and nosources approaches</title>
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Source Map Security Strategies</text>
  <line x1="20" y1="50" x2="880" y2="50" stroke="#d7d1e6" stroke-width="1"/>

  <rect x="20" y="62" width="860" height="95" fill="#ffffff" rx="8" stroke="#cc4444" stroke-width="1.5"/>
  <rect x="30" y="72" width="140" height="28" rx="6" fill="#cc4444"/>
  <text x="100" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Inline</text>
  <text x="30" y="120" font-size="10" fill="#cc4444" font-weight="bold">inline-source-map</text>
  <text x="30" y="145" font-size="10" fill="#666666">Security: NONE</text>
  <text x="200" y="88" font-size="11" fill="#1a1822">Base64-encoded map embedded in JS bundle.</text>
  <text x="200" y="106" font-size="11" fill="#1a1822">Increases bundle size 2-3x.</text>
  <text x="200" y="124" font-size="10" fill="#888888">//# sourceMappingURL=data:application/json;base64,...</text>
  <text x="630" y="88" font-size="11" fill="#1a1822" font-weight="bold">Dev only</text>
  <text x="630" y="106" font-size="10" fill="#666666">Full source exposed to anyone.</text>
  <text x="630" y="124" font-size="10" fill="#cc4444" font-weight="bold">Never use in production.</text>
  <rect x="810" y="72" width="60" height="22" rx="11" fill="#cc4444" opacity="0.15"/>
  <text x="840" y="87" text-anchor="middle" font-size="9" font-weight="bold" fill="#cc4444">AVOID</text>

  <rect x="20" y="168" width="860" height="95" fill="#ffffff" rx="8" stroke="#f0ad4e" stroke-width="1.5"/>
  <rect x="30" y="178" width="140" height="28" rx="6" fill="#f0ad4e"/>
  <text x="100" y="197" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">External</text>
  <text x="30" y="226" font-size="10" fill="#f0ad4e" font-weight="bold">source-map</text>
  <text x="30" y="251" font-size="10" fill="#666666">Security: LOW</text>
  <text x="200" y="194" font-size="11" fill="#1a1822">Separate .map file, referenced in JS output.</text>
  <text x="200" y="212" font-size="11" fill="#1a1822">Browser auto-fetches map when DevTools open.</text>
  <text x="200" y="230" font-size="10" fill="#888888">//# sourceMappingURL=bundle.js.map</text>
  <text x="630" y="194" font-size="11" fill="#1a1822" font-weight="bold">Staging only</text>
  <text x="630" y="212" font-size="10" fill="#666666">Map URL discoverable in source.</text>
  <text x="630" y="230" font-size="10" fill="#f0ad4e" font-weight="bold">Risky for production.</text>
  <rect x="810" y="178" width="60" height="22" rx="11" fill="#f0ad4e" opacity="0.15"/>
  <text x="840" y="193" text-anchor="middle" font-size="9" font-weight="bold" fill="#f0ad4e">RISKY</text>

  <rect x="20" y="274" width="860" height="95" fill="#ffffff" rx="8" stroke="#4caf50" stroke-width="2.5"/>
  <rect x="30" y="284" width="140" height="28" rx="6" fill="#4caf50"/>
  <text x="100" y="303" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Hidden</text>
  <text x="30" y="332" font-size="10" fill="#4caf50" font-weight="bold">hidden-source-map</text>
  <text x="30" y="357" font-size="10" fill="#666666">Security: HIGH</text>
  <text x="200" y="300" font-size="11" fill="#1a1822">Separate .map file generated, NO reference in JS.</text>
  <text x="200" y="318" font-size="11" fill="#1a1822">Upload maps to error service (Sentry, Bugsnag).</text>
  <text x="200" y="336" font-size="10" fill="#888888">No sourceMappingURL comment in output</text>
  <text x="630" y="300" font-size="11" fill="#1a1822" font-weight="bold">Production builds</text>
  <text x="630" y="318" font-size="10" fill="#666666">Maps only accessible to error</text>
  <text x="630" y="336" font-size="10" fill="#666666">service. Source stays private.</text>
  <rect x="790" y="278" width="82" height="22" rx="11" fill="#4caf50"/>
  <text x="831" y="293" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">RECOMMENDED</text>

  <rect x="20" y="380" width="860" height="95" fill="#ffffff" rx="8" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="30" y="390" width="140" height="28" rx="6" fill="#6d5bd0"/>
  <text x="100" y="409" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Nosources</text>
  <text x="30" y="438" font-size="10" fill="#6d5bd0" font-weight="bold">nosources-source-map</text>
  <text x="30" y="463" font-size="10" fill="#666666">Security: MEDIUM-HIGH</text>
  <text x="200" y="406" font-size="11" fill="#1a1822">Map without sourcesContent array.</text>
  <text x="200" y="424" font-size="11" fill="#1a1822">Shows file names &amp; line numbers, not actual code.</text>
  <text x="200" y="442" font-size="10" fill="#888888">sourcesContent: [] (empty)</text>
  <text x="630" y="406" font-size="11" fill="#1a1822" font-weight="bold">Compliance-sensitive</text>
  <text x="630" y="424" font-size="10" fill="#666666">Stack traces show locations but</text>
  <text x="630" y="442" font-size="10" fill="#666666">code is not readable.</text>
  <rect x="810" y="390" width="60" height="22" rx="11" fill="#6d5bd0" opacity="0.15"/>
  <text x="840" y="405" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">NICHE</text>
</svg>
