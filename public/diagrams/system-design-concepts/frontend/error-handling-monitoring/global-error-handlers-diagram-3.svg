<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Global error handler pipeline from capture through enrichment to reporting service</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Error Processing Pipeline</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">From raw error capture to actionable reporting</text>

  <!-- Step 1: Capture -->
  <rect x="30" y="90" width="120" height="130" rx="10" fill="#6d5bd0"/>
  <text x="90" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Capture</text>
  <text x="90" y="140" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">window.onerror</text>
  <text x="90" y="155" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">unhandledrejection</text>
  <text x="90" y="170" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">resource errors</text>
  <text x="90" y="185" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">manual capture()</text>
  <text x="90" y="205" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.6">Raw error object</text>

  <line x1="150" y1="155" x2="170" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPipe)"/>

  <!-- Step 2: Normalize -->
  <rect x="170" y="90" width="120" height="130" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="230" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Normalize</text>
  <text x="230" y="140" text-anchor="middle" font-size="9" fill="#1a1822">Extract message</text>
  <text x="230" y="155" text-anchor="middle" font-size="9" fill="#1a1822">Parse stack trace</text>
  <text x="230" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Determine type</text>
  <text x="230" y="185" text-anchor="middle" font-size="9" fill="#1a1822">Handle non-Error</text>
  <text x="230" y="200" text-anchor="middle" font-size="9" fill="#1a1822">thrown values</text>

  <line x1="290" y1="155" x2="310" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPipe)"/>

  <!-- Step 3: Enrich -->
  <rect x="310" y="90" width="120" height="130" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="370" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Enrich</text>
  <text x="370" y="140" text-anchor="middle" font-size="9" fill="#1a1822">+ userId</text>
  <text x="370" y="155" text-anchor="middle" font-size="9" fill="#1a1822">+ sessionId</text>
  <text x="370" y="170" text-anchor="middle" font-size="9" fill="#1a1822">+ current route</text>
  <text x="370" y="185" text-anchor="middle" font-size="9" fill="#1a1822">+ app version</text>
  <text x="370" y="200" text-anchor="middle" font-size="9" fill="#1a1822">+ device info</text>

  <line x1="430" y1="155" x2="450" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPipe)"/>

  <!-- Step 4: Deduplicate -->
  <rect x="450" y="90" width="120" height="130" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="510" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Deduplicate</text>
  <text x="510" y="140" text-anchor="middle" font-size="9" fill="#1a1822">Generate fingerprint</text>
  <text x="510" y="155" text-anchor="middle" font-size="9" fill="#1a1822">(message + stack)</text>
  <text x="510" y="175" text-anchor="middle" font-size="9" fill="#1a1822">Check recent cache</text>
  <text x="510" y="195" text-anchor="middle" font-size="9" fill="#cc4444">Skip if duplicate</text>
  <text x="510" y="210" text-anchor="middle" font-size="9" fill="#cc4444">within 60s window</text>

  <line x1="570" y1="155" x2="590" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPipe)"/>

  <!-- Step 5: Rate Limit -->
  <rect x="590" y="90" width="120" height="130" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="650" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Rate Limit</text>
  <text x="650" y="140" text-anchor="middle" font-size="9" fill="#1a1822">Max 10 errors/min</text>
  <text x="650" y="155" text-anchor="middle" font-size="9" fill="#1a1822">per session</text>
  <text x="650" y="175" text-anchor="middle" font-size="9" fill="#1a1822">Token bucket</text>
  <text x="650" y="190" text-anchor="middle" font-size="9" fill="#1a1822">algorithm</text>
  <text x="650" y="210" text-anchor="middle" font-size="9" fill="#cc4444">Drop if exceeded</text>

  <line x1="710" y1="155" x2="730" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPipe)"/>

  <!-- Step 6: Transport -->
  <rect x="730" y="90" width="140" height="130" rx="10" fill="#6d5bd0"/>
  <text x="800" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Transport</text>
  <text x="800" y="140" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Batch 5-10 events</text>
  <text x="800" y="155" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">Compress payload</text>
  <text x="800" y="170" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">sendBeacon() or</text>
  <text x="800" y="185" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.8">fetch(keepalive)</text>
  <text x="800" y="205" text-anchor="middle" font-size="8" fill="#ffffff" opacity="0.6">Survives page unload</text>

  <!-- Arrow down to service -->
  <line x1="800" y1="220" x2="800" y2="260" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPipe)"/>

  <!-- Reporting Service -->
  <rect x="550" y="260" width="320" height="80" rx="12" fill="#4caf50"/>
  <text x="710" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Reporting Service</text>
  <text x="710" y="312" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.9">Sentry / Datadog / LogRocket / Custom</text>
  <text x="710" y="330" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">Aggregation, alerting, dashboards</text>

  <!-- Volume reduction illustration -->
  <rect x="30" y="260" width="480" height="220" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="270" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Volume Reduction at Each Stage</text>

  <rect x="50" y="310" width="440" height="25" rx="4" fill="#cc4444" opacity="0.2"/>
  <text x="60" y="327" font-size="10" fill="#1a1822">Raw errors captured: 10,000 events/hour</text>

  <rect x="50" y="345" width="330" height="25" rx="4" fill="#f0ad4e" opacity="0.2"/>
  <text x="60" y="362" font-size="10" fill="#1a1822">After dedup: 2,500 unique errors/hour</text>

  <rect x="50" y="380" width="220" height="25" rx="4" fill="#6d5bd0" opacity="0.15"/>
  <text x="60" y="397" font-size="10" fill="#1a1822">After rate limit: 600 errors/hour</text>

  <rect x="50" y="415" width="140" height="25" rx="4" fill="#4caf50" opacity="0.2"/>
  <text x="60" y="432" font-size="10" fill="#1a1822">Batched: 60 requests/hour</text>

  <text x="270" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">99.4% network request reduction vs naive approach</text>

  <defs>
    <marker id="arrowPipe" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
