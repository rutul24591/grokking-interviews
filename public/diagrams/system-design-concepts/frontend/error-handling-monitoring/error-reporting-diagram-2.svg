<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Issue grouping flow showing raw events being deduplicated into grouped issues with fingerprints</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Event-to-Issue Grouping &amp; Deduplication</text>

  <!-- Raw events -->
  <rect x="30" y="70" width="200" height="200" rx="10" fill="#cc4444" opacity="0.1" stroke="#cc4444" stroke-width="1.5"/>
  <text x="130" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#cc4444">Raw Error Events</text>
  <text x="130" y="115" text-anchor="middle" font-size="24" font-weight="700" fill="#cc4444">10,000</text>
  <text x="130" y="135" text-anchor="middle" font-size="10" fill="#1a1822">events in 24 hours</text>

  <!-- Small event dots to represent volume -->
  <g fill="#cc4444" opacity="0.4">
    <circle cx="60" cy="160" r="3"/><circle cx="75" cy="165" r="3"/><circle cx="90" cy="158" r="3"/>
    <circle cx="105" cy="168" r="3"/><circle cx="120" cy="155" r="3"/><circle cx="135" cy="163" r="3"/>
    <circle cx="150" cy="157" r="3"/><circle cx="165" cy="170" r="3"/><circle cx="180" cy="160" r="3"/>
    <circle cx="195" cy="165" r="3"/><circle cx="68" cy="180" r="3"/><circle cx="83" cy="185" r="3"/>
    <circle cx="98" cy="178" r="3"/><circle cx="113" cy="188" r="3"/><circle cx="128" cy="175" r="3"/>
    <circle cx="143" cy="183" r="3"/><circle cx="158" cy="177" r="3"/><circle cx="173" cy="190" r="3"/>
    <circle cx="188" cy="180" r="3"/><circle cx="60" cy="200" r="3"/><circle cx="80" cy="205" r="3"/>
    <circle cx="100" cy="198" r="3"/><circle cx="120" cy="208" r="3"/><circle cx="140" cy="195" r="3"/>
    <circle cx="160" cy="203" r="3"/><circle cx="180" cy="197" r="3"/><circle cx="200" cy="210" r="3"/>
    <circle cx="70" cy="220" r="3"/><circle cx="90" cy="225" r="3"/><circle cx="110" cy="218" r="3"/>
    <circle cx="130" cy="228" r="3"/><circle cx="150" cy="215" r="3"/><circle cx="170" cy="223" r="3"/>
    <circle cx="190" cy="240" r="3"/><circle cx="55" cy="245" r="3"/><circle cx="110" cy="248" r="3"/>
    <circle cx="160" cy="243" r="3"/><circle cx="200" cy="255" r="3"/>
  </g>

  <!-- Arrow to fingerprinting -->
  <line x1="230" y1="170" x2="280" y2="170" stroke="#6d5bd0" stroke-width="3" marker-end="url(#arrowER2)"/>

  <!-- Fingerprinting engine -->
  <rect x="280" y="80" width="250" height="180" rx="12" fill="#6d5bd0"/>
  <text x="405" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Fingerprinting Engine</text>

  <rect x="300" y="120" width="210" height="30" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="405" y="140" text-anchor="middle" font-size="10" fill="#ffffff">1. Normalize stack trace frames</text>

  <rect x="300" y="158" width="210" height="30" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="405" y="178" text-anchor="middle" font-size="10" fill="#ffffff">2. Extract key frames (top 5)</text>

  <rect x="300" y="196" width="210" height="30" rx="6" fill="#ffffff" opacity="0.15"/>
  <text x="405" y="216" text-anchor="middle" font-size="10" fill="#ffffff">3. Hash → unique fingerprint</text>

  <!-- Arrow to grouped issues -->
  <line x1="530" y1="170" x2="580" y2="170" stroke="#6d5bd0" stroke-width="3" marker-end="url(#arrowER2)"/>

  <!-- Grouped Issues -->
  <text x="735" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Grouped Issues</text>

  <!-- Issue A -->
  <rect x="590" y="90" width="280" height="75" rx="8" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="610" y="112" font-size="12" font-weight="700" fill="#cc4444">Issue A: TypeError in Cart</text>
  <text x="610" y="130" font-size="10" fill="#1a1822">8,200 events | 3,400 users affected</text>
  <text x="610" y="148" font-size="9" fill="#1a1822" opacity="0.7">First: Mar 28 | Last: Mar 31 | Trend: rising</text>
  <rect x="820" y="100" width="40" height="50" rx="4" fill="#cc4444" opacity="0.1"/>
  <rect x="825" y="135" width="5" height="15" fill="#cc4444" opacity="0.5"/><rect x="833" y="125" width="5" height="25" fill="#cc4444" opacity="0.6"/>
  <rect x="841" y="115" width="5" height="35" fill="#cc4444" opacity="0.8"/>

  <!-- Issue B -->
  <rect x="590" y="175" width="280" height="75" rx="8" fill="#ffffff" stroke="#f0ad4e" stroke-width="2"/>
  <text x="610" y="197" font-size="12" font-weight="700" fill="#f0ad4e">Issue B: NetworkError in API</text>
  <text x="610" y="215" font-size="10" fill="#1a1822">1,500 events | 890 users affected</text>
  <text x="610" y="233" font-size="9" fill="#1a1822" opacity="0.7">First: Mar 30 | Last: Mar 31 | Trend: stable</text>
  <rect x="820" y="185" width="40" height="50" rx="4" fill="#f0ad4e" opacity="0.1"/>
  <rect x="825" y="215" width="5" height="15" fill="#f0ad4e" opacity="0.5"/><rect x="833" y="213" width="5" height="17" fill="#f0ad4e" opacity="0.6"/>
  <rect x="841" y="212" width="5" height="18" fill="#f0ad4e" opacity="0.7"/>

  <!-- Issue C -->
  <rect x="590" y="260" width="280" height="75" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="610" y="282" font-size="12" font-weight="700" fill="#6d5bd0">Issue C: ReferenceError</text>
  <text x="610" y="300" font-size="10" fill="#1a1822">300 events | 150 users affected</text>
  <text x="610" y="318" font-size="9" fill="#1a1822" opacity="0.7">First: Mar 31 | Last: Mar 31 | Trend: new!</text>
  <rect x="820" y="270" width="40" height="50" rx="4" fill="#6d5bd0" opacity="0.1"/>
  <rect x="841" y="305" width="5" height="10" fill="#6d5bd0" opacity="0.5"/>

  <!-- Bottom: Key insight -->
  <rect x="30" y="360" width="840" height="125" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="388" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Why Grouping Matters</text>

  <rect x="50" y="400" width="250" height="70" rx="8" fill="#cc4444" opacity="0.05"/>
  <text x="175" y="422" text-anchor="middle" font-size="11" font-weight="600" fill="#cc4444">Without Grouping</text>
  <text x="175" y="442" text-anchor="middle" font-size="10" fill="#1a1822">10,000 individual alerts</text>
  <text x="175" y="458" text-anchor="middle" font-size="10" fill="#1a1822">Impossible to prioritize</text>

  <rect x="325" y="400" width="250" height="70" rx="8" fill="#4caf50" opacity="0.05"/>
  <text x="450" y="422" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">With Grouping</text>
  <text x="450" y="442" text-anchor="middle" font-size="10" fill="#1a1822">3 actionable issues</text>
  <text x="450" y="458" text-anchor="middle" font-size="10" fill="#1a1822">Clear priority by impact</text>

  <rect x="600" y="400" width="250" height="70" rx="8" fill="#6d5bd0" opacity="0.05"/>
  <text x="725" y="422" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Custom Fingerprints</text>
  <text x="725" y="442" text-anchor="middle" font-size="10" fill="#1a1822">Override default grouping</text>
  <text x="725" y="458" text-anchor="middle" font-size="10" fill="#1a1822">for domain-specific rules</text>

  <defs>
    <marker id="arrowER2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
