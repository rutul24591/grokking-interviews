<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Circuit Breaker Pattern in Frontend Applications: Closed, Open, and Half-Open States with Transitions</title>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cc4444"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4caf50"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Circuit Breaker Pattern — Frontend State Machine</text>

  <!-- ==================== STATE: CLOSED ==================== -->
  <rect x="40" y="60" width="240" height="150" rx="10" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <text x="160" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">CLOSED</text>
  <text x="160" y="100" text-anchor="middle" font-size="10" fill="#ffffff" font-style="italic">(Normal Operation)</text>
  <line x1="55" y1="108" x2="265" y2="108" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="126" font-size="10" fill="#ffffff">Requests flow through normally</text>
  <text x="60" y="142" font-size="10" fill="#ffffff">Failure counter tracks errors</text>
  <text x="60" y="158" font-size="10" fill="#ffffff">Threshold: 5 failures in 60s</text>
  <text x="60" y="174" font-size="10" fill="#ffffff">Success resets counter</text>
  <!-- Self-loop for success -->
  <path d="M55,60 C55,35 105,35 105,60" fill="none" stroke="#388e3c" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="80" y="47" text-anchor="middle" font-size="8" fill="#388e3c" font-weight="600">success</text>

  <!-- ==================== STATE: OPEN ==================== -->
  <rect x="560" y="60" width="240" height="150" rx="10" fill="#cc4444" stroke="#a33636" stroke-width="2"/>
  <text x="680" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">OPEN</text>
  <text x="680" y="100" text-anchor="middle" font-size="10" fill="#ffffff" font-style="italic">(Tripped — Blocking Requests)</text>
  <line x1="575" y1="108" x2="785" y2="108" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="580" y="126" font-size="10" fill="#ffffff">All requests return fallback</text>
  <text x="580" y="142" font-size="10" fill="#ffffff">No network calls made</text>
  <text x="580" y="158" font-size="10" fill="#ffffff">Cooldown timer: 30 seconds</text>
  <text x="580" y="174" font-size="10" fill="#ffffff">Serves cached/default data</text>

  <!-- ==================== STATE: HALF-OPEN ==================== -->
  <rect x="300" y="280" width="240" height="140" rx="10" fill="#f0ad4e" stroke="#d4952b" stroke-width="2"/>
  <text x="420" y="306" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1822">HALF-OPEN</text>
  <text x="420" y="320" text-anchor="middle" font-size="10" fill="#1a1822" font-style="italic">(Testing Recovery)</text>
  <line x1="315" y1="328" x2="525" y2="328" stroke="#1a1822" stroke-opacity="0.2" stroke-width="1"/>
  <text x="320" y="346" font-size="10" fill="#1a1822">Allow 1 probe request through</text>
  <text x="320" y="362" font-size="10" fill="#1a1822">Remaining requests use fallback</text>
  <text x="320" y="378" font-size="10" fill="#1a1822">Evaluate probe result</text>
  <text x="320" y="394" font-size="10" fill="#1a1822">Single request determines state</text>

  <!-- ==================== TRANSITIONS ==================== -->

  <!-- CLOSED → OPEN: failure threshold reached -->
  <path d="M280,120 L560,120" fill="none" stroke="#cc4444" stroke-width="2" marker-end="url(#arrRed)"/>
  <rect x="340" y="100" width="160" height="30" rx="4" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="420" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Failure threshold reached</text>
  <text x="420" y="124" text-anchor="middle" font-size="8" fill="#1a1822">5 failures within 60s window</text>

  <!-- OPEN → HALF-OPEN: timeout expired -->
  <path d="M680,210 L680,350 L540,350" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrPurple)"/>
  <rect x="622" y="250" width="120" height="30" rx="4" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="682" y="263" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Timeout expired</text>
  <text x="682" y="274" text-anchor="middle" font-size="8" fill="#1a1822">After 30s cooldown</text>

  <!-- HALF-OPEN → CLOSED: probe succeeded -->
  <path d="M300,350 L160,350 L160,210" fill="none" stroke="#4caf50" stroke-width="2" marker-end="url(#arrGreen)"/>
  <rect x="175" y="260" width="120" height="30" rx="4" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="235" y="273" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">Probe succeeded</text>
  <text x="235" y="284" text-anchor="middle" font-size="8" fill="#1a1822">Reset failure counter</text>

  <!-- HALF-OPEN → OPEN: probe failed -->
  <path d="M540,310 L680,310 L680,210" fill="none" stroke="#cc4444" stroke-width="2" marker-end="url(#arrRed)"/>
  <rect x="600" y="298" width="100" height="22" rx="4" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="650" y="313" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">Probe failed</text>

  <!-- ==================== TIMELINE ==================== -->
  <text x="40" y="448" font-size="12" font-weight="700" fill="#1a1822">Request Timeline</text>

  <!-- Timeline base line -->
  <line x1="40" y1="470" x2="860" y2="470" stroke="#d7d1e6" stroke-width="2"/>

  <!-- Timeline markers - Closed phase -->
  <circle cx="60" cy="470" r="5" fill="#4caf50"/>
  <circle cx="85" cy="470" r="5" fill="#4caf50"/>
  <circle cx="110" cy="470" r="5" fill="#4caf50"/>
  <circle cx="135" cy="470" r="5" fill="#cc4444"/>
  <circle cx="160" cy="470" r="5" fill="#cc4444"/>
  <circle cx="185" cy="470" r="5" fill="#4caf50"/>
  <circle cx="210" cy="470" r="5" fill="#cc4444"/>
  <circle cx="235" cy="470" r="5" fill="#cc4444"/>
  <circle cx="260" cy="470" r="5" fill="#cc4444"/>

  <!-- Trip point -->
  <line x1="280" y1="458" x2="280" y2="482" stroke="#cc4444" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="280" y="453" text-anchor="middle" font-size="8" font-weight="600" fill="#cc4444">TRIP</text>

  <!-- Open phase - all blocked -->
  <circle cx="310" cy="470" r="5" fill="#d7d1e6" stroke="#cc4444" stroke-width="1.5"/>
  <circle cx="340" cy="470" r="5" fill="#d7d1e6" stroke="#cc4444" stroke-width="1.5"/>
  <circle cx="370" cy="470" r="5" fill="#d7d1e6" stroke="#cc4444" stroke-width="1.5"/>
  <circle cx="400" cy="470" r="5" fill="#d7d1e6" stroke="#cc4444" stroke-width="1.5"/>
  <circle cx="430" cy="470" r="5" fill="#d7d1e6" stroke="#cc4444" stroke-width="1.5"/>
  <circle cx="460" cy="470" r="5" fill="#d7d1e6" stroke="#cc4444" stroke-width="1.5"/>
  <circle cx="490" cy="470" r="5" fill="#d7d1e6" stroke="#cc4444" stroke-width="1.5"/>
  <circle cx="520" cy="470" r="5" fill="#d7d1e6" stroke="#cc4444" stroke-width="1.5"/>

  <!-- Timeout point -->
  <line x1="545" y1="458" x2="545" y2="482" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="545" y="453" text-anchor="middle" font-size="8" font-weight="600" fill="#6d5bd0">TIMEOUT</text>

  <!-- Half-open phase - probe -->
  <circle cx="575" cy="470" r="7" fill="#f0ad4e" stroke="#d4952b" stroke-width="1.5"/>
  <text x="575" y="473" text-anchor="middle" font-size="7" font-weight="700" fill="#1a1822">P</text>

  <!-- Recovery point -->
  <line x1="605" y1="458" x2="605" y2="482" stroke="#4caf50" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="605" y="453" text-anchor="middle" font-size="8" font-weight="600" fill="#4caf50">RESET</text>

  <!-- Closed again -->
  <circle cx="635" cy="470" r="5" fill="#4caf50"/>
  <circle cx="660" cy="470" r="5" fill="#4caf50"/>
  <circle cx="685" cy="470" r="5" fill="#4caf50"/>
  <circle cx="710" cy="470" r="5" fill="#4caf50"/>
  <circle cx="735" cy="470" r="5" fill="#4caf50"/>

  <!-- Legend -->
  <circle cx="775" cy="463" r="4" fill="#4caf50"/>
  <text x="785" y="467" font-size="8" fill="#1a1822">Success</text>
  <circle cx="775" cy="477" r="4" fill="#cc4444"/>
  <text x="785" y="481" font-size="8" fill="#1a1822">Failure</text>
  <circle cx="830" cy="463" r="4" fill="#d7d1e6" stroke="#cc4444" stroke-width="1"/>
  <text x="840" y="467" font-size="8" fill="#1a1822">Blocked</text>
  <circle cx="830" cy="477" r="4" fill="#f0ad4e"/>
  <text x="840" y="481" font-size="8" fill="#1a1822">Probe</text>

  <!-- Phase labels under timeline -->
  <text x="160" y="495" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">CLOSED</text>
  <text x="415" y="495" text-anchor="middle" font-size="9" font-weight="600" fill="#cc4444">OPEN</text>
  <text x="575" y="495" text-anchor="middle" font-size="9" font-weight="600" fill="#f0ad4e">HALF-OPEN</text>
  <text x="685" y="495" text-anchor="middle" font-size="9" font-weight="600" fill="#4caf50">CLOSED</text>
</svg>