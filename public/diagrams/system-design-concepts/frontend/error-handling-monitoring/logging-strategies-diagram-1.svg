<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Frontend Logging Pipeline</text>

  <!-- Row 1: App Code -> Logger API -> Buffer -->
  <!-- App Code -->
  <rect x="30" y="70" width="120" height="64" rx="10" fill="#6d5bd0"/>
  <text x="90" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">App Code</text>
  <text x="90" y="116" text-anchor="middle" font-size="10" fill="#e0daf0">console.log / logger</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="102" x2="190" y2="102" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Logger API -->
  <rect x="190" y="70" width="140" height="64" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="260" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Logger API</text>
  <text x="260" y="113" text-anchor="middle" font-size="10" fill="#6d5bd0">Level Filter (severity)</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="102" x2="370" y2="102" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Buffer -->
  <rect x="370" y="70" width="140" height="64" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="440" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Buffer</text>
  <text x="440" y="113" text-anchor="middle" font-size="10" fill="#6d5bd0">In-Memory Queue</text>

  <!-- Arrow 3 -->
  <line x1="510" y1="102" x2="550" y2="102" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Batch & Compress -->
  <rect x="550" y="70" width="150" height="64" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="625" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Batch &amp; Compress</text>
  <text x="625" y="113" text-anchor="middle" font-size="10" fill="#6d5bd0">gzip / debounce timer</text>

  <!-- Curved arrow down from Batch to Transport -->
  <path d="M625,134 L625,180" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Row 2: Transport -->
  <rect x="330" y="180" width="590" height="70" rx="10" fill="#6d5bd0" opacity="0.08" stroke="#6d5bd0" stroke-width="1"/>
  <text x="625" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Transport Layer</text>

  <!-- Beacon API box -->
  <rect x="370" y="215" width="120" height="28" rx="6" fill="#6d5bd0"/>
  <text x="430" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Beacon API</text>

  <!-- XHR / Fetch box -->
  <rect x="520" y="215" width="120" height="28" rx="6" fill="#6d5bd0"/>
  <text x="580" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">XHR / Fetch</text>

  <!-- WebSocket box -->
  <rect x="670" y="215" width="120" height="28" rx="6" fill="#6d5bd0"/>
  <text x="730" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">WebSocket</text>

  <!-- Arrow down from Transport to Log Aggregation -->
  <path d="M625,250 L625,290" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Network boundary line -->
  <line x1="30" y1="275" x2="870" y2="275" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="30" y="267" width="90" height="16" rx="4" fill="#f3f1f8"/>
  <text x="75" y="278" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">NETWORK</text>

  <!-- Log Aggregation Service -->
  <rect x="450" y="290" width="350" height="70" rx="10" fill="#6d5bd0"/>
  <text x="625" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Log Aggregation Service</text>
  <text x="625" y="338" text-anchor="middle" font-size="11" fill="#e0daf0">Ingest, index, store &amp; correlate logs</text>

  <!-- Arrows down to Dashboard and Alerts -->
  <path d="M550,360 L480,400" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M700,360 L770,400" fill="none" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Dashboard -->
  <rect x="370" y="400" width="220" height="64" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="480" y="426" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Dashboard</text>
  <text x="480" y="444" text-anchor="middle" font-size="10" fill="#6d5bd0">Search, filter, visualize</text>

  <!-- Alerts -->
  <rect x="650" y="400" width="220" height="64" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="760" y="426" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">Alerts &amp; Notifications</text>
  <text x="760" y="444" text-anchor="middle" font-size="10" fill="#6d5bd0">Thresholds, anomalies, PagerDuty</text>

  <!-- Labels on left side -->
  <rect x="30" y="160" width="80" height="22" rx="4" fill="#6d5bd0" opacity="0.12"/>
  <text x="70" y="175" text-anchor="middle" font-size="9" font-weight="700" fill="#6d5bd0">CLIENT</text>

  <rect x="30" y="310" width="80" height="22" rx="4" fill="#6d5bd0" opacity="0.12"/>
  <text x="70" y="325" text-anchor="middle" font-size="9" font-weight="700" fill="#6d5bd0">SERVER</text>

  <!-- Step numbers -->
  <circle cx="90" cy="56" r="10" fill="#6d5bd0"/>
  <text x="90" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">1</text>

  <circle cx="260" cy="56" r="10" fill="#6d5bd0"/>
  <text x="260" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">2</text>

  <circle cx="440" cy="56" r="10" fill="#6d5bd0"/>
  <text x="440" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">3</text>

  <circle cx="625" cy="56" r="10" fill="#6d5bd0"/>
  <text x="625" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">4</text>

  <circle cx="625" cy="168" r="10" fill="#6d5bd0"/>
  <text x="625" y="172" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">5</text>

  <circle cx="625" cy="382" r="10" fill="#6d5bd0"/>
  <text x="625" y="386" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">6</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>