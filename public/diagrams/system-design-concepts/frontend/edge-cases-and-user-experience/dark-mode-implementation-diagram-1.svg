<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Design Token Architecture for Theme System</text>

  <!-- Primitive Tokens -->
  <rect x="30" y="60" width="260" height="220" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="160" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Primitive Tokens (Raw Values)</text>

  <rect x="45" y="95" width="230" height="22" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <rect x="47" y="97" width="18" height="18" rx="2" fill="#ffffff" stroke="#d7d1e6"/>
  <text x="72" y="111" font-size="9" fill="#1a1822">white: #ffffff</text>

  <rect x="45" y="122" width="230" height="22" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <rect x="47" y="124" width="18" height="18" rx="2" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="72" y="138" font-size="9" fill="#1a1822">gray-50: #f3f1f8</text>

  <rect x="45" y="149" width="230" height="22" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <rect x="47" y="151" width="18" height="18" rx="2" fill="#d7d1e6"/>
  <text x="72" y="165" font-size="9" fill="#1a1822">gray-200: #d7d1e6</text>

  <rect x="45" y="176" width="230" height="22" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <rect x="47" y="178" width="18" height="18" rx="2" fill="#6d5bd0"/>
  <text x="72" y="192" font-size="9" fill="#1a1822">purple-500: #6d5bd0</text>

  <rect x="45" y="203" width="230" height="22" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <rect x="47" y="205" width="18" height="18" rx="2" fill="#1a1822"/>
  <text x="72" y="219" font-size="9" fill="#1a1822">gray-900: #1a1822</text>

  <rect x="45" y="230" width="230" height="22" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <rect x="47" y="232" width="18" height="18" rx="2" fill="#0d0b12"/>
  <text x="72" y="246" font-size="9" fill="#1a1822">gray-950: #0d0b12</text>

  <text x="160" y="272" text-anchor="middle" font-size="9" fill="#6d5bd0">Theme-agnostic, never used directly</text>

  <!-- Arrow -->
  <line x1="290" y1="170" x2="330" y2="170" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="162" text-anchor="middle" font-size="9" fill="#6d5bd0" transform="rotate(-90, 310, 162)">maps to</text>

  <!-- Semantic Tokens -->
  <rect x="330" y="60" width="260" height="220" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="460" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Semantic Tokens (Purpose)</text>

  <rect x="345" y="95" width="230" height="28" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="460" y="113" text-anchor="middle" font-size="10" fill="#1a1822">--color-bg-primary</text>

  <rect x="345" y="128" width="230" height="28" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="460" y="146" text-anchor="middle" font-size="10" fill="#1a1822">--color-bg-surface</text>

  <rect x="345" y="161" width="230" height="28" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="460" y="179" text-anchor="middle" font-size="10" fill="#1a1822">--color-text-primary</text>

  <rect x="345" y="194" width="230" height="28" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="460" y="212" text-anchor="middle" font-size="10" fill="#1a1822">--color-accent</text>

  <rect x="345" y="227" width="230" height="28" rx="3" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="460" y="245" text-anchor="middle" font-size="10" fill="#1a1822">--color-border</text>

  <text x="460" y="272" text-anchor="middle" font-size="9" fill="#6d5bd0">Describe intent, not color value</text>

  <!-- Arrow -->
  <line x1="590" y1="170" x2="630" y2="170" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Theme Mapping -->
  <rect x="630" y="60" width="240" height="220" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="750" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Theme Mapping</text>

  <!-- Light theme -->
  <rect x="645" y="95" width="100" height="115" rx="4" fill="#ffffff" stroke="#d7d1e6"/>
  <text x="695" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Light</text>
  <text x="655" y="130" font-size="8" fill="#1a1822">bg: #ffffff</text>
  <text x="655" y="144" font-size="8" fill="#1a1822">surface: #f3f1f8</text>
  <text x="655" y="158" font-size="8" fill="#1a1822">text: #1a1822</text>
  <text x="655" y="172" font-size="8" fill="#1a1822">accent: #6d5bd0</text>
  <text x="655" y="186" font-size="8" fill="#1a1822">border: #d7d1e6</text>
  <text x="655" y="200" font-size="8" fill="#1a1822">shadow: 0.1 opacity</text>

  <!-- Dark theme -->
  <rect x="755" y="95" width="100" height="115" rx="4" fill="#1a1822" stroke="#6d5bd0"/>
  <text x="805" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Dark</text>
  <text x="765" y="130" font-size="8" fill="#ffffff">bg: #0d0b12</text>
  <text x="765" y="144" font-size="8" fill="#ffffff">surface: #1a1822</text>
  <text x="765" y="158" font-size="8" fill="#ffffff">text: #f3f1f8</text>
  <text x="765" y="172" font-size="8" fill="#ffffff">accent: #8b7de0</text>
  <text x="765" y="186" font-size="8" fill="#ffffff">border: #2d2838</text>
  <text x="765" y="200" font-size="8" fill="#ffffff">shadow: 0.4 opacity</text>

  <text x="750" y="228" text-anchor="middle" font-size="9" fill="#6d5bd0">Same tokens, different values</text>
  <text x="750" y="242" text-anchor="middle" font-size="9" fill="#6d5bd0">per theme via :root / [data-theme]</text>

  <!-- Component Usage -->
  <rect x="30" y="300" width="840" height="180" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="322" text-anchor="middle" font-size="14" font-weight="600" fill="#6d5bd0">Component Consumption Layer</text>

  <!-- Card component example -->
  <rect x="50" y="340" width="250" height="125" rx="6" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="175" y="360" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Card Component</text>
  <text x="62" y="380" font-size="9" fill="#1a1822">background: var(--color-bg-surface)</text>
  <text x="62" y="396" font-size="9" fill="#1a1822">color: var(--color-text-primary)</text>
  <text x="62" y="412" font-size="9" fill="#1a1822">border: 1px solid var(--color-border)</text>
  <text x="62" y="428" font-size="9" fill="#1a1822">box-shadow: var(--shadow-elevation-1)</text>

  <text x="175" y="455" text-anchor="middle" font-size="9" fill="#228B22">Zero theme-specific styles needed</text>

  <!-- Utility classes -->
  <rect x="325" y="340" width="250" height="125" rx="6" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="450" y="360" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Tailwind Utilities</text>
  <text x="337" y="380" font-size="9" fill="#1a1822">bg-theme → var(--color-bg-primary)</text>
  <text x="337" y="396" font-size="9" fill="#1a1822">text-theme → var(--color-text-primary)</text>
  <text x="337" y="412" font-size="9" fill="#1a1822">border-theme → var(--color-border)</text>
  <text x="337" y="428" font-size="9" fill="#1a1822">bg-panel → var(--color-bg-surface)</text>

  <text x="450" y="455" text-anchor="middle" font-size="9" fill="#228B22">One class works in all themes</text>

  <!-- Token count summary -->
  <rect x="600" y="340" width="250" height="125" rx="6" fill="#6d5bd0"/>
  <text x="725" y="360" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Token Count Summary</text>
  <text x="615" y="384" font-size="10" fill="#ffffff">Primitive tokens: ~60 values</text>
  <text x="615" y="404" font-size="10" fill="#ffffff">Semantic tokens: ~30 variables</text>
  <text x="615" y="424" font-size="10" fill="#ffffff">Theme variants: 2+ (light, dark)</text>
  <text x="615" y="444" font-size="10" fill="#ffffff">Component overrides: 0 needed</text>
  <text x="615" y="464" font-size="10" fill="#ffffff">Total CSS changes for new theme: 1 file</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
