<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Empty State Detection &amp; Rendering Flow</text>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6d5bd0"/></marker></defs>
  <rect x="350" y="55" width="200" height="40" rx="8" fill="#6d5bd0"/>
  <text x="450" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Data Fetch Complete</text>
  <line x1="450" y1="95" x2="450" y2="125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <polygon points="450,125 560,165 450,205 340,165" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="162" text-anchor="middle" font-size="11" fill="#1a1822">Has Data?</text>
  <line x1="560" y1="165" x2="780" y2="165" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="670" y="158" text-anchor="middle" font-size="10" fill="#6d5bd0">Yes - render content</text>
  <rect x="780" y="145" width="100" height="40" rx="6" fill="#6d5bd0"/>
  <text x="830" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Content</text>
  <line x1="450" y1="205" x2="450" y2="240" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="470" y="228" font-size="10" fill="#6d5bd0">No</text>
  <polygon points="450,240 570,280 450,320 330,280" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="275" text-anchor="middle" font-size="10" fill="#1a1822">Why empty?</text>
  <line x1="330" y1="280" x2="100" y2="280" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <text x="215" y="273" text-anchor="middle" font-size="9" fill="#6d5bd0">Fetch error</text>
  <rect x="20" y="260" width="80" height="40" rx="6" fill="#6d5bd0"/>
  <text x="60" y="285" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Error</text>
  <line x1="60" y1="300" x2="60" y2="345" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <rect x="10" y="345" width="100" height="50" rx="6" fill="#fff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="60" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">ErrorEmpty</text>
  <text x="60" y="385" text-anchor="middle" font-size="8" fill="#1a1822">Retry button</text>
  <line x1="450" y1="320" x2="450" y2="345" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <text x="470" y="338" font-size="9" fill="#6d5bd0">No permission</text>
  <rect x="400" y="345" width="100" height="50" rx="6" fill="#fff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">PermissionEmpty</text>
  <text x="450" y="385" text-anchor="middle" font-size="8" fill="#1a1822">Request access</text>
  <line x1="570" y1="280" x2="650" y2="280" stroke="#d7d1e6" stroke-width="2"/>
  <line x1="650" y1="280" x2="650" y2="345" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <text x="610" y="273" font-size="9" fill="#6d5bd0">Search active</text>
  <rect x="600" y="345" width="100" height="50" rx="6" fill="#fff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="650" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">NoResultsEmpty</text>
  <text x="650" y="385" text-anchor="middle" font-size="8" fill="#1a1822">Clear filters</text>
  <line x1="570" y1="280" x2="800" y2="280" stroke="#d7d1e6" stroke-width="2"/>
  <line x1="800" y1="280" x2="800" y2="345" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <text x="770" y="305" font-size="9" fill="#6d5bd0">New user</text>
  <rect x="750" y="345" width="100" height="50" rx="6" fill="#fff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="800" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">FirstUseEmpty</text>
  <text x="800" y="385" text-anchor="middle" font-size="8" fill="#1a1822">Get started CTA</text>
  <line x1="330" y1="280" x2="230" y2="280" stroke="#d7d1e6" stroke-width="2"/>
  <line x1="230" y1="280" x2="230" y2="345" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <text x="200" y="305" font-size="9" fill="#6d5bd0">All done</text>
  <rect x="180" y="345" width="100" height="50" rx="6" fill="#fff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="230" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">CompletedEmpty</text>
  <text x="230" y="385" text-anchor="middle" font-size="8" fill="#1a1822">Celebration</text>
  <rect x="200" y="430" width="500" height="50" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="452" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Each variant renders: Illustration + Message + Description + CTA</text>
  <text x="450" y="470" text-anchor="middle" font-size="10" fill="#1a1822">Consistent anatomy, context-specific content and actions</text>
</svg>
