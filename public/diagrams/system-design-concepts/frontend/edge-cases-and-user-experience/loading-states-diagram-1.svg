<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Loading State Hierarchy &amp; Decision Flow</text>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6d5bd0"/></marker></defs>
  <rect x="350" y="55" width="200" height="40" rx="8" fill="#6d5bd0"/>
  <text x="450" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">User Action Initiated</text>
  <line x1="450" y1="95" x2="450" y2="125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <polygon points="450,125 550,165 450,205 350,165" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="162" text-anchor="middle" font-size="11" fill="#1a1822">Expected</text>
  <text x="450" y="175" text-anchor="middle" font-size="11" fill="#1a1822">Duration?</text>
  <line x1="350" y1="165" x2="130" y2="165" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <text x="240" y="155" text-anchor="middle" font-size="10" fill="#6d5bd0">&lt; 100ms</text>
  <rect x="20" y="145" width="110" height="40" rx="6" fill="#6d5bd0"/>
  <text x="75" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">No Indicator</text>
  <rect x="20" y="195" width="110" height="28" rx="4" fill="#fff" stroke="#d7d1e6"/>
  <text x="75" y="213" text-anchor="middle" font-size="9" fill="#1a1822">Feels instantaneous</text>
  <line x1="450" y1="205" x2="450" y2="255" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <text x="475" y="235" font-size="10" fill="#6d5bd0">100ms - 1s</text>
  <rect x="370" y="255" width="160" height="40" rx="6" fill="#6d5bd0"/>
  <text x="450" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Subtle Spinner</text>
  <rect x="370" y="305" width="160" height="28" rx="4" fill="#fff" stroke="#d7d1e6"/>
  <text x="450" y="323" text-anchor="middle" font-size="9" fill="#1a1822">Maintains user flow</text>
  <line x1="550" y1="165" x2="700" y2="165" stroke="#d7d1e6" stroke-width="2"/>
  <line x1="700" y1="165" x2="700" y2="255" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <text x="625" y="155" text-anchor="middle" font-size="10" fill="#6d5bd0">1s - 3s</text>
  <rect x="620" y="255" width="160" height="40" rx="6" fill="#6d5bd0"/>
  <text x="700" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Skeleton Screen</text>
  <rect x="620" y="305" width="160" height="28" rx="4" fill="#fff" stroke="#d7d1e6"/>
  <text x="700" y="323" text-anchor="middle" font-size="9" fill="#1a1822">Content shape preview</text>
  <line x1="550" y1="165" x2="840" y2="165" stroke="#d7d1e6" stroke-width="2"/>
  <line x1="840" y1="165" x2="840" y2="255" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <text x="800" y="155" font-size="10" fill="#6d5bd0">&gt; 3s</text>
  <rect x="780" y="255" width="110" height="40" rx="6" fill="#6d5bd0"/>
  <text x="835" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Progress Bar</text>
  <rect x="780" y="305" width="110" height="28" rx="4" fill="#fff" stroke="#d7d1e6"/>
  <text x="835" y="323" text-anchor="middle" font-size="9" fill="#1a1822">Shows % complete</text>
  <rect x="20" y="260" width="180" height="40" rx="6" fill="#6d5bd0" opacity="0.85"/>
  <text x="110" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Stale-While-Revalidate</text>
  <rect x="20" y="310" width="180" height="35" rx="4" fill="#fff" stroke="#d7d1e6"/>
  <text x="110" y="328" text-anchor="middle" font-size="9" fill="#1a1822">Cached data + refresh</text>
  <line x1="110" y1="345" x2="110" y2="395" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="450" y1="333" x2="450" y2="395" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="700" y1="333" x2="700" y2="395" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="835" y1="333" x2="835" y2="395" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="110" y1="395" x2="835" y2="395" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="450" y1="395" x2="450" y2="425" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <rect x="320" y="425" width="260" height="45" rx="8" fill="#6d5bd0"/>
  <text x="450" y="448" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Content Rendered</text>
  <text x="450" y="463" text-anchor="middle" font-size="10" fill="#fff">Transition animation applied</text>
</svg>
