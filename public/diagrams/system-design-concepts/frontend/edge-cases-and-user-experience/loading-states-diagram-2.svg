<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Progressive Content Revelation Architecture</text>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6d5bd0"/></marker></defs>
  <rect x="30" y="60" width="150" height="45" rx="8" fill="#6d5bd0"/>
  <text x="105" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Component Mount</text>
  <text x="105" y="95" text-anchor="middle" font-size="9" fill="#fff">Initiate data fetch</text>
  <line x1="180" y1="82" x2="220" y2="82" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <polygon points="310,57 395,82 310,107 225,82" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="310" y="80" text-anchor="middle" font-size="10" fill="#1a1822">Cache Hit?</text>
  <line x1="310" y1="57" x2="310" y2="30" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="310" y1="30" x2="620" y2="30" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="465" y="23" text-anchor="middle" font-size="10" fill="#6d5bd0">Fresh cache hit</text>
  <rect x="620" y="15" width="160" height="35" rx="6" fill="#6d5bd0"/>
  <text x="700" y="38" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Render Immediately</text>
  <line x1="395" y1="82" x2="450" y2="82" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="422" y="75" font-size="9" fill="#6d5bd0">Stale</text>
  <rect x="450" y="60" width="160" height="45" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="530" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Show Stale Data</text>
  <text x="530" y="95" text-anchor="middle" font-size="9" fill="#6d5bd0">+ Refresh indicator</text>
  <line x1="310" y1="107" x2="310" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="330" y="135" font-size="9" fill="#6d5bd0">No cache</text>
  <rect x="230" y="155" width="160" height="45" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="310" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Threshold Timer</text>
  <text x="310" y="190" text-anchor="middle" font-size="9" fill="#6d5bd0">200-500ms delay</text>
  <line x1="390" y1="177" x2="550" y2="177" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="550" y1="177" x2="550" y2="135" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="470" y="170" font-size="9" fill="#6d5bd0">Data arrives fast</text>
  <rect x="470" y="115" width="160" height="25" rx="6" fill="#6d5bd0"/>
  <text x="550" y="133" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Skip Skeleton</text>
  <line x1="310" y1="200" x2="310" y2="250" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="330" y="230" font-size="9" fill="#6d5bd0">Timeout</text>
  <rect x="230" y="250" width="160" height="45" rx="8" fill="#6d5bd0"/>
  <text x="310" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Show Skeleton</text>
  <text x="310" y="285" text-anchor="middle" font-size="9" fill="#fff">Content placeholders</text>
  <line x1="310" y1="295" x2="310" y2="340" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="330" y="320" font-size="9" fill="#6d5bd0">Data arrives</text>
  <rect x="230" y="340" width="160" height="40" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="310" y="358" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Crossfade Transition</text>
  <text x="310" y="373" text-anchor="middle" font-size="9" fill="#6d5bd0">150-300ms animation</text>
  <line x1="310" y1="380" x2="310" y2="420" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <rect x="230" y="420" width="160" height="40" rx="8" fill="#6d5bd0"/>
  <text x="310" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Content Visible</text>
  <rect x="650" y="80" width="220" height="140" rx="8" fill="#fff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="760" y="102" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Server / API</text>
  <line x1="670" y1="112" x2="850" y2="112" stroke="#d7d1e6" stroke-width="1"/>
  <text x="760" y="132" text-anchor="middle" font-size="10" fill="#1a1822">Process request</text>
  <text x="760" y="150" text-anchor="middle" font-size="10" fill="#1a1822">Query database</text>
  <text x="760" y="168" text-anchor="middle" font-size="10" fill="#1a1822">Serialize response</text>
  <text x="760" y="186" text-anchor="middle" font-size="10" fill="#1a1822">Return JSON payload</text>
  <rect x="650" y="250" width="220" height="80" rx="8" fill="#fff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="760" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Cache Update</text>
  <line x1="670" y1="282" x2="850" y2="282" stroke="#d7d1e6" stroke-width="1"/>
  <text x="760" y="302" text-anchor="middle" font-size="10" fill="#1a1822">Store fresh data</text>
  <text x="760" y="320" text-anchor="middle" font-size="10" fill="#1a1822">Set TTL / stale marker</text>
  <line x1="760" y1="220" x2="760" y2="250" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
</svg>
