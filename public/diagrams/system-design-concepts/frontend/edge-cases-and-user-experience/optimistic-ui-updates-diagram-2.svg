<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Concurrent Mutation Queue &amp; Conflict Resolution</text>

  <!-- Mutation Queue -->
  <rect x="30" y="60" width="260" height="200" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="160" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Mutation Queue</text>

  <rect x="45" y="95" width="230" height="32" rx="4" fill="#6d5bd0"/>
  <text x="55" y="115" font-size="10" font-weight="600" fill="#ffffff">M1: Like post #42</text>
  <text x="215" y="115" font-size="9" fill="#ffffff">t=0ms</text>

  <rect x="45" y="132" width="230" height="32" rx="4" fill="#6d5bd0" opacity="0.85"/>
  <text x="55" y="152" font-size="10" font-weight="600" fill="#ffffff">M2: Edit comment #7</text>
  <text x="215" y="152" font-size="9" fill="#ffffff">t=50ms</text>

  <rect x="45" y="169" width="230" height="32" rx="4" fill="#6d5bd0" opacity="0.7"/>
  <text x="55" y="189" font-size="10" font-weight="600" fill="#ffffff">M3: Delete reply #15</text>
  <text x="215" y="189" font-size="9" fill="#ffffff">t=120ms</text>

  <rect x="45" y="206" width="230" height="32" rx="4" fill="#6d5bd0" opacity="0.55"/>
  <text x="55" y="226" font-size="10" font-weight="600" fill="#ffffff">M4: Unlike post #42</text>
  <text x="215" y="226" font-size="9" fill="#ffffff">t=200ms</text>

  <!-- Arrow to processing -->
  <line x1="290" y1="160" x2="340" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Processing Engine -->
  <rect x="340" y="60" width="220" height="200" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Conflict Detector</text>

  <rect x="355" y="95" width="190" height="45" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="450" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Dependency Analysis</text>
  <text x="450" y="130" text-anchor="middle" font-size="9" fill="#1a1822">M1 ↔ M4: same entity conflict</text>

  <rect x="355" y="148" width="190" height="45" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="450" y="166" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Resolution Strategy</text>
  <text x="450" y="183" text-anchor="middle" font-size="9" fill="#1a1822">Last-write-wins / merge / reject</text>

  <rect x="355" y="201" width="190" height="45" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="450" y="219" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Queue Compaction</text>
  <text x="450" y="236" text-anchor="middle" font-size="9" fill="#1a1822">M1+M4 → cancel (net zero)</text>

  <!-- Arrow to server -->
  <line x1="560" y1="160" x2="610" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Server Sync -->
  <rect x="610" y="60" width="260" height="200" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="740" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Server Sync</text>

  <rect x="625" y="95" width="230" height="28" rx="4" fill="#228B22"/>
  <text x="740" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">M1+M4: Cancelled (no-op)</text>

  <rect x="625" y="130" width="230" height="28" rx="4" fill="#6d5bd0"/>
  <text x="740" y="149" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">M2: Sent → 200 OK</text>

  <rect x="625" y="165" width="230" height="28" rx="4" fill="#cc3333"/>
  <text x="740" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">M3: Sent → 409 Conflict</text>

  <text x="625" y="215" font-size="10" fill="#1a1822">Retry policy:</text>
  <text x="625" y="230" font-size="9" fill="#1a1822">• 409: refetch + re-apply</text>
  <text x="625" y="244" font-size="9" fill="#1a1822">• 5xx: exponential backoff</text>
  <text x="625" y="258" font-size="9" fill="#1a1822">• Offline: queue to IndexedDB</text>

  <!-- Cache State Timeline -->
  <rect x="30" y="280" width="840" height="200" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="302" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Cache State Evolution</text>

  <!-- Timeline line -->
  <line x1="60" y1="340" x2="840" y2="340" stroke="#d7d1e6" stroke-width="2"/>

  <!-- T0: Initial -->
  <circle cx="100" cy="340" r="6" fill="#6d5bd0"/>
  <text x="100" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">t=0</text>
  <rect x="55" y="355" width="90" height="55" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="100" y="372" text-anchor="middle" font-size="9" font-weight="600" fill="#1a1822">Snapshot</text>
  <text x="100" y="386" text-anchor="middle" font-size="8" fill="#1a1822">likes: 42</text>
  <text x="100" y="398" text-anchor="middle" font-size="8" fill="#1a1822">comment: &quot;old&quot;</text>

  <!-- T1: After M1 -->
  <circle cx="240" cy="340" r="6" fill="#6d5bd0"/>
  <text x="240" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">+M1</text>
  <rect x="195" y="355" width="90" height="55" rx="4" fill="#f3f1f8" stroke="#6d5bd0"/>
  <text x="240" y="372" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Optimistic</text>
  <text x="240" y="386" text-anchor="middle" font-size="8" fill="#1a1822">likes: 43 ✓</text>
  <text x="240" y="398" text-anchor="middle" font-size="8" fill="#1a1822">comment: &quot;old&quot;</text>

  <!-- T2: After M2 -->
  <circle cx="380" cy="340" r="6" fill="#6d5bd0"/>
  <text x="380" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">+M2</text>
  <rect x="335" y="355" width="90" height="55" rx="4" fill="#f3f1f8" stroke="#6d5bd0"/>
  <text x="380" y="372" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Optimistic</text>
  <text x="380" y="386" text-anchor="middle" font-size="8" fill="#1a1822">likes: 43 ✓</text>
  <text x="380" y="398" text-anchor="middle" font-size="8" fill="#1a1822">comment: &quot;new&quot; ✓</text>

  <!-- T3: After M4 (cancel M1) -->
  <circle cx="520" cy="340" r="6" fill="#6d5bd0"/>
  <text x="520" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">+M4</text>
  <rect x="475" y="355" width="90" height="55" rx="4" fill="#f3f1f8" stroke="#6d5bd0"/>
  <text x="520" y="372" text-anchor="middle" font-size="9" font-weight="600" fill="#6d5bd0">Compacted</text>
  <text x="520" y="386" text-anchor="middle" font-size="8" fill="#1a1822">likes: 42 (undo)</text>
  <text x="520" y="398" text-anchor="middle" font-size="8" fill="#1a1822">comment: &quot;new&quot; ✓</text>

  <!-- T4: Server confirmed -->
  <circle cx="660" cy="340" r="6" fill="#228B22"/>
  <text x="660" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#228B22">Confirm</text>
  <rect x="615" y="355" width="90" height="55" rx="4" fill="#f3f1f8" stroke="#228B22"/>
  <text x="660" y="372" text-anchor="middle" font-size="9" font-weight="600" fill="#228B22">Settled</text>
  <text x="660" y="386" text-anchor="middle" font-size="8" fill="#1a1822">likes: 42 ✓</text>
  <text x="660" y="398" text-anchor="middle" font-size="8" fill="#1a1822">comment: &quot;new&quot; ✓</text>

  <!-- T5: M3 failed, rollback -->
  <circle cx="800" cy="340" r="6" fill="#cc3333"/>
  <text x="800" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#cc3333">Rollback</text>
  <rect x="755" y="355" width="90" height="55" rx="4" fill="#f3f1f8" stroke="#cc3333"/>
  <text x="800" y="372" text-anchor="middle" font-size="9" font-weight="600" fill="#cc3333">Reverted</text>
  <text x="800" y="386" text-anchor="middle" font-size="8" fill="#1a1822">reply #15: restored</text>
  <text x="800" y="398" text-anchor="middle" font-size="8" fill="#1a1822">+ error toast</text>

  <!-- Legend -->
  <rect x="60" y="425" width="260" height="45" rx="4" fill="none"/>
  <circle cx="75" cy="445" r="5" fill="#228B22"/>
  <text x="85" y="449" font-size="9" fill="#1a1822">Confirmed</text>
  <circle cx="155" cy="445" r="5" fill="#cc3333"/>
  <text x="165" y="449" font-size="9" fill="#1a1822">Rolled back</text>
  <circle cx="245" cy="445" r="5" fill="#6d5bd0"/>
  <text x="255" y="449" font-size="9" fill="#1a1822">Pending</text>

  <text x="75" y="468" font-size="9" fill="#1a1822">Arrows show data flow direction through the mutation pipeline</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
