<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">CSS Print vs Server-Side PDF Generation Comparison</text>

  <!-- Header row -->
  <rect x="30" y="55" width="840" height="35" rx="0" fill="#6d5bd0"/>
  <text x="160" y="77" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Aspect</text>
  <text x="400" y="77" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">CSS @media print</text>
  <text x="680" y="77" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Server-Side PDF (Puppeteer/wkhtmltopdf)</text>

  <!-- Rows -->
  <rect x="30" y="90" width="840" height="42" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="160" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Implementation</text>
  <text x="400" y="110" text-anchor="middle" font-size="9" fill="#1a1822">CSS rules in existing stylesheet</text>
  <text x="400" y="123" text-anchor="middle" font-size="9" fill="#6d5bd0">Low effort — add @media print block</text>
  <text x="680" y="110" text-anchor="middle" font-size="9" fill="#1a1822">Headless browser renders page to PDF</text>
  <text x="680" y="123" text-anchor="middle" font-size="9" fill="#6d5bd0">High effort — server infra required</text>

  <rect x="30" y="132" width="840" height="42" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="160" y="157" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Output Control</text>
  <text x="400" y="152" text-anchor="middle" font-size="9" fill="#1a1822">Limited — browser rendering engine</text>
  <text x="400" y="165" text-anchor="middle" font-size="9" fill="#cc3333">Page breaks are suggestions, not guarantees</text>
  <text x="680" y="152" text-anchor="middle" font-size="9" fill="#1a1822">Precise — full layout control</text>
  <text x="680" y="165" text-anchor="middle" font-size="9" fill="#228B22">Pixel-perfect, deterministic output</text>

  <rect x="30" y="174" width="840" height="42" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="160" y="199" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">User Experience</text>
  <text x="400" y="194" text-anchor="middle" font-size="9" fill="#1a1822">Native browser print dialog</text>
  <text x="400" y="207" text-anchor="middle" font-size="9" fill="#6d5bd0">Familiar, user-controlled settings</text>
  <text x="680" y="194" text-anchor="middle" font-size="9" fill="#1a1822">Download button → PDF file</text>
  <text x="680" y="207" text-anchor="middle" font-size="9" fill="#6d5bd0">Consistent across browsers</text>

  <rect x="30" y="216" width="840" height="42" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="160" y="241" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Dynamic Content</text>
  <text x="400" y="236" text-anchor="middle" font-size="9" fill="#1a1822">Current page state is printed</text>
  <text x="400" y="249" text-anchor="middle" font-size="9" fill="#228B22">JS-rendered content included</text>
  <text x="680" y="236" text-anchor="middle" font-size="9" fill="#1a1822">Can wait for JS/API data</text>
  <text x="680" y="249" text-anchor="middle" font-size="9" fill="#228B22">Full SPA content captured</text>

  <rect x="30" y="258" width="840" height="42" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="160" y="283" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Cross-Browser</text>
  <text x="400" y="278" text-anchor="middle" font-size="9" fill="#1a1822">Varies significantly</text>
  <text x="400" y="291" text-anchor="middle" font-size="9" fill="#cc3333">Chrome/Safari/Firefox differ in output</text>
  <text x="680" y="278" text-anchor="middle" font-size="9" fill="#1a1822">Identical output always</text>
  <text x="680" y="291" text-anchor="middle" font-size="9" fill="#228B22">Server controls the rendering engine</text>

  <rect x="30" y="300" width="840" height="42" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="160" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Server Cost</text>
  <text x="400" y="320" text-anchor="middle" font-size="9" fill="#1a1822">Zero — client-side only</text>
  <text x="400" y="333" text-anchor="middle" font-size="9" fill="#228B22">No server resources needed</text>
  <text x="680" y="320" text-anchor="middle" font-size="9" fill="#1a1822">Headless Chrome per request</text>
  <text x="680" y="333" text-anchor="middle" font-size="9" fill="#cc3333">~200MB RAM + CPU per render</text>

  <rect x="30" y="342" width="840" height="42" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="160" y="367" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Headers/Footers</text>
  <text x="400" y="362" text-anchor="middle" font-size="9" fill="#1a1822">Limited to @page margin boxes</text>
  <text x="400" y="375" text-anchor="middle" font-size="9" fill="#cc3333">No dynamic content in margins</text>
  <text x="680" y="362" text-anchor="middle" font-size="9" fill="#1a1822">Full HTML/CSS in headers</text>
  <text x="680" y="375" text-anchor="middle" font-size="9" fill="#228B22">Page numbers, dates, logos</text>

  <!-- Decision matrix -->
  <rect x="30" y="400" width="840" height="85" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="422" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">When to Use Which?</text>

  <rect x="50" y="435" width="380" height="40" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0"/>
  <text x="240" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">CSS Print — Choose When:</text>
  <text x="240" y="468" text-anchor="middle" font-size="9" fill="#1a1822">Blog, docs, articles, receipts — simple layouts, low control needs</text>

  <rect x="450" y="435" width="400" height="40" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0"/>
  <text x="650" y="452" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Server PDF — Choose When:</text>
  <text x="650" y="468" text-anchor="middle" font-size="9" fill="#1a1822">Invoices, reports, contracts — pixel-perfect, consistent, branded</text>
</svg>
