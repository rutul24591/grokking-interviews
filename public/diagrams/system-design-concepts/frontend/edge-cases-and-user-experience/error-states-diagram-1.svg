<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Error Classification &amp; Routing Architecture</text>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6d5bd0"/></marker></defs>
  <rect x="30" y="55" width="140" height="40" rx="8" fill="#6d5bd0"/>
  <text x="100" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Error Occurs</text>
  <line x1="170" y1="75" x2="220" y2="75" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <rect x="220" y="55" width="180" height="40" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="310" y="75" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">Classify Error Type</text>
  <text x="310" y="90" text-anchor="middle" font-size="9" fill="#6d5bd0">Origin + Severity</text>
  <line x1="310" y1="95" x2="310" y2="115" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="120" y1="115" x2="750" y2="115" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="120" y1="115" x2="120" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <line x1="330" y1="115" x2="330" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <line x1="540" y1="115" x2="540" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <line x1="750" y1="115" x2="750" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <rect x="50" y="145" width="140" height="40" rx="6" fill="#6d5bd0"/>
  <text x="120" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Network Error</text>
  <rect x="50" y="195" width="140" height="55" rx="4" fill="#fff" stroke="#d7d1e6"/>
  <text x="120" y="212" text-anchor="middle" font-size="9" fill="#1a1822">Timeout, DNS, CORS</text>
  <text x="120" y="227" text-anchor="middle" font-size="9" fill="#1a1822">Disconnection</text>
  <text x="120" y="242" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">Transient</text>
  <rect x="260" y="145" width="140" height="40" rx="6" fill="#6d5bd0"/>
  <text x="330" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Server Error</text>
  <rect x="260" y="195" width="140" height="55" rx="4" fill="#fff" stroke="#d7d1e6"/>
  <text x="330" y="212" text-anchor="middle" font-size="9" fill="#1a1822">500, 502, 503</text>
  <text x="330" y="227" text-anchor="middle" font-size="9" fill="#1a1822">Rate limiting (429)</text>
  <text x="330" y="242" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">Transient/Degraded</text>
  <rect x="470" y="145" width="140" height="40" rx="6" fill="#6d5bd0"/>
  <text x="540" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Client Error</text>
  <rect x="470" y="195" width="140" height="55" rx="4" fill="#fff" stroke="#d7d1e6"/>
  <text x="540" y="212" text-anchor="middle" font-size="9" fill="#1a1822">401, 403, 404</text>
  <text x="540" y="227" text-anchor="middle" font-size="9" fill="#1a1822">JS exceptions</text>
  <text x="540" y="242" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">Persistent</text>
  <rect x="680" y="145" width="140" height="40" rx="6" fill="#6d5bd0"/>
  <text x="750" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Validation Error</text>
  <rect x="680" y="195" width="140" height="55" rx="4" fill="#fff" stroke="#d7d1e6"/>
  <text x="750" y="212" text-anchor="middle" font-size="9" fill="#1a1822">Form validation</text>
  <text x="750" y="227" text-anchor="middle" font-size="9" fill="#1a1822">Schema mismatch</text>
  <text x="750" y="242" text-anchor="middle" font-size="9" font-weight="bold" fill="#6d5bd0">User-fixable</text>
  <line x1="120" y1="250" x2="120" y2="290" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <line x1="330" y1="250" x2="330" y2="290" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <line x1="540" y1="250" x2="540" y2="290" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <line x1="750" y1="250" x2="750" y2="290" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="450" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">UI Treatment Routing</text>
  <rect x="40" y="295" width="160" height="55" rx="6" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="120" y="315" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Retry Manager</text>
  <text x="120" y="330" text-anchor="middle" font-size="9" fill="#6d5bd0">Exponential backoff</text>
  <text x="120" y="343" text-anchor="middle" font-size="9" fill="#6d5bd0">with jitter</text>
  <rect x="250" y="295" width="160" height="55" rx="6" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="330" y="315" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Circuit Breaker</text>
  <text x="330" y="330" text-anchor="middle" font-size="9" fill="#6d5bd0">Check service health</text>
  <text x="330" y="343" text-anchor="middle" font-size="9" fill="#6d5bd0">before retry</text>
  <rect x="460" y="295" width="160" height="55" rx="6" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="540" y="315" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Error Display</text>
  <text x="540" y="330" text-anchor="middle" font-size="9" fill="#6d5bd0">Show immediately</text>
  <text x="540" y="343" text-anchor="middle" font-size="9" fill="#6d5bd0">with recovery path</text>
  <rect x="670" y="295" width="160" height="55" rx="6" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="750" y="315" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Field Mapping</text>
  <text x="750" y="330" text-anchor="middle" font-size="9" fill="#6d5bd0">Inline errors on</text>
  <text x="750" y="343" text-anchor="middle" font-size="9" fill="#6d5bd0">specific fields</text>
  <line x1="120" y1="350" x2="120" y2="385" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <line x1="330" y1="350" x2="330" y2="385" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <line x1="540" y1="350" x2="540" y2="385" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <line x1="750" y1="350" x2="750" y2="385" stroke="#d7d1e6" stroke-width="2" marker-end="url(#a)"/>
  <rect x="40" y="385" width="160" height="35" rx="6" fill="#6d5bd0" opacity="0.85"/>
  <text x="120" y="407" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Toast / Banner</text>
  <rect x="250" y="385" width="160" height="35" rx="6" fill="#6d5bd0" opacity="0.85"/>
  <text x="330" y="407" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Error Banner</text>
  <rect x="460" y="385" width="160" height="35" rx="6" fill="#6d5bd0" opacity="0.85"/>
  <text x="540" y="407" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Full-Page Error</text>
  <rect x="670" y="385" width="160" height="35" rx="6" fill="#6d5bd0" opacity="0.85"/>
  <text x="750" y="407" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">Inline Field Error</text>
  <rect x="200" y="445" width="500" height="35" rx="8" fill="#fff" stroke="#d7d1e6" stroke-width="2"/>
  <text x="450" y="467" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">All errors logged to telemetry for monitoring and prioritization</text>
</svg>
