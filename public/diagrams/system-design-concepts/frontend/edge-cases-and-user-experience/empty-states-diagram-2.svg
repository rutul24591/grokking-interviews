  <rect x="50" y="378" width="190" height="80" rx="6" fill="#6d5bd0" opacity="0.1"/>
  <text x="145" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">ProjectList</text>
  <text x="145" y="415" text-anchor="middle" font-size="9" fill="#1a1822">Uses: FirstUseEmpty</text>
  <text x="145" y="430" text-anchor="middle" font-size="9" fill="#1a1822">or NoResultsEmpty</text>
  <rect x="260" y="378" width="190" height="80" rx="6" fill="#6d5bd0" opacity="0.1"/>
  <text x="355" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">SearchResults</text>
  <text x="355" y="415" text-anchor="middle" font-size="9" fill="#1a1822">Uses: NoResultsEmpty</text>
  <text x="355" y="430" text-anchor="middle" font-size="9" fill="#1a1822">with suggestions</text>
  <rect x="470" y="378" width="190" height="80" rx="6" fill="#6d5bd0" opacity="0.1"/>
  <text x="565" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">TaskInbox</text>
  <text x="565" y="415" text-anchor="middle" font-size="9" fill="#1a1822">Uses: CompletedEmpty</text>
  <text x="565" y="430" text-anchor="middle" font-size="9" fill="#1a1822">"All caught up!"</text>
  <rect x="680" y="378" width="175" height="80" rx="6" fill="#6d5bd0" opacity="0.1"/>
  <text x="768" y="398" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">AdminPanel</text>
  <text x="768" y="415" text-anchor="middle" font-size="9" fill="#1a1822">Uses: PermissionEmpty</text>
  <text x="768" y="430" text-anchor="middle" font-size="9" fill="#1a1822">"Request access"</text>
