<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Error Recovery &amp; Retry Flow</text>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#6d5bd0"/></marker></defs>
  <rect x="350" y="55" width="200" height="40" rx="8" fill="#6d5bd0"/>
  <text x="450" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Error Detected</text>
  <line x1="450" y1="95" x2="450" y2="125" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <polygon points="450,125 560,160 450,195 340,160" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="157" text-anchor="middle" font-size="10" fill="#1a1822">Auto-retry</text>
  <text x="450" y="170" text-anchor="middle" font-size="10" fill="#1a1822">eligible?</text>
  <line x1="340" y1="160" x2="170" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="255" y="152" text-anchor="middle" font-size="10" fill="#6d5bd0">Yes (idempotent)</text>
  <rect x="30" y="140" width="140" height="40" rx="8" fill="#6d5bd0"/>
  <text x="100" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Auto Retry</text>
  <line x1="100" y1="180" x2="100" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <rect x="20" y="215" width="160" height="65" rx="6" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="100" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Exponential Backoff</text>
  <text x="100" y="252" text-anchor="middle" font-size="9" fill="#6d5bd0">1s → 2s → 4s → 8s</text>
  <text x="100" y="267" text-anchor="middle" font-size="9" fill="#6d5bd0">+ random jitter</text>
  <line x1="100" y1="280" x2="100" y2="310" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <polygon points="100,310 180,340 100,370 20,340" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="100" y="337" text-anchor="middle" font-size="10" fill="#1a1822">Success?</text>
  <line x1="180" y1="340" x2="310" y2="340" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="245" y="333" text-anchor="middle" font-size="9" fill="#6d5bd0">Yes</text>
  <rect x="310" y="320" width="140" height="40" rx="6" fill="#6d5bd0"/>
  <text x="380" y="345" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Dismiss Error</text>
  <line x1="380" y1="360" x2="380" y2="395" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <rect x="310" y="395" width="140" height="35" rx="6" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="380" y="417" text-anchor="middle" font-size="10" fill="#1a1822">Show content</text>
  <line x1="100" y1="370" x2="100" y2="400" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="120" y="390" font-size="9" fill="#6d5bd0">Max retries</text>
  <line x1="560" y1="160" x2="700" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="630" y="152" text-anchor="middle" font-size="10" fill="#6d5bd0">No (side effects)</text>
  <rect x="700" y="140" width="180" height="40" rx="8" fill="#6d5bd0"/>
  <text x="790" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Show Error State</text>
  <line x1="790" y1="180" x2="790" y2="220" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <rect x="680" y="220" width="200" height="90" rx="8" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="780" y="242" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1822">Actionable Error UI</text>
  <line x1="695" y1="250" x2="865" y2="250" stroke="#d7d1e6" stroke-width="1"/>
  <text x="780" y="268" text-anchor="middle" font-size="9" fill="#1a1822">Human-readable message</text>
  <text x="780" y="283" text-anchor="middle" font-size="9" fill="#1a1822">Manual retry button</text>
  <text x="780" y="298" text-anchor="middle" font-size="9" fill="#1a1822">Alternative actions</text>
  <line x1="100" y1="400" x2="100" y2="420" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="100" y1="420" x2="680" y2="420" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="680" y1="310" x2="680" y2="420" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="680" y1="310" x2="700" y2="310" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="400" y="415" text-anchor="middle" font-size="9" fill="#6d5bd0">Falls through to manual retry</text>
  <line x1="790" y1="310" x2="790" y2="350" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <polygon points="790,350 860,380 790,410 720,380" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="790" y="377" text-anchor="middle" font-size="10" fill="#1a1822">User</text>
  <text x="790" y="390" text-anchor="middle" font-size="10" fill="#1a1822">action?</text>
  <line x1="720" y1="380" x2="560" y2="380" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="640" y="373" text-anchor="middle" font-size="9" fill="#6d5bd0">Retry</text>
  <rect x="490" y="365" width="70" height="30" rx="6" fill="#6d5bd0"/>
  <text x="525" y="385" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Retry</text>
  <line x1="525" y1="365" x2="525" y2="310" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="525" y1="310" x2="450" y2="310" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4"/>
  <line x1="860" y1="380" x2="880" y2="380" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="880" y1="380" x2="880" y2="460" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="880" y1="460" x2="600" y2="460" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a)"/>
  <text x="850" y="440" font-size="9" fill="#6d5bd0">Navigate away</text>
  <rect x="480" y="445" width="120" height="35" rx="6" fill="#fff" stroke="#d7d1e6"/>
  <text x="540" y="467" text-anchor="middle" font-size="10" fill="#1a1822">Log outcome</text>
</svg>
