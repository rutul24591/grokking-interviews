<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">UX Comparison: Pagination Strategies Timeline</text>

  <!-- Timeline headers -->
  <text x="80" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">User Action</text>
  <text x="300" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Infinite Scroll</text>
  <text x="560" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Load More</text>
  <text x="790" y="65" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Pagination</text>

  <!-- Divider lines -->
  <line x1="180" y1="50" x2="180" y2="480" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="430" y1="50" x2="430" y2="480" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="680" y1="50" x2="680" y2="480" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Row 1: Initial Load -->
  <rect x="15" y="80" width="130" height="45" rx="6" fill="#6d5bd0"/>
  <text x="80" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Initial Load</text>
  <text x="80" y="115" text-anchor="middle" font-size="9" fill="#ffffff">Page opens</text>

  <rect x="195" y="80" width="210" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="300" y="98" text-anchor="middle" font-size="10" fill="#1a1822">Load first 20 items</text>
  <text x="300" y="113" text-anchor="middle" font-size="9" fill="#6d5bd0">Skeleton → Content (200ms)</text>

  <rect x="445" y="80" width="220" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="560" y="98" text-anchor="middle" font-size="10" fill="#1a1822">Load first 20 items + button</text>
  <text x="560" y="113" text-anchor="middle" font-size="9" fill="#6d5bd0">Content + &quot;Show More&quot; CTA</text>

  <rect x="695" y="80" width="190" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="790" y="98" text-anchor="middle" font-size="10" fill="#1a1822">Load page 1 of N</text>
  <text x="790" y="113" text-anchor="middle" font-size="9" fill="#6d5bd0">Content + page controls</text>

  <!-- Row 2: Scroll / Browse -->
  <rect x="15" y="140" width="130" height="45" rx="6" fill="#6d5bd0"/>
  <text x="80" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Browse More</text>
  <text x="80" y="175" text-anchor="middle" font-size="9" fill="#ffffff">Wants more items</text>

  <rect x="195" y="140" width="210" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="300" y="158" text-anchor="middle" font-size="10" fill="#1a1822">Auto-fetch on scroll</text>
  <text x="300" y="173" text-anchor="middle" font-size="9" fill="#6d5bd0">Zero friction, seamless append</text>

  <rect x="445" y="140" width="220" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="560" y="158" text-anchor="middle" font-size="10" fill="#1a1822">Click &quot;Load More&quot;</text>
  <text x="560" y="173" text-anchor="middle" font-size="9" fill="#6d5bd0">User-initiated, low friction</text>

  <rect x="695" y="140" width="190" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="790" y="158" text-anchor="middle" font-size="10" fill="#1a1822">Click page 2</text>
  <text x="790" y="173" text-anchor="middle" font-size="9" fill="#6d5bd0">Full page reload / SPA nav</text>

  <!-- Row 3: Find Specific Item -->
  <rect x="15" y="200" width="130" height="45" rx="6" fill="#6d5bd0"/>
  <text x="80" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Find Item #500</text>
  <text x="80" y="235" text-anchor="middle" font-size="9" fill="#ffffff">Deep access need</text>

  <rect x="195" y="200" width="210" height="45" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="300" y="218" text-anchor="middle" font-size="10" fill="#1a1822">Scroll through all 500</text>
  <text x="300" y="233" text-anchor="middle" font-size="9" fill="#cc3333">Poor: must traverse linearly</text>

  <rect x="445" y="200" width="220" height="45" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="560" y="218" text-anchor="middle" font-size="10" fill="#1a1822">Click 25 times</text>
  <text x="560" y="233" text-anchor="middle" font-size="9" fill="#cc3333">Poor: repetitive action needed</text>

  <rect x="695" y="200" width="190" height="45" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="790" y="218" text-anchor="middle" font-size="10" fill="#1a1822">Jump to page 25</text>
  <text x="790" y="233" text-anchor="middle" font-size="9" fill="#228B22">Good: direct random access</text>

  <!-- Row 4: Share Position -->
  <rect x="15" y="260" width="130" height="45" rx="6" fill="#6d5bd0"/>
  <text x="80" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Share Position</text>
  <text x="80" y="295" text-anchor="middle" font-size="9" fill="#ffffff">Send URL to friend</text>

  <rect x="195" y="260" width="210" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="300" y="278" text-anchor="middle" font-size="10" fill="#1a1822">Not linkable by default</text>
  <text x="300" y="293" text-anchor="middle" font-size="9" fill="#cc3333">Needs anchor + scroll logic</text>

  <rect x="445" y="260" width="220" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="560" y="278" text-anchor="middle" font-size="10" fill="#1a1822">Not linkable by default</text>
  <text x="560" y="293" text-anchor="middle" font-size="9" fill="#cc3333">Same as infinite scroll</text>

  <rect x="695" y="260" width="190" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="790" y="278" text-anchor="middle" font-size="10" fill="#1a1822">URL contains page number</text>
  <text x="790" y="293" text-anchor="middle" font-size="9" fill="#228B22">Shareable &amp; bookmarkable</text>

  <!-- Row 5: Footer Access -->
  <rect x="15" y="320" width="130" height="45" rx="6" fill="#6d5bd0"/>
  <text x="80" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Access Footer</text>
  <text x="80" y="355" text-anchor="middle" font-size="9" fill="#ffffff">Legal / contact links</text>

  <rect x="195" y="320" width="210" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="300" y="338" text-anchor="middle" font-size="10" fill="#1a1822">Footer unreachable</text>
  <text x="300" y="353" text-anchor="middle" font-size="9" fill="#cc3333">Content always pushes down</text>

  <rect x="445" y="320" width="220" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="560" y="338" text-anchor="middle" font-size="10" fill="#1a1822">Footer visible before click</text>
  <text x="560" y="353" text-anchor="middle" font-size="9" fill="#228B22">Accessible between loads</text>

  <rect x="695" y="320" width="190" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="790" y="338" text-anchor="middle" font-size="10" fill="#1a1822">Always visible below</text>
  <text x="790" y="353" text-anchor="middle" font-size="9" fill="#228B22">Fixed content length</text>

  <!-- Row 6: SEO -->
  <rect x="15" y="380" width="130" height="45" rx="6" fill="#6d5bd0"/>
  <text x="80" y="400" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">SEO Crawling</text>
  <text x="80" y="415" text-anchor="middle" font-size="9" fill="#ffffff">Search engine index</text>

  <rect x="195" y="380" width="210" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="300" y="398" text-anchor="middle" font-size="10" fill="#1a1822">Poor: JS-dependent</text>
  <text x="300" y="413" text-anchor="middle" font-size="9" fill="#cc3333">Crawlers miss scroll content</text>

  <rect x="445" y="380" width="220" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="560" y="398" text-anchor="middle" font-size="10" fill="#1a1822">Moderate: button visible</text>
  <text x="560" y="413" text-anchor="middle" font-size="9" fill="#cc3333">Still requires interaction</text>

  <rect x="695" y="380" width="190" height="45" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="790" y="398" text-anchor="middle" font-size="10" fill="#1a1822">Excellent: all linkable</text>
  <text x="790" y="413" text-anchor="middle" font-size="9" fill="#228B22">Each page is a unique URL</text>

  <!-- Summary scores -->
  <rect x="195" y="440" width="210" height="45" rx="6" fill="#6d5bd0"/>
  <text x="300" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Engagement: High</text>
  <text x="300" y="477" text-anchor="middle" font-size="10" fill="#ffffff">Control: Low | SEO: Poor</text>

  <rect x="445" y="440" width="220" height="45" rx="6" fill="#6d5bd0"/>
  <text x="560" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Engagement: Medium</text>
  <text x="560" y="477" text-anchor="middle" font-size="10" fill="#ffffff">Control: Med | SEO: Fair</text>

  <rect x="695" y="440" width="190" height="45" rx="6" fill="#6d5bd0"/>
  <text x="790" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Engagement: Low</text>
  <text x="790" y="477" text-anchor="middle" font-size="10" fill="#ffffff">Control: High | SEO: Great</text>
</svg>
