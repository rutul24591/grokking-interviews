<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Optimistic Update Lifecycle: Parallel Paths</text>

  <!-- User Action -->
  <rect x="350" y="55" width="200" height="40" rx="8" fill="#6d5bd0"/>
  <text x="450" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">User Action (e.g., Like)</text>

  <!-- Split into two paths -->
  <line x1="400" y1="95" x2="200" y2="135" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="95" x2="700" y2="135" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <text x="280" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Immediate (0ms)</text>
  <text x="620" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Async (network)</text>

  <!-- LEFT: UI Path -->
  <rect x="60" y="135" width="280" height="50" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="200" y="157" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">1. Apply Optimistic State</text>
  <text x="200" y="173" text-anchor="middle" font-size="10" fill="#1a1822">Cache snapshot saved → UI updated immediately</text>

  <line x1="200" y1="185" x2="200" y2="210" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="210" width="280" height="50" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="200" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">2. Show Pending Indicator</text>
  <text x="200" y="248" text-anchor="middle" font-size="10" fill="#1a1822">Subtle opacity change, spinner on save btn</text>

  <line x1="200" y1="260" x2="200" y2="285" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="285" width="280" height="50" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="200" y="307" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">3. Await Reconciliation</text>
  <text x="200" y="323" text-anchor="middle" font-size="10" fill="#1a1822">Wait for server confirmation or rejection</text>

  <!-- RIGHT: Server Path -->
  <rect x="560" y="135" width="280" height="50" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="700" y="157" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">1. Send Mutation Request</text>
  <text x="700" y="173" text-anchor="middle" font-size="10" fill="#1a1822">POST /api/like { postId, userId }</text>

  <line x1="700" y1="185" x2="700" y2="210" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="560" y="210" width="280" height="50" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="700" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">2. Server Processing</text>
  <text x="700" y="248" text-anchor="middle" font-size="10" fill="#1a1822">Validate, persist, return result</text>

  <line x1="700" y1="260" x2="700" y2="285" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="560" y="285" width="280" height="50" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="700" y="307" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">3. Return Response</text>
  <text x="700" y="323" text-anchor="middle" font-size="10" fill="#1a1822">200 OK or 4xx/5xx error</text>

  <!-- Convergence point -->
  <line x1="200" y1="335" x2="380" y2="375" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="700" y1="335" x2="520" y2="375" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Success Path -->
  <rect x="340" y="375" width="220" height="40" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Reconciliation Check</text>

  <!-- Branch: Success vs Failure -->
  <line x1="380" y1="415" x2="200" y2="445" stroke="#228B22" stroke-width="2" marker-end="url(#arrG)"/>
  <line x1="520" y1="415" x2="700" y2="445" stroke="#cc3333" stroke-width="2" marker-end="url(#arrR)"/>

  <text x="270" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#228B22">Success</text>
  <text x="630" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#cc3333">Failure</text>

  <rect x="80" y="445" width="240" height="45" rx="8" fill="#228B22"/>
  <text x="200" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Confirm Optimistic State</text>
  <text x="200" y="480" text-anchor="middle" font-size="10" fill="#ffffff">Replace with server data, clear pending</text>

  <rect x="580" y="445" width="240" height="45" rx="8" fill="#cc3333"/>
  <text x="700" y="465" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Rollback to Snapshot</text>
  <text x="700" y="480" text-anchor="middle" font-size="10" fill="#ffffff">Restore cache, show error toast</text>

  <!-- Time annotation -->
  <rect x="395" y="100" width="110" height="24" rx="4" fill="#ffffff" stroke="#d7d1e6"/>
  <text x="450" y="116" text-anchor="middle" font-size="9" fill="#1a1822">Perceived: 0ms</text>

  <rect x="395" y="300" width="110" height="24" rx="4" fill="#ffffff" stroke="#d7d1e6"/>
  <text x="450" y="316" text-anchor="middle" font-size="9" fill="#1a1822">Actual: 100-500ms</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#228B22"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc3333"/>
    </marker>
  </defs>
</svg>
