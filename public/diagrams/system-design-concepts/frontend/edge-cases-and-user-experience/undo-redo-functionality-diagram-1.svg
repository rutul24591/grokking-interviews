<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Command Pattern Architecture for Undo/Redo</text>

  <!-- Command Interface -->
  <rect x="310" y="55" width="280" height="80" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">Command Interface</text>
  <text x="330" y="97" font-size="10" fill="#1a1822">execute(): void — apply the action</text>
  <text x="330" y="113" font-size="10" fill="#1a1822">undo(): void — reverse the action</text>
  <text x="330" y="129" font-size="10" fill="#1a1822">description: string — for UI display</text>

  <!-- Concrete commands -->
  <line x1="370" y1="135" x2="140" y2="175" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="135" x2="450" y2="175" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="530" y1="135" x2="760" y2="175" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="30" y="175" width="220" height="75" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="140" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">InsertTextCommand</text>
  <text x="45" y="213" font-size="9" fill="#1a1822">• position, text, length</text>
  <text x="45" y="227" font-size="9" fill="#1a1822">• execute: insert at cursor</text>
  <text x="45" y="241" font-size="9" fill="#1a1822">• undo: delete range</text>

  <rect x="340" y="175" width="220" height="75" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">MoveElementCommand</text>
  <text x="355" y="213" font-size="9" fill="#1a1822">• elementId, fromPos, toPos</text>
  <text x="355" y="227" font-size="9" fill="#1a1822">• execute: move to new position</text>
  <text x="355" y="241" font-size="9" fill="#1a1822">• undo: move back to original</text>

  <rect x="650" y="175" width="220" height="75" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="760" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">StyleChangeCommand</text>
  <text x="665" y="213" font-size="9" fill="#1a1822">• elementId, oldStyle, newStyle</text>
  <text x="665" y="227" font-size="9" fill="#1a1822">• execute: apply newStyle</text>
  <text x="665" y="241" font-size="9" fill="#1a1822">• undo: apply oldStyle</text>

  <!-- History Manager -->
  <rect x="180" y="280" width="540" height="100" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="302" text-anchor="middle" font-size="13" font-weight="600" fill="#6d5bd0">History Manager (Undo Stack + Redo Stack)</text>

  <!-- Undo Stack -->
  <rect x="200" y="310" width="230" height="60" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="315" y="328" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Undo Stack (past)</text>
  <rect x="210" y="338" width="60" height="24" rx="3" fill="#6d5bd0" opacity="0.5"/>
  <text x="240" y="354" text-anchor="middle" font-size="8" fill="#ffffff">Cmd 1</text>
  <rect x="275" y="338" width="60" height="24" rx="3" fill="#6d5bd0" opacity="0.7"/>
  <text x="305" y="354" text-anchor="middle" font-size="8" fill="#ffffff">Cmd 2</text>
  <rect x="340" y="338" width="60" height="24" rx="3" fill="#6d5bd0"/>
  <text x="370" y="354" text-anchor="middle" font-size="8" fill="#ffffff">Cmd 3</text>
  <text x="410" y="354" font-size="10" fill="#6d5bd0">←top</text>

  <!-- Redo Stack -->
  <rect x="470" y="310" width="230" height="60" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="585" y="328" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">Redo Stack (future)</text>
  <rect x="480" y="338" width="60" height="24" rx="3" fill="#d7d1e6"/>
  <text x="510" y="354" text-anchor="middle" font-size="8" fill="#1a1822">Cmd 4</text>
  <rect x="545" y="338" width="60" height="24" rx="3" fill="#d7d1e6" opacity="0.7"/>
  <text x="575" y="354" text-anchor="middle" font-size="8" fill="#1a1822">Cmd 5</text>

  <!-- Operations -->
  <rect x="30" y="410" width="250" height="80" rx="8" fill="#6d5bd0"/>
  <text x="155" y="432" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Undo Operation (Ctrl+Z)</text>
  <text x="45" y="452" font-size="10" fill="#ffffff">1. Pop top from undo stack</text>
  <text x="45" y="468" font-size="10" fill="#ffffff">2. Call command.undo()</text>
  <text x="45" y="484" font-size="10" fill="#ffffff">3. Push onto redo stack</text>

  <rect x="325" y="410" width="250" height="80" rx="8" fill="#6d5bd0"/>
  <text x="450" y="432" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Redo Operation (Ctrl+Y)</text>
  <text x="340" y="452" font-size="10" fill="#ffffff">1. Pop top from redo stack</text>
  <text x="340" y="468" font-size="10" fill="#ffffff">2. Call command.execute()</text>
  <text x="340" y="484" font-size="10" fill="#ffffff">3. Push onto undo stack</text>

  <rect x="620" y="410" width="250" height="80" rx="8" fill="#6d5bd0"/>
  <text x="745" y="432" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">New Action</text>
  <text x="635" y="452" font-size="10" fill="#ffffff">1. Create command object</text>
  <text x="635" y="468" font-size="10" fill="#ffffff">2. Call command.execute()</text>
  <text x="635" y="484" font-size="10" fill="#ffffff">3. Push to undo, clear redo</text>

  <!-- Arrows from operations to history -->
  <line x1="155" y1="410" x2="315" y2="380" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="410" x2="585" y2="380" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="745" y1="410" x2="450" y2="380" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
