<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Collaborative Undo with Operational Transformation</text>

  <!-- Users -->
  <rect x="30" y="60" width="180" height="55" rx="8" fill="#6d5bd0"/>
  <text x="120" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">User A (Local)</text>
  <text x="120" y="100" text-anchor="middle" font-size="10" fill="#ffffff">Types &quot;Hello&quot; at pos 0</text>

  <rect x="690" y="60" width="180" height="55" rx="8" fill="#6d5bd0"/>
  <text x="780" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">User B (Remote)</text>
  <text x="780" y="100" text-anchor="middle" font-size="10" fill="#ffffff">Types &quot;World&quot; at pos 0</text>

  <!-- Timeline arrows down -->
  <line x1="120" y1="115" x2="120" y2="480" stroke="#d7d1e6" stroke-width="1.5"/>
  <line x1="780" y1="115" x2="780" y2="480" stroke="#d7d1e6" stroke-width="1.5"/>

  <!-- OT Server in center -->
  <rect x="350" y="60" width="200" height="55" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">OT Server</text>
  <text x="450" y="100" text-anchor="middle" font-size="10" fill="#1a1822">Transform &amp; Broadcast</text>
  <line x1="450" y1="115" x2="450" y2="480" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Step 1: Both send ops -->
  <rect x="40" y="135" width="160" height="35" rx="4" fill="#ffffff" stroke="#d7d1e6"/>
  <text x="120" y="157" text-anchor="middle" font-size="9" fill="#1a1822">Op A: insert(&quot;Hello&quot;, 0)</text>
  <line x1="200" y1="152" x2="350" y2="165" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="700" y="135" width="160" height="35" rx="4" fill="#ffffff" stroke="#d7d1e6"/>
  <text x="780" y="157" text-anchor="middle" font-size="9" fill="#1a1822">Op B: insert(&quot;World&quot;, 0)</text>
  <line x1="700" y1="152" x2="550" y2="165" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Server transforms -->
  <rect x="355" y="165" width="190" height="55" rx="6" fill="#6d5bd0"/>
  <text x="450" y="185" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Transform(Op A, Op B)</text>
  <text x="450" y="200" text-anchor="middle" font-size="9" fill="#ffffff">A&apos;: insert(&quot;Hello&quot;, 0)</text>
  <text x="450" y="213" text-anchor="middle" font-size="9" fill="#ffffff">B&apos;: insert(&quot;World&quot;, 5)</text>

  <!-- Step 3: Broadcast transformed ops -->
  <line x1="350" y1="210" x2="200" y2="240" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="260" y="220" font-size="8" fill="#6d5bd0">Send B&apos; to A</text>
  <line x1="550" y1="210" x2="700" y2="240" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="640" y="220" font-size="8" fill="#6d5bd0">Send A&apos; to B</text>

  <!-- Step 3: Both converge -->
  <rect x="40" y="240" width="160" height="35" rx="4" fill="#228B22" opacity="0.15" stroke="#228B22"/>
  <text x="120" y="262" text-anchor="middle" font-size="9" fill="#1a1822">Result: &quot;HelloWorld&quot;</text>

  <rect x="700" y="240" width="160" height="35" rx="4" fill="#228B22" opacity="0.15" stroke="#228B22"/>
  <text x="780" y="262" text-anchor="middle" font-size="9" fill="#1a1822">Result: &quot;HelloWorld&quot;</text>

  <text x="450" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#228B22">Converged ✓</text>

  <!-- Now: User A undoes -->
  <rect x="40" y="300" width="160" height="35" rx="4" fill="#cc3333" opacity="0.15" stroke="#cc3333"/>
  <text x="120" y="322" text-anchor="middle" font-size="9" fill="#1a1822">Undo: remove &quot;Hello&quot;</text>

  <!-- Problem callout -->
  <rect x="240" y="295" width="420" height="65" rx="6" fill="#ffffff" stroke="#cc3333" stroke-width="2"/>
  <text x="450" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#cc3333">Problem: Naive Undo Breaks Consistency</text>
  <text x="250" y="333" font-size="9" fill="#1a1822">If A undoes insert(&quot;Hello&quot;, 0), it deletes positions 0-4.</text>
  <text x="250" y="347" font-size="9" fill="#1a1822">But &quot;World&quot; is now at position 5, not 0. Naive undo corrupts B&apos;s text.</text>

  <!-- Solution -->
  <rect x="240" y="375" width="420" height="80" rx="6" fill="#ffffff" stroke="#228B22" stroke-width="2"/>
  <text x="450" y="395" text-anchor="middle" font-size="11" font-weight="600" fill="#228B22">Solution: Transform Undo Against Concurrent Ops</text>
  <text x="250" y="415" font-size="9" fill="#1a1822">1. Compute inverse: inverseA = delete(&quot;Hello&quot;, 0)</text>
  <text x="250" y="430" font-size="9" fill="#1a1822">2. Transform inverse against B&apos;: inverseA&apos; = delete(&quot;Hello&quot;, 0)</text>
  <text x="250" y="445" font-size="9" fill="#1a1822">3. Apply transformed inverse: &quot;World&quot; (correct — only A&apos;s text removed)</text>

  <!-- Result -->
  <rect x="40" y="470" width="160" height="25" rx="4" fill="#228B22" opacity="0.15" stroke="#228B22"/>
  <text x="120" y="487" text-anchor="middle" font-size="9" fill="#1a1822">A sees: &quot;World&quot; ✓</text>

  <rect x="700" y="470" width="160" height="25" rx="4" fill="#228B22" opacity="0.15" stroke="#228B22"/>
  <text x="780" y="487" text-anchor="middle" font-size="9" fill="#1a1822">B sees: &quot;World&quot; ✓</text>

  <text x="450" y="490" text-anchor="middle" font-size="10" font-weight="600" fill="#228B22">Consistent ✓</text>

  <!-- Key insight box -->
  <rect x="30" y="375" width="195" height="80" rx="6" fill="#6d5bd0"/>
  <text x="127" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Key Insight</text>
  <text x="40" y="413" font-size="9" fill="#ffffff">Collaborative undo must</text>
  <text x="40" y="427" font-size="9" fill="#ffffff">transform the inverse op</text>
  <text x="40" y="441" font-size="9" fill="#ffffff">against all ops that arrived</text>
  <text x="40" y="455" font-size="9" fill="#ffffff">since the original action.</text>

  <rect x="690" y="375" width="180" height="80" rx="6" fill="#6d5bd0"/>
  <text x="780" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Alternatives</text>
  <text x="700" y="413" font-size="9" fill="#ffffff">• CRDT (Yjs, Automerge)</text>
  <text x="700" y="427" font-size="9" fill="#ffffff">• Selective undo per-user</text>
  <text x="700" y="441" font-size="9" fill="#ffffff">• Branch-based undo</text>
  <text x="700" y="455" font-size="9" fill="#ffffff">• Last-writer-wins</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
